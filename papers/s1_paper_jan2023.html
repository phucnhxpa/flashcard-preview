n needed. The symmetric structure (each variable in exactly 2 sums) is what makes addition work.\n\nFor (b), divide by 2 to get $$p+q+r = \\tfrac{2}{5}$$, then subtract individual equations to isolate each variable.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "In a Venn diagram problem, after finding $$p + q + r$$, how do you get the \"outside both\" region $$s$$?", "answer": "All four regions partition the sample space, so $$p + q + r + s = 1$$. Hence $$s = 1 - (p+q+r)$$. Here, $$s = 1 - \\tfrac{10}{25} = \\tfrac{15}{25} = \\tfrac{3}{5}$$. This is always the last region to solve — it falls out automatically.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "S1 Jan 2023 Q4(ii) — The question asks to show $$C$$ and $$D$$ CANNOT be mutually exclusive. What's the logical structure of the proof, even though the question doesn't say \"by contradiction\"?", "answer": "- Step 1: Assume mutual exclusivity. Then $$P(C \\cap D) = 0$$, so $$P(C \\cup D) = P(C) + P(D)$$.\n- Step 2: Since $$P(C \\cup D) \\le 1$$, mutual exclusivity FORCES $$P(C) + P(D) \\le 1$$.\n- Step 3: Compute $$P(C) + P(D)$$ and show it exceeds 1 — contradiction — so mutual exclusivity fails.\n\nThe trigger is \"cannot be mutually exclusive\" → use the upper-bound-of-probability lever.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "What's the algebraic trick for showing $$\\dfrac{x}{x+5} + \\dfrac{5}{x} > 1$$ for all $$x > 0$$ WITHOUT solving a quadratic inequality?", "answer": "- Step 1: Combine over common denominator: $$\\dfrac{x^2 + 5x + 25}{x^2 + 5x}$$.\n- Step 2: Notice the numerator is the denominator plus 25: rewrite as $$\\dfrac{(x^2+5x) + 25}{x^2+5x} = 1 + \\dfrac{25}{x^2 + 5x}$$.\n- Step 3: For $$x > 0$$, $$x^2 + 5x > 0$$, so $$\\dfrac{25}{x^2+5x} > 0$$, hence the whole expression $$> 1$$. Done.\n\nThe \"split numerator into (denominator + extra)\" trick turns a messy inequality into an obvious one.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Why is mutual exclusivity's contradiction lever $$P(C) + P(D) \\le 1$$ rather than $$P(C) + P(D) = 1$$?", "answer": "Mutual exclusivity means $$C \\cap D = \\emptyset$$, giving $$P(C \\cup D) = P(C) + P(D)$$. But $$C \\cup D$$ might not cover the whole sample space (its complement could exist), so $$P(C \\cup D)$$ can be anything in $$[0, 1]$$. The CONSTRAINT is just that ANY probability is at most 1. So showing $$P(C) + P(D) > 1$$ kills mutual exclusivity, whereas $$= 1$$ would only show $$C \\cup D$$ = sample space (still consistent with mutually exclusive).", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "S1 Jan 2023 Q5(b) — For the quartiles of a normal distribution, what exact $$z$$-value should you use and why is 0.67 wrong?", "answer": "- Step 1: Use $$z = 0.6745$$ for $$Q_3$$ and $$z = -0.6745$$ for $$Q_1$$ — these come from $$\\Phi^{-1}(0.75) = 0.6745$$.\n- Step 2: This value is NOT in the obvious part of standard $$z$$-tables (you have to look in the inverse-normal table or memorise it).\n- Step 3: Using $$0.67$$ gives $$Q_3 = 4.768$$ instead of $$4.7698$$, which propagates to outlier limits and the \"show that 0.993\" calculation, missing the target by a rounding margin.\n\nThis is an explicit memorisation item — examiners expect 0.6745.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "How do you convert a standard-normal $$z$$-value to a quartile of the actual distribution $$L \\sim N(\\mu, \\sigma^2)$$?", "answer": "Use the inverse standardisation: $$L = \\mu + z\\sigma$$. For $$L \\sim N(4.5, 0.4^2)$$: $$Q_3 = 4.5 + 0.6745 \\times 0.4 \\approx 4.77$$, $$Q_1 = 4.5 - 0.6745 \\times 0.4 \\approx 4.23$$. The $$z$$-value lives on the standard scale; multiplying by $$\\sigma$$ rescales it and adding $$\\mu$$ shifts it to the actual variable's scale.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "S1 Jan 2023 Q5(c) — What is the standard outlier criterion based on quartiles?", "answer": "- Step 1: Outlier if $$L > Q_3 + 1.5 \\times \\mathrm{IQR}$$ or $$L < Q_1 - 1.5 \\times \\mathrm{IQR}$$, where $$\\mathrm{IQR} = Q_3 - Q_1$$.\n- Step 2: For the wing-length data: $$\\mathrm{IQR} = 0.5396$$, $$1.5 \\times \\mathrm{IQR} = 0.8094$$.\n- Step 3: Outlier limits: upper $$\\approx 5.58$$, lower $$\\approx 3.42$$. The \"not outlier\" interval is $$[3.42, 5.58]$$.\n\nCarry full precision through this — rounding too early ruins part (d).", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "Q5(d) — \"Show that P(not outlier) = 0.993 using standardisation.\" What's the structured approach the question demands?", "answer": "- Step 1: Identify the not-outlier interval in $$L$$: $$3.4208 < L < 5.5792$$.\n- Step 2: STANDARDISE both endpoints: $$Z_{\\text{upper}} = \\tfrac{5.5792 - 4.5}{0.4} = 2.698 \\approx 2.70$$ and $$Z_{\\text{lower}} = -2.70$$ (by symmetry, since outlier limits are symmetric about $$\\mu$$).\n- Step 3: $$P(-2.70 < Z < 2.70) = \\Phi(2.70) - \\Phi(-2.70) = 0.9965 - 0.0035 = 0.9930$$.\n\n\"Using standardisation\" is a directive — you MUST display the $$z$$-values, not just the final probability.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "Why are the standardised outlier $$z$$-values exactly $$\\pm 2.698$$ (and not some random number)?", "answer": "The outlier limit is $$\\mu \\pm (Q_3 - \\mu) + 1.5 \\cdot 2(Q_3 - \\mu) = \\mu \\pm 4 \\cdot 0.6745\\sigma = \\mu \\pm 2.698\\sigma$$. So $$z = \\pm 2.698$$ is structural — it pops out of the outlier formula whenever the data are exactly normal with quartiles at $$\\pm 0.6745\\sigma$$. Spotting $$\\mu \\pm 2.698\\sigma$$ is a sanity check that your quartiles were correct.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "S1 Jan 2023 Q5(e) — \"Given the housefly is not an outlier, find $$P(L > 5)$$.\" What is THE single most common mistake on this conditional?", "answer": "- Step 1: Wrong answer: compute $$P(L > 5) / P(\\text{not outlier}) = P(Z > 1.25)/0.993 \\approx 0.106$$.\n- Step 2: Why wrong: \"not outlier\" caps $$L$$ at 5.5792 on the upper end. The intersection of $$\\{L > 5\\}$$ with $$\\{3.42 < L < 5.58\\}$$ is $$\\{5 < L < 5.58\\}$$, not $$\\{L > 5\\}$$.\n- Step 3: Correct numerator: $$P(5 < L < 5.5792) = \\Phi(2.70) - \\Phi(1.25) = 0.9965 - 0.8944 = 0.1021$$. Then divide by 0.993 to get $$0.103$$.\n\nRule: in conditional probability, ALWAYS intersect the event with the conditioning set on the number line BEFORE standardising.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "What's the generic algorithm for conditional probability $$P(A \\mid B)$$ with normal distributions?", "answer": "- Step 1: Write down both intervals — the event $$A$$ (e.g., $$L > 5$$) and the condition $$B$$ (e.g., $$3.42 < L < 5.58$$).\n- Step 2: INTERSECT them on the number line: $$A \\cap B$$ (here $$5 < L < 5.58$$).\n- Step 3: Standardise both endpoints of $$A \\cap B$$, look up via $$\\Phi$$, compute $$P(A \\cap B)$$.\n- Step 4: Divide by $$P(B)$$ (often handed to you from a \"show that\" part).\n\nThe intersection step is what people skip. Always draw a number line.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "S1 Jan 2023 Q6(a) — What three components must a gradient interpretation contain to earn the mark?", "answer": "- Step 1: The numerical gradient with its UNITS (e.g., \"by 2.72 grams\").\n- Step 2: A \"per 1 unit of $$x$$\" clause with $$x$$'s units (e.g., \"for every 1 °C increase in temperature\").\n- Step 3: The phrase \"on average\" or \"approximately\" (regression is a fit, not a deterministic law).\n\nSample: \"For every 1 °C increase in temperature, the maximum weight of sugar that dissolves increases by approximately 2.72 grams on average.\" Drop any of the three → mark lost.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "S1 Jan 2023 Q6(c) — When estimating $$y$$ at $$x = 90$$ given data range $$10 \\le x \\le 80$$, what single keyword must appear in your reliability comment?", "answer": "**\"Extrapolation\"** — and you must reference the data range explicitly. Sample: \"The estimate is unreliable because $$x = 90$$ lies outside the range of observed data ($$10 \\le x \\le 80$$), so this is extrapolation — there is no evidence the linear relationship extends beyond 80 °C.\" Saying \"high correlation, so estimate is reliable\" is wrong: a high $$r$$ never justifies extrapolation.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "S1 Jan 2023 Q6(d) — When asked to \"show $$r = 0.988$$\" from summary statistics, what's the systematic three-line setup?", "answer": "- Step 1: Lay out $$S_{xx} = \\sum x^2 - \\dfrac{(\\sum x)^2}{n}$$ as one labelled line.\n- Step 2: Lay out $$S_{yy} = \\sum y^2 - \\dfrac{(\\sum y)^2}{n}$$ as a separate labelled line.\n- Step 3: Lay out $$S_{xy} = \\sum xy - \\dfrac{(\\sum x)(\\sum y)}{n}$$, then combine: $$r = \\dfrac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$.\n\nNever try to compute $$r$$ in one mashed expression — labelled intermediate quantities are mark-bearing AND let you check arithmetic.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "If a PMCC question's summary stats look incomplete (e.g., $$\\sum x$$ or $$\\sum xy$$ apparently missing), what recovery tools exist?", "answer": "- Step 1: The regression line passes through $$(\\bar x, \\bar y)$$: if you know $$\\sum y$$ and $$n$$, get $$\\bar y$$, then solve $$\\bar y = a + b\\bar x$$ for $$\\bar x$$, then $$\\sum x = n\\bar x$$.\n- Step 2: The gradient identity: $$b = \\dfrac{S_{xy}}{S_{xx}}$$, so $$S_{xy} = b \\cdot S_{xx}$$ if $$b$$ and $$S_{xx}$$ are known.\n- Step 3: Always first double-check you haven't misread the paper — examiners rarely hide truly necessary stats.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "S1 Jan 2023 Q6(e) — To discuss \"suitability of a linear model\", which TWO pieces of evidence must you cite?", "answer": "- Step 1: The PMCC value with interpretation: e.g., \"$$r = 0.988$$ is very close to 1, indicating a strong positive linear correlation.\"\n- Step 2: The visual scatter behaviour: e.g., \"points lie close to a straight line with no obvious curvature or fanning.\"\n- Step 3: Conclusion: \"Therefore a linear regression model is suitable within the observed range.\"\n\nCiting only $$r$$ or only the scatter loses a mark — the question says \"with reference to BOTH\".", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "Why doesn't a high PMCC value alone justify using a linear model — what could the scatter still reveal?", "answer": "$$r$$ measures strength of LINEAR association but is sensitive to outliers and can be deceptively high for data that is actually curved (especially monotone curves like quadratics over a restricted range). The scatter can reveal: (i) curvature, (ii) fanning/heteroscedasticity, (iii) clusters, (iv) influential outliers driving $$r$$ up. So $$r$$ + scatter together are needed: $$r$$ quantifies, scatter qualifies.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "Across S1 Jan 2023, Q2(d) and Q5(e) both involve conditional probability. What's the shared mental model?", "answer": "- Step 1: Write $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)}$$ FIRST, before substituting any numbers.\n- Step 2: The conditioning event $$B$$ RESTRICTS the sample space — recompute $$A \\cap B$$ to reflect the restriction.\n- Step 3: In Q2(d) $$A \\subset B$$ (all-green ⊆ all-same), so $$A \\cap B = A$$. In Q5(e), $$A \\not\\subset B$$ (some \"L > 5\" values are outliers), so $$A \\cap B$$ is a strict shrinkage of $$A$$.\n\nAlways ask: is the event already inside the condition, or does the condition trim it?", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "What is the symmetric difference $$A \\triangle B$$ and what's its probability formula?", "answer": "- Step 1: $$A \\triangle B = (A \\cap B') \\cup (A' \\cap B)$$ = \"in exactly one of $$A$$ or $$B$$\".\n- Step 2: $$P(A \\triangle B) = P(A) + P(B) - 2P(A \\cap B)$$ — subtract the intersection TWICE because it's in both $$A$$ and $$B$$ but we want it in neither.\n- Step 3: In Venn-region notation: $$A \\triangle B = p + r$$ (everything except the intersection $$q$$ and the outside $$s$$).\n\nContrast with $$A \\cup B = p + q + r$$ (includes the intersection once).", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Edge case — if a probability table's parameter $$a$$ yields a constraint $$0 \\le a \\le 0.6$$ and the variance equation produces TWO roots both in range, what do you write?", "answer": "Both are valid. Explicitly state: \"Both roots satisfy $$0 \\le a \\le 0.6$$, so $$a = 0.2$$ or $$a = 0.4$$.\" The mark is for performing the check, not for the check rejecting a root. Examiners reward the habit even when it's vacuous.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Why does Q5(d) instruct \"using standardisation\" rather than letting you use a calculator's normal CDF directly?", "answer": "\"Using standardisation\" is a directive demanding that you SHOW the $$Z = (X-\\mu)/\\sigma$$ step explicitly — write the $$z$$-values, then look up $$\\Phi(z)$$. Mark scheme awards method marks for the standardisation line, the $$\\Phi$$ table lookup, and the subtraction. Skipping straight to the calculator answer loses these intermediate marks even if the final answer is right.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "What's the conceptual difference between linear interpolation in part (b) of Q1 (estimate count below a value) vs. part (e) (find a quartile)?", "answer": "- Step 1: Part (b): you know the $$x$$-position (16) and want the cumulative frequency. Compute the fractional position within the class, then multiply the class frequency.\n- Step 2: Part (e): you know the cumulative-frequency target (25) and want the $$x$$-position. Use $$Q = L + \\dfrac{\\text{target} - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$.\n- Step 3: Both rely on the same uniformity assumption, but they invert the input/output roles. Recognising which you're given saves time.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "In Q6(d), the official paper supplies $$\\sum xy = 14{,}590$$ but a reconstruction via $$S_{xy} = b \\times S_{xx} = 2.72 \\times 5300 = 14{,}416$$ gives a different value. What does this discrepancy reveal?", "answer": "- Step 1: The regression gradient $$b = 2.72$$ is ROUNDED (the paper rounded it to 3 s.f.). Reversing through $$b$$ to recover $$S_{xy}$$ amplifies the rounding error.\n- Step 2: The PAPER's exact $$\\sum xy$$ is the authoritative number; reconstruction is only a fallback when the paper hides it.\n- Step 3: Always prefer SUPPLIED summary statistics over reconstructed ones — that's why the official $$r$$ comes out to 0.988 rather than 0.985.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "What's the geometric/conceptual reason the symmetric difference equation $$p + r = \\tfrac{8}{25}$$ was the most \"surprising\" of the three given equations in Q4(i)?", "answer": "- Step 1: $$P(A) = p+q$$ and $$P(B) = q+r$$ are direct definitions — easy to translate.\n- Step 2: $$(A \\cap B') \\cup (A' \\cap B)$$ looks complicated until you recognise the \"exactly one of\" structure: $$A$$ but not $$B$$, OR $$B$$ but not $$A$$ — which is $$p$$ (A only) plus $$r$$ (B only).\n- Step 3: Trick: any time you see a UNION of complement-intersections, suspect symmetric difference and identify which Venn regions it picks out.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Why does \"carry full precision through (c) and (d)\" matter for Q5, when the final answer of 0.993 is to 3 d.p.?", "answer": "- Step 1: Outlier limits like 5.5792 come from $$Q_3 + 1.5 \\times \\mathrm{IQR}$$, then get standardised: $$z = (5.5792 - 4.5)/0.4 = 2.698$$.\n- Step 2: If you rounded $$Q_3$$ to 4.77 prematurely, $$z$$ becomes $$\\approx 2.675$$, giving $$\\Phi(z) \\approx 0.9963$$ and a total of $$\\approx 0.993$$ — but the path is messy and can miss 3 d.p. at the boundary.\n- Step 3: \"Show that\" questions demand the exact target — rounding early can leave you with 0.992 or 0.994 instead of 0.993.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "If a discrete random variable's table has probabilities $$a$$ and $$0.6 - a$$ alongside fixed values, why does the sum-to-1 constraint give NO information about $$a$$?", "answer": "Compute: $$a + 0.4 + (0.6 - a) = 1$$. The $$a$$'s cancel, leaving $$1 = 1$$ — a tautology. The table was designed so sum-to-1 is automatic; the constraint $$0 \\le a \\le 0.6$$ comes ONLY from $$P \\ge 0$$ for each cell. This is a deliberate pattern: the parameter is \"free\" until you use a second condition (like Var = 0.56) to pin it down.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "What's a quick sanity check that $$Q_1$$ and $$Q_3$$ in Q5(b) are correct?", "answer": "- Step 1: For a symmetric normal distribution, $$Q_1$$ and $$Q_3$$ should be EQUIDISTANT from the mean: $$\\mu - Q_1 = Q_3 - \\mu$$.\n- Step 2: Here, $$4.5 - 4.23 = 0.27$$ and $$4.77 - 4.5 = 0.27$$ ✓.\n- Step 3: This equidistance also means $$\\mathrm{IQR}/2 = 0.6745\\sigma$$ exactly — another check.\n\nAsymmetric quartiles around the mean for a normal → calculation error.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Why is using $$P(\\text{not outlier})$$ from a \"show that\" part legitimate in the next sub-part, instead of recomputing?", "answer": "The \"show that\" part proves the value to a specified accuracy (here 0.993 to 3 d.p.). Subsequent parts that reference \"given the housefly is not an outlier\" are EXPECTED to use this exact value as the denominator. Recomputing it not only wastes time but risks introducing fresh rounding errors. Mark schemes treat 0.993 as the canonical value going forward.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Across the paper, what's the unified strategy for handling questions where the SAMPLE SPACE CHANGES (Q1(a) reconstruction, Q2's transferred marbles, Q5(e)'s conditional band)?", "answer": "- Step 1: Recognise that the \"raw\" setup has been altered (missing data, items moved, restricted event).\n- Step 2: STOP and explicitly rebuild the new sample space / population BEFORE computing any probabilities.\n+ Q1: fill in missing frequencies → cumulative table.\n+ Q2: update bag Y to 13 marbles, branch-dependent compositions.\n+ Q5(e): intersect event with conditioning interval on the number line.\n- Step 3: Only after the corrected sample space is written down should you write probabilities.\n\nSkipping step 2 is the dominant source of marks lost on this paper.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "What's the danger of treating Q5(e) as an \"inverse normal\" problem?", "answer": "Inverse normal means \"given a probability, find the $$z$$-value (or $$x$$-value)\". Q5(e) is the OPPOSITE direction: given an event range, find a probability. Confusing them leads to looking up $$\\Phi^{-1}$$ when you should be using $$\\Phi$$, or trying to \"solve for an unknown bound\" when both bounds are explicit. Recognise: conditional probability of a range = DIRECT normal CDF computation, just over a trimmed interval.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}], "count": 50}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "S1 Jan 2023 Q1(a) — when a histogram gives you partial frequencies and asks you to complete the table, what's the first thing you must do before reading off any bars?", "answer": "Use the *known* frequencies to fix the frequency-density scale. The histogram displays frequency density (= frequency / class width), not frequency directly. Once you know one or two classes have $$f = 10, 16, 24$$, you can determine how many \"frequency units\" each unit of bar height represents, then read remaining bars by computing density × width. Always verify the total sums to $$n$$ at the end (here, $$10+16+24+28+22=100$$).", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why must histogram frequencies be computed as area (density × width) rather than just by reading bar heights directly?", "answer": "Histograms plot *frequency density* on the y-axis precisely because class widths can differ. If you read heights directly you would systematically over-count narrow classes and under-count wide ones. The area of each bar represents the frequency, so density × width recovers the count. This is the key conceptual distinction between histograms and bar charts.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "S1 Jan 2023 Q1(b) — when asked \"how many people took less than 16 minutes\" and 16 falls inside the 14–18 class, what's the trick? (3 steps)", "answer": "- Step 1: Assume the 24 people in 14–18 are spread *uniformly* across the class — this is the linear interpolation assumption.\n- Step 2: Compute the fraction of the class below 16: $$\\frac{16-14}{18-14} = \\frac{1}{2}$$, giving $$\\frac{1}{2} \\times 24 = 12$$ people in $$[14, 16)$$.\n- Step 3: Add all complete prior classes plus this partial slice: $$10 + 16 + 12 = 38$$.\n\nThe key insight: you never count whole classes proportionally — you fully include classes that end before the cutoff, then interpolate only within the class containing the cutoff.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "For grouped continuous data in Edexcel IAL S1, which quartile position formula do you use — $$\\frac{n}{4}$$ or $$\\frac{n+1}{4}$$?", "answer": "Use $$\\frac{n}{4}$$ directly (so for $$n = 100$$, $$Q_1$$ is at position 25, not 25.25). The $$\\frac{n+1}{4}$$ rule is for *discrete* listed data only. Mixing them up is a classic mark-loser — grouped data is treated as a continuous variable, so the quartile is defined by the point that splits the distribution at 25% by area/count, not by ranking a list.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "What is the linear interpolation formula for the $$k$$-th quartile of grouped data, and what does each symbol mean?", "answer": "$$Q_k = L + \\frac{\\frac{kn}{4} - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$\n\nWhere:\n+ $$L$$ = lower boundary of the quartile-containing class\n+ $$\\frac{kn}{4}$$ = target cumulative position (e.g., 25 for $$Q_1$$ when $$n=100$$)\n+ $$F_{\\text{before}}$$ = cumulative frequency *up to* (not including) the quartile class\n+ $$f_{\\text{class}}$$ = frequency of the quartile class itself (NOT the cumulative)\n+ $$w$$ = width of the quartile class\n\nThe denominator being $$f_{\\text{class}}$$ (not cumulative) is the most common confusion point.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "S1 Jan 2023 Q1(e) — when the question hands you $$Q_3 = 23$$ for free, what's the examiner signalling?", "answer": "They don't want you to interpolate the awkward 18–25 class (uneven width, harder denominator). The free value is a hint to *only* interpolate $$Q_1$$ and subtract. Whenever a multi-step question hands you a value that you could in principle compute, treat it as both a time-saver and a redirection — they're steering you away from a calculation that's either tedious or error-prone.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "S1 Jan 2023 Q1(e) — to interpolate $$Q_1$$ for grouped data with $$n = 100$$, what cumulative position do you target, and which class contains it? (2 steps)", "answer": "- Step 1: Target position is $$\\frac{n}{4} = 25$$ (not 25.25 — grouped data uses $$n/4$$).\n- Step 2: Build the cumulative table: after class 5–10 cumulative is 10, after 10–14 cumulative is 26. Since $$25$$ lies between 10 and 26, $$Q_1$$ lies in the 10–14 class.\n\nLocating the class correctly relies on the cumulative jumping *past* 25 in that class — counting up to 25 lands you inside 10–14, not 5–10.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Conceptual: what does $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar{t}^2}$$ actually compute, and why this form rather than the deviations-from-mean version?", "answer": "This is the algebraically equivalent computational form of $$\\sigma = \\sqrt{\\frac{\\sum f(t - \\bar{t})^2}{n}}$$. Both compute the same root-mean-square deviation from the mean, but the \"$$\\sum ft^2/n - \\bar{t}^2$$\" form requires only two summary statistics (sums of $$ft$$ and $$ft^2$$) rather than knowing each deviation. Exam papers always give $$\\sum ft^2$$ for this reason — you're meant to substitute, not recompute from scratch.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "What's the common pitfall when finding standard deviation from $$\\sum ft^2$$, and how do you avoid it?", "answer": "The trap: forgetting the square root and reporting the variance instead of the standard deviation. The formula $$\\frac{\\sum ft^2}{n} - \\bar{t}^2$$ gives $$\\sigma^2$$ — you must apply the square root to get $$\\sigma$$. Always write the $$\\sqrt{\\cdot}$$ explicitly before substituting numbers, so the structure reminds you. State units (e.g. minutes) — unitless answer signals you may have left it as variance.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "What's the correct midpoint of the class 18–25 for computing $$\\sum ft$$, and what's the principle behind it?", "answer": "Midpoint $$= \\frac{18 + 25}{2} = 21.5$$. The principle: use the average of the lower and upper *class boundaries*, treating the class as continuous. This applies even when classes have unequal width (e.g., 25–40 has midpoint $$32.5$$). Always read boundaries as stated, not as inclusive integer ranges.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "S1 Jan 2023 Q2 — when a marble transfers from bag X to bag Y, what changes about bag Y's total marble count for the third draw?", "answer": "Bag Y starts with $$6 + 5 = 11$$ marbles. After *two* marbles are transferred in from X, bag Y has $$11 + 2 = 13$$ marbles. The classic error is to leave Y at 11. Whenever items physically move between containers, *both* numerator and denominator change in the receiving bag — track both, every branch.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "S1 Jan 2023 Q2 tree diagram — why is $$P(G_3)$$ different on different branches, and what are the three possible values?", "answer": "Because the composition of bag Y depends on *which* marbles were transferred from X. The values:\n+ After GG transferred → Y has 8G/5B → $$P(G_3) = \\frac{8}{13}$$\n+ After GB or BG transferred → Y has 7G/6B → $$P(G_3) = \\frac{7}{13}$$\n+ After BB transferred → Y has 6G/7B → $$P(G_3) = \\frac{6}{13}$$\n\nUsing a single value of $$P(G_3)$$ across all branches is the most common error in transfer problems.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "S1 Jan 2023 Q2(b) — what's the structural shortcut for \"two draws from the same bag are different colours\"?", "answer": "Sum the two cross-paths: $$P(GB) + P(BG)$$. There is no shortcut for \"different\" via complement here because P(same in X) still requires both $$P(GG) + P(BB)$$ — same number of paths. The structural insight: \"different colours\" has two ordered paths (one of each starting colour), and both must be added because the tree branches are mutually exclusive outcomes.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "S1 Jan 2023 Q2(c) — when computing $$P(\\text{all 3 same colour})$$, why do only the pure GG→G and BB→B branches contribute?", "answer": "\"All three same\" requires the first two from X to already match — if the X draws produce GB or BG, the colours are mixed even before considering draw 3. So only the pure-monochrome paths GG→G and BB→B survive:\n+ $$P(GGG) = \\frac{5}{9} \\cdot \\frac{4}{8} \\cdot \\frac{8}{13}$$\n+ $$P(BBB) = \\frac{4}{9} \\cdot \\frac{3}{8} \\cdot \\frac{7}{13}$$\n\nThis pruning massively simplifies the calculation — recognise the structure before listing all 8 branches.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Why does keeping a common denominator throughout Q2(c) and (d) save effort in the conditional probability step?", "answer": "With a common denominator of 936, $$P(\\text{all G}) = 160/936$$ and $$P(\\text{same}) = 244/936$$. The conditional then collapses cleanly: $$P(\\text{all G} \\mid \\text{same}) = \\frac{160/936}{244/936} = \\frac{160}{244} = \\frac{40}{61}$$. If you mix fractions/decimals across steps you accumulate rounding error and obscure the cancellation.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "In Q2(d), why does $$P(\\text{all G} \\cap \\text{same}) = P(\\text{all G})$$?", "answer": "Because \"all green\" is a *subset* of \"all the same colour\" — if all three are green, they are necessarily all the same. When $$A \\subset B$$, $$A \\cap B = A$$, so $$P(A \\mid B) = P(A)/P(B)$$ rather than requiring a separate intersection calculation. Spot this subset structure to skip the $$P(A \\cap B)$$ step entirely.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "What is the trigger phrase in any probability question that forces you to write down the conditional probability formula before substituting numbers?", "answer": "Phrases like \"given that ...\", \"if ... then what is the probability ...\", or any phrasing that restricts the sample space. The first thing you write — before any numbers — is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. This forces you to identify both events explicitly, which is what prevents the common error of computing $$P(A)$$ alone.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "S1 Jan 2023 Q3 — before computing $$E(X)$$ or $$\\text{Var}(X)$$ for a parameter-dependent distribution, what constraint must you state and why?", "answer": "State $$0 \\le a \\le 0.6$$. The probabilities must each lie in $$[0,1]$$:\n+ $$a \\ge 0$$\n+ $$0.6 - a \\ge 0 \\Rightarrow a \\le 0.6$$\n\nProbabilities summing to 1 is automatic here, so the binding constraints come from individual non-negativity. This is its own mark, and is the gate for the constraint check on the quadratic roots in part (c).", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "For a discrete random variable, what are the three formulas (NOT in the formula booklet) you must memorise?", "answer": "+ $$E(X) = \\sum x \\, P(X=x)$$\n+ $$E(X^2) = \\sum x^2 \\, P(X=x)$$ — note the $$x^2$$ is inside the sum, *not* $$[E(X)]^2$$\n+ $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$\n\nThe most common confusion is computing $$E(X)^2$$ instead of $$E(X^2)$$ — these are NOT the same, and the variance identity uses both distinctly.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "S1 Jan 2023 Q3(b) — once $$E(X) = 3.6 - 2a$$, how do you find the range of possible $$E(X)$$ values without calculus? (2 steps)", "answer": "- Step 1: Recognise $$E(X) = 3.6 - 2a$$ is *linear and decreasing* in $$a$$. Linear means the extremes occur at the endpoints of the $$a$$-domain; decreasing means max at left endpoint, min at right.\n- Step 2: Substitute the endpoints of $$0 \\le a \\le 0.6$$:\n+ At $$a = 0$$: $$E(X) = 3.6$$ (max)\n+ At $$a = 0.6$$: $$E(X) = 2.4$$ (min)\n\nSo $$2.4 \\le E(X) \\le 3.6$$. The monotonicity argument bypasses any calculus — recognise linear behaviour.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Q3(c) — what is the algebraic trick to avoid sign errors when expanding $$0.56 = (13.2 - 12a) - (3.6 - 2a)^2$$?", "answer": "Bracket the squared term, expand it *separately* first, then substitute back. So compute $$(3.6 - 2a)^2 = 12.96 - 14.4a + 4a^2$$ on its own line, then write $$0.56 = 13.2 - 12a - 12.96 + 14.4a - 4a^2$$, distributing the minus across *every* term inside the bracket. Trying to expand and distribute the minus simultaneously is where signs flip.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "After solving the quadratic in Q3(c) and getting $$a = 0.2$$ or $$a = 0.4$$, what crucial final step is worth a separate mark?", "answer": "Compare both roots against the validity constraint $$0 \\le a \\le 0.6$$ and *explicitly state* the conclusion. Both 0.2 and 0.4 fall in range here, so both survive. Examiners frequently rig variance-equation questions so one root falls outside (e.g., negative or > 1); the constraint check is its own mark even when both roots are valid. State the check in writing, don't just think it.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Conceptually, why does Q3(c) reduce to a *quadratic* in $$a$$ rather than something more complex?", "answer": "Because $$E(X^2)$$ is linear in $$a$$ (sums of $$x^2 \\cdot p_i$$ where $$p_i$$ is linear in $$a$$), and $$[E(X)]^2 = (3.6 - 2a)^2$$ is quadratic in $$a$$. Variance $$= E(X^2) - [E(X)]^2$$ subtracts a quadratic from a linear, leaving a quadratic. The structure of the discrete RV with one free parameter always yields a quadratic constraint — recognising this tells you to expect at most two candidate values.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "S1 Jan 2023 Q4(i) — given $$P(A) = 7/25$$, $$P(B) = 1/5$$, $$P[(A \\cap B') \\cup (A' \\cap B)] = 8/25$$, what's the first move?", "answer": "Translate each given probability into the four Venn regions $$p, q, r, s$$:\n+ $$p + q = P(A) = 7/25$$\n+ $$q + r = P(B) = 5/25$$\n+ $$p + r = P(A \\triangle B) = 8/25$$ (symmetric difference)\n\nThe crucial recognition is that $$(A \\cap B') \\cup (A' \\cap B)$$ is the symmetric difference, which equals $$p + r$$ (the two non-overlapping parts). Once translated, the system is linear and trivial.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "What is the symmetric difference $$A \\triangle B$$, and what's a clean probability formula for it?", "answer": "$$A \\triangle B = (A \\cap B') \\cup (A' \\cap B)$$ — everything in exactly one of $$A$$ or $$B$$ but not both. Its probability:\n$$P(A \\triangle B) = P(A) + P(B) - 2P(A \\cap B)$$\n\nThe \"2\" appears because both halves of $$A \\cap B$$ get excluded — once from $$A$$ (because we drop $$A \\cap B$$) and once from $$B$$ (same reason). Contrast with $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$ which only subtracts the overlap once.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Q4(i)(a) — once you have the three Venn equations $$p+q = 7/25$$, $$q+r = 5/25$$, $$p+r = 8/25$$, what's the elegant trick to immediately get $$2p + 2q + 2r$$?", "answer": "Add all three equations: $$(p+q) + (q+r) + (p+r) = 2p + 2q + 2r$$. Each variable appears exactly twice on the left because each region is in exactly two of the three pairs. RHS sums to $$\\frac{7+5+8}{25} = \\frac{20}{25} = \\frac{4}{5}$$. The trick avoids solving for individual variables — sometimes the \"show that\" is purely about recognising the additive structure.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Q4(i)(b) — after deriving $$p + q + r = 2/5$$, how do you isolate $$q$$ without solving a system?", "answer": "Use $$P(A) + P(B) = (p+q) + (q+r) = (p+q+r) + q$$. The left side is known ($$12/25$$), the first term on the right is known ($$10/25$$), so $$q = 12/25 - 10/25 = 2/25$$. The structural insight: $$P(A) + P(B)$$ double-counts the intersection, so the difference between $$P(A) + P(B)$$ and $$p+q+r$$ is exactly $$q$$.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Q4(i)(b) — once $$p, q, r$$ are found, how do you find $$s$$ (the \"outside both\" region)?", "answer": "All four regions sum to 1 (they partition the sample space): $$p + q + r + s = 1$$. So $$s = 1 - (p+q+r) = 1 - 10/25 = 15/25 = 3/5$$. Always include the \"outside\" region in your accounting — it's the simplest mark once the interior is done.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "S1 Jan 2023 Q4(ii) — when asked to show $$C$$ and $$D$$ cannot be mutually exclusive, what's the proof strategy?", "answer": "Proof by contradiction:\n- Step 1: Assume $$C, D$$ are mutually exclusive.\n- Step 2: Then $$P(C \\cup D) = P(C) + P(D)$$, and since $$P(C \\cup D) \\le 1$$, you must have $$P(C) + P(D) \\le 1$$.\n- Step 3: Show by algebra that $$P(C) + P(D) > 1$$ always.\n- Step 4: Contradiction — conclude $$C, D$$ cannot be mutually exclusive.\n\nThe crucial conceptual unlock: mutual exclusivity *forces* an upper bound of 1 on the sum of probabilities. Violating that bound kills mutual exclusivity.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Q4(ii) — what is the algebraic trick for showing $$\\frac{x}{x+5} + \\frac{5}{x} > 1$$ for all positive $$x$$?", "answer": "Combine over a common denominator $$x(x+5)$$:\n$$\\frac{x^2 + 5(x+5)}{x(x+5)} = \\frac{x^2 + 5x + 25}{x^2 + 5x}$$\n\nThen split the numerator: $$\\frac{(x^2 + 5x) + 25}{x^2 + 5x} = 1 + \\frac{25}{x^2 + 5x}$$.\n\nFor $$x > 0$$, $$x^2 + 5x > 0$$, so the fraction is positive — sum is strictly $$> 1$$. The \"$$\\frac{N + k}{N} = 1 + \\frac{k}{N}$$\" decomposition makes the inequality structural rather than requiring a quadratic inequality argument.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Why does mutual exclusivity imply $$P(C) + P(D) \\le 1$$, and what would violate the implication mean physically?", "answer": "Mutual exclusivity means $$C \\cap D = \\emptyset$$, so $$P(C \\cup D) = P(C) + P(D)$$. But $$C \\cup D$$ is still an event, so $$P(C \\cup D) \\le 1$$. Combined: $$P(C) + P(D) \\le 1$$. Violating this means $$C$$ and $$D$$ \"use up\" more than 100% of probability mass, which is only possible if they overlap — i.e., they can't be disjoint.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "S1 Jan 2023 Q5(b) — to find $$Q_3$$ of a normal distribution $$N(\\mu, \\sigma^2)$$, what specific $$z$$-value must you memorise (it's not directly in the tables)?", "answer": "$$z = 0.6745$$ for $$Q_3$$ (and $$-0.6745$$ for $$Q_1$$). This is $$\\Phi^{-1}(0.75)$$ — the standard normal value below which 75% of probability mass lies. The standard table gives $$\\Phi(z)$$ for $$z$$, so you can verify $$\\Phi(0.67) \\approx 0.7486$$ and $$\\Phi(0.68) \\approx 0.7517$$ — the interpolated value $$0.6745$$ is what examiners expect. Using $$0.67$$ alone loses precision and downstream marks in Q5(d).", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "Why must you carry full precision (e.g., $$z = 0.6745$$, not 0.67) through the early parts of Q5, even if the final answer is rounded?", "answer": "Q5(c) computes $$1.5 \\times \\text{IQR}$$ which amplifies rounding errors; Q5(d) requires a specific 3-decimal-place answer (0.993). Rounding $$z$$ to 0.67 propagates errors that prevent you from \"showing\" exactly $$0.993$$ — you'd get 0.992 or 0.994 and lose the show-that marks. Rule: round only at the *final* answer, not intermediate steps.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Q5(d) — when a question says \"using standardisation, show that $$P(\\text{not outlier}) = 0.993$$\", what work must you explicitly display?", "answer": "\"Using standardisation\" demands you show the $$Z$$-values explicitly:\n+ Compute $$Z_{\\text{upper}} = (5.5792 - 4.5)/0.4 = 2.698$$\n+ Compute $$Z_{\\text{lower}} = (3.4208 - 4.5)/0.4 = -2.698$$\n+ Look up $$\\Phi(2.70) = 0.9965$$ and $$\\Phi(-2.70) = 0.0035$$\n+ Subtract: $$0.9965 - 0.0035 = 0.9930$$\n\nDon't just state the answer — the mark scheme rewards each transformation. \"Show that\" with explicit method specified means show the method.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Conceptually, why are the outlier limits in Q5 symmetric around $$\\mu = 4.5$$ and at $$z = \\pm 2.698$$?", "answer": "Because the quartiles of a normal are symmetric around $$\\mu$$ at $$\\pm 0.6745\\sigma$$, the IQR is $$2 \\times 0.6745\\sigma = 1.349\\sigma$$, and $$1.5 \\times \\text{IQR} = 2.0235\\sigma$$. Outlier limits are then $$Q_3 + 1.5\\,\\text{IQR}$$ and $$Q_1 - 1.5\\,\\text{IQR}$$, which sit at $$\\mu \\pm (0.6745 + 2.0235)\\sigma = \\mu \\pm 2.698\\sigma$$. This $$\\pm 2.698$$ is universal for any normal — a sanity check.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Q5(e) — given \"this housefly is not an outlier\", what's the crucial intersection step before computing $$P(L > 5 \\mid \\text{not outlier})$$?", "answer": "The event $$L > 5$$ must be *intersected* with the \"not outlier\" band $$3.4208 < L < 5.5792$$. So the actual numerator event is $$5 < L < 5.5792$$, NOT $$L > 5$$. The conditioning band caps $$L$$ at the upper outlier limit. Forgetting this gives the wrong numerator and the most common conditional-normal error.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "Why is Q5(e) *not* an inverse normal problem despite involving probabilities and quartile-like cutoffs?", "answer": "Inverse normal goes from probability → $$z$$ (find the value below which $$p$$ lies). Q5(e) goes from values → probability (compute the conditional probability of a given interval). The cutoff $$L = 5$$ and band $$3.4208 < L < 5.5792$$ are *given* — you just standardise and use the table forward. The conditioning is handled by dividing two forward probabilities, not by inverse-normal manipulation.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Q5(e) — once you have $$P(5 < L < 5.5792) = 0.1021$$ and $$P(\\text{not outlier}) = 0.993$$, how do you assemble the final answer?", "answer": "Apply the conditional formula directly:\n$$P(L > 5 \\mid \\text{not outlier}) = \\frac{P((L > 5) \\cap \\text{not outlier})}{P(\\text{not outlier})} = \\frac{0.1021}{0.993} \\approx 0.103$$\n\nRe-use $$P(\\text{not outlier}) = 0.993$$ from part (d) — don't recompute. The chain of dependence between parts is part of the design.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "What's the diagnostic for spotting when a \"conditional probability\" question requires intersecting events versus when the conditioning event is a superset?", "answer": "Look at the conditioning event $$B$$ and the event of interest $$A$$:\n+ If $$A \\subset B$$ (e.g., \"all green\" given \"all same\"), then $$A \\cap B = A$$ and you can use $$P(A)/P(B)$$ directly.\n+ If $$A \\not\\subset B$$ (e.g., \"$$L > 5$$\" given \"not outlier\"), you must compute $$A \\cap B$$ explicitly — here, $$5 < L < 5.5792$$.\n\nAlways sketch a number line or Venn diagram to test subset before plugging in.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "S1 Jan 2023 Q6(a) — what three components must every regression gradient interpretation include?", "answer": "+ The numerical gradient (e.g., 2.72)\n+ The *units* of both variables (grams of sugar dissolved per °C increase)\n+ The qualifier \"on average\" or \"approximately\"\n\nExample: \"For every 1°C increase in temperature, the maximum weight of sugar dissolved in 100g of water increases by approximately 2.72 grams, on average.\" Omitting units or \"on average\" loses the mark.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Q6(c) — when an estimate from a regression line falls *outside* the original data range, what's the single magic word the examiner wants in your answer?", "answer": "**Extrapolation**. The structure of the answer is: identify the data range ($$10 \\le x \\le 80$$), note that the requested value (90°C) lies outside this range, label this as extrapolation, conclude that the estimate is unreliable because there's no evidence the linear relationship continues outside the observed range. Strong PMCC does NOT license extrapolation — that's a common confusion to avoid.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "Q6(d) — if a PMCC question appears to be missing $$\\sum x$$ and $$\\sum xy$$, how do you reconstruct them from the regression line? (2 steps)", "answer": "- Step 1: $$\\bar{y} = \\sum y / n$$ is directly computable. Use $$\\bar{y} = a + b\\bar{x}$$ (the line passes through the means) to recover $$\\bar{x}$$, then $$\\sum x = n\\bar{x}$$.\n- Step 2: Use $$b = S_{xy}/S_{xx}$$ to recover $$S_{xy} = b \\times S_{xx}$$, bypassing the need for $$\\sum xy$$ directly.\n\nThis recovery trick works whenever the regression line is known — you don't need every summary statistic if you have the line equation.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "What are the three definitional formulas for $$S_{xx}$$, $$S_{yy}$$, $$S_{xy}$$, and what do they represent conceptually?", "answer": "+ $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$ — total variation in $$x$$ (sum of squared deviations from $$\\bar{x}$$)\n+ $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$ — total variation in $$y$$\n+ $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\ const SK='s1_paper_jan2023';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
