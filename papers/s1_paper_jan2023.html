normal one?", "answer": "- Step 1: Inverse normal = given a probability, find the $$L$$ or $$z$$ value (i.e. solve $$\\Phi(z) = p$$).\n- Step 2: Direct normal = given an $$L$$ value, find a probability. This is what's needed here: the bounds 5 and 5.58 are *given*, and you're computing the probability of the band.\n- Step 3: The conditioning step just rescales by $$P(B)$$ at the end — it doesn't change the kind of normal computation.\n\nMisconception probe: don't reach for inverse normal whenever conditional probability appears.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "In a regression line $$y = a + bx$$, how do you interpret the gradient $$b$$ in context, and what three elements must your answer contain?", "answer": "- Step 1: For every **1 unit increase in $$x$$** (with its units, e.g. 1 °C), $$y$$ **increases by $$b$$** (with units, e.g. grams).\n- Step 2: Add the phrase **\"on average\"** — regression describes the mean relationship, not a deterministic one.\n- Step 3: For $$y = 151.2 + 2.72x$$: \"For every 1 °C increase in temperature, the maximum weight of sugar dissolving in 100 g of water increases by approximately 2.72 g, on average.\"\n\nThree elements: units on $$x$$, units on $$y$$, \"on average\".", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "Why is using a regression line to predict at $$x = 90$$ unreliable when the data ranges only over $$10 \\le x \\le 80$$?", "answer": "- Step 1: This is **extrapolation** — predicting outside the range of the observed data.\n- Step 2: The linear model was fitted to the observed range; there is no evidence the relationship stays linear (or even continues at all) beyond it. Sugar solubility may plateau, decline, or behave erratically near saturation.\n- Step 3: A high $$r$$ within the data range does *not* license extrapolation — it only certifies fit *inside* the observed values.\n\nMagic word for the mark: **extrapolation**.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "State the formulae for $$S_{xx}, S_{yy}, S_{xy}$$, $$r$$, and the regression gradient $$b$$, and explain how they connect.", "answer": "- Step 1: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$, $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$, $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$.\n- Step 2: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$ — Pearson's product-moment correlation coefficient, dimensionless, in $$[-1, 1]$$.\n- Step 3: Regression gradient $$b = \\frac{S_{xy}}{S_{xx}}$$ and intercept $$a = \\bar y - b\\bar x$$.\n\nInsight: $$S_{xx}$$ is essentially $$n \\cdot \\text{Var}(x)$$ without dividing — they're \"uncentred\" sums. The line passes through $$(\\bar x, \\bar y)$$, which is the key recovery tool.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "If a PMCC problem appears to be missing $$\\sum x$$ or $$\\sum xy$$ from the summary statistics, how can you recover them from the regression line $$y = a + bx$$? (3 steps)", "answer": "- Step 1: Use $$\\bar y = a + b\\bar x$$. Since $$\\bar y = \\frac{\\sum y}{n}$$ is known, solve for $$\\bar x$$ and hence $$\\sum x = n\\bar x$$.\n- Step 2: Use $$b = \\frac{S_{xy}}{S_{xx}}$$. Once $$S_{xx}$$ is computed, recover $$S_{xy} = b \\cdot S_{xx}$$.\n- Step 3: From $$S_{xy}$$ you can back-solve to $$\\sum xy = S_{xy} + \\frac{(\\sum x)(\\sum y)}{n}$$ if needed.\n\nTakeaway: the regression line is a *constraint* that lets you recover missing summary statistics — never get stuck for that reason alone.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "When discussing the suitability of a linear model given a PMCC value and a scatter diagram, what two pieces of evidence must you cite?", "answer": "- Step 1: **PMCC value**: e.g. $$r = 0.988$$ is very close to 1, indicating a strong positive linear correlation.\n- Step 2: **Scatter diagram features**: points lie close to a straight line, with no obvious curvature, fanning, or outliers.\n- Step 3: Conclusion: \"A linear regression model is suitable *within the observed range*\". Citing only one piece of evidence loses a mark.\n\nReminder: the conclusion mark is contingent on both — examiners specifically want the data and the visual checked against each other.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "Why must the regression-line-of-$$y$$-on-$$x$$ pass through the point $$(\\bar x, \\bar y)$$?", "answer": "- Step 1: The least-squares line minimises $$\\sum (y_i - a - bx_i)^2$$. Setting the partial derivative with respect to $$a$$ to zero gives $$\\sum (y_i - a - bx_i) = 0$$.\n- Step 2: Dividing by $$n$$: $$\\bar y - a - b\\bar x = 0$$, i.e. $$\\bar y = a + b\\bar x$$.\n- Step 3: So $$(\\bar x, \\bar y)$$ satisfies the line equation — it's a free identity used to recover means from the line.\n\nThis is *why* the recovery trick in Q35 works.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Conceptually contrast Q2(d) and Q5(e): what shared structure underlies both, and what's the key skill?", "answer": "- Step 1: Both are conditional probabilities $$P(A \\mid B)$$ where conditioning *restricts the sample space*.\n- Step 2: In Q2(d), the condition \"all same colour\" restricts to two paths (GGG or BBB). In Q5(e), \"not an outlier\" restricts $$L$$ to the band $$(3.42, 5.58)$$.\n- Step 3: Key skill: **intersect $$A$$ with $$B$$ explicitly before computing the numerator**. In Q2(d) this is automatic ($$A \\subset B$$); in Q5(e) it caps the upper end of $$L$$.\n\nThe common error in both: ignoring the restriction and computing $$P(A)$$ alone.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "Quick exercise — for $$X$$ taking values 1, 2, 3 with probabilities $$a, 0.5, 0.5-a$$, what is $$E(X)$$ and what is the valid range for $$a$$? (3 steps)", "answer": "- Step 1: $$E(X) = 1 \\cdot a + 2(0.5) + 3(0.5 - a) = a + 1 + 1.5 - 3a = 2.5 - 2a$$.\n- Step 2: Probabilities sum to $$a + 0.5 + 0.5 - a = 1$$ ✓ (automatic). Validity: $$a \\ge 0$$ and $$0.5 - a \\ge 0$$, so $$0 \\le a \\le 0.5$$.\n- Step 3: Range of $$E(X)$$: at $$a=0$$, $$E(X)=2.5$$; at $$a=0.5$$, $$E(X)=1.5$$. So $$1.5 \\le E(X) \\le 2.5$$.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Quick exercise — for $$L \\sim N(10, 2^2)$$, estimate $$P(L > 12)$$ without a calculator. (3 steps)", "answer": "- Step 1: Standardise: $$z = \\frac{12 - 10}{2} = 1$$.\n- Step 2: $$P(Z > 1) = 1 - \\Phi(1) \\approx 1 - 0.8413 = 0.1587$$.\n- Step 3: Conceptual sanity: $$P(Z > 1) \\approx 16\\%$$ — the famous \"one standard deviation above the mean\" tail. Memorise this.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Quick exercise — a histogram has frequency density 2.4 on a class of width 5. What is the frequency of that class? What does that conceptually mean?", "answer": "- Step 1: Frequency $$= \\text{density} \\times \\text{width} = 2.4 \\times 5 = 12$$.\n- Step 2: It means 12 observations fall into the class, and they are spread (on average) such that there's \"2.4 of them per unit of $$x$$\".\n- Step 3: This density allows fair comparison with classes of different widths — a class of width 10 with frequency density 2.4 would have $$2.4 \\times 10 = 24$$ observations, but the *concentration* is the same.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Quick exercise — given $$P(A) = 0.4$$, $$P(B) = 0.7$$, can $$A$$ and $$B$$ be mutually exclusive?", "answer": "- Step 1: Mutual exclusivity requires $$P(A) + P(B) \\le 1$$.\n- Step 2: Here $$P(A) + P(B) = 1.1 > 1$$.\n- Step 3: So $$A$$ and $$B$$ cannot be mutually exclusive — in fact $$P(A \\cap B) \\ge 0.1$$ from inclusion-exclusion.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "Quick exercise — the regression line $$y = 3 + 2x$$ predicts $$y = 23$$ at $$x = 10$$. If the data ranged $$1 \\le x \\le 8$$, comment on this prediction.", "answer": "- Step 1: $$x = 10$$ lies outside the observed range $$[1, 8]$$.\n- Step 2: Prediction is **extrapolation** — there's no evidence the linear relationship continues past $$x = 8$$.\n- Step 3: So the predicted $$y = 23$$ is unreliable, even if the in-range fit (and any $$r$$) is excellent.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "What's the symmetric difference $$A \\triangle B$$ expressed in two equivalent algebraic forms, and which is more useful in a Venn problem?", "answer": "- Step 1: Form 1 (definition): $$A \\triangle B = (A \\cap B') \\cup (A' \\cap B)$$ — \"exactly one of $$A$$ or $$B$$\".\n- Step 2: Form 2 (probability): $$P(A \\triangle B) = P(A) + P(B) - 2P(A \\cap B)$$.\n- Step 3: Form 1 is more useful in a Venn problem because it maps directly to regions $$p + r$$. Form 2 is more useful when you need to *solve* for $$P(A \\cap B)$$ given the others.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "When a problem says \"find the probability that two events are different colours/types\" in a tree diagram, what's the universal structural trick?", "answer": "- Step 1: Identify the two complementary paths: first-A-then-B, and first-B-then-A.\n- Step 2: These are disjoint, so $$P(\\text{different}) = P(\\text{AB}) + P(\\text{BA})$$.\n- Step 3: Alternative: $$P(\\text{different}) = 1 - P(\\text{same colour}) = 1 - [P(\\text{AA}) + P(\\text{BB})]$$. Both are valid — pick whichever has fewer paths.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Explain why $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar t^2}$$ uses class midpoints in $$\\sum ft^2$$, and what error this introduces.", "answer": "- Step 1: We don't know individual observation values — only that they lie in each class. The midpoint is the best representative for a uniform-spread assumption.\n- Step 2: $$\\sum ft^2 \\approx \\sum (\\text{sum of squared values in class})$$ — an approximation, not exact.\n- Step 3: The error comes from collapsing within-class variation. If a class has high spread internally, the true $$\\sigma$$ is higher than the grouped estimate — this is **Sheppard's correction** territory, but for IAL we accept the midpoint approximation.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "What is the conceptual difference between \"find the quartile of $$L$$\" (continuous normal) and \"find the quartile of grouped data via interpolation\"?", "answer": "- Step 1: Normal continuous: use $$z = \\pm 0.6745$$, then $$Q = \\mu \\pm 0.6745\\sigma$$. The formula uses the underlying distribution's parameters directly.\n- Step 2: Grouped data via interpolation: build a cumulative-frequency table, locate the class containing position $$\\frac{n}{4}$$, then linearly interpolate inside that class.\n- Step 3: Why different? Normal data have a known closed-form distribution; grouped data is empirical with no parametric form, so we approximate using piecewise-uniform assumptions within classes.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "Why does the conditional probability formula $$P(A \\mid B) = P(A) / P(B)$$ hold *only when $$A \\subset B$$*?", "answer": "- Step 1: General formula: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$.\n- Step 2: If $$A \\subset B$$, then every outcome in $$A$$ is automatically in $$B$$, so $$A \\cap B = A$$ and $$P(A \\cap B) = P(A)$$.\n- Step 3: So $$P(A \\mid B) = \\frac{P(A)}{P(B)}$$ — the simplification *requires* $$A \\subset B$$. In Q5(e), this fails: $$\\{L > 5\\}$$ is *not* a subset of $$\\{3.42 < L < 5.58\\}$$, so you must compute the intersection explicitly.\n\nThis is exactly the trap in Q5(e) vs Q2(d).", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "What's the pedagogical \"pattern\" of a typical IAL S1 paper, based on this 2023 paper's structure?", "answer": "- Step 1: One grouped-data descriptive question (Q1) testing histograms, mean, sd, and interpolation.\n- Step 2: One combinatorial probability problem with a twist like transfers or sampling without replacement (Q2).\n- Step 3: One discrete RV variance question with a parameter leading to a quadratic (Q3).\n- Step 4: One Venn / set theory question, often with a proof element (Q4).\n- Step 5: One meaty normal distribution sequence ending in conditional probability (Q5).\n- Step 6: One regression/correlation question testing interpretation, extrapolation, and PMCC (Q6).\n\nRecognising this template lets you anticipate which formulae to have ready before reading.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "What three skill-blocks should you drill to convert this kind of S1 paper from \"scary\" to \"procedural\"?", "answer": "- Step 1: **Recomputing the sample space when it changes** — marble transfers (Q2) and conditional probability with capped intervals (Q5(e)).\n- Step 2: **Handling proofs and constraint checks rigorously** — variance quadratics (Q3(c)) and mutual exclusivity proofs (Q4(ii)).\n- Step 3: **Executing standard formula sequences cleanly** — interpolation (Q1(e)), standardisation (Q5(d)), PMCC reconstruction (Q6(d)).\n\nDrilling these three blocks attacks the high-leverage error modes in S1.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}], "count": 50}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "In a histogram, why must you read frequencies as bar *area* rather than bar *height*, and what does this mean for reconstructing missing class frequencies? (3 steps)", "answer": "- Step 1: Histogram bars represent **frequency density**, not frequency directly. The vertical axis is $$\\text{f.d.} = \\frac{f}{\\text{class width}}$$, so a tall narrow bar can have the same frequency as a short wide one.\n- Step 2: To get the frequency of any class you must compute $$f = \\text{f.d.} \\times \\text{class width}$$ — i.e. the **area** of the bar.\n+ For unequal class widths (like 5–10 width 5, 18–25 width 7, 25–40 width 15) reading \"height = frequency\" gives wildly wrong answers.\n- Step 3: To reconstruct, use a class whose frequency you already know to calibrate the f.d. scale, then multiply each unknown bar's height by its width.\n\nTakeaway: histograms encode frequency in area, never height — this is the whole reason f.d. exists.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "For grouped data on an IAL paper, which positional rule do you use for $$Q_1$$ — $$\\frac{n}{4}$$ or $$\\frac{n+1}{4}$$ — and why does the distinction matter?", "answer": "For grouped (continuous) data you use **$$\\frac{n}{4}$$ directly** — e.g. with $$n=100$$ you locate the $$25$$th value, not the $$25.25$$th. The $$\\frac{n+1}{4}$$ rule is reserved for *discrete* small data sets where you're picking out an actual ordered value. With grouped data the values are treated as a continuum spread uniformly within each class, so there is no \"the 25th observation\" — you just interpolate at the position $$\\frac{n}{4}$$. Mixing the rules is a common slip that shifts the interpolation by a fraction of a class and loses a mark.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "State the linear interpolation formula for the $$k$$th quartile of grouped data, and explain conceptually what each ingredient represents. (3 steps)", "answer": "- Step 1: The formula is $$Q_k = L + \\frac{\\tfrac{kn}{4} - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$.\n- Step 2: Each piece has a geometric meaning:\n+ $$L$$ = lower boundary of the class containing the quartile (where you \"start counting from\")\n+ $$\\tfrac{kn}{4} - F_{\\text{before}}$$ = how many more observations you need *after* climbing up to $$L$$\n+ $$f_{\\text{class}}$$ = how many observations live in that class (the \"density\"/denominator)\n+ $$w$$ = width of the class (the horizontal distance available)\n- Step 3: Conceptually you're assuming uniform spread inside the class and walking horizontally from $$L$$ by the fraction of the class you need.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "When computing a quartile from grouped data, after locating the correct class, what does the **denominator** of the interpolation fraction need to be — the class frequency or the cumulative frequency? Why does this trip students up?", "answer": "The denominator is the **class frequency** $$f_{\\text{class}}$$ — the number of observations in *that one class only*. Students confuse it with the running cumulative total because they've just computed a cumulative table to *locate* the class. The cumulative total tells you *which* class houses the quartile; the class frequency tells you *how thickly* observations are packed inside that class so you know how far to walk horizontally per observation. Using cumulative would compress your walk to almost nothing and give a quartile barely above $$L$$.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "A class spans 14–18 minutes with frequency 24. Without doing the full calculation, sketch the logic for estimating how many people took less than 16 minutes, and what assumption underlies it. (3 steps)", "answer": "- Step 1: 16 sits exactly halfway through the interval $$[14, 18]$$ since $$\\frac{16-14}{18-14} = \\tfrac{1}{2}$$.\n- Step 2: We **assume uniform spread** of observations within the class (the linear-interpolation assumption).\n- Step 3: So half of the 24 — i.e. 12 — fall below 16. Add to the cumulative count up to 14 (which is 10 + 16 = 26) ⇒ 38 people below 16.\n\nInsight: estimating \"below a value\" inside a class is the same arithmetic as interpolating a quartile — it's just the linear-uniform assumption applied to a chosen position.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "For grouped data, how do you compute the midpoint of a class like 18–25, and why is this midpoint used in the mean formula? (2 steps)", "answer": "- Step 1: Midpoint = $$\\frac{\\text{lower boundary} + \\text{upper boundary}}{2} = \\frac{18+25}{2} = 21.5$$.\n- Step 2: We don't know individual values — only the class each falls into. The midpoint is our best symmetric guess: under a uniform-spread assumption, the *average* of values in the class is the midpoint. Then $$\\bar t = \\frac{\\sum f \\cdot \\text{midpoint}}{n}$$ approximates the true mean.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "What is the formula for the standard deviation of grouped data in terms of $$\\sum ft$$ and $$\\sum ft^2$$, and why does it have that structure?", "answer": "$$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar t^{\\,2}}$$. This is the frequency-weighted version of the identity $$\\text{Var}(X) = E(X^2) - (E(X))^2$$. The term $$\\frac{\\sum ft^2}{n}$$ is the weighted average of squared midpoints (an estimate of $$E(T^2)$$), and $$\\bar t^{\\,2}$$ is the square of the sample mean. Subtracting gives the average squared deviation around the mean — i.e. the variance — and taking the square root gives the std dev in the original units (minutes).", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "After computing $$\\frac{\\sum ft^2}{n} - \\bar t^{\\,2}$$ on an exam, what's the single most common slip that loses a mark in part (d) of a std-dev question?", "answer": "Forgetting to take the **square root** — students report the variance as the std dev. The formula gives $$\\sigma^2$$ before the root; the unit check helps: variance is in minutes², std dev is in minutes. A second slip is rounding $$\\bar t$$ too early before squaring it (e.g. squaring 19.7 instead of 19.68), which inflates the subtracted term and makes $$\\sigma$$ too small.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "In a tree diagram where a marble is drawn from bag X, placed in bag Y, then a second from X is also placed in Y, and finally one is drawn from Y — what are the three totals at each draw and why do they change?", "answer": "- Step 1: Draw 1 from X: total 9 (X starts with 5G + 4B).\n- Step 2: Draw 2 from X: total 8 — X lost one marble that has been transferred to Y. Composition depends on the colour drawn first.\n- Step 3: Draw 3 from Y: total **13**, not 11. Y started with 6+5 = 11 but has *gained* two transferred marbles. The classic slip is forgetting these additions and keeping Y at 11.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Why is $$P(G_3)$$ — the probability the third draw (from bag Y) is green — *path-dependent*, and what specific values does it take? (3 steps)", "answer": "- Step 1: After two transfers from X to Y, Y's composition depends on *which colours* came across.\n- Step 2: The three cases for Y after transfers:\n+ Path GG → Y is 8G/5B, so $$P(G_3) = \\tfrac{8}{13}$$\n+ Path GB or BG → Y is 7G/6B, so $$P(G_3) = \\tfrac{7}{13}$$\n+ Path BB → Y is 6G/7B, so $$P(G_3) = \\tfrac{6}{13}$$\n- Step 3: You cannot use a single \"$$P(G_3)$$\" across the tree — each branch has its own number. Locking in one value collapses the tree incorrectly.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "For three-marble \"all same colour\" problems with transfers between bags, which branches of the tree actually contribute, and why does this simplify the calculation? (2 steps)", "answer": "- Step 1: \"All three same colour\" splits into two disjoint events: all green (path must be $$GGG$$) and all blue (path must be $$BBB$$). Mixed-colour paths cannot satisfy the constraint regardless of the third draw.\n- Step 2: So only the GG → G branch and the BB → B branch contribute. You don't need the GB and BG branches at all — they exist on the tree but contribute zero to \"all same\". This is why these questions are tractable despite the tree having many branches.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "When asked \"given all three marbles are the same colour, find P(all green)\", what conditional probability identity simplifies this, and why does the intersection collapse? (3 steps)", "answer": "- Step 1: Write $$P(\\text{all G} \\mid \\text{all same}) = \\frac{P(\\text{all G} \\cap \\text{all same})}{P(\\text{all same})}$$.\n- Step 2: \"All green\" is a strict subset of \"all same colour\" (all green ⊂ all same). So $$\\text{all G} \\cap \\text{all same} = \\text{all G}$$.\n- Step 3: The expression collapses to $$\\frac{P(\\text{all green})}{P(\\text{all same})}$$ — two numbers you already computed. The conditioning rescales the GG-branch probability against the total \"same-colour\" probability.\n\nInsight: whenever event $$A \\subset B$$, the conditional $$P(A\\mid B) = P(A)/P(B)$$ — no separate intersection calculation needed.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "For a discrete RV with $$P(X=2)=a$$, $$P(X=3)=0.4$$, $$P(X=4)=0.6-a$$, what are the *two* validity conditions on $$a$$, and which one is the binding constraint? (3 steps)", "answer": "- Step 1: Sum to 1: $$a + 0.4 + (0.6-a) = 1$$ holds automatically — this gives no constraint.\n- Step 2: Each probability must lie in $$[0,1]$$:\n+ $$a \\ge 0$$\n+ $$0.6 - a \\ge 0 \\Rightarrow a \\le 0.6$$\n- Step 3: Combined: $$0 \\le a \\le 0.6$$. Both upper and lower bounds are tight — this is the constraint that must be cited when solving for $$a$$ later, especially after a quadratic where one root may fall outside.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "When computing $$E(X)$$ for a discrete RV parameterised by $$a$$, why is the result always linear in $$a$$, and what does this linearity tell you about the range of $$E(X)$$? (2 steps)", "answer": "- Step 1: $$E(X) = \\sum x \\cdot P(X=x)$$ is a *linear combination* of the probabilities. Since each probability is itself linear (or constant) in $$a$$, $$E(X)$$ comes out linear too — e.g. $$E(X) = 3.6 - 2a$$.\n- Step 2: A linear function over an interval $$[0, 0.6]$$ attains its max and min at the endpoints. So plug in $$a=0$$ and $$a=0.6$$ to get the extremes, no calculus needed. The range is just $$[2.4, 3.6]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "Why does the variance equation for a discrete RV typically lead to a **quadratic** in the parameter, even though $$E(X)$$ was linear? (2 steps)", "answer": "- Step 1: Variance uses $$\\text{Var}(X) = E(X^2) - (E(X))^2$$. Here $$E(X^2)$$ is linear in $$a$$ (sum of $$x^2 \\cdot P$$, and $$P$$ is linear in $$a$$).\n- Step 2: But $$(E(X))^2$$ squares a linear expression, producing $$a^2$$. Subtracting gives an equation with both $$a^2$$ and $$a$$ terms — a quadratic. Setting it equal to a given variance produces (in general) two candidate values of $$a$$.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "When expanding $$\\text{Var}(X) = E(X^2) - (E(X))^2$$ with $$E(X) = 3.6 - 2a$$, what's the textbook sign-error trap and how do you avoid it? (3 steps)", "answer": "- Step 1: First expand $$(3.6 - 2a)^2 = 12.96 - 14.4a + 4a^2$$ **as a complete bracket**, separately, before subtracting.\n- Step 2: Then write the full subtraction with the bracket visible: $$\\text{Var}(X) = (13.2 - 12a) - (12.96 - 14.4a + 4a^2)$$.\n- Step 3: Distribute the minus through *every* term: $$= 13.2 - 12a - 12.96 + 14.4a - 4a^2$$. The trap is forgetting to flip the sign on the $$-14.4a$$ term inside the bracket — students often write $$-14.4a$$ instead of $$+14.4a$$ after distribution.\n\nRule: bracket first, expand inside, then distribute the minus uniformly.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "After solving the quadratic from the variance equation and getting two roots for $$a$$, why must you *still* perform a check before stating the final answer?", "answer": "Because not every algebraic root is a valid probability. The constraint $$0 \\le a \\le 0.6$$ comes from requiring each $$P(X=x_i) \\in [0,1]$$. Examiners regularly rig the question so one root falls outside (e.g. $$a = -0.1$$ or $$a = 0.8$$) — that root must be discarded with explicit reasoning, and the constraint check itself carries a mark. Even when both roots happen to be valid (as here, $$a=0.2$$ and $$a=0.4$$), you should *write* \"both satisfy $$0 \\le a \\le 0.6$$\" to bank the mark.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "In a Venn diagram with two events, label the four regions $$p, q, r, s$$ corresponding to $$A$$-only, $$A\\cap B$$, $$B$$-only, and neither. What three sums must you be able to write down from $$P(A)$$, $$P(B)$$, and the symmetric difference? (3 steps)", "answer": "- Step 1: $$P(A) = p + q$$ (everything inside $$A$$ = $$A$$-only plus the overlap).\n- Step 2: $$P(B) = q + r$$ (mirror argument).\n- Step 3: $$P(A\\triangle B) = P[(A\\cap B') \\cup (A'\\cap B)] = p + r$$ — the symmetric difference is \"in exactly one of them\", i.e. the two crescents excluding the overlap $$q$$.\n\nBonus: the fourth equation $$p + q + r + s = 1$$ extracts $$s$$ once the others are known.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Why does adding the three equations $$P(A) = p+q$$, $$P(B) = q+r$$, $$P(A\\triangle B) = p+r$$ collapse so cleanly to $$2p + 2q + 2r$$? (2 steps)", "answer": "- Step 1: Each of $$p, q, r$$ appears in *exactly two* of the three equations. Listing: $$p$$ in (A) and (sym diff); $$q$$ in (A) and (B); $$r$$ in (B) and (sym diff).\n- Step 2: So summing gives every variable doubled — i.e. $$2p + 2q + 2r$$. The trick is recognising the symmetric arrangement: each pairwise sum hits two variables, and three such equations cover every pair exactly once.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "What is the **symmetric difference** of two events $$A$$ and $$B$$ in plain language, and what is its probability in terms of $$P(A)$$, $$P(B)$$, $$P(A\\cap B)$$?", "answer": "The symmetric difference $$A \\triangle B = (A\\cap B') \\cup (A'\\cap B)$$ is \"in $$A$$ or $$B$$ but not both\" — i.e. exactly one of the two events occurs. Its probability is $$P(A\\triangle B) = P(A) + P(B) - 2P(A\\cap B)$$. The $$-2P(A\\cap B)$$ removes the overlap *twice*: once because it's not in \"A only\" and once because it's not in \"B only\". Equivalently, it equals $$P(A\\cup B) - P(A\\cap B)$$, which is the union minus the overlap.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Two events $$C$$ and $$D$$ are mutually exclusive. What inequality must $$P(C) + P(D)$$ satisfy, and how does this become a tool for *disproving* mutual exclusivity? (3 steps)", "answer": "- Step 1: Mutual exclusivity ⇒ $$P(C\\cap D) = 0$$ ⇒ $$P(C \\cup D) = P(C) + P(D)$$.\n- Step 2: Any probability satisfies $$P(C\\cup D) \\le 1$$, so combined: $$P(C) + P(D) \\le 1$$ is **necessary** for mutual exclusivity.\n- Step 3: Contrapositive: if you can show $$P(C) + P(D) > 1$$ for all permissible parameter values, mutual exclusivity is impossible. This is the \"contradiction lever\" the exam wants you to pull.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "To show $$\\frac{x}{x+5} + \\frac{5}{x} > 1$$ for all $$x > 0$$, what algebraic manipulation makes the inequality obvious without quadratic inequality machinery? (3 steps)", "answer": "- Step 1: Combine over common denominator $$x(x+5)$$: $$\\frac{x^2 + 5(x+5)}{x(x+5)} = \\frac{x^2 + 5x + 25}{x^2 + 5x}$$.\n- Step 2: Notice the numerator is the denominator plus 25: $$\\frac{(x^2 + 5x) + 25}{x^2 + 5x} = 1 + \\frac{25}{x^2+5x}$$.\n- Step 3: For $$x > 0$$, $$x^2 + 5x > 0$$, so the added fraction is strictly positive. Hence the whole expression is strictly greater than 1, for *every* positive $$x$$ — no quadratic inequality needed.\n\nInsight: rewriting $$\\frac{N+k}{N} = 1 + \\frac{k}{N}$$ is a general trick whenever the numerator differs from the denominator by a constant.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "For a normal RV $$L \\sim N(4.5, 0.4^2)$$, what is the structure of any computation of $$P(L < c)$$ via standardisation? (3 steps)", "answer": "- Step 1: Compute the $$z$$-score: $$z = \\frac{c - \\mu}{\\sigma}$$. This converts the original variable into the standard normal.\n- Step 2: Look up $$\\Phi(z) = P(Z < z)$$ in the table, using symmetry if $$z < 0$$: $$P(Z < -z_0) = 1 - \\Phi(z_0)$$.\n- Step 3: Read off the probability. The whole process is just a coordinate change — you're not changing the probability, just expressing the threshold in std-dev units.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "What is the special $$z$$-value associated with the quartiles of any normal distribution, and why is it worth memorising exactly?", "answer": "$$z = \\pm 0.6745$$ — positive for $$Q_3$$ (where $$\\Phi(z) = 0.75$$) and negative for $$Q_1$$ (where $$\\Phi(z) = 0.25$$). It's worth memorising because it isn't directly tabulated in obvious form — the table jumps in steps of 0.01 and $$\\Phi(0.67) = 0.7486$$, $$\\Phi(0.68) = 0.7517$$, so you'd interpolate. Exam mark schemes expect $$0.6745$$ exactly, and using $$0.67$$ throws off downstream calculations like outlier limits and the \"show that 0.993\" target.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "The IQR-based outlier rule says a value is an outlier if it lies above $$Q_3 + 1.5\\,\\text{IQR}$$ or below $$Q_1 - 1.5\\,\\text{IQR}$$. For a normal distribution, what is the approximate *probability* of being an outlier, and why does this come out to about 0.7%? (3 steps)", "answer": "- Step 1: For a normal, $$Q_3 - Q_1 = 2 \\times 0.6745\\,\\sigma \\approx 1.349\\,\\sigma$$, so $$1.5\\,\\text{IQR} \\approx 2.0235\\,\\sigma$$.\n- Step 2: The outlier limits sit at $$\\mu \\pm (0.6745 + 2.0235)\\sigma = \\mu \\pm 2.698\\sigma$$.\n- Step 3: $$P(|Z| > 2.698) \\approx 2(1 - 0.9965) = 0.007$$. So **roughly 0.7%** of a normal population are flagged as outliers by Tukey's rule — i.e. $$P(\\text{not outlier}) \\approx 0.993$$.\n\nTakeaway: the \"0.993\" target isn't a coincidence — it falls straight out of the normal-quartile $$z$$ of 0.6745.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "When asked to \"show by standardisation that $$P(\\text{not outlier}) = 0.993$$\", what is the clean three-line method examiners expect? (3 steps)", "answer": "- Step 1: State the not-outlier event in $$L$$-coordinates: $$\\{Q_1 - 1.5\\,\\text{IQR} < L < Q_3 + 1.5\\,\\text{IQR}\\}$$ — e.g. $$\\{3.42 < L < 5.58\\}$$.\n- Step 2: Standardise each limit: $$z = \\pm 2.70$$ (after rounding).\n- Step 3: Compute $$P(-2.70 < Z < 2.70) = \\Phi(2.70) - \\Phi(-2.70) = 0.9965 - 0.0035 = 0.9930$$.\n\nThere is no \"shortcut property\" — the exam wants the explicit $$z$$-values and table lookups visible.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Why is the conditional probability $$P(L > 5 \\mid \\text{not an outlier})$$ **not** equal to $$\\frac{P(L > 5)}{P(\\text{not outlier})}$$? What is the subtle but mark-losing slip here? (3 steps)", "answer": "- Step 1: $$P(A\\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. The numerator requires the **intersection** $$A \\cap B$$.\n- Step 2: Here $$A = \\{L > 5\\}$$ and $$B = \\{3.42 < L < 5.58\\}$$ (the not-outlier band). The intersection is $$\\{5 < L < 5.58\\}$$, not $$\\{L > 5\\}$$.\n- Step 3: The not-outlier condition **caps** $$L$$ at 5.58 on the upper end — values above 5.58 are *outliers* and excluded. Forgetting this cap and using $$P(L > 5) = 0.1056$$ instead of $$P(5 < L < 5.58) \\approx 0.1021$$ is the single most common conditional-normal mistake.\n\nMental check: the conditioning event always reshapes the sample space — intersect first, *then* standardise.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "When the gradient of a regression line $$y = a + bx$$ is interpreted in context, what three components must appear in the sentence for full marks?", "answer": "The interpretation must include: (1) the **direction** of the unit change in $$x$$ (\"for every 1 °C increase in temperature...\"), (2) the **magnitude and units** of the resulting change in $$y$$ (\"...the maximum weight of sugar dissolved increases by 2.72 grams\"), and (3) the words **\"on average\"** or **\"approximately\"** to acknowledge it's a model estimate, not a deterministic law. Missing any of the three — especially units — loses the mark. Anchoring everything in the contextual variables, not just calling them \"$$x$$\" and \"$$y$$\", is also required.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "When using a regression line to predict $$y$$ at an $$x$$-value outside the original data range, what is the technical term for this, and why is the prediction generally unreliable? (3 steps)", "answer": "- Step 1: This is **extrapolation** — using the model beyond the range of the data on which it was fitted.\n- Step 2: The linear relationship has only been demonstrated to hold for the observed $$x$$-range (e.g. $$10 \\le x \\le 80$$). There is no evidence the same pattern continues outside it.\n- Step 3: Physical or behavioural effects may kick in beyond the range — e.g. sugar solubility may plateau or non-linear effects emerge. So the extrapolated prediction has no warranted reliability, regardless of how strong $$r$$ is inside the data range.\n\nThe magic word for these reliability questions is **\"extrapolation\"**.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Does a high correlation coefficient $$r \\approx 1$$ justify using the regression line to predict outside the data range? Why or why not?", "answer": "No. A high $$r$$ only tells you the linear model fits **within the observed range** — it says nothing about behaviour outside it. Predictions outside the data range are extrapolations whose reliability depends on the (unverified) assumption that the same linear relationship continues to hold. The system might saturate, change regime, or simply have never been tested there. Confusing \"high $$r$$ → trustworthy extrapolation\" is a classic error; the right takeaway is \"high $$r$$ + within-range prediction → reliable; high $$r$$ + extrapolation → still potentially unreliable\".", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Define $$S_{xx}$$, $$S_{yy}$$, and $$S_{xy}$$ in terms of raw sums, and state how the PMCC and regression gradient are built from them.", "answer": "- Step 1: The corrected sums of squares and products are:\n+ $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$\n+ $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$\n+ $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$\n- Step 2: PMCC: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx}\\,S_{yy}}}$$ — measures linear association on a $$[-1, 1]$$ scale.\n- Step 3: Regression gradient: $$b = \\frac{S_{xy}}{S_{xx}}$$, intercept $$a = \\bar y - b\\bar x$$ (so the line always passes through $$(\\bar x, \\bar y)$$).", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "If you've been given a regression line $$y = a + bx$$ and the sum $$\\sum y$$ but **not** $$\\sum x$$, how can you recover $$\\bar x$$ (and hence $$\\sum x$$)? (3 steps)", "answer": "- Step 1: The regression line passes through the centroid $$(\\bar x, \\bar y)$$. So $$\\bar y = a + b\\bar x$$.\n- Step 2: Compute $$\\bar y = \\frac{\\sum y}{n}$$, then rearrange: $$\\bar x = \\frac{\\bar y - a}{b}$$.\n- Step 3: Multiply by $$n$$ to get $$\\sum x$$. This recovery trick is invaluable when a summary stat appears to be missing — the regression line itself encodes that information.\n\nBonus: similarly, knowing $$b$$ and $$S_{xx}$$ recovers $$S_{xy} = b \\cdot S_{xx}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "In a \"show that $$r = 0.988$$\" question with several summary stats given, what is the systematic layout that maximises method marks and minimises rounding error? (3 steps)", "answer": "- Step 1: Compute $$S_{xx}$$, $$S_{yy}$$, $$S_{xy}$$ as **three separate labelled lines**, each in the form \"raw sum minus correction term\".\n- Step 2: Carry full precision (don't round to 3 s.f. mid-calculation). $$S_{yy}$$ involves $$\\frac{(\\sum y)^2}{n}$$ which is often a long decimal — keep it.\n- Step 3: Only at the end compute $$r = \\frac{S_{xy}}{\\sqrt{S_{xx}\\,S_{yy}}}$$ and round to the requested precision.\n\nThe trap: trying to mash $$r$$ into a single formula line loses intermediate marks and propagates rounding error.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "When discussing the **suitability of a linear regression model**, an exam question often asks you to refer to *both* the scatter diagram and the PMCC. Why are both required, and what could each reveal that the other doesn't? (3 steps)", "answer": "- Step 1: PMCC ($$r$$) is a *single number* summarising linear association strength. High $$|r|$$ suggests linearity but doesn't rule out subtle curvature or outliers.\n- Step 2: A scatter plot reveals the *shape* — curves, fanning (heteroscedasticity), clusters, or isolated points — that $$r$$ can hide. A perfectly curved relationship can still yield $$r$$ near 1 if monotonic.\n- Step 3: Citing both gives complementary evidence: $$r = 0.988$$ says \"strong linear association numerically\", and \"points lie close to a straight line with no curvature\" says \"no pattern violations visible\". Mentioning only one loses a mark.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "Across multiple S1 contexts (marble transfers, normal outliers), the recurring trap is forgetting that the **sample space changes** under conditioning. State the general rule and how to apply it. (3 steps)", "answer": "- Step 1: When you condition on an event $$B$$, the new sample space is $$B$$ itself — outcomes outside $$B$$ no longer exist.\n- Step 2: To compute $$P(A\\mid B)$$, you must restrict $$A$$ to $$A\\cap B$$ before computing — never carry over the unconditional $$A$$.\n+ Marble example: drawing from Y after two transfers — Y has 13 marbles, not 11. The transfer changes the \"sample space\" of the third draw.\n+ Normal outlier example: $$P(L > 5 \\mid \\text{not outlier})$$ — the event $$L > 5$$ must be intersected with the not-outlier band $$\\{L < 5.58\\}$$.\n- Step 3: Always re-draw the picture (tree, number line) and re-state the new sample space *before* writing the probability.\n\nThis is the single most-tested skill across S1 conditional probability questions.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "**Mini-exercise.** A grouped data set has classes with frequencies $$5, 10, 20, 15$$ (cumulative $$5, 15, 35, 50$$). $$Q_1$$ falls in which class, and roughly where in that class? (2 steps)", "answer": "- Step 1: $$\\frac{n}{4} = \\frac{50}{4} = 12.5$$. Looking at cumulative totals, 12.5 falls between 5 and 15 — i.e. inside the **second class** (frequency 10).\n- Step 2: Inside that class, we need 12.5 − 5 = 7.5 more observations out of the 10 in the class — so $$Q_1$$ sits at $$L + \\frac{7.5}{10} \\times w = L + 0.75w$$, i.e. three-quarters of the way through.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "**Mini-exercise.** $$X$$ takes values 1 and 2 with $$P(X=1) = p$$ and $$P(X=2) = 1-p$$. Mentally write down $$E(X)$$ and $$\\text{Var}(X)$$ in terms of $$p$$. (3 steps)", "answer": "- Step 1: $$E(X) = 1\\cdot p + 2(1-p) = 2 - p$$.\n- Step 2: $$E(X^2) = 1\\cdot p + 4(1-p) = 4 - 3p$$.\n- Step 3: $$\\text{Var}(X) = (4 - 3p) - (2-p)^2 = 4 - 3p - (4 - 4p + p^2) = p - p^2 = p(1-p)$$.\n\nInsight: any 2-point RV has variance $$p(1-p)$$ scaled by the range squared — recognisable as the Bernoulli pattern.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "**Mini-exercise.** Events $$A$$ and $$B$$ have $$P(A) = 0.6$$ and $$P(B) = 0.7$$. Can they be mutually exclusive? Why or why not?", "answer": "No. Mutual exclusivity requires $$P(A) + P(B) \\le 1$$, but here $$P(A) + P(B) = 1.3 > 1$$. If they were mutually exclusive, $$P(A\\cup B) = 1.3$$, which is impossible since no probability exceeds 1. So the events must overlap — in fact $$P(A\\cap B) \\ge 0.3$$ at minimum (by inclusion-exclusion). This is the same logical pattern as the Q4(ii) proof, just with numbers.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "**Mini-exercise.** For $$L \\sim N(10, 2^2)$$, what value of $$L$$ is the upper quartile? Use the memorised $$z$$ value.", "answer": "Use $$z_{Q_3} = 0.6745$$ and the standardisation $$L = \\mu + z\\sigma$$. So $$Q_3 = 10 + 0.6745 \\times 2 = 10 + 1.349 = 11.35$$ (approx). The lower quartile mirrors: $$Q_1 = 10 - 1.349 = 8.65$$. The IQR is $$2 \\times 1.349 = 2.698$$ — i.e. about $$1.35\\sigma$$ on each side of the mean.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "**Mini-exercise.** A regression line $$y = 5 + 3x$$ was fitted to data with $$10 \\le x \\le 50$$ and $$r = 0.95$$. Estimate $$y$$ at $$x = 100$$ and comment on reliability. (2 steps)", "answer": "- Step 1: $$y = 5 + 3(100) = 305$$.\n- Step 2: This is **extrapolation** since $$x = 100$$ lies far outside the fitted range $$[10, 50]$$. Despite the high $$r = 0.95$$ indicating a strong linear fit *within* the data range, there's no evidence the linear pattern continues to $$x = 100$$. The estimate of 305 is unreliable.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}], "count": 40}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 13263, "out_tokens": 20910, "reasoning_chars": 2274, "cost_eur": 0.0801, "elapsed_s": 406, "content_chars": 64293}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 13263, "out_tokens": 4670, "reasoning_chars": 5609, "cost_eur": 0.0278, "elapsed_s": 1391, "content_chars": 10321}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 13263, "out_tokens": 20050, "reasoning_chars": 4934, "cost_eur": 0.0774, "elapsed_s": 430, "content_chars": 61393}, "kimi_1": {"run": 1, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.7, "in_tokens": 12912, "out_tokens": 28596, "reasoning_chars": 58342, "cost_eur": 0.1313, "elapsed_s": 291, "content_chars": 46640}, "kimi_2": {"run": 2, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.8, "in_tokens": 12932, "out_tokens": 29347, "reasoning_chars": 69605, "cost_eur": 0.1345, "elapsed_s": 335, "content_chars": 41993}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 12565, "out_tokens": 9850, "reasoning_chars": 2178, "cost_eur": 0.0123, "elapsed_s": 82, "content_chars": 29449}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 12565, "out_tokens": 10000, "reasoning_chars": 2707, "cost_eur": 0.0124, "elapsed_s": 78, "content_chars": 28126}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 19018, "out_tokens": 18118, "reasoning_chars": 0, "cost_eur": 1.5126, "elapsed_s": 236, "content_chars": 38161}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 19018, "out_tokens": 15532, "reasoning_chars": 0, "cost_eur": 1.3342, "elapsed_s": 211, "content_chars": 33443}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 13806, "out_tokens": 3259, "reasoning_chars": 3718, "cost_eur": 0.0061, "elapsed_s": 62, "content_chars": 6718}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.75, "in_tokens": 13806, "out_tokens": 3622, "reasoning_chars": 2837, "cost_eur": 0.0065, "elapsed_s": 67, "content_chars": 8934}, "qwen_3": {"run": 3, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 13806, "out_tokens": 3894, "reasoning_chars": 3969, "cost_eur": 0.0068, "elapsed_s": 72, "content_chars": 10144}, "qwen_4": {"run": 4, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.85, "in_tokens": 13806, "out_tokens": 3225, "reasoning_chars": 4736, "cost_eur": 0.0061, "elapsed_s": 63, "content_chars": 6837}}};
const SK='s1_paper_jan2023';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}
