e working* — every algebraic step must be visible. You cannot jump from the setup to the answer in one line. The mark scheme assigns marks for specific intermediate results (e.g., computing $$S_{xx}$$, then $$S_{yy}$$, then $$S_{xy}$$, then $$r$$).\n- Step 2: In contrast, a \"find\" question typically awards marks for the method and the final answer. For \"show that,\" the answer is given, so the marks are *entirely* for the working. Omitting a step (like not showing the z-values in standardisation) forfeits those marks even if your final number is correct.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "In a marble-transfer problem, the first draw from bag X (9 marbles) changes the composition for the second draw (8 marbles). What principle does this illustrate, and how should you label your tree diagram to avoid errors? (2 steps)", "answer": "- Step 1: This illustrates sampling *without replacement* — the denominator decreases and the numerator adjusts depending on what was removed. Each draw is conditional on all previous draws.\n- Step 2: Label every branch of the tree with the *current* composition at that point. For example, after drawing green first, write \"4G, 4B remain\" next to the second-draw branches. After drawing blue first, write \"5G, 3B remain.\" This forces you to recompute the conditional probabilities correctly rather than copying from the first draw.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "When computing $$P(\\text{all three same colour})$$ in Q2, why is keeping a common denominator (936) throughout the calculation advantageous? (2 steps)", "answer": "- Step 1: A common denominator lets you add the \"all green\" and \"all blue\" probabilities directly: $$P(\\text{same}) = \\frac{160}{936} + \\frac{84}{936} = \\frac{244}{936}$$, without any fraction arithmetic errors.\n- Step 2: More importantly, it makes the conditional probability in part (d) collapse cleanly: $$P(\\text{all G} \\mid \\text{same}) = \\frac{160/936}{244/936} = \\frac{160}{244}$$. The denominator 936 cancels immediately, avoiding decimal approximations that could accumulate error.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "For the normal distribution $$L \\sim N(4.5, 0.4^2)$$, the outlier limits are at approximately 3.42 and 5.58. What sanity check does the symmetry of the z-values provide? (2 steps)", "answer": "- Step 1: Standardising both limits gives $$z_{\\text{upper}} = \\frac{5.5792 - 4.5}{0.4} \\approx 2.698$$ and $$z_{\\text{lower}} = \\frac{3.4208 - 4.5}{0.4} \\approx -2.698$$. The z-values are equal in magnitude and opposite in sign.\n- Step 2: This symmetry is expected because the normal distribution is symmetric about its mean, and the outlier fence distances are equal ($$1.5 \\times \\text{IQR}$$ above and below). If your z-values weren't symmetric, it would indicate an arithmetic error in computing the quartiles or the outlier limits.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": true}, {"question": "In Q5(d), why is the approach \"compute $$Q_1$$ and $$Q_3$$ of the standard normal, apply the outlier formula in z-space, then transform back\" overcomplicated compared to what the question actually asks? (2 steps)", "answer": "- Step 1: That approach requires computing the IQR in z-space ($$2 \\times 0.6745 = 1.349$$), then the outlier limits in z-space ($$\\pm 0.6745 \\pm 1.5 \\times 1.349$$), then looking up the tail probabilities. It works but introduces more steps and more rounding.\n- Step 2: The question says \"using standardisation\" — it wants you to standardise the *already-computed* outlier limits from part (c) directly. This is fewer steps, less rounding, and exactly what the mark scheme expects. Don't re-derive what you've already found.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": true}, {"question": "When should you use exact fractions vs. decimals in S1 probability calculations, and what is the safest default? (2 steps)", "answer": "- Step 1: Use exact fractions throughout the working, especially in tree-diagram problems where probabilities multiply across branches. Decimal approximations at intermediate steps accumulate rounding error.\n- Step 2: Give final answers as exact fractions or to 3 significant figures (whichever the question specifies). The safest default: work in fractions, convert to 3 s.f. decimals only at the final answer step. In Q2, the conditional probability $$\\frac{160}{244} = \\frac{40}{61} \\approx 0.656$$ is cleaner as a fraction that simplifies.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "What is the symmetric difference identity $$P(A \\triangle B) = P(A) + P(B) - 2P(A \\cap B)$$, and when is it useful? (2 steps)", "answer": "- Step 1: The symmetric difference $$A \\triangle B = (A \\cap B') \\cup (A' \\cap B)$$ consists of elements in exactly one of A or B. Its probability can be expressed as $$P(A) + P(B) - 2P(A \\cap B)$$, because $$P(A) + P(B)$$ double-counts the intersection.\n- Step 2: This is useful in Venn diagram problems where you're given the symmetric difference probability and need to set up equations. In Q4(i), recognising that $$P(A \\triangle B) = p + r$$ directly gives you the third equation, without needing to invoke the general identity.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": true}, {"question": "When a question gives $$P(C) = \\frac{x}{x+5}$$ and $$P(D) = \\frac{5}{x}$$ with $$x$$ a positive constant, what can you immediately conclude about the range of each probability? (2 steps)", "answer": "- Step 1: For $$P(C) = \\frac{x}{x+5}$$: since $$x > 0$$, both numerator and denominator are positive, and the numerator is less than the denominator, so $$0 < P(C) < 1$$. As $$x \\to \\infty$$, $$P(C) \\to 1$$; as $$x \\to 0^+$$, $$P(C) \\to 0$$.\n- Step 2: For $$P(D) = \\frac{5}{x}$$: this must satisfy $$0 < \\frac{5}{x} \\le 1$$, which requires $$x \\ge 5$$. So the domain is actually $$x \\ge 5$$, not just $$x > 0$$. This additional constraint ensures $$P(D)$$ is a valid probability.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "In Q4(ii), after showing $$P(C) + P(D) = 1 + \\frac{25}{x^2 + 5x} > 1$$, why must you state the contradiction *in words*? (2 steps)", "answer": "- Step 1: The mark scheme awards a mark for the logical conclusion stated explicitly. Showing the algebra is necessary but not sufficient — you must connect it to the definition of mutual exclusivity and explain why the result is a contradiction.\n- Step 2: A model conclusion: \"But if C and D were mutually exclusive, then $$P(C) + P(D) = P(C \\cup D) \\le 1$$. Since $$P(C) + P(D) > 1$$ for all $$x > 0$$, this is a contradiction. Therefore C and D cannot be mutually exclusive.\" The words \"contradiction\" or \"therefore cannot be mutually exclusive\" must appear.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "When carrying precision through multi-step normal distribution calculations, what is the correct rounding strategy? (2 steps)", "answer": "- Step 1: Carry *full precision* (all displayed calculator digits) through all intermediate steps. Do not round z-values, quartiles, or outlier limits until the final answer.\n- Step 2: Round only the final answer to the required precision (usually 3 s.f. or 3 d.p. as specified). In Q5, rounding $$Q_3 = 4.7698$$ to 4.77 early would propagate error into the outlier limits and the conditional probability, potentially changing the final answer.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "What is the formula for $$S_{xy}$$ in terms of summary statistics, and what is its role in both the regression gradient and the PMCC? (2 steps)", "answer": "- Step 1: $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$. It measures the covariation of $$x$$ and $$y$$ — how much they vary together.\n- Step 2: It appears in two key formulas: the regression gradient $$b = \\frac{S_{xy}}{S_{xx}}$$ and the PMCC $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$. Knowing $$S_{xy}$$ unlocks both. This is why the recovery trick $$S_{xy} = b \\times S_{xx}$$ is so powerful — if you can compute $$S_{xx}$$ and the regression line is given, you have $$S_{xy}$$ and hence can find $$r$$.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "Synthesis — A question gives you a regression line $$y = a + bx$$, the values of $$n$$, $$\\sum y$$, $$\\sum y^2$$, and $$\\sum x^2$$, but not $$\\sum x$$ or $$\\sum xy$$. Outline the complete strategy to compute the PMCC. (4 steps)", "answer": "- Step 1: Compute $$\\bar{y} = \\frac{\\sum y}{n}$$. Use the regression line passing through $$(\\bar{x}, \\bar{y})$$: $$\\bar{y} = a + b\\bar{x}$$, so $$\\bar{x} = \\frac{\\bar{y} - a}{b}$$, then $$\\sum x = n\\bar{x}$$.\n- Step 2: Compute $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$ using the recovered $$\\sum x$$.\n- Step 3: Compute $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$ using the given $$\\sum y$$.\n- Step 4: Recover $$S_{xy} = b \\times S_{xx}$$ from the gradient, then compute $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "Synthesis — You encounter a conditional probability question involving a normal distribution, where the conditioning event restricts the variable to an interval. What is the systematic approach? (3 steps)", "answer": "- Step 1: Write down the conditional probability formula: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. Identify $$A$$ and $$B$$ explicitly.\n- Step 2: Compute the intersection $$A \\cap B$$ on the number line. This is where most errors occur — the intersection is *not* simply $$A$$. If $$A = \\{L > 5\\}$$ and $$B = \\{3.42 < L < 5.58\\}$$, then $$A \\cap B = \\{5 < L < 5.58\\}$$.\n- Step 3: Standardise the endpoints of the intersection interval, look up the normal table values, and compute $$P(A \\cap B)$$. Divide by $$P(B)$$ (which may have been computed in a previous part).", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": true}, {"question": "Synthesis — A discrete random variable has probabilities in terms of a parameter $$a$$, and you're asked to find the possible values of $$a$$ given $$\\text{Var}(X)$$. What is the complete systematic approach? (4 steps)", "answer": "- Step 1: Derive the validity constraint on $$a$$ from the requirement that all probabilities lie in $$[0, 1]$$. State this explicitly.\n- Step 2: Compute $$E(X) = \\sum x \\cdot P(X=x)$$ and $$E(X^2) = \\sum x^2 \\cdot P(X=x)$$, both in terms of $$a$$.\n- Step 3: Set up the variance equation $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$. Expand $$[E(X)]^2$$ on a separate line (bracket-then-expand), then substitute and simplify to a quadratic in $$a$$.\n- Step 4: Solve the quadratic, then check each root against the validity constraint from Step 1. Reject any invalid roots and state the conclusion explicitly.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": true}, {"question": "Edge case — What happens if both roots of the variance quadratic fall within the valid range, vs. one falling outside? How does the examiner exploit this? (2 steps)", "answer": "- Step 1: If both roots are valid (e.g., $$a = 0.2$$ and $$a = 0.4$$ both in $$[0, 0.6]$$), both are accepted answers — there are two possible distributions consistent with the given variance.\n- Step 2: Examiners often rig the problem so one root falls outside the valid range (e.g., $$a = -0.1$$), testing whether you perform the constraint check. A student who skips the check and lists both roots loses the mark. The constraint check is not optional — it is always worth a mark, whether or not it eliminates a root.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": true}, {"question": "Misconception probe — Why is it wrong to say \"if $$P(C) + P(D) > 1$$, then C and D are not independent\"? What is the correct conclusion? (2 steps)", "answer": "- Step 1: Independence is defined by $$P(C \\cap D) = P(C) \\cdot P(D)$$, not by the sum $$P(C) + P(D)$$. Two events can have $$P(C) + P(D) > 1$$ and still be independent (e.g., $$P(C) = 0.7$$, $$P(D) = 0.6$$, $$P(C \\cap D) = 0.42$$).\n- Step 2: The correct conclusion from $$P(C) + P(D) > 1$$ is that C and D cannot be *mutually exclusive* (because mutual exclusivity requires $$P(C) + P(D) = P(C \\cup D) \\le 1$$). Mutually exclusive ≠ independent — in fact, if both events have positive probability, mutual exclusivity and independence are incompatible.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": true}, {"question": "Simple exercise — A histogram class spans 20–30 with frequency density 3. What is the frequency of this class?", "answer": "Frequency = frequency density × class width = $$3 \\times (30 - 20) = 3 \\times 10 = 30$$. The key insight: you must multiply by the *width* (10), not read the height (3) directly as the frequency.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "Simple exercise — In a class 10–20 with frequency 40, how many observations would you estimate fall in the range 10–15?", "answer": "The fraction of the class width covered is $$\\frac{15 - 10}{20 - 10} = \\frac{5}{10} = \\frac{1}{2}$$. Assuming uniform distribution within the class: $$\\frac{1}{2} \\times 40 = 20$$ observations.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "Simple exercise — A bag has 3 red and 2 blue marbles. One is drawn and removed, then a second is drawn. What is $$P(\\text{both different colours})$$?", "answer": "$$P(R_1 B_2) + P(B_1 R_2) = \\frac{3}{5} \\times \\frac{2}{4} + \\frac{2}{5} \\times \\frac{3}{4} = \\frac{6}{20} + \\frac{6}{20} = \\frac{12}{20} = \\frac{3}{5}$$. The key point: after the first draw, the denominator drops to 4 and the numerator of the other colour stays the same (since a marble of one colour was removed).", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": false}, {"question": "Simple exercise — If $$P(A) = 0.7$$ and $$P(B) = 0.5$$, can A and B be mutually exclusive? Why or why not?", "answer": "No. If A and B were mutually exclusive, then $$P(A \\cup B) = P(A) + P(B) = 0.7 + 0.5 = 1.2 > 1$$, which is impossible since probabilities cannot exceed 1. Therefore A and B cannot be mutually exclusive. This is the same reasoning as Q4(ii) — the sum exceeding 1 is the contradiction.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": false}, {"question": "Simple exercise — $$X \\sim N(10, 4)$$. Standardise the value $$x = 14$$.", "answer": "$$Z = \\frac{x - \\mu}{\\sigma} = \\frac{14 - 10}{2} = \\frac{4}{2} = 2$$. Note: the variance is 4, so $$\\sigma = \\sqrt{4} = 2$$. A common mistake is using $$\\sigma = 4$$ (confusing variance with standard deviation).", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "Simple exercise — A regression line is $$y = 50 + 3x$$, where $$y$$ is profit (£) and $$x$$ is advertising spend (£00). Interpret the gradient.", "answer": "For every £100 increase in advertising spend, profit increases by approximately £3, on average. The key elements: (1) direction (increases), (2) units (£3 profit per £100 advertising), (3) \"on average.\" Note the unit conversion — $$x$$ is in hundreds of pounds, so a 1-unit increase in $$x$$ means £100 more advertising.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": false}, {"question": "What is the pitfall of confusing the variance parameter $$\\sigma^2$$ with the standard deviation $$\\sigma$$ when the normal distribution is written as $$N(\\mu, \\sigma^2)$$? (2 steps)", "answer": "- Step 1: The notation $$N(4.5, 0.4^2)$$ means $$\\mu = 4.5$$ and $$\\sigma^2 = 0.16$$, so $$\\sigma = 0.4$$. When standardising, you divide by $$\\sigma = 0.4$$, not by $$\\sigma^2 = 0.16$$.\n- Step 2: If the distribution were written as $$N(4.5, 0.16)$$, some students mistakenly use 0.16 as the standard deviation. Always check: is the second parameter the variance or the standard deviation? In Edexcel, $$N(\\mu, \\sigma^2)$$ notation means the second parameter is the *variance*.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": false}, {"question": "When should you use $$\\frac{n}{4}$$ vs. $$\\frac{n+1}{4}$$ for quartile positions, and what is the conceptual reason for the difference? (2 steps)", "answer": "- Step 1: Use $$\\frac{n}{4}$$ for *grouped/continuous data* (where linear interpolation assumes a uniform spread within each class). Use $$\\frac{n+1}{4}$$ for *discrete data* (where each data point is a distinct value and you're locating a position in an ordered list).\n- Step 2: The conceptual reason: for discrete data, the \"$$+1$$\" accounts for the fact that positions are between data points (like how the median of 4 values is at position 2.5, not 2). For grouped data, the data are treated as a continuous distribution within each class, so there's no such adjustment — the $$\\frac{n}{4}$$-th value is interpolated directly.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": true}, {"question": "Why must you always state answers with units in S1, and what are the common units that appear? (2 steps)", "answer": "- Step 1: Edexcel mark schemes require units for full marks. An answer like \"9.25\" without \"minutes\" can lose the final accuracy mark. Units connect the number to the real-world context.\n- Step 2: Common units: minutes (for times), mm or cm (for lengths), grams (for weights), °C (for temperatures), £ (for money). Check the question stem for the units and always include them in your final answer.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": false}, {"question": "In Q1(e), after computing $$Q_1 = 13.75$$ and being given $$Q_3 = 23$$, what is the IQR, and why is it a measure of spread rather than location? (2 steps)", "answer": "- Step 1: $$\\text{IQR} = Q_3 - Q_1 = 23 - 13.75 = 9.25$$ minutes.\n- Step 2: The IQR measures *spread* (how dispersed the data are) because it captures the width of the middle 50% of the distribution. Unlike the mean or median (which measure location/centre), the IQR doesn't tell you *where* the data are, but how *wide* the central portion is. It's resistant to outliers because it ignores the extreme 25% on each end.", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": true}, {"question": "What does it mean that the regression line of $$y$$ on $$x$$ minimises the sum of squared *vertical* residuals, and why does this matter for interpretation? (2 steps)", "answer": "- Step 1: The regression line of $$y$$ on $$x$$ is the line that minimises $$\\sum(y_i - \\hat{y}_i)^2$$ — the sum of squared vertical distances from each data point to the line. It is designed for *predicting y from x*.\n- Step 2: This matters because the regression line of $$y$$ on $$x$$ is *not* the same as the regression line of $$x$$ on $$y$$ (unless $$r = \\pm 1$$). You use the line of $$y$$ on $$x$$ when $$x$$ is the explanatory variable and $$y$$ is the response. Substituting an $$x$$-value to predict $$y$$ is valid; solving for $$x$$ given $$y$$ using the same line is *not* (you'd need the line of $$x$$ on $$y$$).", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": false}, {"question": "What is the difference between interpolation and extrapolation in the context of regression, and how does each affect reliability? (2 steps)", "answer": "- Step 1: **Interpolation** is predicting within the range of observed data (e.g., predicting at $$x = 50$$ when data span $$10 \\le x \\le 80$$). **Extrapolation** is predicting outside this range (e.g., at $$x = 90$$).\n- Step 2: Interpolation is generally reliable (the model is supported by data in that region). Extrapolation is unreliable because there's no evidence the relationship holds beyond the observed range — the process may behave differently. In exam answers, always use the word \"extrapolation\" when commenting on unreliability.", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": false}, {"question": "In Q5, the probability $$P(\\text{not outlier}) = 0.993$$ is used as the denominator in part (e). What principle allows you to reuse a result from a previous part? (2 steps)", "answer": "- Step 1: In multi-part questions, you may use results from earlier parts without re-deriving them, unless the question explicitly asks you to. The mark scheme assumes a progression: part (d) establishes $$P(N) = 0.993$$, and part (e) builds on it.\n- Step 2: If you couldn't do part (d), use the \"show that\" value (0.993) as given — it's guaranteed correct. Never leave the denominator blank or try to recompute it from scratch in part (e), as this wastes time and introduces rounding discrepancies.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": false}], "count": 70}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What is the trigger phrase that forces linear interpolation in grouped data quartiles? (Q1(e))", "answer": "- Step 1: Recognize when the question provides a frequency table and asks for quartiles.  \n- Step 2: Use the formula: $$Q = L + \\frac{\\frac{n}{4} - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$  \n+ L = lower boundary of the class containing the quartile  \n+ F_before = cumulative frequency before the class  \n+ f_class = frequency of the class  \n+ w = class width  \n- Step 3: Justify using n/4 instead of (n+1)/4 because it's grouped data (IAL S1 convention).  \n**Answer:** The trigger is finding quartiles from grouped data. Use the formula with n/4, not (n+1)/4.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why must bag Y have 13 marbles for the third draw in Q2(d)? (Q2)", "answer": "- Step 1: Bag Y starts with 6G and 5B (11 marbles).  \n- Step 2: Two marbles are transferred from X to Y. Each transfer adds 1 marble.  \n- Step 3: Total marbles in Y after transfers = 11 + 2 = 13.  \n+ Example: GG transfer → Y has 8G/5B (13 total).  \n+ Example: GB transfer → Y has 7G/6B (13 total).  \n**Answer:** Bag Y starts with 11 marbles. Two transfers add 2 marbles, making 13 total for the third draw.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why expand (3.6 - 2a)² carefully in Q3(c)? (Q3(c))", "answer": "- Step 1: Bracket the expression: (3.6 - 2a)² = 3.6² - 2×3.6×2a + (2a)².  \n- Step 2: Expand term-by-term:  \n+ 3.6² = 12.96  \n+ -2×3.6×2a = -14.4a  \n+ (2a)² = 4a²  \n- Step 3: Combine: 12.96 - 14.4a + 4a².  \n**Answer:** Avoid sign errors by expanding term-by-term. Distribute the minus sign only after squaring.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How to prove mutual exclusivity is impossible for Q4(ii)? (Q4(ii))", "answer": "- Step 1: Assume C and D are mutually exclusive → P(C ∩ D) = 0.  \n- Step 2: Then P(C ∪ D) = P(C) + P(D).  \n- Step 3: Show P(C) + P(D) > 1 using algebra:  \n+ Common denominator: x(x+5)  \n+ Numerator: x² + 5x + 25 > denominator → 1 + 25/(x²+5x) > 1  \n- Step 4: Contradiction since probabilities ≤ 1.  \n**Answer:** If P(C) + P(D) > 1, mutual exclusivity is impossible.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why use z = 0.6745 for quartiles in Q5(b)? (Q5(b))", "answer": "- Step 1: For normal distributions, Q1 and Q3 correspond to z = ±0.6745.  \n- Step 2: Use Φ(0.6745) = 0.75 (Q3) and Φ(-0.6745) = 0.25 (Q1).  \n- Step 3: Calculate Q3 = μ + 0.6745σ and Q1 = μ - 0.6745σ.  \n+ Example: μ = 4.5, σ = 0.4 → Q3 = 4.5 + 0.2698 = 4.77.  \n**Answer:** z = 0.6745 is the exact value for quartiles in the standard normal distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How to compute PMCC from regression line summary stats? (Q6(d))", "answer": "- Step 1: Calculate Sxx = Σx² - (Σx)²/n.  \n- Step 2: Calculate Syy = Σy² - (Σy)²/n.  \n- Step 3: Use regression gradient b = Sxy/Sxx → Sxy = b×Sxx.  \n- Step 4: Compute PMCC: r = Sxy / √(Sxx×Syy).  \n+ Example: Sxx = 5300, b = 2.72 → Sxy = 14416.  \n**Answer:** Use the regression gradient to find Sxy, then compute r = Sxy / √(Sxx×Syy).", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why is the estimate in Q6(b) unreliable? (Q6(b))", "answer": "- Step 1: The regression model is built for 10 ≤ x ≤ 80.  \n- Step 2: Predicting at x = 90 is extrapolation beyond the data range.  \n- Step 3: The linear relationship may not hold outside observed values.  \n+ Example: Sugar solubility might plateau at higher temperatures.  \n**Answer:** Extrapolation is unreliable because the linear trend may not extend beyond the data range.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How to handle conditional probability in Q5(e)? (Q5(e))", "answer": "- Step 1: Define event N = \"not outlier\" → 3.42 < L < 5.58.  \n- Step 2: Event A = \"L > 5\" → intersect with N to get 5 < L < 5.58.  \n- Step 3: Standardize both bounds: Z_lower = 1.25, Z_upper = 2.70.  \n- Step 4: Compute P(1.25 < Z < 2.70) = 0.9965 - 0.8944 = 0.1021.  \n- Step 5: Divide by P(N) = 0.993 → 0.1021/0.993 ≈ 0.103.  \n**Answer:** Intersect the event with the conditioning band before standardizing to avoid overestimating the probability.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}], "count": 8}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "When given a histogram of times taken to swim 500m, what's the first strategy to complete the frequency table? (3 steps)", "answer": "- Step 1: Calculate the frequency for each bar by multiplying frequency density by class width\n- Step 2: Use known frequencies (5-10: 10, 10-14: 16, 14-18: 24) to determine the frequency density scale\n- Step 3: Apply this scale to the remaining bars (18-25 and 25-40) to find their frequencies (28 and 22 respectively)\n\nThe key is recognizing that histogram frequencies = area = frequency density × class width. Once you establish the frequency density scale from the known values, you can apply it to find the missing frequencies.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "When estimating how many people took less than 16 minutes to swim 500m, what's the interpolation approach? (3 steps)", "answer": "- Step 1: Identify that 16 minutes falls in the 14-18 class interval\n- Step 2: Calculate the proportion of this class below 16 minutes: (16-14)/(18-14) = 0.5\n- Step 3: Calculate the number of people in this portion: 0.5 × 24 (frequency of this class) = 12\n\nAdd to this the frequencies from previous classes (10 + 16) to get the total of 38 people who took less than 16 minutes.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "When calculating the mean time from grouped data, what's the approach? (3 steps)", "answer": "- Step 1: Calculate class midpoints for each interval (7.5, 12, 16, 21.5, 32.5)\n- Step 2: Multiply each midpoint by the class frequency and sum: 7.5×10 + 12×16 + 16×24 + 21.5×28 + 32.5×22 = 1968\n- Step 3: Divide by total number of people: 1968/100 = 19.68 minutes\n\nThis gives the estimated mean time taken to swim 500m.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "When given Σft² = 41,033, how do you calculate the standard deviation? (3 steps)", "answer": "- Step 1: Start with the formula: σ = √[(Σft²/n) - x̄²]\n- Step 2: Plug in values: √[(41033/100) - 19.68²] = √[410.33 - 387.2024]\n- Step 3: Calculate result: √23.1276 ≈ 4.81 minutes\n\nThis gives the standard deviation of the times taken to swim 500m.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "When asked to estimate the IQR using linear interpolation, what's the approach? (3 steps)", "answer": "- Step 1: Locate the lower quartile class (n/4 = 25, which falls in 10-14 class)\n- Step 2: Apply interpolation formula: Q1 = 10 + (25-10)/16 × 4 = 13.75\n- Step 3: Use given Q3 = 23 and calculate IQR = Q3 - Q1 = 23 - 13.75 = 9.25 minutes\n\nThe key is recognizing that IQR = Q3 - Q1 and using linear interpolation for Q1 since Q3 is given.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "When marbles are transferred between bags, what's the first step in constructing the tree diagram? (3 steps)", "answer": "- Step 1: Start with initial probabilities from bag X: P(G1) = 5/9, P(B1) = 4/9\n- Step 2: Update probabilities for second draw based on first outcome: G then G = 4/8, G then B = 4/8, B then G = 5/8, B then B = 3/8\n- Step 3: Update bag Y's composition for third draw: GG adds 2G to 6G/5B, making 8G/5B; GB/BG adds 1G and 1B, making 7G/6B; BB adds 2B to make 6G/7B\n\nThe key is recognizing that each draw changes the probabilities for subsequent draws.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "When asked to find the probability that 2 marbles from bag X are of different colors, what's the approach? (3 steps)", "answer": "- Step 1: Identify two possible paths: green then blue (G1B2) or blue then green (B1G2)\n- Step 2: Calculate probabilities for each path: P(G1B2) = 5/9 × 4/8 = 20/72, P(B1G2) = 4/9 × 5/8 = 20/72\n- Step 3: Add probabilities: 20/72 + 20/72 = 40/72 = 5/9 ≈ 0.556\n\nThis gives the probability that the two marbles selected from bag X are of different colors.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "When finding the probability that all 3 marbles are the same color, what's the strategy? (3 steps)", "answer": "- Step 1: Identify two valid paths: GGG (must come from GG transfer) and BBB (must come from BB transfer)\n- Step 2: Calculate probabilities for each path: P(GGG) = 5/9 × 4/8 × 8/13 = 160/936, P(BBB) = 4/9 × 3/8 × 7/13 = 84/936\n- Step 3: Add probabilities: 160/936 + 84/936 = 244/936 = 61/234 ≈ 0.261\n\nThis gives the probability that all 3 marbles selected are the same color.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "When asked to find the probability that all marbles are green given they're all the same color, what's the approach? (3 steps)", "answer": "- Step 1: Recognize this is a conditional probability: P(all G | same color)\n- Step 2: Use formula: P(all G)/P(same color) = (160/936)/(244/936)\n- Step 3: Calculate result: 160/244 = 40/61 ≈ 0.656\n\nThis gives the probability that all marbles are green given they are all the same color.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "When working with a discrete random variable, how do you find E(X) in terms of a? (3 steps)", "answer": "- Step 1: Use formula E(X) = ΣxP(X=x) = 2a + 3(0.4) + 4(0.6-a)\n- Step 2: Simplify expression: 2a + 1.2 + 2.4 - 4a\n- Step 3: Combine like terms: 3.6 - 2a\n\nThis gives the expected value of X in terms of a: E(X) = 3.6 - 2a", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "When finding the range of possible values of E(X), what's the approach? (3 steps)", "answer": "- Step 1: Use constraint 0 ≤ a ≤ 0.6 from probability validity (each probability must be in [0,1])\n- Step 2: Evaluate E(X) at extremes of a: E(X) = 3.6 at a = 0, E(X) = 3.6 - 1.2 = 2.4 at a = 0.6\n- Step 3: Establish range: 2.4 ≤ E(X) ≤ 3.6\n\nThis gives the possible range of expected values based on the parameter a.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "When given Var(X) = 0.56, how do you find possible values of a? (7 steps)", "answer": "- Step 1: Calculate E(X²) = 4a + 9(0.4) + 16(0.6-a) = 13.2 - 12a\n- Step 2: Use variance identity: Var(X) = E(X²) - [E(X)]²\n- Step 3: Substitute values: 0.56 = (13.2 - 12a) - (3.6 - 2a)²\n- Step 4: Expand (3.6 - 2a)² = 12.96 - 14.4a + 4a²\n- Step 5: Substitute: 0.56 = 13.2 - 12a - 12.96 + 14.4a - 4a²\n- Step 6: Simplify: 4a² - 2.4a + 0.32 = 0 → a² - 0.6a + 0.08 = 0\n- Step 7: Solve quadratic: a = (0.6 ± √(0.36 - 0.32))/2 = 0.2 or 0.4\n\nBoth values (0.2 and 0.4) are valid since they satisfy 0 ≤ a ≤ 0.6.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "When working with Venn diagram probabilities, how do you show 2p + 2q + 2r = 4/5? (3 steps)", "answer": "- Step 1: Translate given probabilities: p + q = 7/25, q + r = 5/25, p + r = 8/25\n- Step 2: Add these equations: (p+q) + (q+r) + (p+r) = 2p + 2q + 2r = 20/25\n- Step 3: Simplify: 2p + 2q + 2r = 4/5 = 20/25 ✓\n\nThis demonstrates the required relationship among the Venn diagram probabilities.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "How do you find the individual values of p, q, r, and s in the Venn diagram? (3 steps)", "answer": "- Step 1: Divide the equation 2p + 2q + 2r = 4/5 by 2 to get p + q + r = 2/5 = 10/25\n- Step 2: Use p + q = 7/25 and q + r = 5/25 to find q = 2/25, then p = 5/25 = 1/5, r = 3/25\n- Step 3: Calculate s = 1 - (p + q + r) = 1 - 10/25 = 15/25 = 3/5\n\nThis gives the individual probabilities: p = 1/5, q = 2/25, r = 3/25, s = 3/5.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "How do you show that events C and D cannot be mutually exclusive? (3 steps)", "answer": "- Step 1: For mutually exclusive events, P(C ∪ D) = P(C) + P(D) ≤ 1\n- Step 2: Calculate P(C) + P(D) = x/(x+5) + 5/x = (x² + 5x + 25)/(x² + 5x) = 1 + 25/(x² + 5x)\n- Step 3: Since x > 0, the term 25/(x² + 5x) > 0, so P(C) + P(D) > 1, contradicting mutual exclusivity\n\nThis proves that C and D cannot be mutually exclusive.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "When calculating P(L < 3.86) for a normal distribution N(4.5, 0.4²), what's the approach? (3 steps)", "answer": "- Step 1: Standardize the value: z = (3.86 - 4.5)/0.4 = -1.6\n- Step 2: Use standard normal table: P(Z < -1.6) = 1 - P(Z < 1.6)\n- Step 3: Find value: 1 - 0.9452 = 0.0548\n\nThis gives the probability that a randomly selected housefly has a wing length of less than 3.86 mm.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "When finding quartiles for a normal distribution N(4.5, 0.4²), how do you proceed? (3 steps)", "answer": "- Step 1: Use z-values for quartiles: zQ3 = 0.6745, zQ1 = -0.6745\n- Step 2: Calculate Q3 = 4.5 + 0.6745 × 0.4 = 4.77 mm\n- Step 3: Calculate Q1 = 4.5 - 0.6745 × 0.4 = 4.23 mm\n\nThese give the upper and lower quartiles for the housefly wing length distribution.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "When calculating outlier limits for a normal distribution, what's the approach? (3 steps)", "answer": "- Step 1: Calculate IQR = Q3 - Q1 = 0.5396\n- Step 2: Multiply by 1.5: 1.5 × IQR = 0.8094\n- Step 3: Add to Q3 and subtract from Q1: upper = 4.77 + 0.8094 = 5.58 mm, lower = 4.23 - 0.8094 = 3.42 mm\n\nThese give the outlier limits for the housefly wing length distribution.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "How do you show that P(not outlier) ≈ 0.993 for a normal distribution? (3 steps)", "answer": "- Step 1: Standardize the outlier limits: z = (5.58 - 4.5)/0.4 = 2.70, z = (3.42 - 4.5)/0.4 = -2.70\n- Step 2: Use symmetry: P(-2.70 < Z < 2.70) = P(Z < 2.70) - P(Z < -2.70)\n- Step 3: Find values: 0.9965 - 0.0035 = 0.9930\n\nThis shows the probability that a housefly is not an outlier is approximately 0.993.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "When finding P(L > 5 | not outlier), what's the strategy? (3 steps)", "answer": "- Step 1: Recognize this is a conditional probability with restricted range: P(5 < L < 5.58) / P(not outlier)\n- Step 2: Standardize 5: z = (5 - 4.5)/0.4 = 1.25\n- Step 3: Calculate the probability: P(1.25 < Z < 2.70) = 0.9965 - 0.8944 = 0.1021 / 0.993 = 0.103\n\nThis gives the probability that a housefly has a wing length greater than 5 mm given it is not an outlier.", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": true}, {"question": "How do you interpret the gradient of the regression line y = 151.2 + 2.72x? (1 step)", "answer": "- Step 1: For every 1°C increase in temperature, the maximum weight of sugar that dissolves in 100g of water increases by 2.72 grams (on average)\n\nThis is the proper interpretation of the gradient in this regression model.", "source": "Qwen 3 ②", "_id": "qwen_2_20", "judge_pick": false}, {"question": "When estimating the maximum weight of sugar at 90°C, what's the approach? (2 steps)", "answer": "- Step 1: Substitute into the regression equation: y = 151.2 + 2.72 × 90\n- Step 2: Calculate result: y = 151.2 + 244.8 = 396 grams\n\nThis gives the estimated maximum weight of sugar that will dissolve in 100g of water at 90°C.", "source": "Qwen 3 ②", "_id": "qwen_2_21", "judge_pick": false}, {"question": "How do you assess the reliability of the estimate at 90°C? (2 steps)", "answer": "- Step 1: Recognize that 90°C is outside the data range (10 ≤ x ≤ 80)\n- Step 2: Conclude that this is extrapolation and the estimate is unreliable since there's no evidence the linear relationship continues beyond 80°C\n\nThis assessment shows understanding of regression model limitations.", "source": "Qwen 3 ②", "_id": "qwen_2_22", "judge_pick": false}, {"question": "When calculating the PMCC from summary statistics, what's the approach? (7 steps)", "answer": "- Step 1: Calculate ȳ = 3119/12 = 259.917\n- Step 2: Use regression line to find x̄ = (259.917 - 151.2)/2.72 = 40\n- Step 3: Calculate Sxx = 24500 - (480²)/12 = 5300\n- Step 4: Calculate Syy = 851093 - (3119²)/12 = 40412.917\n- Step 5: Calculate Sxy = b × Sxx = 2.72 × 5300 = 14416\n- Step 6: Calculate r = Sxy / √(Sxx × Syy) = 14416 / √(5300 × 40412.917)\n- Step 7: Calculate result: r = 14416 / 14635.5 = 0.988\n\nThis shows the product moment correlation coefficient is 0.988 to 3 decimal places.", "source": "Qwen 3 ②", "_id": "qwen_2_23", "judge_pick": false}, {"question": "How do you evaluate the suitability of a linear regression model? (2 steps)", "answer": "- Step 1: Note that PMCC r = 0.988 is very close to 1, indicating strong positive linear correlation\n- Step 2: Observe that scatter diagram should show points close to a straight line with no obvious curve or fanning\n\nBoth elements support the conclusion that a linear regression model is suitable for describing the relationship between temperature and sugar solubility within the observed range.", "source": "Qwen 3 ②", "_id": "qwen_2_24", "judge_pick": false}], "count": 25}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "In Q1(a) of S1 Jan 2023, you must complete the frequency table from the histogram. What is the key principle for reading frequencies from a histogram, and how do you calculate frequency from the bar? (2 steps)", "answer": "- Step 1: Frequency = area of the bar, NOT the height. The histogram shows frequency density on the vertical axis, where Frequency density = frequency ÷ class width.\n- Step 2: For each class, calculate $$f = \\text{frequency density} \\times \\text{class width}$$. For example, if frequency density = 2.5 and class width = 4, then f = 2.5 × 4 = 10.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "In Q1(c) of S1 Jan 2023, you need to estimate the mean from grouped data. What values must you calculate first, and what is the formula? (2 steps)", "answer": "- Step 1: Calculate the class midpoint for each interval using $$m = \\frac{\\text{lower boundary} + \\text{upper boundary}}{2}$$. For 5–10: m = 7.5; for 18–25: m = 21.5 (not 21).\n- Step 2: Compute $$\\bar{x} = \\frac{\\sum fm}{n}$$ where f is frequency and m is midpoint. Multiply each f by its midpoint, sum, then divide by total n.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "For Q1(e) of S1 Jan 2023, after finding Q1 = 13.75 and given Q3 = 23, how do you calculate the IQR? What is the final answer? (2 steps)", "answer": "- Step 1: Use the formula $$\\text{IQR} = Q_3 - Q_1$$. The question gives you Q3 = 23 directly to avoid interpolating the awkward 18–25 class.\n- Step 2: $$\\text{IQR} = 23 - 13.75 = 9.25$$ minutes. State the answer to appropriate precision with units.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "In Q2 of S1 Jan 2023, two marbles are transferred from bag X to bag Y, then a marble is drawn from bag Y. What is the MOST COMMON error students make with bag Y's total? (1 step)", "answer": "- Step 1: Students incorrectly keep bag Y at its original total (11 marbles) instead of recognizing that it now contains its original 11 PLUS the 2 transferred marbles = **13 marbles total** for the third draw. This error makes all third-draw probabilities wrong.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "In Q2(b) of S1 Jan 2023, you need P(the 2 marbles from X are different colours). What two paths must you consider, and why can't you use a single probability? (3 steps)", "answer": "- Step 1: The two paths are Green-then-Blue and Blue-then-Green: $$P(G_1B_2) + P(B_1G_2)$$.\n- Step 2: After the first draw, the composition of bag X changes (sampling without replacement), so recalculate: after G₁ there are 4G/4B (8 total); after B₁ there are 5G/3B (8 total).\n- Step 3: Compute: $$\\frac{5}{9} \\times \\frac{4}{8} + \\frac{4}{9} \\times \\frac{5}{8} = \\frac{20}{72} + \\frac{20}{72} = \\frac{40}{72} = \\frac{5}{9}$$.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "In Q2(a) of S1 Jan 2023, you need to complete the tree diagram. For the third draw from bag Y, what determines the probabilities, and why are there THREE different sets of branch probabilities? (3 steps)", "answer": "- Step 1: The probabilities for the third draw depend on what was transferred to Y in the first two draws — the numerator of P(G₃) is path-dependent.\n- Step 2: After GG transferred → Y has 8G/5B, so P(G₃) = 8/13.\n- Step 3: After GB or BG transferred → Y has 7G/6B, so P(G₃) = 7/13. After BB transferred → Y has 6G/7B, so P(G₃) = 6/13.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "In Q2(d) of S1 Jan 2023, given that all three marbles are the same colour, find P(all green). What is the conditional probability formula, and why is P(all green ∩ same) simply P(all green)? (2 steps)", "answer": "- Step 1: Use $$P(\\text{all G} \\mid \\text{same}) = \\frac{P(\\text{all G} \\cap \\text{same})}{P(\\text{same})}$$.\n- Step 2: Since \"all green\" is a subset of \"all same colour\" (all green implies all same), we have $$P(\\text{all G} \\cap \\text{same}) = P(\\text{all G})$$. The numerator simplifies to P(GGG) = 160/936, and denominator = 244/936, giving 160/244 = 40/61.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "In Q3(a) of S1 Jan 2023, find E(X) in terms of a. What is the formula for expected value of a discrete RV, and what common error leads to lost marks? (2 steps)", "answer": "- Step 1: Formula: $$E(X) = \\sum x \\cdot P(X=x) = 2a + 3(0.4) + 4(0.6-a) = 3.6 - 2a$$.\n- Step 2: Common error: using x values (2, 3, 4) directly without multiplying by their probabilities. Always write out the full sum with probabilities attached.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "In Q3(b) of S1 Jan 2023, what constraint must a satisfy, and how does this determine the range of E(X)? (2 steps)", "answer": "- Step 1: Probabilities must be valid: each probability must be between 0 and 1. From the table: a ≥ 0 and 0.6 - a ≥ 0, so $$0 \\le a \\le 0.6$$.\n- Step 2: Since E(X) = 3.6 - 2a is decreasing in a, maximum is at a = 0 giving E(X) = 3.6; minimum at a = 0.6 giving E(X) = 2.4. So $$2.4 \\le E(X) \\le 3.6$$.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "In Q3(c) of S1 Jan 2023, you need to solve for a given Var(X) = 0.56. What is the variance identity, and what is the CRITICAL technique for expanding (E(X))² to avoid sign errors? (3 steps)", "answer": "- Step 1: Use $$\\mathrm{Var}(X) = E(X^2) - [E(X)]^2$$. First find E(X²) = 4a + 9(0.4) + 16(0.6-a) = 13.2 - 12a.\n- Step 2: Substitute: 0.56 = (13.2 - 12a) - (3.6 - 2a)². Expand the squared term as a bracket FIRST: (3.6 - 2a)² = 12.96 - 14.4a + 4a².\n- Step 3: Then subtract the entire bracket: 0.56 = 13.2 - 12a - 12.96 + 14.4a - 4a². NEVER distribute the minus into individual terms before squaring.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "In Q3(c) of S1 Jan 2023, after deriving the quadratic 4a² - 2.4a + 0.32 = 0, what must you do BEFORE giving your final answer, and why does this matter? (2 steps)", "answer": "- Step 1: Solve the quadratic: a = (0.6 ± √(0.36 - 0.32))/2 = (0.6 ± 0.2)/2 = 0.4 or 0.2.\n- Step 2: CHECK against the constraint 0 ≤ a ≤ 0.6. Both 0.2 and 0.4 are valid, so both are answers. Many quadratic probability questions are rigged so one root falls outside the valid range — failing to check loses the final mark.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "In Q4(i)(a) of S1 Jan 2023, given P(A) = 7/25, P(B) = 1/5, and P[(A∩B') ∪ (A'∩B)] = 8/25, how do you \"show that 2p + 2q + 2r = 4/5\"? What is the key recognition? (2 steps)", "answer": "- Step 1: Recognise that (A∩B') ∪ (A'∩B) is the symmetric difference A △ B, which equals p + r (the \"only A\" plus \"only B\" regions).\n- Step 2: Add the three given equations: (p+q) + (q+r) + (p+r) = 2p + 2q + 2r = 7/25 + 5/25 + 8/25 = 20/25 = 4/5.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "In Q4(i)(b) of S1 Jan 2023, you have p+q = 7/25, q+r = 5/25, p+r = 8/25. How do you find q first, and then p, r, s? (3 steps)", "answer": "- Step 1: Divide the \"2p+2q+2r = 4/5\" result by 2 to get p+q+r = 10/25 = 2/5.\n- Step 2: Add P(A) + P(B): (p+q) + (q+r) = 7/25 + 5/25 = 12/25 = (p+q+r) + q, so q = 12/25 - 10/25 = 2/25.\n- Step 3: Then p = 7/25 - 2/25 = 5/25 = 1/5, r = 5/25 - 2/25 = 3/25, and s = 1 - (p+q+r+s) = 1 - (10/25 + 2/25) = 15/25 = 3/5.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In Q4(ii) of S1 Jan 2023, you must show C and D cannot be mutually exclusive given P(C) = x/(x+5) and P(D) = 5/x. What is the logical structure of the proof, and what algebraic trick makes the inequality obvious? (3 steps)", "answer": "- Step 1: If mutually exclusive, then P(C∪D) = P(C) + P(D) ≤ 1. Compute the sum: $$\\frac{x}{x+5} + \\frac{5}{x} = \\frac{x^2 + 5x + 25}{x(x+5)}$$.\n- Step 2: Notice numerator = denominator + 25: $$= \\frac{x(x+5) + 25}{x(x+5)} = 1 + \\frac{25}{x(x+5)}$$.\n- Step 3: Since x > 0, the fraction is positive, so sum > 1, violating the ≤ 1 requirement. Hence cannot be mutually exclusive.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In Q5(a) of S1 Jan 2023, find P(L < 3.86) where L ~ N(4.5, 0.4²). What is the standardisation formula, and what is the z-value? (2 steps)", "answer": "- Step 1: Standardise: $$Z = \\frac{X - \\mu}{\\sigma} = \\frac{3.86 - 4.5}{0.4} = \\frac{-0.64}{0.4} = -1.6$$.\n- Step 2: From tables: P(Z < -1.6) = 1 - P(Z < 1.6) = 1 - 0.9452 = 0.0548.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "In Q5(b) of S1 Jan 2023, find Q1 and Q3 for L ~ N(4.5, 0.4²). What z-value must you memorise for quartiles, and how do you apply it? (2 steps)", "answer": "- Step 1: Memorise: for Q3 (upper quartile), z = 0.6745 exactly (this is Φ⁻¹(0.75)). For Q1, z = -0.6745.\n- Step 2: Apply: Q3 = μ + zσ = 4.5 + 0.6745(0.4) = 4.77 mm; Q1 = 4.5 - 0.6745(0.4) = 4.23 mm.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "In Q5(c) of S1 Jan 2023, outlier limits are defined as values beyond Q3 + 1.5×IQR or below Q1 - 1.5×IQR. Given Q1 = 4.23 and Q3 = 4.77, what are the two limits? (2 steps)", "answer": "- Step 1: IQR = Q3 - Q1 = 0.54. 1.5 × IQR = 0.81.\n- Step 2: Upper limit = 4.77 + 0.81 = 5.58 mm. Lower limit = 4.23 - 0.81 = 3.42 mm.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "In Q5(d) of S1 Jan 2023, show that P(not outlier) = 0.993. What two z-values do you get when you standardise the outlier limits, and how do you use symmetry? (3 steps)", "answer": "- Step 1: Standardise the limits: Z_upper = (5.58 - 4.5)/0.4 = 2.70; Z_lower = (3.42 - 4.5)/0.4 = -2.70.\n- Step 2: By symmetry: P(-2.70 < Z < 2.70) = P(Z < 2.70) - P(Z < -2.70) = 0.9965 - 0.0035.\n- Step 3: = 0.9930. The question says \"using standardisation\" — you must show the z-values, not just state the answer.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "In Q5(e) of S1 Jan 2023, given the fly is NOT an outlier, find P(L > 5 | not outlier). What is the MOST COMMON error students make, and what is the correct numerator? (3 steps)", "answer": "- Step 1: The conditioning event \"not outlier\" caps the interval at 5.58 mm on the upper end. So L > 5 ∩ not outlier = {5 < L < 5.58}, NOT simply L > 5.\n- Step 2: Standardise: Z_lower = (5 - 4.5)/0.4 = 1.25; Z_upper = 2.70.\n- Step 3: P(5 < L < 5.58) = P(1.25 < Z < 2.70) = 0.9965 - 0.8944 = 0.1021. Then P = 0.1021/0.993 = 0.103.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "In Q6(a) of S1 Jan 2023, the regression line is y = 151.2 + 2.72x. Give an interpretation of the gradient. What THREE elements must be in your answer? (1 step)", "answer": "- Step 1: For every 1°C increase in temperature, the maximum weight of sugar that dissolves in 100g of water increases by approximately **2.72 grams** (on average). You must mention: the unit of x (°C), the unit of y (grams), and \"on average\".", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "In Q6(b) of S1 Jan 2023, estimate the weight at 90°C. Why is this estimate unreliable, and what is the key vocabulary word? (2 steps)", "answer": "- Step 1: Substitute: y = 151.2 + 2.72(90) = 396 grams.\n- Step 2: This is **unreliable** because 90°C lies **outside the data range** (10 ≤ x ≤ 80). This is **extrapolation** — there's no evidence the linear relationship continues beyond 80°C.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "In Q6(d) of S1 Jan 2023, show r = 0.988. What three S-statistics must you calculate first, and which one can you find from the regression line gradient? (4 steps)", "answer": "- Step 1: Calculate Sxx = ∑x² - (∑x)²/n. Given ∑x² = 24500, n = 12, and ∑x = 480: Sxx = 24500 - (480)²/12 = 24500 - 19200 = 5300.\n- Step 2: Calculate Syy = ∑y² - (∑y)²/n = 851093 - (3119)²/12 = 40412.917.\n- Step 3: Find Sxy from the gradient: b = Sxy/Sxx, so Sxy = b × Sxx = 2.72 × 5300 = 14416.\n- Step 4: Then r = Sxy/√(Sxx × Syy) = 14416/√(5300 × 40412.917) = 0.988 (to 3 d.p.).", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "In Q6(e) of S1 Jan 2023, discuss the suitability of a linear model. What TWO pieces of evidence must you cite, and what must your conclusion include? (2 steps)", "answer": "- Step 1: Cite BOTH: (1) PMCC r = 0.988 indicates strong positive correlation; (2) the scatter diagram shows points lying close to a straight line with no obvious curvature.\n- Step 2: Conclusion: a linear regression model IS suitable for describing the relationship within the observed range 10 ≤ x ≤ 80. Both marks require citing both pieces of evidence.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "What is the key difference between how you calculate quartiles for discrete data versus grouped continuous data in Edexcel S1? (1 step)", "answer": "- Step 1: For **discrete** data, use position = (n+1)/4. For **grouped continuous** data (histograms), use position = n/4 directly. Using (n+1)/4 on grouped data is a common error that gives the wrong quartile class.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In the tree diagram for Q2, why does the probability of drawing green from bag Y differ depending on the first two draws from bag X? (1 step)", "answer": "- Step 1: Because the first two draws transfer marbles to bag Y, changing its composition. After GG: 8G/5B (P(G) = 8/13). After GB or BG: 7G/6B (P(G) = 7/13). After BB: 6G/7B (P(G) = 6/13).", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "In Q3, when expanding (E(X))² where E(X) = 3.6 - 2a, what is the correct expansion and what common sign error destroys the calculation? (2 steps)", "answer": "- Step 1: Correct: (3.6 - 2a)² = 12.96 - 14.4a + 4a². The middle term is -2 × 3.6 × 2a = -14.4a.\n- Step 2: Common error: distributing the minus sign in \"0.56 = (13.2 - 12a) - (3.6 - 2a)²\" by writing \"13.2 - 12a - 3.6² +...\" which loses the cross-term. Always bracket the entire squared term before subtracting.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In Q4(ii), what is the logical structure of a proof by contradiction for mutual exclusivity? What inequality must hold if two events ARE mutually exclusive? (2 steps)", "answer": "- Step 1: Structure: Assume C and D ARE mutually exclusive → then P(C∪D) = P(C) + P(D) must equal P(C) + P(D) ≤ 1.\n- Step 2: Show that P(C) + P(D) > 1 for all valid x, which contradicts the requirement, proving they cannot be mutually exclusive.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "In Q5(e), why can't you use P(L > 5) = P(Z > 1.25) = 0.1056 as the numerator in the conditional probability calculation? (2 steps)", "answer": "- Step 1: Because the conditioning event \"not outlier\" restricts the sample space to only values between 3.42 and 5.58 mm. The event L > 5 extends beyond this band to infinity.\n- Step 2: The intersection of L > 5 with \"not outlier\" is only {5 < L < 5.58}, not the full {L > 5}. You must intersect the events on the number line before standardising.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In Q6(d), if you couldn't find ∑xy from the question, how can you still find Sxy using only the regression line and summary statistics? (2 steps)", "answer": "- Step 1: The regression line gives b = Sxy/Sxx. Rearranging: Sxy = b × Sxx. Since you can calculate Sxx from ∑x² and ∑x, you can find Sxy without ∑xy.\n- Step 2: This is a recovery technique when summary stats appear incomplete — use the gradient relationship to back-calculate the missing Sxy.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "For Q1 of S1 Jan 2023, what is the FIRST data reconstruction you must do before attempting any part of the question, and what must it sum to? (1 step)", "answer": "- Step 1: Reconstruct the missing frequencies from the histogram: f(18-25) = 28, f(25-40) = 22. These must sum to 100 (the total number of people). Without this, you cannot build the cumulative frequency table for quartile interpolation.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In Q2, what fraction do you use as the common denominator when computing P(all same) in part (c), and why does this make part (d) easier? (2 steps)", "answer": "- Step 1: Use 936 as the common denominator: P(GGG) = 160/936, P(BBB) = 84/936, so P(same) = 244/936.\n- Step 2: In part (d), the conditional probability P(all G | same) = (160/936)/(244/936) = 160/244 = 40/61. The 936 cancels cleanly.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "What is the symmetric difference A △ B in terms of Venn diagram regions p, q, r, s? How does this help in Q4(i)? (1 step)", "answer": "- Step 1: The symmetric difference A △ B = (A ∩ B') ∪ (A' ∩ B) = p + r (the \"only A\" plus \"only B\" regions, excluding the intersection). This equals p + r = 8/25 from the question.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In Q5(b), why must you use z = 0.6745 rather than z = 0.67 for the quartiles? What precision is expected? (1 step)", "answer": "- Step 1: Using 0.67 gives Q3 = 4.5 + 0.67(0.4) = 4.768, which is slightly off from the expected 4.77. The exact value 0.6745 is expected — memorize this number as it appears frequently in normal distribution questions.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "In Q6, what is the relationship between the regression line passing through (x̄, ȳ) and recovering unknown summary statistics? (2 steps)", "answer": "- Step 1: The regression line y = a + bx always passes through the point (x̄, ȳ), so ȳ = a + b x̄.\n- Step 2: Given ȳ = 3119/12 = 259.917 and b = 2.72, we find x̄ = (259.917 - 151.2)/2.72 ≈ 40, giving ∑x = 480. This recovery technique is essential when ∑x isn't explicitly given.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "When calculating standard deviation from grouped data in Q1(d), what formula do you use, and what common error leads to using the wrong value? (2 steps)", "answer": "- Step 1: Formula: $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar{t}^2}$$. Given ∑ft² = 41033 and n = 100, first compute 41033/100 = 410.33.\n- Step 2: Common error: using variance (σ²) instead of standard deviation (σ), or forgetting to square the mean in the formula.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In Q2, why can't you use a single value for P(G₃) when calculating probabilities for the third draw from bag Y? (1 step)", "answer": "- Step 1: Because the composition of bag Y depends on what was transferred in the first two draws. There are four possible paths (GG, GB, BG, BB), each leading to a different Y composition and thus different P(G₃).", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "What is the relationship between variance, E(X²), and E(X) for a discrete random variable? (1 step)", "answer": "- Step 1: $$\\mathrm{Var}(X) = E(X^2) - [E(X)]^2$$. Note that E(X²) uses x² values, not [E(X)]². This identity is NOT in the formula booklet and must be memorised.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In Q4(i)(b), after finding p, q, r, how do you find s, the probability of neither A nor B occurring? (1 step)", "answer": "- Step 1: Use the fact that all four regions sum to 1: p + q + r + s = 1. With p + q + r = 10/25 = 2/5, we get s = 1 - 10/25 - q = 15/25 = 3/5.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "In Q5, what is the memory aid for the quartile z-values, and how do you apply them to any normal distribution? (1 step)", "answer": "- Step 1: Q3 uses z = +0.6745 (positive), Q1 uses z = -0.6745 (negative). For any X ~ N(μ, σ²), Q = μ + zσ. The values correspond to the 75th and 25th percentiles of the standard normal.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "In Q6(c), the estimate at x = 90°C is 396g but is unreliable. What combination of factors makes extrapolation unreliable even when r is high? (1 step)", "answer": "- Step 1: Extrapolation is unreliable because: (1) x = 90 is outside the data range (10 ≤ x ≤ 80); (2) there's no empirical evidence the linear relationship holds beyond the observed range; (3) the relationship may change (e.g., solubility may plateau at high temperatures). High r does not license extrapolation.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": true}, {"question": "In Q3, when solving the quadratic from the variance equation, what two checks must you perform on your solutions? (1 step)", "answer": "- Step 1: (1) Check the solutions satisfy the original quadratic equation; (2) Check they fall within the validity constraint 0 ≤ a ≤ 0.6. Both 0.2 and 0.4 pass both checks in this question.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "What is the key insight that makes Q4(ii) solvable without calculus or quadratic inequalities? (1 step)", "answer": "- Step 1: Recognise that after combining fractions, the numerator = denominator + 25, so the sum = 1 + 25/(denominator). Since denominator > 0 for x > 0, the sum is always > 1. This algebraic restructuring makes the contradiction immediate.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": true}, {"question": "In Q1(b), to find people with t < 16 minutes, you need to interpolate within the 14–18 class. What fraction of that class's frequency represents the 14–16 portion? (2 steps)", "answer": "- Step 1: The class 14–18 has width 4 minutes. The portion from 14 to 16 is 2 minutes, which is 2/4 = 1/2 of the class width.\n- Step 2: Since the class has 24 people uniformly distributed, the frequency in 14–16 = (1/2) × 24 = 12. Then cumulative: 10 + 16 + 12 = 38 people.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "When answering \"show that\" questions in S1 like Q5(d) or Q6(d), what must you demonstrate to earn full marks? (1 step)", "answer": "- Step 1: You must show intermediate working, not just state the final answer. For Q5(d), show the z-value standardisations; for Q6(d), show Sxx, Syy, Sxy as separate labelled calculations. The mark scheme rewards the algebraic process.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "In Q2(d), why is the conditional probability formula simplified to P(A|B) = P(A)/P(B) when A ⊂ B? (1 step)", "answer": "- Step 1: When A is a subset of B, the intersection A ∩ B equals A itself. So P(A ∩ B) = P(A). Here, \"all green\" implies \"all same colour\", so P(all G | same) = P(all G)/P(same).", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "What does the product moment correlation coefficient (PMCC) r measure, and what is its range? (1 step)", "answer": "- Step 1: r measures the strength and direction of linear correlation between two variables. It ranges from -1 to +1, where |r| close to 1 indicates strong linear relationship, and r close to 0 indicates weak or no linear relationship.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "In Q1, if you mistakenly used (n+1)/4 = 25.25 instead of n/4 = 25 for the Q1 position, what would go wrong? (1 step)", "answer": "- Step 1: You would locate the 25.25th person instead of the 25th. This would still fall in the 10–14 class (since cumulative goes 10 → 26), but the interpolation calculation would give a slightly different Q1 value, losing accuracy and potentially marks.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "In Q5, what is the 1.5×IQR rule for outliers based on, and why is it applied to the original normal distribution parameters? (1 step)", "answer": "- Step 1: The 1.5×IQR rule is a convention (not a mathematical necessity) for identifying potential outliers. Since Q1 and Q3 come from the normal distribution parameters, applying 1.5×IQR to these values gives outlier limits in the original units (mm).", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "In Q6, if the scatter diagram showed a curved relationship but r was still high, what would this indicate about using linear regression? (1 step)", "answer": "- Step 1: This would indicate that a linear model is inappropriate despite the high r value. The scatter diagram visual check is essential — r only measures linear correlation, not curvature. Both r and the scatter diagram must support linearity.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}], "count": 49}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "In a tree diagram problem where marbles are transferred between bags, what's the critical number you must remember for bag Y's third draw? What's the common error? (Q2)", "answer": "- Step 1: Bag Y starts with 6G + 5B = 11 marbles.\n- Step 2: TWO marbles are transferred from X to Y.\n- Step 3: Therefore bag Y has 11 + 2 = **13 marbles** for the third draw.\n- The common error: Using 11 marbles (the original amount) for P(G₃) or P(B₃), which gives the wrong denominator and changes all final probabilities.\n\nThis sample-space change is the defining feature of transfer problems — always count the transferred items.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "What's the first constraint you must establish before solving any discrete RV problem involving an unknown parameter a? (Q3)", "answer": "- Step 1: All probabilities must be valid: each P(X=x) must be between 0 and 1.\n- Step 2: For the table with a, 0.4, and 0.6-a:\n  - a ≥ 0 (probability can't be negative)\n  - 0.6 - a ≥ 0 (so a ≤ 0.6)\n- Step 3: Therefore 0 ≤ a ≤ 0.6 is the **validity constraint**.\n- Step 4: Any solution outside this range is invalid, even if the algebra works.\n\nThis constraint is worth a mark and must be checked at the end.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "In a Venn diagram with two sets A and B, if p = P(A∩B'), q = P(A∩B), r = P(A'∩B), what does the expression P[(A∩B') ∪ (A'∩B)] simplify to? (Q4a)", "answer": "- Step 1: (A∩B') is region p (A only, not B).\n- Step 2: (A'∩B) is region r (B only, not A).\n- Step 3: Their union is (A only) ∪ (B only) — this is the **symmetric difference** A △ B.\n- Step 4: P[(A∩B') ∪ (A'∩B)] = p + r (just add the two disjoint regions).\n\nThe key recognition: this is the symmetric difference, not the union A ∪ B (which would include q).", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "What's the exact z-value for the upper quartile Q₃ in a normal distribution, and why does it matter to use the exact value rather than 0.67? (Q5b)", "answer": "- Step 1: For Q₃, find z where Φ(z) = 0.75.\n- Step 2: The exact value from S1 tables is **z = 0.6745** (or 0.674, depending on table).\n- Step 3: Using 0.67 introduces small errors that propagate: 0.6745 × 0.4 = 0.2698 vs 0.67 × 0.4 = 0.268 — a small but examinable difference.\n- Step 4: At the end of multi-step problems, these small errors can change final answers beyond tolerance.\n\nMemorize this quartile z-value — it's not in the formula booklet and is expected knowledge.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "When interpreting the gradient of a regression line, what three elements must be included for a complete interpretation? (Q6a)", "answer": "- Step 1: State the numerical change: \"2.72 grams\"\n- Step 2: State the per-unit change: \"for each 1°C increase in temperature\"\n- Step 3: State \"on average\" — the regression line gives a mean prediction, not an exact value.\n- Complete answer: \"For every 1°C increase in temperature, the maximum weight of sugar that dissolves increases by approximately 2.72 grams on average.\"\n\nMissing any element (units, \"per unit\", or \"on average\") loses marks.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}], "count": 5}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "S1 Jan 2023 Q1(a) — In a histogram question where some class frequencies are given and others are missing, what is the FIRST thing you must do before answering any sub-part?", "answer": "- Step 1: Recognise that histogram frequencies = frequency density × class width, so the given classes (e.g., 5–10, 10–14, 14–18 with $$f = 10, 16, 24$$) fix the frequency-density scale.\n- Step 2: Read the remaining bar heights off the histogram, multiply by class width, and fill in the missing frequencies (here 28 and 22 for 18–25 and 25–40).\n- Step 3: Sanity-check that all frequencies sum to $$n$$ (here $$10+16+24+28+22 = 100$$ ✓).\n\nYou CANNOT do mean, sd, or interpolation without these — they all need cumulative frequency or $$\\sum ft$$, which require every class.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why must histogram frequencies be reconstructed from frequency density × width rather than bar height alone?", "answer": "Bar HEIGHT on a histogram is frequency density, not frequency. The actual frequency is the AREA of the bar = density × class width. Mistaking height for frequency systematically under- or over-counts whenever class widths differ (e.g., the 18–25 bar has width 7, not 4 or 5), which is the entire point of using a histogram for unequal classes.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "S1 Jan 2023 Q1(b) — To estimate the number of people who took less than 16 minutes when 16 falls inside the 14–18 class, what assumption underlies the calculation? (3 steps)", "answer": "- Step 1: Assume the 24 people in the 14–18 class are spread UNIFORMLY across the interval (this is the linear interpolation assumption for grouped data).\n- Step 2: Compute the proportion of the class below 16: $$\\frac{16-14}{18-14} = \\frac{1}{2}$$.\n- Step 3: Multiply: $$\\frac{1}{2} \\times 24 = 12$$ in $$[14, 16)$$, then add the lower classes: $$10 + 16 + 12 = 38$$.\n\nThe uniformity assumption is what licenses every \"less than X mid-class\" estimate in grouped data.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "For grouped continuous data on Edexcel IAL S1, which formula gives the quartile position — $$\\frac{n}{4}$$ or $$\\frac{n+1}{4}$$?", "answer": "Use $$\\frac{n}{4}$$ directly. With $$n = 100$$, $$Q_1$$ position is 25 (not 25.25). The $$\\frac{n+1}{4}$$ rule applies to DISCRETE data (where you rank individual values). Grouped data is treated as continuous, so the cumulative-frequency curve is continuous and quartiles sit at the exact fractional positions.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "S1 Jan 2023 Q1(e) — Write down the linear interpolation formula for a quartile $$Q_k$$ in grouped data, naming every symbol.", "answer": "- Step 1: $$Q = L + \\dfrac{\\tfrac{kn}{4} - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$.\n- Step 2: Identify the symbols:\n+ $$L$$ = lower boundary of the quartile class\n+ $$F_{\\text{before}}$$ = cumulative frequency UP TO (not including) the quartile class\n+ $$f_{\\text{class}}$$ = frequency of the quartile class itself (NOT cumulative)\n+ $$w$$ = width of the quartile class\n+ $$\\tfrac{kn}{4}$$ = the target position (e.g., 25 for $$Q_1$$ when $$n=100$$)\n- Step 3: The most common slip is using cumulative frequency in the denominator — it must be the class's own frequency.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "In Q1(e), the examiner hands you $$Q_3 = 23$$ for free. What does this tell you about their intent?", "answer": "They didn't want you to interpolate the awkward 18–25 class (width 7, ugly arithmetic). By gifting $$Q_3$$, they force the student to interpolate ONLY $$Q_1$$ (in the cleaner 10–14 class) and then subtract. Recognising this saves time and avoids the most error-prone interpolation. Always read what's given — it often signals which class they want you to actually compute.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "When computing the standard deviation from grouped data with $$\\sum ft^2$$ given, what's the formula and the most common rounding/squaring trap? (3 steps)", "answer": "- Step 1: $$\\sigma = \\sqrt{\\dfrac{\\sum ft^2}{n} - \\bar t^{\\,2}}$$ (using midpoints $$t$$).\n- Step 2: Compute $$\\bar t^2$$ BEFORE subtracting — e.g., $$19.68^2 = 387.20$$, not $$19.68$$ left unsquared.\n- Step 3: Take the square root at the end. The classic trap is reporting $$\\sigma^2$$ (the variance) instead of $$\\sigma$$ — always check the question asks for sd vs variance.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "What are the correct class midpoints for the intervals 5–10, 14–18, and 18–25 in grouped continuous data?", "answer": "Use $$\\dfrac{\\text{lower boundary} + \\text{upper boundary}}{2}$$: $$\\dfrac{5+10}{2} = 7.5$$, $$\\dfrac{14+18}{2} = 16$$, $$\\dfrac{18+25}{2} = 21.5$$. The boundaries don't need to be \"tidy\" — for a 7-wide class like 18–25, the midpoint is 21.5, not 22.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "S1 Jan 2023 Q2 — Two marbles are transferred from bag X to bag Y, then a third is drawn from Y. What is the total number of marbles in Y when the third draw happens, and why is this the #1 trap in this question type?", "answer": "- Step 1: Bag Y starts with $$6+5 = 11$$ marbles, BUT two are transferred IN before the third draw, so Y has $$11 + 2 = 13$$ marbles.\n- Step 2: The trap is leaving Y at 11 (forgetting the transferred marbles count) — this corrupts every probability on the third level of the tree.\n- Step 3: Rule: whenever items move between containers, BOTH numerator and denominator of subsequent draws change. Recompute composition for each branch.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "In the marble-transfer tree (Q2), why does $$P(G_3)$$ take three different values depending on the branch — and what are they?", "answer": "- Step 1: The composition of Y at the third draw depends on WHICH two marbles were transferred:\n+ GG branch: Y becomes 8G/5B → $$P(G_3) = \\tfrac{8}{13}$$\n+ GB or BG branch: Y becomes 7G/6B → $$P(G_3) = \\tfrac{7}{13}$$\n+ BB branch: Y becomes 6G/7B → $$P(G_3) = \\tfrac{6}{13}$$\n- Step 2: Trying to use a single \"average\" $$P(G_3)$$ across all branches is the wrong mental model — the tree IS branch-dependent by design.\n- Step 3: Trick: the green numerator in Y is just $$6 + (\\text{number of greens transferred})$$ — a quick mental check.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "S1 Jan 2023 Q2(c) — For \"all three marbles are the same colour\", which branches of the transfer tree are RELEVANT and why does this simplify the calculation?", "answer": "- Step 1: \"All green\" requires $$G_1, G_2, G_3$$ — only the pure GG branch then green from Y works.\n- Step 2: \"All blue\" requires $$B_1, B_2, B_3$$ — only the pure BB branch.\n- Step 3: Mixed branches (GB or BG) CANNOT contribute because the first two marbles already differ. So only 2 of the 4 second-level branches feed into the answer, sidestepping the awkward $$\\tfrac{7}{13}$$ values.\n\nThis is the structural reason \"all same\" is much easier than e.g. \"exactly two green\".", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Why is it strategically helpful to keep a COMMON DENOMINATOR (e.g., 936) when computing parts (c) and (d) of the marble-transfer question?", "answer": "Part (d) is conditional: $$P(\\text{all G} \\mid \\text{all same}) = \\dfrac{P(\\text{all G})}{P(\\text{all same})}$$. With a common denominator both probabilities are fractions over 936, so the answer collapses to $$\\dfrac{160}{244}$$ — the 936s cancel cleanly. Converting to decimals first introduces rounding and obscures the simplification.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "S1 Jan 2023 Q2(d) — What's the conditional probability identity when event $$A$$ is a SUBSET of event $$B$$, and how does it apply here?", "answer": "- Step 1: General: $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)}$$.\n- Step 2: If $$A \\subseteq B$$, then $$A \\cap B = A$$, so $$P(A \\mid B) = \\dfrac{P(A)}{P(B)}$$.\n- Step 3: Here, \"all green\" implies \"all same colour\", so $$\\{\\text{all G}\\} \\subseteq \\{\\text{all same}\\}$$. No need to compute an intersection separately — just divide.\n\nTrap: answering with $$P(\\text{all G})$$ alone, ignoring the conditioning denominator.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "S1 Jan 2023 Q3(a) — Before computing $$E(X)$$ from a probability table containing a parameter $$a$$, what validity constraint must you state, and why? (3 steps)", "answer": "- Step 1: Probabilities must satisfy $$0 \\le P \\le 1$$ for each entry: $$a \\ge 0$$ AND $$0.6 - a \\ge 0$$.\n- Step 2: Combine: $$0 \\le a \\le 0.6$$.\n- Step 3: This is its own exam mark in part (b), AND it's the constraint you check roots against in part (c). Skipping this means you may keep an invalid root or fail to bound $$E(X)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "For a linear $$E(X) = 3.6 - 2a$$ with $$a \\in [0, 0.6]$$, what's the trick for finding the range of $$E(X)$$ without calculus?", "answer": "- Step 1: Recognise $$E(X)$$ is LINEAR in $$a$$ with negative slope (decreasing).\n- Step 2: A monotone function on a closed interval attains its extremes at the endpoints.\n- Step 3: Plug in: max at $$a=0$$ gives $$E(X) = 3.6$$; min at $$a=0.6$$ gives $$E(X) = 2.4$$. So $$2.4 \\le E(X) \\le 3.6$$.\n\nNo need to take derivatives — linearity does all the work.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "S1 Jan 2023 Q3(c) — When setting up the variance equation $$\\mathrm{Var}(X) = E(X^2) - [E(X)]^2 = 0.56$$, what is the #1 algebra mistake to avoid?", "answer": "- Step 1: Compute $$[E(X)]^2 = (3.6 - 2a)^2$$ as a BRACKETED expression first — never distribute the minus inline.\n- Step 2: Expand cleanly: $$(3.6 - 2a)^2 = 12.96 - 14.4a + 4a^2$$.\n- Step 3: When subtracting, every term inside the bracket flips sign: $$- 12.96 + 14.4a - 4a^2$$.\n\nThe classic slip is keeping $$-14.4a$$ when it should be $$+14.4a$$ after the bracket is subtracted. Bracket-then-expand, not expand-and-subtract simultaneously.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "After solving the quadratic from a variance equation and getting two roots for parameter $$a$$, what is the FINAL step that earns a separate mark?", "answer": "Compare both roots against the validity constraint $$0 \\le a \\le 0.6$$ (or whatever range was established) and explicitly state which roots are valid. Even when both survive (as here, $$a = 0.2$$ and $$a = 0.4$$), writing the check is its own mark. Examiners frequently rig one root to fall outside, so the reflex of checking is what scores consistently.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "What's the formula trap for $$E(X^2)$$ when computing variance from a discrete distribution?", "answer": "$$E(X^2) = \\sum x^2 P(X=x)$$ — multiply each $$x$$-VALUE SQUARED by its probability, then sum. The trap is computing $$[E(X)]^2$$ instead (squaring the mean) — these are different quantities, and variance uses BOTH: $$\\mathrm{Var}(X) = E(X^2) - [E(X)]^2$$. The whole point of the variance identity is the gap between them.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "S1 Jan 2023 Q4(i) — In a Venn diagram with regions $$p$$ (A only), $$q$$ ($$A \\cap B$$), $$r$$ (B only), $$s$$ (outside both), what does \"$$P[(A \\cap B') \\cup (A' \\cap B)] = \\tfrac{8}{25}$$\" translate to algebraically?", "answer": "- Step 1: $$(A \\cap B') \\cup (A' \\cap B)$$ is the SYMMETRIC DIFFERENCE $$A \\triangle B$$ — elements in exactly one of $$A$$ or $$B$$.\n- Step 2: In region notation: that's $$p + r$$ (A only OR B only, but NOT the intersection $$q$$).\n- Step 3: So the equation is $$p + r = \\tfrac{8}{25}$$.\n\nTrap: mistaking it for $$A \\cup B = p + q + r$$ — that would INCLUDE the intersection, which the symmetric difference excludes.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Q4(i)(a) — Three equations $$p+q = \\tfrac{7}{25}$$, $$q+r = \\tfrac{5}{25}$$, $$p+r = \\tfrac{8}{25}$$ are given. What's the elegant trick to derive $$2p + 2q + 2r$$?", "answer": "- Step 1: ADD all three equations: each variable appears in exactly two equations, so the left side is $$2p + 2q + 2r$$.\n- Step 2: Right side: $$\\tfrac{7+5+8}{25} = \\tfrac{20}{25} = \\tfrac{4}{5}$$.\n- Step 3: Done — no substitutio
