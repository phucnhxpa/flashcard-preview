eously. The left side becomes $$(p+q) + (q+r) + (p+r) = 2p + 2q + 2r$$, because each variable appears exactly twice.\n- Step 2: The right side sums to $$7/25 + 5/25 + 8/25 = 20/25 = 4/5$$. This \"add them all up\" trick collapses the system automatically without needing to solve for individual variables first.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "S1 Jan 2023 Q5(d) — the printed answers to part (c) round $$Q_3 \\approx 4.77$$ and $$Q_1 \\approx 4.23$$. When proving $$P(\\text{not outlier}) = 0.993$$ to 3 d.p., why MUST you NOT use these rounded values, and what should you carry instead?", "answer": "- Step 1: Carry the FULL-PRECISION quartiles: $$Q_3 = 4.7698$$, $$Q_1 = 4.2302$$ (from $$4.5 \\pm 0.6745 \\times 0.4$$).\n- Step 2: From these, the full-precision outlier limits are $$5.5792$$ and $$3.4208$$, standardising to $$z = \\pm 2.698$$.\n- Step 3: If you'd plugged in the rounded 4.77 and 4.23, the limits would shift slightly, $$z$$ would drift from $$2.698$$ towards $$2.70$$-something else, and $$P(Z<z)$$ would round to $$0.9929$$ or $$0.9931$$ — missing the target $$0.993$$ to 3 d.p.\n\nRule: \"show that\" questions to 3 d.p. require AT LEAST 4–5 s.f. precision in all intermediate steps. Round only the final boxed answer.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "Why is it strategically valuable to keep tree-diagram branch probabilities over a single common denominator (e.g., 936 = 9×8×13) rather than converting to decimals early? (1 step)", "answer": "Keeping fractions like (5/9)×(4/8)×(8/13) over 936 avoids rounding errors and makes conditional probabilities in later parts collapse cleanly: in Q2(d), P(all G | same) = (160/936) ÷ (244/936) = 160/244 = 40/61. Converting to decimals early would introduce rounding that propagates through parts (c) and (d).", "source": "GAP-MiniMax ①", "_id": "minimax_1_6"}, {"question": "S1 Jan 2023 Q3(b) — If $$E(X) = 3.6 - 2a$$ and $$0 \\le a \\le 0.6$$, what is the cleanest way to find the range of $$E(X)$$, and what property of the expression makes it work?", "answer": "- Step 1: $$E(X)$$ is LINEAR in $$a$$ (degree 1, no curvature). Linear functions on a closed interval attain their max and min at the ENDPOINTS — no calculus, no optimisation needed.\n- Step 2: Slope is $$-2$$ (negative), so max occurs at the smallest $$a$$ and min at the largest:\n+ At $$a = 0$$: $$E(X) = 3.6$$ (the MAX).\n+ At $$a = 0.6$$: $$E(X) = 3.6 - 1.2 = 2.4$$ (the MIN).\n- Step 3: Range: $$2.4 \\le E(X) \\le 3.6$$.\n\nThe key recognition is \"linear in the parameter ⇒ endpoints suffice\". If $$E(X)$$ were quadratic in $$a$$, you'd need to check the turning point too — but linearity gives a 2-second answer.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "S1 Jan 2023 Q1(a) — After filling in missing histogram frequencies, what verification step must you perform before doing anything else, and why is it not optional?", "answer": "- Step 1: Sum ALL reconstructed frequencies and confirm the total equals the stated $$n$$ (here 100): $$10 + 16 + 24 + 28 + 22 = 100$$ ✓.\n- Step 2: This is a STRUCTURAL sanity check — if the sum doesn't match, every downstream part (mean, sd, IQR via interpolation) inherits the error and you lose marks cascading through 5+ subparts.\n- Step 3: Treat it like a unit check in physics: cheap, non-negotiable, and it catches misreading of bar heights or width-by-frequency-density slips immediately.\n\nThe 5 seconds you spend summing protects the next 15 minutes of computation.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "S1 Jan 2023 Q2(a) — For a tree diagram where marbles are transferred between bags, what disciplined notation should you use at each level of the tree to avoid the most common error? (2 steps)", "answer": "- Step 1: Explicitly label denominators at every level (e.g., 9 → 8 → 13 marbles) to track composition changes.\n- Step 2: Use these labels to compute probabilities like $ \\frac{5}{9} \\rightarrow \\frac{4}{8} \\rightarrow \\frac{8}{13} $, preventing denominator mismatches.\n\n**Takeaway:** Denominator labels force explicit accounting of transferred items.", "source": "GAP-Qwen 3 ①", "_id": "qwen_1_5"}, {"question": "S1 Jan 2023 Q5(c) — Write down the two outlier limits in the S1 1.5×IQR definition, and identify the constant that you cannot misremember.", "answer": "Upper limit: $$Q_3 + 1.5 \\times (Q_3 - Q_1) = Q_3 + 1.5\\,\\text{IQR}$$.\nLower limit: $$Q_1 - 1.5 \\times (Q_3 - Q_1) = Q_1 - 1.5\\,\\text{IQR}$$.\n\nThe constant **1.5** is the Tukey fence multiplier — this is the IAL S1 convention. Do NOT use 2, 3, or \"2 standard deviations\" — these belong to other outlier conventions (e.g., 3-sigma, or mild-vs-extreme outlier distinctions in further stats). Edexcel S1 only ever uses 1.5×IQR unless the question explicitly redefines it.\n\nAlso note: outlier is defined as STRICTLY GREATER than the upper or STRICTLY LESS than the lower — equality is borderline, not outlier (the paper's wording was \"greater than … or smaller than\", confirming strict inequality).", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "If you know the mean $$\\bar y = 259.917$$ and the regression line $$y = 151.2 + 2.72x$$, how do you algebraically recover the mean $$\\bar x$$ (and hence $$\\sum x$$)? (2 steps)", "answer": "- Step 1: Use the fundamental property that the regression line of $$y$$ on $$x$$ always passes through the mean point $$(\\bar x, \\bar y)$$. Substitute $$\\bar y$$ into the regression equation: $$259.917 = 151.2 + 2.72\\bar x$$.\n- Step 2: Solve algebraically for $$\\bar x$$: $$\\bar x = (259.917 - 151.2) / 2.72 \\approx 40$$. Then recover the sum using the relationship $$\\sum x = n\\bar x$$.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "S1 Jan 2023 Q4(i)(b) — After solving for $$p$$, $$q$$, $$r$$ in a Venn diagram system, what cheap **verification ritual** catches arithmetic errors before you write the boxed answer? (2 steps)", "answer": "- Step 1: Pick **one** of the original three given equations and recompute it with your solved values. For example, check $$p + r = \\frac{5}{25} + \\frac{3}{25} = \\frac{8}{25}$$, which matches the given $$P(A \\triangle B) = \\frac{8}{25}$$.\n- Step 2: If the check fails, you know an arithmetic error occurred in solving the system — most commonly a subtraction slip when isolating a variable. This 10-second ritual is far cheaper than losing 2–3 marks on an inconsistent answer. The reason it works: the three original equations are independent, so if your solved values satisfy all three, the system is guaranteed correct.\n\nCross-checking just one equation is sufficient because if you made a single arithmetic slip solving the system, it will almost certainly violate at least one of the original constraints. You don't need to check all three — one well-chosen check (ideally one you didn't use as your primary solving route) catches most errors.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "Given a histogram where some classes have known frequencies and others are blank, what is the first concrete calculation you must perform to recover the unknown frequencies, and how does it scale? (3 steps)", "answer": "- Step 1: Pick any bar with a known frequency and a known class width, then calculate its frequency density using $$\\text{Frequency Density} = \\frac{\\text{Frequency}}{\\text{Class Width}}$$.\n- Step 2: Because the y-axis scale (frequency density) is constant for the entire histogram, read off the frequency density for the bars with unknown frequencies.\n- Step 3: Recover each missing frequency by multiplying its frequency density by its class width: $$\\text{Frequency} = \\text{Frequency Density} \\times \\text{Class Width}$$. This works because in a histogram, area directly represents frequency.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "S1 Jan 2023 Q6(d) — If a PMCC question has $$ \\sum xy $$ missing (or cropped) but supplies the regression line, how do you recover $$ S_{xy} $$ without $$ \\sum xy $$? (2 steps)", "answer": "- Step 1: Use the gradient formula $$ b = \\frac{S_{xy}}{S_{xx}} $$, which is given in the formula booklet. Rearrange to $$ S_{xy} = b \\times S_{xx} $$.\n- Step 2: Compute $$ S_{xx} $$ from $$ \\sum x^2 $$ and $$ \\frac{(\\sum x)^2}{n} $$ (the latter obtained from $$ \\bar{x} $$, which itself comes from the regression line). Once $$ S_{xx} $$ is known, multiply by $$ b = 2.72 $$ to obtain $$ S_{xy} $$, then substitute into $$ r = \\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}} $$.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_26"}, {"question": "S1 Jan 2023 Q2(a) — For a tree diagram where marbles are transferred between bags, what disciplined notation should you use at each level of the tree to avoid the bag-Y-has-11-marbles slip? (3 steps)", "answer": "- Step 1: Draw the FULL tree with all branches explicit (don't skip \"obvious\" symmetric branches), and write the DENOMINATOR for each level above the branches: level 1 has /9, level 2 has /8, level 3 has /13.\n- Step 2: Labelling the level-3 denominator as 13 EXPLICITLY forces you to think \"bag Y started with 11, then 2 were added\" — the slip 11 only survives when the denominator is left mental/implicit.\n- Step 3: Also label the level-3 NUMERATOR per branch: 8 (after GG), 7 (after GB or BG), 6 (after BB). Writing all four cases removes any temptation to reuse a single value of $$P(G_3)$$ globally.\n\nTrick: the denominators 9 → 8 → 13 are the composition trackers; if any of them stays in your head instead of on the page, an error becomes invisible.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "S1 Jan 2023 Q5(d) — The printed answers give $$ Q_3 \\approx 4.77 $$ and $$ Q_1 \\approx 4.23 $$, but when proving $$ P(\\text{not outlier}) = 0.993 $$ to 3 d.p. you must not use these rounded values. Why, and what should you carry instead? (3 steps)", "answer": "- Step 1: Rounding quartiles early discards precision needed to standardise the outlier limits. The exact values are $$ Q_3 = 4.7698 $$ and $$ Q_1 = 4.2302 $$, giving limits $$ 5.5792 $$ and $$ 3.4208 $$. Using $$ 4.77 $$ and $$ 4.23 $$ shifts the standardised $$ z $$-value away from $$ 2.698 $$, potentially yielding $$ 2.70 $$ or $$ 2.69 $$ unreliably.\n- Step 2: You should carry full calculator precision (at least 4–5 significant figures) through every intermediate step. Only round the final probability to 3 decimal places.\n- Step 3: This is a general principle in \"show that\" questions: examiners test whether you understand that rounded intermediate values are approximations, whereas the exact chain is required to hit the target number exactly.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_20"}, {"question": "Across regression and grouped-data questions in S1, what is the universal \"finishing touch\" that earns the last mark on interpretation/estimate answers?", "answer": "- Step 1: End every interpretation or estimate answer with TWO things: (i) the UNITS of the quantity (grams, minutes, °C, mm, etc.), and (ii) WHERE RELEVANT, an acknowledgement of the DATA RANGE (e.g., \"within the observed range $$10 \\le x \\le 80$$\" or \"this is extrapolation since 90 °C is outside the data range\").\n- Step 2: Examples across the paper:\n+ Q1(c) mean: \"19.68 **minutes**\" not just \"19.68\".\n+ Q6(a) gradient: \"2.72 **grams** per °C, on average\" not just \"2.72\".\n+ Q6(c) reliability: \"unreliable because 90 °C is **outside the data range** of 10–80 °C — this is **extrapolation**\" not just \"unreliable\".\n- Step 3: This is a recurring +1-mark expectation that students drop habitually. The fix is a personal closing checklist: before moving to the next part, ask \"did I name the units and (if relevant) the validity range?\"\n\nThe pattern: interpretive marks are MEANING marks — and meaning lives in units and scope, not in the bare number.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "S1 Jan 2023 Q5(d) — For a standard-normal symmetric interval $ P(-z < Z < z) $, what is the fastest formula in terms of $ \\Phi(z) $, and why does it cut the table lookup in half? (2 steps)", "answer": "- Step 1: Use $ 2\\Phi(z) - 1 $ or $ 1 - 2(1 - \\Phi(z)) $.\n- Step 2: Exploits symmetry to avoid separate lower/upper tail lookups.\n\n**Takeaway:** Symmetric intervals halve computational effort via a single $ \\Phi(z) $ query.", "source": "GAP-Qwen 3 ①", "_id": "qwen_1_17"}, {"question": "S1 Jan 2023 Q1(e) — After computing the quartile position $$n/4 = 25$$ for grouped data, how do you use the cumulative-frequency table to identify the correct class containing $$Q_1$$, and what is the exact decision rule? (2 steps)", "answer": "- Step 1: Build the cumulative-frequency column and scan downward. The quartile lies in the first class for which the cumulative frequency $$F$$ strictly exceeds the quartile position $$n/4$$ (here 25). In this paper, the classes cumulate $$10 \\to 26$$, so the 10–14 class is selected because its cumulative total $$26$$ is the first to pass $$25$$.\n- Step 2: The decision rule is $$F_{\\text{before}} < n/4 \\le F_{\\text{class}}$$. You do not look for the class whose cumulative frequency is closest to 25, nor do you pick the previous class just because 25 is near the top of it. Crossing the threshold is what defines containment.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_3"}, {"question": "S1 Jan 2023 Q6(e) — When an Edexcel question says \"with reference to BOTH the scatter diagram AND the correlation coefficient\", what does that wording literally instruct, and what mark do you lose by quoting only one? (2 steps)", "answer": "- Step 1: The wording is a mandatory two-part checklist. You must cite evidence from the numerical value of $$ r $$ (e.g., $$ r = 0.988 $$ is very close to $$ 1 $$, indicating strong positive linear correlation) AND evidence from the visual scatter diagram (e.g., the points lie close to a straight line with no obvious curve or fanning).\n- Step 2: Quoting only one piece loses at least one mark, even if that single piece is perfectly correct. The question tests your ability to synthesise algebraic and graphical evidence into a single conclusion about model suitability.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_28"}, {"question": "S1 Jan 2023 Q2(a) — Why does Bag Y contain 13 marbles for the third draw, and what trigger in the question wording should make you update its total? (2 steps)", "answer": "- Step 1: Bag Y starts with 11 marbles (6G + 5B), but the procedure explicitly transfers two marbles from Bag X into Bag Y before the third draw. Every transfer increases Y's population by one, so after two transfers Y holds $$11 + 2 = 13$$ marbles.\n- Step 2: The trigger is the sequential wording \"A marble is selected ... and placed in bag Y. A second marble is selected ... and placed in bag Y. A third marble is then selected, this time from bag Y.\" Whenever a question describes moving items between containers, you must update both the contents and the total of the receiving container before the final draw.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_7"}, {"question": "S1 Jan 2023 Q3(c) — After substituting $$E(X^2)$$ and $$(E(X))^2$$ into a variance equation, you get $$4a^2 - 2.4a + 0.32 = 0$$. What manipulation simplifies this before applying the quadratic formula, and why is it worth the extra step? (2 steps)", "answer": "- Step 1: Divide every term by the leading coefficient (4) to obtain a **monic quadratic**: $$a^2 - 0.6a + 0.08 = 0$$. This makes the quadratic formula cleaner: $$a = \\frac{0.6 \\pm \\sqrt{0.36 - 0.32}}{2} = \\frac{0.6 \\pm 0.2}{2}$$, giving $$a = 0.4$$ or $$a = 0.2$$.\n- Step 2: This is worth the extra step because (a) it reduces the chance of arithmetic errors in the discriminant calculation — $$0.6^2 - 4(1)(0.08)$$ is simpler than $$2.4^2 - 4(4)(0.32)$$ — and (b) if the quadratic were factorisable, the monic form makes factors easier to spot. With the original coefficients, you might attempt $$(4a - ?)(a - ?)$$ and fumble; with $$a^2 - 0.6a + 0.08$$, you can test $$(a - 0.2)(a - 0.4)$$ directly.\n\nThe general principle: *always reduce to monic form before solving*. The discriminant is smaller, the roots are cleaner, and the risk of a sign or multiplication error drops significantly.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "S1 Jan 2023 Q1(e) — In the grouped-data interpolation formula $$Q = L + \\frac{n/4 - F_{\\text{before}}}{f} \\times w$$, what is the most subtle substitution error on the denominator that costs a mark, and how do you guard against it? (2 steps)", "answer": "- Step 1: The denominator must be the class frequency $$f_{\\text{class}}$$ (the number of observations inside the quartile's class, here 16), not the cumulative frequency up to that class (which would be 26). Using the cumulative figure inflates the denominator and shrinks the interpolated distance, pulling the quartile toward the lower boundary.\n- Step 2: Guard against it by explicitly labelling two numbers: $$F_{\\text{before}}$$ (cumulative before the class) and $$f_{\\text{class}}$$ (frequency within the class). In the cumulative table, $$F_{\\text{before}}$$ is the previous row's cumulative total, while $$f_{\\text{class}}$$ is the difference between this row and the previous row.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_5"}, {"question": "S1 Jan 2023 Q1(e) — in the grouped-data interpolation formula $$Q = L + \\frac{n/4 - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$, what is the most subtle slip on the denominator that costs a mark?", "answer": "- Step 1: The denominator $$f_{\\text{class}}$$ is the frequency of the QUARTILE CLASS ITSELF (e.g. 16 for the 10–14 class), NOT the cumulative frequency up to that class.\n- Step 2: Why it's tempting to confuse: you've just built a cumulative-frequency column to LOCATE the class, so cumulative numbers are fresh in your mind. The denominator however is asking \"how thick is the slab we're interpolating across?\" — that's the class frequency.\n- Step 3: Mnemonic: numerator is a difference of cumulative positions ($$n/4 - F_{\\text{before}}$$); denominator is a single class count. Different ingredient.\n\nIf you put the cumulative frequency (26) into the denominator instead of 16, the quartile drifts way off.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "S1 Jan 2023 Q1(e) — In Edexcel IAL S1 grouped-data interpolation, why do you use $$n/4$$ exactly (giving 25) rather than $$(n+1)/4$$ (giving 25.25) when locating $$Q_1$$? (2 steps)", "answer": "- Step 1: For grouped continuous data, the Edexcel S1 syllabus treats the quartile position as $$kn/4$$ without the $$+1$$ adjustment because the interpolation formula already spreads the $$n$$ observations uniformly across the class width. The $$(n+1)/4$$ rule is reserved for discrete or ranked raw data where you must identify an actual ordered observation.\n- Step 2: Using $$25.25$$ would shift the interpolation fraction slightly and produce a different answer, which the mark scheme penalises. The grouped formula $$Q = L + \\frac{n/4 - F_{\\text{before}}}{f} \\times w$$ is engineered to work with the raw fractional position $$n/4$$.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_4"}, {"question": "S1 Jan 2023 Q6(d) — How should the working be laid out for a \"show that $$r = 0.988$$ to 3 d.p.\" question, and why does a three-line labelled layout score method marks where a single calculator expression does not? (2 steps)", "answer": "- Step 1: Write three separate, explicitly labelled computations:\n  + $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n} = \\dots$$\n  + $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n} = \\dots$$\n  + $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n} = \\dots$$\n  Only then substitute into $$r = \\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}}$$.\n- Step 2: A single mashed expression hides your method. Examiners award method marks for demonstrating knowledge of the corrected sums of squares; if you make an arithmetic slip, they can only award follow-through marks if they see where the slip occurred. Isolating each $$S$$ term makes your reasoning transparent and protects partial credit.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_28"}, {"question": "S1 Jan 2023 Q6(a) — Why does the interpretation \"For every 1°C increase, the weight increases by 2.72\" lose the mark, and what is the minimum repair? (2 steps)", "answer": "- Step 1: The mark scheme requires the gradient interpretation to name the units of the response variable explicitly. The gradient is $$2.72$$ **grams per °C**, not just $$2.72$$. Omitting \"grams\" leaves the physical meaning ambiguous — the examiner cannot tell if you understand what quantity is changing.\n- Step 2: The minimum repair is to state: \"For every 1°C increase in temperature, the maximum weight of sugar that dissolves increases by 2.72 grams (on average).\" The phrase \"on average\" is also expected because the regression line describes the mean trend, not a deterministic physical law.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_25"}, {"question": "S1 Jan 2023 Q1(a) — You have a histogram with unequal class widths. Two classes have known frequencies (10 and 16) but the last two classes are blank, and you know the total is $$n = 100$$. What is the **first concrete calculation** you perform to recover the unknown frequencies, and how does it scale to the other bars? (3 steps)", "answer": "- Step 1: Pick **any one class with a known frequency** and compute its frequency density: $$\\text{FD} = \\frac{\\text{frequency}}{\\text{class width}}$$. For example, the class 5–10 has frequency 10 and width 5, so $$\\text{FD} = \\frac{10}{5} = 2$$. This pins the vertical scale of the entire histogram.\n- Step 2: Read off the FD of each unknown bar from the histogram's vertical axis (the bar heights), then recover each frequency via $$\\text{frequency} = \\text{FD} \\times \\text{class width}$$. For the 18–25 class (width 7, FD = 4): $$f = 4 \\times 7 = 28$$. For the 25–40 class (width 15, FD ≈ 1.47): $$f = 1.47 \\times 15 = 22$$.\n- Step 3: The key insight is that histogram bar **height** is frequency density (not frequency itself). Once one bar fixes the FD scale, every other bar's area (= FD × width) gives its frequency. This works precisely because the histogram is drawn on a single, consistent vertical scale.\n\nThe move is: *one known bar → calibrate FD → multiply each unknown bar's FD by its width*.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "S1 Jan 2023 Q4(i)(b) — After solving for $$p, q, r$$ in a Venn system, what cheap verification ritual catches arithmetic errors before you write the boxed answer?", "answer": "Re-compute ONE of the ORIGINAL three given equations using your derived $$p, q, r$$ values and confirm it matches the stated RHS.\n\nE.g., having found $$p = \\frac{5}{25}, r = \\frac{3}{25}$$, check $$p + r = \\frac{5}{25} + \\frac{3}{25} = \\frac{8}{25}$$ ✓ — this matches the given $$P(A \\triangle B) = \\frac{8}{25}$$.\n\nMotivation: the algebra for $$q$$ uses combinations of all three equations, so an error in any of them propagates silently into $$p$$ and $$r$$. Plugging back into ONE original equation costs 10 seconds and exposes any propagation error. It also reassures the marker (and you) that the answer is internally consistent.\n\nHabit rule: always close a multi-variable solve by substituting back into the simplest original equation.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "S1 Jan 2023 Q3(c) — When expanding $$ [E(X)]^2 = (3.6 - 2a)^2 $$ inside the variance equation, what sign error is most common, and how do you avoid it? (2 steps)", "answer": "- Step 1: The common error is distributing the minus sign incorrectly when subtracting the expanded square from $$ E(X^2) $$. For example, writing $$ 13.2 - 12a - 12.96 - 14.4a + 4a^2 $$ by forgetting to flip the middle term.\n- Step 2: Avoid it by expanding $$ (3.6 - 2a)^2 $$ as a separate bracket first: $$ 12.96 - 14.4a + 4a^2 $$. Only then subtract term-by-term from $$ E(X^2) = 13.2 - 12a $$, changing every sign systematically: $$ 13.2 - 12a - 12.96 + 14.4a - 4a^2 $$.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_14"}, {"question": "S1 Jan 2023 Q4(i)(b) — after solving for $$p, q, r$$ individually in the Venn system, what cheap verification ritual catches arithmetic errors before you write the boxed answer?", "answer": "- Step 1: Pick ONE of the original three given equations you have NOT used directly to derive a variable, and substitute your values to check.\n- Step 2: Example here: you found $$p = 1/5 = 5/25$$ and $$r = 3/25$$. Check $$p + r = 5/25 + 3/25 = 8/25$$ — matches the given $$P(A \\triangle B) = 8/25$$. ✓\n- Step 3: Why it works: with three equations and three unknowns, if you compute $$p, q, r$$ and they satisfy all three, your arithmetic is consistent. If just one fails, you've spotted the slip without re-doing everything.\n\nCost: 10 seconds. Benefit: a free correctness audit. Always do it.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "S1 Jan 2023 Q2(c)-(d) — why is it strategically valuable to keep tree-diagram branch probabilities over a single COMMON DENOMINATOR (e.g. 936) rather than converting to decimals early?", "answer": "- Step 1: The conditional probability in (d) is $$P(\\text{all G} \\mid \\text{same}) = \\frac{160/936}{244/936}$$. With a common denominator, the 936 cancels and you read off $$\\frac{160}{244} = \\frac{40}{61}$$ exactly.\n- Step 2: If you'd converted each path to a decimal (0.1709…, 0.0897…), you'd have to divide messy decimals AND risk rounding error propagating into the final 3-s.f. answer.\n- Step 3: Why 936 specifically: it's $$9 \\times 8 \\times 13$$ — the product of the three denominators in the tree. Any path probability is automatically of the form (integer)/936, so they're all directly comparable and addable.\n\nStrategic principle: in conditional-probability questions where you'll divide two probabilities computed from the same tree, exact fractions over a common denominator make the final step trivial.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "S1 Jan 2023 Q2(c)–(d) — Why is it strategically valuable to keep tree-diagram branch probabilities over a single COMMON DENOMINATOR (e.g., 936 = 9·8·13) rather than converting to decimals early? (3 steps)", "answer": "- Step 1: Every leaf of the tree has the same denominator $$9 \\times 8 \\times 13 = 936$$, since every path multiplies the three level denominators. Keeping this form makes the leaves $$\\frac{160}{936}, \\frac{84}{936}$$, etc.\n- Step 2: When you compute a conditional like $$P(\\text{all G} \\mid \\text{same}) = \\frac{P(\\text{all G})}{P(\\text{same})}$$, the 936s CANCEL: $$\\frac{160/936}{244/936} = \\frac{160}{244} = \\frac{40}{61}$$. No decimal rounding, exact answer, one line.\n- Step 3: If you'd converted early to decimals you'd be dividing 0.171 by 0.261 with rounding error potentially shifting the 3rd significant figure of the final answer — and you'd lose the \"exact fraction\" mark.\n\nTakeaway: common denominators are your friend in conditional probability — they survive division as cancellations rather than as rounding pile-up.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "S1 Jan 2023 Q6(d) — If you know $$\\bar{y} = 259.917$$ and the regression line $$y = 151.2 + 2.72x$$, how do you recover $$\\bar{x}$$ (and hence $$\\sum x$$) algebraically? (2 steps)", "answer": "- Step 1: The regression line of $$y$$ on $$x$$ **always passes through the point $$(\\bar{x}, \\bar{y})$$**. Substitute $$\\bar{y}$$ into the line: $$259.917 = 151.2 + 2.72\\bar{x}$$. Solve: $$\\bar{x} = \\frac{259.917 - 151.2}{2.72} = \\frac{108.717}{2.72} \\approx 40$$.\n- Step 2: Then $$\\sum x = n \\cdot \\bar{x} = 12 \\times 40 = 480$$. This recovery trick works whenever you have the regression equation and one of the two means — the other mean is locked in by the point-on-line property.\n\nThe key fact: **the regression line of $$y$$ on $$x$$ passes through $$(\\bar{x}, \\bar{y})$$**. This is not just a geometric curiosity — it's an algebraic tool for recovering missing summary statistics. If the question gives you the line and $$\\bar{y}$$, you can always find $$\\bar{x}$$, and vice versa.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "S1 Jan 2023 Q1(a) — Why is it valid to use a single known bar to determine the frequencies of all other bars in a histogram, and what does this rely on about how histogram areas encode frequency? (2 steps)", "answer": "- Step 1: A histogram is constructed so that the area of each bar is directly proportional to the frequency it represents, with the same constant of proportionality — the frequency density — applied to every class. Therefore, if one bar gives you the numerical value of that constant, every other bar's area immediately translates to frequency via $$\\text{frequency} = \\text{frequency density} \\times \\text{width}$$.\n- Step 2: This works regardless of whether class widths are equal or unequal, because the vertical axis explicitly measures frequency density (frequency per unit width), not raw frequency. If the widths differ, bar heights will differ even for equal frequencies, but the area rule remains invariant.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_0"}, {"question": "S1 Jan 2023 Q1(e) — Why must the quartile class be the first one whose cumulative frequency exceeds $$ \\frac{n}{4} $$, and why is the previous class always wrong? (2 steps)", "answer": "- Step 1: The cumulative frequency up to the end of the previous class is $$ F_{\\text{before}} $$, which by definition is strictly less than $$ \\frac{n}{4} $$. That means the $$ \\frac{n}{4} $$-th item has not yet been reached.\n- Step 2: The next class begins at item $$ F_{\\text{before}} + 1 $$ and ends at $$ F_{\\text{before}} + f_{\\text{class}} $$. Since $$ F_{\\text{before}} < \\frac{n}{4} \\le F_{\\text{before}} + f_{\\text{class}} $$, the quartile position falls inside this class. Choosing the previous class would place the quartile before the $$ \\frac{n}{4} $$-th item, which is impossible.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_5"}, {"question": "S1 Jan 2023 Q4(i)(b) — after finding $$p, q, r$$ in a four-region Venn diagram, how do you recover $$s = P(A' \\cap B')$$ without further system-of-equations work?", "answer": "- Step 1: Use the fact that the four disjoint Venn regions partition the sample space: $$p + q + r + s = 1$$.\n- Step 2: So $$s = 1 - (p + q + r)$$. From part (a) you already know $$p + q + r = 2/5$$, giving $$s = 1 - 2/5 = 3/5$$.\n- Step 3: Motivation: $$s$$ is the \"leftover\" region — everything outside both circles. It's defined by exclusion, so you compute it by subtraction from the total probability 1, never by re-doing the system.\n\nHabit: in any partition question, the final region is always \"1 minus the rest\".", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "S1 Jan 2023 Q3(a) — For a discrete RV table with probabilities expressed in terms of a parameter $$a$$, what is the **first thing** you should write down before computing $$E(X)$$ or $$\\text{Var}(X)$$, and why does it pre-score a mark? (2 steps)", "answer": "- Step 1: Write down the **validity constraint** on $$a$$ by requiring every probability to lie in $$[0, 1]$$. Here: $$P(X=2) = a \\geq 0$$ and $$P(X=4) = 0.6 - a \\geq 0$$, giving $$0 \\leq a \\leq 0.6$$. The sum-to-1 condition is already satisfied ($$a + 0.4 + 0.6 - a = 1$$), but the non-negativity constraints are what restrict $$a$$.\n- Step 2: This pre-scores a mark because part (b) asks for the range of $$E(X)$$, which requires knowing the range of $$a$$. Part (c) produces two quadratic roots, and you must check which lie in $$[0, 0.6]$$. Stating the constraint upfront means you already have the answer framework when those parts arrive — and examiners frequently award a dedicated mark for explicitly stating the valid range of the parameter.\n\nThe pattern: *parametric probability table → first move is always the validity interval*. It costs 30 seconds and saves marks in every subsequent part.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "S1 Jan 2023 Q5(d) — For a standard-normal symmetric interval $$P(-z < Z < z)$$, what is the fastest formula in terms of $$\\Phi(z)$$, and why does it cut the table lookup in half? (2 steps)", "answer": "- Step 1: Use $$P(-z < Z < z) = 2\\Phi(z) - 1$$, equivalently $$1 - 2(1 - \\Phi(z))$$. Only ONE table lookup needed: $$\\Phi(z)$$ for positive $$z$$.\n- Step 2: Why it works: by symmetry, $$P(Z < -z) = 1 - \\Phi(z)$$. So $$P(-z < Z < z) = \\Phi(z) - (1 - \\Phi(z)) = 2\\Phi(z) - 1$$. The naive approach $$\\Phi(z) - \\Phi(-z)$$ requires looking up BOTH $$\\Phi(z)$$ and computing $$1 - \\Phi(z)$$ as a separate step.\n\nConcretely for $$z = 2.70$$: $$2(0.9965) - 1 = 0.9930$$ in one step, versus $$0.9965 - 0.0035 = 0.9930$$ in two steps with an explicit complement.\n\nMnemonic: symmetric interval ⇒ double the positive tail and subtract 1.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "S1 Jan 2023 Q4(i)(a) — given $$p+q = 7/25$$, $$q+r = 5/25$$, $$p+r = 8/25$$, what is the cleanest \"show that\" move to arrive at $$2p + 2q + 2r = 4/5$$?", "answer": "- Step 1: ADD all three equations directly. The LHS becomes $$(p+q) + (q+r) + (p+r) = 2p + 2q + 2r$$ automatically — every variable appears in exactly two equations.\n- Step 2: The RHS sums to $$\\frac{7 + 5 + 8}{25} = \\frac{20}{25} = \\frac{4}{5}$$.\n- Step 3: Why this trumps solving for $$p, q, r$$ individually first: the question asks for the SUM (multiplied by 2). The direct addition collapses the proof into one line; individual elimination would take three lines and provide no extra insight.\n\nMotivation: when \"show that\" targets a symmetric combination of variables, look for a symmetric combination of equations that produces it directly.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "S1 Jan 2023 Q6(d) — How should the working be laid out for a \"show that $$r = 0.988$$ to 3 d.p.\" question, and why is the three-line layout preferred over a single final formula? (2 steps)", "answer": "- Step 1: Lay out three **separately labelled** computations before substituting into $$r$$:\n  + $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n} = 24500 - \\frac{480^2}{12} = 5300$$\n  + $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n} = 851093 - \\frac{3119^2}{12} = 40412.917$$\n  + $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n} = 14590 - \\frac{480 \\times 3119}{12} = 14430$$\n  Then: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}} = \\frac{14430}{\\sqrt{5300 \\times 40412.917}} = 0.988$$\n- Step 2: The three-line layout is preferred because (a) the markscheme awards **method marks for each of** $$S_{xx}$$, $$S_{yy}$$, and $$S_{xy}$$ individually — if you compress everything into one calculator expression and make one sign error, you lose all three method marks; (b) it makes error-tracking possible — if $$r$$ doesn't match, you can identify which of the three sums went wrong.\n\nNever compute $$r$$ in a single mashed expression. The markscheme is designed to reward the decomposition, and the arithmetic is too error-prone to do in one shot.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "S1 Jan 2023 Q1(e) — In the grouped-data linear interpolation formula $$Q = L + \\frac{n/4 - F_{\\text{before}}}{f} \\times w$$, what is the most subtle slip on the denominator that costs a mark?", "answer": "The denominator $$f$$ is the FREQUENCY OF THE QUARTILE CLASS ITSELF (here 16 for the 10–14 class), NOT the cumulative frequency up to and including that class (which would be 26).\n\nThe intuition: linear interpolation assumes the $$f$$ values inside the quartile class are spread uniformly across the class width $$w$$. So you're asking \"how far into this class's $$f$$ items must I count?\" — the answer is $$\\frac{n/4 - F_{\\text{before}}}{f}$$ of the way through, scaled by $$w$$. Using cumulative $$F$$ there is dimensionally meaningless; it would mix \"items before this class\" with \"items in this class\" in the same ratio.\n\nMnemonic: numerator subtracts cumulatives (gives items remaining); denominator is local (gives the spread to interpolate across).", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "S1 Jan 2023 Q6(d) — if you know $$\\bar{y} = 259.917$$ and the regression line is $$y = 151.2 + 2.72x$$, how do you recover $$\\bar{x}$$ (and hence $$\\sum x$$) algebraically?", "answer": "- Step 1: Use the fact that the regression line of $$y$$ on $$x$$ ALWAYS passes through the centroid $$(\\bar{x}, \\bar{y})$$. So $$\\bar{y} = a + b\\bar{x}$$.\n- Step 2: Rearrange: $$\\bar{x} = (\\bar{y} - a)/b = (259.917 - 151.2)/2.72 \\approx 40$$.\n- Step 3: Then $$\\sum x = n \\bar{x} = 12 \\times 40 = 480$$.\n\nMotivation: $$\\sum x$$ wasn't directly given, but the regression line ENCODES the centroid. The line is a free piece of information about both means simultaneously — exploit it.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "S1 Jan 2023 Q5(a) — Edexcel's normal table gives $$\\Phi(z)$$ only for $$z \\ge 0$$. How do you compute $$P(Z < -1.6)$$ using only the positive-side table, and why does the rule work?", "answer": "- Step 1: Use the symmetry rule $$P(Z < -z) = 1 - P(Z < z)$$. So $$P(Z < -1.6) = 1 - \\Phi(1.6) = 1 - 0.9452 = 0.0548$$.\n- Step 2: Why this works: the standard normal density is symmetric about 0. The area below $$-1.6$$ equals the area above $$+1.6$$ (mirror image), and the area above $$+1.6$$ equals $$1 - \\Phi(1.6)$$ by complement.\n- Step 3: Mnemonic: \"negative-z, complement of positive-z\". The minus sign at the argument turns into a $$1-$$ at the front.\n\nThis is why the table can compactly cover only positive $$z$$ — every negative-$$z$$ lookup is a symmetry-plus-complement away.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "S1 Jan 2023 Q5(d) — For a standard-normal symmetric interval $$ P(-z < Z < z) $$, what is the fastest formula in terms of $$ \\Phi(z) $$, and why does it cut the table lookup in half? (2 steps)", "answer": "- Step 1: Use $$ P(-z < Z < z) = 2\\Phi(z) - 1 $$. Equivalently, $$ 1 - 2[1 - \\Phi(z)] $$.\n- Step 2: It halves the lookup because you only enter the table once for the positive $$ z $$. The lower tail $$ P(Z < -z) $$ is determined by symmetry as $$ 1 - \\Phi(z) $$; you do not need to look up the negative value separately. The formula then subtracts both equal tails from $$ 1 $$, leaving the central area.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_21"}, {"question": "S1 Jan 2023 Q5(c) — Write down the two outlier limits in the S1 1.5 × IQR definition, and identify the constant that you cannot misremember. (2 steps)", "answer": "- Step 1: Upper fence = $$Q_3 + 1.5(Q_3 - Q_1)$$, Lower fence = $$Q_1 - 1.5(Q_3 - Q_1)$$. These are the Tukey fences used exclusively in Edexcel S1.\n- Step 2: The constant you cannot misremember is **1.5**. Some students write 1.0 or 2.0 — the 1.5 is a fixed convention for this syllabus, not something derived from the data. Note also that the multiplier applies to the **IQR** ($$Q_3 - Q_1$$), not to $$Q_3$$ or $$Q_1$$ individually. Writing $$Q_3 + 1.5 \\times Q_3$$ is a different (and wrong) formula.\n\nThe structure is always: **quartile ± 1.5 × IQR**. The IQR is the distance between the quartiles, and 1.5 times that distance defines the fence on each side.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "S1 Jan 2023 Q1(e) — In the grouped-data interpolation formula $$Q = L + \\frac{n/4 - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$, what is the most subtle slip on the denominator that costs a mark, and why does it happen? (2 steps)", "answer": "- Step 1: The denominator must be $$f_{\\text{class}}$$ — the frequency **of the quartile class itself** (here 16 for the 10–14 class). It is **not** the cumulative frequency up to that class (26), nor the cumulative frequency before the class (10).\n- Step 2: This slip happens because the cumulative frequency column sits right next to the class frequency column in your working, and under exam pressure the number 26 (cumulative) gets grabbed instead of 16 (class). The logic of the formula is: \"how far through **this class's** 16 values does the 25th observation fall?\" — so the denominator must count only the observations *inside* the class, not the running total.\n\nUsing 26 in the denominator gives $$10 + \\frac{15}{26} \\times 4 \\approx 12.31$$ (wrong). Using 16 gives $$10 + \\frac{15}{16} \\times 4 = 13.75$$ (correct). The difference is nearly 1.5 marks worth of error.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "S1 Jan 2023 Q3(a) — For a discrete random variable table with probability expressions in terms of a parameter $$ a $$, what is the first thing to write down before computing $$ E(X) $$ or $$ \\mathrm{Var}(X) $$, and why does it pre-score a mark? (2 steps)", "answer": "- Step 1: Establish the validity range by requiring every probability to lie in $$ [0,1] $$. In Q3, $$ P(X=2) = a \\ge 0 $$ and $$ P(X=4) = 0.6 - a \\ge 0 $$, giving $$ 0 \\le a \\le 0.6 $$.\n- Step 2: This pre-scores a method mark because examiners frequently rig the variance equation so that one quadratic root falls outside the valid interval. Writing the range explicitly allows you to reject the extraneous root later. Without this step, both roots might be presented as valid, costing the final accuracy mark.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_10"}, {"question": "S1 Jan 2023 Q1(e) — for IAL grouped data, do you use $$n/4$$ or $$(n+1)/4$$ to locate $$Q_1$$? Why?", "answer": "- Step 1: For GROUPED (continuous) data, use $$n/4$$ directly — so for $$n = 100$$ you locate position $$25$$, not $$25.25$$.\n- Step 2: The $$(n+1)/4$$ rule belongs to DISCRETE, ungrouped data (where you're counting individual ranked values).\n- Step 3: Motivation: in grouped data we treat the distribution as continuous within each class, so the quartile is a \"point at which 25% of the area lies below\" — that's literally position $$n/4$$ on a continuous scale, no $$+1$$ adjustment needed.\n\nLock this in: discrete → $$(n+1)/4$$; grouped/continuous → $$n/4$$.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "S1 Jan 2023 Q6(d) — if a PMCC question has $$\\sum xy$$ missing but supplies the regression line and you can compute $$S_{xx}$$, how do you recover $$S_{xy}$$?", "answer": "- Step 1: The regression gradient is $$b = S_{xy}/S_{xx}$$.\n- Step 2: Rearrange: $$S_{xy} = b \\times S_{xx}$$. In this paper, $$S_{xy} = 2.72 \\times 5300 = 14416$$.\n- Step 3: Why this works: the gradient $$b$$ is computed from $$S_{xy}$$ and $$S_{xx}$$, so knowing $$b$$ and $$S_{xx}$$ uniquely determines $$S_{xy}$$. The regression line is a compressed encoding of $$(S_{xy}, S_{xx})$$.\n\nStrategic insight: if any one of $$\\{b, S_{xx}, S_{xy}\\}$$ is missing but the other two are accessible, you can always recover the third.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "S1 Jan 2023 Q2(a) — for a tree diagram where marbles are transferred between bags across three draws, what disciplined notation should you use at each level to avoid the most common error?", "answer": "- Step 1: Draw the FULL tree (don't shortcut to \"two branches per node\"). At every node, EXPLICITLY write the current denominator next to the branch — e.g. \"/9\" for draw 1 from X, \"/8\" for draw 2 from X, \"/13\" for draw 3 from Y.\n- Step 2: This forces you to consciously update the composition after each transfer: Bag X drops from 9 to 8 marbles; Bag Y gains 2 marbles going from 11 to 13.\n- Step 3: The labelled denominators expose the Y=11 trap. If you write \"/11\" anywhere on the third level, you've forgotten the transfers — visible at a glance.\n\nThe discipline isn't decoration; it's a forcing function that makes the sample-space change impossible to overlook.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "S1 Jan 2023 Q5(c) — Why is the outlier definition asymmetric in wording (\"greater than upper OR smaller than lower\") even though the formula itself is symmetric around the median? (2 steps)", "answer": "- Step 1: The wording explicitly names both tails because an outlier can appear in either direction. The formula is symmetric in the sense that the fences are placed at equal IQR distances above $$Q_3$$ and below $$Q_1$$, but the underlying distribution need not be symmetric. The upper and lower limits are computed independently and both must be reported.\n- Step 2: You cannot assume the distribution is symmetric, so you must always state both limits. In a normal distribution the limits happen to be symmetric about the mean, but in skewed data they are not symmetric about the centre of the data. Writing both down ensures you capture outliers in both tails regardless of shape.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_21"}, {"question": "S1 Jan 2023 Q6(d) — If you know $$\\bar y = 259.917$$ and the regression line is $$y = 151.2 + 2.72x$$, how do you recover $$\\bar x$$ (and hence $$\\sum x$$) algebraically? (2 steps)", "answer": "- Step 1: Use the key fact: the least-squares regression line of $$y$$ on $$x$$ ALWAYS passes through the point $$(\\bar x, \\bar y)$$. So $$\\bar y = a + b \\bar x$$ holds identically. Rearrange: $$\\bar x = \\frac{\\bar y - a}{b}$$.\n- Step 2: Apply: $$\\bar x = \\frac{259.917 - 151.2}{2.72} = \\frac{108.717}{2.72} \\approx 40$$. Then $$\\sum x = n \\bar x = 12 \\times 40 = 480$$.\n\nWhy this is powerful: if the paper crops or omits $$\\sum x$$ from the summary stats but gives you the regression line, you can ALWAYS recover the mean — and from the mean, the sum. This rescues a PMCC computation that looks unsolvable.\n\nMemorise: \"regression line passes through the centroid $$(\\bar x, \\bar y)$$\" — it's not in the formula booklet but it's the most useful S1 recovery tool.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "S1 Jan 2023 Q5(d) — for a symmetric standard-normal interval $$P(-z < Z < z)$$, what is the fastest formula in terms of $$\\Phi(z)$$, and why does it halve the table lookup?", "answer": "- Step 1: $$P(-z < Z < z) = 2\\Phi(z) - 1$$, or equivalently $$1 - 2(1 - \\Phi(z))$$.\n- Step 2: Why fastest: you need only ONE table lookup ($$\\Phi(z)$$ for positive $$z$$), then arithmetic. The \"long\" version $$\\Phi(z) - \\Phi(-z)$$ requires either two lookups or a symmetry-then-subtract.\n- Step 3: Derivation: by symmetry $$\\Phi(-z) = 1 - \\Phi(z)$$, so $$\\Phi(z) - \\Phi(-z) = \\Phi(z) - [1 - \\Phi(z)] = 2\\Phi(z) - 1$$.\n\nTrigger: any time the interval is symmetric about 0 (e.g. outlier \"not an outlier\" bands around $$\\mu$$ standardise to symmetric $$\\pm z$$), reach for $$2\\Phi(z) - 1$$.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "S1 Jan 2023 Q3(c) — after substituting $$E(X^2)$$ and $$(E(X))^2$$ into a variance equation you arrive at $$4a^2 - 2.4a + 0.32 = 0$$. What manipulation simplifies this before applying the quadratic formula, and why is it worth doing?", "answer": "- Step 1: Divide every term by the leading coefficient 4, giving $$a^2 - 0.6a + 0.08 = 0$$.\n- Step 2: Why it's worth the extra line: the discriminant becomes $$0.36 - 0.32 = 0.04$$, so $$\\sqrt{D} = 0.2$$ exactly. Without dividing, you'd compute $$\\sqrt{2.4^2 - 4(4)(0.32)} = \\sqrt{5.76 - 5.12} = \\sqrt{0.64} = 0.8$$ and then divide by $$2 \\cdot 4 = 8$$ — more arithmetic, more error risk.\n- Step 3: The roots fall out as $$a = (0.6 \\pm 0.2)/2 = 0.4$$ or $$0.2$$, both clean decimals.\n\nPrinciple: divide through by a common factor BEFORE the quadratic formula — discriminants get smaller, square roots simpler, and final fractions reduce naturally.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "S1 Jan 2023 Q1(e) — After computing the position $$ \\frac{n}{4} = 25 $$ for $$ Q_1 $$ in grouped data, how do you locate the correct class using the cumulative-frequency table? (3 steps)", "answer": "- Step 1: Build the cumulative-frequency column $$ F $$ by running totals of class frequencies. Scan downward to find the first class whose cumulative frequency strictly exceeds the quartile position $$ \\frac{n}{4} $$ (here $$ 25 $$).\n- Step 2: In this paper, the cumulative frequencies are $$ 10 $$, then $$ 26 $$. Because $$ 26 \\ge 25 $$, the $$ 10\\text{--}14 $$ class is the target. The quartile lies inside this class, not the previous one, because the 25th item is reached somewhere within this interval.\n- Step 3: Record the lower boundary $$ L = 10 $$, the class frequency $$ f = 16 $$, the cumulative frequency before this class $$ F_{\\text{before}} = 10 $$, and the width $$ w = 4 $$. These four numbers feed the interpolation formula.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_3"}, {"question": "S1 Jan 2023 Q5(d) — Why does the symmetric-interval formula $$ P(-z < Z < z) = 2\\Phi(z) - 1 $$ hold intuitively in terms of tail areas? (2 steps)", "answer": "- Step 1: The total area under the standard normal curve is $$ 1 $$. The central area between $$ -z $$ and $$ z $$ equals the whole area minus the two equal tails: $$ 1 - 2 \\times P(Z > z) $$.\n- Step 2: Since $$ P(Z > z) = 1 - \\Phi(z) $$, substitution gives $$ 1 - 2[1 - \\Phi(z)] = 2\\Phi(z) - 1 $$. This shows the formula is just a rearrangement of \"whole minus two tails\", which is why it only needs one table lookup.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_22"}, {"question": "S1 Jan 2023 Q6(e) — when an Edexcel question says \"with reference to BOTH the scatter diagram AND the correlation coefficient\", what does that wording literally instruct, and what mark do you lose by quoting only one?", "answer": "- Step 1: It is a mandatory instruction to CITE TWO PIECES OF EVIDENCE in your answer: (i) the numerical value of $$r$$ (e.g. \"$$r = 0.988$$ is close to 1, suggesting strong positive linear correlation\") AND (ii) a description of the scatter pattern (e.g. \"points lie close to a straight line with no curvature\").\n- Step 2: If you mention only $$r$$, you lose 1 of the 2 marks. Same for mentioning only the scatter shape.\n- Step 3: Motivation: $$r$$ alone can be misleading — non-linear curves can have high $$r$$ if monotonic — so the scatter visual is a CROSS-CHECK. Edexcel wants you to demonstrate awareness that correlation ≠ linearity in isolation.\n\nTrigger phrase rule: \"with reference to BOTH X AND Y\" → your answer must contain a clause about X and a separate clause about Y.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "S1 Jan 2023 Q6(a) — why does the answer \"For every 1°C, the weight increases by 2.72\" lose the gradient-interpretation mark, and what is the minimum repair?", "answer": "- Step 1: The answer is missing UNITS on the dependent variable. The number 2.72 is meaningless without \"grams\" attached.\n- Step 2: Minimum repair: \"For every 1°C increase in temperature, the maximum weight of sugar that dissolves increases by 2.72 **grams** (on average).\"\n- Step 3: Why Edexcel insists: the regression model's gradient has dimensional content — it's $$\\text{grams per °C}$$. Stripping the units makes the statement scientifically empty, even if mathematically correct.\n\nUniversal rule (META): every regression/grouped-data interpretation must explicitly name the units of the response variable and the predictor.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "S1 Jan 2023 Q3 — The three probabilities $$a$$, $$0.4$$, and $$0.6-a$$ already sum to 1. Why is checking the sum insufficient, and what additional constraints must be enforced? (2 steps)", "answer": "- Step 1: Summing to 1 is a necessary condition for any probability distribution, but it is not sufficient. Individual probabilities must also satisfy $$0 \\le P(X=x) \\le 1$$. If $$a = -0.2$$, the three values sum to 1, yet $$P(X=2) = -0.2$$ is impossible. The parameter $$a$$ can wander outside the valid range if you only enforce the total sum.\n- Step 2: Therefore you must solve the system of inequalities $$a \\ge 0$$ and $$0.6 - a \\ge 0$$ (and implicitly each $$\\le 1$$, though the lower bounds are tighter here). This produces the feasible interval $$[0, 0.6]$$, which becomes the acceptance region when you later solve for $$a$$ in part (c).", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_12"}, {"question": "S1 Jan 2023 Q3(c) — When expanding $$[E(X)]^2 = (3.6 - 2a)^2$$ inside the variance equation, what is the classic sign-error trap, and how should you structure the algebra to avoid it? (2 steps)", "answer": "- Step 1: The trap is distributing the minus sign into the bracket before squaring, or mishandling the subtraction of the expanded square. The correct expansion is:\n  $$(3.6 - 2a)^2 = 12.96 - 14.4a + 4a^2.$$\n  When this is subtracted inside $$\\mathrm{Var}(X) = E(X^2) - [E(X)]^2$$, every term flips:\n  $$-12.96 + 14.4a - 4a^2.$$\n- Step 2: To avoid errors, expand $$(3.6 - 2a)^2$$ on a separate line first, enclose it in brackets, and only then attach the minus sign to the entire bracket. Never try to \"distribute the minus into the square\" mentally. Writing $$E(X^2) - (3.6 - 2a)^2$$ with the bracket intact until the last moment forces correct sign propagation.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_15"}, {"question": "S1 Jan 2023 Q6(d) — for a \"show that $$r = 0.988$$ to 3 d.p.\" question, how should you lay out the working, and why is the three-line layout marked rather than one compressed formula?", "answer": "- Step 1: Compute and LABEL three separate intermediate quantities, one line each: $$S_{xx}$$, $$S_{yy}$$, $$S_{xy}$$.\n- Step 2: Then substitute all three into $$r = S_{xy}/\\sqrt{S_{xx} S_{yy}}$$ as a final, clean line.\n- Step 3: Why marked this way: \"show that\" awards method marks for visible intermediate steps. A single mashed expression $$r = \\frac{\\sum xy - \\sum x \\sum y / n}{\\sqrt{\\ldots}\\sqrt{\\ldots}}$$ exposes you to sign-or-precision errors with no opportunity to earn partial credit if the final number is wrong.\n\nPattern: \"show that\" → spread the algebra over labelled lines. Compression loses marks even when the answer is right.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "In a tree diagram question where marbles are transferred between bags, what disciplined notation should you write at each level to prevent the common \"Y has 11 marbles\" slip? (Q2a-1)", "answer": "- Step 1: At EVERY branch point, write the TOTAL number of marbles in the denominator explicitly.\n- Step 2: For this question:\n  + First draw from X: label \"9\" (5G + 4B)\n  + Second draw from X: label \"8\" (after removing one, now 8 total)\n  + Third draw from Y: label \"13\" (original 11 + 2 transferred)\n- Step 3: Write the full tree with these denominators visible — this makes it impossible to forget that Y has 13, not 11.\n\nThe error of using Y = 11 happens because students forget both transferred marbles arrive before the third draw. Seeing \"13\" at the third level forces you to account for both transfers.", "source": "GAP-MiniMax ②", "_id": "minimax_2_4"}, {"question": "S1 Jan 2023 Q5(d) — When computing $$P(-2.70 < Z < 2.70)$$, why is writing $$1 - 2 \\times P(Z > 2.70)$$ arithmetically equivalent to $$2\\Phi(2.70) - 1$$, and which form is safer if your table only gives $$\\Phi(z)$$? (2 steps)", "answer": "- Step 1: Both forms exploit symmetry. Since $$P(Z > 2.70) = 1 - \\Phi(2.70)$$, substituting gives $$1 - 2[1 - \\Phi(2.70)] = 2\\Phi(2.70) - 1$$. The first form removes the lower-tail look-up entirely.\n- Step 2: The form $$2\\Phi(z) - 1$$ is safer because standard Edexcel tables provide $$\\Phi(z)$$ directly for $$z \\ge 0$$. Computing $$P(Z > z)$$ requires an extra subtraction from 1, introducing an extra step where sign errors or rounding can occur. Using $$2\\Phi(z) - 1$$ is a single multiplication and addition.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_24"}, {"question": "S1 Jan 2023 Q6(d) — Why must the regression line of $$ y $$ on $$ x $$ always pass through the point $$ (\\bar{x}, \\bar{y}) $$? (2 steps)", "answer": "- Step 1: The least-squares regression line is derived by minimising $$ \\sum (y_i - a - bx_i)^2 $$. The normal equations for this optimisation yield $$ \\sum y_i = na + b\\sum x_i $$, which rearranges to $$ \\bar{y} = a + b\\bar{x} $$.\n- Step 2: Therefore the means satisfy the line equation exactly. This is not an approximation; it is an algebraic identity of the model. That is why substituting $$ \\bar{y} $$ and solving for $$ \\bar{x} $$ is exact, not a trick.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_25"}, {"question": "S1 Jan 2023 Q1(e) — after computing $$n/4 = 25$$ for the position of $$Q_1$$ in grouped data, how do you locate the correct quartile class using the cumulative-frequency table?", "answer": "- Step 1: Build the running cumulative-frequency column $$F$$.\n- Step 2: Find the FIRST class whose cumulative frequency exceeds (strictly, or equals) $$n/4 = 25$$. In this paper, $$F$$ jumps $$10 \\to 26$$ across the 10–14 class, so $$25$$ falls INSIDE 10–14.\n- Step 3: $$Q_1$$ lies in that class — NOT the previous one. The previous class's $$F = 10$$ becomes the $$F_{\\text{before}}$$ in the interpolation formula.\n\nPitfall: students sometimes locate $$Q_1$$ in the class whose cumulative frequency *equals* $$n/4$$, or in the class before — wrong. It's the first class where the running total *passes* $$n/4$$.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "S1 Jan 2023 Q2(d) — When computing a conditional probability from a tree diagram, what algebraic property allows the product of branch denominators to disappear, and what must be true about how you stored the probabilities? (2 steps)", "answer": "- Step 1: The conditional probability formula $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ produces a ratio of two path probabilities. If every path probability was computed as a fraction with the same overall denominator $$D$$ (the product of all level denominators), then both numerator and denominator contain a factor of $$1/D$$. When you divide, these factors cancel completely.\n- Step 2: This only works if you did not reduce intermediate fractions prematurely. For example, writing $$\\frac{5}{9} \\times \\frac{4}{8} = \\frac{20}{72}$$ and then $$\\frac{20}{72} \\times \\frac{8}{13}$$ still works if you keep the denominator as $$72 \\times 13 = 936$$, but converting $$\\frac{20}{72}$$ to $$0.277...$$ destroys the exact cancellation. The trick requires exact fractional storage throughout.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_10"}, {"question": "S1 Jan 2023 Q6(d) — If a PMCC question has $$\\sum xy$$ missing (or cropped from the paper), but supplies the regression line and enough information to compute $$S_{xx}$$, how do you recover $$S_{xy}$$ without $$\\sum xy$$? (2 steps)", "answer": "- Step 1: The regression gradient satisfies $$b = \\frac{S_{xy}}{S_{xx}}$$. Rearrange: $$S_{xy} = b \\times S_{xx}$$. If $$b = 2.72$$ and $$S_{xx} = 5300$$, then $$S_{xy} = 2.72 \\times 5300 = 14416$$.\n- Step 2: This works because $$S_{xx}$$ is computable from $$\\sum x^2$$ and $$(\\sum x)^2/n$$ (both available), and $$b$$ is given by the regression line. You never need $$\\sum xy$$ directly — the gradient encodes the same information as $$S_{xy}$$, just normalised by $$S_{xx}$$. The formula $$S_{xy} = b \\cdot S_{xx}$$ inverts that normalisation.\n\nThe caveat: this only works for the regression line of $$y$$ on $$x$$ (not $$x$$ on $$y$$). If the question gives the line of $$x$$ on $$y$$, the gradient would be $$S_{xy}/S_{yy}$$, and you'd need $$S_{yy}$$ instead.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_20"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "S1 Jan 2023 Q1(a) — When reading a histogram to find class frequencies, what is the fundamental relationship you must use, and why can't you just read off bar heights? (2 steps)", "answer": "- Step 1: The relationship is **Frequency = Frequency Density × Class Width**. The bar *height* is the frequency density, not the frequency itself.\n- Step 2: Two bars of the same height but different widths represent different frequencies — the wider bar covers more of the x-axis and therefore contains more data. Only the *area* (height × width) gives the frequency. Reading height alone is the single most common histogram mistake.\n\nThe key insight: histograms encode frequency in *area*, not height, precisely because class widths differ.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "S1 Jan 2023 Q1(a) — Before attempting any sub-question involving a histogram with partially filled frequency tables, what must you do first and why? (2 steps)", "answer": "- Step 1: You must **reconstruct all missing class frequencies** from the histogram first. Use the known classes to establish the frequency-density scale, then read off the unknown bars.\n- Step 2: Without complete frequencies, you cannot build a cumulative-frequency table, compute midpoints, or do interpolation. Every subsequent part depends on this. In this paper, the 28 and 22 for the last two classes are prerequisites for parts (b)–(e).\n\nA quick sanity check: all frequencies must sum to the total (here, 100). If they don't, you've misread the histogram.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "S1 Jan 2023 Q1(b) — When estimating how many people fall below a value that lies *inside* a class (e.g., below 16 in the 14–18 class), what is the interpolation assumption and how do you apply it? (3 steps)", "answer": "- Step 1: The **uniform distribution assumption**: within any class, values are spread evenly. So the fraction of data below a cutoff equals the fraction of the class width below that cutoff.\n- Step 2: Calculate the width fraction: $$\\frac{\\text{cutoff} - L}{w}$$ where $$L$$ is the lower bound and $$w$$ is the class width. For 16 in 14–18: $$\\frac{16-14}{18-14} = \\frac{2}{4} = \\frac{1}{2}$$.\n- Step 3: Multiply by the class frequency: $$\\frac{1}{2} \\times 24 = 12$$ people in the 14–16 portion. Then add all complete classes below it: $$10 + 16 + 12 = 38$$.\n\nThe assumption is an approximation — real data within a class may cluster — but it's the standard Edexcel convention.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "S1 Jan 2023 Q1(c) — When estimating the mean of grouped data, what value represents each class and why can't you use the class boundaries directly? (2 steps)", "answer": "- Step 1: Use the **class midpoint** $$\\bar{t}_i = \\frac{L + U}{2}$$, where $$L$$ and $$U$$ are the lower and upper boundaries. For 5–10: $$\\frac{5+10}{2} = 7.5$$; for 18–25: $$\\frac{18+25}{2} = 21.5$$.\n- Step 2: You can't use the boundaries because each class contains a *range* of values, not a single value. The midpoint is the best single representative under the uniform-spread assumption. Then $$\\bar{t} = \\frac{\\sum f_i \\bar{t}_i}{n}$$.\n\nCommon pitfall: using 5, 10, 14, 18, 25 as \"representative values\" — those are boundaries, not midpoints.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "S1 Jan 2023 Q1(d) — Given $$\\sum ft^2$$ and the mean, what is the formula for standard deviation of grouped data, and what is the common pitfall in the final step? (3 steps)", "answer": "- Step 1: The formula is $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar{t}^{\\,2}}$$. This is the \"coding\" form of variance, then square-rooted for SD.\n- Step 2: Compute inside the square root first: $$\\frac{41033}{100} - 19.68^2 = 410.33 - 387.2024 = 23.1276$$.\n- Step 3: **Common pitfall**: reporting the variance (23.1276 or 23.1) instead of the standard deviation. The question asks for SD, so you must take the square root: $$\\sqrt{23.1276} = 4.81$$. Always check: did the question say \"variance\" or \"standard deviation\"?", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "S1 Jan 2023 Q1(e) — For grouped data quartiles, what position value do you use, and what is the dangerous alternative that loses marks? (2 steps)", "answer": "- Step 1: For **grouped (continuous) data**, use $$\\frac{n}{4}$$ directly. Here $$n = 100$$, so the Q₁ position is 25.\n- Step 2: The dangerous alternative is $$\\frac{n+1}{4}$$, which gives 25.25 — this is the rule for *discrete* data. Edexcel IAL grouped-data questions always use $$\\frac{n}{4}$$. Using $$\\frac{n+1}{4}$$ shifts the position slightly and produces a wrong interpolation value.\n\nThe mnemonic: \"grouped data is continuous, so no gap — use $$n/4$$\". Discrete data has a \"gap\" between values, hence the $$+1$$ adjustment.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "S1 Jan 2023 Q1(e) — Once you've located which class contains the quartile, what is the full linear interpolation formula, and what is the common pitfall in the denominator? (3 steps)", "answer": "- Step 1: The formula is $$Q_k = L + \\frac{\\frac{kn}{4} - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$ where $$L$$ is the lower bound of the class, $$F_{\\text{before}}$$ is the cumulative frequency up to (but not including) this class, $$f_{\\text{class}}$$ is the frequency *within* this class, and $$w$$ is the class width.\n- Step 2: For Q₁ here: position 25 falls in class 10–14 (cumulative jumps from 10 to 26). So $$L = 10$$, $$F_{\\text{before}} = 10$$, $$f_{\\text{class}} = 16$$, $$w = 4$$: $$Q_1 = 10 + \\frac{25-10}{16} \\times 4 = 10 + \\frac{60}{16} = 13.75$$.\n- Step 3: **Common pitfall**: using the *cumulative frequency* (26) instead of the *class frequency* (16) in the denominator. The denominator must be how many data points are *inside this class*, not how many are *up to the end of* this class.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "S1 Jan 2023 Q1(e) — The question gives you $$Q_3 = 23$$ instead of asking you to calculate it. Why does the exam do this, and what should you NOT waste time doing? (2 steps)", "answer": "- Step 1: The exam gives $$Q_3$$ because the upper quartile falls in the 18–25 class, which has an awkward width and would produce a messy interpolation. They're testing whether you can find Q₁ cleanly and then compute IQR = Q₃ − Q₁.\n- Step 2: Do NOT attempt to verify or recalculate $$Q_3$$ from the data. Use the given value directly: $$\\text{IQR} = 23 - 13.75 = 9.25$$. The question is designed to save you time on the awkward class.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "S1 Jan 2023 Q2 — When marbles are transferred between bags and then a draw is made from the receiving bag, what is the critical error about the bag's total, and why does it happen? (2 steps)", "answer": "- Step 1: The critical error is treating the receiving bag as still having its original total. Bag Y starts with 11 marbles, but after 2 marbles are transferred in, it has **13 marbles** for the third draw.\n- Step 2: This happens because the problem *adds* marbles to Y — they go in and stay in. Every probability for the third draw must use 13 as the denominator. Using 11 means you never accounted for the transfers, which changes every probability on the third level of the tree.\n\nAlways label the denominator at each level of the tree: 9 → 8 for bag X, 13 for bag Y.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "S1 Jan 2023 Q2(a) — After the first draw from bag X, why do the probabilities for the second draw change, and how do you compute them? (2 steps)", "answer": "- Step 1: Bag X has 9 marbles (5G, 4B). After drawing one marble *without replacement*, there are only **8 marbles left**, and the composition depends on what was removed.\n- Step 2: If the first was Green (now 4G, 4B in X): $$P(G_2 \\mid G_1) = \\frac{4}{8}$$, $$P(B_2 \\mid G_1) = \\frac{4}{8}$$. If the first was Blue (now 5G, 3B in X): $$P(G_2 \\mid B_1) = \\frac{5}{8}$$, $$P(B_2 \\mid B_1) = \\frac{3}{8}$$.\n\nThe key principle: sampling without replacement changes both the numerator AND denominator for subsequent draws.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "S1 Jan 2023 Q2(a) — For the third draw from bag Y, why can you NOT use a single value of $$P(G_3)$$ across all branches? (2 steps)", "answer": "- Step 1: The composition of bag Y after the transfers is **path-dependent** — it depends on which two marbles were transferred from X.\n- Step 2: After GG transfer: Y has 8G, 5B → $$P(G_3) = \\frac{8}{13}$$. After GB or BG transfer: Y has 7G, 6B → $$P(G_3) = \\frac{7}{13}$$. After BB transfer: Y has 6G, 7B → $$P(G_3) = \\frac{6}{13}$$. Three different values, because the number of greens in Y changes with each path.\n\nYou must draw a full tree with four second-level branches (GG, GB, BG, BB), each leading to its own third-level probabilities.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "S1 Jan 2023 Q2(b) — What is the strategy for finding the probability that two draws from the same bag (without replacement) are different colours? (2 steps)", "answer": "- Step 1: \"Different colours\" means one Green and one Blue, in either order. So compute both orderings: $$P(G_1 B_2) + P(B_1 G_2)$$.\n- Step 2: $$P(G_1 B_2) = \\frac{5}{9} \\times \\frac{4}{8} = \\frac{20}{72}$$ and $$P(B_1 G_2) = \\frac{4}{9} \\times \\frac{5}{8} = \\frac{20}{72}$$. Sum: $$\\frac{40}{72} = \\frac{5}{9}$$.\n\nNotice the two terms are equal here because the product of numerators is the same (5×4 = 4×5). This is a useful sanity check: for \"different colours\" without replacement, the two orderings often give equal products.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "S1 Jan 2023 Q2(c) — When finding the probability that all three selected marbles are the same colour, which branches of the tree do you need and which can you ignore? (2 steps)", "answer": "- Step 1: \"All same colour\" means either all Green (GGG) or all Blue (BBB). All Green requires the GG path from X *and* then Green from Y. All Blue requires the BB path from X *and* then Blue from Y.\n- Step 2: You can **ignore** the GB and BG paths entirely, because those paths give one Green and one Blue in Y — the third draw can never make all three the same colour (two from X are already different). So only two products: $$P(GGG) = \\frac{5}{9} \\times \\frac{4}{8} \\times \\frac{8}{13}$$ and $$P(BBB) = \\frac{4}{9} \\times \\frac{3}{8} \\times \\frac{7}{13}$$.\n\nThis dramatically simplifies the calculation — you don't need all four branches, just two.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "S1 Jan 2023 Q2(d) — When computing a conditional probability $$P(A \\mid B)$$ where event A is a subset of event B, what simplification applies and why? (3 steps)", "answer": "- Step 1: The general formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$.\n- Step 2: When $$A \\subset B$$, the intersection $$A \\cap B$$ is just $$A$$ itself (since everything in A is already in B). So $$P(A \\cap B) = P(A)$$.\n- Step 3: The formula simplifies to $$P(A \\mid B) = \\frac{P(A)}{P(B)}$$. Here, \"all Green\" is a subset of \"all same colour\" (if they're all Green, they're certainly all the same colour), so $$P(\\text{all G} \\mid \\text{same}) = \\frac{P(\\text{all G})}{P(\\text{same})} = \\frac{160/936}{244/936} = \\frac{160}{244} = \\frac{40}{61}$$.\n\nKeeping a common denominator (936) throughout makes the cancellation clean — don't convert to decimals prematurely.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "S1 Jan 2023 Q3 — Before doing anything with a discrete random variable whose probabilities contain a parameter $$a$$, what constraint must you establish and why? (3 steps)", "answer": "- Step 1: Every probability must satisfy $$0 \\le P(X=x) \\le 1$$. The probabilities sum to 1 automatically (by construction), but each individual probability must be checked.\n- Step 2: Here the probabilities are $$a$$, 0.4, and $$0.6 - a$$. We need $$a \\ge 0$$ and $$0.6 - a \\ge 0$$, giving $$0 \\le a \\le 0.6$$.\n- Step 3: This constraint is **worth a mark** on its own, and is essential for part (c) where you solve a quadratic — both roots must be checked against $$[0, 0.6]$$. Examiners often rig one root to fall outside this range, so the check is never wasted.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "S1 Jan 2023 Q3(a) — What is the formula for $$E(X)$$ for a discrete random variable, and how do you compute it when probabilities contain a parameter? (2 steps)", "answer": "- Step 1: $$E(X) = \\sum x \\cdot P(X=x)$$. Multiply each value of $$x$$ by its corresponding probability and sum.\n- Step 2: Here: $$E(X) = 2(a) + 3(0.4) + 4(0.6-a) = 2a + 1.2 + 2.4 - 4a = 3.6 - 2a$$. The result is expressed *in terms of* $$a$$ — don't try to substitute a value yet.\n\nThe key: $$E(X)$$ is a linear function of $$a$$ (here, decreasing), which makes finding its range straightforward.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "S1 Jan 2023 Q3(b) — How do you find the range of possible values of $$E(X)$$ when it's expressed as a linear function of a constrained parameter? (3 steps)", "answer": "- Step 1: Identify that $$E(X) = 3.6 - 2a$$ is a *linear, decreasing* function of $$a$$. So the maximum of $$E(X)$$ occurs at the minimum of $$a$$, and vice versa.\n- Step 2: At $$a = 0$$: $$E(X) = 3.6$$ (maximum). At $$a = 0.6$$: $$E(X) = 3.6 - 1.2 = 2.4$$ (minimum).\n- Step 3: The range is $$2.4 \\le E(X) \\le 3.6$$. Always use the constraint boundaries — you can't just say \"as $$a$$ varies\" without specifying the valid domain.\n\nIf $$E(X)$$ were a *non-linear* function of $$a$$, you'd need calculus or vertex-finding. But for linear functions, just evaluate at the two endpoints.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "S1 Jan 2023 Q3(c) — What is the formula for $$E(X^2)$$, and what is the critical distinction between $$E(X^2)$$ and $$[E(X)]^2$$? (2 steps)", "answer": "- Step 1: $$E(X^2) = \\sum x^2 P(X=x)$$. You square the $$x$$-values first, then multiply by probabilities. Here: $$E(X^2) = 4(a) + 9(0.4) + 16(0.6-a) = 4a + 3.6 + 9.6 - 16a = 13.2 - 12a$$.\n- Step 2: $$[E(X)]^2 = (3.6 - 2a)^2 = 12.96 - 14.4a + 4a^2$$. These are completely different expressions. $$E(X^2)$$ is the *expectation of the square*; $$[E(X)]^2$$ is the *square of the expectation*. Confusing them is the #1 error in variance calculations.\n\nThe variance identity $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$ requires both, computed separately.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "S1 Jan 2023 Q3(c) — When substituting into the variance identity $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$, what is the safe algebraic strategy to avoid sign errors? (3 steps)", "answer": "- Step 1: Write the identity with the known expressions substituted: $$0.56 = (13.2 - 12a) - (3.6 - 2a)^2$$. Do NOT distribute the minus sign into the squared bracket yet.\n- Step 2: Expand $$(3.6 - 2a)^2$$ *separately* as a clean bracket: $$12.96 - 14.4a + 4a^2$$. This is an independent computation you can verify.\n- Step 3: Now substitute the expansion, distributing the minus sign *carefully* — every term in the bracket flips: $$0.56 = 13.2 - 12a - 12.96 + 14.4a - 4a^2 = 0.24 + 2.4a - 4a^2$$.\n\nThe principle: **bracket-then-expand**. Never try to distribute the minus and square simultaneously in one line. That's where sign errors happen.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "S1 Jan 2023 Q3(c) — After solving the quadratic for $$a$$, what final step must you never skip, and why? (2 steps)", "answer": "- Step 1: **Check each root against the validity constraint** $$0 \\le a \\le 0.6$$. Here $$a = 0.2$$ and $$a = 0.4$$ both satisfy it, so both are valid answers.\n- Step 2: Examiners frequently rig the problem so one root falls outside the valid range (e.g., $$a = -0.3$$ or $$a = 0.8$$). That root would give a negative probability or a probability exceeding 1, which is impossible. The constraint check is its own mark — skipping it loses a point even when both roots happen to be valid.\n\nAlways end a \"find the possible values of $$a$$\" question by explicitly writing: \"Both values satisfy $$0 \\le a \\le 0.6$$, so $$a = 0.2$$ or $$a = 0.4$$.\"", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "S1 Jan 2023 Q4(i)(a) — When a Venn diagram question gives you $$P(A)$$, $$P(B)$$, and $$P[(A \\cap B') \\cup (A' \\cap B)]$$, what region does that third expression represent, and what is the common misinterpretation? (2 steps)", "answer": "- Step 1: $$(A \\cap B') \\cup (A' \\cap B)$$ is the **symmetric difference** $$A \\triangle B$$ — the regions in exactly one of A or B, but not both. In the notation $$p, q, r, s$$, this equals $$p + r$$ (A-only plus B-only).\n- Step 2: The common misinterpretation is reading it as $$A \\cup B$$, which would be $$p + q + r$$ (including the intersection). The expression explicitly *excludes* $$A \\cap B$$ — the $$B'$$ and $$A'$$ ensure that. Confusing symmetric difference with union gives the wrong equation and the whole problem collapses.\n\nThink of it as \"in A or in B, but not in both\" — the XOR of the two events.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "S1 Jan 2023 Q4(i)(a) — Once you've translated the three given probability statements into equations in $$p, q, r$$, what is the strategy to show $$2p + 2q + 2r = \\frac{4}{5}$$? (2 steps)", "answer": "- Step 1: The three equations are: $$p + q = \\frac{7}{25}$$ (from $$P(A)$$), $$q + r = \\frac{5}{25}$$ (from $$P(B)$$), $$p + r = \\frac{8}{25}$$ (from the symmetric difference).\n- Step 2: **Add all three equations together**: $$(p+q) + (q+r) + (p+r) = 2p + 2q + 2r = \\frac{7}{25} + \\frac{5}{25} + \\frac{8}{25} = \\frac{20}{25} = \\frac{4}{5}$$. This is a \"show that\" question — the algebra is the answer, not just the final number.\n\nDon't try to solve for individual variables first. The question asks you to *show* the sum relationship, so add the equations directly.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "S1 Jan 2023 Q4(i)(b) — After finding $$p + q + r = \\frac{2}{5}$$, how do you extract the individual region probabilities, and what determines $$s$$? (3 steps)", "answer": "- Step 1: Use the identity $$P(A) + P(B) = (p + q) + (q + r) = (p + q + r) + q$$. So $$\\frac{7}{25} + \\frac{5}{25} = \\frac{10}{25} + q$$, giving $$q = \\frac{2}{25}$$.\n- Step 2: Back-substitute: $$p = \\frac{7}{25} - \\frac{2}{25} = \\frac{5}{25} = \\frac{1}{5}$$, and $$r = \\frac{5}{25} - \\frac{2}{25} = \\frac{3}{25}$$.\n- Step 3: $$s$$ is determined by the fact that **all four regions sum to 1**: $$s = 1 - (p + q + r) = 1 - \\frac{10}{25} = \\frac{15}{25} = \\frac{3}{5}$$. Always cross-check: $$p + r = \\frac{5}{25} + \\frac{3}{25} = \\frac{8}{25}$$ ✓.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "S1 Jan 2023 Q4(ii) — What is the logical structure of proving that two events cannot be mutually exclusive, and what key inequality drives the proof? (3 steps)", "answer": "- Step 1: The structure is **proof by contradiction**: *assume* they are mutually exclusive, derive a necessary consequence, then show that consequence is violated.\n- Step 2: If C and D are mutually exclusive, then $$P(C \\cap D) = 0$$, so $$P(C \\cup D) = P(C) + P(D)$$. Since any probability is at most 1, mutual exclusivity *forces* $$P(C) + P(D) \\le 1$$.\n- Step 3: Compute $$P(C
