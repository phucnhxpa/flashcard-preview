) + P(D)$$ and show it *exceeds* 1. This contradicts the necessary bound, so the assumption of mutual exclusivity is false. The inequality $$P(C) + P(D) > 1$$ is the contradiction lever.\n\nYou don't need to compute $$P(C \\cap D)$$ directly — the sum exceeding 1 is sufficient.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}, {"question": "S1 Jan 2023 Q4(ii) — When combining $$P(C) = \\frac{x}{x+5}$$ and $$P(D) = \\frac{5}{x}$$ into a single fraction, what algebraic trick makes the inequality immediately obvious? (3 steps)", "answer": "- Step 1: Find the common denominator $$x(x+5)$$: $$P(C) + P(D) = \\frac{x^2 + 5(x+5)}{x(x+5)} = \\frac{x^2 + 5x + 25}{x^2 + 5x}$$.\n- Step 2: **The trick**: notice the numerator is the denominator plus 25. Rewrite as $$\\frac{(x^2 + 5x) + 25}{x^2 + 5x} = 1 + \\frac{25}{x^2 + 5x}$$.\n- Step 3: For $$x > 0$$: $$x^2 + 5x > 0$$, so $$\\frac{25}{x^2 + 5x} > 0$$, meaning $$P(C) + P(D) = 1 + (\\text{something positive}) > 1$$. No quadratic inequality needed — the restructuring makes it obvious.\n\nThis is faster and cleaner than solving $$\\frac{x^2+5x+25}{x^2+5x} > 1$$ algebraically. Always look for \"numerator = denominator + constant\" patterns.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "S1 Jan 2023 Q4(ii) — Why can't you prove C and D are not mutually exclusive by simply finding $$P(C \\cap D)$$ directly? (2 steps)", "answer": "- Step 1: You're not given any information about the joint probability $$P(C \\cap D)$$ — only the marginal probabilities $$P(C)$$ and $$P(D)$$. There's no formula to compute the intersection from marginals alone.\n- Step 2: The indirect route works because mutual exclusivity imposes a *universal constraint* on the sum: $$P(C) + P(D) \\le 1$$. Violating this constraint is sufficient to rule out mutual exclusivity, regardless of what $$P(C \\cap D)$$ actually is. You don't need to know the intersection — you just need to know the sum is too large.\n\nThink of it as: \"even in the most favorable case (zero intersection), the probabilities are too big to coexist.\"", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "S1 Jan 2023 Q5(b) — What z-value must you memorise for the upper and lower quartiles of the normal distribution, and why can't you just use 0.67? (2 steps)", "answer": "- Step 1: The quartile z-values are $$z_{Q_3} = 0.6745$$ and $$z_{Q_1} = -0.6745$$. These come from $$\\Phi^{-1}(0.75) = 0.6745$$.\n- Step 2: Using 0.67 instead of 0.6745 introduces a rounding error that propagates through all subsequent calculations (quartile values, IQR, outlier limits, conditional probabilities). The error compounds — by part (e), you'd be off by enough to lose accuracy marks. Memorise 0.6745; it's not in the formula booklet in an obvious place.\n\nSanity check: $$Q_3 = \\mu + 0.6745\\sigma$$ and $$Q_1 = \\mu - 0.6745\\sigma$$ for any normal distribution.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "S1 Jan 2023 Q5(c) — What is the formula for outlier limits, and what is the common mistake in applying it? (2 steps)", "answer": "- Step 1: The outlier limits are: **Upper** = $$Q_3 + 1.5 \\times \\text{IQR}$$ and **Lower** = $$Q_1 - 1.5 \\times \\text{IQR}$$, where $$\\text{IQR} = Q_3 - Q_1$$.\n- Step 2: The common mistake is using $$1.5 \\times (Q_3 - Q_1)$$ as a limit itself, rather than adding it to $$Q_3$$ (or subtracting from $$Q_1$$). The \"1.5 × IQR\" is the *distance* beyond the quartile, not the limit. The actual upper limit is $$4.77 + 0.809 = 5.58$$, not just 0.809.\n\nThink of it as: \"the fence is 1.5 IQR-lengths *past* the quartile.\"", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "S1 Jan 2023 Q5(d) — When a question says \"using standardisation, show that...\", what must you explicitly display in your working? (2 steps)", "answer": "- Step 1: You must **show the z-values** you compute for each boundary. \"Not outlier\" means $$3.42 < L < 5.58$$, so standardise both: $$Z_{\\text{upper}} = \\frac{5.5792 - 4.5}{0.4} = 2.698$$ and $$Z_{\\text{lower}} = \\frac{3.4208 - 4.5}{0.4} = -2.698$$.\n- Step 2: Then use the table: $$P(-2.70 < Z < 2.70) = P(Z < 2.70) - P(Z < -2.70) = 0.9965 - 0.0035 = 0.9930$$. You cannot just state \"0.993\" — the mark scheme requires seeing the standardisation step and the table lookups.\n\nThe phrase \"using standardisation\" is an instruction to show work, not a suggestion.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "S1 Jan 2023 Q5(d) — What is the overcomplicated approach to avoid, and what is the clean approach instead? (2 steps)", "answer": "- Step 1: **Avoid**: trying to find quartiles of the standard normal, transform outlier limits back, and use some \"property\" to shortcut. This is unnecessarily complex and error-prone.\n- Step 2: **Clean approach**: standardise the two outlier limits from the *original* distribution directly, look up the tail probabilities, and subtract. The symmetry ($$z = \\pm 2.698$$) means you only need one table lookup: $$P(Z < 2.70) = 0.9965$$, and by symmetry $$P(Z < -2.70) = 0.0035$$.\n\nThe question literally tells you the method: \"using standardisation.\" Follow the instruction.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "S1 Jan 2023 Q5(e) — When computing $$P(L > 5 \\mid \\text{not outlier})$$, what is the single most common mistake, and how do you avoid it? (3 steps)", "answer": "- Step 1: The common mistake is using $$P(L > 5)$$ as the numerator — i.e., treating the event as \"L exceeds 5\" without restricting to the not-outlier band. This gives $$P(Z > 1.25) = 0.1056$$, leading to an answer of ~0.106, which is *wrong*.\n- Step 2: The correct numerator is the **intersection**: $$P(L > 5 \\cap \\text{not outlier}) = P(5 < L < 5.5792)$$, because \"not outlier\" caps L at 5.5792. Anything above 5.5792 is an outlier and is excluded by the conditioning.\n- Step 3: Compute $$P(1.25 < Z < 2.70) = 0.9965 - 0.8944 = 0.1021$$. Then divide by $$P(\\text{not outlier}) = 0.993$$: $$\\frac{0.1021}{0.993} = 0.103$$.\n\nThe rule: **always intersect the event with the conditioning band on the number line before standardising**. The conditioning event truncates the original event.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": true}, {"question": "S1 Jan 2023 Q5(e) — Why is this question NOT an inverse-normal problem, and what conceptual error does treating it as one reveal? (2 steps)", "answer": "- Step 1: An inverse-normal problem gives you a probability and asks for a value of the variable. Here, you're given a value (5 mm) and asked for a probability — it's a *direct* probability question, just with a conditional twist.\n- Step 2: The error reveals a deeper misunderstanding: confusing \"given that\" (which restricts the sample space) with \"find the value such that\" (which is inverse-normal). The conditioning event \"not outlier\" doesn't ask you to *find* a boundary — it gives you a restricted range $$[3.42, 5.58]$$ and asks for a probability *within* that range.\n\nThe mental model: conditional probability = \"zoom into the restricted region, then compute probability as if that region is the entire universe.\"", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "S1 Jan 2023 Q5(e) — In the conditional probability formula $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$, where does the denominator $$P(B) = 0.993$$ come from, and why should you not recompute it? (2 steps)", "answer": "- Step 1: $$P(B) = P(\\text{not outlier}) = 0.993$$ comes directly from part (d), which you already computed. The \"given that\" in part (e) references the same event.\n- Step 2: Do NOT recompute it — you've already shown it equals 0.993 in part (d). Recomputing risks rounding errors and wastes time. Just reference the earlier result.\n\nExam technique: parts of a multi-part question build on each other. Always check if a previous answer is the denominator or input you need.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": true}, {"question": "S1 Jan 2023 Q6(a) — When interpreting the gradient of a regression line, what three elements must your answer include? (2 steps)", "answer": "- Step 1: The three elements are: (1) the **direction** of change (increase/decrease), (2) the **units** (\"grams per °C\"), and (3) the qualifier **\"on average\"** or **\"approximately\"**.\n- Step 2: Full answer: \"For every 1°C increase in temperature, the maximum weight of sugar that dissolves in 100g of water increases by approximately 2.72 grams, on average.\" Missing any of the three elements (units, \"per °C\", \"on average\") loses the mark.\n\nCommon pitfall: saying \"the weight is 2.72\" — no units, no \"per degree,\" no \"on average.\" The gradient is a *rate of change*, not a value.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "S1 Jan 2023 Q6(c) — When asked to comment on the reliability of an estimate, what keyword must appear in your answer and what numerical evidence supports it? (2 steps)", "answer": "- Step 1: The keyword is **\"extrapolation\"**. The estimate at $$x = 90$$ is unreliable because 90 lies *outside the observed data range* of $$10 \\le x \\le 80$$.\n- Step 2: Even though $$r = 0.988$$ is very high, a strong correlation within the data range does NOT license extrapolation beyond it. The linear relationship may break down (sugar solubility may plateau), so the estimate of 396g cannot be trusted.\n\nCommon pitfall: claiming the estimate is reliable *because* r is close to 1. High r validates interpolation, not extrapolation.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "S1 Jan 2023 Q6(d) — When computing PMCC from summary statistics, what is the correct sequence of computations, and why should you never try to compute $$r$$ in a single line? (3 steps)", "answer": "- Step 1: Compute the three sums of squares **separately and label each one**: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$, $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$, $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$.\n- Step 2: Then combine: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. Each intermediate value should be written on its own line with a label.\n- Step 3: A single mashed expression loses precision through intermediate rounding and makes it impossible for the examiner to award method marks if the final answer is wrong. Three labelled lines = three method marks protected.\n\nThink of it as: \"show your scaffolding, not just the building.\"", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "S1 Jan 2023 Q6(d) — If $$\\sum x$$ or $$\\sum xy$$ appears to be missing from the printed summary statistics, what recovery technique can you use? (3 steps)", "answer": "- Step 1: The regression line passes through $$(\\bar{x}, \\bar{y})$$. Use $$\\bar{y} = a + b\\bar{x}$$ to recover $$\\bar{x}$$, then $$\\sum x = n\\bar{x}$$.\n- Step 2: For $$S_{xy}$$, use the gradient relationship $$b = \\frac{S_{xy}}{S_{xx}}$$, so $$S_{xy} = b \\times S_{xx}$$. Once you've computed $$S_{xx}$$, multiply by the known gradient to get $$S_{xy}$$.\n- Step 3: In this paper, the screenshot was cropped — the full paper *does* supply $$\\sum x = 480$$ and $$\\sum xy = 14590$$. But if they were truly missing, the recovery technique works. Always check the original paper before assuming data is missing.\n\nThe key insight: the regression line encodes information about the summary statistics. It's not just a predictive tool — it's a constraint on the data.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "S1 Jan 2023 Q6(d) — When you compute $$S_{xy} = b \\times S_{xx} = 2.72 \\times 5300 = 14416$$ but the paper gives $$\\sum xy = 14590$$, why does using the given value produce a slightly different (more accurate) $$r$$? (2 steps)", "answer": "- Step 1: The gradient $$b = 2.72$$ is rounded to 3 significant figures. The true gradient has more decimal places. So $$S_{xy} = b \\times S_{xx}$$ introduces rounding error: 14416 vs the true value derived from $$\\sum xy$$.\n- Step 2: Using the paper's exact $$\\sum xy = 14590$$ gives $$S_{xy} = 14590 - \\frac{480 \\times 3119}{12} = 14590 - 124760 = 14590 - 124760/... $$ wait, let me redo: $$S_{xy} = 14590 - \\frac{480 \\times 3119}{12}$$. The exact computation yields $$r = 0.988$$ precisely. The rounding gap (0.985 vs 0.988) disappears with the exact summary stats.\n\nLesson: when the paper supplies values, use them directly. The recovery technique is a *fallback*, not the first choice.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "S1 Jan 2023 Q6(e) — When discussing the suitability of a linear model, what two pieces of evidence must you cite, and what happens if you mention only one? (2 steps)", "answer": "- Step 1: You must cite **both** (1) the PMCC value ($$r = 0.988$$, close to 1, indicating strong positive linear correlation) and (2) the **scatter diagram** (points lie close to a straight line with no obvious curve or fanning).\n- Step 2: Mentioning only one loses a mark. The examiner requires both because a high r can coexist with a non-linear pattern (e.g., a slight curve or outlier cluster), and a good-looking scatter can have a weaker correlation than it appears. Both pieces of evidence together confirm suitability.\n\nTemplate answer: \"$$r = 0.988$$ is close to 1, indicating strong positive linear correlation, and the scatter diagram shows points close to a straight line with no curve, so a linear model is suitable.\"", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "S1 Jan 2023 — What is the general principle connecting Q2(d) and Q5(e), and how does it apply across both questions? (2 steps)", "answer": "- Step 1: Both are **conditional probability** questions where the conditioning event *restricts the sample space*. In Q2(d), \"all same colour\" restricts you to the GGG and BBB branches. In Q5(e), \"not outlier\" restricts L to the band $$[3.42, 5.58]$$.\n- Step 2: In both cases, you must **recompute the event within the restricted space**, not use the unrestricted probability. For Q2(d): $$P(\\text{all G} \\mid \\text{same}) = P(\\text{all G}) / P(\\text{same})$$. For Q5(e): $$P(L > 5 \\mid \\text{not outlier}) = P(5 < L < 5.58) / P(\\text{not outlier})$$. The numerator is always the intersection, not the original event.\n\nMental model: \"conditioning = zooming in.\" The conditioning event is a magnifying glass that discards everything outside it.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}, {"question": "S1 Jan 2023 — What is the \"bracket before expanding\" principle, and in which questions does it apply? (2 steps)", "answer": "- Step 1: The principle is: when an expression involves a squared bracket that will be subtracted, **expand the square separately first**, then distribute the minus sign. Never try to square and negate in one step.\n- Step 2: This applies in Q3(c) where $$\\text{Var}(X) = E(X^2) - [E(X)]^2 = (13.2 - 12a) - (3.6 - 2a)^2$$. Expand $$(3.6-2a)^2 = 12.96 - 14.4a + 4a^2$$ first, then subtract term by term. Inline distributing (negating inside the square before expanding) is the #1 source of sign errors.\n\nThe same principle applies whenever you see \"$$- (\\text{bracket})^2$$\" in any context: expand the square cleanly, then subtract.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": true}, {"question": "S1 Jan 2023 — What does \"show that\" in a question prompt require you to do differently from \"find\"? (2 steps)", "answer": "- Step 1: \"Find\" allows you to go straight to the answer. \"Show that\" requires you to **display every intermediate algebraic step** that leads to the given result — the answer is provided; you're demonstrating *how* to reach it.\n- Step 2: In this paper, Q4(i)(a) (\"show that $$2p + 2q + 2r = 4/5$$\"), Q5(d) (\"show that the probability is 0.993\"), and Q6(d) (\"show that $$r = 0.988$$\") are all \"show that\" questions worth 3–7 marks each. The marks are in the method, not the final number. Writing just the answer earns 0/7.\n\nThink of \"show that\" as \"prove to the examiner that you can derive this result step by step.\"", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "S1 Jan 2023 — What is the general exam strategy when a multi-part question gives you a value (like $$Q_3 = 23$$ or $$\\text{Var}(X) = 0.56$$) rather than asking you to compute it? (2 steps)", "answer": "- Step 1: The given value is a **gift** — use it directly in subsequent parts. Don't try to verify or recalculate it. The examiner is saving you from a messy computation.\n- Step 2: In Q1(e), $$Q_3 = 23$$ is given so you only need to find $$Q_1$$ and subtract. In Q3(c), $$\\text{Var}(X) = 0.56$$ is given so you set up the equation and solve for $$a$$. The given value anchors the calculation — treat it as a known constant, not something to derive.\n\nException: if the question says \"verify that $$Q_3 = 23$$\", then you *must* compute it. \"Given that\" = free gift; \"verify that\" = you must show the work.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": true}, {"question": "S1 Jan 2023 — What is the pattern behind Q2 and Q5(e) regarding \"sample space changes,\" and how should you reflexively respond? (2 steps)", "answer": "- Step 1: Both questions alter the population you're drawing from. Q2 transfers marbles into bag Y (changing its composition). Q5(e) conditions on \"not outlier\" (restricting to a sub-range of L). In both, failing to update the denominator or the event boundaries produces wrong answers.\n- Step 2: The reflexive response: whenever you see \"transferred,\" \"given that,\" or \"conditioned on,\" **stop and recompute** the sample space. Ask: \"What is the new total/denominator?\" and \"What values are still possible?\" Only then proceed with probability calculations.\n\nThis is the single highest-impact pattern in the paper. Three of the six redo flags (Q2, Q5(d), Q5(e)) stem from failing to update the sample space.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": true}, {"question": "S1 Jan 2023 — What is the algebraic restructuring trick $$\\frac{N + c}{N} = 1 + \\frac{c}{N}$$ useful for, and when should you look for it? (2 steps)", "answer": "- Step 1: This trick is useful whenever you need to show that a fraction is greater than 1 (or less than 1, or equal to 1). By splitting off the \"1\", the remaining term $$\\frac{c}{N}$$ is easy to sign-check: if $$c > 0$$ and $$N > 0$$, then the whole expression exceeds 1.\n- Step 2: Look for it when the numerator and denominator of a combined fraction are *almost the same* — the numerator is the denominator plus a constant. In Q4(ii), $$\\frac{x^2 + 5x + 25}{x^2 + 5x}$$ has numerator = denominator + 25. This pattern also appears in probability sums, variance ratios, and correlation bounds.\n\nThe key insight: instead of solving an inequality from scratch, restructure to make the comparison trivial.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": true}, {"question": "S1 Jan 2023 — For the symmetric difference $$A \\triangle B$$, what is the probability formula in terms of $$P(A)$$, $$P(B)$$, and $$P(A \\cap B)$$, and when is it useful? (2 steps)", "answer": "- Step 1: $$P(A \\triangle B) = P(A) + P(B) - 2P(A \\cap B)$$. This is because $$A \\triangle B = (A \\cap B') \\cup (A' \\cap B)$$, which includes the A-only and B-only regions, excluding the intersection twice (once from each side).\n- Step 2: It's useful when you know $$P(A)$$, $$P(B)$$, and the symmetric difference probability, and need to find $$P(A \\cap B)$$. Alternatively, in Venn diagram problems, recognizing that $$P(A \\triangle B) = p + r$$ (the two outer regions) lets you set up equations directly.\n\nNote: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$ includes the intersection once; $$P(A \\triangle B)$$ excludes it entirely (subtracts it twice).", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": true}, {"question": "S1 Jan 2023 — What is the relationship between the regression line and the point $$(\\bar{x}, \\bar{y})$$, and how can you exploit it? (2 steps)", "answer": "- Step 1: The regression line of $$y$$ on $$x$$ always passes through $$(\\bar{x}, \\bar{y})$$. This means $$\\bar{y} = a + b\\bar{x}$$ is guaranteed to hold.\n- Step 2: You can exploit this to recover unknown summary statistics. If you know $$\\bar{y}$$ (from $$\\sum y / n$$) and the regression coefficients $$a$$ and $$b$$, you can solve for $$\\bar{x}$$, and then $$\\sum x = n\\bar{x}$$. Similarly, $$b = S_{xy}/S_{xx}$$ lets you recover $$S_{xy}$$ once $$S_{xx}$$ is known.\n\nThe regression line is not just a predictive equation — it's a constraint that ties together all the summary statistics.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "S1 Jan 2023 — Why must you carry full precision through intermediate steps and only round at the final answer? (2 steps)", "answer": "- Step 1: Rounding at intermediate steps (e.g., using $$Q_3 = 4.77$$ instead of 4.7698) introduces small errors that **compound** across subsequent calculations. In Q5, the outlier limits, z-values, and conditional probability all depend on the quartile values.\n- Step 2: By part (e), a rounding error of 0.001 in the quartile propagates to ~0.003 in the outlier limit, ~0.008 in the z-value, and ~0.002 in the final probability — enough to miss the required 3 d.p. accuracy. Store full calculator precision throughout; round only when writing the final boxed answer.\n\nCalculator technique: use the ANS key or memory slots to carry forward unrounded values.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": true}, {"question": "S1 Jan 2023 Q1 — How do you construct a cumulative frequency table from grouped data, and why is it essential for interpolation? (2 steps)", "answer": "- Step 1: Start from the lowest class and keep a running total. For each class, the cumulative frequency $$F$$ is the sum of all frequencies up to and including that class: $$F_1 = 10$$, $$F_2 = 10 + 16 = 26$$, $$F_3 = 26 + 24 = 50$$, etc.\n- Step 2: The cumulative table tells you *which class* contains the quartile position. For Q₁ at position 25: since $$F_1 = 10 < 25 \\le F_2 = 26$$, the 25th value falls in the 10–14 class. Without this table, you can't identify the class, and without the class, you can't set up the interpolation formula.\n\nThe cumulative table is the bridge between \"which value\" and \"where does it fall.\"", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "S1 Jan 2023 — What is the formula for $$S_{xx}$$, $$S_{yy}$$, and $$S_{xy}$$, and what is the common structural pattern they share? (2 steps)", "answer": "- Step 1: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$, $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$, $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$.\n- Step 2: The structural pattern is: \"sum of products minus product of sums over n.\" For $$S_{xx}$$ and $$S_{yy}$$, the \"product\" is a square (same variable with itself). For $$S_{xy}$$, it's a cross-product. All three measure *deviation from the mean* in some sense — $$S_{xx}$$ and $$S_{yy}$$ are scaled variances, $$S_{xy}$$ is a scaled covariance.\n\nMnemonic: the \"correction factor\" $$\\frac{(\\sum x)^2}{n}$$ always subtracts. If you get a negative $$S_{xx}$$ or $$S_{yy}$$, you've made an arithmetic error.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": true}, {"question": "S1 Jan 2023 — What is the difference between interpolation and extrapolation, and why does the distinction matter for reliability? (2 steps)", "answer": "- Step 1: **Interpolation** = making estimates *within* the observed data range (here, $$10 \\le x \\le 80$$). **Extrapolation** = making estimates *outside* that range (here, $$x = 90$$).\n- Step 2: Interpolation is generally reliable because the data supports the relationship in that region. Extrapolation is unreliable because there's no evidence the pattern continues — the linear model might break down (sugar solubility could plateau, chemical reactions could change). A high r value doesn't validate extrapolation.\n\nThe boundary between interpolation and extrapolation is the data range. Always identify the range before commenting on reliability.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": false}, {"question": "S1 Jan 2023 — In a tree diagram with marble transfers, what is the systematic way to track the changing composition of each bag? (3 steps)", "answer": "- Step 1: Label the initial composition of each bag clearly. Bag X: 5G, 4B (total 9). Bag Y: 6G, 5B (total 11).\n- Step 2: After each draw from X, update X's composition (subtract the drawn marble) and Y's composition (add the drawn marble). After draw 1: X has 8 marbles; Y has 12. After draw 2: X has 7; Y has 13.\n- Step 3: At each level of the tree, write the denominator (total marbles in the relevant bag) and the numerator (relevant colour count) as fractions. This makes errors immediately visible: if your third-level denominator isn't 13, you've forgotten to account for both transfers.\n\nThe tree diagram is not just a picture — it's a living record of the changing sample space.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "S1 Jan 2023 Q3(c) — When the variance identity produces a quadratic equation, what should the quadratic look like after rearranging to standard form, and how do you sanity-check it? (2 steps)", "answer": "- Step 1: After moving everything to one side, you should get a quadratic of the form $$ca^2 + da + e = 0$$ where $$c > 0$$ (leading coefficient positive). Here: $$4a^2 - 2.4a + 0.32 = 0$$ or equivalently $$a^2 - 0.6a + 0.08 = 0$$.\n- Step 2: Sanity checks: (a) The constant term should be small (here 0.08 or 0.32) because variance is a small number. (b) If the discriminant is negative, something went wrong in the algebra. (c) Both roots should be in $$[0, 1]$$ — if you get $$a = 5$$, recheck. Here $$a = 0.2$$ or $$0.4$$, both in $$[0, 0.6]$$ ✓.\n\nIf your quadratic has huge coefficients or roots far from [0,1], go back and check the variance identity substitution — you likely made a sign error.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "S1 Jan 2023 — What is the conceptual meaning of the IQR (interquartile range), and why do we use it instead of the full range as a measure of spread? (2 steps)", "answer": "- Step 1: The IQR = $$Q_3 - Q_1$$ captures the spread of the **middle 50%** of the data. It's the width of the central half of the distribution.\n- Step 2: We prefer IQR over the full range ($$\\max - \\min$$) because the range is highly sensitive to outliers — a single extreme value stretches the range dramatically. The IQR ignores the top 25% and bottom 25%, so it's a **robust** measure of spread that isn't distorted by outliers.\n\nIn this paper, the outlier definition ($$Q_3 + 1.5 \\times \\text{IQR}$$ and below) is built directly on the IQR — it uses the middle 50% to define what counts as an extreme value.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}, {"question": "S1 Jan 2023 — What is the complete list of formulas NOT in the Edexcel formula booklet that you must memorise for this paper? (1 step)", "answer": "- Step 1: The key formulas to memorise are:\n+ $$E(X) = \\sum x P(X=x)$$, $$E(X^2) = \\sum x^2 P(X=x)$$, $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$\n+ Quartile z-values: $$z_{Q_3} = 0.6745$$, $$z_{Q_1} = -0.6745$$\n+ Grouped-data interpolation: $$Q = L + \\frac{kn/4 - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$ using $$n/4$$ (not $$(n+1)/4$$)\n+ Outlier limits: $$Q_3 + 1.5 \\times \\text{IQR}$$ and $$Q_1 - 1.5 \\times \\text{IQR}$$\n+ Symmetric difference: $$P(A \\triangle B) = P(A) + P(B) - 2P(A \\cap B)$$\n+ Mutual exclusivity implies $$P(C) + P(D) \\le 1$$\n+ Regression line passes through $$(\\bar{x}, \\bar{y})$$: $$\\bar{y} = a + b\\bar{x}$$\n\nThese are the \"hidden\" requirements that catch students who rely solely on the booklet.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}, {"question": "S1 Jan 2023 — For a \"discuss the suitability of a linear model\" question, what is the complete answer template? (3 steps)", "answer": "- Step 1: **Cite the PMCC**: \"$$r = 0.988$$, which is close to 1, indicating a strong positive linear correlation.\"\n- Step 2: **Cite the scatter diagram**: \"The points on the scatter diagram lie close to a straight line with no obvious curve or fanning.\"\n- Step 3: **Conclude**: \"Therefore, a linear regression model is suitable for describing the relationship between $$x$$ and $$y$$ within the observed range.\"\n\nBoth pieces of evidence are required. Omitting either loses a mark. Also, always qualify with \"within the observed range\" — suitability doesn't extend to extrapolation.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": false}, {"question": "S1 Jan 2023 — What is the mental model for conditional probability that prevents the most common errors? (3 steps)", "answer": "- Step 1: **Visualise the number line or sample space**. Draw the full space, then shade the conditioning event B. Everything outside B is gone — it never happened.\n- Step 2: **Intersect A with B**. The numerator is not P(A) — it's P(A ∩ B). In Q5(e), \"L > 5\" intersects with \"not outlier\" to give \"5 < L < 5.58.\" In Q2(d), \"all G\" is already a subset of \"same colour,\" so P(A ∩ B) = P(A).\n- Step 3: **Divide by P(B)**. This rescales so the probability within the restricted space sums to 1. P(B) often comes from a previous part — don't recompute it.\n\nThe mantra: \"conditioning = zoom in, intersect, then rescale.\"", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": true}, {"question": "S1 Jan 2023 — What is a quick sanity check for your interpolation answer, and how does it catch errors? (2 steps)", "answer": "- Step 1: The interpolated value must lie **within the class boundaries**. If you're interpolating inside 10–14 and get 9.5 or 15.2, something is wrong.\n- Step 2: The value should be closer to the boundary where the cumulative frequency is closer to the target position. Q₁ at position 25 is 15/16 of the way through the 10–14 class (since $$F_{\\text{before}} = 10$$ and position 25 is 15 into the class of 16). So the answer should be near the upper end: $$10 + \\frac{15}{16} \\times 4 = 13.75$$ — yes, close to 14. If you got 10.5, you'd know the fraction was wrong.\n\nThis directional check catches the most common interpolation errors (wrong class, wrong fraction, cumulative vs class frequency in denominator).", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": false}], "count": 58}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "S1 Jan 2023 Q1 — Before calculating any statistics from a histogram, what must you always reconstruct and verify? (2 steps)", "answer": "- Step 1: You must reconstruct the missing class frequencies using the relationship $$\\text{Frequency} = \\text{Frequency Density} \\times \\text{Class Width}$$. The given classes fix the frequency-density scale, allowing you to find the missing bars.\n- Step 2: You must verify that the sum of all class frequencies equals the total population $$n$$ (e.g., $$10 + 16 + 24 + 28 + 22 = 100$$). If they don't sum to $$n$$, your histogram reading is wrong and all subsequent calculations will fail.\n\nNever attempt mean, SD, or interpolation questions until the frequency table is complete and verified.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "S1 Jan 2023 Q1 — When reading a histogram to find frequencies, what is the common pitfall regarding bar height vs. bar area?", "answer": "The pitfall is reading the frequency directly from the bar height (the y-axis). In a histogram, the y-axis is **frequency density**, not frequency. The frequency is represented by the **area** of the bar ($$\\text{Density} \\times \\text{Width}$$). Reading the height alone ignores the width of the class interval, leading to drastically wrong frequencies, especially for wide classes.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "S1 Jan 2023 Q1(b) — When asked to estimate the frequency within a portion of a class (e.g., people taking between 14 and 16 minutes in a 14–18 class), what assumption do you make and what is the calculation strategy? (2 steps)", "answer": "- Step 1: Assume the data is uniformly distributed within the class. This means the frequency is proportional to the interval length.\n- Step 2: Calculate the fraction of the class width that the portion represents, and multiply by the total class frequency. For example, for 14–16 inside a 14–18 class: $$\\frac{16-14}{18-14} = \\frac{2}{4} = \\frac{1}{2}$$, so the frequency is $$\\frac{1}{2} \\times 24 = 12$$.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "S1 Jan 2023 Q1(c) — When estimating the mean from grouped data, how do you find the midpoint of a class interval, and what is the common pitfall for classes like 5–10?", "answer": "The midpoint is the average of the lower and upper class boundaries: $$\\frac{\\text{Lower} + \\text{Upper}}{2}$$. \nThe common pitfall for a class like 5–10 is incorrectly assuming the midpoint is 7 or 8 by counting integers. Because the data is continuous/grouped, the true boundaries are 5 and 10, making the midpoint exactly $$\\frac{5+10}{2} = 7.5$$.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "S1 Jan 2023 Q1(d) — Given $$\\sum ft^2$$ and the mean $$\\bar{t}$$, what formula do you use for the standard deviation, and what is the final-step pitfall?", "answer": "Use the frequency form of the standard deviation formula: $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar{t}^{\\,2}}$$.\nThe final-step pitfall is forgetting to take the square root. The formula calculates the variance $$\\sigma^2$$ first; you must explicitly apply the square root to report the standard deviation $$\\sigma$$. Always state the final answer to 3 significant figures with units.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "S1 Jan 2023 Q1(e) — For grouped data, what position formula do you use to find the lower quartile, and what is the common misapplication from discrete data?", "answer": "For grouped (continuous) data, use $$\\frac{n}{4}$$ directly to find the quartile position. The common misapplication is using the discrete data formula $$\\frac{n+1}{4}$$. For $$n=100$$, grouped data uses position 25, not 25.25. The linear interpolation formula relies on the continuous assumption, so the fractional position is unnecessary and incorrect.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "S1 Jan 2023 Q1(e) — When setting up the linear interpolation formula $$Q_1 = L + \\frac{n/4 - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$, what is the common pitfall regarding the denominator $$f_{\\text{class}}$$?", "answer": "The pitfall is using the cumulative frequency of the class instead of the class frequency. The denominator $$f_{\\text{class}}$$ must be the frequency of **only the class containing the quartile** (e.g., 16 for the 10–14 class), not the cumulative frequency up to that point (e.g., 26). The interpolation assumes the $$f_{\\text{class}}$$ items are spread uniformly across the width $$w$$.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "S1 Jan 2023 Q1(e) — How do you locate the correct class for the lower quartile when working with a cumulative frequency table? (2 steps)", "answer": "- Step 1: Calculate the quartile position ($$\\frac{n}{4} = 25$$) and scan down the cumulative frequencies.\n- Step 2: Find the class where the cumulative frequency **first exceeds or equals** the position. The 25th value falls in the class where the cumulative frequency jumps from 10 to 26 (the 10–14 class). It does not fall in the previous class just because 10 is close to 25.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "S1 Jan 2023 Q2 — In marble-transfer problems, what is the critical error regarding the destination bag's composition for the final draw?", "answer": "The critical error is forgetting to update the total number of marbles in the destination bag. If two marbles are transferred into bag Y, the total for the third draw becomes the original total plus 2 (e.g., $$11 + 2 = 13$$), not the original 11. The denominator of the final draw probability must reflect the new total.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "S1 Jan 2023 Q2 — When drawing a tree diagram for a problem where items are transferred between containers without replacement, what must you recompute for every single branch?", "answer": "You must recompute the **composition (both numerator and denominator)** of the source bag for every subsequent draw. Because items are removed and transferred, the number of green/blue marbles changes depending on the outcome of the previous draw, and the total number of marbles decreases. You cannot carry over a single probability across branches.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "S1 Jan 2023 Q2(c) — When calculating the probability that all 3 marbles selected are the same colour, what is the strategic shortcut to avoid calculating all 8 branches of the tree?", "answer": "Recognize that \"all same colour\" can only happen via two specific, pure paths: the **GG → G** path (all green) and the **BB → B** path (all blue). The mixed paths (GB or BG) cannot result in \"all same colour\" for the third draw. You only need to calculate the probabilities for these two pure paths and sum them.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "S1 Jan 2023 Q2(d) — Given \"all three marbles are the same colour,\" you must find P(all green | same). What is the key realization about the relationship between \"all green\" and \"same colour\" that simplifies the conditional probability formula?", "answer": "The event \"all green\" is a **subset** of the event \"same colour\". Because of this subset relationship, $$P(\\text{all green} \\cap \\text{same colour}) = P(\\text{all green})$$. The conditional probability formula simplifies from $$\\frac{P(A \\cap B)}{P(B)}$$ to just $$\\frac{P(\\text{all green})}{P(\\text{same colour})}$$. You do not need to calculate a complex intersection.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "S1 Jan 2023 Q3 — When a discrete random variable has a parameter 'a' representing a probability (e.g., $$P(X=2) = a$$ and $$P(X=4) = 0.6-a$$), what constraint must you explicitly state before doing any calculations?", "answer": "You must state the validity constraint for probabilities: every probability must be between 0 and 1. For $$0.6 - a \\ge 0$$, we get $$a \\le 0.6$$. Combined with $$a \\ge 0$$, the constraint is $$0 \\le a \\le 0.6$$. Stating this explicitly is a mark in itself and is essential for checking roots later.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "S1 Jan 2023 Q3(b) — If $$E(X)$$ is expressed as a linear function of parameter 'a' (e.g., $$E(X) = 3.6 - 2a$$), how do you find the range of possible values for $$E(X)$$? (2 steps)", "answer": "- Step 1: Identify the constraint on 'a' (e.g., $$0 \\le a \\le 0.6$$).\n- Step 2: Evaluate $$E(X)$$ at the boundary values of 'a'. Because $$E(X)$$ is linear and decreasing in 'a' (due to the $$-2a$$), the maximum $$E(X)$$ occurs at the minimum 'a' (0), and the minimum $$E(X)$$ occurs at the maximum 'a' (0.6).", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "S1 Jan 2023 Q3(c) — When substituting $$E(X)$$ into the variance formula $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$, what is the critical algebraic trick to avoid sign errors? (2 steps)", "answer": "- Step 1: Write out the full substitution with the squared term in a **bracket** first: $$0.56 = (13.2 - 12a) - (3.6 - 2a)^2$$.\n- Step 2: Expand the bracket separately before distributing the minus sign. $$(3.6 - 2a)^2 = 12.96 - 14.4a + 4a^2$$. Only then subtract term-by-term. Never attempt to distribute the minus sign into the unexpanded bracket in your head; this is where sign errors universally occur.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "S1 Jan 2023 Q3(c) — After solving a quadratic to find possible values of a probability parameter 'a', what is the mandatory final step that earns its own mark?", "answer": "You must **check both roots against the validity constraint** (e.g., $$0 \\le a \\le 0.6$$). Examiners frequently rig these questions so one root falls outside the valid probability range. You must explicitly state which roots are valid and which are rejected, even if both happen to survive.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "S1 Jan 2023 Q4(i) — What does the notation $$(A \\cap B') \\cup (A' \\cap B)$$ represent in a Venn diagram, and what is the common misinterpretation?", "answer": "It represents the **symmetric difference** (often denoted $$A \\triangle B$$), which is the regions belonging to exactly one of the events (the non-overlapping parts of the circles). The common misinterpretation is reading it as $$A \\cup B$$ (the union, which would include the intersection $$A \\cap B$$). The given expression explicitly excludes the intersection.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "S1 Jan 2023 Q4(i)(a) — You are given $$P(A)$$, $$P(B)$$, and $$P((A \\cap B') \\cup (A' \\cap B))$$. What is the first algebraic step to show a relationship between the Venn regions $$p, q, r$$?", "answer": "Translate the given probabilities into sums of the Venn regions:\n+ $$p + q = P(A)$$\n+ $$q + r = P(B)$$\n+ $$p + r = P((A \\cap B') \\cup (A' \\cap B))$$\nAdding all three equations together yields $$2p + 2q + 2r$$, which allows you to solve for the sum of the regions inside the circles.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "S1 Jan 2023 Q4(ii) — You must show that events C and D cannot be mutually exclusive. What necessary condition for mutual exclusivity should you assume and then contradict?", "answer": "If C and D are mutually exclusive, then $$P(C \\cap D) = 0$$, which implies $$P(C \\cup D) = P(C) + P(D)$$. Since any probability is at most 1, mutual exclusivity **forces** the necessary condition $$P(C) + P(D) \\le 1$$. To prove they cannot be mutually exclusive, you just need to show that $$P(C) + P(D) > 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "S1 Jan 2023 Q4(ii) — Adding $$P(C) + P(D)$$ yields the fraction $$\\frac{x^2 + 5x + 25}{x^2 + 5x}$$. What algebraic restructuring trick makes it immediately obvious this exceeds 1, avoiding complex quadratic inequalities?", "answer": "Recognize that the numerator is the denominator plus 25. Rewrite the fraction as:\n$$\\frac{(x^2 + 5x) + 25}{x^2 + 5x} = 1 + \\frac{25}{x^2 + 5x}$$\nSince $$x$$ is positive, the denominator $$x^2 + 5x > 0$$, making the fraction $$\\frac{25}{x^2+5x}$$ strictly positive. Therefore, the entire expression is strictly greater than 1, instantly proving the contradiction.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "S1 Jan 2023 Q5(b) — What specific z-value must you memorize for the upper quartile of a normal distribution, and what is the common rounding pitfall?", "answer": "The upper quartile z-value is **0.6745** (corresponding to $$\\Phi(z) = 0.75$$). The common pitfall is rounding this to 0.67. Using 0.67 introduces a significant error that propagates through the outlier limits and conditional probability calculations in later parts of the question, causing final answers to be marked wrong.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "S1 Jan 2023 Q5(d) — The question says \"Using standardisation, show that the probability... is 0.993\". What does the mark scheme demand you explicitly show?", "answer": "You must explicitly show the **z-values** for the upper and lower limits. Calculate $$Z_{upper} = \\frac{\\text{Upper Limit} - \\mu}{\\sigma}$$ and $$Z_{lower} = \\frac{\\text{Lower Limit} - \\mu}{\\sigma}$$. Just stating the final probability or skipping the z-value calculations will lose method marks, as the phrase \"using standardisation\" requires seeing the transformation to the standard normal.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "S1 Jan 2023 Q5(e) — You need to find $$P(L > 5 \\mid \\text{not outlier})$$. What is the most critical step before standardising the numerator?", "answer": "You must **intersect the event with the conditioning band**. \"Not outlier\" restricts $$L$$ to the band $$3.42 < L < 5.58$$. Therefore, the numerator is not $$P(L > 5)$$, but rather $$P(5 < L < 5.58)$$. You must cap the upper limit of your event at the boundary of the conditioning band before applying standardisation.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "S1 Jan 2023 Q5(e) — In conditional normal probability questions, what is the dangerous mistake regarding the numerator $$P(A \\cap B)$$?", "answer": "The dangerous mistake is using $$P(A)$$ instead of $$P(A \\cap B)$$. If event A is \"$$L > 5$$\" and event B is \"not outlier\", $$A$$ is **not** a subset of $$B$$ (because $$L$$ could be greater than 5 but also greater than the upper outlier limit). You cannot assume $$P(A \\cap B) = P(A)$$. You must calculate the intersection, which is the probability of being in the overlap of the two conditions.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "S1 Jan 2023 Q6(a) — When asked to interpret the gradient of a regression line, what three elements must your answer contain?", "answer": "Your answer must contain:\n1. The **change in the dependent variable** (y) per unit change in the independent variable (x).\n2. The **units** of the variables (e.g., \"grams per °C\").\n3. The phrase **\"on average\"** or \"approximately\", because the regression line is a model of the mean trend, not an exact physical law.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "S1 Jan 2023 Q6(c) — If a regression line estimate is made at $$x = 90$$ but the data range is $$10 \\le x \\le 80$$, why is the estimate unreliable despite a very high PMCC?", "answer": "The estimate is unreliable because it requires **extrapolation** outside the observed data range. A high PMCC ($$r \\approx 0.988$$) only indicates a strong linear relationship *within* the observed range. There is no evidence that the linear relationship continues to hold beyond $$x = 80$$; the underlying physical process (like sugar solubility) could plateau or change behaviour entirely.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "S1 Jan 2023 Q6(d) — Some summary statistics like $$\\sum x$$ appear missing. How can you recover $$\\sum x$$ using the regression line? (2 steps)", "answer": "- Step 1: Calculate $$\\bar{y}$$ from the given $$\\sum y$$ and $$n$$ ($$\\bar{y} = \\frac{\\sum y}{n}$$).\n- Step 2: Use the fact that the regression line always passes through the mean point $$(\\bar{x}, \\bar{y})$$. Substitute $$\\bar{y}$$ and the line equation $$y = a + bx$$ to solve for $$\\bar{x}$$: $$\\bar{x} = \\frac{\\bar{y} - a}{b}$$. Then multiply by $$n$$ to get $$\\sum x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "S1 Jan 2023 Q6(d) — When calculating the PMCC from summary statistics, what is the systematic approach to avoid precision loss and calculation errors?", "answer": "Calculate $$S_{xx}$$, $$S_{yy}$$, and $$S_{xy}$$ as **three separate, labelled lines** before attempting the final division. \n+ $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$\n+ $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$\n+ $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$\nNever try to compute $$r$$ in a single mashed expression. Computing them separately prevents precision loss and makes it easy to spot errors.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "S1 Jan 2023 Q6(e) — When asked to discuss the suitability of a linear regression model with reference to both a scatter diagram and the correlation coefficient, what must you cite to get full marks?", "answer": "You must cite **both**:\n1. The **numerical value** of the PMCC (e.g., \"$$r = 0.988$$ indicates a strong positive linear correlation\").\n2. The **visual evidence** from the scatter diagram (e.g., \"points lie close to a straight line with no obvious curve\").\nQuoting only the PMCC or only the scatter diagram loses a mark. Both pieces of evidence must support the conclusion of suitability.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}], "count": 29}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "When a histogram question gives you some class frequencies but leaves others blank, what must you do *before* attempting any other part of the question, and why? (2 steps)", "answer": "- Step 1: You must reconstruct all missing frequencies first, using the relationship $$\\text{frequency} = \\text{frequency density} \\times \\text{class width}$$. The known classes fix the frequency-density scale, which lets you read off the remaining bars.\n- Step 2: Once all frequencies are found, verify they sum to the stated total (e.g., 100). If they don't, you've misread a bar — and every subsequent part (cumulative tables, mean, quartiles) will be wrong.\n\nWithout complete frequencies, you cannot build the cumulative-frequency table, and interpolation becomes impossible.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "What is the common pitfall when reading values off a histogram, and why does it happen? (2 steps)", "answer": "- Step 1: The pitfall is reading the *bar height* (frequency density) as if it were the frequency itself. This happens because for uniform-width bar charts, height equals frequency — but histograms have varying class widths.\n- Step 2: In a histogram, the *area* of each bar represents frequency. A tall, narrow bar can have a smaller frequency than a short, wide bar. You must always compute $$f = \\text{FD} \\times w$$ rather than reading height directly.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "To estimate how many observations fall within part of a class (e.g., the portion $$14 \\le t < 16$$ inside the class 14–18 with frequency 24), what assumption do you make and what calculation do you perform? (2 steps)", "answer": "- Step 1: You assume observations are *uniformly distributed* within the class — i.e., spread evenly across the class width.\n- Step 2: Calculate the fraction of the class width covered: $$\\frac{16 - 14}{18 - 14} = \\frac{2}{4} = \\frac{1}{2}$$, then multiply by the class frequency: $$\\frac{1}{2} \\times 24 = 12$$. Add this to the cumulative frequency from all classes below.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "When estimating the mean from grouped data, how do you compute the class midpoint, and what subtlety arises for classes like 5–10? (2 steps)", "answer": "- Step 1: The midpoint is $$\\frac{\\text{lower boundary} + \\text{upper boundary}}{2}$$. For 5–10 this gives $$\\frac{5+10}{2} = 7.5$$, not 7 (which would be the midpoint of 5, 6, 7, 8, 9, 10 as discrete values).\n- Step 2: For continuous grouped data, always use the boundary values directly. The class 5–10 means $$5 \\le t < 10$$, so the midpoint is 7.5. Similarly, 18–25 gives $$\\frac{18+25}{2} = 21.5$$.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "When the question gives you $$\\sum ft^2$$ and asks for the standard deviation, what formula do you use, and what is the common mistake in the final step? (2 steps)", "answer": "- Step 1: Use $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar{t}^{\\,2}}$$. This is the frequency-form version of $$\\text{Var} = E(X^2) - [E(X)]^2$$.\n- Step 2: The common mistake is reporting the *variance* $$\\sigma^2$$ instead of the *standard deviation* $$\\sigma$$. The question asks for standard deviation, so you must take the square root at the end. Always read whether they want sd or variance.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "For grouped data quartiles in Edexcel S1, what position value do you use, and what is the common wrong alternative? (2 steps)", "answer": "- Step 1: Use $$\\frac{n}{4}$$ directly. For $$n = 100$$, the lower quartile position is $$\\frac{100}{4} = 25$$.\n- Step 2: The common wrong alternative is $$\\frac{n+1}{4}$$ (giving 25.25), which is the rule for *discrete* data. IAL grouped/continuous data always uses $$\\frac{n}{4}$$. Using the wrong one shifts your interpolated value slightly and loses the mark.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "Before performing linear interpolation for a quartile, what table must you construct, and how do you identify which class contains the quartile? (2 steps)", "answer": "- Step 1: Construct a cumulative frequency table showing $$F$$ at the upper boundary of each class. For example, class 5–10 has $$F = 10$$; class 10–14 has $$F = 26$$; class 14–18 has $$F = 50$$.\n- Step 2: Find where the quartile position falls. For $$Q_1$$ with position 25: the cumulative jumps from 10 to 26 across the class 10–14, so the 25th value lies *inside* 10–14. You then interpolate within that class — not in 5–10 (which only reaches value 10).", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "In the linear interpolation formula $$Q = L + \\frac{kn/4 - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$, what is the denominator $$f_{\\text{class}}$$, and what is the common mistake? (2 steps)", "answer": "- Step 1: The denominator $$f_{\\text{class}}$$ is the *class frequency* — the number of observations in that specific class. For class 10–14 with frequency 16, the denominator is 16.\n- Step 2: The common mistake is using the *cumulative frequency* instead. For class 10–14, the cumulative frequency at the upper boundary is 26, but that counts all observations up to that point — it is not the number of observations *in* the class. The interpolation assumes uniform spread within the class, so only the class frequency matters.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "Q1(e) S1 Jan 2023 — The question gives you $$Q_3 = 23$$ and asks you to find the IQR. What is the strategic reason the examiners hand you $$Q_3$$ instead of making you calculate it? (2 steps)", "answer": "- Step 1: The class containing $$Q_3$$ (position 75) is 18–25, which has a large width and would require interpolation with many decimal places. The examiners are saving you from a messy calculation and testing whether you can correctly interpolate $$Q_1$$ in the cleaner 10–14 class.\n- Step 2: The lesson: when a question gives you a value \"for free,\" accept it and move on. Don't re-derive it. Focus your effort on the part they're actually testing — here, the $$Q_1$$ interpolation and the IQR subtraction.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "When marbles are transferred *without replacement* from one bag to another, what happens to the composition of the receiving bag, and what is the critical error to avoid? (2 steps)", "answer": "- Step 1: Each transferred marble *adds* to the receiving bag. If bag Y starts with 11 marbles and 2 marbles are transferred in, Y now has 13 marbles. The denominator for the third draw is 13, not 11.\n- Step 2: The critical error is treating the receiving bag as if its total hasn't changed — using 11 as the denominator for the third draw. You must recompute the total and the colour split for every branch of the tree.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "In a marble-transfer tree diagram, why is $$P(G_3)$$ different on different branches, and what are the three possible values? (2 steps)", "answer": "- Step 1: $$P(G_3)$$ depends on *what was transferred* into bag Y, because the transferred marbles change Y's composition. Each branch of the tree leads to a different Y composition.\n- Step 2: The three values are:\n+ After GG transferred → Y has 8G, 5B → $$P(G_3) = \\frac{8}{13}$$\n+ After GB or BG transferred → Y has 7G, 6B → $$P(G_3) = \\frac{7}{13}$$\n+ After BB transferred → Y has 6G, 7B → $$P(G_3) = \\frac{6}{13}$$\n\nUsing a single value of $$P(G_3)$$ across all branches is a mark-losing error.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "To find the probability that two marbles drawn without replacement from the same bag are of different colours, what two paths do you consider, and why can't you just multiply by 2 automatically? (2 steps)", "answer": "- Step 1: The two paths are $$P(G_1 B_2)$$ and $$P(B_1 G_2)$$. You compute each separately because the conditional probabilities differ: after drawing G first, $$P(B_2|G_1) = \\frac{4}{8}$$; after drawing B first, $$P(G_2|B_1) = \\frac{5}{8}$$.\n- Step 2: You can only \"multiply by 2\" if the two paths are symmetric (same probability). Here $$P(G_1 B_2) = \\frac{5}{9} \\times \\frac{4}{8}$$ and $$P(B_1 G_2) = \\frac{4}{9} \\times \\frac{5}{8}$$, which happen to give the same value $$\\frac{20}{72}$$, so the total is $$\\frac{40}{72} = \\frac{5}{9}$$. But always verify symmetry before shortcutting.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "When computing $$P(\\text{all three same colour})$$ in a marble-transfer problem, which branches of the tree contribute, and why? (2 steps)", "answer": "- Step 1: Only the \"pure\" branches contribute: the GG path leading to a green third draw ($$P(GGG)$$), and the BB path leading to a blue third draw ($$P(BBB)$$).\n- Step 2: The mixed branches (GB and BG) put one green and one blue into Y, making the third draw unlikely to match *both* previous colours simultaneously. Since \"all three same\" requires all green *or* all blue, the mixed branches cannot produce \"all same\" — only the pure GG→G₃ and BB→B₃ paths contribute.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Q2(d) S1 Jan 2023 — When computing $$P(\\text{all green} \\mid \\text{all same colour})$$, what simplification occurs because \"all green\" is a subset of \"all same colour\"? (2 steps)", "answer": "- Step 1: The conditional probability formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. When $$A \\subset B$$, the intersection $$A \\cap B$$ is just $$A$$ itself, so the formula simplifies to $$P(A \\mid B) = \\frac{P(A)}{P(B)}$$.\n- Step 2: Here, \"all green\" is a subset of \"all same colour\" (since all green implies all same). So $$P(\\text{all G} \\mid \\text{same}) = \\frac{P(\\text{all G})}{P(\\text{same})} = \\frac{160/936}{244/936} = \\frac{160}{244} = \\frac{40}{61}$$. The common denominator cancels cleanly.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "When a discrete random variable has probabilities expressed in terms of a parameter $$a$$ (e.g., $$P(X=2) = a$$, $$P(X=3) = 0.4$$, $$P(X=4) = 0.6-a$$), what constraint must you state before doing anything else, and why? (2 steps)", "answer": "- Step 1: Every probability must lie in $$[0, 1]$$. This gives $$a \\ge 0$$ and $$0.6 - a \\ge 0$$, so $$0 \\le a \\le 0.6$$. Note that the sum-to-1 condition is automatically satisfied here ($$a + 0.4 + 0.6 - a = 1$$), but the bounds on individual probabilities give you the constraint.\n- Step 2: This constraint is examined directly — it earns its own mark, and any roots of a quadratic that fall outside this range must be rejected. Stating it explicitly at the start shows the examiner you know the domain.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "To find the range of possible values of $$E(X)$$ when $$E(X)$$ is expressed as a linear function of a parameter $$a$$ with known bounds, what shortcut can you use? (2 steps)", "answer": "- Step 1: Since $$E(X) = 3.6 - 2a$$ is *linear* in $$a$$, it is monotonic (decreasing, because the coefficient of $$a$$ is negative). So the maximum and minimum of $$E(X)$$ occur at the endpoints of the constraint interval.\n- Step 2: Evaluate at the extremes: $$a = 0$$ gives $$E(X) = 3.6$$ (maximum), and $$a = 0.6$$ gives $$E(X) = 2.4$$ (minimum). The range is $$2.4 \\le E(X) \\le 3.6$$. No calculus or vertex-finding needed — just plug in the endpoints.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "When setting up a variance equation $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$ with a parameter, what is the most common algebraic error, and how do you avoid it? (3 steps)", "answer": "- Step 1: The most common error is a sign mistake when subtracting $$[E(X)]^2$$. For example, with $$E(X) = 3.6 - 2a$$, you need to compute $$[E(X)]^2 = (3.6 - 2a)^2 = 12.96 - 14.4a + 4a^2$$, then subtract the *entire* expanded expression.\n- Step 2: The safe method: bracket the squared term, expand it *separately* on its own line, then substitute. Never try to distribute the minus sign while expanding in your head.\n+ Wrong: $$\\ldots - 12.96 + 14.4a - 4a^2$$ (signs easily confused mid-calculation)\n+ Right: Write $$(3.6-2a)^2 = 12.96 - 14.4a + 4a^2$$ on one line, then subtract all three terms on the next.\n- Step 3: After substitution, collect like terms carefully. Every term from the squared bracket flips sign. The result should simplify to a clean quadratic in $$a$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "After solving a quadratic that arose from a variance equation, what final step must you always perform, and why? (2 steps)", "answer": "- Step 1: Check each root against the validity constraint (e.g., $$0 \\le a \\le 0.6$$). Any root outside this range is invalid because it would make a probability negative or greater than 1.\n- Step 2: Examiners frequently rig the quadratic so that one root falls outside the valid range. Even when both roots survive (as with $$a = 0.2$$ and $$a = 0.4$$), writing the explicit check earns the mark. Omitting it loses the mark regardless.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "What is the key difference between $$E(X^2)$$ and $$[E(X)]^2$$, and why does confusing them destroy the variance calculation? (2 steps)", "answer": "- Step 1: $$E(X^2) = \\sum x^2 P(X=x)$$ — you square the outcomes first, then take the weighted average. $$[E(X)]^2$$ is the square of the *mean* — you average first, then square.\n- Step 2: By Jensen's inequality (or simply algebra), $$E(X^2) \\ge [E(X)]^2$$ always, with equality only when $$X$$ is constant. The variance is the gap between them: $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$. If you compute $$[E(X)]^2$$ but label it $$E(X^2)$$, the variance comes out as zero — a dead giveaway that you've made this error.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "In a Venn diagram with regions $$p = P(A \\cap B')$$, $$q = P(A \\cap B)$$, $$r = P(A' \\cap B)$$, $$s = P(A' \\cap B')$$, what does the expression $$(A \\cap B') \\cup (A' \\cap B)$$ represent, and what is its probability in terms of the regions? (2 steps)", "answer": "- Step 1: This is the *symmetric difference* $$A \\triangle B$$ — the set of elements in exactly one of A or B, but not both. In the Venn diagram, it corresponds to the two non-overlapping crescent regions.\n- Step 2: Its probability is $$p + r$$ (the A-only region plus the B-only region). The common mistake is reading it as $$A \\cup B$$ (which would be $$p + q + r$$) or as $$A \\cap B$$ (which would be $$q$$). Recognising the symmetric difference is the key to translating the given equation.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "Q4(i)(a) S1 Jan 2023 — You're given three equations: $$p+q = \\frac{7}{25}$$, $$q+r = \\frac{5}{25}$$, $$p+r = \\frac{8}{25}$$. The question asks you to show that $$2p + 2q + 2r = \\frac{4}{5}$$. What is the strategy? (2 steps)", "answer": "- Step 1: Add all three equations together. The left side becomes $$(p+q) + (q+r) + (p+r) = 2p + 2q + 2r$$, because each of $$p, q, r$$ appears in exactly two of the three equations.\n- Step 2: The right side becomes $$\\frac{7}{25} + \\frac{5}{25} + \\frac{8}{25} = \\frac{20}{25} = \\frac{4}{5}$$. This proves the result directly — no need to solve for individual variables first.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "After proving $$p + q + r = \\frac{2}{5}$$, how do you efficiently find the individual region $$q = P(A \\cap B)$$ using the relationship $$P(A) + P(B) = (p+q+r) + q$$? (2 steps)", "answer": "- Step 1: Observe that $$P(A) + P(B) = (p+q) + (q+r) = p + 2q + r = (p+q+r) + q$$. This isolates $$q$$ in terms of known quantities.\n- Step 2: Substitute: $$\\frac{7}{25} + \\frac{5}{25} = \\frac{10}{25} + q$$, so $$q = \\frac{12}{25} - \\frac{10}{25} = \\frac{2}{25}$$. Once $$q$$ is known, $$p$$ and $$r$$ follow from the original equations, and $$s = 1 - (p+q+r)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "How do you find $$s = P(A' \\cap B')$$ in a Venn diagram once you know $$p, q, r$$? (1 step reasoning)", "answer": "Since the four regions of a Venn diagram partition the entire sample space, they sum to 1: $$p + q + r + s = 1$$. Therefore $$s = 1 - (p + q + r)$$. With $$p + q + r = \\frac{10}{25}$$, we get $$s = 1 - \\frac{10}{25} = \\frac{15}{25} = \\frac{3}{5}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "Q4(ii) S1 Jan 2023 — When asked to show that two events C and D *cannot* be mutually exclusive, what logical structure does the proof follow? (2 steps)", "answer": "- Step 1: Assume the opposite (that C and D *are* mutually exclusive). Then $$P(C \\cup D) = P(C) + P(D) \\le 1$$, since any probability is at most 1. This gives the necessary condition: mutual exclusivity *forces* $$P(C) + P(D) \\le 1$$.\n- Step 2: Compute $$P(C) + P(D)$$ and show it *exceeds* 1 for all valid values of the parameter. This contradicts the necessary condition, so the assumption is false — C and D cannot be mutually exclusive.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "When computing $$P(C) + P(D) = \\frac{x}{x+5} + \\frac{5}{x}$$ and combining over a common denominator, what algebraic trick makes the inequality obvious immediately? (3 steps)", "answer": "- Step 1: Combine to a single fraction: $$\\frac{x^2 + 5(x+5)}{x(x+5)} = \\frac{x^2 + 5x + 25}{x^2 + 5x}$$.\n- Step 2: Recognise the numerator is the denominator plus 25: $$x^2 + 5x + 25 = (x^2 + 5x) + 25$$. So rewrite as $$\\frac{(x^2 + 5x) + 25}{x^2 + 5x} = 1 + \\frac{25}{x^2 + 5x}$$.\n- Step 3: For $$x > 0$$, the term $$x^2 + 5x > 0$$, so $$\\frac{25}{x^2+5x} > 0$$. Therefore $$P(C) + P(D) = 1 + (\\text{something positive}) > 1$$. No quadratic-inequality machinery needed — the restructuring makes it obvious.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "Why can't you use a quadratic-inequality approach (e.g., finding where $$P(C) + P(D) \\le 1$$) as an alternative to the algebraic restructuring trick in the mutual exclusivity proof? (2 steps)", "answer": "- Step 1: You *could* set up $$\\frac{x^2 + 5x + 25}{x^2 + 5x} \\le 1$$ and simplify to $$25 \\le 0$$, which is never true. But this requires multiplying through by $$x^2 + 5x$$ and carefully tracking the sign — more steps, more room for error.\n- Step 2: The restructuring trick (writing the sum as $$1 + \\frac{25}{N}$$) is faster and more elegant because it bypasses inequality manipulation entirely. It immediately reveals the sum is always strictly greater than 1. In an exam, the simpler route is the safer route.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "For the normal distribution, what z-value corresponds to the upper quartile $$Q_3$$ (i.e., $$P(Z < z) = 0.75$$), and why must you memorise it? (2 steps)", "answer": "- Step 1: The z-value is $$z = 0.6745$$. This is the value of $$\\Phi^{-1}(0.75)$$ from the standard normal tables.\n- Step 2: You must memorise it because it is *not* directly listed in most Edexcel formula tables in an obvious way. Using the rounded value 0.67 introduces error that propagates through subsequent calculations (outlier limits, conditional probabilities). The examiners expect 0.6745.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "How do you convert between quartiles of a general normal distribution $$X \\sim N(\\mu, \\sigma^2)$$ and the standard normal? (2 steps)", "answer": "- Step 1: To find a quartile of $$X$$, use the inverse standardisation: $$Q_k = \\mu + z_k \\cdot \\sigma$$, where $$z_k$$ is the corresponding standard-normal quartile value.\n- Step 2: For $$Q_3$$: $$z_{Q_3} = 0.6745$$, so $$Q_3 = \\mu + 0.6745\\sigma$$. For $$Q_1$$: $$z_{Q_1} = -0.6745$$, so $$Q_1 = \\mu - 0.6745\\sigma$$. The IQR is $$Q_3 - Q_1 = 2 \\times 0.6745\\sigma \\approx 1.349\\sigma$$.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "What are the two outlier limits in terms of quartiles, and what is the underlying logic? (2 steps)", "answer": "- Step 1: The upper limit is $$Q_3 + 1.5 \\times \\text{IQR}$$ and the lower limit is $$Q_1 - 1.5 \\times \\text{IQR}$$. Values beyond these limits are classified as outliers.\n- Step 2: The logic is that the IQR captures the middle 50% of the data. Extending 1.5 IQR beyond each quartile creates a \"fence\" — observations outside the fence are considered unusually extreme. The factor 1.5 is a convention (Tukey's rule) that corresponds roughly to $$\\mu \\pm 2.7\\sigma$$ for normal data.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "Q5(d) S1 Jan 2023 — The question says \"Using standardisation, show that $$P(\\text{not outlier}) = 0.993$$.\" What does the phrase \"using standardisation\" require you to show? (2 steps)", "answer": "- Step 1: You must explicitly compute the z-values for both outlier limits: $$Z_{\\text{upper}} = \\frac{5.5792 - 4.5}{0.4} = 2.698$$ and $$Z_{\\text{lower}} = \\frac{3.4208 - 4.5}{0.4} = -2.698$$. Simply stating the answer without showing these z-values loses marks.\n- Step 2: Then use the standard normal table: $$P(-2.698 < Z < 2.698) = P(Z < 2.70) - P(Z < -2.70) = 0.9965 - 0.0035 = 0.9930$$. The symmetry ($$z = \\pm 2.698$$) is a sanity check that your quartile calculations were correct.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "Q5(e) S1 Jan 2023 — When computing $$P(L > 5 \\mid \\text{not outlier})$$, what is the single most important step that most students get wrong? (2 steps)", "answer": "- Step 1: You must *intersect* the event \"$$L > 5$$\" with the conditioning event \"not outlier\" ($$3.4208 < L < 5.5792$$) before standardising. The intersection is $$5 < L < 5.5792$$, *not* $$L > 5$$.\n- Step 2: The common mistake is using $$P(L > 5) = P(Z > 1.25) = 0.1056$$ as the numerator. But the conditioning event caps the upper end at 5.5792, so observations above 5.5792 are excluded. The correct numerator is $$P(1.25 < Z < 2.70) = 0.9965 - 0.8944 = 0.1021$$, giving $$\\frac{0.1021}{0.993} \\approx 0.103$$.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "Why is it wrong to treat Q5(e) as an \"inverse normal\" problem, and how should you recognise the correct framework? (2 steps)", "answer": "- Step 1: An inverse normal problem asks \"given a probability, find the value of the variable\" (e.g., \"find $$x$$ such that $$P(L < x) = 0.9$$\"). Q5(e) asks the *forward* question: \"given a condition, find a probability.\" It is a conditional probability problem, not an inverse-normal one.\n- Step 2: The correct framework is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. Write this down explicitly, identify $$A$$ and $$B$$, compute the intersection on the number line, then standardise. The trigger phrase \"given that\" should immediately make you reach for the conditional probability formula, not inverse-normal methods.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "Q5(e) and Q2(d) both involve conditional probability. What structural similarity do they share that should trigger the same approach? (2 steps)", "answer": "- Step 1: Both questions condition on an event that *restricts the sample space*: Q2(d) conditions on \"all same colour\" (which excludes mixed-colour outcomes), and Q5(e) conditions on \"not outlier\" (which excludes values outside the fence).\n- Step 2: In both cases, the event of interest is a *subset* of the conditioning event, so $$P(A \\cap B) = P(A)$$. The key action is the same: identify the restricted sample space, compute $$P(A)$$ within that restricted space, and divide by $$P(B)$$. Always intersect before standardising/computing.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "Q6(a) S1 Jan 2023 — When asked to \"give an interpretation of the gradient of the regression line,\" what three elements must your answer include? (2 steps)", "answer": "- Step 1: Your answer must include: (1) the *direction* of change (increase or decrease), (2) the *units* of both variables, and (3) the phrase \"on average\" (since the regression line is a model, not an exact law).\n- Step 2: Example: \"For every 1 °C increase in temperature, the maximum weight of sugar that dissolves in 100 g of water increases by approximately 2.72 grams, on average.\" Missing any of the three elements (units, \"on average,\" or direction) loses the mark.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": true}, {"question": "Q6(c) S1 Jan 2023 — When asked to comment on the reliability of an estimate obtained from a regression line, what is the key word you must use, and what reasoning supports it? (2 steps)", "answer": "- Step 1: The key word is **extrapolation**. You must state that the estimate is unreliable because the input value lies *outside the range of the data* used to build the model.\n- Step 2: The reasoning: the regression line is only valid within the observed data range ($$10 \\le x \\le 80$$). At $$x = 90$$, there is no evidence the linear relationship still holds — the underlying process may behave differently (e.g., sugar solubility could plateau). A high correlation coefficient does *not* license extrapolation.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "Why doesn't a high PMCC ($$r \\approx 0.988$$) make an extrapolated prediction reliable? (2 steps)", "answer": "- Step 1: The PMCC measures the strength of *linear* association *within the observed data range*. It says nothing about whether the relationship remains linear beyond that range.\n- Step 2: Even with $$r = 0.988$$, the true relationship could curve, plateau, or reverse outside the observed range. The high $$r$$ only tells you the line fits well *where you have data*. Reliability of prediction depends on whether you're interpolating (within range — reliable) or extrapolating (outside range — unreliable), not on the value of $$r$$.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": true}, {"question": "Q6(d) S1 Jan 2023 — When computing the PMCC from summary statistics, what three quantities must you calculate first, and in what order? (2 steps)", "answer": "- Step 1: Calculate the three sums of squares and cross-products separately and label each one:\n+ $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$\n+ $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$\n+ $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$\n- Step 2: Then compute $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. Never try to compute $$r$$ in a single mashed expression — intermediate rounding will destroy your precision, and you can't debug errors if everything is in one line.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "If the question gives you the regression line $$y = a + bx$$ and summary statistics for $$y$$ and $$x^2$$ but not $$\\sum x$$ or $$\\sum xy$$, how can you recover the missing quantities? (3 steps)", "answer": "- Step 1: Recover $$\\bar{y}$$ from the given data: $$\\bar{y} = \\frac{\\sum y}{n}$$. Then use the fact that the regression line passes through $$(\\bar{x}, \\bar{y})$$: $$\\bar{y} = a + b\\bar{x}$$, so $$\\bar{x} = \\frac{\\bar{y} - a}{b}$$. Then $$\\sum x = n\\bar{x}$$.\n- Step 2: Compute $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$ using the now-known $$\\sum x$$.\n- Step 3: Use the gradient relationship $$b = \\frac{S_{xy}}{S_{xx}}$$ to recover $$S_{xy} = b \\times S_{xx}$$. This gives you everything needed for the PMCC formula.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "What is the relationship $$b = \\frac{S_{xy}}{S_{xx}}$$ useful for beyond computing the gradient, and when should you deploy it? (2 steps)", "answer": "- Step 1: It serves as a *recovery tool*: if you know the gradient $$b$$ and can compute $$S_{xx}$$, then $$S_{xy} = b \\times S_{xx}$$. This is useful when $$\\sum xy$$ is not directly given but the regression line is.\n- Step 2: Deploy it when the question gives you the regression line equation and asks you to find the PMCC. You need $$S_{xy}$$ for the PMCC formula, and this relationship provides it without needing the raw $$\\sum xy$$ value. It's also a consistency check: if you *do* have $$\\sum xy$$, verify that $$b \\times S_{xx}$$ matches.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "Q6(e) S1 Jan 2023 — When discussing the suitability of a linear regression model, what two pieces of evidence must you cite, and what happens if you only mention one? (2 steps)", "answer": "- Step 1: You must cite *both*: (1) the PMCC value and what it indicates about linear correlation, and (2) the scatter diagram — specifically that points lie close to a straight line with no obvious curve or fanning.\n- Step 2: Quoting only the PMCC or only the scatter diagram loses a mark. The mark scheme requires both, because a high $$r$$ could coexist with a subtle curve (which the scatter would reveal), and a linear-looking scatter could have a moderate $$r$$ (if there's large scatter). Both pieces of evidence together give a complete assessment.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "What does the regression line of $$y$$ on $$x$$ always pass through, and why is this fact useful in exams? (2 steps)", "answer": "- Step 1: The regression line of $$y$$ on $$x$$ always passes through the point $$(\\bar{x}, \\bar{y})$$. This is a mathematical consequence of the least-squares fitting procedure.\n- Step 2: In exams, this fact lets you recover $$\\bar{x}$$ if you know the regression line equation and $$\\bar{y}$$ (or vice versa). Substitute $$(\\bar{x}, \\bar{y})$$ into $$y = a + bx$$ and solve. This is the key to Q6(d) when $$\\sum x$$ appears to be missing.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": true}, {"question": "When a \"show that\" question is worth 4–7 marks, what does the mark scheme reward that wouldn't be needed in a \"find\" question? (2 steps)", "answer": "- Step 1: \"Show that\" questions reward *intermediat
