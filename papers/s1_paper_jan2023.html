<script>
const DATA={"selected": [{"question": "Why does the conditional probability formula $$P(A \\mid B) = P(A) / P(B)$$ hold *only when $$A \\subset B$$*?", "answer": "- Step 1: General formula: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$.\n- Step 2: If $$A \\subset B$$, then every outcome in $$A$$ is automatically in $$B$$, so $$A \\cap B = A$$ and $$P(A \\cap B) = P(A)$$.\n- Step 3: So $$P(A \\mid B) = \\frac{P(A)}{P(B)}$$ — the simplification *requires* $$A \\subset B$$. In Q5(e), this fails: $$\\{L > 5\\}$$ is *not* a subset of $$\\{3.42 < L < 5.58\\}$$, so you must compute the intersection explicitly.\n\nThis is exactly the trap in Q5(e) vs Q2(d).", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "The outlier rule defines limits as $$Q_1 - 1.5 \\times IQR$$ and $$Q_3 + 1.5 \\times IQR$$. Why is the multiplier 1.5 used, and where do these fences sit in a normal distribution? (3 steps)", "answer": "- Step 1: The 1.5×IQR rule (Tukey’s fences) is a robust heuristic designed to flag values unusually far from the bulk of the data, assuming a roughly box-like middle 50%.\n- Step 2: In a perfectly normal distribution, these fences sit at approximately $$\\mu \\pm 2.698\\sigma$$, capturing about 99.3% of the probability mass inside and leaving only 0.7% outside as potential outliers.\n- Step 3: Because the IQR itself is a spread measure of the middle half, scaling it by 1.5 creates a boundary that is sensitive to departures from the central bulk while ignoring ordinary tail behaviour within roughly 2.7 standard deviations.", "source": "Kimi K2.6 ①", "_id": "kimi_1_33"}, {"question": "In a Venn diagram with two events $$A$$ and $$B$$, the four regions are labelled $$p = P(A \\cap B')$$, $$q = P(A \\cap B)$$, $$r = P(A' \\cap B)$$, $$s = P(A' \\cap B')$$. Express $$P(A)$$, $$P(B)$$, and the \"symmetric difference\" $$(A \\cap B') \\cup (A' \\cap B)$$ in terms of these. (2 steps)", "answer": "- Step 1: $$P(A) = p + q$$ (both the \"A only\" and \"A and B\" regions). $$P(B) = q + r$$ (both the \"B only\" and \"A and B\" regions). These follow directly from the partition of each event into its two disjoint components.\n- Step 2: The symmetric difference $$A \\triangle B = (A \\cap B') \\cup (A' \\cap B)$$ consists of the regions that are in exactly one of the two sets — the \"A only\" and \"B only\" parts. So $$P(A \\triangle B) = p + r$$. This is NOT the same as $$P(A \\cup B) = p + q + r$$, which also includes the intersection.\n\nTakeaway: Symmetric difference = \"in one but not both\" = $$p + r$$. Union = \"in at least one\" = $$p + q + r$$. Don't confuse them.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "Why does adding the three equations $$P(A) = p+q$$, $$P(B) = q+r$$, $$P(A\\triangle B) = p+r$$ collapse so cleanly to $$2p + 2q + 2r$$? (2 steps)", "answer": "- Step 1: Each of $$p, q, r$$ appears in *exactly two* of the three equations. Listing: $$p$$ in (A) and (sym diff); $$q$$ in (A) and (B); $$r$$ in (B) and (sym diff).\n- Step 2: So summing gives every variable doubled — i.e. $$2p + 2q + 2r$$. The trick is recognising the symmetric arrangement: each pairwise sum hits two variables, and three such equations cover every pair exactly once.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "Prove that events $C$ and $D$ cannot be mutually exclusive given $P(C) = \\frac{x}{x+5}$ and $P(D) = \\frac{5}{x}$. (3 steps)", "answer": "- Step 1: Assume mutual exclusivity → $P(C \\cap D) = 0$ and $P(C \\cup D) = P(C) + P(D)$.  \n- Step 2: Compute $P(C) + P(D) = \\frac{x}{x+5} + \\frac{5}{x} = \\frac{x^2 + 5(x+5)}{x(x+5)} = 1 + \\frac{25}{x(x+5)} > 1$.  \n- Step 3: Contradiction! Probabilities cannot exceed 1 → $C$ and $D$ cannot be mutually exclusive.  \n\n**Takeaway:** Mutual exclusivity implies $P(C) + P(D) \\le 1$, so proving $P(C) + P(D) > 1$ disproves it.", "source": "Qwen 3 ④", "_id": "qwen_4_7"}, {"question": "What $$z$$-value corresponds to the upper quartile of the standard normal, and how do you use it to find $$Q_3$$ of any normal distribution?", "answer": "- Step 1: $$z_{Q_3} = 0.6745$$ (where $$\\Phi(z) = 0.75$$). For $$Q_1$$, $$z = -0.6745$$ by symmetry.\n- Step 2: De-standardise: $$Q_3 = \\mu + 0.6745\\sigma$$ and $$Q_1 = \\mu - 0.6745\\sigma$$.\n- Step 3: Therefore $$\\text{IQR} = Q_3 - Q_1 = 1.349\\sigma$$ — a useful sanity check.\n\nMemorise: 0.6745 is *not* obvious from the standard table; examiners expect you to know it.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "For a discrete RV with $$P(X=2)=a$$, $$P(X=3)=0.4$$, $$P(X=4)=0.6-a$$, what are the *two* validity conditions on $$a$$, and which one is the binding constraint? (3 steps)", "answer": "- Step 1: Sum to 1: $$a + 0.4 + (0.6-a) = 1$$ holds automatically — this gives no constraint.\n- Step 2: Each probability must lie in $$[0,1]$$:\n+ $$a \\ge 0$$\n+ $$0.6 - a \\ge 0 \\Rightarrow a \\le 0.6$$\n- Step 3: Combined: $$0 \\le a \\le 0.6$$. Both upper and lower bounds are tight — this is the constraint that must be cited when solving for $$a$$ later, especially after a quadratic where one root may fall outside.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "To show $$\\frac{x}{x+5} + \\frac{5}{x} > 1$$ for all $$x > 0$$, what algebraic manipulation makes the inequality obvious without quadratic inequality machinery? (3 steps)", "answer": "- Step 1: Combine over common denominator $$x(x+5)$$: $$\\frac{x^2 + 5(x+5)}{x(x+5)} = \\frac{x^2 + 5x + 25}{x^2 + 5x}$$.\n- Step 2: Notice the numerator is the denominator plus 25: $$\\frac{(x^2 + 5x) + 25}{x^2 + 5x} = 1 + \\frac{25}{x^2+5x}$$.\n- Step 3: For $$x > 0$$, $$x^2 + 5x > 0$$, so the added fraction is strictly positive. Hence the whole expression is strictly greater than 1, for *every* positive $$x$$ — no quadratic inequality needed.\n\nInsight: rewriting $$\\frac{N+k}{N} = 1 + \\frac{k}{N}$$ is a general trick whenever the numerator differs from the denominator by a constant.", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "When calculating the standard deviation of grouped data using $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar{t}^2}$$, what is the difference between $$\\frac{\\sum ft^2}{n}$$ and $$\\bar{t}^2$$, and why does the formula have a minus sign between them? (2 steps)", "answer": "- Step 1: $$\\frac{\\sum ft^2}{n}$$ is the mean of the squared midpoints (the raw second moment), while $$\\bar{t}^2$$ is the square of the mean midpoint. These are not the same because squaring before averaging differs from averaging before squaring.\n- Step 2: The minus sign adjusts the raw second moment down by the squared mean to obtain the variance, which measures spread around the centre rather than spread around zero. This is the computational form of $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_28"}, {"question": "A histogram has five classes. Three class frequencies are given (10, 16, 24) and the total sample size is 100. What must you do before attempting *any* calculation, and what is the conceptual reason you cannot skip this step? (2 steps)", "answer": "- Step 1: You must reconstruct the two missing frequencies first, using the frequency-density scale established by the three known bars. Read their heights off the histogram, compute frequency density, then use that same scale to find the areas (frequencies) of the remaining bars.\n- Step 2: The reason is that every subsequent question — cumulative frequency, mean, standard deviation, quartiles — depends on the complete frequency table. Without the missing values, the cumulative-frequency table is incomplete and you cannot locate quartile classes, compute $$\\sum ft$$, or do interpolation. The entire question chain breaks.\n\nTakeaway: Always verify frequencies sum to $$n$$ before touching any other part.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "After solving $$a^2 - 0.6a + 0.08 = 0$$ and obtaining $$a = 0.2$$ or $$a = 0.4$$, why must you still explicitly check both values against $$0 \\le a \\le 0.6$$, even though both happen to be valid here? (2 steps)", "answer": "- Step 1: Exam questions are frequently rigged so that one root of the quadratic falls *outside* the valid probability range. For example, if the quadratic gave $$a = -0.1$$ and $$a = 0.7$$, both would be invalid (negative probability and exceeding 0.6 respectively), and the problem would have no solution. The constraint check is a separate marking point.\n- Step 2: Here, both 0.2 and 0.4 satisfy $$0 \\le a \\le 0.6$$, so both are valid. But the examiner expects to see the check written out: \"$$0.2 \\in [0, 0.6]$$ ✓ and $$0.4 \\in [0, 0.6]$$ ✓\". Omitting this loses a mark even when both roots survive.\n\nMake the constraint check a reflex: every time you solve for a probability parameter, verify the root(s) lie in [0, 1] (or whatever subset the problem imposes).", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "Given $$P(A) = \\frac{7}{25}$$, $$P(B) = \\frac{1}{5}$$, and $$P(A \\triangle B) = \\frac{8}{25}$$, translate these into equations in $$p, q, r$$ and show how adding all three equations gives $$2p + 2q + 2r = \\frac{4}{5}$$. (3 steps)", "answer": "- Step 1: Translate: $$p + q = \\frac{7}{25}$$, $$q + r = \\frac{5}{25}$$, $$p + r = \\frac{8}{25}$$. Each equation captures one of the given probabilities in terms of the Venn regions.\n- Step 2: Add all three: $$(p + q) + (q + r) + (p + r) = 2p + 2q + 2r = \\frac{7 + 5 + 8}{25} = \\frac{20}{25} = \\frac{4}{5}$$.\n- Step 3: The key insight is that each variable appears exactly twice across the three equations (once in each of two equations). Adding them doubles everything, which is why you get $$2p + 2q + 2r$$, not $$p + q + r$$. Dividing by 2 gives $$p + q + r = \\frac{2}{5}$$, and then $$s = 1 - \\frac{2}{5} = \\frac{3}{5}$$.\n\nTakeaway: Add all three region equations → the sum of all interior regions appears doubled. This is the systematic route to finding each region.", "source": "GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "Given the regression line $$y = a + bx$$ and the sample size $$n$$, how can you recover $$\\bar x$$ and $$\\bar y$$ from supplied sums, and why does the line pass through $$(\\bar x, \\bar y)$$? (3 steps)", "answer": "- Step 1: The least-squares regression line is constructed so that it always passes through the centroid of the data, the point $$(\\bar x, \\bar y)$$; this is a structural property of linear regression.\n- Step 2: If you know $$a$$, $$b$$, and $$\\bar y = \\frac{\\sum y}{n}$$, you can solve $$\\bar y = a + b\\bar x$$ for $$\\bar x = \\frac{\\bar y - a}{b}$$, then recover $$\\sum x = n\\bar x$$.\n- Step 3: This is useful when a question appears to omit $$\\sum x$$ or $$\\sum xy$$; the regression coefficients themselves encode the mean relationship and can back-calculate missing summary statistics.", "source": "Kimi K2.6 ①", "_id": "kimi_1_41"}, {"question": "When combining $$P(C) + P(D)$$ into a single fraction for a mutual exclusivity proof, an expression like $$\\frac{x^2 + 5x + 25}{x^2 + 5x}$$ appears. Why is rewriting this as $$1 + \\frac{25}{x^2 + 5x}$$ the decisive step? (2 steps)", "answer": "- Step 1: Separating the fraction into $$1 + \\frac{25}{x^2+5x}$$ isolates the constant 1, which is the theoretical upper bound required for mutual exclusivity.\n- Step 2: For positive $$x$$, the remainder term $$\\frac{25}{x^2+5x}$$ is strictly positive, making the entire sum strictly greater than 1. This makes the violation of the mutual-exclusivity bound immediate and obvious without calculus or quadratic inequalities.", "source": "Kimi K2.6 ②", "_id": "kimi_2_17"}, {"question": "Why is $$P(G_3)$$ — the probability the third draw (from bag Y) is green — *path-dependent*, and what specific values does it take? (3 steps)", "answer": "- Step 1: After two transfers from X to Y, Y's composition depends on *which colours* came across.\n- Step 2: The three cases for Y after transfers:\n+ Path GG → Y is 8G/5B, so $$P(G_3) = \\tfrac{8}{13}$$\n+ Path GB or BG → Y is 7G/6B, so $$P(G_3) = \\tfrac{7}{13}$$\n+ Path BB → Y is 6G/7B, so $$P(G_3) = \\tfrac{6}{13}$$\n- Step 3: You cannot use a single \"$$P(G_3)$$\" across the tree — each branch has its own number. Locking in one value collapses the tree incorrectly.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "In a discrete random variable table where one probability is $$a$$ and another is $$0.6 - a$$, what constraint must $$a$$ satisfy, and what two conditions generate it? (2 steps)", "answer": "- Step 1: Every probability must lie in $$[0, 1]$$. From $$a \\geq 0$$ and $$0.6 - a \\geq 0$$, we get $$a \\leq 0.6$$. Combining: $$0 \\leq a \\leq 0.6$$.\n- Step 2: Note that the sum $$a + 0.4 + (0.6 - a) = 1$$ is automatically satisfied for any $$a$$ — the constraint does *not* come from the sum. It comes purely from the non-negativity requirement. This is why you must check the bounds explicitly; the sum alone doesn't catch invalid values.\n\nTakeaway: Probabilities summing to 1 is necessary but not sufficient — each individual probability must also be in $$[0, 1]$$.", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "Conceptual synthesis: A student computes $$Q_1$$ for grouped data using $$\\frac{n+1}{4}$$, finds a conditional probability $$P(L > 5 \\mid \\text{not outlier})$$ using $$P(L > 5)$$ as the numerator, and interprets a regression gradient as \"the weight increases by 2.72.\" Identify the three distinct conceptual errors. (3 steps)", "answer": "- Step 1: **Error 1:** Using $$\\frac{n+1}{4}$$ for grouped data. Grouped (continuous) data uses $$\\frac{n}{4}$$ because the data is treated as continuous — there are no integer-position adjustments. The $$n+1$$ rule is for discrete data only.\n- Step 2: **Error 2:** Using $$P(L > 5)$$ as the numerator in the conditional. The conditioning event \"not outlier\" restricts $$L$$ to the interval $$(3.42, 5.58)$$, so the numerator must be $$P(5 < L < 5.58)$$ — the intersection of \"$$L > 5$$\" with the not-outlier band. Using $$P(L > 5)$$ includes outlier values above 5.58 that are excluded by the condition.\n- Step 3: **Error 3:** The gradient interpretation lacks units and the \"on average\" qualifier. It should be \"increases by 2.72 *grams* per degree Celsius, *on average*.\" Without units, \"2.72\" is meaningless; without \"on average,\" it implies an exact deterministic relationship rather than a statistical prediction.\n\nTakeaway: Three different topics, three distinct conceptual errors — all involving precision in what the framework requires.", "source": "GLM 5.1 ③", "_id": "glm_3_54"}, {"question": "To find $$P(\\text{not outlier})$$ for a normal variable, why is standardizing the two outlier limits directly the most reliable method, rather than trying to use a special \"outlier property\"? (3 steps)", "answer": "- Step 1: \"Not outlier\" simply means $$X$$ falls between the computed lower and upper numerical limits; this is a standard interval probability $$P(L_{\\text{lower}} < X < L_{\\text{upper}})$$.\n- Step 2: Standardizing each limit via $$Z = \\frac{X-\\mu}{\\sigma}$$ converts the problem to $$P(z_{\\text{lower}} < Z < z_{\\text{upper}})$$, which is directly readable as $$\\Phi(z_{\\text{upper}}) - \\Phi(z_{\\text{lower}})$$ from tables.\n- Step 3: Attempting to invent a shortcut risks misapplying symmetry or confusing the outlier rule with the empirical rule; direct standardization keeps every number tied to the specific question.", "source": "Kimi K2.6 ①", "_id": "kimi_1_34"}, {"question": "Why must a discussion of linear model suitability refer to both the PMCC and the scatter diagram, and what does each piece of evidence contribute that the other might lack? (2 steps)", "answer": "- Step 1: The PMCC quantifies the strength and direction of linear correlation with a single number; a value near $$\\pm 1$$ indicates a strong linear fit. However, it can mask local non-linearity or subtle outliers in small samples.\n- Step 2: The scatter diagram provides visual confirmation: it reveals whether points follow a straight line, show curvature, display heteroscedasticity (fanning), or contain outliers. Combining numerical evidence ($$r$$) with visual evidence (scatter) gives a robust, exam-level justification.", "source": "Kimi K2.6 ②", "_id": "kimi_2_26"}, {"question": "To estimate the number of observations below a value that falls *inside* a class interval (e.g., below 16 in the class 14–18 with frequency 24), what assumption does linear interpolation make, and what is the general formula? (3 steps)", "answer": "- Step 1: Linear interpolation assumes observations are **uniformly distributed** within each class — i.e., the 24 people in 14–18 are spread evenly across the 4-minute interval.\n- Step 2: The fraction of the class that lies below the cutoff value 16 is $$\\frac{16 - 14}{18 - 14} = \\frac{2}{4} = \\frac{1}{2}$$. So the estimated frequency below 16 *within this class* is $$\\frac{1}{2} \\times 24 = 12$$.\n- Step 3: The total estimate below 16 is the cumulative frequency up to the class below (10 + 16 = 26) plus the interpolated portion (12), giving 38.\n\nGeneral formula for the interpolated frequency below a value $$c$$ inside class $$[L, U)$$ with class frequency $$f$$:\n$$\\text{Interpolated frequency} = \\frac{c - L}{U - L} \\times f$$", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "Given $$\\sum ft^2 = 41{,}033$$ and $$\\bar{t} = 19.68$$ for $$n = 100$$, explain conceptually why the standard deviation formula $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar{t}^2}$$ involves subtracting the square of the mean. (3 steps)", "answer": "- Step 1: $$\\frac{\\sum ft^2}{n}$$ is $$E(X^2)$$ — the mean of the *squared* values. But variance is the mean of the squared *deviations from the mean*, i.e., $$\\text{Var}(X) = E[(X - \\mu)^2]$$.\n- Step 2: Expand the square: $$E[(X-\\mu)^2] = E[X^2 - 2\\mu X + \\mu^2] = E(X^2) - 2\\mu E(X) + \\mu^2 = E(X^2) - \\mu^2$$, since $$E(X) = \\mu$$. This is the computational shortcut — instead of subtracting the mean from every data point, square, and average, you just compute $$E(X^2) - \\mu^2$$.\n- Step 3: The standard deviation is the square root of variance: $$\\sigma = \\sqrt{E(X^2) - \\mu^2} = \\sqrt{\\frac{41033}{100} - 19.68^2} = \\sqrt{23.13} \\approx 4.81$$ minutes.\n\nThe subtraction $$E(X^2) - \\mu^2$$ is *not* optional — it converts \"mean of squares\" into \"mean squared deviation,\" which is what spread actually measures.", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "The symmetric difference $$A \\triangle B = (A \\cap B') \\cup (A' \\cap B)$$ can also be written as $$P(A \\triangle B) = P(A) + P(B) - 2P(A \\cap B)$$. Derive this from the addition rule. (3 steps)", "answer": "- Step 1: By the addition rule: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$. The union consists of three disjoint parts: $$A \\cap B'$$ (A only), $$A \\cap B$$ (intersection), and $$A' \\cap B$$ (B only).\n- Step 2: The symmetric difference excludes the intersection: $$A \\triangle B = (A \\cup B) \\setminus (A \\cap B) = (A \\cap B') \\cup (A' \\cap B)$$. So $$P(A \\triangle B) = P(A \\cup B) - P(A \\cap B)$$.\n- Step 3: Substituting the addition rule: $$P(A \\triangle B) = [P(A) + P(B) - P(A \\cap B)] - P(A \\cap B) = P(A) + P(B) - 2P(A \\cap B)$$. The factor of 2 arises because the intersection is subtracted once in the addition rule and once more when we remove it from the union.\n\nThis formula is useful for checking: with $$P(A) = \\frac{7}{25}$$, $$P(B) = \\frac{5}{25}$$, $$P(A \\cap B) = \\frac{2}{25}$$: $$P(A \\triangle B) = \\frac{7+5-4}{25} = \\frac{8}{25}$$ ✓.", "source": "GLM 5.1 ①", "_id": "glm_1_45"}, {"question": "When discussing the **suitability of a linear regression model**, an exam question often asks you to refer to *both* the scatter diagram and the PMCC. Why are both required, and what could each reveal that the other doesn't? (3 steps)", "answer": "- Step 1: PMCC ($$r$$) is a *single number* summarising linear association strength. High $$|r|$$ suggests linearity but doesn't rule out subtle curvature or outliers.\n- Step 2: A scatter plot reveals the *shape* — curves, fanning (heteroscedasticity), clusters, or isolated points — that $$r$$ can hide. A perfectly curved relationship can still yield $$r$$ near 1 if monotonic.\n- Step 3: Citing both gives complementary evidence: $$r = 0.988$$ says \"strong linear association numerically\", and \"points lie close to a straight line with no curvature\" says \"no pattern violations visible\". Mentioning only one loses a mark.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "In a Venn diagram with regions $$p$$ (A only), $$q$$ (intersection), $$r$$ (B only), $$s$$ (outside), what is the **symmetric difference** $$(A\\cap B') \\cup (A'\\cap B)$$ in terms of these regions?", "answer": "- Step 1: $$A\\cap B'$$ is the \"A only\" region, i.e. $$p$$.\n- Step 2: $$A'\\cap B$$ is the \"B only\" region, i.e. $$r$$.\n- Step 3: These are disjoint, so their union has probability $$p + r$$.\n\nInsight: the symmetric difference is \"exactly one of A or B happens\" — the union *minus* the intersection. It is **not** $$p + q + r$$ (that's $$A \\cup B$$).", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Conceptual synthesis: Explain the parallel between Q2(d) and Q5(e). Both are conditional probabilities — what structural similarity do they share, and what is the common pitfall? (3 steps)", "answer": "- Step 1: Both questions use $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ where $$A \\subset B$$. In Q2(d), \"all green\" ⊂ \"all same colour.\" In Q5(e), \"$$L > 5$$ and not outlier\" ⊂ \"not outlier.\" In both cases, the conditioning event restricts the sample space.\n- Step 2: The common pitfall is using $$P(A)$$ instead of $$P(A \\cap B)$$ in the numerator. In Q2(d), this would mean using $$P(\\text{all G})$$ alone — which is actually correct because \"all G\" ⊂ \"same,\" so $$P(A \\cap B) = P(A)$$. But in Q5(e), \"$$L > 5$$\" is NOT a subset of \"not outlier\" (some values above 5 are outliers), so $$P(A \\cap B) \\neq P(A)$$. You must intersect.\n- Step 3: The key distinction: when $$A \\subset B$$, the numerator simplifies to $$P(A)$$; when $$A \\not\\subset B$$, you must compute the intersection explicitly. Always check the subset relationship before simplifying.\n\nTakeaway: Conditional probability always requires the intersection in the numerator. It simplifies to $$P(A)$$ only when $$A \\subseteq B$$ — verify this before assuming it.", "source": "GLM 5.1 ③", "_id": "glm_3_60"}, {"question": "State the formulae for $$S_{xx}, S_{yy}, S_{xy}$$, $$r$$, and the regression gradient $$b$$, and explain how they connect.", "answer": "- Step 1: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$, $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$, $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$.\n- Step 2: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$ — Pearson's product-moment correlation coefficient, dimensionless, in $$[-1, 1]$$.\n- Step 3: Regression gradient $$b = \\frac{S_{xy}}{S_{xx}}$$ and intercept $$a = \\bar y - b\\bar x$$.\n\nInsight: $$S_{xx}$$ is essentially $$n \\cdot \\text{Var}(x)$$ without dividing — they're \"uncentred\" sums. The line passes through $$(\\bar x, \\bar y)$$, which is the key recovery tool.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "After drawing a green marble first from bag X (5G, 4B), what is the composition of bag X for the second draw? After drawing a blue marble first, what changes? Why does this matter for the tree diagram? (2 steps)", "answer": "- Step 1: If the first marble is green, bag X now has 4G and 4B (8 total). So $$P(G_2 \\mid G_1) = \\frac{4}{8} = \\frac{1}{2}$$ and $$P(B_2 \\mid G_1) = \\frac{4}{8} = \\frac{1}{2}$$. If the first marble is blue, bag X now has 5G and 3B (8 total). So $$P(G_2 \\mid B_1) = \\frac{5}{8}$$ and $$P(B_2 \\mid B_1) = \\frac{3}{8}$$.\n- Step 2: This matters because the conditional probabilities on the second branch of the tree diagram *depend on the first outcome*. You cannot label the second branch with a single probability — it splits into two sub-branches with different values depending on whether $$G_1$$ or $$B_1$$ occurred. This is the defining feature of sampling without replacement: the denominator drops to 8, and the numerator depends on what was removed.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "When a problem says \"find the probability that two events are different colours/types\" in a tree diagram, what's the universal structural trick?", "answer": "- Step 1: Identify the two complementary paths: first-A-then-B, and first-B-then-A.\n- Step 2: These are disjoint, so $$P(\\text{different}) = P(\\text{AB}) + P(\\text{BA})$$.\n- Step 3: Alternative: $$P(\\text{different}) = 1 - P(\\text{same colour}) = 1 - [P(\\text{AA}) + P(\\text{BB})]$$. Both are valid — pick whichever has fewer paths.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "When searching for $$Q_1$$ with $$n = 100$$, the cumulative frequencies are 10, 26, 50, ... . Why must the 25th value lie in the second class ($$10 \\le t < 14$$) rather than the first? (3 steps)", "answer": "- Step 1: The first class ends at cumulative frequency 10, meaning it houses only the 1st through 10th ordered values.\n- Step 2: The target rank 25 is strictly greater than 10, so the 25th value has already spilled over into the next class; the second class begins at rank 11 and ends at rank 26.\n- Step 3: Hence $$F_{\\text{before}} = 10$$ and $$f_{\\text{class}} = 16$$; the interpolation fraction $$\\frac{25-10}{16}$$ measures how far into this second class we must go. The first class is already full.", "source": "Kimi K2.6 ①", "_id": "kimi_1_6"}, {"question": "Why does a histogram require you to read off **area**, not bar height, to get class frequencies?", "answer": "- Step 1: Histograms display **frequency density** on the vertical axis precisely so unequal class widths can be compared fairly.\n- Step 2: Frequency $$= \\text{density} \\times \\text{width}$$, which is the *area* of the bar. A tall, narrow bar can represent fewer people than a short, wide one.\n- Step 3: Reading by height alone over-counts narrow classes and under-counts wide ones, corrupting every downstream statistic.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "Two events $$C$$ and $$D$$ satisfy $$P(C) = \\frac{x}{x+5}$$ and $$P(D) = \\frac{5}{x}$$ where $$x > 0$$. To show they cannot be mutually exclusive, what single inequality must you derive, and what logical principle underpins the argument? (3 steps)", "answer": "- Step 1: If $$C$$ and $$D$$ were mutually exclusive, then $$P(C \\cap D) = 0$$, so $$P(C \\cup D) = P(C) + P(D)$$. But any probability is at most 1, so mutual exclusivity *forces* $$P(C) + P(D) \\le 1$$.\n- Step 2: Compute $$P(C) + P(D) = \\frac{x}{x+5} + \\frac{5}{x} = \\frac{x^2 + 5(x+5)}{x(x+5)} = \\frac{x^2 + 5x + 25}{x^2 + 5x}$$.\n- Step 3: Rewrite as $$\\frac{(x^2 + 5x) + 25}{x^2 + 5x} = 1 + \\frac{25}{x^2 + 5x}$$. Since $$x > 0$$, we have $$x^2 + 5x > 0$$, so $$\\frac{25}{x^2+5x} > 0$$, giving $$P(C) + P(D) > 1$$. This contradicts the necessary condition $$P(C) + P(D) \\le 1$$, so $$C$$ and $$D$$ cannot be mutually exclusive.\n\nThe logical structure is proof by contradiction: *assume* mutually exclusive → derive necessary bound → show bound is violated → conclude.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "In a conditional probability $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$, when the event $$B$$ restricts the sample space to a subset (like \"not outlier\" restricting to a band), explain visually what happens to the numerator on a number line. (2 steps)", "answer": "- Step 1: On the number line, event $$A$$ (e.g., \"$$L > 5$$\") is a ray extending from 5 to +∞. Event $$B$$ (e.g., \"not outlier\") is the interval (3.42, 5.58). The intersection $$A \\cap B$$ is the *overlap* of these two regions: the segment from 5 to 5.58.\n- Step 2: The conditional probability is the *proportion* of region $$B$$ that also lies in $$A$$. Visually, it's the area under the normal curve from 5 to 5.58, divided by the area from 3.42 to 5.58. The \"cap\" at 5.58 chops off the right tail of $$A$$ that extends beyond $$B$$.\n\nAlways draw the number line and shade the regions — the intersection is always the overlap, which may be a proper subset of both $$A$$ and $$B$$.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "After deriving $$p + q + r = \\frac{2}{5}$$, how do you find $$q$$ (the intersection) using $$P(A)$$ and $$P(B)$$?", "answer": "- Step 1: Observe that $$P(A) + P(B) = (p+q) + (q+r) = (p+q+r) + q$$.\n- Step 2: So $$q = P(A) + P(B) - (p+q+r) = \\frac{7}{25} + \\frac{5}{25} - \\frac{10}{25} = \\frac{2}{25}$$.\n- Step 3: Then $$p = P(A) - q = \\frac{5}{25} = \\frac{1}{5}$$, $$r = P(B) - q = \\frac{3}{25}$$, and $$s = 1 - (p+q+r) = \\frac{3}{5}$$.\n\nInsight: $$P(A) + P(B)$$ double-counts the intersection — this is the inclusion-exclusion principle in region form.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "In the linear interpolation formula, a common error is dividing by the cumulative frequency before the class rather than the class frequency itself. Why does this destroy the proportional reasoning? (2 steps)", "answer": "- Step 1: The fraction $$\\frac{\\text{needed} - F_{\\text{before}}}{f_{\\text{class}}}$$ represents what portion of that specific class you must traverse; the numerator is the number of items you still need inside this class, and the denominator is how many items the class holds.\n- Step 2: If you divided by the cumulative frequency, you would compare a local shortfall against a global total, destroying the local proportionality and usually producing a nonsensical fraction greater than 1 or much smaller than it should be.", "source": "Kimi K2.6 ①", "_id": "kimi_1_7"}, {"question": "When a probability problem involves items being transferred between containers, what is the systematic approach to avoid composition errors? Describe the step-by-step process. (3 steps)", "answer": "- Step 1: **Before any draw, write down the current composition** of the container you're drawing from — how many of each type, and the total. For the first draw from bag X: 5G, 4B, total 9.\n- Step 2: **After each draw, update both containers.** The source container loses the drawn item (both the specific colour count and the total decrease by 1). The destination container gains it (the specific colour count and total increase by 1). For bag X: 9 → 8. For bag Y: 11 → 13 after two transfers.\n- Step 3: **On the tree diagram, label the denominator (total) at each level.** This makes it impossible to use a stale total. The three levels in Q2 have denominators 9, 8, and 13 — write them next to the branching points.\n\nTakeaway: Write compositions before drawing → update after → label denominators on the tree. This systematic approach eliminates the most common transfer-problem error.", "source": "GLM 5.1 ③", "_id": "glm_3_59"}, {"question": "Explain why the upper and lower outlier limits in a normal distribution are symmetric about the mean, i.e., why the upper limit is $$\\mu + k$$ and the lower limit is $$\\mu - k$$ for the same value $$k$$. (2 steps)", "answer": "- Step 1: The normal distribution is symmetric about $$\\mu$$. Therefore $$Q_3 - \\mu = \\mu - Q_1$$, i.e., the quartiles are equidistant from the mean. The IQR = $$Q_3 - Q_1$$, and the outlier limits are $$Q_3 + 1.5 \\times \\text{IQR}$$ and $$Q_1 - 1.5 \\times \\text{IQR}$$.\n- Step 2: Upper limit = $$Q_3 + 1.5 \\times \\text{IQR} = (\\mu + d) + 1.5 \\times 2d = \\mu + d + 3d = \\mu + 4d$$, where $$d = Q_3 - \\mu$$. Lower limit = $$Q_1 - 1.5 \\times \\text{IQR} = (\\mu - d) - 3d = \\mu - 4d$$. So the limits are $$\\mu \\pm 4d$$, symmetric about the mean.\n\nIn the paper: $$d = 0.2698$$, so limits are at $$4.5 \\pm 4(0.2698) = 4.5 \\pm 1.079$$, giving 3.42 and 5.58.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "The variance of a discrete random variable can be written as $$\\text{Var}(X) = E[(X - \\mu)^2]$$ or as $$E(X^2) - \\mu^2$$. Why is the second form vastly preferred for hand calculations when probabilities contain a parameter? (2 steps)", "answer": "- Step 1: The definition $$E[(X-\\mu)^2]$$ requires expanding $$(x - \\mu)^2$$ for every outcome and then taking the expectation, which forces you to work with $$\\mu$$ inside the sum. When $$\\mu$$ itself depends on a parameter, this creates nested dependencies and more algebra.\n- Step 2: The computational form $$E(X^2) - \\mu^2$$ separates the calculation into two independent expectations: a weighted sum of $$x^2$$ and the square of a weighted sum of $$x$$. This is algebraically cleaner and far less prone to sign errors when $$\\mu$$ is a binomial in the parameter.", "source": "Kimi K2.6 ②", "_id": "kimi_2_34"}, {"question": "In grouped data, why does linear interpolation for a quartile assume that values are spread uniformly across a class? (3 steps)", "answer": "- Step 1: Once a value is known to fall inside a class interval, we have no finer information about its exact position; the principle of indifference treats every position within the interval as equally likely.\n- Step 2: Uniform spread means the cumulative frequency rises linearly from the bottom to the top of the class, so the fraction of the class width we must traverse equals the fraction of the class frequency we need to reach the quartile position.\n- Step 3: This justifies the formula $$Q = L + \\frac{\\text{needed rank} - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$, where the fraction locates us proportionally along the width.", "source": "Kimi K2.6 ①", "_id": "kimi_1_4"}, {"question": "In a histogram, why is frequency *not* directly proportional to the height of the bar? (2 steps)", "answer": "- Step 1: **Area represents frequency**  \n  Histogram bars show frequency density (frequency per unit interval). The area of each bar (frequency density × class width) equals the frequency:  \n  $$\n  \\text{Frequency} = \\text{Height} \\times \\text{Class Width}\n  $$  \n\n- Step 2: **Misconception about height**  \n  If class widths vary, taller bars may not mean higher frequency. For example, a wide class with low height could have a larger total area (frequency) than a narrow, tall class.  \n\n**Takeaway:** Always account for class width when interpreting histograms.", "source": "Qwen 3 ③", "_id": "qwen_3_1"}, {"question": "A histogram uses area to represent frequency. If you are given the frequency and class width of one bar, plus the area of another bar, how do you determine the other bar's frequency conceptually?", "answer": "Frequency is proportional to area, and on a common histogram the vertical scale is frequency density. Once the frequency density scale is fixed by a reference bar (density = frequency / width), any other bar's frequency equals that fixed density multiplied by the new bar's width, or more directly:\n$$\\text{frequency}_2 = \\text{frequency}_1 \\times \\frac{\\text{area}_2}{\\text{area}_1}$$\nprovided the vertical scale (frequency density per unit area) is constant across the diagram.", "source": "Kimi K2.6 ②", "_id": "kimi_2_3"}, {"question": "In a marble-transfer problem, why does the *total number of marbles in the receiving bag* change for the final draw, and what does this mean for the probability tree? (3 steps)", "answer": "- Step 1: Two marbles are transferred *into* Y from X before the third draw. So Y's count goes from 11 to **13**, regardless of which colours were transferred.\n- Step 2: The **composition** of Y (how many green vs blue) depends on the path taken, so the *numerator* of $$P(G_3)$$ varies by branch even though the denominator is always 13.\n- Step 3: Specifically: after $$GG$$ → 8G/5B; after $$GB$$ or $$BG$$ → 7G/6B; after $$BB$$ → 6G/7B.\n\nCommon error: keeping Y at 11 (forgetting the transfers count) or using a single $$P(G_3)$$ everywhere.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "For a discrete random variable, state the three core formulae for $$E(X)$$, $$E(X^2)$$, and $$\\text{Var}(X)$$, and explain why $$E(X^2) \\neq [E(X)]^2$$.", "answer": "- Step 1: $$E(X) = \\sum x P(X=x)$$, $$E(X^2) = \\sum x^2 P(X=x)$$, $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$.\n- Step 2: $$E(X^2)$$ first squares each value of $$X$$ then averages; $$[E(X)]^2$$ first averages then squares. By Jensen's inequality (or just experimenting with two values), squaring is convex, so $$E(X^2) \\ge [E(X)]^2$$ — the gap is exactly the variance.\n- Step 3: This is why $$\\text{Var}(X) \\ge 0$$ always. The variance measures how much $$X^2$$'s average exceeds the square of $$X$$'s average — a direct measure of spread.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "Why does the formula $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$ always give a non-negative result? Connect this to the concept of variance. (2 steps)", "answer": "- Step 1: $$S_{xx} = \\sum(x_i - \\bar{x})^2$$, which is a sum of squared terms and therefore non-negative. The equivalent computational form $$\\sum x^2 - \\frac{(\\sum x)^2}{n}$$ must give the same non-negative value — it's just an algebraic rearrangement that avoids computing deviations individually.\n- Step 2: The connection to variance: $$\\sigma_x^2 = \\frac{S_{xx}}{n}$$, and variance is always non-negative. So $$S_{xx} = n\\sigma_x^2 \\ge 0$$. If your computation gives a negative $$S_{xx}$$, you've made an arithmetic error (most likely subtracting in the wrong order).\n\n$$S_{xx} = 0$$ only when all $$x$$-values are identical (zero variance).", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "Why do only the GG and BB paths contribute to \"all three marbles same colour,\" and why do the mixed paths automatically fail to qualify? (2 steps)", "answer": "- Step 1: \"All three same colour\" requires the first two transferred marbles to match, because if they differ (one G and one B), bag Y receives one of each, making it impossible for the third draw to match both of them simultaneously.\n- Step 2: Therefore only the GG and BB branches can possibly yield three matching marbles, and we sum $$P(GGG)$$ and $$P(BBB)$$, ignoring mixed paths entirely.", "source": "Kimi K2.6 ①", "_id": "kimi_1_15"}, {"question": "Describe the specific algebraic pitfall that occurs when expanding $$[E(X)]^2$$ inside the variance formula $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$, and state the correct order of operations to avoid sign errors. (3 steps)", "answer": "- Step 1: The pitfall is distributing the minus sign into the bracket before squaring. A student might incorrectly compute $$-(3.6 - 2a)^2$$ as $$(-3.6 + 2a)^2$$, which changes nothing because squaring removes the sign, but more commonly they expand the squared binomial first and then mishandle the negative sign on one or more terms.\n- Step 2: The safe method is to expand $$(3.6 - 2a)^2$$ completely as a separate bracket, yielding $$12.96 - 14.4a + 4a^2$$, and only then subtract the entire expanded expression from $$E(X^2)$$ term by term.\n- Step 3: Writing the variance line as $$E(X^2) - [E(X)]^2 = (\\dots) - (12.96 - 14.4a + 4a^2)$$ and distributing the minus across every term inside the parenthesis prevents the loss-of-sign error.", "source": "Kimi K2.6 ②", "_id": "kimi_2_12"}, {"question": "When substituting into the variance equation $$0.56 = (13.2 - 12a) - (3.6 - 2a)^2$$, a student writes $$0.56 = 13.2 - 12a - 12.96 + 14.4a - 4a^2$$ in one step. Why is this error-prone, and what is the safer procedure? (3 steps)", "answer": "- Step 1: The dangerous step is distributing the minus sign through $$(3.6 - 2a)^2$$ *before* expanding the square. The student must first compute $$(3.6 - 2a)^2 = 12.96 - 14.4a + 4a^2$$ as a separate, clean expansion.\n- Step 2: Only *then* substitute back with the minus sign: $$0.56 = (13.2 - 12a) - (12.96 - 14.4a + 4a^2)$$. Now distribute the minus: $$0.56 = 13.2 - 12a - 12.96 + 14.4a - 4a^2$$.\n- Step 3: Simplify: $$0.56 = 0.24 + 2.4a - 4a^2$$. Rearrange to standard form: $$4a^2 - 2.4a + 0.32 = 0$$, then $$a^2 - 0.6a + 0.08 = 0$$.\n\nThe key discipline: **expand the squared bracket separately on its own line, then substitute**. Never try to expand and distribute the minus in one go — the sign error on the $$+14.4a$$ term (which comes from $$-(-14.4a)$$) is where marks are lost.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "When evaluating $$P(L > 5 \\mid \\text{not an outlier})$$ for a normally distributed wing length, why must the numerator be the probability of the intersection $$P(5 < L < \\text{upper outlier limit})$$ rather than simply $$P(L > 5)$$? (3 steps)", "answer": "- Step 1: The conditioning event \"not an outlier\" restricts the sample space to the interval between the lower and upper outlier limits. Any outcome beyond the upper limit is excluded by the condition.\n- Step 2: The intersection of \"$$L > 5$$\" with \"not an outlier\" is therefore \"$$5 < L < \\text{upper limit}$$\", not the unbounded tail $$L > 5$$. Using $$P(L > 5)$$ would include outlier values that have been conditioned away.\n- Step 3: The correct conditional formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$; forgetting the intersection cap is the single most common error in conditional normal problems.", "source": "Kimi K2.6 ②", "_id": "kimi_2_21"}, {"question": "If $$E(X) = 3.6 - 2a$$ for a valid parameter range $$0 \\le a \\le 0.6$$, explain conceptually why the maximum expected value occurs at $$a = 0$$ and the minimum at $$a = 0.6$$ without performing the full endpoint evaluation. (2 steps)", "answer": "- Step 1: The expectation is a linear function of $$a$$ with a negative gradient ($$-2$$). This means $$E(X)$$ decreases by 2 units for every 1-unit increase in $$a$$.\n- Step 2: Because the function is strictly decreasing throughout the interval, its largest value is forced to the left endpoint ($$a=0$$) and its smallest value to the right endpoint ($$a=0.6$$).", "source": "Kimi K2.6 ②", "_id": "kimi_2_10"}, {"question": "Derive why $$\\mathrm{Var}(X) = E(X^2) - [E(X)]^2$$ for a discrete random variable, walking through the definition of variance. (4 steps)", "answer": "- Step 1: Start from the definitional form: $$\\mathrm{Var}(X) = E\\big[(X - \\mu)^2\\big]$$ where $$\\mu = E(X)$$.\n- Step 2: Expand the squared term inside the expectation: $$(X-\\mu)^2 = X^2 - 2\\mu X + \\mu^2$$.\n- Step 3: Use linearity of expectation to split: $$E[X^2 - 2\\mu X + \\mu^2] = E(X^2) - 2\\mu E(X) + \\mu^2$$.\n- Step 4: Since $$E(X) = \\mu$$, this simplifies to $$E(X^2) - 2\\mu^2 + \\mu^2 = E(X^2) - \\mu^2 = E(X^2) - [E(X)]^2$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_22"}, {"question": "When combining $$P(C) + P(D) = \\frac{x}{x+5} + \\frac{5}{x}$$ into a single fraction, the result is $$\\frac{x^2 + 5x + 25}{x^2 + 5x}$$. How can you algebraically restructure this to make the inequality $$> 1$$ obvious without solving a quadratic inequality? (3 steps)", "answer": "- Step 1: Observe that the numerator $$x^2 + 5x + 25$$ equals the denominator $$x^2 + 5x$$ plus 25. So $$\\frac{x^2 + 5x + 25}{x^2 + 5x} = \\frac{(x^2 + 5x) + 25}{x^2 + 5x}$$.\n- Step 2: Split the fraction: $$= \\frac{x^2 + 5x}{x^2 + 5x} + \\frac{25}{x^2 + 5x} = 1 + \\frac{25}{x^2 + 5x}$$.\n- Step 3: For $$x > 0$$: both $$x^2 > 0$$ and $$5x > 0$$, so $$x^2 + 5x > 0$$, hence $$\\frac{25}{x^2 + 5x} > 0$$. Therefore $$P(C) + P(D) = 1 + \\text{(something positive)} > 1$$. This contradicts the mutual-exclusivity requirement, so $$C$$ and $$D$$ cannot be mutually exclusive. $$\\blacksquare$$\n\nTakeaway: Restructure $$\\frac{N+25}{N} = 1 + \\frac{25}{N}$$ — the excess over 1 becomes visually obvious. No quadratic inequality needed.", "source": "GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "When calculating quartiles for a normal distribution N(μ, σ²), what z-value from the standard normal table corresponds to the upper quartile Q₃, and how do you use it to find Q₃ in the original distribution? (2 steps)", "answer": "- Step 1: For the standard normal, Q₃ occurs where $$P(Z < z) = 0.75$$. The table value is $$z = 0.6745$$ (memorise this — it's not always given).\n- Step 2: Transform back using $$Q_3 = \\mu + z \\sigma$$.\n\nFor N(4.5, 0.4²): $$Q_3 = 4.5 + 0.6745 \\times 0.4 = 4.77\\text{ mm}$$. Similarly, Q₁ uses z = −0.6745.\n\nThe 0.6745 value is the key — using 0.67 or 0.675 introduces small errors that cascade through outlier calculations.", "source": "MiniMax ①", "_id": "minimax_1_4"}, {"question": "In showing $$P(C)+P(D) > 1$$, the expression simplifies to $$\\frac{x^2+5x+25}{x^2+5x}$$. Why is rewriting this as $$1 + \\frac{25}{x^2+5x}$$ the decisive move? (2 steps)", "answer": "- Step 1: Separating the fraction reveals the numerator as \"denominator plus 25\", immediately isolating the positive residual term $$\\frac{25}{x^2+5x}$$.\n- Step 2: For every $$x > 0$$, the denominator is positive, making the residual strictly positive; hence the whole expression is $$1 + (\\text{positive})$$, which is necessarily $$> 1$$. No quadratic inequality or calculus is needed.", "source": "Kimi K2.6 ①", "_id": "kimi_1_30"}, {"question": "Across multiple S1 contexts (marble transfers, normal outliers), the recurring trap is forgetting that the **sample space changes** under conditioning. State the general rule and how to apply it. (3 steps)", "answer": "- Step 1: When you condition on an event $$B$$, the new sample space is $$B$$ itself — outcomes outside $$B$$ no longer exist.\n- Step 2: To compute $$P(A\\mid B)$$, you must restrict $$A$$ to $$A\\cap B$$ before computing — never carry over the unconditional $$A$$.\n+ Marble example: drawing from Y after two transfers — Y has 13 marbles, not 11. The transfer changes the \"sample space\" of the third draw.\n+ Normal outlier example: $$P(L > 5 \\mid \\text{not outlier})$$ — the event $$L > 5$$ must be intersected with the not-outlier band $$\\{L < 5.58\\}$$.\n- Step 3: Always re-draw the picture (tree, number line) and re-state the new sample space *before* writing the probability.\n\nThis is the single most-tested skill across S1 conditional probability questions.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "Two events $$C$$ and $$D$$ are mutually exclusive. What inequality must $$P(C) + P(D)$$ satisfy, and how does this become a tool for *disproving* mutual exclusivity? (3 steps)", "answer": "- Step 1: Mutual exclusivity ⇒ $$P(C\\cap D) = 0$$ ⇒ $$P(C \\cup D) = P(C) + P(D)$$.\n- Step 2: Any probability satisfies $$P(C\\cup D) \\le 1$$, so combined: $$P(C) + P(D) \\le 1$$ is **necessary** for mutual exclusivity.\n- Step 3: Contrapositive: if you can show $$P(C) + P(D) > 1$$ for all permissible parameter values, mutual exclusivity is impossible. This is the \"contradiction lever\" the exam wants you to pull.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "In computing $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$, a student writes $$E(X^2) = [E(X)]^2 = (3.6-2a)^2$$. Explain the conceptual difference between $$E(X^2)$$ and $$[E(X)]^2$$ and why they are almost never equal. (2 steps)", "answer": "- Step 1: $$E(X^2) = \\sum x^2 \\cdot P(X=x)$$ — you square the outcomes first, then take the probability-weighted average. For this distribution: $$E(X^2) = 4a + 9(0.4) + 16(0.6-a) = 13.2 - 12a$$.\n- Step 2: $$[E(X)]^2 = (3.6 - 2a)^2$$ — you take the mean first, then square it. These are fundamentally different operations. By Jensen's inequality, for any non-constant random variable, $$E(X^2) > [E(X)]^2$$ (the square function is convex, so the mean of the squares exceeds the square of the mean). The difference *is* the variance: $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$.\n\nConfusing these two is one of the most common errors: always compute $$E(X^2)$$ separately using $$x^2$$ values, never by squaring $$E(X)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "For grouped data on an IAL paper, which positional rule do you use for $$Q_1$$ — $$\\frac{n}{4}$$ or $$\\frac{n+1}{4}$$ — and why does the distinction matter?", "answer": "For grouped (continuous) data you use **$$\\frac{n}{4}$$ directly** — e.g. with $$n=100$$ you locate the $$25$$th value, not the $$25.25$$th. The $$\\frac{n+1}{4}$$ rule is reserved for *discrete* small data sets where you're picking out an actual ordered value. With grouped data the values are treated as a continuum spread uniformly within each class, so there is no \"the 25th observation\" — you just interpolate at the position $$\\frac{n}{4}$$. Mixing the rules is a common slip that shifts the interpolation by a fraction of a class and loses a mark.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "A marble is moved from bag X (5G, 4B) to bag Y, then a second marble from X to Y, then a third from Y. Why do the branch probabilities for the first and second draws from X differ even though both come from the same bag? (3 steps)", "answer": "- Step 1: Both draws are without replacement from bag X, which starts with 9 marbles. After the first draw, one marble is gone, so the second draw faces only 8 marbles.\n- Step 2: This changes both the denominator and potentially the numerator of the second-level branches: if the first was green, the second sees 4G/4B; if the first was blue, it sees 5G/3B.\n- Step 3: Therefore the second draw is path-dependent: the probabilities are conditional on the outcome of the first draw, which is why a tree diagram with distinct second-level branches is required rather than a single repeated probability.", "source": "Kimi K2.6 ①", "_id": "kimi_1_11"}, {"question": "In the context of PMCC and regression, what do $$S_{xx}$$, $$S_{yy}$$, and $$S_{xy}$$ measure conceptually, and why must they be computed separately before combining into $$r$$? (4 steps)", "answer": "- Step 1: $$S_{xx} = \\sum (x_i - \\bar x)^2$$ measures the total spread or variation in the $$x$$-direction; it is the sum of squared horizontal deviations from the mean.\n- Step 2: $$S_{yy}$$ does the same for $$y$$, quantifying total vertical spread around $$\\bar y$$.\n- Step 3: $$S_{xy} = \\sum (x_i - \\bar x)(y_i - \\bar y)$$ measures co-variation: it accumulates products of deviations, becoming positive when $$x$$ and $$y$$ deviate in the same direction and negative when they oppose.\n- Step 4: Computing them separately prevents algebraic mangling and preserves interpretability; $$r$$ standardizes the co-variation by the individual spreads, while $$b$$ uses only $$S_{xy}/S_{xx}$$ to describe the slope.", "source": "Kimi K2.6 ①", "_id": "kimi_1_42"}, {"question": "To show that $$P(\\text{not outlier}) = 0.993$$ for $$L \\sim N(4.5, 0.4^2)$$, you standardise both fence values. What is the key symmetry observation that simplifies the calculation? (2 steps)", "answer": "- Step 1: The fence values are equidistant from the mean: upper fence = $$4.5 + 2.698\\sigma$$, lower fence = $$4.5 - 2.698\\sigma$$. Standardising gives $$z_{\\text{upper}} = +2.698$$ and $$z_{\\text{lower}} = -2.698$$.\n- Step 2: By symmetry of the normal, $$P(-2.698 < Z < 2.698) = P(Z < 2.698) - P(Z < -2.698) = \\Phi(2.698) - [1 - \\Phi(2.698)] = 2\\Phi(2.698) - 1$$. Looking up $$\\Phi(2.70) \\approx 0.9965$$: $$P = 2(0.9965) - 1 = 0.993$$. The symmetry halves the work — you only need one table lookup.\n\nTakeaway: Symmetric fences about the mean → $$P(\\text{inside}) = 2\\Phi(z) - 1$$. One lookup, not two.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "In the linear interpolation formula for grouped quartiles, $$Q = L + \\frac{\\frac{kn}{4} - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$, explain the conceptual role of the term $$\\left(\\frac{kn}{4} - F_{\\text{before}}\\right)$$ and why we divide by $$f_{\\text{class}}$$ rather than by the cumulative frequency. (2 steps)", "answer": "- Step 1: The term $$\\frac{kn}{4} - F_{\\text{before}}$$ measures how many items into the target class we need to go before reaching the quartile position. It is the \"shortfall\" between the cumulative count at the lower boundary and the rank of the quartile.\n- Step 2: We divide by $$f_{\\text{class}}$$ because that numerator is a raw count of items, and we need to express it as a fraction of the class's total frequency so we can scale it by the class width $$w$$. Dividing by cumulative frequency would incorrectly scale against the entire sample rather than just the current class.", "source": "Kimi K2.6 ②", "_id": "kimi_2_2"}, {"question": "In a normal distribution $$X \\sim N(\\mu, \\sigma^2)$$, the outlier limits are at $$\\mu \\pm 4d$$ where $$d = 0.6745\\sigma$$ (the quartile distance from the mean). Express the outlier limits in terms of $$\\mu$$ and $$\\sigma$$ alone, and verify this gives $$z = \\pm 2.698$$. (2 steps)", "answer": "- Step 1: The outlier limits are $$\\mu \\pm 4 \\times 0.6745\\sigma = \\mu \\pm 2.698\\sigma$$. So the upper limit is at $$\\mu + 2.698\\sigma$$ and the lower limit is at $$\\mu - 2.698\\sigma$$.\n- Step 2: Standardising: $$Z = \\frac{(\\mu + 2.698\\sigma) - \\mu}{\\sigma} = 2.698$$, and similarly $$Z = -2.698$$ for the lower limit. This confirms the $$z$$-values used in part (d). The number 2.698 comes from $$4 \\times 0.6745 = 2.698$$ — a fixed multiple for any normal distribution using the 1.5×IQR rule.\n\nThis is a universal result: for *any* normal distribution, the 1.5×IQR outlier boundaries sit at exactly $$\\mu \\pm 2.698\\sigma$$.", "source": "GLM 5.1 ①", "_id": "glm_1_48"}, {"question": "For a conditional probability question like \"$$P(L > 5 \\mid \\text{not outlier})$$\", what is the critical conceptual move that prevents the most common wrong answer? (4 steps)", "answer": "- Step 1: Write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ explicitly — don't paraphrase.\n- Step 2: Identify the *intersection* on the number line. Here $$A = \\{L > 5\\}$$ and $$B = \\{3.42 < L < 5.58\\}$$, so $$A \\cap B = \\{5 < L < 5.58\\}$$ — the upper bound is capped by $$B$$!\n- Step 3: Now standardise the *intersection* interval: $$P(5 < L < 5.58) = \\Phi(2.70) - \\Phi(1.25) = 0.9965 - 0.8944 = 0.1021$$.\n- Step 4: Divide by $$P(B) = 0.993$$ to get $$\\approx 0.103$$.\n\nCommon error: using $$P(L > 5)$$ unrestricted in the numerator, ignoring the cap from $$B$$. This gives $$\\approx 0.106$$ — wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "In Q5, the outlier fences are at $$\\mu \\pm 2.698\\sigma$$, and $$P(\\text{not outlier}) \\approx 0.993$$. If the distribution were highly skewed instead of normal, would the same fence formula still capture ~99.3% of data? Why or why not? (2 steps)", "answer": "- Step 1: No. The 99.3% figure is specific to the normal distribution's symmetry and tail behaviour. The $$1.5 \\times \\text{IQR}$$ rule is a convention that happens to work well for normals but is not distribution-free.\n- Step 2: For a heavily right-skewed distribution, the upper fence might flag many genuine data points as outliers (because the right tail is long), while the lower fence might be too lenient (because the left tail is short). The rule is a heuristic, not a theorem — its effectiveness depends on the underlying distribution being roughly symmetric.\n\nTakeaway: The 1.5×IQR rule is a convention tied to normal-like distributions. For skewed data, it may over- or under-flag outliers.", "source": "GLM 5.1 ③", "_id": "glm_3_51"}, {"question": "When expanding $$\\text{Var}(X) = E(X^2) - (E(X))^2$$ with $$E(X) = 3.6 - 2a$$, what's the textbook sign-error trap and how do you avoid it? (3 steps)", "answer": "- Step 1: First expand $$(3.6 - 2a)^2 = 12.96 - 14.4a + 4a^2$$ **as a complete bracket**, separately, before subtracting.\n- Step 2: Then write the full subtraction with the bracket visible: $$\\text{Var}(X) = (13.2 - 12a) - (12.96 - 14.4a + 4a^2)$$.\n- Step 3: Distribute the minus through *every* term: $$= 13.2 - 12a - 12.96 + 14.4a - 4a^2$$. The trap is forgetting to flip the sign on the $$-14.4a$$ term inside the bracket — students often write $$-14.4a$$ instead of $$+14.4a$$ after distribution.\n\nRule: bracket first, expand inside, then distribute the minus uniformly.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "On a histogram, the vertical axis is labelled \"frequency density\" and the horizontal axis shows class intervals. What quantity does the *area* of each bar represent, and why? (2 steps)", "answer": "- Step 1: Each bar has height = frequency density and width = class width. Area = height × width = frequency density × class width. By definition, frequency density = frequency / class width, so area = (frequency / class width) × class width = frequency.\n- Step 2: Therefore the area of each bar equals the **frequency** of that class. This is why histograms with unequal class widths use frequency density (not frequency) on the vertical axis — it ensures the visual area correctly represents how many data points lie in each interval.\n\nThe bar *height* alone only equals frequency when all class widths are identical; the *area* is the universal measure.", "source": "GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "The IQR-based outlier rule says a value is an outlier if it lies above $$Q_3 + 1.5\\,\\text{IQR}$$ or below $$Q_1 - 1.5\\,\\text{IQR}$$. For a normal distribution, what is the approximate *probability* of being an outlier, and why does this come out to about 0.7%? (3 steps)", "answer": "- Step 1: For a normal, $$Q_3 - Q_1 = 2 \\times 0.6745\\,\\sigma \\approx 1.349\\,\\sigma$$, so $$1.5\\,\\text{IQR} \\approx 2.0235\\,\\sigma$$.\n- Step 2: The outlier limits sit at $$\\mu \\pm (0.6745 + 2.0235)\\sigma = \\mu \\pm 2.698\\sigma$$.\n- Step 3: $$P(|Z| > 2.698) \\approx 2(1 - 0.9965) = 0.007$$. So **roughly 0.7%** of a normal population are flagged as outliers by Tukey's rule — i.e. $$P(\\text{not outlier}) \\approx 0.993$$.\n\nTakeaway: the \"0.993\" target isn't a coincidence — it falls straight out of the normal-quartile $$z$$ of 0.6745.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "In a marble-transfer tree where the first two draws come from bag X (initially 5G/4B), how do the conditional probabilities for the second draw differ across branches?", "answer": "- Step 1: After draw 1, bag X has only 8 marbles total (one was removed).\n- Step 2: Branch-dependent compositions:\n+ After $$G_1$$ (a green was removed): X is now 4G/4B, so $$P(G_2|G_1) = P(B_2|G_1) = \\frac{4}{8}$$.\n+ After $$B_1$$ (a blue was removed): X is now 5G/3B, so $$P(G_2|B_1) = \\frac{5}{8}$$ and $$P(B_2|B_1) = \\frac{3}{8}$$.\n- Step 3: This is sampling without replacement: both numerator and denominator must be updated to reflect what was actually taken.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "A histogram shows five class intervals. Three classes have known frequencies (10, 16, 24) and the remaining two are blank. The total sample size is 100. What is the systematic approach to recover the missing frequencies, and what must you verify at the end? (3 steps)", "answer": "- Step 1: From the three known classes, read their bar heights (frequency densities) off the histogram. Since frequency density = frequency / class width, you can verify the scale is consistent and determine the frequency-density units on the vertical axis.\n- Step 2: For each missing class, read its bar height from the histogram, multiply by its class width to get frequency. For example, if a bar of the 18–25 class (width 7) has the same height as a bar giving frequency density 4, then frequency = 4 × 7 = 28.\n- Step 3: Verify that all five frequencies sum to the stated total (here 100). If they don't, re-read the histogram or re-check the scale. This is a non-negotiable sanity check before attempting any further calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "When computing $$E(X)$$ for a discrete RV parameterised by $$a$$, why is the result always linear in $$a$$, and what does this linearity tell you about the range of $$E(X)$$? (2 steps)", "answer": "- Step 1: $$E(X) = \\sum x \\cdot P(X=x)$$ is a *linear combination* of the probabilities. Since each probability is itself linear (or constant) in $$a$$, $$E(X)$$ comes out linear too — e.g. $$E(X) = 3.6 - 2a$$.\n- Step 2: A linear function over an interval $$[0, 0.6]$$ attains its max and min at the endpoints. So plug in $$a=0$$ and $$a=0.6$$ to get the extremes, no calculus needed. The range is just $$[2.4, 3.6]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "What is the special $$z$$-value associated with the quartiles of any normal distribution, and why is it worth memorising exactly?", "answer": "$$z = \\pm 0.6745$$ — positive for $$Q_3$$ (where $$\\Phi(z) = 0.75$$) and negative for $$Q_1$$ (where $$\\Phi(z) = 0.25$$). It's worth memorising because it isn't directly tabulated in obvious form — the table jumps in steps of 0.01 and $$\\Phi(0.67) = 0.7486$$, $$\\Phi(0.68) = 0.7517$$, so you'd interpolate. Exam mark schemes expect $$0.6745$$ exactly, and using $$0.67$$ throws off downstream calculations like outlier limits and the \"show that 0.993\" target.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "After solving the quadratic from the variance equation and getting two roots for $$a$$, why must you *still* perform a check before stating the final answer?", "answer": "Because not every algebraic root is a valid probability. The constraint $$0 \\le a \\le 0.6$$ comes from requiring each $$P(X=x_i) \\in [0,1]$$. Examiners regularly rig the question so one root falls outside (e.g. $$a = -0.1$$ or $$a = 0.8$$) — that root must be discarded with explicit reasoning, and the constraint check itself carries a mark. Even when both roots happen to be valid (as here, $$a=0.2$$ and $$a=0.4$$), you should *write* \"both satisfy $$0 \\le a \\le 0.6$$\" to bank the mark.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "Why does computing $$Z = \\frac{X - \\mu}{\\sigma}$$ convert any normal variable $$X \\sim N(\\mu, \\sigma^2)$$ into a standard normal $$Z \\sim N(0,1)$$? (3 steps)", "answer": "- Step 1: Subtracting $$\\mu$$ shifts the entire distribution so that its centre moves to 0; this centers the mean at the origin without changing the shape or spread.\n- Step 2: Dividing by $$\\sigma$$ then rescales the horizontal axis so that one unit of $$Z$$ corresponds to one standard deviation of $$X$$; this compresses or stretches the bell curve until its width parameter becomes 1.\n- Step 3: Because the normal family is closed under linear transformations, the resulting variable is still normal, now with mean 0 and variance 1, allowing a single standard table $$\\Phi(z)$$ to cover every case.", "source": "Kimi K2.6 ①", "_id": "kimi_1_31"}, {"question": "Can a high PMCC ($$r \\approx 0.99$$) coexist with a clearly nonlinear relationship? Give a conceptual example and explain why this matters for model suitability. (2 steps)", "answer": "- Step 1: Yes. Consider data that follows a gentle exponential curve over a narrow range. The points lie very close to the curve, and a straight line fit through them would also have a very high $$r$$ because the curve doesn't deviate much from linear over that range. But extrapolating the linear model would diverge from the true exponential behaviour.\n- Step 2: This matters because PMCC measures *linear* association only. A high $$r$$ says \"a straight line fits well\" but does not say \"the true relationship is linear.\" The scatter diagram can reveal curvature, clusters, or outliers that $$r$$ alone misses. This is why both pieces of evidence are required.\n\nA residual plot would be even more informative (checking for patterns in the residuals), but in S1 the scatter diagram is the visual tool available.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "Why does the regression line of $$y$$ on $$x$$ always pass through $$(\\bar{x}, \\bar{y})$$? Give an intuitive explanation. (2 steps)", "answer": "- Step 1: The regression line $$y = a + bx$$ minimises the sum of squared vertical residuals. The point $$(\\bar{x}, \\bar{y})$$ is the \"centre of gravity\" of the data. If the line didn't pass through this centre, you could shift it up or down to reduce all residuals simultaneously — contradicting the least-squares property.\n- Step 2: Algebraically, $$a = \\bar{y} - b\\bar{x}$$, so when $$x = \\bar{x}$$: $$y = (\\bar{y} - b\\bar{x}) + b\\bar{x} = \\bar{y}$$. The line always predicts the mean of $$y$$ when $$x$$ equals its mean — a natural consistency requirement.\n\nTakeaway: The regression line must pass through the centroid $$(\\bar{x}, \\bar{y})$$ — it's both an algebraic identity and a logical necessity.", "source": "GLM 5.1 ③", "_id": "glm_3_50"}, {"question": "In a \"show that\" question requiring you to prove a numerical result (e.g., $$P(\\text{not outlier}) = 0.993$$ or $$r = 0.988$$), why is it dangerous to use rounded intermediate values too early? (2 steps)", "answer": "- Step 1: Rounding intermediate $$z$$-scores or summary statistics introduces small errors that propagate through multiplications, square roots, or divisions. In a \"show that\" mark scheme, the final identity must match to the given decimal exactly.\n- Step 2: Examiners expect you to carry full calculator precision (or at least 4–5 significant figures) through every algebraic line, rounding only the final displayed answer. Premature rounding is one of the main reasons a \"show that\" proof fails to land on the required number.", "source": "Kimi K2.6 ②", "_id": "kimi_2_33"}, {"question": "On a histogram, the vertical axis is labelled \"frequency density\" and the horizontal axis shows class intervals. What two quantities must you multiply together to recover the frequency for any given class, and why? (2 steps)", "answer": "- Step 1: On a histogram, the **area** of each bar represents frequency — not the height. The bar for a class spanning from lower bound $$L$$ to upper bound $$U$$ has width $$w = U - L$$ (the class width) and height equal to the frequency density $$d$$.\n- Step 2: Therefore, $$\\text{Frequency} = d \\times w = \\text{frequency density} \\times \\text{class width}$$. This is why two classes with the same frequency but different widths will have bars of different heights — the taller bar is the narrower class, because the same frequency is packed into less horizontal space.\n\nThe key visual insight: a histogram is *not* a bar chart. Bar height alone doesn't tell you frequency; bar *area* does.", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "Show that $$P(C) + P(D) = \\frac{x}{x+5} + \\frac{5}{x}$$ exceeds 1 for all positive $$x$$, using an algebraic restructuring rather than calculus. (4 steps)", "answer": "- Step 1: Common denominator: $$\\frac{x}{x+5} + \\frac{5}{x} = \\frac{x \\cdot x + 5(x+5)}{x(x+5)} = \\frac{x^2 + 5x + 25}{x^2 + 5x}$$.\n- Step 2: Notice the numerator equals the denominator plus 25: rewrite as $$\\frac{(x^2+5x) + 25}{x^2+5x} = 1 + \\frac{25}{x^2 + 5x}$$.\n- Step 3: For $$x > 0$$: $$x^2 + 5x > 0$$, so $$\\frac{25}{x^2+5x} > 0$$, hence the sum strictly exceeds 1.\n- Step 4: Since mutual exclusivity would require the sum $$\\le 1$$, and we have $$> 1$$, $$C$$ and $$D$$ cannot be mutually exclusive for any positive $$x$$.\n\nKey trick: $$\\frac{N + k}{N} = 1 + \\frac{k}{N}$$ makes \"exceeds 1\" instantly visible without calculus or quadratic inequalities.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "Two marbles are drawn without replacement from Bag X and transferred to Bag Y. Explain why the probability of drawing a green marble on the third draw (from Bag Y) is path-dependent, and list the three possible compositions of Bag Y that can result. (3 steps)", "answer": "- Step 1: Because the draws from Bag X happen without replacement, the pair transferred to Bag Y can be GG, BB, or one of each (GB/BG). Each sequence changes the absolute number of green and blue marbles in Bag Y differently.\n- Step 2: This means the numerator of $$P(G_3)$$ — the count of green marbles in Y — takes three possible values (8, 7, or 6) while the denominator is always 13. A single fixed probability for $$G_3$$ is therefore impossible.\n- Step 3: The three distinct compositions after two transfers are: 8 green / 5 blue if GG was added; 7 green / 6 blue if a mixed pair was added; and 6 green / 7 blue if BB was added.", "source": "Kimi K2.6 ②", "_id": "kimi_2_5"}, {"question": "Why is the probability of drawing green on the third draw from Y not a single fixed value, but rather one of three possibilities depending on earlier branches? (3 steps)", "answer": "- Step 1: The number of green marbles in Y after two transfers depends on what was transferred: GG gives $$6+2=8$$ green; GB or BG gives $$6+1=7$$ green; BB gives $$6+0=6$$ green.\n- Step 2: Because the denominator is always 13, the third-draw probability of green becomes $$\\frac{8}{13}$$, $$\\frac{7}{13}$$, or $$\\frac{6}{13}$$ respectively.\n- Step 3: This means you cannot collapse the tree into a single $$P(G_3)$$; each leaf of the tree carries its own third-draw probabilities, and any total probability must weight these leaves by their path probabilities.", "source": "Kimi K2.6 ①", "_id": "kimi_1_13"}, {"question": "If a PMCC problem appears to be missing $$\\sum x$$ or $$\\sum xy$$ from the summary statistics, how can you recover them from the regression line $$y = a + bx$$? (3 steps)", "answer": "- Step 1: Use $$\\bar y = a + b\\bar x$$. Since $$\\bar y = \\frac{\\sum y}{n}$$ is known, solve for $$\\bar x$$ and hence $$\\sum x = n\\bar x$$.\n- Step 2: Use $$b = \\frac{S_{xy}}{S_{xx}}$$. Once $$S_{xx}$$ is computed, recover $$S_{xy} = b \\cdot S_{xx}$$.\n- Step 3: From $$S_{xy}$$ you can back-solve to $$\\sum xy = S_{xy} + \\frac{(\\sum x)(\\sum y)}{n}$$ if needed.\n\nTakeaway: the regression line is a *constraint* that lets you recover missing summary statistics — never get stuck for that reason alone.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "For grouped data with $$n = 100$$, the position of $$Q_1$$ uses $$\\frac{n}{4} = 25$$. Why is this different from the discrete-data rule $$\\frac{n+1}{4}$$, and what goes wrong if you use the wrong one? (3 steps)", "answer": "- Step 1: Grouped (continuous) data treats the variable as continuous — there are no \"gaps\" between values, so the 25th value (not the 25.25th position) is the correct target. The $$\\frac{n+1}{4}$$ rule adjusts for the fact that discrete data points occupy specific integer positions.\n- Step 2: If you use $$\\frac{n+1}{4} = 25.25$$, you would interpolate slightly further into the class, giving a $$Q_1$$ that is marginally too large. For $$n = 100$$ the error is small, but the mark scheme awards the mark only for $$\\frac{n}{4}$$.\n- Step 3: The practical consequence: using 25.25 instead of 25 shifts which cumulative-frequency boundary you cross, potentially placing you in the wrong class entirely for small samples.\n\nTakeaway: Grouped/continuous data → $$\\frac{n}{4}$$; discrete data → $$\\frac{n+1}{4}$$. Never mix them.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "In the conditional probability $$P(\\text{all green} \\mid \\text{all same colour})$$ from the marble problem, why is it valid to compute this as $$\\frac{P(\\text{all green})}{P(\\text{all same colour})}$$ even though the two events are clearly not independent? (2 steps)", "answer": "- Step 1: The event \"all three marbles are green\" is a subset of the event \"all three marbles are the same colour.\" Whenever $$A \\subset B$$, the intersection $$A \\cap B$$ is simply $$A$$ itself.\n- Step 2: By the definition of conditional probability, $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. Substituting $$A \\cap B = A$$ gives $$\\frac{P(A)}{P(B)}$$, which is valid regardless of independence because the set relationship guarantees the intersection collapses to the smaller event.", "source": "Kimi K2.6 ②", "_id": "kimi_2_7"}, {"question": "When asked to \"show using standardisation that $$P(\\text{not outlier}) = 0.993$$\", what is the clean approach, and what is the over-engineered approach to avoid? (4 steps)", "answer": "- Step 1: Clean: standardise both outlier limits in the *original* distribution. $$Z = \\frac{5.5792 - 4.5}{0.4} \\approx 2.70$$ and $$Z = -2.70$$ by symmetry.\n- Step 2: Use $$P(-2.70 < Z < 2.70) = \\Phi(2.70) - \\Phi(-2.70) = 0.9965 - 0.0035 = 0.9930$$.\n- Step 3: Over-engineered: trying to \"transform quartiles back\" or invoking a special \"property\" — there's no shortcut.\n- Step 4: The symmetry is just that $$z = \\pm 2.698$$, no extra theorem needed.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "When expanding $$(3.6 - 2a)^2$$, a student writes $$12.96 - 14.4a + 4a^2$$. Another student writes $$12.96 + 14.4a + 4a^2$$ (forgetting the middle sign). Explain exactly where the second student went wrong using the FOIL pattern. (2 steps)", "answer": "- Step 1: $$(3.6 - 2a)^2 = (3.6 - 2a)(3.6 - 2a)$$. By FOIL: First = $$3.6 \\times 3.6 = 12.96$$; Outer = $$3.6 \\times (-2a) = -7.2a$$; Inner = $$(-2a) \\times 3.6 = -7.2a$$; Last = $$(-2a) \\times (-2a) = 4a^2$$.\n- Step 2: The middle term is Outer + Inner = $$-7.2a + (-7.2a) = -14.4a$$. The error comes from treating $$(-2a)(3.6)$$ as $$+7.2a$$ instead of $$-7.2a$$ — forgetting that the *second* factor also has a negative sign on the $$2a$$ term. Both cross-terms are negative, so they add to $$-14.4a$$, not $$+14.4a$$.\n\nTakeaway: In $$(A - B)^2 = A^2 - 2AB + B^2$$, the middle term is always negative. Both cross-terms carry the minus.", "source": "GLM 5.1 ③", "_id": "glm_3_53"}, {"question": "On a histogram, the vertical axis is labelled \"frequency density\". If a class spans from 10 to 14 and the bar has height 4, what is the frequency for that class — and why is it the *area* and not the *height* that gives frequency? (2 steps)", "answer": "- Step 1: Frequency = frequency density × class width = $$4 \\times (14 - 10) = 4 \\times 4 = 16$$. The height alone (4) is not the frequency because classes have different widths — a tall narrow bar can represent fewer people than a short wide bar.\n- Step 2: The fundamental reason is that histograms encode total count as area. If every bar had the same width, height would suffice — but when widths vary, only area preserves the correct proportion. This is why you must never read the y-axis value directly as the count.\n\nTakeaway: Area = frequency; height = frequency density = frequency ÷ width.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "Why does the variance equation for a discrete RV typically lead to a **quadratic** in the parameter, even though $$E(X)$$ was linear? (2 steps)", "answer": "- Step 1: Variance uses $$\\text{Var}(X) = E(X^2) - (E(X))^2$$. Here $$E(X^2)$$ is linear in $$a$$ (sum of $$x^2 \\cdot P$$, and $$P$$ is linear in $$a$$).\n- Step 2: But $$(E(X))^2$$ squares a linear expression, producing $$a^2$$. Subtracting gives an equation with both $$a^2$$ and $$a$$ terms — a quadratic. Setting it equal to a given variance produces (in general) two candidate values of $$a$$.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "Why is the conditional probability $$P(L > 5 \\mid \\text{not an outlier})$$ **not** equal to $$\\frac{P(L > 5)}{P(\\text{not outlier})}$$? What is the subtle but mark-losing slip here? (3 steps)", "answer": "- Step 1: $$P(A\\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. The numerator requires the **intersection** $$A \\cap B$$.\n- Step 2: Here $$A = \\{L > 5\\}$$ and $$B = \\{3.42 < L < 5.58\\}$$ (the not-outlier band). The intersection is $$\\{5 < L < 5.58\\}$$, not $$\\{L > 5\\}$$.\n- Step 3: The not-outlier condition **caps** $$L$$ at 5.58 on the upper end — values above 5.58 are *outliers* and excluded. Forgetting this cap and using $$P(L > 5) = 0.1056$$ instead of $$P(5 < L < 5.58) \\approx 0.1021$$ is the single most common conditional-normal mistake.\n\nMental check: the conditioning event always reshapes the sample space — intersect first, *then* standardise.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "The regression line was calculated from data where $$10 \\leq x \\leq 80$$. You use it to estimate $$y$$ at $$x = 90$$. Why is this unreliable, even if $$r = 0.988$$? (2 steps)", "answer": "- Step 1: $$x = 90$$ is *outside the range of the data* — this is **extrapolation**. The linear relationship established within $$[10, 80]$$ may not hold beyond 80 °C. Sugar solubility could plateau, accelerate, or change behaviour entirely at higher temperatures.\n- Step 2: A high PMCC ($$r = 0.988$$) only confirms linearity *within the observed range*. It says nothing about what happens outside that range. Correlation does not license extrapolation — the model has no data to support it beyond $$x = 80$$.\n\nTakeaway: High $$r$$ ≠ reliable extrapolation. Extrapolation is unreliable because the model is untested outside the data range.", "source": "GLM 5.1 ③", "_id": "glm_3_35"}, {"question": "In Q5(e), the conditional probability $$P(L > 5 \\mid \\text{not outlier})$$ requires computing $$P(L > 5 \\cap \\text{not outlier})$$. A student computes $$P(L > 5)$$ instead. Explain why these are different and what the intersection actually is. (3 steps)", "answer": "- Step 1: \"Not outlier\" means $$3.42 < L < 5.58$$. So the event \"not outlier\" *caps* $$L$$ at 5.58 on the upper end. The event $$L > 5$$ has no such cap — it extends to infinity.\n- Step 2: The intersection $$\\{L > 5\\} \\cap \\{3.42 < L < 5.58\\}$$ is the overlap: values that satisfy both conditions simultaneously. You need $$L > 5$$ AND $$L < 5.58$$, so the intersection is $$5 < L < 5.58$$.\n- Step 3: Therefore $$P(L > 5 \\cap \\text{not outlier}) = P(5 < L < 5.58)$$, NOT $$P(L > 5)$$. Using $$P(L > 5) = P(Z > 1.25) = 0.1056$$ in the numerator would give $$0.1056/0.993 \\approx 0.106$$ — wrong. The correct nu
