nnect this to the concept of symmetric difference. (2 steps)", "answer": "- Step 1: $ p = P(A \\cap B') $ (A only) and $ r = P(A' \\cap B) $ (B only) are mutually exclusive regions. Their union is $ (A \\cap B') \\cup (A' \\cap B) $.  \n- Step 2: This union is the symmetric difference $ A \\triangle B $, representing outcomes in either A or B but not both, hence $ P(A \\triangle B) = p + r $.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "In Q3(c), why must both roots $ a = 0.2 $ and $ a = 0.4 $ be checked against the constraint $ 0 \\le a \\le 0.6 $? What would happen if one root fell outside this range? (2 steps)", "answer": "- Step 1: The constraint $ 0 \\le a \\le 0.6 $ ensures all probabilities $ a, 0.4, 0.6-a $ remain valid ($ \\ge 0 $).  \n- Step 2: If a root (e.g., $ a = 0.7 $) violates $ a \\le 0.6 $, it would make $ 0.6 - a < 0 $, invalidating the probability distribution. Only valid roots within the range are acceptable.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why is the estimate in Q6(b) considered extrapolation? What are the risks of extrapolation in regression analysis? (3 steps)", "answer": "- Step 1: The data range for $ x $ is $ 10 \\le x \\le 80 $, but the estimate at $ x = 90 $ lies outside this range, making it extrapolation.  \n- Step 2: Extrapolation assumes the linear relationship persists beyond observed data, which may not hold due to nonlinearities or saturation effects (e.g., sugar solubility plateauing).  \n- Step 3: Risks include unreliable predictions and ignoring unmodeled behaviors (e.g., chemical changes at higher temperatures), leading to incorrect conclusions.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "In a histogram of grouped data with frequency density on the vertical axis, how do you find the frequency for a class interval? (2 steps)", "answer": "- Step 1: Identify the class width (the horizontal span of the bar). For a class like 18–25, the width is $$25 - 18 = 7$$.\n- Step 2: Read the frequency density (height of the bar) from the vertical axis, then multiply: $$f = \\text{frequency density} \\times \\text{class width}$$.\n\nThe histogram shows frequency density, and area = frequency. This is why you must use the full width — using just the height would give the wrong answer.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A bag X contains 5 green and 4 blue marbles (total 9). A marble is drawn and placed in bag Y, then a second marble is drawn from X. What are the probabilities for the second draw from X, and why do they depend on the first draw? (3 steps)", "answer": "- Step 1: After the first draw, bag X has 8 marbles remaining (sampling without replacement).\n- Step 2: If first draw was green (5→4G, 4B): $$P(G_2|G_1) = \\frac{4}{8} = \\frac{1}{2}$$, $$P(B_2|G_1) = \\frac{4}{8} = \\frac{1}{2}$$.\n+ If first draw was blue (5G, 4→3B): $$P(G_2|B_1) = \\frac{5}{8}$$, $$P(B_2|B_1) = \\frac{3}{8}$$.\n- Step 3: The probabilities differ because removing a marble changes the composition — the denominator drops from 9 to 8, and the numerator changes based on which colour was removed.\n\nThis is the fundamental principle of sampling without replacement: each draw changes the sample space for subsequent draws.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "For a discrete random variable X with probability distribution P(X=2) = a, P(X=3) = 0.4, P(X=4) = 0.6 − a, what constraint must a satisfy for this to be a valid probability distribution? (2 steps)", "answer": "- Step 1: All probabilities must be non-negative: $$a \\geq 0$$ and $$0.6 - a \\geq 0$$.\n- Step 2: Solving the second inequality: $$0.6 - a \\geq 0 \\Rightarrow a \\leq 0.6$$.\n\nCombined: $$\\boxed{0 \\leq a \\leq 0.6}$$.\n\nNote that the probabilities automatically sum to 1: $$a + 0.4 + (0.6 - a) = 1$$. The constraint ensures each individual probability stays within [0,1].", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "In a Venn diagram with two events A and B, the region (A ∩ B') ∪ (A' ∩ B) represents what set operation, and what is its probability in terms of the Venn regions p, q, r? (2 steps)", "answer": "- Step 1: This is the symmetric difference, denoted $$A \\triangle B$$ — it contains all elements in exactly one of A or B, but not both.\n- Step 2: In terms of the Venn regions: p = A ∩ B' (only A), r = A' ∩ B (only B), so $$P(A \\triangle B) = p + r$$.\n\nThe intersection region q is excluded because it belongs to both A and B. This is distinct from the union (which would be p + q + r) or the intersection alone (which would be q).", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "When calculating quartiles for a normal distribution N(μ, σ²), what z-value from the standard normal table corresponds to the upper quartile Q₃, and how do you use it to find Q₃ in the original distribution? (2 steps)", "answer": "- Step 1: For the standard normal, Q₃ occurs where $$P(Z < z) = 0.75$$. The table value is $$z = 0.6745$$ (memorise this — it's not always given).\n- Step 2: Transform back using $$Q_3 = \\mu + z \\sigma$$.\n\nFor N(4.5, 0.4²): $$Q_3 = 4.5 + 0.6745 \\times 0.4 = 4.77\\text{ mm}$$. Similarly, Q₁ uses z = −0.6745.\n\nThe 0.6745 value is the key — using 0.67 or 0.675 introduces small errors that cascade through outlier calculations.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": true}, {"question": "The regression line of y on x is given as y = 151.2 + 2.72x, and you are asked to estimate y when x = 90°C. Why is this estimate unreliable even though the model fits well in the data range? (2 steps)", "answer": "- Step 1: The data range is given as $$10 \\leq x \\leq 80$$ — the temperature 90°C lies outside this range.\n- Step 2: Predicting beyond the observed data range is called **extrapolation**. There is no evidence the linear relationship continues to hold at 90°C; sugar solubility may plateau or change behavior at higher temperatures.\n\nThe reliability of extrapolation cannot be justified by a high correlation coefficient — r measures fit within the data range, not beyond it. This is a fundamental limitation of linear regression.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "In the histogram question, you are given Q₃ = 23 and asked to use linear interpolation to estimate the interquartile range. What is the quartile position formula for grouped data, and why do you NOT use (n+1)/4? (3 steps)", "answer": "- Step 1: For grouped data with n observations, the kth quartile position is $$\\frac{kn}{4}$$. For Q₁ with n = 100: position = 25.\n- Step 2: Locate which class contains the 25th value by building the cumulative frequency table. The class containing position 25 is 10–14 (cumulative goes 10 → 26).\n- Step 3: Apply the interpolation formula: $$Q_1 = L + \\frac{\\frac{n}{4} - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$ where L = lower class boundary, F_before = cumulative frequency before this class, f_class = frequency in this class, w = class width.\n\nYou use n/4 (not (n+1)/4) because grouped data assumes continuous distribution with observations spread uniformly across each class — the \"1\" adjustment is for discrete data lists.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "In the marble transfer problem, bag Y initially has 6 green and 5 blue marbles (total 11). After two marbles are transferred from bag X to bag Y, what is the total number of marbles in bag Y for the third draw, and why does this matter? (2 steps)", "answer": "- Step 1: Bag Y starts with 11 marbles. Two marbles are added from bag X, so bag Y now has $$11 + 2 = 13$$ marbles for the third draw.\n- Step 2: This matters because probabilities for the third draw depend on the correct denominator. For example, if GG were transferred, Y would have 8 green out of 13, giving $$P(G_3) = \\frac{8}{13}$$. Using 11 would give the wrong denominator.\n\nThis is a common error: forgetting that the transferred marbles physically move into bag Y, increasing its total.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "For the discrete random variable with P(X=2) = a, P(X=3) = 0.4, P(X=4) = 0.6 − a, you are given Var(X) = 0.56 and need to find possible values of a. After expanding the variance equation, you get 0.56 = (13.2 − 12a) − (3.6 − 2a)². What is the most common sign error when expanding (3.6 − 2a)², and how do you avoid it? (3 steps)", "answer": "- Step 1: The most common error is distributing the minus sign before squaring: writing $$13.2 - 12a - 3.6^2 + 2a^2$$ instead of properly handling the bracket.\n- Step 2: First expand the squared term: $$(3.6 - 2a)^2 = 3.6^2 - 2(3.6)(2a) + (2a)^2 = 12.96 - 14.4a + 4a^2$$.\n- Step 3: Then substitute: $$0.56 = 13.2 - 12a - (12.96 - 14.4a + 4a^2) = 13.2 - 12a - 12.96 + 14.4a - 4a^2$$.\n\nAlways bracket the squared term before subtracting: $$-(3.6 - 2a)^2$$ means negate the entire expanded result, not just the first term.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "In the Venn diagram problem (part ii), you are asked to show that events C and D with P(C) = x/(x+5) and P(D) = 5/x cannot be mutually exclusive. What condition would need to hold if they WERE mutually exclusive, and how do you show it fails? (3 steps)", "answer": "- Step 1: If C and D were mutually exclusive, then $$P(C \\cap D) = 0$$ and therefore $$P(C \\cup D) = P(C) + P(D)$$. Since any probability is ≤ 1, we would need $$P(C) + P(D) \\leq 1$$.\n- Step 2: Compute the sum: $$P(C) + P(D) = \\frac{x}{x+5} + \\frac{5}{x} = \\frac{x^2 + 5x + 25}{x(x+5)} = 1 + \\frac{25}{x^2 + 5x}$$.\n- Step 3: For x > 0, the denominator x² + 5x is positive, so $$\\frac{25}{x^2 + 5x} > 0$$, giving $$P(C) + P(D) = 1 + \\text{positive term} > 1$$.\n\nSince the sum exceeds 1, the condition for mutual exclusivity fails. The key algebraic trick is rewriting as $$1 + \\frac{25}{N}$$ to see the inequality immediately.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "For the normal distribution question, you need to find P(L > 5 | not outlier) where \"not outlier\" means the value lies between the outlier limits. Why can't you simply use P(L > 5) in the numerator, and what is the correct intersection? (3 steps)", "answer": "- Step 1: The conditioning event \"not outlier\" restricts the sample space to values between the outlier limits: approximately 3.42 mm < L < 5.58 mm.\n- Step 2: The event \"L > 5\" intersected with \"not outlier\" is NOT simply \"L > 5\" — it is the intersection: $$5 < L < 5.58$$ (the upper cap matters).\n- Step 3: Therefore: $$P(L > 5 | \\text{not outlier}) = \\frac{P(5 < L < 5.58)}{P(\\text{not outlier})}$$.\n\nUsing P(L > 5) = 0.1056 would ignore the upper bound of the non-outlier band, giving approximately 0.106 instead of the correct 0.103. The intersection on the number line is essential.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "When calculating the PMCC (product moment correlation coefficient) from summary statistics, you need S_xx, S_yy, and S_xy. The regression line is y = 151.2 + 2.72x. How can you recover S_xy from the regression line when it isn't directly given? (2 steps)", "answer": "- Step 1: The gradient b of the regression line y on x satisfies $$b = \\frac{S_{xy}}{S_{xx}}$$.\n- Step 2: Rearranging: $$S_{xy} = b \\times S_{xx}$$.\n\nSo if you compute S_xx from $$\\sum x^2 - \\frac{(\\sum x)^2}{n}$$, you can multiply by the gradient 2.72 to get S_xy. This is useful when ∑xy is not provided in the summary statistics.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "In the histogram question, part (b) asks for the number of people with time less than 16 minutes. The 14–18 class contains 24 people. How do you use linear interpolation within this class to find how many people took between 14 and 16 minutes? (2 steps)", "answer": "- Step 1: The class 14–18 spans 4 minutes. The portion from 14 to 16 is $$\\frac{16 - 14}{18 - 14} = \\frac{2}{4} = \\frac{1}{2}$$ of the class width.\n- Step 2: Assuming uniform distribution within the class: $$\\text{frequency in } 14 \\leq t < 16 = \\frac{1}{2} \\times 24 = 12$$.\n\nThen cumulative below 16 = 10 (from 5–10) + 16 (from 10–14) + 12 = 38 people.\n\nThis assumes the histogram bars represent uniform density within each class — the standard assumption for grouped data.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In the discrete RV question, you find E(X) = 3.6 − 2a. Given the constraint 0 ≤ a ≤ 0.6, what is the range of possible values for E(X), and why is it a decreasing function of a? (2 steps)", "answer": "- Step 1: E(X) = 3.6 − 2a is a linear function with negative slope (−2).\n- Step 2: At a = 0: $$E(X)_{\\text{max}} = 3.6$$. At a = 0.6: $$E(X)_{\\text{min}} = 3.6 - 1.2 = 2.4$$.\n\n$$\\boxed{2.4 \\leq E(X) \\leq 3.6}$$\n\nThe function decreases because as a increases, probability mass shifts from higher values (x=4) to lower values (x=2), reducing the expected value.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In the normal distribution question, part (d) asks you to show P(not outlier) = 0.993. The outlier limits are approximately 3.42 mm and 5.58 mm. How do you standardise these limits and find the probability? (3 steps)", "answer": "- Step 1: Standardise each limit using $$Z = \\frac{L - \\mu}{\\sigma}$$ with μ = 4.5, σ = 0.4.\n- Step 2: Upper: $$Z = \\frac{5.58 - 4.5}{0.4} = \\frac{1.08}{0.4} = 2.70$$. Lower: $$Z = \\frac{3.42 - 4.5}{0.4} = -2.70$$.\n- Step 3: By symmetry: $$P(-2.70 < Z < 2.70) = P(Z < 2.70) - P(Z < -2.70) = 0.9965 - 0.0035 = 0.9930$$.\n\nThe 2.70 value is not coincidental — it reflects the exact positioning of the quartile-based outlier limits on the normal curve.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "For the regression line y = 151.2 + 2.72x, what is the correct interpretation of the gradient 2.72 in context, including units? (1 step)", "answer": "For every 1°C increase in temperature, the maximum weight of sugar that dissolves in 100g of water increases by approximately **2.72 grams** (on average).\n\nThe interpretation must include: (1) the unit of the dependent variable (grams), (2) \"per unit\" of the independent variable, and (3) \"on average\" to acknowledge this is a statistical relationship, not exact.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "In the Venn diagram part (i)(b), you find p = 1/5, q = 2/25, r = 3/25. How do you find s, the probability of being in neither A nor B? (1 step)", "answer": "All four regions must sum to 1: $$p + q + r + s = 1$$.\n\n$$s = 1 - (p + q + r) = 1 - \\left(\\frac{1}{5} + \\frac{2}{25} + \\frac{3}{25}\\right) = 1 - \\frac{10}{25} = \\frac{15}{25} = \\frac{3}{5}$$.\n\nThe \"neither\" region is simply the complement of the union A ∪ B.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "In the marble problem, part (c) asks for P(all three marbles are the same colour). Why do you only need to consider the GG→G₃ and BB→B₃ paths, and not the GB or BG paths? (2 steps)", "answer": "- Step 1: For all three to be the same colour, either all green or all blue.\n- Step 2: The GG path (green, green from X, then green from Y) gives GGG. The BB path gives BBB. The GB path (green then blue from X) gives a mix when the third marble is drawn — you cannot get all same colour from a mixed first two draws.\n\nOnly the \"pure\" first two draws (both green or both blue) can lead to all three being the same colour.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "When calculating the standard deviation from grouped histogram data, you are given ∑ft² = 41,033 and n = 100, with mean t̄ = 19.68. What formula do you use, and what common error should you avoid? (2 steps)", "answer": "- Step 1: Use $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar{t}^2} = \\sqrt{\\frac{41033}{100} - 19.68^2} = \\sqrt{23.1276} = 4.81$$.\n- Step 2: Common error: using variance (23.13) instead of taking the square root to get standard deviation.\n\nThe formula gives variance directly; you must take the square root for the standard deviation. The answer should be 4.81 minutes (3 s.f.), not 23.13.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "In the normal distribution question, you need to find P(L < 3.86) for L ~ N(4.5, 0.4²). Show the standardisation process and how you use the normal table. (2 steps)", "answer": "- Step 1: Standardise: $$Z = \\frac{3.86 - 4.5}{0.4} = \\frac{-0.64}{0.4} = -1.6$$.\n- Step 2: From tables: $$P(Z < 1.6) = 0.9452$$. By symmetry: $$P(Z < -1.6) = 1 - 0.9452 = 0.0548$$.\n\nAlways standardise first, then use the table for the positive z-value, then apply symmetry for negative values.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "In Q5 part (c), outlier limits are defined using 1.5 × IQR. Given Q₁ = 4.23 and Q₃ = 4.77, what are the upper and lower outlier limits? (2 steps)", "answer": "- Step 1: IQR = Q₃ − Q₁ = 0.5396. Then $$1.5 \\times \\text{IQR} = 0.8094$$.\n- Step 2: Upper limit = Q₃ + 1.5×IQR = 4.77 + 0.8094 ≈ 5.58 mm. Lower limit = Q₁ − 1.5×IQR = 4.23 − 0.8094 ≈ 3.42 mm.\n\nThese become the bounds for the \"not outlier\" event used in parts (d) and (e).", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "In the regression question, you are given summary statistics: ∑y = 3119, ∑y² = 851,093, ∑x² = 24,500, n = 12. You also recovered ∑x = 480 from the regression line. How do you calculate S_xx? (2 steps)", "answer": "- Step 1: Use $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$.\n- Step 2: $$S_{xx} = 24500 - \\frac{480^2}{12} = 24500 - \\frac{230400}{12} = 24500 - 19200 = 5300$$.\n\nS_xx measures the total variation in x, the denominator in both the gradient formula and the PMCC formula.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "For the discrete RV, you derive a quadratic 4a² − 2.4a + 0.32 = 0 when solving for a given Var(X) = 0.56. What are the two solutions, and how do you verify they are both valid? (3 steps)", "answer": "- Step 1: Divide by 4: $$a^2 - 0.6a + 0.08 = 0$$.\n- Step 2: Solve using quadratic formula: $$a = \\frac{0.6 \\pm \\sqrt{0.36 - 0.32}}{2} = \\frac{0.6 \\pm 0.2}{2}$$.\n- Step 3: Solutions: a = 0.4 or a = 0.2. Check against constraint 0 ≤ a ≤ 0.6: both satisfy it.\n\nBoth roots are valid here, but in other questions one root often falls outside the valid range — always check.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "In the marble question, part (d) asks for P(all green | all same colour). Why can you use the simplified formula P(A|B) = P(A)/P(B) when A ⊂ B? (2 steps)", "answer": "- Step 1: \"All green\" is a subset of \"all same colour\" — if all three are green, they are definitely all the same colour.\n- Step 2: Since A ⊂ B, we have $$P(A \\cap B) = P(A)$$, so $$P(A|B) = \\frac{P(A \\cap B)}{P(B)} = \\frac{P(A)}{P(B)}$$.\n\nThis simplifies the calculation: $$\\frac{160/936}{244/936} = \\frac{160}{244} = \\frac{40}{61}$$.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "The question states \"use linear interpolation to estimate the interquartile range\" in Q1(e), but also gives you Q₃ = 23. Why might the examiner have given Q₃, and what do you need to find? (2 steps)", "answer": "- Step 1: Q₃ = 23 lands in the awkward 18–25 class, requiring interpolation with a messy denominator.\n- Step 2: By giving you Q₃, the question lets you focus on finding Q₁ (the more straightforward interpolation into the 10–14 class), then IQR = Q₃ − Q₁ = 23 − Q₁.\n\nThis is a grading design choice — they don't want you struggling with two messy interpolations. You find Q₁ = 13.75, then IQR = 9.25.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "In the Venn diagram, you are given P(A) = 7/25, P(B) = 1/5, and P[(A ∩ B') ∪ (A' ∩ B)] = 8/25. How do you identify that the third piece of information corresponds to p + r? (1 step)", "answer": "The set $$(A \\cap B') \\cup (A' \\cap B)$$ is the symmetric difference — everything in exactly one of A or B, but not both. In Venn diagram terms, this is region p (only A) plus region r (only B), so $$p + r = \\frac{8}{25}$$.\n\nRecognising this is essential for setting up the three equations to solve for p, q, r.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "When finding the PMCC from summary statistics, why must you calculate S_xx, S_yy, and S_xy as separate labelled steps rather than computing r in one expression? (1 step)", "answer": "- It ensures you earn method marks even if the final answer has a rounding error.\n- It allows you to spot errors (e.g., negative S_yy would indicate a mistake).\n- The \"show that\" questions reward intermediate algebra — cramming everything into one line loses marks.\n\nStructure: calculate each S value, then substitute into $$r = \\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}}$$.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "In Q5 part (e), after finding P(5 < L < 5.5792) = 0.1021 and P(not outlier) = 0.993, what is the final calculation? Why is the answer approximately 0.103 and not 0.102? (2 steps)", "answer": "- Step 1: $$P(L > 5 | \\text{not outlier}) = \\frac{0.1021}{0.993} = 0.10282...$$\n- Step 2: Round to 3 decimal places: $$\\boxed{0.103}$$.\n\nThe denominator 0.993 (from part d) is crucial — you must use it rather than 1. The division slightly increases the probability because you're conditioning on a restricted range that excludes the extreme tails.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In the regression question, you are asked to comment on the reliability of the estimate at x = 90°C. What two elements must your answer contain to get full marks? (2 steps)", "answer": "- Step 1: State that 90°C is outside the data range (10 ≤ x ≤ 80) — this is **extrapolation**.\n- Step 2: Explain that extrapolation is unreliable because there is no evidence the linear relationship holds beyond the observed data.\n\nSimply saying \"unreliable\" without specifying extrapolation loses a mark. High correlation does not justify extrapolation.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "For the discrete RV, you find E(X²) = 13.2 − 12a. Verify this by calculating directly from the probability distribution. (2 steps)", "answer": "- Step 1: $$E(X^2) = \\sum x^2 \\cdot P(X=x) = 2^2(a) + 3^2(0.4) + 4^2(0.6 - a)$$.\n- Step 2: $$= 4a + 9(0.4) + 16(0.6 - a) = 4a + 3.6 + 9.6 - 16a = 13.2 - 12a$$. ✓\n\nRemember: E(X²) uses x², not [E(X)]² — a common confusion that leads to the wrong formula.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In the histogram question, the class midpoints are 7.5, 12, 16, 21.5, and 32.5 for the five classes. Why is the midpoint of 18–25 equal to 21.5 and not 21? (1 step)", "answer": "Midpoint = (lower boundary + upper boundary) / 2 = (18 + 25) / 2 = 21.5.\n\nFor grouped data, you use the class boundaries (not the stated class limits) to get the true midpoint. If classes are 18–25, the actual boundaries might be 18 and 25 (or could be 17.5–25.5 depending on the data), but the standard interpretation uses the stated boundaries.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "In the marble problem, you need to fill in the tree diagram. What are the probabilities for the third draw from bag Y when the first two draws were (i) GG, (ii) GB, (iii) BB? (2 steps)", "answer": "- After GG: Y has 6+2 = 8 green, 5 blue → P(G₃) = 8/13, P(B₃) = 5/13.\n+ After GB or BG: Y has 7 green, 6 blue → P(G₃) = 7/13, P(B₃) = 6/13.\n+ After BB: Y has 6 green, 7 blue → P(G₃) = 6/13, P(B₃) = 7/13.\n\nEach path gives different probabilities for the third draw — that's why you cannot use a single value for P(G₃) across all branches.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "The question asks you to \"use algebra to show that 2p + 2q + 2r = 4/5\" in the Venn diagram. What three equations can you form from the given information, and how do they combine to show this? (3 steps)", "answer": "- Step 1: From P(A) = p + q = 7/25.\n- Step 2: From P(B) = q + r = 1/5 = 5/25.\n- Step 3: From P[(A ∩ B') ∪ (A' ∩ B)] = p + r = 8/25.\n+ Adding all three: (p+q) + (q+r) + (p+r) = 2p + 2q + 2r = (7+5+8)/25 = 20/25 = 4/5. ✓\n\nThe algebraic manipulation is straightforward once you correctly identify what each given probability represents in terms of p, q, r.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "In Q6 part (e), you must discuss the suitability of a linear regression model with reference to both the scatter diagram AND the correlation coefficient. Why is it insufficient to cite only one? (1 step)", "answer": "The question explicitly asks for both pieces of evidence. The correlation coefficient (r = 0.988) quantifies the strength of linear relationship, while the scatter diagram shows whether the points actually follow a straight line (no curvature, no outliers). Both are needed to fully assess linear model suitability — citing only one loses a mark.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "When calculating the mean from grouped histogram data, you use the formula $$\\bar{t} = \\frac{\\sum ft}{n}$$. What does each symbol represent, and why do you use class midpoints rather than class boundaries? (2 steps)", "answer": "- Step 1: f = frequency in each class, t = class midpoint, n = total frequency (100).\n- Step 2: We use midpoints as the best estimate of the \"typical\" value within each class, assuming uniform distribution within the class.\n\nThe mean from grouped data is an estimate (since we don't know exact values), and midpoints give the best approximation under the uniform assumption.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In Q2 part (b), find P(the two marbles selected from bag X are of different colours). Show the complete calculation and why you can combine the two paths. (2 steps)", "answer": "- Step 1: Two paths: Green then Blue, or Blue then Green.\n- Step 2: $$P(G_1B_2) + P(B_1G_2) = \\frac{5}{9} \\times \\frac{4}{8} + \\frac{4}{9} \\times \\frac{5}{8} = \\frac{20}{72} + \\frac{20}{72} = \\frac{40}{72} = \\frac{5}{9}$$.\n\nThe two paths have equal probability (by symmetry), so you can double one: $$2 \\times \\frac{5}{9} \\times \\frac{4}{8} = \\frac{5}{9}$$.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "In the normal distribution, you must show that P(not outlier) = 0.993. The solution uses Z = ±2.70. Without using the outlier limits, what z-value corresponds to being within 1.5 IQR of the mean for a normal distribution? (1 step)", "answer": "Since Q₁ = μ − 0.6745σ and Q₃ = μ + 0.6745σ, the IQR = 1.349σ. Then 1.5 × IQR = 2.0235σ.\n\nSo the outlier limits are at μ ± 2.698σ (slightly different from 2.70 due to rounding). This happens to give very close to the 0.993 probability because 99.3% of a normal distribution lies within roughly 2.7 standard deviations.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In the Venn diagram problem, after finding p = 1/5, q = 2/25, r = 3/25, verify that p + q + r = 10/25 = 2/5, and explain why this is useful. (1 step)", "answer": "- p + q + r = 5/25 + 2/25 + 3/25 = 10/25 = 2/5.\n- This equals P(A ∪ B) — the probability of being in at least one of the events.\n- It then lets you find s = 1 − P(A ∪ B) = 1 − 2/5 = 3/5.\n\nThe breakdown of the sample space into four mutually exclusive regions is complete once you have all four values.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "For the regression line y = 151.2 + 2.72x with data range 10 ≤ x ≤ 80, what estimate do you get for x = 90, and why might this be chemically implausible? (2 steps)", "answer": "- Step 1: y = 151.2 + 2.72(90) = 396 grams.\n- Step 2: At 90°C, you're predicting that 396g of sugar dissolves in 100g water — this exceeds the theoretical maximum (at this temperature sugar solubility is around 320g). The linear model extrapolates beyond realistic limits.\n\nThis illustrates a key danger of extrapolation: the model can give physically impossible predictions outside the data range.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "In Q3, you derive a = 0.2 or a = 0.4 from the variance equation. If you were told additionally that E(X) > 3, which value of a would be valid? Explain. (2 steps)", "answer": "- Step 1: E(X) = 3.6 − 2a.\n- Step 2: For E(X) > 3: 3.6 − 2a > 3 → 2a < 0.6 → a < 0.3.\n- Step 3: Between a = 0.2 and a = 0.4, only a = 0.2 satisfies a < 0.3.\n\nThis demonstrates how additional constraints narrow down the possible parameter values — useful for exam questions that combine multiple pieces of information.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}], "count": 40}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "For grouped data with n = 100, where is the position of Q1 (the first quartile)? Why is this important for linear interpolation? (1 step)", "answer": "The position of Q1 is at n/4 = 100/4 = 25 (not (n+1)/4 = 25.25). \n\nIn grouped data, we use n/4 directly because the data is already grouped into intervals, so we treat each observation as occupying an equal position within its class. Using (n+1)/4 is a common error from discrete data handling.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Write the linear interpolation formula for finding the kth percentile (including Q1, Q3) in grouped data. Define all variables. (1 step)", "answer": "The formula is: Q = L + (kn/4 - F_before) / f_class × w\n\nWhere:\n- L = lower class boundary of the quartile class\n- F_before = cumulative frequency before this class\n- f_class = frequency in the quartile class\n- w = class width\n\nThis formula finds where the quartile position falls within a class by assuming uniform distribution within each class interval.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "For grouped data with n = 100, the 25th value falls in the class 10-14 with frequency 16, cumulative before = 10, class width = 4. Calculate Q1 using linear interpolation. (2 steps)", "answer": "- Step 1: Identify position: kn/4 = 25, which falls in the 10-14 class.\n- Step 2: Apply formula: Q1 = L + (25 - 10)/16 × 4 = 10 + 15/16 × 4 = 10 + 3.75 = 13.75\n\nThe interpolation tells us the 25th person took 13.75 minutes — we linearly interpolate because the exact value within the class is unknown.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "When calculating the mean from a grouped frequency table, why do we use class midpoints instead of the exact values? (1 step)", "answer": "We use midpoints because we don't know the exact distribution within each class. The midpoint is the best single representative value for the entire class under the assumption of uniform distribution within the interval.\n\nFor example, class 18-25 has midpoint (18+25)/2 = 21.5, representing all values in that interval.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Given frequency table data with midpoints and frequencies, write the formula for calculating the mean of grouped data. (1 step)", "answer": "$$\\bar{x} = \\frac{\\sum f \\cdot x}{\\sum f} = \\frac{\\sum f \\cdot x}{n}$$\n\nWhere x = class midpoint, f = frequency. The numerator sums all values (each midpoint multiplied by how many observations fall in that class), dividing by total n gives the average.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "The standard deviation formula for grouped data is σ = √(Σft²/n - t̄²). Explain what each term represents and why we subtract the square of the mean. (2 steps)", "answer": "- Step 1: Σft²/n calculates the mean of the squared values (E(X²)), while t̄² is [E(X)]².\n- Step 2: By the variance identity Var(X) = E(X²) - [E(X)]², we subtract the squared mean from the mean of squares to get variance, then square-root to get standard deviation.\n\nThis is mathematically equivalent to the \"formula method\" for calculating variance, avoiding the need to list every individual observation.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "A student calculates Σft² = 41,033 for 100 observations with mean 19.68. Calculate the standard deviation. (2 steps)", "answer": "- Step 1: Calculate Σft²/n = 41,033/100 = 410.33\n- Step 2: σ = √(410.33 - 19.68²) = √(410.33 - 387.20) = √23.13 = 4.81 minutes\n\nThe standard deviation tells us that typical swim times deviate about 4.81 minutes from the mean of 19.68 minutes.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "For the histogram problem, the class 14-18 has frequency 24. Using linear interpolation, how many people took between 14 and 16 minutes? (2 steps)", "answer": "- Step 1: The portion from 14 to 16 is (16-14)/(18-14) = 2/4 = 1/2 of the class.\n- Step 2: Frequency = (1/2) × 24 = 12 people.\n\nThis is how we estimate cumulative frequencies for values that don't align with class boundaries.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Why is IQR = Q3 - Q1 useful, and what does it measure about a distribution? (1 step)", "answer": "IQR (Interquartile Range) measures the spread of the middle 50% of the data, between the 25th and 75th percentiles. It's robust to outliers because it uses only the central half of the distribution, unlike the full range which can be distorted by extreme values.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "A student says \"For grouped data, you always use (n+1)/4 to find the quartile position.\" What's wrong with this statement? (1 step)", "answer": "This is incorrect for grouped data. We use n/4 directly (position 25 for n=100) not (n+1)/4 (position 25.25). \n\nThe (n+1)/4 formula is for discrete data when you want to interpolate between actual ordered observations. With grouped data, the observations are already compressed into intervals, so n/4 is the correct position. This is a common error that loses marks.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Bag X has 5 green and 4 blue marbles (9 total). A marble is drawn and placed in Bag Y, then a second marble is drawn from X. What are the probabilities for the first draw? (1 step)", "answer": "First draw from X (9 marbles): P(G₁) = 5/9, P(B₁) = 4/9\n\nThis is simple probability with replacement from the original bag — we haven't transferred anything yet.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "After drawing a green marble first (leaving 4 green, 4 blue in X), what are the probabilities for the second draw from X? (1 step)", "answer": "After G₁: P(G₂|G₁) = 4/8 = 1/2, P(B₂|G₁) = 4/8 = 1/2\n\nAfter drawing green first, X now has 8 marbles (4G, 4B), hence equal probabilities for each color on the second draw.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "After drawing a blue marble first (leaving 5 green, 3 blue in X), what are the probabilities for the second draw from X? (1 step)", "answer": "After B₁: P(G₂|B₁) = 5/8, P(B₂|B₁) = 3/8\n\nThe composition of Bag X changed differently depending on the first draw — this is why we need a tree diagram to track all paths.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "After transferring 2 marbles from X to Y, how many marbles does Y contain? Why does this matter for the third draw? (1 step)", "answer": "Y originally has 6G + 5B = 11 marbles. After receiving 2 transferred marbles, Y now has 13 marbles total (not 11).\n\nThis is a common error — students forget to add the transferred marbles when calculating the third draw probability. The denominator for the third draw is 13, not 11.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "If two green marbles were transferred to Y (GG path), what's the probability that the third draw from Y is green? (1 step)", "answer": "After GG transfer: Y has 6+2 = 8 green, 5 blue. P(G₃|GG) = 8/13\n\nThis is path-dependent — the probability of green on the third draw depends on what was transferred in the first two draws.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Calculate P(two marbles from X are different colors). Show why this equals 5/9. (3 steps)", "answer": "- Step 1: Two paths give different colors: G₁B₂ or B₁G₂\n- Step 2: P(G₁B₂) = (5/9) × (4/8) = 20/72\n- Step 3: P(B₁G₂) = (4/9) × (5/8) = 20/72. Sum = 40/72 = 5/9\n\nThe probability is 5/9 ≈ 0.556 — slightly more likely than not to get different colors.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Calculate P(all three marbles are the same color). (3 steps)", "answer": "- Step 1: All green (GGG path): (5/9) × (4/8) × (8/13) = 160/936\n- Step 2: All blue (BBB path): (4/9) × (3/8) × (7/13) = 84/936\n- Step 3: Total = (160 + 84)/936 = 244/936 = 61/234 ≈ 0.261\n\nAbout 26% of the time, all three selected marbles will be the same color.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Given that all three marbles are the same color, find P(all green | same color). Explain why this is a conditional probability requiring the denominator P(same). (3 steps)", "answer": "- Step 1: P(all G | same) = P(all G ∩ same) / P(same)\n- Step 2: Since \"all green\" implies \"same color\", P(all G ∩ same) = P(all G) = 160/936\n- Step 3: P(all G | same) = (160/936) / (244/936) = 160/244 = 40/61 ≈ 0.656\n\nGiven that all three match, there's about a 66% chance they're all green (more likely than all blue) because green was more common in the original bags.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A student calculates P(G₃) = 7/13 and uses this for all branches in the tree. Why is this wrong? (1 step)", "answer": "This is incorrect because P(G₃) is path-dependent — it changes based on what was transferred:\n- After GG: 8/13\n- After GB or BG: 7/13\n- After BB: 6/13\n\nUsing a single value ignores how the composition of Y changes with each transfer scenario.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "In conditional probability P(A|B), what does the denominator P(B) represent conceptually? (1 step)", "answer": "P(B) represents the total probability of the new, restricted sample space — we're now only considering outcomes where event B occurred. \n\nIn Q2(d), we're saying \"given that all three marbles are the same color (event B), what's the probability they're all green (event A)?\" The denominator rescales from the full sample space to only the \"same color\" outcomes.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "A discrete random variable X has P(X=2) = a, P(X=3) = 0.4, P(X=4) = 0.6 - a. What constraint must a satisfy for this to be a valid probability distribution? (1 step)", "answer": "Each probability must be between 0 and 1: a ≥ 0 and 0.6 - a ≥ 0, so 0 ≤ a ≤ 0.6.\n\nNote that the probabilities automatically sum to 1: a + 0.4 + (0.6 - a) = 1 ✓", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Find E(X) in terms of a for the distribution P(X=2) = a, P(X=3) = 0.4, P(X=4) = 0.6 - a. (2 steps)", "answer": "- Step 1: E(X) = Σ x · P(X=x) = 2a + 3(0.4) + 4(0.6 - a)\n- Step 2: = 2a + 1.2 + 2.4 - 4a = 3.6 - 2a\n\nE(X) decreases as a increases because the probability shifts from higher values (4) toward lower values (2).", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Find the range of possible values for E(X) given 0 ≤ a ≤ 0.6. (2 steps)", "answer": "- Step 1: E(X) = 3.6 - 2a is linear decreasing in a\n- Step 2: Maximum at a = 0: E(X) = 3.6; Minimum at a = 0.6: E(X) = 3.6 - 1.2 = 2.4\n- Therefore: 2.4 ≤ E(X) ≤ 3.6\n\nThe expected value can vary by 1.2 units depending on the parameter a.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Calculate E(X²) for the distribution with P(X=2) = a, P(X=3) = 0.4, P(X=4) = 0.6 - a. (2 steps)", "answer": "- Step 1: E(X²) = Σ x² · P(X=x) = 4a + 9(0.4) + 16(0.6 - a)\n- Step 2: = 4a + 3.6 + 9.6 - 16a = 13.2 - 12a\n\nNote: E(X²) uses x² values, not [E(X)]².", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Given Var(X) = 0.56, a = unknown, E(X) = 3.6 - 2a, and E(X²) = 13.2 - 12a, set up the equation to solve for a. (3 steps)", "answer": "- Step 1: Use Var(X) = E(X²) - [E(X)]²\n- Step 2: 0.56 = (13.2 - 12a) - (3.6 - 2a)²\n- Step 3: Expand (3.6 - 2a)² = 12.96 - 14.4a + 4a²\n- Step 4: 0.56 = 13.2 - 12a - 12.96 + 14.4a - 4a² = 0.24 + 2.4a - 4a²\n- Step 5: Rearranging: 4a² - 2.4a + 0.32 = 0\n\nThe key is to expand the squared term correctly before rearranging to quadratic = 0.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "Solve the quadratic 4a² - 2.4a + 0.32 = 0 to find the possible values of a. (2 steps)", "answer": "- Step 1: Divide by 4: a² - 0.6a + 0.08 = 0\n- Step 2: Using quadratic formula: a = [0.6 ± √(0.36 - 0.32)]/2 = [0.6 ± √0.04]/2 = [0.6 ± 0.2]/2\n- Solutions: a = 0.4 or a = 0.2\n\nBoth solutions satisfy 0 ≤ a ≤ 0.6, so both are valid.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A student expands (3.6 - 2a)² as \"3.6² - 2a²\" and gets a wrong answer. What is the correct expansion? (1 step)", "answer": "The correct expansion is (3.6 - 2a)² = 3.6² - 2(3.6)(2a) + (2a)² = 12.96 - 14.4a + 4a².\n\nCommon error: forgetting the middle term (the \"cross term\"). Always use (A - B)² = A² - 2AB + B².", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Why must we check whether solutions to the quadratic satisfy the constraint 0 ≤ a ≤ 0.6? (1 step)", "answer": "Not all algebraic solutions are valid probability values. Sometimes a quadratic equation will produce roots outside the valid parameter range. The constraint check is essential — solutions that violate probability rules must be discarded. This is a common way examiners test attention to detail.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "What's the difference between E(X) and E(X²)? Why can't we use E(X)² to find variance? (1 step)", "answer": "E(X) is the expected value (mean) of X. E(X²) is the expected value of X² — we square each value BEFORE taking the expectation.\n\nE(X)² is the square of the mean. Since (E[X²]) ≥ (E[X])² (by Jensen's inequality for convex functions), they are different. Variance = E(X²) - [E(X)]² requires computing E(X²) separately.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "In a Venn diagram with two sets A and B, label the four regions and state what each represents in terms of A, B, and their complements. (1 step)", "answer": "- p = A ∩ B' (A only, not B)\n- q = A ∩ B (both A and B)\n- r = A' ∩ B (B only, not A)\n- s = A' ∩ B' (neither A nor B)\n\nThese four mutually exclusive regions partition the entire sample space.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "The symmetric difference (A ∩ B') ∪ (A' ∩ B) represents the region where exactly one of A or B occurs. If P(A) = 7/25, P(B) = 5/25, and P(symmetric difference) = 8/25, show that 2p + 2q + 2r = 4/5. (3 steps)", "answer": "- Step 1: Write equations: p + q = 7/25 (A), q + r = 5/25 (B), p + r = 8/25 (symmetric difference)\n- Step 2: Add all three equations: (p+q) + (q+r) + (p+r) = 2p + 2q + 2r\n- Step 3: RHS = 7/25 + 5/25 + 8/25 = 20/25 = 4/5. Hence 2p + 2q + 2r = 4/5 ✓\n\nThis is a \"show that\" question requiring algebraic manipulation.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Given p + q = 7/25, q + r = 5/25, and p + r = 8/25, find the values of p, q, r, and s. (3 steps)", "answer": "- Step 1: From Q4.2, p + q + r = 10/25 = 2/5\n- Step 2: Find q: (p+q) + (q+r) = (p+q+r) + q → 7/25 + 5/25 = 2/5 + q → q = 2/25\n- Step 3: Then p = 7/25 - 2/25 = 5/25 = 1/5; r = 5/25 - 2/25 = 3/25; s = 1 - 10/25 = 15/25 = 3/5\n\nCheck: p + r = 5/25 + 3/25 = 8/25 ✓", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "What is the mathematical definition of two events being mutually exclusive? (1 step)", "answer": "Events C and D are mutually exclusive if P(C ∩ D) = 0 — they cannot occur simultaneously. \n\nEquivalently, P(C ∪ D) = P(C) + P(D).", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "If two events C and D are mutually exclusive, what inequality must their probabilities satisfy? Why? (1 step)", "answer": "Since P(C ∪ D) = P(C) + P(D) for mutually exclusive events, and any probability is at most 1, we must have P(C) + P(D) ≤ 1.\n\nThis is the key inequality that will form the basis of the contradiction proof.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "Given P(C) = x/(x+5) and P(D) = 5/x for x > 0, show that C and D cannot be mutually exclusive. (4 steps)", "answer": "- Step 1: Assume mutual exclusivity. Then must have P(C) + P(D) ≤ 1.\n- Step 2: Compute sum: P(C) + P(D) = x/(x+5) + 5/x = [x² + 5(x+5)] / [x(x+5)] = (x² + 5x + 25) / (x² + 5x)\n- Step 3: Notice numerator = denominator + 25, so = 1 + 25/(x² + 5x)\n- Step 4: Since x > 0, x² + 5x > 0, so 25/(x² + 5x) > 0, giving P(C) + P(D) = 1 + positive term > 1\n- Conclusion: This contradicts P(C) + P(D) ≤ 1, so cannot be mutually exclusive.\n\nThe algebraic trick of writing it as \"1 + 25/(x²+5x)\" makes the inequality obvious.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "In the Venn diagram proof, why is rewriting the sum as 1 + 25/(x²+5x) more effective than trying to solve a quadratic inequality? (1 step)", "answer": "This form immediately reveals that the sum exceeds 1 for all positive x, without needing to solve any inequality. The \"1 + something positive\" structure is immediately recognizable as > 1. A quadratic inequality approach would work but is unnecessarily complex — the restructuring is elegant and efficient.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "If P(A) = 0.3 and P(B) = 0.5, what's the maximum possible value of P(A ∪ B)? What's the minimum? (1 step)", "answer": "Maximum: When A ⊆ B or overlap is maximal, P(A ∪ B) = max(P(A), P(B)) = 0.5. Actually wait — maximum is when they're as overlapping as possible, giving P(A ∪ B) = P(B) = 0.5.\n\nMinimum: When mutually exclusive, P(A ∪ B) = 0.3 + 0.5 = 0.8. So the range is [0.5, 0.8].\n\nActually: maximum is when A ⊆ B → P(A∪B) = P(B) = 0.5; minimum when mutually exclusive = 0.8. Wait — minimum should be when they overlap as little as possible... Let me recalculate.\n\nThe minimum is when A ⊆ B, giving P(A∪B) = P(B) = 0.5. The maximum is when mutually exclusive, P(A∪B) = 0.8. So [0.5, 0.8].", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "For X ~ N(μ, σ²), write the standardization formula and explain what it achieves. (1 step)", "answer": "Z = (X - μ) / σ transforms X to the standard normal distribution Z ~ N(0, 1).\n\nThis allows us to use standard normal tables to find probabilities for any normal distribution, regardless of its mean and standard deviation.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "X ~ N(4.5, 0.4²). Find P(X < 3.86). (2 steps)", "answer": "- Step 1: Standardize: Z = (3.86 - 4.5) / 0.4 = -0.64/0.4 = -1.6\n- Step 2: P(Z < -1.6) = 1 - P(Z < 1.6) = 1 - 0.9452 = 0.0548\n\nAbout 5.5% of houseflies have wing lengths below 3.86 mm.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "What is the z-value for the 75th percentile (Q3) of the standard normal distribution? How do we use it to find quartiles of N(μ, σ²)? (1 step)", "answer": "For Q3 (75th percentile), z = 0.6745 (from normal tables, Φ(0.6745) ≈ 0.75).\n\nFor X ~ N(μ, σ²): Q3 = μ + 0.6745σ, Q1 = μ - 0.6745σ.\n\nThis z-value should be memorized — it's not in the formula booklet.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "For L ~ N(4.5, 0.4²), find Q3 and Q1. (2 steps)", "answer": "- Step 1: Q3 = 4.5 + 0.6745 × 0.4 = 4.5 + 0.2698 = 4.77 mm\n- Step 2: Q1 = 4.5 - 0.6745 × 0.4 = 4.5 - 0.2698 = 4.23 mm\n\nThe interquartile range is 4.77 - 4.23 = 0.54 mm.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "Define the outlier limits for a dataset using the 1.5 × IQR rule. (1 step)", "answer": "Upper limit = Q3 + 1.5 × IQR\nLower limit = Q1 - 1.5 × IQR\n\nWhere IQR = Q3 - Q1. Any value outside these limits is considered an outlier.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "With Q3 = 4.77, Q1 = 4.23, find the outlier limits. (2 steps)", "answer": "- Step 1: IQR = 4.77 - 4.23 = 0.54; 1.5 × IQR = 0.81\n- Step 2: Upper = 4.77 + 0.81 = 5.58 mm; Lower = 4.23 - 0.81 = 3.42 mm\n\nValues above 5.58 mm or below 3.42 mm are outliers.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "Find P(not an outlier) for L ~ N(4.5, 0.4²) with outlier limits 3.42 and 5.58. Show it equals 0.993. (3 steps)", "answer": "- Step 1: Standardize both limits: Z_upper = (5.58-4.5)/0.4 = 2.70; Z_lower = (3.42-4.5)/0.4 = -2.70\n- Step 2: P(-2.70 < Z < 2.70) = P(Z < 2.70) - P(Z < -2.70) = 0.9965 - 0.0035 = 0.993\n- Step 3: By symmetry, P(Z > 2.70) = 0.0035, so the interval captures 1 - 2(0.0035) = 0.993 of the distribution.\n\nAbout 99.3% of observations are not outliers under this definition.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "Given the housefly is NOT an outlier (3.42 < L < 5.58), find P(L > 5 | not outlier). Explain why we can't just use P(L > 5). (4 steps)", "answer": "- Step 1: We need P(L > 5 | N) where N = {3.42 < L < 5.58}\n- Step 2: P(L > 5 | N) = P(L > 5 AND N) / P(N) = P(5 < L < 5.58) / 0.993\n- Step 3: Standardize: P(5 < L < 5.58) = P(1.25 < Z < 2.70) = 0.9965 - 0.8944 = 0.1021\n- Step 4: P(L > 5 | N) = 0.1021 / 0.993 ≈ 0.103\n\nWe must intersect the event L > 5 with the condition band (not outlier) because the condition restricts the sample space. Using just P(L > 5) would ignore that being above 5 already restricts us to the upper non-outlier region.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "A student calculates P(L > 5 | not outlier) as P(Z > 1.25) / 0.993 = 0.1056/0.993 ≈ 0.106. Why is this wrong? (1 step)", "answer": "This is wrong because the numerator should be P(5 < L < 5.58), not P(L > 5). The conditional \"not outlier\" caps the upper limit at 5.58 — we can't ignore this upper bound. The intersection with the conditioning event changes the probability.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "Why is using z = 0.6745 better than z = 0.67 for quartile calculations? (1 step)", "answer": "Using 0.67 gives slight error: 0.6745 × 0.4 = 0.2698 vs 0.67 × 0.4 = 0.268. Over multiple calculations (Q3, Q1, IQR, outlier limits), this error compounds. Using the exact value 0.6745 ensures accuracy to the required 3 significant figures.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "In the conditional probability P(A|B), what does it mean when A is a subset of B? (1 step)", "answer": "When A ⊆ B, every outcome in A is also in B. In this case, P(A ∩ B) = P(A), simplifying the conditional formula to P(A|B) = P(A)/P(B).\n\nThis happens in Q5(e) where \"L > 5 and not outlier\" simplifies to \"5 < L < 5.58\" because the upper bound of the condition restricts the event.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "The regression line is y = 151.2 + 2.72x. Give a precise interpretation of the gradient 2.72. (1 step)", "answer": "For every 1°C increase in temperature, the maximum weight of sugar that dissolves in 100g of water increases by approximately 2.72 grams, on average.\n\nMust include: units (grams per °C), \"per unit increase,\" and \"on average\" (since it's a regression, not exact).", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "Using y = 151.2 + 2.72x, estimate the sugar dissolve weight at x = 90°C. Why might this be unreliable? (2 steps)", "answer": "- Step 1: y = 151.2 + 2.72(90) = 151.2 + 244.8 = 396 grams\n- Step 2: This is unreliable because 90°C is outside the data range (10 ≤ x ≤ 80). This is extrapolation — we have no evidence the linear relationship holds beyond the observed range.\n\nThe high correlation doesn't justify extrapolation.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "What is the difference between interpolation and extrapolation when using a regression model? (1 step)", "answer": "Interpolation: predicting within the observed range of x — generally reliable as it's within the data's \"footprint.\"\n\nExtrapolation: predicting outside the observed range — unreliable because we assume the linear relationship continues, but the relationship may change beyond the observed data.", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "Write the formulas for Sxx, Syy, and Sxy in terms of summary statistics. (1 step)", "answer": "Sxx = Σx² - (Σx)²/n\nSyy = Σy² - (Σy)²/n\nSxy = Σxy - (Σx)(Σy)/n\n\nThese are the \"sums of squares\" and \"sum of products\" needed for regression calculations.", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": false}, {"question": "Given regression line y = 151.2 + 2.72x passes through (x̄, ȳ), and Σy = 3119 with n = 12, find x̄. (2 steps)", "answer": "- Step 1: ȳ = 3119/12 = 259.917\n- Step 2: At the mean point: ȳ = a + b x̄ → 259.917 = 151.2 + 2.72x̄ → 2.72x̄ = 108.717 → x̄ ≈ 40\n\nThe mean x-value is 40°C.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": false}, {"question": "With Σx² = 24,500, n = 12, and x̄ = 40, calculate Sxx. (2 steps)", "answer": "- Step 1: Σx = n × x̄ = 12 × 40 = 480\n- Step 2: Sxx = Σx² - (Σx)²/n = 24,500 - (480)²/12 = 24,500 - 192,000/12 = 24,500 - 16,000 = 8,500\n\nWait, let me recalculate: 480² = 230,400. 230,400/12 = 19,200. Sxx = 24,500 - 19,200 = 5,300. ✓", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": false}, {"question": "The gradient b = 2.72. How do we find Sxy from this? (1 step)", "answer": "From the regression formula b = Sxy/Sxx, we get Sxy = b × Sxx = 2.72 × 5,300 = 14,416.\n\nThis is useful when Σxy isn't given directly — we can recover it from the regression line.", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "Given Sxx = 5,300, Syy = 40,412.917, Sxy = 14,416, calculate the PMCC r. (2 steps)", "answer": "- Step 1: r = Sxy / √(Sxx × Syy) = 14,416 / √(5,300 × 40,412.917)\n- Step 2: Denominator = √(214,188,461) ≈ 14,635.5 → r ≈ 14,416/14,635.5 ≈ 0.985\n\nBut the official answer is 0.988 because the exact Σxy = 14,590 was used (not the recovered value). The precise calculation with exact values gives r = 0.988 to 3 d.p.", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "What does an r value of 0.988 indicate about the relationship between x and y? (1 step)", "answer": "r = 0.988 indicates a very strong positive linear correlation — the points lie very close to a straight line, and the linear model explains about 97.6% of the variance (r² ≈ 0.976).", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "When discussing suitability of a linear regression model, what two pieces of evidence should you cite? (1 step)", "answer": "You should cite BOTH:\n1. The PMCC value (r close to 1 indicates strong linear correlation)\n2. The scatter diagram (points close to a straight line with no obvious curvature)\n\nReferring to only one loses a mark — both pieces of evidence are required.", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": false}, {"question": "A student says \"The estimate at x = 90 is reliable because r = 0.988 is very high.\" What's wrong with this reasoning? (1 step)", "answer": "High correlation does NOT justify extrapolation. r measures how well the model fits the observed data, not whether the relationship extends beyond that data. At x = 90, we're extrapolating outside 10 ≤ x ≤ 80, so the estimate is unreliable regardless of r.", "source": "MiniMax ②", "_id": "minimax_2_58", "judge_pick": false}, {"question": "If the scatter diagram shows points following a curve (not a line), but r is still high, should we use linear regression? (1 step)", "answer": "No. A high r can occur even with curved relationships over a small range. The scatter diagram revealing curvature takes precedence — we should use a non-linear model. Always check the scatter plot, not just the number.", "source": "MiniMax ②", "_id": "minimax_2_59", "judge_pick": false}], "count": 60}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "In a histogram-based grouped data question, what is the very first thing you must do before computing any mean, sd, or quartile, and why?", "answer": "- Step 1: Reconstruct any missing class frequencies from the histogram. Frequency $$= \\text{frequency density} \\times \\text{class width}$$, so use a class whose frequency you already know to fix the frequency-density scale, then read off the missing bars by area.\n- Step 2: Check that all class frequencies sum to the given total (e.g. 100). This is both a sanity check and the source of marks for later parts.\n- Step 3: Without those frequencies you literally cannot build the cumulative-frequency table, so quartile interpolation, mean, and sd are all blocked. The data setup is a prerequisite, not an afterthought.\n\nTakeaway: in grouped-data questions, finish the data table before touching any formula.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why does a histogram require you to read off **area**, not bar height, to get class frequencies?", "answer": "- Step 1: Histograms display **frequency density** on the vertical axis precisely so unequal class widths can be compared fairly.\n- Step 2: Frequency $$= \\text{density} \\times \\text{width}$$, which is the *area* of the bar. A tall, narrow bar can represent fewer people than a short, wide one.\n- Step 3: Reading by height alone over-counts narrow classes and under-counts wide ones, corrupting every downstream statistic.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "Using linear interpolation, how do you estimate the number of people in a sub-range that cuts a class in half (e.g. people with $$t < 16$$ when the class is 14–18 with frequency 24)? (3 steps)", "answer": "- Step 1: Assume the 24 observations are uniformly spread across the class 14–18.\n- Step 2: The proportion of the class falling below 16 is $$\\frac{16-14}{18-14} = \\frac{1}{2}$$.\n- Step 3: Frequency in $$14 \\le t < 16$$ is $$\\frac{1}{2}\\times 24 = 12$$. Add cumulative frequencies of all earlier classes to get the total below 16.\n\nTakeaway: interpolation = ratio of the sub-interval to the class width, multiplied by the class frequency.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "When computing the mean of grouped data, what value of $$t$$ do you use for each class, and how is it found?", "answer": "- Step 1: Use the **class midpoint**, computed as $$\\frac{\\text{lower boundary} + \\text{upper boundary}}{2}$$.\n- Step 2: For unequal classes this means each midpoint is different — e.g. 5–10 gives 7.5, but 18–25 gives 21.5, and 25–40 gives 32.5.\n- Step 3: Then $$\\bar t = \\frac{\\sum ft}{n}$$. The midpoint is the best single representative when you have no within-class information.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "What is the frequency-form standard deviation formula, and what does it conceptually mean?", "answer": "- Step 1: $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar t^{\\,2}}$$.\n- Step 2: The first term $$\\frac{\\sum ft^2}{n}$$ is $$E(T^2)$$ — the mean of the squared midpoints weighted by frequency.\n- Step 3: Subtracting $$\\bar t^{\\,2}$$ removes the \"centre\" contribution, leaving the average squared spread about the mean. The square root brings it back to the original units (minutes).\n\nCommon pitfall: stopping at $$\\sigma^2$$ and reporting variance when the question asks for standard deviation.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "For grouped continuous data on an IAL paper, which quartile position rule do you use — $$\\frac{n}{4}$$ or $$\\frac{n+1}{4}$$?", "answer": "- Step 1: Use $$\\frac{n}{4}$$ directly. For $$n = 100$$ this gives position 25, not 25.25.\n- Step 2: The $$\\frac{n+1}{4}$$ rule belongs to **discrete** data (ranked lists) where you need to land on actual data points.\n- Step 3: Grouped continuous data is treated as a continuum, so the quartile sits at the exact fractional position $$\\frac{n}{4}$$ within the cumulative-frequency curve.\n\nCommon error: using $$\\frac{n+1}{4}$$ for grouped data — wrong framework entirely.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "State the linear interpolation formula for the $$k$$-th quartile in grouped data, and explain what each symbol means. (3 steps)", "answer": "- Step 1: $$Q = L + \\frac{\\frac{kn}{4} - F_{\\text{before}}}{f_{\\text{class}}}\\times w$$.\n- Step 2: Symbols:\n+ $$L$$ = lower boundary of the class containing the quartile\n+ $$F_{\\text{before}}$$ = cumulative frequency *just before* that class\n+ $$f_{\\text{class}}$$ = frequency *of* that class (denominator — not cumulative!)\n+ $$w$$ = class width\n- Step 3: The fraction $$\\frac{kn/4 - F_{\\text{before}}}{f_{\\text{class}}}$$ is the proportion you need to travel *into* the class to reach the quartile position; multiplying by $$w$$ converts that proportion into a distance in the variable's units.\n\nCommon pitfall: putting cumulative frequency in the denominator instead of the class frequency.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "In Q1, why did the examiners hand you $$Q_3 = 23$$ as a given rather than ask you to compute it?", "answer": "- Step 1: The class containing $$Q_3$$ would be 18–25, which has class width 7 — much messier than the other classes.\n- Step 2: Handing you $$Q_3$$ saves you from the awkward interpolation and lets the question test only the $$Q_1$$ computation.\n- Step 3: It's a signal: don't try to re-derive $$Q_3$$, just use it to form the IQR. Trust the gift.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "When choosing which class contains $$Q_1$$ in a grouped data set with $$n=100$$, what cumulative frequency are you searching for, and how do you identify the correct class? (3 steps)", "answer": "- Step 1: Position = $$\\frac{n}{4} = 25$$ (for grouped data).\n- Step 2: Walk down the cumulative-frequency column. The correct class is the one where the cumulative frequency first *reaches or exceeds* 25.\n- Step 3: If cumulative jumps from 10 (after class 1) to 26 (after class 2), then position 25 sits inside class 2. So $$F_{\\text{before}}=10$$ and $$f_{\\text{class}}$$ = frequency of class 2.\n\nPitfall: jumping to the wrong class because you didn't recompute the cumulative column from corrected frequencies.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "In a marble-transfer problem, why does the *total number of marbles in the receiving bag* change for the final draw, and what does this mean for the probability tree? (3 steps)", "answer": "- Step 1: Two marbles are transferred *into* Y from X before the third draw. So Y's count goes from 11 to **13**, regardless of which colours were transferred.\n- Step 2: The **composition** of Y (how many green vs blue) depends on the path taken, so the *numerator* of $$P(G_3)$$ varies by branch even though the denominator is always 13.\n- Step 3: Specifically: after $$GG$$ → 8G/5B; after $$GB$$ or $$BG$$ → 7G/6B; after $$BB$$ → 6G/7B.\n\nCommon error: keeping Y at 11 (forgetting the transfers count) or using a single $$P(G_3)$$ everywhere.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "In a marble-transfer tree where the first two draws come from bag X (initially 5G/4B), how do the conditional probabilities for the second draw differ across branches?", "answer": "- Step 1: After draw 1, bag X has only 8 marbles total (one was removed).\n- Step 2: Branch-dependent compositions:\n+ After $$G_1$$ (a green was removed): X is now 4G/4B, so $$P(G_2|G_1) = P(B_2|G_1) = \\frac{4}{8}$$.\n+ After $$B_1$$ (a blue was removed): X is now 5G/3B, so $$P(G_2|B_1) = \\frac{5}{8}$$ and $$P(B_2|B_1) = \\frac{3}{8}$$.\n- Step 3: This is sampling without replacement: both numerator and denominator must be updated to reflect what was actually taken.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "In the marble-transfer problem, find $$P(\\text{2 marbles drawn from X are different colours})$$ conceptually, without long arithmetic. (3 steps)", "answer": "- Step 1: \"Different colours\" means the path is either $$G_1B_2$$ or $$B_1G_2$$. These are disjoint, so add.\n- Step 2: $$P(G_1B_2) = \\frac{5}{9}\\cdot\\frac{4}{8}$$ and $$P(B_1G_2) = \\frac{4}{9}\\cdot\\frac{5}{8}$$. Both products have the same numerator (20) and denominator (72) by symmetry.\n- Step 3: Total $$= \\frac{40}{72} = \\frac{5}{9} \\approx 0.556$$.\n\nInsight: in two-draw-without-replacement problems, the two \"different colour\" paths often combine to the same product because $$\\frac{a}{n}\\cdot\\frac{b}{n-1} + \\frac{b}{n}\\cdot\\frac{a}{n-1} = \\frac{2ab}{n(n-1)}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "When finding $$P(\\text{all 3 marbles same colour})$$ in the transfer problem, why are only two of the four tree branches relevant? (3 steps)", "answer": "- Step 1: For all-green you need $$G_1, G_2,$$ and $$G_3$$. The first two come from X, so you must travel down the $$GG$$ branch.\n- Step 2: Similarly, all-blue requires the $$BB$$ branch — mixed branches like $$GB$$ or $$BG$$ already have one of each colour from X, so all three can't match.\n- Step 3: Therefore $$P(\\text{same}) = P(GGG) + P(BBB)$$, using $$P(G_3|GG)=\\frac{8}{13}$$ and $$P(B_3|BB)=\\frac{7}{13}$$.\n\nTakeaway: identify the *only* paths that contribute before computing.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Given $$A = \\{\\text{all three green}\\}$$ and $$B = \\{\\text{all three same colour}\\}$$, simplify $$P(A \\mid B)$$ and explain why the simplification works. (3 steps)", "answer": "- Step 1: Notice $$A \\subset B$$: if all three are green, then certainly all three are the same colour.\n- Step 2: Therefore $$P(A \\cap B) = P(A)$$, and the conditional collapses to $$P(A \\mid B) = \\frac{P(A)}{P(B)}$$.\n- Step 3: Numerically, $$\\frac{160/936}{244/936} = \\frac{160}{244} = \\frac{40}{61} \\approx 0.656$$. Keeping a common denominator makes the cancellation transparent.\n\nCommon error: forgetting the conditioning and reporting $$P(A)$$ alone.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "For a discrete random variable $$X$$ with probabilities involving an unknown $$a$$, what is the *first* thing you must do before any expectation or variance calculation? (3 steps)", "answer": "- Step 1: Verify that probabilities sum to 1 — sometimes this fixes $$a$$, sometimes (as here) it's automatically satisfied.\n- Step 2: Apply the validity constraint: every probability lies in $$[0,1]$$. So if the table contains $$a$$ and $$0.6-a$$, you need both $$a \\ge 0$$ and $$0.6 - a \\ge 0$$, giving $$0 \\le a \\le 0.6$$.\n- Step 3: This range is its own examined mark — and it's the constraint you'll check candidate roots against at the end.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "For a discrete random variable, state the three core formulae for $$E(X)$$, $$E(X^2)$$, and $$\\text{Var}(X)$$, and explain why $$E(X^2) \\neq [E(X)]^2$$.", "answer": "- Step 1: $$E(X) = \\sum x P(X=x)$$, $$E(X^2) = \\sum x^2 P(X=x)$$, $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$.\n- Step 2: $$E(X^2)$$ first squares each value of $$X$$ then averages; $$[E(X)]^2$$ first averages then squares. By Jensen's inequality (or just experimenting with two values), squaring is convex, so $$E(X^2) \\ge [E(X)]^2$$ — the gap is exactly the variance.\n- Step 3: This is why $$\\text{Var}(X) \\ge 0$$ always. The variance measures how much $$X^2$$'s average exceeds the square of $$X$$'s average — a direct measure of spread.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "When you set up the variance equation $$\\text{Var}(X) = E(X^2) - [E(X)]^2 = c$$ with $$E(X)$$ linear in $$a$$, what's the standard procedural trap, and how do you avoid it? (3 steps)", "answer": "- Step 1: $$[E(X)]^2$$ is being *subtracted* from $$E(X^2)$$. Compute the square *as a clean bracket first*: $$(3.6 - 2a)^2 = 12.96 - 14.4a + 4a^2$$.\n- Step 2: Only then distribute the minus sign through every term — three sign flips, not just one: $$-12.96 + 14.4a - 4a^2$$.\n- Step 3: Rearrange to standard quadratic form $$Aa^2 + Ba + C = 0$$ before applying the quadratic formula.\n\nCommon error: trying to distribute the minus mid-expansion and dropping a sign on one term.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "After solving the variance quadratic and getting two candidate values of $$a$$, what mark-worthy step do most students skip?", "answer": "- Step 1: Check each root against the validity constraint $$0 \\le a \\le 0.6$$ (or whatever was derived at the start).\n- Step 2: Examiners frequently rig one root to land outside the valid range — that's an entire mark for *rejecting* it.\n- Step 3: Even when both roots survive (as here, $$a=0.2$$ and $$a=0.4$$), explicitly *writing* \"both lie in $$[0, 0.6]$$, so both valid\" earns the conclusion mark.\n\nTakeaway: a quadratic-probability problem isn't finished until you've compared roots to the constraint.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "In a Venn diagram with regions $$p$$ (A only), $$q$$ (intersection), $$r$$ (B only), $$s$$ (outside), what is the **symmetric difference** $$(A\\cap B') \\cup (A'\\cap B)$$ in terms of these regions?", "answer": "- Step 1: $$A\\cap B'$$ is the \"A only\" region, i.e. $$p$$.\n- Step 2: $$A'\\cap B$$ is the \"B only\" region, i.e. $$r$$.\n- Step 3: These are disjoint, so their union has probability $$p + r$$.\n\nInsight: the symmetric difference is \"exactly one of A or B happens\" — the union *minus* the intersection. It is **not** $$p + q + r$$ (that's $$A \\cup B$$).", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "Given $$P(A) = \\frac{7}{25}$$, $$P(B) = \\frac{1}{5}$$, and $$P(A \\triangle B) = \\frac{8}{25}$$, how do you derive $$2(p+q+r) = \\frac{4}{5}$$? (3 steps)", "answer": "- Step 1: Translate each given into the region variables: $$p+q = \\frac{7}{25}$$, $$q+r = \\frac{5}{25}$$, $$p+r = \\frac{8}{25}$$.\n- Step 2: Add all three equations. Each of $$p, q, r$$ appears exactly twice on the LHS.\n- Step 3: $$2p + 2q + 2r = \\frac{7+5+8}{25} = \\frac{20}{25} = \\frac{4}{5}$$. Dividing by 2 then gives $$p+q+r = \\frac{2}{5}$$, which unlocks the individual regions.\n\nTakeaway: when three pairwise sums are given, adding all three is the immediate move.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "After deriving $$p + q + r = \\frac{2}{5}$$, how do you find $$q$$ (the intersection) using $$P(A)$$ and $$P(B)$$?", "answer": "- Step 1: Observe that $$P(A) + P(B) = (p+q) + (q+r) = (p+q+r) + q$$.\n- Step 2: So $$q = P(A) + P(B) - (p+q+r) = \\frac{7}{25} + \\frac{5}{25} - \\frac{10}{25} = \\frac{2}{25}$$.\n- Step 3: Then $$p = P(A) - q = \\frac{5}{25} = \\frac{1}{5}$$, $$r = P(B) - q = \\frac{3}{25}$$, and $$s = 1 - (p+q+r) = \\frac{3}{5}$$.\n\nInsight: $$P(A) + P(B)$$ double-counts the intersection — this is the inclusion-exclusion principle in region form.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "What does mutual exclusivity of two events $$C$$ and $$D$$ force about $$P(C) + P(D)$$, and why?", "answer": "- Step 1: Mutual exclusivity means $$C \\cap D = \\emptyset$$, so $$P(C \\cap D) = 0$$.\n- Step 2: From inclusion-exclusion: $$P(C \\cup D) = P(C) + P(D) - P(C \\cap D) = P(C) + P(D)$$.\n- Step 3: But any probability is bounded: $$P(C \\cup D) \\le 1$$. Therefore $$P(C) + P(D) \\le 1$$.\n\nThis is the **contradiction lever**: if you can show $$P(C) + P(D) > 1$$, then $$C$$ and $$D$$ cannot be mutually exclusive.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Show that $$P(C) + P(D) = \\frac{x}{x+5} + \\frac{5}{x}$$ exceeds 1 for all positive $$x$$, using an algebraic restructuring rather than calculus. (4 steps)", "answer": "- Step 1: Common denominator: $$\\frac{x}{x+5} + \\frac{5}{x} = \\frac{x \\cdot x + 5(x+5)}{x(x+5)} = \\frac{x^2 + 5x + 25}{x^2 + 5x}$$.\n- Step 2: Notice the numerator equals the denominator plus 25: rewrite as $$\\frac{(x^2+5x) + 25}{x^2+5x} = 1 + \\frac{25}{x^2 + 5x}$$.\n- Step 3: For $$x > 0$$: $$x^2 + 5x > 0$$, so $$\\frac{25}{x^2+5x} > 0$$, hence the sum strictly exceeds 1.\n- Step 4: Since mutual exclusivity would require the sum $$\\le 1$$, and we have $$> 1$$, $$C$$ and $$D$$ cannot be mutually exclusive for any positive $$x$$.\n\nKey trick: $$\\frac{N + k}{N} = 1 + \\frac{k}{N}$$ makes \"exceeds 1\" instantly visible without calculus or quadratic inequalities.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "What is the structural template for a \"show $$C$$ and $$D$$ cannot be mutually exclusive\" proof?", "answer": "- Step 1: Assume (for contradiction) that $$C$$ and $$D$$ are mutually exclusive.\n- Step 2: Derive the necessary consequence $$P(C) + P(D) \\le 1$$.\n- Step 3: Compute $$P(C) + P(D)$$ and show it strictly exceeds 1 — contradiction.\n- Step 4: Conclude $$C$$ and $$D$$ cannot be mutually exclusive.\n\nThis proof-by-contradiction shape is the same every time — recognising it is half the battle.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "For a normal distribution $$L \\sim N(\\mu, \\sigma^2)$$, what is the standardisation transformation, and what does it geometrically achieve?", "answer": "- Step 1: $$Z = \\frac{L - \\mu}{\\sigma}$$, where $$Z \\sim N(0, 1)$$.\n- Step 2: Subtracting $$\\mu$$ shifts the centre to 0; dividing by $$\\sigma$$ rescales spread so the standard deviation becomes 1.\n- Step 3: This collapses any normal distribution onto the *single* standard normal curve, so tables of $$\\Phi(z) = P(Z < z)$$ can answer probability questions for *any* $$\\mu, \\sigma$$.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "What $$z$$-value corresponds to the upper quartile of the standard normal, and how do you use it to find $$Q_3$$ of any normal distribution?", "answer": "- Step 1: $$z_{Q_3} = 0.6745$$ (where $$\\Phi(z) = 0.75$$). For $$Q_1$$, $$z = -0.6745$$ by symmetry.\n- Step 2: De-standardise: $$Q_3 = \\mu + 0.6745\\sigma$$ and $$Q_1 = \\mu - 0.6745\\sigma$$.\n- Step 3: Therefore $$\\text{IQR} = Q_3 - Q_1 = 1.349\\sigma$$ — a useful sanity check.\n\nMemorise: 0.6745 is *not* obvious from the standard table; examiners expect you to know it.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "What are the outlier limits in terms of $$Q_1, Q_3,$$ and IQR, and what intuition justifies them?", "answer": "- Step 1: Upper limit $$= Q_3 + 1.5(Q_3 - Q_1)$$; lower limit $$= Q_1 - 1.5(Q_3 - Q_1)$$.\n- Step 2: The middle 50% of data sits in $$[Q_1, Q_3]$$; extending 1.5 IQRs on each side reaches points that are unusually far from the centre.\n- Step 3: For a normal distribution this corresponds to roughly $$\\mu \\pm 2.698\\sigma$$, capturing about 99.3% of the population — values outside this are extreme.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "Why do the outlier limits for a normal distribution sit exactly at $$\\mu \\pm 2.698\\sigma$$?", "answer": "- Step 1: $$Q_3 = \\mu + 0.6745\\sigma$$ and IQR $$= 1.349\\sigma$$.\n- Step 2: Upper outlier limit $$= Q_3 + 1.5 \\cdot \\text{IQR} = \\mu + 0.6745\\sigma + 1.5(1.349)\\sigma = \\mu + (0.6745 + 2.0235)\\sigma = \\mu + 2.698\\sigma$$.\n- Step 3: By symmetry the lower limit is $$\\mu - 2.698\\sigma$$. This is a *property* of the normal distribution, not the IQR rule itself.\n\nSanity check: if your computed limits don't sit symmetrically around $$\\mu$$ at $$\\pm 2.698\\sigma$$, you've made a quartile error upstream.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "When asked to \"show using standardisation that $$P(\\text{not outlier}) = 0.993$$\", what is the clean approach, and what is the over-engineered approach to avoid? (4 steps)", "answer": "- Step 1: Clean: standardise both outlier limits in the *original* distribution. $$Z = \\frac{5.5792 - 4.5}{0.4} \\approx 2.70$$ and $$Z = -2.70$$ by symmetry.\n- Step 2: Use $$P(-2.70 < Z < 2.70) = \\Phi(2.70) - \\Phi(-2.70) = 0.9965 - 0.0035 = 0.9930$$.\n- Step 3: Over-engineered: trying to \"transform quartiles back\" or invoking a special \"property\" — there's no shortcut.\n- Step 4: The symmetry is just that $$z = \\pm 2.698$$, no extra theorem needed.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "For a conditional probability question like \"$$P(L > 5 \\mid \\text{not outlier})$$\", what is the critical conceptual move that prevents the most common wrong answer? (4 steps)", "answer": "- Step 1: Write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ explicitly — don't paraphrase.\n- Step 2: Identify the *intersection* on the number line. Here $$A = \\{L > 5\\}$$ and $$B = \\{3.42 < L < 5.58\\}$$, so $$A \\cap B = \\{5 < L < 5.58\\}$$ — the upper bound is capped by $$B$$!\n- Step 3: Now standardise the *intersection* interval: $$P(5 < L < 5.58) = \\Phi(2.70) - \\Phi(1.25) = 0.9965 - 0.8944 = 0.1021$$.\n- Step 4: Divide by $$P(B) = 0.993$$ to get $$\\approx 0.103$$.\n\nCommon error: using $$P(L > 5)$$ unrestricted in the numerator, ignoring the cap from $$B$$. This gives $$\\approx 0.106$$ — wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "Why is \"$$P(L > 5 \\mid \\text{not outlier})$$\" a *direct* normal calculation rather than an *inverse*
