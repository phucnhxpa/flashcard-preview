<script>
const DATA={"selected": [{"question": "S1 Jan 2023 — What does \"show that\" in a question prompt require you to do differently from \"find\"? (2 steps)", "answer": "- Step 1: \"Find\" allows you to go straight to the answer. \"Show that\" requires you to **display every intermediate algebraic step** that leads to the given result — the answer is provided; you're demonstrating *how* to reach it.\n- Step 2: In this paper, Q4(i)(a) (\"show that $$2p + 2q + 2r = 4/5$$\"), Q5(d) (\"show that the probability is 0.993\"), and Q6(d) (\"show that $$r = 0.988$$\") are all \"show that\" questions worth 3–7 marks each. The marks are in the method, not the final number. Writing just the answer earns 0/7.\n\nThink of \"show that\" as \"prove to the examiner that you can derive this result step by step.\"", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "S1 Jan 2023 — For the symmetric difference $$A \\triangle B$$, what is the probability formula in terms of $$P(A)$$, $$P(B)$$, and $$P(A \\cap B)$$, and when is it useful? (2 steps)", "answer": "- Step 1: $$P(A \\triangle B) = P(A) + P(B) - 2P(A \\cap B)$$. This is because $$A \\triangle B = (A \\cap B') \\cup (A' \\cap B)$$, which includes the A-only and B-only regions, excluding the intersection twice (once from each side).\n- Step 2: It's useful when you know $$P(A)$$, $$P(B)$$, and the symmetric difference probability, and need to find $$P(A \\cap B)$$. Alternatively, in Venn diagram problems, recognizing that $$P(A \\triangle B) = p + r$$ (the two outer regions) lets you set up equations directly.\n\nNote: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$ includes the intersection once; $$P(A \\triangle B)$$ excludes it entirely (subtracts it twice).", "source": "GLM 5.1 ①", "_id": "glm_1_45"}, {"question": "S1 Jan 2023 Q2(c) — Which branches contribute to the event \"all three marbles selected are the same colour\", and why do the mixed-transfer branches drop out? (3 steps)", "answer": "- Step 1: For all three to be the same colour, the third draw must match both of the first two draws. That is only possible if the two marbles transferred from X are the same colour.\n- Step 2: The pure GG path leads to Y having 8G/5B, so drawing a third green is possible; the pure BB path leads to Y having 6G/7B, so drawing a third blue is possible.\n- Step 3: The mixed GB and BG paths transfer one green and one blue to Y. Because the first two selected marbles are already different colours, it is impossible for the third marble to match both; hence these branches contribute zero to \"all same\".", "source": "Kimi K2.6 ②", "_id": "kimi_2_9"}, {"question": "S1 Jan 2023 Q1(d) — Given $$\\sum ft^2$$ and the mean, what is the formula for standard deviation of grouped data, and what is the common pitfall in the final step? (3 steps)", "answer": "- Step 1: The formula is $$\\sigma = \\sqrt{\\frac{\\sum ft^2}{n} - \\bar{t}^{\\,2}}$$. This is the \"coding\" form of variance, then square-rooted for SD.\n- Step 2: Compute inside the square root first: $$\\frac{41033}{100} - 19.68^2 = 410.33 - 387.2024 = 23.1276$$.\n- Step 3: **Common pitfall**: reporting the variance (23.1276 or 23.1) instead of the standard deviation. The question asks for SD, so you must take the square root: $$\\sqrt{23.1276} = 4.81$$. Always check: did the question say \"variance\" or \"standard deviation\"?", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "In histogram-based questions like S1 Jan 2023 Q1, what visual feature of the histogram actually represents frequency, and what do learners often mistakenly use instead? (2 steps)", "answer": "- Step 1: The frequency is represented by the area of each bar, computed as frequency density $$\\times$$ class width. A tall narrow bar can have a smaller area—and thus smaller frequency—than a short wide bar.\n- Step 2: The common pitfall is reading bar height directly as frequency. This ignores differing class widths and corrupts the entire table, which in turn ruins the mean, standard deviation, and interpolation.", "source": "Kimi K2.6 ①", "_id": "kimi_1_1"}, {"question": "When solving part (c) with the variance equation, what's the trick for handling the squared term (3.6-2a)²? (5 steps)", "answer": "- Step 1: Bracket the squared term first: (3.6-2a)² = 12.96 - 14.4a + 4a² (expand carefully).\n- Step 2: Write the variance equation:\n  $$0.56 = (13.2-12a) - (3.6-2a)^2$$\n- Step 3: Substitute expanded squared term with MINUS sign applied to ALL terms:\n  $$0.56 = 13.2-12a -12.96+14.4a-4a^2$$\n- Step 4: Combine like terms:\n  $$0.56 = 0.24 + 2.4a -4a^2$$\n- Step 5: Multiply through to eliminate decimals and solve:\n  $$4a^2 - 2.4a + 0.32 = 0 → a = 0.2 \\text{ or } 0.4$$\n\n**Pitfall**: Distributing the minus sign across (3.6-2a)² before expanding causes sign errors. Always expand first, then subtract.", "source": "Qwen 3 ③", "_id": "qwen_3_2"}, {"question": "Why is the following argument wrong in S1 Jan 2023 Q6(c): “The estimate at $$90^\\circ\\text{C}$$ is reliable because the correlation coefficient is very close to 1”? (2 steps)", "answer": "- Step 1: A high product moment correlation coefficient ($$r \\approx 0.988$$) only certifies strong linear association *within* the observed data range ($$10 \\le x \\le 80$$).\n- Step 2: It provides no empirical evidence that the same linear model persists outside that range; extrapolation reliability depends on the domain, not the strength of fit inside the domain.", "source": "Kimi K2.6 ①", "_id": "kimi_1_46"}, {"question": "S1 Jan 2023 Q1(e) — The question gives you $$Q_3 = 23$$ instead of asking you to calculate it. Why does the exam do this, and what should you NOT waste time doing? (2 steps)", "answer": "- Step 1: The exam gives $$Q_3$$ because the upper quartile falls in the 18–25 class, which has an awkward width and would produce a messy interpolation. They're testing whether you can find Q₁ cleanly and then compute IQR = Q₃ − Q₁.\n- Step 2: Do NOT attempt to verify or recalculate $$Q_3$$ from the data. Use the given value directly: $$\\text{IQR} = 23 - 13.75 = 9.25$$. The question is designed to save you time on the awkward class.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "When marbles are transferred *without replacement* from one bag to another, what happens to the composition of the receiving bag, and what is the critical error to avoid? (2 steps)", "answer": "- Step 1: Each transferred marble *adds* to the receiving bag. If bag Y starts with 11 marbles and 2 marbles are transferred in, Y now has 13 marbles. The denominator for the third draw is 13, not 11.\n- Step 2: The critical error is treating the receiving bag as if its total hasn't changed — using 11 as the denominator for the third draw. You must recompute the total and the colour split for every branch of the tree.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "S1 Jan 2023 Q2 — Two marbles are transferred from bag X to bag Y, then a third is drawn from Y. What is the total number of marbles in Y when the third draw happens, and why is this the #1 trap in this question type?", "answer": "- Step 1: Bag Y starts with $$6+5 = 11$$ marbles, BUT two are transferred IN before the third draw, so Y has $$11 + 2 = 13$$ marbles.\n- Step 2: The trap is leaving Y at 11 (forgetting the transferred marbles count) — this corrupts every probability on the third level of the tree.\n- Step 3: Rule: whenever items move between containers, BOTH numerator and denominator of subsequent draws change. Recompute composition for each branch.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "S1 Jan 2023 Q1(e) — Write down the linear interpolation formula for a quartile $$Q_k$$ in grouped data, naming every symbol.", "answer": "- Step 1: $$Q = L + \\dfrac{\\tfrac{kn}{4} - F_{\\text{before}}}{f_{\\text{class}}} \\times w$$.\n- Step 2: Identify the symbols:\n+ $$L$$ = lower boundary of the quartile class\n+ $$F_{\\text{before}}$$ = cumulative frequency UP TO (not including) the quartile class\n+ $$f_{\\text{class}}$$ = frequency of the quartile class itself (NOT cumulative)\n+ $$w$$ = width of the quartile class\n+ $$\\tfrac{kn}{4}$$ = the target position (e.g., 25 for $$Q_1$$ when $$n=100$$)\n- Step 3: The most common slip is using cumulative frequency in the denominator — it must be the class's own frequency.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "In Q5(d), why is the approach \"compute $$Q_1$$ and $$Q_3$$ of the standard normal, apply the outlier formula in z-space, then transform back\" overcomplicated compared to what the question actually asks? (2 steps)", "answer": "- Step 1: That approach requires computing the IQR in z-space ($$2 \\times 0.6745 = 1.349$$), then the outlier limits in z-space ($$\\pm 0.6745 \\pm 1.5 \\times 1.349$$), then looking up the tail probabilities. It works but introduces more steps and more rounding.\n- Step 2: The question says \"using standardisation\" — it wants you to standardise the *already-computed* outlier limits from part (c) directly. This is fewer steps, less rounding, and exactly what the mark scheme expects. Don't re-derive what you've already found.", "source": "GLM 5.1 ③", "_id": "glm_3_45"}, {"question": "When finding P(L > 5 | not outlier), what's the strategy? (3 steps)", "answer": "- Step 1: Recognize this is a conditional probability with restricted range: P(5 < L < 5.58) / P(not outlier)\n- Step 2: Standardize 5: z = (5 - 4.5)/0.4 = 1.25\n- Step 3: Calculate the probability: P(1.25 < Z < 2.70) = 0.9965 - 0.8944 = 0.1021 / 0.993 = 0.103\n\nThis gives the probability that a housefly has a wing length greater than 5 mm given it is not an outlier.", "source": "Qwen 3 ②", "_id": "qwen_2_19"}, {"question": "What is the key insight that makes Q4(ii) solvable without calculus or quadratic inequalities? (1 step)", "answer": "- Step 1: Recognise that after combining fractions, the numerator = denominator + 25, so the sum = 1 + 25/(denominator). Since denominator > 0 for x > 0, the sum is always > 1. This algebraic restructuring makes the contradiction immediate.", "source": "MiniMax ①", "_id": "minimax_1_41"}, {"question": "To estimate how many observations fall within part of a class (e.g., the portion $$14 \\le t < 16$$ inside the class 14–18 with frequency 24), what assumption do you make and what calculation do you perform? (2 steps)", "answer": "- Step 1: You assume observations are *uniformly distributed* within the class — i.e., spread evenly across the class width.\n- Step 2: Calculate the fraction of the class width covered: $$\\frac{16 - 14}{18 - 14} = \\frac{2}{4} = \\frac{1}{2}$$, then multiply by the class frequency: $$\\frac{1}{2} \\times 24 = 12$$. Add this to the cumulative frequency from all classes below.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "What wrong framework did Phuc apply to S1 Jan 2023 Q5(e), and what is the correct framework instead? (2 steps)", "answer": "- Step 1: Phuc treated the problem as an inverse-normal task (“find $$a$$ such that $$P(L < a) = \\ldots$$”).\n- Step 2: It is actually a direct conditional probability task: standardise the two endpoints of the capped interval ($$Z = 1.25$$ and $$Z = 2.70$$), find the enclosed table probability, and divide by the known conditioning probability $$0.993$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_40"}, {"question": "S1 Jan 2023 Q6(d) — When you compute $$S_{xy} = b \\times S_{xx} = 2.72 \\times 5300 = 14416$$ but the paper gives $$\\sum xy = 14590$$, why does using the given value produce a slightly different (more accurate) $$r$$? (2 steps)", "answer": "- Step 1: The gradient $$b = 2.72$$ is rounded to 3 significant figures. The true gradient has more decimal places. So $$S_{xy} = b \\times S_{xx}$$ introduces rounding error: 14416 vs the true value derived from $$\\sum xy$$.\n- Step 2: Using the paper's exact $$\\sum xy = 14590$$ gives $$S_{xy} = 14590 - \\frac{480 \\times 3119}{12} = 14590 - 124760 = 14590 - 124760/... $$ wait, let me redo: $$S_{xy} = 14590 - \\frac{480 \\times 3119}{12}$$. The exact computation yields $$r = 0.988$$ precisely. The rounding gap (0.985 vs 0.988) disappears with the exact summary stats.\n\nLesson: when the paper supplies values, use them directly. The recovery technique is a *fallback*, not the first choice.", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "When computing the standard deviation from grouped data with $$\\sum ft^2$$ given, what's the formula and the most common rounding/squaring trap? (3 steps)", "answer": "- Step 1: $$\\sigma = \\sqrt{\\dfrac{\\sum ft^2}{n} - \\bar t^{\\,2}}$$ (using midpoints $$t$$).\n- Step 2: Compute $$\\bar t^2$$ BEFORE subtracting — e.g., $$19.68^2 = 387.20$$, not $$19.68$$ left unsquared.\n- Step 3: Take the square root at the end. The classic trap is reporting $$\\sigma^2$$ (the variance) instead of $$\\sigma$$ — always check the question asks for sd vs variance.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "What does the regression line of $$y$$ on $$x$$ always pass through, and why is this fact useful in exams? (2 steps)", "answer": "- Step 1: The regression line of $$y$$ on $$x$$ always passes through the point $$(\\bar{x}, \\bar{y})$$. This is a mathematical consequence of the least-squares fitting procedure.\n- Step 2: In exams, this fact lets you recover $$\\bar{x}$$ if you know the regression line equation and $$\\bar{y}$$ (or vice versa). Substitute $$(\\bar{x}, \\bar{y})$$ into $$y = a + bx$$ and solve. This is the key to Q6(d) when $$\\sum x$$ appears to be missing.", "source": "GLM 5.1 ③", "_id": "glm_3_40"}, {"question": "For grouped data quartiles in Edexcel S1, what position value do you use, and what is the common wrong alternative? (2 steps)", "answer": "- Step 1: Use $$\\frac{n}{4}$$ directly. For $$n = 100$$, the lower quartile position is $$\\frac{100}{4} = 25$$.\n- Step 2: The common wrong alternative is $$\\frac{n+1}{4}$$ (giving 25.25), which is the rule for *discrete* data. IAL grouped/continuous data always uses $$\\frac{n}{4}$$. Using the wrong one shifts your interpolated value slightly and loses the mark.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "Q2(d) S1 Jan 2023 — When computing $$P(\\text{all green} \\mid \\text{all same colour})$$, what simplification occurs because \"all green\" is a subset of \"all same colour\"? (2 steps)", "answer": "- Step 1: The conditional probability formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. When $$A \\subset B$$, the intersection $$A \\cap B$$ is just $$A$$ itself, so the formula simplifies to $$P(A \\mid B) = \\frac{P(A)}{P(B)}$$.\n- Step 2: Here, \"all green\" is a subset of \"all same colour\" (since all green implies all same). So $$P(\\text{all G} \\mid \\text{same}) = \\frac{P(\\text{all G})}{P(\\text{same})} = \\frac{160/936}{244/936} = \\frac{160}{244} = \\frac{40}{61}$$. The common denominator cancels cleanly.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "What's a quick sanity check that $$Q_1$$ and $$Q_3$$ in Q5(b) are correct?", "answer": "- Step 1: For a symmetric normal distribution, $$Q_1$$ and $$Q_3$$ should be EQUIDISTANT from the mean: $$\\mu - Q_1 = Q_3 - \\mu$$.\n- Step 2: Here, $$4.5 - 4.23 = 0.27$$ and $$4.77 - 4.5 = 0.27$$ ✓.\n- Step 3: This equidistance also means $$\\mathrm{IQR}/2 = 0.6745\\sigma$$ exactly — another check.\n\nAsymmetric quartiles around the mean for a normal → calculation error.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "In Q6(c), the estimate at x = 90°C is 396g but is unreliable. What combination of factors makes extrapolation unreliable even when r is high? (1 step)", "answer": "- Step 1: Extrapolation is unreliable because: (1) x = 90 is outside the data range (10 ≤ x ≤ 80); (2) there's no empirical evidence the linear relationship holds beyond the observed range; (3) the relationship may change (e.g., solubility may plateau at high temperatures). High r does not license extrapolation.", "source": "MiniMax ①", "_id": "minimax_1_39"}, {"question": "Q6(a) S1 Jan 2023 — When asked to \"give an interpretation of the gradient of the regression line,\" what three elements must your answer include? (2 steps)", "answer": "- Step 1: Your answer must include: (1) the *direction* of change (increase or decrease), (2) the *units* of both variables, and (3) the phrase \"on average\" (since the regression line is a model, not an exact law).\n- Step 2: Example: \"For every 1 °C increase in temperature, the maximum weight of sugar that dissolves in 100 g of water increases by approximately 2.72 grams, on average.\" Missing any of the three elements (units, \"on average,\" or direction) loses the mark.", "source": "GLM 5.1 ③", "_id": "glm_3_33"}, {"question": "S1 Jan 2023 Q4(ii) — Adding $$P(C) + P(D)$$ yields the fraction $$\\frac{x^2 + 5x + 25}{x^2 + 5x}$$. What algebraic restructuring trick makes it immediately obvious this exceeds 1, avoiding complex quadratic inequalities?", "answer": "Recognize that the numerator is the denominator plus 25. Rewrite the fraction as:\n$$\\frac{(x^2 + 5x) + 25}{x^2 + 5x} = 1 + \\frac{25}{x^2 + 5x}$$\nSince $$x$$ is positive, the denominator $$x^2 + 5x > 0$$, making the fraction $$\\frac{25}{x^2+5x}$$ strictly positive. Therefore, the entire expression is strictly greater than 1, instantly proving the contradiction.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "S1 Jan 2023 Q4(ii) — What is the logical structure of the proof that two events $$C$$ and $$D$$ cannot be mutually exclusive? (4 steps)", "answer": "- Step 1: Assume, for a contradiction, that $$C$$ and $$D$$ are mutually exclusive.\n- Step 2: Then $$P(C \\cup D) = P(C) + P(D)$$, and since any probability is at most 1, this forces $$P(C) + P(D) \\le 1$$.\n- Step 3: Compute $$P(C) + P(D)$$ algebraically and show that it simplifies to something strictly greater than 1 for all valid parameters (here $$x > 0$$).\n- Step 4: Because the necessary condition $$P(C) + P(D) \\le 1$$ is violated, the assumption of mutual exclusivity is impossible.", "source": "Kimi K2.6 ②", "_id": "kimi_2_22"}, {"question": "In S1 Jan 2023 Q4(ii), the question does not say “prove by contradiction”. What is the invisible logical framework to show $$C$$ and $$D$$ cannot be mutually exclusive? (3 steps)", "answer": "- Step 1: Assume, for a contradiction, that $$C$$ and $$D$$ are mutually exclusive.\n- Step 2: Then $$P(C \\cup D) = P(C) + P(D)$$. Since any probability is at most 1, mutual exclusivity would force the necessary bound $$P(C) + P(D) \\le 1$$.\n- Step 3: Compute $$P(C) + P(D)$$ and show it strictly exceeds 1 for all $$x > 0$$, violating the bound; therefore the assumption is false and mutual exclusivity is impossible.", "source": "Kimi K2.6 ①", "_id": "kimi_1_29"}, {"question": "For S1 Jan 2023 Q4(ii), after combining $$P(C)+P(D)$$ over a common denominator, what is the key algebraic restructuring trick that makes the inequality obvious without calculus? (3 steps)", "answer": "- Step 1: Obtain the single fraction $$\\frac{x^2 + 5x + 25}{x^2 + 5x}$$.\n- Step 2: Split the numerator into $$(x^2 + 5x) + 25$$, so the fraction becomes $$1 + \\frac{25}{x^2 + 5x}$$.\n- Step 3: Since $$x > 0$$, the denominator $$x^2 + 5x$$ is positive, making the added term strictly positive; hence the total is strictly greater than 1. This avoids quadratic inequalities or differentiation entirely.", "source": "Kimi K2.6 ①", "_id": "kimi_1_30"}, {"question": "What's the conceptual reason histograms use frequency *density* rather than frequency?", "answer": "To preserve the property that area represents count. If you plotted frequency directly on the y-axis with unequal class widths, narrow classes would appear short and wide classes tall, distorting visual comparison. Density (= frequency / width) normalises this so that *area* (= density × width = frequency) is what the eye reads, making the histogram a true probability-mass visualisation regardless of binning choices.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "S1 Jan 2023 Q6(e) — When discussing the suitability of a linear model, what two pieces of evidence must you cite, and what happens if you mention only one? (2 steps)", "answer": "- Step 1: You must cite **both** (1) the PMCC value ($$r = 0.988$$, close to 1, indicating strong positive linear correlation) and (2) the **scatter diagram** (points lie close to a straight line with no obvious curve or fanning).\n- Step 2: Mentioning only one loses a mark. The examiner requires both because a high r can coexist with a non-linear pattern (e.g., a slight curve or outlier cluster), and a good-looking scatter can have a weaker correlation than it appears. Both pieces of evidence together confirm suitability.\n\nTemplate answer: \"$$r = 0.988$$ is close to 1, indicating strong positive linear correlation, and the scatter diagram shows points close to a straight line with no curve, so a linear model is suitable.\"", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "In a Venn diagram with regions $$p = P(A \\cap B')$$, $$q = P(A \\cap B)$$, $$r = P(A' \\cap B)$$, $$s = P(A' \\cap B')$$, what does the expression $$(A \\cap B') \\cup (A' \\cap B)$$ represent, and what is its probability in terms of the regions? (2 steps)", "answer": "- Step 1: This is the *symmetric difference* $$A \\triangle B$$ — the set of elements in exactly one of A or B, but not both. In the Venn diagram, it corresponds to the two non-overlapping crescent regions.\n- Step 2: Its probability is $$p + r$$ (the A-only region plus the B-only region). The common mistake is reading it as $$A \\cup B$$ (which would be $$p + q + r$$) or as $$A \\cap B$$ (which would be $$q$$). Recognising the symmetric difference is the key to translating the given equation.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "Misconception probe — Why is it wrong to say \"if $$P(C) + P(D) > 1$$, then C and D are not independent\"? What is the correct conclusion? (2 steps)", "answer": "- Step 1: Independence is defined by $$P(C \\cap D) = P(C) \\cdot P(D)$$, not by the sum $$P(C) + P(D)$$. Two events can have $$P(C) + P(D) > 1$$ and still be independent (e.g., $$P(C) = 0.7$$, $$P(D) = 0.6$$, $$P(C \\cap D) = 0.42$$).\n- Step 2: The correct conclusion from $$P(C) + P(D) > 1$$ is that C and D cannot be *mutually exclusive* (because mutual exclusivity requires $$P(C) + P(D) = P(C \\cup D) \\le 1$$). Mutually exclusive ≠ independent — in fact, if both events have positive probability, mutual exclusivity and independence are incompatible.", "source": "GLM 5.1 ③", "_id": "glm_3_56"}, {"question": "S1 Jan 2023 Q5(e) — Why is this question NOT an inverse-normal problem, and what conceptual error does treating it as one reveal? (2 steps)", "answer": "- Step 1: An inverse-normal problem gives you a probability and asks for a value of the variable. Here, you're given a value (5 mm) and asked for a probability — it's a *direct* probability question, just with a conditional twist.\n- Step 2: The error reveals a deeper misunderstanding: confusing \"given that\" (which restricts the sample space) with \"find the value such that\" (which is inverse-normal). The conditioning event \"not outlier\" doesn't ask you to *find* a boundary — it gives you a restricted range $$[3.42, 5.58]$$ and asks for a probability *within* that range.\n\nThe mental model: conditional probability = \"zoom into the restricted region, then compute probability as if that region is the entire universe.\"", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "S1 Jan 2023 Q5(b) — to find $$Q_3$$ of a normal distribution $$N(\\mu, \\sigma^2)$$, what specific $$z$$-value must you memorise (it's not directly in the tables)?", "answer": "$$z = 0.6745$$ for $$Q_3$$ (and $$-0.6745$$ for $$Q_1$$). This is $$\\Phi^{-1}(0.75)$$ — the standard normal value below which 75% of probability mass lies. The standard table gives $$\\Phi(z)$$ for $$z$$, so you can verify $$\\Phi(0.67) \\approx 0.7486$$ and $$\\Phi(0.68) \\approx 0.7517$$ — the interpolated value $$0.6745$$ is what examiners expect. Using $$0.67$$ alone loses precision and downstream marks in Q5(d).", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "Synthesis — A discrete random variable has probabilities in terms of a parameter $$a$$, and you're asked to find the possible values of $$a$$ given $$\\text{Var}(X)$$. What is the complete systematic approach? (4 steps)", "answer": "- Step 1: Derive the validity constraint on $$a$$ from the requirement that all probabilities lie in $$[0, 1]$$. State this explicitly.\n- Step 2: Compute $$E(X) = \\sum x \\cdot P(X=x)$$ and $$E(X^2) = \\sum x^2 \\cdot P(X=x)$$, both in terms of $$a$$.\n- Step 3: Set up the variance equation $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$. Expand $$[E(X)]^2$$ on a separate line (bracket-then-expand), then substitute and simplify to a quadratic in $$a$$.\n- Step 4: Solve the quadratic, then check each root against the validity constraint from Step 1. Reject any invalid roots and state the conclusion explicitly.", "source": "GLM 5.1 ③", "_id": "glm_3_54"}, {"question": "Conceptually, why are the outlier limits in Q5 symmetric around $$\\mu = 4.5$$ and at $$z = \\pm 2.698$$?", "answer": "Because the quartiles of a normal are symmetric around $$\\mu$$ at $$\\pm 0.6745\\sigma$$, the IQR is $$2 \\times 0.6745\\sigma = 1.349\\sigma$$, and $$1.5 \\times \\text{IQR} = 2.0235\\sigma$$. Outlier limits are then $$Q_3 + 1.5\\,\\text{IQR}$$ and $$Q_1 - 1.5\\,\\text{IQR}$$, which sit at $$\\mu \\pm (0.6745 + 2.0235)\\sigma = \\mu \\pm 2.698\\sigma$$. This $$\\pm 2.698$$ is universal for any normal — a sanity check.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "S1 Jan 2023 Q1(b) — When estimating how many people fall below a value that lies *inside* a class (e.g., below 16 in the 14–18 class), what is the interpolation assumption and how do you apply it? (3 steps)", "answer": "- Step 1: The **uniform distribution assumption**: within any class, values are spread evenly. So the fraction of data below a cutoff equals the fraction of the class width below that cutoff.\n- Step 2: Calculate the width fraction: $$\\frac{\\text{cutoff} - L}{w}$$ where $$L$$ is the lower bound and $$w$$ is the class width. For 16 in 14–18: $$\\frac{16-14}{18-14} = \\frac{2}{4} = \\frac{1}{2}$$.\n- Step 3: Multiply by the class frequency: $$\\frac{1}{2} \\times 24 = 12$$ people in the 14–16 portion. Then add all complete classes below it: $$10 + 16 + 12 = 38$$.\n\nThe assumption is an approximation — real data within a class may cluster — but it's the standard Edexcel convention.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "S1 Jan 2023 Q4(ii) — You must show that events C and D cannot be mutually exclusive. What necessary condition for mutual exclusivity should you assume and then contradict?", "answer": "If C and D are mutually exclusive, then $$P(C \\cap D) = 0$$, which implies $$P(C \\cup D) = P(C) + P(D)$$. Since any probability is at most 1, mutual exclusivity **forces** the necessary condition $$P(C) + P(D) \\le 1$$. To prove they cannot be mutually exclusive, you just need to show that $$P(C) + P(D) > 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "Q5(d) — \"Show that P(not outlier) = 0.993 using standardisation.\" What's the structured approach the question demands?", "answer": "- Step 1: Identify the not-outlier interval in $$L$$: $$3.4208 < L < 5.5792$$.\n- Step 2: STANDARDISE both endpoints: $$Z_{\\text{upper}} = \\tfrac{5.5792 - 4.5}{0.4} = 2.698 \\approx 2.70$$ and $$Z_{\\text{lower}} = -2.70$$ (by symmetry, since outlier limits are symmetric about $$\\mu$$).\n- Step 3: $$P(-2.70 < Z < 2.70) = \\Phi(2.70) - \\Phi(-2.70) = 0.9965 - 0.0035 = 0.9930$$.\n\n\"Using standardisation\" is a directive — you MUST display the $$z$$-values, not just the final probability.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "In Q1(e), after computing $$Q_1 = 13.75$$ and being given $$Q_3 = 23$$, what is the IQR, and why is it a measure of spread rather than location? (2 steps)", "answer": "- Step 1: $$\\text{IQR} = Q_3 - Q_1 = 23 - 13.75 = 9.25$$ minutes.\n- Step 2: The IQR measures *spread* (how dispersed the data are) because it captures the width of the middle 50% of the distribution. Unlike the mean or median (which measure location/centre), the IQR doesn't tell you *where* the data are, but how *wide* the central portion is. It's resistant to outliers because it ignores the extreme 25% on each end.", "source": "GLM 5.1 ③", "_id": "glm_3_66"}, {"question": "When should you use $$\\frac{n}{4}$$ vs. $$\\frac{n+1}{4}$$ for quartile positions, and what is the conceptual reason for the difference? (2 steps)", "answer": "- Step 1: Use $$\\frac{n}{4}$$ for *grouped/continuous data* (where linear interpolation assumes a uniform spread within each class). Use $$\\frac{n+1}{4}$$ for *discrete data* (where each data point is a distinct value and you're locating a position in an ordered list).\n- Step 2: The conceptual reason: for discrete data, the \"$$+1$$\" accounts for the fact that positions are between data points (like how the median of 4 values is at position 2.5, not 2). For grouped data, the data are treated as a continuous distribution within each class, so there's no such adjustment — the $$\\frac{n}{4}$$-th value is interpolated directly.", "source": "GLM 5.1 ③", "_id": "glm_3_64"}, {"question": "S1 Jan 2023 Q4(i)(a) — When a Venn diagram question gives you $$P(A)$$, $$P(B)$$, and $$P[(A \\cap B') \\cup (A' \\cap B)]$$, what region does that third expression represent, and what is the common misinterpretation? (2 steps)", "answer": "- Step 1: $$(A \\cap B') \\cup (A' \\cap B)$$ is the **symmetric difference** $$A \\triangle B$$ — the regions in exactly one of A or B, but not both. In the notation $$p, q, r, s$$, this equals $$p + r$$ (A-only plus B-only).\n- Step 2: The common misinterpretation is reading it as $$A \\cup B$$, which would be $$p + q + r$$ (including the intersection). The expression explicitly *excludes* $$A \\cap B$$ — the $$B'$$ and $$A'$$ ensure that. Confusing symmetric difference with union gives the wrong equation and the whole problem collapses.\n\nThink of it as \"in A or in B, but not in both\" — the XOR of the two events.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "S1 Jan 2023 Q5(e) — Why must the upper outlier limit cap the numerator interval, and what happens if you ignore that cap? (2 steps)", "answer": "- Step 1: The conditioning event \"not an outlier\" explicitly excludes wing lengths above the upper outlier limit. Therefore any $$L$$ above that limit is outside the conditional sample space and must not be included.\n- Step 2: If you ignore the cap and use $$P(L > 5)$$ alone, your numerator includes outlier territory, making it slightly too large and producing an incorrect final answer (e.g., roughly 0.106 instead of the correct 0.103).", "source": "Kimi K2.6 ②", "_id": "kimi_2_31"}, {"question": "Across S1 Jan 2023, Q2(d) and Q5(e) both involve conditional probability. What's the shared mental model?", "answer": "- Step 1: Write $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)}$$ FIRST, before substituting any numbers.\n- Step 2: The conditioning event $$B$$ RESTRICTS the sample space — recompute $$A \\cap B$$ to reflect the restriction.\n- Step 3: In Q2(d) $$A \\subset B$$ (all-green ⊆ all-same), so $$A \\cap B = A$$. In Q5(e), $$A \\not\\subset B$$ (some \"L > 5\" values are outliers), so $$A \\cap B$$ is a strict shrinkage of $$A$$.\n\nAlways ask: is the event already inside the condition, or does the condition trim it?", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "In S1 Jan 2023 Q3(c), what is the exact algebraic safe-zone procedure when substituting $$E(X^2)$$ and $$[E(X)]^2$$ into the variance equation? (4 steps)", "answer": "- Step 1: Compute $$[E(X)]^2$$ by expanding the bracket $$(3.6 - 2a)^2$$ fully first: $$12.96 - 14.4a + 4a^2$$.\n- Step 2: Place this expanded result inside a single bracket preceded by a minus sign: $$-(12.96 - 14.4a + 4a^2)$$.\n- Step 3: Distribute the minus sign term-by-term only after the square is fully expanded: $$-12.96 + 14.4a - 4a^2$$.\n- Step 4: Never distribute the minus into $$(3.6 - 2a)$$ before squaring; doing so invites sign slips, and attempting to subtract piecewise before expanding leads to missing cross terms.", "source": "Kimi K2.6 ①", "_id": "kimi_1_22"}, {"question": "S1 Jan 2023 — What is the general principle connecting Q2(d) and Q5(e), and how does it apply across both questions? (2 steps)", "answer": "- Step 1: Both are **conditional probability** questions where the conditioning event *restricts the sample space*. In Q2(d), \"all same colour\" restricts you to the GGG and BBB branches. In Q5(e), \"not outlier\" restricts L to the band $$[3.42, 5.58]$$.\n- Step 2: In both cases, you must **recompute the event within the restricted space**, not use the unrestricted probability. For Q2(d): $$P(\\text{all G} \\mid \\text{same}) = P(\\text{all G}) / P(\\text{same})$$. For Q5(e): $$P(L > 5 \\mid \\text{not outlier}) = P(5 < L < 5.58) / P(\\text{not outlier})$$. The numerator is always the intersection, not the original event.\n\nMental model: \"conditioning = zooming in.\" The conditioning event is a magnifying glass that discards everything outside it.", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "Across this paper, what is the unifying skill in Q2(d) and Q5(e), and what's the first formula you write down for both?", "answer": "Both are *conditional probability with a restricted sample space*. The first formula in both cases:\n$$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$\n\nFor Q2(d): $$A$$ = \"all green\", $$B$$ = \"all same\" — and $$A \\subset B$$, so $$A \\cap B = A$$.\nFor Q5(e): $$A$$ = \"$$L > 5$$\", $$B$$ = \"not outlier\" — and $$A \\not\\subset B$$, so you must explicitly find $$A \\cap B = \\{5 < L < 5.5792\\}$$.\n\nThe subset check determines whether the intersection step is needed.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "S1 Jan 2023 Q2(d) — What's the conditional probability identity when event $$A$$ is a SUBSET of event $$B$$, and how does it apply here?", "answer": "- Step 1: General: $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)}$$.\n- Step 2: If $$A \\subseteq B$$, then $$A \\cap B = A$$, so $$P(A \\mid B) = \\dfrac{P(A)}{P(B)}$$.\n- Step 3: Here, \"all green\" implies \"all same colour\", so $$\\{\\text{all G}\\} \\subseteq \\{\\text{all same}\\}$$. No need to compute an intersection separately — just divide.\n\nTrap: answering with $$P(\\text{all G})$$ alone, ignoring the conditioning denominator.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "S1 Jan 2023 — What is the general exam strategy when a multi-part question gives you a value (like $$Q_3 = 23$$ or $$\\text{Var}(X) = 0.56$$) rather than asking you to compute it? (2 steps)", "answer": "- Step 1: The given value is a **gift** — use it directly in subsequent parts. Don't try to verify or recalculate it. The examiner is saving you from a messy computation.\n- Step 2: In Q1(e), $$Q_3 = 23$$ is given so you only need to find $$Q_1$$ and subtract. In Q3(c), $$\\text{Var}(X) = 0.56$$ is given so you set up the equation and solve for $$a$$. The given value anchors the calculation — treat it as a known constant, not something to derive.\n\nException: if the question says \"verify that $$Q_3 = 23$$\", then you *must* compute it. \"Given that\" = free gift; \"verify that\" = you must show the work.", "source": "GLM 5.1 ①", "_id": "glm_1_42"}, {"question": "For the normal distribution, what z-value corresponds to the upper quartile $$Q_3$$ (i.e., $$P(Z < z) = 0.75$$), and why must you memorise it? (2 steps)", "answer": "- Step 1: The z-value is $$z = 0.6745$$. This is the value of $$\\Phi^{-1}(0.75)$$ from the standard normal tables.\n- Step 2: You must memorise it because it is *not* directly listed in most Edexcel formula tables in an obvious way. Using the rounded value 0.67 introduces error that propagates through subsequent calculations (outlier limits, conditional probabilities). The examiners expect 0.6745.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "Why is it wrong to treat Q5(e) as an \"inverse normal\" problem, and how should you recognise the correct framework? (2 steps)", "answer": "- Step 1: An inverse normal problem asks \"given a probability, find the value of the variable\" (e.g., \"find $$x$$ such that $$P(L < x) = 0.9$$\"). Q5(e) asks the *forward* question: \"given a condition, find a probability.\" It is a conditional probability problem, not an inverse-normal one.\n- Step 2: The correct framework is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. Write this down explicitly, identify $$A$$ and $$B$$, compute the intersection on the number line, then standardise. The trigger phrase \"given that\" should immediately make you reach for the conditional probability formula, not inverse-normal methods.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "What's the diagnostic for spotting when a \"conditional probability\" question requires intersecting events versus when the conditioning event is a superset?", "answer": "Look at the conditioning event $$B$$ and the event of interest $$A$$:\n+ If $$A \\subset B$$ (e.g., \"all green\" given \"all same\"), then $$A \\cap B = A$$ and you can use $$P(A)/P(B)$$ directly.\n+ If $$A \\not\\subset B$$ (e.g., \"$$L > 5$$\" given \"not outlier\"), you must compute $$A \\cap B$$ explicitly — here, $$5 < L < 5.5792$$.\n\nAlways sketch a number line or Venn diagram to test subset before plugging in.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "When setting up a variance equation $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$ with a parameter, what is the most common algebraic error, and how do you avoid it? (3 steps)", "answer": "- Step 1: The most common error is a sign mistake when subtracting $$[E(X)]^2$$. For example, with $$E(X) = 3.6 - 2a$$, you need to compute $$[E(X)]^2 = (3.6 - 2a)^2 = 12.96 - 14.4a + 4a^2$$, then subtract the *entire* expanded expression.\n- Step 2: The safe method: bracket the squared term, expand it *separately* on its own line, then substitute. Never try to distribute the minus sign while expanding in your head.\n+ Wrong: $$\\ldots - 12.96 + 14.4a - 4a^2$$ (signs easily confused mid-calculation)\n+ Right: Write $$(3.6-2a)^2 = 12.96 - 14.4a + 4a^2$$ on one line, then subtract all three terms on the next.\n- Step 3: After substitution, collect like terms carefully. Every term from the squared bracket flips sign. The result should simplify to a clean quadratic in $$a$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "S1 Jan 2023 Q4(ii) — Why can't you prove C and D are not mutually exclusive by simply finding $$P(C \\cap D)$$ directly? (2 steps)", "answer": "- Step 1: You're not given any information about the joint probability $$P(C \\cap D)$$ — only the marginal probabilities $$P(C)$$ and $$P(D)$$. There's no formula to compute the intersection from marginals alone.\n- Step 2: The indirect route works because mutual exclusivity imposes a *universal constraint* on the sum: $$P(C) + P(D) \\le 1$$. Violating this constraint is sufficient to rule out mutual exclusivity, regardless of what $$P(C \\cap D)$$ actually is. You don't need to know the intersection — you just need to know the sum is too large.\n\nThink of it as: \"even in the most favorable case (zero intersection), the probabilities are too big to coexist.\"", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "In S1 Jan 2023 Q2(c), when finding the probability that all three selected marbles are the same colour, why do only the $$GG$$ and $$BB$$ transfer branches need to be calculated? (3 steps)", "answer": "- Step 1: “All three same” requires the first two draws from X to be identical, because the third draw from Y can only match a single colour.\n- Step 2: If the first two from X are different ($$GB$$ or $$BG$$), then regardless of the third draw, the set of three marbles already contains both colours, making “all same” impossible.\n- Step 3: Therefore only the $$GG$$ and $$BB$$ branches survive; the mixed branches contribute zero probability to the event and can be ignored, saving computation.", "source": "Kimi K2.6 ①", "_id": "kimi_1_14"}, {"question": "What is the key difference between $$E(X^2)$$ and $$[E(X)]^2$$, and why does confusing them destroy the variance calculation? (2 steps)", "answer": "- Step 1: $$E(X^2) = \\sum x^2 P(X=x)$$ — you square the outcomes first, then take the weighted average. $$[E(X)]^2$$ is the square of the *mean* — you average first, then square.\n- Step 2: By Jensen's inequality (or simply algebra), $$E(X^2) \\ge [E(X)]^2$$ always, with equality only when $$X$$ is constant. The variance is the gap between them: $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$. If you compute $$[E(X)]^2$$ but label it $$E(X^2)$$, the variance comes out as zero — a dead giveaway that you've made this error.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "What's the generic algorithm for conditional probability $$P(A \\mid B)$$ with normal distributions?", "answer": "- Step 1: Write down both intervals — the event $$A$$ (e.g., $$L > 5$$) and the condition $$B$$ (e.g., $$3.42 < L < 5.58$$).\n- Step 2: INTERSECT them on the number line: $$A \\cap B$$ (here $$5 < L < 5.58$$).\n- Step 3: Standardise both endpoints of $$A \\cap B$$, look up via $$\\Phi$$, compute $$P(A \\cap B)$$.\n- Step 4: Divide by $$P(B)$$ (often handed to you from a \"show that\" part).\n\nThe intersection step is what people skip. Always draw a number line.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "For the normal distribution $$L \\sim N(4.5, 0.4^2)$$, the outlier limits are at approximately 3.42 and 5.58. What sanity check does the symmetry of the z-values provide? (2 steps)", "answer": "- Step 1: Standardising both limits gives $$z_{\\text{upper}} = \\frac{5.5792 - 4.5}{0.4} \\approx 2.698$$ and $$z_{\\text{lower}} = \\frac{3.4208 - 4.5}{0.4} \\approx -2.698$$. The z-values are equal in magnitude and opposite in sign.\n- Step 2: This symmetry is expected because the normal distribution is symmetric about its mean, and the outlier fence distances are equal ($$1.5 \\times \\text{IQR}$$ above and below). If your z-values weren't symmetric, it would indicate an arithmetic error in computing the quartiles or the outlier limits.", "source": "GLM 5.1 ③", "_id": "glm_3_44"}, {"question": "S1 Jan 2023 Q6(c) — When asked to comment on the reliability of an estimate, what keyword must appear in your answer and what numerical evidence supports it? (2 steps)", "answer": "- Step 1: The keyword is **\"extrapolation\"**. The estimate at $$x = 90$$ is unreliable because 90 lies *outside the observed data range* of $$10 \\le x \\le 80$$.\n- Step 2: Even though $$r = 0.988$$ is very high, a strong correlation within the data range does NOT license extrapolation beyond it. The linear relationship may break down (sugar solubility may plateau), so the estimate of 396g cannot be trusted.\n\nCommon pitfall: claiming the estimate is reliable *because* r is close to 1. High r validates interpolation, not extrapolation.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "S1 Jan 2023 Q5(e) — When computing $$P(L > 5 \\mid \\text{not outlier})$$, what is the single most common mistake, and how do you avoid it? (3 steps)", "answer": "- Step 1: The common mistake is using $$P(L > 5)$$ as the numerator — i.e., treating the event as \"L exceeds 5\" without restricting to the not-outlier band. This gives $$P(Z > 1.25) = 0.1056$$, leading to an answer of ~0.106, which is *wrong*.\n- Step 2: The correct numerator is the **intersection**: $$P(L > 5 \\cap \\text{not outlier}) = P(5 < L < 5.5792)$$, because \"not outlier\" caps L at 5.5792. Anything above 5.5792 is an outlier and is excluded by the conditioning.\n- Step 3: Compute $$P(1.25 < Z < 2.70) = 0.9965 - 0.8944 = 0.1021$$. Then divide by $$P(\\text{not outlier}) = 0.993$$: $$\\frac{0.1021}{0.993} = 0.103$$.\n\nThe rule: **always intersect the event with the conditioning band on the number line before standardising**. The conditioning event truncates the original event.", "source": "GLM 5.1 ①", "_id": "glm_1_30"}, {"question": "In Q2(d), why does $$P(\\text{all G} \\cap \\text{same}) = P(\\text{all G})$$?", "answer": "Because \"all green\" is a *subset* of \"all the same colour\" — if all three are green, they are necessarily all the same. When $$A \\subset B$$, $$A \\cap B = A$$, so $$P(A \\mid B) = P(A)/P(B)$$ rather than requiring a separate intersection calculation. Spot this subset structure to skip the $$P(A \\cap B)$$ step entirely.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "S1 Jan 2023 Q2(a) — For the third draw from bag Y, why can you NOT use a single value of $$P(G_3)$$ across all branches? (2 steps)", "answer": "- Step 1: The composition of bag Y after the transfers is **path-dependent** — it depends on which two marbles were transferred from X.\n- Step 2: After GG transfer: Y has 8G, 5B → $$P(G_3) = \\frac{8}{13}$$. After GB or BG transfer: Y has 7G, 6B → $$P(G_3) = \\frac{7}{13}$$. After BB transfer: Y has 6G, 7B → $$P(G_3) = \\frac{6}{13}$$. Three different values, because the number of greens in Y changes with each path.\n\nYou must draw a full tree with four second-level branches (GG, GB, BG, BB), each leading to its own third-level probabilities.", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "What are the two outlier limits in terms of quartiles, and what is the underlying logic? (2 steps)", "answer": "- Step 1: The upper limit is $$Q_3 + 1.5 \\times \\text{IQR}$$ and the lower limit is $$Q_1 - 1.5 \\times \\text{IQR}$$. Values beyond these limits are classified as outliers.\n- Step 2: The logic is that the IQR captures the middle 50% of the data. Extending 1.5 IQR beyond each quartile creates a \"fence\" — observations outside the fence are considered unusually extreme. The factor 1.5 is a convention (Tukey's rule) that corresponds roughly to $$\\mu \\pm 2.7\\sigma$$ for normal data.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "Why is mutual exclusivity's contradiction lever $$P(C) + P(D) \\le 1$$ rather than $$P(C) + P(D) = 1$$?", "answer": "Mutual exclusivity means $$C \\cap D = \\emptyset$$, giving $$P(C \\cup D) = P(C) + P(D)$$. But $$C \\cup D$$ might not cover the whole sample space (its complement could exist), so $$P(C \\cup D)$$ can be anything in $$[0, 1]$$. The CONSTRAINT is just that ANY probability is at most 1. So showing $$P(C) + P(D) > 1$$ kills mutual exclusivity, whereas $$= 1$$ would only show $$C \\cup D$$ = sample space (still consistent with mutually exclusive).", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "Across the paper, what's the unified strategy for handling questions where the SAMPLE SPACE CHANGES (Q1(a) reconstruction, Q2's transferred marbles, Q5(e)'s conditional band)?", "answer": "- Step 1: Recognise that the \"raw\" setup has been altered (missing data, items moved, restricted event).\n- Step 2: STOP and explicitly rebuild the new sample space / population BEFORE computing any probabilities.\n+ Q1: fill in missing frequencies → cumulative table.\n+ Q2: update bag Y to 13 marbles, branch-dependent compositions.\n+ Q5(e): intersect event with conditioning interval on the number line.\n- Step 3: Only after the corrected sample space is written down should you write probabilities.\n\nSkipping step 2 is the dominant source of marks lost on this paper.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "Why must histogram frequencies be reconstructed from frequency density × width rather than bar height alone?", "answer": "Bar HEIGHT on a histogram is frequency density, not frequency. The actual frequency is the AREA of the bar = density × class width. Mistaking height for frequency systematically under- or over-counts whenever class widths differ (e.g., the 18–25 bar has width 7, not 4 or 5), which is the entire point of using a histogram for unequal classes.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "S1 Jan 2023 — What is the pattern behind Q2 and Q5(e) regarding \"sample space changes,\" and how should you reflexively respond? (2 steps)", "answer": "- Step 1: Both questions alter the population you're drawing from. Q2 transfers marbles into bag Y (changing its composition). Q5(e) conditions on \"not outlier\" (restricting to a sub-range of L). In both, failing to update the denominator or the event boundaries produces wrong answers.\n- Step 2: The reflexive response: whenever you see \"transferred,\" \"given that,\" or \"conditioned on,\" **stop and recompute** the sample space. Ask: \"What is the new total/denominator?\" and \"What values are still possible?\" Only then proceed with probability calculations.\n\nThis is the single highest-impact pattern in the paper. Three of the six redo flags (Q2, Q5(d), Q5(e)) stem from failing to update the sample space.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "Q5(e) — given \"this housefly is not an outlier\", what's the crucial intersection step before computing $$P(L > 5 \\mid \\text{not outlier})$$?", "answer": "The event $$L > 5$$ must be *intersected* with the \"not outlier\" band $$3.4208 < L < 5.5792$$. So the actual numerator event is $$5 < L < 5.5792$$, NOT $$L > 5$$. The conditioning band caps $$L$$ at the upper outlier limit. Forgetting this gives the wrong numerator and the most common conditional-normal error.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "Why doesn't a high PMCC ($$r \\approx 0.988$$) make an extrapolated prediction reliable? (2 steps)", "answer": "- Step 1: The PMCC measures the strength of *linear* association *within the observed data range*. It says nothing about whether the relationship remains linear beyond that range.\n- Step 2: Even with $$r = 0.988$$, the true relationship could curve, plateau, or reverse outside the observed range. The high $$r$$ only tells you the line fits well *where you have data*. Reliability of prediction depends on whether you're interpolating (within range — reliable) or extrapolating (outside range — unreliable), not on the value of $$r$$.", "source": "GLM 5.1 ③", "_id": "glm_3_35"}, {"question": "Why does Q5(d) instruct \"using standardisation\" rather than letting you use a calculator's normal CDF directly?", "answer": "\"Using standardisation\" is a directive demanding that you SHOW the $$Z = (X-\\mu)/\\sigma$$ step explicitly — write the $$z$$-values, then look up $$\\Phi(z)$$. Mark scheme awards method marks for the standardisation line, the $$\\Phi$$ table lookup, and the subtraction. Skipping straight to the calculator answer loses these intermediate marks even if the final answer is right.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "In Q2(d), what's the trick for calculating P(all green | same color)? (4 steps)", "answer": "- Step 1: Identify the conditional probability structure: P(A|B) = P(A∩B)/P(B) where A is \"all green\" and B is \"all same color\".\n- Step 2: Realize A∩B = A (since \"all green\" is a subset of \"all same color\"), so P(A∩B) = P(all green).\n- Step 3: Calculate P(all green) = 5/9 × 4/8 × 8/13 = 160/936 (GGG path) and P(all blue) = 4/9 × 3/8 × 7/13 = 84/936 (BBB path).\n- Step 4: Compute P(same color) = 160/936 + 84/936 = 244/936, then divide:\n  $$P(\\text{all G}|\\text{same}) = \\frac{160}{244} = \\frac{40}{61}$$\n\n**Key insight**: When A ⊂ B, P(A|B) = P(A)/P(B) simplifies to ratio of numerators because denominators (936) cancel.", "source": "Qwen 3 ③", "_id": "qwen_3_1"}, {"question": "For S1 Jan 2023 Q2(d), given that all three marbles are the same colour, what is the first formula to write down, and why does the numerator simplify? (3 steps)", "answer": "- Step 1: Write the definition explicitly: $$P(\\text{all G} \\mid \\text{same}) = \\frac{P(\\text{all G} \\cap \\text{same})}{P(\\text{same})}$$.\n- Step 2: Observe that the event “all green” is a subset of “all same” (if all three are green, they are trivially the same colour).\n- Step 3: Therefore $$P(\\text{all G} \\cap \\text{same}) = P(\\text{all G})$$, so the numerator is simply the probability of the $$GG$$ branch computed in part (c).", "source": "Kimi K2.6 ①", "_id": "kimi_1_16"}, {"question": "When solving a variance equation like $\\mathrm{Var}(X) = 0.56$ for a discrete random variable, what is the critical step to avoid sign errors, and why must you check solutions against constraints?", "answer": "- Step 1: Expand $(E(X))^2 = (3.6 - 2a)^2$ **as a bracketed term first** before subtracting from $E(X^2) = 13.2 - 12a$:  \n  $$0.56 = (13.2 - 12a) - (12.96 - 14.4a + 4a^2).$$  \n- Step 2: Distribute the minus sign carefully:  \n  $$0.56 = 13.2 - 12a - 12.96 + 14.4a - 4a^2 = 0.24 + 2.4a - 4a^2.$$  \n- Step 3: Check solutions $a=0.2$ and $a=0.4$ against $0 \\le a \\le 0.6$. Both are valid, but constraints often invalidate one root.  \n\n**Key:** Never expand $(3.6-2a)^2$ inline; bracket and expand separately to avoid sign errors.", "source": "Qwen 3 ④", "_id": "qwen_4_2"}, {"question": "S1 Jan 2023 Q1(d) — Given $$\\sum ft^2$$ and the estimated mean, what formula estimates the standard deviation of grouped data, and why is it not the same as the variance of the frequency distribution? (2 steps)", "answer": "- Step 1: The estimator is $$\\sigma = \\sqrt{\\dfrac{\\sum ft^2}{n} - \\bar{t}^{\\,2}}$$. This is the square root of the mean of the squared midpoints minus the square of the mean.\n- Step 2: The formula already encodes the variance (the expression inside the square root is $$\\sigma^2$$); a common pitfall is to stop at the variance and forget to take the square root, or to confuse this with the sample standard deviation using $$n-1$$, which is not used in Edexcel S1 grouped-data estimation.", "source": "Kimi K2.6 ②", "_id": "kimi_2_41"}, {"question": "When a \"show that\" question is worth 4–7 marks, what does the mark scheme reward that wouldn't be needed in a \"find\" question? (2 steps)", "answer": "- Step 1: \"Show that\" questions reward *intermediate working* — every algebraic step must be visible. You cannot jump from the setup to the answer in one line. The mark scheme assigns marks for specific intermediate results (e.g., computing $$S_{xx}$$, then $$S_{yy}$$, then $$S_{xy}$$, then $$r$$).\n- Step 2: In contrast, a \"find\" question typically awards marks for the method and the final answer. For \"show that,\" the answer is given, so the marks are *entirely* for the working. Omitting a step (like not showing the z-values in standardisation) forfeits those marks even if your final number is correct.", "source": "GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "S1 Jan 2023 Q5(e) — In the conditional probability formula $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$, where does the denominator $$P(B) = 0.993$$ come from, and why should you not recompute it? (2 steps)", "answer": "- Step 1: $$P(B) = P(\\text{not outlier}) = 0.993$$ comes directly from part (d), which you already computed. The \"given that\" in part (e) references the same event.\n- Step 2: Do NOT recompute it — you've already shown it equals 0.993 in part (d). Recomputing risks rounding errors and wastes time. Just reference the earlier result.\n\nExam technique: parts of a multi-part question build on each other. Always check if a previous answer is the denominator or input you need.", "source": "GLM 5.1 ①", "_id": "glm_1_32"}, {"question": "S1 Jan 2023 — What is the mental model for conditional probability that prevents the most common errors? (3 steps)", "answer": "- Step 1: **Visualise the number line or sample space**. Draw the full space, then shade the conditioning event B. Everything outside B is gone — it never happened.\n- Step 2: **Intersect A with B**. The numerator is not P(A) — it's P(A ∩ B). In Q5(e), \"L > 5\" intersects with \"not outlier\" to give \"5 < L < 5.58.\" In Q2(d), \"all G\" is already a subset of \"same colour,\" so P(A ∩ B) = P(A).\n- Step 3: **Divide by P(B)**. This rescales so the probability within the restricted space sums to 1. P(B) often comes from a previous part — don't recompute it.\n\nThe mantra: \"conditioning = zoom in, intersect, then rescale.\"", "source": "GLM 5.1 ①", "_id": "glm_1_56"}, {"question": "S1 Jan 2023 Q4(ii) — When combining $$P(C) = \\frac{x}{x+5}$$ and $$P(D) = \\frac{5}{x}$$ into a single fraction, what algebraic trick makes the inequality immediately obvious? (3 steps)", "answer": "- Step 1: Find the common denominator $$x(x+5)$$: $$P(C) + P(D) = \\frac{x^2 + 5(x+5)}{x(x+5)} = \\frac{x^2 + 5x + 25}{x^2 + 5x}$$.\n- Step 2: **The trick**: notice the numerator is the denominator plus 25. Rewrite as $$\\frac{(x^2 + 5x) + 25}{x^2 + 5x} = 1 + \\frac{25}{x^2 + 5x}$$.\n- Step 3: For $$x > 0$$: $$x^2 + 5x > 0$$, so $$\\frac{25}{x^2 + 5x} > 0$$, meaning $$P(C) + P(D) = 1 + (\\text{something positive}) > 1$$. No quadratic inequality needed — the restructuring makes it obvious.\n\nThis is faster and cleaner than solving $$\\frac{x^2+5x+25}{x^2+5x} > 1$$ algebraically. Always look for \"numerator = denominator + constant\" patterns.", "source": "GLM 5.1 ①", "_id": "glm_1_24"}, {"question": "What over-engineered methods did Phuc try in S1 Jan 2023 Q4(ii), and why is the fraction-splitting method superior? (2 steps)", "answer": "- Step 1: Phuc attempted calculus or quadratic-inequality machinery to show the sum exceeds 1.\n- Step 2: The fraction-splitting method is superior because it exposes the “$$1 + \\text{positive}$$” structure in one line, satisfying the “show that” requirement with minimal algebraic labour and zero need for discriminant analysis or turning points.", "source": "Kimi K2.6 ①", "_id": "kimi_1_31"}, {"question": "What is the symmetric difference identity $$P(A \\triangle B) = P(A) + P(B) - 2P(A \\cap B)$$, and when is it useful? (2 steps)", "answer": "- Step 1: The symmetric difference $$A \\triangle B = (A \\cap B') \\cup (A' \\cap B)$$ consists of elements in exactly one of A or B. Its probability can be expressed as $$P(A) + P(B) - 2P(A \\cap B)$$, because $$P(A) + P(B)$$ double-counts the intersection.\n- Step 2: This is useful in Venn diagram problems where you're given the symmetric difference probability and need to set up equations. In Q4(i), recognising that $$P(A \\triangle B) = p + r$$ directly gives you the third equation, without needing to invoke the general identity.", "source": "GLM 5.1 ③", "_id": "glm_3_47"}, {"question": "What's the danger of treating Q5(e) as an \"inverse normal\" problem?", "answer": "Inverse normal means \"given a probability, find the $$z$$-value (or $$x$$-value)\". Q5(e) is the OPPOSITE direction: given an event range, find a probability. Confusing them leads to looking up $$\\Phi^{-1}$$ when you should be using $$\\Phi$$, or trying to \"solve for an unknown bound\" when both bounds are explicit. Recognise: conditional probability of a range = DIRECT normal CDF computation, just over a trimmed interval.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "After proving $$p + q + r = \\frac{2}{5}$$, how do you efficiently find the individual region $$q = P(A \\cap B)$$ using the relationship $$P(A) + P(B) = (p+q+r) + q$$? (2 steps)", "answer": "- Step 1: Observe that $$P(A) + P(B) = (p+q) + (q+r) = p + 2q + r = (p+q+r) + q$$. This isolates $$q$$ in terms of known quantities.\n- Step 2: Substitute: $$\\frac{7}{25} + \\frac{5}{25} = \\frac{10}{25} + q$$, so $$q = \\frac{12}{25} - \\frac{10}{25} = \\frac{2}{25}$$. Once $$q$$ is known, $$p$$ and $$r$$ follow from the original equations, and $$s = 1 - (p+q+r)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "Q5(e) S1 Jan 2023 — When computing $$P(L > 5 \\mid \\text{not outlier})$$, what is the single most important step that most students get wrong? (2 steps)", "answer": "- Step 1: You must *intersect* the event \"$$L > 5$$\" with the conditioning event \"not outlier\" ($$3.4208 < L < 5.5792$$) before standardising. The intersection is $$5 < L < 5.5792$$, *not* $$L > 5$$.\n- Step 2: The common mistake is using $$P(L > 5) = P(Z > 1.25) = 0.1056$$ as the numerator. But the conditioning event caps the upper end at 5.5792, so observations above 5.5792 are excluded. The correct numerator is $$P(1.25 < Z < 2.70) = 0.9965 - 0.8944 = 0.1021$$, giving $$\\frac{0.1021}{0.993} \\approx 0.103$$.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "S1 Jan 2023 Q5(e) — What is the critical first step when setting up the numerator of $$P(L > 5 \\mid \\text{not outlier})$$? (3 steps)", "answer": "- Step 1: Write the definition $$P(L > 5 \\mid N) = \\dfrac{P(L > 5 \\cap N)}{P(N)}$$.\n- Step 2: Realise that \"not an outlier\" means $$L$$ lies between the lower and upper outlier limits; therefore the intersection is not simply $$L > 5$$ but $$5 < L < \\text{upper limit}$$.\n- Step 3: Standardise both boundaries of this intersection interval to find the probability mass inside it.", "source": "Kimi K2.6 ②", "_id": "kimi_2_30"}, {"question": "In S1 Jan 2023 Q2(c)-(d), what algebraic trick keeps the conditional probability calculation in part (d) clean and avoids decimal rounding errors? (3 steps)", "answer": "- Step 1: When computing $$P(\\text{all G})$$ and $$P(\\text{all B})$$, express both over the same common denominator (here 936) by multiplying out the branch probabilities fully.\n- Step 2: Sum them to get $$P(\\text{same}) = 244/936$$.\n- Step 3: In part (d), the 936 cancels entirely in the ratio $$P(\\text{all G}) / P(\\text{same}) = 160/244$$, leaving an exact fraction that simplifies neatly to $$40/61$$ without premature rounding.", "source": "Kimi K2.6 ①", "_id": "kimi_1_15"}, {"question": "If a discrete random variable's table has probabilities $$a$$ and $$0.6 - a$$ alongside fixed values, why does the sum-to-1 constraint give NO information about $$a$$?", "answer": "Compute: $$a + 0.4 + (0.6 - a) = 1$$. The $$a$$'s cancel, leaving $$1 = 1$$ — a tautology. The table was designed so sum-to-1 is automatic; the constraint $$0 \\le a \\le 0.6$$ comes ONLY from $$P \\ge 0$$ for each cell. This is a deliberate pattern: the parameter is \"free\" until you use a second condition (like Var = 0.56) to pin it down.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "What is the danger of computing S1 Jan 2023 Q6(d)’s PMCC in one mashed calculator expression? (2 steps)", "answer": "- Step 1: You lose all intermediate method marks if the final digit is wrong; examiners award marks for $$S_{xx}, S_{yy}, S_{xy}$$ individually.\n- Step 2: Precision is harder to track; a rounding slip in an intermediate nested calculation cascades to an incorrect final third decimal place.", "source": "Kimi K2.6 ①", "_id": "kimi_1_50"}, {"question": "Q5(d) S1 Jan 2023 — The question says \"Using standardisation, show that $$P(\\text{not outlier}) = 0.993$$.\" What does the phrase \"using standardisation\" require you to show? (2 steps)", "answer": "- Step 1: You must explicitly compute the z-values for both outlier limits: $$Z_{\\text{upper}} = \\frac{5.5792 - 4.5}{0.4} = 2.698$$ and $$Z_{\\text{lower}} = \\frac{3.4208 - 4.5}{0.4} = -2.698$$. Simply stating the answer without showing these z-values loses marks.\n- Step 2: Then use the standard normal table: $$P(-2.698 < Z < 2.698) = P(Z < 2.70) - P(Z < -2.70) = 0.9965 - 0.0035 = 0.9930$$. The symmetry ($$z = \\pm 2.698$$) is a sanity check that your quartile calculations were correct.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "S1 Jan 2023 Q4(ii) — What is the logical structure of proving that two events cannot be mutually exclusive, and what key inequality drives the proof? (3 steps)", "answer": "- Step 1: The structure is **proof by contradiction**: *assume* they are mutually exclusive, derive a necessary consequence, then show that consequence is violated.\n- Step 2: If C and D are mutually exclusive, then $$P(C \\cap D) = 0$$, so $$P(C \\cup D) = P(C) + P(D)$$. Since any probability is at most 1, mutual exclusivity *forces* $$P(C) + P(D) \\le 1$$.\n- Step 3: Compute $$P(C) + P(D)$$ and show it *exceeds* 1. This contradicts the necessary bound, so the assumption of mutual exclusivity is false. The inequality $$P(C) + P(D) > 1$$ is the contradiction lever.\n\nYou don't need to compute $$P(C \\cap D)$$ directly — the sum exceeding 1 is sufficient.", "source": "GLM 5.1 ①", "_id": "glm_1_23"}, {"question": "S1 Jan 2023 Q3(c) — When setting up the variance equation $$\\mathrm{Var}(X) = E(X^2) - [E(X)]^2 = 0.56$$, what is the #1 algebra mistake to avoid?", "answer": "- Step 1: Compute $$[E(X)]^2 = (3.6 - 2a)^2$$ as a BRACKETED expression first — never distribute the minus inline.\n- Step 2: Expand cleanly: $$(3.6 - 2a)^2 = 12.96 - 14.4a + 4a^2$$.\n- Step 3: When subtracting, every term inside the bracket flips sign: $$- 12.96 + 14.4a - 4a^2$$.\n\nThe classic slip is keeping $$-14.4a$$ when it should be $$+14.4a$$ after the bracket is subtracted. Bracket-then-expand, not expand-and-subtract simultaneously.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "Why doesn't a high PMCC value alone justify using a linear model — what could the scatter still reveal?", "answer": "$$r$$ measures strength of LINEAR association but is sensitive to outliers and can be deceptively high for data that is actually curved (especially monotone curves like quadratics over a restricted range). The scatter can reveal: (i) curvature, (ii) fanning/heteroscedasticity, (iii) clusters, (iv) influential outliers driving $$r$$ up. So $$r$$ + scatter together are needed: $$r$$ quantifies, scatter qualifies.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "S1 Jan 2023 — What is the \"bracket before expanding\" principle, and in which questions does it apply? (2 steps)", "answer": "- Step 1: The principle is: when an expression involves a squared bracket that will be subtracted, **expand the square separately first**, then distribute the minus sign. Never try to square and negate in one step.\n- Step 2: This applies in Q3(c) where $$\\text{Var}(X) = E(X^2) - [E(X)]^2 = (13.2 - 12a) - (3.6 - 2a)^2$$. Expand $$(3.6-2a)^2 = 12.96 - 14.4a + 4a^2$$ first, then subtract term by term. Inline distributing (negating inside the square before expanding) is the #1 source of sign errors.\n\nThe same principle applies whenever you see \"$$- (\\text{bracket})^2$$\" in any context: expand the square cleanly, then subtract.", "source": "GLM 5.1 ①", "_id": "glm_1_40"}, {"question": "How is PMCC structurally related to $$S_{xx}, S_{yy}, S_{xy}$$, and why is the form revealing?", "answer": "$$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. Conceptually, $$r$$ is the *standardised covariance* — covariance scaled by the geometric mean of the variances. This guarantees $$-1 \\le r \\le 1$$ (Cauchy-Schwarz). The form makes it clear that $$r$$ measures the proportion of $$y$$-variation explained by $$x$$, scaled to be unitless.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "S1 Jan 2023 Q5(e) — \"Given the housefly is not an outlier, find $$P(L > 5)$$.\" What is THE single most common mistake on this conditional?", "answer": "- Step 1: Wrong answer: compute $$P(L > 5) / P(\\text{not outlier}) = P(Z > 1.25)/0.993 \\approx 0.106$$.\n- Step 2: Why wrong: \"not outlier\" caps $$L$$ at 5.5792 on the upper end. The intersection of $$\\{L > 5\\}$$ with $$\\{3.42 < L < 5.58\\}$$ is $$\\{5 < L < 5.58\\}$$, not $$\\{L > 5\\}$$.\n- Step 3: Correct numerator: $$P(5 < L < 5.5792) = \\Phi(2.70) - \\Phi(1.25) = 0.9965 - 0.8944 = 0.1021$$. Then divide by 0.993 to get $$0.103$$.\n\nRule: in conditional probability, ALWAYS intersect the event with the conditioning set on the number line BEFORE standardising.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "S1 Jan 2023 — What is the formula for $$S_{xx}$$, $$S_{yy}$$, and $$S_{xy}$$, and what is the common structural pattern they share? (2 steps)", "answer": "- Step 1: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$, $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$, $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$.\n- Step 2: The structural pattern is: \"sum of products minus product of sums over n.\" For $$S_{xx}$$ and $$S_{yy}$$, the \"product\" is a square (same variable with itself). For $$S_{xy}$$, it's a cross-product. All three measure *deviation from the mean* in some sense — $$S_{xx}$$ and $$S_{yy}$$ are scaled variances, $$S_{xy}$$ is a scaled covariance.\n\nMnemonic: the \"correction factor\" $$\\frac{(\\sum x)^2}{n}$$ always subtracts. If you get a negative $$S_{xx}$$ or $$S_{yy}$$, you've made an arithmetic error.", "source": "GLM 5.1 ①", "_id": "glm_1_49"}, {"question": "S1 Jan 2023 Q4(ii) — What algebraic trick turns the sum $$P(C) + P(D) = \\frac{x}{x+5} + \\frac{5}{x}$$ into an obvious inequality without calculus? (2 steps)", "answer": "- Step 1: Combine the fractions over the common denominator $$x(x+5)$$ to obtain $$\\dfrac{x^2 + 5x + 25}{x^2 + 5x}$$.\n- Step 2: Rewrite the numerator as $$(x^2 + 5x) + 25$$, splitting the fraction into $$1 + \\dfrac{25}{x^2 + 5x}$$. For $$x > 0$$ the remainder term is positive, so the sum is strictly greater than 1, making the mutual-exclusivity bound impossible.", "source": "Kimi K2.6 ②", "_id": "kimi_2_23"}, {"question": "Edge case — What happens if both roots of the variance quadratic fall within the valid range, vs. one falling outside? How does the examiner exploit this? (2 steps)", "answer": "- Step 1: If both roots are valid (e.g., $$a = 0.2$$ and $$a = 0.4$$ both in $$[0, 0.6]$$), both are accepted answers — there are two possible distributions consistent with the given variance.\n- Step 2: Examiners often rig the problem so one root falls outside the valid range (e.g., $$a = -0.1$$), testing whether you perform the constraint check. A student who skips the check and lists both roots loses the mark. The constraint check is not optional — it is always worth a mark, whether or not it eliminates a root.", "source": "GLM 5.1 ③", "_id": "glm_3_55"}, {"question": "Why can't you use a quadratic-inequality approach (e.g., finding where $$P(C) + P(D) \\le 1$$) as an alternative to the algebraic restructuring trick in the mutual exclusivity proof? (2 steps)", "answer": "- Step 1: You *could* set up $$\\frac{x^2 + 5x + 25}{x^2 + 5x} \\le 1$$ and simplify to $$25 \\le 0$$, which is never true. But this requires multiplying through by $$x^2 + 5x$$ and carefully tracking the sign — more steps, more room for error.\n- Step 2: The restructuring trick (writing the sum as $$1 + \\frac{25}{N}$$) is faster and more elegant because it bypasses inequality manipulation entirely. It immediately reveals the sum is always strictly greater than 1. In an exam, the simpler route is the safer route.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "Why is Q5(e) *not* an inverse normal problem despite involving probabilities and quartile-like cutoffs?", "answer": "Inverse normal goes from probability → $$z$$ (find the value below which $$p$$ lies). Q5(e) goes from values → probability (compute the conditional probability of a given interval). The cutoff $$L = 5$$ and band $$3.4208 < L < 5.5792$$ are *given* — you just standardise and use the table forward. The conditioning is handled by dividing two forward probabilities, not by inverse-normal manipulation.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Why are the standardised outlier $$z$$-values exactly $$\\pm 2.698$$ (and not some random number)?", "answer": "The outlier limit is $$\\mu \\pm (Q_3 - \\mu) + 1.5 \\cdot 2(Q_3 - \\mu) = \\mu \\pm 4 \\cdot 0.6745\\sigma = \\mu \\pm 2.698\\sigma$$. So $$z = \\pm 2.698$$ is structural — it pops out of the outlier formula whenever the data are exactly normal with quartiles at $$\\pm 0.6745\\sigma$$. Spotting $$\\mu \\pm 2.698\\sigma$$ is a sanity check that your quartiles were correct.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "S1 Jan 2023 — Why must you carry full precision through intermediate steps and only round at the final answer? (2 steps)", "answer": "- Step 1: Rounding at intermediate steps (e.g., using $$Q_3 = 4.77$$ instead of 4.7698) introduces small errors that **compound** across subsequent calculations. In Q5, the outlier limits, z-values, and conditional probability all depend on the quartile values.\n- Step 2: By part (e), a rounding error of 0.001 in the quartile propagates to ~0.003 in the outlier limit, ~0.008 in the z-value, and ~0.002 in the final probability — enough to miss the required 3 d.p. accuracy. Store full calculator precision throughout; round only when writing the final boxed answer.\n\nCalculator technique: use the ANS key or memory slots to carry forward unrounded values.", "source": "GLM 5.1 ①", "_id": "glm_1_47"}, {"question": "S1 Jan 2023 — What is the algebraic restructuring trick $$\\frac{N + c}{N} = 1 + \\frac{c}{N}$$ useful for, and when should you look for it? (2 steps)", "answer": "- Step 1: This trick is useful whenever you need to show that a fraction is greater than 1 (or less than 1, or equal to 1). By splitting off the \"1\", the remaining term $$\\frac{c}{N}$$ is easy to sign-check: if $$c > 0$$ and $$N > 0$$, then the whole expression exceeds 1.\n- Step 2: Look for it when the numerator and denominator of a combined fraction are *almost the same* — the numerator is the denominator plus a constant. In Q4(ii), $$\\frac{x^2 + 5x + 25}{x^2 + 5x}$$ has numerator = denominator + 25. This pattern also appears in probability sums, variance ratios, and correlation bounds.\n\nThe key insight: instead of solving an inequality from scratch, restructure to make the comparison trivial.", "source": "GLM 5.1 ①", "_id": "glm_1_44"}, {"question": "Conceptually, why does a high $$r$$ not justify extrapolation, even for values close to the data range?", "answer": "$$r$$ measures linearity *within the sampled range only*. Outside that range, the underlying relationship could plateau (e.g., solubility saturates), reverse, or change scaling — none of which $$r$$ can detect from the observed data. A regression model is descriptive within range and predictive only assuming the structural relationship continues, which is an unverified extrapolation. Always treat $$r$$ and predictive validity as separate questions.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "How do you convert between quartiles of a general normal distribution $$X \\sim N(\\mu, \\sigma^2)$$ and the standard normal? (2 steps)", "answer": "- Step 1: To find a quartile of $$X$$, use the inverse standardisation: $$Q_k = \\mu + z_k \\cdot \\sigma$$, where $$z_k$$ is the corresponding standard-normal quartile value.\n- Step 2: For $$Q_3$$: $$z_{Q_3} = 0.6745$$, so $$Q_3 = \\mu + 0.6745\\sigma$$. For $$Q_1$$: $$z_{Q_1} = -0.6745$$, so $$Q_1 = \\mu - 0.6745\\sigma$$. The IQR is $$Q_3 - Q_1 = 2 \\times 0.6745\\sigma \\approx 1.349\\sigma$$.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "Synthesis — You encounter a conditional probability question involving a normal distribution, where the conditioning event restricts the variable to an interval. What is the systematic approach? (3 steps)", "answer": "- Step 1: Write down the conditional probability formula: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. Identify $$A$$ and $$B$$ explicitly.\n- Step 2: Compute the intersection $$A \\cap B$$ on the number line. This is where most errors occur — the intersection is *not* simply $$A$$. If $$A = \\{L > 5\\}$$ and $$B = \\{3.42 < L < 5.58\\}$$, then $$A \\cap B = \\{5 < L < 5.58\\}$$.\n- Step 3: Standardise the endpoints of the intersection interval, look up the normal table values, and compute $$P(A \\cap B)$$. Divide by $$P(B)$$ (which may have been computed in a previous part).", "source": "GLM 5.1 ③", "_id": "glm_3_53"}, {"question": "What is the universal pattern signalled by \"show that ... = [specific value to 3 d.p.]\" in Edexcel S1?", "answer": "It signals: (1) the question requires showing intermediate working, not just the answer — full method marks are at stake; (2) you must carry full precision through every step until the final rounding; (3) the specified precision is a *check*: if your answer doesn't match, you've made an error and should backtrack rather than fudge. Treat these as proof questions in style, even when computational in content.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "S1 Jan 2023 Q2(b) — for a 2-draw tree, how do you express 'the two marbles selected are of different colours' as a sum of probabilities, and why must both orderings be counted?", "answer": "- Step 1: 'Different colours' decomposes as $$P(GB) + P(BG)$$ — the FIRST is green-then-blue, the SECOND is blue-then-green.\n- Step 2: Why both: the tree is ordered (draws happen in sequence), so GB and BG are DIFFERENT paths through the tree with different probabilities (different denominators, different numerators). They are mutually exclusive paths to the same outcome event \"different colours\".\n- Step 3: Adding both because $$P(\\text{event}) = \\sum_{\\text{paths to event}} P(\\text{path})$$, and \"different colours\" is realised by exactly two ordered paths.\n\nCommon slip: computing only $$P(GB)$$ and doubling it. That works here because the numerators happen to coincide ($$\\tfrac{5}{9}\\cdot\\tfrac{4}{8} = \\tfrac{4}{9}\\cdot\\tfrac{5}{8}$$), but it's wrong in general — always sum both paths explicitly.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Given three two-region sums from a Venn diagram: $$p+q=7/25$$, $$q+r=5/25$$, $$p+r=8/25$$, what is the cleanest \"show that\" move to arrive at $$2p+2q+2r = 4/5$$? (2 steps)", "answer": "- Step 1: **Add all three equations together** simultan
