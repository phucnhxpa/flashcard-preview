g and one reversing). Possible values: $$k = 7/2$$ or $$k = -1/2$$.\n\nTakeaway: $$|\\det| = $$ area scale factor → solve $$\\det = \\pm k$$.", "source": "Opus 4 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "Why do Q1 (sums), Q2 (quartic), and Q5 (transformed roots) share the same underlying problem-solving strategy of \"factor to expose structure, then simplify\"? (4 steps)", "answer": "- Step 1: In Q1, the trick is to **factor out $$\\tfrac{1}{12}n(n+1)$$ early** before expanding the polynomial bracket, exposing a clean simplification.\n- Step 2: In Q2, the trick is to **factor the polynomial as (known quadratic)·(unknown quadratic)** and use polynomial division to expose the second factor without solving from scratch.\n- Step 3: In Q5, the trick is to **factor $$\\alpha\\beta^2 + \\beta\\alpha^2 + \\alpha + \\beta = (\\alpha+\\beta)(\\alpha\\beta+1)$$** to express a complicated symmetric sum in terms of $$s$$ and $$p$$.\n- Step 4: The unifying principle: **factor first, simplify second**. Look for shared structure across terms before expanding. Most FP1 algebra rewards spotting and exploiting symmetry.\n\nTakeaway: factoring exposes structure; expanding hides it. Look for common factors and symmetries before brute force.", "source": "Opus 4 ②", "_id": "opus_2_58", "judge_pick": true}, {"question": "Both Q3 (rectangular hyperbola) and Q8 (parabola) involve \"find the second intersection\" or \"find tangent intersection\" — what's the unified approach across conics? (3 steps)", "answer": "- Step 1: Parametrize the conic — $$(ct, c/t)$$ for hyperbola, $$(at^2, 2at)$$ for parabola. This converts Cartesian rationals into polynomial-in-$$t$$ algebra.\n- Step 2: Express tangent/normal in parametric form. Sub one tangent equation into another (or into the conic equation) to get a polynomial in $$t$$ or $$x$$.\n- Step 3: Use Vieta's: one root of the polynomial corresponds to the original parameter; the other root pops out via roots-product or roots-sum, no quadratic formula needed.\n\nThe pattern: **parametrize → write line equation in $$t$$ → eliminate to get polynomial in $$t$$ → use Vieta's to get the second root**.\n\nTakeaway: parametric form + Vieta's = the conic-section workhorse.", "source": "Opus 4 ②", "_id": "opus_2_59", "judge_pick": true}, {"question": "A student writes \"$$|\\det A| = 3 \\Rightarrow \\det A = 3$$, so $$-3k + 24 = 3, k = 7$$\" and stops there. What did they miss? (3 steps)", "answer": "- Step 1: They missed the negative branch. $$|\\det A| = 3$$ gives **two** equations: $$\\det A = +3$$ AND $$\\det A = -3$$.\n- Step 2: $$\\det A = -3$$ gives $$-3k + 24 = -3$$, so $$k = 9$$. This is a separate valid solution.\n- Step 3: The phrase \"**possible values**\" (plural) in the question is the red flag. Whenever you see plural \"values\", expect to split into cases and report all. Without doing so, you lose the second value and ~2 marks.\n\nTakeaway: $$|x| = c$$ has TWO solutions, $$x = \\pm c$$. Always split and check both.", "source": "Opus 4 ②", "_id": "opus_2_60", "judge_pick": true}, {"question": "A student computes $$(z - z_1)(z - \\bar z_1) = z^2 - z_1 z - \\bar z_1 z + z_1\\bar z_1$$ and stops, leaving $$z_1, \\bar z_1$$ in the answer. Why is this wrong (or rather, incomplete) for FP1 work? (3 steps)", "answer": "- Step 1: A real-coefficient polynomial **must** have real coefficients in every factor (when factoring over $$\\mathbb{R}$$). Leaving $$z_1, \\bar z_1$$ in the answer hides the simplification.\n- Step 2: Combine: $$-z_1 z - \\bar z_1 z = -(z_1 + \\bar z_1)z = -2\\,\\text{Re}(z_1)\\,z$$ (a real coefficient). And $$z_1 \\bar z_1 = |z_1|^2$$ (a real number).\n- Step 3: The simplified, real-coefficient form is $$z^2 - 2\\,\\text{Re}(z_1)z + |z_1|^2$$. This is the form you can polynomial-divide a real-coefficient quartic by — without it, you'd be dividing by complex coefficients, which is messy.\n\nTakeaway: always simplify $$(z - z_1)(z - \\bar z_1)$$ to its real-coefficient form before dividing.", "source": "Opus 4 ②", "_id": "opus_2_61", "judge_pick": true}, {"question": "Why is it WRONG to apply Newton-Raphson at a starting value $$x_0$$ where $$f'(x_0) = 0$$? (3 steps)", "answer": "- Step 1: The NR formula is $$x_{n+1} = x_n - \\tfrac{f(x_n)}{f'(x_n)}$$. If $$f'(x_n) = 0$$, the update step is undefined (division by zero).\n- Step 2: Geometrically: at a stationary point, the tangent to $$y = f(x)$$ is **horizontal**. A horizontal line never crosses the $$x$$-axis (unless it IS the $$x$$-axis), so there's no \"next iterate\" — the method has nowhere to go.\n- Step 3: Even if $$f'(x_0)$$ is **nearly** zero (but nonzero), the update is huge ($$f/f' \\to \\infty$$), shooting the iterate far from the root. Always check that your starting point isn't near a stationary point.\n\nTakeaway: NR demands $$f'(x_n) \\neq 0$$ and ideally $$|f'(x_n)|$$ not small. Stationary points = NR catastrophe.", "source": "Opus 4 ②", "_id": "opus_2_62", "judge_pick": true}, {"question": "For divisibility induction \"$$f(n)$$ divisible by $$d$$\", what happens if $$f(1) = 0$$? Is the base case still valid? (3 steps)", "answer": "- Step 1: Divisibility convention: an integer $$a$$ divides $$b$$ iff $$b = a \\cdot k$$ for some integer $$k$$. With $$b = 0$$, choose $$k = 0$$: $$0 = a \\cdot 0$$ for any nonzero $$a$$. So **every** nonzero integer divides 0.\n- Step 2: For $$f(n) = 4^n + 6n - 10$$: $$f(1) = 0$$. Yes, $$18 \\mid 0$$ (since $$0 = 18 \\times 0$$). The base case is valid.\n- Step 3: This is mathematically standard but counterintuitive. If the question gives a base case at $$n = n_0$$ where $$f(n_0) = 0$$, accept it and move on.\n\nTakeaway: $$a \\mid 0$$ for all $$a \\neq 0$$. The base case can be 0 and still work.", "source": "Opus 4 ②", "_id": "opus_2_63", "judge_pick": true}, {"question": "Suppose a focal chord on $$y^2 = 4ax$$ is **vertical** (the latus rectum). What are the parameters $$t_1, t_2$$, and where do the tangents at its endpoints meet? (3 steps)", "answer": "- Step 1: A vertical line through the focus $$(a, 0)$$ has equation $$x = a$$. On the parabola: $$y^2 = 4a \\cdot a = 4a^2$$, so $$y = \\pm 2a$$. Endpoints: $$(a, 2a)$$ and $$(a, -2a)$$.\n- Step 2: Comparing to $$(at^2, 2at)$$: $$at^2 = a \\Rightarrow t = \\pm 1$$. So $$t_1 = 1, t_2 = -1$$, and indeed $$t_1 t_2 = -1$$ ✓.\n- Step 3: Tangent intersection: $$R = (at_1 t_2, a(t_1 + t_2)) = (a(-1), a(0)) = (-a, 0)$$. So tangents meet at $$(-a, 0)$$ — on the directrix, on the axis. Special case of the directrix-as-polar theorem.\n\nTakeaway: latus rectum is the \"shortest\" focal chord; tangents at its ends meet at the foot of the directrix on the axis.", "source": "Opus 4 ②", "_id": "opus_2_64", "judge_pick": true}, {"question": "Why is the rectangular hyperbola \"rectangular\"? What does the term mean geometrically? (3 steps)", "answer": "- Step 1: A general hyperbola has two **asymptotes**. For $$xy = c^2$$, the asymptotes are the $$x$$-axis ($$y = 0$$) and $$y$$-axis ($$x = 0$$).\n- Step 2: These asymptotes are **perpendicular** (90° angle between them). A \"rectangular\" hyperbola is one whose asymptotes meet at right angles — hence the name.\n- Step 3: Equivalently: the standard form $$\\tfrac{x^2}{a^2} - \\tfrac{y^2}{b^2} = 1$$ becomes \"rectangular\" when $$a = b$$. Rotating by 45° brings it to the form $$xy = c^2$$ (with $$c^2 = a^2/2$$).\n\nTakeaway: \"rectangular\" = asymptotes at 90°. The $$xy = c^2$$ form is the rotated, rectangular case.", "source": "Opus 4 ②", "_id": "opus_2_65", "judge_pick": true}, {"question": "Outline the complete approach to solving Q1 (sum $$r(r+2)^2$$ in factored form) without doing the algebra. (6 steps)", "answer": "- Step 1: Expand the summand to a sum of monomials in $$r$$: $$r(r+2)^2 = r^3 + 4r^2 + 4r$$.\n- Step 2: Apply standard sum results separately: $$\\sum r^3 = \\tfrac{1}{4}n^2(n+1)^2$$, $$\\sum r^2 = \\tfrac{1}{6}n(n+1)(2n+1)$$, $$\\sum r = \\tfrac{1}{2}n(n+1)$$.\n- Step 3: Bring all terms to common denominator 12.\n- Step 4: Factor out $$\\tfrac{1}{12}n(n+1)$$ — every term has this in common.\n- Step 5: Simplify the bracket: collect like powers of $$n$$.\n- Step 6: Sanity check at $$n=1$$: LHS = $$1 \\cdot 9 = 9$$; RHS should also be 9.\n\nTakeaway: expand → standard results → common denominator → factor $$n(n+1)$$ → simplify → check.", "source": "Opus 4 ②", "_id": "opus_2_66", "judge_pick": false}, {"question": "Outline the complete approach to solving Q2 (find all four roots of a real-coefficient quartic given one complex root). (5 steps)", "answer": "- Step 1: Write down the conjugate of the given root — automatically a second root by the conjugate-pair rule.\n- Step 2: Build the quadratic factor: $$z^2 - 2\\,\\text{Re}(z_1)z + |z_1|^2$$ — this is a real-coefficient factor of the quartic.\n- Step 3: Polynomial-long-divide the quartic by this quadratic factor. The quotient is a second quadratic (real coefficients).\n- Step 4: Solve the second quadratic by quadratic formula (or factoring) to obtain the remaining two roots.\n- Step 5: Plot all four on an Argand diagram, exploiting conjugate symmetry across the real axis.\n\nTakeaway: conjugate → quadratic factor → divide → solve quotient → plot. No guessing, systematic.", "source": "Opus 4 ②", "_id": "opus_2_67", "judge_pick": true}, {"question": "Outline the approach to Q3 (find normal to $$xy = c^2$$ at parametric point, then find second intersection with curve). (6 steps)", "answer": "- Step 1: Differentiate $$xy = c^2$$ implicitly to find $$\\tfrac{dy}{dx} = -y/x$$. Substitute parametric point to get gradient $$= -1/t^2$$.\n- Step 2: Normal gradient $$= -1/(\\text{tangent grad}) = t^2$$. Write line through $$(ct, c/t)$$ with this gradient.\n- Step 3: Multiply through by $$t$$ to clear fractions, rearrange to standard form $$t^3 x - ty = c(t^4 - 1)$$.\n- Step 4: Substitute the specific value of $$t$$. Substitute the line into $$xy = c^2$$ to get a quadratic in $$x$$.\n- Step 5: One root of this quadratic is the original $$x$$-coordinate ($$ct$$); use **Vieta's roots-product** to get the second $$x$$-coordinate quickly.\n- Step 6: Substitute back into the line (or the curve) to find the corresponding $$y$$-coordinate.\n\nTakeaway: implicit differentiation → parametric gradient → normal equation → substitute → Vieta's for second root.", "source": "Opus 4 ②", "_id": "opus_2_68", "judge_pick": false}, {"question": "Outline the approach to Q5(b) — building a quadratic with new roots $$\\alpha' = \\tfrac{\\alpha}{\\alpha^2+1}, \\beta' = \\tfrac{\\beta}{\\beta^2+1}$$. (6 steps)", "answer": "- Step 1: New quadratic is $$x^2 - Sx + P = 0$$ where $$S = \\alpha' + \\beta'$$ and $$P = \\alpha'\\beta'$$.\n- Step 2: Compute $$P$$: $$\\alpha'\\beta' = \\tfrac{\\alpha\\beta}{(\\alpha^2+1)(\\beta^2+1)}$$. Reuse part (a) for the denominator.\n- Step 3: Compute $$S$$: combine fractions to get $$\\tfrac{\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1)}{(\\alpha^2+1)(\\beta^2+1)}$$.\n- Step 4: **Trick**: factor numerator as $$\\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta) = (\\alpha+\\beta)(\\alpha\\beta+1)$$.\n- Step 5: Substitute Vieta's $$\\alpha+\\beta = -b/a, \\alpha\\beta = c/a$$ to get numerical values for $$S, P$$.\n- Step 6: Multiply $$x^2 - Sx + P = 0$$ through by the LCM of $$S, P$$ denominators to get integer coefficients.\n\nTakeaway: $$S$$ and $$P$$ in terms of original $$s, p$$ → factor symmetric sum → clear denominators.", "source": "Opus 4 ②", "_id": "opus_2_69", "judge_pick": false}, {"question": "Outline the approach to Q9 (induction: $$4^n + 6n - 10$$ divisible by 18). (5 steps)", "answer": "- Step 1: **Base case**: check $$f(1) = 0$$ or $$f(2) = 18$$ — divisible by 18.\n- Step 2: **Hypothesis**: assume $$f(k) = 4^k + 6k - 10 = 18m$$ for some integer $$m$$.\n- Step 3: **Engineer** $$f(k+1)$$ in terms of $$f(k)$$ plus a clean multiple of 18:\n+ Compute $$f(k+1) = 4 \\cdot 4^k + 6k - 4$$\n+ Compute $$4 f(k) = 4 \\cdot 4^k + 24k - 40$$\n+ Difference: $$f(k+1) - 4f(k) = -18(k - 2)$$\n+ Therefore $$f(k+1) = 4f(k) - 18(k-2)$$\n- Step 4: Both $$4f(k)$$ (by hypothesis) and $$18(k-2)$$ are divisible by 18. So $$f(k+1)$$ is divisible by 18.\n- Step 5: **Conclude** by the principle of mathematical induction.\n\nTakeaway: write $$f(k+1) = c \\cdot f(k) + 18 \\cdot g(k)$$ — engineering form > difference form for divisibility induction.", "source": "Opus 4 ②", "_id": "opus_2_70", "judge_pick": false}, {"question": "Across all 9 questions in this paper, which formula or technique appears most often as a recurring trick? (4 steps)", "answer": "- Step 1: **Vieta's formulas** are central in:\n+ Q5: Vieta's for the original quadratic ($$s, p$$ in terms of coefficients)\n+ Q3 implicitly: roots-product to find second intersection of line and curve\n+ Q8 indirectly: focal chord theorem $$t_1 t_2 = -1$$ is a Vieta-style condition\n- Step 2: **Symmetric / paired structure** appears in:\n+ Q2: conjugate pairs of complex roots\n+ Q5: symmetric polynomials in $$\\alpha, \\beta$$\n+ Q8: focal chord pairing $$(t_1, -1/t_1)$$\n+ Q9: $$f(k) \\to f(k+1)$$ recurrence\n- Step 3: **Real-imaginary equating** appears in:\n+ Q2: Argand diagram conjugate mirror\n+ Q6: solving for $$a, b$$ from $$w = $$ value\n- Step 4: The unifying meta-strategy: **identify the symmetry/pairing in the problem, exploit it to reduce work**.\n\nTakeaway: FP1 problems reward symmetry-spotting more than brute force.", "source": "Opus 4 ②", "_id": "opus_2_71", "judge_pick": false}, {"question": "When are you allowed to skip a question on the FP1 paper, and how should you re-allocate time? (4 steps)", "answer": "- Step 1: If a topic is genuinely unfamiliar (gap topic — e.g. parabola, rectangular hyperbola for someone who hasn't studied them), don't sink unbounded time into it on first pass. Skip after 1-2 minutes of looking.\n- Step 2: Do all questions you DO know first — ensures you bank all the marks you can.\n- Step 3: With the remaining time, return to the gap topics. Budget by mark value: Q3 (7 marks) deserves ~10 min, Q8 (13 marks) deserves ~15 min. If you can't progress, at least write down what you DO know — partial methods still earn method marks.\n- Step 4: Especially: write down standard formulas at the start of a gap question (parametric form, focus, directrix). Method marks for \"set-up\" can total 30-50% of the question.\n\nTakeaway: maximize marks by doing knowns first; partial-credit gap questions at the end.", "source": "Opus 4 ②", "_id": "opus_2_72", "judge_pick": true}, {"question": "What three things should you \"always do\" at the very start of a numerical methods question (root-finding) to set yourself up for full marks? (3 steps)", "answer": "- Step 1: **State continuity** explicitly. \"$$f$$ is a polynomial / continuous on the relevant interval.\" Method mark for IVT setup.\n- Step 2: **Compute and write both function values** at endpoints with their signs clearly indicated. \"$$f(a) = -1 < 0$$\" and \"$$f(b) = 5 > 0$$\" — never just say \"sign change\". Examiners want the values.\n- Step 3: **Quote the relevant formula** before plugging in numbers — bisection midpoint, NR formula, linear interpolation closed form. This earns method marks even if your arithmetic has a slip later.\n\nTakeaway: continuity + values + formula quote — earns ~50% of marks before any computation.", "source": "Opus 4 ②", "_id": "opus_2_73", "judge_pick": false}, {"question": "What is \"calculator hygiene\" for FP1 and why does it matter for Newton-Raphson and linear interpolation questions? (3 steps)", "answer": "- Step 1: Store the starting value $$x_0$$ in calculator memory (e.g., `STO A`). Then evaluate $$f(x_0)$$ using `A` — guarantees you've used the same value in $$f$$ and $$f'$$.\n- Step 2: Use the `ANS` button to chain: compute $$f(A)/f'(A)$$ and subtract from `A`. This gives $$x_1$$ with full calculator precision; only round at the very end (typically to 3 d.p.).\n- Step 3: Why it matters: rounding early in the chain $$x_0 \\to f(x_0) \\to f(x_0)/f'(x_0) \\to x_1$$ propagates errors. A 0.01 error at $$x_0$$ can become a 0.05 error at $$x_1$$. Examiners can mark wrong if your final answer differs by more than 1 in the last decimal.\n\nTakeaway: store $$x_0$$, use ANS, round once at the end. Saves marks and time.", "source": "Opus 4 ②", "_id": "opus_2_74", "judge_pick": false}, {"question": "A student writes \"$$\\alpha + \\beta = b/a$$\" instead of \"$$\\alpha + \\beta = -b/a$$\". Why is the minus sign there, conceptually? (3 steps)", "answer": "- Step 1: Start from $$(x - \\alpha)(x - \\beta) = x^2 - (\\alpha + \\beta)x + \\alpha\\beta$$ — note the **minus** sign in front of $$(\\alpha+\\beta)$$.\n- Step 2: For a monic quadratic $$x^2 + Bx + C$$ to equal this, you need $$B = -(\\alpha+\\beta)$$, i.e. $$\\alpha + \\beta = -B$$.\n- Step 3: Generalize to $$ax^2 + bx + c$$: divide through by $$a$$ to get $$x^2 + (b/a)x + c/a = 0$$. Then $$b/a = -(\\alpha+\\beta)$$, so $$\\alpha + \\beta = -b/a$$.\n\nMnemonic: the sum equals \"minus the next coefficient down\".\n\nTakeaway: $$-b/a$$ comes from expanding $$(x-\\alpha)(x-\\beta)$$. The minus sign is structural, not a typo.", "source": "Opus 4 ②", "_id": "opus_2_75", "judge_pick": true}, {"question": "A student says: \"the gradient of the rectangular hyperbola at any point is always negative\". Is this fully correct? (3 steps)", "answer": "- Step 1: For $$xy = c^2$$ with $$c > 0$$, the curve has two branches: one in the first quadrant (where $$x > 0, y > 0$$) and one in the third quadrant (where $$x < 0, y < 0$$).\n- Step 2: From $$\\tfrac{dy}{dx} = -y/x$$: in Q1, $$y/x > 0$$, so $$\\tfrac{dy}{dx} < 0$$ ✓. In Q3, both $$y$$ and $$x$$ are negative, so $$y/x > 0$$ also, so $$\\tfrac{dy}{dx} < 0$$ ✓.\n- Step 3: So yes, the gradient is always negative — the function $$y = c^2/x$$ is monotonically decreasing on each branch (separately, since $$x = 0$$ is excluded). The student is right, but should justify with $$\\tfrac{dy}{dx} = -y/x$$ structure.\n\nTakeaway: $$xy = c^2$$ has gradient $$-1/t^2 < 0$$ everywhere — both branches are decreasing.", "source": "Opus 4 ②", "_id": "opus_2_76", "judge_pick": true}, {"question": "Why isn't it sufficient to just check the base case $$n = 1$$ and conclude divisibility holds for all $$n$$? (3 steps)", "answer": "- Step 1: A base case alone shows the property is true for ONE specific value. There's no logical bridge from $$n = 1$$ to $$n = 2, 3, 4, \\ldots$$.\n- Step 2: Induction's full power lies in the **inductive step**: showing that if the property holds for $$n = k$$, it must also hold for $$n = k+1$$. This creates a chain: $$1 \\Rightarrow 2 \\Rightarrow 3 \\Rightarrow \\ldots$$.\n- Step 3: Without the inductive step, you only have isolated facts. Counterexamples exist where a property holds for $$n=1, \\ldots, 39$$ but fails at $$n = 40$$ (e.g. Euler's $$n^2 + n + 41$$ produces primes for $$n = 0, \\ldots, 39$$).\n\nTakeaway: base case alone is not enough. The inductive step is the engine.", "source": "Opus 4 ②", "_id": "opus_2_77", "judge_pick": true}, {"question": "What happens to the focal chord theorem $$t_1 t_2 = -1$$ if you pick parameter $$t_1$$ such that the corresponding point is the vertex? (3 steps)", "answer": "- Step 1: The vertex of $$y^2 = 4ax$$ is at $$(0, 0)$$, which corresponds to parameter $$t = 0$$ (since $$(at^2, 2at) = (0,0)$$ at $$t=0$$).\n- Step 2: For $$t_1 = 0$$, the focal chord criterion $$t_1 t_2 = -1$$ requires $$0 \\cdot t_2 = -1$$, which is impossible.\n- Step 3: Geometrically: the only line through the vertex that *also* passes through the focus is the axis itself ($$y = 0$$), but this line meets the parabola only at the vertex (a tangent there), not at two distinct points. So there's no focal chord with one endpoint at the vertex — consistent with $$t_1 t_2 = -1$$ having no solution.\n\nTakeaway: $$t = 0$$ (vertex) is excluded from focal chord setups — algebraically and geometrically.", "source": "Opus 4 ②", "_id": "opus_2_78", "judge_pick": true}, {"question": "Why are the patterns \"$$\\alpha\\beta + \\alpha + \\beta = (\\alpha+1)(\\beta+1) - 1$$\" and \"$$(\\alpha+\\beta)(\\alpha\\beta+1) = \\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta)$$\" both useful in FP1 transformed-roots questions? (3 steps)", "answer": "- Step 1: Both let you write **symmetric expressions** in $$\\alpha, \\beta$$ as products or in factored form, which compress to expressions in $$s = \\alpha+\\beta$$ and $$p = \\alpha\\beta$$ alone.\n- Step 2: Once an expression is in $$s, p$$ form, you substitute Vieta's values from the original quadratic (which you already know).\n- Step 3: The general idea: any **symmetric polynomial** in $$\\alpha, \\beta$$ — i.e. one unchanged by swapping $$\\alpha \\leftrightarrow \\beta$$ — can be expressed as a polynomial in $$s$$ and $$p$$ (the elementary symmetric polynomials). FP1 only ever asks symmetric expressions, so this always works.\n\nTakeaway: symmetric expressions ↔ functions of $$s, p$$ alone. Master the factor manipulations to make this conversion fast.", "source": "Opus 4 ②", "_id": "opus_2_79", "judge_pick": false}, {"question": "Outline the steps for \"given $$BC = D$$ where $$B$$ depends on parameter $$a$$, find $$C$$ in terms of $$a$$\". (5 steps)", "answer": "- Step 1: Verify shapes: if $$B$$ is $$m \\times m$$ and $$BC = D$$ is $$m \\times n$$, then $$C$$ must be $$m \\times n$$. Pre-multiply by $$B^{-1}$$ to isolate $$C$$: $$C = B^{-1}D$$.\n- Step 2: Compute $$\\det B$$ in terms of $$a$$. (Don't simplify if it's clean already.)\n- Step 3: Apply the 2×2 inverse formula: $$B^{-1} = \\tfrac{1}{\\det B}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$$ with $$a, b, c, d$$ being the entries of $$B$$.\n- Step 4: Multiply $$B^{-1} \\cdot D$$ entry by entry. Be careful: $$1/\\det B$$ stays out front; the matrix product happens between the bracketed matrix and $$D$$.\n- Step 5: Final answer: $$C = \\tfrac{1}{\\det B} \\cdot (\\text{computed matrix})$$.\n\nTakeaway: shape-check → invert → multiply → factor out $$1/\\det B$$.", "source": "Opus 4 ②", "_id": "opus_2_80", "judge_pick": false}, {"question": "When evaluating $$\\arctan(\\text{very large number})$$ on a calculator, what should you remember about the limiting value? (3 steps)", "answer": "- Step 1: $$\\arctan x \\to \\pi/2$$ as $$x \\to +\\infty$$, and $$\\arctan x \\to -\\pi/2$$ as $$x \\to -\\infty$$.\n- Step 2: For $$\\arctan(14.5) \\approx 1.502$$ rad — note this is close to $$\\pi/2 \\approx 1.5708$$ rad, but not exactly. So an answer of ~1.50 is sensible.\n- Step 3: A complex number with very small real part and large positive imaginary part will have $$\\arg$$ close to $$\\pi/2$$ (i.e., nearly along the positive imaginary axis). Quick mental check.\n\nTakeaway: $$\\arctan(\\infty) \\to \\pi/2$$. Use this as a sanity check on big inputs.", "source": "Opus 4 ②", "_id": "opus_2_81", "judge_pick": false}, {"question": "List the formulas in this paper that are NOT in the FP1 booklet — these MUST be memorized. (4 steps)", "answer": "- Step 1: Sum and complex-number formulas:\n+ $$\\sum r = \\tfrac{1}{2}n(n+1)$$\n+ Conjugate-pair rule\n+ $$(z-z_1)(z-\\bar z_1) = z^2 - 2\\text{Re}(z_1)z + |z_1|^2$$\n+ Quadrant rules for $$\\arg z$$\n- Step 2: Conic-section formulas (the biggest memorization burden):\n+ Rectangular hyperbola: $$(ct, c/t)$$, gradient $$-1/t^2$$, tangent $$x + t^2 y = 2ct$$, normal $$t^3 x - ty = c(t^4-1)$$\n+ Parabola: $$(at^2, 2at)$$, focus $$(a,0)$$, directrix $$x = -a$$, tangent $$ty = x + at^2$$, normal $$y + tx = 2at + at^3$$, focal chord $$t_1 t_2 = -1$$, directrix-as-polar\n- Step 3: Matrix and roots:\n+ 2×2 inverse: $$\\tfrac{1}{ad-bc}\\!\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$$\n+ Area scale factor = $$|\\det A|$$\n+ $$\\alpha^2+\\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$\n+ Factor trick: $$\\alpha\\beta^2 + \\beta\\alpha^2 = \\alpha\\beta(\\alpha+\\beta)$$\n- Step 4: Numerical and induction:\n+ Linear interpolation: $$x_1 = a - \\tfrac{f(a)(b-a)}{f(b)-f(a)}$$\n+ 4-step induction template\n\nTakeaway: 16+ \"memorize me\" items. Conic geometry is the biggest chunk.", "source": "Opus 4 ②", "_id": "opus_2_82", "judge_pick": false}, {"question": "List the formulas in this paper that ARE in the FP1 booklet — know where to find them. (4 steps)", "answer": "- Step 1: $$\\sum r^2 = \\tfrac{1}{6}n(n+1)(2n+1)$$ and $$\\sum r^3 = \\tfrac{1}{4}n^2(n+1)^2$$ (under \"Series\").\n- Step 2: $$|a + bi| = \\sqrt{a^2+b^2}$$ (under \"Complex numbers\").\n- Step 3: Newton-Raphson: $$x_{n+1} = x_n - \\tfrac{f(x_n)}{f'(x_n)}$$ (under \"Numerical methods\").\n- Step 4: Vieta's for quadratics: $$\\alpha + \\beta = -b/a$$, $$\\alpha\\beta = c/a$$ (under \"Roots of equations\") — but memorize anyway, used too often.\n\nTakeaway: only 4-5 formulas in the booklet for this paper. The booklet is leaner than students expect.", "source": "Opus 4 ②", "_id": "opus_2_83", "judge_pick": false}, {"question": "Why does adding two complex numbers correspond to **adding** their components, while multiplying corresponds to **multiplying moduli and adding arguments**? (3 steps)", "answer": "- Step 1: Complex numbers form a 2D vector space over the reals — so addition is component-wise, like vectors. $$(a + bi) + (c + di) = (a+c) + (b+d)i$$.\n- Step 2: Multiplication is more interesting. Use polar form: $$z_1 = r_1 e^{i\\theta_1}$$, $$z_2 = r_2 e^{i\\theta_2}$$. Then $$z_1 z_2 = r_1 r_2 e^{i(\\theta_1 + \\theta_2)}$$. So multiplying complex numbers **scales** by $$r_2$$ and **rotates** by $$\\theta_2$$.\n- Step 3: This explains why $$|z_1 z_2| = |z_1| \\cdot |z_2|$$ and $$\\arg(z_1 z_2) = \\arg(z_1) + \\arg(z_2)$$ — the polar exponent is what carries the structure of multiplication.\n\nTakeaway: $$\\mathbb{C}$$ as 2D vectors for addition, as scaled rotations for multiplication.", "source": "Opus 4 ②", "_id": "opus_2_84", "judge_pick": false}, {"question": "Why does the conjugate-pair rule require **real** coefficients? What goes wrong if a polynomial has complex coefficients? (3 steps)", "answer": "- Step 1: The proof uses the property: if $$p(x) = a_n x^n + \\ldots + a_0$$ has all real $$a_i$$, then $$\\overline{p(z)} = p(\\bar z)$$ for any $$z \\in \\mathbb{C}$$.\n- Step 2: This property comes from $$\\overline{a_i z^i} = \\bar a_i \\bar z^i = a_i \\bar z^i$$ (the last equality uses real $$a_i = \\bar a_i$$). Sum over $$i$$ to get $$\\overline{p(z)} = p(\\bar z)$$.\n- Step 3: If coefficients are complex, $$\\bar a_i \\neq a_i$$, so $$\\overline{p(z)} \\neq p(\\bar z)$$. Then $$p(z_1) = 0$$ does NOT imply $$p(\\bar z_1) = 0$$. Counterexample: $$p(z) = z - i$$. Root is $$z = i$$. But $$\\bar z = -i$$ gives $$p(-i) = -i - i = -2i \\neq 0$$.\n\nTakeaway: real coefficients are essential for conjugate-pair symmetry. The proof breaks otherwise.", "source": "Opus 4 ②", "_id": "opus_2_85", "judge_pick": true}, {"question": "Outline the approach to Q6 (complex arithmetic with $$w = z_2 z_3 / z_1$$, find $$a, b, \\arg w$$). (4 steps)", "answer": "- Step 1: For $$|z_1 + z_2|$$: add components, then $$\\sqrt{(\\text{Re})^2 + (\\text{Im})^2}$$. Simplify any surds.\n- Step 2: For $$w = z_2 z_3 / z_1$$ with unknowns $$a, b$$: compute $$z_2 z_3 = (2+3i)(a+bi)$$ symbolically. Then divide by $$z_1 = 3+2i$$ using conjugate-multiplication: multiply top and bottom by $$\\bar z_1 = 3 - 2i$$, denominator becomes $$|z_1|^2 = 13$$.\n- Step 3: For finding $$a, b$$ given $$w = $$ value: equate real parts, equate imaginary parts → 2 equations in 2 unknowns. Solve linearly.\n- Step 4: For $$\\arg w$$: identify quadrant from signs of Re and Im. Apply correct quadrant rule for $$\\arctan$$.\n\nTakeaway: $$|z|$$ → Pythagoras; $$/z$$ → conjugate-multiply; equate Re/Im for unknowns; $$\\arg$$ → quadrant rule + arctan.", "source": "Opus 4 ②", "_id": "opus_2_86", "judge_pick": false}, {"question": "Why does FP1 favor the \"factor into a quadratic, then divide\" approach for quartics with one complex root, rather than just expanding $$(x - z_1)(x - \\bar z_1)(x - r_1)(x - r_2)$$? (3 steps)", "answer": "- Step 1: If you knew all four roots, you could expand the full product. But you only know one (the given complex root). The unknowns $$r_1, r_2$$ would need to be determined.\n- Step 2: The two-step approach is computationally efficient: build the **known** quadratic factor (from the conjugate pair) and divide the quartic to expose the **unknown** quadratic factor as the quotient. Solving the quotient gives the remaining roots.\n- Step 3: This is a \"divide and conquer\" approach: reduce a degree-4 problem to a degree-2 problem via polynomial division. It's also more error-resistant than guessing real roots.\n\nTakeaway: known factor + division = systematic, efficient. Don't try to guess all four roots at once.", "source": "Opus 4 ②", "_id": "opus_2_87", "judge_pick": true}, {"question": "Suppose for $$f(x) = x^3 - 3x + 1$$, you apply linear interpolation on $$[0, 1]$$. What is the $$x_1$$ estimate, and is the chord above or below the function? (3 steps)", "answer": "- Step 1: $$f(0) = 1, f(1) = -1$$. Sign change confirms root in $$(0, 1)$$. Closed-form: $$x_1 = 0 - \\tfrac{1 \\cdot 1}{-1 - 1} = -\\tfrac{1}{-2} = 0.5$$.\n- Step 2: True root from cubic: $$\\approx 0.347$$. So $$x_1 = 0.5$$ overshoots.\n- Step 3: Why? On $$[0, 1]$$, $$f''(x) = 6x \\geq 0$$, so $$f$$ is **concave up** (convex). The chord lies *above* the curve, so the chord crosses the $$x$$-axis at a larger $$x$$ than the curve does. Hence overshoot.\n\nTakeaway: chord above curve = LI overshoots; chord below = undershoots. Concavity determines.", "source": "Opus 4 ②", "_id": "opus_2_88", "judge_pick": true}, {"question": "Across this paper, when does it make sense to write a \"diff\" approach like \"$$f(k+1) - f(k)$$\" vs an \"engineered form\" like \"$$f(k+1) = c f(k) + d \\cdot g(k)$$\"? (3 steps)", "answer": "- Step 1: **Diff approach** is cleaner when the difference $$f(k+1) - f(k)$$ collapses to something obviously divisible by $$d$$ (the divisor). This is rare for divisibility induction with mixed terms (exponential + polynomial).\n- Step 2: **Engineered form** is cleaner when $$f$$ has multiple \"growth rates\" (e.g., $$4^k$$ exponential AND $$6k$$ linear). Multiplying $$f(k)$$ by some constant $$c$$ matches one growth rate, leaving a residual that you then express as $$d \\cdot g(k)$$.\n- Step 3: For $$f(n) = 4^n + 6n - 10$$: the $$4^n$$ grows by factor 4 each step. So $$f(k+1)$$ relates to $$4 f(k)$$ naturally — the engineered form $$f(k+1) = 4 f(k) - 18(k-2)$$ captures this. The \"diff\" $$f(k+1) - f(k)$$ leaves an $$4^k$$ term that needs a separate modular argument — messier.\n\nTakeaway: match the growth rate of $$f$$ when engineering. For exponentials, multiply by base.", "source": "Opus 4 ②", "_id": "opus_2_89", "judge_pick": false}, {"question": "Why is the parametric form on a parabola (or hyperbola) a \"smarter\" choice than Cartesian when working with tangents and chords? (3 steps)", "answer": "- Step 1: Cartesian form: $$y^2 = 4ax$$ implicitly relates $$x, y$$. To find the gradient, you must differentiate implicitly, getting $$\\tfrac{dy}{dx} = 2a/y$$ — depending on the (often-unknown) $$y$$-coordinate of a point.\n- Step 2: Parametric form $$(at^2, 2at)$$: a point is encoded by a single parameter $$t$$. The gradient at parameter $$t$$ is $$1/t$$ — clean, depends on $$t$$ alone.\n- Step 3: Chords and tangents become polynomials in $$t_1, t_2$$: linear in the parameters, easily solved. Vieta's-like relations like $$t_1 t_2 = -1$$ for focal chords drop out naturally.\n\nTakeaway: parametric trades Cartesian relations (implicit) for explicit single-variable expressions in $$t$$. Linear algebra in $$t$$ replaces calculus.", "source": "Opus 4 ②", "_id": "opus_2_90", "judge_pick": true}, {"question": "A polynomial of degree $$n$$ has at most $$n$$ roots in $$\\mathbb{C}$$. How does this relate to the conjugate-pair rule and the structure of FP1 quartics? (3 steps)", "answer": "- Step 1: **Fundamental theorem of algebra**: a degree-$$n$$ polynomial has *exactly* $$n$$ roots in $$\\mathbb{C}$$ (counted with multiplicity). For a quartic, that's 4 roots total.\n- Step 2: For real-coefficient quartics: the 4 roots come in two types — real or non-real complex (latter in conjugate pairs). Possible distributions:\n+ 4 real\n+ 2 real + 1 conjugate pair (i.e. 2 non-real)\n+ 2 conjugate pairs (i.e. 4 non-real)\n- Step 3: An FP1 question giving you ONE complex root tells you (a) at least 2 non-real roots (the conjugate pair), and (b) the other 2 are either both real or another complex pair. The polynomial division will reveal which.\n\nTakeaway: FTA + conjugate pairs constrain the structure; division reveals the rest.", "source": "Opus 4 ②", "_id": "opus_2_91", "judge_pick": true}, {"question": "Outline the complete approach to Q7 (sign change + bisection + NR + linear interp on $$f(x) = x^{3/2} + x - 3$$). (4 steps)", "answer": "- Step 1: **Sign change**: compute $$f(1), f(2)$$, show opposite signs, state continuity. Conclude root in $$(1, 2)$$.\n- Step 2: **Bisection ×2**: midpoint $$1.5$$, sign of $$f(1.5)$$, retain interval with sign change. Repeat with new midpoint.\n- Step 3: **Newton-Raphson**: differentiate $$f$$ symbolically to get $$f'(x) = \\tfrac{3}{2}\\sqrt x + 1$$. Plug $$x_0 = 1.375$$ into both $$f$$ and $$f'$$, compute $$x_1 = x_0 - f/f'$$. Round to 3 d.p. only at the end.\n- Step 4: **Linear interpolation**: use closed form $$x_1 = a - \\tfrac{f(a)(b-a)}{f(b)-f(a)}$$ with $$a = 1.25, b = 1.5$$ (the post-bisection interval). Compute $$f(a), f(b)$$ first, then plug in.\n\nTakeaway: each method has its formula; have it ready before plugging in numbers.", "source": "Opus 4 ②", "_id": "opus_2_92", "judge_pick": false}, {"question": "What is the \"key insight\" that makes the induction Q9 work — the trick that bridges $$f(k+1)$$ to $$f(k)$$? (3 steps)", "answer": "- Step 1: The key insight is recognizing that $$4^{k+1} = 4 \\cdot 4^k$$. So $$f(k+1)$$ contains $$4 \\cdot 4^k$$, which is **4 times** the exponential term in $$f(k)$$.\n- Step 2: This suggests trying $$f(k+1)$$ vs $$4 \\cdot f(k)$$: if $$4 f(k)$$ matches the exponential part, the residual $$f(k+1) - 4 f(k)$$ has only polynomial terms (no exponentials).\n- Step 3: Compute residual: $$f(k+1) - 4 f(k) = (4 \\cdot 4^k + 6k - 4) - (4 \\cdot 4^k + 24k - 40) = -18k + 36 = -18(k-2)$$. Cleanly divisible by 18. ✓\n\nTakeaway: pick the multiplier to kill the exponential term. Linear residue + 18 = win.", "source": "Opus 4 ②", "_id": "opus_2_93", "judge_pick": true}, {"question": "A student writes a normal equation as \"$$y - 3/t = -1/t^2 (x - 3t)$$\" and stops — they've made a sign error. Why? (3 steps)", "answer": "- Step 1: At the parametric point $$(3t, 3/t)$$ on $$xy = 9$$, the **tangent** gradient is $$-1/t^2$$ (computed from implicit differentiation).\n- Step 2: The **normal** is perpendicular to the tangent. Two perpendicular gradients multiply to $$-1$$, so normal gradient $$= -1/(\\text{tangent gradient}) = -1/(-1/t^2) = t^2$$.\n- Step 3: The student wrote the equation with the **tangent** gradient instead of the normal gradient. Use $$+t^2$$ in the line equation. Easy slip when rushed — always verify the gradient sign matches \"normal\" not \"tangent\".\n\nTakeaway: tangent gradient $$-1/t^2$$, normal gradient $$+t^2$$. Don't mix them up.", "source": "Opus 4 ②", "_id": "opus_2_94", "judge_pick": true}, {"question": "Why do you NOT solve the quadratic $$8x^2 - 45x - 18 = 0$$ from scratch when you already know one root is $$x = 6$$? (3 steps)", "answer": "- Step 1: It's faster (and less error-prone) to use Vieta's: roots-product $$= c/a = -18/8 = -9/4$$. So if one root is 6, the other is $$(-9/4)/6 = -3/8$$.\n- Step 2: Or: roots-sum $$= -b/a = 45/8$$. So the other root is $$45/8 - 6 = -3/8$$ — same answer.\n- Step 3: Solving from scratch via quadratic formula: $$x = \\tfrac{45 \\pm \\sqrt{45^2 + 4 \\cdot 8 \\cdot 18}}{16}$$ — more arithmetic, more chances to slip. Vieta's is one-line.\n\nTakeaway: when one root is \"free\", Vieta's gives the other in one division. Don't redo work.", "source": "Opus 4 ②", "_id": "opus_2_95", "judge_pick": true}, {"question": "When applying the conjugate-pair rule, why doesn't it give you EVERY root of the polynomial automatically? (3 steps)", "answer": "- Step 1: The rule only says: if $$z$$ is a non-real complex root, then $$\\bar z$$ is also a root. It does NOT say what other roots exist.\n- Step 2: A real-coefficient quartic has 4 roots total. Knowing one complex root and its conjugate gives 2; the other 2 might be real, or might be another conjugate pair.\n- Step 3: To find the remaining 2, you need to **divide** the polynomial by the quadratic factor $$(x-z)(x-\\bar z) = x^2 - 2\\text{Re}(z)x + |z|^2$$ to get the quotient, then solve the quotient.\n\nTakeaway: conjugate-pair gives you two roots free; division gives the rest.", "source": "Opus 4 ②", "_id": "opus_2_96", "judge_pick": true}, {"question": "Why is the choice $$z_3 = a + bi$$ (with $$a, b$$ unknown reals) crucial for parts (b)-(c) of Q6? (3 steps)", "answer": "- Step 1: With $$a, b$$ as unknown reals, $$w = z_2 z_3 / z_1$$ becomes a function of $$a, b$$ — symbolic, not yet numerical. You can compute its real and imaginary parts as expressions in $$a, b$$.\n- Step 2: Part (c) gives $$w$$ as a specific complex number ($$\\tfrac{4}{13} + \\tfrac{58}{13}i$$), letting you equate real/imag parts and solve a 2x2 system for $$a, b$$.\n- Step 3: This is a standard FP1 pattern: introduce unknown reals, compute a complex expression symbolically, then solve via \"real = real, imag = imag\" equating.\n\nTakeaway: $$a + bi$$ structure converts a complex equation into a 2-variable real linear system.", "source": "Opus 4 ②", "_id": "opus_2_97", "judge_pick": false}, {"question": "Two formulas — \"$$\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$\" and \"$$|z|^2 = z \\bar z$$\" — share a common conceptual root. What is it? (3 steps)", "answer": "- Step 1: Both are special cases of the identity $$(x + y)(x - y) = x^2 - y^2$$, or rather the bilinear product structure.\n- Step 2: For the first: $$(\\alpha+\\beta)^2 - 2\\alpha\\beta$$ comes from $$(\\alpha+\\beta)^2 = \\alpha^2 + 2\\alpha\\beta + \\beta^2$$, rearranged to isolate $$\\alpha^2 + \\beta^2$$. Same idea: square of sum minus twice product gives sum of squares.\n- Step 3: For the second: $$|z|^2 = (a+bi)(a-bi) = a^2 + b^2$$ — sum of squares from a \"conjugate product\". The conjugate $$\\bar z = a - bi$$ plays the role of \"$$y$$\" with appropriate signs.\n\nBoth rely on **expanding a product** and recognizing how cross-terms cancel or combine.\n\nTakeaway: symmetric squares come from squaring sums; conjugate products eliminate cross-terms.", "source": "Opus 4 ②", "_id": "opus_2_98", "judge_pick": false}, {"question": "What happens to the rectangular hyperbola normal $$t^3 x - ty = c(t^4 - 1)$$ at $$t = \\pm 1$$? What's the geometric meaning? (3 steps)", "answer": "- Step 1: At $$t = 1$$: $$x - y = c(0) = 0$$, i.e. $$y = x$$. This is the line through the origin with slope 1.\n- Step 2: At $$t = -1$$: $$-x + y = c(0) = 0$$, i.e. $$y = x$$ again.\n- Step 3: Geometrically: $$t = \\pm 1$$ corresponds to points $$(\\pm c, \\pm c)$$ on $$xy = c^2$$ — the points where the \"diagonal\" line $$y = x$$ meets the curve. At these points, the **normal** is the line $$y = x$$ itself! Interesting symmetry: this is the axis of the rectangular hyperbola, and points on this axis have normals along it.\n\nTakeaway: $$t = \\pm 1$$ is special — points where normal coincides with the symmetry axis of the curve.", "source": "Opus 4 ②", "_id": "opus_2_99", "judge_pick": true}, {"question": "What are the \"must-master\" topics for FP1 based on cross-paper recurrence (May 2024, Jan 2024, May 2023)? (5 steps)", "answer": "- Step 1: **Roots of polynomials** (transformed roots): appears in all three papers. Master the symmetric-identity factor tricks.\n- Step 2: **Coordinate geometry** (rectangular hyperbola and parabola): appeared as gap topics across multiple papers — high priority for self-study.\n- Step 3: **Standard summation results**: every paper has a $$\\sum$$ question requiring factor-early manipulation.\n- Step 4: **Numerical methods**: linear interpolation and Newton-Raphson appear regularly. Memorize the linear interp closed form.\n- Step 5: **Induction** (especially divisibility): appears every paper. Master the \"engineered form\" trick.\n\nTakeaway: 5 core areas. Coord geometry is highest-leverage for someone with gap topics.", "source": "Opus 4 ②", "_id": "opus_2_100", "judge_pick": false}, {"question": "State the verification approach for \"show the chord $$PQ$$ passes through the focus\" without using the $$t_1 t_2 = -1$$ shortcut. (3 steps)", "answer": "- Step 1: Compute the slope of $$PQ$$ directly: for $$P = (at_1^2, 2at_1)$$ and $$Q = (at_2^2, 2at_2)$$:\n$$m = \\frac{2at_1 - 2at_2}{at_1^2 - at_2^2} = \\frac{2(t_1 - t_2)}{(t_1 - t_2)(t_1 + t_2)} = \\frac{2}{t_1 + t_2}$$\n- Step 2: Write the line equation through $$P$$: $$y - 2at_1 = \\tfrac{2}{t_1 + t_2}(x - at_1^2)$$.\n- Step 3: Substitute $$x = a$$ (focus's $$x$$-coordinate) and check if $$y = 0$$. Doing the algebra: $$y = 2at_1 + \\tfrac{2}{t_1 + t_2}(a - at_1^2) = 2at_1 + \\tfrac{2a(1-t_1^2)}{t_1+t_2}$$. Combining: $$y = \\tfrac{2at_1(t_1 + t_2) + 2a(1 - t_1^2)}{t_1 + t_2} = \\tfrac{2a(t_1 t_2 + 1)}{t_1 + t_2}$$.\n\nSo $$y = 0 \\Leftrightarrow t_1 t_2 + 1 = 0 \\Leftrightarrow t_1 t_2 = -1$$, recovering the focal chord theorem.\n\nTakeaway: chord-through-focus verification = direct algebra; same answer as the theorem.", "source": "Opus 4 ②", "_id": "opus_2_101", "judge_pick": false}, {"question": "What is the structural sanity check on the answer \"$$R = (-2, 2p - 2/p)$$\" for the tangent intersection at the ends of a focal chord on $$y^2 = 8x$$? (3 steps)", "answer": "- Step 1: $$x$$-coordinate is $$-2 = -a$$ (since $$a = 2$$ for $$y^2 = 8x$$). This matches the directrix-as-polar theorem: tangents at ends of any focal chord meet on the directrix $$x = -a$$. ✓\n- Step 2: $$y$$-coordinate $$2p - 2/p = 2(p - 1/p)$$. As $$p$$ varies (different focal chords), $$y$$ varies — every point on the directrix is the meeting point of tangents at SOME focal chord.\n- Step 3: At $$p = 1$$: $$y = 0$$, the chord is the latus rectum (vertical chord through focus), tangent intersection at $$(-a, 0)$$ — on the axis. At $$p = -1$$: same as $$p = 1$$ (other endpoint of latus rectum, same chord). All consistent.\n\nTakeaway: $$x = -a$$ is forced; $$y$$ encodes which focal chord. Theorem-consistent.", "source": "Opus 4 ②", "_id": "opus_2_102", "judge_pick": true}, {"question": "The induction sub-claim \"$$4^k + 2$$ is divisible by 6\" is needed in the difference approach. Prove it in two ways. (4 steps)", "answer": "- Step 1: **Method 1 (direct mod 6)**: $$4^1 = 4 \\equiv 4 \\pmod 6$$. Inductively, $$4^{k+1} = 4 \\cdot 4^k \\equiv 4 \\cdot 4 = 16 \\equiv 4 \\pmod 6$$. So $$4^k \\equiv 4 \\pmod 6$$ for all $$k \\geq 1$$. Hence $$4^k + 2 \\equiv 6 \\equiv 0 \\pmod 6$$. ✓\n- Step 2: **Method 2 (factor)**: $$4^k + 2 = 2(2^{2k-1} + 1)$$. Need to show $$2^{2k-1} + 1$$ is divisible by 3.\n- Step 3: $$2 \\equiv -1 \\pmod 3$$, so $$2^{2k-1} \\equiv (-1)^{2k-1} = -1 \\pmod 3$$. Hence $$2^{2k-1} + 1 \\equiv 0 \\pmod 3$$. ✓\n- Step 4: Combining: $$4^k + 2 = 2 \\cdot (\\text{multiple of 3}) = $$ multiple of 6.\n\nTakeaway: both modular arithmetic and direct factoring confirm $$6 \\mid 4^k + 2$$. Useful sub-claim for the difference-form induction.", "source": "Opus 4 ②", "_id": "opus_2_103", "judge_pick": false}, {"question": "Why is there essentially \"no trick\" to part (a) of Q5 — computing $$(\\alpha^2+1)(\\beta^2+1)$$? It's just two identities. (3 steps)", "answer": "- Step 1: Step 1: expand the product. $$(\\alpha^2+1)(\\beta^2+1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1$$.\n- Step 2: Step 2: replace each symmetric term with its $$s, p$$ form:\n+ $$\\alpha^2 \\beta^2 = (\\alpha\\beta)^2 = p^2$$\n+ $$\\alpha^2 + \\beta^2 = s^2 - 2p$$\n- Step 3: Step 3: substitute. Result: $$p^2 + s^2 - 2p + 1$$. Plug numbers from Vieta's.\n\nThe structure is so mechanical that students should recognize this kind of expression and apply it on autopilot. The \"trick\" only shows up in part (b) where the expression involves $$\\alpha\\beta^2 + \\beta\\alpha^2$$.\n\nTakeaway: part (a)-style symmetric expansions are mechanical; part (b)-style transformed roots need genuine factoring insight.", "source": "Opus 4 ②", "_id": "opus_2_104", "judge_pick": false}, {"question": "When the FP1 paper says \"show that the chord $$PQ$$ passes through the focus\", what is the most elegant proof using the parametric form? (3 steps)", "answer": "- Step 1: Identify the parameters $$t_1, t_2$$ for $$P$$ and $$Q$$ from the parametric form $$(at^2, 2at)$$.\n- Step 2: Verify $$t_1 t_2 = -1$$ (the focal chord criterion). For Q8: $$t_1 = p, t_2 = -1/p$$, so $$t_1 t_2 = p \\cdot (-1/p) = -1$$ ✓.\n- Step 3: State: \"Since $$t_1 t_2 = -1$$, by the focal chord theorem the chord $$PQ$$ passes through the focus $$(a, 0)$$.\" Done — much faster than computing slope and substituting.\n\nIf the focal chord theorem isn't accepted as given (some examiners want full proof), do the slope/substitution method as a backup.\n\nTakeaway: $$t_1 t_2 = -1$$ + focal chord theorem = one-line proof. Backup with full algebra if needed.", "source": "Opus 4 ②", "_id": "opus_2_105", "judge_pick": false}, {"question": "Conceptually, why does the polar of the focus turn out to be the directrix for a parabola? (3 steps)", "answer": "- Step 1: The \"polar\" of a point $$P$$ with respect to a conic is the locus of points $$Q$$ such that $$P, Q$$ are \"conjugate\" — meaning the chord through $$P$$ has its two intersections with the conic harmonically separating $$P$$ and $$Q$$.\n- Step 2: For the parabola $$y^2 = 4ax$$, computing this for $$P = (a, 0)$$ (the focus): one can show $$Q$$ must lie on the line $$x = -a$$ (the directrix).\n- Step 3: An equivalent formulation: tangents from a point $$Q$$ on the polar intersect the conic in two points whose chord passes through the focus — this is exactly the \"tangents at endpoints of focal chord meet on directrix\" observation, just phrased the other way.\n\nTakeaway: directrix-as-polar is geometrically deep — emerges from projective geometry of conics. For FP1 just memorize the result.", "source": "Opus 4 ②", "_id": "opus_2_106", "judge_pick": false}, {"question": "Build a $$2 \\times 2$$ matrix $$M$$ that doubles areas while reversing orientation. Confirm by computing $$\\det M$$. (3 steps)", "answer": "- Step 1: Goal: $$\\det M = -2$$. Many choices work. Simplest: a reflection multiplied by a scaling factor.\n- Step 2: Try $$M = \\begin{pmatrix} 2 & 0 \\\\ 0 & -1 \\end{pmatrix}$$: this scales $$x$$ by 2 and reflects $$y$$. $$\\det M = 2 \\cdot (-1) - 0 = -2$$. ✓ Areas double; orientation reversed.\n- Step 3: Alternative: $$M = \\begin{pmatrix} 1 & 1 \\\\ 1 & -1 \\end{pmatrix}$$ has $$\\det = -1 - 1 = -2$$. ✓ Different transformation, same area-and-orientation effect.\n\nTakeaway: $$\\det = -2$$ is the only constraint. Many matrices satisfy it.", "source": "Opus 4 ②", "_id": "opus_2_107", "judge_pick": true}, {"question": "What is the practical FP1 strategy for handling a question that asks you to \"give your answer in the form $$ax^2 + bx + c = 0$$ with $$a, b, c$$ integers\"? (3 steps)", "answer": "- Step 1: First, build the quadratic in any rational form, e.g. $$x^2 - \\tfrac{3}{5}x + \\tfrac{3}{40} = 0$$ from monic-form $$x^2 - Sx + P$$.\n- Step 2: Find the LCM of all denominators (here $$\\text{lcm}(5, 40) = 40$$). Multiply through by this LCM: $$40x^2 - 24x + 3 = 0$$.\n- Step 3: Verify that GCD of all coefficients is 1 (i.e. fully reduced). If GCD > 1, divide through. Here $$\\gcd(40, 24, 3) = 1$$ ✓.\n\nTakeaway: clear denominators (multiply by LCM), then reduce common factors. Result has integer coefficients in lowest form.", "source": "Opus 4 ②", "_id": "opus_2_108", "judge_pick": true}, {"question": "What are the three \"always-do\" reflexes when an FP1 question gives you a quadratic with parametric/symbolic roots $$\\alpha, \\beta$$? (3 steps)", "answer": "- Step 1: **Immediately write Vieta's**: $$s = \\alpha + \\beta = -b/a$$, $$p = \\alpha\\beta = c/a$$. Don't compute the actual roots unless asked — they're rarely needed.\n- Step 2: **Convert the target expression to symmetric form** using the identity table: $$\\alpha^2 + \\beta^2 = s^2 - 2p$$, $$\\alpha^3 + \\beta^3 = s^3 - 3sp$$, $$\\tfrac{1}{\\alpha} + \\tfrac{1}{\\beta} = s/p$$, $$(\\alpha-\\beta)^2 = s^2 - 4p$$, etc.\n- Step 3: **Substitute the numerical $$s, p$$** at the end. If the answer is messy, double-check it's symmetric in $$\\alpha, \\beta$$ (the question almost certainly gave a symmetric expression).\n\nTakeaway: Vieta's first → symmetric identity → numerical substitution. Three steps, every time.", "source": "Opus 4 ②", "_id": "opus_2_109", "judge_pick": true}, {"question": "Suppose for $$f(x) = x^{3/2} + x - 3$$ on $$[1, 2]$$, you've done two bisections to localize the root in $$[1.25, 1.5]$$. What is the conceptual reason $$x_0 = 1.375$$ (the new midpoint) is a sensible NR starting point? (3 steps)", "answer": "- Step 1: After two bisections, the interval has shrunk to width $$0.25$$. The root is somewhere in this interval; the midpoint $$1.375$$ is the best single-point estimate.\n- Step 2: At $$x = 1.375$$, compute $$f'(1.375) = \\tfrac{3}{2}\\sqrt{1.375} + 1 \\approx 2.76 \\neq 0$$ (well away from zero). NR is well-defined and stable here.\n- Step 3: NR's quadratic convergence kicks in once $$|x_0 - \\alpha|$$ is small. With the bisection-localized $$x_0$$ already within $$0.125$$ of the root, NR will rapidly refine. One step gives 3-d.p. accuracy.\n\nTakeaway: bisection halves error → a \"good enough\" $$x_0$$; NR squares error → polishes to high precision.", "source": "Opus 4 ②", "_id": "opus_2_110", "judge_pick": false}, {"question": "What is the cleanest way to compute $$z_2 z_3 = (2 + 3i)(a + bi)$$ symbolically without expansion errors? (3 steps)", "answer": "- Step 1: Use the formula $$(a_1 + b_1 i)(a_2 + b_2 i) = (a_1 a_2 - b_1 b_2) + (a_1 b_2 + a_2 b_1)i$$.\n- Step 2: Apply to $$(2)(a) + (2)(bi) + (3i)(a) + (3i)(bi)$$:\n+ Real: $$2a + 3i \\cdot bi = 2a - 3b$$ (since $$i^2 = -1$$)\n+ Imaginary: $$2bi + 3ai = (3a + 2b)i$$\n- Step 3: Combine: $$z_2 z_3 = (2a - 3b) + (3a + 2b)i$$.\n\nSanity check at $$a = 1, b = 0$$: $$z_3 = 1$$, so $$z_2 z_3 = z_2 = 2 + 3i$$. Formula gives $$(2 - 0) + (3 + 0)i = 2 + 3i$$ ✓.\n\nTakeaway: standard complex multiplication formula; sanity-check with simple values.", "source": "Opus 4 ②", "_id": "opus_2_111", "judge_pick": false}, {"question": "How does the Edexcel FP1 spec handle \"show that $$f(n)$$ is divisible by 18 for $$n \\geq 2$$\" when $$f(1) = 0$$? Should you start from $$n = 1$$ or $$n = 2$$? (3 steps)", "answer": "- Step 1: The question explicitly says $$n \\geq 2$$, so the **base case must be at $$n = 2$$**: $$f(2) = 16 + 12 - 10 = 18 = 18 \\times 1$$ ✓.\n- Step 2: Even though $$f(1) = 0$$ is technically divisible by 18, the spec requires you to follow the question's stated domain. Starting from $$n = 1$$ might lose marks for not respecting the domain.\n- Step 3: When the question says \"for $$n \\in \\mathbb{Z}^+$$\" (with no minimum), default to $$n = 1$$. When it says \"$$n \\geq n_0$$\", use $$n_0$$ as the base.\n\nTakeaway: respect the stated domain. Base case = first $$n$$ in the question's range.", "source": "Opus 4 ②", "_id": "opus_2_112", "judge_pick": true}, {"question": "Outline the visual intuition for the linear interpolation formula $$x_1 = a - \\tfrac{f(a)(b-a)}{f(b)-f(a)}$$ — why does the $$(b-a)$$ scaling appear? (3 steps)", "answer": "- Step 1: Draw $$y = f(x)$$ on $$[a, b]$$ with $$f(a) < 0 < f(b)$$. Draw the chord from $$(a, f(a))$$ to $$(b, f(b))$$. Where does the chord cross $$y = 0$$?\n- Step 2: By similar triangles: from $$(a, f(a))$$ to the chord's $$x$$-axis crossing $$x_1$$ is some distance, and the chord has slope $$\\tfrac{f(b) - f(a)}{b - a}$$.\n- Step 3: Setting up the proportion: rise $$|f(a)|$$ corresponds to run $$x_1 - a$$, and total rise $$f(b) - f(a)$$ corresponds to total run $$b - a$$. So:\n$$\\frac{x_1 - a}{b - a} = \\frac{0 - f(a)}{f(b) - f(a)} = \\frac{-f(a)}{f(b) - f(a)}$$\nSolving: $$x_1 = a - \\tfrac{f(a)(b-a)}{f(b) - f(a)}$$. The $$(b-a)$$ is the *horizontal scale* — it converts the rise-ratio into a run-distance.\n\nTakeaway: linear interpolation = similar triangles. $$(b-a)$$ converts a slope ratio into an actual horizontal step.", "source": "Opus 4 ②", "_id": "opus_2_113", "judge_pick": false}, {"question": "Why does $$\\arctan(58/4) = \\arctan(14.5)$$ evaluate to ~1.502 rad (close to but not quite $$\\pi/2$$)? Conceptual reasoning. (3 steps)", "answer": "- Step 1: $$\\arctan x$$ approaches $$\\pi/2 \\approx 1.5708$$ as $$x \\to \\infty$$. So large but finite $$x$$ gives a value just below $$\\pi/2$$.\n- Step 2: For $$x = 14.5$$: this is about 1/100 below $$\\pi/2$$ (since $$\\arctan x \\approx \\pi/2 - 1/x$$ for large $$x$$). So $$\\arctan(14.5) \\approx 1.5708 - 1/14.5 \\approx 1.5708 - 0.069 = 1.502$$ ✓.\n- Step 3: Geometrically: a complex number with imaginary part 14.5× larger than real part is \"almost\" along the positive imaginary axis, but slightly tilted. $$\\arg \\approx \\pi/2$$ but not quite.\n\nTakeaway: $$\\arctan(\\text{large}) \\to \\pi/2$$ from below. Useful for estimation/sanity-checks.", "source": "Opus 4 ②", "_id": "opus_2_114", "judge_pick": false}, {"question": "What is the efficient process for polynomial-dividing $$2x^4 - 8x^3 + 29x^2 - 12x + 39$$ by $$x^2 - 4x + 13$$ to find the quotient? (4 steps)", "answer": "- Step 1: Divide leading terms: $$\\tfrac{2x^4}{x^2} = 2x^2$$. This is the first term of the quotient.\n- Step 2: Multiply divisor by $$2x^2$$: $$2x^2 \\cdot (x^2 - 4x + 13) = 2x^4 - 8x^3 + 26x^2$$. Subtract from dividend:\n$$(2x^4 - 8x^3 + 29x^2) - (2x^4 - 8x^3 + 26x^2) = 3x^2$$\nBring down $$-12x + 39$$: now have $$3x^2 - 12x + 39$$.\n- Step 3: Divide: $$\\tfrac{3x^2}{x^2} = 3$$. Multiply divisor by 3: $$3(x^2 - 4x + 13) = 3x^2 - 12x + 39$$. Subtract: $$0$$. Remainder is 0. ✓\n- Step 4: Quotient is $$2x^2 + 3$$. Solving $$2x^2 + 3 = 0$$ gives $$x^2 = -3/2$$, so $$x = \\pm i\\sqrt{3/2} = \\pm \\tfrac{i\\sqrt{6}}{2}$$.\n\nTakeaway: step-by-step long division: divide, multiply, subtract, repeat. Bracket aggressively to avoid sign errors.", "source": "Opus 4 ②", "_id": "opus_2_115", "judge_pick": false}, {"question": "When solving $$2x^2 + 3 = 0$$ for FP1, what is the cleanest way to express the roots in surd form? (3 steps)", "answer": "- Step 1: Rearrange: $$x^2 = -\\tfrac{3}{2}$$. Take square roots: $$x = \\pm \\sqrt{-3/2} = \\pm i\\sqrt{3/2}$$.\n- Step 2: Rationalize: $$\\sqrt{3/2} = \\sqrt{3}/\\sqrt{2} = \\sqrt{3} \\cdot \\sqrt{2}/2 = \\sqrt{6}/2$$.\n- Step 3: Final form: $$x = \\pm \\tfrac{i\\sqrt 6}{2}$$. Cleaner than $$\\pm i\\sqrt{3/2}$$ for marking purposes.\n\nTakeaway: rationalize denominators inside square roots; FP1 expects surds in standard form.", "source": "Opus 4 ②", "_id": "opus_2_116", "judge_pick": false}, {"question": "A student attempts Q3(b) by substituting the normal $$2y - 8x = -45$$ directly into $$xy = 9$$ but solves a cubic. What's the error? (3 steps)", "answer": "- Step 1: Re-arranging $$2y - 8x = -45$$ to $$y = 4x - 45/2$$, then substituting into $$xy = 9$$ gives $$x(4x - 45/2) = 9$$.\n- Step 2: This is a **quadratic** in $$x$$: $$4x^2 - \\tfrac{45}{2}x = 9$$, i.e. $$8x^2 - 45x = 18$$, i.e. $$8x^2 - 45x - 18 = 0$$. Not a cubic.\n- Step 3: If the student got a cubic, they likely cubed something or substituted incorrectly. Reset and substitute carefully: $$x \\cdot y = 9$$ — only one $$x$$ and one $$y$$, never a third power.\n\nTakeaway: $$xy = 9$$ is a hyperbola; substituting a line gives a quadratic, never a cubic. If you got cubic, restart.", "source": "Opus 4 ②", "_id": "opus_2_117", "judge_pick": true}, {"question": "Is the formula booklet status of \"Newton-Raphson\" always identical across exam boards and specifications? (3 steps)", "answer": "- Step 1: For Edexcel International A-Level FP1: Newton-Raphson IS in the formula booklet.\n- Step 2: For UK A-Level Further Mathematics (different spec): Newton-Raphson formulas may not always be in the formula sheet. Always check your specific paper's booklet.\n- Step 3: The lesson: don't assume cross-paper. Each session, read the formula booklet at start of exam to confirm what's there. Memorize either way — having the formula in your head is faster than looking up.\n\nTakeaway: booklet contents vary by spec. Always memorize NR even if it's \"supposed\" to be in the booklet.", "source": "Opus 4 ②", "_id": "opus_2_118", "judge_pick": false}, {"question": "A student claims \"if $$\\det A = 0$$, the area scale factor is also 0, but the transformation might still be invertible\". Why is this wrong? (3 steps)", "answer": "- Step 1: $$\\det A = 0 \\Leftrightarrow A$$ is **singular** (non-invertible). This is a key matrix theorem.\n- Step 2: Geometrically: $$\\det A = 0$$ means the columns of $$A$$ are linearly dependent — they don't span $$\\mathbb{R}^2$$. So $$A$$ collapses 2D to a line (or point), losing dimension. Areas in the image are 0 because the image isn't 2D.\n- Step 3: Inverting would require recovering the original 2D structure, but information has been lost. So no inverse exists. The statement \"$$\\det = 0$$ but invertible\" is contradictory.\n\nTakeaway: $$\\det = 0 \\Leftrightarrow$$ non-invertible $$\\Leftrightarrow$$ image is lower-dimensional. All equivalent.", "source": "Opus 4 ②", "_id": "opus_2_119", "judge_pick": true}, {"question": "What is the meaning of the parameter $$t$$ on the parabola $$y^2 = 4ax$$ — how does it relate to the geometry of the point? (3 steps)", "answer": "- Step 1: At parameter $$t$$, the point is $$(at^2, 2at)$$. The $$y$$-coordinate is $$2at$$, so $$t$$ is \"half the $$y$$-coordinate divided by $$a$$\". For $$a = 1$$, $$t = y/2$$.\n- Step 2: The tangent at parameter $$t$$ has gradient $$1/t$$. So $$t$$ is the *reciprocal* of the tangent slope. Equivalently, $$t = $$ cotangent of the angle the tangent makes with the $$x$$-axis.\n- Step 3: As $$t \\to 0^+$$, point approaches the vertex from above; as $$t \\to \\infty$$, point goes to infinity along the parabola. $$t = 1$$ corresponds to $$(a, 2a)$$ where the tangent has slope 1 (45°).\n\nTakeaway: $$t$$ encodes both height (via $$y = 2at$$) and tangent slope (via $$1/t$$).", "source": "Opus 4 ②", "_id": "opus_2_120", "judge_pick": true}, {"question": "What's the connection between the symmetric identity $$\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$ and the algebraic identity $$(a+b)^2 = a^2 + 2ab + b^2$$? (3 steps)", "answer": "- Step 1: They're literally the same identity, rearranged. From $$(\\alpha+\\beta)^2 = \\alpha^2 + 2\\alpha\\beta + \\beta^2$$, subtract $$2\\alpha\\beta$$ from both sides to get $$\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$.\n- Step 2: The \"trick\" of FP1 is recognizing **when** to apply this rearrangement: whenever you have a symmetric expression in $$\\alpha, \\beta$$, but want to eliminate the individual variables and express in $$s, p$$.\n- Step 3: All FP1 symmetric identities ultimately come from the same source — the binomial theorem applied to $$(\\alpha+\\beta)^n$$, with cross-terms gathered. Higher-power identities like $$\\alpha^3 + \\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$$ follow the same logic.\n\nTakeaway: the identities aren't \"magic\" — they're the binomial theorem rearranged for symmetric purposes.", "source": "Opus 4 ②", "_id": "opus_2_121", "judge_pick": false}, {"question": "When you finish a complex-number calculation with $$w = \\tfrac{4}{13} + \\tfrac{58}{13}i$$, why is dividing $$\\tfrac{58}{13}$$ by $$\\tfrac{4}{13}$$ to get $$\\arctan$$ a *clean* operation? (3 steps)", "answer": "- Step 1: $$\\arg w = \\arctan(\\text{Im}/\\text{Re})$$ in the first quadrant, where $$\\text{Re} = 4/13$$ and $$\\text{Im} = 58/13$$.\n- Step 2: $$\\tfrac{58/13}{4/13} = \\tfrac{58}{4} = 14.5$$. The denominators 13 cancel exactly, leaving a clean ratio of integers.\n- Step 3: This is no accident: dividing $$w = u/z$$ scales both real and imaginary parts of $$u\\bar z$$ by the same $$1/|z|^2$$. So the ratio Im/Re is preserved through division. Hence $$\\arg w = \\arg(z_2 z_3) - \\arg z_1$$, computable from $$z_2 z_3$$ alone.\n\nTakeaway: real-imaginary ratio is preserved under real scaling. Denominators cancel cleanly in arg computations.", "source": "Opus 4 ②", "_id": "opus_2_122", "judge_pick": false}, {"question": "What's the strategic advantage of solving the matrix equation $$BC = D$$ using the inverse method vs row-reducing $$[B \\mid D]$$? (3 steps)", "answer": "- Step 1: For FP1, the inverse method is more direct: $$C = B^{-1}D$$. Compute $$B^{-1}$$ once via the 2×2 formula, then multiply.\n- Step 2: Row reduction $$[B \\mid D] \\to [I \\mid C]$$ achieves the same result but requires more steps and is more error-prone for a $$2 \\times 2$$ system.\n- Step 3: The inverse method shines especially when $$D$$ has multiple columns (here $$D$$ is $$2 \\times 3$$): you compute $$B^{-1}$$ once and multiply by all 3 columns of $$D$$ simultaneously. Row reduction would require re-tracking all three columns through the elimination.\n\nTakeaway: for $$2 \\times 2$$ inverses, the closed-form formula is cleaner than row reduction.", "source": "Opus 4 ②", "_id": "opus_2_123", "judge_pick": false}, {"question": "What is the strategic order to attempt Q7's parts (a)-(d) on the FP1 paper, and why? (4 steps)", "answer": "- Step 1: **(a) sign change**: easy 2 marks. Do first to confirm understanding of the function, build confidence.\n- Step 2: **(b) bisection ×2**: builds on (a) — uses $$f(1.5)$$ and $$f(1.25)$$ which you've now computed. 3 marks.\n- Step 3: **(c) Newton-Raphson**: requires $$f'$$, which is independent of (b). Can be done in parallel. 3 marks.\n- Step 4: **(d) linear interpolation**: depends on (b)'s interval $$[1.25, 1.5]$$. Use the two function values from (b). 3 marks.\n\nOrder: (a), (b), (c), (d) — natural sequence with parts building on earlier function values. Don't skip parts; they're independent enough to recover from a slip.\n\nTakeaway: numerical methods questions are usually in dependency order; do them sequentially.", "source": "Opus 4 ②", "_id": "opus_2_124", "judge_pick": false}, {"question": "Why does the formula $$\\alpha^3 + \\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$$ have the specific form $$s^3 - 3ps$$? (3 steps)", "answer": "- Step 1: Expand $$(\\alpha + \\beta)^3 = \\alpha^3 + 3\\alpha^2\\beta + 3\\alpha\\beta^2 + \\beta^3$$.\n- Step 2: Group: $$= (\\alpha^3 + \\beta^3) + 3\\alpha\\beta(\\alpha + \\beta)$$. The cross-terms factor out as $$3\\alpha\\beta(\\alpha+\\beta)$$ because $$3\\alpha^2\\beta + 3\\alpha\\beta^2 = 3\\alpha\\beta(\\alpha + \\beta)$$.\n- Step 3: Rearrange: $$\\alpha^3 + \\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta) = s^3 - 3ps$$.\n\nSame logic as $$\\alpha^2 + \\beta^2$$: cube the sum, subtract the cross-terms. Pattern: $$\\alpha^n + \\beta^n$$ can always be expressed in $$s, p$$ via Newton's identities.\n\nTakeaway: $$s^3 - 3ps$$ comes from binomial expansion + cross-term factoring. Same recipe for any $$\\alpha^n + \\beta^n$$.", "source": "Opus 4 ②", "_id": "opus_2_125", "judge_pick": true}, {"question": "An exam question says \"a quartic has roots $$2 + 3i$$ and $$2 - 3i$$ and two real roots whose sum is 4\". Without polynomial division, how do you find the two real roots? (4 steps)", "answer": "- Step 1: The quadratic factor from the conjugate pair is $$z^2 - 4z + 13$$. The full polynomial is this times another real quadratic, say $$z^2 + bz + c$$.\n- Step 2: Let the real roots be $$r_1, r_2$$. By Vieta's on the second quadratic: $$r_1 + r_2 = -b$$, $$r_1 r_2 = c$$.\n- Step 3: Given $$r_1 + r_2 = 4$$, so $$b = -4$$, i.e. the real-quadratic factor is $$z^2 - 4z + c$$ for some $$c$$.\n- Step 4: To find $$c$$ you'd need more info (e.g., the leading coefficient of the quartic and one more constraint). Without it, the real roots are constrained to sum to 4 but aren't uniquely determined. In Q2, the leading coefficient + constant term let polynomial division pin down both factors.\n\nTakeaway: Vieta's on the *factor* gives constraints; you need full polynomial info to pin down all roots.", "source": "Opus 4 ②", "_id": "opus_2_126", "judge_pick": false}, {"question": "Describe the geometric structure of the rectangular hyperbola $$xy = 9$$ — branches, asymptotes, axes of symmetry. (4 steps)", "answer": "- Step 1: **Two branches**: one in the first quadrant (where $$x, y > 0$$) and one in the third quadrant (where $$x, y < 0$$). The second and fourth quadrants are excluded because $$xy > 0$$ requires same-sign coordinates.\n- Step 2: **Asymptotes**: as $$x \\to \\infty$$, $$y \\to 0$$ (the $$x$$-axis); as $$x \\to 0$$, $$y \\to \\pm\\infty$$ (the $$y$$-axis). So the axes are the asymptotes — perpendicular, hence \"rectangular\".\n- Step 3: **Axes of symmetry**: the line $$y = x$$ (reflects Q1 branch to itself; reflects Q3 branch to itself) and the line $$y = -x$$ (swaps Q1 and Q3 branches).\n- Step 4: **Vertices** (closest points to origin): on $$y = x$$ at $$(3, 3)$$ in Q1 and $$(-3, -3)$$ in Q3 (where $$xy = 9 = c^2$$).\n\nTakeaway: $$xy = c^2$$ has two perpendicular asymptotes, two perpendicular symmetry axes (45° to asymptotes), and two vertices on $$y = \\pm x$$.", "source": "Opus 4 ②", "_id": "opus_2_127", "judge_pick": false}, {"question": "Why is the answer to Q5(b) \"$$40x^2 - 24x + 3 = 0$$\" guaranteed to have integer coefficients given the question setup? (3 steps)", "answer": "- Step 1: The new sum and product $$S, P$$ are rational (since $$\\alpha, \\beta$$ are roots of a rational-coefficient quadratic, all symmetric expressions are rational). Specifically here $$S = 3/5, P = 3/40$$.\n- Step 2: The quadratic $$x^2 - Sx + P = 0$$ has rational coefficients. Multiplying through by the LCM of the denominators (here $$40$$) clears fractions to integers.\n- Step 3: Whether integers can always be achieved depends on the specific question — it's not guaranteed that the coefficients reduce to small integers, but FP1 questions are designed so they do (otherwise the question would be unfair).\n\nTakeaway: rationals × LCM = integers. FP1 is designed to give clean integer answers.", "source": "Opus 4 ②", "_id": "opus_2_128", "judge_pick": false}, {"question": "What is the dimensional sanity check for \"compute $$|z_1 + z_2|$$ when $$z_1 = 3+2i, z_2 = 2+3i$$\"? (3 steps)", "answer": "- Step 1: $$|z_1| = \\sqrt{13} \\approx 3.6$$ and $$|z_2| = \\sqrt{13} \\approx 3.6$$. Triangle inequality: $$|z_1 + z_2| \\leq |z_1| + |z_2| \\approx 7.2$$, with equality when $$z_1, z_2$$ are parallel.\n- Step 2: $$z_1, z_2$$ are NOT parallel (they have different arguments). So $$|z_1 + z_2| < 7.2$$, strictly.\n- Step 3: Computed answer: $$5\\sqrt 2 \\approx 7.07$$. This is slightly less than $$7.2$$ ✓ — sensible because $$z_1, z_2$$ are nearly parallel ($$3:2$$ vs $$2:3$$ is close to symmetric, both at ~33° from x-axis, so they're at small angle).\n\nTakeaway: $$|z_1 + z_2| \\leq |z_1| + |z_2|$$ — triangle inequality. Use as a sanity check.", "source": "Opus 4 ②", "_id": "opus_2_129", "judge_pick": false}], "count": 130}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 17730, "out_tokens": 8577, "reasoning_chars": 4289, "cost_eur": 0.0447, "elapsed_s": 220, "content_chars": 21905}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 13488, "out_tokens": ": 3148, "cost_eur": 0.0066, "elapsed_s": 57, "content_chars": 6540}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.75, "in_tokens": 18090, "out_tokens": 4296, "reasoning_chars": 3445, "cost_eur": 0.0081, "elapsed_s": 71, "content_chars": 8481}, "qwen_3": {"run": 3, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 18090, "out_tokens": 3765, "reasoning_chars": 3791, "cost_eur": 0.0075, "elapsed_s": 62, "content_chars": 7707}, "qwen_4": {"run": 4, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.85, "in_tokens": 18090, "out_tokens": 3402, "reasoning_chars": 4751, "cost_eur": 0.0071, "elapsed_s": 58, "content_chars": 6387}}};
const SK='fp1_may2023_pp';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
