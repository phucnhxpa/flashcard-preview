hat is a common mis-reading that leads to a completely different result? (2 steps)", "answer": "- Step 1: The correct expansion is $$r(r+2)^2 = r(r^2 + 4r + 4) = r^3 + 4r^2 + 4r$$. You must distribute the outer square first: $(r+2)^2 = r^2 + 4r + 4$, then multiply by $r$.\n- Step 2: A common mis-reading is confusing $r(r+2)^2$ with $r^2(r+2) = r^3 + 2r^2$. These are entirely different expressions — the former has three terms, the latter only two. On exam day, always write out the expansion in full before summing. A quick sanity check: for $r=1$, $r(r+2)^2 = 1 \\cdot 9 = 9$, but $r^2(r+2) = 1 \\cdot 3 = 3$.\n\nThe mis-reading error propagates through every subsequent step, producing wrong coefficients $a, b, c$.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "What are the three standard summation results for $\\sum_{r=1}^n r$, $\\sum_{r=1}^n r^2$, and $\\sum_{r=1}^n r^3$, and which one is NOT in the formula booklet? (2 steps)", "answer": "- Step 1: The three results are:\n+ $$\\sum_{r=1}^n r = \\tfrac{1}{2}n(n+1)$$ — **NOT in the formula booklet, must memorize**\n+ $$\\sum_{r=1}^n r^2 = \\tfrac{1}{6}n(n+1)(2n+1)$$ — in booklet\n+ $$\\sum_{r=1}^n r^3 = \\tfrac{1}{4}n^2(n+1)^2$$ — in booklet\n- Step 2: The key observation is that all three share a common factor structure of $n(n+1)$. This is why the \"factor-early\" trick works: you can always pull out at least $\\tfrac{1}{12}n(n+1)$ as a common factor because the denominators 2, 6, 4 all divide into 12.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "After substituting the three standard results into $\\sum_{r=1}^n (r^3 + 4r^2 + 4r)$, why do you bring everything to a common denominator of 12 before factoring? (3 steps)", "answer": "- Step 1: Substituting gives $$\\tfrac{1}{4}n^2(n+1)^2 + 4 \\cdot \\tfrac{1}{6}n(n+1)(2n+1) + 4 \\cdot \\tfrac{1}{2}n(n+1)$$. The denominators are 4, 6, and 2 — they don't share a common denominator, so you can't factor cleanly yet.\n- Step 2: Converting to denominator 12: $$\\tfrac{3}{12}n^2(n+1)^2 + \\tfrac{8}{12}n(n+1)(2n+1) + \\tfrac{24}{12}n(n+1)$$. Now every term has $\\tfrac{1}{12}n(n+1)$ as a factor.\n- Step 3: Factoring out $\\tfrac{1}{12}n(n+1)$ leaves a clean bracket: $$3n(n+1) + 8(2n+1) + 24$$. This is the \"factor-early\" trick — always pull the common factor out FIRST so the remaining bracket is a simple polynomial you can expand and collect, rather than wrestling with fractions inside a bracket.\n\nNever expand everything into a single giant polynomial and then try to factor — that's error-prone and slow.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "Verify the final result of $\\sum_{r=1}^n r(r+2)^2$ using $n=1$ as a sanity check. How does this catch the mis-reading error? (2 steps)", "answer": "- Step 1: For $n=1$, the LHS is simply $1 \\cdot (1+2)^2 = 9$. The RHS with the correct coefficients $a=3, b=19, c=32$ gives $$\\tfrac{1}{12} \\cdot 1 \\cdot 2 \\cdot (3 + 19 + 32) = \\tfrac{54}{6} = 9$$. ✓\n- Step 2: With the mis-read coefficients $a=3, b=11, c=4$, the RHS gives $$\\tfrac{1}{12} \\cdot 1 \\cdot 2 \\cdot (3 + 11 + 4) = \\tfrac{36}{12} = 3 \\ne 9$$. ✗. A single substitution at $n=1$ immediately reveals the error. Always sanity-check with $n=1$ or $n=2$.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "If a real-coefficient polynomial has a complex root $z_1 = a + bi$ (where $b \\ne 0$), what other root must it have, and why? (2 steps)", "answer": "- Step 1: The conjugate $\\bar{z_1} = a - bi$ must also be a root. This is the conjugate-pair theorem: if a polynomial has real coefficients and a complex root, then its complex conjugate is also a root.\n- Step 2: The \"why\" is algebraic: if $P(z_1) = 0$, then taking the complex conjugate of both sides gives $\\overline{P(z_1)} = 0$. Since the coefficients are real, $\\overline{P(z_1)} = P(\\bar{z_1})$, so $P(\\bar{z_1}) = 0$. If the coefficients were not real, this argument fails — conjugate pairs are not guaranteed for complex-coefficient polynomials.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "Given a complex root $z_1$, how do you directly write down the quadratic factor $(z - z_1)(z - \\bar{z_1})$ in terms of $\\text{Re}(z_1)$ and $|z_1|$? Derive this. (3 steps)", "answer": "- Step 1: Expand the product: $$(z - z_1)(z - \\bar{z_1}) = z^2 - (z_1 + \\bar{z_1})z + z_1 \\bar{z_1}$$.\n- Step 2: Recognize that $z_1 + \\bar{z_1} = 2\\,\\text{Re}(z_1)$ (the imaginary parts cancel) and $z_1 \\bar{z_1} = |z_1|^2$ (a complex number times its conjugate equals the square of its modulus).\n- Step 3: Therefore $$(z - z_1)(z - \\bar{z_1}) = z^2 - 2\\,\\text{Re}(z_1)\\,z + |z_1|^2$$. For $z_1 = 2+3i$: $\\text{Re}(z_1) = 2$, $|z_1|^2 = 4+9 = 13$, giving $z^2 - 4z + 13$. This formula is NOT in the booklet — memorize it.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "Why is it $|z_1|^2 = 4 + 9 = 13$ and not $4 - 9 = -5$ when computing $|z_1|^2$ for $z_1 = 2 + 3i$? (1 step)", "answer": "The modulus squared is $|z_1|^2 = (\\text{Re})^2 + (\\text{Im})^2$ — it is always a SUM of squares, never a difference. For $z_1 = 2+3i$: $|z_1|^2 = 2^2 + 3^2 = 4 + 9 = 13$. The confusion arises because the conjugate $\\bar{z_1} = 2-3i$ has a minus sign, but when you multiply $z_1 \\bar{z_1} = (2+3i)(2-3i) = 4 - 9i^2 = 4 + 9 = 13$, the $i^2 = -1$ flips the sign back. Always use sum of squares.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "After finding the quadratic factor from a conjugate pair, you need to divide the original polynomial by it. What is the key danger area in polynomial long division, and what shape check should you do first? (2 steps)", "answer": "- Step 1: Shape check first: dividing a degree-4 polynomial by a degree-2 factor gives a degree-2 quotient. If your quotient isn't degree-2, something went wrong immediately.\n- Step 2: The key danger area is **signs in the subtraction step**. When you multiply the divisor by the current quotient term and subtract from the current remainder, you must subtract EVERY term — a common error is to forget to flip the sign of one term. Work deliberately: write the \"subtraction row\" with all signs flipped, then add. Also verify by checking that the remainder is zero — if it isn't, re-check your subtraction signs.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "On an Argand diagram, what does it mean geometrically when two complex roots are conjugate pairs, and where do purely imaginary roots lie? (2 steps)", "answer": "- Step 1: Conjugate pairs $z_1 = a+bi$ and $\\bar{z_1} = a-bi$ are mirror images of each other across the real axis. On the Argand diagram, they have the same $x$-coordinate (Re) but opposite $y$-coordinates (Im). This is a direct geometric consequence of conjugation reflecting across the real axis.\n- Step 2: Purely imaginary roots like $z = \\pm bi$ lie on the imaginary axis (where Re $= 0$). They are their own conjugate pair reflected across the real axis: $bi$ and $-bi$ are symmetric about the origin on the $y$-axis.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "What is the parametric form for a point on the rectangular hyperbola $xy = c^2$, and why does it work? (2 steps)", "answer": "- Step 1: The parametric form is $(ct, c/t)$ for parameter $t \\ne 0$. This is NOT in the formula booklet — memorize it.\n- Step 2: It works because the product of coordinates is $ct \\cdot c/t = c^2$, which satisfies $xy = c^2$ for any non-zero $t$. As $t$ varies over all non-zero reals, the point $(ct, c/t)$ traces the entire hyperbola (both branches). For $c = 3$ (i.e., $xy = 9$), the parametric form is $(3t, 3/t)$.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "Derive the gradient $\\frac{dy}{dx}$ at the point $(ct, c/t)$ on $xy = c^2$ using implicit differentiation. (3 steps)", "answer": "- Step 1: Start with $xy = c^2$. Differentiate both sides with respect to $x$ using the product rule: $$y + x\\frac{dy}{dx} = 0$$.\n- Step 2: Solve for $\\frac{dy}{dx}$: $$\\frac{dy}{dx} = -\\frac{y}{x}$$.\n- Step 3: At the point $(ct, c/t)$: $$\\frac{dy}{dx} = -\\frac{c/t}{ct} = -\\frac{1}{t^2}$$. This is a powerful shortcut — at $(ct, c/t)$, the gradient is always $-1/t^2$, regardless of $c$. Memorize this for speed on exams.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "Given the tangent gradient at $(ct, c/t)$ on $xy = c^2$ is $-1/t^2$, what is the gradient of the normal, and how do you form the normal equation? (3 steps)", "answer": "- Step 1: The normal gradient is the negative reciprocal of the tangent gradient: $$m_{\\text{normal}} = -\\frac{1}{-1/t^2} = t^2$$.\n- Step 2: The normal passes through $P(ct, c/t)$ with gradient $t^2$: $$y - \\frac{c}{t} = t^2(x - ct)$$.\n- Step 3: Multiply through by $t$ to clear the fraction: $$ty - c = t^3 x - ct^4$$, which rearranges to $$t^3 x - ty = c(t^4 - 1)$$ or equivalently $$ty - t^3 x = c(1 - t^4)$$. This is the standard normal form — memorize it.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "When a normal at $P$ on a rectangular hyperbola meets the curve again at a second point, how can you use Vieta's formulas to find the other $x$-coordinate without solving the full quadratic? (3 steps)", "answer": "- Step 1: Substituting the normal's equation into $xy = c^2$ yields a quadratic in $x$. Since $P$ lies on both the normal and the hyperbola, $x_P$ is one root of this quadratic.\n- Step 2: By Vieta's, if the quadratic is $ax^2 + bx + c = 0$ with roots $\\alpha$ and $\\beta$, then $\\alpha\\beta = c/a$. Since one root $\\alpha = x_P$ is known, the other root is $\\beta = \\frac{c}{a \\cdot \\alpha}$.\n- Step 3: This avoids re-solving the quadratic entirely. For example, with roots multiplying to $-9/4$ and one root being $6$, the other is $-9/4 \\div 6 = -3/8$. Always sanity-check: does $xy = c^2$ hold at the new point?", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Why does the area scale factor of a matrix transformation involve the absolute value of the determinant, and what exam trap does this create? (3 steps)", "answer": "- Step 1: The determinant of a $2\\times 2$ matrix can be positive or negative. A negative determinant means the transformation reverses orientation (like a reflection), but the area is still a positive quantity.\n- Step 2: Therefore, area scale factor = $|\\det A|$, not $\\det A$. When the question says \"the area is 3 times the original,\" this means $|\\det A| = 3$, which gives two cases: $\\det A = +3$ or $\\det A = -3$.\n- Step 3: The exam trap: if you only solve $\\det A = 3$, you miss the solution from $\\det A = -3$. Whenever a question asks for \"possible values\" (plural), immediately split into $+$ and $-$ cases. For $A = \\begin{pmatrix} -3 & 8 \\\\ -3 & k \\end{pmatrix}$ with $\\det = -3k+24$: setting $\\det = 3$ gives $k = 7$; setting $\\det = -3$ gives $k = 9$.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "State the 2×2 matrix inverse formula, and explain each component. (2 steps)", "answer": "- Step 1: For $M = \\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$ with $\\det M = ad - bc \\ne 0$: $$M^{-1} = \\frac{1}{ad-bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$$. This is NOT in the formula booklet — memorize it.\n- Step 2: The recipe is: (1) swap the diagonal entries $a \\leftrightarrow d$, (2) negate the off-diagonal entries $b \\to -b$ and $c \\to -c$, (3) divide everything by the determinant $ad - bc$. The swap-and-negate pattern is the adjugate matrix. Common error: forgetting to divide by the determinant, or swapping the wrong pair.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "Given the matrix equation $BC = D$ where $B$ is invertible, how do you solve for $C$, and what shape check must you perform before multiplying? (3 steps)", "answer": "- Step 1: Since $B$ is on the LEFT of $C$, you must pre-multiply by $B^{-1}$: $B^{-1}BC = B^{-1}D$, giving $C = B^{-1}D$. Do NOT write $C = DB^{-1}$ — matrix multiplication is not commutative.\n- Step 2: Shape check: if $B$ is $m \\times m$ and $D$ is $m \\times p$, then $C = B^{-1}D$ is $m \\times p$. For example, $B^{-1}$ is $2\\times 2$ and $D$ is $2 \\times 3$, so $C$ is $2 \\times 3$. Always verify shapes match before multiplying.\n- Step 3: When performing the multiplication, compute each entry of $C$ as the dot product of the corresponding row of $B^{-1}$ with the corresponding column of $D$. Work systematically: row 1 × columns 1,2,3; then row 2 × columns 1,2,3.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "What are Vieta's formulas for a quadratic $ax^2 + bx + c = 0$ with roots $\\alpha$ and $\\beta$, and where can you find them in the exam? (2 steps)", "answer": "- Step 1: Vieta's formulas: $$\\alpha + \\beta = -\\frac{b}{a}, \\qquad \\alpha\\beta = \\frac{c}{a}$$. These ARE in the formula booklet under \"Roots of equations\" — know where to look, don't waste time deriving.\n- Step 2: The key insight is that you can find the sum and product of roots WITHOUT solving the equation. For $x^2 - 6x + 3 = 0$: $\\alpha + \\beta = 6$, $\\alpha\\beta = 3$. These two values are your \"building blocks\" for every subsequent part of a roots question.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "Derive the identity $\\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta$ and explain why it's the first tool you reach for in roots-of-polynomial questions. (2 steps)", "answer": "- Step 1: Start with $(\\alpha + \\beta)^2 = \\alpha^2 + 2\\alpha\\beta + \\beta^2$. Rearranging: $\\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta$. This identity lets you compute $\\alpha^2 + \\beta^2$ entirely from Vieta's values without knowing $\\alpha$ or $\\beta$ individually.\n- Step 2: For $x^2 - 6x + 3 = 0$: $\\alpha^2 + \\beta^2 = 6^2 - 2(3) = 36 - 6 = 30$. This identity is NOT in the booklet — memorize it. It's the first tool because almost every \"evaluate this symmetric expression\" question involves $\\alpha^2 + \\beta^2$ at some stage.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "How do you expand $(\\alpha^2+1)(\\beta^2+1)$ in terms of $\\alpha\\beta$, $\\alpha^2+\\beta^2$, and a constant? Walk through the algebra. (3 steps)", "answer": "- Step 1: Expand using FOIL: $$(\\alpha^2+1)(\\beta^2+1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1$$.\n- Step 2: Recognize each piece in terms of Vieta's values: $\\alpha^2\\beta^2 = (\\alpha\\beta)^2$, and $\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$.\n- Step 3: For $x^2 - 6x + 3 = 0$ (where $\\alpha+\\beta=6$, $\\alpha\\beta=3$): $$(\\alpha\\beta)^2 + (\\alpha^2+\\beta^2) + 1 = 9 + 30 + 1 = 40$$. The answer is 40. Always break the expression into symmetric pieces that can be expressed via $\\alpha+\\beta$ and $\\alpha\\beta$.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "What is the \"factor trick\" for the expression $\\alpha\\beta^2 + \\beta\\alpha^2 + \\alpha + \\beta$, and why is it the key to solving transformed-roots questions? (3 steps)", "answer": "- Step 1: The expression $\\alpha\\beta^2 + \\beta\\alpha^2$ can be factored by pulling out $\\alpha\\beta$: $$\\alpha\\beta^2 + \\beta\\alpha^2 = \\alpha\\beta(\\beta + \\alpha) = \\alpha\\beta(\\alpha + \\beta)$$.\n- Step 2: Adding $\\alpha + \\beta$ to both sides: $$\\alpha\\beta^2 + \\beta\\alpha^2 + \\alpha + \\beta = \\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta) = (\\alpha+\\beta)(\\alpha\\beta + 1)$$.\n- Step 3: This factor trick is the key to transformed-roots questions because when computing the sum $\\frac{\\alpha}{\\alpha^2+1} + \\frac{\\beta}{\\beta^2+1}$ over the common denominator $(\\alpha^2+1)(\\beta^2+1)$, the numerator is exactly $\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1) = (\\alpha+\\beta)(\\alpha\\beta+1)$. For $\\alpha+\\beta=6$, $\\alpha\\beta=3$: this equals $6 \\times 4 = 24$. Without the factor trick, you'd be stuck expanding and unable to simplify.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "When building a new quadratic with transformed roots $\\alpha' = \\frac{\\alpha}{\\alpha^2+1}$ and $\\beta' = \\frac{\\beta}{\\beta^2+1}$, how do you construct the quadratic once you have the sum $S$ and product $P$? (3 steps)", "answer": "- Step 1: The new quadratic is $x^2 - Sx + P = 0$ where $S = \\alpha' + \\beta'$ and $P = \\alpha'\\beta'$. This follows from Vieta's in reverse: if roots have sum $S$ and product $P$, the monic quadratic is $x^2 - Sx + P$.\n- Step 2: For the product: $P = \\frac{\\alpha\\beta}{(\\alpha^2+1)(\\beta^2+1)}$. Crucially, the denominator $(\\alpha^2+1)(\\beta^2+1)$ was computed in part (a) — always reuse part (a) results. Here $P = 3/40$.\n- Step 3: With $S = 24/40 = 3/5$ and $P = 3/40$: the quadratic is $x^2 - \\frac{3}{5}x + \\frac{3}{40} = 0$. Multiply through by 40 (the LCD) to clear all fractions: $40x^2 - 24x + 3 = 0$. The instruction \"integers $p, q, r$\" forces you to clear denominators.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "For $|z_1 + z_2|$ where $z_1 = 3+2i$ and $z_2 = 2+3i$, why must you add the complex numbers FIRST and then take the modulus, rather than adding the moduli? (2 steps)", "answer": "- Step 1: You must add first: $z_1 + z_2 = 5 + 5i$, then $|z_1 + z_2| = \\sqrt{25+25} = 5\\sqrt{2}$. The modulus of a sum is NOT the sum of the moduli — $|z_1| + |z_2| = \\sqrt{13} + \\sqrt{13} = 2\\sqrt{13} \\ne 5\\sqrt{2}$.\n- Step 2: Geometrically, $|z_1| + |z_2|$ is the total path length if you walk from the origin to $z_1$ and then to $z_1 + z_2$ along two sides of a triangle. But $|z_1 + z_2|$ is the straight-line distance from the origin to $z_1 + z_2$. By the triangle inequality, $|z_1 + z_2| \\le |z_1| + |z_2|$, with equality only when $z_1$ and $z_2$ point in the same direction.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "When dividing by a complex number $z_1$ in a fraction like $w = \\frac{z_2 z_3}{z_1}$, what technique do you use, and what is the key simplification? (3 steps)", "answer": "- Step 1: Multiply both numerator and denominator by the conjugate $\\bar{z_1}$: $$w = \\frac{z_2 z_3}{z_1} \\cdot \\frac{\\bar{z_1}}{\\bar{z_1}} = \\frac{(z_2 z_3)\\bar{z_1}}{z_1 \\bar{z_1}}$$.\n- Step 2: The denominator simplifies to $z_1 \\bar{z_1} = |z_1|^2$, which is always real. For $z_1 = 3+2i$: $|z_1|^2 = 9+4 = 13$. This is the whole point of the technique — it makes the denominator real.\n- Step 3: Then multiply out the numerator (which is a product of complex numbers) and divide both real and imaginary parts by $|z_1|^2$. For the May 2023 paper, this gives $w = \\frac{12a-5b}{13} + \\frac{5a+12b}{13}i$.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "How do you determine which quadrant a complex number $w$ lies in, and why does this matter for computing $\\arg w$? (3 steps)", "answer": "- Step 1: Check the signs of Re($w$) and Im($w$):\n+ Q1: Re $> 0$, Im $> 0$\n+ Q2: Re $< 0$, Im $> 0$\n+ Q3: Re $< 0$, Im $< 0$\n+ Q4: Re $> 0$, Im $< 0$\n- Step 2: The quadrant determines the formula for $\\arg w$:\n+ Q1: $\\arg w = \\arctan(\\text{Im}/\\text{Re})$\n+ Q2: $\\arg w = \\pi - \\arctan(|\\text{Im}/\\text{Re}|)$\n+ Q3: $\\arg w = -\\pi + \\arctan(|\\text{Im}/\\text{Re}|)$\n+ Q4: $\\arg w = -\\arctan(|\\text{Im}/\\text{Re}|)$\n- Step 3: This matters because $\\arctan$ alone only gives values in $(-\\pi/2, \\pi/2)$, which corresponds to Q1 and Q4. If $w$ is in Q2 or Q3, you must adjust by adding or subtracting $\\pi$. These quadrant rules are NOT in the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "What condition must hold for $f(x) = 0$ to have a root in the interval $[a, b]$, and what additional assumption is required? (2 steps)", "answer": "- Step 1: The condition is a sign change: $f(a)$ and $f(b)$ have opposite signs (one positive, one negative). By the Intermediate Value Theorem, if $f$ is continuous on $[a,b]$ and $f(a)f(b) < 0$, then there exists $\\alpha \\in (a,b)$ with $f(\\alpha) = 0$.\n- Step 2: The additional assumption is **continuity**. If $f$ has a discontinuity (like a vertical asymptote) in $[a,b]$, a sign change does NOT guarantee a root — the function could jump from negative to positive without crossing zero. Always state \"$f$ is continuous\" in your working.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "In interval bisection, what is the procedure for narrowing down the interval containing a root, and why must you evaluate the midpoint? (3 steps)", "answer": "- Step 1: Given interval $[a,b]$ where $f(a)$ and $f(b)$ have opposite signs, compute the midpoint $m = (a+b)/2$ and evaluate $f(m)$.\n- Step 2: Determine which half-interval contains the sign change:\n+ If $f(a)$ and $f(m)$ have opposite signs, the root is in $[a, m]$\n+ If $f(m)$ and $f(b)$ have opposite signs, the root is in $[m, b]$\n- Step 3: Replace $[a,b]$ with the half-interval containing the sign change and repeat. After $n$ bisections, the interval width is $(b-a)/2^n$. The method is guaranteed to converge but is slow — each step only halves the interval. Always state the sign of $f$ at each endpoint explicitly for method marks.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "State the Newton-Raphson formula and explain what can go wrong if $f'(x_n)$ is close to zero. (2 steps)", "answer": "- Step 1: The Newton-Raphson iteration is $$x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$$. This IS in the formula booklet. Geometrically, it finds where the tangent at $(x_n, f(x_n))$ crosses the $x$-axis.\n- Step 2: If $f'(x_n) \\approx 0$, the tangent is nearly horizontal, so $x_{n+1}$ can be very far from $x_n$ — the method diverges. Unlike bisection, Newton-Raphson is NOT guaranteed to converge. It's the fastest method when it works, but requires a good starting value and a non-zero derivative. Calculator hygiene: store $x_0$ in memory and use the ANS button to avoid rounding propagation.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "State the linear interpolation formula, and explain the geometric intuition behind it. (3 steps)", "answer": "- Step 1: The linear interpolation formula on interval $[a,b]$ is: $$x_1 = a - \\frac{f(a)(b-a)}{f(b) - f(a)}$$. This is NOT in the booklet — memorize it.\n- Step 2: Geometrically, you're drawing a straight line from $(a, f(a))$ to $(b, f(b))$ and finding where it crosses the $x$-axis. It's \"interpolating\" because you're using the function values at the endpoints to estimate where the root is, assuming $f$ is roughly linear between them.\n- Step 3: The formula comes from similar triangles: the ratio $\\frac{x_1 - a}{b - a}$ equals the ratio of the heights $\\frac{|f(a)|}{|f(a)| + |f(b)|}$ (with appropriate signs). When $|f(a)|$ is small relative to $|f(b)|$, $x_1$ is close to $a$; when both are similar, $x_1$ is near the midpoint.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "Compare bisection, linear interpolation, and Newton-Raphson: which is fastest, which is safest, and why? (2 steps)", "answer": "- Step 1: Speed ranking (typically): Newton-Raphson $>$ linear interpolation $>$ bisection. Newton-Raphson has quadratic convergence (doubles correct digits each step), linear interpolation has superlinear convergence, bisection has linear convergence (halves interval each step).\n- Step 2: Safety ranking: bisection $>$ linear interpolation $>$ Newton-Raphson. Bisection is guaranteed to converge (given a sign change and continuity). Linear interpolation assumes approximate linearity. Newton-Raphson can diverge if $f'(x_n)$ is small or the starting value is poor. On an exam, if asked to \"use\" a specific method, use that one — don't substitute.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "For the parabola $y^2 = 4ax$, what are the parametric coordinates, focus, and directrix? Derive the focus and directrix from the definition. (3 steps)", "answer": "- Step 1: Parametric form: $(at^2, 2at)$ for parameter $t$. Substituting: $y^2 = (2at)^2 = 4a^2t^2 = 4a(at^2) = 4ax$. ✓. This is NOT in the booklet — memorize it.\n- Step 2: Focus $S = (a, 0)$. This comes from the definition of a parabola: the locus of points equidistant from the focus and the directrix. For $y^2 = 4ax$, the focus is at $(a, 0)$.\n- Step 3: Directrix: $x = -a$. By definition, for any point $P$ on the parabola, the distance to the focus equals the distance to the directrix. For $P(at^2, 2at)$: distance to focus $= \\sqrt{(at^2-a)^2 + 4a^2t^2} = a(t^2+1)$; distance to directrix $= at^2 - (-a) = a(t^2+1)$. ✓. For $y^2 = 8x$: $4a = 8$, so $a = 2$, focus $(2,0)$, directrix $x = -2$.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "What is the equation of the tangent to $y^2 = 4ax$ at the parametric point $(at^2, 2at)$, and how do you derive it? (3 steps)", "answer": "- Step 1: Differentiate $y^2 = 4ax$ implicitly: $2y\\frac{dy}{dx} = 4a$, so $\\frac{dy}{dx} = \\frac{2a}{y}$. At $(at^2, 2at)$: $\\frac{dy}{dx} = \\frac{2a}{2at} = \\frac{1}{t}$.\n- Step 2: Line through $(at^2, 2at)$ with gradient $1/t$: $$y - 2at = \\frac{1}{t}(x - at^2)$$, which gives $$ty - 2at^2 = x - at^2$$.\n- Step 3: Rearranging: $$ty = x + at^2$$. This is the standard tangent form — memorize it. It is NOT in the booklet. Note the elegant structure: the parameter $t$ multiplies $y$, and the constant term involves $at^2$.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "State the focal chord theorem for the parabola $y^2 = 4ax$: what condition on the parameters $t_1, t_2$ guarantees that the chord joining two points passes through the focus? (2 steps)", "answer": "- Step 1: If two points $P(at_1^2, 2at_1)$ and $Q(at_2^2, 2at_2)$ lie on $y^2 = 4ax$, then the chord $PQ$ passes through the focus $(a, 0)$ if and only if $$t_1 t_2 = -1$$.\n- Step 2: This is a powerful shortcut. In the May 2023 paper, $P$ has parameter $p$ and $Q$ has parameter $-1/p$, so $t_1 t_2 = p \\cdot (-1/p) = -1$. ✓. The chord automatically passes through the focus — no need to compute the chord equation and verify. This theorem is NOT in the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "What is the directrix-as-polar theorem for parabolas, and how does it manifest in the May 2023 Q8? (2 steps)", "answer": "- Step 1: The theorem states: **the tangents at the endpoints of any focal chord of a parabola meet on the directrix**. This is a general result — not just for specific parameter values.\n- Step 2: In Q8, the chord $PQ$ is a focal chord (since $t_1 t_2 = -1$). The tangent at $P$ and the tangent at $Q$ meet at $R$. Computing algebraically gives $R = (-2, 2p - 2/p)$, where $x = -2$ is exactly the directrix $x = -a = -2$. The $y$-coordinate varies with $p$, but the $x$-coordinate is always $-a$. Knowing this theorem lets you predict the answer before doing any algebra.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": true}, {"question": "When finding the intersection of two tangents to a parabola (at parameters $t_1$ and $t_2$), what algebraic strategy do you use? (3 steps)", "answer": "- Step 1: Write both tangent equations in the form $ty = x + at^2$. For $t_1 = p$: $py = x + 2p^2$. For $t_2 = -1/p$: $(-1/p)y = x + 2/p^2$.\n- Step 2: Solve simultaneously. Rearrange both to express $x$ in terms of $y$: $x = py - 2p^2$ and $x = -y/p - 2/p^2$. Set equal: $py - 2p^2 = -y/p - 2/p^2$.\n- Step 3: Multiply through by $p^2$ to clear all fractions: $p^3 y - 2p^4 = -py - 2$. Collect $y$ terms: $y(p^3 + p) = 2p^4 - 2 = 2(p^2-1)(p^2+1)$. Factor out $p$: $yp(p^2+1) = 2(p^2-1)(p^2+1)$. Cancel $(p^2+1)$: $y = \\frac{2(p^2-1)}{p}$. Then substitute back for $x$.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "What are the four mandatory steps of a mathematical induction proof, and what closing statement must you always write? (2 steps)", "answer": "- Step 1: The four steps are:\n+ **BASE CASE**: Show the statement is true for $n = 1$ (or $n = n_0$ if specified).\n+ **ASSUMPTION**: Assume the statement is true for $n = k$ (the inductive hypothesis).\n+ **INDUCTIVE STEP**: Show that if true for $n = k$, then true for $n = k+1$, explicitly using the assumption.\n+ **CONCLUSION**: State \"by the principle of mathematical induction, [the statement] is true for all $n \\in \\mathbb{Z}^+$\" (or for $n \\ge n_0$).\n- Step 2: Examiners give method marks for the structure even if the algebra fails. Always label each step clearly and write the full conclusion with $\\blacksquare$. Missing the conclusion or the explicit use of the inductive hypothesis costs marks.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "In a divisibility induction proof, what are the two main approaches for the inductive step, and when do you use each? (3 steps)", "answer": "- Step 1: **Difference approach**: Compute $f(k+1) - f(k)$ and show this difference is divisible by the target number $d$. Then since $f(k) = d \\cdot m$ (by hypothesis), $f(k+1) = f(k) + d \\cdot r = d(m+r)$, which is divisible by $d$. Use this when the difference simplifies cleanly.\n- Step 2: **Engineered-form approach**: Write $f(k+1) = c \\cdot f(k) + d \\cdot (\\text{integer})$ for some constant $c$. Since $f(k)$ is divisible by $d$ (by hypothesis) and the other term is explicitly a multiple of $d$, $f(k+1)$ is divisible by $d$. Use this when the difference approach doesn't yield a clean multiple of $d$.\n- Step 3: For $4^n + 6n - 10$ divisible by 18: the difference $f(k+1) - f(k) = 3 \\cdot 4^k + 6$ requires a sub-claim about $4^k + 2$ being divisible by 6. The engineered-form approach gives $f(k+1) = 4f(k) - 18(k-2)$, which is cleaner. On the exam, try the engineered form first if the difference doesn't simplify obviously.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "In the induction proof that $4^n + 6n - 10$ is divisible by 18, the key trick is writing $f(k+1) = 4f(k) - 18(k-2)$. How do you derive this? (3 steps)", "answer": "- Step 1: Write $f(k+1) = 4 \\cdot 4^k + 6k + 6 - 10 = 4 \\cdot 4^k + 6k - 4$. Now identify $f(k) = 4^k + 6k - 10$ within this expression.\n- Step 2: Write $f(k+1) = f(k) + 3 \\cdot 4^k + 6$. Now express $3 \\cdot 4^k + 6$ in terms of $f(k)$: note that $3f(k) = 3 \\cdot 4^k + 18k - 30$, so $3 \\cdot 4^k = 3f(k) - 18k + 30$.\n- Step 3: Substituting: $f(k+1) = f(k) + [3f(k) - 18k + 30] + 6 = 4f(k) - 18k + 36 = 4f(k) - 18(k - 2)$. Since $f(k)$ is divisible by 18 (by hypothesis) and $18(k-2)$ is obviously divisible by 18, $f(k+1)$ is divisible by 18. ✓.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "Why does the sub-claim \"$4^k + 2$ is divisible by 6 for all $k \\ge 1$\" hold, and how would you prove it? (2 steps)", "answer": "- Step 1: Observe that $4^k \\pmod{6}$ follows a pattern: $4^1 = 4$, $4^2 = 16 \\equiv 4$, $4^3 = 64 \\equiv 4$, and in general $4^k \\equiv 4 \\pmod{6}$ for all $k \\ge 1$. This is because $4 \\cdot 4 = 16 \\equiv 4 \\pmod{6}$, so once you're at 4 mod 6, you stay there.\n- Step 2: Therefore $4^k + 2 \\equiv 4 + 2 = 6 \\equiv 0 \\pmod{6}$. So $4^k + 2$ is always divisible by 6. This means $3(4^k + 2)$ is divisible by 18, which justifies the difference approach. Alternatively, you could prove the sub-claim by a separate induction, but the modular arithmetic argument is faster.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "For the rectangular hyperbola $xy = c^2$, what are the tangent and normal equations at the point $(ct, c/t)$, and how can you quickly verify the tangent form? (3 steps)", "answer": "- Step 1: **Tangent**: $x + t^2 y = 2ct$. **Normal**: $t^3 x - ty = c(t^4 - 1)$. Both are NOT in the booklet — memorize them.\n- Step 2: Quick verification of the tangent: at point $(ct, c/t)$, substitute into $x + t^2 y = ct + t^2 \\cdot c/t = ct + ct = 2ct$. ✓. The point lies on the tangent line. Also check the gradient: rearranging $x + t^2 y = 2ct$ gives $y = -x/t^2 + 2c/t$, so gradient $= -1/t^2$, which matches $\\frac{dy}{dx} = -1/t^2$. ✓.\n- Step 3: The normal gradient is $t^2$ (negative reciprocal of $-1/t^2$), and the normal passes through $(ct, c/t)$. The form $t^3 x - ty = c(t^4 - 1)$ is obtained by multiplying the point-gradient equation by $t$ and rearranging.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "When a question says \"use calculus to determine the normal,\" what does the examiner expect you to show, and what shortcut should you only use for verification? (2 steps)", "answer": "- Step 1: The examiner expects you to **differentiate** (implicitly or explicitly), **find** $\\frac{dy}{dx}$, **compute** the normal gradient as the negative reciprocal, and **write** the line equation. You must show all these steps — simply quoting the memorized normal formula without derivation loses method marks.\n- Step 2: The shortcut: once you've derived the answer, verify it against the memorized form $t^3 x - ty = c(t^4 - 1)$. If they match, you're confident. If they don't, re-check your derivation. Use memorized formulas as a safety net, not as a replacement for the calculus work the question demands.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "What is the equation of the normal to $y^2 = 4ax$ at the parametric point $(at^2, 2at)$? (2 steps)", "answer": "- Step 1: The tangent gradient at $(at^2, 2at)$ is $1/t$, so the normal gradient is $-t$. The normal passes through $(at^2, 2at)$: $$y - 2at = -t(x - at^2)$$.\n- Step 2: Expanding: $y - 2at = -tx + at^3$, giving $$y + tx = 2at + at^3$$. This is the standard normal form for the parabola — memorize it. It is NOT in the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": true}, {"question": "When solving simultaneous equations involving parametric tangent/normal equations, what algebraic strategy saves the most time? (2 steps)", "answer": "- Step 1: Rearrange each equation to express one variable (typically $x$) in terms of the other. For two tangent equations $t_1 y = x + at_1^2$ and $t_2 y = x + at_2^2$, both give $x = t_i y - at_i^2$. Set equal and solve for $y$.\n- Step 2: Always multiply through by the appropriate power of the parameter to clear fractions before expanding. For example, when $t_2 = -1/p$, multiply the entire equation by $p^2$ to eliminate denominators. Never work with nested fractions — clear them first.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "A question asks you to show that a point $Q$ lies on a parabola $y^2 = 8x$. What is the verification procedure? (2 steps)", "answer": "- Step 1: Substitute the coordinates of $Q$ into the equation $y^2 = 8x$. Compute $y^2$ and compute $8x$ separately.\n- Step 2: If $y^2 = 8x$, then $Q$ lies on the parabola. For $Q(2/p^2, -4/p)$: $y^2 = 16/p^2$ and $8x = 16/p^2$. ✓. This is a one-mark question — don't overthink it, just substitute and confirm equality.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "What is the \"possible values\" trap in matrix determinant questions, and how do you avoid it? (2 steps)", "answer": "- Step 1: When a question says \"the area of the image is $k$ times the area of the original,\" this means $|\\det A| = k$, NOT $\\det A = k$. The absolute value creates two cases: $\\det A = +k$ and $\\det A = -k$.\n- Step 2: The word \"possible\" (or \"values\" plural) is the signal. As soon as you see it, write: \"Case 1: $\\det A = +k$... Case 2: $\\det A = -k$...\" and solve both. For the May 2023 paper with $|\\det A| = 3$: $\\det A = 3 \\Rightarrow k = 7$ and $\\det A = -3 \\Rightarrow k = 9$.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "In the equation $w = \\frac{z_2 z_3}{z_1}$, after multiplying numerator and denominator by $\\bar{z_1}$ and obtaining $w$ in the form $x + iy$, how do you find $a$ and $b$ given that $w$ equals a specific complex number? (3 steps)", "answer": "- Step 1: Equate the real part of your expression for $w$ to the real part of the given value, and the imaginary part to the imaginary part. This gives two simultaneous equations in $a$ and $b$.\n- Step 2: Solve the system. For $12a - 5b = 4$ and $5a + 12b = 58$: multiply the first by 12 and the second by 5 to make the $b$-coefficients match in magnitude: $144a - 60b = 48$ and $25a + 60b = 290$.\n- Step 3: Add to eliminate $b$: $169a = 338$, so $a = 2$. Back-substitute: $24 - 5b = 4$, so $b = 4$. Always verify by substituting both values into the second equation: $5(2) + 12(4) = 10 + 48 = 58$. ✓.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "What does the sign of the determinant of a $2 \\times 2$ transformation matrix tell you about the transformation's effect? (2 steps)", "answer": "- Step 1: A **positive** determinant means the transformation preserves orientation — clockwise shapes remain clockwise, and the order of vertices is maintained. This includes rotations, enlargements, and shears.\n- Step 2: A **negative** determinant means the transformation reverses orientation — clockwise becomes counterclockwise, like a reflection. Both positive and negative determinants can produce the same area scale factor (since area = $|\\det|$), which is why \"possible values\" questions always have two answers.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": true}, {"question": "Why is the factor-early trick (pulling out $\\frac{1}{12}n(n+1)$ before expanding the bracket) superior to expanding everything into a single polynomial first? (2 steps)", "answer": "- Step 1: If you expand first, you get a degree-4 polynomial like $\\frac{1}{12}(3n^4 + 22n^3 + 51n^2 + 32n)$ which you must then factor. Factoring a degree-4 polynomial from scratch is time-consuming and error-prone.\n- Step 2: By factoring early, you already have $\\frac{1}{12}n(n+1)$ pulled out, and only need to simplify a quadratic bracket $3n^2 + 19n + 32$. The question TELLS you the factored form, so work toward it — don't expand and re-factor. Always read the target form first and engineer your algebra to match it.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "What is the relationship between the parametric form and the parameter value for a point on $y^2 = 4ax$? If $P$ has parameter $p$, what is the parameter for a point with coordinates $\\left(\\frac{a}{p^2}, \\frac{-2a}{p}\\right)$? (2 steps)", "answer": "- Step 1: The standard parametric form is $(at^2, 2at)$, so the parameter $t$ satisfies $x = at^2$ and $y = 2at$. For $P(2p^2, 4p)$ on $y^2 = 8x$ (where $a = 2$), the parameter is $t = p$.\n- Step 2: For $Q(2/p^2, -4/p)$: comparing with $(2t^2, 4t)$, we need $2t^2 = 2/p^2$ so $t^2 = 1/p^2$, giving $t = \\pm 1/p$. Since $y = 4t = -4/p < 0$ (for $p > 0$), we need $t = -1/p$. This is why $t_1 t_2 = p \\cdot (-1/p) = -1$, confirming the focal chord theorem.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "Conceptual exercise: If $\\alpha + \\beta = 5$ and $\\alpha\\beta = 6$, what is the value of $\\alpha^2 + \\beta^2$ and $(\\alpha^2+1)(\\beta^2+1)$? (2 steps)", "answer": "- Step 1: $\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta = 25 - 12 = 13$.\n- Step 2: $(\\alpha^2+1)(\\beta^2+1) = (\\alpha\\beta)^2 + (\\alpha^2+\\beta^2) + 1 = 36 + 13 + 1 = 50$. Every step uses only $\\alpha+\\beta$ and $\\alpha\\beta$ — you never need to find $\\alpha$ and $\\beta$ individually.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": true}, {"question": "Conceptual exercise: A $2 \\times 2$ matrix $A$ has determinant $-6$. A triangle with area 5 is transformed by $A$. What is the area of the image triangle? (1 step)", "answer": "The area scale factor is $|\\det A| = |-6| = 6$. So the image triangle has area $5 \\times 6 = 30$. The negative sign tells us the orientation is reversed (reflection), but area is always positive — that's why we take the absolute value.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "Conceptual exercise: The parabola $y^2 = 12x$ has two points with parameters $t_1 = 3$ and $t_2 = -1/3$. Does the chord joining them pass through the focus? (2 steps)", "answer": "- Step 1: Check the focal chord criterion: $t_1 t_2 = 3 \\times (-1/3) = -1$. ✓.\n- Step 2: Since $t_1 t_2 = -1$, the chord passes through the focus $(a, 0) = (3, 0)$ by the focal chord theorem. No computation needed — the theorem gives the answer immediately.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "Conceptual exercise: Using linear interpolation on $[2, 3]$ where $f(2) = -4$ and $f(3) = 2$, find $x_1$ (the approximate root) using mental arithmetic. (2 steps)", "answer": "- Step 1: Apply the formula $x_1 = a - \\frac{f(a)(b-a)}{f(b) - f(a)} = 2 - \\frac{(-4)(3-2)}{2-(-4)} = 2 - \\frac{-4}{6} = 2 + \\frac{2}{3} = \\frac{8}{3}$.\n- Step 2: Intuitively: $|f(2)| = 4$ and $|f(3)| = 2$, so the root is closer to $x = 3$ (where $f$ is smaller in magnitude). The ratio is $4:2 = 2:1$, so the root divides the interval in ratio $2:1$ from $x = 2$, giving $x_1 = 2 + \\frac{1}{3}(1) = 7/3$. Wait — actually the root is closer to 3 because $|f(3)|$ is smaller, meaning the zero crossing is nearer to 3. The weighted position from 2 is $\\frac{|f(2)|}{|f(2)|+|f(3)|} = \\frac{4}{6} = \\frac{2}{3}$ of the way from 2 to 3, giving $x_1 = 2 + 2/3 = 8/3 \\approx 2.667$. ✓.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "What is the tangent equation for the rectangular hyperbola $xy = c^2$ at the point $(ct, c/t)$, and how does its form compare to the parabola tangent? (2 steps)", "answer": "- Step 1: For the rectangular hyperbola, the tangent at $(ct, c/t)$ is: $$x + t^2 y = 2ct$$. The gradient is $-1/t^2$ (negative, reflecting the hyperbola's decreasing branches for $t > 0$).\n- Step 2: Compare with the parabola tangent at $(at^2, 2at)$: $ty = x + at^2$, gradient $1/t$ (positive for $t > 0$). Note the structural differences: for the hyperbola, $t^2$ multiplies $y$; for the parabola, $t$ multiplies $y$. Don't confuse them — they come from different curves with different geometries.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": true}, {"question": "Why is the rectangular hyperbola called \"rectangular,\" and what geometric property distinguishes it from other hyperbolas? (2 steps)", "answer": "- Step 1: \"Rectangular\" means the asymptotes are perpendicular (at right angles). For $xy = c^2$, the asymptotes are the $x$-axis ($y = 0$) and the $y$-axis ($x = 0$), which are perpendicular. A general hyperbola can have asymptotes at any angle.\n- Step 2: The equation $xy = c^2$ is the simplest form of a rectangular hyperbola, with its center at the origin and asymptotes along the coordinate axes. The parametric form $(ct, c/t)$ reflects the reciprocal relationship: as $t$ increases, $x$ increases but $y$ decreases, tracing the curve in the first quadrant (for $t > 0$) or third quadrant (for $t < 0$).", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "In the induction proof for $4^n + 6n - 10$ divisible by 18, why is the base case $n = 1$ valid even though the paper states $n \\ge 2$? (2 steps)", "answer": "- Step 1: Checking $n = 1$: $f(1) = 4 + 6 - 10 = 0 = 18 \\times 0$. Zero IS divisible by 18 (since $0 = 18 \\times 0$). So the statement holds for $n = 1$.\n- Step 2: The paper says $n \\ge 2$ likely because $f(1) = 0$ is a trivial/degenerate case, and $f(2) = 18$ is the first \"interesting\" case. But starting at $n = 1$ is perfectly valid and gives a stronger result. On the exam, you can start at either $n = 1$ or $n = 2$ — just be consistent with what the question specifies. If it says $n \\ge 2$, use $n = 2$ as the base case to be safe.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "When computing $f(k+1) - f(k)$ in a divisibility induction, what is the purpose of this difference, and when does the approach fail? (2 steps)", "answer": "- Step 1: The purpose is to isolate the \"new\" part of $f(k+1)$ that isn't covered by $f(k)$. If $f(k+1) - f(k) = d \\cdot r$ (a multiple of $d$), then $f(k+1) = f(k) + d \\cdot r = d \\cdot m + d \\cdot r = d(m+r)$, which is divisible by $d$.\n- Step 2: The approach fails (or becomes complicated) when $f(k+1) - f(k)$ is not obviously a multiple of $d$. For $4^n + 6n - 10$: the difference is $3 \\cdot 4^k + 6 = 3(4^k + 2)$, and you need a sub-claim that $4^k + 2$ is divisible by 6. This extra step makes the engineered-form approach ($f(k+1) = 4f(k) - 18(k-2)$) cleaner for this particular problem.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "What is the standard parametric form for the parabola $y^2 = 8x$, and how do you identify $a$ from the equation? (2 steps)", "answer": "- Step 1: Compare $y^2 = 8x$ with the standard form $y^2 = 4ax$. This gives $4a = 8$, so $a = 2$.\n- Step 2: The parametric form is $(at^2, 2at) = (2t^2, 4t)$. So a general point on $y^2 = 8x$ is $(2t^2, 4t)$ for parameter $t$. The question uses $p$ instead of $t$, giving $P(2p^2, 4p)$. This is consistent — $p$ is just the parameter renamed.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": false}, {"question": "Conceptual exercise: A matrix $M$ transforms a shape, and $\\det M = 4$. If the same transformation is applied twice (i.e., $M^2$), what is the area scale factor of the combined transformation? (2 steps)", "answer": "- Step 1: The area scale factor of $M$ is $|\\det M| = 4$. The area scale factor of $M^2$ is $|\\det(M^2)|$.\n- Step 2: By the multiplicative property of determinants, $\\det(M^2) = (\\det M)^2 = 16$. So the area scale factor of applying $M$ twice is $|16| = 16$. Each application multiplies the area by 4, so two applications multiply by $4 \\times 4 = 16$.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": true}, {"question": "When a normal at point $P$ on a rectangular hyperbola \"meets $H$ again,\" why does the resulting quadratic in $x$ have $x_P$ as one of its roots? (2 steps)", "answer": "- Step 1: The normal passes through $P$, and $P$ lies on the hyperbola $H$. So $P$ is a point of intersection between the normal line and the curve $H$.\n- Step 2: When you substitute the normal's equation into $xy = c^2$, you're finding ALL intersection points. Since $P$ is one such point, $x_P$ must be a root of the resulting quadratic. The other root gives the $x$-coordinate of the second intersection point. This is why Vieta's product trick works: you know one root, so the other is determined by $\\alpha\\beta = c/a$.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "What is the key exam strategy for questions that you haven't studied the topic for (like Q3 and Q8 in this paper)? (2 steps)", "answer": "- Step 1: Skip them initially and do the rest of the paper first. Budget a fixed time (10–15 minutes) at the end to attempt them. Don't sink 25+ minutes into a question whose algebra is foreign — that time is better spent checking other answers.\n- Step 2: For partial marks: part (a) of these questions is often just a substitution/verification worth 1–2 marks, which you can attempt even without knowing the full theory. Part (b) usually requires the core method (tangent/normal equation). Part (c) is typically the hardest algebra. Attempt what you can and move on.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": true}, {"question": "What is the \"calculator hygiene\" rule for Newton-Raphson, and why does it matter? (2 steps)", "answer": "- Step 1: Store $x_0$ in calculator memory and use the ANS/recall button to plug into both $f(x_0)$ and $f'(x_0)$. Round only at the final step to the required precision (e.g., 3 d.p.).\n- Step 2: This matters because rounding at intermediate steps propagates errors. If you round $f(x_0)$ to 3 d.p. before dividing by $f'(x_0)$, the error in $x_1$ can be significant enough to lose the final accuracy mark. The calculator stores far more digits internally than it displays — use that precision.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": false}, {"question": "What is the common factor between $\\sum r$, $\\sum r^2$, and $\\sum r^3$ that makes the factor-early trick work, and what is the LCD you should use? (2 steps)", "answer": "- Step 1: All three formulas contain the factor $n(n+1)$: $\\sum r = \\frac{1}{2}n(n+1)$, $\\sum r^2 = \\frac{1}{6}n(n+1)(2n+1)$, $\\sum r^3 = \\frac{1}{4}n^2(n+1)^2$. The common factor is at least $n(n+1)$ (and $n$ in $\\sum r^3$).\n- Step 2: The LCD of the denominators 2, 6, 4 is 12. So convert all fractions to denominator 12 and factor out $\\frac{1}{12}n(n+1)$. This is always the right play for FP1 summation questions — the question format $\\frac{1}{12}n(n+1)(\\ldots)$ is a massive hint.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "Why must you write out the expansion of $r(r+2)^2$ in full on the exam, rather than trusting mental algebra? (2 steps)", "answer": "- Step 1: Mental algebra with compound expressions is error-prone under exam pressure. The specific trap here is confusing $r(r+2)^2 = r^3 + 4r^2 + 4r$ with $r^2(r+2) = r^3 + 2r^2$. The visual similarity of the expressions makes this a likely mis-read.\n- Step 2: Writing out the expansion explicitly: first $(r+2)^2 = r^2 + 4r + 4$, then $r(r^2 + 4r + 4) = r^3 + 4r^2 + 4r$, leaves an audit trail. If your final answer is wrong, you can trace back to exactly where the error occurred. The 30 seconds spent writing this out saves 5 minutes of re-derivation.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": false}, {"question": "In part (b) of Q5, the new roots are $\\frac{\\alpha}{\\alpha^2+1}$ and $\\frac{\\beta}{\\beta^2+1}$. Why is the product $P = \\frac{\\alpha\\beta}{(\\alpha^2+1)(\\beta^2+1)}$ particularly easy to compute? (2 steps)", "answer": "- Step 1: The product of fractions: $\\frac{\\alpha}{\\alpha^2+1} \\times \\frac{\\beta}{\\beta^2+1} = \\frac{\\alpha\\beta}{(\\alpha^2+1)(\\beta^2+1)}$. The denominator is exactly what you computed in part (a).\n- Step 2: This is a deliberate exam design: part (a) asks for $(\\alpha^2+1)(\\beta^2+1) = 40$ so that part (b) can reuse it. The product becomes $P = 3/40$. Always look for connections between parts — the examiners build them in, and using them saves time and reduces errors.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": true}, {"question": "What is the general form of the conjugate-pair quadratic factor, and what happens if the original polynomial has complex coefficients? (2 steps)", "answer": "- Step 1: For a real-coefficient polynomial with complex root $z_1 = p + qi$, the quadratic factor is $(z - z_1)(z - \\bar{z_1}) = z^2 - 2pz + (p^2 + q^2)$. This factor has real coefficients: $-2p$ and $p^2 + q^2$ are both real.\n- Step 2: If the original polynomial has complex coefficients, the conjugate-pair theorem does NOT apply. A complex root $z_1$ does not guarantee that $\\bar{z_1}$ is also a root. The theorem relies on $\\overline{P(z)} = P(\\bar{z})$, which only holds when all coefficients are real (so $\\bar{c_i} = c_i$).", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": false}, {"question": "Conceptual exercise: A point on $xy = 9$ has parameter $t = 3$. What are its coordinates, and what is the gradient of the tangent there? (2 steps)", "answer": "- Step 1: Coordinates: $(ct, c/t) = (3 \\cdot 3, 3/3) = (9, 1)$. Verify: $xy = 9 \\times 1 = 9$. ✓.\n- Step 2: Gradient of tangent: $\\frac{dy}{dx} = -1/t^2 = -1/9$. The tangent has a gentle negative slope, consistent with the hyperbola decreasing in the first quadrant.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": false}, {"question": "Conceptual exercise: On $y^2 = 4x$ (so $a = 1$), a point has parameter $t = 2$. What are the coordinates, and what is the tangent equation? (2 steps)", "answer": "- Step 1: Coordinates: $(at^2, 2at) = (1 \\cdot 4, 2 \\cdot 1 \\cdot 2) = (4, 4)$. Verify: $y^2 = 16 = 4 \\times 4 = 4x$. ✓.\n- Step 2: Tangent equation: $ty = x + at^2$, so $2y = x + 4$, or $x = 2y - 4$. Verify the point lies on it: $4 = 2(4) - 4 = 4$. ✓. Verify gradient: rearranging $2y = x + 4$ gives $y = x/2 + 2$, gradient $1/2 = 1/t$. ✓.", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": false}, {"question": "What is the complete list of formulas for the parabola $y^2 = 4ax$ that are NOT in the formula booklet and must be memorized? (1 step)", "answer": "The parabola formulas NOT in the booklet are:\n+ Parametric form: $(at^2, 2at)$\n+ Focus: $(a, 0)$; Directrix: $x = -a$\n+ Tangent at $(at^2, 2at)$: $ty = x + at^2$\n+ Normal at $(at^2, 2at)$: $y + tx = 2at + at^3$\n+ Focal chord theorem: $t_1 t_2 = -1 \\Leftrightarrow$ chord through focus\n+ Directrix-as-polar theorem: tangents at ends of focal chord meet on directrix", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": false}, {"question": "What is the complete list of formulas for the rectangular hyperbola $xy = c^2$ that are NOT in the formula booklet and must be memorized? (1 step)", "answer": "The rectangular hyperbola formulas NOT in the booklet are:\n+ Parametric form: $(ct, c/t)$\n+ Gradient at $(ct, c/t)$: $\\frac{dy}{dx} = -1/t^2$\n+ Tangent at $(ct, c/t)$: $x + t^2 y = 2ct$\n+ Normal at $(ct, c/t)$: $t^3 x - ty = c(t^4 - 1)$", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": false}, {"question": "In the May 2023 paper, which question was the only \"clean\" one (no redo tag), and what does this reveal about the learner's strengths? (2 steps)", "answer": "- Step 1: Q6 (complex numbers: $|z_1+z_2|$, $w = z_2 z_3 / z_1$, find $a, b$, $\\arg w$) was the only clean question. The learner found it straightforward — no conceptual gaps or procedural errors.\n- Step 2: This reveals that complex arithmetic (modulus, conjugate division, equating real/imaginary parts, argument) is a strength. The weaknesses are in coordinate geometry (hyperbola/parabola — gap topics), matrix area scale factor ($\\pm$ trap), roots-of-polynomial algebra (factor trick), and induction (add-and-subtract trick). Focus revision time on the weak areas.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": false}, {"question": "What pattern emerges from the cross-paper analysis regarding which topics appear on every FP1 paper? (2 steps)", "answer": "- Step 1: Transformed-roots quadratics (Q5-type) appear on every paper. Complex-conjugate quartic factor patterns are the most repeated complex-numbers question type. Induction (divisibility or matrix) appears on every paper.\n- Step 2: Coordinate geometry (hyperbola/parabola) also appears consistently, but was a gap topic for this learner across three papers. The action item is clear: self-study these chapters urgently, as they will appear on the actual exam. The pattern also shows that linear interpolation has appeared on multiple papers — memorize the closed-form formula.", "source": "GLM 5.1 ③", "_id": "glm_3_70", "judge_pick": false}, {"question": "When the question asks for $\\arg w$ \"in radians to 4 significant figures,\" and $w$ is in the first quadrant with $\\tan\\theta = 14.5$, approximately how close is $\\theta$ to $\\pi/2$, and why? (2 steps)", "answer": "- Step 1: $\\arctan(14.5) \\approx 1.502$ rad. Since $\\pi/2 \\approx 1.5708$ rad, the argument is close to (but less than) $\\pi/2$. This makes sense: a very large $\\tan\\theta$ means $\\theta$ is approaching $\\pi/2$ from below.\n- Step 2: Geometrically, $w = 4/13 + 58i/13$ has a very small positive real part and a large positive imaginary part, placing it close to the positive imaginary axis. The angle is nearly $90°$ but not quite, since the real part is still positive (not zero). If the real part were zero, $\\arg w = \\pi/2$ exactly.", "source": "GLM 5.1 ③", "_id": "glm_3_71", "judge_pick": false}, {"question": "Why is it important to explicitly state \"$f$ is continuous\" when using the sign-change rule to locate a root? (2 steps)", "answer": "- Step 1: The Intermediate Value Theorem requires continuity as a hypothesis. Without it, a sign change does not guarantee a root — the function could have a jump discontinuity that skips over zero.\n- Step 2: For example, $f(x) = 1/x$ on $[-1, 1]$: $f(-1) = -1 < 0$ and $f(1) = 1 > 0$, but there's no root — $f$ has a vertical asymptote at $x = 0$ and is not continuous. In FP1, the functions given (polynomials, $x^{3/2} + x - 3$, etc.) are always continuous on the given intervals, but you must state it to earn the method mark.", "source": "GLM 5.1 ③", "_id": "glm_3_72", "judge_pick": true}, {"question": "What is the difference between the interval bisection result and the linear interpolation result for the same interval, and why might they differ? (2 steps)", "answer": "- Step 1: Bisection always gives the midpoint: $x_1 = (a+b)/2$. Linear interpolation gives a weighted position based on the function values: $x_1 = a - \\frac{f(a)(b-a)}{f(b)-f(a)}$. They generally give different answers.\n- Step 2: They differ because bisection ignores the function values (only uses their signs), while linear interpolation uses the magnitudes. If $|f(a)| \\ll |f(b)|$, linear interpolation places $x_1$ closer to $a$ (where the function is nearer to zero), which is typically a better approximation. Bisection is simpler but less efficient — it always halves the interval regardless of where the root actually is.", "source": "GLM 5.1 ③", "_id": "glm_3_73", "judge_pick": false}, {"question": "Conceptual exercise: For $f(x) = x^2 - 5$ on $[2, 3]$, use mental arithmetic to find the bisection midpoint and check the sign. Is the root in $[2, 2.5]$ or $[2.5, 3]$? (2 steps)", "answer": "- Step 1: Midpoint: $m = 2.5$. Evaluate: $f(2.5) = 6.25 - 5 = 1.25 > 0$. We know $f(2) = 4 - 5 = -1 < 0$.\n- Step 2: Sign change between $f(2) < 0$ and $f(2.5) > 0$, so the root is in $[2, 2.5]$. The actual root is $\\sqrt{5} \\approx 2.236$, which is indeed in $[2, 2.5]$. ✓.", "source": "GLM 5.1 ③", "_id": "glm_3_74", "judge_pick": false}, {"question": "When building a new quadratic with integer coefficients from transformed roots, what is the final step after writing $x^2 - Sx + P = 0$? (2 steps)", "answer": "- Step 1: If $S$ and $P$ are fractions, multiply through by the lowest common denominator (LCD) to clear all fractions and make all coefficients integers.\n- Step 2: For $x^2 - \\frac{3}{5}x + \\frac{3}{40} = 0$: the LCD of 5 and 40 is 40. Multiplying: $40x^2 - 24x + 3 = 0$. The question specifies \"integers $p, q, r$,\" so this step is mandatory. Always check that all coefficients are integers with no common factor (though the exam usually accepts non-simplified integer forms).", "source": "GLM 5.1 ③", "_id": "glm_3_75", "judge_pick": false}, {"question": "In polynomial long division of $2x^4 - 8x^3 + 29x^2 - 12x + 39$ by $x^2 - 4x + 13$, how do you determine the first term of the quotient, and what should the final quotient look like? (2 steps)", "answer": "- Step 1: Divide the leading term of the dividend by the leading term of the divisor: $2x^4 \\div x^2 = 2x^2$. This is the first term of the quotient.\n- Step 2: Since we're dividing a degree-4 polynomial by a degree-2 polynomial, the quotient must be degree-2. So the quotient has the form $2x^2 + bx + c$. After completing the division, the quotient is $2x^2 + 0x + 3 = 2x^2 + 3$ (the $x$ coefficient is zero), and the remainder is zero. If the quotient had more or fewer terms, or the remainder weren't zero, something went wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_76", "judge_pick": false}, {"question": "What is the symmetric identity for $\\alpha^3 + \\beta^3$, and when might you need it? (2 steps)", "answer": "- Step 1: $$\\alpha^3 + \\beta^3 = (\\alpha + \\beta)^3 - 3\\alpha\\beta(\\alpha + \\beta)$$. This is NOT in the booklet. Derivation: $(\\alpha+\\beta)^3 = \\alpha^3 + 3\\alpha^2\\beta + 3\\alpha\\beta^2 + \\beta^3 = \\alpha^3 + \\beta^3 + 3\\alpha\\beta(\\alpha+\\beta)$, so $\\alpha^3 + \\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$.\n- Step 2: You need this when evaluating expressions like $\\alpha^3 + \\beta^3$ or when new roots involve cubes (e.g., $\\alpha'^3 + \\beta'^3$). It follows the same philosophy as $\\alpha^2 + \\beta^2$: express everything in terms of $\\alpha + \\beta$ and $\\alpha\\beta$.", "source": "GLM 5.1 ③", "_id": "glm_3_77", "judge_pick": false}, {"question": "What is the identity for $(\\alpha - \\beta)^2$ in terms of $\\alpha + \\beta$ and $\\alpha\\beta$, and what does it tell you about the roots? (2 steps)", "answer": "- Step 1: $$(\\alpha - \\beta)^2 = (\\alpha + \\beta)^2 - 4\\alpha\\beta$$. Derivation: $(\\alpha - \\beta)^2 = \\alpha^2 - 2\\alpha\\beta + \\beta^2 = (\\alpha^2 + \\beta^2) - 2\\alpha\\beta = [(\\alpha+\\beta)^2 - 2\\alpha\\beta] - 2\\alpha\\beta = (\\alpha+\\beta)^2 - 4\\alpha\\beta$.\n- Step 2: This tells you the squared distance between the roots. If $(\\alpha+\\beta)^2 = 4\\alpha\\beta$, then $(\\alpha-\\beta)^2 = 0$ and the roots are equal (repeated root). If $(\\alpha+\\beta)^2 > 4\\alpha\\beta$, the roots are real and distinct. If $(\\alpha+\\beta)^2 < 4\\alpha\\beta$, the roots are complex. This is equivalent to the discriminant condition $b^2 - 4ac$.", "source": "GLM 5.1 ③", "_id": "glm_3_78", "judge_pick": true}, {"question": "In the matrix equation $BC = D$, why must you pre-multiply by $B^{-1}$ (getting $C = B^{-1}D$) rather than post-multiply (getting $C = DB^{-1}$)? (2 steps)", "answer": "- Step 1: Matrix multiplication is not commutative: $BC \\ne CB$ in general. To isolate $C$ from $BC = D$, you need to \"undo\" the left-multiplication by $B$, which requires left-multiplying both sides by $B^{-1}$: $B^{-1}(BC) = B^{-1}D \\Rightarrow (B^{-1}B)C = B^{-1}D \\Rightarrow C = B^{-1}D$.\n- Step 2: If you right-multiplied: $(BC)B^{-1} = DB^{-1}$, but this gives $B(CB^{-1}) = DB^{-1}$, which does NOT simplify to $C = DB^{-1}$ because $B$ and $CB^{-1}$ don't cancel (matrix multiplication is associative but not commutative). The rule: whatever side $B$ is on relative to $C$, put $B^{-1}$ on the same side of both sides of the equation.", "source": "GLM 5.1 ③", "_id": "glm_3_79", "judge_pick": false}], "count": 80}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "(3 steps) Why does expanding $ r(r+2)^2 $ give $ r^3 + 4r^2 + 4r $? Show algebraic steps.", "answer": "- Step 1: Expand $ (r+2)^2 = r^2 + 4r + 4 $\n- Step 2: Multiply by $ r $:  \n  $ r(r^2 + 4r + 4) = r^3 + 4r^2 + 4r $\n+ Example: For $ r=1 $: $ (1+2)^2 = 9 $, $ r(r+2)^2 = 9 $, matches $ 1^3 + 4(1)^2 + 4(1) = 9 $\n\n[Optional: Why this matters: Correct expansion is critical for applying standard summation formulas]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "(3 steps) Why must the conjugate $ 2-3i $ also be a root of the quartic?", "answer": "- Step 1: Conjugate-pair theorem applies because coefficients are real  \n- Step 2: If $ z = a+bi $ is a root, then $ \\bar{z} = a-bi $ must be a root  \n- Step 3: Polynomial division preserves real coefficients when dividing by $ (x-(2+3i))(x-(2-3i)) $\n\n+ Counterexample: Complex roots without conjugates would create complex coefficients in the polynomial", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "(4 steps) Why does the gradient of the normal to $ xy=9 $ at $ P(3t, 3/t) $ equal $ t^2 $?", "answer": "- Step 1: Implicit differentiation: $ y + x\\frac{dy}{dx} = 0 \\Rightarrow \\frac{dy}{dx} = -\\frac{y}{x} $  \n- Step 2: At $ P $: $ \\frac{dy}{dx} = -\\frac{3/t}{3t} = -\\frac{1}{t^2} $  \n- Step 3: Normal gradient is negative reciprocal: $ -1/(-1/t^2) = t^2 $  \n- Step 4: Faster alternative: $ y = 9/x \\Rightarrow \\frac{dy}{dx} = -9/x^2 = -1/t^2 $ at $ x=3t $\n\n+ Edge case: What happens if $ t=0 $? (Not allowed - hyperbola undefined)", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why does the area scale factor of 3 imply $ |\\det A| = 3 $ rather than $ \\det A = 3 $?", "answer": "- Step 1: Determinant gives signed area scale factor  \n- Step 2: Absolute value gives actual area change (always positive)  \n- Step 3: Two possible solutions: $ \\det A = +3 $ or $ -3 $  \n- Step 4: Geometric interpretation: Negative determinant reverses orientation but preserves area magnitude\n\n+ Misconception probe: Why not just one solution? Because determinant measures *oriented* area change", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": true}, {"question": "(3 steps) Why does $ \\alpha\\beta^2 + \\beta\\alpha^2 = \\alpha\\beta(\\alpha+\\beta) $ hold?", "answer": "- Step 1: Factor common terms: both terms have $ \\alpha\\beta $  \n- Step 2: $ \\alpha\\beta^2 + \\beta\\alpha^2 = \\alpha\\beta(\\beta + \\alpha) $  \n- Step 3: Commutative property: $ \\beta + \\alpha = \\alpha + \\beta $\n\n+ Application: This factorization simplifies calculating $ \\alpha' + \\beta' $ in part (b)", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "(3 steps) Why do we multiply numerator and denominator by $ 3-2i $ in part (b)?", "answer": "- Step 1: Conjugate multiplication removes imaginary parts from denominator  \n- Step 2: $ (a+bi)(a-bi) = a^2 + b^2 $ (real number)  \n- Step 3: Preserves equality because we multiply by 1 in form $ \\frac{3-2i}{3-2i} $\n\n+ Visual intuition: Rotates complex number to align with real axis", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "(3 steps) Why does linear interpolation use the formula $ x_1 = a - \\frac{f(a)(b-a)}{f(b)-f(a)} $?", "answer": "- Step 1: Similar triangles: $ \\frac{x_1-a}{f(a)} = \\frac{b-a}{f(b)-f(a)} $  \n- Step 2: Cross-multiplying: $ (x_1-a)(f(b)-f(a)) = (b-a)f(a) $  \n- Step 3: Solving for $ x_1 $: $ x_1 = a + \\frac{(b-a)f(a)}{f(b)-f(a)} $  \n- Step 4: Final form rearranged: $ x_1 = a - \\frac{f(a)(b-a)}{f(b)-f(a)} $\n\n+ Contrast with Newton-Raphson: Uses linear approximation vs. tangent line", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": true}, {"question": "(3 steps) Why do tangents at ends of focal chords meet on the directrix?", "answer": "- Step 1: For $ y^2=4ax $, focal chord condition: $ t_1 t_2 = -1 $  \n- Step 2: Tangent equations: $ t_1 y = x + 2a t_1^2 $ and $ t_2 y = x + 2a t_2^2 $  \n- Step 3: Solving gives $ x = -a $ (directrix) when $ t_1 t_2 = -1 $  \n- Step 4: Geometric interpretation: Directrix is the polar of the focus\n\n+ Visual intuition: Tangents reflect rays from focus into parallel beams", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "(3 steps) Why does adding and subtracting $ 18k $ help in the induction proof?", "answer": "- Step 1: Goal: Express $ f(k+1) $ in terms of $ f(k) $ plus multiple of 18  \n- Step 2: $ f(k+1) = 4f(k) - 18(k-2) $ shows combination of divisible terms  \n- Step 3: This guarantees divisibility by 18 if $ f(k) $ is divisible by 18  \n- Step 4: Avoids needing to prove $ 4^k + 2 $ divisible by 6 separately\n\n+ Contrast approach: Directly proving $ 4^{k+1} + 6(k+1) - 10 $ divisible by 18 would be more complex\n```\n\n## JARGON TABLE\n\n| | What does it mean? |\n| --- | --- |\n| **Series** | |\n| Standard summation results | Pre-derived formulas for $ \\sum r $, $ \\sum r^2 $, $ \\sum r^3 $ |\n| Common denominator technique | Factoring common terms before expanding polynomial brackets |\n| **Complex Numbers** | |\n| Conjugate pair | If $ a+bi $ is a root, so is $ a-bi $ for real-coefficient polynomials |\n| Quadratic factor | $ (z-z_1)(z-\\bar{z}_1) = z^2 - 2\\text{Re}(z_1)z + |z_1|^2 $ |\n| **Coordinate Geometry** | |\n| Rectangular hyperbola | Curve $ xy = c^2 $ with parametric form $ (ct, c/t) $ |\n| Focal chord | Chord passing through focus of conic section |\n| **Matrices** | |\n| Area scale factor | Absolute value of determinant of transformation matrix |\n| **Polynomials** | |\n| Vieta's formulas | Relate coefficients to sums/products of roots |\n| Symmetric identities | Expressions like $ \\alpha^2 + \\beta^2 $ derivable from $ \\alpha + \\beta $ and $ \\alpha\\beta $ |\n| **Numerical Methods** | |\n| Linear interpolation | Root approximation using straight line between two interval endpoints |\n| Newton-Raphson | Iterative root-finding using tangent lines |\n| **Proof** | |\n| Mathematical induction | Prove for $ n=1 $, assume true for $ n=k $, prove for $ n=k+1 $ |\n\n## FORMULA TABLE\n\n| $$LHS = ?$$ | Answer | Name / Hint |\n| --- | --- | --- |\n| **Series** | | |\n| $$\\sum r$$ | $$= \\tfrac{1}{2}n(n+1)$$ | Not in booklet |\n| $$\\sum r^2$$ | $$= \\tfrac{1}{6}n(n+1)(2n+1)$$ | In booklet |\n| $$\\sum r^3$$ | $$= \\tfrac{1}{4}n^2(n+1)^2$$ | In booklet |\n| **Complex Numbers** | | |\n| $$(z-z_1)(z-\\bar{z}_1)$$ | $$= z^2 - 2\\text{Re}(z_1)z + |z_1|^2$$ | Quadratic factor |\n| **Coordinate Geometry** | | |\n| $$(ct, c/t)$$ | $$xy = c^2$$ | Hyperbola parametric |\n| $$(at^2, 2at)$$ | $$y^2 = 4ax$$ | Parabola parametric |\n| **Matrices** | | |\n| $$\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}^{-1}$$ | $$= \\frac{1}{ad-bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$$ | 2×2 inverse |\n| **Polynomials** | | |\n| $$\\alpha^2 + \\beta^2$$ | $$= (\\alpha+\\beta)^2 - 2\\alpha\\beta$$ | Symmetric identity |\n| **Numerical Methods** | | |\n| $$x_1 = a - \\frac{f(a)(b-a)}{f(b)-f(a)}$$ | Linear interpolation | Formula |\n| **Proof** | | |\n| $$x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$$ | Newton-Raphson | In booklet |", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}], "count": 9}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Expand $ \\sum_{r=1}^n r(r+2)^2 $ into standard summation forms and explain why the expansion is critical to avoid errors. (3 steps)", "answer": "- Step 1: Expand $ r(r+2)^2 $:  \n  $$\n  r(r^2 + 4r + 4) = r^3 + 4r^2 + 4r\n  $$  \n  + **Misconception**: Confusing $ r(r+2)^2 $ with $ r^2(r+2) $ leads to $ r^3 + 2r^2 $, which is incorrect. Always expand fully.  \n- Step 2: Split the sum:  \n  $$\n  \\sum r^3 + 4\\sum r^2 + 4\\sum r\n  $$  \n  + Use standard formulas:  \n    $$\n    \\sum r^3 = \\tfrac{1}{4}n^2(n+1)^2,\\quad \\sum r^2 = \\tfrac{1}{6}n(n+1)(2n+1),\\quad \\sum r = \\tfrac{1}{2}n(n+1)\n    $$  \n- Step 3: Combine terms over a common denominator (12) and factor out $ \\tfrac{1}{12}n(n+1) $:  \n  $$\n  \\tfrac{1}{12}n(n+1)[3n(n+1) + 8(2n+1) + 24] = \\tfrac{1}{12}n(n+1)(3n^2 + 19n + 32)\n  $$  \n  + **Key Insight**: Factoring early simplifies polynomial manipulation and avoids arithmetic errors.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Given a complex root $ 2 + 3i $, explain how to derive the quadratic factor of a polynomial with real coefficients and solve for remaining roots. (4 steps)", "answer": "- Step 1: Use the conjugate pair theorem:  \n  $$\n  \\text{If } 2 + 3i \\text{ is a root, then } 2 - 3i \\text{ is also a root.}\n  $$  \n- Step 2: Form the quadratic factor using $ (z - z_1)(z - \\bar{z}_1) $:  \n  $$\n  z^2 - 2\\Re(z_1)z + |z_1|^2 = z^2 - 4z + 13\n  $$  \n  + $ \\Re(z_1) = 2,\\quad |z_1|^2 = 2^2 + 3^2 = 13 $.  \n- Step 3: Polynomial division: Divide the original quartic by $ z^2 - 4z + 13 $ to get $ 2x^2 + 3 $.  \n- Step 4: Solve $ 2x^2 + 3 = 0 $:  \n  $$\n  x = \\pm \\tfrac{i\\sqrt{6}}{2}\n  $$  \n  + **Edge Case**: The roots $ \\pm \\tfrac{i\\sqrt{6}}{2} $ lie purely on the imaginary axis in the Argand diagram.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "For the hyperbola $ xy = 9 $ with parametric point $ P(3t, 3/t) $, derive the equation of the normal at $ P $. (4 steps)", "answer": "- Step 1: Implicit differentiation of $ xy = 9 $:  \n  $$\n  y + x\\frac{dy}{dx} = 0 \\Rightarrow \\frac{dy}{dx} = -\\frac{y}{x}\n  $$  \n  At $ P(3t, 3/t) $:  \n  $$\n  \\frac{dy}{dx} = -\\frac{3/t}{3t} = -\\frac{1}{t^2}\n  $$  \n- Step 2: Gradient of the normal is the negative reciprocal:  \n  $$\n  t^2\n  $$  \n- Step 3: Equation of the normal line at $ P $:  \n  $$\n  y - \\tfrac{3}{t} = t^2(x - 3t)\n  $$  \n- Step 4: Multiply through by $ t $ to eliminate the denominator:  \n  $$\n  ty - 3 = t^3x - 3t^4 \\Rightarrow ty - t^3x = 3(1 - t^4)\n  $$  \n  + **Visual Insight**: The normal intersects the hyperbola again at a point symmetric with respect to the origin due to the hyperbola’s symmetry.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "For matrix $ A = \\begin{pmatrix} -3 & 8 \\\\ -3 & k \\end{pmatrix} $, determine possible values of $ k $ if the area scale factor is 3. (3 steps)", "answer": "- Step 1: Compute the determinant of $ A $:  \n  $$\n  \\det A = (-3)(k) - (8)(-3) = -3k + 24\n  $$  \n- Step 2: Set the absolute value of the determinant equal to the area scale factor:  \n  $$\n  |\\det A| = 3 \\Rightarrow |-3k + 24| = 3\n  $$  \n- Step 3: Solve $ -3k + 24 = \\pm 3 $:  \n  + $ -3k + 24 = 3 \\Rightarrow k = 7 $  \n  + $ -3k + 24 = -3 \\Rightarrow k = 9 $  \n  + **Misconception**: Forgetting the absolute value leads to only one solution. Always split into $ \\pm $ cases.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": true}, {"question": "Given $ f(x) = x^2 - 6x + 3 $, compute $ (\\alpha^2 + 1)(\\beta^2 + 1) $ using Vieta’s formulas. (3 steps)", "answer": "- Step 1: Use Vieta’s: $ \\alpha + \\beta = 6,\\quad \\alpha\\beta = 3 $.  \n- Step 2: Expand the product:  \n  $$\n  (\\alpha^2 + 1)(\\beta^2 + 1) = (\\alpha\\beta)^2 + (\\alpha^2 + \\beta^2) + 1\n  $$  \n  Compute $ \\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta = 36 - 6 = 30 $.  \n- Step 3: Substitute values:  \n  $$\n  9 + 30 + 1 = 40\n  $$  \n  + **Key Trick**: Factor $ \\alpha\\beta^2 + \\beta\\alpha^2 = \\alpha\\beta(\\alpha + \\beta) $ when manipulating symmetric identities.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "For complex numbers $ z_1 = 3 + 2i $, $ z_2 = 2 + 3i $, and $ z_3 = a + bi $, derive the real and imaginary parts of $ w = \\frac{z_2 z_3}{z_1} $. (4 steps)", "answer": "- Step 1: Multiply $ z_2 z_3 $:  \n  $$\n  (2 + 3i)(a + bi) = (2a - 3b) + (3a + 2b)i\n  $$  \n- Step 2: Rationalize by multiplying numerator and denominator by $ \\bar{z}_1 = 3 - 2i $:  \n  $$\n  \\frac{(2a - 3b) + (3a + 2b)i}{3 + 2i} \\cdot \\frac{3 - 2i}{3 - 2i}\n  $$  \n- Step 3: Compute numerator:  \n  - Real: $ 3(2a - 3b) + 2(3a + 2b) = 12a - 5b $  \n  - Imaginary: $ -2(2a - 3b) + 3(3a + 2b) = 5a + 12b $  \n- Step 4: Divide by $ |z_1|^2 = 13 $:  \n  $$\n  w = \\frac{12a - 5b}{13} + \\frac{5a + 12b}{13}i\n  $$  \n  + **Quadrant Note**: The argument depends on the signs of the real and imaginary parts.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Use linear interpolation on $ [1.25, 1.5] $ to approximate a root of $ f(x) = x^{3/2} + x - 3 $. (3 steps)", "answer": "- Step 1: Compute $ f(1.25) = -0.352 $, $ f(1.5) = 0.337 $.  \n- Step 2: Apply the linear interpolation formula:  \n  $$\n  x_1 = a - \\frac{f(a)(b - a)}{f(b) - f(a)} = 1.25 - \\frac{(-0.352)(0.25)}{0.337 - (-0.352)} = 1.25 + 0.1278 = 1.378\n  $$  \n- Step 3: Verify $ x_1 \\in [1.25, 1.5] $.  \n  + **Misconception**: Forgetting the formula leads to trial-and-error. Always memorize: $ x_1 = a - \\frac{f(a)(b-a)}{f(b)-f(a)} $.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "For the parabola $ y^2 = 8x $, show that the chord $ PQ $ with parameters $ t_1 = p $ and $ t_2 = -1/p $ passes through the focus $ (2, 0) $. (3 steps)", "answer": "- Step 1: Parametric coordinates:  \n  - $ P(2p^2, 4p) $, $ Q(2/p^2, -4/p) $.  \n- Step 2: Compute the slope of $ PQ $:  \n  $$\n  m = \\frac{4p + 4/p}{2p^2 - 2/p^2} = \\frac{2p}{p^2 - 1}\n  $$  \n- Step 3: Equation of the line through $ P $:  \n  $$\n  y - 4p = \\frac{2p}{p^2 - 1}(x - 2p^2)\n  $$  \n  Substitute $ x = 2 $:  \n  $$\n  y = 4p + \\frac{2p}{p^2 - 1}(2 - 2p^2) = 0 \\Rightarrow (2, 0) \\text{ lies on the chord}.\n  $$  \n  + **General Theorem**: For parameters $ t_1, t_2 $, the chord passes through the focus iff $ t_1 t_2 = -1 $.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Prove by induction that $ 4^n + 6n - 10 $ is divisible by 18 for $ n \\ge 1 $. (4 steps)", "answer": "- Step 1: **Base Case** $ n = 1 $: $ 4 + 6 - 10 = 0 $, divisible by 18.  \n- Step 2: **Inductive Hypothesis**: Assume $ 4^k + 6k - 10 = 18m $.  \n- Step 3: **Inductive Step**:  \n  $$\n  f(k+1) = 4^{k+1} + 6(k+1) - 10 = 4 \\cdot 4^k + 6k + 6 - 10 = 4 \\cdot 4^k + 6k - 4\n  $$  \n  Subtract $ f(k) $:  \n  $$\n  f(k+1) - f(k) = 3 \\cdot 4^k + 6 = 3(4^k + 2)\n  $$  \n  Show $ 4^k + 2 \\equiv 4 + 2 = 6 \\mod 6 \\Rightarrow 3(4^k + 2) = 18r $.  \n- Step 4: **Conclusion**: $ f(k+1) = 18(m + r) $, so divisible by 18.  \n  + **Trick**: Add/subtract $ 18k $ to express $ f(k+1) $ in terms of $ f(k) $.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}], "count": 9}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Write out the three standard summation formulas needed for $\\sum_{r=1}^n r(r+2)^2$: $\\sum r$, $\\sum r^2$, and $\\sum r^3$. (1 step)", "answer": "- Step 1: $\\sum_{r=1}^n r = \\frac{1}{2}n(n+1)$, $\\sum_{r=1}^n r^2 = \\frac{1}{6}n(n+1)(2n+1)$, $\\sum_{r=1}^n r^3 = \\frac{1}{4}n^2(n+1)^2$. Note: $\\sum r$ is NOT in the formula booklet and must be memorized.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "When evaluating $\\sum_{r=1}^n (r^3 + 4r^2 + 4r)$, what is the key manipulation technique to obtain the factored form $\\frac{1}{12}n(n+1)(an^2 + bn + c)$? (2 steps)", "answer": "- Step 1: Write each term with denominator 12: $\\frac{3}{12}n^2(n+1)^2 + \\frac{8}{12}n(n+1)(2n+1) + \\frac{24}{12}n(n+1)$\n- Step 2: Factor out $\\frac{1}{12}n(n+1)$ from all three terms, then simplify the remaining bracket to obtain $3n(n+1) + 8(2n+1) + 24$\n\n[Takeaway: Always factor out the common $\\frac{1}{12}n(n+1)$ first — this is the \"factor-early\" trick that makes simplification clean.]", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "If the expanded form of $\\sum_{r=1}^n r(r+2)^2$ is $\\frac{1}{12}n(n+1)(3n^2 + 19n + 32)$, what are the integer values of $a$, $b$, and $c$? (1 step)", "answer": "- Step 1: $a = 3$, $b = 19$, $c = 32$. Verify by checking $n=1$: LHS $= 1 \\times 3^2 = 9$, RHS $= \\frac{1}{12} \\times 1 \\times 2 \\times 54 = 9$ ✓. (Note: $a=3, b=11, c=4$ would give $n=1 \\to 3$, which is wrong.)", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "For a polynomial with real coefficients and a complex root $z = 2 + 3i$, what other root must also exist? Explain why. (1 step)", "answer": "- Step 1: The conjugate $2 - 3i$ must also be a root. This follows from the conjugate pair rule: for polynomials with real coefficients, complex roots occur in conjugate pairs because if $f(z) = 0$, then taking complex conjugates gives $f(\\bar{z}) = \\overline{f(z)} = 0$.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Given a complex root $z_1 = 2 + 3i$ of a polynomial with real coefficients, how do you construct the quadratic factor $(z - z_1)(z - \\bar{z}_1)$ in the form $z^2 - Az + B$? (2 steps)", "answer": "- Step 1: Use the formula $(z - z_1)(z - \\bar{z}_1) = z^2 - 2\\,\\text{Re}(z_1)\\,z + |z_1|^2$\n- Step 2: Here $\\text{Re}(z_1) = 2$ a
