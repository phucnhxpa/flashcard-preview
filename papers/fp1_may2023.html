/t^2 < 0$$ everywhere — both branches are decreasing.", "source": "Opus 4 ②", "_id": "opus_2_76"}, {"question": "Why isn't it sufficient to just check the base case $$n = 1$$ and conclude divisibility holds for all $$n$$? (3 steps)", "answer": "- Step 1: A base case alone shows the property is true for ONE specific value. There's no logical bridge from $$n = 1$$ to $$n = 2, 3, 4, \\ldots$$.\n- Step 2: Induction's full power lies in the **inductive step**: showing that if the property holds for $$n = k$$, it must also hold for $$n = k+1$$. This creates a chain: $$1 \\Rightarrow 2 \\Rightarrow 3 \\Rightarrow \\ldots$$.\n- Step 3: Without the inductive step, you only have isolated facts. Counterexamples exist where a property holds for $$n=1, \\ldots, 39$$ but fails at $$n = 40$$ (e.g. Euler's $$n^2 + n + 41$$ produces primes for $$n = 0, \\ldots, 39$$).\n\nTakeaway: base case alone is not enough. The inductive step is the engine.", "source": "Opus 4 ②", "_id": "opus_2_77"}, {"question": "What happens to the focal chord theorem $$t_1 t_2 = -1$$ if you pick parameter $$t_1$$ such that the corresponding point is the vertex? (3 steps)", "answer": "- Step 1: The vertex of $$y^2 = 4ax$$ is at $$(0, 0)$$, which corresponds to parameter $$t = 0$$ (since $$(at^2, 2at) = (0,0)$$ at $$t=0$$).\n- Step 2: For $$t_1 = 0$$, the focal chord criterion $$t_1 t_2 = -1$$ requires $$0 \\cdot t_2 = -1$$, which is impossible.\n- Step 3: Geometrically: the only line through the vertex that *also* passes through the focus is the axis itself ($$y = 0$$), but this line meets the parabola only at the vertex (a tangent there), not at two distinct points. So there's no focal chord with one endpoint at the vertex — consistent with $$t_1 t_2 = -1$$ having no solution.\n\nTakeaway: $$t = 0$$ (vertex) is excluded from focal chord setups — algebraically and geometrically.", "source": "Opus 4 ②", "_id": "opus_2_78"}, {"question": "Why does the conjugate-pair rule require **real** coefficients? What goes wrong if a polynomial has complex coefficients? (3 steps)", "answer": "- Step 1: The proof uses the property: if $$p(x) = a_n x^n + \\ldots + a_0$$ has all real $$a_i$$, then $$\\overline{p(z)} = p(\\bar z)$$ for any $$z \\in \\mathbb{C}$$.\n- Step 2: This property comes from $$\\overline{a_i z^i} = \\bar a_i \\bar z^i = a_i \\bar z^i$$ (the last equality uses real $$a_i = \\bar a_i$$). Sum over $$i$$ to get $$\\overline{p(z)} = p(\\bar z)$$.\n- Step 3: If coefficients are complex, $$\\bar a_i \\neq a_i$$, so $$\\overline{p(z)} \\neq p(\\bar z)$$. Then $$p(z_1) = 0$$ does NOT imply $$p(\\bar z_1) = 0$$. Counterexample: $$p(z) = z - i$$. Root is $$z = i$$. But $$\\bar z = -i$$ gives $$p(-i) = -i - i = -2i \\neq 0$$.\n\nTakeaway: real coefficients are essential for conjugate-pair symmetry. The proof breaks otherwise.", "source": "Opus 4 ②", "_id": "opus_2_85"}, {"question": "Why does FP1 favor the \"factor into a quadratic, then divide\" approach for quartics with one complex root, rather than just expanding $$(x - z_1)(x - \\bar z_1)(x - r_1)(x - r_2)$$? (3 steps)", "answer": "- Step 1: If you knew all four roots, you could expand the full product. But you only know one (the given complex root). The unknowns $$r_1, r_2$$ would need to be determined.\n- Step 2: The two-step approach is computationally efficient: build the **known** quadratic factor (from the conjugate pair) and divide the quartic to expose the **unknown** quadratic factor as the quotient. Solving the quotient gives the remaining roots.\n- Step 3: This is a \"divide and conquer\" approach: reduce a degree-4 problem to a degree-2 problem via polynomial division. It's also more error-resistant than guessing real roots.\n\nTakeaway: known factor + division = systematic, efficient. Don't try to guess all four roots at once.", "source": "Opus 4 ②", "_id": "opus_2_87"}, {"question": "Suppose for $$f(x) = x^3 - 3x + 1$$, you apply linear interpolation on $$[0, 1]$$. What is the $$x_1$$ estimate, and is the chord above or below the function? (3 steps)", "answer": "- Step 1: $$f(0) = 1, f(1) = -1$$. Sign change confirms root in $$(0, 1)$$. Closed-form: $$x_1 = 0 - \\tfrac{1 \\cdot 1}{-1 - 1} = -\\tfrac{1}{-2} = 0.5$$.\n- Step 2: True root from cubic: $$\\approx 0.347$$. So $$x_1 = 0.5$$ overshoots.\n- Step 3: Why? On $$[0, 1]$$, $$f''(x) = 6x \\geq 0$$, so $$f$$ is **concave up** (convex). The chord lies *above* the curve, so the chord crosses the $$x$$-axis at a larger $$x$$ than the curve does. Hence overshoot.\n\nTakeaway: chord above curve = LI overshoots; chord below = undershoots. Concavity determines.", "source": "Opus 4 ②", "_id": "opus_2_88"}, {"question": "Derive the equation of the normal to $$xy = c^2$$ at the parametric point $$(ct, c/t)$$, in the form $$t^3 x - ty = c(t^4 - 1)$$. (4 steps)", "answer": "- Step 1: Differentiate implicitly: $$y + x\\tfrac{dy}{dx} = 0 \\Rightarrow \\tfrac{dy}{dx} = -y/x$$. At $$(ct, c/t)$$: $$\\tfrac{dy}{dx} = -(c/t)/(ct) = -1/t^2$$.\n- Step 2: Tangent gradient is $$-1/t^2$$, so normal gradient is $$t^2$$ (negative reciprocal).\n- Step 3: Normal line through $$(ct, c/t)$$ with gradient $$t^2$$:\n$$y - \\tfrac{c}{t} = t^2(x - ct)$$\n- Step 4: Multiply both sides by $$t$$ to clear the fraction: $$ty - c = t^3 x - c t^4$$. Rearrange to standard form: $$t^3 x - ty = c(t^4 - 1)$$.\n\nTakeaway: the multiply-by-$$t$$ step is what produces the elegant $$t^3 x - ty = c(t^4-1)$$ form.", "source": "Opus 4 ②", "_id": "opus_2_9"}, {"question": "Why is the parametric form on a parabola (or hyperbola) a \"smarter\" choice than Cartesian when working with tangents and chords? (3 steps)", "answer": "- Step 1: Cartesian form: $$y^2 = 4ax$$ implicitly relates $$x, y$$. To find the gradient, you must differentiate implicitly, getting $$\\tfrac{dy}{dx} = 2a/y$$ — depending on the (often-unknown) $$y$$-coordinate of a point.\n- Step 2: Parametric form $$(at^2, 2at)$$: a point is encoded by a single parameter $$t$$. The gradient at parameter $$t$$ is $$1/t$$ — clean, depends on $$t$$ alone.\n- Step 3: Chords and tangents become polynomials in $$t_1, t_2$$: linear in the parameters, easily solved. Vieta's-like relations like $$t_1 t_2 = -1$$ for focal chords drop out naturally.\n\nTakeaway: parametric trades Cartesian relations (implicit) for explicit single-variable expressions in $$t$$. Linear algebra in $$t$$ replaces calculus.", "source": "Opus 4 ②", "_id": "opus_2_90"}, {"question": "A polynomial of degree $$n$$ has at most $$n$$ roots in $$\\mathbb{C}$$. How does this relate to the conjugate-pair rule and the structure of FP1 quartics? (3 steps)", "answer": "- Step 1: **Fundamental theorem of algebra**: a degree-$$n$$ polynomial has *exactly* $$n$$ roots in $$\\mathbb{C}$$ (counted with multiplicity). For a quartic, that's 4 roots total.\n- Step 2: For real-coefficient quartics: the 4 roots come in two types — real or non-real complex (latter in conjugate pairs). Possible distributions:\n+ 4 real\n+ 2 real + 1 conjugate pair (i.e. 2 non-real)\n+ 2 conjugate pairs (i.e. 4 non-real)\n- Step 3: An FP1 question giving you ONE complex root tells you (a) at least 2 non-real roots (the conjugate pair), and (b) the other 2 are either both real or another complex pair. The polynomial division will reveal which.\n\nTakeaway: FTA + conjugate pairs constrain the structure; division reveals the rest.", "source": "Opus 4 ②", "_id": "opus_2_91"}, {"question": "What is the \"key insight\" that makes the induction Q9 work — the trick that bridges $$f(k+1)$$ to $$f(k)$$? (3 steps)", "answer": "- Step 1: The key insight is recognizing that $$4^{k+1} = 4 \\cdot 4^k$$. So $$f(k+1)$$ contains $$4 \\cdot 4^k$$, which is **4 times** the exponential term in $$f(k)$$.\n- Step 2: This suggests trying $$f(k+1)$$ vs $$4 \\cdot f(k)$$: if $$4 f(k)$$ matches the exponential part, the residual $$f(k+1) - 4 f(k)$$ has only polynomial terms (no exponentials).\n- Step 3: Compute residual: $$f(k+1) - 4 f(k) = (4 \\cdot 4^k + 6k - 4) - (4 \\cdot 4^k + 24k - 40) = -18k + 36 = -18(k-2)$$. Cleanly divisible by 18. ✓\n\nTakeaway: pick the multiplier to kill the exponential term. Linear residue + 18 = win.", "source": "Opus 4 ②", "_id": "opus_2_93"}, {"question": "A student writes a normal equation as \"$$y - 3/t = -1/t^2 (x - 3t)$$\" and stops — they've made a sign error. Why? (3 steps)", "answer": "- Step 1: At the parametric point $$(3t, 3/t)$$ on $$xy = 9$$, the **tangent** gradient is $$-1/t^2$$ (computed from implicit differentiation).\n- Step 2: The **normal** is perpendicular to the tangent. Two perpendicular gradients multiply to $$-1$$, so normal gradient $$= -1/(\\text{tangent gradient}) = -1/(-1/t^2) = t^2$$.\n- Step 3: The student wrote the equation with the **tangent** gradient instead of the normal gradient. Use $$+t^2$$ in the line equation. Easy slip when rushed — always verify the gradient sign matches \"normal\" not \"tangent\".\n\nTakeaway: tangent gradient $$-1/t^2$$, normal gradient $$+t^2$$. Don't mix them up.", "source": "Opus 4 ②", "_id": "opus_2_94"}, {"question": "Why do you NOT solve the quadratic $$8x^2 - 45x - 18 = 0$$ from scratch when you already know one root is $$x = 6$$? (3 steps)", "answer": "- Step 1: It's faster (and less error-prone) to use Vieta's: roots-product $$= c/a = -18/8 = -9/4$$. So if one root is 6, the other is $$(-9/4)/6 = -3/8$$.\n- Step 2: Or: roots-sum $$= -b/a = 45/8$$. So the other root is $$45/8 - 6 = -3/8$$ — same answer.\n- Step 3: Solving from scratch via quadratic formula: $$x = \\tfrac{45 \\pm \\sqrt{45^2 + 4 \\cdot 8 \\cdot 18}}{16}$$ — more arithmetic, more chances to slip. Vieta's is one-line.\n\nTakeaway: when one root is \"free\", Vieta's gives the other in one division. Don't redo work.", "source": "Opus 4 ②", "_id": "opus_2_95"}, {"question": "When applying the conjugate-pair rule, why doesn't it give you EVERY root of the polynomial automatically? (3 steps)", "answer": "- Step 1: The rule only says: if $$z$$ is a non-real complex root, then $$\\bar z$$ is also a root. It does NOT say what other roots exist.\n- Step 2: A real-coefficient quartic has 4 roots total. Knowing one complex root and its conjugate gives 2; the other 2 might be real, or might be another conjugate pair.\n- Step 3: To find the remaining 2, you need to **divide** the polynomial by the quadratic factor $$(x-z)(x-\\bar z) = x^2 - 2\\text{Re}(z)x + |z|^2$$ to get the quotient, then solve the quotient.\n\nTakeaway: conjugate-pair gives you two roots free; division gives the rest.", "source": "Opus 4 ②", "_id": "opus_2_96"}, {"question": "What happens to the rectangular hyperbola normal $$t^3 x - ty = c(t^4 - 1)$$ at $$t = \\pm 1$$? What's the geometric meaning? (3 steps)", "answer": "- Step 1: At $$t = 1$$: $$x - y = c(0) = 0$$, i.e. $$y = x$$. This is the line through the origin with slope 1.\n- Step 2: At $$t = -1$$: $$-x + y = c(0) = 0$$, i.e. $$y = x$$ again.\n- Step 3: Geometrically: $$t = \\pm 1$$ corresponds to points $$(\\pm c, \\pm c)$$ on $$xy = c^2$$ — the points where the \"diagonal\" line $$y = x$$ meets the curve. At these points, the **normal** is the line $$y = x$$ itself! Interesting symmetry: this is the axis of the rectangular hyperbola, and points on this axis have normals along it.\n\nTakeaway: $$t = \\pm 1$$ is special — points where normal coincides with the symmetry axis of the curve.", "source": "Opus 4 ②", "_id": "opus_2_99"}, {"question": "Why does the area scale factor of 3 imply $ |\\det A| = 3 $ rather than $ \\det A = 3 $?", "answer": "- Step 1: Determinant gives signed area scale factor  \n- Step 2: Absolute value gives actual area change (always positive)  \n- Step 3: Two possible solutions: $ \\det A = +3 $ or $ -3 $  \n- Step 4: Geometric interpretation: Negative determinant reverses orientation but preserves area magnitude\n\n+ Misconception probe: Why not just one solution? Because determinant measures *oriented* area change", "source": "Qwen 3 ①", "_id": "qwen_1_3"}, {"question": "(3 steps) Why does linear interpolation use the formula $ x_1 = a - \\frac{f(a)(b-a)}{f(b)-f(a)} $?", "answer": "- Step 1: Similar triangles: $ \\frac{x_1-a}{f(a)} = \\frac{b-a}{f(b)-f(a)} $  \n- Step 2: Cross-multiplying: $ (x_1-a)(f(b)-f(a)) = (b-a)f(a) $  \n- Step 3: Solving for $ x_1 $: $ x_1 = a + \\frac{(b-a)f(a)}{f(b)-f(a)} $  \n- Step 4: Final form rearranged: $ x_1 = a - \\frac{f(a)(b-a)}{f(b)-f(a)} $\n\n+ Contrast with Newton-Raphson: Uses linear approximation vs. tangent line", "source": "Qwen 3 ①", "_id": "qwen_1_6"}, {"question": "For matrix $ A = \\begin{pmatrix} -3 & 8 \\\\ -3 & k \\end{pmatrix} $, determine possible values of $ k $ if the area scale factor is 3. (3 steps)", "answer": "- Step 1: Compute the determinant of $ A $:  \n  $$\n  \\det A = (-3)(k) - (8)(-3) = -3k + 24\n  $$  \n- Step 2: Set the absolute value of the determinant equal to the area scale factor:  \n  $$\n  |\\det A| = 3 \\Rightarrow |-3k + 24| = 3\n  $$  \n- Step 3: Solve $ -3k + 24 = \\pm 3 $:  \n  + $ -3k + 24 = 3 \\Rightarrow k = 7 $  \n  + $ -3k + 24 = -3 \\Rightarrow k = 9 $  \n  + **Misconception**: Forgetting the absolute value leads to only one solution. Always split into $ \\pm $ cases.", "source": "Qwen 3 ②", "_id": "qwen_2_3"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "When expanding $$r(r+2)^2$$, what is the correct fully expanded form, and what is a common mis-expansion that leads to wrong answers on FP1 papers? (2 steps)", "answer": "- Step 1: The correct expansion is $$r(r+2)^2 = r(r^2 + 4r + 4) = r^3 + 4r^2 + 4r$$. You distribute $$r$$ into each term of the perfect square $$(r+2)^2 = r^2 + 4r + 4$$.\n- Step 2: The common mis-expansion is treating it as $$r^2(r+2) = r^3 + 2r^2$$, which conflates $$r(r+2)^2$$ with $$r^2(r+2)$$. These are fundamentally different expressions — the first has a squared binomial, the second has a squared variable. On exam day, always write out the expansion of any compound expression in full before summing.\n\nTakeaway: The difference between $$r(r+2)^2$$ and $$r^2(r+2)$$ is one letter's position — but it completely changes the polynomial.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "What are the three standard summation results for $$\\sum_{r=1}^n r$$, $$\\sum_{r=1}^n r^2$$, and $$\\sum_{r=1}^n r^3$$, and which one is NOT in the formula booklet? (2 steps)", "answer": "- Step 1: The three results are:\n+ $$\\sum_{r=1}^n r = \\tfrac{1}{2}n(n+1)$$ — **NOT in booklet, must memorize**\n+ $$\\sum_{r=1}^n r^2 = \\tfrac{1}{6}n(n+1)(2n+1)$$ — in booklet\n+ $$\\sum_{r=1}^n r^3 = \\tfrac{1}{4}n^2(n+1)^2$$ — in booklet\n- Step 2: The trap is forgetting $$\\sum r$$ because it feels \"too simple\" to need a formula. But under time pressure, you need it instantly. Also note the structural pattern: $$\\sum r$$ and $$\\sum r^3$$ both have $$n(n+1)$$ as a factor (since $$n^2(n+1)^2 = [n(n+1)]^2$$), while $$\\sum r^2$$ has the extra $$(2n+1)$$ factor.\n\nTakeaway: $$\\sum r = \\tfrac{1}{2}n(n+1)$$ is the one you must commit to memory — the other two are in the booklet.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "After splitting a sum like $$\\sum_{r=1}^n (r^3 + 4r^2 + 4r)$$ into three standard-result terms, why is it critical to factor out a common expression BEFORE simplifying the bracket, rather than expanding everything first? (3 steps)", "answer": "- Step 1: When you apply the three standard results, you get $$\\tfrac{1}{4}n^2(n+1)^2 + 4 \\cdot \\tfrac{1}{6}n(n+1)(2n+1) + 4 \\cdot \\tfrac{1}{2}n(n+1)$$. Each term has different denominators (4, 6, 2) and different polynomial structures.\n- Step 2: The \"factor-early\" strategy: bring to a common denominator of 12 first, then immediately pull out the shared factor $$\\tfrac{1}{12}n(n+1)$$:\n+ $$\\tfrac{3}{12}n^2(n+1)^2 + \\tfrac{8}{12}n(n+1)(2n+1) + \\tfrac{24}{12}n(n+1)$$\n+ $$= \\tfrac{1}{12}n(n+1)\\big[3n(n+1) + 8(2n+1) + 24\\big]$$\n- Step 3: If you expand everything first, you get a degree-4 polynomial with large coefficients that you'd then need to factor back into the required form — which is far more error-prone and time-consuming. Factoring early keeps the bracket small and the algebra manageable.\n\nTakeaway: Always look for the greatest common factor across all terms and pull it out before simplifying the remaining bracket.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "A quick verification: for $$\\sum_{r=1}^n r(r+2)^2$$, if you substitute $$n = 1$$, the LHS equals 9. What should the factored form $$\\tfrac{1}{12}n(n+1)(3n^2 + 19n + 32)$$ give at $$n = 1$$, and how does this catch the mis-expansion error? (2 steps)", "answer": "- Step 1: With the correct coefficients $$a=3, b=19, c=32$$: $$\\tfrac{1}{12}(1)(2)(3 + 19 + 32) = \\tfrac{1}{12} \\cdot 54 = 9$$. This matches the LHS of 9. ✓\n- Step 2: With the wrong coefficients $$a=3, b=11, c=4$$ (from mis-reading as $$r^2(r+2)$$): $$\\tfrac{1}{12}(1)(2)(3 + 11 + 4) = \\tfrac{36}{12} = 3 \\neq 9$$. ✗ The verification instantly exposes the error. Always do a sanity check with $$n = 1$$ or $$n = 2$$.\n\nTakeaway: A single substitution catches mis-expansion errors — always verify.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "Why must a real-coefficient polynomial with a complex root also have the complex conjugate as a root? What would go wrong if it didn't? (2 steps)", "answer": "- Step 1: Consider a polynomial $$p(z) = a_n z^n + \\cdots + a_1 z + a_0$$ with all real coefficients. If $$z_1$$ is a root, then $$p(z_1) = 0$$. Taking the complex conjugate of both sides: $$\\overline{p(z_1)} = \\overline{0} = 0$$.\n- Step 2: Since the coefficients are real, $$\\overline{p(z_1)} = a_n \\bar{z_1}^n + \\cdots + a_1 \\bar{z_1} + a_0 = p(\\bar{z_1})$$. So $$p(\\bar{z_1}) = 0$$, meaning $$\\bar{z_1}$$ is also a root. If this didn't hold, it would mean the coefficients couldn't all be real — complex roots of real polynomials must come in conjugate pairs to keep the polynomial's coefficients real.\n\nTakeaway: The conjugate-pair rule is a consequence of the real coefficients, not an arbitrary convention.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "Given a complex root $$z_1 = a + bi$$ of a real-coefficient polynomial, derive the quadratic factor $$(z - z_1)(z - \\bar{z_1})$$ and show it has real coefficients. (3 steps)", "answer": "- Step 1: Expand: $$(z - z_1)(z - \\bar{z_1}) = z^2 - (z_1 + \\bar{z_1})z + z_1\\bar{z_1}$$.\n- Step 2: Recognize the symmetric quantities: $$z_1 + \\bar{z_1} = (a + bi) + (a - bi) = 2a = 2\\,\\text{Re}(z_1)$$, and $$z_1\\bar{z_1} = |z_1|^2 = a^2 + b^2$$.\n- Step 3: Therefore $$(z - z_1)(z - \\bar{z_1}) = z^2 - 2\\,\\text{Re}(z_1)\\,z + |z_1|^2$$, which has entirely real coefficients. For $$z_1 = 2 + 3i$$: this gives $$z^2 - 4z + 13$$. The key trap is computing $$|z_1|^2 = 4 + 9 = 13$$ (sum of squares), NOT $$4 - 9$$.\n\nTakeaway: Memorize the formula $$(z - z_1)(z - \\bar{z_1}) = z^2 - 2\\,\\text{Re}(z_1)z + |z_1|^2$$ — it saves building the quadratic from scratch every time.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "When performing polynomial long division (e.g., dividing $$2x^4 - 8x^3 + 29x^2 - 12x + 39$$ by $$x^2 - 4x + 13$$), where do most sign errors creep in, and how do you guard against them? (2 steps)", "answer": "- Step 1: The danger zone is the **subtraction step**. After multiplying the divisor by your current quotient term, you must subtract the result from the current remainder. For example, if the remainder starts with $$2x^4 - 8x^3$$ and you subtract $$2x^4 - 8x^3 + 26x^2$$, the new remainder is $$(2x^4 - 8x^3 + 29x^2) - (2x^4 - 8x^3 + 26x^2) = 3x^2$$. The sign flip on $$26x^2$$ is where errors happen — students write $$+26x^2$$ instead of $$-26x^2$$.\n- Step 2: Guard by explicitly writing the subtraction: change every sign of the subtrahend, then add. Also verify the final answer by multiplying back: $$(x^2 - 4x + 13)(2x^2 + 3)$$ should recover the original quartic. If it doesn't, the division went wrong.\n\nTakeaway: In polynomial long division, the subtraction step is the #1 error source — flip all signs deliberately.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "On an Argand diagram, if $$z_1 = 2 + 3i$$ and $$z_2 = 2 - 3i$$ are plotted, what geometric relationship do they have, and what about a pair like $$z_3 = \\frac{i\\sqrt{6}}{2}$$ and $$z_4 = -\\frac{i\\sqrt{6}}{2}$$? (2 steps)", "answer": "- Step 1: $$z_1 = 2 + 3i$$ at $$(2, 3)$$ and $$z_2 = 2 - 3i$$ at $$(2, -3)$$ are **mirror images across the real axis**. This is always true for a conjugate pair — they have the same real part and opposite imaginary parts.\n- Step 2: $$z_3 = \\frac{i\\sqrt{6}}{2}$$ at $$(0, 1.22)$$ and $$z_4 = -\\frac{i\\sqrt{6}}{2}$$ at $$(0, -1.22)$$ are **purely imaginary** (zero real part). They lie on the imaginary axis and are also reflections across the real axis. They are a conjugate pair too, since $$\\overline{bi} = -bi$$.\n\nTakeaway: Conjugate pairs always reflect across the real axis; purely imaginary conjugate pairs lie on the imaginary axis.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "The rectangular hyperbola has equation $$xy = c^2$$. What is its parametric form, and why does the parameter $$t$$ appear in both coordinates in a reciprocal relationship? (2 steps)", "answer": "- Step 1: The parametric form is $$\\left(ct, \\frac{c}{t}\\right)$$ for parameter $$t \\neq 0$$. Every point on the hyperbola can be written this way.\n- Step 2: The reciprocal relationship ensures $$xy = (ct)\\left(\\frac{c}{t}\\right) = c^2$$, which satisfies the Cartesian equation automatically. The parameter $$t$$ essentially controls the \"slope\" from the origin — as $$t$$ increases, the point moves rightward and downward along the curve. When $$t = 1$$, the point is $$(c, c)$$ — the point closest to the origin on the first-quadrant branch.\n\nTakeaway: The parametric form $$(ct, c/t)$$ is a direct encoding of the constraint $$xy = c^2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "For the rectangular hyperbola $$xy = c^2$$ at the parametric point $$(ct, c/t)$$, derive the gradient $$\\frac{dy}{dx}$$ using implicit differentiation. (3 steps)", "answer": "- Step 1: Differentiate $$xy = c^2$$ implicitly with respect to $$x$$: using the product rule, $$y + x\\frac{dy}{dx} = 0$$.\n- Step 2: Solve for $$\\frac{dy}{dx}$$: $$\\frac{dy}{dx} = -\\frac{y}{x}$$.\n- Step 3: Substitute the parametric point: at $$x = ct$$, $$y = c/t$$, so $$\\frac{dy}{dx} = -\\frac{c/t}{ct} = -\\frac{1}{t^2}$$. This is a key result to memorize: at any point on the rectangular hyperbola, the gradient is always negative (the curve slopes downward in the first quadrant) and equals $$-1/t^2$$.\n\nTakeaway: $$\\frac{dy}{dx} = -1/t^2$$ at $$(ct, c/t)$$ — derive it once, then recall directly on the exam.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Given that the gradient of the tangent to the rectangular hyperbola at parameter $$t$$ is $$-1/t^2$$, what is the gradient of the **normal**, and how do you construct the normal's equation? (3 steps)", "answer": "- Step 1: The normal is perpendicular to the tangent, so its gradient is the negative reciprocal: $$m_{\\text{normal}} = -1/m_{\\text{tangent}} = -1/(-1/t^2) = t^2$$.\n- Step 2: Write the line through $$(ct, c/t)$$ with gradient $$t^2$$: $$y - \\frac{c}{t} = t^2(x - ct)$$.\n- Step 3: Multiply through by $$t$$ to clear the fraction: $$ty - c = t^3 x - ct^4$$, rearranging to $$ty - t^3 x = c - ct^4 = c(1 - t^4)$$. This is the standard form of the normal: $$t^3 x - ty = c(t^4 - 1)$$.\n\nTakeaway: The normal gradient is $$t^2$$ (positive, so the normal slopes upward in the first quadrant), and the normal equation simplifies to $$t^3 x - ty = c(t^4 - 1)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "When a normal to the rectangular hyperbola at point $$P$$ \"meets $$H$$ again\" at point $$Q$$, why does substituting the line equation into $$xy = c^2$$ give a quadratic with $$P$$'s x-coordinate as one root? How can you exploit this? (3 steps)", "answer": "- Step 1: The normal line and the hyperbola are both curves. Their intersection points satisfy both equations simultaneously. Substituting the linear equation into $$xy = c^2$$ produces a quadratic in $$x$$ (or $$y$$).\n- Step 2: Since $$P$$ lies on both the normal and the hyperbola, $$P$$ is one intersection point — so $$x_P$$ is one root of the quadratic. The \"other\" intersection is what the question asks for.\n- Step 3: Exploit this with Vieta's formulas. If the quadratic is $$ax^2 + bx + c = 0$$ with roots $$\\alpha$$ (known, = $$x_P$$) and $$\\beta$$ (unknown), then $$\\alpha\\beta = c/a$$, so $$\\beta = c/(a\\alpha)$$. This is much faster than solving the full quadratic — you only need the product of roots.\n\nTakeaway: In \"meets again\" questions, one root is always the original point — use Vieta's product rule to find the other root instantly.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "For the rectangular hyperbola $$xy = 9$$ with $$c = 3$$, the normal at $$t = 2$$ meets the curve again. Use the Vieta's shortcut: if the resulting quadratic in $$x$$ has roots whose product is $$-9/4$$, and one root is 6, what is the other root? (2 steps)", "answer": "- Step 1: By Vieta's, if the quadratic is $$ax^2 + bx + c = 0$$, then the product of roots is $$c/a$$. From the substitution, the quadratic is $$8x^2 - 45x - 18 = 0$$, so the product of roots is $$-18/8 = -9/4$$.\n- Step 2: One root is $$x_P = 6$$ (the point $$P$$ at $$t = 2$$ has $$x = 3 \\cdot 2 = 6$$). So the other root is $$(-9/4)/6 = -9/24 = -3/8$$. Then $$y = 9/x = 9/(-3/8) = -24$$. The second intersection is $$(-3/8, -24)$$. Sanity check: $$(-3/8)(-24) = 72/8 = 9$$ ✓.\n\nTakeaway: Vieta's product rule turns a full quadratic solve into one division — invaluable under exam time pressure.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "A $$2 \\times 2$$ matrix $$A$$ represents a transformation. The area of the image shape is 3 times the area of the original shape. Why does this give TWO possible values for $$\\det A$$, not one? (2 steps)", "answer": "- Step 1: The area scale factor of the transformation is $$|\\det A|$$, the absolute value of the determinant. So $$|\\det A| = 3$$.\n- Step 2: The absolute value equation $$|\\det A| = 3$$ has two solutions: $$\\det A = +3$$ OR $$\\det A = -3$$. The positive determinant corresponds to a transformation that preserves orientation (e.g., stretches without reflection), while the negative determinant corresponds to one that reverses orientation (e.g., includes a reflection). Both produce the same area scaling. Whenever a question says \"possible values\" or uses the plural, split into both cases.\n\nTakeaway: Area scale factor = $$|\\det A|$$, so \"area is 3 times larger\" means $$\\det A = \\pm 3$$, giving two possible values.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Given matrix $$A = \\begin{pmatrix} -3 & 8 \\\\ -3 & k \\end{pmatrix}$$ with $$|\\det A| = 3$$, find both possible values of $$k$$. (3 steps)", "answer": "- Step 1: Compute $$\\det A = (-3)(k) - (8)(-3) = -3k + 24$$.\n- Step 2: Case 1: $$\\det A = +3$$ gives $$-3k + 24 = 3$$, so $$-3k = -21$$, hence $$k = 7$$.\n- Step 3: Case 2: $$\\det A = -3$$ gives $$-3k + 24 = -3$$, so $$-3k = -27$$, hence $$k = 9$$. Both values are valid: $$k = 7$$ gives $$\\det A = 3$$ (orientation-preserving), $$k = 9$$ gives $$\\det A = -3$$ (orientation-reversing).\n\nTakeaway: Always split the absolute-value equation into two cases — this is the most common trap in matrix area questions.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "State the formula for the inverse of a $$2 \\times 2$$ matrix $$\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$$, and explain the swap-and-negate pattern. (2 steps)", "answer": "- Step 1: The inverse is $$\\frac{1}{ad - bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$$. The denominator $$ad - bc$$ is the determinant.\n- Step 2: The pattern: **swap** the diagonal entries ($$a \\leftrightarrow d$$), **negate** the off-diagonal entries ($$b \\to -b$$, $$c \\to -c$$), then divide everything by the determinant. A common error is negating the diagonal entries instead of swapping them, or swapping the off-diagonal entries instead of negating them. Drill: swap diagonal, negate off-diagonal, divide by det.\n\nTakeaway: Swap-diagonal, negate-off-diagonal, divide-by-det — the three moves for a 2×2 inverse.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Given $$BC = D$$ where $$B$$ is a $$2 \\times 2$$ invertible matrix and $$D$$ is $$2 \\times 3$$, what is the shape of matrix $$C$$, and how do you solve for it? (3 steps)", "answer": "- Step 1: If $$B$$ is $$2 \\times 2$$ and $$D$$ is $$2 \\times 3$$, then for the multiplication $$BC = D$$ to be valid, $$C$$ must be $$2 \\times 3$$. Always check shapes before computing.\n- Step 2: Left-multiply both sides by $$B^{-1}$$: $$B^{-1}BC = B^{-1}D$$, so $$C = B^{-1}D$$. Note: you must left-multiply, not right-multiply, because $$B$$ is on the left of $$C$$.\n- Step 3: Compute $$B^{-1}$$ using the formula, then multiply $$B^{-1}$$ (a $$2 \\times 2$$) by $$D$$ (a $$2 \\times 3$$) using row×column multiplication. The result is a $$2 \\times 3$$ matrix. Each entry $$C_{ij}$$ is the dot product of row $$i$$ of $$B^{-1}$$ with column $$j$$ of $$D$$.\n\nTakeaway: $$BC = D \\Rightarrow C = B^{-1}D$$ (left-multiply by inverse), and always verify the matrix dimensions are compatible.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "For the quadratic $$x^2 - 6x + 3 = 0$$ with roots $$\\alpha$$ and $$\\beta$$, what are the values of $$\\alpha + \\beta$$ and $$\\alpha\\beta$$ by Vieta's formulas? (2 steps)", "answer": "- Step 1: For a quadratic $$ax^2 + bx + c = 0$$, Vieta's formulas give $$\\alpha + \\beta = -b/a$$ and $$\\alpha\\beta = c/a$$. Here $$a = 1$$, $$b = -6$$, $$c = 3$$.\n- Step 2: So $$\\alpha + \\beta = -(-6)/1 = 6$$ and $$\\alpha\\beta = 3/1 = 3$$. Notice: the sign in $$\\alpha + \\beta = -b/a$$ means the sum is the **negation** of the coefficient of $$x$$ (divided by the leading coefficient). The common mistake is forgetting the minus sign and writing $$\\alpha + \\beta = 6$$ when $$b = 6$$ (which would give $$\\alpha + \\beta = -6$$). Always use $$-b/a$$.\n\nTakeaway: $$\\alpha + \\beta = -b/a$$, $$\\alpha\\beta = c/a$$ — the minus sign in the sum formula is the #1 sign error.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Derive the identity $$\\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta$$ from scratch. Why is this more useful than trying to find $$\\alpha$$ and $$\\beta$$ individually? (2 steps)", "answer": "- Step 1: Start with $$(\\alpha + \\beta)^2 = \\alpha^2 + 2\\alpha\\beta + \\beta^2$$. Rearranging: $$\\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta$$. This is just algebraic rearrangement of the binomial expansion.\n- Step 2: This is powerful because you can compute $$\\alpha^2 + \\beta^2$$ knowing only the sum and product — without ever finding $$\\alpha$$ and $$\\beta$$ individually. For $$\\alpha + \\beta = 6$$ and $$\\alpha\\beta = 3$$: $$\\alpha^2 + \\beta^2 = 36 - 6 = 30$$. If you tried to find the actual roots ($$\\alpha, \\beta = 3 \\pm \\sqrt{6}$$) and square them, you'd get the same answer but with far more work and more room for error.\n\nTakeaway: Symmetric identities let you evaluate expressions in $$\\alpha, \\beta$$ without solving the quadratic — this is the whole point of the FP1 roots-of-polynomials topic.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "Evaluate $$(\\alpha^2 + 1)(\\beta^2 + 1)$$ in terms of $$\\alpha + \\beta$$ and $$\\alpha\\beta$$. What identity makes this expand cleanly? (3 steps)", "answer": "- Step 1: Expand: $$(\\alpha^2 + 1)(\\beta^2 + 1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1 = (\\alpha\\beta)^2 + (\\alpha^2 + \\beta^2) + 1$$.\n- Step 2: Substitute the symmetric identities: $$(\\alpha\\beta)^2 + [(\\alpha + \\beta)^2 - 2\\alpha\\beta] + 1$$. With $$\\alpha + \\beta = 6$$ and $$\\alpha\\beta = 3$$: $$9 + (36 - 6) + 1 = 9 + 30 + 1 = 40$$.\n- Step 3: The key insight is that $$(\\alpha^2 + 1)(\\beta^2 + 1)$$ decomposes into three terms, each expressible via $$\\alpha + \\beta$$ and $$\\alpha\\beta$$ alone. No need to find individual roots. The expansion follows the pattern $$(A + 1)(B + 1) = AB + A + B + 1$$ where $$A = \\alpha^2$$ and $$B = \\beta^2$$.\n\nTakeaway: $$(\\alpha^2 + 1)(\\beta^2 + 1) = (\\alpha\\beta)^2 + (\\alpha^2 + \\beta^2) + 1$$ — all three pieces are symmetric functions of the roots.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "When computing the sum $$\\frac{\\alpha}{\\alpha^2+1} + \\frac{\\beta}{\\beta^2+1}$$, the numerator becomes $$\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1)$$. What factorisation trick turns this into $$(\\alpha+\\beta)(\\alpha\\beta + 1)$$, and why is this the key FP1 manoeuvre? (3 steps)", "answer": "- Step 1: Expand the numerator: $$\\alpha\\beta^2 + \\alpha + \\beta\\alpha^2 + \\beta$$. Group the terms with $$\\alpha\\beta$$: $$\\alpha\\beta^2 + \\beta\\alpha^2 = \\alpha\\beta(\\beta + \\alpha) = \\alpha\\beta(\\alpha + \\beta)$$.\n- Step 2: The remaining terms are $$\\alpha + \\beta = (\\alpha + \\beta) \\cdot 1$$. So the full numerator is $$\\alpha\\beta(\\alpha + \\beta) + (\\alpha + \\beta) = (\\alpha + \\beta)(\\alpha\\beta + 1)$$.\n- Step 3: This is the standard FP1 factor trick: whenever you see $$\\alpha\\beta^2 + \\beta\\alpha^2$$, immediately recognise it as $$\\alpha\\beta(\\alpha + \\beta)$$. Then look for common factors with the remaining terms. With $$\\alpha + \\beta = 6$$ and $$\\alpha\\beta = 3$$: the numerator is $$6 \\cdot 4 = 24$$, and the denominator is 40 (from part a), giving sum = $$24/40 = 3/5$$.\n\nTakeaway: $$\\alpha\\beta^2 + \\beta\\alpha^2 = \\alpha\\beta(\\alpha + \\beta)$$ — this factorisation is the single most important algebraic trick for transformed-roots questions.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "After finding the sum $$S = 3/5$$ and product $$P = 3/40$$ of new roots, how do you build the new quadratic equation with integer coefficients? (3 steps)", "answer": "- Step 1: A quadratic with roots having sum $$S$$ and product $$P$$ is $$x^2 - Sx + P = 0$$. So: $$x^2 - \\frac{3}{5}x + \\frac{3}{40} = 0$$.\n- Step 2: To clear fractions, find the LCM of the denominators (5 and 40), which is 40. Multiply through by 40: $$40x^2 - 24x + 3 = 0$$.\n- Step 3: Verify the coefficients are integers with no common factor. $$\\gcd(40, 24, 3) = 1$$, so this is in simplest form. Also check: the product of the new roots is $$\\frac{\\alpha\\beta}{(\\alpha^2+1)(\\beta^2+1)} = \\frac{3}{40}$$, and the sum is $$\\frac{(\\alpha+\\beta)(\\alpha\\beta+1)}{(\\alpha^2+1)(\\beta^2+1)} = \\frac{24}{40} = \\frac{3}{5}$$. Both match.\n\nTakeaway: Build $$x^2 - Sx + P = 0$$, then multiply through by the LCM of denominators to get integer coefficients.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "Why must you always reuse part (a)'s result in part (b) of a roots-of-polynomials question? What happens if you don't? (2 steps)", "answer": "- Step 1: Part (a) typically asks you to evaluate a symmetric expression like $$(\\alpha^2+1)(\\beta^2+1) = 40$$. Part (b) then involves the same expression in the denominator of the new roots' sum and product. The exam is designed so that part (a) does the heavy lifting for part (b).\n- Step 2: If you ignore the part (a) result and try to recompute $$(\\alpha^2+1)(\\beta^2+1)$$ from scratch in part (b), you waste time and risk errors. The denominator $$(\\alpha^2+1)(\\beta^2+1) = 40$$ is already known — just use it directly. This is a deliberate exam design pattern.\n\nTakeaway: Part (a) is a building block for part (b) — always carry the result forward.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "For two complex numbers $$z_1 = 3 + 2i$$ and $$z_2 = 2 + 3i$$, explain why $$|z_1 + z_2|$$ is NOT equal to $$|z_1| + |z_2|$$, and compute the correct value. (3 steps)", "answer": "- Step 1: The modulus is not additive. $$|z_1| + |z_2| = \\sqrt{13} + \\sqrt{13} = 2\\sqrt{13} \\approx 7.21$$, but $$|z_1 + z_2| = |5 + 5i| = \\sqrt{50} = 5\\sqrt{2} \\approx 7.07$$. These differ because the triangle inequality gives $$|z_1 + z_2| \\leq |z_1| + |z_2|$$, with equality only when $$z_1$$ and $$z_2$$ point in the same direction (same argument).\n- Step 2: To compute $$|z_1 + z_2|$$ correctly: first add the complex numbers: $$z_1 + z_2 = (3+2) + (2+3)i = 5 + 5i$$. Then take the modulus: $$|5 + 5i| = \\sqrt{25", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}], "count": 24}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "When you see a summand like $$r(r+2)^2$$ in a summation question, what is the very first step you must take before splitting the sum — and why is this step critical for exam accuracy? (2 steps)", "answer": "- Step 1: **Write out the full algebraic expansion on paper** before doing anything else. For $$r(r+2)^2$$, expand the bracket first: $$r(r+2)^2 = r(r^2 + 4r + 4) = r^3 + 4r^2 + 4r$$. Never trust mental expansion of compound expressions under exam pressure.\n- Step 2: The reason this is critical — mis-reading the summand is the #1 error in summation questions. Confusing $$r(r+2)^2$$ with $$r^2(r+2)$$ gives a completely different expansion ($$r^3 + 2r^2$$ vs $$r^3 + 4r^2 + 4r$$), leading to wrong coefficients and a wrong final answer. On the May 2023 paper, this exact mis-read happened during a lesson — the tutor wrote $$r^3 + 2r^2$$ on the whiteboard, but the printed paper clearly shows $$r(r+2)^2$$, which expands to $$r^3 + 4r^2 + 4r$$.\n\nThe golden rule: expand in full, then split. Never skip the expansion step.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Which three standard summation results do you need for FP1 series questions, and which one is NOT in the formula booklet (so you must memorize it)?", "answer": "The three standard results are:\n\n1. $$\\sum_{r=1}^n r = \\tfrac{1}{2}n(n+1)$$ — **NOT in the formula booklet. You must memorize this.**\n2. $$\\sum_{r=1}^n r^2 = \\tfrac{1}{6}n(n+1)(2n+1)$$ — IN the formula booklet (know where to look).\n3. $$\\sum_{r=1}^n r^3 = \\tfrac{1}{4}n^2(n+1)^2$$ — IN the formula booklet (know where to look).\n\nThe most common trap: students reach for the booklet for $$\\sum r$$ and can't find it. It's the simplest formula but the one you're most likely to forget because it's not printed anywhere official. Commit $$\\tfrac{1}{2}n(n+1)$$ to memory — it's also the foundation for the other two (notice how $$\\sum r^2$$ and $$\\sum r^3$$ both contain $$n(n+1)$$ as a factor).", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "After expanding a summand and applying the three standard results, you get an expression with different denominators. What is the \"factor-early\" trick that makes the remaining algebra clean and exam-efficient? (3 steps)", "answer": "- Step 1: Identify the **least common denominator** of all terms. For the three standard results applied with coefficients, the denominators are 4, 6, and 2. The LCD is 12. Rewrite every fraction with denominator 12:\n$$\\tfrac{1}{4}n^2(n+1)^2 = \\tfrac{3}{12}n^2(n+1)^2, \\quad \\tfrac{4}{6}n(n+1)(2n+1) = \\tfrac{8}{12}n(n+1)(2n+1), \\quad \\tfrac{4}{2}n(n+1) = \\tfrac{24}{12}n(n+1)$$\n\n- Step 2: **Factor out** $$\\tfrac{1}{12}n(n+1)$$ immediately — don't add the fractions first. Pulling this common factor out leaves a clean polynomial bracket:\n$$\\tfrac{1}{12}n(n+1)\\Big[3n(n+1) + 8(2n+1) + 24\\Big]$$\n\n- Step 3: Simplify only the bracket contents — a straightforward polynomial expansion, no fractions left to wrestle with:\n$$3n^2 + 3n + 16n + 8 + 24 = 3n^2 + 19n + 32$$\n\nThe key insight: factoring early eliminates fraction arithmetic errors. If you add all three fractions first and *then* try to factor, you're doing double work and risking sign/coefficient errors.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "How can you quickly verify that your summation answer is correct without re-deriving the entire expression? (2 steps)", "answer": "- Step 1: **Substitute a small value of $$n$$** (usually $$n=1$$) into both the LHS (the original sum) and the RHS (your factored answer). If they match, your algebra is almost certainly correct.\n+ For $$n=1$$: LHS $$= \\sum_{r=1}^1 r(r+2)^2 = 1 \\cdot 3^2 = 9$$\n+ RHS $$= \\tfrac{1}{12} \\cdot 1 \\cdot 2 \\cdot (3 + 19 + 32) = \\tfrac{54}{12} = 9$$ ✓\n\n- Step 2: If they don't match, your expansion or coefficients are wrong somewhere. This is exactly how the mis-read was caught in the May 2023 revision — the tutor's answer $$3n^2 + 11n + 4$$ gives $$\\tfrac{1}{12} \\cdot 1 \\cdot 2 \\cdot 18 = 3$$, which is clearly not 9. The substitution test immediately flags the error.\n\nAlways do this sanity check before moving on. It takes 10 seconds and catches the most devastating errors.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "Why must a real-coefficient polynomial with a complex root $$z_1 = a + bi$$ also have $$\\bar{z}_1 = a - bi$$ as a root — what's the algebraic proof? (3 steps)", "answer": "- Step 1: Let $$p(z) = 0$$ where $$p$$ has real coefficients. Write $$p(z) = a_n z^n + a_{n-1}z^{n-1} + \\cdots + a_0$$ with each $$a_k \\in \\mathbb{R}$$.\n- Step 2: Take the complex conjugate of both sides of $$p(z_1) = 0$$: $$\\overline{p(z_1)} = \\overline{0} = 0$$. Since conjugation distributes over addition and multiplication, and each $$a_k$$ is real (so $$\\bar{a}_k = a_k$$):\n$$\\overline{a_n z_1^n + \\cdots + a_0} = a_n \\bar{z}_1^n + \\cdots + a_0 = p(\\bar{z}_1) = 0$$\n- Step 3: Therefore $$\\bar{z}_1$$ is also a root. The key property used: real coefficients are self-conjugate ($$\\bar{a}_k = a_k$$). If any coefficient were non-real, this argument would fail and conjugate roots wouldn't be guaranteed.\n\nThis is the **conjugate-pair rule**: real-coefficient polynomial + complex root ⟹ conjugate is also a root. It's NOT in the formula booklet — memorize the rule and understand *why* it holds.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Given a complex root $$z_1 = p + qi$$ of a real-coefficient polynomial, what is the shortcut formula for the quadratic factor $$(z - z_1)(z - \\bar{z}_1)$$, and why is it faster than expanding directly? (2 steps)", "answer": "- Step 1: The shortcut formula:\n$$(z - z_1)(z - \\bar{z}_1) = z^2 - 2\\,\\text{Re}(z_1)\\,z + |z_1|^2$$\nFor $$z_1 = p + qi$$: $$\\text{Re}(z_1) = p$$, $$|z_1|^2 = p^2 + q^2$$, so the quadratic factor is $$z^2 - 2pz + (p^2 + q^2)$$.\n\n- Step 2: Why it's faster — expanding $$(z - (p+qi))(z - (p-qi))$$ directly requires multiplying two binomials with complex terms and then simplifying. The shortcut bypasses all that: you read off the real part and modulus squared directly. For $$z_1 = 2 + 3i$$: $$\\text{Re} = 2$$, $$|z_1|^2 = 4 + 9 = 13$$, so the factor is $$z^2 - 4z + 13$$ — two numbers read off, no algebra.\n\nCommon trap: computing $$|z_1|^2$$ as $$p^2 - q^2$$ (difference of squares) instead of $$p^2 + q^2$$ (sum of squares). The modulus squared is always a **sum**, never a difference.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "After finding the quadratic factor from a conjugate pair, you need to divide the original polynomial by it to find the remaining factor. What is the most common error point in polynomial long division, and how do you guard against it?", "answer": "The most common error point is **the subtraction in the second step** (and subsequent steps). When you multiply the divisor by a term and subtract from the current remainder, sign errors are extremely easy to make — especially when the divisor has negative coefficients.\n\nGuard strategies:\n+ Write each subtraction explicitly as adding the negated row: instead of mentally computing $$29x^2 - (-8x^2 \\cdot \\text{something})$$, write out the negated row and add.\n+ After completing the division, **verify by multiplying back**: $$(x^2 - 4x + 13)(2x^2 + 3)$$ should reproduce the original quartic. If it doesn't, your division has a sign error somewhere.\n+ Check that the remainder is zero — if you get a non-zero remainder for a question that states the quadratic is a factor, something is wrong.\n\nFor the May 2023 paper: dividing $$2x^4 - 8x^3 + 29x^2 - 12x + 39$$ by $$x^2 - 4x + 13$$ gives quotient $$2x^2 + 3$$ with remainder 0. The $$-12x + 39$$ cancels exactly — if your remainder isn't zero, re-check the subtraction signs.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "On an Argand diagram, how do you plot a purely imaginary root like $$z = \\tfrac{i\\sqrt{6}}{2}$$, and what geometric property must all conjugate pairs satisfy?", "answer": "A purely imaginary number $$z = bi$$ (with zero real part) plots on the **imaginary axis** (the y-axis) at height $$b$$. For $$z = \\tfrac{i\\sqrt{6}}{2}$$, the coordinates are approximately $$\\left(0, 1.22\\right)$$ since $$\\tfrac{\\sqrt{6}}{2} \\approx 1.22$$.\n\nThe geometric property all conjugate pairs must satisfy: **$$z_1$$ and $$\\bar{z}_1$$ are mirror images across the real axis** (x-axis). If $$z_1 = 2 + 3i$$ is at $$\\left(2, 3\\right)$$, then $$\\bar{z}_1 = 2 - 3i$$ is at $$\\left(2, -3\\right)$$ — same x-coordinate, opposite y-coordinate. This is always true: conjugation negates the imaginary part while keeping the real part unchanged.\n\nOn the Argand diagram for the May 2023 quartic, you'd see two points mirrored across the real axis ($$2 \\pm 3i$$) and two points on the imaginary axis ($$\\pm \\tfrac{i\\sqrt{6}}{2}$$), also mirrored across the real axis — because purely imaginary conjugate pairs are also reflections across the real axis.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "What is the parametric form of a point on the rectangular hyperbola $$xy = c^2$$, and why does the parameter $$t$$ appear in both coordinates in reciprocal fashion? (2 steps)", "answer": "- Step 1: The parametric form is $$\\left(ct, \\, \\tfrac{c}{t}\\right)$$ for any non-zero parameter $$t$$. For the specific hyperbola $$xy = 9$$ (so $$c^2 = 9$$, hence $$c = 3$$), a point on the curve is $$\\left(3t, \\, \\tfrac{3}{t}\\right)$$.\n- Step 2: Why reciprocal — substituting into $$xy = c^2$$: $$x \\cdot y = ct \\cdot \\tfrac{c}{t} = \\tfrac{c^2 t}{t} = c^2$$. The $$t$$ cancels, guaranteeing every parameter value (except $$t = 0$$) gives a point on the curve. The reciprocal structure is what makes the product constant — as $$t$$ increases, $$x$$ grows but $$y$$ shrinks proportionally, keeping $$xy$$ fixed at $$c^2$$.\n\nThis is NOT in the formula booklet — memorize the form $$\\left(ct, c/t\\right)$$ for $$xy = c^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "How do you derive the gradient $$\\frac{dy}{dx} = -\\tfrac{1}{t^2}$$ at the point $$\\left(ct, \\tfrac{c}{t}\\right)$$ on the rectangular hyperbola $$xy = c^2$$? (2 steps)", "answer": "- Step 1: Use implicit differentiation of $$xy = c^2$$:\n$$y + x\\,\\frac{dy}{dx} = 0 \\;\\Rightarrow\\; \\frac{dy}{dx} = -\\frac{y}{x}$$\nAt the point $$\\left(ct, \\tfrac{c}{t}\\right)$$: $$\\frac{dy}{dx} = -\\frac{c/t}{ct} = -\\frac{1}{t^2}$$.\n\n- Step 2: Alternative explicit method (faster for verification): write $$y = c^2/x = c^2 x^{-1}$$, so $$\\frac{dy}{dx} = -c^2 x^{-2} = -\\frac{c^2}{x^2}$$. At $$x = ct$$: $$\\frac{dy}{dx} = -\\frac{c^2}{c^2 t^2} = -\\frac{1}{t^2}$$ — same answer, confirming correctness.\n\nKey insight: the gradient is always **negative** (since $$t^2 > 0$$), reflecting the fact that the rectangular hyperbola slopes downward in the first quadrant. As $$|t|$$ grows, the gradient approaches 0 (the curve flattens); as $$|t| \\to 0$$, the gradient becomes very steep (approaching vertical).\n\nMemorize the result $$\\frac{dy}{dx} = -1/t^2$$ at $$\\left(ct, c/t\\right)$$ — derive it once to understand it, then use directly on the exam to save time.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Given the tangent gradient is $$-1/t^2$$ at $$\\left(ct, c/t\\right)$$ on $$xy = c^2$$, what is the gradient of the **normal**, and how do you construct the normal equation in the form $$ty - t^3 x = f(t)$$? (3 steps)", "answer": "- Step 1: The normal gradient is the negative reciprocal of the tangent gradient:\n$$m_{\\text{normal}} = -\\frac{1}{m_{\\text{tangent}}} = -\\frac{1}{-1/t^2} = t^2$$\n\n- Step 2: Write the line through $$P\\left(ct, c/t\\right)$$ with gradient $$t^2$$:\n$$y - \\frac{c}{t} = t^2\\left(x - ct\\right)$$\n\n- Step 3: Multiply through by $$t$$ to clear fractions and rearrange into the required form:\n$$ty - c = t^3 x - ct^4$$\n$$ty - t^3 x = c - ct^4 = c\\left(1 - t^4\\right)$$\n\nSo the normal equation is $$ty - t^3 x = c(1 - t^4)$$, giving $$f(t) = c(1 - t^4)$$.\n\nFor $$c = 3$$ (the May 2023 question): $$ty - t^3 x = 3(1 - t^4)$$, matching the required form exactly.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "When a normal to a curve meets the curve \"again,\" you get a quadratic equation where one root corresponds to the original point. What shortcut lets you find the *other* root without fully solving the quadratic? (2 steps)", "answer": "- Step 1: Use **Vieta's product rule**: for a quadratic $$ax^2 + bx + c = 0$$ with roots $$\\alpha$$ and $$\\beta$$, the product is $$\\alpha\\beta = c/a$$. If you already know one root (the original point's x-coordinate), the other root is:\n$$\\beta = \\frac{c/a}{\\alpha} = \\frac{c}{a\\alpha}$$\n\n- Step 2: Apply to the May 2023 question: the intersection quadratic was $$8x^2 - 45x - 18 = 0$$, so $$c/a = -18/8 = -9/4$$. One root is $$x_P = 6$$ (the original point at $$t=2$$). The other root:\n$$x_Q = \\frac{-9/4}{6} = -\\frac{9}{24} = -\\frac{3}{8}$$\n\nThis matches the full solution: $$x = -\\tfrac{3}{8}$$, $$y = -24$$, and indeed $$xy = \\tfrac{3}{8} \\cdot 24 = 9$$ ✓. Vieta's saves you from factoring or using the quadratic formula — just divide the product by the known root.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Why does \"area scale factor = 3\" lead to **two** possible values for the determinant, not just one? What is the geometric meaning of each case? (3 steps)", "answer": "- Step 1: The area scale factor of a 2×2 matrix transformation is $$|\\det A|$$ — the **absolute value** of the determinant. So $$|\\det A| = 3$$ means $$\\det A = +3$$ OR $$\\det A = -3$$.\n\n- Step 2: The geometric meaning:\n+ $$\\det A = +3$$: the transformation scales areas by 3 and **preserves orientation** (no reflection). The image triangle has the same \"handedness\" as the original.\n+ $$\\det A = -3$$: the transformation scales areas by 3 but **reverses orientation** (includes a reflection). The image triangle is a mirror image of the original.\n\n- Step 3: When a question says \"possible values\" (plural), it's a signal to consider both cases. For the May 2023 question with $$A = \\begin{pmatrix} -3 & 8 \\\\ -3 & k \\end{pmatrix}$$:\n$$\\det A = -3k + 24$$\n+ Case 1: $$-3k + 24 = 3 \\Rightarrow k = 7$$\n+ Case 2: $$-3k + 24 = -3 \\Rightarrow k = 9$$\n\nBoth values are valid — one gives a positive determinant (orientation-preserving), the other gives a negative determinant (orientation-reversing).", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "What is the 2×2 inverse formula, and what is the most reliable way to remember the \"swap-and-negate\" pattern for the matrix entries? (2 steps)", "answer": "- Step 1: For $$M = \\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$$ with $$\\det M = ad - bc \\ne 0$$:\n$$M^{-1} = \\frac{1}{ad - bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$$\n\n- Step 2: The \"swap-and-negate\" pattern:\n+ **Swap** the diagonal entries: $$a$$ and $$d$$ swap places — $$d$$ goes top-left, $$a$$ goes bottom-right.\n+ **Negate** the off-diagonal entries: $$b$$ becomes $$-b$$, $$c$$ becomes $$-c$$ — they stay in their positions but flip sign.\n+ **Divide** everything by the determinant $$ad - bc$$.\n\nMemory trick: \"diagonal swap, off-diagonal negate, divide by determinant.\" The order matters — if you negate the diagonal instead of swapping, you get the wrong matrix. Verify: $$MM^{-1} = \\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix} \\cdot \\frac{1}{\\det}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix} = \\frac{1}{\\det}\\begin{pmatrix} ad-bc & 0 \\\\ 0 & ad-bc \\end{pmatrix} = I$$ ✓.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "Given the matrix equation $$BC = D$$ where $$B$$ is a 2×2 matrix and $$D$$ is a 2×3 matrix, what is the solution for $$C$$, and why must you check matrix shapes before multiplying? (2 steps)", "answer": "- Step 1: If $$B$$ is invertible, multiply both sides on the left by $$B^{-1}$$:\n$$B^{-1}(BC) = B^{-1}D \\;\\Rightarrow\\; (B^{-1}B)C = B^{-1}D \\;\\Rightarrow\\; C = B^{-1}D$$\nNote: you multiply on the **left** — matrix multiplication is not commutative, so $$CB^{-1}$$ would be wrong (and likely impossible due to shape mismatch).\n\n- Step 2: Shape check before multiplying:\n+ $$B^{-1}$$ is 2×2 (same shape as $$B$$)\n+ $$D$$ is 2×3\n+ $$B^{-1}D$$: (2×2)(2×3) = 2×3 ✓\n+ So $$C$$ is a 2×3 matrix — three columns, one for each column of $$D$$.\n\nIf you tried $$DB^{-1}$$: (2×3)(2×2) — the inner dimensions (3 and 2) don't match, so this multiplication is undefined. Always verify shapes first; it prevents both computational errors and impossible operations.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "In the roots-of-polynomials question, Vieta's gives $$\\alpha + \\beta = 6$$ and $$\\alpha\\beta = 3$$ for $$x^2 - 6x + 3 = 0$$. How do you compute $$\\alpha^2 + \\beta^2$$ without ever finding $$\\alpha$$ or $$\\beta$$ individually? (2 steps)", "answer": "- Step 1: Use the **symmetric identity**:\n$$\\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta$$\nThis is derived from expanding $$\\left(\\alpha + \\beta\\right)^2 = \\alpha^2 + 2\\alpha\\beta + \\beta^2$$ and rearranging.\n\n- Step 2: Substitute the Vieta values:\n$$\\alpha^2 + \\beta^2 = 6^2 - 2 \\cdot 3 = 36 - 6 = 30$$\n\nThe entire point of this identity: you never need to know $$\\alpha$$ and $$\\beta$$ individually. The expression $$\\alpha^2 + \\beta^2$$ is **symmetric** in $$\\alpha$$ and $$\\beta$$ (swapping them doesn't change the value), so it can always be written in terms of the symmetric quantities $$\\alpha + \\beta$$ and $$\\alpha\\beta$$.\n\nThis identity is NOT in the formula booklet — memorize it: $$\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "How do you expand $$(\\alpha^2 + 1)(\\beta^2 + 1)$$ in terms of symmetric quantities, and why is this approach more reliable than trying to substitute numerical values for $$\\alpha$$ and $$\\beta$$? (3 steps)", "answer": "- Step 1: Expand the product:\n$$(\\alpha^2 + 1)(\\beta^2 + 1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1$$\n\n- Step 2: Rewrite each piece using symmetric quantities:\n+ $$\\alpha^2\\beta^2 = (\\alpha\\beta)^2 = 3^2 = 9$$\n+ $$\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta = 36 - 6 = 30$$\n+ The constant term is just 1.\n\n- Step 3: Sum them:\n$$(\\alpha^2 + 1)(\\beta^2 + 1) = 9 + 30 + 1 = 40$$\n\nWhy this is more reliable: the roots of $$x^2 - 6x + 3 = 0$$ are $$\\alpha = 3 + \\sqrt{6}$$ and $$\\beta = 3 - \\sqrt{6}$$ — ugly surds. Computing $$\\alpha^2$$ and $$\\beta^2$$ individually would involve surd arithmetic with high error risk. The symmetric approach avoids surds entirely by working only with the clean Vieta values (6 and 3).", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "What is the \"factor trick\" for simplifying $$\\alpha\\beta^2 + \\beta\\alpha^2$$, and why is it the key to solving the transformed-roots sum in part (b) of the polynomial roots question? (3 steps)", "answer": "- Step 1: The factor trick:\n$$\\alpha\\beta^2 + \\beta\\alpha^2 = \\alpha\\beta(\\alpha + \\beta)$$\nFactor out $$\\alpha\\beta$$ from both terms: $$\\alpha\\beta \\cdot \\beta + \\alpha\\beta \\cdot \\alpha = \\alpha\\beta(\\alpha + \\beta)$$.\n\n- Step 2: In the transformed-roots sum, the numerator is:\n$$\\alpha(\\beta^2 + 1) + \\beta(\\alpha^2 + 1) = \\alpha\\beta^2 + \\alpha + \\beta\\alpha^2 + \\beta = \\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta)$$\n\n- Step 3: Factor out $$\\left(\\alpha + \\beta\\right)$$:\n$$= (\\alpha + \\beta)(\\alpha\\beta + 1) = 6 \\cdot (3 + 1) = 6 \\cdot 4 = 24$$\n\nThis was the exact sticking point in the May 2023 revision — the student didn't see how to factor the numerator. The trick: don't expand and collect terms brute-force. Instead, recognize that $$\\alpha\\beta^2 + \\beta\\alpha^2$$ factors as $$\\alpha\\beta(\\alpha+\\beta)$$, and then $$\\alpha + \\beta$$ is a common factor of the entire numerator.\n\nThe general principle: when summing fractions with $$\\alpha^2$$ and $$\\beta^2$$ symmetrically, always look for common factors involving $$\\alpha + \\beta$$ and $$\\alpha\\beta$$ first.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "After computing the sum $$S$$ and product $$P$$ of the new transformed roots, how do you construct the new quadratic equation, and why must you clear fractions to get integer coefficients? (3 steps)", "answer": "- Step 1: The new quadratic has the form $$x^2 - Sx + P = 0$$ (from Vieta's — the sum of roots is the negative of the linear coefficient, the product is the constant term).\n\n- Step 2: Substitute the computed values:\n$$x^2 - \\tfrac{3}{5}x + \\tfrac{3}{40} = 0$$\nThese are fractional coefficients, but the question asks for integer $$p, q, r$$ in $$px^2 + qx + r = 0$$.\n\n- Step 3: Find the LCD of all denominators (5 and 40 → LCD is 40) and multiply through:\n$$40x^2 - 24x + 3 = 0$$\n\nWhy clear fractions: the question specifies \"where $$p, q, r$$ are integers.\" The fractional form is mathematically equivalent but doesn't satisfy the required format. Always check what form the question asks for before stopping.\n\nKey connection: the denominator in both $$S = 24/40$$ and $$P = 3/40$$ is 40, which is exactly $$(\\alpha^2+1)(\\beta^2+1)$$ from part (a). Part (b) always reuses part (a) — the product of the new roots has the part-(a) result as its denominator.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "When computing $$|z_1 + z_2|$$ for two complex numbers, what is the correct procedure, and what is the common mistake of trying to add moduli directly? (2 steps)", "answer": "- Step 1: The correct procedure: **first add the complex numbers**, then take the modulus of the sum.\n$$z_1 + z_2 = (3 + 2i) + (2 + 3i) = 5 + 5i$$\n$$|z_1 + z_2| = |5 + 5i| = \\sqrt{5^2 + 5^2} = \\sqrt{50} = 5\\sqrt{2}$$\n\n- Step 2: The common mistake: $$|z_1| + |z_2| \\ne |z_1 + z_2|$$ in general. For this example:\n$$|z_1| = \\sqrt{13}, \\quad |z_2| = \\sqrt{13}, \\quad |z_1| + |z_2| = 2\\sqrt{13} \\approx 7.21$$\nBut $$|z_1 + z_2| = 5\\sqrt{2} \\approx 7.07$$ — they're different!\n\nGeometrically, this is the **triangle inequality**: $$|z_1 + z_2| \\le |z_1| + |z_2|$$, with equality only when $$z_1$$ and $$z_2$$ point in the same direction (same argument). Adding moduli directly ignores the angle between the two vectors — it's like saying \"walking 3 km east then 2 km north is the same as walking 5 km northeast,\" which is clearly wrong.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "When dividing complex numbers (e.g., computing $$w = \\frac{z_2 z_3}{z_1}$$), what is the standard method, and why do you multiply numerator and denominator by the conjugate of the denominator? (2 steps)", "answer": "- Step 1: Multiply both numerator and denominator by $$\\bar{z}_1$$ (the conjugate of the denominator):\n$$w = \\frac{z_2 z_3}{z_1} = \\frac{z_2 z_3 \\cdot \\bar{z}_1}{z_1 \\cdot \\bar{z}_1} = \\frac{z_2 z_3 \\cdot \\bar{z}_1}{|z_1|^2}$$\n\n- Step 2: Why this works: the denominator becomes $$|z_1|^2$$, which is a **real number** — it cleanly separates into a real denominator that you can distribute across real and imaginary parts of the numerator. Without this step, you'd have a complex denominator, making it impossible to write $$w$$ in the form $$x + iy$$.\n\nFor the May 2023 question: $$|z_1|^2 = 3^2 + 2^2 = 13$$, so the denominator becomes 13. The numerator $$z_2 z_3 \\cdot \\bar{z}_1$$ is computed by first finding $$z_2 z_3$$, then multiplying by $$3 - 2i$$. The key order: **multiply numerator complex numbers first, then multiply by conjugate** — don't try to do everything in one step.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "After writing $$w = x + iy$$ with specific real and imaginary parts, and being told $$w$$ equals a given complex number, how do you find unknowns $$a$$ and $$b$$? (2 steps)", "answer": "- Step 1: **Equate real and imaginary parts separately**. If $$w = \\frac{12a - 5b}{13} + \\frac{5a + 12b}{13}i$$ and $$w = \\frac{4}{13} + \\frac{58}{13}i$$, then:\n$$12a - 5b = 4 \\quad \\text{(real parts)}$$\n$$5a + 12b = 58 \\quad \\text{(imaginary parts)}$$\n\n- Step 2: Solve the simultaneous equations. The efficient method:\n+ Multiply the first equation by 12: $$144a - 60b = 48$$\n+ Multiply the second equation by 5: $$25a + 60b = 290$$\n+ Add (the $$b$$ coefficients cancel): $$169a = 338 \\Rightarrow a = 2$$\n+ Back-substitute: $$12(2) - 5b = 4 \\Rightarrow 24 - 5b = 4 \\Rightarrow b = 4$$\n\nThe coefficients 12 and 5 were chosen deliberately — multiplying by them makes the $$b$$-coefficients equal in magnitude ($$60$$), enabling elimination. This is faster than substitution for this particular system.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "How do you determine $$\\arg(w)$$ when $$w$$ is in the first quadrant, and what would change if $$w$$ were in a different quadrant? (3 steps)", "answer": "- Step 1: For a complex number $$w = x + iy$$ in the **first quadrant** ($$x > 0, y > 0$$):\n$$\\arg(w) = \\arctan\\left(\\frac{y}{x}\\right) = \\arctan\\left(\\frac{\\text{Im}}{\\text{Re}}\\right)$$\n\n- Step 2: For the May 2023 question: $$w = \\tfrac{4}{13} + \\tfrac{58}{13}i$$, both parts positive (Q1):\n$$\\arg(w) = \\arctan\\left(\\frac{58/13}{4/13}\\right) = \\arctan\\left(\\frac{58}{4}\\right) = \\arctan(14.5) \\approx 1.502 \\text{ rad}$$\n\n- Step 3: The quadrant rules (NOT in the formula booklet — memorize all four):\n+ Q1 ($$x>0, y>0$$): $$\\arg = \\arctan(y/x)$$ — direct calculation\n+ Q2 ($$x<0, y>0$$): $$\\arg = \\pi - \\arctan(|y/x|)$$ — add to get into the upper-left region\n+ Q3 ($$x<0, y<0$$): $$\\arg = -\\pi + \\arctan(|y/x|)$$ — negative angle in the lower-left\n+ Q4 ($$x>0, y<0$$): $$\\arg = -\\arctan(|y/x|)$$ — negative angle below the real axis\n\nThe principle: $$\\arctan$$ alone only gives angles in $$\\left(-\\frac{\\pi}{2}, \\frac{\\pi}{2}\\right)$$, so you must adjust based on quadrant to get the correct principal argument in $$\\left(-\\pi, \\pi\\right]$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "What is the sign-change test for locating a root, and what two conditions must be satisfied for it to guarantee a root exists in the interval? (2 steps)", "answer": "- Step 1: The sign-change test: if $$f(a)$$ and $$f(b)$$ have **opposite signs** (one positive, one negative), and $$f$$ is **continuous** on $$[a, b]$$, then there exists at least one root $$\\alpha \\in (a, b)$$ such that $$f(\\alpha) = 0$$.\n\n- Step 2: Both conditions are essential:\n+ **Sign change** alone is not sufficient — consider $$f(x) = 1/x$$ on $$[-1, 1]$$: $$f(-1) = -1 < 0$$ and $$f(1) = 1 > 0$$, but there's no root (the function has a discontinuity at $$x = 0$$).\n+ **Continuity** alone is not sufficient — a continuous function that stays positive on $$[a,b]$$ has no root there.\n\nFor the May 2023 question: $$f(1) = -1 < 0$$, $$f(2) = 2\\sqrt{2} - 1 > 0$$, and $$f(x) = x^{3/2} + x - 3$$ is continuous on $$[1,2]$$ (no discontinuities for $$x \\ge 0$$). Both conditions met ⟹ root guaranteed.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "In interval bisection, how do you decide which half-interval contains the root, and what must you write down for the examiner at each step? (2 steps)", "answer": "- Step 1: Compute the midpoint $$m = \\frac{a+b}{2}$$ and evaluate $$f(m)$. Compare the sign of $$f(m)$$ with $$f(a)$$ and $$f(b)$$:\n+ If $$f(a)$$ and $$f(m)$$ have opposite signs ⟹ root is in $$[a, m]$$\n+ If $$f(m)$$ and $$f(b)$$ have opposite signs ⟹ root is in $$[m, b]$$\n\n- Step 2: What to write for the examiner:\n+ The midpoint value and its function evaluation: \"$$m_1 = 1.5$$, $$f(1.5) = 0.337 > 0$$\"\n+ A sign comparison: \"$$f(1) < 0$$ and $$f(1.5) > 0$$, sign change ⟹ root in $$[1, 1.5]$$\"\n+ Repeat for each bisection step, clearly stating the new interval at the end.\n\nFor the May 2023 paper (two bisections from $$[1, 2]$$):\n+ First: midpoint 1.5, $$f(1.5) > 0$$, sign change with $$f(1) < 0$$ ⟹ root in $$[1, 1.5]$$\n+ Second: midpoint 1.25, $$f(1.25) < 0$$, sign change with $$f(1.5) > 0$$ ⟹ root in $$[1.25, 1.5]$$", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "What is the Newton-Raphson formula, and what is the key calculator strategy to avoid rounding errors when applying it? (2 steps)", "answer": "- Step 1: The Newton-Raphson iteration formula (IN the formula booklet):\n$$x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$$\nEach step uses the current approximation $$x_n$$, evaluates both $$f(x_n)$$ and $$f'(x_n)$$, and computes the next approximation.\n\n- Step 2: Calculator hygiene to avoid rounding propagation:\n+ **Store** $$x_0$$ in calculator memory (e.g., ANS or memory slot)\n+ **Use the stored value** for both $$f(x_0)$$ and $$f'(x_0)$$ — don't type the rounded value manually\n+ **Round only at the final step** to the required precision (3 d.p.); keep full precision internally throughout the calculation\n+ For the May 2023 question: $$x_0 = 1.375$$, $$f(1.375) = -0.01246$$, $$f'(1.375) = 2.7588$$, so $$x_1 = 1.375 + 0.004516 = 1.3795... \\approx 1.380$$ (3 d.p.)\n\nIf you rounded $$f(x_0)$$ to 2 decimal places before dividing by $$f'(x_0)$$, the error would propagate and your final answer could be off by 0.01 or more.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "What is the closed-form formula for linear interpolation on the interval $$[a, b]$$, and how does it differ philosophically from bisection? (3 steps)", "answer": "- Step 1: The linear interpolation formula (NOT in the formula booklet — memorize):\n$$x_1 = a - \\frac{f(a)(b - a)}{f(b) - f(a)}$$\nThis assumes $$f$$ is approximately linear on $$[a, b]$$ and finds where the straight line connecting $$\\left(a, f(a)\\right)$$ and $$\\left(b, f(b)\\right)$$ crosses the x-axis.\n\n- Step 2: Apply to the May 2023 question on $$[1.25, 1.5]$$:\n$$f(1.25) = -0.352, \\quad f(1.5) = 0.337$$\n$$x_1 = 1.25 - \\frac{(-0.352)(0.25)}{0.337 - (-0.352)} = 1.25 - \\frac{-0.088}{0.689} = 1.25 + 0.1278 \\approx 1.378$$\n\n- Step 3: Philosophical difference from bisection:\n+ **Bisection** always uses the midpoint — it's guaranteed to converge but slow, halving the interval each time regardless of where the root actually is.\n+ **Linear interpolation** uses the function values to estimate where the root is — faster convergence when $$f$$ is roughly linear, but can be slower than bisection if $$f$$ is highly curved.\n+ **Newton-Raphson** uses the derivative — fastest convergence near a root, but can diverge entirely if $$f'(x_0)$$ is small or the initial guess is far from the root.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "What is the parametric form of a point on the parabola $$y^2 = 4ax$$, and how do you identify $$a$$ from the equation $$y^2 = 8x$$? (2 steps)", "answer": "- Step 1: The standard parametric form for $$y^2 = 4ax$$ is:\n$$\\left(at^2, \\, 2at\\right)$$\nwhere $$t$$ is the parameter and $$a$$ is the focal distance (the distance from the vertex to the focus).\n\n- Step 2: To find $$a$$, compare the given equation with the standard form $$y^2 = 4ax$$:\n$$y^2 = 8x \\;\\Rightarrow\\; 4a = 8 \\;\\Rightarrow\\; a = 2$$\n\nSo for $$y^2 = 8x$$: parametric points are $$\\left(2t^2, 4t\\right)$$, focus is $$\\left(2, 0\\right)$$, directrix is $$x = -2$$.\n\nCommon mistake: confusing $$4a$$ with $$a$$. The equation $$y^2 = 8x$$ means $$4a = 8$$, so $$a = 2$$, NOT $$a = 8$$. The \"4\" is part of the standard form — always solve for $$a$$ by dividing the coefficient of $$x$$ by 4.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "What are the focus and directrix of the parabola $$y^2 = 4ax$$, and what is their geometric relationship to the curve? (2 steps)", "answer": "- Step 1: For $$y^2 = 4ax$$:\n+ **Focus**: $$S = (a, 0)$$ — a point on the positive x-axis at distance $$a$$ from the vertex\n+ **Directrix**: the line $$x = -a$$ — a vertical line at distance $$a$$ on the negative side of the vertex\n\n- Step 2: Their geometric relationship: the parabola is the set of all points equidistant from the focus and the directrix. For any point $$P$$ on the curve:\n$$\\text{distance to focus} = \\text{distance to directrix}$$\n$$\\sqrt{(x-a)^2 + y^2} = x + a$$\nSquaring and simplifying: $$x^2 - 2ax + a^2 + y^2 = x^2 + 2ax + a^2$$ ⟹ $$y^2 = 4ax$$ ✓\n\nThis is the **definition** of a parabola — the curve is the locus of points where the focal distance equals the directrix distance. For $$y^2 = 8x$$ ($$a=2$$): focus at $$\\left(2, 0\\right)$$, directrix $$x = -2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "What is the tangent equation at the parametric point $$\\left(at^2, 2at\\right)$$ on $$y^2 = 4ax$$, and how is it derived? (3 steps)", "answer": "- Step 1: The tangent equation (NOT in the formula booklet — memorize):\n$$ty = x + at^2$$\n\n- Step 2: Derivation using the gradient. At $$\\left(at^2, 2at\\right)$$:\n$$y^2 = 4ax \\;\\Rightarrow\\; 2y\\,\\frac{dy}{dx} = 4a \\;\\Rightarrow\\; \\frac{dy}{dx} = \\frac{2a}{y} = \\frac{2a}{2at} = \\frac{1}{t}$$\n\n- Step 3: Line through $$\\left(at^2, 2at\\right)$$ with gradient $$1/t$$:\n$$y - 2at = \\frac{1}{t}\\left(x - at^2\\right)$$\n$$ty - 2at^2 = x - at^2$$\n$$ty = x + at^2$$\n\nThe form $$ty = x + at^2$$ is the standard memorizable result. Note: when $$t$$ is in the denominator of the gradient, multiplying through by $$t$$ clears the fraction and gives this clean form.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "What is the focal chord criterion $$t_1 t_2 = -1$$, and why does it guarantee that the chord connecting two parametric points passes through the focus? (3 steps)", "answer": "- Step 1: The criterion: for two points $$P\\left(at_1^2, 2at_1\\right)$$ and $$Q\\left(at_2^2, 2at_2\\right)$$ on $$y^2 = 4ax$$, the chord $$PQ$$ passes through the focus $$\\left(a, 0\\right)$$ if and only if $$t_1 t_2 = -1$$.\n\n- Step 2: Why it works — the chord equation through two parametric points is:\n$$\\left(t_1 + t_2\\right)y = 2x + 2at_1 t_2$$\nSubstitute the focus $$\\left(a, 0\\right)$$: $$\\left(t_1 + t_2\\right) \\cdot 0 = 2a + 2at_1 t_2$$ ⟹ $$0 = 2a(1 + t_1 t_2)$$ ⟹ $$t_1 t_2 = -1$$.\n\n- Step 3: In the May 2023 question: $$P$$ has parameter $$t_1 = p$$, and $$Q$$ has parameter $$t_2 = -1/p$$ (since $$Q = \\left(2/p^2, -4/p\\right) = \\left(a(-1/p)^2, 2a(-1/p)\\right)$$). Then $$t_1 t_2 = p \\cdot (-1/p) = -1$$ ✓, immediately confirming the chord passes through the focus — no slope calculation needed.\n\nThis criterion is a powerful shortcut: instead of computing slopes and verifying the line passes through $$\\left(a, 0\\right)$$, just check if the parameters multiply to $$-1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "What is the \"directrix-as-polar\" theorem for parabolas, and what does it tell you about where tangents at the ends of a focal chord meet? (2 steps)", "answer": "- Step 1: The theorem: **the tangents at the endpoints of any focal chord of a parabola meet on the directrix**. This is equivalent to saying the directrix is the \"polar\" of the focus — every line through the focus intersects the parabola at two points, and the tangents at those points meet on the directrix.\n\n- Step 2: In the May 2023 question, this theorem predicts the answer before any algebra:\n+ The chord $$PQ$$ passes through the focus (since $$t_1 t_2 = -1$$)\n+ Therefore, the tangents at $$P$$ and $$Q$$ must meet on the directrix $$x = -2$$\n+ The algebraic computation confirms this: the intersection point $$R$$ has $$x = -2$$ ✓\n\nThe y-coordinate of $$R$$ is $$2p - \\frac{2}{p}$$, which varies with the parameter — but the x-coordinate is always $$-a = -2$$, landing exactly on the directrix. This theorem is worth memorizing because it lets you predict the x-coordinate of the tangent intersection instantly, saving significant computation time.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "When finding the intersection of two tangent lines to a parabola (e.g., tangents at $$P$$ and $$Q$$), what is the systematic approach, and what algebraic simplification should you anticipate? (3 steps)", "answer": "- Step 1: Write both tangent equations in the form $$x = \\ldots$$ (isolating $$x$$ makes setting them equal straightforward):\n+ Tangent at $$P$$ ($$t_1 = p$$): $$py = x + 2p^2 \\;\\Rightarrow\\; x = py - 2p^2$$\n+ Tangent at $$Q$$ ($$t_2 = -1/p$$): $$-\\frac{y}{p} = x + \\frac{2}{p^2} \\;\\Rightarrow\\; x = -\\frac{y}{p} - \\frac{2}{p^2}$$\n\n- Step 2: Set the two expressions for $$x$$ equal:\n$$py - 2p^2 = -\\frac{y}{p} - \\frac{2}{p^2}$$\nMultiply through by $$p^2$$ to clear all fractions:\n$$p^3 y - 2p^4 = -py - 2$$\n\n- Step 3: Collect terms and factor:\n$$y\\left(p^3 + p\\right) = 2p^4 - 2 = 2\\left(p^2 - 1\\right)\\left(p^2 + 1\\right)$$\n$$y \\cdot p\\left(p^2 + 1\\right) = 2\\left(p^2 - 1\\right)\\left(p^2 + 1\\right)$$\nCancel $$\\left(p^2 + 1\\right)$$ (always positive, never zero):\n$$y = \\frac{2\\left(p^2 - 1\\right)}{p} = 2p - \\frac{2}{p}$$\n\nThen $$x = p\\left(2p - \\frac{2}{p}\\right) - 2p^2 = 2p^2 - 2 - 2p^2 = -2$$.\n\nThe anticipated simplification: $$\\left(p^2 + 1\\right)$$ cancels, and the $$2p^2$$ terms in $$x$$ cancel, leaving the clean result $$R = \\left(-2, 2p - 2/p\\right)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "What are the four required steps of a mathematical induction proof for divisibility, and what must each step contain for full marks? (4 steps)", "answer": "- Step 1: **BASE CASE** — Show the statement is true for the smallest value of $$n$$ (usually $$n = 1$$, or $$n = n_0$$ if specified). Must include an explicit calculation showing divisibility. For \"divisible by 18\": write the result as $$18 \\times (\\text{integer})$$.\n\n- Step 2: **ASSUMPTION** — State clearly: \"Assume true for $$n = k$$\", i.e., $$f(k) = 18m$$ for some integer $$m$$. This is the inductive hypothesis — you're assuming what you want to prove, for a specific but arbitrary $$k$$.\n\n- Step 3: **INDUCTIVE STEP** — Show that if the statement holds for $$n = k$$, it also holds for $$n = k+1$$. This is where the actual algebra happens. Must use the assumption from Step 2 explicitly.\n\n- Step 4: **CONCLUSION** — State: \"True for $$n = 1$$ [or $$n_0$$]. If true for $$n = k$$, then true for $$n = k+1$$. By the **principle of mathematical induction**, the statement is true for all $$n \\in \\mathbb{Z}^+$$ [or $$n \\ge n_0$$].\"\n\nExaminers give method marks for the structure — even if your algebra in Step 3 is incomplete, stating all four steps correctly can salvage partial credit. Never skip the conclusion sentence.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "In divisibility induction, what is the \"engineered-form\" approach, and how does it differ from the \"difference approach\"? Which was more effective for the May 2023 question? (3 steps)", "answer": "- Step 1: **Difference approach**: compute $$f(k+1) - f(k)$$ and try to show this difference is divisible by the target number. If $$f(k+1) - f(k) = 18r$$ and $$f(k) = 18m$$, then $$f(k+1) = 18(m + r)$$ ✓. This works when the difference simplifies cleanly.\n\n- Step 2: **Engineered-form approach**: write $$f(k+1)$$ directly as a multiple of $$f(k)$$ plus a known multiple of the target divisor:\n$$f(k+1) = c \\cdot f(k) + d \\cdot (\\text{integer})$$\nFor the May 2023 question: $$f(k+1) = 4f(k) - 18(k-2)$$, where $$c = 4$$ and the remainder $$-18(k-2)$$ is clearly divisible by 18.\n\n- Step 3: Which was more effective: the **engineered-form** approach. The difference $$f(k+1) - f(k) = 3 \\cdot 4^k + 6 = 3(4^k + 2)$$ requires a sub-claim that $$4^k + 2$$ is divisible by 6 (proved via modular arithmetic). The engineered form avoids this sub-claim entirely — you just express $$f(k+1)$$ in terms of $$f(k)$$ and a clean multiple of 18.\n\nThe engineered-form trick: add and subtract terms to build $$f(k)$$ inside the expression for $$f(k+1)$$, then factor out what remains as a multiple of the divisor.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "How do you derive the engineered form $$f(k+1) = 4f(k) - 18(k-2)$$ for the divisibility proof that $$4^n + 6n - 10$$ is divisible by 18? (3 steps)", "answer": "- Step 1: Start with $$f(k+1)$$:\n$$f(k+1) = 4^{k+1} + 6(k+1) - 10 = 4 \\cdot 4^k + 6k + 6 - 10 = 4 \\cdot 4^k + 6k - 4$$\n\n- Step 2: Add and subtract to build $$f(k) = 4^k + 6k - 10$$:\n$$f(k+1) = (4^k + 6k - 10) + 3 \\cdot 4^k + 6 = f(k) + 3 \\cdot 4^k + 6$$\n\n- Step 3: Now express $$3 \\cdot 4^k + 6$$ in terms of $$f(k)$$:\n$$3f(k) = 3(4^k + 6k - 10) = 3 \\cdot 4^k + 18k - 30$$\nSo: $$3 \\cdot 4^k = 3f(k) - 18k + 30$$\nSubstituting: $$3 \\cdot 4^k + 6 = 3f(k) - 18k + 30 + 6 = 3f(k) - 18k + 36 = 3f(k) - 18(k - 2)$$\n\nTherefore: $$f(k+1) = f(k) + 3f(k) - 18(k-2) = 4f(k) - 18(k-2)$$.\n\nBoth terms are divisible by 18: $$4f(k)$$ because $$f(k) = 18m$$ by hypothesis, and $$18(k-2)$$ because 18 is explicit. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "What is the sub-claim approach for the difference method, and how does modular arithmetic prove that $$4^k + 2$$ is divisible by 6 for all $$k \\ge 1$$? (2 steps)", "answer": "- Step 1: The difference method gives $$f(k+1) - f(k) = 3(4^k + 2)$$. For this to be divisible by 18, we need $$4^k + 2$$ divisible by 6 (since $$3 \\times 6 = 18$$). This is the **sub-claim**: $$6 \\mid (4^k + 2)$$ for all $$k \\ge 1$$.\n\n- Step 2: Proof via modular arithmetic: compute $$4^k \\pmod{6}$$.\n+ $$4^1 = 4 \\pmod{6}$$\n+ $$4^2 = 16 = 4 \\pmod{6}$$ (since $$16 - 12 = 4$$)\n+ $$4^3 = 64 = 4 \\pmod{6}$$ (since $$64 - 60 = 4$$", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}], "count": 37}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "When expanding $r(r+2)^2$ inside a summation, what is the correct expansion, and w
