nd $|z_1|^2 = 2^2 + 3^2 = 13$, so the factor is $z^2 - 4z + 13$\n\n[Takeaway: This formula saves time compared to multiplying out $(z-(2+3i))(z-(2-3i))$ manually.]", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "To divide $2x^4 - 8x^3 + 29x^2 - 12x + 39$ by the quadratic factor $x^2 - 4x + 13$, what is the quotient obtained? (2 steps)", "answer": "- Step 1: Perform polynomial long division or recognize that the product must equal the original quartic\n- Step 2: The quotient is $2x^2 + 3$, since $(x^2 - 4x + 13)(2x^2 + 3) = 2x^4 - 8x^3 + 29x^2 - 12x + 39$ exactly. This leaves the remaining roots from solving $2x^2 + 3 = 0$", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "If the quadratic factor from a complex root gives $2x^2 + 3 = 0$, what are the other two roots of the quartic? (1 step)", "answer": "- Step 1: Solving $2x^2 + 3 = 0$ gives $x^2 = -\\frac{3}{2}$, so $x = \\pm i\\sqrt{\\frac{3}{2}} = \\pm \\frac{i\\sqrt{6}}{2}$. These are purely imaginary roots.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "On an Argand diagram, where would you plot the four roots: $2 + 3i$, $2 - 3i$, $\\frac{i\\sqrt{6}}{2}$, and $-\\frac{i\\sqrt{6}}{2}$? Describe their positions relative to the axes. (1 step)", "answer": "- Step 1: $2 + 3i$ at $(2, 3)$ and $2 - 3i$ at $(2, -3)$ are mirror images across the real axis; $\\frac{i\\sqrt{6}}{2}$ at $(0, \\approx 1.22)$ and $-\\frac{i\\sqrt{6}}{2}$ at $(0, \\approx -1.22)$ lie on the imaginary axis. All four roots form a symmetric rectangular pattern.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "For the rectangular hyperbola $xy = 9$, what is its parametric form? If $P(3t, 3/t)$ is a point on it, what is the value of $t$ at $P$? (1 step)", "answer": "- Step 1: The rectangular hyperbola $xy = c^2$ has parametric form $(ct, c/t)$. Here $c^2 = 9$, so $c = 3$, giving parametric form $(3t, 3/t)$. At $P(3t, 3/t)$, the parameter is simply $t$.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "For the rectangular hyperbola $xy = 9$ with point $P(3t, 3/t)$, derive the gradient $\\frac{dy}{dx}$ at $P$ using implicit differentiation. (2 steps)", "answer": "- Step 1: Differentiate $xy = 9$ implicitly: $y + x\\frac{dy}{dx} = 0$, so $\\frac{dy}{dx} = -\\frac{y}{x}$\n- Step 2: At $P(3t, 3/t)$, substitute $x = 3t$ and $y = 3/t$: $\\frac{dy}{dx} = -\\frac{3/t}{3t} = -\\frac{1}{t^2}$\n\n[Takeaway: This gives a quick formula $\\frac{dy}{dx} = -\\frac{1}{t^2}$ for any point $(ct, c/t)$ on $xy = c^2$.]", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "What is the gradient of the normal to the rectangular hyperbola $xy = 9$ at the point $P(3t, 3/t)$? (1 step)", "answer": "- Step 1: The tangent gradient is $-\\frac{1}{t^2}$, so the normal gradient is the negative reciprocal: $-1 \\div (-\\frac{1}{t^2}) = t^2$.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Find the equation of the normal to $xy = 9$ at $P(3t, 3/t)$ in the form $ty - t^3x = f(t)$. (2 steps)", "answer": "- Step 1: Line through $P$ with gradient $t^2$: $y - \\frac{3}{t} = t^2(x - 3t)$\n- Step 2: Multiply by $t$: $ty - 3 = t^3x - 3t^4$, so $ty - t^3x = 3 - 3t^4 = 3(1 - t^4)$\n\n[Takeaway: This matches the required form with $f(t) = 3(1 - t^4)$.]", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "With $t = 2$, the normal to $xy = 9$ at $P$ intersects the hyperbola again. If the quadratic in $x$ from substituting the normal into $xy = 9$ is $8x^2 - 45x - 18 = 0$, and one root is $x = 6$ (the point $P$), how do you find the other x-coordinate without solving the quadratic again? (2 steps)", "answer": "- Step 1: Using Vieta's formulas: for $ax^2 + bx + c = 0$, the product of roots is $c/a$\n- Step 2: Here product $= -\\frac{18}{8} = -\\frac{9}{4}$. If one root is $6$, the other is $-\\frac{9}{4} \\div 6 = -\\frac{9}{24} = -\\frac{3}{8}$\n\n[Takeaway: This \"Vieta's shortcut\" is much faster than re-solving the quadratic.]", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "What are the coordinates of the second intersection point when the normal to $xy = 9$ at $P(6, \\frac{3}{2})$ meets the hyperbola again? (1 step)", "answer": "- Step 1: The second intersection is at $x = -\\frac{3}{8}$. Substituting into $xy = 9$: $y = 9 \\div (-\\frac{3}{8}) = -24$. So the point is $(-\\frac{3}{8}, -24)$.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "For a 2×2 matrix $A = \\begin{pmatrix} -3 & 8 \\\\ -3 & k \\end{pmatrix}$, the transformation takes a triangle to an image with area 3 times the original. What equation does this give for $\\det A$, and why must we consider both positive and negative cases? (2 steps)", "answer": "- Step 1: Area scale factor equals $|\\det A|$, so $|\\det A| = 3$\n- Step 2: We must consider $\\det A = +3$ AND $\\det A = -3$ because the absolute value means both give an area scale factor of 3 (the sign indicates orientation reversal). This is why questions say \"possible values.\"", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Calculate the determinant of $A = \\begin{pmatrix} -3 & 8 \\\\ -3 & k \\end{pmatrix}$ and find the possible values of $k$ given that $|\\det A| = 3$. (2 steps)", "answer": "- Step 1: $\\det A = (-3)(k) - (8)(-3) = -3k + 24$\n- Step 2: Set $-3k + 24 = \\pm 3$: if $+3$, then $k = 7$; if $-3$, then $k = 9$. So $k = 7$ or $k = 9$", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Given $B = \\begin{pmatrix} a & -4 \\\\ 2 & 3 \\end{pmatrix}$ and $BC = D$ where $D = \\begin{pmatrix} 2 & 5 & 1 \\\\ 1 & 4 & 2 \\end{pmatrix}$, how do you find matrix $C$? (2 steps)", "answer": "- Step 1: Rearrange to $C = B^{-1}D$. First find $B^{-1} = \\frac{1}{3a+8}\\begin{pmatrix} 3 & 4 \\\\ -2 & a \\end{pmatrix}$ using the formula $\\frac{1}{ad-bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$\n- Step 2: Multiply $B^{-1}$ by $D$: $C = \\frac{1}{3a+8}\\begin{pmatrix} 10 & 31 & 11 \\\\ a-4 & 4a-10 & 2a-2 \\end{pmatrix}$", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "For quadratic $x^2 - 6x + 3 = 0$ with roots $\\alpha, \\beta$, what are $\\alpha + \\beta$ and $\\alpha\\beta$ using Vieta's formulas? (1 step)", "answer": "- Step 1: $\\alpha + \\beta = -(-6)/1 = 6$, and $\\alpha\\beta = 3/1 = 3$. These are directly from Vieta: sum $= -b/a$, product $= c/a$.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Given $\\alpha + \\beta = 6$ and $\\alpha\\beta = 3$, find $\\alpha^2 + \\beta^2$ using a symmetric identity. (1 step)", "answer": "- Step 1: Use $\\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta = 6^2 - 2(3) = 36 - 6 = 30$", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Find $(\\alpha^2 + 1)(\\beta^2 + 1)$ given $\\alpha + \\beta = 6$ and $\\alpha\\beta = 3$. (2 steps)", "answer": "- Step 1: Expand: $(\\alpha^2+1)(\\beta^2+1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1 = (\\alpha\\beta)^2 + (\\alpha^2 + \\beta^2) + 1$\n- Step 2: Substitute: $3^2 + 30 + 1 = 9 + 30 + 1 = 40$", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "For new roots $\\alpha' = \\frac{\\alpha}{\\alpha^2+1}$ and $\\beta' = \\frac{\\beta}{\\beta^2+1}$, what is the sum $\\alpha' + \\beta'$? (Hint: the denominator equals 40 from part (a)). (2 steps)", "answer": "- Step 1: $\\alpha' + \\beta' = \\frac{\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1)}{40} = \\frac{\\alpha\\beta^2 + \\beta\\alpha^2 + \\alpha + \\beta}{40}$\n- Step 2: Factor the numerator: $\\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta) = (\\alpha+\\beta)(\\alpha\\beta+1) = 6 \\times 4 = 24$. So sum $= \\frac{24}{40} = \\frac{3}{5}$\n\n[Takeaway: The key trick is recognizing $\\alpha\\beta^2 + \\beta\\alpha^2 = \\alpha\\beta(\\alpha+\\beta)$.]", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Find the product $\\alpha' \\beta'$ where $\\alpha' = \\frac{\\alpha}{\\alpha^2+1}$ and $\\beta' = \\frac{\\beta}{\\beta^2+1}$, given $(\\alpha^2+1)(\\beta^2+1) = 40$. (1 step)", "answer": "- Step 1: $\\alpha' \\beta' = \\frac{\\alpha\\beta}{(\\alpha^2+1)(\\beta^2+1)} = \\frac{3}{40}$", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Given sum $S = \\frac{3}{5}$ and product $P = \\frac{3}{40}$ of new roots, write the quadratic equation with these roots in the form $px^2 + qx + r = 0$ with integer coefficients. (2 steps)", "answer": "- Step 1: Start with $x^2 - Sx + P = 0$, giving $x^2 - \\frac{3}{5}x + \\frac{3}{40} = 0$\n- Step 2: Multiply by 40 to clear denominators: $40x^2 - 24x + 3 = 0$", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Given $z_1 = 3 + 2i$ and $z_2 = 2 + 3i$, find $|z_1 + z_2|$ exactly. (1 step)", "answer": "- Step 1: $z_1 + z_2 = 5 + 5i$, so $|z_1 + z_2| = \\sqrt{5^2 + 5^2} = \\sqrt{50} = 5\\sqrt{2}$", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "For $z_2 = 2 + 3i$ and $z_3 = a + bi$, find $z_2 z_3$ in the form $x + iy$. (2 steps)", "answer": "- Step 1: Multiply: $(2 + 3i)(a + bi) = 2a + 2bi + 3ai + 3bi^2$\n- Step 2: Since $i^2 = -1$, this becomes $(2a - 3b) + (3a + 2b)i$", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "To divide complex numbers $\\frac{z_2 z_3}{z_1}$ where $z_1 = 3 + 2i$, what is the technique and why do we multiply by the conjugate? (1 step)", "answer": "- Step 1: Multiply numerator and denominator by $\\bar{z}_1 = 3 - 2i$. This gives a real denominator: $(3+2i)(3-2i) = 9 + 4 = 13 = |z_1|^2$.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "If $w = \\frac{z_2 z_3}{z_1}$ with $z_1 = 3+2i$, $z_2 = 2+3i$, and $z_3 = a+bi$, express $w$ in the form $x + iy$ with $x, y$ in terms of $a, b$. (2 steps)", "answer": "- Step 1: Multiply numerator $(2a-3b) + (3a+2b)i$ by conjugate $3-2i$, expand real and imaginary parts\n- Step 2: Real part: $3(2a-3b) + 2(3a+2b) = 12a - 5b$; Imaginary part: $-2(2a-3b) + 3(3a+2b) = 5a + 12b$. Divide by 13: $w = \\frac{12a-5b}{13} + \\frac{5a+12b}{13}i$", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Given $w = \\frac{4}{13} + \\frac{58}{13}i$, and $w = \\frac{12a-5b}{13} + \\frac{5a+12b}{13}i$, find $a$ and $b$. (2 steps)", "answer": "- Step 1: Equate real parts: $12a - 5b = 4$; equate imaginary parts: $5a + 12b = 58$\n- Step 2: Solve: multiply first by 12, second by 5: $144a - 60b = 48$, $25a + 60b = 290$. Add: $169a = 338$, so $a = 2$. Then $24 - 5b = 4$, so $b = 4$", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "For $w = \\frac{4}{13} + \\frac{58}{13}i$, determine $\\arg w$ in radians to 4 significant figures. (1 step)", "answer": "- Step 1: Both real and imaginary parts are positive, so $w$ is in quadrant 1. $\\arg w = \\arctan\\left(\\frac{58/13}{4/13}\\right) = \\arctan(14.5) \\approx 1.502$ radians (4 s.f.)", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "For $f(x) = x^{3/2} + x - 3$, show there is a root in the interval [1, 2]. What condition must be satisfied? (1 step)", "answer": "- Step 1: Evaluate: $f(1) = 1 + 1 - 3 = -1 < 0$; $f(2) = 2^{3/2} + 2 - 3 = 2\\sqrt{2} - 1 \\approx 1.828 > 0$. Since $f$ is continuous on [1, 2] and changes sign, a root exists in (1, 2) by the Intermediate Value Theorem.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": true}, {"question": "Starting with interval [1, 2] for the root of $f(x) = x^{3/2} + x - 3$, perform TWO steps of interval bisection. What is the resulting interval? (2 steps)", "answer": "- Step 1: Midpoint $m_1 = 1.5$: $f(1.5) \\approx 1.837 + 1.5 - 3 = 0.337 > 0$. Since $f(1) < 0$ and $f(1.5) > 0$, root in [1, 1.5]\n- Step 2: Midpoint $m_2 = 1.25$: $f(1.25) \\approx 1.398 + 1.25 - 3 = -0.352 < 0$. Since $f(1.25) < 0$ and $f(1.5) > 0$, root in [1.25, 1.5]", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "For $f(x) = x^{3/2} + x - 3$, find $f'(x)$. (1 step)", "answer": "- Step 1: $f(x) = x^{3/2} + x - 3 = x^{3/2} + x - 3$. Differentiate: $f'(x) = \\frac{3}{2}x^{1/2} + 1 = \\frac{3}{2}\\sqrt{x} + 1$", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Using Newton-Raphson with $x_0 = 1.375$ on $f(x) = x^{3/2} + x - 3$, perform ONE iteration to find $x_1$. (2 steps)", "answer": "- Step 1: Calculate $f(1.375) = 1.375^{1.5} + 1.375 - 3 \\approx 1.6125 + 1.375 - 3 = -0.01246$; $f'(1.375) = \\frac{3}{2}\\sqrt{1.375} + 1 \\approx 1.5(1.1726) + 1 = 2.7588$\n- Step 2: Apply formula: $x_1 = x_0 - \\frac{f(x_0)}{f'(x_0)} = 1.375 - \\frac{-0.01246}{2.7588} = 1.375 + 0.00452 \\approx 1.380$ (3 d.p.)", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "For linear interpolation on $[1.25, 1.5]$ where $f(1.25) \\approx -0.352$ and $f(1.5) \\approx 0.337$, what is the formula for the approximation $x_1$? (1 step)", "answer": "- Step 1: $x_1 = a - \\frac{f(a)(b-a)}{f(b) - f(a)}$ where $a = 1.25$, $b = 1.5$. This gives $x_1 = 1.25 - \\frac{(-0.352)(0.25)}{0.337 - (-0.352)}$", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Using linear interpolation on $[1.25, 1.5]$ with $f(1.25) = -0.352$ and $f(1.5) = 0.337$, calculate the approximation to 3 decimal places. (2 steps)", "answer": "- Step 1: $x_1 = 1.25 - \\frac{(-0.352)(0.25)}{0.337 + 0.352} = 1.25 - \\frac{-0.088}{0.689} = 1.25 + 0.1278$\n- Step 2: $x_1 \\approx 1.378$ (3 d.p.)", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "For the parabola $y^2 = 8x$, identify the value of $a$ and write the parametric form. What are the focus and directrix? (1 step)", "answer": "- Step 1: Compare with $y^2 = 4ax$: $4a = 8$, so $a = 2$. Parametric form: $(at^2, 2at) = (2t^2, 4t)$. Focus: $(a, 0) = (2, 0)$; Directrix: $x = -a = -2$", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "Show that $Q\\left(\\frac{2}{p^2}, -\\frac{4}{p}\\right)$ lies on $y^2 = 8x$ for $p \\neq 0$. (1 step)", "answer": "- Step 1: Calculate $y^2 = \\left(-\\frac{4}{p}\\right)^2 = \\frac{16}{p^2}$; calculate $8x = 8 \\times \\frac{2}{p^2} = \\frac{16}{p^2}$. Since $y^2 = 8x$, $Q$ lies on the parabola.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "For the parabola $y^2 = 4ax$ with points $P(at_1^2, 2at_1)$ and $Q(at_2^2, 2at_2)$, what condition on $t_1$ and $t_2$ ensures that chord $PQ$ passes through the focus? (1 step)", "answer": "- Step 1: The focal chord theorem states: $t_1 t_2 = -1$ if and only if chord $PQ$ passes through the focus $(a, 0)$. Here $t_1 = p$ and $t_2 = -1/p$, so $p \\times (-1/p) = -1$ ✓", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "For the parabola $y^2 = 4ax$, what is the equation of the tangent at the parametric point $(at^2, 2at)$? (1 step)", "answer": "- Step 1: The tangent is $ty = x + at^2$. This is NOT in the formula booklet and must be memorized.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "Find the point of intersection $R$ of the tangents at $P(2p^2, 4p)$ and $Q\\left(\\frac{2}{p^2}, -\\frac{4}{p}\\right)$ on $y^2 = 8x$. (3 steps)", "answer": "- Step 1: For $a = 2$, tangent at $P$ (parameter $p$): $py = x + 2p^2$, i.e. $x = py - 2p^2$\n- Step 2: Tangent at $Q$ (parameter $-1/p$): $-\\frac{1}{p}y = x + \\frac{2}{p^2}$, i.e. $x = -\\frac{y}{p} - \\frac{2}{p^2}$\n- Step 3: Equate: $py - 2p^2 = -\\frac{y}{p} - \\frac{2}{p^2}$. Multiply by $p^2$: $p^3y - 2p^4 = -py - 2$. Rearranging: $y(p^3 + p) = 2p^4 - 2$, so $y = \\frac{2(p^4 - 1)}{p(p^2 + 1)} = \\frac{2(p^2 - 1)}{p} = 2p - \\frac{2}{p}$. Then $x = -2$\n\n[Takeaway: The tangents at the ends of a focal chord meet on the directrix. Here $x = -2$ is indeed the directrix.]", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "For mathematical induction proving $4^n + 6n - 10$ is divisible by 18, what is the base case and what do you verify? (1 step)", "answer": "- Step 1: Base case $n = 1$: $4^1 + 6(1) - 10 = 4 + 6 - 10 = 0 = 18 \\times 0$, so divisible by 18. (Alternatively check $n = 2$ if the question starts at $n \\geq 2$.)", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "In the induction step for divisibility by 18 of $4^n + 6n - 10$, given the hypothesis that $4^k + 6k - 10 = 18m$, how do you express $f(k+1) = 4^{k+1} + 6(k+1) - 10$ in terms of $f(k)$? (2 steps)", "answer": "- Step 1: $f(k+1) = 4^{k+1} + 6k + 6 - 10 = 4 \\cdot 4^k + 6k - 4$\n- Step 2: Add and subtract $f(k)$: $f(k+1) = (4^k + 6k - 10) + 3 \\cdot 4^k + 6 = f(k) + 3 \\cdot 4^k + 6$", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "For the induction step showing $4^{k+1} + 6(k+1) - 10$ is divisible by 18, how do you show that $3 \\cdot 4^k + 6$ is divisible by 18? (2 steps)", "answer": "- Step 1: Note that $4 \\equiv 4 \\pmod{6}$, and $4^2 = 16 \\equiv 4 \\pmod{6}$, so $4^k \\equiv 4 \\pmod{6}$ for all $k \\geq 1$\n- Step 2: Then $3 \\cdot 4^k + 6 \\equiv 3 \\times 4 + 6 = 18 \\equiv 0 \\pmod{18}$, so it is divisible by 18", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "In the induction proof, if $f(k+1) = f(k) + 18r$ for some integer $r$, and $f(k) = 18m$, what can you conclude about $f(k+1)$? (1 step)", "answer": "- Step 1: $f(k+1) = 18m + 18r = 18(m + r)$, which is divisible by 18. This completes the inductive step.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "Why do we take the absolute value of the determinant when using it as an area scale factor for a matrix transformation? (1 step)", "answer": "- Step 1: The determinant gives the signed area scale factor (positive for orientation-preserving, negative for orientation-reversing). The actual area is always positive, so we use $|\\det A|$.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "When solving for $a$ and $b$ in complex number equations where $w = x + iy$ is given, what two pieces of information do you equate? (1 step)", "answer": "- Step 1: Equate the real parts: $\\text{Re}(w_{\\text{calculated}}) = \\text{Re}(w_{\\text{given}})$, and equate the imaginary parts: $\\text{Im}(w_{\\text{calculated}}) = \\text{Im}(w_{\\text{given}})$.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "When calculating $\\arg w$ for a complex number, why is it important to identify which quadrant the number lies in? (1 step)", "answer": "- Step 1: The arctan function only gives angles in the range $(-\\frac{\\pi}{2}, \\frac{\\pi}{2})$. For quadrants 2, 3, and 4, you must add $\\pi$ or subtract $\\pi$ to get the correct argument. For quadrant 1 (both Re > 0 and Im > 0), simply use $\\arctan(y/x)$.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "In interval bisection, why do we choose the subinterval where the function changes sign? (1 step)", "answer": "- Step 1: By the Intermediate Value Theorem, if $f$ is continuous and $f(a)$ and $f(b)$ have opposite signs, there must be at least one root in $(a, b)$. Bisection guarantees convergence to the root.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "Why might Newton-Raphson fail to converge to a root, and what condition on $f'(x_0)$ makes it risky? (1 step)", "answer": "- Step 1: Newton-Raphson can diverge if $f'(x_0)$ is close to zero (flat slope causes large jump), or if the initial guess is far from the root. A small $f'(x_0)$ amplifies any error in $f(x_0)$.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "What is the key geometric property of tangents drawn at the endpoints of a focal chord of a parabola? (1 step)", "answer": "- Step 1: The tangents at the ends of any focal chord meet on the directrix. This is a theorem worth remembering and can shortcut many problems.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "For the rectangular hyperbola $xy = c^2$, what is the general form of: (a) the tangent at $(ct, c/t)$, and (b) the normal at $(ct, c/t)$? (1 step)", "answer": "- Step 1: (a) Tangent: $x + t^2y = 2ct$; (b) Normal: $t^3x - ty = c(t^4 - 1)$. These are NOT in the formula booklet.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "In matrix problems where \"possible values\" are asked for, what mathematical property typically creates more than one answer? (1 step)", "answer": "- Step 1: Taking the absolute value (e.g., area scale factor $= |\\det A|$) or solving quadratic equations typically yields multiple solutions, so always consider both positive and negative cases.", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "When multiplying matrices to solve $BC = D$ for $C$, what must you ensure about the matrices before performing the multiplication? (1 step)", "answer": "- Step 1: Ensure $B$ is invertible (determinant $\\neq 0$) and check that the dimensions work: if $B$ is $2 \\times 2$ and $D$ is $2 \\times 3$, then $C$ will be $2 \\times 3$.", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "For Vieta's formulas applied to $x^2 - 6x + 3 = 0$, verify that $\\alpha^2 + \\beta^2 = 30$ using only $\\alpha + \\beta$ and $\\alpha\\beta$ without solving for $\\alpha$ and $\\beta$ individually. (1 step)", "answer": "- Step 1: Using the identity $\\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta$, substitute: $6^2 - 2(3) = 36 - 6 = 30$. This demonstrates the power of symmetric identities.", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "In the complex number division $\\frac{z_2 z_3}{z_1}$, what is the modulus of the denominator $|z_1|^2$ equal to, and why is this useful? (1 step)", "answer": "- Step 1: $|z_1|^2 = (3+2i)(3-2i) = 9 + 4 = 13$. When dividing by $z_1$, multiplying by its conjugate gives a real denominator equal to $|z_1|^2$, simplifying the calculation.", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "What shortcut can you use when finding the second intersection point of a line with a curve, given that you already know one intersection point? (1 step)", "answer": "- Step 1: If the intersection gives a quadratic equation with one known root $\\alpha$, the other root is $\\beta = \\frac{c/a}{\\alpha}$ (using Vieta's product formula), avoiding complete re-solution.", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": false}, {"question": "In the induction proof for divisibility by 18, what is the alternative \"engineered form\" approach that expresses $f(k+1)$ as a multiple of $f(k)$ plus a multiple of 18? (1 step)", "answer": "- Step 1: Express $f(k+1) = 4f(k) - 18(k-2)$. Since $18 \\mid f(k)$ by hypothesis and $18 \\mid 18(k-2)$, it follows that $18 \\mid f(k+1)$. This is cleaner than the difference approach.", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "For any point $(ct, c/t)$ on the rectangular hyperbola $xy = c^2$, what is special about the gradient of the tangent in terms of $t$? (1 step)", "answer": "- Step 1: The gradient is always $-\\frac{1}{t^2}$, independent of $c$. This simple formula makes many hyperbola problems tractable.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "When plotting complex roots on an Argand diagram, what symmetry must exist if the polynomial has real coefficients? (1 step)", "answer": "- Step 1: Complex roots must come in conjugate pairs, so they appear as mirror images across the real (horizontal) axis. Purely imaginary roots lie on the imaginary axis symmetric about the origin.", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}], "count": 59}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "For the polynomial $2x^4 - 8x^3 + 29x^2 - 12x + 39 = 0$, given that $x = 2 + 3i$ is a root, how do you form the quadratic factor containing this root and its conjugate? (3 steps)", "answer": "- Step 1: For a real-coefficient polynomial, complex roots come in conjugate pairs. Since $2+3i$ is a root, $2-3i$ must also be a root.\n- Step 2: Use the formula $(x - z_1)(x - \\bar z_1) = x^2 - 2\\,\\text{Re}(z_1)x + |z_1|^2$\n- Step 3: With $z_1 = 2+3i$, we get $\\text{Re}(z_1) = 2$ and $|z_1|^2 = 2^2 + 3^2 = 13$, so the quadratic factor is $x^2 - 4x + 13$\n- The key insight: $|z|^2$ is always real and positive (sum of squares), ensuring the factor has real coefficients", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Why must you consider $\\det(A) = \\pm 3$ when finding the value of $k$ for which the matrix $A = \\begin{pmatrix} -3 & 8 \\\\ -3 & k \\end{pmatrix}$ gives an area scale factor of 3? (2 steps)", "answer": "- Step 1: The area scale factor of a linear transformation represented by matrix $A$ equals $|\\det(A)|$, the absolute value of the determinant.\n- Step 2: If the area of the image is 3 times the area of the original, then $|\\det(A)| = 3$, which means $\\det(A)$ could be either $+3$ or $-3$ (both give $|\\det| = 3$). This is why the question asks for \"possible values\" — you must solve both equations $-3k + 24 = 3$ and $-3k + 24 = -3$\n- The sign of the determinant also indicates orientation: a negative determinant means the image is \"flipped\" (mirrored) relative to the original", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "For the complex number $w = \\frac{z_2 z_3}{z_1}$ where $z_1 = 3+2i$ and $z_2 = 2+3i$, explain why we multiply numerator and denominator by the conjugate of $z_1$ when simplifying. (3 steps)", "answer": "- Step 1: Division by a complex number $z_1 = a+bi$ is defined as $\\frac{1}{z_1} = \\frac{\\bar z_1}{|z_1|^2}$, where $|z_1|^2 = a^2 + b^2$ is real.\n- Step 2: Multiplying by $\\bar z_1 = 3-2i$ in the denominator eliminates the imaginary part: $(3+2i)(3-2i) = 9 + 4 = 13$ (a real number).\n- Step 3: This allows us to write $w$ in the standard form $x + iy$ with real $x$ and $y$, which is essential for finding the argument and for comparing with given values.\n- Without this step, we cannot extract real and imaginary parts to solve for unknown parameters $a$ and $b$.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "When finding $\\arg w$ where $w = \\frac{4}{13} + \\frac{58}{13}i$, why is it sufficient to use $\\arctan(\\text{Im/Re})$ directly without adding $\\pi$? (2 steps)", "answer": "- Step 1: The argument formula depends on which quadrant the complex number lies in.\n- Step 2: Both the real part $\\frac{4}{13} > 0$ and imaginary part $\\frac{58}{13} > 0$, so $w$ lies in the first quadrant. In Q1, $\\arg z = \\arctan(y/x)$.\n- Only when $x < 0$ do we need to add $\\pi$ (Q2) or subtract from $\\pi$ (Q3) to get the correct principal argument.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "In $\\sum_{r=1}^n r(r+2)^2$, after expanding to $r^3 + 4r^2 + 4r$ and applying the standard summation formulas, what is the key factorization step that leads to the final answer in the form $\\frac{1}{12}n(n+1)(an^2 + bn + c)$? (4 steps)", "answer": "- Step 1: Substitute the standard results: $\\sum r^3 = \\frac{1}{4}n^2(n+1)^2$, $\\sum r^2 = \\frac{1}{6}n(n+1)(2n+1)$, $\\sum r = \\frac{1}{2}n(n+1)$\n- Step 2: This gives $\\frac{1}{4}n^2(n+1)^2 + 4 \\cdot \\frac{1}{6}n(n+1)(2n+1) + 4 \\cdot \\frac{1}{2}n(n+1)$\n- Step 3: Bring everything to common denominator 12: $= \\frac{3}{12}n^2(n+1)^2 + \\frac{8}{12}n(n+1)(2n+1) + \\frac{24}{12}n(n+1)$\n- Step 4: Factor out $\\frac{1}{12}n(n+1)$, leaving $[3n(n+1) + 8(2n+1) + 24]$ inside the brackets — this is the \"factor-early\" trick that makes simplification manageable", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Why is $\\sum_{r=1}^n r = \\frac{1}{2}n(n+1)$ NOT in the Edexcel formula booklet, while $\\sum r^2$ and $\\sum r^3$ ARE in the booklet? (1 step)", "answer": "This is an historical quirk of the FP1 specification. The booklet explicitly includes $\\sum r^2$ and $\\sum r^3$ because their derivations are more complex, but expects you to memorize $\\sum r$ (which is just the arithmetic series formula). On exam day, always check which summation formulas are available and memorize the ones that aren't — don't waste time deriving them.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "For the matrix equation $BC = D$ where $B$ is $2\\times2$ and $D$ is $2\\times3$, explain how to determine the dimensions of $C$ and why we solve $C = B^{-1}D$ rather than $C = DB^{-1}$. (3 steps)", "answer": "- Step 1: If $B$ is $2\\times2$ and $D$ is $2\\times3$, then for $BC$ to be defined, $C$ must have 2 rows. Since $BC = D$ produces a $2\\times3$ result, $C$ must be $2\\times3$.\n- Step 2: We solve $BC = D$ by pre-multiplying both sides by $B^{-1}$: $B^{-1}BC = B^{-1}D$, which simplifies to $C = B^{-1}D$.\n- Step 3: Matrix multiplication is not commutative, so $DB^{-1}$ would be dimensionally impossible ($2\\times3$ times $2\\times2$ doesn't work) and mathematically incorrect. Always isolate the unknown matrix by multiplying on the correct side.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "What is the $2\\times2$ matrix inverse formula, and why do we swap the diagonal entries and negate the off-diagonal entries? (2 steps)", "answer": "- Step 1: For $A = \\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$, the inverse is $A^{-1} = \\frac{1}{ad-bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$, provided $ad-bc \\neq 0$.\n- Step 2: This formula comes from solving $A \\cdot A^{-1} = I$. The determinant $ad-bc$ in the denominator scales the matrix appropriately. Swapping $a$ and $d$ and negating $b$ and $c$ ensures the matrix product yields the identity matrix $\\begin{pmatrix} 1 & 0 \\\\ 0 & 1 \\end{pmatrix}$.\n- This is NOT in the formula booklet — memorize it.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Given a quadratic $x^2 - 6x + 3 = 0$ with roots $\\alpha$ and $\\beta$, how do you compute $(\\alpha^2+1)(\\beta^2+1)$ without finding $\\alpha$ and $\\beta$ explicitly? (3 steps)", "answer": "- Step 1: From Vieta's formulas (in booklet): $\\alpha + \\beta = 6$ and $\\alpha\\beta = 3$.\n- Step 2: Compute symmetric expressions: $\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta = 36 - 6 = 30$.\n- Step 3: Expand and substitute: $(\\alpha^2+1)(\\beta^2+1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1 = (\\alpha\\beta)^2 + (\\alpha^2+\\beta^2) + 1 = 9 + 30 + 1 = 40$.\n- Key insight: Always express symmetric functions of roots in terms of $\\alpha+\\beta$ and $\\alpha\\beta$ — never solve for individual roots.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "In part (b) of the polynomial roots question, the numerator $\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1)$ was rearranged to $(\\alpha+\\beta)(\\alpha\\beta+1)$. Explain the key algebraic trick that makes this work. (3 steps)", "answer": "- Step 1: Start with $\\alpha\\beta^2 + \\alpha + \\beta\\alpha^2 + \\beta$.\n- Step 2: Factor by grouping: $\\alpha\\beta(\\beta) + \\alpha + \\beta\\alpha(\\alpha) + \\beta = \\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta)$.\n- Step 3: Factor out $(\\alpha+\\beta)$: $(\\alpha+\\beta)(\\alpha\\beta + 1)$.\n- This is the standard FP1 trick: whenever you see terms like $\\alpha\\beta^2 + \\beta\\alpha^2$, think \"factor out $\\alpha\\beta$\" to get $\\alpha\\beta(\\alpha+\\beta)$. This works because the expression is symmetric in $\\alpha$ and $\\beta$.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "When forming a quadratic with roots $\\frac{\\alpha}{\\alpha^2+1}$ and $\\frac{\\beta}{\\beta^2+1}$, why is it valid to use $x^2 - Sx + P = 0$ where $S$ is the sum and $P$ is the product of the new roots? (2 steps)", "answer": "- Step 1: This is directly from Vieta's formulas (in the booklet): for a quadratic $ax^2 + bx + c = 0$ with roots $\\gamma$ and $\\delta$, we have $\\gamma + \\delta = -b/a$ and $\\gamma\\delta = c/a$.\n- Step 2: If we set our new roots as $\\gamma$ and $\\delta$, then the quadratic with those roots is $x^2 - (\\gamma+\\delta)x + \\gamma\\delta = 0$, i.e., $x^2 - Sx + P = 0$.\n- After computing $S = \\frac{3}{5}$ and $P = \\frac{3}{40}$, multiply through by 40 to clear denominators and get integer coefficients: $40x^2 - 24x + 3 = 0$.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "For the rectangular hyperbola $xy = 9$, the point $P$ has coordinates $(3t, 3/t)$. What is the parametric form of this hyperbola, and what is $\\frac{dy}{dx}$ at point $P$? (3 steps)", "answer": "- Step 1: Rectangular hyperbola $xy = c^2$ can be written parametrically as $(ct, c/t)$ where $c$ is a constant. Here $c^2 = 9$, so $c = 3$, giving $(3t, 3/t)$.\n- Step 2: Differentiate implicitly: $x\\frac{dy}{dx} + y = 0$, so $\\frac{dy}{dx} = -\\frac{y}{x}$.\n- Step 3: At $P(3t, 3/t)$, this becomes $\\frac{dy}{dx} = -\\frac{3/t}{3t} = -\\frac{1}{t^2}$. This is a key result to memorize: on $xy = c^2$ at $(ct, c/t)$, the gradient is $-1/t^2$.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "For the rectangular hyperbola $xy = 9$, derive the equation of the normal at $P(3t, 3/t)$ in the form $ty - t^3x = f(t)$. (4 steps)", "answer": "- Step 1: Gradient of tangent at $P$ is $-1/t^2$ (from previous question).\n- Step 2: Gradient of normal is the negative reciprocal: $m_{normal} = t^2$.\n- Step 3: Equation through $P$: $y - \\frac{3}{t} = t^2(x - 3t)$.\n- Step 4: Multiply by $t$: $ty - 3 = t^3x - 3t^4$, so $ty - t^3x = 3 - 3t^4 = 3(1 - t^4)$.\n- This is the memorized form: normal at $(ct, c/t)$ on $xy = c^2$ is $t^3x - ty = c(t^4 - 1)$.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "In the hyperbola question, when $t = 2$, the normal intersects $H$ again at a point with $x = -\\frac{3}{8}$. Without solving the quadratic again, how can you use Vieta's relationships to verify this result? (2 steps)", "answer": "- Step 1: After substituting $t = 2$, we solve $xy = 9$ with the normal line equation, getting a quadratic in $x$: $8x^2 - 45x - 18 = 0$.\n- Step 2: The roots of this quadratic are the $x$-coordinates of the two intersection points. One root is $x = 6$ (the original point $P$ at $t=2$). By Vieta's, product of roots $= \\frac{c}{a} = \\frac{-18}{8} = -\\frac{9}{4}$.\n- Therefore, the other root is $-9/4 \\div 6 = -3/8$, confirming our earlier result. This cross-check is much faster than re-solving the quadratic.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "For the parabola $y^2 = 8x$, identify the value of $a$ in the standard form $y^2 = 4ax$, and state the parametric coordinates of any point on this parabola. (2 steps)", "answer": "- Step 1: Compare $y^2 = 8x$ with $y^2 = 4ax$: $4a = 8$, so $a = 2$.\n- Step 2: The parametric form is $(at^2, 2at) = (2t^2, 4t)$. So any point can be written as $(2t^2, 4t)$ for parameter $t$.\n- The focus is at $(a, 0) = (2, 0)$ and the directrix is $x = -a = -2$.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "For the parabola $y^2 = 4ax$, what is the equation of the tangent at the parametric point $(at^2, 2at)$? How do you derive this? (3 steps)", "answer": "- Step 1: The tangent at $(at^2, 2at)$ is $ty = x + at^2$.\n- Derivation: Differentiate implicitly: $2y\\frac{dy}{dx} = 4a$, so $\\frac{dy}{dx} = \\frac{2a}{y}$. At $(at^2, 2at)$, this gives gradient $m = \\frac{2a}{2at} = \\frac{1}{t}$.\n- Using point-slope form: $y - 2at = \\frac{1}{t}(x - at^2)$, which rearranges to $ty - 2at^2 = x - at^2$, so $ty = x + at^2$.\n- This is NOT in the formula booklet — memorize it.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": true}, {"question": "In the parabola question, points $P$ and $Q$ have parameters $p$ and $-1/p$ respectively. Explain why the chord $PQ$ must pass through the focus. (2 steps)", "answer": "- Step 1: For two points on $y^2 = 4ax$ with parameters $t_1$ and $t_2$, the chord passes through the focus $(a, 0)$ if and only if $t_1 t_2 = -1$. This is the focal chord theorem.\n- Step 2: Here $t_1 = p$ and $t_2 = -1/p$, so $t_1 t_2 = p \\cdot (-1/p) = -1$. Therefore $PQ$ passes through the focus $(2, 0)$.\n- This theorem allows you to skip the heavy algebra of showing the line through $P$ and $Q$ contains the focus.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "The tangents at the ends of a focal chord of the parabola $y^2 = 4ax$ meet at a point $R$. What is special about the $x$-coordinate of $R$, and why is this significant? (3 steps)", "answer": "- Step 1: For focal chord endpoints with parameters $p$ and $-1/p$, the tangents meet at $R = (-a, 2ap - 2a/p)$.\n- Step 2: The $x$-coordinate is $-a$, which is exactly the equation of the directrix!\n- This is a general theorem: *Tangents at the ends of any focal chord of a parabola meet on the directrix.* In our problem, since $a = 2$, the tangents meet at $(-2, 2p - 2/p)$.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "In the numerical methods question, we showed that $f(x) = x^{3/2} + x - 3$ has a root in [1, 2] by checking $f(1) = -1$ and $f(2) \\approx 1.828$. Why is this sufficient to guarantee a root exists in the interval? (2 steps)", "answer": "- Step 1: This is the Intermediate Value Theorem (IVT): if $f$ is continuous on [1, 2] and takes values of opposite sign at the endpoints, then there exists at least one $c \\in (1, 2)$ such that $f(c) = 0$.\n- Step 2: $f(x) = x^{3/2} + x - 3$ is continuous for all $x \\geq 0$ (no breaks in the domain), so the IVT applies. The root is guaranteed to exist, though we don't yet know its exact value.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "After two iterations of interval bisection on [1, 2], we concluded the root lies in [1.25, 1.5]. Explain how bisection works and why each iteration halves the interval width. (3 steps)", "answer": "- Step 1: At each step, compute the midpoint $m = (a+b)/2$. Evaluate $f(m)$.\n- Step 2: If $f(m)$ has opposite sign to $f(a)$, the root is in [a, m]; otherwise, it's in [m, b]. This is because the function must cross zero exactly once in that subinterval (assuming no additional turning points).\n- Step 3: Starting with width 1, after 1 iteration width = 0.5, after 2 iterations width = 0.25. The interval [1.25, 1.5] has width 0.25, confirming we narrowed from [1, 2] through [1, 1.5] then [1.25, 1.5].", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "In Newton-Raphson, why might the method fail to converge or converge to the wrong root? Under what condition is convergence guaranteed? (2 steps)", "answer": "- Step 1: Newton-Raphson can diverge if: (i) $f'(x_n)$ is close to zero (small denominator causes large jumps); (ii) the initial guess $x_0$ is too far from the root; (iii) $f(x)$ has turning points near the root.\n- Step 2: Convergence is guaranteed if $x_0$ is \"sufficiently close\" to the root and $f'(x) \\neq 0$ near the root. In practice, choose $x_0$ based on sign-change interval (like 1.375 between 1 and 2).\n- Unlike bisection (guaranteed but slow), Newton-Raphson is fast but can be unstable.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Write down the linear interpolation formula for approximating a root, and explain how it differs from bisection in its assumption about the function. (2 steps)", "answer": "- Step 1: Linear interpolation formula: $x_1 = a - \\frac{f(a)(b-a)}{f(b) - f(a)}$, where $a$ and $b$ bracket the root.\n- Step 2: Bisection simply halves the interval regardless of function shape. Linear interpolation draws a straight line between $(a, f(a))$ and $(b, f(b))$ and finds where this line crosses zero — it assumes the function is approximately linear between $a$ and $b$.\n- This makes linear interpolation faster than bisection when the function is nearly linear, but less reliable when the function curves significantly.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "In the induction proof that $4^n + 6n - 10$ is divisible by 18, the key step was writing $f(k+1) = 4f(k) - 18(k-2)$. Explain the \"add-and-subtract\" trick that produces this form. (4 steps)", "answer": "- Step 1: We want to express $f(k+1) = 4^{k+1} + 6(k+1) - 10$ in terms of $f(k) = 4^k + 6k - 10$.\n- Step 2: Note that $4^{k+1} = 4 \\cdot 4^k$, so $f(k+1) = 4 \\cdot 4^k + 6k + 6 - 10 = 4 \\cdot 4^k + 6k - 4$.\n- Step 3: Add and subtract $4 \\cdot (6k - 10)$: $f(k+1) = 4 \\cdot 4^k + 6k - 4 + 4(6k - 10) - 4(6k - 10)$.\n- Step 4: This rearranges to $f(k+1) = 4(4^k + 6k - 10) - 24k + 40 - 4 = 4f(k) - 24k + 36 = 4f(k) - 18(k-2)$.\n- Now we can see both terms are divisible by 18.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In the induction proof, after establishing $f(k+1) = 4f(k) - 18(k-2)$, why does this guarantee $f(k+1)$ is divisible by 18? (2 steps)", "answer": "- Step 1: By the inductive hypothesis, $f(k) = 18m$ for some integer $m$ (since $f(k)$ is divisible by 18).\n- Step 2: Then $f(k+1) = 4(18m) - 18(k-2) = 18(4m - k + 2)$, which is clearly divisible by 18.\n- The key insight: We expressed $f(k+1)$ as a linear combination of $f(k)$ and a known multiple of 18. Both terms are divisible by 18, so their sum/difference is too.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "What are the four essential steps in a mathematical induction proof, and what must you explicitly state in the conclusion? (3 steps)", "answer": "- Step 1 (BASE): Prove the statement is true for the initial value (usually $n = 1$, or $n = 2$ if specified).\n- Step 2 (ASSUME): Assume the statement is true for $n = k$ (the inductive hypothesis).\n- Step 3 (INDUCT): Using the assumption for $n = k$, prove the statement is true for $n = k+1$.\n- Step 4 (CONCLUDE): State \"By the principle of mathematical induction, the statement is true for all $n \\in \\mathbb{Z}^+$\" (or whatever domain applies). This is a required phrase for full method marks.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "For complex numbers, when finding $|z_1 + z_2|$ where $z_1 = 3+2i$ and $z_2 = 2+3i$, why can't you simply add the moduli: $|z_1| + |z_2|$? (2 steps)", "answer": "- Step 1: The triangle inequality states $|z_1 + z_2| \\leq |z_1| + |z_2|$, but equality holds only when $z_1$ and $z_2$ have the same argument (are pointing in the same direction).\n- Step 2: Here, $z_1$ has argument $\\arctan(2/3)$ and $z_2$ has argument $\\arctan(3/2)$; they're different, so $|z_1 + z_2| \\neq |z_1| + |z_2|$. Instead, add the complex numbers first: $z_1 + z_2 = 5 + 5i$, then $|5 + 5i| = \\sqrt{25 + 25} = 5\\sqrt{2}$.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "In Q4 part (ii), we solved $BC = D$ by computing $C = B^{-1}D$. If instead the equation was $CB = D$, how would you solve for $C$ and why? (2 steps)", "answer": "- Step 1: If $CB = D$, we would post-multiply by $B^{-1}$: $CBB^{-1} = DB^{-1}$, giving $C = DB^{-1}$.\n- Step 2: The key is: to isolate $C$ in $BC = D$, we pre-multiply by $B^{-1}$ (multiply on the left); to isolate $C$ in $CB = D$, we post-multiply by $B^{-1}$ (multiply on the right).\n- Matrix multiplication order matters: $B^{-1}BC \\neq CBB^{-1}$ in general.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": true}, {"question": "Both the rectangular hyperbola ($xy = c^2$) and the parabola ($y^2 = 4ax$) questions involved parametric coordinates. What is the general principle for finding tangents at a parametric point on a curve defined implicitly? (2 steps)", "answer": "- Step 1: For any curve $F(x, y) = 0$, find $\\frac{dy}{dx}$ implicitly (using $\\frac{d}{dx}$ of both sides, treating $y$ as a function of $x$).\n- Step 2: At the parametric point $(x(t), y(t))$, substitute into $\\frac{dy}{dx}$ to get the gradient, then use point-slope form $y - y(t) = m(x - x(t))$ to get the tangent equation.\n- This works for any parametrically-defined curve: hyperbola, parabola, circle, etc.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "In multiple questions across this paper, we used Vieta's formulas (sum and product of roots). Why are these formulas preferred over solving the quadratic explicitly? (2 steps)", "answer": "- Step 1: Vieta's formulas work directly with the coefficients without requiring the quadratic formula or numerical approximation. This is essential when roots are irrational or complex.\n- Step 2: Many problems (like transformed roots) require manipulating sums and products symbolically. Solving explicitly would give messy expressions that are hard to manipulate. For $x^2 - 6x + 3 = 0$, solving gives $\\alpha, \\beta = 3 \\pm \\sqrt{6}$, but using Vieta lets us find $(\\alpha^2+1)(\\beta^2+1) = 40$ in one line.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": true}], "count": 29}, "opus_1": {"label": "Opus 4 ①", "cards": [{"question": "Of the three standard summation results — $$\\sum_{r=1}^n r$$, $$\\sum_{r=1}^n r^2$$, $$\\sum_{r=1}^n r^3$$ — which is NOT provided in the FP1 formula booklet, and what is its value?", "answer": "Only $$\\sum_{r=1}^n r = \\tfrac{1}{2}n(n+1)$$ must be memorized; the booklet supplies the $$r^2$$ and $$r^3$$ versions but assumes the linear case is so basic you should know it. The trap: students flick through the booklet looking for $$\\sum r$$, panic when they don't find it, and lose time. Memorize this single result up front so you don't waste exam minutes hunting.", "source": "Opus 4 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Expand $$r(r+2)^2$$ fully, and explain why the answer is NOT $$r^3 + 2r^2$$. (3 steps)", "answer": "- Step 1: Square the binomial first: $$(r+2)^2 = r^2 + 4r + 4$$, NOT $$r^2 + 2$$. The expansion of $$(a+b)^2 = a^2 + 2ab + b^2$$ produces THREE terms.\n- Step 2: Multiply by $$r$$: $$r(r^2 + 4r + 4) = r^3 + 4r^2 + 4r$$.\n- Step 3: The mistake $$r^3 + 2r^2$$ arises from confusing $$r(r+2)^2$$ with $$r^2(r+2)$$ — entirely different expressions. The exam tests whether you parse compound notation: does the square apply to the binomial only, or to $$r$$ as well?\n\nTakeaway: always expand on paper before summing. Mental expansion of squared compounds is where small recall errors compound into wrong final answers.", "source": "Opus 4 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "When evaluating $$\\sum_{r=1}^n (r^3 + 4r^2 + 4r)$$ using standard results, what is the \"factor-early\" manipulation, and why does it save time? (4 steps)", "answer": "- Step 1: After substituting standard results, you obtain $$\\tfrac{1}{4}n^2(n+1)^2 + 4\\cdot\\tfrac{1}{6}n(n+1)(2n+1) + 4\\cdot\\tfrac{1}{2}n(n+1)$$. Each term contains the common factor $$n(n+1)$$.\n- Step 2: Bring everything to a common denominator of 12 to clear fractions: $$\\tfrac{3}{12}n^2(n+1)^2 + \\tfrac{8}{12}n(n+1)(2n+1) + \\tfrac{24}{12}n(n+1)$$.\n- Step 3: Factor out $$\\tfrac{1}{12}n(n+1)$$ explicitly: $$\\tfrac{1}{12}n(n+1)[3n(n+1) + 8(2n+1) + 24]$$.\n- Step 4: Why this saves time — if you instead expand everything fully into a 5-term polynomial in $$n$$ and then re-factor, you waste 5+ minutes and risk arithmetic errors. The factor-early route preserves structure.\n\nPattern: when standard sums share a common factor like $$n(n+1)$$, ALWAYS pull it out before simplifying.", "source": "Opus 4 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "After applying standard results to $$\\sum_{r=1}^n r(r+2)^2$$ and factoring out $$\\tfrac{1}{12}n(n+1)$$, what does the inner bracket simplify to? (2 steps)", "answer": "- Step 1: Inner bracket starts as $$3n(n+1) + 8(2n+1) + 24$$.\n- Step 2: Expand each term: $$3n^2 + 3n + 16n + 8 + 24 = 3n^2 + 19n + 32$$.\n\nSo the closed form is $$\\sum_{r=1}^n r(r+2)^2 = \\tfrac{1}{12}n(n+1)(3n^2 + 19n + 32)$$, giving $$a=3$$, $$b=19$$, $$c=32$$.", "source": "Opus 4 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "How can you sanity-check a closed-form sum like $$\\sum_{r=1}^n r(r+2)^2 = \\tfrac{1}{12}n(n+1)(3n^2 + 19n + 32)$$ in 30 seconds? (2 steps)", "answer": "- Step 1: Substitute $$n=1$$ into both sides. The LHS reduces to a single term: $$1\\cdot(1+2)^2 = 9$$.\n- Step 2: The RHS evaluates as $$\\tfrac{1}{12}\\cdot 1\\cdot 2\\cdot(3+19+32) = \\tfrac{108}{12} = 9$$ ✓.\n\nIf LHS and RHS disagree at $$n=1$$, your formula is wrong — either the expansion was wrong or the algebra slipped. This 30-second check has saved many a careless 4-mark question.", "source": "Opus 4 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "Why does a quartic with real coefficients and root $$2 + 3i$$ automatically have $$2 - 3i$$ as a root? (3 steps)", "answer": "- Step 1: Take complex conjugate of the entire equation. Since all coefficients are real, $$\\overline{a_n x^n + \\dots + a_0} = a_n \\bar x^n + \\dots + a_0$$.\n- Step 2: This means if $$x = 2+3i$$ satisfies the equation, then $$\\bar x = 2-3i$$ also satisfies it (apply the conjugate to both sides).\n- Step 3: The result fails for complex coefficients — e.g. $$x - (2+3i) = 0$$ has $$2+3i$$ as a root but obviously not $$2-3i$$. **Real coefficients are essential.**\n\nThis is why quartics on FP1 always have an *even* number of complex (non-real) roots: they come in conjugate pairs.", "source": "Opus 4 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Given a complex root $$z_1 = a + bi$$, derive the quadratic factor of any real-coefficient polynomial that has $$z_1$$ as a root. (3 steps)", "answer": "- Step 1: The companion factor must include both $$z_1$$ and $$\\bar z_1$$, so the quadratic factor is $$(x - z_1)(x - \\bar z_1)$$.\n- Step 2: Expand: $$x^2 - (z_1 + \\bar z_1)x + z_1 \\bar z_1$$.\n- Step 3: Use $$z_1 + \\bar z_1 = 2\\,\\text{Re}(z_1) = 2a$$ and $$z_1 \\bar z_1 = |z_1|^2 = a^2 + b^2$$. Final form:\n$$x^2 - 2\\,\\text{Re}(z_1)\\,x + |z_1|^2$$\n\nFor $$z_1 = 2+3i$$: factor is $$x^2 - 4x + 13$$ (since $$|z_1|^2 = 4+9 = 13$$). This formula is **NOT in the booklet** — memorize.", "source": "Opus 4 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "What is the four-step strategy for solving a quartic when one complex root is given? (4 steps)", "answer": "- Step 1: Write down the conjugate as a second root (real coefficients ⇒ conjugate-pair rule).\n- Step 2: Build the quadratic factor: $$x^2 - 2\\,\\text{Re}(z_1)\\,x + |z_1|^2$$.\n- Step 3: Polynomial-long-divide the quartic by this quadratic. The quotient is another quadratic factor.\n- Step 4: Solve the quotient quadratic for the remaining two roots (which may be real, complex, or repeated).\n\nThis pipeline turns a daunting quartic into manageable quadratic chunks.", "source": "Opus 4 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "Where do most students lose marks during polynomial long division of a quartic by a quadratic, and how do you avoid it?", "answer": "Sign errors during the subtraction step. After multiplying the divisor by the current quotient term, you must subtract — and the second-row signs flip. A common error is to add instead of subtract, or to flip only some signs. **Best practice**: rewrite the multiplied row with all signs flipped explicitly, then add. This eliminates the error at the cost of one extra line.", "source": "Opus 4 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "A quartic factors as $$(x^2 - 4x + 13)(2x^2 + 3) = 0$$. Find all four roots. (3 steps)", "answer": "- Step 1: First factor $$x^2 - 4x + 13 = 0$$. Quadratic formula: $$x = \\tfrac{4 \\pm \\sqrt{16 - 52}}{2} = \\tfrac{4 \\pm \\sqrt{-36}}{2} = 2 \\pm 3i$$.\n- Step 2: Second factor $$2x^2 + 3 = 0 \\Rightarrow x^2 = -\\tfrac{3}{2} \\Rightarrow x = \\pm i\\sqrt{3/2}$$. Rationalize: $$x = \\pm \\tfrac{i\\sqrt 6}{2}$$.\n- Step 3: All four roots: $$\\{2+3i,\\, 2-3i,\\, \\tfrac{i\\sqrt 6}{2},\\, -\\tfrac{i\\sqrt 6}{2}\\}$$.\n\nTwo roots come from the conjugate-pair quadratic; two come from the leftover quadratic. The leftover may have purely imaginary roots — these lie on the imaginary axis on an Argand diagram.", "source": "Opus 4 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "On an Argand diagram, what's the geometric structure of the four roots $$\\{2 \\pm 3i,\\; \\pm \\tfrac{i\\sqrt 6}{2}\\}$$ of a real-coefficient quartic? (3 steps)", "answer": "- Step 1: $$2 \\pm 3i$$ plot at $$(2, \\pm 3)$$ — mirror images across the real axis (this is what conjugation means geometrically: vertical reflection).\n- Step 2: $$\\pm \\tfrac{i\\sqrt 6}{2}$$ plot at $$(0, \\pm \\tfrac{\\sqrt 6}{2}) \\approx (0, \\pm 1.22)$$ — both on the imaginary axis (purely imaginary, real part = 0).\n- Step 3: All four roots are symmetric across the real axis (forced by real coefficients ⇒ conjugate pairs). The configuration is two vertical pairs.\n\nThis symmetry is a useful sketch tool: place one of each pair, then mirror to get the other.", "source": "Opus 4 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "A rectangular hyperbola $$H$$ has equation $$xy = c^2$$. State its parametric form, and compute $$c$$ when $$H$$ is given as $$xy = 9$$. (2 steps)", "answer": "- Step 1: Standard parametric form is $$(ct, c/t)$$ for parameter $$t \\ne 0$$. Verification: $$x \\cdot y = ct \\cdot c/t = c^2$$ ✓.\n- Step 2: For $$xy = 9$$, $$c^2 = 9 \\Rightarrow c = 3$$ (taking positive root by convention). Parametric form: $$(3t, 3/t)$$.\n\nThis parametrization is critical because tangent/normal computations become single-variable problems in $$t$$.", "source": "Opus 4 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "For the rectangular hyperbola $$xy = c^2$$, derive $$\\frac{dy}{dx}$$ at a general point using implicit differentiation, then evaluate at parametric point $$(ct, c/t)$$. (3 steps)", "answer": "- Step 1: Differentiate $$xy = c^2$$ implicitly with respect to $$x$$. Product rule on LHS: $$\\frac{d}{dx}(xy) = y + x\\frac{dy}{dx}$$. RHS is constant, so derivative is 0.\n- Step 2: $$y + x\\frac{dy}{dx} = 0 \\Rightarrow \\frac{dy}{dx} = -\\frac{y}{x}$$.\n- Step 3: At parametric point $$(ct, c/t)$$: $$\\frac{dy}{dx} = -\\frac{c/t}{ct} = -\\frac{1}{t^2}$$.\n\nMemorize the shortcut: at any point on $$xy = c^2$$ with parameter $$t$$, **gradient of tangent is $$-1/t^2$$**.", "source": "Opus 4 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Why is the gradient of the normal to $$xy = c^2$$ at parameter $$t$$ equal to $$+t^2$$? (2 steps)", "answer": "- Step 1: Tangent and normal are perpendicular, so $$m_{\\text{normal}} = -1/m_{\\text{tangent}}$$.\n- Step 2: With $$m_{\\text{tangent}} = -1/t^2$$, we get $$m_{\\text{normal}} = -1/(-1/t^2) = t^2$$.\n\nMemorize: gradient of normal $$= t^2$$, gradient of tangent $$= -1/t^2$$. They multiply to $$-1$$, confirming perpendicularity.", "source": "Opus 4 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Derive the equation of the normal to $$xy = 9$$ at parametric point $$P(3t, 3/t)$$, in the form $$ty - t^3 x = f(t)$$. (4 steps)", "answer": "- Step 1: Normal at $$P$$ has gradient $$t^2$$ (perpendicular to tangent gradient $$-1/t^2$$).\n- Step 2: Use point-slope form: $$y - \\tfrac{3}{t} = t^2(x - 3t)$$.\n- Step 3: Multiply through by $$t$$ to clear the fraction: $$ty - 3 = t^3 x - 3t^4$$.\n- Step 4: Rearrange to required form: $$ty - t^3 x = 3 - 3t^4 = 3(1 - t^4)$$.\n\nSo $$f(t) = 3(1-t^4)$$. The general formula for $$xy = c^2$$ is $$ty - t^3 x = c(1 - t^4)$$.", "source": "Opus 4 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "When the normal to a rectangular hyperbola at point $$P$$ \"meets the hyperbola again at $$R$$\", what's the structural feature of the resulting quadratic that lets you find $$R$$'s coordinates quickly? (3 steps)", "answer": "- Step 1: Substituting the line equation into $$xy = c^2$$ produces a quadratic in $$x$$ (or $$y$$). Both intersection points are roots.\n- Step 2: One root is $$P$$'s known $$x$$-coordinate. The OTHER root gives $$R$$'s $$x$$-coordinate.\n- Step 3: Use Vieta's: for $$ax^2 + bx + c_0 = 0$$, product of roots is $$c_0/a$$. So $$x_R = (c_0/a)/x_P$$.\n\nA 30-second shortcut compared to factoring the quadratic from scratch. The same trick works for parabola \"meets again\" questions.", "source": "Opus 4 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Find the second intersection of the normal $$2y - 8x = -45$$ (from $$t=2$$ on $$xy=9$$) with the hyperbola, given that $$P = (6, 3/2)$$. Use Vieta's. (4 steps)", "answer": "- Step 1: Solve normal for $$y$$: $$y = 4x - 45/2$$. Substitute into $$xy = 9$$: $$x(4x - 45/2) = 9$$.\n- Step 2: Multiply through by 2: $$8x^2 - 45x = 18 \\Rightarrow 8x^2 - 45x - 18 = 0$$.\n- Step 3: By Vieta's, product of roots $$= -18/8 = -9/4$$. One root is $$x_P = 6$$, so other root $$x_R = (-9/4)/6 = -3/8$$.\n- Step 4: $$y_R = 4(-3/8) - 45/2 = -3/2 - 45/2 = -24$$. So $$R = (-3/8, -24)$$.\n\nSanity check: $$x_R y_R = (-3/8)(-24) = 9$$ ✓.", "source": "Opus 4 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Why does memorizing the formula for tangent/normal on $$xy = c^2$$ matter, even if you can derive it?", "answer": "Time. On a 90-minute paper with 9 questions, the rectangular hyperbola question typically appears as 7-13 marks. Deriving from scratch (implicit differentiation → gradient → point-slope → simplify) takes 4-5 minutes; quoting a memorized form takes 30 seconds. The standard forms to memorize:\n- Tangent at $$(ct, c/t)$$: $$x + t^2 y = 2ct$$\n- Normal at $$(ct, c/t)$$: $$t^3 x - ty = c(t^4 - 1)$$\n\nThese are NOT in the formula booklet.", "source": "Opus 4 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "What's the verification trick after computing a \"second intersection\" point like $$R = (-3/8, -24)$$ on $$xy = 9$$?", "answer": "Plug back into the curve equation. Compute $$x_R \\cdot y_R = (-3/8)(-24) = 9$$ ✓. If the product doesn't equal $$c^2$$, your point doesn't lie on the hyperbola — you've made an algebra mistake. This 5-second check catches sign errors and arithmetic slips before they cost marks.", "source": "Opus 4 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "Why does the rectangular hyperbola $$xy = c^2$$ have the $$x$$- and $$y$$-axes as asymptotes, and how does this constrain the parametric form? (3 steps)", "answer": "- Step 1: As $$x \\to 0^+$$, $$y = c^2/x \\to +\\infty$$ — the curve hugs the positive $$y$$-axis. As $$x \\to \\infty$$, $$y \\to 0$$ — curve hugs the positive $$x$$-axis. So both axes are asymptotes.\n- Step 2: This means the curve never crosses either axis; in particular, $$x = 0$$ and $$y = 0$$ are forbidden.\n- Step 3: Parametric form $$(ct, c/t)$$ enforces this: $$t = 0$$ would give $$y = c/0$$, undefined. The curve has two branches: $$t > 0$$ traces upper-right; $$t < 0$$ traces lower-left.\n\nThis is why the parameter constraint is always written $$t \\ne 0$$.", "source": "Opus 4 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "Geometrically, what does the determinant of a $$2 \\times 2$$ matrix represent, and why does its sign matter? (3 steps)", "answer": "- Step 1: $$|\\det A|$$ is the **area scale factor** of the linear transformation: a unit square gets mapped to a parallelogram of area $$|\\det A|$$.\n- Step 2: The **sign** of $$\\det A$$ encodes orientation: positive = orientation-preserving; negative = orientation-reversing (a reflection is involved).\n- Step 3: When the question asks for \"area scale factor\", you need $$|\\det A|$$ — the absolute value. The condition \"area is 3 times original\" means $$|\\det A| = 3$$, giving **two equations**: $$\\det A = +3$$ OR $$\\det A = -3$$.\n\nThis is why \"possible values\" is a hint to split into the $$\\pm$$ cases.", "source": "Opus 4 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "$$A = \\begin{pmatrix} -3 & 8 \\\\ -3 & k \\end{pmatrix}$$ transforms a triangle to one with 3× the area. Find all possible $$k$$. (3 steps)", "answer": "- Step 1: $$\\det A = (-3)(k) - (8)(-3) = -3k + 24$$.\n- Step 2: Area scale factor 3 means $$|\\det A| = 3$$. Split:\n+ $$\\det A = +3$$: $$-3k + 24 = 3 \\Rightarrow k = 7$$\n+ $$\\det A = -3$$: $$-3k + 24 = -3 \\Rightarrow k = 9$$\n- Step 3: Both values valid: $$k \\in \\{7, 9\\}$$.\n\nThe keyword \"possible values\" was the signal to take BOTH cases. If the question said only \"$$\\det A = 3$$\", you'd reject $$k = 9$$.", "source": "Opus 4 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Write down the inverse of a general $$2 \\times 2$$ matrix $$\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$$, and explain the structure mnemonic. (3 steps)", "answer": "- Step 1: $$\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}^{-1} = \\frac{1}{ad - bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$$.\n- Step 2: Mnemonic — \"**swap the diagonal, negate the off-diagonal, divide by determinant**\":\n+ Swap: $$a \\leftrightarrow d$$\n+ Negate: $$b \\to -b$$, $$c \\to -c$$\n+ Divide: by $$\\det = ad - bc$$\n- Step 3: The formula does NOT exist if $$\\det = 0$$ — the matrix is singular and has no inverse. Always check.\n\nNOT in the booklet — drill until automatic.", "source": "Opus 4 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "To solve the matrix equation $$BC = D$$ for $$C$$ when $$B$$ and $$D$$ are known, what's the correct manipulation? (3 steps)", "answer": "- Step 1: Multiply both sides on the LEFT by $$B^{-1}$$ (assuming $$\\det B \\ne 0$$): $$B^{-1} BC = B^{-1} D$$.\n- Step 2: Since $$B^{-1}B = I$$ (identity): $$C = B^{-1} D$$.\n- Step 3: **Order matters** — if you multiplied on the right, you'd get $$BCB^{-1}$$, which doesn't simplify. Pre-multiplication is what cancels the $$B$$.\n\nFor scalars, $$bc = d \\Rightarrow c = d/b$$ — order is irrelevant. For matrices, multiplication is non-commutative, so left vs right matters.", "source": "Opus 4 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "Before multiplying $$B^{-1} D$$ where $$B^{-1}$$ is $$2 \\times 2$$ and $$D$$ is $$2 \\times 3$$, what shape will the result $$C$$ have, and why is this check important? (2 steps)", "answer": "- Step 1: Matrix multiplication $$(m \\times n) \\cdot (n \\times p)$$ gives shape $$(m \\times p)$$. Here $$(2 \\times 2) \\cdot (2 \\times 3) = (2 \\times 3)$$. So $$C$$ has 2 rows, 3 columns.\n- Step 2: Checking shapes BEFORE computing prevents two errors:\n+ Multiplying when shapes are incompatible (inner dimensions don't match).\n+ Setting up the wrong number of cells in the answer.\n\nIf you compute 9 entries when only 6 should exist, you've made a structural error early on.", "source": "Opus 4 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Compute the inverse of $$B = \\begin{pmatrix} a & -4 \\\\ 2 & 3 \\end{pmatrix}$$ in terms of $$a$$. (2 steps)", "answer": "- Step 1: $$\\det B = a \\cdot 3 - (-4)(2) = 3a + 8$$.\n- Step 2: Apply the swap-and-negate rule:\n$$B^{-1} = \\frac{1}{3a + 8}\\begin{pmatrix} 3 & 4 \\\\ -2 & a \\end{pmatrix}$$\n\nNote the entries: top-left and bottom-right swap; top-right $$-4$$ becomes $$4$$ (negated); bottom-left $$2$$ becomes $$-2$$ (negated).", "source": "Opus 4 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "What does it mean for a $$2\\times 2$$ transformation matrix to be **singular** (det $$= 0$$), and why is this a special case to flag? (3 steps)", "answer": "- Step 1: $$\\det A = 0$$ means the transformation collapses 2D space onto a line (or a point) — the area scale factor is 0.\n- Step 2: A singular matrix has NO inverse: $$A^{-1} = \\frac{1}{\\det A}\\cdot(\\text{stuff})$$ involves division by zero.\n- Step 3: For the equation $$BC = D$$ with singular $$B$$, no unique $$C$$ exists. Some setups have infinitely many solutions; others have none. **Always check $$\\det B \\ne 0$$ before invoking $$B^{-1}$$.**\n\nIf a question's answer involves $$\\frac{1}{\\det B}$$, the implicit assumption is $$\\det B \\ne 0$$.", "source": "Opus 4 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "State Vieta's formulas for a quadratic $$ax^2 + bx + c = 0$$ with roots $$\\alpha, \\beta$$, and explain why they're so powerful.", "answer": "Sum of roots: $$\\alpha + \\beta = -\\frac{b}{a}$$. Product of roots: $$\\alpha \\beta = \\frac{c}{a}$$.\n\nThese are IN the FP1 formula booklet under \"Roots of equations\". Their power: they reduce questions about $$\\alpha, \\beta$$ to questions about $$\\alpha + \\beta$$ and $$\\alpha\\beta$$ — without ever solving the quadratic. Any *symmetric* function of the roots (one that's unchanged by swapping $$\\alpha \\leftrightarrow \\beta$$) can be expressed in terms of these two quantities.", "source": "Opus 4 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Derive the identity for $$\\alpha^2 + \\beta^2$$ in terms of $$\\alpha + \\beta$$ and $$\\alpha\\beta$$. (3 steps)", "answer": "- Step 1: Start with $$(\\alpha + \\beta)^2 = \\alpha^2 + 2\\alpha\\beta + \\beta^2$$ (binomial expansion).\n- Step 2: Rearrange: $$\\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta$$.\n- Step 3: This converts a SUM-OF-SQUARES problem (which would seem to require knowing each root) into a problem in just $$\\alpha+\\beta$$ and $$\\alpha\\beta$$ — both available from Vieta's.\n\nThe same trick gives $$\\alpha^3 + \\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$$ — derive once, memorize.", "source": "Opus 4 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "What's the strategy for evaluating $$(\\alpha^2 + 1)(\\beta^2 + 1)$$ given the quadratic $$\\alpha, \\beta$$ satisfy? (3 steps)", "answer": "- Step 1: Expand the product symbolically: $$(\\alpha^2+1)(\\beta^2+1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1$$.\n- Step 2: Rewrite each piece in terms of $$\\alpha+\\beta$$ and $$\\alpha\\beta$$:\n+ $$\\alpha^2\\beta^2 = (\\alpha\\beta)^2$$\n+ $$\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$\n- Step 3: Plug in Vieta values. For $$f(x) = x^2 - 6x + 3$$: $$\\alpha+\\beta = 6$$, $$\\alpha\\beta = 3$$, so $$(\\alpha\\beta)^2 = 9$$, $$\\alpha^2+\\beta^2 = 36 - 6 = 30$$, answer is $$9 + 30 + 1 = 40$$.\n\nThe pattern: never solve for $$\\alpha, \\beta$$ individually. Always reduce to symmetric polynomials.", "source": "Opus 4 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "When summing the new roots $$\\alpha' = \\frac{\\alpha}{\\alpha^2+1}$$ and $$\\beta' = \\frac{\\beta}{\\beta^2+1}$$, what's the algebraic factor trick that makes the numerator clean? (4 steps)", "answer": "- Step 1: Common denominator: $$\\alpha' + \\beta' = \\frac{\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1)}{(\\alpha^2+1)(\\beta^2+1)}$$.\n- Step 2: Expand the numerator: $$\\alpha\\beta^2 + \\alpha + \\beta\\alpha^2 + \\beta$$.\n- Step 3: **Key factor trick**: group $$\\alpha\\beta^2 + \\beta\\alpha^2 = \\alpha\\beta(\\alpha + \\beta)$$ and $$\\alpha + \\beta$$ separately:\n$$= \\alpha\\beta(\\alpha + \\beta) + (\\alpha + \\beta) = (\\alpha + \\beta)(\\alpha\\beta + 1)$$\n- Step 4: Now everything is in terms of Vieta-known quantities. For $$\\alpha+\\beta = 6$$, $$\\alpha\\beta = 3$$: numerator $$= 6 \\cdot 4 = 24$$.\n\nLesson: when summing fractions with $$\\alpha^2$$ and $$\\beta^2$$ symmetrically, factor out $$\\alpha\\beta$$ and $$(\\alpha+\\beta)$$ — don't expand blindly.", "source": "Opus 4 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Given new roots have sum $$S$$ and product $$P$$, write down the quadratic equation they satisfy. (2 steps)", "answer": "- Step 1: A monic quadratic with roots $$\\alpha', \\beta'$$ is $$x^2 - (\\alpha' + \\beta')x + \\alpha'\\beta' = 0$$, i.e. $$x^2 - Sx + P = 0$$.\n- Step 2: To get integer coefficients, multiply through by the LCD of $$S$$ and $$P$$.\n\nWhy: by Vieta's reverse direction, if $$\\alpha' + \\beta' = S$$ and $$\\alpha'\\beta' = P$$, then both roots are zeros of $$x^2 - Sx + P$$. The minus sign on $$S$$ is critical — it's $$-S$$, not $$+S$$.", "source": "Opus 4 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "Build the quadratic with roots $$\\frac{\\alpha}{\\alpha^2+1}$$ and $$\\frac{\\beta}{\\beta^2+1}$$, where $$\\alpha, \\beta$$ satisfy $$x^2 - 6x + 3 = 0$$. Give integer coefficients. (4 steps)", "answer": "- Step 1: From Vieta's: $$\\alpha + \\beta = 6$$, $$\\alpha\\beta = 3$$. Use part-(a) result $$(\\alpha^2+1)(\\beta^2+1) = 40$$.\n- Step 2: Sum of new roots: $$S = \\frac{(\\alpha+\\beta)(\\alpha\\beta+1)}{40} = \\frac{6 \\cdot 4}{40} = \\frac{3}{5}$$.\n- Step 3: Product of new roots: $$P = \\frac{\\alpha\\beta}{(\\alpha^2+1)(\\beta^2+1)} = \\frac{3}{40}$$.\n- Step 4: Quadratic: $$x^2 - \\tfrac{3}{5}x + \\tfrac{3}{40} = 0$$. Multiply by 40: $$40x^2 - 24x + 3 = 0$$.\n\nReusing $$(\\alpha^2+1)(\\beta^2+1) = 40$$ from part (a) is the key efficiency — never recompute.", "source": "Opus 4 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "When building a new quadratic from transformed roots, why must you find BOTH the sum and product of the new roots in terms of Vieta's? (2 steps)", "answer": "- Step 1: A quadratic is determined (up to scalar) by exactly two pieces of information: sum and product of roots (or equivalently, the linear and constant coefficients).\n- Step 2: Knowing only the sum gives a one-parameter family; knowing only the product gives another. You need BOTH to pin down a unique quadratic.\n\nThis is why every transformed-roots question on FP1 follows the pattern \"find $$S$$, find $$P$$, write $$x^2 - Sx + P = 0$$\".", "source": "Opus 4 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "Compute $$|z_1 + z_2|$$ where $$z_1 = 3 + 2i$$, $$z_2 = 2 + 3i$$. Why isn't this just $$|z_1| + |z_2|$$? (2 steps)", "answer": "- Step 1: Add first: $$z_1 + z_2 = 5 + 5i$$. Then $$|5 + 5i| = \\sqrt{25 + 25} = 5\\sqrt{2}$$.\n- Step 2: This is NOT equal to $$|z_1| + |z_2| = \\sqrt{13} + \\sqrt{13} = 2\\sqrt{13}$$ in general. The triangle inequality gives $$|z_1 + z_2| \\le |z_1| + |z_2|$$ with equality only when $$z_1, z_2$$ are parallel (same argument).\n\nGeometrically: $$|z_1 + z_2|$$ is the diagonal of the parallelogram with sides $$z_1, z_2$$; equality holds only when the parallelogram collapses to a line.", "source": "Opus 4 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "Why does multiplying a complex fraction $$\\frac{w}{z}$$ by $$\\frac{\\bar z}{\\bar z}$$ produce a real denominator? (2 steps)", "answer": "- Step 1: The denominator becomes $$z\\bar z$$. Compute $$z \\bar z = (a+bi)(a-bi) = a^2 - (bi)^2 = a^2 + b^2$$, which is real and equals $$|z|^2$$.\n- Step 2: A real denominator means you can split the result into clean real and imaginary parts. The numerator becomes $$w \\bar z$$, computed via standard complex multiplication.\n\nMnemonic: **division of complex numbers = multiplication by conjugate over modulus-squared**.", "source": "Opus 4 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "When solving for real numbers $$a, b$$ from $$w = \\frac{12a - 5b}{13} + \\frac{5a + 12b}{13}i = \\frac{4}{13} + \\frac{58}{13}i$$, what's the reasoning behind equating real and imaginary parts? (3 steps)", "answer": "- Step 1: Two complex numbers are equal **iff** their real parts are equal AND their imaginary parts are equal. So one complex equation gives TWO real equations.\n- Step 2: Equating: $$12a - 5b = 4$$ (real) and $$5a + 12b = 58$$ (imag).\n- Step 3: Two equations, two unknowns — solve as simultaneous: result $$a = 2$$, $$b = 4$$.\n\nThis is the workhorse technique for \"find the real values of constants\" complex-number questions.", "source": "Opus 4 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Why is the simple formula $$\\arg(z) = \\arctan(y/x)$$ insufficient for arbitrary complex numbers, and how do quadrant rules fix it? (4 steps)", "answer": "- Step 1: $$\\arctan$$ has range $$(-\\pi/2, \\pi/2)$$, but $$\\arg z$$ has range $$(-\\pi, \\pi]$$. So $$\\arctan(y/x)$$ alone covers only the right half-plane.\n- Step 2: For points in Q2 and Q3 (where $$x < 0$$), $$\\arctan(y/x)$$ gives the wrong angle — it returns the reference angle, not the actual argument.\n- Step 3: Quadrant rules:\n+ Q1 ($$x>0, y>0$$): $$\\arg z = \\arctan(y/x)$$\n+ Q2 ($$x<0, y>0$$): $$\\arg z = \\pi - \\arctan(|y/x|)$$\n+ Q3 ($$x<0, y<0$$): $$\\arg z = -\\pi + \\arctan(|y/x|)$$\n+ Q4 ($$x>0, y<0$$): $$\\arg z = -\\arctan(|y/x|)$$\n- Step 4: Always sketch the point first to determine the quadrant, then apply the correct formula.", "source": "Opus 4 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Compute $$\\arg(w)$$ where $$w = \\frac{4}{13} + \\frac{58}{13}i$$. (3 steps)", "answer": "- Step 1: Identify quadrant: real part $$4/13 > 0$$, imaginary part $$58/13 > 0$$. So $$w$$ is in Q1.\n- Step 2: Apply $$\\arg w = \\arctan(y/x) = \\arctan\\!\\left(\\frac{58/13}{4/13}\\right) = \\arctan(58/4) = \\arctan(14.5)$$.\n- Step 3: Numerically, $$\\arctan(14.5) \\approx 1.502$$ radians (4 s.f.).\n\nThe clean cancellation $$\\frac{58/13}{4/13} = \\frac{58}{4}$$ illustrates why simplifying a ratio-of-fractions before invoking $$\\arctan$$ is faster than typing the whole thing into a calculator.", "source": "Opus 4 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "What is $$|z|^2$$ in terms of $$z$$ and $$\\bar z$$, and why does this matter for complex division? (2 steps)", "answer": "- Step 1: $$|z|^2 = z \\bar z$$. Proof: $$(a+bi)(a-bi) = a^2 + b^2 = |z|^2$$.\n- Step 2: This is why dividing $$\\frac{w}{z}$$ by multiplying numerator and denominator by $$\\bar z$$ works:\n$$\\frac{w}{z} = \\frac{w\\bar z}{z\\bar z} = \\frac{w\\bar z}{|z|^2}$$\nThe denominator becomes a single real number $$|z|^2$$, computed once.\n\nFor $$z_1 = 3 + 2i$$, $$|z_1|^2 = 9 + 4 = 13$$ — that's the \"13\" that appears throughout division-by-$$z_1$$ computations.", "source": "Opus 4 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "State the sign change theorem (Bolzano's theorem) and its hypotheses. (3 steps)", "answer": "- Step 1: If $$f$$ is **continuous** on the closed interval $$[a, b]$$, and $$f(a)$$ and $$f(b)$$ have **opposite signs**, then there exists at least one $$c \\in (a, b)$$ with $$f(c) = 0$$.\n- Step 2: Both hypotheses matter: continuity is essential (a discontinuous function can jump over zero), and opposite signs give the actual sign change to detect.\n- Step 3: For $$f(x) = x^{3/2} + x - 3$$ on $$[1, 2]$$: $$f(1) = -1 < 0$$, $$f(2) = 2\\sqrt 2 - 1 > 0$$. $$f$$ is continuous (sum of continuous functions). Sign change ⇒ root in $$(1, 2)$$.\n\nThis theorem says only \"at least one root\" — there could be more. It doesn't tell you exactly where.", "source": "Opus 4 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Describe the bisection method, and explain why it's GUARANTEED to converge. (4 steps)", "answer": "- Step 1: Start with interval $$[a, b]$$ where $$f(a)$$ and $$f(b)$$ have opposite signs. Compute midpoint $$m = (a+b)/2$$ and $$f(m)$$.\n- Step 2: Form the new interval: if $$f(m) f(a) < 0$$, root is in $$[a, m]$$; if $$f(m) f(b) < 0$$, root is in $$[m, b]$$. Discard the half without sign change.\n- Step 3: Repeat. After each step, the interval halves in length.\n- Step 4: After $$n$$ steps, interval length is $$(b-a)/2^n \\to 0$$. By the squeeze argument, the bracketed root is captured. **Guaranteed convergence** — but slow, halving error per step regardless of $$f$$'s shape.\n\nCompare: Newton-Raphson is much faster but can diverge; bisection is safe but slow.", "source": "Opus 4 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "Write down the Newton-Raphson formula and derive it from the linear approximation. (4 steps)", "answer": "- Step 1: At $$x = x_0$$, approximate $$f$$ by its tangent line: $$f(x) \\approx f(x_0) + f'(x_0)(x - x_0)$$.\n- Step 2: Set the linear approximation to zero (where the tangent crosses the $$x$$-axis): $$0 = f(x_0) + f'(x_0)(x_1 - x_0)$$.\n- Step 3: Solve for $$x_1$$: $$x_1 = x_0 - \\frac{f(x_0)}{f'(x_0)}$$.\n- Step 4: General iteration: $$x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$$.\n\n**Geometric meaning**: at each step, replace the curve by its tangent at $$x_n$$, use the tangent's $$x$$-intercept as the next guess. NR is in the formula booklet.", "source": "Opus 4 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "What's the closed-form linear interpolation formula for finding a root in $$[a, b]$$ given $$f(a)$$ and $$f(b)$$ have opposite signs? Derive it from similar triangles. (5 steps)", "answer": "- Step 1: Draw a chord from $$(a, f(a))$$ to $$(b, f(b))$$. It crosses the $$x$$-axis at some $$x_1$$ between $$a$$ and $$b$$.\n- Step 2: By similar triangles formed at $$(a, f(a))$$ and $$(x_1, 0)$$ versus $$(a, f(a))$$ and $$(b, f(b))$$:\n$$\\frac{x_1 - a}{0 - f(a)} = \\frac{b - a}{f(b) - f(a)}$$\n- Step 3: Solve: $$x_1 - a = \\frac{-f(a)(b - a)}{f(b) - f(a)}$$.\n- Step 4: Rearrange: $$x_1 = a - \\frac{f(a)(b - a)}{f(b) - f(a)}$$.\n- Step 5: Geometric meaning: replace the curve by the chord, take chord's $$x$$-intercept as approximation. NOT in the formula booklet — memorize.", "source": "Opus 4 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Apply linear interpolation once on $$[1.25, 1.5]$$ for $$f(x) = x^{3/2} + x - 3$$, given $$f(1.25) \\approx -0.352$$ and $$f(1.5) \\approx 0.337$$. (3 steps)", "answer": "- Step 1: Use $$x_1 = a - \\frac{f(a)(b-a)}{f(b) - f(a)}$$ with $$a = 1.25$$, $$b = 1.5$$.\n- Step 2: Substitute: $$x_1 = 1.25 - \\frac{(-0.352)(0.25)}{0.337 - (-0.352)} = 1.25 - \\frac{-0.088}{0.689}$$.\n- Step 3: $$x_1 = 1.25 + 0.1278 \\approx 1.378$$ (3 d.p.).\n\nSanity check: $$x_1$$ should lie between $$a = 1.25$$ and $$b = 1.5$$; $$1.378$$ is in range ✓.", "source": "Opus 4 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "Compare bisection, linear interpolation, and Newton-Raphson on three axes: convergence speed, robustness, and prerequisites. (3 steps)", "answer": "- Step 1: **Speed**:\n+ Bisection: linear convergence (1 bit per iteration).\n+ Linear interpolation: between linear and quadratic, depending on $$f$$'s shape.\n+ Newton-Raphson: quadratic convergence (doubles correct digits per iteration).\n- Step 2: **Robustness**:\n+ Bisection: GUARANTEED to converge if sign change present.\n+ Linear interpolation: usually OK, can stagnate if $$f$$ is heavily curved.\n+ Newton-Raphson: can diverge or cycle if $$f'(x_n)$$ is small or starting point is poor.\n- Step 3: **Prerequisites**:\n+ Bisection: just sign change.\n+ Linear interpolation: sign change (uses two function values).\n+ Newton-Raphson: needs $$f'$$ AND $$f'(x_n) \\ne 0$$.\n\nTrade-off: NR is fastest when it works; bisection is the fallback when other methods fail.", "source": "Opus 4 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "What are the three calculator hygiene tips for numerical-methods questions to minimize rounding error? (3 steps)", "answer": "- Step 1: **Store $$x_0$$ in calculator memory** (use STO or M+ key) so you can recall it exactly without retyping. Avoids transcription errors.\n- Step 2: **Use the ANS button** for chained computations. Plug $$x_0$$ into both $$f$$
