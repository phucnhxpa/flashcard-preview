 and $$f'$$ via memory recall.\n- Step 3: **Round only at the very end**. Carry full precision through intermediate steps; round to 3 d.p. only on the final answer.\n\nMost lost marks in numerical methods come from premature rounding propagating through the calculation.", "source": "Opus 4 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Why do bisection questions require you to write each midpoint's sign explicitly, even when you \"know\" the answer? (2 steps)", "answer": "- Step 1: Examiners reward method. The marks are for showing the bracketing logic: \"compute $$f(m)$$, observe sign, identify which subinterval contains the sign change\".\n- Step 2: Writing \"$$f(1.5) = 0.337 > 0$$, so root is in $$[1, 1.5]$$\" earns the method mark; missing it loses the mark even with correct final answer.\n\nThe same applies to linear interpolation and NR — show the formula substitution explicitly.", "source": "Opus 4 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "Apply Newton-Raphson once with $$x_0 = 1.375$$ to $$f(x) = x^{3/2} + x - 3$$. (3 steps)", "answer": "- Step 1: $$f'(x) = \\tfrac{3}{2}x^{1/2} + 1$$.\n- Step 2: Evaluate: $$f(1.375) = 1.375^{1.5} + 1.375 - 3 \\approx -0.0125$$. $$f'(1.375) = 1.5\\sqrt{1.375} + 1 \\approx 2.759$$.\n- Step 3: $$x_1 = 1.375 - (-0.0125)/2.759 = 1.375 + 0.0045 \\approx 1.380$$ (3 d.p.).\n\nNotice the small correction: NR's quadratic convergence means once you're close, the next step is very close indeed.", "source": "Opus 4 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "Given $$y^2 = 8x$$, compare with $$y^2 = 4ax$$ to find $$a$$, the focus, and directrix. (3 steps)", "answer": "- Step 1: Match $$4a = 8 \\Rightarrow a = 2$$.\n- Step 2: Standard parabola $$y^2 = 4ax$$ opens to the right, with **focus at $$(a, 0)$$** and **directrix the line $$x = -a$$**.\n- Step 3: For $$y^2 = 8x$$: focus $$(2, 0)$$, directrix $$x = -2$$.\n\nThe parametric form is $$(at^2, 2at) = (2t^2, 4t)$$ for parameter $$t \\in \\mathbb{R}$$. Note: $$y$$ runs through all reals as $$t$$ does.", "source": "Opus 4 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "For $$y^2 = 4ax$$ with parameter $$t$$, derive the equation of the tangent at point $$(at^2, 2at)$$. (4 steps)", "answer": "- Step 1: Differentiate $$y^2 = 4ax$$ implicitly: $$2y\\frac{dy}{dx} = 4a \\Rightarrow \\frac{dy}{dx} = \\frac{2a}{y}$$.\n- Step 2: At $$y = 2at$$: gradient $$= \\frac{2a}{2at} = \\frac{1}{t}$$.\n- Step 3: Tangent through $$(at^2, 2at)$$ with slope $$1/t$$: $$y - 2at = \\frac{1}{t}(x - at^2)$$.\n- Step 4: Multiply by $$t$$: $$ty - 2at^2 = x - at^2 \\Rightarrow ty = x + at^2$$.\n\nStandard form: $$\\boxed{ty = x + at^2}$$ — memorize. NOT in the formula booklet.", "source": "Opus 4 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "Verify that $$Q\\!\\left(\\frac{2}{p^2}, -\\frac{4}{p}\\right)$$ lies on the parabola $$y^2 = 8x$$, and find its parameter $$t_Q$$. (3 steps)", "answer": "- Step 1: Check $$y^2 = 8x$$: $$y^2 = (-4/p)^2 = 16/p^2$$ and $$8x = 8(2/p^2) = 16/p^2$$. Equal ✓.\n- Step 2: Compare $$Q$$ to standard parametric form $$(at^2, 2at) = (2t^2, 4t)$$. We need $$2t^2 = 2/p^2$$ ⇒ $$t = \\pm 1/p$$ AND $$4t = -4/p$$ ⇒ $$t = -1/p$$.\n- Step 3: So $$Q$$ has parameter $$t_Q = -1/p$$.\n\nThis identification is critical because parametric formulas (tangent, normal, focal chord) all reference the parameter $$t$$.", "source": "Opus 4 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "State the focal chord theorem for a parabola $$y^2 = 4ax$$, and explain why it makes \"show chord passes through focus\" questions trivial. (3 steps)", "answer": "- Step 1: **Theorem**: A chord joining points with parameters $$t_1$$ and $$t_2$$ on $$y^2 = 4ax$$ passes through the focus $$(a, 0)$$ **if and only if** $$t_1 t_2 = -1$$.\n- Step 2: Application: instead of finding the chord equation, substituting $$x = a$$, and verifying $$y = 0$$, you just multiply the two parameters and check.\n- Step 3: For $$P$$ at $$t_1 = p$$ and $$Q$$ at $$t_2 = -1/p$$: $$t_1 t_2 = p \\cdot (-1/p) = -1$$ ✓. Done in one line.\n\nThe theorem reduces a 4-mark question to 30 seconds. NOT in the formula booklet — memorize.", "source": "Opus 4 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Derive the focal chord theorem $$t_1 t_2 = -1$$ for $$y^2 = 4ax$$. (5 steps)", "answer": "- Step 1: Two points: $$P(at_1^2, 2at_1)$$ and $$Q(at_2^2, 2at_2)$$. Chord slope: $$m = \\frac{2at_1 - 2at_2}{at_1^2 - at_2^2} = \\frac{2}{t_1 + t_2}$$ (after factoring difference of squares).\n- Step 2: Chord through $$P$$: $$y - 2at_1 = \\frac{2}{t_1+t_2}(x - at_1^2)$$.\n- Step 3: Set $$x = a$$ (focus) and ask when $$y = 0$$: $$-2at_1 = \\frac{2(a - at_1^2)}{t_1+t_2} = \\frac{2a(1-t_1^2)}{t_1+t_2}$$.\n- Step 4: Cross-multiply and simplify: $$-t_1(t_1+t_2) = 1 - t_1^2 \\Rightarrow -t_1^2 - t_1 t_2 = 1 - t_1^2 \\Rightarrow t_1 t_2 = -1$$.\n- Step 5: Conversely, $$t_1 t_2 = -1$$ implies the chord passes through $$(a, 0)$$.\n\nSo $$t_1 t_2 = -1 \\Leftrightarrow$$ chord through focus.", "source": "Opus 4 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "What is the **directrix-as-polar theorem** for a parabola, and why is it useful? (3 steps)", "answer": "- Step 1: **Theorem**: For a parabola $$y^2 = 4ax$$ with directrix $$x = -a$$, the tangents at the two ends of any focal chord meet on the directrix.\n- Step 2: Equivalently: the polar of the focus (the locus of meeting-points of tangent pairs through the focus) is the directrix itself.\n- Step 3: Computational benefit: when asked to find the meeting-point of two tangents at the ends of a focal chord, you know the $$x$$-coordinate IS $$-a$$ before doing any algebra. Only the $$y$$-coordinate needs computing.\n\nThis simplifies an 8-mark question to a 4-mark calculation if you cite the theorem.", "source": "Opus 4 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "Find the meeting-point $$R$$ of tangents at $$P$$ (parameter $$p$$) and $$Q$$ (parameter $$-1/p$$) on $$y^2 = 8x$$. (5 steps)", "answer": "- Step 1: For $$y^2 = 8x$$, $$a = 2$$. Tangent at parameter $$t$$: $$ty = x + 2t^2$$.\n- Step 2: Tangent at $$P$$: $$py = x + 2p^2 \\Rightarrow x = py - 2p^2$$. Tangent at $$Q$$: $$-y/p = x + 2/p^2 \\Rightarrow x = -y/p - 2/p^2$$.\n- Step 3: Set equal: $$py - 2p^2 = -y/p - 2/p^2$$. Multiply by $$p^2$$: $$p^3 y - 2p^4 = -py - 2$$.\n- Step 4: $$y(p^3 + p) = 2p^4 - 2 \\Rightarrow y \\cdot p(p^2+1) = 2(p^2-1)(p^2+1) \\Rightarrow y = \\frac{2(p^2-1)}{p} = 2p - \\frac{2}{p}$$.\n- Step 5: Back-substitute: $$x = p(2p - 2/p) - 2p^2 = 2p^2 - 2 - 2p^2 = -2$$. So $$R = (-2, 2p - 2/p)$$.\n\nConfirms directrix-as-polar theorem: $$x_R = -2 = -a$$, on the directrix.", "source": "Opus 4 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "Why is recognizing the parametric form $$(at^2, 2at)$$ on $$y^2 = 4ax$$ important even before doing any tangent/normal computations? (2 steps)", "answer": "- Step 1: All standard parabola formulas (tangent, normal, focal chord, locus problems) are written in parametric form. Without knowing $$a$$ and $$t$$, you can't apply them.\n- Step 2: The first move on EVERY parabola question: read off $$a$$ from $$y^2 = 4ax$$, and identify the parameter of any given point. Skipping this step makes everything else harder.\n\nFor $$y^2 = 8x$$: $$a = 2$$. Point $$(2p^2, 4p) \\to t = p$$. Point $$(2/p^2, -4/p) \\to t = -1/p$$.", "source": "Opus 4 ①", "_id": "opus_1_56", "judge_pick": true}, {"question": "A common parabola question type asks to find a \"locus\" equation. What's the general strategy? (3 steps)", "answer": "- Step 1: Parametrize the points on the curve using $$(at^2, 2at)$$.\n- Step 2: Express the locus point's coordinates in terms of the parameter(s) — typically $$x_R = f(t)$$, $$y_R = g(t)$$.\n- Step 3: Eliminate the parameter to get a relation between $$x_R$$ and $$y_R$$. The result is the locus equation.\n\nExample: tangents from any focal chord meet at $$R = (-2, 2p - 2/p)$$. Eliminating $$p$$: $$x_R = -2$$ regardless. So the locus IS the directrix, as expected.", "source": "Opus 4 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "State the four-step structure required for any induction proof on FP1, with a brief description of each. (4 steps)", "answer": "- Step 1: **BASE CASE**: show the statement is true for the smallest integer in the range (usually $$n = 1$$). Compute both sides explicitly.\n- Step 2: **INDUCTIVE HYPOTHESIS (ASSUMPTION)**: write \"Assume the result holds for $$n = k$$ (some $$k \\ge 1$$)\". State exactly what's being assumed in symbols.\n- Step 3: **INDUCTIVE STEP**: show the statement holds for $$n = k+1$$, USING the assumption from step 2. The assumption is the leverage.\n- Step 4: **CONCLUSION**: state \"By the principle of mathematical induction, the result holds for all $$n \\in \\mathbb{Z}^+$$\" (or whatever the domain is). End with $$\\blacksquare$$.\n\nExaminers give a method mark just for explicitly stating these four parts, even if algebra fails.", "source": "Opus 4 ①", "_id": "opus_1_58", "judge_pick": false}, {"question": "For divisibility induction \"show $$f(n)$$ is divisible by $$d$$\", how do you write the inductive hypothesis precisely? (1 step)", "answer": "Write: \"Assume $$f(k) = d m$$ for some integer $$m$$\" (or equivalently $$d \\mid f(k)$$). The phrase \"for some integer $$m$$\" is critical — without naming the multiplier, you can't manipulate it later. Then $$f(k+1)$$ should be expressed as $$d \\times (\\text{integer expression})$$ to complete the step.", "source": "Opus 4 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "What's the \"engineered-form\" approach to divisibility induction, and why is it cleaner than computing $$f(k+1) - f(k)$$? (4 steps)", "answer": "- Step 1: Goal: write $$f(k+1) = c \\cdot f(k) + d \\cdot (\\text{integer})$$, for some integer $$c$$ and where $$d$$ is the divisor.\n- Step 2: Then since $$d \\mid f(k)$$ (by hypothesis) and $$d \\mid d \\cdot (\\text{integer})$$ trivially, we conclude $$d \\mid f(k+1)$$.\n- Step 3: Why this is cleaner: the difference approach $$f(k+1) - f(k)$$ may not give a clean $$d \\times (\\text{integer})$$; the engineered approach forces the structure.\n- Step 4: For $$f(n) = 4^n + 6n - 10$$ with $$d = 18$$: $$f(k+1) = 4 f(k) - 18(k-2)$$. The 4-multiplier \"matches\" the $$4^n$$ growth, and the $$-18(k-2)$$ absorbs everything else.\n\nThe trick: choose $$c$$ to match the dominant term's growth (here $$4^{n+1} = 4 \\cdot 4^n$$ suggests $$c = 4$$).", "source": "Opus 4 ①", "_id": "opus_1_60", "judge_pick": false}, {"question": "Derive $$f(k+1) = 4f(k) - 18(k-2)$$ for $$f(n) = 4^n + 6n - 10$$. (5 steps)", "answer": "- Step 1: $$f(k+1) = 4^{k+1} + 6(k+1) - 10 = 4\\cdot 4^k + 6k - 4$$.\n- Step 2: Compute $$4f(k) = 4(4^k + 6k - 10) = 4\\cdot 4^k + 24k - 40$$.\n- Step 3: Subtract: $$f(k+1) - 4f(k) = (4\\cdot 4^k + 6k - 4) - (4\\cdot 4^k + 24k - 40) = -18k + 36 = -18(k-2)$$.\n- Step 4: Rearrange: $$f(k+1) = 4f(k) - 18(k-2)$$.\n- Step 5: Both terms are divisible by 18: $$f(k)$$ by hypothesis, $$18(k-2)$$ obviously. Hence $$18 \\mid f(k+1)$$ ✓.\n\nThis is the engineered-form strategy in action.", "source": "Opus 4 ①", "_id": "opus_1_61", "judge_pick": false}, {"question": "Why is the base case in induction non-negotiable, even when the inductive step \"looks fine\"? (3 steps)", "answer": "- Step 1: The inductive step says \"if true for $$k$$, then true for $$k+1$$\". This is a chain of implications.\n- Step 2: Without the base case, the chain has no starting point — it could be entirely vacuous. (Example: the inductive step might be valid but the statement is false for ALL $$n$$, with no contradiction.)\n- Step 3: The base case **plants the first true statement**. Then the inductive step propagates truth up the integers.\n\nForgetting the base case is an instant mark loss, and the proof is logically incomplete.", "source": "Opus 4 ①", "_id": "opus_1_62", "judge_pick": true}, {"question": "How does the \"add-and-subtract\" trick work in induction, using $$f(n) = 4^n + 6n - 10$$ as illustration? (4 steps)", "answer": "- Step 1: After computing $$f(k+1)$$, you want to factor it as $$\\text{multiple of }f(k) + \\text{multiple of }d$$.\n- Step 2: This rarely happens automatically. So engineer it by adding 0 in a useful form: add and subtract a chosen quantity.\n- Step 3: For example, $$f(k+1) - 4f(k)$$ equals some leftover; rearranging gives $$f(k+1) = 4f(k) + (\\text{leftover})$$. If the leftover is a multiple of $$d$$, done.\n- Step 4: The \"art\" is choosing the multiplier (here $$c = 4$$, matching the $$4^n$$ growth). Constants like $$2, 3, 5$$ in front of exponentials usually become the multiplier.\n\nPractice this trick on $$5^n + 4n - 1$$ divisible by 16 (a related FP1 question).", "source": "Opus 4 ①", "_id": "opus_1_63", "judge_pick": false}, {"question": "What's the difference between divisibility induction and series-summation induction? (3 steps)", "answer": "- Step 1: **Series-summation induction**: prove a formula like $$\\sum_{r=1}^n r^2 = \\tfrac{1}{6}n(n+1)(2n+1)$$. Inductive step is purely algebraic — manipulate the sum to add one more term.\n- Step 2: **Divisibility induction**: prove $$d \\mid f(n)$$. Inductive step requires showing $$f(k+1)$$ is also divisible by $$d$$, often via the $$c \\cdot f(k) + d \\cdot (\\text{int})$$ engineered form.\n- Step 3: Other types: matrix induction (powers of a matrix), inequality induction. Each has its own inductive step structure, but all use the same 4-step skeleton.", "source": "Opus 4 ①", "_id": "opus_1_64", "judge_pick": false}, {"question": "When a question says \"find the **possible** values\" of a constant, what's the standard cue?", "answer": "Plural \"values\" or the word \"possible\" signals **multiple cases**. Always immediately consider whether the constraint splits into $$\\pm$$ cases. The most common trigger is an absolute-value condition: $$|\\det A| = k$$, $$|z| = r$$, $$|f(x)| = c$$, etc. The single constraint becomes two equations: $$X = +k$$ AND $$X = -k$$. Missing the second case loses half the marks.", "source": "Opus 4 ①", "_id": "opus_1_65", "judge_pick": true}, {"question": "Across multiple FP1 papers, what topic appears in nearly every \"transformed roots\" Q5-style question?", "answer": "Building a new quadratic from transformed roots (like $$\\frac{\\alpha}{\\alpha^2+1}$$, $$\\alpha + \\beta^2$$, etc.) using:\n- (i) Vieta's to extract $$\\alpha + \\beta$$ and $$\\alpha\\beta$$.\n- (ii) Symmetric identities (especially $$\\alpha^2+\\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$).\n- (iii) The factor-and-clean trick for sums and products of new roots.\n- (iv) Building $$x^2 - Sx + P = 0$$, then clearing denominators.\n\nThis pipeline is so consistent across papers that drilling it makes Q5 a near-guaranteed 10 marks.", "source": "Opus 4 ①", "_id": "opus_1_66", "judge_pick": true}, {"question": "What part of part (b) of a roots-of-polynomials question is the time-saver everyone misses? (2 steps)", "answer": "- Step 1: Part (a) typically asks for some symmetric quantity like $$(\\alpha^2+1)(\\beta^2+1)$$. The answer (e.g. 40) appears AGAIN in part (b) as a denominator.\n- Step 2: Reuse it directly. Don't re-compute. Whenever the same expression shows up in two parts, write the part-(a) answer down once and substitute.\n\nThis is the \"clear and reuse\" hygiene that compresses 5 minutes of work into 30 seconds.", "source": "Opus 4 ①", "_id": "opus_1_67", "judge_pick": false}, {"question": "What's the key habit when reading any FP1 question with compound expressions like $$r(r+2)^2$$ or $$(\\alpha-1)^3$$?", "answer": "Expand fully on paper, even if it seems trivial. Mental expansion of squared/cubed binomials is the single most common source of arithmetic errors. The 30 seconds spent writing $$(r+2)^2 = r^2 + 4r + 4$$ on paper saves you from the catastrophic error of writing $$r^2 + 2$$ and getting the wrong answer to a 4-mark question.", "source": "Opus 4 ①", "_id": "opus_1_68", "judge_pick": true}, {"question": "When a question asks for \"the equation of the normal\" rather than \"the gradient of the normal\", what's the structural workflow? (4 steps)", "answer": "- Step 1: Find $$\\frac{dy}{dx}$$ at the point (gradient of tangent).\n- Step 2: Compute gradient of normal: $$m_N = -1/m_T$$ (perpendicular).\n- Step 3: Use point-slope form: $$y - y_0 = m_N(x - x_0)$$.\n- Step 4: Rearrange to the form requested (often clearing fractions, multiplying by $$t$$ or $$x$$, etc.).\n\nThe pipeline is invariant across hyperbola, parabola, ellipse — only the \"find $$dy/dx$$\" step differs by curve type.", "source": "Opus 4 ①", "_id": "opus_1_69", "judge_pick": false}, {"question": "Why is \"always sketch the Argand point first\" a good habit before computing $$\\arg z$$? (2 steps)", "answer": "- Step 1: Sketching identifies the quadrant immediately, which dictates which $$\\arctan$$ formula to apply (4 cases for the 4 quadrants).\n- Step 2: The naive formula $$\\arctan(y/x)$$ gives the wrong answer in Q2 and Q3. Without the sketch, students apply $$\\arctan$$ blindly and report the wrong angle. The sketch is a free 5-second insurance.", "source": "Opus 4 ①", "_id": "opus_1_70", "judge_pick": false}, {"question": "What's the difference between \"tangent\" and \"normal\" terminology in coordinate geometry, and how does perpendicularity link them? (3 steps)", "answer": "- Step 1: **Tangent**: line touching the curve at a point with the same gradient as the curve there.\n- Step 2: **Normal**: line through the same point but PERPENDICULAR to the tangent.\n- Step 3: Perpendicularity gives the gradient relationship: $$m_T \\cdot m_N = -1$$, so $$m_N = -1/m_T$$.\n\nComputational habit: find $$dy/dx$$ first (tangent slope), then take the negative reciprocal (normal slope). Don't confuse which is which.", "source": "Opus 4 ①", "_id": "opus_1_71", "judge_pick": true}, {"question": "Practice — a quadratic has roots $$\\alpha, \\beta$$ with $$\\alpha + \\beta = 5$$ and $$\\alpha\\beta = 4$$. Without solving, find $$\\alpha^2 + \\beta^2$$. (2 steps)", "answer": "- Step 1: Use identity $$\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$.\n- Step 2: Substitute: $$= 25 - 8 = 17$$.\n\nThe roots themselves are 1 and 4 (from $$x^2 - 5x + 4$$), and $$1 + 16 = 17$$ ✓. But Vieta's lets you skip solving entirely.", "source": "Opus 4 ①", "_id": "opus_1_72", "judge_pick": false}, {"question": "Practice — for $$z = -1 + i$$, find $$|z|$$ and $$\\arg z$$. (3 steps)", "answer": "- Step 1: $$|z| = \\sqrt{(-1)^2 + 1^2} = \\sqrt{2}$$.\n- Step 2: $$z$$ is in Q2 (real part $$-1 < 0$$, imaginary $$1 > 0$$). Apply Q2 rule: $$\\arg z = \\pi - \\arctan(|y/x|) = \\pi - \\arctan(1) = \\pi - \\pi/4 = 3\\pi/4$$.\n- Step 3: Verify: at angle $$3\\pi/4$$ with modulus $$\\sqrt 2$$, point is $$(\\sqrt 2 \\cos 3\\pi/4, \\sqrt 2 \\sin 3\\pi/4) = (-1, 1)$$ ✓.\n\nNaive $$\\arctan(1/-1) = \\arctan(-1) = -\\pi/4$$ would be wrong (it's the Q4 angle). Always identify quadrant first.", "source": "Opus 4 ①", "_id": "opus_1_73", "judge_pick": false}, {"question": "Practice — find the tangent to $$xy = 4$$ at the point with parameter $$t = 1$$. (3 steps)", "answer": "- Step 1: $$c^2 = 4 \\Rightarrow c = 2$$. Point: $$(2, 2)$$ (since $$ct = 2$$, $$c/t = 2$$).\n- Step 2: Use formula $$x + t^2 y = 2ct$$: $$x + 1 \\cdot y = 4 \\Rightarrow x + y = 4$$.\n- Step 3: Verify: at $$(2, 2)$$, $$2 + 2 = 4$$ ✓. Slope: rearrange to $$y = -x + 4$$, slope $$= -1$$, matching $$-1/t^2 = -1$$ ✓.", "source": "Opus 4 ①", "_id": "opus_1_74", "judge_pick": false}, {"question": "Practice — show that on the parabola $$y^2 = 4x$$, points with parameters $$t_1 = 2$$ and $$t_2 = -1/2$$ form a focal chord. (2 steps)", "answer": "- Step 1: For $$y^2 = 4ax$$ with $$a = 1$$, focal chord criterion is $$t_1 t_2 = -1$$.\n- Step 2: $$2 \\cdot (-1/2) = -1$$ ✓. So the chord passes through the focus $$(1, 0)$$.\n\nThis took 5 seconds. Alternative: compute the chord, substitute $$x = 1$$, check $$y = 0$$ — would take 2-3 minutes.", "source": "Opus 4 ①", "_id": "opus_1_75", "judge_pick": false}, {"question": "Practice — solve for $$C$$ in $$\\begin{pmatrix} 1 & 2 \\\\ 0 & 1 \\end{pmatrix} C = \\begin{pmatrix} 3 \\\\ 1 \\end{pmatrix}$$. (3 steps)", "answer": "- Step 1: $$C = B^{-1}D$$. Compute $$\\det B = 1 \\cdot 1 - 2 \\cdot 0 = 1$$, so $$B^{-1} = \\begin{pmatrix} 1 & -2 \\\\ 0 & 1 \\end{pmatrix}$$.\n- Step 2: Multiply: $$C = \\begin{pmatrix} 1 & -2 \\\\ 0 & 1 \\end{pmatrix}\\begin{pmatrix} 3 \\\\ 1 \\end{pmatrix} = \\begin{pmatrix} 3 - 2 \\\\ 0 + 1 \\end{pmatrix} = \\begin{pmatrix} 1 \\\\ 1 \\end{pmatrix}$$.\n- Step 3: Verify: $$BC = \\begin{pmatrix} 1 & 2 \\\\ 0 & 1 \\end{pmatrix}\\begin{pmatrix} 1 \\\\ 1 \\end{pmatrix} = \\begin{pmatrix} 3 \\\\ 1 \\end{pmatrix} = D$$ ✓.\n\nThe shape — the harder version has a parameter $$a$$ in $$B$$, but the workflow is identical.", "source": "Opus 4 ①", "_id": "opus_1_76", "judge_pick": false}, {"question": "Practice — build a simple induction proof: show $$2^n - 1$$ is odd for all $$n \\ge 1$$. Use the 4-step template. (4 steps)", "answer": "- Step 1: BASE: $$n = 1$$: $$2^1 - 1 = 1$$, which is odd ✓.\n- Step 2: ASSUME: $$2^k - 1$$ is odd for some $$k \\ge 1$$, i.e. $$2^k - 1 = 2m + 1$$ for integer $$m$$.\n- Step 3: STEP: $$2^{k+1} - 1 = 2 \\cdot 2^k - 1 = 2(2m + 2) - 1 = 4m + 3 = 2(2m + 1) + 1$$, which is odd ✓.\n- Step 4: CONCLUSION: by induction, $$2^n - 1$$ is odd for all $$n \\in \\mathbb{Z}^+$$. $$\\blacksquare$$\n\nThis trivial example illustrates the structure; on the exam, the algebra is harder but the skeleton is the same.", "source": "Opus 4 ①", "_id": "opus_1_77", "judge_pick": true}, {"question": "What's the strategic mistake of trying to \"do every question in order\" on a paper with gap topics, and how should you triage? (3 steps)", "answer": "- Step 1: Q3 (hyperbola) and Q8 (parabola) on this paper are flagged as gap topics — chapters not studied. Spending 25+ minutes deriving every formula on these will starve other questions.\n- Step 2: Better: do Q1, Q2, Q4, Q5, Q6, Q7, Q9 first (~55 minutes). These are higher-yield given current preparation.\n- Step 3: Return to gap topics with remaining time. Attempt part (a) of each (usually accessible with simple substitution) and only attempt later parts if confident.\n\nThis is a triage strategy: secure marks where the prep is strong; salvage what you can on gap topics.", "source": "Opus 4 ①", "_id": "opus_1_78", "judge_pick": false}, {"question": "Why is the formula $$|z_1 + z_2|^2 = |z_1|^2 + |z_2|^2 + 2\\,\\text{Re}(z_1 \\bar z_2)$$ a generalization of Pythagoras? (3 steps)", "answer": "- Step 1: Compute $$(z_1 + z_2)(\\overline{z_1 + z_2}) = (z_1 + z_2)(\\bar z_1 + \\bar z_2) = |z_1|^2 + |z_2|^2 + z_1 \\bar z_2 + \\bar z_1 z_2 = |z_1|^2 + |z_2|^2 + 2\\text{Re}(z_1 \\bar z_2)$$.\n- Step 2: When $$z_1 \\perp z_2$$ (arguments differ by $$\\pi/2$$), $$z_1 \\bar z_2$$ is purely imaginary, so $$\\text{Re}(z_1 \\bar z_2) = 0$$. Then $$|z_1 + z_2|^2 = |z_1|^2 + |z_2|^2$$ — exactly Pythagoras.\n- Step 3: When $$z_1 \\parallel z_2$$ (same argument), $$z_1 \\bar z_2$$ is real positive, and $$|z_1 + z_2| = |z_1| + |z_2|$$ — the parallel-vectors equality.\n\nThis identity bridges complex arithmetic and 2D geometry.", "source": "Opus 4 ①", "_id": "opus_1_79", "judge_pick": true}, {"question": "Why is the conjugate $$\\bar z = a - bi$$ geometrically a reflection across the real axis? (2 steps)", "answer": "- Step 1: $$z = a + bi$$ has Argand coordinates $$(a, b)$$. $$\\bar z = a - bi$$ has coordinates $$(a, -b)$$ — same $$x$$, opposite $$y$$.\n- Step 2: This is precisely the reflection $$\\mathbb{R}^2 \\to \\mathbb{R}^2: (x, y) \\mapsto (x, -y)$$ across the real axis. Hence the term \"complex conjugate\" geometrically means \"vertical mirror image\".\n\nThis is why the conjugate-pair rule produces roots symmetric across the real axis on Argand diagrams.", "source": "Opus 4 ①", "_id": "opus_1_80", "judge_pick": false}, {"question": "What does the equation $$8x^2 - 45x - 18 = 0$$ tell you about the second intersection of a normal with $$xy = 9$$, given $$P$$ has $$x = 6$$? Use Vieta's instead of factoring. (3 steps)", "answer": "- Step 1: Since both intersection $$x$$-coordinates are roots of this quadratic, their product is $$\\frac{-18}{8} = -\\frac{9}{4}$$ (Vieta's product-of-roots).\n- Step 2: One root is 6 (point $$P$$), so the other is $$\\frac{-9/4}{6} = -\\frac{3}{8}$$.\n- Step 3: Find $$y$$ by substituting back into the line equation or directly into $$xy = 9$$: $$y = \\frac{9}{-3/8} = -24$$.\n\nVieta's saves the time of factoring or re-applying the quadratic formula.", "source": "Opus 4 ①", "_id": "opus_1_81", "judge_pick": false}, {"question": "Practice — apply Vieta's to find the sum and product of roots of $$3x^2 - 7x + 2 = 0$$. (2 steps)", "answer": "- Step 1: From $$ax^2 + bx + c = 0$$ with $$a = 3$$, $$b = -7$$, $$c = 2$$.\n- Step 2: $$\\alpha + \\beta = -b/a = 7/3$$. $$\\alpha\\beta = c/a = 2/3$$.\n\nSanity check: factoring gives $$(3x-1)(x-2) = 0$$, roots $$1/3$$ and $$2$$. Sum $$= 1/3 + 2 = 7/3$$ ✓. Product $$= 2/3$$ ✓.", "source": "Opus 4 ①", "_id": "opus_1_82", "judge_pick": false}, {"question": "What's the relationship between determinant and orientation, and how would you geometrically distinguish a transformation with $$\\det = +3$$ from one with $$\\det = -3$$? (3 steps)", "answer": "- Step 1: Both transformations scale areas by 3 (since $$|\\det| = 3$$).\n- Step 2: $$\\det = +3$$: orientation-preserving. A counterclockwise unit square maps to a counterclockwise parallelogram (e.g. pure scaling, rotation, or a combination).\n- Step 3: $$\\det = -3$$: orientation-reversing. The same unit square maps to a clockwise parallelogram (a reflection is mixed in).\n\nIn FP1, this is why \"area scale factor 3\" needs both cases — the question doesn't distinguish, so both are valid.", "source": "Opus 4 ①", "_id": "opus_1_83", "judge_pick": true}, {"question": "Practice — the rectangular hyperbola $$xy = 4$$ has a normal at $$(2, 2)$$ (where $$t = 1$$, $$c = 2$$). What's its equation? (3 steps)", "answer": "- Step 1: At $$t = 1$$: gradient of normal is $$t^2 = 1$$.\n- Step 2: Use general normal form $$t^3 x - ty = c(t^4 - 1)$$: $$1 \\cdot x - 1 \\cdot y = 2(1 - 1) = 0$$, i.e. $$y = x$$.\n- Step 3: Sanity check: at $$(2, 2)$$, $$y = x$$ holds ✓. Slope is 1 (matching $$t^2 = 1$$) ✓.\n\nNote: at $$t = \\pm 1$$ on a rectangular hyperbola, the normal is the line $$y = \\pm x$$ — a special case worth knowing.", "source": "Opus 4 ①", "_id": "opus_1_84", "judge_pick": false}], "count": 85}, "opus_2": {"label": "Opus 4 ②", "cards": [{"question": "Why are the standard sums $$\\sum r$$, $$\\sum r^2$$, and $$\\sum r^3$$ split between \"in booklet\" and \"memorize\" for Edexcel FP1, and what does each formula equal? (3 steps)", "answer": "- Step 1: Edexcel deliberately omits $$\\sum_{r=1}^n r = \\tfrac{1}{2}n(n+1)$$ from the formula booklet because it is the simplest of the three and considered \"basic\" — examiners expect automatic recall. You **must memorize** this one.\n- Step 2: The two harder ones are **in the booklet**: $$\\sum_{r=1}^n r^2 = \\tfrac{1}{6}n(n+1)(2n+1)$$ and $$\\sum_{r=1}^n r^3 = \\tfrac{1}{4}n^2(n+1)^2$$. Know exactly where to find them so you don't waste exam time deriving.\n- Step 3: A useful structural observation: every formula contains $$n(n+1)$$ as a factor. This is why the \"factor out $$n(n+1)$$ early\" trick works so universally for $$\\sum$$ problems.\n\nTakeaway: $$\\sum r$$ NOT in booklet; $$\\sum r^2, \\sum r^3$$ ARE — and all three share an $$n(n+1)$$ factor.", "source": "Opus 4 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "When asked to write $$\\sum_{r=1}^n r(r+2)^2$$ in factored form $$\\tfrac{1}{12}n(n+1)(an^2+bn+c)$$, why is it strategic to factor out $$\\tfrac{1}{12}n(n+1)$$ *before* simplifying the polynomial bracket? (3 steps)", "answer": "- Step 1: After expanding $$r(r+2)^2 = r^3 + 4r^2 + 4r$$ and applying standard results, you obtain three terms with denominators 4, 6, 2. Bringing to common denominator 12 gives:\n$$\\tfrac{3}{12}n^2(n+1)^2 + \\tfrac{8}{12}n(n+1)(2n+1) + \\tfrac{24}{12}n(n+1)$$\n- Step 2: **Every** term shares the factor $$n(n+1)$$. If you expand first and then try to factor, you waste time and risk algebra slips. By pulling $$\\tfrac{1}{12}n(n+1)$$ out first, the remaining bracket is just a clean polynomial:\n$$\\tfrac{1}{12}n(n+1)\\big[3n(n+1) + 8(2n+1) + 24\\big]$$\n- Step 3: Now the only remaining work is expanding and simplifying inside the bracket — three short multiplications, no shared factors to track. This is the *factor-early principle* and applies to nearly every $$\\sum$$ question on FP1.\n\nTakeaway: factor first, simplify second — converts a messy three-term polynomial sum into one bracket of additions.", "source": "Opus 4 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "What is the full expansion of $$r(r+2)^2$$, and what is the most common mistake students make when expanding it under exam pressure? (3 steps)", "answer": "- Step 1: Expand the inner square first: $$(r+2)^2 = r^2 + 4r + 4$$.\n- Step 2: Multiply by $$r$$: $$r(r+2)^2 = r^3 + 4r^2 + 4r$$.\n- Step 3: The common mistake (and the one Phuc almost made) is to misread the summand as $$r^2(r+2) = r^3 + 2r^2$$ — different by a coefficient of 4 and missing the linear term entirely. The fix: **always write the full expansion in long form on paper** before summing; never trust mental expansion of compound expressions like $$r(r+2)^2$$.\n\nTakeaway: $$r(r+2)^2 = r^3 + 4r^2 + 4r$$ — the misread $$r^2(r+2)$$ would silently corrupt your final answer.", "source": "Opus 4 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "For a derived sum formula like $$\\sum_{r=1}^n r(r+2)^2 = \\tfrac{1}{12}n(n+1)(3n^2+19n+32)$$, how do you quickly verify it is correct without doing the full algebra again? (3 steps)", "answer": "- Step 1: Substitute $$n=1$$ into the LHS: $$\\sum_{r=1}^1 r(r+2)^2 = 1 \\cdot 3^2 = 9$$.\n- Step 2: Substitute $$n=1$$ into the RHS: $$\\tfrac{1}{12}(1)(2)(3+19+32) = \\tfrac{1}{12} \\cdot 2 \\cdot 54 = 9$$. ✓\n- Step 3: If they don't match, you have an algebra error. You can also test $$n=2$$: LHS $$= 1 \\cdot 9 + 2 \\cdot 16 = 9 + 32 = 41$$; RHS $$= \\tfrac{1}{12}(2)(3)(12 + 38 + 32) = \\tfrac{1}{12}\\cdot 6 \\cdot 82 = 41$$ ✓. **Always do this check** in the last 30 seconds of the question.\n\nTakeaway: a single $$n=1$$ substitution catches almost all algebra errors in $$\\sum$$ problems.", "source": "Opus 4 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Why does a real-coefficient polynomial necessarily have complex roots in conjugate pairs, and what does this tell you about the *number* of complex roots a real polynomial of degree 4 can have? (3 steps)", "answer": "- Step 1: If $$p(x)$$ has real coefficients and $$z = a+bi$$ is a root with $$b \\neq 0$$, then $$p(\\bar z) = \\overline{p(z)} = \\overline{0} = 0$$. (Conjugation distributes over real-coefficient polynomial evaluation because $$\\overline{a^k} = \\bar{a}^k$$ and real coefficients are unchanged by conjugation.) Hence $$\\bar z$$ is also a root.\n- Step 2: Therefore complex (non-real) roots always come in conjugate pairs $$\\{z, \\bar z\\}$$.\n- Step 3: For a degree-4 real polynomial: complex roots come in pairs, so the count of non-real roots must be 0, 2, or 4. The remaining roots are real. (E.g. could be 4 real, or 2 real + 1 complex pair, or 2 complex pairs.)\n\nTakeaway: real coefficients $$\\Rightarrow$$ conjugate pairs $$\\Rightarrow$$ even number of non-real roots.", "source": "Opus 4 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Given $$z_1 = a + bi$$ is a complex root of a real-coefficient polynomial, derive the quadratic factor $$(z - z_1)(z - \\bar z_1)$$ in terms of $$\\text{Re}(z_1)$$ and $$|z_1|$$. (3 steps)", "answer": "- Step 1: Expand directly: $$(z - z_1)(z - \\bar z_1) = z^2 - (z_1 + \\bar z_1)z + z_1 \\bar z_1$$.\n- Step 2: Recognize the standard identities: $$z_1 + \\bar z_1 = 2\\,\\text{Re}(z_1)$$ (the imaginary parts cancel) and $$z_1 \\bar z_1 = |z_1|^2$$ (sum of squares of real and imaginary parts).\n- Step 3: Substitute to get:\n$$(z - z_1)(z - \\bar z_1) = z^2 - 2\\,\\text{Re}(z_1)\\,z + |z_1|^2$$\nFor $$z_1 = 2 + 3i$$: $$\\text{Re}(z_1) = 2$$, $$|z_1|^2 = 4 + 9 = 13$$, so the factor is $$z^2 - 4z + 13$$.\n\nTakeaway: this formula saves time and avoids sign errors compared to expanding $$(z-(2+3i))(z-(2-3i))$$ by hand.", "source": "Opus 4 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Outline the 4-step pipeline for solving \"Given complex root $$z_1$$ of a real-coefficient quartic $$p(x)$$, find all four roots.\" (4 steps)", "answer": "- Step 1: Write down the conjugate $$\\bar z_1$$ — automatically a second root by the conjugate-pair rule.\n- Step 2: Build the quadratic factor $$z^2 - 2\\,\\text{Re}(z_1)z + |z_1|^2$$ — this is a real-coefficient factor of $$p(x)$$.\n- Step 3: Polynomial-divide $$p(x)$$ by this quadratic factor to obtain a second quadratic factor (the quotient).\n- Step 4: Solve the quotient $$= 0$$ by quadratic formula or factoring — this gives the remaining two roots.\n\nTakeaway: conjugate pair → quadratic factor → polynomial division → solve the quotient. No guessing needed.", "source": "Opus 4 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "When polynomial-dividing $$p(x)$$ by a known quadratic factor, where do most exam errors creep in, and how do you defend against them? (3 steps)", "answer": "- Step 1: The most common error is in the **second-step subtraction** of long division — forgetting to distribute the minus sign across all terms of the subtrahend.\n- Step 2: Write each subtraction explicitly with brackets: e.g., subtract $$(x^2 - 4x + 13) \\cdot 2x^2 = 2x^4 - 8x^3 + 26x^2$$ — bracket the entire subtrahend before changing all its signs.\n- Step 3: After each subtraction, check that the leading term of the remainder is one degree lower than expected. If not, re-check signs.\n\nTakeaway: long division errors are nearly always sign errors; bracketing aggressively defeats them.", "source": "Opus 4 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "What is the standard parametric form of the rectangular hyperbola $$xy = c^2$$, and why is it convenient for tangent/normal calculations? (3 steps)", "answer": "- Step 1: A point on $$xy = c^2$$ can be written as $$(ct, \\tfrac{c}{t})$$ where $$t \\in \\mathbb{R} \\setminus \\{0\\}$$ is the parameter. Verify: $$ct \\cdot \\tfrac{c}{t} = c^2$$ ✓.\n- Step 2: The convenience comes from differentiation: $$y = c^2/x \\Rightarrow \\tfrac{dy}{dx} = -c^2/x^2$$, and at $$x = ct$$ this is $$-c^2/(ct)^2 = -1/t^2$$ — a clean formula in $$t$$ alone.\n- Step 3: This means tangent gradient is $$-1/t^2$$ and normal gradient is $$t^2$$, both expressed cleanly in the parameter. All subsequent line equations factor neatly. For $$xy = 9$$: $$c^2 = 9 \\Rightarrow c = 3$$, so points are $$(3t, 3/t)$$.\n\nTakeaway: parametric form turns a Cartesian rational curve into linear-in-$$t$$ algebra.", "source": "Opus 4 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Derive the equation of the normal to $$xy = c^2$$ at the parametric point $$(ct, c/t)$$, in the form $$t^3 x - ty = c(t^4 - 1)$$. (4 steps)", "answer": "- Step 1: Differentiate implicitly: $$y + x\\tfrac{dy}{dx} = 0 \\Rightarrow \\tfrac{dy}{dx} = -y/x$$. At $$(ct, c/t)$$: $$\\tfrac{dy}{dx} = -(c/t)/(ct) = -1/t^2$$.\n- Step 2: Tangent gradient is $$-1/t^2$$, so normal gradient is $$t^2$$ (negative reciprocal).\n- Step 3: Normal line through $$(ct, c/t)$$ with gradient $$t^2$$:\n$$y - \\tfrac{c}{t} = t^2(x - ct)$$\n- Step 4: Multiply both sides by $$t$$ to clear the fraction: $$ty - c = t^3 x - c t^4$$. Rearrange to standard form: $$t^3 x - ty = c(t^4 - 1)$$.\n\nTakeaway: the multiply-by-$$t$$ step is what produces the elegant $$t^3 x - ty = c(t^4-1)$$ form.", "source": "Opus 4 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "For a rectangular hyperbola $$xy = c^2$$, you find the normal at point $$P$$ meets the curve again at $$P'$$. Without solving the quadratic, how does Vieta's give you $$P'$$'s $$x$$-coordinate quickly? (3 steps)", "answer": "- Step 1: Substituting the normal into $$xy = c^2$$ produces a quadratic in $$x$$. Since $$P$$ already lies on both the normal and the curve, $$P$$'s $$x$$-coordinate $$x_P$$ is one root of that quadratic.\n- Step 2: By Vieta's, the *product* of the two roots equals $$c/a$$ (constant term divided by leading coefficient) for $$ax^2 + bx + c = 0$$. So $$x_P \\cdot x_{P'} = c/a$$.\n- Step 3: Therefore $$x_{P'} = (c/a) / x_P$$. This is faster than re-solving the quadratic from scratch and acts as a sanity check on your answer. For example, if the quadratic is $$8x^2 - 45x - 18 = 0$$ and $$x_P = 6$$, then $$x_P \\cdot x_{P'} = -18/8 = -9/4$$, so $$x_{P'} = -9/24 = -3/8$$.\n\nTakeaway: when one root is \"free\" (the original point), use Vieta's product to read off the other.", "source": "Opus 4 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Why is the $$\\pm$$ sign critical when a problem says \"the area scale factor under matrix $$A$$ is 3 — find possible values of $$k$$\"? (3 steps)", "answer": "- Step 1: The geometric area scale factor is **always positive** — it's the ratio of areas. But $$\\det A$$ itself can be positive or negative; its sign tells you whether the transformation **preserves orientation** ($$+$$) or **reverses orientation** ($$-$$, like a reflection).\n- Step 2: So \"area scale factor = 3\" means $$|\\det A| = 3$$, which gives $$\\det A = +3$$ OR $$\\det A = -3$$.\n- Step 3: Each sign yields a separate equation in $$k$$, hence (potentially) two valid values. The phrase \"**possible values**\" (plural) is the examiner's hint that they want both branches considered.\n\nTakeaway: area scale factor is unsigned; \"possible values\" means split into $$\\pm$$ cases.", "source": "Opus 4 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "State the formula for the inverse of a $$2 \\times 2$$ matrix $$\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$$ and explain the structure (what stays, what moves, what flips sign). (3 steps)", "answer": "- Step 1: $$\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}^{-1} = \\frac{1}{ad - bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$$\n- Step 2: The structure: **swap the diagonal** ($$a \\leftrightarrow d$$), **negate the anti-diagonal** ($$b \\to -b$$, $$c \\to -c$$), and **divide by the determinant** $$\\det = ad - bc$$.\n- Step 3: Verify by multiplication: $$\\tfrac{1}{ad-bc}\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix} = \\tfrac{1}{ad-bc}\\begin{pmatrix} ad - bc & 0 \\\\ 0 & ad - bc \\end{pmatrix} = I$$ ✓.\n\nTakeaway: SWAP diagonal, NEGATE off-diagonal, DIVIDE by det. Memorize.", "source": "Opus 4 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "If $$BC = D$$ where $$B$$ is $$2\\times 2$$ and $$D$$ is $$2 \\times 3$$, what is the shape of $$C$$, and how do you solve for it? (3 steps)", "answer": "- Step 1: Shape check: $$B$$ is $$2 \\times 2$$ and $$BC = D$$ is $$2 \\times 3$$. For matrix multiplication $$B \\cdot C$$ to give a $$2 \\times 3$$ result, $$C$$ must be $$2 \\times 3$$ (inner dimensions must match: $$2 \\times \\mathbf{2}$$ times $$\\mathbf{2} \\times 3$$ → $$2 \\times 3$$).\n- Step 2: To solve: pre-multiply both sides by $$B^{-1}$$ (assuming $$\\det B \\neq 0$$): $$B^{-1}BC = B^{-1}D \\Rightarrow C = B^{-1}D$$.\n- Step 3: Compute $$B^{-1}$$ first using the 2×2 inverse formula, then multiply $$B^{-1}$$ (a $$2\\times 2$$) by $$D$$ (a $$2\\times 3$$) to produce $$C$$ (a $$2 \\times 3$$).\n\nTakeaway: when solving $$BC=D$$, pre-multiply by $$B^{-1}$$ from the **left** — and check shapes before computing.", "source": "Opus 4 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Why must you pre-multiply (not post-multiply) by $$B^{-1}$$ to solve $$BC = D$$ for $$C$$? (3 steps)", "answer": "- Step 1: Matrix multiplication is **non-commutative**: in general $$AB \\neq BA$$. So you must apply the inverse from the same side it would cancel.\n- Step 2: Starting from $$BC = D$$, to isolate $$C$$ you need $$B^{-1}$$ to cancel the $$B$$ on the left of $$C$$. Pre-multiply both sides: $$B^{-1}(BC) = B^{-1}D$$, i.e. $$(B^{-1}B)C = B^{-1}D$$, so $$IC = B^{-1}D$$, giving $$C = B^{-1}D$$.\n- Step 3: If you accidentally post-multiplied: $$BC \\cdot B^{-1} = D B^{-1}$$ — but this gives $$B(C B^{-1})$$, which doesn't simplify to $$C$$ unless $$B$$ and $$C$$ commute (rarely true).\n\nTakeaway: side matters in matrix algebra. Cancel from the same side as the obstruction.", "source": "Opus 4 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "State Vieta's formulas for a quadratic $$ax^2 + bx + c = 0$$ with roots $$\\alpha, \\beta$$. Are they in the FP1 booklet? (3 steps)", "answer": "- Step 1: Vieta's: $$\\alpha + \\beta = -b/a$$ and $$\\alpha\\beta = c/a$$.\n- Step 2: Derivation in one line: the monic form $$x^2 + (b/a)x + c/a = 0$$ factors as $$(x - \\alpha)(x - \\beta) = x^2 - (\\alpha+\\beta)x + \\alpha\\beta$$, so by matching coefficients $$\\alpha + \\beta = -b/a$$ and $$\\alpha\\beta = c/a$$.\n- Step 3: These ARE in the FP1 formula booklet under \"Roots of equations\" — but they're so basic and used so often that you should have them memorized to avoid wasting time looking them up.\n\nTakeaway: Sum $$= -b/a$$, Product $$= c/a$$. In booklet, but memorize.", "source": "Opus 4 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Given a quadratic with roots $$\\alpha, \\beta$$, list the symmetric-function identities that let you compute new expressions in $$\\alpha, \\beta$$ without solving for them individually. (3 steps)", "answer": "- Step 1: From sum $$s = \\alpha + \\beta$$ and product $$p = \\alpha\\beta$$ alone:\n+ $$\\alpha^2 + \\beta^2 = s^2 - 2p$$\n+ $$\\alpha^3 + \\beta^3 = s^3 - 3sp$$\n+ $$(\\alpha - \\beta)^2 = s^2 - 4p$$\n+ $$\\tfrac{1}{\\alpha} + \\tfrac{1}{\\beta} = \\tfrac{s}{p}$$, $$\\tfrac{1}{\\alpha\\beta} = \\tfrac{1}{p}$$\n- Step 2: Useful factoring identities:\n+ $$\\alpha\\beta^2 + \\beta\\alpha^2 = \\alpha\\beta(\\alpha+\\beta) = ps$$\n+ $$(\\alpha^2+1)(\\beta^2+1) = (\\alpha\\beta)^2 + (\\alpha^2+\\beta^2) + 1 = p^2 + s^2 - 2p + 1$$\n- Step 3: The principle: any **symmetric** polynomial in $$\\alpha, \\beta$$ can be expressed in terms of $$s$$ and $$p$$ alone — this is the fundamental theorem of symmetric polynomials (in this baby case).\n\nTakeaway: rewrite everything as $$s$$ and $$p$$ — never solve for $$\\alpha, \\beta$$ individually unless asked.", "source": "Opus 4 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "Compute $$(\\alpha^2 + 1)(\\beta^2 + 1)$$ using only the sum $$s = \\alpha + \\beta$$ and product $$p = \\alpha\\beta$$. (3 steps)", "answer": "- Step 1: Expand: $$(\\alpha^2+1)(\\beta^2+1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1$$.\n- Step 2: Recognize $$\\alpha^2\\beta^2 = (\\alpha\\beta)^2 = p^2$$, and $$\\alpha^2 + \\beta^2 = s^2 - 2p$$.\n- Step 3: Combine: $$(\\alpha^2+1)(\\beta^2+1) = p^2 + s^2 - 2p + 1$$. For $$f(x) = x^2 - 6x + 3$$: $$s = 6, p = 3$$, so $$(\\alpha^2+1)(\\beta^2+1) = 9 + 36 - 6 + 1 = 40$$.\n\nTakeaway: convert to $$s$$ and $$p$$, then plug in numbers.", "source": "Opus 4 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "When building a new quadratic with roots $$\\alpha' = \\tfrac{\\alpha}{\\alpha^2+1}$$ and $$\\beta' = \\tfrac{\\beta}{\\beta^2+1}$$, what is the strategic process and what is the key algebraic trick that often gets stuck? (4 steps)", "answer": "- Step 1: A monic quadratic with roots $$\\alpha', \\beta'$$ is $$x^2 - (\\alpha' + \\beta')x + \\alpha'\\beta' = 0$$. So you need to compute $$S = \\alpha' + \\beta'$$ and $$P = \\alpha'\\beta'$$ in terms of $$s, p$$.\n- Step 2: $$P$$ is easy: $$\\alpha'\\beta' = \\tfrac{\\alpha\\beta}{(\\alpha^2+1)(\\beta^2+1)} = \\tfrac{p}{p^2 + s^2 - 2p + 1}$$. **Reuse part-(a)** if it computed the denominator.\n- Step 3: $$S$$ is harder — combining over a common denominator gives a numerator $$\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1) = \\alpha\\beta^2 + \\beta\\alpha^2 + \\alpha + \\beta$$. The trick: factor as $$\\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta) = (\\alpha+\\beta)(\\alpha\\beta+1) = s(p+1)$$.\n- Step 4: After computing $$S$$ and $$P$$ as fractions, multiply through by their LCM to clear denominators and produce $$px^2 + qx + r = 0$$ with integer coefficients.\n\nTakeaway: factor out $$(\\alpha+\\beta)$$ from the cross-terms — this is THE trick that makes \"transformed root\" questions tractable.", "source": "Opus 4 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Show step-by-step why $$\\alpha\\beta^2 + \\beta\\alpha^2 + \\alpha + \\beta = (\\alpha+\\beta)(\\alpha\\beta+1)$$. (3 steps)", "answer": "- Step 1: Look at the four terms and identify common factors. The first two share $$\\alpha\\beta$$; the last two share nothing obvious — but they share the *form* $$\\alpha + \\beta$$.\n- Step 2: Factor in pairs: $$\\alpha\\beta^2 + \\beta\\alpha^2 = \\alpha\\beta(\\beta + \\alpha)$$, and $$\\alpha + \\beta$$ is left as is.\n- Step 3: Both pairs now share the factor $$(\\alpha + \\beta)$$:\n$$\\alpha\\beta(\\alpha+\\beta) + 1 \\cdot (\\alpha+\\beta) = (\\alpha+\\beta)(\\alpha\\beta + 1)$$\n\nTakeaway: factoring symmetric expressions = group terms with the same symmetry pattern, then extract the common symmetric factor.", "source": "Opus 4 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Compute $$|z_1 + z_2|$$ when $$z_1 = 3 + 2i$$ and $$z_2 = 2 + 3i$$, showing the conceptual flow. (3 steps)", "answer": "- Step 1: Add the complex numbers component-wise: $$z_1 + z_2 = (3+2) + (2+3)i = 5 + 5i$$.\n- Step 2: Apply the modulus formula $$|a+bi| = \\sqrt{a^2 + b^2}$$: $$|z_1 + z_2| = \\sqrt{5^2 + 5^2} = \\sqrt{50}$$.\n- Step 3: Simplify the surd: $$\\sqrt{50} = \\sqrt{25 \\cdot 2} = 5\\sqrt{2}$$.\n\nTakeaway: modulus = Pythagoras applied to (Re, Im). Always simplify surds.", "source": "Opus 4 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Why do you multiply numerator and denominator by the conjugate $$\\bar z$$ when computing $$w = \\tfrac{u}{z}$$, and what does it produce? (3 steps)", "answer": "- Step 1: Division of complex numbers isn't directly defined like real division. The trick is to convert the denominator into a real number so the division becomes simple scaling.\n- Step 2: Multiply top and bottom by $$\\bar z$$: $$\\tfrac{u}{z} = \\tfrac{u \\bar z}{z \\bar z} = \\tfrac{u \\bar z}{|z|^2}$$. The denominator $$z\\bar z = |z|^2$$ is real (and positive).\n- Step 3: Now $$u\\bar z$$ is a single complex number you can compute, and dividing by the real $$|z|^2$$ just scales each component. So you can cleanly read off the real and imaginary parts of $$w$$. For $$z = 3 + 2i$$: $$|z|^2 = 13$$, so multiplying by $$(3-2i)/(3-2i)$$ pulls out a clean $$1/13$$.\n\nTakeaway: conjugate-multiply rationalizes the denominator in $$\\mathbb{C}$$ — analogous to rationalizing $$\\sqrt{}$$ in $$\\mathbb{R}$$.", "source": "Opus 4 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "When you have $$w = x + iy$$ in terms of unknowns $$a, b$$ and you're told the numerical value of $$w$$, how do you extract $$a$$ and $$b$$? (3 steps)", "answer": "- Step 1: A complex equation $$w_{\\text{symbolic}}(a,b) = w_{\\text{numeric}}$$ is equivalent to TWO real equations — one from equating real parts, one from equating imaginary parts. (This works because $$\\{1, i\\}$$ is a basis of $$\\mathbb{C}$$ over $$\\mathbb{R}$$.)\n- Step 2: Write the two equations side by side and solve as a $$2\\times 2$$ linear system in $$a, b$$.\n- Step 3: Use elimination or substitution. For example, $$12a - 5b = 4$$ and $$5a + 12b = 58$$: multiply first by 12, second by 5, add to eliminate $$b$$, getting $$169a = 338 \\Rightarrow a = 2$$; back-substitute for $$b = 4$$.\n\nTakeaway: one complex equation = two real equations. Always.", "source": "Opus 4 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "A complex number $$w$$ has $$\\text{Re}(w) > 0$$ and $$\\text{Im}(w) > 0$$. State the formula for $$\\arg(w)$$ in this quadrant, and explain why the formula changes in other quadrants. (3 steps)", "answer": "- Step 1: In the **first quadrant** (Re > 0, Im > 0): $$\\arg(w) = \\arctan(y/x)$$ directly, where $$w = x + iy$$. This is a positive angle in $$(0, \\pi/2)$$.\n- Step 2: The reason the formula changes elsewhere: $$\\arctan$$ has range $$(-\\pi/2, \\pi/2)$$, but $$\\arg$$ has range $$(-\\pi, \\pi]$$. So $$\\arctan$$ alone can't distinguish, e.g., $$-1 - i$$ (Q3) from $$1 + i$$ (Q1) — both give $$\\arctan(1)$$.\n- Step 3: Quadrant-by-quadrant fixes:\n+ Q2 (Re < 0, Im > 0): $$\\arg = \\pi - \\arctan(|y/x|)$$\n+ Q3 (Re < 0, Im < 0): $$\\arg = -\\pi + \\arctan(|y/x|)$$\n+ Q4 (Re > 0, Im < 0): $$\\arg = -\\arctan(|y/x|)$$\n\nTakeaway: ALWAYS sketch the Argand position first to identify the quadrant, then choose the right adjustment.", "source": "Opus 4 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "What is the Intermediate Value Theorem-based logic for proving a continuous function $$f$$ has a root in an interval $$[a, b]$$? (3 steps)", "answer": "- Step 1: Compute $$f(a)$$ and $$f(b)$$. Show they have **opposite signs** (i.e., $$f(a) \\cdot f(b) < 0$$).\n- Step 2: State that $$f$$ is **continuous** on $$[a,b]$$ — for FP1, almost all algebraic functions you meet are continuous on the relevant domain (polynomials always; $$x^{p/q}$$ for $$x>0$$ when $$q$$ is even).\n- Step 3: By the Intermediate Value Theorem (often phrased as \"sign change\"), there exists at least one $$c \\in (a, b)$$ with $$f(c) = 0$$. State the conclusion explicitly.\n\nWorked example: $$f(x) = x^{3/2} + x - 3$$, $$f(1) = -1 < 0$$, $$f(2) \\approx 1.83 > 0$$; $$f$$ continuous on $$[1,2]$$ → root exists.\n\nTakeaway: sign change + continuity ⇒ root exists. State both halves explicitly for full marks.", "source": "Opus 4 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Describe one iteration of interval bisection on $$[a, b]$$ and explain why it always converges (eventually). (3 steps)", "answer": "- Step 1: Compute the midpoint $$m = (a+b)/2$$ and evaluate $$f(m)$$. Compare its sign to $$f(a)$$ and $$f(b)$$.\n- Step 2: Identify which half of the interval contains the sign change. If $$f(a)$$ and $$f(m)$$ have opposite signs, the root lies in $$[a, m]$$; otherwise in $$[m, b]$$. Replace the interval with the half that retains the sign change.\n- Step 3: Convergence: each bisection step **halves** the interval width. After $$n$$ steps, the interval is $$(b-a)/2^n$$ wide, and the root is within that interval. So the error bound shrinks geometrically — guaranteed convergence, regardless of how badly behaved $$f$$ is, as long as $$f$$ is continuous and the initial interval has a sign change.\n\nTakeaway: bisection is slow but bulletproof — always converges, error halves each step.", "source": "Opus 4 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "State the Newton-Raphson iteration formula and the geometric interpretation of one step. (3 steps)", "answer": "- Step 1: $$x_{n+1} = x_n - \\dfrac{f(x_n)}{f'(x_n)}$$\n- Step 2: Geometrically: at $$x_n$$, draw the tangent line to $$y = f(x)$$. This tangent has slope $$f'(x_n)$$ and passes through $$(x_n, f(x_n))$$. Its equation is $$y - f(x_n) = f'(x_n)(x - x_n)$$.\n- Step 3: Find where this tangent crosses the $$x$$-axis (set $$y=0$$): $$x = x_n - f(x_n)/f'(x_n)$$. This is your next approximation $$x_{n+1}$$. The intuition: if $$f$$ is approximately linear near $$x_n$$, the tangent's root is a good approximation to $$f$$'s root.\n\nTakeaway: NR uses local linearization (tangent) to \"shoot\" toward the root.", "source": "Opus 4 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "When does Newton-Raphson fail or behave badly, and what should you do if $$f'(x_0)$$ is small? (3 steps)", "answer": "- Step 1: NR's update is $$x_{n+1} = x_n - f(x_n)/f'(x_n)$$. If $$f'(x_n)$$ is **small** (near zero), the update step $$f(x_n)/f'(x_n)$$ is **huge**, sending the iterate far from the actual root — divergence.\n- Step 2: NR also fails near inflection points (where the tangent badly misrepresents the curve), and oscillates near local minima/maxima where $$f'$$ changes sign.\n- Step 3: Fix: pick a starting value $$x_0$$ where $$f$$ is \"well-behaved\" (away from stationary points), and prefer using NR after a couple of bisection steps to localize the root.\n\nTakeaway: NR is fast when it works, but small derivative ⇒ catastrophic step. Bisect first, then NR.", "source": "Opus 4 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "State the closed-form linear interpolation formula for finding an approximation to a root in $$[a, b]$$, and give the geometric idea. (3 steps)", "answer": "- Step 1: $$x_1 = a - \\dfrac{f(a)\\,(b - a)}{f(b) - f(a)}$$\nEquivalently, by symmetry: $$x_1 = b - \\tfrac{f(b)(b-a)}{f(b)-f(a)} = \\tfrac{a f(b) - b f(a)}{f(b) - f(a)}$$.\n- Step 2: Geometric meaning: draw the **chord** (straight line) connecting $$(a, f(a))$$ and $$(b, f(b))$$. The point where this chord crosses the $$x$$-axis is $$x_1$$ — a better estimate of the root than just the midpoint.\n- Step 3: Compared to bisection (which uses no slope info), linear interpolation uses the **values** $$f(a), f(b)$$ to weight the estimate toward whichever endpoint has $$|f|$$ smaller. So if $$f(a) = -0.01$$ and $$f(b) = 5$$, $$x_1$$ will be very close to $$a$$.\n\nTakeaway: linear interpolation = chord intersect $$x$$-axis. Faster than bisection if $$f$$ is roughly linear.", "source": "Opus 4 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Compare bisection, Newton-Raphson, and linear interpolation on three axes: convergence guarantee, speed, and required computations per step. (3 steps)", "answer": "- Step 1: **Convergence guarantee**:\n+ Bisection: guaranteed (if continuous + sign change at start)\n+ Linear interpolation: usually converges (if endpoints retain sign change), can stall\n+ Newton-Raphson: NOT guaranteed; can diverge if $$f'$$ is small or $$f$$ is badly behaved\n- Step 2: **Speed**:\n+ Bisection: linear in iterations (halves error each step)\n+ Linear interpolation: superlinear if $$f$$ is roughly linear; can be slow if $$f$$ is curvy\n+ Newton-Raphson: quadratic convergence near the root (doubles correct digits per step)\n- Step 3: **Computations per step**:\n+ Bisection: 1 function evaluation\n+ Linear interpolation: 1 function evaluation (after first step)\n+ Newton-Raphson: 1 function and 1 derivative evaluation — requires you to compute $$f'$$ analytically\n\nTakeaway: trade-off between robustness and speed. NR fastest if it works; bisection slowest but bulletproof.", "source": "Opus 4 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "Why is it strategic to apply interval bisection first (a few steps) and then switch to Newton-Raphson, rather than starting NR immediately? (3 steps)", "answer": "- Step 1: NR's convergence depends critically on the starting value being close enough to the root and in a region where $$f$$ is \"well-behaved\" (no nearby stationary points or inflections).\n- Step 2: A few bisection steps **localize** the root to a narrow interval — this gives you a reliable starting $$x_0$$ for NR (typically the midpoint of the bracketed interval after bisection).\n- Step 3: Once close, NR's quadratic convergence kicks in and produces high-precision answers in 1–2 steps. Best of both worlds: bisection's robustness + NR's speed.\n\nTakeaway: bisection localizes; NR refines. Hybrid is industry standard.", "source": "Opus 4 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "State the equation $$y^2 = 4ax$$ for a standard rightward-opening parabola, and identify its parametric form, focus, and directrix in terms of $$a$$. (3 steps)", "answer": "- Step 1: The standard form $$y^2 = 4ax$$ describes a parabola with vertex at the origin, opening to the right (assuming $$a > 0$$).\n- Step 2: **Parametric form**: $$(at^2, 2at)$$ for $$t \\in \\mathbb{R}$$. Verify: $$(2at)^2 = 4a^2 t^2 = 4a \\cdot at^2$$ ✓. The parameter $$t$$ encodes the \"height\" of the point on the parabola.\n- Step 3: **Focus**: $$S = (a, 0)$$ — on the axis, distance $$a$$ from the vertex. **Directrix**: the vertical line $$x = -a$$ — perpendicular distance $$a$$ from the vertex on the opposite side. For $$y^2 = 8x$$: $$4a = 8 \\Rightarrow a = 2$$. Focus $$(2,0)$$, directrix $$x = -2$$, parametric $$(2t^2, 4t)$$.\n\nTakeaway: $$y^2 = 4ax$$ is THE form. Match to find $$a$$, then everything follows.", "source": "Opus 4 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "Verify that $$Q\\!\\left(\\tfrac{2}{p^2}, -\\tfrac{4}{p}\\right)$$ lies on the parabola $$y^2 = 8x$$, and identify its parameter $$t$$. (3 steps)", "answer": "- Step 1: Substitute into LHS and RHS:\n+ LHS: $$y^2 = (-4/p)^2 = 16/p^2$$\n+ RHS: $$8x = 8 \\cdot 2/p^2 = 16/p^2$$\n- Step 2: LHS = RHS ✓, so $$Q$$ lies on the parabola.\n- Step 3: To find the parameter, recall the parametric form is $$(2t^2, 4t)$$ (since $$a=2$$). Comparing: $$4t = -4/p \\Rightarrow t = -1/p$$. Cross-check: $$2t^2 = 2/p^2$$ ✓. So $$Q$$ has parameter $$t = -1/p$$.\n\nTakeaway: substitution check is fast; identifying the parameter unlocks the focal-chord theorem.", "source": "Opus 4 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "State the focal chord theorem for the parabola $$y^2 = 4ax$$, and derive why it implies $$t_1 t_2 = -1$$. (3 steps)", "answer": "- Step 1: A **focal chord** is a chord (line segment) through the focus $$(a, 0)$$. The theorem: for two points $$P_1 = (at_1^2, 2at_1)$$ and $$P_2 = (at_2^2, 2at_2)$$ on the parabola, the chord $$P_1 P_2$$ passes through the focus if and only if $$t_1 t_2 = -1$$.\n- Step 2: Derivation: the gradient of $$P_1 P_2$$ is $$\\tfrac{2at_1 - 2at_2}{at_1^2 - at_2^2} = \\tfrac{2(t_1 - t_2)}{(t_1-t_2)(t_1+t_2)} = \\tfrac{2}{t_1 + t_2}$$. Line through $$P_1$$:\n$$y - 2at_1 = \\tfrac{2}{t_1+t_2}(x - at_1^2)$$\n- Step 3: Set $$x = a, y = 0$$ (the focus): $$-2at_1(t_1+t_2) = 2(a - at_1^2)$$, i.e. $$-t_1(t_1+t_2) = 1 - t_1^2$$. Expand: $$-t_1^2 - t_1 t_2 = 1 - t_1^2$$, so $$-t_1 t_2 = 1$$, hence $$t_1 t_2 = -1$$. ✓\n\nTakeaway: focal chord ⇔ $$t_1 t_2 = -1$$. Use this to skip computational verification.", "source": "Opus 4 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "State the equation of the tangent and the normal to $$y^2 = 4ax$$ at the parametric point $$(at^2, 2at)$$. (3 steps)", "answer": "- Step 1: **Tangent**: $$ty = x + at^2$$. Equivalently, $$y = \\tfrac{x}{t} + at$$ in slope form (gradient $$1/t$$).\n- Step 2: **Normal**: $$y + tx = 2at + at^3$$. Equivalently, $$y = -tx + (2at + at^3)$$ in slope form (gradient $$-t$$, perpendicular to tangent gradient $$1/t$$).\n- Step 3: These follow from $$\\frac{dy}{dx}$$ at the parametric point. Differentiate $$y^2 = 4ax$$ implicitly: $$2y \\tfrac{dy}{dx} = 4a$$, so $$\\tfrac{dy}{dx} = 2a/y = 2a/(2at) = 1/t$$. Then write line through $$(at^2, 2at)$$ with this gradient and rearrange.\n\nTakeaway: tangent $$ty = x + at^2$$, normal $$y + tx = 2at + at^3$$. NOT in booklet — memorize.", "source": "Opus 4 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "What is the directrix-as-polar theorem for the parabola, and how does it relate to focal chords? (3 steps)", "answer": "- Step 1: **Theorem**: For any focal chord $$PQ$$ of a parabola, the tangents at $$P$$ and $$Q$$ meet on the **directrix**.\n- Step 2: This is a special case of the more general \"polar-pole\" duality in conic sections: the directrix is the *polar line* of the focus. Specifically, take any line through the focus (= focal chord), and draw tangents at its two intersections with the parabola; those tangents meet on the polar of the focus, which is the directrix.\n- Step 3: Practical use on FP1: when an exam asks \"tangents at the ends of focal chord meet at $$R$$ — find $$R$$,\" you can immediately predict that $$R$$ has $$x$$-coordinate $$-a$$ (on the directrix). For $$y^2 = 8x$$, $$a = 2$$, so $$R$$'s $$x$$-coordinate is $$-2$$.\n\nTakeaway: focal chord ↔ directrix. Tangent intersection always on $$x = -a$$.", "source": "Opus 4 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Describe the systematic process for finding $$R$$, the intersection of the two tangents at endpoints of a focal chord on $$y^2 = 4ax$$. (4 steps)", "answer": "- Step 1: Identify the parameters of $$P$$ and $$Q$$. If they form a focal chord, $$t_1 t_2 = -1$$ (use this!).\n- Step 2: Write the two tangent equations: $$t_1 y = x + a t_1^2$$ and $$t_2 y = x + a t_2^2$$. Subtract to eliminate $$x$$:\n$$(t_1 - t_2)y = a(t_1^2 - t_2^2) = a(t_1 - t_2)(t_1 + t_2)$$\ngiving $$y = a(t_1 + t_2)$$.\n- Step 3: Substitute back into one tangent equation: $$x = t_1 y - a t_1^2 = a t_1 (t_1 + t_2) - a t_1^2 = a t_1 t_2$$.\n- Step 4: For a focal chord, $$t_1 t_2 = -1$$, so $$x = -a$$ (on the directrix as predicted), and $$y = a(t_1 + t_2)$$ depends on the specific chord.\n\nFor $$y^2 = 8x$$ with $$t_1 = p, t_2 = -1/p$$: $$a = 2$$, $$t_1 + t_2 = p - 1/p$$, so $$R = (-2, 2p - 2/p)$$.\n\nTakeaway: tangent intersection at $$(at_1 t_2, a(t_1+t_2))$$ in general; on directrix iff focal chord.", "source": "Opus 4 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "What are the four required steps in a proof by mathematical induction, and what role does each play? (4 steps)", "answer": "- Step 1: **BASE CASE**: Show the proposition holds for the smallest value of $$n$$ (typically $$n=1$$, or wherever the spec starts). This is the foundation.\n- Step 2: **INDUCTIVE HYPOTHESIS** (Assumption): Assume the proposition is true for some arbitrary $$n = k$$. Write this assumption explicitly.\n- Step 3: **INDUCTIVE STEP**: Using ONLY the hypothesis at $$n = k$$, prove the proposition holds for $$n = k + 1$$. This is where the algebraic work happens.\n- Step 4: **CONCLUSION**: Invoke the principle of mathematical induction: since true for $$n = 1$$, and true for $$n = k$$ implies true for $$n = k+1$$, it is true for all $$n \\in \\mathbb{Z}^+$$ (or for $$n \\geq n_0$$ as required). End with $$\\blacksquare$$ or \"Q.E.D.\"\n\nTakeaway: BASE → ASSUME → INDUCT → CONCLUDE. Always all four, always explicit. Examiners give a method mark just for stating the structure cleanly.", "source": "Opus 4 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "For a divisibility induction \"show $$f(n)$$ is divisible by $$d$$\", what is the *difference approach* and when does it work? (3 steps)", "answer": "- Step 1: Compute $$f(k+1) - f(k)$$. If this difference is itself a multiple of $$d$$ (verifiable directly without $$f(k)$$), then since $$f(k) = dm$$ by hypothesis, $$f(k+1) = f(k) + d \\cdot (\\text{something}) = d(m + \\text{something})$$.\n- Step 2: This works cleanly when the algebra of $$f(k+1) - f(k)$$ collapses to something recognizable as $$d \\cdot (\\text{integer})$$.\n- Step 3: For $$f(n) = 4^n + 6n - 10$$ and $$d = 18$$: $$f(k+1) - f(k) = 3\\cdot 4^k + 6$$. This isn't *immediately* a multiple of 18. You need a sub-argument that $$4^k + 2$$ is divisible by 6 (since $$4^k \\equiv 4 \\pmod 6$$), making $$3(4^k+2)$$ a multiple of 18. Works but requires extra work.\n\nTakeaway: difference approach is clean when the difference factors nicely; messier when extra modular arguments are needed.", "source": "Opus 4 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "What is the *engineered-form approach* to divisibility induction, and why is it often cleaner than computing $$f(k+1) - f(k)$$? (4 steps)", "answer": "- Step 1: Aim to write $$f(k+1) = c \\cdot f(k) + d \\cdot g(k)$$, where $$c$$ is a constant integer, $$d$$ is the divisor (e.g. 18), and $$g(k)$$ is some integer-valued expression in $$k$$.\n- Step 2: Since by hypothesis $$d \\mid f(k)$$, the first term is automatically divisible by $$d$$. The second term $$d \\cdot g(k)$$ is divisible by $$d$$ by construction. Hence $$f(k+1)$$ is divisible by $$d$$.\n- Step 3: For $$f(n) = 4^n + 6n - 10$$: expand $$f(k+1) = 4 \\cdot 4^k + 6k - 4$$. We engineer:\n$$f(k+1) = 4f(k) - 18(k - 2)$$\nVerify: $$4f(k) = 4 \\cdot 4^k + 24k - 40$$, so $$4f(k) - 18(k-2) = 4 \\cdot 4^k + 24k - 40 - 18k + 36 = 4 \\cdot 4^k + 6k - 4$$ ✓.\n- Step 4: This is cleaner because you never need a separate modular argument — both terms on the RHS are visibly multiples of 18.\n\nTakeaway: engineer $$f(k+1) = c \\cdot f(k) + d \\cdot (\\text{integer})$$ — both terms then visibly divisible.", "source": "Opus 4 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Verify the engineering $$f(k+1) = 4f(k) - 18(k-2)$$ for $$f(n) = 4^n + 6n - 10$$ — show every step. (4 steps)", "answer": "- Step 1: Compute $$f(k+1)$$ directly: $$4^{k+1} + 6(k+1) - 10 = 4 \\cdot 4^k + 6k + 6 - 10 = 4 \\cdot 4^k + 6k - 4$$.\n- Step 2: Compute $$4f(k)$$: $$4(4^k + 6k - 10) = 4 \\cdot 4^k + 24k - 40$$.\n- Step 3: Compute the difference $$f(k+1) - 4f(k)$$: $$(4 \\cdot 4^k + 6k - 4) - (4 \\cdot 4^k + 24k - 40) = -18k + 36 = -18(k - 2)$$.\n- Step 4: Therefore $$f(k+1) = 4f(k) - 18(k-2)$$. Both $$4f(k)$$ (since $$18 \\mid f(k)$$) and $$18(k-2)$$ are divisible by 18, so $$f(k+1)$$ is divisible by 18. ✓\n\nTakeaway: the \"$$-18(k-2)$$\" correction term is what makes the engineering work.", "source": "Opus 4 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "When proving \"$$4^n + 6n - 10$$ divisible by 18 for $$n \\geq 1$$\" by induction, what should the base case look like, and what subtle observation about $$n=1$$ is worth noting? (3 steps)", "answer": "- Step 1: Base case $$n = 1$$: $$f(1) = 4 + 6 - 10 = 0$$. Now $$0 = 18 \\times 0$$, so technically $$18 \\mid 0$$ (any nonzero integer divides 0).\n- Step 2: This is mathematically valid but worth noting because students sometimes panic that \"$$f(1) = 0$$\" means the proof breaks. It doesn't — divisibility by any nonzero integer holds for 0.\n- Step 3: If the question specifies $$n \\geq 2$$, also check $$f(2) = 16 + 12 - 10 = 18 = 18 \\times 1$$ — explicit numerical evidence the property holds.\n\nTakeaway: 0 is divisible by everything. Base case still works.", "source": "Opus 4 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "What are the easy method-mark losses in an FP1 induction proof, and how do you defend against each? (3 steps)", "answer": "- Step 1: **Always write each step header explicitly**: \"Step 1 — BASE CASE\", \"Step 2 — INDUCTIVE HYPOTHESIS\", \"Step 3 — INDUCTIVE STEP\", \"Step 4 — CONCLUSION\". Examiners give marks for structure even if algebra fails.\n- Step 2: Common easy-mark losses:\n+ Skipping the base case (especially when \"obvious\")\n+ Forgetting to **state** the hypothesis explicitly (\"assume $$f(k) = 18m$$ for some $$m \\in \\mathbb{Z}$$\")\n+ Not invoking \"by the principle of mathematical induction\" in the conclusion\n+ Failing to specify the domain of $$n$$ (e.g., \"for all $$n \\in \\mathbb{Z}^+$$\")\n- Step 3: A clean conclusion sentence: \"Since the result holds for $$n = 1$$, and the truth at $$n = k$$ implies truth at $$n = k+1$$, by the principle of mathematical induction the result holds for all $$n \\in \\mathbb{Z}^+$$. $$\\blacksquare$$\"\n\nTakeaway: examiners reward structure as much as algebra. Write all four headers, every time.", "source": "Opus 4 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "What is the conjugate-pair rule, and what does it imply for a quartic $$p(x)$$ with real coefficients given that $$z_1 = 2 + 3i$$ is a root? (3 steps)", "answer": "- Step 1: **Conjugate-pair rule**: if $$p(x)$$ has all real coefficients and $$p(z_1) = 0$$ with $$z_1$$ non-real, then $$p(\\bar z_1) = 0$$ also. Proof in one line: $$p(\\bar z) = \\overline{p(z)}$$ for real-coefficient $$p$$, so $$p(z) = 0 \\Rightarrow p(\\bar z) = \\bar 0 = 0$$.\n- Step 2: Therefore $$\\bar z_1 = 2 - 3i$$ is automatically a second root, with no additional work needed.\n- Step 3: With two roots known, the polynomial has a **quadratic factor** $$(x - z_1)(x - \\bar z_1) = x^2 - 4x + 13$$. Polynomial division then yields the remaining quadratic factor and the other two roots.\n\nTakeaway: complex root → free conjugate root → quadratic factor → division → remaining roots.", "source": "Opus 4 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "Plot the four roots $$2 \\pm 3i$$ and $$\\pm \\tfrac{i\\sqrt 6}{2}$$ on an Argand diagram — what symmetries do you observe? (3 steps)", "answer": "- Step 1: Convert to coordinates: $$(2, 3)$$, $$(2, -3)$$, $$(0, \\sqrt{6}/2)$$, $$(0, -\\sqrt{6}/2)$$. The first pair is at $$x = 2$$ (vertical mirror line), the second pair is on the imaginary axis ($$x = 0$$).\n- Step 2: **Conjugate symmetry**: each pair is reflected across the real axis (real coefficients enforce this). $$(2,3) \\leftrightarrow (2,-3)$$ and $$(0, \\sqrt 6/2) \\leftrightarrow (0, -\\sqrt 6/2)$$.\n- Step 3: This vertical mirror symmetry across the real axis is a visual reminder of the conjugate-pair rule. If you ever see roots in a real-coefficient polynomial that aren't symmetric across the real axis, you've made an algebra error.\n\nTakeaway: real coefficients ⇒ Argand diagram has horizontal-axis mirror symmetry.", "source": "Opus 4 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "For an FP1 question that says \"the area scale factor is $$k$$\", what is the step-by-step process for finding the unknown matrix entries? (4 steps)", "answer": "- Step 1: Compute $$\\det(A)$$ symbolically in terms of the unknown.\n- Step 2: Recognize that \"area scale factor $$= k$$\" means $$|\\det A| = k$$, NOT $$\\det A = k$$. (This is the trap.)\n- Step 3: Split into two cases: $$\\det A = +k$$ and $$\\det A = -k$$. Solve each for the unknown — typically gives two values.\n- Step 4: If the question says \"find $$k$$\" or \"find possible values\" with plural, report both. If it says \"find the value\" (singular), additional constraints in the question rule out one branch — read carefully.\n\nTakeaway: $$|\\det| = k \\Rightarrow \\det = \\pm k \\Rightarrow$$ usually two answers. Read the question for \"values\" plural as a hint.", "source": "Opus 4 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "What does the *sign* of $$\\det A$$ tell you geometrically about the linear transformation $$A$$? (3 steps)", "answer": "- Step 1: **Magnitude** $$|\\det A|$$ = the **area scale factor** of the transformation. Areas scale by this factor.\n- Step 2: **Sign** of $$\\det A$$ tells you about **orientation**:\n+ $$\\det A > 0$$: orientation-preserving (rotation, dilation, shear). A counterclockwise loop stays counterclockwise.\n+ $$\\det A < 0$$: orientation-reversing (reflection, or any composition that includes a reflection). A counterclockwise loop becomes clockwise.\n- Step 3: $$\\det A = 0$$: degenerate — the transformation collapses 2D to a lower-dimensional set (line or point), hence area 0. The transformation is not invertible.\n\nTakeaway: $$|\\det|$$ scales area; sign of $$\\det$$ flips orientation.", "source": "Opus 4 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "A complex number is divided by another, $$w = u/z$$. What's the conceptual relationship between $$|w|$$, $$|u|$$, $$|z|$$, and between $$\\arg w$$, $$\\arg u$$, $$\\arg z$$? (3 steps)", "answer": "- Step 1: Using polar form $$z = r e^{i\\theta}$$: division divides moduli and subtracts arguments:\n+ $$|w| = |u|/|z|$$\n+ $$\\arg w = \\arg u - \\arg z$$\n- Step 2: This is why the conjugate trick works for division: multiplying by $$\\bar z/\\bar z$$ gives a real denominator, but the polar relationship is still encoded — $$\\arg w$$ is shifted by $$-\\arg z$$ from $$\\arg u$$.\n- Step 3: Sanity check tool: when computing $$w = u/z$$, you can verify by checking $$|w| \\cdot |z| = |u|$$ at the end. If not, algebra error.\n\nTakeaway: complex division is \"scale by $$1/|z|$$ and rotate by $$-\\arg z$$\".", "source": "Opus 4 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "Explain the structural reason why the **arctan-only** formula $$\\arg(z) = \\arctan(\\text{Im}/\\text{Re})$$ fails for complex numbers in the second and third quadrants. (3 steps)", "answer": "- Step 1: $$\\arctan: \\mathbb{R} \\to (-\\pi/2, \\pi/2)$$ — its output range is only the right half-plane (angles between $$-90°$$ and $$+90°$$).\n- Step 2: But $$\\arg z$$ has range $$(-\\pi, \\pi]$$ — it can be in any quadrant. So $$\\arctan$$ alone is missing half the angular range.\n- Step 3: Specifically, $$\\arctan$$ doesn't see the sign of $$\\text{Re}(z)$$. For $$z_1 = 1+i$$ (Q1) and $$z_2 = -1-i$$ (Q3), both have $$\\tfrac{\\text{Im}}{\\text{Re}} = 1$$, so $$\\arctan$$ gives $$\\pi/4$$ for both. But the actual arguments are $$\\pi/4$$ and $$-3\\pi/4$$ — differing by $$\\pi$$. You must add or subtract $$\\pi$$ depending on the quadrant.\n\nTakeaway: arctan only sees the ratio, not the signs of components. Always sketch first.", "source": "Opus 4 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "What is Vieta's \"roots-product\" trick, and how does it speed up \"line meets curve at second point\" problems? (3 steps)", "answer": "- Step 1: For a quadratic $$ax^2 + bx + c = 0$$ with roots $$r_1, r_2$$: $$r_1 + r_2 = -b/a$$ and $$r_1 r_2 = c/a$$.\n- Step 2: In a \"find where the normal/line meets the curve again\" problem, substituting the line into the curve produces a quadratic. The point $$P$$ already on both line and curve gives one root $$x_P$$; you want the other root $$x_{P'}$$.\n- Step 3: Use $$x_P \\cdot x_{P'} = c/a$$ to find $$x_{P'} = (c/a)/x_P$$ — fast, no factoring needed. Substitute into line equation for $$y_{P'}$$.\n\nExample: line meets $$xy=9$$ giving $$8x^2 - 45x - 18 = 0$$. $$x_P = 6$$, so $$x_{P'} = -18/(8 \\cdot 6) = -3/8$$. Way faster than the quadratic formula.\n\nTakeaway: when one root is \"free\" (the original point), use Vieta's product to grab the other.", "source": "Opus 4 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "State the complete set of formulas to memorize for **rectangular hyperbola** $$xy = c^2$$ that are NOT in the FP1 booklet. (3 steps)", "answer": "- Step 1: **Parametric form**: $$(ct, c/t)$$, $$t \\neq 0$$. Verify by direct substitution.\n- Step 2: **Tangent gradient**: $$\\frac{dy}{dx} = -1/t^2$$ at $$(ct, c/t)$$. Hence **tangent equation**: $$x + t^2 y = 2ct$$.\n- Step 3: **Normal gradient**: $$t^2$$ (negative reciprocal of tangent). Hence **normal equation**: $$t^3 x - ty = c(t^4 - 1)$$.\n\nMemorize all three forms — every rectangular hyperbola question in FP1 reduces to plugging into one of these. NOT in booklet, so they must be at fingertips.\n\nTakeaway: $$(ct, c/t)$$, gradient $$-1/t^2$$, tangent $$x + t^2y = 2ct$$, normal $$t^3 x - ty = c(t^4-1)$$.", "source": "Opus 4 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "State the complete set of formulas to memorize for **parabola** $$y^2 = 4ax$$ that are NOT in the FP1 booklet. (5 steps)", "answer": "- Step 1: **Parametric form**: $$(at^2, 2at)$$. **Focus**: $$(a, 0)$$. **Directrix**: $$x = -a$$.\n- Step 2: **Tangent at parameter $$t$$**: $$ty = x + at^2$$. Tangent gradient is $$1/t$$.\n- Step 3: **Normal at parameter $$t$$**: $$y + tx = 2at + at^3$$. Normal gradient is $$-t$$.\n- Step 4: **Focal chord theorem**: $$t_1 t_2 = -1 \\Leftrightarrow$$ chord through $$(at_1^2, 2at_1)$$ and $$(at_2^2, 2at_2)$$ passes through focus.\n- Step 5: **Directrix-as-polar**: tangents at endpoints of any focal chord meet on the directrix.\n\nMemorize all five — none are in the booklet.\n\nTakeaway: parametric, focus/directrix, tangent, normal, focal chord, directrix-polar. Five facts, all must be at fingertips.", "source": "Opus 4 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "What is the high-level pipeline for proving \"tangents at the endpoints of a focal chord meet on the directrix\" for a specific parabola? (5 steps)", "answer": "- Step 1: Confirm the chord is focal: check $$t_1 t_2 = -1$$ (or substitute the focus into the chord line).\n- Step 2: Write the two tangent equations $$t_1 y = x + at_1^2$$ and $$t_2 y = x + at_2^2$$.\n- Step 3: Solve simultaneously: subtracting gives $$(t_1 - t_2)y = a(t_1^2 - t_2^2) = a(t_1 - t_2)(t_1 + t_2)$$, so $$y = a(t_1 + t_2)$$.\n- Step 4: Substitute back: $$x = t_1 y - at_1^2 = at_1(t_1 + t_2) - at_1^2 = a t_1 t_2$$.\n- Step 5: For a focal chord, $$t_1 t_2 = -1$$, so $$x = -a$$. The intersection point lies on $$x = -a$$, which is the directrix. $$\\blacksquare$$\n\nTakeaway: in general $$R = (at_1 t_2, a(t_1 + t_2))$$; on directrix iff focal chord.", "source": "Opus 4 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "$$f(x) = x^3 - x - 1$$. Show $$f$$ has a root in $$[1, 2]$$ and find the result of one bisection step. (3 steps)", "answer": "- Step 1: $$f(1) = 1 - 1 - 1 = -1 < 0$$; $$f(2) = 8 - 2 - 1 = 5 > 0$$. Sign change.\n- Step 2: $$f$$ is a polynomial, hence continuous on $$[1,2]$$. By IVT, a root exists in $$(1, 2)$$.\n- Step 3: Midpoint $$m = 1.5$$; $$f(1.5) = 3.375 - 1.5 - 1 = 0.875 > 0$$. So $$f(1)$$ and $$f(1.5)$$ have opposite signs. Root lies in $$[1, 1.5]$$.\n\nTakeaway: bisection halves the interval each step; here from width 1 to width 0.5.", "source": "Opus 4 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "Apply one Newton-Raphson step to find a root of $$f(x) = x^2 - 2$$ starting from $$x_0 = 1.5$$ (so finding $$\\sqrt 2$$). (3 steps)", "answer": "- Step 1: $$f'(x) = 2x$$, so $$f'(1.5) = 3$$. $$f(1.5) = 2.25 - 2 = 0.25$$.\n- Step 2: $$x_1 = x_0 - f(x_0)/f'(x_0) = 1.5 - 0.25/3 = 1.5 - 0.0833\\ldots \\approx 1.4167$$.\n- Step 3: Compare to true $$\\sqrt 2 \\approx 1.4142$$ — already accurate to ~3 d.p. NR's quadratic convergence in action: error drops from ~0.086 to ~0.002 in one step.\n\nTakeaway: NR converges quadratically near the root — error squares each step.", "source": "Opus 4 ②", "_id": "opus_2_54", "judge_pick": false}, {"question": "Apply linear interpolation once on $$[1, 2]$$ for $$f(x) = x^3 - x - 1$$ to estimate the root. (3 steps)", "answer": "- Step 1: $$f(1) = -1$$, $$f(2) = 5$$. Use the closed form: $$x_1 = a - \\tfrac{f(a)(b-a)}{f(b) - f(a)}$$.\n- Step 2: $$x_1 = 1 - \\tfrac{(-1)(1)}{5 - (-1)} = 1 - \\tfrac{-1}{6} = 1 + \\tfrac{1}{6} \\approx 1.167$$.\n- Step 3: True root is $$\\approx 1.3247$$, so error $$\\approx 0.16$$. Linear interpolation is faster than bisection (which would give 1.5 with the same info), but here it under-estimates because the function is curved upward (chord lies below curve).\n\nTakeaway: linear interpolation = chord intersect $$x$$-axis. Under/over-estimates depending on concavity.", "source": "Opus 4 ②", "_id": "opus_2_55", "judge_pick": false}, {"question": "Use Vieta's for $$x^2 - 5x + 6 = 0$$ (with roots $$\\alpha, \\beta$$) to compute $$(\\alpha+1)(\\beta+1)$$ without solving. (3 steps)", "answer": "- Step 1: Vieta's: $$\\alpha + \\beta = 5$$, $$\\alpha\\beta = 6$$.\n- Step 2: Expand: $$(\\alpha+1)(\\beta+1) = \\alpha\\beta + \\alpha + \\beta + 1$$.\n- Step 3: Substitute: $$6 + 5 + 1 = 12$$. Sanity check: $$\\alpha = 2, \\beta = 3$$, so $$(3)(4) = 12$$ ✓.\n\nTakeaway: any symmetric expression in $$\\alpha, \\beta$$ reduces to functions of sum and product.", "source": "Opus 4 ②", "_id": "opus_2_56", "judge_pick": false}, {"question": "$$A = \\begin{pmatrix} 2 & 1 \\\\ 3 & k \\end{pmatrix}$$ has area scale factor 4. Find possible $$k$$. (3 steps)", "answer": "- Step 1: $$\\det A = 2k - 3$$, so $$|\\det A| = 4$$ means $$2k - 3 = \\pm 4$$.\n- Step 2: Case $$+4$$: $$2k = 7 \\Rightarrow k = 7/2$$. Case $$-4$$: $$2k = -1 \\Rightarrow k = -1/2$$.\n- Step 3: Both values are valid (each gives a different transformation, one orientation-preservin
