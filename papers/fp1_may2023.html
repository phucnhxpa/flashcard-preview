<script>
const DATA={"selected": [{"question": "After splitting a sum like $$\\sum_{r=1}^n (r^3 + 4r^2 + 4r)$$ into three standard-result terms, why is it critical to factor out a common expression BEFORE simplifying the bracket, rather than expanding everything first? (3 steps)", "answer": "- Step 1: When you apply the three standard results, you get $$\\tfrac{1}{4}n^2(n+1)^2 + 4 \\cdot \\tfrac{1}{6}n(n+1)(2n+1) + 4 \\cdot \\tfrac{1}{2}n(n+1)$$. Each term has different denominators (4, 6, 2) and different polynomial structures.\n- Step 2: The \"factor-early\" strategy: bring to a common denominator of 12 first, then immediately pull out the shared factor $$\\tfrac{1}{12}n(n+1)$$:\n+ $$\\tfrac{3}{12}n^2(n+1)^2 + \\tfrac{8}{12}n(n+1)(2n+1) + \\tfrac{24}{12}n(n+1)$$\n+ $$= \\tfrac{1}{12}n(n+1)\\big[3n(n+1) + 8(2n+1) + 24\\big]$$\n- Step 3: If you expand everything first, you get a degree-4 polynomial with large coefficients that you'd then need to factor back into the required form — which is far more error-prone and time-consuming. Factoring early keeps the bracket small and the algebra manageable.\n\nTakeaway: Always look for the greatest common factor across all terms and pull it out before simplifying the remaining bracket.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "Why must a real-coefficient polynomial with a complex root also have the complex conjugate as a root? What would go wrong if it didn't? (2 steps)", "answer": "- Step 1: Consider a polynomial $$p(z) = a_n z^n + \\cdots + a_1 z + a_0$$ with all real coefficients. If $$z_1$$ is a root, then $$p(z_1) = 0$$. Taking the complex conjugate of both sides: $$\\overline{p(z_1)} = \\overline{0} = 0$$.\n- Step 2: Since the coefficients are real, $$\\overline{p(z_1)} = a_n \\bar{z_1}^n + \\cdots + a_1 \\bar{z_1} + a_0 = p(\\bar{z_1})$$. So $$p(\\bar{z_1}) = 0$$, meaning $$\\bar{z_1}$$ is also a root. If this didn't hold, it would mean the coefficients couldn't all be real — complex roots of real polynomials must come in conjugate pairs to keep the polynomial's coefficients real.\n\nTakeaway: The conjugate-pair rule is a consequence of the real coefficients, not an arbitrary convention.", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "When performing polynomial long division (e.g., dividing $$2x^4 - 8x^3 + 29x^2 - 12x + 39$$ by $$x^2 - 4x + 13$$), where do most sign errors creep in, and how do you guard against them? (2 steps)", "answer": "- Step 1: The danger zone is the **subtraction step**. After multiplying the divisor by your current quotient term, you must subtract the result from the current remainder. For example, if the remainder starts with $$2x^4 - 8x^3$$ and you subtract $$2x^4 - 8x^3 + 26x^2$$, the new remainder is $$(2x^4 - 8x^3 + 29x^2) - (2x^4 - 8x^3 + 26x^2) = 3x^2$$. The sign flip on $$26x^2$$ is where errors happen — students write $$+26x^2$$ instead of $$-26x^2$$.\n- Step 2: Guard by explicitly writing the subtraction: change every sign of the subtrahend, then add. Also verify the final answer by multiplying back: $$(x^2 - 4x + 13)(2x^2 + 3)$$ should recover the original quartic. If it doesn't, the division went wrong.\n\nTakeaway: In polynomial long division, the subtraction step is the #1 error source — flip all signs deliberately.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "When a normal to the rectangular hyperbola at point $$P$$ \"meets $$H$$ again\" at point $$Q$$, why does substituting the line equation into $$xy = c^2$$ give a quadratic with $$P$$'s x-coordinate as one root? How can you exploit this? (3 steps)", "answer": "- Step 1: The normal line and the hyperbola are both curves. Their intersection points satisfy both equations simultaneously. Substituting the linear equation into $$xy = c^2$$ produces a quadratic in $$x$$ (or $$y$$).\n- Step 2: Since $$P$$ lies on both the normal and the hyperbola, $$P$$ is one intersection point — so $$x_P$$ is one root of the quadratic. The \"other\" intersection is what the question asks for.\n- Step 3: Exploit this with Vieta's formulas. If the quadratic is $$ax^2 + bx + c = 0$$ with roots $$\\alpha$$ (known, = $$x_P$$) and $$\\beta$$ (unknown), then $$\\alpha\\beta = c/a$$, so $$\\beta = c/(a\\alpha)$$. This is much faster than solving the full quadratic — you only need the product of roots.\n\nTakeaway: In \"meets again\" questions, one root is always the original point — use Vieta's product rule to find the other root instantly.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "Derive the identity $$\\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta$$ from scratch. Why is this more useful than trying to find $$\\alpha$$ and $$\\beta$$ individually? (2 steps)", "answer": "- Step 1: Start with $$(\\alpha + \\beta)^2 = \\alpha^2 + 2\\alpha\\beta + \\beta^2$$. Rearranging: $$\\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta$$. This is just algebraic rearrangement of the binomial expansion.\n- Step 2: This is powerful because you can compute $$\\alpha^2 + \\beta^2$$ knowing only the sum and product — without ever finding $$\\alpha$$ and $$\\beta$$ individually. For $$\\alpha + \\beta = 6$$ and $$\\alpha\\beta = 3$$: $$\\alpha^2 + \\beta^2 = 36 - 6 = 30$$. If you tried to find the actual roots ($$\\alpha, \\beta = 3 \\pm \\sqrt{6}$$) and square them, you'd get the same answer but with far more work and more room for error.\n\nTakeaway: Symmetric identities let you evaluate expressions in $$\\alpha, \\beta$$ without solving the quadratic — this is the whole point of the FP1 roots-of-polynomials topic.", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "Evaluate $$(\\alpha^2 + 1)(\\beta^2 + 1)$$ in terms of $$\\alpha + \\beta$$ and $$\\alpha\\beta$$. What identity makes this expand cleanly? (3 steps)", "answer": "- Step 1: Expand: $$(\\alpha^2 + 1)(\\beta^2 + 1) = \\alpha^2\\beta^2 + \\alpha^2 + \\beta^2 + 1 = (\\alpha\\beta)^2 + (\\alpha^2 + \\beta^2) + 1$$.\n- Step 2: Substitute the symmetric identities: $$(\\alpha\\beta)^2 + [(\\alpha + \\beta)^2 - 2\\alpha\\beta] + 1$$. With $$\\alpha + \\beta = 6$$ and $$\\alpha\\beta = 3$$: $$9 + (36 - 6) + 1 = 9 + 30 + 1 = 40$$.\n- Step 3: The key insight is that $$(\\alpha^2 + 1)(\\beta^2 + 1)$$ decomposes into three terms, each expressible via $$\\alpha + \\beta$$ and $$\\alpha\\beta$$ alone. No need to find individual roots. The expansion follows the pattern $$(A + 1)(B + 1) = AB + A + B + 1$$ where $$A = \\alpha^2$$ and $$B = \\beta^2$$.\n\nTakeaway: $$(\\alpha^2 + 1)(\\beta^2 + 1) = (\\alpha\\beta)^2 + (\\alpha^2 + \\beta^2) + 1$$ — all three pieces are symmetric functions of the roots.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "Which three standard summation results do you need for FP1 series questions, and which one is NOT in the formula booklet (so you must memorize it)?", "answer": "The three standard results are:\n\n1. $$\\sum_{r=1}^n r = \\tfrac{1}{2}n(n+1)$$ — **NOT in the formula booklet. You must memorize this.**\n2. $$\\sum_{r=1}^n r^2 = \\tfrac{1}{6}n(n+1)(2n+1)$$ — IN the formula booklet (know where to look).\n3. $$\\sum_{r=1}^n r^3 = \\tfrac{1}{4}n^2(n+1)^2$$ — IN the formula booklet (know where to look).\n\nThe most common trap: students reach for the booklet for $$\\sum r$$ and can't find it. It's the simplest formula but the one you're most likely to forget because it's not printed anywhere official. Commit $$\\tfrac{1}{2}n(n+1)$$ to memory — it's also the foundation for the other two (notice how $$\\sum r^2$$ and $$\\sum r^3$$ both contain $$n(n+1)$$ as a factor).", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "What is the 2×2 inverse formula, and what is the most reliable way to remember the \"swap-and-negate\" pattern for the matrix entries? (2 steps)", "answer": "- Step 1: For $$M = \\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$$ with $$\\det M = ad - bc \\ne 0$$:\n$$M^{-1} = \\frac{1}{ad - bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$$\n\n- Step 2: The \"swap-and-negate\" pattern:\n+ **Swap** the diagonal entries: $$a$$ and $$d$$ swap places — $$d$$ goes top-left, $$a$$ goes bottom-right.\n+ **Negate** the off-diagonal entries: $$b$$ becomes $$-b$$, $$c$$ becomes $$-c$$ — they stay in their positions but flip sign.\n+ **Divide** everything by the determinant $$ad - bc$$.\n\nMemory trick: \"diagonal swap, off-diagonal negate, divide by determinant.\" The order matters — if you negate the diagonal instead of swapping, you get the wrong matrix. Verify: $$MM^{-1} = \\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix} \\cdot \\frac{1}{\\det}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix} = \\frac{1}{\\det}\\begin{pmatrix} ad-bc & 0 \\\\ 0 & ad-bc \\end{pmatrix} = I$$ ✓.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "What is the \"factor trick\" for simplifying $$\\alpha\\beta^2 + \\beta\\alpha^2$$, and why is it the key to solving the transformed-roots sum in part (b) of the polynomial roots question? (3 steps)", "answer": "- Step 1: The factor trick:\n$$\\alpha\\beta^2 + \\beta\\alpha^2 = \\alpha\\beta(\\alpha + \\beta)$$\nFactor out $$\\alpha\\beta$$ from both terms: $$\\alpha\\beta \\cdot \\beta + \\alpha\\beta \\cdot \\alpha = \\alpha\\beta(\\alpha + \\beta)$$.\n\n- Step 2: In the transformed-roots sum, the numerator is:\n$$\\alpha(\\beta^2 + 1) + \\beta(\\alpha^2 + 1) = \\alpha\\beta^2 + \\alpha + \\beta\\alpha^2 + \\beta = \\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta)$$\n\n- Step 3: Factor out $$\\left(\\alpha + \\beta\\right)$$:\n$$= (\\alpha + \\beta)(\\alpha\\beta + 1) = 6 \\cdot (3 + 1) = 6 \\cdot 4 = 24$$\n\nThis was the exact sticking point in the May 2023 revision — the student didn't see how to factor the numerator. The trick: don't expand and collect terms brute-force. Instead, recognize that $$\\alpha\\beta^2 + \\beta\\alpha^2$$ factors as $$\\alpha\\beta(\\alpha+\\beta)$$, and then $$\\alpha + \\beta$$ is a common factor of the entire numerator.\n\nThe general principle: when summing fractions with $$\\alpha^2$$ and $$\\beta^2$$ symmetrically, always look for common factors involving $$\\alpha + \\beta$$ and $$\\alpha\\beta$$ first.", "source": "GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "What are the four required steps of a mathematical induction proof for divisibility, and what must each step contain for full marks? (4 steps)", "answer": "- Step 1: **BASE CASE** — Show the statement is true for the smallest value of $$n$$ (usually $$n = 1$$, or $$n = n_0$$ if specified). Must include an explicit calculation showing divisibility. For \"divisible by 18\": write the result as $$18 \\times (\\text{integer})$$.\n\n- Step 2: **ASSUMPTION** — State clearly: \"Assume true for $$n = k$$\", i.e., $$f(k) = 18m$$ for some integer $$m$$. This is the inductive hypothesis — you're assuming what you want to prove, for a specific but arbitrary $$k$$.\n\n- Step 3: **INDUCTIVE STEP** — Show that if the statement holds for $$n = k$$, it also holds for $$n = k+1$$. This is where the actual algebra happens. Must use the assumption from Step 2 explicitly.\n\n- Step 4: **CONCLUSION** — State: \"True for $$n = 1$$ [or $$n_0$$]. If true for $$n = k$$, then true for $$n = k+1$$. By the **principle of mathematical induction**, the statement is true for all $$n \\in \\mathbb{Z}^+$$ [or $$n \\ge n_0$$].\"\n\nExaminers give method marks for the structure — even if your algebra in Step 3 is incomplete, stating all four steps correctly can salvage partial credit. Never skip the conclusion sentence.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "In divisibility induction, what is the \"engineered-form\" approach, and how does it differ from the \"difference approach\"? Which was more effective for the May 2023 question? (3 steps)", "answer": "- Step 1: **Difference approach**: compute $$f(k+1) - f(k)$$ and try to show this difference is divisible by the target number. If $$f(k+1) - f(k) = 18r$$ and $$f(k) = 18m$$, then $$f(k+1) = 18(m + r)$$ ✓. This works when the difference simplifies cleanly.\n\n- Step 2: **Engineered-form approach**: write $$f(k+1)$$ directly as a multiple of $$f(k)$$ plus a known multiple of the target divisor:\n$$f(k+1) = c \\cdot f(k) + d \\cdot (\\text{integer})$$\nFor the May 2023 question: $$f(k+1) = 4f(k) - 18(k-2)$$, where $$c = 4$$ and the remainder $$-18(k-2)$$ is clearly divisible by 18.\n\n- Step 3: Which was more effective: the **engineered-form** approach. The difference $$f(k+1) - f(k) = 3 \\cdot 4^k + 6 = 3(4^k + 2)$$ requires a sub-claim that $$4^k + 2$$ is divisible by 6 (proved via modular arithmetic). The engineered form avoids this sub-claim entirely — you just express $$f(k+1)$$ in terms of $$f(k)$$ and a clean multiple of 18.\n\nThe engineered-form trick: add and subtract terms to build $$f(k)$$ inside the expression for $$f(k+1)$$, then factor out what remains as a multiple of the divisor.", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "What is the sub-claim approach for the difference method, and how does modular arithmetic prove that $$4^k + 2$$ is divisible by 6 for all $$k \\ge 1$$? (2 steps)", "answer": "- Step 1: The difference method gives $$f(k+1) - f(k) = 3(4^k + 2)$$. For this to be divisible by 18, we need $$4^k + 2$$ divisible by 6 (since $$3 \\times 6 = 18$$). This is the **sub-claim**: $$6 \\mid (4^k + 2)$$ for all $$k \\ge 1$$.\n\n- Step 2: Proof via modular arithmetic: compute $$4^k \\pmod{6}$$.\n+ $$4^1 = 4 \\pmod{6}$$\n+ $$4^2 = 16 = 4 \\pmod{6}$$ (since $$16 - 12 = 4$$)\n+ $$4^3 = 64 = 4 \\pmod{6}$$ (since $$64 - 60 = 4$$", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "When expanding $r(r+2)^2$ inside a summation, what is the correct expansion, and what is a common mis-reading that leads to a completely different result? (2 steps)", "answer": "- Step 1: The correct expansion is $$r(r+2)^2 = r(r^2 + 4r + 4) = r^3 + 4r^2 + 4r$$. You must distribute the outer square first: $(r+2)^2 = r^2 + 4r + 4$, then multiply by $r$.\n- Step 2: A common mis-reading is confusing $r(r+2)^2$ with $r^2(r+2) = r^3 + 2r^2$. These are entirely different expressions — the former has three terms, the latter only two. On exam day, always write out the expansion in full before summing. A quick sanity check: for $r=1$, $r(r+2)^2 = 1 \\cdot 9 = 9$, but $r^2(r+2) = 1 \\cdot 3 = 3$.\n\nThe mis-reading error propagates through every subsequent step, producing wrong coefficients $a, b, c$.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "Given a complex root $z_1$, how do you directly write down the quadratic factor $(z - z_1)(z - \\bar{z_1})$ in terms of $\\text{Re}(z_1)$ and $|z_1|$? Derive this. (3 steps)", "answer": "- Step 1: Expand the product: $$(z - z_1)(z - \\bar{z_1}) = z^2 - (z_1 + \\bar{z_1})z + z_1 \\bar{z_1}$$.\n- Step 2: Recognize that $z_1 + \\bar{z_1} = 2\\,\\text{Re}(z_1)$ (the imaginary parts cancel) and $z_1 \\bar{z_1} = |z_1|^2$ (a complex number times its conjugate equals the square of its modulus).\n- Step 3: Therefore $$(z - z_1)(z - \\bar{z_1}) = z^2 - 2\\,\\text{Re}(z_1)\\,z + |z_1|^2$$. For $z_1 = 2+3i$: $\\text{Re}(z_1) = 2$, $|z_1|^2 = 4+9 = 13$, giving $z^2 - 4z + 13$. This formula is NOT in the booklet — memorize it.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "What are Vieta's formulas for a quadratic $ax^2 + bx + c = 0$ with roots $\\alpha$ and $\\beta$, and where can you find them in the exam? (2 steps)", "answer": "- Step 1: Vieta's formulas: $$\\alpha + \\beta = -\\frac{b}{a}, \\qquad \\alpha\\beta = \\frac{c}{a}$$. These ARE in the formula booklet under \"Roots of equations\" — know where to look, don't waste time deriving.\n- Step 2: The key insight is that you can find the sum and product of roots WITHOUT solving the equation. For $x^2 - 6x + 3 = 0$: $\\alpha + \\beta = 6$, $\\alpha\\beta = 3$. These two values are your \"building blocks\" for every subsequent part of a roots question.", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "For the parabola $y^2 = 4ax$, what are the parametric coordinates, focus, and directrix? Derive the focus and directrix from the definition. (3 steps)", "answer": "- Step 1: Parametric form: $(at^2, 2at)$ for parameter $t$. Substituting: $y^2 = (2at)^2 = 4a^2t^2 = 4a(at^2) = 4ax$. ✓. This is NOT in the booklet — memorize it.\n- Step 2: Focus $S = (a, 0)$. This comes from the definition of a parabola: the locus of points equidistant from the focus and the directrix. For $y^2 = 4ax$, the focus is at $(a, 0)$.\n- Step 3: Directrix: $x = -a$. By definition, for any point $P$ on the parabola, the distance to the focus equals the distance to the directrix. For $P(at^2, 2at)$: distance to focus $= \\sqrt{(at^2-a)^2 + 4a^2t^2} = a(t^2+1)$; distance to directrix $= at^2 - (-a) = a(t^2+1)$. ✓. For $y^2 = 8x$: $4a = 8$, so $a = 2$, focus $(2,0)$, directrix $x = -2$.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "State the focal chord theorem for the parabola $y^2 = 4ax$: what condition on the parameters $t_1, t_2$ guarantees that the chord joining two points passes through the focus? (2 steps)", "answer": "- Step 1: If two points $P(at_1^2, 2at_1)$ and $Q(at_2^2, 2at_2)$ lie on $y^2 = 4ax$, then the chord $PQ$ passes through the focus $(a, 0)$ if and only if $$t_1 t_2 = -1$$.\n- Step 2: This is a powerful shortcut. In the May 2023 paper, $P$ has parameter $p$ and $Q$ has parameter $-1/p$, so $t_1 t_2 = p \\cdot (-1/p) = -1$. ✓. The chord automatically passes through the focus — no need to compute the chord equation and verify. This theorem is NOT in the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "What is the directrix-as-polar theorem for parabolas, and how does it manifest in the May 2023 Q8? (2 steps)", "answer": "- Step 1: The theorem states: **the tangents at the endpoints of any focal chord of a parabola meet on the directrix**. This is a general result — not just for specific parameter values.\n- Step 2: In Q8, the chord $PQ$ is a focal chord (since $t_1 t_2 = -1$). The tangent at $P$ and the tangent at $Q$ meet at $R$. Computing algebraically gives $R = (-2, 2p - 2/p)$, where $x = -2$ is exactly the directrix $x = -a = -2$. The $y$-coordinate varies with $p$, but the $x$-coordinate is always $-a$. Knowing this theorem lets you predict the answer before doing any algebra.", "source": "GLM 5.1 ③", "_id": "glm_3_32"}, {"question": "What is the equation of the normal to $y^2 = 4ax$ at the parametric point $(at^2, 2at)$? (2 steps)", "answer": "- Step 1: The tangent gradient at $(at^2, 2at)$ is $1/t$, so the normal gradient is $-t$. The normal passes through $(at^2, 2at)$: $$y - 2at = -t(x - at^2)$$.\n- Step 2: Expanding: $y - 2at = -tx + at^3$, giving $$y + tx = 2at + at^3$$. This is the standard normal form for the parabola — memorize it. It is NOT in the booklet.", "source": "GLM 5.1 ③", "_id": "glm_3_40"}, {"question": "What does the sign of the determinant of a $2 \\times 2$ transformation matrix tell you about the transformation's effect? (2 steps)", "answer": "- Step 1: A **positive** determinant means the transformation preserves orientation — clockwise shapes remain clockwise, and the order of vertices is maintained. This includes rotations, enlargements, and shears.\n- Step 2: A **negative** determinant means the transformation reverses orientation — clockwise becomes counterclockwise, like a reflection. Both positive and negative determinants can produce the same area scale factor (since area = $|\\det|$), which is why \"possible values\" questions always have two answers.", "source": "GLM 5.1 ③", "_id": "glm_3_45"}, {"question": "Conceptual exercise: If $\\alpha + \\beta = 5$ and $\\alpha\\beta = 6$, what is the value of $\\alpha^2 + \\beta^2$ and $(\\alpha^2+1)(\\beta^2+1)$? (2 steps)", "answer": "- Step 1: $\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta = 25 - 12 = 13$.\n- Step 2: $(\\alpha^2+1)(\\beta^2+1) = (\\alpha\\beta)^2 + (\\alpha^2+\\beta^2) + 1 = 36 + 13 + 1 = 50$. Every step uses only $\\alpha+\\beta$ and $\\alpha\\beta$ — you never need to find $\\alpha$ and $\\beta$ individually.", "source": "GLM 5.1 ③", "_id": "glm_3_48"}, {"question": "What is the tangent equation for the rectangular hyperbola $xy = c^2$ at the point $(ct, c/t)$, and how does its form compare to the parabola tangent? (2 steps)", "answer": "- Step 1: For the rectangular hyperbola, the tangent at $(ct, c/t)$ is: $$x + t^2 y = 2ct$$. The gradient is $-1/t^2$ (negative, reflecting the hyperbola's decreasing branches for $t > 0$).\n- Step 2: Compare with the parabola tangent at $(at^2, 2at)$: $ty = x + at^2$, gradient $1/t$ (positive for $t > 0$). Note the structural differences: for the hyperbola, $t^2$ multiplies $y$; for the parabola, $t$ multiplies $y$. Don't confuse them — they come from different curves with different geometries.", "source": "GLM 5.1 ③", "_id": "glm_3_52"}, {"question": "Conceptual exercise: A matrix $M$ transforms a shape, and $\\det M = 4$. If the same transformation is applied twice (i.e., $M^2$), what is the area scale factor of the combined transformation? (2 steps)", "answer": "- Step 1: The area scale factor of $M$ is $|\\det M| = 4$. The area scale factor of $M^2$ is $|\\det(M^2)|$.\n- Step 2: By the multiplicative property of determinants, $\\det(M^2) = (\\det M)^2 = 16$. So the area scale factor of applying $M$ twice is $|16| = 16$. Each application multiplies the area by 4, so two applications multiply by $4 \\times 4 = 16$.", "source": "GLM 5.1 ③", "_id": "glm_3_57"}, {"question": "What is the key exam strategy for questions that you haven't studied the topic for (like Q3 and Q8 in this paper)? (2 steps)", "answer": "- Step 1: Skip them initially and do the rest of the paper first. Budget a fixed time (10–15 minutes) at the end to attempt them. Don't sink 25+ minutes into a question whose algebra is foreign — that time is better spent checking other answers.\n- Step 2: For partial marks: part (a) of these questions is often just a substitution/verification worth 1–2 marks, which you can attempt even without knowing the full theory. Part (b) usually requires the core method (tangent/normal equation). Part (c) is typically the hardest algebra. Attempt what you can and move on.", "source": "GLM 5.1 ③", "_id": "glm_3_59"}, {"question": "Why is it $|z_1|^2 = 4 + 9 = 13$ and not $4 - 9 = -5$ when computing $|z_1|^2$ for $z_1 = 2 + 3i$? (1 step)", "answer": "The modulus squared is $|z_1|^2 = (\\text{Re})^2 + (\\text{Im})^2$ — it is always a SUM of squares, never a difference. For $z_1 = 2+3i$: $|z_1|^2 = 2^2 + 3^2 = 4 + 9 = 13$. The confusion arises because the conjugate $\\bar{z_1} = 2-3i$ has a minus sign, but when you multiply $z_1 \\bar{z_1} = (2+3i)(2-3i) = 4 - 9i^2 = 4 + 9 = 13$, the $i^2 = -1$ flips the sign back. Always use sum of squares.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "In part (b) of Q5, the new roots are $\\frac{\\alpha}{\\alpha^2+1}$ and $\\frac{\\beta}{\\beta^2+1}$. Why is the product $P = \\frac{\\alpha\\beta}{(\\alpha^2+1)(\\beta^2+1)}$ particularly easy to compute? (2 steps)", "answer": "- Step 1: The product of fractions: $\\frac{\\alpha}{\\alpha^2+1} \\times \\frac{\\beta}{\\beta^2+1} = \\frac{\\alpha\\beta}{(\\alpha^2+1)(\\beta^2+1)}$. The denominator is exactly what you computed in part (a).\n- Step 2: This is a deliberate exam design: part (a) asks for $(\\alpha^2+1)(\\beta^2+1) = 40$ so that part (b) can reuse it. The product becomes $P = 3/40$. Always look for connections between parts — the examiners build them in, and using them saves time and reduces errors.", "source": "GLM 5.1 ③", "_id": "glm_3_63"}, {"question": "Why is it important to explicitly state \"$f$ is continuous\" when using the sign-change rule to locate a root? (2 steps)", "answer": "- Step 1: The Intermediate Value Theorem requires continuity as a hypothesis. Without it, a sign change does not guarantee a root — the function could have a jump discontinuity that skips over zero.\n- Step 2: For example, $f(x) = 1/x$ on $[-1, 1]$: $f(-1) = -1 < 0$ and $f(1) = 1 > 0$, but there's no root — $f$ has a vertical asymptote at $x = 0$ and is not continuous. In FP1, the functions given (polynomials, $x^{3/2} + x - 3$, etc.) are always continuous on the given intervals, but you must state it to earn the method mark.", "source": "GLM 5.1 ③", "_id": "glm_3_72"}, {"question": "What is the identity for $(\\alpha - \\beta)^2$ in terms of $\\alpha + \\beta$ and $\\alpha\\beta$, and what does it tell you about the roots? (2 steps)", "answer": "- Step 1: $$(\\alpha - \\beta)^2 = (\\alpha + \\beta)^2 - 4\\alpha\\beta$$. Derivation: $(\\alpha - \\beta)^2 = \\alpha^2 - 2\\alpha\\beta + \\beta^2 = (\\alpha^2 + \\beta^2) - 2\\alpha\\beta = [(\\alpha+\\beta)^2 - 2\\alpha\\beta] - 2\\alpha\\beta = (\\alpha+\\beta)^2 - 4\\alpha\\beta$.\n- Step 2: This tells you the squared distance between the roots. If $(\\alpha+\\beta)^2 = 4\\alpha\\beta$, then $(\\alpha-\\beta)^2 = 0$ and the roots are equal (repeated root). If $(\\alpha+\\beta)^2 > 4\\alpha\\beta$, the roots are real and distinct. If $(\\alpha+\\beta)^2 < 4\\alpha\\beta$, the roots are complex. This is equivalent to the discriminant condition $b^2 - 4ac$.", "source": "GLM 5.1 ③", "_id": "glm_3_78"}, {"question": "For $f(x) = x^{3/2} + x - 3$, show there is a root in the interval [1, 2]. What condition must be satisfied? (1 step)", "answer": "- Step 1: Evaluate: $f(1) = 1 + 1 - 3 = -1 < 0$; $f(2) = 2^{3/2} + 2 - 3 = 2\\sqrt{2} - 1 \\approx 1.828 > 0$. Since $f$ is continuous on [1, 2] and changes sign, a root exists in (1, 2) by the Intermediate Value Theorem.", "source": "MiniMax ①", "_id": "minimax_1_29"}, {"question": "For the parabola $y^2 = 4ax$, what is the equation of the tangent at the parametric point $(at^2, 2at)$? How do you derive this? (3 steps)", "answer": "- Step 1: The tangent at $(at^2, 2at)$ is $ty = x + at^2$.\n- Derivation: Differentiate implicitly: $2y\\frac{dy}{dx} = 4a$, so $\\frac{dy}{dx} = \\frac{2a}{y}$. At $(at^2, 2at)$, this gives gradient $m = \\frac{2a}{2at} = \\frac{1}{t}$.\n- Using point-slope form: $y - 2at = \\frac{1}{t}(x - at^2)$, which rearranges to $ty - 2at^2 = x - at^2$, so $ty = x + at^2$.\n- This is NOT in the formula booklet — memorize it.", "source": "MiniMax ②", "_id": "minimax_2_15"}, {"question": "In Q4 part (ii), we solved $BC = D$ by computing $C = B^{-1}D$. If instead the equation was $CB = D$, how would you solve for $C$ and why? (2 steps)", "answer": "- Step 1: If $CB = D$, we would post-multiply by $B^{-1}$: $CBB^{-1} = DB^{-1}$, giving $C = DB^{-1}$.\n- Step 2: The key is: to isolate $C$ in $BC = D$, we pre-multiply by $B^{-1}$ (multiply on the left); to isolate $C$ in $CB = D$, we post-multiply by $B^{-1}$ (multiply on the right).\n- Matrix multiplication order matters: $B^{-1}BC \\neq CBB^{-1}$ in general.", "source": "MiniMax ②", "_id": "minimax_2_26"}, {"question": "In multiple questions across this paper, we used Vieta's formulas (sum and product of roots). Why are these formulas preferred over solving the quadratic explicitly? (2 steps)", "answer": "- Step 1: Vieta's formulas work directly with the coefficients without requiring the quadratic formula or numerical approximation. This is essential when roots are irrational or complex.\n- Step 2: Many problems (like transformed roots) require manipulating sums and products symbolically. Solving explicitly would give messy expressions that are hard to manipulate. For $x^2 - 6x + 3 = 0$, solving gives $\\alpha, \\beta = 3 \\pm \\sqrt{6}$, but using Vieta lets us find $(\\alpha^2+1)(\\beta^2+1) = 40$ in one line.", "source": "MiniMax ②", "_id": "minimax_2_28"}, {"question": "Why does memorizing the formula for tangent/normal on $$xy = c^2$$ matter, even if you can derive it?", "answer": "Time. On a 90-minute paper with 9 questions, the rectangular hyperbola question typically appears as 7-13 marks. Deriving from scratch (implicit differentiation → gradient → point-slope → simplify) takes 4-5 minutes; quoting a memorized form takes 30 seconds. The standard forms to memorize:\n- Tangent at $$(ct, c/t)$$: $$x + t^2 y = 2ct$$\n- Normal at $$(ct, c/t)$$: $$t^3 x - ty = c(t^4 - 1)$$\n\nThese are NOT in the formula booklet.", "source": "Opus 4 ①", "_id": "opus_1_17"}, {"question": "What's the verification trick after computing a \"second intersection\" point like $$R = (-3/8, -24)$$ on $$xy = 9$$?", "answer": "Plug back into the curve equation. Compute $$x_R \\cdot y_R = (-3/8)(-24) = 9$$ ✓. If the product doesn't equal $$c^2$$, your point doesn't lie on the hyperbola — you've made an algebra mistake. This 5-second check catches sign errors and arithmetic slips before they cost marks.", "source": "Opus 4 ①", "_id": "opus_1_18"}, {"question": "Why does the rectangular hyperbola $$xy = c^2$$ have the $$x$$- and $$y$$-axes as asymptotes, and how does this constrain the parametric form? (3 steps)", "answer": "- Step 1: As $$x \\to 0^+$$, $$y = c^2/x \\to +\\infty$$ — the curve hugs the positive $$y$$-axis. As $$x \\to \\infty$$, $$y \\to 0$$ — curve hugs the positive $$x$$-axis. So both axes are asymptotes.\n- Step 2: This means the curve never crosses either axis; in particular, $$x = 0$$ and $$y = 0$$ are forbidden.\n- Step 3: Parametric form $$(ct, c/t)$$ enforces this: $$t = 0$$ would give $$y = c/0$$, undefined. The curve has two branches: $$t > 0$$ traces upper-right; $$t < 0$$ traces lower-left.\n\nThis is why the parameter constraint is always written $$t \\ne 0$$.", "source": "Opus 4 ①", "_id": "opus_1_19"}, {"question": "Given new roots have sum $$S$$ and product $$P$$, write down the quadratic equation they satisfy. (2 steps)", "answer": "- Step 1: A monic quadratic with roots $$\\alpha', \\beta'$$ is $$x^2 - (\\alpha' + \\beta')x + \\alpha'\\beta' = 0$$, i.e. $$x^2 - Sx + P = 0$$.\n- Step 2: To get integer coefficients, multiply through by the LCD of $$S$$ and $$P$$.\n\nWhy: by Vieta's reverse direction, if $$\\alpha' + \\beta' = S$$ and $$\\alpha'\\beta' = P$$, then both roots are zeros of $$x^2 - Sx + P$$. The minus sign on $$S$$ is critical — it's $$-S$$, not $$+S$$.", "source": "Opus 4 ①", "_id": "opus_1_31"}, {"question": "Compute $$|z_1 + z_2|$$ where $$z_1 = 3 + 2i$$, $$z_2 = 2 + 3i$$. Why isn't this just $$|z_1| + |z_2|$$? (2 steps)", "answer": "- Step 1: Add first: $$z_1 + z_2 = 5 + 5i$$. Then $$|5 + 5i| = \\sqrt{25 + 25} = 5\\sqrt{2}$$.\n- Step 2: This is NOT equal to $$|z_1| + |z_2| = \\sqrt{13} + \\sqrt{13} = 2\\sqrt{13}$$ in general. The triangle inequality gives $$|z_1 + z_2| \\le |z_1| + |z_2|$$ with equality only when $$z_1, z_2$$ are parallel (same argument).\n\nGeometrically: $$|z_1 + z_2|$$ is the diagonal of the parallelogram with sides $$z_1, z_2$$; equality holds only when the parallelogram collapses to a line.", "source": "Opus 4 ①", "_id": "opus_1_34"}, {"question": "Why is the simple formula $$\\arg(z) = \\arctan(y/x)$$ insufficient for arbitrary complex numbers, and how do quadrant rules fix it? (4 steps)", "answer": "- Step 1: $$\\arctan$$ has range $$(-\\pi/2, \\pi/2)$$, but $$\\arg z$$ has range $$(-\\pi, \\pi]$$. So $$\\arctan(y/x)$$ alone covers only the right half-plane.\n- Step 2: For points in Q2 and Q3 (where $$x < 0$$), $$\\arctan(y/x)$$ gives the wrong angle — it returns the reference angle, not the actual argument.\n- Step 3: Quadrant rules:\n+ Q1 ($$x>0, y>0$$): $$\\arg z = \\arctan(y/x)$$\n+ Q2 ($$x<0, y>0$$): $$\\arg z = \\pi - \\arctan(|y/x|)$$\n+ Q3 ($$x<0, y<0$$): $$\\arg z = -\\pi + \\arctan(|y/x|)$$\n+ Q4 ($$x>0, y<0$$): $$\\arg z = -\\arctan(|y/x|)$$\n- Step 4: Always sketch the point first to determine the quadrant, then apply the correct formula.", "source": "Opus 4 ①", "_id": "opus_1_37"}, {"question": "What is $$|z|^2$$ in terms of $$z$$ and $$\\bar z$$, and why does this matter for complex division? (2 steps)", "answer": "- Step 1: $$|z|^2 = z \\bar z$$. Proof: $$(a+bi)(a-bi) = a^2 + b^2 = |z|^2$$.\n- Step 2: This is why dividing $$\\frac{w}{z}$$ by multiplying numerator and denominator by $$\\bar z$$ works:\n$$\\frac{w}{z} = \\frac{w\\bar z}{z\\bar z} = \\frac{w\\bar z}{|z|^2}$$\nThe denominator becomes a single real number $$|z|^2$$, computed once.\n\nFor $$z_1 = 3 + 2i$$, $$|z_1|^2 = 9 + 4 = 13$$ — that's the \"13\" that appears throughout division-by-$$z_1$$ computations.", "source": "Opus 4 ①", "_id": "opus_1_39"}, {"question": "How can you sanity-check a closed-form sum like $$\\sum_{r=1}^n r(r+2)^2 = \\tfrac{1}{12}n(n+1)(3n^2 + 19n + 32)$$ in 30 seconds? (2 steps)", "answer": "- Step 1: Substitute $$n=1$$ into both sides. The LHS reduces to a single term: $$1\\cdot(1+2)^2 = 9$$.\n- Step 2: The RHS evaluates as $$\\tfrac{1}{12}\\cdot 1\\cdot 2\\cdot(3+19+32) = \\tfrac{108}{12} = 9$$ ✓.\n\nIf LHS and RHS disagree at $$n=1$$, your formula is wrong — either the expansion was wrong or the algebra slipped. This 30-second check has saved many a careless 4-mark question.", "source": "Opus 4 ①", "_id": "opus_1_4"}, {"question": "Describe the bisection method, and explain why it's GUARANTEED to converge. (4 steps)", "answer": "- Step 1: Start with interval $$[a, b]$$ where $$f(a)$$ and $$f(b)$$ have opposite signs. Compute midpoint $$m = (a+b)/2$$ and $$f(m)$$.\n- Step 2: Form the new interval: if $$f(m) f(a) < 0$$, root is in $$[a, m]$$; if $$f(m) f(b) < 0$$, root is in $$[m, b]$$. Discard the half without sign change.\n- Step 3: Repeat. After each step, the interval halves in length.\n- Step 4: After $$n$$ steps, interval length is $$(b-a)/2^n \\to 0$$. By the squeeze argument, the bracketed root is captured. **Guaranteed convergence** — but slow, halving error per step regardless of $$f$$'s shape.\n\nCompare: Newton-Raphson is much faster but can diverge; bisection is safe but slow.", "source": "Opus 4 ①", "_id": "opus_1_41"}, {"question": "Write down the Newton-Raphson formula and derive it from the linear approximation. (4 steps)", "answer": "- Step 1: At $$x = x_0$$, approximate $$f$$ by its tangent line: $$f(x) \\approx f(x_0) + f'(x_0)(x - x_0)$$.\n- Step 2: Set the linear approximation to zero (where the tangent crosses the $$x$$-axis): $$0 = f(x_0) + f'(x_0)(x_1 - x_0)$$.\n- Step 3: Solve for $$x_1$$: $$x_1 = x_0 - \\frac{f(x_0)}{f'(x_0)}$$.\n- Step 4: General iteration: $$x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$$.\n\n**Geometric meaning**: at each step, replace the curve by its tangent at $$x_n$$, use the tangent's $$x$$-intercept as the next guess. NR is in the formula booklet.", "source": "Opus 4 ①", "_id": "opus_1_42"}, {"question": "What are the three calculator hygiene tips for numerical-methods questions to minimize rounding error? (3 steps)", "answer": "- Step 1: **Store $$x_0$$ in calculator memory** (use STO or M+ key) so you can recall it exactly without retyping. Avoids transcription errors.\n- Step 2: **Use the ANS button** for chained computations. Plug $$x_0$$ into both $$f$$ and $$f'$$ via memory recall.\n- Step 3: **Round only at the very end**. Carry full precision through intermediate steps; round to 3 d.p. only on the final answer.\n\nMost lost marks in numerical methods come from premature rounding propagating through the calculation.", "source": "Opus 4 ①", "_id": "opus_1_46"}, {"question": "Why do bisection questions require you to write each midpoint's sign explicitly, even when you \"know\" the answer? (2 steps)", "answer": "- Step 1: Examiners reward method. The marks are for showing the bracketing logic: \"compute $$f(m)$$, observe sign, identify which subinterval contains the sign change\".\n- Step 2: Writing \"$$f(1.5) = 0.337 > 0$$, so root is in $$[1, 1.5]$$\" earns the method mark; missing it loses the mark even with correct final answer.\n\nThe same applies to linear interpolation and NR — show the formula substitution explicitly.", "source": "Opus 4 ①", "_id": "opus_1_47"}, {"question": "State the focal chord theorem for a parabola $$y^2 = 4ax$$, and explain why it makes \"show chord passes through focus\" questions trivial. (3 steps)", "answer": "- Step 1: **Theorem**: A chord joining points with parameters $$t_1$$ and $$t_2$$ on $$y^2 = 4ax$$ passes through the focus $$(a, 0)$$ **if and only if** $$t_1 t_2 = -1$$.\n- Step 2: Application: instead of finding the chord equation, substituting $$x = a$$, and verifying $$y = 0$$, you just multiply the two parameters and check.\n- Step 3: For $$P$$ at $$t_1 = p$$ and $$Q$$ at $$t_2 = -1/p$$: $$t_1 t_2 = p \\cdot (-1/p) = -1$$ ✓. Done in one line.\n\nThe theorem reduces a 4-mark question to 30 seconds. NOT in the formula booklet — memorize.", "source": "Opus 4 ①", "_id": "opus_1_52"}, {"question": "Derive the focal chord theorem $$t_1 t_2 = -1$$ for $$y^2 = 4ax$$. (5 steps)", "answer": "- Step 1: Two points: $$P(at_1^2, 2at_1)$$ and $$Q(at_2^2, 2at_2)$$. Chord slope: $$m = \\frac{2at_1 - 2at_2}{at_1^2 - at_2^2} = \\frac{2}{t_1 + t_2}$$ (after factoring difference of squares).\n- Step 2: Chord through $$P$$: $$y - 2at_1 = \\frac{2}{t_1+t_2}(x - at_1^2)$$.\n- Step 3: Set $$x = a$$ (focus) and ask when $$y = 0$$: $$-2at_1 = \\frac{2(a - at_1^2)}{t_1+t_2} = \\frac{2a(1-t_1^2)}{t_1+t_2}$$.\n- Step 4: Cross-multiply and simplify: $$-t_1(t_1+t_2) = 1 - t_1^2 \\Rightarrow -t_1^2 - t_1 t_2 = 1 - t_1^2 \\Rightarrow t_1 t_2 = -1$$.\n- Step 5: Conversely, $$t_1 t_2 = -1$$ implies the chord passes through $$(a, 0)$$.\n\nSo $$t_1 t_2 = -1 \\Leftrightarrow$$ chord through focus.", "source": "Opus 4 ①", "_id": "opus_1_53"}, {"question": "Why is recognizing the parametric form $$(at^2, 2at)$$ on $$y^2 = 4ax$$ important even before doing any tangent/normal computations? (2 steps)", "answer": "- Step 1: All standard parabola formulas (tangent, normal, focal chord, locus problems) are written in parametric form. Without knowing $$a$$ and $$t$$, you can't apply them.\n- Step 2: The first move on EVERY parabola question: read off $$a$$ from $$y^2 = 4ax$$, and identify the parameter of any given point. Skipping this step makes everything else harder.\n\nFor $$y^2 = 8x$$: $$a = 2$$. Point $$(2p^2, 4p) \\to t = p$$. Point $$(2/p^2, -4/p) \\to t = -1/p$$.", "source": "Opus 4 ①", "_id": "opus_1_56"}, {"question": "A common parabola question type asks to find a \"locus\" equation. What's the general strategy? (3 steps)", "answer": "- Step 1: Parametrize the points on the curve using $$(at^2, 2at)$$.\n- Step 2: Express the locus point's coordinates in terms of the parameter(s) — typically $$x_R = f(t)$$, $$y_R = g(t)$$.\n- Step 3: Eliminate the parameter to get a relation between $$x_R$$ and $$y_R$$. The result is the locus equation.\n\nExample: tangents from any focal chord meet at $$R = (-2, 2p - 2/p)$$. Eliminating $$p$$: $$x_R = -2$$ regardless. So the locus IS the directrix, as expected.", "source": "Opus 4 ①", "_id": "opus_1_57"}, {"question": "Why is the base case in induction non-negotiable, even when the inductive step \"looks fine\"? (3 steps)", "answer": "- Step 1: The inductive step says \"if true for $$k$$, then true for $$k+1$$\". This is a chain of implications.\n- Step 2: Without the base case, the chain has no starting point — it could be entirely vacuous. (Example: the inductive step might be valid but the statement is false for ALL $$n$$, with no contradiction.)\n- Step 3: The base case **plants the first true statement**. Then the inductive step propagates truth up the integers.\n\nForgetting the base case is an instant mark loss, and the proof is logically incomplete.", "source": "Opus 4 ①", "_id": "opus_1_62"}, {"question": "When a question says \"find the **possible** values\" of a constant, what's the standard cue?", "answer": "Plural \"values\" or the word \"possible\" signals **multiple cases**. Always immediately consider whether the constraint splits into $$\\pm$$ cases. The most common trigger is an absolute-value condition: $$|\\det A| = k$$, $$|z| = r$$, $$|f(x)| = c$$, etc. The single constraint becomes two equations: $$X = +k$$ AND $$X = -k$$. Missing the second case loses half the marks.", "source": "Opus 4 ①", "_id": "opus_1_65"}, {"question": "Across multiple FP1 papers, what topic appears in nearly every \"transformed roots\" Q5-style question?", "answer": "Building a new quadratic from transformed roots (like $$\\frac{\\alpha}{\\alpha^2+1}$$, $$\\alpha + \\beta^2$$, etc.) using:\n- (i) Vieta's to extract $$\\alpha + \\beta$$ and $$\\alpha\\beta$$.\n- (ii) Symmetric identities (especially $$\\alpha^2+\\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$).\n- (iii) The factor-and-clean trick for sums and products of new roots.\n- (iv) Building $$x^2 - Sx + P = 0$$, then clearing denominators.\n\nThis pipeline is so consistent across papers that drilling it makes Q5 a near-guaranteed 10 marks.", "source": "Opus 4 ①", "_id": "opus_1_66"}, {"question": "What's the key habit when reading any FP1 question with compound expressions like $$r(r+2)^2$$ or $$(\\alpha-1)^3$$?", "answer": "Expand fully on paper, even if it seems trivial. Mental expansion of squared/cubed binomials is the single most common source of arithmetic errors. The 30 seconds spent writing $$(r+2)^2 = r^2 + 4r + 4$$ on paper saves you from the catastrophic error of writing $$r^2 + 2$$ and getting the wrong answer to a 4-mark question.", "source": "Opus 4 ①", "_id": "opus_1_68"}, {"question": "What's the difference between \"tangent\" and \"normal\" terminology in coordinate geometry, and how does perpendicularity link them? (3 steps)", "answer": "- Step 1: **Tangent**: line touching the curve at a point with the same gradient as the curve there.\n- Step 2: **Normal**: line through the same point but PERPENDICULAR to the tangent.\n- Step 3: Perpendicularity gives the gradient relationship: $$m_T \\cdot m_N = -1$$, so $$m_N = -1/m_T$$.\n\nComputational habit: find $$dy/dx$$ first (tangent slope), then take the negative reciprocal (normal slope). Don't confuse which is which.", "source": "Opus 4 ①", "_id": "opus_1_71"}, {"question": "Practice — build a simple induction proof: show $$2^n - 1$$ is odd for all $$n \\ge 1$$. Use the 4-step template. (4 steps)", "answer": "- Step 1: BASE: $$n = 1$$: $$2^1 - 1 = 1$$, which is odd ✓.\n- Step 2: ASSUME: $$2^k - 1$$ is odd for some $$k \\ge 1$$, i.e. $$2^k - 1 = 2m + 1$$ for integer $$m$$.\n- Step 3: STEP: $$2^{k+1} - 1 = 2 \\cdot 2^k - 1 = 2(2m + 2) - 1 = 4m + 3 = 2(2m + 1) + 1$$, which is odd ✓.\n- Step 4: CONCLUSION: by induction, $$2^n - 1$$ is odd for all $$n \\in \\mathbb{Z}^+$$. $$\\blacksquare$$\n\nThis trivial example illustrates the structure; on the exam, the algebra is harder but the skeleton is the same.", "source": "Opus 4 ①", "_id": "opus_1_77"}, {"question": "Why is the formula $$|z_1 + z_2|^2 = |z_1|^2 + |z_2|^2 + 2\\,\\text{Re}(z_1 \\bar z_2)$$ a generalization of Pythagoras? (3 steps)", "answer": "- Step 1: Compute $$(z_1 + z_2)(\\overline{z_1 + z_2}) = (z_1 + z_2)(\\bar z_1 + \\bar z_2) = |z_1|^2 + |z_2|^2 + z_1 \\bar z_2 + \\bar z_1 z_2 = |z_1|^2 + |z_2|^2 + 2\\text{Re}(z_1 \\bar z_2)$$.\n- Step 2: When $$z_1 \\perp z_2$$ (arguments differ by $$\\pi/2$$), $$z_1 \\bar z_2$$ is purely imaginary, so $$\\text{Re}(z_1 \\bar z_2) = 0$$. Then $$|z_1 + z_2|^2 = |z_1|^2 + |z_2|^2$$ — exactly Pythagoras.\n- Step 3: When $$z_1 \\parallel z_2$$ (same argument), $$z_1 \\bar z_2$$ is real positive, and $$|z_1 + z_2| = |z_1| + |z_2|$$ — the parallel-vectors equality.\n\nThis identity bridges complex arithmetic and 2D geometry.", "source": "Opus 4 ①", "_id": "opus_1_79"}, {"question": "What's the relationship between determinant and orientation, and how would you geometrically distinguish a transformation with $$\\det = +3$$ from one with $$\\det = -3$$? (3 steps)", "answer": "- Step 1: Both transformations scale areas by 3 (since $$|\\det| = 3$$).\n- Step 2: $$\\det = +3$$: orientation-preserving. A counterclockwise unit square maps to a counterclockwise parallelogram (e.g. pure scaling, rotation, or a combination).\n- Step 3: $$\\det = -3$$: orientation-reversing. The same unit square maps to a clockwise parallelogram (a reflection is mixed in).\n\nIn FP1, this is why \"area scale factor 3\" needs both cases — the question doesn't distinguish, so both are valid.", "source": "Opus 4 ①", "_id": "opus_1_83"}, {"question": "What is the structural sanity check on the answer \"$$R = (-2, 2p - 2/p)$$\" for the tangent intersection at the ends of a focal chord on $$y^2 = 8x$$? (3 steps)", "answer": "- Step 1: $$x$$-coordinate is $$-2 = -a$$ (since $$a = 2$$ for $$y^2 = 8x$$). This matches the directrix-as-polar theorem: tangents at ends of any focal chord meet on the directrix $$x = -a$$. ✓\n- Step 2: $$y$$-coordinate $$2p - 2/p = 2(p - 1/p)$$. As $$p$$ varies (different focal chords), $$y$$ varies — every point on the directrix is the meeting point of tangents at SOME focal chord.\n- Step 3: At $$p = 1$$: $$y = 0$$, the chord is the latus rectum (vertical chord through focus), tangent intersection at $$(-a, 0)$$ — on the axis. At $$p = -1$$: same as $$p = 1$$ (other endpoint of latus rectum, same chord). All consistent.\n\nTakeaway: $$x = -a$$ is forced; $$y$$ encodes which focal chord. Theorem-consistent.", "source": "Opus 4 ②", "_id": "opus_2_102"}, {"question": "Build a $$2 \\times 2$$ matrix $$M$$ that doubles areas while reversing orientation. Confirm by computing $$\\det M$$. (3 steps)", "answer": "- Step 1: Goal: $$\\det M = -2$$. Many choices work. Simplest: a reflection multiplied by a scaling factor.\n- Step 2: Try $$M = \\begin{pmatrix} 2 & 0 \\\\ 0 & -1 \\end{pmatrix}$$: this scales $$x$$ by 2 and reflects $$y$$. $$\\det M = 2 \\cdot (-1) - 0 = -2$$. ✓ Areas double; orientation reversed.\n- Step 3: Alternative: $$M = \\begin{pmatrix} 1 & 1 \\\\ 1 & -1 \\end{pmatrix}$$ has $$\\det = -1 - 1 = -2$$. ✓ Different transformation, same area-and-orientation effect.\n\nTakeaway: $$\\det = -2$$ is the only constraint. Many matrices satisfy it.", "source": "Opus 4 ②", "_id": "opus_2_107"}, {"question": "What is the practical FP1 strategy for handling a question that asks you to \"give your answer in the form $$ax^2 + bx + c = 0$$ with $$a, b, c$$ integers\"? (3 steps)", "answer": "- Step 1: First, build the quadratic in any rational form, e.g. $$x^2 - \\tfrac{3}{5}x + \\tfrac{3}{40} = 0$$ from monic-form $$x^2 - Sx + P$$.\n- Step 2: Find the LCM of all denominators (here $$\\text{lcm}(5, 40) = 40$$). Multiply through by this LCM: $$40x^2 - 24x + 3 = 0$$.\n- Step 3: Verify that GCD of all coefficients is 1 (i.e. fully reduced). If GCD > 1, divide through. Here $$\\gcd(40, 24, 3) = 1$$ ✓.\n\nTakeaway: clear denominators (multiply by LCM), then reduce common factors. Result has integer coefficients in lowest form.", "source": "Opus 4 ②", "_id": "opus_2_108"}, {"question": "What are the three \"always-do\" reflexes when an FP1 question gives you a quadratic with parametric/symbolic roots $$\\alpha, \\beta$$? (3 steps)", "answer": "- Step 1: **Immediately write Vieta's**: $$s = \\alpha + \\beta = -b/a$$, $$p = \\alpha\\beta = c/a$$. Don't compute the actual roots unless asked — they're rarely needed.\n- Step 2: **Convert the target expression to symmetric form** using the identity table: $$\\alpha^2 + \\beta^2 = s^2 - 2p$$, $$\\alpha^3 + \\beta^3 = s^3 - 3sp$$, $$\\tfrac{1}{\\alpha} + \\tfrac{1}{\\beta} = s/p$$, $$(\\alpha-\\beta)^2 = s^2 - 4p$$, etc.\n- Step 3: **Substitute the numerical $$s, p$$** at the end. If the answer is messy, double-check it's symmetric in $$\\alpha, \\beta$$ (the question almost certainly gave a symmetric expression).\n\nTakeaway: Vieta's first → symmetric identity → numerical substitution. Three steps, every time.", "source": "Opus 4 ②", "_id": "opus_2_109"}, {"question": "How does the Edexcel FP1 spec handle \"show that $$f(n)$$ is divisible by 18 for $$n \\geq 2$$\" when $$f(1) = 0$$? Should you start from $$n = 1$$ or $$n = 2$$? (3 steps)", "answer": "- Step 1: The question explicitly says $$n \\geq 2$$, so the **base case must be at $$n = 2$$**: $$f(2) = 16 + 12 - 10 = 18 = 18 \\times 1$$ ✓.\n- Step 2: Even though $$f(1) = 0$$ is technically divisible by 18, the spec requires you to follow the question's stated domain. Starting from $$n = 1$$ might lose marks for not respecting the domain.\n- Step 3: When the question says \"for $$n \\in \\mathbb{Z}^+$$\" (with no minimum), default to $$n = 1$$. When it says \"$$n \\geq n_0$$\", use $$n_0$$ as the base.\n\nTakeaway: respect the stated domain. Base case = first $$n$$ in the question's range.", "source": "Opus 4 ②", "_id": "opus_2_112"}, {"question": "A student attempts Q3(b) by substituting the normal $$2y - 8x = -45$$ directly into $$xy = 9$$ but solves a cubic. What's the error? (3 steps)", "answer": "- Step 1: Re-arranging $$2y - 8x = -45$$ to $$y = 4x - 45/2$$, then substituting into $$xy = 9$$ gives $$x(4x - 45/2) = 9$$.\n- Step 2: This is a **quadratic** in $$x$$: $$4x^2 - \\tfrac{45}{2}x = 9$$, i.e. $$8x^2 - 45x = 18$$, i.e. $$8x^2 - 45x - 18 = 0$$. Not a cubic.\n- Step 3: If the student got a cubic, they likely cubed something or substituted incorrectly. Reset and substitute carefully: $$x \\cdot y = 9$$ — only one $$x$$ and one $$y$$, never a third power.\n\nTakeaway: $$xy = 9$$ is a hyperbola; substituting a line gives a quadratic, never a cubic. If you got cubic, restart.", "source": "Opus 4 ②", "_id": "opus_2_117"}, {"question": "A student claims \"if $$\\det A = 0$$, the area scale factor is also 0, but the transformation might still be invertible\". Why is this wrong? (3 steps)", "answer": "- Step 1: $$\\det A = 0 \\Leftrightarrow A$$ is **singular** (non-invertible). This is a key matrix theorem.\n- Step 2: Geometrically: $$\\det A = 0$$ means the columns of $$A$$ are linearly dependent — they don't span $$\\mathbb{R}^2$$. So $$A$$ collapses 2D to a line (or point), losing dimension. Areas in the image are 0 because the image isn't 2D.\n- Step 3: Inverting would require recovering the original 2D structure, but information has been lost. So no inverse exists. The statement \"$$\\det = 0$$ but invertible\" is contradictory.\n\nTakeaway: $$\\det = 0 \\Leftrightarrow$$ non-invertible $$\\Leftrightarrow$$ image is lower-dimensional. All equivalent.", "source": "Opus 4 ②", "_id": "opus_2_119"}, {"question": "State the formula for the inverse of a $$2 \\times 2$$ matrix $$\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}$$ and explain the structure (what stays, what moves, what flips sign). (3 steps)", "answer": "- Step 1: $$\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}^{-1} = \\frac{1}{ad - bc}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix}$$\n- Step 2: The structure: **swap the diagonal** ($$a \\leftrightarrow d$$), **negate the anti-diagonal** ($$b \\to -b$$, $$c \\to -c$$), and **divide by the determinant** $$\\det = ad - bc$$.\n- Step 3: Verify by multiplication: $$\\tfrac{1}{ad-bc}\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}\\begin{pmatrix} d & -b \\\\ -c & a \\end{pmatrix} = \\tfrac{1}{ad-bc}\\begin{pmatrix} ad - bc & 0 \\\\ 0 & ad - bc \\end{pmatrix} = I$$ ✓.\n\nTakeaway: SWAP diagonal, NEGATE off-diagonal, DIVIDE by det. Memorize.", "source": "Opus 4 ②", "_id": "opus_2_12"}, {"question": "What is the meaning of the parameter $$t$$ on the parabola $$y^2 = 4ax$$ — how does it relate to the geometry of the point? (3 steps)", "answer": "- Step 1: At parameter $$t$$, the point is $$(at^2, 2at)$$. The $$y$$-coordinate is $$2at$$, so $$t$$ is \"half the $$y$$-coordinate divided by $$a$$\". For $$a = 1$$, $$t = y/2$$.\n- Step 2: The tangent at parameter $$t$$ has gradient $$1/t$$. So $$t$$ is the *reciprocal* of the tangent slope. Equivalently, $$t = $$ cotangent of the angle the tangent makes with the $$x$$-axis.\n- Step 3: As $$t \\to 0^+$$, point approaches the vertex from above; as $$t \\to \\infty$$, point goes to infinity along the parabola. $$t = 1$$ corresponds to $$(a, 2a)$$ where the tangent has slope 1 (45°).\n\nTakeaway: $$t$$ encodes both height (via $$y = 2at$$) and tangent slope (via $$1/t$$).", "source": "Opus 4 ②", "_id": "opus_2_120"}, {"question": "Why does the formula $$\\alpha^3 + \\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$$ have the specific form $$s^3 - 3ps$$? (3 steps)", "answer": "- Step 1: Expand $$(\\alpha + \\beta)^3 = \\alpha^3 + 3\\alpha^2\\beta + 3\\alpha\\beta^2 + \\beta^3$$.\n- Step 2: Group: $$= (\\alpha^3 + \\beta^3) + 3\\alpha\\beta(\\alpha + \\beta)$$. The cross-terms factor out as $$3\\alpha\\beta(\\alpha+\\beta)$$ because $$3\\alpha^2\\beta + 3\\alpha\\beta^2 = 3\\alpha\\beta(\\alpha + \\beta)$$.\n- Step 3: Rearrange: $$\\alpha^3 + \\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta) = s^3 - 3ps$$.\n\nSame logic as $$\\alpha^2 + \\beta^2$$: cube the sum, subtract the cross-terms. Pattern: $$\\alpha^n + \\beta^n$$ can always be expressed in $$s, p$$ via Newton's identities.\n\nTakeaway: $$s^3 - 3ps$$ comes from binomial expansion + cross-term factoring. Same recipe for any $$\\alpha^n + \\beta^n$$.", "source": "Opus 4 ②", "_id": "opus_2_125"}, {"question": "Why must you pre-multiply (not post-multiply) by $$B^{-1}$$ to solve $$BC = D$$ for $$C$$? (3 steps)", "answer": "- Step 1: Matrix multiplication is **non-commutative**: in general $$AB \\neq BA$$. So you must apply the inverse from the same side it would cancel.\n- Step 2: Starting from $$BC = D$$, to isolate $$C$$ you need $$B^{-1}$$ to cancel the $$B$$ on the left of $$C$$. Pre-multiply both sides: $$B^{-1}(BC) = B^{-1}D$$, i.e. $$(B^{-1}B)C = B^{-1}D$$, so $$IC = B^{-1}D$$, giving $$C = B^{-1}D$$.\n- Step 3: If you accidentally post-multiplied: $$BC \\cdot B^{-1} = D B^{-1}$$ — but this gives $$B(C B^{-1})$$, which doesn't simplify to $$C$$ unless $$B$$ and $$C$$ commute (rarely true).\n\nTakeaway: side matters in matrix algebra. Cancel from the same side as the obstruction.", "source": "Opus 4 ②", "_id": "opus_2_14"}, {"question": "Given a quadratic with roots $$\\alpha, \\beta$$, list the symmetric-function identities that let you compute new expressions in $$\\alpha, \\beta$$ without solving for them individually. (3 steps)", "answer": "- Step 1: From sum $$s = \\alpha + \\beta$$ and product $$p = \\alpha\\beta$$ alone:\n+ $$\\alpha^2 + \\beta^2 = s^2 - 2p$$\n+ $$\\alpha^3 + \\beta^3 = s^3 - 3sp$$\n+ $$(\\alpha - \\beta)^2 = s^2 - 4p$$\n+ $$\\tfrac{1}{\\alpha} + \\tfrac{1}{\\beta} = \\tfrac{s}{p}$$, $$\\tfrac{1}{\\alpha\\beta} = \\tfrac{1}{p}$$\n- Step 2: Useful factoring identities:\n+ $$\\alpha\\beta^2 + \\beta\\alpha^2 = \\alpha\\beta(\\alpha+\\beta) = ps$$\n+ $$(\\alpha^2+1)(\\beta^2+1) = (\\alpha\\beta)^2 + (\\alpha^2+\\beta^2) + 1 = p^2 + s^2 - 2p + 1$$\n- Step 3: The principle: any **symmetric** polynomial in $$\\alpha, \\beta$$ can be expressed in terms of $$s$$ and $$p$$ alone — this is the fundamental theorem of symmetric polynomials (in this baby case).\n\nTakeaway: rewrite everything as $$s$$ and $$p$$ — never solve for $$\\alpha, \\beta$$ individually unless asked.", "source": "Opus 4 ②", "_id": "opus_2_16"}, {"question": "When building a new quadratic with roots $$\\alpha' = \\tfrac{\\alpha}{\\alpha^2+1}$$ and $$\\beta' = \\tfrac{\\beta}{\\beta^2+1}$$, what is the strategic process and what is the key algebraic trick that often gets stuck? (4 steps)", "answer": "- Step 1: A monic quadratic with roots $$\\alpha', \\beta'$$ is $$x^2 - (\\alpha' + \\beta')x + \\alpha'\\beta' = 0$$. So you need to compute $$S = \\alpha' + \\beta'$$ and $$P = \\alpha'\\beta'$$ in terms of $$s, p$$.\n- Step 2: $$P$$ is easy: $$\\alpha'\\beta' = \\tfrac{\\alpha\\beta}{(\\alpha^2+1)(\\beta^2+1)} = \\tfrac{p}{p^2 + s^2 - 2p + 1}$$. **Reuse part-(a)** if it computed the denominator.\n- Step 3: $$S$$ is harder — combining over a common denominator gives a numerator $$\\alpha(\\beta^2+1) + \\beta(\\alpha^2+1) = \\alpha\\beta^2 + \\beta\\alpha^2 + \\alpha + \\beta$$. The trick: factor as $$\\alpha\\beta(\\alpha+\\beta) + (\\alpha+\\beta) = (\\alpha+\\beta)(\\alpha\\beta+1) = s(p+1)$$.\n- Step 4: After computing $$S$$ and $$P$$ as fractions, multiply through by their LCM to clear denominators and produce $$px^2 + qx + r = 0$$ with integer coefficients.\n\nTakeaway: factor out $$(\\alpha+\\beta)$$ from the cross-terms — this is THE trick that makes \"transformed root\" questions tractable.", "source": "Opus 4 ②", "_id": "opus_2_18"}, {"question": "State the Newton-Raphson iteration formula and the geometric interpretation of one step. (3 steps)", "answer": "- Step 1: $$x_{n+1} = x_n - \\dfrac{f(x_n)}{f'(x_n)}$$\n- Step 2: Geometrically: at $$x_n$$, draw the tangent line to $$y = f(x)$$. This tangent has slope $$f'(x_n)$$ and passes through $$(x_n, f(x_n))$$. Its equation is $$y - f(x_n) = f'(x_n)(x - x_n)$$.\n- Step 3: Find where this tangent crosses the $$x$$-axis (set $$y=0$$): $$x = x_n - f(x_n)/f'(x_n)$$. This is your next approximation $$x_{n+1}$$. The intuition: if $$f$$ is approximately linear near $$x_n$$, the tangent's root is a good approximation to $$f$$'s root.\n\nTakeaway: NR uses local linearization (tangent) to \"shoot\" toward the root.", "source": "Opus 4 ②", "_id": "opus_2_26"}, {"question": "When does Newton-Raphson fail or behave badly, and what should you do if $$f'(x_0)$$ is small? (3 steps)", "answer": "- Step 1: NR's update is $$x_{n+1} = x_n - f(x_n)/f'(x_n)$$. If $$f'(x_n)$$ is **small** (near zero), the update step $$f(x_n)/f'(x_n)$$ is **huge**, sending the iterate far from the actual root — divergence.\n- Step 2: NR also fails near inflection points (where the tangent badly misrepresents the curve), and oscillates near local minima/maxima where $$f'$$ changes sign.\n- Step 3: Fix: pick a starting value $$x_0$$ where $$f$$ is \"well-behaved\" (away from stationary points), and prefer using NR after a couple of bisection steps to localize the root.\n\nTakeaway: NR is fast when it works, but small derivative ⇒ catastrophic step. Bisect first, then NR.", "source": "Opus 4 ②", "_id": "opus_2_27"}, {"question": "Compare bisection, Newton-Raphson, and linear interpolation on three axes: convergence guarantee, speed, and required computations per step. (3 steps)", "answer": "- Step 1: **Convergence guarantee**:\n+ Bisection: guaranteed (if continuous + sign change at start)\n+ Linear interpolation: usually converges (if endpoints retain sign change), can stall\n+ Newton-Raphson: NOT guaranteed; can diverge if $$f'$$ is small or $$f$$ is badly behaved\n- Step 2: **Speed**:\n+ Bisection: linear in iterations (halves error each step)\n+ Linear interpolation: superlinear if $$f$$ is roughly linear; can be slow if $$f$$ is curvy\n+ Newton-Raphson: quadratic convergence near the root (doubles correct digits per step)\n- Step 3: **Computations per step**:\n+ Bisection: 1 function evaluation\n+ Linear interpolation: 1 function evaluation (after first step)\n+ Newton-Raphson: 1 function and 1 derivative evaluation — requires you to compute $$f'$$ analytically\n\nTakeaway: trade-off between robustness and speed. NR fastest if it works; bisection slowest but bulletproof.", "source": "Opus 4 ②", "_id": "opus_2_29"}, {"question": "Why is it strategic to apply interval bisection first (a few steps) and then switch to Newton-Raphson, rather than starting NR immediately? (3 steps)", "answer": "- Step 1: NR's convergence depends critically on the starting value being close enough to the root and in a region where $$f$$ is \"well-behaved\" (no nearby stationary points or inflections).\n- Step 2: A few bisection steps **localize** the root to a narrow interval — this gives you a reliable starting $$x_0$$ for NR (typically the midpoint of the bracketed interval after bisection).\n- Step 3: Once close, NR's quadratic convergence kicks in and produces high-precision answers in 1–2 steps. Best of both worlds: bisection's robustness + NR's speed.\n\nTakeaway: bisection localizes; NR refines. Hybrid is industry standard.", "source": "Opus 4 ②", "_id": "opus_2_30"}, {"question": "State the equation $$y^2 = 4ax$$ for a standard rightward-opening parabola, and identify its parametric form, focus, and directrix in terms of $$a$$. (3 steps)", "answer": "- Step 1: The standard form $$y^2 = 4ax$$ describes a parabola with vertex at the origin, opening to the right (assuming $$a > 0$$).\n- Step 2: **Parametric form**: $$(at^2, 2at)$$ for $$t \\in \\mathbb{R}$$. Verify: $$(2at)^2 = 4a^2 t^2 = 4a \\cdot at^2$$ ✓. The parameter $$t$$ encodes the \"height\" of the point on the parabola.\n- Step 3: **Focus**: $$S = (a, 0)$$ — on the axis, distance $$a$$ from the vertex. **Directrix**: the vertical line $$x = -a$$ — perpendicular distance $$a$$ from the vertex on the opposite side. For $$y^2 = 8x$$: $$4a = 8 \\Rightarrow a = 2$$. Focus $$(2,0)$$, directrix $$x = -2$$, parametric $$(2t^2, 4t)$$.\n\nTakeaway: $$y^2 = 4ax$$ is THE form. Match to find $$a$$, then everything follows.", "source": "Opus 4 ②", "_id": "opus_2_31"}, {"question": "What are the easy method-mark losses in an FP1 induction proof, and how do you defend against each? (3 steps)", "answer": "- Step 1: **Always write each step header explicitly**: \"Step 1 — BASE CASE\", \"Step 2 — INDUCTIVE HYPOTHESIS\", \"Step 3 — INDUCTIVE STEP\", \"Step 4 — CONCLUSION\". Examiners give marks for structure even if algebra fails.\n- Step 2: Common easy-mark losses:\n+ Skipping the base case (especially when \"obvious\")\n+ Forgetting to **state** the hypothesis explicitly (\"assume $$f(k) = 18m$$ for some $$m \\in \\mathbb{Z}$$\")\n+ Not invoking \"by the principle of mathematical induction\" in the conclusion\n+ Failing to specify the domain of $$n$$ (e.g., \"for all $$n \\in \\mathbb{Z}^+$$\")\n- Step 3: A clean conclusion sentence: \"Since the result holds for $$n = 1$$, and the truth at $$n = k$$ implies truth at $$n = k+1$$, by the principle of mathematical induction the result holds for all $$n \\in \\mathbb{Z}^+$$. $$\\blacksquare$$\"\n\nTakeaway: examiners reward structure as much as algebra. Write all four headers, every time.", "source": "Opus 4 ②", "_id": "opus_2_42"}, {"question": "What is the conjugate-pair rule, and what does it imply for a quartic $$p(x)$$ with real coefficients given that $$z_1 = 2 + 3i$$ is a root? (3 steps)", "answer": "- Step 1: **Conjugate-pair rule**: if $$p(x)$$ has all real coefficients and $$p(z_1) = 0$$ with $$z_1$$ non-real, then $$p(\\bar z_1) = 0$$ also. Proof in one line: $$p(\\bar z) = \\overline{p(z)}$$ for real-coefficient $$p$$, so $$p(z) = 0 \\Rightarrow p(\\bar z) = \\bar 0 = 0$$.\n- Step 2: Therefore $$\\bar z_1 = 2 - 3i$$ is automatically a second root, with no additional work needed.\n- Step 3: With two roots known, the polynomial has a **quadratic factor** $$(x - z_1)(x - \\bar z_1) = x^2 - 4x + 13$$. Polynomial division then yields the remaining quadratic factor and the other two roots.\n\nTakeaway: complex root → free conjugate root → quadratic factor → division → remaining roots.", "source": "Opus 4 ②", "_id": "opus_2_43"}, {"question": "Plot the four roots $$2 \\pm 3i$$ and $$\\pm \\tfrac{i\\sqrt 6}{2}$$ on an Argand diagram — what symmetries do you observe? (3 steps)", "answer": "- Step 1: Convert to coordinates: $$(2, 3)$$, $$(2, -3)$$, $$(0, \\sqrt{6}/2)$$, $$(0, -\\sqrt{6}/2)$$. The first pair is at $$x = 2$$ (vertical mirror line), the second pair is on the imaginary axis ($$x = 0$$).\n- Step 2: **Conjugate symmetry**: each pair is reflected across the real axis (real coefficients enforce this). $$(2,3) \\leftrightarrow (2,-3)$$ and $$(0, \\sqrt 6/2) \\leftrightarrow (0, -\\sqrt 6/2)$$.\n- Step 3: This vertical mirror symmetry across the real axis is a visual reminder of the conjugate-pair rule. If you ever see roots in a real-coefficient polynomial that aren't symmetric across the real axis, you've made an algebra error.\n\nTakeaway: real coefficients ⇒ Argand diagram has horizontal-axis mirror symmetry.", "source": "Opus 4 ②", "_id": "opus_2_44"}, {"question": "For an FP1 question that says \"the area scale factor is $$k$$\", what is the step-by-step process for finding the unknown matrix entries? (4 steps)", "answer": "- Step 1: Compute $$\\det(A)$$ symbolically in terms of the unknown.\n- Step 2: Recognize that \"area scale factor $$= k$$\" means $$|\\det A| = k$$, NOT $$\\det A = k$$. (This is the trap.)\n- Step 3: Split into two cases: $$\\det A = +k$$ and $$\\det A = -k$$. Solve each for the unknown — typically gives two values.\n- Step 4: If the question says \"find $$k$$\" or \"find possible values\" with plural, report both. If it says \"find the value\" (singular), additional constraints in the question rule out one branch — read carefully.\n\nTakeaway: $$|\\det| = k \\Rightarrow \\det = \\pm k \\Rightarrow$$ usually two answers. Read the question for \"values\" plural as a hint.", "source": "Opus 4 ②", "_id": "opus_2_45"}, {"question": "A complex number is divided by another, $$w = u/z$$. What's the conceptual relationship between $$|w|$$, $$|u|$$, $$|z|$$, and between $$\\arg w$$, $$\\arg u$$, $$\\arg z$$? (3 steps)", "answer": "- Step 1: Using polar form $$z = r e^{i\\theta}$$: division divides moduli and subtracts arguments:\n+ $$|w| = |u|/|z|$$\n+ $$\\arg w = \\arg u - \\arg z$$\n- Step 2: This is why the conjugate trick works for division: multiplying by $$\\bar z/\\bar z$$ gives a real denominator, but the polar relationship is still encoded — $$\\arg w$$ is shifted by $$-\\arg z$$ from $$\\arg u$$.\n- Step 3: Sanity check tool: when computing $$w = u/z$$, you can verify by checking $$|w| \\cdot |z| = |u|$$ at the end. If not, algebra error.\n\nTakeaway: complex division is \"scale by $$1/|z|$$ and rotate by $$-\\arg z$$\".", "source": "Opus 4 ②", "_id": "opus_2_47"}, {"question": "State the complete set of formulas to memorize for **rectangular hyperbola** $$xy = c^2$$ that are NOT in the FP1 booklet. (3 steps)", "answer": "- Step 1: **Parametric form**: $$(ct, c/t)$$, $$t \\neq 0$$. Verify by direct substitution.\n- Step 2: **Tangent gradient**: $$\\frac{dy}{dx} = -1/t^2$$ at $$(ct, c/t)$$. Hence **tangent equation**: $$x + t^2 y = 2ct$$.\n- Step 3: **Normal gradient**: $$t^2$$ (negative reciprocal of tangent). Hence **normal equation**: $$t^3 x - ty = c(t^4 - 1)$$.\n\nMemorize all three forms — every rectangular hyperbola question in FP1 reduces to plugging into one of these. NOT in booklet, so they must be at fingertips.\n\nTakeaway: $$(ct, c/t)$$, gradient $$-1/t^2$$, tangent $$x + t^2y = 2ct$$, normal $$t^3 x - ty = c(t^4-1)$$.", "source": "Opus 4 ②", "_id": "opus_2_50"}, {"question": "State the complete set of formulas to memorize for **parabola** $$y^2 = 4ax$$ that are NOT in the FP1 booklet. (5 steps)", "answer": "- Step 1: **Parametric form**: $$(at^2, 2at)$$. **Focus**: $$(a, 0)$$. **Directrix**: $$x = -a$$.\n- Step 2: **Tangent at parameter $$t$$**: $$ty = x + at^2$$. Tangent gradient is $$1/t$$.\n- Step 3: **Normal at parameter $$t$$**: $$y + tx = 2at + at^3$$. Normal gradient is $$-t$$.\n- Step 4: **Focal chord theorem**: $$t_1 t_2 = -1 \\Leftrightarrow$$ chord through $$(at_1^2, 2at_1)$$ and $$(at_2^2, 2at_2)$$ passes through focus.\n- Step 5: **Directrix-as-polar**: tangents at endpoints of any focal chord meet on the directrix.\n\nMemorize all five — none are in the booklet.\n\nTakeaway: parametric, focus/directrix, tangent, normal, focal chord, directrix-polar. Five facts, all must be at fingertips.", "source": "Opus 4 ②", "_id": "opus_2_51"}, {"question": "Why do Q1 (sums), Q2 (quartic), and Q5 (transformed roots) share the same underlying problem-solving strategy of \"factor to expose structure, then simplify\"? (4 steps)", "answer": "- Step 1: In Q1, the trick is to **factor out $$\\tfrac{1}{12}n(n+1)$$ early** before expanding the polynomial bracket, exposing a clean simplification.\n- Step 2: In Q2, the trick is to **factor the polynomial as (known quadratic)·(unknown quadratic)** and use polynomial division to expose the second factor without solving from scratch.\n- Step 3: In Q5, the trick is to **factor $$\\alpha\\beta^2 + \\beta\\alpha^2 + \\alpha + \\beta = (\\alpha+\\beta)(\\alpha\\beta+1)$$** to express a complicated symmetric sum in terms of $$s$$ and $$p$$.\n- Step 4: The unifying principle: **factor first, simplify second**. Look for shared structure across terms before expanding. Most FP1 algebra rewards spotting and exploiting symmetry.\n\nTakeaway: factoring exposes structure; expanding hides it. Look for common factors and symmetries before brute force.", "source": "Opus 4 ②", "_id": "opus_2_58"}, {"question": "Both Q3 (rectangular hyperbola) and Q8 (parabola) involve \"find the second intersection\" or \"find tangent intersection\" — what's the unified approach across conics? (3 steps)", "answer": "- Step 1: Parametrize the conic — $$(ct, c/t)$$ for hyperbola, $$(at^2, 2at)$$ for parabola. This converts Cartesian rationals into polynomial-in-$$t$$ algebra.\n- Step 2: Express tangent/normal in parametric form. Sub one tangent equation into another (or into the conic equation) to get a polynomial in $$t$$ or $$x$$.\n- Step 3: Use Vieta's: one root of the polynomial corresponds to the original parameter; the other root pops out via roots-product or roots-sum, no quadratic formula needed.\n\nThe pattern: **parametrize → write line equation in $$t$$ → eliminate to get polynomial in $$t$$ → use Vieta's to get the second root**.\n\nTakeaway: parametric form + Vieta's = the conic-section workhorse.", "source": "Opus 4 ②", "_id": "opus_2_59"}, {"question": "A student writes \"$$|\\det A| = 3 \\Rightarrow \\det A = 3$$, so $$-3k + 24 = 3, k = 7$$\" and stops there. What did they miss? (3 steps)", "answer": "- Step 1: They missed the negative branch. $$|\\det A| = 3$$ gives **two** equations: $$\\det A = +3$$ AND $$\\det A = -3$$.\n- Step 2: $$\\det A = -3$$ gives $$-3k + 24 = -3$$, so $$k = 9$$. This is a separate valid solution.\n- Step 3: The phrase \"**possible values**\" (plural) in the question is the red flag. Whenever you see plural \"values\", expect to split into cases and report all. Without doing so, you lose the second value and ~2 marks.\n\nTakeaway: $$|x| = c$$ has TWO solutions, $$x = \\pm c$$. Always split and check both.", "source": "Opus 4 ②", "_id": "opus_2_60"}, {"question": "A student computes $$(z - z_1)(z - \\bar z_1) = z^2 - z_1 z - \\bar z_1 z + z_1\\bar z_1$$ and stops, leaving $$z_1, \\bar z_1$$ in the answer. Why is this wrong (or rather, incomplete) for FP1 work? (3 steps)", "answer": "- Step 1: A real-coefficient polynomial **must** have real coefficients in every factor (when factoring over $$\\mathbb{R}$$). Leaving $$z_1, \\bar z_1$$ in the answer hides the simplification.\n- Step 2: Combine: $$-z_1 z - \\bar z_1 z = -(z_1 + \\bar z_1)z = -2\\,\\text{Re}(z_1)\\,z$$ (a real coefficient). And $$z_1 \\bar z_1 = |z_1|^2$$ (a real number).\n- Step 3: The simplified, real-coefficient form is $$z^2 - 2\\,\\text{Re}(z_1)z + |z_1|^2$$. This is the form you can polynomial-divide a real-coefficient quartic by — without it, you'd be dividing by complex coefficients, which is messy.\n\nTakeaway: always simplify $$(z - z_1)(z - \\bar z_1)$$ to its real-coefficient form before dividing.", "source": "Opus 4 ②", "_id": "opus_2_61"}, {"question": "Why is it WRONG to apply Newton-Raphson at a starting value $$x_0$$ where $$f'(x_0) = 0$$? (3 steps)", "answer": "- Step 1: The NR formula is $$x_{n+1} = x_n - \\tfrac{f(x_n)}{f'(x_n)}$$. If $$f'(x_n) = 0$$, the update step is undefined (division by zero).\n- Step 2: Geometrically: at a stationary point, the tangent to $$y = f(x)$$ is **horizontal**. A horizontal line never crosses the $$x$$-axis (unless it IS the $$x$$-axis), so there's no \"next iterate\" — the method has nowhere to go.\n- Step 3: Even if $$f'(x_0)$$ is **nearly** zero (but nonzero), the update is huge ($$f/f' \\to \\infty$$), shooting the iterate far from the root. Always check that your starting point isn't near a stationary point.\n\nTakeaway: NR demands $$f'(x_n) \\neq 0$$ and ideally $$|f'(x_n)|$$ not small. Stationary points = NR catastrophe.", "source": "Opus 4 ②", "_id": "opus_2_62"}, {"question": "For divisibility induction \"$$f(n)$$ divisible by $$d$$\", what happens if $$f(1) = 0$$? Is the base case still valid? (3 steps)", "answer": "- Step 1: Divisibility convention: an integer $$a$$ divides $$b$$ iff $$b = a \\cdot k$$ for some integer $$k$$. With $$b = 0$$, choose $$k = 0$$: $$0 = a \\cdot 0$$ for any nonzero $$a$$. So **every** nonzero integer divides 0.\n- Step 2: For $$f(n) = 4^n + 6n - 10$$: $$f(1) = 0$$. Yes, $$18 \\mid 0$$ (since $$0 = 18 \\times 0$$). The base case is valid.\n- Step 3: This is mathematically standard but counterintuitive. If the question gives a base case at $$n = n_0$$ where $$f(n_0) = 0$$, accept it and move on.\n\nTakeaway: $$a \\mid 0$$ for all $$a \\neq 0$$. The base case can be 0 and still work.", "source": "Opus 4 ②", "_id": "opus_2_63"}, {"question": "Suppose a focal chord on $$y^2 = 4ax$$ is **vertical** (the latus rectum). What are the parameters $$t_1, t_2$$, and where do the tangents at its endpoints meet? (3 steps)", "answer": "- Step 1: A vertical line through the focus $$(a, 0)$$ has equation $$x = a$$. On the parabola: $$y^2 = 4a \\cdot a = 4a^2$$, so $$y = \\pm 2a$$. Endpoints: $$(a, 2a)$$ and $$(a, -2a)$$.\n- Step 2: Comparing to $$(at^2, 2at)$$: $$at^2 = a \\Rightarrow t = \\pm 1$$. So $$t_1 = 1, t_2 = -1$$, and indeed $$t_1 t_2 = -1$$ ✓.\n- Step 3: Tangent intersection: $$R = (at_1 t_2, a(t_1 + t_2)) = (a(-1), a(0)) = (-a, 0)$$. So tangents meet at $$(-a, 0)$$ — on the directrix, on the axis. Special case of the directrix-as-polar theorem.\n\nTakeaway: latus rectum is the \"shortest\" focal chord; tangents at its ends meet at the foot of the directrix on the axis.", "source": "Opus 4 ②", "_id": "opus_2_64"}, {"question": "Why is the rectangular hyperbola \"rectangular\"? What does the term mean geometrically? (3 steps)", "answer": "- Step 1: A general hyperbola has two **asymptotes**. For $$xy = c^2$$, the asymptotes are the $$x$$-axis ($$y = 0$$) and $$y$$-axis ($$x = 0$$).\n- Step 2: These asymptotes are **perpendicular** (90° angle between them). A \"rectangular\" hyperbola is one whose asymptotes meet at right angles — hence the name.\n- Step 3: Equivalently: the standard form $$\\tfrac{x^2}{a^2} - \\tfrac{y^2}{b^2} = 1$$ becomes \"rectangular\" when $$a = b$$. Rotating by 45° brings it to the form $$xy = c^2$$ (with $$c^2 = a^2/2$$).\n\nTakeaway: \"rectangular\" = asymptotes at 90°. The $$xy = c^2$$ form is the rotated, rectangular case.", "source": "Opus 4 ②", "_id": "opus_2_65"}, {"question": "Outline the complete approach to solving Q2 (find all four roots of a real-coefficient quartic given one complex root). (5 steps)", "answer": "- Step 1: Write down the conjugate of the given root — automatically a second root by the conjugate-pair rule.\n- Step 2: Build the quadratic factor: $$z^2 - 2\\,\\text{Re}(z_1)z + |z_1|^2$$ — this is a real-coefficient factor of the quartic.\n- Step 3: Polynomial-long-divide the quartic by this quadratic factor. The quotient is a second quadratic (real coefficients).\n- Step 4: Solve the second quadratic by quadratic formula (or factoring) to obtain the remaining two roots.\n- Step 5: Plot all four on an Argand diagram, exploiting conjugate symmetry across the real axis.\n\nTakeaway: conjugate → quadratic factor → divide → solve quotient → plot. No guessing, systematic.", "source": "Opus 4 ②", "_id": "opus_2_67"}, {"question": "When are you allowed to skip a question on the FP1 paper, and how should you re-allocate time? (4 steps)", "answer": "- Step 1: If a topic is genuinely unfamiliar (gap topic — e.g. parabola, rectangular hyperbola for someone who hasn't studied them), don't sink unbounded time into it on first pass. Skip after 1-2 minutes of looking.\n- Step 2: Do all questions you DO know first — ensures you bank all the marks you can.\n- Step 3: With the remaining time, return to the gap topics. Budget by mark value: Q3 (7 marks) deserves ~10 min, Q8 (13 marks) deserves ~15 min. If you can't progress, at least write down what you DO know — partial methods still earn method marks.\n- Step 4: Especially: write down standard formulas at the start of a gap question (parametric form, focus, directrix). Method marks for \"set-up\" can total 30-50% of the question.\n\nTakeaway: maximize marks by doing knowns first; partial-credit gap questions at the end.", "source": "Opus 4 ②", "_id": "opus_2_72"}, {"question": "A student writes \"$$\\alpha + \\beta = b/a$$\" instead of \"$$\\alpha + \\beta = -b/a$$\". Why is the minus sign there, conceptually? (3 steps)", "answer": "- Step 1: Start from $$(x - \\alpha)(x - \\beta) = x^2 - (\\alpha + \\beta)x + \\alpha\\beta$$ — note the **minus** sign in front of $$(\\alpha+\\beta)$$.\n- Step 2: For a monic quadratic $$x^2 + Bx + C$$ to equal this, you need $$B = -(\\alpha+\\beta)$$, i.e. $$\\alpha + \\beta = -B$$.\n- Step 3: Generalize to $$ax^2 + bx + c$$: divide through by $$a$$ to get $$x^2 + (b/a)x + c/a = 0$$. Then $$b/a = -(\\alpha+\\beta)$$, so $$\\alpha + \\beta = -b/a$$.\n\nMnemonic: the sum equals \"minus the next coefficient down\".\n\nTakeaway: $$-b/a$$ comes from expanding $$(x-\\alpha)(x-\\beta)$$. The minus sign is structural, not a typo.", "source": "Opus 4 ②", "_id": "opus_2_75"}, {"question": "A student says: \"the gradient of the rectangular hyperbola at any point is always negative\". Is this fully correct? (3 steps)", "answer": "- Step 1: For $$xy = c^2$$ with $$c > 0$$, the curve has two branches: one in the first quadrant (where $$x > 0, y > 0$$) and one in the third quadrant (where $$x < 0, y < 0$$).\n- Step 2: From $$\\tfrac{dy}{dx} = -y/x$$: in Q1, $$y/x > 0$$, so $$\\tfrac{dy}{dx} < 0$$ ✓. In Q3, both $$y$$ and $$x$$ are negative, so $$y/x > 0$$ also, so $$\\tfrac{dy}{dx} < 0$$ ✓.\n- Step 3: So yes, the gradient is always negative — the function $$y = c^2/x$$ is monotonically decreasing on each branch (separately, since $$x = 0$$ is excluded). The student is right, but should justify with $$\\tfrac{dy}{dx} = -y/x$$ structure.\n\nTakeaway: $$xy = c^2$$ has gradient $$-1
