<script>
const DATA={"selected": [{"question": "A stationary bar magnet sits *inside* a coil, right in the middle. The voltmeter reads what, and why?", "answer": "Zero. Faraday's law depends on the *rate of change* of flux linkage, not on the flux itself. Even though there is substantial flux threading the coil, $$d(N\\Phi)/dt = 0$$ because nothing is changing — the magnet isn't moving, the field is static. This is a classic trap: students see lots of flux and expect a reading. The takeaway is that flux and EMF are decoupled — only the *derivative* couples them.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "Why is high voltage used for long-distance electrical power transmission? Explain the reasoning from first principles. (4 steps)", "answer": "- Step 1: The power to be delivered is fixed: $$P = IV$$. This is what the customer needs at the far end.\n- Step 2: Power *lost* in the transmission cables (as heat) is $$P_{loss} = I^2R$$, where $$R$$ is cable resistance. Note it depends on $$I^2$$, not $$I$$ — the loss is *quadratic* in current.\n- Step 3: To deliver a fixed $$P$$, if we raise $$V$$, then $$I$$ drops proportionally. Halving the current quarters the losses.\n- Step 4: Therefore we step up to very high voltage ($$\\sim 250$$ kV) for transmission — small current — then step down at the consumer end ($$\\sim 230$$ V) for safety.\n\nTakeaway: cable losses aren't linear — the quadratic dependence on $$I$$ is what makes high-voltage transmission a massive win.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "A transformer only works with AC, not steady DC. However, when DC is first switched on, there is a brief momentary EMF in the secondary. Explain what happens at switch-on, during steady DC, and at switch-off. (3 steps)", "answer": "- Step 1: **Switch-on**: the current in the primary rises from zero to its steady value. During this rise, the magnetic field is *building up* — the flux linkage in the secondary is *changing* (increasing). By Faraday's law, this changing flux induces a momentary EMF in the secondary.\n- Step 2: **Steady DC**: the current is constant, the magnetic field is constant, and the flux linkage is constant. Since $$d(N\\Phi)/dt = 0$$, the induced EMF is **zero**. The secondary produces no output while the DC is steady.\n- Step 3: **Switch-off**: the current drops to zero, the magnetic field collapses, and the flux linkage *decreases* rapidly. This is another change in flux, so a momentary EMF is induced — but in the **opposite direction** to the switch-on EMF (because the flux is decreasing rather than increasing).\n\n+ This behaviour confirms that it's the *change* in flux, not the flux itself, that induces EMF. A transformer fed with DC would give only brief pulses at switch-on and switch-off, with no output in between — useless for power transmission.", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "A bar magnet is pushed N-pole-first into a coil. Using Lenz's law, what pole does the near face of the coil become, and why? How does this relate to energy conservation? (3 steps)", "answer": "- Step 1: As the N pole approaches, the flux through the coil *increases*. Lenz's law says the induced current will oppose this increase — it will create a magnetic field that tries to *reduce* the incoming flux.\n- Step 2: To oppose an approaching N pole, the near face of the coil must also become a **N pole** (like poles repel). Using the right-hand grip rule: curl your fingers in the direction of the induced current, and your thumb points from S to N inside the coil — so the current flows **anticlockwise** as viewed from the magnet side.\n- Step 3: This repulsion means you must do **work** to push the magnet in. That work is converted into the electrical energy of the induced current. If the coil attracted the magnet instead (S pole facing the incoming N), the magnet would accelerate in on its own — creating energy from nothing. Conservation of energy requires opposition, which is exactly Lenz's law.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}, {"question": "Why is the iron core of a transformer laminated (split into insulated slices), and what would happen if it were a single solid block? (3 steps)", "answer": "- Step 1: The iron core conducts electricity and sits inside a changing magnetic field. By Faraday's law, a changing flux through a conductor induces an EMF. In a solid block of iron, this EMF drives circulating currents called **eddy currents** — loops of current flowing within the iron itself.\n- Step 2: These eddy currents dissipate energy as heat ($$P = I^2R$$ heating). This is wasted energy that doesn't reach the secondary coil — it reduces the transformer's efficiency and can cause overheating.\n- Step 3: Lamination splits the core into thin, electrically insulated slices. Eddy currents are confined within each slice and cannot## Q1\n**Q:** A magnetic field has a flux density $$B$$ of 2 T. If you place a 1 m wire carrying 1 A perpendicular to this field, what force do you get, and how does this *define* the tesla? (2 steps)\n\n**A:** - Step 1: Using $$F = BIL \\sin \\theta$$ with $$\\theta = 90°$$ (perpendicular), $$\\sin 90° = 1$$, so $$F = 2 \\times 1 \\times 1 = 2$$ N. The force is directly proportional to $$B$$, $$I$$, and $$L$$.\n- Step 2: This is exactly how the tesla is defined: 1 T is the flux density that produces a force of 1 N on a 1 m wire carrying 1 A perpendicular to the field. So $$B = F/(IL)$$ is the defining equation, not just a rearrangement — the tesla is a *derived* unit built from newtons, amps, and metres.\n\nThe tesla is surprisingly strong: Earth's field is only ~0.032 mT, and a fridge magnet is ~5 mT. A 2 T field requires an electromagnet.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "The EMF of an AC generator is $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$. Where does the $$\\omega$$ in the amplitude come from physically, and what happens to both the amplitude and frequency of the output if you double the rotation speed? (3 steps)", "answer": "- Step 1: The flux linkage is $$N\\Phi = BAN\\cos(\\omega t)$$. By Faraday's law, $$\\varepsilon = -\\frac{d(N\\Phi)}{dt} = BAN\\omega\\sin(\\omega t)$$. The $$\\omega$$ appears because differentiating $$\\cos(\\omega t)$$ brings down a factor of $$\\omega$$ — faster rotation means the flux changes more rapidly, so the induced EMF is larger.\n- Step 2: If you double the rotation speed ($$\\omega \\to 2\\omega$$): the amplitude $$\\varepsilon_{\\max} = BAN\\omega$$ **doubles** (because the rate of flux change doubles), AND the frequency $$f = \\omega/(2\\pi)$$ also **doubles** (because the coil completes twice as many cycles per second).\n- Step 3: This is a key result: increasing rotation speed increases *both* the amplitude and frequency simultaneously. You cannot increase one without the other in a simple generator. The peak EMF is proportional to $$\\omega$$, and the frequency of the AC output equals the rotation frequency.\n\n+ Simple mental check: if $$f = 50$$ Hz gives $$\\varepsilon_{\\max} = 300$$ V, then $$f = 100$$ Hz gives $$\\varepsilon_{\\max} = 600$$ V. Both double.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "A student says: \"The magnetic flux through the coil is maximum, so the induced EMF must also be maximum.\" Is this correct? Explain why or why not using Faraday's law. (2 steps)", "answer": "- Step 1: This is **incorrect** — a common misconception. Faraday's law states $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$, meaning EMF depends on the *rate of change* of flux, not the *amount* of flux. Maximum flux means the flux is at a peak — but at a peak, the gradient is zero (the curve is flat), so the rate of change is zero and the EMF is zero.\n- Step 2: The correct statement is: maximum EMF occurs when the *rate of change* of flux is maximum — which happens when the coil is parallel to the field (flux = 0, but flux is changing fastest). Think of a hill: at the summit (maximum height), the slope is flat (zero gradient). On the flank (mid-height), the slope is steepest (maximum gradient). Flux is height; EMF is slope.\n\nMaximum flux = flat peak = zero EMF. Maximum EMF = steepest slope = zero flux. They are opposites, not twins.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "A charged particle enters a magnetic field. Under what condition does it (a) travel in a straight line, (b) travel in a circle, (c) travel in a helix? (3 steps)", "answer": "- Step 1: **Straight line**: velocity is *parallel* (or antiparallel) to $$\\vec{B}$$. Then $$F = QvB\\sin(0) = 0$$ — no force, no deflection.\n- Step 2: **Circle**: velocity is *perpendicular* to $$\\vec{B}$$. Force is always ⊥ v, does no work, acts as centripetal → circular motion of radius $$r = mv/(BQ)$$.\n- Step 3: **Helix**: velocity has both parallel and perpendicular components. The perpendicular component causes circular motion; the parallel component drifts along the field lines → the trajectory spirals along $$\\vec{B}$$.\n\nApplication: charged particles in the Van Allen belts and solar wind spiral along Earth's magnetic field lines — this is exactly case (c).", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Magnetic flux density $$B$$ is defined operationally via the force on a current-carrying conductor. Why is an operational definition necessary, and what is the defining equation rearranged for $$B$$? (3 steps)", "answer": "- Step 1: An operational definition anchors an abstract quantity to a measurable procedure. We can't directly \"see\" $$B$$, but we *can* measure the force on a wire of known length carrying a known current perpendicular to a field. This makes $$B$$ experimentally meaningful.\n- Step 2: Starting from the force equation for a perpendicular conductor: $$F = BIL$$. Rearranging gives the defining equation: $$B = \\frac{F}{IL}$$. This tells us: 1 tesla is the flux density that produces 1 newton of force on 1 metre of wire carrying 1 ampere perpendicular to the field.\n- Step 3: The units confirm this: $$\\text{T} = \\text{N}/(\\text{A·m})$$. Typical reference values: Earth's field ≈ $$3.2 \\times 10^{-5}$$ T (very weak), fridge magnet ≈ $$5 \\times 10^{-3}$$ T. These give you an order-of-magnitude sense for \"weak\" vs \"everyday\" fields.\n\nThe key insight: $$B$$ is not defined by how many field lines you draw, but by the *force* those lines produce on a test current.", "source": "GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "Give a physical explanation for why a laminated iron core reduces eddy current losses more than a solid iron core, in terms of induced current paths. (3 steps)", "answer": "- Step 1: In a solid iron core, the changing magnetic flux induces circulating currents (eddy currents) throughout the entire cross-section. These loops can be large, spanning the width of the core.\n- Step 2: Power dissipated by eddy currents scales roughly as $$V^2/R$$ where $$V$$ is the induced EMF and $$R$$ is the resistance of the eddy loop. Larger loops → lower resistance → more power dissipated.\n- Step 3: Laminating breaks the core into thin insulated slices — the eddy currents are now forced into much smaller loops within each lamination.\n+ Smaller loop area → smaller induced EMF (less flux enclosed).\n+ Longer, thinner path → higher resistance.\n+ Result: dramatically less power dissipated as heat.\n\nAnalogy: like breaking a highway into narrow country lanes — traffic (current) can still flow, but much less efficiently.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "What is the physical distinction between magnetic flux $$\\Phi$$ and magnetic flux linkage $$N\\Phi$$, and why does the number of turns $$N$$ matter for a coil but not for a single loop? (2 steps)", "answer": "- Step 1: Magnetic flux $$\\Phi = BA\\cos\\theta$$ is the field threading a *single* area. It answers: \"how much field passes through this one loop?\" Flux linkage $$N\\Phi = BAN\\cos\\theta$$ is the total flux threading *all* turns of a coil. Each turn captures the same flux, so the total \"flux experience\" of the coil is $$N$$ copies of $$\\Phi$$.\n- Step 2: The distinction matters for induction. Faraday's law states $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$, not $$-\\frac{d\\Phi}{dt}$$. Each turn contributes its own induced EMF, and in a coil the EMFs add. A 100-turn coil in the same changing flux induces 100× the EMF of a single loop. This is why generators and transformers use many turns — it amplifies the output voltage.\n\nUnits distinction: flux is in weber (Wb); flux linkage is in weber-turns (Wb turns). They are not interchangeable.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "Synthesis: A student says \"In a transformer, the primary voltage creates the secondary voltage.\" Critique this statement using the correct causal chain. (3 steps)", "answer": "- Step 1: The statement is imprecise and misses the key intermediate steps. The primary voltage doesn't directly create the secondary voltage — there is no electrical connection between the coils.\n- Step 2: The correct chain: primary **voltage** → primary **current** → changing **magnetic field** in the core → changing **flux linkage** in the secondary → **induced EMF** in the secondary (Faraday's law). The voltage is induced by the *changing flux*, not by the primary voltage itself.\n- Step 3: The distinction matters because: (a) DC voltage would give a primary current but NO induced secondary voltage (no changing flux); (b) if the core were removed, the primary voltage and current would still exist, but the flux linkage to the secondary would be too weak to induce useful voltage. The chain requires every link, especially the *changing* magnetic field.\n\nExam answers must show the full chain with the word \"change\" or \"changing\" at each stage.", "source": "GLM 5.1 ②", "_id": "glm_2_70"}, {"question": "Why does flux vary as $$\\cos\\theta$$ where $$\\theta$$ is the angle between the field and the *normal* to the area, rather than the angle between the field and the area itself? (2 steps)", "answer": "- Step 1: Flux counts field lines passing *through* the surface. What matters is the component of $$\\vec{B}$$ perpendicular to the surface — because a field line parallel to the surface never crosses it. The natural way to describe \"perpendicular to a surface\" is the surface's normal vector.\n- Step 2: When $$\\vec{B}$$ is aligned with the normal ($$\\theta=0$$), every field line crosses the surface → maximum flux $$\\Phi = BA$$. When $$\\vec{B}$$ is perpendicular to the normal ($$\\theta=90°$$), it's parallel to the surface → no lines cross → $$\\Phi=0$$. The projection is $$B\\cos\\theta$$, giving $$\\Phi = BA\\cos\\theta$$.\n\nCommon trap: students often plug in \"the angle between field and coil plane\" — this gives $$\\sin\\theta$$ instead. Always draw the normal.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "Walk through the five-stage causal chain of how a transformer transfers energy, in the exact order required at A-level. (5 steps)", "answer": "- Step 1: An **alternating input voltage** is applied across the primary coil. (Must be AC; DC produces no output.)\n- Step 2: This drives an **alternating current** in the primary coil — electrons oscillate back and forth rather than flowing steadily.\n- Step 3: The alternating current produces an **alternating (changing) magnetic field** around the primary coil / inside the iron core.\n- Step 4: The iron core channels this changing magnetic field to the secondary coil, producing a **changing magnetic flux linkage** in the secondary.\n- Step 5: By Faraday's law, the changing flux linkage **induces an alternating EMF** in the secondary. If the secondary forms a complete circuit, this drives an alternating current in the load — at the same frequency as the input.\n\nKey phrase: no electrical connection between the coils — energy transfers purely via the magnetic field in the core.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "A student claims that in a transformer, \"the primary current directly flows through the iron core to reach the secondary.\" Explain why this is physically impossible and what actually connects the two coils. (2 steps)", "answer": "- Step 1: The primary and secondary coils are *electrically insulated* from each other and from the iron core. The iron core is laminated (each slice insulated from the next), and the coils are wound around the core but not connected to it. No charge can flow from primary to secondary through any conducting path — there is no electrical connection whatsoever.\n- Step 2: What connects them is the **changing magnetic field**. The primary's alternating current creates a changing field in the core; this changing field reaches the secondary and induces an EMF there by Faraday's law. The coupling is *magnetic*, not *electrical*. The iron core is a channel for *flux*, not for *current* — it's a magnetic bridge, not an electrical wire.\n\nThe iron core carries *field lines*, not *charge carriers*. The two coils talk through magnetism, not through electricity.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "A rectangular coil is rotated in a uniform field. At what orientation is the flux linkage maximum, and at what orientation is the *induced EMF* maximum? Why are these different? (3 steps)", "answer": "- Step 1: Flux linkage is maximum when the coil's normal is parallel to $$\\vec{B}$$ — i.e. the coil face is perpendicular to the field. Here $$N\\Phi = BAN$$.\n- Step 2: But induced EMF depends on the *rate of change* of flux linkage, not the linkage itself. At maximum flux, the coil is momentarily \"at the top\" — flux is at a turning point, so $$d(N\\Phi)/dt = 0$$ → EMF is zero.\n- Step 3: EMF peaks when the coil plane is *parallel* to $$\\vec{B}$$ (normal ⊥ field). Here flux linkage is zero, but the coil is sweeping through field lines at maximum rate → $$d(N\\Phi)/dt$$ is maximal → $$\\varepsilon_{\\max} = BAN\\omega$$.\n\nTakeaway: think of $$N\\Phi(t) = BAN\\cos(\\omega t)$$ and $$\\varepsilon(t) = BAN\\omega\\sin(\\omega t)$$ — they're 90° out of phase, so maxima of one coincide with zeros of the other.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "In the transformer causal chain, students often skip from \"AC in primary\" straight to \"AC in secondary.\" Why is this wrong, and what phrase captures the missing physics? (3 steps)", "answer": "- Step 1: There is no direct electrical connection between the primary and secondary coils. Skipping steps ignores the fact that the energy has to *cross a gap*.\n- Step 2: The missing physics: the *magnetic field* (channelled by the iron core) is what transfers energy between the coils. The primary's changing current creates a changing magnetic field; the secondary experiences a changing flux linkage; Faraday's law induces an EMF.\n- Step 3: Key phrase for exam credit: \"**changing magnetic flux linkage** induces an EMF in the secondary.\" Omitting the words \"change\" and \"flux linkage\" loses marks — examiners specifically check for this vocabulary.\n\nCommon trap: writing \"the current in the primary produces a current in the secondary\" — no! Only the *field* mediates the transfer, and only *change* in that field.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "For an ideal transformer, $$I_1 V_1 = I_2 V_2$$. Combine this with the turns ratio to show that the current ratio is the **inverse** of the turns ratio. Why does stepping up voltage step down current? (3 steps)", "answer": "- Step 1: From power conservation: $$I_1 V_1 = I_2 V_2$$, so $$\\frac{I_1}{I_2} = \\frac{V_2}{V_1}$$. From the turns ratio: $$\\frac{V_1}{V_2} = \\frac{N_1}{N_2}$$, so $$\\frac{V_2}{V_1} = \\frac{N_2}{N_1}$$.\n- Step 2: Substituting: $$\\frac{I_1}{I_2} = \\frac{N_2}{N_1}$$. The current ratio is the **inverse** of the turns ratio. If the secondary has twice as many turns ($$N_2 = 2N_1$$), then $$I_2 = I_1/2$$ — the secondary current is half the primary current.\n- Step 3: Physically: power must be conserved ($$P = IV$$). If you double the voltage, you must halve the current to deliver the same power. The transformer doesn't create energy — it trades voltage for current (or vice versa). More turns → more voltage per turn → higher $$V$$ → lower $$I$$ for the same power.\n\nThis inverse relationship is crucial for the National Grid: step up voltage → step down current → reduce heating losses.", "source": "GLM 5.1 ②", "_id": "glm_2_40"}, {"question": "Why is it important to state that the induced *voltage* comes first in electromagnetic induction, and current only follows if the circuit is complete? (3 steps)", "answer": "- Step 1: Induction is fundamentally about EMF — an electrical \"push\" created by changing flux linkage. This push exists whether or not any charge can move.\n- Step 2: If the coil ends are open (no complete circuit), there's still an induced voltage across the ends — you could measure it with a high-impedance voltmeter — but no current flows because there's no path.\n- Step 3: Only when the circuit is closed does current flow, driven by the induced EMF: $$I = \\varepsilon/R$$. So the causal order is: changing flux → induced EMF → *if closed circuit* → induced current.\n\nExam tip: examiners look for the word \"induced\" and the distinction between \"EMF is induced\" and \"current flows.\" Saying \"current is induced\" without a complete circuit loses marks.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "The magnetic flux through a rotating coil is $$\\Phi = BA\\cos(\\omega t)$$ and the induced EMF is $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$. How are these two equations related mathematically, and what does this relationship tell you about the *phase* difference between flux and EMF? (2 steps)", "answer": "- Step 1: The EMF is the *negative derivative* of the flux linkage with respect to time: $$\\varepsilon = -\\frac{d(N\\Phi)}{dt} = -\\frac{d(BAN\\cos(\\omega t))}{dt} = -BAN \\times (-\\omega\\sin(\\omega t)) = BAN\\omega\\sin(\\omega t)$$. The EMF is literally the gradient of the flux-linkage curve — mathematically, the derivative of a cosine is a sine (with a sign flip from Lenz's law that cancels the negative from the derivative of cosine).\n- Step 2: This means flux and EMF are **90° out of phase** (a quarter-cycle apart). When flux peaks (cosine = 1, at $$\\omega t = 0$$), EMF is zero (sine = 0). When flux is zero (cosine = 0, at $$\\omega t = \\pi/2$$), EMF peaks (sine = 1). The EMF *leads* the flux by 90° — it peaks *before* the flux peaks, just as velocity leads displacement by 90° in simple harmonic motion.\n\nFlux and EMF are like position and velocity in SHM — they're 90° apart because one is the derivative of the other.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "A solenoid with $$N$$ turns sits perpendicular to a uniform field $$B$$, each turn having area $$A$$. What is its flux linkage, and why does multiplying by $$N$$ make physical sense rather than just being a bookkeeping convention? (2 steps)", "answer": "- Step 1: Flux linkage is $$N\\Phi = BAN$$ (when perpendicular, $$\\cos\\theta = 1$$). The unit is weber-turns (Wb turns), not just weber — because it accounts for the total flux threading *all* the turns combined.\n- Step 2: The physical reason: each turn of the coil is a separate loop that the field lines pass through. If $$N = 300$$ turns each intercepting flux $$\\Phi = BA$$, the *total* flux threading the entire coil is 300 times that — the field lines go through 300 separate loops. This matters for induction because Faraday's law involves the *total* changing flux linkage $$N\\Phi$$, not just the flux through one turn. More turns = more \"gates\" for the field to pass through = more total EMF when the flux changes.\n\nFlux linkage is the *collective* flux through all turns — it's why solenoids are better at induction than single loops.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "The gradient of a flux-linkage-vs-time graph gives the magnitude of the induced EMF. Sketch what a flux-linkage graph looks like for a coil rotating at constant speed, and mark where the EMF is maximum and zero on the same time axis. (3 steps)", "answer": "- Step 1: The flux linkage follows $$N\\Phi = BAN\\cos(\\omega t)$$ — a cosine curve. It starts at maximum (coil perpendicular to field), drops to zero (coil parallel), goes to negative maximum (coil perpendicular but flipped), returns to zero, and cycles back to positive maximum. A smooth oscillation between $$+BAN$$ and $$-BAN$$.\n- Step 2: The EMF is $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$ — a sine curve. It starts at zero (where the cosine is at its peak and the gradient is flat), rises to maximum (where the cosine crosses zero and the gradient is steepest), drops back to zero, goes to negative maximum, and cycles. The EMF curve is the *derivative* of the flux curve — it's 90° ahead.\n- Step 3: On the time axis: EMF is **maximum** at the moments where the flux curve crosses zero (steepest slope — the coil is parallel to the field). EMF is **zero** at the moments where the flux curve is at its peaks (flat slope — the coil is perpendicular to the field). The two curves are like displacement and velocity in SHM: they never peak at the same time.\n\nFlux is cosine (peaks at turning points). EMF is sine (peaks at zero-crossings). They're always a quarter-cycle apart.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "Why is the induced EMF in a rotating coil sinusoidal, and what determines its amplitude and frequency? (3 steps)", "answer": "- Step 1: A coil rotating at angular frequency $$\\omega$$ has flux linkage $$N\\Phi(t) = BAN\\cos(\\omega t)$$ — the geometric projection of the field onto the coil's normal traces out a cosine as the coil turns.\n- Step 2: Taking the rate of change: $$\\varepsilon = -d(N\\Phi)/dt = BAN\\omega\\sin(\\omega t)$$. So the EMF is a sine wave.\n- Step 3: Amplitude $$\\varepsilon_{\\max} = BAN\\omega$$ scales with:\n+ $$B$$ (stronger field → more flux swept)\n+ $$A$$ (bigger coil → more area)\n+ $$N$$ (more turns → each contributes)\n+ $$\\omega$$ (faster rotation → higher rate of change)\n\nFrequency of the AC output equals the rotation frequency of the coil.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "In a simple DC motor, what would happen if the split-ring commutator was replaced with slip rings, and why? (2 steps)", "answer": "- Step 1: The motor would oscillate back and forth and likely get stuck. Without the commutator swapping the current direction, the force on the coil would reverse every half turn.\n- Step 2: The coil would rotate for the first half turn due to the magnetic force. But as it passes the vertical position, the current direction stays the same while the coil's orientation flips, causing the force to act in the opposite direction, pushing the coil back the way it came. The commutator prevents this by reversing the current at the exact moment the coil passes the vertical, ensuring the force always pushes in the same rotational direction.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "For a generator’s induced EMF, why is the peak EMF maximum when the coil is parallel to the magnetic field (flux Φ = 0)? (3 steps)", "answer": "- Step 1: Induced EMF depends on **rate of change of flux** (ε ∝ ΔΦ/Δt), not flux magnitude.  \n- Step 2: When the coil is parallel to the field (Φ = 0), it’s moving **perpendicular to field lines** ⇒ fastest flux change (max dΦ/dt).  \n- Step 3: At Φ = maximum (coil ⊥ field), the coil’s motion is tangential ⇒ dΦ/dt = 0 ⇒ EMF = 0.  \n\n+ Visual intuition: Imagine a car speeding through a tunnel (flux change) vs. parked (no change).  \n\n**Takeaway:** Peak EMF occurs where flux changes most rapidly, not where flux is largest.", "source": "Qwen 3 ①", "_id": "qwen_1_5"}, {"question": "How do you reverse the direction of rotation of a DC motor, and how do you increase its speed? (2 steps)", "answer": "- Step 1: **Reverse direction**: swap the battery polarity (reverse the current direction). If current reverses, the force on each side of the coil reverses (Fleming's LHR), so the torque reverses, and the coil spins the other way. Alternatively, you could reverse the field direction (swap the magnet poles), but reversing the current is simpler.\n- Step 2: **Increase speed**: increase the current (stronger battery, lower resistance, or more turns). Stronger current → stronger force ($$F = BIL$$) → greater torque → faster rotation. In permanent-magnet motors, $$B$$ is fixed, so speed scales with current. In motors with electromagnet stators, you can also strengthen the field for even more force.\n\nNote: you cannot change speed by changing the field *alone* in a permanent-magnet motor — the field is fixed by the magnets.", "source": "GLM 5.1 ②", "_id": "glm_2_47"}, {"question": "A rectangular coil (350 turns, area 4.9 × 10⁻⁴ m²) in an 80 mT field is rotated from horizontal (field parallel to coil) to vertical (field perpendicular) in 0.18 s. What average EMF is induced? Walk through the reasoning. (3 steps)", "answer": "- Step 1: Initial flux linkage: coil is horizontal, field is parallel to the coil plane → the field is along the coil, not through it → $$\\theta = 90°$$ to the normal → $$N\\Phi_{initial} = BAN\\cos 90° = 0$$. Final flux linkage: coil is vertical, field is perpendicular to the coil → $$\\theta = 0°$$ → $$N\\Phi_{final} = BAN = 80 \\times 10^{-3} \\times 4.9 \\times 10^{-4} \\times 350 = 0.014$$ Wb turns.\n- Step 2: Change in flux linkage: $$\\Delta(N\\Phi) = 0.014 - 0 = 0.014$$ Wb turns. Time: $$\\Delta t = 0.18$$ s.\n- Step 3: Average EMF: $$\\varepsilon = \\frac{\\Delta(N\\Phi)}{\\Delta t} = \\frac{0.014}{0.18} \\approx 0.076$$ V. This is the *average* EMF over the 0.18 s interval — the instantaneous EMF would vary during the rotation.", "source": "GLM 5.1 ②", "_id": "glm_2_53"}, {"question": "A coil rotates in a uniform magnetic field. At the instant the coil is perpendicular to the field (maximum flux), the induced EMF is zero. At the instant the coil is parallel to the field (zero flux), the EMF is maximum. Explain why maximum flux and maximum EMF never coincide. (3 steps)", "answer": "- Step 1: Faraday's law: $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$. The EMF depends on the *rate of change* of flux, not the flux itself. This is the crucial distinction.\n- Step 2: When the coil is perpendicular to the field, $$\\Phi$$ is at its peak value. At a maximum of any smooth curve, the gradient (rate of change) is zero — think of the top of a sine wave, where it momentarily flattens. So $$d\\Phi/dt = 0$$, and $$\\varepsilon = 0$$. The flux is large but *not changing*.\n- Step 3: When the coil is parallel to the field, $$\\Phi$$ is passing through zero. A sine wave crosses zero with its *steepest* gradient — the flux is changing most rapidly at this instant. So $$d\\Phi/dt$$ is maximum, and $$\\varepsilon$$ is maximum. The flux is zero but *changing the fastest*.\n\n+ Misconception probe: \"More flux means more EMF\" — wrong. More *change* in flux means more EMF. This is the single most tested concept in generator questions.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "A bar magnet is pushed N-pole-first into a coil. By Lenz's law, what pole does the near face of the coil become, and what physical effect does this have on the magnet? (3 steps)", "answer": "- Step 1: As the N pole approaches the coil, the flux through the coil is *increasing* (more field lines threading the coil). By Lenz's law, the induced current must oppose this increase — so the coil must create a magnetic field that *reduces* the incoming flux.\n- Step 2: To oppose an incoming N pole, the near face of the coil must itself become a **N pole** (N–N repulsion pushes back against the approaching magnet). Using the right-hand grip rule: if you view the coil from the magnet's side and the near face is N, your thumb points toward the magnet (N pole), and your fingers curl **anticlockwise** — that's the direction of the induced current (viewed from the magnet side).\n- Step 3: The physical effect: the coil exerts a **repulsive force** on the magnet, opposing its motion. You have to *push harder* to keep moving the magnet in — that extra mechanical work you do is exactly the energy that ends up as electrical energy in the induced current. When you pull the magnet *out*, the flux decreases, so the near face becomes S (to try to keep the magnet), and the coil *attracts* the magnet — you have to *pull harder* to remove it.\n\nLenz's law always makes you work harder — the resistance to change is the price you pay to extract electrical energy.", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "Fleming's right-hand rule is used for generators, and the left-hand rule for motors. What is the physical reason for this distinction — why can't you use the same hand for both? (3 steps)", "answer": "- Step 1: In a **motor**, you supply current through a field and get *force* (motion). Known: current and field. Unknown: force direction. The left-hand rule maps these three vectors correctly for the motor effect.\n- Step 2: In a **generator**, you supply motion through a field and get *induced current*. Known: motion and field. Unknown: current direction. The right-hand rule maps these correctly for the generator effect. The induced current flows in the direction that would create a force *opposing* the motion (Lenz's law).\n- Step 3: If you used the same hand for both, Lenz's law would be violated — the generator would produce current that *helps* the motion rather than opposing it. The switch from left to right hand is precisely the geometric expression of Lenz's law: the induced current creates a force that opposes the motion that created it, which flips one axis relative to the motor case.\n\n+ Memory aid: **Left = motor** (current → force), **Right = generator** (motion → current). \"You drive a motor with your left, you generate with your right.\"", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "Why do we need the concept of \"flux linkage\" $$N\\Phi$$ instead of just flux $$\\Phi$$? What physical difference does having more turns make? (2 steps)", "answer": "- Step 1: A single turn of wire cutting through changing flux gets one induced EMF. But if you have $$N$$ turns, each turn experiences the same changing flux, and the EMFs add up — each turn is like an additional battery in series. So the total induced EMF scales with $$N$$.\n- Step 2: Flux linkage $$N\\Phi = BAN$$ captures this. Faraday's law is $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$, not just $$-\\frac{d\\Phi}{dt}$$. Doubling the turns doubles the flux linkage and therefore doubles the induced EMF (for the same rate of change). This is why generator coils and transformer coils have many turns rather than one.\n\nUnit: weber-turns (Wb turns) — it's not just weber, because the number of turns is dimensionless but physically significant.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "Lenz's law states that the induced current opposes the change that produced it. Explain how this is a consequence of conservation of energy, not just an arbitrary rule. (3 steps)", "answer": "- Step 1: Suppose Lenz's law were violated — suppose the induced current *reinforced* the change instead of opposing it. Then: you push a magnet toward a coil → the coil's induced current creates a magnetic field that *pulls the magnet in faster* → the faster-moving magnet induces an even larger current → which pulls the magnet even faster → runaway positive feedback.\n- Step 2: This would mean you could extract unlimited electrical energy from a tiny initial push. That violates conservation of energy. The induced current would be creating energy from nothing.\n- Step 3: Lenz's law prevents this: the induced current creates a force that *opposes* the motion, so you must do mechanical work against that opposing force. The electrical energy produced equals the mechanical work you put in. Energy is conserved. The minus sign in $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$ is nature's way of enforcing this.\n\n+ Concrete example: pushing a N pole into a coil induces a current that creates a N pole on the near face — N–N repulsion means you must push *against* a repulsive force. The harder you push, the more current is induced, and the harder you must work.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "Why is it that when you push a magnet into a coil, you feel resistance — the magnet seems to be \"pushed back\"? Connect this to Lenz's law and energy conservation. (3 steps)", "answer": "- Step 1: As you push the magnet in, the changing flux induces a current in the coil (Faraday's law). By Lenz's law, this current creates a magnetic field that **opposes** the change — if you're pushing a N pole in, the coil's near face becomes N, repelling the magnet.\n- Step 2: You must do **work** against this repulsive force to keep pushing the magnet in. The work you do is converted into the electrical energy of the induced current (and eventually heat in the coil's resistance).\n- Step 3: This is conservation of energy made manifest. The electrical energy doesn't come from nowhere — it comes from your mechanical work. If Lenz's law didn't hold (if the coil attracted the magnet instead), the magnet would accelerate on its own, generating increasing current from nothing — a perpetual motion machine. The \"resistance\" you feel is the price of creating electrical energy.", "source": "GLM 5.1 ②", "_id": "glm_2_69"}, {"question": "For an ideal transformer, $$I_1 V_1 = I_2 V_2$$. Combine this with the turns ratio to show that the current ratio is the *inverse* of the turns ratio, and explain physically why stepping up voltage must step down current. (3 steps)", "answer": "- Step 1: From power conservation: $$I_1 V_1 = I_2 V_2$$, so $$\\frac{I_1}{I_2} = \\frac{V_2}{V_1}$$. From the turns ratio: $$\\frac{V_2}{V_1} = \\frac{N_2}{N_1}$$. Substituting: $$\\frac{I_1}{I_2} = \\frac{N_2}{N_1}$$. The current ratio is the **inverse** of the turns ratio.\n- Step 2: Physical reasoning: if you step up the voltage (more turns on secondary), each coulomb of charge delivers more energy ($$V$$ is energy per coulomb). But the total power is fixed (conservation of energy). So if each coulomb carries more energy, fewer coulombs per second are needed — the current must decrease.\n- Step 3: This is the whole point of the National Grid: step up voltage → step down current → reduce $$I^2R$$ heating losses in cables. You're trading high current (which wastes energy as heat) for high voltage (which doesn't heat the wires).\n\n+ Simple check: if a step-up transformer doubles the voltage ($$V_2 = 2V_1$$), it halves the current ($$I_2 = I_1/2$$). Power is conserved: $$I_1 V_1 = (I_1/2)(2V_1) = I_1 V_1$$. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "A U-magnet sits on a balance (zeroed). A wire between the poles carries current left-to-right, and the balance now reads +161 g (a downward force on the balance). By Newton's 3rd law, what is the direction of the force on the wire, and why? (3 steps)", "answer": "- Step 1: The balance reads the force the magnet+wire system exerts *on the balance pan*. A positive reading means a **downward** force on the balance — the magnet is pushing down harder.\n- Step 2: By Newton's 3rd law, the force on the balance from the magnet is equal and opposite to the force on the magnet from the wire. If the magnet is pushed down, the wire must be pushing the magnet down — which means the magnet is pushing the wire **up** (action-reaction pair).\n- Step 3: So the force on the wire is **upward**. Using Fleming's LHR: thuMb up (force), seCond finger right (current L→R) → First finger (field) must point **into the page**. This tells you the magnetic field direction between the poles.\n\nThe key insight: the balance measures the reaction force, not the action force directly. Newton's 3rd law flips the direction.", "source": "GLM 5.1 ②", "_id": "glm_2_46"}, {"question": "Why is the iron core of a transformer made of laminated slices (like a loaf of bread) rather than a single solid block of iron? (3 steps)", "answer": "- Step 1: The changing magnetic field in the core can induce circulating currents within the iron itself, as iron is a conductor. These are called **eddy currents**.\n- Step 2: Eddy currents dissipate energy as heat ($$I^2R$$ losses), reducing the transformer's efficiency.\n- Step 3: Laminating the core with insulating layers between the slices restricts the eddy currents to small, individual loops. This increases the electrical resistance of the core to these circulating currents, drastically reducing their size and the resulting heat loss.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "Sketch conceptually the flux-linkage-vs-time graph and the induced-EMF-vs-time graph for a rotating coil. What's the geometric relationship between them? (3 steps)", "answer": "- Step 1: Flux linkage traces $$N\\Phi(t) = BAN\\cos(\\omega t)$$ — a cosine wave oscillating between $$+BAN$$ and $$-BAN$$.\n- Step 2: EMF traces $$\\varepsilon(t) = BAN\\omega\\sin(\\omega t)$$ — a sine wave. It's 90° out of phase with the flux linkage.\n- Step 3: Geometric relationship:\n+ EMF is the *negative gradient* (slope) of the flux graph.\n+ Where flux is at a maximum or minimum (flat top/bottom), EMF = 0.\n+ Where flux crosses zero (steepest slope), $$|EMF|$$ is maximal.\n+ EMF amplitude scales with $$\\omega$$: faster rotation makes the flux graph \"steeper\" everywhere.\n\nVisual takeaway: draw a cosine on top, and its derivative (the sine, flipped) below — that's exactly the flux/EMF relationship.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "How does laminating the iron core in a transformer reduce energy losses? (3 steps)", "answer": "- Step 1: A solid iron core conducts eddy currents (induced by changing flux), which dissipate energy via I²R heating.  \n- Step 2: Laminations (insulated slices) disrupt eddy current paths ⇒ reduce their magnitude.  \n- Step 3: Energy loss ∝ I²R. Smaller eddy currents ⇒ drastically lower heating. Laminations act like \"insulating barriers\" for current flow.  \n\n+ Analogy: Laminated wood vs. solid steel—wood layers block crack propagation; laminated core blocks eddy currents.  \n\n**Takeaway:** Lamination minimizes eddy currents, preserving energy for useful magnetic coupling between coils.", "source": "Qwen 3 ①", "_id": "qwen_1_4"}, {"question": "A power station generates 200 MW. Compare the resistive losses when transmitting at 20 kV vs 200 kV over the same cable. Reason without exact numbers. (3 steps)", "answer": "- Step 1: Same power $$P = IV$$, so current at 20 kV is 10× the current at 200 kV. That's a factor of 10 in $$I$$.\n- Step 2: Losses scale as $$I^2R$$. So losses at 20 kV are $$10^2 = 100$$× larger than at 200 kV (for the same cable resistance $$R$$).\n- Step 3: Two orders of magnitude! This is why the National Grid pays the cost/complexity of transformers — they save enormous energy that would otherwise be wasted heating the atmosphere.\n\nRule of thumb: transmission losses scale as $$1/V^2$$ for a given power. High voltage is not a luxury — it's an economic necessity.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "A U-shaped magnet sits on an electronic balance, and a wire between its poles carries current left-to-right. The balance reads +161 g (a downward push on the balance pan). By Newton's third law, what is the direction of the force on the *wire*, and what does this reveal about the field direction between the poles? (3 steps)", "answer": "- Step 1: The balance reading of +161 g means the magnet is experiencing a *downward* force from the wire (the balance pan is being pushed down). By Newton's third law, the force on the wire must be the *opposite* — **upward**. The wire pushes the magnet down; the magnet pushes the wire up.\n- Step 2: Now apply Fleming's Left-Hand Rule to find the field direction. thuMb = Force on wire = **upward**. seCond finger = Current = **left-to-right**. First finger = Field must point **into the page** (perpendicular to both force and current). This means the north pole is at the back and the south pole is at the front — field goes from N to S, which is into the page.\n- Step 3: If the current were increased, the force $$F = BIL$$ would increase proportionally, and the balance reading would increase too (stronger downward push on the magnet, stronger upward push on the wire). This setup is a practical way to *measure* $$B$$ — by weighing the force on a known current in a known-length wire.\n\nNewton's third law makes the magnet and wire a force pair — what pushes one down pushes the other up.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "What is the key structural difference between an AC generator (alternator) and a DC generator (dynamo), and how does this produce their different outputs? (3 steps)", "answer": "- Step 1: An alternator uses two continuous *slip rings* — each brush stays connected to the same end of the coil throughout the rotation.\n- Step 2: A dynamo uses a *split-ring commutator* — a ring with a gap that reconnects the coil's two ends to opposite brushes every half-turn.\n- Step 3: In the alternator, when the coil flips direction of motion (each half-turn), the current in the external circuit reverses too → sinusoidal AC. In the dynamo, the commutator flips the connection at exactly the same moment the coil's motion flips, so the two flips cancel and the external current always flows the *same* way → bumpy DC (a rectified sine, all positive humps).\n\nInsight: the commutator is a mechanical rectifier.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "A step-down transformer has $$N_p = 4000$$, $$N_s = 100$$, $$V_p = 230$$ V. If the primary current is 2 A and efficiency is 95%, what is the secondary current? Walk through conceptually. (4 steps)", "answer": "- Step 1: Find secondary voltage from turns ratio: $$V_s = V_p \\times \\frac{N_s}{N_p} = 230 \\times \\frac{100}{4000} = 230 \\times 0.025 = 5.75$$ V. This is a step-down: far fewer secondary turns → much lower voltage.\n- Step 2: If ideal (100% efficient), power in = power out: $$I_p V_p = I_s V_s$$, so $$I_s = \\frac{I_p V_p}{V_s} = \\frac{2 \\times 230}{5.75} = 80$$ A. Step-down: lower voltage → higher current.\n- Step 3: But efficiency is 95%, meaning only 95% of input power reaches the output: $$P_{out} = 0.95 \\times P_{in}$$. So $$I_s V_s = 0.95 \\times I_p V_p$$.\n- Step 4: Therefore $$I_s = 0.95 \\times 80 = 76$$ A. The real current is slightly less than the ideal value because some power is lost to eddy currents, resistance, and hysteresis in the transformer.\n\nThe efficiency formula: $$\\eta = \\frac{P_{out}}{P_{in}} = \\frac{V_s I_s}{V_p I_p}$$. A real transformer always has $$\\eta < 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "In a real transformer with 95% efficiency, primary current 2 A, primary voltage 230 V, and turns ratio giving $$V_s = 5.75$$ V, would $$I_s$$ be higher or lower than the ideal case, and by roughly how much? (3 steps)", "answer": "- Step 1: Ideal case: $$I_p V_p = I_s V_s$$, so $$I_s^{ideal} = 2 \\times 230 / 5.75 = 80$$ A.\n- Step 2: Real efficiency of 95% means 5% of the input power is lost (in copper heating, eddy currents, hysteresis, and flux leakage) — so $$P_{out} = 0.95 P_{in}$$.\n- Step 3: Therefore $$I_s^{real} = 0.95 \\times 80 = 76$$ A — slightly *lower* than ideal, because some of the incoming energy never makes it to the secondary circuit.\n\nKey point: efficiency losses always reduce the output current (for a fixed voltage ratio). The turns-ratio voltage relation still holds accurately, but power conservation acquires a correction factor.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "A simple DC motor uses a split-ring commutator. Explain why the commutator is essential for continuous rotation — what would happen without it? (3 steps)", "answer": "- Step 1: In a motor, current flows through a coil in a magnetic field, creating a force that rotates the coil (Fleming's LHR). Without a commutator, the current direction in the coil stays fixed. As the coil passes the vertical position (half-turn), the sides of the coil that were being pushed up are now being pushed down — but since the current hasn't reversed, the force now *opposes* continued rotation.\n- Step 2: The commutator reverses the current direction in the coil every half-turn, at exactly the moment the coil passes the vertical. This ensures that the force on each side of the coil always acts to continue rotation in the same direction, rather than trying to reverse it.\n- Step 3: Without the commutator, the coil would oscillate back and forth around the vertical position (like a pendulum) rather than spinning continuously. The commutator converts the oscillation into unidirectional rotation by \"flipping\" the current at the right moment.\n\n+ The commutator in a motor serves the same physical role as in a dynamo — it swaps connections every half-turn. In a motor, it ensures continuous torque; in a generator, it ensures unidirectional external current.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "An electron (negative charge) moves to the *right* in a magnetic field pointing *into the page*. You apply Fleming's Left-Hand Rule. Which way do you point your second finger, and why is this different from pointing it in the direction the electron physically moves? (2 steps)", "answer": "- Step 1: Fleming's Left-Hand Rule uses *conventional current* — the flow of *positive* charge. An electron moving right is equivalent to a conventional current moving *left* (positive charges would flow opposite to the electrons). So you point your second finger (Current) to the **left**, not to the right.\n- Step 2: With First finger (Field) pointing into the page and seCond finger (Current) pointing left, your thuMb (Force) points **downwards**. The electron is pushed downward initially, then curves into a circular path. If you had mistakenly pointed the second finger right (following the electron's actual motion), you'd get the wrong force direction — upward instead of downward.\n\nFor negative charges, the second finger always points *opposite* to the particle's velocity — conventional current is the \"anti-electron\" direction.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "Faraday's law states $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$. What does the \"rate of change\" part mean physically, and what does the minus sign represent? (3 steps)", "answer": "- Step 1: The \"rate of change\" $$\\frac{d(N\\Phi)}{dt}$$ means the *gradient* of the flux-linkage-vs-time graph. If flux linkage is changing rapidly (steep gradient), the induced EMF is large. If flux linkage is changing slowly (gentle gradient), the EMF is small. If flux linkage is constant (flat graph), the EMF is zero — regardless of how large the flux itself is.\n- Step 2: The minus sign represents **Lenz's law**: the induced EMF drives a current whose magnetic field *opposes* the change in flux that created it. If flux is increasing, the induced current creates a field that tries to *reduce* the flux. If flux is decreasing, the induced current tries to *maintain* it.\n- Step 3: This is not just a mathematical convention — it's *conservation of energy*. If the induced current *reinforced* the change (no minus sign), you'd get a runaway feedback loop: more change → more current → more change → more current → infinite energy from nothing. Lenz's law ensures you must always *do work* (push the magnet, rotate the coil) to sustain the induced current — the opposition means energy is conserved.\n\nThe minus sign is nature's way of saying: \"you can't get free energy — the induced current always fights you.\"", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "Why does a laminated core reduce eddy current losses more effectively than a solid core? (3 steps)", "answer": "- Step 1: In a solid iron core, the changing flux induces circulating (eddy) currents in loops throughout the bulk of the metal. These currents dissipate power as $$I^2R$$ heat.\n- Step 2: Laminating the core (thin insulated slices) means eddy currents can no longer form large loops across the whole core — they're confined to individual thin layers.\n- Step 3: In each thin layer, the induced EMF is smaller (smaller area → less flux enclosed → smaller $$d\\Phi/dt$$) and the resistance around the loop is larger. Both effects together reduce eddy current power dissipation dramatically.\n\nTakeaway: laminations break the electrical continuity of the core without breaking its magnetic continuity — huge win.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "In the National Grid, power is transmitted from a power station at ~40 kV, stepped up to ~250 kV for long-distance transmission, then stepped down to 230 V for homes. Why not just transmit at 230 V directly and avoid the transformers altogether? (2 steps)", "answer": "- Step 1: If you transmitted at 230 V directly, the current would be enormous. For a power station delivering, say, 1 MW: at 230 V, $$I = P/V = 1\\,000\\,000/230 \\approx 4350$$ A. At 250 kV: $$I = 1\\,000\\,000/250\\,000 = 4$$ A. The current at low voltage is over a *thousand times* larger.\n- Step 2: The heating loss in the cables is $$P_{loss} = I^2 R$$, so it scales with the *square* of current. A thousand-fold increase in current means a *million-fold* increase in heating loss. At 230 V, virtually all the power station's output would be wasted as heat in the transmission lines before reaching any home. Stepping up to 250 kV slashes the current and therefore slashes the $$I^2R$$ loss to a manageable fraction — that's the entire point of high-voltage transmission.\n\nLow voltage = huge current = catastrophic $$I^2R$$ loss. High voltage = tiny current = minimal loss. Transformers make long-distance power delivery possible.", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "Why can't a step-up transformer be used to increase power? (3 steps)", "answer": "- Step 1: A transformer's fundamental principle is *energy conservation*: $$P_{out} \\leq P_{in}$$, with equality for ideal transformers. It cannot create energy from nothing.\n- Step 2: What a step-up transformer changes is the *ratio* of voltage to current, not their product. Increased voltage comes at the cost of decreased current: $$V_p I_p = V_s I_s$$.\n- Step 3: In fact, real transformers *lose* a small amount of power to heat and flux leakage, so $$P_{out} < P_{in}$$ strictly. You get more voltage but less current — total power stays the same (or slightly less).\n\nCommon misconception: \"step-up\" refers only to voltage, not power. Confusing the two is a classic exam trap.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "State the five-stage transformer causal chain in the correct A-level exam order, starting from the AC input voltage. (5 steps)", "answer": "- Step 1: An **alternating input voltage** is applied across the primary coil (must be AC — DC gives no changing flux).\n- Step 2: This drives an **alternating current** in the primary coil (electrons oscillate back and forth, not flowing one way).\n- Step 3: The alternating current creates a **changing (alternating) magnetic field** in the primary coil and iron core (constant current would give constant field → no induction).\n- Step 4: The changing magnetic field links through the iron core to the secondary coil, producing a **changing flux linkage** in the secondary.\n- Step 5: By Faraday's law, the changing flux linkage **induces an alternating voltage** in the secondary coil. If the secondary is in a complete circuit, this drives an **alternating current** (same frequency as input).\n\nKey: every stage must mention \"changing\" or \"alternating.\" A constant DC at stage 1 kills the chain at stage 3 — no changing field, no induction.", "source": "GLM 5.1 ②", "_id": "glm_2_37"}, {"question": "An electron moves at right angles to a magnetic field. Does the magnetic force do work on the electron? Why or why not? (2 steps)", "answer": "- Step 1: The magnetic force is always **perpendicular** to the velocity: $$\\vec{F} = Q\\vec{v} \\times \\vec{B}$$. The cross product guarantees the force is at 90° to the direction of motion.\n- Step 2: Work done is $$W = \\vec{F} \\cdot \\vec{d} = Fd\\cos\\theta$$. Since $$\\theta = 90°$$ between force and displacement at every instant, $$\\cos 90° = 0$$, so **no work is done**. The electron's speed stays constant — only its direction changes. This is why charged particles in magnetic fields move in circles at constant speed, not spirals.\n\nThis is fundamentally different from an electric field, where $$\\vec{F} = Q\\vec{E}$$ is parallel to the field and *does* do work.", "source": "GLM 5.1 ②", "_id": "glm_2_51"}, {"question": "Power stations generate electricity at roughly 40 kV, but the National Grid steps this up to 250 kV for transmission. Explain the physical reason why high voltage is essential for long-distance power transmission. (3 steps)", "answer": "- Step 1: For a given power $$P = IV$$, increasing the transmission voltage $$V$$ means the current $$I$$ in the cables is reduced.\n- Step 2: The transmission cables have electrical resistance $$R$$. The power lost as heat in the cables is given by $$P_{loss} = I^2R$$.\n- Step 3: Because power loss depends on the *square* of the current, reducing the current by stepping up the voltage drastically reduces the $$I^2R$$ heating losses. This makes long-distance energy transmission efficient.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "Why is \"soft iron\" specifically used for the core of a transformer, rather than steel or air? (2 steps)", "answer": "- Step 1: Soft iron is easily magnetised and demagnetised. This is essential because the core must reverse its magnetic polarity every half-cycle of the AC current. Steel is \"hard\" magnetically and would retain its magnetisation (hysteresis), lagging behind the changing current and losing energy as heat.\n- Step 2: Compared to air, soft iron is a far better conductor of magnetic flux. It channels the magnetic field from the primary coil directly to the secondary coil, greatly increasing the flux linkage and making the transformer efficient.", "source": "GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "Compare $$F = BIL\\sin\\theta$$ and $$F = BQv\\sin\\theta$$: what does each describe, and how are they related conceptually? (3 steps)", "answer": "- Step 1: $$F = BIL\\sin\\theta$$ is the force on a current-carrying *conductor* of length $$L$$ inside a field. It bundles many moving charges into the macroscopic quantity $$I$$.\n- Step 2: $$F = BQv\\sin\\theta$$ is the force on a *single* isolated charge $$Q$$ moving with velocity $$v$$. This is the microscopic version.\n- Step 3: They're really the same law. Current $$I$$ in a wire is $$I = nQv A$$ (charges per volume × charge × drift velocity × area), and the total number of charges in length $$L$$ is $$nAL$$. Multiply the single-charge force $$BQv$$ by the number of charges: total force is $$BIL$$. So the conductor formula is just the sum of the individual-charge forces.\n\nTrap: don't mix them — using $$BQv$$ for a wire (or $$BIL$$ for one charge) gives nonsense units.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "Three things can change the magnetic flux linkage through a coil and thus induce an EMF. What are they, and why does a *stationary* magnet inside a stationary coil induce nothing? (2 steps)", "answer": "- Step 1: The three ways to change flux linkage $$N\\Phi = BAN\\cos\\theta$$ are: (1) change $$B$$ — vary the field strength (e.g. move a magnet closer/further, or change the current in a nearby coil); (2) change $$A$$ — deform the coil or move it into/out of the field region; (3) change $$\\theta$$ — rotate the coil relative to the field (this is how generators work).\n- Step 2: A stationary magnet inside a stationary coil gives a constant $$B$$, constant $$A$$, and constant $$\\theta$$ — so $$N\\Phi$$ is constant, meaning $$\\frac{d(N\\Phi)}{dt} = 0$$, and by Faraday's law $$\\varepsilon = 0$$. It doesn't matter how *strong* the flux is — only the *rate of change* matters. A huge steady flux induces nothing; a tiny but rapidly changing flux induces a large EMF.\n\nInduction cares about *change*, not *amount* — a frozen magnet is electromagnetically silent.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "In the transformer causal chain, why is the *iron core* essential rather than just having the two coils close together in air? (3 steps)", "answer": "- Step 1: In air, most of the magnetic flux produced by the primary spreads out into the surrounding space and only a tiny fraction threads through the secondary — flux linkage is poor and efficiency terrible.\n- Step 2: Iron has high magnetic permeability (~1000× air) — magnetic field lines vastly prefer to travel through iron. The core acts like a \"magnetic conductor\" or \"channel\", guiding almost all the flux from primary to secondary.\n- Step 3: Result: essentially the same flux threads both coils, satisfying the assumption behind $$V_p/V_s = N_p/N_s$$. Without the core, the turns-ratio equation would fail badly due to leakage.\n\nAnalogy: iron is to magnetic flux what copper is to electric current — it channels it where you want it.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "A transformer has a primary coil, a secondary coil, and a soft iron core. State the five-stage causal chain (in the correct A-level exam order) from input voltage to output current, and explain why *each stage must happen* for the next to occur. (5 steps)", "answer": "- Step 1: **Alternating input voltage** is applied across the primary coil. This must be AC — a constant DC voltage would eventually produce a constant field (no change), killing the chain at stage 3.\n- Step 2: The alternating voltage drives an **alternating current** in the primary coil. The current reverses direction each half-cycle; electrons oscillate rather than flow continuously. Without this oscillating current, the next stage can't happen.\n- Step 3: The alternating current creates a **changing (alternating) magnetic field** in the iron core. A *constant* current would give a *constant* field — and constant fields don't induce anything. The *change* in the field is the essential ingredient.\n- Step 4: The changing magnetic field links through the iron core to the secondary coil, producing a **changing flux linkage** in the secondary. The iron core channels the field (like a conductor for magnetic flux), ensuring most of the primary's field reaches the secondary. Without the core, flux would leak and the linkage would be weak.\n- Step 5: By Faraday's law, the changing flux linkage **induces an alternating voltage** in the secondary coil. If the secondary is in a complete circuit, this voltage drives an **alternating current** — at the *same frequency* as the input, but with a different amplitude (voltage stepped up or down depending on turns ratio). No electrical connection exists between the coils — the link is purely magnetic.\n\nThe chain is: AC voltage → AC current → changing B → changing NΦ → induced AC voltage → AC current. Every link requires *change* — remove the alternation and the chain breaks.", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "A rectangular loop sits in a uniform magnetic field. The loop is tilted so the field makes an angle $$θ$$ with the *normal* (perpendicular) to the loop's plane. Write the expression for magnetic flux through the loop and explain why the angle is measured from the normal, not from the plane itself. (3 steps)", "answer": "- Step 1: Magnetic flux $$\\Phi$$ through an area $$A$$ in a field of density $$B$$ is defined as $$\\Phi = BA\\cos\\theta$$, where $$\\theta$$ is the angle between the *field direction* and the *normal* to the plane of the area. This captures the component of $$B$$ that punches *through* the area perpendicularly.\n- Step 2: The reason we measure from the normal is physical: flux represents how many field lines *pass through* the surface. When $$\\theta = 0°$$ (field aligned with the normal, i.e. field perpendicular to the surface), every field line goes straight through — maximum flux $$\\Phi = BA$$. When $$\\theta = 90°$$ (field parallel to the surface), field lines skim the surface without crossing it — zero flux.\n+ If you measured from the plane instead, you'd need $$\\sin$$ instead of $$\\cos$$, and the formula would look different — but exam questions always define $$\\theta$$ from the normal, so you must check which angle the question gives you.\n- Step 3: A common trap: if a question says \"the coil is at 30° to the field,\" that might mean $$\\theta = 30°$$ from the field direction (so use $$\\cos 30°$$), or it might mean 30° from the plane (which is 60° from the normal, so use $$\\cos 60°$$). Always draw the normal to resolve this.\n\nFlux is \"how many field lines pierce the surface\" — the normal tells you the piercing direction.", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "An alternator and a dynamo both have a coil rotating in a magnetic field. What single structural difference produces AC in one and DC in the other? (3 steps)", "answer": "- Step 1: The coil's EMF naturally alternates — as it rotates, each side of the coil swings through the field in one direction, then the other, reversing the EMF every half-turn. The raw output is always AC.\n- Step 2: An **alternator** uses **slip rings** — smooth, continuous rings that maintain constant electrical contact with the brushes. No switching occurs, so the AC output passes through to the external circuit unchanged.\n- Step 3: A **dynamo** uses a **split-ring commutator** — a ring with a gap that swaps the electrical connections every half-turn. Just as the coil's EMF is about to reverse, the commutator flips which brush connects to which side of the coil, so the external current always flows the same way (DC, but bumpy).\n\nThe commutator in a dynamo is the same mechanism as in a DC motor — they share the split-ring design.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "What is the difference between \"magnetic flux density\" ($$B$$) and \"magnetic flux\" ($$\\Phi$$)? Why do we need both concepts? (2 steps)", "answer": "- Step 1: **Magnetic flux density** ($$B$$) describes the *intensity* of the field at a point — how many field lines per unit area. It's a local property, measured in tesla. **Magnetic flux** ($$\\Phi = BA\\cos\\theta$$) describes the *total amount* of field passing through a given area — it depends on both the field strength AND the size/orientation of the area. Measured in weber.\n- Step 2: We need both because they answer different questions. $$B$$ tells you \"how strong is the field here?\" — relevant for force calculations ($$F = BIL$$). $$\\Phi$$ tells you \"how much field goes through this surface?\" — relevant for induction calculations ($$\\varepsilon = -d\\Phi/dt$$). You can have strong $$B$$ but small $$\\Phi$$ (if the area is tiny) or weak $$B$$ but large $$\\Phi$$ (if the area is huge).\n\nAnalogy: $$B$$ is like rainfall intensity (mm/hour). $$\\Phi$$ is like total water collected in a bucket — it depends on both the intensity AND the bucket's opening area.", "source": "GLM 5.1 ②", "_id": "glm_2_62"}, {"question": "Contrast a motor and a generator: what is the input, output, governing physical principle, and applicable Fleming's rule for each? (2 steps)", "answer": "- Step 1: **Motor**:\n+ Input: electrical energy (current + voltage).\n+ Output: mechanical energy (rotation, torque).\n+ Principle: force on a current-carrying conductor in a field ($$F=BIL$$).\n+ Rule: Fleming's **left**-hand rule.\n- Step 2: **Generator**:\n+ Input: mechanical energy (rotation).\n+ Output: electrical energy (EMF, current).\n+ Principle: EMF induced by changing flux (Faraday's law).\n+ Rule: Fleming's **right**-hand rule.\n\nDeep symmetry: motors and generators are the same device operated in reverse. A motor being spun mechanically will act as a generator — this is called back-EMF and is why motors draw less current at high speed.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "A student claims: \"If I use a stronger magnet, the induced EMF gets bigger, so the induced current can violate energy conservation.\" Where is the flaw? (3 steps)", "answer": "- Step 1: Yes, a stronger magnet does induce a larger EMF (more flux change per unit time). And yes, the induced current is larger.\n- Step 2: But Lenz's law kicks in: the induced current also creates a stronger opposing magnetic field. The force resisting the magnet's motion is *also* proportionally larger.\n- Step 3: The mechanical work required to push a stronger magnet is greater — exactly matching the greater electrical energy generated. Energy accounts balance perfectly:\n+ Stronger magnet + same speed → more work per unit time → more electrical power.\n+ You don't get free energy; you pay for it in extra mechanical effort.\n\nTakeaway: Lenz's law isn't just about direction — it enforces energy conservation quantitatively.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "What are the four main sources of energy loss in a real transformer, and how is each minimised in practice? (4 steps)", "answer": "- Step 1: **Copper losses ($$I^2R$$ in windings)**: current in the coils heats the wire. Minimised by using thick copper wire (low resistance) and superconducting materials in specialist transformers.\n- Step 2: **Eddy currents in the core**: circulating currents in the iron core heat it. Minimised by *laminating* the core — thin insulated iron slices reduce loop area and increase path resistance.\n- Step 3: **Hysteresis losses**: energy consumed re-magnetising the core each cycle. Minimised by using *soft* magnetic materials that magnetise/demagnetise easily with minimal energy per cycle.\n- Step 4: **Flux leakage**: not all flux from primary links secondary — some escapes into air. Minimised by good core geometry (closed loop) and tight coil winding around the core.\n\nReal efficiencies: large power-grid transformers achieve 99%+; small consumer transformers ~90–95%.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "Magnetic flux $$\\Phi$$ through an area depends on the angle $$\\theta$$. In the formula $$\\Phi = BA\\cos\\theta$$, what exactly does $$\\theta$$ represent, and why does a 90° angle give zero flux rather than maximum flux? (3 steps)", "answer": "- Step 1: $$\\theta$$ is the angle between the **magnetic field direction** and the **normal (perpendicular)** to the plane of the area — NOT the angle between the field and the surface itself. This is a common exam trap.\n- Step 2: The $$\\cos\\theta$$ factor picks out the component of $$B$$ that passes *through* the area. When $$\\theta = 0°$$, the field is parallel to the normal (i.e., perpendicular to the surface), so the full field threads through: $$\\Phi = BA$$. When $$\\theta = 90°$$, the field is parallel to the surface — it skims across without passing through — so $$\\Phi = 0$$.\n- Step 3: Visual intuition: imagine holding a hoop in a rain of magnetic field lines. When the hoop faces the rain squarely ($$\\theta = 0°$$), maximum lines pass through. When you turn it edge-on ($$\\theta = 90°$$), the rain passes by without entering the hoop.\n\nCommon trap: if the question says \"the field makes angle $$\\theta$$ with the *plane* of the coil,\" then the angle to the *normal* is $$90° - \\theta$$, and you must use $$\\Phi = BA\\cos(90° - \\theta) = BA\\sin\\theta$$.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "A coil is pulled out of a magnetic field region at constant speed. As it exits, the flux through the coil decreases. By Lenz's law, what effect does the induced current have on the *motion* of the coil, and where does the extra mechanical work you must do end up? (3 steps)", "answer": "- Step 1: The flux through the coil is decreasing (less field threading it as it leaves). By Lenz's law, the induced current creates a magnetic field that *opposes this decrease* — it tries to *maintain* the flux by creating a field in the *same direction* as the original field inside the coil.\n- Step 2: This induced field means the coil acts like a magnet that *attracts* itself back toward the field region — it resists being pulled out. You feel a *drag* force opposing your pulling motion. You must pull *harder* than you would against just friction — the magnetic opposition adds an extra resistive force.\n- Step 3: The extra mechanical work you do (force × distance, pulling against the magnetic drag) is exactly the energy that appears as electrical energy in the induced current (EMF × current × time). Energy conservation: your extra effort doesn't vanish — it becomes the electrical energy in the circuit. If Lenz's law didn't oppose you, the coil would slide out effortlessly and you'd get free electrical energy — conservation of energy forbids this.\n\nLenz's law makes extraction harder — the drag you feel is the \"price\" you pay for the electricity you generate. No free lunch.", "source": "GLM 5.1 ①", "_id": "glm_1_42"}, {"question": "Why does a transformer preserve frequency but not power (in a real device)?", "answer": "Frequency preservation is a mathematical consequence of the causal chain: sinusoidal input → sinusoidal current → sinusoidal flux → derivative is still sinusoidal at the same frequency. There's nothing in the physics that could shift the frequency. Power preservation, however, requires *ideal* conditions — no losses. Real transformers lose energy to $$I^2R$$ heating in the copper windings, eddy currents in the iron core, hysteresis in the magnetisation, and flux leakage into the air. All these are dissipative processes (converting electrical energy to heat) — none of them affect the timing of oscillations, only the amplitude. So frequency is preserved by geometry, but power isn't preserved by material limitations.", "source": "Opus 4.7 ②", "_id": "opus_2_57"}, {"question": "Compare a motor and a generator in terms of: energy input/output, the physical law that governs them, and the Fleming hand rule used. Why are they essentially the *same device* running in opposite modes? (2 steps)", "answer": "- Step 1: **Motor**: input = *electrical* energy (current from a battery); output = *mechanical* energy (rotating coil); governed by the force-on-a-current equation $$F = BIL$$; uses Fleming's **Left-Hand Rule** (current + field → force). **Generator**: input = *mechanical* energy (rotating the coil by hand or turbine); output = *electrical* energy (induced EMF/current); governed by Faraday's law $$\\varepsilon = -d(N\\Phi)/dt$$; uses Fleming's **Right-Hand Rule** (motion + field → current).\n- Step 2: They are the same device because both involve a coil in a magnetic field with relative motion between them. In a motor, you *feed in* current and the coil *spins* (electrical → mechanical). In a generator, you *spin* the coil and current *comes out* (mechanical → electrical). A motor acting as a generator (spinning it manually) produces EMF — this is called *back EMF* in motor theory. The physics is reversible: current ↔ motion, depending on which side you drive.\n\nMotor and generator are two doors to the same room — one door feeds electricity in, the other feeds motion in.", "source": "GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "An ideal (100% efficient) step-up transformer has $$V_p = 40\\,000$$ V, $$I_p = 20$$ A, and $$V_s = 250\\,000$$ V. What is $$I_s$$, and why is this small current exactly what the National Grid wants? (3 steps)", "answer": "- Step 1: Power conservation for an ideal transformer: $$P_{in} = P_{out}$$, so $$I_p V_p = I_s V_s$$. Rearranging: $$I_s = \\frac{I_p V_p}{V_s} = \\frac{20 \\times 40\\,000}{250\\,000} \\approx 3.2$$ A. The step-up transformer has increased voltage by a factor of ~6.25 and decreased current by the same factor.\n- Step 2: The current ratio is the *inverse* of the turns ratio: $$\\frac{I_1}{I_2} = \\frac{N_2}{N_1}$$ (more turns on secondary → higher voltage → lower current). This isn't magic — it's energy conservation. If voltage goes up by factor $$k$$, current must go down by factor $$k$$ to keep power $$P = IV$$ the same.\n- Step 3: The National Grid wants small current because resistive heating loss in transmission cables is $$P_{loss} = I^2 R$$. Halving the current *quarters* the heating loss (it's $$I^2$$, not just $$I$$). By stepping up to 250 kV, the current drops from 20 A to ~3.2 A, and the $$I^2 R$$ loss drops by a factor of roughly $$(20/3.2)^2 \\approx 39$$ — a massive saving. That's why power stations step up to very high voltages for long-distance transmission.\n\nStep-up = high V, low I = less $$I^2R$$ heating in cables = more power delivered to consumers, less wasted as heat.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "An ideal transformer has $$N_p = 10$$ turns on the primary and $$N_s = 20$$ turns on the secondary, with $$V_p = 100$$ V. What is $$V_s$$, and is this a step-up or step-down transformer? Explain the turns-ratio formula physically. (3 steps)", "answer": "- Step 1: The turns-ratio formula is $$\\frac{V_1}{V_2} = \\frac{N_1}{N_2}$$, or equivalently $$V_s = V_p \\times \\frac{N_s}{N_p}$$. Substituting: $$V_s = 100 \\times \\frac{20}{10} = 200$$ V. Doubling the turns doubles the voltage — this is a **step-up** transformer.\n- Step 2: The physical reason: each turn of the secondary coil intercepts the *same* changing flux as each turn of the pr
