 200 = 80 \\times 10^9$$ W = 80 GW (more than the power generated — impossible!).\n- Step 2: At 400 kV: current $$I = 500 \\times 10^6 / 400 \\times 10^3 = 1{,}250$$ A. Power loss = $$(1{,}250)^2 \\times 200 = 312.5 \\times 10^6$$ W ≈ 312 MW.\n- Step 3: The power loss at 400 kV is about 312 MW vs. an absurdly large value at 25 kV. The current ratio is 16:1, so the $$I^2R$$ loss ratio is 256:1. This demonstrates why stepping up voltage is essential — it reduces current, and since power loss goes as $$I^2$$, even modest current reductions yield dramatic savings.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": true}, {"question": "Synthesis question: A DC motor and an AC generator look almost identical in construction (coil between magnets). Explain how the SAME device could function as both a motor and a generator, and what determines which role it plays. (3 steps)", "answer": "- Step 1: The physics is the same in both — a coil in a magnetic field with electromagnetic interactions. The difference is what you put IN and what you get OUT.\n- Step 2: If you supply electrical energy (connect a battery), current flows through the coil, the motor effect creates a force, and the coil rotates — it's a MOTOR (electrical → mechanical).\n- Step 3: If you supply mechanical energy (spin the coil by hand), the coil moves through the field, electromagnetic induction creates an EMF, and current flows if there's a circuit — it's a GENERATOR (mechanical → electrical). In practice, a motor spinning under its own inertia acts as a generator (back-EMF), and regenerative braking in electric cars uses exactly this principle.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": true}, {"question": "A transformer has $$N_p = 500$$, $$N_s = 50$$, $$V_p = 230$$ V, and $$I_p = 10$$ A. Assuming 90% efficiency, calculate the output voltage and output power. (4 steps)", "answer": "- Step 1: Output voltage from turns ratio: $$V_s = V_p \\times N_s / N_p = 230 \\times 50 / 500 = 23$$ V. This is a step-down transformer.\n- Step 2: Input power: $$P_{in} = V_p \\times I_p = 230 \\times 10 = 2300$$ W.\n- Step 3: Output power at 90% efficiency: $$P_{out} = 0.9 \\times 2300 = 2070$$ W.\n- Step 4: Output current: $$I_s = P_{out} / V_s = 2070 / 23 = 90$$ A. The step-down transformer trades high voltage/low current for low voltage/high current, with 10% lost to heat.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}], "count": 56}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What determines the magnetic flux through a coil, and how does the angle between the coil's plane and the magnetic field affect it? (3 steps)", "answer": "- Step 1: Magnetic flux Φ depends on **magnetic field strength (B)**, **area (A)**, and the **angle (θ)** between the field and the **normal** to the coil: Φ = BA cosθ.  \n- Step 2: When θ = 0° (field ⊥ coil face), cosθ = 1 ⇒ flux is maximum (Φ = BA). When θ = 90° (field ∥ coil), cosθ = 0 ⇒ flux is zero.  \n- Step 3: Misconception alert: θ is **not** the angle between the field and the coil's surface! It’s the angle between the field and the **normal** (perpendicular) to the surface.  \n\n+ Example: A coil rotated 90° from perpendicular to parallel orientation reduces flux from BA to 0.  \n\n**Takeaway:** Flux depends on field orientation relative to the coil’s normal vector.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why does a charged particle move in a circular path in a magnetic field? (3 steps)", "answer": "- Step 1: The magnetic force F = BQv sinθ acts **perpendicular** to the particle’s velocity (θ = 90° for max force).  \n- Step 2: This perpendicular force provides a **centripetal force**, causing circular motion: F = mv²/r ⇒ r = mv/(BQ).  \n- Step 3: Radius increases with mass (m) or speed (v), and decreases with charge (Q) or field strength (B). No work is done by the force since it’s always ⊥ motion.  \n\n+ Example: An electron (small mass) curves tightly; a proton (larger mass) curves more gradually.  \n\n**Takeaway:** Magnetic force acts as a centripetal force, enforcing circular motion without changing speed.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Compare slip rings (AC generator) and split-ring commutators (DC generator). How do they produce different current outputs? (3 steps)", "answer": "- Step 1: **Slip rings** maintain **continuous electrical contact** with the coil as it rotates. Each half-turn reverses the coil’s motion through the field, **reversing current direction** ⇒ AC output.  \n- Step 2: **Split-ring commutators** reverse the external circuit connection every half-turn. This ensures the current direction **remains constant** despite coil rotation ⇒ DC (pulsed).  \n- Step 3: Visual analogy: Slip rings = \"uninterrupted ring\"; split rings = \"interrupted ring that swaps contacts\" to flip polarity.  \n\n+ Edge case: If the split ring had no gap, it would act like a slip ring ⇒ AC output.  \n\n**Takeaway:** Mechanical design dictates current type—rings preserve direction changes; commutators invert them.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "In a transformer, why is an alternating current (AC) required for the device to function? (3 steps)", "answer": "- Step 1: Faraday’s Law requires **changing flux linkage** (ΔΦ/Δt) to induce EMF. A DC current produces a **steady magnetic field** ⇒ ΔΦ/Δt = 0 ⇒ no induction.  \n- Step 2: AC voltage creates an alternating current in the primary coil ⇒ alternating magnetic field in the core ⇒ changing flux through the secondary coil.  \n- Step 3: When DC is switched on/off, flux **changes momentarily** ⇒ induces a brief EMF (e.g., transformer \"spikes\" when power is toggled).  \n\n+ Misconception: Transformers work only with AC; DC blocks induction due to static flux.  \n\n**Takeaway:** AC’s alternating current sustains the changing flux essential for electromagnetic induction.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How does laminating the iron core in a transformer reduce energy losses? (3 steps)", "answer": "- Step 1: A solid iron core conducts eddy currents (induced by changing flux), which dissipate energy via I²R heating.  \n- Step 2: Laminations (insulated slices) disrupt eddy current paths ⇒ reduce their magnitude.  \n- Step 3: Energy loss ∝ I²R. Smaller eddy currents ⇒ drastically lower heating. Laminations act like \"insulating barriers\" for current flow.  \n\n+ Analogy: Laminated wood vs. solid steel—wood layers block crack propagation; laminated core blocks eddy currents.  \n\n**Takeaway:** Lamination minimizes eddy currents, preserving energy for useful magnetic coupling between coils.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "For a generator’s induced EMF, why is the peak EMF maximum when the coil is parallel to the magnetic field (flux Φ = 0)? (3 steps)", "answer": "- Step 1: Induced EMF depends on **rate of change of flux** (ε ∝ ΔΦ/Δt), not flux magnitude.  \n- Step 2: When the coil is parallel to the field (Φ = 0), it’s moving **perpendicular to field lines** ⇒ fastest flux change (max dΦ/dt).  \n- Step 3: At Φ = maximum (coil ⊥ field), the coil’s motion is tangential ⇒ dΦ/dt = 0 ⇒ EMF = 0.  \n\n+ Visual intuition: Imagine a car speeding through a tunnel (flux change) vs. parked (no change).  \n\n**Takeaway:** Peak EMF occurs where flux changes most rapidly, not where flux is largest.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "In a step-up transformer, how can the secondary voltage be greater than the primary voltage while obeying energy conservation? (3 steps)", "answer": "- Step 1: Voltage ratio V₁/V₂ = N₁/N₂ ⇒ V₂ = V₁(N₂/N₁). If N₂ > N₁, V₂ > V₁.  \n- Step 2: Power conservation (ideal case): V₁I₁ = V₂I₂ ⇒ I₂ = I₁(V₁/V₂). Higher voltage ⇒ lower current.  \n- Step 3: Energy transfer remains constant; stepped-up voltage reduces current, minimizing I²R losses in transmission.  \n\n+ Edge case: Real transformers lose energy (eddy currents, hysteresis) ⇒ P_out < P_in.  \n\n**Takeaway:** Voltage and current are inversely related to maintain constant power (assuming 100% efficiency).", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": true}, {"question": "Why does reversing the battery in a DC motor reverse the direction of rotation? (3 steps)", "answer": "- Step 1: Fleming’s Left-Hand Rule: Current direction determines force direction (thumb = motion).  \n- Step 2: Reversing battery polarity flips conventional current ⇒ force direction reverses ⇒ torque direction flips.  \n- Step 3: Commutator ensures torque remains unidirectional during rotation. With reversed current, net rotation direction flips.  \n\n+ Practical note: Permanent-magnet motors reverse direction with current; electromagnet-based motors may require field reversal too.  \n\n**Takeaway:** Current reversal alters Lorentz force direction, flipping motor rotation.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": true}, {"question": "How does increasing the number of turns in a coil affect the induced EMF in a generator? (2 steps)", "answer": "- Step 1: Faraday’s Law: ε = -NΔΦ/Δt. More turns (N) increase total flux linkage (NΦ) ⇒ higher ε for the same ΔΦ/Δt.  \n- Step 2: Doubling N doubles ε. However, physical constraints (size, resistance) limit practical turns.  \n\n+ Example: A 100-turn coil producing 1 V would generate 100 V with 10,000 turns (same flux change rate).  \n\n**Takeaway:** Induced EMF scales linearly with coil turns.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "What role does the soft iron core play in a transformer? (2 steps)", "answer": "- Step 1: Iron’s high permeability focuses magnetic field lines, enhancing flux linkage between coils.  \n- Step 2: Laminated soft iron minimizes eddy currents and hysteresis losses (magnetizes/demagnetizes easily).  \n\n+ Analogy: Iron core = magnetic \"conduit\" for field lines, like a wire channels electric current.  \n\n**Takeaway:** Core optimizes magnetic coupling and efficiency by concentrating flux and reducing losses.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why is magnetic flux Φ = BA cos θ maximum when θ = 0°, and what does θ represent? (3 steps)", "answer": "- Step 1: θ is the angle between the magnetic field **and the normal** to the coil's area (not the plane). At θ = 0°, field lines are perpendicular to the area (aligned with the normal).  \n- Step 2: cos θ reaches its maximum value (1) at θ = 0°, making Φ = BA × 1 = BA. This means the maximum number of field lines pass through the area.  \n- Step 3: At θ = 90°, cos θ = 0 (field parallel to the plane), so Φ = 0. **Misconception probe**: θ is NOT the angle between the field and the coil's surface!  \n\n[Optional takeaway]: Always draw the normal to visualize θ correctly.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": true}, {"question": "How do flux linkage (NΦ) and magnetic flux (Φ) differ? Give an example of each's application.", "answer": "Flux linkage is Φ multiplied by the number of turns N in a coil.  \n- Example 1: Φ applies to a single loop (e.g., Earth's field through a window frame).  \n- Example 2: NΦ applies to solenoids (e.g., 300-turn coil in a magnetic field).  \n**Key contrast**: Φ quantifies field penetration through one area; NΦ scales it for coils in generators/transformers.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why does a charged particle moving perpendicular to a magnetic field follow a circular path? (3 steps)", "answer": "- Step 1: Magnetic force F = BQv acts perpendicular to velocity (θ = 90°), providing centripetal force.  \n- Step 2: Force direction changes continuously to stay perpendicular, causing circular motion (F = mv²/r).  \n- Step 3: Radius r = mv/(BQ) — increases with mass/speed, decreases with field strength/charge.  \n**Edge case**: If θ < 90°, motion becomes helical (partial parallel velocity remains).", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "What causes induced EMF in a coil: (1) constant flux, (2) changing flux, or (3) maximum flux? Explain using Faraday's law.", "answer": "(2) Changing flux.  \n- Faraday's law: ε = -N ΔΦ/Δt. Induced EMF depends on rate of flux change, not absolute flux.  \n- Example: Peak EMF occurs when flux is zero (dΦ/dt maximal during rotation).  \n**Misconception**: EMF ≠ \"amount of flux\" → think of shaking a magnet in a coil (faster shaking = higher ε).", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How does Lenz's law ensure energy conservation in electromagnetic induction? (3 steps)", "answer": "- Step 1: Induced current creates a magnetic field opposing the change in flux (e.g., repelling an approaching magnet).  \n- Step 2: Opposition requires mechanical work to move the magnet, converting kinetic energy into electrical energy.  \n- Step 3: Without opposition (e.g., perpetual motion), energy would appear from nothing. Lenz's law enforces balance.  \n**Visual intuition**: Pushing a magnet into a coil feels resistance — this is Lenz's law in action.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why do alternators produce AC while dynamos produce DC? Contrast slip rings vs split-ring commutators.", "answer": "- Alternator: Slip rings maintain continuous electrical contact, preserving current reversals every half-turn (AC output).  \n- Dynamo: Split-ring commutator reverses connections to brushes every half-turn, inverting current direction to maintain unidirectional flow (DC output).  \n**Key intuition**: Commutator acts as a mechanical inverter, flipping connections to \"reset\" the current direction.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Explain why a step-up transformer reduces current in transmission lines using power conservation. (3 steps)", "answer": "- Step 1: Power P = IV is conserved (assumed ideal): P_in = V_p I_p = P_out = V_s I_s.  \n- Step 2: Doubling voltage (step-up) halves current for same power (I_s = I_p × V_p / V_s).  \n- Step 3: Lower current I reduces heating loss (P_loss = I²R), making long-distance transmission efficient.  \n**National Grid example**: 40 kV → 250 kV reduces current from 20 A → 3.2 A (see worked example).", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why must transformers use AC, not DC? Walk through the causal chain from input to output.", "answer": "- Step 1: AC input voltage creates alternating current in primary coil.  \n- Step 2: Alternating current produces a changing magnetic field in the core.  \n- Step 3: Changing flux links to secondary coil, inducing AC EMF (Faraday's law).  \n**DC test case**: Switching DC on/off induces momentary EMFs (flux changes during transitions), but steady DC gives no output.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How does laminating the iron core in a transformer reduce energy loss? (3 steps)", "answer": "- Step 1: Iron core conducts both magnetic flux and electricity. Solid iron would allow large eddy currents (looping currents).  \n- Step 2: Eddy currents cause I²R heating (energy loss). Laminations (insulated slices) break current loops.  \n- Step 3: Reduced eddy currents minimize heating. Lamination alignment follows field lines to maintain magnetic efficiency.  \n**Edge case**: Unlaminated cores → excessive heating, lower η.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Compare motor and generator using: (1) input/output, (2) governing law, (3) Fleming's rule. (3 steps)", "answer": "- Step 1: Motor — input electrical, output mechanical (force on current in B field; F = BIL).  \n- Step 2: Generator — input mechanical, output electrical (EMF from changing flux; Faraday's law).  \n- Step 3: Motor uses left-hand rule (current → motion); generator uses right-hand rule (motion → current).  \n**Visual contrast**: Motor spins from current; generator spins to create current.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "What is the significance of the negative sign in ε = -N dΦ/dt? Relate to Lenz's law.", "answer": "- The negative sign represents Lenz's law: induced EMF opposes flux change.  \n- Example: Increasing Φ (positive dΦ/dt) induces negative ε to create opposing field.  \n**Graph intuition**: Slope of Φ vs. t graph gives ε magnitude; sign shows opposition direction.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Why does peak generator EMF (ε_max = BANω) occur when the coil is parallel to the magnetic field?", "answer": "- Step 1: Flux Φ = BA cos θ is maximum when θ = 0° (coil ⊥ field).  \n- Step 2: EMF depends on dΦ/dt (rate of change). Maximum rate occurs at θ = 90° (coil ∥ field), where cos θ changes fastest.  \n- Step 3: ε_max = BANω aligns with this critical point (sin ωt = 1 in ε = BANω sin ωt).  \n**Misconception**: EMF peaks where flux is highest → correct answer is inverse.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "How does increasing rotation frequency affect (1) AC generator's EMF amplitude and (2) output frequency?", "answer": "- (1) ε_max = BANω → ω = 2πf_rot ⇒ doubling f_rot doubles amplitude.  \n- (2) Output frequency f_output = f_rot (one cycle per rotation). Doubling f_rot doubles AC frequency.  \n**Real-world implication**: Faster engine → higher voltage and Hz in power plants.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "Why does a balance register a force when a current-carrying wire is placed between magnet poles? Use Newton's third law.", "answer": "- Step 1: Magnetic force F = BIL acts on the wire (up/down per Fleming's LHR).  \n- Step 2: Newton's third law: wire exerts equal/opposite force on magnet.  \n- Step 3: Balance measures reaction force (e.g., downward push on magnet = upward wire force).  \n**Example**: +161 g reading ⇒ upward wire force (see Q1 in transcript).", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "Compare eddy current losses in unlaminated vs laminated transformer cores. (3 steps)", "answer": "- Step 1: Unlaminated core = solid conductor → large eddy loops → high I²R loss.  \n- Step 2: Laminated core = sliced insulators → small loops → localized currents → reduced loss.  \n- Step 3: Laminations trade-off: add manufacturing cost but increase η (efficiency >95%).  \n**Edge case**: High-frequency transformers use powdered iron (even smaller eddy currents).", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}], "count": 15}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What is magnetic flux density (B)? Define it, state its symbol, and give its unit. (3 steps)", "answer": "- Step 1: Magnetic flux density is defined as the strength of a magnetic field, measured by the density of magnetic field lines at a point.\n- Step 2: It is denoted by the symbol $$B$$.\n- Step 3: The unit of magnetic flux density is the Tesla (T), where 1 T = 1 N A⁻¹ m⁻¹.\n\nNote: For reference, Earth's magnetic field is ~0.032 mT and a fridge magnet is ~5 mT.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Write the equation for magnetic flux (Φ) through an area A perpendicular to a magnetic field of flux density B. Define all symbols and state the unit. (3 steps)", "answer": "- Step 1: The equation is $$\\Phi = BA$$\n- Step 2: Where $$\\Phi$$ = magnetic flux (Wb), $$B$$ = magnetic flux density (T), and $$A$$ = cross-sectional area (m²).\n- Step 3: The unit of magnetic flux is the Weber (Wb). 1 Wb = 1 T m².", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "What is magnetic flux linkage? Write its equation and state its unit. (3 steps)", "answer": "- Step 1: Magnetic flux linkage is the total magnetic flux multiplied by the number of turns in a coil.\n- Step 2: The equation is $$\\text{Flux linkage} = N\\Phi = BAN$$, where $$N$$ = number of turns.\n- Step 3: The unit is Weber turns (Wb turns).", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "A coil of area 0.05 m² has 100 turns and is placed perpendicular to a magnetic field of flux density 0.2 T. What is the magnetic flux linkage? (Mental math - 2 steps)", "answer": "- Step 1: Calculate flux: $$\\Phi = BA = 0.2 \\times 0.05 = 0.01$$ Wb\n- Step 2: Calculate flux linkage: $$N\\Phi = 100 \\times 0.01 = 1$$ Wb turns", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "State the equation for the magnetic force on a current-carrying conductor in a magnetic field. Define all symbols. (3 steps)", "answer": "- Step 1: The equation is $$F = BIL \\sin\\theta$$\n- Step 2: Where $$F$$ = magnetic force (N), $$B$$ = magnetic flux density (T), $$I$$ = current (A), $$L$$ = length of conductor in the field (m), $$\\theta$$ = angle between conductor and field lines.\n- Step 3: Maximum force occurs at $$\\theta = 90°$$ where $$\\sin\\theta = 1$$, giving $$F = BIL$$.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "State the equation for the magnetic force on a moving charged particle. Define all symbols and explain the condition for maximum force. (3 steps)", "answer": "- Step 1: The equation is $$F = BQv \\sin\\theta$$\n- Step 2: Where $$F$$ = magnetic force (N), $$B$$ = magnetic flux density (T), $$Q$$ = charge (C), $$v$$ = velocity (m s⁻¹), $$\\theta$$ = angle between velocity and field.\n- Step 3: Maximum force occurs when $$\\theta = 90°$$ (particle moves perpendicular to field), giving $$F = BQv$$. If $$\\theta = 0°$$ (parallel to field), force = 0.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Explain the difference between F = BIL sinθ and F = BQv sinθ. When is each used? (2 steps)", "answer": "- Step 1: $$F = BIL \\sin\\theta$$ applies to a current-carrying conductor (many charges moving together), while $$F = BQv \\sin\\theta$$ applies to an isolated moving charged particle (single charge).\n- Step 2: The key difference is that I in the first equation is the total current, while Q in the second equation is the charge of one particle. For a wire carrying current, you use BIL; for a proton/electron in a magnetic field, you use BQv.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": true}, {"question": "Describe Fleming's Left Hand Rule and state what each finger represents. (3 steps)", "answer": "- Step 1: Fleming's Left Hand Rule determines the direction of force on a current-carrying conductor in a magnetic field (motor effect).\n- Step 2: First finger = direction of magnetic field (N → S), seCond finger = direction of conventional current (+ → −), Thumb = direction of Motion/force.\n- Step 3: This can be remembered as \"FBI\" - Field, Current, Force (or \"F\" for Thumb = Force, \"B\" for First finger = B-field, \"I\" for seCond finger = Intensity/current).", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "What does it mean when magnetic field lines are represented by dots (⊙) or crosses (×) in a 2D diagram? (1 step)", "answer": "Dots (⊙) represent magnetic field directed OUT of the page (towards you), while crosses (×) represent magnetic field directed INTO the page (away from you). Think of an arrow: the dot is the tip coming at you, the cross is the feathers going away.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "A wire carries current perpendicularly into the page in a magnetic field that points from left to right. Using Fleming's Left Hand Rule, which direction does the force act? (3 steps)", "answer": "- Step 1: First finger (B-field) points RIGHT.\n- Step 2: Second finger (current) points INTO the page.\n- Step 3: The thumb (force) must point UP. Using the right-hand coordinate system with B right and I into page, force is upward.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Define electromagnetic induction. What two things must happen for an EMF to be induced in a circuit? (3 steps)", "answer": "- Step 1: Electromagnetic induction is the process where an EMF is induced in a closed circuit due to changes in magnetic flux (linkage).\n- Step 2: Two conditions must be met: (1) There must be a CHANGE in magnetic flux, and (2) This change must occur with respect to TIME.\n- Step 3: A stationary magnet inside a coil produces NO EMF because there is no change in flux (rate of change = 0).", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "State Faraday's Law in words and write the equation. Define all symbols. (3 steps)", "answer": "- Step 1: Faraday's Law states that the magnitude of induced EMF is directly proportional to the rate of change of magnetic flux linkage.\n- Step 2: The equation is $$\\varepsilon = \\frac{\\Delta(N\\Phi)}{\\Delta t}$$ where $$\\varepsilon$$ = induced EMF (V), $$\\Delta(N\\Phi)$$ = change in flux linkage (Wb turns), $$\\Delta t$$ = time interval (s).\n- Step 3: In differential form: $$\\varepsilon = \\frac{d(N\\Phi)}{dt}$$", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "State Lenz's Law. Why is there a minus sign in the combined Faraday-Lenz equation? (2 steps)", "answer": "- Step 1: Lenz's Law states that the induced EMF is set up in a direction to produce effects that oppose the change causing it.\n- Step 2: The minus sign in $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$ represents this opposition - the induced EMF always acts to oppose the change in flux. This is conservation of energy in action.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "A bar magnet is pushed NORTH POLE FIRST into a coil. Using Lenz's Law, which direction does the induced current flow when viewed from the magnet side? (3 steps)", "answer": "- Step 1: The approaching north pole causes an increase in flux (north polarity) through the coil.\n- Step 2: By Lenz's Law, the induced current must create a field that OPPOSES this change - meaning the coil must create its own north pole to repel the incoming magnet.\n- Step 3: To create a north pole facing the magnet, current must flow ANTI-CLOCKWISE when viewed from the magnet side (using right-hand grip rule).", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "A bar magnet is pulled AWAY from a coil (north pole facing the coil). Using Lenz's Law, which direction does the induced current flow? (3 steps)", "answer": "- Step 1: The departing north pole causes a DECREASE in north-going flux through the coil.\n- Step 2: By Lenz's Law, the induced current must create a field that opposes this decrease - meaning the coil must create a south pole to ATTRACT the departing magnet.\n- Step 3: To create a south pole facing the magnet, current must flow CLOCKWISE when viewed from the magnet side.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "List FOUR factors that increase the magnitude of induced EMF in electromagnetic induction. (2 steps)", "answer": "- Step 1: (1) Increase the speed of relative motion between magnet and coil - faster change = larger ΔΦ/Δt.\n- Step 2: (2) Increase the number of turns N in the coil. (3) Increase magnetic field strength B. (4) Increase the area A of the coil.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "A coil rotates in a uniform magnetic field. At what position of the coil is (a) magnetic flux MAXIMUM, and (b) induced EMF MAXIMUM? Explain why. (3 steps)", "answer": "- Step 1: (a) Flux is MAXIMUM when the coil plane is perpendicular to the field lines (θ = 0°), so $$\\Phi = BAN$$.\n- Step 2: (b) Induced EMF is MAXIMUM when the coil plane is PARALLEL to the field (θ = 90°).\n- Step 3: This is because EMF depends on the RATE of change of flux. At maximum flux (perpendicular), the coil is momentarily at rest - no change in flux. At zero flux (parallel), the coil is cutting field lines most rapidly - maximum rate of change.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "What is the difference between an alternator and a dynamo? (3 steps)", "answer": "- Step 1: Both are electromagnetic generators, but produce different current types.\n- Step 2: An ALTERNATOR uses SLIP RINGS and produces ALTERNATING CURRENT (sinusoidal - positive and negative). A DYNAMO uses a COMMUTATOR (split ring) and produces DIRECT CURRENT (pulsating - always positive).\n- Step 3: The commutator in a dynamo disconnects and reconnects each half-turn to \"flip\" the negative half-cycle to positive, giving a pulsating DC output.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "In an AC generator (alternator), does the current direction flip because of disconnection at slip rings? Explain. (2 steps)", "answer": "- Step 1: NO - this is a common misconception. The alternating current is produced naturally by the changing direction of motion relative to the magnetic field.\n- Step 2: As the coil rotates, one side moves UP through the field then DOWN, causing induced current to reverse direction. Slip rings simply allow continuous connection to the rotating coil - they do NOT cause disconnection to create alternation.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Write the equation for the EMF produced by a rotating coil in an AC generator. Define all symbols and state what each represents. (3 steps)", "answer": "- Step 1: The equation is $$\\varepsilon = BAN\\omega \\sin(\\omega t)$$\n- Step 2: Where $$\\varepsilon$$ = instantaneous EMF (V), $$B$$ = magnetic flux density (T), $$A$$ = coil area (m²), $$N$$ = number of turns, $$\\omega$$ = angular frequency (rad s⁻¹).\n- Step 3: The peak EMF is $$\\varepsilon_{max} = BAN\\omega$$ (when coil is parallel to field, sin = 1). The frequency is $$f = \\omega/2\\pi$$.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Describe how a DC motor works. What component ensures continuous rotation in one direction? (3 steps)", "answer": "- Step 1: A DC motor uses the motor effect - when a current-carrying coil is in a magnetic field, forces act on opposite sides creating a torque.\n- Step 2: As the coil rotates, the force directions would eventually reverse (causing oscillation). The COMMUTATOR (split ring) reverses the current direction every half-turn.\n- Step 3: This maintains the same force direction on each side of the coil, enabling continuous rotation in ONE direction.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "What is the function of brushes in a motor or generator? (1 step)", "answer": "Brushes are stationary carbon contacts that maintain electrical connection to rotating components (commutator or slip rings). They allow current to flow into/out of the rotating coil while the external circuit remains stationary.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A motor has a magnetic field from left to right. The current flows into the page on the top side of the coil. Using Fleming's Left Hand Rule, which direction does the force act on this side? (3 steps)", "answer": "- Step 1: First finger (B-field) points LEFT.\n- Step 2: Second finger (current) points INTO the page.\n- Step 3: Therefore, the thumb (force) points UP. This is why the coil rotates.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "How can you change the (a) speed and (b) direction of a DC motor without changing its construction? (2 steps)", "answer": "- Step 1: (a) Speed: Increase the current (or voltage) supplied to the motor. Higher current → stronger force → faster rotation.\n- Step 2: (b) Direction: Reverse the polarity of the supply (swap positive and negative connections). This reverses the current direction, which reverses the force direction, causing the motor to spin the opposite way.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "What are the three main components of a transformer? (1 step)", "answer": "A transformer consists of:\n1. Primary coil (input)\n2. Secondary coil (output)\n3. Iron core (links the magnetic flux between coils)\n\nThe coils are electrically isolated from each other but magnetically linked through the core.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Why must transformers use alternating current (AC)? What happens if DC is applied? (3 steps)", "answer": "- Step 1: Transformers rely on electromagnetic induction, which requires a CHANGING magnetic flux.\n- Step 2: AC produces a constantly changing magnetic field (alternating direction). This changing field then induces an alternating voltage in the secondary coil.\n- Step 3: If DC is applied, the primary produces a STEADY magnetic field (no change). Since there's no changing flux through the secondary, NO voltage is induced. Only at switch ON or OFF (when flux is changing) would there be brief induced voltages.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Describe the step-by-step operation of a transformer. (5 steps)", "answer": "- Step 1: An alternating voltage is applied to the primary coil, causing an alternating current to flow through it.\n- Step 2: This alternating current creates an alternating magnetic field around the primary coil.\n- Step 3: The iron core channels this changing magnetic field through to the secondary coil.\n- Step 4: The changing magnetic field through the secondary coil induces an alternating voltage across it (Faraday's Law).\n- Step 5: If the secondary circuit is complete, this induced voltage drives an alternating current in the secondary circuit.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Write the transformer turns ratio equation. If Ns > Np, is it step-up or step-down? (2 steps)", "answer": "- Step 1: The equation is $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$ where p = primary, s = secondary, V = voltage, N = number of turns.\n- Step 2: If Ns > Np (more turns on secondary), then Vs > Vp - this is a STEP-UP transformer (voltage increases, current decreases). Conversely, Ns < Np gives STEP-DOWN.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "A transformer has 100 turns on the primary and 400 turns on the secondary. If the input voltage is 50 V, what is the output voltage? (Mental math - 2 steps)", "answer": "- Step 1: Using $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$, substitute: $$\\frac{50}{V_s} = \\frac{100}{400} = \\frac{1}{4}$$\n- Step 2: Cross-multiply: $$V_s = 50 \\times 4 = 200$$ V\n\nThis is a step-up transformer (output voltage is 4× input).", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Write the power equation for an ideal (100% efficient) transformer. If input is 240 V at 2 A and output is 12 V, what is the output current? (Mental math - 2 steps)", "answer": "- Step 1: For ideal transformer: $$P_{in} = P_{out}$$, so $$V_p I_p = V_s I_s$$\n- Step 2: $$240 \\times 2 = 12 \\times I_s$$ → $$480 = 12I_s$$ → $$I_s = 40$$ A\n\nNote: Step-down voltage means step-up current.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Why is electrical power transmitted at HIGH voltage over long distances? Explain using P = IV. (3 steps)", "answer": "- Step 1: Power station output power P is fixed. From $$P = IV$$, if we increase voltage V, we can decrease current I while maintaining the same power.\n- Step 2: Energy loss in transmission cables is given by $$P_{loss} = I^2R$$. Lower current means drastically lower heating losses.\n- Step 3: Example: Transmitting 100 MW at 250,000 V gives I = 400 A. At 40,000 V, same power requires I = 2500 A. The higher voltage case loses (400)² = 160,000 times less energy per unit resistance.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "What is the National Grid? List its main components in order from power station to home. (2 steps)", "answer": "- Step 1: The National Grid is the UK's system for transmitting electricity from power stations to consumers.\n- Step 2: Order: Power Station → Step-up Transformer (increases V, decreases I) → Transmission Cables (high voltage) → Step-down Transformer (decreases V, increases I) → Consumer (home at ~230 V).", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "What is a laminated iron core in a transformer? Why is it laminated? (2 steps)", "answer": "- Step 1: The iron core is made of thin sheets (laminations) of iron, electrically insulated from each other.\n- Step 2: This reduces eddy currents - circular induced currents within the core itself that would cause unwanted heating. Laminations break up these currents, improving efficiency.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "Why is soft iron used for transformer cores rather than steel? (1 step)", "answer": "Soft iron is easily magnetised and demagnetised (low hysteresis). When the alternating current changes direction, the core magnetism switches quickly with minimal energy loss. Steel (magnetically hard) would retain magnetism and cause large energy losses.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Compare motors and generators under these headings: (a) Energy conversion direction, (b) Principle used, (c) Fleming's rule. (3 steps)", "answer": "- Step 1: (a) Motor: Electrical → Mechanical. Generator: Mechanical → Electrical.\n- Step 2: (b) Motor uses force on current in magnetic field. Generator uses induced EMF from changing flux.\n- Step 3: (c) Motor uses Fleming's LEFT hand rule (Force). Generator uses Fleming's RIGHT hand rule (or equivalently, Lenz's Law for direction).", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "An electron moves to the right in a magnetic field directed into the page. What is the direction of the magnetic force on the electron? (3 steps)", "answer": "- Step 1: Remember: for negative charges, the SECOND finger (current) points OPPOSITE to the direction of motion.\n- Step 2: Since electron moves right, conventional current direction is LEFT.\n- Step 3: Using Fleming's Left Hand Rule with B into page (first finger), I to left (second finger), the thumb (force) points UP.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "Why does a magnetic force on a charged particle cause circular motion? (2 steps)", "answer": "- Step 1: The magnetic force is always PERPENDICULAR to the particle's velocity (when B ⟂ v).\n- Step 2: A force perpendicular to motion changes direction but NOT speed - this is the definition of centripetal force. The particle continuously bends in a circular path.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In the formula Φ = BA cos(θ), what is θ? How does this relate to maximum and minimum flux? (3 steps)", "answer": "- Step 1: θ is the angle between the magnetic field lines and the NORMAL (perpendicular) to the plane of the area.\n- Step 2: When θ = 0° (field perpendicular to area): cos(0) = 1, so Φ = BA (MAXIMUM).\n- Step 3: When θ = 90° (field parallel to area): cos(90) = 0, so Φ = 0 (MINIMUM).", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "A student says: \"A stationary wire in a magnetic field has no EMF induced because there's no force.\" Explain why this is wrong. (2 steps)", "answer": "- Step 1: The student is confusing the motor effect (force on current-carrying wire) with electromagnetic induction (EMF from motion).\n- Step 2: For induction, we need RELATIVE MOTION between wire and field - the wire must CUT through field lines. A stationary wire in a steady field has constant flux, so ΔΦ/Δt = 0, giving zero EMF. It's the motion that matters, not force.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": true}, {"question": "Two identical coils rotate at the same frequency in identical magnetic fields. One has twice the area of the other. How do their peak EMF values compare? (Mental math - 2 steps)", "answer": "- Step 1: Peak EMF equation: $$\\varepsilon_{max} = BAN\\omega$$. Both have same B, N, and ω.\n- Step 2: If area A doubles, peak EMF also doubles (directly proportional). The larger coil induces twice the maximum EMF because it cuts more field lines per second.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "A step-down transformer has 1000 primary turns and 50 secondary turns. Input is 230 V. What is the output voltage? What happens to the current? (Mental math - 2 steps)", "answer": "- Step 1: Using $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$: $$\\frac{230}{V_s} = \\frac{1000}{50} = 20$$\n- Step 2: So $$V_s = 230/20 = 11.5$$ V (approximately 12 V, a common transformer output).\n- Step 3: Since power is conserved (ideal), current INCREASES by factor of 20 (Ip × 230 = Is × 11.5).", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "What would happen if you tried to use a transformer with the primary and secondary coils wound on completely separate cores (no iron core linking them)? (2 steps)", "answer": "- Step 1: Without the iron core, the magnetic flux from the primary would not be effectively channelled to the secondary.\n- Step 2: Most of the flux would leak away, so very little changing flux would link the secondary coil. The transformer would have extremely low efficiency and may not work at all.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": true}, {"question": "A wire moves through a magnetic field. Does the induced EMF depend on the wire's length in the field? Explain. (2 steps)", "answer": "- Step 1: Yes, the induced EMF is proportional to the length of wire moving perpendicular to the field.\n- Step 2: More wire length means more charges moving through the field, so more potential difference is generated across the wire. The induced EMF = BLv for a straight conductor moving at velocity v perpendicular to field B.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "Explain why a DC motor might spark at the brushes. (1 step)", "answer": "As the commutator segments disconnect and reconnect to the brushes (especially at high speeds), there can be a brief interruption of current. This sudden change in current, combined with the inductance of the coil, can produce a voltage spike that sparks across the gap.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": true}, {"question": "In a top-pan balance experiment with a wire in a magnetic field, the balance reading increases when current flows. Explain what's happening in terms of forces. (3 steps)", "answer": "- Step 1: Current in the wire within the magnetic field experiences a force (motor effect).\n- Step 2: By Newton's third law, the wire exerts an equal and opposite force on the magnetic field source (the magnet).\n- Step 3: This force pushes down onto the balance, increasing the reading. The greater the current, the greater the force, and the higher the balance reading.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "A solenoid has 500 turns, radius 0.1 m, in a field of 0.05 T. Calculate the flux linkage. (Mental math - 2 steps)", "answer": "- Step 1: Area A = πr² = π × (0.1)² = 0.0314 m²\n- Step 2: Flux Φ = BA = 0.05 × 0.0314 = 0.00157 Wb\n- Step 3: Flux linkage = NΦ = 500 × 0.00157 = 0.785 Wb turns (approximately 0.79 Wb turns)", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "What is the difference between magnetic flux density (B) and magnetic field strength? Are they the same thing? (2 steps)", "answer": "- Step 1: In most contexts, magnetic flux density (B) and magnetic field strength are used interchangeably to describe the strength of a magnetic field in Tesla.\n- Step 2: However, technically, H (magnetic field strength) is the magnetizing force, while B is the flux density. They are related by B = μH, where μ is permeability. In simple A-level problems, they're treated as the same.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "A transformer is designed to work on 50 Hz AC. What would happen if you connected it to 60 Hz AC of the same voltage? (2 steps)", "answer": "- Step 1: The transformer would still work, but with modified performance.\n- Step 2: Since $$\\varepsilon \\propto \\omega$$ (angular frequency), the higher frequency would increase the induced EMF slightly. More importantly, core losses (eddy currents, hysteresis) increase with frequency, so the transformer might run warmer. Most transformers are designed for specific frequencies.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "Why can't transformers increase power? Explain using the ideal transformer equation. (2 steps)", "answer": "- Step 1: From $$V_p I_p = V_s I_s$$, input power equals output power (for ideal 100% efficiency).\n- Step 2: If voltage increases (step-up), current must decrease proportionally. The PRODUCT (power) remains the same. Transformers change voltage and current, not power.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "In a generator, mechanical work is converted to electrical energy. In a motor, electrical energy is converted to mechanical work. How does Lenz's Law relate to energy conservation in generators? (2 steps)", "answer": "- Step 1: In a generator, when current flows in the induced circuit, it creates its own magnetic field that opposes the motion producing it.\n- Step 2: This opposition means you must do MORE mechanical work to keep the generator turning when it's under load. The induced current \"resists\" being generated - this is energy conservation. The electrical energy produced comes directly from the mechanical work you input.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}], "count": 50}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "A wire carries a current through a magnetic field. Under what condition does the wire experience ZERO magnetic force? (2 steps)", "answer": "- Step 1: The magnetic force on a current-carrying conductor is given by $$F = BIL \\sin\\theta$$ where θ is the angle between the conductor and the magnetic field lines.\n- Step 2: The force is ZERO when sin(θ) = 0, which occurs when θ = 0° or 180° — meaning the current flows parallel (or anti-parallel) to the magnetic field direction. No force is experienced when current is parallel to the field lines.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "In Fleming's Left-Hand Rule for a current-carrying conductor, what do each of the three fingers represent, and which hand is used for motors versus generators? (3 steps)", "answer": "- Step 1: The three fingers are held mutually perpendicular: First finger (index) = direction of magnetic field (north to south), Second finger (middle) = direction of conventional current (positive to negative), Thumb = direction of motion/force.\n- Step 2: This rule is used for the motor effect — when a current-carrying conductor experiences a force in a magnetic field.\n+ For motors: Use the LEFT hand (motor effect: current + field → force)\n+ For generators: Use the RIGHT hand (generator effect: force + field → current induced)\n- Step 3: The mnemonic FBI (Force, B-field, I-current) helps remember the order of the fingers.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "What is the difference between magnetic flux (Φ) and magnetic flux linkage? (2 steps)", "answer": "- Step 1: Magnetic flux Φ is the product of magnetic flux density and area perpendicular to the field: $$\\Phi = BA$$ and is measured in Webers (Wb). It represents how much magnetic field passes through an area.\n- Step 2: Magnetic flux linkage is the total flux linking N turns of a coil: $$\\Phi_N = BAN$$ with units of Weber-turns. It's essentially flux multiplied by the number of turns in the coil.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "A coil rotates in a uniform magnetic field. At what position is the magnetic flux through the coil maximum, and at what position is the induced EMF maximum? Explain why these are NOT the same. (3 steps)", "answer": "- Step 1: Magnetic flux is maximum when the coil plane is perpendicular to the magnetic field lines (θ = 0°), giving $$\\Phi_{max} = BA$$. At this position, the field lines pass directly through the entire coil area.\n- Step 2: Induced EMF is maximum when the coil plane is parallel to the field lines (θ = 90°), because this is when the coil sides cut through the most field lines per second — the rate of change of flux is greatest.\n+ This is when flux is actually ZERO, but dΦ/dt is maximum.\n- Step 3: These are opposite because flux depends on position, while EMF depends on the rate of change of flux. At the flux maximum, the coil is momentarily \"turning around\" so change is minimal; at flux zero, the coil is cutting field lines most rapidly.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "State Faraday's Law of electromagnetic induction in words and in equation form. What must change for an EMF to be induced? (2 steps)", "answer": "- Step 1: Faraday's Law states that the magnitude of induced EMF is directly proportional to the rate of change of magnetic flux linkage: $$\\varepsilon = -\\frac{\\Delta(N\\Phi)}{\\Delta t}$$ or in differential form $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$\n- Step 2: An EMF is induced ONLY when there is a CHANGE in magnetic flux — either the flux density B changes, the area A changes, or the angle θ changes. A stationary magnet near a coil produces NO induced EMF because the flux is not changing.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "State Lenz's Law and explain why the negative sign appears in Faraday's Law equation. (2 steps)", "answer": "- Step 1: Lenz's Law states that the direction of an induced current is such that its magnetic field opposes the change that produced it. The induced effect always tries to maintain the original conditions.\n- Step 2: The negative sign in $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$ represents this opposition. If flux through a coil is increasing, the induced current creates a field opposing that increase. This is an expression of conservation of energy — the induced current does work against the change, requiring mechanical input.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "A bar magnet is pushed with its NORTH pole toward a coil. Using Lenz's Law, determine the direction of the induced current as viewed from the magnet side. (3 steps)", "answer": "- Step 1: The approaching north pole creates an increasing magnetic flux through the coil in the direction of the field (toward the coil from the magnet).\n- Step 2: To oppose this change, the coil must create its own magnetic field that repels the approaching north pole. Since like poles repel, the induced field at the magnet end must also be a north pole.\n- Step 3: Using the right-hand grip rule, to produce a north pole facing the magnet, the current must flow anticlockwise when viewed from the magnet side.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "What is the fundamental difference between an alternator (AC generator) and a dynamo (DC generator) in terms of their construction and output? (3 steps)", "answer": "- Step 1: Both rotate a coil in a magnetic field. The key difference is how they deliver current to the external circuit.\n+ Alternator: Uses SLIP RINGS (continuous rings) that maintain continuous contact, allowing the alternating current induced in the coil to flow straight through to the external circuit unchanged.\n+ Dynamo: Uses a COMMUTATOR (split ring with a gap) that disconnects and reconnects each half-turn, flipping the connection so external current always flows in one direction.\n- Step 2: The output waveform reflects this: alternators produce a sinusoidal AC waveform (positive and negative), while dynamos produce a pulsating DC waveform (always positive, varying magnitude).\n- Step 3: Both use electromagnetic induction (generator effect), but the dynamo.rectifies the alternating induced current to direct current for the output.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Describe the purpose of the commutator in a DC motor. What would happen if a motor didn't have a commutator? (3 steps)", "answer": "- Step 1: In a DC motor, the commutator is a split-ring that reverses the direction of current in the coil every half-turn (every 180° of rotation).\n- Step 2: This reversal ensures that the force on each side of the coil always acts in the same rotational direction — without it, the coil would experience forces that push it in opposite directions on opposite sides, causing oscillation rather than continuous rotation.\n+ Without commutator: At the vertical position, forces cancel, coil stops, then would oscillate.\n+ With commutator: Current reverses at vertical position, so forces also reverse, maintaining torque in the same direction.\n- Step 3: The brushes maintain contact with the rotating commutator, allowing current to flow into and out of the rotating coil while the external circuit remains stationary.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "A transformer has 1000 turns on the primary coil and 50 turns on the secondary coil. Is this a step-up or step-down transformer, and what happens to the voltage and current? (3 steps)", "answer": "- Step 1: Compare the number of turns: $$N_s = 50 < N_p = 1000$$, so this is a step-down transformer (fewer turns on secondary).\n- Step 2: Using the transformer equation $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$: $$\\frac{V_p}{V_s} = \\frac{1000}{50} = 20$$, so $$V_s = \\frac{V_p}{20}$$ — the voltage is reduced by a factor of 20.\n- Step 3: For an ideal transformer, power is conserved: $$P_p = P_s$$, so $$V_p I_p = V_s I_s$$. Since voltage decreases by 20, current increases by 20 ($$I_s = 20 I_p$$). Step-down reduces voltage, increases current.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Why do power transmission systems use very high voltages? What would happen if very low voltage were used to transmit power over long distances? (3 steps)", "answer": "- Step 1: Power stations generate a fixed amount of power (P = VI). For transmission over long distances, we want to minimize energy loss in the cables.\n- Step 2: Power loss in transmission cables is given by $$P_{loss} = I^2 R$$ (Joule heating). Since $$I = \\frac{P}{V}$$, substituting gives $$P_{loss} = \\frac{P^2 R}{V^2}$$. This shows loss decreases as voltage INCREASES (inversely proportional to V²).\n- Step 3: If low voltage were used, the current would be very high for the same power ($$I = P/V$$), causing enormous I²R losses that would heat and waste most of the energy before reaching consumers. High voltage = low current = minimal losses.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A transformer is connected to a DC power supply instead of AC. Will it work? Explain your answer. (2 steps)", "answer": "- Step 1: NO — transformers require AC (alternating current) to operate.\n- Step 2: A DC current produces a steady (non-changing) magnetic field. Since electromagnetic induction requires a CHANGING magnetic flux to induce EMF in the secondary coil, a steady DC current creates constant flux — no change means no induced voltage. Only when the DC is switched on or off (moments of change) would there be any induced effect.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "What is meant by a \"soft iron\" core in a transformer, and why is the core laminated (made of thin sheets)? (3 steps)", "answer": "- Step 1: Soft iron is a magnetically soft material — it can be easily magnetized and demagnetized. This is ideal for transformer cores because the magnetic field needs to change direction rapidly with the AC frequency.\n+ Hard magnetic materials (like steel) retain magnetism permanently and would not work well.\n- Step 2: The core is laminated — split into thin sheets electrically insulated from each other — to reduce EDDY CURRENTS.\n- Step 3: A changing magnetic field in a solid conductor induces circulating currents (eddies) that cause heating and energy loss. Laminating the core electrically isolates sections, preventing these eddy currents from flowing and thus reducing energy loss.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "How can the speed and direction of rotation of a DC electric motor be changed without redesigning the motor? (2 steps)", "answer": "- Step 1: Speed can be varied by changing the current through the motor (or voltage). Increasing current increases the magnetic force (F = BIL), creating greater torque and faster rotation. This is done using a variable resistor or electronic controller.\n- Step 2: Direction can be reversed by reversing the direction of the current through the coil (or reversing the magnetic field polarity). Practically, this is achieved by swapping the positive and negative connections to the power supply — reversing current reverses the force direction, causing reverse rotation.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "An electron moves perpendicular to a uniform magnetic field. Describe the path it will follow and explain why. (3 steps)", "answer": "- Step 1: The magnetic force on a moving charge is always perpendicular to both the velocity and the magnetic field direction: $$F = Bqv$$ (for θ = 90°).\n- Step 2: Since force is perpendicular to velocity, it acts as a centripetal force — constantly changing the direction of motion without changing speed. This causes the charged particle to move in a CIRCULAR path.\n- Step 3: The radius of this path is given by $$r = \\frac{mv}{Bq}$$. Heavier particles or faster particles have larger radii; stronger fields or higher charge create tighter circles. The direction of rotation depends on the sign of the charge (clockwise for electrons, counterclockwise for protons, viewed along B).", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "For a charged particle moving at an angle θ to a magnetic field, what is the equation for the magnetic force, and what does this tell us about particles moving parallel to the field? (2 steps)", "answer": "- Step 1: The general equation is $$F = BQv \\sin\\theta$$, where θ is the angle between the velocity vector and the magnetic field direction.\n- Step 2: When the particle moves parallel (θ = 0°) or anti-parallel (θ = 180°) to the field, sin(θ) = 0, so the magnetic force is ZERO. A particle traveling along magnetic field lines experiences no magnetic force — it continues in a straight line unaffected by the field.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A solenoid has 500 turns, a cross-sectional area of 0.02 m², and is placed in a magnetic field of 0.1 T perpendicular to its area. What is the magnetic flux linkage? (2 steps)", "answer": "- Step 1: Magnetic flux linkage = ΦN = BAN\n- Step 2: $$\\Phi_N = (0.1) \\times (0.02) \\times 500 = 1.0$$ Wb-turns (Weber-turns)\n\nThe flux linkage is 1.0 Wb-turns.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "What are the three factors that can increase the magnitude of induced EMF in a coil, and explain why each works. (3 steps)", "answer": "- Step 1: Increase the speed of relative motion between magnet and coil — faster movement means greater rate of flux change (dΦ/dt), producing larger EMF.\n- Step 2: Increase the number of turns N in the coil — more turns means more flux linkage change (ΔNΦ), directly proportional to induced EMF according to Faraday's Law.\n- Step 3: Increase magnetic field strength B — stronger field means more flux (Φ = BA) passes through the coil for the same area, so when it changes, dΦ/dt is larger.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "In a top-pan balance experiment with a wire in a magnetic field, when current is switched on, the balance reading increases. Explain this observation using physics principles. (3 steps)", "answer": "- Step 1: When current flows through the wire in the magnetic field, a magnetic force acts on the wire (F = BIL). By Newton's Third Law, an equal and opposite force acts on the magnet (and thus on the balance).\n- Step 2: The increased reading on the balance is the additional force pushing down on the balance pan due to this reaction force.\n- Step 3: If the current direction is reversed, the magnetic force on the wire reverses, and the reaction force on the balance also reverses — the reading would decrease (or show negative change). Increasing current increases the force proportionally.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A transformer is designed to step up voltage from 100 V to 500 V. If the primary has 20 turns, how many turns must the secondary have? (2 steps)", "answer": "- Step 1: Using $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$\n- Step 2: $$\\frac{100}{500} = \\frac{20}{N_s}$$ → $$\\frac{1}{5} = \\frac{20}{N_s}$$ → $$N_s = 20 \\times 5 = 100$$ turns\n\nThe secondary coil needs 100 turns.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Why can't transformers work with direct current (DC), but motors can work with either AC or DC? (2 steps)", "answer": "- Step 1: Transformers rely on electromagnetic induction, which requires a CHANGING magnetic flux. DC produces a steady magnetic field (no change) → no induced EMF in secondary → transformer doesn't work.\n- Step 2: Motors work on the motor principle (force on current-carrying conductor in magnetic field). Whether the current is DC or AC, as long as current flows, a force is produced. AC motors may need design modifications for AC, but the basic principle of force-generation works with any current direction.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": true}, {"question": "A proton and an electron enter the same magnetic field with the same velocity. Compare the forces they experience. (2 steps)", "answer": "- Step 1: Both particles have the same charge magnitude (e = 1.6 × 10⁻¹⁹ C), but the proton has positive charge while the electron has negative charge.\n- Step 2: The force magnitude is the same: F = Bqv. However, the DIRECTION of the force differs due to opposite charge — they curve in opposite directions (opposite sense of rotation in circular motion). The proton curves one way, the electron curves the opposite way.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "What is electromagnetic induction? Under what two general conditions can an EMF be induced in a circuit? (2 steps)", "answer": "- Step 1: Electromagnetic induction is the process whereby an EMF is induced in a closed circuit due to changes in magnetic flux (or flux linkage).\n- Step 2: An EMF can be induced when:\n+ A conductor cuts through magnetic field lines (relative motion between conductor and field)\n+ The magnetic flux through a coil changes — this can occur by changing B, changing area A, or changing the angle θ", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Draw or describe the magnetic field direction symbols used in 3D diagrams. What do dots and crosses represent? (2 steps)", "answer": "- Step 1: In 2D diagrams representing 3D situations:\n+ DOT (●) represents magnetic field directed OUT of the page (toward the viewer)\n+ CROSS (×) represents magnetic field directed INTO the page (away from the viewer)\n- Step 2: Think of an arrow approaching head-on — you see only the point (dot). When the arrow flies away from you, you see only the cross-feathers at the back.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A step-up transformer increases voltage from 230 V to 23,000 V. If the primary current is 10 A, what is the secondary current assuming 100% efficiency? (2 steps)", "answer": "- Step 1: For ideal transformer: $$P_p = P_s$$ → $$V_p I_p = V_s I_s$$\n- Step 2: $$230 \\times 10 = 23,000 \\times I_s$$ → $$I_s = \\frac{2300}{23,000} = 0.1$$ A\n\nThe secondary current is 0.1 A (100 mA).", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "A coil rotates at constant speed in a uniform magnetic field. Describe how the induced EMF varies with time and explain why. (3 steps)", "answer": "- Step 1: The induced EMF varies sinusoidally — it follows a sine wave, going positive and negative (or zero to maximum to zero to maximum in opposite direction).\n- Step 2: This is because as the coil rotates, the rate at which it cuts field lines (dΦ/dt) changes continuously. When the coil is parallel to field lines, it cuts most field lines per second (maximum dΦ/dt → maximum EMF). When perpendicular, it's momentarily not cutting any lines (minimum dΦ/dt → zero EMF).\n- Step 3: The EMF equation is $$\\varepsilon = BAN\\omega \\sin(\\omega t)$$, where ω is angular velocity. The frequency of the AC output equals the rotation frequency (one cycle per revolution).", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Why do transmission power lines typically operate at hundreds of thousands of volts, and what role do transformers play in the National Grid? (3 steps)", "answer": "- Step 1: High voltage transmission minimizes I²R losses in the cables (as covered in Q12). Higher voltage allows the same power to be transmitted with lower current.\n- Step 2: The National Grid uses transformers at both ends:\n+ Step-up transformer at power station: increases voltage (e.g., 25 kV → 400 kV) for efficient transmission\n+ Step-down transformer near consumers: decreases voltage (400 kV → 230 V) to safe levels for homes\n- Step 3: This system allows power to be generated at moderate voltage, transmitted efficiently over long distances at very high voltage, and delivered safely at mains voltage.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "What is the key distinction between a magnetically hard material and a magnetically soft material? Give an example of each. (2 steps)", "answer": "- Step 1: Magnetically hard materials retain their magnetism strongly even after the external magnetizing field is removed (they are difficult to demagnetize). They are used for permanent magnets.\n+ Example: Steel or alnico — makes permanent magnets\n- Step 2: Magnetically soft materials are easily magnetized but lose their magnetism quickly when the external field is removed. They are used for electromagnets and transformer cores.\n+ Example: Soft iron — used in transformer cores and electromagnets", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "When a magnet is held stationary inside a coil, no EMF is induced. Explain why, referring to both Faraday's Law and Lenz's Law. (2 steps)", "answer": "- Step 1: According to Faraday's Law, induced EMF depends on the rate of change of magnetic flux linkage ($$\\varepsilon = -d\\Phi/dt$$). If the magnet is stationary, the magnetic flux through the coil is constant — ΔΦ = 0.\n- Step 2: Therefore, $$\\varepsilon = 0$$. No changing flux means no induced EMF, regardless of how strong the field is. Both laws require change — Faraday requires dΦ/dt, Lenz requires a change to oppose.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}], "count": 29}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What does magnetic flux density $$B$$ physically represent, and how is it defined operationally?", "answer": "- Step 1: Physically, $$B$$ represents the *strength* of a magnetic field at a point — visualised as the density of field lines. Where field lines are packed close, $$B$$ is large; where they're spread thin, $$B$$ is small.\n- Step 2: Operationally, we define $$B$$ by the force it exerts on a current-carrying wire placed perpendicular to it: $$B = F/(IL)$$. So one tesla is the field strength that produces one newton of force on one metre of wire carrying one amp perpendicular to the field.\n- Step 3: This is a \"response definition\" — we don't measure the field directly; we measure the force it exerts on a known current and back out $$B$$. Units: tesla (T). For scale: Earth's field is $$\\sim 0.032$$ mT, a fridge magnet is $$\\sim 5$$ mT — five orders of magnitude apart.\n\nTakeaway: $$B$$ is defined by what it does to moving charges, not by what it \"is\".", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "What is the conceptual distinction between magnetic flux $$\\Phi$$ and flux linkage $$N\\Phi$$, and why do we need both?", "answer": "- Step 1: Flux $$\\Phi = BA\\cos\\theta$$ measures how much field passes perpendicularly through *one* loop of area $$A$$. Unit: weber (Wb). It's a geometric quantity — field × perpendicular area.\n- Step 2: Flux linkage $$N\\Phi = BAN\\cos\\theta$$ multiplies by the number of turns $$N$$ in a coil. Unit: weber-turns (Wb turns). We need this because when a coil has $$N$$ turns, the same changing flux is \"seen\" by each loop, and each loop contributes its own induced EMF.\n- Step 3: So flux describes the *field geometry*; flux linkage describes *how effectively that flux couples to a coil*. A single wire has flux through it but flux linkage only matters for multi-turn coils — this is why solenoids induce much larger EMFs than single loops.\n\nTakeaway: doubling the turns doubles the induced EMF for the same flux change — this is the whole design principle of transformers.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "Why does flux vary as $$\\cos\\theta$$ where $$\\theta$$ is the angle between the field and the *normal* to the area, rather than the angle between the field and the area itself? (2 steps)", "answer": "- Step 1: Flux counts field lines passing *through* the surface. What matters is the component of $$\\vec{B}$$ perpendicular to the surface — because a field line parallel to the surface never crosses it. The natural way to describe \"perpendicular to a surface\" is the surface's normal vector.\n- Step 2: When $$\\vec{B}$$ is aligned with the normal ($$\\theta=0$$), every field line crosses the surface → maximum flux $$\\Phi = BA$$. When $$\\vec{B}$$ is perpendicular to the normal ($$\\theta=90°$$), it's parallel to the surface → no lines cross → $$\\Phi=0$$. The projection is $$B\\cos\\theta$$, giving $$\\Phi = BA\\cos\\theta$$.\n\nCommon trap: students often plug in \"the angle between field and coil plane\" — this gives $$\\sin\\theta$$ instead. Always draw the normal.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "A rectangular coil is rotated in a uniform field. At what orientation is the flux linkage maximum, and at what orientation is the *induced EMF* maximum? Why are these different? (3 steps)", "answer": "- Step 1: Flux linkage is maximum when the coil's normal is parallel to $$\\vec{B}$$ — i.e. the coil face is perpendicular to the field. Here $$N\\Phi = BAN$$.\n- Step 2: But induced EMF depends on the *rate of change* of flux linkage, not the linkage itself. At maximum flux, the coil is momentarily \"at the top\" — flux is at a turning point, so $$d(N\\Phi)/dt = 0$$ → EMF is zero.\n- Step 3: EMF peaks when the coil plane is *parallel* to $$\\vec{B}$$ (normal ⊥ field). Here flux linkage is zero, but the coil is sweeping through field lines at maximum rate → $$d(N\\Phi)/dt$$ is maximal → $$\\varepsilon_{\\max} = BAN\\omega$$.\n\nTakeaway: think of $$N\\Phi(t) = BAN\\cos(\\omega t)$$ and $$\\varepsilon(t) = BAN\\omega\\sin(\\omega t)$$ — they're 90° out of phase, so maxima of one coincide with zeros of the other.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "State Faraday's law in words and equation form, and explain the physical meaning of each symbol. (3 steps)", "answer": "- Step 1: In words: the magnitude of the induced EMF in a coil equals the rate of change of magnetic flux linkage through it.\n- Step 2: Equation: $$\\varepsilon = -N\\dfrac{d\\Phi}{dt} = -\\dfrac{d(N\\Phi)}{dt}$$.\n+ $$\\varepsilon$$ = induced EMF (volts) — the \"electrical push\" that would drive current in a complete circuit.\n+ $$N$$ = number of turns — each turn contributes its own EMF, so they add.\n+ $$d\\Phi/dt$$ = rate of change of flux — how fast field lines are being cut, or how fast $$B$$, $$A$$, or $$\\theta$$ is changing.\n- Step 3: The minus sign is Lenz's law: the induced EMF opposes the change in flux that produced it, ensuring energy conservation.\n\nKey insight: it's the *change* that matters — a stationary magnet, no matter how strong, induces nothing.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "State Lenz's law and explain why it must be true from energy conservation. (3 steps)", "answer": "- Step 1: Lenz's law: the induced current flows in the direction such that its magnetic effect *opposes* the change in flux that caused it.\n- Step 2: Why must this be so? Imagine the opposite — an induced current that *aids* the incoming change. Then the induced field would attract the approaching magnet, accelerating it. That acceleration would increase the flux change, which would induce more current, which would accelerate the magnet more... you'd get unlimited kinetic + electrical energy from nothing.\n- Step 3: To conserve energy, the induced current must push back against whatever's causing the flux change. The mechanical work you do pushing the magnet in is what gets converted to electrical energy — you feel resistance because you're doing work against Lenz's law.\n\nTakeaway: the minus sign in Faraday's law isn't cosmetic — it's the mathematical face of energy conservation.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "A north pole is pushed toward the face of a coil. What is the polarity of the coil's near face, and why? (3 steps)", "answer": "- Step 1: The incoming N pole increases the flux through the coil in one direction. By Lenz's law, the induced current must oppose this increase — so it must generate a magnetic field pointing *back* at the approaching magnet.\n- Step 2: To repel a N pole, the near face of the coil must also become a N pole (like poles repel).\n- Step 3: Using the right-hand grip rule: for the coil's near face to be N (field lines exiting), the induced current must flow anticlockwise when viewed from the magnet's side.\n\nReversal check: if you pull the magnet *away*, flux decreases, and the coil now tries to *maintain* the flux — the near face becomes a S pole to attract the magnet back.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "In F = BIL sin θ and F = BQv sin θ, what does θ refer to in each case, and why can't the two formulas be mixed up? (3 steps)", "answer": "- Step 1: In $$F = BIL\\sin\\theta$$, $$\\theta$$ is the angle between the *wire (current direction)* and $$\\vec{B}$$. This applies to a continuous current in a conductor of length $$L$$.\n- Step 2: In $$F = BQv\\sin\\theta$$, $$\\theta$$ is the angle between the *velocity of the charge* and $$\\vec{B}$$. This applies to an isolated moving charge with no wire.\n- Step 3: They can't be mixed because they describe different physical situations:\n+ The wire formula assumes many charges flowing steadily — $$IL$$ acts like a \"flux\" of charge.\n+ The particle formula tracks a single charge — no $$L$$, no $$I$$, just $$Q$$ and $$v$$.\n\nActually, one can derive the wire formula from the particle formula by summing over charge carriers: $$I = nAvQ$$ and $$L$$ gives volume $$AL$$, leading to $$F = BIL\\sin\\theta$$. They're consistent but describe different setups.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "Why does a charged particle in a uniform magnetic field move in a circle rather than a straight line or spiral (assuming no other forces)? (3 steps)", "answer": "- Step 1: The magnetic force $$F = Qv \\times B$$ is always perpendicular to the velocity. Since force ⊥ velocity, the force does no work — speed is constant.\n- Step 2: A constant-magnitude force always perpendicular to velocity is the definition of a centripetal force. It changes direction without changing speed.\n- Step 3: Setting magnetic force = centripetal force: $$BQv = mv^2/r \\Rightarrow r = mv/(BQ)$$.\n+ Faster particles → larger circles.\n+ Stronger field → tighter circles.\n+ Heavier particles → larger circles.\n\nEdge case: if $$\\vec{v}$$ has a component *along* $$\\vec{B}$$, that component is unaffected — the particle then spirals along the field lines (helix).", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "How does Fleming's left-hand rule differ from Fleming's right-hand rule, and when do you use each? (3 steps)", "answer": "- Step 1: Fleming's **left-hand rule (motor)**: used when a current in a field experiences a force. Thumb = Motion/Force, First finger = Field (N→S), seCond finger = Current (conventional, + charge direction).\n- Step 2: Fleming's **right-hand rule (generator)**: used when motion in a field induces a current. Same finger assignments (Thumb = Motion, First = Field, seCond = induced Current).\n- Step 3: Memory aid:\n+ Left = \"input current, get motion\" = motor.\n+ Right = \"input motion, get current\" = generator.\n\nCommon trap: with electrons or negative charges, point the second finger *opposite* to their motion (because conventional current flows opposite to electron flow).", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Why is the induced EMF in a rotating coil sinusoidal, and what determines its amplitude and frequency? (3 steps)", "answer": "- Step 1: A coil rotating at angular frequency $$\\omega$$ has flux linkage $$N\\Phi(t) = BAN\\cos(\\omega t)$$ — the geometric projection of the field onto the coil's normal traces out a cosine as the coil turns.\n- Step 2: Taking the rate of change: $$\\varepsilon = -d(N\\Phi)/dt = BAN\\omega\\sin(\\omega t)$$. So the EMF is a sine wave.\n- Step 3: Amplitude $$\\varepsilon_{\\max} = BAN\\omega$$ scales with:\n+ $$B$$ (stronger field → more flux swept)\n+ $$A$$ (bigger coil → more area)\n+ $$N$$ (more turns → each contributes)\n+ $$\\omega$$ (faster rotation → higher rate of change)\n\nFrequency of the AC output equals the rotation frequency of the coil.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "What is the key physical difference between an alternator and a dynamo, and how does this difference produce AC vs DC? (3 steps)", "answer": "- Step 1: Both are rotating-coil generators — the coil spins between magnetic poles, inducing an EMF. The difference is only in the *connection* to the external circuit.\n- Step 2: An **al
