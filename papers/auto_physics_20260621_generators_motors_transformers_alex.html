act with the brushes. No switching occurs, so the AC output passes through to the external circuit unchanged.\n- Step 3: A **dynamo** uses a **split-ring commutator** — a ring with a gap that swaps the electrical connections every half-turn. Just as the coil's EMF is about to reverse, the commutator flips which brush connects to which side of the coil, so the external current always flows the same way (DC, but bumpy).\n\nThe commutator in a dynamo is the same mechanism as in a DC motor — they share the split-ring design.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "For an AC generator, the EMF is $$\\varepsilon = BAN\\omega \\sin(\\omega t)$$. At what orientation of the coil is the EMF maximum, and at what orientation is it zero? Why is this counterintuitive? (3 steps)", "answer": "- Step 1: EMF is maximum when $$\\sin(\\omega t) = 1$$, which occurs when the coil is **parallel** to the field (the normal to the coil is perpendicular to the field). At this instant, the flux through the coil is zero, but the *rate of change* of flux is maximum — the coil is cutting through field lines at its fastest.\n- Step 2: EMF is zero when $$\\sin(\\omega t) = 0$$, which occurs when the coil is **perpendicular** to the field (the normal is aligned with the field). At this instant, the flux is at its maximum value, but the coil is momentarily \"turning around\" at the peak — the rate of change is zero.\n- Step 3: The counterintuitive point: **maximum flux ≠ maximum EMF**. EMF depends on the *gradient* of the flux-time graph, not the flux value itself. At the flux peak, the graph is flat (zero gradient = zero EMF). At the flux zero-crossing, the graph is steepest (maximum gradient = maximum EMF).\n\nThis is like a pendulum: maximum speed at the bottom (where displacement = 0), zero speed at the extremes (where displacement is maximum).", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "If you double the rotation frequency of an AC generator's coil, what happens to both the frequency and amplitude of the output EMF? (3 steps)", "answer": "- Step 1: The output frequency equals the rotation frequency. If you double the rotation frequency, the output frequency **doubles** — this is straightforward.\n- Step 2: The peak EMF is $$\\varepsilon_{max} = BAN\\omega$$. Since $$\\omega = 2\\pi f$$, doubling $$f$$ doubles $$\\omega$$, which doubles $$\\varepsilon_{max}$$. The amplitude **doubles**.\n- Step 3: Physically: spinning faster means the coil cuts through field lines more rapidly → larger rate of change of flux → larger EMF (Faraday's law). It also completes each cycle faster → higher frequency. Both effects come from the same cause — faster rotation.\n\nThis is a key exam point: increasing frequency doesn't just make the AC oscillate faster; it also makes each peak higher.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "A motor and a generator both involve a coil in a magnetic field. Contrast their energy conversions and the rule you apply for each. (2 steps)", "answer": "- Step 1: **Motor**: input = electrical energy (current supplied to coil) → output = mechanical energy (force on current-carrying coil makes it rotate). Apply Fleming's **Left**-Hand Rule (current + field → force). **Generator**: input = mechanical energy (coil is rotated by hand/turbine) → output = electrical energy (EMF induced by changing flux). Apply Fleming's **Right**-Hand Rule (motion + field → induced current).\n- Step 2: They are inverse processes. A motor is a generator run backwards, and vice versa. In fact, a spinning motor *also* generates a \"back EMF\" that opposes the supply voltage — it's simultaneously a generator. This is why a motor draws less current once it's up to speed (back EMF reduces the net voltage driving current).", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "State the five-stage transformer causal chain in the correct A-level exam order, starting from the AC input voltage. (5 steps)", "answer": "- Step 1: An **alternating input voltage** is applied across the primary coil (must be AC — DC gives no changing flux).\n- Step 2: This drives an **alternating current** in the primary coil (electrons oscillate back and forth, not flowing one way).\n- Step 3: The alternating current creates a **changing (alternating) magnetic field** in the primary coil and iron core (constant current would give constant field → no induction).\n- Step 4: The changing magnetic field links through the iron core to the secondary coil, producing a **changing flux linkage** in the secondary.\n- Step 5: By Faraday's law, the changing flux linkage **induces an alternating voltage** in the secondary coil. If the secondary is in a complete circuit, this drives an **alternating current** (same frequency as input).\n\nKey: every stage must mention \"changing\" or \"alternating.\" A constant DC at stage 1 kills the chain at stage 3 — no changing field, no induction.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": true}, {"question": "Why can't a transformer work with steady DC? What happens if you *switch on* a DC supply to the primary coil? (3 steps)", "answer": "- Step 1: A steady DC produces a **constant** current → constant magnetic field → constant flux linkage in the secondary. With no *change* in flux, Faraday's law gives $$\\varepsilon = 0$$. No EMF is induced. The transformer is dead.\n- Step 2: However, at the **moment of switching on**, the current rises from zero to its steady value — the flux is *changing* (increasing). During this brief interval, there IS a changing flux linkage, and a **momentary EMF** is induced in the secondary.\n- Step 3: Similarly, at the **moment of switching off**, the current drops to zero — the flux collapses. This is also a change, inducing a **momentary EMF in the opposite direction** (Lenz's law: the collapse is a *decrease*, so the induced EMF tries to sustain the flux). Between switch-on and switch-off, with DC steady, the induced EMF is zero.\n\nThis is why transformers are exclusively AC devices — you need *continuous* change, not just momentary transients.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "The ideal transformer turns ratio is $$\\frac{V_1}{V_2} = \\frac{N_1}{N_2}$$. Derive the intuition: why should doubling the turns double the voltage? (3 steps)", "answer": "- Step 1: Each turn of the secondary coil experiences the same changing flux (they're all wrapped around the same core). By Faraday's law, each turn gets the same induced EMF — call it $$\\varepsilon_0$$.\n- Step 2: With $$N_2$$ turns, the EMFs add in series: $$V_2 = N_2 \\times \\varepsilon_0$$. Similarly, the primary has $$N_1$$ turns, and the applied voltage must overcome the back-EMF in each turn: $$V_1 = N_1 \\times \\varepsilon_0$$ (same $$\\varepsilon_0$$ because same core, same changing flux).\n- Step 3: Dividing: $$\\frac{V_1}{V_2} = \\frac{N_1 \\varepsilon_0}{N_2 \\varepsilon_0} = \\frac{N_1}{N_2}$$. The $$\\varepsilon_0$$ cancels — the ratio depends only on turns. More secondary turns → each turn still gets the same EMF, but there are more of them adding up → higher output voltage.\n\nThis is why a step-up transformer has more turns on the secondary: more turns \"collecting\" the same per-turn EMF.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": true}, {"question": "For an ideal transformer, $$I_1 V_1 = I_2 V_2$$. Combine this with the turns ratio to show that the current ratio is the **inverse** of the turns ratio. Why does stepping up voltage step down current? (3 steps)", "answer": "- Step 1: From power conservation: $$I_1 V_1 = I_2 V_2$$, so $$\\frac{I_1}{I_2} = \\frac{V_2}{V_1}$$. From the turns ratio: $$\\frac{V_1}{V_2} = \\frac{N_1}{N_2}$$, so $$\\frac{V_2}{V_1} = \\frac{N_2}{N_1}$$.\n- Step 2: Substituting: $$\\frac{I_1}{I_2} = \\frac{N_2}{N_1}$$. The current ratio is the **inverse** of the turns ratio. If the secondary has twice as many turns ($$N_2 = 2N_1$$), then $$I_2 = I_1/2$$ — the secondary current is half the primary current.\n- Step 3: Physically: power must be conserved ($$P = IV$$). If you double the voltage, you must halve the current to deliver the same power. The transformer doesn't create energy — it trades voltage for current (or vice versa). More turns → more voltage per turn → higher $$V$$ → lower $$I$$ for the same power.\n\nThis inverse relationship is crucial for the National Grid: step up voltage → step down current → reduce heating losses.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": true}, {"question": "What is the purpose of the iron core in a transformer, and why is it made of *soft* iron that is *laminated*? (3 steps)", "answer": "- Step 1: **Purpose of the iron core**: it channels the magnetic field from the primary to the secondary coil, like a pipe carrying water. Iron is ferromagnetic, so it concentrates and strengthens the field enormously compared to air. Without it, most flux would leak and the transformer would be extremely inefficient.\n- Step 2: **Why soft iron**: \"soft\" means it magnetises and demagnetises easily. The magnetic field in the core reverses direction every half-cycle (it's AC). If the core retained magnetisation (like \"hard\" iron/steel), it would resist the reversal, wasting energy as heat (hysteresis loss). Soft iron follows the changing field with minimal resistance.\n- Step 3: **Why laminated**: the iron core is a conductor in a changing magnetic field — this would induce **eddy currents** (circulating currents within the core), dissipating energy as $$I^2R$$ heat. Laminating (slicing into thin, electrically insulated sheets) breaks up the large conducting loops, confining eddy currents to small paths and greatly reducing their magnitude and the associated losses.\n\nThink of lamination like slicing a loaf of bread — each slice is insulated from its neighbours, preventing large circulating currents from forming.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "In the National Grid, power is transmitted at very high voltage (~250 kV). Explain the causal chain: why does high voltage reduce energy loss, and what role does the step-up transformer play? (3 steps)", "answer": "- Step 1: The power station delivers a fixed power $$P = IV$$. The transmission cables have resistance $$R$$, and the power lost as heat is $$P_{loss} = I^2R$$. This is the key: loss depends on $$I^2$$, not $$V$$.\n- Step 2: For fixed power $$P$$, increasing $$V$$ decreases $$I$$ (since $$I = P/V$$). With smaller $$I$$, the $$I^2R$$ loss drops dramatically. Doubling the voltage quarters the current, which reduces the loss by a factor of 4. This is why voltage is stepped up to ~250 kV for long-distance transmission.\n- Step 3: The step-up transformer at the power station end increases voltage from ~40 kV to ~250 kV, reducing the transmission current proportionally. At the consumer end, a step-down transformer brings it back to 230 V for safety. The transformers themselves lose some energy, but the savings from reduced $$I^2R$$ loss in the cables far outweigh the transformer losses.\n\nThe entire logic rests on $$P_{loss} = I^2R$$, not $$P_{loss} = IV$$ — the voltage across the cables (due to resistance) is small; it's the current that drives the heating.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "A step-down transformer has $$N_p = 4000$$, $$N_s = 100$$, $$V_p = 230$$ V. If the primary current is 2 A and efficiency is 95%, what is the secondary current? Walk through conceptually. (4 steps)", "answer": "- Step 1: Find secondary voltage from turns ratio: $$V_s = V_p \\times \\frac{N_s}{N_p} = 230 \\times \\frac{100}{4000} = 230 \\times 0.025 = 5.75$$ V. This is a step-down: far fewer secondary turns → much lower voltage.\n- Step 2: If ideal (100% efficient), power in = power out: $$I_p V_p = I_s V_s$$, so $$I_s = \\frac{I_p V_p}{V_s} = \\frac{2 \\times 230}{5.75} = 80$$ A. Step-down: lower voltage → higher current.\n- Step 3: But efficiency is 95%, meaning only 95% of input power reaches the output: $$P_{out} = 0.95 \\times P_{in}$$. So $$I_s V_s = 0.95 \\times I_p V_p$$.\n- Step 4: Therefore $$I_s = 0.95 \\times 80 = 76$$ A. The real current is slightly less than the ideal value because some power is lost to eddy currents, resistance, and hysteresis in the transformer.\n\nThe efficiency formula: $$\\eta = \\frac{P_{out}}{P_{in}} = \\frac{V_s I_s}{V_p I_p}$$. A real transformer always has $$\\eta < 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": true}, {"question": "A bar magnet is pushed N-pole-first into a coil. Using Lenz's law, what pole does the near face of the coil become, and why? How does this relate to energy conservation? (3 steps)", "answer": "- Step 1: As the N pole approaches, the flux through the coil *increases*. Lenz's law says the induced current will oppose this increase — it will create a magnetic field that tries to *reduce* the incoming flux.\n- Step 2: To oppose an approaching N pole, the near face of the coil must also become a **N pole** (like poles repel). Using the right-hand grip rule: curl your fingers in the direction of the induced current, and your thumb points from S to N inside the coil — so the current flows **anticlockwise** as viewed from the magnet side.\n- Step 3: This repulsion means you must do **work** to push the magnet in. That work is converted into the electrical energy of the induced current. If the coil attracted the magnet instead (S pole facing the incoming N), the magnet would accelerate in on its own — creating energy from nothing. Conservation of energy requires opposition, which is exactly Lenz's law.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "On a graph of magnetic flux linkage vs time, how do you find the induced EMF at any instant? What does a flat (zero-gradient) section mean? (2 steps)", "answer": "- Step 1: The induced EMF equals the **negative gradient** of the flux linkage-time graph: $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$. At any instant, draw a tangent and find its slope. Steeper slope = larger EMF magnitude.\n- Step 2: A flat section (zero gradient) means the flux linkage is not changing → **zero induced EMF**, regardless of how large the flux value is. This occurs at the peaks and troughs of a sinusoidal flux graph — the turning points where the coil momentarily stops changing flux before reversing direction.\n\nFor a rotating coil: flux linkage is $$N\\Phi = BAN\\cos(\\omega t)$$, which is a cosine curve. The EMF is the negative derivative: $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$, a sine curve 90° out of phase — EMF peaks where flux is zero and vice versa.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "A U-magnet sits on a balance (zeroed). A wire between the poles carries current left-to-right, and the balance now reads +161 g (a downward force on the balance). By Newton's 3rd law, what is the direction of the force on the wire, and why? (3 steps)", "answer": "- Step 1: The balance reads the force the magnet+wire system exerts *on the balance pan*. A positive reading means a **downward** force on the balance — the magnet is pushing down harder.\n- Step 2: By Newton's 3rd law, the force on the balance from the magnet is equal and opposite to the force on the magnet from the wire. If the magnet is pushed down, the wire must be pushing the magnet down — which means the magnet is pushing the wire **up** (action-reaction pair).\n- Step 3: So the force on the wire is **upward**. Using Fleming's LHR: thuMb up (force), seCond finger right (current L→R) → First finger (field) must point **into the page**. This tells you the magnetic field direction between the poles.\n\nThe key insight: the balance measures the reaction force, not the action force directly. Newton's 3rd law flips the direction.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": true}, {"question": "How do you reverse the direction of rotation of a DC motor, and how do you increase its speed? (2 steps)", "answer": "- Step 1: **Reverse direction**: swap the battery polarity (reverse the current direction). If current reverses, the force on each side of the coil reverses (Fleming's LHR), so the torque reverses, and the coil spins the other way. Alternatively, you could reverse the field direction (swap the magnet poles), but reversing the current is simpler.\n- Step 2: **Increase speed**: increase the current (stronger battery, lower resistance, or more turns). Stronger current → stronger force ($$F = BIL$$) → greater torque → faster rotation. In permanent-magnet motors, $$B$$ is fixed, so speed scales with current. In motors with electromagnet stators, you can also strengthen the field for even more force.\n\nNote: you cannot change speed by changing the field *alone* in a permanent-magnet motor — the field is fixed by the magnets.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": true}, {"question": "What are the four main sources of energy loss in a real transformer? For each, what physical mechanism is responsible? (4 steps)", "answer": "- Step 1: **Resistive ($$I^2R$$) losses in the copper windings**: the coils have resistance, and current flowing through them dissipates heat. More current → more loss. This is why the windings get warm during operation.\n- Step 2: **Eddy currents in the iron core**: the changing magnetic flux induces circulating currents in the conducting iron core, which dissipate energy as heat. Reduced by laminating the core (breaking up the conducting paths).\n- Step 3: **Hysteresis losses**: the iron core must be magnetised and demagnetised every half-cycle. Each cycle, some energy is lost as heat because the magnetisation process isn't perfectly reversible (the B-H curve has a loop area proportional to energy lost per cycle). Soft iron minimises this.\n- Step 4: **Flux leakage**: not all the magnetic flux from the primary passes through the secondary — some \"leaks\" out of the core into the surrounding air. This flux doesn't contribute to induction in the secondary, so it represents wasted energy. Better core design (closed loop, tight winding) minimises leakage.\n\nThese four losses mean real transformers are typically 95-99% efficient, not 100%.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "A transformer has $$N_p = 10$$ and $$N_s = 20$$. The input voltage is 100 V. What is the output voltage, and is this a step-up or step-down transformer? (2 steps)", "answer": "- Step 1: Using the turns ratio $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$: $$\\frac{100}{V_s} = \\frac{10}{20} = \\frac{1}{2}$$, so $$V_s = 100 \\times 2 = 200$$ V.\n- Step 2: Since $$N_s > N_p$$ (20 > 10), the secondary voltage is higher than the primary — this is a **step-up** transformer. Doubling the turns doubles the voltage. The secondary current will be *half* the primary current (power conservation).", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "A power station outputs 20 A at 40,000 V. A step-up transformer raises this to 250,000 V for transmission. What is the approximate current in the transmission line, and why does this matter? (2 steps)", "answer": "- Step 1: Power conservation (ideal): $$I_p V_p = I_s V_s$$, so $$I_s = \\frac{I_p V_p}{V_s} = \\frac{20 \\times 40{,}000}{250{,}000} = \\frac{800{,}000}{250{,}000} \\approx 3.2$$ A. The current drops dramatically.\n- Step 2: This matters because the power lost in the transmission cables is $$P_{loss} = I^2R$$. Going from 20 A to 3.2 A reduces the loss by a factor of $$(20/3.2)^2 \\approx 39$$. The voltage was increased by a factor of ~6, but the loss decreased by a factor of ~39 — a huge saving for the National Grid.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "An electron moves at right angles to a magnetic field. Does the magnetic force do work on the electron? Why or why not? (2 steps)", "answer": "- Step 1: The magnetic force is always **perpendicular** to the velocity: $$\\vec{F} = Q\\vec{v} \\times \\vec{B}$$. The cross product guarantees the force is at 90° to the direction of motion.\n- Step 2: Work done is $$W = \\vec{F} \\cdot \\vec{d} = Fd\\cos\\theta$$. Since $$\\theta = 90°$$ between force and displacement at every instant, $$\\cos 90° = 0$$, so **no work is done**. The electron's speed stays constant — only its direction changes. This is why charged particles in magnetic fields move in circles at constant speed, not spirals.\n\nThis is fundamentally different from an electric field, where $$\\vec{F} = Q\\vec{E}$$ is parallel to the field and *does* do work.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": true}, {"question": "A coil with area 0.02 m² and 200 turns rotates at 50 Hz in a 0.5 T field. What is the peak EMF, and what is the EMF at $$t = 0.01$$ s? Walk through conceptually. (3 steps)", "answer": "- Step 1: Find $$\\omega = 2\\pi f = 2\\pi \\times 50 = 100\\pi$$ rad/s. The peak EMF is $$\\varepsilon_{max} = BAN\\omega = 0.5 \\times 0.02 \\times 200 \\times 100\\pi = 0.5 \\times 0.02 \\times 200 \\times 314 \\approx 628$$ V.\n- Step 2: The EMF at time $$t$$ is $$\\varepsilon = \\varepsilon_{max} \\sin(\\omega t) = 628 \\sin(100\\pi t)$$. At $$t = 0.01$$ s: $$\\omega t = 100\\pi \\times 0.01 = \\pi$$ radians.\n- Step 3: $$\\sin(\\pi) = 0$$, so $$\\varepsilon = 0$$ V. At $$t = 0.01$$ s (half a period later), the coil is at a turning point — flux is at an extreme and momentarily not changing. The EMF passes through zero twice per cycle.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "A rectangular coil (350 turns, area 4.9 × 10⁻⁴ m²) in an 80 mT field is rotated from horizontal (field parallel to coil) to vertical (field perpendicular) in 0.18 s. What average EMF is induced? Walk through the reasoning. (3 steps)", "answer": "- Step 1: Initial flux linkage: coil is horizontal, field is parallel to the coil plane → the field is along the coil, not through it → $$\\theta = 90°$$ to the normal → $$N\\Phi_{initial} = BAN\\cos 90° = 0$$. Final flux linkage: coil is vertical, field is perpendicular to the coil → $$\\theta = 0°$$ → $$N\\Phi_{final} = BAN = 80 \\times 10^{-3} \\times 4.9 \\times 10^{-4} \\times 350 = 0.014$$ Wb turns.\n- Step 2: Change in flux linkage: $$\\Delta(N\\Phi) = 0.014 - 0 = 0.014$$ Wb turns. Time: $$\\Delta t = 0.18$$ s.\n- Step 3: Average EMF: $$\\varepsilon = \\frac{\\Delta(N\\Phi)}{\\Delta t} = \\frac{0.014}{0.18} \\approx 0.076$$ V. This is the *average* EMF over the 0.18 s interval — the instantaneous EMF would vary during the rotation.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": true}, {"question": "When a magnet is pulled *out* of a coil (after being pushed in), the induced EMF reverses direction compared to when it was pushed in. Why? (2 steps)", "answer": "- Step 1: Pushing the N pole *in* increases the flux through the coil (more field lines pass through). Lenz's law: induced current opposes the increase → creates a field to *reduce* flux → near face becomes N (repels the incoming magnet).\n- Step 2: Pulling the N pole *out* decreases the flux. Lenz's law: induced current opposes the decrease → creates a field to *maintain* flux → near face becomes S (attracts the retreating magnet, trying to keep it). This requires current in the **opposite direction** → EMF is reversed.\n\nThe direction of induced EMF always depends on whether flux is increasing or decreasing — opposite changes produce opposite EMFs.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "Why does the formula for the radius of circular motion in a magnetic field, $$r = \\frac{mv}{BQ}$$, predict that heavier or faster particles curve less? (2 steps)", "answer": "- Step 1: The radius formula comes from equating magnetic force (centripetal) to the circular motion requirement: $$BQv = \\frac{mv^2}{r}$$, giving $$r = \\frac{mv}{BQ}$$. Larger $$r$$ means gentler curve.\n- Step 2: **Heavier particles** ($$m$$↑) have more inertia — the same force produces less acceleration, so the curve is wider (larger $$r$$). **Faster particles** ($$v$$↑) are harder to deflect — they cover more distance before the perpendicular force can turn them, so the radius is larger. Conversely, stronger field ($$B$$↑) or larger charge ($$Q$$↑) pulls harder → tighter curve → smaller $$r$$.\n\nThis is why mass spectrometers work: particles of different mass (but same charge and speed) follow circles of different radius, separating them spatially.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": true}, {"question": "A transformer's primary coil has 4000 turns and the secondary has 100 turns. If 230 V AC is applied to the primary, what is the secondary voltage, and approximately how does the current change? (3 steps)", "answer": "- Step 1: Turns ratio: $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s} = \\frac{4000}{100} = 40$$. So $$V_s = \\frac{V_p}{40} = \\frac{230}{40} = 5.75$$ V. This is a step-down transformer (fewer secondary turns → lower voltage).\n- Step 2: For an ideal transformer, $$I_p V_p = I_s V_s$$, so $$\\frac{I_s}{I_p} = \\frac{V_p}{V_s} = 40$$. The secondary current is **40 times larger** than the primary current.\n- Step 3: Step-down transformers trade voltage for current. The low voltage (5.75 V) at high current is useful for devices that need large current at low voltage (e.g., phone chargers, doorbell transformers). Power is conserved (ideally): small current at high voltage in = large current at low voltage out.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": false}, {"question": "You have a graph of flux linkage $$N\\Phi$$ vs time that looks like a cosine wave. Sketch (describe) what the induced EMF vs time graph would look like and explain the phase relationship. (3 steps)", "answer": "- Step 1: EMF is the negative gradient of the flux linkage graph: $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$. The gradient of a cosine is $$-\\sin$$, so the negative gradient is $$+\\sin$$.\n- Step 2: If $$N\\Phi = BAN\\cos(\\omega t)$$, then $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$. The EMF graph is a **sine wave** — it's the flux linkage graph shifted forward by a quarter cycle (90° or $$\\pi/2$$ radians).\n- Step 3: When flux linkage is at a maximum (peak of cosine), its gradient is zero → EMF = 0. When flux linkage crosses zero (steepest part of cosine), the gradient is maximum → EMF is at its peak. They are **90° out of phase**: EMF leads flux linkage by a quarter cycle.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": false}, {"question": "Explain the misconception: \"A stronger magnet inside a coil will induce a larger EMF.\" Is this true or false, and why? (2 steps)", "answer": "- Step 1: **False** (or at least incomplete and misleading). A stronger magnet produces a larger *flux*, but EMF depends on the **rate of change** of flux, not the flux itself. A strong magnet sitting still inside a coil induces zero EMF.\n- Step 2: What IS true: if you move a stronger magnet at the *same speed* as a weaker one, the *change* in flux per unit time is larger (because each field line that enters/leaves the coil represents a bigger change), so the induced EMF is larger. The key factor is $$\\frac{d\\Phi}{dt}$$ — a strong magnet moving fast induces more than a weak magnet moving slowly, but a strong magnet not moving induces nothing.\n\nEMF ∝ rate of change of flux, not flux itself. This is the most important conceptual point about Faraday's law.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": false}, {"question": "A wire of length 1 m carries 2 A perpendicular to a 0.5 T field. What force acts on it, and if the wire is tilted to 30° to the field, how does the force change? (2 steps)", "answer": "- Step 1: Perpendicular ($$\\theta = 90°$$): $$F = BIL\\sin 90° = 0.5 \\times 2 \\times 1 \\times 1 = 1$$ N. Maximum force.\n- Step 2: At $$\\theta = 30°$$: $$F = BIL\\sin 30° = 0.5 \\times 2 \\times 1 \\times 0.5 = 0.5$$ N. The force is halved because only the component of current perpendicular to the field contributes. At 30° to the field, the perpendicular component is $$\\sin 30° = 0.5$$ of the full current.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": false}, {"question": "Why does a DC motor need a split-ring commutator, and what would happen without it? (3 steps)", "answer": "- Step 1: As the coil rotates, each side of the coil alternately moves up and down through the magnetic field. Without switching, the current direction stays the same, but the coil's orientation flips — so the force direction reverses every half-turn.\n- Step 2: Without the commutator, the coil would oscillate back and forth rather than spinning continuously. It would rotate half a turn, then the force would reverse and push it back, rotating the other half turn, then back again — it would just wobble.\n- Step 3: The split-ring commutator reverses the current direction every half-turn, precisely when the coil passes the vertical position. This ensures the force on each side of the coil always pushes in the same rotational direction (e.g., always clockwise), maintaining continuous rotation.\n\nThe commutator is the key engineering trick that converts the oscillating tendency of a magnetic force into continuous rotation.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": false}, {"question": "Explain why a transformer is described as having \"no electrical connection\" between primary and secondary, yet energy is still transferred. How? (2 steps)", "answer": "- Step 1: The primary and secondary coils are electrically isolated — no wire connects them, and no charge flows from one to the other. They are linked only by the **iron core**, which carries the magnetic flux.\n- Step 2: Energy transfer is entirely through the **changing magnetic field**: electrical energy in the primary → magnetic energy in the core → electrical energy in the secondary. The iron core acts as a \"magnetic wire\" — it channels the field just as a copper wire channels current. This is the beauty of electromagnetic induction: energy crosses a gap without any physical contact.\n\nThis principle (mutual inductance) is also how wireless charging works — just with an air core instead of iron.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": false}, {"question": "What is the difference between \"magnetic flux density\" ($$B$$) and \"magnetic flux\" ($$\\Phi$$)? Why do we need both concepts? (2 steps)", "answer": "- Step 1: **Magnetic flux density** ($$B$$) describes the *intensity* of the field at a point — how many field lines per unit area. It's a local property, measured in tesla. **Magnetic flux** ($$\\Phi = BA\\cos\\theta$$) describes the *total amount* of field passing through a given area — it depends on both the field strength AND the size/orientation of the area. Measured in weber.\n- Step 2: We need both because they answer different questions. $$B$$ tells you \"how strong is the field here?\" — relevant for force calculations ($$F = BIL$$). $$\\Phi$$ tells you \"how much field goes through this surface?\" — relevant for induction calculations ($$\\varepsilon = -d\\Phi/dt$$). You can have strong $$B$$ but small $$\\Phi$$ (if the area is tiny) or weak $$B$$ but large $$\\Phi$$ (if the area is huge).\n\nAnalogy: $$B$$ is like rainfall intensity (mm/hour). $$\\Phi$$ is like total water collected in a bucket — it depends on both the intensity AND the bucket's opening area.", "source": "GLM 5.1 ②", "_id": "glm_2_62", "judge_pick": true}, {"question": "Synthesis question: A generator coil rotates faster. Explain the full chain of effects on the output — from flux linkage to EMF waveform — using Faraday's law. (4 steps)", "answer": "- Step 1: The flux linkage is $$N\\Phi = BAN\\cos(\\omega t)$$. Increasing the rotation speed increases $$\\omega$$, so the flux linkage oscillates more rapidly (higher frequency) — the cosine wave compresses horizontally.\n- Step 2: The induced EMF is $$\\varepsilon = -\\frac{d(N\\Phi)}{dt} = BAN\\omega\\sin(\\omega t)$$. The increased $$\\omega$$ appears in two places: (a) inside the $$\\sin(\\omega t)$$, making the EMF oscillate faster (higher output frequency), and (b) as a multiplier $$BAN\\omega$$, increasing the amplitude.\n- Step 3: Physically via Faraday's law: faster rotation means the coil cuts through field lines more rapidly → larger rate of change of flux → larger EMF (both peak and instantaneous). The coil also completes each cycle faster → higher frequency.\n- Step 4: Both effects — doubled amplitude AND doubled frequency — come from the same cause. You cannot increase the frequency without also increasing the amplitude (for a given $$B$$, $$A$$, $$N$$). This is a distinctive feature of generators that examiners test.", "source": "GLM 5.1 ②", "_id": "glm_2_63", "judge_pick": false}, {"question": "Synthesis question: In the National Grid, why can't we just use thick cables with low resistance instead of stepping up the voltage? Wouldn't that also reduce $$I^2R$$ losses? (3 steps)", "answer": "- Step 1: Thicker cables do have lower resistance ($$R \\propto 1/A$$ for a given material and length), which would reduce $$I^2R$$ losses for a given current. So technically, yes — thicker cables help.\n- Step 2: However, the cables are hundreds of kilometres long. Making them thick enough to carry 20 A at 40 kV with acceptably low losses would require enormously thick, heavy, expensive copper/aluminium. The cost and weight of the cable, plus the cost of the support towers to hold it, would be prohibitive.\n- Step 3: Stepping up the voltage is far more efficient because $$P_{loss} = I^2R = \\frac{P^2R}{V^2}$$. Loss scales as $$1/V^2$$ — increasing voltage by a factor of 6 reduces losses by a factor of 36, without changing the cables at all. It's much cheaper to build transformers than to install massively thicker cables across the country.\n\nThe key insight: reducing current is far more effective than reducing resistance, because loss depends on $$I^2$$ but only linearly on $$R$$.", "source": "GLM 5.1 ②", "_id": "glm_2_64", "judge_pick": true}, {"question": "A proton and an electron enter the same magnetic field at the same speed, both perpendicular to the field. Which has the larger radius of curvature, and why? (3 steps)", "answer": "- Step 1: The radius of curvature is $$r = \\frac{mv}{BQ}$$. Both particles have the same speed $$v$$, the same field $$B$$, and the same magnitude of charge $$|Q| = e$$. The only difference is mass.\n- Step 2: The proton is ~1836 times heavier than the electron. Since $$r \\propto m$$ (with everything else equal), the proton's radius is ~1836 times larger.\n- Step 3: Physically: the proton has much more inertia (mass) for the same magnetic force to deflect. It's harder to bend a heavy particle — it curves gently (large $$r$$). The light electron is easily deflected into a tight circle (small $$r$$).\n\nThis mass-dependent radius is the operating principle of a mass spectrometer — different particles separate by mass.", "source": "GLM 5.1 ②", "_id": "glm_2_65", "judge_pick": false}, {"question": "Edge case: A charged particle moves *parallel* to a uniform magnetic field. What happens to its motion, and why? (2 steps)", "answer": "- Step 1: The force on the particle is $$F = BQv\\sin\\theta$$. If the velocity is parallel to the field, $$\\theta = 0°$$ and $$\\sin 0° = 0$$, so $$F = 0$$. No magnetic force acts.\n- Step 2: With no force, the particle continues in a **straight line at constant speed** along the field direction. It is completely unaffected by the magnetic field. This is the limiting case: only the component of velocity *perpendicular* to the field contributes to the magnetic force.\n\nIf the velocity has both parallel and perpendicular components, the particle spirals (helix) — circular motion in the perpendicular plane combined with straight-line drift along the field.", "source": "GLM 5.1 ②", "_id": "glm_2_66", "judge_pick": false}, {"question": "An electron beam enters a magnetic field going to the right. The field points into the page. Which way does the electron initially deflect? Walk through Fleming's LHR carefully. (3 steps)", "answer": "- Step 1: The electron moves right, but Fleming's LHR uses **conventional current** (positive charge flow). An electron moving right is equivalent to conventional current moving **left**. So the second finger points left.\n- Step 2: The field is into the page → first finger points into the page. Second finger points left (conventional current). Adjust your hand: first finger into page, second finger left → thumb points **downward**.\n- Step 3: The force is **downward** — the electron initially deflects downward. If you had forgotten to reverse the current direction for the electron, you would have pointed the second finger right and gotten an upward force — the wrong answer.\n\nThis is the most common mistake with Fleming's LHR: forgetting that electrons flow opposite to conventional current.", "source": "GLM 5.1 ②", "_id": "glm_2_67", "judge_pick": false}, {"question": "A coil with 100 turns and area 0.01 m² sits in a 0.3 T field. The coil is perpendicular to the field. What is the flux linkage? If the field is slowly reduced to zero over 0.5 s, what average EMF is induced? (3 steps)", "answer": "- Step 1: Initial flux linkage: $$N\\Phi = BAN = 0.3 \\times 0.01 \\times 100 = 0.3$$ Wb turns. The coil is perpendicular to the field, so $$\\theta = 0°$$ and the full flux passes through.\n- Step 2: Final flux linkage: the field drops to zero, so $$N\\Phi = 0$$. Change: $$\\Delta(N\\Phi) = 0.3$$ Wb turns.\n- Step 3: Average EMF: $$\\varepsilon = \\frac{\\Delta(N\\Phi)}{\\Delta t} = \\frac{0.3}{0.5} = 0.6$$ V. The EMF is induced because the flux is *decreasing* — by Lenz's law, the induced current would try to maintain the field (oppose the decrease).", "source": "GLM 5.1 ②", "_id": "glm_2_68", "judge_pick": false}, {"question": "Why is it that when you push a magnet into a coil, you feel resistance — the magnet seems to be \"pushed back\"? Connect this to Lenz's law and energy conservation. (3 steps)", "answer": "- Step 1: As you push the magnet in, the changing flux induces a current in the coil (Faraday's law). By Lenz's law, this current creates a magnetic field that **opposes** the change — if you're pushing a N pole in, the coil's near face becomes N, repelling the magnet.\n- Step 2: You must do **work** against this repulsive force to keep pushing the magnet in. The work you do is converted into the electrical energy of the induced current (and eventually heat in the coil's resistance).\n- Step 3: This is conservation of energy made manifest. The electrical energy doesn't come from nowhere — it comes from your mechanical work. If Lenz's law didn't hold (if the coil attracted the magnet instead), the magnet would accelerate on its own, generating increasing current from nothing — a perpetual motion machine. The \"resistance\" you feel is the price of creating electrical energy.", "source": "GLM 5.1 ②", "_id": "glm_2_69", "judge_pick": true}, {"question": "Synthesis: A student says \"In a transformer, the primary voltage creates the secondary voltage.\" Critique this statement using the correct causal chain. (3 steps)", "answer": "- Step 1: The statement is imprecise and misses the key intermediate steps. The primary voltage doesn't directly create the secondary voltage — there is no electrical connection between the coils.\n- Step 2: The correct chain: primary **voltage** → primary **current** → changing **magnetic field** in the core → changing **flux linkage** in the secondary → **induced EMF** in the secondary (Faraday's law). The voltage is induced by the *changing flux*, not by the primary voltage itself.\n- Step 3: The distinction matters because: (a) DC voltage would give a primary current but NO induced secondary voltage (no changing flux); (b) if the core were removed, the primary voltage and current would still exist, but the flux linkage to the secondary would be too weak to induce useful voltage. The chain requires every link, especially the *changing* magnetic field.\n\nExam answers must show the full chain with the word \"change\" or \"changing\" at each stage.", "source": "GLM 5.1 ②", "_id": "glm_2_70", "judge_pick": true}, {"question": "What would happen to a transformer if the iron core were replaced with a plastic core? Would it still work? Explain qualitatively. (2 steps)", "answer": "- Step 1: Plastic is not ferromagnetic — it doesn't concentrate or channel magnetic field lines. The primary coil would still produce a changing magnetic field when AC flows, but this field would spread out into the surrounding air rather than being guided to the secondary coil.\n- Step 2: The transformer would still technically work (a changing flux does reach the secondary), but it would be **extremely inefficient**. Most of the flux would \"leak\" away, and the flux linkage to the secondary would be tiny. The output voltage would be much smaller than the turns ratio predicts. The iron core is what makes transformers practical by confining and amplifying the flux.\n\nThis is why air-core transformers exist but are only used in special high-frequency applications where iron losses would be prohibitive.", "source": "GLM 5.1 ②", "_id": "glm_2_71", "judge_pick": false}], "count": 72}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What is the physical meaning of magnetic flux density $$B$$, and how is it operationally defined from the force on a wire? (2 steps)", "answer": "- Step 1: Magnetic flux density $$B$$ represents the strength of a magnetic field at a point, visualised by how densely packed the field lines are. Operationally, it is defined by the force exerted on a current-carrying conductor placed perpendicular to the field.\n- Step 2: Rearranging the force equation $$F = BIL$$ (for a perpendicular wire) gives $$B = F / (IL)$$. This means 1 tesla (T) is the flux density that produces a force of 1 N on a 1 m wire carrying a current of 1 A perpendicular to the field. For context, Earth's field is roughly $$0.032 \\text{ mT}$$, while a fridge magnet is about $$5 \\text{ mT}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "In the formula for magnetic flux $$\\Phi = BA \\cos \\theta$$, what exactly does the angle $$\\theta$$ represent, and what are the extreme cases? (3 steps)", "answer": "- Step 1: The angle $$\\theta$$ is the angle between the magnetic field lines and the **normal** (perpendicular line) to the plane of the area. It is NOT the angle between the field and the plane itself.\n- Step 2: When the field is perpendicular to the area, $$\\theta = 0^\\circ$$ and $$\\cos \\theta = 1$$, giving maximum flux $$\\Phi = BA$$. This is when the field passes straight through the loop.\n- Step 3: When the field is parallel to the area (skimming the surface), $$\\theta = 90^\\circ$$ and $$\\cos \\theta = 0$$, giving zero flux. This makes physical sense: if the field skims the surface, no field lines actually pass *through* it.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "What is the crucial difference between magnetic flux ($$\\Phi$$) and magnetic flux linkage ($$N\\Phi$$), and when must you use flux linkage? (2 steps)", "answer": "- Step 1: Magnetic flux $$\\Phi = BA \\cos \\theta$$ measures the total field passing through a *single* loop of area $$A$$, measured in webers (Wb). Flux linkage multiplies this by the number of turns $$N$$ in a coil.\n- Step 2: Flux linkage $$N\\Phi = BAN \\cos \\theta$$ is used when dealing with solenoids or coils. It accounts for the fact that the changing flux is being \"linked\" by every single turn, so the total induced EMF depends on the rate of change of $$N\\Phi$$, not just $$\\Phi$$. Its unit is weber-turns (Wb turns).", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "A wire carries a current at $$30^\\circ$$ to a magnetic field. A separate coil has its normal at $$30^\\circ$$ to a magnetic field. Explain the difference in how the angle $$\\theta$$ is used in the force formula $$F = BIL \\sin \\theta$$ versus the flux formula $$\\Phi = BA \\cos \\theta$$. (3 steps)", "answer": "- Step 1: In the force formula $$F = BIL \\sin \\theta$$, $$\\theta$$ is the angle between the **current direction** (the wire) and the **magnetic field**. Here, $$30^\\circ$$ means the wire is mostly parallel to the field, giving a relatively small force.\n- Step 2: In the flux formula $$\\Phi = BA \\cos \\theta$$, $$\\theta$$ is the angle between the **normal to the area** and the **magnetic field**. Here, $$30^\\circ$$ means the normal is mostly aligned with the field, giving a relatively large flux.\n- Step 3: This is a classic exam trap. For force, $$90^\\circ$$ gives maximum. For flux, $$0^\\circ$$ gives maximum. Always check if the question gives the angle to the field or the angle to the normal, and which formula you are using.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "Why does a charged particle moving in a uniform magnetic field follow a circular path, and what determines the radius of this circle? (3 steps)", "answer": "- Step 1: The magnetic force on a moving charge is given by $$F = BQv$$ (assuming perpendicular). Fleming's Left-Hand Rule shows this force is always perpendicular to the velocity $$v$$ of the charge.\n- Step 2: A force that is always perpendicular to the direction of motion acts as a **centripetal force**. It changes the direction of the velocity but not its speed, causing the particle to move in a circle.\n- Step 3: Equating the magnetic force to the centripetal force: $$BQv = \\frac{mv^2}{r}$$. Rearranging for the radius gives $$r = \\frac{mv}{BQ}$$. This shows that a heavier or faster particle has a larger radius (harder to bend), while a stronger field or larger charge gives a smaller radius (easier to bend).", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "When using Fleming's Left-Hand Rule for an electron beam moving to the right in a magnetic field pointing into the page, why must you point your second finger to the *left*? (2 steps)", "answer": "- Step 1: Fleming's Left-Hand Rule uses **conventional current**, which is defined as the flow of *positive* charge. The second finger represents this conventional current direction.\n- Step 2: Electrons are negatively charged, so their direction of motion is opposite to the direction of conventional current. If the electron moves to the right, the conventional current is to the left. Therefore, you must point your second finger to the left to correctly determine the force (thumb) on the electron.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "A U-magnet sits on an electronic balance, and a wire between its poles carries a current, causing the balance reading to increase. If the force on the magnet is downwards, what is the direction of the force on the wire, and what principle dictates this? (2 steps)", "answer": "- Step 1: The principle is Newton's Third Law: every action has an equal and opposite reaction. The wire and the magnet exert equal and opposite forces on each other.\n- Step 2: If the magnet experiences a downward force from the wire (action), the wire must experience an upward force from the magnet (reaction). You can then use this upward force direction and the current direction in Fleming's Left-Hand Rule to determine the direction of the magnetic field.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "A magnet is sitting completely still inside a coil. Will there be an induced EMF in the coil? Why or why not? (2 steps)", "answer": "- Step 1: There will be **no** induced EMF. Electromagnetic induction requires a *changing* magnetic flux linkage.\n- Step 2: While the stationary magnet does create a high magnetic flux through the coil, the flux is constant over time. Faraday's law states $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$, meaning the EMF depends on the *rate of change* of flux, not the amount of flux itself. Zero change means zero induced EMF.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "In electromagnetic induction, does a changing flux induce a current or a voltage first? Why must this distinction be made? (2 steps)", "answer": "- Step 1: A changing flux induces an **EMF (voltage)** first. Current will only flow if the conductor is part of a *complete* closed circuit.\n- Step 2: This distinction is crucial because the induced EMF exists regardless of whether a current flows (e.g., an open circuit still has an induced EMF). The current is a secondary consequence of that voltage driving charge through a closed path.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "If a magnet is pushed towards a coil, the induced current creates a magnetic field that repels the magnet. How does this demonstrate conservation of energy? (3 steps)", "answer": "- Step 1: Lenz's law states the induced current opposes the change that produced it. If a N pole approaches, the coil becomes a N pole to repel it.\n- Step 2: To keep pushing the magnet towards the coil against this repulsive force, mechanical work must be done. This work is the source of the electrical energy generated in the coil.\n- Step 3: If the coil *attracted* the magnet instead, the magnet would accelerate into the coil on its own, generating electrical energy from nothing. This would violate conservation of energy. Therefore, Lenz's law is simply a consequence of energy conservation.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "On a graph of magnetic flux linkage vs time, what does the *gradient* of the graph represent, and how does the sign of the gradient relate to Lenz's law? (2 steps)", "answer": "- Step 1: The magnitude of the gradient represents the **magnitude of the induced EMF**. Faraday's law is $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$, which is the negative of the gradient.\n- Step 2: The sign of the gradient tells you the direction of the induced EMF relative to the defined positive direction. A positive gradient (increasing flux) means the induced EMF is negative (opposing the increase, as per Lenz's law). A negative gradient (decreasing flux) means the EMF is positive, opposing the decrease.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "How do slip rings and a split-ring commutator differ in their function, and how do they affect the output current of a generator? (3 steps)", "answer": "- Step 1: **Slip rings** are continuous conducting rings connected to the coil. As the coil rotates, the connections to the external circuit don't swap, so the current naturally reverses direction every half turn. This produces **AC** (an alternator).\n- Step 2: A **split-ring commutator** is a ring with a gap that swaps the electrical connections to the external circuit every half turn.\n- Step 3: This swapping reverses the current in the external circuit just as the current in the coil is about to reverse, ensuring the external current always flows in the same direction. This produces **DC** (a dynamo), though the output is bumpy.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "In an AC generator, the induced EMF is at its maximum precisely when the magnetic flux through the coil is zero. Explain the conceptual reason for this phase difference. (2 steps)", "answer": "- Step 1: The induced EMF depends on the *rate of change* of flux linkage, not the flux itself. The EMF is proportional to the gradient of the flux-time graph.\n- Step 2: When the coil is parallel to the field, zero flux passes through it, but the coil is cutting through field lines at its fastest rate. The flux is changing most rapidly (steepest gradient), so the EMF is maximum. When the coil is perpendicular to the field, flux is maximum, but the coil is momentarily moving parallel to the field lines, so the rate of change is zero and EMF is zero.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "A student claims \"When the coil in a generator is perpendicular to the field, the flux is maximum, so the induced EMF must also be maximum.\" Why is this reasoning flawed? (2 steps)", "answer": "- Step 1: The student is confusing the *amount* of flux with the *rate of change* of flux. Induced EMF depends only on the rate of change of flux linkage (Faraday's law), not the absolute value of the flux.\n- Step 2: When the coil is perpendicular to the field, the flux is indeed at a maximum. However, at this exact turning point, the flux is momentarily constant (the gradient of the flux-time graph is zero). Therefore, the rate of change is zero, and the induced EMF is zero, not maximum.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "In a simple DC motor, what would happen if the split-ring commutator was replaced with slip rings, and why? (2 steps)", "answer": "- Step 1: The motor would oscillate back and forth and likely get stuck. Without the commutator swapping the current direction, the force on the coil would reverse every half turn.\n- Step 2: The coil would rotate for the first half turn due to the magnetic force. But as it passes the vertical position, the current direction stays the same while the coil's orientation flips, causing the force to act in the opposite direction, pushing the coil back the way it came. The commutator prevents this by reversing the current at the exact moment the coil passes the vertical, ensuring the force always pushes in the same rotational direction.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "How can you increase the speed of a DC motor, and how can you reverse its direction? (2 steps)", "answer": "- Step 1: To **increase speed**, you must increase the force on the coil (since $$F = BIL$$). You can do this by increasing the current (use a higher voltage battery or lower resistance), using a stronger magnet (increase $$B$$), or adding more turns to the coil.\n- Step 2: To **reverse direction**, you must reverse the force. You can do this by reversing the current (swap the battery polarity) or reversing the magnetic field (swap the magnet poles).", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "Walk through the 5-step causal chain that explains how a transformer transfers electrical power from the primary to the secondary coil without a direct electrical connection. (5 steps)", "answer": "- Step 1: An **alternating voltage** is applied across the primary coil. (Must be AC; a constant DC voltage won't work).\n- Step 2: This drives an **alternating current** in the primary coil.\n- Step 3: The alternating current creates a **changing magnetic field** in the primary coil and the iron core.\n- Step 4: The changing magnetic field links through the iron core to the secondary coil, creating a **changing magnetic flux linkage** in the secondary.\n- Step 5: By Faraday's law, the changing flux linkage **induces an alternating voltage** in the secondary coil. If the secondary is in a complete circuit, this drives an alternating current.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "If a constant DC voltage is connected to the primary coil of a transformer, there is a momentary reading on a voltmeter attached to the secondary, but it quickly falls to zero. Why? (3 steps)", "answer": "- Step 1: When the DC is first switched on, the current in the primary ramps up from zero to a steady value. During this brief time, the current is changing, so the magnetic field and flux linkage are changing. This changing flux induces a momentary EMF in the secondary.\n- Step 2: Once the DC current reaches its steady state, it is constant. A constant current produces a constant magnetic field and constant flux linkage.\n- Step 3: Because the flux is no longer changing, the rate of change $$d(N\\Phi)/dt$$ is zero. By Faraday's law, no EMF is induced, so the voltmeter reads zero. (When switched off, the collapsing field induces another brief EMF in the opposite direction).", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "A step-up transformer increases voltage by a factor of 10. Assuming it is 100% efficient, how does the current in the secondary compare to the primary, and why? (3 steps)", "answer": "- Step 1: For an ideal transformer, power in equals power out: $$I_p V_p = I_s V_s$$. If voltage steps up by 10, then $$V_s = 10 V_p$$.\n- Step 2: Substitute this into the power equation: $$I_p V_p = I_s (10 V_p)$$. The $$V_p$$ cancels out, leaving $$I_p = 10 I_s$$, or $$I_s = I_p / 10$$.\n- Step 3: The current in the secondary is 10 times *smaller* than the primary current. This is the inverse of the turns ratio ($$I_1/I_2 = N_2/N_1$$). Power must be conserved, so you cannot get more voltage and more current out of nothing; a step-up in voltage must come with a step-down in current.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "Why is the iron core of a transformer made of laminated slices (like a loaf of bread) rather than a single solid block of iron? (3 steps)", "answer": "- Step 1: The changing magnetic field in the core can induce circulating currents within the iron itself, as iron is a conductor. These are called **eddy currents**.\n- Step 2: Eddy currents dissipate energy as heat ($$I^2R$$ losses), reducing the transformer's efficiency.\n- Step 3: Laminating the core with insulating layers between the slices restricts the eddy currents to small, individual loops. This increases the electrical resistance of the core to these circulating currents, drastically reducing their size and the resulting heat loss.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "Aside from eddy currents in the core, name two other sources of energy loss in a real transformer and briefly explain each. (3 steps)", "answer": "- Step 1: **Resistive (copper) losses**: The wires of the primary and secondary coils have resistance. As current flows, energy is dissipated as heat ($$I^2R$$).\n- Step 2: **Hysteresis losses**: The iron core must repeatedly magnetise and demagnetise as the AC current alternates. Energy is required to realign the magnetic domains, and some is lost as heat each cycle.\n- Step 3: **Flux leakage**: Not all of the magnetic flux generated by the primary coil passes through the secondary coil. Some flux \"leaks\" out into the surroundings, meaning the linkage isn't perfect and less energy is transferred.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "Why is \"soft iron\" specifically used for the core of a transformer, rather than steel or air? (2 steps)", "answer": "- Step 1: Soft iron is easily magnetised and demagnetised. This is essential because the core must reverse its magnetic polarity every half-cycle of the AC current. Steel is \"hard\" magnetically and would retain its magnetisation (hysteresis), lagging behind the changing current and losing energy as heat.\n- Step 2: Compared to air, soft iron is a far better conductor of magnetic flux. It channels the magnetic field from the primary coil directly to the secondary coil, greatly increasing the flux linkage and making the transformer efficient.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "Power stations generate electricity at roughly 40 kV, but the National Grid steps this up to 250 kV for transmission. Explain the physical reason why high voltage is essential for long-distance power transmission. (3 steps)", "answer": "- Step 1: For a given power $$P = IV$$, increasing the transmission voltage $$V$$ means the current $$I$$ in the cables is reduced.\n- Step 2: The transmission cables have electrical resistance $$R$$. The power lost as heat in the cables is given by $$P_{loss} = I^2R$$.\n- Step 3: Because power loss depends on the *square* of the current, reducing the current by stepping up the voltage drastically reduces the $$I^2R$$ heating losses. This makes long-distance energy transmission efficient.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "A coil with 50 turns and an area of $$0.1 \\text{ m}^2$$ is placed perpendicular to a magnetic field of $$2 \\text{ T}$$. Calculate the magnetic flux linkage. (2 steps)", "answer": "- Step 1: Since the coil is perpendicular to the field, the angle $$\\theta = 0^\\circ$$ and the flux through one turn is $$\\Phi = BA \\cos 0^\\circ = 2 \\times 0.1 \\times 1 = 0.2 \\text{ Wb}$$.\n- Step 2: The flux linkage is the flux multiplied by the number of turns: $$N\\Phi = 50 \\times 0.2 = 10 \\text{ Wb turns}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "A step-down transformer has an input power of 100 W and an output power of 90 W. Calculate its efficiency. (2 steps)", "answer": "- Step 1: Efficiency is defined as the ratio of useful output power to total input power: $$\\eta = \\frac{P_{out}}{P_{in}}$$.\n- Step 2: Plugging in the values: $$\\eta = \\frac{90}{100} = 0.90$$, or 90%. The missing 10% is lost to things like eddy currents, resistance, and hysteresis.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "A wire of length 2 m carries a current of 3 A. It is placed at $$90^\\circ$$ to a magnetic field of strength 0.5 T. Calculate the force on the wire. (2 steps)", "answer": "- Step 1: Use the formula for force on a current-carrying conductor: $$F = BIL \\sin \\theta$$. Since the wire is at $$90^\\circ$$ to the field, $$\\sin 90^\\circ = 1$$.\n- Step 2: Substitute the values: $$F = 0.5 \\times 3 \\times 2 \\times 1 = 3 \\text{ N}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "An alpha particle is fired perfectly parallel to the direction of a uniform magnetic field. What force does it experience, and how will it move? (2 steps)", "answer": "- Step 1: The force on a moving charge is $$F = BQv \\sin \\theta$$, where $$\\theta$$ is the angle between the velocity and the field. If it moves parallel, $$\\theta = 0^\\circ$$, so $$\\sin 0^\\circ = 0$$.\n- Step 2: The magnetic force is zero. Without a force to alter its direction, the alpha particle will simply continue to move in a straight line at a constant speed, completely unaffected by the magnetic field.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "A bar magnet is pushed N-pole-first into a coil. Explain how to determine the direction of the induced current in the coil and why it flows that way. (3 steps)", "answer": "- Step 1: By Lenz's law, the induced current must oppose the change producing it. The change is a N pole approaching the coil, so the coil must act like a N pole itself to repel the magnet.\n- Step 2: To determine the current direction, look at the coil from the magnet's side. You need a N pole facing the magnet. By the right-hand grip rule, if the thumb points towards the magnet (N pole), the fingers curl in the direction of the conventional current.\n- Step 3: The current will flow anticlockwise when viewed from the magnet's side. This creates a N pole at the near face, repelling the approaching N pole and opposing the motion, conserving energy.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}], "count": 28}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What determines the magnetic flux through a coil, and how does the angle between the coil's plane and the magnetic field affect it? (3 steps)", "answer": "- Step 1: Magnetic flux Φ depends on **magnetic field strength (B)**, **area (A)**, and the **angle (θ)** between the field and the **normal** to the coil: Φ = BA cosθ.  \n- Step 2: When θ = 0° (field ⊥ coil face), cosθ = 1 ⇒ flux is maximum (Φ = BA). When θ = 90° (field ∥ coil), cosθ = 0 ⇒ flux is zero.  \n- Step 3: Misconception alert: θ is **not** the angle between the field and the coil's surface! It’s the angle between the field and the **normal** (perpendicular) to the surface.  \n\n+ Example: A coil rotated 90° from perpendicular to parallel orientation reduces flux from BA to 0.  \n\n**Takeaway:** Flux depends on field orientation relative to the coil’s normal vector.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why does a charged particle move in a circular path in a magnetic field? (3 steps)", "answer": "- Step 1: The magnetic force F = BQv sinθ acts **perpendicular** to the particle’s velocity (θ = 90° for max force).  \n- Step 2: This perpendicular force provides a **centripetal force**, causing circular motion: F = mv²/r ⇒ r = mv/(BQ).  \n- Step 3: Radius increases with mass (m) or speed (v), and decreases with charge (Q) or field strength (B). No work is done by the force since it’s always ⊥ motion.  \n\n+ Example: An electron (small mass) curves tightly; a proton (larger mass) curves more gradually.  \n\n**Takeaway:** Magnetic force acts as a centripetal force, enforcing circular motion without changing speed.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Compare slip rings (AC generator) and split-ring commutators (DC generator). How do they produce different current outputs? (3 steps)", "answer": "- Step 1: **Slip rings** maintain **continuous electrical contact** with the coil as it rotates. Each half-turn reverses the coil’s motion through the field, **reversing current direction** ⇒ AC output.  \n- Step 2: **Split-ring commutators** reverse the external circuit connection every half-turn. This ensures the current direction **remains constant** despite coil rotation ⇒ DC (pulsed).  \n- Step 3: Visual analogy: Slip rings = \"uninterrupted ring\"; split rings = \"interrupted ring that swaps contacts\" to flip polarity.  \n\n+ Edge case: If the split ring had no gap, it would act like a slip ring ⇒ AC output.  \n\n**Takeaway:** Mechanical design dictates current type—rings preserve direction changes; commutators invert them.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "In a transformer, why is an alternating current (AC) required for the device to function? (3 steps)", "answer": "- Step 1: Faraday’s Law requires **changing flux linkage** (ΔΦ/Δt) to induce EMF. A DC current produces a **steady magnetic field** ⇒ ΔΦ/Δt = 0 ⇒ no induction.  \n- Step 2: AC voltage creates an alternating current in the primary coil ⇒ alternating magnetic field in the core ⇒ changing flux through the secondary coil.  \n- Step 3: When DC is switched on/off, flux **changes momentarily** ⇒ induces a brief EMF (e.g., transformer \"spikes\" when power is toggled).  \n\n+ Misconception: Transformers work only with AC; DC blocks induction due to static flux.  \n\n**Takeaway:** AC’s alternating current sustains the changing flux essential for electromagnetic induction.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How does laminating the iron core in a transformer reduce energy losses? (3 steps)", "answer": "- Step 1: A solid iron core conducts eddy currents (induced by changing flux), which dissipate energy via I²R heating.  \n- Step 2: Laminations (insulated slices) disrupt eddy current paths ⇒ reduce their magnitude.  \n- Step 3: Energy loss ∝ I²R. Smaller eddy currents ⇒ drastically lower heating. Laminations act like \"insulating barriers\" for current flow.  \n\n+ Analogy: Laminated wood vs. solid steel—wood layers block crack propagation; laminated core blocks eddy currents.  \n\n**Takeaway:** Lamination minimizes eddy currents, preserving energy for useful magnetic coupling between coils.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": true}, {"question": "For a generator’s induced EMF, why is the peak EMF maximum when the coil is parallel to the magnetic field (flux Φ = 0)? (3 steps)", "answer": "- Step 1: Induced EMF depends on **rate of change of flux** (ε ∝ ΔΦ/Δt), not flux magnitude.  \n- Step 2: When the coil is parallel to the field (Φ = 0), it’s moving **perpendicular to field lines** ⇒ fastest flux change (max dΦ/dt).  \n- Step 3: At Φ = maximum (coil ⊥ field), the coil’s motion is tangential ⇒ dΦ/dt = 0 ⇒ EMF = 0.  \n\n+ Visual intuition: Imagine a car speeding through a tunnel (flux change) vs. parked (no change).  \n\n**Takeaway:** Peak EMF occurs where flux changes most rapidly, not where flux is largest.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": true}, {"question": "In a step-up transformer, how can the secondary voltage be greater than the primary voltage while obeying energy conservation? (3 steps)", "answer": "- Step 1: Voltage ratio V₁/V₂ = N₁/N₂ ⇒ V₂ = V₁(N₂/N₁). If N₂ > N₁, V₂ > V₁.  \n- Step 2: Power conservation (ideal case): V₁I₁ = V₂I₂ ⇒ I₂ = I₁(V₁/V₂). Higher voltage ⇒ lower current.  \n- Step 3: Energy transfer remains constant; stepped-up voltage reduces current, minimizing I²R losses in transmission.  \n\n+ Edge case: Real transformers lose energy (eddy currents, hysteresis) ⇒ P_out < P_in.  \n\n**Takeaway:** Voltage and current are inversely related to maintain constant power (assuming 100% efficiency).", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why does reversing the battery in a DC motor reverse the direction of rotation? (3 steps)", "answer": "- Step 1: Fleming’s Left-Hand Rule: Current direction determines force direction (thumb = motion).  \n- Step 2: Reversing battery polarity flips conventional current ⇒ force direction reverses ⇒ torque direction flips.  \n- Step 3: Commutator ensures torque remains unidirectional during rotation. With reversed current, net rotation direction flips.  \n\n+ Practical note: Permanent-magnet motors reverse direction with current; electromagnet-based motors may require field reversal too.  \n\n**Takeaway:** Current reversal alters Lorentz force direction, flipping motor rotation.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How does increasing the number of turns in a coil affect the induced EMF in a generator? (2 steps)", "answer": "- Step 1: Faraday’s Law: ε = -NΔΦ/Δt. More turns (N) increase total flux linkage (NΦ) ⇒ higher ε for the same ΔΦ/Δt.  \n- Step 2: Doubling N doubles ε. However, physical constraints (size, resistance) limit practical turns.  \n\n+ Example: A 100-turn coil producing 1 V would generate 100 V with 10,000 turns (same flux change rate).  \n\n**Takeaway:** Induced EMF scales linearly with coil turns.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "What role does the soft iron core play in a transformer? (2 steps)", "answer": "- Step 1: Iron’s high permeability focuses magnetic field lines, enhancing flux linkage between coils.  \n- Step 2: Laminated soft iron minimizes eddy currents and hysteresis losses (magnetizes/demagnetizes easily).  \n\n+ Analogy: Iron core = magnetic \"conduit\" for field lines, like a wire channels electric current.  \n\n**Takeaway:** Core optimizes magnetic coupling and efficiency by concentrating flux and reducing losses.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why is magnetic flux Φ = BA cos θ maximum when θ = 0°, and what does θ represent? (3 steps)", "answer": "- Step 1: θ is the angle between the magnetic field **and the normal** to the coil's area (not the plane). At θ = 0°, field lines are perpendicular to the area (aligned with the normal).  \n- Step 2: cos θ reaches its maximum value (1) at θ = 0°, making Φ = BA × 1 = BA. This means the maximum number of field lines pass through the area.  \n- Step 3: At θ = 90°, cos θ = 0 (field parallel to the plane), so Φ = 0. **Misconception probe**: θ is NOT the angle between the field and the coil's surface!  \n\n[Optional takeaway]: Always draw the normal to visualize θ correctly.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How do flux linkage (NΦ) and magnetic flux (Φ) differ? Give an example of each's application.", "answer": "Flux linkage is Φ multiplied by the number of turns N in a coil.  \n- Example 1: Φ applies to a single loop (e.g., Earth's field through a window frame).  \n- Example 2: NΦ applies to solenoids (e.g., 300-turn coil in a magnetic field).  \n**Key contrast**: Φ quantifies field penetration through one area; NΦ scales it for coils in generators/transformers.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why does a charged particle moving perpendicular to a magnetic field follow a circular path? (3 steps)", "answer": "- Step 1: Magnetic force F = BQv acts perpendicular to velocity (θ = 90°), providing centripetal force.  \n- Step 2: Force direction changes continuously to stay perpendicular, causing circular motion (F = mv²/r).  \n- Step 3: Radius r = mv/(BQ) — increases with mass/speed, decreases with field strength/charge.  \n**Edge case**: If θ < 90°, motion becomes helical (partial parallel velocity remains).", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "What causes induced EMF in a coil: (1) constant flux, (2) changing flux, or (3) maximum flux? Explain using Faraday's law.", "answer": "(2) Changing flux.  \n- Faraday's law: ε = -N ΔΦ/Δt. Induced EMF depends on rate of flux change, not absolute flux.  \n- Example: Peak EMF occurs when flux is zero (dΦ/dt maximal during rotation).  \n**Misconception**: EMF ≠ \"amount of flux\" → think of shaking a magnet in a coil (faster shaking = higher ε).", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How does Lenz's law ensure energy conservation in electromagnetic induction? (3 steps)", "answer": "- Step 1: Induced current creates a magnetic field opposing the change in flux (e.g., repelling an approaching magnet).  \n- Step 2: Opposition requires mechanical work to move the magnet, converting kinetic energy into electrical energy.  \n- Step 3: Without opposition (e.g., perpetual motion), energy would appear from nothing. Lenz's law enforces balance.  \n**Visual intuition**: Pushing a magnet into a coil feels resistance — this is Lenz's law in action.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why do alternators produce AC while dynamos produce DC? Contrast slip rings vs split-ring commutators.", "answer": "- Alternator: Slip rings maintain continuous electrical contact, preserving current reversals every half-turn (AC output).  \n- Dynamo: Split-ring commutator reverses connections to brushes every half-turn, inverting current direction to maintain unidirectional flow (DC output).  \n**Key intuition**: Commutator acts as a mechanical inverter, flipping connections to \"reset\" the current direction.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Explain why a step-up transformer reduces current in transmission lines using power conservation. (3 steps)", "answer": "- Step 1: Power P = IV is conserved (assumed ideal): P_in = V_p I_p = P_out = V_s I_s.  \n- Step 2: Doubling voltage (step-up) halves current for same power (I_s = I_p × V_p / V_s).  \n- Step 3: Lower current I reduces heating loss (P_loss = I²R), making long-distance transmission efficient.  \n**National Grid example**: 40 kV → 250 kV reduces current from 20 A → 3.2 A (see worked example).", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why must transformers use AC, not DC? Walk through the causal chain from input to output.", "answer": "- Step 1: AC input voltage creates alternating current in primary coil.  \n- Step 2: Alternating current produces a changing magnetic field in the core.  \n- Step 3: Changing flux links to secondary coil, inducing AC EMF (Faraday's law).  \n**DC test case**: Switching DC on/off induces momentary EMFs (flux changes during transitions), but steady DC gives no output.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How does laminating the iron core in a transformer reduce energy loss? (3 steps)", "answer": "- Step 1: Iron core conducts both magnetic flux and electricity. Solid iron would allow large eddy currents (looping currents).  \n- Step 2: Eddy currents cause I²R heating (energy loss). Laminations (insulated slices) break current loops.  \n- Step 3: Reduced eddy currents minimize heating. Lamination alignment follows field lines to maintain magnetic efficiency.  \n**Edge case**: Unlaminated cores → excessive heating, lower η.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Compare motor and generator using: (1) input/output, (2) governing law, (3) Fleming's rule. (3 steps)", "answer": "- Step 1: Motor — input electrical, output mechanical (force on current in B field; F = BIL).  \n- Step 2: Generator — input mechanical, output electrical (EMF from changing flux; Faraday's law).  \n- Step 3: Motor uses left-hand rule (current → motion); generator uses right-hand rule (motion → current).  \n**Visual contrast**: Motor spins from current; generator spins to create current.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "What is the significance of the negative sign in ε = -N dΦ/dt? Relate to Lenz's law.", "answer": "- The negative sign represents Lenz's law: induced EMF opposes flux change.  \n- Example: Increasing Φ (positive dΦ/dt) induces negative ε to create opposing field.  \n**Graph intuition**: Slope of Φ vs. t graph gives ε magnitude; sign shows opposition direction.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Why does peak generator EMF (ε_max = BANω) occur when the coil is parallel to the magnetic field?", "answer": "- Step 1: Flux Φ = BA cos θ is maximum when θ = 0° (coil ⊥ field).  \n- Step 2: EMF depends on dΦ/dt (rate of change). Maximum rate occurs at θ = 90° (coil ∥ field), where cos θ changes fastest.  \n- Step 3: ε_max = BANω aligns with this critical point (sin ωt = 1 in ε = BANω sin ωt).  \n**Misconception**: EMF peaks where flux is highest → correct answer is inverse.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "How does increasing rotation frequency affect (1) AC generator's EMF amplitude and (2) output frequency?", "answer": "- (1) ε_max = BANω → ω = 2πf_rot ⇒ doubling f_rot doubles amplitude.  \n- (2) Output frequency f_output = f_rot (one cycle per rotation). Doubling f_rot doubles AC frequency.  \n**Real-world implication**: Faster engine → higher voltage and Hz in power plants.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "Why does a balance register a force when a current-carrying wire is placed between magnet poles? Use Newton's third law.", "answer": "- Step 1: Magnetic force F = BIL acts on the wire (up/down per Fleming's LHR).  \n- Step 2: Newton's third law: wire exerts equal/opposite force on magnet.  \n- Step 3: Balance measures reaction force (e.g., downward push on magnet = upward wire force).  \n**Example**: +161 g reading ⇒ upward wire force (see Q1 in transcript).", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "Compare eddy current losses in unlaminated vs laminated transformer cores. (3 steps)", "answer": "- Step 1: Unlaminated core = solid conductor → large eddy loops → high I²R loss.  \n- Step 2: Laminated core = sliced insulators → small loops → localized currents → reduced loss.  \n- Step 3: Laminations t
