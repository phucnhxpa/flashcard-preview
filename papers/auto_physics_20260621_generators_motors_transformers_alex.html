dius by √2, not 2.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "A transformer is designed to operate at 50 Hz. What would happen if it were connected to a 60 Hz supply, and what would happen if connected to a DC supply? (2 steps)", "answer": "- Step 1: At 60 Hz (higher frequency), the core may experience greater hysteresis losses (more cycles per second). The reactance of the coils also changes (X_L = 2πfL), affecting current draw. The transformer may overheat if not designed for 60 Hz, and the voltage output would remain roughly the same ratio (V ∝ f isn't in the ideal formula), but real effects matter.\n\n- Step 2: With DC, as discussed, there is no changing flux → no induced voltage in the secondary after the initial transient. The primary acts as a short circuit (low resistance), drawing excessive current and potentially burning out. DC saturates the core magnetically, preventing proper flux variation. The transformer simply doesn't work.\n\n**Takeaway:** Transformers are frequency-sensitive devices. Wrong frequency reduces efficiency or causes damage; DC provides no function.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}], "count": 48}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What does magnetic flux density $$B$$ physically represent, and how is it defined operationally?", "answer": "- Step 1: Physically, $$B$$ represents the *strength* of a magnetic field at a point — visualised as the density of field lines. Where field lines are packed close, $$B$$ is large; where they're spread thin, $$B$$ is small.\n- Step 2: Operationally, we define $$B$$ by the force it exerts on a current-carrying wire placed perpendicular to it: $$B = F/(IL)$$. So one tesla is the field strength that produces one newton of force on one metre of wire carrying one amp perpendicular to the field.\n- Step 3: This is a \"response definition\" — we don't measure the field directly; we measure the force it exerts on a known current and back out $$B$$. Units: tesla (T). For scale: Earth's field is $$\\sim 0.032$$ mT, a fridge magnet is $$\\sim 5$$ mT — five orders of magnitude apart.\n\nTakeaway: $$B$$ is defined by what it does to moving charges, not by what it \"is\".", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "What is the conceptual distinction between magnetic flux $$\\Phi$$ and flux linkage $$N\\Phi$$, and why do we need both?", "answer": "- Step 1: Flux $$\\Phi = BA\\cos\\theta$$ measures how much field passes perpendicularly through *one* loop of area $$A$$. Unit: weber (Wb). It's a geometric quantity — field × perpendicular area.\n- Step 2: Flux linkage $$N\\Phi = BAN\\cos\\theta$$ multiplies by the number of turns $$N$$ in a coil. Unit: weber-turns (Wb turns). We need this because when a coil has $$N$$ turns, the same changing flux is \"seen\" by each loop, and each loop contributes its own induced EMF.\n- Step 3: So flux describes the *field geometry*; flux linkage describes *how effectively that flux couples to a coil*. A single wire has flux through it but flux linkage only matters for multi-turn coils — this is why solenoids induce much larger EMFs than single loops.\n\nTakeaway: doubling the turns doubles the induced EMF for the same flux change — this is the whole design principle of transformers.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "Why does flux vary as $$\\cos\\theta$$ where $$\\theta$$ is the angle between the field and the *normal* to the area, rather than the angle between the field and the area itself? (2 steps)", "answer": "- Step 1: Flux counts field lines passing *through* the surface. What matters is the component of $$\\vec{B}$$ perpendicular to the surface — because a field line parallel to the surface never crosses it. The natural way to describe \"perpendicular to a surface\" is the surface's normal vector.\n- Step 2: When $$\\vec{B}$$ is aligned with the normal ($$\\theta=0$$), every field line crosses the surface → maximum flux $$\\Phi = BA$$. When $$\\vec{B}$$ is perpendicular to the normal ($$\\theta=90°$$), it's parallel to the surface → no lines cross → $$\\Phi=0$$. The projection is $$B\\cos\\theta$$, giving $$\\Phi = BA\\cos\\theta$$.\n\nCommon trap: students often plug in \"the angle between field and coil plane\" — this gives $$\\sin\\theta$$ instead. Always draw the normal.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "A rectangular coil is rotated in a uniform field. At what orientation is the flux linkage maximum, and at what orientation is the *induced EMF* maximum? Why are these different? (3 steps)", "answer": "- Step 1: Flux linkage is maximum when the coil's normal is parallel to $$\\vec{B}$$ — i.e. the coil face is perpendicular to the field. Here $$N\\Phi = BAN$$.\n- Step 2: But induced EMF depends on the *rate of change* of flux linkage, not the linkage itself. At maximum flux, the coil is momentarily \"at the top\" — flux is at a turning point, so $$d(N\\Phi)/dt = 0$$ → EMF is zero.\n- Step 3: EMF peaks when the coil plane is *parallel* to $$\\vec{B}$$ (normal ⊥ field). Here flux linkage is zero, but the coil is sweeping through field lines at maximum rate → $$d(N\\Phi)/dt$$ is maximal → $$\\varepsilon_{\\max} = BAN\\omega$$.\n\nTakeaway: think of $$N\\Phi(t) = BAN\\cos(\\omega t)$$ and $$\\varepsilon(t) = BAN\\omega\\sin(\\omega t)$$ — they're 90° out of phase, so maxima of one coincide with zeros of the other.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "State Faraday's law in words and equation form, and explain the physical meaning of each symbol. (3 steps)", "answer": "- Step 1: In words: the magnitude of the induced EMF in a coil equals the rate of change of magnetic flux linkage through it.\n- Step 2: Equation: $$\\varepsilon = -N\\dfrac{d\\Phi}{dt} = -\\dfrac{d(N\\Phi)}{dt}$$.\n+ $$\\varepsilon$$ = induced EMF (volts) — the \"electrical push\" that would drive current in a complete circuit.\n+ $$N$$ = number of turns — each turn contributes its own EMF, so they add.\n+ $$d\\Phi/dt$$ = rate of change of flux — how fast field lines are being cut, or how fast $$B$$, $$A$$, or $$\\theta$$ is changing.\n- Step 3: The minus sign is Lenz's law: the induced EMF opposes the change in flux that produced it, ensuring energy conservation.\n\nKey insight: it's the *change* that matters — a stationary magnet, no matter how strong, induces nothing.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "State Lenz's law and explain why it must be true from energy conservation. (3 steps)", "answer": "- Step 1: Lenz's law: the induced current flows in the direction such that its magnetic effect *opposes* the change in flux that caused it.\n- Step 2: Why must this be so? Imagine the opposite — an induced current that *aids* the incoming change. Then the induced field would attract the approaching magnet, accelerating it. That acceleration would increase the flux change, which would induce more current, which would accelerate the magnet more... you'd get unlimited kinetic + electrical energy from nothing.\n- Step 3: To conserve energy, the induced current must push back against whatever's causing the flux change. The mechanical work you do pushing the magnet in is what gets converted to electrical energy — you feel resistance because you're doing work against Lenz's law.\n\nTakeaway: the minus sign in Faraday's law isn't cosmetic — it's the mathematical face of energy conservation.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "A north pole is pushed toward the face of a coil. What is the polarity of the coil's near face, and why? (3 steps)", "answer": "- Step 1: The incoming N pole increases the flux through the coil in one direction. By Lenz's law, the induced current must oppose this increase — so it must generate a magnetic field pointing *back* at the approaching magnet.\n- Step 2: To repel a N pole, the near face of the coil must also become a N pole (like poles repel).\n- Step 3: Using the right-hand grip rule: for the coil's near face to be N (field lines exiting), the induced current must flow anticlockwise when viewed from the magnet's side.\n\nReversal check: if you pull the magnet *away*, flux decreases, and the coil now tries to *maintain* the flux — the near face becomes a S pole to attract the magnet back.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "In F = BIL sin θ and F = BQv sin θ, what does θ refer to in each case, and why can't the two formulas be mixed up? (3 steps)", "answer": "- Step 1: In $$F = BIL\\sin\\theta$$, $$\\theta$$ is the angle between the *wire (current direction)* and $$\\vec{B}$$. This applies to a continuous current in a conductor of length $$L$$.\n- Step 2: In $$F = BQv\\sin\\theta$$, $$\\theta$$ is the angle between the *velocity of the charge* and $$\\vec{B}$$. This applies to an isolated moving charge with no wire.\n- Step 3: They can't be mixed because they describe different physical situations:\n+ The wire formula assumes many charges flowing steadily — $$IL$$ acts like a \"flux\" of charge.\n+ The particle formula tracks a single charge — no $$L$$, no $$I$$, just $$Q$$ and $$v$$.\n\nActually, one can derive the wire formula from the particle formula by summing over charge carriers: $$I = nAvQ$$ and $$L$$ gives volume $$AL$$, leading to $$F = BIL\\sin\\theta$$. They're consistent but describe different setups.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "Why does a charged particle in a uniform magnetic field move in a circle rather than a straight line or spiral (assuming no other forces)? (3 steps)", "answer": "- Step 1: The magnetic force $$F = Qv \\times B$$ is always perpendicular to the velocity. Since force ⊥ velocity, the force does no work — speed is constant.\n- Step 2: A constant-magnitude force always perpendicular to velocity is the definition of a centripetal force. It changes direction without changing speed.\n- Step 3: Setting magnetic force = centripetal force: $$BQv = mv^2/r \\Rightarrow r = mv/(BQ)$$.\n+ Faster particles → larger circles.\n+ Stronger field → tighter circles.\n+ Heavier particles → larger circles.\n\nEdge case: if $$\\vec{v}$$ has a component *along* $$\\vec{B}$$, that component is unaffected — the particle then spirals along the field lines (helix).", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "How does Fleming's left-hand rule differ from Fleming's right-hand rule, and when do you use each? (3 steps)", "answer": "- Step 1: Fleming's **left-hand rule (motor)**: used when a current in a field experiences a force. Thumb = Motion/Force, First finger = Field (N→S), seCond finger = Current (conventional, + charge direction).\n- Step 2: Fleming's **right-hand rule (generator)**: used when motion in a field induces a current. Same finger assignments (Thumb = Motion, First = Field, seCond = induced Current).\n- Step 3: Memory aid:\n+ Left = \"input current, get motion\" = motor.\n+ Right = \"input motion, get current\" = generator.\n\nCommon trap: with electrons or negative charges, point the second finger *opposite* to their motion (because conventional current flows opposite to electron flow).", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Why is the induced EMF in a rotating coil sinusoidal, and what determines its amplitude and frequency? (3 steps)", "answer": "- Step 1: A coil rotating at angular frequency $$\\omega$$ has flux linkage $$N\\Phi(t) = BAN\\cos(\\omega t)$$ — the geometric projection of the field onto the coil's normal traces out a cosine as the coil turns.\n- Step 2: Taking the rate of change: $$\\varepsilon = -d(N\\Phi)/dt = BAN\\omega\\sin(\\omega t)$$. So the EMF is a sine wave.\n- Step 3: Amplitude $$\\varepsilon_{\\max} = BAN\\omega$$ scales with:\n+ $$B$$ (stronger field → more flux swept)\n+ $$A$$ (bigger coil → more area)\n+ $$N$$ (more turns → each contributes)\n+ $$\\omega$$ (faster rotation → higher rate of change)\n\nFrequency of the AC output equals the rotation frequency of the coil.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "What is the key physical difference between an alternator and a dynamo, and how does this difference produce AC vs DC? (3 steps)", "answer": "- Step 1: Both are rotating-coil generators — the coil spins between magnetic poles, inducing an EMF. The difference is only in the *connection* to the external circuit.\n- Step 2: An **alternator** uses **slip rings** — two continuous rings, each permanently connected to one end of the coil. As the coil flips over each half-turn, the current in the external circuit naturally reverses → AC output.\n- Step 3: A **dynamo** uses a **split-ring commutator** — one ring cut in half with a gap, so the brushes swap which end of the coil they contact every half-turn. This reversal *cancels* the coil's own reversal → the external current is always in the same direction → DC (bumpy, all-positive humps).\n\nKey insight: the *induced EMF inside the coil is the same in both* — it's the wiring that decides whether the outside world sees AC or DC.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "Why does a transformer only work with alternating current and not direct current? (3 steps)", "answer": "- Step 1: A transformer relies on induction in the secondary coil. Induction requires a *changing* flux linkage — Faraday's law: $$\\varepsilon = -d(N\\Phi)/dt$$.\n- Step 2: With DC in the primary: a steady current produces a steady magnetic field → constant flux through the secondary → $$d\\Phi/dt = 0$$ → no induced EMF, no output.\n- Step 3: With AC: current in the primary oscillates → magnetic field oscillates → flux through secondary continuously changes → continuous induced EMF in the secondary at the same frequency.\n\nTransient exception: when DC is *switched on* or *switched off*, there's a brief moment where flux is changing (building up or collapsing). During those transients you get a momentary induced EMF — but once DC is steady, output falls to zero.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Walk through the five-stage causal chain of how a transformer transfers energy, in the exact order required at A-level. (5 steps)", "answer": "- Step 1: An **alternating input voltage** is applied across the primary coil. (Must be AC; DC produces no output.)\n- Step 2: This drives an **alternating current** in the primary coil — electrons oscillate back and forth rather than flowing steadily.\n- Step 3: The alternating current produces an **alternating (changing) magnetic field** around the primary coil / inside the iron core.\n- Step 4: The iron core channels this changing magnetic field to the secondary coil, producing a **changing magnetic flux linkage** in the secondary.\n- Step 5: By Faraday's law, the changing flux linkage **induces an alternating EMF** in the secondary. If the secondary forms a complete circuit, this drives an alternating current in the load — at the same frequency as the input.\n\nKey phrase: no electrical connection between the coils — energy transfers purely via the magnetic field in the core.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Why is the iron core of a transformer made of *soft* iron (not steel or hard iron) and *laminated* (not solid)? (3 steps)", "answer": "- Step 1: **Soft iron** is used because it is easily magnetised *and demagnetised*. Since the field alternates 50 times per second, the core must repeatedly flip its magnetisation — a hard magnetic material would resist this and waste huge amounts of energy per cycle (hysteresis losses).\n- Step 2: The core is **laminated** — cut into thin insulated slices \"like a loaf of bread\" — to reduce eddy currents. Iron is a conductor, and a solid block sitting in a changing magnetic field would have circulating currents induced within it (Faraday's law applied to the iron itself).\n- Step 3: These eddy currents would dissipate energy as $$I^2R$$ heating in the core, wasting power. Laminating breaks up the conducting paths, forcing induced currents into much smaller loops with higher resistance, drastically reducing losses.\n\nBonus: solid iron core → hot core, low efficiency; laminated soft iron → cool, ~95%+ efficient.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Derive both transformer equations $$V_p/V_s = N_p/N_s$$ and $$I_pV_p = I_sV_s$$ conceptually, stating the assumptions. (3 steps)", "answer": "- Step 1: **Turns ratio**: assuming all flux from the primary links the secondary (no leakage), each turn of either coil experiences the same $$d\\Phi/dt$$. So $$V_p = N_p (d\\Phi/dt)$$ and $$V_s = N_s (d\\Phi/dt)$$. Dividing: $$V_p/V_s = N_p/N_s$$.\n- Step 2: **Power conservation**: assuming a 100%-efficient transformer, all electrical power in the primary is delivered to the secondary. Power = $$IV$$, so $$I_pV_p = I_sV_s$$.\n- Step 3: Combining the two: $$I_p/I_s = V_s/V_p = N_s/N_p$$ — the current ratio is the *inverse* of the turns ratio.\n\nAssumptions: 100% efficient (no resistive, eddy, hysteresis or leakage losses), all flux linked. Real transformers are ~95–99% efficient.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "A transformer has $$N_p = 10$$, $$N_s = 20$$, $$V_p = 100$$ V. Is it step-up or step-down, and what qualitative relationship does this imply between $$I_p$$ and $$I_s$$? (3 steps)", "answer": "- Step 1: Since $$N_s > N_p$$, voltage is stepped *up*: $$V_s = V_p (N_s/N_p) = 100 \\times 2 = 200$$ V.\n- Step 2: By power conservation, doubling voltage means halving current. So $$I_s = I_p / 2$$.\n- Step 3: Qualitative pattern: whenever turns ratio increases voltage, it decreases current by the same factor. Step-up transformers trade current for voltage.\n\nIntuition: think of turns as levers — more turns on the secondary give a \"voltage lever\" advantage, but you lose current in the same ratio, just like a mechanical lever trading force for distance.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Why does the National Grid use step-up transformers to transmit electricity at very high voltages? (3 steps)", "answer": "- Step 1: Power delivered from the power station is fixed: $$P = IV$$. If we transmit at low voltage, current must be huge to carry the same power.\n- Step 2: Heating loss in the cables is $$P_{\\text{loss}} = I^2R$$, which is *quadratic* in current. Halving the current cuts losses by a factor of 4.\n- Step 3: So stepping up to very high voltage (e.g. 40 kV → 250 kV) dramatically reduces $$I$$, drastically cutting $$I^2R$$ losses. At the consumer end, a step-down transformer reduces voltage to a safe 230 V.\n\nKey point: cable resistance $$R$$ is fixed by the cable material — the only knob we can turn is $$I$$, and we minimise it by maximising $$V$$.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "Explain why the induced EMF in a coil is zero when the coil is oriented perpendicular to the field (its face facing the field), even though flux is *maximum* at that moment. (3 steps)", "answer": "- Step 1: Flux linkage varies as $$N\\Phi = BAN\\cos(\\omega t)$$. When the coil is perpendicular to the field, $$\\cos(\\omega t) = 1$$ — flux is at its maximum value.\n- Step 2: But EMF depends on $$d\\Phi/dt$$, not $$\\Phi$$ itself. At a maximum of a cosine, its derivative (rate of change) is zero — you're momentarily at the \"top of the hill.\"\n- Step 3: Visually, at this instant the coil sides are moving *parallel* to the field lines — they're not cutting through any field lines, so no EMF is induced.\n\nContrast: when the coil plane is *parallel* to the field (flux = 0), the sides slice through field lines at maximum rate → EMF is maximal.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "A bar magnet is pushed into a coil, then held stationary inside, then pulled back out. Describe the voltmeter reading in each phase and explain why. (3 steps)", "answer": "- Step 1: **Pushing in**: flux through the coil is increasing → non-zero $$d\\Phi/dt$$ → induced EMF → voltmeter shows a reading (say, positive).\n- Step 2: **Held stationary inside**: flux is now large but *constant* → $$d\\Phi/dt = 0$$ → no induced EMF → voltmeter reads zero. This is the key insight: it's the *change* that matters, not the amount of flux.\n- Step 3: **Pulling out**: flux is now *decreasing* → $$d\\Phi/dt$$ has the opposite sign → induced EMF reverses direction → voltmeter shows a reading of opposite sign to Step 1.\n\nBonus: if you push the magnet faster, the reading is larger (bigger rate of change). More turns or a stronger magnet also increase the reading.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "In the classic balance experiment — a U-magnet on an electronic balance, with a wire between the poles carrying current — the balance reads +161 g when the current is switched on. Deduce the direction of the force on the wire and how you'd use Fleming's LHR to find the field direction. (4 steps)", "answer": "- Step 1: The balance reads positive, meaning the magnet is being pushed *down* into it. So the force on the magnet is downwards.\n- Step 2: By Newton's 3rd law, the wire experiences an equal and opposite force — *upwards*.\n- Step 3: Now apply Fleming's LHR:\n+ Thumb (Motion/Force) = up (known).\n+ Second finger (Current) = along the wire, in the direction of conventional current (known from the circuit).\n+ First finger (Field) = deduce.\n- Step 4: The first finger direction gives the field direction. E.g. if current flows left→right and force is up, the field points into the page — so the N pole is at the back, S pole at the front.\n\nPractical: to increase the force reading, increase the current (F = BIL scales linearly). No fundamental limit except practical ones — wire melting, or in modern motors using superconductors.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "How can you change the (a) direction and (b) speed of a simple DC motor, and why does each change work? (3 steps)", "answer": "- Step 1: **Reverse direction**: swap the battery terminals. This reverses the current through the coil → by Fleming's LHR, the force on each side of the coil reverses → the coil rotates the opposite way.\n- Step 2: **Increase speed**: increase the current (higher voltage battery, lower resistance, or more turns per unit length). Since $$F = BIL$$, a larger current produces a larger force → larger torque → faster rotation.\n- Step 3: Additional lever with electromagnets:\n+ In a permanent-magnet motor, $$B$$ is fixed, so speed scales only with $$I$$.\n+ In a two-electromagnet motor, you can increase both the stator field *and* rotor current, giving more control.\n\nCommon trap: reversing *both* the battery and the magnet leaves the direction unchanged (two negatives cancel).", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "For the same peak EMF, would you rather double the number of turns or double the rotation speed of an AC generator? What's the trade-off? (3 steps)", "answer": "- Step 1: Peak EMF is $$\\varepsilon_{\\max} = BAN\\omega$$. Both doubling $$N$$ and doubling $$\\omega$$ double the peak EMF.\n- Step 2: But they differ in side effects:\n+ Doubling $$\\omega$$ also doubles the *frequency* of the output — which may not be desired if we need a fixed 50 Hz grid.\n+ Doubling $$N$$ increases coil resistance (longer wire) → more $$I^2R$$ losses and lower efficiency.\n- Step 3: In practice, grid generators are locked at 50 (or 60) Hz for compatibility, so $$\\omega$$ is fixed. Engineers boost EMF via $$N$$, $$A$$, and $$B$$ instead — accepting the resistance trade-off.\n\nTakeaway: the formula treats $$N$$ and $$\\omega$$ symmetrically, but engineering constraints break the symmetry.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Sketch conceptually the EMF-vs-time output of an alternator and a dynamo driven at the same speed. What's the same, what's different, and why? (3 steps)", "answer": "- Step 1: **Alternator (slip rings)**: pure sine wave — symmetric positive and negative humps, crossing zero every half-turn.\n- Step 2: **Dynamo (split-ring commutator)**: same shape as the alternator's sine, but every negative half is flipped up to positive — a series of positive humps (like $$|\\sin|$$), never going negative.\n- Step 3: What's the same: peak EMF, frequency of humps (twice the rotation frequency in the dynamo case), the physical rotation. What's different: the *external wiring* — the commutator swaps connections every half-turn to keep the output positive.\n\nKey insight: the internal EMF is identical; only the external observer sees different signals due to switching.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Give a physical explanation for why a laminated iron core reduces eddy current losses more than a solid iron core, in terms of induced current paths. (3 steps)", "answer": "- Step 1: In a solid iron core, the changing magnetic flux induces circulating currents (eddy currents) throughout the entire cross-section. These loops can be large, spanning the width of the core.\n- Step 2: Power dissipated by eddy currents scales roughly as $$V^2/R$$ where $$V$$ is the induced EMF and $$R$$ is the resistance of the eddy loop. Larger loops → lower resistance → more power dissipated.\n- Step 3: Laminating breaks the core into thin insulated slices — the eddy currents are now forced into much smaller loops within each lamination.\n+ Smaller loop area → smaller induced EMF (less flux enclosed).\n+ Longer, thinner path → higher resistance.\n+ Result: dramatically less power dissipated as heat.\n\nAnalogy: like breaking a highway into narrow country lanes — traffic (current) can still flow, but much less efficiently.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "Why is the induced EMF said to be $$\\varepsilon = BANω\\sin(ωt)$$ starting from a coil whose plane is *parallel* to the field at t = 0? (3 steps)", "answer": "- Step 1: At $$t=0$$, if the coil plane is parallel to $$\\vec{B}$$, the normal to the coil is *perpendicular* to $$\\vec{B}$$ → $$\\theta = 90°$$ → $$\\cos\\theta = 0$$ → flux = 0.\n- Step 2: As the coil rotates, $$\\theta(t) = 90° - \\omega t$$, so $$\\cos\\theta(t) = \\sin(\\omega t)$$, and flux linkage becomes $$N\\Phi(t) = BAN\\sin(\\omega t)$$.\n- Step 3: Taking rate of change: $$\\varepsilon = -d(N\\Phi)/dt = -BAN\\omega\\cos(\\omega t)$$. But we care about magnitude: peak EMF appears when $$|\\cos(\\omega t)| = 1$$.\n\nConvention: with the choice of starting orientation, the sine or cosine form flips. The physics is the same — a wave 90° out of phase with the flux. Peak is always $$BAN\\omega$$.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "A power station generates 200 MW. Compare the resistive losses when transmitting at 20 kV vs 200 kV over the same cable. Reason without exact numbers. (3 steps)", "answer": "- Step 1: Same power $$P = IV$$, so current at 20 kV is 10× the current at 200 kV. That's a factor of 10 in $$I$$.\n- Step 2: Losses scale as $$I^2R$$. So losses at 20 kV are $$10^2 = 100$$× larger than at 200 kV (for the same cable resistance $$R$$).\n- Step 3: Two orders of magnitude! This is why the National Grid pays the cost/complexity of transformers — they save enormous energy that would otherwise be wasted heating the atmosphere.\n\nRule of thumb: transmission losses scale as $$1/V^2$$ for a given power. High voltage is not a luxury — it's an economic necessity.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "Why does moving a bar magnet faster into a coil induce a larger EMF, and what happens if you accelerate it? (3 steps)", "answer": "- Step 1: EMF depends on $$d\\Phi/dt$$. A faster magnet means the flux through the coil rises more quickly with time — larger derivative → larger EMF.\n- Step 2: Accelerating the magnet (increasing its speed as it enters) means $$d\\Phi/dt$$ itself is *increasing* — the induced EMF grows over time rather than being constant.\n- Step 3: There's a feedback: by Lenz's law, the induced current creates an opposing force on the magnet. To keep accelerating, you must push harder against this force — the extra mechanical work you do is what appears as extra electrical energy.\n\nTakeaway: the coil \"fights back\" harder as flux changes faster — energy conservation in action.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "In a real transformer with 95% efficiency, primary current 2 A, primary voltage 230 V, and turns ratio giving $$V_s = 5.75$$ V, would $$I_s$$ be higher or lower than the ideal case, and by roughly how much? (3 steps)", "answer": "- Step 1: Ideal case: $$I_p V_p = I_s V_s$$, so $$I_s^{ideal} = 2 \\times 230 / 5.75 = 80$$ A.\n- Step 2: Real efficiency of 95% means 5% of the input power is lost (in copper heating, eddy currents, hysteresis, and flux leakage) — so $$P_{out} = 0.95 P_{in}$$.\n- Step 3: Therefore $$I_s^{real} = 0.95 \\times 80 = 76$$ A — slightly *lower* than ideal, because some of the incoming energy never makes it to the secondary circuit.\n\nKey point: efficiency losses always reduce the output current (for a fixed voltage ratio). The turns-ratio voltage relation still holds accurately, but power conservation acquires a correction factor.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "Why is it important to state that the induced *voltage* comes first in electromagnetic induction, and current only follows if the circuit is complete? (3 steps)", "answer": "- Step 1: Induction is fundamentally about EMF — an electrical \"push\" created by changing flux linkage. This push exists whether or not any charge can move.\n- Step 2: If the coil ends are open (no complete circuit), there's still an induced voltage across the ends — you could measure it with a high-impedance voltmeter — but no current flows because there's no path.\n- Step 3: Only when the circuit is closed does current flow, driven by the induced EMF: $$I = \\varepsilon/R$$. So the causal order is: changing flux → induced EMF → *if closed circuit* → induced current.\n\nExam tip: examiners look for the word \"induced\" and the distinction between \"EMF is induced\" and \"current flows.\" Saying \"current is induced\" without a complete circuit loses marks.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "A coil (350 turns, area $$4.9 \\times 10^{-4}\\,\\text{m}^2$$) sits with its plane parallel to a $$B = 80$$ mT field. It's rotated 90° to be perpendicular in 0.18 s. Conceptually walk through how to find the average induced EMF without doing the arithmetic. (3 steps)", "answer": "- Step 1: Initial flux: coil plane parallel to $$\\vec{B}$$ → normal perpendicular to $$\\vec{B}$$ → flux = 0. Final flux: plane perpendicular to $$\\vec{B}$$ → normal aligned with $$\\vec{B}$$ → flux = $$BA$$.\n- Step 2: Change in flux linkage: $$\\Delta(N\\Phi) = NBA - 0 = NBA$$. This is a straightforward \"all or nothing\" change.\n- Step 3: Average EMF: $$\\varepsilon = \\Delta(N\\Phi)/\\Delta t = NBA/0.18$$. With $$NBA \\sim 350 \\times 80\\text{ mT} \\times 5 \\times 10^{-4}$$ m$$^2$$ ~ $$0.014$$ Wb-turns, divided by ~0.2 s gives ~0.08 V.\n\nInsight: even for a strong field and many turns, small area × short time gives modest EMF — this is why generators use rapid continuous rotation, not one-off flips.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "How does the frequency of the output of an AC generator compare to the rotation frequency of its coil? Why? (2 steps)", "answer": "- Step 1: They are equal: if the coil rotates at $$f$$ Hz, the AC output has frequency $$f$$ Hz. Angular frequency $$\\omega = 2\\pi f$$ appears identically in both.\n- Step 2: Each full rotation of the coil produces one complete AC cycle — one positive half (say, going into the field) and one negative half (going out). This maps rotation directly to waveform period.\n\nContrast: a dynamo (DC generator) has *twice* as many humps per rotation as an alternator has cycles — because each half-turn is flipped positive.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "What are the four main sources of energy loss in a real transformer, and how is each minimised in practice? (4 steps)", "answer": "- Step 1: **Copper losses ($$I^2R$$ in windings)**: current in the coils heats the wire. Minimised by using thick copper wire (low resistance) and superconducting materials in specialist transformers.\n- Step 2: **Eddy currents in the core**: circulating currents in the iron core heat it. Minimised by *laminating* the core — thin insulated iron slices reduce loop area and increase path resistance.\n- Step 3: **Hysteresis losses**: energy consumed re-magnetising the core each cycle. Minimised by using *soft* magnetic materials that magnetise/demagnetise easily with minimal energy per cycle.\n- Step 4: **Flux leakage**: not all flux from primary links secondary — some escapes into air. Minimised by good core geometry (closed loop) and tight coil winding around the core.\n\nReal efficiencies: large power-grid transformers achieve 99%+; small consumer transformers ~90–95%.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "Contrast a motor and a generator: what is the input, output, governing physical principle, and applicable Fleming's rule for each? (2 steps)", "answer": "- Step 1: **Motor**:\n+ Input: electrical energy (current + voltage).\n+ Output: mechanical energy (rotation, torque).\n+ Principle: force on a current-carrying conductor in a field ($$F=BIL$$).\n+ Rule: Fleming's **left**-hand rule.\n- Step 2: **Generator**:\n+ Input: mechanical energy (rotation).\n+ Output: electrical energy (EMF, current).\n+ Principle: EMF induced by changing flux (Faraday's law).\n+ Rule: Fleming's **right**-hand rule.\n\nDeep symmetry: motors and generators are the same device operated in reverse. A motor being spun mechanically will act as a generator — this is called back-EMF and is why motors draw less current at high speed.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "If a solenoid has $$B = 5$$ mT perpendicular to its 300-turn coil of area 0.5 m², roughly what's its flux linkage, and what does the number mean physically? (3 steps)", "answer": "- Step 1: $$N\\Phi = BAN = 5\\times10^{-3} \\times 0.5 \\times 300 \\approx 0.75$$ Wb-turns.\n- Step 2: Physically, this means the total \"linked flux experience\" of the coil is 0.75 weber-turns — as if 0.75 Wb passed through a single loop, or equivalently each of 300 loops has 2.5 mWb through it.\n- Step 3: Its usefulness: if this flux linkage were destroyed in 1 second (e.g. by cutting the current), the induced EMF would be 0.75 V. This is why flux linkage is the direct predictor of induced EMF.\n\nTakeaway: flux linkage bundles $$B$$, $$A$$, and $$N$$ into a single number that directly determines induction — one quantity to track, not three.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Why does the induced EMF have a minus sign in Faraday's law, and when might you omit it in a calculation? (2 steps)", "answer": "- Step 1: The minus sign encodes Lenz's law — the induced EMF opposes the change in flux. Mathematically, if flux is increasing (positive $$d\\Phi/dt$$), EMF is negative (drives current the opposite way); if decreasing, EMF is positive.\n- Step 2: You can omit the sign when calculating just the *magnitude* of the induced EMF (which is often what exam questions ask for). But you must invoke it when:\n+ Determining the *direction* of induced current.\n+ Explaining energy conservation or the physical meaning of the sign.\n+ Interpreting a flux-vs-time graph (positive slope → negative EMF).\n\nExam tip: examiners often ask \"state the significance of the negative sign\" — answer: it represents Lenz's law / opposition to the change.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "A student claims: \"If I use a stronger magnet, the induced EMF gets bigger, so the induced current can violate energy conservation.\" Where is the flaw? (3 steps)", "answer": "- Step 1: Yes, a stronger magnet does induce a larger EMF (more flux change per unit time). And yes, the induced current is larger.\n- Step 2: But Lenz's law kicks in: the induced current also creates a stronger opposing magnetic field. The force resisting the magnet's motion is *also* proportionally larger.\n- Step 3: The mechanical work required to push a stronger magnet is greater — exactly matching the greater electrical energy generated. Energy accounts balance perfectly:\n+ Stronger magnet + same speed → more work per unit time → more electrical power.\n+ You don't get free energy; you pay for it in extra mechanical effort.\n\nTakeaway: Lenz's law isn't just about direction — it enforces energy conservation quantitatively.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "Why can't a step-up transformer be used to increase power? (3 steps)", "answer": "- Step 1: A transformer's fundamental principle is *energy conservation*: $$P_{out} \\leq P_{in}$$, with equality for ideal transformers. It cannot create energy from nothing.\n- Step 2: What a step-up transformer changes is the *ratio* of voltage to current, not their product. Increased voltage comes at the cost of decreased current: $$V_p I_p = V_s I_s$$.\n- Step 3: In fact, real transformers *lose* a small amount of power to heat and flux leakage, so $$P_{out} < P_{in}$$ strictly. You get more voltage but less current — total power stays the same (or slightly less).\n\nCommon misconception: \"step-up\" refers only to voltage, not power. Confusing the two is a classic exam trap.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Consider two coils sharing the same iron core, but with the secondary coil disconnected (open circuit). Does the primary still draw current? Is any power dissipated? (3 steps)", "answer": "- Step 1: Yes — the primary is connected to an AC source, so current flows in it regardless of the secondary. This current sets up the alternating magnetic field in the core.\n- Step 2: With the secondary open-circuit, no current flows in the secondary → no power delivered to a load. But the primary still draws some current called the \"magnetising current\" — needed to sustain the oscillating core field.\n- Step 3: In an *ideal* transformer this magnetising current is purely reactive (90° out of phase with voltage) → no net power dissipated. In a *real* transformer, some power is lost to hysteresis and eddy currents in the core, so the primary consumes a small amount of \"no-load\" power.\n\nTakeaway: transformers reflect load — no load on secondary means minimal power draw on primary (idealised limit).", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Sketch conceptually the flux-linkage-vs-time graph and the induced-EMF-vs-time graph for a rotating coil. What's the geometric relationship between them? (3 steps)", "answer": "- Step 1: Flux linkage traces $$N\\Phi(t) = BAN\\cos(\\omega t)$$ — a cosine wave oscillating between $$+BAN$$ and $$-BAN$$.\n- Step 2: EMF traces $$\\varepsilon(t) = BAN\\omega\\sin(\\omega t)$$ — a sine wave. It's 90° out of phase with the flux linkage.\n- Step 3: Geometric relationship:\n+ EMF is the *negative gradient* (slope) of the flux graph.\n+ Where flux is at a maximum or minimum (flat top/bottom), EMF = 0.\n+ Where flux crosses zero (steepest slope), $$|EMF|$$ is maximal.\n+ EMF amplitude scales with $$\\omega$$: faster rotation makes the flux graph \"steeper\" everywhere.\n\nVisual takeaway: draw a cosine on top, and its derivative (the sine, flipped) below — that's exactly the flux/EMF relationship.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "In a simple DC motor with a permanent magnet, why does the coil experience a torque only when current flows, and why does the torque direction depend on the coil's orientation? (3 steps)", "answer": "- Step 1: Each side of the coil is a current-carrying conductor in the magnetic field. By $$F = BIL$$, each side experiences a force perpendicular to both current and field.\n- Step 2: On opposite sides of the coil, current flows in opposite directions → forces are equal and opposite → they form a couple, producing torque about the coil's axis.\n- Step 3: As the coil rotates, the direction of \"up\" for each wire changes. Without the commutator, the torque would reverse every half-turn (opposing the motion). The split-ring commutator swaps current direction every half-turn, keeping the torque in the same sense → continuous rotation.\n\nTakeaway: the commutator is what makes DC motors *keep* rotating in one direction rather than oscillating.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "Give two ways in which the operation of a transformer differs when the primary carries DC vs AC, focusing on what happens right after switching on. (3 steps)", "answer": "- Step 1: **AC**: continuous alternating current → continuous alternating field → continuous changing flux → continuous induced EMF in secondary. Steady-state output with the same frequency as input.\n- Step 2: **DC switched on**: current rises rapidly from zero to steady-state → flux rises rapidly → brief non-zero $$d\\Phi/dt$$ → *momentary* induced EMF in secondary → then falls to zero as current stabilises.\n- Step 3: **DC switched off**: current collapses to zero → flux collapses → brief non-zero $$d\\Phi/dt$$ of opposite sign → momentary induced EMF in opposite direction.\n\nInsight: DC transformers give you two brief \"kicks\" (at switch-on and switch-off) and nothing in between — useless for continuous power transfer, which is why we use AC.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "A student says: \"The number of turns of a solenoid affects both flux and EMF.\" Is this correct? Clarify the distinction. (3 steps)", "answer": "- Step 1: Flux through a *single loop* of a solenoid, $$\\Phi = BA$$, does not directly depend on $$N$$ — it depends on the field and the loop area only.\n- Step 2: However, the *field itself* inside a solenoid depends on turns per unit length: $$B \\propto n = N/L$$. So more turns (for fixed length) do increase $$B$$, and hence $$\\Phi$$ through each loop.\n- Step 3: Flux linkage $$N\\Phi$$ scales explicitly with $$N$$. So EMF $$\\varepsilon = d(N\\Phi)/dt$$ has $$N$$ appearing *twice* — once via increased $$B$$, and once via more turns each experiencing $$d\\Phi/dt$$.\n\nTakeaway: \"flux\" and \"flux linkage\" are different — the student conflates them. Care with which quantity depends on $$N$$ in which way.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "A charged particle enters a magnetic field. Under what condition does it (a) travel in a straight line, (b) travel in a circle, (c) travel in a helix? (3 steps)", "answer": "- Step 1: **Straight line**: velocity is *parallel* (or antiparallel) to $$\\vec{B}$$. Then $$F = QvB\\sin(0) = 0$$ — no force, no deflection.\n- Step 2: **Circle**: velocity is *perpendicular* to $$\\vec{B}$$. Force is always ⊥ v, does no work, acts as centripetal → circular motion of radius $$r = mv/(BQ)$$.\n- Step 3: **Helix**: velocity has both parallel and perpendicular components. The perpendicular component causes circular motion; the parallel component drifts along the field lines → the trajectory spirals along $$\\vec{B}$$.\n\nApplication: charged particles in the Van Allen belts and solar wind spiral along Earth's magnetic field lines — this is exactly case (c).", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "In the transformer causal chain, students often skip from \"AC in primary\" straight to \"AC in secondary.\" Why is this wrong, and what phrase captures the missing physics? (3 steps)", "answer": "- Step 1: There is no direct electrical connection between the primary and secondary coils. Skipping steps ignores the fact that the energy has to *cross a gap*.\n- Step 2: The missing physics: the *magnetic field* (channelled by the iron core) is what transfers energy between the coils. The primary's changing current creates a changing magnetic field; the secondary experiences a changing flux linkage; Faraday's law induces an EMF.\n- Step 3: Key phrase for exam credit: \"**changing magnetic flux linkage** induces an EMF in the secondary.\" Omitting the words \"change\" and \"flux linkage\" loses marks — examiners specifically check for this vocabulary.\n\nCommon trap: writing \"the current in the primary produces a current in the secondary\" — no! Only the *field* mediates the transfer, and only *change* in that field.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}], "count": 45}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "What does magnetic flux density $$B$$ physically represent, and how is its definition operationally tied to a measurable force? (3 steps)", "answer": "- Step 1: $$B$$ represents the *strength* of a magnetic field at a point — visualised as the density of field lines. A denser packing of lines means a stronger field. Unit: tesla (T).\n- Step 2: We can't measure \"line density\" directly, so $$B$$ is defined operationally by the force it produces on a known current-carrying wire: $$B = F/(IL)$$ when the wire is perpendicular to the field.\n- Step 3: This means 1 T is the field strength that produces 1 N of force per amp per metre of perpendicular conductor. It's a large unit — Earth's field is only $$\\sim 0.032$$ mT, a fridge magnet $$\\sim 5$$ mT.\n\nTakeaway: $$B$$ isn't a mysterious quantity — it's defined by what it *does* to a current.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why is magnetic flux defined using $$\\Phi = BA\\cos\\theta$$ rather than $$BA\\sin\\theta$$, and what does $$\\theta$$ refer to?", "answer": "Flux counts how many field lines \"pierce\" through an area. What matters is the component of $$B$$ perpendicular to the surface, because a field line grazing along the surface doesn't pass through it. $$\\theta$$ is defined as the angle between the field direction and the *normal* (perpendicular) to the surface. When $$\\theta = 0$$ (field aligned with the normal, i.e. field ⊥ surface), $$\\cos\\theta = 1$$ and flux is maximum ($$BA$$). When $$\\theta = 90°$$ (field along the surface, parallel to it), no lines penetrate and flux is zero. Using $$\\cos\\theta$$ enforces exactly this geometry. A common trap: students take $$\\theta$$ as the angle to the surface itself — always draw the normal first.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "What is magnetic flux *linkage*, why do we multiply by $$N$$, and what are its units? (3 steps)", "answer": "- Step 1: A single loop enclosing flux $$\\Phi$$ has an induced EMF from Faraday's law proportional to $$d\\Phi/dt$$.\n- Step 2: If we wrap $$N$$ turns of wire around the same area, each turn independently experiences the same changing flux, and their induced EMFs add in series → the total is $$N$$ times larger. So the quantity that actually appears in Faraday's law is $$N\\Phi = BAN$$.\n- Step 3: The unit is weber-turns (Wb turns). \"Turns\" is technically dimensionless (a count), but we keep it in the unit as a reminder that this quantity scales with coil geometry.\n\nTakeaway: flux linkage bundles all the coil geometry into a single quantity that Faraday's law can act on directly.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "For a flat coil placed in a uniform magnetic field, when is the flux linkage maximum and when is it zero? Sketch the geometry for both cases. (2 steps)", "answer": "- Step 1: Maximum flux linkage: field lines pass *perpendicular* to the plane of the coil (i.e. parallel to the normal). Every line pierces straight through. $$\\theta = 0$$ between field and normal, $$\\cos\\theta = 1$$, $$N\\Phi = BAN$$.\n- Step 2: Zero flux linkage: field lines lie *in the plane* of the coil (parallel to the coil face). No lines pierce through. $$\\theta = 90°$$ between field and normal, $$\\cos\\theta = 0$$.\n\nCommon confusion: the coil looks \"aligned\" with the field in the second case, but visually that means the field slides *past* the coil rather than *through* it — hence zero flux.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "State Fleming's left-hand rule, including what each finger represents and which type of situation it applies to.", "answer": "Fleming's left-hand rule gives the direction of force on a current (or moving positive charge) in a magnetic field — i.e. it's the *motor* rule. Hold your left hand with thumb, first finger, and second finger mutually perpendicular. First finger (Forefinger) = magnetic Field direction (N → S). seCond finger = conventional Current direction (flow of positive charge, opposite to electron flow). thuMb = Motion / force direction. Mnemonic: F-B-I in the order thumb-first-second gives Force, B-field, current (with slight rearrangement). Applies whenever you need to find the force on a current-carrying wire or a moving charged particle.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Why does Fleming's left-hand rule use conventional current instead of electron flow, and what do you do if the particle is negative? (2 steps)", "answer": "- Step 1: The rule is set up for *positive* charge flow because historically that's how current was defined (before electrons were discovered as the actual carriers in metals). All the physics equations use this convention consistently.\n- Step 2: For a negative charge (e.g. an electron beam), point the second finger in the direction *opposite* to the particle's motion. Equivalently: an electron moving left is treated as conventional current moving right.\n\nTrap: forgetting to flip for electrons flips your entire predicted force direction.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Compare $$F = BIL\\sin\\theta$$ and $$F = BQv\\sin\\theta$$: what does each describe, and how are they related conceptually? (3 steps)", "answer": "- Step 1: $$F = BIL\\sin\\theta$$ is the force on a current-carrying *conductor* of length $$L$$ inside a field. It bundles many moving charges into the macroscopic quantity $$I$$.\n- Step 2: $$F = BQv\\sin\\theta$$ is the force on a *single* isolated charge $$Q$$ moving with velocity $$v$$. This is the microscopic version.\n- Step 3: They're really the same law. Current $$I$$ in a wire is $$I = nQv A$$ (charges per volume × charge × drift velocity × area), and the total number of charges in length $$L$$ is $$nAL$$. Multiply the single-charge force $$BQv$$ by the number of charges: total force is $$BIL$$. So the conductor formula is just the sum of the individual-charge forces.\n\nTrap: don't mix them — using $$BQv$$ for a wire (or $$BIL$$ for one charge) gives nonsense units.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "Why does a charged particle in a uniform magnetic field move in a circle rather than a straight line or spiral? (3 steps)", "answer": "- Step 1: The magnetic force is $$F = Qv \\times B$$ (a cross product), so it is *always* perpendicular to the velocity.\n- Step 2: A force perpendicular to velocity can never do work ($$W = F\\cdot d$$, and $$F \\perp d$$ means $$W = 0$$), so the particle's speed stays constant.\n- Step 3: Constant speed + force always perpendicular to velocity = the definition of centripetal motion. The force continuously bends the path without changing the speed → circular motion. Equating magnetic force to centripetal: $$BQv = mv^2/r$$ gives radius $$r = mv/(BQ)$$.\n\nInsight: heavier or faster particles curve more gently (larger $$r$$); stronger fields or higher charges tighten the curve.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Two particles enter the same magnetic field perpendicularly with the same speed. Particle A has twice the mass and the same charge as particle B. Which follows the larger circle, and by what factor? (2 steps)", "answer": "- Step 1: The radius of circular motion in a B-field is $$r = mv/(BQ)$$. Only $$m$$ differs between the two.\n- Step 2: Doubling $$m$$ doubles $$r$$. Particle A traces a circle twice as large as particle B.\n\nIntuition: heavier particles have more inertia, so the same sideways force bends them less sharply.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "For a current-carrying wire in a B-field, when is the force on it maximum and when is it zero? Explain physically, not just from the formula. (2 steps)", "answer": "- Step 1: Maximum when current is perpendicular to $$B$$ ($$\\theta = 90°$$, $$\\sin\\theta = 1$$). Every moving charge in the wire experiences a full sideways push from the field.\n- Step 2: Zero when current is parallel to $$B$$ ($$\\theta = 0$$, $$\\sin\\theta = 0$$). The charges are moving *along* the field lines, and the magnetic force $$Qv\\times B$$ vanishes when $$v \\parallel B$$.\n\nTakeaway: only the *component* of current perpendicular to the field produces force — parallel motion is invisible to the field.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "In one sentence, state the condition required for an EMF to be induced in a coil.", "answer": "An EMF is induced whenever the *magnetic flux linkage* through the coil is changing with time — this can happen via a changing $$B$$, a changing area $$A$$, or a changing angle $$\\theta$$ between the field and the coil's normal. A stationary situation (constant $$B$$, $$A$$, $$\\theta$$) induces nothing, no matter how strong the flux is.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "State Faraday's law in words and as an equation, and explain what each term means. (3 steps)", "answer": "- Step 1: In words: the magnitude of the induced EMF in a circuit equals the rate of change of magnetic flux linkage through it.\n- Step 2: As an equation: $$\\varepsilon = -\\dfrac{d(N\\Phi)}{dt}$$, where $$\\varepsilon$$ is induced EMF (V), $$N$$ is number of turns, $$\\Phi$$ is flux per turn (Wb), and $$t$$ is time (s).\n- Step 3: The key insight is *rate of change*: a huge flux that isn't changing induces zero EMF. Only the derivative matters.\n\nCommon mistake: writing \"EMF is proportional to flux\" — no, it's proportional to the *rate of change* of flux linkage.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "State Lenz's law and explain why it must be true from energy conservation. (3 steps)", "answer": "- Step 1: Lenz's law: the direction of the induced EMF/current is such that its magnetic effect *opposes the change* in flux that caused it.\n- Step 2: Suppose it did the opposite — the induced current *reinforced* the incoming flux change. Then the induced field would attract the moving magnet, accelerating it further, which would induce an even bigger current, which would attract it more... we'd get energy for free (perpetual motion).\n- Step 3: The universe forbids this. Instead, the induced current *repels* the incoming magnet, so you have to do work pushing the magnet in — and that mechanical work is exactly what becomes electrical energy in the coil. Lenz's law is conservation of energy in disguise.\n\nTakeaway: the minus sign in $$\\varepsilon = -d(N\\Phi)/dt$$ isn't cosmetic — it's the mathematical expression of Lenz's law.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "A bar magnet is pushed N-pole first into a coil. What is the polarity of the near face of the coil, and what force does the coil exert on the magnet? (3 steps)", "answer": "- Step 1: By Lenz's law, the induced current must oppose the *change* — here, an approaching N pole.\n- Step 2: To oppose an approaching N pole, the near face of the coil must itself become a N pole (like poles repel).\n- Step 3: Using the right-hand grip rule (thumb along N pole = field lines exiting), the current in the near face (viewed from the magnet's side) flows anticlockwise. The coil pushes back on the magnet, so you must do work to insert it — that work becomes the electrical energy dissipated in the coil.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "A stationary bar magnet sits *inside* a coil, right in the middle. The voltmeter reads what, and why?", "answer": "Zero. Faraday's law depends on the *rate of change* of flux linkage, not on the flux itself. Even though there is substantial flux threading the coil, $$d(N\\Phi)/dt = 0$$ because nothing is changing — the magnet isn't moving, the field is static. This is a classic trap: students see lots of flux and expect a reading. The takeaway is that flux and EMF are decoupled — only the *derivative* couples them.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "For a coil rotating in a uniform B-field, at what orientation is the induced EMF maximum, and why is this counterintuitive? (3 steps)", "answer": "- Step 1: EMF is maximum when the coil's plane is *parallel* to the field (field lies in the plane of the coil), i.e. when the flux linkage is *zero*.\n- Step 2: Counterintuitive: naively you'd think max flux = max EMF. But Faraday's law says EMF depends on $$d\\Phi/dt$$, not $$\\Phi$$. When flux is at its peak (coil ⊥ field), the flux is momentarily *stationary* — think of $$\\sin$$ at its peak, where the gradient is zero.\n- Step 3: When flux is passing through zero (coil ∥ field), the flux is changing fastest — like $$\\sin$$ crossing zero with maximum gradient. So the coil \"cuts field lines\" fastest at this orientation, producing maximum EMF.\n\nTakeaway: EMF peaks where flux crosses zero; EMF is zero where flux peaks. They're 90° out of phase (one is the derivative of the other).", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "Derive the expression for the EMF of an AC generator, $$\\varepsilon = BAN\\omega \\sin(\\omega t)$$. (4 steps)", "answer": "- Step 1: A coil of $$N$$ turns and area $$A$$ rotates in a uniform field $$B$$ with angular frequency $$\\omega$$. Let $$\\theta$$ be the angle between the field and the *normal* to the coil at time $$t$$, so $$\\theta = \\omega t$$.\n- Step 2: The flux linkage at time $$t$$ is $$N\\Phi = BAN\\cos(\\omega t)$$.\n- Step 3: Faraday: $$\\varepsilon = -d(N\\Phi)/dt$$. Differentiating: $$\\varepsilon = -BAN \\cdot (-\\omega\\sin(\\omega t)) = BAN\\omega \\sin(\\omega t)$$.\n- Step 4: Peak EMF (when $$\\sin = 1$$): $$\\varepsilon_{max} = BAN\\omega$$.\n\nInsight: the $$\\omega$$ appears because a *faster* rotation means a *faster* change of flux — spin twice as fast, get twice the peak EMF *and* twice the frequency.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "For an AC generator, what happens to the output waveform if you double the rotation frequency? (2 steps)", "answer": "- Step 1: The output frequency doubles (obviously — the coil cycles through orientations twice as fast).\n- Step 2: The *amplitude* also doubles, because peak EMF $$\\varepsilon_{max} = BAN\\omega$$ scales linearly with $$\\omega$$. Faster rotation means flux changes faster, giving larger EMFs.\n\nTakeaway: doubling $$\\omega$$ doubles both the height and the frequency of the sine wave — the output has 4× the peak power.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "What is the key structural difference between an AC generator (alternator) and a DC generator (dynamo), and how does this produce their different outputs? (3 steps)", "answer": "- Step 1: An alternator uses two continuous *slip rings* — each brush stays connected to the same end of the coil throughout the rotation.\n- Step 2: A dynamo uses a *split-ring commutator* — a ring with a gap that reconnects the coil's two ends to opposite brushes every half-turn.\n- Step 3: In the alternator, when the coil flips direction of motion (each half-turn), the current in the external circuit reverses too → sinusoidal AC. In the dynamo, the commutator flips the connection at exactly the same moment the coil's motion flips, so the two flips cancel and the external current always flows the *same* way → bumpy DC (a rectified sine, all positive humps).\n\nInsight: the commutator is a mechanical rectifier.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "A coil in a generator is momentarily aligned with the field lines lying in the plane of the coil. Is the flux linkage max or min? Is the induced EMF max or min? Explain. (3 steps)", "answer": "- Step 1: Field lines *in the plane* means field is *parallel* to the coil's surface → no lines pierce through → flux linkage is *zero (minimum)*.\n- Step 2: But the coil is rotating, so the flux is changing rapidly through this orientation (passing from + to − or vice versa) — it's the fastest rate of change.\n- Step 3: Therefore EMF, which depends on $$d\\Phi/dt$$, is at its *maximum* here. Peak EMF coincides with zero flux — the two are 90° out of phase.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Explain why a transformer only works with AC, not DC. (3 steps)", "answer": "- Step 1: A transformer relies on inducing an EMF in the secondary via a *changing* magnetic flux linkage through the iron core.\n- Step 2: If a constant DC voltage is applied to the primary, it drives a *constant* current, which creates a *constant* magnetic field — a static flux. $$d\\Phi/dt = 0$$, so the induced EMF in the secondary is zero. No transformer action.\n- Step 3: With AC, the current in the primary is constantly reversing, so the flux is constantly changing, giving a continuous induced EMF in the secondary.\n\nBonus: at the *moment* DC is switched on or off, flux does change momentarily (building up or collapsing), so you get a brief spike in the secondary — but only transient.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Walk through the five-stage causal chain of a transformer, in the exact A-level exam order. (5 steps)", "answer": "- Step 1: An **alternating input voltage** is applied across the primary coil.\n- Step 2: This drives an **alternating current** in the primary coil (electrons oscillate back and forth).\n- Step 3: The alternating current produces a **changing (alternating) magnetic field** in the iron core, according to the right-hand grip rule.\n- Step 4: The iron core channels this changing field to the secondary coil, producing a **changing flux linkage** in the secondary.\n- Step 5: By Faraday's law, the changing flux linkage **induces an alternating EMF** in the secondary. If the secondary is in a complete circuit, this drives an alternating current at the *same frequency* as the input.\n\nExam warning: you must use the words \"change\" and \"induced EMF\" explicitly. Skipping steps loses marks.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Why is the transformer core made of *iron*, and why is it *laminated*? (3 steps)", "answer": "- Step 1: Iron is used because it has high magnetic permeability — it channels magnetic field lines efficiently, dramatically strengthening the flux linkage between primary and secondary compared to an air core. \"Soft\" iron specifically is used because it magnetises and demagnetises easily, following the AC cycle without lagging.\n- Step 2: But iron is also an electrical conductor. A changing magnetic field through a bulk iron core induces circulating currents *inside the core itself* — eddy currents — which dissipate energy as heat ($$I^2R$$ losses).\n- Step 3: Laminating the core (thin slices with insulation between them) breaks up the conducting loops. Eddy currents can no longer circulate freely across the whole core, dramatically reducing power loss.\n\nAnalogy: laminations are like \"chopping the loaf of bread into slices\" and putting greaseproof paper between them.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "Derive the turns-ratio equation $$V_p/V_s = N_p/N_s$$ from Faraday's law, assuming perfect flux linkage. (3 steps)", "answer": "- Step 1: Assume all flux from the primary threads the secondary equally (perfect core). Both coils experience the *same* $$d\\Phi/dt$$ per turn.\n- Step 2: Faraday's law applied to each coil: $$V_p = N_p \\cdot d\\Phi/dt$$ and $$V_s = N_s \\cdot d\\Phi/dt$$.\n- Step 3: Dividing: $$V_p/V_s = N_p/N_s$$. The voltages scale with the number of turns because each turn adds one more \"unit\" of induced EMF from the same shared flux.\n\nTakeaway: this is exact only for ideal (lossless, perfect flux linkage) transformers.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "In an ideal transformer, the primary has 100 turns and voltage 50 V. The secondary has 400 turns. Roughly what is the secondary voltage, and is this a step-up or step-down transformer? (2 steps)", "answer": "- Step 1: Turns ratio $$N_s/N_p = 400/100 = 4$$. So $$V_s = 4 \\times V_p = 200$$ V.\n- Step 2: $$N_s > N_p$$ and $$V_s > V_p$$, so this is a step-up transformer.\n\nKey intuition: more turns on the secondary means more induced EMF per unit of shared flux — voltage scales with turns.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "If a transformer steps voltage *up*, what happens to the current, and why? (3 steps)", "answer": "- Step 1: An ideal transformer conserves energy: $$P_{in} = P_{out}$$, i.e. $$V_p I_p = V_s I_s$$.\n- Step 2: So $$I_s/I_p = V_p/V_s = N_p/N_s$$. If voltage goes up by a factor of 10, current must come *down* by a factor of 10.\n- Step 3: Physically: the secondary coil has more turns and higher voltage, but the induced current must be smaller so that the total power drawn from the primary equals the total power delivered by the secondary.\n\nTrap: students often think \"step-up = more of everything\". No — voltage and current trade off inversely to conserve power.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Why is high voltage used for long-distance electrical power transmission? Explain the reasoning from first principles. (4 steps)", "answer": "- Step 1: The power to be delivered is fixed: $$P = IV$$. This is what the customer needs at the far end.\n- Step 2: Power *lost* in the transmission cables (as heat) is $$P_{loss} = I^2R$$, where $$R$$ is cable resistance. Note it depends on $$I^2$$, not $$I$$ — the loss is *quadratic* in current.\n- Step 3: To deliver a fixed $$P$$, if we raise $$V$$, then $$I$$ drops proportionally. Halving the current quarters the losses.\n- Step 4: Therefore we step up to very high voltage ($$\\sim 250$$ kV) for transmission — small current — then step down at the consumer end ($$\\sim 230$$ V) for safety.\n\nTakeaway: cable losses aren't linear — the quadratic dependence on $$I$$ is what makes high-voltage transmission a massive win.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "A power line carries 100 MW. Option A: 10 kV at 10 kA. Option B: 100 kV at 1 kA. Both deliver the same power. If the cable has resistance 1 Ω, roughly how much power is lost in each case? (3 steps)", "answer": "- Step 1: Power lost is $$I^2 R$$. Option A: $$I = 10\\,000$$ A, so $$I^2 R = 10^8$$ W = 100 MW.\n- Step 2: Option B: $$I = 1\\,000$$ A, so $$I^2 R = 10^6$$ W = 1 MW.\n- Step 3: Option A loses *all* the power in the cables (useless!). Option B loses only 1% — 100× less. The quadratic scaling of loss with current makes high-voltage transmission dramatically more efficient.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "List four sources of energy loss in a real (non-ideal) transformer. (4 steps)", "answer": "- Step 1: **Resistive ($$I^2R$$) losses in copper windings** — the coils have resistance, so current flowing through them dissipates heat.\n- Step 2: **Eddy currents in the iron core** — circulating currents induced in the conducting core dissipate heat. Reduced by laminating the core.\n- Step 3: **Hysteresis losses** — the iron core is repeatedly magnetised and demagnetised each AC cycle. Realigning magnetic domains costs energy, which is lost as heat.\n- Step 4: **Flux leakage** — not all the flux produced by the primary reaches the secondary; some escapes into the surrounding air, so the secondary sees less flux than the primary produces.\n\nTakeaway: real transformers are ~95–99% efficient, not 100%.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "A step-down transformer has $$N_p = 4000$$, $$N_s = 100$$, $$V_p = 230$$ V, $$I_p = 2$$ A, efficiency 95%. Conceptually walk through how to find $$I_s$$ (without computing exact numbers). (4 steps)", "answer": "- Step 1: Find $$V_s$$ from the turns ratio: $$V_s = V_p \\cdot N_s/N_p$$. Since $$N_s/N_p = 1/40$$, $$V_s$$ is about 40× smaller than $$V_p$$ → a few volts.\n- Step 2: Find ideal secondary power: $$P_{in} = V_p I_p = 460$$ W. The ideal secondary current $$I_s^{ideal} = P_{in}/V_s$$ (about 80 A) — 40× larger than $$I_p$$ (inverse of turns ratio).\n- Step 3: Apply efficiency: only 95% of $$P_{in}$$ reaches the secondary. So $$I_s^{real} = 0.95 \\times I_s^{ideal}$$ ≈ 76 A.\n- Step 4: Sanity check: step-down means lower voltage, higher current on the secondary — matches.\n\nTakeaway: efficiency isn't applied to voltage (fixed by turns ratio); it comes off the *current*/power.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "How does Fleming's *right*-hand rule differ from the left-hand rule, and when do you use each?", "answer": "Same hand geometry (three fingers mutually perpendicular; thumb = Motion, First finger = Field, seCond finger = Current) but using the *right* hand instead of the left. Use the left hand for the *motor effect*: you know the field and current, want to find the resulting force/motion. Use the right hand for the *generator effect*: you know the field and the direction the conductor is being moved, want to find the direction of the induced current. Memory hook: motoRs use Left (opposite letters), geneRators use Right (matching R's). A common mistake is using the same hand for both — always ask: am I *creating* motion from current (LH), or *creating* current from motion (RH)?", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "In a simple DC motor, how do you (a) reverse the direction of rotation and (b) increase its speed? (2 steps)", "answer": "- Step 1: **Reverse direction:** flip the battery polarity. This reverses the current, which by Fleming's LHR reverses the force on each side of the coil, which reverses the rotation.\n- Step 2: **Increase speed:** increase the current (higher voltage, lower coil resistance, more turns). By $$F = BIL$$, larger $$I$$ means larger force on each side of the coil, which produces a larger torque, spinning the coil faster. With permanent-magnet motors, $$B$$ is fixed, so speed is set by current alone.\n\nBonus: real motors often use two electromagnets (one static \"stator\", one rotating \"rotor\"), so you can also strengthen the field by increasing the stator current.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "A U-magnet sits on a balance zeroed to 0. A horizontal wire is placed between its poles. Current is switched on and the balance reads +161 g. Explain the physics and deduce the field direction if current flows left-to-right. (4 steps)", "answer": "- Step 1: The balance reads +161 g, meaning something is pushing *down* on it. So there's a downward force on the magnet.\n- Step 2: By Newton's third law, whatever pushes the magnet down must experience an equal and opposite reaction — so the wire experiences an *upward* force.\n- Step 3: Apply Fleming's LHR to the wire: thumb up (known force), second finger left→right (known current), first finger must be... *into the page* (using right hand geometry with the *left* hand — try it physically).\n- Step 4: Since the first finger is field N→S, and it points into the page, the N pole is at the back and S pole is at the front of the U-magnet.\n\nTakeaway: the balance measures the reaction force to the motor force, not the force on the wire directly.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "In the U-magnet-on-balance experiment, if the current is doubled, what happens to the balance reading and why?", "answer": "The reading doubles. The force on the wire is $$F = BIL$$, linear in $$I$$. Doubling $$I$$ doubles the force on the wire (upward), and by Newton's third law, doubles the reaction force on the magnet (downward), so the balance reads about twice as much. There's no fundamental upper limit here — the practical limit is that at very high currents, resistive heating $$I^2R$$ can melt the wire (unless it's superconducting).", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "When a bar magnet is thrust into a coil twice as fast, how does the peak induced EMF change, and why? (2 steps)", "answer": "- Step 1: The peak EMF *doubles*. Faraday's law: $$\\varepsilon = -N\\,d\\Phi/dt$$. Moving twice as fast means the flux changes at twice the rate.\n- Step 2: The *total* charge circulated through the circuit stays the same, though — it depends on the *total* change in flux, not on how fast. But the peak instantaneous current (and EMF) scales with speed.\n\nInsight: two ways to boost induced EMF — increase magnet strength (larger $$\\Delta\\Phi$$) or move it faster (smaller $$\\Delta t$$).", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Explain what happens in the secondary coil of a transformer during three phases: (a) primary DC switched on, (b) primary DC steady, (c) primary DC switched off. (3 steps)", "answer": "- Step 1: **Switch on:** as primary current builds from 0 to steady, the flux through the iron core is *rising*. Changing flux → EMF induced in secondary → momentary current. Lasts only during the transient buildup.\n- Step 2: **Steady DC:** primary current is constant → magnetic field is constant → flux is constant → $$d\\Phi/dt = 0$$ → no induced EMF in secondary → no current, even though there's plenty of flux linked.\n- Step 3: **Switch off:** primary current collapses from steady value to 0 → flux collapses → $$d\\Phi/dt$$ is nonzero (opposite sign to step 1) → momentary induced EMF and current in the *opposite* direction to step 1.\n\nTakeaway: DC only produces transient transformer action at switching moments. This is why real transformers need AC — continuous flux change.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Why is the induced EMF in the secondary coil of a transformer at the *same frequency* as the primary voltage?", "answer": "The primary AC voltage drives a primary current at the same frequency (assuming a resistive primary). This alternating current produces a magnetic field that alternates at the same frequency, giving a flux that oscillates at the same frequency. Faraday's law then gives a secondary EMF proportional to $$d\\Phi/dt$$, which — if the flux is sinusoidal at frequency $$f$$ — is also sinusoidal at frequency $$f$$ (just shifted by 90°). So every stage in the chain preserves frequency; only the amplitude changes, set by the turns ratio.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "A generator coil has $$N = 200$$ turns, area $$0.02\\,m^2$$, spins at 50 Hz in a $$B = 0.5$$ T field. Conceptually, what determines the peak EMF and roughly what order of magnitude is it? (3 steps)", "answer": "- Step 1: Peak EMF is $$\\varepsilon_{max} = BAN\\omega$$ where $$\\omega = 2\\pi f \\approx 314$$ rad/s at 50 Hz.\n- Step 2: Multiply through: $$B$$ = 0.5, $$A$$ = 0.02, $$N$$ = 200, $$\\omega \\approx 300$$. The product is roughly $$0.5 \\times 0.02 \\times 200 \\times 300 \\approx 600$$ V.\n- Step 3: So we're talking hundreds of volts — realistic domestic generator scale. Each factor contributes: strong field, big area, many turns, and fast rotation all pile up multiplicatively.\n\nTakeaway: modest values in each factor combine into a large EMF because $$\\varepsilon_{max}$$ scales with all four factors linearly.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "For a coil spinning at 50 Hz in a magnetic field, at time $$t = 0.01$$ s the EMF is approximately zero. Why? (2 steps)", "answer": "- Step 1: Period at 50 Hz is $$T = 1/50 = 0.02$$ s. At $$t = 0.01$$ s, we're at exactly half a period → $$\\omega t = \\pi$$ → $$\\sin(\\omega t) = 0$$.\n- Step 2: At this moment, the coil has rotated 180° from its starting orientation. The flux linkage is momentarily at an extremum (max/min), so its rate of change is zero → EMF is zero. Equivalently, the coil is passing through the \"peak flux, flat gradient\" point of the cosine curve.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "For a moving charge in a magnetic field, does the magnetic force do any work on the charge? What's the consequence? (2 steps)", "answer": "- Step 1: No — the magnetic force is always perpendicular to the velocity ($$F = Qv \\times B$$). Work is $$W = F \\cdot d$$, and if $$F \\perp v$$, then $$F \\perp d$$, giving $$W = 0$$.\n- Step 2: Consequence: the charge's *kinetic energy* — and hence its speed — is conserved. Only the *direction* of motion changes. This is why charged particles in a uniform B-field move in circles at constant speed, and why magnetic fields can't be used to accelerate particles to higher energies (that requires electric fields).\n\nTakeaway: magnetic fields steer charges but don't speed them up.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "A coil rotates in a B-field, producing a sinusoidal EMF. Sketch qualitatively (in words) the relationship between the flux-linkage graph and the induced-EMF graph. (3 steps)", "answer": "- Step 1: If flux linkage is $$N\\Phi \\propto \\cos(\\omega t)$$ (starts at max, oscillates), then induced EMF is $$-d/dt$$ of that: $$\\varepsilon \\propto \\sin(\\omega t)$$.\n- Step 2: So EMF is 90° out of phase with flux linkage: when flux is at a peak or trough, EMF is zero (flat tangent). When flux crosses zero, EMF is at ±peak (steepest tangent).\n- Step 3: The EMF graph is the *gradient* of the flux graph. Steeper flux gradient → larger EMF magnitude; the sign of EMF is opposite to the sign of the gradient (Lenz's minus sign).\n\nTakeaway: EMF and flux linkage are 90° phase-shifted; one is the derivative of the other.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "A wire carries current perpendicular to a uniform B-field pointing into the page. The force on the
