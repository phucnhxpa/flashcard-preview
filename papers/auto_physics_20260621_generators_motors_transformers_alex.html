 wire points downward. Which direction does the conventional current flow?", "answer": "Apply Fleming's LHR with left hand: thumb (Motion/Force) down, first finger (Field) into the page. Rotating your hand so these two directions are correct forces the second finger (Current) to point to the *left*. So conventional current flows right to left. (Electrons flow left to right.) Common trap: getting confused by which direction \"into the page\" corresponds to with the first finger — practise physically until it's automatic.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "Suppose you triple the number of turns on the secondary of an ideal transformer (leaving primary unchanged). What happens to (a) secondary voltage, (b) secondary current for the same load, (c) secondary power delivered? (3 steps)", "answer": "- Step 1: **Voltage:** $$V_s = V_p (N_s/N_p)$$ — tripling $$N_s$$ triples $$V_s$$.\n- Step 2: **Current:** if the load is the same resistor $$R$$, then $$I_s = V_s/R$$ triples too. (But if the load is fixed *power*, then $$I_s$$ would drop by 3×.) The context of \"same load\" matters.\n- Step 3: **Power:** if current tripled (fixed $$R$$), then $$P = V_s I_s$$ is 9× larger. This means the primary must draw 9× more current from the source, so total power drawn scales up too.\n\nTakeaway: turns ratio directly sets voltage; what happens to current and power depends on what the load is.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "Why does an electron entering a uniform B-field perpendicular to its velocity trace a circle, and how does the circle's radius depend on the electron's speed? (3 steps)", "answer": "- Step 1: The magnetic force $$F = evB$$ is perpendicular to the velocity, so it acts as a centripetal force without changing speed.\n- Step 2: Setting magnetic = centripetal: $$evB = mv^2/r$$, so $$r = mv/(eB)$$.\n- Step 3: A *faster* electron traces a *bigger* circle (radius scales linearly with $$v$$). Intuition: it has more momentum, so the same sideways force deflects it less per unit time. Also, the angular frequency $$\\omega = v/r = eB/m$$ is *independent* of $$v$$ — this is the cyclotron frequency, a fundamental property of the charge-to-mass ratio and the field.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "In the transformer causal chain, why is the *iron core* essential rather than just having the two coils close together in air? (3 steps)", "answer": "- Step 1: In air, most of the magnetic flux produced by the primary spreads out into the surrounding space and only a tiny fraction threads through the secondary — flux linkage is poor and efficiency terrible.\n- Step 2: Iron has high magnetic permeability (~1000× air) — magnetic field lines vastly prefer to travel through iron. The core acts like a \"magnetic conductor\" or \"channel\", guiding almost all the flux from primary to secondary.\n- Step 3: Result: essentially the same flux threads both coils, satisfying the assumption behind $$V_p/V_s = N_p/N_s$$. Without the core, the turns-ratio equation would fail badly due to leakage.\n\nAnalogy: iron is to magnetic flux what copper is to electric current — it channels it where you want it.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "A student claims: \"The transformer works because the primary coil transmits electrical energy directly through the wires of the core to the secondary.\" What's wrong with this? (2 steps)", "answer": "- Step 1: The primary and secondary coils are *electrically isolated* — they don't touch each other, and the iron core doesn't carry electric current between them (that would be a short circuit failure).\n- Step 2: Energy transfers via the *magnetic field*: the primary current produces a magnetic field in the core, and the changing field induces an EMF in the secondary. It's electromagnetic induction across empty space (mediated by the iron), not electrical conduction.\n\nTakeaway: transformer energy transfer is field-mediated, not conduction — that's why it works across insulating barriers.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "A rectangular coil (350 turns, sides 3.5 cm × 1.4 cm) is initially with its plane parallel to a 80 mT field (zero flux) and is rotated 90° in 0.18 s. Conceptually explain how to find the average induced EMF. (4 steps)", "answer": "- Step 1: Initial flux linkage: field is *in the plane* of the coil, so flux is zero.\n- Step 2: Final flux linkage: coil is now perpendicular to field, so flux is at maximum: $$N\\Phi = BAN$$. Area is a few $$\\times 10^{-4}\\,m^2$$.\n- Step 3: Change in flux linkage $$\\Delta(N\\Phi) = BAN - 0 = BAN$$. This is roughly $$350 \\times 5\\times10^{-4} \\times 0.08 \\approx 0.014$$ Wb turns.\n- Step 4: Average EMF = $$|\\Delta(N\\Phi)/\\Delta t| \\approx 0.014/0.18 \\approx 0.08$$ V.\n\nTakeaway: average EMF over a finite rotation ≠ peak instantaneous EMF; use $$\\Delta(N\\Phi)/\\Delta t$$ for averages.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "Compare and contrast a motor and a generator, in terms of input/output energy, physics, and hand rule used. (4 steps)", "answer": "- Step 1: **Motor**: electrical energy in, mechanical energy out. Current-carrying coil in a B-field experiences a force (motor effect) → the coil spins.\n- Step 2: **Generator**: mechanical energy in, electrical energy out. Coil is spun in a B-field → changing flux linkage → induced EMF (Faraday's law) → current in an external circuit.\n- Step 3: **Hand rule**: motor → Fleming's left-hand rule (find force from current & field). Generator → Fleming's right-hand rule (find induced current from motion & field).\n- Step 4: **Reversibility**: the same device can run either way — spin a motor manually and it becomes a generator; feed current into a generator and it becomes a motor. The physics is symmetric.\n\nTakeaway: motor and generator are two sides of the same coin — one produces motion from current, the other current from motion.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "Why do we call it \"conventional current\" and how does this relate to Fleming's rules? (2 steps)", "answer": "- Step 1: Conventional current is defined as the direction of *positive charge flow*. Historically, before electrons were discovered, Franklin arbitrarily labelled current direction as flowing from + to − through the external circuit. Later, we learned that in metals it's actually electrons (negative) flowing the other way.\n- Step 2: All equations (including Fleming's rules) were built using the conventional definition, so we stick with it. For a metal wire, \"current to the right\" means electrons to the left, but Fleming's second finger points right. Trap: if the moving charges are positive (e.g. a proton beam), the current is *with* the motion; if negative (electrons), current is *against*.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "When applying $$F = BIL\\sin\\theta$$, what physical setup gives $$\\sin\\theta = 0$$ and hence zero force? Give an intuitive explanation. (2 steps)", "answer": "- Step 1: $$\\sin\\theta = 0$$ when $$\\theta = 0$$, i.e. the current direction is *parallel* to the field direction.\n- Step 2: Intuitively: each moving charge in the wire has velocity along the field lines. The magnetic force $$Qv\\times B$$ vanishes for $$v \\parallel B$$ because there's no perpendicular component of velocity for the field to bend. The wire feels no sideways push. Only the perpendicular component of current produces force.\n\nTakeaway: a wire strung along a field line feels no magnetic force, no matter how much current it carries.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "A step-up transformer has primary of 500 turns at 200 V and 4 A. The secondary has 2000 turns. Roughly what are $$V_s$$ and $$I_s$$ in an ideal case? (3 steps)", "answer": "- Step 1: Turns ratio: $$N_s/N_p = 4$$. So $$V_s = 4 \\times V_p = 800$$ V.\n- Step 2: Power conservation: $$V_p I_p = V_s I_s$$, so $$I_s = I_p (V_p/V_s) = 4 \\times (1/4) = 1$$ A.\n- Step 3: Sanity check: voltage went up 4×, current went down 4×, power is preserved at 800 W. Confirms step-up: high V, low I.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "Why does a laminated core reduce eddy current losses more effectively than a solid core? (3 steps)", "answer": "- Step 1: In a solid iron core, the changing flux induces circulating (eddy) currents in loops throughout the bulk of the metal. These currents dissipate power as $$I^2R$$ heat.\n- Step 2: Laminating the core (thin insulated slices) means eddy currents can no longer form large loops across the whole core — they're confined to individual thin layers.\n- Step 3: In each thin layer, the induced EMF is smaller (smaller area → less flux enclosed → smaller $$d\\Phi/dt$$) and the resistance around the loop is larger. Both effects together reduce eddy current power dissipation dramatically.\n\nTakeaway: laminations break the electrical continuity of the core without breaking its magnetic continuity — huge win.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "The current in a primary coil of a transformer flows sinusoidally at 50 Hz. What's the frequency of the magnetic field in the core, and what's the frequency of the induced EMF in the secondary? (2 steps)", "answer": "- Step 1: Primary current at 50 Hz → magnetic field in core also at 50 Hz (field magnitude follows current linearly, so it oscillates at the same frequency, reversing sign each half-cycle).\n- Step 2: Induced EMF in secondary = $$-N_s\\, d\\Phi/dt$$. Differentiating a sinusoid gives another sinusoid at the *same frequency* (just phase-shifted by 90°). So the secondary EMF is also at 50 Hz.\n\nTakeaway: transformers preserve frequency exactly — they only rescale amplitude.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "In Lenz's law, why does the induced current oppose the *change* rather than the flux itself? (3 steps)", "answer": "- Step 1: Faraday's law says EMF is proportional to $$d\\Phi/dt$$ — the *rate of change*. A static flux, no matter how big, induces nothing.\n- Step 2: If a constant flux induced a current that opposed the flux itself, we'd have perpetual current from a static magnet — perpetual motion again.\n- Step 3: Only *changes* to flux inject energy into the circuit (from the source of the change — e.g. someone doing work to move the magnet). The induced current opposes whatever is causing that change, so that pushing/pulling against it does work — which becomes the electrical energy. It's not the flux we're opposing; it's the *process* of changing it.\n\nTakeaway: Lenz's law opposes the *action*, not the *state*.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "Two coils lie next to each other but not touching. A steady current flows in the first coil. Is there an EMF induced in the second? What if the current in the first coil is suddenly switched off? (2 steps)", "answer": "- Step 1: Steady current → steady magnetic field → steady flux through the second coil → $$d\\Phi/dt = 0$$ → *no* induced EMF in the second coil.\n- Step 2: When the first current is switched off, the field collapses in a fraction of a second → $$d\\Phi/dt$$ briefly nonzero → a spike of induced EMF in the second coil. Direction is such that the induced current tries to maintain the collapsing flux (Lenz's law).\n\nTakeaway: transient switching is a legit source of induction, but only for the moment of change.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": false}, {"question": "Suppose you double $$B$$ and halve $$A$$ for a rotating coil generator, keeping $$N$$ and $$\\omega$$ fixed. What happens to the peak EMF and why? (2 steps)", "answer": "- Step 1: Peak EMF is $$\\varepsilon_{max} = BAN\\omega$$. Doubling $$B$$ multiplies by 2; halving $$A$$ multiplies by 1/2. Net effect: unchanged.\n- Step 2: Physically: same total flux $$BA$$ through the coil, changing at the same rate ($$\\omega$$ unchanged), so same rate of change of flux linkage.\n\nInsight: $$BA$$ appears as a product in flux — you can trade off field strength against coil area.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": false}, {"question": "In the electron-orbit-in-a-B-field picture, does the direction the electron circles depend on the sign of its charge? Explain. (3 steps)", "answer": "- Step 1: For a positive charge moving to the right in a B-field into the page, Fleming's LHR gives force upward → curves upward → circles anticlockwise.\n- Step 2: For an electron (negative), moving right in the same field: point second finger *opposite* to its motion (i.e. to the left, because it's negative). Now LHR gives force *downward* → curves downward → circles *clockwise*.\n- Step 3: So yes: positive and negative charges circle in *opposite* senses in the same field. This is exploited in mass spectrometers to separate particles by sign of charge.\n\nTakeaway: the sign of the charge sets the sense of the circle; the magnitude sets the radius.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": true}, {"question": "Why does a transformer preserve frequency but not power (in a real device)?", "answer": "Frequency preservation is a mathematical consequence of the causal chain: sinusoidal input → sinusoidal current → sinusoidal flux → derivative is still sinusoidal at the same frequency. There's nothing in the physics that could shift the frequency. Power preservation, however, requires *ideal* conditions — no losses. Real transformers lose energy to $$I^2R$$ heating in the copper windings, eddy currents in the iron core, hysteresis in the magnetisation, and flux leakage into the air. All these are dissipative processes (converting electrical energy to heat) — none of them affect the timing of oscillations, only the amplitude. So frequency is preserved by geometry, but power isn't preserved by material limitations.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": true}, {"question": "In an alternator (AC generator), why does the current in the external circuit reverse direction every half-turn? (3 steps)", "answer": "- Step 1: As the coil rotates, each side of the coil alternates between moving \"up\" and moving \"down\" through the field. Every half-turn, a given side that was going up now goes down.\n- Step 2: By Fleming's RHR (generator rule), the induced current direction in that side depends on its motion. Flipping the direction of motion flips the direction of induced current in that side.\n- Step 3: Since the slip rings connect each end of the coil to the same brush throughout, whatever current the coil produces flows straight to the external circuit. When the coil's current reverses, so does the external current → AC output.\n\nContrast: a commutator (dynamo) would swap the brush connections at the same moment, cancelling the reversal → DC output.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": false}, {"question": "A bar magnet is dropped vertically through a horizontal conducting coil. How does the terminal velocity of the falling magnet compare to what it would be in free fall? Explain qualitatively. (3 steps)", "answer": "- Step 1: As the magnet falls through the coil, it induces a current (Faraday's law) which produces a magnetic field opposing the magnet's motion (Lenz's law) — this is a *retarding force* on the magnet.\n- Step 2: This retarding force grows with the magnet's speed (faster fall → faster $$d\\Phi/dt$$ → bigger induced current → bigger opposing field).\n- Step 3: The magnet reaches a \"terminal velocity\" — much slower than free fall — where gravitational pull equals the electromagnetic retarding force. The falling magnet's lost gravitational PE goes into electrical energy dissipated as heat in the coil.\n\nTakeaway: eddy-brake demonstration of Lenz's law + energy conservation.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": false}, {"question": "Suppose you replace the iron core in a transformer with a copper core of the same shape. What happens qualitatively? (3 steps)", "answer": "- Step 1: Copper has much lower magnetic permeability than iron (essentially the same as vacuum), so it won't channel magnetic flux — flux linkage between primary and secondary collapses.\n- Step 2: Copper is also an excellent electrical conductor, so massive eddy currents would form in the core, dissipating huge amounts of energy.\n- Step 3: Result: extremely poor coupling (low secondary EMF) and extremely high losses (heat everywhere). The device would be essentially useless as a transformer.\n\nTakeaway: iron's role is dual — high permeability (good) and (with laminations) manageable eddy currents (also good). Copper has neither property helpfully.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": true}, {"question": "In a rotating coil generator, what if the coil starts with its normal aligned with the field (max flux linkage)? What does the EMF vs time graph look like? (2 steps)", "answer": "- Step 1: At $$t = 0$$, flux linkage $$N\\Phi = BAN\\cos(0) = BAN$$ (maximum), so its derivative — the EMF — is *zero*.\n- Step 2: The EMF then follows $$\\varepsilon = BAN\\omega \\sin(\\omega t)$$: starts at zero, rises to peak $$BAN\\omega$$ at $$t = T/4$$, back to zero at $$t = T/2$$, negative peak at $$3T/4$$, back to zero at $$T$$. Peak EMF and peak flux linkage are 90° out of phase.\n\nTakeaway: whichever quantity peaks first depends on the initial coil orientation, but they're always in quadrature (90°).", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": false}], "count": 62}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5 const SK='auto_physics_20260621_generators_motors_transformers_alex';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
