 V_p$$ (step-down), then $$I_s > I_p$$ to maintain the equality. The current goes **up** as voltage goes down.\n- Step 3: Physically, the same amount of power is being transferred (minus small losses). If you deliver it at a lower voltage, you need more current to carry the same power. Think of it like a waterfall: a thin, fast stream (high V, low I) vs. a wide, slow river (low V, high I) — both can carry the same flow rate.\n\nStep-down: voltage decreases, current increases. Step-up: voltage increases, current decreases. Power is approximately conserved.", "source": "GLM 5.1 ①", "_id": "glm_1_40"}, {"question": "Explain the difference between F = BIL sinθ and F = BQv sinθ. When is each used? (2 steps)", "answer": "- Step 1: $$F = BIL \\sin\\theta$$ applies to a current-carrying conductor (many charges moving together), while $$F = BQv \\sin\\theta$$ applies to an isolated moving charged particle (single charge).\n- Step 2: The key difference is that I in the first equation is the total current, while Q in the second equation is the charge of one particle. For a wire carrying current, you use BIL; for a proton/electron in a magnetic field, you use BQv.", "source": "MiniMax ①", "_id": "minimax_1_6"}, {"question": "Two coils lie next to each other but not touching. A steady current flows in the first coil. Is there an EMF induced in the second? What if the current in the first coil is suddenly switched off? (2 steps)", "answer": "- Step 1: Steady current → steady magnetic field → steady flux through the second coil → $$d\\Phi/dt = 0$$ → *no* induced EMF in the second coil.\n- Step 2: When the first current is switched off, the field collapses in a fraction of a second → $$d\\Phi/dt$$ briefly nonzero → a spike of induced EMF in the second coil. Direction is such that the induced current tries to maintain the collapsing flux (Lenz's law).\n\nTakeaway: transient switching is a legit source of induction, but only for the moment of change.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "Why does flux vary as $$\\cos\\theta$$ where $$\\theta$$ is the angle between the field and the *normal* to the area, rather than the angle between the field and the area itself? (2 steps)", "answer": "- Step 1: Flux counts field lines passing *through* the surface. What matters is the component of $$\\vec{B}$$ perpendicular to the surface — because a field line parallel to the surface never crosses it. The natural way to describe \"perpendicular to a surface\" is the surface's normal vector.\n- Step 2: When $$\\vec{B}$$ is aligned with the normal ($$\\theta=0$$), every field line crosses the surface → maximum flux $$\\Phi = BA$$. When $$\\vec{B}$$ is perpendicular to the normal ($$\\theta=90°$$), it's parallel to the surface → no lines cross → $$\\Phi=0$$. The projection is $$B\\cos\\theta$$, giving $$\\Phi = BA\\cos\\theta$$.\n\nCommon trap: students often plug in \"the angle between field and coil plane\" — this gives $$\\sin\\theta$$ instead. Always draw the normal.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "Sketch the output voltage vs. time graph for (a) an alternator and (b) a dynamo. Describe the key difference in shape. (2 steps)", "answer": "- Step 1: An alternator produces a sinusoidal wave that goes both positive and negative — a smooth sine curve crossing zero twice per cycle. This is AC.\n- Step 2: A dynamo produces a pulsating waveform that is always positive (or always negative) — it looks like the absolute value of a sine wave. The commutator flips the negative half-cycles to positive, so the current never reverses direction, but it does drop to zero twice per cycle. This is pulsed DC.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "What does the \"motor effect\" refer to, and how does it differ from \"electromagnetic induction\"? Are they related or completely separate phenomena? (3 steps)", "answer": "- Step 1: The **motor effect** is when a current-carrying conductor in a magnetic field experiences a **force**. You put electrical energy in (current), and get mechanical energy out (force → motion). This is the basis of electric motors.\n- Step 2: **Electromagnetic induction** is when a changing magnetic flux through a circuit induces an **EMF** (and current if the circuit is complete). You put mechanical energy in (motion changing the flux), and get electrical energy out. This is the basis of generators.\n- Step 3: They are **two sides of the same coin** — both arise from the interaction of electricity and magnetism. In fact, a motor and a generator are the same device: apply current → it spins (motor); spin it → it generates current (generator). The motor effect and induction are complementary descriptions of electromagnetic interaction.\n\nMotor effect: current + field → force. Induction: changing flux → EMF. Same physics, different perspectives.", "source": "GLM 5.1 ①", "_id": "glm_1_47"}, {"question": "A student claims: \"The transformer works because the primary coil transmits electrical energy directly through the wires of the core to the secondary.\" What's wrong with this? (2 steps)", "answer": "- Step 1: The primary and secondary coils are *electrically isolated* — they don't touch each other, and the iron core doesn't carry electric current between them (that would be a short circuit failure).\n- Step 2: Energy transfers via the *magnetic field*: the primary current produces a magnetic field in the core, and the changing field induces an EMF in the secondary. It's electromagnetic induction across empty space (mediated by the iron), not electrical conduction.\n\nTakeaway: transformer energy transfer is field-mediated, not conduction — that's why it works across insulating barriers.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What is the key distinction between magnetic flux density ($$B$$), magnetic flux ($$\\Phi$$), and magnetic flux linkage ($$N\\Phi$$)? What does each one physically represent? (3 steps)", "answer": "- Step 1: **Magnetic flux density $$B$$** is the \"strength\" of the magnetic field at a point — how densely packed the field lines are. Think of it as the intensity of the field. It's measured in Tesla (T). A fridge magnet is ~5 mT; Earth's field is ~0.032 mT.\n- Step 2: **Magnetic flux $$\\Phi = BA\\cos\\theta$$** is the total amount of magnetic field \"threading through\" a given area. It depends on how strong the field is, how big the area is, and how aligned the area is with the field. Measured in Webers (Wb). Think of it as \"how many field lines pass through the loop.\"\n- Step 3: **Magnetic flux linkage $$N\\Phi = BAN\\cos\\theta$$** extends flux to a coil of $$N$$ turns. Each turn captures the same flux, so the total \"linkage\" is flux × number of turns. Measured in Weber-turns. This is the quantity that matters for electromagnetic induction — it's what Faraday's Law uses.\n\nFlux density = field intensity; Flux = field through an area; Flux linkage = field through a whole coil.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "A rectangular coil sits in a uniform magnetic field. When the coil's plane is perpendicular to the field lines, what is the value of $$\\theta$$ in $$\\Phi = BA\\cos\\theta$$, and is the flux maximum or minimum? What about when the coil's plane is parallel to the field lines? (3 steps)", "answer": "- Step 1: The angle $$\\theta$$ is measured between the **field lines and the normal (perpendicular) to the plane of the area** — NOT between the field and the plane itself. This is a common exam trap.\n- Step 2: When the coil's plane is **perpendicular to the field**, the normal to the coil is **parallel** to the field, so $$\\theta = 0°$$ and $$\\cos\\theta = 1$$. Flux is **maximum**: $$\\Phi = BA$$.\n- Step 3: When the coil's plane is **parallel to the field**, the normal to the coil is **perpendicular** to the field, so $$\\theta = 90°$$ and $$\\cos\\theta = 0$$. Flux is **minimum (zero)**: $$\\Phi = 0$$.\n\nRemember: $$\\theta$$ is always measured from the **normal** to the plane, not from the plane itself.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "Why does a stationary magnet sitting inside a coil induce zero EMF, even though there is magnetic flux through the coil? (2 steps)", "answer": "- Step 1: Faraday's Law states that the induced EMF depends on the **rate of change** of flux linkage, not the flux linkage itself: $$\\varepsilon = -\\frac{\\Delta(N\\Phi)}{\\Delta t}$$. A stationary magnet produces a constant, unchanging flux through the coil.\n- Step 2: Since the flux isn't changing, $$\\Delta(N\\Phi) = 0$$, so $$\\varepsilon = 0$$. It's the *change* that matters — a large steady flux induces nothing, but even a small rapidly-changing flux induces a significant EMF.\n\nThink of it like a hose: water flowing steadily through a pipe does nothing special, but turning the tap on or off (changing the flow) is what you notice.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "A coil rotates in a uniform magnetic field. At the instant the flux linkage through the coil is at its maximum, what is the induced EMF? And at the instant the flux linkage is zero, what is the induced EMF? Explain why this seems counterintuitive. (3 steps)", "answer": "- Step 1: When flux linkage is **maximum** (coil perpendicular to field, $$\\theta = 0°$$), the flux is at a peak — like the top of a cosine wave. At a peak, the *gradient* (rate of change) is zero. So the induced EMF is **zero**.\n- Step 2: When flux linkage is **zero** (coil parallel to field, $$\\theta = 90°$$), the flux is crossing through zero — the steepest part of the curve. The rate of change is at its **maximum**, so the induced EMF is **maximum**.\n- Step 3: This is the **most common exam trap**. Students assume maximum flux = maximum EMF. But EMF depends on $$\\frac{d(N\\Phi)}{dt}$$, the *gradient* of the flux-time graph, not the value of flux itself. Maximum flux → zero gradient → zero EMF. Zero flux → maximum gradient → maximum EMF.\n\nFlux and EMF are 90° out of phase: when one peaks, the other crosses zero.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "What are the three ways to change the magnetic flux linkage through a coil, and therefore induce an EMF? Give a practical example of each. (3 steps)", "answer": "- Step 1: **Change the magnetic flux density $$B$$** — e.g., move a bar magnet closer to or further from a coil, or change the current in a nearby electromagnet. The field strength at the coil changes, changing the flux through it.\n- Step 2: **Change the area $$A$$** — e.g., deform a flexible loop by stretching or compressing it within a magnetic field. The amount of field \"captured\" by the loop changes as the area changes.\n- Step 3: **Change the angle $$\\theta$$** — e.g., rotate a coil in a magnetic field (this is exactly what a generator does). As the coil turns, $$\\cos\\theta$$ changes, so the flux linkage oscillates sinusoidally.\n\nAny one of these three changes produces a $$\\Delta(N\\Phi)$$, and by Faraday's Law, induces an EMF.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "State Faraday's Law in words and as an equation. What does each symbol represent and what are its units? (2 steps)", "answer": "- Step 1: **In words:** The magnitude of the induced EMF is directly proportional to the rate of change of magnetic flux linkage.\n- Step 2: **As an equation:** $$\\varepsilon = -\\frac{\\Delta(N\\Phi)}{\\Delta t}$$ where:\n  + $$\\varepsilon$$ = induced EMF (V)\n  + $$\\Delta(N\\Phi)$$ = change in flux linkage (Wb turns)\n  + $$\\Delta t$$ = time interval (s)\n  + The negative sign represents Lenz's Law (the EMF opposes the change)\n\nFor instantaneous values, this becomes $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$, which is the gradient of the flux linkage vs. time graph.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "State Lenz's Law and explain why it is really just conservation of energy in disguise. What would happen if it weren't true? (3 steps)", "answer": "- Step 1: **Lenz's Law:** The induced EMF is set up in a direction to produce effects that **oppose** the change causing it.\n- Step 2: If the induced current *reinforced* the change instead of opposing it, you'd get a positive feedback loop: the changing flux induces a current that creates more flux change, which induces more current, which creates even more flux change... This would generate energy from nothing — violating conservation of energy.\n- Step 3: The opposition means you must do **work** to keep changing the flux. When you push a magnet into a coil, the induced current creates a magnetic field that repels the magnet — you have to push against this repulsion. The mechanical work you do is converted into electrical energy. Energy is conserved.\n\nLenz's Law isn't an arbitrary rule — it's a necessary consequence of energy conservation.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "A bar magnet's north pole is pushed towards a coil. What pole does the coil create on the face nearest the magnet, and why? What happens when the magnet is pulled away? (3 steps)", "answer": "- Step 1: As the north pole **approaches**, the flux through the coil is increasing. By Lenz's Law, the induced current must create a field that **opposes** this increase — so the coil creates a **north pole** on the face nearest the magnet. North repels north, resisting the magnet's approach.\n- Step 2: As the north pole is **withdrawn**, the flux through the coil is decreasing. Lenz's Law says the induced current must oppose this decrease — so the coil creates a **south pole** on the face nearest the magnet. South attracts north, resisting the magnet's departure.\n- Step 3: The direction of the induced current therefore **reverses** when the magnet changes from approaching to receding. This is why the voltmeter shows a positive deflection when the magnet enters and a negative deflection when it leaves.\n\nApproaching → repel (same pole); Leaving → attract (opposite pole). Both oppose the change.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "In the combined Faraday-Lenz equation $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$, what does the negative sign physically mean? If the flux linkage vs. time graph has a positive gradient, what is the sign of the EMF? (2 steps)", "answer": "- Step 1: The negative sign means the induced EMF acts in a direction that **opposes** the change in flux linkage. If flux linkage is increasing (positive gradient), the EMF is negative — it drives a current that tries to reduce the flux. If flux linkage is decreasing (negative gradient), the EMF is positive — it drives a current that tries to maintain the flux.\n- Step 2: If the flux linkage vs. time graph has a **positive gradient**, then $$\\frac{d(N\\Phi)}{dt} > 0$$, and $$\\varepsilon = -\\frac{d(N\\Phi)}{dt} < 0$$. The EMF is negative, meaning it acts to oppose the increase in flux.\n\nThe EMF is always the negative of the gradient — it fights the change.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "What is the formula for the force on a current-carrying conductor in a magnetic field? When is this force maximum, and when is it zero? (3 steps)", "answer": "- Step 1: The force is given by $$F = BIL\\sin\\theta$$, where $$B$$ is flux density (T), $$I$$ is current (A), $$L$$ is the length of conductor in the field (m), and $$\\theta$$ is the angle between the conductor and the field lines.\n- Step 2: The force is **maximum** when $$\\theta = 90°$$ (conductor perpendicular to field), because $$\\sin 90° = 1$$, giving $$F = BIL$$. This is when the conductor \"cuts across\" the most field lines.\n- Step 3: The force is **zero** when $$\\theta = 0°$$ (conductor parallel to field), because $$\\sin 0° = 0$$. A current flowing along the field lines experiences no magnetic force at all.\n\nPerpendicular = max force; Parallel = zero force. The angle matters critically.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "What is the formula for the force on an isolated moving charged particle in a magnetic field? How does it differ from the force on a current-carrying conductor? (3 steps)", "answer": "- Step 1: The force on a moving charged particle is $$F = BQv\\sin\\theta$$, where $$B$$ is flux density (T), $$Q$$ is the charge (C), $$v$$ is the speed (m/s), and $$\\theta$$ is the angle between the velocity and the field.\n- Step 2: The key difference from $$F = BIL\\sin\\theta$$: the conductor formula uses current $$I$$ and length $$L$$ (because current is a flow of many charges through a wire), while the particle formula uses charge $$Q$$ and velocity $$v$$ (for a single moving charge). They're related because $$I = \\frac{Q}{t}$$ and $$L = v \\times t$$, so $$IL = Qv$$.\n- Step 3: Just like the conductor case, the force is maximum when the particle moves perpendicular to the field ($$\\theta = 90°$$) and zero when it moves parallel ($$\\theta = 0°$$). But crucially, the force is **always perpendicular to the velocity**, which means the magnetic force does no work and causes the particle to move in a **circle**.\n\n$$F = BIL\\sin\\theta$$ for wires; $$F = BQv\\sin\\theta$$ for single particles. Don't mix them up!", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "Why does a charged particle moving perpendicular to a uniform magnetic field travel in a circle? What provides the centripetal force, and what determines the radius? (3 steps)", "answer": "- Step 1: The magnetic force on a moving charge is always **perpendicular to its velocity**. This is exactly the condition for circular motion — a force always pointing toward the centre, never speeding up or slowing down the particle.\n- Step 2: The magnetic force provides the centripetal force: $$BQv = \\frac{mv^2}{r}$$. Rearranging gives the radius: $$r = \\frac{mv}{BQ}$$.\n- Step 3: From $$r = \\frac{mv}{BQ}$$: a **heavier** or **faster** particle has a larger radius (harder to bend), while a **stronger field** or **larger charge** gives a smaller radius (easier to bend). This is how mass spectrometers separate particles by mass.\n\nThe magnetic force never does work on the charge (it's always at 90° to motion), so the particle's speed stays constant — only direction changes.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "In Fleming's Left Hand Rule, what does each finger represent? When applying it to an electron, what crucial adjustment must you make? (3 steps)", "answer": "- Step 1: **Thumb** = Force (Motion), **First finger** = Field (magnetic flux density, N→S), **seCond finger** = Current (conventional, +→−). All three are mutually perpendicular.\n- Step 2: The second finger represents **conventional current** — the direction positive charges would flow. For a positive charge, point your second finger in the direction the charge is moving.\n- Step 3: For an **electron** (negative charge), the conventional current is in the **opposite direction** to the electron's motion. So point your second finger *opposite* to the electron's velocity. This is the most common mistake in exams.\n\nFor electrons: second finger points **opposite** to the electron's actual motion. For positive charges: second finger points **in the direction** of motion.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "On a diagram, a circle with a dot (⊙) represents a vector pointing in which direction? A circle with a cross (⊗) represents which direction? How can you remember this? (2 steps)", "answer": "- Step 1: **Dot (⊙)** = vector pointing **out of the page** (towards you). **Cross (⊗)** = vector pointing **into the page** (away from you).\n- Step 2: Imagine an arrow in archery: if the arrow is flying towards you, you see the **tip** (a dot). If the arrow is flying away from you, you see the **feathers at the back** (a cross).\n\nDot = out (tip approaching); Cross = in (tail receding).", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "An electron moves to the left in a magnetic field directed into the page. What is the initial direction of the magnetic force on the electron? Walk through Fleming's Left Hand Rule step by step. (4 steps)", "answer": "- Step 1: Identify the magnetic field direction: **into the page**. Point your **first finger** into the page.\n- Step 2: The electron moves to the **left**. But conventional current is opposite to electron motion, so conventional current is to the **right**. Point your **second finger** to the right.\n- Step 3: With first finger into the page and second finger to the right, your **thumb** points **upwards**.\n- Step 4: Therefore, the force on the electron is initially **upwards**. After this initial deflection, the electron will curve in a circular path because the force is always perpendicular to velocity.\n\nAlways reverse the second finger for electrons — conventional current is opposite to electron flow.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "What is the fundamental difference between a motor and a generator in terms of energy conversion and the physical principle involved? (2 steps)", "answer": "- Step 1: **Motor:** Input = electrical energy, Output = mechanical energy. Principle: a current-carrying conductor in a magnetic field experiences a **force** (motor effect / Fleming's Left Hand Rule). You put electricity in, the coil spins.\n- Step 2: **Generator:** Input = mechanical energy, Output = electrical energy. Principle: moving a conductor through a magnetic field **induces an EMF** (electromagnetic induction / Faraday's Law). You spin the coil, electricity comes out.\n\nMotor: electricity → force → motion. Generator: motion → changing flux → induced EMF → electricity. They're essentially the same device run in reverse.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "What is the key structural difference between an alternator and a dynamo, and how does this difference determine whether the output is AC or DC? (3 steps)", "answer": "- Step 1: **Alternator** uses **slip rings** — two continuous, unbroken rings connecting the coil to the external circuit. As the coil rotates, each end of the coil stays connected to the same brush throughout the full rotation.\n- Step 2: **Dynamo** uses a **split-ring commutator** — a ring split into two halves with a gap. Each half connects to one end of the coil. Every half-turn, the connections swap as the gap passes the brushes.\n- Step 3: In an alternator, the current naturally reverses direction each half-turn (because the coil's motion through the field reverses), producing **AC**. In a dynamo, the commutator swaps the external connections at exactly the right moment to flip the negative half-cycle positive, producing **DC** (pulsating, but always in the same direction).\n\nSlip rings → AC (alternator). Split-ring commutator → DC (dynamo). The commutator \"rectifies\" the output.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "A student says: \"An alternator needs to disconnect the circuit for the current to alternate direction.\" Is this correct? Explain what actually causes the current to alternate in an alternator. (3 steps)", "answer": "- Step 1: This is **incorrect**. The alternator uses continuous slip rings — the circuit is never disconnected. Current flows continuously throughout the rotation.\n- Step 2: The current alternates because the **direction of motion of each side of the coil reverses** relative to the magnetic field every half-turn. As a side of the coil moves up through the field, it induces current in one direction; as it moves down, it induces current in the opposite direction.\n- Step 3: It's the **reversal of the coil's velocity** through the field that causes the EMF to change sign — not any disconnection. The slip rings maintain a continuous circuit while allowing the natural alternation of the induced EMF.\n\nAlternation comes from the physics of induction (changing direction of motion), not from breaking the circuit.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "For a coil rotating in a uniform magnetic field, the induced EMF is given by $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$. What is the peak EMF, and at what point in the rotation does it occur? (3 steps)", "answer": "- Step 1: The peak (maximum) EMF occurs when $$\\sin(\\omega t) = 1$$, which happens when the coil plane is **parallel** to the magnetic field (i.e., the coil is \"edge-on\" to the field, cutting through field lines at the maximum rate).\n- Step 2: The peak EMF is $$\\varepsilon_{max} = BAN\\omega$$, where $$B$$ is flux density, $$A$$ is coil area, $$N$$ is number of turns, and $$\\omega$$ is angular frequency.\n- Step 3: This confirms the key insight: maximum EMF occurs when the coil is cutting through the most field lines per unit time (coil parallel to field, flux is zero but changing fastest). When the coil is face-on to the field (flux is maximum), the EMF is zero because the flux isn't changing.\n\n$$\\varepsilon_{max} = BAN\\omega$$ — increase any of $$B$$, $$A$$, $$N$$, or $$\\omega$$ to get a larger peak EMF.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "If you double the frequency of rotation of a generator coil, what happens to both the frequency and the amplitude of the output EMF? Explain why. (3 steps)", "answer": "- Step 1: **Frequency doubles.** The EMF completes one full cycle per rotation of the coil. If the coil rotates twice as fast, it produces twice as many cycles per second.\n- Step 2: **Amplitude doubles.** The peak EMF is $$\\varepsilon_{max} = BAN\\omega$$. Since $$\\omega = 2\\pi f$$, doubling $$f$$ doubles $$\\omega$$, which doubles the peak EMF.\n- Step 3: Physically, spinning faster means the coil cuts through field lines at a greater rate. Faraday's Law says EMF is proportional to the rate of change of flux — faster rotation means faster change, means bigger EMF.\n\nDoubling rotation speed doubles both the frequency and the amplitude of the output. Both effects come from the same cause: faster flux change.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "A DC motor has a split-ring commutator. What would happen to the coil's motion if the commutator were removed and replaced with slip rings? (3 steps)", "answer": "- Step 1: Without the commutator, the current direction in the coil would no longer reverse every half-turn. The current would alternate (as in an AC generator), but the motor would no longer function properly as a motor.\n- Step 2: In the first half-turn, the forces would cause the coil to rotate. But in the second half-turn, the current reverses while the coil has rotated 180° — so the force direction stays the same relative to the coil. The coil would experience a force trying to push it **back** the way it came.\n- Step 3: The coil would **oscillate** back and forth around the vertical position, rather than rotating continuously. It would settle at the equilibrium position (coil perpendicular to field) and stop. The commutator is essential for continuous one-directional rotation.\n\nWithout a commutator, the motor becomes a vibrator, not a rotator. The commutator's job is to reverse the current at exactly the right moment to keep the torque in the same rotational direction.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "Walk through the exact sequence of how a transformer works, from AC input voltage to AC output voltage. State each step in order. (5 steps)", "answer": "- Step 1: An **alternating voltage** is applied across the primary coil.\n- Step 2: This drives an **alternating current** through the primary coil (the current changes direction periodically).\n- Step 3: The alternating current creates a **changing (alternating) magnetic field** around the primary coil, which is channelled through the **soft iron core** to the secondary coil.\n- Step 4: The changing magnetic field passes through the secondary coil, causing a **changing magnetic flux linkage** in it. By Faraday's Law, this induces an **alternating EMF** (voltage) in the secondary coil.\n- Step 5: If the secondary coil is connected to a complete circuit, the induced alternating voltage drives an **alternating current** through the load (e.g., a light bulb).\n\nAC voltage → AC current → changing magnetic field → changing flux linkage in secondary → induced AC voltage → AC current in secondary. No electrical connection between the coils — energy transfers via the magnetic field.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "Why must a transformer use AC rather than DC? What would happen if you connected a DC supply to a transformer's primary coil? (3 steps)", "answer": "- Step 1: A transformer works by electromagnetic induction — it requires a **changing** magnetic flux linkage in the secondary coil. AC naturally provides a changing current, which creates a changing magnetic field.\n- Step 2: DC produces a **constant** current and therefore a **constant** magnetic field. With a constant field, there is no change in flux linkage through the secondary coil, so **no EMF is induced** (except momentarily when the DC is switched on or off).\n- Step 3: Specifically with DC: (a) when switched ON, there's a brief changing flux → momentary induced EMF; (b) while DC remains steady, flux is constant → zero induced EMF; (c) when switched OFF, flux collapses → momentary induced EMF in opposite direction. The transformer would not work continuously.\n\nTransformers need AC. DC gives only momentary pulses at switch-on and switch-off, with nothing in between.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "State the transformer turns ratio equation and the transformer power equation. What assumption does the power equation make? (2 steps)", "answer": "- Step 1: **Turns ratio equation:** $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$, where $$V_p$$ and $$V_s$$ are primary and secondary voltages, and $$N_p$$ and $$N_s$$ are the number of turns on each coil. The voltage ratio equals the turns ratio.\n- Step 2: **Power equation:** $$V_p I_p = V_s I_s$$ (or $$P_{in} = P_{out}$$). This assumes the transformer is **100% efficient** — no energy is lost. In reality, some energy is lost as heat (resistive losses, eddy currents, hysteresis), so $$P_{out} < P_{in}$$.\n\nFor an ideal transformer: voltage ratio = turns ratio, and power in = power out. Real transformers have efficiency $$\\eta = \\frac{P_{out}}{P_{in}} < 1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A step-up transformer has 100 turns on the primary coil and 500 turns on the secondary coil. If the input voltage is 20 V, qualitatively what happens to the voltage and current in the secondary coil compared to the primary? (3 steps)", "answer": "- Step 1: Using the turns ratio: $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s} = \\frac{100}{500} = \\frac{1}{5}$$. So $$V_s = 5 \\times V_p = 100$$ V. The voltage is **stepped up by a factor of 5**.\n- Step 2: Using power conservation ($$V_p I_p = V_s I_s$$): if voltage increases by a factor of 5, current must **decrease by a factor of 5** to keep power the same. $$I_s = \\frac{I_p}{5}$$.\n- Step 3: A step-up transformer trades high current for high voltage. This is exactly what the National Grid needs: high voltage for transmission (to reduce $$I^2R$$ heating losses), then step down near homes for safety.\n\nStep-up: more turns on secondary → higher voltage, lower current. Step-down: fewer turns on secondary → lower voltage, higher current.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "In the National Grid, why is electricity transmitted at very high voltage over long distances? What would happen if it were transmitted at low voltage and high current instead? (3 steps)", "answer": "- Step 1: The power transmitted is $$P = IV$$. For a fixed power, increasing voltage means decreasing current. The power station generates a roughly fixed amount of power.\n- Step 2: Energy lost as heat in the transmission cables is $$P_{loss} = I^2R$$. This depends on the **square** of the current — so even a modest reduction in current dramatically reduces energy loss. Doubling the voltage halves the current, which quarters the power loss.\n- Step 3: If transmitted at low voltage and high current, the $$I^2R$$ losses would be enormous — the cables would get very hot and most of the generated energy would be wasted. By stepping up to very high voltage (e.g., 250 kV in the UK), the current is kept very low, and transmission losses are minimised.\n\nHigh voltage = low current = low $$I^2R$$ losses. This is the entire point of the step-up transformer in the National Grid.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "A power station outputs 100 MW of power. The transmission cables have a total resistance of 10 Ω. If transmitted at 25,000 V, roughly how much power is lost in the cables? If transmitted at 250,000 V instead, how does the loss compare? (3 steps)", "answer": "- Step 1: At 25,000 V: current $$I = \\frac{P}{V} = \\frac{100 \\times 10^6}{25,000} = 4{,}000$$ A. Power loss = $$I^2R = (4{,}000)^2 \\times 10 = 160$$ MW — that's **more than the total power generated**! (This shows why low-voltage transmission is impractical.)\n- Step 2: At 250,000 V: current $$I = \\frac{100 \\times 10^6}{250,000} = 400$$ A. Power loss = $$I^2R = (400)^2 \\times 10 = 1.6$$ MW — only about **1.6%** of the generated power.\n- Step 3: Increasing voltage by a factor of 10 decreases current by a factor of 10, which decreases power loss by a factor of **100** (because of the $$I^2$$ term). This is why the National Grid uses very high voltages.\n\n$$P_{loss} = I^2R$$ — the squared dependence on current makes voltage step-up incredibly effective at reducing losses.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "What are the four main sources of energy loss in a real transformer, and how is each one reduced? (4 steps)", "answer": "- Step 1: **Resistive (copper) losses:** Current flowing through the copper windings encounters resistance, producing heat ($$I^2R$$). Reduced by using thick, low-resistance copper wire.\n- Step 2: **Eddy currents in the iron core:** The changing magnetic field induces circulating currents within the conducting iron core itself, causing heating. Reduced by using a **laminated core** — the core is split into thin slices, electrically insulated from each other, which restricts the path of eddy currents.\n- Step 3: **Hysteresis losses:** The iron core is repeatedly magnetised and demagnetised each AC cycle. The energy used to realign magnetic domains is lost as heat. Reduced by using **soft iron** (which is easy to magnetise and demagnetise, minimising the hysteresis loop area).\n- Step 4: **Flux leakage:** Not all the magnetic flux from the primary coil passes through the secondary coil — some \"leaks\" out. Reduced by careful coil design (e.g., winding the secondary directly over the primary on the same core).\n\nReal transformers aren't 100% efficient, but good design can achieve >95% efficiency.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "Why is the iron core of a transformer laminated (split into thin insulated slices) rather than being one solid block? What would happen with a solid core? (3 steps)", "answer": "- Step 1: The iron core is a conductor sitting inside a changing magnetic field. By Faraday's Law, this changing field would induce **eddy currents** — circulating currents within the core itself.\n- Step 2: These eddy currents flow in loops within the core, dissipating energy as heat ($$I^2R$$ losses). With a solid block, the eddy currents can flow in large loops with low resistance, causing significant heating and energy waste.\n- Step 3: Laminating the core into thin, electrically insulated slices **breaks up the large loops** into many small loops. Each small loop has a much smaller area (so less EMF is induced) and higher resistance (so less current flows). The total eddy current loss is dramatically reduced.\n\nThink of it like a loaf of bread: the whole loaf conducts, but individual slices separated by air (insulation) restrict current flow between them.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "Why is soft iron used for the transformer core rather than steel (hard magnetic material)? What property of soft iron makes it ideal? (2 steps)", "answer": "- Step 1: **Soft iron** can be easily magnetised and demagnetised. When the AC current reverses, the core's magnetism must reverse too. Soft iron responds quickly to the changing field, with minimal energy lost in the process (small hysteresis loop).\n- Step 2: **Steel** (magnetically hard) retains its magnetism. It resists being demagnetised and re-magnetised each cycle, wasting energy as heat (large hysteresis loop). It would also not channel the changing flux efficiently between coils.\n\nSoft iron: easy to magnetise/demagnetise → efficient flux transfer, low hysteresis loss. Steel: retains magnetism → poor for transformers, good for permanent magnets.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "How can you change the direction of rotation of a DC motor without modifying its construction? How can you change its speed? (2 steps)", "answer": "- Step 1: **Change direction:** Reverse the polarity of the power supply (swap the battery connections). This reverses the current direction in the coil, which reverses the force direction (by Fleming's Left Hand Rule), causing the motor to rotate in the opposite direction. Alternatively, reverse the magnetic field direction (swap the magnets).\n- Step 2: **Change speed:** Increase the current (by increasing the voltage of the supply). Greater current means greater force ($$F = BIL$$), which means greater torque and faster rotation. Alternatively, increase the magnetic field strength (use stronger magnets).\n\nDirection: reverse current or reverse field. Speed: increase current or increase field strength.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "A wire carries current from left to right through a magnetic field directed into the page. Using Fleming's Left Hand Rule, what is the direction of the force on the wire? (3 steps)", "answer": "- Step 1: Point your **first finger** (Field) into the page.\n- Step 2: Point your **second finger** (Current) to the right.\n- Step 3: Your **thumb** (Force) points **upwards**. The force on the wire is directed upwards.\n\nForce is always perpendicular to both the field and the current — that's the geometry of the cross product.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "In a top-pan balance experiment, a magnet sits on the balance and a current-carrying wire passes between its poles. When the current is switched on, the balance reading increases by 161 g (force pushes down on the balance). By Newton's Third Law, what is the direction of the force on the wire, and why? (3 steps)", "answer": "- Step 1: The balance reading increases, meaning there is an additional downward force **on the magnet** (which sits on the balance). The magnet is being pushed down.\n- Step 2: By Newton's Third Law, the force on the wire is **equal and opposite** to the force on the magnet. If the magnet is pushed down, the wire is pushed **up**.\n- Step 3: This makes sense physically: the current-carrying wire experiences an upward force from the magnetic field (motor effect), and by Newton's Third Law, the magnet experiences an equal downward force. The balance detects this reaction force on the magnet.\n\nThe balance measures the force on the magnet, not the wire. Newton's Third Law connects the two: force on wire = opposite of force on magnet.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": true}, {"question": "A magnet is on a top-pan balance with a wire between its poles. The current in the wire is increased. What happens to the balance reading, and why? (2 steps)", "answer": "- Step 1: Increasing the current increases the force on the wire ($$F = BIL$$). By Newton's Third Law, the force on the magnet also increases.\n- Step 2: Since the magnet is pushed down harder, the balance reading **increases**. More current → more force → larger reading on the balance.\n\nThe balance reading is directly proportional to the current — this is actually how you can experimentally verify $$F = BIL$$.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "What is the difference between magnetically hard and magnetically soft materials? Give an example of each and state where each is used in electromagnetic devices. (2 steps)", "answer": "- Step 1: **Magnetically hard** materials retain their magnetism after the external field is removed (they make good permanent magnets). Example: steel. They are used for the permanent magnets in motors and generators.\n- Step 2: **Magnetically soft** materials are easily magnetised and demagnetised — they only show magnetic properties while in an external field. Example: soft iron. They are used for electromagnet cores (in transformers, relays) because they respond quickly to changing fields with minimal energy loss.\n\nHard = permanent magnet (steel). Soft = temporary magnet / electromagnet core (soft iron). Transformers need soft iron; permanent magnets in motors need hard materials.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "When a bar magnet is pushed into a coil connected to a voltmeter, the voltmeter shows a reading. When the magnet is held still inside the coil, the reading drops to zero. When the magnet is pulled out, the reading shows the opposite sign. Explain each observation. (3 steps)", "answer": "- Step 1: **Pushing in:** The magnet's field lines cut through the coil, causing a changing flux ($$\\Delta\\Phi > 0$$). By Faraday's Law, an EMF is induced, and the voltmeter shows a reading. The direction of the induced EMF opposes the magnet's approach (Lenz's Law).\n- Step 2: **Held still:** No relative motion means no change in flux ($$\\Delta\\Phi = 0$$). No EMF is induced. The voltmeter reads zero. It doesn't matter that there IS flux — what matters is that the flux isn't CHANGING.\n- Step 3: **Pulling out:** The flux through the coil is now decreasing ($$\\Delta\\Phi < 0$$). An EMF is induced in the opposite direction (Lenz's Law says it must oppose the decrease, so it tries to maintain the flux). The voltmeter shows the opposite sign.\n\nMoving magnet → changing flux → induced EMF. Stationary magnet → constant flux → zero EMF. Reversed motion → reversed EMF direction.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "What three factors increase the magnitude of the induced EMF when a magnet moves through a coil? For each, explain the physical reason. (3 steps)", "answer": "- Step 1: **Move the magnet faster.** A faster magnet means the flux through the coil changes more rapidly — $$\\frac{\\Delta\\Phi}{\\Delta t}$$ increases. Faraday's Law says EMF is proportional to this rate of change, so faster motion = bigger EMF.\n- Step 2: **Add more turns to the coil ($$N$$).** Each turn experiences the same changing flux, and the EMFs in each turn add up. Flux linkage is $$N\\Phi$$, so more turns means a larger change in flux linkage for the same magnet motion.\n- Step 3: **Use a stronger magnet (larger $$B$$).** A stronger magnet produces denser field lines, so more flux passes through the coil for the same position. When the magnet moves, the change in flux is larger, inducing a bigger EMF.\n\nFaster motion, more turns, stronger magnet — all increase $$\\frac{\\Delta(N\\Phi)}{\\Delta t}$$, and therefore the induced EMF.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "Fleming's Left Hand Rule is used for motors and Fleming's Right Hand Rule is used for generators. Why do you need two different rules, and what's the physical difference in what each rule describes? (3 steps)", "answer": "- Step 1: **Left Hand Rule (Motor):** You know the current direction and field direction, and you want to find the **force** direction. This describes the *cause* (current in a field) producing the *effect* (force/motion). Energy conversion: electrical → mechanical.\n- Step 2: **Right Hand Rule (Generator):** You know the motion direction and field direction, and you want to find the **induced current** direction. This describes the *cause* (motion in a field) producing the *effect* (induced EMF/current). Energy conversion: mechanical → electrical.\n- Step 3: The two rules describe the same underlying physics (electromagnetic interaction) but from opposite perspectives. A motor and a generator are the same device — if you drive current through it, it's a motor (LHR); if you spin it, it's a generator (RHR). The handedness switches because you're solving for a different quantity.\n\nLeft = motor (given current, find force). Right = generator (given motion, find current). Same device, opposite energy flow direction.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "A coil with 200 turns and area 0.02 m² rotates at 50 Hz in a 0.5 T field. Without doing the full calculation, explain qualitatively how you would find the peak EMF and what its value would be proportional to. (3 steps)", "answer": "- Step 1: The peak EMF is given by $$\\varepsilon_{max} = BAN\\omega$$. First find angular frequency: $$\\omega = 2\\pi f = 2\\pi \\times 50 = 100\\pi$$ rad/s.\n- Step 2: The peak EMF is proportional to the product of all four quantities: $$B \\times A \\times N \\times \\omega$$. Increasing any one of them increases the peak EMF proportionally. Here: $$0.5 \\times 0.02 \\times 200 \\times 100\\pi = 200\\pi \\approx 628$$ V.\n- Step 3: The key insight: the peak EMF depends on how fast the flux is changing at its maximum rate. $$BAN$$ is the total flux linkage when the coil is perpendicular to the field, and $$\\omega$$ converts this into a rate of change (how fast the coil sweeps through that flux).\n\n$$\\varepsilon_{max} = BAN\\omega$$ — peak EMF equals the maximum flux linkage times the angular frequency.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "A step-down transformer has 4000 primary turns and 100 secondary turns. The primary voltage is 230 V and the primary current is 2 A. If the transformer is 95% efficient, how does the actual secondary current compare to the ideal secondary current? (3 steps)", "answer": "- Step 1: **Ideal case** (100% efficient): $$V_s = V_p \\times \\frac{N_s}{N_p} = 230 \\times \\frac{100}{4000} = 5.75$$ V. Then $$I_s = \\frac{V_p I_p}{V_s} = \\frac{230 \\times 2}{5.75} = 80$$ A.\n- Step 2: **Real case** (95% efficient): $$P_{out} = 0.95 \\times P_{in} = 0.95 \\times 230 \\times 2 = 437$$ W. So $$I_s = \\frac{P_{out}}{V_s} = \\frac{437}{5.75} = 76$$ A.\n- Step 3: The actual secondary current (76 A) is **less** than the ideal (80 A) because 5% of the input power is lost as heat in the transformer. The voltage ratio still holds (determined by turns), but the current is reduced by the efficiency factor.\n\nEfficiency affects current, not voltage. The turns ratio still determines the voltage, but less power reaches the secondary, so the current is lower than ideal.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}, {"question": "A student says: \"A step-down transformer reduces voltage, so it also reduces current — both go down.\" Is this correct? Explain why or why not using the power equation. (3 steps)", "answer": "- Step 1: This is **incorrect**. A step-down transformer reduces voltage but **increases** current (assuming approximately constant power).\n- Step 2: From the power equation: $$V_p I_p = V_s I_s$$. If $$V_s < V_p$$ (step-down), then $$I_s > I_p$$ to maintain the equality. The current goes **up** as voltage goes down.\n- Step 3: Physically, the same amount of power is being transferred (minus small losses). If you deliver it at a lower voltage, you need more current to carry the same power. Think of it like a waterfall: a thin, fast stream (high V, low I) vs. a wide, slow river (low V, high I) — both can carry the same flow rate.\n\nStep-down: voltage decreases, current increases. Step-up: voltage increases, current decreases. Power is approximately conserved.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": true}, {"question": "Without doing any calculation, explain why a proton and an electron moving at the same speed in the same magnetic field will curve in opposite directions but with different radii. (3 steps)", "answer": "- Step 1: They curve in **opposite directions** because they have opposite charges. The proton (positive) has conventional current in the same direction as its velocity; the electron (negative) has conventional current opposite to its velocity. By Fleming's Left Hand Rule, the force direction reverses.\n- Step 2: They have **different radii** because the radius depends on mass: $$r = \\frac{mv}{BQ}$$. The proton is about 1836 times heavier than the electron, so at the same speed, the proton's radius is about 1836 times larger.\n- Step 3: The proton's much larger radius means it barely curves, while the electron curves very tightly. This is the principle behind mass spectrometers — particles of different mass-to-charge ratios curve differently and can be separated.\n\nSame speed, same field: opposite curvature direction (opposite charge), vastly different curvature radius (different mass).", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "A charged particle moves at 30° to a magnetic field. Is the force on it half the maximum force, more than half, or less than half? Explain without calculating. (2 steps)", "answer": "- Step 1: The force is $$F = BQv\\sin\\theta$$. At $$\\theta = 30°$$, $$\\sin 30° = 0.5$$, so the force is exactly **half** the maximum force (which occurs at $$\\theta = 90°$$ where $$\\sin 90° = 1$$).\n- Step 2: The sine function is linear near 30° — $$\\sin 30° = 0.5$$ exactly. So the force is precisely half the maximum. If the angle were 45° instead, $$\\sin 45° \\approx 0.707$$, and the force would be about 70.7% of maximum — more than half.\n\nAt 30°, the force is exactly half the maximum because $$\\sin 30° = 0.5$$. The relationship is sinusoidal, not linear with the angle.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": true}, {"question": "Can a magnetic field ever speed up or slow down a charged particle? Why or why not? What can it do instead? (2 steps)", "answer": "- Step 1: **No.** The magnetic force on a charged particle is always **perpendicular to its velocity**. A force perpendicular to motion does no work ($$W = F \\cdot d\\cos 90° = 0$$), so it cannot change the particle's kinetic energy or speed.\n- Step 2: Instead, the magnetic force changes the particle's **direction** — it deflects the particle, causing it to follow a curved (circular) path. The speed stays constant; only the velocity's direction changes.\n\nMagnetic fields deflect, not accelerate. They change direction, not speed. This is fundamentally different from electric fields, which CAN change a particle's speed.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "A simple exercise: A wire of length 2 m carries a current of 5 A perpendicular to a magnetic field of flux density 0.3 T. What is the force on the wire? (2 steps)", "answer": "- Step 1: Since the wire is perpendicular to the field, $$\\theta = 90°$$ and $$\\sin\\theta = 1$$. Use $$F = BIL$$.\n- Step 2: $$F = 0.3 \\times 5 \\times 2 = 3$$ N. The force is 3 newtons, directed perpendicular to both the wire and the field (use Fleming's Left Hand Rule for the exact direction).\n\n$$F = BIL = 0.3 \\times 5 \\times 2 = 3$$ N. Simple multiplication when the wire is perpendicular to the field.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "A simple exercise: A transformer has 50 turns on the primary and 200 turns on the secondary. If the primary voltage is 10 V, what is the secondary voltage? Is this a step-up or step-down transformer? (2 steps)", "answer": "- Step 1: Using $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$: $$\\frac{10}{V_s} = \\frac{50}{200} = \\frac{1}{4}$$. So $$V_s = 10 \\times 4 = 40$$ V.\n- Step 2: Since the secondary voltage (40 V) is greater than the primary voltage (10 V), and the secondary has more turns than the primary, this is a **step-up** transformer. It steps voltage up by a factor of 4, and (assuming ideal efficiency) steps current down by a factor of 4.\n\n$$V_s = 40$$ V. Step-up transformer: more secondary turns → higher voltage → lower current.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "A simple exercise: A coil of 100 turns with area 0.01 m² is in a 0.2 T field. The coil is rotated from perpendicular to the field to parallel to the field in 0.1 s. What is the average EMF induced? (3 steps)", "answer": "- Step 1: Initial flux linkage (perpendicular, $$\\theta = 0°$$): $$N\\Phi = BAN = 0.2 \\times 0.01 \\times 100 = 0.2$$ Wb turns. Final flux linkage (parallel, $$\\theta = 90°$$): $$N\\Phi = 0$$ (since $$\\cos 90° = 0$$).\n- Step 2: Change in flux linkage: $$\\Delta(N\\Phi) = 0 - 0.2 = -0.2$$ Wb turns. The magnitude is 0.2 Wb turns.\n- Step 3: Average EMF: $$\\varepsilon = \\frac{\\Delta(N\\Phi)}{\\Delta t} = \\frac{0.2}{0.1} = 2$$ V. The magnitude of the average EMF is 2 V.\n\n$$\\varepsilon = \\frac{0.2}{0.1} = 2$$ V. The key is recognising that perpendicular-to-parallel rotation changes flux linkage from maximum to zero.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "What does the \"motor effect\" refer to, and how does it differ from \"electromagnetic induction\"? Are they related or completely separate phenomena? (3 steps)", "answer": "- Step 1: The **motor effect** is when a current-carrying conductor in a magnetic field experiences a **force**. You put electrical energy in (current), and get mechanical energy out (force → motion). This is the basis of electric motors.\n- Step 2: **Electromagnetic induction** is when a changing magnetic flux through a circuit induces an **EMF** (and current if the circuit is complete). You put mechanical energy in (motion changing the flux), and get electrical energy out. This is the basis of generators.\n- Step 3: They are **two sides of the same coin** — both arise from the interaction of electricity and magnetism. In fact, a motor and a generator are the same device: apply current → it spins (motor); spin it → it generates current (generator). The motor effect and induction are complementary descriptions of electromagnetic interaction.\n\nMotor effect: current + field → force. Induction: changing flux → EMF. Same physics, different perspectives.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": true}, {"question": "A student says: \"When a magnet is pushed into a coil, the induced current creates a field that attracts the magnet, helping it move in.\" Explain why this violates physics and what actually happens. (3 steps)", "answer": "- Step 1: If the induced current helped the magnet move in, the magnet would accelerate on its own — gaining kinetic energy from nothing. This violates conservation of energy. You'd have a perpetual motion machine.\n- Step 2: Lenz's Law ensures this can't happen. The induced current creates a field that **repels** the approaching magnet (a north pole approaching induces a north pole on the coil face). You must **push against** this repulsion, doing work.\n- Step 3: The work you do pushing the magnet against the repulsive force is converted into electrical energy in the coil. Energy is conserved: mechanical work in = electrical energy out (plus any losses).\n\nAttraction would mean free energy — impossible. Repulsion means you must do work — energy is conserved. Lenz's Law is nature's way of enforcing the First Law of Thermodynamics.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": true}, {"question": "In a DC motor, the commutator reverses the current every half-turn. Why is this necessary for continuous rotation? What would the force do without it? (3 steps)", "answer": "- Step 1: In a magnetic field, the force on a current-carrying conductor depends on the current direction. For the first half-turn, the forces on opposite sides of the coil create a torque that rotates the coil.\n- Step 2: After half a turn, the sides of the coil have swapped positions. Without the commutator reversing the current, the same current would now flow through the \"wrong\" side — the force would push the coil **back** the way it came, trying to reverse the rotation.\n- Step 3: The commutator reverses the current at exactly this moment, so the force continues to push in the **same rotational direction**. This ensures continuous one-directional rotation rather than oscillation.\n\nWithout the commutator: forward push → backward push → oscillation → stop. With it: forward push → current reverses → forward push again → continuous rotation.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "What three things can you do to make an electromagnet stronger? Explain the physical reason each one works. (3 steps)", "answer": "- Step 1: **Increase the current.** A larger current creates a stronger magnetic field around the wire (the field strength is proportional to current). More current → more intense field.\n- Step 2: **Increase the number of coil turns.** Each turn contributes its own magnetic field, and the fields from all turns add up inside the solenoid. More turns = more field contributions = stronger total field.\n- Step 3: **Add a soft iron core.** Iron is easily magnetised — the coil's field magnetises the iron, and the iron's own magnetic field adds to the coil's field, dramatically amplifying it. The iron acts as a field multiplier, channelling and concentrating the magnetic flux.\n\nMore current, more turns, iron core — all increase the magnetic field strength of the electromagnet.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": false}, {"question": "Explain the causal chain in a transformer: does changing current create a changing magnetic field, or does a changing magnetic field create a changing current? Which comes first in the primary coil, and which comes first in the secondary coil? (3 steps)", "answer": "- Step 1: In the **primary coil**, the AC voltage drives the alternating current first. This alternating current then creates the changing magnetic field. So: voltage → current → magnetic field.\n- Step 2: In the **secondary coil**, the changing magnetic field (from the primary, channelled through the core) causes a changing flux linkage. This changing flux linkage induces an alternating voltage (Faraday's Law). If the circuit is complete, this voltage drives an alternating current. So: magnetic field → flux change → induced voltage → current.\n- Step 3: The full chain: Primary voltage → primary current → changing magnetic field → changing flux linkage in secondary → induced secondary voltage → secondary current. The primary is \"driven\" electrically; the secondary is \"driven\" magnetically.\n\nPrimary: electrical → magnetic. Secondary: magnetic → electrical. The iron core is the bridge between the two.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "A student claims: \"If you double the number of turns on the secondary coil of a transformer, you double both the voltage and the power output.\" Is this correct? Explain. (3 steps)", "answer": "- Step 1: **Voltage does double.** The turns ratio equation $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$ means doubling $$N_s$$ doubles $$V_s$$ (for fixed primary voltage and turns).\n- Step 2: **Power does NOT double.** Power is approximately conserved ($$V_p I_p \\approx V_s I_s$$). If voltage doubles, the current in the secondary must **halve** to maintain the same power. The total power output stays roughly the same as the power input.\n- Step 3: The transformer doesn't create energy — it transforms voltage and current while (approximately) conserving power. You can't get more power out than you put in. Doubling turns doubles voltage but halves current; power stays the same.\n\nMore turns = more voltage but less current. Power is conserved, not multiplied. The transformer is an energy converter, not an energy source.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "A simple exercise: An electron moves at $$1 \\times 10^6$$ m/s perpendicular to a 0.01 T magnetic field. The electron charge is $$1.6 \\times 10^{-19}$$ C and mass is $$9.1 \\times 10^{-31}$$ kg. What is the radius of the circular path? (3 steps)", "answer": "- Step 1: Set the magnetic force equal to the centripetal force: $$BQv = \\frac{mv^2}{r}$$, so $$r = \\frac{mv}{BQ}$$.\n- Step 2: Substitute: $$r = \\frac{9.1 \\times 10^{-31} \\times 1 \\times 10^6}{0.01 \\times 1.6 \\times 10^{-19}} = \\frac{9.1 \\times 10^{-25}}{1.6 \\times 10^{-21}}$$.\n- Step 3: $$r = \\frac{9.1}{1.6} \\times 10^{-4} \\approx 5.7 \\times 10^{-4}$$ m ≈ 0.57 mm. The electron curves very tightly — less than a millimetre radius.\n\n$$r = \\frac{mv}{BQ} \\approx 0.57$$ mm. Electrons are so light they curve very tightly even in modest fields.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}, {"question": "In the National Grid, a step-up transformer increases voltage from ~25 kV at the power station to ~400 kV for transmission. Near homes, a step-down transformer reduces this to ~230 V. Why are two transformers needed rather than just one? (2 steps)", "answer": "- Step 1: The step-up transformer is needed at the power station end to **reduce transmission losses**. By increasing voltage to 400 kV, the current is dramatically reduced, minimising $$I^2R$$ heating in the long-distance cables.\n- Step 2: The step-down transformer is needed at the consumer end for **safety and usability**. 400 kV would be lethal in homes — it would arc through air and destroy appliances. 230 V is safe enough for domestic use while still being practical for powering devices.\n\nStep-up: efficiency (reduce losses in long cables). Step-down: safety (make voltage usable and non-lethal). Both are essential.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": true}, {"question": "What is the relationship between the graph of magnetic flux linkage vs. time and the graph of induced EMF vs. time for a rotating coil? How can you obtain one from the other? (3 steps)", "answer": "- Step 1: The flux linkage varies as $$N\\Phi = BAN\\cos(\\omega t)$$ — a cosine wave. The induced EMF is $$\\varepsilon = -\\frac{d(N\\Phi)}{dt} = BAN\\omega\\sin(\\omega t)$$ — a sine wave.\n- Step 2: The EMF graph is the **negative gradient** of the flux linkage graph. Where the flux graph has zero gradient (peaks and troughs), the EMF is zero. Where the flux graph is steepest (crossing zero), the EMF is at its peak.\n- Step 3: The EMF curve is the flux curve shifted by 90° (a cosine differentiated gives a sine, with a negative sign from Lenz's Law). They are a quarter-cycle out of phase: when flux peaks, EMF is zero, and vice versa.\n\nEMF = negative gradient of flux linkage. Flux peaks → EMF zero; Flux crosses zero → EMF peaks. They're 90° out of phase.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": true}], "count": 56}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "What is the difference between magnetic flux density ($$B$$), magnetic flux ($$\\Phi$$), and magnetic flux linkage ($$N\\Phi$$)? Which one is a property of the field alone, which adds the area, and which adds the coil structure? (4 steps)", "answer": "- Step 1: **Magnetic flux density** $$B$$ is a property of the field itself — it tells you how strong the field is at a point (how densely packed the field lines are). Measured in Tesla (T). Think of it as \"field intensity.\"\n- Step 2: **Magnetic flux** $$\\Phi = BA\\cos\\theta$$ tells you how much of that field *passes through a given area*. It combines the field strength with the area you're looking at. Measured in Webers (Wb). Think of it as \"how many field lines thread through this loop.\"\n+ Maximum when field is perpendicular to the area ($$\\theta = 0°$$, $$\\cos\\theta = 1$$)\n+ Zero when field is parallel to the area ($$\\theta = 90°$$, $$\\cos\\theta = 0$$)\n- Step 3: **Magnetic flux linkage** $$N\\Phi = BAN\\cos\\theta$$ extends flux to a *coil of N turns*. Each turn captures the same flux, so you multiply by N. Measured in Weber-turns. This is the quantity that actually matters for induction — a coil with more turns \"catches\" more of the changing flux.\n- Step 4: The hierarchy: $$B$$ (field property) → $$\\Phi$$ (field + area) → $$N\\Phi$$ (field + area + coil turns). Each step adds information about the physical setup, and the last one is what Faraday's Law uses.\n\nThink of it as: B is the rain intensity, Φ is how much rain falls on your window, and NΦ is how much rain falls on all N windows of your house.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "In the formula $$\\Phi = BA\\cos\\theta$$, what exactly does the angle $$\\theta$$ measure? A common mistake is to use the angle between the field and the *plane* of the coil — why is that wrong, and what should you use instead? (3 steps)", "answer": "- Step 1: $$\\theta$$ is defined as the angle between the **magnetic field lines** and the **normal** (perpendicular) to the plane of the area — not the angle between the field and the plane itself.\n- Step 2: If you use the angle between the field and the plane (call it $$\\alpha$$), then you'd need $$\\Phi = BA\\sin\\alpha$$ instead, because $$\\alpha = 90° - \\theta$$ and $$\\cos\\theta = \\sin\\alpha$$. Using $$\\cos\\theta$$ with the wrong angle gives you the wrong answer.\n+ When field is perpendicular to the coil face: $$\\theta = 0°$$, $$\\cos\\theta = 1$$, flux is maximum ✓\n+ When field is parallel to the coil face: $$\\theta = 90°$$, $$\\cos\\theta = 0$$, flux is zero ✓\n- Step 3: The practical tip: always draw the **normal line** (perpendicular to the coil's plane) first, then measure the angle between that normal and the field direction. This avoids the cosine/sine confusion entirely.\n\nThe key trap: exam questions sometimes give you the angle to the plane (not the normal). If they say \"the coil is tilted 30° from the field,\" check carefully — that might mean $$\\theta = 60°$$ if the 30° is measured from the plane.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "A wire carrying current sits in a magnetic field. What determines whether it experiences a force, and what is the formula? When would the force be zero? (3 steps)", "answer": "- Step 1: The force on a current-carrying conductor in a magnetic field is given by $$F = BIL\\sin\\theta$$, where $$B$$ is flux density, $$I$$ is current, $$L$$ is the length of wire *in the field*, and $$\\theta$$ is the angle between the wire and the field direction.\n- Step 2: The force is **maximum** when $$\\theta = 90°$$ (wire perpendicular to field), giving $$F = BIL$$. The force is **zero** when $$\\theta = 0°$$ (wire parallel to field), because $$\\sin 0° = 0$$.\n+ This makes physical sense: a current parallel to the field lines doesn't \"cut across\" any lines, so no force results.\n+ Only the component of current perpendicular to the field contributes to force.\n- Step 3: The force direction is always perpendicular to *both* the current and the field — found using Fleming's Left Hand Rule. The force is what makes the wire accelerate sideways, which is the basis of the motor effect.\n\nIf the wire is at 30° to the field, the force is half what it would be at 90° (since $$\\sin 30° = 0.5$$).", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "What is Fleming's Left Hand Rule, and which specific finger corresponds to which quantity? Why is it called the \"Left\" hand rule, and when do you use it? (3 steps)", "answer": "- Step 1: Fleming's Left Hand Rule gives the direction of force on a current-carrying conductor (or moving charge) in a magnetic field. Hold your left hand with thumb, first finger, and second finger all mutually perpendicular:\n+ **Thumb** = **M**otion / **F**orce direction\n+ **First finger** = **F**ield direction (magnetic field, N→S)\n+ **seCond finger** = **C**urrent direction (conventional current, +→−)\n- Step 2: It's the *left* hand because it applies to the **motor effect** — where current + field *produce* force. The right-hand rule is for generators (where motion + field *produce* current). Memory aid: **L**eft = motor (e**L**ectricity in), **R**ight = generator (e**R**gy in as motion).\n- Step 3: For a *negative* charge (like an electron), the second finger points in the *opposite* direction to the particle's motion, because conventional current is the flow of positive charge. An electron moving left is equivalent to conventional current flowing right.\n\nThe mnemonic \"FBI\" helps: **F**orce (thumb), **B**-field (first finger), **I**-current (second finger).", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "A charged particle moves through a magnetic field. What is the formula for the force on it, and why does this force cause circular motion rather than straight-line acceleration? (4 steps)", "answer": "- Step 1: The force on an isolated moving charged particle is $$F = BQv\\sin\\theta$$, where $$Q$$ is the charge, $$v$$ is the speed, and $$\\theta$$ is the angle between the velocity and the field. Maximum force when $$\\theta = 90°$$ (perpendicular entry).\n- Step 2: The crucial property: the magnetic force is **always perpendicular to the velocity**. This means it changes the *direction* of motion but never the *speed* — it does no work on the particle.\n- Step 3: A force that is always perpendicular to velocity and has constant magnitude is exactly the definition of **centripetal force**. So the particle follows a circular path, with $$BQv = \\frac{mv^2}{r}$$, giving radius $$r = \\frac{mv}{BQ}$$.\n+ Faster particles orbit in larger circles (more momentum to bend)\n+ Stronger fields or larger charges give tighter circles (more force to bend)\n- Step 4: This is why mass spectrometers work — particles of different mass/charge ratio follow different circular paths and can be separated. The direction of curvature (clockwise vs anticlockwise) tells you the sign of the charge.\n\nIf a particle enters parallel to the field ($$\\theta = 0$$), it experiences zero force and travels in a straight line — no bending at all.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Why must you point your second finger in the *opposite* direction to an electron's motion when using Fleming's Left Hand Rule? What would happen if you forgot? (3 steps)", "answer": "- Step 1: Fleming's Left Hand Rule uses **conventional current** — the direction positive charges would flow. An electron has negative charge, so the \"current\" it represents flows in the *opposite* direction to its physical motion.\n- Step 2: If an electron moves to the left, the equivalent conventional current flows to the right. Your second finger must point right (the current direction), not left (the electron's motion direction).\n- Step 3: If you forget and point your second finger in the electron's direction of motion, you'll get the **wrong force direction** — the thumb will point the opposite way to the true force. This would lead to predicting the electron curves the wrong way in a magnetic field, which is a critical error in mass spectrometry or particle physics problems.\n\nThe rule: for any negative charge (electron, negative ion), always reverse the second finger relative to the particle's velocity.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "What is electromagnetic induction? State the two ways it can occur, and explain why a *stationary* magnet inside a coil produces no induced voltage. (3 steps)", "answer": "- Step 1: Electromagnetic induction is the process by which an EMF (voltage) is induced in a circuit due to a **change in magnetic flux linkage**. If the circuit is complete, the induced EMF drives a current.\n- Step 2: It can occur in two ways:\n+ A conductor **moves through** a magnetic field (cutting field lines) — this is the generator principle\n+ The magnetic flux through a **stationary coil changes** (field gets stronger/weaker, or coil rotates) — this is the transformer principle\n- Step 3: A stationary magnet inside a coil produces zero EMF because there is **no change in flux linkage**. The flux is constant (non-zero, but not changing), so $$\\frac{\\Delta(N\\Phi)}{\\Delta t} = 0$$. It's the *rate of change* that matters, not the amount of flux itself. This is Faraday's Law in action.\n\nThink of it like a tap: a bucket under a running tap fills up (changing water level = changing flux = induced EMF). A bucket sitting in still water has water in it, but the level isn't changing (constant flux = no EMF).", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "State Faraday's Law in words and as an equation. What does the negative sign mean, and when can you ignore it in calculations? (3 steps)", "answer": "- Step 1: **Faraday's Law**: The magnitude of the induced EMF is directly proportional to the rate of change of magnetic flux linkage. As an equation: $$\\varepsilon = -\\frac{\\Delta(N\\Phi)}{\\Delta t}$$ (or $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$ in calculus form).\n- Step 2: The **negative sign** represents **Lenz's Law** — the induced EMF is set up in a direction that *opposes* the change causing it. If the flux is increasing, the induced EMF acts to reduce it; if the flux is decreasing, the induced EMF acts to maintain it.\n- Step 3: When a question asks for the **magnitude** of the EMF, you can drop the negative sign and just calculate $$\\varepsilon = \\frac{\\Delta(N\\Phi)}{\\Delta t}$$. But you may be asked to *explain* the significance of the negative sign — in that case, you must reference Lenz's Law and the opposing direction.\n\nThe negative sign is not just a mathematical convention — it reflects conservation of energy. If the induced current *helped* the change instead of opposing it, you'd get a self-reinforcing loop that creates energy from nothing.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "State Lenz's Law and explain why it is a consequence of conservation of energy, not just an arbitrary rule about directions. (3 steps)", "answer": "- Step 1: **Lenz's Law**: The induced EMF (and resulting current) is always in a direction that produces effects **opposing the change** that caused it.\n- Step 2: If Lenz's Law didn't hold — if the induced current *reinforced* the change — you'd have a self-amplifying loop: a small change in flux would induce a current that increases the flux change, which induces more current, and so on, creating infinite energy from a small initial perturbation. This violates conservation of energy.\n- Step 3: The opposing force from Lenz's Law means you must do **work** to keep changing the flux (e.g., keep pushing a magnet into a coil against the repulsive force). The energy you put in as mechanical work is exactly the electrical energy you get out. This is why generators require a driving force — you can't get electricity for free.\n\nPractical example: pushing a magnet into a coil, the coil creates a north pole that repels your magnet. You have to push harder (do work) to keep it moving. That work becomes the electrical energy in the circuit.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "A bar magnet is pushed N-pole-first into a coil. Using Lenz's Law, what pole does the coil face create, and which way does the induced current flow? (3 steps)", "answer": "- Step 1: The magnet's north pole is approaching the coil. By Lenz's Law, the coil must oppose this approach — so it creates a **north pole** on the face nearest the magnet, to repel the incoming north pole.\n- Step 2: To determine the current direction, use the **right-hand grip rule**: curl your fingers in the direction of current flow around the coil, and your thumb points from south to north (along the field lines inside the coil). Since the near face must be north, your thumb points toward the incoming magnet.\n- Step 3: Your curled fingers (looking at the coil from the magnet's perspective) show the current flows **anticlockwise** — this creates a north pole facing the magnet, which repels it.\n\nWhen the magnet is pulled *out* of the coil, the opposite happens: the coil creates a south pole to *attract* the retreating magnet (opposing the change = opposing the decrease in flux). The current reverses direction.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "A coil rotates in a uniform magnetic field. When is the flux linkage maximum, and when is the induced EMF maximum? Why are these NOT at the same time? (4 steps)", "answer": "- Step 1: When the coil is **perpendicular** to the field (field lines pass straight through the coil face), the flux linkage is **maximum**: $$N\\Phi = BAN$$.\n- Step 2: When the coil is **parallel** to the field (field lines skim across the coil face without passing through), the flux linkage is **zero**.\n- Step 3: The induced EMF depends on the **rate of change** of flux linkage, not the flux linkage itself. At the point of maximum flux (perpendicular position), the flux is at a turning point — it's momentarily not changing (like the top of a sine wave), so $$\\frac{d\\Phi}{dt} = 0$$ and EMF is zero.\n- Step 4: At the point of zero flux (parallel position), the flux is changing most rapidly (the coil is cutting through field lines at maximum rate), so $$\\frac{d\\Phi}{dt}$$ is maximum and EMF is maximum.\n\nThis is the #1 exam trap: maximum flux ≠ maximum EMF. They are 90° out of phase. If flux goes as $$\\cos\\omega t$$, then EMF goes as $$\\sin\\omega t$$ (the derivative).", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "For an AC generator (alternator), the induced EMF is $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$. Where does this formula come from, and what does each term represent? (4 steps)", "answer": "- Step 1: Start with flux linkage. If the coil rotates at angular frequency $$\\omega$$, the angle between the field and the normal to the coil is $$\\theta = \\omega t$$. So flux linkage is $$N\\Phi = BAN\\cos(\\omega t)$$.\n- Step 2: By Faraday's Law, the induced EMF is the *rate of change* of flux linkage: $$\\varepsilon = -\\frac{d}{dt}[BAN\\cos(\\omega t)]$$.\n- Step 3: Differentiating: $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$. (Dropping the negative sign for magnitude.)\n+ $$B$$ = magnetic flux density (stronger field → more flux → more EMF)\n+ $$A$$ = coil area (bigger coil → more flux captured)\n+ $$N$$ = number of turns (more turns → more flux linkage)\n+ $$\\omega$$ = angular frequency (faster rotation → faster change → more EMF)\n- Step 4: The **peak EMF** is $$\\varepsilon_{max} = BAN\\omega$$
