<script>
const DATA={"selected": [{"question": "A wire carries current left-to-right between the poles of a magnet on a balance. The balance reads a positive (downward) value. Using Fleming's Left Hand Rule and Newton's Third Law, determine the direction of the magnetic field. (4 steps)", "answer": "- Step 1: The balance reads positive → the magnet is pushed **downward** → by Newton's Third Law, the force on the **wire** is **upward**.\n- Step 2: Apply Fleming's Left Hand Rule:\n+ Thumb = Force on wire = **upward**\n+ Second finger = Current = **left to right**\n- Step 3: Orient your left hand: thumb up, second finger pointing right. Your first finger must point **into the page/screen**.\n- Step 4: Therefore, the magnetic field direction is **into the page**. This means the magnet's north pole is behind the wire and south pole is in front (field goes from N to S, into the page).\n\nThis question combines two concepts (Newton's Third Law + Fleming's Left Hand Rule) — a classic exam pattern that tests whether you truly understand both, not just one.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "Walk through the five-stage causal chain of how a transformer transfers energy, in the exact order required at A-level. (5 steps)", "answer": "- Step 1: An **alternating input voltage** is applied across the primary coil. (Must be AC; DC produces no output.)\n- Step 2: This drives an **alternating current** in the primary coil — electrons oscillate back and forth rather than flowing steadily.\n- Step 3: The alternating current produces an **alternating (changing) magnetic field** around the primary coil / inside the iron core.\n- Step 4: The iron core channels this changing magnetic field to the secondary coil, producing a **changing magnetic flux linkage** in the secondary.\n- Step 5: By Faraday's law, the changing flux linkage **induces an alternating EMF** in the secondary. If the secondary forms a complete circuit, this drives an alternating current in the load — at the same frequency as the input.\n\nKey phrase: no electrical connection between the coils — energy transfers purely via the magnetic field in the core.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "Why is the induced EMF in a rotating coil sinusoidal, and what determines its amplitude and frequency? (3 steps)", "answer": "- Step 1: A coil rotating at angular frequency $$\\omega$$ has flux linkage $$N\\Phi(t) = BAN\\cos(\\omega t)$$ — the geometric projection of the field onto the coil's normal traces out a cosine as the coil turns.\n- Step 2: Taking the rate of change: $$\\varepsilon = -d(N\\Phi)/dt = BAN\\omega\\sin(\\omega t)$$. So the EMF is a sine wave.\n- Step 3: Amplitude $$\\varepsilon_{\\max} = BAN\\omega$$ scales with:\n+ $$B$$ (stronger field → more flux swept)\n+ $$A$$ (bigger coil → more area)\n+ $$N$$ (more turns → each contributes)\n+ $$\\omega$$ (faster rotation → higher rate of change)\n\nFrequency of the AC output equals the rotation frequency of the coil.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "For a coil rotating in a uniform B-field, at what orientation is the induced EMF maximum, and why is this counterintuitive? (3 steps)", "answer": "- Step 1: EMF is maximum when the coil's plane is *parallel* to the field (field lies in the plane of the coil), i.e. when the flux linkage is *zero*.\n- Step 2: Counterintuitive: naively you'd think max flux = max EMF. But Faraday's law says EMF depends on $$d\\Phi/dt$$, not $$\\Phi$$. When flux is at its peak (coil ⊥ field), the flux is momentarily *stationary* — think of $$\\sin$$ at its peak, where the gradient is zero.\n- Step 3: When flux is passing through zero (coil ∥ field), the flux is changing fastest — like $$\\sin$$ crossing zero with maximum gradient. So the coil \"cuts field lines\" fastest at this orientation, producing maximum EMF.\n\nTakeaway: EMF peaks where flux crosses zero; EMF is zero where flux peaks. They're 90° out of phase (one is the derivative of the other).", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "Why is magnetic flux Φ = BA cos θ maximum when θ = 0°, and what does θ represent? (3 steps)", "answer": "- Step 1: θ is the angle between the magnetic field **and the normal** to the coil's area (not the plane). At θ = 0°, field lines are perpendicular to the area (aligned with the normal).  \n- Step 2: cos θ reaches its maximum value (1) at θ = 0°, making Φ = BA × 1 = BA. This means the maximum number of field lines pass through the area.  \n- Step 3: At θ = 90°, cos θ = 0 (field parallel to the plane), so Φ = 0. **Misconception probe**: θ is NOT the angle between the field and the coil's surface!  \n\n[Optional takeaway]: Always draw the normal to visualize θ correctly.", "source": "Qwen 3 ②", "_id": "qwen_2_0"}, {"question": "For a moving charge in a magnetic field, does the magnetic force do any work on the charge? What's the consequence? (2 steps)", "answer": "- Step 1: No — the magnetic force is always perpendicular to the velocity ($$F = Qv \\times B$$). Work is $$W = F \\cdot d$$, and if $$F \\perp v$$, then $$F \\perp d$$, giving $$W = 0$$.\n- Step 2: Consequence: the charge's *kinetic energy* — and hence its speed — is conserved. Only the *direction* of motion changes. This is why charged particles in a uniform B-field move in circles at constant speed, and why magnetic fields can't be used to accelerate particles to higher energies (that requires electric fields).\n\nTakeaway: magnetic fields steer charges but don't speed them up.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Why does reversing the battery in a DC motor reverse the direction of rotation? (3 steps)", "answer": "- Step 1: Fleming’s Left-Hand Rule: Current direction determines force direction (thumb = motion).  \n- Step 2: Reversing battery polarity flips conventional current ⇒ force direction reverses ⇒ torque direction flips.  \n- Step 3: Commutator ensures torque remains unidirectional during rotation. With reversed current, net rotation direction flips.  \n\n+ Practical note: Permanent-magnet motors reverse direction with current; electromagnet-based motors may require field reversal too.  \n\n**Takeaway:** Current reversal alters Lorentz force direction, flipping motor rotation.", "source": "Qwen 3 ①", "_id": "qwen_1_7"}, {"question": "What is the relationship between the graph of magnetic flux linkage vs. time and the graph of induced EMF vs. time for a rotating coil? How can you obtain one from the other? (3 steps)", "answer": "- Step 1: The flux linkage varies as $$N\\Phi = BAN\\cos(\\omega t)$$ — a cosine wave. The induced EMF is $$\\varepsilon = -\\frac{d(N\\Phi)}{dt} = BAN\\omega\\sin(\\omega t)$$ — a sine wave.\n- Step 2: The EMF graph is the **negative gradient** of the flux linkage graph. Where the flux graph has zero gradient (peaks and troughs), the EMF is zero. Where the flux graph is steepest (crossing zero), the EMF is at its peak.\n- Step 3: The EMF curve is the flux curve shifted by 90° (a cosine differentiated gives a sine, with a negative sign from Lenz's Law). They are a quarter-cycle out of phase: when flux peaks, EMF is zero, and vice versa.\n\nEMF = negative gradient of flux linkage. Flux peaks → EMF zero; Flux crosses zero → EMF peaks. They're 90° out of phase.", "source": "GLM 5.1 ①", "_id": "glm_1_55"}, {"question": "Give two ways in which the operation of a transformer differs when the primary carries DC vs AC, focusing on what happens right after switching on. (3 steps)", "answer": "- Step 1: **AC**: continuous alternating current → continuous alternating field → continuous changing flux → continuous induced EMF in secondary. Steady-state output with the same frequency as input.\n- Step 2: **DC switched on**: current rises rapidly from zero to steady-state → flux rises rapidly → brief non-zero $$d\\Phi/dt$$ → *momentary* induced EMF in secondary → then falls to zero as current stabilises.\n- Step 3: **DC switched off**: current collapses to zero → flux collapses → brief non-zero $$d\\Phi/dt$$ of opposite sign → momentary induced EMF in opposite direction.\n\nInsight: DC transformers give you two brief \"kicks\" (at switch-on and switch-off) and nothing in between — useless for continuous power transfer, which is why we use AC.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "Give a physical explanation for why a laminated iron core reduces eddy current losses more than a solid iron core, in terms of induced current paths. (3 steps)", "answer": "- Step 1: In a solid iron core, the changing magnetic flux induces circulating currents (eddy currents) throughout the entire cross-section. These loops can be large, spanning the width of the core.\n- Step 2: Power dissipated by eddy currents scales roughly as $$V^2/R$$ where $$V$$ is the induced EMF and $$R$$ is the resistance of the eddy loop. Larger loops → lower resistance → more power dissipated.\n- Step 3: Laminating breaks the core into thin insulated slices — the eddy currents are now forced into much smaller loops within each lamination.\n+ Smaller loop area → smaller induced EMF (less flux enclosed).\n+ Longer, thinner path → higher resistance.\n+ Result: dramatically less power dissipated as heat.\n\nAnalogy: like breaking a highway into narrow country lanes — traffic (current) can still flow, but much less efficiently.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "How does Fleming's *right*-hand rule differ from the left-hand rule, and when do you use each?", "answer": "Same hand geometry (three fingers mutually perpendicular; thumb = Motion, First finger = Field, seCond finger = Current) but using the *right* hand instead of the left. Use the left hand for the *motor effect*: you know the field and current, want to find the resulting force/motion. Use the right hand for the *generator effect*: you know the field and the direction the conductor is being moved, want to find the direction of the induced current. Memory hook: motoRs use Left (opposite letters), geneRators use Right (matching R's). A common mistake is using the same hand for both — always ask: am I *creating* motion from current (LH), or *creating* current from motion (RH)?", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "Why can't a step-up transformer be used to increase power? (3 steps)", "answer": "- Step 1: A transformer's fundamental principle is *energy conservation*: $$P_{out} \\leq P_{in}$$, with equality for ideal transformers. It cannot create energy from nothing.\n- Step 2: What a step-up transformer changes is the *ratio* of voltage to current, not their product. Increased voltage comes at the cost of decreased current: $$V_p I_p = V_s I_s$$.\n- Step 3: In fact, real transformers *lose* a small amount of power to heat and flux leakage, so $$P_{out} < P_{in}$$ strictly. You get more voltage but less current — total power stays the same (or slightly less).\n\nCommon misconception: \"step-up\" refers only to voltage, not power. Confusing the two is a classic exam trap.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "What is the difference between magnetically hard and magnetically soft materials? Give an example of each and state where each is used in electromagnetic devices. (2 steps)", "answer": "- Step 1: **Magnetically hard** materials retain their magnetism after the external field is removed (they make good permanent magnets). Example: steel. They are used for the permanent magnets in motors and generators.\n- Step 2: **Magnetically soft** materials are easily magnetised and demagnetised — they only show magnetic properties while in an external field. Example: soft iron. They are used for electromagnet cores (in transformers, relays) because they respond quickly to changing fields with minimal energy loss.\n\nHard = permanent magnet (steel). Soft = temporary magnet / electromagnet core (soft iron). Transformers need soft iron; permanent magnets in motors need hard materials.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "A stationary bar magnet sits *inside* a coil, right in the middle. The voltmeter reads what, and why?", "answer": "Zero. Faraday's law depends on the *rate of change* of flux linkage, not on the flux itself. Even though there is substantial flux threading the coil, $$d(N\\Phi)/dt = 0$$ because nothing is changing — the magnet isn't moving, the field is static. This is a classic trap: students see lots of flux and expect a reading. The takeaway is that flux and EMF are decoupled — only the *derivative* couples them.", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "A student says: \"A stationary wire in a magnetic field has no EMF induced because there's no force.\" Explain why this is wrong. (2 steps)", "answer": "- Step 1: The student is confusing the motor effect (force on current-carrying wire) with electromagnetic induction (EMF from motion).\n- Step 2: For induction, we need RELATIVE MOTION between wire and field - the wire must CUT through field lines. A stationary wire in a steady field has constant flux, so ΔΦ/Δt = 0, giving zero EMF. It's the motion that matters, not force.", "source": "MiniMax ①", "_id": "minimax_1_38"}, {"question": "Why can't transformers work with direct current (DC), but motors can work with either AC or DC? (2 steps)", "answer": "- Step 1: Transformers rely on electromagnetic induction, which requires a CHANGING magnetic flux. DC produces a steady magnetic field (no change) → no induced EMF in secondary → transformer doesn't work.\n- Step 2: Motors work on the motor principle (force on current-carrying conductor in magnetic field). Whether the current is DC or AC, as long as current flows, a force is produced. AC motors may need design modifications for AC, but the basic principle of force-generation works with any current direction.", "source": "MiniMax ②", "_id": "minimax_2_20"}, {"question": "What is the key physical difference between an alternator and a dynamo, and how does this difference produce AC vs DC? (3 steps)", "answer": "- Step 1: Both are rotating-coil generators — the coil spins between magnetic poles, inducing an EMF. The difference is only in the *connection* to the external circuit.\n- Step 2: An **alternator** uses **slip rings** — two continuous rings, each permanently connected to one end of the coil. As the coil flips over each half-turn, the current in the external circuit naturally reverses → AC output.\n- Step 3: A **dynamo** uses a **split-ring commutator** — one ring cut in half with a gap, so the brushes swap which end of the coil they contact every half-turn. This reversal *cancels* the coil's own reversal → the external current is always in the same direction → DC (bumpy, all-positive humps).\n\nKey insight: the *induced EMF inside the coil is the same in both* — it's the wiring that decides whether the outside world sees AC or DC.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "Why is the transformer core made of *iron*, and why is it *laminated*? (3 steps)", "answer": "- Step 1: Iron is used because it has high magnetic permeability — it channels magnetic field lines efficiently, dramatically strengthening the flux linkage between primary and secondary compared to an air core. \"Soft\" iron specifically is used because it magnetises and demagnetises easily, following the AC cycle without lagging.\n- Step 2: But iron is also an electrical conductor. A changing magnetic field through a bulk iron core induces circulating currents *inside the core itself* — eddy currents — which dissipate energy as heat ($$I^2R$$ losses).\n- Step 3: Laminating the core (thin slices with insulation between them) breaks up the conducting loops. Eddy currents can no longer circulate freely across the whole core, dramatically reducing power loss.\n\nAnalogy: laminations are like \"chopping the loaf of bread into slices\" and putting greaseproof paper between them.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "In the National Grid, why is electricity transmitted at very high voltage over long distances? What would happen if it were transmitted at low voltage and high current instead? (3 steps)", "answer": "- Step 1: The power transmitted is $$P = IV$$. For a fixed power, increasing voltage means decreasing current. The power station generates a roughly fixed amount of power.\n- Step 2: Energy lost as heat in the transmission cables is $$P_{loss} = I^2R$$. This depends on the **square** of the current — so even a modest reduction in current dramatically reduces energy loss. Doubling the voltage halves the current, which quarters the power loss.\n- Step 3: If transmitted at low voltage and high current, the $$I^2R$$ losses would be enormous — the cables would get very hot and most of the generated energy would be wasted. By stepping up to very high voltage (e.g., 250 kV in the UK), the current is kept very low, and transmission losses are minimised.\n\nHigh voltage = low current = low $$I^2R$$ losses. This is the entire point of the step-up transformer in the National Grid.", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "A student claims: \"If the magnetic flux through a coil is very large, the induced EMF must also be very large.\" Is this correct? Explain using Faraday's Law. (2 steps)", "answer": "- Step 1: This is incorrect. Faraday's Law states that the induced EMF depends on the RATE OF CHANGE of flux linkage, not on the flux itself: $$\\varepsilon = \\frac{\\Delta(N\\Phi)}{\\Delta t}$$.\n- Step 2: A very large but constant flux produces zero EMF (no change = no induction). A very small but rapidly changing flux can produce a large EMF. The key quantity is the gradient of the flux-time graph, not the height. This is the most important conceptual point in the entire electromagnetic induction topic.", "source": "GLM 5.1 ③", "_id": "glm_3_51"}, {"question": "In the electron-orbit-in-a-B-field picture, does the direction the electron circles depend on the sign of its charge? Explain. (3 steps)", "answer": "- Step 1: For a positive charge moving to the right in a B-field into the page, Fleming's LHR gives force upward → curves upward → circles anticlockwise.\n- Step 2: For an electron (negative), moving right in the same field: point second finger *opposite* to its motion (i.e. to the left, because it's negative). Now LHR gives force *downward* → curves downward → circles *clockwise*.\n- Step 3: So yes: positive and negative charges circle in *opposite* senses in the same field. This is exploited in mass spectrometers to separate particles by sign of charge.\n\nTakeaway: the sign of the charge sets the sense of the circle; the magnitude sets the radius.", "source": "Opus 4.7 ②", "_id": "opus_2_56"}, {"question": "Why must a transformer use AC and not DC? What would happen if you connected DC to the primary coil — would anything happen at all? (3 steps)", "answer": "- Step 1: A transformer requires a changing magnetic field to induce an EMF in the secondary coil. AC naturally provides this because the current continuously changes direction, creating a continuously changing magnetic field.\n- Step 2: With DC, the current is constant, so the magnetic field is constant, and there is no changing flux linkage in the secondary coil — therefore no induced EMF (no output). The transformer simply doesn't work with steady DC.\n- Step 3: However, at the MOMENT DC is switched on or off, there IS a brief change in flux (the field grows from zero or collapses to zero), so a momentary EMF is induced. But while the DC remains steadily on, the secondary coil produces nothing. This is why transformers are exclusively AC devices.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "For a coil spinning at 50 Hz in a magnetic field, at time $$t = 0.01$$ s the EMF is approximately zero. Why? (2 steps)", "answer": "- Step 1: Period at 50 Hz is $$T = 1/50 = 0.02$$ s. At $$t = 0.01$$ s, we're at exactly half a period → $$\\omega t = \\pi$$ → $$\\sin(\\omega t) = 0$$.\n- Step 2: At this moment, the coil has rotated 180° from its starting orientation. The flux linkage is momentarily at an extremum (max/min), so its rate of change is zero → EMF is zero. Equivalently, the coil is passing through the \"peak flux, flat gradient\" point of the cosine curve.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "What is the formula for the force on an isolated moving charged particle in a magnetic field? How does it differ from the force on a current-carrying conductor? (3 steps)", "answer": "- Step 1: The force on a moving charged particle is $$F = BQv\\sin\\theta$$, where $$B$$ is flux density (T), $$Q$$ is the charge (C), $$v$$ is the speed (m/s), and $$\\theta$$ is the angle between the velocity and the field.\n- Step 2: The key difference from $$F = BIL\\sin\\theta$$: the conductor formula uses current $$I$$ and length $$L$$ (because current is a flow of many charges through a wire), while the particle formula uses charge $$Q$$ and velocity $$v$$ (for a single moving charge). They're related because $$I = \\frac{Q}{t}$$ and $$L = v \\times t$$, so $$IL = Qv$$.\n- Step 3: Just like the conductor case, the force is maximum when the particle moves perpendicular to the field ($$\\theta = 90°$$) and zero when it moves parallel ($$\\theta = 0°$$). But crucially, the force is **always perpendicular to the velocity**, which means the magnetic force does no work and causes the particle to move in a **circle**.\n\n$$F = BIL\\sin\\theta$$ for wires; $$F = BQv\\sin\\theta$$ for single particles. Don't mix them up!", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "In a DC motor, what is the role of the commutator, and what would happen without it? (3 steps)", "answer": "- Step 1: The commutator is a **split ring** attached to the rotating coil. It reverses the direction of current in the coil every half-turn, just as each side of the coil passes through the vertical position.\n- Step 2: Without the commutator, the coil would rotate until it reached the vertical position (where the forces on each side create no net torque), and then it would stop — or worse, the same current direction would push it back the way it came, causing it to oscillate back and forth.\n- Step 3: The commutator ensures that the current always flows in the correct direction relative to the magnetic field so that the force on each side of the coil always pushes in the same rotational direction. This produces continuous **one-way rotation**.\n\nThe commutator is the key difference between a motor that spins continuously and one that just twitches and stops.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "What is the formula for the radius of circular motion of a charged particle in a magnetic field, and intuitively, why does each variable affect the radius the way it does? (3 steps)", "answer": "- Step 1: Equating the magnetic force to the centripetal force: $$BQv = \\frac{mv^2}{r}$$, which gives $$r = \\frac{mv}{BQ}$$.\n- Step 2: Understanding each variable:\n+ **More mass (m)** → more inertia, harder to bend → **larger radius** (straighter path)\n+ **More speed (v)** → more momentum, harder to deflect → **larger radius**\n+ **Stronger field (B)** → more force pushing inward → **smaller radius** (tighter curve)\n+ **More charge (Q)** → more force pushing inward → **smaller radius**\n- Step 3: The formula tells you that radius depends on the ratio of momentum ($$mv$$) to \"magnetic force per unit speed\" ($$BQ$$). High momentum resists bending; strong magnetic force assists bending.\n\nA particle moving twice as fast orbits in a circle twice the radius. A field twice as strong halves the radius.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "State Lenz's law and explain why it must be true from energy conservation. (3 steps)", "answer": "- Step 1: Lenz's law: the induced current flows in the direction such that its magnetic effect *opposes* the change in flux that caused it.\n- Step 2: Why must this be so? Imagine the opposite — an induced current that *aids* the incoming change. Then the induced field would attract the approaching magnet, accelerating it. That acceleration would increase the flux change, which would induce more current, which would accelerate the magnet more... you'd get unlimited kinetic + electrical energy from nothing.\n- Step 3: To conserve energy, the induced current must push back against whatever's causing the flux change. The mechanical work you do pushing the magnet in is what gets converted to electrical energy — you feel resistance because you're doing work against Lenz's law.\n\nTakeaway: the minus sign in Faraday's law isn't cosmetic — it's the mathematical face of energy conservation.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "A student says: \"The alternator must disconnect the circuit to make the current alternate direction.\" Is this correct? Explain what actually causes the current to alternate in an alternator. (2 steps)", "answer": "- Step 1: This is incorrect. The current alternates in an alternator because the coil sides reverse their direction of motion relative to the magnetic field every half turn — first moving upward through the field, then downward. This reverses the induced EMF naturally.\n- Step 2: The slip rings maintain a continuous electrical connection throughout. No disconnection is needed. It's the dynamo's commutator that involves a brief disconnection/reconnection — and that's to KEEP the current flowing in the same direction (rectification), not to make it alternate.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "Why does the induced EMF have a minus sign in Faraday's law, and when might you omit it in a calculation? (2 steps)", "answer": "- Step 1: The minus sign encodes Lenz's law — the induced EMF opposes the change in flux. Mathematically, if flux is increasing (positive $$d\\Phi/dt$$), EMF is negative (drives current the opposite way); if decreasing, EMF is positive.\n- Step 2: You can omit the sign when calculating just the *magnitude* of the induced EMF (which is often what exam questions ask for). But you must invoke it when:\n+ Determining the *direction* of induced current.\n+ Explaining energy conservation or the physical meaning of the sign.\n+ Interpreting a flux-vs-time graph (positive slope → negative EMF).\n\nExam tip: examiners often ask \"state the significance of the negative sign\" — answer: it represents Lenz's law / opposition to the change.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "If you double the frequency of rotation of a generator coil, what happens to both the frequency and the amplitude of the output EMF? Explain why. (3 steps)", "answer": "- Step 1: **Frequency doubles.** The EMF completes one full cycle per rotation of the coil. If the coil rotates twice as fast, it produces twice as many cycles per second.\n- Step 2: **Amplitude doubles.** The peak EMF is $$\\varepsilon_{max} = BAN\\omega$$. Since $$\\omega = 2\\pi f$$, doubling $$f$$ doubles $$\\omega$$, which doubles the peak EMF.\n- Step 3: Physically, spinning faster means the coil cuts through field lines at a greater rate. Faraday's Law says EMF is proportional to the rate of change of flux — faster rotation means faster change, means bigger EMF.\n\nDoubling rotation speed doubles both the frequency and the amplitude of the output. Both effects come from the same cause: faster flux change.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "Contrast a motor and a generator: what is the input, output, governing physical principle, and applicable Fleming's rule for each? (2 steps)", "answer": "- Step 1: **Motor**:\n+ Input: electrical energy (current + voltage).\n+ Output: mechanical energy (rotation, torque).\n+ Principle: force on a current-carrying conductor in a field ($$F=BIL$$).\n+ Rule: Fleming's **left**-hand rule.\n- Step 2: **Generator**:\n+ Input: mechanical energy (rotation).\n+ Output: electrical energy (EMF, current).\n+ Principle: EMF induced by changing flux (Faraday's law).\n+ Rule: Fleming's **right**-hand rule.\n\nDeep symmetry: motors and generators are the same device operated in reverse. A motor being spun mechanically will act as a generator — this is called back-EMF and is why motors draw less current at high speed.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "What would happen if you tried to use a transformer with the primary and secondary coils wound on completely separate cores (no iron core linking them)? (2 steps)", "answer": "- Step 1: Without the iron core, the magnetic flux from the primary would not be effectively channelled to the secondary.\n- Step 2: Most of the flux would leak away, so very little changing flux would link the secondary coil. The transformer would have extremely low efficiency and may not work at all.", "source": "MiniMax ①", "_id": "minimax_1_41"}, {"question": "Derive both transformer equations $$V_p/V_s = N_p/N_s$$ and $$I_pV_p = I_sV_s$$ conceptually, stating the assumptions. (3 steps)", "answer": "- Step 1: **Turns ratio**: assuming all flux from the primary links the secondary (no leakage), each turn of either coil experiences the same $$d\\Phi/dt$$. So $$V_p = N_p (d\\Phi/dt)$$ and $$V_s = N_s (d\\Phi/dt)$$. Dividing: $$V_p/V_s = N_p/N_s$$.\n- Step 2: **Power conservation**: assuming a 100%-efficient transformer, all electrical power in the primary is delivered to the secondary. Power = $$IV$$, so $$I_pV_p = I_sV_s$$.\n- Step 3: Combining the two: $$I_p/I_s = V_s/V_p = N_s/N_p$$ — the current ratio is the *inverse* of the turns ratio.\n\nAssumptions: 100% efficient (no resistive, eddy, hysteresis or leakage losses), all flux linked. Real transformers are ~95–99% efficient.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "Compare $$F = BIL\\sin\\theta$$ and $$F = BQv\\sin\\theta$$: what does each describe, and how are they related conceptually? (3 steps)", "answer": "- Step 1: $$F = BIL\\sin\\theta$$ is the force on a current-carrying *conductor* of length $$L$$ inside a field. It bundles many moving charges into the macroscopic quantity $$I$$.\n- Step 2: $$F = BQv\\sin\\theta$$ is the force on a *single* isolated charge $$Q$$ moving with velocity $$v$$. This is the microscopic version.\n- Step 3: They're really the same law. Current $$I$$ in a wire is $$I = nQv A$$ (charges per volume × charge × drift velocity × area), and the total number of charges in length $$L$$ is $$nAL$$. Multiply the single-charge force $$BQv$$ by the number of charges: total force is $$BIL$$. So the conductor formula is just the sum of the individual-charge forces.\n\nTrap: don't mix them — using $$BQv$$ for a wire (or $$BIL$$ for one charge) gives nonsense units.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "A coil in a generator is momentarily aligned with the field lines lying in the plane of the coil. Is the flux linkage max or min? Is the induced EMF max or min? Explain. (3 steps)", "answer": "- Step 1: Field lines *in the plane* means field is *parallel* to the coil's surface → no lines pierce through → flux linkage is *zero (minimum)*.\n- Step 2: But the coil is rotating, so the flux is changing rapidly through this orientation (passing from + to − or vice versa) — it's the fastest rate of change.\n- Step 3: Therefore EMF, which depends on $$d\\Phi/dt$$, is at its *maximum* here. Peak EMF coincides with zero flux — the two are 90° out of phase.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Synthesis question: In the National Grid, a power station generates 500 MW of power at 25 kV. The voltage is stepped up to 400 kV for transmission. If the total cable resistance is 200 Ω, compare the power lost during transmission at 25 kV vs. at 400 kV. Which loses dramatically less, and by roughly what factor? (3 steps)", "answer": "- Step 1: At 25 kV: current $$I = P/V = 500 \\times 10^6 / 25 \\times 10^3 = 20{,}000$$ A. Power loss = $$I^2R = (20{,}000)^2 \\times 200 = 80 \\times 10^9$$ W = 80 GW (more than the power generated — impossible!).\n- Step 2: At 400 kV: current $$I = 500 \\times 10^6 / 400 \\times 10^3 = 1{,}250$$ A. Power loss = $$(1{,}250)^2 \\times 200 = 312.5 \\times 10^6$$ W ≈ 312 MW.\n- Step 3: The power loss at 400 kV is about 312 MW vs. an absurdly large value at 25 kV. The current ratio is 16:1, so the $$I^2R$$ loss ratio is 256:1. This demonstrates why stepping up voltage is essential — it reduces current, and since power loss goes as $$I^2$$, even modest current reductions yield dramatic savings.", "source": "GLM 5.1 ③", "_id": "glm_3_53"}, {"question": "For the same peak EMF, would you rather double the number of turns or double the rotation speed of an AC generator? What's the trade-off? (3 steps)", "answer": "- Step 1: Peak EMF is $$\\varepsilon_{\\max} = BAN\\omega$$. Both doubling $$N$$ and doubling $$\\omega$$ double the peak EMF.\n- Step 2: But they differ in side effects:\n+ Doubling $$\\omega$$ also doubles the *frequency* of the output — which may not be desired if we need a fixed 50 Hz grid.\n+ Doubling $$N$$ increases coil resistance (longer wire) → more $$I^2R$$ losses and lower efficiency.\n- Step 3: In practice, grid generators are locked at 50 (or 60) Hz for compatibility, so $$\\omega$$ is fixed. Engineers boost EMF via $$N$$, $$A$$, and $$B$$ instead — accepting the resistance trade-off.\n\nTakeaway: the formula treats $$N$$ and $$\\omega$$ symmetrically, but engineering constraints break the symmetry.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "What is the conceptual distinction between magnetic flux $$\\Phi$$ and flux linkage $$N\\Phi$$, and why do we need both?", "answer": "- Step 1: Flux $$\\Phi = BA\\cos\\theta$$ measures how much field passes perpendicularly through *one* loop of area $$A$$. Unit: weber (Wb). It's a geometric quantity — field × perpendicular area.\n- Step 2: Flux linkage $$N\\Phi = BAN\\cos\\theta$$ multiplies by the number of turns $$N$$ in a coil. Unit: weber-turns (Wb turns). We need this because when a coil has $$N$$ turns, the same changing flux is \"seen\" by each loop, and each loop contributes its own induced EMF.\n- Step 3: So flux describes the *field geometry*; flux linkage describes *how effectively that flux couples to a coil*. A single wire has flux through it but flux linkage only matters for multi-turn coils — this is why solenoids induce much larger EMFs than single loops.\n\nTakeaway: doubling the turns doubles the induced EMF for the same flux change — this is the whole design principle of transformers.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "In a step-up transformer, how can the secondary voltage be greater than the primary voltage while obeying energy conservation? (3 steps)", "answer": "- Step 1: Voltage ratio V₁/V₂ = N₁/N₂ ⇒ V₂ = V₁(N₂/N₁). If N₂ > N₁, V₂ > V₁.  \n- Step 2: Power conservation (ideal case): V₁I₁ = V₂I₂ ⇒ I₂ = I₁(V₁/V₂). Higher voltage ⇒ lower current.  \n- Step 3: Energy transfer remains constant; stepped-up voltage reduces current, minimizing I²R losses in transmission.  \n\n+ Edge case: Real transformers lose energy (eddy currents, hysteresis) ⇒ P_out < P_in.  \n\n**Takeaway:** Voltage and current are inversely related to maintain constant power (assuming 100% efficiency).", "source": "Qwen 3 ①", "_id": "qwen_1_6"}, {"question": "When a bar magnet is thrust into a coil twice as fast, how does the peak induced EMF change, and why? (2 steps)", "answer": "- Step 1: The peak EMF *doubles*. Faraday's law: $$\\varepsilon = -N\\,d\\Phi/dt$$. Moving twice as fast means the flux changes at twice the rate.\n- Step 2: The *total* charge circulated through the circuit stays the same, though — it depends on the *total* change in flux, not on how fast. But the peak instantaneous current (and EMF) scales with speed.\n\nInsight: two ways to boost induced EMF — increase magnet strength (larger $$\\Delta\\Phi$$) or move it faster (smaller $$\\Delta t$$).", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "A bar magnet's north pole is pushed towards a coil. What pole does the coil create on the face nearest the magnet, and why? What happens when the magnet is pulled away? (3 steps)", "answer": "- Step 1: As the north pole **approaches**, the flux through the coil is increasing. By Lenz's Law, the induced current must create a field that **opposes** this increase — so the coil creates a **north pole** on the face nearest the magnet. North repels north, resisting the magnet's approach.\n- Step 2: As the north pole is **withdrawn**, the flux through the coil is decreasing. Lenz's Law says the induced current must oppose this decrease — so the coil creates a **south pole** on the face nearest the magnet. South attracts north, resisting the magnet's departure.\n- Step 3: The direction of the induced current therefore **reverses** when the magnet changes from approaching to receding. This is why the voltmeter shows a positive deflection when the magnet enters and a negative deflection when it leaves.\n\nApproaching → repel (same pole); Leaving → attract (opposite pole). Both oppose the change.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "Why does moving a bar magnet faster into a coil induce a larger EMF, and what happens if you accelerate it? (3 steps)", "answer": "- Step 1: EMF depends on $$d\\Phi/dt$$. A faster magnet means the flux through the coil rises more quickly with time — larger derivative → larger EMF.\n- Step 2: Accelerating the magnet (increasing its speed as it enters) means $$d\\Phi/dt$$ itself is *increasing* — the induced EMF grows over time rather than being constant.\n- Step 3: There's a feedback: by Lenz's law, the induced current creates an opposing force on the magnet. To keep accelerating, you must push harder against this force — the extra mechanical work you do is what appears as extra electrical energy.\n\nTakeaway: the coil \"fights back\" harder as flux changes faster — energy conservation in action.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "Why is it important to state that the induced *voltage* comes first in electromagnetic induction, and current only follows if the circuit is complete? (3 steps)", "answer": "- Step 1: Induction is fundamentally about EMF — an electrical \"push\" created by changing flux linkage. This push exists whether or not any charge can move.\n- Step 2: If the coil ends are open (no complete circuit), there's still an induced voltage across the ends — you could measure it with a high-impedance voltmeter — but no current flows because there's no path.\n- Step 3: Only when the circuit is closed does current flow, driven by the induced EMF: $$I = \\varepsilon/R$$. So the causal order is: changing flux → induced EMF → *if closed circuit* → induced current.\n\nExam tip: examiners look for the word \"induced\" and the distinction between \"EMF is induced\" and \"current flows.\" Saying \"current is induced\" without a complete circuit loses marks.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "What are the standard symbols used to represent vectors going into or out of the page in 3D magnetic field diagrams, and what is the visual mnemonic for remembering them? (2 steps)", "answer": "- Step 1: **Out of the page** = a **dot** (sometimes circled): ⊙. **Into the page** = a **cross**: ⊗. These represent the tip and tail of an arrow viewed head-on or from behind.\n- Step 2: The mnemonic: imagine an archery arrow flying toward you. If it's coming **at you** (out of the page), you see only the **pointed tip** — a dot. If it's flying **away from you** (into the page), you see the **crossed feathers** at the back — a cross.\n\nThis convention applies to any vector: magnetic field, force, current, or velocity. When you see ⊗ for B, the field goes into the page; when you see ⊙ for B, the field comes out of the page.", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "A student says: \"When a magnet is pushed into a coil, the induced current creates a field that attracts the magnet, helping it move in.\" Explain why this violates physics and what actually happens. (3 steps)", "answer": "- Step 1: If the induced current helped the magnet move in, the magnet would accelerate on its own — gaining kinetic energy from nothing. This violates conservation of energy. You'd have a perpetual motion machine.\n- Step 2: Lenz's Law ensures this can't happen. The induced current creates a field that **repels** the approaching magnet (a north pole approaching induces a north pole on the coil face). You must **push against** this repulsion, doing work.\n- Step 3: The work you do pushing the magnet against the repulsive force is converted into electrical energy in the coil. Energy is conserved: mechanical work in = electrical energy out (plus any losses).\n\nAttraction would mean free energy — impossible. Repulsion means you must do work — energy is conserved. Lenz's Law is nature's way of enforcing the First Law of Thermodynamics.", "source": "GLM 5.1 ①", "_id": "glm_1_48"}, {"question": "What four sources of energy loss exist in a real transformer, and how is each one reduced? (4 steps)", "answer": "- Step 1: **Resistive (copper) losses** — current flowing through the coil windings encounters resistance, dissipating power as heat ($$I^2R$$). Reduced by using thick, low-resistance copper wire.\n- Step 2: **Eddy current losses** — the changing magnetic field induces circulating currents within the iron core itself, heating it. Reduced by using a **laminated core** (thin insulated slices that break up the current loops).\n- Step 3: **Hysteresis losses** — energy is required to repeatedly magnetise and demagnetise the core each AC cycle. The core resists changing its magnetic orientation. Reduced by using **magnetically soft** iron (easy to magnetise/demagnetise).\n- Step 4: **Flux leakage** — not all the magnetic flux from the primary coil passes through the secondary coil; some escapes. Reduced by good core design (closed loop core shape that channels flux efficiently between the coils).\n\nReal transformer efficiency: $$\\eta = \\frac{P_{out}}{P_{in}} = \\frac{V_s I_s}{V_p I_p}$$. Well-designed transformers can exceed 99% efficiency.", "source": "GLM 5.1 ②", "_id": "glm_2_28"}, {"question": "In the combined Faraday-Lenz equation $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$, what does the negative sign physically mean? If the flux linkage vs. time graph has a positive gradient, what is the sign of the EMF? (2 steps)", "answer": "- Step 1: The negative sign means the induced EMF acts in a direction that **opposes** the change in flux linkage. If flux linkage is increasing (positive gradient), the EMF is negative — it drives a current that tries to reduce the flux. If flux linkage is decreasing (negative gradient), the EMF is positive — it drives a current that tries to maintain the flux.\n- Step 2: If the flux linkage vs. time graph has a **positive gradient**, then $$\\frac{d(N\\Phi)}{dt} > 0$$, and $$\\varepsilon = -\\frac{d(N\\Phi)}{dt} < 0$$. The EMF is negative, meaning it acts to oppose the increase in flux.\n\nThe EMF is always the negative of the gradient — it fights the change.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "A student claims: \"If I use a stronger magnet, the induced EMF gets bigger, so the induced current can violate energy conservation.\" Where is the flaw? (3 steps)", "answer": "- Step 1: Yes, a stronger magnet does induce a larger EMF (more flux change per unit time). And yes, the induced current is larger.\n- Step 2: But Lenz's law kicks in: the induced current also creates a stronger opposing magnetic field. The force resisting the magnet's motion is *also* proportionally larger.\n- Step 3: The mechanical work required to push a stronger magnet is greater — exactly matching the greater electrical energy generated. Energy accounts balance perfectly:\n+ Stronger magnet + same speed → more work per unit time → more electrical power.\n+ You don't get free energy; you pay for it in extra mechanical effort.\n\nTakeaway: Lenz's law isn't just about direction — it enforces energy conservation quantitatively.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "A rectangular coil sits in a uniform magnetic field. When the coil's plane is perpendicular to the field lines, what is the value of $$\\theta$$ in $$\\Phi = BA\\cos\\theta$$, and is the flux maximum or minimum? What about when the coil's plane is parallel to the field lines? (3 steps)", "answer": "- Step 1: The angle $$\\theta$$ is measured between the **field lines and the normal (perpendicular) to the plane of the area** — NOT between the field and the plane itself. This is a common exam trap.\n- Step 2: When the coil's plane is **perpendicular to the field**, the normal to the coil is **parallel** to the field, so $$\\theta = 0°$$ and $$\\cos\\theta = 1$$. Flux is **maximum**: $$\\Phi = BA$$.\n- Step 3: When the coil's plane is **parallel to the field**, the normal to the coil is **perpendicular** to the field, so $$\\theta = 90°$$ and $$\\cos\\theta = 0$$. Flux is **minimum (zero)**: $$\\Phi = 0$$.\n\nRemember: $$\\theta$$ is always measured from the **normal** to the plane, not from the plane itself.", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "Suppose you replace the iron core in a transformer with a copper core of the same shape. What happens qualitatively? (3 steps)", "answer": "- Step 1: Copper has much lower magnetic permeability than iron (essentially the same as vacuum), so it won't channel magnetic flux — flux linkage between primary and secondary collapses.\n- Step 2: Copper is also an excellent electrical conductor, so massive eddy currents would form in the core, dissipating huge amounts of energy.\n- Step 3: Result: extremely poor coupling (low secondary EMF) and extremely high losses (heat everywhere). The device would be essentially useless as a transformer.\n\nTakeaway: iron's role is dual — high permeability (good) and (with laminations) manageable eddy currents (also good). Copper has neither property helpfully.", "source": "Opus 4.7 ②", "_id": "opus_2_60"}, {"question": "Why does an electron entering a uniform B-field perpendicular to its velocity trace a circle, and how does the circle's radius depend on the electron's speed? (3 steps)", "answer": "- Step 1: The magnetic force $$F = evB$$ is perpendicular to the velocity, so it acts as a centripetal force without changing speed.\n- Step 2: Setting magnetic = centripetal: $$evB = mv^2/r$$, so $$r = mv/(eB)$$.\n- Step 3: A *faster* electron traces a *bigger* circle (radius scales linearly with $$v$$). Intuition: it has more momentum, so the same sideways force deflects it less per unit time. Also, the angular frequency $$\\omega = v/r = eB/m$$ is *independent* of $$v$$ — this is the cyclotron frequency, a fundamental property of the charge-to-mass ratio and the field.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "In a rotating coil generator, what if the coil starts with its normal aligned with the field (max flux linkage)? What does the EMF vs time graph look like? (2 steps)", "answer": "- Step 1: At $$t = 0$$, flux linkage $$N\\Phi = BAN\\cos(0) = BAN$$ (maximum), so its derivative — the EMF — is *zero*.\n- Step 2: The EMF then follows $$\\varepsilon = BAN\\omega \\sin(\\omega t)$$: starts at zero, rises to peak $$BAN\\omega$$ at $$t = T/4$$, back to zero at $$t = T/2$$, negative peak at $$3T/4$$, back to zero at $$T$$. Peak EMF and peak flux linkage are 90° out of phase.\n\nTakeaway: whichever quantity peaks first depends on the initial coil orientation, but they're always in quadrature (90°).", "source": "Opus 4.7 ②", "_id": "opus_2_61"}, {"question": "A charged particle enters a magnetic field. Under what condition does it (a) travel in a straight line, (b) travel in a circle, (c) travel in a helix? (3 steps)", "answer": "- Step 1: **Straight line**: velocity is *parallel* (or antiparallel) to $$\\vec{B}$$. Then $$F = QvB\\sin(0) = 0$$ — no force, no deflection.\n- Step 2: **Circle**: velocity is *perpendicular* to $$\\vec{B}$$. Force is always ⊥ v, does no work, acts as centripetal → circular motion of radius $$r = mv/(BQ)$$.\n- Step 3: **Helix**: velocity has both parallel and perpendicular components. The perpendicular component causes circular motion; the parallel component drifts along the field lines → the trajectory spirals along $$\\vec{B}$$.\n\nApplication: charged particles in the Van Allen belts and solar wind spiral along Earth's magnetic field lines — this is exactly case (c).", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "In the National Grid, a step-up transformer increases voltage from ~25 kV at the power station to ~400 kV for transmission. Near homes, a step-down transformer reduces this to ~230 V. Why are two transformers needed rather than just one? (2 steps)", "answer": "- Step 1: The step-up transformer is needed at the power station end to **reduce transmission losses**. By increasing voltage to 400 kV, the current is dramatically reduced, minimising $$I^2R$$ heating in the long-distance cables.\n- Step 2: The step-down transformer is needed at the consumer end for **safety and usability**. 400 kV would be lethal in homes — it would arc through air and destroy appliances. 230 V is safe enough for domestic use while still being practical for powering devices.\n\nStep-up: efficiency (reduce losses in long cables). Step-down: safety (make voltage usable and non-lethal). Both are essential.", "source": "GLM 5.1 ①", "_id": "glm_1_54"}, {"question": "Why is the induced EMF in the secondary coil of a transformer at the *same frequency* as the primary voltage?", "answer": "The primary AC voltage drives a primary current at the same frequency (assuming a resistive primary). This alternating current produces a magnetic field that alternates at the same frequency, giving a flux that oscillates at the same frequency. Faraday's law then gives a secondary EMF proportional to $$d\\Phi/dt$$, which — if the flux is sinusoidal at frequency $$f$$ — is also sinusoidal at frequency $$f$$ (just shifted by 90°). So every stage in the chain preserves frequency; only the amplitude changes, set by the turns ratio.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "A charged particle moves at 30° to a magnetic field. Is the force on it half the maximum force, more than half, or less than half? Explain without calculating. (2 steps)", "answer": "- Step 1: The force is $$F = BQv\\sin\\theta$$. At $$\\theta = 30°$$, $$\\sin 30° = 0.5$$, so the force is exactly **half** the maximum force (which occurs at $$\\theta = 90°$$ where $$\\sin 90° = 1$$).\n- Step 2: The sine function is linear near 30° — $$\\sin 30° = 0.5$$ exactly. So the force is precisely half the maximum. If the angle were 45° instead, $$\\sin 45° \\approx 0.707$$, and the force would be about 70.7% of maximum — more than half.\n\nAt 30°, the force is exactly half the maximum because $$\\sin 30° = 0.5$$. The relationship is sinusoidal, not linear with the angle.", "source": "GLM 5.1 ①", "_id": "glm_1_42"}, {"question": "In an alternator (AC generator), why does the current in the external circuit reverse direction every half-turn? (3 steps)", "answer": "- Step 1: As the coil rotates, each side of the coil alternates between moving \"up\" and moving \"down\" through the field. Every half-turn, a given side that was going up now goes down.\n- Step 2: By Fleming's RHR (generator rule), the induced current direction in that side depends on its motion. Flipping the direction of motion flips the direction of induced current in that side.\n- Step 3: Since the slip rings connect each end of the coil to the same brush throughout, whatever current the coil produces flows straight to the external circuit. When the coil's current reverses, so does the external current → AC output.\n\nContrast: a commutator (dynamo) would swap the brush connections at the same moment, cancelling the reversal → DC output.", "source": "Opus 4.7 ②", "_id": "opus_2_58"}, {"question": "In a top-pan balance experiment, a magnet sits on the balance and a current-carrying wire passes between its poles. When the current is switched on, the balance reading increases by 161 g (force pushes down on the balance). By Newton's Third Law, what is the direction of the force on the wire, and why? (3 steps)", "answer": "- Step 1: The balance reading increases, meaning there is an additional downward force **on the magnet** (which sits on the balance). The magnet is being pushed down.\n- Step 2: By Newton's Third Law, the force on the wire is **equal and opposite** to the force on the magnet. If the magnet is pushed down, the wire is pushed **up**.\n- Step 3: This makes sense physically: the current-carrying wire experiences an upward force from the magnetic field (motor effect), and by Newton's Third Law, the magnet experiences an equal downward force. The balance detects this reaction force on the magnet.\n\nThe balance measures the force on the magnet, not the wire. Newton's Third Law connects the two: force on wire = opposite of force on magnet.", "source": "GLM 5.1 ①", "_id": "glm_1_32"}, {"question": "Why must you point your second finger in the *opposite* direction to an electron's motion when using Fleming's Left Hand Rule? What would happen if you forgot? (3 steps)", "answer": "- Step 1: Fleming's Left Hand Rule uses **conventional current** — the direction positive charges would flow. An electron has negative charge, so the \"current\" it represents flows in the *opposite* direction to its physical motion.\n- Step 2: If an electron moves to the left, the equivalent conventional current flows to the right. Your second finger must point right (the current direction), not left (the electron's motion direction).\n- Step 3: If you forget and point your second finger in the electron's direction of motion, you'll get the **wrong force direction** — the thumb will point the opposite way to the true force. This would lead to predicting the electron curves the wrong way in a magnetic field, which is a critical error in mass spectrometry or particle physics problems.\n\nThe rule: for any negative charge (electron, negative ion), always reverse the second finger relative to the particle's velocity.", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "What are the three ways to change the magnetic flux linkage through a coil, and therefore induce an EMF? Give a practical example of each. (3 steps)", "answer": "- Step 1: **Change the magnetic flux density $$B$$** — e.g., move a bar magnet closer to or further from a coil, or change the current in a nearby electromagnet. The field strength at the coil changes, changing the flux through it.\n- Step 2: **Change the area $$A$$** — e.g., deform a flexible loop by stretching or compressing it within a magnetic field. The amount of field \"captured\" by the loop changes as the area changes.\n- Step 3: **Change the angle $$\\theta$$** — e.g., rotate a coil in a magnetic field (this is exactly what a generator does). As the coil turns, $$\\cos\\theta$$ changes, so the flux linkage oscillates sinusoidally.\n\nAny one of these three changes produces a $$\\Delta(N\\Phi)$$, and by Faraday's Law, induces an EMF.", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "For a current-carrying wire in a B-field, when is the force on it maximum and when is it zero? Explain physically, not just from the formula. (2 steps)", "answer": "- Step 1: Maximum when current is perpendicular to $$B$$ ($$\\theta = 90°$$, $$\\sin\\theta = 1$$). Every moving charge in the wire experiences a full sideways push from the field.\n- Step 2: Zero when current is parallel to $$B$$ ($$\\theta = 0$$, $$\\sin\\theta = 0$$). The charges are moving *along* the field lines, and the magnetic force $$Qv\\times B$$ vanishes when $$v \\parallel B$$.\n\nTakeaway: only the *component* of current perpendicular to the field produces force — parallel motion is invisible to the field.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "Without doing any calculation, explain why a proton and an electron moving at the same speed in the same magnetic field will curve in opposite directions but with different radii. (3 steps)", "answer": "- Step 1: They curve in **opposite directions** because they have opposite charges. The proton (positive) has conventional current in the same direction as its velocity; the electron (negative) has conventional current opposite to its velocity. By Fleming's Left Hand Rule, the force direction reverses.\n- Step 2: They have **different radii** because the radius depends on mass: $$r = \\frac{mv}{BQ}$$. The proton is about 1836 times heavier than the electron, so at the same speed, the proton's radius is about 1836 times larger.\n- Step 3: The proton's much larger radius means it barely curves, while the electron curves very tightly. This is the principle behind mass spectrometers — particles of different mass-to-charge ratios curve differently and can be separated.\n\nSame speed, same field: opposite curvature direction (opposite charge), vastly different curvature radius (different mass).", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "For an AC generator (alternator), the induced EMF is $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$. Where does this formula come from, and what does each term represent? (4 steps)", "answer": "- Step 1: Start with flux linkage. If the coil rotates at angular frequency $$\\omega$$, the angle between the field and the normal to the coil is $$\\theta = \\omega t$$. So flux linkage is $$N\\Phi = BAN\\cos(\\omega t)$$.\n- Step 2: By Faraday's Law, the induced EMF is the *rate of change* of flux linkage: $$\\varepsilon = -\\frac{d}{dt}[BAN\\cos(\\omega t)]$$.\n- Step 3: Differentiating: $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$. (Dropping the negative sign for magnitude.)\n+ $$B$$ = magnetic flux density (stronger field → more flux → more EMF)\n+ $$A$$ = coil area (bigger coil → more flux captured)\n+ $$N$$ = number of turns (more turns → more flux linkage)\n+ $$\\omega$$ = angular frequency (faster rotation → faster change → more EMF)\n- Step 4: The **peak EMF** is $$\\varepsilon_{max} = BAN\\omega$$, occurring when $$\\sin(\\omega t) = 1$$ (coil parallel to field). The EMF is zero when $$\\sin(\\omega t) = 0$$ (coil perpendicular to field).\n\nDoubling the rotation speed doubles both the amplitude AND the frequency of the output — two effects from one change.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "In a simple DC motor with a permanent magnet, why does the coil experience a torque only when current flows, and why does the torque direction depend on the coil's orientation? (3 steps)", "answer": "- Step 1: Each side of the coil is a current-carrying conductor in the magnetic field. By $$F = BIL$$, each side experiences a force perpendicular to both current and field.\n- Step 2: On opposite sides of the coil, current flows in opposite directions → forces are equal and opposite → they form a couple, producing torque about the coil's axis.\n- Step 3: As the coil rotates, the direction of \"up\" for each wire changes. Without the commutator, the torque would reverse every half-turn (opposing the motion). The split-ring commutator swaps current direction every half-turn, keeping the torque in the same sense → continuous rotation.\n\nTakeaway: the commutator is what makes DC motors *keep* rotating in one direction rather than oscillating.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "What is the key distinction between magnetic flux density ($$B$$), magnetic flux ($$\\Phi$$), and magnetic flux linkage ($$N\\Phi$$)? What does each one physically represent? (3 steps)", "answer": "- Step 1: **Magnetic flux density $$B$$** is the \"strength\" of the magnetic field at a point — how densely packed the field lines are. Think of it as the intensity of the field. It's measured in Tesla (T). A fridge magnet is ~5 mT; Earth's field is ~0.032 mT.\n- Step 2: **Magnetic flux $$\\Phi = BA\\cos\\theta$$** is the total amount of magnetic field \"threading through\" a given area. It depends on how strong the field is, how big the area is, and how aligned the area is with the field. Measured in Webers (Wb). Think of it as \"how many field lines pass through the loop.\"\n- Step 3: **Magnetic flux linkage $$N\\Phi = BAN\\cos\\theta$$** extends flux to a coil of $$N$$ turns. Each turn captures the same flux, so the total \"linkage\" is flux × number of turns. Measured in Weber-turns. This is the quantity that matters for electromagnetic induction — it's what Faraday's Law uses.\n\nFlux density = field intensity; Flux = field through an area; Flux linkage = field through a whole coil.", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "What is magnetic flux *linkage*, why do we multiply by $$N$$, and what are its units? (3 steps)", "answer": "- Step 1: A single loop enclosing flux $$\\Phi$$ has an induced EMF from Faraday's law proportional to $$d\\Phi/dt$$.\n- Step 2: If we wrap $$N$$ turns of wire around the same area, each turn independently experiences the same changing flux, and their induced EMFs add in series → the total is $$N$$ times larger. So the quantity that actually appears in Faraday's law is $$N\\Phi = BAN$$.\n- Step 3: The unit is weber-turns (Wb turns). \"Turns\" is technically dimensionless (a count), but we keep it in the unit as a reminder that this quantity scales with coil geometry.\n\nTakeaway: flux linkage bundles all the coil geometry into a single quantity that Faraday's law can act on directly.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "In Lenz's law, why does the induced current oppose the *change* rather than the flux itself? (3 steps)", "answer": "- Step 1: Faraday's law says EMF is proportional to $$d\\Phi/dt$$ — the *rate of change*. A static flux, no matter how big, induces nothing.\n- Step 2: If a constant flux induced a current that opposed the flux itself, we'd have perpetual current from a static magnet — perpetual motion again.\n- Step 3: Only *changes* to flux inject energy into the circuit (from the source of the change — e.g. someone doing work to move the magnet). The induced current opposes whatever is causing that change, so that pushing/pulling against it does work — which becomes the electrical energy. It's not the flux we're opposing; it's the *process* of changing it.\n\nTakeaway: Lenz's law opposes the *action*, not the *state*.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "What does magnetic flux density $$B$$ physically represent, and how is it defined operationally?", "answer": "- Step 1: Physically, $$B$$ represents the *strength* of a magnetic field at a point — visualised as the density of field lines. Where field lines are packed close, $$B$$ is large; where they're spread thin, $$B$$ is small.\n- Step 2: Operationally, we define $$B$$ by the force it exerts on a current-carrying wire placed perpendicular to it: $$B = F/(IL)$$. So one tesla is the field strength that produces one newton of force on one metre of wire carrying one amp perpendicular to the field.\n- Step 3: This is a \"response definition\" — we don't measure the field directly; we measure the force it exerts on a known current and back out $$B$$. Units: tesla (T). For scale: Earth's field is $$\\sim 0.032$$ mT, a fridge magnet is $$\\sim 5$$ mT — five orders of magnitude apart.\n\nTakeaway: $$B$$ is defined by what it does to moving charges, not by what it \"is\".", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "In the transformer causal chain, students often skip from \"AC in primary\" straight to \"AC in secondary.\" Why is this wrong, and what phrase captures the missing physics? (3 steps)", "answer": "- Step 1: There is no direct electrical connection between the primary and secondary coils. Skipping steps ignores the fact that the energy has to *cross a gap*.\n- Step 2: The missing physics: the *magnetic field* (channelled by the iron core) is what transfers energy between the coils. The primary's changing current creates a changing magnetic field; the secondary experiences a changing flux linkage; Faraday's law induces an EMF.\n- Step 3: Key phrase for exam credit: \"**changing magnetic flux linkage** induces an EMF in the secondary.\" Omitting the words \"change\" and \"flux linkage\" loses marks — examiners specifically check for this vocabulary.\n\nCommon trap: writing \"the current in the primary produces a current in the secondary\" — no! Only the *field* mediates the transfer, and only *change* in that field.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "Why does Fleming's left-hand rule use conventional current instead of electron flow, and what do you do if the particle is negative? (2 steps)", "answer": "- Step 1: The rule is set up for *positive* charge flow because historically that's how current was defined (before electrons were discovered as the actual carriers in metals). All the physics equations use this convention consistently.\n- Step 2: For a negative charge (e.g. an electron beam), point the second finger in the direction *opposite* to the particle's motion. Equivalently: an electron moving left is treated as conventional current moving right.\n\nTrap: forgetting to flip for electrons flips your entire predicted force direction.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "A step-down transformer has 4000 primary turns and 100 secondary turns. The primary voltage is 230 V and the primary current is 2 A. If the transformer is 95% efficient, how does the actual secondary current compare to the ideal secondary current? (3 steps)", "answer": "- Step 1: **Ideal case** (100% efficient): $$V_s = V_p \\times \\frac{N_s}{N_p} = 230 \\times \\frac{100}{4000} = 5.75$$ V. Then $$I_s = \\frac{V_p I_p}{V_s} = \\frac{230 \\times 2}{5.75} = 80$$ A.\n- Step 2: **Real case** (95% efficient): $$P_{out} = 0.95 \\times P_{in} = 0.95 \\times 230 \\times 2 = 437$$ W. So $$I_s = \\frac{P_{out}}{V_s} = \\frac{437}{5.75} = 76$$ A.\n- Step 3: The actual secondary current (76 A) is **less** than the ideal (80 A) because 5% of the input power is lost as heat in the transformer. The voltage ratio still holds (determined by turns), but the current is reduced by the efficiency factor.\n\nEfficiency affects current, not voltage. The turns ratio still determines the voltage, but less power reaches the secondary, so the current is lower than ideal.", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "A generator coil has $$N = 200$$ turns, area $$0.02\\,m^2$$, spins at 50 Hz in a $$B = 0.5$$ T field. Conceptually, what determines the peak EMF and roughly what order of magnitude is it? (3 steps)", "answer": "- Step 1: Peak EMF is $$\\varepsilon_{max} = BAN\\omega$$ where $$\\omega = 2\\pi f \\approx 314$$ rad/s at 50 Hz.\n- Step 2: Multiply through: $$B$$ = 0.5, $$A$$ = 0.02, $$N$$ = 200, $$\\omega \\approx 300$$. The product is roughly $$0.5 \\times 0.02 \\times 200 \\times 300 \\approx 600$$ V.\n- Step 3: So we're talking hundreds of volts — realistic domestic generator scale. Each factor contributes: strong field, big area, many turns, and fast rotation all pile up multiplicatively.\n\nTakeaway: modest values in each factor combine into a large EMF because $$\\varepsilon_{max}$$ scales with all four factors linearly.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Explain why a DC motor might spark at the brushes. (1 step)", "answer": "As the commutator segments disconnect and reconnect to the brushes (especially at high speeds), there can be a brief interruption of current. This sudden change in current, combined with the inductance of the coil, can produce a voltage spike that sparks across the gap.", "source": "MiniMax ①", "_id": "minimax_1_43"}, {"question": "A bar magnet is dropped vertically through a horizontal conducting coil. How does the terminal velocity of the falling magnet compare to what it would be in free fall? Explain qualitatively. (3 steps)", "answer": "- Step 1: As the magnet falls through the coil, it induces a current (Faraday's law) which produces a magnetic field opposing the magnet's motion (Lenz's law) — this is a *retarding force* on the magnet.\n- Step 2: This retarding force grows with the magnet's speed (faster fall → faster $$d\\Phi/dt$$ → bigger induced current → bigger opposing field).\n- Step 3: The magnet reaches a \"terminal velocity\" — much slower than free fall — where gravitational pull equals the electromagnetic retarding force. The falling magnet's lost gravitational PE goes into electrical energy dissipated as heat in the coil.\n\nTakeaway: eddy-brake demonstration of Lenz's law + energy conservation.", "source": "Opus 4.7 ②", "_id": "opus_2_59"}, {"question": "Suppose you triple the number of turns on the secondary of an ideal transformer (leaving primary unchanged). What happens to (a) secondary voltage, (b) secondary current for the same load, (c) secondary power delivered? (3 steps)", "answer": "- Step 1: **Voltage:** $$V_s = V_p (N_s/N_p)$$ — tripling $$N_s$$ triples $$V_s$$.\n- Step 2: **Current:** if the load is the same resistor $$R$$, then $$I_s = V_s/R$$ triples too. (But if the load is fixed *power*, then $$I_s$$ would drop by 3×.) The context of \"same load\" matters.\n- Step 3: **Power:** if current tripled (fixed $$R$$), then $$P = V_s I_s$$ is 9× larger. This means the primary must draw 9× more current from the source, so total power drawn scales up too.\n\nTakeaway: turns ratio directly sets voltage; what happens to current and power depends on what the load is.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Suppose you double $$B$$ and halve $$A$$ for a rotating coil generator, keeping $$N$$ and $$\\omega$$ fixed. What happens to the peak EMF and why? (2 steps)", "answer": "- Step 1: Peak EMF is $$\\varepsilon_{max} = BAN\\omega$$. Doubling $$B$$ multiplies by 2; halving $$A$$ multiplies by 1/2. Net effect: unchanged.\n- Step 2: Physically: same total flux $$BA$$ through the coil, changing at the same rate ($$\\omega$$ unchanged), so same rate of change of flux linkage.\n\nInsight: $$BA$$ appears as a product in flux — you can trade off field strength against coil area.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "Explain what happens in the secondary coil of a transformer during three phases: (a) primary DC switched on, (b) primary DC steady, (c) primary DC switched off. (3 steps)", "answer": "- Step 1: **Switch on:** as primary current builds from 0 to steady, the flux through the iron core is *rising*. Changing flux → EMF induced in secondary → momentary current. Lasts only during the transient buildup.\n- Step 2: **Steady DC:** primary current is constant → magnetic field is constant → flux is constant → $$d\\Phi/dt = 0$$ → no induced EMF in secondary → no current, even though there's plenty of flux linked.\n- Step 3: **Switch off:** primary current collapses from steady value to 0 → flux collapses → $$d\\Phi/dt$$ is nonzero (opposite sign to step 1) → momentary induced EMF and current in the *opposite* direction to step 1.\n\nTakeaway: DC only produces transient transformer action at switching moments. This is why real transformers need AC — continuous flux change.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "A student says: \"The number of turns of a solenoid affects both flux and EMF.\" Is this correct? Clarify the distinction. (3 steps)", "answer": "- Step 1: Flux through a *single loop* of a solenoid, $$\\Phi = BA$$, does not directly depend on $$N$$ — it depends on the field and the loop area only.\n- Step 2: However, the *field itself* inside a solenoid depends on turns per unit length: $$B \\propto n = N/L$$. So more turns (for fixed length) do increase $$B$$, and hence $$\\Phi$$ through each loop.\n- Step 3: Flux linkage $$N\\Phi$$ scales explicitly with $$N$$. So EMF $$\\varepsilon = d(N\\Phi)/dt$$ has $$N$$ appearing *twice* — once via increased $$B$$, and once via more turns each experiencing $$d\\Phi/dt$$.\n\nTakeaway: \"flux\" and \"flux linkage\" are different — the student conflates them. Care with which quantity depends on $$N$$ in which way.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "Consider two coils sharing the same iron core, but with the secondary coil disconnected (open circuit). Does the primary still draw current? Is any power dissipated? (3 steps)", "answer": "- Step 1: Yes — the primary is connected to an AC source, so current flows in it regardless of the secondary. This current sets up the alternating magnetic field in the core.\n- Step 2: With the secondary open-circuit, no current flows in the secondary → no power delivered to a load. But the primary still draws some current called the \"magnetising current\" — needed to sustain the oscillating core field.\n- Step 3: In an *ideal* transformer this magnetising current is purely reactive (90° out of phase with voltage) → no net power dissipated. In a *real* transformer, some power is lost to hysteresis and eddy currents in the core, so the primary consumes a small amount of \"no-load\" power.\n\nTakeaway: transformers reflect load — no load on secondary means minimal power draw on primary (idealised limit).", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "Why does a transformer preserve frequency but not power (in a real device)?", "answer": "Frequency preservation is a mathematical consequence of the causal chain: sinusoidal input → sinusoidal current → sinusoidal flux → derivative is still sinusoidal at the same frequency. There's nothing in the physics that could shift the frequency. Power preservation, however, requires *ideal* conditions — no losses. Real transformers lose energy to $$I^2R$$ heating in the copper windings, eddy currents in the iron core, hysteresis in the magnetisation, and flux leakage into the air. All these are dissipative processes (converting electrical energy to heat) — none of them affect the timing of oscillations, only the amplitude. So frequency is preserved by geometry, but power isn't preserved by material limitations.", "source": "Opus 4.7 ②", "_id": "opus_2_57"}, {"question": "In the transformer causal chain, why is the *iron core* essential rather than just having the two coils close together in air? (3 steps)", "answer": "- Step 1: In air, most of the magnetic flux produced by the primary spreads out into the surrounding space and only a tiny fraction threads through the secondary — flux linkage is poor and efficiency terrible.\n- Step 2: Iron has high magnetic permeability (~1000× air) — magnetic field lines vastly prefer to travel through iron. The core acts like a \"magnetic conductor\" or \"channel\", guiding almost all the flux from primary to secondary.\n- Step 3: Result: essentially the same flux threads both coils, satisfying the assumption behind $$V_p/V_s = N_p/N_s$$. Without the core, the turns-ratio equation would fail badly due to leakage.\n\nAnalogy: iron is to magnetic flux what copper is to electric current — it channels it where you want it.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "Synthesis question: A generator coil rotates in a magnetic field. At the instant the coil is perpendicular to the field, explain why (a) the flux linkage is maximum, (b) the EMF is zero, and (c) the current (if any) is zero. Connect all three observations. (3 steps)", "answer": "- Step 1: When the coil is perpendicular to the field, the maximum number of field lines pass through the coil area. Since $$\\Phi = BA\\cos\\theta$$ and $$\\theta = 0°$$, flux linkage $$N\\Phi = BAN$$ is at its maximum value.\n- Step 2: At this instant, the flux linkage is at a turning point (like the peak of a cosine curve). The gradient of the flux-time graph is zero — the flux is momentarily not changing. By Faraday's Law, $$\\varepsilon = d(N\\Phi)/dt = 0$$. No change in flux means no induced EMF.\n- Step 3: With zero EMF, there is no driving voltage for current, so the current is also zero at this instant. All three observations stem from the same root cause: at the peak of the flux curve, the rate of change is zero. Maximum flux and zero EMF always occur simultaneously.", "source": "GLM 5.1 ③", "_id": "glm_3_52"}, {"question": "Synthesis question: A DC motor and an AC generator look almost identical in construction (coil between magnets). Explain how the SAME device could function as both a motor and a generator, and what determines which role it plays. (3 steps)", "answer": "- Step 1: The physics is the same in both — a coil in a magnetic field with electromagnetic interactions. The difference is what you put IN and what you get OUT.\n- Step 2: If you supply electrical energy (connect a battery), current flows through the coil, the motor effect creates a force, and the coil rotates — it's a MOTOR (electrical → mechanical).\n- Step 3: If you supply mechanical energy (spin the coil by hand), the coil moves through the field, electromagnetic induction creates an EMF, and current flows if there's a circuit — it's a GENERATOR (mechanical → electrical). In practice, a motor spinning under its own inertia acts as a generator (back-EMF), and regenerative braking in electric cars uses exactly this principle.", "source": "GLM 5.1 ③", "_id": "glm_3_54"}, {"question": "A student says: \"A step-down transformer reduces voltage, so it also reduces current — both go down.\" Is this correct? Explain why or why not using the power equation. (3 steps)", "answer": "- Step 1: This is **incorrect**. A step-down transformer reduces voltage but **increases** current (assuming approximately constant power).\n- Step 2: From the power equation: $$V_p I_p = V_s I_s$$. If $$V_s <
