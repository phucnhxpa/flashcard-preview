ant (low hysteresis). Laminated = electrically broken up (low eddy currents). Both choices minimise energy waste.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}, {"question": "List the four types of energy loss in a real transformer and give a one-sentence physical explanation for each. Which loss is reduced by lamination, and which by using soft iron? (2 steps)", "answer": "- Step 1: The four losses are:\n+ **Copper (I²R) losses**: resistive heating in the primary and secondary windings — current flowing through wire with resistance always produces heat.\n+ **Eddy current losses**: circulating currents induced in the conducting iron core by the changing magnetic field, dissipating energy as heat — **reduced by lamination** (insulated slices break the current loops).\n+ **Hysteresis losses**: energy wasted each cycle as the core is magnetised and demagnetised — the magnetisation process itself costs energy, like bending a stiff spring back and forth — **reduced by using soft iron** (which magnetises/demagnetises easily, like a flexible spring).\n+ **Flux leakage**: not all magnetic field lines from the primary reach the secondary — some escape through the air, so the flux linkage between coils isn't perfect — reduced by better core design (wrapping coils tightly around the core).\n- Step 2: Lamination specifically targets eddy currents (breaking the conducting loops). Soft iron specifically targets hysteresis (making magnetisation/demagnetisation easy). Copper losses can be reduced by using thicker wire (lower resistance). Flux leakage can be reduced by winding both coils on the *same* core section. No single fix addresses all four losses — real transformer design is a multi-variable optimisation.\n\nEach loss has a distinct physical cause and a distinct engineering fix — there's no single \"make it efficient\" button.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "In the National Grid, power is transmitted from a power station at ~40 kV, stepped up to ~250 kV for long-distance transmission, then stepped down to 230 V for homes. Why not just transmit at 230 V directly and avoid the transformers altogether? (2 steps)", "answer": "- Step 1: If you transmitted at 230 V directly, the current would be enormous. For a power station delivering, say, 1 MW: at 230 V, $$I = P/V = 1\\,000\\,000/230 \\approx 4350$$ A. At 250 kV: $$I = 1\\,000\\,000/250\\,000 = 4$$ A. The current at low voltage is over a *thousand times* larger.\n- Step 2: The heating loss in the cables is $$P_{loss} = I^2 R$$, so it scales with the *square* of current. A thousand-fold increase in current means a *million-fold* increase in heating loss. At 230 V, virtually all the power station's output would be wasted as heat in the transmission lines before reaching any home. Stepping up to 250 kV slashes the current and therefore slashes the $$I^2R$$ loss to a manageable fraction — that's the entire point of high-voltage transmission.\n\nLow voltage = huge current = catastrophic $$I^2R$$ loss. High voltage = tiny current = minimal loss. Transformers make long-distance power delivery possible.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "The magnetic flux through a rotating coil is $$\\Phi = BA\\cos(\\omega t)$$ and the induced EMF is $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$. How are these two equations related mathematically, and what does this relationship tell you about the *phase* difference between flux and EMF? (2 steps)", "answer": "- Step 1: The EMF is the *negative derivative* of the flux linkage with respect to time: $$\\varepsilon = -\\frac{d(N\\Phi)}{dt} = -\\frac{d(BAN\\cos(\\omega t))}{dt} = -BAN \\times (-\\omega\\sin(\\omega t)) = BAN\\omega\\sin(\\omega t)$$. The EMF is literally the gradient of the flux-linkage curve — mathematically, the derivative of a cosine is a sine (with a sign flip from Lenz's law that cancels the negative from the derivative of cosine).\n- Step 2: This means flux and EMF are **90° out of phase** (a quarter-cycle apart). When flux peaks (cosine = 1, at $$\\omega t = 0$$), EMF is zero (sine = 0). When flux is zero (cosine = 0, at $$\\omega t = \\pi/2$$), EMF peaks (sine = 1). The EMF *leads* the flux by 90° — it peaks *before* the flux peaks, just as velocity leads displacement by 90° in simple harmonic motion.\n\nFlux and EMF are like position and velocity in SHM — they're 90° apart because one is the derivative of the other.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "A wire carrying current sits in a magnetic field. The force on the wire is $$F = BIL\\sin\\theta$$. If you double the current and also double the field strength, what happens to the force? What if you double the current but halve the length of wire in the field? (2 steps)", "answer": "- Step 1: $$F = BIL\\sin\\theta$$ is a product — if you double both $$B$$ and $$I$$, the force *quadruples* ($$2 \\times 2 = 4$$ times the original). Both factors multiply independently. This is like doubling both the width and height of a rectangle — the area quadruples.\n- Step 2: If you double $$I$$ but halve $$L$$, the force stays the *same* ($$2 \\times 0.5 = 1$$ times the original). The two changes cancel. Physically: twice the current pushes twice as hard, but only half the wire length is in the field to be pushed, so the total force is unchanged. This shows that $$I$$ and $$L$$ are interchangeable in the formula — what matters is the product $$IL$$, which is related to the total charge flowing through the field region per second times the distance it travels.\n\n$$F$$ depends on the *product* of all factors — changes can reinforce or cancel depending on which variables you tweak.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "A proton and an electron enter the same uniform magnetic field at the same speed, both perpendicular to the field. Which has the larger circular orbit radius, and why? (3 steps)", "answer": "- Step 1: The radius of circular motion is $$r = \\frac{mv}{BQ}$$ — larger momentum $$mv$$ or smaller charge $$Q$$ gives a larger radius.\n- Step 2: The proton has much larger mass ($$m_p \\approx 1836 m_e$$) but the same magnitude of charge ($$|Q| = e$$ for both). At the same speed $$v$$, the proton's momentum $$mv$$ is ~1836 times larger, while $$BQ$$ is the same magnitude (just opposite sign). So the proton's radius is ~1836 times larger.\n- Step 3: Physically, the proton is *much harder to deflect* because it's so much heavier. The magnetic force $$BQv$$ is the same magnitude on both particles, but the proton's inertia resists the turning much more strongly — like trying to steer a truck vs. a bicycle with the same force. The electron whips around in tiny circles; the proton sweeps wide arcs.\n\nSame force, different masses → the heavier particle turns less sharply → larger radius. Mass is the \"steering resistance.\"", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "A coil in a generator has $$N = 200$$ turns, area $$A = 0.02$$ m², in field $$B = 0.5$$ T, rotating at $$f = 50$$ Hz. What is the peak EMF, and what is the EMF at the instant the coil is perpendicular to the field (flux is maximum)? (2 steps)", "answer": "- Step 1: First find $$\\omega = 2\\pi f = 2\\pi \\times 50 = 100\\pi \\approx 314$$ rad/s. The peak EMF is $$\\varepsilon_{max} = BAN\\omega = 0.5 \\times 0.02 \\times 200 \\times 314 \\approx 628$$ V. This occurs when the coil is *parallel* to the field (flux = 0, rate of change maximum).\n- Step 2: When the coil is *perpendicular* to the field (flux maximum), the rate of change of flux is zero — the coil is at a turning point on the flux curve. So the EMF at this instant is **0 V**. The EMF equation $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$ gives $$\\sin(\\omega t) = 0$$ at this orientation (since $$\\omega t = 0$$ or $$\\pi$$ when flux peaks), confirming zero EMF.\n\nPeak EMF (~628 V) happens when flux = 0. Zero EMF happens when flux is maximum. They're 90° apart.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "A magnet is pushed toward a coil at constant speed, then pulled away at the same constant speed. Compare the magnitude and direction of the induced EMFs in the two cases. (2 steps)", "answer": "- Step 1: The *magnitudes* are the same (assuming the same speed). The rate of change of flux is the same size — the flux increases at the same rate when approaching as it decreases when retreating. $$|\\varepsilon| = |d(N\\Phi)/dt|$$ is identical for both motions at the same speed.\n- Step 2: The *directions* (signs) are opposite. Pushing in: flux increases → Lenz's law → induced EMF opposes the increase (one polarity). Pulling out: flux decreases → Lenz's law → induced EMF opposes the decrease (opposite polarity). The induced current reverses direction. On a voltmeter, you'd see a positive pulse then a negative pulse of equal magnitude.\n\nSame speed → same EMF magnitude. Opposite change direction → opposite EMF polarity. Lenz's law flips the sign but not the size.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "A step-down transformer converts 230 V to 12 V. If the primary has 4600 turns, how many turns does the secondary have? If the primary current is 0.5 A and the transformer is ideal, what is the secondary current? (2 steps)", "answer": "- Step 1: From the turns ratio: $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$, so $$N_s = N_p \\times \\frac{V_s}{V_p} = 4600 \\times \\frac{12}{230} = 4600 \\times \\frac{12}{230} = 240$$ turns. Step-down: fewer turns on secondary.\n- Step 2: From power conservation ($$I_p V_p = I_s V_s$$): $$I_s = \\frac{I_p V_p}{V_s} = \\frac{0.5 \\times 230}{12} \\approx 9.6$$ A. Step-down: voltage decreases, current *increases* — the secondary current is much larger than the primary current. This is why step-down transformers at the consumer end can deliver high current to homes at safe low voltage.\n\nStep-down: $$V$$ drops by factor ~19, $$I$$ rises by factor ~19, $$N$$ drops by factor ~19. Power stays the same.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "What is the relationship between the current ratio and the turns ratio in an ideal transformer, and why is it *inverse*? Derive it from the two transformer equations. (3 steps)", "answer": "- Step 1: Start with the two ideal transformer equations: (1) Turns ratio: $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$; (2) Power conservation: $$I_p V_p = I_s V_s$$, which gives $$\\frac{I_p}{I_s} = \\frac{V_s}{V_p}$$.\n- Step 2: Substitute the turns ratio into the power equation. From (1): $$\\frac{V_s}{V_p} = \\frac{N_s}{N_p}$$ (just invert both sides). Plug this into (2): $$\\frac{I_p}{I_s} = \\frac{N_s}{N_p}$$.\n- Step 3: The current ratio is the **inverse** of the turns ratio: more turns on the secondary → higher voltage → *lower* current. This makes physical sense because power must be conserved — if voltage goes up by factor $$k$$ (more turns), current must go down by factor $$k$$ to keep $$IV$$ constant. The turns ratio \"decides\" the voltage; energy conservation then \"forces\" the current to be the inverse.\n\n$$\\frac{I_p}{I_s} = \\frac{N_s}{N_p}$$ — more secondary turns means less secondary current. It's not arbitrary; it's energy conservation enforcing the inverse.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": true}, {"question": "A charged particle moves in a circle of radius $$r$$ in a magnetic field. If you double the particle's speed, what happens to the radius? If you double the magnetic field strength instead, what happens? Explain each case physically. (3 steps)", "answer": "- Step 1: From $$r = \\frac{mv}{BQ}$$: doubling the speed $$v$$ doubles the radius ($$r \\propto v$$). Physically, a faster particle has more momentum and is harder to deflect — the magnetic force $$BQv$$ does increase with speed, but only linearly, while the centripetal requirement $$mv^2/r$$ increases with $$v^2$$, so the radius must grow to balance.\n- Step 2: Doubling the field $$B$$ *halves* the radius ($$r \\propto 1/B$$). Physically, a stronger field exerts a stronger force on the charge at every instant, deflecting it more aggressively and bending it into a tighter circle. The steering is sharper.\n- Step 3: The key insight: $$r$$ depends on the *ratio* $$mv/BQ$$ — momentum (resistance to turning) divided by force (strength of turning). Increasing momentum widens the circle; increasing force tightens it. Speed and field have *opposite* effects on radius because one is in the numerator and the other in the denominator.\n\nRadius = momentum / force. More momentum → wider. More force → tighter. They compete.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "A student says: \"The magnetic flux through the coil is maximum, so the induced EMF must also be maximum.\" Is this correct? Explain why or why not using Faraday's law. (2 steps)", "answer": "- Step 1: This is **incorrect** — a common misconception. Faraday's law states $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$, meaning EMF depends on the *rate of change* of flux, not the *amount* of flux. Maximum flux means the flux is at a peak — but at a peak, the gradient is zero (the curve is flat), so the rate of change is zero and the EMF is zero.\n- Step 2: The correct statement is: maximum EMF occurs when the *rate of change* of flux is maximum — which happens when the coil is parallel to the field (flux = 0, but flux is changing fastest). Think of a hill: at the summit (maximum height), the slope is flat (zero gradient). On the flank (mid-height), the slope is steepest (maximum gradient). Flux is height; EMF is slope.\n\nMaximum flux = flat peak = zero EMF. Maximum EMF = steepest slope = zero flux. They are opposites, not twins.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "A student says: \"Lenz's law means the induced current always flows in the opposite direction to the original current.\" Is this correct? Explain what Lenz's law actually says and give a counterexample. (3 steps)", "answer": "- Step 1: This is **incorrect** — a common misconception. Lenz's law says the induced current opposes the *change in flux*, not the *original current*. The induced current creates its own magnetic field that opposes whatever *change* is happening to the flux — whether that change was caused by a current, a moving magnet, or a rotating coil.\n- Step 2: Counterexample: consider a transformer with AC in the primary. When the primary current is *increasing*, the flux is increasing, so the secondary's induced current creates a field opposing the increase (opposite direction to primary's field). But when the primary current is *decreasing*, the flux is decreasing, so the secondary's induced current creates a field opposing the decrease — which is in the *same* direction as the primary's field. The secondary current flips direction each half-cycle, sometimes opposing and sometimes reinforcing the primary's field direction, but always opposing the *change*.\n- Step 3: The key distinction: \"oppose the change\" ≠ \"opposite direction to the cause.\" Lenz's law is about *change* — increasing flux → oppose the increase; decreasing flux → oppose the decrease. The direction of opposition depends on whether the flux is going up or down, not on which side created it.\n\nLenz opposes *change*, not *cause*. Sometimes that means same direction, sometimes opposite — it depends on whether flux is rising or falling.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "In the formula $$\\Phi = BA\\cos\\theta$$, a question states \"the coil is rotated so its plane makes an angle of 60° with the field direction.\" What value of $$\\theta$$ do you substitute, and why is this a common exam trap? (3 steps)", "answer": "- Step 1: The angle $$\\theta$$ in $$\\Phi = BA\\cos\\theta$$ is measured from the **normal** to the plane, not from the plane itself. If the *plane* makes 60° with the field, then the *normal* makes 30° with the field (normal is perpendicular to the plane, so the angles add to 90°). You substitute $$\\theta = 30°$$, giving $$\\Phi = BA\\cos 30°$$.\n- Step 2: The trap: many students substitute $$\\theta = 60°$$ directly, getting $$\\Phi = BA\\cos 60°$$, which is *wrong* — they've used the angle from the plane instead of the normal. $$\\cos 60° = 0.5$$ while $$\\cos 30° \\approx 0.87$$, so the wrong answer is nearly half the correct one.\n- Step 3: The defence: always *draw the normal* to the coil's plane on your diagram, then measure the angle between the field lines and this normal. The normal is the \"arrow sticking out of the face of the coil\" — flux is about field lines punching through the face, so the relevant angle is between the field and the face's perpendicular. If a question gives you the angle from the plane, subtract from 90° to get the angle from the normal.\n\n$$\\theta$$ in the formula is always from the *normal*. If the question gives an angle from the *plane*, convert it: $$\\theta_{normal} = 90° - \\theta_{plane}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": true}, {"question": "A student uses Fleming's Left-Hand Rule for a generator and Fleming's Right-Hand Rule for a motor. Why are both of these wrong, and what mnemonic connects each rule to the correct device? (2 steps)", "answer": "- Step 1: **Motor** = you supply *current* and get *force/motion* → use Fleming's **Left-Hand Rule** ( thuMb = force, seCond finger = supplied current). **Generator** = you supply *motion* and get *induced current* → use Fleming's **Right-Hand Rule** ( thuMb = supplied motion, seCond finger = resulting current). The student has them backwards.\n- Step 2: Mnemonic: **Left = Motor, Right = Generator**. Or think of it as: the motor *consumes* electricity (left hand — you're \"paying\" energy), the generator *produces* electricity (right hand — you're \"receiving\" energy). Another way: in a motor, the force *drives* the motion (left hand gives the push); in a generator, the motion *produces* the current (right hand gives the output). The hand tells you which quantity is the *input* and which is the *output*.\n\nLeft hand = force from current (motor). Right hand = current from motion (generator). Never swap them.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "The gradient of a flux-linkage-vs-time graph gives the magnitude of the induced EMF. Sketch what a flux-linkage graph looks like for a coil rotating at constant speed, and mark where the EMF is maximum and zero on the same time axis. (3 steps)", "answer": "- Step 1: The flux linkage follows $$N\\Phi = BAN\\cos(\\omega t)$$ — a cosine curve. It starts at maximum (coil perpendicular to field), drops to zero (coil parallel), goes to negative maximum (coil perpendicular but flipped), returns to zero, and cycles back to positive maximum. A smooth oscillation between $$+BAN$$ and $$-BAN$$.\n- Step 2: The EMF is $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$ — a sine curve. It starts at zero (where the cosine is at its peak and the gradient is flat), rises to maximum (where the cosine crosses zero and the gradient is steepest), drops back to zero, goes to negative maximum, and cycles. The EMF curve is the *derivative* of the flux curve — it's 90° ahead.\n- Step 3: On the time axis: EMF is **maximum** at the moments where the flux curve crosses zero (steepest slope — the coil is parallel to the field). EMF is **zero** at the moments where the flux curve is at its peaks (flat slope — the coil is perpendicular to the field). The two curves are like displacement and velocity in SHM: they never peak at the same time.\n\nFlux is cosine (peaks at turning points). EMF is sine (peaks at zero-crossings). They're always a quarter-cycle apart.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "A transformer's secondary coil has no electrical connection to the primary — they are linked only by the iron core. Explain how energy is *transferred* from primary to secondary without any electrons crossing the core. (3 steps)", "answer": "- Step 1: The primary coil's alternating current creates a changing magnetic field in the iron core. This is *electrical energy → magnetic energy*: the current does work against the back-EMF (self-induction) to build and reverse the field each cycle, storing energy in the magnetic field.\n- Step 2: The iron core channels this changing magnetic field to the secondary coil. The core acts like a \"magnetic conductor\" — just as a copper wire channels electric current, the iron core channels magnetic flux, concentrating it and directing it from one coil to the other. No electrons flow through the core; only the *field pattern* propagates through it.\n- Step 3: The changing flux linkage in the secondary induces an EMF (Faraday's law), which drives current in the secondary circuit if one exists. This is *magnetic energy → electrical energy*: the changing field does work on the charges in the secondary wire. The energy transfer chain is: electrical (primary) → magnetic (core) → electrical (secondary). The magnetic field is the *carrier* — the middleman that transports energy without transporting charge.\n\nEnergy flows through the *field*, not through the *wire*. The iron core is a pipe for magnetic flux, not a pipe for electrons.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}, {"question": "Why does a step-up transformer at the power station *reduce* energy waste in transmission, even though the transformer itself has some energy losses? Why is the trade-off worthwhile? (2 steps)", "answer": "- Step 1: Without the step-up transformer, current in the transmission lines would be huge (e.g. ~4350 A for 1 MW at 230 V), and $$I^2R$$ losses would be catastrophic — most energy would heat the cables and never reach consumers. With the step-up transformer, current drops to ~4 A (at 250 kV), and $$I^2R$$ losses become tiny. The *savings* in transmission losses are enormous — orders of magnitude.\n- Step 2: The transformer itself loses maybe 1–5% of the power (copper losses, eddy currents, hysteresis, flux leakage). But this small percentage loss is *far* less than the hundreds-of-percent loss that would occur without stepping up the voltage. The trade-off is overwhelmingly worthwhile: lose ~2% in the transformer to save ~98% that would otherwise be wasted in the cables. It's like paying a small toll to avoid a road that would burn up your entire fuel tank.\n\nTransformer losses are a small tax; transmission losses without step-up are a catastrophic drain. The tax is worth paying.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": true}, {"question": "A beta particle (electron) enters a magnetic field at 70° to the field lines. Compare the force it experiences to the force it would experience at 90°. Is the ratio exactly $$\\sin 70°$$, and what does this mean qualitatively? (2 steps)", "answer": "- Step 1: The force at angle $$\\theta$$ is $$F = BQv\\sin\\theta$$, and the maximum force at 90° is $$F_{max} = BQv$$. The ratio is exactly $$F/F_{max} = \\sin\\theta$$. At $$\\theta = 70°$$: $$\\sin 70° \\approx 0.94$$, so the force is about 94% of the maximum — only slightly reduced. Even at 70°, the particle is nearly perpendicular to the field, so most of its velocity contributes to the force.\n- Step 2: Qualitatively, only the *component* of velocity perpendicular to the field ($$v\\sin\\theta$$) contributes to the magnetic force. At 70°, most of the velocity is perpendicular ($$v\\sin 70° \\approx 0.94v$$), so the force is nearly maximal. At 30°, only half the velocity would be perpendicular ($$\\sin 30° = 0.5$$), and the force would be halved. The angle acts as a \"effectiveness dial\" — closer to 90° means more of the velocity is doing useful work against the field.\n\n$$\\sin\\theta$$ is the \"effectiveness fraction\" — it tells you how much of the velocity is actually crossing the field lines.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "A coil is pulled out of a magnetic field region at constant speed. As it exits, the flux through the coil decreases. By Lenz's law, what effect does the induced current have on the *motion* of the coil, and where does the extra mechanical work you must do end up? (3 steps)", "answer": "- Step 1: The flux through the coil is decreasing (less field threading it as it leaves). By Lenz's law, the induced current creates a magnetic field that *opposes this decrease* — it tries to *maintain* the flux by creating a field in the *same direction* as the original field inside the coil.\n- Step 2: This induced field means the coil acts like a magnet that *attracts* itself back toward the field region — it resists being pulled out. You feel a *drag* force opposing your pulling motion. You must pull *harder* than you would against just friction — the magnetic opposition adds an extra resistive force.\n- Step 3: The extra mechanical work you do (force × distance, pulling against the magnetic drag) is exactly the energy that appears as electrical energy in the induced current (EMF × current × time). Energy conservation: your extra effort doesn't vanish — it becomes the electrical energy in the circuit. If Lenz's law didn't oppose you, the coil would slide out effortlessly and you'd get free electrical energy — conservation of energy forbids this.\n\nLenz's law makes extraction harder — the drag you feel is the \"price\" you pay for the electricity you generate. No free lunch.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": true}, {"question": "A student claims that in a transformer, \"the primary current directly flows through the iron core to reach the secondary.\" Explain why this is physically impossible and what actually connects the two coils. (2 steps)", "answer": "- Step 1: The primary and secondary coils are *electrically insulated* from each other and from the iron core. The iron core is laminated (each slice insulated from the next), and the coils are wound around the core but not connected to it. No charge can flow from primary to secondary through any conducting path — there is no electrical connection whatsoever.\n- Step 2: What connects them is the **changing magnetic field**. The primary's alternating current creates a changing field in the core; this changing field reaches the secondary and induces an EMF there by Faraday's law. The coupling is *magnetic*, not *electrical*. The iron core is a channel for *flux*, not for *current* — it's a magnetic bridge, not an electrical wire.\n\nThe iron core carries *field lines*, not *charge carriers*. The two coils talk through magnetism, not through electricity.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": true}, {"question": "A transformer steps up voltage from 100 V to 200 V. The primary current is 10 A. Assuming ideal efficiency, what is the secondary current, and what is the power on both sides? (2 steps)", "answer": "- Step 1: By power conservation: $$I_p V_p = I_s V_s$$, so $$I_s = \\frac{I_p V_p}{V_s} = \\frac{10 \\times 100}{200} = 5$$ A. The voltage doubled, so the current halved — inverse relationship. Power on both sides: $$P = IV = 10 \\times 100 = 1000$$ W on primary; $$5 \\times 200 = 1000$$ W on secondary. Same power, different V and I.\n- Step 2: This confirms the ideal transformer rule: power is conserved, voltage and current trade off inversely. The step-up transformer doesn't *create* energy — it just repackages it as higher voltage and lower current, which is the format that minimises transmission losses. The 1000 W is the same on both sides; it's just delivered at 200 V instead of 100 V.\n\nStep-up: $$V$$ doubles, $$I$$ halves, $$P$$ unchanged. The transformer is a repackager, not a power source.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "A wire in a magnetic field experiences no force when the current is parallel to the field. But a charged particle moving *parallel* to a field also experiences no force. Is the reason the same in both cases? Explain. (2 steps)", "answer": "- Step 1: Yes, the reason is the same in both cases. The magnetic force depends on the component of motion/current that is *perpendicular* to the field: $$F = BIL\\sin\\theta$$ for a wire, $$F = BQv\\sin\\theta$$ for a charge. When $$\\theta = 0°$$ (parallel), $$\\sin 0° = 0$$, so $$F = 0$$ in both formulas.\n- Step 2: The physical reason: the magnetic field only \"pushes sideways\" on moving charges — it never pushes along the field direction. A charge moving *along* the field lines is like a boat sailing directly downstream in a river — there's no lateral force to deflect it. A charge *crossing* the field lines is like a boat crossing the river — the current pushes it sideways. Whether the charge is in a wire or flying free, only the perpendicular component of its motion interacts with the field.\n\nBoth formulas share the same physics: the field only acts on the *perpendicular* component of motion. Parallel motion is invisible to $$B$$.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "When a magnet is pushed faster toward a coil, the induced EMF is larger. A student says \"this is because more flux passes through the coil.\" Is this correct? Explain the real reason. (2 steps)", "answer": "- Step 1: This is **incorrect**. More flux *does* pass through the coil when the magnet is closer, but the EMF depends on the *rate of change* of flux, not the total flux. Pushing faster doesn't change the total flux the coil eventually receives — it changes *how quickly* that flux arrives.\n- Step 2: The real reason: pushing faster means the flux through the coil changes *more rapidly* — $$\\frac{d\\Phi}{dt}$$ is larger because the same total change in flux happens in a shorter time. By Faraday's law $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$, a larger rate of change gives a larger EMF. It's like pouring water into a bucket: the bucket's fill level (flux) is the same regardless of speed, but the *flow rate* ($$d\\Phi/dt$$, which determines EMF) is faster if you pour quickly.\n\nFaster motion → faster flux change → larger EMF. The *speed* of change matters, not the *amount* of change.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": true}, {"question": "A DC motor and a DC dynamo both use a split-ring commutator, but for different purposes. What is the different purpose in each case? (2 steps)", "answer": "- Step 1: In a **DC motor**, the split-ring commutator reverses the current direction in the coil every half-turn, ensuring the *force* on the coil always pushes in the same rotational direction. Without it, the coil would oscillate back and forth (force reverses each half-turn with AC-like current). The commutator keeps the motor *spinning continuously* in one direction.\n- Step 2: In a **DC dynamo**, the split-ring commutator reverses the *external connection* every half-turn, ensuring the *output current* always flows in the same direction in the external circuit. The coil's internal current naturally reverses each half-turn (it's AC inside), but the commutator swaps the brushes at the right moment so the external circuit always sees the same polarity — producing DC output.\n\nMotor: commutator keeps force directional (internal current flips to maintain rotation direction). Dynamo: commutator keeps output directional (external connection flips to maintain current direction). Same device, opposite goal.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "The National Grid uses step-up transformers at the power station and step-down transformers near homes. If a single transmission cable has resistance $$R = 10$$ Ω and carries 4 A at 250 kV, what is the power lost as heat, and what fraction of the transmitted power is this? (2 steps)", "answer": "- Step 1: Power lost as heat: $$P_{loss} = I^2 R = 4^2 \\times 10 = 160$$ W. This is the energy dissipated as heat in the cable per second.\n- Step 2: Power transmitted: $$P = IV = 4 \\times 250\\,000 = 1\\,000\\,000$$ W = 1 MW. The fraction lost: $$160/1\\,000\\,000 = 0.00016 = 0.016\\%$$. Virtually all the power reaches the consumer. If the same 1 MW were transmitted at 230 V instead ($$I \\approx 4350$$ A), the loss would be $$4350^2 \\times 10 \\approx 189$$ MW — more than 189 times the power being transmitted! The cable would melt instantly.\n\nAt 250 kV: ~0.02% lost. At 230 V: >10000% lost (impossible — cable vaporises). High voltage makes transmission viable.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "A student says: \"A transformer with $$N_s = 2N_p$$ doubles the power as well as the voltage, because more turns means more energy.\" Explain why this violates physics and what actually happens to power. (2 steps)", "answer": "- Step 1: This violates **conservation of energy**. A transformer cannot create energy — it can only transfer it. Doubling the turns doubles the *voltage* (turns ratio), but the *current* halves (inverse turns ratio enforced by power conservation), so the power $$P = IV$$ stays exactly the same. $$V$$ goes up by 2, $$I$$ goes down by 2, $$P$$ is unchanged.\n- Step 2: The transformer is an energy *pass-through device*, not an energy source. It repackages energy (higher V, lower I) but cannot multiply it. If it could double power, you'd have a perpetual energy source — feed the output back to the input and get infinite energy. Physics forbids this. The iron core and coils are passive components; they have no energy of their own to add.\n\nTransformers trade voltage for current, but power is conserved. More turns ≠ more energy — just different packaging.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": true}, {"question": "Explain what \"hysteresis loss\" means in a transformer core, and why using *soft* iron (rather than hard/magnetised iron) minimises it. Use the analogy of bending a spring. (2 steps)", "answer": "- Step 1: Hysteresis loss is the energy dissipated each time the core is *magnetised and demagnetised*. In a transformer, the core's magnetic direction must flip every half-cycle (following the alternating field). This flipping costs energy — the atomic magnetic domains in the iron must be reoriented each time, and this reorientation isn't perfectly efficient. Some energy is lost as heat each cycle, like friction inside the material.\n- Step 2: The spring analogy: **soft iron** is like a *flexible spring* — easy to bend back and forth, low energy cost per cycle. **Hard iron** (permanent magnet material) is like a *stiff spring* — hard to bend, lots of energy dissipated as heat each time you force it to reverse direction. Soft iron \"goes with the flow,\" magnetising easily when the field pushes it and releasing easily when the field reverses. Hard iron fights the changes, wasting more energy as heat.\n\nSoft iron = flexible spring (low hysteresis). Hard iron = stiff spring (high hysteresis). The core must flex easily to follow the AC field.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": true}, {"question": "A rectangular coil with sides 4 cm × 2 cm and 100 turns sits in a 0.3 T field, initially with its plane parallel to the field (flux = 0). It is rotated 90° in 0.2 s to become perpendicular to the field. Estimate the average EMF induced during this rotation. (2 steps)", "answer": "- Step 1: Area $$A = 0.04 \\times 0.02 = 8 \\times 10^{-4}$$ m². Initial flux linkage = 0 (parallel, $$\\cos 90° = 0$$). Final flux linkage = $$BAN = 0.3 \\times 8 \\times 10^{-4} \\times 100 = 0.024$$ Wb turns. Change in flux linkage $$\\Delta(N\\Phi) = 0.024$$ Wb turns.\n- Step 2: Average EMF: $$\\varepsilon = \\frac{\\Delta(N\\Phi)}{\\Delta t} = \\frac{0.024}{0.2} = 0.12$$ V. This is the *average* EMF over the 0.2 s interval — the instantaneous EMF varies (it's sinusoidal), but the average gives a useful estimate. The key insight: EMF depends on *how fast* the flux changes — same coil, same field, but rotating faster (shorter $$\\Delta t$$) would give larger average EMF.\n\nAverage EMF = change in flux linkage / time. Faster rotation → larger EMF. The 0.12 V is a typical A-level-sized answer.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "A charged particle enters a magnetic field at an angle of 30° to the field lines (not perpendicular). Describe the shape of its trajectory — it is NOT a simple circle. Why? (3 steps)", "answer": "- Step 1: The velocity has two components: $$v_{\\perp} = v\\sin\\theta$$ (perpendicular to the field) and $$v_{\\parallel} = v\\cos\\theta$$ (parallel to the field). The perpendicular component experiences magnetic force and curves the particle; the parallel component experiences *no* force and continues straight.\n- Step 2: The result is a **helix** (spiral) — the particle circles in the plane perpendicular to the field (due to $$v_{\\perp}$$) while simultaneously drifting along the field direction (due to $$v_{\\parallel}$$). It's like a corkscrew path: circular motion + linear drift combined.\n- Step 3: The radius of the helical circle is $$r = \\frac{mv_{\\perp}}{BQ} = \\frac{mv\\sin\\theta}{BQ}$$ (smaller than the full perpendicular case because only $$v\\sin\\theta$$ contributes). The pitch (distance along the field per revolution) depends on $$v_{\\parallel} = v\\cos\\theta$$ and the period of circular motion. At $$\\theta = 90°$$, the helix collapses to a pure circle ($$v_{\\parallel} = 0$$). At $$\\theta = 0°$$, the helix collapses to a straight line ($$v_{\\perp} = 0$$).\n\nNon-perpendicular entry → helix (spiral). The particle both circles and drifts — two independent motions superimposed.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": true}], "count": 53}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "Magnetic flux density $$B$$ is defined operationally via the force on a current-carrying conductor. Why is an operational definition necessary, and what is the defining equation rearranged for $$B$$? (3 steps)", "answer": "- Step 1: An operational definition anchors an abstract quantity to a measurable procedure. We can't directly \"see\" $$B$$, but we *can* measure the force on a wire of known length carrying a known current perpendicular to a field. This makes $$B$$ experimentally meaningful.\n- Step 2: Starting from the force equation for a perpendicular conductor: $$F = BIL$$. Rearranging gives the defining equation: $$B = \\frac{F}{IL}$$. This tells us: 1 tesla is the flux density that produces 1 newton of force on 1 metre of wire carrying 1 ampere perpendicular to the field.\n- Step 3: The units confirm this: $$\\text{T} = \\text{N}/(\\text{A·m})$$. Typical reference values: Earth's field ≈ $$3.2 \\times 10^{-5}$$ T (very weak), fridge magnet ≈ $$5 \\times 10^{-3}$$ T. These give you an order-of-magnitude sense for \"weak\" vs \"everyday\" fields.\n\nThe key insight: $$B$$ is not defined by how many field lines you draw, but by the *force* those lines produce on a test current.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": true}, {"question": "Magnetic flux $$\\Phi$$ through an area depends on the angle $$\\theta$$. In the formula $$\\Phi = BA\\cos\\theta$$, what exactly does $$\\theta$$ represent, and why does a 90° angle give zero flux rather than maximum flux? (3 steps)", "answer": "- Step 1: $$\\theta$$ is the angle between the **magnetic field direction** and the **normal (perpendicular)** to the plane of the area — NOT the angle between the field and the surface itself. This is a common exam trap.\n- Step 2: The $$\\cos\\theta$$ factor picks out the component of $$B$$ that passes *through* the area. When $$\\theta = 0°$$, the field is parallel to the normal (i.e., perpendicular to the surface), so the full field threads through: $$\\Phi = BA$$. When $$\\theta = 90°$$, the field is parallel to the surface — it skims across without passing through — so $$\\Phi = 0$$.\n- Step 3: Visual intuition: imagine holding a hoop in a rain of magnetic field lines. When the hoop faces the rain squarely ($$\\theta = 0°$$), maximum lines pass through. When you turn it edge-on ($$\\theta = 90°$$), the rain passes by without entering the hoop.\n\nCommon trap: if the question says \"the field makes angle $$\\theta$$ with the *plane* of the coil,\" then the angle to the *normal* is $$90° - \\theta$$, and you must use $$\\Phi = BA\\cos(90° - \\theta) = BA\\sin\\theta$$.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "What is the physical distinction between magnetic flux $$\\Phi$$ and magnetic flux linkage $$N\\Phi$$, and why does the number of turns $$N$$ matter for a coil but not for a single loop? (2 steps)", "answer": "- Step 1: Magnetic flux $$\\Phi = BA\\cos\\theta$$ is the field threading a *single* area. It answers: \"how much field passes through this one loop?\" Flux linkage $$N\\Phi = BAN\\cos\\theta$$ is the total flux threading *all* turns of a coil. Each turn captures the same flux, so the total \"flux experience\" of the coil is $$N$$ copies of $$\\Phi$$.\n- Step 2: The distinction matters for induction. Faraday's law states $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$, not $$-\\frac{d\\Phi}{dt}$$. Each turn contributes its own induced EMF, and in a coil the EMFs add. A 100-turn coil in the same changing flux induces 100× the EMF of a single loop. This is why generators and transformers use many turns — it amplifies the output voltage.\n\nUnits distinction: flux is in weber (Wb); flux linkage is in weber-turns (Wb turns). They are not interchangeable.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "A rectangular coil sits in a uniform magnetic field. At one orientation, the flux through it is maximum; at another, it is zero. Describe both orientations and explain the physical reason for the difference. (2 steps)", "answer": "- Step 1: **Maximum flux** ($$\\Phi = BA$$) occurs when the magnetic field is perpendicular to the plane of the coil — equivalently, the field is parallel to the normal of the coil. The field lines pass straight through the full area of the coil.\n- Step 2: **Zero flux** ($$\\Phi = 0$$) occurs when the field is parallel to the plane of the coil — the field lines skim across the surface without passing through it. Think of it like wind blowing across an open window: if the wind is perpendicular to the window, maximum air flows through; if the wind blows parallel to the wall the window is in, no air enters.\n\nThis is critical for generators: as a coil rotates, it continuously sweeps between these two orientations, causing the flux to oscillate sinusoidally — which is what produces the alternating EMF.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "The force on a current-carrying conductor in a magnetic field is $$F = BIL\\sin\\theta$$. What does the angle $$\\theta$$ represent here, and what are the two extreme cases? (3 steps)", "answer": "- Step 1: $$\\theta$$ is the angle between the **direction of the current** (along the conductor) and the **direction of the magnetic field**. This is different from the $$\\theta$$ in the flux formula, which is measured from the normal to the area.\n- Step 2: **Maximum force** ($$F = BIL$$) when $$\\theta = 90°$$ — the current is perpendicular to the field. The interaction between the field produced by the current and the external field is strongest at right angles.\n- Step 3: **Zero force** ($$F = 0$$) when $$\\theta = 0°$$ — the current is parallel to the field. The two fields are aligned and don't \"push\" on each other. A wire carrying current along a magnetic field line feels no sideways force at all.\n\nTakeaway: the motor effect only works when there's a perpendicular component of current to the field. This is why motor coils are designed to carry current across field lines, not along them.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Why does a charged particle moving in a uniform magnetic field follow a circular path, and what determines the radius of that circle? (3 steps)", "answer": "- Step 1: The magnetic force on a moving charge is $$F = BQv\\sin\\theta$$. When the velocity is perpendicular to the field ($$\\theta = 90°$$), the force is $$BQv$$, and crucially, this force is always **perpendicular to the velocity**. A force perpendicular to velocity changes direction but not speed — exactly the condition for centripetal acceleration.\n- Step 2: Setting the magnetic force equal to the centripetal force: $$BQv = \\frac{mv^2}{r}$$. Solving for the radius: $$r = \\frac{mv}{BQ}$$. This is the cyclotron radius.\n- Step 3: Reading off the formula: faster particles ($$v$$ large) trace larger circles; heavier particles ($$m$$ large) trace larger circles; stronger fields ($$B$$ large) or higher charges ($$Q$$ large) bend the path more tightly (smaller $$r$$). This is how mass spectrometers separate particles by mass-to-charge ratio.\n\n+ Edge case: if the velocity has a component *along* the field, that component is unaffected (no force parallel to $$B$$), so the particle spirals (helix) rather than tracing a flat circle.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Fleming's left-hand rule uses three fingers for three quantities. Which finger corresponds to which quantity, and what is the most common mistake when applying it to electrons? (3 steps)", "answer": "- Step 1: The three mappings: **thuMb** = **M**otion (force); **First finger** = **F**ield (N→S); **seCond finger** = **C**onventional current (+→−). All three must be mutually perpendicular.\n- Step 2: The rule is used for the **motor effect** — when a current or moving charge experiences a force in a magnetic field. You use it when you know two of the three directions and need to find the third.\n- Step 3: **Common mistake with electrons**: the second finger represents *conventional* current (direction of positive charge flow). An electron moves opposite to conventional current. So for an electron moving to the right, point your second finger to the **left**. If you point it the same way as the electron's motion, you'll get the wrong force direction.\n\n+ Memory aid: \"Left = motor\" (you drive a motor with your left hand on the steering wheel, if you like mnemonics). Generators use the right hand.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "A U-magnet sits on a balance, and a current-carrying wire between its poles pushes the balance reading up by some amount. By Newton's third law, what can you deduce about the force on the wire, and how would you find the field direction? (3 steps)", "answer": "- Step 1: If the balance reads an increased downward force, the magnet is being pushed **down** onto the balance. By Newton's third law (every action has an equal and opposite reaction), the wire must be experiencing an equal and opposite force — **upward**. The force on the magnet and the force on the wire are a third-law pair.\n- Step 2: To find the field direction, apply Fleming's LHR. You know the force on the wire (upward) and the current direction (given). Arrange: thumb = force (up), second finger = current (given direction), then first finger = field direction.\n- Step 3: This setup is a practical way to measure $$B$$: from the balance reading you get the force $$F$$, you know $$I$$ and $$L$$, so $$B = F/(IL)$$. The balance essentially acts as a force meter for the motor effect.\n\n+ Common trap: students sometimes think the force on the magnet and the force on the wire are different. They are always equal and opposite — Newton's third law guarantees it, regardless of which one is \"causing\" the effect.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "Both $$F = BIL\\sin\\theta$$ and $$F = BQv\\sin\\theta$$ describe magnetic forces. What is the physical connection between these two formulas, and when must you use each? (3 steps)", "answer": "- Step 1: The connection is that current $$I$$ is a flow of charge. A conductor of length $$L$$ carrying current $$I$$ contains many charge carriers moving with drift velocity $$v$$. The force on the *whole wire* is the sum of the forces on all individual charges. If there are $$n$$ charge carriers per unit length, each with charge $$Q$$ and speed $$v$$, then the current is $$I = nQv$$ and the total force on the wire is $$F = B(nQv)L = BIL$$.\n- Step 2: Use **$$F = BIL\\sin\\theta$$** when dealing with a current in a *wire or conductor* of known length. Use **$$F = BQv\\sin\\theta$$** when dealing with an *isolated moving charge* (e.g., an electron beam, a proton in a particle accelerator, a beta particle).\n- Step 3: The angle convention is the same in both: $$\\theta$$ is between the direction of current/velocity and the magnetic field. Both give zero force when parallel, maximum force when perpendicular.\n\n+ Exam trap: don't substitute $$I = Q/t$$ into $$F = BIL$$ and expect it to reduce to $$F = BQv$$ directly — that substitution is incorrect because $$L/t \\neq v$$ in general. The derivation requires thinking about charge carriers per unit length.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "Electromagnetic induction produces an EMF. What three physical changes can cause the flux linkage through a circuit to change, and why does a stationary magnet near a coil induce nothing? (3 steps)", "answer": "- Step 1: The three ways to change flux linkage $$N\\Phi = BAN\\cos\\theta$$: (a) change $$B$$ — vary the magnetic field strength (e.g., move a magnet closer/further, or change the current in a nearby coil); (b) change $$A$$ — deform the circuit so the area in the field changes; (c) change $$\\theta$$ — rotate the coil relative to the field. Any one of these produces an induced EMF.\n- Step 2: A stationary magnet near a coil produces a constant $$B$$ through the coil, and since nothing is moving or changing, $$\\Phi$$ is constant. Faraday's law says $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$: if the flux linkage isn't changing, the derivative is zero, so no EMF.\n- Step 3: It is the **rate of change** of flux that matters, not the amount of flux. A huge but constant flux induces nothing; a tiny but rapidly changing flux can induce a large EMF.\n\n+ Misconception probe: \"The magnet is inside the coil, so there should be an induced current\" — wrong. Being inside means there's flux, but unless the magnet is *moving*, the flux isn't *changing*, so no EMF.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Faraday's law is $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$. Explain what each symbol means, and why the *rate of change* rather than the *amount* of flux determines the induced EMF. (3 steps)", "answer": "- Step 1: $$\\varepsilon$$ = induced EMF (volts); $$N$$ = number of turns; $$\\Phi$$ = magnetic flux through each turn (Wb); $$t$$ = time (s). The derivative $$d(N\\Phi)/dt$$ is the rate at which flux linkage changes — how fast the flux is increasing or decreasing.\n- Step 2: The physical reason rate matters: induction is about *work done* on charges. When a conductor moves through a field, charges inside it experience a magnetic force. The faster the conductor moves (or the faster the field changes), the more rapidly force is applied to the charges, and the greater the EMF (work per unit charge). A slow change barely pushes the charges; a fast change pushes them hard.\n- Step 3: The minus sign encodes Lenz's law — the induced EMF opposes the change that created it. This isn't just a sign convention; it's a statement about the direction of the induced current and its relationship to conservation of energy.\n\n+ Practical implication: the gradient of a flux-linkage-vs-time graph directly gives the magnitude of the induced EMF at each instant.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Lenz's law states that the induced current opposes the change that produced it. Explain how this is a consequence of conservation of energy, not just an arbitrary rule. (3 steps)", "answer": "- Step 1: Suppose Lenz's law were violated — suppose the induced current *reinforced* the change instead of opposing it. Then: you push a magnet toward a coil → the coil's induced current creates a magnetic field that *pulls the magnet in faster* → the faster-moving magnet induces an even larger current → which pulls the magnet even faster → runaway positive feedback.\n- Step 2: This would mean you could extract unlimited electrical energy from a tiny initial push. That violates conservation of energy. The induced current would be creating energy from nothing.\n- Step 3: Lenz's law prevents this: the induced current creates a force that *opposes* the motion, so you must do mechanical work against that opposing force. The electrical energy produced equals the mechanical work you put in. Energy is conserved. The minus sign in $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$ is nature's way of enforcing this.\n\n+ Concrete example: pushing a N pole into a coil induces a current that creates a N pole on the near face — N–N repulsion means you must push *against* a repulsive force. The harder you push, the more current is induced, and the harder you must work.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "Fleming's right-hand rule is used for generators, and the left-hand rule for motors. What is the physical reason for this distinction — why can't you use the same hand for both? (3 steps)", "answer": "- Step 1: In a **motor**, you supply current through a field and get *force* (motion). Known: current and field. Unknown: force direction. The left-hand rule maps these three vectors correctly for the motor effect.\n- Step 2: In a **generator**, you supply motion through a field and get *induced current*. Known: motion and field. Unknown: current direction. The right-hand rule maps these correctly for the generator effect. The induced current flows in the direction that would create a force *opposing* the motion (Lenz's law).\n- Step 3: If you used the same hand for both, Lenz's law would be violated — the generator would produce current that *helps* the motion rather than opposing it. The switch from left to right hand is precisely the geometric expression of Lenz's law: the induced current creates a force that opposes the motion that created it, which flips one axis relative to the motor case.\n\n+ Memory aid: **Left = motor** (current → force), **Right = generator** (motion → current). \"You drive a motor with your left, you generate with your right.\"", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "A coil rotates in a uniform magnetic field. At the instant the coil is perpendicular to the field (maximum flux), the induced EMF is zero. At the instant the coil is parallel to the field (zero flux), the EMF is maximum. Explain why maximum flux and maximum EMF never coincide. (3 steps)", "answer": "- Step 1: Faraday's law: $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$. The EMF depends on the *rate of change* of flux, not the flux itself. This is the crucial distinction.\n- Step 2: When the coil is perpendicular to the field, $$\\Phi$$ is at its peak value. At a maximum of any smooth curve, the gradient (rate of change) is zero — think of the top of a sine wave, where it momentarily flattens. So $$d\\Phi/dt = 0$$, and $$\\varepsilon = 0$$. The flux is large but *not changing*.\n- Step 3: When the coil is parallel to the field, $$\\Phi$$ is passing through zero. A sine wave crosses zero with its *steepest* gradient — the flux is changing most rapidly at this instant. So $$d\\Phi/dt$$ is maximum, and $$\\varepsilon$$ is maximum. The flux is zero but *changing the fastest*.\n\n+ Misconception probe: \"More flux means more EMF\" — wrong. More *change* in flux means more EMF. This is the single most tested concept in generator questions.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "An alternator (AC generator) uses slip rings, while a dynamo (DC generator) uses a split-ring commutator. What is the physical difference between these two connectors, and how does each affect the output waveform? (3 steps)", "answer": "- Step 1: **Slip rings** are two continuous, smooth rings. Each end of the rotating coil is permanently connected to one ring, and each ring maintains continuous contact with its own brush. As the coil rotates, the current direction in the coil reverses every half-turn, and because the connections never swap, this reversal is transmitted directly to the external circuit → **alternating current** output.\n- Step 2: **Split-ring commutator** is a single ring split into two halves with a gap. Each half is connected to one end of the coil. Every half-turn, the gap passes the brushes, which *swaps* which brush contacts which half-ring. This swap reverses the external connection at exactly the moment the coil current reverses, so the external current always flows in the same direction → **direct current** output (bumpy, but all one sign).\n- Step 3: The waveforms: alternator produces a smooth sine wave oscillating above and below zero. Dynamo produces a rectified sine wave — all positive humps (or all negative, depending on orientation). Both have the same frequency and peak value for the same coil and rotation speed; only the sign convention in the external circuit differs.\n\n+ Edge case: the dynamo's DC output is not smooth — it pulses. Real DC motors/generators use multiple coil windings offset at different angles to smooth the output.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "The EMF of an AC generator is $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$. Where does the $$\\omega$$ in the amplitude come from physically, and what happens to both the amplitude and frequency of the output if you double the rotation speed? (3 steps)", "answer": "- Step 1: The flux linkage is $$N\\Phi = BAN\\cos(\\omega t)$$. By Faraday's law, $$\\varepsilon = -\\frac{d(N\\Phi)}{dt} = BAN\\omega\\sin(\\omega t)$$. The $$\\omega$$ appears because differentiating $$\\cos(\\omega t)$$ brings down a factor of $$\\omega$$ — faster rotation means the flux changes more rapidly, so the induced EMF is larger.\n- Step 2: If you double the rotation speed ($$\\omega \\to 2\\omega$$): the amplitude $$\\varepsilon_{\\max} = BAN\\omega$$ **doubles** (because the rate of flux change doubles), AND the frequency $$f = \\omega/(2\\pi)$$ also **doubles** (because the coil completes twice as many cycles per second).\n- Step 3: This is a key result: increasing rotation speed increases *both* the amplitude and frequency simultaneously. You cannot increase one without the other in a simple generator. The peak EMF is proportional to $$\\omega$$, and the frequency of the AC output equals the rotation frequency.\n\n+ Simple mental check: if $$f = 50$$ Hz gives $$\\varepsilon_{\\max} = 300$$ V, then $$f = 100$$ Hz gives $$\\varepsilon_{\\max} = 600$$ V. Both double.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "A simple DC motor uses a split-ring commutator. Explain why the commutator is essential for continuous rotation — what would happen without it? (3 steps)", "answer": "- Step 1: In a motor, current flows through a coil in a magnetic field, creating a force that rotates the coil (Fleming's LHR). Without a commutator, the current direction in the coil stays fixed. As the coil passes the vertical position (half-turn), the sides of the coil that were being pushed up are now being pushed down — but since the current hasn't reversed, the force now *opposes* continued rotation.\n- Step 2: The commutator reverses the current direction in the coil every half-turn, at exactly the moment the coil passes the vertical. This ensures that the force on each side of the coil always acts to continue rotation in the same direction, rather than trying to reverse it.\n- Step 3: Without the commutator, the coil would oscillate back and forth around the vertical position (like a pendulum) rather than spinning continuously. The commutator converts the oscillation into unidirectional rotation by \"flipping\" the current at the right moment.\n\n+ The commutator in a motor serves the same physical role as in a dynamo — it swaps connections every half-turn. In a motor, it ensures continuous torque; in a generator, it ensures unidirectional external current.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "How do you control the speed and direction of rotation of a DC motor, and what is the physical reason each method works? (3 steps)", "answer": "- Step 1: **Direction control**: reverse the current direction through the coil. This can be done by swapping the battery polarity (swap + and −). Reversing the current reverses the force on each side of the coil (Fleming's LHR: if current flips, force flips), so the torque reverses and the motor spins the other way.\n- Step 2: **Speed control**: increase the current to increase speed. Greater current → greater force ($$F = BIL$$) → greater torque → faster rotation. Practically: use a higher voltage battery, reduce the circuit resistance, or add more turns to the coil.\n- Step 3: Alternative speed methods: increase the magnetic field strength $$B$$ (if using electromagnets rather than permanent magnets), or reduce the load on the motor. With permanent magnets, $$B$$ is fixed, so speed scales primarily with current.\n\n+ Misconception: \"More turns = slower because it's heavier.\" In practice, more turns means more current-carrying wire in the field, which increases torque more than it increases mass, so the motor speeds up (or can carry a greater load at the same speed).", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "State the five-stage causal chain for how a transformer works, in the exact order required at A-level. Why must each stage follow from the previous one? (5 steps)", "answer": "- Step 1: **Alternating input voltage** is applied across the primary coil. This must be AC — a constant DC voltage would eventually give a constant field and no induction.\n- Step 2: The AC voltage drives an **alternating current** in the primary coil. The current reverses direction each half-cycle; electrons oscillate rather than flowing one way.\n- Step 3: The alternating current produces a **changing (alternating) magnetic field** in the primary coil and iron core. A constant current would give a constant field → no change → no induction. The *change* in the field is what matters.\n- Step 4: The changing magnetic field links through the iron core to the secondary coil, creating a **changing flux linkage** in the secondary. The iron core channels the field efficiently between the two coils.\n- Step 5: By Faraday's law, the changing flux linkage **induces an alternating voltage** in the secondary coil. If the secondary is in a complete circuit, this drives an **alternating current** at the same frequency as the input.\n\n+ Key exam point: you must use the word \"change\" or \"changing\" when describing the flux linkage. \"Flux in the secondary\" alone is not enough — it's the *changing* flux that induces the EMF. Missing this word costs marks.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "A transformer only works with AC, not steady DC. However, when DC is first switched on, there is a brief momentary EMF in the secondary. Explain what happens at switch-on, during steady DC, and at switch-off. (3 steps)", "answer": "- Step 1: **Switch-on**: the current in the primary rises from zero to its steady value. During this rise, the magnetic field is *building up* — the flux linkage in the secondary is *changing* (increasing). By Faraday's law, this changing flux induces a momentary EMF in the secondary.\n- Step 2: **Steady DC**: the current is constant, the magnetic field is constant, and the flux linkage is constant. Since $$d(N\\Phi)/dt = 0$$, the induced EMF is **zero**. The secondary produces no output while the DC is steady.\n- Step 3: **Switch-off**: the current drops to zero, the magnetic field collapses, and the flux linkage *decreases* rapidly. This is another change in flux, so a momentary EMF is induced — but in the **opposite direction** to the switch-on EMF (because the flux is decreasing rather than increasing).\n\n+ This behaviour confirms that it's the *change* in flux, not the flux itself, that induces EMF. A transformer fed with DC would give only brief pulses at switch-on and switch-off, with no output in between — useless for power transmission.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "The transformer turns ratio is $$\\frac{V_1}{V_2} = \\frac{N_1}{N_2}$$. Derive the intuition for why doubling the number of turns on the secondary doubles the output voltage. (3 steps)", "answer": "- Step 1: Each turn of the secondary coil experiences the same changing flux linkage (they're all wrapped around the same core). By Faraday's law, each turn has the same induced EMF — call it $$\\varepsilon_0$$ per turn.\n- Step 2: The total EMF in the secondary is the sum over all turns: $$V_2 = N_2 \\times \\varepsilon_0$$. Similarly, the primary has $$V_1 = N_1 \\times \\varepsilon_0$$ (the same flux change links both coils through the shared core).\n- Step 3: Dividing: $$\\frac{V_1}{V_2} = \\frac{N_1 \\varepsilon_0}{N_2 \\varepsilon_0} = \\frac{N_1}{N_2}$$. Doubling $$N_2$$ doubles the number of turns each contributing $$\\varepsilon_0$$, so the total output voltage doubles. More turns = more \"votes\" for voltage.\n\n+ This also explains why a step-up transformer ($$N_2 > N_1$$) increases voltage: the secondary has more turns, each contributing the same per-turn EMF, so the total is higher.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "For an ideal transformer, $$I_1 V_1 = I_2 V_2$$. Combine this with the turns ratio to show that the current ratio is the *inverse* of the turns ratio, and explain physically why stepping up voltage must step down current. (3 steps)", "answer": "- Step 1: From power conservation: $$I_1 V_1 = I_2 V_2$$, so $$\\frac{I_1}{I_2} = \\frac{V_2}{V_1}$$. From the turns ratio: $$\\frac{V_2}{V_1} = \\frac{N_2}{N_1}$$. Substituting: $$\\frac{I_1}{I_2} = \\frac{N_2}{N_1}$$. The current ratio is the **inverse** of the turns ratio.\n- Step 2: Physical reasoning: if you step up the voltage (more turns on secondary), each coulomb of charge delivers more energy ($$V$$ is energy per coulomb). But the total power is fixed (conservation of energy). So if each coulomb carries more energy, fewer coulombs per second are needed — the current must decrease.\n- Step 3: This is the whole point of the National Grid: step up voltage → step down current → reduce $$I^2R$$ heating losses in cables. You're trading high current (which wastes energy as heat) for high voltage (which doesn't heat the wires).\n\n+ Simple check: if a step-up transformer doubles the voltage ($$V_2 = 2V_1$$), it halves the current ($$I_2 = I_1/2$$). Power is conserved: $$I_1 V_1 = (I_1/2)(2V_1) = I_1 V_1$$. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "Why is the iron core of a transformer laminated (split into insulated slices), and what would happen if it were a single solid block? (3 steps)", "answer": "- Step 1: The iron core conducts electricity and sits inside a changing magnetic field. By Faraday's law, a changing flux through a conductor induces an EMF. In a solid block of iron, this EMF drives circulating currents called **eddy currents** — loops of current flowing within the iron itself.\n- Step 2: These eddy currents dissipate energy as heat ($$P = I^2R$$ heating). This is wasted energy that doesn't reach the secondary coil — it reduces the transformer's efficiency and can cause overheating.\n- Step 3: Lamination splits the core into thin, electrically insulated slices. Eddy currents are confined within each slice and cannot## Q1\n**Q:** A magnetic field has a flux density $$B$$ of 2 T. If you place a 1 m wire carrying 1 A perpendicular to this field, what force do you get, and how does this *define* the tesla? (2 steps)\n\n**A:** - Step 1: Using $$F = BIL \\sin \\theta$$ with $$\\theta = 90°$$ (perpendicular), $$\\sin 90° = 1$$, so $$F = 2 \\times 1 \\times 1 = 2$$ N. The force is directly proportional to $$B$$, $$I$$, and $$L$$.\n- Step 2: This is exactly how the tesla is defined: 1 T is the flux density that produces a force of 1 N on a 1 m wire carrying 1 A perpendicular to the field. So $$B = F/(IL)$$ is the defining equation, not just a rearrangement — the tesla is a *derived* unit built from newtons, amps, and metres.\n\nThe tesla is surprisingly strong: Earth's field is only ~0.032 mT, and a fridge magnet is ~5 mT. A 2 T field requires an electromagnet.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "Magnetic flux $$\\Phi$$ is defined as $$\\Phi = BA \\cos \\theta$$. What does the angle $$\\theta$$ represent, and what happens at $$\\theta = 0°$$ vs $$\\theta = 90°$$? (2 steps)", "answer": "- Step 1: $$\\theta$$ is the angle between the **magnetic field lines** and the **normal (perpendicular)** to the surface area — NOT the angle between the field and the surface itself. This is a classic exam trap.\n- Step 2: At $$\\theta = 0°$$, the field is perpendicular to the area (parallel to the normal), so $$\\cos 0° = 1$$ and flux is **maximum** ($$\\Phi = BA$$). At $$\\theta = 90°$$, the field is parallel to the area (skimming along it), so $$\\cos 90° = 0$$ and flux is **zero** — no field lines pass *through* the area.\n\nVisual: imagine holding a hula hoop in the rain. When it's flat ($$\\theta = 0°$$, normal aligned with rain), maximum rain passes through. When it's edge-on ($$\\theta = 90°$$), no rain passes through.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Why do we need the concept of \"flux linkage\" $$N\\Phi$$ instead of just flux $$\\Phi$$? What physical difference does having more turns make? (2 steps)", "answer": "- Step 1: A single turn of wire cutting through changing flux gets one induced EMF. But if you have $$N$$ turns, each turn experiences the same changing flux, and the EMFs add up — each turn is like an additional battery in series. So the total induced EMF scales with $$N$$.\n- Step 2: Flux linkage $$N\\Phi = BAN$$ captures this. Faraday's law is $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$, not just $$-\\frac{d\\Phi}{dt}$$. Doubling the turns doubles the flux linkage and therefore doubles the induced EMF (for the same rate of change). This is why generator coils and transformer coils have many turns rather than one.\n\nUnit: weber-turns (Wb turns) — it's not just weber, because the number of turns is dimensionless but physically significant.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "A rectangular coil sits in a uniform magnetic field. The field makes an angle of 30° with the *plane* of the coil. What is the flux through the coil — is it $$BA \\cos 30°$$ or $$BA \\cos 60°$$? (2 steps)", "answer": "- Step 1: The formula uses the angle between the field and the **normal** to the coil, not the field and the coil plane itself. If the field makes 30° with the plane, it makes $$90° - 30° = 60°$$ with the normal.\n- Step 2: Therefore $$\\theta = 60°$$ and $$\\Phi = BA \\cos 60° = BA \\times 0.5$$. If you mistakenly used $$\\cos 30° \\approx 0.87$$, you'd get a much larger flux — a significant error. Always draw the normal first, then measure the angle from that.\n\nThis is the #1 angle trap in exams. The question might say \"angle to the plane\" or \"angle to the normal\" — read carefully.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "A wire carrying current $$I$$ sits in a magnetic field $$B$$. The force on it is $$F = BIL \\sin \\theta$$. Why is there a $$\\sin \\theta$$ — what's the physical intuition for why the angle matters? (3 steps)", "answer": "- Step 1: Only the component of the current that cuts *across* the field lines produces a force. If the current flows parallel to the field, it doesn't \"cut through\" any lines — no interaction, no force.\n- Step 2: The perpendicular component of the current (relative to the field) is $$I \\sin \\theta$$. Think of it as projecting the current direction onto the direction perpendicular to the field. This is why $$F \\propto \\sin \\theta$$.\n- Step 3: At $$\\theta = 90°$$ (current perpendicular to field), $$\\sin 90° = 1$$, maximum force. At $$\\theta = 0°$$ (current parallel to field), $$\\sin 0° = 0$$, zero force. The wire simply \"slides along\" the field without interacting.\n\nVisual: imagine running through a forest of vertical poles. If you run perpendicular to them, you bump into many. If you run parallel to the rows, you miss them all.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "There are two force formulas: $$F = BIL \\sin \\theta$$ and $$F = BQv \\sin \\theta$$. Conceptually, why are there *two* different formulas, and how are they related? (3 steps)", "answer": "- Step 1: $$F = BIL \\sin \\theta$$ applies to a **current-carrying conductor** (a wire) where current is a continuous flow of many charges through a macroscopic length $$L$$. $$F = BQv \\sin \\theta$$ applies to a **single isolated moving charge** (like an electron or proton) with charge $$Q$$ and velocity $$v$$.\n- Step 2: They are actually the same physics. Current $$I = Q/t$$, and in a wire, $$v = L/t$$ (drift velocity times time gives length). So $$BIL = B(Q/t)(vt) = BQv$$. The wire formula is just the single-charge formula summed over all the charges in length $$L$$.\n- Step 3: The key practical difference: for a wire, you know $$I$$ and $$L$$; for a particle beam, you know $$Q$$ and $$v$$. Use whichever matches the information given. Don't mix them — never substitute $$I$$ into the particle formula or $$v$$ into the wire formula.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": true}, {"question": "When using Fleming's Left-Hand Rule, what does each finger represent, and why must you use *conventional* current? (2 steps)", "answer": "- Step 1: **thuMb** = Motion (force direction); **First finger** = Field direction (N→S); **seCond finger** = Current direction (conventional, +→−). Hold all three mutually perpendicular — that's the geometry of the cross product $$\\vec{F} = I\\vec{L} \\times \\vec{B}$$.\n- Step 2: Conventional current is the flow of **positive** charge. This matters because if you're dealing with electrons (negative charges), their physical motion is *opposite* to conventional current. Point your second finger in the *opposite* direction to the electron's velocity. If you forget this, your force direction will be wrong.\n\nThe rule was established before electrons were discovered, so it's locked into \"positive charge flow\" convention.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "A proton enters a uniform magnetic field perpendicular to its velocity. Why does it travel in a circle, and what determines the radius? (3 steps)", "answer": "- Step 1: The magnetic force $$F = BQv$$ is always **perpendicular** to the velocity. A force perpendicular to motion doesn't speed up or slow down the particle — it only changes its direction. This is exactly the condition for circular motion.\n- Step 2: The magnetic force acts as the centripetal force: $$BQv = \\frac{mv^2}{r}$$. Rearranging: $$r = \\frac{mv}{BQ}$$. The radius depends on mass, speed, field strength, and charge.\n- Step 3: Intuition for the formula: faster particles ($$v$$↑) have more inertia and curve less → larger $$r$$. Stronger field ($$B$$↑) or larger charge ($$Q$$↑) pulls harder → tighter curve → smaller $$r$$. Heavier particles ($$m$$↑) resist direction change → larger $$r$$. Each variable's effect follows from $$r = mv/(BQ)$$.\n\nThe particle doesn't spiral inward because the magnetic force does no work — it's always ⊥ to displacement, so kinetic energy (and speed) stay constant.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "A stationary magnet sits inside a coil. Is there an induced EMF? What if the magnet is moving? Why the difference? (2 steps)", "answer": "- Step 1: A stationary magnet produces a **constant** flux through the coil. Since $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$, and the flux isn't changing, the rate of change is zero → **no induced EMF**. It doesn't matter how strong the field is; only the *change* matters.\n- Step 2: A moving magnet changes the flux through the coil over time. The faster the magnet moves, the faster the flux changes, the larger the induced EMF. This is the core of electromagnetic induction: **mechanical motion → changing flux → electrical energy**.\n\nMisconception trap: \"stronger field = more EMF\" is wrong. \"Faster *change* in field = more EMF\" is correct.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "Faraday's law states $$\\varepsilon = -N\\frac{\\Delta\\Phi}{\\Delta t}$$. What does the negative sign represent, and what physical principle does it enforce? (2 steps)", "answer": "- Step 1: The negative sign represents **Lenz's law**: the induced EMF drives a current whose magnetic field *opposes* the change in flux that produced it. If flux is increasing, the induced current creates a field to reduce it; if flux is decreasing, the induced current creates a field to sustain it.\n- Step 2: This is **conservation of energy**. If the induced current *reinforced* the change (instead of opposing it), you'd get a runaway positive feedback — more current → more flux change → more current → unlimited energy from nothing. Lenz's law prevents this. You must do work to push a magnet into a coil; that work becomes the electrical energy of the induced current.\n\nIn calculations, you often use the magnitude $$|\\varepsilon| = N\\frac{\\Delta\\Phi}{\\Delta t}$$ and determine direction separately via Lenz's law or Fleming's RHR.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "Fleming's Right-Hand Rule is used for generators. How do the fingers map, and when do you use the right hand instead of the left? (2 steps)", "answer": "- Step 1: **thuMb** = Motion (direction the conductor moves); **First finger** = Field (N→S); **seCond finger** = induced Current. Same finger assignments as the left-hand rule, but for the **opposite** physical situation.\n- Step 2: Use the **left** hand when you know the current and want the force (motor: electrical → mechanical). Use the **right** hand when you know the motion and want the induced current (generator: mechanical → electrical). Mnemonic: **L**eft = motor (e**L**ectrical input), **R**ight = generator (mechanical input, like **R**otating).\n\nDon't mix them in the exam — if you apply the wrong hand, your current or force direction will be reversed.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "An alternator and a dynamo both have a coil rotating in a magnetic field. What single structural difference produces AC in one and DC in the other? (3 steps)", "answer": "- Step 1: The coil's EMF naturally alternates — as it rotates, each side of the coil swings through the field in one direction, then the other, reversing the EMF every half-turn. The raw output is always AC.\n- Step 2: An **alternator** uses **slip rings** — smooth, continuous rings that maintain constant electrical cont
