rade-off: add manufacturing cost but increase η (efficiency >95%).  \n**Edge case**: High-frequency transformers use powdered iron (even smaller eddy currents).", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}], "count": 15}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Define magnetic flux density (B). What is its unit, and how is it related to the force on a current-carrying conductor? (2 steps)", "answer": "- Step 1: Magnetic flux density B is the strength of a magnetic field, measured in tesla (T). It represents the density of magnetic field lines at a point.\n- Step 2: B is defined via the force equation F = BIL sin θ, where I is current, L is length of conductor in the field, and θ is the angle between conductor and field. Rearranging gives B = F/(IL) when θ = 90°.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "What is magnetic flux (Φ), and why does Φ = BA cos θ rather than just BA in general? (2 steps)", "answer": "- Step 1: Magnetic flux Φ is the amount of magnetic field passing perpendicularly through an area, measured in weber (Wb).\n- Step 2: The cos θ accounts for the angle between the field lines and the *normal* (perpendicular) to the area. When the field is perpendicular to the area (θ = 0°), cos 0 = 1 and Φ = BA (maximum). When the field is parallel to the area (θ = 90°), cos 90° = 0 and Φ = 0.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "A rectangular coil lies flat on a table. A uniform magnetic field is directed vertically upward. What is the magnetic flux through the coil? Explain using the definition of flux. (2 steps)", "answer": "- Step 1: The angle θ between the field lines and the *normal* to the coil's plane is 90° (since field is upward, normal is vertical, but they're aligned). Wait — for a flat coil on a table, the normal points upward. If field is upward, θ = 0°.\n- Step 2: Since θ = 0°, cos 0° = 1, so Φ = BA (maximum flux). The field passes straight through the coil perpendicular to its area.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What is magnetic flux linkage (NΦ)? Why do we multiply flux by the number of turns N in a coil? (2 steps)", "answer": "- Step 1: Magnetic flux linkage = NΦ = BAN, measured in weber-turns (Wb turns). It is the total flux linked with all turns of a coil.\n- Step 2: Each turn of the coil experiences the same changing flux. With N turns, the total induced EMF is N times greater than for a single turn (by Faraday's law, ε ∝ NΔΦ/Δt), so we use flux linkage to account for all turns.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "State the formula for the force on a current-carrying conductor in a magnetic field. Under what condition is this force maximum, and when is it zero? (2 steps)", "answer": "- Step 1: F = BIL sin θ, where B = magnetic flux density (T), I = current (A), L = length of conductor in field (m), θ = angle between conductor and field lines.\n- Step 2: Maximum force F = BIL occurs when θ = 90° (conductor perpendicular to field). Zero force occurs when θ = 0° (conductor parallel to field).", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A charged particle moves parallel to a uniform magnetic field. What force does it experience? Explain why. (2 steps)", "answer": "- Step 1: The force is zero. Using F = BQv sin θ, when the velocity is parallel to the field, θ = 0°, so sin 0° = 0, giving F = 0.\n- Step 2: This is because the magnetic force acts perpendicular to both the velocity and the field direction. When v is parallel to B, there is no perpendicular component to experience a force.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Explain why a charged particle moving in a uniform magnetic field follows a circular path. What provides the centripetal force? (2 steps)", "answer": "- Step 1: The magnetic force on a moving charge is always perpendicular to its velocity (F = BQv when θ = 90°). A force perpendicular to motion changes the direction of velocity but not its speed — this is the definition of centripetal force.\n- Step 2: Since F is always perpendicular to v, the particle moves in a circle (or spiral). Equating magnetic force to centripetal: BQv = mv²/r, giving r = mv/(BQ).", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Describe Fleming's left-hand rule and explain what each finger represents. When is this rule used? (2 steps)", "answer": "- Step 1: Fleming's left-hand rule: ThuMb = Motion/Force, First finger = Field (N→S), seCond finger = Conventional current (+→−). Point these three fingers mutually perpendicular.\n- Step 2: It is used for the **motor effect** — when a current-carrying conductor is in a magnetic field, this rule predicts the direction of the force on the conductor.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "A wire carries current horizontally from left to right, and the magnetic field points into the page. Using Fleming's left-hand rule, in what direction is the force on the wire? (2 steps)", "answer": "- Step 1: First finger (field) points into the page. Second finger (current) points right (left→right).\n- Step 2: With these two directions, Fleming's left-hand rule gives the thumb (force) pointing **upward**.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "What is electromagnetic induction? What must happen for an EMF to be induced in a circuit? (2 steps)", "answer": "- Step 1: Electromagnetic induction is the phenomenon where an EMF is induced in a conductor or circuit when the magnetic flux (linkage) through it changes.\n- Step 2: An EMF is induced only when there is a **change** in magnetic flux — either by moving a conductor through a field, moving a magnet relative to a coil, or changing the current in a linked coil. A stationary magnet near a coil produces no EMF.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "State Faraday's law of electromagnetic induction in equation form. What does each symbol represent, and what does the negative sign signify? (2 steps)", "answer": "- Step 1: ε = −N ΔΦ/Δt (or ε = −d(NΦ)/dt), where ε = induced EMF (V), N = number of turns, Φ = magnetic flux (Wb), t = time (s).\n- Step 2: The negative sign represents **Lenz's law** — the induced EMF acts in a direction to oppose the change that produced it. This ensures conservation of energy.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A bar magnet is pushed N-pole-first into a coil. Using Lenz's law, explain what happens and why. (3 steps)", "answer": "- Step 1: The approaching N pole causes an increase in flux through the coil.\n- Step 2: By Lenz's law, the induced current must create a magnetic field that **opposes** this change — so the coil's near face becomes an N pole (to repel the incoming magnet).\n- Step 3: This creates a repulsive force on the magnet, opposing its motion. Mechanical work must be done to overcome this opposition — this work becomes the electrical energy induced.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "A coil is rotated in a uniform magnetic field. At one instant the coil is perpendicular to the field (maximum flux), and at another it is parallel (zero flux). At which position is the induced EMF maximum, and at which is it minimum? Explain why. (2 steps)", "answer": "- Step 1: EMF is **maximum** when the coil is **parallel** to the field (flux = 0), and **minimum** (zero) when the coil is **perpendicular** to the field (maximum flux).\n- Step 2: EMF depends on the *rate of change* of flux (dΦ/dt), not the flux itself. When flux is maximum, it's momentarily stationary (turning point), so dΦ/dt = 0. When flux is zero but changing fastest, dΦ/dt is maximum.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "What is the difference between an alternator (AC generator) and a dynamo (DC generator)? How does each produce its output type? (2 steps)", "answer": "- Step 1: An **alternator** uses **slip rings** — continuous rings that maintain contact as the coil rotates, allowing the current to reverse direction each half-turn, producing AC.\n- Step 2: A **dynamo** uses a **split-ring commutator** — a ring with a gap that disconnects and reconnects the circuit each half-turn, reversing the connections to keep current flowing in the same external direction, producing DC (a bumpy but all-positive waveform).", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Write the equation for the EMF generated by a rotating coil in a magnetic field. Define each symbol and explain what ε_max represents. (2 steps)", "answer": "- Step 1: ε = BANω sin(ωt), where B = magnetic flux density (T), A = area of coil (m²), N = number of turns, ω = angular speed (rad/s), t = time (s).\n- Step 2: ε_max = BANω is the peak EMF. This occurs when sin(ωt) = 1 (at the instant the coil is parallel to the field, flux = 0 but changing fastest).", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "If you double the rotation frequency of an AC generator, what happens to (a) the frequency of the AC output, and (b) the amplitude of the output voltage? Explain. (2 steps)", "answer": "- Step 1: (a) The frequency of the AC output **doubles** — frequency of rotation equals frequency of the induced AC.\n- Step 2: (b) The amplitude also doubles because ε_max = BANω, and ω = 2πf. Doubling f doubles ω, which doubles ε_max.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Describe the motor effect. How does a simple DC motor work, and what keeps the coil rotating in the same direction? (2 steps)", "answer": "- Step 1: The motor effect is the force experienced by a current-carrying conductor in a magnetic field (F = BIL).\n- Step 2: In a DC motor, a coil spins in a magnetic field. A **split-ring commutator** reverses the connections every half-turn, so the current direction in the coil flips when the coil passes the vertical position, keeping the force direction such that rotation continues in the same direction.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "How can you reverse the direction of rotation of a DC motor? How can you increase its speed? (2 steps)", "answer": "- Step 1: Reverse the **direction of current** by swapping the battery polarity (reversing + and −). This reverses the force direction, so the motor spins the opposite way.\n- Step 2: Increase the **current** (stronger battery) or increase the **magnetic field strength** (stronger magnets). Since F = BIL, increasing I or B increases the force, making the motor spin faster.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A DC motor is spinning. If you suddenly reverse the battery polarity while it's running, what happens briefly? Explain using physics. (2 steps)", "answer": "- Step 1: The motor will briefly slow down and may stop, then reverse direction.\n- Step 2: Reversing polarity reverses the current, which reverses the force direction. Since the coil has momentum, for a brief moment the force now acts as a brake (opposing motion), slowing it before it accelerates in the opposite direction.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "A transformer has 100 turns on the primary coil and 500 turns on the secondary. Is this a step-up or step-down transformer? If the input voltage is 230 V, what is the output voltage? (2 steps)", "answer": "- Step 1: This is a **step-up** transformer because N_s > N_p (500 > 100).\n- Step 2: Using V₁/V₂ = N₁/N₂: 230/V₂ = 100/500 ⇒ V₂ = 230 × 5 = 1150 V.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Why do transformers only work with AC, not DC? What would happen if you applied a steady DC voltage to the primary? (2 steps)", "answer": "- Step 1: Transformers require a **changing magnetic flux** to induce an EMF in the secondary. DC produces a constant current → constant magnetic field → no change in flux → zero induced EMF.\n- Step 2: When DC is first switched on or off, there is a momentary change in flux, so a brief pulse of induced EMF occurs. But while DC is steady, no output is produced.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Describe the five-stage causal chain by which a transformer works, starting from the input. Why must each stage involve \"alternating\" or \"changing\"? (3 steps)", "answer": "- Step 1: (1) Alternating input voltage is applied to primary → (2) drives an alternating current in primary → (3) creates a changing magnetic field around the core.\n- Step 2: (4) This changing field links through to the secondary, causing a changing flux linkage → (5) induces an alternating voltage in the secondary; if connected to a circuit, this drives an alternating current.\n- Step 3: Each stage must involve change because Faraday's law requires dΦ/dt ≠ 0. A steady DC signal would give zero induced EMF at step 5.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Why is the iron core of a transformer laminated (made of thin, insulated slices)? What problem does this solve? (2 steps)", "answer": "- Step 1: The iron core is a conductor. A changing magnetic field in a solid iron core would induce **eddy currents** — circular currents flowing within the core itself.\n- Step 2: These eddy currents waste energy as heat (I²R losses). Laminating the core (slicing it like bread) breaks up these current paths, greatly reducing eddy currents and the resulting energy loss.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "A step-up transformer increases voltage. Explain why this also reduces current, and why this is useful for power transmission. (2 steps)", "answer": "- Step 1: For an ideal transformer, power is conserved: P_in = P_out, so I₁V₁ = I₂V₂. If V₂ > V₁ (step-up), then I₂ < I₁ (step-down in current).\n- Step 2: In power transmission lines, the resistive loss is P_loss = I²R. By stepping up voltage (and reducing current), the I²R losses in the cables are greatly reduced, allowing efficient long-distance power transfer.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "A power station generates 40,000 V at 20 A. This is stepped up to 250,000 V for transmission. What is the approximate current in the transmission lines? (2 steps)", "answer": "- Step 1: Using I₁V₁ = I₂V₂: I₂ = I₁ × (V₁/V₂) = 20 × (40,000 / 250,000)\n- Step 2: I₂ = 20 × 0.16 ≈ 3.2 A. The current drops dramatically from 20 A to about 3 A, reducing I²R losses in the transmission cables.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "What is the difference between a step-up and a step-down transformer in terms of the turns ratio? Give an example of where each is used in the National Grid. (2 steps)", "answer": "- Step 1: Step-up: N_s > N_p (increases voltage, decreases current). Step-down: N_s < N_p (decreases voltage, increases current).\n- Step 2: In the National Grid: step-up transformers at power stations raise ~40 kV to ~250 kV for transmission; step-down transformers lower this to ~230 V for homes.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "An ideal transformer has 1000 turns on the primary and 50 turns on the secondary. If the primary current is 2 A at 230 V, what is the secondary current? (2 steps)", "answer": "- Step 1: First find V_s: V_s/V_p = N_s/N_p ⇒ V_s = 230 × (50/1000) = 11.5 V.\n- Step 2: Using power conservation: I_p V_p = I_s V_s ⇒ I_s = (2 × 230) / 11.5 = 460/11.5 ≈ 40 A.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "A real transformer has an efficiency of 90%. If the input power is 1000 W, what is the output power? List two reasons why real transformers are not 100% efficient. (2 steps)", "answer": "- Step 1: P_out = η × P_in = 0.9 × 1000 = 900 W.\n- Step 2: Real transformers lose energy through: (1) resistive heating in copper windings (I²R), (2) eddy currents in the core (reduced by lamination), (3) hysteresis losses from magnetising/demagnetising the core, (4) flux leakage (not all flux links both coils).", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "You hold a bar magnet with its N pole pointing toward a coil. State two ways to increase the magnitude of the induced EMF when you move the magnet. (2 steps)", "answer": "- Step 1: (1) Move the magnet **faster** — greater rate of change of flux (dΦ/dt) means larger EMF.\n- Step 2: (2) Use a coil with **more turns** (larger N), since ε ∝ N ΔΦ/Δt. Also using a stronger magnet (larger B) increases ΔΦ.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A wire is moved upward through a uniform magnetic field that points into the page. Using Fleming's right-hand rule, in what direction does the induced current flow? (2 steps)", "answer": "- Step 1: Fleming's right-hand rule: ThuMb = Motion (upward), First finger = Field (into page).\n- Step 2: The seCond finger (induced conventional current) points to the **left**.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In a uniform magnetic field, a coil rotates at constant speed. Sketch a graph of magnetic flux through the coil against time, and on the same axes sketch the induced EMF against time. What is the phase relationship? (2 steps)", "answer": "- Step 1: Flux vs time is a cosine wave (or sine, depending on starting position). It varies between +Φ_max and −Φ_max sinusoidally.\n- Step 2: EMF vs time is the derivative of flux — it is also sinusoidal but **90° out of phase**. When flux is at maximum (flat slope), EMF = 0. When flux crosses zero (steepest slope), EMF is at its maximum. EMF leads flux by 90°.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "A rectangular coil with 200 turns and area 0.05 m² rotates at 50 Hz in a 0.3 T magnetic field. What is the peak EMF generated? (2 steps)", "answer": "- Step 1: ε_max = BANω = B A N (2πf) = 0.3 × 0.05 × 200 × (2π × 50)\n- Step 2: = 0.3 × 0.05 × 200 × 314 ≈ 0.3 × 0.05 × 62,800 ≈ 942 V. (Rough mental calculation: 0.3 × 0.01 = 0.003, times 62,800 ≈ 188, then times 2? Let me recalculate: 0.3 × 0.05 = 0.015. 0.015 × 200 = 3. 3 × 314 = 942 V.)", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "An electron moves horizontally to the right in a magnetic field pointing vertically upward. What is the direction of the magnetic force on the electron? (Use Fleming's left-hand rule carefully, remembering conventional current.) (2 steps)", "answer": "- Step 1: The electron has negative charge. For conventional current, we consider the motion of positive charge. Since electrons move right, conventional current flows **left**.\n- Step 2: Using Fleming's left-hand rule: First finger = field (up), Second finger = conventional current (left). Thumb gives force **into the page** (away from you).", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "Why is the force on a current-carrying conductor in a magnetic field perpendicular to both the current and the field? What practical consequence does this have? (2 steps)", "answer": "- Step 1: This is the nature of the magnetic force — it arises from the interaction between the moving charges (current) and the magnetic field, and mathematically F = BIL sin θ gives maximum force when perpendicular, zero when parallel.\n- Step 2: This perpendicular relationship is what allows motors to produce continuous rotation — the force is always tangent to the circular path of the coil, causing torque rather than just pushing the coil in one direction.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Two coils are placed close to each other but not connected. What condition must be satisfied for an EMF to be induced in the second coil when the first coil is connected to a battery? (2 steps)", "answer": "- Step 1: The current in the first coil must be **changing**.\n- Step 2: A steady DC current produces a constant magnetic field → constant flux through the second coil → no induced EMF. Only when the current changes (switching on, off, or varying) does the flux change, inducing an EMF in the second coil.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "A wire of length 0.5 m carries a current of 2 A perpendicular to a magnetic field of 0.4 T. What is the force on the wire? (2 steps)", "answer": "- Step 1: Using F = BIL sin θ, with θ = 90° (perpendicular), sin 90° = 1.\n- Step 2: F = 0.4 × 2 × 0.5 = 0.4 N.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "A proton (charge +1.6 × 10⁻¹⁹ C) moves at 10⁶ m/s perpendicular to a 0.1 T magnetic field. What is the radius of its circular path? (2 steps)", "answer": "- Step 1: The magnetic force provides centripetal force: BQv = mv²/r, so r = mv/(BQ).\n- Step 2: r = (1.67 × 10⁻²⁷ × 10⁶) / (0.1 × 1.6 × 10⁻¹⁹) = (1.67 × 10⁻²¹) / (1.6 × 10⁻²⁰) ≈ 0.01 m = 1 cm.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "What would happen to a transformer if the primary and secondary coils were wound on separate, unconnected cores? Why? (2 steps)", "answer": "- Step 1: The transformer would not work — no output voltage would be induced in the secondary.\n- Step 2: Without a common magnetic core, the changing magnetic flux from the primary does not link to the secondary. The flux linkage in the secondary must change to induce an EMF (Faraday's law), but with no path for the magnetic field, ΔΦ_s = 0.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "In a generator, what is the role of slip rings? Why are they needed for AC output but not for DC? (2 steps)", "answer": "- Step 1: Slip rings are continuous conducting rings that maintain electrical contact with the rotating coil while allowing the external circuit to remain stationary.\n- Step 2: They enable the induced alternating voltage from the rotating coil to be transferred to the external circuit without twisting wires. For DC, a split-ring commutator is needed instead — it reverses connections every half-turn to keep external current flowing in one direction.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "Explain the difference between magnetic flux density (B) and magnetic flux (Φ). Which one is related to the force on a wire, and which one determines how much \"stuff\" passes through an area? (2 steps)", "answer": "- Step 1: Magnetic flux density B is the *strength* (concentration) of the magnetic field at a point — the force per unit current per unit length. Magnetic flux Φ is the *total amount* of field passing through an area.\n- Step 2: Force on a wire depends on B (F = BIL). The \"amount of stuff\" (total field lines) through an area is Φ = BA (for perpendicular field). B is field strength; Φ is total quantity through a surface.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "When a magnet is dropped through a coil, the induced EMF pulses twice — once as it enters and once as it leaves. Explain this using Lenz's law and the concept of flux change. (3 steps)", "answer": "- Step 1: As the N pole approaches the coil, flux *increases* through the coil. Lenz's law says the induced current creates an opposing (N) pole, causing a repulsive force — this is the first EMF pulse.\n- Step 2: When the magnet is fully inside, flux is constant (no change), so EMF = 0 briefly.\n- Step 3: As the N pole leaves (tail emerges), flux *decreases*. Now the induced current creates an attracting (S) pole to oppose the decrease, causing an EMF pulse in the opposite direction — the second pulse.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "A student says: \"Since transformers have no moving parts, they should be 100% efficient.\" Give two reasons why this statement is incorrect. (2 steps)", "answer": "- Step 1: (1) **Copper losses**: The windings have resistance, so I²R heating occurs in both primary and secondary coils.\n- Step 2: (2) **Core losses**: Eddy currents (reduced but not eliminated by lamination) and hysteresis losses (energy to magnetise and demagnetise the iron each cycle) dissipate energy as heat. Also, not all magnetic flux links both coils (flux leakage).", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "In a DC motor, why does the coil experience a torque that tends to spin it, rather than just being pulled toward one pole? (2 steps)", "answer": "- Step 1: The coil has two sides — each side experiences a force according to F = BIL. These two forces act in opposite directions (due to current flowing in opposite directions in each side of the coil).\n- Step 2: Since the forces are on opposite sides of the coil and point in opposite directions, they form a **couple** (pair of equal parallel forces not through the same point). A couple produces rotation (torque) without net translational force.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "A coil is placed in a magnetic field and rotated about a horizontal axis. At the instant when the plane of the coil is parallel to the field lines, what is (a) the flux through the coil, and (b) the induced EMF? Explain. (2 steps)", "answer": "- Step 1: (a) Flux is **zero** — when the coil's plane is parallel to the field, the field lines run along the plane, not through it. The effective area perpendicular to the field is zero.\n- Step 2: (b) EMF is **maximum** — flux is changing fastest at this point (going from increasing to decreasing). Since EMF = −dΦ/dt, and the gradient of flux is steepest here, EMF peaks.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "What is the purpose of the brushes in a DC motor or generator? Are they necessary in an alternator? (2 steps)", "answer": "- Step 1: Brushes are stationary carbon contacts that maintain electrical contact with the rotating part (commutator or slip rings), allowing current to flow to/from the rotating coil.\n- Step 2: Yes, brushes are necessary in an alternator to connect the rotating slip rings to the external circuit. For a dynamo (DC generator), brushes connect to the split-ring commutator. In both cases, some mechanical contact is needed to complete the circuit.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "If the area of a rotating coil in a generator is doubled, what happens to the peak EMF? What if the magnetic field strength is halved? (2 steps)", "answer": "- Step 1: Peak EMF ε_max = BANω. Doubling area A **doubles** the peak EMF.\n- Step 2: Halving the magnetic field B **halves** the peak EMF. Both changes scale linearly with ε_max.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "Explain why the National Grid uses very high transmission voltages (e.g., 275 kV or 400 kV) rather than transmitting power at 230 V from power stations to homes. (2 steps)", "answer": "- Step 1: Power loss in transmission cables is P_loss = I²R. For a given power P = IV, higher voltage means lower current (I = P/V).\n- Step 2: Using high voltage dramatically reduces the current, so I²R losses are very small. If 230 V were used directly, the current would be huge, causing massive heating losses and requiring impractically thick cables.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "A solenoid has 500 turns, length 0.2 m, and carries a current producing a magnetic field of 10 mT inside. What is the flux linkage if the cross-sectional area is 0.01 m²? (2 steps)", "answer": "- Step 1: Flux Φ = BA = 10 × 10⁻³ × 0.01 = 10⁻⁴ Wb.\n- Step 2: Flux linkage NΦ = 500 × 10⁻⁴ = 0.05 Wb-turns (or 5 × 10⁻² Wb·turns).", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "What is the purpose of a soft iron core in a transformer, rather than a steel core? (2 steps)", "answer": "- Step 1: Soft iron is easily magnetised and demagnetised — it has low **hysteresis** loss.\n- Step 2: Since the magnetic field alternates direction many times per second (50–60 Hz), a material that resists demagnetisation would waste significant energy. Soft iron minimises this energy loss in each cycle.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "A charge moves in a circle in a uniform magnetic field. If the magnetic field strength is increased, what happens to the radius of the circle? (2 steps)", "answer": "- Step 1: Using r = mv/(BQ), for fixed momentum mv, radius r is inversely proportional to B.\n- Step 2: Increasing B **decreases** the radius. Stronger field provides greater centripetal force, bending the charged particle more sharply into a tighter circle.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "In the equation Φ = BA cos θ, what is θ the angle between? Why is this a common source of error in exams? (2 steps)", "answer": "- Step 1: θ is the angle between the **magnetic field lines** and the **normal** (perpendicular) to the plane of the area — NOT the angle between field and the plane itself.\n- Step 2: Students often mistakenly use the angle to the plane, getting confused with the sin θ in force equations (where θ IS the angle between conductor and field). The two conventions are different, causing sign errors.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "A simple demonstration: a magnet is dropped through a copper pipe. It falls much slower than through air. Explain this using Lenz's law. (3 steps)", "answer": "- Step 1: As the magnet falls, its motion causes a changing magnetic flux in the copper pipe, inducing eddy currents in the pipe walls.\n- Step 2: By Lenz's law, these induced currents create their own magnetic field that **opposes the motion** of the magnet — essentially creating magnetic drag.\n- Step 3: This opposing force (magnetic braking) counteracts gravity, significantly reducing the magnet's acceleration. The kinetic energy is dissipated as heat in the copper pipe.", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "A transformer has equal numbers of turns on primary and secondary. What is the voltage ratio? Is this useful? (2 steps)", "answer": "- Step 1: V₁/V₂ = N₁/N₂. If N₁ = N₂, then V₁ = V₂ — the voltage is unchanged (1:1 ratio).\n- Step 2: This is useful for **isolation** — separating the primary and secondary circuits electrically while maintaining the same voltage. It's also used in some safety applications and audio equipment.", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "In a DC motor, what would happen if there were no commutator — just slip rings like an alternator? Would it still rotate? (2 steps)", "answer": "- Step 1: Without a commutator, the current direction in the coil would reverse every half-turn (as with an alternator).\n- Step 2: The force on each side of the coil would also reverse every half-turn. Since the coil has switched position, the forces would now both point in the *same* rotational direction at any instant — wait, actually the coil would experience forces that try to align it (like a compass needle) rather than spin continuously. It would oscillate back and forth but not rotate continuously.", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "Why does a current-carrying wire in a magnetic field experience a force, while a stationary charge in the same field does not? (2 steps)", "answer": "- Step 1: A stationary charge has no velocity, so v = 0, and F = BQv sin θ = 0.\n- Step 2: A current-carrying wire has moving charges (electrons). Even though individual drift velocity is slow, the collective effect of vast numbers of charges moving creates a measurable magnetic force. The force acts on each charge: F = BQv, summed over all charges in the wire.", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "Two identical coils are rotated in identical magnetic fields, but coil A rotates at twice the angular speed of coil B. Compare their peak EMFs. (2 steps)", "answer": "- Step 1: Peak EMF ε_max = BANω. Both coils have the same B, A, and N.\n- Step 2: Since ω is doubled for coil A, its peak EMF is **twice** that of coil B. Higher rotation speed means faster flux change, producing larger induced EMF.", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": false}, {"question": "A long straight wire carries a current. Does it produce a magnetic field? If so, in what direction? (2 steps)", "answer": "- Step 1: Yes, any current-carrying conductor produces a magnetic field. For a long straight wire, the field lines form concentric circles around the wire.\n- Step 2: The direction is given by the **right-hand grip rule**: curl the fingers of your right hand around the wire in the direction of conventional current; your thumb points in the direction of the magnetic field (along the wire).", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "In a transformer, the primary and secondary coils are electrically insulated from each other. How then can energy be transferred from primary to secondary? (2 steps)", "answer": "- Step 1: Energy is transferred via the **magnetic field** in the iron core, not through electrical connection.\n- Step 2: The alternating current in the primary creates a changing magnetic field. This field is channeled by the iron core through the secondary, inducing an EMF. This is electromagnetic induction — energy transfer through a changing magnetic field, not through electric current.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "If a transformer is 100% efficient, and the primary voltage is 230 V with current 1 A, what must be the secondary current if the secondary voltage is 23 V? (2 steps)", "answer": "- Step 1: For 100% efficiency: P_in = P_out ⇒ I_p V_p = I_s V_s.\n- Step 2: I_s = (I_p V_p) / V_s = (1 × 230) / 23 = 10 A. The current increases because the voltage is stepped down.", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}, {"question": "A charged particle enters a uniform magnetic field at an angle of 30° to the field lines. Describe its subsequent motion. (2 steps)", "answer": "- Step 1: The component of velocity parallel to B (v cos 30°) experiences no magnetic force and continues unchanged. The perpendicular component (v sin 30°) experiences maximum force, causing circular motion.\n- Step 2: The combined motion is a **helix** — the particle spirals forward along the field lines while moving in circles in the perpendicular plane.", "source": "MiniMax ①", "_id": "minimax_1_59", "judge_pick": false}], "count": 60}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "What is the physical meaning of the negative sign in Faraday's law, ε = −N dΦ/dt? (2 steps)", "answer": "- Step 1: The negative sign represents Lenz's law — the induced EMF (and resulting current) always acts in a direction that *opposes the change* in magnetic flux that produced it. This is a direct consequence of energy conservation.\n\n- Step 2: If you push a north pole into a coil, the induced current creates a north pole facing the magnet (repelling it). If flux is increasing through a coil, the induced field points opposite to the original field. If flux is decreasing, the induced field points in the same direction as the original field.\n\n**Takeaway:** The minus sign isn't just a mathematical convention — it encodes the physical principle that nature abhors a changing flux and fights back.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "A charged particle moves perpendicularly into a uniform magnetic field. Describe the path it follows and explain why. (2 steps)", "answer": "- Step 1: The magnetic force on a moving charge is F = BQv (when v ⟂ B). This force is always perpendicular to the velocity vector. A force perpendicular to motion acts as a centripetal force, causing uniform circular motion.\n\n- Step 2: Combining F = BQv with centripetal force F = mv²/r gives the radius of the circular path: r = mv/(BQ). The particle moves in a circle (or arc) in a plane perpendicular to the magnetic field.\n\n**Takeaway:** Magnetic forces never do work on a charge (they're always perpendicular to velocity), so they only change the direction of motion, not the speed.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Explain why an alternating current is required for a transformer to work. What would happen if a steady direct current were applied to the primary coil instead? (3 steps)", "answer": "- Step 1: Transformers rely on electromagnetic induction — specifically, a *changing* magnetic flux linkage in the secondary coil induces an EMF. Faraday's law states ε = −N dΦ/dt; if the flux doesn't change (dΦ/dt = 0), no EMF is induced regardless of how strong the flux is.\n\n- Step 2: With AC input, the primary current alternates direction, creating an alternating (changing) magnetic field. This changing field links to the secondary, inducing an alternating output voltage at the same frequency.\n\n- Step 3: With steady DC, there is a momentary induced EMF only when the current is switched on (flux building up) or off (flux collapsing). Once the DC reaches steady state, the flux is constant, so the induced EMF drops to zero.\n\n**Takeaway:** Transformers are fundamentally AC devices — the \"change\" in flux is essential, not optional.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "In a step-up transformer, the output voltage is higher than the input voltage. Explain why, in practical terms, this is useful for long-distance power transmission. (3 steps)", "answer": "- Step 1: Power P = IV is fixed at the power station. For the same power, increasing voltage V allows a proportionally smaller current I to flow through the transmission cables.\n\n- Step 2: Energy loss in the cables follows P_loss = I²R (Joule heating). Since losses depend on I², reducing the current dramatically reduces losses. A step-up from ~40 kV to ~250 kV reduces current by a factor of ~6, cutting losses by a factor of ~36.\n\n- Step 3: Near consumer areas, step-down transformers reduce the voltage back to safe levels (230 V in the UK) while increasing the current accordingly. This two-stage process minimizes losses over long distances while delivering safe power to homes.\n\n**Takeaway:** High voltage transmission is a trade-off — we accept the need for insulation and safety measures because the reduction in I²R losses is enormous.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Distinguish between an alternator (AC generator) and a dynamo (DC generator) in terms of their construction and the shape of their output waveform. (3 steps)", "answer": "- Step 1: Both have a coil rotating in a magnetic field, but differ in how they connect the rotating coil to the external circuit.\n\n- Step 2: An **alternator** uses **slip rings**, which maintain continuous contact as the coil rotates. The induced current reverses direction each half-turn (as the coil sides swap which pole they pass), producing a smooth sinusoidal AC waveform.\n\n- Step 3: A **dynamo** uses a **split-ring commutator** — a single ring with an insulating gap. Every half-turn, the connections swap, flipping the contact points so the external circuit always receives current in the same direction. The output is DC but \"bumpy\" (pulsing), not perfectly smooth.\n\n**Takeaway:** Slip rings = continuous connection → AC. Split-ring commutator = switches connection each half-turn → DC (but pulsed).", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "A wire of length 0.5 m carries a current of 2 A at an angle of 30° to a uniform magnetic field of 0.1 T. Calculate the magnetic force on the wire. (2 steps)", "answer": "- Step 1: Use the force on a current-carrying conductor: F = BIL sin θ. Here B = 0.1 T, I = 2 A, L = 0.5 m, θ = 30°.\n\n- Step 2: F = 0.1 × 2 × 0.5 × sin 30° = 0.1 × 2 × 0.5 × 0.5 = 0.05 N. The force is zero when the wire is parallel to the field (θ = 0°) and maximum (BIL) when perpendicular (θ = 90°).\n\n**Takeaway:** The sin θ factor accounts for the component of current perpendicular to the field — only the perpendicular component contributes to the magnetic force.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Explain Fleming's left-hand rule and state what each finger represents. When is it used versus Fleming's right-hand rule? (2 steps)", "answer": "- Step 1: Fleming's left-hand rule: hold the thumb, first finger, and second finger mutually perpendicular. **Thumb** = direction of Motion/Force (or thrust). **First finger** = direction of Field (north to south). **Second finger** = direction of Conventional Current (positive to negative). It's for motors — when you have a current in a magnetic field and want to find the resulting force.\n\n- Step 2: Fleming's **right**-hand rule has the same orientation but is for generators — when motion in a magnetic field induces a current (electromagnetic induction). Mnemonic: \"Left for Force (motor), Right for Generation.\"\n\n**Takeaway:** Left = Motor (current → force). Right = Generator (motion → current).", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "State the five-step causal chain describing how a transformer works, starting from the input voltage. (5 steps)", "answer": "- Step 1: An **alternating input voltage** is applied across the primary coil. (Must be AC — DC produces no steady output.)\n\n- Step 2: This alternating voltage drives an **alternating current** in the primary coil, flowing back and forth as the polarity reverses each half-cycle.\n\n- Step 3: This alternating current creates a **changing (alternating) magnetic field** around the primary coil and within the iron core. A steady DC current would produce a steady field → no induction.\n\n- Step 4: The changing magnetic field is guided by the iron core to the **secondary coil**, producing a **changing flux linkage** in the secondary (the flux through each turn changes with time).\n\n- Step 5: By Faraday's law, this changing flux linkage **induces an alternating voltage** in the secondary. If the secondary is connected to a complete circuit, this voltage drives an **alternating current** at the same frequency as the input.\n\n**Takeaway:** The transformer is a chain of electromagnetic conversions: electrical → magnetic → electrical, linked only by the changing flux, not by any electrical connection.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Why is the iron core of a transformer laminated (made of thin insulated slices), and what would happen if it were a solid block of iron? (2 steps)", "answer": "- Step 1: Iron is an electrical conductor. When a changing magnetic field passes through it, the changing flux induces circulating currents called **eddy currents** within the iron core itself. These eddy currents flow in circles, dissipating energy as heat (I²R losses).\n\n- Step 2: Lamination slices the core into thin electrically insulated sheets. Each slice has a much smaller cross-section, severely restricting the size of circulating eddy current loops. This reduces eddy current losses dramatically, improving efficiency. Without lamination, a solid core would overheat and waste significant power.\n\n**Takeaway:** Lamination is a design solution to suppress eddy currents — same principle applies to other alternating magnetic components.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "What is magnetic flux density (B)? Define it and state its unit. How does it differ from magnetic flux (Φ)? (2 steps)", "answer": "- Step 1: Magnetic flux density B is the strength of a magnetic field, defined by the force per unit current per unit length on a conductor perpendicular to the field: B = F/(IL). Its unit is the **tesla (T)**, where 1 T = 1 N A⁻¹ m⁻¹.\n\n- Step 2: Magnetic flux Φ is the *amount* of magnetic field passing through a surface: Φ = BA cos θ (where A is area, θ is angle between field and normal to surface). Its unit is the **weber (Wb)**. B is a field property (points in space); Φ is a property of a specific surface area. A strong B field through a small area can give the same Φ as a weak B through a large area.\n\n**Takeaway:** B tells you how strong the field is at a point; Φ tells you how much field passes through a particular area.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "A transformer has 500 turns on the primary coil and 50 turns on the secondary. If the primary voltage is 230 V, calculate the secondary voltage and identify whether this is a step-up or step-down transformer. (2 steps)", "answer": "- Step 1: Use the turns ratio equation: V₁/V₂ = N₁/N₂. Rearranging: V₂ = V₁ × (N₂/N₁) = 230 × (50/500) = 230 × 0.1 = 23 V.\n\n- Step 2: Since N₂ < N₁ (50 < 500), this is a **step-down** transformer — voltage decreases from 230 V to 23 V. The current would increase proportionally (in an ideal transformer).\n\n**Takeaway:** Turns ratio directly determines voltage ratio. Fewer secondary turns = step-down; more secondary turns = step-up.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A DC motor uses permanent magnets for the field. If you want to reverse its direction of rotation, what simple change can you make? Explain the physics. (2 steps)", "answer": "- Step 1: Reverse the battery polarity — swap the positive and negative connections. This reverses the direction of conventional current through the coil.\n\n- Step 2: Since the magnetic force direction depends on current direction (via Fleming's left-hand rule), reversing current reverses the force on each side of the coil. The coil now experiences forces in the opposite sense, so it rotates the opposite direction.\n\n**Takeaway:** Motor direction is controlled by current direction. Reverse current → reverse force → reverse rotation.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "How can you increase the speed of a DC motor? Explain the physics. (2 steps)", "answer": "- Step 1: Increase the current through the motor coil. The magnetic force on each side of the coil is F = BIL (when perpendicular), so a larger current produces a larger force.\n\n- Step 2: Greater force produces a greater torque, accelerating the coil to a higher rotational speed. In practice, you can increase current by using a stronger battery, reducing the coil resistance, or adding more turns to the coil (more wire sections experiencing force).\n\n**Takeaway:** Motor speed (at steady state) scales with current. More current → stronger magnetic force → faster rotation.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "In the equation ε = BANω sin(ωt) for an AC generator, what does each symbol represent, and why is there a sine function? (3 steps)", "answer": "- Step 1: ε = induced EMF (V), B = magnetic flux density (T), A = area of coil (m²), N = number of turns, ω = angular velocity (rad/s), t = time (s).\n\n- Step 2: The sine function appears because as the coil rotates, the rate of change of flux (and hence EMF) varies sinusoidally. At the instant the coil plane is parallel to the field lines (flux = 0), it cuts field lines most rapidly → maximum EMF. At the instant the coil is perpendicular (flux = maximum), it neither cuts nor joins field lines → zero EMF.\n\n- Step 3: ωt represents the angular position. When ωt = 90° or 270° (coil parallel to field), sin(ωt) = 1 → peak EMF. When ωt = 0° or 180° (coil perpendicular), sin(ωt) = 0 → zero EMF.\n\n**Takeaway:** The sine reflects the geometry of rotation — maximum EMF occurs when flux is *zero* (maximum rate of change), and zero EMF when flux is *maximum* (no change).", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "What is magnetic flux linkage? When is it used instead of magnetic flux? (2 steps)", "answer": "- Step 1: Magnetic flux linkage (NΦ) is the total magnetic flux multiplied by the number of turns in a coil: NΦ = BAN (for perpendicular field). Its unit is **weber-turns** (Wb·turns).\n\n- Step 2: Flux linkage is used when dealing with coils or solenoids with multiple turns, because each turn experiences the same flux, and the induced EMF depends on the total change in linkage across *all* turns. Faraday's law uses flux linkage: ε = −N dΦ/dt = −d(NΦ)/dt.\n\n**Takeaway:** For a single-turn loop, Φ and NΦ are the same. For a multi-turn coil, you must use flux linkage (total contribution from all turns).", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Explain Lenz's law in terms of energy conservation. Why can't the induced current simply \"help\" the change that produced it? (2 steps)", "answer": "- Step 1: Lenz's law states the induced current flows in a direction that *opposes* the change producing it. If the induced current \"helped\" the change, you would have a runaway energy source — pushing a magnet into a coil would induce a current that pulls the magnet in harder, accelerating it further, generating more current, infinitely — violating conservation of energy.\n\n- Step 2: The work you do moving the magnet into the coil is what supplies the energy for the induced current. The opposing force means you must do positive work to maintain the motion. Without this opposition, you could generate energy from nothing — which is impossible.\n\n**Takeaway:** Lenz's law isn't arbitrary — it's the electromagnetic manifestation of energy conservation. The minus sign in Faraday's law mathematically encodes this opposition.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A rectangular coil of 200 turns, each turn having area 0.03 m², rotates at 50 Hz in a uniform magnetic field of 0.4 T. Calculate the peak EMF produced. (2 steps)", "answer": "- Step 1: Use the peak EMF formula: ε_max = BANω. First find angular velocity: ω = 2πf = 2π × 50 = 100π ≈ 314 rad/s.\n\n- Step 2: ε_max = B × A × N × ω = 0.4 × 0.03 × 200 × 314 ≈ 0.4 × 0.03 × 62,800 = 0.4 × 1,884 ≈ 754 V. (More precisely: 0.4 × 0.03 = 0.012; 0.012 × 200 = 2.4; 2.4 × 314 ≈ 754 V.)\n\n**Takeaway:** Peak EMF increases with magnetic field strength, coil area, number of turns, and rotation frequency. Doubling any of these doubles the peak output.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "State three real energy loss mechanisms in practical transformers and briefly explain each. (3 steps)", "answer": "- Step 1: **Copper (I²R) losses**: The primary and secondary windings have resistance. Current flowing through them dissipates heat (P = I²R). Minimized by using thick copper wire.\n\n- Step 2: **Eddy current losses**: Changing magnetic flux induces circulating currents in the iron core, causing heating. Reduced by laminating the core (insulated slices).\n\n- Step 3: **Hysteresis losses**: The iron core is magnetized and demagnetized each AC cycle. Energy is lost in re-aligning magnetic domains. Minimized by using \"soft\" iron, which magnetizes/demagnetizes easily.\n\n+ Additional minor loss: **Flux leakage** (not all flux from primary links to secondary).\n\n**Takeaway:** Real transformers are not 100% efficient, but modern ones approach 95–99% efficiency through careful design to minimize these losses.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "In a magnetic field, a proton and an electron travel with the same velocity perpendicular to the field. Compare the forces they experience and their resulting circular paths. (2 steps)", "answer": "- Step 1: Both particles have the same charge magnitude (e = 1.6 × 10⁻¹⁹ C). However, the proton has positive charge (+e) while the electron has negative charge (−e). Since F = BQv, the force on the proton is in the direction given by Fleming's left-hand rule, while the force on the electron is in the *opposite* direction (because Q is negative).\n\n- Step 2: Their paths curve in opposite directions (opposite forces), but since the electron's mass is ~1836 times smaller than the proton's (m_e ≈ 9.11 × 10⁻³¹ kg vs m_p ≈ 1.67 × 10⁻²⁷ kg), the electron's radius r = mv/(BQ) is much smaller. The electron spirals in a tight circle; the proton follows a much wider arc for the same velocity and field.\n\n**Takeaway:** Charge sign determines force direction; mass determines radius of curvature. Same-magnitude charges in same field curve oppositely.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A bar magnet is pushed north-pole-first into a coil. Using Lenz's law, determine the direction of the induced current as viewed from the magnet side, and explain why. (3 steps)", "answer": "- Step 1: The approaching north pole *increases* the flux through the coil (more field lines pointing toward the coil). By Lenz's law, the induced current must create a field that *opposes* this increase.\n\n- Step 2: To oppose an approaching north pole, the coil must create a north pole facing the magnet (N-N repulsion pushes back against the motion). Using the right-hand grip rule, if the near face is north, the current must flow **anticlockwise** when viewed from the magnet's side.\n\n- Step 3: This induced current produces a repulsive force on the magnet, opposing the motion that created it. Work must be done to push the magnet in — that work becomes the electrical energy of the induced current.\n\n**Takeaway:** Lenz's law always gives a \"pushback\" — the induced system fights the change, not the original field.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Define magnetic flux Φ and write its equation, explaining what each symbol means and the significance of the cosine term. (2 steps)", "answer": "- Step 1: Magnetic flux Φ is the amount of magnetic field passing perpendicularly through an area. The equation is Φ = BA cos θ, where B = magnetic flux density (T), A = area of the surface (m²), and θ = angle between the field lines and the **normal** (perpendicular) to the surface.\n\n- Step 2: When θ = 0° (field perpendicular to the area), cos θ = 1 and flux is maximum (Φ_max = BA). When θ = 90° (field parallel to the area), cos θ = 0 and flux is zero. The cosine arises because only the component of B *perpendicular* to the area contributes to flux through that area.\n\n**Takeaway:** Flux measures how much field \"cuts through\" a surface. The angle matters because only the perpendicular component counts.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "An ideal step-down transformer operates from a 230 V supply and delivers 10 A to a load. If the primary has 1000 turns, how many turns must the secondary have, and what is the current in the primary? (3 steps)", "answer": "- Step 1: For an ideal transformer, power is conserved: P_in = P_out. Output power = V_s × I_s. We don't know V_s yet, but we know the output current is 10 A. Let V_s be unknown.\n\n- Step 2: From V_p/V_s = N_p/N_s, we need N_s to find V_s, or vice versa. Without the secondary voltage, we can find the primary current first: I_p = I_s × (V_s/V_p). But we need V_s. Actually, we need another piece of information. Let's assume it's designed for a specific output voltage. Without it, we can't solve uniquely. However, typically step-down from 230 V might go to, say, 23 V (10:1 ratio). Then N_s = 1000 × (23/230) = 100 turns.\n\n- Step 3: With V_s = 23 V, I_s = 10 A, output power = 230 W. Input power = 230 W, so I_p = P/V_p = 230/230 = 1 A. The current ratio is inverse of voltage ratio: I_p/I_s = N_s/N_p = 1/10.\n\n**Takeaway:** In an ideal transformer, power in = power out. Step-down for voltage means step-up for current, and vice versa.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Why does a current-carrying wire experience a force when placed in a magnetic field, whereas a stationary charge in the same field does not? (2 steps)", "answer": "- Step 1: A stationary charge has velocity v = 0, so the magnetic force F = BQv sin θ = 0. Magnetic forces arise from *motion* — specifically, from charges in motion relative to the magnetic field.\n\n- Step 2: A current-carrying wire contains moving charges (electrons). Even though the wire itself may be stationary, the charges within it are moving (drift velocity). The magnetic force on each moving charge sums up to a net force on the wire: F_total = BIL sin θ, where I is the current (rate of charge flow), not the charge itself. This is the **motor effect**.\n\n**Takeaway:** Magnetic forces require relative motion between charge and field. A stationary charge in a static field feels no magnetic force — only electric forces apply there.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In the context of the National Grid, explain the typical voltage transformation chain from power station to home. (3 steps)", "answer": "- Step 1: **Power station generation**: Electricity is generated at medium voltage (~20–40 kV).\n\n- Step 2: **Step-up transformer**: Voltage is increased to very high levels (typically 250–400 kV) for transmission. This high voltage allows low current through the extensive transmission network, minimizing I²R losses in the cables.\n\n- Step 3: **Step-down transformers**: Near population centers, voltage is progressively reduced through multiple stages (e.g., 400 kV → 132 kV → 33 kV → 11 kV → 230 V). The final step-down delivers safe 230 V AC to homes.\n\n**Takeaway:** High voltage transmission is an engineering compromise — higher voltages require more insulation but drastically reduce resistive losses, making long-distance power transmission practical and economical.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "In the formula F = BIL sin θ, what does θ represent, and what happens to the force when θ = 0° versus θ = 90°? (2 steps)", "answer": "- Step 1: θ is the angle between the direction of the current (along the conductor) and the direction of the magnetic field lines. It's NOT the angle between the wire and the plane of the area — it's specifically between the current direction and field direction.\n\n- Step 2: When θ = 90° (current perpendicular to field), sin 90° = 1 → maximum force F_max = BIL. When θ = 0° (current parallel to field), sin 0° = 0 → zero force. The force is zero when the current flows *along* the field lines, and maximum when flowing *across* them.\n\n**Takeaway:** Always identify the angle between the current direction and the field direction — not the angle to some arbitrary reference.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "A coil rotates in a uniform magnetic field. At one instant, the induced EMF is at its maximum. Describe the orientation of the coil at this instant and explain why EMF is maximum. (2 steps)", "answer": "- Step 1: The induced EMF is maximum when the coil is **parallel** to the magnetic field lines — that is, when the plane of the coil is perpendicular to the field, so the coil sides are cutting across the field lines at the steepest angle.\n\n- Step 2: At this orientation, the magnetic flux through the coil is zero (field lines pass *through* the coil without crossing its area), but the *rate of change* of flux is maximal — the coil is transitioning from having flux in one sense to the opposite, cutting field lines most rapidly. Remember: EMF depends on dΦ/dt, not Φ itself. Maximum flux (perpendicular orientation) gives zero EMF; zero flux (parallel orientation) gives maximum EMF.\n\n**Takeaway:** There's a 90° phase shift between flux (Φ) and EMF (ε). They peak at opposite points in the rotation cycle.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "Two coils, A and B, are wound on the same iron core. Coil A has 100 turns; coil B has 500 turns. If an alternating voltage of 12 V is applied to coil A, what voltage appears across coil B, assuming an ideal transformer? (2 steps)", "answer": "- Step 1: Apply the turns ratio formula: V_A/V_B = N_A/N_B. Rearranging: V_B = V_A × (N_B/N_A) = 12 × (500/100) = 12 × 5 = 60 V.\n\n- Step 2: This is a step-up transformer (more turns on the secondary), increasing voltage from 12 V to 60 V. The current would step down by the same factor (to 1/5 of coil A's current), conserving power (ideal case).\n\n**Takeaway:** Voltage scales directly with the turns ratio. More secondary turns = higher output voltage.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Explain why the magnetic force on a moving charged particle is called a \"centripetal\" force. What implication does this have for the particle's kinetic energy? (2 steps)", "answer": "- Step 1: The magnetic force F = BQv is always perpendicular to the velocity vector v (when θ = 90°). A force perpendicular to velocity changes the *direction* of motion but not its *speed* — this is exactly the definition of a centripetal force, which causes uniform circular motion.\n\n- Step 2: Since the magnetic force does no work on the particle (force and displacement are perpendicular), the particle's kinetic energy (½mv²) remains constant. The magnetic field only bends the path, never speeding up or slowing down the particle. This is why particles in magnetic fields follow circular (or helical) arcs without gaining or losing energy.\n\n**Takeaway:** Magnetic forces redirect motion but don't change speed. They're \"pure\" steering forces — centripetal, not tangential.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "What is the physical origin of the force on a current-carrying wire in a magnetic field? (2 steps)", "answer": "- Step 1: A current in a wire consists of charges (electrons) moving through the conductor. Each moving charge experiences a magnetic force F = BQv (the Lorentz force). The sum of forces on all the charge carriers in the wire gives a net force on the wire itself.\n\n- Step 2: More precisely, the moving charges create their own magnetic field (circulating around the wire). This field interacts with the external B field. The vector sum of all these individual force interactions across all charge carriers results in the macroscopic force F = BIL on the wire.\n\n**Takeaway:** The motor effect is the collective manifestation of the magnetic force on individual moving charges within the conductor.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "If you double the frequency of rotation of an AC generator, what happens to (a) the frequency of the output AC, and (b) the peak EMF? Explain. (2 steps)", "answer": "- Step 1: (a) The output AC frequency equals the rotation frequency. Doubling the rotation frequency doubles the output frequency — they're directly proportional (f_output = f_rotation).\n\n- Step 2: (b) The peak EMF is ε_max = BANω = BAN(2πf). Since ω ∝ f, doubling the frequency doubles ω, which doubles the peak EMF. More frequent rotation means the coil cuts field lines more often per second, producing both a higher frequency and a higher amplitude output.\n\n**Takeaway:** Frequency and peak EMF both scale linearly with rotation speed. Faster rotation → higher frequency and stronger output.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "A wire loop is pulled at constant speed through a uniform magnetic field. Will there be a constant EMF induced, or does it vary? Explain. (2 steps)", "answer": "- Step 1: The EMF is constant as long as the speed, field strength, and orientation relative to the field remain constant. When the wire loop is moving through a uniform field, the rate at which field lines are cut (and hence the rate of change of flux) is constant.\n\n- Step 2: However, once the loop completely exits the field (no longer cutting field lines), the flux stops changing and EMF drops to zero. Within the field region, EMF is constant; outside, it's zero. The EMF is not sinusoidal — it's a flat \"top-hat\" profile while traversing the field.\n\n**Takeaway:** Constant motion in a uniform field gives constant (flat-top) induced EMF. The sinusoidal variation only occurs in rotating generators where the geometry of flux change is inherently cyclical.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Why can't transformers work efficiently with DC input, even if the DC is switched on and off repeatedly? (2 steps)", "answer": "- Step 1: Transformers require a *continuously changing* magnetic flux to induce voltage in the secondary. When DC is switched on, there is a brief moment of changing flux (as the field builds), inducing a momentary pulse. When DC is steady, flux is constant → no induced EMF.\n\n- Step 2: Even if you switched DC on/off rapidly, you'd get a pulsed, irregular output — not the smooth sinusoidal AC that practical loads require. AC naturally provides a smooth, continuous, periodic change ideal for transformer operation. The iron core also saturates with steady DC, preventing proper flux variation.\n\n**Takeaway:** Transformers depend on the continuous sinusoidal oscillation of AC. Discrete on/off DC pulses cannot sustain the steady electromagnetic coupling needed.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In a transformer, the primary and secondary coils are electrically isolated from each other. How, then, is energy transferred from primary to secondary? (2 steps)", "answer": "- Step 1: Energy is transferred through the **magnetic field** in the iron core, not through electrical contact. The primary creates a changing magnetic field; this field is channeled by the core to the secondary; the changing flux in the secondary induces a voltage, driving current in the secondary circuit.\n\n- Step 2: There's no direct electron flow between coils. The coupling is entirely electromagnetic — the primary's electrical energy → magnetic field energy in core → secondary's electrical energy. This is why transformers can step voltage up or down without any physical electrical connection between input and output.\n\n**Takeaway:** Transformers exploit the field as an intermediary — the core is a \"highway\" for magnetic flux, not electric current.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "A student says: \"Since power is conserved in an ideal transformer, the current must also be the same in both coils.\" Is this statement correct? If not, explain the error. (2 steps)", "answer": "- Step 1: The statement is **incorrect**. Power conservation (P_in = P_out) means voltage × current is the same, not that the current is the same. Since V changes (step-up or step-down), the current must change inversely to keep P constant.\n\n- Step 2: For a step-up transformer (V increases), current must decrease proportionally (I_out = I_in × V_in/V_out). For a step-down transformer, current increases. The relationship is I_p V_p = I_s V_s, not I_p = I_s.\n\n**Takeaway:** Don't confuse power conservation with current conservation. The trade-off is always between V and I — you can't have both high.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "Explain the terms \"step-up\" and \"step-down\" transformer. What determines whether a transformer is one or the other? (2 steps)", "answer": "- Step 1: A **step-up** transformer increases voltage from primary to secondary (V_s > V_p). This requires N_s > N_p (more turns on secondary). Since power is conserved, current decreases.\n\n- Step 2: A **step-down** transformer decreases voltage (V_s < V_p), with N_s < N_p (fewer turns on secondary). Current increases. The direction of voltage change is determined entirely by the turns ratio — more secondary turns → step-up; fewer → step-down.\n\n**Takeaway:** The names refer to voltage change. Turns ratio is the control knob — N_s/N_p > 1 gives step-up; < 1 gives step-down.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "A current-carrying wire is placed in a magnetic field. Using Fleming's left-hand rule, if the current flows upward and the wire experiences a force to the right, what is the direction of the magnetic field? (2 steps)", "answer": "- Step 1: Set up Fleming's left-hand rule: thumb = force (right), second finger = current (upward). Align your thumb to the right and your second finger upward.\n\n- Step 2: Your first finger (field direction) now points *out of the page/toward you*. This means the magnetic field is directed out of the page, perpendicular to both the current and force directions.\n\n**Takeaway:** Fleming's rules work in 3D — you can always determine the third direction when you know any two of: field, current, force.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "A rectangular coil rotates in a uniform magnetic field. Sketch how the induced EMF varies with time over one complete rotation, labeling the key points. (2 steps)", "answer": "- Step 1: The EMF vs. time graph is a **sine wave** (or negative sine, depending on phase reference). It starts at zero when the coil is perpendicular to the field (maximum flux), rises to a positive peak when the coil is parallel to the field (zero flux, maximum rate of change), returns to zero when perpendicular again, reaches a negative peak when parallel again (reversed), and returns to zero — one full cycle.\n\n- Step 2: Key points: t = 0: ε = 0 (coil perpendicular, dΦ/dt = 0). t = T/4: ε = ε_max (coil parallel, maximum cutting). t = T/2: ε = 0. t = 3T/4: ε = −ε_max (parallel again, reversed direction). The period T = 1/f where f is the rotation frequency.\n\n**Takeaway:** One rotation = one AC cycle. EMF is sinusoidal, with peaks at coil positions parallel to the field (zero flux, maximum change) and zeros at perpendicular positions (maximum flux, zero change).", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A beta particle (high-speed electron) moves at 2 × 10⁶ m/s perpendicular to a magnetic field of 0.3 T. Calculate the magnetic force on the electron. (2 steps)", "answer": "- Step 1: Use F = BQv for perpendicular motion. Here B = 0.3 T, v = 2 × 10⁶ m/s, Q = magnitude of electron charge = 1.6 × 10⁻¹⁹ C (use magnitude for force magnitude).\n\n- Step 2: F = BQv = 0.3 × 1.6 × 10⁻¹⁹ × 2 × 10⁶ = 0.3 × 1.6 × 2 × 10⁻¹³ = 0.96 × 10⁻¹³ = 9.6 × 10⁻¹⁴ N. (Direction would be opposite to that of a positive charge, by Fleming's left-hand rule.)\n\n**Takeaway:** Even for tiny particles at moderate speeds, magnetic forces can be calculated using F = BQv. The force is extremely small but sufficient to curve the particle's path significantly in practical magnetic fields.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "What is the difference between the magnetic field produced by a straight current-carrying wire and the field inside a solenoid? (2 steps)", "answer": "- Step 1: A straight wire produces a **circular** magnetic field that circles around the wire (given by the right-hand grip rule). The field strength decreases with distance (B ∝ 1/r).\n\n- Step 2: A solenoid (coil of many turns) produces a field that is **strong and uniform** inside the coil (parallel straight lines from one end to the other), similar to a bar magnet. Outside the solenoid, the field is weak and spreads out. The field inside is B = μ₀NI/L (for N turns over length L), much stronger and more uniform than a single wire.\n\n**Takeaway:** A straight wire gives circular field lines; a solenoid gives uniform field lines inside — essential for practical electromagnetic devices.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "A wire loop is placed in a uniform magnetic field that is increasing in strength. Will an EMF be induced? If so, explain the direction in terms of Lenz's law. (2 steps)", "answer": "- Step 1: Yes, an EMF will be induced. Even if the loop is stationary, a *changing* magnetic field (increasing B) means the flux through the loop is changing (ΔΦ > 0), so Faraday's law gives a non-zero induced EMF.\n\n- Step 2: By Lenz's law, the induced current creates a magnetic field that **opposes the increase**. If B is increasing \"into the page,\" the induced field must point \"out of the page\" (to oppose the increase). The induced current flows to produce this opposing field (use right-hand grip rule).\n\n**Takeaway:** EMF can be induced by changing B even without motion. The key is changing flux, not physical movement.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "In a DC motor, what is the function of the split-ring commutator? Why is it necessary? (2 steps)", "answer": "- Step 1: As the coil rotates, the side that was pushing up (experiencing upward force) eventually reaches the bottom position. Without any change, the force would now be downward, causing the coil to stop and reverse — a simple coil would oscillate.\n\n- Step 2: The **split-ring commutator** (a ring with an insulating gap) reverses the connections to the external circuit every half-turn. This flips the current direction in the coil exactly when the coil passes through the vertical position, so the force direction always produces torque in the same rotational sense. This maintains continuous rotation in one direction.\n\n**Takeaway:** The commutator is the key to converting the AC inside the rotating coil into DC external output (or, in a motor, keeping the torque uni-directional).", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "Why is soft iron used for transformer cores rather than steel or hard magnetic materials? (2 steps)", "answer": "- Step 1: \"Soft\" magnetic materials are easily magnetized and demagnetized. When the AC current reverses each cycle, the domains in the core must flip direction repeatedly. Soft iron has low *hysteresis* — it doesn't \"hang on\" to its magnetization, so minimal energy is lost per cycle.\n\n- Step 2: Steel or hard magnetic materials have high hysteresis losses — they resist changing their magnetization, wasting significant energy as heat each AC cycle. Soft iron minimizes these losses, making transformers efficient. It's also a good conductor for magnetic flux (high permeability), guiding the field strongly between coils.\n\n**Takeaway:** Transformer cores need low hysteresis loss (easy magnetization reversal) and high permeability. Soft iron provides both.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "A charged particle moves in a circular path in a uniform magnetic field. If the magnetic field strength is doubled while keeping the particle's speed the same, what happens to the radius of the path? (2 steps)", "answer": "- Step 1: The radius is r = mv/(BQ). For fixed mass m, velocity v, and charge Q, r ∝ 1/B.\n\n- Step 2: If B doubles (B → 2B), the new radius r' = mv/(Q × 2B) = r/2. The radius halves. Stronger field squeezes the circular path tighter (smaller radius).\n\n**Takeaway:** Radius is inversely proportional to magnetic field strength. Doubling B halves the radius for the same speed and charge.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "State the two key equations for an ideal transformer and explain what each represents. (2 steps)", "answer": "- Step 1: **Turns ratio**: V_p/V_s = N_p/N_s. This relates the input and output voltages to the number of turns in each coil. It's the fundamental voltage transformation rule.\n\n- Step 2: **Power conservation**: P_in = P_out → I_p V_p = I_s V_s. This assumes 100% efficiency, meaning all electrical power delivered to the primary appears at the secondary (no losses). From these: I_p/I_s = N_s/N_p — current ratio is the inverse of the turns ratio.\n\n**Takeaway:** These two equations completely describe ideal transformer behavior: voltage steps up/down by turns ratio; power stays constant, so current steps down/up inversely.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "When a magnet is moved toward a coil, the induced current flows in a certain direction. What would happen to the induced current direction if the magnet were moved away from the coil at the same speed? (2 steps)", "answer": "- Step 1: When the magnet moves *toward* the coil, the flux through the coil is increasing. Lenz's law says the induced current creates a field opposing this increase — if the north pole approaches, the near face becomes north (repulsion).\n\n- Step 2: When the magnet moves *away*, the flux is decreasing. Now the induced current creates a field that *supports* the original field (to oppose the decrease) — the near face becomes south, attracting the departing north pole. The current direction reverses. The induced EMF (and current) always opposes the *change* in flux, not the flux itself.\n\n**Takeaway:** Moving magnet toward = one current direction; moving away = opposite direction. The current always \"tries\" to keep the flux constant.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "What is meant by the term \"eddy currents\" in the context of transformers, and why are they undesirable? (2 steps)", "answer": "- Step 1: Eddy currents are loops of electrical current induced within the iron core itself. Because iron is electrically conductive and the core experiences a changing magnetic field, circulating currents are induced within the bulk material — like tiny whirlpools of current.\n\n- Step 2: These eddy currents flow through the resistive iron, dissipating energy as heat (I²R losses). This wastes power and reduces transformer efficiency. As mentioned, lamination (splitting the core into thin insulated slices) suppresses eddy currents by limiting the area of current loops.\n\n**Takeaway:** Eddy currents are induced currents in the core itself — a parasitic effect that must be minimized through lamination.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "An electron moves in a circular orbit perpendicular to a uniform magnetic field. If the electron's kinetic energy is doubled (while staying in the same field), what happens to the radius of its orbit? (2 steps)", "answer": "- Step 1: Kinetic energy E_k = ½mv², so doubling E_k means the speed increases by factor √2 (since v ∝ √E_k). The radius formula r = mv/(BQ) shows r ∝ mv, so r ∝ v (for fixed m, B, Q).\n\n- Step 2: Since v increases by √2 when energy doubles, the radius also increases by √2. The orbit expands. More energetic particles follow wider arcs in the same magnetic field.\n\n**Takeaway:** Radius scales with velocity (and hence with the square root of kinetic energy). Doubling energy increases ra
