, occurring when $$\\sin(\\omega t) = 1$$ (coil parallel to field). The EMF is zero when $$\\sin(\\omega t) = 0$$ (coil perpendicular to field).\n\nDoubling the rotation speed doubles both the amplitude AND the frequency of the output — two effects from one change.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "What is the key structural difference between an alternator and a dynamo, and how does this difference affect the output current waveform? (4 steps)", "answer": "- Step 1: Both have a coil rotating in a magnetic field, but they differ in how the coil connects to the external circuit:\n+ **Alternator** uses **slip rings** — two continuous, unbroken rings. Each end of the coil is permanently connected to one ring, and brushes slide on the rings.\n+ **Dynamo** uses a **split-ring commutator** — a ring with a gap (split into two halves). The brushes swap which half-ring they contact every half-turn.\n- Step 2: In an **alternator**, as the coil rotates, the current in the external circuit naturally alternates direction because each side of the coil moves up then down through the field. The output is a smooth **sine wave** (AC).\n- Step 3: In a **dynamo**, the commutator's gap causes the external connection to **swap** every half-turn, effectively flipping the negative half-cycles to positive. The output is a **pulsating DC** waveform — always in the same direction, but varying in magnitude.\n- Step 4: The alternator doesn't need to \"disconnect\" to alternate — the alternation comes naturally from the coil sides changing their direction of motion through the field. The dynamo's commutator actively *rectifies* the natural AC into DC by switching connections at the right moment.\n\nThink of slip rings as \"let it flow as-is\" and the commutator as \"flip the negative bits positive.\"", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "Why does a transformer only work with AC and not DC? What would happen if you connected a DC supply to a transformer's primary coil? (3 steps)", "answer": "- Step 1: A transformer works by electromagnetic induction: alternating current in the primary creates a **changing** magnetic field in the core, which induces an EMF in the secondary. The key requirement is a **changing** flux.\n- Step 2: DC produces a **constant** current, which creates a **constant** magnetic field, which means **constant** flux linkage in the secondary coil. Since $$\\frac{d\\Phi}{dt} = 0$$, no EMF is induced in the secondary — the transformer output is zero.\n- Step 3: The only moments a DC-connected transformer would produce any output are during **switching on** and **switching off** — these are brief moments of changing flux, producing a momentary spike of EMF. But during steady-state DC, nothing happens.\n\nThis is why the National Grid uses AC throughout — transformers are essential for efficient power transmission, and they fundamentally require alternating current.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Walk through the exact sequence of how a transformer works, step by step, from input voltage to output voltage. (5 steps)", "answer": "- Step 1: An **alternating voltage** is applied across the primary coil. This drives an **alternating current** through the primary coil (current that changes direction periodically).\n- Step 2: The alternating current in the primary coil creates a **changing magnetic field** around it. Since the current alternates, the field alternates too — growing, shrinking, and reversing direction.\n- Step 3: The **soft iron core** channels this changing magnetic field from the primary coil to the secondary coil. The core acts like a \"conductor\" for magnetic flux, ensuring nearly all the flux from the primary passes through the secondary.\n- Step 4: The secondary coil sits in this changing magnetic field. By Faraday's Law, a **changing magnetic flux linkage** through the secondary coil **induces an alternating EMF** (voltage) across it.\n- Step 5: If the secondary coil is connected to a complete circuit, the induced alternating voltage drives an **alternating current** through the load. The output frequency is the same as the input frequency — only the voltage and current amplitudes change.\n\nThe two coils are never electrically connected — energy transfers entirely through the magnetic field. It's \"motor effect\" on the primary side (current → field) and \"generator effect\" on the secondary side (changing field → voltage).", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "State the transformer turns ratio equation and the transformer power equation. For each, explain what assumption is being made. (3 steps)", "answer": "- Step 1: **Turns ratio equation**: $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$, where $$V$$ = voltage, $$N$$ = number of turns, p = primary, s = secondary. This assumes that the same magnetic flux passes through both coils (no flux leakage) — i.e., all flux from the primary links the secondary via the iron core.\n+ If $$N_s > N_p$$: step-up transformer (voltage increases)\n+ If $$N_s < N_p$$: step-down transformer (voltage decreases)\n- Step 2: **Power equation**: $$V_p I_p = V_s I_s$$ (or $$P_{in} = P_{out}$$). This assumes the transformer is **100% efficient** — no energy is lost as heat. In reality, transformers are typically 95-99% efficient.\n- Step 3: Combining both equations: if voltage is stepped up by a factor of 10, current is stepped down by a factor of 10 (approximately). Power is conserved (ideally), so when V goes up, I must go down proportionally.\n\nQuick mental check: a step-up transformer with $$N_s = 2N_p$$ doubles the voltage but halves the current. The power stays the same.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "A step-up transformer has 100 turns on the primary and 500 turns on the secondary. If the primary voltage is 20V, what is the secondary voltage? If the primary current is 10A (assuming ideal efficiency), what is the secondary current? (3 steps)", "answer": "- Step 1: Using the turns ratio: $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$, so $$\\frac{20}{V_s} = \\frac{100}{500} = \\frac{1}{5}$$. Therefore $$V_s = 20 \\times 5 = 100$$ V. The voltage is stepped up by a factor of 5.\n- Step 2: Using the power equation for an ideal transformer: $$V_p I_p = V_s I_s$$, so $$20 \\times 10 = 100 \\times I_s$$, giving $$I_s = \\frac{200}{100} = 2$$ A. The current is stepped down by a factor of 5.\n- Step 3: Check: power in = $$20 \\times 10 = 200$$ W, power out = $$100 \\times 2 = 200$$ W. ✓ Power is conserved. The transformer trades high current for high voltage (or vice versa), but never creates extra power.\n\nIn a real transformer, the output current would be slightly less than 2A because some power is lost to heating in the coils and eddy currents in the core.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Why does the National Grid use step-up transformers before long-distance transmission and step-down transformers before homes? What would happen without the step-up transformer? (3 steps)", "answer": "- Step 1: Power loss in transmission cables is $$P_{loss} = I^2 R$$ — it depends on the **square** of the current. High current means much more energy lost as heat in the cables.\n- Step 2: The power station produces a fixed power $$P = IV$$. By using a **step-up transformer** to increase voltage (e.g., from 25kV to 400kV), the current decreases proportionally (since $$I = P/V$$). With current reduced by a factor of ~16, the power loss reduces by a factor of ~256 ($$16^2$$). This makes long-distance transmission efficient.\n- Step 3: A **step-down transformer** at the consumer end reduces the voltage to a safe level (230V in the UK) and increases the current back up to what appliances need. Without the step-up, you'd transmit at low voltage / high current, losing a huge fraction of the power as heat in the cables.\n\nThe key insight: it's much more efficient to transmit the *same power* at high voltage / low current than at low voltage / high current, because $$P_{loss} = I^2R$$ depends on current squared.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "What are eddy currents in a transformer core, why are they a problem, and how does a laminated core reduce them? (3 steps)", "answer": "- Step 1: The iron core is a conductor sitting in a changing magnetic field. By electromagnetic induction, this changing field induces circulating currents *within the core itself* — these are **eddy currents**. They flow in loops perpendicular to the changing flux.\n- Step 2: Eddy currents are a problem because they dissipate energy as heat ($$I^2R$$ losses in the core), reducing the transformer's efficiency. The energy they dissipate is stolen from the useful power that should reach the secondary coil.\n- Step 3: A **laminated core** is made of thin slices of iron, each insulated from its neighbours (like a loaf of sliced bread). The insulation breaks up the large loops that eddy currents would naturally form, confining them to small paths within each lamination. Smaller loops = smaller currents = less heat loss.\n\nThe laminations don't affect the magnetic properties (flux still passes through the iron easily) — they only affect the *electrical* conductivity between layers, which is exactly what you want to block.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "A transformer core is made of \"soft iron\" rather than \"hard\" magnetic material. What is the difference between magnetically soft and hard materials, and why does the transformer need soft iron? (3 steps)", "answer": "- Step 1: **Magnetically soft** materials (like soft iron) are easily magnetised and easily demagnetised. When the external field is removed, they lose their magnetism quickly. **Magnetically hard** materials (like steel) retain their magnetism permanently once magnetised.\n- Step 2: In a transformer, the core must reverse its magnetisation direction every half-cycle of the AC (50 times per second for 50Hz mains). A soft iron core can follow these rapid changes with minimal energy loss.\n- Step 3: A hard magnetic material would resist demagnetisation and remagnetisation in the opposite direction — this creates **hysteresis losses** (energy wasted as heat in fighting the material's magnetic \"memory\"). Soft iron minimises these losses, making the transformer more efficient.\n\nSoft iron is used for electromagnets and transformer cores; hard steel is used for permanent magnets.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Compare a motor and a generator: what goes in, what comes out, what principle is used, and which Fleming's rule applies? (3 steps)", "answer": "- Step 1: **Motor**: Electrical energy IN → Mechanical energy OUT. A current-carrying coil in a magnetic field experiences a force (motor effect, $$F = BIL$$), causing rotation. Uses **Fleming's Left Hand Rule** (you put in current and field, you get force/motion).\n- Step 2: **Generator**: Mechanical energy IN → Electrical energy OUT. A coil is rotated in a magnetic field, changing the flux linkage and inducing an EMF (electromagnetic induction, Faraday's Law). Uses **Fleming's Right Hand Rule** (you put in motion and field, you get current).\n- Step 3: They are essentially the same device in reverse. A motor driven mechanically becomes a generator; a generator with current fed in becomes a motor. The physics is symmetric — it's just a question of which form of energy you're supplying and which you're extracting.\n\nMemory aid: **L**eft hand for motors (e**L**ectricity in), **R**ight hand for generators (e**R**gy in as motion).", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "In a DC motor, what is the role of the commutator, and what would happen without it? (3 steps)", "answer": "- Step 1: The commutator is a **split ring** attached to the rotating coil. It reverses the direction of current in the coil every half-turn, just as each side of the coil passes through the vertical position.\n- Step 2: Without the commutator, the coil would rotate until it reached the vertical position (where the forces on each side create no net torque), and then it would stop — or worse, the same current direction would push it back the way it came, causing it to oscillate back and forth.\n- Step 3: The commutator ensures that the current always flows in the correct direction relative to the magnetic field so that the force on each side of the coil always pushes in the same rotational direction. This produces continuous **one-way rotation**.\n\nThe commutator is the key difference between a motor that spins continuously and one that just twitches and stops.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "How can you change the speed and direction of a DC motor without modifying its construction? (3 steps)", "answer": "- Step 1: **Changing speed**: Increase the current (by increasing the supply voltage) → stronger force on the coil → faster rotation. Alternatively, increase the magnetic field strength (if using electromagnets rather than permanent magnets) → same effect.\n- Step 2: **Changing direction**: Reverse the direction of current (by swapping the battery terminals) → the force on each side of the coil reverses → the motor spins in the opposite direction. Alternatively, reverse the magnetic field direction (swap the magnet poles).\n- Step 3: Both methods work because the force direction depends on the *product* of current direction and field direction (Fleming's Left Hand Rule). Reversing either one reverses the force. Reversing *both* keeps the force in the same direction (two negatives cancel).\n\nIn practice, modern motors often use electromagnets so both field and current can be electronically controlled for precise speed and direction management.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "In the top-pan balance experiment, a magnet sits on the balance and a current-carrying wire is between its poles. The balance reads 161g when current flows. How does Newton's Third Law help determine the force on the wire? (3 steps)", "answer": "- Step 1: The current in the wire creates a force. By Fleming's Left Hand Rule, this force acts on the wire. But the wire also exerts an **equal and opposite force on the magnet** (Newton's Third Law — every action has an equal and opposite reaction).\n- Step 2: The magnet is on the balance, so the force from the wire on the magnet is what the balance measures. If the balance reads +161g (downward force on the balance), then the force on the magnet is **downward**.\n- Step 3: By Newton's Third Law, the force on the **wire** is the **opposite** direction — **upward**. This is crucial for applying Fleming's Left Hand Rule correctly: you use the force on the *wire* (upward), not the force on the balance (downward).\n\nThe common mistake: using the balance reading direction directly as the force direction in Fleming's rule. You must flip it first because the balance measures the force on the magnet, not the wire.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "A wire carries current left-to-right between the poles of a magnet on a balance. The balance reads a positive (downward) value. Using Fleming's Left Hand Rule and Newton's Third Law, determine the direction of the magnetic field. (4 steps)", "answer": "- Step 1: The balance reads positive → the magnet is pushed **downward** → by Newton's Third Law, the force on the **wire** is **upward**.\n- Step 2: Apply Fleming's Left Hand Rule:\n+ Thumb = Force on wire = **upward**\n+ Second finger = Current = **left to right**\n- Step 3: Orient your left hand: thumb up, second finger pointing right. Your first finger must point **into the page/screen**.\n- Step 4: Therefore, the magnetic field direction is **into the page**. This means the magnet's north pole is behind the wire and south pole is in front (field goes from N to S, into the page).\n\nThis question combines two concepts (Newton's Third Law + Fleming's Left Hand Rule) — a classic exam pattern that tests whether you truly understand both, not just one.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "What three things can you change to increase the induced EMF in a coil rotating in a magnetic field? Explain why each one works. (3 steps)", "answer": "- Step 1: **Increase the speed/frequency of rotation**. Faster rotation means the flux changes more rapidly ($$\\frac{d\\Phi}{dt}$$ increases), so the induced EMF is larger. This also increases the frequency of the alternating output.\n- Step 2: **Increase the number of turns (N)** or **increase the coil area (A)**. Both increase the flux linkage ($$N\\Phi = BAN\\cos\\theta$$), so there's more total flux to change, leading to a larger rate of change and hence larger EMF.\n- Step 3: **Increase the magnetic field strength (B)**. A stronger field means more flux through the coil at every angle, so the changes in flux are larger as the coil rotates, producing a larger EMF.\n\nAll three appear in the peak EMF formula $$\\varepsilon_{max} = BAN\\omega$$ — increase any of $$B$$, $$A$$, $$N$$, or $$\\omega$$ and the peak EMF increases proportionally.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "What is the relationship between the graph of flux linkage vs time and the graph of induced EMF vs time for a rotating coil? (3 steps)", "answer": "- Step 1: The flux linkage varies as $$N\\Phi = BAN\\cos(\\omega t)$$ — a cosine wave. It starts at maximum when the coil is perpendicular to the field and passes through zero when the coil is parallel to the field.\n- Step 2: The induced EMF is $$\\varepsilon = -\\frac{d(N\\Phi)}{dt} = BAN\\omega\\sin(\\omega t)$$ — a sine wave. It's the **negative derivative** (gradient) of the flux linkage graph.\n- Step 3: This means:\n+ When the flux graph has zero gradient (peaks and troughs), the EMF is zero\n+ When the flux graph has maximum gradient (steeply crossing zero), the EMF is maximum\n+ The EMF graph is shifted 90° ahead of the flux graph (sine vs cosine)\n+ The negative sign from Lenz's Law means the EMF opposes the change — if flux is increasing, EMF is negative, and vice versa\n\nThe EMF graph is essentially \"how steep is the flux graph at this point\" — flipped upside down by the negative sign.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "A DC supply is connected to a transformer's primary coil. Describe what happens in the secondary coil at three moments: (a) when switched on, (b) while remaining on, (c) when switched off. (3 steps)", "answer": "- Step 1: **(a) Switched on**: Current rises from zero to its steady value. This is a *change* in current, creating a *changing* magnetic field, which produces a *changing* flux linkage in the secondary. An EMF is induced momentarily, driving a brief pulse of current.\n- Step 2: **(b) Remains on**: Current is now constant (DC steady state). The magnetic field is constant, flux linkage is constant, $$\\frac{d\\Phi}{dt} = 0$$. No EMF is induced. The secondary coil reads zero voltage and zero current.\n- Step 3: **(c) Switched off**: Current drops from steady to zero. This is another *change*, creating a changing flux in the opposite direction to (a). An EMF is induced in the **opposite direction** to part (a), driving a brief pulse of current the other way.\n\nThis demonstrates that transformers only produce *continuous* output with AC. With DC, you only get brief spikes at the switching moments — useless for power transmission.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "What four sources of energy loss exist in a real transformer, and how is each one reduced? (4 steps)", "answer": "- Step 1: **Resistive (copper) losses** — current flowing through the coil windings encounters resistance, dissipating power as heat ($$I^2R$$). Reduced by using thick, low-resistance copper wire.\n- Step 2: **Eddy current losses** — the changing magnetic field induces circulating currents within the iron core itself, heating it. Reduced by using a **laminated core** (thin insulated slices that break up the current loops).\n- Step 3: **Hysteresis losses** — energy is required to repeatedly magnetise and demagnetise the core each AC cycle. The core resists changing its magnetic orientation. Reduced by using **magnetically soft** iron (easy to magnetise/demagnetise).\n- Step 4: **Flux leakage** — not all the magnetic flux from the primary coil passes through the secondary coil; some escapes. Reduced by good core design (closed loop core shape that channels flux efficiently between the coils).\n\nReal transformer efficiency: $$\\eta = \\frac{P_{out}}{P_{in}} = \\frac{V_s I_s}{V_p I_p}$$. Well-designed transformers can exceed 99% efficiency.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": true}, {"question": "A step-down transformer has 4000 primary turns and 100 secondary turns. Primary voltage is 230V and primary current is 2A. If efficiency is 95%, what is the secondary current? (4 steps)", "answer": "- Step 1: Find the secondary voltage using the turns ratio: $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$, so $$\\frac{230}{V_s} = \\frac{4000}{100} = 40$$. Therefore $$V_s = \\frac{230}{40} = 5.75$$ V.\n- Step 2: Calculate input power: $$P_{in} = V_p I_p = 230 \\times 2 = 460$$ W.\n- Step 3: Apply efficiency: $$P_{out} = 0.95 \\times 460 = 437$$ W.\n- Step 4: Find secondary current: $$I_s = \\frac{P_{out}}{V_s} = \\frac{437}{5.75} \\approx 76$$ A. (Without efficiency, it would be $$\\frac{460}{5.75} = 80$$ A — the 5% loss reduces the current slightly.)\n\nNotice: the step-down transformer dramatically reduces voltage (230V → 5.75V) but dramatically increases current (2A → ~76A). Power is approximately conserved, minus the efficiency loss.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "Why can't a magnetic monopole (an isolated north or south pole) exist, and how does this relate to the magnets shown in generator diagrams? (2 steps)", "answer": "- Step 1: Magnetic field lines always form **closed loops** — they emerge from north poles and enter south poles, but they never start or end at a point. This is fundamentally different from electric field lines, which can start on positive charges and end on negative charges. If you break a magnet in half, you get two smaller magnets, each with both a north and south pole — never an isolated pole.\n- Step 2: In generator diagrams, sometimes only one magnet pole (e.g., N) is drawn on each side, but in reality, each side is a complete bar magnet with both N and S poles. The diagram just shows the poles facing the coil. The field between the N pole of one magnet and the S pole of the other creates the uniform field that the coil rotates in.\n\nThe student in the lesson noticed the simulation showed both N and S on each magnet — this was correct. The simplified textbook diagrams just omit the outer poles for clarity.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "An electron enters a uniform magnetic field directed into the page, moving to the left. Which way does the force initially push the electron, and why must you reverse the current direction in Fleming's Left Hand Rule? (4 steps)", "answer": "- Step 1: The electron moves left. But conventional current is the flow of *positive* charge, so the equivalent current direction is **to the right** (opposite to the electron's motion).\n- Step 2: Apply Fleming's Left Hand Rule:\n+ First finger (Field) = **into the page**\n+ Second finger (Current) = **to the right** (not left — this is the key step!)\n+ Thumb (Force) = **upward**\n- Step 3: The force on the electron is initially **upward**. This deflects the electron upward, but since the force is always perpendicular to velocity, the electron curves in a circular path.\n- Step 4: The electron curves **upward then around** in an anticlockwise circle (viewed from above). A positive charge moving left in the same field would curve downward in a clockwise circle — opposite direction because the current direction is the same as the velocity for positive charges.\n\nForgetting to reverse the current for negative charges is the single most common mistake in charged-particle-in-a-field problems.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "A proton and an electron enter the same magnetic field with the same speed, perpendicular to the field. How do their circular paths differ in radius and direction? (3 steps)", "answer": "- Step 1: The radius of circular motion is $$r = \\frac{mv}{BQ}$$. The proton has much larger mass ($$m_p \\approx 1836 m_e$$) but the same magnitude of charge ($$e$$). So the proton's radius is approximately **1836 times larger** than the electron's.\n- Step 2: The proton curves in one direction, the electron curves in the **opposite** direction. This is because they have opposite charges — the force on them is in opposite directions (Fleming's Left Hand Rule gives opposite thumb direction when the second finger flips).\n- Step 3: Specifically, if both enter moving to the right in a field into the page:\n+ Proton (positive, current = right): force is **upward**, curves **anticlockwise** (large circle)\n+ Electron (negative, current = left): force is **downward**, curves **clockwise** (tiny circle)\n\nThis is the principle behind mass spectrometers and bubble chambers — different particles leave different curved tracks.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "What is the formula for the radius of circular motion of a charged particle in a magnetic field, and intuitively, why does each variable affect the radius the way it does? (3 steps)", "answer": "- Step 1: Equating the magnetic force to the centripetal force: $$BQv = \\frac{mv^2}{r}$$, which gives $$r = \\frac{mv}{BQ}$$.\n- Step 2: Understanding each variable:\n+ **More mass (m)** → more inertia, harder to bend → **larger radius** (straighter path)\n+ **More speed (v)** → more momentum, harder to deflect → **larger radius**\n+ **Stronger field (B)** → more force pushing inward → **smaller radius** (tighter curve)\n+ **More charge (Q)** → more force pushing inward → **smaller radius**\n- Step 3: The formula tells you that radius depends on the ratio of momentum ($$mv$$) to \"magnetic force per unit speed\" ($$BQ$$). High momentum resists bending; strong magnetic force assists bending.\n\nA particle moving twice as fast orbits in a circle twice the radius. A field twice as strong halves the radius.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "What are the standard symbols used to represent vectors going into or out of the page in 3D magnetic field diagrams, and what is the visual mnemonic for remembering them? (2 steps)", "answer": "- Step 1: **Out of the page** = a **dot** (sometimes circled): ⊙. **Into the page** = a **cross**: ⊗. These represent the tip and tail of an arrow viewed head-on or from behind.\n- Step 2: The mnemonic: imagine an archery arrow flying toward you. If it's coming **at you** (out of the page), you see only the **pointed tip** — a dot. If it's flying **away from you** (into the page), you see the **crossed feathers** at the back — a cross.\n\nThis convention applies to any vector: magnetic field, force, current, or velocity. When you see ⊗ for B, the field goes into the page; when you see ⊙ for B, the field comes out of the page.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "A coil with 200 turns and area 0.02 m² rotates at 50 Hz in a 0.5 T field. Conceptually walk through finding the peak EMF — what is the relationship, and approximately what order of magnitude is it? (3 steps)", "answer": "- Step 1: The peak EMF is $$\\varepsilon_{max} = BAN\\omega$$. First find angular frequency: $$\\omega = 2\\pi f = 2\\pi \\times 50 \\approx 314$$ rad/s.\n- Step 2: Substitute: $$\\varepsilon_{max} = 0.5 \\times 0.02 \\times 200 \\times 314$$. Working through: $$0.5 \\times 0.02 = 0.01$$, then $$0.01 \\times 200 = 2$$, then $$2 \\times 314 \\approx 628$$ V.\n- Step 3: The peak EMF is approximately **630 V**. The output is a sinusoidal alternating voltage with this peak value and a frequency of 50 Hz. Note: doubling the rotation speed would double both the peak EMF (to ~1260 V) and the frequency (to 100 Hz) — two effects from one change.\n\nThe key insight: the peak EMF depends on *all four* quantities. In exam questions, you're often asked which change would increase the EMF — any increase in B, A, N, or ω will do it.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "A rectangular coil (350 turns, area 4.9 × 10⁻⁴ m²) in an 80 mT field is rotated from horizontal (flux lines parallel to coil face) to vertical (flux lines perpendicular) in 0.18 s. Conceptually, what is the average EMF induced? (4 steps)", "answer": "- Step 1: Initial position: coil is horizontal, field lines are parallel to the coil face → flux linkage = 0 (field doesn't pass through the coil).\n- Step 2: Final position: coil is vertical, field lines are perpendicular to the coil face → flux linkage = $$BAN = 80 \\times 10^{-3} \\times 4.9 \\times 10^{-4} \\times 350 \\approx 0.014$$ Wb turns.\n- Step 3: Change in flux linkage: $$\\Delta(N\\Phi) = 0.014 - 0 = 0.014$$ Wb turns. Time: $$\\Delta t = 0.18$$ s.\n- Step 4: Average EMF: $$\\varepsilon = \\frac{\\Delta(N\\Phi)}{\\Delta t} = \\frac{0.014}{0.18} \\approx 0.076$$ V ≈ 76 mV. This is the *average* EMF over the rotation — the instantaneous EMF would vary throughout the turn.\n\nNotice: the EMF depends on how *fast* you rotate. If you rotated the same coil in half the time (0.09 s), the average EMF would double to ~152 mV.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "Why is it important to say \"voltage is induced first, then current flows if there's a complete circuit\" rather than \"current is induced\"? What's the subtle but exam-critical distinction? (3 steps)", "answer": "- Step 1: When a conductor experiences a changing magnetic flux, what is *directly* induced is an **EMF (voltage)**. This is the energy given to the charges in the conductor — it's the \"push.\"\n- Step 2: **Current** only flows if there is a **complete circuit** for the charges to move around. If the conductor is open-circuit (like a coil connected only to a voltmeter), you still get the induced EMF (the voltmeter reads it), but essentially no current flows.\n- Step 3: This distinction matters because:\n+ A voltmeter across an open-circuit generator coil reads the full induced EMF\n+ When you connect a load (closing the circuit), current flows, and this current creates its own magnetic field that *opposes* the original change (Lenz's Law), which can affect the measured EMF\n+ Exam mark schemes specifically require you to say \"induced EMF\" or \"induced voltage\" — saying \"induced current\" without mentioning the circuit requirement loses marks\n\nThe chain is: changing flux → induced EMF → (if circuit complete) → induced current. The EMF is the cause; the current is a possible consequence.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "Three ways to make an electromagnet stronger: increase current, add more coils, use an iron core. Explain the physics behind why each one works. (3 steps)", "answer": "- Step 1: **Increase current**: The magnetic field around a wire is directly proportional to the current ($$B \\propto I$$). More current means more charge flowing per second, which creates a stronger magnetic field at every point around the wire.\n- Step 2: **Add more coils (turns)**: Each turn of wire contributes its own magnetic field. With N turns, the fields from all turns add up (superposition), giving a total field proportional to N. A coil with 100 turns produces roughly 100× the field of a single turn carrying the same current.\n- Step 3: **Use an iron core**: Iron is a ferromagnetic material — its internal magnetic domains align with the external field from the coil, dramatically amplifying it. The iron effectively \"concentrates\" and strengthens the magnetic field, and also channels it through the core (which is why transformers need iron cores to link the flux between coils).\n\nWithout the iron core, a solenoid still produces a field, but it's much weaker and more spread out. The core can increase the field strength by factors of hundreds or thousands.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "A wire in a magnetic field experiences zero force. Give two different scenarios where this could happen. (2 steps)", "answer": "- Step 1: **The wire is parallel to the magnetic field** ($$\\theta = 0°$$). In $$F = BIL\\sin\\theta$$, $$\\sin 0° = 0$$, so the force is zero. Physically, the current doesn't \"cut across\" any field lines, so no force results.\n- Step 2: **There is no current flowing** ($$I = 0$$). If the circuit is open or the power supply is off, no charges are moving through the wire, so no magnetic force acts. The wire could be sitting in the field, but without current, there's nothing for the field to push on.\n\nA third edge case: the wire has zero length in the field ($$L = 0$$), but this is trivial and unlikely in an exam.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}], "count": 40}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What is magnetic flux density, what is its symbol, and what are its units? Why is it sometimes called \"magnetic field strength\"? (2 steps)", "answer": "- Step 1: Magnetic flux density, symbol $$B$$, measures how concentrated the magnetic field lines are in a region — the denser the lines, the stronger the field. It is measured in Tesla (T).\n- Step 2: It's sometimes called \"magnetic field strength\" because a larger $$B$$ means a stronger magnetic effect on charges or currents placed there. However, technically \"magnetic field strength\" ($$H$$) is a different quantity in electromagnetism — at A-level, $$B$$ is the one you use.\n\nFor scale: Earth's field ≈ 0.032 mT, a fridge magnet ≈ 5 mT.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "A wire of length $$L$$ carrying current $$I$$ sits perpendicular to a magnetic field of flux density $$B$$ and experiences force $$F$$. How is $$B$$ defined from this arrangement? (2 steps)", "answer": "- Step 1: The force on a current-carrying conductor perpendicular to a field is $$F = BIL$$. Rearranging gives the defining equation for magnetic flux density: $$B = \\frac{F}{IL}$$.\n- Step 2: This means 1 Tesla is the flux density that produces a force of 1 N on a 1 m wire carrying 1 A of current, when the wire is perpendicular to the field. The \"perpendicular\" condition is crucial — if the wire is at an angle, only the perpendicular component of current matters.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "What is magnetic flux (symbol, units, equation), and how does it differ from magnetic flux density? (2 steps)", "answer": "- Step 1: Magnetic flux $$\\Phi$$ measures how much magnetic field passes through a given area. It is measured in Webers (Wb). The equation is $$\\Phi = BA$$, where $$B$$ is flux density and $$A$$ is the cross-sectional area perpendicular to the field.\n- Step 2: The key difference: flux density $$B$$ is a property of the field at a point (T), while flux $$\\Phi$$ depends on both the field AND the area you choose (Wb). Think of it like rain — $$B$$ is how hard it's raining (intensity), $$\\Phi$$ is how much water lands in your bucket (depends on bucket size too).", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "A coil of area $$A$$ sits in a uniform magnetic field $$B$$. The field lines make angle $$\\theta$$ with the normal (perpendicular) to the coil face. Write the expression for magnetic flux through the coil, and state when flux is maximum and minimum. (3 steps)", "answer": "- Step 1: When the field isn't perpendicular to the area, only the component of $$B$$ perpendicular to the area contributes. This gives $$\\Phi = BA\\cos\\theta$$, where $$\\theta$$ is the angle between the field and the normal to the plane.\n- Step 2: Maximum flux occurs when $$\\theta = 0°$$ (field perpendicular to coil face), so $$\\cos\\theta = 1$$ and $$\\Phi = BA$$. Minimum flux occurs when $$\\theta = 90°$$ (field parallel to coil face), so $$\\cos\\theta = 0$$ and $$\\Phi = 0$$.\n- Step 3: Common trap — $$\\theta$$ is measured from the NORMAL to the plane, not from the plane itself. If the question says \"the coil is parallel to the field,\" that means $$\\theta = 90°$$ and flux is zero, not maximum.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "What is magnetic flux linkage, what are its units, and why does it matter more than flux alone for a coil with multiple turns? (2 steps)", "answer": "- Step 1: Flux linkage is the product of magnetic flux through one turn and the number of turns: $$\\text{Flux linkage} = N\\Phi = BAN$$. Its units are Weber-turns (Wb turns).\n- Step 2: Each turn of the coil \"sees\" the same flux, so the total effect (e.g., total induced EMF) scales with the number of turns. A 300-turn coil in the same flux has 300 times the linkage of a single loop. This is why $$N$$ appears in Faraday's law — more turns means more EMF for the same rate of change of flux.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "A rectangular coil with 200 turns and area 0.01 m² sits perpendicular to a 0.3 T field. Qualitatively, what happens to the flux linkage if the coil is slowly rotated to be parallel to the field? (2 steps)", "answer": "- Step 1: Initially, the coil is perpendicular to the field ($$\\theta = 0°$$), so flux linkage is maximum: $$N\\Phi = BAN = 0.3 \\times 0.01 \\times 200 = 0.6$$ Wb turns.\n- Step 2: As the coil rotates toward parallel ($$\\theta → 90°$$), $$\\cos\\theta$$ decreases toward zero, so flux linkage decreases smoothly to zero. The linkage doesn't drop suddenly — it follows a cosine curve. This smooth change is exactly what generators exploit to produce alternating voltages.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "A charged particle with charge $$Q$$ moves at speed $$v$$ through a magnetic field $$B$$. Write the equation for the force on the particle. Under what orientation is the force maximum, and when is it zero? (2 steps)", "answer": "- Step 1: The magnetic force on a moving charged particle is $$F = BQv\\sin\\theta$$, where $$\\theta$$ is the angle between the velocity and the magnetic field. When perpendicular ($$\\theta = 90°$$), the force is maximum: $$F = BQv$$.\n- Step 2: When the particle moves parallel to the field ($$\\theta = 0°$$), $$\\sin\\theta = 0$$ and the force is zero — the particle passes straight through unaffected. This is why the orientation matters critically: only the component of velocity perpendicular to the field contributes to the force.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "Why does a charged particle moving perpendicular to a uniform magnetic field travel in a circle? What provides the centripetal force? (3 steps)", "answer": "- Step 1: The magnetic force $$F = BQv$$ always acts perpendicular to the velocity of the particle (by Fleming's Left Hand Rule). A force always perpendicular to motion is the definition of centripetal force — it changes direction but not speed.\n- Step 2: This centripetal force causes the particle to follow a circular path. Setting $$BQv = \\frac{mv^2}{r}$$ gives the radius: $$r = \\frac{mv}{BQ}$$.\n- Step 3: Key insight: the magnetic force does no work on the particle (force ⊥ velocity means $$W = Fd\\cos 90° = 0$$), so the particle's kinetic energy and speed remain constant — only direction changes. This is why particles in cyclotrons spiral at constant speed.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "An electron moves to the left in a magnetic field directed into the page. Using Fleming's Left Hand Rule, determine the initial direction of the force on the electron. Why must you reverse the current direction for a negative charge? (3 steps)", "answer": "- Step 1: Fleming's Left Hand Rule: First finger = Field, Second finger = Current (conventional, i.e., positive charge direction), Thumb = Force.\n- Step 2: For an electron moving LEFT, the conventional current (positive charge direction) is to the RIGHT. So: First finger points into the page (field), Second finger points RIGHT (conventional current opposite to electron motion), Thumb points UPWARD → force is initially upward.\n- Step 3: You must reverse the current direction for negative charges because Fleming's rule uses conventional current (flow of positive charge). An electron's motion is opposite to conventional current. If you forget this, you'll get the wrong force direction — a classic exam trap.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "A wire carrying current $$I$$ sits in a magnetic field $$B$$. Write the equation for the force on the wire, and explain what each variable means. When is the force zero? (3 steps)", "answer": "- Step 1: The force is $$F = BIL\\sin\\theta$$, where $$B$$ = flux density (T), $$I$$ = current (A), $$L$$ = length of conductor in the field (m), and $$\\theta$$ = angle between the conductor and the field lines.\n- Step 2: Maximum force occurs when the wire is perpendicular to the field ($$\\theta = 90°$$, $$\\sin\\theta = 1$$), giving $$F = BIL$$. The force is zero when the wire is parallel to the field ($$\\theta = 0°$$, $$\\sin\\theta = 0$$).\n- Step 3: Physical intuition: only the component of current flowing across (perpendicular to) the field lines produces a force. Current flowing along the field lines produces no force — the charges are moving parallel to the field, so there's no sideways deflection.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "In Fleming's Left Hand Rule, what does each finger represent? A student remembers it as \"FBI\" — explain this mnemonic and why it works. (2 steps)", "answer": "- Step 1: Thumb = Force (F), First finger = magnetic Field / B-field (B), Second finger = Current I (I). Hence \"F-B-I\" maps to Thumb–First–Second.\n- Step 2: This mnemonic works because it fixes the three perpendicular directions: when you hold your left hand with thumb, first finger, and second finger all at 90° to each other, they represent three mutually perpendicular vectors. The order matters: it must be the LEFT hand for the motor effect (force on a current in a field). The right hand is for the generator effect.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "On a diagram, a magnetic field is shown going into the page. What symbol represents this? What symbol represents a field coming out of the page? How would you remember which is which? (2 steps)", "answer": "- Step 1: A field into the page is represented by crosses (✕), and a field out of the page is represented by dots (•), sometimes circled.\n- Step 2: Memory aid — imagine an arrow in flight. If the arrow is coming toward you (out of the page), you see the pointed tip (a dot). If the arrow is flying away from you (into the page), you see the feathered tail end (a cross). This arrow analogy makes the convention intuitive.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "What is electromagnetic induction? Name two ways it can occur, and state what must CHANGE for an EMF to be induced. (3 steps)", "answer": "- Step 1: Electromagnetic induction is the process by which an EMF is induced in a circuit due to changes in magnetic flux (or flux linkage). It converts mechanical energy to electrical energy.\n- Step 2: It can occur when: (a) a conductor cuts through magnetic field lines (e.g., a wire moved through a field), or (b) the magnetic flux through a coil changes (e.g., a magnet moved toward/away from a coil, or a coil rotating in a field).\n- Step 3: The crucial word is CHANGE. A stationary magnet inside a coil produces no EMF. A steady, unchanging flux produces no EMF. Only a changing flux — whether from changing $$B$$, changing $$A$$, or changing $$\\theta$$ — induces an EMF. This is the core of Faraday's Law.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "A bar magnet is pushed into a coil connected to a voltmeter, then held still inside, then pulled out. Describe what the voltmeter shows at each stage and explain why. (3 steps)", "answer": "- Step 1: As the magnet is pushed IN, the voltmeter shows a reading (positive or negative). The moving magnet causes the flux through the coil to change, inducing an EMF.\n- Step 2: When the magnet is held STILL inside the coil, the voltmeter reads zero. The flux is constant (not changing), so the rate of change of flux is zero, and no EMF is induced. This is the most common exam trap — having flux ≠ having EMF.\n- Step 3: When the magnet is pulled OUT, the voltmeter shows a reading in the OPPOSITE direction. The flux is now decreasing (rather than increasing), so the induced EMF reverses direction. This reversal is a direct consequence of Lenz's Law — the induced EMF opposes the change.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "State three factors that increase the magnitude of an induced EMF in a coil, and explain the physical reason for each. (3 steps)", "answer": "- Step 1: Moving the magnet (or coil) faster — increases the rate of change of flux ($$\\Delta\\Phi / \\Delta t$$), which directly increases EMF by Faraday's Law.\n- Step 2: Adding more turns to the coil ($$N$$ increases) — each turn experiences the same changing flux, and the total EMF is the sum across all turns. More turns = more flux linkage change = larger EMF.\n- Step 3: Using a stronger magnet (larger $$B$$) — a stronger field means more flux through the coil for the same area and orientation, so the change in flux is larger for the same motion, producing a larger EMF.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "State Faraday's Law in words and as an equation. What does each symbol represent? (2 steps)", "answer": "- Step 1: Faraday's Law: The magnitude of the induced EMF is directly proportional to the rate of change of magnetic flux linkage. In equation form: $$\\varepsilon = \\frac{\\Delta(N\\Phi)}{\\Delta t}$$, or in calculus form $$\\varepsilon = \\frac{d(N\\Phi)}{dt}$$.\n- Step 2: $$\\varepsilon$$ = induced EMF (V), $$\\Delta(N\\Phi)$$ = change in flux linkage (Wb turns), $$\\Delta t$$ = time interval (s). The key insight: it's the RATE of change that matters, not the total flux. A huge but constant flux induces zero EMF; a small but rapidly changing flux can induce a large EMF.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "State Lenz's Law in words. How does it relate to conservation of energy? (3 steps)", "answer": "- Step 1: Lenz's Law: The induced EMF is set up in a direction such that it produces effects that oppose the change causing it.\n- Step 2: If you push a magnet toward a coil, the induced current creates a magnetic field that repels the magnet — you must do work against this repulsion. If the induced current helped the magnet (attracted it), you'd get energy for free, violating conservation of energy.\n- Step 3: This is why the minus sign appears in the combined Faraday-Lenz equation: $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$. The negative sign indicates the EMF opposes the change. Without this opposition, you could create a self-accelerating system — an energy-creation paradox.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "A north pole of a magnet is pushed toward a coil. Using Lenz's Law, what magnetic pole does the near face of the coil develop, and why? What does this mean for the direction of induced current? (3 steps)", "answer": "- Step 1: By Lenz's Law, the coil must oppose the approaching north pole. It does this by creating an induced north pole on its near face — two north poles repel, resisting the magnet's approach.\n- Step 2: To determine current direction, use the right-hand grip rule: curl your fingers in the direction of current flow around the coil, and your thumb points toward the north pole. Since the near face must be north, the current flows anticlockwise as viewed from the magnet side.\n- Step 3: If the magnet is then pulled AWAY, the coil must oppose the flux decreasing — so it creates an induced south pole to attract the magnet back. The current reverses direction. This is why the voltmeter reading flips sign when the magnet changes direction.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "What is the combined Faraday-Lenz equation? What does the negative sign physically represent? If a graph of flux linkage vs. time has a positive gradient, what does this tell you about the induced EMF? (3 steps)", "answer": "- Step 1: The combined equation is $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$. The negative sign represents Lenz's Law — the induced EMF opposes the change in flux linkage.\n- Step 2: The gradient of a flux linkage vs. time graph equals the magnitude of the induced EMF. If the gradient is positive (flux linkage increasing), the induced EMF is negative (opposing the increase).\n- Step 3: Similarly, if the gradient is negative (flux linkage decreasing), the EMF is positive (opposing the decrease). When the gradient is zero (at a peak or trough of the flux linkage graph), the EMF is zero — this is the crucial \"maximum flux ≠ maximum EMF\" insight.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "A coil rotates in a uniform magnetic field. When is the flux linkage maximum, and when is the induced EMF maximum? Explain why these don't occur at the same time. (3 steps)", "answer": "- Step 1: Flux linkage is maximum when the coil face is perpendicular to the field ($$\\theta = 0°$$, $$\\Phi = BAN$$). At this orientation, the most field lines pass through the coil.\n- Step 2: Induced EMF is maximum when the coil face is parallel to the field ($$\\theta = 90°$$). At this orientation, the coil sides are cutting through field lines at the fastest rate — the rate of change of flux is greatest.\n- Step 3: The reason they don't coincide: EMF depends on the rate of CHANGE of flux, not the flux itself. When flux is at its peak, it's momentarily stationary (like a ball at the top of its throw) — the rate of change is zero. When flux is zero, it's changing most rapidly (like a ball at its fastest at the bottom). This is the #1 exam trap in this topic.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "A coil of $$N$$ turns and area $$A$$ rotates at angular frequency $$\\omega$$ in a field $$B$$. Write the expression for the instantaneous EMF and identify the peak EMF. What is the relationship between rotation frequency and EMF frequency? (3 steps)", "answer": "- Step 1: The flux linkage is $$N\\Phi = BAN\\cos(\\omega t)$$. Differentiating (Faraday's Law) gives the instantaneous EMF: $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$.\n- Step 2: The peak EMF is $$\\varepsilon_{max} = BAN\\omega$$, occurring when $$\\sin(\\omega t) = 1$$ (coil parallel to field). This shows peak EMF increases with: stronger field, more turns, larger area, and faster rotation.\n- Step 3: The EMF completes one full cycle per rotation of the coil. The frequency of the alternating voltage equals the rotation frequency: $$f = \\omega / (2\\pi)$$. Doubling the rotation speed doubles both the frequency and the amplitude of the output.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "What is the key difference between an alternator and a dynamo in terms of (a) the type of current they produce, and (b) their construction? (3 steps)", "answer": "- Step 1: An alternator produces alternating current (AC) — the output voltage/current reverses direction periodically. A dynamo produces direct current (DC) — the output always flows in the same direction (though its magnitude varies).\n- Step 2: Construction difference: an alternator uses slip rings (continuous, unbroken rings connecting the coil to the external circuit). A dynamo uses a split-ring commutator (a ring with a gap that swaps the connections every half turn).\n- Step 3: The slip rings allow the natural alternating EMF from the rotating coil to pass directly to the circuit. The commutator's gap reverses the external connections every half turn, effectively \"rectifying\" the negative half-cycles into positive ones, so the external current always flows the same way.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "A student says: \"The alternator must disconnect the circuit to make the current alternate direction.\" Is this correct? Explain what actually causes the current to alternate in an alternator. (2 steps)", "answer": "- Step 1: This is incorrect. The current alternates in an alternator because the coil sides reverse their direction of motion relative to the magnetic field every half turn — first moving upward through the field, then downward. This reverses the induced EMF naturally.\n- Step 2: The slip rings maintain a continuous electrical connection throughout. No disconnection is needed. It's the dynamo's commutator that involves a brief disconnection/reconnection — and that's to KEEP the current flowing in the same direction (rectification), not to make it alternate.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "Sketch the output voltage vs. time graph for (a) an alternator and (b) a dynamo. Describe the key difference in shape. (2 steps)", "answer": "- Step 1: An alternator produces a sinusoidal wave that goes both positive and negative — a smooth sine curve crossing zero twice per cycle. This is AC.\n- Step 2: A dynamo produces a pulsating waveform that is always positive (or always negative) — it looks like the absolute value of a sine wave. The commutator flips the negative half-cycles to positive, so the current never reverses direction, but it does drop to zero twice per cycle. This is pulsed DC.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "In a DC motor, what is the role of the commutator? What would happen without it? (3 steps)", "answer": "- Step 1: The commutator reverses the direction of current in the coil every half turn. This ensures that the force on each side of the coil always acts in the same rotational direction (e.g., always pushing the left side up and the right side down).\n- Step 2: Without the commutator, the current would stay in one direction. After half a turn, the sides of the coil would have swapped positions, so the force would now push the left side down and the right side up — reversing the rotation. The coil would oscillate back and forth and settle at the vertical equilibrium position.\n- Step 3: The commutator's split-ring design means that just as the coil passes the vertical position (where the forces would otherwise reverse their turning effect), the brushes cross the gap and reconnect to the opposite halves of the ring, flipping the current direction in the coil at exactly the right moment.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "A DC motor has its coil between N and S poles with the field going left to right. The force on the left side of the coil is upward. Using Fleming's Left Hand Rule, determine the direction of current in the left side of the coil. (3 steps)", "answer": "- Step 1: Apply Fleming's Left Hand Rule. Thumb = Force = UP. First finger = Field = LEFT to RIGHT.\n- Step 2: With thumb up and first finger pointing right, the second finger (current) points INTO the page/screen.\n- Step 3: Therefore, current in the left side of the coil flows into the page. On the right side (where force is downward), the current flows out of the page. This is consistent with current flowing in a loop around the coil.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "How can you change (a) the speed and (b) the direction of a DC motor without modifying its construction? (2 steps)", "answer": "- Step 1: To change the SPEED, increase or decrease the current (e.g., change the voltage of the power supply, or add a variable resistor). More current → more force → faster rotation. You could also change the magnetic field strength (stronger magnets = more force).\n- Step 2: To change the DIRECTION, reverse the polarity of the power supply (swap the battery connections). This reverses the current direction, which reverses the force on each side of the coil, making it rotate the opposite way. Alternatively, you could reverse the magnetic field direction (flip the magnets).", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "What is the motor effect, and how does it differ from the generator effect? For each, state the input energy, output energy, and which Fleming's rule to use. (3 steps)", "answer": "- Step 1: The motor effect: a current-carrying conductor in a magnetic field experiences a force. Input = electrical energy, output = mechanical (kinetic) energy. Use Fleming's LEFT hand rule.\n- Step 2: The generator effect: moving a conductor through a magnetic field induces an EMF (and current if in a circuit). Input = mechanical energy, output = electrical energy. Use Fleming's RIGHT hand rule.\n- Step 3: They are reverse processes of each other — the motor converts electrical → mechanical, the generator converts mechanical → electrical. Same physics (electromagnetism), opposite energy flow. A motor acting as a brake is actually acting as a generator (back-EMF).", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "When a wire moves through a magnetic field, what is induced first — voltage or current? Why does this distinction matter? (2 steps)", "answer": "- Step 1: Voltage (EMF) is induced first. Current only flows if the wire is part of a complete circuit. The induced EMF exists regardless of whether a circuit is closed; the current depends on the circuit resistance.\n- Step 2: This distinction matters because the EMF is the cause and the current is the effect. The energy per unit charge (voltage) is what's directly induced by the changing flux. Current is simply the response of charges to that voltage when a path exists. In exam explanations, always say \"induces a voltage/EMF\" first, then \"if in a complete circuit, a current flows.\"", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "What are the three components of a transformer, and what is the key feature about the electrical connection between the primary and secondary coils? (2 steps)", "answer": "- Step 1: A transformer consists of: a primary coil (input), a secondary coil (output), and a soft iron core linking them magnetically.\n- Step 2: The two coils are NOT electrically connected to each other. Energy is transferred entirely through the changing magnetic field in the iron core. The primary coil creates a changing magnetic field, and the secondary coil sits within that changing field, where an EMF is induced by electromagnetic induction.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "Walk through the step-by-step process of how a transformer works, from input voltage to output current. How many key stages are there? (5 steps)", "answer": "- Step 1: An alternating voltage is applied to the primary coil, driving an alternating current through it.\n- Step 2: The alternating current in the primary coil creates an alternating (changing) magnetic field around the coil.\n- Step 3: The soft iron core channels and strengthens this changing magnetic field, linking it to the secondary coil.\n- Step 4: The changing magnetic field passes through the secondary coil, and by Faraday's Law, induces an alternating EMF (voltage) in the secondary coil.\n- Step 5: If the secondary coil is part of a complete circuit, the induced alternating voltage drives an alternating current through it. The output frequency equals the input frequency.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "Why must a transformer use AC and not DC? What would happen if you connected DC to the primary coil — would anything happen at all? (3 steps)", "answer": "- Step 1: A transformer requires a changing magnetic field to induce an EMF in the secondary coil. AC naturally provides this because the current continuously changes direction, creating a continuously changing magnetic field.\n- Step 2: With DC, the current is constant, so the magnetic field is constant, and there is no changing flux linkage in the secondary coil — therefore no induced EMF (no output). The transformer simply doesn't work with steady DC.\n- Step 3: However, at the MOMENT DC is switched on or off, there IS a brief change in flux (the field grows from zero or collapses to zero), so a momentary EMF is induced. But while the DC remains steadily on, the secondary coil produces nothing. This is why transformers are exclusively AC devices.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "Why is soft iron used for the transformer core instead of steel (hard magnetic material)? (2 steps)", "answer": "- Step 1: Soft iron is magnetically soft — it can be easily magnetised and demagnetised. This means it responds immediately to the changing magnetic field from the primary coil, faithfully channelling the changing flux to the secondary coil.\n- Step 2: Hard magnetic materials (like steel) retain their magnetism. If the core stayed magnetised from the previous half-cycle, it would not follow the alternating field properly, reducing the efficiency of flux transfer and causing hysteresis losses (energy wasted remagnetising the core each cycle).", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "What are eddy currents in a transformer core, why are they a problem, and how are they reduced? (3 steps)", "answer": "- Step 1: The iron core is a conductor sitting in a changing magnetic field. By electromagnetic induction, this changing field induces circulating currents within the core itself — these are eddy currents. They flow in loops within the core material.\n- Step 2: Eddy currents are a problem because they cause heating ($$I^2R$$ losses), wasting energy and reducing transformer efficiency.\n- Step 3: To reduce eddy currents, the core is laminated — split into thin slices that are electrically insulated from each other (like a loaf of bread). This breaks up the large loops that eddy currents would form, restricting them to smaller paths and greatly reducing their magnitude and associated heat loss.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "Write the transformer turns ratio equation. If the primary has 100 turns and the secondary has 200 turns, and the input voltage is 50 V, what is the output voltage? Is this a step-up or step-down transformer? (3 steps)", "answer": "- Step 1: The transformer equation is $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$, where $$V$$ = voltage, $$N$$ = number of turns, $$p$$ = primary, $$s$$ = secondary.\n- Step 2: Substituting: $$\\frac{50}{V_s} = \\frac{100}{200} = \\frac{1}{2}$$. So $$V_s = 50 \\times 2 = 100$$ V.\n- Step 3: Since the secondary voltage (100 V) is greater than the primary voltage (50 V), and $$N_s > N_p$$, this is a step-up transformer. It increases voltage and decreases current.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "For an ideal (100% efficient) transformer, write the power conservation equation. If the primary voltage is 40,000 V with a current of 20 A, and the secondary voltage is 250,000 V, what is the secondary current? (3 steps)", "answer": "- Step 1: For an ideal transformer, power in = power out: $$V_p I_p = V_s I_s$$, or equivalently $$I_1 V_1 = I_2 V_2$$.\n- Step 2: Substituting: $$40{,}000 \\times 20 = 250{,}000 \\times I_s$$. So $$800{,}000 = 250{,}000 \\times I_s$$.\n- Step 3: $$I_s = 800{,}000 / 250{,}000 = 3.2$$ A. The secondary has much higher voltage but much lower current — this is the whole point of stepping up voltage for power transmission.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "In the National Grid, why is voltage stepped UP for long-distance transmission and then stepped DOWN near homes? What physics principle makes high-voltage transmission more efficient? (3 steps)", "answer": "- Step 1: Power loss in transmission cables is $$P_{loss} = I^2 R$$. For a given cable resistance, reducing the current dramatically reduces the power lost as heat.\n- Step 2: Since $$P = IV$$ and the power station outputs a fixed power, increasing the voltage (step-up transformer) forces the current to decrease ($$I = P/V$$). For example, stepping up from 40 kV to 250 kV reduces the current by a factor of ~6, reducing $$I^2R$$ losses by a factor of ~36.\n- Step 3: Near homes, the voltage is stepped down to a safe level (230 V in the UK) by a step-down transformer. This increases the current back up to usable levels for appliances, but over the short distance from the substation to homes, the $$I^2R$$ losses are acceptably small.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "Name four sources of energy loss in a real transformer. For each, state briefly how it arises. (4 steps)", "answer": "- Step 1: Resistive (copper) losses — current flowing through the wire coils has resistance, causing $$I^2R$$ heating in the windings.\n- Step 2: Eddy current losses — the changing magnetic field induces circulating currents in the iron core, causing heating. Reduced by lamination.\n- Step 3: Hysteresis losses — energy is required to repeatedly magnetise and demagnetise the iron core each AC cycle. Some energy is dissipated as heat in this process.\n- Step 4: Flux leakage — not all of the magnetic flux from the primary coil links to the secondary coil; some flux \"escapes\" and doesn't contribute to the induced EMF, reducing efficiency.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "A step-down transformer has 4000 primary turns and 100 secondary turns. The primary voltage is 230 V and primary current is 2 A. If the efficiency is 95%, what is the secondary current? (4 steps)", "answer": "- Step 1: First find the secondary voltage using the turns ratio: $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$, so $$\\frac{230}{V_s} = \\frac{4000}{100} = 40$$. Therefore $$V_s = 230 / 40 = 5.75$$ V.\n- Step 2: Calculate input power: $$P_{in} = V_p \\times I_p = 230 \\times 2 = 460$$ W.\n- Step 3: Apply efficiency: $$P_{out} = 0.95 \\times 460 = 437$$ W.\n- Step 4: Find secondary current: $$I_s = P_{out} / V_s = 437 / 5.75 ≈ 76$$ A. A step-down transformer trades voltage for current — the secondary has much lower voltage but much higher current.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "A magnet sits on a top-pan balance (zeroed). A wire between the magnet's poles carries current left-to-right, and the balance reads +161 g (downward force on the balance). Using Newton's third law and Fleming's Left Hand Rule, determine the direction of the magnetic field. (3 steps)", "answer": "- Step 1: The balance reads +161 g downward, meaning the magnet is being pushed DOWN. By Newton's third law, the force on the wire is UPWARD (equal and opposite).\n- Step 2: Apply Fleming's Left Hand Rule: Thumb = Force on wire = UP, Second finger = Current = LEFT to RIGHT.\n- Step 3: First finger (Field) points INTO the page/screen. This is consistent with the magnet orientation: the field between the poles goes into the page, from N (front) to S (back) or vice versa depending on the specific magnet arrangement.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "In the balance experiment from Q40, if the current is increased, what happens to the balance reading? Explain the chain of reasoning. (2 steps)", "answer": "- Step 1: Increasing the current increases the force on the wire ($$F = BIL$$, and $$I$$ has increased). By Newton's third law, the force on the magnet also increases.\n- Step 2: A larger downward force on the magnet means a larger reading on the balance. The reading increases. This is a direct, proportional relationship — double the current, double the force, double the additional mass reading.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "A student says: \"A changing current in a wire creates a changing magnetic field, which induces a changing current in a nearby coil.\" This description is slightly imprecise for exam marks. What key intermediate step is missing? (2 steps)", "answer": "- Step 1: The missing step is the induced VOLTAGE (EMF). The changing magnetic field induces an EMF in the nearby coil. Current only flows if the coil is part of a complete circuit.\n- Step 2: The correct chain is: changing current → changing magnetic field → changing flux linkage in second coil → induced EMF → (if complete circuit) induced current. At A-level, you must explicitly mention the induced EMF and the change in flux linkage for full marks. Skipping directly to \"induced current\" loses marks.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "What is the difference between magnetically hard and magnetically soft materials? Give an example of each and state where each is used in this topic. (2 steps)", "answer": "- Step 1: Magnetically hard materials (e.g., steel) retain their magnetism permanently after the external field is removed — they are used for permanent magnets. Magnetically soft materials (e.g., soft iron) lose their magnetism quickly when the external field is removed — they are easily magnetised and demagnetised.\n- Step 2: In transformers, soft iron is used for the core because it must follow the alternating magnetic field — magnetising and demagnetising every half-cycle. A hard material would retain magnetism from previous cycles, causing hysteresis losses and poor flux transfer. In motors/generators, permanent magnets (hard materials) provide the fixed field.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "How can you make an electromagnet stronger? List three ways, and explain the physical reason each one works. (3 steps)", "answer": "- Step 1: Increase the current — more current means more moving charges, which creates a stronger magnetic field around the coil (the field is proportional to current).\n- Step 2: Increase the number of turns (coils) — each turn contributes to the total magnetic field, and the fields from all turns add up. More turns = stronger total field for the same current.\n- Step 3: Add a soft iron core — iron is easily magnetised and greatly concentrates and strengthens the magnetic field compared to air. The core essentially \"amplifies\" the field created by the current, making the electromagnet much stronger than a coil alone.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "A coil rotates from a position where flux linkage is maximum to a position where it is zero, in 0.1 s. The coil has 100 turns, area 0.02 m², and the field is 0.5 T. Calculate the average EMF induced. (4 steps)", "answer": "- Step 1: Calculate the initial flux linkage (maximum, perpendicular): $$N\\Phi_{initial} = BAN = 0.5 \\times 0.02 \\times 100 = 1.0$$ Wb turns.\n- Step 2: The final flux linkage is zero (coil parallel to field): $$N\\Phi_{final} = 0$$.\n- Step 3: Change in flux linkage: $$\\Delta(N\\Phi) = |0 - 1.0| = 1.0$$ Wb turns.\n- Step 4: By Faraday's Law: $$\\varepsilon = \\frac{\\Delta(N\\Phi)}{\\Delta t} = \\frac{1.0}{0.1} = 10$$ V. The average EMF induced is 10 V.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "A coil of 200 turns and area 0.02 m² rotates at 50 Hz in a 0.5 T field. Find (a) the angular frequency and (b) the peak EMF. (3 steps)", "answer": "- Step 1: Angular frequency $$\\omega = 2\\pi f = 2\\pi \\times 50 = 100\\pi \\approx 314$$ rad/s.\n- Step 2: Peak EMF $$\\varepsilon_{max} = BAN\\omega = 0.5 \\times 0.02 \\times 200 \\times 100\\pi = 200\\pi \\approx 628$$ V.\n- Step 3: This peak occurs when the coil is parallel to the field (flux linkage is zero but changing fastest). The instantaneous EMF at any time is $$\\varepsilon = 628\\sin(314t)$$ V.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "Explain why a transformer doesn't work with steady DC but a brief EMF IS induced when DC is first switched on or switched off. What direction is the EMF at switch-off compared to switch-on? (3 steps)", "answer": "- Step 1: When DC is switched ON, the current rises from zero to its steady value. This is a changing current → changing magnetic field → changing flux linkage in the secondary → EMF is induced momentarily. A current flows briefly in the secondary.\n- Step 2: While DC remains steadily ON, the current is constant, so the magnetic field is constant, and there is no changing flux linkage. The induced EMF drops to zero, and no current flows in the secondary.\n- Step 3: When DC is switched OFF, the current drops from its steady value to zero. This is again a changing flux, so an EMF is induced — but in the OPPOSITE direction to the switch-on case, because the flux is now decreasing rather than increasing. A momentary current flows in the opposite direction.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "If you double the number of turns on the secondary coil of a transformer while keeping the primary turns the same, what happens to the output voltage and output current (assuming ideal transformer and fixed input power)? (2 steps)", "answer": "- Step 1: From the turns ratio $$V_s/V_p = N_s/N_p$$, doubling $$N_s$$ doubles the output voltage $$V_s$$.\n- Step 2: From power conservation $$V_p I_p = V_s I_s$$, if $$V_s$$ doubles and input power is fixed, then $$I_s$$ must halve. More turns on the secondary means more voltage but less current — the transformer trades one for the other.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "A proton and an electron travel at the same speed perpendicular to the same magnetic field. Which one has the larger radius of circular orbit? Why? (3 steps)", "answer": "- Step 1: The radius of circular motion is $$r = \\frac{mv}{BQ}$$. Both particles have the same speed $$v$$, the same field $$B$$, and the same magnitude of charge $$Q$$ (both $$e$$).\n- Step 2: The proton has a much larger mass ($$m_p \\approx 1836 m_e$$). Since $$r \\propto m$$ (with everything else equal), the proton has a radius about 1836 times larger.\n- Step 3: Physical intuition: the proton is much heavier, so the same centripetal force produces much less centripetal acceleration ($$a = F/m$$). It curves more gently, tracing a much larger circle. The electron, being light, is deflected sharply into a tight circle.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "A wire carrying 2 A has length 0.5 m in a 0.4 T field. The wire is at 30° to the field lines. Is the force on the wire closer to 0.1 N, 0.2 N, or 0.4 N? (3 steps)", "answer": "- Step 1: Use $$F = BIL\\sin\\theta = 0.4 \\times 2 \\times 0.5 \\times \\sin 30°$$.\n- Step 2: $$\\sin 30° = 0.5$$, so $$F = 0.4 \\times 2 \\times 0.5 \\times 0.5 = 0.2$$ N.\n- Step 3: The force is 0.2 N. If the wire were perpendicular ($$\\theta = 90°$$), the force would be 0.4 N. The 30° angle halves the force compared to the perpendicular case. This shows how the angular factor significantly affects the result.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "Two identical coils are in the same magnetic field. Coil A has 50 turns and rotates at 10 Hz. Coil B has 100 turns and rotates at 5 Hz. Which coil produces the larger peak EMF? (3 steps)", "answer": "- Step 1: Peak EMF = $$BAN\\omega = BAN \\times 2\\pi f$$. For Coil A: $$\\varepsilon_A \\propto 50 \\times 10 = 500$$. For Coil B: $$\\varepsilon_B \\propto 100 \\times 5 = 500$$.\n- Step 2: The products are the same! Since $$\\varepsilon_{max} \\propto Nf$$ (for fixed $$B$$ and $$A$$), doubling the turns and halving the frequency gives the same peak EMF.\n- Step 3: However, Coil A's output has higher frequency (10 Hz vs 5 Hz) but lower amplitude per turn, while Coil B has lower frequency but more turns contributing. The peak values are equal, but the time-behavior differs. This demonstrates that both $$N$$ and $$\\omega$$ contribute independently to peak EMF.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "A student claims: \"If the magnetic flux through a coil is very large, the induced EMF must also be very large.\" Is this correct? Explain using Faraday's Law. (2 steps)", "answer": "- Step 1: This is incorrect. Faraday's Law states that the induced EMF depends on the RATE OF CHANGE of flux linkage, not on the flux itself: $$\\varepsilon = \\frac{\\Delta(N\\Phi)}{\\Delta t}$$.\n- Step 2: A very large but constant flux produces zero EMF (no change = no induction). A very small but rapidly changing flux can produce a large EMF. The key quantity is the gradient of the flux-time graph, not the height. This is the most important conceptual point in the entire electromagnetic induction topic.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": true}, {"question": "Synthesis question: A generator coil rotates in a magnetic field. At the instant the coil is perpendicular to the field, explain why (a) the flux linkage is maximum, (b) the EMF is zero, and (c) the current (if any) is zero. Connect all three observations. (3 steps)", "answer": "- Step 1: When the coil is perpendicular to the field, the maximum number of field lines pass through the coil area. Since $$\\Phi = BA\\cos\\theta$$ and $$\\theta = 0°$$, flux linkage $$N\\Phi = BAN$$ is at its maximum value.\n- Step 2: At this instant, the flux linkage is at a turning point (like the peak of a cosine curve). The gradient of the flux-time graph is zero — the flux is momentarily not changing. By Faraday's Law, $$\\varepsilon = d(N\\Phi)/dt = 0$$. No change in flux means no induced EMF.\n- Step 3: With zero EMF, there is no driving voltage for current, so the current is also zero at this instant. All three observations stem from the same root cause: at the peak of the flux curve, the rate of change is zero. Maximum flux and zero EMF always occur simultaneously.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": true}, {"question": "Synthesis question: In the National Grid, a power station generates 500 MW of power at 25 kV. The voltage is stepped up to 400 kV for transmission. If the total cable resistance is 200 Ω, compare the power lost during transmission at 25 kV vs. at 400 kV. Which loses dramatically less, and by roughly what factor? (3 steps)", "answer": "- Step 1: At 25 kV: current $$I = P/V = 500 \\times 10^6 / 25 \\times 10^3 = 20{,}000$$ A. Power loss = $$I^2R = (20{,}000)^2 \\times
