imary. But the secondary has *more* turns, so the *total* changing flux linkage $$N_s\\Phi$$ is larger than $$N_p\\Phi$$. By Faraday's law, EMF is proportional to the total changing flux linkage, so more turns → more EMF → higher output voltage. Each turn is like adding another \"gate\" that the changing flux pushes through.\n- Step 3: The ratio is *exact* for an ideal transformer because every turn on both coils experiences the *same* rate of change of flux (the iron core ensures they share the same flux). So the voltage per turn is identical on both sides: $$V_p/N_p = V_s/N_s$$, and the total voltages scale purely with the number of turns.\n\nVoltage scales with turns because each turn adds another equal slice of induced EMF — more slices, bigger total.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "The ideal transformer turns ratio is $$\\frac{V_1}{V_2} = \\frac{N_1}{N_2}$$. Derive the intuition: why should doubling the turns double the voltage? (3 steps)", "answer": "- Step 1: Each turn of the secondary coil experiences the same changing flux (they're all wrapped around the same core). By Faraday's law, each turn gets the same induced EMF — call it $$\\varepsilon_0$$.\n- Step 2: With $$N_2$$ turns, the EMFs add in series: $$V_2 = N_2 \\times \\varepsilon_0$$. Similarly, the primary has $$N_1$$ turns, and the applied voltage must overcome the back-EMF in each turn: $$V_1 = N_1 \\times \\varepsilon_0$$ (same $$\\varepsilon_0$$ because same core, same changing flux).\n- Step 3: Dividing: $$\\frac{V_1}{V_2} = \\frac{N_1 \\varepsilon_0}{N_2 \\varepsilon_0} = \\frac{N_1}{N_2}$$. The $$\\varepsilon_0$$ cancels — the ratio depends only on turns. More secondary turns → each turn still gets the same EMF, but there are more of them adding up → higher output voltage.\n\nThis is why a step-up transformer has more turns on the secondary: more turns \"collecting\" the same per-turn EMF.", "source": "GLM 5.1 ②", "_id": "glm_2_39"}, {"question": "Why is the iron core of a transformer made of *soft* iron (not steel or hard iron) and *laminated* (not solid)? (3 steps)", "answer": "- Step 1: **Soft iron** is used because it is easily magnetised *and demagnetised*. Since the field alternates 50 times per second, the core must repeatedly flip its magnetisation — a hard magnetic material would resist this and waste huge amounts of energy per cycle (hysteresis losses).\n- Step 2: The core is **laminated** — cut into thin insulated slices \"like a loaf of bread\" — to reduce eddy currents. Iron is a conductor, and a solid block sitting in a changing magnetic field would have circulating currents induced within it (Faraday's law applied to the iron itself).\n- Step 3: These eddy currents would dissipate energy as $$I^2R$$ heating in the core, wasting power. Laminating breaks up the conducting paths, forcing induced currents into much smaller loops with higher resistance, drastically reducing losses.\n\nBonus: solid iron core → hot core, low efficiency; laminated soft iron → cool, ~95%+ efficient.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "Why does the National Grid use step-up transformers to transmit electricity at very high voltages? (3 steps)", "answer": "- Step 1: Power delivered from the power station is fixed: $$P = IV$$. If we transmit at low voltage, current must be huge to carry the same power.\n- Step 2: Heating loss in the cables is $$P_{\\text{loss}} = I^2R$$, which is *quadratic* in current. Halving the current cuts losses by a factor of 4.\n- Step 3: So stepping up to very high voltage (e.g. 40 kV → 250 kV) dramatically reduces $$I$$, drastically cutting $$I^2R$$ losses. At the consumer end, a step-down transformer reduces voltage to a safe 230 V.\n\nKey point: cable resistance $$R$$ is fixed by the cable material — the only knob we can turn is $$I$$, and we minimise it by maximising $$V$$.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "A transformer's secondary coil has no electrical connection to the primary — they are linked only by the iron core. Explain how energy is *transferred* from primary to secondary without any electrons crossing the core. (3 steps)", "answer": "- Step 1: The primary coil's alternating current creates a changing magnetic field in the iron core. This is *electrical energy → magnetic energy*: the current does work against the back-EMF (self-induction) to build and reverse the field each cycle, storing energy in the magnetic field.\n- Step 2: The iron core channels this changing magnetic field to the secondary coil. The core acts like a \"magnetic conductor\" — just as a copper wire channels electric current, the iron core channels magnetic flux, concentrating it and directing it from one coil to the other. No electrons flow through the core; only the *field pattern* propagates through it.\n- Step 3: The changing flux linkage in the secondary induces an EMF (Faraday's law), which drives current in the secondary circuit if one exists. This is *magnetic energy → electrical energy*: the changing field does work on the charges in the secondary wire. The energy transfer chain is: electrical (primary) → magnetic (core) → electrical (secondary). The magnetic field is the *carrier* — the middleman that transports energy without transporting charge.\n\nEnergy flows through the *field*, not through the *wire*. The iron core is a pipe for magnetic flux, not a pipe for electrons.", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "Explain what \"hysteresis loss\" means in a transformer core, and why using *soft* iron (rather than hard/magnetised iron) minimises it. Use the analogy of bending a spring. (2 steps)", "answer": "- Step 1: Hysteresis loss is the energy dissipated each time the core is *magnetised and demagnetised*. In a transformer, the core's magnetic direction must flip every half-cycle (following the alternating field). This flipping costs energy — the atomic magnetic domains in the iron must be reoriented each time, and this reorientation isn't perfectly efficient. Some energy is lost as heat each cycle, like friction inside the material.\n- Step 2: The spring analogy: **soft iron** is like a *flexible spring* — easy to bend back and forth, low energy cost per cycle. **Hard iron** (permanent magnet material) is like a *stiff spring* — hard to bend, lots of energy dissipated as heat each time you force it to reverse direction. Soft iron \"goes with the flow,\" magnetising easily when the field pushes it and releasing easily when the field reverses. Hard iron fights the changes, wasting more energy as heat.\n\nSoft iron = flexible spring (low hysteresis). Hard iron = stiff spring (high hysteresis). The core must flex easily to follow the AC field.", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "An alternator (AC generator) uses slip rings, while a dynamo (DC generator) uses a split-ring commutator. What is the physical difference between these two connectors, and how does each affect the output waveform? (3 steps)", "answer": "- Step 1: **Slip rings** are two continuous, smooth rings. Each end of the rotating coil is permanently connected to one ring, and each ring maintains continuous contact with its own brush. As the coil rotates, the current direction in the coil reverses every half-turn, and because the connections never swap, this reversal is transmitted directly to the external circuit → **alternating current** output.\n- Step 2: **Split-ring commutator** is a single ring split into two halves with a gap. Each half is connected to one end of the coil. Every half-turn, the gap passes the brushes, which *swaps* which brush contacts which half-ring. This swap reverses the external connection at exactly the moment the coil current reverses, so the external current always flows in the same direction → **direct current** output (bumpy, but all one sign).\n- Step 3: The waveforms: alternator produces a smooth sine wave oscillating above and below zero. Dynamo produces a rectified sine wave — all positive humps (or all negative, depending on orientation). Both have the same frequency and peak value for the same coil and rotation speed; only the sign convention in the external circuit differs.\n\n+ Edge case: the dynamo's DC output is not smooth — it pulses. Real DC motors/generators use multiple coil windings offset at different angles to smooth the output.", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "In a simple DC motor with a permanent magnet, why does the coil experience a torque only when current flows, and why does the torque direction depend on the coil's orientation? (3 steps)", "answer": "- Step 1: Each side of the coil is a current-carrying conductor in the magnetic field. By $$F = BIL$$, each side experiences a force perpendicular to both current and field.\n- Step 2: On opposite sides of the coil, current flows in opposite directions → forces are equal and opposite → they form a couple, producing torque about the coil's axis.\n- Step 3: As the coil rotates, the direction of \"up\" for each wire changes. Without the commutator, the torque would reverse every half-turn (opposing the motion). The split-ring commutator swaps current direction every half-turn, keeping the torque in the same sense → continuous rotation.\n\nTakeaway: the commutator is what makes DC motors *keep* rotating in one direction rather than oscillating.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "There are two force formulas: $$F = BIL \\sin \\theta$$ and $$F = BQv \\sin \\theta$$. Conceptually, why are there *two* different formulas, and how are they related? (3 steps)", "answer": "- Step 1: $$F = BIL \\sin \\theta$$ applies to a **current-carrying conductor** (a wire) where current is a continuous flow of many charges through a macroscopic length $$L$$. $$F = BQv \\sin \\theta$$ applies to a **single isolated moving charge** (like an electron or proton) with charge $$Q$$ and velocity $$v$$.\n- Step 2: They are actually the same physics. Current $$I = Q/t$$, and in a wire, $$v = L/t$$ (drift velocity times time gives length). So $$BIL = B(Q/t)(vt) = BQv$$. The wire formula is just the single-charge formula summed over all the charges in length $$L$$.\n- Step 3: The key practical difference: for a wire, you know $$I$$ and $$L$$; for a particle beam, you know $$Q$$ and $$v$$. Use whichever matches the information given. Don't mix them — never substitute $$I$$ into the particle formula or $$v$$ into the wire formula.", "source": "GLM 5.1 ②", "_id": "glm_2_27"}, {"question": "Suppose you replace the iron core in a transformer with a copper core of the same shape. What happens qualitatively? (3 steps)", "answer": "- Step 1: Copper has much lower magnetic permeability than iron (essentially the same as vacuum), so it won't channel magnetic flux — flux linkage between primary and secondary collapses.\n- Step 2: Copper is also an excellent electrical conductor, so massive eddy currents would form in the core, dissipating huge amounts of energy.\n- Step 3: Result: extremely poor coupling (low secondary EMF) and extremely high losses (heat everywhere). The device would be essentially useless as a transformer.\n\nTakeaway: iron's role is dual — high permeability (good) and (with laminations) manageable eddy currents (also good). Copper has neither property helpfully.", "source": "Opus 4.7 ②", "_id": "opus_2_60"}, {"question": "Derive the turns-ratio equation $$V_p/V_s = N_p/N_s$$ from Faraday's law, assuming perfect flux linkage. (3 steps)", "answer": "- Step 1: Assume all flux from the primary threads the secondary equally (perfect core). Both coils experience the *same* $$d\\Phi/dt$$ per turn.\n- Step 2: Faraday's law applied to each coil: $$V_p = N_p \\cdot d\\Phi/dt$$ and $$V_s = N_s \\cdot d\\Phi/dt$$.\n- Step 3: Dividing: $$V_p/V_s = N_p/N_s$$. The voltages scale with the number of turns because each turn adds one more \"unit\" of induced EMF from the same shared flux.\n\nTakeaway: this is exact only for ideal (lossless, perfect flux linkage) transformers.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "Why does moving a bar magnet faster into a coil induce a larger EMF, and what happens if you accelerate it? (3 steps)", "answer": "- Step 1: EMF depends on $$d\\Phi/dt$$. A faster magnet means the flux through the coil rises more quickly with time — larger derivative → larger EMF.\n- Step 2: Accelerating the magnet (increasing its speed as it enters) means $$d\\Phi/dt$$ itself is *increasing* — the induced EMF grows over time rather than being constant.\n- Step 3: There's a feedback: by Lenz's law, the induced current creates an opposing force on the magnet. To keep accelerating, you must push harder against this force — the extra mechanical work you do is what appears as extra electrical energy.\n\nTakeaway: the coil \"fights back\" harder as flux changes faster — energy conservation in action.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "What is the relationship between the current ratio and the turns ratio in an ideal transformer, and why is it *inverse*? Derive it from the two transformer equations. (3 steps)", "answer": "- Step 1: Start with the two ideal transformer equations: (1) Turns ratio: $$\\frac{V_p}{V_s} = \\frac{N_p}{N_s}$$; (2) Power conservation: $$I_p V_p = I_s V_s$$, which gives $$\\frac{I_p}{I_s} = \\frac{V_s}{V_p}$$.\n- Step 2: Substitute the turns ratio into the power equation. From (1): $$\\frac{V_s}{V_p} = \\frac{N_s}{N_p}$$ (just invert both sides). Plug this into (2): $$\\frac{I_p}{I_s} = \\frac{N_s}{N_p}$$.\n- Step 3: The current ratio is the **inverse** of the turns ratio: more turns on the secondary → higher voltage → *lower* current. This makes physical sense because power must be conserved — if voltage goes up by factor $$k$$ (more turns), current must go down by factor $$k$$ to keep $$IV$$ constant. The turns ratio \"decides\" the voltage; energy conservation then \"forces\" the current to be the inverse.\n\n$$\\frac{I_p}{I_s} = \\frac{N_s}{N_p}$$ — more secondary turns means less secondary current. It's not arbitrary; it's energy conservation enforcing the inverse.", "source": "GLM 5.1 ①", "_id": "glm_1_32"}, {"question": "List the four types of energy loss in a real transformer and give a one-sentence physical explanation for each. Which loss is reduced by lamination, and which by using soft iron? (2 steps)", "answer": "- Step 1: The four losses are:\n+ **Copper (I²R) losses**: resistive heating in the primary and secondary windings — current flowing through wire with resistance always produces heat.\n+ **Eddy current losses**: circulating currents induced in the conducting iron core by the changing magnetic field, dissipating energy as heat — **reduced by lamination** (insulated slices break the current loops).\n+ **Hysteresis losses**: energy wasted each cycle as the core is magnetised and demagnetised — the magnetisation process itself costs energy, like bending a stiff spring back and forth — **reduced by using soft iron** (which magnetises/demagnetises easily, like a flexible spring).\n+ **Flux leakage**: not all magnetic field lines from the primary reach the secondary — some escape through the air, so the flux linkage between coils isn't perfect — reduced by better core design (wrapping coils tightly around the core).\n- Step 2: Lamination specifically targets eddy currents (breaking the conducting loops). Soft iron specifically targets hysteresis (making magnetisation/demagnetisation easy). Copper losses can be reduced by using thicker wire (lower resistance). Flux leakage can be reduced by winding both coils on the *same* core section. No single fix addresses all four losses — real transformer design is a multi-variable optimisation.\n\nEach loss has a distinct physical cause and a distinct engineering fix — there's no single \"make it efficient\" button.", "source": "GLM 5.1 ①", "_id": "glm_1_24"}, {"question": "When a magnet is pushed faster toward a coil, the induced EMF is larger. A student says \"this is because more flux passes through the coil.\" Is this correct? Explain the real reason. (2 steps)", "answer": "- Step 1: This is **incorrect**. More flux *does* pass through the coil when the magnet is closer, but the EMF depends on the *rate of change* of flux, not the total flux. Pushing faster doesn't change the total flux the coil eventually receives — it changes *how quickly* that flux arrives.\n- Step 2: The real reason: pushing faster means the flux through the coil changes *more rapidly* — $$\\frac{d\\Phi}{dt}$$ is larger because the same total change in flux happens in a shorter time. By Faraday's law $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$, a larger rate of change gives a larger EMF. It's like pouring water into a bucket: the bucket's fill level (flux) is the same regardless of speed, but the *flow rate* ($$d\\Phi/dt$$, which determines EMF) is faster if you pour quickly.\n\nFaster motion → faster flux change → larger EMF. The *speed* of change matters, not the *amount* of change.", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "The transformer turns ratio is $$\\frac{V_1}{V_2} = \\frac{N_1}{N_2}$$. Derive the intuition for why doubling the number of turns on the secondary doubles the output voltage. (3 steps)", "answer": "- Step 1: Each turn of the secondary coil experiences the same changing flux linkage (they're all wrapped around the same core). By Faraday's law, each turn has the same induced EMF — call it $$\\varepsilon_0$$ per turn.\n- Step 2: The total EMF in the secondary is the sum over all turns: $$V_2 = N_2 \\times \\varepsilon_0$$. Similarly, the primary has $$V_1 = N_1 \\times \\varepsilon_0$$ (the same flux change links both coils through the shared core).\n- Step 3: Dividing: $$\\frac{V_1}{V_2} = \\frac{N_1 \\varepsilon_0}{N_2 \\varepsilon_0} = \\frac{N_1}{N_2}$$. Doubling $$N_2$$ doubles the number of turns each contributing $$\\varepsilon_0$$, so the total output voltage doubles. More turns = more \"votes\" for voltage.\n\n+ This also explains why a step-up transformer ($$N_2 > N_1$$) increases voltage: the secondary has more turns, each contributing the same per-turn EMF, so the total is higher.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "In F = BIL sin θ and F = BQv sin θ, what does θ refer to in each case, and why can't the two formulas be mixed up? (3 steps)", "answer": "- Step 1: In $$F = BIL\\sin\\theta$$, $$\\theta$$ is the angle between the *wire (current direction)* and $$\\vec{B}$$. This applies to a continuous current in a conductor of length $$L$$.\n- Step 2: In $$F = BQv\\sin\\theta$$, $$\\theta$$ is the angle between the *velocity of the charge* and $$\\vec{B}$$. This applies to an isolated moving charge with no wire.\n- Step 3: They can't be mixed because they describe different physical situations:\n+ The wire formula assumes many charges flowing steadily — $$IL$$ acts like a \"flux\" of charge.\n+ The particle formula tracks a single charge — no $$L$$, no $$I$$, just $$Q$$ and $$v$$.\n\nActually, one can derive the wire formula from the particle formula by summing over charge carriers: $$I = nAvQ$$ and $$L$$ gives volume $$AL$$, leading to $$F = BIL\\sin\\theta$$. They're consistent but describe different setups.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Why does the formula for the radius of circular motion in a magnetic field, $$r = \\frac{mv}{BQ}$$, predict that heavier or faster particles curve less? (2 steps)", "answer": "- Step 1: The radius formula comes from equating magnetic force (centripetal) to the circular motion requirement: $$BQv = \\frac{mv^2}{r}$$, giving $$r = \\frac{mv}{BQ}$$. Larger $$r$$ means gentler curve.\n- Step 2: **Heavier particles** ($$m$$↑) have more inertia — the same force produces less acceleration, so the curve is wider (larger $$r$$). **Faster particles** ($$v$$↑) are harder to deflect — they cover more distance before the perpendicular force can turn them, so the radius is larger. Conversely, stronger field ($$B$$↑) or larger charge ($$Q$$↑) pulls harder → tighter curve → smaller $$r$$.\n\nThis is why mass spectrometers work: particles of different mass (but same charge and speed) follow circles of different radius, separating them spatially.", "source": "GLM 5.1 ②", "_id": "glm_2_55"}, {"question": "A charged particle moves in a circle of radius $$r$$ in a magnetic field. If you double the particle's speed, what happens to the radius? If you double the magnetic field strength instead, what happens? Explain each case physically. (3 steps)", "answer": "- Step 1: From $$r = \\frac{mv}{BQ}$$: doubling the speed $$v$$ doubles the radius ($$r \\propto v$$). Physically, a faster particle has more momentum and is harder to deflect — the magnetic force $$BQv$$ does increase with speed, but only linearly, while the centripetal requirement $$mv^2/r$$ increases with $$v^2$$, so the radius must grow to balance.\n- Step 2: Doubling the field $$B$$ *halves* the radius ($$r \\propto 1/B$$). Physically, a stronger field exerts a stronger force on the charge at every instant, deflecting it more aggressively and bending it into a tighter circle. The steering is sharper.\n- Step 3: The key insight: $$r$$ depends on the *ratio* $$mv/BQ$$ — momentum (resistance to turning) divided by force (strength of turning). Increasing momentum widens the circle; increasing force tightens it. Speed and field have *opposite* effects on radius because one is in the numerator and the other in the denominator.\n\nRadius = momentum / force. More momentum → wider. More force → tighter. They compete.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "Synthesis question: In the National Grid, why can't we just use thick cables with low resistance instead of stepping up the voltage? Wouldn't that also reduce $$I^2R$$ losses? (3 steps)", "answer": "- Step 1: Thicker cables do have lower resistance ($$R \\propto 1/A$$ for a given material and length), which would reduce $$I^2R$$ losses for a given current. So technically, yes — thicker cables help.\n- Step 2: However, the cables are hundreds of kilometres long. Making them thick enough to carry 20 A at 40 kV with acceptably low losses would require enormously thick, heavy, expensive copper/aluminium. The cost and weight of the cable, plus the cost of the support towers to hold it, would be prohibitive.\n- Step 3: Stepping up the voltage is far more efficient because $$P_{loss} = I^2R = \\frac{P^2R}{V^2}$$. Loss scales as $$1/V^2$$ — increasing voltage by a factor of 6 reduces losses by a factor of 36, without changing the cables at all. It's much cheaper to build transformers than to install massively thicker cables across the country.\n\nThe key insight: reducing current is far more effective than reducing resistance, because loss depends on $$I^2$$ but only linearly on $$R$$.", "source": "GLM 5.1 ②", "_id": "glm_2_64"}, {"question": "In the electron-orbit-in-a-B-field picture, does the direction the electron circles depend on the sign of its charge? Explain. (3 steps)", "answer": "- Step 1: For a positive charge moving to the right in a B-field into the page, Fleming's LHR gives force upward → curves upward → circles anticlockwise.\n- Step 2: For an electron (negative), moving right in the same field: point second finger *opposite* to its motion (i.e. to the left, because it's negative). Now LHR gives force *downward* → curves downward → circles *clockwise*.\n- Step 3: So yes: positive and negative charges circle in *opposite* senses in the same field. This is exploited in mass spectrometers to separate particles by sign of charge.\n\nTakeaway: the sign of the charge sets the sense of the circle; the magnitude sets the radius.", "source": "Opus 4.7 ②", "_id": "opus_2_56"}, {"question": "For an AC generator, the EMF is $$\\varepsilon = BAN\\omega \\sin(\\omega t)$$. At what orientation of the coil is the EMF maximum, and at what orientation is it zero? Why is this counterintuitive? (3 steps)", "answer": "- Step 1: EMF is maximum when $$\\sin(\\omega t) = 1$$, which occurs when the coil is **parallel** to the field (the normal to the coil is perpendicular to the field). At this instant, the flux through the coil is zero, but the *rate of change* of flux is maximum — the coil is cutting through field lines at its fastest.\n- Step 2: EMF is zero when $$\\sin(\\omega t) = 0$$, which occurs when the coil is **perpendicular** to the field (the normal is aligned with the field). At this instant, the flux is at its maximum value, but the coil is momentarily \"turning around\" at the peak — the rate of change is zero.\n- Step 3: The counterintuitive point: **maximum flux ≠ maximum EMF**. EMF depends on the *gradient* of the flux-time graph, not the flux value itself. At the flux peak, the graph is flat (zero gradient = zero EMF). At the flux zero-crossing, the graph is steepest (maximum gradient = maximum EMF).\n\nThis is like a pendulum: maximum speed at the bottom (where displacement = 0), zero speed at the extremes (where displacement is maximum).", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "Why is the induced EMF said to be $$\\varepsilon = BANω\\sin(ωt)$$ starting from a coil whose plane is *parallel* to the field at t = 0? (3 steps)", "answer": "- Step 1: At $$t=0$$, if the coil plane is parallel to $$\\vec{B}$$, the normal to the coil is *perpendicular* to $$\\vec{B}$$ → $$\\theta = 90°$$ → $$\\cos\\theta = 0$$ → flux = 0.\n- Step 2: As the coil rotates, $$\\theta(t) = 90° - \\omega t$$, so $$\\cos\\theta(t) = \\sin(\\omega t)$$, and flux linkage becomes $$N\\Phi(t) = BAN\\sin(\\omega t)$$.\n- Step 3: Taking rate of change: $$\\varepsilon = -d(N\\Phi)/dt = -BAN\\omega\\cos(\\omega t)$$. But we care about magnitude: peak EMF appears when $$|\\cos(\\omega t)| = 1$$.\n\nConvention: with the choice of starting orientation, the sine or cosine form flips. The physics is the same — a wave 90° out of phase with the flux. Peak is always $$BAN\\omega$$.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "In the formula $$\\Phi = BA\\cos\\theta$$, a question states \"the coil is rotated so its plane makes an angle of 60° with the field direction.\" What value of $$\\theta$$ do you substitute, and why is this a common exam trap? (3 steps)", "answer": "- Step 1: The angle $$\\theta$$ in $$\\Phi = BA\\cos\\theta$$ is measured from the **normal** to the plane, not from the plane itself. If the *plane* makes 60° with the field, then the *normal* makes 30° with the field (normal is perpendicular to the plane, so the angles add to 90°). You substitute $$\\theta = 30°$$, giving $$\\Phi = BA\\cos 30°$$.\n- Step 2: The trap: many students substitute $$\\theta = 60°$$ directly, getting $$\\Phi = BA\\cos 60°$$, which is *wrong* — they've used the angle from the plane instead of the normal. $$\\cos 60° = 0.5$$ while $$\\cos 30° \\approx 0.87$$, so the wrong answer is nearly half the correct one.\n- Step 3: The defence: always *draw the normal* to the coil's plane on your diagram, then measure the angle between the field lines and this normal. The normal is the \"arrow sticking out of the face of the coil\" — flux is about field lines punching through the face, so the relevant angle is between the field and the face's perpendicular. If a question gives you the angle from the plane, subtract from 90° to get the angle from the normal.\n\n$$\\theta$$ in the formula is always from the *normal*. If the question gives an angle from the *plane*, convert it: $$\\theta_{normal} = 90° - \\theta_{plane}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_36"}, {"question": "Why is the transformer core made of *iron*, and why is it *laminated*? (3 steps)", "answer": "- Step 1: Iron is used because it has high magnetic permeability — it channels magnetic field lines efficiently, dramatically strengthening the flux linkage between primary and secondary compared to an air core. \"Soft\" iron specifically is used because it magnetises and demagnetises easily, following the AC cycle without lagging.\n- Step 2: But iron is also an electrical conductor. A changing magnetic field through a bulk iron core induces circulating currents *inside the core itself* — eddy currents — which dissipate energy as heat ($$I^2R$$ losses).\n- Step 3: Laminating the core (thin slices with insulation between them) breaks up the conducting loops. Eddy currents can no longer circulate freely across the whole core, dramatically reducing power loss.\n\nAnalogy: laminations are like \"chopping the loaf of bread into slices\" and putting greaseproof paper between them.", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "Why is the transformer core made of *soft iron* rather than a permanent magnet material, and why is it *laminated* (split into insulated slices like a loaf of bread)? (3 steps)", "answer": "- Step 1: **Soft iron** is used because it *easily magnetises and demagnetises*. The core must follow the alternating magnetic field — flipping its magnetisation every half-cycle. A permanent-magnet material would resist being demagnetised, fighting the alternation and wasting energy (hysteresis loss). Soft iron \"goes with the flow,\" magnetising when the primary current drives it and releasing when the current reverses.\n- Step 2: **Lamination** suppresses **eddy currents** — circulating currents that would form in the conducting iron core because the core itself is sitting in a *changing magnetic field* (the very field the transformer creates). By Faraday's law, any conductor in a changing field gets induced currents; in a solid iron block, these currents swirl in loops (eddies), dissipating energy as $$I^2R$$ heat.\n- Step 3: Lamination works by slicing the core into thin, *electrically insulated* sheets. Eddy currents need large continuous conducting loops to flow — the insulation between slices *breaks* those loops, confining any residual eddy currents to tiny paths within each thin slice. The smaller the loop, the smaller the current, the smaller the $$I^2R$$ loss. The \"loaf of bread\" analogy: each slice is separate, so you can't circulate current across the whole loaf.\n\nSoft iron = magnetically compliant (low hysteresis). Laminated = electrically broken up (low eddy currents). Both choices minimise energy waste.", "source": "GLM 5.1 ①", "_id": "glm_1_23"}, {"question": "Why does a step-up transformer at the power station *reduce* energy waste in transmission, even though the transformer itself has some energy losses? Why is the trade-off worthwhile? (2 steps)", "answer": "- Step 1: Without the step-up transformer, current in the transmission lines would be huge (e.g. ~4350 A for 1 MW at 230 V), and $$I^2R$$ losses would be catastrophic — most energy would heat the cables and never reach consumers. With the step-up transformer, current drops to ~4 A (at 250 kV), and $$I^2R$$ losses become tiny. The *savings* in transmission losses are enormous — orders of magnitude.\n- Step 2: The transformer itself loses maybe 1–5% of the power (copper losses, eddy currents, hysteresis, flux leakage). But this small percentage loss is *far* less than the hundreds-of-percent loss that would occur without stepping up the voltage. The trade-off is overwhelmingly worthwhile: lose ~2% in the transformer to save ~98% that would otherwise be wasted in the cables. It's like paying a small toll to avoid a road that would burn up your entire fuel tank.\n\nTransformer losses are a small tax; transmission losses without step-up are a catastrophic drain. The tax is worth paying.", "source": "GLM 5.1 ①", "_id": "glm_1_40"}, {"question": "Sketch conceptually the EMF-vs-time output of an alternator and a dynamo driven at the same speed. What's the same, what's different, and why? (3 steps)", "answer": "- Step 1: **Alternator (slip rings)**: pure sine wave — symmetric positive and negative humps, crossing zero every half-turn.\n- Step 2: **Dynamo (split-ring commutator)**: same shape as the alternator's sine, but every negative half is flipped up to positive — a series of positive humps (like $$|\\sin|$$), never going negative.\n- Step 3: What's the same: peak EMF, frequency of humps (twice the rotation frequency in the dynamo case), the physical rotation. What's different: the *external wiring* — the commutator swaps connections every half-turn to keep the output positive.\n\nKey insight: the internal EMF is identical; only the external observer sees different signals due to switching.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "A student says: \"A transformer with $$N_s = 2N_p$$ doubles the power as well as the voltage, because more turns means more energy.\" Explain why this violates physics and what actually happens to power. (2 steps)", "answer": "- Step 1: This violates **conservation of energy**. A transformer cannot create energy — it can only transfer it. Doubling the turns doubles the *voltage* (turns ratio), but the *current* halves (inverse turns ratio enforced by power conservation), so the power $$P = IV$$ stays exactly the same. $$V$$ goes up by 2, $$I$$ goes down by 2, $$P$$ is unchanged.\n- Step 2: The transformer is an energy *pass-through device*, not an energy source. It repackages energy (higher V, lower I) but cannot multiply it. If it could double power, you'd have a perpetual energy source — feed the output back to the input and get infinite energy. Physics forbids this. The iron core and coils are passive components; they have no energy of their own to add.\n\nTransformers trade voltage for current, but power is conserved. More turns ≠ more energy — just different packaging.", "source": "GLM 5.1 ①", "_id": "glm_1_49"}, {"question": "Why does an electron entering a uniform B-field perpendicular to its velocity trace a circle, and how does the circle's radius depend on the electron's speed? (3 steps)", "answer": "- Step 1: The magnetic force $$F = evB$$ is perpendicular to the velocity, so it acts as a centripetal force without changing speed.\n- Step 2: Setting magnetic = centripetal: $$evB = mv^2/r$$, so $$r = mv/(eB)$$.\n- Step 3: A *faster* electron traces a *bigger* circle (radius scales linearly with $$v$$). Intuition: it has more momentum, so the same sideways force deflects it less per unit time. Also, the angular frequency $$\\omega = v/r = eB/m$$ is *independent* of $$v$$ — this is the cyclotron frequency, a fundamental property of the charge-to-mass ratio and the field.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "A power line carries 100 MW. Option A: 10 kV at 10 kA. Option B: 100 kV at 1 kA. Both deliver the same power. If the cable has resistance 1 Ω, roughly how much power is lost in each case? (3 steps)", "answer": "- Step 1: Power lost is $$I^2 R$$. Option A: $$I = 10\\,000$$ A, so $$I^2 R = 10^8$$ W = 100 MW.\n- Step 2: Option B: $$I = 1\\,000$$ A, so $$I^2 R = 10^6$$ W = 1 MW.\n- Step 3: Option A loses *all* the power in the cables (useless!). Option B loses only 1% — 100× less. The quadratic scaling of loss with current makes high-voltage transmission dramatically more efficient.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "In Lenz's law, why does the induced current oppose the *change* rather than the flux itself? (3 steps)", "answer": "- Step 1: Faraday's law says EMF is proportional to $$d\\Phi/dt$$ — the *rate of change*. A static flux, no matter how big, induces nothing.\n- Step 2: If a constant flux induced a current that opposed the flux itself, we'd have perpetual current from a static magnet — perpetual motion again.\n- Step 3: Only *changes* to flux inject energy into the circuit (from the source of the change — e.g. someone doing work to move the magnet). The induced current opposes whatever is causing that change, so that pushing/pulling against it does work — which becomes the electrical energy. It's not the flux we're opposing; it's the *process* of changing it.\n\nTakeaway: Lenz's law opposes the *action*, not the *state*.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "What is the conceptual distinction between magnetic flux $$\\Phi$$ and flux linkage $$N\\Phi$$, and why do we need both?", "answer": "- Step 1: Flux $$\\Phi = BA\\cos\\theta$$ measures how much field passes perpendicularly through *one* loop of area $$A$$. Unit: weber (Wb). It's a geometric quantity — field × perpendicular area.\n- Step 2: Flux linkage $$N\\Phi = BAN\\cos\\theta$$ multiplies by the number of turns $$N$$ in a coil. Unit: weber-turns (Wb turns). We need this because when a coil has $$N$$ turns, the same changing flux is \"seen\" by each loop, and each loop contributes its own induced EMF.\n- Step 3: So flux describes the *field geometry*; flux linkage describes *how effectively that flux couples to a coil*. A single wire has flux through it but flux linkage only matters for multi-turn coils — this is why solenoids induce much larger EMFs than single loops.\n\nTakeaway: doubling the turns doubles the induced EMF for the same flux change — this is the whole design principle of transformers.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "An AC generator (alternator) coil rotates in a uniform magnetic field. The EMF output is $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$. At what orientation of the coil is the EMF *maximum*, and at what orientation is it *zero*? Explain why maximum EMF does NOT coincide with maximum flux. (3 steps)", "answer": "- Step 1: The flux linkage through the rotating coil is $$N\\Phi = BAN\\cos(\\omega t)$$ — maximum when the coil plane is *perpendicular* to the field (field punches straight through the coil, $$\\theta = 0$$). But at this moment, the coil is at a *turning point* — the flux is at its peak, meaning its *rate of change* is zero (the gradient of a cosine peak is flat). So $$\\varepsilon = 0$$ when flux is maximum.\n- Step 2: The EMF is maximum when the coil plane is *parallel* to the field (field skims the surface, $$\\theta = 90°$$, flux = 0). At this orientation, the coil is cutting through field lines at its fastest rate — the flux is changing most rapidly (steep gradient on the cosine curve at $$\\cos = 0$$). The peak EMF is $$\\varepsilon_{max} = BAN\\omega$$.\n- Step 3: This is a crucial exam insight: **EMF depends on the rate of change, not the amount.** Maximum flux = zero rate of change = zero EMF. Zero flux = maximum rate of change = maximum EMF. They are *90° out of phase* — when one peaks, the other is at zero. Think of it like a swinging pendulum: maximum speed at the bottom (where displacement = 0), zero speed at the extremes (where displacement is maximum).\n\nFlux and EMF are like displacement and velocity — they peak at different times because one is the other's derivative.", "source": "GLM 5.1 ①", "_id": "glm_1_13"}, {"question": "An alternator and a dynamo both have a rotating coil in a magnetic field. What is the key structural difference in how they connect the coil to the external circuit, and how does this difference produce AC vs DC output? (3 steps)", "answer": "- Step 1: The **alternator** uses **slip rings** — two continuous, unbroken ring contacts that rotate with the coil. Each end of the coil is permanently connected to one ring, and the brushes slide on the rings continuously. As the coil rotates, the current direction in the coil reverses every half-turn, and the slip rings pass this reversal through to the external circuit — producing **AC** (alternating current that swings positive and negative).\n- Step 2: The **dynamo** uses a **split-ring commutator** — the ring is split into two halves with a gap, and each half is connected to one end of the coil. Every half-turn, the brushes swap from one half to the other, effectively *reversing the external connection* at the same moment the coil's internal current reverses. The two reversals cancel out: the external current always flows in the *same direction*, producing **DC** (direct current — a bumpy but always-positive waveform).\n- Step 3: The commutator is the same device used in DC *motors* — it ensures the force on the coil always pushes in the same rotational direction. In a dynamo, it ensures the *output current* always flows the same way. The alternator's slip rings have no such switching — they faithfully transmit every reversal, giving true AC.\n\nSlip rings = honest transmission of reversals (AC). Split-ring commutator = clever switching that cancels reversals (DC).", "source": "GLM 5.1 ①", "_id": "glm_1_15"}, {"question": "For a coil rotating in a uniform B-field, at what orientation is the induced EMF maximum, and why is this counterintuitive? (3 steps)", "answer": "- Step 1: EMF is maximum when the coil's plane is *parallel* to the field (field lies in the plane of the coil), i.e. when the flux linkage is *zero*.\n- Step 2: Counterintuitive: naively you'd think max flux = max EMF. But Faraday's law says EMF depends on $$d\\Phi/dt$$, not $$\\Phi$$. When flux is at its peak (coil ⊥ field), the flux is momentarily *stationary* — think of $$\\sin$$ at its peak, where the gradient is zero.\n- Step 3: When flux is passing through zero (coil ∥ field), the flux is changing fastest — like $$\\sin$$ crossing zero with maximum gradient. So the coil \"cuts field lines\" fastest at this orientation, producing maximum EMF.\n\nTakeaway: EMF peaks where flux crosses zero; EMF is zero where flux peaks. They're 90° out of phase (one is the derivative of the other).", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "A charged particle enters a magnetic field at an angle of 30° to the field lines (not perpendicular). Describe the shape of its trajectory — it is NOT a simple circle. Why? (3 steps)", "answer": "- Step 1: The velocity has two components: $$v_{\\perp} = v\\sin\\theta$$ (perpendicular to the field) and $$v_{\\parallel} = v\\cos\\theta$$ (parallel to the field). The perpendicular component experiences magnetic force and curves the particle; the parallel component experiences *no* force and continues straight.\n- Step 2: The result is a **helix** (spiral) — the particle circles in the plane perpendicular to the field (due to $$v_{\\perp}$$) while simultaneously drifting along the field direction (due to $$v_{\\parallel}$$). It's like a corkscrew path: circular motion + linear drift combined.\n- Step 3: The radius of the helical circle is $$r = \\frac{mv_{\\perp}}{BQ} = \\frac{mv\\sin\\theta}{BQ}$$ (smaller than the full perpendicular case because only $$v\\sin\\theta$$ contributes). The pitch (distance along the field per revolution) depends on $$v_{\\parallel} = v\\cos\\theta$$ and the period of circular motion. At $$\\theta = 90°$$, the helix collapses to a pure circle ($$v_{\\parallel} = 0$$). At $$\\theta = 0°$$, the helix collapses to a straight line ($$v_{\\perp} = 0$$).\n\nNon-perpendicular entry → helix (spiral). The particle both circles and drifts — two independent motions superimposed.", "source": "GLM 5.1 ①", "_id": "glm_1_52"}, {"question": "State the five-stage causal chain for how a transformer works, in the exact order required at A-level. Why must each stage follow from the previous one? (5 steps)", "answer": "- Step 1: **Alternating input voltage** is applied across the primary coil. This must be AC — a constant DC voltage would eventually give a constant field and no induction.\n- Step 2: The AC voltage drives an **alternating current** in the primary coil. The current reverses direction each half-cycle; electrons oscillate rather than flowing one way.\n- Step 3: The alternating current produces a **changing (alternating) magnetic field** in the primary coil and iron core. A constant current would give a constant field → no change → no induction. The *change* in the field is what matters.\n- Step 4: The changing magnetic field links through the iron core to the secondary coil, creating a **changing flux linkage** in the secondary. The iron core channels the field efficiently between the two coils.\n- Step 5: By Faraday's law, the changing flux linkage **induces an alternating voltage** in the secondary coil. If the secondary is in a complete circuit, this drives an **alternating current** at the same frequency as the input.\n\n+ Key exam point: you must use the word \"change\" or \"changing\" when describing the flux linkage. \"Flux in the secondary\" alone is not enough — it's the *changing* flux that induces the EMF. Missing this word costs marks.", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "In electromagnetic induction, an EMF (voltage) is induced *before* any current flows. Why is this distinction important, and when does the induced EMF *not* produce a current? (2 steps)", "answer": "- Step 1: Faraday's law induces an *EMF* (a potential difference) whenever flux linkage changes — this happens regardless of whether the conductor is in a complete circuit. The EMF is the \"push\" that *would* drive current. Current only flows if the conductor forms a *closed circuit* — otherwise there's no path for charges to move, and you just get a voltage across an open gap.\n- Step 2: This distinction matters practically: an open-circuit coil in a changing field still has an induced EMF (you could measure it with a voltmeter), but no current flows and no energy is delivered. Only when you connect a load (a bulb, a resistor) does current flow and energy transfer happen. In transformer exam questions, you must say \"induces an alternating *voltage*\" first, then add \"if in a complete circuit, this drives an alternating *current*.\"\n\nEMF is the cause; current is the consequence — and the consequence only happens if there's a circuit.", "source": "GLM 5.1 ①", "_id": "glm_1_12"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "A magnetic field has a flux density $$B$$ of about 5 mT (like a fridge magnet). What does \"flux density\" actually measure, and how is the tesla defined operationally from a force equation? (2 steps)", "answer": "- Step 1: Magnetic flux density $$B$$ measures the *strength* of a magnetic field at a point — conceptually, how densely packed the field lines are. It is defined operationally by rearranging the force-on-a-wire equation: $$B = \\frac{F}{IL}$$, where a conductor of length $$L$$ carrying current $$I$$ perpendicular to the field experiences force $$F$$. One tesla (1 T) is the flux density that produces a force of 1 N on a 1 m wire carrying 1 A perpendicular to the field.\n- Step 2: This operational definition matters because $$B$$ is not just an abstract property — it is *defined by what the field does* to a current. A fridge magnet at ~5 mT is thousands of times stronger than Earth's field (~0.032 mT), but still far weaker than laboratory electromagnets (which can reach ~1 T or more). The hierarchy of field strengths gives you a physical sense of what \"tesla\" means in practice.\n\nThe tesla is a *derived* unit — it exists because we can measure forces on currents.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A rectangular loop sits in a uniform magnetic field. The loop is tilted so the field makes an angle $$θ$$ with the *normal* (perpendicular) to the loop's plane. Write the expression for magnetic flux through the loop and explain why the angle is measured from the normal, not from the plane itself. (3 steps)", "answer": "- Step 1: Magnetic flux $$\\Phi$$ through an area $$A$$ in a field of density $$B$$ is defined as $$\\Phi = BA\\cos\\theta$$, where $$\\theta$$ is the angle between the *field direction* and the *normal* to the plane of the area. This captures the component of $$B$$ that punches *through* the area perpendicularly.\n- Step 2: The reason we measure from the normal is physical: flux represents how many field lines *pass through* the surface. When $$\\theta = 0°$$ (field aligned with the normal, i.e. field perpendicular to the surface), every field line goes straight through — maximum flux $$\\Phi = BA$$. When $$\\theta = 90°$$ (field parallel to the surface), field lines skim the surface without crossing it — zero flux.\n+ If you measured from the plane instead, you'd need $$\\sin$$ instead of $$\\cos$$, and the formula would look different — but exam questions always define $$\\theta$$ from the normal, so you must check which angle the question gives you.\n- Step 3: A common trap: if a question says \"the coil is at 30° to the field,\" that might mean $$\\theta = 30°$$ from the field direction (so use $$\\cos 30°$$), or it might mean 30° from the plane (which is 60° from the normal, so use $$\\cos 60°$$). Always draw the normal to resolve this.\n\nFlux is \"how many field lines pierce the surface\" — the normal tells you the piercing direction.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "A solenoid with $$N$$ turns sits perpendicular to a uniform field $$B$$, each turn having area $$A$$. What is its flux linkage, and why does multiplying by $$N$$ make physical sense rather than just being a bookkeeping convention? (2 steps)", "answer": "- Step 1: Flux linkage is $$N\\Phi = BAN$$ (when perpendicular, $$\\cos\\theta = 1$$). The unit is weber-turns (Wb turns), not just weber — because it accounts for the total flux threading *all* the turns combined.\n- Step 2: The physical reason: each turn of the coil is a separate loop that the field lines pass through. If $$N = 300$$ turns each intercepting flux $$\\Phi = BA$$, the *total* flux threading the entire coil is 300 times that — the field lines go through 300 separate loops. This matters for induction because Faraday's law involves the *total* changing flux linkage $$N\\Phi$$, not just the flux through one turn. More turns = more \"gates\" for the field to pass through = more total EMF when the flux changes.\n\nFlux linkage is the *collective* flux through all turns — it's why solenoids are better at induction than single loops.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "A wire of length $$L$$ carrying current $$I$$ sits in a magnetic field $$B$$ at angle $$θ$$ to the field lines. What is the force on the wire, and what happens in the two extreme cases where $$θ = 90°$$ and $$θ = 0°$$? (3 steps)", "answer": "- Step 1: The force on a current-carrying conductor is $$F = BIL\\sin\\theta$$, where $$\\theta$$ is the angle between the *direction of the current* (along the wire) and the *direction of the field lines*.\n- Step 2: At $$\\theta = 90°$$ (current perpendicular to field), $$\\sin 90° = 1$$, so $$F = BIL$$ — the maximum possible force. This is the standard arrangement in motor questions: the wire crosses the field at right angles, getting the full push.\n- Step 3: At $$\\theta = 0°$$ (current parallel to field), $$\\sin 0° = 0$$, so $$F = 0$$ — no force at all. A wire running *along* the field lines feels no push, regardless of how strong the current or field is. The field only exerts a force on the *perpendicular component* of the current.\n\nThe magnetic force only acts on the component of current that *crosses* the field lines — parallel current is invisible to the field.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "A charged particle with charge $$Q$$ moves at velocity $$v$$ through a magnetic field $$B$$ at angle $$θ$$ to the field. What is the force formula, and why is it structurally identical to the wire formula $$F = BIL\\sin\\theta$$? (3 steps)", "answer": "- Step 1: The force on a moving charge is $$F = BQv\\sin\\theta$$, where $$\\theta$$ is the angle between the velocity vector and the field direction. Maximum force $$F = BQv$$ at $$\\theta = 90°$$; zero force at $$\\theta = 0°$$ (charge moving along the field).\n- Step 2: The structural similarity to $$F = BIL\\sin\\theta$$ comes from the definition of current: $$I = Q/\\Delta t$$ for a single charge, or equivalently a wire carrying current $$I$$ over length $$L$$ has charges moving at drift velocity $$v = L/\\Delta t$$, so $$IL = Qv$$. Substituting $$IL \\to Qv$$ converts the wire formula to the particle formula — they are the *same physics* expressed for a distributed current vs. a single charge.\n- Step 3: Key difference for exams: $$F = BIL\\sin\\theta$$ is for a *conductor* (you need length $$L$$ and current $$I$$); $$F = BQv\\sin\\theta$$ is for an *isolated moving charge* (you need charge $$Q$$ and velocity $$v$$). Don't mix them — a beta particle has no \"length\" or \"current,\" only a charge and a speed.\n\nBoth formulas capture the same idea: the field pushes on moving charge, whether that charge flows in a wire or flies freely.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "A proton enters a uniform magnetic field perpendicular to its velocity. Describe the shape of its path and explain *why* the path has this shape — what property of the magnetic force causes it? (3 steps)", "answer": "- Step 1: The proton follows a *circular* path in the plane perpendicular to the field. This is because the magnetic force $$F = BQv$$ is always directed *perpendicular* to the velocity — it never has a component along the direction of motion.\n- Step 2: A force that is always perpendicular to velocity acts as a *centripetal* force — it continuously deflects the particle sideways without speeding it up or slowing it down. This is exactly the condition for uniform circular motion: constant speed, constant-radius turning. The magnetic field doesn't do work on the charge (force ⊥ velocity ⇒ $$W = F\\cdot d = 0$$), so kinetic energy stays constant.\n- Step 3: Setting the magnetic force equal to the centripetal force requirement: $$BQv = \\frac{mv^2}{r}$$, which rearranges to $$r = \\frac{mv}{BQ}$$. Larger momentum $$mv$$ or smaller field $$B$$ or charge $$Q$$ gives a larger radius (wider circle). A heavier or faster particle is harder to deflect; a stronger field or larger charge deflects more aggressively.\n\nThe magnetic force is a *steering* force — it turns the particle without changing its speed, producing perfect circles.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "An electron (negative charge) moves to the *right* in a magnetic field pointing *into the page*. You apply Fleming's Left-Hand Rule. Which way do you point your second finger, and why is this different from pointing it in the direction the electron physically moves? (2 steps)", "answer": "- Step 1: Fleming's Left-Hand Rule uses *conventional current* — the flow of *positive* charge. An electron moving right is equivalent to a conventional current moving *left* (positive charges would flow opposite to the electrons). So you point your second finger (Current) to the **left**, not to the right.\n- Step 2: With First finger (Field) pointing into the page and seCond finger (Current) pointing left, your thuMb (Force) points **downwards**. The electron is pushed downward initially, then curves into a circular path. If you had mistakenly pointed the second finger right (following the electron's actual motion), you'd get the wrong force direction — upward instead of downward.\n\nFor negative charges, the second finger always points *opposite* to the particle's velocity — conventional current is the \"anti-electron\" direction.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "A U-shaped magnet sits on an electronic balance, and a wire between its poles carries current left-to-right. The balance reads +161 g (a downward push on the balance pan). By Newton's third law, what is the direction of the force on the *wire*, and what does this reveal about the field direction between the poles? (3 steps)", "answer": "- Step 1: The balance reading of +161 g means the magnet is experiencing a *downward* force from the wire (the balance pan is being pushed down). By Newton's third law, the force on the wire must be the *opposite* — **upward**. The wire pushes the magnet down; the magnet pushes the wire up.\n- Step 2: Now apply Fleming's Left-Hand Rule to find the field direction. thuMb = Force on wire = **upward**. seCond finger = Current = **left-to-right**. First finger = Field must point **into the page** (perpendicular to both force and current). This means the north pole is at the back and the south pole is at the front — field goes from N to S, which is into the page.\n- Step 3: If the current were increased, the force $$F = BIL$$ would increase proportionally, and the balance reading would increase too (stronger downward push on the magnet, stronger upward push on the wire). This setup is a practical way to *measure* $$B$$ — by weighing the force on a known current in a known-length wire.\n\nNewton's third law makes the magnet and wire a force pair — what pushes one down pushes the other up.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "Three things can change the magnetic flux linkage through a coil and thus induce an EMF. What are they, and why does a *stationary* magnet inside a stationary coil induce nothing? (2 steps)", "answer": "- Step 1: The three ways to change flux linkage $$N\\Phi = BAN\\cos\\theta$$ are: (1) change $$B$$ — vary the field strength (e.g. move a magnet closer/further, or change the current in a nearby coil); (2) change $$A$$ — deform the coil or move it into/out of the field region; (3) change $$\\theta$$ — rotate the coil relative to the field (this is how generators work).\n- Step 2: A stationary magnet inside a stationary coil gives a constant $$B$$, constant $$A$$, and constant $$\\theta$$ — so $$N\\Phi$$ is constant, meaning $$\\frac{d(N\\Phi)}{dt} = 0$$, and by Faraday's law $$\\varepsilon = 0$$. It doesn't matter how *strong* the flux is — only the *rate of change* matters. A huge steady flux induces nothing; a tiny but rapidly changing flux induces a large EMF.\n\nInduction cares about *change*, not *amount* — a frozen magnet is electromagnetically silent.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "Faraday's law states $$\\varepsilon = -\\frac{d(N\\Phi)}{dt}$$. What does the \"rate of change\" part mean physically, and what does the minus sign represent? (3 steps)", "answer": "- Step 1: The \"rate of change\" $$\\frac{d(N\\Phi)}{dt}$$ means the *gradient* of the flux-linkage-vs-time graph. If flux linkage is changing rapidly (steep gradient), the induced EMF is large. If flux linkage is changing slowly (gentle gradient), the EMF is small. If flux linkage is constant (flat graph), the EMF is zero — regardless of how large the flux itself is.\n- Step 2: The minus sign represents **Lenz's law**: the induced EMF drives a current whose magnetic field *opposes* the change in flux that created it. If flux is increasing, the induced current creates a field that tries to *reduce* the flux. If flux is decreasing, the induced current tries to *maintain* it.\n- Step 3: This is not just a mathematical convention — it's *conservation of energy*. If the induced current *reinforced* the change (no minus sign), you'd get a runaway feedback loop: more change → more current → more change → more current → infinite energy from nothing. Lenz's law ensures you must always *do work* (push the magnet, rotate the coil) to sustain the induced current — the opposition means energy is conserved.\n\nThe minus sign is nature's way of saying: \"you can't get free energy — the induced current always fights you.\"", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "A bar magnet is pushed N-pole-first into a coil. By Lenz's law, what pole does the near face of the coil become, and what physical effect does this have on the magnet? (3 steps)", "answer": "- Step 1: As the N pole approaches the coil, the flux through the coil is *increasing* (more field lines threading the coil). By Lenz's law, the induced current must oppose this increase — so the coil must create a magnetic field that *reduces* the incoming flux.\n- Step 2: To oppose an incoming N pole, the near face of the coil must itself become a **N pole** (N–N repulsion pushes back against the approaching magnet). Using the right-hand grip rule: if you view the coil from the magnet's side and the near face is N, your thumb points toward the magnet (N pole), and your fingers curl **anticlockwise** — that's the direction of the induced current (viewed from the magnet side).\n- Step 3: The physical effect: the coil exerts a **repulsive force** on the magnet, opposing its motion. You have to *push harder* to keep moving the magnet in — that extra mechanical work you do is exactly the energy that ends up as electrical energy in the induced current. When you pull the magnet *out*, the flux decreases, so the near face becomes S (to try to keep the magnet), and the coil *attracts* the magnet — you have to *pull harder* to remove it.\n\nLenz's law always makes you work harder — the resistance to change is the price you pay to extract electrical energy.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "Fleming's Right-Hand Rule is used for generators. How do the three fingers map to physical quantities, and why is it the *right* hand instead of the left? (2 steps)", "answer": "- Step 1: Fleming's Right-Hand Rule: thuMb = **Motion** (direction the conductor moves); First finger = **Field** (direction of $$B$$, from N to S); seCond finger = **induced Current** (direction of the induced EMF/current). It applies when *motion* in a field *produces* current — the generator effect.\n- Step 2: The right hand is used because the induced current flows in the direction that *opposes* the motion (Lenz's law). If you used the left hand (motor rule), you'd get the direction of force that *would* drive the motion — but in a generator, the current opposes the motion, so the direction flips to the opposite hand. Practically: Left = motor (current causes motion), Right = generator (motion causes current).\n\nLeft hand = \"I already have current, what force do I get?\" Right hand = \"I already have motion, what current do I get?\"", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "In electromagnetic induction, an EMF (voltage) is induced *before* any current flows. Why is this distinction important, and when does the induced EMF *not* produce a current? (2 steps)", "answer": "- Step 1: Faraday's law induces an *EMF* (a potential difference) whenever flux linkage changes — this happens regardless of whether the conductor is in a complete circuit. The EMF is the \"push\" that *would* drive current. Current only flows if the conductor forms a *closed circuit* — otherwise there's no path for charges to move, and you just get a voltage across an open gap.\n- Step 2: This distinction matters practically: an open-circuit coil in a changing field still has an induced EMF (you could measure it with a voltmeter), but no current flows and no energy is delivered. Only when you connect a load (a bulb, a resistor) does current flow and energy transfer happen. In transformer exam questions, you must say \"induces an alternating *voltage*\" first, then add \"if in a complete circuit, this drives an alternating *current*.\"\n\nEMF is the cause; current is the consequence — and the consequence only happens if there's a circuit.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": true}, {"question": "An AC generator (alternator) coil rotates in a uniform magnetic field. The EMF output is $$\\varepsilon = BAN\\omega\\sin(\\omega t)$$. At what orientation of the coil is the EMF *maximum*, and at what orientation is it *zero*? Explain why maximum EMF does NOT coincide with maximum flux. (3 steps)", "answer": "- Step 1: The flux linkage through the rotating coil is $$N\\Phi = BAN\\cos(\\omega t)$$ — maximum when the coil plane is *perpendicular* to the field (field punches straight through the coil, $$\\theta = 0$$). But at this moment, the coil is at a *turning point* — the flux is at its peak, meaning its *rate of change* is zero (the gradient of a cosine peak is flat). So $$\\varepsilon = 0$$ when flux is maximum.\n- Step 2: The EMF is maximum when the coil plane is *parallel* to the field (field skims the surface, $$\\theta = 90°$$, flux = 0). At this orientation, the coil is cutting through field lines at its fastest rate — the flux is changing most rapidly (steep gradient on the cosine curve at $$\\cos = 0$$). The peak EMF is $$\\varepsilon_{max} = BAN\\omega$$.\n- Step 3: This is a crucial exam insight: **EMF depends on the rate of change, not the amount.** Maximum flux = zero rate of change = zero EMF. Zero flux = maximum rate of change = maximum EMF. They are *90° out of phase* — when one peaks, the other is at zero. Think of it like a swinging pendulum: maximum speed at the bottom (where displacement = 0), zero speed at the extremes (where displacement is maximum).\n\nFlux and EMF are like displacement and velocity — they peak at different times because one is the other's derivative.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": true}, {"question": "A generator coil rotates faster (higher angular frequency $$\\omega$$). What two effects does this have on the AC output, and why does the *amplitude* increase as well as the frequency? (2 steps)", "answer": "- Step 1: Increasing $$\\omega$$ increases the *frequency* of the AC output — the coil completes more rotations per second, so the EMF oscillates more times per second. The output frequency equals the rotation frequency: $$f = \\omega/(2\\pi)$$.\n- Step 2: The *amplitude* (peak EMF) also increases, because $$\\varepsilon_{max} = BAN\\omega$$ — the peak is proportional to $$\\omega$$. Physically, spinning faster means the flux changes *more rapidly* at every instant (steeper gradient on the flux-vs-time curve), so the induced EMF at every point in the cycle is larger. A faster-spinning generator doesn't just buzz more often — it buzzes louder each time.\n\nHigher speed gives higher frequency AND higher amplitude — both scale with $$\\omega$$ because faster rotation means faster flux change.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "An alternator and a dynamo both have a rotating coil in a magnetic field. What is the key structural difference in how they connect the coil to the external circuit, and how does this difference produce AC vs DC output? (3 steps)", "answer": "- Step 1: The **alternator** uses **slip rings** — two continuous, unbroken ring contacts that rotate with the coil. Each end of the coil is permanently connected to one ring, and the brushes slide on the rings continuously. As the coil rotates, the current direction in the coil reverses every half-turn, and the slip rings pass this reversal through to the external circuit — producing **AC** (alternating current that swings positive and negative).\n- Step 2: The **dynamo** uses a **split-ring commutator** — the ring is split into two halves with a gap, and each half is connected to one end of the coil. Every half-turn, the brushes swap from one half to the other, effectively *reversing the external connection* at the same moment the coil's internal current reverses. The two reversals cancel out: the external current always flows in the *same direction*, producing **DC** (direct current — a bumpy but always-positive waveform).\n- Step 3: The commutator is the same device used in DC *motors* — it ensures the force on the coil always pushes in the same rotational direction. In a dynamo, it ensures the *output current* always flows the same way. The alternator's slip rings have no such switching — they faithfully transmit every reversal, giving true AC.\n\nSlip rings = honest transmission of reversals (AC). Split-ring commutator = clever switching that cancels reversals (DC).", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": true}, {"question": "A simple DC motor has a coil between magnet poles, powered by a battery through a split-ring commutator. What two things can you change to make the motor spin *faster*, and what one thing can you change to make it spin in the *opposite direction*? (2 steps)", "answer": "- Step 1: To increase **speed**: increase the current (stronger battery, lower resistance, or more turns of wire). A larger current means a larger force $$F = BIL$$ on each side of the coil, producing greater torque and faster rotation. In motors with electromagnet stators, increasing the field current also strengthens $$B$$, further increasing the force.\n- Step 2: To reverse **direction**: reverse the battery polarity (swap + and −). This reverses the current direction through the coil, which reverses the force direction (Fleming's LHR gives opposite thumb), so the coil pushes the other way and rotates in the opposite direction. Alternatively, you could reverse the field direction (swap the magnet poles), which also reverses the force.\n\nSpeed = more current (stronger push). Direction = reverse current or reverse field (push the other way).", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Compare a motor and a generator in terms of: energy input/output, the physical law that governs them, and the Fleming hand rule used. Why are they essentially the *same device* running in opposite modes? (2 steps)", "answer": "- Step 1: **Motor**: input = *electrical* energy (current from a battery); output = *mechanical* energy (rotating coil); governed by the force-on-a-current equation $$F = BIL$$; uses Fleming's **Left-Hand Rule** (current + field → force). **Generator**: input = *mechanical* energy (rotating the coil by hand or turbine); output = *electrical* energy (induced EMF/current); governed by Faraday's law $$\\varepsilon = -d(N\\Phi)/dt$$; uses Fleming's **Right-Hand Rule** (motion + field → current).\n- Step 2: They are the same device because both involve a coil in a magnetic field with relative motion between them. In a motor, you *feed in* current and the coil *spins* (electrical → mechanical). In a generator, you *spin* the coil and current *comes out* (mechanical → electrical). A motor acting as a generator (spinning it manually) produces EMF — this is called *back EMF* in motor theory. The physics is reversible: current ↔ motion, depending on which side you drive.\n\nMotor and generator are two doors to the same room — one door feeds electricity in, the other feeds motion in.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "A transformer has a primary coil, a secondary coil, and a soft iron core. State the five-stage causal chain (in the correct A-level exam order) from input voltage to output current, and explain why *each stage must happen* for the next to occur. (5 steps)", "answer": "- Step 1: **Alternating input voltage** is applied across the primary coil. This must be AC — a constant DC voltage would eventually produce a constant field (no change), killing the chain at stage 3.\n- Step 2: The alternating voltage drives an **alternating current** in the primary coil. The current reverses direction each half-cycle; electrons oscillate rather than flow continuously. Without this oscillating current, the next stage can't happen.\n- Step 3: The alternating current creates a **changing (alternating) magnetic field** in the iron core. A *constant* current would give a *constant* field — and constant fields don't induce anything. The *change* in the field is the essential ingredient.\n- Step 4: The changing magnetic field links through the iron core to the secondary coil, producing a **changing flux linkage** in the secondary. The iron core channels the field (like a conductor for magnetic flux), ensuring most of the primary's field reaches the secondary. Without the core, flux would leak and the linkage would be weak.\n- Step 5: By Faraday's law, the changing flux linkage **induces an alternating voltage** in the secondary coil. If the secondary is in a complete circuit, this voltage drives an **alternating current** — at the *same frequency* as the input, but with a different amplitude (voltage stepped up or down depending on turns ratio). No electrical connection exists between the coils — the link is purely magnetic.\n\nThe chain is: AC voltage → AC current → changing B → changing NΦ → induced AC voltage → AC current. Every link requires *change* — remove the alternation and the chain breaks.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "Why can't a transformer work with steady DC input? Describe what happens *momentarily* when DC is first switched on, while it remains on, and when it is switched off. (3 steps)", "answer": "- Step 1: **Switched on**: the current in the primary *rises* from zero to its steady value. During this brief rise, the magnetic field is *building up* — flux linkage in the secondary is *changing* (increasing). By Faraday's law, a **momentary EMF** is induced in the secondary, driving a brief pulse of current. This is a transient effect, lasting only as long as the current is changing.\n- Step 2: **Remains on (steady DC)**: the current is now constant, so the magnetic field is constant, so the flux linkage is constant — $$\\frac{d(N\\Phi)}{dt} = 0$$, and the induced EMF **falls to zero**. No current flows in the secondary. The transformer is effectively dead — it sits there with a constant field doing nothing.\n- Step 3: **Switched off**: the current *drops* from its steady value to zero. The magnetic field *collapses* — flux linkage is *changing* (decreasing). A **momentary EMF** is induced in the *opposite direction* to the switch-on pulse (the flux is decreasing instead of increasing, so the sign flips). Another brief current pulse flows, then everything stops.\n\nDC gives two brief pulses (on and off) and then silence — transformers need *continuous change*, which only AC provides.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "An ideal transformer has $$N_p = 10$$ turns on the primary and $$N_s = 20$$ turns on the secondary, with $$V_p = 100$$ V. What is $$V_s$$, and is this a step-up or step-down transformer? Explain the turns-ratio formula physically. (3 steps)", "answer": "- Step 1: The turns-ratio formula is $$\\frac{V_1}{V_2} = \\frac{N_1}{N_2}$$, or equivalently $$V_s = V_p \\times \\frac{N_s}{N_p}$$. Substituting: $$V_s = 100 \\times \\frac{20}{10} = 200$$ V. Doubling the turns doubles the voltage — this is a **step-up** transformer.\n- Step 2: The physical reason: each turn of the secondary coil intercepts the *same* changing flux as each turn of the primary. But the secondary has *more* turns, so the *total* changing flux linkage $$N_s\\Phi$$ is larger than $$N_p\\Phi$$. By Faraday's law, EMF is proportional to the total changing flux linkage, so more turns → more EMF → higher output voltage. Each turn is like adding another \"gate\" that the changing flux pushes through.\n- Step 3: The ratio is *exact* for an ideal transformer because every turn on both coils experiences the *same* rate of change of flux (the iron core ensures they share the same flux). So the voltage per turn is identical on both sides: $$V_p/N_p = V_s/N_s$$, and the total voltages scale purely with the number of turns.\n\nVoltage scales with turns because each turn adds another equal slice of induced EMF — more slices, bigger total.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "An ideal (100% efficient) step-up transformer has $$V_p = 40\\,000$$ V, $$I_p = 20$$ A, and $$V_s = 250\\,000$$ V. What is $$I_s$$, and why is this small current exactly what the National Grid wants? (3 steps)", "answer": "- Step 1: Power conservation for an ideal transformer: $$P_{in} = P_{out}$$, so $$I_p V_p = I_s V_s$$. Rearranging: $$I_s = \\frac{I_p V_p}{V_s} = \\frac{20 \\times 40\\,000}{250\\,000} \\approx 3.2$$ A. The step-up transformer has increased voltage by a factor of ~6.25 and decreased current by the same factor.\n- Step 2: The current ratio is the *inverse* of the turns ratio: $$\\frac{I_1}{I_2} = \\frac{N_2}{N_1}$$ (more turns on secondary → higher voltage → lower current). This isn't magic — it's energy conservation. If voltage goes up by factor $$k$$, current must go down by factor $$k$$ to keep power $$P = IV$$ the same.\n- Step 3: The National Grid wants small current because resistive heating loss in transmission cables is $$P_{loss} = I^2 R$$. Halving the current *quarters* the heating loss (it's $$I^2$$, not just $$I$$). By stepping up to 250 kV, the current drops from 20 A to ~3.2 A, and the $$I^2 R$$ loss drops by a factor of roughly $$(20/3.2)^2 \\approx 39$$ — a massive saving. That's why power stations step up to very high voltages for long-distance transmission.\n\nStep-up = high V, low I = less $$I^2R$$ heating in cables = more power delivered to consumers, less wasted as heat.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "A transformer has $$N_p = 4000$$, $$N_s = 100$$, $$V_p = 230$$ V, and is 95% efficient with $$I_p = 2$$ A. Find the actual output current $$I_s$$, and explain why it's *less* than the ideal-transformer prediction. (3 steps)", "answer": "- Step 1: First find $$V_s$$ from the turns ratio: $$V_s = V_p \\times \\frac{N_s}{N_p} = 230 \\times \\frac{100}{4000} = 5.75$$ V. This is a **step-down** transformer (fewer secondary turns → lower voltage).\n- Step 2: The *ideal* current would be $$I_s = \\frac{I_p V_p}{V_s} = \\frac{2 \\times 230}{5.75} = 80$$ A (power conservation). But 95% efficiency means only 95% of the input power reaches the output: $$P_{out} = 0.95 \\times P_{in}$$, so $$I_s V_s = 0.95 \\times I_p V_p$$, giving $$I_s = 0.95 \\times 80 = 76$$ A.\n- Step 3: The actual current is *less* than ideal because 5% of the input power is lost — dissipated as heat in the copper windings ($$I^2R$$ losses), as eddy currents in the iron core, as hysteresis losses (energy spent magnetising/demagnetising the core each cycle), and as flux leakage (some field lines don't reach the secondary). The efficiency formula $$\\eta = \\frac{P_{out}}{P_{in}} = \\frac{V_s I_s}{V_p I_p}$$ captures this: $$\\eta < 1$$ means some power goes missing.\n\nReal transformers always deliver *less* current than ideal — the missing power becomes heat through four distinct loss mechanisms.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "Why is the transformer core made of *soft iron* rather than a permanent magnet material, and why is it *laminated* (split into insulated slices like a loaf of bread)? (3 steps)", "answer": "- Step 1: **Soft iron** is used because it *easily magnetises and demagnetises*. The core must follow the alternating magnetic field — flipping its magnetisation every half-cycle. A permanent-magnet material would resist being demagnetised, fighting the alternation and wasting energy (hysteresis loss). Soft iron \"goes with the flow,\" magnetising when the primary current drives it and releasing when the current reverses.\n- Step 2: **Lamination** suppresses **eddy currents** — circulating currents that would form in the conducting iron core because the core itself is sitting in a *changing magnetic field* (the very field the transformer creates). By Faraday's law, any conductor in a changing field gets induced currents; in a solid iron block, these currents swirl in loops (eddies), dissipating energy as $$I^2R$$ heat.\n- Step 3: Lamination works by slicing the core into thin, *electrically insulated* sheets. Eddy currents need large continuous conducting loops to flow — the insulation between slices *breaks* those loops, confining any residual eddy currents to tiny paths within each thin slice. The smaller the loop, the smaller the current, the smaller the $$I^2R$$ loss. The \"loaf of bread\" analogy: each slice is separate, so you can't circulate current across the whole loaf.\n\nSoft iron = magnetically compli
