* the component's I–V curve. The intersection point gives the unique $$(V, I)$$ pair that simultaneously satisfies both: (a) the component's actual behaviour, and (b) $$R = 50\\text{ Ω}$$. Read off the V-value at the intersection — that is the required p.d.\n\nThe logic: the straight line is the set of \"all points where R = 50 Ω.\" The curve is the set of \"all points the component can actually produce.\" Their intersection is the only point satisfying both conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "Sketch and describe the I–V characteristic of an ohmic conductor (fixed resistor). What are three key features? (3 steps)", "answer": "- Step 1: The graph is a **straight line through the origin**, plotted with $$I$$ on the y-axis and $$V$$ on the x-axis. It extends into both the first quadrant (positive V, positive I) and the third quadrant (negative V, negative I).\n- Step 2: The line is **symmetric about the origin** — the gradient is the same in both directions, meaning the resistance is the same regardless of the direction of current flow.\n- Step 3: The **gradient is constant** and equals $$1/R$$. Since the line is straight, R does not change with V or I — this is exactly what it means to obey Ohm's Law.\n\nPhysical reason: at constant temperature, the number and frequency of electron-lattice collisions per unit length is approximately constant, so R stays fixed.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "The I–V graph for a tungsten filament lamp is an S-shaped curve that bows toward the voltage axis. Describe the physical explanation for this shape in the two steps an examiner expects. (2 steps)", "answer": "- Step 1: As the current through the filament increases, resistive heating ($$I^2R$$) causes the temperature of the tungsten filament to rise. The metal lattice ions vibrate with greater amplitude.\n- Step 2: The larger-amplitude vibrations mean conduction electrons collide more frequently with the lattice ions, increasing the resistance. Since R is increasing, the current rises at a *slower rate* than it would if R were constant — the graph curves away from linearity, bowing toward the V-axis (where current is suppressed relative to the ohmic case).\n\nMark scheme keywords: \"temperature increases\" + \"atoms/ions vibrate with greater amplitude\" + \"more frequent collisions\" + \"resistance increases.\" This is a standard 2-mark explanation.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "Near the origin of the filament lamp's I–V graph, the curve is nearly a straight line. Why? (2 steps)", "answer": "- Step 1: Near the origin, the applied p.d. is very small, so the current is very small, and the power dissipated ($$I^2R$$) is negligible. The filament stays close to room temperature.\n- Step 2: At (approximately) constant room temperature, the tungsten filament *approximately* obeys Ohm's Law — its resistance is roughly constant, so the I–V relationship is approximately linear near the origin. As V increases further, heating becomes significant and the curve departs from linearity.\n\nThis is why we say the filament \"approximately obeys Ohm's Law for small voltages\" — the constant-temperature condition of Ohm's Law is approximately satisfied only at low currents.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "A filament lamp rated at $$12\\text{ V}$$, $$24\\text{ W}$$ has resistance $$6.0\\text{ Ω}$$ at its rated voltage. When operated at a lower voltage, its resistance drops to $$2.5\\text{ Ω}$$. Explain why R decreases, and state whether the lamp is ohmic. (2 steps)", "answer": "- Step 1: At the lower voltage, the current is smaller, so less power is dissipated ($$I^2R$$), and the filament is cooler. At lower temperature, the lattice ions vibrate less, so there are fewer collisions with electrons and resistance is lower. R decreases as the lamp cools/dims.\n- Step 2: The lamp is **non-ohmic** because its resistance is not constant — it changes from $$6.0\\text{ Ω}$$ at full brightness to $$2.5\\text{ Ω}$$ when dimmer. An ohmic conductor would have the same R at all operating points.\n\nThe key observation: for a filament lamp, R increases with temperature. At low V (dim), R is small; at high V (bright), R is large.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "The I–V graph for a semiconductor diode is highly asymmetric. Describe what happens in forward bias ($$V > 0$$) and in reverse bias ($$V < 0$$). (2 steps)", "answer": "- Step 1: **Forward bias**: Almost no current flows until the p.d. reaches the threshold voltage (~0.6 V for silicon). Beyond this, current rises very steeply — the diode \"turns on\" and its resistance becomes very small. The graph is essentially flat at $$I = 0$$ until ~0.6 V, then shoots upward.\n- Step 2: **Reverse bias**: Virtually no current flows at all (the diode \"blocks\"). The current is essentially zero for all negative voltages (until breakdown, which is beyond the syllabus). The graph is flat along the negative V-axis.\n\nThe diode is a one-way valve for current: it conducts easily in one direction (once past threshold) and blocks in the other.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "What is the threshold (turn-on) voltage of a silicon semiconductor diode? A student says \"In reverse bias, a diode's resistance is zero.\" Is this correct? (2 steps)", "answer": "- Step 1: The threshold voltage for a silicon diode is approximately **0.6 V to 0.7 V** (use 0.6 V in exams unless told otherwise). Below this voltage in forward bias, virtually no current flows.\n- Step 2: The student is wrong. In reverse bias, the current is approximately zero, so $$R = V/I \\rightarrow V/0 \\rightarrow \\infty$$. The resistance is **effectively infinite** (extremely large), not zero. \"Not conducting\" means $$I \\approx 0$$, which means very *high* resistance, not low resistance.\n\nThis is a classic exam trap: confusing \"no current\" with \"no resistance.\" No current means *infinite* resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Why must a protective resistor be placed in series with a diode when measuring its I–V characteristic? (2 steps)", "answer": "- Step 1: Once the diode's forward bias voltage exceeds the threshold (~0.6 V), its resistance drops to a very small value. Without a protective resistor, the current would increase extremely rapidly and could exceed the diode's maximum rated current.\n- Step 2: The protective (current-limiting) resistor in series limits the maximum current that can flow, preventing the diode from overheating and being permanently damaged or destroyed. It acts as a safety barrier between the supply and the low-resistance diode.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "An NTC thermistor has a Negative Temperature Coefficient. What does this mean for its resistance as temperature increases, and what is the physical mechanism? (2 steps)", "answer": "- Step 1: \"NTC\" means **resistance decreases as temperature increases** — the opposite of a metal. As the thermistor heats up (from $$I^2R$$ heating or external heating), R goes down.\n- Step 2: **Physical mechanism**: In the semiconductor material of the thermistor, increasing temperature gives more valence electrons enough thermal energy to break free and become conduction electrons. More charge carriers available → more current can flow for the same voltage → lower resistance. This is fundamentally different from a metal, where more temperature means more lattice vibrations and *more* resistance.\n\nMemory aid: NTC = Negative Temperature Coefficient = \"as T goes up, R goes down.\" Metals are the opposite: as T goes up, R goes up.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "The I–V graph for an NTC thermistor curves *toward the current axis* (away from the voltage axis). Explain why, using the concept of positive feedback. (3 steps)", "answer": "- Step 1: As V increases, I increases, and the thermistor heats up from $$I^2R$$ dissipation.\n- Step 2: Because it's NTC, higher temperature means lower resistance. Lower R means even *more* current can flow for the same applied voltage.\n- Step 3: This is a **positive feedback** effect: more V → more I → more heating → lower R → even more I → even more heating → etc. The current rises at an *accelerating* rate compared to an ohmic conductor, so the curve bends *toward* the I-axis (steeper than a straight line).\n\nContrast with the filament lamp: there, higher T → higher R → current rises *slower* (curve bows toward V-axis). The thermistor does the opposite — its curve bows toward the I-axis.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "An LDR (Light-Dependent Resistor) is placed in brighter light. What happens to its resistance, and what is the physical mechanism? (2 steps)", "answer": "- Step 1: As light intensity increases, the LDR's resistance **decreases**. In bright light, R is low; in darkness, R is very high (typically several MΩ).\n- Step 2: **Physical mechanism**: Photons of light strike the semiconductor material and give electrons enough energy to break free from their atoms and become conduction electrons. More light → more photons → more conduction electrons released → more charge carriers → lower resistance.\n\nThe mechanism is similar to the thermistor (more charge carriers → lower R), but the energy source is light rather than heat. This is why LDRs are used as light sensors.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "At a fixed light level, the I–V graph for an LDR is approximately linear (near-ohmic). Why is this, and how does the graph change when the light level changes? (2 steps)", "answer": "- Step 1: At a *fixed* light level, the number of conduction electrons is approximately constant, so the resistance stays roughly the same. The I–V relationship is approximately linear (near-ohmic) — similar to a fixed resistor at that illumination.\n- Step 2: When the light level changes, the number of conduction electrons changes, so R changes. At **brighter** illumination, the gradient of the I–V line is steeper (lower R, more current for same V). At **dimmer** illumination, the gradient is shallower (higher R, less current for same V). You get a family of straight lines with different slopes for different light levels.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "A student reads a current axis labelled \"mA\" and uses the value 200 as if it were in µA. By what factor is their resistance calculation wrong, and in which direction? (2 steps)", "answer": "- Step 1: $$1\\text{ mA} = 10^{-3}\\text{ A}$$ while $$1\\text{ µA} = 10^{-6}\\text{ A}$$. The difference is a factor of 1000. If the axis reads 200 mA but the student uses $$200 \\times 10^{-6}\\text{ A}$$ instead of $$200 \\times 10^{-3}\\text{ A}$$, they have underestimated the current by a factor of 1000.\n- Step 2: Since $$R = V/I$$, underestimating I by 1000 means overestimating R by 1000. The student's answer would be **1000 times too large**. For example, if the correct $$R = 20\\text{ Ω}$$, the student would get $$R = 20{,}000\\text{ Ω} = 20\\text{ kΩ}$$.\n\nAlways convert to base SI units before substituting. Write out the full power of ten explicitly: mA = $$\\times 10^{-3}$$, µA = $$\\times 10^{-6}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "A student reads a current of 250 µA from a graph but mistakenly treats it as 250 mA. The voltage is 5.0 V. Calculate both the wrong and correct resistances. (2 steps)", "answer": "- Step 1: **Correct**: $$I = 250\\text{ µA} = 250 \\times 10^{-6}\\text{ A} = 2.5 \\times 10^{-4}\\text{ A}$$. Then $$R = V/I = 5.0/(2.5 \\times 10^{-4}) = 20{,}000\\text{ Ω} = 20\\text{ kΩ}$$.\n- Step 2: **Wrong** (treating µA as mA): $$I = 250 \\times 10^{-3}\\text{ A}$$. Then $$R = 5.0/(250 \\times 10^{-3}) = 20\\text{ Ω}$$. The student gets 20 Ω instead of 20 kΩ — off by a factor of 1000. This is one of the most common and costly exam errors.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "A non-ohmic component has the following data point on its I–V graph: $$I = 40\\text{ mA}$$, $$V = 0.70\\text{ V}$$. A student calculates $$R = I \\times V = 0.040 \\times 0.70 = 0.028\\text{ Ω}$$. Find the correct resistance and explain the error. (2 steps)", "answer": "- Step 1: The student used $$R = IV$$ (the product), which is always wrong. The correct formula is $$R = V/I$$. Correct calculation: $$R = 0.70/(40 \\times 10^{-3}) = 0.70/0.040 = 17.5\\text{ Ω}$$.\n- Step 2: The student's answer of 0.028 Ω is wrong by a factor of about 625. The correct resistance is 17.5 Ω. This was Phuc's documented error (lesson video 1, 44:01) — immediately corrected by the tutor. Always divide V by I, never multiply.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "A student says: \"Kirchhoff's First Law only applies if you know whether the circuit is series or parallel.\" Why is this wrong? (2 steps)", "answer": "- Step 1: Kirchhoff's First Law (KCL) states that the sum of currents entering any junction equals the sum of currents leaving it: $$\\Sigma I_{in} = \\Sigma I_{out}$$. This is a statement of **conservation of charge** and applies at *any* junction, regardless of the circuit topology.\n- Step 2: The circuit type (series, parallel, or mixed) determines *which branches* the current splits into and *what values* the currents take, but it does not determine *whether* the law applies. The law is universal — it holds at every junction in every circuit. Phuc's hesitation on this point (lesson video 2, 52:25) was corrected by the tutor: the law is topology-independent.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "Compare the I–V graphs of a filament lamp and an NTC thermistor. In what direction does each curve bow, and why are they opposite? (2 steps)", "answer": "- Step 1: The **filament lamp** curve bows *toward the V-axis* (away from the I-axis) — current increases at a slower rate than linear because R *increases* with temperature (metal: more lattice vibrations → more collisions → higher R).\n- Step 2: The **NTC thermistor** curve bows *toward the I-axis* (away from the V-axis) — current increases at a *faster* rate than linear because R *decreases* with temperature (semiconductor: more charge carriers liberated → lower R). They are opposite because the *mechanism* for R change is opposite: metals gain resistance when hot; NTC semiconductors lose resistance when hot.\n\nBoth are symmetric about the origin (same behaviour in both directions), unlike the diode which is asymmetric.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "Which of the five components studied (fixed resistor, filament lamp, diode, NTC thermistor, LDR) has an I–V graph that is NOT symmetric about the origin? Explain why. (2 steps)", "answer": "- Step 1: The **semiconductor diode** is the only component with an asymmetric I–V graph. In forward bias, it conducts (after ~0.6 V threshold); in reverse bias, it blocks (I ≈ 0). The graph looks completely different in the two directions.\n- Step 2: The diode's asymmetry arises because it is a **p-n junction** — it is physically constructed to allow current flow in only one direction. The other four components (fixed resistor, filament lamp, thermistor, LDR) are symmetric because they have no directional preference — their resistance depends on temperature or light, not on the direction of current flow.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "A diode has $$V = 0.64\\text{ V}$$ and $$I = 5.0\\text{ mA}$$ in forward bias. At $$V = 0.74\\text{ V}$$, $$I = 40\\text{ mA}$$. Calculate R at each point. What does the trend tell you? (2 steps)", "answer": "- Step 1: At $$V = 0.64\\text{ V}$$: $$R = 0.64/(5.0 \\times 10^{-3}) = 128\\text{ Ω}$$. At $$V = 0.74\\text{ V}$$: $$R = 0.74/(40 \\times 10^{-3}) = 18.5\\text{ Ω}$$.\n- Step 2: The resistance **decreases dramatically** as V increases past the threshold (from 128 Ω to 18.5 Ω for just a 0.1 V increase). Once the diode is \"on,\" its resistance drops very rapidly. This is why the I–V curve shoots upward steeply after the threshold voltage.\n\nIn reverse bias ($$V = -1.4\\text{ V}$$, $$I \\approx 0$$), $$R \\rightarrow \\infty$$.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "An NTC thermistor is connected in a potential divider with a fixed resistor. The output voltage $$V_{out}$$ is measured across the fixed resistor. As temperature increases, does $$V_{out}$$ increase or decrease? Explain. (3 steps)", "answer": "- Step 1: When temperature increases, the NTC thermistor's resistance **decreases** (NTC = Negative Temperature Coefficient).\n- Step 2: In a potential divider, the voltage is shared in proportion to resistance. As the thermistor's R decreases, it takes a *smaller share* of the total supply voltage.\n- Step 3: Since the supply voltage is fixed, the fixed resistor now takes a *larger share* of the voltage. Therefore, $$V_{out}$$ across the fixed resistor **increases**. This is why thermistors are useful as temperature sensors — a temperature change produces a measurable voltage change.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": true}, {"question": "An LDR is connected in a potential divider with a fixed resistor, and $$V_{out}$$ is measured across the LDR. As light intensity increases, does $$V_{out}$$ increase or decrease? Explain. (2 steps)", "answer": "- Step 1: As light intensity increases, the LDR's resistance **decreases** (more photons → more conduction electrons → lower R).\n- Step 2: The LDR now takes a *smaller share* of the supply voltage (since its R has decreased). Since $$V_{out}$$ is measured across the LDR, $$V_{out}$$ **decreases**. This makes the LDR useful as a light sensor — changes in illumination produce measurable voltage changes at the output.\n\nIf $$V_{out}$$ were across the *fixed* resistor instead, it would increase as light intensity increases (opposite behaviour). The placement of the output matters!", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "Why does a tungsten filament lamp obey Ohm's Law approximately at very small voltages, but not at its rated voltage? Connect this to the condition stated in Ohm's Law. (2 steps)", "answer": "- Step 1: Ohm's Law requires the conductor to be at **constant temperature**. At very small voltages, the current is tiny, so $$I^2R$$ heating is negligible and the filament stays near room temperature. The constant-temperature condition is approximately satisfied.\n- Step 2: At the lamp's rated voltage (e.g., 12 V), the current is large and significant power is dissipated as heat. The filament reaches a very high temperature (it glows white-hot). The temperature is far from constant, so Ohm's Law's condition is violated, and R is much larger than at room temperature.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "A student claims: \"A car bulb has a tungsten filament. Since tungsten is a metal, the bulb obeys Ohm's Law.\" Evaluate this claim. (2 steps)", "answer": "- Step 1: It is true that tungsten is a metal, and metals obey Ohm's Law *at constant temperature*. However, the key condition is constant temperature, not the material type.\n- Step 2: When the bulb is operating, the filament heats up dramatically (to ~2500°C for incandescent lamps). The temperature is far from constant, so Ohm's Law does not apply under normal operating conditions. The student's claim is wrong because they ignored the \"constant temperature\" condition. The material being a metal is necessary but not sufficient — the temperature must also remain constant.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "For the I–V experiment, the percentage uncertainty in R is given by $$\\Delta R/R = \\Delta V/V + \\Delta I/I$$. Why do we *add* the fractional uncertainties rather than use some other combination? (2 steps)", "answer": "- Step 1: Resistance is defined as $$R = V/I$$, which is a *quotient* (division). For any quantity calculated by multiplying or dividing measured values, the fractional uncertainties are always **added**, regardless of whether the operation is multiplication or division.\n- Step 2: This follows from the rules of error propagation. For $$R = V \\times I^{-1}$$: the fractional uncertainty in $$I^{-1}$$ is the same as in $$I$$ (inversion doesn't change fractional uncertainty), and for a product, fractional uncertainties add. So $$\\Delta R/R = \\Delta V/V + \\Delta I/I$$.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "For each component, state whether it is ohmic and whether its I–V graph is symmetric about the origin: (a) fixed resistor, (b) filament lamp, (c) diode, (d) NTC thermistor, (e) LDR. (2 steps)", "answer": "- Step 1: **Ohmic**: Only the (a) fixed resistor is ohmic (constant R, straight line through origin). The (b) filament lamp, (c) diode, (d) thermistor, and (e) LDR are all non-ohmic (R varies with operating conditions).\n- Step 2: **Symmetric about origin**: (a) fixed resistor — yes; (b) filament lamp — yes (same R behaviour in both directions); (d) NTC thermistor — yes; (e) LDR — yes. The (c) diode is the only **asymmetric** one — it conducts in one direction but blocks in the other.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "A student is asked to sketch the I–V characteristic for a diode. They draw a V-shaped graph (like an absolute value function) symmetric about the V-axis. What is wrong? (2 steps)", "answer": "- Step 1: The student has drawn the diode as if it conducts equally well in both forward and reverse bias. A V-shaped graph would show current increasing symmetrically for both positive and negative voltages.\n- Step 2: In reality, a diode conducts only in forward bias (after ~0.6 V threshold) and blocks in reverse bias (I ≈ 0 for all negative V). The correct graph is **flat at zero current for all negative V**, then flat at zero for positive V up to ~0.6 V, then curves steeply upward. It is highly asymmetric, not V-shaped.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "You are told a component's I–V graph is a curve that bows toward the current axis (steeper than linear). Could this be a filament lamp? Explain. (2 steps)", "answer": "- Step 1: No. A filament lamp's I–V graph bows *toward the voltage axis* (shallower than linear), because its resistance *increases* with temperature (metal → more lattice vibrations → more collisions → higher R → current rises slower).\n- Step 2: A curve bowing toward the current axis means current rises *faster* than linear, indicating resistance is *decreasing* with increasing V/I. This is characteristic of an **NTC thermistor** (higher T → more charge carriers → lower R → current rises faster).\n\nThe direction the curve bows tells you the direction R is changing: bow toward V-axis → R increasing; bow toward I-axis → R decreasing.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "On an I–V graph for an ohmic conductor, the gradient is $$0.025\\text{ A/V}$$. What is the resistance? (1 step)", "answer": "- Step 1: For an ohmic conductor, $$R = 1/\\text{gradient} = 1/0.025 = 40\\text{ Ω}$$. Quick mental math: $$1/0.025 = 1/(1/40) = 40$$. Unit check: $$1/(\\text{A/V}) = \\text{V/A} = \\text{Ω}$$. ✓", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "At a point on a filament lamp's I–V curve, $$V = 2.0\\text{ V}$$ and $$I = 0.80\\text{ A}$$. At another point, $$V = 12\\text{ V}$$ and $$I = 2.0\\text{ A}$$. Calculate R at each point. What does the change tell you? (2 steps)", "answer": "- Step 1: At the first point: $$R = 2.0/0.80 = 2.5\\text{ Ω}$$. At the second point: $$R = 12/2.0 = 6.0\\text{ Ω}$$.\n- Step 2: The resistance has more than doubled (from 2.5 Ω to 6.0 Ω) as the lamp goes from dim to bright. This confirms the filament is non-ohmic: R is not constant. The increase in R with V is due to the filament heating up — higher temperature → more lattice vibrations → more collisions → higher resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "A student reads the p.d. across a component as 4.0 V and the current as 200 µA. They calculate $$R = 4.0/(200 \\times 10^{-3}) = 20\\text{ Ω}$$. Find the correct answer. (2 steps)", "answer": "- Step 1: The student confused µA ($$10^{-6}$$) with mA ($$10^{-3}$$). The correct conversion is $$I = 200\\text{ µA} = 200 \\times 10^{-6}\\text{ A} = 2.0 \\times 10^{-4}\\text{ A}$$.\n- Step 2: Correct calculation: $$R = V/I = 4.0/(2.0 \\times 10^{-4}) = 20{,}000\\text{ Ω} = 20\\text{ kΩ}$$. The student's answer of 20 Ω is **1000 times too small**. Always write out the full power of ten before substituting.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "Why is the I–V graph for a filament lamp symmetric about the origin, even though it is non-ohmic? (2 steps)", "answer": "- Step 1: When the supply is reversed (negative V), the current flows in the opposite direction (negative I). The filament still heats up in the same way — the temperature increase depends on $$I^2R$$, and squaring the current removes the sign. So the magnitude of the heating effect is the same regardless of current direction.\n- Step 2: The resistance depends on temperature, not on the direction of current flow. Whether electrons move left-to-right or right-to-left through the filament, they collide with the same lattice ions, and the heating effect is the same. So the graph looks the same in the third quadrant as in the first quadrant — it is symmetric about the origin.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": true}, {"question": "What practical applications use (a) an NTC thermistor and (b) an LDR? Briefly explain how each works as a sensor. (2 steps)", "answer": "- Step 1: **NTC thermistor** — used as a **temperature sensor** in potential dividers (e.g., thermostats, engine temperature monitors). As temperature rises, the thermistor's R decreases, changing the output voltage of the potential divider. This voltage change can trigger a control circuit (e.g., turn on a cooling fan).\n- Step 2: **LDR** — used as a **light sensor** (e.g., automatic streetlights, burglar alarms, camera exposure meters). As light intensity increases, the LDR's R decreases (photons liberate charge carriers), changing the output voltage of a potential divider circuit. When it gets dark, R rises and the voltage change can trigger a light to switch on.\n\nBoth work on the same principle: a change in the physical quantity (T or light) changes R, which changes $$V_{out}$$ in a potential divider, triggering a response.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "Summarise the I–V graph shape and R-trend for all five components in a comparison. For each, state: graph shape, ohmic?, R trend. (2 steps)", "answer": "- Step 1:\n+ **Fixed resistor**: Straight line through origin, ohmic, R = constant\n+ **Filament lamp**: S-curve bowing toward V-axis, non-ohmic, R increases with T\n+ **Diode**: Asymmetric — flat then steep in forward, flat in reverse, non-ohmic, R decreases sharply past threshold in forward; R → ∞ in reverse\n- Step 2:\n+ **NTC thermistor**: Curve bowing toward I-axis, non-ohmic, R decreases with T\n+ **LDR**: Near-linear at fixed light level (steeper when brighter), non-ohmic (R changes with light), R decreases with light intensity", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "A student is told to find the resistance of a non-ohmic component at a specific operating point. They take the gradient of the tangent to the curve at that point and invert it. Explain why this gives the *differential resistance* and not the actual resistance. (2 steps)", "answer": "- Step 1: The gradient of the tangent at a point on the I–V curve is $$dI/dV$$, which tells you how the current changes for an infinitesimal change in voltage around that point. The reciprocal, $$dV/dI$$, is the **differential (dynamic) resistance** — how much extra voltage is needed for a tiny increase in current.\n- Step 2: The actual resistance at that point is $$R = V/I$$ — the ratio of the total voltage to the total current, which is the gradient of the line from the *origin* to that point (not the tangent). For a non-ohmic component, these are different values. The differential resistance is useful in some contexts (e.g., AC small-signal analysis) but is NOT what the exam means by \"resistance.\"\n\nVisual: draw a line from the origin to the point. Its slope is $$I/V = 1/R$$. Draw a tangent at the point. Its slope is $$dI/dV$$. These are different lines with different slopes unless the component is ohmic.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": true}, {"question": "In the I–V experiment, why is it conventional to plot I on the y-axis and V on the x-axis (rather than V on y and I on x)? (2 steps)", "answer": "- Step 1: The convention of I on y-axis and V on x-axis means the independent variable (V, which you deliberately change) is on the x-axis, and the dependent variable (I, which you measure) is on the y-axis. This follows standard graphing convention.\n- Step 2: With this convention, the gradient of the graph is $$I/V = 1/R$$ for an ohmic conductor. If you plotted V vs I (V on y-axis), the gradient would be $$V/I = R$$ directly. While this seems simpler, the I-vs-V convention is standard in A-level physics and you must be consistent to avoid confusion about what the gradient represents.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "You measure the I–V characteristic of a component and find that the data points do not pass exactly through the origin — there is a small offset on the V-axis. What might cause this, and does it mean the component is non-ohmic? (2 steps)", "answer": "- Step 1: A small offset from the origin likely indicates a **systematic error** in the experiment — for example, a zero error in the voltmeter or ammeter, or a small internal resistance in the wiring. It does not necessarily mean the component itself is non-ohmic.\n- Step 2: To show proportionality (and hence Ohm's Law), the graph must be a straight line *through the origin*. If the line is straight but has an intercept, the relationship is linear ($$y = mx + c$$) but not proportional ($$y = mx$$). This could be a real effect (e.g., a threshold voltage like a diode) or an experimental artefact. The experimenter should check for zero errors and calibrate instruments.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": true}, {"question": "[Exercise] An ohmic conductor has an I–V graph with gradient $$20\\text{ mA/V}$$. A non-ohmic component passes through the point $$(V = 2.0\\text{ V}, I = 100\\text{ mA})$$. Find R for each. (2 steps)", "answer": "- Step 1: **Ohmic conductor**: $$R = 1/\\text{gradient} = 1/(20 \\times 10^{-3}) = 1/0.020 = 50\\text{ Ω}$$. (Since it's ohmic, this R is the same at every point.)\n- Step 2: **Non-ohmic component**: $$R = V/I = 2.0/(100 \\times 10^{-3}) = 2.0/0.10 = 20\\text{ Ω}$$ at this specific point. (This R only applies at this operating point; it would be different at other points on the curve.)", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "[Exercise] A diode is in forward bias at $$V = 0.70\\text{ V}$$ with $$I = 30\\text{ mA}$$. In reverse bias at $$V = -5.0\\text{ V}$$, the ammeter reads 0.00 mA. Calculate R in each case. (2 steps)", "answer": "- Step 1: **Forward bias**: $$R = V/I = 0.70/(30 \\times 10^{-3}) = 0.70/0.030 \\approx 23\\text{ Ω}$$. The diode is conducting with relatively low resistance.\n- Step 2: **Reverse bias**: $$I \\approx 0$$, so $$R = V/I = -5.0/0 \\rightarrow \\infty$$. The resistance is effectively infinite. The diode blocks current in reverse bias. (Note: a tiny leakage current exists in reality, but it's below the ammeter's detection threshold.)", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "[Synthesis] A student has two unlabelled components X and Y. Component X has an I–V graph that is a straight line through the origin. Component Y has a graph that is flat at zero current for negative V, then rises steeply after ~0.6 V. Identify each component and explain your reasoning. (2 steps)", "answer": "- Step 1: **Component X** is a **fixed resistor** (ohmic conductor). The straight line through the origin shows that $$I \\propto V$$ — current is directly proportional to p.d., meaning constant resistance. This is the defining characteristic of an ohmic conductor.\n- Step 2: **Component Y** is a **semiconductor diode**. The flat region at zero current for negative V shows it blocks in reverse bias (infinite resistance). The threshold at ~0.6 V before current flows is the signature turn-on voltage of a silicon diode. The steep rise after threshold shows resistance drops dramatically once the diode conducts. No other component has this asymmetric, threshold-dependent behaviour.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": true}, {"question": "[Synthesis] A potential divider consists of a 12 V supply, a fixed $$10\\text{ kΩ}$$ resistor, and an LDR in series. $$V_{out}$$ is measured across the LDR. In daylight, the LDR has $$R = 2\\text{ kΩ}$$. In darkness, $$R = 10\\text{ MΩ}$$. Estimate $$V_{out}$$ in daylight and in darkness. (3 steps)", "answer": "- Step 1: **Daylight** ($$R_{LDR} = 2\\text{ kΩ}$$): Total $$R = 10 + 2 = 12\\text{ kΩ}$$. Using the potential divider equation: $$V_{out} = R_{LDR}/(R_{fixed} + R_{LDR}) \\times V_{supply} = 2/12 \\times 12 = 2\\text{ V}$$. (The LDR, being the smaller resistor, gets a small share of the voltage.)\n- Step 2: **Darkness** ($$R_{LDR} = 10\\text{ MΩ} = 10{,}000\\text{ kΩ}$$): Total $$R \\approx 10{,}000\\text{ kΩ}$$ (the 10 kΩ fixed resistor is negligible by comparison). $$V_{out} \\approx 10{,}000/10{,}010 \\times 12 \\approx 12\\text{ V}$$. (The LDR, being the much larger resistor, takes nearly all the voltage.)\n- Step 3: The output swings from ~2 V in daylight to ~12 V in darkness. This large voltage swing is why the LDR is useful as a light sensor — the output changes dramatically with illumination, making it easy to trigger a switch (e.g., turning on streetlights when it gets dark).", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": true}, {"question": "[Edge case] A diode is subjected to an increasingly large reverse bias voltage. At some point, the current suddenly increases dramatically (breakdown). Does this contradict the statement \"a diode has infinite resistance in reverse bias\"? (2 steps)", "answer": "- Step 1: No, it doesn't contradict the general rule for normal operating conditions. The statement \"infinite resistance in reverse bias\" applies within the diode's **normal operating range** — the range of reverse voltages it is designed to handle. In this range, the current is negligibly small.\n- Step 2: Beyond a critical reverse voltage (the **breakdown voltage**), the diode's internal structure fails and a large current flows. This is outside the diode's intended operating range and usually causes permanent damage (for standard diodes). The I–V characteristic we study only covers the normal operating range; breakdown is beyond the syllabus but is important to know as a limiting case.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "[Misconception probe] A student says: \"If a component has a higher resistance, it must have a higher voltage across it.\" Evaluate this claim. (2 steps)", "answer": "- Step 1: This is only true **in a series circuit** where the current is the same through all components. By $$V = IR$$, if $$I$$ is the same, then yes — a higher R means a higher V across that component.\n- Step 2: In a **parallel circuit**, all components have the *same* voltage across them regardless of their resistance. A higher R component in parallel actually has a *smaller* current ($$I = V/R$$), not a higher voltage. The student's claim is not universally true — it depends on the circuit configuration. Don't confuse cause and effect: R controls current for a given V; R doesn't automatically determine V.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": true}], "count": 55}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Define resistance and explain its physical origin in terms of electron-lattice interactions. (3 steps)", "answer": "- Step 1: **Definition of resistance**: Opposition to current flow, quantified by $ R = \\frac{V}{I} $ (voltage per unit current).  \n- Step 2: **Physical mechanism**: Electrons collide with vibrating lattice ions in a conductor. Each collision transfers kinetic energy from electrons to ions, increasing thermal energy (heat).  \n- Step 3: **Consequence**: These collisions reduce electron drift velocity and dissipate electrical energy as heat, which is the basis for resistance.  \n\n[Optional: Resistance arises from electron-lattice interactions that impede charge flow.]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How does Ohm’s Law differ from the definition of resistance? (2 steps)", "answer": "- Step 1: **Definition of resistance**: $ R = \\frac{V}{I} $ applies to ALL components (ohmic or non-ohmic).  \n- Step 2: **Ohm’s Law**: A physical law stating $ I \\propto V $ for metallic conductors at constant temperature, implying constant $ R $. Ohm’s Law is a special case of the definition.  \n\n[Optional: Ohm’s Law requires constant temperature; the definition of resistance does not.]", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why must a filament lamp’s I–V characteristic be measured with the component cooling to room temperature between runs? (3 steps)", "answer": "- Step 1: **Temperature dependence**: The filament’s resistance increases with temperature due to greater lattice ion vibrations.  \n- Step 2: **Data consistency**: If measurements are taken immediately after forward bias, residual heat would artificially increase resistance in reverse-bias readings.  \n- Step 3: **Fair comparison**: Waiting ensures both forward and reverse I–V data are collected at the same baseline temperature, making the graph symmetric.  \n\n[Optional: Without cooling, the reverse-bias data would reflect a hotter filament, distorting the S-curve.]", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How do you determine resistance from a non-ohmic I–V graph? Why is the gradient not used? (3 steps)", "answer": "- Step 1: **Direct measurement**: Read $ V $ and $ I $ at a specific point on the curve.  \n- Step 2: **Calculate $ R $**: Use $ R = \\frac{V}{I} $ (Ohm’s Law definition).  \n- Step 3: **Why gradient fails**: For non-linear graphs, the gradient $ \\frac{\\Delta I}{\\Delta V} $ equals $ \\frac{1}{R} $ only for ohmic conductors. For non-ohmic components, differential resistance $ \\frac{dV}{dI} $ differs from $ \\frac{V}{I} $.  \n\n[Optional: Misconception: The gradient of a curved I–V graph does NOT give $ R $; it gives $ \\frac{1}{R} $ at that point only.]", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Sketch the I–V graph for a semiconductor diode and explain:  \n(a) Why it blocks current in reverse bias  \n(b) Why the threshold voltage (~0.6V) exists in forward bias  \n(4 steps)", "answer": "- Step 1: **Graph shape**: Forward bias (right half): Flat at $ I = 0 $ until ~0.6V, then steep rise. Reverse bias (left half): Flat at $ I = 0 $.  \n- Step 2: **Reverse bias**: High resistance due to depletion layer widening — no conduction (insulating region).  \n- Step 3: **Forward bias**: Below 0.6V, electrons lack energy to overcome depletion layer. Above threshold, current flows as layer collapses.  \n- Step 4: **Why 0.6V?**: Silicon diodes require ~0.6V to overcome the built-in potential barrier of the p-n junction.  \n\n+ Example: A 0.7V forward bias yields large current; a -5V reverse bias has $ I \\approx 0 $.  \n+ Edge case: At 0V, $ I = 0 $ in both biases.  \n\n[Optional: Takeaway: Diodes require threshold voltage in forward bias; reverse bias blocks current.]", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why is a potentiometer (potential divider) preferred over a rheostat for measuring I–V characteristics? (3 steps)", "answer": "- Step 1: **Voltage range**: A rheostat-as-variable-resistor can only vary $ V $ from a minimum $ > 0 $V to max. A potentiometer varies $ V $ from 0V to max.  \n- Step 2: **Data accuracy**: Potentiometer provides more low-voltage data points near the origin, essential for confirming Ohm’s Law or observing threshold voltages.  \n- Step 3: **Controlled conditions**: Rheostat limits precision in low-current regions; potentiometer ensures full-scale data collection.  \n\n[Optional: Potentiometer enables 0–100% voltage sweep, while rheostat skips the lower range.]", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Explain why an NTC thermistor’s resistance decreases with temperature, contrasting it with a tungsten filament lamp. (4 steps)", "answer": "- Step 1: **NTC thermistor**: Increased temperature gives valence electrons enough energy to become free conduction electrons.  \n- Step 2: **More carriers**: Higher $ n $ (charge carrier density) reduces resistance ($ R = \\frac{V}{I} $, and $ I $ increases for same $ V $).  \n- Step 3: **Filament lamp**: Tungsten atoms vibrate more at higher $ T $, causing more frequent electron-lattice collisions, increasing $ R $.  \n- Step 4: **Opposite trends**: NTC thermistor: $ R \\downarrow $ with $ T \\uparrow $. Filament lamp: $ R \\uparrow $ with $ T \\uparrow $.  \n\n+ Analogy: Thermistor is a \"better conductor when hot\"; filament is a \"worse conductor when hot.\"  \n+ Edge case: Both effects rely on temperature altering electron mobility but in opposite directions.  \n\n[Optional: Takeaway: Material structure dictates how $ R $ responds to $ T $.]", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "For an ohmic resistor, how is $ R $ derived from the I–V graph’s gradient? Why is this invalid for non-ohmic components? (3 steps)", "answer": "- Step 1: **Ohmic derivation**: Graph is straight line through origin. Gradient $ \\frac{\\Delta I}{\\Delta V} = \\frac{1}{R} $, so $ R = \\frac{1}{\\text{gradient}} $.  \n- Step 2: **Non-ohmic issue**: Curved graphs have varying gradients (different $ \\frac{1}{R} $ at each point), but $ R $ itself must be calculated as $ R = \\frac{V}{I} $ at that point.  \n- Step 3: **Example**: For a thermistor’s curved I–V graph, the gradient at $ V = 1 $V doesn’t equal $ \\frac{1}{R} $; you must use $ R = \\frac{V}{I} $.  \n\n[Optional: Gradient-based resistance only works for linear I–V graphs.]", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "A student measures a component’s I–V graph. At 3.0V, the current is 60mA. They claim $ R = 50\\Omega $. What’s their mistake? (2 steps)", "answer": "- Step 1: **Correct calculation**: $ R = \\frac{V}{I} = \\frac{3.0}{0.060} = 50\\Omega $.  \n- Step 2: **Hidden error**: If the graph is non-ohmic, they might have used the gradient (incorrectly) to find $ R $, but here $ R = 50\\Omega $ is correct since they used $ \\frac{V}{I} $.  \n\n+ Misconception: Using gradient for non-ohmic graphs would be wrong, but this question tests unit conversion (mA → A).  \n+ Edge case: If $ I = 60\\mu A $, $ R = 50k\\Omega $, highlighting prefix traps (µ vs m).  \n\n[Optional: Takeaway: Always convert units to base SI before calculation.]", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How does an LDR’s I–V graph change with increasing light intensity? Explain the physical mechanism. (3 steps)", "answer": "- Step 1: **Graph behavior**: I–V lines become steeper (higher $ I $ for same $ V $) as light intensity increases.  \n- Step 2: **Photon excitation**: More photons → more electrons jump to conduction band → higher $ n $ (carrier density) → lower $ R $.  \n- Step 3: **Near-ohmic at fixed light**: At constant illumination, the I–V graph is approximately linear, but $ R $ decreases with brighter light.  \n\n+ Example: At dim light, $ I = 10 $mA at 2V; at bright light, $ I = 20 $mA at 2V → $ R $ halves.  \n+ Edge case: Sudden light changes cause transient $ R $ adjustments before equilibrium.  \n\n[Optional: Takeaway: Light intensity modulates $ n $, altering conductivity.]", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Why does a tungsten filament lamp’s I–V graph curve toward the voltage axis? (3 steps)", "answer": "- Step 1: **Heating effect**: Current through the lamp causes $ I^2R $ heating, raising the filament’s temperature.  \n- Step 2: **Lattice vibration**: Higher $ T $ → ions vibrate more → electrons collide more frequently → $ R $ increases.  \n- Step 3: **Graph shape**: As $ V $ increases, $ R $ increases, so $ I $ grows slower than proportionally → curve bows toward $ V $-axis.  \n\n+ Example: At 1V, $ I = 0.5 $A; at 2V, $ I = 0.8 $A (not 1.0A) due to rising $ R $.  \n+ Edge case: At very low voltages, $ T $ is near room temp → Ohm’s Law holds (straight line).  \n\n[Optional: Takeaway: Temperature-dependent collisions cause non-linearity.]", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "What are the key differences between a thermistor and an LDR in terms of stimulus and resistance? (2 steps)", "answer": "- Step 1: **Stimulus**: Thermistor → temperature change; LDR → light intensity change.  \n- Step 2: **Resistance response**: NTC thermistor → $ R \\downarrow $ with $ T \\uparrow $; LDR → $ R \\downarrow $ with light intensity $ \\uparrow $.  \n\n[Optional: Both exploit environmental stimuli to modulate $ R $, but mechanisms differ (heat vs photons).]", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Why is a resistor described as \"dissipating energy as heat\" rather than \"storing electrons\"? (3 steps)", "answer": "- Step 1: **Electron flow**: Electrons enter and exit resistor at the same rate (conservation of charge).  \n- Step 2: **Energy transfer**: Electrons lose kinetic energy via collisions with lattice ions, heating the resistor.  \n- Step 3: **No storage**: Electrons are not stored; they simply move slower due to collisions, reducing current for same $ V $.  \n\n+ Misconception: Students may think resistors \"store\" charge, but they only slow electron flow.  \n+ Edge case: A capacitor stores charge; a resistor does not.  \n\n[Optional: Takeaway: Resistors convert electrical energy to thermal energy, not store electrons.]", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "What is the role of a protective resistor in a diode circuit? (2 steps)", "answer": "- Step 1: **Prevent damage**: In forward bias, excessive current can destroy the diode. A protective resistor limits $ I $ to safe levels.  \n- Step 2: **Ohm’s Law control**: $ R_{\\text{total}} = R_{\\text{diode}} + R_{\\text{protective}} $, ensuring $ I = \\frac{V}{R_{\\text{total}}} $ stays within diode’s rating.  \n\n[Optional: Without a resistor, diode acts as short circuit (zero $ R $) at threshold, causing overheating.]", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "In an I–V experiment, why wait 5 minutes between forward and reverse measurements? (2 steps)", "answer": "- Step 1: **Thermal equilibrium**: Components like filament lamps or thermistors retain heat after powering off.  \n- Step 2: **Consistent data**: Waiting ensures $ T $ is stable, giving symmetric I–V curves (e.g., filament’s $ R $ at 6V is same in both directions).  \n\n[Optional: Skipping this step introduces systematic error due to temperature-dependent $ R $.]", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}], "count": 15}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Explain the difference between the definition of resistance (R = V/I) and Ohm's Law. Why is Ohm’s Law not simply \"R = V/I\"? (3 steps)", "answer": "- Step 1: Resistance is defined by R = V/I for ALL components, regardless of linearity. This is a measurement formula.  \n- Step 2: Ohm’s Law is a physical law stating that for a metallic conductor at constant temperature, I ∝ V (current is directly proportional to voltage). This implies R = constant, which is a specific condition, not a general definition.  \n- Step 3: The key distinction: R = V/I is always true, but Ohm’s Law applies only to ohmic conductors (e.g., fixed resistors). Non-ohmic components (diodes, filament lamps) have varying R, violating Ohm’s Law.  \n\n[Takeaway: Resistance is a measured quantity; Ohm’s Law is a special-case relationship about proportionality.]", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why does the I–V graph of a tungsten filament lamp curve toward the voltage axis? Explain the two microscopic steps. (3 steps)", "answer": "- Step 1: As current increases, the filament heats up (I²R heating).  \n- Step 2: Higher temperature causes metal lattice ions to vibrate with greater amplitude.  \n- Step 3: Increased vibration leads to more frequent electron collisions, raising resistance. This makes current increase slower than voltage, curving the graph.  \n\n[Takeaway: Higher T → more collisions → higher R → non-linear I–V.]", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How would the I–V graph of an NTC thermistor differ from a filament lamp? Why does R decrease with temperature in a thermistor? (3 steps)", "answer": "- Step 1: NTC thermistor curve bows toward the current axis (I rises faster with V), while filament lamp curves toward the voltage axis.  \n- Step 2: In thermistors, higher temperature gives valence electrons enough energy to become conduction electrons.  \n- Step 3: More charge carriers ⇒ lower resistance ⇒ steeper I–V curve.  \n\n[Takeaway: Opposite R behavior vs. T (thermistor: R↓ with T↑; filament: R↑ with T↑).]", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "A diode has a threshold voltage of ~0.6 V. Why does it block current in reverse bias? What does R approach in this case? (3 steps)", "answer": "- Step 1: In forward bias (V > 0.6 V), electrons gain enough energy to overcome the p-n junction barrier.  \n- Step 2: In reverse bias (negative V), the junction widens, creating a larger barrier. Electrons lack energy to surmount it.  \n- Step 3: Reverse bias: Practically zero current → R = V/I → ∞ (open circuit).  \n\n[Takeaway: Diode blocks in reverse bias; R ≈ 0.6 V threshold for conduction.]", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "A student measures a component and plots an I–V graph. The graph is a straight line through the origin. What can be concluded about the component? What does the gradient represent? (2 steps)", "answer": "- Step 1: The component is ohmic (obeys Ohm’s Law).  \n- Step 2: Gradient = I/V = 1/R. To find R, take reciprocal of gradient.  \n\n[Takeaway: Ohmic = straight line through origin; gradient = 1/R.]", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "A semiconductor diode’s I–V graph shows a sudden current jump at 0.6 V. Why does this happen? What happens if you reverse the bias? (2 steps)", "answer": "- Step 1: At 0.6 V, electrons gain enough energy to overcome the p-n junction’s potential barrier.  \n- Step 2: In reverse bias, the junction widens, blocking current. Resistance becomes effectively infinite.  \n\n[Takeaway: Threshold voltage enables conduction; reverse bias blocks current.]", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Contrast the resistance-temperature behavior of a filament lamp (metal) and an NTC thermistor. How does this relate to electron collisions in each? (3 steps)", "answer": "- Step 1: Filament lamp (metal): Higher T → more lattice vibrations → more collisions → R↑.  \n- Step 2: NTC thermistor: Higher T → more valence electrons become conduction electrons → fewer collisions → R↓.  \n- Step 3: Metals have positive temp coefficient; semiconductors (NTC) have negative temp coefficient.  \n\n[Takeaway: Resistance trends are opposites due to different charge carrier mechanisms.]", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "An LDR is exposed to bright light. How does this affect its I–V graph? Explain the microscopic mechanism. (2 steps)", "answer": "- Step 1: Bright light → photons energize electrons into the conduction band → more charge carriers.  \n- Step 2: More electrons ⇒ lower resistance ⇒ steeper I–V gradient (I increases for same V).  \n\n[Takeaway: Light intensity ↑ → R↓ in LDR; filament lamp ≠ LDR behavior.]", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "In an I–V experiment, why is a potentiometer (potential divider) preferred over a rheostat (series resistor) for varying voltage? (2 steps)", "answer": "- Step 1: Rheostat in series can only reduce current from a fixed V; cannot go to 0 V.  \n- Step 2: Potentiometer allows V to be adjusted from 0 to max by varying the slider. It provides a continuous V range near origin.  \n\n[Takeaway: Potentiometer gives full 0–max V control; rheostat cannot reach 0 V.]", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "A student plots a filament lamp’s I–V curve and claims it obeys Ohm’s Law because I increases with V. How would you correct this? (3 steps)", "answer": "- Step 1: Ohm’s Law requires I ∝ V (straight line through origin).  \n- Step 2: Filament lamp’s graph is curved → R varies → non-ohmic.  \n- Step 3: At near-0 V (low I), temperature is constant → approximates Ohm’s Law.  \n\n[Takeaway: Non-linear graph = non-ohmic; Ohm’s Law only holds if R is constant.]", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "How would you find the resistance of a non-ohmic component (e.g., LED) at a specific operating point on its I–V graph? Why can’t you use the gradient? (2 steps)", "answer": "- Step 1: Read V and I at the point. Compute R = V/I.  \n- Step 2: Gradient = dI/dV (slope of I vs. V) ≠ 1/R. Resistance uses the operating point’s coordinates, not the curve’s steepness.  \n\n[Takeaway: Always use R = V/I for non-ohmic components.]", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "A student measures a thermistor’s I–V graph. What happens to its resistance as current increases? How does this compare to a metal wire? (3 steps)", "answer": "- Step 1: Thermistor’s I increases faster than V (curve toward I-axis) → R decreases.  \n- Step 2: In metals, higher I → higher temperature → more collisions → R increases.  \n- Step 3: Thermistors: R↓ with T↑; metals: R↑ with T↑. Opposite behaviors.  \n\n[Takeaway: R trends depend on material type.]", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "Why is the filament lamp’s resistance at 0.80 A (2.5 Ω) lower than its rated resistance (6.0 Ω at 2.0 A)? Explain using temperature and collisions. (2 steps)", "answer": "- Step 1: At 0.80 A, the filament is cooler → ions vibrate less → fewer collisions → lower R.  \n- Step 2: At rated current (2.0 A), high temperature → more collisions → higher R.  \n\n[Takeaway: Resistance increases with temperature in metals.]", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "A diode’s reverse bias current is 0.00 mA at -1.40 V. What is its resistance? Why is this not zero? (2 steps)", "answer": "- Step 1: R = V/I = -1.40 V / 0.00 mA → R → ∞.  \n- Step 2: Reverse bias widens the depletion layer, blocking current. Resistance is not zero because no conduction occurs.  \n\n[Takeaway: Reverse-biased diode ≈ open circuit (R ≈ ∞).]", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "When plotting I–V graphs, why wait 5 minutes between forward and reverse runs? (2 steps)", "answer": "- Step 1: Heating during forward bias alters material properties (e.g., filament temperature, thermistor resistance).  \n- Step 2: Waiting ensures the component returns to room temperature, making forward and reverse measurements comparable.  \n\n[Takeaway: Temperature changes during operation affect resistance; cooling restores fairness.]", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "An ammeter reads 200 µA with a 2.0 V supply. What is the resistance? Why is converting µA to A critical here? (3 steps)", "answer": "- Step 1: Convert 200 µA = 200 × 10⁻⁶ A.  \n- Step 2: R = V/I = 2.0 / (200 × 10⁻⁶) = 10,000 Ω = 10 kΩ.  \n- Step 3: Using µA directly would give R = 2.0 / 200 = 0.01 Ω (wrong by 1000×). Unit conversion ensures correct magnitude.  \n\n[Takeaway: Always convert to base units (A, V, Ω) before calculation.]", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "Why is a resistor not an energy storage device? What happens to electrons in it? (2 steps)", "answer": "- Step 1: Electrons are not stored; they flow through the resistor.  \n- Step 2: Collisions convert electrical energy to heat, reducing electron drift velocity but not total charge flow (KCL holds).  \n\n[Takeaway: Resistors dissipate energy as heat; they do not store charge.]", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "How would the I–V graph of a fixed resistor change if it were made of a semiconductor with negative temp coefficient instead of metal? (2 steps)", "answer": "- Step 1: Metal resistor: Straight line (constant R) since R ≈ constant at constant T.  \n- Step 2: Semiconductor (NTC thermistor) would have a curved graph, R↓ as T↑ → I increases faster than in metal.  \n\n[Takeaway: Material type determines graph shape and R behavior.]", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "A student draws a straight line from the origin to a point on a non-ohmic graph. What does the gradient of this line represent? (2 steps)", "answer": "- Step 1: The line connects (0,0) to (V,I) at the operating point.  \n- Step 2: Gradient = I/V = 1/R. This equals the component’s resistance at that point.  \n\n[Takeaway: For any component, R = V/I at a point. For ohmic, R = 1/gradient of the entire line.]", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "A thermistor is in a potential divider with a fixed resistor. As T increases, does Vout across the fixed resistor rise or fall? (3 steps)", "answer": "- Step 1: Thermistor’s R decreases with T.  \n- Step 2: In potential divider, Vout = (R_fixed / R_total) × V_supply.  \n- Step 3: Lower thermistor R → smaller R_total → higher Vout across fixed resistor.  \n\n[Takeaway: R_thermistor ↓ → Vout across fixed resistor ↑.]", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}], "count": 20}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Describe the physical origin of resistance in a metallic conductor at the microscopic level. (2 steps)", "answer": "- Step 1: In a metal, conduction electrons drift through a lattice of positive ions. As electrons move, they collide with these vibrating lattice ions.\n- Step 2: Each collision transfers kinetic energy from the electron to the ion, causing the ion to vibrate more (this is thermal energy/heat). This process dissipates electrical energy as thermal energy, opposing the current — this opposition is resistance.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "State Ohm's Law precisely. Why is writing \"R = V/I\" alone NOT a statement of Ohm's Law? (2 steps)", "answer": "- Step 1: Ohm's Law states that for a metallic conductor at constant temperature, the current is directly proportional to the potential difference across it: I ∝ V.\n- Step 2: The equation R = V/I is the definition of resistance, which applies to ALL components (ohmic or non-ohmic). Ohm's Law adds the condition that R is constant (for metals at constant temperature). Writing R = V/I alone does not convey this constancy requirement.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "In an experiment to obtain an I–V characteristic graph, why is it important to start with the potential difference at minimum before switching on? (2 steps)", "answer": "- Step 1: Starting at minimum p.d. prevents a large initial current surge that could damage the component (especially sensitive components like diodes or filament lamps).\n- Step 2: It also ensures you obtain data points near the origin, which is crucial for determining whether the component is ohmic (linear near zero) or non-ohmic (curved from the start).", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Why is a potentiometer (used as a potential divider) preferred over a rheostat (variable resistor) when obtaining an I–V characteristic experimentally? (2 steps)", "answer": "- Step 1: A rheostat as a variable resistor cannot reduce the p.d. to zero — it only reduces current from a minimum to maximum. A potentiometer (wired as a potential divider) allows the p.d. across the component to be varied continuously from 0 V to the maximum supply voltage.\n- Step 2: This provides more data points near the origin, which is essential for accurately determining whether the component obeys Ohm's Law (linearity near zero).", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "After taking forward-bias readings for a filament lamp, why must you wait at least 5 minutes before reversing the terminals to take reverse-bias readings? (2 steps)", "answer": "- Step 1: When the filament lamp operates, its tungsten filament heats up significantly, increasing its resistance. If you reverse the terminals while the filament is still hot, your reverse-bias measurements will be taken at an elevated temperature.\n- Step 2: This would give an unfair comparison because the filament's resistance would be different from its room-temperature value. Waiting allows it to cool back to room temperature so both halves of the graph are comparable.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A student measures the current and voltage for a non-ohmic component and writes R = I × V. Is this correct? Explain. (2 steps)", "answer": "- Step 1: No, this is incorrect. Resistance is defined as voltage divided by current: R = V/I, not their product.\n- Step 2: This is one of the most common exam traps. Always remember: resistance is a quotient (ratio), not a product. The correct rearrangements are V = IR or I = V/R.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "An ammeter reads 200 μA and a voltmeter reads 4.0 V. A student calculates R = 4.0/(200 × 10⁻³) = 20 Ω. What is wrong with this calculation? (2 steps)", "answer": "- Step 1: The student confused micro-amps (μA = 10⁻⁶ A) with milli-amps (mA = 10⁻³ A). They used 200 × 10⁻³ (which is 200 mA) instead of 200 × 10⁻⁶ A.\n- Step 2: The correct calculation is: I = 200 μA = 200 × 10⁻⁶ A = 2.0 × 10⁻⁴ A. Therefore: R = V/I = 4.0/(2.0 × 10⁻⁴) = 20,000 Ω = 20 kΩ. The student's answer is off by a factor of 1000.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "For an ohmic conductor plotted on an I–V graph (I on y-axis, V on x-axis), how do you determine the resistance from the gradient? (1 step)", "answer": "For an ohmic conductor, the I–V graph is a straight line through the origin. The gradient of this line is I/V, which equals 1/R. Therefore, the resistance is the reciprocal of the gradient:\n$$R = \\frac{1}{\\text{gradient}}$$", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Why can you NOT use the gradient of an I–V curve to find the resistance of a non-ohmic component like a filament lamp? (2 steps)", "answer": "- Step 1: For a non-ohmic component, the resistance changes with voltage and current. The gradient of the curve at any point (dI/dV) gives the differential resistance at that exact point, not the effective resistance R = V/I.\n- Step 2: To find the resistance at a specific operating point, you must read off the V and I values at that point, then calculate R = V/I. Using the gradient would give an incorrect value.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Sketch the I–V characteristic for an ohmic conductor (fixed resistor). State two key features of this graph. (2 steps)", "answer": "- Step 1: The graph is a straight line passing through the origin (0, 0). The gradient is constant, equal to 1/R.\n+ The relationship is linear: I ∝ V\n+ The resistance is constant at all points (R does not change with V or I)\n- Step 2: The graph is symmetric about the origin — extending into the third quadrant for negative voltage and negative current with the same gradient.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Sketch the I–V characteristic for a tungsten filament lamp. Describe how the resistance changes as voltage increases. (2 steps)", "answer": "- Step 1: The graph is an S-shaped curve (bowed curve) that bends toward the voltage axis — it is not linear. As V increases, the current increases at a decreasing rate.\n+ At very low voltages (near the origin), the curve is nearly straight — the filament behaves almost ohmically at room temperature.\n+ As voltage increases further, the curve bends away from linearity.\n- Step 2: The resistance increases as voltage (and current) increases. This happens because:\n1. Current causes I²R heating in the filament\n2. The filament's temperature rises\n3. Lattice ions vibrate more intensely, causing more frequent collisions with electrons\n4. This increases the opposition to current — resistance rises", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "Explain why the resistance of a tungsten filament lamp increases as the current through it increases. Give a two-step physical explanation. (2 steps)", "answer": "- Step 1: As current increases, the filament heats up due to resistive heating (I²R power dissipation). The electrical energy is converted to thermal energy, raising the filament's temperature.\n- Step 2: At higher temperatures, the tungsten atoms in the lattice vibrate with greater amplitude. These vibrating ions collide more frequently with the conduction electrons, impeding their flow more effectively. This increased collision frequency means greater opposition to current — resistance increases.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Sketch the I–V characteristic for a semiconductor diode. Label the forward-bias region, reverse-bias region, and the threshold voltage. (2 steps)", "answer": "- Step 1: In forward bias (positive V), virtually no current flows until the voltage reaches approximately 0.6 V (the threshold). Beyond this, current rises very steeply — the graph becomes almost vertical.\n+ In reverse bias (negative V), the current is effectively zero (a tiny leakage current exists but is negligible). The graph shows a flat line along the V-axis.\n- Step 2: The graph is highly asymmetric — it looks very different on the positive and negative sides of the voltage axis. The threshold voltage is about 0.6 V for a silicon diode.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "What is the resistance of a semiconductor diode when it is reverse-biased? Why is this a common exam trap? (1 step)", "answer": "When reverse-biased, a diode has effectively infinite resistance (or very, very large resistance). The common trap is that students mistakenly think \"not conducting\" means zero resistance. Actually, R = V/I, and since I ≈ 0 in reverse bias, R → ∞. Remember: a reverse-biased diode blocks current, not because it has zero resistance, but because almost no current flows.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "What does \"NTC\" stand for in \"NTC thermistor\"? How does the resistance of an NTC thermistor change with temperature, and why? (3 steps)", "answer": "- Step 1: NTC stands for Negative Temperature Coefficient. This means the resistance decreases as temperature increases.\n- Step 2: The physical mechanism: At higher temperatures, more valence electrons in the semiconductor material gain enough thermal energy to jump into the conduction band, becoming free charge carriers.\n- Step 3: More charge carriers means more electrons available to conduct current, so the resistance decreases. This is opposite to metals, where resistance increases with temperature.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Sketch the I–V characteristic for an NTC thermistor. How does it differ from the filament lamp's graph in terms of curvature direction? (2 steps)", "answer": "- Step 1: The thermistor's I–V curve bows toward the current axis (the opposite direction to the filament lamp). As voltage increases, the current increases at an increasing rate.\n+ This is because as current flows, the thermistor heats up, its resistance decreases, allowing even more current to flow — a positive feedback effect.\n- Step 2: The filament lamp bows toward the voltage axis because resistance increases with temperature. The thermistor bows toward the current axis because resistance decreases with temperature. The curvature directions are opposite.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "How does the resistance of an LDR (Light-Dependent Resistor) change with light intensity? Explain the physical mechanism. (2 steps)", "answer": "- Step 1: As light intensity increases, the resistance of an LDR decreases. More light means lower resistance.\n- Step 2: The physical mechanism: Photons in the incident light give electrons in the semiconductor material enough energy to jump from the valence band to the conduction band. More photons (brighter light) means more electrons become free charge carriers, increasing conductivity and decreasing resistance.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "A student obtains an I–V graph for a filament lamp and reads off two points: at V = 8.0 V, I = 1.62 A, and at I = 0.80 A, V = 2.0 V. Calculate the resistance at each point. What do you notice? (2 steps)", "answer": "- Step 1: At V = 8.0 V: R = V/I = 8.0/1.62 ≈ 4.9 Ω\nAt I = 0.80 A: R = V/I = 2.0/0.80 = 2.5 Ω\n- Step 2: The resistance decreases as voltage and current decrease (6.0 Ω at rated 12 V → 4.9 Ω at 8 V → 2.5 Ω at low current). This confirms the filament's resistance is not constant — it decreases as the filament cools, demonstrating non-ohmic behavior.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Using the graphical method, how would you find the voltage required for a non-ohmic component to have a resistance of 50 Ω? Describe the procedure. (3 steps)", "answer": "- Step 1: On the I–V graph, draw a straight line through the origin with gradient = 1/R = 1/50 = 0.02 A/V. To plot this, pick any convenient voltage (e.g., V = 0.60 V) and calculate the corresponding current: I = V/R = 0.60/50 = 0.012 A = 12 mA. Plot the point (0.60 V, 12 mA) and draw a line through the origin.\n- Step 2: This straight line represents all (V, I) pairs that give R = 50 Ω — it's the locus of constant 50 Ω resistance.\n- Step 3: Find where this line intersects the component's I–V curve. The intersection point gives the operating voltage and current that satisfy both the component's characteristics AND R = 50 Ω. Read the voltage at this point.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "A student says: \"A resistor stores electrons.\" Explain why this is a misconception. (2 steps)", "answer": "- Step 1: This is incorrect. A resistor does not store electrons. Electrons flow through the resistor — the same number that enters per second exits per second (conservation of charge / Kirchhoff's First Law).\n- Step 2: What the resistor actually does is slow down the electrons (reduce their drift velocity) by causing collisions with lattice ions. The electrical energy is dissipated as thermal energy (heat), not stored as charge. The resistor converts electrical energy to heat, not storing electrons.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A student is confused about when to use the gradient vs. V/I to find resistance. Explain the correct approach for (a) an ohmic conductor and (b) a filament lamp. (2 steps)", "answer": "- Step 1: (a) For an ohmic conductor, the I–V graph is a straight line through the origin. Since resistance is constant, you can use either:\n   - R = V/I at any point, OR\n   - R = 1/gradient (the reciprocal of the line's slope)\n- Step 2: (b) For a non-ohmic component like a filament lamp, resistance varies. You must use R = V/I at the specific operating point. Taking the gradient at that point gives dV/dI (differential resistance), which is NOT the same as R = V/I. Never use the gradient for non-ohmic components.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "In a circuit with a diode, describe what is meant by \"forward bias\" and \"reverse bias.\" Which direction allows current to flow? (2 steps)", "answer": "- Step 1: Forward bias: The diode's positive terminal is connected to the higher potential (positive side) and the negative terminal to the lower potential. This allows current to flow after the voltage exceeds the threshold (~0.6 V for silicon).\n- Step 2: Reverse bias: The diode's positive terminal is connected to the lower potential and negative terminal to the higher potential. In this orientation, virtually no current flows — the diode blocks current.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A teacher asks: \"Does a diode obey Ohm's Law?\" What is the correct answer and reasoning? (2 steps)", "answer": "- Step 1: No, a diode does NOT obey Ohm's Law. Ohm's Law requires that current is directly proportional to voltage (I ∝ V), meaning the I–V graph must be a straight line through the origin with constant resistance.\n- Step 2: A diode's I–V graph is highly non-linear. At low forward voltages, current is essentially zero. Once past the threshold (~0.6 V), current increases steeply. The resistance changes dramatically with voltage, so it is non-ohmic.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "An NTC thermistor is connected in a potential divider circuit with a fixed resistor. As temperature increases, does the output voltage across the fixed resistor increase or decrease? Explain. (3 steps)", "answer": "- Step 1: The output voltage across the fixed resistor increases.\n- Step 2: In a potential divider, V_out = R_fixed / (R_fixed + R_thermistor) × V_supply. As temperature increases, the thermistor's resistance decreases.\n- Step 3: With a lower thermistor resistance in the denominator, the fraction R_fixed/(R_fixed + R_thermistor) becomes larger. Therefore, a greater proportion of the supply voltage appears across the fixed resistor — V_out increases.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In an experiment, a student records current in milliamps (mA) but forgets to convert to amperes when calculating resistance. If the actual current is 35 mA and voltage is 4.2 V, what incorrect resistance does the student calculate? What is the correct value? (2 steps)", "answer": "- Step 1: The student would calculate: R = 4.2/35 = 0.12 Ω (treating 35 as 35 A, not 35 × 10⁻³ A)\n- Step 2: Correct calculation: I = 35 mA = 35 × 10⁻³ A = 0.035 A. R = V/I = 4.2/0.035 = 120 Ω. The student's answer is wrong by a factor of 1000.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Why is it important to include a protective resistor in series when investigating the I–V characteristic of a diode experimentally? (2 steps)", "answer": "- Step 1: Once the voltage across a diode exceeds the threshold (~0.6 V), the current rises extremely steeply. Without a series resistor to limit the current, it could become very large very quickly.\n- Step 2: This excessive current would heat up the diode (I²R heating), potentially damaging or destroying it. The protective resistor limits the current to a safe value.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A filament lamp is rated 12 V, 24 W. Calculate its resistance when operating at rated conditions. Then explain why the resistance would be different at lower voltages. (3 steps)", "answer": "- Step 1: At rated conditions: I = P/V = 24/12 = 2.0 A. R = V/I = 12/2.0 = 6.0 Ω.\n- Step 2: At lower voltages (e.g., 8.0 V), the current is lower, so the filament dissipates less power and operates at a lower temperature.\n- Step 3: At lower temperature, the lattice ions vibrate less intensely, causing fewer collisions with electrons. This means less opposition to current — the resistance decreases (e.g., to ~4.9 Ω at 8 V). The filament is non-ohmic.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Two students are discussing Ohm's Law. Student A says \"R = V/I is Ohm's Law.\" Student B says \"Ohm's Law states that I ∝ V.\" Who is correct, and why? (2 steps)", "answer": "- Step 1: Student B is correct. Ohm's Law is a physical law: for a metallic conductor at constant temperature, current is directly proportional to voltage (I ∝ V). This implies constant resistance.\n- Step 2: Student A is describing the definition of resistance, which applies to all components, not just ohmic ones. A diode has R = V/I at any point, but it does NOT obey Ohm's Law because R is not constant.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In the circuit for obtaining an I–V characteristic, the ammeter is connected in series and the voltmeter in parallel. Why is this the correct arrangement? (2 steps)", "answer": "- Step 1: The ammeter must be in series because it needs to measure the current flowing through the component. All current passing through the component must also pass through the ammeter.\n- Step 2: The voltmeter must be in parallel because it measures the potential difference (voltage) across the component. Connecting it in parallel ensures it taps the voltage at the two points across the component without disrupting the current path.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A student measures the voltage and current for a diode at two points in forward bias: at V = 0.64 V, I = 5.0 mA, and at V = 0.74 V, I = 40 mA. Calculate the resistance at each point. What do you notice? (2 steps)", "answer": "- Step 1: At V = 0.64 V: R = V/I = 0.64/(5.0 × 10⁻³) = 128 Ω\nAt V = 0.74 V: R = V/I = 0.74/(40 × 10⁻³) = 18.5 Ω\n- Step 2: The resistance decreases dramatically as voltage increases past the t
