<script>
const DATA={"selected": [{"question": "Why is the gradient of the I–V curve at a *single chosen point* for a tungsten lamp **smaller** than 1/R at the same point? (3 steps)", "answer": "- Step 1: At a given operating point (V, I) on the lamp's S-curve, the chord from the origin has slope $$I/V = 1/R$$.\n- Step 2: The tangent at that same point has slope $$dI/dV$$. For a filament lamp where the curve is bowing toward the V-axis, the tangent is *less steep* than the chord — because the curve is flattening as V rises.\n- Step 3: So $$dI/dV < I/V$$, equivalently $$r_d > R$$ — the differential resistance exceeds the static resistance. Physically: a small extra ΔV adds heat, which raises R further, so the marginal current increase is less than the proportionally-expected amount.\n\nTakeaway: For a lamp, tangent slope < chord slope; equivalently, differential R > static R. This sub-linear response is *the* signature of the lamp's behaviour.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "A diode in forward bias at $$V = 0.64$$ V has $$I = 5.0$$ mA. At $$V = 0.74$$ V, $$I = 40$$ mA. What does this tell you about how the diode's resistance changes? (3 steps)", "answer": "- Step 1: At $$V = 0.64$$ V: $$R = 0.64 / (5 \\times 10^{-3}) \\approx 128\\,\\Omega$$.\n- Step 2: At $$V = 0.74$$ V: $$R = 0.74 / (40 \\times 10^{-3}) \\approx 18.5\\,\\Omega$$.\n- Step 3: A small increase of just $$0.1$$ V in forward voltage caused resistance to drop almost 7×. This is the hallmark of a diode past threshold: extremely steep I–V curve → vanishingly small differential resistance → small voltage changes produce huge current changes. The diode behaves almost like a short circuit once past $$\\sim 0.6$$–$$0.7$$ V.\n\nConceptual takeaway: a diode is not a constant-resistance device even within forward conduction — its resistance plunges with increasing forward V.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "An NTC thermistor is connected in a potential divider with a fixed resistor. The output voltage $$V_{out}$$ is measured across the fixed resistor. As temperature increases, does $$V_{out}$$ increase or decrease? Explain. (3 steps)", "answer": "- Step 1: When temperature increases, the NTC thermistor's resistance **decreases** (NTC = Negative Temperature Coefficient).\n- Step 2: In a potential divider, the voltage is shared in proportion to resistance. As the thermistor's R decreases, it takes a *smaller share* of the total supply voltage.\n- Step 3: Since the supply voltage is fixed, the fixed resistor now takes a *larger share* of the voltage. Therefore, $$V_{out}$$ across the fixed resistor **increases**. This is why thermistors are useful as temperature sensors — a temperature change produces a measurable voltage change.", "source": "GLM 5.1 ③", "_id": "glm_3_32"}, {"question": "An ammeter reads 200 µA and the p.d. across a component is 4.0 V. A student accidentally treats the current as 200 mA instead of 200 µA. By what factor is their calculated resistance wrong, and in which direction? (3 steps)", "answer": "- Step 1: Convert the units correctly: $$200\\;\\mu\\text{A} = 200 \\times 10^{-6}\\;\\text{A} = 2.0 \\times 10^{-4}\\;\\text{A}$$. The student uses $$200\\;\\text{mA} = 200 \\times 10^{-3}\\;\\text{A} = 0.200\\;\\text{A}$$, which is 1000 times larger than the correct value.\n- Step 2: Since $$R = \\frac{V}{I}$$, resistance is inversely proportional to current. Using a current value that is 1000× too large gives a resistance that is 1000× too small. Correct: $$R = \\frac{4.0}{2.0 \\times 10^{-4}} = 20\\,000\\;\\Omega = 20\\;\\text{k}\\Omega$$. Student's wrong answer: $$R = \\frac{4.0}{0.200} = 20\\;\\Omega$$.\n- Step 3: The factor-of-1000 error comes from confusing the prefixes: $$\\mu = 10^{-6}$$ vs. $$\\text{m} = 10^{-3}$$. The ratio is $$\\frac{10^{-3}}{10^{-6}} = 1000$$. Always write out the full power of ten before substituting into any formula.\n\n$$\\mu\\text{A}$$ vs mA: a factor of 1000. Always convert to base SI units first.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "An LDR is sometimes called \"near-ohmic at constant illumination.\" What does this mean, and why is the LDR still classified as a non-ohmic component? (3 steps)", "answer": "- Step 1: At a *fixed* light level, the carrier density in the LDR is roughly constant (set by photon flux). So $$R$$ stays approximately constant, and the I–V curve is nearly a straight line through the origin — locally ohmic.\n- Step 2: But the LDR's *defining* feature is that $$R$$ depends on light intensity — its I–V line tilts (gradient changes) as you vary the illumination. So across different conditions, $$R$$ is variable.\n- Step 3: A component is \"ohmic\" only if $$R$$ is constant under *all* operating conditions of interest. Since the LDR's $$R$$ is environmentally sensitive, it's classified as non-ohmic — even though its instantaneous I–V curve looks linear.\n\nCompare: a resistor in a thermostatted room is ohmic; outside in a heatwave it could be non-ohmic. Context matters for the classification.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "A student asks: \"Do I need to know if a circuit is series or parallel to apply Kirchhoff's First Law?\" Explain why the answer is no. (2 steps)", "answer": "- Step 1: Kirchhoff's First Law (KCL) states that the sum of currents entering a junction equals the sum of currents leaving it: $$\\sum I_{in} = \\sum I_{out}$$. This is a statement of conservation of charge.\n- Step 2: This law applies at *any junction* in *any circuit*, regardless of whether the overall circuit topology is series, parallel, or a combination. The circuit type determines which branches the current splits into, but the law itself — charge in = charge out — is universal and topology-independent.\n\nTakeaway: KCL applies at any junction, any circuit. No need to know series/parallel to use it.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "An NTC thermistor is connected in series with a fixed resistor across a battery. As temperature rises, does the voltage across the *fixed* resistor go up or down? Explain. (3 steps)", "answer": "- Step 1: As T rises, the thermistor's resistance $$R_{th}$$ decreases. The fixed resistor's resistance $$R_f$$ stays the same. Total resistance $$R_f + R_{th}$$ decreases.\n- Step 2: In a series voltage divider, $$V_{R_f} = \\frac{R_f}{R_f + R_{th}} \\cdot V_{\\text{supply}}$$. The denominator gets smaller (because $$R_{th}$$ drops), while $$R_f$$ in the numerator stays the same.\n- Step 3: So $$V_{R_f}$$ *increases* as temperature rises. The fixed resistor takes a larger share of the supply voltage because the thermistor is \"giving up\" its share. This is the principle behind temperature-sensor circuits where $$V_{\\text{out}}$$ rises with temperature.\n\nTakeaway: Voltage shares like resistance fractions — when one drops, the other rises.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "When experimentally obtaining an I–V characteristic, why is a potentiometer (potential divider) preferred over a simple rheostat in series? (3 steps)", "answer": "- Step 1: A simple rheostat (variable resistor in series with the supply) limits the current by adding resistance. Even at maximum rheostat resistance, the supply EMF still drives *some* current through the component — you cannot reach $$V = 0$$ across the component.\n- Step 2: This matters because the most physically interesting region of an I–V graph is often *near the origin* (proving proportionality, identifying threshold voltages for diodes, etc.). Missing data near $$V = 0$$ leaves the linearity test unverified.\n- Step 3: A potentiometer (rheostat wired as a potential divider) lets you tap any fraction of the supply, from $$0$$ V continuously up to maximum. Textbook table confirms: rheostat gives $$V_{\\min} = 0.50$$ V; potentiometer gives $$V_{\\min} = 0.00$$ V.\n\nBottom line: potentiometer = full range $$[0, V_\\max]$$; rheostat = restricted range $$[V_\\min, V_\\max]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "Sketch the relationship \"resistance vs. potential difference\" (R as a function of V) for a tungsten filament lamp. How does it differ from a fixed resistor's R-vs-V plot? (3 steps)", "answer": "- Step 1: For a fixed (ohmic) resistor: R is constant, so the R-vs-V graph is a horizontal straight line at $$R = R_0$$.\n- Step 2: For a tungsten filament: R increases with V (because higher V → higher I → more heating → higher R). The R-vs-V curve rises monotonically, starting at R₀ (room-T value) at V = 0 and growing — often by a factor of 5–10× from cold to full brightness.\n- Step 3: The curve is symmetric about V = 0 (R doesn't depend on direction), so for V < 0 the curve mirrors the positive side. Net shape: a U or \"bathtub\" with minimum R at V = 0.\n\nTakeaway: R-vs-V flat for ohmic, rising U-shape for filament. Don't confuse with the I-vs-V graph itself.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "Compare the curvature direction of the I–V graphs for a filament lamp vs. an NTC thermistor. Why are they curved *opposite* ways? (3 steps)", "answer": "- Step 1: Filament lamp: bows *toward the V-axis* (flattens out as V grows). The reason: $$R$$ *increases* with $$V$$ (because increased current heats metal filament, raising R). So $$I$$ grows slower than proportional to $$V$$.\n- Step 2: Thermistor: bows *toward the I-axis* (steepens as V grows). The reason: $$R$$ *decreases* with $$V$$ (because increased current heats semiconductor, freeing more carriers, dropping R). So $$I$$ grows faster than proportional to $$V$$.\n- Step 3: Both involve thermal feedback from $$I^2 R$$ heating, but the *sign* of dR/dT differs: positive for metals (filament), negative for semiconductors (NTC thermistor). Opposite curvatures reflect opposite signs of dR/dT.\n\nMnemonic: filament curves *down*, thermistor curves *up* — opposite materials, opposite responses.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "Why is it physically wrong to think of the gradient of the I–V graph at the origin (V = 0, I = 0) as defining R for a non-ohmic component? (3 steps)", "answer": "- Step 1: At the origin, both V = 0 and I = 0, so R = V/I = 0/0 is mathematically undefined. R is not directly meaningful at this single point — you need a finite operating point.\n- Step 2: The *tangent slope at the origin* (limit of dI/dV as V → 0) tells you about the small-signal behaviour around V = 0 — for an ohmic component this equals 1/R, but for a non-ohmic component it's just the differential resistance in the limit, not the resistance at some other operating V.\n- Step 3: For non-ohmic components, R changes with V. Knowing the slope at the origin doesn't tell you R at, say, V = 5 V. Each operating point has its own R = V/I that must be read off separately.\n\nTakeaway: For non-ohmic, \"R\" isn't a single number — it's a function of operating point. The origin gives no information beyond local small-signal behaviour.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "A student writes: \"Ohm's Law states that R = V/I.\" Explain why this is incorrect, distinguishing between a definition and a physical law. (3 steps)", "answer": "- Step 1: $$R = V/I$$ is the *definition* of resistance. It applies to ALL components — ohmic or non-ohmic. You can always compute $$R = V/I$$ for any component at any operating point.\n- Step 2: Ohm's Law is a *physical law* — it makes the additional claim that R is constant (for metals at constant temperature). The equation $$R = V/I$$ alone says nothing about whether R stays constant or varies.\n- Step 3: A filament lamp has $$R = V/I$$ at every point on its curve, but R changes with V and I — so it does NOT obey Ohm's Law. The definition and the law are fundamentally different statements.\n\nTakeaway: $$R = V/I$$ is a definition (always true). Ohm's Law is the claim that R is constant (only true for metals at constant T).", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "\"A diode in reverse bias acts as an open switch; in forward bias past threshold, as a closed switch.\" Critique this statement — when is it useful and where does it break down? (3 steps)", "answer": "- Step 1: Useful for first approximation: reverse bias → $$R \\to \\infty$$ → no current (open switch). Forward bias past $$\\sim 0.6$$ V → R very low → high current (closed switch). Good for digital/logic analysis.\n- Step 2: Breaks down quantitatively: even past threshold, the diode has a $$\\sim 0.6$$–$$0.7$$ V drop across it — it's *not* a perfect short. And it's strongly non-linear: small voltage changes give large current changes (so it doesn't pass exactly the same current a wire would).\n- Step 3: Also breaks down at very high reverse voltages (breakdown region) and at high currents (heating). And below threshold in forward bias, it's still not a perfect open — small leakage current flows.\n\nSo: open/closed analogy is fine for binary thinking, but real diodes have a forward voltage drop and non-zero leakage.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "A circuit has a thermistor in series with a fixed resistor, supplied by a battery. As temperature increases, does the voltage across the *fixed resistor* increase or decrease? Reason from first principles. (3 steps)", "answer": "- Step 1: The thermistor's resistance $$R_T$$ decreases as $$T$$ rises (NTC behaviour). The fixed resistor $$R_F$$ is unchanged.\n- Step 2: They're in series, so the supply voltage divides between them in the ratio of their resistances: $$V_F = V_\\text{supply} \\cdot R_F / (R_F + R_T)$$.\n- Step 3: As $$R_T$$ drops, the denominator shrinks, so the fraction $$R_F/(R_F + R_T)$$ *grows*, so $$V_F$$ *increases*. The fixed resistor \"claims\" a bigger share of the supply voltage as the thermistor gives up its share.\n\nThis is the basis of a thermistor potential-divider temperature sensor — $$V_F$$ is a temperature-dependent output that can trigger other circuits.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "Both a filament lamp and an NTC thermistor are non-ohmic, but their I–V curves bow in opposite directions. Explain why, referring to the microscopic mechanisms. (3 steps)", "answer": "- Step 1: In a filament lamp (metal), increasing current heats the tungsten → lattice ions vibrate more → more frequent electron-ion collisions → resistance *increases* → current rises at a decreasing rate → curve bows toward V-axis.\n- Step 2: In an NTC thermistor (semiconductor), increasing current heats the material → more valence electrons gain enough energy to become conduction electrons → more charge carriers → resistance *decreases* → current rises at an increasing rate → curve bows toward I-axis.\n- Step 3: The key difference is the mechanism: metals have plenty of free electrons already, so heating mainly increases collisions (R↑). Semiconductors have few free electrons, so heating mainly creates more carriers (R↓), which dominates over the collision effect.\n\nTakeaway: Metal (lamp): T↑ → more collisions → R↑. Semiconductor (thermistor): T↑ → more carriers → R↓. Opposite!", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "Why does an NTC thermistor's resistance *decrease* with temperature, whereas a metal's *increases*, even though both involve hotter atoms vibrating more? (3 steps)", "answer": "- Step 1: In both materials, raising $$T$$ does increase lattice vibration → more electron-ion collisions → tends to *raise* $$R$$.\n- Step 2: But in a *semiconductor* (thermistor material), there's a second, much stronger effect: at higher $$T$$, many more valence electrons gain enough thermal energy to become *conduction* electrons. The number density of charge carriers $$n$$ jumps dramatically.\n- Step 3: Resistance depends on $$n$$ (more carriers → lower R) and on collision rate (more collisions → higher R). In semiconductors the carrier-density effect dominates → net $$R$$ drops with $$T$$. In metals, $$n$$ is essentially fixed (all valence electrons are already free), so only the collision effect matters → net $$R$$ rises with $$T$$.\n\nThe two materials respond to heating *via different mechanisms*.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "Which of the five components studied (fixed resistor, filament lamp, diode, NTC thermistor, LDR) has an I–V graph that is NOT symmetric about the origin? Explain why. (2 steps)", "answer": "- Step 1: The **semiconductor diode** is the only component with an asymmetric I–V graph. In forward bias, it conducts (after ~0.6 V threshold); in reverse bias, it blocks (I ≈ 0). The graph looks completely different in the two directions.\n- Step 2: The diode's asymmetry arises because it is a **p-n junction** — it is physically constructed to allow current flow in only one direction. The other four components (fixed resistor, filament lamp, thermistor, LDR) are symmetric because they have no directional preference — their resistance depends on temperature or light, not on the direction of current flow.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "[Synthesis] A student has two unlabelled components X and Y. Component X has an I–V graph that is a straight line through the origin. Component Y has a graph that is flat at zero current for negative V, then rises steeply after ~0.6 V. Identify each component and explain your reasoning. (2 steps)", "answer": "- Step 1: **Component X** is a **fixed resistor** (ohmic conductor). The straight line through the origin shows that $$I \\propto V$$ — current is directly proportional to p.d., meaning constant resistance. This is the defining characteristic of an ohmic conductor.\n- Step 2: **Component Y** is a **semiconductor diode**. The flat region at zero current for negative V shows it blocks in reverse bias (infinite resistance). The threshold at ~0.6 V before current flows is the signature turn-on voltage of a silicon diode. The steep rise after threshold shows resistance drops dramatically once the diode conducts. No other component has this asymmetric, threshold-dependent behaviour.", "source": "GLM 5.1 ③", "_id": "glm_3_51"}, {"question": "A filament lamp is rated 12 V, 24 W. What's its resistance at full operation, and what's the conceptual significance of computing it this way? (3 steps)", "answer": "- Step 1: At rated operation, $$P = IV$$, so $$I = P/V = 24/12 = 2.0$$ A.\n- Step 2: $$R = V/I = 12/2.0 = 6.0\\,\\Omega$$ at full brightness (hot filament).\n- Step 3: Significance: this is the *hot* resistance. If you measured the same lamp cold (with a multimeter, before switching on), you'd get something much smaller — $$1$$–$$2\\,\\Omega$$. The rated R is only valid *at* the rated operating point. The lamp's R is a function of temperature, not a fixed property.\n\nThis is exactly why incandescent bulbs sometimes blow at switch-on: cold $$R$$ is low, so initial surge current $$I = V/R_\\text{cold}$$ is much larger than steady-state $$I$$.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "Near the origin of the filament lamp's I–V graph, the curve is nearly a straight line. Why? (2 steps)", "answer": "- Step 1: Near the origin, the applied p.d. is very small, so the current is very small, and the power dissipated ($$I^2R$$) is negligible. The filament stays close to room temperature.\n- Step 2: At (approximately) constant room temperature, the tungsten filament *approximately* obeys Ohm's Law — its resistance is roughly constant, so the I–V relationship is approximately linear near the origin. As V increases further, heating becomes significant and the curve departs from linearity.\n\nThis is why we say the filament \"approximately obeys Ohm's Law for small voltages\" — the constant-temperature condition of Ohm's Law is approximately satisfied only at low currents.", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "When measuring I–V characteristics, two procedural precautions are: (a) always start with the p.d. at minimum before switching on, and (b) wait at least 5 minutes before reversing the supply to take negative-V measurements. Explain the physical reason for each. (2 steps)", "answer": "- Step 1: **Starting at minimum p.d.:** If the p.d. is set high before switching on, a large current surges through the component immediately. This can damage sensitive components (especially diodes) or cause a filament lamp to blow. Starting low and gradually increasing ensures the current never exceeds safe limits.\n- Step 2: **Waiting 5 minutes between forward and reverse runs:** During the first set of measurements, the component (filament lamp, thermistor) heats up due to resistive heating. If you immediately reverse the supply, the component is still hot, so the reversed measurements are taken at a different (elevated) temperature. This introduces a systematic error — the I–V curve for the negative-V half would not be comparable to the positive-V half. Waiting allows the component to cool back to room temperature.\n\nBoth precautions ensure fair, safe, and comparable measurements in both directions.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "A circuit has an ohmic resistor in parallel with a filament lamp, with a variable supply. As the supply voltage is slowly increased from zero, why does the lamp's \"share\" of the total current shift over time? (3 steps)", "answer": "- Step 1: At very low $$V$$: both the resistor and the lamp are at room temperature, both have their cold resistances. They split current according to $$1/R$$ (more current through the lower-R branch).\n- Step 2: As $$V$$ increases, $$I^2 R$$ heating starts to warm the lamp filament. Its resistance rises. The resistor's resistance, being temperature-independent in this range, stays constant.\n- Step 3: Since the lamp's $$R$$ grows but the resistor's stays the same, current preferentially shifts to the *resistor* branch. The lamp's share of total current shrinks as the filament heats up.\n\nSo in a parallel mix of ohmic + non-ohmic, the non-ohmic component's relative share changes with operating conditions — a subtle effect easy to miss.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "Why does the I–V graph for an LDR shift to a steeper slope under brighter light? (3 steps)", "answer": "- Step 1: Brighter light = more photons per second hitting the semiconductor material in the LDR.\n- Step 2: Each absorbed photon (of sufficient energy) excites an electron from the valence band to the conduction band, creating a new charge carrier. So more light → more carriers → lower resistance.\n- Step 3: Lower R means higher current for the same V, hence a steeper I–V line (since gradient = 1/R). Plotting at increasing brightness gives a family of straight lines through the origin, fanning out with steeper slopes.\n\nTakeaway: Photons = free carriers = lower R = steeper I–V line. The slope encodes the brightness.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "The I–V graph for an NTC thermistor curves *toward the current axis* (away from the voltage axis). Explain why, using the concept of positive feedback. (3 steps)", "answer": "- Step 1: As V increases, I increases, and the thermistor heats up from $$I^2R$$ dissipation.\n- Step 2: Because it's NTC, higher temperature means lower resistance. Lower R means even *more* current can flow for the same applied voltage.\n- Step 3: This is a **positive feedback** effect: more V → more I → more heating → lower R → even more I → even more heating → etc. The current rises at an *accelerating* rate compared to an ohmic conductor, so the curve bends *toward* the I-axis (steeper than a straight line).\n\nContrast with the filament lamp: there, higher T → higher R → current rises *slower* (curve bows toward V-axis). The thermistor does the opposite — its curve bows toward the I-axis.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "A student claims that a resistor \"stores\" electrons — the longer it is in a circuit, the more electrons accumulate inside it. Explain why this is incorrect, using a conservation law. (3 steps)", "answer": "- Step 1: The claim violates **conservation of charge**, which is expressed in circuits by Kirchhoff's First Law: at any junction, the total current entering equals the total current leaving ($$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$).\n- Step 2: Apply this to the resistor itself: the current entering one terminal of the resistor must equal the current leaving the other terminal. If electrons accumulated inside, the current leaving would be less than the current entering — but this does not happen. The same number of electrons per second flows out as flows in.\n- Step 3: What the resistor actually does is **slow down** the electrons (reduce their drift velocity) through collisions with lattice ions. The rate of flow (current) is reduced compared to what it would be without the resistor, but the flow rate is the same at both ends. The energy lost by electrons in collisions appears as heat — not as stored charge.\n\nA resistor reduces the rate of electron flow (current), but it does not accumulate electrons. What goes in per second must come out per second.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "Why is the diode I–V graph practically zero current for ALL reverse voltages from 0 to (say) −10 V, instead of slowly increasing in magnitude like for ohmic components? (2 steps)", "answer": "- Step 1: In reverse bias, the depletion region of the p-n junction *widens*, increasing the barrier height. There are essentially no charge carriers available to cross the barrier — the few minority carriers give a tiny leakage current (often in nA), far below typical ammeter resolution.\n- Step 2: This leakage current is approximately *independent* of reverse V (it's \"saturated\" by the limited supply of minority carriers, not by V). So increasing |V| in reverse doesn't significantly increase |I| — the line stays near zero. Hence \"flat at I = 0\" rather than \"linear with V\" for reverse bias.\n\nTakeaway: Reverse-bias current is supply-limited (no carriers), not field-limited — so it doesn't grow with V the way an ohmic current would.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Explain why \"showing the lamp obeys Ohm's law at small V\" is consistent with the I–V curve being slightly bent overall. (3 steps)", "answer": "- Step 1: Near V = 0, the filament is at room temperature and barely heats up — so R is approximately constant in this regime.\n- Step 2: With R approximately constant, $$I \\propto V$$ holds locally, and the I–V curve is approximately straight near the origin — i.e. the lamp is \"approximately ohmic\" at small V.\n- Step 3: Away from the origin, $$I^2 R$$ heating becomes significant, R rises, and the curve deviates from the linear extrapolation — the S-shape becomes apparent. So Ohm's law holds in the limit V → 0 (or more accurately, in the low-power limit), and the full I–V curve is the result of departing from this limit at higher V.\n\nTakeaway: Ohm's law is a local approximation near V = 0; the curvature is the non-ohmic correction that grows with V.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "A filament lamp rated at $$12\\text{ V}$$, $$24\\text{ W}$$ has resistance $$6.0\\text{ Ω}$$ at its rated voltage. When operated at a lower voltage, its resistance drops to $$2.5\\text{ Ω}$$. Explain why R decreases, and state whether the lamp is ohmic. (2 steps)", "answer": "- Step 1: At the lower voltage, the current is smaller, so less power is dissipated ($$I^2R$$), and the filament is cooler. At lower temperature, the lattice ions vibrate less, so there are fewer collisions with electrons and resistance is lower. R decreases as the lamp cools/dims.\n- Step 2: The lamp is **non-ohmic** because its resistance is not constant — it changes from $$6.0\\text{ Ω}$$ at full brightness to $$2.5\\text{ Ω}$$ when dimmer. An ohmic conductor would have the same R at all operating points.\n\nThe key observation: for a filament lamp, R increases with temperature. At low V (dim), R is small; at high V (bright), R is large.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "Synthesis question: in one paragraph, explain why a filament lamp, a thermistor, and a diode are all \"non-ohmic,\" but for fundamentally different physical reasons. (3 steps)", "answer": "- Step 1: **Filament lamp** — non-ohmic because of *thermal feedback in a metal*: increasing $$V$$ raises current, which heats the tungsten via $$I^2 R$$. Hot lattice ions vibrate more, increasing collision frequency with conduction electrons, raising $$R$$. Carrier density is essentially fixed (metallic).\n- Step 2: **Thermistor** — non-ohmic because of *thermal feedback in a semiconductor*: increasing $$V$$ raises current and heats the bulk. But in a semiconductor, higher $$T$$ liberates many more conduction electrons (carrier density rises), and the carrier effect dominates over the collision effect, so $$R$$ *falls* with $$T$$. Opposite sign of dR/dT from a metal.\n- Step 3: **Diode** — non-ohmic because of an *internal junction*: the p-n junction has a built-in depletion region acting as a voltage-dependent barrier. Below threshold, almost no current flows (R very large); above threshold, carriers flood across (R very small); in reverse bias, the barrier widens (R → ∞). Not a thermal effect at all — a junction effect.\n\nSo three different mechanisms (metallic thermal feedback / semiconductor thermal feedback / junction barrier) all produce \"non-ohmic\" behaviour. Same classification, different physics.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "Kirchhoff's First Law: state it precisely, and explain why Phuc's worry \"do I need to know whether the circuit is series or parallel to apply it?\" was misplaced. (3 steps)", "answer": "- Step 1: KCL states: at any junction in a circuit, $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$. It's a statement of *charge conservation* — charge cannot pile up or vanish at a point.\n- Step 2: It applies *at a junction*, independent of topology. Whether the circuit is series, parallel, or some weird mesh, KCL still holds at every node. Topology only determines which branches the current splits *into*, not whether the law applies.\n- Step 3: So Phuc's concern was misplaced: you don't need to identify \"series vs parallel\" before invoking KCL. You identify a junction, count currents in and out, set them equal. Period.\n\nKCL is a *local* law (about a single junction); series/parallel is a *global* property (about how components are arranged).", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "For a diode at $$V = -5\\ \\text{V}$$ (reverse bias), an ammeter reads $$I = 0\\ \\text{mA}$$. A student computes $$R = 5/0 = \\text{undefined}$$ and writes \"R = 0\". Explain the correct conceptual interpretation. (2 steps)", "answer": "- Step 1: Mathematically $$5/0$$ is undefined, but physically we interpret \"I = 0\" as \"I is so small the ammeter cannot detect it\" — in reality there is a tiny leakage current, far below the meter's resolution. As current approaches zero, $$R = V/I$$ approaches infinity.\n- Step 2: So the correct statement is $$R \\to \\infty$$ (effectively infinite, or \"very large\") — *not* zero. A reverse-biased diode acts as an open circuit, blocking current; an open circuit has infinite resistance, not zero.\n\nTakeaway: \"No conduction\" means high R, not zero R. The intuition: if R were zero, current would be huge for any V — the opposite of blocking.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "A diode is connected in series with a 220 Ω resistor and a 5 V battery. Without doing exact calculation, estimate the current through the diode and the voltage across the resistor, given the diode threshold is ~0.7 V. (3 steps)", "answer": "- Step 1: Once past threshold, the diode is approximately a 0.7 V drop regardless of current (its R is very small). So the diode \"consumes\" ~0.7 V from the supply.\n- Step 2: Remaining voltage across the resistor: $$V_R \\approx 5 - 0.7 = 4.3\\ \\text{V}$$.\n- Step 3: Current through the circuit: $$I \\approx V_R/R = 4.3/220 \\approx 20\\ \\text{mA}$$. This is the diode current too (series circuit). The resistor is what actually controls the current; the diode just sits at ~0.7 V.\n\nTakeaway: In a \"diode + resistor\" series circuit, treat the diode as a fixed 0.7 V drop; the resistor governs the current.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "You need to find what p.d. must be applied to a non-ohmic component so that its resistance equals 50 Ω. You can't simply calculate $$V = IR$$ because I is unknown. Describe the graphical method to solve this. (3 steps)", "answer": "- Step 1: On the I–V graph, draw a straight line through the origin with gradient $$= 1/R = 1/50 = 0.02\\text{ A/V}$$. This line represents *all* $$(V, I)$$ pairs that give a resistance of 50 Ω (since every point on it satisfies $$R = V/I = 50\\text{ Ω}$$).\n- Step 2: To plot this line, pick any convenient V and calculate the corresponding I. For example, at $$V = 1.0\\text{ V}$$: $$I = V/R = 1.0/50 = 0.02\\text{ A} = 20\\text{ mA}$$. Mark the point $$(1.0, 20\\text{ mA})$$ and draw a straight line through the origin and this point.\n- Step 3: Find where this straight line *intersects* the component's I–V curve. The intersection point gives the unique $$(V, I)$$ pair that simultaneously satisfies both: (a) the component's actual behaviour, and (b) $$R = 50\\text{ Ω}$$. Read off the V-value at the intersection — that is the required p.d.\n\nThe logic: the straight line is the set of \"all points where R = 50 Ω.\" The curve is the set of \"all points the component can actually produce.\" Their intersection is the only point satisfying both conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "Why is the threshold voltage for a silicon diode approximately 0.6–0.7 V, and what does this represent physically?", "answer": "The threshold voltage represents the minimum applied forward bias needed to overcome the built-in potential barrier of the silicon p-n junction. This barrier arises because, when p-type and n-type silicon are joined, electrons diffuse across and create a depletion region with an internal electric field. The width and height of this barrier in silicon corresponds to ~0.6–0.7 V — meaning the external V must reach this value before significant current can flow. Below threshold, applied V partially cancels the barrier but not enough; above threshold, the barrier is essentially nullified and current rises exponentially. Different semiconductors give different thresholds (e.g. germanium ~0.3 V) because their internal barrier heights differ. For exam purposes, use 0.6 V for silicon unless stated otherwise.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "You measure the I–V characteristic of a component and find that the data points do not pass exactly through the origin — there is a small offset on the V-axis. What might cause this, and does it mean the component is non-ohmic? (2 steps)", "answer": "- Step 1: A small offset from the origin likely indicates a **systematic error** in the experiment — for example, a zero error in the voltmeter or ammeter, or a small internal resistance in the wiring. It does not necessarily mean the component itself is non-ohmic.\n- Step 2: To show proportionality (and hence Ohm's Law), the graph must be a straight line *through the origin*. If the line is straight but has an intercept, the relationship is linear ($$y = mx + c$$) but not proportional ($$y = mx$$). This could be a real effect (e.g., a threshold voltage like a diode) or an experimental artefact. The experimenter should check for zero errors and calibrate instruments.", "source": "GLM 5.1 ③", "_id": "glm_3_48"}, {"question": "For a non-ohmic component, a student finds the gradient of the I–V curve at a particular point and calculates $$R = 1/\\text{gradient}$$. Explain why this gives the wrong answer, and state the correct method for finding resistance at a point on a non-ohmic I–V graph. (3 steps)", "answer": "- Step 1: The gradient of an I–V curve at a point is $$\\frac{dI}{dV}$$ — the rate of change of current with respect to voltage. Its reciprocal is $$\\frac{dV}{dI}$$, called the **differential resistance** (or dynamic resistance). This is a different quantity from $$R = \\frac{V}{I}$$.\n- Step 2: For a non-ohmic component, $$R = \\frac{V}{I}$$ at a point is the ratio of the actual voltage to the actual current at that operating point — this corresponds to the chord from the origin to the point, not the tangent. The gradient (tangent slope) and the chord slope (from origin) give different values whenever the graph is curved.\n- Step 3: The correct method: read off the values of $$V$$ and $$I$$ at the specific point on the graph, then calculate $$R = \\frac{V}{I}$$. Geometrically, this is equivalent to drawing a straight line from the origin to that point and taking the reciprocal of that chord's gradient. Only for a straight-line-through-origin (ohmic) graph does the chord gradient equal the tangent gradient — which is why $$R = 1/\\text{gradient}$$ works only for ohmic components.\n\nFor non-ohmic: $$R = V/I$$ at the point (chord from origin), NOT $$R = 1/\\text{gradient}$$ (tangent).", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "A filament lamp is rated 12 V, 24 W. At its rated voltage, what is its resistance? If the voltage is reduced so that the current falls to roughly half the rated value, would the resistance be higher, lower, or the same? Explain. (3 steps)", "answer": "- Step 1: At rated conditions: $$I = \\frac{P}{V} = \\frac{24}{12} = 2.0\\;\\text{A}$$, so $$R = \\frac{V}{I} = \\frac{12}{2.0} = 6.0\\;\\Omega$$.\n- Step 2: At roughly half the rated current ($$I \\approx 1.0\\;\\text{A}$$), the power dissipated ($$P = I^2 R$$) is less, so the filament is cooler than at full rating.\n- Step 3: A cooler filament has less lattice vibration → fewer collisions with conduction electrons → **lower** resistance. Therefore, at the lower current, $$R < 6.0\\;\\Omega$$. (From the worked example in the notes: at $$I = 0.80\\;\\text{A}$$, $$R \\approx 2.5\\;\\Omega$$ — significantly lower than the 6.0 Ω at full rating.)\n\nFilament lamp: lower current → cooler filament → lower resistance. R increases with temperature for metals.", "source": "GLM 5.1 ②", "_id": "glm_2_30"}, {"question": "An NTC thermistor and a fixed resistor form a potential divider, with the output voltage $$V_{\\text{out}}$$ taken across the fixed resistor. As the temperature rises, does $$V_{\\text{out}}$$ increase or decrease? Explain. (3 steps)", "answer": "- Step 1: In a potential divider, the supply voltage is shared between the two series resistors in proportion to their resistances: $$V_{\\text{out}} = \\frac{R_{\\text{fixed}}}{R_{\\text{thermistor}} + R_{\\text{fixed}}} \\times V_{\\text{supply}}$$. The larger resistor gets the larger share of the voltage.\n- Step 2: As temperature rises, the NTC thermistor's resistance **decreases** (negative temperature coefficient). The fixed resistor's resistance stays the same.\n- Step 3: With the thermistor's resistance reduced, the thermistor now claims a **smaller** fraction of the supply voltage, and the fixed resistor claims a **larger** fraction. Therefore, $$V_{\\text{out}}$$ across the fixed resistor **increases**. This is why NTC thermistors are used as temperature sensors — a rising temperature produces a rising output voltage.\n\nNTC thermistor in divider: temperature ↑ → $$R_{\\text{thermistor}}$$ ↓ → $$V_{\\text{out}}$$ across fixed resistor ↑.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "A student is told to find the resistance of a non-ohmic component at a specific operating point. They take the gradient of the tangent to the curve at that point and invert it. Explain why this gives the *differential resistance* and not the actual resistance. (2 steps)", "answer": "- Step 1: The gradient of the tangent at a point on the I–V curve is $$dI/dV$$, which tells you how the current changes for an infinitesimal change in voltage around that point. The reciprocal, $$dV/dI$$, is the **differential (dynamic) resistance** — how much extra voltage is needed for a tiny increase in current.\n- Step 2: The actual resistance at that point is $$R = V/I$$ — the ratio of the total voltage to the total current, which is the gradient of the line from the *origin* to that point (not the tangent). For a non-ohmic component, these are different values. The differential resistance is useful in some contexts (e.g., AC small-signal analysis) but is NOT what the exam means by \"resistance.\"\n\nVisual: draw a line from the origin to the point. Its slope is $$I/V = 1/R$$. Draw a tangent at the point. Its slope is $$dI/dV$$. These are different lines with different slopes unless the component is ohmic.", "source": "GLM 5.1 ③", "_id": "glm_3_46"}, {"question": "A tungsten lamp rated 12 V, 24 W operates at full brightness. Conceptually, why does its resistance at 12 V differ from its resistance at, say, 2 V? Compare the trend without doing exact calculation. (3 steps)", "answer": "- Step 1: At 12 V the lamp dissipates 24 W via $$I^2 R$$ heating — the filament reaches ~2500 K (white-hot). At 2 V the lamp dissipates far less power, so the filament is much cooler — maybe a few hundred K above room temperature.\n- Step 2: Resistance in tungsten depends on temperature. Cool filament → less lattice vibration → fewer collisions → lower R. Hot filament → more vibration → more collisions → higher R.\n- Step 3: So R at full brightness (12 V) is *higher* than R at dim operation (2 V). Worked numbers from the chapter illustrate this: ~6 Ω at 12 V, ~4.9 Ω at 8 V, ~2.5 Ω at 2 V — R drops as the lamp dims.\n\nTakeaway: Filament R isn't a single number — it's a temperature-dependent quantity that's small when cold and large when bright.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Why must the *temperature of a metal wire be controlled* in Ohm's law experiments, but this control is *less critical for a fixed carbon resistor*? (3 steps)", "answer": "- Step 1: The resistivity of a metal increases with temperature relatively strongly — a temperature change of tens of K can change R by a measurable percentage. If you let the wire heat up during measurement, you'll see R drifting.\n- Step 2: Carbon (and most commercial fixed resistors with similar materials) has a *much smaller* temperature coefficient — its R changes far less per degree. So small heating during measurement gives only a tiny change in R, often within measurement uncertainty.\n- Step 3: Practical implication: when verifying Ohm's law for a \"metallic conductor,\" use low currents and short measurement times to avoid heating effects (or accept that you're not in the strict constant-T regime). For a carbon resistor in a lab, this isn't a major concern.\n\nTakeaway: \"Constant T\" matters more for metals than for engineered resistors — the latter are designed to minimize T-dependence.", "source": "Opus 4.7 ①", "_id": "opus_1_56"}, {"question": "A student says \"a resistor stores electrons that don't make it through.\" Why is this wrong, and what actually happens? (3 steps)", "answer": "- Step 1: Charge is conserved at every junction and along every wire (Kirchhoff's current law). The number of electrons entering the resistor per second equals the number leaving per second — the resistor cannot accumulate charge in steady state.\n- Step 2: What the resistor does is reduce the *drift velocity* of electrons. The same total flux of electrons passes through, but slower than it would without resistance — so the *current* (rate of charge flow) is smaller for a given voltage.\n- Step 3: The energy \"lost\" doesn't go into stored electrons — it goes into heat via collisions with lattice ions. So a resistor is a *slowing-down + heating* device, not a *storage* device.\n\nThis was Phuc's exact misconception in the lesson — Marta corrected it explicitly.", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "Both the NTC thermistor and the LDR have resistance that decreases under certain conditions. Compare the mechanisms: what provides the energy to free conduction electrons in each? (2 steps)", "answer": "- Step 1: In the NTC thermistor, *thermal energy* (heat) gives valence electrons enough energy to become conduction electrons. The trigger is temperature increase.\n- Step 2: In the LDR, *photon energy* (light) gives electrons enough energy to become conduction electrons. The trigger is light intensity increase. Both result in more charge carriers → lower resistance, but the energy source is different (thermal vs. photonic).\n\nTakeaway: Thermistor = thermal energy frees electrons. LDR = photon energy frees electrons. Both → more carriers → R↓.", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "Why are LDRs and thermistors useful as *sensors* in potential divider circuits? (3 steps)", "answer": "- Step 1: Their resistance changes substantially with an external physical condition (light for LDR, temperature for thermistor). This makes the resistance a \"transducer\" — converting a physical quantity into an electrical quantity.\n- Step 2: In a potential divider, the output voltage $$V_{\\text{out}} = \\frac{R_2}{R_1 + R_2} V_{\\text{in}}$$ depends on the resistance ratio. If R₂ is the sensor, $$V_{\\text{out}}$$ shifts as the sensed condition changes — turning a resistance change into a voltage change that downstream circuits can read.\n- Step 3: This Vout can trigger switches (street lights at night when LDR resistance rises, fans when thermistor signals high T, etc.). The sensor + divider combination is the standard analog interface between the physical world and electronic control.\n\nTakeaway: LDR/thermistor + potential divider = physical-quantity-to-voltage converter, the building block of analog sensing.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "A common confusion: \"If a diode blocks current in reverse bias, then it has infinite resistance — but if it has infinite resistance, how can ANY current flow even in forward bias?\" Resolve this. (3 steps)", "answer": "- Step 1: The resistance of a diode is NOT a fixed value. R = V/I varies dramatically with both magnitude and direction of V. In reverse bias R is effectively infinite (no carriers); in forward bias past threshold, R can be just a few ohms (carriers flow freely).\n- Step 2: So saying \"the diode has infinite R in reverse bias\" is a *local* statement — it applies only when V is negative. The same diode, when V is sufficiently positive, behaves completely differently.\n- Step 3: This direction-dependent behaviour is exactly what makes a diode a *valve* — high R one way, low R the other. The asymmetry is the entire point of the component.\n\nTakeaway: Diode R is not a number; it's a function of V (and V's sign). \"Infinite reverse R\" and \"small forward R\" coexist as different operating points.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "Why is the I–V graph for a filament lamp symmetric about the origin, even though it is non-ohmic? (2 steps)", "answer": "- Step 1: When the supply is reversed (negative V), the current flows in the opposite direction (negative I). The filament still heats up in the same way — the temperature increase depends on $$I^2R$$, and squaring the current removes the sign. So the magnitude of the heating effect is the same regardless of current direction.\n- Step 2: The resistance depends on temperature, not on the direction of current flow. Whether electrons move left-to-right or right-to-left through the filament, they collide with the same lattice ions, and the heating effect is the same. So the graph looks the same in the third quadrant as in the first quadrant — it is symmetric about the origin.", "source": "GLM 5.1 ③", "_id": "glm_3_43"}, {"question": "Why is a diode's I–V graph *not* symmetric about the origin, while a thermistor's *is*? (3 steps)", "answer": "- Step 1: A diode is made from a p-n junction — an asymmetric structure with p-type material on one side and n-type on the other. Forward bias lowers the depletion region's barrier (allows current); reverse bias widens it (blocks current). The two directions are physically distinct.\n- Step 2: A thermistor is made from a homogeneous semiconductor (or symmetric structure) — there's no preferred direction. Whatever happens for +V (heating reduces R, current grows quickly) happens identically for −V.\n- Step 3: So diode I–V is asymmetric (hockey-stick: blocks one way, conducts the other), while thermistor I–V is symmetric (mirror images either side of origin).\n\nTakeaway: Symmetry of the I–V graph reflects the symmetry (or lack thereof) of the underlying component structure.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "A common error: writing $$R = IV$$ instead of $$R = V/I$$. Beyond just memorizing the formula, why must R be a *quotient* rather than a *product*?", "answer": "Think about what resistance should physically represent: it's the *opposition to current flow per unit driving voltage*. If you apply a bigger V but get only a small I, that means R is big. If a small V gives a large I, R is small. This inverse relationship between R and I (for a given V) demands a quotient: $$R = V/I$$. A product $$R = IV$$ would give the opposite (and nonsense) — it would say bigger current means more resistance, which contradicts the definition. Also, dimensional check: $$P = IV$$ has units of watts (energy/time). If R were also IV, it would share units with power — but R has units of ohms (V/A). The quotient gives the right units; the product doesn't.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "[Misconception probe] A student says: \"If a component has a higher resistance, it must have a higher voltage across it.\" Evaluate this claim. (2 steps)", "answer": "- Step 1: This is only true **in a series circuit** where the current is the same through all components. By $$V = IR$$, if $$I$$ is the same, then yes — a higher R means a higher V across that component.\n- Step 2: In a **parallel circuit**, all components have the *same* voltage across them regardless of their resistance. A higher R component in parallel actually has a *smaller* current ($$I = V/R$$), not a higher voltage. The student's claim is not universally true — it depends on the circuit configuration. Don't confuse cause and effect: R controls current for a given V; R doesn't automatically determine V.", "source": "GLM 5.1 ③", "_id": "glm_3_54"}, {"question": "Why is writing \"$$R = IV$$\" a serious physics error, and what would the units immediately tell you? (3 steps)", "answer": "- Step 1: The definition is $$R = V/I$$ (a quotient), not $$IV$$ (a product). Phuc made this slip in lesson and was corrected immediately — it's a classic exam-killer.\n- Step 2: Units check: $$V \\times A = \\text{volts}\\cdot\\text{amps} = \\text{watts}$$. So $$IV$$ gives you power in $$\\mathrm{W}$$, not resistance in $$\\Omega$$. A unit analysis instantly catches the error.\n- Step 3: Conceptually, resistance is \"how much voltage is needed *per unit* of current pushed through\" — that's intrinsically a ratio. A product would mean larger currents at larger voltages give larger resistance, which is nonsense.\n\nThe lesson: always sanity-check by units. $$\\mathrm{V/A} = \\Omega$$; $$\\mathrm{V\\cdot A} = \\mathrm{W}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "A student sees a non-ohmic curve and computes resistance as the *tangent slope* at a point ($$\\mathrm{d}V/\\mathrm{d}I$$). When (if ever) is this physically meaningful, and why is it wrong for an Edexcel \"find R\" question? (3 steps)", "answer": "- Step 1: The tangent slope $$\\mathrm{d}V/\\mathrm{d}I$$ is the *differential* (or *dynamic*) resistance. It tells you how the voltage changes for a small change in current around that operating point — useful for small-signal analysis (AC behaviour, amplifier design).\n- Step 2: But the \"resistance at a point\" Edexcel asks about is *static* resistance: $$R = V/I$$ — the actual voltage divided by the actual current. This equals the slope of the *chord from the origin to the point*, not the tangent.\n- Step 3: For a non-linear curve, chord slope ≠ tangent slope, so the two values differ. Edexcel grades on the static definition $$R = V/I$$; the tangent gives a different number and loses marks.\n\nUseful rule: \"static R\" = chord from origin. \"Differential R\" = tangent at the point.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "Conceptually, why does the same component (e.g. a wire) have different resistance values reported in different experiments? Aside from measurement error, what's the physical reason? (3 steps)", "answer": "- Step 1: Temperature: room temperature varies, and even small T changes shift R for metals. A wire at 20°C has different R than at 25°C.\n- Step 2: Current during measurement: if the measuring current is large, $$I^2 R$$ heating raises the wire's T above ambient, increasing measured R. Low-current measurements give R closer to true ambient-T R.\n- Step 3: Reading method: if you use the tangent of an I–V curve at high V (differential R), you'd get a different number than if you used V/I (static R) at the same point — relevant for non-ohmic components.\n\nTakeaway: R depends on T, on current, and on which definition (static vs differential) you use. \"Constant R\" requires a constant operating regime.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "An LDR and a fixed resistor form a potential divider, with the output voltage $$V_{\\text{out}}$$ taken across the LDR. As light intensity increases, does $$V_{\\text{out}}$$ increase or decrease? Explain. (3 steps)", "answer": "- Step 1: In a potential divider, the voltage is shared in proportion to resistance: $$V_{\\text{out}} = \\frac{R_{\\text{LDR}}}{R_{\\text{LDR}} + R_{\\text{fixed}}} \\times V_{\\text{supply}}$$. The component with the larger resistance gets the larger share of voltage.\n- Step 2: As light intensity increases, the LDR's resistance **decreases** (more photons free more charge carriers, lowering resistance).\n- Step 3: With the LDR's resistance reduced, the LDR claims a **smaller** fraction of the supply voltage, and the fixed resistor claims a **larger** fraction. Since $$V_{\\text{out}}$$ is measured across the LDR, it **decreases**. Note: this is the opposite result to when $$V_{\\text{out}}$$ is taken across the fixed resistor (which would increase).\n\nWhere you measure $$V_{\\text{out}}$$ matters! Across LDR: light ↑ → $$R_{\\text{LDR}}$$ ↓ → $$V_{\\text{out}}$$ ↓. Across fixed resistor: light ↑ → $$R_{\\text{LDR}}$$ ↓ → $$V_{\\text{out}}$$ ↑.", "source": "GLM 5.1 ②", "_id": "glm_2_28"}, {"question": "What's the difference between a \"rheostat\" and a \"potentiometer\" in terms of circuit topology and the range of V they can deliver? (3 steps)", "answer": "- Step 1: A *rheostat* is a variable resistor wired as a 2-terminal device in series with the load — only two of the three terminals are used. Sliding changes the resistance in the circuit, which changes I (and hence V across load) via $$V = IR_{\\text{load}}$$.\n- Step 2: A *potentiometer* (potential divider) uses all three terminals: the full track is connected across the supply, and the load is connected between the slider (wiper) and one end. The slider taps off a fraction of the supply voltage.\n- Step 3: Range: rheostat cannot give V_load = 0 (there's always some current flowing) — minimum V is set by the rheostat's max R. Potentiometer can give V_out from exactly 0 V (slider at one end) to full supply (slider at other end) — continuous from 0 to V_max.\n\nTakeaway: Same physical device, different wiring. Three terminals used = potentiometer = full 0-to-Vmax range. Two terminals = rheostat = limited range.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "Two students each calculate the resistance of a non-ohmic component at $$V = 2\\ \\text{V}$$. Student A draws a tangent to the curve at that point and measures the tangent's slope. Student B reads off I at V = 2 V and computes V/I. Who is correct and why? (3 steps)", "answer": "- Step 1: Student B is correct. Resistance is defined as $$R = V/I$$ — the actual values of V and I at the operating point, divided.\n- Step 2: Student A has computed the *differential* (dynamic) resistance $$r_d = dV/dI$$ — the slope of the tangent. This tells you how a small change in V around 2 V produces a small change in I, but it's *not* the resistance R = V/I at that point.\n- Step 3: Geometrically: Student B is using the slope of the *chord* from the origin to the operating point; Student A is using the slope of the *tangent* at the operating point. For curved I–V graphs these are different. R = V/I is the chord slope (inverted).\n\nTakeaway: Resistance at a point = chord from origin, not tangent at the point. Same on graphs; very different in value for nonlinear curves.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "An LDR is used in a streetlight that turns on automatically at dusk. The LDR is in a potential divider with a fixed resistor, and V_out across the LDR triggers the light. As darkness falls, does V_out across the LDR increase or decrease? (3 steps)", "answer": "- Step 1: As darkness falls, light intensity decreases. The LDR's resistance *increases* (fewer photons → fewer conduction electrons → higher R).\n- Step 2: In the potential divider, $$V_{out}$$ across the LDR = $$\\frac{R_{LDR}}{R_{LDR} + R_{fixed}} \\times V_{in}$$. As $$R_{LDR}$$ increases, the LDR's share of the total resistance increases.\n- Step 3: Therefore, $$V_{out}$$ across the LDR *increases* as darkness falls. This increasing voltage triggers the streetlight to turn on. (Note: if $$V_{out}$$ were across the fixed resistor instead, it would decrease — the placement of $$V_{out}$$ matters!)\n\nTakeaway: Dark → $$R_{LDR}$$↑ → $$V_{out}$$ across LDR↑ → triggers light on. The placement of $$V_{out}$$ is critical!", "source": "GLM 5.1 ①", "_id": "glm_1_51"}, {"question": "[Synthesis] A potential divider consists of a 12 V supply, a fixed $$10\\text{ kΩ}$$ resistor, and an LDR in series. $$V_{out}$$ is measured across the LDR. In daylight, the LDR has $$R = 2\\text{ kΩ}$$. In darkness, $$R = 10\\text{ MΩ}$$. Estimate $$V_{out}$$ in daylight and in darkness. (3 steps)", "answer": "- Step 1: **Daylight** ($$R_{LDR} = 2\\text{ kΩ}$$): Total $$R = 10 + 2 = 12\\text{ kΩ}$$. Using the potential divider equation: $$V_{out} = R_{LDR}/(R_{fixed} + R_{LDR}) \\times V_{supply} = 2/12 \\times 12 = 2\\text{ V}$$. (The LDR, being the smaller resistor, gets a small share of the voltage.)\n- Step 2: **Darkness** ($$R_{LDR} = 10\\text{ MΩ} = 10{,}000\\text{ kΩ}$$): Total $$R \\approx 10{,}000\\text{ kΩ}$$ (the 10 kΩ fixed resistor is negligible by comparison). $$V_{out} \\approx 10{,}000/10{,}010 \\times 12 \\approx 12\\text{ V}$$. (The LDR, being the much larger resistor, takes nearly all the voltage.)\n- Step 3: The output swings from ~2 V in daylight to ~12 V in darkness. This large voltage swing is why the LDR is useful as a light sensor — the output changes dramatically with illumination, making it easy to trigger a switch (e.g., turning on streetlights when it gets dark).", "source": "GLM 5.1 ③", "_id": "glm_3_52"}, {"question": "A diode's threshold voltage is often quoted as \"approximately 0.6 V.\" Why \"approximately,\" and what physical fact does the threshold represent? (3 steps)", "answer": "- Step 1: The threshold depends on the diode material: silicon $$\\approx 0.6$$–$$0.7$$ V; germanium $$\\approx 0.3$$ V; LEDs $$\\approx 1.8$$–$$3$$ V depending on colour. So a precise number depends on the device.\n- Step 2: Physically, the threshold is the voltage needed to overcome the built-in \"depletion region\" at the diode's p-n junction. Below this voltage, the internal electric field across the junction repels would-be charge carriers; above it, carriers can be pushed through.\n- Step 3: The curve isn't a sharp step — it rises continuously but very steeply around the threshold. So \"0.6 V\" is really the voltage where current first becomes noticeable (e.g., $$> 1$$ mA).\n\nFor Edexcel, use $$0.6$$ V for silicon unless told otherwise.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "A diode in forward bias has 0.7 V across it and 10 mA of current through it. What is its resistance at this operating point? (2 steps)", "answer": "- Step 1: For any component, resistance at an operating point is $$R = \\frac{V}{I}$$. The diode is non-ohmic, so we must use the values at this specific point, not the gradient.\n- Step 2: $$R = \\frac{0.7\\;\\text{V}}{10 \\times 10^{-3}\\;\\text{A}} = \\frac{0.7}{0.01} = 70\\;\\Omega$$. Note: this is the resistance at this particular forward-bias point only. At a higher current (say 100 mA at 0.74 V), the resistance would be much lower — the diode is non-ohmic and its resistance decreases dramatically past the threshold.\n\nDiode resistance at a point: $$R = V/I = 0.7/0.01 = 70\\;\\Omega$$. Non-ohmic — R changes with operating point.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "Conceptually, why is it harder to set up an accurate I–V experiment near the origin for a non-ohmic component than for an ohmic one? (3 steps)", "answer": "- Step 1: Near V = 0, both I and V are very small. Meter resolution becomes limiting: an ammeter reading $$0.5\\ \\text{mA} \\pm 0.1\\ \\text{mA}$$ has a 20% uncertainty, while at higher currents the percentage uncertainty drops.\n- Step 2: For an ohmic component near origin, the small-V data is less critical — you can extrapolate the well-measured high-V linear portion through the origin and still get accurate R.\n- Step 3: For a non-ohmic component (especially a diode), the near-origin region is *exactly* where the characteristic behaviour (threshold, exponential turn-on) happens. You need fine resolution and tight V control here, which is why the potentiometer (giving smooth 0-up sweep) is essential and high-resolution meters are preferred.\n\nTakeaway: Near-origin matters most for non-ohmic, exactly where measurement is hardest. Good apparatus + careful technique required.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "A student says: \"Kirchhoff's First Law only applies if you know whether the circuit is series or parallel.\" Why is this wrong? (2 steps)", "answer": "- Step 1: Kirchhoff's First Law (KCL) states that the sum of currents entering any junction equals the sum of currents leaving it: $$\\Sigma I_{in} = \\Sigma I_{out}$$. This is a statement of **conservation of charge** and applies at *any* junction, regardless of the circuit topology.\n- Step 2: The circuit type (series, parallel, or mixed) determines *which branches* the current splits into and *what values* the currents take, but it does not determine *whether* the law applies. The law is universal — it holds at every junction in every circuit. Phuc's hesitation on this point (lesson video 2, 52:25) was corrected by the tutor: the law is topology-independent.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "A metal's resistance increases with temperature, but an NTC thermistor's resistance decreases with temperature. Contrast the microscopic mechanisms responsible for this opposite behaviour. (3 steps)", "answer": "- Step 1: **In a metal:** The number of conduction electrons is already very large (roughly one per atom) and cannot increase significantly with temperature. When temperature rises, the lattice ions vibrate with greater amplitude, causing more frequent collisions with the drifting electrons. This reduces the drift velocity and increases resistance. The dominant effect is **more collisions**.\n- Step 2: **In an NTC thermistor (semiconductor):** At low temperatures, very few electrons are free to conduct — most are bound to atoms. When temperature rises, thermal energy liberates more valence electrons, dramatically increasing the number of charge carriers. This effect (more carriers) overwhelms any increase in lattice vibrations. The dominant effect is **more charge carriers**.\n- Step 3: The key distinction: metals already have maximum carriers, so only the collision effect matters (R increases). Semiconductors start with few carriers, so the carrier-generation effect dominates (R decreases). Memory aid: NTC = \"Negative\" = temperature goes up, resistance goes down — the opposite of a metal.\n\nMetal: R↑ with T (more collisions, same carriers). NTC thermistor: R↓ with T (many more carriers, overwhelming collision effect).", "source": "GLM 5.1 ②", "_id": "glm_2_19"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What is the defining equation for resistance, and why is it a quotient (V divided by I) rather than a product? (2 steps)", "answer": "- Step 1: Resistance is defined as $$R = \\frac{V}{I}$$, where $$V$$ is the potential difference across the component and $$I$$ is the current through it. The SI unit is the ohm ($$\\Omega$$), where $$1 \\, \\Omega = 1 \\, \\text{V/A}$$.\n- Step 2: It is a quotient because resistance measures how much voltage is needed *per unit of current* to push charge through. A higher resistance means you need more voltage for the same current — it is a ratio of \"effort\" to \"result.\" Writing $$R = IV$$ would give units of V·A = watts (power), which is physically nonsensical for resistance.\n\nTakeaway: $$R = V/I$$ always — never $$R = IV$$.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "At the microscopic level, what causes a metal to have electrical resistance? Describe the mechanism in terms of electron-lattice interactions. (2 steps)", "answer": "- Step 1: As conduction electrons drift through a metal, they collide with the vibrating positive lattice ions. Each collision transfers kinetic energy from the electron to the ion, causing the ion to vibrate more — this increased vibration is thermal energy (heat).\n- Step 2: These collisions reduce the electrons' drift velocity and impede their forward progress, meaning less current flows for a given applied voltage. This opposition to current is what we call resistance. The electrical energy dissipated in these collisions manifests as heating inside the resistor.\n\nTakeaway: Resistance = collisions between electrons and lattice ions → energy transferred as heat.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "A student says: \"A resistor stores electrons — that's why less current comes out than goes in.\" Explain why this is incorrect, citing a conservation law. (2 steps)", "answer": "- Step 1: By Kirchhoff's First Law (conservation of charge), the total current entering any component must equal the total current leaving it. The same number of electrons per second that enters the resistor must also exit per second.\n- Step 2: The resistor *slows down* the rate of electron flow (reduces drift velocity) through the entire circuit — it does not accumulate or store electrons. The energy from the slowed electrons is transferred as heat to the lattice, not stored as extra charge inside the resistor.\n\nTakeaway: Resistors dissipate energy as heat; they do NOT store electrons.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "When current flows through a resistor, electrical energy is converted to another form. What is that form, and which power equation is specifically called the \"heating effect\"? (2 steps)", "answer": "- Step 1: Electrical energy is converted to thermal energy (heat). This happens because the kinetic energy lost by electrons in lattice collisions makes the ions vibrate more — and increased vibration of ions IS heat.\n- Step 2: The power equation specifically associated with the heating effect is $$P = I^2 R$$. For a given current, the rate of heating depends on resistance — more resistance means more energy transferred per collision path. This is why resistors get hot when current flows.\n\nTakeaway: $$P = I^2 R$$ is the \"heating effect\" equation — power dissipated as heat in a resistor.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "State Ohm's Law precisely, including all conditions. Why is the temperature condition critical? (3 steps)", "answer": "- Step 1: Ohm's Law states: For a metallic conductor at constant temperature, the current is directly proportional to the potential difference across it: $$I \\propto V$$ (at constant temperature).\n- Step 2: The \"constant temperature\" condition is critical because if the temperature rises (as it does when current heats the conductor), the resistance changes, and the proportionality breaks down. The conductor is no longer ohmic under those conditions.\n- Step 3: Equivalently, Ohm's Law means that $$R = V/I$$ is *constant* — it does not change with V or I. This is what makes the I–V graph a straight line through the origin. Remove the constant-temperature condition, and the law fails.\n\nTakeaway: Ohm's Law = $$I \\propto V$$ at constant T → R is constant. The temperature condition is essential.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "A student writes: \"Ohm's Law states that R = V/I.\" Explain why this is incorrect, distinguishing between a definition and a physical law. (3 steps)", "answer": "- Step 1: $$R = V/I$$ is the *definition* of resistance. It applies to ALL components — ohmic or non-ohmic. You can always compute $$R = V/I$$ for any component at any operating point.\n- Step 2: Ohm's Law is a *physical law* — it makes the additional claim that R is constant (for metals at constant temperature). The equation $$R = V/I$$ alone says nothing about whether R stays constant or varies.\n- Step 3: A filament lamp has $$R = V/I$$ at every point on its curve, but R changes with V and I — so it does NOT obey Ohm's Law. The definition and the law are fundamentally different statements.\n\nTakeaway: $$R = V/I$$ is a definition (always true). Ohm's Law is the claim that R is constant (only true for metals at constant T).", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "Can the formula $$R = V/I$$ be applied to a non-ohmic component like a filament lamp? If so, how does the result differ from applying it to an ohmic conductor? (2 steps)", "answer": "- Step 1: Yes — $$R = V/I$$ applies to ALL components. For a filament lamp, you can read off V and I at any point on its I–V curve and calculate $$R = V/I$$ at that specific operating point.\n- Step 2: The key difference: for an ohmic conductor, $$R = V/I$$ gives the same value at every point (constant R). For a non-ohmic component, $$R = V/I$$ gives a *different* value at each point — resistance varies with the operating conditions. You must always specify *at what point* you are finding R.\n\nTakeaway: $$R = V/I$$ works everywhere — but for non-ohmic components, R changes depending on where you read V and I.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "When obtaining an I–V characteristic experimentally, why is a potentiometer (potential divider) preferred over a simple rheostat (variable resistor in series)? (2 steps)", "answer": "- Step 1: A rheostat in series with the component can only reduce the current from some minimum value to the supply maximum. It cannot bring the p.d. across the component down to exactly 0 V — there is always some minimum voltage (e.g., 0.50 V with a rheostat).\n- Step 2: A potentiometer (rheostat wired as a potential divider) can vary the p.d. continuously from exactly 0 V to the maximum supply voltage. This gives more data points near the origin, which is crucial for establishing whether the graph is linear (passes through origin) or not.\n\nTakeaway: Potentiometer → $$V_{min} = 0$$ V. Rheostat → $$V_{min} > 0$$ V. Zero volts is essential for checking linearity.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "In the I–V characteristic experiment, after taking forward-bias readings, you must wait at least 5 minutes before reversing the supply. Why? (2 steps)", "answer": "- Step 1: During the forward run, the component (especially a filament lamp or thermistor) heats up significantly due to resistive heating ($$I^2 R$$ heating).\n- Step 2: If you immediately take reverse readings while the component is still hot, the temperature is different from the starting temperature of the forward run. This makes the comparison unfair — the reverse readings would be at a different temperature, producing a different resistance. Waiting 5 minutes allows the component to cool back to room temperature so both halves of the graph are taken under the same thermal conditions.\n\nTakeaway: Wait 5 minutes → component returns to room temperature → fair comparison between forward and reverse runs.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Why must you start the I–V characteristic experiment with the p.d. set to its minimum value before switching on? (2 steps)", "answer": "- Step 1: If you start with a high p.d., a large current surge flows through the component immediately. For sensitive components (especially diodes), this can cause permanent damage or even fire.\n- Step 2: Starting at minimum p.d. and gradually increasing ensures the current builds up slowly, protecting the component. It also ensures you capture the low-voltage region of the graph where the behaviour near the origin can be observed.\n\nTakeaway: Start low → protect components from current surge + capture origin behaviour.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "In the circuit for measuring I–V characteristics, where must the ammeter and voltmeter be placed, and why? (2 steps)", "answer": "- Step 1: The ammeter must be in *series* with the component because it measures the current flowing *through* the component. Current is the same through all series elements.\n- Step 2: The voltmeter must be in *parallel* with the component because it measures the potential difference *across* the component. Voltage is the same across parallel branches. The variable supply (potentiometer) allows the p.d. to be varied from 0 to maximum.\n\nTakeaway: Ammeter in series (measures I through component), voltmeter in parallel (measures V across component).", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "For an ohmic conductor, the I–V graph is a straight line through the origin. How do you find the resistance from this graph? (3 steps)", "answer": "- Step 1: The graph is plotted with I on the y-axis and V on the x-axis (convention). The gradient of this straight line is $$\\frac{\\Delta I}{\\Delta V} = \\frac{I}{V}$$.\n- Step 2: Since $$R = \\frac{V}{I}$$, the resistance is the *reciprocal* of the gradient: $$R = \\frac{1}{\\text{gradient}}$$.\n- Step 3: This only works for ohmic conductors because the gradient is constant everywhere — R is the same at every point. For a non-ohmic component, the gradient varies and does not equal 1/R at any point.\n\nTakeaway: Ohmic → gradient = 1/R → R = 1/gradient. This ONLY works for straight-line graphs.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "For a non-ohmic component, how do you find the resistance at a specific operating point on its I–V graph? (2 steps)", "answer": "- Step 1: Read off the values of V and I at that specific point from the graph. For example, if the point is at $$V = 0.70$$ V and $$I = 40$$ mA, use those values.\n- Step 2: Calculate $$R = \\frac{V}{I}$$ using the read-off values. For the example: $$R = \\frac{0.70}{40 \\times 10^{-3}} = 17.5 \\, \\Omega$$. Do NOT use the gradient of the curve at that point.\n\nTakeaway: For non-ohmic → R = V/I at the point (read off values). Never use gradient.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "A student takes the gradient (dI/dV) of a non-ohmic I–V curve at a point and claims R = 1/gradient. Explain why this gives the wrong answer. (3 steps)", "answer": "- Step 1: The gradient of the I–V curve at a point is $$\\frac{dI}{dV}$$, which is the *differential* or *dynamic* resistance. This tells you how a small change in V would change I — it is the slope of the tangent at that point.\n- Step 2: The actual resistance at that point is $$R = \\frac{V}{I}$$, which is the ratio of the total V to the total I at that point. This is the slope of the *chord* from the origin to that point, not the tangent.\n- Step 3: For a non-ohmic curve, the tangent slope and the chord slope are different. The gradient (tangent) gives dI/dV, which is NOT equal to I/V. Only for a straight line through the origin are these the same.\n\nTakeaway: Gradient = dI/dV (tangent slope) ≠ I/V (chord slope) for curves. Use R = V/I, not 1/gradient.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "You need to find what p.d. must be applied to a non-ohmic component so that its resistance is exactly 50 Ω. Why can't you simply calculate V = IR, and what graphical method do you use instead? (3 steps)", "answer": "- Step 1: You cannot simply use V = IR because I is unknown — the component is non-ohmic, so I and V are linked by the component's I–V curve, not by a simple linear relationship. You don't know which I corresponds to R = 50 Ω.\n- Step 2: Draw a straight line through the origin with gradient = 1/R = 1/50 = 0.020 A/V. This line represents ALL (V, I) pairs that give R = 50 Ω. To plot it, pic
