020\\,\\mathrm{A/V}$$. Plot one convenient point, e.g., at $$V = 0.6$$ V, $$I = 0.6/50 = 0.012\\,\\mathrm{A} = 12$$ mA. Draw straight line from origin through $$(0.6, 12)$$.\n- Step 3: The intersection of this $$R = 50$$ Ω line with the component's curve gives the unique operating point where both the curve *and* the resistance constraint hold. Read off $$V$$ at the intersection — that's the required p.d.\n\nGeometric intuition: the line is the *locus of constant-R points*; the curve is the locus of *physically achievable points*; the intersection is the unique solution.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "A filament lamp is rated 12 V, 24 W. What's its resistance at full operation, and what's the conceptual significance of computing it this way? (3 steps)", "answer": "- Step 1: At rated operation, $$P = IV$$, so $$I = P/V = 24/12 = 2.0$$ A.\n- Step 2: $$R = V/I = 12/2.0 = 6.0\\,\\Omega$$ at full brightness (hot filament).\n- Step 3: Significance: this is the *hot* resistance. If you measured the same lamp cold (with a multimeter, before switching on), you'd get something much smaller — perhaps $$1$$–$$2\\,\\Omega$$. The rated R is only valid *at* the rated operating point. The lamp's R is a function of temperature, not a fixed property.\n\nThis is exactly why incandescent bulbs sometimes blow at switch-on: cold $$R$$ is low, so initial surge current $$I = V/R_\\text{cold}$$ is much larger than steady-state $$I$$.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Why does an exam mark scheme treat \"resistance increases with temperature\" as a two-mark answer for a filament lamp, and what are the two distinct steps?", "answer": "Because the answer requires *both* the macroscopic and microscopic steps. **Mark 1:** As current flows, the filament heats up (via $$I^2 R$$ resistive heating). **Mark 2:** At higher temperature, metal lattice ions vibrate with greater amplitude, so conduction electrons collide with them more frequently per unit drift distance — reducing drift velocity and thus current for a given voltage, i.e., increasing resistance. Just saying \"resistance increases\" gets one mark at best; you must explain *via increased ion vibration and more frequent collisions*.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Why does the I–V graph of a filament lamp pass through the origin and look nearly linear there, even though the lamp is famously non-ohmic? (2 steps)", "answer": "- Step 1: At very low voltages, the current is tiny, so $$P = I^2 R$$ is negligible. The filament barely heats up — its temperature stays close to room temperature, so $$R$$ stays approximately constant.\n- Step 2: With $$R$$ effectively constant near the origin, $$I \\propto V$$ holds approximately — the curve is nearly linear there (and passes through origin because $$V = 0 \\Rightarrow I = 0$$). Only at higher $$V$$ does significant heating kick in and the curve bend.\n\nSo \"non-ohmic\" is really a statement about the *whole* operating range; locally, near $$V = 0$$, any thermal-feedback device looks ohmic.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "A diode in forward bias at $$V = 0.64$$ V has $$I = 5.0$$ mA. At $$V = 0.74$$ V, $$I = 40$$ mA. What does this tell you about how the diode's resistance changes? (3 steps)", "answer": "- Step 1: At $$V = 0.64$$ V: $$R = 0.64 / (5 \\times 10^{-3}) \\approx 128\\,\\Omega$$.\n- Step 2: At $$V = 0.74$$ V: $$R = 0.74 / (40 \\times 10^{-3}) \\approx 18.5\\,\\Omega$$.\n- Step 3: A small increase of just $$0.1$$ V in forward voltage caused resistance to drop almost 7×. This is the hallmark of a diode past threshold: extremely steep I–V curve → vanishingly small differential resistance → small voltage changes produce huge current changes. The diode behaves almost like a short circuit once past $$\\sim 0.6$$–$$0.7$$ V.\n\nConceptual takeaway: a diode is not a constant-resistance device even within forward conduction — its resistance plunges with increasing forward V.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "Why is a small protective resistor placed in series with a diode in laboratory I–V experiments? (3 steps)", "answer": "- Step 1: Once a diode is forward-biased past threshold, its resistance becomes very small ($$\\sim 10\\,\\Omega$$ or less). If you increase $$V$$ further, the diode tries to draw very large current.\n- Step 2: This current can exceed the diode's maximum rating, causing it to burn out (or even explode — Marta's example with LEDs).\n- Step 3: A series resistor (e.g., $$10\\,\\Omega$$) absorbs most of the supply voltage and limits the current to a safe value. The diode then only sees a small voltage drop across itself, with the resistor dropping the rest. Standard practice for any experimental diode circuit.\n\nMnemonic: \"diode + resistor in series — the resistor protects, the diode rectifies.\"", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Kirchhoff's First Law: state it precisely, and explain why Phuc's worry \"do I need to know whether the circuit is series or parallel to apply it?\" was misplaced. (3 steps)", "answer": "- Step 1: KCL states: at any junction in a circuit, $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$. It's a statement of *charge conservation* — charge cannot pile up or vanish at a point.\n- Step 2: It applies *at a junction*, independent of topology. Whether the circuit is series, parallel, or some weird mesh, KCL still holds at every node. Topology only determines which branches the current splits *into*, not whether the law applies.\n- Step 3: So Phuc's concern was misplaced: you don't need to identify \"series vs parallel\" before invoking KCL. You identify a junction, count currents in and out, set them equal. Period.\n\nKCL is a *local* law (about a single junction); series/parallel is a *global* property (about how components are arranged).", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "A student sees a non-ohmic curve and computes resistance as the *tangent slope* at a point ($$\\mathrm{d}V/\\mathrm{d}I$$). When (if ever) is this physically meaningful, and why is it wrong for an Edexcel \"find R\" question? (3 steps)", "answer": "- Step 1: The tangent slope $$\\mathrm{d}V/\\mathrm{d}I$$ is the *differential* (or *dynamic*) resistance. It tells you how the voltage changes for a small change in current around that operating point — useful for small-signal analysis (AC behaviour, amplifier design).\n- Step 2: But the \"resistance at a point\" Edexcel asks about is *static* resistance: $$R = V/I$$ — the actual voltage divided by the actual current. This equals the slope of the *chord from the origin to the point*, not the tangent.\n- Step 3: For a non-linear curve, chord slope ≠ tangent slope, so the two values differ. Edexcel grades on the static definition $$R = V/I$$; the tangent gives a different number and loses marks.\n\nUseful rule: \"static R\" = chord from origin. \"Differential R\" = tangent at the point.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "A circuit has a thermistor in series with a fixed resistor, supplied by a battery. As temperature increases, does the voltage across the *fixed resistor* increase or decrease? Reason from first principles. (3 steps)", "answer": "- Step 1: The thermistor's resistance $$R_T$$ decreases as $$T$$ rises (NTC behaviour). The fixed resistor $$R_F$$ is unchanged.\n- Step 2: They're in series, so the supply voltage divides between them in the ratio of their resistances: $$V_F = V_\\text{supply} \\cdot R_F / (R_F + R_T)$$.\n- Step 3: As $$R_T$$ drops, the denominator shrinks, so the fraction $$R_F/(R_F + R_T)$$ *grows*, so $$V_F$$ *increases*. The fixed resistor \"claims\" a bigger share of the supply voltage as the thermistor gives up its share.\n\nThis is the basis of a thermistor potential-divider temperature sensor — $$V_F$$ is a temperature-dependent output that can trigger other circuits.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "Compare the curvature direction of the I–V graphs for a filament lamp vs. an NTC thermistor. Why are they curved *opposite* ways? (3 steps)", "answer": "- Step 1: Filament lamp: bows *toward the V-axis* (flattens out as V grows). The reason: $$R$$ *increases* with $$V$$ (because increased current heats metal filament, raising R). So $$I$$ grows slower than proportional to $$V$$.\n- Step 2: Thermistor: bows *toward the I-axis* (steepens as V grows). The reason: $$R$$ *decreases* with $$V$$ (because increased current heats semiconductor, freeing more carriers, dropping R). So $$I$$ grows faster than proportional to $$V$$.\n- Step 3: Both involve thermal feedback from $$I^2 R$$ heating, but the *sign* of dR/dT differs: positive for metals (filament), negative for semiconductors (NTC thermistor). Opposite curvatures reflect opposite signs of dR/dT.\n\nMnemonic: filament curves *down*, thermistor curves *up* — opposite materials, opposite responses.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "\"A diode in reverse bias acts as an open switch; in forward bias past threshold, as a closed switch.\" Critique this statement — when is it useful and where does it break down? (3 steps)", "answer": "- Step 1: Useful for first approximation: reverse bias → $$R \\to \\infty$$ → no current (open switch). Forward bias past $$\\sim 0.6$$ V → R very low → high current (closed switch). Good for digital/logic analysis.\n- Step 2: Breaks down quantitatively: even past threshold, the diode has a $$\\sim 0.6$$–$$0.7$$ V drop across it — it's *not* a perfect short. And it's strongly non-linear: small voltage changes give large current changes (so it doesn't pass exactly the same current a wire would).\n- Step 3: Also breaks down at very high reverse voltages (breakdown region) and at high currents (heating). And below threshold in forward bias, it's still not a perfect open — small leakage current flows.\n\nSo: open/closed analogy is fine for binary thinking, but real diodes have a forward voltage drop and non-zero leakage.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "A student measures a wire's I–V graph and finds gradient $$= 54.8\\,\\mathrm{mA/V}$$. Is the wire ohmic, and what's its resistance? (3 steps)", "answer": "- Step 1: A constant gradient (straight line through origin) is the *signature* of an ohmic conductor — $$I/V$$ is the same at every point, so $$R$$ is constant.\n- Step 2: Convert: $$54.8\\,\\mathrm{mA/V} = 0.0548\\,\\mathrm{A/V}$$.\n- Step 3: $$R = 1/\\text{gradient} = 1/0.0548 \\approx 18.2\\,\\Omega$$. Unit check: $$1/(\\mathrm{A/V}) = \\mathrm{V/A} = \\Omega$$. ✓\n\nBonus: this matches the lesson's nichrome wire example. Nichrome's resistance per unit length is fairly stable over modest temperature changes, so it behaves as a textbook ohmic conductor.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "For an ammeter and voltmeter setup measuring a component, where does each meter go in the circuit, and why? (2 steps)", "answer": "- Step 1: **Ammeter in series with the component**: an ammeter measures current *through* itself, so it must lie in the same single path that carries the component's current. Ideally an ammeter has near-zero resistance so it doesn't disturb the circuit.\n- Step 2: **Voltmeter in parallel with the component**: a voltmeter measures the p.d. *across* its terminals, so it must be connected across the component whose voltage you want. Ideally a voltmeter has near-infinite resistance so it draws negligible current and doesn't disturb the reading.\n\nMnemonic: \"ammeter in line, voltmeter across.\" Swap them and you measure nonsense (or destroy components — ammeter in parallel = short circuit).", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "For a fixed resistor, sketch what the graph of resistance vs current would look like, and contrast with the same plot for a filament lamp. (3 steps)", "answer": "- Step 1: Fixed resistor (ohmic): $$R$$ is constant — independent of current. So the graph of $$R$$ vs $$I$$ is a **horizontal straight line** at $$R = R_0$$.\n- Step 2: Filament lamp (non-ohmic): more current → more $$I^2 R$$ heating → hotter filament → higher $$R$$. So the graph of $$R$$ vs $$I$$ is a **rising curve** — starting at the cold value at $$I = 0$$ and increasing as $$I$$ grows.\n- Step 3: This is the cleanest visual distinction: a horizontal line means \"obeys Ohm's law\"; any curve in an R-vs-I plot means non-ohmic. Same information as the I–V plot, but resistance is now an explicit axis.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Why does Edexcel insist on the wording \"current is directly proportional to the potential difference\" rather than \"current depends on potential difference\" for Ohm's law? (2 steps)", "answer": "- Step 1: \"Direct proportionality\" is a *specific, restrictive* mathematical claim: $$I = kV$$ with $$k$$ constant — equivalent to a straight line *through the origin*. It rules out, e.g., $$I = kV + c$$ (linear but not proportional) or $$I = kV^2$$ (curved).\n- Step 2: \"Depends on\" is weak and vague — every component's current depends on voltage in some way (even a diode). It doesn't capture the unique signature of ohmic behaviour (constant R, line through origin).\n\nSo the precise wording matters because Ohm's law is a *specific functional form*, not just \"there's a relationship.\"", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "A non-ohmic component's I–V curve is symmetric about the origin (e.g., filament lamp, thermistor). What does this symmetry tell you physically? (2 steps)", "answer": "- Step 1: Symmetry about the origin means the component behaves the same way regardless of current direction — reversing $$V$$ just reverses $$I$$ with the same magnitudes. So the component has no preferred direction.\n- Step 2: This makes sense for filament lamps (the tungsten wire heats up the same whether current flows left-to-right or right-to-left) and for thermistors (the bulk semiconductor's behaviour doesn't depend on polarity). Diodes, by contrast, are *asymmetric* — they have a preferred direction (forward bias), reflecting their internal junction structure.\n\nSo symmetry of I–V = direction-independent device; asymmetry = direction-dependent (rectifying).", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "A diode's threshold voltage is often quoted as \"approximately 0.6 V.\" Why \"approximately,\" and what physical fact does the threshold represent? (3 steps)", "answer": "- Step 1: The threshold depends on the diode material: silicon $$\\approx 0.6$$–$$0.7$$ V; germanium $$\\approx 0.3$$ V; LEDs $$\\approx 1.8$$–$$3$$ V depending on colour. So a precise number depends on the device.\n- Step 2: Physically, the threshold is the voltage needed to overcome the built-in \"depletion region\" at the diode's p-n junction. Below this voltage, the internal electric field across the junction repels would-be charge carriers; above it, carriers can be pushed through.\n- Step 3: The curve isn't a sharp step — it rises continuously but very steeply around the threshold. So \"0.6 V\" is really the voltage where current first becomes noticeable (e.g., $$> 1$$ mA).\n\nFor Edexcel, use $$0.6$$ V for silicon unless told otherwise.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "You're given an I–V graph for a non-ohmic component. The question asks \"what is the resistance at $$V = 2$$ V?\". Walk through the procedure and the trap to avoid. (3 steps)", "answer": "- Step 1: Locate $$V = 2$$ V on the x-axis. Trace vertically up to the curve; trace horizontally across to read off $$I$$ at that point. Say $$I = 50$$ mA = $$0.050$$ A.\n- Step 2: Apply $$R = V/I = 2/0.050 = 40\\,\\Omega$$. Done.\n- Step 3: **Trap to avoid**: do *not* compute the gradient of the curve at $$V = 2$$ V (that's differential resistance, not R). And do *not* multiply ($$R \\ne IV$$). Use $$V$$ divided by $$I$$, with both read at the same point.\n\nThis is the \"static resistance at an operating point\" procedure — the only one Edexcel rewards.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "An LDR is sometimes called \"near-ohmic at constant illumination.\" What does this mean, and why is the LDR still classified as a non-ohmic component? (3 steps)", "answer": "- Step 1: At a *fixed* light level, the carrier density in the LDR is roughly constant (set by photon flux). So $$R$$ stays approximately constant, and the I–V curve is nearly a straight line through the origin — locally ohmic.\n- Step 2: But the LDR's *defining* feature is that $$R$$ depends on light intensity — its I–V line tilts (gradient changes) as you vary the illumination. So across different conditions, $$R$$ is variable.\n- Step 3: A component is \"ohmic\" only if $$R$$ is constant under *all* operating conditions of interest. Since the LDR's $$R$$ is environmentally sensitive, it's classified as non-ohmic — even though its instantaneous I–V curve looks linear.\n\nCompare: a resistor in a thermostatted room is ohmic; outside in a heatwave it could be non-ohmic. Context matters for the classification.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "A potential divider uses a thermistor and a fixed resistor in series. The output is taken across the fixed resistor. As the thermistor is heated, qualitatively what does $$V_\\text{out}$$ do, and what's the practical use? (3 steps)", "answer": "- Step 1: Heating the thermistor lowers its resistance (NTC). The fixed resistor's resistance is unchanged.\n- Step 2: In a series potential divider, the fixed resistor's voltage share is $$V_\\text{out} = V_\\text{supply} \\cdot R_\\text{fixed} / (R_\\text{fixed} + R_\\text{thermistor})$$. As $$R_\\text{thermistor}$$ falls, the denominator shrinks, so $$V_\\text{out}$$ *rises*.\n- Step 3: Practical use: $$V_\\text{out}$$ is now a temperature-sensitive voltage that can trigger a fan, an alarm, or a logic input when it crosses a threshold. This is the principle of a temperature-controlled switch.\n\nIf instead you took $$V_\\text{out}$$ across the thermistor, the output would *fall* with rising temperature — opposite sense, same physics.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "Why is the conventional choice to plot $$I$$ on the y-axis and $$V$$ on the x-axis (rather than the reverse) for I–V characteristics? (2 steps)", "answer": "- Step 1: In experiments, $$V$$ is the *independent variable* — you set it via the potentiometer and the component responds with whatever $$I$$ flows. By convention, independent variables go on the x-axis, dependent on the y-axis.\n- Step 2: This convention makes the gradient $$\\mathrm{d}I/\\mathrm{d}V = 1/R$$ (an inverse resistance, sometimes called \"conductance\"). Some textbooks flip the convention to put $$V$$ on y so gradient = $$R$$ directly — but Edexcel sticks with I-on-y, gradient $$= 1/R$$.\n\nAlways *check the axis labels* before computing $$R$$ from a gradient.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "A circuit has an ohmic resistor in parallel with a filament lamp, with a variable supply. As the supply voltage is slowly increased from zero, why does the lamp's \"share\" of the total current shift over time? (3 steps)", "answer": "- Step 1: At very low $$V$$: both the resistor and the lamp are at room temperature, both have their cold resistances. They split current according to $$1/R$$ (more current through the lower-R branch).\n- Step 2: As $$V$$ increases, $$I^2 R$$ heating starts to warm the lamp filament. Its resistance rises. The resistor's resistance, being temperature-independent in this range, stays constant.\n- Step 3: Since the lamp's $$R$$ grows but the resistor's stays the same, current preferentially shifts to the *resistor* branch. The lamp's share of total current shrinks as the filament heats up.\n\nSo in a parallel mix of ohmic + non-ohmic, the non-ohmic component's relative share changes with operating conditions — a subtle effect easy to miss.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "A graph of $$P$$ vs $$V$$ for an ohmic resistor — what shape does it have? Derive briefly. (2 steps)", "answer": "- Step 1: For an ohmic resistor, $$R$$ is constant. $$P = V^2/R$$, so $$P \\propto V^2$$.\n- Step 2: This is a *parabola* (quadratic in $$V$$): doubling $$V$$ gives 4× the power; tripling gives 9×. The graph is symmetric about $$V = 0$$ (since $$V^2$$ is even) — power dissipated is the same regardless of current direction.\n\nContrast: for an ohmic resistor, $$I$$ vs $$V$$ is linear (Ohm's law), but $$P$$ vs $$V$$ is quadratic — non-linear in voltage even though the underlying $$R$$ is constant.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "A student claims: \"If a wire is made longer, its resistance increases — therefore it becomes non-ohmic.\" Critique. (2 steps)", "answer": "- Step 1: True: longer wire has higher resistance ($$R = \\rho L / A$$). The new wire's resistance is just *higher* — a different constant value.\n- Step 2: False conclusion: \"non-ohmic\" doesn't mean \"has high resistance\"; it means \"$$R$$ varies with operating conditions ($$V$$, $$I$$, $$T$$).\" A longer wire still has $$R$$ constant at fixed $$T$$, so it's still ohmic — just with a higher constant value. Its I–V graph is still a straight line through the origin, just shallower.\n\n\"Ohmic\" is about the *behaviour as $$V$$ varies*, not about the magnitude of $$R$$.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "When sketching an I–V graph in an exam, what features must you draw and label to get full marks for an ohmic conductor, a filament lamp, and a diode? (3 steps)", "answer": "- Step 1: **Ohmic**: straight line through origin, extending into Q1 and Q3 (both polarities). Label as \"passes through origin, constant gradient.\"\n- Step 2: **Filament lamp**: S-shaped curve symmetric about origin, bowing toward V-axis. Label that \"gradient decreases as $$|V|$$ increases\" or \"R increases with temperature.\"\n- Step 3: **Diode**: asymmetric. In Q3 (reverse bias): curve along the x-axis ($$I \\approx 0$$). In Q1 (forward bias): $$I = 0$$ until $$V \\approx 0.6$$ V, then steep rise. Explicitly label the threshold voltage $$\\approx 0.6$$ V.\n\nAlways include the origin, both polarities (unless restricted), and any threshold or curvature notes.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "A toy car contains a small motor (effectively a resistor) and a 1.5 V battery. The bulb on the car is meant for 1.5 V too. When the battery is fresh, the bulb is bright. As the battery drains and its EMF drops to 1.0 V, the bulb is much dimmer. Estimate the ratio of power dissipated dim vs bright. Assume bulb $$R$$ doesn't change much. (3 steps)", "answer": "- Step 1: For the bulb (treated as approximately ohmic over this range): $$P = V^2/R$$.\n- Step 2: Ratio: $$P_\\text{dim}/P_\\text{bright} = (V_\\text{dim}/V_\\text{bright})^2 = (1.0/1.5)^2 = (2/3)^2 = 4/9 \\approx 0.44$$.\n- Step 3: So the dimmer bulb dissipates about $$44\\%$$ of the bright power — less than half. The quadratic dependence on V means small voltage drops cause large brightness drops, which is why dim batteries dim bulbs so dramatically.\n\nIn reality the bulb is non-ohmic, so $$R$$ also drops a little as the filament cools — but the rough estimate is fine.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "Synthesis question: in one paragraph, explain why a filament lamp, a thermistor, and a diode are all \"non-ohmic,\" but for fundamentally different physical reasons. (3 steps)", "answer": "- Step 1: **Filament lamp** — non-ohmic because of *thermal feedback in a metal*: increasing $$V$$ raises current, which heats the tungsten via $$I^2 R$$. Hot lattice ions vibrate more, increasing collision frequency with conduction electrons, raising $$R$$. Carrier density is essentially fixed (metallic).\n- Step 2: **Thermistor** — non-ohmic because of *thermal feedback in a semiconductor*: increasing $$V$$ raises current and heats the bulk. But in a semiconductor, higher $$T$$ liberates many more conduction electrons (carrier density rises), and the carrier effect dominates over the collision effect, so $$R$$ *falls* with $$T$$. Opposite sign of dR/dT from a metal.\n- Step 3: **Diode** — non-ohmic because of an *internal junction*: the p-n junction has a built-in depletion region acting as a voltage-dependent barrier. Below threshold, almost no current flows (R very large); above threshold, carriers flood across (R very small); in reverse bias, the barrier widens (R → ∞). Not a thermal effect at all — a junction effect.\n\nSo three different mechanisms (metallic thermal feedback / semiconductor thermal feedback / junction barrier) all produce \"non-ohmic\" behaviour. Same classification, different physics.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}], "count": 50}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 41252, "out_tokens": 23934, "reasoning_chars": 46823, "cost_eur": 0.1169, "elapsed_s": 225, "content_chars": 43838}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 41251, "out_tokens": 26108, "reasoning_chars": 63932, "cost_eur": 0.1239, "elapsed_s": 261, "content_chars": 38651}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 41251, "out_tokens": 14721, "reasoning_chars": 5746, "cost_eur": 0.0873, "elapsed_s": 117, "content_chars": 49329}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 39877, "out_tokens": 6639, "reasoning_chars": 3064, "cost_eur": 0.0141, "elapsed_s": 53, "content_chars": 23654}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 60362, "out_tokens": 22069, "reasoning_chars": 0, "cost_eur": 2.3558, "elapsed_s": 298, "content_chars": 56904}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 60362, "out_tokens": 20498, "reasoning_chars": 0, "cost_eur": 2.2474, "elapsed_s": 276, "content_chars": 49771}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 43357, "out_tokens": 4060, "reasoning_chars": 3599, "cost_eur": 0.0125, "elapsed_s": 87, "content_chars": 11952}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 43357, "out_tokens": 4254, "reasoning_chars": 4997, "cost_eur": 0.0127, "elapsed_s": 107, "content_chars": 11514}}};
const SK='phys_elec_ch05';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
