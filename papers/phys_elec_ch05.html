hreshold. In forward bias, a diode's resistance is not constant — it decreases sharply as more current flows. This is characteristic of a non-ohmic component.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Explain why a metal wire obeys Ohm's Law at low currents but may not obey it at high currents. (2 steps)", "answer": "- Step 1: At low currents, the power dissipation (I²R) is small, so the wire's temperature remains essentially constant. Under constant temperature conditions, the lattice vibration amplitude is constant, collision frequency is constant, and resistance is constant — so I ∝ V (Ohm's Law holds).\n- Step 2: At high currents, the I²R heating becomes significant. The wire's temperature rises, lattice ions vibrate more intensely, collision frequency increases, and resistance increases. Since resistance is no longer constant, the I–V relationship is no longer linear — Ohm's Law breaks down.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "What is the key difference in how resistance is determined from an I–V graph for an ohmic component versus a non-ohmic component? (1 step)", "answer": "For an ohmic component (straight line through origin), resistance can be found using either R = V/I at any point OR R = 1/gradient. For a non-ohmic component (curved line), you MUST use R = V/I at the specific operating point — never use the gradient, as it gives differential resistance, not the actual resistance.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "A student measures the I–V characteristic of a carbon resistor and finds the gradient of the straight-line graph is 54.8 mA/V. Calculate the resistance and explain your method. (2 steps)", "answer": "- Step 1: The gradient is I/V = 54.8 mA/V = 54.8 × 10⁻³ A/V = 0.0548 A/V. For an ohmic conductor, gradient = 1/R.\n- Step 2: Therefore, R = 1/gradient = 1/0.0548 ≈ 18.2 Ω. The resistance is the reciprocal of the gradient because the graph plots I (y-axis) against V (x-axis).", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "Why does the I–V graph for an NTC thermistor show that the current increases more rapidly as voltage increases, compared to an ohmic resistor? (2 steps)", "answer": "- Step 1: As voltage increases, current increases through the thermistor. This current causes I²R heating, which raises the thermistor's temperature.\n- Step 2: Because it's an NTC thermistor, higher temperature means lower resistance. Lower resistance allows even more current to flow for the same voltage increase. This positive feedback causes the current to increase at an accelerating rate — the curve bends toward the current axis.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}], "count": 34}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "How is resistance fundamentally defined as an equation, and does this definition change for components that don't obey Ohm's law?", "answer": "Resistance is defined as $$R = \\frac{V}{I}$$ — the ratio of potential difference across a component to the current through it, with the SI unit of ohms (Ω), where $$1\\ \\Omega = 1\\ \\text{V/A}$$. This definition is universal: it applies to every component regardless of whether the component is ohmic or non-ohmic. The key insight is that $$R = V/I$$ is a *definition* (it just tells you how to calculate R at any given operating point), whereas Ohm's law is a separate physical claim that R happens to stay constant for certain materials. So even a diode in forward bias has a well-defined $$R = V/I$$ at every voltage — that R just changes with V, instead of being fixed.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "At the microscopic level, what physical process gives rise to electrical resistance in a metal, and what happens to the energy lost? (3 steps)", "answer": "- Step 1: Conduction electrons drift through the metal under an applied p.d., but they don't travel freely — the lattice of positive metal ions sits in their path, with each ion vibrating about its equilibrium position due to thermal energy.\n- Step 2: As electrons drift, they repeatedly collide with these vibrating lattice ions. Each collision transfers some of the electron's kinetic energy to the ion, making it vibrate with greater amplitude.\n- Step 3: Increased ion vibration is exactly what we call thermal energy — so electrical energy from the supply is dissipated as heat inside the resistor. The opposition to current we measure as \"resistance\" is the macroscopic consequence of this collision process.\n\nTakeaway: A resistor doesn't *store* electrons — it converts electrical energy to heat via electron–lattice collisions.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Why is it wrong to write Ohm's law as \"$$R = V/I$$\"? What is the correct statement, and what is the conceptual distinction? (3 steps)", "answer": "- Step 1: $$R = V/I$$ is the *definition* of resistance — it applies to every component, ohmic or not, and just tells you how to compute R at one operating point.\n- Step 2: Ohm's law is a stronger, *physical* claim: for a metallic conductor at constant temperature, $$I \\propto V$$ — equivalently, $$R$$ stays constant as V changes.\n- Step 3: So \"R = V/I\" alone doesn't capture Ohm's law because it doesn't assert that R is constant. The defining feature of an ohmic conductor is that R does not depend on V or I, which a single ratio equation can't express.\n\nTakeaway: Definition tells you *what R is*; Ohm's law tells you *how R behaves* (constant) under certain conditions.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "Why does a metal at constant temperature obey Ohm's law, while the same metal at varying temperature does not? (3 steps)", "answer": "- Step 1: At constant temperature, the lattice ions vibrate with a fixed average amplitude — so the average rate of electron collisions per unit length is approximately constant.\n- Step 2: This means doubling V doubles the driving force on electrons, doubling their drift velocity and hence doubling I — giving the proportionality $$I \\propto V$$ and a constant R.\n- Step 3: If temperature is allowed to rise (e.g. due to $$I^2 R$$ heating), the ions vibrate more, collisions become more frequent, R increases, and the linear V–I relationship breaks down — the graph curves.\n\nTakeaway: Ohm's law is contingent on the microscopic collision rate being held constant, which requires fixed temperature.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "In an I–V characteristic experiment, why is a potentiometer (potential divider) used to vary the p.d., rather than a simple rheostat as a variable resistor? (3 steps)", "answer": "- Step 1: A rheostat used as a variable resistor sits in series with the component. Even at maximum rheostat resistance, some minimum current still flows — you can never reach $$V = 0$$ across the component.\n- Step 2: A potentiometer is a rheostat wired as a *potential divider* — the slider taps off a fraction of the supply voltage that ranges continuously from $$0\\ \\text{V}$$ up to the full supply value.\n- Step 3: This is crucial for I–V experiments because the most diagnostic region of the graph is near the origin (to check linearity for ohmic, or to find the threshold for diodes). Without points near $$V = 0$$, you cannot confirm a line passes through the origin or accurately locate a diode's switch-on voltage.\n\nTakeaway: Potentiometer gives a full sweep from 0 V; rheostat doesn't — and the missing low-voltage data is exactly where the physics lives.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "When obtaining an I–V characteristic for a filament lamp, why must the experimenter wait several minutes between forward and reverse runs? (2 steps)", "answer": "- Step 1: During the first run, the filament heats up substantially due to $$I^2 R$$ dissipation — at maximum current it may be near operating temperature (incandescent).\n- Step 2: If you reverse polarity and immediately measure, you're not actually measuring at the same conditions as the start of the first run — the filament is still hot, so its resistance is higher than at room temperature. The two halves of the graph wouldn't be a fair \"same component\" comparison; you'd be comparing a cold filament to a warm one.\n\nTakeaway: Waiting ~5 minutes lets the filament return to room temperature, so reverse-bias data reflects the same starting state as forward-bias.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Why is the procedure to \"start at minimum p.d. and increase gradually\" rather than just setting the desired voltage directly?", "answer": "Starting at minimum p.d. prevents a sudden current surge through the component. If you set a high voltage immediately, the inrush current can exceed the component's rated maximum — especially damaging for diodes (which can be destroyed by excess current), filament lamps (whose cold resistance is much lower than hot resistance, so cold turn-on gives a spike), or sensitive low-power components. Gradually ramping up V means the system reaches steady state at each measurement point and never exceeds safe current. It also gives you cleaner, repeatable data because the component temperature evolves slowly with each step.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "For an I–V graph plotted with I on the y-axis and V on the x-axis, what does the gradient represent, and how do you get R from it? (3 steps)", "answer": "- Step 1: Gradient is $$\\frac{\\Delta I}{\\Delta V} = \\frac{I}{V}$$ (for a line through the origin), which equals $$\\frac{1}{R}$$ by the definition of resistance.\n- Step 2: So to extract R from an ohmic I–V graph, you take the reciprocal: $$R = \\frac{1}{\\text{gradient}}$$.\n- Step 3: Example check: gradient $$= 0.05\\ \\text{A/V}$$ means $$R = 1/0.05 = 20\\ \\Omega$$. Unit check: $$1/(A/V) = V/A = \\Omega$$ ✓.\n\nTakeaway: With I on y-axis, gradient = 1/R, not R itself. If you'd plotted V vs I instead, then gradient would equal R directly.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "Why is it incorrect to use the gradient of a non-ohmic I–V curve at a point to find the resistance at that point? (3 steps)", "answer": "- Step 1: The gradient at a point on a curve is $$\\frac{dI}{dV}$$ — the *differential* (or dynamic) resistance, telling you how I responds to a small change in V around that point.\n- Step 2: But resistance by definition is $$R = V/I$$ at that point — i.e. the slope of the *chord* from the origin to that point, not the slope of the tangent at that point.\n- Step 3: For a curved I–V graph these two slopes are different. For example, on a filament lamp curve, the tangent flattens as V rises (gradient → 0) but R = V/I stays finite and positive — so using the tangent would mislead you into thinking R is huge.\n\nTakeaway: For non-ohmic components, read V and I at the point and compute $$R = V/I$$. Do not use the gradient.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Sketch and describe the I–V characteristic of a fixed ohmic resistor. What feature of the graph confirms it obeys Ohm's law? (2 steps)", "answer": "- Step 1: The graph is a straight line passing through the origin, extending symmetrically into the third quadrant (negative V, negative I) with the same slope.\n- Step 2: Two features confirm Ohm's law: (i) straight line — meaning the gradient (and hence R) is constant; (ii) passes through origin — confirming proportionality $$I \\propto V$$, not just a linear relation like $$I = mV + c$$.\n\nTakeaway: \"Straight line through origin\" is the mark-scheme phrase — both conditions must hold for Ohm's law.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Sketch and explain the I–V characteristic of a tungsten filament lamp. What gives it its characteristic S-shape? (3 steps)", "answer": "- Step 1: The graph is an S-curve symmetric about the origin, bowing toward the V-axis as |V| increases — i.e. for large V, the curve is much shallower than near the origin.\n- Step 2: Physically: as I rises, $$I^2 R$$ heating raises the filament's temperature significantly (up to ~2500 K at full brightness). The tungsten lattice ions vibrate with much greater amplitude.\n- Step 3: Greater vibration amplitude means electrons collide more frequently with the lattice, so resistance increases. Higher R means I rises *less* than proportionally with V — the curve flattens, producing the S-shape.\n\nTakeaway: Near the origin (small V, cool filament), the graph is approximately linear; the curvature appears as the filament heats up.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Sketch and describe the I–V characteristic of a semiconductor diode. What is the threshold voltage and what happens in reverse bias? (3 steps)", "answer": "- Step 1: Forward bias ($$V > 0$$): essentially no current flows until V reaches the threshold voltage $$\\approx 0.6$$–$$0.7\\ \\text{V}$$ (use 0.6 V for silicon unless told otherwise). Beyond threshold, current rises very steeply — the resistance becomes very small.\n- Step 2: Reverse bias ($$V < 0$$): current is effectively zero for all reverse voltages (until breakdown, not examined). The diode \"blocks\" current.\n- Step 3: The graph is highly asymmetric — nothing like the symmetric ohmic/lamp curves. Resistance is very large in reverse bias (effectively infinite) and very small once past threshold in forward bias.\n\nTakeaway: Diodes are one-way valves — the threshold + reverse blocking gives the distinctive hockey-stick shape.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "In reverse bias, what is the resistance of an ideal diode, and why is it a common mistake to say it's zero?", "answer": "In reverse bias the diode does not conduct, meaning $$I \\approx 0$$ for any applied reverse voltage. Since $$R = V/I$$, dividing a finite (negative) voltage by essentially zero current gives an extremely large (effectively infinite) resistance. Students often confuse \"not conducting\" with \"no resistance\" — but conceptually it's the opposite: a component that *blocks* current must have *high* resistance, not zero. Zero resistance would mean a short circuit, where huge currents flow for any tiny voltage — the exact opposite of what a reverse-biased diode does. So: reverse bias ⇒ $$R \\to \\infty$$, not $$R = 0$$.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Describe the I–V characteristic and physical mechanism of an NTC thermistor. What does \"NTC\" stand for and what does it imply? (3 steps)", "answer": "- Step 1: NTC = Negative Temperature Coefficient. This means resistance *decreases* as temperature *increases* — the opposite of a metal.\n- Step 2: I–V graph: symmetric curve bowing toward the I-axis (not the V-axis like a lamp). As V increases, I increases faster than proportionally because self-heating from $$I^2 R$$ raises the temperature, which lowers R, which lets more current flow.\n- Step 3: Microscopic mechanism: thermistors are made of semiconductors. Raising temperature gives more valence electrons enough thermal energy to jump into the conduction band, increasing the number of charge carriers. More carriers → lower resistance.\n\nTakeaway: NTC thermistor and metal lamp curve in opposite directions on an I–V graph — one bows to I-axis (R down with heat), the other to V-axis (R up with heat).", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Describe the I–V behaviour of an LDR and its microscopic mechanism. How does its graph change with illumination level? (3 steps)", "answer": "- Step 1: An LDR (Light-Dependent Resistor) has resistance that decreases as light intensity increases. Microscopically: photons hitting the semiconductor give valence electrons enough energy to become conduction electrons. Brighter light → more photons → more conduction electrons → lower R.\n- Step 2: At a fixed light level, the LDR's I–V graph is approximately linear (near-ohmic) — temperature self-heating effects are usually small compared to the dominant light-driven carrier generation.\n- Step 3: At higher illumination, the line is steeper (because R is lower, so gradient = 1/R is larger). At dim light, the line is shallow. Two LDR lines at different brightness pivot through the origin with different slopes.\n\nTakeaway: LDR is like a \"switchable resistor\" controlled by light — its I–V slope encodes the light level.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Compare and contrast a filament lamp and an NTC thermistor in terms of how their resistance responds to temperature, and which way their I–V curves bow. (3 steps)", "answer": "- Step 1: Both are non-ohmic and both heat up due to $$I^2 R$$, but their R responds in *opposite directions*. Filament lamp (metal): R *increases* with T (more lattice vibration → more collisions). NTC thermistor (semiconductor): R *decreases* with T (more thermal carrier generation → more carriers).\n- Step 2: I–V curve bowing:\n+ Filament lamp bows toward the V-axis — because as V rises, I rises *less* than proportionally (R going up resists the current increase).\n+ NTC thermistor bows toward the I-axis — because as V rises, I rises *more* than proportionally (R going down accelerates the current increase, a positive feedback effect).\n- Step 3: Mnemonic: metals get worse at conducting when hot; semiconductors get better. The curve bends *toward* the axis that \"wins\" — V-axis for lamps (V dominates), I-axis for thermistors (I shoots up).\n\nTakeaway: Same heating cause, opposite resistance response, mirror-image curves.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "For a non-ohmic component, you're given an I–V graph and asked to find R when I = 50 mA. Walk through the method (without doing arithmetic). (3 steps)", "answer": "- Step 1: Locate the point on the curve where the current axis reads 50 mA. Draw a horizontal line at I = 50 mA across to the curve.\n- Step 2: From that intersection, drop down to read off the corresponding V from the voltage axis.\n- Step 3: Compute $$R = V/I$$ using the V you read and $$I = 50 \\times 10^{-3}\\ \\text{A}$$. Do *not* use the gradient of the curve at that point — that gives dI/dV, not R.\n\nTakeaway: For non-ohmic R at a point: (1) find the point, (2) read V and I, (3) divide. Two lines, two readings, one calculation.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "You're asked: \"What p.d. must be applied to a non-ohmic component to give R = 50 Ω?\" Why can't you just calculate the answer directly, and what graphical method solves it? (3 steps)", "answer": "- Step 1: You can't directly compute V because the component is non-ohmic — V and I are linked through the curve, not by a fixed R. You don't know either V or I in advance; both must be found simultaneously.\n- Step 2: Draw a straight line through the origin with gradient $$1/R = 1/50 = 0.020\\ \\text{A/V}$$ — this line represents all (V, I) pairs that would give exactly $$R = 50\\ \\Omega$$. To plot: pick any convenient V, compute I = V/R, mark the point, and connect to the origin.\n- Step 3: Find where this straight line *intersects* the component's I–V curve. That intersection is the unique (V, I) pair that simultaneously satisfies the component's behaviour AND the desired R = 50 Ω. Read V off the x-axis at the intersection — that's your answer.\n\nTakeaway: Straight line = \"all (V,I) giving 50 Ω\"; curve = \"all (V,I) the component can produce\"; intersection = the operating point.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "A tungsten lamp rated 12 V, 24 W operates at full brightness. Conceptually, why does its resistance at 12 V differ from its resistance at, say, 2 V? Compare the trend without doing exact calculation. (3 steps)", "answer": "- Step 1: At 12 V the lamp dissipates 24 W via $$I^2 R$$ heating — the filament reaches ~2500 K (white-hot). At 2 V the lamp dissipates far less power, so the filament is much cooler — maybe a few hundred K above room temperature.\n- Step 2: Resistance in tungsten depends on temperature. Cool filament → less lattice vibration → fewer collisions → lower R. Hot filament → more vibration → more collisions → higher R.\n- Step 3: So R at full brightness (12 V) is *higher* than R at dim operation (2 V). Worked numbers from the chapter illustrate this: ~6 Ω at 12 V, ~4.9 Ω at 8 V, ~2.5 Ω at 2 V — R drops as the lamp dims.\n\nTakeaway: Filament R isn't a single number — it's a temperature-dependent quantity that's small when cold and large when bright.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "A common error: writing $$R = IV$$ instead of $$R = V/I$$. Beyond just memorizing the formula, why must R be a *quotient* rather than a *product*?", "answer": "Think about what resistance should physically represent: it's the *opposition to current flow per unit driving voltage*. If you apply a bigger V but get only a small I, that means R is big. If a small V gives a large I, R is small. This inverse relationship between R and I (for a given V) demands a quotient: $$R = V/I$$. A product $$R = IV$$ would give the opposite (and nonsense) — it would say bigger current means more resistance, which contradicts the definition. Also, dimensional check: $$P = IV$$ has units of watts (energy/time). If R were also IV, it would share units with power — but R has units of ohms (V/A). The quotient gives the right units; the product doesn't.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "A student measures 250 µA at 5.0 V across a component. They compute $$R = 5.0 / (250 \\times 10^{-3}) = 20\\ \\Omega$$. What error did they make and what's the correct answer? (3 steps)", "answer": "- Step 1: They confused µ (micro = $$10^{-6}$$) with m (milli = $$10^{-3}$$). Their formula and method are right; their unit conversion is wrong.\n- Step 2: Correct conversion: $$250\\ \\mu\\text{A} = 250 \\times 10^{-6}\\ \\text{A} = 2.5 \\times 10^{-4}\\ \\text{A}$$.\n- Step 3: Correct calculation: $$R = 5.0 / (2.5 \\times 10^{-4}) = 20{,}000\\ \\Omega = 20\\ \\text{k}\\Omega$$. The student's answer is a factor of 1000 too small.\n\nTakeaway: Always write out the full power of ten when substituting — µ ≠ m, and a mix-up gives a 1000× error.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "For a diode at $$V = -5\\ \\text{V}$$ (reverse bias), an ammeter reads $$I = 0\\ \\text{mA}$$. A student computes $$R = 5/0 = \\text{undefined}$$ and writes \"R = 0\". Explain the correct conceptual interpretation. (2 steps)", "answer": "- Step 1: Mathematically $$5/0$$ is undefined, but physically we interpret \"I = 0\" as \"I is so small the ammeter cannot detect it\" — in reality there is a tiny leakage current, far below the meter's resolution. As current approaches zero, $$R = V/I$$ approaches infinity.\n- Step 2: So the correct statement is $$R \\to \\infty$$ (effectively infinite, or \"very large\") — *not* zero. A reverse-biased diode acts as an open circuit, blocking current; an open circuit has infinite resistance, not zero.\n\nTakeaway: \"No conduction\" means high R, not zero R. The intuition: if R were zero, current would be huge for any V — the opposite of blocking.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "Why is the I–V graph for an ohmic conductor symmetric about the origin (extending into the third quadrant with the same gradient)? (2 steps)", "answer": "- Step 1: Reversing the supply polarity reverses the direction of the electric field in the conductor, which reverses the direction of electron drift — so both V and I switch sign. The *magnitude* of R, however, depends only on the lattice and temperature, not on direction.\n- Step 2: So if forward gives ($$+V$$, $$+I$$) on a straight line of gradient 1/R, reverse gives ($$-V$$, $$-I$$) on the same straight line (extended through the origin), with the same slope. The graph is rotationally symmetric (180°) about the origin.\n\nTakeaway: For ohmic (and most non-ohmic non-diode) components, polarity reversal is just a sign flip — the physics is the same in both directions.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Why is a diode's I–V graph *not* symmetric about the origin, while a thermistor's *is*? (3 steps)", "answer": "- Step 1: A diode is made from a p-n junction — an asymmetric structure with p-type material on one side and n-type on the other. Forward bias lowers the depletion region's barrier (allows current); reverse bias widens it (blocks current). The two directions are physically distinct.\n- Step 2: A thermistor is made from a homogeneous semiconductor (or symmetric structure) — there's no preferred direction. Whatever happens for +V (heating reduces R, current grows quickly) happens identically for −V.\n- Step 3: So diode I–V is asymmetric (hockey-stick: blocks one way, conducts the other), while thermistor I–V is symmetric (mirror images either side of origin).\n\nTakeaway: Symmetry of the I–V graph reflects the symmetry (or lack thereof) of the underlying component structure.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Sketch the circuit used to obtain an I–V characteristic. Where do the ammeter and voltmeter go, and why? (3 steps)", "answer": "- Step 1: Variable supply (potentiometer / potential divider) connected to provide a continuously variable p.d. from 0 to maximum across the test component.\n- Step 2: Ammeter in *series* with the component — because the ammeter measures the current flowing *through* the component, and series ensures all the current passes through both. An ideal ammeter has zero resistance, so it doesn't disturb the current.\n- Step 3: Voltmeter in *parallel* with the component — because the voltmeter measures the p.d. *across* the component, which is the potential difference between two points. An ideal voltmeter has infinite resistance, so it draws no current and doesn't disturb the measurement.\n\nTakeaway: Ammeter measures *through* (series), voltmeter measures *across* (parallel). Both must minimally disturb what they're measuring.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "A student claims \"a resistor stores electrons — that's why current decreases through it.\" What's wrong with this picture, and what actually happens? (3 steps)", "answer": "- Step 1: This violates conservation of charge (Kirchhoff's first law): the current entering any component equals the current leaving it in steady state. If electrons were being \"stored,\" charge would build up indefinitely — which doesn't happen.\n- Step 2: What actually happens: each electron *slows down* due to collisions with the lattice. The same number of electrons per second enters and exits, but their drift velocity is reduced inside the resistor relative to thinner-wire regions.\n- Step 3: The electrons lose kinetic energy in collisions, transferring it to the lattice as heat. Energy is dissipated; charge is conserved. A resistor is an *energy converter* (electrical → thermal), not a *charge reservoir*.\n\nTakeaway: Same charge through, less energy out (as electrical) — the missing energy went to heat, not to \"stored electrons\".", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "A nichrome wire's I–V graph is a straight line through the origin with gradient $$0.055\\ \\text{A/V}$$. Conceptually, what is R, and what would happen to the gradient if you doubled the wire's length? (3 steps)", "answer": "- Step 1: For a line through the origin on an I-vs-V graph, gradient = 1/R, so $$R = 1/0.055 \\approx 18\\ \\Omega$$.\n- Step 2: From the resistivity relation $$R = \\rho L / A$$, doubling L doubles R (everything else equal). So new $$R \\approx 36\\ \\Omega$$.\n- Step 3: Since gradient = 1/R, doubling R *halves* the gradient — new gradient $$\\approx 0.0275\\ \\text{A/V}$$. The line becomes shallower, meaning less current for the same voltage.\n\nTakeaway: Length and resistance go up together; length and I–V gradient go in opposite directions.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "Filament lamp question: at $$V = 8\\ \\text{V}$$ the graph shows $$I \\approx 1.6\\ \\text{A}$$, and at $$V = 2\\ \\text{V}$$ it shows $$I \\approx 0.8\\ \\text{A}$$. Without exact arithmetic, compare R at these two points. (3 steps)", "answer": "- Step 1: At V = 8 V, I ≈ 1.6 A → R = V/I ≈ 8/1.6 = 5 Ω (rough mental estimate).\n- Step 2: At V = 2 V, I ≈ 0.8 A → R ≈ 2/0.8 = 2.5 Ω.\n- Step 3: R is higher when V is higher — consistent with the filament being hotter, more lattice vibration, more collisions. This confirms non-ohmic behaviour: if it were ohmic, the same R should appear at both points.\n\nTakeaway: Plug in two different points on a non-ohmic curve and you get two different R values — that's the diagnostic of non-ohmic.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Why does a diode in forward bias have very low resistance once V exceeds the threshold, but virtually infinite resistance below threshold and in reverse bias? (3 steps)", "answer": "- Step 1: A diode's p-n junction has a built-in potential barrier (the depletion region) that prevents electron flow across it.\n- Step 2: Forward bias below threshold: the applied V isn't large enough to overcome the barrier — almost no current flows, so R = V/I is very large. Above threshold (~0.6 V for Si): the barrier is overcome, electrons flow freely, current rises steeply, and R becomes very small.\n- Step 3: Reverse bias: the applied V *widens* the depletion region rather than narrowing it — the barrier becomes even harder to cross. I stays essentially zero regardless of |V|, so R → ∞.\n\nTakeaway: The threshold marks where the applied voltage finally overcomes the built-in barrier — below it, the diode is essentially an open circuit.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "Conceptually, why does the thermistor I–V curve bow toward the I-axis (creating a positive-feedback shape)? (3 steps)", "answer": "- Step 1: At low V, the thermistor is near room temperature with relatively high R, so current rises slowly with V — much like a normal resistor.\n- Step 2: As V (and hence I and $$I^2 R$$ power) increases, the thermistor self-heats. Higher T promotes more electrons into the conduction band, *reducing* R.\n- Step 3: Reduced R means even more current flows for the next voltage increment — this accelerates the rise of I with V, causing the curve to bend upward away from a straight line, toward the I-axis. It's a positive feedback loop limited only by heat dissipation to surroundings.\n\nTakeaway: Self-heating + negative temperature coefficient = positive feedback in I — the curve \"runs away\" upward.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "Why is an LDR's I–V graph approximately linear at a fixed light level, even though it's labelled \"non-ohmic\"? (3 steps)", "answer": "- Step 1: The LDR's resistance depends primarily on incident light intensity — photons promote electrons to the conduction band. At a *fixed* illumination, the number of carriers is roughly constant.\n- Step 2: Unlike a thermistor or lamp, the LDR doesn't significantly self-heat at modest currents (usually used in low-power sensor circuits), so its temperature stays near ambient and R stays nearly constant.\n- Step 3: With roughly constant R, the I–V graph at fixed light is roughly linear through the origin — looking ohmic. But it's classed non-ohmic because R is *not* a fixed material property; it changes when the light changes. So a \"family\" of straight lines at different illumination levels, not a single line.\n\nTakeaway: An LDR is \"ohmic-like\" within a fixed illumination, but the slope (R) changes between illumination levels — that's why it's non-ohmic overall.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Why do we plot I on the y-axis and V on the x-axis for I–V characteristics, by convention? (2 steps)", "answer": "- Step 1: V is the *independent* variable in the experiment — the experimenter sets V using the potential divider, and I is the dependent response of the component. Conventionally, independent variable goes on the x-axis, dependent on the y-axis.\n- Step 2: A consequence: gradient = $$\\Delta I / \\Delta V = 1/R$$, which is convenient for reading the conductance (1/R) directly from the slope. If you'd plotted V vs I instead, gradient would equal R — also valid, but the I-vs-V convention is standard in textbooks.\n\nTakeaway: I-on-y is convention + experimental logic (V is what you control). Just remember: gradient is 1/R, not R.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "Two students each calculate the resistance of a non-ohmic component at $$V = 2\\ \\text{V}$$. Student A draws a tangent to the curve at that point and measures the tangent's slope. Student B reads off I at V = 2 V and computes V/I. Who is correct and why? (3 steps)", "answer": "- Step 1: Student B is correct. Resistance is defined as $$R = V/I$$ — the actual values of V and I at the operating point, divided.\n- Step 2: Student A has computed the *differential* (dynamic) resistance $$r_d = dV/dI$$ — the slope of the tangent. This tells you how a small change in V around 2 V produces a small change in I, but it's *not* the resistance R = V/I at that point.\n- Step 3: Geometrically: Student B is using the slope of the *chord* from the origin to the operating point; Student A is using the slope of the *tangent* at the operating point. For curved I–V graphs these are different. R = V/I is the chord slope (inverted).\n\nTakeaway: Resistance at a point = chord from origin, not tangent at the point. Same on graphs; very different in value for nonlinear curves.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "An NTC thermistor is connected in series with a fixed resistor across a battery. As temperature rises, does the voltage across the *fixed* resistor go up or down? Explain. (3 steps)", "answer": "- Step 1: As T rises, the thermistor's resistance $$R_{th}$$ decreases. The fixed resistor's resistance $$R_f$$ stays the same. Total resistance $$R_f + R_{th}$$ decreases.\n- Step 2: In a series voltage divider, $$V_{R_f} = \\frac{R_f}{R_f + R_{th}} \\cdot V_{\\text{supply}}$$. The denominator gets smaller (because $$R_{th}$$ drops), while $$R_f$$ in the numerator stays the same.\n- Step 3: So $$V_{R_f}$$ *increases* as temperature rises. The fixed resistor takes a larger share of the supply voltage because the thermistor is \"giving up\" its share. This is the principle behind temperature-sensor circuits where $$V_{\\text{out}}$$ rises with temperature.\n\nTakeaway: Voltage shares like resistance fractions — when one drops, the other rises.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "A common exam question: \"Explain why the I–V graph for a filament lamp is curved.\" Give the two-mark microscopic explanation. (2 steps)", "answer": "- Step 1: As current increases, the tungsten filament temperature rises due to $$I^2 R$$ (resistive) heating. The metal lattice ions vibrate with greater amplitude.\n- Step 2: Greater vibration amplitude means conduction electrons collide more frequently with the lattice ions, increasing resistance. Higher R means current rises *less than proportionally* with V — the graph curves away from a straight line (bowing toward the V-axis).\n\nTakeaway: Two marks = (1) more heat → more lattice vibration; (2) more collisions → higher R → curve.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Why is the threshold voltage for a silicon diode approximately 0.6–0.7 V, and what does this represent physically?", "answer": "The threshold voltage represents the minimum applied forward bias needed to overcome the built-in potential barrier of the silicon p-n junction. This barrier arises because, when p-type and n-type silicon are joined, electrons diffuse across and create a depletion region with an internal electric field. The width and height of this barrier in silicon corresponds to ~0.6–0.7 V — meaning the external V must reach this value before significant current can flow. Below threshold, applied V partially cancels the barrier but not enough; above threshold, the barrier is essentially nullified and current rises exponentially. Different semiconductors give different thresholds (e.g. germanium ~0.3 V) because their internal barrier heights differ. For exam purposes, use 0.6 V for silicon unless stated otherwise.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "When measuring an I–V characteristic, why must you include a protective resistor in series with the component (especially for a diode)? (2 steps)", "answer": "- Step 1: A diode in forward bias past threshold has very small resistance — meaning even a small voltage above ~0.6 V would drive a huge current through it ($$I = V/R$$ with tiny R), instantly destroying it.\n- Step 2: A protective resistor (often 10 Ω to a few hundred Ω) in series limits the maximum current to a safe value $$I_{\\max} \\approx V_{\\text{supply}}/R_{\\text{protect}}$$. The component's I–V is still measured correctly (use the voltmeter across the *component*, not the resistor) but it's safeguarded.\n\nTakeaway: Tiny R means runaway I — always include a current-limiting resistor with diodes and sensitive components.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Why is the gradient of the I–V curve at a *single chosen point* for a tungsten lamp **smaller** than 1/R at the same point? (3 steps)", "answer": "- Step 1: At a given operating point (V, I) on the lamp's S-curve, the chord from the origin has slope $$I/V = 1/R$$.\n- Step 2: The tangent at that same point has slope $$dI/dV$$. For a filament lamp where the curve is bowing toward the V-axis, the tangent is *less steep* than the chord — because the curve is flattening as V rises.\n- Step 3: So $$dI/dV < I/V$$, equivalently $$r_d > R$$ — the differential resistance exceeds the static resistance. Physically: a small extra ΔV adds heat, which raises R further, so the marginal current increase is less than the proportionally-expected amount.\n\nTakeaway: For a lamp, tangent slope < chord slope; equivalently, differential R > static R. This sub-linear response is *the* signature of the lamp's behaviour.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Why must readings for a filament lamp's I–V curve be taken \"briefly\" to avoid distortion? (2 steps)", "answer": "- Step 1: If you hold each V setting for a long time, the filament continues to heat up beyond the steady state for that V, drifting toward higher R and lower I. Successive readings become biased upward in temperature, so the curve you measure is not a true (V, I) characteristic but a \"thermal history\" curve.\n- Step 2: By keeping each reading brief and starting from cool, you minimize cumulative heating between measurements. Ideally you'd let the filament fully cool between points — though practically the steady-state at each V is reached quickly because the filament is small and radiates heat rapidly.\n\nTakeaway: Take a reading, move on. Lingering at one V skews the next data point.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "A circuit has a battery and one resistor. The current is 2 A. A student says: \"If I add another identical resistor in series, the current must still be 2 A because the same number of electrons enter and leave.\" What's wrong with this reasoning? (3 steps)", "answer": "- Step 1: The student conflates *conservation of charge* (Kirchhoff's first law) with *constancy of current*. Charge is conserved — what enters a junction leaves it — but the *rate* of flow (current) can change between circuits with different total resistance.\n- Step 2: Adding a second resistor in series doubles the total resistance: $$R_{\\text{total}} = 2R$$. With the same EMF, Ohm's law gives $$I = V/R_{\\text{total}} = V/(2R)$$ — half the original current.\n- Step 3: Conservation of charge means the same (smaller) current flows through every element in the new series circuit. So I = 1 A everywhere, not 2 A. Charge conservation applies *within* a circuit; it doesn't fix I between different circuits.\n\nTakeaway: KCL says current is the same at every series point in a circuit, not that I stays the same when you modify the circuit.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Why does the I–V graph for an LDR shift to a steeper slope under brighter light? (3 steps)", "answer": "- Step 1: Brighter light = more photons per second hitting the semiconductor material in the LDR.\n- Step 2: Each absorbed photon (of sufficient energy) excites an electron from the valence band to the conduction band, creating a new charge carrier. So more light → more carriers → lower resistance.\n- Step 3: Lower R means higher current for the same V, hence a steeper I–V line (since gradient = 1/R). Plotting at increasing brightness gives a family of straight lines through the origin, fanning out with steeper slopes.\n\nTakeaway: Photons = free carriers = lower R = steeper I–V line. The slope encodes the brightness.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "For an ohmic conductor, a textbook says \"resistance is constant.\" Under what conditions does this constancy fail, and why? (3 steps)", "answer": "- Step 1: Ohm's law requires *constant temperature*. If the conductor heats up due to large currents (significant $$I^2 R$$), the lattice vibrates more and R rises — the same metal that was ohmic at low currents becomes non-ohmic at high currents.\n- Step 2: For metals, this typically means I–V is linear at very small V (negligible heating), but for substantial V the line curves — which is exactly what we see with a filament lamp (it's the *same physics* as nichrome resistance wire, just at much higher temperatures).\n- Step 3: Other failures: extreme magnetic fields, mechanical stress changing dimensions, or proximity to superconducting transition. But the main exam-relevant failure mode is just self-heating.\n\nTakeaway: \"Ohmic\" is a low-power, constant-T idealization. Push enough current and almost any conductor becomes non-ohmic.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "Conceptually, why does the same component (e.g. a wire) have different resistance values reported in different experiments? Aside from measurement error, what's the physical reason? (3 steps)", "answer": "- Step 1: Temperature: room temperature varies, and even small T changes shift R for metals. A wire at 20°C has different R than at 25°C.\n- Step 2: Current during measurement: if the measuring current is large, $$I^2 R$$ heating raises the wire's T above ambient, increasing measured R. Low-current measurements give R closer to true ambient-T R.\n- Step 3: Reading method: if you use the tangent of an I–V curve at high V (differential R), you'd get a different number than if you used V/I (static R) at the same point — relevant for non-ohmic components.\n\nTakeaway: R depends on T, on current, and on which definition (static vs differential) you use. \"Constant R\" requires a constant operating regime.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "Diode in forward bias: at $$V = 0.64\\ \\text{V}$$ the current is 5 mA, at $$V = 0.74\\ \\text{V}$$ the current is 40 mA. Without computing exact R values, comment on how R changes between these two points. (3 steps)", "answer": "- Step 1: At V = 0.64 V, I = 5 mA → R ≈ 0.64/0.005 = 128 Ω (rough mental estimate).\n- Step 2: At V = 0.74 V, I = 40 mA → R ≈ 0.74/0.04 ≈ 18.5 Ω.\n- Step 3: R *plummets* from ~130 Ω to ~20 Ω with only a 0.1 V increase in V. This dramatic drop is the hallmark of diode behaviour above threshold — once past the barrier, R decreases exponentially with V, leading to the nearly vertical steep rise on the I–V graph.\n\nTakeaway: Diode R isn't gradually changing — it crashes by orders of magnitude across a small V range past threshold.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Sketch the relationship \"resistance vs. potential difference\" (R as a function of V) for a tungsten filament lamp. How does it differ from a fixed resistor's R-vs-V plot? (3 steps)", "answer": "- Step 1: For a fixed (ohmic) resistor: R is constant, so the R-vs-V graph is a horizontal straight line at $$R = R_0$$.\n- Step 2: For a tungsten filament: R increases with V (because higher V → higher I → more heating → higher R). The R-vs-V curve rises monotonically, starting at R₀ (room-T value) at V = 0 and growing — often by a factor of 5–10× from cold to full brightness.\n- Step 3: The curve is symmetric about V = 0 (R doesn't depend on direction), so for V < 0 the curve mirrors the positive side. Net shape: a U or \"bathtub\" with minimum R at V = 0.\n\nTakeaway: R-vs-V flat for ohmic, rising U-shape for filament. Don't confuse with the I-vs-V graph itself.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Explain why \"showing the lamp obeys Ohm's law at small V\" is consistent with the I–V curve being slightly bent overall. (3 steps)", "answer": "- Step 1: Near V = 0, the filament is at room temperature and barely heats up — so R is approximately constant in this regime.\n- Step 2: With R approximately constant, $$I \\propto V$$ holds locally, and the I–V curve is approximately straight near the origin — i.e. the lamp is \"approximately ohmic\" at small V.\n- Step 3: Away from the origin, $$I^2 R$$ heating becomes significant, R rises, and the curve deviates from the linear extrapolation — the S-shape becomes apparent. So Ohm's law holds in the limit V → 0 (or more accurately, in the low-power limit), and the full I–V curve is the result of departing from this limit at higher V.\n\nTakeaway: Ohm's law is a local approximation near V = 0; the curvature is the non-ohmic correction that grows with V.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "Why is the diode I–V graph practically zero current for ALL reverse voltages from 0 to (say) −10 V, instead of slowly increasing in magnitude like for ohmic components? (2 steps)", "answer": "- Step 1: In reverse bias, the depletion region of the p-n junction *widens*, increasing the barrier height. There are essentially no charge carriers available to cross the barrier — the few minority carriers give a tiny leakage current (often in nA), far below typical ammeter resolution.\n- Step 2: This leakage current is approximately *independent* of reverse V (it's \"saturated\" by the limited supply of minority carriers, not by V). So increasing |V| in reverse doesn't significantly increase |I| — the line stays near zero. Hence \"flat at I = 0\" rather than \"linear with V\" for reverse bias.\n\nTakeaway: Reverse-bias current is supply-limited (no carriers), not field-limited — so it doesn't grow with V the way an ohmic current would.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "A lamp rated 6 V, 3 W has an I–V graph available. The same lamp is operated at 3 V. Compared to its rated operating R, will the R at 3 V be larger, smaller, or the same? Explain qualitatively. (3 steps)", "answer": "- Step 1: At 6 V, lamp dissipates 3 W, filament reaches operating temperature (let's say ~2000 K) — full brightness.\n- Step 2: At 3 V, power dissipation is much less (less than 1 W — roughly P scales with V² for fixed R, but R also drops, so actual P falls fast). Filament is much cooler — perhaps only a few hundred K above ambient.\n- Step 3: Cooler filament → less lattice vibration → fewer collisions → lower R. So R at 3 V is *smaller* than R at the rated 6 V. The cold-vs-hot R ratio can be 5–10× for tungsten.\n\nTakeaway: Dimmer lamp = cooler filament = lower R. Resistance scales up with operating temperature.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "What's the difference between a \"rheostat\" and a \"potentiometer\" in terms of circuit topology and the range of V they can deliver? (3 steps)", "answer": "- Step 1: A *rheostat* is a variable resistor wired as a 2-terminal device in series with the load — only two of the three terminals are used. Sliding changes the resistance in the circuit, which changes I (and hence V across load) via $$V = IR_{\\text{load}}$$.\n- Step 2: A *potentiometer* (potential divider) uses all three terminals: the full track is connected across the supply, and the load is connected between the slider (wiper) and one end. The slider taps off a fraction of the supply voltage.\n- Step 3: Range: rheostat cannot give V_load = 0 (there's always some current flowing) — minimum V is set by the rheostat's max R. Potentiometer can give V_out from exactly 0 V (slider at one end) to full supply (slider at other end) — continuous from 0 to V_max.\n\nTakeaway: Same physical device, different wiring. Three terminals used = potentiometer = full 0-to-Vmax range. Two terminals = rheostat = limited range.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "Why is it physically wrong to think of the gradient of the I–V graph at the origin (V = 0, I = 0) as defining R for a non-ohmic component? (3 steps)", "answer": "- Step 1: At the origin, both V = 0 and I = 0, so R = V/I = 0/0 is mathematically undefined. R is not directly meaningful at this single point — you need a finite operating point.\n- Step 2: The *tangent slope at the origin* (limit of dI/dV as V → 0) tells you about the small-signal behaviour around V = 0 — for an ohmic component this equals 1/R, but for a non-ohmic component it's just the differential resistance in the limit, not the resistance at some other operating V.\n- Step 3: For non-ohmic components, R changes with V. Knowing the slope at the origin doesn't tell you R at, say, V = 5 V. Each operating point has its own R = V/I that must be read off separately.\n\nTakeaway: For non-ohmic, \"R\" isn't a single number — it's a function of operating point. The origin gives no information beyond local small-signal behaviour.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "A simple exercise: a fixed resistor has $$V = 6\\ \\text{V}$$ across it and $$I = 30\\ \\text{mA}$$ through it. Find R and the power dissipated. (3 steps)", "answer": "- Step 1: $$R = V/I = 6/(30 \\times 10^{-3}) = 6/0.03 = 200\\ \\Omega$$.\n- Step 2: Power can be computed three equivalent ways: $$P = VI = 6 \\times 0.03 = 0.18\\ \\text{W}$$; or $$P = I^2 R = (0.03)^2 \\times 200 = 0.18\\ \\text{W}$$; or $$P = V^2/R = 36/200 = 0.18\\ \\text{W}$$. All agree ✓.\n- Step 3: Interpretation: this 200 Ω resistor turns 0.18 W of electrical energy into heat each second. The choice of formula depends on what's known — here, all three quantities are accessible.\n\nTakeaway: Mental check of all three power formulas should give the same number — a quick verification.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "Conceptually, why is it harder to set up an accurate I–V experiment near the origin for a non-ohmic component than for an ohmic one? (3 steps)", "answer": "- Step 1: Near V = 0, both I and V are very small. Meter resolution becomes limiting: an ammeter reading $$0.5\\ \\text{mA} \\pm 0.1\\ \\text{mA}$$ has a 20% uncertainty, while at higher currents the percentage uncertainty drops.\n- Step 2: For an ohmic component near origin, the small-V data is less critical — you can extrapolate the well-measured high-V linear portion through the origin and still get accurate R.\n- Step 3: For a non-ohmic component (especially a diode), the near-origin region is *exactly* where the characteristic behaviour (threshold, exponential turn-on) happens. You need fine resolution and tight V control here, which is why the potentiometer (giving smooth 0-up sweep) is essential and high-resolution meters are preferred.\n\nTakeaway: Near-origin matters most for non-ohmic, exactly where measurement is hardest. Good apparatus + careful technique required.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "A diode is connected in series with a 220 Ω resistor and a 5 V battery. Without doing exact calculation, estimate the current through the diode and the voltage across the resistor, given the diode threshold is ~0.7 V. (3 steps)", "answer": "- Step 1: Once past threshold, the diode is approximately a 0.7 V drop regardless of current (its R is very small). So the diode \"consumes\" ~0.7 V from the supply.\n- Step 2: Remaining voltage across the resistor: $$V_R \\approx 5 - 0.7 = 4.3\\ \\text{V}$$.\n- Step 3: Current through the circuit: $$I \\approx V_R/R = 4.3/220 \\approx 20\\ \\text{mA}$$. This is the diode current too (series circuit). The resistor is what actually controls the current; the diode just sits at ~0.7 V.\n\nTakeaway: In a \"diode + resistor\" series circuit, treat the diode as a fixed 0.7 V drop; the resistor governs the current.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Why are LDRs and thermistors useful as *sensors* in potential divider circuits? (3 steps)", "answer": "- Step 1: Their resistance changes substantially with an external physical condition (light for LDR, temperature for thermistor). This makes the resistance a \"transducer\" — converting a physical quantity into an electrical quantity.\n- Step 2: In a potential divider, the output voltage $$V_{\\text{out}} = \\frac{R_2}{R_1 + R_2} V_{\\text{in}}$$ depends on the resistance ratio. If R₂ is the sensor, $$V_{\\text{out}}$$ shifts as the sensed condition changes — turning a resistance change into a voltage change that downstream circuits can read.\n- Step 3: This Vout can trigger switches (street lights at night when LDR resistance rises, fans when thermistor signals high T, etc.). The sensor + divider combination is the standard analog interface between the physical world and electronic control.\n\nTakeaway: LDR/thermistor + potential divider = physical-quantity-to-voltage converter, the building block of analog sensing.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "A common confusion: \"If a diode blocks current in reverse bias, then it has infinite resistance — but if it has infinite resistance, how can ANY current flow even in forward bias?\" Resolve this. (3 steps)", "answer": "- Step 1: The resistance of a diode is NOT a fixed value. R = V/I varies dramatically with both magnitude and direction of V. In reverse bias R is effectively infinite (no carriers); in forward bias past threshold, R can be just a few ohms (carriers flow freely).\n- Step 2: So saying \"the diode has infinite R in reverse bias\" is a *local* statement — it applies only when V is negative. The same diode, when V is sufficiently positive, behaves completely differently.\n- Step 3: This direction-dependent behaviour is exactly what makes a diode a *valve* — high R one way, low R the other. The asymmetry is the entire point of the component.\n\nTakeaway: Diode R is not a number; it's a function of V (and V's sign). \"Infinite reverse R\" and \"small forward R\" coexist as different operating points.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "When the question says \"estimate the resistance of the lamp from its I–V graph at V = 6 V\" — give the procedure step by step. (3 steps)", "answer": "- Step 1: Locate V = 6 V on the x-axis of the I–V graph. Draw a vertical line up to where it intersects the lamp's curve.\n- Step 2: From the intersection point, draw a horizontal line across to the y-axis. Read off I at this point (e.g. 1.2 A — graph-specific).\n- Step 3: Compute $$R = V/I = 6 / 1.2 = 5\\ \\Omega$$ (example value). Do NOT take the gradient of the curve at that point — that would give the differential resistance, not R.\n\nTakeaway: For a non-ohmic component: read both V and I at the point, then divide. Two lines, two readings, one ratio.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "Why must the *temperature of a metal wire be controlled* in Ohm's law experiments, but this control is *less critical for a fixed carbon resistor*? (3 steps)", "answer": "- Step 1: The resistivity of a metal increases with temperature relatively strongly — a temperature change of tens of K can change R by a measurable percentage. If you let the wire heat up during measurement, you'll see R drifting.\n- Step 2: Carbon (and most commercial fixed resistors with similar materials) has a *much smaller* temperature coefficient — its R changes far less per degree. So small heating during measurement gives only a tiny change in R, often within measurement uncertainty.\n- Step 3: Practical implication: when verifying Ohm's law for a \"metallic conductor,\" use low currents and short measurement times to avoid heating effects (or accept that you're not in the strict constant-T regime). For a carbon resistor in a lab, this isn't a major concern.\n\nTakeaway: \"Constant T\" matters more for metals than for engineered resistors — the latter are designed to minimize T-dependence.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": true}], "count": 57}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "How is resistance defined as an equation, and does this definition depend on whether the component is \"ohmic\" or not?", "answer": "Resistance is defined by $$R = \\dfrac{V}{I}$$ — the potential difference across a component divided by the current through it. This definition is universal: it applies to a fixed resistor, a filament lamp, a diode, a thermistor, an LDR — anything. The component does not have to be \"ohmic\" for this equation to hold; $$R$$ is simply *defined* this way. What changes between ohmic and non-ohmic components is whether $$R$$ stays constant as you vary $$V$$ — not whether the definition itself applies. The SI unit is the ohm ($$\\Omega$$), where $$1\\,\\Omega = 1\\,\\mathrm{V/A}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why is writing \"$$R = IV$$\" a serious physics error, and what would the units immediately tell you? (3 steps)", "answer": "- Step 1: The definition is $$R = V/I$$ (a quotient), not $$IV$$ (a product). Phuc made this slip in lesson and was corrected immediately — it's a classic exam-killer.\n- Step 2: Units check: $$V \\times A = \\text{volts}\\cdot\\text{amps} = \\text{watts}$$. So $$IV$$ gives you power in $$\\mathrm{W}$$, not resistance in $$\\Omega$$. A unit analysis instantly catches the error.\n- Step 3: Conceptually, resistance is \"how much voltage is needed *per unit* of current pushed through\" — that's intrinsically a ratio. A product would mean larger currents at larger voltages give larger resistance, which is nonsense.\n\nThe lesson: always sanity-check by units. $$\\mathrm{V/A} = \\Omega$$; $$\\mathrm{V\\cdot A} = \\mathrm{W}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "At the microscopic level, what physically causes the \"resistance\" of a metal wire, and where does the electrical energy go? (3 steps)", "answer": "- Step 1: Inside a conductor, free conduction electrons drift under the applied electric field. The metal lattice consists of fixed positive ions vibrating about equilibrium positions.\n- Step 2: As electrons drift through, they collide with these vibrating lattice ions. Each collision transfers kinetic energy from the electron to the ion — the ion vibrates with greater amplitude, which is exactly what \"thermal energy\" means microscopically.\n- Step 3: So electrical energy supplied by the source is dissipated as heat inside the resistor. The resistor heats up. This is the \"resistive heating\" or \"Joule heating\" effect, and the rate is $$P = I^2 R$$.\n\nKey insight: resistance is *not* about \"storing\" or \"blocking\" electrons — it's about electrons losing kinetic energy through collisions, slowing their drift velocity.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "A student says \"a resistor stores electrons that don't make it through.\" Why is this wrong, and what actually happens? (3 steps)", "answer": "- Step 1: Charge is conserved at every junction and along every wire (Kirchhoff's current law). The number of electrons entering the resistor per second equals the number leaving per second — the resistor cannot accumulate charge in steady state.\n- Step 2: What the resistor does is reduce the *drift velocity* of electrons. The same total flux of electrons passes through, but slower than it would without resistance — so the *current* (rate of charge flow) is smaller for a given voltage.\n- Step 3: The energy \"lost\" doesn't go into stored electrons — it goes into heat via collisions with lattice ions. So a resistor is a *slowing-down + heating* device, not a *storage* device.\n\nThis was Phuc's exact misconception in the lesson — Marta corrected it explicitly.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "State Ohm's Law precisely as a physical law, and explain why writing \"Ohm's law is $$R = V/I$$\" is wrong.", "answer": "Ohm's Law states: **for a metallic conductor at constant temperature, the current through it is directly proportional to the potential difference across it** — i.e., $$I \\propto V$$, equivalently $$R$$ is constant. The equation $$R = V/I$$ is the *definition* of resistance and applies to every component (ohmic or not). Ohm's Law is a stronger, separate claim — that this ratio $$R$$ doesn't depend on $$V$$ or $$I$$ under the stated conditions (metal, constant T). Saying \"Ohm's law is $$R = V/I$$\" confuses a definition with a physical law and gives no mark on an Edexcel paper.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Why must \"constant temperature\" appear in the statement of Ohm's law? What goes wrong if temperature is allowed to change? (3 steps)", "answer": "- Step 1: As current flows through a metal, $$I^2 R$$ heating warms it up. So if you push more current, the metal gets hotter.\n- Step 2: In a hot metal, lattice ions vibrate with larger amplitude, so conduction electrons collide more frequently per unit drift distance. Resistance therefore *rises with temperature*.\n- Step 3: If $$R$$ rises with $$V$$ (because higher $$V$$ → higher $$I$$ → hotter → higher $$R$$), then $$I$$ no longer rises in proportion to $$V$$ — the ratio $$V/I$$ keeps drifting. The linear relationship breaks. That's exactly why a filament lamp is non-ohmic: it heats up significantly.\n\nThe \"constant temperature\" clause exists to *isolate* the geometric/material constants of $$R$$ from thermal feedback.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "When experimentally obtaining an I–V characteristic, why is a potentiometer (potential divider) preferred over a simple rheostat in series? (3 steps)", "answer": "- Step 1: A simple rheostat (variable resistor in series with the supply) limits the current by adding resistance. Even at maximum rheostat resistance, the supply EMF still drives *some* current through the component — you cannot reach $$V = 0$$ across the component.\n- Step 2: This matters because the most physically interesting region of an I–V graph is often *near the origin* (proving proportionality, identifying threshold voltages for diodes, etc.). Missing data near $$V = 0$$ leaves the linearity test unverified.\n- Step 3: A potentiometer (rheostat wired as a potential divider) lets you tap any fraction of the supply, from $$0$$ V continuously up to maximum. Textbook table confirms: rheostat gives $$V_{\\min} = 0.50$$ V; potentiometer gives $$V_{\\min} = 0.00$$ V.\n\nBottom line: potentiometer = full range $$[0, V_\\max]$$; rheostat = restricted range $$[V_\\min, V_\\max]$$.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "Why must you wait several minutes between forward-bias and reverse-bias runs when taking an I–V characteristic of a filament lamp? (2 steps)", "answer": "- Step 1: During the forward run, the filament heats up substantially — its resistance is now much higher than at room temperature. If you immediately reverse polarity and start measuring, the first data points are taken at *elevated* temperature, not room temperature.\n- Step 2: This makes the two halves of the I–V graph inconsistent — they were taken at different effective temperatures, so direct comparison isn't valid. Waiting ≥5 minutes lets the filament cool back to room temperature, so the negative-V half starts from the same physical baseline as the positive-V half.\n\nThe same logic applies to thermistors — anywhere the component's $$R$$ depends on temperature.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Why must you start each experimental run at the *minimum* potential difference rather than at maximum?", "answer": "Two reasons. First, **safety/component protection**: starting at full voltage may produce a current surge exceeding the component's safe rating — burning out filaments, damaging diodes, or overheating thermistors. Second, **physical consistency**: starting low and gradually increasing means the early data points are taken with the component near room temperature, so the low-$$V$$ end of the graph reflects the cold component (e.g., a filament lamp is nearly ohmic at low V because it hasn't heated yet). Starting high and decreasing would give you a \"hot\" component throughout, distorting the shape.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "On a conventional I–V graph (I on y-axis, V on x-axis), what does the gradient represent, and how does it relate to resistance for an ohmic conductor? (2 steps)", "answer": "- Step 1: Gradient is $$\\dfrac{\\Delta I}{\\Delta V} = \\dfrac{I}{V}$$ (for a line through the origin). Since $$R = V/I$$, the gradient is the *reciprocal* of resistance: $$\\text{gradient} = \\dfrac{1}{R}$$.\n- Step 2: Therefore, for an ohmic conductor: $$R = \\dfrac{1}{\\text{gradient}}$$. A *steeper* line on an I–V plot means *lower* resistance (more current per unit voltage). A shallower line means higher resistance.\n\nWatch out: if the axes were swapped (V vs I), then gradient = $$V/I = R$$ directly. Edexcel convention is I on y-axis, so reciprocal is needed.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "For a non-ohmic component (e.g. filament lamp or diode), why is it wrong to read $$R$$ at a point as \"1/gradient of the curve at that point\"? (3 steps)", "answer": "- Step 1: The gradient of the curve at a point is $$\\mathrm{d}I/\\mathrm{d}V$$ — a *differential* slope. Its reciprocal is \"differential resistance,\" which measures how a small change in $$V$$ produces a small change in $$I$$ around that point.\n- Step 2: But the *resistance* of the component at that operating point is defined as $$R = V/I$$ — the ratio of the actual voltage to the actual current at that point. Geometrically this is the slope of a *chord from the origin to the point*, not the tangent slope at the point.\n- Step 3: For a non-linear curve these two slopes differ. Always go: read off $$V$$ at the point, read off $$I$$ at the point, divide: $$R = V/I$$. Never use the curve's local gradient.\n\nA useful mental image: draw a straight line from the origin to the point — the inverse of *that* line's slope is $$R$$.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Sketch the I–V characteristic of an ohmic conductor (fixed resistor) and state two key features. (3 steps)", "answer": "- Step 1: Shape — a straight line passing through the origin, extending symmetrically into both the first quadrant (positive V, positive I) and the third quadrant (negative V, negative I).\n- Step 2: Feature 1 — passes through the origin: no offset; zero voltage gives zero current, no \"threshold.\"\n- Step 3: Feature 2 — constant gradient = $$1/R$$; equivalently, $$V/I$$ is the same at every point on the line, so resistance is constant. The component obeys Ohm's law.\n\nThis shape arises because the lattice temperature stays approximately constant (small currents), so collision frequency per unit drift doesn't change with $$V$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Sketch the I–V characteristic of a tungsten filament lamp and explain physically why it has that shape. (3 steps)", "answer": "- Step 1: Shape — an S-shaped curve, symmetric about the origin, that bows *toward the V-axis* as $$|V|$$ increases. Near the origin it's nearly linear (filament is cool, near-ohmic); at higher $$V$$ it flattens.\n- Step 2: Mechanism — as $$V$$ increases, current increases, so power dissipated $$P = I^2 R$$ rises, heating the tungsten filament. Higher temperature → lattice ions vibrate with larger amplitude → more frequent collisions with conduction electrons → resistance increases.\n- Step 3: Consequence — because $$R$$ rises with $$V$$, the current doesn't keep up with $$V$$ proportionally: for each extra volt, you get *fewer* extra mA than you'd expect. The graph flattens away from linearity.\n\nThe lamp obeys Ohm's law *approximately* only at very low voltages where the filament hasn't heated up.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "A filament lamp has resistance $$\\approx 2.5\\,\\Omega$$ when dim and $$\\approx 6\\,\\Omega$$ at full brightness. Which way does the resistance change as the lamp warms up, and is this consistent with Ohm's law? (2 steps)", "answer": "- Step 1: As the lamp brightens, the filament heats up and resistance *increases* — from $$\\sim 2.5\\,\\Omega$$ (cool) to $$\\sim 6\\,\\Omega$$ (hot). This is the metallic behaviour: hotter lattice → more collisions → higher $$R$$.\n- Step 2: Since $$R$$ is *not* constant, the lamp does *not* obey Ohm's law over this operating range. (Ohm's law specifically requires constant T, which is exactly what's violated here.)\n\nA clean conceptual rule: in metals, $$R$$ rises with $$T$$. Opposite for semiconductors and thermistors.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Sketch the I–V characteristic of a silicon semiconductor diode and label its key features. (3 steps)", "answer": "- Step 1: Shape — highly asymmetric. In **reverse bias** ($$V < 0$$): $$I \\approx 0$$ for all reverse voltages (the curve sits flat along the V-axis). In **forward bias** ($$V > 0$$): essentially $$I = 0$$ until $$V$$ reaches the threshold ($$\\approx 0.6$$–$$0.7$$ V for silicon), then $$I$$ rises very steeply.\n- Step 2: Threshold (turn-on) voltage: approximately $$0.6\\,\\mathrm{V}$$ for silicon. Below this, no significant conduction in forward bias.\n- Step 3: Above threshold in forward bias, the curve is nearly vertical — small voltage increases give large current increases, i.e., very low resistance.\n\nA diode is a one-way valve for current. Reverse-biased = blocked; forward-biased past threshold = conducts freely.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "A semiconductor diode is reverse-biased at $$V = -3$$ V with current essentially zero. What is its resistance, and what's the common student error? (2 steps)", "answer": "- Step 1: Use the definition: $$R = V/I$$. With $$I \\to 0$$ (effectively zero), $$R \\to \\infty$$. So the diode's resistance in reverse bias is *infinite* (or \"very large\").\n- Step 2: The common mistake is to say \"no current flows, so $$R = 0$$.\" This reverses cause and effect. Zero current with finite voltage means the component is *blocking* — opposing current strongly — which is the very definition of high (not low) resistance. Zero resistance would mean a short circuit, which would let unlimited current flow.\n\nMnemonic: \"blocks current = high R\"; \"passes freely = low R.\"", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Sketch the I–V characteristic of an NTC thermistor and explain why it bows toward the I-axis. (3 steps)", "answer": "- Step 1: Shape — symmetric about the origin, but the curve bows *toward the current axis* (i.e., $$I$$ rises faster than linearly with $$V$$). Opposite curvature from a filament lamp.\n- Step 2: Mechanism — increasing $$V$$ drives more current; $$I^2 R$$ heating raises the thermistor's temperature. In a semiconductor material, higher temperature gives more electrons enough energy to escape into the conduction band, increasing the number of charge carriers.\n- Step 3: More carriers → lower resistance → even more current for the same V → the curve steepens. This is a *positive feedback loop* (temperature ↑ → R ↓ → I ↑ → temperature ↑). NTC = \"Negative Temperature Coefficient\": $$R$$ decreases as $$T$$ increases.\n\nContrast with metals: in a metal, more $$T$$ → more lattice vibration → more collisions → higher $$R$$. Semiconductor effect (more carriers) dominates over lattice vibration effect.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Why does an NTC thermistor's resistance *decrease* with temperature, whereas a metal's *increases*, even though both involve hotter atoms vibrating more? (3 steps)", "answer": "- Step 1: In both materials, raising $$T$$ does increase lattice vibration → more electron-ion collisions → tends to *raise* $$R$$.\n- Step 2: But in a *semiconductor* (thermistor material), there's a second, much stronger effect: at higher $$T$$, many more valence electrons gain enough thermal energy to become *conduction* electrons. The number density of charge carriers $$n$$ jumps dramatically.\n- Step 3: Resistance depends on $$n$$ (more carriers → lower R) and on collision rate (more collisions → higher R). In semiconductors the carrier-density effect dominates → net $$R$$ drops with $$T$$. In metals, $$n$$ is essentially fixed (all valence electrons are already free), so only the collision effect matters → net $$R$$ rises with $$T$$.\n\nThe two materials respond to heating *via different mechanisms*.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "How does an LDR's resistance depend on light intensity, and what's the microscopic mechanism?", "answer": "An LDR (Light-Dependent Resistor) has resistance that *decreases* as light intensity increases. Microscopically: the LDR is made of a semiconductor; incoming photons carry energy ($$E = hf$$) that can lift valence electrons into the conduction band — giving the material more charge carriers. More charge carriers means more current flows for the same voltage, i.e., lower resistance. In total darkness, the LDR has very high resistance (few carriers); under bright light, resistance drops sharply (many carriers). The mechanism is analogous to the thermistor, except energy comes from photons rather than thermal vibrations.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "On the same axes, an LDR is characterised twice: once in dim light, once in bright light. How do the two I–V lines compare? (2 steps)", "answer": "- Step 1: At any fixed light level, the LDR is roughly ohmic — its I–V plot is approximately a straight line through the origin (constant resistance for that illumination).\n- Step 2: But the *gradient* of that line depends on light. In bright light, $$R$$ is small, so gradient $$1/R$$ is large → steeper line. In dim light, $$R$$ is large, gradient is small → shallower line. The bright-light line lies *above* the dim-light line in the first quadrant.\n\nSo light intensity is essentially a \"knob\" that rotates the line about the origin.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "From an I–V graph of a non-ohmic component, at the point $$I = 40\\,\\mathrm{mA}$$, $$V = 0.70$$ V. What is the resistance, and what's the prefix trap to avoid? (3 steps)", "answer": "- Step 1: Apply the definition: $$R = V/I$$. Do *not* multiply ($$R \\ne IV$$).\n- Step 2: Convert mA to A: $$I = 40\\,\\mathrm{mA} = 40 \\times 10^{-3}\\,\\mathrm{A} = 0.040\\,\\mathrm{A}$$. Forgetting this gives an answer 1000× too small.\n- Step 3: Compute: $$R = \\dfrac{0.70}{0.040} = 17.5\\,\\Omega$$. Unit check: $$\\mathrm{V/A} = \\Omega$$. ✓\n\nThis is Phuc's exact worked example from the lesson. The two traps to avoid: (1) wrong formula $$R = IV$$, (2) forgetting to convert mA → A.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "A student reads $$I = 250\\,\\mu\\mathrm{A}$$ with $$V = 5.0$$ V across the component, but accidentally treats it as $$250\\,\\mathrm{mA}$$. By what factor is the answer wrong, and which direction? (3 steps)", "answer": "- Step 1: Correct conversion: $$\\mu = 10^{-6}$$, so $$I = 250 \\times 10^{-6}\\,\\mathrm{A} = 2.5 \\times 10^{-4}\\,\\mathrm{A}$$. Correct $$R = 5.0 / (2.5 \\times 10^{-4}) = 20{,}000\\,\\Omega = 20\\,\\mathrm{k\\Omega}$$.\n- Step 2: Wrong conversion: treating as $$\\mathrm{mA}$$ gives $$I = 250 \\times 10^{-3}\\,\\mathrm{A} = 0.25\\,\\mathrm{A}$$. Wrong $$R = 5.0/0.25 = 20\\,\\Omega$$.\n- Step 3: Ratio of wrong to right: $$20 / 20{,}000 = 1/1000$$. The student's answer is **1000× too small**, because they treated the current as 1000× too big.\n\nRule: $$\\mu \\to m$$ inflates current by $$10^3$$; inflating denominator deflates the quotient. Always expand prefixes to powers of 10 *before* dividing.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "An ohmic I–V graph has gradient $$0.025\\,\\mathrm{A/V}$$. What is the resistance? (2 steps)", "answer": "- Step 1: For an ohmic conductor with I on y-axis and V on x-axis: gradient $$= I/V = 1/R$$.\n- Step 2: Therefore $$R = 1/\\text{gradient} = 1/0.025 = 40\\,\\Omega$$. Unit check: $$1/(\\mathrm{A/V}) = \\mathrm{V/A} = \\Omega$$. ✓\n\nIf the gradient had been given in $$\\mathrm{mA/V}$$ (e.g., $$25\\,\\mathrm{mA/V}$$), convert first: $$25\\,\\mathrm{mA/V} = 0.025\\,\\mathrm{A/V}$$, same answer. Watch units.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "A non-ohmic component's I–V curve is given. You want to find the applied p.d. that gives the component a resistance of $$50\\,\\Omega$$. Why can't you just calculate it, and what's the graphical method? (3 steps)", "answer": "- Step 1: You can't directly compute because $$V$$ and $$I$$ are *linked* by the curve. You know $$R = 50$$ Ω means $$V/I = 50$$, but the curve also constrains which $$(V, I)$$ pairs are physically achievable. You need *both* relations simultaneously.\n- Step 2: Construct the line of all $$(V,I)$$ points with $$R = 50$$ Ω: a straight line through the origin with gradient $$1/R = 1/50 = 0.
