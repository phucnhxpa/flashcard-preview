k any convenient V (e.g., V = 0.60 V) and calculate $$I = V/R = 0.60/50 = 0.012$$ A = 12 mA. Plot this point and draw the line through the origin.\n- Step 3: Find where this straight line intersects the component's I–V curve. The intersection gives the unique (V, I) pair that simultaneously satisfies both R = 50 Ω AND the component's characteristic. Read off V and I at the intersection.\n\nTakeaway: Intersection of \"R = 50 Ω line\" and \"component curve\" = the operating point where R = 50 Ω.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "Describe the I–V characteristic graph for an ohmic conductor (fixed resistor). What are its key features in both the positive and negative quadrants? (2 steps)", "answer": "- Step 1: The I–V graph is a straight line through the origin. The gradient is constant and equals 1/R. Since R is constant, the gradient doesn't change — confirming Ohm's Law ($$I \\propto V$$).\n- Step 2: The graph is symmetric about the origin — the straight line extends into the third quadrant (negative V, negative I) with the same gradient. This means the component has the same resistance regardless of the direction of current flow.\n\nTakeaway: Ohmic → straight line through origin, same gradient (1/R) in both quadrants, constant R.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Why is the I–V graph for an ohmic conductor symmetric about the origin? What physical property ensures this? (2 steps)", "answer": "- Step 1: The resistance of an ohmic conductor depends only on the material's properties (resistivity, length, cross-sectional area) and temperature — none of which change when you reverse the direction of current.\n- Step 2: Since R is constant regardless of current direction, the same V/I ratio applies for both positive and negative voltages. The graph must therefore be a straight line with the same gradient in both the first and third quadrants — symmetric about the origin.\n\nTakeaway: Same R in both directions → same gradient → symmetric graph.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Describe the shape of the I–V characteristic for a tungsten filament lamp. Which axis does the curve \"bow\" toward, and what does this indicate about resistance? (2 steps)", "answer": "- Step 1: The I–V graph is an S-shaped curve that is symmetric about the origin. As V increases, the curve bows *toward the voltage axis* (away from the current axis) — meaning current increases at a decreasing rate.\n- Step 2: This bowing toward the V-axis indicates that resistance is *increasing* as V (and hence I) increases. For the same increase in V, the increase in I gets smaller — the component is becoming harder to push current through.\n\nTakeaway: Filament lamp → S-curve bowing toward V-axis → R increases with V and I.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Give the two-step physical explanation for why the resistance of a tungsten filament lamp increases as current increases. (This is a common 2-mark exam question.) (2 steps)", "answer": "- Step 1: As current increases, resistive heating ($$I^2 R$$ heating) causes the temperature of the tungsten filament to increase.\n- Step 2: Higher temperature causes the metal lattice ions to vibrate with greater amplitude. Conduction electrons collide more frequently with these more-vibrant ions, which reduces their drift velocity and increases resistance. Current therefore increases at a slower rate than for an ohmic conductor.\n\nTakeaway: More current → more heating → ions vibrate more → more collisions → higher R.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "Does a tungsten filament lamp ever obey Ohm's Law? If so, under what conditions? (2 steps)", "answer": "- Step 1: Yes — approximately. At very small voltages (near the origin of the I–V graph), the curve is nearly straight. At these low voltages, the current is small, so the heating effect is negligible, and the filament stays near room temperature.\n- Step 2: Since the temperature is approximately constant at low currents, the condition for Ohm's Law (constant temperature) is approximately met, and the filament behaves nearly ohmically. As V increases beyond this region, heating becomes significant and the graph curves.\n\nTakeaway: Filament lamp ≈ ohmic at very small V (near origin, before significant heating).", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Describe the I–V characteristic of a semiconductor diode in forward bias. What is the threshold voltage, and what happens to resistance beyond it? (3 steps)", "answer": "- Step 1: In forward bias ($$V > 0$$), almost no current flows until the p.d. reaches the threshold (turn-on) voltage — approximately 0.6 V to 0.7 V for a silicon diode (use 0.6 V in exams unless told otherwise).\n- Step 2: Below the threshold, the diode has very high resistance — it is essentially \"off.\"\n- Step 3: Once V exceeds the threshold, current rises very steeply — the diode's resistance becomes very small. The graph shoots upward sharply, indicating the diode is now \"on\" and conducting freely.\n\nTakeaway: Forward bias → no current until ~0.6 V → then R drops dramatically → current rises steeply.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "Describe the I–V characteristic of a semiconductor diode in reverse bias. What is the resistance, and what common mistake do students make? (2 steps)", "answer": "- Step 1: In reverse bias ($$V < 0$$), virtually no current flows through the diode. The ammeter reads $$I \\approx 0$$. The diode \"blocks\" current in this direction.\n- Step 2: Since $$I \\approx 0$$, the resistance is $$R = \\frac{V}{I} \\to \\infty$$ (effectively infinite/very large). The common mistake is to write R = 0 — confusing \"no current\" with \"no resistance.\" No current means *infinite* resistance, not zero.\n\nTakeaway: Reverse bias → I ≈ 0 → R → ∞. NOT R = 0.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "What is the threshold voltage of a silicon semiconductor diode, and what does it physically represent? (2 steps)", "answer": "- Step 1: The threshold voltage is approximately 0.6 V to 0.7 V for a silicon diode (use 0.6 V in exams unless specified otherwise). This is the minimum forward p.d. needed to make the diode conduct.\n- Step 2: Physically, it represents the energy needed to overcome the depletion layer in the p-n junction. Below this voltage, the internal electric field in the depletion region prevents charge carriers from crossing the junction. Above it, carriers have enough energy to cross and current flows freely.\n\nTakeaway: Threshold ≈ 0.6 V = minimum forward voltage to \"turn on\" a silicon diode.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "How does the I–V graph of a semiconductor diode differ from all the other components studied (resistor, filament lamp, thermistor) in terms of symmetry? (2 steps)", "answer": "- Step 1: The diode's I–V graph is highly *asymmetric* — it behaves completely differently in forward bias (conducts above 0.6 V) versus reverse bias (blocks all current). The graph looks entirely different on each side of the origin.\n- Step 2: In contrast, the ohmic conductor, filament lamp, and NTC thermistor all have *symmetric* I–V graphs — they behave the same way regardless of current direction. Their graphs extend identically into both the first and third quadrants.\n\nTakeaway: Diode = asymmetric (one-way valve). All others = symmetric (same R in both directions).", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "How does the resistance of an NTC thermistor change with temperature, and what does \"NTC\" stand for? (2 steps)", "answer": "- Step 1: NTC stands for \"Negative Temperature Coefficient.\" This means the temperature coefficient of resistance is negative — resistance *decreases* as temperature *increases*.\n- Step 2: This is the opposite behaviour to a metal (where R increases with T). Memory aid: NTC is like the \"opposite\" of a metal — metals get harder to conduct when hot (R↑), NTC thermistors get easier to conduct when hot (R↓).\n\nTakeaway: NTC = Negative Temperature Coefficient = T↑ → R↓ (opposite of metal).", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "Give the two-step physical explanation for why the resistance of an NTC thermistor decreases as temperature increases. (This is a common 2-mark exam question.) (2 steps)", "answer": "- Step 1: Higher temperature gives more valence electrons in the semiconductor enough thermal energy to break free and become conduction electrons. The number of charge carriers increases.\n- Step 2: More charge carriers means more current can flow for the same applied voltage, so resistance decreases. This creates a positive feedback effect: more current → more heating → more carriers → lower R → even more current.\n\nTakeaway: T↑ → more conduction electrons (more carriers) → lower R. Opposite mechanism to metals.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "Describe the shape of the I–V characteristic for an NTC thermistor. Which axis does the curve bow toward, and how does this contrast with the filament lamp? (2 steps)", "answer": "- Step 1: The I–V graph bows *toward the current axis* (away from the voltage axis). As V increases, the thermistor heats up, R decreases, and current increases at an *increasing* rate — faster than for an ohmic conductor.\n- Step 2: This is the opposite of the filament lamp, which bows toward the voltage axis (R increases, current increases at a decreasing rate). The thermistor's curve bows toward the I-axis because R is *decreasing*, while the lamp's curve bows toward the V-axis because R is *increasing*.\n\nTakeaway: Thermistor → bows toward I-axis (R↓). Filament lamp → bows toward V-axis (R↑). Opposite directions!", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "How does the resistance of an LDR (Light-Dependent Resistor) change with light intensity, and what is the physical mechanism? (2 steps)", "answer": "- Step 1: The resistance of an LDR *decreases* as light intensity *increases*. In bright light, R is low; in darkness, R is high.\n- Step 2: The mechanism: photons in the light give electrons in the semiconductor enough energy to become conduction electrons. More light → more photons → more conduction electrons → lower resistance. This is similar to the thermistor mechanism, but triggered by light energy rather than thermal energy.\n\nTakeaway: LDR: light↑ → more conduction electrons (from photon energy) → R↓.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "What does the I–V characteristic of an LDR look like at different light levels? Is it symmetric? (2 steps)", "answer": "- Step 1: At a *fixed* light level, the I–V graph is approximately linear (near-ohmic) — the LDR behaves like a resistor with a particular value determined by the illumination.\n- Step 2: At *higher* illumination, the gradient of the line is steeper (lower R, higher I for the same V). At *lower* illumination, the gradient is shallower (higher R, lower I for the same V). The graph is symmetric about the origin at each light level.\n\nTakeaway: LDR at fixed light ≈ ohmic (straight line). Brighter → steeper gradient (lower R). Dimmer → shallower gradient (higher R).", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "Both the NTC thermistor and the LDR have resistance that decreases under certain conditions. Compare the mechanisms: what provides the energy to free conduction electrons in each? (2 steps)", "answer": "- Step 1: In the NTC thermistor, *thermal energy* (heat) gives valence electrons enough energy to become conduction electrons. The trigger is temperature increase.\n- Step 2: In the LDR, *photon energy* (light) gives electrons enough energy to become conduction electrons. The trigger is light intensity increase. Both result in more charge carriers → lower resistance, but the energy source is different (thermal vs. photonic).\n\nTakeaway: Thermistor = thermal energy frees electrons. LDR = photon energy frees electrons. Both → more carriers → R↓.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}, {"question": "A student calculates resistance by multiplying current and voltage: R = I × V. Explain why this is always wrong, and identify what quantity I × V actually gives. (2 steps)", "answer": "- Step 1: Resistance is defined as $$R = \\frac{V}{I}$$ — a quotient, not a product. The formula R = IV is always incorrect. This was a documented mistake from a lesson (Phuc, lesson video 1, 44:01 — tutor immediately corrected it).\n- Step 2: The product $$I \\times V$$ gives *power* ($$P = IV$$), not resistance. The units confirm this: V × A = watts (power), not ohms (resistance). Writing R = IV confuses resistance with power dissipation.\n\nTakeaway: R = V/I (always). IV = P (power). Never write R = IV.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "A student sees \"200 µA\" on a current axis but treats it as 200 mA when calculating R. By what factor is their answer wrong, and in which direction? (3 steps)", "answer": "- Step 1: Convert correctly: $$200 \\, \\mu\\text{A} = 200 \\times 10^{-6} \\, \\text{A} = 2.0 \\times 10^{-4} \\, \\text{A}$$. The student uses $$200 \\, \\text{mA} = 200 \\times 10^{-3} \\, \\text{A} = 0.2 \\, \\text{A}$$.\n- Step 2: The student's current value is 1000 times too large ($$10^{-3}$$ vs $$10^{-6}$$). Since $$R = V/I$$, using a current that is 1000× too large gives a resistance that is 1000× too *small*.\n- Step 3: For example, with V = 4.0 V: correct $$R = 4.0/(2.0 \\times 10^{-4}) = 20{,}000 \\, \\Omega = 20 \\, \\text{k}\\Omega$$. Student's wrong $$R = 4.0/0.2 = 20 \\, \\Omega$$. The answer is off by a factor of 1000.\n\nTakeaway: µA ($$10^{-6}$$) vs mA ($$10^{-3}$$) — a factor of 1000. Always convert to base SI units (A) before calculating.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "A student finds the gradient of a filament lamp's I–V curve at a point and writes R = 1/gradient. Why is this wrong? (2 steps)", "answer": "- Step 1: The formula R = 1/gradient only works for *ohmic* conductors where the graph is a straight line through the origin. For a straight line, gradient = I/V = 1/R everywhere.\n- Step 2: For a non-ohmic component, the gradient at a point is dI/dV (the slope of the tangent), which is the *dynamic resistance* — not the actual resistance R = V/I. The tangent slope and the chord slope (from origin to point) are different for a curve. You must read off V and I at the point and use R = V/I.\n\nTakeaway: R = 1/gradient ONLY for straight-line (ohmic) graphs. For curves, use R = V/I at the point.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "A student asks: \"Do I need to know if a circuit is series or parallel to apply Kirchhoff's First Law?\" Explain why the answer is no. (2 steps)", "answer": "- Step 1: Kirchhoff's First Law (KCL) states that the sum of currents entering a junction equals the sum of currents leaving it: $$\\sum I_{in} = \\sum I_{out}$$. This is a statement of conservation of charge.\n- Step 2: This law applies at *any junction* in *any circuit*, regardless of whether the overall circuit topology is series, parallel, or a combination. The circuit type determines which branches the current splits into, but the law itself — charge in = charge out — is universal and topology-independent.\n\nTakeaway: KCL applies at any junction, any circuit. No need to know series/parallel to use it.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "Both a filament lamp and an NTC thermistor are non-ohmic, but their I–V curves bow in opposite directions. Explain why, referring to the microscopic mechanisms. (3 steps)", "answer": "- Step 1: In a filament lamp (metal), increasing current heats the tungsten → lattice ions vibrate more → more frequent electron-ion collisions → resistance *increases* → current rises at a decreasing rate → curve bows toward V-axis.\n- Step 2: In an NTC thermistor (semiconductor), increasing current heats the material → more valence electrons gain enough energy to become conduction electrons → more charge carriers → resistance *decreases* → current rises at an increasing rate → curve bows toward I-axis.\n- Step 3: The key difference is the mechanism: metals have plenty of free electrons already, so heating mainly increases collisions (R↑). Semiconductors have few free electrons, so heating mainly creates more carriers (R↓), which dominates over the collision effect.\n\nTakeaway: Metal (lamp): T↑ → more collisions → R↑. Semiconductor (thermistor): T↑ → more carriers → R↓. Opposite!", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "An NTC thermistor is connected in series with a fixed resistor as a potential divider. V_out is measured across the fixed resistor. As temperature increases, does V_out increase or decrease? Explain. (3 steps)", "answer": "- Step 1: In a potential divider, the output voltage across a resistor is proportional to its share of the total resistance: $$V_{out} = \\frac{R_{fixed}}{R_{fixed} + R_{thermistor}} \\times V_{in}$$.\n- Step 2: When temperature increases, the NTC thermistor's resistance *decreases* ($$R_{thermistor}$$ goes down). The fixed resistor's resistance stays the same.\n- Step 3: Since $$R_{thermistor}$$ decreases, the fraction of total resistance belonging to the fixed resistor *increases*. Therefore, a greater fraction of the supply voltage appears across the fixed resistor, and V_out *increases*.\n\nTakeaway: T↑ → $$R_{thermistor}$$↓ → fixed resistor gets larger share of V → $$V_{out}$$ across fixed resistor↑.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "You are shown five I–V graphs and must identify each component. State the key identifying feature for: (a) fixed resistor, (b) filament lamp, (c) diode, (d) NTC thermistor, (e) LDR at two light levels. (3 steps)", "answer": "- Step 1: **(a) Fixed resistor**: Straight line through the origin, symmetric both quadrants. **(b) Filament lamp**: S-shaped curve symmetric about the origin, bowing toward V-axis. **(c) Diode**: Asymmetric — zero current in reverse bias, zero current below ~0.6 V in forward bias, then steep rise.\n- Step 2: **(d) NTC thermistor**: Curve bowing toward I-axis (opposite of filament lamp), symmetric about the origin. Resistance decreases as V increases.\n- Step 3: **(e) LDR**: Two straight lines (approximately) through the origin with different gradients — steeper line for bright light (lower R), shallower line for dim light (higher R). Both are near-ohmic at constant illumination.\n\nTakeaway: Resistor = straight, Lamp = S toward V-axis, Diode = asymmetric, Thermistor = curve toward I-axis, LDR = two lines (bright/dim).", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "A component has 6 V across it and 0.2 A flowing through it. What is its resistance? (1 step)", "answer": "- Step 1: Apply $$R = \\frac{V}{I} = \\frac{6}{0.2} = 30 \\, \\Omega$$. This formula works for any component — ohmic or not — at the specified operating point.\n\nTakeaway: $$R = V/I = 6/0.2 = 30 \\, \\Omega$$.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "An ohmic conductor has an I–V graph that is a straight line through the origin with gradient 0.04 A/V. What is its resistance? (2 steps)", "answer": "- Step 1: For an ohmic conductor, gradient = I/V = 1/R. So R = 1/gradient.\n- Step 2: $$R = \\frac{1}{0.04} = 25 \\, \\Omega$$. Unit check: 1/(A/V) = V/A = Ω. ✓\n\nTakeaway: R = 1/gradient = 1/0.04 = 25 Ω.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "A component has 3 V across it and a current of 150 µA. Calculate R in kΩ. (2 steps)", "answer": "- Step 1: Convert to base SI: $$I = 150 \\, \\mu\\text{A} = 150 \\times 10^{-6} \\, \\text{A} = 1.5 \\times 10^{-4} \\, \\text{A}$$.\n- Step 2: $$R = \\frac{V}{I} = \\frac{3}{1.5 \\times 10^{-4}} = 20{,}000 \\, \\Omega = 20 \\, \\text{k}\\Omega$$. Note: if you mistakenly used 150 mA instead of 150 µA, you'd get R = 20 Ω — off by a factor of 1000!\n\nTakeaway: 150 µA → $$1.5 \\times 10^{-4}$$ A → R = 20 kΩ. µA ≠ mA!", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "A silicon diode has V = 0.64 V across it and I = 5.0 mA through it (forward bias, past threshold). What is its resistance? (2 steps)", "answer": "- Step 1: Convert to base SI: $$I = 5.0 \\, \\text{mA} = 5.0 \\times 10^{-3} \\, \\text{A}$$.\n- Step 2: $$R = \\frac{V}{I} = \\frac{0.64}{5.0 \\times 10^{-3}} = 128 \\, \\Omega$$. The diode's resistance is still relatively high at this point but will drop dramatically as V increases further past the threshold.\n\nTakeaway: Diode at V = 0.64 V, I = 5 mA → R = 128 Ω. R decreases rapidly as V increases past threshold.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "A 12 V, 24 W filament lamp has R = 6.0 Ω at its rated voltage. At a lower voltage (V = 2.0 V), the current is 0.80 A. Is R at 2.0 V higher or lower than 6.0 Ω? Calculate it. (2 steps)", "answer": "- Step 1: At V = 2.0 V, $$R = \\frac{V}{I} = \\frac{2.0}{0.80} = 2.5 \\, \\Omega$$.\n- Step 2: R at 2.0 V (2.5 Ω) is *lower* than R at 12 V (6.0 Ω). This makes sense: at lower voltage, the filament is cooler, lattice ions vibrate less, fewer collisions, so resistance is lower. As the lamp dims, R decreases: 6.0 Ω → 4.9 Ω → 2.5 Ω.\n\nTakeaway: Filament lamp: R at low V < R at high V. Cool filament = low R, hot filament = high R.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "When measuring the I–V characteristic of a semiconductor diode, a protective resistor is included in series. Why? (2 steps)", "answer": "- Step 1: Once the diode's forward bias voltage exceeds the threshold (~0.6 V), its resistance drops dramatically and current rises very steeply. Without protection, the current can exceed the diode's maximum rating and destroy it.\n- Step 2: The series resistor limits the maximum current that can flow, even if the diode's resistance becomes very small. This protects the diode from damage during the experiment.\n\nTakeaway: Protective resistor in series with diode → limits current → prevents damage when diode \"turns on.\"", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "What happens to the resistance of an LDR in total darkness? What is the limiting case? (2 steps)", "answer": "- Step 1: In total darkness, there are no photons to give electrons energy to become conduction electrons. The number of free charge carriers is at its minimum.\n- Step 2: With very few charge carriers, the resistance is very high — approaching infinity in the ideal case. In practice, the LDR has a very large (but finite) resistance in darkness, making it useful as a sensor: dark → high R → trigger off; bright → low R → trigger on.\n\nTakeaway: LDR in darkness → very few carriers → very high R. Light → more carriers → low R.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "At exactly V = 0.6 V forward bias, a silicon diode is at its threshold. Is its resistance zero, infinite, or somewhere in between? (2 steps)", "answer": "- Step 1: At the threshold, the diode is just beginning to conduct. A very small current flows (not zero, but much less than at higher voltages). The resistance is neither zero nor infinite.\n- Step 2: Since some current flows but it is still small, $$R = V/I$$ is large but finite. As V increases just slightly above 0.6 V, current increases rapidly and R drops dramatically. The threshold is a transition region where R is changing from very high to very low.\n\nTakeaway: At threshold, R is large but finite — transitioning from \"off\" (R → ∞) to \"on\" (R → very small).", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "You need to calculate the power dissipated in a resistor. You know V and R but not I. Which power equation should you use, and why? (2 steps)", "answer": "- Step 1: Use $$P = \\frac{V^2}{R}$$. This equation is expressed in terms of V and R, which are the quantities you know.\n- Step 2: You could first calculate $$I = V/R$$ and then use $$P = IV$$, but using $$P = V^2/R$$ directly avoids an extra calculation step and reduces rounding errors. The three power equations ($$P = IV$$, $$P = I^2 R$$, $$P = V^2/R$$) are mathematically equivalent for ohmic components — choose the one that uses the known quantities.\n\nTakeaway: Know V and R → use $$P = V^2/R$$. Know I and R → use $$P = I^2 R$$. Know V and I → use $$P = IV$$.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "In the I–V characteristic experiment, I is plotted on the y-axis and V on the x-axis. Why does this convention matter for how you interpret the gradient? (2 steps)", "answer": "- Step 1: With I on the y-axis and V on the x-axis, the gradient = $$\\Delta I / \\Delta V = I/V = 1/R$$. So $$R = 1/\\text{gradient}$$.\n- Step 2: If the axes were swapped (V on y, I on x), the gradient would be $$\\Delta V / \\Delta I = V/I = R$$ directly. The convention of I vs V means you must take the *reciprocal* of the gradient to get R — a common exam trap is forgetting this and writing R = gradient.\n\nTakeaway: I vs V graph → gradient = 1/R → R = 1/gradient. Don't confuse with V vs I graph where gradient = R.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "In the I–V characteristic experiment for a filament lamp, what is the control variable and why is it important? (2 steps)", "answer": "- Step 1: The control variable is temperature — or more practically, the time each reading is held for. Each reading should be taken quickly to avoid cumulative temperature rise distorting the curve.\n- Step 2: If readings are held too long, the filament continues to heat up between measurements, and the temperature is different for each data point. This means the I–V relationship is being measured at different temperatures, violating the conditions for a fair test and distorting the curve shape.\n\nTakeaway: Control variable = temperature (keep readings brief to avoid cumulative heating).", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "When calculating R = V/I from measurements, how do you combine the percentage uncertainties in V and I to find the percentage uncertainty in R? (2 steps)", "answer": "- Step 1: Since $$R = V/I$$ is a quotient (one quantity divided by another), the percentage uncertainties *add*: $$\\frac{\\Delta R}{R} = \\frac{\\Delta V}{V} + \\frac{\\Delta I}{I}$$.\n- Step 2: For example, if V has 2% uncertainty and I has 3% uncertainty, then R has 2% + 3% = 5% uncertainty. This is because when you divide, relative errors add — the worst case is that both errors push R in the same direction.\n\nTakeaway: For R = V/I: % uncertainty in R = % uncertainty in V + % uncertainty in I.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "Match each description to a component: (i) \"R increases as the component heats up\" (ii) \"R decreases as the component heats up\" (iii) \"R is constant regardless of V or I\" (3 steps)", "answer": "- Step 1: (i) \"R increases as the component heats up\" → **Filament lamp** (tungsten metal: more lattice vibrations → more collisions → R↑ with T).\n- Step 2: (ii) \"R decreases as the component heats up\" → **NTC thermistor** (semiconductor: more carriers freed → R↓ with T).\n- Step 3: (iii) \"R is constant regardless of V or I\" → **Fixed resistor (ohmic conductor)** (metal at constant temperature: $$I \\propto V$$, R = constant).\n\nTakeaway: R↑ with T = filament lamp. R↓ with T = NTC thermistor. R constant = ohmic resistor.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "Why is the I–V graph of a diode asymmetric, while the graphs for resistors, filament lamps, and thermistors are all symmetric? What fundamental property of the diode causes this? (2 steps)", "answer": "- Step 1: A diode is a p-n junction device — it has an internal structure that is inherently directional. The p-type and n-type regions create a built-in electric field (depletion layer) that allows current in one direction but blocks it in the other.\n- Step 2: The other components (resistor, filament lamp, thermistor) are made of uniform material with no internal directional structure. Reversing the voltage simply reverses the direction of electron flow through the same material, giving the same resistance. The diode's p-n junction makes it fundamentally different in each direction.\n\nTakeaway: Diode = p-n junction = directional device = asymmetric. Others = uniform material = same R both ways = symmetric.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": false}, {"question": "An LDR is used in a streetlight that turns on automatically at dusk. The LDR is in a potential divider with a fixed resistor, and V_out across the LDR triggers the light. As darkness falls, does V_out across the LDR increase or decrease? (3 steps)", "answer": "- Step 1: As darkness falls, light intensity decreases. The LDR's resistance *increases* (fewer photons → fewer conduction electrons → higher R).\n- Step 2: In the potential divider, $$V_{out}$$ across the LDR = $$\\frac{R_{LDR}}{R_{LDR} + R_{fixed}} \\times V_{in}$$. As $$R_{LDR}$$ increases, the LDR's share of the total resistance increases.\n- Step 3: Therefore, $$V_{out}$$ across the LDR *increases* as darkness falls. This increasing voltage triggers the streetlight to turn on. (Note: if $$V_{out}$$ were across the fixed resistor instead, it would decrease — the placement of $$V_{out}$$ matters!)\n\nTakeaway: Dark → $$R_{LDR}$$↑ → $$V_{out}$$ across LDR↑ → triggers light on. The placement of $$V_{out}$$ is critical!", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": true}], "count": 52}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "What is resistance, and what equation defines it? Include the SI unit and its derivation from base units. (3 steps)", "answer": "- Step 1: Resistance is the opposition a component offers to electric current. It is defined by the equation $$R = \\frac{V}{I}$$, where $$V$$ is the potential difference across the component and $$I$$ is the current through it.\n- Step 2: The SI unit of resistance is the ohm ($$\\Omega$$). From the defining equation, $$1\\;\\Omega = \\frac{1\\;\\text{V}}{1\\;\\text{A}}$$, so the ohm is equivalent to one volt per ampere ($$\\text{V}\\,\\text{A}^{-1}$$).\n- Step 3: The two rearrangements follow directly: $$V = IR$$ (to find p.d. when current and resistance are known) and $$I = \\frac{V}{R}$$ (to find current when p.d. and resistance are known). A memory aid: cover the quantity you want in the triangle, and the other two combine as shown.\n\nResistance quantifies how much a component \"pushes back\" against current flow.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A student writes the formula $$R = I \\times V$$ to calculate resistance. Explain why this is always wrong, and identify the correct formula. (2 steps)", "answer": "- Step 1: The correct definition of resistance is $$R = \\frac{V}{I}$$ — it is the ratio of potential difference to current, not their product. Writing $$R = IV$$ gives a quantity with units of $$\\text{A} \\times \\text{V} = \\text{W}$$ (power), not ohms. This is a documented exam trap (Phuc wrote this during a lesson and was immediately corrected).\n- Step 2: To verify, check units: $$R = V/I$$ gives $$\\frac{\\text{V}}{\\text{A}} = \\Omega$$, which is correct. $$R = IV$$ gives $$\\text{A} \\times \\text{V} = \\text{W}$$, which is a unit of power, not resistance. Always use $$R = \\frac{V}{I}$$.\n\nResistance is a quotient (voltage divided by current), never a product.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "At the microscopic level, what causes a material to have electrical resistance? Walk through the mechanism step by step. (3 steps)", "answer": "- Step 1: In a metal, the atoms are arranged in a regular lattice of positive ions. These ions are not stationary — they vibrate about their equilibrium positions due to thermal energy. The higher the temperature, the larger the amplitude of vibration.\n- Step 2: When a potential difference is applied, conduction electrons drift through the metal. As they move, they collide with the vibrating lattice ions. Each collision transfers kinetic energy from the electron to the ion, causing the ion to vibrate more (i.e., heating up).\n- Step 3: These collisions impede the forward progress of the electrons, reducing their drift velocity and therefore reducing the current for a given applied voltage. This opposition to current flow is what we call resistance. The energy transferred in collisions appears as thermal energy (heat) in the material.\n\nResistance arises from electron–lattice collisions; more frequent collisions = higher resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "When current flows through a resistor, the resistor heats up. Using the microscopic model of resistance, explain why this heating occurs and identify which power equation directly describes it. (3 steps)", "answer": "- Step 1: As conduction electrons drift through the resistor under the applied p.d., they collide with the vibrating lattice ions. Each collision transfers kinetic energy from the electron to the ion.\n- Step 2: The ion vibrates with greater amplitude after the collision. This increased vibration is thermal energy — the resistor literally gets hotter. The electrical work done on the electrons is being converted into internal energy of the lattice.\n- Step 3: The rate of this energy conversion (power dissipated as heat) is given by $$P = I^2 R$$, often called the \"heating effect\" or \"resistive heating.\" This equation highlights that the heating depends on both the current squared and the resistance — doubling the current quadruples the heat produced.\n\nElectrical energy → kinetic energy of electrons → transferred to lattice ions as thermal energy via collisions.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "A student writes: \"Ohm's Law states that $$R = V/I$$.\" Explain why this statement is incorrect, distinguishing clearly between the definition of resistance and Ohm's Law. (3 steps)", "answer": "- Step 1: $$R = \\frac{V}{I}$$ is the **definition** of resistance. It is always true for any component — ohmic or non-ohmic. You can always measure $$V$$ and $$I$$ at a point and calculate $$R$$ from their ratio. This is not a law; it is a definition.\n- Step 2: **Ohm's Law** is a physical law about the behaviour of metals at constant temperature. It states: \"For a metallic conductor at constant temperature, the current is directly proportional to the potential difference across it,\" i.e., $$I \\propto V$$ (at constant temperature). Equivalently, it says that $$R = \\frac{V}{I}$$ is **constant** — it does not change with $$V$$ or $$I$$.\n- Step 3: The critical difference: the definition $$R = V/I$$ applies to all components (including diodes and filament lamps where $$R$$ varies). Ohm's Law is the additional claim that $$R$$ stays constant. Writing only $$R = V/I$$ says nothing about whether $$R$$ is constant or varying — so it cannot express Ohm's Law.\n\n$$R = V/I$$ is the definition (always true); Ohm's Law is the statement that $$R$$ is constant (only true for metals at constant temperature).", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "What does it mean for a conductor to be \"ohmic\"? State the two conditions that must be satisfied. (2 steps)", "answer": "- Step 1: An ohmic conductor is one that obeys Ohm's Law. This means the current through it is directly proportional to the potential difference across it: $$I \\propto V$$. The I–V graph is a straight line through the origin, and resistance is constant.\n- Step 2: The two conditions are: (1) the component must be a metallic conductor, and (2) the temperature must remain constant. If either condition is violated (e.g., the component heats up significantly as current increases, as in a filament lamp), the conductor becomes non-ohmic even though it is made of metal.\n\n\"Ohmic\" = Ohm's Law is obeyed = straight-line I–V through origin = constant $$R$$.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "When obtaining an I–V characteristic experimentally, a potentiometer (potential divider circuit) is preferred over using a rheostat as a simple variable resistor. Explain why, comparing the minimum p.d. each circuit can achieve. (3 steps)", "answer": "- Step 1: A rheostat used as a variable resistor is placed in series with the component. It can only reduce the current from some value to a minimum — but the minimum p.d. across the component is limited. Even at maximum rheostat resistance, some p.d. still appears across the component. Typical data: $$V_{\\min} \\approx 0.50\\;\\text{V}$$.\n- Step 2: A potentiometer (rheostat wired as a potential divider) taps off a variable fraction of the supply voltage. By sliding the contact to one end, the p.d. across the component can be reduced to exactly zero: $$V_{\\min} = 0.00\\;\\text{V}$$.\n- Step 3: The ability to reach $$V = 0$$ is crucial because it provides data points near the origin, which are essential for establishing whether the I–V relationship is linear (straight through origin) or curved. Missing these points makes it harder to distinguish an ohmic conductor from a non-ohmic one at low voltages.\n\nPotentiometer → full range from 0 V to max; rheostat → misses the origin, losing critical low-voltage data.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "When measuring I–V characteristics, two procedural precautions are: (a) always start with the p.d. at minimum before switching on, and (b) wait at least 5 minutes before reversing the supply to take negative-V measurements. Explain the physical reason for each. (2 steps)", "answer": "- Step 1: **Starting at minimum p.d.:** If the p.d. is set high before switching on, a large current surges through the component immediately. This can damage sensitive components (especially diodes) or cause a filament lamp to blow. Starting low and gradually increasing ensures the current never exceeds safe limits.\n- Step 2: **Waiting 5 minutes between forward and reverse runs:** During the first set of measurements, the component (filament lamp, thermistor) heats up due to resistive heating. If you immediately reverse the supply, the component is still hot, so the reversed measurements are taken at a different (elevated) temperature. This introduces a systematic error — the I–V curve for the negative-V half would not be comparable to the positive-V half. Waiting allows the component to cool back to room temperature.\n\nBoth precautions ensure fair, safe, and comparable measurements in both directions.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "Describe the circuit arrangement for measuring an I–V characteristic: where is the ammeter placed, where is the voltmeter placed, and which variable supply component is used? Also state what is plotted on each axis by convention. (2 steps)", "answer": "- Step 1: The circuit consists of a variable p.d. source (potentiometer/potential divider), the component under test, an ammeter in **series** with the component (to measure the current through it), and a voltmeter in **parallel** with the component (to measure the p.d. across it). For a diode, a protective fixed resistor is also placed in series to limit the maximum current and prevent damage.\n- Step 2: By convention, the data are plotted with $$I$$ on the y-axis and $$V$$ on the x-axis. This convention matters because the gradient of the resulting graph is $$\\frac{I}{V} = \\frac{1}{R}$$ for an ohmic conductor, making it easy to read off resistance as the reciprocal of the gradient. If the axes were swapped ($$V$$ vs $$I$$), the gradient would be $$R$$ directly — but the standard exam convention is $$I$$ vs $$V$$.\n\nAmmeter in series, voltmeter in parallel, potentiometer for variable p.d., $$I$$ on y-axis and $$V$$ on x-axis.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "For a non-ohmic component, a student finds the gradient of the I–V curve at a particular point and calculates $$R = 1/\\text{gradient}$$. Explain why this gives the wrong answer, and state the correct method for finding resistance at a point on a non-ohmic I–V graph. (3 steps)", "answer": "- Step 1: The gradient of an I–V curve at a point is $$\\frac{dI}{dV}$$ — the rate of change of current with respect to voltage. Its reciprocal is $$\\frac{dV}{dI}$$, called the **differential resistance** (or dynamic resistance). This is a different quantity from $$R = \\frac{V}{I}$$.\n- Step 2: For a non-ohmic component, $$R = \\frac{V}{I}$$ at a point is the ratio of the actual voltage to the actual current at that operating point — this corresponds to the chord from the origin to the point, not the tangent. The gradient (tangent slope) and the chord slope (from origin) give different values whenever the graph is curved.\n- Step 3: The correct method: read off the values of $$V$$ and $$I$$ at the specific point on the graph, then calculate $$R = \\frac{V}{I}$$. Geometrically, this is equivalent to drawing a straight line from the origin to that point and taking the reciprocal of that chord's gradient. Only for a straight-line-through-origin (ohmic) graph does the chord gradient equal the tangent gradient — which is why $$R = 1/\\text{gradient}$$ works only for ohmic components.\n\nFor non-ohmic: $$R = V/I$$ at the point (chord from origin), NOT $$R = 1/\\text{gradient}$$ (tangent).", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "You need to find what p.d. must be applied to a non-ohmic component so that its resistance equals exactly 50 Ω. You cannot simply use $$V = IR$$ because you don't know $$I$$ independently — it depends on the component's I–V curve. Describe the graphical method to solve this. (3 steps)", "answer": "- Step 1: On the I–V graph, draw a straight line through the origin with gradient $$\\frac{1}{R} = \\frac{1}{50} = 0.020\\;\\text{A/V}$$. This line represents all $$(V, I)$$ pairs that satisfy $$R = 50\\;\\Omega$$, because every point on it has $$\\frac{V}{I} = 50$$.\n- Step 2: To plot this line, pick any convenient voltage (e.g., $$V = 1.0\\;\\text{V}$$) and calculate the corresponding current: $$I = \\frac{V}{R} = \\frac{1.0}{50} = 0.020\\;\\text{A} = 20\\;\\text{mA}$$. Mark the point $$(1.0\\;\\text{V}, 20\\;\\text{mA})$$ and draw the straight line through the origin and this point.\n- Step 3: Find where this straight line intersects the component's I–V curve. The intersection point gives the unique $$(V, I)$$ pair that simultaneously satisfies both conditions: (a) the component's actual behaviour (the curve) and (b) $$R = 50\\;\\Omega$$ (the straight line). Read off the p.d. at this intersection — that is the answer.\n\nThe intersection of the $$R = 50\\;\\Omega$$ line with the I–V curve gives the operating point where both constraints are met simultaneously.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Describe the I–V graph for an ohmic conductor (fixed resistor). What is the relationship between the gradient and the resistance? Is the graph symmetric? (2 steps)", "answer": "- Step 1: The I–V graph for an ohmic conductor is a straight line through the origin. Because $$I \\propto V$$ (Ohm's Law), doubling $$V$$ doubles $$I$$, giving a constant ratio $$\\frac{V}{I} = R$$. The gradient of the line is $$\\frac{I}{V} = \\frac{1}{R}$$, so resistance is the reciprocal of the gradient: $$R = \\frac{1}{\\text{gradient}}$$.\n- Step 2: The graph is symmetric about the origin — it extends into the third quadrant (negative $$V$$, negative $$I$$) with the same gradient. Reversing the polarity simply reverses the direction of current flow, but the resistance remains the same. This symmetry reflects the fact that the metal lattice offers the same opposition to electron drift regardless of direction.\n\nStraight line through origin, symmetric, gradient $$= 1/R$$, constant resistance in both directions.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Describe the I–V characteristic of a tungsten filament lamp, and give the two-step physical explanation for why the graph has this shape (this is a classic 2-mark exam answer). (3 steps)", "answer": "- Step 1: The I–V graph for a filament lamp is an S-shaped curve that bows toward the voltage axis as $$V$$ increases. The graph is symmetric about the origin (same shape in both directions). The curve is nearly straight near the origin but becomes increasingly flattened at higher voltages.\n- Step 2: **Physical explanation step 1:** As the current increases, resistive heating ($$P = I^2 R$$) causes the temperature of the tungsten filament to rise.\n- Step 3: **Physical explanation step 2:** At higher temperatures, the metal lattice ions vibrate with greater amplitude, causing more frequent collisions with conduction electrons. This increases the resistance. Because $$R$$ increases, the current rises more slowly than it would for a constant-$$R$$ conductor — hence the curve flattens (bows toward the $$V$$-axis).\n\nKey exam phrasing: \"Lattice ions vibrate with greater amplitude → more frequent collisions with conduction electrons → resistance increases.\"", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "A filament lamp's I–V graph is curved overall, but near the origin the curve appears almost straight. Does the filament lamp obey Ohm's Law at any point? Explain. (2 steps)", "answer": "- Step 1: Near the origin, the applied p.d. (and therefore the current) is very small, so the resistive heating ($$P = I^2 R$$) is negligible. The filament remains approximately at room temperature, and its resistance stays nearly constant. In this small region, $$I$$ is approximately proportional to $$V$$ — the graph is nearly straight.\n- Step 2: However, this is only an approximation. The lamp does not truly obey Ohm's Law because even a tiny current produces some heating. Strictly, Ohm's Law requires constant temperature, and the filament's temperature is always changing (however slightly) with current. In practice, for exam purposes, we say the lamp approximately obeys Ohm's Law at very low voltages but is non-ohmic overall.\n\nNear origin: approximately ohmic (nearly constant $$R$$). At higher voltages: clearly non-ohmic ($$R$$ increases).", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Describe the I–V characteristic of a semiconductor diode in forward bias. What is the threshold (turn-on) voltage for a silicon diode? (2 steps)", "answer": "- Step 1: In forward bias (positive $$V$$ applied to the anode), almost no current flows until the p.d. reaches the threshold voltage. Below this threshold, the diode has very high resistance and blocks current. For a silicon diode, the threshold voltage is approximately $$0.6\\;\\text{V}$$ to $$0.7\\;\\text{V}$$ (use $$0.6\\;\\text{V}$$ in exams unless told otherwise).\n- Step 2: Once the threshold is exceeded, current rises very steeply — the resistance drops dramatically. The I–V graph shows a flat region near $$I = 0$$ for $$V < 0.6\\;\\text{V}$$, then a sharp upward sweep for $$V > 0.6\\;\\text{V}$$. A protective resistor must be placed in series with the diode to limit current once it begins conducting, preventing damage from excessive current.\n\nForward bias: no current below ~0.6 V, then very steep rise — resistance transitions from very high to very low.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "In reverse bias, a diode passes virtually zero current. A student concludes \"the diode's resistance is zero.\" Explain why this conclusion is wrong, and state the correct conclusion about resistance. (2 steps)", "answer": "- Step 1: The student's reasoning is backwards. Resistance is defined as $$R = \\frac{V}{I}$$. In reverse bias, $$V$$ is some non-zero value (e.g., $$-5\\;\\text{V}$$) while $$I \\approx 0$$. Substituting: $$R = \\frac{V}{I} \\approx \\frac{5}{0} \\to \\infty$$. The resistance is extremely large (effectively infinite), not zero.\n- Step 2: The confusion likely arises from thinking \"no current = no resistance\" (like an open switch having no opposition). But the correct intuition is: \"no current despite an applied voltage = enormous opposition = infinite resistance.\" A diode in reverse bias is like a closed valve — it blocks flow entirely, which means its opposition to flow is maximal, not minimal.\n\nReverse bias: $$I \\approx 0$$, so $$R = V/I \\to \\infty$$. \"Not conducting\" means maximum resistance, not zero resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "\"NTC\" stands for Negative Temperature Coefficient. Explain what happens to the resistance of an NTC thermistor as temperature increases, and give the two-step physical mechanism. (3 steps)", "answer": "- Step 1: As temperature increases, the resistance of an NTC thermistor **decreases**. \"Negative Temperature Coefficient\" means the coefficient linking temperature change to resistance change is negative — temperature goes up, resistance goes down.\n- Step 2: **Physical mechanism step 1:** At higher temperatures, more valence electrons in the semiconductor gain enough thermal energy to break free from their atoms and become conduction electrons. The number of charge carriers increases significantly.\n- Step 3: **Physical mechanism step 2:** More charge carriers means more electrons available to carry current for the same applied voltage. Since $$I = nAve$$ (current depends on carrier density $$n$$), increasing $$n$$ increases current for the same $$V$$, which means lower resistance: $$R = V/I$$ decreases.\n\nNTC thermistor: higher temperature → more conduction electrons → lower resistance. Opposite behaviour to a metal.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Describe the shape of the I–V graph for an NTC thermistor. Why does it curve even when the external temperature is held constant? (3 steps)", "answer": "- Step 1: The NTC thermistor's I–V graph curves **toward the current axis** (away from the voltage axis). As $$V$$ increases, the current rises faster than linearly — the gradient increases with voltage. The graph is symmetric about the origin.\n- Step 2: Even if the external temperature is constant, increasing $$V$$ causes more current to flow, which causes self-heating ($$P = I^2 R$$). This raises the thermistor's internal temperature above the ambient temperature.\n- Step 3: The higher temperature liberates more charge carriers (valence electrons become conduction electrons), decreasing the resistance. Lower resistance allows even more current for the same voltage — a positive feedback effect. This is why the I–V graph curves toward the current axis, unlike a filament lamp which curves toward the voltage axis (negative feedback from increasing R).\n\nNTC thermistor I–V: curves toward $$I$$-axis because self-heating → more carriers → lower R → more current (positive feedback).", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "How does the resistance of an LDR (Light-Dependent Resistor) respond to changes in light intensity? Give the physical mechanism, and describe what its I–V graph looks like at a fixed light level. (3 steps)", "answer": "- Step 1: The resistance of an LDR **decreases** as light intensity increases. In bright light, the LDR has low resistance; in darkness, it has high resistance.\n- Step 2: **Physical mechanism:** The LDR is made of a semiconductor material. When photons (light) strike the material, they give energy to valence electrons, enabling them to break free and become conduction electrons. More light → more photons → more electrons freed → more charge carriers → lower resistance.\n- Step 3: **I–V graph:** At a fixed light level, the I–V graph is approximately a straight line through the origin (near-ohmic), because the illumination (and hence the number of charge carriers) stays constant. At higher illumination, the same graph has a steeper gradient (lower $$R$$, higher $$I$$ for the same $$V$$). Different light levels produce different straight lines with different gradients.\n\nLDR: more light → lower R. At constant illumination, approximately ohmic (straight line). Brighter light = steeper gradient = lower R.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "A metal's resistance increases with temperature, but an NTC thermistor's resistance decreases with temperature. Contrast the microscopic mechanisms responsible for this opposite behaviour. (3 steps)", "answer": "- Step 1: **In a metal:** The number of conduction electrons is already very large (roughly one per atom) and cannot increase significantly with temperature. When temperature rises, the lattice ions vibrate with greater amplitude, causing more frequent collisions with the drifting electrons. This reduces the drift velocity and increases resistance. The dominant effect is **more collisions**.\n- Step 2: **In an NTC thermistor (semiconductor):** At low temperatures, very few electrons are free to conduct — most are bound to atoms. When temperature rises, thermal energy liberates more valence electrons, dramatically increasing the number of charge carriers. This effect (more carriers) overwhelms any increase in lattice vibrations. The dominant effect is **more charge carriers**.\n- Step 3: The key distinction: metals already have maximum carriers, so only the collision effect matters (R increases). Semiconductors start with few carriers, so the carrier-generation effect dominates (R decreases). Memory aid: NTC = \"Negative\" = temperature goes up, resistance goes down — the opposite of a metal.\n\nMetal: R↑ with T (more collisions, same carriers). NTC thermistor: R↓ with T (many more carriers, overwhelming collision effect).", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "An ammeter reads 200 µA and the p.d. across a component is 4.0 V. A student accidentally treats the current as 200 mA instead of 200 µA. By what factor is their calculated resistance wrong, and in which direction? (3 steps)", "answer": "- Step 1: Convert the units correctly: $$200\\;\\mu\\text{A} = 200 \\times 10^{-6}\\;\\text{A} = 2.0 \\times 10^{-4}\\;\\text{A}$$. The student uses $$200\\;\\text{mA} = 200 \\times 10^{-3}\\;\\text{A} = 0.200\\;\\text{A}$$, which is 1000 times larger than the correct value.\n- Step 2: Since $$R = \\frac{V}{I}$$, resistance is inversely proportional to current. Using a current value that is 1000× too large gives a resistance that is 1000× too small. Correct: $$R = \\frac{4.0}{2.0 \\times 10^{-4}} = 20\\,000\\;\\Omega = 20\\;\\text{k}\\Omega$$. Student's wrong answer: $$R = \\frac{4.0}{0.200} = 20\\;\\Omega$$.\n- Step 3: The factor-of-1000 error comes from confusing the prefixes: $$\\mu = 10^{-6}$$ vs. $$\\text{m} = 10^{-3}$$. The ratio is $$\\frac{10^{-3}}{10^{-6}} = 1000$$. Always write out the full power of ten before substituting into any formula.\n\n$$\\mu\\text{A}$$ vs mA: a factor of 1000. Always convert to base SI units first.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "A student claims that a resistor \"stores\" electrons — the longer it is in a circuit, the more electrons accumulate inside it. Explain why this is incorrect, using a conservation law. (3 steps)", "answer": "- Step 1: The claim violates **conservation of charge**, which is expressed in circuits by Kirchhoff's First Law: at any junction, the total current entering equals the total current leaving ($$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$).\n- Step 2: Apply this to the resistor itself: the current entering one terminal of the resistor must equal the current leaving the other terminal. If electrons accumulated inside, the current leaving would be less than the current entering — but this does not happen. The same number of electrons per second flows out as flows in.\n- Step 3: What the resistor actually does is **slow down** the electrons (reduce their drift velocity) through collisions with lattice ions. The rate of flow (current) is reduced compared to what it would be without the resistor, but the flow rate is the same at both ends. The energy lost by electrons in collisions appears as heat — not as stored charge.\n\nA resistor reduces the rate of electron flow (current), but it does not accumulate electrons. What goes in per second must come out per second.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "A student asks: \"Do I need to know whether a circuit is series or parallel to apply Kirchhoff's First Law?\" Explain why the answer is no. (2 steps)", "answer": "- Step 1: Kirchhoff's First Law states that the sum of currents entering any junction equals the sum of currents leaving it: $$\\sum I_{\\text{in}} = \\sum I_{\\text{out}}$$. This is a statement of conservation of charge — charge cannot accumulate at a junction.\n- Step 2: This law applies at **any junction in any circuit**, regardless of whether the overall circuit is series, parallel, or a complex network. The topology (series vs parallel) determines how the current splits between branches, but the law itself is always valid. You do not need to classify the circuit first — just identify a junction and apply the law.\n\nKirchhoff's First Law is universal — it applies at every junction, independent of circuit topology.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Match each I–V graph description to the correct component: (A) straight line through origin, (B) S-curve bowing toward voltage axis, (C) near-zero current until ~0.6 V then steep rise in one direction only, (D) curve bowing toward current axis. (4 steps)", "answer": "- Step 1: **(A) Straight line through origin** → **Ohmic conductor (fixed resistor)**. Current is directly proportional to voltage; resistance is constant; gradient $$= 1/R$$.\n- Step 2: **(B) S-curve bowing toward voltage axis** → **Tungsten filament lamp**. Resistance increases as the filament heats up; current rises more slowly than linearly. The S-curve is symmetric about the origin.\n- Step 3: **(C) Near-zero current until ~0.6 V then steep rise in one direction only** → **Semiconductor diode**. Threshold voltage in forward bias; virtually zero current in reverse bias. Highly asymmetric graph.\n- Step 4: **(D) Curve bowing toward current axis** → **NTC thermistor**. Resistance decreases as the thermistor heats up (more charge carriers); current rises faster than linearly. Symmetric about the origin.\n\n(A) Ohmic, (B) Filament lamp, (C) Diode, (D) NTC thermistor. Bow direction reveals whether R is increasing (toward V) or decreasing (toward I).", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "An NTC thermistor and a fixed resistor form a potential divider, with the output voltage $$V_{\\text{out}}$$ taken across the fixed resistor. As the temperature rises, does $$V_{\\text{out}}$$ increase or decrease? Explain. (3 steps)", "answer": "- Step 1: In a potential divider, the supply voltage is shared between the two series resistors in proportion to their resistances: $$V_{\\text{out}} = \\frac{R_{\\text{fixed}}}{R_{\\text{thermistor}} + R_{\\text{fixed}}} \\times V_{\\text{supply}}$$. The larger resistor gets the larger share of the voltage.\n- Step 2: As temperature rises, the NTC thermistor's resistance **decreases** (negative temperature coefficient). The fixed resistor's resistance stays the same.\n- Step 3: With the thermistor's resistance reduced, the thermistor now claims a **smaller** fraction of the supply voltage, and the fixed resistor claims a **larger** fraction. Therefore, $$V_{\\text{out}}$$ across the fixed resistor **increases**. This is why NTC thermistors are used as temperature sensors — a rising temperature produces a rising output voltage.\n\nNTC thermistor in divider: temperature ↑ → $$R_{\\text{thermistor}}$$ ↓ → $$V_{\\text{out}}$$ across fixed resistor ↑.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "On an I–V graph for a non-ohmic component, at a particular operating point, the voltage is 6 V and the current is 2 A. What is the resistance at this point? (2 steps)", "answer": "- Step 1: For any component (ohmic or non-ohmic), the resistance at a specific point is found from $$R = \\frac{V}{I}$$, reading off the values of $$V$$ and $$I$$ at that point. Do **not** use the gradient of the curve.\n- Step 2: Substituting: $$R = \\frac{6\\;\\text{V}}{2\\;\\text{A}} = 3\\;\\Omega$$. This is the resistance at this particular operating point only — for a non-ohmic component, the resistance would be different at other points on the curve.\n\n$$R = V/I$$ at the point = $$6/2 = 3\\;\\Omega$$. Simple and direct — never use the gradient for non-ohmic components.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "The I–V graph for an ohmic conductor is a straight line through the origin with a gradient of 0.04 A/V. What is the resistance? (2 steps)", "answer": "- Step 1: For an ohmic conductor, the I–V graph is a straight line through the origin. The gradient is $$\\frac{I}{V} = \\frac{1}{R}$$, so the resistance is the reciprocal of the gradient: $$R = \\frac{1}{\\text{gradient}}$$.\n- Step 2: Substituting: $$R = \\frac{1}{0.04\\;\\text{A/V}} = \\frac{1}{0.04}\\;\\text{V/A} = 25\\;\\Omega$$. Unit check: $$\\frac{1}{\\text{A/V}} = \\frac{\\text{V}}{\\text{A}} = \\Omega$$. ✓\n\nFor ohmic only: $$R = 1/\\text{gradient}$$. This method fails for non-ohmic components where the gradient varies.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "At exactly the threshold voltage (~0.6 V), a silicon diode is just beginning to conduct. Is its resistance at this point very small, very large, or somewhere in between? Explain using $$R = V/I$$. (3 steps)", "answer": "- Step 1: At the threshold voltage, the current has just started to rise from zero but is still very small — perhaps only a few milliamps or less. The voltage is approximately 0.6 V.\n- Step 2: Using $$R = \\frac{V}{I}$$: if $$V = 0.6\\;\\text{V}$$ and $$I$$ is very small (say 1 mA = 0.001 A), then $$R = \\frac{0.6}{0.001} = 600\\;\\Omega$$. This is a moderately large resistance — much larger than when the diode is fully conducting (where $$R$$ might be only a few ohms), but much smaller than in reverse bias (where $$R \\to \\infty$$).\n- Step 3: The key insight: resistance transitions smoothly from very large (below threshold, almost no current) to very small (well above threshold, large current). At exactly the threshold, resistance is at an intermediate value — large but not infinite. As $$V$$ increases past the threshold and current rises steeply, $$R$$ drops rapidly.\n\nAt threshold: moderate-to-large resistance (current is small but non-zero). Well past threshold: very small resistance. In reverse bias: effectively infinite resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "An LDR and a fixed resistor form a potential divider, with the output voltage $$V_{\\text{out}}$$ taken across the LDR. As light intensity increases, does $$V_{\\text{out}}$$ increase or decrease? Explain. (3 steps)", "answer": "- Step 1: In a potential divider, the voltage is shared in proportion to resistance: $$V_{\\text{out}} = \\frac{R_{\\text{LDR}}}{R_{\\text{LDR}} + R_{\\text{fixed}}} \\times V_{\\text{supply}}$$. The component with the larger resistance gets the larger share of voltage.\n- Step 2: As light intensity increases, the LDR's resistance **decreases** (more photons free more charge carriers, lowering resistance).\n- Step 3: With the LDR's resistance reduced, the LDR claims a **smaller** fraction of the supply voltage, and the fixed resistor claims a **larger** fraction. Since $$V_{\\text{out}}$$ is measured across the LDR, it **decreases**. Note: this is the opposite result to when $$V_{\\text{out}}$$ is taken across the fixed resistor (which would increase).\n\nWhere you measure $$V_{\\text{out}}$$ matters! Across LDR: light ↑ → $$R_{\\text{LDR}}$$ ↓ → $$V_{\\text{out}}$$ ↓. Across fixed resistor: light ↑ → $$R_{\\text{LDR}}$$ ↓ → $$V_{\\text{out}}$$ ↑.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": true}, {"question": "A diode in forward bias has 0.7 V across it and 10 mA of current through it. What is its resistance at this operating point? (2 steps)", "answer": "- Step 1: For any component, resistance at an operating point is $$R = \\frac{V}{I}$$. The diode is non-ohmic, so we must use the values at this specific point, not the gradient.\n- Step 2: $$R = \\frac{0.7\\;\\text{V}}{10 \\times 10^{-3}\\;\\text{A}} = \\frac{0.7}{0.01} = 70\\;\\Omega$$. Note: this is the resistance at this particular forward-bias point only. At a higher current (say 100 mA at 0.74 V), the resistance would be much lower — the diode is non-ohmic and its resistance decreases dramatically past the threshold.\n\nDiode resistance at a point: $$R = V/I = 0.7/0.01 = 70\\;\\Omega$$. Non-ohmic — R changes with operating point.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}, {"question": "A filament lamp is rated 12 V, 24 W. At its rated voltage, what is its resistance? If the voltage is reduced so that the current falls to roughly half the rated value, would the resistance be higher, lower, or the same? Explain. (3 steps)", "answer": "- Step 1: At rated conditions: $$I = \\frac{P}{V} = \\frac{24}{12} = 2.0\\;\\text{A}$$, so $$R = \\frac{V}{I} = \\frac{12}{2.0} = 6.0\\;\\Omega$$.\n- Step 2: At roughly half the rated current ($$I \\approx 1.0\\;\\text{A}$$), the power dissipated ($$P = I^2 R$$) is less, so the filament is cooler than at full rating.\n- Step 3: A cooler filament has less lattice vibration → fewer collisions with conduction electrons → **lower** resistance. Therefore, at the lower current, $$R < 6.0\\;\\Omega$$. (From the worked example in the notes: at $$I = 0.80\\;\\text{A}$$, $$R \\approx 2.5\\;\\Omega$$ — significantly lower than the 6.0 Ω at full rating.)\n\nFilament lamp: lower current → cooler filament → lower resistance. R increases with temperature for metals.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}], "count": 31}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "Resistance is defined as $$R = V/I$$. A student writes \"Resistance equals current times voltage.\" What is wrong with this, and why does the error matter numerically? (2 steps)", "answer": "- Step 1: The student has written $$R = IV$$, which is the *product* of current and voltage. The correct definition is the *quotient*: $$R = V/I$$. These are fundamentally different operations — one multiplies, the other divides.\n- Step 2: Numerically, suppose $$V = 6\\text{ V}$$ and $$I = 2\\text{ A}$$. The correct resistance is $$R = 6/2 = 3\\text{ Ω}$$. The student's formula gives $$R = 2 \\times 6 = 12\\text{ Ή}$$ — off by a factor of 4. For any non-trivial values, the wrong formula gives a completely different (and meaningless) number with wrong units (A·V instead of V/A = Ω).\n\nThis was a documented error in the lesson (Phuc, video 1, 44:01). Always use the quotient: resistance is voltage *divided by* current.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "At the microscopic level, what causes a material to have electrical resistance? Describe the mechanism in two steps. (2 steps)", "answer": "- Step 1: As conduction electrons drift through a metal, they collide with the positive lattice ions that are vibrating about their equilibrium positions. Each collision transfers kinetic energy from the electron to the ion.\n- Step 2: The transferred energy makes the ion vibrate with greater amplitude — this is thermal energy (heat). The collisions reduce the electrons' drift velocity, meaning fewer electrons pass a given point per second for the same applied voltage. This opposition to current flow *is* resistance.\n\nThe key visual: imagine electrons as people trying to walk through a crowded room where the people (ions) are jiggling around. More jiggling → more collisions → harder to get through → higher resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "A resistor is connected in a circuit. A student says: \"The resistor stores the extra electrons that can't get through.\" Why is this wrong, and what actually happens to the electrons? (2 steps)", "answer": "- Step 1: A resistor does not store electrons. By Kirchhoff's First Law (conservation of charge), the same total current that enters the resistor must leave it every second. Electrons are not accumulated or trapped inside.\n- Step 2: What the resistor does is *slow down* the drift velocity of electrons through collisions with lattice ions. The *rate* of flow (current) is reduced, but every electron that goes in eventually comes out — just moving more slowly. The energy lost in collisions is dissipated as heat, not stored as charge.\n\nThink of it like a narrow pipe: water flows slower through a narrow section, but the same amount that enters must leave. The pipe doesn't store water — it restricts flow.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "State the precise wording of Ohm's Law as required by Edexcel. Why is \"Ohm's Law states that $$R = V/I$$\" incorrect? (2 steps)", "answer": "- Step 1: Ohm's Law states: **For a metallic conductor at constant temperature, the current is directly proportional to the potential difference across it** ($$I \\propto V$$, at constant temperature). Equivalently, the resistance is constant.\n- Step 2: $$R = V/I$$ is the *definition* of resistance — it applies to **all** components, ohmic or not. It tells you *how to calculate* resistance. Ohm's Law is an additional *physical statement* that says R stays constant (for metals at constant temperature). Writing \"$$R = V/I$$ is Ohm's Law\" confuses a definition with an empirical law about when R doesn't change.\n\nAnalogy: \"Speed = distance/time\" is a definition. \"Speed is constant\" is a physical law about uniform motion. Similarly, $$R = V/I$$ is a definition; \"R is constant\" is Ohm's Law.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "A component has $$V = 4.0\\text{ V}$$ across it and $$I = 0.5\\text{ A}$$ through it. Later, at a different operating point, $$V = 8.0\\text{ V}$$ and $$I = 1.0\\text{ A}$$. Does this component obey Ohm's Law? Explain. (2 steps)", "answer": "- Step 1: Calculate R at each point. At the first point: $$R_1 = 4.0/0.5 = 8.0\\text{ Ω}$$. At the second point: $$R_2 = 8.0/1.0 = 8.0\\text{ Ω}$$. The resistance is the same at both points.\n- Step 2: Since R is constant (and the current doubles when the voltage doubles, showing direct proportionality), the component obeys Ohm's Law — it is ohmic. The key test is: does R stay the same as V and I change? If yes → ohmic; if R changes → non-ohmic.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "To obtain an I–V characteristic experimentally, a potentiometer circuit is preferred over a simple rheostat-as-variable-resistor circuit. Why? (2 steps)", "answer": "- Step 1: A rheostat used as a simple variable resistor in series with the component can only *reduce* current from some minimum value — it cannot bring the p.d. across the component down to exactly 0 V. The minimum p.d. is limited by the ratio of the component's resistance to the total circuit resistance.\n- Step 2: A potentiometer (rheostat wired as a potential divider) can vary the p.d. across the component continuously from 0 V to the full supply voltage. This gives more data points near the origin, which is crucial for establishing whether the graph is a straight line through the origin (ohmic) or curved (non-ohmic).\n\nFrom the textbook data: with a rheostat circuit, $$V_{\\min} = 0.50\\text{ V}$$; with a potentiometer, $$V_{\\min} = 0.00\\text{ V}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "In the I–V experiment, why must you wait at least 5 minutes after the forward-bias run before starting the reverse-bias run? (2 steps)", "answer": "- Step 1: During the forward-bias run, the component (especially a filament lamp or thermistor) heats up due to resistive heating ($$I^2R$$ losses). Its temperature is significantly above room temperature by the end of the run.\n- Step 2: If you immediately reverse the supply and take readings, the component is still hot, so the reverse-bias readings are taken at a *different temperature* than the forward-bias readings started at. This makes the comparison unfair — you'd be plotting data for two different thermal states on the same graph. Waiting 5 minutes allows the component to cool back to room temperature so both halves of the graph are taken under comparable conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "In the I–V experiment, why should you always start with the p.d. at its minimum value before switching on? (2 steps)", "answer": "- Step 1: If you switch on with a large p.d. already set, a large current surge flows through the component immediately. This can damage sensitive components (especially diodes or thin filaments) or even cause overheating/burning.\n- Step 2: Starting at minimum p.d. and gradually increasing allows you to control the current build-up smoothly and stop before exceeding the component's rated current. It also ensures the first data point is near the origin, which is essential for checking linearity.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "Draw/describe the correct circuit for measuring an I–V characteristic. Where is the ammeter placed, and where is the voltmeter placed? Why? (2 steps)", "answer": "- Step 1: The ammeter is placed **in series** with the component under test, so it measures the current *through* the component. The voltmeter is placed **in parallel** with the component, so it measures the p.d. *across* the component.\n- Step 2: The ammeter must be in series because current is the same through all components in series — it directly reads the component's current. The voltmeter must be in parallel because p.d. is the same across all components in parallel — it directly reads the component's voltage. The variable supply (potentiometer) is also in series, allowing the p.d. to be swept from 0 to maximum.\n\nThe circuit order is: variable supply → ammeter (series) → component → back to supply. Voltmeter connects across the component's two terminals (parallel).", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "For an I–V characteristic experiment, identify the independent variable, dependent variable, and a key control variable. (3 steps)", "answer": "- Step 1: **Independent variable**: the potential difference ($$V$$) across the component — this is what you deliberately change using the potentiometer.\n- Step 2: **Dependent variable**: the current ($$I$$) through the component — this is what you measure in response to each change in $$V$$.\n- Step 3: **Control variable**: for a filament lamp, keep each reading brief to avoid cumulative temperature rise distorting the curve; for a metal resistor, maintain room temperature. Temperature is the critical control variable because it affects resistance for non-ohmic components.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "An ohmic conductor has a straight-line I–V graph through the origin. Why does the gradient of this line equal $$1/R$$, not $$R$$? (2 steps)", "answer": "- Step 1: The convention is to plot $$I$$ on the y-axis and $$V$$ on the x-axis. The gradient (slope) of any graph is defined as $$\\frac{\\Delta y}{\\Delta x} = \\frac{\\Delta I}{\\Delta V}$$.\n- Step 2: From the definition $$R = V/I$$, we get $$I/V = 1/R$$. The gradient $$\\Delta I / \\Delta V$$ is exactly $$I/V = 1/R$$ for a straight line through the origin. So $$R = 1/\\text{gradient}$$. If you mistakenly read the gradient as R directly, you'd get the *reciprocal* of the resistance — a very different value.\n\nCommon trap: if the graph were plotted as $$V$$ vs $$I$$ (V on y-axis), then gradient would be R. But the standard convention is I vs V, so gradient = 1/R.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "An I–V graph for an ohmic conductor has gradient $$0.04\\text{ A/V}$$. What is the resistance? (2 steps)", "answer": "- Step 1: For an ohmic conductor, $$R = 1/\\text{gradient}$$. The gradient is $$0.04\\text{ A/V}$$, so $$R = 1/0.04 = 25\\text{ Ω}$$.\n- Step 2: Unit check: $$1/(\\text{A/V}) = \\text{V/A} = \\text{Ω}$$. This confirms the answer is in ohms. ✓\n\nQuick mental math: 1/0.04 = 1/(4/100) = 100/4 = 25.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "A non-ohmic component's I–V curve passes through the point $$(V = 3.0\\text{ V}, I = 0.15\\text{ A})$$. A student calculates the gradient at that point and takes its reciprocal to find R. Why is this wrong, and what should they do instead? (2 steps)", "answer": "- Step 1: The gradient of the curve at a point is $$dI/dV$$ (the *differential* or *dynamic resistance* $$1/(dV/dI)$$), which tells you how the current changes for an infinitesimal change in voltage. This is not the same as the actual resistance at that point.\n- Step 2: The resistance at a specific operating point is always defined as $$R = V/I$$ at that point — read off the values of $$V$$ and $$I$$ from the graph and divide. Here: $$R = 3.0/0.15 = 20\\text{ Ω}$$. The gradient method would give a different (incorrect) value because the curve is not a straight line through the origin.\n\nVisual: to find R at a point, draw a straight line from the origin to that point. The gradient of *that line* is $$I/V = 1/R$$. The gradient of the *curve itself* at that point is something else entirely.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "You need to find what p.d. must be applied to a non-ohmic component so that its resistance equals 50 Ω. You can't simply calculate $$V = IR$$ because I is unknown. Describe the graphical method to solve this. (3 steps)", "answer": "- Step 1: On the I–V graph, draw a straight line through the origin with gradient $$= 1/R = 1/50 = 0.02\\text{ A/V}$$. This line represents *all* $$(V, I)$$ pairs that give a resistance of 50 Ω (since every point on it satisfies $$R = V/I = 50\\text{ Ω}$$).\n- Step 2: To plot this line, pick any convenient V and calculate the corresponding I. For example, at $$V = 1.0\\text{ V}$$: $$I = V/R = 1.0/50 = 0.02\\text{ A} = 20\\text{ mA}$$. Mark the point $$(1.0, 20\\text{ mA})$$ and draw a straight line through the origin and this point.\n- Step 3: Find where this straight line *intersects
