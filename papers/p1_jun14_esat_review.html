<script>
const DATA={"selected": [{"question": "Why is it important to verify that $$f'(\\frac{5}{2}) = 0$$ in Q10c — and what would it mean if the derivative weren't zero? (Q10c)", "answer": "- Step 1: Verifying $$f'(\\frac{5}{2}) = 0$$ confirms that $$x = \\frac{5}{2}$$ is indeed a **turning point** (stationary point). If the derivative were non-zero, it wouldn't be a turning point and the tangent wouldn't be horizontal.\n- Step 2: $$f'(\\frac{5}{2}) = 12(\\frac{25}{4}) - 24(\\frac{5}{2}) - 15 = 75 - 60 - 15 = 0$$. ✓ Confirmed.\n- Step 3: The question says \"show the tangent at the turning point $$x = \\frac{5}{2}$$ has the form $$y = k$$.\" The word \"show\" requires you to demonstrate $$f'(\\frac{5}{2}) = 0$$ (proving it's a turning point with horizontal tangent) and then compute $$f(\\frac{5}{2}) = -54$$ (the value of $$k$$). Both steps are needed for full marks.", "source": "GLM 5.1 ②", "_id": "glm_2_58"}, {"question": "When filling a two-way table with partial information, what's the correct fill-order strategy — and what mistake does it prevent? (ESAT 1) (2 steps)", "answer": "- Step 1: **Deduce one cell at a time.** After placing all direct givens, scan for any row or column where only one cell is unknown — that cell equals (row/column total) minus (sum of known cells in that row/column).\n- Step 2: This prevents the mistake of trying to solve multiple unknowns simultaneously in your head, which is exactly where arithmetic slips happen. Harry: *\"Don't go for it. Do it one step at a time.\"* Each single deduction is a simple subtraction — easy to verify.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "When solving for an unknown using the sine rule, why must you ALWAYS check which branch of the inverse sine you need?", "answer": "- Step 1: $$\\sin^{-1}(k)$$ on a calculator returns only the principal value in $$[-90°, 90°]$$ (or $$[-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2}]$$). But $$\\sin\\theta = k$$ has TWO solutions in $$[0°, 180°]$$.\n- Step 2: For a valid triangle angle (between $$0°$$ and $$180°$$), both the acute $$\\alpha$$ and obtuse $$180° - \\alpha$$ are mathematically possible. The geometry — or an explicit instruction — picks one.\n- Step 3: Reflex: after using sine rule, ask \"is the angle acute, obtuse, or specified?\" If the question says \"obtuse\" or shows a sketch with an obtuse-looking angle, use $$180° - \\alpha$$.\n\nCommon slip: blindly accepting the calculator's acute output when geometry/question requires obtuse.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "You're about to write the first line of working on a differentiation question (e.g., rewriting surds as powers). How much time should you spend on this line compared to the rest — and why? (Q1a, Harry's coaching)", "answer": "- Step 1: **Spend disproportionately more time on the first line.** Harry: *\"The very first line is the most important… a slip there has a snowball effect.\"*\n- Step 2: An error on line 1 propagates through every subsequent line. In Q1a, a slip in differentiating $$-24x^{-1/2}$$ produced a wrong derivative, which gave a wrong gradient at P, which gave a wrong tangent equation — losing marks in both parts (a) and (b).\n- Step 3: The practical rule: **be fast in general, but slow and deliberate on the first couple of lines.** Double-check the first line before you move on. The 10 extra seconds you spend verifying line 1 can save 5 minutes of re-deriving everything when you spot an error later (or, worse, can save you from an undetected snowball).", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "In ESAT 1 (summer activities), what trigger phrase tells you the denominator must be a row total rather than the grand total? (2 steps)", "answer": "- Step 1: Spot the restricted-sample-space language: \"A boy is picked at random\" followed by \"that he chose swimming.\" The pronoun \"he\" locks the sample space to boys only.\n- Step 2: Therefore compute $$P(\\text{swim} \\mid \\text{boy}) = \\frac{\\text{boys who swim}}{\\text{total boys}}$$, not over the grand total of $$120$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_1"}, {"question": "Q10(d) ends \"state the possible values of $$a$$\" — what linguistic clue tells you to expect more than one answer, and how do you make this a habit?", "answer": "- Step 1: The word **\"values\" (plural)** is the cue. If only one answer were expected, the question would say \"the value of $$a$$\".\n- Step 2: Habit: **scan the requirement words for plurality** — \"values\", \"solutions\", \"points\", \"intersections\", \"roots\" — and assume you need ≥2 answers.\n- Step 3: Combined with Theme 2 (underline requirements), this prevents the failure mode of writing one root and stopping when the mark scheme wants both.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "What's the \"size-check\" technique for catching arithmetic slips, and how do you apply it?", "answer": "- Step 1: Before writing down a calculated number, mentally bracket its magnitude: $$6 - 1.42$$ is \"a bit under 5\", $$46 - 25$$ is \"about 20\", $$8 - 2 - \\tfrac{1}{6}$$ is \"just under 6\".\n- Step 2: After writing, COMPARE the written value to the bracket. If they disagree, re-key/re-compute. $$0.96$$ does NOT match \"a bit under 5\" — that's a red flag.\n- Step 3: For sign: check whether the answer should be positive or negative based on the larger magnitude. If your written sign is wrong, the magnitude check usually catches it.\n\nMake this a 2-second automatic step after every subtraction or arithmetic operation.", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "Q9(a): the curve $$y = 4\\sin\\theta$$ has its minimum at $$\\theta = 270°$$, $$y = -4$$. You wrote \"$$-4$$\". Why does this score only 1 of 2 marks?", "answer": "- Step 1: The question said \"state the COORDINATES of the minimum\". Coordinates are an ordered pair: $$(\\theta, y)$$.\n- Step 2: You gave only the $$y$$-value, not the $$\\theta$$-value. So the answer is incomplete.\n- Step 3: Correct answer: $$(270°, -4)$$ — the point in the $$\\theta y$$-plane. This banks both marks.\n\nHarry: \"part A asks you for coordinates — it wants $$x$$ and $$y$$. You've just given me $$y$$, so you only get one mark; notice this is two marks.\" Underline \"coordinates\" reflexively.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "What is the sector-area formula in radians, and why does it look so different from the degree version?", "answer": "- Step 1: In radians: $$\\text{Area} = \\tfrac12 r^2 \\theta$$.\n- Step 2: Why: by definition, $$\\theta$$ rad corresponds to an arc length $$r\\theta$$, and a full circle is $$2\\pi$$ rad. The fraction of the disc covered by angle $$\\theta$$ is $$\\tfrac{\\theta}{2\\pi}$$, so area $$= \\tfrac{\\theta}{2\\pi} \\cdot \\pi r^2 = \\tfrac12 r^2 \\theta$$.\n- Step 3: In degrees you'd need $$\\tfrac{\\theta}{360} \\cdot \\pi r^2$$ — clunkier. Radians make sector and arc formulae clean because they're built around the unit circle.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "ESAT warm-up problem 1: 120 students, 46 girls, 36 chose tennis (⅔ boys), 25 girls swam, 27 chose archery. Your first instinct was to use $$x, y, z$$ simultaneous equations. Why did Harry redirect you, and to what?", "answer": "- Step 1: With three unknowns, simultaneous equations get \"hairy\" — you compound algebra errors and lose time on a $$\\sim 90$$-second-per-question paper.\n- Step 2: Harry's redirect: **organise the information into a two-way table** (boys/girls × swim/archery/tennis with a total row and column). Each datum becomes a single cell, so there is no algebra at all — just additions and subtractions.\n- Step 3: Takeaway: when a problem gives many pieces of categorical/count information, **default to a table, not to variables**. Equations are for relations between quantities; tables are for sorting given facts.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "When solving a \"hidden quadratic\" like $$2(y-5)^6 + 3(y-5)^4 - 35(y-5)^2 = 0$$, what substitution collapses it — and what constraint must you apply to the solutions? (Q5b) (3 steps)", "answer": "- Step 1: Let $$u = (y-5)^2$$. Then $$(y-5)^4 = u^2$$ and $$(y-5)^6 = u^3$$, so the equation becomes $$2u^3 + 3u^2 - 35u = 0$$ — the same cubic from part (a), now in $$u$$.\n- Step 2: Solve for $$u$$: you get $$u = 0$$, $$u = \\frac{7}{2}$$, $$u = -5$$. Now apply the constraint: **$$u = (y-5)^2 \\geq 0$$**, so reject $$u = -5$$ (a squared quantity cannot be negative).\n- Step 3: Back-substitute the valid $$u$$ values. $$u = 0 \\Rightarrow (y-5)^2 = 0 \\Rightarrow y = 5$$. $$u = \\frac{7}{2} \\Rightarrow (y-5)^2 = \\frac{7}{2} \\Rightarrow y = 5 \\pm \\sqrt{\\frac{7}{2}} = 5 \\pm \\frac{\\sqrt{14}}{2}$$.\n\nKey insight: the substitution works because the exponents 6, 4, 2 are all even — they're multiples of 2, so $$(y-5)^2$$ is the natural base.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "When a question says \"the surface area is numerically equal to the volume,\" what's the first equation you write down — and what algebraic trick clears the common factor? (ESAT 2) (3 steps)", "answer": "- Step 1: Write $$\\pi r^2 h = 2\\pi r^2 + 2\\pi r h$$. This is \"volume = surface area\" with both formulae substituted.\n- Step 2: **Divide through by $$\\pi$$** immediately — it appears in every term, so it cancels cleanly: $$r^2 h = 2r^2 + 2rh$$.\n- Step 3: Gather the $$h$$ terms on one side and factor out $$h$$: $$r^2 h - 2rh = 2r^2 \\Rightarrow h(r^2 - 2r) = 2r^2$$. Then divide and simplify: $$h = \\frac{2r^2}{r^2 - 2r} = \\frac{2r^2}{r(r-2)} = \\frac{2r}{r-2}$$. The key cancellation: factor $$r$$ out of the denominator to cancel with the numerator's $$r^2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "What's the meta-lesson about ESAT vs P1 that Harry kept emphasising across both halves of the lesson?", "answer": "- Step 1: ESAT and P1 are not separate skills — they share the same execution-level habits. Careless mental subtraction bit you in BOTH halves (ESAT $$46-25$$ and P1 $$6-1.42$$).\n- Step 2: The fix for one is the fix for the other. Drilling rapid mental subtraction with an app pays off in both exams.\n- Step 3: Similarly: tick-as-you-use, underline-the-requirement, recognise-the-trigger-phrase — these are universal exam habits, not topic-specific techniques.\n\nImplication: every habit drill counts twice. The leverage is enormous.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "Why does the calculator's $$\\sin^{-1}$$ function only give the acute angle, and how do you systematically find the obtuse alternative? (2 steps)", "answer": "- Step 1: By definition, the inverse sine function $$\\sin^{-1}$$ has range $$[-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$$. It physically cannot output values in $$(\\frac{\\pi}{2}, \\pi]$$, so it always returns the acute solution when the input is positive.\n- Step 2: For any $$\\sin\\theta = k > 0$$ with $$\\theta \\in [0, \\pi]$$, the obtuse solution is always $$\\pi - \\sin^{-1}(k)$$. This follows from the identity $$\\sin(\\pi - \\alpha) = \\sin\\alpha$$. So: compute the calculator value, then compute $$\\pi$$ minus that value, and choose the one the question asks for.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "To count solutions of $$\\tan\\theta = 1 + \\sin\\theta$$ over a large range like $$0 \\leq \\theta \\leq 2160°$$, what's the efficient strategy — and why does it work? (Q9c) (2 steps)", "answer": "- Step 1: **Count the intersections in one period** ($$0°$$ to $$360°$$) by sketching both curves. $$\\tan\\theta$$ has period $$180°$$ and $$1 + \\sin\\theta$$ has period $$360°$$; over one $$360°$$ window, they cross a fixed number of times.\n- Step 2: **Multiply by the number of whole periods** in the range. $$2160° \\div 360° = 6$$ periods, so total solutions = (solutions per period) × 6. For $$1980°$$, that's $$5\\frac{1}{2}$$ periods — so it's 5 full periods plus a half-period adjustment, minding the endpoints.\n\nKey insight: you never count all solutions individually. You count the *pattern* once, then scale. This is the same skill as the June-12 lesson on $$\\tan\\theta = \\frac{1}{x} + 1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "Harry called Q7 \"the costliest question\" of the paper. What were the three distinct execution failures it contained — each a different theme?", "answer": "- Step 1: **(b) — Branch failure (Theme 2):** Didn't underline \"obtuse\", used the calculator's acute $$\\sin^{-1}$$ result $$0.884$$ instead of $$\\pi - 0.884 = 2.258$$.\n- Step 2: **(c) — Careless subtraction (Theme 1):** Mis-evaluated $$OD$$ as $$0.96$$ instead of $$\\approx 1.42$$, then propagated through $$CD$$ and the perimeter.\n- Step 3: **(c) — Blank space (Theme 4):** Stopped writing without substituting and finishing, so no method marks were salvaged. One question; three themes; ~3 marks lost.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "When integrating a term like $$-\\frac{8}{3x^2} = -\\frac{8}{3}x^{-2}$$, what happens to the power and the coefficient — and what sign error is most common? (Q8b)", "answer": "- Step 1: Apply the power rule in reverse: $$\\int kx^n \\, dx = \\frac{k}{n+1}x^{n+1}$$. Here $$n = -2$$, so $$n + 1 = -1$$: $$\\int -\\frac{8}{3}x^{-2} \\, dx = -\\frac{8}{3} \\cdot \\frac{1}{-1} x^{-1} = +\\frac{8}{3}x^{-1} = \\frac{8}{3x}$$.\n- Step 2: The most common sign error: forgetting that dividing by $$n+1 = -1$$ **flips the sign**. Students write $$-\\frac{8}{3} \\cdot x^{-1} = -\\frac{8}{3x}$$, missing the sign change from dividing by $$-1$$.\n- Step 3: A quick check: the derivative of $$\\frac{8}{3x} = \\frac{8}{3}x^{-1}$$ is $$\\frac{8}{3}(-1)x^{-2} = -\\frac{8}{3x^2}$$. ✓ This confirms the integral is correct.", "source": "GLM 5.1 ②", "_id": "glm_2_35"}, {"question": "What is the cosine rule's cousin — the sine rule — and what is the operational rule for \"when to use which\"? (3 steps)", "answer": "- Step 1: Sine rule: $$\\dfrac{a}{\\sin A} = \\dfrac{b}{\\sin B} = \\dfrac{c}{\\sin C}$$. Use when you have **a side + its opposite angle**, plus one other side or angle.\n- Step 2: Cosine rule: $$a^2 = b^2 + c^2 - 2bc \\cos A$$. Use when you have **all three sides** (find an angle) or **two sides + their included angle** (find the third side).\n- Step 3: Q7(b) used sine rule because you had side $$AD = 5$$ opposite angle $$0.7$$, and side $$AO = 6$$ opposite the unknown angle $$ADO$$.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "Why is re-keying a subtraction on the calculator superior to simply \"being more careful\" when doing it mentally? (2 steps)", "answer": "- Step 1: Mental subtraction under pressure relies on working memory, which is vulnerable to interference from other calculations; a calculator removes this cognitive load.\n- Step 2: The two-second cost of re-keying is far less than the cost of losing one or more accuracy marks for a single arithmetic slip.", "source": "Kimi K2.6 ②", "_id": "kimi_2_42"}, {"question": "Q7(c) — you stopped after writing the perimeter formula with an uncertain $$OD$$ value, leaving the part effectively blank. What is Harry's rule for this situation, and why does it work? (3 steps)", "answer": "- Step 1: **Never leave a part blank.** Even if you know a value is wrong, substitute it in and grind to a final answer.\n- Step 2: A blank scores **zero**. A substituted expression — even with a wrong number — can score the **method (M) marks**. The mark scheme awards M marks for the correct method with numerical values substituted, regardless of whether those values are right.\n- Step 3: Harry's tactic: \"Put a little star next to it, and if you've got time come back.\" The star marks it as uncertain but the method marks are banked. Had you written perimeter $$= 33.5 + (6 - OD) + 5$$ with *any* number for $$OD$$, you would have scored method marks instead of zero.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "What is the formula for the area of a triangle when you know two sides and the included angle (in radians) — and when is it useful? (Q7 context)", "answer": "- Step 1: Area $$= \\frac{1}{2}ab\\sin C$$, where $$a$$ and $$b$$ are two sides and $$C$$ is the included angle (in radians or degrees — just be consistent).\n- Step 2: This is useful when you don't have the base and height directly but you do have two sides and the angle between them. In Q7, triangle AOD has sides 6 and 5 with included angle 0.7 rad, so area $$= \\frac{1}{2}(6)(5)\\sin(0.7)$$.\n- Step 3: Memorise this alongside the sector-area formula $$\\frac{1}{2}r^2\\theta$$ — they have the same structure ($$\\frac{1}{2} \\times \\text{side} \\times \\text{side} \\times \\sin$$ or $$\\frac{1}{2} \\times r \\times r \\times \\theta$$), which makes them easier to remember as a pair.", "source": "GLM 5.1 ②", "_id": "glm_2_71"}, {"question": "For a solid cylinder (radius $$r$$, height $$h$$), why is the curved surface area equal to $$2\\pi r h$$? Build the intuition, do not just quote it. (3 steps)", "answer": "- Step 1: Imagine the curved side as a label on a tin or a sheet of wrapping paper around a toilet roll.\n- Step 2: **Cut the label vertically and unfurl it** — it flattens into a rectangle.\n- Step 3: One side of that rectangle is the height $$h$$; the other side is the distance once around the circle, which is the circumference $$2\\pi r$$. So curved area $$= h \\times 2\\pi r = 2\\pi r h$$.\n\nCombine with the two circular ends ($$2 \\pi r^2$$) to get the full $$S = 2\\pi r^2 + 2\\pi r h$$.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "In the sine rule calculation for Q7c, you needed the third angle of triangle AOD. Given two angles are 0.7 rad and 2.258 rad, how do you find the third — and what identity are you using? (Q7c)", "answer": "- Step 1: The **angles in a triangle sum to $$\\pi$$ radians** (180°). So the third angle $$= \\pi - 0.7 - 2.258 \\approx 0.184$$ rad.\n- Step 2: This is the angle-angle-angle identity for triangles in radians: $$A + B + C = \\pi$$. In degrees, it would be $$A + B + C = 180°$$.\n- Step 3: This third angle ($$\\angle OAD = 0.184$$ rad) is then used in the sine rule to find side $$OD$$: $$OD = \\frac{6 \\sin 0.184}{\\sin 2.258} \\approx 1.42$$. The angle-sum step is essential — you can't apply the sine rule without knowing (or being able to deduce) an angle-side pair.", "source": "GLM 5.1 ②", "_id": "glm_2_53"}, {"question": "When a function $$f(x) = (x - 4)(2x + 1)^2$$ has a \"touch\" point at $$x = -\\tfrac{1}{2}$$ and a \"cross\" point at $$x = 4$$, what determines the touch vs cross behaviour?", "answer": "- Step 1: A REPEATED root (here $$(2x+1)^2$$ — multiplicity 2) means the curve TOUCHES the $$x$$-axis but doesn't cross. Geometrically, the curve \"kisses\" the axis and bounces back.\n- Step 2: A SIMPLE root (here $$(x - 4)$$ — multiplicity 1) means the curve CROSSES the $$x$$-axis at that point — the sign of $$y$$ changes.\n- Step 3: General rule: even multiplicity → touch, odd multiplicity → cross. So $$(2x+1)^2$$ → touch at $$x = -\\tfrac{1}{2}$$; $$(x-4)^1$$ → cross at $$x = 4$$.\n\nThis is also why $$x = -\\tfrac{1}{2}$$ is a turning point of $$f$$.", "source": "Opus 4.7 ①", "_id": "opus_1_56"}, {"question": "A quadratic like $$2x^2 + 3x - 35 = 0$$ factorises as $$(2x - 7)(x + 5)$$. Why is factorising better than using the quadratic formula, even when both produce the same answer?", "answer": "- Step 1: Factorising is faster — no formula substitution, no square root, no $$\\pm$$ to handle.\n- Step 2: Factorising is more reliable on a non-calculator paper — fewer arithmetic operations means fewer chances for slips.\n- Step 3: It also gives integer/rational roots in their simplest form directly, with no need to simplify a surd.\n\nRecognition: if the discriminant is a perfect square, factorisation will work. Spend $$\\sim$$10 seconds trying factors of the leading and trailing coefficients before defaulting to the formula.", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "P1 Q8(a) asked for the normal at $$P$$ \"in the form $$ax + by + c = 0$$ with integer coefficients\". Your arithmetic was correct; what marked the difference between full marks and the A you lost?", "answer": "- Step 1: You produced an equation with **fractional coefficients** and stopped. The mark scheme required integers.\n- Step 2: The fix is procedural: when you see \"integer coefficients\", your final mechanical step is to **multiply through to clear all fractions**, then verify $$a, b, c \\in \\mathbb{Z}$$ on a separate check line.\n- Step 3: For the actual numbers: $$y - 1 = -\\tfrac{6}{35}(x - 4)$$ → multiply by $$35$$ → $$35y - 35 = -6(x - 4)$$ → $$6x + 35y - 59 = 0$$, with $$a=6, b=35, c=-59$$ all integers. **The maths was already done — only the presentation lost the mark.**", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "P1 Q2(b) asked for the answer in form $$p + q\\sqrt 2$$. What ordering convention does that wording lock in, and why does it matter for the mark?", "answer": "- Step 1: $$p + q\\sqrt 2$$ means the **rational part first ($$p$$), the surd part second ($$q\\sqrt 2$$)** — same order the question states.\n- Step 2: Markers scan fast. A flipped order ($$10\\sqrt 2 + 10$$) can trigger a moment of doubt or even fail an automated check.\n- Step 3: Habit: when the question gives the form, **literally match the order** of the symbols in your answer. Underline the form in the stem and tick it after writing.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "When you spot $$\\tan\\theta = 1 + \\sin\\theta$$ in a range much larger than $$360^\\circ$$, why is it foolish to try to solve algebraically and what is the right mental model? (2 steps)", "answer": "- Step 1: Algebraically this becomes $$\\sin\\theta = \\cos\\theta + \\sin\\theta \\cos\\theta$$ — messy, multiple solutions per period, and you'd have to hunt every one across the range manually. Not tractable in exam time.\n- Step 2: Right mental model: **sketch both curves on one set of axes for one period**, count crossings visually, then multiply by the number of periods (with care for partial periods and endpoints). The graph does the bookkeeping for you.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "When a question part says \"hence,\" what does this word signal about your method? (2 steps)", "answer": "- Step 1: \"Hence\" means you **must use the result from the previous part** — not solve from scratch. The examiner is testing whether you can connect the parts of the question.\n- Step 2: In Q2(b), \"hence solve\" means use the rationalised form from (a) to evaluate $$\\frac{20\\sqrt{2}}{4-2\\sqrt{2}}$$. In Q3(c), \"hence state\" means intersect the result of (b) with the condition from (a). Ignoring \"hence\" and re-deriving may still get the answer but wastes time and may not score the method marks if the mark scheme requires the connection.", "source": "GLM 5.1 ③", "_id": "glm_3_64"}, {"question": "Q1(b) — you lost a mark in part (b) because of an error in part (a). What's the general principle about how marks cascade between parts? (2 steps)", "answer": "- Step 1: In Edexcel mark schemes, if part (b) uses the result of part (a), an error in (a) typically causes a **follow-through error** in (b). The method marks in (b) may still be awarded (if you use the correct method with your wrong value from (a)), but the accuracy marks are lost.\n- Step 2: This is why \"the first line is the most important\" — a slip in the opening differentiation (part a) not only loses the mark there but also kills the accuracy mark in the tangent equation (part b). One early slip = multiple lost marks. Double-check the first line before moving on.", "source": "GLM 5.1 ③", "_id": "glm_3_50"}, {"question": "When you factorise a polynomial like $$2x^3 + 3x^2 - 35x = x(2x^2 + 3x - 35) = 0$$, what root is dangerously easy to lose — and what habit guarantees you never lose it? (Theme 3, Q5a)", "answer": "- Step 1: The factor of $$x$$ outside the bracket gives the root **$$x = 0$$**. This is the one students routinely drop because they rush to solve the quadratic bracket and forget the bare factor.\n- Step 2: The habit: **the instant you factor out $$x$$ (or $$\\sin\\theta$$, or any variable), write down the \"$$= 0$$\" root before you touch the quadratic.** Literally write \"$$x = 0$$\" on the next line, then solve the bracket.\n- Step 3: Harry's verdict on Q5a: *\"Almost perfect — you scored the method mark… but you lost the mark because you lost this: there are two possibilities, either $$x = 0$$ or the bracket $$= 0$$; because you lost the '$$= 0$$', you lost the final mark.\"* Your own reflection: *\"I forgot about $$x = 0$$.\"*\n\nThis applies whenever you take out a common variable factor — the factor itself is always a solution.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "When reading an exam question for the first time, what is the very first physical action you should take with your pen — before any calculation? (Theme 2)", "answer": "- Step 1: **Underline every instruction word and key requirement** in the question stem. This includes: the form of the answer, the accuracy required, which branch (obtuse/acute), whether it asks for coordinates or a value, and any special conditions (integers, exact form).\n- Step 2: The underlines serve as a contract: each one is a requirement you must satisfy. Without them, you rely on memory to check all conditions at the end — and under time pressure, you will forget at least one.\n- Step 3: Harry: *\"As you read through, underline the key information… then at the end check — is this obtuse? It's not between $$\\pi/2$$ and $$\\pi$$, so it's wrong.\"* The underlines are what make the final check possible. Without them, you have no checklist to tick.", "source": "GLM 5.1 ②", "_id": "glm_2_93"}, {"question": "WMA11/01 Jun 2019 Q4 — When integrating term-by-term, why must you include a single constant $$+C$$ at the end, not one per term?", "answer": "The constant of integration represents an arbitrary vertical shift of the entire family of antiderivatives. Adding multiple constants ($$C_1 + C_2$$) collapses to a single arbitrary constant anyway, so only one $$+C$$ is written at the end of the entire expression.", "source": "Kimi K2.6 ①", "_id": "kimi_1_48"}, {"question": "Pearson mark-scheme nuance from Q2(a): the question asks for $$a, b$$ \"rational\". You worried it required fractions because the answer is $$\\tfrac12 + \\tfrac14 \\sqrt 2$$. Why is the answer correct anyway, and what's the broader lesson?", "answer": "- Step 1: **Whole numbers ARE rational** ($$10 = \\tfrac{10}{1}$$, etc.), so any integer or fraction counts. The mark scheme allows it.\n- Step 2: The broader lesson: **know your number-set hierarchy** — naturals ⊂ integers ⊂ rationals ⊂ reals. \"Rational\" only excludes irrational/surd answers, not integers.\n- Step 3: Don't doubt an answer that fits the wording — wasting time second-guessing a correct answer is itself a slip.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "What's the keyword distinction between \"state the value\" and \"state the coordinates\" in an exam question, and how does it change your answer format?", "answer": "- Step 1: \"Value\" = a single number (e.g., $$y = -4$$). One quantity.\n- Step 2: \"Coordinates\" = an ordered pair (e.g., $$(270°, -4)$$). Two quantities.\n- Step 3: Other variants: \"find the point\" = coordinates; \"find the $$y$$-intercept\" = a single value $$y$$ (since $$x = 0$$ is implicit); \"find where the curve meets the $$x$$-axis\" = the $$x$$-value(s).\n\nAlways check whether the question wants a number or a point — they reward different things.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "What does Harry mean by \"the calculator's $$\\sin^{-1}$$ only gives the acute angle\"? Make the trig precise. (3 steps)", "answer": "- Step 1: $$\\sin^{-1}: [-1, 1] \\to [-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2}]$$ — the **principal value** branch. So it returns angles only in the range $$-90^\\circ$$ to $$90^\\circ$$ (equivalently, in $$[0, \\tfrac{\\pi}{2}]$$ for positive inputs).\n- Step 2: But $$\\sin\\theta$$ is **two-to-one** on $$[0, \\pi]$$: for any $$\\sin\\theta = k$$ with $$0 < k < 1$$, the equation has *two* solutions in this interval — one acute and one obtuse.\n- Step 3: To recover the obtuse one: $$\\theta_{\\text{obtuse}} = \\pi - \\theta_{\\text{acute}}$$ (using the identity $$\\sin(\\pi - \\theta) = \\sin\\theta$$). Habit: whenever the problem specifies \"obtuse\", apply this complement step.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "When does $$\\sin^{-1}$$ (on a calculator) NOT give you the angle you want, and what's the universal fix?", "answer": "- Step 1: $$\\sin^{-1}$$ returns the principal value in $$[-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2}]$$ — i.e., the ACUTE angle (or zero/negative).\n- Step 2: But $$\\sin\\theta = k$$ has multiple solutions: in $$[0, \\pi]$$, both $$\\alpha$$ and $$\\pi - \\alpha$$ work; over the whole real line, infinitely many ($$\\alpha + 2\\pi n$$ and $$\\pi - \\alpha + 2\\pi n$$).\n- Step 3: Fix: identify which range the question wants (acute/obtuse/specific quadrant), and adjust the principal value accordingly: use $$\\pi - \\alpha$$ for obtuse, $$\\alpha + 2\\pi n$$ for other periods.\n\nThis is the same issue with $$\\cos^{-1}$$ and $$\\tan^{-1}$$ — each has its own restricted range to memorise.", "source": "Opus 4.7 ①", "_id": "opus_1_60"}, {"question": "ESAT timing is ~90 seconds per question. How does this change your approach to formulae compared to a P1 exam? (2 steps)", "answer": "- Step 1: In ESAT, you **cannot afford to re-derive formulae** from first principles. There's no time to draw the unfurled cylinder, reason about the curved surface area, and then compute. You must recall $$S = 2\\pi r^2 + 2\\pi r h$$ instantly.\n- Step 2: In P1 (75 minutes for ~10 questions), you have ~7.5 minutes per question — enough time for careful derivation if needed. But even in P1, memorising formulae saves time for the harder parts and reduces the chance of a derivation error. The ESAT habit of cold recall benefits both exams.", "source": "GLM 5.1 ③", "_id": "glm_3_49"}, {"question": "Why do we care about underlining \"obtuse\" specifically, vs. just doing $$\\sin^{-1}$$ and trusting the calculator? Build the intuition. (3 steps)", "answer": "- Step 1: For a **triangle** with three positive angles summing to $$\\pi$$, an angle can be acute ($$<\\tfrac{\\pi}{2}$$) or obtuse ($$\\in (\\tfrac{\\pi}{2}, \\pi)$$). $$\\sin$$ takes the same value at both, so the sine rule alone is ambiguous.\n- Step 2: The problem statement disambiguates: \"given that angle $$ADO$$ is obtuse\". The calculator does not know this; it just returns the principal value (the acute one).\n- Step 3: So underlining \"obtuse\" is the only way you remember to **override the calculator's default** and report $$\\pi - \\theta_{\\text{acute}}$$ instead. This is the \"ambiguous case\" of the sine rule.", "source": "Opus 4.7 ②", "_id": "opus_2_57"}, {"question": "ESAT: \"A boy is picked at random. Find the probability that he chose swimming.\" Your instinct is to write $$\\tfrac{32}{120}$$. Why is this wrong, and what's the trigger phrase that forces the correction? (3 steps)", "answer": "- Step 1: The phrase \"a boy picked at random ... that **he** chose\" restricts the sample space to boys only. You are not picking from all 120 students — you are picking from the 74 boys.\n- Step 2: This is a conditional probability $$P(\\text{swim} \\mid \\text{boy})$$, so the denominator must be the boys total (the row total), not the grand total.\n- Step 3: Answer: $$\\dfrac{32}{74} = \\dfrac{16}{37}$$.\n\nTrigger phrase to memorise: \"given that ...\", \"picked from the [group]\", \"of the [group]\" → restricted sample space → divide by the row/group total, NOT the grand total.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "Once you've found $$c$$ in a \"tangent line\" problem, how do you find the actual point of tangency efficiently?", "answer": "- Step 1: With $$c$$ determined, the quadratic becomes a perfect square. Substituting $$c = -\\tfrac{49}{4}$$: $$x^2 - 7x + \\tfrac{49}{4} = (x - \\tfrac{7}{2})^2 = 0$$.\n- Step 2: The repeated root is the $$x$$-coordinate of the tangent point: $$x = \\tfrac{7}{2}$$.\n- Step 3: Substitute into the line equation: $$y = 4(\\tfrac{7}{2}) - \\tfrac{49}{4} = 14 - \\tfrac{49}{4} = \\tfrac{7}{4}$$. Point: $$(\\tfrac{7}{2}, \\tfrac{7}{4})$$.\n\nShortcut: the discriminant-zero quadratic always has $$x = -\\tfrac{b}{2a}$$ as its repeated root. No need to factorise.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "When a question says \"the line $$y = 4x + c$$ meets $$y = x(x-3)$$ at exactly one point,\" what are the three possible interpretations of \"meets at exactly one point\" — and which one applies here? (Q6a)", "answer": "- Step 1: Three interpretations: (a) the line is **tangent** to the curve (touches at one point, discriminant = 0), (b) the line intersects at exactly one point because the curve itself only exists at one point (not applicable for polynomials), (c) the line and curve are identical (infinite intersections — not \"exactly one\").\n- Step 2: Here, interpretation (a) applies: the line is tangent to the parabola. Setting them equal gives a quadratic, and \"exactly one intersection\" means the discriminant is zero.\n- Step 3: For straight lines and parabolas, \"exactly one point of intersection\" almost always means tangent. The discriminant test is the universal tool: $$b^2 - 4ac = 0$$ for tangency, $$> 0$$ for two intersections, $$< 0$$ for no intersections.", "source": "GLM 5.1 ②", "_id": "glm_2_82"}, {"question": "Why does Harry recommend \"deducing one cell at a time\" when filling a two-way table, rather than writing a system of equations across multiple cells?", "answer": "- Step 1: Each cell is determined by a single row or column subtraction once enough adjacent cells are known. Doing them one at a time keeps each step a single mental arithmetic operation.\n- Step 2: This is non-calculator, so each subtraction is a small, low-risk computation — much safer than algebraic manipulation of three unknowns.\n- Step 3: \"Don't go for it. Do it one step at a time.\" Each cell, once placed, becomes a known quantity supporting the next deduction. The error surface shrinks dramatically.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "In the P1 paper review, what's the difference between an \"M\" mark, a \"dM\" mark, and an \"A\" mark in Edexcel marking? (General)", "answer": "- Step 1: **M (Method) marks** are awarded for selecting the correct approach or writing the correct formula/substitution, even if the final answer is wrong\n- Step 2: **dM (Dependent Method) marks** depend on a previous M mark — you can only earn them if you earned the M mark they depend on\n- Step 3: **A (Accuracy) marks** are for the final correct numerical or algebraic answer\n- Step 4: In Q7(c), you lost the dM and A marks because your $OD$ value was wrong — but you could have kept the M mark for setting up the perimeter expression\n\n**Takeaway:** Method marks reward the approach; accuracy marks reward the number. Protect both with careful arithmetic.", "source": "MiniMax ②", "_id": "minimax_2_49"}, {"question": "What's the difference between the perimeter and the area of a shape — and which one involves only the boundary? (Q3, Q7)", "answer": "- Step 1: **Perimeter** is the total length of the **boundary** (the edges you'd trace with your finger). **Area** is the space **enclosed** by the boundary.\n- Step 2: In Q3, the perimeter is the sum of all side lengths: $$(2x-1) + 2x + (2x-1) + 3x + (6x-2) + 5x = 22x - 4$$. The area is the space inside, computed from the rectangle and the extra section.\n- Step 3: The common confusion: including interior edges in the perimeter (e.g., the shared edge between the sector and triangle in Q7). Only the **outer** boundary counts for perimeter. Interior edges are not part of the perimeter.", "source": "GLM 5.1 ②", "_id": "glm_2_90"}, {"question": "When the sine rule gives you $$\\frac{6}{\\sin ADO} = \\frac{5}{\\sin 0.7}$$, how do you isolate $$\\sin ADO$$ — and what's the common rearrangement error? (Q7b) (2 steps)", "answer": "- Step 1: Cross-multiply: $$5 \\sin ADO = 6 \\sin 0.7$$, so $$\\sin ADO = \\frac{6 \\sin 0.7}{5}$$. The \"6\" goes with the sine of the angle opposite the side of length 6 (angle at $$D$$ opposite side $$OA = 6$$); the \"5\" goes with the sine of the given angle (angle at $$O$$ opposite side $$AD = 5$$).\n- Step 2: Common error: flipping the fraction — writing $$\\sin ADO = \\frac{5 \\sin 0.7}{6}$$. This happens when you forget which side is opposite which angle. The sine rule is $$\\frac{a}{\\sin A} = \\frac{b}{\\sin B}$$: side over the sine of its *opposite* angle. Always pair each side with the angle directly across from it.", "source": "GLM 5.1 ①", "_id": "glm_1_45"}, {"question": "For \"discriminant = 0\" tangency problems, why does the quadratic always reduce to a perfect square $$(x - k)^2 = 0$$, and what's the geometric meaning?", "answer": "- Step 1: Discriminant = 0 means the quadratic $$ax^2 + bx + c = 0$$ has a repeated root. Algebraically, this means it factorises as $$a(x - k)^2 = 0$$ for some $$k$$.\n- Step 2: Geometrically, the line and curve touch at exactly one point — they meet but don't cross. This is the defining condition of tangency.\n- Step 3: The repeated root $$x = k$$ is the $$x$$-coordinate of the tangency point, with $$k = -\\tfrac{b}{2a}$$ directly from the quadratic.\n\nThis connects algebra (discriminant) to geometry (tangency) — a key motif in P1.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "ESAT 1 two-way table — as you place each given number into the grid, what physical habit must you perform to prevent double-counting or forgetting a datum?", "answer": "**Put a little tick (✓) next to each datum in the question the moment you use it.** This is the \"tick-as-you-use\" habit. Without it, under timed conditions (~90 seconds per ESAT question), it is easy to either use the same number twice or skip one entirely. The tick makes the question stem into a checklist: if a number hasn't been ticked, you haven't placed it yet.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "What's the visual intuition behind the curved-surface-area formula for a cylinder, $$2\\pi r h$$, and why does it involve a rectangle? (3 steps)", "answer": "- Step 1: Imagine a toilet-roll tube or wrapping-paper tube — a cylinder with no top or bottom.\n- Step 2: **Cut it vertically and unfurl it.** It flattens into a rectangle. One side of that rectangle is the height $$h$$ of the cylinder; the other side is the distance around the circle — the circumference $$2\\pi r$$.\n- Step 3: Area of rectangle = base × height = $$(2\\pi r) \\times h = 2\\pi r h$$. That's the curved surface area.\n\nThe trick is: cylinders hide rectangles. Unfurl to reveal them.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "Why is \"expand brackets to check the leading coefficient\" a critical sanity check whenever you factorise a quadratic? (Q3-related)", "answer": "- Step 1: Markers (and especially the mark scheme) sometimes require the **original** quadratic to come back from your factored form — not just the same roots.\n- Step 2: If your brackets give the right roots but the wrong leading coefficient (e.g., expanding to $$x^2$$ when the original was $$11x^2$$), you may lose marks for an \"incorrect factorisation\" even though your solutions are right.\n- Step 3: Quick check: mentally expand the brackets and confirm the $$x^2$$ coefficient matches. If not, redistribute factors (e.g., $$(x-2)(x + \\tfrac{18}{11})$$ → $$(x-2)(11x + 18)$$).", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "What's the difference between a \"blank\" answer and a \"wrong\" answer in terms of marks scored, and what's the strategic implication?", "answer": "- Step 1: Blank = 0 marks. Period. No method, no answer, nothing to award.\n- Step 2: Wrong but with substituted method = potentially full method marks (M marks). On a 4-mark question with M1 M1 M1 A1 structure, a wrong final answer with all method visible can still score 3/4.\n- Step 3: Implication: NEVER leave a part blank. Even a \"ridiculous\" final number, if it follows from substituting correctly into the right formula, banks marks.\n\nHarry: \"just keep going with the numbers, put a little star next to it.\" The star marks it for revisiting if time allows; the substitution banks the method.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "Simple exercise: Solve $$3x^3 - 12x = 0$$. What root is most commonly forgotten?", "answer": "Factor out $$x$$: $$x(3x^2 - 12) = 0$$. **Immediately write $$x = 0$$.** Then solve $$3x^2 - 12 = 0$$ → $$x^2 = 4$$ → $$x = \\pm 2$$. Full solution: $$x = 0, 2, -2$$. The forgotten root is always $$x = 0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_72"}, {"question": "Theme 2 (\"underline every requirement\") — Harry called this the **single highest-leverage habit change** for your grade. Why is one underline-and-tick worth so much per paper? (3 steps)", "answer": "- Step 1: Most of your lost marks were not from getting maths wrong, they were from **answering a slightly different question** than the one asked (value vs coordinates, missing \"integers\", missing \"obtuse\", missing units).\n- Step 2: Each missed requirement costs $$1$$–$$2$$ marks. On a paper, $$3$$–$$4$$ of them stack to about a grade boundary.\n- Step 3: The habit is procedural: **before writing, underline every instruction word**; **after writing, tick each underline off** to confirm you satisfied it. Harry: \"that could be the difference of a grade in every paper.\"", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "About how many marks separated a B from an A on this P1 paper, and what was the root cause of those lost marks — conceptual gaps or execution habits?", "answer": "**About 6 marks = one whole grade** (54/75 → B, vs 60/75 → A). The root cause was **execution habits**, not conceptual gaps. Every method was set up correctly (sine rule, discriminant, chain rule, surd conjugate, quadratics). The marks were lost to careless arithmetic, un-ticked question requirements, and one part left blank. You are not a B-grade mathematician who needs to learn more topics; you are an A/A* mathematician leaking marks at the pen.", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "For a quadratic inequality $$(x-2)(11x+18) < 0$$ with roots $$-\\tfrac{18}{11}$$ and $$2$$, how do you determine which interval satisfies the inequality?", "answer": "- Step 1: Sketch the parabola: positive leading coefficient ($$11 > 0$$) means it opens upward, with zeros at the two roots.\n- Step 2: An upward parabola is BELOW zero (negative) BETWEEN its roots, and above zero outside them.\n- Step 3: So $$< 0$$ gives the interval between the roots: $$-\\tfrac{18}{11} < x < 2$$.\n\nMnemonic: \"Upward smile, negative between; downward frown, negative outside.\"", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "When a question asks for the **normal** to a curve at a point, what is the relationship between the normal's gradient and the tangent's gradient? (Q8a)", "answer": "- Step 1: The normal is **perpendicular** to the tangent, so the normal's gradient is the **negative reciprocal** of the tangent's gradient: $$m_{\\text{normal}} = -\\frac{1}{m_{\\text{tangent}}}$$.\n- Step 2: In Q8a, the tangent gradient (from $$f'(4)$$) is $$\\frac{35}{6}$$. So the normal gradient is $$-\\frac{6}{35}$$.\n- Step 3: The common mistake is to use the tangent gradient directly (forgetting the negative reciprocal) or to only take the reciprocal without the negative sign. Both are wrong. The normal is always perpendicular — that's the definition.\n\nQuick check: the product of tangent and normal gradients should equal $$-1$$: $$\\frac{35}{6} \\times (-\\frac{6}{35}) = -1$$. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "Why is mental subtraction specifically more dangerous than mental addition under exam pressure? (2 steps)", "answer": "- Step 1: Subtraction requires **borrowing/regrouping**, which has more steps than addition and therefore more places to slip. In $$46 - 25$$, you must handle the ones digit (6-5=1) and tens digit (4-2=2) correctly — but under pressure, Phuc ran a convoluted chain ($$21 - 12 = 18, 18 + 1 = 19$$) and got 19 instead of 21.\n- Step 2: Addition has a natural \"bigger or equal\" check (sum ≥ each addend). Subtraction doesn't give you that safety net — the answer could be anything. This is why every subtraction needs an *explicit* size-check that addition often doesn't.", "source": "GLM 5.1 ③", "_id": "glm_3_48"}, {"question": "When reviewing your marked script, what's the difference between a \"careless\" error and a \"requirement\" error, and why does the distinction matter? (Themes 1-2)", "answer": "- Step 1: **Careless errors** are execution slips: wrong arithmetic ($46-25 = 21$ vs. 9), wrong calculator input, sign errors in differentiation\n- Step 2: **Requirement errors** are reading failures: not underlining \"obtuse\" so you pick the wrong branch, not underlining \"coordinates\" so you give a value instead of a point, not underlining \"integers\" so you leave fractions in $ax + by + c = 0$\n- Step 3: Both cost ~1 mark each, but careless errors happen despite correct method; requirement errors happen because you didn't read what was asked\n- Step 4: Both are fixed by habits (re-key arithmetic; underline + tick off requirements), not by learning more topics\n\n**Takeaway:** You lost ~6 marks to habits, not knowledge. Fix the habits, keep the knowledge.", "source": "MiniMax ②", "_id": "minimax_2_36"}, {"question": "What is the \"first instinct → redirect\" lesson from ESAT 1 about variables vs. organisation, and where else in your practice should you apply it?", "answer": "- Step 1: First instinct on a multi-fact problem is often to **name variables** ($$x, y, z$$) and write equations. This works when the problem has *relations*, but fails when it has *categorised counts*.\n- Step 2: Redirect: ask \"is this a **counting / categorising** problem?\" If yes, use a **table** (or a Venn diagram for set overlap, or a tree for conditional events).\n- Step 3: Apply the same instinct elsewhere: probability problems with multiple categories → two-way table; sequence with cases → table of $$n$$ vs $$a_n$$; transformation chain → diagram, not algebra. The principle: **match the data structure to the problem type**.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "When collecting $$x$$ terms in the surd equation $$4x = 2\\sqrt{2}\\,x + 20\\sqrt{2}$$, what's the algebraic move — and why must you factorise, not divide? (Q2b)", "answer": "- Step 1: Move all $$x$$ terms to one side: $$4x - 2\\sqrt{2}\\,x = 20\\sqrt{2}$$. Then **factorise out $$x$$**: $$x(4 - 2\\sqrt{2}) = 20\\sqrt{2}$$.\n- Step 2: Now divide: $$x = \\frac{20\\sqrt{2}}{4 - 2\\sqrt{2}}$$. You must factorise first because you cannot divide $$4x - 2\\sqrt{2}\\,x$$ by $$(4 - 2\\sqrt{2})$$ directly without factorising out $$x$$ first.\n- Step 3: The \"hence\" from part (a) kicks in: you already know $$\\frac{1}{4 - 2\\sqrt{2}} = \\frac{1}{2} + \\frac{1}{4}\\sqrt{2}$$, so $$x = 20\\sqrt{2} \\times (\\frac{1}{2} + \\frac{1}{4}\\sqrt{2}) = 10 + 10\\sqrt{2}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_92"}, {"question": "When a question has parts (a), (b), (c) where (c) says \"hence state the range of $$x$$,\" what does \"hence\" tell you about how to use the previous parts? (Q3c) (2 steps)", "answer": "- Step 1: **\"Hence\" means you must use the results from previous parts** — you're not expected to re-derive anything. Part (a) gave $$x > 1.5$$; part (b) gave $$-\\frac{18}{11} < x < 2$$. Part (c) asks you to **intersect** these two ranges.\n- Step 2: The intersection: $$x$$ must satisfy *both* conditions simultaneously. On a number line, $$x > 1.5$$ starts to the right of 1.5, and $$x < 2$$ ends to the left of 2. The overlap is $$1.5 < x < 2$$. The lower bound comes from part (a) (since 1.5 > $$-\\frac{18}{11}$$); the upper bound comes from part (b).", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "When you subtract 1 from a negative power (e.g., $$x^{-1/2} \\to x^{?}$$), does the power get closer to zero or further from zero — and why? (Q1a)", "answer": "- Step 1: The power gets **further from zero** (more negative). $$x^{-1/2} \\to x^{-3/2}$$, because $$-\\frac{1}{2} - 1 = -\\frac{3}{2}$$.\n- Step 2: The intuition: on the number line, subtracting 1 from a negative number moves you further left (further from zero). $$-0.5 - 1 = -1.5$$.\n- Step 3: The common mistake is to think \"subtracting makes it smaller in magnitude\" — that's true for positive powers ($$x^2 \\to x^1$$) but the opposite for negative ones. This is exactly where Q1a's slip happened: the power was correct at $$-\\frac{1}{2}$$ but the student treated the new power as if it were getting *closer* to zero.\n\nSlow down through this step on every surd differentiation. Say it aloud: *\"negative half minus one equals negative three halves.\"*", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "When a question says the surface area of a solid cylinder is numerically equal to its volume, what's the setup and the key algebraic move to express $$h$$ in terms of $$r$$? (3 steps)", "answer": "- Step 1: Set the two formulae equal: $$\\pi r^2 h = 2\\pi r^2 + 2\\pi r h$$.\n- Step 2: Divide through by $$\\pi$$ (it cancels completely): $$r^2 h = 2r^2 + 2rh$$.\n- Step 3: Gather the $$h$$ terms on one side: $$r^2 h - 2rh = 2r^2$$, factor out $$h$$: $$h(r^2 - 2r) = 2r^2$$, so $$h = \\frac{2r^2}{r^2 - 2r} = \\frac{2r^2}{r(r-2)} = \\frac{2r}{r-2}$$.\n\nThe crucial move is factoring out $$h$$ so you can isolate it — and then cancelling the common factor of $$r$$ in numerator and denominator.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "When you solve a quadratic on the calculator and want to write it as a factorisation, what's the trick to make the brackets actually expand back to the original quadratic? (Q3-style worry)", "answer": "- Step 1: Calculator gives roots, say $$x = 2$$ and $$x = -\\tfrac{18}{11}$$.\n- Step 2: Naive brackets $$(x - 2)(x + \\tfrac{18}{11})$$ expand to give a coefficient of $$1$$ for $$x^2$$, **not** the original $$11$$.\n- Step 3: Clear the fraction in the second bracket by multiplying that factor by $$11$$: write $$(x - 2)(11x + 18)$$. Now expansion gives $$11x^2 - \\ldots - 36$$ — matching the original. **Habit: write factors so they expand back to the original leading coefficient**, not just to capture the roots.", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "When differentiating a term like $$-\\dfrac{24}{\\sqrt{x}}$$, what's the very first step you should write down, and what common slip should you watch for with negative powers? (Q1a strategy)", "answer": "- Step 1: Convert the surd to power form first: $$-\\dfrac{24}{\\sqrt{x}} = -24x^{-1/2}$$. Writing this explicitly prevents confusion.\n- Step 2: Apply the power rule: if $$f(x) = x^n$$, then $$f'(x) = nx^{n-1}$$. For $$-24x^{-1/2}$$, the derivative is $$-24 \\cdot (-\\tfrac12)x^{-3/2} = +12x^{-3/2}$$.\n- Step 3: The critical watch-point: when differentiating a **negative** power like $$-1/2$$, subtracting 1 gives $$-3/2$$ — the power becomes **more negative**, not less. This is where the common slip occurs.\n\n**Takeaway:** Write the power form first; the sign of the power and the direction it moves are both critical.", "source": "MiniMax ①", "_id": "minimax_1_0"}, {"question": "Why does the same careless-mental-subtraction habit hurt you in BOTH the ESAT and the P1 exam — even though one is calculator and one is not? (Scoreboard, Theme 1)", "answer": "- Step 1: In the **ESAT** (non-calculator), you must compute subtractions in your head under a ~90-second-per-question clock. A slip like $$46 - 25$$ directly produces a wrong answer with no chance to catch it.\n- Step 2: In the **P1** (calculator allowed), you *choose* to do subtractions in your head for speed — but the calculator is right there. The slip $$6 - 1.42 = 0.96$$ (instead of 4.58) happened because you didn't verify on the calculator.\n- Step 3: The fix is the same for both: **drill quick mental subtraction** so the size-check becomes reflexive (if you write 0.96 for \"$$6 - 1.42$$,\" it should feel wrong instantly), AND **re-key every subtraction on the calculator** in P1. The mental-drill habit transfers: it makes you faster in ESAT and more accurate in P1.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "What's the sketch of $$y = 1 + \\sin\\theta$$ compared to $$y = \\sin\\theta$$ — and what range of y-values does it have? (Q9b) (2 steps)", "answer": "- Step 1: $$y = 1 + \\sin\\theta$$ is the standard sine wave **shifted up by 1**. Every y-value increases by 1. The wave still has the same shape, same period ($$360°$$), same x-intercepts shifted.\n- Step 2: Since $$\\sin\\theta$$ ranges from $$-1$$ to $$1$$, the shifted wave ranges from $$1 + (-1) = 0$$ to $$1 + 1 = 2$$. The midline is $$y = 1$$, not $$y = 0$$. This matters for counting intersections with $$\\tan\\theta$$: the sine wave is now entirely non-negative, which changes where the curves can cross.", "source": "GLM 5.1 ①", "_id": "glm_1_53"}, {"question": "For \"graph transformation\" questions like \"$$y = f(x + a)$$ passes through $$O$$\", what's the conceptual translation between algebra and geometry?", "answer": "- Step 1: \"$$y = f(x + a)$$\" is the graph of $$f$$ translated $$a$$ units to the LEFT if $$a > 0$$, RIGHT if $$a < 0$$. (Counter-intuitive: $$+a$$ shifts left.)\n- Step 2: \"Passes through $$O = (0,0)$$\" means the translated graph hits the origin: at $$x = 0$$, $$y = f(0 + a) = f(a) = 0$$.\n- Step 3: So $$a$$ must be a value at which $$f$$ equals zero — i.e., $$a$$ is a ROOT of the original function.\n\nThis conversion (\"passes through $$O$$\" → \"$$f(a) = 0$$\") is universal for translation-type transformation questions.", "source": "Opus 4.7 ①", "_id": "opus_1_62"}, {"question": "In the ESAT 2 cylinder problem, you needed to express $h$ in terms of $r$. What restriction must apply to $r$ for the solution to be valid? (ESAT 2 domain restriction)", "answer": "- Step 1: The solution is $$h = \\frac{2r}{r-2}$$.\n- Step 2: The denominator $$r - 2$$ cannot be zero, so $$r \\neq 2$$.\n- Step 3: For a **physical** cylinder (positive height), we also need $$h > 0$$.\n- Step 4: Since $$h = \\frac{2r}{r-2}$$, for $$h > 0$$:\n  - If $$r > 2$$, then numerator and denominator are both positive ⇒ $$h > 0$$\n  - If $$0 < r < 2$$, then numerator is positive, denominator is negative ⇒ $$h < 0$$ (not physical)\n- Step 5: Therefore, the solution $$h = \\frac{2r}{r-2}$$ is only valid for **$$r > 2$$**.\n\n**Takeaway:** Physical constraints give domain restrictions — height must be positive.", "source": "MiniMax ①", "_id": "minimax_1_45"}, {"question": "Harry's coaching after the cylinder problem: why must you *memorise* $$V = \\pi r^2 h$$ and $$S = 2\\pi r^2 + 2\\pi r h$$ stone-cold for ESAT, rather than re-deriving them from an unfurled-rectangle picture?", "answer": "- Step 1: ESAT is a non-calculator, ~90-seconds-per-question paper. Re-deriving each formula every time burns the time you need for the algebra.\n- Step 2: The formulae are not the \"thinking\" part of the problem — they are *inputs* to the thinking (setting $$S = V$$ and isolating $$h$$). If the input takes 30 seconds, the actual problem-solving has 60 seconds to live in.\n- Step 3: The habit is **memorise standard formulae** (volume, surface area, sector area $$\\tfrac12 r^2 \\theta$$, etc.) so you can write them down at full speed and devote brain cycles to the structural move.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "Why is writing $$\\frac{32}{120}$$ wrong when the question says \"a boy is picked at random, find the probability he chose swimming\" — even though 32 boys chose swimming out of 120 students total? (2 steps)", "answer": "- Step 1: $$\\frac{32}{120}$$ answers a *different* question: \"pick any student at random from all 120; what's the chance it's a boy who swims?\" That's $$P(\\text{boy} \\cap \\text{swim})$$.\n- Step 2: The actual question asks $$P(\\text{swim}\\mid\\text{boy})$$: *given* the student is a boy, what's the chance he swims? The \"given\" shrinks the universe to boys only (74), so the denominator is 74. The numerator stays 32 because those are the favourable cases within the restricted universe.\n\nConceptual anchor: conditional probability *rescales* the sample space. The denominator isn't \"how many total\" — it's \"how many are in the condition we've been told.\"", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "Why is \"stop at a correct simplest form\" not a lazy habit but actually a mark-protection habit? (2 steps)", "answer": "- Step 1: Every additional manipulation is an additional chance to make an arithmetic or notation slip — and once you've slipped, you've **degraded a fully-correct answer to a partially-correct one**.\n- Step 2: Markers reward correct simplest form, not maximally compressed form. If both $$\\tfrac45 x^{5/2} + x^{1/2} + C$$ and $$\\tfrac{x^{1/2}(4x^2 + 5)}{5} + C$$ score equally, write the easier one. Habit: **finish, present cleanly, stop.**", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "When factoring out a variable (like $x$ in $2x^3 + 3x^2 - 35x = 0$), why must you write the $x = 0$ root immediately, before solving the quadratic? (Q5)", "answer": "- Step 1: The moment you factor $x$ out, you create a product equal to zero: $x \\cdot (\\text{quadratic}) = 0$\n- Step 2: By the zero-product property, either $x = 0$ **or** the quadratic equals zero — these are two separate, independent solutions\n- Step 3: If you solve the quadratic first and forget to list $x = 0$, you've lost a solution. Write it immediately after factoring: \"$x = 0$ or...\"\n\n**Takeaway:** Factored-out factor = root. Write it first — not as an afterthought you might forget.", "source": "MiniMax ②", "_id": "minimax_2_24"}, {"question": "Why does Harry warn that an over-simplified or unnecessarily-rewritten answer can LOSE marks, even when mathematically correct?", "answer": "- Step 1: Each rewrite is a new arithmetic operation, which carries new slip risk. A correct answer rewritten with a sign error becomes a wrong answer.\n- Step 2: Markers work fast and match against a mark scheme. An unusual form may not match the expected presentation, causing them to question whether it's equivalent.\n- Step 3: Strategic principle: produce ONE clear, simplified answer in the form requested, and stop. Don't show off.\n\nException: if the question specifies a form (e.g., $$p + q\\sqrt{2}$$), you MUST rewrite to match — but check the rewrite carefully.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "Why must you compute the derivative at the specific point before finding the normal, and what sign error is common? (2 steps)", "answer": "- Step 1: The normal gradient depends on the tangent gradient at that exact point; using a generic or wrong point gives the wrong perpendicular slope.\n- Step 2: A common error is to forget the negative sign in the reciprocal, writing $$+\\frac{6}{35}$$ instead of $$-\\frac{6}{35}$$; always include the negative for perpendicularity.", "source": "Kimi K2.6 ②", "_id": "kimi_2_46"}, {"question": "Why is the first line of any working \"the most important\", per Harry — even more than later algebra? (2 steps)", "answer": "- Step 1: A slip in the first line (a wrong derivative, a wrong setup) **propagates through every subsequent line**. You can do every later step perfectly and still get zero accuracy marks.\n- Step 2: Operational rule: be **fast everywhere else**, but **slow and deliberate on the first one or two lines** — re-read the question, re-check the rewrite, then proceed at speed. The first line is a cheap insurance policy on the rest of the question.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "What is the \"scoreboard\" mindset — what should you think when planning revision after seeing your raw mark vs. the boundary? (3 steps)", "answer": "- Step 1: Compute the **mark gap to the next grade boundary**. For your B at $$54/75$$, the A boundary needs about $$60/75$$ — a gap of $$6$$.\n- Step 2: Audit where those marks went on the paper: were they conceptual (new topic needed) or executional (slip)?\n- Step 3: For executional gaps (like yours), the fix is **habit drills (mental subtraction, underline-and-tick)**, not topic revision. For conceptual gaps, revise the topic. The mindset shift: **most grade boundaries are bridged by habit, not knowledge.**", "source": "Opus 4.7 ②", "_id": "opus_2_58"}, {"question": "When the question says \"express $$h$$ in terms of $$r$$\" and you get $$h = \\frac{2r^2}{r^2 - 2r}$$, what simplification step is needed — and why? (ESAT 2)", "answer": "- Step 1: Factor the denominator: $$r^2 - 2r = r(r - 2)$$. Then cancel the common factor of $$r$$: $$h = \\frac{2r^2}{r(r-2)} = \\frac{2r}{r-2}$$.\n- Step 2: The cancellation is valid because $$r$$ is the radius of a cylinder, so $$r \\neq 0$$ (a cylinder with zero radius doesn't exist). You can safely divide by $$r$$.\n- Step 3: The uncancelled form $$\\frac{2r^2}{r^2 - 2r}$$ is not \"simplest form.\" In an exam, leaving it uncancelled may lose the final accuracy mark. Always cancel common factors in the final answer — but verify the factor isn't zero first.", "source": "GLM 5.1 ②", "_id": "glm_2_95"}, {"question": "What are the eight requirement triggers from this lesson that should each get an underline + tick before you stop? (List them as separate triggers.)", "answer": "- Step 1: Form/structure triggers:\n+ \"$$ax + by + c = 0$$ with integer coefficients\" → clear fractions, check $$a, b, c \\in \\mathbb{Z}$$.\n+ \"$$p + q\\sqrt 2$$ (or $$a + b\\sqrt 2$$)\" → rational part first, surd second.\n+ Exact form (no decimals).\n- Step 2: Object triggers:\n+ **\"Coordinates\"** → answer with $$(x, y)$$, not a single number.\n+ **\"Values\" (plural)** → expect ≥2 answers.\n- Step 3: Branch/condition triggers:\n+ **\"Obtuse\"** → reject the calculator's acute $$\\sin^{-1}$$; take $$\\pi - \\text{result}$$.\n+ **\"Conditional / picked at random … that\"** → restricted sample space; divide by row total.\n+ Accuracy: \"1 d.p.\", \"3 d.p.\", \"3 s.f.\" → round to exactly that.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "What does it mean that \"whole numbers are rational numbers\" — and why did Harry need to clarify this in Q2b? (Q2b)", "answer": "- Step 1: A **rational number** is any number that can be written as $$\\frac{p}{q}$$ where $$p$$ and $$q$$ are integers and $$q \\neq 0$$. Whole numbers qualify: e.g., $$10 = \\frac{10}{1}$$.\n- Step 2: In Q2b, the answer was $$x = 10 + 10\\sqrt{2}$$, so $$p = 10$$ and $$q = 10$$ — both integers (hence rational). Harry initially expected fractions but checked the mark scheme: *\"I was expecting fractions when they say 'rational numbers'… but whole numbers are rational numbers — that is correct, well done.\"*\n- Step 3: The misconception: \"rational\" ≠ \"fraction.\" Rational means *expressible as* a fraction, not *necessarily written as* one. Integers are a subset of rationals.", "source": "GLM 5.1 ②", "_id": "glm_2_46"}, {"question": "On a 75-mark P1 paper, you scored 54/75 (grade B) but estimate you could have scored 60/75 (grade A). What does this tell you about where your revision effort should go? (3 steps)", "answer": "- Step 1: The gap between a B and an A is only about $$6$$ marks — less than the contents of one hard question. So the grade boundary is shockingly thin.\n- Step 2: Those 6 marks were lost to careless slips (mis-subtraction, missed branches, wrong form), NOT to topics you don't understand. Every method (sine rule, discriminant, chain rule, surd conjugate) was set up correctly.\n- Step 3: Therefore the highest-leverage revision is NOT learning more maths — it's building habits that stop pen-level leaks. Habit drilling buys grades more cheaply than topic study.\n\nThe mental model: you're an A/A* mathematician leaking marks at the pen, not a B-grade mathematician who needs more content.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "What are the three specific calculator limitations that students must account for in exam questions? (Q7, General)", "answer": "- Step 1: $\\sin^{-1}, \\cos^{-1}$ are restricted to $[-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$ (or $[-1, 1]$ for arccos) — they only return the acute or principal value, never the obtuse or reflex alternative\n- Step 2: The calculator gives no indication that other branches exist — you must recognize the branch requirement (\"obtuse\") in the stem\n- Step 3: When taking square roots of both sides, the calculator returns only the positive root — you must consider whether the negative root is also valid (e.g., in $u^2 = \\frac{7}{2}$)\n\n**Takeaway:** The calculator is a tool, not a mind-reader. It gives one branch; you choose the branch the question asks for.", "source": "MiniMax ②", "_id": "minimax_2_23"}, {"question": "What's the formula for the area of a circular sector and the length of its arc, and when do you use each in a perimeter problem?", "answer": "- Step 1: Sector area: $$A = \\tfrac{1}{2} r^2 \\theta$$ (with $$\\theta$$ in radians).\n- Step 2: Arc length: $$\\ell = r\\theta$$ (with $$\\theta$$ in radians).\n- Step 3: For the PERIMETER of a sector or sector-bounded region, the ARC ($$r\\theta$$) contributes, but the area formula does not. For the AREA, only $$\\tfrac{1}{2}r^2\\theta$$ matters.\n\nDon't confuse the two — they share $$r$$ and $$\\theta$$ but have very different roles.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "For graph-transformation questions like $$y = f(x + a)$$, why does Harry recommend \"answer with a sketch, not algebra\"?", "answer": "- Step 1: Graph transformations have visual meaning: $$f(x + a)$$ is a horizontal shift, $$f(x) + a$$ is a vertical shift, $$-f(x)$$ is a reflection in the $$x$$-axis, etc.\n- Step 2: A sketch reveals the answer instantly — you can see where the curve must lie to satisfy the condition (e.g., pass through $$O$$). Algebra makes you re-derive what the picture already shows.\n- Step 3: Sketches are also faster and less error-prone for finding multiple answers (you see all roots at once).\n\nThis generalises: any question about transformed curves, intersections with axes, or qualitative behaviour benefits from a quick sketch first.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "When taking square roots of both sides of $$(y-5)^2 = \\frac{7}{2}$$, where does the $$\\pm$$ go — and why? (Q5b)", "answer": "- Step 1: The $$\\pm$$ goes on the **side with the numbers** (the side without the variable inside the square). So: $$y - 5 = \\pm\\sqrt{\\frac{7}{2}}$$, giving $$y = 5 \\pm \\frac{\\sqrt{14}}{2}$$.\n- Step 2: The reason: $$\\sqrt{(y-5)^2} = |y-5|$$, which equals either $$+(y-5)$$ or $$-(y-5)$$. So $$y-5 = +\\sqrt{\\frac{7}{2}}$$ or $$y-5 = -\\sqrt{\\frac{7}{2}}$$.\n- Step 3: Harry's phrasing: *\"Put the $$\\pm$$ on the side with the numbers\"* — meaning the free-number side, not the variable side. This avoids the confusion of writing $$\\pm(y-5) = \\sqrt{\\frac{7}{2}}$$, which is technically equivalent but less clear and more error-prone.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "What's the rule for handling \"exact form\" answers like $$p + q\\sqrt{2}$$ in P1, and what counts as $$p, q$$ being \"rational\"?", "answer": "- Step 1: \"Exact form $$p + q\\sqrt{2}$$ with $$p, q$$ rational\" means: write the answer as a rational number $$p$$ plus a rational number $$q$$ times $$\\sqrt{2}$$. No decimal approximations.\n- Step 2: \"Rational\" includes integers ($$10$$, $$-3$$), proper fractions ($$\\tfrac{1}{2}$$), and improper fractions ($$\\tfrac{7}{4}$$). Harry confirmed live: \"whole numbers are rational numbers — that is correct.\"\n- Step 3: The form is rigid: rational part FIRST, surd part SECOND. Don't write $$10\\sqrt{2} + 10$$ when the form is $$p + q\\sqrt{2}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "Simple exercise: The line $$y = 2x + k$$ touches the curve $$y = x^2 + 1$$ at exactly one point. Set up (don't solve) the equation whose discriminant must be zero.", "answer": "Set equal: $$2x + k = x^2 + 1$$ → $$x^2 - 2x + (1 - k) = 0$$. For exactly one point, the discriminant must be zero: $$(-2)^2 - 4(1)(1-k) = 0$$ → $$4 - 4(1-k) = 0$$. The trigger: \"touches\" or \"exactly one point\" = discriminant = 0.", "source": "GLM 5.1 ③", "_id": "glm_3_73"}, {"question": "What's the four-part \"completeness\" checklist Harry wants you to apply BEFORE writing your final answer to any question?", "answer": "- Step 1: **Form?** Did I write the answer in the requested form ($$p + q\\sqrt{2}$$, $$ax + by + c = 0$$, etc.)?\n- Step 2: **Object?** Is it a value, a pair of coordinates, an interval, a function? Did I give the right kind of object?\n- Step 3: **Branch?** If the question specified \"obtuse\", \"positive\", \"in $$[0, 2\\pi]$$\", did I reject the other branch?\n- Step 4: **Integers / accuracy?** Are coefficients integers if required? Is the answer rounded to the requested precision?\n\nIf any check fails, fix BEFORE moving on. Harry: \"read the question a second time.\"", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "When solving Q6(b) after finding $$c = -\\frac{49}{4}$$, the quadratic becomes $$x^2 - 7x + \\frac{49}{4} = 0$$. Why does this factorise as a perfect square — and what does that tell you geometrically? (2 steps)", "answer": "- Step 1: The discriminant is zero (that's how we found $$c$$), so the quadratic has a **repeated root**: $$x^2 - 7x + \\frac{49}{4} = (x - \\frac{7}{2})^2 = 0$$, giving $$x = \\frac{7}{2}$$.\n- Step 2: Geometrically, the repeated root confirms the line is **tangent** to the curve — it touches at exactly one point. The x-coordinate of tangency is $$\\frac{7}{2}$$, and substituting back gives $$y = 4(\\frac{7}{2}) - \\frac{49}{4} = \\frac{7}{4}$$. The tangent point is $$(\\frac{7}{2}, \\frac{7}{4})$$.", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "Surds and integration trick: when you see $$\\dfrac{P(x)}{2\\sqrt x}$$ or similar, what is the standard pre-processing step before any calculus moves?", "answer": "- Step 1: Convert the surd to a power: $$2\\sqrt x = 2 x^{1/2}$$.\n- Step 2: **Split the fraction term-by-term**, dividing each term of the numerator by the denominator individually. Each term becomes $$c \\cdot x^n$$ for some $$n$$ (possibly negative or fractional).\n- Step 3: Now both differentiation and integration work term-by-term with the power rule. The pre-processing is what makes calculus on rational/surd expressions tractable.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "When a question asks for the perimeter of a composite shape (sector + triangle), what's the strategy for identifying which edges to include? (Q7c)", "answer": "- Step 1: **Trace the boundary of the shape with your finger** (or pen). Every edge your finger touches is part of the perimeter. Interior edges are NOT included.\n- Step 2: In Q7, the shape $$ABCDA$$ consists of: arc $$ABC$$ (part of the sector), straight segment $$CD$$ (on the line $$OC$$, from $$C$$ to $$D$$), and straight segment $$DA$$. The interior edges $$OA$$ and the portion $$OD$$ are NOT on the boundary — they're inside the shape.\n- Step 3: Perimeter $$= \\text{arc } ABC + CD + DA = 33.5 + (6 - 1.42) + 5 = 43.1$$ cm. The key insight: $$CD = OC - OD = 6 - 1.42 = 4.58$$, because $$D$$ lies between $$O$$ and $$C$$ on the radius.", "source": "GLM 5.1 ②", "_id": "glm_2_59"}, {"question": "P1 Q2(a): to simplify $$\\dfrac{1}{4 - 2\\sqrt 2}$$, what is the standard trick and *why* does it work? (3 steps)", "answer": "- Step 1: Multiply numerator and denominator by the **conjugate** $$4 + 2\\sqrt 2$$.\n- Step 2: This works because $$(a - b)(a + b) = a^2 - b^2$$, which eliminates the surd from the denominator: $$(4 - 2\\sqrt 2)(4 + 2\\sqrt 2) = 16 - 8 = 8$$.\n- Step 3: The result is $$\\dfrac{4 + 2\\sqrt 2}{8} = \\tfrac12 + \\tfrac14 \\sqrt 2$$. The trick generalises: to rationalise $$\\dfrac{1}{a + b\\sqrt n}$$, multiply by $$\\dfrac{a - b\\sqrt n}{a - b\\sqrt n}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "When converting a normal/tangent equation from point-slope form $$y - y_1 = m(x - x_1)$$ into $$ax + by + c = 0$$ form with integer coefficients, what's the algebraic move that handles fractional gradients cleanly?", "answer": "- Step 1: If $$m = \\tfrac{p}{q}$$ in lowest terms, multiply BOTH sides by $$q$$ FIRST, before expanding.\n- Step 2: This eliminates the fraction immediately: $$q(y - y_1) = p(x - x_1)$$.\n- Step 3: Then rearrange to bring all terms to one side and check signs. For $$m = -\\tfrac{6}{35}$$: multiplying both sides by $$35$$ gives $$35(y-1) = -6(x-4)$$, then expand and rearrange.\n\nThis avoids the common mistake of expanding with fractions still present and then trying to clear them — much messier and error-prone.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "What's the period of $$\\tan\\theta$$ vs the period of $$\\sin\\theta$$ — and why does this matter when counting solutions over large ranges? (Q9c) (2 steps)", "answer": "- Step 1: $$\\tan\\theta$$ has period **$$180°$$**; $$\\sin\\theta$$ (and $$1 + \\sin\\theta$$) has period **$$360°$$**. The combined pattern of intersections repeats every $$360°$$ (the LCM of 180° and 360°).\n- Step 2: This matters because over each $$360°$$ window, the relative positions of the two curves are identical — so the number of intersections is the same in every window. You only need to count carefully *once*, then scale. If you tried to count over all $$2160°$$ directly, you'd be sketching six copies of the same picture — a waste of time and a source of counting errors.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "How do you sketch $$y = \\tan\\theta$$ on $$0 \\le \\theta \\le 360^\\circ$$, and what features must be visible?", "answer": "- Step 1: Period is $$180^\\circ$$, so there are **two complete branches** on $$[0, 360^\\circ]$$: one on $$[0, 180^\\circ]$$, one on $$[180^\\circ, 360^\\circ]$$.\n- Step 2: **Vertical asymptotes** at $$\\theta = 90^\\circ$$ and $$\\theta = 270^\\circ$$ (where $$\\cos\\theta = 0$$). Mark them as dashed vertical lines.\n- Step 3: Each branch starts at $$-\\infty$$ (just after an asymptote), passes through zero at $$\\theta = 0, 180^\\circ, 360^\\circ$$, and rises to $$+\\infty$$ (just before the next asymptote). The curve never crosses an asymptote.", "source": "Opus 4.7 ②", "_id": "opus_2_56"}, {"question": "In Q7(c), you computed $$OD \\approx 0.96$$ when the correct value was $$OD \\approx 1.42$$. This wrong value cascaded into $$CD$$ and the perimeter. What type of error was this, and what specific habit prevents it?", "answer": "This was a **careless evaluation error** — not a method error. The sine rule was set up perfectly: $$OD = \\frac{6\\sin(0.184)}{\\sin(2.258)}$$. The slip was in the calculator evaluation. The habit that prevents it: **after computing any subtraction or division, do a magnitude check.** $$OD$$ is a side of a triangle with other sides 5 and 6, so 0.96 is suspiciously small — 1.42 is more plausible. Re-key the calculation and trust the sanity check.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "When solving for $$c$$ in the tangent-line question Q6, you set the line equal to the curve and used the discriminant. What would happen if the discriminant were positive instead of zero? (Q6a)", "answer": "- Step 1: A **positive discriminant** means the quadratic has **two distinct real roots**, so the line intersects the curve at **two points** — it's a secant (cutting line), not a tangent.\n- Step 2: A **zero discriminant** means one repeated root — the line touches the curve at exactly one point (tangent). A **negative discriminant** means no real roots — the line doesn't meet the curve at all.\n- Step 3: The three cases: $$b^2 - 4ac > 0$$ → two intersections; $$b^2 - 4ac = 0$$ → one intersection (tangent); $$b^2 - 4ac < 0$$ → no intersections. The question's phrasing \"meets at exactly one point\" is your trigger to set the discriminant to zero.", "source": "GLM 5.1 ②", "_id": "glm_2_61"}, {"question": "Why did Harry say \"the more past papers you do reflectively, the faster you'll reach for the sketch or the trigger next time\" — what's the mechanism? (2 steps)", "answer": "- Step 1: **Pattern recognition builds with volume.** The first time you see \"possible values\" (plural), you might not notice the cue. The fifth time, you instinctively look for multiple answers. The first time you see a graph-transformation question, you reach for algebra; the tenth time, you reach for a sketch because it's faster.\n- Step 2: \"Reflectively\" is the key word — after each paper, you must **diagnose which triggers you missed and internalise them**. Without reflection, you just repeat the same mistakes. With reflection, each paper trains a new reflex: underline \"obtuse,\" write $$x = 0$$ first, reach for the sketch, etc. The reflexes compound.", "source": "GLM 5.1 ①", "_id": "glm_1_61"}, {"question": "What's the conceptual difference between \"value of $$y$$\" and \"coordinates\" when stating a minimum/maximum of a curve, and why does it matter for the mark?", "answer": "- Step 1: \"Value\" = the $$y$$-coo
