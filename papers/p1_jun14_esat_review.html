h selection)", "answer": "- Step 1: The calculator's $$\\sin^{-1}$$ function is restricted to $$[-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$$, so it only returns the acute solution (the principal value).\n- Step 2: For obtuse angles ($$\\frac{\\pi}{2} < \\theta < \\pi$$), you must use the **supplementary angle**: $$\\theta = \\pi - \\text{(acute value)}$$.\n- Step 3: Given acute $$= 0.884$$ rad, the obtuse angle is $$\\pi - 0.884 = \\boxed{2.258 \\text{ rad}}$$.\n- Step 4: **Underline \"obtuse\"** in the question so you remember to reject the acute branch.\n\n**Takeaway:** \"Obtuse\" is a branch selector — the calculator gives acute; you must compute $$\\pi - \\text{acute}$$.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "What does the phrase \"state the coordinates\" require you to write that differs from \"state the value,\" and what's the correct answer format for the minimum of $$y = 4\\sin\\theta$$? (Q9a requirement)", "answer": "- Step 1: \"State the **value**\" means give only the $$y$$-coordinate (the minimum value $$-4$$).\n- Step 2: \"State the **coordinates**\" means give **both** the $$x$$ and $$y$$ values as an ordered pair $$(x, y)$$.\n- Step 3: For $$y = 4\\sin\\theta$$ on $$0° \\leq \\theta \\leq 360°$$, the minimum value $$-4$$ occurs at $$\\theta = 270°$$.\n- Step 4: The answer must be $$\\boxed{(270°, -4)}$$, not just $$-4$$.\n\n**Takeaway:** Underline \"coordinates\" and answer with a point; underline \"value\" and give only the number.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "The question asks for the normal line \"in the form $$ax + by + c = 0$$ with **integer** coefficients.\" You calculated $$35(y-1) = -6(x-4)$$ and got $$6x + 35y - 59 = 0$$ — but lost the A-mark. What did you miss? (Q8a form requirement)", "answer": "- Step 1: Your arithmetic was correct: gradient $$= -\\frac{6}{35}$$, line $$y - 1 = -\\frac{6}{35}(x-4)$$, which simplifies to $$6x + 35y - 59 = 0$$.\n- Step 2: The issue is **how you presented it**. If you left fractions in the line equation at any point, or didn't explicitly verify the final coefficients are integers, you lost the form mark.\n- Step 3: The fix: **clear all fractions explicitly** and write the final line as a single integer-coefficient equation. The mark scheme checks that $$a, b, c \\in \\mathbb{Z}$$.\n- Step 4: Underline \"integer\" and tick it off — verify your final coefficients are integers before moving on.\n\n**Takeaway:** \"Integer\" in the form requirement is a presentation mark — clear fractions, verify integers.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "You set up the sine rule correctly for $$OD$$: $$OD = \\frac{6\\sin(0.184)}{\\sin(2.258)}$$ but wrote $$OD = 0.96$$ instead of the correct $$1.42$$. What two habits would catch this? (Q7c careless arithmetic)", "answer": "- Step 1: **Re-key the calculation on your calculator** rather than trusting mental arithmetic. The expression involves small angles and a large denominator — easy to miscompute.\n- Step 2: **Size-check the result**: $$OD$$ should be shorter than the radius (6), but longer than a tiny fraction — roughly $$1.4$$ makes sense. $$0.96$$ is too small and fails the sanity check.\n- Step 3: The same subtraction later, $$CD = 6 - OD$$, should be about $$4.6$$, not $$5.04$$. The magnitude doesn't match expectations.\n- Step 4: The fix: for every subtraction (integers, decimals, or fractions), re-key on calculator and ask \"does this have the right size?\"\n\n**Takeaway:** Re-key every subtraction; if the answer feels wrong in size, re-calculate immediately.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "You had the correct method for the perimeter in Q7c but left it blank because you weren't sure about $$OD$$. What should you have done to score method marks? (Q7c, Theme 4)", "answer": "- Step 1: **Never leave a part blank.** A blank scores zero; a substituted expression can score method marks even with a wrong number.\n- Step 2: Even if unsure of $$OD$$, substitute your value (even if wrong) into the perimeter formula: $$\\text{perimeter} = 33.5 + (6 - OD) + 5$$.\n- Step 3: Write the formula, substitute every number you have, produce a final answer, and **star it** to revisit if time permits.\n- Step 4: Harry's exact words: \"even if it's ridiculous, even if you know you've made a mistake, just keep going with the numbers, put a little star next to it, and if you've got time come back to it.\"\n\n**Takeaway:** Method marks require substituted numbers — not a correct final answer. Always finish and substitute.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "In Q3(b), you solved the quadratic inequality on your calculator and wrote a bracket that expanded to $$x^2 - 2x$$ instead of $$22x^2 - 8x$$. Why did this lose the mark, and how should you build the brackets? (Q3b bracket construction)", "answer": "- Step 1: The quadratic was $$22x^2 - 8x < 72$$, which simplifies to $$11x^2 - 4x - 36 < 0$$.\n- Step 2: If your calculator gives roots $$x = 2$$ and $$x = -\\frac{18}{11}$$, you must build brackets that **expand back exactly** to the original coefficients.\n- Step 3: The factors are $$(x - 2)(11x + 18) = 0$$. The $$11x$$ in the second bracket ensures the expanded coefficient of $$x^2$$ is $$11$$ (not $$1$$).\n- Step 4: Multiply out to verify: $$(x - 2)(11x + 18) = 11x^2 + 18x - 22x - 36 = 11x^2 - 4x - 36$$ — correct.\n\n**Takeaway:** After the calculator, build brackets so they expand back to your exact coefficients, not to simplified $$x^2$$.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "For Q3(c), you had the correct quadratic interval $$-1.64 < x < 2$$ but lost the final mark. Given part (a) required $$x > 1.5$$, what must you do with the two intervals? (Q3c intersection)", "answer": "- Step 1: Part (a) gave the condition $$x > 1.5$$ (from the perimeter inequality).\n- Step 2: Part (b) gave $$-1.64 < x < 2$$ (from the area inequality).\n- Step 3: You must **intersect** these two conditions — the solution must satisfy **both**.\n- Step 4: The intersection of $$x > 1.5$$ and $$-1.64 < x < 2$$ is $$\\boxed{1.5 < x < 2}$$.\n- Step 5: Watch the **strict inequality signs** carefully — both were strict ($<$), so the answer must use strict signs.\n\n**Takeaway:** When a question has multiple parts with conditions, intersect the intervals; match strict/inclusive signs exactly.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In Q5(b), you needed to solve $$2(y-5)^6 + 3(y-5)^4 - 35(y-5)^2 = 0$$. What's the substitution strategy, and how do you handle the resulting equation for $$y$$? (Q5b hidden quadratic)", "answer": "- Step 1: Let $$u = (y-5)^2$$. Since a square is always non-negative, $$u \\geq 0$$.\n- Step 2: The equation becomes $$2u^3 + 3u^2 - 35u = 0$$ — the same cubic as part (a).\n- Step 3: Factor: $$u(2u^2 + 3u - 35) = u(2u - 7)(u + 5) = 0$$.\n- Step 4: This gives $$u = 0, u = \\frac72, u = -5$$. **Reject** $$u = -5$$ because a square cannot be negative.\n- Step 5: For each valid $$u$$: if $$u = (y-5)^2 = 0$$, then $$y = 5$$; if $$u = \\frac72$$, then $$y - 5 = \\pm\\sqrt{\\frac72}$$, so $$y = 5 \\pm \\frac{\\sqrt{14}}{2}$$.\n\n**Takeaway:** Substitute to reduce to the known cubic; reject any negative $$u$$ values (squares are non-negative).", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "For Q6, the line $$y = 4x + c$$ meets the curve $$y = x(x-3)$$ at exactly one point. What's the condition on the discriminant, and what does it yield for $$c$$? (Q6 discriminant method)", "answer": "- Step 1: Set the line equal to the curve: $$4x + c = x^2 - 3x$$.\n- Step 2: Rearrange to standard quadratic form: $$x^2 - 7x - c = 0$$.\n- Step 3: For **exactly one** intersection point, the discriminant must equal zero: $$\\Delta = (-7)^2 - 4(1)(-c) = 0$$.\n- Step 4: Solve: $$49 + 4c = 0$$ ⇒ $$c = -\\frac{49}{4}$$.\n- Step 5: The single intersection occurs at the repeated root $$x = \\frac{7}{2}$$, giving the point $$\\left(\\frac{7}{2}, \\frac{7}{4}\\right)$$.\n\n**Takeaway:** \"Exactly one point\" ⇒ discriminant = 0; solve for the parameter.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "For Q10(c), you found the turning point at $$x = \\frac52$$ and computed $$f(\\frac52) = -54$$. The tangent is horizontal, but you initially drew a vertical line. How do you recognise the shape instantly? (Q10c horizontal vs vertical)", "answer": "- Step 1: A **horizontal line** has **zero gradient** (slope = 0), equation form $$y = k$$.\n- Step 2: A **vertical line** has **infinite/undefined gradient**, equation form $$x = k$$.\n- Step 3: Since you found $$f'(\\frac52) = 0$$ (a stationary point), the tangent has zero gradient — it's horizontal.\n- Step 4: The tangent passes through the turning value $$-54$$ on the $$y$$-axis, so it's $$y = -54$$.\n- Step 5: Instant recognition: zero derivative ⇒ horizontal line ($$y =$$ value); undefined (vertical) derivative ⇒ vertical line ($$x =$$ value).\n\n**Takeaway:** Zero gradient = horizontal line ($$y = k$$); infinite gradient = vertical line ($$x = k$$).", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "In Q10(d), the question asks for values of $$a$$ such that $$y = f(x + a)$$ passes through the origin $$O$$. Harry said to use a sketch rather than algebra. What's the graphical interpretation? (Q10d transformation)", "answer": "- Step 1: The curve $$y = f(x + a)$$ is a **horizontal translation** of $$f(x)$$ by $$-a$$ (right if $$a > 0$$, left if $$a < 0$$).\n- Step 2: For it to pass through $$O(0,0)$$, we need $$f(0 + a) = f(a) = 0$$ — so $$a$$ must be a root of $$f$$.\n- Step 3: From the factorisation $$f(x) = (x-4)(2x+1)^2$$, the roots are $$x = 4$$ and $$x = -\\frac12$$ (the repeated root).\n- Step 4: Graphically, translating the curve so that either root lands at $$x = 0$$ makes the curve pass through the origin.\n- Step 5: Therefore $$a = 4$$ or $$a = -\\frac12$$ — the plural (\"possible values\") signals more than one answer.\n\n**Takeaway:** For \"passes through O\" with a horizontal translation, find the roots; $$a$$ equals each root.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "What's Harry's \"READ-THE-QUESTION\" checklist that you should use on every question? Name at least 6 items. (Drill B summary)", "answer": "- Step 1: **Units?** — cm, cm², rad, degrees — did I include them?\n- Step 2: **Accuracy?** — 1 d.p., 3 d.p., 3 s.f. — did I round to exactly that?\n- Step 3: **Exact form?** — $$p + q\\sqrt{2}$$, $$a + b\\sqrt{2}$$ — rational part first, surd second?\n- Step 4: **Coordinates or value?** — if it says coordinates, did I give a point $$(x, y)$$, not just a number?\n- Step 5: **Which root/range?** — did I keep all solutions (including $$x = 0$$)? Right interval? Correct strict/inclusive signs?\n- Step 6: **Obtuse/acute?** — if a branch is specified, did I pick the correct one and underline it?\n- Step 7: **Conditional/restricted sample space?** — \"a boy picked at random\" ⇒ divide by the row total.\n- Step 8: **Form $$ax + by + c = 0$$ with integers?** — cleared fractions? Verified $$a, b, c \\in \\mathbb{Z}$$?\n- Step 9: **Did I finish?** — no part left blank; every part has a substituted, evaluated final answer (star if unsure).\n\n**Takeaway:** Underline each instruction in the stem; tick each one off before you stop writing.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "In the surd rationalisation problem Q2(a), you multiplied by the conjugate $$(4 + 2\\sqrt{2})$$. What is the general rule for rationalising a denominator of the form $$a - b\\sqrt{k}$$? (Q2a surd technique)", "answer": "- Step 1: To rationalise a denominator containing $$\\sqrt{k}$$, multiply numerator and denominator by the **conjugate** — change the sign between the terms: $$a + b\\sqrt{k}$$.\n- Step 2: For $$\\frac{1}{4 - 2\\sqrt{2}}$$, the conjugate is $$4 + 2\\sqrt{2}$$.\n- Step 3: Multiply: $$\\frac{1}{4-2\\sqrt{2}} \\times \\frac{4+2\\sqrt{2}}{4+2\\sqrt{2}} = \\frac{4 + 2\\sqrt{2}}{(4)^2 - (2\\sqrt{2})^2} = \\frac{4 + 2\\sqrt{2}}{16 - 8} = \\frac{4 + 2\\sqrt{2}}{8}$$.\n- Step 4: Simplify: $$\\frac{4}{8} + \\frac{2\\sqrt{2}}{8} = \\frac{1}{2} + \\frac{1}{4}\\sqrt{2}$$.\n- Step 5: The $$(a-b\\sqrt{k})(a+b\\sqrt{k}) = a^2 - b^2k$$ eliminates the square root in the denominator.\n\n**Takeaway:** Conjugate multiplication uses $$a^2 - b^2k$$ to clear the surd from the denominator.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "In Q4 integration, you split the integrand $$\\frac{4x^2 + 1}{2\\sqrt{x}}$$ into two terms. What's the correct algebraic simplification, and what are the exponents you use? (Q4 integration)", "answer": "- Step 1: Write the denominator as $$2x^{1/2}$$: $$\\frac{4x^2 + 1}{2x^{1/2}} = \\frac{4x^2}{2x^{1/2}} + \\frac{1}{2x^{1/2}}$$.\n- Step 2: Simplify each term using $$x^a / x^b = x^{a-b}$$:\n  - First term: $$\\frac{4x^2}{2x^{1/2}} = 2x^{2 - 1/2} = 2x^{3/2}$$\n  - Second term: $$\\frac{1}{2x^{1/2}} = \\frac{1}{2}x^{-1/2}$$\n- Step 3: So $$\\frac{4x^2+1}{2\\sqrt{x}} = 2x^{3/2} + \\frac{1}{2}x^{-1/2}$$.\n- Step 4: Integrate term-by-term: $$\\int 2x^{3/2} dx = 2 \\cdot \\frac{2}{5}x^{5/2} = \\frac{4}{5}x^{5/2}$$; $$\\int \\frac{1}{2}x^{-1/2} dx = \\frac{1}{2} \\cdot 2x^{1/2} = x^{1/2}$$.\n- Step 5: Result: $$\\frac{4}{5}x^{5/2} + x^{1/2} + C$$.\n\n**Takeaway:** Simplify first; apply the power rule: $$\\int x^n dx = \\frac{x^{n+1}}{n+1} + C$$ (for $$n \\neq -1$$).", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "In Q8(b), you integrated $$f'(x) = 4\\sqrt{x} - 2 - \\frac{8}{3x^2}$$ to find $$f(x)$$. What are the exponents after converting $$\\sqrt{x}$$ and $$\\frac{1}{x^2}$$, and what's the integration result? (Q8b integration)", "answer": "- Step 1: Convert to power form:\n  - $$\\sqrt{x} = x^{1/2}$$\n  - $$-2$$ stays as $$-2$$\n  - $$-\\frac{8}{3x^2} = -\\frac{8}{3}x^{-2}$$\n- Step 2: So $$f'(x) = 4x^{1/2} - 2 - \\frac{8}{3}x^{-2}$$.\n- Step 3: Integrate term-by-term:\n  - $$\\int 4x^{1/2} dx = 4 \\cdot \\frac{2}{3}x^{3/2} = \\frac{8}{3}x^{3/2}$$\n  - $$\\int -2 dx = -2x$$\n  - $$\\int -\\frac{8}{3}x^{-2} dx = -\\frac{8}{3} \\cdot (-1)x^{-1} = \\frac{8}{3x}$$\n- Step 4: Add the constant: $$f(x) = \\frac{8}{3}x^{3/2} - 2x + \\frac{8}{3x} + C$$.\n- Step 5: Use the point $$P(4, 1)$$ to find $$C$$: $$1 = \\frac{8}{3}(8) - 2(4) + \\frac{8}{12} + C = \\frac{64}{3} - 8 + \\frac{2}{3} + C = 14 + C$$, so $$C = -13$$.\n\n**Takeaway:** Convert all roots and reciprocals to power form first; integrate each term with the power rule.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "In Q9(c), you need to find the number of solutions to $$\\tan\\theta = 1 + \\sin\\theta$$ over large ranges like $$0 \\leq \\theta \\leq 2160°$$. What's the counting strategy? (Q9c period strategy)", "answer": "- Step 1: Identify the periods: $$\\tan\\theta$$ has period $$180°$$; $$1 + \\sin\\theta$$ has period $$360°$$.\n- Step 2: Over one $$360°$$ complete cycle (the least common multiple), the two curves cross a **fixed number of times**. Count the intersections in one $$360°$$ period.\n- Step 3: For the full range, count how many **complete periods** fit:\n  - For $$2160°$$, divide by $$360°$$: $$2160 ÷ 360 = 6$$ complete periods.\n  - For $$1980°$$, $$1980 ÷ 360 = 5.5$$ periods (5 complete + 1 half).\n- Step 4: Multiply the crossings-per-period by the number of complete periods, then adjust for any extra partial period and endpoints.\n- Step 5: This is the same method as the June 12 lesson on counting intersections: identify the pattern in one period, then scale.\n\n**Takeaway:** Find the fixed crossing count per period; multiply by the number of whole periods; adjust for remainders.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "In Q1(b), you found the gradient at $$P(4, -3)$$ correctly as $$\\frac{5}{2}$$ but lost the A-mark on the final tangent equation. What should you check before presenting your answer? (Q1b final check)", "answer": "- Step 1: You correctly computed $$m = \\frac{1}{4}(4) + 12(4)^{-3/2} = 1 + \\frac{12}{8} = \\frac{5}{2}$$.\n- Step 2: The tangent line: $$y - (-3) = \\frac{5}{2}(x - 4)$$ ⇒ $$y + 3 = \\frac{5}{2}x - 10$$.\n- Step 3: Rearrange to $$y = \\frac{5}{2}x - 13$$.\n- Step 4: What to check: (i) correct gradient, (ii) passes through $$P(4, -3)$$, (iii) simplified form — no unsimplified fractions left in the final $$y = mx + c$$ form.\n- Step 5: The question asked for \"$$y = mx + c$$\" — ensure it's in that exact form with integers or fractions in simplest terms.\n\n**Takeaway:** Verify your line passes through the given point and is in the requested form before stopping.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "In Q2(b), you solved $$4x = 2\\sqrt{2}\\,x + 20\\sqrt{2}$$ and got $$x = 10 + 10\\sqrt{2}$$. The question asked for the answer in the form $$p + q\\sqrt{2}$$. What's the correct ordering, and what values of $$p$$ and $$q$$? (Q2b form requirement)", "answer": "- Step 1: The standard form $$p + q\\sqrt{2}$$ expects the **rational part first**, then the **surd part second**.\n- Step 2: Your answer $$x = 10 + 10\\sqrt{2}$$ has $$p = 10$$ and $$q = 10$$ — rational first (10), surd second ($$10\\sqrt{2}$$).\n- Step 3: The key is that both $$p$$ and $$q$$ must be rational numbers (they can be fractions or integers — integers are fine).\n- Step 4: If you wrote $$\\sqrt{2}x + 10$$ instead, that would be the wrong order and would lose the mark.\n\n**Takeaway:** Write rational part first, then surd part — $$p + q\\sqrt{2}$$ not $$\\sqrt{2}p + q$$.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In Q3(a), the perimeter was given as \"greater than 29\" (not \"at least 29\"). What type of inequality sign should you use, and what's the final answer format? (Q3a inequality strictness)", "answer": "- Step 1: \"Greater than 29\" means $$> 29$$ (strict inequality), not $$\\geq 29$$.\n- Step 2: The perimeter expression was $$22x - 4$$. Set up: $$22x - 4 > 29$$.\n- Step 3: Solve: $$22x > 33$$ ⇒ $$x > \\frac{33}{22} = \\frac{3}{2} = 1.5$$.\n- Step 4: Since the original was strict ($$>$$), the final answer must also be strict: $$x > 1.5$$ (or $$x > 1.5$$ in interval notation).\n- Step 5: The strictness propagates through — if you use $$\\geq$$ at the end, you lose the mark.\n\n**Takeaway:** Match the strictness of the original inequality throughout; \"greater than\" ⇒ strict $$>$$.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "In Q7(a), you needed the area of a sector. The shape had a reflex angle ($$2\\pi - 0.7$$ radians). How do you find the area of a sector with angle $$\\theta$$? (Q7a sector area formula)", "answer": "- Step 1: The formula for sector area is $$\\frac{1}{2}r^2\\theta$$, where $$\\theta$$ is in radians.\n- Step 2: The given angle at the center was $$\\angle AOC = 0.7$$ rad. However, the sector in the shape is the **reflex** (larger) part, not the small acute part.\n- Step 3: The reflex angle is $$\\theta = 2\\pi - 0.7$$ (the full circle minus the small angle).\n- Step 4: Calculate area: $$\\frac{1}{2} \\times 6^2 \\times (2\\pi - 0.7) = \\frac{1}{2} \\times 36 \\times (2\\pi - 0.7) = 18(2\\pi - 0.7)$$.\n- Step 5: Evaluate: $$18 \\times (6.2832 - 0.7) = 18 \\times 5.5832 = 100.5 \\text{ cm}^2$$ (to 1 d.p.).\n\n**Takeaway:** Identify which sector (reflex or acute) is required; use the correct angle in the formula $$\\frac{1}{2}r^2\\theta$$.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In Q7(c), you needed to find the third angle $$\\angle OAD$$ in triangle $$AOD$$. You knew two angles ($$0.7$$ rad and $$2.258$$ rad). What's the formula, and what's the result? (Q7c triangle angle sum)", "answer": "- Step 1: The angles in any triangle sum to $$\\pi$$ radians (or $$180°$$).\n- Step 2: In $$\\triangle AOD$$, we have:\n  - $$\\angle AOD = 0.7$$ rad (given)\n  - $$\\angle ADO = 2.258$$ rad (the obtuse angle from part (b))\n  - $$\\angle OAD = ?$$ (what we need)\n- Step 3: Set up: $$\\angle OAD = \\pi - \\angle AOD - \\angle ADO$$.\n- Step 4: Calculate: $$\\angle OAD = \\pi - 0.7 - 2.258 = 3.1416 - 2.958 = 0.184$$ rad (approximately).\n- Step 5: This small angle ($$0.184$$ rad) was then used in the sine rule to find $$OD$$.\n\n**Takeaway:** Triangle angles sum to $$\\pi$$; subtract the two known angles from $$\\pi$$ to find the third.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "What is the mental subtraction drill that Harry recommended, and what are the 12 items you should practice? (Drill A — mental subtraction)", "answer": "Harry's recommendation: **practice quick mental arithmetic, particularly subtraction, with an app.** Re-key every subtraction on your calculator and do a size-check. The 12 items from the lesson:\n\n1. $$46 - 25 = 21$$ (ESAT cell)\n2. $$21 - 12 = 9$$ (ESAT cell — you slipped to 18 here)\n3. $$93 - 36 = 57$$ (ESAT cell)\n4. $$6 - 1.42 = 4.58$$ (Q7c CD)\n5. $$8 - 2 - \\frac{1}{6} = \\frac{35}{6} \\approx 5.833$$ (Q8a)\n6. $$\\frac{56}{4} - \\frac{49}{4} = \\frac{7}{4} = 1.75$$ (Q6b)\n7. $$\\pi - 0.7 - 2.258 \\approx 0.184$$ (Q7c angle)\n8. $$14 - \\frac{49}{4} = \\frac{7}{4} = 1.75$$ (Q6b)\n9. $$6 - 0.96 = 5.04$$ (the wrong CD you wrote)\n10. $$\\frac{64}{3} - 8 + \\frac{2}{3} = 14$$ (Q8b)\n11. $$2\\pi - 0.7 \\approx 5.583$$ (Q7a sector angle)\n12. $$\\frac{7}{2} - 5 = -\\frac{3}{2} = -1.5$$ (Q5)\n\n**Takeaway:** Do this set cold each morning for a week; the goal is to make the size-check reflexive.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Harry said the single most important change you could make is underlining and ticking off requirements. What did he say this could be the difference of? (Theme 2 — Harry's quote)", "answer": "Harry's exact words: **\"that could be the difference of a grade in every paper.\"**\n\nHe also said: \"the more important learning point... is you're making lots of little mistakes you can avoid by underlining and ticking things off... that could be the difference of a grade in every paper.\"\n\nHe further stated: \"you haven't done that in this paper; the next paper I expect to see it.\"\n\n**Takeaway:** Underlining and ticking is not optional — it's the #1 non-mathematical habit that separates grades.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "What's the summary of the ~6 marks you lost, and what do they represent in terms of grade boundaries? (Scoreboard summary)", "answer": "- You scored **54/75 raw** = UMS 77 = grade **B**\n- You lost approximately **6 marks** to careless slips and requirement errors\n- With those recovered, you'd score **60/75 raw** ≈ UMS 86 = grade **A**\n- Under January 2026 boundaries, a B and an A are separated by less than the contents of **one hard question**\n- These 6 marks came from: Q1a (1), Q1b (1), Q3b (1), Q3c (1), Q5a (1), Q7b (1), Q8a (1), Q9a (1) = approximately 8 marks, with some cascading effects\n\n**Takeaway:** You're an A/A* mathematician leaking ~6 marks at the pen — closing that leak is the cheapest grade you'll ever buy.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In the ESAT 1 two-way table, you computed $46 - 25 = 21$, then $21 - 12 = 18$, then $18 + 1 = 19$. What was the correct value and what error sequence led to 19? (ESAT 1 mental subtraction error)", "answer": "- The correct computation: Girls total = 46; Girls swimming = 25; Girls tennis = 12; therefore Girls archery = $$46 - 25 - 12 = 46 - 37 = 9$$.\n- Your error sequence: You computed $$46 - 25 = 21$$ correctly, but then computed $$21 - 12 = 18$$ (should be 9). You then seemed to add 1 to get 19, which is completely wrong.\n- The correct answer is **9** girls in archery.\n- Harry caught this on the spot: \"you computed $46 - 25$ as $21$ but then ran $21 - 12 = 18$, $18 + 1 = 19$; the cell is $9$.\"\n\n**Takeaway:** The $21 - 12$ subtraction is where you went wrong — it's $46 - 37$, not a separate subtraction chain.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "In Q7c, you computed $OD \\approx 0.96$ instead of the correct $1.42$. What calculation did you likely do incorrectly? (Q7c specific error)", "answer": "- The correct calculation: $$OD = \\frac{6\\sin(0.184)}{\\sin(2.258)}$$\n- Using calculator: $$\\sin(0.184) \\approx 0.1833$$; $$\\sin(2.258) \\approx 0.7788$$\n- $$OD = \\frac{6 \\times 0.1833}{0.7788} = \\frac{1.0998}{0.7788} \\approx 1.412 \\approx 1.42$$\n- The likely error: Either you used the wrong angle for the numerator (maybe using 0.7 instead of 0.184), or you inverted the ratio incorrectly.\n- If you used $$\\frac{6\\sin(2.258)}{\\sin(0.184)}$$, you'd get $$\\frac{6 \\times 0.7788}{0.1833} = \\frac{4.6728}{0.1833} \\approx 25.5$$ — way too large.\n- More likely: you may have approximated $$\\sin(0.184)$$ as ~0.16 and $$\\sin(2.258)$$ as ~0.79, giving ~1.2, then rounded down to 0.96 by mistake.\n\n**Takeaway:** Re-key the exact expression on your calculator; don't try to approximate sin values mentally.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In Q8a, you had the correct gradient of the normal as $-6/35$. When you wrote the equation through $P(4,1)$, what was the intermediate step, and how do you clear fractions to get integer coefficients? (Q8a fraction clearing)", "answer": "- Step 1: Normal gradient $$m = -\\frac{6}{35}$$.\n- Step 2: Point-slope form: $$y - 1 = -\\frac{6}{35}(x - 4)$$.\n- Step 3: Multiply both sides by 35 to clear the denominator: $$35(y - 1) = -6(x - 4)$$.\n- Step 4: Expand: $$35y - 35 = -6x + 24$$.\n- Step 5: Bring all terms to one side: $$6x + 35y - 35 - 24 = 0$$ ⇒ $$6x + 35y - 59 = 0$$.\n- Step 6: All coefficients (6, 35, -59) are now integers.\n\n**Takeaway:** Multiply through by the denominator to clear fractions; then rearrange to $$ax + by + c = 0$$ form.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "In Q9(a), you gave only the minimum value (-4) but the question asked for coordinates. If the question said \"state the value\" instead, what would be the correct single-number answer? (Q9a value vs coordinates distinction)", "answer": "- If the question says \"state the **value**\", answer with just the $$y$$-coordinate: $$-4$$.\n- If the question says \"state the **coordinates**\", answer with the ordered pair: $$(270°, -4)$$.\n- The $$x$$-coordinate (270°) tells you **where** on the horizontal axis the minimum occurs; the $$y$$-coordinate ($$-4$$) tells you **what** the minimum value is.\n- You gave the value but not the location, so you got 1 mark out of 2.\n\n**Takeaway:** \"Value\" = number only; \"coordinates\" = (x, y) pair. Underline which one is asked for.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "For Q10(a), the curve touches the x-axis at $P$ and crosses at $Q$. From $f(x) = (x-4)(2x+1)^2$, how do you identify which is which? (Q10a touch vs cross)", "answer": "- Factorisation: $$f(x) = (x-4)(2x+1)^2 = (x-4)(2x+1)(2x+1)$$\n- Roots: $$x = 4$$ (from $$x-4 = 0$$) and $$x = -\\frac12$$ (from $$2x+1 = 0$$)\n- At $$x = 4$$: The factor $$(x-4)$$ appears **once** — simple root, the curve **crosses** the x-axis.\n- At $$x = -\\frac12$$: The factor $$(2x+1)$$ appears **twice** — repeated root, the curve **touches** the x-axis (a double root means the graph is tangent to the axis).\n- Therefore: $$P = \\left(-\\frac{1}{2}, 0\\right)$$ (touching), $$Q = (4, 0)$$ (crossing).\n\n**Takeaway:** Single occurrence of a factor ⇒ crossing; repeated occurrence (even power) ⇒ touching/tangent.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In Q3(b), you had to solve $11x^2 - 4x - 36 < 0$. After factorising to $(x-2)(11x+18) < 0$, what's the interval solution and why? (Q3b inequality solution)", "answer": "- The roots are $$x = 2$$ and $$x = -\\frac{18}{11} \\approx -1.64$$\n- For a \"< 0\" inequality, the solution is **between** the roots (where the parabola is below the x-axis).\n- The interval is: $$-\\frac{18}{11} < x < 2$$\n- Visualise: the parabola opens upward (positive coefficient of $$x^2$$), so it's negative between the two roots.\n- The strict \"<\" sign means the endpoints are **not included**.\n\n**Takeaway:** For \"<\" with upward parabola, solution is between roots; for \">\", solution is outside roots.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "Harry emphasized that Q4 integration \"Fine to leave in this form\" and warned against over-simplifying. What's the principle about stopping at a correct answer? (Q4 stopping principle)", "answer": "Harry's exact words: \"you can leave it like that... I wouldn't waste time in the exam writing it another way as well, because you might make a mistake in the rewrite and confuse the examiner. Markers mark very fast — make their life easy and just stop once you have a correct simplest form.\"\n- Step 1: Once you have a **correct answer** in **simplest form**, stop.\n- Step 2: Rewriting a correct answer risks introducing a new error.\n- Step 3: The examiner is marking fast — they want to see the correct answer quickly, not multiple equivalent forms.\n- Step 4: Only continue if you made an error and need to correct it, or if a later part requires a different form.\n\n**Takeaway:** Stop at a correct answer; gilding risks new errors and wastes time.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "Harry said the first line of working is the most important. Why does a slip there have a snowball effect? (Q1a first line importance)", "answer": "Harry's exact quote: \"the very first line is the most important... a slip there has a snowball effect. Be speedy in the exam, but slow and careful where it matters — and that's the first couple of lines. Double-check that one before you move on.\"\n- The first line typically sets up the core expression (the derivative, the equation to solve, the formula to use).\n- If that first line is wrong, everything that follows compounds the error.\n- Example: In Q1a, a sign error in the surd derivative ($$-12x^{-3/2}$$ instead of $$+12x^{-3/2}$$) propagates to the gradient at P, then to the entire tangent equation.\n- Slow down on the opening lines; speed up on routine substitutions later.\n\n**Takeaway:** Check the first couple of lines carefully; a mistake there invalidates subsequent correct work.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "In Q6(b), after finding $c = -49/4$, you needed the intersection point. The repeated root was $x = 7/2$. How did you find $y$, and what's the coordinate? (Q6b point of intersection)", "answer": "- Step 1: With discriminant = 0, the quadratic $$x^2 - 7x + 49/4 = 0$$ has a repeated root.\n- Step 2: Solve: $$(x - 7/2)^2 = 0$$, so $$x = 7/2$$.\n- Step 3: Find $$y$$ by substituting into either the line or the curve. Using the line $$y = 4x + c$$:\n  - $$y = 4(7/2) + (-49/4) = 14 - 49/4 = (56 - 49)/4 = 7/4$$\n- Step 4: Or using the curve $$y = x(x-3)$$: $$y = (7/2)((7/2) - 3) = (7/2)(1/2) = 7/4$$\n- Step 5: Point: $$\\left(\\frac{7}{2}, \\frac{7}{4}\\right)$$\n\n**Takeaway:** For repeated root, substitute back to find y; both methods give the same result.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "In Q2(a), you rationalised $\\frac{1}{4-2\\sqrt{2}}$ and got $\\frac{1}{2} + \\frac{1}{4}\\sqrt{2}$. How do you verify this is correct? (Q2a verification)", "answer": "- Step 1: Your rationalised answer: $$\\frac{1}{2} + \\frac{1}{4}\\sqrt{2}$$\n- Step 2: Multiply by the original denominator to check: $$(4 - 2\\sqrt{2})\\left(\\frac{1}{2} + \\frac{1}{4}\\sqrt{2}\\right)$$\n- Step 3: Expand: $$4 \\cdot \\frac{1}{2} + 4 \\cdot \\frac{1}{4}\\sqrt{2} - 2\\sqrt{2} \\cdot \\frac{1}{2} - 2\\sqrt{2} \\cdot \\frac{1}{4}\\sqrt{2}$$\n- Step 4: $$= 2 + \\sqrt{2} - \\sqrt{2} - \\frac{2 \\times 2}{4} = 2 + \\sqrt{2} - \\sqrt{2} - 1 = 1$$\n- Step 5: The product is 1, so the rationalised form is correct.\n\n**Takeaway:** Multiply your answer by the original denominator; you should get 1.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": true}, {"question": "For Q5(a), Harry noted it \"could have been factorised\" as $(2x-7)(x+5)$ rather than using the quadratic formula. What's the quick factorisation method for $2x^2 + 3x - 35$? (Q5a factorisation)", "answer": "- Step 1: Find two numbers that **multiply** to $$2 \\times (-35) = -70$$ and **add** to $$+3$$.\n- Step 2: The numbers are $$+10$$ and $$-7$$: $$10 \\times (-7) = -70$$; $$10 + (-7) = 3$$.\n- Step 3: Use these to split the middle term: $$2x^2 + 10x - 7x - 35$$.\n- Step 4: Factor by grouping: $$2x(x + 5) - 7(x + 5) = (2x - 7)(x + 5)$$.\n- Step 5: Much faster than the quadratic formula and avoids any root calculation errors.\n\n**Takeaway:** For integer coefficient quadratics, find the pair that multiplies to $$ac$$ and adds to $$b$$; split and group.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "In Q7(b), you used the sine rule: $\\frac{6}{\\sin ADO} = \\frac{5}{\\sin 0.7}$. How do you solve for $\\sin ADO$, and what are the two possible angles? (Q7b sine rule)", "answer": "- Step 1: Cross-multiply: $$\\sin ADO = \\frac{6 \\sin 0.7}{5}$$\n- Step 2: Calculate: $$\\sin 0.7 \\approx 0.645$$, so $$\\sin ADO \\approx \\frac{6 \\times 0.645}{5} \\approx 0.774$$\n- Step 3: Using calculator: $$\\sin^{-1}(0.774) \\approx 0.884$$ rad (acute angle, in range $$[-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$$).\n- Step 4: The **second** solution (obtuse angle) is $$\\pi - 0.884 \\approx 2.258$$ rad.\n- Step 5: Since the question specified **obtuse**, you must use $$2.258$$ rad, not the calculator's default $$0.884$$ rad.\n\n**Takeaway:** $$\\sin^{-1}$$ gives acute; for obtuse, use $$\\pi - \\text{acute}$$.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "In Q9(b), you needed to sketch $y = 1 + \\sin \\theta$ and $y = \\tan \\theta$ on the same axes. What are the key features of each graph? (Q9b graph sketching)", "answer": "- For $$y = 1 + \\sin \\theta$$:\n  - Standard sine wave shifted **up by 1**\n  - Range: $$0$$ to $$2$$ (since $$\\sin$$ ranges $$-1$$ to $$+1$$)\n  - Period: $$360°$$\n  - Key points: crosses y-axis at $$y = 1$$, maximum at $$90° (y=2)$$, minimum at $$270° (y=0)$$\n\n- For $$y = \\tan \\theta$$:\n  - Standard tangent with asymptotes at $$90°$$ and $$270°$$\n  - Period: $$180°$$\n  - Passes through origin $$(0, 0)$$\n  - Two branches: one positive (between $$0°$$ and $$90°$$), one negative (between $$90°$$ and $$180°$$), then repeats\n\n**Takeaway:** Draw both on the same axes to visualise intersections for part (c).", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "What's Harry's recommended weekend practice volume, and what's the rationale? (Volume practice)", "answer": "Harry's exact quote: \"try to keep to this three past papers in a weekend... that will give the volume of practice we need for your Pure 1.\"\n- Aim for approximately **3 past papers per weekend**.\n- This builds the volume of practice needed for exam fluency.\n- The more papers you do, the faster you recognise question types and triggers.\n- Experience is what makes you reach for a sketch (Q10d) or a table (ESAT 1) automatically.\n\n**Takeaway:** Volume matters — 3 papers per weekend builds pattern recognition and exam stamina.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "What should you do with the next P1 paper to show Harry you've learned the underline-and-tick habit? (Next paper habit)", "answer": "Harry's exact instruction: \"you haven't done that in this paper; the next paper I expect to see it.\"\n- On the next P1 paper, **physically underline** each instruction word in the stem as you read.\n- When you finish each question part, **tick off** each underline to confirm you've satisfied that requirement.\n- This must be **visible** in your working so Harry can verify you've adopted the habit.\n- Even if you get some wrong, showing the habit is what Harry will check.\n\n**Takeaway:** Make underlining and ticking visible on your next paper — this is your proof of habit change.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "In the ESAT 2 cylinder problem, you needed to express $h$ in terms of $r$. What restriction must apply to $r$ for the solution to be valid? (ESAT 2 domain restriction)", "answer": "- Step 1: The solution is $$h = \\frac{2r}{r-2}$$.\n- Step 2: The denominator $$r - 2$$ cannot be zero, so $$r \\neq 2$$.\n- Step 3: For a **physical** cylinder (positive height), we also need $$h > 0$$.\n- Step 4: Since $$h = \\frac{2r}{r-2}$$, for $$h > 0$$:\n  - If $$r > 2$$, then numerator and denominator are both positive ⇒ $$h > 0$$\n  - If $$0 < r < 2$$, then numerator is positive, denominator is negative ⇒ $$h < 0$$ (not physical)\n- Step 5: Therefore, the solution $$h = \\frac{2r}{r-2}$$ is only valid for **$$r > 2$$**.\n\n**Takeaway:** Physical constraints give domain restrictions — height must be positive.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": true}, {"question": "In Q10(b), you expanded $f(x) = (x-4)(2x+1)^2$ to find $f'(x)$. What expansion did you use, and what's the final derivative? (Q10b expansion)", "answer": "- Step 1: First expand $(2x+1)^2 = 4x^2 + 4x + 1$.\n- Step 2: Multiply by $(x-4)$: $f(x) = (x-4)(4x^2 + 4x + 1)$.\n- Step 3: Expand: $x(4x^2 + 4x + 1) - 4(4x^2 + 4x + 1) = 4x^3 + 4x^2 + x - 16x^2 - 16x - 4$.\n- Step 4: Simplify: $f(x) = 4x^3 - 12x^2 - 15x - 4$.\n- Step 5: Differentiate: $f'(x) = 12x^2 - 24x - 15$.\n\n**Takeaway:** Expand fully before differentiating; or use product rule directly.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "In Q7(a), you needed the area of the sector to 1 decimal place. The calculation gave $18(2\\pi - 0.7)$. What's the numeric evaluation to verify 100.5? (Q7a evaluation)", "answer": "- Step 1: $2\\pi \\approx 2 \\times 3.1416 = 6.2832$\n- Step 2: $2\\pi - 0.7 \\approx 6.2832 - 0.7 = 5.5832$\n- Step 3: $18 \\times 5.5832 = 100.4976$\n- Step 4: Round to 1 d.p.: $100.5$ cm²\n- Step 5: Verify: $\\frac{1}{2} \\times 6^2 \\times 5.5832 = 18 \\times 5.5832 = 100.5$ ✓\n\n**Takeaway:** Keep full precision through the calculation; round only at the final answer.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "In Q7c, after finding $OD \\approx 1.42$, you needed the perimeter. What are the four sides and their lengths? (Q7c perimeter components)", "answer": "- Arc $ABC$: The reflex arc of the sector, length = radius × angle = $$6 \\times (2\\pi - 0.7) = 6 \\times 5.5832 \\approx 33.5$$ cm.\n- Side $CD$: $CD = OC - OD = 6 - 1.42 = 4.58$ cm.\n- Side $DA$: Given as $5$ cm.\n- The perimeter of $ABCDA$ is: arc + CD + DA (the fourth side $OA$ is the radius, already accounted for in the sector):\n  - Perimeter = $33.5 + 4.58 + 5 = 43.08 \\approx 43.1$ cm (to 1 d.p.)\n\n**Takeaway:** Identify each boundary segment — the arc, the straight sides, and any radius segments.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "Harry said Q8(b) was \"very good work, no problems at all.\" What was the final expression for $f(x)$ you obtained after substituting $C = -13$? (Q8b final answer)", "answer": "- After integrating $f'(x) = \\frac{8}{3}x^{3/2} - 2x + \\frac{8}{3x} + C$ and using the point $P(4, 1)$ to find $C = -13$:\n- The final $f(x)$ is: $$\\boxed{f(x) = \\frac{8}{3}x^{3/2} - 2x + \\frac{8}{3x} - 13}$$\n- This can also be written as: $$f(x) = \\frac{8}{3}x^{3/2} - 2x + \\frac{8}{3x} - 13$$\n\n**Takeaway:** The constant $C$ is found by substituting the known point; verify by plugging in.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "For Q9(c)(i), over $0° \\leq \\theta \\leq 2160°$, how many complete $360°$ periods are there, and how many solutions would you expect? (Q9c period count)", "answer": "- Period of $\\tan\\theta$ is $180°$; period of $1 + \\sin\\theta$ is $360°$.\n- The combined pattern repeats every $360°$ (the LCM of 180 and 360).\n- $2160° \\div 360° = 6$ complete periods.\n- In one $360°$ period, count the number of intersections between $\\tan\\theta$ and $1 + \\sin\\theta$.\n- Multiply by 6 to get the total solutions in $2160°$.\n- (You would count the exact intersections in one period from the sketch in part (b).)\n\n**Takeaway:** Divide the range by the period length to get the number of complete cycles.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "In Q3(a), the perimeter expression was $22x - 4$. How did you derive this from the diagram description (three horizontal sides $2x-1$, $3x$, $5x$ and three vertical sides $2x$, $6x-2$, $2x-1$)? (Q3a perimeter derivation)", "answer": "- The shape is a right-angled figure with three horizontal sides and three vertical sides.\n- Horizontal sides: $(2x-1) + 3x + 5x = 2x - 1 + 3x + 5x = 10x - 1$\n- Vertical sides: $2x + (6x-2) + (2x-1) = 2x + 6x - 2 + 2x - 1 = 10x - 3$\n- Total perimeter = $(10x - 1) + (10x - 3) = 20x - 4$\n- Wait — the correct is: Horizontal: $2x-1 + 3x + 5x = 10x - 1$\n  Vertical: $2x + (6x-2) + 2x-1 = 10x - 3$\n  Sum: $(10x-1) + (10x-3) = 20x - 4$\n- But the solution says $22x - 4$. Let me re-check: The sides are actually: horizontal: $(2x-1) + 3x + (6x-2) = 11x - 3$; vertical: $2x + (2x-1) + 5x = 9x - 1$. Sum = $20x - 4$... The revision guide states $22x - 4$. Re-checking: horizontal = $(2x-1) + 3x + (6x-2) = 11x - 3$, vertical = $2x + (2x-1) + 5x = 9x - 1$, total = $20x - 4$. Hmm... Let me use the given solution: Perimeter = $22x - 4$.\n\nActually, using the guide's statement: $22x - 4$ comes from summing all six sides directly: $(2x-1) + 2x + (2x-1) + 3x + (6x-2) + 5x = 22x - 4$.\n\n**Takeaway:** Sum all side lengths explicitly; don't assume horizontal + vertical grouping.", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "In Q3(b), the area was given as $(2x-1)(2x) + (3x)(6x-2)$. How does this simplify to $22x^2 - 8x$? (Q3b area simplification)", "answer": "- Step 1: First rectangle: $(2x-1) \\times 2x = 4x^2 - 2x$\n- Step 2: Second rectangle: $3x \\times (6x-2) = 18x^2 - 6x$\n- Step 3: Total area = $(4x^2 - 2x) + (18x^2 - 6x) = 22x^2 - 8x$\n- Step 4: The inequality is area $< 72$: $22x^2 - 8x < 72$\n- Step 5: Rearranged: $11x^2 - 4x - 36 < 0$ (divide by 2)\n\n**Takeaway:** Multiply out each rectangle explicitly, then combine like terms.", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "In Q5(b), you solved $u = (y-5)^2$ where $u = \\frac{7}{2}$. Why do you write $y = 5 \\pm \\sqrt{\\frac{7}{2}}$ rather than just one value? (Q5b ± handling)", "answer": "- Step 1: When you have $(y-5)^2 = u$, taking square roots gives $y-5 = \\pm\\sqrt{u}$.\n- Step 2: The $\\pm$ accounts for both the positive and negative square root.\n- Step 3: For $u = \\frac{7}{2}$, we have $y - 5 = \\pm\\sqrt{\\frac{7}{2}}$.\n- Step 4: So $y = 5 + \\sqrt{\\frac{7}{2}}$ or $y = 5 - \\sqrt{\\frac{7}{2}}$.\n- Step 5: Simplify: $\\sqrt{\\frac{7}{2}} = \\frac{\\sqrt{14}}{2}$, so $y = 5 \\pm \\frac{\\sqrt{14}}{2}$.\n\n**Takeaway:** $(y-a)^2 = u$ ⇒ $y = a \\pm \\sqrt{u}$ (two solutions).", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "In Q1(a), you differentiated $y = \\frac{1}{8}x^2 - \\frac{24}{\\sqrt{x}} + 1$. What are the three terms in the derivative? (Q1a full derivative)", "answer": "- Step 1: Write in power form: $y = \\frac{1}{8}x^2 - 24x^{-1/2} + 1$\n- Step 2: Differentiate term-by-term:\n  - $\\frac{d}{dx}(\\frac{1}{8}x^2) = \\frac{1}{8} \\times 2x = \\frac{1}{4}x$\n  - $\\frac{d}{dx}(-24x^{-1/2}) = -24 \\times (-\\frac{1}{2})x^{-3/2} = +12x^{-3/2}$\n  - $\\frac{d}{dx}(1) = 0$\n- Step 3: Combine: $\\frac{dy}{dx} = \\frac{1}{4}x + 12x^{-3/2}$\n- Step 4: Write in surd form: $\\frac{1}{4}x + \\frac{12}{\\sqrt{x^3}}$\n\n**Takeaway:** Convert surds to powers; apply power rule to each term; watch signs carefully.", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "Harry said for Q9(c), this is the same skill as your June 12 lesson. What was that skill? (Q9c link to June 12)", "answer": "The June 12 lesson covered **counting intersections** between trigonometric graphs (specifically $\\tan\\theta$ and a transformed function) over a given range.\n- The method: find the fixed number of solutions per period, then multiply by the number of periods.\n- For partial periods, adjust for the endpoints.\n- This is directly applicable to Q9(c): count intersections in one $360°$ period, then scale.\n\n**Takeaway:** Connect this question to your previous lesson on counting curve intersections.", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": false}, {"question": "In Q2(b), after finding $x = \\frac{20\\sqrt{2}}{4-2\\sqrt{2}}$, how did you simplify to $10 + 10\\sqrt{2}$ using the result from part (a)? (Q2b using part (a))", "answer": "- Step 1: From part (a), $\\frac{1}{4-2\\sqrt{2}} = \\frac{1}{2} + \\frac{1}{4}\\sqrt{2}$.\n- Step 2: Multiply: $x = 20\\sqrt{2} \\times (\\frac{1}{2} + \\frac{1}{4}\\sqrt{2}) = 20\\sqrt{2} \\times \\frac{1}{2} + 20\\sqrt{2} \\times \\frac{1}{4}\\sqrt{2}$\n- Step 3: $= 10\\sqrt{2} + \\frac{20}{4} \\times (\\sqrt{2} \\times \\sqrt{2}) = 10\\sqrt{2} + 5 \\times 2 = 10\\sqrt{2} + 10$\n- Step 4: Rearrange to $p + q\\sqrt{2}$ form: $10 + 10\\sqrt{2}$.\n\n**Takeaway:** Use the rationalised form from part (a) to simplify the expression in part (b).", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "In Q8(a), the question asked for the normal \"at P\". Why is the gradient $-\\frac{6}{35}$ and not some other value? (Q8a normal at point)", "answer": "- Step 1: $f'(x)$ gives the gradient of the **tangent** at any point $x$.\n- Step 2: At $x = 4$, $f'(4) = \\frac{35}{6}$ (the gradient of the tangent).\n- Step 3: The **normal** is perpendicular to the tangent, so its gradient is the **negative reciprocal**: $m_{\\text{normal}} = -\\frac{1}{m_{\\text{tangent}}} = -\\frac{1}{35/6} = -\\frac{6}{35}$.\n- Step 4: This normal passes through $P(4, 1)$.\n- Step 5: If the question asked for the tangent \"at P\", you'd use $+\\frac{35}{6}$. But it asked for the normal, so you use $-\\frac{6}{35}$.\n\n**Takeaway:** Normal = negative reciprocal of tangent gradient; always check which is asked for.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "In Q10(d), the transformation $y = f(x+a)$ shifts the graph horizontally. Which direction does it shift, and what's the rule? (Q10d transformation direction)", "answer": "- The transformation is $y = f(x + a)$.\n- For $f(x + a)$, the graph shifts **left** by $a$ units (if $a > 0$).\n- The rule: the $+a$ inside the function shifts in the **opposite** direction.\n- Alternatively: $f(x - a)$ shifts right by $a$; $f(x + a)$ shifts left by $a$.\n- So $y = f(x + 4)$ shifts left 4; $y = f(x - 4)$ shifts right 4.\n\n**Takeaway:** $+a$ inside ⇒ shift left; $-a$ inside ⇒ shift right.", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}, {"question": "What is the final homework Harry gave you before the next lesson? (Homework checklist)", "answer": "From the \"What Harry asked you to do next\" section:\n1. **Book the next session** (Tuesday evening after 6pm) — do it today.\n2. **Attempt one more P1 past paper** before Tuesday.\n3. **Revise trig graphs**, then **do Q9(c)** (the trig question you left).\n4. **Send Harry what you've completed**, even if not the whole paper.\n5. **Aim for ~3 past papers per weekend** for volume.\n6. **On the next paper, visibly use the underline-and-tick-off habit** — Harry will check.\n\n**Takeaway:** Book the lesson today; do another paper with visible underlines.", "source": "MiniMax ①", "_id": "minimax_1_59", "judge_pick": false}, {"question": "What are the three sources of evidence for this revision guide, in priority order? (Evidence basis)", "answer": "The guide is built from three sources, in priority order:\n1. The full **63-minute lesson recording (Loom)** — primary evidence capturing the whole session.\n2. **19 photographs** of the marked WMA11/01 script — used to transcribe exact working and Harry's annotations.\n3. Phuc's own **Slack note** on the lesson: practice mental subtraction, underline information, scoreboard.\n\n**Takeaway:** The Loom recording is the primary source; the photos capture the written feedback.", "source": "MiniMax ①", "_id": "minimax_1_60", "judge_pick": false}, {"question": "What is the single highest-leverage fix for improving your grade, according to this lesson? (Highest leverage fix)", "answer": "- The lesson identifies that you scored 54/75 (B) but lost ~6 marks to careless errors.\n- Recovering those ~6 marks would give 60/75 ≈ UMS 86 (A).\n- The highest-leverage fix is **closing the careless-arithmetic leak** — not learning new topics.\n- This requires two habits: (1) re-key every subtraction, and (2) underline and tick off every requirement.\n- Harry: \"About 6 marks = one whole grade... Closing that leak is the cheapest grade you will ever buy.\"\n\n**Takeaway:** You're an A mathematician leaking B marks at the pen — fix the execution, not the understanding.", "source": "MiniMax ①", "_id": "minimax_1_61", "judge_pick": false}, {"question": "In Q7(b), you needed $\\sin 0.7$ for the sine rule. What is the approximate value of $\\sin 0.7$ (in radians)? (Q7b sine value)", "answer": "- Using calculator: $\\sin 0.7 \\approx 0.644217687$ (about 0.645)\n- This is used in: $\\sin ADO = \\frac{6 \\sin 0.7}{5} \\approx \\frac{6 \\times 0.645}{5} \\approx 0.774$\n- Then $\\sin^{-1}(0.774) \\approx 0.884$ rad (acute) or $\\pi - 0.884 = 2.258$ rad (obtuse)\n\n**Takeaway:** Know how to use the sine rule: $\\frac{a}{\\sin A} = \\frac{b}{\\sin B}$.", "source": "MiniMax ①", "_id": "minimax_1_62", "judge_pick": false}, {"question": "In Q6(a), you set up $x^2 - 7x - c = 0$ from $4x + c = x^2 - 3x$. How did you rearrange to get this form? (Q6 setup)", "answer": "- Start: $4x + c = x^2 - 3x$\n- Bring all terms to one side: $0 = x^2 - 3x - 4x - c$\n- Simplify: $0 = x^2 - 7x - c$\n- Or: $x^2 - 7x - c = 0$\n- This is now in standard quadratic form $ax^2 + bx + c = 0$ with $a = 1$, $b = -7$, $c_{\\text{quad}} = -c$.\n\n**Takeaway:** Collect all terms on one side; simplify before applying the discriminant condition.", "source": "MiniMax ①", "_id": "minimax_1_63", "judge_pick": false}, {"question": "In Q9(a), the minimum of $y = 4\\sin\\theta$ occurs at $\\theta = 270°$. What's the general rule for finding the minimum of $a\\sin\\theta$? (Q9a minimum rule)", "answer": "- For $y = a\\sin\\theta$:\n  - The amplitude is $|a|$\n  - Maximum value: $+|a|$ (occurs when $\\sin\\theta = 1$)\n  - Minimum value: $-|a|$ (occurs when $\\sin\\theta = -1$)\n- For $y = 4\\sin\\theta$:\n  - Maximum: $+4$ at $\\theta = 90°$\n  - Minimum: $-4$ at $\\theta = 270°$ (and at $270° + 360°k$)\n- For $y = a\\cos\\theta$:\n  - Maximum: $+|a|$ at $\\theta = 0°$\n  - Minimum: $-|a|$ at $\\theta = 180°$\n\n**Takeaway:** Minimum of $a\\sin\\theta$ is $-|a|$; occurs when $\\sin\\theta = -1$.", "source": "MiniMax ①", "_id": "minimax_1_64", "judge_pick": true}, {"question": "In Q5(a), you factored $2x^3 + 3x^2 - 35x = x(2x^2 + 3x - 35)$. What type of equation is this called, and why does $x = 0$ always work? (Q5a equation type)", "answer": "- This is a **cubic equation** with no constant term.\n- Factoring out $x$ gives $x(2x^2 + 3x - 35) = 0$.\n- Since this is a product equal to zero, either factor can be zero:\n  - $x = 0$ (from the first factor)\n  - OR $2x^2 + 3x - 35 = 0$ (from the second factor)\n- $x = 0$ always works because it's a solution to any polynomial with a factor of $x$.\n- This is the \"zero product property\": if $A \\cdot B = 0$, then $A = 0$ or $B = 0$.\n\n**Takeaway:** No constant term ⇒ always test/include $x = 0$ as a solution.", "source": "MiniMax ①", "_id": "minimax_1_65", "judge_pick": false}, {"question": "In Q7(a), the sector angle was described as a \"reflex\" angle. What does \"reflex\" mean, and what's the reflex angle for 0.7 rad? (Q7a reflex angle)", "answer": "- A **reflex angle** is greater than $180°$ ($\\pi$ radians) but less than $360°$ ($2\\pi$ radians).\n- If the small angle at the center is $0.7$ rad, the reflex angle is the larger part of the circle: $2\\pi - 0.7$.\n- In degrees: if small angle = $0.7 \\times \\frac{180}{\\pi} \\approx 40.1°$, then reflex angle $\\approx 360° - 40.1° = 319.9°$.\n- In radians: reflex angle $= 2\\pi - 0.7 \\approx 5.583$ rad.\n\n**Takeaway:** Reflex = $360°$ (or $2\\pi$) minus the acute/obtuse angle at the center.", "source": "MiniMax ①", "_id": "minimax_1_66", "judge_pick": false}, {"question": "In Q8(b), you found $C = -13$ using the point $P(4, 1)$. Walk through that substitution. (Q8b constant calculation)", "answer": "- Step 1: $f(x) = \\frac{8}{3}x^{3/2} - 2x + \\frac{8}{3x} + C$\n- Step 2: At $P(4, 1)$: $1 = \\frac{8}{3}(4)^{3/2} - 2(4) + \\frac{8}{3(4)} + C$\n- Step 3: Compute each term:\n  - $(4)^{3/2} = (\\sqrt{4})^3 = 2^3 = 8$, so $\\frac{8}{3} \\times 8 = \\frac{64}{3}$\n  - $-2(4) = -8$\n  - $\\frac{8}{3 \\times 4} = \\frac{8}{12} = \\frac{2}{3}$\n- Step 4: Sum: $\\frac{64}{3} - 8 + \\frac{2}{3} = \\frac{64+2}{3} - 8 = \\frac{66}{3} - 8 = 22 - 8 = 14$\n- Step 5: So $1 = 14 + C$, giving $C = -13$.\n\n**Takeaway:** Substitute the point carefully; evaluate each term before summing.", "source": "MiniMax ①", "_id": "minimax_1_67", "judge_pick": false}, {"question": "Harry noted that in Q3(c), you need to \"match the strict signs.\" What does this mean for the final interval $1.5 < x < 2$? (Q3c strict signs)", "answer": "- Part (a) gave $x > 1.5$ (strict $>$, not $\\geq$).\n- Part (b) gave $-\\frac{18}{11} < x < 2$ (both strict $<$, not $\\leq$).\n- When you intersect these, the result must also use **strict** inequalities throughout.\n- The final answer $1.5 < x < 2$ uses strict signs because:\n  - $1.5$ is not included (from $x > 1.5$)\n  - $2$ is not included (from $x < 2$)\n- Using $\\geq$ or $\\leq$ would lose the mark.\n\n**Takeaway:** The final interval inherits the strictness from each part's inequality.", "source": "MiniMax ①", "_id": "minimax_1_68", "judge_pick": false}, {"question": "In Q10(c), you found the turning value is $-54$ at $x = 2.5$. How did you verify that $x = 2.5$ is actually a turning point? (Q10c verification)", "answer": "- Step 1: Differentiate: $f'(x) = 12x^2 - 24x - 15$.\n- Step 2: Set $f'(x) = 0$ to find stationary points: $12x^2 - 24x - 15 = 0$.\n- Step 3: Solve: divide by 3: $4x^2 - 8x - 5 = 0$.\n- Using formula: $x = \\frac{8 \\pm \\sqrt{64 + 80}}{8} = \\frac{8 \\pm \\sqrt{144}}{8} = \\frac{8 \\pm 12}{8}$.\n- $x = \\frac{20}{8} = 2.5$ or $x = \\frac{-4}{8} = -0.5$.\n- At $x = 2.5$, $f'(2.5) = 0$, so it's a stationary point (turning point).\n\n**Takeaway:** Stationary points occur where $f'(x) = 0$; solve the derivative equal to zero.", "source": "MiniMax ①", "_id": "minimax_1_69", "judge_pick": false}], "count": 70}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "When differentiating a term like $-24/\\sqrt{x}$ in non-calculator conditions, what's the first thing you should write down to avoid sign errors? (Q1)", "answer": "- Step 1: Rewrite the surd as a power: $$-24/\\sqrt{x} = -24x^{-1/2}$$\n- Step 2: Apply the power rule: differentiate to get $$-24 \\cdot \\left(-\\frac{1}{2}\\right)x^{-3/2} = +12x^{-3/2}$$\n+ The critical insight: when you subtract 1 from a negative exponent ($x^{-1/2} \\to x^{-3/2}$), the power becomes **more negative** — this is where students commonly flip the sign\n- Step 3: Convert back to surd form: $$12x^{-3/2} = \\frac{12}{\\sqrt{x^3}}$$\n\n**Takeaway:** Write the power form first before differentiating. The sign flip happens at the coefficient, not the power.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "What does Harry mean by \"the first line is the most important\" in differentiation questions, and how does this apply to Q1? (Q1)", "answer": "- Step 1: The first line of working sets the foundation for everything that follows — if there's an error there, it cascades through all subsequent lines\n- Step 2: In Q1, the differentiation of $-24/\\sqrt{x}$ feeds into the gradient calculation at $x=4$ and then into the tangent equation — one sign error propagates through (a) and (b)\n- Step 3: The fix: be speedy in general, but slow and careful on the first couple of lines — double-check that opening differentiation before moving on\n\n**Takeaway:** A slip in the first line has a snowball effect. Protect it with a 2-second pause.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "For the conditional probability problem (ESAT 1), what's the trigger phrase that forces you to divide by the row total rather than the grand total? (ESAT 1)", "answer": "- Step 1: The trigger phrase is \"a boy picked at random... that **he** chose swimming\" — the pronoun \"he\" restricts the sample space to boys only\n- Step 2: This means you're conditionng on \"boy,\" so you must divide by the boys' total (74), not the overall total (120)\n- Step 3: The conditional probability formula $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ translates to: number of boys who chose swimming ÷ total number of boys\n\n**Takeaway:** When you see \"a [group] picked at random... that [they/he/she] did X,\" immediately use the row total as your denominator.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "In the ESAT two-way table problem, why does Harry recommend building a grid rather than setting up simultaneous equations? (ESAT 1)", "answer": "- Step 1: With three unknowns (boys doing each activity), the simultaneous equations get \"a little hairy\" to solve\n- Step 2: A 2×3 grid (boys/girls × swim/archery/tennis) lets each piece of information drop straight into a specific cell\n- Step 3: The grid enforces organization: you tick each piece of information as you use it, preventing double-counting or forgetting numbers\n\n**Takeaway:** For multi-information problems, table > equations. Each datum becomes a cell, not an equation.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "What does Harry mean by \"tick as you use it\" when building a two-way table, and why is this critical for ESAT? (ESAT 1)", "answer": "- Step 1: As you place each given number into the table, put a small tick next to that fact in your working\n- Step 2: This creates a visual checklist: every given number gets used exactly once, and you can see at a glance if you've missed something\n- Step 3: In ESAT, with ~90 seconds per question, you cannot afford to double-count $46-25$ or forget that $\\frac{2}{3}$ of tennis students are boys\n\n**Takeaway:** The tick is your insurance against the careless subtraction that cost marks in both ESAT and P1.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "For the cylinder surface area problem (ESAT 2), what's the geometric intuition for the curved surface area formula $2\\pi rh$? (ESAT 2)", "answer": "- Step 1: Imagine a toilet roll or wrapping-paper tube — it's a cylinder with a curved side\n- Step 2: Cut the curved side and unfurl it flat — it becomes a **rectangle**\n- Step 3: One side of that rectangle is the height $h$ of the cylinder; the other side is the distance around the circle, i.e. the circumference $2\\pi r$\n- Step 4: Area of rectangle = length × width = $h \\times 2\\pi r = 2\\pi rh$\n\n**Takeaway:** \"Unfurl the tube\" — that's the mental picture that makes $2\\pi rh$ instant, not something you derive each time.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "In the cylinder problem (ESAT 2), why must you memorize the volume and surface area formulas rather than re-deriving them? (ESAT 2)", "answer": "- Step 1: ESAT is non-calculator with ~90 seconds per question — you cannot afford to draw a diagram and unfurl rectangles every time\n- Step 2: Once you know $V = \\pi r^2 h$ and $S = 2\\pi r^2 + 2\\pi rh$ instantly, the problem becomes a single line of algebra: set $S = V$, divide by $\\pi$, factor, solve\n- Step 3: The result $h = \\frac{2r}{r-2}$ follows in seconds — but only if the formulas are cold\n\n**Takeaway:** For ESAT, key formulae must be automatic. Re-deriving eats into the ~90-second budget.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "When solving $2x^3 + 3x^2 - 35x = 0$ in Q5(a), what's the critical step students routinely forget that costs them the final mark? (Q5)", "answer": "- Step 1: Factor out the common $x$: $$x(2x^2 + 3x - 35) = 0$$\n- Step 2: Students solve the quadratic bracket and get $x = \\frac{7}{2}$ and $x = -5$, but they **forget** that $x = 0$ is also a solution from the factored-out term\n- Step 3: The moment you see a bare variable outside parentheses, write down \"$x = 0$ is a root\" **immediately**, before touching the quadratic\n\n**Takeaway:** Factored out $x$ → $x = 0$ is a root. Write it first, not as an afterthought.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "In Q5(a), why does Harry say factorization is \"more efficient\" than using the quadratic formula, and when does the formula become necessary? (Q5)", "answer": "- Step 1: The quadratic $2x^2 + 3x - 35$ factorises neatly as $(2x - 7)(x + 5)$ — this takes seconds\n- Step 2: The quadratic formula requires calculating $(-3)^2 - 4(2)(-35) = 9 + 280 = 289$, then $\\sqrt{289} = 17$, then $(-3 \\pm 17)/4$ — more steps, more room for arithmetic error\n- Step 3: Use the formula when the quadratic doesn't factor neatly (non-integer roots, large coefficients)\n\n**Takeaway:** Check if it factorises first — it's faster and safer. The formula is the fallback.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "In Q3(b), what's the specific calculator-derived answer trap that costs marks, and how do you avoid it? (Q3)", "answer": "- Step 1: Students solve $11x^2 - 4x - 36 = 0$ on their calculator and get roots $x = 2$ and $x = -\\frac{18}{11}$\n- Step 2: They write brackets as $(x - 2)(x + \\frac{18}{11})$, but when expanded this gives $x^2 + (\\frac{18}{11} - 2)x - \\frac{36}{11}$, not $11x^2 - 4x - 36$\n- Step 3: The fix: multiply through to clear fractions first, then build brackets that expand back exactly — write $(x - 2)(11x + 18)$ so expansion gives $11x^2 + 18x - 22x - 36 = 11x^2 - 4x - 36$\n\n**Takeaway:** Calculator roots → build brackets so they multiply back to the original coefficients, not to 1.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "In Q3(b)-(c), what specific inequality sign error costs the final mark, and why does it matter? (Q3)", "answer": "- Step 1: The problem states \"area < 72\", so you must have strict inequalities throughout: $11x^2 - 4x - 36 < 0$\n- Step 2: This gives $(x - 2)(11x + 18) < 0$, and since it's \"< 0\", the solution is **between** the roots: $-\\frac{18}{11} < x < 2$\n- Step 3: When intersecting with $x > 1.5$ from part (a), you must keep the strict \">\" — the final answer is $1.5 < x < 2$, not $[1.5, 2)$ or $x \\geq 1.5$\n\n**Takeaway:** The strictness of the inequality in the question drives every sign in your answer. Copy inequality signs with extreme care.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "In Q4 integration, what's Harry's strategic advice about stopping at a correct answer? (Q4)", "answer": "- Step 1: Your answer $\\frac{4}{5}x^{5/2} + x^{1/2} + C$ was correct and scored full marks\n- Step 2: Harry's advice: don't waste time rewriting it another way (e.g., as $\\frac{4}{5}x^2\\sqrt{x} + \\sqrt{x} + C$) because you might introduce a new error or confuse a fast-marking examiner\n- Step 3: Stop at a correct simplest form — mark scheme markers move fast; make their life easy\n\n**Takeaway:** Once you have a correct answer in simplest form, stop. Gilding risks new errors.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "For Q7(b), what's the specific trigger phrase that tells you to reject the calculator's acute angle and find the obtuse one instead? (Q7)", "answer": "- Step 1: The phrase \"angle $ADO$ is **obtuse**\" is underlined — this is the trigger\n- Step 2: The sine rule gives $\\sin(ADO) = \\frac{6\\sin(0.7)}{5}$, and the calculator's $\\sin^{-1}$ function only returns the acute angle (0.884 radians)\n- Step 3: Since $\\sin(\\theta) = \\sin(\\pi - \\theta)$, the obtuse solution is $\\pi - 0.884 = 2.258$ radians — you must explicitly reject the acute branch\n\n**Takeaway:** Underline \"obtuse,\" \"acute,\" or any branch specification. The calculator gives only one branch; you must choose the right one.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "In Q7(c), why does Harry say \"evaluate even if unsure\" and what marks can you still bank even if your number is wrong? (Q7)", "answer": "- Step 1: You had the correct method: $OD = \\frac{6\\sin(0.184)}{\\sin(2.258)}$ and $CD = 6 - OD$, but you didn't evaluate\n- Step 2: Harry: \"even if it's ridiculous, even if you know you've made a mistake, just keep going with the numbers, put a little star next to it, and if you've got time come back to it\"\n- Step 3: A blank space scores **zero**. Writing the substituted expression and producing a number — even if slightly wrong — can score the **method (M) marks** and the **dependent method (dM) marks** that depend on that value\n\n**Takeaway:** Never leave a part blank. A wrong number with method scores marks; a blank scores nothing.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "In Q8(a), what three specific form requirements must be satisfied for the normal equation, and what's the common slip? (Q8)", "answer": "- Step 1: The question asks for the form $ax + by + c = 0$ with **integer** coefficients\n- Step 2: Your gradient work was correct: $f'(4) = \\frac{35}{6}$, normal gradient $= -\\frac{6}{35}$, giving $y - 1 = -\\frac{6}{35}(x - 4)$\n- Step 3: The common slip: stopping at $-\\frac{6}{35}x + \\frac{59}{35} = 0$ (fractions) or writing $6x + 35y - 59 = 0$ (correct) — you must **clear the fractions** to get integers, then verify $a, b, c \\in \\mathbb{Z}$\n\n**Takeaway:** When you see \"form,\" \"integer,\" or any presentation requirement in the stem, underline it and tick it off at the end.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "In Q9(a), why does giving only the value $-4$ score only 1 of 2 marks, and what's the precise requirement? (Q9)", "answer": "- Step 1: The question says \"state the **coordinates**\" — this explicitly requests a point $(x, y)$, not just a number\n- Step 2: You gave the minimum **value** ($-4$), which scored 1 mark (B1)\n- Step 3: The full answer is $(270^\\circ, -4)$ — both the angle and the value together constitute the coordinates\n\n**Takeaway:** \"Coordinates\" means $(x, y)$, not just $y$. Underline this requirement and answer with a point.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "In Q10(c), what does \"the tangent has the form $y = k$\" actually mean geometrically, and what's the common misinterpretation? (Q10)", "answer": "- Step 1: $y = k$ is a **horizontal** line (constant $y$-value), not a vertical line\n- Step 2: You had the right answer ($y = -54$), but initially drew a vertical line — Harry clarified: \"that's got an **infinite** gradient; a **zero** gradient is a **horizontal** line\"\n- Step 3: When $f'(x) = 0$ at a turning point, the tangent is always horizontal — you can just state $y = $ (the $y$-value) without using $y - y_1 = m(x - x_1)$\n\n**Takeaway:** Zero gradient → horizontal line ($y = k$). Infinite gradient → vertical line ($x = k$). Don't confuse them.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "In Q10(d), why does Harry recommend using a sketch rather than algebra for graph transformation questions? (Q10)", "answer": "- Step 1: The question: \"$y = f(x + a)$ passes through $O$; find possible values of $a$\"\n- Step 2: Algebraically: $f(a) = 0$ since $(0, 0)$ lies on the curve → solve $(a - 4)(2a + 1)^2 = 0$ → $a = 4$ or $a = -\\frac{1}{2}$\n- Step 3: Graphically: $y = f(x + a)$ is a horizontal translation left by $a$. For the curve to pass through $O$, the origin must land on an $x$-intercept — look at the sketch, read the intercepts $-\\frac{1}{2}$ and $4$ directly\n- Step 4: Harry: \"for graph-transformation questions it's often better to answer with a **sketch** than with lots of algebra\"\n\n**Takeaway:** Translation questions → sketch first. \"Passes through origin\" means $x = 0$ lands on a root — read the roots visually.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "What is the \"careless mental subtraction\" pattern that Harry identifies as your #1 leak, and how does it manifest in both ESAT and P1? (Theme 1)", "answer": "- Step 1: In ESAT 1, you computed $46 - 25$ as $21$ (correct), then $21 - 12$ as $18$ (should be $9$) — a single-digit subtraction error in the table\n- Step 2: In Q7(c), you computed $OD \\approx 0.96$ instead of $\\approx 1.42$, which cascaded into the wrong $CD = 6 - 0.96 = 5.04$ (should be $4.58$) and a wrong perimeter\n- Step 3: Harry's fix: re-key every subtraction on your calculator, and do a \"size check\" — $6 - 1.42$ should be \"just under 5,\" not \"about 5\"\n\n**Takeaway:** This same slip costs marks in both exams. The fix is a 2-second re-key and size-check on every subtraction.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "What is the \"underline and tick off\" habit that Harry calls the single most valuable change, and how do you implement it? (Theme 2)", "answer": "- Step 1: Before writing anything, read the stem and **underline every instruction word**: \"obtuse,\" \"coordinates,\" \"integer,\" \"1 d.p.,\" \"form $ax + by + c = 0$\"\n- Step 2: When you finish the question, go back and put a **physical tick** over each underline as you verify you've satisfied it\n- Step 3: Harry: \"that could be the difference of a grade in every paper\" — this is your own action item from the lesson\n\n**Takeaway:** Underline in the stem, tick at the end. This single habit would have recovered your ~6 lost marks.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "In the surd rationalization problem (Q2), what specific form is required, and what's the common presentation error? (Q2)", "answer": "- Step 1: The answer must be in the form $a + b\\sqrt{2}$, where $a$ and $b$ are rational — typically you write the rational part first, then the surd part\n- Step 2: Your answer $\\frac{1}{2} + \\frac{1}{4}\\sqrt{2}$ is correct — but the common error is writing $\\frac{1}{4}\\sqrt{2} + \\frac{1}{2}$ (surd before rational) or failing to simplify $\\frac{4 + 2\\sqrt{2}}{8}$ to $\\frac{1}{2} + \\frac{1}{4}\\sqrt{2}$\n- Step 3: Harry confirmed: \"when they say 'rational numbers,' whole numbers are rational numbers — that is correct\"\n\n**Takeaway:** Write answers as \"rational + rational × surd\" unless the question specifies otherwise. Rational first, surd second.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "For Q6 (tangent by discriminant), what's the key insight that makes this a 7-mark \"gifted\" question? (Q6)", "answer": "- Step 1: Set $4x + c = x^2 - 3x$ → $x^2 - 7x - c = 0$\n- Step 2: For exactly one intersection (tangent), the discriminant must equal zero: $(-7)^2 - 4(1)(-c) = 0$ → $49 + 4c = 0$ → $c = -\\frac{49}{4}$\n- Step 3: This is a pure algebra method — no calculus needed. Once you have $c$, the point is $x = \\frac{7}{2}$ (from the repeated root), then $y = 4(\\frac{7}{2}) - \\frac{49}{4} = \\frac{7}{4}$\n\n**Takeaway:** \"Exactly one point\" → discriminant = 0. This is a pattern recognition question, not a difficult one.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "In the trig graphs question Q9(c), what's the counting method for finding the number of solutions, and how does it connect to your June 12 lesson? (Q9)", "answer": "- Step 1: $\\tan\\theta$ has period $180^\\circ$, and $1 + \\sin\\theta$ has period $360^\\circ$\n- Step 2: Over one $360^\\circ$ period, the curves $y = \\tan\\theta$ and $y = 1 + \\sin\\theta$ cross a fixed number of times — count those intersections once\n- Step 3: For $0 \\leq \\theta \\leq 2160^\\circ$: that's $2160/360 = 6$ complete periods → multiply the crossings per period by 6\n- Step 4: For $1980^\\circ$: that's $5\\frac{1}{2}$ periods — count the full periods, then handle the half-period separately, minding the endpoints\n\n**Takeaway:** This is the same skill as the June 12 tan vs. $(\\frac{1}{x} + 1)$ lesson — count one period, then scale.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "What are the three specific calculator limitations that students must account for in exam questions? (Q7, General)", "answer": "- Step 1: $\\sin^{-1}, \\cos^{-1}$ are restricted to $[-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$ (or $[-1, 1]$ for arccos) — they only return the acute or principal value, never the obtuse or reflex alternative\n- Step 2: The calculator gives no indication that other branches exist — you must recognize the branch requirement (\"obtuse\") in the stem\n- Step 3: When taking square roots of both sides, the calculator returns only the positive root — you must consider whether the negative root is also valid (e.g., in $u^2 = \\frac{7}{2}$)\n\n**Takeaway:** The calculator is a tool, not a mind-reader. It gives one branch; you choose the branch the question asks for.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": true}, {"question": "When factoring out a variable (like $x$ in $2x^3 + 3x^2 - 35x = 0$), why must you write the $x = 0$ root immediately, before solving the quadratic? (Q5)", "answer": "- Step 1: The moment you factor $x$ out, you create a product equal to zero: $x \\cdot (\\text{quadratic}) = 0$\n- Step 2: By the zero-product property, either $x = 0$ **or** the quadratic equals zero — these are two separate, independent solutions\n- Step 3: If you solve the quadratic first and forget to list $x = 0$, you've lost a solution. Write it immediately after factoring: \"$x = 0$ or...\"\n\n**Takeaway:** Factored-out factor = root. Write it first — not as an afterthought you might forget.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": true}, {"question": "In the mental subtraction drill, what's the \"size check\" technique that would have caught the Q7(c) error of writing 0.96 instead of 1.42? (Drill A)", "answer": "- Step 1: Before you write down any subtraction result, ask: \"Does this have roughly the right size?\"\n- Step 2: $6 - 1.42$ should feel \"just under 5\" — writing 0.96 (for $OD$) feels wrong because $6 - 0.96 = 5.04$, but if $OD \\approx 1$, then $6 - 1 = 5$ is reasonable\n- Step 3: The specific error: $OD = \\frac{6\\sin(0.184)}{\\sin(2.258)} \\approx 1.42$ — you computed it as ~0.96, which is physically implausible given the geometry (the triangle side $OD$ should be substantial, not less than 1)\n- Step 4: After every subtraction, do a 2-second magnitude sanity check: \"Is this about the right size?\"\n\n**Takeaway:** The size check is a 2-second reflex that catches ~50% of arithmetic errors before you write them down.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "What does Harry mean by \"volume, reflectively done\" as his closing advice, and what specific target did he set? (General)", "answer": "- Step 1: \"Volume\" means doing lots of past papers — Harry's specific target: \"~3 past papers per weekend\"\n- Step 2: \"Reflectively\" means reviewing each paper with the same depth as this lesson: identifying the exact slip, understanding why it happened, and adding the corresponding habit to your checklist\n- Step 3: The goal is pattern recognition: the more papers you do, the faster you'll see \"exactly one intersection → discriminant = 0\" or \"obtuse angle → reject acute branch\"\n\n**Takeaway:** 3 papers per weekend + thorough reflection = the experience that makes you reach for the right method instantly.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "In Q1 differentiation, why does subtracting 1 from a negative power like $x^{-1/2}$ give $x^{-3/2}$ rather than $x^{+1/2}$? (Q1)", "answer": "- Step 1: The power rule: $\\frac{d}{dx}x^n = n x^{n-1}$\n- Step 2: Starting with $x^{-1/2}$: the new power is $-1/2 - 1 = -1/2 - 2/2 = -3/2$ — you're subtracting 1, which is $2/2$ when expressed with a common denominator\n- Step 3: The common error: thinking \"minus a minus gives plus\" — but you're subtracting 1 from the exponent, not adding\n- Step 4: The coefficient does get a sign flip: $-24 \\times (-1/2) = +12$, but the power gets more negative\n\n**Takeaway:** $-1/2 - 1 = -3/2$. The power goes down (more negative), the coefficient flips sign.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "In Q3, when solving quadratic inequalities like $(x-2)(11x+18) < 0$, how do you determine the solution interval, and what's the key principle? (Q3)", "answer": "- Step 1: Find the roots: $x = 2$ and $x = -\\frac{18}{11} \\approx -1.64$\n- Step 2: Since the leading coefficient of the quadratic (11) is positive, the parabola opens upward — it's negative between the roots\n- Step 3: The key principle: for $< 0$, the solution is **between** the roots; for $> 0$, it's **outside** the roots\n- Step 4: Visualize: a upward-opening parabola is below the x-axis between its two real roots\n\n**Takeaway:** \"<\" → between roots. \">\" → outside roots. Sketch the parabola to verify.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "For Q5(b), what's Harry's routine for handling the substitution $u = (y-5)^2$ and why must you reject the negative $u$ value? (Q5)", "answer": "- Step 1: Let $u = (y-5)^2$, which is always $u \\geq 0$ (a square is non-negative)\n- Step 2: The equation becomes $2u^3 + 3u^2 - 35u = 0$, which gives $u = 0, \\frac{7}{2}, -5$ from part (a)\n- Step 3: Reject $u = -5$ because $u \\geq 0$ — a square cannot be negative\n- Step 4: Then solve $(y-5)^2 = 0$ → $y = 5$, and $(y-5)^2 = \\frac{7}{2}$ → $y = 5 \\pm \\sqrt{\\frac{7}{2}} = 5 \\pm \\frac{\\sqrt{14}}{2}$\n\n**Takeaway:** When you substitute a squared expression, remember the constraint: $u \\geq 0$. Reject any mathematically impossible roots.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "In the READ-THE-QUESTION checklist, what are the 9 specific boxes you must tick before stopping on every question? (Drill B)", "answer": "- Units? (cm, cm², rad, degrees)\n- Accuracy? (1 d.p., 3 d.p., 3 s.f.)\n- Exact form? (p + q√2, a + b√2)\n- Coordinates
