rdinate alone (the actual minimum/maximum height).\n- Step 2: \"Coordinates\" = the $$(x, y)$$ pair — i.e., WHERE on the curve the minimum/maximum occurs.\n- Step 3: They reward different skills: \"value\" tests that you know the range of the function; \"coordinates\" tests that you also know WHERE the extreme occurs (which requires solving $$f'(x) = 0$$ or knowing the period structure).\n\nFor a question worth 2 marks, \"coordinates\" almost certainly wants BOTH numbers — 1 mark each.", "source": "Opus 4.7 ①", "_id": "opus_1_55"}, {"question": "What is the conjugate of $$4 - 2\\sqrt{2}$$ — and why does multiplying by the conjugate eliminate the surd from the denominator? (Q2a)", "answer": "- Step 1: The conjugate of $$4 - 2\\sqrt{2}$$ is $$4 + 2\\sqrt{2}$$ — flip the sign of the surd term.\n- Step 2: Multiplying: $$(4 - 2\\sqrt{2})(4 + 2\\sqrt{2}) = 4^2 - (2\\sqrt{2})^2 = 16 - 4 \\cdot 2 = 16 - 8 = 8$$. The surd disappears because of the difference-of-two-squares identity $$(a-b)(a+b) = a^2 - b^2$$, where $$a = 4$$ and $$b = 2\\sqrt{2}$$.\n- Step 3: This works for any expression of the form $$p + q\\sqrt{n}$$: the conjugate $$p - q\\sqrt{n}$$ makes the cross-terms cancel and leaves only $$p^2 - q^2 n$$, which is rational. This is why rationalising the denominator always uses the conjugate.", "source": "GLM 5.1 ②", "_id": "glm_2_63"}, {"question": "A sector problem gives you a small angle $$\\alpha$$ at the centre and asks for the sector area. But the sector is the **reflex** (large) part of the circle. How do you find the correct angle? (Q7a)", "answer": "- Step 1: The reflex angle is **$$2\\pi - \\alpha$$** (the full circle minus the small angle). Use this as $$\\theta$$ in the sector-area formula.\n- Step 2: In Q7, the given angle is $$\\angle AOD = 0.7$$ rad, but the sector $$ABCOA$$ is the large part. So $$\\theta = 2\\pi - 0.7$$. Area $$= \\frac{1}{2}r^2\\theta = \\frac{1}{2}(36)(2\\pi - 0.7) \\approx 100.5 \\text{ cm}^2$$.\n- Step 3: The pitfall is using the given angle directly (which gives the *minor* sector, not the reflex one). Always check: is the shaded/described region the small wedge or the large remainder? If it's the remainder, subtract from $$2\\pi$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "What is the right relationship between past-paper practice and revision, per Harry? Why is \"do the paper first\" more efficient than \"revise first, then do the paper\"?", "answer": "- Step 1: Doing the paper **first** reveals your actual weaknesses — the specific topics where you slip in exam conditions. Generic revision before the paper assumes you know what to focus on.\n- Step 2: After the paper, your revision becomes **targeted**: re-derive the things you actually got wrong, not the things you already know.\n- Step 3: Harry's volume rule: ~3 past papers per weekend, each followed by *reflective* revision. Volume builds pattern recognition; reflection turns each mistake into a habit fix.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "\"Method requires the numerical values substituted.\" What does this mean for the Pearson mark scheme, and how does it shape your exam-room behaviour? (3 steps)", "answer": "- Step 1: M-marks (\"method marks\") are typically awarded only when you **substitute actual numbers** into a correct formula — not just for writing the formula symbolically.\n- Step 2: So \"perimeter $$= $$ arc $$+ CD + DA$$\" gets you almost nothing; \"perimeter $$= 33.5 + (6 - OD) + 5$$\" with a numerical $$OD$$ scores the M-mark.\n- Step 3: Behaviour: every formula you write down, **immediately substitute the numbers** below it. Symbolic-only working is a partial-credit trap.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "P1 Q5(b): you had $$2(y-5)^6 + 3(y-5)^4 - 35(y-5)^2 = 0$$. What is the structural recognition that makes this a \"hidden quadratic/cubic\", and what is the substitution?", "answer": "- Step 1: All exponents on $$(y-5)$$ are **even**: $$6, 4, 2$$. Substitute $$u = (y-5)^2$$ so $$(y-5)^4 = u^2$$ and $$(y-5)^6 = u^3$$.\n- Step 2: The equation becomes $$2u^3 + 3u^2 - 35u = 0$$ — **exactly the same cubic as part (a)**. So you've already done the hard work.\n- Step 3: Crucially, $$u = (y-5)^2 \\ge 0$$, so you **reject negative roots** of the $$u$$-cubic. Then back-substitute on the valid $$u$$ values to find $$y$$. Trigger: \"even powers everywhere\" ⇒ substitute the square.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "General A-Level technique — When a question says \"Find $$f(x)$$\" given $$f'(x)$$ and a point on the curve, what are the two distinct stages, and which is often forgotten? (2 steps)", "answer": "- Step 1: Integrate $$f'(x)$$ term by term, including the constant of integration $$+C$$. This is the indefinite integration stage.\n- Step 2: Substitute the known point (e.g., $$P(4,1)$$) into $$f(x)$$ to solve for $$C$$. Forgetting to find $$C$$ is a common source of lost marks.", "source": "Kimi K2.6 ①", "_id": "kimi_1_39"}, {"question": "In Q3(a), what is the systematic way to form a perimeter expression from a composite rectilinear diagram without missing a side? (2 steps)", "answer": "- Step 1: Trace the outer boundary clockwise and write down every exposed edge length, including those expressed in terms of $$x$$.\n- Step 2: Check that opposite sides of implied rectangles match; if a side length is given indirectly (e.g., $$2x-1$$), ensure it is included exactly once in the outer perimeter.", "source": "Kimi K2.6 ②", "_id": "kimi_2_40"}, {"question": "When the question says \"show that the tangent has the form $$y = k$$\" at a turning point, what two things must you demonstrate? (Q10c) (2 steps)", "answer": "- Step 1: **Show the gradient is zero** at the given x-value: evaluate $$f'(\\frac{5}{2}) = 0$$. This confirms it's a turning point, so the tangent is horizontal.\n- Step 2: **Find $$k$$** by evaluating the function: $$k = f(\\frac{5}{2}) = (\\frac{5}{2} - 4)(2 \\cdot \\frac{5}{2} + 1)^2 = (-\\frac{3}{2})(6)^2 = -54$$. So the tangent is $$y = -54$$. You don't need the point-gradient form — a horizontal tangent at a turning point is simply \"y equals the y-coordinate.\"", "source": "GLM 5.1 ①", "_id": "glm_1_57"}, {"question": "Why does Q5(b)'s rejection of $$u = -5$$ matter, and what is the general principle for substitutions like $$u = (\\text{something})^2$$?", "answer": "- Step 1: $$u = (y-5)^2$$ means $$u$$ is a square, so $$u \\ge 0$$ for all real $$y$$.\n- Step 2: When you solve the polynomial in $$u$$, any negative root has **no real preimage** — it cannot correspond to a real $$y$$.\n- Step 3: General principle: after a substitution, **state the range/sign of the new variable** and reject roots outside that range *before* back-substituting. Forgetting to reject means you'll write down spurious \"solutions\" for $$y$$ that aren't real.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "In Q9(a), the minimum of $y = 4\\sin\\theta$ occurs at $\\theta = 270°$. What's the general rule for finding the minimum of $a\\sin\\theta$? (Q9a minimum rule)", "answer": "- For $y = a\\sin\\theta$:\n  - The amplitude is $|a|$\n  - Maximum value: $+|a|$ (occurs when $\\sin\\theta = 1$)\n  - Minimum value: $-|a|$ (occurs when $\\sin\\theta = -1$)\n- For $y = 4\\sin\\theta$:\n  - Maximum: $+4$ at $\\theta = 90°$\n  - Minimum: $-4$ at $\\theta = 270°$ (and at $270° + 360°k$)\n- For $y = a\\cos\\theta$:\n  - Maximum: $+|a|$ at $\\theta = 0°$\n  - Minimum: $-|a|$ at $\\theta = 180°$\n\n**Takeaway:** Minimum of $a\\sin\\theta$ is $-|a|$; occurs when $\\sin\\theta = -1$.", "source": "MiniMax ①", "_id": "minimax_1_64"}, {"question": "When solving a quadratic inequality, why is it critical to copy the inequality sign exactly as given (strict $$<$$ vs non-strict $$\\leq$$) — and what happened when this was violated? (Q3b-c)", "answer": "- Step 1: The inequality sign determines whether the endpoints are **included** ($$\\leq$$) or **excluded** ($$<$$) from the solution set. Changing a strict $$<$$ to $$\\leq$$ (or vice versa) changes the answer and loses the accuracy mark.\n- Step 2: In Q3b, the area was strictly less than 72, so the inequality was $$11x^2 - 4x - 36 < 0$$ (strict). The solution is $$-\\frac{18}{11} < x < 2$$ — open interval, endpoints excluded. Copying the sign carelessly as $$\\leq$$ would give $$-\\frac{18}{11} \\leq x \\leq 2$$, which is a different answer.\n- Step 3: Harry: *\"The thing that was more serious — copy these inequality signs really carefully. It was strictly less than, so the inequalities must match.\"* The final combined range in Q3c ($$1.5 < x < 2$$) must also use strict signs because it inherits from the strict inequality in (b).\n\nTreat the inequality sign with the same reverence as a negative sign — one stroke changes the meaning entirely.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "What's the sector-area formula in radians — and why must the angle be in radians (not degrees)? (Q7a) (2 steps)", "answer": "- Step 1: Sector area = $$\\frac{1}{2}r^2\\theta$$, where $$\\theta$$ is in **radians**. For Q7(a): $$\\frac{1}{2}(6)^2(2\\pi - 0.7) = 100.5$$ cm².\n- Step 2: The formula $$\\frac{1}{2}r^2\\theta$$ is *derived* using radians (it comes from the fraction-of-circle argument: sector is $$\\frac{\\theta}{2\\pi}$$ of the full circle area $$\\pi r^2$$, giving $$\\frac{\\theta}{2\\pi} \\cdot \\pi r^2 = \\frac{1}{2}r^2\\theta$$). If $$\\theta$$ is in degrees, this derivation breaks — you'd need $$\\frac{\\theta}{360} \\cdot \\pi r^2$$ instead. Since the question gives 0.7 rad, use the radian formula directly.", "source": "GLM 5.1 ①", "_id": "glm_1_44"}, {"question": "When integrating to find $$f(x)$$ from $$f'(x)$$ and you're given a point on the curve, what is the purpose of that point — and when in the process do you use it? (Q8b)", "answer": "- Step 1: The point gives you the **constant of integration $$C$$**. Integration produces a family of curves differing by a constant; the point pins down which specific curve.\n- Step 2: The process: (1) integrate $$f'(x)$$ to get $$f(x) = \\ldots + C$$, (2) substitute the given point into $$f(x)$$, (3) solve for $$C$$. Do NOT try to use the point before integrating — it belongs in step 2, not step 1.\n- Step 3: In Q8b, after integrating: $$f(x) = \\frac{8}{3}x^{3/2} - 2x + \\frac{8}{3x} + C$$. Using $$P(4,1)$$: $$1 = \\frac{64}{3} - 8 + \\frac{2}{3} + C = 14 + C$$, so $$C = -13$$.\n\nThe point is not used in the differentiation/integration itself — it resolves the constant at the end.", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "A rectangle has width $$w$$ and length $$w+3$$. If the area must be strictly less than $$10$$, what is the final interval if you also know $$w > 1$$? (2 steps)", "answer": "- Step 1: Form $$w(w+3) < 10 \\Rightarrow w^2 + 3w - 10 < 0$$, which factorises to $$(w+5)(w-2) < 0$$, giving $$-5 < w < 2$$.\n- Step 2: Intersect with $$w > 1$$ from the constraint; because both are strict, the overlap is $$1 < w < 2$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_53"}, {"question": "In Q2(a), you rationalised $\\frac{1}{4-2\\sqrt{2}}$ and got $\\frac{1}{2} + \\frac{1}{4}\\sqrt{2}$. How do you verify this is correct? (Q2a verification)", "answer": "- Step 1: Your rationalised answer: $$\\frac{1}{2} + \\frac{1}{4}\\sqrt{2}$$\n- Step 2: Multiply by the original denominator to check: $$(4 - 2\\sqrt{2})\\left(\\frac{1}{2} + \\frac{1}{4}\\sqrt{2}\\right)$$\n- Step 3: Expand: $$4 \\cdot \\frac{1}{2} + 4 \\cdot \\frac{1}{4}\\sqrt{2} - 2\\sqrt{2} \\cdot \\frac{1}{2} - 2\\sqrt{2} \\cdot \\frac{1}{4}\\sqrt{2}$$\n- Step 4: $$= 2 + \\sqrt{2} - \\sqrt{2} - \\frac{2 \\times 2}{4} = 2 + \\sqrt{2} - \\sqrt{2} - 1 = 1$$\n- Step 5: The product is 1, so the rationalised form is correct.\n\n**Takeaway:** Multiply your answer by the original denominator; you should get 1.", "source": "MiniMax ①", "_id": "minimax_1_39"}, {"question": "Simple exercise: $$\\sin\\theta = 0.5$$ and $$\\theta$$ is obtuse. What is $$\\theta$$ in degrees?", "answer": "Calculator gives $$\\sin^{-1}(0.5) = 30°$$ (acute). The obtuse solution is $$180° - 30° = 150°$$. Rule: if $$\\sin\\theta = k$$ and $$\\theta$$ is obtuse, then $$\\theta = 180° - \\sin^{-1}(k)$$ (in degrees) or $$\\theta = \\pi - \\sin^{-1}(k)$$ (in radians).", "source": "GLM 5.1 ③", "_id": "glm_3_75"}, {"question": "A cubic has a repeated root, e.g., $$f(x) = (x-4)(2x+1)^2$$. At the repeated root, does the curve **cross** or **touch** the $$x$$-axis — and how do you know which is which? (Q10a)", "answer": "- Step 1: A **repeated root** (even multiplicity) means the curve **touches** the axis and turns around — it does not cross. A **simple root** (odd multiplicity) means the curve **crosses** the axis.\n- Step 2: In Q10, $$(2x+1)^2 = 0$$ gives a repeated root at $$x = -\\frac{1}{2}$$ — the curve **touches** the $$x$$-axis at $$P(-\\frac{1}{2}, 0)$$. The factor $$(x-4)$$ gives a simple root at $$x = 4$$ — the curve **crosses** at $$Q(4, 0)$$.\n- Step 3: The intuition: near a repeated root, the function doesn't change sign (since $$(2x+1)^2$$ is always non-negative), so the curve stays on the same side of the axis — it touches and bounces. Near a simple root, the function changes sign, so the curve crosses.", "source": "GLM 5.1 ②", "_id": "glm_2_30"}, {"question": "When a turning point has gradient zero, what form does the tangent at that point take — and what's the geometric reason? (Q10c) (2 steps)", "answer": "- Step 1: The tangent is a **horizontal line** of the form $$y = k$$, where $$k$$ is the y-coordinate of the turning point. You don't need $$y - y_1 = m(x - x_1)$$ — just evaluate $$f$$ at the turning point.\n- Step 2: Geometric reason: gradient = 0 means the curve is momentarily flat — neither rising nor falling. The tangent line at that instant is perfectly horizontal, like the top of a hill or the bottom of a valley. Harry caught you drawing a *vertical* line first — that would have *infinite* gradient, not zero.\n\nThe trigger: \"gradient is zero\" or \"turning point\" → tangent is $$y = \\text{constant}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_30"}, {"question": "What does \"obtuse\" mean in radians — and how do you verify your answer is genuinely obtuse? (Q7b)", "answer": "- Step 1: Obtuse means the angle is strictly between $$\\frac{\\pi}{2}$$ and $$\\pi$$ radians (i.e., between 90° and 180°).\n- Step 2: In Q7b, the answer is $$2.258$$ rad. Check: $$\\frac{\\pi}{2} \\approx 1.571$$ and $$\\pi \\approx 3.142$$. Since $$1.571 < 2.258 < 3.142$$, the angle is indeed obtuse. ✓\n- Step 3: The acute value $$0.884$$ rad is less than $$\\frac{\\pi}{2}$$, so it fails the obtuse check. Harry walked through this on the board: *\"Is this obtuse? It's not between $$\\pi/2$$ and $$\\pi$$, so it's wrong.\"*\n\nAlways run the bounds check: if the question says obtuse, your answer must satisfy $$\\frac{\\pi}{2} < \\theta < \\pi$$.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "In the sine rule $$\\frac{a}{\\sin A} = \\frac{b}{\\sin B}$$, when finding a **side** vs finding an **angle**, which arrangement of the formula should you use? (Q7b-c)", "answer": "- Step 1: To find a **side**, put sides on top: $$\\frac{a}{\\sin A} = \\frac{b}{\\sin B}$$, so $$a = \\frac{b \\sin A}{\\sin B}$$. To find an **angle**, put sines on top: $$\\frac{\\sin A}{a} = \\frac{\\sin B}{b}$$, so $$\\sin A = \\frac{a \\sin B}{b}$$.\n- Step 2: In Q7b (finding angle $$ADO$$): $$\\sin ADO = \\frac{6 \\sin 0.7}{5} \\approx 0.7731$$. In Q7c (finding side $$OD$$): $$OD = \\frac{6 \\sin 0.184}{\\sin 2.258} \\approx 1.42$$.\n- Step 3: The arrangement minimises the number of algebraic steps. If you're solving for a side, having sides on top means one multiplication and one division. If you're solving for an angle, having sines on top means you go directly to $$\\sin(\\text{angle})$$ and then take $$\\sin^{-1}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_39"}, {"question": "Why is factorising by inspection faster than the quadratic formula for $$2x^2 + 3x - 35$$ — and when should you NOT use inspection? (Q5a)", "answer": "- Step 1: Inspection requires only mental checking of a few candidate factor pairs, with minimal writing. The quadratic formula requires writing the formula, substituting four numbers, computing the discriminant, taking a square root, and simplifying — many more steps, each a potential slip.\n- Step 2: You should NOT use inspection when: the roots are irrational (e.g., $$x^2 - 3x - 1 = 0$$), the coefficients are large or ugly, or you've tried a few factor pairs and none work after ~30 seconds. In those cases, the formula is more reliable.\n- Step 3: The decision rule: **small integer coefficients → try inspection first.** If it doesn't yield quickly, switch to the formula without hesitation. Don't waste time brute-forcing inspection when the formula will give you the answer in 60 seconds.", "source": "GLM 5.1 ②", "_id": "glm_2_77"}, {"question": "Why does the sine graph have two solutions for $$\\sin\\theta = k$$ when $$0 < k < 1$$ — and which one does the calculator give you? (Q7b) (2 steps)", "answer": "- Step 1: The horizontal line $$y = k$$ (for $$0 < k < 1$$) cuts the sine wave **twice** per period: once on the rising part (acute angle, $$\\theta_1$$) and once on the falling part (obtuse angle, $$\\theta_2 = \\pi - \\theta_1$$). Both are valid solutions to $$\\sin\\theta = k$$.\n- Step 2: The calculator's $$\\sin^{-1}$$ gives you only the **acute** one ($$\\theta_1$$), because it's defined on the restricted domain. To get the obtuse one, you compute $$\\pi - \\theta_1$$. The question's branch selector (\"obtuse\") tells you which solution to keep.", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "What is the difference between a **strict** inequality ($$<$$) and a **non-strict** inequality ($$\\leq$$) in the context of solution sets — and what visual difference does this create? (Q3b)", "answer": "- Step 1: Strict ($$<$$): the endpoint is **excluded** from the solution. Non-strict ($$\\leq$$): the endpoint is **included**.\n- Step 2: On a number line, strict inequalities use **open circles** (○) at the endpoints; non-strict use **filled circles** (●). In interval notation: strict $$1.5 < x < 2$$ is $$(1.5, 2)$$; non-strict $$1.5 \\leq x \\leq 2$$ is $$[1.5, 2]$$.\n- Step 3: In Q3b, the area is strictly less than 72, so the inequality is $$11x^2 - 4x - 36 < 0$$, giving the open interval $$-\\frac{18}{11} < x < 2$$. Using $$\\leq$$ would incorrectly include the endpoints where the area equals exactly 72 — but the question says \"less than.\"", "source": "GLM 5.1 ②", "_id": "glm_2_49"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "When a probability problem gives you multiple category totals (e.g. boys/girls × activities), what organising structure should you reach for *instead* of naming variables and writing simultaneous equations — and why? (ESAT 1) (2 steps)", "answer": "- Step 1: Reach for a **two-way table** (rows = one category, columns = the other, plus a Total row and Total column). Each given number drops straight into a cell — no algebraic setup needed.\n- Step 2: The reason: with three unknowns, simultaneous equations get \"hairy\" — you must track which equation came from which fact. A grid makes every datum a cell; you fill and deduce one cell at a time, visually. The table *is* the organiser; equations are a detour.\n\nThe trigger: the problem names two classifications (gender, activity) and gives you marginal totals and some cell values. That pattern → table, not algebra.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "When filling a two-way table, what physical habit prevents you from double-counting or forgetting a given number? (ESAT 1)", "answer": "**Put a little tick (✓) next to each datum the moment you use it.** Harry's rule: as you read each sentence of the problem, place the number in its cell and tick the sentence. When every sentence is ticked, you've used every fact — no omissions, no double use. This is the same discipline as underlining question requirements: make your information usage *visible* and *auditable*.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "When filling a two-way table with partial information, what's the correct fill-order strategy — and what mistake does it prevent? (ESAT 1) (2 steps)", "answer": "- Step 1: **Deduce one cell at a time.** After placing all direct givens, scan for any row or column where only one cell is unknown — that cell equals (row/column total) minus (sum of known cells in that row/column).\n- Step 2: This prevents the mistake of trying to solve multiple unknowns simultaneously in your head, which is exactly where arithmetic slips happen. Harry: *\"Don't go for it. Do it one step at a time.\"* Each single deduction is a simple subtraction — easy to verify.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "What trigger phrase in a probability question tells you the sample space is *restricted* — and how does it change the denominator? (ESAT 1) (2 steps)", "answer": "- Step 1: The trigger is phrasing like **\"A boy is picked at random… find the probability that *he* chose swimming.\"** The pronoun \"he\" and the pre-selection of \"a boy\" tell you: we are already inside the boys row.\n- Step 2: The denominator becomes the **row total** (74 boys), not the grand total (120 students). So $$P(\\text{swimming}\\mid\\text{boy})=\\frac{32}{74}$$, not $$\\frac{32}{120}$$. Writing $$\\frac{32}{120}$$ means \"pick any student\" — but the question already told you the student is a boy.\n\nUnder ~90 seconds per ESAT question, you won't have time to reason this from scratch. Train the trigger: *\"a [category] picked at random… that [pronoun]…\"* → restricted sample space → row/column total as denominator.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "Why is writing $$\\frac{32}{120}$$ wrong when the question says \"a boy is picked at random, find the probability he chose swimming\" — even though 32 boys chose swimming out of 120 students total? (2 steps)", "answer": "- Step 1: $$\\frac{32}{120}$$ answers a *different* question: \"pick any student at random from all 120; what's the chance it's a boy who swims?\" That's $$P(\\text{boy} \\cap \\text{swim})$$.\n- Step 2: The actual question asks $$P(\\text{swim}\\mid\\text{boy})$$: *given* the student is a boy, what's the chance he swims? The \"given\" shrinks the universe to boys only (74), so the denominator is 74. The numerator stays 32 because those are the favourable cases within the restricted universe.\n\nConceptual anchor: conditional probability *rescales* the sample space. The denominator isn't \"how many total\" — it's \"how many are in the condition we've been told.\"", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "What's the careless-arithmetic habit that cost marks in *both* the ESAT warm-up and the P1 paper — and what's the specific counter-habit? (2 steps)", "answer": "- Step 1: **Mental subtraction errors.** In ESAT 1, you computed $$46-25$$ incorrectly (then $$21-12$$ as 18 instead of 9). In P1 Q7(c), you evaluated $$OD$$ as 0.96 instead of ≈1.42 — a single wrong subtraction that cascaded into the entire perimeter.\n- Step 2: The counter-habit: **re-key every subtraction on the calculator and size-check the result before writing it.** \"Size-check\" means asking: does the answer have the right magnitude? $$6 - 1.42$$ should be \"a bit under 5\" — if you write 0.96, that's nowhere near 5, so it fails the size check instantly.\n\nHarry's recommendation: *drill quick mental subtraction with an app.* The goal isn't speed for its own sake — it's making the size-check reflexive so a wrong number *feels* wrong the moment you write it.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "How do you size-check a subtraction like $$6 - 1.42$$ in under 2 seconds — and what would have caught the Q7(c) error? (2 steps)", "answer": "- Step 1: Round both numbers to easy values and estimate: $$6 - 1.42 \\approx 6 - 1.5 = 4.5$$. So the answer should be \"just under 4.6.\" If you write 0.96, that's off by a factor of ~5 — instantly flagged.\n- Step 2: The general rule: **does the answer have the right size and sign?** $$8 - \\frac{1}{6}$$ is \"just under 8.\" $$46 - 25$$ is \"about 20.\" $$\\pi - 0.7 - 2.258$$ is \"about 3.14 - 3 = 0.14, so small and positive.\" If your written value fails any of these, re-key it on the calculator immediately.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "What are the two formulae for a solid cylinder that you must memorise cold for ESAT — and what's the visual intuition for the curved-surface area? (3 steps)", "answer": "- Step 1: Volume: $$V = \\pi r^2 h$$. Total surface area (solid, both ends): $$S = 2\\pi r^2 + 2\\pi r h$$. The first term is two circular ends ($$2 \\times \\pi r^2$$); the second is the curved side.\n- Step 2: The curved-side intuition: imagine a toilet-roll tube. **Cut it and unfurl it** — it flattens into a rectangle. One side of the rectangle is the height $$h$$; the other side is the circumference of the circle, $$2\\pi r$$. So curved area $$= 2\\pi r \\times h$$.\n- Step 3: In ESAT you cannot afford to re-derive these from the unfurling picture every time. Harry: *\"ideally this is just a formula you can remember… write it down very quickly without having to draw lots of diagrams.\"* Know both formulae instantly; the algebra after that is one line of cancelling.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "When a question says \"the surface area is numerically equal to the volume,\" what's the first equation you write down — and what algebraic trick clears the common factor? (ESAT 2) (3 steps)", "answer": "- Step 1: Write $$\\pi r^2 h = 2\\pi r^2 + 2\\pi r h$$. This is \"volume = surface area\" with both formulae substituted.\n- Step 2: **Divide through by $$\\pi$$** immediately — it appears in every term, so it cancels cleanly: $$r^2 h = 2r^2 + 2rh$$.\n- Step 3: Gather the $$h$$ terms on one side and factor out $$h$$: $$r^2 h - 2rh = 2r^2 \\Rightarrow h(r^2 - 2r) = 2r^2$$. Then divide and simplify: $$h = \\frac{2r^2}{r^2 - 2r} = \\frac{2r^2}{r(r-2)} = \\frac{2r}{r-2}$$. The key cancellation: factor $$r$$ out of the denominator to cancel with the numerator's $$r^2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "What's Harry's #1 most valuable habit change for preventing lost marks across the entire paper — and what does \"underline and tick off\" look like in practice? (2 steps)", "answer": "- Step 1: **Before writing any working, underline every instruction word in the question stem.** This includes: the required form (\"$$ax+by+c=0$$ with integer coefficients\"), the object asked for (\"coordinates\" vs \"value\"), the accuracy (\"1 d.p.\", \"3 d.p.\"), and branch selectors (\"obtuse\").\n- Step 2: **When you finish, go back and physically tick each underline.** This is an audit: \"Did I give coordinates? ✓. Did I clear fractions for integers? ✓. Did I pick the obtuse root? ✓.\" If any tick is missing, fix it before moving on.\n\nHarry: *\"that could be the difference of a grade in every paper.\"* He told you plainly: *\"you haven't done that in this paper; the next paper I expect to see it.\"*", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "Q8(a) asked for the normal in the form $$ax+by+c=0$$ with **integer** coefficients. What specific step converts a line with fractional coefficients into this form — and what's the verification check? (2 steps)", "answer": "- Step 1: **Multiply through by the common denominator** of all fractions to clear them. For example, if you reach $$y - 1 = -\\frac{6}{35}(x - 4)$$, multiply both sides by 35: $$35(y-1) = -6(x-4)$$, then expand and rearrange to $$6x + 35y - 59 = 0$$.\n- Step 2: **Verification check:** read off $$a = 6$$, $$b = 35$$, $$c = -59$$ and confirm all three are integers. If any is a fraction, you haven't finished — find the remaining denominator and multiply through again.\n\nThe pitfall: you had the right line equation but lost the A-mark because the form wasn't satisfied. Harry: *\"it's this word 'integers' — I don't think you spotted it.\"*", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "When a question says \"state the **coordinates** of the minimum,\" what exactly must you write — and what did writing only the y-value cost? (Q9a) (2 steps)", "answer": "- Step 1: You must write an **ordered pair** $$(x, y)$$. For $$y = 4\\sin\\theta$$, the minimum value is $$-4$$ at $$\\theta = 270°$$, so the answer is $$(270°, -4)$$.\n- Step 2: Writing only \"$$-4$$\" earns 1 mark (B1 for the value) but loses the second mark (B0 for the coordinates). Harry: *\"part A asks you for coordinates — it wants $$x$$ and $$y$$. You've just given me $$y$$, so you only get one mark; notice this is two marks.\"*\n\nThe trigger word is **\"coordinates\"** — it always demands a point $$(x, y)$$, never a bare number. Underline it.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "When you factorise $$x$$ out of a polynomial like $$2x^3 + 3x^2 - 35x = x(2x^2 + 3x - 35) = 0$$, what root must you write down *before* you touch the quadratic bracket — and why is it so easily lost? (Q5a) (2 steps)", "answer": "- Step 1: **$$x = 0$$ is a root.** The moment you write $$x(\\ldots) = 0$$, you have two factors: the bare $$x$$ and the bracket. The bare $$x$$ gives $$x = 0$$ immediately. Write this down as your first solution.\n- Step 2: It's easily lost because your attention jumps to the quadratic bracket — that's the \"interesting\" part. But the bracket is only *half* the factorisation. Harry: *\"there are two possibilities, either $$x = 0$$ or the bracket $$= 0$$; because you lost the '$$= 0$$', you lost the final mark.\"*\n\nMake it a reflex: the instant you see a bare variable outside a bracket, write \"$$x = 0$$\" (or \"$$\\sin\\theta = 0$$\", etc.) as a solution. Then solve the bracket.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "For a cubic like $$2x^2 + 3x - 35 = 0$$ that factors nicely, what method did Harry say is \"more efficient\" than the quadratic formula — and why? (Q5a)", "answer": "**Factorise by inspection** into $$(2x - 7)(x + 5) = 0$$. This is faster and safer than the formula because: (1) no fraction arithmetic to go wrong with $$\\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}$$, (2) you can verify by expanding back, and (3) it directly gives the roots $$x = \\frac{7}{2}$$ and $$x = -5$$ without a simplification step. Harry noted the quadratic *\"could have been factorised\"* — reach for factorisation first when the coefficients are small integers.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "When solving a \"hidden quadratic\" like $$2(y-5)^6 + 3(y-5)^4 - 35(y-5)^2 = 0$$, what substitution collapses it — and what constraint must you apply to the solutions? (Q5b) (3 steps)", "answer": "- Step 1: Let $$u = (y-5)^2$$. Then $$(y-5)^4 = u^2$$ and $$(y-5)^6 = u^3$$, so the equation becomes $$2u^3 + 3u^2 - 35u = 0$$ — the same cubic from part (a), now in $$u$$.\n- Step 2: Solve for $$u$$: you get $$u = 0$$, $$u = \\frac{7}{2}$$, $$u = -5$$. Now apply the constraint: **$$u = (y-5)^2 \\geq 0$$**, so reject $$u = -5$$ (a squared quantity cannot be negative).\n- Step 3: Back-substitute the valid $$u$$ values. $$u = 0 \\Rightarrow (y-5)^2 = 0 \\Rightarrow y = 5$$. $$u = \\frac{7}{2} \\Rightarrow (y-5)^2 = \\frac{7}{2} \\Rightarrow y = 5 \\pm \\sqrt{\\frac{7}{2}} = 5 \\pm \\frac{\\sqrt{14}}{2}$$.\n\nKey insight: the substitution works because the exponents 6, 4, 2 are all even — they're multiples of 2, so $$(y-5)^2$$ is the natural base.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "When taking square roots of both sides of $$(y-5)^2 = \\frac{7}{2}$$, where do you place the $$\\pm$$ sign — and why? (Q5b)", "answer": "**Put the $$\\pm$$ on the side with the number** (the side without the variable): $$y - 5 = \\pm\\sqrt{\\frac{7}{2}}$$. Harry's rule: *\"put the $$\\pm$$ on the side with the numbers\"* — i.e., the constant side. This avoids the common mistake of writing $$\\pm(y-5) = \\sqrt{\\frac{7}{2}}$$, which is technically correct but confusing and leads to sign errors when you distribute the $$\\pm$$ back. The convention keeps the variable expression clean and positive.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "What does \"a blank space scores zero\" mean in exam strategy — and what should you do instead of leaving a part unfinished? (Q7c) (2 steps)", "answer": "- Step 1: If you write nothing, you get 0. But if you write the correct *method* with *any* numbers substituted — even wrong ones — you can earn **method (M) marks**. The mark scheme awards M marks for the approach, not for numerical correctness.\n- Step 2: So: **substitute every number you have, grind to a final answer, and star it** if you're unsure. Harry: *\"even if it's ridiculous, even if you know you've made a mistake, just keep going with the numbers, put a little star next to it, and if you've got time come back to it.\"*\n\nIn Q7(c), you stopped after writing the perimeter formula with an uncertain $$OD$$. Had you substituted *any* value for $$OD$$ and finished, you'd have banked method marks instead of zero.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Why did Harry say \"the very first line is the most important\" — and what's the specific danger with differentiating a surd term like $$-24x^{-1/2}$$? (Q1a) (2 steps)", "answer": "- Step 1: A slip on the **first line of working snowballs** into every subsequent line. If your derivative is wrong, your gradient is wrong, your tangent equation is wrong, and you lose the A-mark in every part that depends on it. One early error can cost 2–3 marks across sub-parts.\n- Step 2: The specific danger with $$-24x^{-1/2}$$: when you bring the power $$-\\frac{1}{2}$$ to the front and multiply, you get $$-24 \\times (-\\frac{1}{2}) = +12$$. Then you subtract 1 from the power: $$-\\frac{1}{2} - 1 = -\\frac{3}{2}$$. The trap: **subtracting 1 from a negative power makes it *more* negative**. Students rush this and write $$-\\frac{1}{2}$$ instead of $$-\\frac{3}{2}$$.\n\nHarry: *\"be speedy in the exam, but slow and careful where it matters — and that's the first couple of lines. Double-check that one before you move on.\"*", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "When subtracting 1 from a negative power like $$-\\frac{1}{2}$$, what's the result — and what's the common sign error? (Q1a)", "answer": "$$-\\frac{1}{2} - 1 = -\\frac{3}{2}$$. The power gets **more negative**. The common error is to write $$-\\frac{1}{2} - 1 = +\\frac{1}{2}$$ or $$-\\frac{1}{2} - 1 = -\\frac{1}{2}$$, as if \"subtracting 1\" from a negative somehow makes it less negative or flips the sign. Slow down through this step on every surd differentiation. Visual check: on the graph of $$x^{-1/2}$$, the derivative should be *steeper* in magnitude as $$x \\to 0$$, which requires a more negative power ($$x^{-3/2}$$), not a less negative one.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "When the calculator gives you roots $$x = 2$$ and $$x = -\\frac{18}{11}$$ for a quadratic with leading coefficient 11, how do you build the factorised form so it expands back correctly? (Q3b) (2 steps)", "answer": "- Step 1: From each root, write a linear factor: root 2 gives $$(x - 2)$$; root $$-\\frac{18}{11}$$ gives $$(x + \\frac{18}{11})$$. But $$(x + \\frac{18}{11})$$ has a fraction — **clear it** by multiplying through by 11: $$(11x + 18)$$.\n- Step 2: The factorised form is $$(x - 2)(11x + 18) < 0$$. Verify by expanding: the $$x^2$$ coefficient is $$1 \\times 11 = 11$$, which matches the original $$11x^2$$. If you'd written $$(x - 2)(x + \\frac{18}{11})$$, expanding gives $$x^2 + \\ldots$$ — the leading coefficient is wrong, and *\"depending on the mark scheme that won't score.\"*\n\nRule: **always expand back to check the leading coefficient matches.** If it doesn't, you've lost a factor.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "When solving a quadratic inequality and then intersecting with a constraint from a previous part, what two things must you get right about the inequality signs? (Q3b,c) (2 steps)", "answer": "- Step 1: **Copy the inequality sign exactly as given.** If the question says \"area $$< 72$$\" (strictly less than), your quadratic inequality must have a strict $$<$$, not $$\\leq$$. Harry: *\"it was strictly less than, so the inequalities must match.\"* A $$\\leq$$ where $$<$$ is required loses the accuracy mark.\n- Step 2: **Preserve the strictness through the intersection.** If part (a) gives $$x > 1.5$$ (strict) and part (b) gives $$-\\frac{18}{11} < x < 2$$ (strict), the intersection is $$1.5 < x < 2$$ — all strict. Don't accidentally weaken to $$\\leq$$ at any step.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "When a question has parts (a), (b), (c) where (c) says \"hence state the range of $$x$$,\" what does \"hence\" tell you about how to use the previous parts? (Q3c) (2 steps)", "answer": "- Step 1: **\"Hence\" means you must use the results from previous parts** — you're not expected to re-derive anything. Part (a) gave $$x > 1.5$$; part (b) gave $$-\\frac{18}{11} < x < 2$$. Part (c) asks you to **intersect** these two ranges.\n- Step 2: The intersection: $$x$$ must satisfy *both* conditions simultaneously. On a number line, $$x > 1.5$$ starts to the right of 1.5, and $$x < 2$$ ends to the left of 2. The overlap is $$1.5 < x < 2$$. The lower bound comes from part (a) (since 1.5 > $$-\\frac{18}{11}$$); the upper bound comes from part (b).", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "Once you have a correct answer in simplest form, should you rewrite it in another equivalent form to \"show your working\" — and what did Harry say about this? (Q4)", "answer": "**No — stop at a correct answer.** Harry: *\"I wouldn't waste time in the exam writing it another way as well, because you might make a mistake in the rewrite and confuse the examiner. Markers mark very fast — make their life easy and just stop once you have a correct simplest form.\"* A needless rewrite risks introducing a new slip (sign error, dropped term) and can make a fast marker pause and doubt. If the mark scheme accepts your form, move on.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "When a line meets a curve at \"exactly one point,\" what algebraic condition does this translate to — and what's the geometric meaning? (Q6a) (2 steps)", "answer": "- Step 1: Set the line equation equal to the curve equation and rearrange to a quadratic $$ax^2 + bx + c = 0$$. \"Exactly one point\" means the quadratic has **exactly one real root**, so the **discriminant $$b^2 - 4ac = 0$$**.\n- Step 2: Geometrically, discriminant = 0 means the line is **tangent** to the curve — it touches but doesn't cross. This is the algebraic signature of tangency. If $$b^2 - 4ac > 0$$, the line cuts the curve twice; if $$< 0$$, it misses entirely.\n\nThe trigger phrase: *\"meets at exactly one point\"* or *\"is tangent to\"* → set equal → discriminant = 0.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "When using $$\\sin^{-1}$$ on your calculator to find an angle, what range of values does it return — and what must you do if the question specifies the angle is **obtuse**? (Q7b) (2 steps)", "answer": "- Step 1: $$\\sin^{-1}$$ is restricted to the principal branch $$[-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$$ (or $$[-90°, 90°]$$). So the calculator **always returns the acute angle** (or right angle). For $$\\sin^{-1}(0.7731)$$, it gives 0.884 rad — the acute solution.\n- Step 2: If the question says the angle is **obtuse** (between $$\\frac{\\pi}{2}$$ and $$\\pi$$), you must take the supplement: **$$\\pi - \\text{acute value}$$**. So the obtuse angle is $$\\pi - 0.884 = 2.258$$ rad. Reject the calculator's 0.884; carry 2.258.\n\nThe trigger: underline **\"obtuse\"** in the question. If you miss this word, you'll carry the acute value and every subsequent calculation will be wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "Why does the sine graph have two solutions for $$\\sin\\theta = k$$ when $$0 < k < 1$$ — and which one does the calculator give you? (Q7b) (2 steps)", "answer": "- Step 1: The horizontal line $$y = k$$ (for $$0 < k < 1$$) cuts the sine wave **twice** per period: once on the rising part (acute angle, $$\\theta_1$$) and once on the falling part (obtuse angle, $$\\theta_2 = \\pi - \\theta_1$$). Both are valid solutions to $$\\sin\\theta = k$$.\n- Step 2: The calculator's $$\\sin^{-1}$$ gives you only the **acute** one ($$\\theta_1$$), because it's defined on the restricted domain. To get the obtuse one, you compute $$\\pi - \\theta_1$$. The question's branch selector (\"obtuse\") tells you which solution to keep.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "In Q7, the sector angle is the *reflex* part of the circle, but the given angle is 0.7 rad. How do you find the sector angle — and what's the geometric picture? (2 steps)", "answer": "- Step 1: The given angle 0.7 rad is the angle at the centre for the triangle $$AOD$$ — it's the **small** (non-reflex) angle. The sector $$ABCOA$$ uses the **remaining** part of the full circle.\n- Step 2: Full circle = $$2\\pi$$ rad. The reflex sector angle is $$2\\pi - 0.7$$. This is the large angle that sweeps from A through B and C back to A, going the \"long way\" around. Area of sector = $$\\frac{1}{2}r^2\\theta = \\frac{1}{2}(6)^2(2\\pi - 0.7)$$.\n\nThe key insight: when a diagram shows a small angle and a sector that's clearly \"most of the circle,\" the sector angle is $$2\\pi - \\text{given angle}$$, not the given angle itself.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "When finding the normal to a curve at a point, what's the relationship between the gradient of the tangent and the gradient of the normal? (Q8a)", "answer": "If the tangent gradient is $$m$$, the normal gradient is $$-\\frac{1}{m}$$ (the **negative reciprocal**). The normal is perpendicular to the tangent. So if $$f'(4) = \\frac{35}{6}$$, the normal gradient is $$-\\frac{6}{35}$$. Common trap: writing $$\\frac{1}{m}$$ without the negative sign, or writing $$-m$$ instead of $$-\\frac{1}{m}$$. The perpendicularity condition is $$m_1 \\cdot m_2 = -1$$, which gives $$m_2 = -\\frac{1}{m_1}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "When rationalising $$\\frac{1}{4 - 2\\sqrt{2}}$$, what do you multiply numerator and denominator by — and what algebraic identity makes the denominator rational? (Q2a) (2 steps)", "answer": "- Step 1: Multiply by the **conjugate** $$\\frac{4 + 2\\sqrt{2}}{4 + 2\\sqrt{2}}$$. The conjugate is the same expression with the sign of the surd term flipped.\n- Step 2: The denominator becomes $$(4 - 2\\sqrt{2})(4 + 2\\sqrt{2}) = 4^2 - (2\\sqrt{2})^2 = 16 - 8 = 8$$. This uses the **difference of two squares**: $$(a - b)(a + b) = a^2 - b^2$$. The cross terms cancel, leaving only rational numbers. The numerator is $$4 + 2\\sqrt{2}$$, so the result is $$\\frac{4 + 2\\sqrt{2}}{8} = \\frac{1}{2} + \\frac{1}{4}\\sqrt{2}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "When the question asks for an answer \"in the form $$p + q\\sqrt{2}$$,\" what convention must you follow about the order of terms? (Q2b)", "answer": "**Write the rational part first, then the surd part.** So $$10 + 10\\sqrt{2}$$, not $$10\\sqrt{2} + 10$$. The form \"$$p + q\\sqrt{2}$$\" explicitly places $$p$$ (rational) before $$q\\sqrt{2}$$ (irrational). Harry double-checked the mark scheme: *\"I was expecting fractions when they say 'rational numbers'… but whole numbers are rational numbers — that is correct, well done.\"* Whole numbers are rational (they're fractions with denominator 1), so $$p = 10, q = 10$$ is valid.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "When a turning point has gradient zero, what form does the tangent at that point take — and what's the geometric reason? (Q10c) (2 steps)", "answer": "- Step 1: The tangent is a **horizontal line** of the form $$y = k$$, where $$k$$ is the y-coordinate of the turning point. You don't need $$y - y_1 = m(x - x_1)$$ — just evaluate $$f$$ at the turning point.\n- Step 2: Geometric reason: gradient = 0 means the curve is momentarily flat — neither rising nor falling. The tangent line at that instant is perfectly horizontal, like the top of a hill or the bottom of a valley. Harry caught you drawing a *vertical* line first — that would have *infinite* gradient, not zero.\n\nThe trigger: \"gradient is zero\" or \"turning point\" → tangent is $$y = \\text{constant}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": true}, {"question": "For a graph-transformation question like \"$$y = f(x + a)$$ passes through the origin,\" why is sketching often better than grinding algebra — and how does the sketch give you the answer? (Q10d) (2 steps)", "answer": "- Step 1: $$y = f(x + a)$$ is a **horizontal translation** of $$y = f(x)$$ by $$-a$$ units. Rather than substituting and solving algebraically, **sketch the original curve, mark its roots, and think about what shift makes the origin land on a root.**\n- Step 2: The original $$f(x)$$ has roots at $$x = -\\frac{1}{2}$$ and $$x = 4$$. The translated curve passes through $$O(0,0)$$ means $$f(0 + a) = 0$$, i.e., $$f(a) = 0$$, i.e., $$a$$ is a root. Reading off the sketch: $$a = 4$$ or $$a = -\\frac{1}{2}$$. Harry: *\"for graph-transformation questions it's often better to answer with a sketch than with lots of algebra.\"*", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "When a question says \"state the **possible values** of $$a$$\" (plural), what does the word \"possible\" signal about the number of answers you should expect? (Q10d)", "answer": "**\"Possible\" (plural) signals that there are multiple valid answers** — expect more than one. Harry: *\"'possible values of $$a$$' — plural, so expect more than one.\"* If you find only one root and stop, you've probably missed a case. In Q10(d), the repeated root at $$-\\frac{1}{2}$$ and the single root at 4 both work, giving $$a = -\\frac{1}{2}$$ or $$a = 4$$. The plural cue is a meta-hint from the examiner: keep looking.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "To count solutions of $$\\tan\\theta = 1 + \\sin\\theta$$ over a large range like $$0 \\leq \\theta \\leq 2160°$$, what's the efficient strategy — and why does it work? (Q9c) (2 steps)", "answer": "- Step 1: **Count the intersections in one period** ($$0°$$ to $$360°$$) by sketching both curves. $$\\tan\\theta$$ has period $$180°$$ and $$1 + \\sin\\theta$$ has period $$360°$$; over one $$360°$$ window, they cross a fixed number of times.\n- Step 2: **Multiply by the number of whole periods** in the range. $$2160° \\div 360° = 6$$ periods, so total solutions = (solutions per period) × 6. For $$1980°$$, that's $$5\\frac{1}{2}$$ periods — so it's 5 full periods plus a half-period adjustment, minding the endpoints.\n\nKey insight: you never count all solutions individually. You count the *pattern* once, then scale. This is the same skill as the June-12 lesson on $$\\tan\\theta = \\frac{1}{x} + 1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "What's the period of $$\\tan\\theta$$ vs the period of $$\\sin\\theta$$ — and why does this matter when counting solutions over large ranges? (Q9c) (2 steps)", "answer": "- Step 1: $$\\tan\\theta$$ has period **$$180°$$**; $$\\sin\\theta$$ (and $$1 + \\sin\\theta$$) has period **$$360°$$**. The combined pattern of intersections repeats every $$360°$$ (the LCM of 180° and 360°).\n- Step 2: This matters because over each $$360°$$ window, the relative positions of the two curves are identical — so the number of intersections is the same in every window. You only need to count carefully *once*, then scale. If you tried to count over all $$2160°$$ directly, you'd be sketching six copies of the same picture — a waste of time and a source of counting errors.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "When the question says a cubic $$f(x) = (x-4)(2x+1)^2$$ \"touches\" the x-axis at $$P$$ and \"crosses\" at $$Q$$, which factor corresponds to which behaviour — and why? (Q10a) (2 steps)", "answer": "- Step 1: The **repeated factor** $$(2x+1)^2$$ corresponds to **touching** (tangent to the x-axis) at $$P$$. The **single factor** $$(x-4)$$ corresponds to **crossing** at $$Q$$.\n- Step 2: A repeated root means the curve meets the x-axis and \"bounces back\" — it doesn't change sign. A single root means the curve passes through the x-axis, changing sign from positive to negative (or vice versa). So $$P$$ is at $$x = -\\frac{1}{2}$$ (from $$2x+1=0$$) and $$Q$$ is at $$x = 4$$ (from $$x-4=0$$). The coordinates of $$P$$ are $$(-\\frac{1}{2}, 0)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "What's the full READ-THE-QUESTION checklist that Harry expects you to use on every question — and what did he say he'll check for on the next paper? (3 steps)", "answer": "- Step 1: Before starting working, **underline every instruction word**: units, accuracy, exact form, coordinates-vs-value, which root/branch, conditional trigger, required form ($$ax+by+c=0$$ with integers).\n- Step 2: After finishing, **go back and tick each underline**: did I include units? round to the right accuracy? give coordinates not just a value? pick the obtuse root? clear fractions for integer form? include all solutions (including $$x=0$$)?\n- Step 3: Harry will **visibly check for underlines and ticks** on your next paper: *\"you haven't done that in this paper; the next paper I expect to see it.\"* Make it physical — pen on paper, not a mental note.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "About how many marks separated your B grade from an A on this paper — and what was the *cause* of those lost marks (not understanding, or something else)? (2 steps)", "answer": "- Step 1: **≈6 marks** — you scored 54/75 (B) and should have scored ≈60/75 (A). On a 75-mark paper, a B and an A are separated by less than the contents of one hard question.\n- Step 2: The cause was **careless execution slips**, not conceptual gaps. You set up the sine rule, the discriminant, the chain rule, the surd conjugate — all correctly. The marks were lost to: one mental subtraction (Q7c), one dropped root (Q5a), un-ticked question requirements (Q8, Q9a), and one part left blank (Q7c). Harry: *\"you are not a B-grade mathematician who needs to learn more topics; you are an A/A* mathematician who is leaking marks at the pen.\"*", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "What's Harry's recommended volume of past-paper practice — and what makes it \"reflective\" rather than just repetitive? (2 steps)", "answer": "- Step 1: **≈3 past papers per weekend.** Harry: *\"try to keep to this three past papers in a weekend… that will give the volume of practice we need for your Pure 1.\"*\n- Step 2: \"Reflective\" means: after each paper, **diagnose where marks went and drill the specific habit that would have saved them** (underline-and-tick, re-key subtractions, write $$x=0$$ first, etc.). Mindless repetition of papers without diagnosis doesn't fix the leaks. Harry's point on Q10: *\"the more past papers you do reflectively, the faster you'll reach for the sketch or the trigger next time.\"*", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "When integrating $$\\frac{4x^2 + 1}{2\\sqrt{x}}$$, what's the first algebraic step before you can integrate term-by-term? (Q4) (2 steps)", "answer": "- Step 1: **Split the fraction and convert all roots to negative/fractional powers.** $$\\frac{4x^2 + 1}{2x^{1/2}} = \\frac{4x^2}{2x^{1/2}} + \\frac{1}{2x^{1/2}} = 2x^{3/2} + \\frac{1}{2}x^{-1/2}$$.\n- Step 2: Now integrate term-by-term using the power rule: $$\\int 2x^{3/2}\\,dx = 2 \\cdot \\frac{2}{5}x^{5/2} = \\frac{4}{5}x^{5/2}$$ and $$\\int \\frac{1}{2}x^{-1/2}\\,dx = \\frac{1}{2} \\cdot 2x^{1/2} = x^{1/2}$$. Don't forget $$+ C$$.\n\nThe key: you can't integrate while the expression is a single fraction with a surd denominator. Split first, rewrite as powers, then integrate.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "When finding $$f(x)$$ by integrating $$f'(x) = 4x^{1/2} - 2 - \\frac{8}{3x^2}$$ and using the point $$P(4,1)$$ to find $$C$$, what's the common mistake in the substitution step? (Q8b) (2 steps)", "answer": "- Step 1: Integrate: $$f(x) = \\frac{8}{3}x^{3/2} - 2x + \\frac{8}{3x} + C$$. Then substitute $$x = 4, y = 1$$: $$1 = \\frac{8}{3}(4)^{3/2} - 2(4) + \\frac{8}{3(4)} + C$$.\n- Step 2: The common mistake: evaluating $$4^{3/2}$$ incorrectly. $$4^{3/2} = (4^{1/2})^3 = 2^3 = 8$$, so $$\\frac{8}{3} \\times 8 = \\frac{64}{3}$$. And $$\\frac{8}{12} = \\frac{2}{3}$$. So $$1 = \\frac{64}{3} - 8 + \\frac{2}{3} + C = 22 - 8 + C = 14 + C$$, giving $$C = -13$$.\n\nThe trap: rushing $$4^{3/2}$$ as something other than 8, or making a fraction-arithmetic error in the $$C$$ calculation.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "What does the phrase \"hence solve\" in Q5(b) tell you about the relationship between parts (a) and (b) — and what's the efficiency gain? (2 steps)", "answer": "- Step 1: **\"Hence\" means: use the answer from part (a) directly.** You already solved $$2u^3 + 3u^2 - 35u = 0$$ in part (a) and found $$u = 0, \\frac{7}{2}, -5$$. Part (b) is the *same cubic* under the substitution $$u = (y-5)^2$$.\n- Step 2: The efficiency gain: you **don't re-solve the cubic**. You immediately write down the three $$u$$-values from part (a), apply the constraint $$u \\geq 0$$ (reject $$u = -5$$), and back-substitute. If you ignored the \"hence\" and tried to solve part (b) from scratch, you'd waste several minutes and risk new algebra errors.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "Why does $$u = -5$$ get rejected when solving $$(y-5)^2 = u$$ — and what sentence can you write to justify this to the examiner? (Q5b) (2 steps)", "answer": "- Step 1: $$u = (y-5)^2$$, and **a squared real quantity is always non-negative**: $$(y-5)^2 \\geq 0$$ for all real $$y$$. So $$u = -5$$ is impossible — no real $$y$$ satisfies $$(y-5)^2 = -5$$.\n- Step 2: To justify to the examiner, write: *\"Reject $$u = -5$$ since $$(y-5)^2 \\geq 0$$ for all real $$y$$.\"* Harry: *\"a squared quantity is non-negative\"* — you may write that sentence to be safe. This is a standard Edexcel requirement: when you reject a solution, state *why*.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "When the question asks for an answer to \"1 d.p.\" or \"3 d.p.\", what's the difference between rounding your final answer vs rounding intermediate values — and which should you do? (Q7)", "answer": "**Round only the final answer.** Use full calculator precision (store values, or use the ANS key) for all intermediate steps. Rounding intermediates introduces cumulative error — e.g., if you round $$OD = 1.42$$ to 1 d.p. as 1.4, then $$CD = 6 - 1.4 = 4.6$$, but the true $$CD = 4.58$$. That 0.02 error propagates into the perimeter. Only at the very last line do you round to the requested accuracy. If the question says \"1 d.p.\", your final boxed answer must be rounded to exactly 1 d.p. — not 2 d.p., not exact.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "What's the sector-area formula in radians — and why must the angle be in radians (not degrees)? (Q7a) (2 steps)", "answer": "- Step 1: Sector area = $$\\frac{1}{2}r^2\\theta$$, where $$\\theta$$ is in **radians**. For Q7(a): $$\\frac{1}{2}(6)^2(2\\pi - 0.7) = 100.5$$ cm².\n- Step 2: The formula $$\\frac{1}{2}r^2\\theta$$ is *derived* using radians (it comes from the fraction-of-circle argument: sector is $$\\frac{\\theta}{2\\pi}$$ of the full circle area $$\\pi r^2$$, giving $$\\frac{\\theta}{2\\pi} \\cdot \\pi r^2 = \\frac{1}{2}r^2\\theta$$). If $$\\theta$$ is in degrees, this derivation breaks — you'd need $$\\frac{\\theta}{360} \\cdot \\pi r^2$$ instead. Since the question gives 0.7 rad, use the radian formula directly.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": true}, {"question": "When the sine rule gives you $$\\frac{6}{\\sin ADO} = \\frac{5}{\\sin 0.7}$$, how do you isolate $$\\sin ADO$$ — and what's the common rearrangement error? (Q7b) (2 steps)", "answer": "- Step 1: Cross-multiply: $$5 \\sin ADO = 6 \\sin 0.7$$, so $$\\sin ADO = \\frac{6 \\sin 0.7}{5}$$. The \"6\" goes with the sine of the angle opposite the side of length 6 (angle at $$D$$ opposite side $$OA = 6$$); the \"5\" goes with the sine of the given angle (angle at $$O$$ opposite side $$AD = 5$$).\n- Step 2: Common error: flipping the fraction — writing $$\\sin ADO = \\frac{5 \\sin 0.7}{6}$$. This happens when you forget which side is opposite which angle. The sine rule is $$\\frac{a}{\\sin A} = \\frac{b}{\\sin B}$$: side over the sine of its *opposite* angle. Always pair each side with the angle directly across from it.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": true}, {"question": "What's the arc-length formula for a sector with radius $$r$$ and angle $$\\theta$$ radians — and how was it used in Q7(c) for the perimeter? (2 steps)", "answer": "- Step 1: Arc length = $$r\\theta$$. For the sector in Q7, the arc $$ABC$$ has radius 6 and angle $$2\\pi - 0.7$$, so arc length = $$6(2\\pi - 0.7) \\approx 33.5$$ cm.\n- Step 2: The perimeter of shape $$ABCDA$$ consists of: arc $$ABC$$ (33.5) + straight side $$CD$$ (= $$OC - OD = 6 - 1.42 = 4.58$$) + straight side $$DA$$ (= 5). Total ≈ 43.1 cm. The arc-length method mark is awarded for writing $$r\\theta$$ with correct $$r$$ and $$\\theta$$ — even if subsequent arithmetic is wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "What does \"star it\" mean as an exam-room tactic — and when should you use it? (Q7c) (2 steps)", "answer": "- Step 1: **\"Star it\" means put an asterisk (*) next to any answer you're unsure about**, so you can find and revisit it quickly if time allows. It's a bookmark, not a concession — you still write the full answer.\n- Step 2: Use it whenever you suspect an earlier error has propagated (e.g., you know $$OD$$ might be wrong but you've substituted it anyway to bank method marks). Harry: *\"put a little star next to it, and if you've got time come back to it.\"* The star is a promise to yourself: \"I'll check this if I can\" — but the crucial point is you *finished the question* rather than leaving it blank.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "When expanding $$(x-4)(2x+1)^2$$ to find $$f'(x)$$, what's the efficient order of operations — and what's the common expansion error? (Q10b) (2 steps)", "answer": "- Step 1: Expand $$(2x+1)^2 = 4x^2 + 4x + 1$$ first, then multiply by $$(x-4)$$: $$(x-4)(4x^2 + 4x + 1) = 4x^3 + 4x^2 + x - 16x^2 - 16x - 4 = 4x^3 - 12x^2 - 15x - 4$$.\n- Step 2: Common error: sign mistakes when distributing the $$(x-4)$$, especially the $$-4$$ times each term of the quadratic. Each product with $$-4$$ flips the sign: $$-4 \\times 4x^2 = -16x^2$$, $$-4 \\times 4x = -16x$$, $$-4 \\times 1 = -4$$. Then differentiate: $$f'(x) = 12x^2 - 24x - 15$$.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "What's the connection between the ESAT warm-up and the P1 paper in terms of the *type* of marks being lost — and what single habit addresses both? (2 steps)", "answer": "- Step 1: In both halves, the marks lost were **non-conceptual execution slips** — not \"I don't know the method\" but \"I made a careless arithmetic error.\" ESAT 1: $$46 - 25$$ and $$21 - 12$$ computed wrong. P1 Q7(c): $$OD$$ evaluated as 0.96 instead of 1.42. Same slip type, different exam.\n- Step 2: The single habit: **re-key every subtraction and size-check it.** This applies identically to ESAT (non-calculator, so you must verify mentally) and P1 (calculator allowed, so re-key on the calculator). Harry's recommendation was the same in both halves: *drill quick mental subtraction with an app.* One habit, two exams fixed.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "When solving Q6(b) after finding $$c = -\\frac{49}{4}$$, the quadratic becomes $$x^2 - 7x + \\frac{49}{4} = 0$$. Why does this factorise as a perfect square — and what does that tell you geometrically? (2 steps)", "answer": "- Step 1: The discriminant is zero (that's how we found $$c$$), so the quadratic has a **repeated root**: $$x^2 - 7x + \\frac{49}{4} = (x - \\frac{7}{2})^2 = 0$$, giving $$x = \\frac{7}{2}$$.\n- Step 2: Geometrically, the repeated root confirms the line is **tangent** to the curve — it touches at exactly one point. The x-coordinate of tangency is $$\\frac{7}{2}$$, and substituting back gives $$y = 4(\\frac{7}{2}) - \\frac{49}{4} = \\frac{7}{4}$$. The tangent point is $$(\\frac{7}{2}, \\frac{7}{4})$$.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": true}, {"question": "What's the mental-subtraction size-check for $$8 - 2 - \\frac{1}{6}$$ — and what's the exact value? (Q8a) (2 steps)", "answer": "- Step 1: Size-check: $$8 - 2 = 6$$, then subtract a small fraction ($$\\frac{1}{6} \\approx 0.17$$), so the answer should be \"just under 6\" — about 5.83. If you wrote something like 7 or 4, it would fail the size check.\n- Step 2: Exact value: $$8 - 2 - \\frac{1}{6} = 6 - \\frac{1}{6} = \\frac{36}{6} - \\frac{1}{6} = \\frac{35}{6}$$. This was the tangent gradient at $$P(4,1)$$ in Q8(a). The normal gradient is then $$-\\frac{6}{35}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "When a question gives $$f'(x)$$ and a point on the curve, and asks you to find $$f(x)$$, what are the three steps? (Q8b) (3 steps)", "answer": "- Step 1: **Integrate** $$f'(x)$$ term-by-term to get $$f(x)$$ with a constant $$+ C$$. Don't forget to increase each power by 1 and divide by the new power.\n- Step 2: **Substitute** the given point into $$f(x)$$ to form an equation for $$C$$. If the point is $$(4, 1)$$, then $$f(4) = 1$$.\n- Step 3: **Solve for $$C$$** and write the final $$f(x)$$ with the numerical value of $$C$$ substituted. In Q8(b), $$C = -13$$, so $$f(x) = \\frac{8}{3}x^{3/2} - 2x + \\frac{8}{3x} - 13$$.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "What's the sketch of $$y = 1 + \\sin\\theta$$ compared to $$y = \\sin\\theta$$ — and what range of y-values does it have? (Q9b) (2 steps)", "answer": "- Step 1: $$y = 1 + \\sin\\theta$$ is the standard sine wave **shifted up by 1**. Every y-value increases by 1. The wave still has the same shape, same period ($$360°$$), same x-intercepts shifted.\n- Step 2: Since $$\\sin\\theta$$ ranges from $$-1$$ to $$1$$, the shifted wave ranges from $$1 + (-1) = 0$$ to $$1 + 1 = 2$$. The midline is $$y = 1$$, not $$y = 0$$. This matters for counting intersections with $$\\tan\\theta$$: the sine wave is now entirely non-negative, which changes where the curves can cross.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": true}, {"question": "What was the specific mistake in Q1(a) with the surd differentiation — and what's the correct derivation of $$\\frac{d}{dx}[-24x^{-1/2}]$$? (2 steps)", "answer": "- Step 1: The mistake was in bringing the power to the front and/or computing the new power. Harry: *\"your power was fine… but the $$-\\frac{1}{2}$$ comes to the front, not three over two.\"* The error was in the coefficient, not the power.\n- Step 2: Correct derivation: $$\\frac{d}{dx}[-24x^{-1/2}] = -24 \\times (-\\frac{1}{2}) \\times x^{-1/2 - 1} = 12x^{-3/2}$$. Two things happen simultaneously: (1) the old power $$-\\frac{1}{2}$$ comes to the front and multiplies: $$-24 \\times (-\\frac{1}{2}) = +12$$; (2) the power decreases by 1: $$-\\frac{1}{2} - 1 = -\\frac{3}{2}$$. Do each step deliberately on the first line.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}, {"question": "What's the key exam-room rule about speed vs accuracy — and where specifically should you be slow? (Q1)", "answer": "**Be fast in general, but slow and careful on the first couple of lines of working.** Harry: *\"be speedy in the exam, but slow and careful where it matters — and that's the first couple of lines. Double-check that one before you move on.\"* The first line (e.g., differentiating a surd term, setting up the discriminant, writing the sine rule) is the foundation — if it's wrong, everything after is wrong. Speed on the routine algebra that follows; care on the setup.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": false}, {"question": "What's the relationship between the repeated root of a cubic and the \"touching\" behaviour at the x-axis — and how does this help you state coordinates immediately? (Q10a) (2 steps)", "answer": "- Step 1: A **repeated root** (even multiplicity) means the curve **touches** the x-axis without crossing — it \"bounces off.\" A **single root** (odd multiplicity) means the curve **crosses** the x-axis, changing sign.\n- Step 2: For $$f(x) = (x-4)(2x+1)^2$$: the factor $$(2x+1)^2$$ has root $$x = -\\frac{1}{2}$$ with multiplicity 2 (even) → touch at $$P(-\\frac{1}{2}, 0)$$. The factor $$(x-4)$$ has root $$x = 4$$ with multiplicity 1 (odd) → cross at $$Q(4, 0)$$. You can state both coordinates immediately from the factors, without expanding.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": false}, {"question": "When the question says \"show that the tangent has the form $$y = k$$\" at a turning point, what two things must you demonstrate? (Q10c) (2 steps)", "answer": "- Step 1: **Show the gradient is zero** at the given x-value: evaluate $$f'(\\frac{5}{2}) = 0$$. This confirms it's a turning point, so the tangent is horizontal.\n- Step 2: **Find $$k$$** by evaluating the function: $$k = f(\\frac{5}{2}) = (\\frac{5}{2} - 4)(2 \\cdot \\frac{5}{2} + 1)^2 = (-\\frac{3}{2})(6)^2 = -54$$. So the tangent is $$y = -54$$. You don't need the point-gradient form — a horizontal tangent at a turning point is simply \"y equals the y-coordinate.\"", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": true}, {"question": "What homework did Harry set before the next lesson — and what's the priority order? (3 steps)", "answer": "- Step 1: **Revise trig graphs**, then **attempt Q9(c)** (the trig-solutions counting question you left). This is the skill from the June-12 lesson: count intersections per period, then scale.\n- Step 2: **Attempt the remaining P1 past paper** before Tuesday. Do the paper first, then revise — more efficient use of time.\n- Step 3: **Send Harry whatever you've completed**, even if it's not the whole paper. He'll review as far as you've got and finish it together. And on the next paper, **visibly use the underline-and-tick-off habit** — he'll be checking.", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": false}, {"question": "When you solve a quadratic on the calculator and get roots $$x = 2$$ and $$x = -\\frac{18}{11}$$, why can't you just write the factorised form as $$(x - 2)(x + \\frac{18}{11})$$ for a quadratic whose leading coefficient is 11? (Q3b) (2 steps)", "answer": "- Step 1: Expanding $$(x - 2)(x + \\frac{18}{11})$$ gives $$x^2 + \\frac{18}{11}x - 2x - \\frac{36}{11} = x^2 - \\frac{4}{11}x - \\frac{36}{11}$$. The leading coefficient is **1**, not 11. This doesn't match the original quadratic $$11x^2 - 4x - 36$$.\n- Step 2: To fix this, **clear the fraction in the factor** from the fractional root: $$(x + \\frac{18}{11})$$ becomes $$(11x + 18)$$ after multiplying by 11. Now $$(x - 2)(11x + 18) = 11x^2 + 18x - 22x - 36 = 11x^2 - 4x - 36$$ ✓. Always expand back to verify the leading coefficient matches.", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": false}, {"question": "What's the complete list of branch/form selectors that appeared in this paper — and what does each one require you to do differently? (4 steps)", "answer": "- Step 1: **\"Obtuse\"** (Q7b): the calculator's $$\\sin^{-1}$$ gives the acute angle; you must take $$\\pi - \\text{acute}$$ for the obtuse solution.\n- Step 2: **\"Coordinates\"** (Q9a): write an ordered pair $$(x, y)$$, not just a y-value.\n- Step 3: **\"Integer coefficients\" in $$ax + by + c = 0$$** (Q8a): clear all fractions by multiplying through by the common denominator, then verify $$a, b, c \\in \\mathbb{Z}$$.\n- Step 4: **\"Form $$p + q\\sqrt{2}$$\"** (Q2): write the rational part first, then the surd part. Whole numbers count as rational.\n\nEach of these is an instruction word that, if missed, costs the final accuracy mark despite correct working. Underline every one.", "source": "GLM 5.1 ①", "_id": "glm_1_60", "judge_pick": false}, {"question": "Why did Harry say \"the more past papers you do reflectively, the faster you'll reach for the sketch or the trigger next time\" — what's the mechanism? (2 steps)", "answer": "- Step 1: **Pattern recognition builds with volume.** The first time you see \"possible values\" (plural), you might not notice the cue. The fifth time, you instinctively look for multiple answers. The first time you see a graph-transformation question, you reach for algebra; the tenth time, you reach for a sketch because it's faster.\n- Step 2: \"Reflectively\" is the key word — after each paper, you must **diagnose which triggers you missed and internalise them**. Without reflection, you just repeat the same mistakes. With reflection, each paper trains a new reflex: underline \"obtuse,\" write $$x = 0$$ first, reach for the sketch, etc. The reflexes compound.", "source": "GLM 5.1 ①", "_id": "glm_1_61", "judge_pick": true}, {"question": "What's the quick mental-math check for $$\\frac{64}{3} - 8 + \\frac{2}{3}$$ — and how do you spot the simplification? (Q8b drill) (2 steps)", "answer": "- Step 1: Group the fractions with the same denominator: $$\\frac{64}{3} + \\frac{2}{3} = \\frac{66}{3} = 22$$. Now the expression is $$22 - 8 = 14$$.\n- Step 2: Size-check: $$\\frac{64}{3} \\approx 21.3$$, plus $$\\frac{2}{3} \\approx 0.7$$, so $$\\approx 22$$, minus 8 = 14. ✓ The common mistake is trying to find a common denominator for all three terms at once — unnecessary when two already share denominator 3.", "source": "GLM 5.1 ①", "_id": "glm_1_62", "judge_pick": false}, {"question": "In the ESAT two-way table problem, after placing all given data, what's the correct first deduction — and why must you go in that specific order? (ESAT 1) (2 steps)", "answer": "- Step 1: The first deduction is **girls archery = 46 - 25 - 12 = 9**. You know the girls total (46), girls swimming (25), and girls tennis (12) — so the remaining cell in the girls row is determined.\n- Step 2: The order matters because each deduction unlocks the next. Girls archery = 9 unlocks boys archery = 27 - 9 = 18 (using the archery total). Boys archery = 18, plus boys tennis = 24, plus boys total = 74, unlocks boys swimming = 74 - 18 - 24 = 32. If you try to deduce boys swimming first, you don't yet have enough information — it requires boys archery, which requires girls archery, which requires girls tennis. **Always fill the cell that has only one unknown in its row/column.**", "source": "GLM 5.1 ①", "_id": "glm_1_63", "judge_pick": false}, {"question": "When the ESAT question gives \"$$\\frac{2}{3}$$ of the 36 tennis-choosers are boys,\" how do you compute this quickly without a calculator — and what are the two cell values you fill? (ESAT 1) (2 steps)", "answer": "- Step 1: **Divide by 3 first, then multiply by 2.** $$36 \\div 3 = 12$$, then $$12 \\times 2 = 24$$. So 24 boys chose tennis. Harry: *\"non-calculator, so do this in your head.\"*\n- Step 2: Fill two cells: boys tennis = 24, and girls tennis = 36 - 24 = 12. Tick both the \"$$\\frac{2}{3}$$ are boys\" datum and the \"36 chose tennis\" datum. You've extracted two cell values from one sentence.", "source": "GLM 5.1 ①", "_id": "glm_1_64", "judge_pick": false}], "count": 65}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "When a probability problem gives you multiple categories of information (e.g., boys/girls × activities), what organisational structure should you reach for instead of setting up simultaneous equations — and why? (ESAT 1)", "answer": "- Step 1: Reach for a **two-way table** (a grid with rows for one category, columns for the other, plus a total row and total column), NOT simultaneous equations.\n- Step 2: The reason is that with three or more unknowns, simultaneous equations get \"hairy\" — you must track which equation came from which fact, and the algebra tangles. A grid makes every datum drop straight into a single cell with zero algebraic overhead.\n- Step 3: Each number you're told fills exactly one cell (or one row/column total). You can then deduce unknown cells one at a time using simple addition/subtraction along rows and columns — no variable naming, no equation solving.\n\nHarry's redirect: *\"Rather than treating it as equations… that might make it overcomplicated… why don't we organise the information into a table?\"*", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "When filling in a two-way table from a word problem, what physical habit prevents you from double-counting or forgetting a given number? (ESAT 1)", "answer": "- Step 1: **Put a tick (✓) next to each datum in the question the moment you place it into the table.**\n- Step 2: This works because the question typically gives you exactly enough facts to fill the grid. If you finish placing numbers and one fact has no tick, you've missed it. If you try to use a fact twice, you'll notice the tick is already there.\n- Step 3: Harry's instruction: *\"Don't go for it. Do it one step at a time.\"* Fill one deducible cell, tick the fact that allowed it, then move to the next. No skipping ahead.\n\nThis is the table analogue of \"show your working\" — it makes your reasoning auditable under time pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "What is the trigger phrase in a probability question that tells you the denominator is a row/column total, NOT the grand total — and why? (ESAT 1)", "answer": "- Step 1: The trigger is any phrase that **restricts the sample space** before the event is described, e.g., *\"A boy is picked at random… that **he** chose swimming\"* or *\"Given that the student is a girl…\"*\n- Step 2: The restricted group (\"boy\") becomes your new universe. You are no longer picking from all 120 students — you are picking from the 74 boys. So the denominator is 74 (the row total for boys), not 120 (the grand total).\n- Step 3: The formula is the conditional probability $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. Here $$B$$ = \"is a boy\" (denominator = number of boys), $$A \\cap B$$ = \"is a boy who chose swimming\" (numerator = the cell at boys ∩ swimming).\n\nHarry caught the slip: *\"Are we picking from all 120 students?\"* — if the question had said \"a student is picked at random,\" then 120 would be correct. The pronoun \"he\" is your signal.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "You compute a subtraction in your head under exam pressure (e.g., $$46 - 25$$ or $$6 - 1.42$$). What two-step sanity check must you perform before writing the answer down? (Theme 1)", "answer": "- Step 1: **Re-key the subtraction on your calculator** to verify the number. Mental arithmetic under pressure is your single biggest leak — Harry caught you mis-computing $$46-25$$ in the ESAT warm-up AND getting $$OD \\approx 0.96$$ instead of $$1.42$$ in Q7c.\n- Step 2: **Size-check the result** — does the answer have the right magnitude and sign? $$6 - 1.42$$ should be \"a bit under 5,\" so if you write 0.96, alarm bells should ring. $$8 - \\frac{1}{6}$$ should be \"just under 8.\" $$46 - 25$$ should be \"in the low 20s.\"\n- Step 3: The size-check is a 2-second guard: if the written value fails, re-key immediately. This habit costs almost no time and recovers the ~6 marks that separated a B from an A on this paper.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "What is the curved-surface-area formula for a solid cylinder, and what visual intuition makes it stick? (ESAT 2)", "answer": "- Step 1: The curved surface area is $$2\\pi r h$$, where $$r$$ is the radius and $$h$$ is the height.\n- Step 2: The intuition: imagine a toilet-roll tube or wrapping-paper tube. **Cut it vertically and unfurl it** — it flattens into a rectangle.\n- Step 3: One side of that rectangle is the height $$h$$. The other side is the distance you travel around the circle — the circumference $$2\\pi r$$. So the area of the rectangle (which is the curved area) is $$(2\\pi r) \\times h = 2\\pi r h$$.\n\nThis \"unfurl the tube\" picture is the derivation; but Harry's exam advice is: *\"Ideally this is just a formula you can remember… write it down very quickly without having to draw lots of diagrams.\"* Memorise it cold for ESAT speed.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "What are the total surface area and volume formulae for a solid cylinder — and when a question says \"surface area = volume numerically,\" what's the solving strategy? (ESAT 2)", "answer": "- Step 1: Total surface area (both ends + curved side): $$S = 2\\pi r^2 + 2\\pi r h$$. Volume: $$V = \\pi r^2 h$$.\n- Step 2: The \"two ends\" contribute $$\\pi r^2 + \\pi r^2 = 2\\pi r^2$$; the curved side contributes $$2\\pi r h$$ (see Q5).\n- Step 3: When the question says $$S = V$$ numerically, set them equal and solve: $$\\pi r^2 h = 2\\pi r^2 + 2\\pi r h$$. Divide through by $$\\pi$$ immediately (it cancels). Gather the $$h$$ terms on one side, factor out $$h$$, and cancel common factors of $$r$$: $$h = \\frac{2r}{r-2}$$.\n\nThe key algebraic move is **divide by $$\\pi$$ first** — it simplifies everything and avoids carrying a useless factor.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Before writing any working on an exam question, what should you physically do to the question stem — and what should you do again when you finish? (Theme 2)", "answer": "- Step 1: **Underline every instruction word** in the stem before you write a single line of working. This includes: the form of the answer (*$$ax+by+c=0$$ with integer coefficients*, *$$p+q\\sqrt{2}$$*), the object asked for (*coordinates* vs a value), the accuracy (*1 d.p.*, *3 d.p.*), and any descriptor that picks a branch (*obtuse*).\n- Step 2: When you finish the question, **go back and physically tick off each underline**. Ask yourself: did I satisfy this requirement? If not, go fix it before moving on.\n- Step 3: This is Harry's #1 overall fix: *\"That could be the difference of a grade in every paper.\"* He told you plainly: *\"You haven't done that in this paper; the next paper I expect to see it.\"*\n\nThe underlines are your contract with
