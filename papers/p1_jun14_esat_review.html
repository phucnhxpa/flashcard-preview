 Step 3: Fix: **underline \"obtuse\"** in the stem; after computing $$\\sin^{-1}$$, ask \"is my answer between $$\\tfrac{\\pi}{2}$$ and $$\\pi$$?\" If no, take $$\\pi - (\\text{calculator value})$$ and carry that forward.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "P1 Q8(a) asked for the normal at $$P$$ \"in the form $$ax + by + c = 0$$ with integer coefficients\". Your arithmetic was correct; what marked the difference between full marks and the A you lost?", "answer": "- Step 1: You produced an equation with **fractional coefficients** and stopped. The mark scheme required integers.\n- Step 2: The fix is procedural: when you see \"integer coefficients\", your final mechanical step is to **multiply through to clear all fractions**, then verify $$a, b, c \\in \\mathbb{Z}$$ on a separate check line.\n- Step 3: For the actual numbers: $$y - 1 = -\\tfrac{6}{35}(x - 4)$$ → multiply by $$35$$ → $$35y - 35 = -6(x - 4)$$ → $$6x + 35y - 59 = 0$$, with $$a=6, b=35, c=-59$$ all integers. **The maths was already done — only the presentation lost the mark.**", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "P1 Q9(a): \"State the coordinates of the minimum of $$y = 4 \\sin\\theta$$.\" You wrote $$-4$$ (worth 1 mark of 2). What did the requirement word force, and how do you make this a reflex?", "answer": "- Step 1: \"Coordinates\" forces a **point** $$(x, y)$$, not a value. The full answer is $$(270^\\circ, -4)$$.\n- Step 2: The reflex: every time you see the word **coordinates**, ask \"does my final line have an $$x$$ AND a $$y$$, written as an ordered pair?\" If you wrote a single number, you have not finished.\n- Step 3: Closely related triggers to drill in the same way: \"value\" wants a number; \"equation\" wants $$y = \\ldots$$ or $$\\ldots = 0$$; \"point\" wants $$(x, y)$$; \"exact form\" forbids decimals.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "P1 Q5(a): you solved $$2x^3 + 3x^2 - 35x = 0$$ and got $$x = \\tfrac72$$ and $$x = -5$$ but lost a mark. What did you drop, and what is the iron rule whenever you factor out a variable?", "answer": "- Step 1: You factored $$x(2x^2 + 3x - 35) = 0$$ and then solved only the bracket, **forgetting that $$x = 0$$ itself is a root**.\n- Step 2: The iron rule: the **moment** you factor a variable $$x$$ (or $$\\sin\\theta$$, or any common factor) outside a bracket, **write down $$x = 0$$ as a root immediately**, before you touch the bracket.\n- Step 3: This applies any time the polynomial has **no constant term** — that is the structural tell. Make it a reflex: \"no constant term ⇒ zero is a root, write it first.\"", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "On P1 Q5(a), Harry also said the quadratic \"could have been factorised\". Why is factorisation preferred over the quadratic formula here, when you had the formula working?", "answer": "- Step 1: $$2x^2 + 3x - 35 = (2x - 7)(x + 5)$$. Factorisation gives the roots in one line with **no arithmetic to slip on**.\n- Step 2: The quadratic formula introduces a square root, a subtraction inside it, and several places to drop a sign — every additional arithmetic step is a chance to lose a mark.\n- Step 3: Habit: **always try integer factor pairs first** (look at the constant's factors that sum to the middle coefficient when leading is 1; otherwise split the middle term). Reach for the formula only when nothing factorises.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "P1 Q7(c): you wrote the perimeter formula but did not substitute and produce a final number. What did Harry's yellow box say, and why is \"finish even if unsure\" worth method marks?", "answer": "- Step 1: Harry wrote: \"Evaluate even if unsure. Sub in the values. This will help you to score the method marks.\"\n- Step 2: Method (M) marks reward **correct structure**, not correct final answers. If you write \"perimeter $$= 33.5 + (6 - OD) + 5$$\" with *any* number for $$OD$$, examiners can see the method and award M-marks even if the value is wrong.\n- Step 3: A blank scores zero; a substituted-but-wrong line scores partial. **Always finish** — substitute every number you have, get a final figure, **star it** to revisit if time allows. The opportunity cost of finishing is near zero.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "P1 Q1(a): on differentiating $$-\\dfrac{24}{\\sqrt x}$$, what is the operational error you should slow down to avoid, and what is the rule of thumb for negative powers? (3 steps)", "answer": "- Step 1: Rewrite $$-\\dfrac{24}{\\sqrt x} = -24 x^{-1/2}$$ before differentiating.\n- Step 2: Apply the power rule: bring down the $$-\\tfrac12$$, reduce the exponent by 1: $$-24 \\cdot (-\\tfrac12) x^{-3/2} = +12 x^{-3/2}$$. Easy slip: writing the new power as $$-\\tfrac32$$ versus accidentally writing $$+\\tfrac32$$ or $$-\\tfrac12 - 1 = -1$$ (wrong).\n- Step 3: Rule of thumb: **subtracting 1 from a negative power makes it MORE negative** ($$x^{-1/2} \\to x^{-3/2}$$). Slow down on surd/negative-power differentiation; Harry: \"the first line is the most important — a slip there has a snowball effect.\"", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Why is the first line of any working \"the most important\", per Harry — even more than later algebra? (2 steps)", "answer": "- Step 1: A slip in the first line (a wrong derivative, a wrong setup) **propagates through every subsequent line**. You can do every later step perfectly and still get zero accuracy marks.\n- Step 2: Operational rule: be **fast everywhere else**, but **slow and deliberate on the first one or two lines** — re-read the question, re-check the rewrite, then proceed at speed. The first line is a cheap insurance policy on the rest of the question.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "P1 Q2(a): to simplify $$\\dfrac{1}{4 - 2\\sqrt 2}$$, what is the standard trick and *why* does it work? (3 steps)", "answer": "- Step 1: Multiply numerator and denominator by the **conjugate** $$4 + 2\\sqrt 2$$.\n- Step 2: This works because $$(a - b)(a + b) = a^2 - b^2$$, which eliminates the surd from the denominator: $$(4 - 2\\sqrt 2)(4 + 2\\sqrt 2) = 16 - 8 = 8$$.\n- Step 3: The result is $$\\dfrac{4 + 2\\sqrt 2}{8} = \\tfrac12 + \\tfrac14 \\sqrt 2$$. The trick generalises: to rationalise $$\\dfrac{1}{a + b\\sqrt n}$$, multiply by $$\\dfrac{a - b\\sqrt n}{a - b\\sqrt n}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "P1 Q2(b) asked for the answer in form $$p + q\\sqrt 2$$. What ordering convention does that wording lock in, and why does it matter for the mark?", "answer": "- Step 1: $$p + q\\sqrt 2$$ means the **rational part first ($$p$$), the surd part second ($$q\\sqrt 2$$)** — same order the question states.\n- Step 2: Markers scan fast. A flipped order ($$10\\sqrt 2 + 10$$) can trigger a moment of doubt or even fail an automated check.\n- Step 3: Habit: when the question gives the form, **literally match the order** of the symbols in your answer. Underline the form in the stem and tick it after writing.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "P1 Q3(c) (range of $$x$$ given both area and perimeter constraints): what is the correct procedural sequence, and where did you lose the mark? (4 steps)", "answer": "- Step 1: From part (a): perimeter $$> 29 \\Rightarrow x > 1.5$$.\n- Step 2: From part (b): area $$< 72 \\Rightarrow 11x^2 - 4x - 36 < 0 \\Rightarrow (x-2)(11x + 18) < 0 \\Rightarrow -\\tfrac{18}{11} < x < 2$$.\n- Step 3: **Intersect** the two regions: keeping both constraints means $$1.5 < x < 2$$.\n- Step 4: The mark loss: Harry flagged \"more care with inequality signs\" — when (b) is \"strictly less than\", the bounds are **strict** ($$<$$, not $$\\le$$). Sign matching at the final answer was the slip.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "When you solve a quadratic on the calculator and want to write it as a factorisation, what's the trick to make the brackets actually expand back to the original quadratic? (Q3-style worry)", "answer": "- Step 1: Calculator gives roots, say $$x = 2$$ and $$x = -\\tfrac{18}{11}$$.\n- Step 2: Naive brackets $$(x - 2)(x + \\tfrac{18}{11})$$ expand to give a coefficient of $$1$$ for $$x^2$$, **not** the original $$11$$.\n- Step 3: Clear the fraction in the second bracket by multiplying that factor by $$11$$: write $$(x - 2)(11x + 18)$$. Now expansion gives $$11x^2 - \\ldots - 36$$ — matching the original. **Habit: write factors so they expand back to the original leading coefficient**, not just to capture the roots.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "P1 Q4: you got $$\\dfrac45 x^{5/2} + x^{1/2} + C$$ from integrating $$\\dfrac{4x^2 + 1}{2\\sqrt x}$$. Harry said \"leave it like that\". Why was *not* simplifying further the right call? (3 steps)", "answer": "- Step 1: The answer is already in **a correct simplest form** — power-of-$$x$$ form, with both terms reduced.\n- Step 2: Rewriting again (e.g., back to surds, factoring, combining) introduces extra arithmetic where you can slip and **lose a mark you already have**.\n- Step 3: Markers mark fast — a clean, recognisable form makes their life easy. Habit: **stop the moment you reach a correct simplest form**; don't gild a finished answer.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "P1 Q4: how do you handle dividing a polynomial-numerator by $$2\\sqrt x$$ before integrating, and what's the underlying principle?", "answer": "- Step 1: Rewrite $$2\\sqrt x = 2 x^{1/2}$$, then **split the fraction term by term**: $$\\dfrac{4x^2 + 1}{2 x^{1/2}} = \\dfrac{4x^2}{2x^{1/2}} + \\dfrac{1}{2x^{1/2}} = 2x^{3/2} + \\tfrac12 x^{-1/2}$$.\n- Step 2: The principle is to **reduce every term to $$a x^n$$ form** before integrating; the power rule for integration only applies term-by-term to such monomials.\n- Step 3: Then integrate term by term: $$\\int 2x^{3/2} dx = \\tfrac45 x^{5/2}$$, $$\\int \\tfrac12 x^{-1/2} dx = x^{1/2}$$, add $$+C$$.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "P1 Q5(b): you had $$2(y-5)^6 + 3(y-5)^4 - 35(y-5)^2 = 0$$. What is the structural recognition that makes this a \"hidden quadratic/cubic\", and what is the substitution?", "answer": "- Step 1: All exponents on $$(y-5)$$ are **even**: $$6, 4, 2$$. Substitute $$u = (y-5)^2$$ so $$(y-5)^4 = u^2$$ and $$(y-5)^6 = u^3$$.\n- Step 2: The equation becomes $$2u^3 + 3u^2 - 35u = 0$$ — **exactly the same cubic as part (a)**. So you've already done the hard work.\n- Step 3: Crucially, $$u = (y-5)^2 \\ge 0$$, so you **reject negative roots** of the $$u$$-cubic. Then back-substitute on the valid $$u$$ values to find $$y$$. Trigger: \"even powers everywhere\" ⇒ substitute the square.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "When you take square roots to solve $$(y-5)^2 = \\tfrac72$$, what is Harry's routine for handling the $$\\pm$$, and why does it matter? (3 steps)", "answer": "- Step 1: Square-rooting both sides gives $$y - 5 = \\pm \\sqrt{\\tfrac72}$$.\n- Step 2: Harry's tactic: **put the $$\\pm$$ on the side with the numbers**, never on the side with the variable. So $$y = 5 \\pm \\sqrt{\\tfrac72} = 5 \\pm \\dfrac{\\sqrt{14}}{2}$$.\n- Step 3: This matters because you must report **both** solutions (each is a separate mark), and putting $$\\pm$$ on the variable side risks dropping one when you write the final boxed answer.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "P1 Q6: a line $$y = 4x + c$$ meets the curve $$y = x(x-3)$$ at exactly one point. What is the standard tactic, what equation does \"exactly one point\" force, and why? (3 steps)", "answer": "- Step 1: Set the two equations equal: $$4x + c = x^2 - 3x \\Rightarrow x^2 - 7x - c = 0$$.\n- Step 2: \"Exactly one intersection\" means the resulting quadratic has **exactly one root**, i.e., a repeated root.\n- Step 3: A repeated root forces **discriminant $$= 0$$**: $$b^2 - 4ac = 0$$. The tangent-to-curve scenario *always* reduces to setting discriminant $$=0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "P1 Q7(a): a sector with the inside angle $$0.7$$ rad cut out. What is the sector angle of the **remaining** sector (the one you actually compute), and why?", "answer": "- Step 1: A full circle has $$2\\pi$$ rad. The shape uses the *reflex* sector — the one **outside** the $$0.7$$-rad slice.\n- Step 2: So the sector angle to use is $$\\theta = 2\\pi - 0.7 \\approx 5.58$$ rad.\n- Step 3: Sector area $$= \\tfrac12 r^2 \\theta = \\tfrac12 (6)^2 (2\\pi - 0.7) \\approx 100.5$$ cm². Habit: **draw the figure mentally and identify which sector you need** — full minus the cut, not the cut itself.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "P1 Q7(c): after finding $$OD \\approx 1.42$$ and arc $$ABC = 33.5$$, how do you assemble the perimeter of the *combined* shape $$ABCDA$$, and what is the easy slip?", "answer": "- Step 1: The perimeter is the **boundary** of the whole shape: arc $$ABC$$ + line $$CD$$ + line $$DA$$. (No $$OA$$ or $$OC$$ — those are inside.)\n- Step 2: $$CD = OC - OD = 6 - 1.42 = 4.58$$ (this is the subtraction that bit you when you mis-wrote $$OD$$).\n- Step 3: Perimeter $$= 33.5 + 4.58 + 5 \\approx 43.1$$ cm. The slip: confusing the \"$$O$$\" segment (interior, not on perimeter) with the actual boundary lengths. **Draw the boundary and trace it once with your pen before adding.**", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "P1 Q8(b): once you know $$f'(x)$$, how do you find $$f(x)$$ given that the curve passes through a specific point $$P(4, 1)$$? (3 steps)", "answer": "- Step 1: Integrate $$f'(x)$$ term-by-term to get a general antiderivative with an unknown constant: $$f(x) = \\tfrac83 x^{3/2} - 2x + \\tfrac{8}{3x} + C$$.\n- Step 2: Substitute the known point $$P(4, 1)$$: $$1 = f(4)$$. Compute $$f(4)$$ with $$C$$ unknown and **solve for $$C$$**.\n- Step 3: Plug $$C$$ back into the general form. The \"passes through\" condition is what nails down the constant; without it, you'd have a family of curves.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "P1 Q10(c): the tangent at the turning point $$x = \\tfrac52$$ has the form $$y = k$$. When you saw \"find the tangent\" you started to draw a vertical line. What did Harry correct, and what is the rule?", "answer": "- Step 1: At a turning point, $$f'(x) = 0$$, i.e., the gradient is **zero**.\n- Step 2: A zero-gradient tangent is **horizontal**: $$y = k$$ where $$k$$ is the $$y$$-value of the turning point. A *vertical* line corresponds to *infinite* gradient (very different).\n- Step 3: So you don't need point-slope form at all — just compute $$k = f(\\tfrac52) = -54$$ and write $$y = -54$$. **Habit: zero gradient ⇒ horizontal line $$y = k$$; infinite gradient ⇒ vertical line $$x = h$$. Know both shapes instantly.**", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "P1 Q10(d): \"$$y = f(x + a)$$ passes through the origin; state the possible values of $$a$$.\" What is Harry's preferred approach for transformation questions like this, and why? (3 steps)", "answer": "- Step 1: Recognise: $$y = f(x + a)$$ is the graph of $$f$$ shifted **horizontally** by $$-a$$. \"Passes through $$O = (0, 0)$$\" means the new graph hits $$y = 0$$ at $$x = 0$$.\n- Step 2: Algebraically, $$f(0 + a) = 0 \\Rightarrow f(a) = 0$$ — so $$a$$ must be a **root** of $$f$$. From the sketch of $$f(x) = (x-4)(2x+1)^2$$, the roots are $$x = 4$$ and $$x = -\\tfrac12$$.\n- Step 3: So $$a = 4$$ or $$a = -\\tfrac12$$. Harry's principle: **for transformation questions, use the sketch, not the algebra** — graphically reading off the roots is faster and less error-prone than expanding $$f(a)$$ as a polynomial.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Q10(d) ends \"state the possible values of $$a$$\" — what linguistic clue tells you to expect more than one answer, and how do you make this a habit?", "answer": "- Step 1: The word **\"values\" (plural)** is the cue. If only one answer were expected, the question would say \"the value of $$a$$\".\n- Step 2: Habit: **scan the requirement words for plurality** — \"values\", \"solutions\", \"points\", \"intersections\", \"roots\" — and assume you need ≥2 answers.\n- Step 3: Combined with Theme 2 (underline requirements), this prevents the failure mode of writing one root and stopping when the mark scheme wants both.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "P1 Q9(c): count solutions of $$\\tan\\theta = 1 + \\sin\\theta$$ in (i) $$0 \\le \\theta \\le 2160^\\circ$$ and (ii) $$0 \\le \\theta \\le 1980^\\circ$$. What is the periodicity strategy? (3 steps)", "answer": "- Step 1: $$\\tan\\theta$$ has period $$180^\\circ$$, $$1 + \\sin\\theta$$ has period $$360^\\circ$$. So the **combined pattern of intersections repeats every $$360^\\circ$$**.\n- Step 2: **Count solutions in one $$360^\\circ$$ window** (the fundamental period). Then multiply by the number of complete periods in the range: (i) $$2160 / 360 = 6$$ periods exactly; (ii) $$1980 / 360 = 5.5$$ periods.\n- Step 3: For (ii), handle the half-period by **counting solutions in the first half** of the period (e.g., $$0$$ to $$180^\\circ$$) and adding. Endpoint corrections matter: check whether the range is closed and whether $$\\theta = 0$$ or the upper bound is a solution.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "When you spot $$\\tan\\theta = 1 + \\sin\\theta$$ in a range much larger than $$360^\\circ$$, why is it foolish to try to solve algebraically and what is the right mental model? (2 steps)", "answer": "- Step 1: Algebraically this becomes $$\\sin\\theta = \\cos\\theta + \\sin\\theta \\cos\\theta$$ — messy, multiple solutions per period, and you'd have to hunt every one across the range manually. Not tractable in exam time.\n- Step 2: Right mental model: **sketch both curves on one set of axes for one period**, count crossings visually, then multiply by the number of periods (with care for partial periods and endpoints). The graph does the bookkeeping for you.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Theme 4 summary: what is the operational rule for \"what to do when you are stuck on a part\", and what is the worst-case mark cost of stopping vs. of writing wrong numbers?", "answer": "- Step 1: Operational rule: **never leave a part blank**. Write the relevant formula, substitute every number you have, produce a final figure (even if you suspect it's wrong), **mark it with a star** to revisit if time allows.\n- Step 2: Worst case of stopping: **zero marks** for the part.\n- Step 3: Worst case of finishing with wrong values: you still get **method (M) marks** for the correct setup. So the asymmetry is huge — finishing has near-zero downside.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "What is the \"underline / tick\" procedural loop Harry wants on every P1 question, executed in two physical passes? (3 steps)", "answer": "- Step 1: **Before writing any working**: read the stem and *physically underline* every instruction word — the form of the answer, the object asked (value vs coordinates), the accuracy (1 d.p., 3 d.p.), and any branch descriptor (obtuse, positive, integer).\n- Step 2: **After producing an answer**: go back to the stem and physically *tick over each underline*, confirming you satisfied that requirement. If a tick can't go on, you haven't finished.\n- Step 3: This is the single biggest grade-changing habit per Harry: \"that could be the difference of a grade in every paper.\"", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "What are the eight requirement triggers from this lesson that should each get an underline + tick before you stop? (List them as separate triggers.)", "answer": "- Step 1: Form/structure triggers:\n+ \"$$ax + by + c = 0$$ with integer coefficients\" → clear fractions, check $$a, b, c \\in \\mathbb{Z}$$.\n+ \"$$p + q\\sqrt 2$$ (or $$a + b\\sqrt 2$$)\" → rational part first, surd second.\n+ Exact form (no decimals).\n- Step 2: Object triggers:\n+ **\"Coordinates\"** → answer with $$(x, y)$$, not a single number.\n+ **\"Values\" (plural)** → expect ≥2 answers.\n- Step 3: Branch/condition triggers:\n+ **\"Obtuse\"** → reject the calculator's acute $$\\sin^{-1}$$; take $$\\pi - \\text{result}$$.\n+ **\"Conditional / picked at random … that\"** → restricted sample space; divide by row total.\n+ Accuracy: \"1 d.p.\", \"3 d.p.\", \"3 s.f.\" → round to exactly that.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "Pearson mark-scheme nuance from Q2(a): the question asks for $$a, b$$ \"rational\". You worried it required fractions because the answer is $$\\tfrac12 + \\tfrac14 \\sqrt 2$$. Why is the answer correct anyway, and what's the broader lesson?", "answer": "- Step 1: **Whole numbers ARE rational** ($$10 = \\tfrac{10}{1}$$, etc.), so any integer or fraction counts. The mark scheme allows it.\n- Step 2: The broader lesson: **know your number-set hierarchy** — naturals ⊂ integers ⊂ rationals ⊂ reals. \"Rational\" only excludes irrational/surd answers, not integers.\n- Step 3: Don't doubt an answer that fits the wording — wasting time second-guessing a correct answer is itself a slip.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Why is \"expand brackets to check the leading coefficient\" a critical sanity check whenever you factorise a quadratic? (Q3-related)", "answer": "- Step 1: Markers (and especially the mark scheme) sometimes require the **original** quadratic to come back from your factored form — not just the same roots.\n- Step 2: If your brackets give the right roots but the wrong leading coefficient (e.g., expanding to $$x^2$$ when the original was $$11x^2$$), you may lose marks for an \"incorrect factorisation\" even though your solutions are right.\n- Step 3: Quick check: mentally expand the brackets and confirm the $$x^2$$ coefficient matches. If not, redistribute factors (e.g., $$(x-2)(x + \\tfrac{18}{11})$$ → $$(x-2)(11x + 18)$$).", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "Harry called Q7 \"the costliest question\" of the paper. What were the three distinct execution failures it contained — each a different theme?", "answer": "- Step 1: **(b) — Branch failure (Theme 2):** Didn't underline \"obtuse\", used the calculator's acute $$\\sin^{-1}$$ result $$0.884$$ instead of $$\\pi - 0.884 = 2.258$$.\n- Step 2: **(c) — Careless subtraction (Theme 1):** Mis-evaluated $$OD$$ as $$0.96$$ instead of $$\\approx 1.42$$, then propagated through $$CD$$ and the perimeter.\n- Step 3: **(c) — Blank space (Theme 4):** Stopped writing without substituting and finishing, so no method marks were salvaged. One question; three themes; ~3 marks lost.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "What is the \"first instinct → redirect\" lesson from ESAT 1 about variables vs. organisation, and where else in your practice should you apply it?", "answer": "- Step 1: First instinct on a multi-fact problem is often to **name variables** ($$x, y, z$$) and write equations. This works when the problem has *relations*, but fails when it has *categorised counts*.\n- Step 2: Redirect: ask \"is this a **counting / categorising** problem?\" If yes, use a **table** (or a Venn diagram for set overlap, or a tree for conditional events).\n- Step 3: Apply the same instinct elsewhere: probability problems with multiple categories → two-way table; sequence with cases → table of $$n$$ vs $$a_n$$; transformation chain → diagram, not algebra. The principle: **match the data structure to the problem type**.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Why is the order of deductions matters when filling a two-way table — and what is Harry's golden rule?", "answer": "- Step 1: You can only deduce a cell when **its row and column have enough known entries** to subtract from the total. Trying to fill all cells at once leads to errors.\n- Step 2: Harry's rule: \"**Don't go for it. Do it one step at a time.**\" Pick one row or column with only one unknown, fill that cell, then look for the next row/column with only one unknown, and repeat.\n- Step 3: This is exactly how you fill a Sudoku — and it gets the bookkeeping right without algebra. Tick off each datum as you place it.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "What is the right relationship between past-paper practice and revision, per Harry? Why is \"do the paper first\" more efficient than \"revise first, then do the paper\"?", "answer": "- Step 1: Doing the paper **first** reveals your actual weaknesses — the specific topics where you slip in exam conditions. Generic revision before the paper assumes you know what to focus on.\n- Step 2: After the paper, your revision becomes **targeted**: re-derive the things you actually got wrong, not the things you already know.\n- Step 3: Harry's volume rule: ~3 past papers per weekend, each followed by *reflective* revision. Volume builds pattern recognition; reflection turns each mistake into a habit fix.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "\"Method requires the numerical values substituted.\" What does this mean for the Pearson mark scheme, and how does it shape your exam-room behaviour? (3 steps)", "answer": "- Step 1: M-marks (\"method marks\") are typically awarded only when you **substitute actual numbers** into a correct formula — not just for writing the formula symbolically.\n- Step 2: So \"perimeter $$= $$ arc $$+ CD + DA$$\" gets you almost nothing; \"perimeter $$= 33.5 + (6 - OD) + 5$$\" with a numerical $$OD$$ scores the M-mark.\n- Step 3: Behaviour: every formula you write down, **immediately substitute the numbers** below it. Symbolic-only working is a partial-credit trap.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Surds and integration trick: when you see $$\\dfrac{P(x)}{2\\sqrt x}$$ or similar, what is the standard pre-processing step before any calculus moves?", "answer": "- Step 1: Convert the surd to a power: $$2\\sqrt x = 2 x^{1/2}$$.\n- Step 2: **Split the fraction term-by-term**, dividing each term of the numerator by the denominator individually. Each term becomes $$c \\cdot x^n$$ for some $$n$$ (possibly negative or fractional).\n- Step 3: Now both differentiation and integration work term-by-term with the power rule. The pre-processing is what makes calculus on rational/surd expressions tractable.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "What is the sector-area formula in radians, and why does it look so different from the degree version?", "answer": "- Step 1: In radians: $$\\text{Area} = \\tfrac12 r^2 \\theta$$.\n- Step 2: Why: by definition, $$\\theta$$ rad corresponds to an arc length $$r\\theta$$, and a full circle is $$2\\pi$$ rad. The fraction of the disc covered by angle $$\\theta$$ is $$\\tfrac{\\theta}{2\\pi}$$, so area $$= \\tfrac{\\theta}{2\\pi} \\cdot \\pi r^2 = \\tfrac12 r^2 \\theta$$.\n- Step 3: In degrees you'd need $$\\tfrac{\\theta}{360} \\cdot \\pi r^2$$ — clunkier. Radians make sector and arc formulae clean because they're built around the unit circle.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "What is the arc-length formula in radians, and how do you spot when to use it on a shape with mixed straight and curved boundary?", "answer": "- Step 1: Arc length $$= r\\theta$$ (in radians).\n- Step 2: When a shape's perimeter includes a curved piece (sector or partial circle), **identify which sector angle is on the boundary**, then add $$r\\theta$$ to the straight pieces.\n- Step 3: Easy slip on Q7: confusing the cut-out angle ($$0.7$$) with the boundary angle ($$2\\pi - 0.7$$). Draw, then circle the boundary.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "What is the cosine rule's cousin — the sine rule — and what is the operational rule for \"when to use which\"? (3 steps)", "answer": "- Step 1: Sine rule: $$\\dfrac{a}{\\sin A} = \\dfrac{b}{\\sin B} = \\dfrac{c}{\\sin C}$$. Use when you have **a side + its opposite angle**, plus one other side or angle.\n- Step 2: Cosine rule: $$a^2 = b^2 + c^2 - 2bc \\cos A$$. Use when you have **all three sides** (find an angle) or **two sides + their included angle** (find the third side).\n- Step 3: Q7(b) used sine rule because you had side $$AD = 5$$ opposite angle $$0.7$$, and side $$AO = 6$$ opposite the unknown angle $$ADO$$.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "Why does Q5(b)'s rejection of $$u = -5$$ matter, and what is the general principle for substitutions like $$u = (\\text{something})^2$$?", "answer": "- Step 1: $$u = (y-5)^2$$ means $$u$$ is a square, so $$u \\ge 0$$ for all real $$y$$.\n- Step 2: When you solve the polynomial in $$u$$, any negative root has **no real preimage** — it cannot correspond to a real $$y$$.\n- Step 3: General principle: after a substitution, **state the range/sign of the new variable** and reject roots outside that range *before* back-substituting. Forgetting to reject means you'll write down spurious \"solutions\" for $$y$$ that aren't real.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "Why is \"stop at a correct simplest form\" not a lazy habit but actually a mark-protection habit? (2 steps)", "answer": "- Step 1: Every additional manipulation is an additional chance to make an arithmetic or notation slip — and once you've slipped, you've **degraded a fully-correct answer to a partially-correct one**.\n- Step 2: Markers reward correct simplest form, not maximally compressed form. If both $$\\tfrac45 x^{5/2} + x^{1/2} + C$$ and $$\\tfrac{x^{1/2}(4x^2 + 5)}{5} + C$$ score equally, write the easier one. Habit: **finish, present cleanly, stop.**", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "What does Harry mean by \"the calculator's $$\\sin^{-1}$$ only gives the acute angle\"? Make the trig precise. (3 steps)", "answer": "- Step 1: $$\\sin^{-1}: [-1, 1] \\to [-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2}]$$ — the **principal value** branch. So it returns angles only in the range $$-90^\\circ$$ to $$90^\\circ$$ (equivalently, in $$[0, \\tfrac{\\pi}{2}]$$ for positive inputs).\n- Step 2: But $$\\sin\\theta$$ is **two-to-one** on $$[0, \\pi]$$: for any $$\\sin\\theta = k$$ with $$0 < k < 1$$, the equation has *two* solutions in this interval — one acute and one obtuse.\n- Step 3: To recover the obtuse one: $$\\theta_{\\text{obtuse}} = \\pi - \\theta_{\\text{acute}}$$ (using the identity $$\\sin(\\pi - \\theta) = \\sin\\theta$$). Habit: whenever the problem specifies \"obtuse\", apply this complement step.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "Suppose a problem requires the line through $$(4, -3)$$ with gradient $$\\tfrac52$$. What is the operationally safest way to write the tangent equation, and where do students typically slip? (3 steps)", "answer": "- Step 1: Start from point-slope: $$y - y_1 = m(x - x_1)$$ with $$(x_1, y_1) = (4, -3)$$, $$m = \\tfrac52$$. So $$y - (-3) = \\tfrac52 (x - 4)$$, i.e., $$y + 3 = \\tfrac52(x - 4)$$.\n- Step 2: Expand and rearrange to $$y = mx + c$$ form: $$y = \\tfrac52 x - 10 - 3 = \\tfrac52 x - 13$$.\n- Step 3: Typical slips: (a) writing $$y - (-3)$$ as $$y - 3$$ (sign error); (b) distributing the $$\\tfrac52$$ wrong over $$(x-4)$$. Mitigation: write $$y - (-3)$$ in *one explicit line* before simplifying, and double-check the constant after distributing.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "Mental subtraction drill — what is the **size-check** mindset that catches careless errors? Give two concrete examples from the lesson. (3 steps)", "answer": "- Step 1: Before writing a subtraction result, **predict its magnitude** (\"should be about X\"). Then check that what you wrote matches.\n- Step 2: Examples:\n+ $$6 - 1.42$$: should be \"a bit under 5\" (close to $$4.6$$). If you write $$5.04$$ for $$6 - 0.96$$, that's \"a bit over 5\" — different. If you write something like $$4.04$$ or $$0.96$$, the magnitude is wrong.\n+ $$21 - 12$$: should be \"around 9\" (a single-digit difference). If you write $$19$$, the magnitude is wildly wrong — that's a two-digit answer.\n- Step 3: Habit: never write a subtraction result without a one-second magnitude check.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "$$f'(4) = 4\\sqrt 4 - 2 - \\dfrac{8}{3(4)^2}$$. What is the value, and where is the slip-prone step? (3 steps)", "answer": "- Step 1: $$4\\sqrt 4 = 4 \\cdot 2 = 8$$.\n- Step 2: $$\\dfrac{8}{3 \\cdot 16} = \\dfrac{8}{48} = \\dfrac{1}{6}$$. (Slip-prone: cancelling $$\\dfrac{8}{48}$$ correctly to $$\\dfrac16$$ rather than $$\\dfrac18$$ or $$\\dfrac{1}{4}$$.)\n- Step 3: $$f'(4) = 8 - 2 - \\tfrac16 = 6 - \\tfrac16 = \\tfrac{36 - 1}{6} = \\tfrac{35}{6}$$. The slip-prone step is the **fraction subtraction $$6 - \\tfrac16$$** — re-key or convert to a common denominator deliberately.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": false}, {"question": "P1 Q9(b): sketch $$y = 1 + \\sin\\theta$$ on the given axes. What's the rule for sketching $$y = c + \\sin\\theta$$, and what does it look like?", "answer": "- Step 1: $$y = 1 + \\sin\\theta$$ is the **standard sine curve shifted up by 1 unit**.\n- Step 2: Range: $$\\sin\\theta \\in [-1, 1]$$, so $$1 + \\sin\\theta \\in [0, 2]$$. The curve touches the $$\\theta$$-axis at $$\\theta = 270^\\circ$$ (where $$\\sin = -1$$) and reaches its max of $$2$$ at $$\\theta = 90^\\circ$$.\n- Step 3: Period is unchanged ($$360^\\circ$$). Habit: vertical shifts $$y = f(\\theta) + c$$ move the whole graph up by $$c$$ — they do not change the period, the amplitude, or the horizontal positions of features.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": false}, {"question": "How do you sketch $$y = \\tan\\theta$$ on $$0 \\le \\theta \\le 360^\\circ$$, and what features must be visible?", "answer": "- Step 1: Period is $$180^\\circ$$, so there are **two complete branches** on $$[0, 360^\\circ]$$: one on $$[0, 180^\\circ]$$, one on $$[180^\\circ, 360^\\circ]$$.\n- Step 2: **Vertical asymptotes** at $$\\theta = 90^\\circ$$ and $$\\theta = 270^\\circ$$ (where $$\\cos\\theta = 0$$). Mark them as dashed vertical lines.\n- Step 3: Each branch starts at $$-\\infty$$ (just after an asymptote), passes through zero at $$\\theta = 0, 180^\\circ, 360^\\circ$$, and rises to $$+\\infty$$ (just before the next asymptote). The curve never crosses an asymptote.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": true}, {"question": "Why do we care about underlining \"obtuse\" specifically, vs. just doing $$\\sin^{-1}$$ and trusting the calculator? Build the intuition. (3 steps)", "answer": "- Step 1: For a **triangle** with three positive angles summing to $$\\pi$$, an angle can be acute ($$<\\tfrac{\\pi}{2}$$) or obtuse ($$\\in (\\tfrac{\\pi}{2}, \\pi)$$). $$\\sin$$ takes the same value at both, so the sine rule alone is ambiguous.\n- Step 2: The problem statement disambiguates: \"given that angle $$ADO$$ is obtuse\". The calculator does not know this; it just returns the principal value (the acute one).\n- Step 3: So underlining \"obtuse\" is the only way you remember to **override the calculator's default** and report $$\\pi - \\theta_{\\text{acute}}$$ instead. This is the \"ambiguous case\" of the sine rule.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": true}, {"question": "What is the \"scoreboard\" mindset — what should you think when planning revision after seeing your raw mark vs. the boundary? (3 steps)", "answer": "- Step 1: Compute the **mark gap to the next grade boundary**. For your B at $$54/75$$, the A boundary needs about $$60/75$$ — a gap of $$6$$.\n- Step 2: Audit where those marks went on the paper: were they conceptual (new topic needed) or executional (slip)?\n- Step 3: For executional gaps (like yours), the fix is **habit drills (mental subtraction, underline-and-tick)**, not topic revision. For conceptual gaps, revise the topic. The mindset shift: **most grade boundaries are bridged by habit, not knowledge.**", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": true}, {"question": "What is the right amount of past-paper practice per weekend, per Harry, and what's the reasoning behind \"volume + reflection\"?", "answer": "- Step 1: Harry's target: **~3 past papers per weekend**.\n- Step 2: Reasoning for volume: pattern recognition — under exam conditions you start *feeling* triggers (obtuse, conditional, integer coefficients) instead of consciously deducing them. Volume builds those feelings.\n- Step 3: Reasoning for reflection: without going back through your slips and naming each habit fix, volume alone just re-burns the same mistakes. Each paper should be followed by a short audit: which themes hit me? what's my next-paper micro-fix?", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": false}], "count": 60}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 20353, "out_tokens": 17976, "reasoning_chars": 5185, "cost_eur": 0.0775, "elapsed_s": 576, "content_chars": 54468}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 20353, "out_tokens": 28735, "reasoning_chars": 4604, "cost_eur": 0.1122, "elapsed_s": 470, "content_chars": 90011}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 20353, "out_tokens": 18265, "reasoning_chars": 4970, "cost_eur": 0.0785, "elapsed_s": 393, "content_chars": 55743}, "kimi_1": {"run": 1, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.7, "in_tokens": 19297, "out_tokens": 24483, "reasoning_chars": 48379, "cost_eur": 0.1181, "elapsed_s": 117, "content_chars": 37248}, "kimi_2": {"run": 2, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.8, "in_tokens": 19297, "out_tokens": 23737, "reasoning_chars": 55838, "cost_eur": 0.1149, "elapsed_s": 550, "content_chars": 33588}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 18615, "out_tokens": 19810, "reasoning_chars": 2509, "cost_eur": 0.0235, "elapsed_s": 150, "content_chars": 59350}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 18615, "out_tokens": 13674, "reasoning_chars": 2197, "cost_eur": 0.0173, "elapsed_s": 111, "content_chars": 43676}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 29887, "out_tokens": 24266, "reasoning_chars": 0, "cost_eur": 2.0868, "elapsed_s": 327, "content_chars": 54488}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 29887, "out_tokens": 21660, "reasoning_chars": 0, "cost_eur": 1.907, "elapsed_s": 305, "content_chars": 48429}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 20892, "out_tokens": 3051, "reasoning_chars": 5308, "cost_eur": 0.0072, "elapsed_s": 46, "content_chars": 6030}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.75, "in_tokens": 20892, "out_tokens": 3297, "reasoning_chars": 2813, "cost_eur": 0.0075, "elapsed_s": 51, "content_chars": 8625}, "qwen_3": {"run": 3, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 20892, "out_tokens": 3549, "reasoning_chars": 3552, "cost_eur": 0.0078, "elapsed_s": 56, "content_chars": 8784}, "qwen_4": {"run": 4, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.85, "in_tokens": 20892, "out_tokens": 4541, "reasoning_chars": 3988, "cost_eur": 0.0089, "elapsed_s": 67, "content_chars": 11496}}};
const SK='p1_jun14_esat_review';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
