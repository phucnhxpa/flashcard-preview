 or value? (point vs. number)\n- Which root / which range? (all solutions, correct interval)\n- Obtuse / acute? (branch specification)\n- Conditional / restricted sample space? (row total vs. grand total)\n- Form $ax + by + c = 0$ with integers? (clear fractions)\n- Did I finish? (no blank parts — substitute and evaluate)\n\n**Takeaway:** This 9-point checklist, applied to every question, would recover your ~6 lost marks.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Why does the sector area formula use $\\frac{1}{2}r^2\\theta$, and what's the geometry behind it? (Q7)", "answer": "- Step 1: A full circle area is $\\pi r^2$, which is $\\frac{1}{2}r^2 \\times 2\\pi$ — the $2\\pi$ is the full angle\n- Step 2: A sector is a fraction of a circle: if the angle is $\\theta$ (in radians), the fraction is $\\frac{\\theta}{2\\pi}$\n- Step 3: So sector area = $\\frac{\\theta}{2\\pi} \\times \\pi r^2 = \\frac{1}{2}r^2\\theta$\n- Step 4: In Q7, the sector angle is the reflex angle $2\\pi - 0.7$, giving area $= \\frac{1}{2}(6)^2(2\\pi - 0.7) = 100.5$ cm²\n\n**Takeaway:** $\\frac{1}{2}r^2\\theta$ for radians; $\\frac{\\theta}{360} \\times \\pi r^2$ for degrees.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In Q8(b), when integrating $f'(x) = 4\\sqrt{x} - 2 - \\frac{8}{3x^2}$, what's the correct power-by-power integration, and what common error trips students up? (Q8)", "answer": "- Step 1: Rewrite with powers: $f'(x) = 4x^{1/2} - 2 - \\frac{8}{3}x^{-2}$\n- Step 2: Integrate term-by-term: $$\\int 4x^{1/2}dx = 4 \\times \\frac{2}{3}x^{3/2} = \\frac{8}{3}x^{3/2}$$ $$\\int -2\\,dx = -2x$$ $$\\int -\\frac{8}{3}x^{-2}dx = -\\frac{8}{3} \\times (-1)x^{-1} = \\frac{8}{3}x^{-1} = \\frac{8}{3x}$$\n- Step 3: Common error: forgetting to add $C$, or mis-integrating the $x^{-2}$ term (the negative exponent gives a negative power after integration: $-2$ becomes $+1$, so $-2 + 1 = -1$)\n- Step 4: Use the point $P(4, 1)$ to find $C = -13$\n\n**Takeaway:** $\\int x^n dx = \\frac{x^{n+1}}{n+1} + C$ for $n \\neq -1$. Watch the signs on negative exponents.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "For the graph transformation $y = f(x + a)$ in Q10(d), what's the horizontal translation rule, and how do you read $a$ from a sketch? (Q10)", "answer": "- Step 1: $y = f(x + a)$ shifts the graph of $y = f(x)$ **left** by $a$ units (positive $a$ shifts left, negative $a$ shifts right)\n- Step 2: For the transformed graph to pass through the origin $O(0, 0)$, we need $f(a) = 0$ — the point $x = 0$ on the new graph corresponds to $x = a$ on the original\n- Step 3: Visually: the original graph has x-intercepts at $x = -\\frac{1}{2}$ and $x = 4$. To bring either of these to the origin, shift left by $-\\frac{1}{2}$ (i.e., $a = -\\frac{1}{2}$) or left by $4$ (i.e., $a = 4$)\n- Step 4: These are the two possible values: $a = -\\frac{1}{2}$ or $a = 4$\n\n**Takeaway:** $y = f(x + a)$ shifts left by $a$. For \"passes through origin,\" shift a root to $x = 0$.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "In Q2(b), when solving $4x = 2\\sqrt{2}\\,x + 20\\sqrt{2}$, what's the cleanest approach to get the answer in the form $p + q\\sqrt{2}$? (Q2)", "answer": "- Step 1: Collect the $x$ terms on one side: $4x - 2\\sqrt{2}\\,x = 20\\sqrt{2}$ → $x(4 - 2\\sqrt{2}) = 20\\sqrt{2}$\n- Step 2: Solve for $x$: $x = \\frac{20\\sqrt{2}}{4 - 2\\sqrt{2}}$\n- Step 3: Rationalize the denominator using the conjugate $4 + 2\\sqrt{2}$: $$x = \\frac{20\\sqrt{2}(4 + 2\\sqrt{2})}{(4 - 2\\sqrt{2})(4 + 2\\sqrt{2})} = \\frac{20\\sqrt{2}(4 + 2\\sqrt{2})}{16 - 8} = \\frac{20\\sqrt{2}(4 + 2\\sqrt{2})}{8}$$\n- Step 4: Simplify: $= \\frac{20\\sqrt{2}}{8} \\times 4 + \\frac{20\\sqrt{2}}{8} \\times 2\\sqrt{2} = \\frac{5\\sqrt{2}}{1} \\times 1 + \\frac{5}{1} \\times 2 = 10\\sqrt{2} + 10 = 10 + 10\\sqrt{2}$\n\n**Takeaway:** Collect like terms (with and without surds), then rationalize. Write the rational part first: $p + q\\sqrt{2}$.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "In Q6(b), after finding $c = -\\frac{49}{4}$ for the tangent condition, how do you find the exact point of intersection, and why is it a \"double root\"? (Q6)", "answer": "- Step 1: With $c = -\\frac{49}{4}$, the intersection equation becomes $x^2 - 7x + \\frac{49}{4} = 0$\n- Step 2: Recognize this as a perfect square: $(x - \\frac{7}{2})^2 = 0$ — this is why it's a tangent, not two intersections\n- Step 3: The repeated root is $x = \\frac{7}{2} = 3.5$\n- Step 4: Find $y$ by substituting into either equation: $y = 4(\\frac{7}{2}) - \\frac{49}{4} = 14 - \\frac{49}{4} = \\frac{56 - 49}{4} = \\frac{7}{4}$\n\n**Takeaway:** Discriminant = 0 gives a repeated root → the line touches the curve at exactly one point (tangent).", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "When reviewing your marked script, what's the difference between a \"careless\" error and a \"requirement\" error, and why does the distinction matter? (Themes 1-2)", "answer": "- Step 1: **Careless errors** are execution slips: wrong arithmetic ($46-25 = 21$ vs. 9), wrong calculator input, sign errors in differentiation\n- Step 2: **Requirement errors** are reading failures: not underlining \"obtuse\" so you pick the wrong branch, not underlining \"coordinates\" so you give a value instead of a point, not underlining \"integers\" so you leave fractions in $ax + by + c = 0$\n- Step 3: Both cost ~1 mark each, but careless errors happen despite correct method; requirement errors happen because you didn't read what was asked\n- Step 4: Both are fixed by habits (re-key arithmetic; underline + tick off requirements), not by learning more topics\n\n**Takeaway:** You lost ~6 marks to habits, not knowledge. Fix the habits, keep the knowledge.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": true}, {"question": "What are the exact steps in the 12-item mental subtraction drill that directly relate to errors in the lesson? (Drill A)", "answer": "- Item 1-3: Integer subtractions from the ESAT table ($46-25 = 21$, $21-12 = 9$, $93-36 = 57$) — the $21-12 = 18$ slip that cost ESAT\n- Item 4: $6 - 1.42 = 4.58$ — the Q7(c) subtraction that gave wrong $CD$\n- Item 5: $8 - 2 - \\frac{1}{6} = \\frac{35}{6}$ — the Q8(a) gradient calculation\n- Item 6: $\\frac{56}{4} - \\frac{49}{4} = \\frac{7}{4}$ — the Q6(b) $y$-coordinate\n- Item 7: $\\pi - 0.7 - 2.258 = 0.184$ — the Q7(c) third angle\n- Item 8-12: Additional combinations drawn from the paper\n\n**Takeaway:** This drill targets exactly the subtractions that bit you. Do it cold each morning until the size-check is reflexive.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "In the ESAT warm-up, what's the relationship between the speed required (~90 seconds per question) and the need to memorize formulae? (ESAT General)", "answer": "- Step 1: ESAT is non-calculator, 80-90 questions in ~75 minutes — roughly 45-55 seconds per question on average, longer for some\n- Step 2: With this time pressure, you cannot afford to derive $V = \\pi r^2 h$ or $S = 2\\pi r^2 + 2\\pi rh$ from scratch each time\n- Step 3: Key ESAT formulae to memorize: volume/surface area of cylinder, cone, sphere; area of sector; Pythagorean identities; quadratic formula\n- Step 4: The cylinder problem becomes a 30-second algebra question once you know the formulas — deriving them would eat your entire time budget\n\n**Takeaway:** ESAT rewards automaticity. Memorize the key formulae; spend your time on problem-solving, not derivation.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "When you encounter a question that asks for a specific form (like $p + q\\sqrt{2}$ or $ax + by + c = 0$ with integers), what's the checklist item to ensure you deliver exactly what's asked? (Theme 2)", "answer": "- Step 1: **Underline the form requirement** in the stem before starting: \"in the form $p + q\\sqrt{2}$,\" \"in the form $ax + by + c = 0$ with integer coefficients\"\n- Step 2: When you finish, **tick that underline** and verify: Did I write $p + q\\sqrt{2}$ (not $\\sqrt{2}q + p$)? Are $a, b, c$ integers (did I clear fractions)?\n- Step 3: This is exactly what you missed in Q8(a) — the arithmetic was right, but the form wasn't, so the A-mark was lost\n\n**Takeaway:** Form requirements are invisible mark-earners. Underline them; tick them off. Every single time.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "In Q7(a), why is the sector angle $2\\pi - 0.7$ rather than just $0.7$, and how do you know which part of the circle to use? (Q7)", "answer": "- Step 1: The diagram shows sector $ABCOA$ — the sector is the larger, reflex part of the circle (going the long way around), not the small angle at $O$\n- Step 2: The given angle $AOD = 0.7$ rad is the small angle inside the triangle $AOD$, not the sector angle\n- Step 3: Since the full circle is $2\\pi$ radians and the diagram shows the larger sector, the sector angle is $2\\pi - 0.7$\n- Step 4: Always check the diagram to identify which region is shaded — the sector area uses the shaded region's angle, not the internal triangle angle\n\n**Takeaway:** The sector angle is the angle of the shaded region, not the internal triangle angle. Read the diagram carefully.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "For Q9(b), what's being tested in the graph sketching part, and what are the key transformations to recognize? (Q9)", "answer": "- Step 1: $y = 1 + \\sin\\theta$ is a vertical shift of the sine wave up by 1 — range becomes $[0, 2]$, period stays $360^\\circ$\n- Step 2: $y = \\tan\\theta$ has asymptotes at $\\theta = 90^\\circ$ and $\\theta = 270^\\circ$, passing through the origin, with period $180^\\circ$\n- Step 3: The sketch should show both curves on the same axes over $0 \\leq \\theta \\leq 360^\\circ$, with correct asymptote positions for tan\n- Step 4: This tests transformation recognition: $+1$ shifts up, $\\tan$ has its characteristic two-branch shape\n\n**Takeaway:** Know the basic graphs cold: $\\sin$, $\\cos$, $\\tan$ — then apply shifts and stretches visually.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "What does Harry mean by \"the more important learning point is you're making lots of little mistakes you can avoid,\" and how does this connect to the ~6 mark gap? (Scoreboard)", "answer": "- Step 1: Your raw score was 54/75 = B (UMS 77)\n- Step 2: The ~6 careless/requirement marks lost (Q1, Q3, Q5, Q7, Q8, Q9) would bring you to 60/75 ≈ A (UMS 86)\n- Step 3: Harry's point: you're not a B-level mathematician who needs to learn more topics — you're an A/A* mathematician who's leaking marks at the pen\n- Step 4: Closing this leak costs habit, not knowledge. That's the cheapest grade improvement you'll ever make\n\n**Takeaway:** You didn't lose to the math — you lost to execution slips. Fix the habits, keep the grade.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "In the ESAT cylinder problem, after setting $S = V$ to get $\\pi r^2 h = 2\\pi r^2 + 2\\pi rh$, what's the algebraic sequence to isolate $h$? (ESAT 2)", "answer": "- Step 1: Divide by $\\pi$ (assuming $\\pi \\neq 0$): $r^2 h = 2r^2 + 2rh$\n- Step 2: Gather $h$ terms on one side: $r^2 h - 2rh = 2r^2$\n- Step 3: Factor out $h$: $h(r^2 - 2r) = 2r^2$\n- Step 4: Factor the bracket: $h \\cdot r(r - 2) = 2r^2$\n- Step 5: Divide both sides by $r(r - 2)$: $h = \\frac{2r^2}{r(r - 2)} = \\frac{2r}{r - 2}$, provided $r \\neq 0$ and $r \\neq 2$\n\n**Takeaway:** The algebra is straightforward — the only hurdle is knowing the formulas to set up the equation.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "In Q10(a), why does the curve touch the x-axis at $x = -\\frac{1}{2}$ rather than crossing it, and what's the geometric significance? (Q10)", "answer": "- Step 1: $f(x) = (x - 4)(2x + 1)^2$ — the factor $(2x + 1)^2$ is squared\n- Step 2: A repeated linear factor means the graph **touches** the x-axis at that root (a double root), rather than crossing through it\n- Step 3: Geometrically: the curve is tangent to the x-axis at $x = -\\frac{1}{2}$ — it bounces off rather than passing through\n- Step 4: At $x = 4$, the factor $(x - 4)$ appears once (simple root), so the graph **crosses** the x-axis there\n\n**Takeaway:** Odd multiplicity = crossing; even multiplicity = touching (tangent). The squared factor makes it a touch.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "When deriving the normal gradient from the derivative in Q8(a), what's the key relationship, and why is it the negative reciprocal? (Q8)", "answer": "- Step 1: If the tangent has gradient $m$, the normal is perpendicular to it\n- Step 2: Two lines are perpendicular if their gradients multiply to $-1$ (negative reciprocal property): $m_{\\text{normal}} \\times m_{\\text{tangent}} = -1$\n- Step 3: Therefore: $m_{\\text{normal}} = -\\frac{1}{m_{\\text{tangent}}}$\n- Step 4: In Q8: $f'(4) = \\frac{35}{6}$ is the tangent gradient, so the normal gradient is $-\\frac{6}{35}$\n\n**Takeaway:** Perpendicular lines → negative reciprocals. If one is $m$, the other is $-\\frac{1}{m}$.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "For Q5(b), after finding $u = 0$ and $u = \\frac{7}{2}$ from the substitution $u = (y-5)^2$, how do you convert back to find $y$? (Q5)", "answer": "- Step 1: $u = 0$: $(y - 5)^2 = 0$ → $y - 5 = 0$ → $y = 5$\n- Step 2: $u = \\frac{7}{2}$: $(y - 5)^2 = \\frac{7}{2}$ → take square roots: $y - 5 = \\pm\\sqrt{\\frac{7}{2}}$\n- Step 3: So $y = 5 \\pm \\sqrt{\\frac{7}{2}} = 5 \\pm \\frac{\\sqrt{14}}{2}$\n- Step 4: Combine: $y = 5$, $y = 5 + \\frac{\\sqrt{14}}{2}$, or $y = 5 - \\frac{\\sqrt{14}}{2}$\n\n**Takeaway:** When $u = (y-5)^2$, solving for $y$ requires taking the $\\pm$ square root of $u$.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "In Q3(a), after finding the perimeter expression $22x - 4$ and the inequality $22x - 4 > 29$, what's the step-by-step to get $x > 1.5$? (Q3)", "answer": "- Step 1: $22x - 4 > 29$\n- Step 2: Add 4 to both sides: $22x > 33$\n- Step 3: Divide by 22 (positive, so inequality direction stays): $x > \\frac{33}{22} = \\frac{3}{2} = 1.5$\n- Step 4: This becomes the constraint to intersect with the quadratic solution from part (b)\n\n**Takeaway:** When dividing by a positive number, the inequality direction doesn't change. Only dividing by a negative flips it.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "What specific action should you take in the exam when you're unsure about a calculated value but you have the correct method? (Theme 4)", "answer": "- Step 1: Write down the formula with all numbers substituted — even if you're unsure of the final evaluation\n- Step 2: Calculate the number anyway, even if you think it might be wrong\n- Step 3: Put a small star (*) next to it as a \"might be wrong, come back\" marker\n- Step 4: Move on — a wrong number with method scores M-marks; a blank scores nothing\n- Step 5: If time permits, return to starred items and re-check\n\n**Takeaway:** Never leave a part blank. Star it, move on, come back if time permits.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "In the P1 paper review, what's the difference between an \"M\" mark, a \"dM\" mark, and an \"A\" mark in Edexcel marking? (General)", "answer": "- Step 1: **M (Method) marks** are awarded for selecting the correct approach or writing the correct formula/substitution, even if the final answer is wrong\n- Step 2: **dM (Dependent Method) marks** depend on a previous M mark — you can only earn them if you earned the M mark they depend on\n- Step 3: **A (Accuracy) marks** are for the final correct numerical or algebraic answer\n- Step 4: In Q7(c), you lost the dM and A marks because your $OD$ value was wrong — but you could have kept the M mark for setting up the perimeter expression\n\n**Takeaway:** Method marks reward the approach; accuracy marks reward the number. Protect both with careful arithmetic.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": true}, {"question": "For Q7(b), why must you explicitly state or show that you're taking the obtuse angle $\\pi - 0.884$ rather than the acute $0.884$? (Q7)", "answer": "- Step 1: The question explicitly says \"angle $ADO$ is obtuse\" — this is a branch selection, not a calculation\n- Step 2: Simply writing $ADO = 0.884$ would be incorrect because it's the acute angle, not the obtuse one\n- Step 3: You must show you're taking $\\pi - 0.884 = 2.258$ — either by writing \"since angle is obtuse, $ADO = \\pi - 0.884$\" or by underlining \"obtuse\" and explicitly choosing that branch\n- Step 4: The mark scheme checks that you've selected the correct branch, not just calculated a number\n\n**Takeaway:** Branch requirements in the stem override calculator output. Show your reasoning.", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "In the closing minutes of the lesson, what specific homework did Harry assign, and what was the deadline? (Section 8)", "answer": "- Step 1: Attempt one more P1 past paper before Tuesday (your next session)\n- Step 2: Revise trig graphs, then do Q9(c) (the one you left blank)\n- Step 3: Send Harry whatever you've completed, even if it's not the whole paper\n- Step 4: On the next paper, **visibly use the underline-and-tick-off habit** — Harry said he'll check for it\n\n**Takeaway:** The next session is your test case for the habits. Come with evidence of underline-and-tick.", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": false}], "count": 52}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "On a 75-mark P1 paper, you scored 54/75 (grade B) but estimate you could have scored 60/75 (grade A). What does this tell you about where your revision effort should go? (3 steps)", "answer": "- Step 1: The gap between a B and an A is only about $$6$$ marks — less than the contents of one hard question. So the grade boundary is shockingly thin.\n- Step 2: Those 6 marks were lost to careless slips (mis-subtraction, missed branches, wrong form), NOT to topics you don't understand. Every method (sine rule, discriminant, chain rule, surd conjugate) was set up correctly.\n- Step 3: Therefore the highest-leverage revision is NOT learning more maths — it's building habits that stop pen-level leaks. Habit drilling buys grades more cheaply than topic study.\n\nThe mental model: you're an A/A* mathematician leaking marks at the pen, not a B-grade mathematician who needs more content.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "ESAT problem: 120 students, 46 girls, 36 chose tennis ($$\\tfrac{2}{3}$$ boys), 25 girls swim, 27 chose archery. Your first instinct is to set up simultaneous equations in $$x, y, z$$. Why is this the wrong approach, and what should you do instead? (3 steps)", "answer": "- Step 1: With three unknowns, simultaneous equations get \"hairy\" — too many variables, too much algebra, too easy to slip arithmetic in a non-calculator setting.\n- Step 2: Instead, organise the information into a $$2 \\times 3$$ two-way table (boys/girls $$\\times$$ swim/archery/tennis) with a total row and total column.\n- Step 3: Every datum drops directly into a cell or a total. You deduce the remaining cells one at a time using row/column subtractions — no algebra needed.\n\nTrigger: whenever a probability problem gives you multiple categorical breakdowns and asks for a conditional probability, reach for a table BEFORE you reach for variables.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "When filling out a two-way probability table from a worded problem, what habit prevents you from double-counting or losing track of which data you've already used?", "answer": "Put a small tick next to each datum in the question stem the moment you place it into a cell of the table. This way, when you're scanning for the next piece of information, you can see at a glance what's been consumed and what hasn't. It also catches the case where you think you've used a fact but actually haven't yet — common under exam pressure.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "ESAT: \"A boy is picked at random. Find the probability that he chose swimming.\" Your instinct is to write $$\\tfrac{32}{120}$$. Why is this wrong, and what's the trigger phrase that forces the correction? (3 steps)", "answer": "- Step 1: The phrase \"a boy picked at random ... that **he** chose\" restricts the sample space to boys only. You are not picking from all 120 students — you are picking from the 74 boys.\n- Step 2: This is a conditional probability $$P(\\text{swim} \\mid \\text{boy})$$, so the denominator must be the boys total (the row total), not the grand total.\n- Step 3: Answer: $$\\dfrac{32}{74} = \\dfrac{16}{37}$$.\n\nTrigger phrase to memorise: \"given that ...\", \"picked from the [group]\", \"of the [group]\" → restricted sample space → divide by the row/group total, NOT the grand total.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "What's the trigger phrase that tells you to use conditional probability, and what's the formula response you should write down BEFORE substituting any numbers?", "answer": "- Step 1: Trigger phrases: \"given that ...\", \"a [member of group X] is picked ... that he/she/it ...\", \"of the [subgroup], find ...\". These all restrict the sample space.\n- Step 2: Reflex: write down $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)}$$ — or, in a table context, \"answer $$=\\dfrac{\\text{cell}}{\\text{row/column total of restricted group}}$$\".\n- Step 3: Only THEN substitute the numbers from the table. Writing the formula first prevents you from defaulting to the grand-total denominator.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "Why does Harry recommend \"deducing one cell at a time\" when filling a two-way table, rather than writing a system of equations across multiple cells?", "answer": "- Step 1: Each cell is determined by a single row or column subtraction once enough adjacent cells are known. Doing them one at a time keeps each step a single mental arithmetic operation.\n- Step 2: This is non-calculator, so each subtraction is a small, low-risk computation — much safer than algebraic manipulation of three unknowns.\n- Step 3: \"Don't go for it. Do it one step at a time.\" Each cell, once placed, becomes a known quantity supporting the next deduction. The error surface shrinks dramatically.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "A solid cylinder has surface area numerically equal to its volume. What are the two formulae you need, and how do you derive the curved-surface formula intuitively if you forget? (3 steps)", "answer": "- Step 1: Volume: $$V = \\pi r^2 h$$ (area of circular base $$\\times$$ height).\n- Step 2: Surface area has three parts: two circular ends ($$2 \\pi r^2$$) plus the curved side. To derive the curved side, imagine cutting a wrapping-paper tube and unfurling it — it flattens into a rectangle with height $$h$$ and width equal to the circumference $$2\\pi r$$. So curved area $$= 2\\pi r h$$.\n- Step 3: Total: $$S = 2\\pi r^2 + 2\\pi r h$$.\n\nThe intuition lecture: any \"curved-surface-of-revolution\" problem can be unfurled — cones unfurl into sectors, cylinders into rectangles. But in ESAT you cannot afford to redraw this every time; memorise the formula cold.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Why does Harry insist you memorise the cylinder volume and surface-area formulae rather than deriving them in the exam, even though you understand the unfurling argument?", "answer": "Under the $$\\sim$$90-second-per-question ESAT clock, re-deriving $$S = 2\\pi r^2 + 2\\pi r h$$ from an unfurled rectangle every time costs $$\\sim$$30 seconds and introduces a re-derivation error risk. A memorised formula is one line; understanding the derivation is your safety net if you forget mid-exam, but it should NOT be your default route. Memorise cold; understand the derivation for backup.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "ESAT cylinder problem: $$S = V$$ in numerical value, find $$h$$ in terms of $$r$$. After equating and dividing by $$\\pi$$, what's the algebraic move that isolates $$h$$? (3 steps)", "answer": "- Step 1: Equation becomes $$r^2 h = 2r^2 + 2rh$$.\n- Step 2: Gather all $$h$$ terms on one side: $$r^2 h - 2rh = 2r^2$$, then factor: $$h(r^2 - 2r) = 2r^2$$.\n- Step 3: Divide and simplify: $$h = \\dfrac{2r^2}{r(r-2)} = \\dfrac{2r}{r-2}$$.\n\nThe trick: whenever the unknown appears on both sides of an equation, GATHER and FACTOR — don't try to manipulate it in place.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Across both the ESAT warm-up ($$46 - 25$$) and the P1 paper ($$6 - 1.42$$ at Q7c), what is your single biggest source of careless mark loss, and what's the in-exam habit that catches it?", "answer": "- Step 1: Mental subtraction is the leak. You computed $$46 - 25 = 21$$ correctly, then ran $$21 - 12 = 18$$ (wrong, it's 9) by adding instead of subtracting. In P1 Q7c you wrote $$OD = 0.96$$ when the correct value is $$\\approx 1.42$$.\n- Step 2: In-exam habit: every time you do a subtraction, re-key it on the calculator (P1) or do a 2-second size-check (ESAT). Ask: \"does this answer have the right magnitude?\"\n- Step 3: Sanity-check: $$6 - 1.42$$ should be \"a bit under 5\", not \"about 1\"; $$46 - 25$$ should be \"about 20\". If your written answer fails the size check, re-key.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "In the P1 mark-loss table, which type of slip is responsible for the B → A gap, and what's the procedural fix? (3 steps)", "answer": "- Step 1: The losses split into (a) careless arithmetic (Q1, Q7c) and (b) requirement/form errors — missing \"obtuse\" (Q7b), \"integers\" (Q8a), \"coordinates\" (Q9a), strict inequality signs (Q3).\n- Step 2: Together these are $$\\approx 6$$ marks, exactly the B → A gap. None of them require new mathematical knowledge.\n- Step 3: Procedural fix: underline every instruction word in the stem before starting; tick each off before stopping. This single habit catches every \"form\" and \"branch\" error.\n\nHarry: \"that could be the difference of a grade in every paper.\"", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Before you start writing a solution to any P1 question, what is the first physical action you should perform on the question paper, and why?", "answer": "- Step 1: Underline every instruction word: the form of the answer ($$ax + by + c = 0$$ with integers, $$p + q\\sqrt{2}$$), the object asked (coordinates vs a value), the accuracy (1 d.p., 3 d.p.), and any branch descriptor (obtuse, positive).\n- Step 2: This forces you to PARSE every requirement before solving, rather than discovering them at the end (when you've often forgotten to satisfy them).\n- Step 3: When you finish, physically tick off each underline. A part is not \"done\" until every underline has a tick.\n\nThis is the single highest-value habit Harry identified across the whole lesson.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "Q7(b) in WMA11/01 says angle $$ADO$$ is obtuse. The calculator's $$\\sin^{-1}$$ gives $$0.884$$ (acute). What's the mental routine that catches the branch error and produces the correct answer? (3 steps)", "answer": "- Step 1: Recognise that $$\\sin^{-1}$$ on a calculator only returns values in $$[-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2}]$$, i.e. it gives only the principal (acute) branch.\n- Step 2: From the sine graph: $$\\sin\\theta = k$$ has TWO solutions in $$[0, \\pi]$$ — the acute $$\\alpha$$ and the obtuse $$\\pi - \\alpha$$. Both have the same sine.\n- Step 3: The question specifies \"obtuse\", so reject $$0.884$$ and take $$\\pi - 0.884 = 2.258$$ rad.\n\nThe reflex: whenever the question specifies \"obtuse\" / \"in the second quadrant\" / \"between $$\\pi/2$$ and $$\\pi$$\", and you've used $$\\sin^{-1}$$, apply $$\\pi - \\alpha$$ to the calculator output.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "In Q7(c), you correctly set up the sine rule for $$OD$$ but then stopped without producing a numerical answer because you doubted your earlier value. Why is \"leaving it blank when unsure\" the worst possible move in an exam?", "answer": "- Step 1: A blank scores 0. A substituted expression — even with a wrong intermediate value — can score the method (M) marks. The mark scheme rewards correct procedure, not just correct answer.\n- Step 2: Harry's rule: \"even if it's ridiculous, even if you know you've made a mistake, just keep going with the numbers, put a little star next to it, and if you've got time come back to it.\"\n- Step 3: Practical: write the formula → substitute every number you have → produce a final figure → star it. Method marks do not require the final answer to be right.\n\nRule for the exam room: NEVER leave a part blank if you understand the method.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "When you factor a polynomial like $$2x^3 + 3x^2 - 35x = 0$$ by taking out a common $$x$$, what's the reflex action that prevents losing a mark? (3 steps)", "answer": "- Step 1: The factorisation is $$x(2x^2 + 3x - 35) = 0$$. A product is zero $$\\iff$$ at least one factor is zero — so the bare $$x$$ outside IS a factor.\n- Step 2: Reflex: the INSTANT you write the $$x$$ outside the bracket, write down \"$$x = 0$$\" as a root. Do this BEFORE you touch the quadratic.\n- Step 3: Then solve the bracket (here $$(2x-7)(x+5) = 0$$ gives $$x = \\tfrac{7}{2}, -5$$). Full solution set: $$x = 0, \\tfrac{7}{2}, -5$$.\n\nCommon slip: solving only the bracket and forgetting that $$x = 0$$ is also a root — costs the final A mark.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "A quadratic like $$2x^2 + 3x - 35 = 0$$ factorises as $$(2x - 7)(x + 5)$$. Why is factorising better than using the quadratic formula, even when both produce the same answer?", "answer": "- Step 1: Factorising is faster — no formula substitution, no square root, no $$\\pm$$ to handle.\n- Step 2: Factorising is more reliable on a non-calculator paper — fewer arithmetic operations means fewer chances for slips.\n- Step 3: It also gives integer/rational roots in their simplest form directly, with no need to simplify a surd.\n\nRecognition: if the discriminant is a perfect square, factorisation will work. Spend $$\\sim$$10 seconds trying factors of the leading and trailing coefficients before defaulting to the formula.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": true}, {"question": "On Q1(a), differentiating $$-24x^{-1/2}$$, what's the easy slip and what's the reflex check that catches it? (3 steps)", "answer": "- Step 1: Differentiation rule: $$\\dfrac{d}{dx}(x^n) = n x^{n-1}$$. Applying to $$-24 x^{-1/2}$$: the $$-\\tfrac{1}{2}$$ comes to the front, and the power becomes $$-\\tfrac{1}{2} - 1 = -\\tfrac{3}{2}$$.\n- Step 2: Result: $$-24 \\cdot (-\\tfrac{1}{2}) x^{-3/2} = +12 x^{-3/2}$$.\n- Step 3: Reflex check: when subtracting 1 from a NEGATIVE power, the power gets MORE negative ($$-\\tfrac{1}{2} \\to -\\tfrac{3}{2}$$), not less. Slow down on this step every time.\n\nHarry: \"the very first line is the most important — a slip there has a snowball effect.\"", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Why does Harry insist the FIRST line of working on a derivative or integration question deserves extra care, even if it costs a few seconds of speed?", "answer": "- Step 1: The first line typically contains the differentiation/integration of every term in the original function. Every subsequent line uses these values.\n- Step 2: A slip on line 1 propagates — you'll get the wrong gradient at $$P$$, the wrong tangent equation, the wrong normal equation, and possibly the wrong intersection point. One slip costs all downstream marks (\"snowball\").\n- Step 3: Strategy: be fast on the routine algebraic manipulation, but slow and deliberate on the first one or two lines. Double-check signs and powers before moving on.\n\nThis is also why in Q1(b), the lost A mark in (a) automatically lost the A mark in (b).", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "You're asked to simplify $$\\dfrac{1}{4 - 2\\sqrt{2}}$$ into the form $$a + b\\sqrt{2}$$. What's the algebraic move and the underlying motivation? (3 steps)", "answer": "- Step 1: Multiply numerator and denominator by the conjugate of the denominator, $$4 + 2\\sqrt{2}$$.\n- Step 2: Motivation: $$(4 - 2\\sqrt{2})(4 + 2\\sqrt{2}) = 16 - 8 = 8$$, a rational number. The conjugate exploits the difference-of-squares identity to eliminate the surd from the denominator.\n- Step 3: Result: $$\\dfrac{4 + 2\\sqrt{2}}{8} = \\tfrac{1}{2} + \\tfrac{1}{4}\\sqrt{2}$$.\n\nGeneral principle: any denominator of the form $$a \\pm b\\sqrt{c}$$ is rationalised by multiplying by $$a \\mp b\\sqrt{c}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "When the question asks for an answer \"in the form $$p + q\\sqrt{2}$$\", what subtle presentation rule must you follow, and why does it matter?", "answer": "The rational part $$p$$ must come FIRST, the surd part $$q\\sqrt{2}$$ second. Writing $$q\\sqrt{2} + p$$ technically equals the same number but doesn't match the form stated. Markers checking against a mark scheme that says \"$$p = \\ldots, q = \\ldots$$\" may not award the A mark if the answer isn't presented in the requested form. Always copy the form from the question verbatim and slot your values in.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Q3(b): you solve $$11x^2 - 4x - 36 < 0$$ and factorise as roots $$x = 2$$ and $$x = -\\tfrac{18}{11}$$. Why must you write the brackets as $$(x - 2)(11x + 18)$$ rather than $$(x - 2)(x + \\tfrac{18}{11})$$? (3 steps)", "answer": "- Step 1: The original quadratic has leading coefficient $$11$$. If you expand $$(x - 2)(x + \\tfrac{18}{11})$$, you get $$x^2 + \\ldots$$ — the leading coefficient is wrong.\n- Step 2: To make the brackets expand back to $$11x^2 - 4x - 36$$, clear the fraction: $$(x - 2)(11x + 18)$$ expands to $$11x^2 + \\ldots$$ correctly.\n- Step 3: Markers may dock the mark if the factorisation doesn't expand back to the original equation, regardless of whether the roots are right.\n\nRule: when reading roots off a calculator, build the brackets so they expand back EXACTLY to the original polynomial.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "For a quadratic inequality $$(x-2)(11x+18) < 0$$ with roots $$-\\tfrac{18}{11}$$ and $$2$$, how do you determine which interval satisfies the inequality?", "answer": "- Step 1: Sketch the parabola: positive leading coefficient ($$11 > 0$$) means it opens upward, with zeros at the two roots.\n- Step 2: An upward parabola is BELOW zero (negative) BETWEEN its roots, and above zero outside them.\n- Step 3: So $$< 0$$ gives the interval between the roots: $$-\\tfrac{18}{11} < x < 2$$.\n\nMnemonic: \"Upward smile, negative between; downward frown, negative outside.\"", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "Q3(c) asks for the final range of $$x$$. You have $$-\\tfrac{18}{11} < x < 2$$ from (b) and $$x > 1.5$$ from (a). What's the procedural step you must NOT skip, and what's the sign-care trap?", "answer": "- Step 1: The full answer must satisfy BOTH conditions — take the INTERSECTION of the two intervals.\n- Step 2: Intersection: $$1.5 < x < 2$$ (the part of $$(-\\tfrac{18}{11}, 2)$$ that also lies in $$(1.5, \\infty)$$).\n- Step 3: Sign-care trap: both original inequalities are STRICT ($$<$$ and $$>$$), so the final answer must use strict inequalities too. Copying $$\\leq$$ instead of $$<$$ loses the mark. Harry: \"copy these inequality signs really carefully.\"", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Q4 asks for $$\\int \\dfrac{4x^2 + 1}{2\\sqrt{x}} dx$$ in simplest form, and you correctly obtain $$\\tfrac{4}{5} x^{5/2} + x^{1/2} + C$$. Should you rewrite this in another form (e.g., as a single fraction) before submitting?", "answer": "- Step 1: No. \"Simplest form\" has been achieved. Any further rewrite (e.g., combining into one fraction, or rewriting $$x^{1/2}$$ as $$\\sqrt{x}$$) risks introducing a new arithmetic slip.\n- Step 2: Markers mark very fast — multiple forms of the same answer can confuse them or make them search for the version matching their mark scheme.\n- Step 3: Strategic principle: stop at a correct, simplified answer. Don't gild it. Speed and clarity beat completeness.\n\nHarry: \"make their life easy and just stop once you have a correct simplest form.\"", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "Q5(b) involves $$2(y-5)^6 + 3(y-5)^4 - 35(y-5)^2 = 0$$. What's the substitution that reveals the hidden quadratic structure, and what's the non-negativity check you must apply afterwards? (3 steps)", "answer": "- Step 1: Let $$u = (y - 5)^2$$. Then the equation becomes $$2u^3 + 3u^2 - 35u = 0$$ — the same cubic as in (a).\n- Step 2: From (a): $$u = 0, \\tfrac{7}{2}, -5$$.\n- Step 3: Non-negativity check: $$u = (y-5)^2 \\geq 0$$ always. So REJECT $$u = -5$$ (a square cannot be negative). Then solve $$(y-5)^2 = 0 \\Rightarrow y = 5$$ and $$(y-5)^2 = \\tfrac{7}{2} \\Rightarrow y = 5 \\pm \\sqrt{\\tfrac{7}{2}} = 5 \\pm \\tfrac{\\sqrt{14}}{2}$$.\n\nTrick: state the rejection explicitly (\"$$u \\geq 0$$, so reject $$u = -5$$\") — this banks the rejection mark on the mark scheme.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "When taking a square root of both sides of an equation like $$(y - 5)^2 = \\tfrac{7}{2}$$, where do you place the $$\\pm$$ and why?", "answer": "- Step 1: Place the $$\\pm$$ on the side WITH THE NUMBERS, not the side with the variable: $$y - 5 = \\pm \\sqrt{\\tfrac{7}{2}}$$.\n- Step 2: Reason: it's mathematically natural — the variable is what you're solving for and should be left alone; both signs of the square root produce valid solutions.\n- Step 3: Then add 5 to both sides: $$y = 5 \\pm \\sqrt{\\tfrac{7}{2}} = 5 \\pm \\tfrac{\\sqrt{14}}{2}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Q6: the line $$y = 4x + c$$ meets the parabola $$y = x(x-3)$$ at exactly ONE point. What's the algebraic condition that captures \"exactly one intersection\", and how do you use it? (3 steps)", "answer": "- Step 1: Setting the two expressions equal gives a quadratic in $$x$$: $$4x + c = x^2 - 3x \\Rightarrow x^2 - 7x - c = 0$$.\n- Step 2: \"Exactly one intersection\" means this quadratic has exactly one (repeated) root. So the discriminant must equal zero: $$b^2 - 4ac = 0$$.\n- Step 3: Substitute: $$(-7)^2 - 4(1)(-c) = 49 + 4c = 0 \\Rightarrow c = -\\tfrac{49}{4}$$.\n\nThis is the classic \"line is tangent to curve\" trigger: equate, rearrange to quadratic, set discriminant to zero.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "Once you've found $$c$$ in a \"tangent line\" problem, how do you find the actual point of tangency efficiently?", "answer": "- Step 1: With $$c$$ determined, the quadratic becomes a perfect square. Substituting $$c = -\\tfrac{49}{4}$$: $$x^2 - 7x + \\tfrac{49}{4} = (x - \\tfrac{7}{2})^2 = 0$$.\n- Step 2: The repeated root is the $$x$$-coordinate of the tangent point: $$x = \\tfrac{7}{2}$$.\n- Step 3: Substitute into the line equation: $$y = 4(\\tfrac{7}{2}) - \\tfrac{49}{4} = 14 - \\tfrac{49}{4} = \\tfrac{7}{4}$$. Point: $$(\\tfrac{7}{2}, \\tfrac{7}{4})$$.\n\nShortcut: the discriminant-zero quadratic always has $$x = -\\tfrac{b}{2a}$$ as its repeated root. No need to factorise.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "Q7(a) involves a sector that is the \"complement\" of a $$0.7$$ rad triangle inside a circle. What's the trick for finding the sector's angle?", "answer": "- Step 1: The full angle around the centre $$O$$ is $$2\\pi$$ radians.\n- Step 2: The triangle $$AOD$$ subtends an angle of $$0.7$$ rad at $$O$$. The sector $$ABCOA$$ is the REST of the circle minus this triangle's angle.\n- Step 3: Sector angle $$\\theta = 2\\pi - 0.7$$. Area $$= \\tfrac{1}{2} r^2 \\theta = \\tfrac{1}{2}(6)^2(2\\pi - 0.7) = 100.5$$ cm² (1 d.p.).\n\nReflex: for \"sector outside a triangle\" problems, the sector angle is always $$2\\pi$$ (or $$\\pi$$ for a semicircle) minus the angle inside the triangle.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "In Q7, you applied the sine rule to triangle $$AOD$$ with $$AD = 5$$, $$AO = 6$$, angle $$AOD = 0.7$$. What's the sine rule setup, and what's the standard formulation? (3 steps)", "answer": "- Step 1: Sine rule: $$\\dfrac{a}{\\sin A} = \\dfrac{b}{\\sin B} = \\dfrac{c}{\\sin C}$$, where each side is paired with the angle OPPOSITE it.\n- Step 2: In $$\\triangle AOD$$: side $$AO = 6$$ is opposite angle $$ADO$$; side $$AD = 5$$ is opposite angle $$AOD = 0.7$$. So $$\\dfrac{6}{\\sin ADO} = \\dfrac{5}{\\sin 0.7}$$.\n- Step 3: Solve: $$\\sin ADO = \\dfrac{6 \\sin 0.7}{5} \\approx 0.7731$$. Then take the OBTUSE branch (since the question specifies obtuse): $$ADO = \\pi - \\sin^{-1}(0.7731) = \\pi - 0.884 = 2.258$$ rad.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "Q7(c): you found arc $$ABC = 6(2\\pi - 0.7) = 33.5$$ and $$OD \\approx 1.42$$, but wrote $$OD = 0.96$$. Walk through the conceptual perimeter assembly (no calculation) and identify which arithmetic step needs the size-check.", "answer": "- Step 1: The perimeter of region $$ABCDA$$ consists of three pieces: the arc $$ABC$$, the segment $$CD$$ (where $$D$$ is on $$OC$$), and the side $$DA = 5$$.\n- Step 2: $$CD = OC - OD = 6 - OD$$. This is the critical subtraction: $$6 - 1.42 = 4.58$$ (NOT $$5.04$$ from the wrong $$OD$$).\n- Step 3: Perimeter $$= \\text{arc} + CD + DA = 33.5 + 4.58 + 5 \\approx 43.1$$ cm.\n\nSize-check: $$6 - 1.42$$ should be \"a bit under 5\", roughly $$4.5$$ — not \"about 5\". The wrong value $$0.96$$ produces a $$CD$$ that is too large, failing the geometric sanity check (you can see by eye that $$D$$ is closer to $$C$$ than to $$O$$).", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "In Q8(a), you correctly computed $$f'(4) = \\tfrac{35}{6}$$ and the normal gradient $$-\\tfrac{6}{35}$$, and the line through $$P(4,1)$$. Why did you still lose the A mark, and what's the procedural fix? (3 steps)", "answer": "- Step 1: The question demanded the form $$ax + by + c = 0$$ with INTEGER coefficients. You didn't underline \"integers\" and produced an answer with a fractional coefficient.\n- Step 2: Fix: clear all fractions by multiplying through by the common denominator (here $$35$$): $$y - 1 = -\\tfrac{6}{35}(x - 4) \\Rightarrow 35(y - 1) = -6(x - 4) \\Rightarrow 6x + 35y - 59 = 0$$.\n- Step 3: Before stopping, verify $$a = 6, b = 35, c = -59$$ are all integers. Tick off the \"integers\" underline.\n\nHarry's exam routine: when you think you've got an answer, re-read the question — \"normal? at $$P$$? in this form? integers? — ah, I didn't do that, then go and fix it.\"", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "When converting a normal/tangent equation from point-slope form $$y - y_1 = m(x - x_1)$$ into $$ax + by + c = 0$$ form with integer coefficients, what's the algebraic move that handles fractional gradients cleanly?", "answer": "- Step 1: If $$m = \\tfrac{p}{q}$$ in lowest terms, multiply BOTH sides by $$q$$ FIRST, before expanding.\n- Step 2: This eliminates the fraction immediately: $$q(y - y_1) = p(x - x_1)$$.\n- Step 3: Then rearrange to bring all terms to one side and check signs. For $$m = -\\tfrac{6}{35}$$: multiplying both sides by $$35$$ gives $$35(y-1) = -6(x-4)$$, then expand and rearrange.\n\nThis avoids the common mistake of expanding with fractions still present and then trying to clear them — much messier and error-prone.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "Q8(b) requires recovering $$f(x)$$ from $$f'(x) = 4\\sqrt{x} - 2 - \\dfrac{8}{3x^2}$$, given that $$f(4) = 1$$. What's the strategic structure, and where does the constant $$C$$ come from? (3 steps)", "answer": "- Step 1: Integrate term by term: $$f(x) = \\int f'(x) dx = \\tfrac{8}{3} x^{3/2} - 2x + \\tfrac{8}{3x} + C$$. Don't forget the $$+C$$ — every indefinite integral has one.\n- Step 2: Use the boundary condition $$P(4, 1)$$ — i.e., $$f(4) = 1$$ — to find $$C$$. Substitute: $$1 = \\tfrac{8}{3}(8) - 2(4) + \\tfrac{8}{12} + C = \\tfrac{64}{3} - 8 + \\tfrac{2}{3} + C = 14 + C$$.\n- Step 3: So $$C = -13$$, giving $$f(x) = \\tfrac{8}{3} x^{3/2} - 2x + \\tfrac{8}{3x} - 13$$.\n\nThe motif: indefinite integral → use given point to pin down $$C$$ → final explicit function.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "Why does Harry warn that integrating $$-\\tfrac{8}{3x^2}$$ is a common pitfall, and what's the careful step?", "answer": "- Step 1: Rewrite first: $$-\\tfrac{8}{3x^2} = -\\tfrac{8}{3} x^{-2}$$. Identify the power as $$-2$$.\n- Step 2: Integrate using $$\\int x^n dx = \\tfrac{x^{n+1}}{n+1}$$ for $$n \\neq -1$$: power becomes $$-1$$, coefficient becomes $$-\\tfrac{8}{3} \\cdot \\tfrac{1}{-1} = +\\tfrac{8}{3}$$.\n- Step 3: Result: $$+\\tfrac{8}{3} x^{-1} = \\tfrac{8}{3x}$$. Note the sign FLIP from negative to positive (because we divided by $$-1$$).\n\nSlip warning: forgetting the sign flip is a very common error on inverse-power integrals.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Q9(a): the curve $$y = 4\\sin\\theta$$ has its minimum at $$\\theta = 270°$$, $$y = -4$$. You wrote \"$$-4$$\". Why does this score only 1 of 2 marks?", "answer": "- Step 1: The question said \"state the COORDINATES of the minimum\". Coordinates are an ordered pair: $$(\\theta, y)$$.\n- Step 2: You gave only the $$y$$-value, not the $$\\theta$$-value. So the answer is incomplete.\n- Step 3: Correct answer: $$(270°, -4)$$ — the point in the $$\\theta y$$-plane. This banks both marks.\n\nHarry: \"part A asks you for coordinates — it wants $$x$$ and $$y$$. You've just given me $$y$$, so you only get one mark; notice this is two marks.\" Underline \"coordinates\" reflexively.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "What's the keyword distinction between \"state the value\" and \"state the coordinates\" in an exam question, and how does it change your answer format?", "answer": "- Step 1: \"Value\" = a single number (e.g., $$y = -4$$). One quantity.\n- Step 2: \"Coordinates\" = an ordered pair (e.g., $$(270°, -4)$$). Two quantities.\n- Step 3: Other variants: \"find the point\" = coordinates; \"find the $$y$$-intercept\" = a single value $$y$$ (since $$x = 0$$ is implicit); \"find where the curve meets the $$x$$-axis\" = the $$x$$-value(s).\n\nAlways check whether the question wants a number or a point — they reward different things.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "Q9(c): find the number of solutions of $$\\tan\\theta = 1 + \\sin\\theta$$ in $$0 \\leq \\theta \\leq 2160°$$. What's the strategy that avoids solving the equation? (3 steps)", "answer": "- Step 1: Recognise the periods: $$\\tan\\theta$$ has period $$180°$$ and $$1 + \\sin\\theta$$ has period $$360°$$. The combined system repeats every $$360°$$ (the LCM).\n- Step 2: Sketch both curves over one period $$[0°, 360°]$$ and count the intersections. Call this number $$N$$ per $$360°$$.\n- Step 3: $$2160° / 360° = 6$$ whole periods, so total solutions $$= 6N$$. For a non-whole multiple (like $$1980° = 5.5$$ periods), count $$5N$$ plus the intersections in the additional half-period.\n\nThe principle: \"count intersections in one period, multiply by number of whole periods, then adjust for partial periods and endpoints.\" This is the SAME counting routine as the June 12 lesson on $$\\tan$$ vs $$\\tfrac{1}{x} + 1$$.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "Q10(c): the turning point of $$f(x)$$ at $$x = \\tfrac{5}{2}$$ has $$f'(\\tfrac{5}{2}) = 0$$. You first sketched a VERTICAL line as the tangent. What's the conceptual error?", "answer": "- Step 1: A vertical line has UNDEFINED (infinite) gradient. The condition \"$$f'(x) = 0$$\" means the gradient is ZERO, not infinite.\n- Step 2: A zero-gradient line is HORIZONTAL — of the form $$y = k$$ (constant).\n- Step 3: So the tangent at a turning point is $$y = f(\\tfrac{5}{2}) = -54$$. No need for the full $$y - y_1 = m(x - x_1)$$ since $$m = 0$$ collapses it to $$y = y_1$$.\n\nReflex: \"turning point\" → \"gradient zero\" → \"horizontal tangent\" → $$y = k$$. Skip the point-slope formula entirely.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "Q10(d): \"$$y = f(x + a)$$ passes through $$O$$; state the possible values of $$a$$.\" Why is a sketch-based approach faster than grinding algebra? (3 steps)", "answer": "- Step 1: $$y = f(x + a)$$ is the original curve translated $$a$$ units LEFT (if $$a > 0$$) or RIGHT (if $$a < 0$$).\n- Step 2: \"Passes through $$O = (0, 0)$$\" means $$f(0 + a) = 0$$, i.e., $$f(a) = 0$$ — so $$a$$ must be a ROOT of $$f$$.\n- Step 3: Read the roots off the sketch: $$f(x) = (x-4)(2x+1)^2$$ has roots at $$x = 4$$ and $$x = -\\tfrac{1}{2}$$. So $$a = 4$$ or $$a = -\\tfrac{1}{2}$$.\n\nThe plural cue: \"possible valueS of $$a$$\" signals more than one answer — don't stop at the first root.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "When a question uses a plural noun like \"values\", \"solutions\", \"coordinates\" (of multiple points), what's the in-exam habit it should trigger?", "answer": "Treat the plural as an explicit warning: there is more than one answer. Before stopping, ask yourself: \"have I found ALL of them?\" For roots, check whether you've handled all factors. For solutions in a range, check both branches. For coordinates of multiple points, list each as a pair. Stopping at one answer when more exist costs the completion mark every time.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "For graph-transformation questions like $$y = f(x + a)$$, why does Harry recommend \"answer with a sketch, not algebra\"?", "answer": "- Step 1: Graph transformations have visual meaning: $$f(x + a)$$ is a horizontal shift, $$f(x) + a$$ is a vertical shift, $$-f(x)$$ is a reflection in the $$x$$-axis, etc.\n- Step 2: A sketch reveals the answer instantly — you can see where the curve must lie to satisfy the condition (e.g., pass through $$O$$). Algebra makes you re-derive what the picture already shows.\n- Step 3: Sketches are also faster and less error-prone for finding multiple answers (you see all roots at once).\n\nThis generalises: any question about transformed curves, intersections with axes, or qualitative behaviour benefits from a quick sketch first.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "When you're about to factorise the quadratic from a calculator's numerical roots, what's the procedural check that catches the wrong factorisation?", "answer": "- Step 1: Multiply out your proposed factorisation and verify it reproduces the ORIGINAL quadratic exactly — same leading coefficient, same middle coefficient, same constant.\n- Step 2: For $$11x^2 - 4x - 36 = 0$$ with roots $$x = 2, -\\tfrac{18}{11}$$: the leading coefficient is $$11$$, so the brackets must produce $$11$$ when expanded. $$(x - 2)(11x + 18)$$ works; $$(x - 2)(x + \\tfrac{18}{11})$$ gives leading $$x^2$$, not $$11x^2$$.\n- Step 3: Only if the expansion matches the original quadratic is the factorisation valid for mark-scheme purposes.\n\nReflex: write your brackets, then expand them in the margin to verify before moving on.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "In a sequence of inequalities (e.g., parts (a), (b), (c) of a problem), what's the carelessness Harry flagged about inequality signs?", "answer": "- Step 1: The strictness of the inequality ($$<$$ vs $$\\leq$$) must be PRESERVED throughout the working. If the original is strict ($$<$$), the final answer must be strict too.\n- Step 2: Slipping from $$<$$ to $$\\leq$$ (or vice versa) is a common transcription error — particularly when the problem mixes \"perimeter $$> 29$$\" with \"area $$< 72$$\" and you mentally switch signs.\n- Step 3: Reflex: when intersecting two intervals, copy each strictness from its source. If both are strict, the intersection is strict on both ends.\n\nHarry: \"it was that that lost you the mark at the end. It was strictly less than, so the inequalities must match.\"", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "What's the four-part \"completeness\" checklist Harry wants you to apply BEFORE writing your final answer to any question?", "answer": "- Step 1: **Form?** Did I write the answer in the requested form ($$p + q\\sqrt{2}$$, $$ax + by + c = 0$$, etc.)?\n- Step 2: **Object?** Is it a value, a pair of coordinates, an interval, a function? Did I give the right kind of object?\n- Step 3: **Branch?** If the question specified \"obtuse\", \"positive\", \"in $$[0, 2\\pi]$$\", did I reject the other branch?\n- Step 4: **Integers / accuracy?** Are coefficients integers if required? Is the answer rounded to the requested precision?\n\nIf any check fails, fix BEFORE moving on. Harry: \"read the question a second time.\"", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "What's the rule for handling \"exact form\" answers like $$p + q\\sqrt{2}$$ in P1, and what counts as $$p, q$$ being \"rational\"?", "answer": "- Step 1: \"Exact form $$p + q\\sqrt{2}$$ with $$p, q$$ rational\" means: write the answer as a rational number $$p$$ plus a rational number $$q$$ times $$\\sqrt{2}$$. No decimal approximations.\n- Step 2: \"Rational\" includes integers ($$10$$, $$-3$$), proper fractions ($$\\tfrac{1}{2}$$), and improper fractions ($$\\tfrac{7}{4}$$). Harry confirmed live: \"whole numbers are rational numbers — that is correct.\"\n- Step 3: The form is rigid: rational part FIRST, surd part SECOND. Don't write $$10\\sqrt{2} + 10$$ when the form is $$p + q\\sqrt{2}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "What's the strategic ordering Harry recommends for preparing the next paper: \"do paper first, then revise\" or \"revise first, then do paper\"?", "answer": "- Step 1: Harry's advice: do the PAPER FIRST, then revise based on what you got wrong.\n- Step 2: Reason: revising in the abstract is unfocused — you don't know what your weaknesses are until you've tested them. Doing the paper first generates a targeted list.\n- Step 3: This is more efficient use of revision time: you spend hours on the topics that actually leaked marks, not on topics you've already mastered.\n\nAdd: aim for $$\\sim$$3 past papers per weekend for VOLUME. Volume of past-paper practice (done reflectively) is what builds the reflex to spot triggers fast.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "What's the meta-lesson about ESAT vs P1 that Harry kept emphasising across both halves of the lesson?", "answer": "- Step 1: ESAT and P1 are not separate skills — they share the same execution-level habits. Careless mental subtraction bit you in BOTH halves (ESAT $$46-25$$ and P1 $$6-1.42$$).\n- Step 2: The fix for one is the fix for the other. Drilling rapid mental subtraction with an app pays off in both exams.\n- Step 3: Similarly: tick-as-you-use, underline-the-requirement, recognise-the-trigger-phrase — these are universal exam habits, not topic-specific techniques.\n\nImplication: every habit drill counts twice. The leverage is enormous.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "What's the rule about \"answer in the form $$y = mx + c$$\" for a tangent or normal line, and what's the common slip?", "answer": "- Step 1: $$y = mx + c$$ form requires the equation to be solved EXPLICITLY for $$y$$ — no $$y$$'s on the right, no fractions hidden inside.\n- Step 2: After using point-slope $$y - y_1 = m(x - x_1)$$, expand and isolate $$y$$: $$y = mx + (c\\text{-term})$$.\n- Step 3: Common slip: leaving the answer in point-slope form (e.g., $$y - (-3) = \\tfrac{5}{2}(x - 4)$$). Markers want $$y = \\tfrac{5}{2}x - 13$$, not the unexpanded form.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "For \"discriminant = 0\" tangency problems, why does the quadratic always reduce to a perfect square $$(x - k)^2 = 0$$, and what's the geometric meaning?", "answer": "- Step 1: Discriminant = 0 means the quadratic $$ax^2 + bx + c = 0$$ has a repeated root. Algebraically, this means it factorises as $$a(x - k)^2 = 0$$ for some $$k$$.\n- Step 2: Geometrically, the line and curve touch at exactly one point — they meet but don't cross. This is the defining condition of tangency.\n- Step 3: The repeated root $$x = k$$ is the $$x$$-coordinate of the tangency point, with $$k = -\\tfrac{b}{2a}$$ directly from the quadratic.\n\nThis connects algebra (discriminant) to geometry (tangency) — a key motif in P1.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "When solving for an unknown using the sine rule, why must you ALWAYS check which branch of the inverse sine you need?", "answer": "- Step 1: $$\\sin^{-1}(k)$$ on a calculator returns only the principal value in $$[-90°, 90°]$$ (or $$[-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2}]$$). But $$\\sin\\theta = k$$ has TWO solutions in $$[0°, 180°]$$.\n- Step 2: For a valid triangle angle (between $$0°$$ and $$180°$$), both the acute $$\\alpha$$ and obtuse $$180° - \\alpha$$ are mathematically possible. The geometry — or an explicit instruction — picks one.\n- Step 3: Reflex: after using sine rule, ask \"is the angle acute, obtuse, or specified?\" If the question says \"obtuse\" or shows a sketch with an obtuse-looking angle, use $$180° - \\alpha$$.\n\nCommon slip: blindly accepting the calculator's acute output when geometry/question requires obtuse.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "What's the formula for the area of a circular sector and the length of its arc, and when do you use each in a perimeter problem?", "answer": "- Step 1: Sector area: $$A = \\tfrac{1}{2} r^2 \\theta$$ (with $$\\theta$$ in radians).\n- Step 2: Arc length: $$\\ell = r\\theta$$ (with $$\\theta$$ in radians).\n- Step 3: For the PERIMETER of a sector or sector-bounded region, the ARC ($$r\\theta$$) contributes, but the area formula does not. For the AREA, only $$\\tfrac{1}{2}r^2\\theta$$ matters.\n\nDon't confuse the two — they share $$r$$ and $$\\theta$$ but have very different roles.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "Why does Harry warn that an over-simplified or unnecessarily-rewritten answer can LOSE marks, even when mathematically correct?", "answer": "- Step 1: Each rewrite is a new arithmetic operation, which carries new slip risk. A correct answer rewritten with a sign error becomes a wrong answer.\n- Step 2: Markers work fast and match against a mark scheme. An unusual form may not match the expected presentation, causing them to question whether it's equivalent.\n- Step 3: Strategic principle: produce ONE clear, simplified answer in the form requested, and stop. Don't show off.\n\nException: if the question specifies a form (e.g., $$p + q\\sqrt{2}$$), you MUST rewrite to match — but check the rewrite carefully.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "What's the difference between a \"blank\" answer and a \"wrong\" answer in terms of marks scored, and what's the strategic implication?", "answer": "- Step 1: Blank = 0 marks. Period. No method, no answer, nothing to award.\n- Step 2: Wrong but with substituted method = potentially full method marks (M marks). On a 4-mark question with M1 M1 M1 A1 structure, a wrong final answer with all method visible can still score 3/4.\n- Step 3: Implication: NEVER leave a part blank. Even a \"ridiculous\" final number, if it follows from substituting correctly into the right formula, banks marks.\n\nHarry: \"just keep going with the numbers, put a little star next to it.\" The star marks it for revisiting if time allows; the substitution banks the method.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "What's the \"first line of working\" rule, and why does it deserve special care compared to later lines?", "answer": "- Step 1: The first line of working is usually where you write down the differentiated/integrated/manipulated form of the original expression — it sets up everything downstream.\n- Step 2: A slip on line 1 (wrong sign, wrong power, wrong coefficient) propagates: every subsequent line uses the wrong value, so every subsequent mark can be lost.\n- Step 3: Strategy: be FAST on routine arithmetic (later lines), but SLOW and deliberate on line 1. Double-check signs and powers before moving on.\n\nCost-benefit: 5 extra seconds on line 1 saves 5 minutes of compounding error correction later.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "What's the conceptual difference between \"value of $$y$$\" and \"coordinates\" when stating a minimum/maximum of a curve, and why does it matter for the mark?", "answer": "- Step 1: \"Value\" = the $$y$$-coordinate alone (the actual minimum/maximum height).\n- Step 2: \"Coordinates\" = the $$(x, y)$$ pair — i.e., WHERE on the curve the minimum/maximum occurs.\n- Step 3: They reward different skills: \"value\" tests that you know the range of the function; \"coordinates\" tests that you also know WHERE the extreme occurs (which requires solving $$f'(x) = 0$$ or knowing the period structure).\n\nFor a question worth 2 marks, \"coordinates\" almost certainly wants BOTH numbers — 1 mark each.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": true}, {"question": "When a function $$f(x) = (x - 4)(2x + 1)^2$$ has a \"touch\" point at $$x = -\\tfrac{1}{2}$$ and a \"cross\" point at $$x = 4$$, what determines the touch vs cross behaviour?", "answer": "- Step 1: A REPEATED root (here $$(2x+1)^2$$ — multiplicity 2) means the curve TOUCHES the $$x$$-axis but doesn't cross. Geometrically, the curve \"kisses\" the axis and bounces back.\n- Step 2: A SIMPLE root (here $$(x - 4)$$ — multiplicity 1) means the curve CROSSES the $$x$$-axis at that point — the sign of $$y$$ changes.\n- Step 3: General rule: even multiplicity → touch, odd multiplicity → cross. So $$(2x+1)^2$$ → touch at $$x = -\\tfrac{1}{2}$$; $$(x-4)^1$$ → cross at $$x = 4$$.\n\nThis is also why $$x = -\\tfrac{1}{2}$$ is a turning point of $$f$$.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": true}, {"question": "What's the 12-item mental subtraction drill, and why does it mix integers, fractions, and decimals?", "answer": "- Step 1: It contains subtractions that actually bit you across both halves of the lesson: $$46-25$$, $$21-12$$, $$93-36$$ (ESAT), and $$6-1.42$$, $$8-2-\\tfrac{1}{6}$$, $$\\tfrac{56}{4}-\\tfrac{49}{4}$$, $$\\pi - 0.7 - 2.258$$ (P1).\n- Step 2: The mix is deliberate: ESAT is non-calculator (integers/simple fractions), P1 allows calculator (decimals, exact fractions). The HABIT is the same: do it carefully, size-check, re-verify.\n- Step 3: The goal isn't speed — it's making size-check REFLEXIVE so a wrong answer feels wrong before you write it.\n\nPractice: do the set cold each morning for a week, timing yourself.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "What's the \"size-check\" technique for catching arithmetic slips, and how do you apply it?", "answer": "- Step 1: Before writing down a calculated number, mentally bracket its magnitude: $$6 - 1.42$$ is \"a bit under 5\", $$46 - 25$$ is \"about 20\", $$8 - 2 - \\tfrac{1}{6}$$ is \"just under 6\".\n- Step 2: After writing, COMPARE the written value to the bracket. If they disagree, re-key/re-compute. $$0.96$$ does NOT match \"a bit under 5\" — that's a red flag.\n- Step 3: For sign: check whether the answer should be positive or negative based on the larger magnitude. If your written sign is wrong, the magnitude check usually catches it.\n\nMake this a 2-second automatic step after every subtraction or arithmetic operation.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "What's the conceptual link between Q9(c) (count solutions of $$\\tan\\theta = 1 + \\sin\\theta$$ over a range) and the June 12 lesson on $$\\tan\\theta$$ vs $$\\tfrac{1}{x} + 1$$?", "answer": "- Step 1: Both questions reduce to \"count intersections of two periodic/quasi-periodic curves over a specified range\".\n- Step 2: The unified technique: identify the period of each curve, find the LCM (or combined period), count intersections in ONE combined period, then scale.\n- Step 3: For partial periods, add (or subtract) intersections in the leftover fraction, paying attention to endpoint inclusion.\n\nThe motif is \"one pattern per period, scaled by number of periods, plus endpoint correction\" — universal across trig-counting problems.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "When does $$\\sin^{-1}$$ (on a calculator) NOT give you the angle you want, and what's the universal fix?", "answer": "- Step 1: $$\\sin^{-1}$$ returns the principal value in $$[-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2}]$$ — i.e., the ACUTE angle (or zero/negative).\n- Step 2: But $$\\sin\\theta = k$$ has multiple solutions: in $$[0, \\pi]$$, both $$\\alpha$$ and $$\\pi - \\alpha$$ work; over the whole real line, infinitely many ($$\\alpha + 2\\pi n$$ and $$\\pi - \\alpha + 2\\pi n$$).\n- Step 3: Fix: identify which range the question wants (acute/obtuse/specific quadrant), and adjust the principal value accordingly: use $$\\pi - \\alpha$$ for obtuse, $$\\alpha + 2\\pi n$$ for other periods.\n\nThis is the same issue with $$\\cos^{-1}$$ and $$\\tan^{-1}$$ — each has its own restricted range to memorise.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": true}, {"question": "What's the strategic principle behind \"underline the question, tick off requirements\" that Harry calls \"the difference of a grade in every paper\"?", "answer": "- Step 1: Each instruction in a question is a SEPARATE mark-awarding criterion. Missing one (e.g., \"integers\", \"obtuse\", \"coordinates\") loses a mark, often the A mark — the high-value marks.\n- Step 2: Underlining FORCES you to parse every instruction before solving. Ticking FORCES you to verify each before stopping.\n- Step 3: Over a 75-mark paper with $$\\sim$$10 questions, this catches 4–6 micro-mistakes that would otherwise leak silently. That's a full grade boundary.\n\nHarry: \"you're making lots of little mistakes you can avoid by underlining and ticking things off.\"", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": false}, {"question": "For \"graph transformation\" questions like \"$$y = f(x + a)$$ passes through $$O$$\", what's the conceptual translation between algebra and geometry?", "answer": "- Step 1: \"$$y = f(x + a)$$\" is the graph of $$f$$ translated $$a$$ units to the LEFT if $$a > 0$$, RIGHT if $$a < 0$$. (Counter-intuitive: $$+a$$ shifts left.)\n- Step 2: \"Passes through $$O = (0,0)$$\" means the translated graph hits the origin: at $$x = 0$$, $$y = f(0 + a) = f(a) = 0$$.\n- Step 3: So $$a$$ must be a value at which $$f$$ equals zero — i.e., $$a$$ is a ROOT of the original function.\n\nThis conversion (\"passes through $$O$$\" → \"$$f(a) = 0$$\") is universal for translation-type transformation questions.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": true}, {"question": "Why is \"stop when you have a correct simplest form\" a strategic rule rather than just a time-saving tip?", "answer": "- Step 1: Each additional algebraic move (rewrite, simplification, combination) carries its own slip risk. The marginal benefit of looking prettier is small; the marginal risk is real.\n- Step 2: Markers reward correctness, not elegance. A simple correct answer scores the same as a heavily simplified correct answer.\n- Step 3: Worse: a heavily simplified WRONG answer scores less than the original correct one, because you've now introduced a transcription error you didn't have before.\n\nHarry: \"you might make a mistake in the rewrite and confuse the examiner.\"", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": false}, {"question": "What's the relationship between turning points of $$f(x)$$ and the equation $$f'(x) = 0$$, and what's the slip Harry caught about horizontal vs vertical tangents?", "answer": "- Step 1: A turning point is where $$f'(x) = 0$$ — gradient is zero, the curve momentarily stops rising or falling.\n- Step 2: Gradient ZERO means the tangent line is HORIZONTAL, of the form $$y = $$ constant. NOT vertical (vertical = infinite gradient, which would be $$f'(x) \\to \\infty$$).\n- Step 3: So at a turning point $$(a, f(a))$$, the tangent is simply $$y = f(a)$$ — no need for $$y - y_1 = m(x - x_1)$$ since $$m = 0$$ collapses everything.\n\nSlip Harry caught: drawing a vertical line at the turning point — wrong by 90°.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": false}, {"question": "Why is the lesson's emphasis on \"$$\\sim$$3 past papers per weekend\" a strategy and not just a quantity, and what's the reflective component?", "answer": "- Step 1: Volume builds pattern recognition. The more past papers you do, the faster you spot triggers (e.g., \"given\" → conditional, \"obtuse\" → reject acute, \"integers\" → clear fractions).\n- Step 2: But unreflective volume is wasted: doing 3 papers without reviewing mistakes leaves the same leaks intact. Each paper must be followed by a review of WHAT WENT WRONG.\n- Step 3: The compound: paper → review mistakes → identify habit gaps → drill that habit → next paper tests whether the habit stuck.\n\nHarry: \"experience is what makes you reach for the sketch or the trigger next time.\" Volume + reflection = mastery.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": false}], "count": 66}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "Lesson scoreboard: on the WMA11/01 paper you scored 54/75 (UMS 77, grade B). Roughly how many marks would have lifted you to an A, and what type of marks were they? (2 steps)", "answer": "- Step 1: About $$+6$$ careless marks would have given $$60/75 \\approx$$ UMS $$86$$, a grade A under Jan-2026 boundaries.\n- Step 2: Crucially, those $$6$$ marks were NOT conceptual — they were execution slips (mental subtraction, un-ticked requirements, dropped roots, one blank part). The headline lesson: **one whole grade $$=$$ less than the contents of one hard question**, and the fix is habit, not knowledge.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "ESAT warm-up problem 1: 120 students, 46 girls, 36 chose tennis (⅔ boys), 25 girls swam, 27 chose archery. Your first instinct was to use $$x, y, z$$ simultaneous equations. Why did Harry redirect you, and to what?", "answer": "- Step 1: With three unknowns, simultaneous equations get \"hairy\" — you compound algebra errors and lose time on a $$\\sim 90$$-second-per-question paper.\n- Step 2: Harry's redirect: **organise the information into a two-way table** (boys/girls × swim/archery/tennis with a total row and column). Each datum becomes a single cell, so there is no algebra at all — just additions and subtractions.\n- Step 3: Takeaway: when a problem gives many pieces of categorical/count information, **default to a table, not to variables**. Equations are for relations between quantities; tables are for sorting given facts.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "What is the small physical habit Harry insisted on while filling the ESAT two-way table, and why does it matter?", "answer": "- Step 1: As you place each given fact into the table, **put a little tick next to that fact** so you know it has been \"used\".\n- Step 2: This prevents two failure modes: (a) **double-counting** a piece of information, and (b) **forgetting** a piece you have not yet placed.\n- Step 3: It also lets you do the cells in the right order — you only deduce a new cell when its row/column already has enough ticked data. Under time pressure, the tick is what keeps the bookkeeping honest.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "ESAT warm-up 1 ended with: \"A boy is picked at random; find the probability he chose swimming.\" What is the trigger phrase, and what does it force in the calculation? (3 steps)", "answer": "- Step 1: The trigger is **\"a boy picked at random … that he chose swimming\"** — the wording restricts the sample space to boys only.\n- Step 2: This forces a **conditional probability**: divide by the **row total for boys**, not the grand total of 120.\n- Step 3: So $$P(\\text{swim}\\mid\\text{boy}) = \\dfrac{\\text{boys who swim}}{\\text{total boys}} = \\dfrac{32}{74} = \\dfrac{16}{37}$$, not $$\\tfrac{32}{120}$$. Under the $$\\sim 90$$-s ESAT clock you must *feel* this trigger instantly, not reason it out.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "In ESAT 1, you computed a cell as $$46 - 25 - 12 = 9$$, but at the pen you produced $$19$$ instead. What was the slip and what does Harry want you to drill?", "answer": "- Step 1: You did $$46 - 25 = 21$$ (fine), then $$21 - 12$$ — the answer is $$9$$, but you ran \"$$21 - 12 = 18$$, then $$18 + 1 = 19$$\", producing $$19$$.\n- Step 2: This is a **careless mental subtraction**, the same failure mode that hit you in P1 Q7c ($$6 - 1.42$$).\n- Step 3: Harry's prescription: drill rapid mental subtraction with an app, and in the exam **re-key every subtraction on the calculator** and size-check the magnitude before writing it down.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "For a solid cylinder (radius $$r$$, height $$h$$), why is the curved surface area equal to $$2\\pi r h$$? Build the intuition, do not just quote it. (3 steps)", "answer": "- Step 1: Imagine the curved side as a label on a tin or a sheet of wrapping paper around a toilet roll.\n- Step 2: **Cut the label vertically and unfurl it** — it flattens into a rectangle.\n- Step 3: One side of that rectangle is the height $$h$$; the other side is the distance once around the circle, which is the circumference $$2\\pi r$$. So curved area $$= h \\times 2\\pi r = 2\\pi r h$$.\n\nCombine with the two circular ends ($$2 \\pi r^2$$) to get the full $$S = 2\\pi r^2 + 2\\pi r h$$.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "ESAT 2: a solid cylinder has surface area numerically equal to volume. What is the strategic move that turns this from a \"two unknowns\" mess into a one-line answer? (3 steps)", "answer": "- Step 1: Write both formulae from memory: $$V = \\pi r^2 h$$, $$S = 2\\pi r^2 + 2\\pi r h$$. Setting $$S = V$$ gives $$\\pi r^2 h = 2\\pi r^2 + 2\\pi r h$$.\n- Step 2: **Divide through by $$\\pi$$** (cancels everywhere), then **gather all $$h$$-terms on one side and factor $$h$$ out**: $$h(r^2 - 2r) = 2r^2$$.\n- Step 3: Factor $$r$$ from $$r^2 - 2r = r(r-2)$$ so it cancels with $$r^2$$ in the numerator: $$h = \\dfrac{2r^2}{r(r-2)} = \\dfrac{2r}{r-2}$$. The strategy is **cancel-first, then isolate**, not expand-and-grind.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Harry's coaching after the cylinder problem: why must you *memorise* $$V = \\pi r^2 h$$ and $$S = 2\\pi r^2 + 2\\pi r h$$ stone-cold for ESAT, rather than re-deriving them from an unfurled-rectangle picture?", "answer": "- Step 1: ESAT is a non-calculator, ~90-seconds-per-question paper. Re-deriving each formula every time burns the time you need for the algebra.\n- Step 2: The formulae are not the \"thinking\" part of the problem — they are *inputs* to the thinking (setting $$S = V$$ and isolating $$h$$). If the input takes 30 seconds, the actual problem-solving has 60 seconds to live in.\n- Step 3: The habit is **memorise standard formulae** (volume, surface area, sector area $$\\tfrac12 r^2 \\theta$$, etc.) so you can write them down at full speed and devote brain cycles to the structural move.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "P1 Q7(c): you wrote $$OD = 0.96$$, but the correct value is $$\\approx 1.42$$. What was the slip type, and what is the size-check that should have caught it immediately?", "answer": "- Step 1: The setup $$OD = \\dfrac{6 \\sin(0.184)}{\\sin(2.258)}$$ was correct; the slip was a **careless evaluation on the calculator**.\n- Step 2: Size-check: $$\\sin(0.184) \\approx 0.18$$ and $$\\sin(2.258) \\approx 0.78$$, so $$OD \\approx \\dfrac{6 \\times 0.18}{0.78} \\approx \\dfrac{1.08}{0.78} \\approx 1.4$$. A value of $$0.96$$ is \"too small\" — it should feel wrong.\n- Step 3: Harry's rule: **re-key every subtraction and every quotient**, and ask \"does the magnitude make sense?\" before writing it down. A wrong value here cascades into a wrong $$CD = 6 - OD$$ and a wrong perimeter, losing the rest of the question.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Theme 2 (\"underline every requirement\") — Harry called this the **single highest-leverage habit change** for your grade. Why is one underline-and-tick worth so much per paper? (3 steps)", "answer": "- Step 1: Most of your lost marks were not from getting maths wrong, they were from **answering a slightly different question** than the one asked (value vs coordinates, missing \"integers\", missing \"obtuse\", missing units).\n- Step 2: Each missed requirement costs $$1$$–$$2$$ marks. On a paper, $$3$$–$$4$$ of them stack to about a grade boundary.\n- Step 3: The habit is procedural: **before writing, underline every instruction word**; **after writing, tick each underline off** to confirm you satisfied it. Harry: \"that could be the difference of a grade in every paper.\"", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "P1 Q7(b) asked for $$\\angle ADO$$, **stating it is obtuse**. What is the trap, and what's the procedural fix when you use $$\\sin^{-1}$$? (3 steps)", "answer": "- Step 1: The calculator's $$\\sin^{-1}$$ has restricted range $$[-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2}]$$, so it returns only the **acute** branch (here $$0.884$$ rad).\n- Step 2: From the sine graph, $$\\sin\\theta = k$$ in $$[0, \\pi]$$ has a **second solution** $$\\theta = \\pi - 0.884 = 2.258$$ — the obtuse one.\n-
