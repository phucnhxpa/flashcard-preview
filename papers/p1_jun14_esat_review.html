every instruction word and key requirement** in the question stem. This includes: the form of the answer, the accuracy required, which branch (obtuse/acute), whether it asks for coordinates or a value, and any special conditions (integers, exact form).\n- Step 2: The underlines serve as a contract: each one is a requirement you must satisfy. Without them, you rely on memory to check all conditions at the end — and under time pressure, you will forget at least one.\n- Step 3: Harry: *\"As you read through, underline the key information… then at the end check — is this obtuse? It's not between $$\\pi/2$$ and $$\\pi$$, so it's wrong.\"* The underlines are what make the final check possible. Without them, you have no checklist to tick.", "source": "GLM 5.1 ②", "_id": "glm_2_93", "judge_pick": true}, {"question": "You've completed a question and are about to move on. What final 10-second routine should you perform? (Theme 2, Drill B)", "answer": "- Step 1: **Go back to your underlines and tick each one off.** Ask: did I satisfy this requirement? If any tick fails, fix it before moving on.\n- Step 2: The checks include: units written? Accuracy correct? Answer in the requested form? All solutions found (including $$x = 0$$)? Right branch selected? Coordinates (not just value)? Integer coefficients? Every part has a final answer?\n- Step 3: This 10-second routine is the single highest-leverage habit in the exam. It costs almost no time and catches the ~6 marks of \"requirement\" errors that separated a B from an A on this paper. Harry: *\"That could be the difference of a grade in every paper.\"*", "source": "GLM 5.1 ②", "_id": "glm_2_94", "judge_pick": false}, {"question": "When the question says \"express $$h$$ in terms of $$r$$\" and you get $$h = \\frac{2r^2}{r^2 - 2r}$$, what simplification step is needed — and why? (ESAT 2)", "answer": "- Step 1: Factor the denominator: $$r^2 - 2r = r(r - 2)$$. Then cancel the common factor of $$r$$: $$h = \\frac{2r^2}{r(r-2)} = \\frac{2r}{r-2}$$.\n- Step 2: The cancellation is valid because $$r$$ is the radius of a cylinder, so $$r \\neq 0$$ (a cylinder with zero radius doesn't exist). You can safely divide by $$r$$.\n- Step 3: The uncancelled form $$\\frac{2r^2}{r^2 - 2r}$$ is not \"simplest form.\" In an exam, leaving it uncancelled may lose the final accuracy mark. Always cancel common factors in the final answer — but verify the factor isn't zero first.", "source": "GLM 5.1 ②", "_id": "glm_2_95", "judge_pick": true}, {"question": "When solving a \"hidden quadratic\" by substitution, after finding the values of $$u$$, what is the most commonly forgotten step before converting back to the original variable? (Q5b)", "answer": "- Step 1: **Reject any values of $$u$$ that are impossible given the substitution.** If $$u = (y-5)^2$$, then $$u \\geq 0$$ — reject any negative values of $$u$$.\n- Step 2: In Q5b, the cubic gives $$u = 0$$, $$u = \\frac{7}{2}$$, $$u = -5$$. The value $$u = -5$$ must be rejected because a squared quantity cannot be negative. Harry: *\"A squared quantity is non-negative.\"*\n- Step 3: Forgetting this rejection step leads to \"phantom solutions\" — values of the original variable that don't actually satisfy the original equation. Always check: what constraints does the substitution impose?", "source": "GLM 5.1 ②", "_id": "glm_2_96", "judge_pick": false}, {"question": "What is the bottom-line summary of this entire lesson — in one sentence? (Overall)", "answer": "- Step 1: You are an A/A* mathematician leaking approximately 6 marks at the pen in both ESAT and P1 — and those 6 marks are the exact gap between a B and an A.\n- Step 2: The leaks are not conceptual (you set up every method correctly); they are habitual: careless mental subtraction, un-ticked question requirements, dropped $$x = 0$$ roots, and parts left blank.\n- Step 3: Plugging the leak costs habit, not knowledge: underline and tick off every requirement, re-key every subtraction and size-check it, write down $$x = 0$$ the instant you factor out $$x$$, and never leave a part blank (substitute, evaluate, star it). These habits, drilled until automatic, are the cheapest grade you will ever buy.", "source": "GLM 5.1 ②", "_id": "glm_2_97", "judge_pick": false}], "count": 98}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "When an ESAT-style problem gives you multiple pieces of information about categories (e.g. boys/girls vs activities), what organisational structure should you reach for BEFORE writing simultaneous equations, and why? (2 steps)", "answer": "- Step 1: Reach for a **two-way table** (grid with rows for one category, columns for the other, plus a total row and column). Do NOT start naming variables and writing simultaneous equations.\n- Step 2: The reason is that with three or more unknowns, the simultaneous-equation approach gets \"hairy\" — you can easily miscount or double-count a constraint. A grid makes every datum drop straight into a cell, and every missing cell is just one subtraction away from being deduced.\n\nThe table is a visual accounting system: every number you're told occupies exactly one cell, and the row/column totals do the bookkeeping for you.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "ESAT 1 two-way table — as you place each given number into the grid, what physical habit must you perform to prevent double-counting or forgetting a datum?", "answer": "**Put a little tick (✓) next to each datum in the question the moment you use it.** This is the \"tick-as-you-use\" habit. Without it, under timed conditions (~90 seconds per ESAT question), it is easy to either use the same number twice or skip one entirely. The tick makes the question stem into a checklist: if a number hasn't been ticked, you haven't placed it yet.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "ESAT 1 — once the given numbers are placed in the two-way table, what's the strategy for filling the remaining cells, and why shouldn't you \"go for it\" all at once?", "answer": "**Deduce one cell at a time.** Harry's exact words: \"Don't go for it. Do it one step at a time.\" Each new cell you fill may unlock another, but only if the row or column it sits in has exactly one missing entry. If you try to fill multiple cells at once, you risk using a value that itself hasn't been confirmed yet — a single wrong cell then cascades through the whole table. One cell, one subtraction, one confirmation.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "What is the trigger phrase in a probability question that tells you the denominator must be a row/column total, NOT the grand total? (2 steps)", "answer": "- Step 1: The trigger is a phrase like **\"A [type] is picked at random… that [he/she/it]…\"** — the pronoun referring back to the type tells you the sample space is restricted to that subgroup.\n- Step 2: For example, \"A boy picked at random… that he chose swimming\" means you are already inside the \"boys\" row. The denominator is the boys total (74), not the grand total (120). The probability is $$P(\\text{swimming} \\mid \\text{boy}) = \\frac{32}{74} = \\frac{16}{37}$$, NOT $$\\frac{32}{120}$$.\n\nThe key insight: the word \"he\" (or \"she\") is the grammatical signal that the universe has already been narrowed before the question was asked.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "ESAT 1 — you first wrote $$\\frac{32}{120}$$ as the answer. What specific misreading of the question caused this, and how does underlining prevent it? (2 steps)", "answer": "- Step 1: You treated the question as if a student were picked from *all 120*, then asked about swimming. But the question says \"a **boy** picked at random\" — the sample space is restricted to boys before the probability is computed.\n- Step 2: If you had underlined \"a **boy** picked at random\" and \"**he** chose swimming\" before starting, the restricted sample space would have been explicit. Underlining forces you to notice which subgroup the question is conditioning on, so you reach for the row total (74) instead of the grand total (120).", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "What's the visual intuition behind the curved-surface-area formula for a cylinder, $$2\\pi r h$$, and why does it involve a rectangle? (3 steps)", "answer": "- Step 1: Imagine a toilet-roll tube or wrapping-paper tube — a cylinder with no top or bottom.\n- Step 2: **Cut it vertically and unfurl it.** It flattens into a rectangle. One side of that rectangle is the height $$h$$ of the cylinder; the other side is the distance around the circle — the circumference $$2\\pi r$$.\n- Step 3: Area of rectangle = base × height = $$(2\\pi r) \\times h = 2\\pi r h$$. That's the curved surface area.\n\nThe trick is: cylinders hide rectangles. Unfurl to reveal them.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "What are the two formulae for a solid (closed) cylinder that you must memorise cold for ESAT speed, and what are the three surfaces that make up the total surface area? (2 steps)", "answer": "- Step 1: $$V = \\pi r^2 h$$ and $$S = 2\\pi r^2 + 2\\pi r h$$.\n- Step 2: The surface area has **three** pieces: two circular ends (each $$\\pi r^2$$, together $$2\\pi r^2$$) plus the curved side ($$2\\pi r h$$). Harry's advice: \"ideally this is just a formula you can remember… write it down very quickly without having to draw lots of diagrams.\" In ESAT you cannot afford to re-derive from the unfurling picture every time.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "When a question says the surface area of a solid cylinder is numerically equal to its volume, what's the setup and the key algebraic move to express $$h$$ in terms of $$r$$? (3 steps)", "answer": "- Step 1: Set the two formulae equal: $$\\pi r^2 h = 2\\pi r^2 + 2\\pi r h$$.\n- Step 2: Divide through by $$\\pi$$ (it cancels completely): $$r^2 h = 2r^2 + 2rh$$.\n- Step 3: Gather the $$h$$ terms on one side: $$r^2 h - 2rh = 2r^2$$, factor out $$h$$: $$h(r^2 - 2r) = 2r^2$$, so $$h = \\frac{2r^2}{r^2 - 2r} = \\frac{2r^2}{r(r-2)} = \\frac{2r}{r-2}$$.\n\nThe crucial move is factoring out $$h$$ so you can isolate it — and then cancelling the common factor of $$r$$ in numerator and denominator.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "About how many marks separated a B from an A on this P1 paper, and what was the root cause of those lost marks — conceptual gaps or execution habits?", "answer": "**About 6 marks = one whole grade** (54/75 → B, vs 60/75 → A). The root cause was **execution habits**, not conceptual gaps. Every method was set up correctly (sine rule, discriminant, chain rule, surd conjugate, quadratics). The marks were lost to careless arithmetic, un-ticked question requirements, and one part left blank. You are not a B-grade mathematician who needs to learn more topics; you are an A/A* mathematician leaking marks at the pen.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "What is the single highest-leverage habit to close the \"careless arithmetic\" leak, and how do you execute it under exam pressure? (2 steps)", "answer": "- Step 1: **Re-key every subtraction on your calculator and size-check the result before you write it.** This applies to integers, fractions, and decimals alike.\n- Step 2: The size-check means asking: \"Is the answer the right magnitude and sign?\" For example, $$6 - 1.42$$ should be \"a bit under 5\" — if you write 0.96, that's clearly wrong. $$8 - \\frac{1}{6}$$ is \"just under 8.\" If your written value fails the size check, re-key it immediately.\n\nThis habit costs 2 seconds per subtraction and recovers ~6 marks across the paper.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "In Q7(c), you computed $$OD \\approx 0.96$$ when the correct value was $$OD \\approx 1.42$$. This wrong value cascaded into $$CD$$ and the perimeter. What type of error was this, and what specific habit prevents it?", "answer": "This was a **careless evaluation error** — not a method error. The sine rule was set up perfectly: $$OD = \\frac{6\\sin(0.184)}{\\sin(2.258)}$$. The slip was in the calculator evaluation. The habit that prevents it: **after computing any subtraction or division, do a magnitude check.** $$OD$$ is a side of a triangle with other sides 5 and 6, so 0.96 is suspiciously small — 1.42 is more plausible. Re-key the calculation and trust the sanity check.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "What is the underline-and-tick-off method for reading exam questions, and why did Harry call it \"the difference of a grade in every paper\"? (3 steps)", "answer": "- Step 1: **Before writing any working, read the stem and underline every instruction word**: the form of the answer (e.g. \"$$ax+by+c=0$$ with integer coefficients\"), the object asked for (coordinates vs a value), the accuracy (1 d.p., 3 s.f.), and any descriptor that picks a branch (obtuse, positive).\n- Step 2: **When you finish the question, go back and physically tick off each underline.** If any underline is un-ticked, you haven't satisfied that requirement yet — go fix it.\n- Step 3: Harry called it grade-changing because on this paper alone, un-ticked requirements cost marks on Q7 (obtuse), Q8 (integers), and Q9a (coordinates) — that's ~3 marks, half the B→A gap.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "Q7(b) — the question said angle $$ADO$$ is **obtuse**. What does underlining \"obtuse\" force you to do that you otherwise wouldn't? (2 steps)", "answer": "- Step 1: The calculator's $$\\sin^{-1}$$ only returns values in $$[-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$$ — the acute branch. It gives you 0.884 rad. But the sine curve has a second solution in $$[0, \\pi]$$: $$\\pi - 0.884 = 2.258$$ rad.\n- Step 2: Underlining \"obtuse\" forces you to **reject the acute calculator value and carry the obtuse one**. Without that underline, you'd write 0.884 and lose the mark — and every downstream calculation in part (c) would use the wrong angle.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Q8(a) — the answer had to be in the form $$ax + by + c = 0$$ with **integer** coefficients. You had the correct line equation but lost the A-mark. What exactly went wrong, and what's the fix? (2 steps)", "answer": "- Step 1: You had the correct relationship (normal gradient $$-\\frac{6}{35}$$, through $$(4,1)$$) but left the equation in a form with fractions, not clearing them to produce integer $$a, b, c$$.\n- Step 2: The fix: multiply through by the common denominator to eliminate all fractions, then verify $$a, b, c \\in \\mathbb{Z}$$. Here, $$y - 1 = -\\frac{6}{35}(x-4)$$ → multiply by 35 → $$35y - 35 = -6x + 24$$ → $$6x + 35y - 59 = 0$$. The underline-and-tick habit catches this: underline \"integers\", then tick it only after you've verified.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Q9(a) — the question asked to \"state the **coordinates** of the minimum.\" You wrote only the value $$-4$$. What should you have written, and what's the general rule? (2 steps)", "answer": "- Step 1: You should have written the **point** $$(270°, -4)$$ — both the $$x$$-coordinate (where the minimum occurs) and the $$y$$-coordinate (the minimum value).\n- Step 2: General rule: \"coordinates\" always means an ordered pair $$(x, y)$$. \"Value\" means a single number. If the question says coordinates and you write one number, you get at most half the marks. Underline \"coordinates\" and answer with a point.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "When you factorise a polynomial like $$2x^3 + 3x^2 - 35x = x(2x^2 + 3x - 35) = 0$$, what root is almost always forgotten, and what reflex should you build? (2 steps)", "answer": "- Step 1: The root **$$x = 0$$** from the factored-out $$x$$ is almost always forgotten. You solved only the quadratic bracket and lost the mark.\n- Step 2: Build the reflex: **the instant you factor out $$x$$ (or $$\\sin\\theta$$, or any variable), write down \"$$x = 0$$\" on the next line before you touch the quadratic.** Make it the first solution you write. Phuc's own reflection: \"I forgot about $$x = 0$$.\" The fix is to write it first, always.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "Q5(a) — Harry said factorising the quadratic $$(2x-7)(x+5)$$ is \"more efficient\" than running the quadratic formula. Why is this true under exam conditions? (2 steps)", "answer": "- Step 1: Factorising is a single mental step if you can spot the factors: you need two numbers that multiply to $$2 \\times (-35) = -70$$ and add to $$3$$ — those are $$10$$ and $$-7$$. Split the middle term and factorise.\n- Step 2: The quadratic formula requires substituting into $$x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}$$, simplifying the surd, and reducing the fraction — three steps where each is a potential arithmetic slip. Factorising has fewer steps and fewer places to go wrong. Under time pressure, fewer steps = fewer careless errors.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "Q7(c) — you stopped after writing the perimeter formula with an uncertain $$OD$$ value, leaving the part effectively blank. What is Harry's rule for this situation, and why does it work? (3 steps)", "answer": "- Step 1: **Never leave a part blank.** Even if you know a value is wrong, substitute it in and grind to a final answer.\n- Step 2: A blank scores **zero**. A substituted expression — even with a wrong number — can score the **method (M) marks**. The mark scheme awards M marks for the correct method with numerical values substituted, regardless of whether those values are right.\n- Step 3: Harry's tactic: \"Put a little star next to it, and if you've got time come back.\" The star marks it as uncertain but the method marks are banked. Had you written perimeter $$= 33.5 + (6 - OD) + 5$$ with *any* number for $$OD$$, you would have scored method marks instead of zero.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "Q1(a) — Harry said \"the very first line is the most important… a slip there has a snowball effect.\" What was the specific slip, and what's the general rule? (2 steps)", "answer": "- Step 1: The slip was in differentiating $$-24x^{-1/2}$$: the power $$-\\frac{1}{2}$$ comes to the front correctly, but you must then subtract 1 from the power. Subtracting 1 from a *negative* power makes it *more* negative: $$-\\frac{1}{2} - 1 = -\\frac{3}{2}$$. A slip here gives the wrong derivative, which feeds into the gradient in part (b), which feeds into the tangent equation — the error snowballs.\n- Step 2: General rule: **be fast in general, but slow and careful on the first couple of lines.** Double-check the opening line before you move on. One careful re-read of the first line costs 10 seconds; a snowballed error costs multiple marks.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "When you differentiate a term like $$-24x^{-1/2}$$, what's the common sign/power slip, and how do you guard against it? (2 steps)", "answer": "- Step 1: The slip is mishandling the combination of the negative coefficient and the negative power. Write it out explicitly: $$-24 \\cdot \\left(-\\frac{1}{2}\\right) x^{-1/2 - 1} = +12x^{-3/2}$$. The two negatives make a positive coefficient, and the power goes from $$-\\frac{1}{2}$$ to $$-\\frac{3}{2}$$ (more negative).\n- Step 2: Guard: write the rewrite step $$-\\frac{24}{\\sqrt{x}} = -24x^{-1/2}$$ on its own line, then differentiate term by term on the next line. Never differentiate directly from the surd form — converting to power notation first makes the power rule mechanical and reduces slips.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Q3(b) — you solved the quadratic on the calculator and wrote a bracket whose expansion didn't reproduce the leading coefficient. What's the correct procedure for going from calculator roots to factorised form? (3 steps)", "answer": "- Step 1: The calculator gives roots, say $$x = 2$$ and $$x = -\\frac{18}{11}$$. Write the corresponding factors: $$(x - 2)$$ and $$(11x + 18)$$ — note the second factor clears the fraction by multiplying through by 11.\n- Step 2: Check: expand $$(x-2)(11x+18) = 11x^2 + 18x - 22x - 36 = 11x^2 - 4x - 36$$. This matches the original quadratic exactly (leading coefficient 11, not 1).\n- Step 3: If you had written $$(x-2)(x+\\frac{18}{11})$$, expanding gives $$x^2 - \\ldots$$ — the leading coefficient is 1, not 11. Depending on the mark scheme, this won't score the factorisation mark. **Always build brackets that expand back to the original quadratic.**", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "Q3(b)-(c) — Harry said \"the thing that was more serious\" was copying inequality signs carelessly. The original was a strict inequality ($$<$$). What must you ensure about the final answer interval? (2 steps)", "answer": "- Step 1: If the original inequality is **strict** ($$<$$ or $$>$$), then every inequality sign in your solution must also be strict ($$<$$ or $$>$$), never $$\\leq$$ or $$\\geq$$.\n- Step 2: Here, $$11x^2 - 4x - 36 < 0$$ gives $$-\\frac{18}{11} < x < 2$$ (strict). If you accidentally wrote $$-\\frac{18}{11} \\leq x \\leq 2$$, you'd lose the final accuracy mark. Copy inequality signs deliberately and double-check they match the original.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "Q3(c) — you had the interval from part (b) and the condition from part (a). What's the final step, and what happens if you skip it? (2 steps)", "answer": "- Step 1: **Intersect the two sets.** Part (b) gives $$-\\frac{18}{11} < x < 2$$; part (a) gives $$x > 1.5$$. The overlap is $$1.5 < x < 2$$.\n- Step 2: If you skip the intersection and just write the interval from (b), you include values like $$x = 0$$ that violate the perimeter condition from (a). The \"hence\" in part (c) tells you both conditions must hold simultaneously. Always intersect when a question says \"hence state the range.\"", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "Q4 — Harry's coaching was \"stop at a correct answer; don't over-simplify.\" What's the strategic reason for this? (2 steps)", "answer": "- Step 1: Once you have a correct simplest form (e.g. $$\\frac{4}{5}x^{5/2} + x^{1/2} + C$$), rewriting it in a different form (e.g. converting back to surd notation) risks introducing a new algebraic slip.\n- Step 2: Markers mark very fast — they scan for the correct form on their mark scheme. If you present a correct answer and then an incorrect \"simplification\" below it, you may confuse the marker about which is your final answer. Make their life easy: stop at the first correct form.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "Q5(b) — hidden quadratic with $$u = (y-5)^2$$. After solving for $$u$$, you get $$u = 0, \\frac{7}{2}, -5$$. What's the rule for which values to reject, and why? (2 steps)", "answer": "- Step 1: Reject any $$u$$ value that is **negative**, because $$u = (y-5)^2$$ is a squared quantity and therefore non-negative: $$(y-5)^2 \\geq 0$$.\n- Step 2: So reject $$u = -5$$. Keep $$u = 0$$ and $$u = \\frac{7}{2}$$. You may write the justification \"a squared quantity is non-negative\" to be safe for the mark scheme. Then solve $$(y-5)^2 = 0$$ and $$(y-5)^2 = \\frac{7}{2}$$ for $$y$$.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "When solving $$(y-5)^2 = \\frac{7}{2}$$ by taking square roots, where does the $$\\pm$$ go and why? (2 steps)", "answer": "- Step 1: Put the $$\\pm$$ on the **side with the numbers** (the side without the variable inside the square). So: $$y - 5 = \\pm\\sqrt{\\frac{7}{2}}$$.\n- Step 2: The reason is clarity: if you write $$\\pm(y-5) = \\sqrt{\\frac{7}{2}}$$, you have to split into two cases (\"if $$y-5$$ is positive\" and \"if $$y-5$$ is negative\"), which is error-prone. Putting $$\\pm$$ on the number side gives you both solutions directly: $$y = 5 + \\sqrt{\\frac{7}{2}}$$ and $$y = 5 - \\sqrt{\\frac{7}{2}}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "Q6 — the line $$y = 4x + c$$ meets the curve $$y = x(x-3)$$ at exactly one point. What's the trigger that tells you to use the discriminant, and what value must it take? (2 steps)", "answer": "- Step 1: The trigger is **\"exactly one point\"** (or \"touches\" / \"is tangent to\"). This means the equation formed by setting line equal to curve has exactly one real root.\n- Step 2: Set equal: $$4x + c = x^2 - 3x$$ → $$x^2 - 7x - c = 0$$. One root means discriminant $$= 0$$: $$(-7)^2 - 4(1)(-c) = 0$$ → $$49 + 4c = 0$$ → $$c = -\\frac{49}{4}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "Q7(a) — the sector angle is described as the \"reflex part\" with given angle 0.7 rad at the centre. How do you compute the sector angle, and what's the visual intuition? (2 steps)", "answer": "- Step 1: The given angle 0.7 rad is the small angle. The sector is the **reflex** (larger) part of the circle, so its angle is $$2\\pi - 0.7$$.\n- Step 2: Visual intuition: a full circle is $$2\\pi$$ radians. The given angle carves out a small \"slice\"; the sector is everything *else*. So subtract: $$\\theta = 2\\pi - 0.7 \\approx 5.583$$ rad. Then area $$= \\frac{1}{2}r^2\\theta$$.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "Q7(b) — the sine rule gives $$\\sin(ADO) = \\frac{6\\sin(0.7)}{5} \\approx 0.773$$. The calculator returns $$\\sin^{-1}(0.773) \\approx 0.884$$ rad. Why is this the WRONG answer, and what's the correct one? (2 steps)", "answer": "- Step 1: $$\\sin^{-1}$$ is restricted to the principal range $$[-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$$, so it only returns the **acute** angle. But the question specifies angle $$ADO$$ is **obtuse** (between $$\\frac{\\pi}{2}$$ and $$\\pi$$).\n- Step 2: From the sine graph, if $$\\sin\\theta = k$$ and $$\\theta$$ is in $$[0, \\pi]$$, the two solutions are $$\\theta$$ and $$\\pi - \\theta$$. So the obtuse solution is $$\\pi - 0.884 = 2.258$$ rad. Underline \"obtuse\" in the question and carry 2.258.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "Why does the calculator's $$\\sin^{-1}$$ function only give the acute angle, and how do you systematically find the obtuse alternative? (2 steps)", "answer": "- Step 1: By definition, the inverse sine function $$\\sin^{-1}$$ has range $$[-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$$. It physically cannot output values in $$(\\frac{\\pi}{2}, \\pi]$$, so it always returns the acute solution when the input is positive.\n- Step 2: For any $$\\sin\\theta = k > 0$$ with $$\\theta \\in [0, \\pi]$$, the obtuse solution is always $$\\pi - \\sin^{-1}(k)$$. This follows from the identity $$\\sin(\\pi - \\alpha) = \\sin\\alpha$$. So: compute the calculator value, then compute $$\\pi$$ minus that value, and choose the one the question asks for.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "Q7(c) — after finding angle $$ADO = 2.258$$ rad, the third angle in triangle $$AOD$$ is found. What is it, and what arithmetic produces it? (2 steps)", "answer": "- Step 1: Angles in a triangle sum to $$\\pi$$ radians. You know angle $$AOD = 0.7$$ and angle $$ADO = 2.258$$.\n- Step 2: Angle $$OAD = \\pi - 0.7 - 2.258 = 0.184$$ rad. This is exactly the subtraction that must be size-checked: $$\\pi \\approx 3.1416$$, so $$3.1416 - 0.7 - 2.258 = 0.1836 \\approx 0.184$$. The result should be a small positive angle — if you got something negative or larger than $$\\pi$$, re-key immediately.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "Q8(a) — finding the normal at $$P$$. You computed $$f'(4) = 8 - 2 - \\frac{1}{6} = \\frac{35}{6}$$. How do you get from the gradient of the tangent to the gradient of the normal? (2 steps)", "answer": "- Step 1: The gradient of the normal is the **negative reciprocal** of the gradient of the tangent. If the tangent gradient is $$m = \\frac{35}{6}$$, then the normal gradient is $$m_n = -\\frac{6}{35}$$.\n- Step 2: Common pitfall: forgetting the negative sign, or taking the reciprocal without negating. The normal is *perpendicular* to the tangent, and perpendicular lines satisfy $$m_1 \\cdot m_2 = -1$$. So $$m_n = -\\frac{1}{m} = -\\frac{6}{35}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "Q8(a) — once you have the normal gradient and the point $$(4, 1)$$, what's the sequence to reach the required form $$ax + by + c = 0$$ with integer coefficients? (3 steps)", "answer": "- Step 1: Write the point-slope form: $$y - 1 = -\\frac{6}{35}(x - 4)$$.\n- Step 2: Multiply through by 35 to clear the fraction: $$35(y - 1) = -6(x - 4)$$ → $$35y - 35 = -6x + 24$$.\n- Step 3: Rearrange to $$ax + by + c = 0$$: $$6x + 35y - 59 = 0$$. Verify: $$a = 6, b = 35, c = -59$$ — all integers ✓. The tick-off: underline \"integers\" in the question, and only tick it after this verification.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "Q8(b) — integrating $$f'(x) = 4x^{1/2} - 2 - \\frac{8}{3}x^{-2}$$ to find $$f(x)$$. What's the method and the common slip? (3 steps)", "answer": "- Step 1: Integrate term by term: $$\\int 4x^{1/2}\\,dx = 4 \\cdot \\frac{2}{3}x^{3/2} = \\frac{8}{3}x^{3/2}$$; $$\\int -2\\,dx = -2x$$; $$\\int -\\frac{8}{3}x^{-2}\\,dx = -\\frac{8}{3} \\cdot (-1)x^{-1} = \\frac{8}{3x}$$; plus constant $$C$$.\n- Step 2: Common slip: forgetting $$+C$$, or mishandling the sign when integrating $$-\\frac{8}{3}x^{-2}$$ (the $$-1$$ from $$x^{-1}$$ cancels one negative, giving a positive term).\n- Step 3: Use the point $$P(4, 1)$$ to find $$C$$: $$1 = \\frac{8}{3}(8) - 2(4) + \\frac{8}{12} + C = \\frac{64}{3} - 8 + \\frac{2}{3} + C = 14 + C$$, so $$C = -13$$.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "Q9(b) — sketching $$y = 1 + \\sin\\theta$$ on $$[0°, 360°]$$. How does this differ from the basic sine curve? (2 steps)", "answer": "- Step 1: The \"+1\" is a **vertical translation upward by 1**. Every point on the sine curve moves up by 1 unit.\n- Step 2: The basic sine curve ranges from $$-1$$ to $$1$$; after the shift, $$y = 1 + \\sin\\theta$$ ranges from **0 to 2**. The shape (starting at $$y = 1$$, peaking at $$y = 2$$ at $$90°$$, back to $$y = 1$$ at $$180°$$, trough at $$y = 0$$ at $$270°$$, back to $$y = 1$$ at $$360°$$) is the same wave, just lifted. The period is still $$360°$$.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "Q9(c) — counting solutions of $$\\tan\\theta = 1 + \\sin\\theta$$ over a large range like $$0 \\leq \\theta \\leq 2160°$$. What's the key strategy, and what are the periods of the two functions? (3 steps)", "answer": "- Step 1: Recognise that both functions are **periodic**: $$\\tan\\theta$$ has period $$180°$$, and $$1 + \\sin\\theta$$ has period $$360°$$. The combined pattern of intersections repeats every $$360°$$ (the LCM of the two periods).\n- Step 2: Count the number of intersections in **one** $$360°$$ period. Then multiply by the number of whole periods in the range. For $$2160°$$: that's $$6$$ full periods ($$6 \\times 360° = 2160°$$).\n- Step 3: If the range doesn't end on a period boundary (e.g. $$1980° = 5.5$$ periods), count the full-period intersections, then add the intersections from the remaining half-period separately, minding the endpoints.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "Q10(a) — the curve $$f(x) = (x-4)(2x+1)^2$$ \"touches\" the $$x$$-axis at $$P$$ and \"crosses\" at $$Q$$. How do you identify which is which from the factorisation? (2 steps)", "answer": "- Step 1: The **repeated root** $$(2x+1)^2 = 0$$ → $$x = -\\frac{1}{2}$$ is where the curve **touches** (is tangent to) the $$x$$-axis. The square means the curve approaches and leaves from the same side.\n- Step 2: The **single root** $$(x-4) = 0$$ → $$x = 4$$ is where the curve **crosses** the $$x$$-axis. The odd multiplicity means the curve changes sign. So $$P(-\\frac{1}{2}, 0)$$ and $$Q(4, 0)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "Q10(c) — the tangent at the turning point $$x = \\frac{5}{2}$$ has gradient 0. What does a zero-gradient tangent look like geometrically, and what form does its equation take? (2 steps)", "answer": "- Step 1: A zero-gradient tangent is a **horizontal line**. It is NOT vertical (a vertical line has *infinite* gradient). Phuc initially drew a vertical line — this is the common confusion.\n- Step 2: A horizontal line has the form $$y = k$$, where $$k$$ is the $$y$$-value at the turning point. You don't need $$y - y_1 = m(x - x_1)$$; just compute $$f(\\frac{5}{2}) = -54$$ and write $$y = -54$$.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "Q10(d) — \"$$y = f(x + a)$$ passes through the origin $$O$$.\" Harry said \"sketch, don't grind algebra.\" What does this mean, and how does the sketch give the answer? (3 steps)", "answer": "- Step 1: $$y = f(x + a)$$ is a **horizontal translation** of $$y = f(x)$$ by $$-a$$ units (shift left if $$a > 0$$, shift right if $$a < 0$$).\n- Step 2: \"Passes through $$O(0,0)$$\" means $$f(0 + a) = 0$$, i.e. $$f(a) = 0$$. So $$a$$ must be a root of $$f$$. Reading the roots off the sketch: $$x = -\\frac{1}{2}$$ and $$x = 4$$.\n- Step 3: Therefore $$a = 4$$ or $$a = -\\frac{1}{2}$$. The sketch approach is faster and less error-prone than expanding and solving algebraically. Also: \"possible values\" is a **plural cue** — expect more than one answer.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "When a question says \"possible values\" (plural), what should you expect, and what happens if you only give one?", "answer": "Expect **more than one** value. The plural is a deliberate cue from the examiner that multiple answers exist. If you only give one (e.g. only $$a = 4$$ and not $$a = -\\frac{1}{2}$$), you lose marks. Train yourself to react to the plural: scan for all valid solutions, not just the first one you find.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "Q2(a) — rationalising $$\\frac{1}{4-2\\sqrt{2}}$$. What's the conjugate you multiply by, and why does this eliminate the surd from the denominator? (2 steps)", "answer": "- Step 1: Multiply numerator and denominator by the **conjugate** $$4 + 2\\sqrt{2}$$. The denominator becomes $$(4-2\\sqrt{2})(4+2\\sqrt{2}) = 16 - (2\\sqrt{2})^2 = 16 - 8 = 8$$.\n- Step 2: The conjugate works because of the difference-of-squares identity $$(a-b)(a+b) = a^2 - b^2$$. The cross-terms cancel, and $$b^2 = (2\\sqrt{2})^2 = 4 \\cdot 2 = 8$$ is rational, eliminating the surd from the denominator.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "Q2(b) — the answer form is $$p + q\\sqrt{2}$$. What convention must you follow, and why did Harry flag this? (2 steps)", "answer": "- Step 1: Write the **rational part first**, then the surd part: $$p + q\\sqrt{2}$$. So $$10 + 10\\sqrt{2}$$ is correct; writing $$10\\sqrt{2} + 10$$ is technically the same number but doesn't match the requested form.\n- Step 2: Harry initially expected fractions (\"I was expecting fractions when they say 'rational numbers'\") but confirmed that whole numbers are rational numbers. The point is: follow the exact form requested. If it says $$p + q\\sqrt{2}$$, put the rational term first.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "What's the \"size-check\" for a subtraction, and how does it catch the Q7(c) error where $$6 - 1.42$$ was written as 0.96? (2 steps)", "answer": "- Step 1: The size-check is a 2-second sanity question: **\"Is the answer the right magnitude and sign?\"** For $$6 - 1.42$$, you're subtracting roughly 1.5 from 6, so the answer should be \"a bit under 5\" — around 4.5.\n- Step 2: Writing 0.96 fails the size-check catastrophically: it's not \"a bit under 5,\" it's close to 1. If you had done the size-check, you'd have re-keyed the calculation immediately and caught the error. The habit is: after every subtraction, ask \"does this feel right?\"", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "Q2(b) — the \"hence\" in \"hence solve\" tells you to use the result from part (a). How does part (a)'s result feed into part (b)? (2 steps)", "answer": "- Step 1: Part (a) gives you $$\\frac{1}{4-2\\sqrt{2}} = \\frac{1}{2} + \\frac{1}{4}\\sqrt{2}$$. Part (b) requires solving $$4x = 2\\sqrt{2}\\,x + 20\\sqrt{2}$$, which rearranges to $$x(4 - 2\\sqrt{2}) = 20\\sqrt{2}$$, so $$x = \\frac{20\\sqrt{2}}{4-2\\sqrt{2}}$$.\n- Step 2: The \"hence\" means: substitute part (a)'s result directly. $$x = 20\\sqrt{2} \\times \\left(\\frac{1}{2} + \\frac{1}{4}\\sqrt{2}\\right) = 10\\sqrt{2} + 5 \\cdot 2 = 10 + 10\\sqrt{2}$$. Using the earlier result is faster and less error-prone than re-rationalising from scratch.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "When solving a quadratic inequality like $$(x-2)(11x+18) < 0$$, how do you determine whether the solution is the region *between* the roots or *outside* the roots? (2 steps)", "answer": "- Step 1: Look at the inequality sign and the leading coefficient. Here the leading coefficient is positive ($$11 > 0$$) and the inequality is $$< 0$$ (negative).\n- Step 2: A positive-quadratic opening upward is negative **between** its roots. So the solution is $$-\\frac{18}{11} < x < 2$$. If the inequality were $$> 0$$, the solution would be *outside* the roots ($$x < -\\frac{18}{11}$$ or $$x > 2$$). Quick check: plug in $$x = 0$$ (between the roots) → $$(0-2)(0+18) = -36 < 0$$ ✓.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "What does Harry mean by \"volume of practice, reflectively done,\" and what's the specific target? (2 steps)", "answer": "- Step 1: \"Volume\" means doing many past papers (~3 per weekend). \"Reflectively\" means reviewing every mistake, categorising it (careless vs conceptual), and drilling the habit that fixes it — not just checking the mark scheme and moving on.\n- Step 2: The purpose of volume is **pattern recognition**: experience is what makes you reach for the sketch or the trigger phrase next time. After enough reflective practice, \"obtuse\" automatically triggers \"$$\\pi - \\sin^{-1}$$\", and \"coordinates\" automatically triggers \"write a point, not a number.\"", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "What's on the READ-THE-QUESTION checklist, and when do you execute each item? (3 steps)", "answer": "- Step 1: **Before writing any working**, underline every instruction word: units, accuracy, exact form, coordinates vs value, which root/branch, conditional triggers, required form.\n- Step 2: **While solving**, keep the underlines visible so you stay aware of them.\n- Step 3: **After finishing**, go back and physically tick off each underline. If any underline is un-ticked, you haven't satisfied that requirement — go fix it. Harry: \"the next paper I expect to see it.\"", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "What's the complete list of checks in the READ-THE-QUESTION checklist from the drills section? Name at least 7 of the 9 items.", "answer": "The 9 items are:\n1. **Units?** — cm, cm², rad, degrees; did I write them?\n2. **Accuracy?** — 1 d.p., 3 d.p., 3 s.f.; did I round to exactly that?\n3. **Exact form?** — $$p + q\\sqrt{2}$$; rational part first, surd second?\n4. **Coordinates or value?** — If it says coordinates, did I give a point $$(x, y)$$?\n5. **Which root / which range?** — All solutions (incl. $$x = 0$$)? Right interval, correct strict/inclusive sign?\n6. **Obtuse / acute?** — If a branch is specified, did I pick it and underline it?\n7. **Conditional / restricted sample space?** — Am I dividing by the right total?\n8. **Form $$ax + by + c = 0$$ with integers?** — Did I clear all fractions?\n9. **Did I finish?** — No part left blank; every part has a substituted, evaluated final answer.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "Why is mental subtraction specifically more dangerous than mental addition under exam pressure? (2 steps)", "answer": "- Step 1: Subtraction requires **borrowing/regrouping**, which has more steps than addition and therefore more places to slip. In $$46 - 25$$, you must handle the ones digit (6-5=1) and tens digit (4-2=2) correctly — but under pressure, Phuc ran a convoluted chain ($$21 - 12 = 18, 18 + 1 = 19$$) and got 19 instead of 21.\n- Step 2: Addition has a natural \"bigger or equal\" check (sum ≥ each addend). Subtraction doesn't give you that safety net — the answer could be anything. This is why every subtraction needs an *explicit* size-check that addition often doesn't.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": true}, {"question": "ESAT timing is ~90 seconds per question. How does this change your approach to formulae compared to a P1 exam? (2 steps)", "answer": "- Step 1: In ESAT, you **cannot afford to re-derive formulae** from first principles. There's no time to draw the unfurled cylinder, reason about the curved surface area, and then compute. You must recall $$S = 2\\pi r^2 + 2\\pi r h$$ instantly.\n- Step 2: In P1 (75 minutes for ~10 questions), you have ~7.5 minutes per question — enough time for careful derivation if needed. But even in P1, memorising formulae saves time for the harder parts and reduces the chance of a derivation error. The ESAT habit of cold recall benefits both exams.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": true}, {"question": "Q1(b) — you lost a mark in part (b) because of an error in part (a). What's the general principle about how marks cascade between parts? (2 steps)", "answer": "- Step 1: In Edexcel mark schemes, if part (b) uses the result of part (a), an error in (a) typically causes a **follow-through error** in (b). The method marks in (b) may still be awarded (if you use the correct method with your wrong value from (a)), but the accuracy marks are lost.\n- Step 2: This is why \"the first line is the most important\" — a slip in the opening differentiation (part a) not only loses the mark there but also kills the accuracy mark in the tangent equation (part b). One early slip = multiple lost marks. Double-check the first line before moving on.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": true}, {"question": "When integrating $$\\frac{4x^2 + 1}{2\\sqrt{x}}$$, what's the first algebraic step and why? (2 steps)", "answer": "- Step 1: **Split the fraction and convert to power notation**: $$\\frac{4x^2}{2x^{1/2}} + \\frac{1}{2x^{1/2}} = 2x^{3/2} + \\frac{1}{2}x^{-1/2}$$. Never try to integrate a compound fraction directly.\n- Step 2: Converting to power notation makes the power rule mechanical: $$\\int 2x^{3/2}\\,dx = 2 \\cdot \\frac{2}{5}x^{5/2} = \\frac{4}{5}x^{5/2}$$ and $$\\int \\frac{1}{2}x^{-1/2}\\,dx = \\frac{1}{2} \\cdot 2x^{1/2} = x^{1/2}$$. Plus $$C$$. The rule: always simplify to power form before integrating.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "What's the sector-area formula, and what common mistake do students make with the angle? (2 steps)", "answer": "- Step 1: Sector area $$= \\frac{1}{2}r^2\\theta$$, where $$\\theta$$ must be in **radians**. This is the formula for Q7(a).\n- Step 2: Common mistake: using the angle in degrees without converting, or using the wrong angle (the small angle 0.7 instead of the reflex angle $$2\\pi - 0.7$$). Always check: is the angle in radians? Is it the correct sector (reflex vs acute)?", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "The arc-length formula is used in Q7(c) for arc $$ABC$$. What is it, and what angle do you use? (2 steps)", "answer": "- Step 1: Arc length $$= r\\theta$$, where $$\\theta$$ is the angle subtended at the centre in **radians**.\n- Step 2: For arc $$ABC$$, the angle is the reflex angle $$2\\pi - 0.7$$ (the same angle used for the sector area). So arc $$ABC = 6(2\\pi - 0.7) \\approx 33.5$$ cm. Consistency check: the arc length and sector area use the *same* angle.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "When the question says \"express $$h$$ in terms of $$r$$\" (as in ESAT 2), what does this tell you about the form of the final answer? (2 steps)", "answer": "- Step 1: The final answer must have $$h$$ on one side and an expression involving only $$r$$ (and constants) on the other. No $$h$$ should appear on the right-hand side.\n- Step 2: After solving $$h = \\frac{2r^2}{r^2 - 2r}$$, you must also **simplify by cancelling common factors**: $$\\frac{2r^2}{r(r-2)} = \\frac{2r}{r-2}$$. Leaving the unsimplified form doesn't fully express $$h$$ in terms of $$r$$ in simplest form.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "What is Harry's \"star it\" tactic, and when exactly do you deploy it in the exam? (2 steps)", "answer": "- Step 1: When you've computed a value you're unsure about (e.g. $$OD \\approx 0.96$$ when it should be 1.42), **don't stop**. Use that value, complete the question, and put a small star (★) next to the uncertain value.\n- Step 2: Deploy this whenever you doubt a calculation but have the method right. The star marks it for review if you have time at the end. The key insight: method marks are awarded for correct substitution regardless of whether the substituted value is right. A blank answer gets zero method marks; a starred answer gets the method marks.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "Q10(b) — expanding $$f(x) = (x-4)(2x+1)^2$$ before differentiating. What's the expansion, and why expand rather than use the product rule? (2 steps)", "answer": "- Step 1: $$(2x+1)^2 = 4x^2 + 4x + 1$$, so $$f(x) = (x-4)(4x^2+4x+1) = 4x^3 - 12x^2 - 15x - 4$$. Then $$f'(x) = 12x^2 - 24x - 15$$.\n- Step 2: For P1, the product rule is not on the syllabus. You *must* expand first, then differentiate term by term. Even if the product rule were available, expanding first is often cleaner for a cubic — fewer steps, fewer sign errors.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": false}, {"question": "When a quadratic has roots $$x = 2$$ and $$x = -\\frac{18}{11}$$, and the original quadratic was $$11x^2 - 4x - 36$$, what's the correct factorised form and why can't you just write $$(x-2)(x+\\frac{18}{11})$$? (2 steps)", "answer": "- Step 1: The correct factorised form is $$(x - 2)(11x + 18)$$. The factor $$(11x + 18)$$ incorporates the denominator of the root: $$x = -\\frac{18}{11}$$ means $$11x + 18 = 0$$.\n- Step 2: Expanding $$(x-2)(x+\\frac{18}{11})$$ gives $$x^2 + \\ldots$$ with leading coefficient 1, not 11. The mark scheme requires the factorisation to be *equivalent* to the original quadratic, so the leading coefficient must match. Always expand your brackets back as a verification step.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "How many marks is the B→A gap worth on this paper, and what's the arithmetic behind it? (2 steps)", "answer": "- Step 1: Phuc scored **54/75 raw = UMS 77 = grade B**. With ~6 careless marks recovered, he'd have **60/75 raw ≈ UMS 86 = grade A**.\n- Step 2: 6 marks out of 75 is 8% of the paper. On a 75-mark paper, a B and an A are separated by less than the content of one hard question. The gap is tiny — which is why execution habits (not more knowledge) are the highest-leverage fix.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "ESAT 1 — the non-calculator constraint means you must compute $$\\frac{2}{3}$$ of 36 in your head. What's the fastest mental-math route? (2 steps)", "answer": "- Step 1: Compute $$36 \\div 3 = 12$$ first (finding one-third), then multiply by 2: $$12 \\times 2 = 24$$. This is faster than computing $$2 \\times 36 = 72$$ then dividing by 3.\n- Step 2: The general ESAT strategy: **divide first, multiply second** when computing fractions. Dividing produces a smaller number that's easier to work with mentally. Harry: \"non-calculator, so do this in your head.\"", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": false}, {"question": "What's the relationship between the ESAT warm-up mistakes and the P1 paper mistakes — are they the same type or different? (2 steps)", "answer": "- Step 1: They are the **same type**: careless arithmetic, especially mental subtraction. In ESAT 1, Phuc miscomputed $$46 - 25$$ (got 19, should be 21, leading to a cell value of 9 instead of 19). In P1 Q7(c), he miscomputed $$OD$$ (got 0.96, should be 1.42).\n- Step 2: This means the fix is the **same habit** for both exams: re-key every subtraction and size-check the result. Harry's recommendation — \"drill quick mental subtraction with an app\" — improves performance on both ESAT and P1 simultaneously. One habit, two exams.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": false}, {"question": "Why did Harry say \"you haven't done that in this paper; the next paper I expect to see it\" about the underline-and-tick habit? What's the accountability mechanism? (2 steps)", "answer": "- Step 1: Harry is making the habit **visible and verifiable**. Underlines and ticks are physical marks on the page — he can look at your script and immediately see whether you did it. It's not an invisible mental habit; it's an observable behaviour.\n- Step 2: By stating his expectation explicitly, he creates accountability: on the next paper, the absence of underlines will be conspicuous. This is deliberate — habits that are externally verifiable are easier to maintain than habits that exist only in your head.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "When clearing fractions to reach the form $$ax + by + c = 0$$ with integer coefficients, what's the systematic approach? (3 steps)", "answer": "- Step 1: Start from the point-slope form with the normal gradient: $$y - 1 = -\\frac{6}{35}(x - 4)$$.\n- Step 2: Multiply **both sides** by the denominator (35): $$35(y - 1) = -6(x - 4)$$. Expand: $$35y - 35 = -6x + 24$$.\n- Step 3: Move all terms to one side (convention: $$x$$ term positive): $$6x + 35y - 59 = 0$$. Verify: all coefficients are integers, and no common factor remains (GCD of 6, 35, 59 is 1). Tick off \"integers\" in the question.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": false}, {"question": "Q6(b) — after finding $$c = -\\frac{49}{4}$$, the quadratic becomes $$x^2 - 7x + \\frac{49}{4} = 0$$. How do you solve this cleanly? (2 steps)", "answer": "- Step 1: Recognise it as a **perfect square**: $$(x - \\frac{7}{2})^2 = x^2 - 7x + \\frac{49}{4}$$. So $$x = \\frac{7}{2}$$ is a repeated root.\n- Step 2: The point of intersection is then $$y = 4(\\frac{7}{2}) - \\frac{49}{4} = 14 - \\frac{49}{4} = \\frac{56 - 49}{4} = \\frac{7}{4}$$. So the point is $$(\\frac{7}{2}, \\frac{7}{4})$$. Recognising the perfect square is faster than the quadratic formula and avoids fraction-handling errors.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": false}, {"question": "When a question part says \"hence,\" what does this word signal about your method? (2 steps)", "answer": "- Step 1: \"Hence\" means you **must use the result from the previous part** — not solve from scratch. The examiner is testing whether you can connect the parts of the question.\n- Step 2: In Q2(b), \"hence solve\" means use the rationalised form from (a) to evaluate $$\\frac{20\\sqrt{2}}{4-2\\sqrt{2}}$$. In Q3(c), \"hence state\" means intersect the result of (b) with the condition from (a). Ignoring \"hence\" and re-deriving may still get the answer but wastes time and may not score the method marks if the mark scheme requires the connection.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": true}, {"question": "What's the simplest mental-math example that captures the \"size-check\" habit for subtraction? Give a concrete dumbed-down example.", "answer": "Suppose you compute $$10 - 3.8$$. The size-check: \"10 minus about 4 is about 6.\" If your calculator or mental math gives 6.2, that feels right. If it gives 0.62, that's an order of magnitude off — re-key immediately. The habit is: **before writing any subtraction result, ask \"roughly what should this be?\"** and compare. Two seconds per check, and it catches the majority of careless errors.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": false}, {"question": "Q9(a) — the minimum of $$y = 4\\sin\\theta$$. How do you find it, and what's the difference between \"minimum value\" and \"coordinates of the minimum\"? (2 steps)", "answer": "- Step 1: The minimum **value** of $$\\sin\\theta$$ is $$-1$$, so the minimum value of $$4\\sin\\theta$$ is $$4 \\times (-1) = -4$$. This occurs at $$\\theta = 270°$$.\n- Step 2: The minimum **value** is the number $$-4$$. The **coordinates** of the minimum are the point $$(270°, -4)$$. The question asked for coordinates, so only $$(270°, -4)$$ scores full marks. Writing just \"$$-4$$\" gets 1 mark out of 2. Underline \"coordinates\" and always give a point.", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": false}, {"question": "What's the link between Q9(c) (counting solutions of $$\\tan\\theta = 1 + \\sin\\theta$$ over a large range) and the June 12 lesson on trig graphs? (2 steps)", "answer": "- Step 1: Both problems use the same skill: **count intersections of two periodic curves over multiple periods**. The method is: count intersections in one period, then scale by the number of periods.\n- Step 2: $$\\tan\\theta$$ has period $$180°$$ and $$1 + \\sin\\theta$$ has period $$360°$$. The combined intersection pattern repeats every $$360°$$. Over $$2160° = 6 \\times 360°$$, there are 6 copies of the one-period pattern. This is exactly the \"count one period × number of periods\" routine from the June 12 lesson.", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": false}, {"question": "When a polynomial has no constant term (e.g. $$2x^3 + 3x^2 - 35x$$), what should you immediately write before doing anything else? (2 steps)", "answer": "- Step 1: Factor out the common $$x$$: $$x(2x^2 + 3x - 35) = 0$$.\n- Step 2: **Immediately write \"$$x = 0$$\" as a solution** on the next line. This is the root most commonly dropped. Then factorise or solve the quadratic bracket for the remaining roots. Make \"no constant term → factor out $$x$$ → write $$x = 0$$ first\" a reflex on every polynomial you encounter.", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": false}, {"question": "What's Harry's specific homework assignment regarding the next P1 past paper, and what habit will he be checking for? (2 steps)", "answer": "- Step 1: Attempt the remaining P1 past paper before the next session (Tuesday evening). Revise trig graphs first, then do Q9(c). Send Harry whatever is completed, even if it's not the whole paper.\n- Step 2: On the next paper, Harry will be checking for **visible underline-and-tick-off marks** on the question stems. His exact words: \"you haven't done that in this paper; the next paper I expect to see it.\" This is the one habit he's holding you accountable for.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": false}, {"question": "Simple exercise: A two-way table has boys total = 50, girls total = 30. Tennis total = 40, and 10 girls chose tennis. How many boys chose tennis, and what's $$P(\\text{tennis} \\mid \\text{boy})$$? (2 steps)", "answer": "- Step 1: Boys who chose tennis = tennis total - girls tennis = $$40 - 10 = 30$$. (Size-check: 30 out of 50 boys chose tennis — that's 60%, plausible.)\n- Step 2: $$P(\\text{tennis} \\mid \\text{boy}) = \\frac{\\text{boys tennis}}{\\text{boys total}} = \\frac{30}{50} = \\frac{3}{5}$$. Note: the denominator is the boys total (50), NOT the grand total (80), because \"a boy is picked at random\" restricts the sample space.", "source": "GLM 5.1 ③", "_id": "glm_3_70", "judge_pick": false}, {"question": "Simple exercise: A solid cylinder has radius 3 cm and height 5 cm. What are its volume and total surface area? (2 steps)", "answer": "- Step 1: $$V = \\pi r^2 h = \\pi(3)^2(5) = 45\\pi$$ cm³.\n- Step 2: $$S = 2\\pi r^2 + 2\\pi rh = 2\\pi(9) + 2\\pi(3)(5) = 18\\pi + 30\\pi = 48\\pi$$ cm². The three surfaces: two ends ($$2 \\times 9\\pi = 18\\pi$$) plus the curved side ($$2\\pi \\times 3 \\times 5 = 30\\pi$$).", "source": "GLM 5.1 ③", "_id": "glm_3_71", "judge_pick": false}, {"question": "Simple exercise: Solve $$3x^3 - 12x = 0$$. What root is most commonly forgotten?", "answer": "Factor out $$x$$: $$x(3x^2 - 12) = 0$$. **Immediately write $$x = 0$$.** Then solve $$3x^2 - 12 = 0$$ → $$x^2 = 4$$ → $$x = \\pm 2$$. Full solution: $$x = 0, 2, -2$$. The forgotten root is always $$x = 0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_72", "judge_pick": true}, {"question": "Simple exercise: The line $$y = 2x + k$$ touches the curve $$y = x^2 + 1$$ at exactly one point. Set up (don't solve) the equation whose discriminant must be zero.", "answer": "Set equal: $$2x + k = x^2 + 1$$ → $$x^2 - 2x + (1 - k) = 0$$. For exactly one point, the discriminant must be zero: $$(-2)^2 - 4(1)(1-k) = 0$$ → $$4 - 4(1-k) = 0$$. The trigger: \"touches\" or \"exactly one point\" = discriminant = 0.", "source": "GLM 5.1 ③", "_id": "glm_3_73", "judge_pick": true}, {"question": "Simple exercise: Find the normal to the curve at the point where $$x = 1$$, given $$\\frac{dy}{dx} = 3x^2$$. Express in the form $$ax + by + c = 0$$ with integer coefficients.", "answer": "At $$x = 1$$: gradient of tangent = $$3(1)^2 = 3$$. Gradient of normal = $$-\\frac{1}{3}$$. Need the $$y$$-coordinate: if we're told $$y = 2$$ at $$x = 1$$, then normal: $$y - 2 = -\\frac{1}{3}(x - 1)$$ → multiply by 3: $$3y - 6 = -x + 1$$ → $$x + 3y - 7 = 0$$. Check: all integers ✓.", "source": "GLM 5.1 ③", "_id": "glm_3_74", "judge_pick": false}, {"question": "Simple exercise: $$\\sin\\theta = 0.5$$ and $$\\theta$$ is obtuse. What is $$\\theta$$ in degrees?", "answer": "Calculator gives $$\\sin^{-1}(0.5) = 30°$$ (acute). The obtuse solution is $$180° - 30° = 150°$$. Rule: if $$\\sin\\theta = k$$ and $$\\theta$$ is obtuse, then $$\\theta = 180° - \\sin^{-1}(k)$$ (in degrees) or $$\\theta = \\pi - \\sin^{-1}(k)$$ (in radians).", "source": "GLM 5.1 ③", "_id": "glm_3_75", "judge_pick": true}, {"question": "Simple exercise: The question asks for the \"coordinates of the maximum of $$y = -3\\cos\\theta$$\" on $$[0°, 360°]$$. What do you write?", "answer": "The maximum value of $$\\cos\\theta$$ is 1, so the maximum of $$-3\\cos\\theta$$ is $$-3 \\times 1 = -3$$, achieved at $$\\theta = 180°$$ (where $$\\cos 180° = -1$$, so $$-3(-1) = 3$$... wait, let me recorrect). Maximum of $$-3\\cos\\theta$$: when $$\\cos\\theta = -1$$ (at $$\\theta = 180°$$), $$y = -3(-1) = 3$$. So the maximum value is 3 at $$\\theta = 180°$$. The **coordinates** are $$(180°, 3)$$. Not just \"3\" — coordinates means a point.", "source": "GLM 5.1 ③", "_id": "glm_3_76", "judge_pick": false}, {"question": "Simple exercise: A cylinder's surface area equals its volume. If $$r = 4$$, what is $$h$$?", "answer": "Using $$h = \\frac{2r}{r-2}$$: $$h = \\frac{2(4)}{4-2} = \\frac{8}{2} = 4$$. Check: $$V = \\pi(16)(4) = 64\\pi$$; $$S = 2\\pi(16) + 2\\pi(4)(4) = 32\\pi + 32\\pi = 64\\pi$$. ✓ They match.", "source": "GLM 5.1 ③", "_id": "glm_3_77", "judge_pick": false}], "count": 78}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "When organizing information for a two-way table probability problem, what is the first step to avoid missing data? (3 steps)", "answer": "- Step 1: **Draw a grid** with rows/columns for categories (e.g., boys/girls vs activities) and add total rows/columns.  \n- Step 2: **Place each given value** into the correct cell immediately (e.g., total students = 120, girls = 46).  \n+ Example: Tennis total = 36 → 24 boys (⅔ of 36) and 12 girls (36-24).  \n- Step 3: **Tick each datum** as you use it to prevent duplication or omission.  \n\n**Takeaway:** Tables simplify complex data; ticking ensures no information is overlooked.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How does the phrase \"a boy is picked at random that he chose swimming\" signal conditional probability? (2 steps)", "answer": "- Step 1: **Recognize the restricted sample space** (boys only) due to \"given that he is a boy.\"  \n- Step 2: **Use the row total** (boys = 74) as the denominator, not the grand total (120).  \n+ Answer: $ P(\\text{swim} \\mid \\text{boy}) = \\frac{32}{74} = \\frac{16}{37} $.  \n\n**Takeaway:** Conditional probability phrases require dividing by the relevant subgroup total, not the overall total.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "What are the key formulas to memorize for a solid cylinder's surface area and volume?", "answer": "- Surface area $ S = 2\\pi r^2 + 2\\pi r h $ (two circular ends + curved side).  \n- Volume $ V = \\pi r^2 h $.  \n**Motivation:** Memorizing these avoids time-consuming derivations (e.g., \"unfurling\" the curved surface into a rectangle).  \n\n**Takeaway:** Instant recall of $ S $ and $ V $ is critical for efficiency in non-calculator exams.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "When solving $ 2x^3 + 3x^2 - 35x = 0 $, why is $ x = 0 $ a valid solution?", "answer": "- Step 1: **Factor out $ x $** → $ x(2x^2 + 3x - 35) = 0 $.  \n- Step 2: **Recognize $ x = 0 $** as a root before solving the quadratic.  \n+ Mistake: Forgetting $ x = 0 $ leads to losing marks. Always write it down immediately.  \n\n**Takeaway:** Factoring out a variable introduces a root at zero; failing to note this drops marks.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why must you substitute a numerical value in part (c) of a question even if unsure of its correctness?", "answer": "- Step 1: **Method marks are awarded** for correct substitution, even with incorrect values.  \n- Step 2: **Leaving it blank earns zero**; finishing with a starred answer allows partial credit.  \n+ Example: In Q7c, substituting $ OD = 0.96 $ (wrong) still scores method marks.  \n\n**Takeaway:** Substitute and finish to secure method marks; blanks score nothing.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How should you handle quadratic inequalities derived from calculator roots?", "answer": "- Step 1: **Write brackets that expand back** to the original quadratic (e.g., roots $ x = 2 $, $ x = -\\frac{18}{11} $ → $ (x-2)(11x+18) $).  \n- Step 2: **Respect inequality signs** (e.g., $ < 0 $ means values between roots).  \n+ Mistake: Incorrect bracket expansion (e.g., $ (x-2)(x + \\frac{18}{11}) $) loses marks.  \n\n**Takeaway:** Ensure factored form matches original coefficients to avoid errors.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What checklist ensures all requirements of a question are met?", "answer": "- Step 1: **Underline keywords** (e.g., \"integers,\" \"coordinates,\" \"obtuse,\" \"exact form\").  \n- Step 2: **Tick off each requirement** after writing the answer.  \n+ Examples:  \n  - Q8a: Underline \"integers\" in $ ax + by + c = 0 $; clear fractions to meet this.  \n  - Q9a: Underline \"coordinates\" → answer must be $ (270^\\circ, -4) $, not just $-4$.  \n\n**Takeaway:** Underline and tick to avoid losing marks on form/accuracy requirements.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why is mental subtraction prone to errors, and how to mitigate this?", "answer": "- Step 1: **Re-key subtractions on a calculator** (e.g., $ 6 - 1.42 $ → 4.58, not 0.96).  \n- Step 2: **Size-check answers** (e.g., $ 6 - 1.42 $ should be \"just under 5\").  \n+ Example: In Q7c, $ 6 - 1.42 = 4.58 $; writing 0.96 fails the size check.  \n\n**Takeaway:** Re-key and verify magnitude for all subtractions to catch errors.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How to handle trigonometric equations requiring obtuse solutions?", "answer": "- Step 1: **Use $ \\sin^{-1} $** to find the acute angle.  \n- Step 2: **Subtract from $ \\pi $\"** to get the obtuse angle.  \n+ Example: If $ \\sin \\theta = 0.7731 $, acute angle = 0.884 rad → obtuse = $ \\pi - 0.884 = 2.258 $.  \n\n**Takeaway:** Always check for \"obtuse\" triggers and reject the calculator's acute answer.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why should you avoid over-simplifying answers in integration problems?", "answer": "- Step 1: **Stop at a correct simplest form** (e.g., $ \\frac{4}{5}x^{5/2} + x^{1/2} + C $).  \n- Step 2: **Rewriting risks errors** (e.g., combining terms or misapplying exponents).  \n+ Example: Q4 full marks for the correct integral; additional steps could introduce mistakes.  \n\n**Takeaway:** Stop once the answer is correct; reworking risks unnecessary errors.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "ESAT 1 — What is the first step when given multiple overlapping data points about students choosing activities? (3 steps)", "answer": "- Step 1: **Draw a two-way table** with rows for gender (boys/girls) and columns for activities (swim/archery/tennis).  \n- Step 2: **Add total rows/columns** to organize all data.  \n+ Example: Bottom-right cell is total students (120).  \n- Step 3: **Tick each datum as you use it** to avoid double-counting or omission.  \n**Why:** This avoids overcomplicating with equations and ensures clarity under time pressure.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "ESAT 1 — How to recognize a conditional probability question from the wording? (1 step)", "answer": "Look for phrases like \"**given that**\" or \"**a boy is picked at random that he chose**\" — this restricts the sample space to the specified group (e.g., boys only), requiring division by the row total (e.g., 32/74 for swimming boys) instead of the grand total.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "ESAT 1 — What mental math error was flagged for 46-25=21, and how to prevent it? (2 steps)", "answer": "- Step 1: **Re-key the subtraction** on a calculator or recompute mentally (e.g., 46-20=26, 26-5=21).  \n- Step 2: **Size-check the result** (e.g., 21 is less than half of 46, which makes sense).  \n**Why:** Careless subtraction costs marks in both ESAT and P1; verifying magnitude prevents slips.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "ESAT 2 — Why must the cylinder's surface area formula $2\\pi r^2 + 2\\pi r h$ be memorized cold? (2 steps)", "answer": "- Step 1: **Deriving it from the unfurled rectangle** (height $h$, width $2\\pi r$) is too slow under time pressure.  \n- Step 2: **Use the formula directly** to save time in exams like ESAT, where speed is critical.  \n**Why:** Re-deriving formulas wastes time; memorization ensures efficiency.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "P1 Q7(c) — What habit prevents losing marks when uncertain about a value like $OD$ in a calculation? (2 steps)", "answer": "- Step 1: **Substitute the value and finish** the calculation even if unsure (e.g., write $CD = 6 - OD$).  \n- Step 2: **Star the value** to revisit later if time permits.  \n**Why:** A blank scores zero, but substituted values can earn method marks even if incorrect.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "P1 Q8(a) — How to handle the requirement for integer coefficients in $ax + by + c = 0$? (2 steps)", "answer": "- Step 1: **Clear fractions** by multiplying through (e.g., $35y = -6x + 59$ becomes $6x + 35y - 59 = 0$).  \n- Step 2: **Check that $a, b, c \\in \\mathbb{Z}$** before finalizing.  \n**Why:** Failure to meet the form requirement costs A-marks despite correct arithmetic.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "P1 Q5(a) — What is the trap when factoring $x(2x^2 + 3x - 35)$? (2 steps)", "answer": "- Step 1: **Immediately write $x = 0$** as a root when factoring out $x$.  \n- Step 2: **Solve the bracket** $(2x - 7)(x + 5) = 0$ separately.  \n**Why:** Forgetting $x = 0$ loses marks; writing it first ensures completeness.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "General exam technique — How to ensure all question requirements are met before submission? (1 step)", "answer": "**Underline keywords** (e.g., \"coordinates,\" \"obtuse,\" \"integer\") during the first read and **tick them off** as you address them.  \n**Why:** This avoids missing requirements like providing coordinates instead of a single value.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "P1 Q7(b) — How to handle \"angle ADO is obtuse\" in the sine rule? (2 steps)", "answer": "- Step 1: **Reject the acute angle** from $\\sin^{-1}$ (e.g., 0.884 rad) and take the obtuse angle $\\pi - 0.884 = 2.258$ rad.  \n- Step 2: **Verify visually** if the angle makes sense in the triangle's context.  \n**Why:** The calculator only returns acute angles; ignoring the \"obtuse\" requirement loses marks.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "ESAT 2 — What algebra trick simplifies solving $2\\pi r^2 + 2\\pi r h = \\pi r^2 h$ for $h$? (3 steps)", "answer": "- Step 1: **Divide both sides by $\\pi$** to cancel it.  \n- Step 2: **Group $h$ terms**: $2r^2 + 2rh = r^2 h$.  \n- Step 3: **Factor $h$** and isolate it: $h = \\frac{2r^2}{r(r - 2)} = \\frac{2r}{r - 2}$.  \n**Why:** This avoids unnecessary complexity and streamlines the solution.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "P1 Q3(b) — How to factor a quadratic inequality like $11x^2 - 4x - 36 < 0$ correctly? (3 steps)", "answer": "- Step 1: **Solve the equation** $11x^2 - 4x - 36 = 0$ for roots (e.g., $x = 2$ and $x = -18/11$).  \n- Step 2: **Write brackets** as $(x - 2)(11x + 18) = 0$ to preserve leading coefficient.  \n- Step 3: **Determine the interval** between roots for $< 0$.  \n**Why:** Incorrect brackets (e.g., $(x - 2)(x + 18/11)$) fail to expand back to the original quadratic.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "General — What is the first line of working that Harry emphasized for accuracy? (1 step)", "answer": "**Slow down on the first line** of derivation (e.g., differentiating surd terms in Q1).  \n**Why:** Errors in early steps cascade through subsequent work, causing snowball effects.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "P1 Q9(a) — Why is the minimum of $y = 4\\sin\\theta$ at $(270^\\circ, -4)$ and not just $-4$? (2 steps)", "answer": "- Step 1: **Read the question** explicitly asking for \"coordinates.\"  \n- Step 2: **Provide both $\\theta$ and $y$ values** as a point.  \n**Why:** Failing to match the requested format (value vs. coordinates) loses half the marks.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "General — Why stop at a correct answer instead of rewriting it? (2 steps)", "answer": "- Step 1: **Avoid overcomplicating** (e.g., rewriting $\\frac{4}{5}x^{5/2} + x^{1/2} + C$ in Q4).  \n- Step 2: **Prevent errors** during unnecessary simplification that confuse examiners.  \n**Why:** A correct answer is sufficient; additional steps risk introducing mistakes.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "P1 Q10(d) — How to solve $y = f(x + a)$ passing through the origin? (3 steps)", "answer": "- Step 1: **Set $f(a) = 0$** since $y = 0$ when $x = 0$.  \n- Step 2: **Solve $(a - 4)(2a + 1)^2 = 0$** for roots $a = 4$ and $a = -1/2$.  \n- Step 3: **Interpret as horizontal translations** shifting the graph to pass through the origin.  \n**Why:** Graph transformations are often simpler to solve visually (e.g., sketching roots) than algebraically.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "General — How to handle periodic trigonometric equations like $\\tan\\theta = 1 + \\sin\\theta$ over large ranges? (3 steps)", "answer": "- Step 1: **Count solutions per period** (e.g., 2 solutions per $360^\\circ$ for Q9(c)).  \n- Step 2: **Multiply by number of periods** in the range (e.g., 6 periods in $2160^\\circ$).  \n- Step 3: **Adjust for partial periods** at the range's end.  \n**Why:** Systematic counting avoids missing solutions in extended intervals.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "P1 Q3(c) — How to combine inequalities from multiple parts? (2 steps)", "answer": "- Step 1: **Intersect intervals** (e.g., $x > 1.5$ from part (a) and $-18/11 < x < 2$ from part (b)).  \n- Step 2: **Preserve strict inequality signs** as in the original constraints.  \n**Why:** Failing to intersect correctly leads to invalid ranges (e.g., $1.5 < x < 2$ instead of $x > 1.5$).", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "General — What is the most important habit to recover ~6 marks lost to careless errors? (1 step)", "answer": "**Underline all question requirements** and **tick them off** after completing each part.  \n**Why:** This addresses the single biggest mark loss (careless slips) across both ESAT and P1.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}], "count": 18}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "When differentiating a term like $$-\\dfrac{24}{\\sqrt{x}}$$, what's the very first step you should write down, and what common slip should you watch for with negative powers? (Q1a strategy)", "answer": "- Step 1: Convert the surd to power form first: $$-\\dfrac{24}{\\sqrt{x}} = -24x^{-1/2}$$. Writing this explicitly prevents confusion.\n- Step 2: Apply the power rule: if $$f(x) = x^n$$, then $$f'(x) = nx^{n-1}$$. For $$-24x^{-1/2}$$, the derivative is $$-24 \\cdot (-\\tfrac12)x^{-3/2} = +12x^{-3/2}$$.\n- Step 3: The critical watch-point: when differentiating a **negative** power like $$-1/2$$, subtracting 1 gives $$-3/2$$ — the power becomes **more negative**, not less. This is where the common slip occurs.\n\n**Takeaway:** Write the power form first; the sign of the power and the direction it moves are both critical.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": true}, {"question": "What is the trigger phrase that tells you the probability question involves a restricted sample space, and what must you divide by instead of the grand total? (ESAT 1 conditional probability trigger)", "answer": "- Step 1: The trigger phrase is any wording like \"a boy is picked at random... that **he** chose swimming\" or \"given that it is a boy.\" The pronoun \"he\" and the phrase \"given that\" signal conditioning.\n- Step 2: This restricts the sample space to **boys only**, not all 120 students. You must divide by the **row total** (boys = 74), not the grand total (120).\n- Step 3: The answer is $$\\frac{\\text{boys who chose swimming}}{\\text{total boys}} = \\frac{32}{74} = \\frac{16}{37}$$.\n\n**Takeaway:** Whenever you see \"a [category] is picked at random... that [they] did X\", the denominator is the row total for that category.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "For a two-way table with three categories, what's Harry's recommended method instead of setting up simultaneous equations, and what physical habit should you use while filling it? (ESAT 1 method)", "answer": "- Step 1: **Draw a 2×3 table** with rows for boys/girls and columns for the three activities, plus a total row and total column.\n- Step 2: Place each given number directly into its cell — don't solve equations. The table makes every datum drop into a specific location.\n- Step 3: **Tick each datum as you use it** — put a small checkmark next to each piece of information once you've placed it in the table. This prevents double-counting or forgetting numbers.\n- Step 4: Then deduce the remaining cells one at a time, using the row and column totals.\n\n**Takeaway:** A table organizes information spatially; ticking as you go prevents oversight — essential for fast ESAT work.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What two formulas must you memorize cold for the solid cylinder ESAT question, and how do you derive the curved surface area formula? (ESAT 2 formulas)", "answer": "- Step 1: **Volume** of a cylinder: $$V = \\pi r^2 h$$ (base area × height).\n- Step 2: **Total surface area** of a solid cylinder: $$S = 2\\pi r^2 + 2\\pi r h$$. The $$2\\pi r^2$$ is the two circular ends; the $$2\\pi r h$$ is the curved side.\n- Step 3: To derive the curved surface area, imagine \"unfurling\" the curved side into a rectangle. One side is the height $$h$$; the other side is the circumference $$2\\pi r$$. So curved area = $$h \\times 2\\pi r = 2\\pi r h$$.\n\n**Takeaway:** Don't re-derive during the exam — memorize these instantly. The unfurled-rectangle picture is the intuition, not the method.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "When you factor out a variable like $$x$$ from a polynomial equation and set it equal to zero, what solution are you in danger of dropping, and when should you write it down? (Q5a, Theme 3)", "answer": "- Step 1: If you have $$x(2x^2 + 3x - 35) = 0$$, factoring out $$x$$ creates two separate equations: $$x = 0$$ **OR** the bracket equals zero.\n- Step 2: The danger is dropping the $$x = 0$$ root entirely and only solving the quadratic bracket. This costs the final accuracy mark.\n- Step 3: **Write $$x = 0$$ immediately** the moment you factor out a bare variable. Do it before solving the bracket.\n- Step 4: For $$2x^3 + 3x^2 - 35x = 0$$, factor to $$x(2x-7)(x+5) = 0$$, giving solutions $$x = 0, x = \\frac72, x = -5$$.\n\n**Takeaway:** \"Factored out x ⇒ x = 0 is a root\" must be a reflex. Write it the instant you see the bare factor.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "In the cylinder problem where surface area equals volume ($$\\pi r^2 h = 2\\pi r^2 + 2\\pi r h$$), what's the first algebraic step to solve for $$h$$ in terms of $$r$$, and what do you cancel? (ESAT 2 solving strategy)", "answer": "- Step 1: Divide both sides by $$\\pi$$ to clear the $$\\pi$$: $$r^2 h = 2r^2 + 2rh$$\n- Step 2: Gather all $$h$$ terms on one side: $$r^2 h - 2rh = 2r^2$$\n- Step 3: Factor out $$h$$: $$h(r^2 - 2r) = 2r^2$$\n- Step 4: Factor the bracket $$r^2 - 2r = r(r-2)$$: $$h \\cdot r(r-2) = 2r^2$$\n- Step 5: Cancel one $$r$$ from both sides: $$h(r-2) = 2r$$\n- Step 6: Solve: $$h = \\dfrac{2r}{r-2}$$\n\n**Takeaway:** Cancel strategically at each step; don't try to do everything at once.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "When the question asks for an \"obtuse\" angle but your calculator's $$\\sin^{-1}$$ gives an acute angle, what must you do, and what's the value of the obtuse angle if the acute value is 0.884 rad? (Q7b branc
