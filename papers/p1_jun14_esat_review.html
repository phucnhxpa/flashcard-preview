the examiner. The ticks are your proof that you fulfilled it.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "When you factorise a polynomial like $$2x^3 + 3x^2 - 35x = x(2x^2 + 3x - 35) = 0$$, what root is dangerously easy to lose — and what habit guarantees you never lose it? (Theme 3, Q5a)", "answer": "- Step 1: The factor of $$x$$ outside the bracket gives the root **$$x = 0$$**. This is the one students routinely drop because they rush to solve the quadratic bracket and forget the bare factor.\n- Step 2: The habit: **the instant you factor out $$x$$ (or $$\\sin\\theta$$, or any variable), write down the \"$$= 0$$\" root before you touch the quadratic.** Literally write \"$$x = 0$$\" on the next line, then solve the bracket.\n- Step 3: Harry's verdict on Q5a: *\"Almost perfect — you scored the method mark… but you lost the mark because you lost this: there are two possibilities, either $$x = 0$$ or the bracket $$= 0$$; because you lost the '$$= 0$$', you lost the final mark.\"* Your own reflection: *\"I forgot about $$x = 0$$.\"*\n\nThis applies whenever you take out a common variable factor — the factor itself is always a solution.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "You've set up the correct formula for a question part but you're unsure about a number you substituted. Should you stop, or should you finish? What exactly should you do? (Theme 4, Q7c)", "answer": "- Step 1: **Never leave a part blank.** A blank space scores zero. A substituted expression — even with a wrong number — can score the method (M) marks.\n- Step 2: **Substitute every number you have and grind to a final figure.** Put a little star (★) next to it so you know to revisit if time allows. The method marks do not require the final answer to be correct; they require the correct method with numbers substituted.\n- Step 3: Harry on Q7c: *\"Even if it's ridiculous, even if you know you've made a mistake, just keep going with the numbers, put a little star next to it, and if you've got time come back to it.\"* Had you written $$\\text{perimeter} = 33.5 + (6 - OD) + 5$$ with *any* number for $$OD$$, you would have banked method marks instead of zero.\n\nThe rule: **you almost never lose marks for finishing; you always lose marks for stopping.**", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "When differentiating a term like $$-24x^{-1/2}$$, what is the most common slip on the very first line — and why does Harry say this line deserves extra slowness? (Q1a)", "answer": "- Step 1: The common slip is **bringing the wrong power to the front** — e.g., writing $$-\\frac{3}{2}$$ instead of $$-\\frac{1}{2}$$, or getting the sign wrong. The correct working: $$-24 \\cdot \\left(-\\frac{1}{2}\\right) x^{-3/2} = +12x^{-3/2}$$.\n- Step 2: The new power is $$-\\frac{1}{2} - 1 = -\\frac{3}{2}$$ — it gets **more negative**. When you subtract 1 from a negative power, the magnitude increases. This is the step to slow down on.\n- Step 3: Harry: *\"The very first line is the most important… a slip there has a snowball effect. Be speedy in the exam, but slow and careful where it matters — and that's the first couple of lines. Double-check that one before you move on.\"* The first line feeds every subsequent line; an error there propagates through the entire question and costs multiple marks (Q1a → Q1b).", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "When differentiating a surd term like $$-\\frac{24}{\\sqrt{x}}$$, what should you write as your very first step before differentiating — and why? (Q1a)", "answer": "- Step 1: **Rewrite it as a power first**: $$-\\frac{24}{\\sqrt{x}} = -24x^{-1/2}$$. Only then differentiate term by term.\n- Step 2: The reason is that the power rule $$\\frac{d}{dx}[kx^n] = knx^{n-1}$$ requires the exponent to be visible. Working with the surd notation directly invites errors in the power and the coefficient.\n- Step 3: Once in power form, the differentiation is mechanical: $$-24 \\cdot (-\\frac{1}{2}) \\cdot x^{-1/2 - 1} = +12x^{-3/2}$$. Then rewrite in surd form if required: $$\\frac{12}{\\sqrt{x^3}}$$.\n\nThe standing rule: **always convert surds to negative/fractional powers before differentiating.** It makes the power rule transparent and avoids the \"wrong power to the front\" slip.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "When you subtract 1 from a negative power (e.g., $$x^{-1/2} \\to x^{?}$$), does the power get closer to zero or further from zero — and why? (Q1a)", "answer": "- Step 1: The power gets **further from zero** (more negative). $$x^{-1/2} \\to x^{-3/2}$$, because $$-\\frac{1}{2} - 1 = -\\frac{3}{2}$$.\n- Step 2: The intuition: on the number line, subtracting 1 from a negative number moves you further left (further from zero). $$-0.5 - 1 = -1.5$$.\n- Step 3: The common mistake is to think \"subtracting makes it smaller in magnitude\" — that's true for positive powers ($$x^2 \\to x^1$$) but the opposite for negative ones. This is exactly where Q1a's slip happened: the power was correct at $$-\\frac{1}{2}$$ but the student treated the new power as if it were getting *closer* to zero.\n\nSlow down through this step on every surd differentiation. Say it aloud: *\"negative half minus one equals negative three halves.\"*", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "To rationalise $$\\frac{1}{4 - 2\\sqrt{2}}$$, what do you multiply numerator and denominator by — and what algebraic identity makes the denominator rational? (Q2a)", "answer": "- Step 1: Multiply by the **conjugate** of the denominator: $$\\frac{1}{4-2\\sqrt{2}} \\cdot \\frac{4+2\\sqrt{2}}{4+2\\sqrt{2}}$$.\n- Step 2: The identity that kills the surd in the denominator is the **difference of two squares**: $$(a-b)(a+b) = a^2 - b^2$$. Here $$(4-2\\sqrt{2})(4+2\\sqrt{2}) = 16 - (2\\sqrt{2})^2 = 16 - 8 = 8$$.\n- Step 3: The numerator becomes $$4 + 2\\sqrt{2}$$, so the result is $$\\frac{4+2\\sqrt{2}}{8} = \\frac{1}{2} + \\frac{1}{4}\\sqrt{2}$$, which is in the form $$a + b\\sqrt{2}$$ with $$a = \\frac{1}{2}$$, $$b = \\frac{1}{4}$$.\n\nThe conjugate always works for expressions of the form $$p + q\\sqrt{n}$$: flip the sign of the surd term to get $$p - q\\sqrt{n}$$, multiply, and the surd cancels.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "When a question asks for an answer \"in the form $$p + q\\sqrt{2}$$\" (or similar), what convention must you follow about the order of the terms? (Q2b)", "answer": "- Step 1: Write the **rational part first**, then the surd part: $$p + q\\sqrt{2}$$. The convention is rational term, then irrational term.\n- Step 2: In Q2b, after collecting $$x$$ and multiplying by the rationalised form, you get $$x = 10\\sqrt{2} \\cdot \\frac{1}{2} + 20\\sqrt{2} \\cdot \\frac{1}{4}\\sqrt{2}$$. The first term is $$10\\sqrt{2}$$ (irrational) and the second is $$\\frac{20}{4} \\cdot 2 = 10$$ (rational). You must reorder as $$10 + 10\\sqrt{2}$$, not $$10\\sqrt{2} + 10$$.\n- Step 3: Harry double-checked the mark scheme live: *\"I was expecting fractions when they say 'rational numbers'… but whole numbers are rational numbers — that is correct, well done.\"* So $$p$$ and $$q$$ can be integers — \"rational\" includes whole numbers.\n\nThe key: the form $$p + q\\sqrt{2}$$ specifies the *structure*, not that $$p$$ and $$q$$ must be fractions.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "You solve a quadratic on your calculator and get roots $$x = 2$$ and $$x = -\\frac{18}{11}$$. When writing the factorised form $$(x-2)(11x+18)$$, why must you use $$11x + 18$$ instead of $$(x + \\frac{18}{11})$$ — and how do you verify you've done it right? (Q3b)", "answer": "- Step 1: The factorised form must **expand back to the original quadratic**. If the original is $$11x^2 - 4x - 36$$, then $$(x-2)(x+\\frac{18}{11})$$ expands to $$x^2 - \\frac{4}{11}x - \\frac{36}{11}$$ — the leading coefficient is 1, not 11. That's wrong.\n- Step 2: To fix it, clear the fraction in the second bracket: $$x + \\frac{18}{11} = \\frac{1}{11}(11x + 18)$$. So the factorisation becomes $$(x-2) \\cdot \\frac{1}{11}(11x+18) = \\frac{1}{11}(x-2)(11x+18)$$. Multiply both sides by 11 to get the standard form: $$(x-2)(11x+18) = 0$$ is equivalent to $$11x^2 - 4x - 36 = 0$$.\n- Step 3: **Verification**: expand $$(x-2)(11x+18) = 11x^2 + 18x - 22x - 36 = 11x^2 - 4x - 36$$. ✓ This matches the original.\n\nHarry's warning: *\"If you expand that you just get $$x^2$$, not $$22x^2$$… depending on the mark scheme that won't score.\"* Always expand back as a check.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "When solving a quadratic inequality, why is it critical to copy the inequality sign exactly as given (strict $$<$$ vs non-strict $$\\leq$$) — and what happened when this was violated? (Q3b-c)", "answer": "- Step 1: The inequality sign determines whether the endpoints are **included** ($$\\leq$$) or **excluded** ($$<$$) from the solution set. Changing a strict $$<$$ to $$\\leq$$ (or vice versa) changes the answer and loses the accuracy mark.\n- Step 2: In Q3b, the area was strictly less than 72, so the inequality was $$11x^2 - 4x - 36 < 0$$ (strict). The solution is $$-\\frac{18}{11} < x < 2$$ — open interval, endpoints excluded. Copying the sign carelessly as $$\\leq$$ would give $$-\\frac{18}{11} \\leq x \\leq 2$$, which is a different answer.\n- Step 3: Harry: *\"The thing that was more serious — copy these inequality signs really carefully. It was strictly less than, so the inequalities must match.\"* The final combined range in Q3c ($$1.5 < x < 2$$) must also use strict signs because it inherits from the strict inequality in (b).\n\nTreat the inequality sign with the same reverence as a negative sign — one stroke changes the meaning entirely.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "When a multi-part question gives you a constraint in part (a) (e.g., $$x > 1.5$$) and asks for a \"hence\" range in part (c), what must you do with the part (a) constraint? (Q3c)", "answer": "- Step 1: **Intersect** the solution from the later part with the constraint from the earlier part. The word \"hence\" means the final answer must satisfy *both* conditions simultaneously.\n- Step 2: In Q3, part (a) gives $$x > 1.5$$ (from the perimeter condition), and part (b) gives $$-\\frac{18}{11} < x < 2$$ (from the area condition). The intersection is $$1.5 < x < 2$$.\n- Step 3: The common mistake is to give only the quadratic-inequality solution without intersecting — writing \"$$-\\frac{18}{11} < x < 2$$\" for part (c) and losing the mark. The \"hence\" is your signal to combine.\n\nVisualise it on a number line: shade the region where *both* conditions overlap.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "You've reached a correct simplest-form answer on an integration question. Should you rewrite it in an alternative form as well — and why or why not? (Q4)", "answer": "- Step 1: **No. Stop at the correct simplest form.** Do not rewrite it in an alternative form \"just in case.\"\n- Step 2: The risk: a needless rewrite can introduce a new algebraic slip, and the confused or contradictory working can cause the marker to doubt your answer. Markers work fast — contradictory working is worse than stopping at a correct answer.\n- Step 3: Harry: *\"You can leave it like that… I wouldn't waste time in the exam writing it another way as well, because you might make a mistake in the rewrite and confuse the examiner. Markers mark very fast — make their life easy and just stop once you have a correct simplest form.\"*\n\nThe principle: **a correct answer is a correct answer.** Gilding it adds risk with zero reward.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "When factorising a quadratic like $$2x^2 + 3x - 35$$, what method did Harry say is \"more efficient\" than the quadratic formula — and why? (Q5a)", "answer": "- Step 1: **Factorise by inspection** (splitting the middle term or guessing factors) rather than reaching for the quadratic formula.\n- Step 2: For $$2x^2 + 3x - 35$$: the leading coefficient is 2, so the brackets are $$(2x + \\ldots)(x + \\ldots)$$. The constant is $$-35$$, so the candidates are $$\\pm 1, \\pm 35$$ or $$\\pm 5, \\pm 7$$. Checking: $$(2x - 7)(x + 5) = 2x^2 + 10x - 7x - 35 = 2x^2 + 3x - 35$$. ✓\n- Step 3: The quadratic formula works but is slower (more writing, more calculator steps, more places to slip). Harry: *\"It could have been factorised — more efficient to factorise.\"* In an exam, the 30 seconds saved per factorisation compound across the paper.\n\nThe rule of thumb: if the coefficients are small integers, try inspection first. Only reach for the formula when the roots are clearly irrational or the numbers are ugly.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "In a \"hidden quadratic\" like $$2(y-5)^6 + 3(y-5)^4 - 35(y-5)^2 = 0$$, what substitution do you make — and what constraint must you apply when solving for the original variable? (Q5b)", "answer": "- Step 1: Let $$u = (y-5)^2$$. Then $$(y-5)^4 = u^2$$ and $$(y-5)^6 = u^3$$, so the equation becomes $$2u^3 + 3u^2 - 35u = 0$$ — the same cubic from part (a).\n- Step 2: Solve for $$u$$: you get $$u = 0$$, $$u = \\frac{7}{2}$$, $$u = -5$$. Now apply the constraint: **$$u = (y-5)^2 \\geq 0$$**, so reject $$u = -5$$ (a squared quantity cannot be negative).\n- Step 3: For the valid values: $$u = 0 \\Rightarrow (y-5)^2 = 0 \\Rightarrow y = 5$$. And $$u = \\frac{7}{2} \\Rightarrow (y-5)^2 = \\frac{7}{2} \\Rightarrow y = 5 \\pm \\sqrt{\\frac{7}{2}} = 5 \\pm \\frac{\\sqrt{14}}{2}$$.\n\nThe non-negativity constraint is the critical gate. Harry: *\"A squared quantity is non-negative\"* — you may write that sentence to be safe.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "When taking square roots of both sides of $$(y-5)^2 = \\frac{7}{2}$$, where does the $$\\pm$$ go — and why? (Q5b)", "answer": "- Step 1: The $$\\pm$$ goes on the **side with the numbers** (the side without the variable inside the square). So: $$y - 5 = \\pm\\sqrt{\\frac{7}{2}}$$, giving $$y = 5 \\pm \\frac{\\sqrt{14}}{2}$$.\n- Step 2: The reason: $$\\sqrt{(y-5)^2} = |y-5|$$, which equals either $$+(y-5)$$ or $$-(y-5)$$. So $$y-5 = +\\sqrt{\\frac{7}{2}}$$ or $$y-5 = -\\sqrt{\\frac{7}{2}}$$.\n- Step 3: Harry's phrasing: *\"Put the $$\\pm$$ on the side with the numbers\"* — meaning the free-number side, not the variable side. This avoids the confusion of writing $$\\pm(y-5) = \\sqrt{\\frac{7}{2}}$$, which is technically equivalent but less clear and more error-prone.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "When a line meets a curve at \"exactly one point,\" what algebraic condition does this translate to — and why? (Q6a)", "answer": "- Step 1: Set the equations equal to get a single quadratic. \"Exactly one point\" means the quadratic has **exactly one real root**, which means the **discriminant equals zero**: $$b^2 - 4ac = 0$$.\n- Step 2: In Q6, setting $$4x + c = x^2 - 3x$$ gives $$x^2 - 7x - c = 0$$. The discriminant is $$(-7)^2 - 4(1)(-c) = 49 + 4c$$. Setting this to zero: $$49 + 4c = 0 \\Rightarrow c = -\\frac{49}{4}$$.\n- Step 3: Geometrically, \"exactly one intersection\" means the line is **tangent** to the curve. A tangent touches but doesn't cross, so the quadratic has a repeated root — discriminant zero. This is the universal translation: *one intersection ↔ tangent ↔ discriminant = 0*.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "A sector problem gives you a small angle $$\\alpha$$ at the centre and asks for the sector area. But the sector is the **reflex** (large) part of the circle. How do you find the correct angle? (Q7a)", "answer": "- Step 1: The reflex angle is **$$2\\pi - \\alpha$$** (the full circle minus the small angle). Use this as $$\\theta$$ in the sector-area formula.\n- Step 2: In Q7, the given angle is $$\\angle AOD = 0.7$$ rad, but the sector $$ABCOA$$ is the large part. So $$\\theta = 2\\pi - 0.7$$. Area $$= \\frac{1}{2}r^2\\theta = \\frac{1}{2}(36)(2\\pi - 0.7) \\approx 100.5 \\text{ cm}^2$$.\n- Step 3: The pitfall is using the given angle directly (which gives the *minor* sector, not the reflex one). Always check: is the shaded/described region the small wedge or the large remainder? If it's the remainder, subtract from $$2\\pi$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "When using the sine rule to find an angle and the calculator's $$\\sin^{-1}$$ gives you an acute value, but the question specifies the angle is **obtuse** — what do you do, and why does the calculator not give you the obtuse value directly? (Q7b)", "answer": "- Step 1: The calculator's $$\\sin^{-1}$$ is restricted to the principal range $$[-\\frac{\\pi}{2}, \\frac{\\pi}{2}]$$, so it **only ever returns the acute angle** (for positive inputs). The obtuse solution is $$\\pi - \\text{acute value}$$.\n- Step 2: In Q7b, $$\\sin^{-1}(0.7731) \\approx 0.884$$ rad (acute). The obtuse value is $$\\pi - 0.884 = 2.258$$ rad. This is the answer the question requires.\n- Step 3: On the unit circle, $$\\sin\\theta$$ is positive in both the first and second quadrants. Both $$\\theta = 0.884$$ and $$\\theta = \\pi - 0.884 = 2.258$$ give the same sine value. The calculator picks the first-quadrant value by convention; you must derive the second-quadrant value yourself.\n\n**The trigger**: underline the word \"obtuse\" in the question. It tells you to reject the calculator's acute value and compute $$\\pi - \\theta_{\\text{acute}}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "What does \"obtuse\" mean in radians — and how do you verify your answer is genuinely obtuse? (Q7b)", "answer": "- Step 1: Obtuse means the angle is strictly between $$\\frac{\\pi}{2}$$ and $$\\pi$$ radians (i.e., between 90° and 180°).\n- Step 2: In Q7b, the answer is $$2.258$$ rad. Check: $$\\frac{\\pi}{2} \\approx 1.571$$ and $$\\pi \\approx 3.142$$. Since $$1.571 < 2.258 < 3.142$$, the angle is indeed obtuse. ✓\n- Step 3: The acute value $$0.884$$ rad is less than $$\\frac{\\pi}{2}$$, so it fails the obtuse check. Harry walked through this on the board: *\"Is this obtuse? It's not between $$\\pi/2$$ and $$\\pi$$, so it's wrong.\"*\n\nAlways run the bounds check: if the question says obtuse, your answer must satisfy $$\\frac{\\pi}{2} < \\theta < \\pi$$.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "A question asks for the normal to a curve at a point, in the form $$ax + by + c = 0$$ with **integer** coefficients. You've found the normal gradient is $$-\\frac{6}{35}$$. What must you do to satisfy the \"integer\" requirement? (Q8a)", "answer": "- Step 1: Write the equation in point-slope form first: $$y - 1 = -\\frac{6}{35}(x - 4)$$.\n- Step 2: **Clear all fractions** by multiplying through by the denominator (35): $$35(y - 1) = -6(x - 4)$$, which gives $$35y - 35 = -6x + 24$$, so $$6x + 35y - 59 = 0$$.\n- Step 3: Verify: $$a = 6$$, $$b = 35$$, $$c = -59$$ — all integers. ✓ The key move is to multiply through by the LCD of all fractions, then rearrange so all terms are on one side with integer coefficients.\n\nHarry: *\"It's this word 'integers' — I don't think you spotted it. When you've got an answer, read the question again: normal? at P? this form? integers? — ah, I didn't do that, then go and fix it.\"*", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "When a question asks for the **normal** to a curve at a point, what is the relationship between the normal's gradient and the tangent's gradient? (Q8a)", "answer": "- Step 1: The normal is **perpendicular** to the tangent, so the normal's gradient is the **negative reciprocal** of the tangent's gradient: $$m_{\\text{normal}} = -\\frac{1}{m_{\\text{tangent}}}$$.\n- Step 2: In Q8a, the tangent gradient (from $$f'(4)$$) is $$\\frac{35}{6}$$. So the normal gradient is $$-\\frac{6}{35}$$.\n- Step 3: The common mistake is to use the tangent gradient directly (forgetting the negative reciprocal) or to only take the reciprocal without the negative sign. Both are wrong. The normal is always perpendicular — that's the definition.\n\nQuick check: the product of tangent and normal gradients should equal $$-1$$: $$\\frac{35}{6} \\times (-\\frac{6}{35}) = -1$$. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "A question says \"state the **coordinates** of the minimum.\" You've found the minimum value is $$-4$$. What exactly should you write — and what would be incomplete? (Q9a)", "answer": "- Step 1: Write the **ordered pair** $$(x, y)$$, not just the $$y$$-value. The coordinates are $$(270°, -4)$$.\n- Step 2: Writing just \"$$-4$$\" gives only the $$y$$-coordinate. This scores B1 (one mark for the value) but loses B0 (the second mark for the full coordinates). Harry: *\"Part A asks you for coordinates — it wants $$x$$ and $$y$$. You've just given me $$y$$, so you only get one mark; notice this is two marks.\"*\n- Step 3: The trigger word is **\"coordinates\"** — this always means a point $$(x, y)$$. If the question wanted only the value, it would say \"state the minimum value\" or \"state the minimum $$y$$-coordinate.\" Underline \"coordinates\" and answer with a pair.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "When finding the minimum of $$y = 4\\sin\\theta$$ on $$0 \\leq \\theta \\leq 360°$$, what is the minimum value and at what angle does it occur? (Q9a)", "answer": "- Step 1: The basic sine wave $$\\sin\\theta$$ has minimum $$-1$$, occurring at $$\\theta = 270°$$.\n- Step 2: The factor of 4 scales the amplitude: $$y = 4\\sin\\theta$$ has minimum $$4 \\times (-1) = -4$$, still at $$\\theta = 270°$$.\n- Step 3: The coordinates of the minimum point are $$(270°, -4)$$. The factor 4 stretches the graph vertically but does not shift it horizontally — the $$x$$-coordinate of the minimum doesn't change.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "When counting solutions of $$\\tan\\theta = 1 + \\sin\\theta$$ over a large range like $$0 \\leq \\theta \\leq 2160°$$, what strategy avoids counting every intersection individually? (Q9c)", "answer": "- Step 1: **Count the intersections in one period**, then multiply by the number of complete periods in the range, adjusting for any partial period at the end.\n- Step 2: $$\\tan\\theta$$ has period $$180°$$ and $$1 + \\sin\\theta$$ has period $$360°$$. The combined pattern of intersections repeats every $$360°$$ (the LCM of the two periods). Count the crossings in one $$360°$$ window, then scale.\n- Step 3: Over $$0 \\leq \\theta \\leq 2160°$$: that's $$2160/360 = 6$$ complete periods, so total solutions $$= 6 \\times$$ (solutions per period). Over $$0 \\leq \\theta \\leq 1980°$$: that's $$1980/360 = 5.5$$ periods, so you need to adjust for the half-period and check endpoints.\n\nThis is the same skill as the June 12 lesson on counting intersections: **one pattern per period, then scale**.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "A cubic has a repeated root, e.g., $$f(x) = (x-4)(2x+1)^2$$. At the repeated root, does the curve **cross** or **touch** the $$x$$-axis — and how do you know which is which? (Q10a)", "answer": "- Step 1: A **repeated root** (even multiplicity) means the curve **touches** the axis and turns around — it does not cross. A **simple root** (odd multiplicity) means the curve **crosses** the axis.\n- Step 2: In Q10, $$(2x+1)^2 = 0$$ gives a repeated root at $$x = -\\frac{1}{2}$$ — the curve **touches** the $$x$$-axis at $$P(-\\frac{1}{2}, 0)$$. The factor $$(x-4)$$ gives a simple root at $$x = 4$$ — the curve **crosses** at $$Q(4, 0)$$.\n- Step 3: The intuition: near a repeated root, the function doesn't change sign (since $$(2x+1)^2$$ is always non-negative), so the curve stays on the same side of the axis — it touches and bounces. Near a simple root, the function changes sign, so the curve crosses.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}, {"question": "At a turning point where the gradient is zero, what is the equation of the tangent — and what common mistake do students make about its direction? (Q10c)", "answer": "- Step 1: A zero gradient means the tangent is a **horizontal line** of the form **$$y = k$$**, where $$k$$ is the $$y$$-coordinate of the turning point.\n- Step 2: The common mistake is to draw a **vertical** line instead. Harry caught this: *\"That's got an infinite gradient — a zero gradient is a horizontal line, of the form $$y = k$$.\"* Vertical lines have undefined/infinite gradient; horizontal lines have zero gradient.\n- Step 3: In Q10c, the turning point is at $$x = \\frac{5}{2}$$ with $$f(\\frac{5}{2}) = -54$$, so the tangent is $$y = -54$$. You don't need the point-slope formula $$y - y_1 = m(x - x_1)$$ — just state the horizontal line directly.\n\nThe rule: **gradient = 0 ↔ horizontal tangent $$y = k$$.** Gradient = ∞ ↔ vertical tangent $$x = h$$.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "The question says \"$$y = f(x + a)$$ passes through the origin $$O$$.\" Harry says to use a **sketch** rather than algebra. How does the sketch give you the answer — and what cue in the question tells you to expect multiple values? (Q10d)", "answer": "- Step 1: $$y = f(x + a)$$ is a **horizontal translation** of $$f(x)$$ by $$-a$$ units (shift left by $$a$$). \"Passes through $$O$$\" means that after this shift, the origin lies on the curve — equivalently, $$f(a) = 0$$, so $$a$$ must be a root of $$f$$.\n- Step 2: Read the roots off the sketch of $$f(x)$$: the roots are $$x = -\\frac{1}{2}$$ and $$x = 4$$. So $$a = 4$$ or $$a = -\\frac{1}{2}$$. The sketch makes this visually obvious; grinding through the algebra is slower and more error-prone.\n- Step 3: The cue for multiple answers: the question says \"**possible values** of $$a$$\" — plural. Harry: *\"'Possible values of $$a$$' — plural, so expect more than one.\"* Whenever you see \"values\" (plural), list all valid options.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "When finding the normal to a curve and the question specifies the form $$ax + by + c = 0$$, what is the very last check you must perform before moving on? (Q8a)", "answer": "- Step 1: **Verify that $$a$$, $$b$$, and $$c$$ are all integers** (or whatever the question specifies — e.g., \"integer coefficients\"). Also verify the form: all terms on one side, equals zero on the other.\n- Step 2: If you have fractions anywhere, multiply through by the LCD to clear them. If you have decimals, multiply to convert to integers. Check the signs: $$6x + 35y - 59 = 0$$ has $$a=6$$, $$b=35$$, $$c=-59$$ — all integers. ✓\n- Step 3: Harry's written note on the script: *\"This word should have been underlined and later checked off\"* (referring to \"integers\"). The procedure: underline \"integer\" when reading the question → solve → at the end, tick off: \"Are my coefficients integers? Yes ✓.\"", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "When integrating to find $$f(x)$$ from $$f'(x)$$ and you're given a point on the curve, what is the purpose of that point — and when in the process do you use it? (Q8b)", "answer": "- Step 1: The point gives you the **constant of integration $$C$$**. Integration produces a family of curves differing by a constant; the point pins down which specific curve.\n- Step 2: The process: (1) integrate $$f'(x)$$ to get $$f(x) = \\ldots + C$$, (2) substitute the given point into $$f(x)$$, (3) solve for $$C$$. Do NOT try to use the point before integrating — it belongs in step 2, not step 1.\n- Step 3: In Q8b, after integrating: $$f(x) = \\frac{8}{3}x^{3/2} - 2x + \\frac{8}{3x} + C$$. Using $$P(4,1)$$: $$1 = \\frac{64}{3} - 8 + \\frac{2}{3} + C = 14 + C$$, so $$C = -13$$.\n\nThe point is not used in the differentiation/integration itself — it resolves the constant at the end.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "When integrating a term like $$-\\frac{8}{3x^2} = -\\frac{8}{3}x^{-2}$$, what happens to the power and the coefficient — and what sign error is most common? (Q8b)", "answer": "- Step 1: Apply the power rule in reverse: $$\\int kx^n \\, dx = \\frac{k}{n+1}x^{n+1}$$. Here $$n = -2$$, so $$n + 1 = -1$$: $$\\int -\\frac{8}{3}x^{-2} \\, dx = -\\frac{8}{3} \\cdot \\frac{1}{-1} x^{-1} = +\\frac{8}{3}x^{-1} = \\frac{8}{3x}$$.\n- Step 2: The most common sign error: forgetting that dividing by $$n+1 = -1$$ **flips the sign**. Students write $$-\\frac{8}{3} \\cdot x^{-1} = -\\frac{8}{3x}$$, missing the sign change from dividing by $$-1$$.\n- Step 3: A quick check: the derivative of $$\\frac{8}{3x} = \\frac{8}{3}x^{-1}$$ is $$\\frac{8}{3}(-1)x^{-2} = -\\frac{8}{3x^2}$$. ✓ This confirms the integral is correct.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": true}, {"question": "You're about to write the first line of working on a differentiation question (e.g., rewriting surds as powers). How much time should you spend on this line compared to the rest — and why? (Q1a, Harry's coaching)", "answer": "- Step 1: **Spend disproportionately more time on the first line.** Harry: *\"The very first line is the most important… a slip there has a snowball effect.\"*\n- Step 2: An error on line 1 propagates through every subsequent line. In Q1a, a slip in differentiating $$-24x^{-1/2}$$ produced a wrong derivative, which gave a wrong gradient at P, which gave a wrong tangent equation — losing marks in both parts (a) and (b).\n- Step 3: The practical rule: **be fast in general, but slow and deliberate on the first couple of lines.** Double-check the first line before you move on. The 10 extra seconds you spend verifying line 1 can save 5 minutes of re-deriving everything when you spot an error later (or, worse, can save you from an undetected snowball).", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "What is the sector-area formula (in radians) — and why must you memorise it rather than re-derive it? (Q7a, ESAT 2)", "answer": "- Step 1: Sector area $$= \\frac{1}{2}r^2\\theta$$, where $$r$$ is the radius and $$\\theta$$ is the angle in radians.\n- Step 2: The intuition: the full circle has area $$\\pi r^2$$ and angle $$2\\pi$$. A sector with angle $$\\theta$$ is the fraction $$\\frac{\\theta}{2\\pi}$$ of the full circle, so area $$= \\frac{\\theta}{2\\pi} \\times \\pi r^2 = \\frac{1}{2}r^2\\theta$$.\n- Step 3: Harry's advice (from ESAT 2, applied to all formulae): *\"Ideally this is just a formula you can remember… write it down very quickly without having to draw lots of diagrams.\"* In both ESAT (~90 seconds per question) and P1 (time pressure), re-deriving formulae costs precious minutes. Memorise $$\\frac{1}{2}r^2\\theta$$ cold.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "What is the arc-length formula in radians — and how was it used in Q7c? (Q7c)", "answer": "- Step 1: Arc length $$= r\\theta$$, where $$r$$ is the radius and $$\\theta$$ is the angle in radians.\n- Step 2: The intuition: the full circumference is $$2\\pi r$$ for angle $$2\\pi$$. A sector with angle $$\\theta$$ has arc length $$= \\frac{\\theta}{2\\pi} \\times 2\\pi r = r\\theta$$.\n- Step 3: In Q7c, the arc $$ABC$$ has $$r = 6$$ and $$\\theta = 2\\pi - 0.7$$ (the reflex angle), so arc length $$= 6(2\\pi - 0.7) \\approx 33.5$$ cm. This is one of the three pieces of the perimeter (arc + line segment $$CD$$ + line segment $$DA$$).", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "In the sine rule $$\\frac{a}{\\sin A} = \\frac{b}{\\sin B}$$, when finding a **side** vs finding an **angle**, which arrangement of the formula should you use? (Q7b-c)", "answer": "- Step 1: To find a **side**, put sides on top: $$\\frac{a}{\\sin A} = \\frac{b}{\\sin B}$$, so $$a = \\frac{b \\sin A}{\\sin B}$$. To find an **angle**, put sines on top: $$\\frac{\\sin A}{a} = \\frac{\\sin B}{b}$$, so $$\\sin A = \\frac{a \\sin B}{b}$$.\n- Step 2: In Q7b (finding angle $$ADO$$): $$\\sin ADO = \\frac{6 \\sin 0.7}{5} \\approx 0.7731$$. In Q7c (finding side $$OD$$): $$OD = \\frac{6 \\sin 0.184}{\\sin 2.258} \\approx 1.42$$.\n- Step 3: The arrangement minimises the number of algebraic steps. If you're solving for a side, having sides on top means one multiplication and one division. If you're solving for an angle, having sines on top means you go directly to $$\\sin(\\text{angle})$$ and then take $$\\sin^{-1}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": true}, {"question": "What is the \"READ-THE-QUESTION checklist\" — and how many items does it contain? Name at least 5 of them. (Drill B)", "answer": "- Step 1: The checklist has **9 items**, each to be physically ticked before you stop writing on a question:\n+ **Units?** — cm, cm², rad, degrees. Did I write them?\n+ **Accuracy?** — 1 d.p., 3 d.p., 3 s.f. Did I round to exactly that?\n+ **Exact form?** — $$p + q\\sqrt{2}$$, $$a + b\\sqrt{2}$$. Rational part first, surd second?\n+ **Coordinates or value?** — If it says coordinates, did I give a point $$(x, y)$$?\n+ **Which root / which range?** — Did I keep all solutions (incl. $$x = 0$$)? Right interval, correct strict/inclusive sign?\n+ **Obtuse / acute?** — If a branch is specified, did I pick it and underline it?\n+ **Conditional / restricted sample space?** — Am I dividing by the right total?\n+ **Form $$ax + by + c = 0$$ with integers?** — Did I clear fractions and verify?\n+ **Did I finish?** — No part left blank; every part has a substituted, evaluated answer.\n- Step 2: Make it physical: underline each instruction word in the stem, then tick each underline when satisfied. Harry: *\"The next paper I expect to see it.\"*", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "How many marks separated a B from an A on this paper — and what type of marks were they? (Scoreboard)", "answer": "- Step 1: **Approximately 6 marks** separated a B (54/75, UMS 77) from an A (60/75, UMS 86), under the January 2026 grade boundaries.\n- Step 2: These were **not conceptual marks** — you set up every method correctly (sine rule, discriminant, chain rule, surd conjugate, every quadratic). The 6 marks were **execution slips**: one mental subtraction (Q7c), one dropped root (Q5a), un-ticked question requirements (Q8a, Q9a), and one part left blank (Q7c).\n- Step 3: The takeaway: you are not a B-grade mathematician who needs to learn more topics; you are an A/A* mathematician who is leaking marks at the pen. Closing that leak costs habit, not knowledge — it is the \"cheapest grade you will ever buy.\"", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "Why does the same careless-mental-subtraction habit hurt you in BOTH the ESAT and the P1 exam — even though one is calculator and one is not? (Scoreboard, Theme 1)", "answer": "- Step 1: In the **ESAT** (non-calculator), you must compute subtractions in your head under a ~90-second-per-question clock. A slip like $$46 - 25$$ directly produces a wrong answer with no chance to catch it.\n- Step 2: In the **P1** (calculator allowed), you *choose* to do subtractions in your head for speed — but the calculator is right there. The slip $$6 - 1.42 = 0.96$$ (instead of 4.58) happened because you didn't verify on the calculator.\n- Step 3: The fix is the same for both: **drill quick mental subtraction** so the size-check becomes reflexive (if you write 0.96 for \"$$6 - 1.42$$,\" it should feel wrong instantly), AND **re-key every subtraction on the calculator** in P1. The mental-drill habit transfers: it makes you faster in ESAT and more accurate in P1.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "When the question says \"hence solve\" (as in Q5b or Q3c), what does \"hence\" require you to do with your answer from the previous part? (Q3c, Q5b)", "answer": "- Step 1: \"Hence\" means you **must use the result from the previous part** to solve the current part. It is not optional — it is the intended path.\n- Step 2: In Q5b, \"hence solve\" means: use the roots from Q5a ($$u = 0, \\frac{7}{2}, -5$$) and substitute back $$u = (y-5)^2$$ to find $$y$$. In Q3c, \"hence state the range\" means: intersect the quadratic-inequality solution with the constraint from Q3a.\n- Step 3: Ignoring \"hence\" and solving from scratch can still score method marks if correct, but it wastes time and may not match the mark scheme's method path. More importantly, \"hence\" is a signal that the previous result is the key — use it directly.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "When expanding $$(x-4)(2x+1)^2$$ to find $$f'(x)$$ by differentiation, what's the expansion strategy — and what must you not forget? (Q10b)", "answer": "- Step 1: First expand $$(2x+1)^2 = 4x^2 + 4x + 1$$, then multiply by $$(x-4)$$: $$(x-4)(4x^2 + 4x + 1) = 4x^3 + 4x^2 + x - 16x^2 - 16x - 4 = 4x^3 - 12x^2 - 15x - 4$$.\n- Step 2: Then differentiate: $$f'(x) = 12x^2 - 24x - 15$$.\n- Step 3: The pitfall is sign errors when multiplying by $$(x - 4)$$ — the $$-4$$ flips every sign in the second row. Work column by column and be deliberate with the negative distribution.\n\nAlternatively, you could use the product rule on $$(x-4)(2x+1)^2$$, but expansion is more straightforward for a polynomial.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "In the ESAT two-way-table problem, the fact says \"$$\\frac{2}{3}$$ of the 36 tennis-choosers were boys.\" Under non-calculator conditions, how do you compute this quickly? (ESAT 1)", "answer": "- Step 1: $$\\frac{2}{3}$$ of 36: first find $$\\frac{1}{3}$$ of 36, which is 12 (since $$36 \\div 3 = 12$$). Then $$\\frac{2}{3}$$ is twice that: $$2 \\times 12 = 24$$ boys.\n- Step 2: The remaining $$\\frac{1}{3}$$ are girls: $$36 - 24 = 12$$ girls. Or directly: $$\\frac{1}{3} \\times 36 = 12$$.\n- Step 3: Harry: *\"Non-calculator, so do this in your head — $$36 \\div 3 = 12$$, $$12 \\times 2 = 24$$.\"* The strategy for fractional parts under time pressure: **always find the unit fraction first** (divide by the denominator), then multiply by the numerator. This avoids the harder multiplication $$36 \\times 2 = 72$$, then $$72 \\div 3 = 24$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "What does it mean that \"whole numbers are rational numbers\" — and why did Harry need to clarify this in Q2b? (Q2b)", "answer": "- Step 1: A **rational number** is any number that can be written as $$\\frac{p}{q}$$ where $$p$$ and $$q$$ are integers and $$q \\neq 0$$. Whole numbers qualify: e.g., $$10 = \\frac{10}{1}$$.\n- Step 2: In Q2b, the answer was $$x = 10 + 10\\sqrt{2}$$, so $$p = 10$$ and $$q = 10$$ — both integers (hence rational). Harry initially expected fractions but checked the mark scheme: *\"I was expecting fractions when they say 'rational numbers'… but whole numbers are rational numbers — that is correct, well done.\"*\n- Step 3: The misconception: \"rational\" ≠ \"fraction.\" Rational means *expressible as* a fraction, not *necessarily written as* one. Integers are a subset of rationals.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": true}, {"question": "When solving $$\\frac{20\\sqrt{2}}{4 - 2\\sqrt{2}}$$, how does the \"hence\" from part (a) ($$\\frac{1}{4-2\\sqrt{2}} = \\frac{1}{2} + \\frac{1}{4}\\sqrt{2}$$) get used? (Q2b)", "answer": "- Step 1: Recognise that $$\\frac{20\\sqrt{2}}{4-2\\sqrt{2}} = 20\\sqrt{2} \\times \\frac{1}{4-2\\sqrt{2}}$$. Since part (a) gives you $$\\frac{1}{4-2\\sqrt{2}} = \\frac{1}{2} + \\frac{1}{4}\\sqrt{2}$$, substitute it directly.\n- Step 2: $$x = 20\\sqrt{2}\\left(\\frac{1}{2} + \\frac{1}{4}\\sqrt{2}\\right) = 20\\sqrt{2} \\cdot \\frac{1}{2} + 20\\sqrt{2} \\cdot \\frac{1}{4}\\sqrt{2} = 10\\sqrt{2} + \\frac{20}{4} \\cdot 2 = 10\\sqrt{2} + 10$$.\n- Step 3: Reorder as $$10 + 10\\sqrt{2}$$ (rational part first). The \"hence\" saved you from rationalising the denominator a second time — you already did the hard work in part (a).", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "When a question asks you to \"show that\" an inequality holds (e.g., \"show that $$x > 1.5$$\"), what must your final line look like? (Q3a)", "answer": "- Step 1: Your final line must be the **exact statement the question asks you to show**, derived clearly from the given information. End with something like \"$$\\Rightarrow x > 1.5$$\" or \"$$\\therefore x > 1.5$$\".\n- Step 2: In Q3a: perimeter $$= 22x - 4 > 29 \\Rightarrow 22x > 33 \\Rightarrow x > \\frac{33}{22} = 1.5$$. The final line states exactly what was required.\n- Step 3: \"Show that\" questions require you to demonstrate the result from first principles — you cannot just verify it by substitution. Every step must be visible and logically connected. The examiner needs to see the chain: given information → algebra → target statement.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "What is the difference between a **strict** inequality ($$<$$) and a **non-strict** inequality ($$\\leq$$) in the context of solution sets — and what visual difference does this create? (Q3b)", "answer": "- Step 1: Strict ($$<$$): the endpoint is **excluded** from the solution. Non-strict ($$\\leq$$): the endpoint is **included**.\n- Step 2: On a number line, strict inequalities use **open circles** (○) at the endpoints; non-strict use **filled circles** (●). In interval notation: strict $$1.5 < x < 2$$ is $$(1.5, 2)$$; non-strict $$1.5 \\leq x \\leq 2$$ is $$[1.5, 2]$$.\n- Step 3: In Q3b, the area is strictly less than 72, so the inequality is $$11x^2 - 4x - 36 < 0$$, giving the open interval $$-\\frac{18}{11} < x < 2$$. Using $$\\leq$$ would incorrectly include the endpoints where the area equals exactly 72 — but the question says \"less than.\"", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": true}, {"question": "How many past papers per weekend did Harry recommend — and what adjective did he use to describe how they should be done? (Closing advice)", "answer": "- Step 1: Harry recommended **~3 past papers per weekend** for volume of practice.\n- Step 2: The key qualifier: they should be done **reflectively** — meaning you review your mistakes, identify patterns, and adjust habits. Mindless repetition without review doesn't build the right reflexes.\n- Step 3: Harry: *\"Try to keep to this three past papers in a weekend… that will give the volume of practice we need for your Pure 1.\"* And from Q10's discussion: *\"The more past papers you do reflectively, the faster you'll reach for the sketch or the trigger next time.\"* Experience is what makes you recognise patterns (like \"obtuse\" → reject acute, or \"coordinates\" → write a pair) without having to reason from scratch.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "What is the relationship between the number of marks a question part is worth and the detail expected in your answer — specifically for a 2-mark \"state\" question like Q9a? (Q9a)", "answer": "- Step 1: A 2-mark \"state\" question typically awards **one mark per component**. If you only give one component (the $$y$$-value), you get 1 out of 2.\n- Step 2: In Q9a, \"state the coordinates of the minimum\" is worth 2 marks: B1 for the correct $$y$$-value ($$-4$$) and B1 for giving it as coordinates $$(270°, -4)$$. You scored B1 B0.\n- Step 3: The rule: **if a \"state\" or \"write down\" question is worth more than 1 mark, there are multiple components to give.** A 1-mark \"state\" needs one thing; a 2-mark \"state\" needs two things. Count the marks and make sure you've given enough distinct pieces of information.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "When the question says \"express $$h$$ in terms of $$r$$\" (as in ESAT 2), what does that require about your final answer? (ESAT 2)", "answer": "- Step 1: \"In terms of $$r$$\" means your final answer must have $$r$$ as the only variable — no $$h$$ on the right-hand side, and no other variables.\n- Step 2: The process: set $$S = V$$, solve for $$h$$, and simplify. $$h = \\frac{2r^2}{r^2 - 2r} = \\frac{2r}{r - 2}$$. This is expressed purely in terms of $$r$$.\n- Step 3: The common mistake is leaving the answer as $$h = \\frac{2r^2}{r^2 - 2r}$$ without cancelling the common factor of $$r$$. While technically \"in terms of $$r$$,\" the uncancelled form is not simplest. Always cancel common factors in the final answer.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "In the sine rule calculation for Q7c, you needed the third angle of triangle AOD. Given two angles are 0.7 rad and 2.258 rad, how do you find the third — and what identity are you using? (Q7c)", "answer": "- Step 1: The **angles in a triangle sum to $$\\pi$$ radians** (180°). So the third angle $$= \\pi - 0.7 - 2.258 \\approx 0.184$$ rad.\n- Step 2: This is the angle-angle-angle identity for triangles in radians: $$A + B + C = \\pi$$. In degrees, it would be $$A + B + C = 180°$$.\n- Step 3: This third angle ($$\\angle OAD = 0.184$$ rad) is then used in the sine rule to find side $$OD$$: $$OD = \\frac{6 \\sin 0.184}{\\sin 2.258} \\approx 1.42$$. The angle-sum step is essential — you can't apply the sine rule without knowing (or being able to deduce) an angle-side pair.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": true}, {"question": "What does it mean to \"star\" a value in an exam — and when should you do it? (Theme 4, Q7c)", "answer": "- Step 1: \"Starring\" means putting a small star (★) or asterisk next to a value you're **unsure about** but are using anyway to continue the question.\n- Step 2: Do this whenever you suspect an error but don't have time to re-derive: substitute the possibly-wrong number, complete the question, and mark it for review. The star tells future-you \"come back and check this if time allows.\"\n- Step 3: Harry: *\"Even if it's ridiculous, even if you know you've made a mistake, just keep going with the numbers, put a little star next to it, and if you've got time come back to it.\"* The star is a pragmatic exam-room tool: it lets you bank method marks now and fix accuracy later.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "When sketching $$y = 1 + \\sin\\theta$$ on $$0 \\leq \\theta \\leq 360°$$, what are the key features — and how does it differ from the basic sine wave? (Q9b)", "answer": "- Step 1: $$y = 1 + \\sin\\theta$$ is the basic sine wave **shifted up by 1**. It still has period $$360°$$, but the range changes from $$[-1, 1]$$ to $$[0, 2]$$.\n- Step 2: Key points: at $$\\theta = 0°$$, $$y = 1$$; at $$\\theta = 90°$$, $$y = 2$$ (maximum); at $$\\theta = 180°$$, $$y = 1$$; at $$\\theta = 270°$$, $$y = 0$$ (minimum); at $$\\theta = 360°$$, $$y = 1$$.\n- Step 3: The midline is now $$y = 1$$ instead of $$y = 0$$. This shift is crucial for counting intersections with $$y = \\tan\\theta$$ in Q9c — the lifted sine wave may cross the tan curve at different points than the unlifted one.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": false}, {"question": "What are the key features of $$y = \\tan\\theta$$ on $$0 \\leq \\theta \\leq 360°$$ that must appear in any sketch? (Q9b)", "answer": "- Step 1: $$\\tan\\theta$$ has **asymptotes** at $$\\theta = 90°$$ and $$\\theta = 270°$$ (where $$\\cos\\theta = 0$$). It passes through the origin $$(0°, 0)$$, $$(180°, 0)$$, and $$(360°, 0)$$.\n- Step 2: The curve rises from 0 to $$+\\infty$$ as $$\\theta \\to 90°^-$$, then comes from $$-\\infty$$ and rises to 0 at $$180°$$. The same pattern repeats from $$180°$$ to $$360°$$. Period is $$180°$$.\n- Step 3: In Q9b, you must sketch both $$y = 1 + \\sin\\theta$$ and $$y = \\tan\\theta$$ on the same axes. The intersections of these two curves are the solutions to $$\\tan\\theta = 1 + \\sin\\theta$$, which Q9c asks you to count.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": false}, {"question": "When the question says the curve $$f(x) = (x-4)(2x+1)^2$$ \"touches\" the $$x$$-axis at $$P$$ and \"crosses\" at $$Q$$, which root is $$P$$ and which is $$Q$$ — and why? (Q10a)", "answer": "- Step 1: The **repeated factor** $$(2x+1)^2$$ produces the \"touch\" point $$P$$ (even multiplicity → curve touches and turns around). The **simple factor** $$(x-4)$$ produces the \"cross\" point $$Q$$ (odd multiplicity → curve crosses the axis).\n- Step 2: $$P$$: $$(2x+1)^2 = 0 \\Rightarrow x = -\\frac{1}{2}$$, so $$P = (-\\frac{1}{2}, 0)$$. $$Q$$: $$x - 4 = 0 \\Rightarrow x = 4$$, so $$Q = (4, 0)$$.\n- Step 3: The language \"touches\" vs \"crosses\" is a direct signal about the multiplicity of the root. If you see \"touches,\" look for a squared (or even-power) factor. If you see \"crosses,\" look for a simple (or odd-power) factor.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": false}, {"question": "Why is it important to verify that $$f'(\\frac{5}{2}) = 0$$ in Q10c — and what would it mean if the derivative weren't zero? (Q10c)", "answer": "- Step 1: Verifying $$f'(\\frac{5}{2}) = 0$$ confirms that $$x = \\frac{5}{2}$$ is indeed a **turning point** (stationary point). If the derivative were non-zero, it wouldn't be a turning point and the tangent wouldn't be horizontal.\n- Step 2: $$f'(\\frac{5}{2}) = 12(\\frac{25}{4}) - 24(\\frac{5}{2}) - 15 = 75 - 60 - 15 = 0$$. ✓ Confirmed.\n- Step 3: The question says \"show the tangent at the turning point $$x = \\frac{5}{2}$$ has the form $$y = k$$.\" The word \"show\" requires you to demonstrate $$f'(\\frac{5}{2}) = 0$$ (proving it's a turning point with horizontal tangent) and then compute $$f(\\frac{5}{2}) = -54$$ (the value of $$k$$). Both steps are needed for full marks.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": true}, {"question": "When a question asks for the perimeter of a composite shape (sector + triangle), what's the strategy for identifying which edges to include? (Q7c)", "answer": "- Step 1: **Trace the boundary of the shape with your finger** (or pen). Every edge your finger touches is part of the perimeter. Interior edges are NOT included.\n- Step 2: In Q7, the shape $$ABCDA$$ consists of: arc $$ABC$$ (part of the sector), straight segment $$CD$$ (on the line $$OC$$, from $$C$$ to $$D$$), and straight segment $$DA$$. The interior edges $$OA$$ and the portion $$OD$$ are NOT on the boundary — they're inside the shape.\n- Step 3: Perimeter $$= \\text{arc } ABC + CD + DA = 33.5 + (6 - 1.42) + 5 = 43.1$$ cm. The key insight: $$CD = OC - OD = 6 - 1.42 = 4.58$$, because $$D$$ lies between $$O$$ and $$C$$ on the radius.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": true}, {"question": "What simple exercise can you do to test your mental-subtraction reflex? Give a dumbed-down example with answer. (Drill A)", "answer": "- Step 1: Compute $$50 - 17$$ mentally. The answer is **33**.\n- Step 2: The size-check: \"$$50 - 17$$ should be a bit above 30\" (since $$50 - 20 = 30$$, and we're subtracting 3 less). 33 is consistent. ✓\n- Step 3: Now try $$8 - 2.5 = 5.5$$ (size-check: \"just above 5\" ✓) and $$100 - 63 = 37$$ (size-check: \"roughly 40\" ✓). The drill is: compute, then ask \"does this have the right magnitude?\" If not, re-compute on the calculator.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": false}, {"question": "When solving for $$c$$ in the tangent-line question Q6, you set the line equal to the curve and used the discriminant. What would happen if the discriminant were positive instead of zero? (Q6a)", "answer": "- Step 1: A **positive discriminant** means the quadratic has **two distinct real roots**, so the line intersects the curve at **two points** — it's a secant (cutting line), not a tangent.\n- Step 2: A **zero discriminant** means one repeated root — the line touches the curve at exactly one point (tangent). A **negative discriminant** means no real roots — the line doesn't meet the curve at all.\n- Step 3: The three cases: $$b^2 - 4ac > 0$$ → two intersections; $$b^2 - 4ac = 0$$ → one intersection (tangent); $$b^2 - 4ac < 0$$ → no intersections. The question's phrasing \"meets at exactly one point\" is your trigger to set the discriminant to zero.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": true}, {"question": "After finding the repeated root $$x = \\frac{7}{2}$$ in Q6b, how do you find the $$y$$-coordinate of the intersection point — and why can you use either equation? (Q6b)", "answer": "- Step 1: Substitute $$x = \\frac{7}{2}$$ into **either** the line equation or the curve equation — both must give the same $$y$$-value at the intersection point.\n- Step 2: Using the line: $$y = 4(\\frac{7}{2}) - \\frac{49}{4} = 14 - \\frac{49}{4} = \\frac{56 - 49}{4} = \\frac{7}{4}$$. Using the curve: $$y = \\frac{7}{2}(\\frac{7}{2} - 3) = \\frac{7}{2} \\cdot \\frac{1}{2} = \\frac{7}{4}$$. Same answer. ✓\n- Step 3: Use whichever equation is simpler. The line equation $$y = 4x + c$$ is usually easier (one substitution, one multiplication) than the curve equation $$y = x(x-3)$$ (which requires two multiplications). But both work — they're equal at the intersection by construction.", "source": "GLM 5.1 ②", "_id": "glm_2_62", "judge_pick": false}, {"question": "What is the conjugate of $$4 - 2\\sqrt{2}$$ — and why does multiplying by the conjugate eliminate the surd from the denominator? (Q2a)", "answer": "- Step 1: The conjugate of $$4 - 2\\sqrt{2}$$ is $$4 + 2\\sqrt{2}$$ — flip the sign of the surd term.\n- Step 2: Multiplying: $$(4 - 2\\sqrt{2})(4 + 2\\sqrt{2}) = 4^2 - (2\\sqrt{2})^2 = 16 - 4 \\cdot 2 = 16 - 8 = 8$$. The surd disappears because of the difference-of-two-squares identity $$(a-b)(a+b) = a^2 - b^2$$, where $$a = 4$$ and $$b = 2\\sqrt{2}$$.\n- Step 3: This works for any expression of the form $$p + q\\sqrt{n}$$: the conjugate $$p - q\\sqrt{n}$$ makes the cross-terms cancel and leaves only $$p^2 - q^2 n$$, which is rational. This is why rationalising the denominator always uses the conjugate.", "source": "GLM 5.1 ②", "_id": "glm_2_63", "judge_pick": true}, {"question": "When a question part is worth 3 marks and you've scored M1 dM1 A0, what does each symbol mean — and what does the A0 tell you? (Q5a)", "answer": "- Step 1: **M1** = method mark (first independent method step). **dM1** = dependent method mark (a subsequent step that depends on the M1 being correct). **A0** = accuracy mark lost (the final answer is wrong).\n- Step 2: In Q5a, M1 for correctly factorising out $$x$$, dM1 for solving the quadratic bracket, A0 because the final answer was missing the $$x = 0$$ root. The method was right; the accuracy (completeness) was wrong.\n- Step 3: The implication: you can score method marks even with a wrong final answer, but you lose the accuracy marks. This is why Theme 4 (\"substitute and finish\") is so important — method marks are bankable even when you're unsure of a number. But accuracy marks require the complete, correct answer.", "source": "GLM 5.1 ②", "_id": "glm_2_64", "judge_pick": false}, {"question": "What specific homework did Harry assign for Q9c — and why did he leave it with you rather than working through it live? (Q9c)", "answer": "- Step 1: Harry assigned: **revise your trig graphs, then attempt Q9c yourself.** He left it as homework rather than working through it in the session.\n- Step 2: The reason: Q9c is the **same skill** as the June 12 lesson on counting intersections of periodic functions. You told Harry you wanted to revisit it yourself, so he respected that and moved on.\n- Step 3: The method to apply when you attempt it: count the intersections of $$y = \\tan\\theta$$ and $$y = 1 + \\sin\\theta$$ in one $$360°$$ period, then multiply by the number of periods in the given range, adjusting for partial periods and endpoints. Tie this question to the June 12 lesson when you revise.", "source": "GLM 5.1 ②", "_id": "glm_2_65", "judge_pick": false}, {"question": "What did Harry say you must do \"today\" (the day of the lesson) regarding booking the next session — and why the urgency? (Homework)", "answer": "- Step 1: **Book the next session yourself, today.** Harry: *\"Make sure you do it today, otherwise the system won't let you and I'd have to book it.\"*\n- Step 2: The next session was scheduled for Tuesday evening (after 6 pm). If you don't book it the same day, the booking system may lock you out and Harry would have to do it manually.\n- Step 3: This is a logistical point but an important one — missed sessions mean missed review time, which means fewer past papers covered before the exam. The administrative habit supports the academic habit.", "source": "GLM 5.1 ②", "_id": "glm_2_66", "judge_pick": false}, {"question": "When Harry says \"send me whatever you have completed, even if it's not the whole paper,\" what principle is he applying — and how does it mirror Theme 4? (Homework)", "answer": "- Step 1: The principle: **partial work is better than no work.** Harry can review what you've done and identify patterns even from an incomplete paper.\n- Step 2: This mirrors Theme 4 (\"substitute and finish, even if unsure\") perfectly. In the exam, a partial answer banks method marks. In homework, a partial submission lets your tutor give targeted feedback. In both cases, **something > nothing**.\n- Step 3: Harry: *\"If you send me what you've done of the other paper, even if it's not the whole paper, we can review as far as you've got\"* and finish it together in the tutorial. Don't wait for perfection — submit what you have.", "source": "GLM 5.1 ②", "_id": "glm_2_67", "judge_pick": false}, {"question": "You're about to write $$8 - 2 - \\frac{1}{6}$$ on your exam paper. Walk through the mental computation and the size-check. (Q8a, Drill A)", "answer": "- Step 1: Compute: $$8 - 2 = 6$$, then $$6 - \\frac{1}{6} = \\frac{36}{6} - \\frac{1}{6} = \\frac{35}{6}$$.\n- Step 2: Size-check: \"$$6 - \\frac{1}{6}$$ should be just under 6.\" $$\\frac{35}{6} \\approx 5.833$$, which is indeed just under 6. ✓\n- Step 3: The common slip is to write $$8 - 2 - \\frac{1}{6} = 6 - \\frac{1}{6} = \\frac{36 - 1}{6} = \\frac{35}{6}$$ but accidentally compute $$\\frac{36 - 6}{6} = 5$$ or make some other arithmetic error. The size-check catches this: if you wrote \"5,\" you'd know immediately that $$6 - \\frac{1}{6}$$ can't be 5.", "source": "GLM 5.1 ②", "_id": "glm_2_68", "judge_pick": false}, {"question": "You need to compute $$14 - \\frac{49}{4}$$. Walk through the algebra and the size-check. (Q6b, Drill A)", "answer": "- Step 1: Convert 14 to quarters: $$14 = \\frac{56}{4}$$. Then $$\\frac{56}{4} - \\frac{49}{4} = \\frac{56 - 49}{4} = \\frac{7}{4} = 1.75$$.\n- Step 2: Size-check: \"$$14 - 12.25$$ should be about 1.75\" (since $$\\frac{49}{4} = 12.25$$). Indeed, $$14 - 12.25 = 1.75$$. ✓\n- Step 3: The common slip is in the subtraction $$56 - 49$$: under pressure, students write 6 instead of 7. The size-check: \"the answer should be a bit under 2\" — 1.75 fits; 1.5 (from $$\\frac{6}{4}$$) would feel too small.", "source": "GLM 5.1 ②", "_id": "glm_2_69", "judge_pick": false}, {"question": "When integrating $$\\frac{4x^2 + 1}{2\\sqrt{x}}$$, what's the first algebraic step — and why must you do it before integrating? (Q4)", "answer": "- Step 1: **Split the fraction and convert to power form**: $$\\frac{4x^2 + 1}{2x^{1/2}} = \\frac{4x^2}{2x^{1/2}} + \\frac{1}{2x^{1/2}} = 2x^{3/2} + \\frac{1}{2}x^{-1/2}$$.\n- Step 2: You must do this because the power rule $$\\int kx^n \\, dx = \\frac{k}{n+1}x^{n+1} + C$$ requires each term to be in the form $$kx^n$$ with a visible exponent. You cannot integrate a compound fraction directly.\n- Step 3: Then integrate term by term: $$\\int 2x^{3/2} \\, dx = 2 \\cdot \\frac{2}{5}x^{5/2} = \\frac{4}{5}x^{5/2}$$ and $$\\int \\frac{1}{2}x^{-1/2} \\, dx = \\frac{1}{2} \\cdot 2x^{1/2} = x^{1/2}$$. Final answer: $$\\frac{4}{5}x^{5/2} + x^{1/2} + C$$.", "source": "GLM 5.1 ②", "_id": "glm_2_70", "judge_pick": false}, {"question": "What is the formula for the area of a triangle when you know two sides and the included angle (in radians) — and when is it useful? (Q7 context)", "answer": "- Step 1: Area $$= \\frac{1}{2}ab\\sin C$$, where $$a$$ and $$b$$ are two sides and $$C$$ is the included angle (in radians or degrees — just be consistent).\n- Step 2: This is useful when you don't have the base and height directly but you do have two sides and the angle between them. In Q7, triangle AOD has sides 6 and 5 with included angle 0.7 rad, so area $$= \\frac{1}{2}(6)(5)\\sin(0.7)$$.\n- Step 3: Memorise this alongside the sector-area formula $$\\frac{1}{2}r^2\\theta$$ — they have the same structure ($$\\frac{1}{2} \\times \\text{side} \\times \\text{side} \\times \\sin$$ or $$\\frac{1}{2} \\times r \\times r \\times \\theta$$), which makes them easier to remember as a pair.", "source": "GLM 5.1 ②", "_id": "glm_2_71", "judge_pick": true}, {"question": "A question asks for an answer to \"3 d.p.\" You've computed 2.25796... What do you write — and what must you NOT write? (Q7b)", "answer": "- Step 1: Write **2.258** — rounded to exactly 3 decimal places. Look at the 4th decimal digit (9): since it's ≥ 5, round up the 3rd digit from 7 to 8.\n- Step 2: Do NOT write 2.2579 (4 d.p.), 2.25 (2 d.p.), or 2.25796... (unrounded). Each of these fails the accuracy requirement and loses the final A mark.\n- Step 3: Do NOT truncate instead of rounding: 2.257 is wrong (that's truncation, not rounding). The rule: if the next digit is 5 or above, round up; if below 5, round down. This is a checklist item: after finishing, verify your answer matches the requested accuracy.", "source": "GLM 5.1 ②", "_id": "glm_2_72", "judge_pick": false}, {"question": "What was the single most valuable change Harry said you could make — and what grade-impact did he attribute to it? (Theme 2, overall)", "answer": "- Step 1: **Underline every requirement in the question and tick it off at the end.** This is Harry's #1 fix.\n- Step 2: He attributed a **full grade** of impact to it: *\"That could be the difference of a grade in every paper.\"* On this paper alone, it would have recovered marks on Q7b (obtuse), Q8a (integer form), and Q9a (coordinates) — roughly 3 of the 6 marks between a B and an A.\n- Step 3: He was explicit about the expectation: *\"You haven't done that in this paper; the next paper I expect to see it.\"* This is not optional coaching — it's a direct instruction for the next exam.", "source": "GLM 5.1 ②", "_id": "glm_2_73", "judge_pick": false}, {"question": "When a quadratic inequality has a positive leading coefficient and the inequality is \"$$< 0$$\", where is the solution region — between the roots or outside them? (Q3b)", "answer": "- Step 1: For a positive quadratic ($$a > 0$$) with inequality \"$$< 0$$\", the solution is **between the roots**: $$\\alpha < x < \\beta$$ (where $$\\alpha < \\beta$$).\n- Step 2: The intuition: a positive quadratic opens upward (U-shape). It dips below the $$x$$-axis between the roots and is above outside them. So \"$$< 0$$\" = the dip = between the roots.\n- Step 3: Conversely, \"$$> 0$$\" for a positive quadratic is outside the roots: $$x < \\alpha$$ or $$x > \\beta$$. For a negative quadratic (opens downward), the regions flip. Quick sketch of the parabola always confirms which region satisfies the inequality.", "source": "GLM 5.1 ②", "_id": "glm_2_74", "judge_pick": false}, {"question": "You need to compute $$\\frac{64}{3} - 8 + \\frac{2}{3}$$. Walk through the algebra efficiently. (Q8b, Drill A)", "answer": "- Step 1: Group the thirds: $$\\frac{64}{3} + \\frac{2}{3} = \\frac{66}{3} = 22$$.\n- Step 2: Then $$22 - 8 = 14$$.\n- Step 3: Size-check: \"$$\\frac{64}{3} \\approx 21.3$$, plus $$\\frac{2}{3} \\approx 0.67$$, gives about 22, minus 8 gives about 14.\" ✓ The trick is to combine the fractions first (same denominator), then subtract the integer. This avoids the messier $$\\frac{64}{3} - \\frac{24}{3} + \\frac{2}{3} = \\frac{42}{3} = 14$$.", "source": "GLM 5.1 ②", "_id": "glm_2_75", "judge_pick": false}, {"question": "When a question mentions a \"solid cylinder,\" what does \"solid\" tell you about the surface area — compared to a hollow/open cylinder? (ESAT 2)", "answer": "- Step 1: \"Solid\" means the cylinder has **both circular ends** included in the surface area. The total surface area is $$S = 2\\pi r^2 + 2\\pi rh$$ (two ends + curved side).\n- Step 2: A \"hollow\" or \"open\" cylinder (like a tube open at both ends) would have surface area = curved side only: $$S = 2\\pi rh$$ (no ends). An \"open-top\" cylinder (like a cup) would have one end: $$S = \\pi r^2 + 2\\pi rh$$.\n- Step 3: The word \"solid\" is your trigger to include both ends. If you miss it and only compute the curved surface, you'll be short by $$2\\pi r^2$$. Underline \"solid\" when you read the question.", "source": "GLM 5.1 ②", "_id": "glm_2_76", "judge_pick": false}, {"question": "Why is factorising by inspection faster than the quadratic formula for $$2x^2 + 3x - 35$$ — and when should you NOT use inspection? (Q5a)", "answer": "- Step 1: Inspection requires only mental checking of a few candidate factor pairs, with minimal writing. The quadratic formula requires writing the formula, substituting four numbers, computing the discriminant, taking a square root, and simplifying — many more steps, each a potential slip.\n- Step 2: You should NOT use inspection when: the roots are irrational (e.g., $$x^2 - 3x - 1 = 0$$), the coefficients are large or ugly, or you've tried a few factor pairs and none work after ~30 seconds. In those cases, the formula is more reliable.\n- Step 3: The decision rule: **small integer coefficients → try inspection first.** If it doesn't yield quickly, switch to the formula without hesitation. Don't waste time brute-forcing inspection when the formula will give you the answer in 60 seconds.", "source": "GLM 5.1 ②", "_id": "glm_2_77", "judge_pick": true}, {"question": "What's the quick mental-math trick for computing $$2\\pi - 0.7$$ (the reflex sector angle in Q7a) — and what's the approximate value? (Drill A)", "answer": "- Step 1: $$2\\pi \\approx 6.2832$$. Then $$6.2832 - 0.7 = 5.5832$$. So $$2\\pi - 0.7 \\approx 5.583$$.\n- Step 2: The trick: subtract the 0.7 from the integer part first: $$6.2832 - 0.7 = 6.2832 - 0.7000 = 5.5832$$. Or think of it as $$6.2832 - 0.7 = (6 - 0.7) + 0.2832 = 5.3 + 0.2832 = 5.5832$$.\n- Step 3: Size-check: \"$$2\\pi$$ is about 6.28, minus 0.7 should give about 5.58.\" ✓ This value is then used as $$\\theta$$ in both the sector area ($$\\frac{1}{2}r^2\\theta$$) and the arc length ($$r\\theta$$).", "source": "GLM 5.1 ②", "_id": "glm_2_78", "judge_pick": false}, {"question": "What was the exact cascade of errors in Q7c — and how many marks did it ultimately cost? (Q7c)", "answer": "- Step 1: The cascade: (1) You correctly set up the sine rule for $$OD$$ but evaluated it as $$0.96$$ instead of $$1.42$$ — a **careless calculator/subtraction slip**. (2) This wrong $$OD$$ gave a wrong $$CD = 6 - 0.96 = 5.04$$ instead of $$4.58$$. (3) You then **stopped before producing a final perimeter number**, leaving the part incomplete.\n- Step 2: The cost: by Harry's count, *\"one, two, three marks\"* — the dM0 and A0 on the perimeter. Had you substituted *any* value for $$OD$$ and finished, you would have banked the method marks.\n- Step 3: The three themes this one question hits: **Theme 1** (careless arithmetic), **Theme 2** (didn't underline \"obtuse\" in part b, which fed the wrong angle into part c's calculation), and **Theme 4** (didn't substitute and finish). One question, three habit failures, three marks lost.", "source": "GLM 5.1 ②", "_id": "glm_2_79", "judge_pick": false}, {"question": "When you have $$f'(x) = 4\\sqrt{x} - 2 - \\frac{8}{3x^2}$$ and need to integrate to find $$f(x)$$, what's the first step — and why? (Q8b)", "answer": "- Step 1: **Convert all terms to power form** before integrating: $$f'(x) = 4x^{1/2} - 2 - \\frac{8}{3}x^{-2}$$. This makes the power rule applicable to every term.\n- Step 2: Then integrate term by term: $$\\int 4x^{1/2} \\, dx = 4 \\cdot \\frac{2}{3}x^{3/2} = \\frac{8}{3}x^{3/2}$$; $$\\int -2 \\, dx = -2x$$; $$\\int -\\frac{8}{3}x^{-2} \\, dx = -\\frac{8}{3} \\cdot (-1)x^{-1} = \\frac{8}{3x}$$. Don't forget $$+ C$$.\n- Step 3: The reason for power-form first: you cannot integrate $$\\frac{8}{3x^2}$$ or $$4\\sqrt{x}$$ directly using the power rule without converting. The conversion is mechanical and prevents errors in the integration step.", "source": "GLM 5.1 ②", "_id": "glm_2_80", "judge_pick": false}, {"question": "What's a quick mental-math exercise to test whether you'd catch the slip \"$$6 - 1.42 = 0.96$$\"? (Drill A)", "answer": "- Step 1: Ask yourself: \"If I subtract about 1.4 from 6, should the answer be close to 0 or close to 5?\" The answer is clearly **close to 5** (since $$6 - 1 = 5$$ and $$6 - 2 = 4$$, so $$6 - 1.4$$ is between 4 and 5).\n- Step 2: Writing 0.96 means you're claiming $$6 - 1.42 \\approx 1$$, which is off by a factor of ~5. The size-check catches this instantly: the answer should be \"a bit under 5,\" not \"about 1.\"\n- Step 3: The correct value is $$6 - 1.42 = 4.58$$. The slip likely came from a calculator mis-key or a mental-arithmetic error. The defence: **always re-key subtractions on the calculator and sanity-check the magnitude.** If the answer feels wrong, it probably is.", "source": "GLM 5.1 ②", "_id": "glm_2_81", "judge_pick": false}, {"question": "When a question says \"the line $$y = 4x + c$$ meets $$y = x(x-3)$$ at exactly one point,\" what are the three possible interpretations of \"meets at exactly one point\" — and which one applies here? (Q6a)", "answer": "- Step 1: Three interpretations: (a) the line is **tangent** to the curve (touches at one point, discriminant = 0), (b) the line intersects at exactly one point because the curve itself only exists at one point (not applicable for polynomials), (c) the line and curve are identical (infinite intersections — not \"exactly one\").\n- Step 2: Here, interpretation (a) applies: the line is tangent to the parabola. Setting them equal gives a quadratic, and \"exactly one intersection\" means the discriminant is zero.\n- Step 3: For straight lines and parabolas, \"exactly one point of intersection\" almost always means tangent. The discriminant test is the universal tool: $$b^2 - 4ac = 0$$ for tangency, $$> 0$$ for two intersections, $$< 0$$ for no intersections.", "source": "GLM 5.1 ②", "_id": "glm_2_82", "judge_pick": true}, {"question": "When computing $$\\frac{7}{2} - 5$$, what's the result — and what sign should you expect? (Q5, Drill A)", "answer": "- Step 1: $$\\frac{7}{2} - 5 = 3.5 - 5 = -1.5 = -\\frac{3}{2}$$.\n- Step 2: Size-check: \"3.5 minus 5 should be negative, about -1.5.\" ✓ The sign is negative because you're subtracting a larger number from a smaller one.\n- Step 3: The common slip is to write $$+1.5$$ instead of $$-1.5$$, forgetting that the subtraction reverses the sign. Always check: if the second number is bigger, the result must be negative.", "source": "GLM 5.1 ②", "_id": "glm_2_83", "judge_pick": false}, {"question": "What does \"simplest form\" mean in the context of a differentiation or integration answer — and what should you NOT do beyond it? (Q1a, Q4)", "answer": "- Step 1: \"Simplest form\" means: no negative or fractional powers where surd/positive-power notation is cleaner (e.g., $$12x^{-3/2} = \\frac{12}{\\sqrt{x^3}}$$), no common factors that can be cancelled, and no compound fractions that can be split.\n- Step 2: What you should NOT do: rewrite the answer in an alternative equivalent form \"just in case.\" Harry on Q4: *\"I wouldn't waste time writing it another way as well, because you might make a mistake in the rewrite and confuse the examiner.\"*\n- Step 3: The principle: once you have a correct simplest-form answer, **stop.** Do not gild the lily. Do not write it in two different forms. Do not \"also express it as...\" A correct answer is a correct answer. Extra rewrites add risk with zero reward.", "source": "GLM 5.1 ②", "_id": "glm_2_84", "judge_pick": false}, {"question": "When you see \"state the possible values of $$a$$\" (plural \"values\"), what does the plural signal — and what happens if you only give one? (Q10d)", "answer": "- Step 1: The plural \"values\" signals that there are **multiple valid answers** — you must find and list all of them.\n- Step 2: In Q10d, $$f(a) = 0$$ gives two roots: $$a = 4$$ and $$a = -\\frac{1}{2}$$. If you only write one, you lose a mark (typically one mark per correct value in a \"state\" question).\n- Step 3: Harry: *\"'Possible values of $$a$$' — plural, so expect more than one.\"* Make this a reflex: when you see \"values\" (plural), actively search for all valid options. When you see \"value\" (singular), there's only one.", "source": "GLM 5.1 ②", "_id": "glm_2_85", "judge_pick": false}, {"question": "How does the habit of underlining and ticking off requirements specifically prevent the Q8a error (answer not in the form $$ax + by + c = 0$$ with integers)? (Q8a)", "answer": "- Step 1: When reading Q8a, you would underline: \"normal\" (→ negative reciprocal), \"at P\" (→ use point P(4,1)), \"form $$ax + by + c = 0$$\" (→ rearrange to this form), and \"integer\" (→ clear all fractions).\n- Step 2: When finishing, you'd tick each off: ✓ found the normal gradient ($$-\\frac{6}{35}$$), ✓ used point P, ✓ rearranged to $$ax + by + c = 0$$ form, ✓ cleared fractions to get integers. The last tick forces you to check: are my coefficients integers? If you had $$\\frac{6}{35}$$ still visible as a fraction, the tick would fail and you'd fix it.\n- Step 3: Without the tick-off, you stop at the first \"correct-looking\" answer and move on. With the tick-off, you verify each requirement individually. Harry: *\"When you think you've got an answer, read the question a second time: did I find the normal? At P? In this form? Integers? Ah, I didn't do that — then go and fix it.\"*", "source": "GLM 5.1 ②", "_id": "glm_2_86", "judge_pick": false}, {"question": "What is the connection between the ESAT warm-up lesson and the P1 paper lesson — and what single habit spans both? (Overall theme)", "answer": "- Step 1: The connection: **careless mental arithmetic** cost you marks in both halves. In ESAT 1, you mis-computed $$46 - 25$$. In P1 Q7c, you mis-evaluated $$OD$$ and $$6 - 1.42$$.\n- Step 2: The single spanning habit: **re-key every subtraction and size-check the result.** In ESAT (non-calculator), this means drilling mental subtraction so the size-check is reflexive. In P1 (calculator), this means actually using the calculator to verify and then asking \"does this number have the right magnitude?\"\n- Step 3: Harry's recommendation for both: *\"Practice quick mental arithmetic, particularly subtraction, with an app.\"* The app builds the reflex for ESAT; the calculator-verification habit builds the safety net for P1. Together, they close the ~6-mark leak that separates a B from an A.", "source": "GLM 5.1 ②", "_id": "glm_2_87", "judge_pick": false}, {"question": "When evaluating $$f'(4) = 4\\sqrt{4} - 2 - \\frac{8}{3 \\cdot 16}$$, walk through the computation step by step with size-checks. (Q8a)", "answer": "- Step 1: $$4\\sqrt{4} = 4 \\times 2 = 8$$. Size-check: \"$$4 \\times 2 = 8$$\" ✓.\n- Step 2: $$\\frac{8}{3 \\times 16} = \\frac{8}{48} = \\frac{1}{6}$$. Size-check: \"8 out of 48 is one-sixth\" ✓.\n- Step 3: $$8 - 2 - \\frac{1}{6} = 6 - \\frac{1}{6} = \\frac{35}{6}$$. Size-check: \"just under 6\" ✓. So $$f'(4) = \\frac{35}{6}$$, giving normal gradient $$= -\\frac{6}{35}$$.\n\nThe key: each intermediate step gets a quick size-check. If any step produces a number that \"feels wrong,\" re-compute it immediately.", "source": "GLM 5.1 ②", "_id": "glm_2_88", "judge_pick": false}, {"question": "When the question says a curve \"touches\" the $$x$$-axis, what is the geometric meaning — and how many times does the curve meet the axis at that point? (Q10a)", "answer": "- Step 1: \"Touches\" means the curve is tangent to the $$x$$-axis at that point — it meets the axis at exactly one point and stays on the same side (doesn't cross).\n- Step 2: Algebraically, this corresponds to a **repeated root** (even multiplicity). The curve touches at $$P(-\\frac{1}{2}, 0)$$ because $$(2x+1)^2 = 0$$ has a double root there.\n- Step 3: Contrast with \"crosses\" (odd multiplicity): the curve passes through the axis and changes sign. At $$Q(4, 0)$$, the factor $$(x-4)$$ has multiplicity 1, so the curve crosses. The language \"touches\" vs \"crosses\" is a direct read-off of the multiplicity.", "source": "GLM 5.1 ②", "_id": "glm_2_89", "judge_pick": false}, {"question": "What's the difference between the perimeter and the area of a shape — and which one involves only the boundary? (Q3, Q7)", "answer": "- Step 1: **Perimeter** is the total length of the **boundary** (the edges you'd trace with your finger). **Area** is the space **enclosed** by the boundary.\n- Step 2: In Q3, the perimeter is the sum of all side lengths: $$(2x-1) + 2x + (2x-1) + 3x + (6x-2) + 5x = 22x - 4$$. The area is the space inside, computed from the rectangle and the extra section.\n- Step 3: The common confusion: including interior edges in the perimeter (e.g., the shared edge between the sector and triangle in Q7). Only the **outer** boundary counts for perimeter. Interior edges are not part of the perimeter.", "source": "GLM 5.1 ②", "_id": "glm_2_90", "judge_pick": true}, {"question": "When you have $$\\pi - 0.7 - 2.258$$ (finding the third angle of triangle AOD in Q7c), what's the result and the size-check? (Drill A)", "answer": "- Step 1: $$\\pi \\approx 3.1416$$. Then $$3.1416 - 0.7 = 2.4416$$, and $$2.4416 - 2.258 = 0.1836 \\approx 0.184$$.\n- Step 2: Size-check: \"The three angles of a triangle must sum to $$\\pi \\approx 3.14$$. Two of them are 0.7 and 2.258, summing to 2.958. The third should be about $$3.14 - 2.96 \\approx 0.18$$.\" ✓\n- Step 3: The result $$0.184$$ rad is a small angle (about 10.5°), which makes sense: the triangle has one large obtuse angle (2.258 rad ≈ 129°) and one medium angle (0.7 rad ≈ 40°), leaving a small remainder. The size-check confirms the geometry is consistent.", "source": "GLM 5.1 ②", "_id": "glm_2_91", "judge_pick": false}, {"question": "When collecting $$x$$ terms in the surd equation $$4x = 2\\sqrt{2}\\,x + 20\\sqrt{2}$$, what's the algebraic move — and why must you factorise, not divide? (Q2b)", "answer": "- Step 1: Move all $$x$$ terms to one side: $$4x - 2\\sqrt{2}\\,x = 20\\sqrt{2}$$. Then **factorise out $$x$$**: $$x(4 - 2\\sqrt{2}) = 20\\sqrt{2}$$.\n- Step 2: Now divide: $$x = \\frac{20\\sqrt{2}}{4 - 2\\sqrt{2}}$$. You must factorise first because you cannot divide $$4x - 2\\sqrt{2}\\,x$$ by $$(4 - 2\\sqrt{2})$$ directly without factorising out $$x$$ first.\n- Step 3: The \"hence\" from part (a) kicks in: you already know $$\\frac{1}{4 - 2\\sqrt{2}} = \\frac{1}{2} + \\frac{1}{4}\\sqrt{2}$$, so $$x = 20\\sqrt{2} \\times (\\frac{1}{2} + \\frac{1}{4}\\sqrt{2}) = 10 + 10\\sqrt{2}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_92", "judge_pick": true}, {"question": "When reading an exam question for the first time, what is the very first physical action you should take with your pen — before any calculation? (Theme 2)", "answer": "- Step 1: **Underline
