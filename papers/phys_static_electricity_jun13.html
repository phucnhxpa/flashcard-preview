<script>
const cards = [{"q": "In the nuclide symbol $$_{Z}^{A}X$$, what does the bottom number $$Z$$ represent, and what does the top number $$A$$ represent? How do you find the number of neutrons? (2 steps)", "a": "- Step 1: The bottom number $$Z$$ is the **atomic (proton) number** \u2014 it tells you exactly how many protons are in the nucleus. This number defines which element the atom is (e.g., $$Z=2$$ means helium, always).\n- Step 2: The top number $$A$$ is the **mass number** \u2014 it is the total count of nucleons (protons + neutrons) in the nucleus. To find the number of neutrons, subtract: $$\\text{neutrons} = A - Z$$. For example, $$_{2}^{4}\\text{He}$$ has $$A=4$$, $$Z=2$$, so neutrons $$= 4 - 2 = 2$$.\n\nThe key insight: $$Z$$ fixes the element; $$A - Z$$ tells you the neutron count. A neutral atom also has exactly $$Z$$ electrons (equal to protons).", "source": "GLM 5.1"}, {"q": "For a neutral atom, why must the number of electrons equal the number of protons? What would happen to the atom's overall charge if it had one fewer electron than protons? (2 steps)", "a": "- Step 1: Each proton carries a relative charge of $$+1$$ and each electron carries $$-1$$. In a neutral atom, the total positive charge from all protons is exactly cancelled by the total negative charge from all electrons, so the net charge is zero. If there are $$Z$$ protons, you need $$Z$$ electrons to cancel them.\n- Step 2: If the atom has one fewer electron than protons (i.e., $$Z-1$$ electrons), the sum of charges is $$+Z + (-(Z-1)) = +1$$. The atom now has a **net positive charge** \u2014 it is no longer neutral; it has become a positive ion.\n\nTakeaway: neutrality is an exact balance. Losing even one electron tips the balance and makes the whole object positively charged.", "source": "GLM 5.1"}, {"q": "Why is the electron's relative mass quoted as \"approximately $$\\frac{1}{1840}$$\" or \"negligible\" compared to a proton, and what practical consequence does this have for which particle moves during charging and current? (3 steps)", "a": "- Step 1: The absolute masses are $$m_p = 1.67 \\times 10^{-27}$$ kg and $$m_e = 9.11 \\times 10^{-31}$$ kg. The ratio $$\\frac{m_p}{m_e} \\approx 1830$$, meaning a proton is roughly 1830 times heavier than an electron. Relative to the proton (assigned relative mass 1), the electron's mass is about $$\\frac{1}{1830} \\approx 0.0005$$, which is effectively zero for most purposes.\n- Step 2: Because the electron is so much lighter, it is far easier to move. Think of it this way: if you had to push either a bowling ball (proton/neutron) or a ping-pong ball (electron), which moves with less effort? The ping-pong ball, by a huge margin.\n- Step 3: This is precisely why **electrons are the particles that move** during charging and current. The heavy nuclei (protons + neutrons) stay essentially fixed in place in the solid material, while the lightweight outer electrons can be transferred between objects (friction) or drift through a conductor (current).\n\nTakeaway: \"electron moves\" isn't just a convention \u2014 it's a direct physical consequence of the enormous mass difference.", "source": "GLM 5.1"}, {"q": "What are the relative charge and relative mass of a proton, a neutron, and an electron? Why are these called \"relative\" values rather than absolute? (2 steps)", "a": "- Step 1: The relative values are:\n  + Proton: relative charge $$+1$$, relative mass $$1$$\n  + Neutron: relative charge $$0$$, relative mass $$1$$\n  + Electron: relative charge $$-1$$, relative mass $$\\approx \\frac{1}{1840}$$ (treated as negligible/\u22480)\n- Step 2: They are \"relative\" because they are **ratios** compared to the proton as the reference, not absolute SI values. The absolute charge of a proton is $$+1.60 \\times 10^{-19}$$ C and the absolute mass is $$1.67 \\times 10^{-27}$$ kg \u2014 but for static electricity reasoning at this level, the simple ratios (+1, 0, \u22121) are all you need to track charge balance and determine forces.\n\nThe absolute values live in the Data Booklet; the relative values are the working tool for this topic.", "source": "GLM 5.1"}, {"q": "State the principle of conservation of charge. A common student error is saying \"the cloth gained positive charge\" when a rod is rubbed and becomes negative. Why is this phrasing physically wrong, and how should it be stated instead? (3 steps)", "a": "- Step 1: Conservation of charge: **charge cannot be created or destroyed, only transferred from one object to another**. The total charge of a closed system remains constant.\n- Step 2: When the rod becomes negative, it has *gained electrons*. Those electrons came from the cloth, so the cloth *lost electrons*. The cloth didn't \"gain positive charge\" \u2014 positive charge is carried by protons, and protons are locked in the nucleus and don't move during friction.\n- Step 3: The correct phrasing: **the cloth has lost electrons, so it has a deficit of electrons relative to protons, giving it a net positive charge**. Or more concisely: \"the cloth becomes positive by losing electrons.\" You can never \"gain positive charge\" \u2014 you can only lose negative charge (electrons).\n\nThis is the rule Alex hammered: \"we can't pick up positive charge, we can just lose negative charge.\"", "source": "GLM 5.1"}, {"q": "What does it mean that charge is \"quantised\"? If an object has a total charge of $$Q$$, write the formula linking $$Q$$ to the number of transferred electrons $$n$$ and the elementary charge $$e$$. (2 steps)", "a": "- Step 1: Quantised means charge comes in **discrete packets** \u2014 you can never have a fraction of an electron's charge. Any charge is an integer multiple of the elementary charge $$e = 1.60 \\times 10^{-19}$$ C. You can't have 2.5 electrons transferred; it's always 0, 1, 2, 3, \u2026\n- Step 2: The formula is $$Q = ne$$, where:\n  + $$Q$$ = total charge in coulombs (C)\n  + $$n$$ = number of electrons transferred (an integer, no units)\n  + $$e = 1.60 \\times 10^{-19}$$ C (the elementary charge)\n  Rearranged: $$n = \\frac{Q}{e}$$. This lets you count how many electrons are responsible for a given charge.\n\nTakeaway: charge is not continuous \u2014 it comes in steps of $$e$$. Every charge you encounter is $$n$$ times $$1.60 \\times 10^{-19}$$ C, where $$n$$ is a whole number.", "source": "GLM 5.1"}, {"q": "Roughly how many electrons correspond to a charge of 1 \u03bcC (microcoulomb)? Without doing exact arithmetic, estimate the order of magnitude and explain your reasoning. (2 steps)", "a": "- Step 1: Start with $$n = \\frac{Q}{e}$$. Here $$Q = 1 \\times 10^{-6}$$ C and $$e \\approx 1.6 \\times 10^{-19}$$ C. So $$n = \\frac{10^{-6}}{1.6 \\times 10^{-19}}$$.\n- Step 2: For an order-of-magnitude estimate, round $$1.6$$ to ~1, so $$n \\approx \\frac{10^{-6}}{10^{-19}} = 10^{13}$$. The exact value is closer to $$6.3 \\times 10^{12}$$, but the key insight is: **even a tiny macroscopic charge (a microcoulomb) involves trillions of electrons**. This is why we don't notice the quantisation in everyday life \u2014 the steps are unimaginably small.", "source": "GLM 5.1"}, {"q": "What is the fundamental difference between a conductor and an insulator in terms of electron mobility? Why does static charge build up on insulators but not on conductors? (3 steps)", "a": "- Step 1: In a **conductor** (metals like copper, gold, platinum; also graphite), some outer electrons are delocalised \u2014 they are only weakly held by their parent atoms and can move freely throughout the material. These are called \"free electrons.\"\n- Step 2: In an **insulator** (plastic, glass, rubber, wool, perspex), electrons are tightly bound to their atoms and cannot flow freely through the material.\n- Step 3: This explains static buildup: if you add extra electrons to an insulator (by rubbing), those electrons are **stuck where they land** \u2014 they can't redistribute or flow away. On a conductor, any extra charge would immediately spread out across the surface and, if a path exists (like earthing), flow away entirely. Static charge imbalance \"only happens on insulators.\"\n\nTakeaway: static electricity is essentially trapped charge \u2014 and it's trapped precisely because insulators won't let electrons move.", "source": "GLM 5.1"}, {"q": "On an Electrostatic Series chart, materials at the top tend to become positive when rubbed, and materials at the bottom tend to become negative. What physical property of the material determines its position on this chart? (2 steps)", "a": "- Step 1: Position on the electrostatic series is determined by **how strongly the material holds onto its electrons**. Materials at the top have a *weak* hold on electrons \u2014 they tend to lose them during friction and become positive. Materials at the bottom have a *strong* hold \u2014 they tend to grab electrons from whatever they're rubbed against and become negative.\n- Step 2: When two materials are rubbed together, the one with the stronger hold on electrons (lower on the chart) takes electrons from the other. For example, if you rub perspex (top, weak hold) with a cloth lower on the chart, electrons transfer from perspex to cloth \u2192 perspex becomes positive, cloth becomes negative.\n\n+ Note: Alex initially mixed up which end was which and corrected himself live. The rule: **stronger hold \u2192 gains electrons \u2192 becomes negative \u2192 lower on chart.**", "source": "GLM 5.1"}, {"q": "When two insulators are rubbed together, one becomes positive and the other negative. Why are the charges described as \"equal and opposite\"? Link this to conservation of charge. (2 steps)", "a": "- Step 1: Before rubbing, both objects are neutral (net charge = 0 on each). The total charge of the system is $$0 + 0 = 0$$. By conservation of charge, the total charge after rubbing must still be 0.\n- Step 2: If, say, 1000 electrons move from object A to object B, then:\n  + Object A has lost 1000 electrons \u2192 charge $$= +1000e$$\n  + Object B has gained 1000 electrons \u2192 charge $$= -1000e$$\n  + Total charge $$= +1000e + (-1000e) = 0$$ \u2713\n  The charges are equal in magnitude (same number of electrons moved) and opposite in sign (one gained, one lost). This must always be true because charge is conserved.", "source": "GLM 5.1"}, {"q": "Explain the chain \"friction \u2192 charge \u2192 spark \u2192 current\" that Alex wrote on the board. What is happening at each arrow, and how does static charge transition into electric current? (3 steps)", "a": "- Step 1: **Friction \u2192 Charge**: Rubbing two insulators together transfers electrons from one to the other, creating a charge imbalance (one object negative, the other positive). This is static charge \u2014 the charge is stuck on the insulator.\n- Step 2: **Charge \u2192 Spark**: When the charge imbalance becomes large enough, the voltage (potential difference) between the charged object and its surroundings is high enough to break down the insulating air gap. Electrons jump across \u2014 this is a spark. It's the charge finally finding a path to move.\n- Step 3: **Spark \u2192 Current**: A spark is a brief, rapid flow of electrons through the air. That flow of charge *is* an electric current \u2014 just a very short-lived one. The Family Guy clip illustrates this: Peter rubs his feet on carpet (friction \u2192 charge), then touches someone and a spark jumps (spark \u2192 current), which he feels as a shock.\n\nThe conceptual bridge: static charge and electric current are the *same phenomenon* (charge imbalance) \u2014 the difference is whether the charge is stuck (static, on an insulator) or free to flow (current, through a conductor or a spark).", "source": "GLM 5.1"}, {"q": "State the three rules of electrostatic force. A student sees two objects attract each other and concludes \"they must have opposite charges.\" Is this reasoning complete? Why or why not? (3 steps)", "a": "- Step 1: The three rules are:\n  1. Like charges repel (positive repels positive; negative repels negative)\n  2. Unlike charges attract (positive attracts negative)\n  3. A charged object attracts a neutral object (by induction)\n- Step 2: The student's reasoning is **incomplete**. If two objects attract, there are *two* possible explanations:\n  + They have opposite charges (unlike attract), OR\n  + One is charged and the other is neutral (charged attracts neutral by induction)\n- Step 3: You cannot distinguish these two cases from attraction alone. However, if two objects *repel*, you *can* conclude they have the same type of charge \u2014 because neutral objects never repel anything. Repulsion is the definitive test for same-sign charge.\n\nThis is a classic exam trap: attraction is ambiguous; repulsion is unambiguous.", "source": "GLM 5.1"}, {"q": "Two rods are both negatively charged. When brought close, do they attract or repel? A student instinctively says \"attract.\" What misconception might be driving this, and how do you correct it? (2 steps)", "a": "- Step 1: The correct answer is **repel** \u2014 like charges (same sign) always repel, regardless of whether both are positive or both are negative. The sign of the charge doesn't matter; what matters is whether the signs are the *same* or *different*.\n- Step 2: The likely misconception: the student might be thinking that \"negative = attracts things\" (because we often see negative rods attracting neutral paper). But that's the *charged attracts neutral* rule, which is a different scenario. When two objects are *both* charged with the same sign, the only force is repulsion. Fix: bolt down \"same sign \u2192 repel\" as a reflex. Two negatives repel just as two positives do.\n\nThis was Phuc's most repeated error in the lesson \u2014 Alex corrected it at least three times.", "source": "GLM 5.1"}, {"q": "When we say two objects have \"the same charge\" and therefore repel, does \"same charge\" refer to them having the same number of protons? Explain what it actually means. (2 steps)", "a": "- Step 1: No \u2014 \"same charge\" refers to the **net (overall) charge** of each object, not the number of protons. The net charge is determined by the *imbalance* between electrons and protons: if an object has more electrons than protons, it's negative; if fewer, it's positive.\n- Step 2: Two objects \"have the same charge\" means they both have a net charge of the same sign (both net positive, or both net negative). The actual number of protons in each object is irrelevant \u2014 a copper rod and a gold rod with different proton counts can both be positively charged and will repel each other. What matters for the force is only the sign (and magnitude) of the *net excess or deficit of electrons*.\n\nThis was a subtlety Phuc raised \u2014 Alex confirmed: the +/\u2212 refers to the object's overall charge, not individual particles.", "source": "GLM 5.1"}, {"q": "A negatively charged balloon is brought near a neutral wall and sticks to it. Explain step-by-step why this happens, even though the wall started neutral. (3 steps)", "a": "- Step 1: The balloon carries excess electrons, so it has a net negative charge. The wall is initially neutral \u2014 equal protons and electrons throughout.\n- Step 2: The balloon's negative charge **repels** the free electrons in the wall (which is a conductor at its surface), pushing them away from the near surface toward the far side. This leaves the near side of the wall with a deficit of electrons \u2014 a **net positive charge** on the near surface. This is called **induced charge**.\n- Step 3: The near side of the wall (now positive) and the balloon (negative) are unlike charges, so they **attract**. Even though the wall is overall neutral, the local charge separation creates an attractive force. The balloon sticks.\n\nKey insight: the wall is still neutral *overall*, but charge has been **redistributed** \u2014 the near side is positive, the far side is negative. The attraction to the near side wins because it's closer (Coulomb's law: force falls with distance).", "source": "GLM 5.1"}, {"q": "What is the key difference between charging by friction and charging by induction? Does induction require the objects to touch? (2 steps)", "a": "- Step 1: **Charging by friction** involves physical contact (rubbing) that *transfers electrons* from one object to another. After friction, both objects have genuinely changed their total electron count \u2014 one has fewer, one has more. Both end up with a real net charge.\n- Step 2: **Charging by induction** does NOT require contact. A charged object brought *near* a neutral object **rearranges** the electrons already present in the neutral object \u2014 pushing or pulling them to one side. No electrons are added or removed from the neutral object; its total charge remains zero. The near side just becomes locally opposite to the charged object, causing attraction.\n\n+ Edge case: you *can* permanently charge an object by induction if you earth it while the inducing charge is nearby \u2014 then remove the earth connection and then the inducing charge. But the basic induction mechanism (attraction to neutral) doesn't require contact.", "source": "GLM 5.1"}, {"q": "What does \"earthing\" an object mean physically, and why does it make a charged object become neutral? Why is the Earth described as an \"infinite reservoir\" of charge? (3 steps)", "a": "- Step 1: Earthing means **connecting the object to the ground** using a conductor (e.g., a wire, or touching a metal pipe that goes into the ground). This gives charge a path to flow to or from the Earth.\n- Step 2: The Earth is described as an \"infinite reservoir\" because it is so enormously large that adding or removing a few billion electrons makes essentially zero difference to its overall charge. It can absorb any excess electrons or supply any deficit without changing its own potential.\n- Step 3: When you earth a negatively charged object, its excess electrons flow down the conductor into the Earth (spreading out across the planet). When you earth a positively charged object, electrons flow *up from the Earth* into the object to fill the deficit. In both cases, the object ends up neutral \u2014 charge \"wants to be balanced, so it will flow if it can.\"\n\nAlex's memorable line: \"What's the biggest source of spare electrons in the world? The world.\"", "source": "GLM 5.1"}, {"q": "Write the formula linking current, charge, and time. If a current of 2 A flows for 3 seconds, how much charge has passed? Walk through the reasoning. (2 steps)", "a": "- Step 1: The formula is $$I = \\frac{\\Delta Q}{\\Delta t}$$, where:\n  + $$I$$ = current in amperes (A)\n  + $$\\Delta Q$$ = charge in coulombs (C)\n  + $$\\Delta t$$ = time in seconds (s)\n  Rearranged: $$\\Delta Q = I \\Delta t$$. One ampere means one coulomb of charge passes per second.\n- Step 2: With $$I = 2$$ A and $$\\Delta t = 3$$ s: $$\\Delta Q = 2 \\times 3 = 6$$ C. Conceptually: 2 A means 2 coulombs per second; over 3 seconds, that's $$2 + 2 + 2 = 6$$ coulombs total.\n\n+ Always convert time to seconds before using this formula (e.g., 2 minutes = 120 s, not 2).", "source": "GLM 5.1"}, {"q": "How does a battery create the same kind of charge imbalance as static electricity, but result in continuous current instead of a one-off spark? (3 steps)", "a": "- Step 1: Inside a battery, the chemical reactions of the EMF (electromotive force) push electrons so that one terminal accumulates excess electrons (becomes negative) and the other loses electrons (becomes positive). This is the *same type of charge imbalance* as static electricity \u2014 one side negative, the other positive.\n- Step 2: The difference is what happens next. With static charge on insulators, the charge is stuck \u2014 there's no conducting path, so nothing flows until a spark jumps. But with a battery, a **conducting wire** connects the two terminals.\n- Step 3: Because the wire is a conductor, electrons can flow continuously from the negative terminal, through the circuit, to the positive terminal. The battery's internal chemistry keeps pushing more electrons to the negative terminal and removing them from the positive terminal, maintaining the imbalance. So the current flows *continuously* rather than discharging in one brief spark.\n\nTakeaway: static = charge imbalance with no path to flow; current = charge imbalance with a conducting path that allows continuous flow.", "source": "GLM 5.1"}, {"q": "Conventional current flows from positive to negative, but electrons physically drift from negative to positive. Why is there a discrepancy, and does it affect calculations? (2 steps)", "a": "- Step 1: The discrepancy is **historical**. Before the electron was discovered, scientists arbitrarily defined current as flowing from positive to negative. Later, it was found that the actual charge carriers (electrons in metals) move the opposite way \u2014 from negative to positive. By convention, the original definition was kept as \"conventional current.\"\n- Step 2: It doesn't affect calculations because the formulas ($$I = \\frac{\\Delta Q}{\\Delta t}$$, etc.) work with the *magnitude* of the charge flow. Whether you think of positive charges moving one way or negative charges moving the other, the same amount of charge passes the same point in the same time. The math is identical \u2014 only the physical picture differs.\n\n+ In other materials (like electrolytes or semiconductors), positive charge carriers (ions, holes) DO move in the conventional current direction, so the convention isn't always \"wrong\" \u2014 it depends on the material.", "source": "GLM 5.1"}, {"q": "Combine the two formulas $$Q = ne$$ and $$I = \\frac{\\Delta Q}{\\Delta t}$$ to derive the expression for the number of electrons flowing in time $$\\Delta t$$ at current $$I$$. (2 steps)", "a": "- Step 1: From the current definition, the total charge that flows is $$\\Delta Q = I \\Delta t$$. This charge is carried by electrons, each contributing charge $$e$$.\n- Step 2: From the quantisation formula, the number of electrons is $$n = \\frac{Q}{e}$$. Substituting $$\\Delta Q$$ for $$Q$$: $$n = \\frac{\\Delta Q}{e} = \\frac{I \\Delta t}{e}$$. This formula lets you count electrons from current and time \u2014 linking the macroscopic measurement (amperes, seconds) to the microscopic particle count.\n\n+ Quick sanity check: if $$I = 1$$ A flows for 1 s, $$\\Delta Q = 1$$ C, and $$n = \\frac{1}{1.6 \\times 10^{-19}} \\approx 6.3 \\times 10^{18}$$ electrons. Even 1 coulomb involves an enormous number of electrons.", "source": "GLM 5.1"}, {"q": "A gold-leaf electroscope is charged by *contact* with a negatively charged rod. Explain why the gold leaf rises. A common wrong answer is \"the neutral leaf is attracted to the rod.\" Why is this wrong? (3 steps)", "a": "- Step 1: When the negative rod **touches** the metal plate, electrons flow from the rod into the conducting metal (plate \u2192 rod \u2192 leaf). Because metal is a conductor, these electrons spread throughout the entire metal structure.\n- Step 2: The metal plate, the central rod, and the gold leaf all become **negatively charged** \u2014 they've all gained electrons. The leaf and the rod now carry the **same** (negative) charge.\n- Step 3: **Like charges repel**, so the negatively charged leaf is pushed away from the negatively charged rod \u2014 the leaf rises. The error \"neutral leaf attracted to rod\" is wrong because the leaf is *no longer neutral* after contact. Contact means charge is *shared*, so the leaf takes the same sign as the rod. The leaf rises by **repulsion**, not attraction.\n\nThis was a key correction in the lesson \u2014 attraction of a neutral object is the *induction* story, not the contact story.", "source": "GLM 5.1"}, {"q": "A gold-leaf electroscope is already positively charged (leaf is raised). A negatively charged rod is brought *near* (not touching) the top plate. Explain why the leaf falls. (3 steps)", "a": "- Step 1: The electroscope is positive because electrons have been *removed* from it (deficit of electrons). The rod and leaf are both positive, so the leaf is raised by repulsion.\n- Step 2: When the negative rod is brought near (induction), its negative charge **attracts electrons up** from the rest of the metal into the top plate region. (Alternatively: it repels the remaining positive charge downward, but the electron picture is cleaner.) Either way, some of the positive charge on the rod+leaf is cancelled by the extra electrons drawn up.\n- Step 3: The net charge on the rod+leaf assembly decreases toward zero, so the repulsive force weakens, and the **leaf falls**. If exactly enough electrons are drawn up to cancel all the positive charge, the electroscope becomes neutral and the leaf hangs straight down. If more electrons arrive, it overshoots to negative and the leaf would rise again with opposite sign.\n\nThis is why earthing is the reliable method to force exactly neutral \u2014 it lets the charge flow to/from Earth until perfectly balanced.", "source": "GLM 5.1"}, {"q": "Walking on a nylon carpet makes you negatively charged, and touching a metal door handle gives you a shock. Explain the full chain of events from friction to shock. (3 steps)", "a": "- Step 1: **Charging by friction**: Walking rubs your shoes against the nylon carpet. Nylon is an insulator. Electrons transfer from the carpet onto you (nylon is higher on the electrostatic series than shoe rubber, so the shoe/body gains electrons). You become negatively charged \u2014 you have surplus electrons.\n- Step 2: **Charge remains static**: You are wearing insulating shoes and standing on an insulating carpet. There's no conducting path to Earth, so the surplus electrons are stuck on you \u2014 static charge builds up.\n- Step 3: **Discharge (shock)**: The metal door handle is a conductor, connected through the door mechanism to Earth. When you touch it, your surplus electrons suddenly have a conducting path to Earth. They flow rapidly from you \u2192 through the handle \u2192 to Earth. This rapid flow of charge is a **brief current** \u2014 felt as a shock/spark.\n\nThe shock is the same chain Alex wrote: friction \u2192 charge \u2192 spark \u2192 current.", "source": "GLM 5.1"}, {"q": "In the EDPL (electrostatic dust-print lifter) exam question, a 10 kV power supply is connected between a metal plate and a lifting sheet. The question says \"use the idea of charge movement.\" Why must you talk about *electrons moving in a direction* rather than just stating the final charges? (2 steps)", "a": "- Step 1: The mark scheme requires you to demonstrate understanding of *how* the charging happens, not just the end result. \"The lifting sheet is negative and the plate is positive\" only states the outcome \u2014 it doesn't show you understand the mechanism.\n- Step 2: The correct answer names the charge carriers and their direction: **\"Electrons are transferred from the metal plate, through the control unit, to the lifting sheet.\"** This shows you understand that:\n  + Only electrons move (not \"positive charge\")\n  + The power supply pushes electrons in a specific direction\n  + The plate loses electrons \u2192 becomes positive; the sheet gains electrons \u2192 becomes negative\n\nAlex's exam-technique rule: match your answer language to the command words. \"Use the idea of charge movement\" = describe *movement*, not just final states.", "source": "GLM 5.1"}, {"q": "Why does a charged lifting sheet attract neutral dust particles from a footprint? Which electrostatic rule is this? (2 steps)", "a": "- Step 1: This is the rule: **a charged object attracts a neutral object**. The lifting sheet is charged (negative), and the dust particles are neutral.\n- Step 2: By induction, the charged sheet repels electrons in the dust to the far side, leaving the near side of each dust particle with a net opposite charge (positive). The near-side attraction pulls the dust particles up onto the sheet. This is the *exact same mechanism* as the plastic rod picking up neutral pieces of paper.", "source": "GLM 5.1"}, {"q": "Why is it dangerous to wear a nylon jacket at a petrol station, but safe to wear a waxed jacket with metal fibres/earthing? Explain using conductor vs insulator reasoning. (3 steps)", "a": "- Step 1: Nylon is an **insulator** \u2014 electrons are tightly held and cannot flow away. If friction (e.g., from movement) transfers electrons onto the jacket, the charge stays trapped. Static charge builds up on the nylon jacket.\n- Step 2: If the voltage becomes high enough, the charge can spark from the jacket to a nearby earthed object (like the pump nozzle). Petrol vapour is highly flammable \u2014 a spark in the presence of vapour can cause a fire or explosion.\n- Step 3: A waxed jacket with metal fibres or earthing is **conductive**. Any charge that builds up immediately flows through the conductive material to Earth. No charge accumulates, no voltage builds up, no spark forms \u2014 safe.\n\n+ The common student error is saying the wax jacket is safe \"because it's waterproof.\" The relevant property is **electrical conductivity/earthing**, not waterproofing.", "source": "GLM 5.1"}, {"q": "Explain how electrostatic paint spraying works. Why does it give a more even coat with less waste compared to non-charged spraying? (3 steps)", "a": "- Step 1: At the nozzle, paint droplets are given a net **positive** charge (electrons are removed from them). The car body is connected to a negative charge (or to Earth, so it becomes effectively negative by induction).\n- Step 2: **Unlike charges attract**: the positively charged paint droplets are pulled toward the negatively charged car body. This attraction guides the paint directly onto the car rather than drifting away.\n- Step 3: The paint even reaches hidden/recessed areas because the electrostatic attraction works around corners (the field lines curve). Also, once an area is coated, its charge partially neutralises, so subsequent droplets are more attracted to uncoated areas \u2014 giving a more even coat with less overspray and waste.", "source": "GLM 5.1"}, {"q": "How does a smoke precipitator in a chimney use static electricity to remove particles from waste gases? (2 steps)", "a": "- Step 1: Inside the chimney, waste gases pass between charged metal plates (or wires). The plates/ wires are at a high voltage, which ionises the air and charges the soot/smoke particles (giving them a net charge, typically negative as they pick up electrons from the ionised air).\n- Step 2: The charged smoke particles are then **attracted** to oppositely charged collection plates (or to earthed plates by induction). Instead of leaving the chimney as pollution, the particles stick to the plates and are collected for disposal.\n\nThis is the \"charged attracts neutral\" rule on an industrial scale \u2014 the same physics as the rod and paper.", "source": "GLM 5.1"}, {"q": "Lightning is a dramatic example of static electricity. Explain the chain from charge buildup to lightning strike, identifying the friction, the charge separation, and the discharge. (3 steps)", "a": "- Step 1: **Friction \u2192 charge**: Inside a storm cloud, ice crystals and water droplets collide and rub against each other. This friction transfers electrons \u2014 the lighter ice crystals lose electrons (become positive, rise) and the heavier particles gain electrons (become negative, sink). The cloud base becomes strongly negative.\n- Step 2: **Induction on the ground**: The negatively charged cloud base **induces** a positive charge on the ground below it (repels electrons in the ground deeper, leaving the surface positive). This is the same induction mechanism as the balloon and wall.\n- Step 3: **Discharge \u2192 lightning**: Air is normally a good insulator, but when the voltage (potential difference) between cloud and ground becomes enormous, the air **breaks down** \u2014 it ionises and becomes conductive. A massive current (the lightning bolt) flows from the cloud to the ground, neutralising the charge imbalance. This is the spark \u2192 current step, just on a colossal scale.", "source": "GLM 5.1"}, {"q": "A student says: \"When two objects attract, they must have opposite charges.\" Give a counterexample that proves this statement is not always true. (2 steps)", "a": "- Step 1: The counterexample: a **charged rod attracting neutral paper pieces**. The rod is negative and the paper is neutral (not opposite charge), yet they attract. This happens by induction \u2014 the rod rearranges charge in the paper.\n- Step 2: Therefore, attraction alone cannot tell you that two objects have opposite charges. They *might* have opposite charges, or one might be charged and the other neutral. Only **repulsion** definitively proves both objects carry the same type of charge, because a neutral object never repels anything.\n\nThis is an exam-favourite edge case: attraction is ambiguous; repulsion is diagnostic.", "source": "GLM 5.1"}, {"q": "A student charges an electroscope by contact with a negative rod and the leaf rises. Then they bring the same negative rod *near* (not touching) the plate again. Does the leaf rise further, or fall? Explain. (3 steps)", "a": "- Step 1: After contact, the electroscope is **negatively charged** (gained electrons from the rod). The leaf and rod are both negative, and the leaf is raised by repulsion.\n- Step 2: Bringing the negative rod *near* (not touching) the plate induces charge redistribution. The rod's negative charge **repels** more electrons down from the plate into the rod+leaf assembly, increasing the negative charge density on the leaf and rod.\n- Step 3: With more negative charge concentrated on the leaf and rod, the **repulsive force increases**, and the leaf **rises further**. This is how you can use an electroscope to detect the *presence* and *sign* of a nearby charge without touching it.\n\n+ If the rod brought near had been *positive*, it would attract electrons up to the plate, reducing the charge on the leaf/rod, and the leaf would fall.", "source": "GLM 5.1"}, {"q": "You rub a perspex rod with a cotton cloth. Perspex is higher on the electrostatic series than cotton. Which object becomes positive and which becomes negative? Explain using the \"hold on electrons\" concept. (2 steps)", "a": "- Step 1: Being higher on the electrostatic series means perspex has a **weaker hold** on its electrons. Cotton, being lower, has a **stronger hold**. When they are rubbed together, the material with the stronger hold (cotton) **takes electrons** from the weaker one (perspex).\n- Step 2: Therefore:\n  + **Perspex loses electrons** \u2192 becomes **positive** (electron deficit)\n  + **Cotton gains electrons** \u2192 becomes **negative** (electron surplus)\n  The charges are equal and opposite by conservation of charge.", "source": "GLM 5.1"}, {"q": "Silver, paper, plastic, and wood are listed. Which is an electrical conductor, and why? What physical property distinguishes it? (2 steps)", "a": "- Step 1: **Silver** is the conductor. It is a metal with delocalised (free) electrons that can move throughout the material, allowing charge to flow.\n- Step 2: Paper, plastic, and wood are **insulators** \u2014 their electrons are tightly bound to atoms and cannot move freely. The distinguishing physical property is the **presence of free/delocalised electrons** (conductor) vs tightly bound electrons (insulator).", "source": "GLM 5.1"}, {"q": "A current of 0.5 A flows for 2 minutes. Roughly how many electrons flow? Give the order of magnitude and the reasoning chain, without doing exact arithmetic. (3 steps)", "a": "- Step 1: Convert time: 2 minutes = 120 seconds. Total charge: $$\\Delta Q = I \\Delta t = 0.5 \\times 120 = 60$$ C.\n- Step 2: Number of electrons: $$n = \\frac{\\Delta Q}{e} = \\frac{60}{1.6 \\times 10^{-19}}$$. For order of magnitude, round 60/1.6 \u2248 40, so $$n \\approx 40 \\times 10^{19} = 4 \\times 10^{20}$$.\n- Step 3: The exact answer is $$3.75 \\times 10^{20}$$ electrons, but the key insight is the **order of magnitude**: even a modest current for a couple of minutes involves ~$$10^{20}$$ electrons. That's a hundred billion billion \u2014 showing how tiny each electron's charge is.", "source": "GLM 5.1"}, {"q": "If you bring a positively charged rod near (not touching) a neutral metal sphere that is insulated from earth, what happens to the charge distribution in the sphere? Does the sphere's total charge change? (3 steps)", "a": "- Step 1: The positive rod **attracts** electrons in the metal sphere toward the near side (closest to the rod). The near side becomes negatively charged (electron-rich) and the far side becomes positively charged (electron-depleted). This is induction \u2014 charge redistribution without contact.\n- Step 2: The sphere's **total charge does not change** \u2014 it is still zero (neutral). No electrons have been added or removed; they've only been rearranged within the sphere.\n- Step 3: If you now **earth** the sphere while the rod is still nearby, electrons flow *from Earth into the sphere* (attracted by the positive rod's influence). If you then *remove the earth connection first* and *then* remove the rod, the sphere is left with a **permanent negative charge**. This is how you can charge an object by induction + earthing, without the rod ever touching it.", "source": "GLM 5.1"}, {"q": "Why does a gold-leaf electroscope use gold specifically for the leaf, rather than another metal? (2 steps)", "a": "- Step 1: Gold can be beaten into extremely thin sheets (gold leaf) \u2014 far thinner than almost any other metal. This makes the leaf **extremely light**.\n- Step 2: Because the leaf is so light, even a very small electrostatic repulsive force is enough to make it move (rise or fall). A heavier material would require much more charge to produce visible movement, making the instrument far less sensitive. Gold's malleability is what gives the electroscope its sensitivity.", "source": "GLM 5.1"}, {"q": "Coulomb's law $$F = \\frac{1}{4\\pi\\varepsilon_0}\\frac{Q_1 Q_2}{r^2}$$ is mentioned as a preview for IAL Unit 4. Based on this formula, explain qualitatively: (a) what happens to the force if you double one charge? (b) what happens if you double the distance? (c) what happens if both charges have the same sign? (3 steps)", "a": "- Step 1: **(a) Double one charge**: The force is proportional to each charge ($$Q_1$$ and $$Q_2$$ are multiplied). If you double one charge (say $$Q_1 \\to 2Q_1$$), the force doubles. This makes intuitive sense \u2014 twice the charge means twice the \"push\" or \"pull.\"\n- Step 2: **(b) Double the distance**: The force is proportional to $$\\frac{1}{r^2}$$ (inverse square law). If $$r \\to 2r$$, then $$F \\to \\frac{F}{4}$$. Doubling the distance makes the force **four times weaker**. This is a very steep falloff \u2014 electrostatic force drops rapidly with distance.\n- Step 3: **(c) Same sign charges**: If both $$Q_1$$ and $$Q_2$$ are positive, $$Q_1 Q_2 > 0$$, so $$F > 0$$. By convention, a positive force is **repulsive**. If both are negative, $$Q_1 Q_2$$ is also positive (negative \u00d7 negative = positive), so again repulsive. This confirms the rule: like charges repel. Opposite signs give a negative product \u2192 attractive force.", "source": "GLM 5.1"}, {"q": "A student claims: \"If an object is positively charged, it has gained protons.\" Why is this physically impossible in the context of everyday electrostatics? (2 steps)", "a": "- Step 1: Protons are locked inside the nucleus, bound by the strong nuclear force. Removing or adding protons would require nuclear reactions (extremely high energies) \u2014 not the low energies involved in rubbing objects together or connecting circuits.\n- Step 2: In electrostatics, the *only* mobile charge carriers are electrons. An object becomes positively charged **exclusively by losing electrons**, creating a deficit where there are now more protons than electrons. No protons are gained; electrons are lost. The positive charge was \"already there\" in the protons \u2014 it just becomes the net charge once some electrons leave.\n\nThis is the trap Alex emphasised: \"we can't pick up positive charge, we can just lose negative charge.\"", "source": "GLM 5.1"}, {"q": "Why can't you build up a static charge on a metal rod by rubbing it with a cloth, even though you can build up charge on a plastic rod the same way? (2 steps)", "a": "- Step 1: When you rub a metal rod, friction *does* transfer electrons between the cloth and the metal. However, metal is a **conductor** with free electrons \u2014 any charge imbalance immediately causes electrons to redistribute across the surface of the metal (and to your hand, and to the air).\n- Step 2: Because the charge can flow away, no charge imbalance builds up. To charge a conductor by friction, you would need to **insulate it from everything** (hold it with an insulating handle, keep it away from earth) so the charge has nowhere to go. Plastic, being an insulator, naturally traps the charge where it lands.", "source": "GLM 5.1"}, {"q": "Synthesis: A person wearing rubber-soled shoes rubs a balloon on their wool sweater. The balloon sticks to a wall. They then touch the balloon, and it falls. Explain the complete chain of physics, from the initial rubbing to the balloon falling. (4 steps)", "a": "- Step 1: **Friction \u2192 charge**: Rubbing the balloon on wool transfers electrons. Wool is higher on the electrostatic series (weaker hold) than the balloon material, so the balloon *gains* electrons and becomes **negative**. The wool becomes positive.\n- Step 2: **Induction \u2192 sticks to wall**: The negatively charged balloon is brought near the neutral wall. By induction, the balloon repels electrons in the wall to the far side, leaving the near surface positive. The attraction between the negative balloon and the induced positive near-surface makes the balloon **stick to the wall**.\n- Step 3: **Touching \u2192 earthing**: When the person touches the balloon, their body provides a conducting path to Earth (even through rubber soles, the person's skin contact creates a partial path; or more precisely, the person's body acts as a large charge reservoir). The balloon's excess electrons flow away through the person.\n- Step 4: **Discharge \u2192 falls**: The balloon loses its excess electrons and becomes approximately **neutral**. With no net charge, there is no electrostatic attraction to the wall (no induction, no force). Gravity wins, and the balloon **falls**.", "source": "GLM 5.1"}, {"q": "Synthesis: An electroscope is charged positive (leaf raised). First a negative rod is brought near (not touching), then removed. Then a positive rod is brought near. Describe what happens to the leaf in each case and explain why. (4 steps)", "a": "- Step 1: **Starting state**: The electroscope is positive (deficit of electrons). The central rod and leaf are both positive, repelling each other, so the leaf is raised.\n- Step 2: **Negative rod brought near**: The negative rod attracts electrons up from the rod/leaf into the top plate. This reduces the positive charge on the rod and leaf (some positive charge is \"cancelled\" by the attracted electrons). The repulsion weakens, and the **leaf falls**.\n- Step 3: **Negative rod removed**: With the inducing charge gone, the electrons redistribute back to their original positions. The electroscope returns to its original positive state, and the **leaf rises again** to its previous position.\n- Step 4: **Positive rod brought near**: The positive rod repels the remaining electrons further down into the rod/leaf, increasing the positive charge concentration on the leaf and rod. The repulsion increases, and the **leaf rises further** than its original position.", "source": "GLM 5.1"}, {"q": "Exam technique: A question asks \"Explain why the two rods repel each other.\" A student writes: \"Because electrons were transferred from the cloth to the rod.\" Why does this answer lose marks, even though the physics is partially correct? (2 steps)", "a": "- Step 1: The question asks **why they repel**, which is a question about the **force**. The student answered how the rods became charged (the charging mechanism), not why the force is repulsive. The charging step is irrelevant to the force question \u2014 it's already established that both rods are charged.\n- Step 2: The correct answer should state: \"The rods repel because they carry the **same (like) charge**, and **like charges repel**.\" Alex's model: \"Describe: they repel. Explain: because they have the same charge.\" Give the observation first, then the reason \u2014 these are separate marking points.\n\nPhuc's error: he kept re-deriving the charging step instead of answering the force question. Once you know the signs, answer the force first.", "source": "GLM 5.1"}, {"q": "A question says \"Use the idea of charge movement to explain how the plate becomes positive.\" Write the answer the examiner wants, and explain why simply stating \"the plate is positive\" is insufficient. (2 steps)", "a": "- Step 1: The required answer: **\"Electrons move away from the plate (to the lifting sheet / through the control unit). The plate loses electrons, so it has a deficit of electrons relative to protons, giving it a net positive charge.\"**\n- Step 2: \"The plate is positive\" only states the *outcome* \u2014 it doesn't use the idea of *charge movement* as the question commands. The mark scheme awards points for:\n  + Naming the charge carriers (electrons)\n  + Stating the direction of movement (away from the plate)\n  + Linking the movement to the resulting charge (loss of electrons \u2192 positive)\n\nMatch your answer language to the command words in the question.", "source": "GLM 5.1"}, {"q": "Simple exercise: A neutral atom of carbon is $$_{6}^{12}\\text{C}$$. How many protons, neutrons, and electrons does it have? (2 steps)", "a": "- Step 1: Read the nuclide symbol: $$Z = 6$$ (proton number), $$A = 12$$ (mass number). Neutrons $$= A - Z = 12 - 6 = 6$$.\n- Step 2: Since the atom is neutral, electrons $$=$$ protons $$= 6$$. Answer: **6 protons, 6 neutrons, 6 electrons**.", "source": "GLM 5.1"}, {"q": "Simple exercise: A current of 3 A flows for 10 seconds. What charge flows, and roughly how many electrons is that? (2 steps)", "a": "- Step 1: $$\\Delta Q = I \\Delta t = 3 \\times 10 = 30$$ C.\n- Step 2: $$n = \\frac{\\Delta Q}{e} = \\frac{30}{1.6 \\times 10^{-19}} \\approx \\frac{30}{1.6} \\times 10^{19} \\approx 19 \\times 10^{19} \\approx 1.9 \\times 10^{20}$$ electrons. Order of magnitude: ~$$10^{20}$$.", "source": "GLM 5.1"}, {"q": "Simple exercise: You rub an acetate rod with a duster. The acetate becomes positive. (a) Which way did electrons move? (b) What charge is on the duster? (2 steps)", "a": "- Step 1: (a) The acetate became positive, meaning it **lost electrons**. Electrons moved **from the acetate rod to the duster**.\n- Step 2: (b) The duster **gained** those electrons, so it carries the equal and opposite charge: **negative**. Conservation of charge guarantees the charges are equal and opposite.", "source": "GLM 5.1"}, {"q": "Simple exercise: Two rods both carry a positive charge. Brought close, do they attract or repel? State the rule. (1 step)", "a": "- Step 1: They **repel**. Rule: **like (same-sign) charges repel**. Two positives repel, just as two negatives would.", "source": "GLM 5.1"}, {"q": "Simple exercise: A negatively charged rod is brought near (not touching) a small neutral piece of aluminium foil. Explain why the foil is attracted. (3 steps)", "a": "- Step 1: The rod is negative. The foil is neutral but conducting (aluminium is a metal with free electrons).\n- Step 2: By induction, the rod's negative charge **repels** the free electrons in the foil to the far side. The near side of the foil becomes positive (electron deficit), and the far side becomes negative.\n- Step 3: The near side (positive) is **closer** to the rod (negative) than the far side (negative). Since electrostatic force is stronger at closer range, the attraction between near side and rod **wins** over the repulsion from the far side. Net result: **the foil is attracted to the rod**.", "source": "GLM 5.1"}, {"q": "Why is it that when you charge an electroscope by contact with a negative rod, the leaf rises by repulsion, but when you bring a negative rod *near* a neutral electroscope, the leaf also rises \u2014 but for a different reason? Explain both mechanisms. (4 steps)", "a": "- Step 1: **By contact**: Electrons physically flow from the rod into the metal. The leaf and rod both become negative. **Like charges repel** \u2192 leaf rises. The leaf is genuinely charged (same sign as the rod).\n- Step 2: **By induction (rod near, not touching)**: The negative rod repels electrons in the neutral electroscope downward into the rod+leaf. No electrons leave the electroscope \u2014 they just redistribute.\n- Step 3: The top plate becomes positive (lost electrons to the lower part), while the rod and leaf become negative (gained those electrons). The leaf and central rod now carry the same (negative) charge \u2192 **repel** \u2192 leaf rises.\n- Step 4: The key difference: by contact, the electroscope *gains* real extra electrons from outside (total charge changes). By induction, the electroscope's own electrons are just rearranged (total charge stays zero). But in both cases, the leaf and rod end up with the same sign of charge locally \u2192 repulsion \u2192 leaf rises.", "source": "GLM 5.1"}, {"q": "Edge case: Can an insulator be charged by induction? Why or why not? (2 steps)", "a": "- Step 1: In a pure insulator, electrons are **tightly bound** to their atoms and cannot move freely through the material. When a charged object is brought near, the electrons cannot migrate to one side of the object as they would in a conductor.\n- Step 2: However, within each *individual atom or molecule*, the electron cloud can be slightly distorted (polarised) \u2014 the electrons shift a tiny bit within the atom. This creates a very weak induced dipole effect, which is why a charged rod can attract small insulating pieces of paper. But you **cannot** charge an insulator by induction in the same way you charge a conductor \u2014 you can't redistribute charge across the whole object because the electrons can't flow through it.\n\n+ This is why the \"charged attracts neutral\" rule still works for insulators like paper, but the mechanism is molecular polarisation rather than bulk electron flow.", "source": "GLM 5.1"}, {"q": "If you wanted to permanently charge a neutral metal object by induction (without the charging rod ever touching it), what additional step must you perform? Describe the full sequence. (4 steps)", "a": "- Step 1: **Bring the charged rod near** the neutral metal object (not touching). By induction, electrons in the metal redistribute \u2014 the near side becomes opposite in charge to the rod, the far side becomes the same sign as the rod.\n- Step 2: **Earth the far side** of the metal object while the rod is still nearby. Since the far side has the same sign as the rod, earthing allows those charges to flow away:\n  + If the rod is negative, the far side is negative \u2192 electrons flow from the far side to Earth\n  + If the rod is positive, the far side is positive \u2192 electrons flow from Earth to the far side\n- Step 3: **Remove the earth connection** first (while the rod is still present). The object now has an overall charge (opposite to the rod), because some charge has flowed to/from Earth and is now trapped.\n- Step 4: **Remove the charged rod**. The remaining charge on the object redistributes evenly across its surface. The object is now **permanently charged** (opposite sign to the rod), and the rod never touched it.\n\nThis is the full induction-charging procedure \u2014 it's how real-world electrostatic generators work.", "source": "GLM 5.1"}, {"q": "A student sees a balloon stick to a wall and concludes \"the wall must be charged.\" Is this correct? Why or why not? (2 steps)", "a": "- Step 1: **Incorrect**. The wall does not need to have a pre-existing net charge. The balloon sticks to the wall even when the wall is **neutral**.\n- Step 2: The mechanism is **induction**: the charged balloon induces a charge separation in the neutral wall, making the near surface opposite in charge to the balloon. The attraction is between the charged balloon and the *induced* charge on the wall's near surface. The wall's total charge remains zero throughout.\n\nThis is the \"charged attracts neutral\" rule \u2014 a common exam question where students wrongly assume both objects must be charged for attraction to occur.", "source": "GLM 5.1"}, {"q": "A student says \"the gold leaf in an electroscope is attracted to the rod when the electroscope is charged by contact.\" Explain why the word \"attracted\" is wrong here and what the correct force is. (2 steps)", "a": "- Step 1: By contact, the leaf and the central rod **share the same charge** (both become negative if the rod was negative, or both positive if the rod was positive). Since they carry the **same sign** of charge, the force between them is **repulsion**, not attraction.\n- Step 2: The leaf **rises** because it is **repelled** (pushed away) from the central rod. The word \"attracted\" would imply opposite charges or a neutral object being drawn in \u2014 but neither applies here. After contact, the leaf is charged with the same sign, so it repels. This is the most common electroscope misconception.", "source": "GLM 5.1"}, {"q": "Why is the electrostatic series described as a \"series\" rather than just two categories (conductor and insulator)? What information does the ordering provide beyond just \"conductor vs insulator\"? (2 steps)", "a": "- Step 1: The electrostatic series ranks materials by **how strongly they hold electrons**, from weakest hold (top) to strongest hold (bottom). It's a continuous ranking, not a binary split.\n- Step 2: The ordering tells you **which material becomes positive and which becomes negative** when *any two* materials on the list are rubbed together: the one lower on the list (stronger hold) takes electrons from the one higher (weaker hold). This is more useful than just knowing \"conductor vs insulator\" \u2014 it lets you predict the *direction* of electron transfer for any pair of materials.\n\n+ Alex noted that the chart roughly correlates with insulators at the top and conductors at the bottom, but the primary purpose of the ordering is to predict charge sign, not conductivity.", "source": "GLM 5.1"}, {"q": "Conceptual link: How does the formula $$I = \\frac{\\Delta Q}{\\Delta t}$$ connect the world of static electricity (charge sitting still) to the world of circuits (charge flowing)? What physically changes to convert one into the other? (3 steps)", "a": "- Step 1: Static electricity is a **charge imbalance** ($$\\Delta Q$$) sitting on an insulator, unable to move. It's characterised by a fixed $$Q$$ with $$I = 0$$ (no flow).\n- Step 2: The formula $$I = \\frac{\\Delta Q}{\\Delta t}$$ says current is the **rate at which that stored charge moves**. If the charge $$\\Delta Q$$ that was sitting still suddenly finds a conducting path and flows in time $$\\Delta t$$, a current $$I$$ exists during that time.\n- Step 3: What physically converts static to current is **providing a conducting path** (a wire, a spark through air, a person touching a door handle). The charge imbalance is the *same* in both cases \u2014 the only difference is whether there's a path for electrons to flow. No path \u2192 static; path \u2192 current.\n\nThis is the bridge Alex built between the static-electricity lesson and the circuit work Phuc already knew.", "source": "GLM 5.1"}, {"q": "In the nuclide notation $$_{Z}^{A}\\text{X}$$, what does the bottom number $$Z$$ represent, and what does the top number $$A$$ represent? (2 steps)", "a": "- Step 1: The bottom number $$Z$$ is the **atomic (proton) number** \u2014 it tells you the number of protons in the nucleus. This identifies the element.\n- Step 2: The top number $$A$$ is the **mass number** \u2014 it tells you the total number of nucleons (protons + neutrons) in the nucleus. To find the number of neutrons, you compute $$A - Z$$.\n\nThink of $$Z$$ as \"which element\" and $$A$$ as \"how heavy the nucleus is.\"", "source": "GLM 5.1"}, {"q": "A neutral atom is written as $$_{3}^{7}\\text{Li}$$. How many protons, neutrons, and electrons does it have, and why must the electron count equal the proton count? (3 steps)", "a": "- Step 1: Protons = $$Z = 3$$ (the bottom number directly gives this).\n- Step 2: Neutrons = $$A - Z = 7 - 3 = 4$$ (mass number minus proton number).\n- Step 3: Electrons = 3. The atom is **neutral**, meaning it has zero net charge. Since each proton carries $$+1$$ and each electron carries $$-1$$, neutrality requires the number of electrons to equal the number of protons. If they differed, the atom would have a net charge and would be an **ion** instead.", "source": "GLM 5.1"}, {"q": "State the relative charge and relative mass of a proton, a neutron, and an electron. Why is the electron's relative mass often written as \"\u2248 0\" in static electricity problems? (2 steps)", "a": "- Step 1: Proton: relative charge $$+1$$, relative mass $$1$$. Neutron: relative charge $$0$$, relative mass $$1$$. Electron: relative charge $$-1$$, relative mass $$\\approx \\frac{1}{1840} \\approx 0$$.\n- Step 2: The electron's mass is roughly **1/1830 to 1/1840** of the proton's mass (the ratio $$m_p / m_e \\approx 1830$$). Compared to the proton and neutron (both ~1), the electron's contribution to the total mass of the atom is negligible. In static electricity, we care about which particle *moves* \u2014 and because the electron is so light, it is the one that gets transferred, while the heavy nucleus stays put.", "source": "GLM 5.1"}, {"q": "Why is it the **electron** that moves during charging, and not the proton? Give two distinct reasons. (2 steps)", "a": "- Step 1: **Mass reason** \u2014 the electron is ~1840 times lighter than the proton, so it requires far less energy to move. The nucleus (containing protons and neutrons) is heavy and stays essentially fixed in place within the atom's structure.\n- Step 2: **Location reason** \u2014 electrons orbit on the **outside** of the atom, relatively loosely bound (especially outer-shell electrons in metals). Protons are locked **inside the nucleus**, surrounded by strong nuclear forces. You cannot remove a proton without breaking the nucleus apart (a nuclear reaction), whereas removing an outer electron only requires overcoming the weaker electromagnetic binding. This is why Alex emphasised: \"we can't pick up positive charge, we can just lose negative charge.\"", "source": "GLM 5.1"}, {"q": "What are the absolute values of the electron charge $$e$$, the proton mass $$m_p$$, and the electron mass $$m_e$$? Where would you find these in an exam? (2 steps)", "a": "- Step 1: The values from the Edexcel IAL Data Booklet are: $$e = 1.60 \\times 10^{-19}\\text{ C}$$, $$m_p = 1.67 \\times 10^{-27}\\text{ kg}$$, and $$m_e = 9.11 \\times 10^{-31}\\text{ kg}$$. The proton charge is equal in magnitude to the electron charge but positive: $$+1.60 \\times 10^{-19}\\text{ C}$$.\n- Step 2: These are provided in the **Data Booklet** \u2014 you do not need to memorise them. However, for ESAT/GCSE-level static electricity questions, you typically only need the *relative* values ($$+1, -1, 0$$ for charge; $$1, 1, \\approx 0$$ for mass), not the absolute numbers.", "source": "GLM 5.1"}, {"q": "State the law of conservation of charge. Why does this mean you can never \"create\" positive charge on an object? (2 steps)", "a": "- Step 1: **Charge cannot be created or destroyed; charged particles can only be transferred between objects.** The total charge of a closed system is always constant. If one object gains charge, another must lose an equal amount.\n- Step 2: Since only electrons can physically move (they're light and on the outside of atoms), an object becomes positive **only by losing electrons**, never by gaining \"positive charge\" from somewhere. There is no mobile positive particle available to transfer in everyday electrostatics. When you rub a rod and it becomes positive, what actually happened is electrons *left* the rod \u2014 the positive charge was already there (in the protons); it just became the majority because electrons departed.", "source": "GLM 5.1"}, {"q": "What does it mean that charge is **quantised**? Write the formula and explain each symbol. (2 steps)", "a": "- Step 1: Charge is quantised means that charge always comes in **whole-number multiples** of the elementary charge $$e$$. You cannot have a fraction of an electron's charge \u2014 charge is \"lumpy,\" not continuous.\n- Step 2: The formula is $$Q = ne$$, where $$Q$$ is the total charge in coulombs (C), $$n$$ is the number of electrons transferred (a positive integer \u2014 it has no units), and $$e = 1.60 \\times 10^{-19}\\text{ C}$$ is the magnitude of the elementary charge. Rearranged: $$n = Q / e$$, which lets you count how many electrons are responsible for a given charge.", "source": "GLM 5.1"}, {"q": "An object has a charge of roughly $$1\\,\\mu\\text{C}$$. Without doing a full calculation, roughly how many electrons does this represent \u2014 is it closer to thousands, millions, billions, or trillions? Explain the order-of-magnitude reasoning. (2 steps)", "a": "- Step 1: Convert to coulombs: $$1\\,\\mu\\text{C} = 10^{-6}\\text{ C}$$. The charge per electron is $$e \\approx 1.6 \\times 10^{-19}\\text{ C}$$. So $$n = Q/e \\approx 10^{-6} / 10^{-19} = 10^{13}$$.\n- Step 2: $$10^{13}$$ is **ten trillion**. This is an enormous number, which tells you that even a tiny macroscopic charge involves an astronomically large number of electrons. The key insight: everyday static charges involve *vastly* more electrons than you might intuitively guess, but the total charge is small because each electron carries an incredibly tiny charge.", "source": "GLM 5.1"}, {"q": "What is the essential difference between a conductor and an insulator in terms of electron behaviour? Give two examples of each. (2 steps)", "a": "- Step 1: In a **conductor** (e.g. copper, silver, gold, graphite), some electrons are **free to move** throughout the material. They are not tightly bound to individual atoms and can drift, which is why charge flows easily. In an **insulator** (e.g. plastic, polythene, glass, wool, rubber), electrons are **tightly bound** to their atoms and cannot flow freely.\n- Step 2: This difference explains why static charge **builds up on insulators** \u2014 the extra electrons are stuck where they land and cannot redistribute. On a conductor, any charge imbalance would quickly spread out and flow away (or to earth), so static cannot accumulate. As Alex put it: a static charge imbalance \"only happens on insulators.\"", "source": "GLM 5.1"}, {"q": "On the Electrostatic Series Chart, materials near the **top** tend to become positive when rubbed, and materials near the **bottom** tend to become negative. Why? What property of the material determines its position on the chart? (2 steps)", "a": "- Step 1: The chart ranks materials by how **strongly they hold onto electrons**. Materials near the top (acetate, perspex, glass, wool, hair) have a **weak hold** on their electrons \u2014 they tend to *lose* electrons when rubbed, so they become positive. Materials near the bottom (rubber, sulphur, platinum, gold) have a **strong hold** \u2014 they tend to *gain* electrons from whatever rubs against them, so they become negative.\n- Step 2: When you rub any two materials together, the one *lower* on the chart (stronger grip) pulls electrons off the one *higher* on the chart (weaker grip). The gainer becomes negative; the loser becomes positive. The two objects always end up with equal and opposite charges because charge is conserved.", "source": "GLM 5.1"}, {"q": "When two insulators are rubbed together, why do they end up with **equal and opposite** charges? Connect this to conservation of charge. (2 steps)", "a": "- Step 1: Friction transfers electrons from one material to the other. Say material A loses $$n$$ electrons to material B. Material A now has $$n$$ fewer electrons than protons, so its net charge is $$+ne$$. Material B now has $$n$$ extra electrons beyond its proton count, so its net charge is $$-ne$$.\n- Step 2: The charges are equal in magnitude ($$ne$$) and opposite in sign ($$+$$ vs $$-$$). No charge was created or destroyed \u2014 the same $$n$$ electrons simply moved from A to B. This is a direct consequence of the conservation of charge: the total charge before rubbing (zero, since both were neutral) equals the total charge after ($$+ne + (-ne) = 0$$).", "source": "GLM 5.1"}, {"q": "Alex wrote the chain: **friction \u2192 charge \u2192 spark \u2192 current**. Explain each link in this chain using the Family Guy static-shock scenario. (4 steps)", "a": "- Step 1: **Friction** \u2014 Peter rubs his feet on the carpet. The rubbing (friction) between his shoes and the nylon carpet transfers electrons onto Peter.\n- Step 2: **Charge** \u2014 Peter now has an excess of electrons, so he carries a net negative charge. The charge is \"static\" because his body (and the carpet) are insulating enough to hold the imbalance.\n- Step 3: **Spark** \u2014 When Peter's finger gets close to another person, the voltage between them is large enough to cause the air to break down. Electrons jump across the gap \u2014 this visible/audible jump is the spark.\n- Step 4: **Current** \u2014 The spark is a brief, rapid flow of electrons from Peter through the air to the other person. A flow of charge *is* a current, even if it lasts only a fraction of a second. Static charge held still becomes current the moment it moves.", "source": "GLM 5.1"}, {"q": "State the three rules of electrostatic force. Which rule explains why a charged balloon sticks to a neutral wall? (2 steps)", "a": "- Step 1: The three rules are: (1) **Like charges repel** \u2014 two positives or two negatives push apart. (2) **Unlike charges attract** \u2014 a positive and a negative pull together. (3) **A charged object attracts a neutral object** \u2014 by induction (the charged object rearranges electrons in the neutral object, creating an opposite charge on the near side).\n- Step 2: Rule 3 is what explains the balloon on the wall. The balloon is charged (negative), and the wall is neutral. The balloon's negative charge repels the wall's electrons to the far side, leaving the near side of the wall positive. The near-side positive and the balloon's negative attract \u2014 so the balloon sticks.", "source": "GLM 5.1"}, {"q": "Two rods are both negatively charged. Do they attract or repel? A student says \"they attract because negatives like each other.\" How would you correct this? (2 steps)", "a": "- Step 1: They **repel**. The rule is: **like charges repel**. Two negatives carry the same sign of charge, so the electrostatic force between them is repulsive.\n- Step 2: The misconception \"negatives like each other\" has no physical basis. The direction of the force depends only on the *sign* of the net charges, not on any \"preference.\" Same sign = repel (whether both + or both \u2212). Opposite sign = attract. There is no anthropomorphic \"liking\" \u2014 it is a fundamental law of nature that like-sign charges experience a repulsive force.", "source": "GLM 5.1"}, {"q": "When we say \"two objects have the same charge,\" are we talking about the charge of individual protons/electrons, or the net charge of each object? Why does this distinction matter? (2 steps)", "a": "- Step 1: We are talking about the **net (overall) charge** of each object \u2014 the total imbalance of electrons vs. protons. An object with a net charge of $$-3\\,\\mu\\text{C}$$ has that overall imbalance; it still contains billions of protons and billions of electrons, but there are slightly more electrons than protons.\n- Step 2: This distinction matters because the force between two objects depends on their *net* charges, not on the individual particles inside. Two rods that are both \"negative\" (net charge) repel each other, even though each rod contains huge numbers of positive protons. Phuc asked whether \"same charge\" referred to protons \u2014 the answer is no. The electrostatic force rule operates on the macroscopic net charge sign.", "source": "GLM 5.1"}, {"q": "Explain charging by **induction** step by step. Why does no electron transfer occur between the charged object and the neutral object? (3 steps)", "a": "- Step 1: Bring a charged object **near** (but not touching) a neutral object. The charged object's electric field penetrates the neutral object.\n- Step 2: If the charged object is negative, its field **repels** the free electrons in the neutral object, pushing them to the far side. The near side of the neutral object is left with an excess of positive charge (protons now outnumber electrons there). If the charged object is positive, electrons in the neutral object are **attracted** to the near side, making it negative.\n- Step 3: In both cases, the near side of the neutral object ends up with the **opposite** charge to the charged object, so they attract. Crucially, **no electrons cross the gap** \u2014 the electrons only rearrange *within* the neutral object. This is why it's called \"induction\" (inducing a charge separation) rather than \"transfer.\"", "source": "GLM 5.1"}, {"q": "A negatively charged rod is brought near (not touching) small neutral pieces of paper. The paper jumps up to the rod. Explain this using the concept of induced charge. (3 steps)", "a": "- Step 1: The rod is negative. When it approaches the neutral paper, its electric field repels the electrons within each piece of paper, pushing them toward the far side of each scrap.\n- Step 2: The near side of each paper piece is now electron-deficient (net positive), while the far side is electron-rich (net negative). The paper as a whole is still neutral, but the charges have been **redistributed** \u2014 this is the induced charge.\n- Step 3: The near-side positive charge is closer to the rod than the far-side negative charge. Since the electrostatic force is stronger at shorter distances, the attractive force (near + to rod \u2212) outweighs the repulsive force (far \u2212 to rod \u2212). The net result: the paper is attracted and jumps up to the rod.", "source": "GLM 5.1"}, {"q": "What does \"earthing\" an object mean physically, and why is the Earth described as an \"infinite reservoir of charge\"? (2 steps)", "a": "- Step 1: **Earthing** means connecting the object to the ground using a conductor (like a wire). This gives any excess charge a path to flow to or from the Earth.\n- Step 2: The Earth is so enormous that adding or removing a few billion electrons makes no measurable difference to its overall charge. It acts as an effectively **infinite source and sink** of electrons. This means: a negatively charged earthed object can dump all its excess electrons into the Earth; a positively charged earthed object can pull all the electrons it needs from the Earth. In both cases, the object ends up **neutral**. As Alex said: \"What's the biggest source of spare electrons in the world? The world.\"", "source": "GLM 5.1"}, {"q": "What happens when you earth a positively charged object, versus a negatively charged one? Why do both end up neutral? (2 steps)", "a": "- Step 1: A **positively charged** object has a deficit of electrons (fewer electrons than protons). When earthed, electrons flow **from the Earth into the object**, filling the deficit until the number of electrons equals the number of protons \u2014 the object becomes neutral.\n- Step 2: A **negatively charged** object has an excess of electrons. When earthed, the surplus electrons flow **from the object into the Earth**, because charge \"wants to be balanced\" and the Earth provides an infinite sink. Once the excess is gone, the object is neutral. In both cases the driving principle is the same: charge flows through the conducting path until the object's net charge is zero.", "source": "GLM 5.1"}, {"q": "What would happen if you earthed an object that was already neutral? (2 steps)", "a": "- Step 1: **Nothing happens.** A neutral object already has equal numbers of protons and electrons \u2014 there is no charge imbalance driving any flow.\n- Step 2: Earthing provides a *path* for charge to flow, but charge only flows if there is a *driving force* (a potential difference). A neutral object is at the same potential as the Earth, so no current flows. The connection is harmless \u2014 it simply ensures the object stays neutral even if conditions change later.", "source": "GLM 5.1"}, {"q": "Write the formula linking current, charge, and time. Define each symbol with its SI unit. (2 steps)", "a": "- Step 1: $$I = \\frac{\\Delta Q}{\\Delta t}$$, where $$I$$ is the electric current in amperes (A), $$\\Delta Q$$ is the charge that flows past a point in coulombs (C), and $$\\Delta t$$ is the time in seconds (s).\n- Step 2: Rearranged forms: $$\\Delta Q = I \\Delta t$$ and $$\\Delta t = \\Delta Q / I$$. The definition tells us that **current is the rate of flow of charge**. One ampere equals one coulomb per second: $$1\\,\\text{A} = 1\\,\\text{C}\\,\\text{s}^{-1}$$. Always convert to A, C, and s before substituting.", "source": "GLM 5.1"}, {"q": "How is the static charge on an insulator related to the electric current in a circuit? What is the same, and what is different? (3 steps)", "a": "- Step 1: **What is the same** \u2014 both involve an imbalance of electrons vs. protons. A negatively charged insulator has excess electrons; the negative terminal of a battery also has excess electrons. The underlying physics (charge imbalance) is identical.\n- Step 2: **What is different** \u2014 on the insulator, the charge is **trapped** (electrons cannot move through the material), so the charge sits still = \"static.\" In a circuit, a **conductor** connects the terminals, giving the electrons a path to flow continuously from the negative terminal, through the circuit, to the positive terminal = \"current.\"\n- Step 3: The transition from static to current happens the moment you provide a conducting path. This is exactly the \"spark\" in the friction \u2192 charge \u2192 spark \u2192 current chain: the static charge finally gets a path (even through air, briefly), and the resulting flow of electrons is a current.", "source": "GLM 5.1"}, {"q": "Inside a battery (cell), how does the EMF create the charge imbalance that drives a current? Relate this to static electricity. (2 steps)", "a": "- Step 1: The EMF (electromotive force) is the energy supplied per unit charge. Inside the cell, chemical reactions do work to push electrons toward one terminal, making it **negative** (excess electrons), and pull electrons away from the other terminal, making it **positive** (deficit of electrons).\n- Step 2: This is the **same mechanism** as static electricity \u2014 a charge imbalance. The difference is that the battery *continuously* maintains the imbalance (the chemical reactions keep pushing), whereas static charge on an insulator is a one-time transfer. When you connect a wire between the terminals, electrons flow from the negative terminal to the positive terminal \u2014 this continuous flow is the circuit current. Note: conventional current is drawn from + to \u2212, while electrons physically drift from \u2212 to +.", "source": "GLM 5.1"}, {"q": "Derive the formula for the number of electrons flowing in a current $$I$$ over time $$\\Delta t$$. Start from $$I = \\Delta Q / \\Delta t$$ and $$Q = ne$$. (3 steps)", "a": "- Step 1: From the current definition, the total charge that flows is $$\\Delta Q = I \\Delta t$$.\n- Step 2: From charge quantisation, the total charge carried by $$n$$ electrons is $$\\Delta Q = ne$$, where $$e = 1.60 \\times 10^{-19}\\text{ C}$$.\n- Step 3: Setting these equal: $$ne = I\\Delta t$$, so $$n = \\frac{I\\Delta t}{e}$$. This formula lets you count how many electrons pass a point in a given time. For example, a current of 1 A for 1 s carries $$n = 1/(1.6 \\times 10^{-19}) \\approx 6.25 \\times 10^{18}$$ electrons \u2014 an enormous number, consistent with each electron carrying a tiny charge.", "source": "GLM 5.1"}, {"q": "A current of 0.5 A flows for 2 minutes. What charge flows, and roughly how many electrons is that? Walk through the unit conversions and order-of-magnitude reasoning. (3 steps)", "a": "- Step 1: Convert time to seconds: $$\\Delta t = 2\\text{ min} = 2 \\times 60 = 120\\text{ s}$$. Then $$\\Delta Q = I\\Delta t = 0.5 \\times 120 = 60\\text{ C}$$.\n- Step 2: Use $$n = \\Delta Q / e = 60 / (1.6 \\times 10^{-19})$$. To estimate: $$60 / 1.6 \\approx 37.5$$, so $$n \\approx 37.5 \\times 10^{19} = 3.75 \\times 10^{20}$$ electrons.\n- Step 3: The takeaway: even a modest current (0.5 A) for a short time moves an astronomically large number of electrons ($$\\sim 10^{20}$$). This reinforces that each electron's charge is incredibly small, and macroscopic currents involve vast numbers of charge carriers.", "source": "GLM 5.1"}, {"q": "In the gold-leaf electroscope, why is **gold** specifically used for the leaf, and what is the instrument's purpose? (2 steps)", "a": "- Step 1: Gold is used because it can be beaten into **extremely thin sheets** (gold leaf). This makes the leaf incredibly light, so even a tiny electrostatic force is enough to move it. If the leaf were heavier, small charges wouldn't visibly deflect it.\n- Step 2:
