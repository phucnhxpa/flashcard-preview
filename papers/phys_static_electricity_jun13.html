$Q$$: rearrange to $$n = Q / e$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "An object has a total charge of $$Q$$. Write the formula for the number of electrons responsible for that charge. If an object gained a charge of $$-4.8 \\times 10^{-19}\\text{ C}$$, how many extra electrons does it have? (2 steps)", "answer": "- Step 1: The number of electrons is $$n = Q / e$$. Here $$Q$$ is the magnitude of the charge and $$e = 1.60 \\times 10^{-19}\\text{ C}$$. (The sign of $$Q$$ tells you whether electrons were gained or lost, but $$n$$ is always a positive integer.)\n- Step 2: $$n = \\frac{4.8 \\times 10^{-19}}{1.60 \\times 10^{-19}} = 3$$. The object has gained 3 extra electrons. Since the charge is negative, this confirms electrons were added (not removed).\n\nThis is a simple sanity check: if $$n$$ comes out as a non-integer, something is wrong — charge is quantised, so $$n$$ must always be a whole number.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "What is the key difference between a conductor and an insulator in terms of electron mobility? Why does static charge build up on insulators but not on conductors? (2 steps)", "answer": "- Step 1: In a conductor (metals like copper, graphite, gold), some electrons are free to move throughout the material — they are not tightly bound to any one atom. In an insulator (plastic, glass, rubber, wool), electrons are tightly bound to their atoms and cannot flow freely.\n- Step 2: When extra charge is placed on a conductor, the free electrons immediately redistribute themselves and, if a path to earth exists, the charge flows away — so no static build-up. On an insulator, the extra electrons are stuck where they were deposited because they cannot move through the material. This is why static charge \"only happens on insulators\" — the charge has nowhere to go.\n\nThis is also why you can charge a metal object by induction *only if* you earth it at the right moment — otherwise the charge just flows away as soon as you remove the inducing object.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "On an electrostatic series chart, materials near the top tend to lose electrons (become positive) and materials near the bottom tend to gain electrons (become negative). When you rub two insulators together, which one becomes negative and why? (2 steps)", "answer": "- Step 1: When two materials are rubbed, friction provides energy for electron transfer. The material that has the *stronger hold* on electrons (lower on the electrostatic series) pulls electrons away from the other material.\n- Step 2: The material lower on the chart *gains* electrons and becomes negative; the material higher on the chart *loses* electrons and becomes positive. For example, if you rub perspex (near the top, weak hold) with a cloth lower on the series, electrons move from the perspex to the cloth — perspex becomes positive, cloth becomes negative.\n\nAlex corrected himself live on this: the upper materials are insulators with weak electron hold (become +), and the lower group includes good conductors with strong hold (become −). Don't guess — check the chart.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Describe the mechanism of charging by friction. What happens to the two objects involved, and why must they both be insulators for this to produce lasting static charge? (3 steps)", "answer": "- Step 1: When two insulators are rubbed together, friction transfers electrons from one material to the other. The material that gains electrons becomes negatively charged; the material that loses electrons becomes positively charged.\n- Step 2: The two objects end up with equal and opposite charge (conservation of charge). For example, rubbing a polythene rod with a cloth: polythene has a stronger hold on electrons, so electrons move from cloth to rod — rod becomes negative, cloth becomes positive.\n- Step 3: Both materials must be insulators for the charge to *remain* where it was transferred. If either were a conductor, the transferred electrons would immediately flow away (through the material or to earth), and no lasting static charge would build up.\n\nThe chain Alex wrote: friction → charge → spark → current. Rubbing creates the imbalance; when that imbalance finally discharges, you get a spark (a brief current).", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "State the three rules of electrostatic force. Which rule explains why a charged balloon sticks to a neutral wall? (2 steps)", "answer": "- Step 1: The three rules are: (1) Like charges repel — two positives or two negatives push apart. (2) Unlike charges attract — a positive and a negative pull together. (3) A charged object attracts a neutral object — this works by induction (the charged object rearranges electrons in the neutral object, creating an opposite charge on the near side).\n- Step 2: The balloon-on-wall scenario is rule 3. The charged balloon is negative; it repels electrons in the neutral wall to the far side, leaving the near side of the wall positive. The near side (positive) and the balloon (negative) are unlike charges, so they attract. The wall as a whole is still neutral, but the local charge separation creates the attraction.\n\nRule 3 is the one students most often forget — a charged object can attract something with *no net charge*.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Two objects both carry a negative charge. Do they attract or repel? A student says \"they attract because they're both the same.\" What is the error in their reasoning? (2 steps)", "answer": "- Step 1: Two negative charges *repel*. The rule is: like charges (same sign) repel, unlike charges (opposite sign) attract. \"Same\" means same sign, and same sign means repulsion — not attraction.\n- Step 2: The student's error is confusing \"same\" with \"compatible\" or \"wanting to come together.\" In electrostatics, same-sign charges push each other away. It doesn't matter whether both are positive or both are negative — the sign is the same, so they repel. This was the single most repeated correction in the lesson.\n\nBolt this down: same sign ⇒ repel. Opposite sign ⇒ attract. No exceptions.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "A student says \"the two rods attract because they're both positive, so they have the same kind of charge.\" Identify and correct the misconception. (2 steps)", "answer": "- Step 1: The student has the force rule backwards. Same-sign charges *repel*, not attract. Two positive rods will push each other apart.\n- Step 2: The likely source of the confusion: the student may be thinking of \"same charges want to combine\" or mixing up attraction/repulsion. The correct reasoning is: both rods are positive → same sign → like charges repel → the rods push apart. If you want them to attract, you need opposite signs (one positive, one negative).\n\nThis error appeared multiple times in the lesson. The fix: once you know both signs, apply the rule immediately — same → repel, opposite → attract.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "When we say an object is \"positive\" or \"negative,\" are we talking about individual particle charges or the overall (net) charge of the object? Explain with an example. (2 steps)", "answer": "- Step 1: We are talking about the *overall (net) charge* of the object — the imbalance between its total number of protons and electrons. Every object contains huge numbers of both protons (positive) and electrons (negative). When we say an object is \"positive,\" we mean it has *fewer electrons than protons*, so the net charge is positive.\n- Step 2: For example, a perspex rod that has become \"positive\" by friction still contains billions of protons and billions of electrons. It is called positive only because it lost *some* electrons, creating a slight deficit. The force between two objects depends on these net charges, not on the individual particle charges inside.\n\nPhuc asked whether \"same charge\" referred to protons — the answer is no. It refers to the net charge sign of each object.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Explain charging by induction: a negatively charged rod is brought near (but NOT touching) a neutral metal sphere. Describe what happens to the electrons in the sphere and why the sphere is then attracted to the rod. (3 steps)", "answer": "- Step 1: The negative rod creates an electric field that reaches the neutral sphere. Because the sphere is a conductor, its free electrons can move in response to this field.\n- Step 2: The rod's negative charge *repels* the sphere's free electrons to the far side of the sphere. This leaves the near side of the sphere with a deficit of electrons (net positive) and the far side with a surplus (net negative). The sphere is still neutral overall, but charge has been *redistributed* — this is induced charge separation.\n- Step 3: The near side of the sphere (positive) is closer to the rod (negative) than the far side (negative) is. Since the attractive force between the near-side positive and the rod is stronger than the repulsive force from the far-side negative (which is farther away), there is a net attraction. This is why a charged object attracts a neutral one.\n\nNo electrons were transferred — only rearranged. That is the defining feature of induction.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "In the PhET simulation, a negatively charged balloon sticks to a neutral wall. A student predicts \"nothing happens because the wall is neutral.\" Why is this prediction wrong? (2 steps)", "answer": "- Step 1: The student assumes that because the wall has zero *net* charge, there can be no electrostatic interaction. But the wall is made of materials with mobile charges (or polarizable molecules). The balloon's negative charge pushes the wall's electrons away from the surface, leaving the near surface positive.\n- Step 2: The induced positive charge on the near surface attracts the negative balloon. The wall is still neutral overall (the electrons didn't leave the wall — they just moved to the far side), but the local charge separation creates a net attractive force. This is the \"charged attracts neutral\" rule in action.\n\nThe key insight: neutral does not mean \"no response to charge.\" It means no *net* charge — but the charge can be redistributed locally.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "What does \"earthing\" an object mean? Why does earthing always return a charged object to neutral, regardless of whether it was positive or negative? (3 steps)", "answer": "- Step 1: Earthing means connecting the object to the ground (Earth) using a conductor. The Earth acts as an effectively infinite reservoir of charge — it can supply or absorb electrons without any measurable change in its own charge.\n- Step 2: If the object is negatively charged (excess electrons), those electrons flow through the conductor down to the Earth. The object loses its surplus and becomes neutral.\n+ If the object is positively charged (electron deficit), electrons flow *from* the Earth *up into* the object, filling the deficit. The object gains electrons and becomes neutral.\n- Step 3: In both cases, charge flows until the object is neutral — because charge \"always wants to be balanced, so it will flow if it can.\" Earthing simply provides the path for that flow. Without earthing (if the object is insulated), the charge has nowhere to go and static builds up.\n\nAlex's memorable line: \"What's the biggest source of spare electrons in the world? The world.\"", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "A positively charged electroscope is earthed. Describe the direction of electron flow and the result. (2 steps)", "answer": "- Step 1: The electroscope is positive, meaning it has a deficit of electrons. When earthed, electrons flow *from the Earth* through the conductor *into* the electroscope, because the Earth can supply electrons to fill the deficit.\n- Step 2: Electrons continue to flow in until the electroscope's charge is neutral (electrons gained = deficit). The gold leaf, which was raised due to repulsion between like positive charges, falls as the charge decreases toward zero.\n\nThe direction of electron flow is always *toward* the positive object from Earth, and *away from* the negative object toward Earth.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Write the formula linking current, charge, and time. State the SI unit of current and express it in terms of coulombs and seconds. (2 steps)", "answer": "- Step 1: $$I = \\frac{\\Delta Q}{\\Delta t}$$, where $$I$$ is current (amperes, A), $$\\Delta Q$$ is the charge that flows past a point (coulombs, C), and $$\\Delta t$$ is the time taken (seconds, s).\n- Step 2: One ampere is defined as one coulomb per second: $$1\\text{ A} = 1\\text{ C s}^{-1}$$. Equivalently, rearranging: $$\\Delta Q = I \\Delta t$$. Always convert to A, C, and s before substituting (e.g., convert mA to A, minutes to seconds, μC to C).\n\nThis is IAL specification statement 64. It connects the static-charge world (coulombs) to the circuit world (amperes).", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A current of 2 A flows for 30 seconds. What total charge flows past a point? Show the substitution. (2 steps)", "answer": "- Step 1: Use $$\\Delta Q = I \\Delta t$$. Here $$I = 2\\text{ A}$$ and $$\\Delta t = 30\\text{ s}$$.\n- Step 2: $$\\Delta Q = 2 \\times 30 = 60\\text{ C}$$. Sixty coulombs of charge flow past the point in 30 seconds.\n\nThis is a straightforward substitution — the key exam skill is making sure units are consistent (A, s, C) before multiplying.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Combine the quantisation formula $$Q = ne$$ with the current formula $$I = \\Delta Q / \\Delta t$$ to derive an expression for the number of electrons flowing in time $$\\Delta t$$. (3 steps)", "answer": "- Step 1: From the current formula, the total charge that flows is $$\\Delta Q = I \\Delta t$$.\n- Step 2: From quantisation, the number of electrons responsible for a charge $$Q$$ is $$n = Q / e$$. Substitute $$\\Delta Q$$ for $$Q$$: $$n = \\Delta Q / e$$.\n- Step 3: Combining: $$n = \\frac{I \\Delta t}{e}$$. This tells you how many electrons pass a point in time $$\\Delta t$$ when a current $$I$$ flows. For example, a current of 1 A for 1 s moves $$n = \\frac{1 \\times 1}{1.6 \\times 10^{-19}} \\approx 6.25 \\times 10^{18}$$ electrons — an enormous number, which is why current appears continuous even though charge is quantised.\n\nThis formula bridges the atomic picture (individual electrons) and the macroscopic picture (measurable current).", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "How is the charge imbalance in static electricity related to the charge imbalance that drives current in a circuit? What is the key difference? (2 steps)", "answer": "- Step 1: Both involve the same physical phenomenon — an imbalance of electrons vs protons. In static electricity, one object has excess electrons and another has a deficit. In a circuit, the battery's EMF pushes electrons so one terminal is negative (excess electrons) and the other is positive (deficit) — the same kind of charge imbalance.\n- Step 2: The key difference is what happens next. In static electricity, the charge sits on an insulator and cannot flow — it is *static*. In a circuit, a conductor connects the two terminals, so the electrons flow continuously as a current. Static = charge held still on an insulator; current = the same charge free to flow through a conductor.\n\nAlex's link: a battery creates the same charge imbalance as rubbing a balloon — but the conductor allows continuous flow instead of a one-off spark.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "In a circuit, electrons physically drift from the negative terminal to the positive terminal. In what direction does conventional current flow, and why is there a difference? (2 steps)", "answer": "- Step 1: Conventional current flows from the positive terminal to the negative terminal — the opposite direction to electron flow. This convention was established before the electron was discovered; early scientists arbitrarily defined current as flowing from + to −.\n- Step 2: When it was later discovered that the actual charge carriers (electrons) move from − to +, the convention was already too deeply embedded in physics and engineering to change. So we keep both: electron flow is − to +, conventional current is + to −. For circuit analysis, conventional current is used; for explaining charging mechanisms, electron movement is used.\n\nThis is why the EDPL question specifically says \"use the idea of charge movement\" — it wants you to describe electrons moving, not conventional current.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "A gold-leaf electroscope is charged by *contact* with a negatively charged rod. Explain step-by-step why the gold leaf rises. Identify the force responsible. (3 steps)", "answer": "- Step 1: When the negative rod touches the metal plate, electrons flow from the rod into the metal (plate + rod + leaf). This happens because metal is a conductor — electrons can move freely through it. The rod, plate, and leaf all become part of one conducting system, and the excess electrons spread throughout.\n- Step 2: The metal plate and the gold leaf both become negatively charged — they have the same sign of charge.\n- Step 3: Like charges repel. The gold leaf and the metal rod now carry the same (negative) charge, so they repel each other. The leaf is pushed away from the rod and rises. The force is electrostatic repulsion between like charges.\n\nThe classic error: saying \"the neutral leaf is attracted to the negative rod.\" By contact, the leaf does NOT stay neutral — it gains the same charge as the rod. The leaf rises by repulsion, not attraction.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A student charges an electroscope by contact with a negative rod and says \"the leaf rises because the neutral leaf is attracted to the negative rod.\" What is wrong with this explanation? (2 steps)", "answer": "- Step 1: The leaf is NOT neutral after contact. When the negative rod touches the metal, electrons flow into the entire metal system (plate, rod, leaf). The leaf becomes negatively charged — the same sign as the rod inside the electroscope.\n- Step 2: Since both the leaf and the rod are now negative (same charge), they repel — the leaf rises by repulsion, not attraction. Attraction of a neutral object is the *induction* story (bringing a charged object near without touching). By *contact*, charge is shared, so the leaf takes the same sign as the charging rod.\n\nThis was Phuc's error twice in the lesson. The fix: contact → charge shared → same sign → repulsion. Induction → no contact → neutral attracted.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "An electroscope is already positively charged (leaf raised). A negatively charged rod is brought near (not touching) the top plate. What happens to the leaf and why? (3 steps)", "answer": "- Step 1: The electroscope is positive, meaning it has a deficit of electrons. The leaf is raised because both the rod and leaf are positive (like charges repel).\n- Step 2: When the negative rod is brought near the top plate, it attracts electrons. Free electrons in the metal are pulled up toward the top plate (or, if the rod is close enough, electrons may flow from the rod onto the plate). Either way, the net positive charge on the rod-and-leaf system decreases.\n- Step 3: As the charge on the rod and leaf decreases toward zero, the repulsive force between them weakens, and the leaf falls. If enough electrons arrive to exactly cancel the positive charge, the electroscope becomes neutral and the leaf hangs straight down. If more electrons arrive than needed, it overshoots to negative and the leaf rises again (same-sign repulsion, now both negative).\n\nPhuc's two scenarios (which Alex called \"perfect\"): if electrons gained = deficit → neutral (leaf flat); if electrons gained > deficit → negative (leaf rises again).", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "An electroscope is positively charged. You want to return it to exactly neutral. Why is earthing more reliable than trying to add exactly the right number of electrons with a rod? (2 steps)", "answer": "- Step 1: If you use a negatively charged rod, it is difficult to control exactly how many electrons transfer. You might add too few (still slightly positive) or too many (overshoot to negative). The leaf would fall and then potentially rise again.\n- Step 2: Earthing connects the electroscope to the Earth, an effectively infinite charge reservoir. Electrons flow from Earth into the electroscope until it is exactly neutral, then stop — because once neutral, there is no longer any driving force for electron flow. The system self-regulates to exactly zero charge.\n\nThis is why earthing is the reliable, standard way to fully discharge any object.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "A plastic rod is rubbed with a cloth and then held near small pieces of neutral paper. The paper jumps up to the rod. Explain why, identifying the charging method for the rod and the attraction mechanism for the paper. (3 steps)", "answer": "- Step 1: The rod is charged by *friction*. Rubbing transfers electrons from the cloth to the plastic rod (polythene holds electrons strongly), so the rod becomes negatively charged and the cloth becomes positively charged.\n- Step 2: When the charged rod is brought near the neutral paper, it induces charge separation in the paper by *induction*. The rod's negative charge repels the paper's electrons to the far side of each piece, leaving the near side positive.\n- Step 3: The near side of the paper (positive) is oppositely charged to the rod (negative), so there is an attractive force. The paper is pulled toward the rod and jumps up. This is the \"charged object attracts a neutral object\" rule.\n\nTwo distinct mechanisms at work: friction charges the rod, then induction causes the attraction to the paper.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "Two rods are each rubbed with a cloth and both become positive. They are brought close together. What happens and what rule applies? How could you make them attract instead? (2 steps)", "answer": "- Step 1: Both rods are positive (same charge). Like charges repel, so the rods push apart. The hanging rod swings away. The rule: like (same-sign) charges repel.\n- Step 2: To make them attract, you need opposite charges. Leave one rod positive and charge the other negative — for example, by rubbing it with a different material that causes electrons to move *onto* that rod instead of off it. Unlike charges attract.\n\nThe key exam skill: once you know both signs, state the force first (same → repel / opposite → attract), then explain the cause if marks are available. Don't re-derive the charging.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "Walking across a nylon carpet makes you negatively charged. You then touch a metal door handle and feel a shock. Explain the full chain of events, identifying the charging method and the discharge mechanism. (3 steps)", "answer": "- Step 1: *Charging by friction.* Walking rubs your shoes/body against the nylon carpet (an insulator). Electrons transfer from the carpet onto you, so you accumulate excess electrons and become negatively charged. The carpet becomes positive.\n- Step 2: *Charge remains on you.* Your body and shoes are insulating enough that the excess electrons cannot easily flow away — static charge builds up on you.\n- Step 3: *Discharge through earthing.* The metal door handle is a conductor connected (through the building) to earth. When you touch it, your surplus electrons suddenly have a conducting path to Earth. They flow rapidly from you, through the handle, to Earth. This rapid flow of charge is a brief current — felt as a shock (a spark).\n\nThis is the friction → charge → spark → current chain in real life.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "In the EDPL (electrostatic dust-print lifter), a control unit applies 10 kV between a metal plate and a lifting sheet. Using the idea of charge movement, explain how the lifting sheet becomes negative and the metal plate becomes positive. (2 steps)", "answer": "- Step 1: The high voltage from the control unit drives electrons from the metal plate, through the control unit, to the lifting sheet. Electrons are physically transferred from one object to the other.\n- Step 2: The lifting sheet gains electrons, so it becomes negatively charged. The metal plate loses those same electrons, so it becomes positively charged. Both objects end up with an imbalance of charge — equal and opposite.\n\nExam technique: the question says \"use the idea of charge movement,\" so you must describe electrons moving and state the direction (plate → sheet). Just saying \"the sheet is negative and the plate is positive\" would not earn full marks — you need to explain *how* they got that way.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "In the EDPL, why are dust particles attracted onto the charged lifting sheet? State the rule and the mechanism. (2 steps)", "answer": "- Step 1: The lifting sheet is charged (negative). The dust particles are neutral (uncharged). The rule: a charged object attracts a neutral object.\n- Step 2: The mechanism is induction. The charged sheet's electric field induces charge separation in each dust particle — electrons in the dust are repelled to the far side, leaving the near side positive. The near side (opposite charge to the sheet) is attracted, so the dust is pulled onto the sheet.\n\nThis is the same mechanism as the plastic rod attracting pieces of paper — the exam answer is \"a charged object attracts neutral (uncharged) objects.\"", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "Why is it dangerous to wear a nylon jacket at a petrol station, but safe to wear a waxed jacket that is earthed? A student says \"wax is safe because it's waterproof.\" What is wrong with this? (3 steps)", "answer": "- Step 1: Nylon is an *insulator*. When you move in a nylon jacket, friction between the fabric layers generates static charge, and because nylon is insulating, the charge cannot flow away — it builds up. If this charge discharges as a spark near petrol vapour, it can cause a fire or explosion.\n- Step 2: A waxed jacket that conducts and is earthed allows any charge that builds up to flow immediately to Earth. No charge accumulates, so no spark can form — this makes it safe.\n- Step 3: The student's error is giving a *water-related* reason (\"waterproof\") instead of an *electrical* reason. The danger is electrostatic (insulator → charge build-up → spark → ignition). The safety is also electrical (conductor/earthed → charge drains away → no spark → no ignition). Waterproofing is irrelevant.\n\nThe rule of thumb: insulator → builds charge → danger; conductor/earthed → no build-up → safe.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "Explain how lightning forms, identifying the charging mechanism and the discharge mechanism. (3 steps)", "answer": "- Step 1: *Charging by friction.* Inside a storm cloud, ice crystals and water droplets collide and rub against each other. This friction transfers charge — typically, the smaller ice crystals become positive and rise, while larger particles become negative and sink. The cloud base becomes negatively charged.\n- Step 2: *Induction on the ground.* The negative cloud base induce a positive charge on the ground below (electrons in the ground are repelled away from the surface, leaving the surface positive).\n- Step 3: *Discharge.* Air is normally a good insulator, but when the voltage (potential difference) between cloud and ground becomes high enough, the air *breaks down* — it ionises and becomes conducting. A massive spark (lightning) flows between the cloud and the ground, neutralising the charge separation.\n\nLightning is the same friction → charge → spark → current chain, but on an atmospheric scale.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "Explain how electrostatic paint spraying works. Why does it give a more even coat with less waste? (3 steps)", "answer": "- Step 1: At the spray nozzle, the paint droplets are charged positive — electrons are removed from the paint as it is sprayed.\n- Step 2: The car body is charged negative (opposite charge). Unlike charges attract, so the positively charged paint droplets are pulled toward the negatively charged car body.\n- Step 3: Because the attraction is electrostatic, the paint droplets are drawn toward the car even around curves and into hidden/recessed areas that a simple spray might miss. Also, since all the paint droplets carry the same (positive) charge, they repel each other and spread out evenly, reducing clumping. Less paint misses the car, so there is less waste.\n\nThe key physics: unlike charges attract (paint to car) and like charges repel (paint droplets spread evenly).", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "How does a smoke precipitator in a chimney work? Name the electrostatic principle involved. (2 steps)", "answer": "- Step 1: Charged plates or wires inside the chimney create a strong electric field. As smoke particles pass through, they pick up charge (typically by induction or by contact with the charged wires) and become charged.\n- Step 2: The charged smoke particles are then attracted to oppositely charged collection plates by the \"unlike charges attract\" rule. The particles stick to the plates and are removed from the gas stream, so the exhaust leaving the chimney is much cleaner.\n\nThe principle is the same as the EDPL attracting dust: charged plates attract neutral/charged particles out of the gas.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "A perspex rod is rubbed with a cloth and becomes positive. (a) Which way did the electrons move? (b) What charge does the cloth now carry? Explain using conservation of charge. (2 steps)", "answer": "- Step 1: (a) The rod became positive, meaning it *lost* electrons. Therefore electrons moved *from the rod to the cloth*. Perspex is near the top of the electrostatic series (weak hold on electrons), so it loses electrons to the cloth.\n- Step 2: (b) The cloth *gained* those electrons, so the cloth is now negative. By conservation of charge, the two objects must have equal and opposite charges — if the rod is $$+Q$$, the cloth is $$-Q$$. No charge was created or destroyed; the same electrons that left the rod arrived on the cloth.\n\nAlways describe charging as electron transfer: state which way the electrons moved, then deduce the signs.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "A current of 0.5 A flows for 2 minutes. (a) What charge flows? (b) Roughly how many electrons is that — is it closer to $$10^{10}$$, $$10^{20}$$, or $$10^{30}$$? (3 steps)", "answer": "- Step 1: Convert time to seconds: $$\\Delta t = 2 \\times 60 = 120\\text{ s}$$. Use $$\\Delta Q = I \\Delta t = 0.5 \\times 120 = 60\\text{ C}$$.\n- Step 2: Use $$n = \\Delta Q / e = 60 / (1.6 \\times 10^{-19})$$. To estimate: $$60 / 1.6 \\approx 37.5$$, so $$n \\approx 37.5 \\times 10^{19} \\approx 3.75 \\times 10^{20}$$.\n- Step 3: The answer is closest to $$10^{20}$$. This is an astronomically large number — even a modest current moves a staggering number of electrons per second, which is why current appears continuous despite charge being quantised.\n\nFor spaced repetition, the key takeaway is the *order of magnitude*: everyday currents involve $$\\sim 10^{18}\\text{–}10^{20}$$ electrons per second.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "Why can you NOT charge a pure copper rod by rubbing it with a cloth, even though friction is occurring? (2 steps)", "answer": "- Step 1: Friction does transfer electrons between the cloth and the copper surface. However, copper is a conductor — it has free electrons that can move throughout the material.\n- Step 2: Any charge that builds up on the copper immediately redistributes itself. If the copper is held in an insulating handle, some local charge may remain briefly, but if the copper is in contact with your hand or any earthed surface, the charge flows away instantly. You cannot produce a *lasting* static charge on a conductor by friction alone — the charge drains away too fast.\n\nThis is why all the friction-charging examples in this topic use insulators (plastic rods, balloons, carpets): only insulators trap the charge in place.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "A neutral metal sphere on an insulating stand is touched by a negatively charged rod. The rod is then removed. Is the sphere now positive, negative, or neutral? Explain. (2 steps)", "answer": "- Step 1: By contact, electrons flow from the negatively charged rod into the metal sphere. The sphere is a conductor, so the excess electrons spread across its surface. The sphere becomes negatively charged.\n- Step 2: When the rod is removed, the sphere retains its negative charge because it is on an insulating stand — the electrons have no path to flow away. The sphere is now negatively charged (same sign as the rod that touched it).\n\nContact always results in the two objects sharing charge and ending up with the same sign (if they are identical conductors, they share equally). The leaf electroscope works on this principle.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "A neutral metal sphere on an insulating stand has a negatively charged rod brought near it (not touching). While the rod is nearby, the sphere is earthed momentarily. The rod is then removed. What is the final charge on the sphere and why? (3 steps)", "answer": "- Step 1: The negative rod repels the sphere's free electrons to the far side. The near side becomes positive, the far side negative (induced charge separation).\n- Step 2: While the rod is still nearby, earthing provides a path for the repelled electrons on the far side to flow to Earth. Electrons leave the sphere and go to Earth. The sphere now has a net positive charge (it lost electrons, and the rod is still holding the remaining electrons on the far side).\n- Step 3: When the rod is removed, there is no longer a force holding the remaining electrons in place. But the electrons that flowed to Earth are gone. The sphere is left with a net positive charge — it has been charged by *induction* (without the rod ever touching it).\n\nThis is charging by induction: the sign of the sphere's final charge is *opposite* to the sign of the inducing rod. A negative rod induces a positive charge on the sphere.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "Compare the final charge on an object when charged by *contact* vs. by *induction* using a negatively charged rod. Is the sign the same or opposite in each case? (2 steps)", "answer": "- Step 1: By *contact*: electrons flow from the negative rod into the object. The object gains electrons and becomes *negative* — the *same* sign as the rod.\n- Step 2: By *induction*: the negative rod repels electrons out of the object (to Earth or to the far side, then earthed away). The object *loses* electrons and becomes *positive* — the *opposite* sign to the rod.\n\nThis is a crucial distinction: contact → same sign; induction → opposite sign. Mixing these up is a common exam error.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "An object has a charge of $$+8.0 \\times 10^{-19}\\text{ C}$$. Is this a physically possible charge? Justify your answer using quantisation. (2 steps)", "answer": "- Step 1: Check whether $$Q / e$$ is an integer. $$n = \\frac{8.0 \\times 10^{-19}}{1.60 \\times 10^{-19}} = 5$$. This is a whole number.\n- Step 2: Since $$n = 5$$ is an integer, this charge is physically possible — it corresponds to the loss of exactly 5 electrons. If the calculation had given a non-integer (e.g., $$n = 4.7$$), the charge would be impossible because you cannot transfer a fraction of an electron.\n\nQuantisation is a useful sanity check: if $$n$$ isn't a whole number, the scenario is physically impossible.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "What is the purpose of a gold-leaf electroscope? Why is gold specifically used for the leaf? (2 steps)", "answer": "- Step 1: The purpose of a gold-leaf electroscope is to *detect electric charge*. When charge is present on the metal system (plate + rod + leaf), the leaf deflects, and the angle of deflection gives an indication of the amount of charge.\n- Step 2: Gold is used because it can be beaten into extremely thin sheets (gold leaf). This makes the leaf very light, so even a small electrostatic repulsive force is enough to lift it. A heavier material would not respond to small charges.\n\nThe entire metal part (plate, rod, leaf) must be insulated from the case so that charge doesn't leak away.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "A student says \"charge is created when you rub a balloon on your hair — the balloon becomes negative because new negative charge appears on it.\" Identify and correct the error. (2 steps)", "answer": "- Step 1: The error is the word \"created.\" Charge cannot be created or destroyed — it is conserved. Rubbing transfers existing electrons from the hair to the balloon; no new charge is produced.\n- Step 2: The correct statement: electrons move from the hair onto the balloon. The balloon gains electrons (becomes negative) and the hair loses the same electrons (becomes positive). The total charge of the balloon + hair system is still zero, just as it was before rubbing — the charge has been redistributed, not created.\n\nThis is the most fundamental principle of the topic: charge conservation. Every exam answer about charging should describe electron *transfer*, not charge *creation*.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "A battery has one terminal negative and one terminal positive. How does this relate to the static electricity concepts you've learned? (2 steps)", "answer": "- Step 1: Inside the battery, the EMF (electromotive force) does work to push electrons toward one terminal, making it negative (excess electrons) and leaving the other terminal positive (deficit of electrons). This is the same kind of charge imbalance as static electricity — one side has too many electrons, the other has too few.\n- Step 2: The difference is that in static electricity, the charge sits still on an insulator. In a circuit, a conductor connects the two terminals, so electrons flow continuously from the negative terminal through the circuit to the positive terminal — this continuous flow is electric current. The battery keeps pushing electrons to maintain the imbalance, so the current is sustained rather than a one-off spark.\n\nStatic = charge held still; current = same charge free to flow. The underlying physics (charge imbalance) is identical.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "Why does a charged plastic rod attract small pieces of paper but NOT repel them, even though the paper is a neutral insulator? What would happen if the paper were a conductor instead? (3 steps)", "answer": "- Step 1: The paper is neutral and insulating. The charged rod induces charge separation within each piece of paper: electrons in the paper are repelled to the far side, leaving the near side oppositely charged. The near-side attraction outweighs the far-side repulsion (because the near side is closer), so there is a net attractive force. The paper is pulled toward the rod.\n- Step 2: The paper is NOT repelled because it has no net charge of the same sign as the rod. The overall charge is zero — only the local separation creates the attraction. There is no repulsive force to overcome the attraction.\n- Step 3: If the paper were a conductor, the same induction would occur, but more effectively (free electrons move more easily). The attraction would still happen by the same mechanism. The key difference: a conductor could also be charged by *contact* if the rod touched it, after which it would have the same sign and would be *repelled*. But at a distance, induction produces attraction for both conductors and insulators.\n\nThe rule \"charged attracts neutral\" applies to both conductors and insulators — induction works in both cases.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": true}, {"question": "In the electrostatic series, acetate/perspex is near the top and rubber/sulphur is near the bottom. If you rub a perspex rod with a rubber cloth, which object becomes positive and which becomes negative? (2 steps)", "answer": "- Step 1: The material lower on the electrostatic series (rubber) has a stronger hold on electrons. When rubbed, rubber pulls electrons away from the perspex.\n- Step 2: Electrons move from perspex to rubber. Perspex loses electrons → becomes positive. Rubber gains electrons → becomes negative. The lower material always becomes negative; the higher material always becomes positive.\n\nThis is consistent with the general rule: the material with the stronger hold on electrons (lower on the chart) gains them and becomes negative.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "A student rubs a polythene rod with a duster. The rod becomes negative. They then bring the rod near the duster and observe attraction. Explain why the rod and duster attract each other. (2 steps)", "answer": "- Step 1: By friction, electrons transferred from the duster to the polythene rod. The rod is negative (gained electrons) and the duster is positive (lost electrons).\n- Step 2: The rod and duster carry opposite charges. Unlike charges attract, so they pull toward each other. This is a straightforward unlike-charges-attract situation — both objects are charged with opposite signs.\n\nNote: this is different from the \"charged attracts neutral\" scenario. Here, both objects are genuinely charged (equal and opposite), so the attraction is direct, not by induction.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "A simple exercise: A current delivers a total charge of 3.2 C. Roughly how many electrons is this — is it closer to $$10^{10}$$, $$10^{19}$$, or $$10^{28}$$? Show your reasoning. (2 steps)", "answer": "- Step 1: Use $$n = Q / e = 3.2 / (1.6 \\times 10^{-19})$$. Compute: $$3.2 / 1.6 = 2$$, so $$n = 2 \\times 10^{19}$$.\n- Step 2: The answer is closest to $$10^{19}$$. Even a few coulombs of charge involve an enormous number of electrons — roughly $$10^{19}$$, which is about 10 quintillion. This reinforces why macroscopic charge appears continuous even though it is quantised.\n\nThe mental math trick: $$3.2 / 1.6 = 2$$, then just track the power of 10.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "What is the \"friction → charge → spark → current\" chain? Give a real-world example for each step. (2 steps)", "answer": "- Step 1: The chain describes how static electricity leads to a discharge: *Friction* between two materials transfers electrons, creating a *charge* imbalance. When the charged object gets close to a conductor or earth, the charge suddenly moves as a *spark* (breakdown of the insulating gap). That spark is electrons flowing — a brief *current*.\n- Step 2: Real-world example (the Family Guy scenario): Peter rubs his feet on a nylon carpet (friction → charge). He then touches another person (spark → current). The spark is the rapid discharge, and the current flows through the other person to earth. Another example: fuel flowing through a rubber hose (friction → charge on fuel), then a person touches the pump (spark → current → possible fire).\n\nThis chain unifies the entire topic: static charge is the stored form, and current is what happens when it discharges.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": false}, {"question": "Why can an insulator NOT be charged by induction in the same way a conductor can? What is the key property that makes induction work? (2 steps)", "answer": "- Step 1: Induction works by *rearranging* the electrons inside an object — pushing them to one side and creating a charge separation. This requires the electrons to be free to move within the material.\n- Step 2: In a conductor, free electrons can move throughout the material in response to an external electric field, creating the induced charge separation. In a pure insulator, electrons are tightly bound to their atoms and cannot move through the material. While the atoms/molecules in an insulator can *polarise* slightly (electron clouds shift within each atom), the bulk movement of charge needed for classical induction does not occur.\n\nThis is why the metal sphere can be charged by induction (free electrons move, then earthing removes them), but a plastic sphere cannot — the electrons are stuck.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": true}, {"question": "Exam technique: when a question says \"use the idea of charge movement\" to explain how an object becomes charged, what must your answer include to get full marks? (2 steps)", "answer": "- Step 1: You must describe *electrons moving* and state *which direction* they move (from where to where). For example: \"Electrons are transferred from the metal plate to the lifting sheet\" — not just \"the sheet becomes negative.\"\n- Step 2: You must then state the consequence: the object that gains electrons becomes negative, and the object that loses electrons becomes positive. Both the movement and the resulting charge signs must be explicitly stated for full marks.\n\nAlex's rule: match your wording to the command words in the question. If it says \"charge movement,\" talk about electrons moving. If it says \"state the charge,\" give the sign. If it says \"explain,\" give the mechanism.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "Exam technique: what two-part structure should your answer follow when asked \"what happens and why?\" (e.g., \"Do the rods attract or repel? Explain.\") (2 steps)", "answer": "- Step 1: First, state the *observation/conclusion* directly: \"They repel\" (or \"they attract\"). This earns the first mark and shows you know the result.\n- Step 2: Then, give the *justification/reason*: \"Because they carry the same charge, and like charges repel.\" This earns the explanation mark. Don't re-derive the charging step unless specifically asked — answer the force question first.\n\nAlex's model: \"Describe: they repel. Explain: because they have the same charge.\" Two separate marks for two separate tasks.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}, {"question": "A simple exercise: An object has a charge of $$-3.2 \\times 10^{-19}\\text{ C}$$. How many extra electrons does it have? Is this a physically possible charge? (2 steps)", "answer": "- Step 1: $$n = |Q| / e = 3.2 \\times 10^{-19} / 1.60 \\times 10^{-19} = 2$$. The object has 2 extra electrons.\n- Step 2: Since $$n = 2$$ is an integer, this is a physically possible charge. The negative sign confirms electrons were gained (not lost). If $$n$$ had been non-integer, the charge would be impossible by quantisation.\n\nQuick mental math: $$3.2 / 1.6 = 2$$, then just check the powers of 10 cancel.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}, {"question": "Why is it incorrect to say \"protons flow to create a current in a wire\"? What actually flows, and why? (2 steps)", "answer": "- Step 1: Protons are locked inside the nuclei of the metal atoms in the wire. The strong nuclear force and the electromagnetic binding to the atom make it impossible for protons to move under normal electrical conditions. Their large mass (relative to electrons) also means they are far harder to move.\n- Step 2: What actually flows is *electrons* — specifically the free/delocalised electrons in the metal. These electrons are very light ($$\\approx 1/1840$$ of a proton mass) and are not bound to any particular atom in a conductor, so the electric field from the battery can push them through the wire as a current.\n\nIn some non-metallic contexts (e.g., electrolytes, gases), positive ions can move — but in a metal wire, it is always electrons.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": false}, {"question": "Edge case: can a neutral atom of a conductor (like copper) be induced to have charge separation by a nearby charged object? If so, does the atom become charged overall? (2 steps)", "answer": "- Step 1: Yes, a nearby charged object can induce charge separation *within* a single atom of a conductor. The electron cloud shifts slightly toward or away from the external charge, creating a tiny electric dipole — one side of the atom is slightly more negative, the other slightly more positive.\n- Step 2: However, the atom remains *neutral overall* — the total number of electrons still equals the number of protons. Only the distribution has changed. For the atom to become genuinely charged (an ion), an electron must actually leave or arrive — which requires contact or a strong enough field to ionise the atom, not just induction.\n\nInduction rearranges charge; it does not create or destroy it — even at the atomic level.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": true}, {"question": "A charged object is placed on an insulating stand. Over a very long time, the charge slowly decreases. Why does this happen even though the stand is insulating? (2 steps)", "answer": "- Step 1: No insulator is perfect. All real insulators have some (very small) conductivity. Additionally, water vapour in the air and dust particles can provide conducting paths across the surface of the insulator.\n- Step 2: Over time, these tiny conducting paths allow a very slow leakage of charge from the object to the surrounding air and eventually to earth. In dry conditions, the charge persists much longer; in humid conditions, the moisture in the air greatly increases leakage and the charge drains away faster.\n\nThis is why static demonstrations work much better on dry days — humid air is a better conductor than dry air.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": false}, {"question": "Synthesis question: A person wearing rubber-soled shoes rubs their feet on a nylon carpet, becoming negatively charged. They then touch a neutral metal sphere on an insulating stand. Describe the full chain of physics, from the carpet to the sphere's final state. (4 steps)", "answer": "- Step 1: *Friction charges the person.* Rubbing feet on the nylon carpet (an insulator) transfers electrons from the carpet to the person. The person becomes negatively charged (excess electrons). The rubber soles are insulating, so the charge cannot flow to earth — it stays on the person.\n- Step 2: *Contact with the sphere.* When the negatively charged person touches the neutral metal sphere, electrons flow from the person (high electron concentration) into the sphere (a conductor, so electrons can enter and spread). This is charging by contact.\n- Step 3: *The sphere becomes negative.* The sphere gains electrons and becomes negatively charged. The person loses some electrons but may still be negative (depending on relative sizes). Both the person and the sphere now carry negative charge.\n- Step 4: *The sphere retains its charge.* Because the sphere is on an insulating stand, the excess electrons cannot flow to earth. The sphere remains negatively charged after the person removes their hand.\n\nThe full chain: friction → charge on person → contact → electron flow into sphere → sphere charged negative → insulating stand prevents discharge.", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": true}, {"question": "Synthesis question: Explain how electrostatic paint spraying uses BOTH the \"like charges repel\" and \"unlike charges attract\" rules to produce an even, efficient coat. (3 steps)", "answer": "- Step 1: At the nozzle, paint droplets are charged positive (electrons removed). Since all droplets carry the same (positive) charge, *like charges repel* — the droplets push each other apart as they leave the nozzle. This causes them to spread out into a fine, even mist rather than clumping together.\n- Step 2: The car body is charged negative. As the positively charged droplets approach, *unlike charges attract* — the droplets are pulled toward the car body, even around curves and into recessed areas that a simple directional spray would miss.\n- Step 3: The combination gives a superior result: repulsion between droplets ensures even coverage (no clumping), and attraction to the car ensures minimal waste (droplets are pulled to the car rather than drifting past). Both rules are essential — one without the other would give a worse result.\n\nThis is a practical application where both electrostatic rules work together.", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": true}, {"question": "Synthesis question: In a gold-leaf electroscope charged positive by a battery, a student brings a negative rod near the plate and the leaf falls. Another student says \"the leaf falls because the negative rod attracts the positive leaf.\" Is this correct? Explain the actual mechanism. (3 steps)", "answer": "- Step 1: The statement is incorrect (or at least incomplete and misleading). The leaf is not being \"pulled down\" by attraction to the rod. The rod is near the *top plate*, not near the leaf.\n- Step 2: The actual mechanism: the negative rod attracts free electrons upward toward the top plate (or electrons flow from the rod onto the plate). This reduces the net positive charge on the entire metal system (plate + rod + leaf). As the charge on the leaf and the internal rod decreases, the repulsive force between them weakens.\n- Step 3: The leaf falls because the *repulsion* between the leaf and the internal rod has decreased — not because of any direct attraction between the external rod and the leaf. The leaf's motion is always governed by its repulsion from the internal rod, which depends on how much charge they share.\n\nThe electroscope leaf always responds to repulsion from the internal rod, never to direct attraction from an external object.", "source": "GLM 5.1 ①", "_id": "glm_1_60", "judge_pick": false}], "count": 61}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "An atom is represented by the nuclide symbol $$^{19}_9\\text{F}$$. What do the numbers 19 and 9 reveal about the composition of this atom's nucleus and its electron cloud? (2 steps)", "answer": "- Step 1: The bottom number, $$Z = 9$$, is the atomic (proton) number. This tells us there are 9 protons in the nucleus. Because the atom is neutral, it must also have 9 electrons orbiting outside the nucleus to balance the charge.\n- Step 2: The top number, $$A = 19$$, is the mass number, representing the total number of nucleons (protons + neutrons). To find the number of neutrons, subtract the proton number from the mass number: $$19 - 9 = 10$$ neutrons.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "Why is it the electrons that are transferred during static charging, rather than protons, based on their relative masses and locations within the atom? (2 steps)", "answer": "- Step 1: Location matters. Protons are locked inside the nucleus, bound by the strong nuclear force, making them incredibly difficult to remove. Electrons, however, orbit on the outside of the atom and are only held by the electromagnetic attraction to the nucleus, making them accessible to external forces.\n- Step 2: Mass matters. The electron has a relative mass of approximately $$1/1840$$ (nearly 0), while a proton has a relative mass of 1. Because electrons are roughly 1840 times lighter than protons, they require significantly less energy to move.\n+ Takeaway: Electrons are the \"mobile\" charge carriers because they are on the outside and extremely light.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "A student writes, \"The cloth gained positive charge when rubbed.\" Why is this phrasing physically inaccurate, and what is the correct description? (2 steps)", "answer": "- Step 1: Conservation of charge dictates that charge cannot be created from nothing. \"Gaining positive charge\" implies that positive particles moved onto the cloth, which does not happen in this context (protons are locked in the nucleus).\n- Step 2: The correct mechanism is electron transfer. The cloth lost negative charge (electrons moved from the cloth to the rod). Losing negative charge leaves the cloth with a relative excess of protons, resulting in a net positive charge.\n+ Key rule: Objects only become positive by *losing* electrons, never by gaining protons or \"positive charge.\"", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "If an object has a net charge of $$-4.8 \\mu\\text{C}$$, does it have an excess or a deficit of electrons? How does the quantisation of charge formula $$Q = ne$$ conceptually determine the number of electrons? (2 steps)", "answer": "- Step 1: The negative sign indicates an excess of electrons. The object has more electrons than protons.\n- Step 2: Charge is quantised, meaning it comes in discrete packets of the elementary charge $$e = 1.60 \\times 10^{-19}\\text{ C}$$. The formula $$Q = ne$$ means the total charge $$Q$$ is simply the number of excess electrons $$n$$ multiplied by the charge of one electron. Rearranging gives $$n = Q/e$$, allowing us to count the exact integer number of excess electrons responsible for the total charge.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "You rub a metal rod with a cloth while holding it in your bare hand, and it does not stay charged. You rub a plastic rod the same way, and it stays charged. What fundamental difference between the materials explains this? (3 steps)", "answer": "- Step 1: Metal is a conductor. It has \"free\" (delocalised) electrons that can move easily. When friction transfers charge to the metal, the excess electrons immediately flow through the metal, through your body (also a conductor), and down to the earth, neutralising the rod.\n- Step 2: Plastic is an insulator. Its electrons are tightly bound to their atoms and cannot flow freely.\n- Step 3: When friction transfers charge to the plastic, the excess electrons are \"stuck\" where they are deposited. They cannot flow away to earth, so the static charge builds up and remains localized.\n+ Takeaway: Static charge only persists on insulators, or on conductors that are isolated from earth.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "When glass is rubbed with silk, glass becomes positive and silk becomes negative. Based on the electrostatic series, which material has a stronger \"hold\" on electrons? (2 steps)", "answer": "- Step 1: Identify the direction of transfer. Glass became positive, meaning it lost electrons. Silk became negative, meaning it gained electrons.\n- Step 2: Relate to the series. The material that gains electrons (silk) is the one with the stronger hold on electrons. It effectively \"pulls\" electrons away from the material with the weaker hold (glass).\n+ Rule: Lower on the electrostatic series = stronger hold = tends to gain electrons = becomes negative.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "A polythene rod is rubbed with a cloth and gains $$5 \\times 10^9$$ electrons. What is the net charge on the cloth, and what principle guarantees this relationship? (2 steps)", "answer": "- Step 1: The principle of conservation of charge dictates that charge cannot be created or destroyed, only transferred. The total charge of the isolated system (rod + cloth) must remain zero.\n- Step 2: Since the rod gained electrons (becoming negative), the cloth must have lost exactly those same electrons. The rod and cloth must end up with equal and opposite charges. If the rod is $$-Q$$, the cloth must be $$+Q$$.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Two objects, X and Y, are both negatively charged. Object Z is positively charged. Describe the force between X and Y, and between X and Z. (2 steps)", "answer": "- Step 1: Force between X and Y. They have the same sign of charge (both negative). According to the electrostatic force rules, like charges repel. Therefore, X and Y repel each other.\n- Step 2: Force between X and Z. They have opposite signs of charge (negative and positive). Unlike charges attract. Therefore, X and Z attract each other.\n+ Note: It is the *net* charge sign that matters, not which specific particle caused the charging.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "A student says, \"Two negatively charged objects attract each other because the two negatives cancel out.\" Why is this reasoning flawed? (2 steps)", "answer": "- Step 1: The \"cancellation\" idea is a confusion with mathematical addition or neutralisation. Two negative charges on separate objects do not combine to form a positive; they represent a surplus of electrons on both objects independently.\n- Step 2: The correct rule is based on force direction. Like charges (both negative) produce a repulsive force. The excess electrons on one object repel the excess electrons on the other object. They push apart, they do not attract.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "A negatively charged balloon is brought near a neutral wall. It sticks to the wall. Explain the sequence of electron movement in the wall that causes this attraction, and why the wall doesn't become permanently charged. (3 steps)", "answer": "- Step 1: The balloon's negative charge creates an electric field that repels the wall's electrons.\n- Step 2: The electrons in the wall are pushed away to the far side. This leaves the near side of the wall with a deficit of electrons, making it positively charged (induced charge).\n- Step 3: The positive near side is closer to the balloon than the negative far side, so the attractive force is stronger than the repulsive force. The wall doesn't become permanently charged because no electrons left the wall entirely; they were just rearranged internally.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "During induction by a positive rod, which side of the neutral object becomes negatively charged—the near side or the far side? Why? (2 steps)", "answer": "- Step 1: The positive rod attracts electrons. Because electrons are mobile (in a conductor), they will move towards the rod.\n- Step 2: The side of the neutral object closest to the rod is the \"near side.\" Electrons accumulate here, making the near side negative. The far side is left with a deficit of electrons, making it positive.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "A positively charged metal sphere is connected to the ground with a wire. Describe the direction of electron flow and the final charge state of the sphere. (2 steps)", "answer": "- Step 1: The sphere is positive, meaning it has a deficit of electrons. The Earth is an effectively infinite reservoir of charge.\n- Step 2: Electrons are attracted from the Earth, up the wire, and onto the sphere to fill the deficit. The sphere's charge drops to zero (neutral). Electrons flow *from* Earth *to* the positive sphere.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "How does the charge imbalance in a battery relate to the concept of static electricity, and what is the crucial difference that turns \"static\" charge into an electric current? (2 steps)", "answer": "- Step 1: A battery uses chemical energy (EMF) to separate charges, creating a positive terminal (deficit of electrons) and a negative terminal (excess of electrons). This charge imbalance is identical in nature to the static charge on a rubbed rod.\n- Step 2: The crucial difference is the path. Static charge is trapped on an insulator with nowhere to go. A battery is connected by a conductor (circuit), giving the electrons a continuous path to flow from the negative terminal to the positive terminal. This flow of charge is current.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "To find the number of electrons flowing in a current, you need the current $$I$$, the time $$\\Delta t$$, and the elementary charge $$e$$. Derive the formula for the number of electrons $$n$$, explaining how the two key equations link together. (3 steps)", "answer": "- Step 1: Start with the definition of current: $$I = \\Delta Q / \\Delta t$$. Rearrange to find the total charge that flows: $$\\Delta Q = I \\Delta t$$.\n- Step 2: Recognise that this total charge $$\\Delta Q$$ is made up of individual electrons, each carrying charge $$e$$. The quantisation equation is $$\\Delta Q = n e$$.\n- Step 3: Substitute the expression for $$\\Delta Q$$ from Step 1 into Step 2: $$I \\Delta t = n e$$. Rearrange to solve for the number of electrons: $$n = I \\Delta t / e$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "When a negatively charged rod touches the plate of a gold-leaf electroscope, the leaf rises. A student claims \"the neutral leaf is attracted to the negative rod.\" Why is this incorrect, and what is the actual reason the leaf rises? (3 steps)", "answer": "- Step 1: The scenario is \"charging by contact,\" not induction. When the rod touches the metal plate, electrons flow from the rod into the metal.\n- Step 2: Because the electroscope is a conductor, these excess electrons distribute themselves throughout the metal plate, the rod, and the gold leaf. The leaf is no longer neutral; it becomes negatively charged.\n- Step 3: The metal rod and the gold leaf now carry the same negative charge. Like charges repel, so the leaf is repelled away from the rod, causing it to rise.\n+ Misconception check: Attraction of a neutral object is the *induction* story. By contact, the leaf takes the *same* sign and repels.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "An electroscope is positively charged (leaf raised). A negative rod is brought near the plate. Explain why the leaf falls instead of rising further. (2 steps)", "answer": "- Step 1: The positive electroscope has a deficit of electrons, meaning the leaf and rod are both positive and repelling. The negative rod, brought near (induction), attracts electrons from the earth (if earthed) or repels electrons within the metal down to the plate.\n- Step 2: The arrival of these extra electrons cancels out some of the positive charge. As the net charge on the leaf and rod decreases towards zero, the repulsive force between them weakens, and the leaf falls.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "At a petrol station, filling a car with fuel can build up a static charge. Why is this particularly dangerous, and how does earthing the pump prevent the hazard? (2 steps)", "answer": "- Step 1: Fuel flowing through the rubber hose creates friction, transferring charge. If the car/pump builds up a large charge imbalance, the voltage becomes high enough to cause the air to break down and a spark to jump. This spark can ignite the petrol vapour.\n- Step 2: Earthing provides a conducting path to the ground. Any excess charge flows safely to the Earth immediately, preventing the charge from building up to a dangerous level where a spark could occur.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "In electrostatic paint spraying, the paint droplets are charged positive and the car body is charged negative. Explain why this results in less wasted paint and a more even coat compared to uncharged spraying. (2 steps)", "answer": "- Step 1: Unlike charges attract. The positive paint droplets are strongly attracted to the negative car body, ensuring that most of the paint reaches the target rather than missing or floating away.\n- Step 2: As the positive droplets approach the car, they repel each other (like charges repel). This mutual repulsion causes them to spread out evenly across the surface, avoiding clumps. The attraction is also strong enough to bend paint droplets around edges (wrap-around effect).", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "Walking on a nylon carpet makes a person negatively charged. They then touch a metal door handle and feel a shock. Trace the journey of the electrons, naming the physical processes involved at each step. (3 steps)", "answer": "- Step 1: Friction. Rubbing shoes on the nylon carpet transfers electrons from the carpet to the person. The person becomes negatively charged (excess electrons).\n- Step 2: Build-up. The person is wearing insulating shoes, so the excess electrons cannot flow to earth. Static charge builds up on the body.\n- Step 3: Discharge (Spark/Current). The metal handle is a conductor connected to earth. When touched, the excess electrons suddenly have a path to ground. They flow rapidly from the person, through the handle, to earth. This brief, rapid flow of charge is the current felt as a shock.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "A negatively charged rod is brought near a neutral conductor and a neutral insulator. Both are attracted. However, the mechanism of attraction is slightly different regarding electron movement. Contrast the electron behaviour in the conductor versus the insulator. (2 steps)", "answer": "- Step 1: In the conductor, electrons are free to move. They are repelled by the rod and drift entirely to the far side of the conductor, leaving the near side distinctly positive.\n- Step 2: In the insulator, electrons are tightly bound to their atoms. They cannot drift across the object. Instead, they shift slightly within their own atoms (polarisation), creating tiny dipoles. The electron clouds are pushed away from the rod, but only by a microscopic distance, not a bulk flow.\n+ Takeaway: Conductors allow bulk electron flow; insulators only allow atomic polarisation.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "An object gains 5 electrons. If the elementary charge is $$e$$, what is the charge on the object? (1 step)", "answer": "- Step 1: Using the quantisation of charge formula $$Q = ne$$, where $$n = 5$$. The charge is $$5e$$. Since electrons are negative, the charge is $$-5e$$.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "A current of 2 A flows for 3 seconds. What total charge flows past the point? (1 step)", "answer": "- Step 1: Using $$\\Delta Q = I \\Delta t$$, substitute the values: $$\\Delta Q = 2 \\text{ A} \\times 3 \\text{ s} = 6 \\text{ C}$$. The total charge is 6 Coulombs.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "An atom has 6 protons and 8 neutrons. What is its mass number $$A$$? (1 step)", "answer": "- Step 1: The mass number is the total number of protons and neutrons in the nucleus. $$A = 6 + 8 = 14$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}], "count": 23}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "In the nuclide symbol $$^{A}_{Z}\\text{X}$$, what does the bottom number $$Z$$ represent, and what does the top number $$A$$ represent? How do you find the number of neutrons? (3 steps)", "answer": "- Step 1: The bottom number $$Z$$ is the atomic (proton) number — it tells you the number of protons in the nucleus. This identifies the element.\n- Step 2: The top number $$A$$ is the mass number — it tells you the total number of nucleons (protons + neutrons) in the nucleus.\n- Step 3: To find the number of neutrons, subtract: $$\\text{neutrons} = A - Z$$. For example, $$^{4}_{2}\\text{He}$$ has $$Z=2$$ protons and $$A-Z = 4-2 = 2$$ neutrons.\n\nThe mass number counts *nuclear particles only* — electrons are not included because their mass is negligible compared to nucleons.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "A neutral atom always has equal numbers of which two particles? Why must they be equal for the atom to have zero net charge? (2 steps)", "answer": "- Step 1: A neutral atom has equal numbers of protons and electrons. Each proton carries $$+1$$ relative charge and each electron carries $$-1$$, so they cancel exactly.\n- Step 2: If the numbers differed by even one, the atom would have a net charge (e.g., one more electron than protons → net $$-1$$). Neutrons carry zero charge, so they don't affect the balance — they are irrelevant to whether the atom is neutral.\n\nThis is why \"neutral\" means protons = electrons, not protons = neutrons.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "What are the relative charge and relative mass of a proton, a neutron, and an electron? Which particle's mass is negligible, and roughly by what factor? (3 steps)", "answer": "- Step 1: Proton — relative charge $$+1$$, relative mass $$1$$. Neutron — relative charge $$0$$, relative mass $$1$$.\n- Step 2: Electron — relative charge $$-1$$, relative mass approximately $$\\frac{1}{1840}$$ (often rounded to \"≈ 0\" or \"very small\").\n- Step 3: The electron's mass is negligible compared to the proton/neutron by a factor of roughly 1840:1. This is why the nucleus contains virtually all the atom's mass, and why it is the *electron* that gets moved around in charging — it's nearly 2000 times lighter than any nuclear particle.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "Why is it the electron that moves during charging and current flow, rather than the proton or neutron? Give both a mass-based reason and a structural reason. (2 steps)", "answer": "- Step 1: Mass-based reason — the electron is roughly $$\\frac{1}{1840}$$ the mass of a proton or neutron, so it requires far less energy to move. Any force that can budge an electron would barely shift a nucleon.\n- Step 2: Structural reason — electrons orbit *outside* the nucleus and are loosely bound (especially outer electrons in metals, which become \"free\" delocalised electrons). Protons and neutrons are locked inside the nucleus by the strong nuclear force, which is enormously stronger than electrostatic forces at that range. They simply cannot be removed by everyday friction or electric fields.\n\nThis is the physical basis for Alex's rule: \"we can't pick up positive charge, we can just lose negative charge.\"", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "What are the absolute values (from the Data Booklet) of the elementary charge $$e$$, the proton mass $$m_p$$, and the electron mass $$m_e$$? How do you derive the \"1/1840\" ratio from the absolute masses? (2 steps)", "answer": "- Step 1: From the Edexcel Data Booklet: $$e = 1.60 \\times 10^{-19}$$ C (magnitude of charge on a proton or electron), $$m_p = 1.67 \\times 10^{-27}$$ kg, $$m_e = 9.11 \\times 10^{-31}$$ kg.\n- Step 2: The ratio is $$\\frac{m_p}{m_e} = \\frac{1.67 \\times 10^{-27}}{9.11 \\times 10^{-31}} \\approx 1833$$, commonly quoted as \"about 1840\" or \"roughly 2000\". Inverting: $$\\frac{m_e}{m_p} \\approx \\frac{1}{1840} \\approx 0$$, which is why the electron's relative mass is treated as negligible.\n\nYou don't need to memorise these absolute values for ESAT static-electricity questions — the relative values (+1/0/−1 for charge, 1/1/≈0 for mass) are sufficient.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "State the principle of conservation of charge. Why does this mean you can only *move* charge, never *create* it? (2 steps)", "answer": "- Step 1: The conservation of charge states: charge cannot be created or destroyed; charged particles can only be transferred between objects. The total charge of a closed system is always constant.\n- Step 2: This means when one object becomes charged, another object must receive or lose an equal and opposite charge. For example, if an object gains 5 electrons (becoming more negative by $$5e$$), those 5 electrons came from somewhere — the donor object lost 5 electrons and became more positive by $$5e$$. The net charge of both objects combined hasn't changed; it has just been redistributed.\n\nThis is analogous to conservation of energy — you redistribute it, you don't create or destroy it.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "Why can an object become positive only by *losing* electrons, never by *gaining* positive charge? What physical constraint makes this true? (2 steps)", "answer": "- Step 1: The positive charge carriers in matter are protons, which are locked inside the nucleus by the strong nuclear force. No everyday process (friction, induction, contact) has enough energy to remove protons from the nucleus.\n- Step 2: Therefore, the only mobile charge carriers are electrons. If an object ends up with a net positive charge, it must have *lost* electrons — the remaining protons now outnumber the electrons. You never \"add positive charge\"; you remove negative charge and the positive is what's left behind.\n\nThis is Alex's key phrase: \"we can't pick up positive charge, we can just lose negative charge.\"", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "What does it mean that charge is *quantised*? Write the formula and explain what each symbol means. (2 steps)", "answer": "- Step 1: Charge is quantised means that charge always comes in integer multiples of the elementary charge $$e$$. You cannot have a fraction of an electron's charge on an object — you either have an integer number of extra electrons, or you don't.\n- Step 2: The formula is $$Q = ne$$, where $$Q$$ is the total charge in coulombs, $$n$$ is the number of electrons transferred (a positive integer), and $$e = 1.60 \\times 10^{-19}$$ C is the elementary charge. Rearranged: $$n = Q/e$$, which lets you count how many electrons correspond to a given charge.\n\nThis means any charge value you measure must be a whole-number multiple of $$1.60 \\times 10^{-19}$$ C — you'll never measure, say, $$2.3 \\times 10^{-19}$$ C on an isolated object.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "A charge of roughly $$10\\;\\mu\\text{C}$$ flows. Without doing the full calculation, roughly how many electrons is that — is it closer to thousands, mi
