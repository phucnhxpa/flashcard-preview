trons → becomes negative; the metal plate loses electrons → becomes positive.**\n+ Each object ends up with an **imbalance** of charge (not neutral).\n\nThe key exam technique: \"use the idea of charge movement\" means you must talk about electrons going from plate → sheet, not just say \"one is negative, one is positive.\"", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Walking across a nylon carpet, you become negatively charged. Touching a metal door handle gives a shock. Explain this fully, naming the processes involved. (3 steps)", "answer": "- Step 1: **Charging by friction.** Walking rubs your shoes/body on the nylon carpet (an insulator). Electrons transfer from the carpet onto you, so you accumulate excess electrons → become negatively charged.\n- Step 2: The metal handle is a **conductor connected to Earth**. When you touch it, you give the excess electrons a path to flow to Earth.\n- Step 3: The **rapid flow of electrons** (a brief current) through your hand creates a spark — this is the shock you feel. Charge \"wants to be balanced,\" so it flows rapidly to Earth through the handle.\n\nThis is the same physics as the Family Guy static-shock scene Alex showed: friction → charge → spark → current (briefly).", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Why do smoke precipitators in chimneys work? What charge is involved? (2 steps)", "answer": "- Step 1: Smoke particles passing through the chimney are given a **charge** (usually negative) by electrodes inside the precipitator.\n- Step 2: Charged plates in the chimney are given the **opposite charge** (positive). Opposites attract, so the charged smoke particles are pulled onto the plates and removed from the gas stream.\n+ The particles are \"precipitated\" (removed) before the gas exits the chimney, reducing pollution.\n+ This uses the \"charged attracts neutral (by induction)\" principle — the neutral smoke particles become induced and attracted.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A perspex rod is rubbed with a cloth and becomes positively charged. (a) Which way did the electrons move? (b) What is the charge on the cloth? (2 steps)", "answer": "- (a) Electrons **left the perspex rod and moved onto the cloth**. The rod lost electrons → becomes positive.\n- (b) The cloth **gained those electrons** → becomes **negatively charged**.\n+ By conservation of charge, the cloth gets equal and opposite charge to the rod. The cloth is the better electron-holder (lower on the triboelectric series), so it pulls electrons from the perspex.\n\nThis is the inverse of the plastic rod example — the key is remembering that electrons move from the object that ends up positive to the object that ends up negative.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "What are the five common traps in static electricity that cost marks in exams? (1 step)", "answer": "1. **Same charge = REPEL** — not attract. Two positives repel; two negatives repel.\n2. **Contact charging makes the leaf the SAME sign** — it rises by repulsion, not by \"neutral leaf attracted to charged rod\"\n3. **Only electrons move** — never say \"gained positive charge\"; say \"lost electrons\"\n4. **Which material goes negative?** The one with the **stronger hold on electrons** (lower in the series), not a guess\n5. **\"Safe\" = conductor/earthed, not \"waterproof\"** — for the petrol station jacket, it's electrical properties that matter, not water resistance\n\nAlex repeatedly corrected trap #1 — it was the lesson's most frequent error.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "A neutral lithium atom is written as ⁷₃Li. How many protons, neutrons, and electrons does it have? (2 steps)", "answer": "- Step 1: Z = 3 → **3 protons**. A = 7 → mass number = 7. Neutrons = A − Z = 7 − 3 = **4 neutrons**.\n- Step 2: For a neutral atom, electrons = protons = **3 electrons**.\n\nThe nuclide notation tells you everything: bottom = proton count, top = total nuclear particles, difference = neutrons. Neutral → electrons = protons.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}], "count": 29}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "State the relative charge and relative mass of a proton, a neutron, and an electron.", "answer": "- Proton: relative charge = +1, relative mass = 1 (in the nucleus)\n- Neutron: relative charge = 0, relative mass = 1 (in the nucleus)\n- Electron: relative charge = −1, relative mass = approximately 1/1840 (≈ 0, treated as negligible)\n+ The electron is ~1840 times lighter than a proton — that's why it moves in current, not the heavy nucleus.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Why is it always electrons that move during charging, never \"positive charge\"? (2 steps)", "answer": "- Step 1: Understand what \"positive charge\" actually means. An object becomes positively charged when it loses electrons — it has fewer electrons than protons, creating a net positive charge. The protons in the nucleus don't move.\n- Step 2: The mechanism. Electrons are the only particles free to move in static electricity — they're light and can be transferred between materials. You can never \"pick up\" positive charge; you can only lose negative charge.\n+ This is why we say electrons transfer, not protons.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "What is the quantisation of charge, and what is the formula Q = ne? Explain what each symbol means. (3 steps)", "answer": "- Step 1: The principle. Charge comes in discrete \"packets\" — multiples of the elementary charge e. You can't have half an electron's worth of charge.\n- Step 2: The formula. Q = ne, where Q = total charge (in coulombs, C), n = number of electrons gained or lost (an integer, no unit), and e = elementary charge = 1.60 × 10⁻¹⁹ C.\n- Step 3: Worked example. If an object has gained 3 electrons (n = 3), its charge is Q = 3 × (−1.60 × 10⁻¹⁹) = −4.80 × 10⁻¹⁹ C. If it lost 5 electrons, n = −5 and Q = +8.00 × 10⁻¹⁹ C.\n+ The negative sign for gained electrons and positive for lost electrons is built into the definition.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "What is the fundamental difference between a conductor and an insulator at the atomic level? Give examples of each. (2 steps)", "answer": "- Step 1: Conductors (metals like copper, gold, platinum, also graphite) have \"free electrons\" — some electrons in their outer shells are loosely held and can move freely throughout the material. When you add charge, it spreads immediately.\n- Step 2: Insulators (plastic/polythene, glass, rubber, wool) have electrons tightly bound to their atoms. Electrons can't flow freely, so charge gets stuck where you put it — this is static electricity.\n+ A key point: static charge only builds up on insulators. On a conductor, any charge would immediately flow away to earth.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "In the electrostatic series chart, materials at the top (like glass, wool) tend to become positive when rubbed, while materials at the bottom (like rubber, gold) tend to become negative. Explain why. (3 steps)", "answer": "- Step 1: The series ranks materials by how strongly they hold onto electrons. Materials at the TOP have a WEAK hold on electrons — when rubbed, they lose electrons easily and become POSITIVE.\n- Step 2: Materials at the BOTTOM have a STRONG hold on electrons — when rubbed, they STEAL electrons from the other material and become NEGATIVE.\n- Step 3: When you rub two materials together, the one with the stronger hold takes the electrons. So glass rubbed with rubber: rubber has stronger hold → rubber becomes negative, glass becomes positive.\n+ Alex initially said this wrong and corrected himself live — check your direction carefully in exams.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "A plastic (polythene) rod is rubbed with a cloth and becomes positively charged. Describe exactly which particles move and in which direction. (2 steps)", "answer": "- Step 1: Electrons move FROM the rod TO the cloth. The rod loses electrons (leaving more protons than electrons), so it becomes positively charged.\n- Step 2: The cloth GAINS those electrons, so it becomes negatively charged (equal and opposite charge, by conservation).\n+ Remember: positive charge means LOST electrons, not gained \"positive particles\".", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "State the three fundamental rules of electrostatic force. (1 step)", "answer": "1. Like charges repel (two positives repel; two negatives repel)\n2. Unlike charges attract (positive attracts negative)\n3. A charged object attracts a neutral object (by induction — explained in next card)\n+ This is the single most-tested rule in the exam — same charge always means repel.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Two charged rods are brought close together: (a) both carry negative charge, (b) one is positive and one is negative. What happens in each case, and why? (2 steps)", "answer": "- Step 1 (a): Both negative — they REPEL. Like charges repel. The negative charges repel each other, so the rods push apart.\n- Step 2 (b): One positive, one negative — they ATTRACT. Unlike charges attract. The opposite signs pull the rods together.\n+ The most common error: thinking same charge attracts. It doesn't — same sign always repels.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A negatively charged rod is brought near (not touching) small pieces of paper. The paper is neutral, yet it gets attracted to the rod. Explain why, using the concept of induction. (3 steps)", "answer": "- Step 1: The rod's negative charge creates an electric field. This field pushes the freely-moving electrons in the paper away from the rod, to the far side of each paper scrap.\n- Step 2: The near side of the paper now has fewer electrons (becomes relatively positive), while the far side has excess electrons (becomes relatively negative). This is called induced charge — the paper's charge has been rearranged without touching.\n- Step 3: The near side of the paper is now POSITIVE (opposite to the rod), and the rod is NEGATIVE. Opposite charges attract — that's why the paper jumps to the rod.\n+ This is why a charged object attracts a neutral one: it induces an opposite charge on the near surface.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "In the PhET \"balloon sticks to neutral wall\" simulation, the wall is neutral overall but still attracts the negatively charged balloon. Explain this using induction. (2 steps)", "answer": "- Step 1: The balloon's negative charge repels electrons in the wall to the far side, leaving the wall's surface near the balloon with a deficiency of electrons — that surface becomes POSITIVE.\n- Step 2: The balloon is negative, the wall's near surface is positive. Unlike charges attract, so the balloon sticks to the wall.\n+ The wall is still neutral overall (same total electrons as protons), but the charge is redistributed — this is induction.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "What does \"charging by induction\" mean, and how does it differ from \"charging by contact\"? (2 steps)", "answer": "- Step 1: Charging by INDUCTION: bring a charged object near (但不touch) a neutral conductor. The charges inside the neutral object rearrange (electrons pushed/pulled to one side), creating opposite charge on the near surface. The object becomes charged WITHOUT losing or gaining charge overall — it's still neutral, just redistributed.\n- Step 2: Charging by CONTACT: touch a charged object to a neutral one. Charge flows directly onto/off the neutral object — they now share the same charge sign. The electroscope leaf rises because it becomes the SAME sign as the rod (repel), not because it's attracted.\n+ Classic error: confusing these. Contact → same charge → repel. Induction (neutral) → opposite charge → attract.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A gold-leaf electroscope is charged by touching a NEGATIVE rod to the metal plate. Explain why the gold leaf rises. (3 steps)", "answer": "- Step 1: The rod is negative (excess electrons). When it touches the metal plate, electrons flow FROM the rod INTO the metal (plate + rod + leaf are all connected as one conductor).\n- Step 2: The metal plate, metal rod, and gold leaf ALL become NEGATIVE — they share the same charge by contact.\n- Step 3: The leaf and the metal rod now have the SAME charge (both negative), so they REPEL. The light gold leaf is pushed away from the rod, causing it to rise.\n+ Common misconception: thinking the neutral leaf is attracted to the rod. No — the leaf becomes charged and is REPELLED.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "A gold-leaf electroscope has been given an overall POSITIVE charge (leaf is already raised). A negative rod is then brought near the plate. Explain why the leaf falls. (3 steps)", "answer": "- Step 1: The electroscope is already positive — it has a deficit of electrons (more protons than electrons), so the leaf is raised by repulsion from the rod.\n- Step 2: The negative rod's electrons are attracted to the positive plate. Extra electrons flow into/are attracted to the metal, cancelling some of the positive charge.\n- Step 3: The net charge on the electroscope decreases toward zero. Less repulsion → the leaf falls. If enough electrons arrive, it becomes neutral and the leaf goes flat.\n+ This shows that adding opposite charge can neutralize an object — the basis of earthing.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "What is earthing, and why does it neutralize a charged object? (2 steps)", "answer": "- Step 1: Earthing means connecting a charged object to the ground with a conductor. The Earth is an effectively infinite reservoir of electrons.\n- Step 2: If the object is negative (excess electrons), electrons flow from the object INTO the Earth. If the object is positive (deficit), electrons flow FROM the Earth INTO the object. Either way, the charge balances out and the object becomes neutral.\n+ Charge \"always wants to be balanced, so it will flow if it can\" — earthing gives it the path.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "Walking across a nylon carpet gives you a shock when you touch a metal door handle. Explain this using the concepts of friction, charging, and earthing. (3 steps)", "answer": "- Step 1: Charging by friction. Walking rubs your shoes/body on the nylon carpet (an insulator). Electrons transfer from the carpet onto you, so you become negatively charged (surplus electrons).\n- Step 2: The metal handle is a conductor connected to earth. When you touch it, you complete a path to earth.\n- Step 3: Your surplus electrons rapidly flow from you, through the handle, to earth. That rapid flow of charge (a brief current) is the spark you feel as a shock.\n+ The shock is the same phenomenon as static discharge — charge that was held still on an insulator suddenly flows.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "Write the formula for electric current and define each symbol: I = ΔQ/Δt. (2 steps)", "answer": "- Step 1: I = ΔQ/Δt, where I = electric current (ampere, A), ΔQ = charge that flows past a point (coulomb, C), and Δt = time taken (second, s).\n- Step 2: One ampere = one coulomb per second: 1 A = 1 C s⁻¹. Rearranged: ΔQ = I × Δt.\n+ This connects static charge (held still) to current (charge flowing). Static = same charge imbalance, but trapped; current = same imbalance, free to flow through a conductor.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A current of 0.50 A flows for 2.0 minutes. Calculate (a) the total charge that flows, and (b) how many electrons this represents. (e = 1.60 × 10⁻¹⁹ C) (3 steps)", "answer": "- Step 1: Convert time to seconds. 2.0 minutes = 2.0 × 60 = 120 s.\n- Step 2 (a): ΔQ = I × Δt = 0.50 A × 120 s = 60 C. That's the total charge.\n- Step 3 (b): Number of electrons n = ΔQ / e = 60 / (1.60 × 10⁻¹⁹) = 3.75 × 10²⁰ electrons.\n+ This shows how enormous the number of electrons is in even a small current — but each carries tiny charge.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "An electrostatic dust-print lifter (EDPL) uses a 10 kV power supply to charge a lifting sheet. Explain how the sheet becomes negatively charged and the metal plate positively charged. (2 steps)", "answer": "- Step 1: Electrons are transferred from the metal plate, through the connecting wire (via the control unit), to the lifting sheet.\n- Step 2: The lifting sheet GAINS electrons → becomes NEGATIVE. The metal plate LOSES electrons → becomes POSITIVE. Each is left with a charge imbalance.\n+ Exam technique: the question asks \"use the idea of charge movement\" — you must describe WHICH WAY electrons move, not just state the final charges.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "In the EDPL, why are neutral dust particles lifted onto the negatively charged sheet? (2 steps)", "answer": "- Step 1: The lifting sheet is charged (negative). Neutral dust particles experience the sheet's electric field.\n- Step 2: By induction, the negative sheet repels electrons in each dust particle, making the near side positive. The positively-charged near side is attracted to the negative sheet — so dust is pulled up onto the sheet.\n+ This is exactly the same \"charged attracts neutral\" rule as the plastic rod picking up paper.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "Why is it dangerous to wear a nylon jacket at a petrol station, but safe to wear a jacket with metal threads or earthing? (2 steps)", "answer": "- Step 1: Nylon is an INSULATOR. When fuel flows through the rubber hose, friction transfers electrons, building up charge. If you (in your nylon jacket) touch the pump, your accumulated charge can spark to earth — and the spark can ignite petrol vapour (dangerous).\n- Step 2: A jacket with metal threads or an earthed jacket is a CONDUCTOR. Any charge that builds up can flow directly to earth through the jacket — no charge accumulates, no spark, safe.\n+ The key property is electrical (conductor vs insulator), not waterproofing.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Give one use and one danger of static electricity, and explain the physics behind each. (2 steps)", "answer": "- Uses: Electrostatic paint spraying. Paint droplets are given positive charge at the nozzle; the car body is made negative. Opposite charges attract, pulling paint onto hidden areas for an even coat with minimal waste.\n- Dangers: Petrol station fire. Fuel flowing through hoses (friction) builds up charge. If the person is charged and touches the pump, the spark can ignite fuel vapour — or lightning: ice crystals in clouds rub together, building charge; the cloud becomes negatively charged, inducing positive charge on the ground; when voltage is high enough, air breaks down and lightning strikes.\n+ The underlying principle: insulators allow charge to build up (danger or useful control); conductors/earthing prevent buildup.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "What is the chain \"friction → charge → spark → current\"? Explain each step. (2 steps)", "answer": "- Friction: Rubbing two insulators transfers electrons, building a charge imbalance (static).\n- Charge: One object gains electrons (becomes negative), the other loses (becomes positive).\n- Spark: When the charge buildup is large enough, electrons suddenly jump through the air — this is a brief spark.\n- Current: That sudden flow of electrons IS a current — just a very brief one. In circuits, we maintain the charge imbalance continuously with a battery, so current flows continuously.\n+ This connects what you see (shock, spark) to the same charge-flow principle as circuits.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "A perspex rod is rubbed with wool and becomes positive. (a) Which way did electrons move? (b) What is the charge on the wool? (2 steps)", "answer": "- Step 1 (a): Electrons moved FROM the perspex rod TO the wool. The rod lost electrons, becoming positive.\n- Step 2 (b): The wool GAINED those electrons, so it becomes negative. By conservation, the charges are equal and opposite.\n+ Remember: the material that holds electrons more strongly (lower in the electrostatic series) takes the electrons.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In the gold-leaf electroscope demonstration, a student says \"the leaf rises because the neutral leaf is attracted to the charged rod.\" Why is this wrong? (2 steps)", "answer": "- Step 1: The leaf is NOT neutral after contact. When the negative rod touches the metal plate, electrons flow from the rod INTO the metal (plate + rod + leaf).\n- Step 2: The leaf becomes NEGATIVE (same charge as the rod). Like charges repel — that's why the leaf rises, not because of attraction to a neutral object.\n+ This is the classic electroscope misconception. Fix it: contact → same charge → repel. Induction (without contact) → neutral becomes oppositely charged → attract.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A plastic rod negatively charged by rubbing is brought near a small neutral metal sphere (on an insulating stand). Describe what happens to the charges on the sphere. (3 steps)", "answer": "- Step 1: The negatively charged rod repels electrons in the metal sphere to the far side.\n- Step 2: The near side of the sphere loses electrons and becomes POSITIVE; the far side gains electrons and becomes NEGATIVE.\n- Step 3: The sphere is still neutral overall, but the charge is redistributed (induced). The positive near side is attracted to the negative rod.\n+ This is induction in a conductor — the rod doesn't touch, but the sphere's charges rearrange.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "If you bring a POSITIVE rod near the same neutral metal sphere, what changes in the direction of electron movement? Why? (2 steps)", "answer": "- Step 1: The positive rod ATTRACTS electrons. So electrons in the sphere are PULLLED toward the rod (to the near side).\n- Step 2: The near side becomes NEGATIVE (excess electrons), the far side becomes POSITIVE (electron deficit). The near side is now negative, attracted to the positive rod.\n+ The rule is always: negative rod → pushes electrons away; positive rod → pulls electrons closer.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A negatively charged object is earthed (connected to ground) by touching it with your hand. What happens to the charge, and why? (2 steps)", "answer": "- Step 1: Your body (connected to earth through you) is a conductor. The excess electrons on the object repel into your body and flow to earth.\n- Step 2: The object loses its excess electrons and becomes neutral. This is \"discharging\" — earthing removes static charge.\n+ If the object were positively charged, electrons would flow FROM earth INTO the object, cancelling the positive charge.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Two identical metal spheres, A and B. Sphere A has a charge of +6 nC, sphere B is neutral. They are brought into contact and then separated. What is the final charge on each sphere? (2 steps)", "answer": "- Step 1: When conductors touch, charge redistributes. Since they're identical, charge splits equally.\n- Step 2: Total charge = +6 nC + 0 = +6 nC. After contact, each sphere has +6 nC ÷ 2 = +3 nC.\n+ The +6 nC is shared between both spheres equally because they're identical conductors.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A student says \"electrons in a current flow from the positive terminal to the negative terminal.\" Is this correct? If not, what is correct? (2 steps)", "answer": "- Step 1: This is FALSE. Electrons (negative) are physically moved by the electric field, so they flow FROM NEGATIVE terminal TOWARD the POSITIVE terminal.\n- Step 2: However, conventional current (the historical convention) is defined as flowing FROM POSITIVE TO NEGATIVE. This is opposite to electron flow.\n+ In circuit analysis, we use conventional current direction (+ to −). In understanding actual particle motion, remember electrons drift the other way.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "What is the relationship between static electricity and electric current? How are they the same, and how do they differ? (2 steps)", "answer": "- Step 1: Same underlying phenomenon: both involve the movement of charge (electrons). Static is charge that's held still on an insulator; current is the same charge imbalance but free to flow through a conductor.\n- Step 2: The difference is whether the charges can move. In static, electrons are trapped on an insulator's surface → charge builds up. In current, a complete circuit allows electrons to flow continuously. A battery maintains the charge imbalance that drives continuous current.\n+ Think of static as \"blocked\" current — same charges, different conditions for flow.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "In the worked question with two polythene rods: (a) both are positively charged, (b) one positive one negative. State whether they attract or repel, and name the rule you used. (1 step)", "answer": "- (a) Both positive → REPEL. Like (same) charges repel.\n- (b) One positive, one negative → ATTRACT. Unlike (opposite) charges attract.\n+ The property used: \"like charges repel, unlike attract.\"", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A rubber rod is rubbed with fur and becomes negatively charged. The fur becomes positively charged. Explain why, using the electrostatic series chart. (2 steps)", "answer": "- Step 1: Rubber is LOWER on the electrostatic series chart than fur → rubber has a STRONGER hold on electrons.\n- Step 2: When rubbed together, the rubber (stronger hold) takes electrons from the fur. Rubber gains electrons → becomes negative. Fur loses electrons → becomes positive.\n+ This is the same pattern: material with stronger electron affinity becomes negative.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "Why is gold used for the leaf in a gold-leaf electroscope, rather than a heavier metal? (1 step)", "answer": "Gold can be beaten into extremely thin sheets, making it very light. The leaf needs to be light enough to be moved by the small electrostatic forces when charged. A heavier metal wouldn't move noticeably.\n+ This is why gold (and sometimes aluminium) is used — it's about the mechanical property (thinness/lightness), not conductivity.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "A negatively charged rod is brought near (but not touching) the top plate of an UNCHARGED gold-leaf electroscope. What happens to the leaf, and why? (3 steps)", "answer": "- Step 1: The negative rod repels electrons in the metal plate/rod/leaf system, pushing them down toward the leaf.\n- Step 2: This makes the top plate relatively positive (electron-deficient) and the leaf relatively negative (electron-rich).\n- Step 3: The leaf and rod (top part) now have OPPOSITE charges — the leaf is negative, the top is positive — so they ATTRACT, and the leaf rises.\n+ This is induction WITHOUT contact — the electroscope was neutral, but charge rearrangement makes the leaf rise.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "After the situation in Q35, if the rod is REMOVED (without touching), what happens to the leaf? Why? (2 steps)", "answer": "- Step 1: Once the external influence (the negative rod) is removed, the electrons redistribute evenly again throughout the metal.\n- Step 2: The top plate and leaf become electrically neutral again (both at zero net charge). With no charge difference, there's no repulsion, so the leaf falls back down.\n+ Induction is a temporary rearrangement — remove the external charge, and the induced charge disappears.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "A smoke precipitator (in a chimney) removes dust particles from factory fumes. Explain how static electricity helps. (2 steps)", "answer": "- Step 1: The chimney has charged plates. Dust particles in the passing gas become charged (by friction or by induced charge from the plates).\n- Step 2: The charged dust particles are attracted to the oppositely charged plates (unlike charges attract). They stick to the plates and are removed from the gas stream before it exits the chimney.\n+ This is a practical use of \"charged attracts neutral/charged opposite\" — controlling where particles go.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "In a photocopier, dark areas on the original attract black toner particles onto the paper. Explain the static electricity principle involved. (2 steps)", "answer": "- Step 1: The photoconductive drum is given a uniform charge, then exposed to light. Dark areas keep their charge; light areas lose charge to the grounded backing.\n- Step 2: Negatively charged toner particles are attracted only to the areas that still have positive charge (the dark regions). They stick and are transferred to the paper.\n+ Static allows very precise positional control of charged particles — useful wherever you need to direct where things go.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "Lightning is a giant electrostatic spark. Explain the charging mechanism in a thundercloud and why lightning strikes the ground. (3 steps)", "answer": "- Step 1: Charging: Ice crystals inside storm clouds rub against each other (friction). Electrons are transferred — one part of the cloud becomes negative, another becomes positive.\n- Step 2: The negative base of the cloud induces a positive charge on the ground below (electrons repelled down, leaving positive near surface).\n- Step 3: Air is normally an insulator, but with huge voltage the air \"breaks down\" — it ionizes and becomes conductive. A giant spark (lightning) flows between cloud and ground, or between cloud regions, to discharge the huge charge imbalance.\n+ This is friction charging on a massive scale, with induction creating the opposite charge on the ground.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "A car becomes charged as it drives (friction between tires and road). Why is it safer to discharge it by standing on rubber matting rather than just touching the car? (2 steps)", "answer": "- Step 1: If you touch the car directly while standing on the ground (conductor), the charge will flow rapidly through you to earth — you could get a shock.\n- Step 2: Standing on rubber (an insulator) breaks the path to earth. The charge cannot flow through you — you can safely discharge the car by touching it, because no significant current can flow through the insulating rubber to earth.\n+ Rubber prevents the rapid discharge path through your body — safer discharge method.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}], "count": 39}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "In the nuclide symbol $$^{A}_{Z}\\text{X}$$, what do the subscript and superscript represent, and how do you deduce the neutron count and electron count for a neutral atom?", "answer": "- Step 1: The subscript $$Z$$ is the atomic (proton) number — it counts how many protons sit in the nucleus. This is the fingerprint of the element; change $$Z$$ and you change the element entirely.\n- Step 2: The superscript $$A$$ is the mass number — the total count of nucleons (protons + neutrons) in the nucleus. Electrons are not counted because their mass is negligible compared with the nucleus.\n- Step 3: Neutrons = $$A - Z$$ (subtract the protons from the total nucleons). For a neutral atom, electrons = protons = $$Z$$, because every proton's positive charge must be balanced by exactly one electron for the net charge to be zero.\n\nTakeaway: $$Z$$ identifies the element, $$A - Z$$ gives neutrons, and neutrality forces electrons to match protons.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "Why is the electron's mass treated as negligible in atomic/static-electricity problems, while its charge is treated as fully equal in magnitude to the proton's?", "answer": "- Step 1: The mass ratio $$m_p / m_e \\approx 1840$$ — the proton is roughly two thousand times heavier than the electron. So when summing atomic mass, electron contributions are smaller than rounding error.\n- Step 2: But charge is a different quantity: the electron carries $$-e$$ and the proton carries $$+e$$ with exactly the same magnitude $$e = 1.60 \\times 10^{-19}$$ C. These are not approximations — they are equal and opposite to extraordinary precision.\n- Step 3: This asymmetry (tiny mass, full charge) is precisely why electrons — not protons — are the particles that get shuffled around in charging. They are light enough to be mobile, but each one carries a full unit of charge, so moving them produces real, measurable charge imbalances.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "State the relative charge and relative mass of the proton, neutron, and electron, and explain why \"relative\" values are sufficient for static-electricity questions.", "answer": "- Step 1: Proton: relative charge $$+1$$, relative mass $$1$$.\n- Step 2: Neutron: relative charge $$0$$, relative mass $$1$$.\n- Step 3: Electron: relative charge $$-1$$, relative mass $$\\approx 1/1840 \\approx 0$$.\n- Step 4: \"Relative\" values are sufficient because static-electricity questions ask about ratios and signs — which particle is heavier, which charges repel — not about absolute newtons of force. The actual numbers $$e$$ and $$m_p$$ only matter when computing forces or counting electrons in coulombs.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "What is the principle of conservation of charge, and what physical consequence does it impose on how objects can become positively charged?", "answer": "- Step 1: Conservation of charge says charge is never created or destroyed — only transferred from one object to another. The total charge of a closed system is constant.\n- Step 2: The consequence: you cannot \"add positive charge\" to an object as if positivity were a substance. There is no movable positive particle in everyday charging (protons are locked in the nucleus).\n- Step 3: Therefore an object becomes positive only by losing electrons. The \"positive charge\" is really a deficit of negatives. This is why Alex insisted: \"we can't pick up positive charge, we can just lose negative charge.\"\n\nTakeaway: every charging story is an electron-transfer story.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "What does it mean to say that charge is quantised, and how do you count the number of electrons responsible for a given charge $$Q$$?", "answer": "- Step 1: Quantised means charge comes only in whole-number multiples of a smallest unit — the elementary charge $$e = 1.60 \\times 10^{-19}$$ C. You cannot have half an electron's worth of charge.\n- Step 2: So any charge satisfies $$Q = ne$$, where $$n$$ is an integer (the number of excess or deficit electrons).\n- Step 3: Rearranging, $$n = Q/e$$. For example, a charge of $$1.6 \\times 10^{-18}$$ C corresponds to $$n = 10$$ electrons — directly readable without a calculator if you keep the powers of ten lined up.\n\nTakeaway: charge is grainy at the smallest scale, and every macroscopic charge is just a count of electrons.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "Conceptually, why does a conductor allow charge to flow while an insulator allows static charge to build up?", "answer": "- Step 1: In a conductor (e.g. copper, silver, graphite), the outer electrons are weakly bound to their atoms — they are essentially free to drift through the lattice. Any extra electrons added immediately spread out and flow to wherever they can go.\n- Step 2: In an insulator (e.g. plastic, glass, rubber, wool), electrons are tightly held by their atoms. Extra electrons stay stuck exactly where they were deposited.\n- Step 3: This explains the asymmetry: rub an insulator → the surplus electrons can't escape → static charge sits on the surface. Try the same on a conductor → the surplus flows away (often to earth) → no static build-up.\n\nTakeaway: \"static\" charge is only static because the material won't let electrons move.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "When two materials are rubbed together, which one becomes negative and which becomes positive, and how do you predict this from the electrostatic series?", "answer": "- Step 1: Friction transfers electrons from one surface to the other. Charge is conserved, so the two end up with equal and opposite charges.\n- Step 2: The material with the stronger hold on electrons (lower on the electrostatic series — e.g. rubber, sulphur) takes electrons from the other and becomes negative.\n- Step 3: The material with the weaker hold on electrons (higher on the series — e.g. perspex, glass, wool, hair) loses electrons and becomes positive.\n\nTakeaway: the \"winner\" of the electron tug-of-war goes negative; the \"loser\" goes positive.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "A balloon is rubbed on a wool jumper. State the final charge on each and explain why, in terms of electron transfer.", "answer": "- Step 1: Rubber/balloon material sits low on the electrostatic series (strong hold on electrons), while wool sits high (weak hold on electrons).\n- Step 2: Friction transfers electrons from the wool to the balloon.\n- Step 3: Result: the balloon becomes negative (gained electrons), the wool becomes positive (lost electrons). The magnitudes are equal because charge is conserved.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "State the three rules of electrostatic force and explain why the third rule (a charged object attracts a neutral object) is not a contradiction of the first two.", "answer": "- Step 1: Rule 1 — like charges repel (++ or −−).\n- Step 2: Rule 2 — unlike charges attract (+ and −).\n- Step 3: Rule 3 — a charged object attracts a neutral object.\n- Step 4: Rule 3 is not a contradiction because the neutral object does not stay uniformly neutral when the charged object approaches. The charged object's field rearranges the neutral object's electrons (induction): the near surface becomes oppositely charged, the far surface same-charged.\n+ Since the near, oppositely-charged surface is closer than the far, like-charged surface, the attractive force wins.\n+ So Rule 3 is actually Rule 2 in disguise, applied to the induced near-surface charge.\n\nTakeaway: Rule 3 is an emergent consequence of Rule 2 plus electron mobility.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "Why do two rods that are both negatively charged still repel each other, even though \"negative\" is associated with electrons?", "answer": "- Step 1: The \"+\" or \"−\" of an object refers to its **overall net charge** — the imbalance between electrons and protons — not to individual particle types.\n- Step 2: Two negatively charged rods both have an excess of electrons. The relevant interaction is between the net charges, both of which are negative.\n- Step 3: Like signs (both negative) → repel. The fact that electrons are the carriers doesn't change the rule; it's the net sign that determines the force direction.\n\nTakeaway: the force depends on net sign, not on which particle physically caused the imbalance.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "A charged balloon is brought near a neutral wall and sticks to it. Walk through the mechanism that causes the attraction. (4 steps)", "answer": "- Step 1: The balloon is negatively charged (rubbed earlier). The wall is neutral overall but contains mobile electrons.\n- Step 2: The balloon's negative charge repels the electrons in the wall's surface, pushing them away from the contact region into deeper layers.\n- Step 3: The near side of the wall is now depleted of electrons → it carries a slight positive charge (induced).\n- Step 4: The balloon (negative) and the wall's near surface (now positive) attract by Rule 2. Even though the wall is overall neutral, the close-range attraction outweighs the distant repulsion from the far side.\n\nTakeaway: induction is the secret ingredient that lets a charged object grip a neutral surface.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "What is the key difference between charging by friction and charging by induction?", "answer": "- Step 1: Charging by friction requires **contact and rubbing** between two insulators. Electrons physically transfer from one material to the other, leaving both with permanent (until discharged) net charges.\n- Step 2: Charging by induction requires **no contact**. A charged object is simply brought near a neutral object, and the neutral object's own electrons rearrange internally.\n- Step 3: After induction, if the inducing object is removed without earthing, the neutral object returns to uniform neutrality — the induced charges were only separated, not added. Friction, by contrast, leaves a permanent net imbalance.\n\nTakeaway: friction transfers electrons between objects; induction merely shifts electrons within one object.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "What does it mean to \"earth\" an object, and why does earthing always result in the object becoming neutral?", "answer": "- Step 1: To earth an object means to connect it via a conductor to the ground. The Earth acts as an effectively infinite reservoir of electrons.\n- Step 2: If the object is negatively charged (excess electrons), the surplus electrons flow out of it into the Earth — the Earth easily absorbs them.\n- Step 3: If the object is positively charged (deficit of electrons), electrons flow up from the Earth into the object to fill the deficit.\n- Step 4: Either way, charge \"flows until balanced,\" so the object ends up neutral. This is why earthing is the reliable way to fully discharge any conductor.\n\nTakeaway: the Earth is so large that it can supply or absorb any practical amount of electrons without changing its own state.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Why does static charge only build up on insulators in practice, even though you can in principle move electrons onto any object?", "answer": "- Step 1: When you rub a conductor (e.g. a metal rod held in your hand), electrons do transfer to/from it during friction.\n- Step 2: But because the conductor allows electrons to flow freely, the moment the rod gains/loses electrons, those electrons immediately flow away — usually through your body to earth.\n- Step 3: So no net imbalance accumulates on the conductor; charge is conducted away faster than friction can build it up.\n- Step 4: On an insulator, electrons can't escape from where they were deposited, so the imbalance is locked in place — visible as static charge.\n\nTakeaway: the issue isn't whether you can charge a conductor, but whether the charge stays put.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "What is a gold-leaf electroscope and what physical principle does it exploit to detect charge? (3 steps)", "answer": "- Step 1: An electroscope consists of a metal plate on top, connected by a metal rod to a very thin gold leaf inside an insulated case. The whole metal structure is insulated from the case so charge can't leak away.\n- Step 2: Gold is chosen because it can be beaten into extremely thin sheets — light enough to be deflected by tiny electrostatic forces.\n- Step 3: It works by exploiting Rule 1 (like charges repel): when the metal becomes charged, the leaf and the supporting rod carry the same sign of charge → they repel → the leaf swings outward visibly. The angle of the leaf indicates how much charge is present.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "A negatively charged rod is touched onto the top plate of a neutral gold-leaf electroscope. Explain why the leaf rises, being careful to identify the sign of the leaf. (4 steps)", "answer": "- Step 1: Before contact: the rod is negative; the electroscope's metal (plate + rod + leaf) is neutral.\n- Step 2: On contact: because metal conducts, electrons flow from the rod onto the electroscope's metal, sharing the negative charge throughout the plate, rod and leaf.\n- Step 3: After contact: the leaf is now negatively charged — not neutral. The supporting rod is also negatively charged.\n- Step 4: Leaf and rod have the same sign → they repel → the leaf is pushed outward and rises.\n\nTakeaway: charging by contact transfers charge into the leaf itself, so the leaf rises by repulsion from its own support — not by attraction to the rod.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Why is it a mistake to explain a rising electroscope leaf (after contact charging) as \"the neutral leaf is attracted by the negative rod\"?", "answer": "- Step 1: That explanation is the induction story, where a neutral object stays neutral overall and is attracted to a nearby charge. But in charging by contact, the rod actually touches the metal.\n- Step 2: Once the rod touches the metal of the electroscope, electrons flow into it. So the leaf is no longer neutral — it has gained electrons and become negative.\n- Step 3: A negative leaf supported by a negative rod experiences mutual repulsion, not attraction. The leaf is pushed away from the rod, not pulled towards it.\n- Step 4: The wrong explanation also fails to predict why the leaf stays up after the rod is removed — which is the real signature that the leaf itself is charged.\n\nTakeaway: contact = charge sharing = leaf same sign as rod = repulsion. Don't mix up contact and induction.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "An electroscope is already positively charged (leaf raised). A negative rod is then brought near (not touching). Describe what happens to the leaf and why, including two possible outcomes. (4 steps)", "answer": "- Step 1: Starting state: the metal (plate + rod + leaf) is positive overall, so leaf and rod repel → leaf is raised.\n- Step 2: When a negative rod is brought near the top plate, it attracts the (mobile) electrons inside the metal upward toward the top. This depletes the rod-and-leaf region of positive net charge.\n- Step 3: As the leaf's positive net charge decreases, the repulsion between leaf and supporting rod weakens, so the leaf falls.\n- Step 4: Two outcomes depending on how strong the inducing charge is:\n+ If just enough electrons flow up to neutralise the leaf region exactly, the leaf hangs straight down (neutral).\n+ If even more electrons accumulate, the leaf region overshoots into being net negative — the leaf would rise again, now negatively charged.\n\nTakeaway: a falling leaf signals charge cancellation; you cannot tell from \"leaf flat\" alone whether it's exactly neutral or briefly passing through neutral.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "Why does earthing a charged electroscope cause the leaf to fall exactly to neutral, rather than overshooting?", "answer": "- Step 1: Earthing connects the metal to the ground via a conductor. Charge can flow freely between the electroscope and Earth.\n- Step 2: Electrons flow in whichever direction restores balance — out if the electroscope was negative, in if it was positive.\n- Step 3: Crucially, the flow stops automatically when the electroscope reaches the same electrical state as Earth (i.e. neutral). There is no driving force once balance is achieved.\n- Step 4: Unlike using another charged rod (where you might supply too many or too few electrons), Earth supplies exactly the right number — it's self-regulating.\n\nTakeaway: earthing is a \"thermostat\" for charge — it lands precisely at neutral.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "Walking across a nylon carpet builds up charge on you; touching a metal door handle gives a shock. Explain the full sequence. (4 steps)", "answer": "- Step 1: Nylon is an insulator. As your shoes/clothes rub against it, friction transfers electrons. (Nylon's position in the electrostatic series determines the direction — in this case, electrons move from carpet to you.)\n- Step 2: You become negatively charged. Because your skin/clothes don't conduct perfectly to the carpet (which is itself insulating), the surplus electrons stay on you.\n- Step 3: You then touch a metal handle, which is a conductor connected (directly or indirectly) to earth. This provides a low-resistance path for your surplus electrons to flow away.\n- Step 4: The surplus electrons rush out of you through the handle to earth. That sudden, large electron flow over a short time is a brief but high current — felt as a shock, sometimes visible as a spark.\n\nTakeaway: friction loads you up; the conductor merely opens the floodgate to discharge.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Two polythene rods are each rubbed with a cloth, so both end up positively charged. What happens when they are brought close, and what's the underlying rule?", "answer": "- Step 1: Both rods carry the same sign of charge (both positive).\n- Step 2: By Rule 1 (like charges repel), they push each other away.\n- Step 3: If one rod is suspended freely, it will swing away from the other. The property used in the answer is **like (same-sign) charges repel** — you don't need to re-derive the charging step; the charges are given.\n\nTakeaway: once the signs are known, jump straight to the force rule. Don't waste time re-explaining how they got charged.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Why does a plastic rod, freshly rubbed with a cloth, attract small pieces of paper even though the paper has no net charge? (3 steps)", "answer": "- Step 1: Rubbing has charged the rod (say negatively — electrons moved from cloth to rod). The paper is overall neutral.\n- Step 2: When the rod is brought near, its negative charge induces a separation of charge in the paper: electrons in the paper are pushed away from the rod, leaving the near side of the paper slightly positive.\n- Step 3: The near (positive) side of each paper scrap is attracted to the negative rod by Rule 2 (unlike charges attract). Because that attractive force is between the closer faces, it dominates over the weaker repulsion from the far side, and the scraps jump up.\n\nTakeaway: this is the same induction mechanism as the balloon-on-wall, with the added drama of the paper being light enough to be lifted.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "In the chain \"friction → charge → spark → current\", what physical process does each arrow represent?", "answer": "- Step 1: friction → charge: rubbing two insulators transfers electrons from one to the other, creating a net charge imbalance on each surface.\n- Step 2: charge → spark: when the charged object gets close to a conductor (or another oppositely-charged surface), the electric field can become strong enough to ionise the air, allowing electrons to leap across the gap.\n- Step 3: spark → current: that leaping flow of electrons across the air gap *is* an electric current — short-lived but real. So \"spark\" and \"current\" are the same phenomenon described at different scales.\n\nTakeaway: static and current are not different physics — current is just static charge that has finally found a path to flow.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "Define electric current as a physical quantity, state its defining equation with symbols and units, and explain what one ampere means in concrete terms.", "answer": "- Step 1: Electric current is the rate of flow of charge — how much charge passes a point per unit time. It's a flux quantity.\n- Step 2: The defining equation is $$I = \\dfrac{\\Delta Q}{\\Delta t}$$, where $$I$$ is current in amperes (A), $$\\Delta Q$$ is charge in coulombs (C), and $$\\Delta t$$ is time in seconds (s).\n- Step 3: Concretely, $$1 \\text{ A} = 1 \\text{ C s}^{-1}$$ — one ampere means one coulomb of charge crosses a given cross-section every second. Since $$1$$ C $$\\approx 6.25 \\times 10^{18}$$ electrons, even a 1 A current involves an enormous flow of electrons.\n\nTakeaway: current measures the *rate* of charge flow, not the total amount.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "How are the equations $$Q = ne$$ and $$I = \\Delta Q / \\Delta t$$ combined to count the number of electrons that flow in a given current over a given time? (3 steps)", "answer": "- Step 1: From $$I = \\Delta Q / \\Delta t$$, the total charge that flows in time $$\\Delta t$$ is $$\\Delta Q = I \\Delta t$$.\n- Step 2: From $$Q = ne$$, the number of electrons making up that charge is $$n = \\Delta Q / e$$.\n- Step 3: Combining: $$n = \\dfrac{I \\Delta t}{e}$$. So given a current and a duration, you can directly compute how many electrons flowed — conceptually it's just \"total coulombs ÷ coulombs per electron.\"\n\nTakeaway: $$n = I \\Delta t / e$$ links the macroscopic measurement (amps, seconds) to the microscopic count of charge carriers.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Conceptually, why are \"static electricity\" and \"electric current\" the same physics expressed differently? (3 steps)", "answer": "- Step 1: Both involve the same fundamental entity — charge imbalance, usually a surplus or deficit of electrons. There is no different \"kind\" of charge in static vs current.\n- Step 2: The difference is purely about the path. In static, the charge sits on an insulator and has nowhere to go — it's locked in place. In current, a conductor connects the imbalance, so the electrons drift continuously.\n- Step 3: Inside a battery, an EMF maintains a permanent charge imbalance between terminals (one + one −) — essentially \"permanent static.\" When you wire a conductor between them, that imbalance manifests as continuous current flow.\n\nTakeaway: static = trapped imbalance; current = the same imbalance, released through a conductor.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "In a circuit, which way do electrons actually drift, and how does this differ from \"conventional current\"?", "answer": "- Step 1: Electrons are negatively charged. They are pushed away from the negative terminal of a battery (where electrons accumulate) and pulled toward the positive terminal (deficit of electrons). So electrons drift from − to +.\n- Step 2: Conventional current is defined as the direction positive charge would flow — i.e. from + to −, which is the opposite direction to the actual electron drift.\n- Step 3: This convention predates the discovery of the electron. By the time it was found that electrons (not positive carriers) are what actually move in metals, the convention was too entrenched to change. Both conventions describe the same physics; you just have to flip the arrow in your head when discussing electrons specifically.\n\nTakeaway: in metal wires, the carriers (electrons) drift opposite to conventional current. The physics doesn't care; only the bookkeeping.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "A perspex rod is rubbed with a cloth. Predict the sign of charge on each, explain why, and use this to deduce which is higher on the electrostatic series. (3 steps)", "answer": "- Step 1: Perspex sits high on the electrostatic series — it has a weak hold on electrons. The cloth (depending on material, but typically wool/cotton) sits lower than perspex, meaning it has a stronger hold on electrons.\n- Step 2: When rubbed, electrons transfer from the perspex (weak hold) to the cloth (stronger hold). So the perspex becomes positive (lost electrons) and the cloth becomes negative (gained electrons).\n- Step 3: The direction of electron flow tells you the relative position: whichever ends up negative is lower (stronger hold). Here, the cloth ends up negative, confirming cloth is lower than perspex.\n\nTakeaway: rubbing is a tug-of-war for electrons; the winner (stronger hold) goes negative.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Why is wearing a nylon jacket potentially dangerous at a petrol station, while a metallic or earthed jacket is safe? (4 steps)", "answer": "- Step 1: Nylon is an insulator. As you move and rub against surfaces, friction builds up static charge on the nylon, which can't flow away.\n- Step 2: At a petrol station, fuel vapour in the air is flammable. If the accumulated static suddenly discharges as a spark (e.g. when you touch the metal pump), the spark could ignite the vapour.\n- Step 3: A metallic or earthed jacket, by contrast, is a conductor. Any charge produced by friction is immediately conducted to earth (through the body and shoes, or through an earthing strap), so no large imbalance accumulates.\n- Step 4: No accumulated charge → no spark → no ignition risk. The safety property is electrical (conducting/earthed), not waterproofing or material toughness.\n\nTakeaway: at a fuel station, \"safe\" means \"can't build up enough charge to spark.\" Conductors and earthing prevent the build-up.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "How does electrostatic paint spraying use the rules of electrostatics to give an even coat with minimal waste? (3 steps)", "answer": "- Step 1: At the spray nozzle, paint droplets are charged (say positively — electrons removed). The car body is held at the opposite charge (negative).\n- Step 2: Opposite charges attract (Rule 2), so each droplet is electrostatically pulled toward the car body — including being pulled around corners and into recesses that a straight spray wouldn't reach directly.\n- Step 3: Two benefits: (a) the coating is even, because droplets self-distribute to wherever the field guides them; (b) waste is minimised, because droplets that would otherwise miss the target are recaptured by the electrostatic attraction.\n\nTakeaway: charging the paint converts a ballistic spraying problem into a guided attraction — physics steers the droplets.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "How does lightning illustrate friction charging, induction, and discharge through air all in one phenomenon? (4 steps)", "answer": "- Step 1: Friction charging: inside a storm cloud, ice crystals and water droplets collide and rub against each other. Charge separates — typically the cloud base becomes negative and the upper cloud positive.\n- Step 2: Induction: the negative cloud base induces a positive charge on the ground directly below it (electrons in the ground are repelled deeper down, leaving the surface positive).\n- Step 3: Air is normally an excellent insulator, so the charge sits there — sometimes building voltages of millions of volts.\n- Step 4: When the field becomes strong enough, the air breaks down (ionises), opening a conducting path. A massive discharge — lightning — flows between cloud and ground, equalising the imbalance in milliseconds.\n\nTakeaway: lightning is just a vastly scaled-up version of the carpet-shock — same physics, much more charge and much shorter discharge time.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "A forensic lifting sheet sits on an insulating floor with a metal plate nearby; 10 kV is applied between them. Explain how the sheet becomes negative and the plate becomes positive, and then why neutral dust is lifted onto the sheet. (3 steps)", "answer": "- Step 1: The high voltage drives electrons from the metal plate, through the control unit's circuitry, and onto the lifting sheet. (Note the direction: plate → sheet, because the sheet is being made negative.)\n- Step 2: As a result, the sheet gains electrons → becomes negative; the plate loses electrons → becomes positive. Each ends with a charge imbalance, equal and opposite by conservation.\n- Step 3: The now-charged lifting sheet attracts neutral dust particles by induction (Rule 3 / charged-attracts-neutral): the sheet's charge induces an opposite charge on the near surface of each dust particle, pulling them onto the sheet — preserving the footprint pattern.\n\nTakeaway: exam keyword \"use the idea of charge movement\" — describe the electrons moving and in which direction, not just the end-state.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "Of paper, plastic, silver, and wood — which is the electrical conductor, and what general principle do you use to identify it?", "answer": "- Step 1: Silver is the conductor. It is a metal, and metals have free electrons in their outer shells that can drift through the lattice.\n- Step 2: Paper, plastic, and wood are all insulators — their electrons are tightly bound to individual atoms or molecules, so they cannot flow.\n- Step 3: General principle: metals = conductors; non-metals (with rare exceptions like graphite) = insulators. If the material is a recognisable metal in the question, it's the answer.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "A current of 0.5 A flows through a wire for 2 minutes. Without doing the full calculation, describe conceptually how to find the total charge transferred and roughly how many electrons that represents. (3 steps)", "answer": "- Step 1: Total charge from $$\\Delta Q = I \\Delta t$$. Convert 2 minutes to 120 seconds, multiply by 0.5 A → get 60 C. The conceptual point: charge accumulates linearly with time at a fixed current.\n- Step 2: Number of electrons from $$n = \\Delta Q / e$$. With $$\\Delta Q = 60$$ C and $$e \\approx 1.6 \\times 10^{-19}$$ C, the answer has roughly 60 / (1.6) × $$10^{19}$$ → on the order of $$10^{20}$$ electrons.\n- Step 3: Conceptual takeaway: even a modest 0.5 A current for a couple of minutes moves astronomically many electrons (~$$10^{20}$$) — because each electron carries such a tiny charge, the number must be huge to produce a measurable current.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "Why does a charged object lose its charge faster on a humid day than on a dry day?", "answer": "- Step 1: Humid air contains many water molecules, and water molecules are polar — they have a slight positive end and a slight negative end.\n- Step 2: These polar molecules effectively make the air slightly conductive: they can pick up electrons from a negatively charged object (or donate to a positively charged one) and carry them away.\n- Step 3: So a charged object on a humid day slowly leaks its charge into the surrounding moist air — much faster than on a dry day, where air remains a near-perfect insulator. This is why static experiments work better in dry weather.\n\nTakeaway: water makes everyday air a weak conductor, accelerating the natural discharge of static.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "A student says: \"A neutral object cannot exert an electric force on a charged object, so the force in induction is one-way.\" Why is this wrong?", "answer": "- Step 1: By Newton's third law, every force comes in a pair: if A exerts a force on B, then B exerts an equal and opposite force on A. This applies to electrostatic forces too.\n- Step 2: When a charged object attracts a neutral object by induction, the induced charges on the neutral object (positive near side, negative far side) produce their own field. That field pulls back on the original charged object.\n- Step 3: So both objects feel an attractive force toward each other — the force is mutual, not one-way. The neutral object as a whole does exert a force on the charged object, even though the *net charge* of the neutral object is zero, because the charge separation breaks the symmetry.\n\nTakeaway: net charge zero ≠ no force; the spatial distribution of induced charge matters.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "Conceptually, why must the total charge on the rod plus the total charge on the cloth always sum to zero after rubbing?", "answer": "- Step 1: Before rubbing, both rod and cloth are neutral — total charge in the system is zero.\n- Step 2: Rubbing only transfers electrons from one to the other; it doesn't create or destroy any charge (conservation of charge).\n- Step 3: So if the rod gains $$+Q$$ (lost electrons), the cloth must have gained the corresponding electrons → it carries $$-Q$$. Total = $$+Q + (-Q) = 0$$. The signs are always equal and opposite by conservation.\n\nTakeaway: friction is a redistribution, not a creation — the books must balance.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "If you bring a positively charged rod near a neutral metal sphere (without touching), then while the rod is still close, you briefly earth the sphere, then remove the earth and finally remove the rod — what's the final charge on the sphere, and why? (4 steps)", "answer": "- Step 1: When the positive rod is brought near, it attracts electrons in the metal sphere to the near side. The far side is left positively charged. Net charge is still zero.\n- Step 2: Earth the sphere while the rod is still close. The repelled positive net charge on the far side attracts electrons up from the Earth (or you could say, allows electrons from earth to flow in). Electrons flow from Earth into the sphere.\n- Step 3: Disconnect the earth. The sphere now has extra electrons (more than neutral), but they're still being held on the near side by the rod.\n- Step 4: Remove the rod. The extra electrons redistribute over the sphere uniformly — it is now net negatively charged.\n\nTakeaway: induction + earthing leaves the object with the *opposite* sign to the inducing charge.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Why does a smoke precipitator in a chimney work, in terms of static electricity? (3 steps)", "answer": "- Step 1: Inside a chimney, charged plates (typically held at high voltage) are placed in the path of the rising smoke. The smoke particles, though neutral overall, are subject to induction in the strong field — they polarise.\n- Step 2: The polarised (and often subsequently charged, by contact with ionised gas near the plate) smoke particles are attracted to the oppositely-charged plate by Rule 2 (or by induction / Rule 3).\n- Step 3: The particles stick to the plate instead of escaping the chimney into the atmosphere. The plate is periodically cleaned, removing the collected soot. Net effect: cleaner emissions, using only electrostatic attraction.\n\nTakeaway: same physics as the plastic rod picking up paper, scaled up industrially to scrub pollutants from exhaust gas.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "When you rub a balloon on your hair and lift the balloon away, your hair strands stand up and repel each other. Explain why. (3 steps)", "answer": "- Step 1: Rubbing transfers electrons between balloon and hair. Suppose electrons move onto the balloon — then your hair loses electrons and becomes positively charged.\n- Step 2: Every strand of hair now carries the same sign of charge (all positive). By Rule 1 (like charges repel), each strand repels every other strand.\n- Step 3: Since the strands are flexible and only fixed at the root, they fan apart to maximise separation — standing on end and visibly diverging. The visual effect is a direct demonstration of mutual repulsion between same-sign charges.\n\nTakeaway: many objects sharing the same charge automatically spread apart — the same principle behind the gold leaf rising.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Why is it important in exam answers to describe charging in terms of \"electron transfer in a stated direction\" rather than just \"charge moved\"?", "answer": "- Step 1: Mark schemes typically award points for specifying (i) that electrons are the carriers, (ii) the direction they moved, and (iii) the resulting sign of each object.\n- Step 2: Vague phrases like \"charge moved from A to B\" lose marks because they don't commit to which sign moved, and they ignore the physical fact that only electrons can practically transfer.\n- Step 3: The precise version — \"electrons moved from A to B, so A becomes positive and B becomes negative\" — covers all three marking points simultaneously and matches the language of the specification.\n\nTakeaway: be specific. Electrons, direction, resulting signs — every time.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "A common misconception: \"If both objects start neutral and end with equal and opposite charges, then negative charge was created on one and positive charge on the other.\" What's the correct picture?", "answer": "- Step 1: No new charge is created anywhere — conservation of charge forbids it. Both signs were already present before rubbing, in the form of protons (in nuclei) and electrons (in atoms) within each object, in equal numbers.\n- Step 2: What changed is the *location* of electrons. Some electrons that used to belong to object A are now on object B. Object A has unmasked positive (its protons no longer fully balanced); object B has extra electrons.\n- Step 3: So \"becoming positive\" doesn't mean creating positive — it means revealing pre-existing protons by removing the electrons that were screening them. The accounting is just relocation, never creation.\n\nTakeaway: charging exposes asymmetry that was always latent; it doesn't manufacture new charge.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "Why does charging by induction (without earthing) produce no net charge on the originally neutral object, while charging by induction *with* earthing does produce a net charge?", "answer": "- Step 1: In pure induction (no earth), bringing a charged object near merely separates the existing electrons within the neutral object — they shift to the far side, leaving the near side positive. But the total number of electrons on the object hasn't changed. Net charge stays zero.\n- Step 2: When the inducing object is removed, the electrons relax back into a uniform distribution. The neutral object returns to perfectly neutral.\n- Step 3: With earthing, while the inducer is still close, a path opens to or from Earth. Electrons either flow in (if the far side was repelled) or flow out (if the near side was attracted), changing the *total* electron count on the object.\n- Step 4: Once you disconnect the earth and remove the inducer, the object has a permanent net charge — equal in magnitude to the amount of charge that flowed via earth, and opposite in sign to the inducer.\n\nTakeaway: induction alone is reversible (no permanent change); induction + earthing is irreversible (permanent net charge).", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "Conceptually compare the physical processes in (i) charging by friction, (ii) charging by contact, (iii) charging by induction. What's transferred or rearranged in each?", "answer": "- Step 1: Friction (two insulators): electrons physically rip from one surface to the other due to mechanical rubbing. Net charge appears on both objects.\n- Step 2: Contact (touching a charged conductor to another conductor): electrons flow through the touch point until charge is shared. Both end with the same sign as the original charged object.\n- Step 3: Induction (no touching): the charged object's field rearranges electrons *within* a neutral conductor. No transfer between objects; just redistribution inside one. If earthing is added, electrons can flow to/from Earth, producing a permanent charge with opposite sign to the inducer.\n- Step 4: Pattern:\n+ Friction: transfers between two insulators (mechanical).\n+ Contact: shares between two conductors (electrical).\n+ Induction: rearranges within one conductor (field-driven, no transfer unless earthed).\n\nTakeaway: three distinct mechanisms — different setups, different outcomes, but all based on moving electrons.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "Why does the leaf of an electroscope NOT rise when you bring a charged rod *near* (without touching) a neutral electroscope, but it does rise when the same rod *touches* the top plate?", "answer": "- Step 1: When you bring the rod near without touching, induction occurs: electrons in the metal redistribute. If the rod is negative, electrons in the metal are repelled downward — accumulating in the leaf and rod region.\n- Step 2: Actually — the leaf and rod region accumulates electrons (becomes negative), and the top plate becomes positive. So the leaf does rise! (This is induction-only behaviour, and it works on an electroscope.)\n- Step 3: Caveat: when you remove the rod (without earthing), everything relaxes back to uniform neutrality, and the leaf falls again. The deflection is temporary.\n- Step 4: With contact, electrons are actually transferred onto the electroscope. The deflection persists after the rod is removed — that's the diagnostic difference. The leaf rising while the rod is near doesn't prove charging; the leaf staying up after the rod is gone does.\n\nTakeaway: induction can lift the leaf temporarily, but only contact (or induction + earthing) leaves a permanent deflection.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "Why is the proton number, not the neutron number, what defines an element?", "answer": "- Step 1: The chemical and electrical identity of an atom is determined by how many electrons it has in its neutral state, which equals the number of protons.\n- Step 2: Electrons are what participate in chemical bonding and electromagnetic interactions, so the electron count dictates how the atom behaves — and that count is fixed by the proton number $$Z$$.\n- Step 3: Neutrons add mass but no charge, so they affect isotope properties (mass, nuclear stability) but not chemical identity. Two atoms with the same $$Z$$ but different $$A$$ are isotopes of the same element — chemically identical, just heavier or lighter.\n\nTakeaway: $$Z$$ = chemical identity card; $$A - Z$$ = isotope variant.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "Suppose a charge of $$3.2 \\times 10^{-18}$$ C is transferred from object A to object B. Conceptually deduce how many electrons moved and the sign change of each object.", "answer": "- Step 1: Use $$n = Q/e$$. With $$Q = 3.2 \\times 10^{-18}$$ C and $$e = 1.6 \\times 10^{-19}$$ C, the ratio is 3.2/1.6 = 2 with an exponent difference of $$10^{-18}/10^{-19} = 10$$. So $$n = 20$$ electrons.\n- Step 2: Because electrons moved from A to B, object A lost 20 electrons → A becomes positive (charge $$+3.2 \\times 10^{-18}$$ C). Object B gained 20 electrons → B becomes negative (charge $$-3.2 \\times 10^{-18}$$ C).\n- Step 3: Check conservation: the total charge before was zero; after, it's $$(+3.2 \\times 10^{-18}) + (-3.2 \\times 10^{-18}) = 0$$. Balanced.\n\nTakeaway: every charge transfer can be counted exactly as an integer number of electrons.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Why does the lesson treat \"static\" and \"current\" as ends of a single continuum rather than two separate topics?", "answer": "- Step 1: Both phenomena involve the same physical entity — a charge imbalance, almost always caused by relocated electrons. There is no fundamental difference in what's there.\n- Step 2: The only distinction is whether the imbalance is *trapped* (static — sits on an insulator, can't flow) or *flowing* (current — moves through a conductor).\n- Step 3: The transition is literally the act of providing a conducting path. The Family Guy carpet shock is static; touching the door handle turns it into a (brief) current. A battery is \"frozen static\" until you connect a wire and it becomes current.\n\nTakeaway: static and current are the same physics differing only in whether the path is open or closed.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}], "count": 48}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "In the nuclide symbol $$^{A}_{Z}X$$, what do $$A$$ and $$Z$$ tell you, and how do you get the neutron count and electron count (for a neutral atom)? (3 steps)", "answer": "- Step 1: $$Z$$ is the **atomic (proton) number** — the number of protons in the nucleus. This number defines which element you have.\n- Step 2: $$A$$ is the **mass number** — the total count of nucleons (protons + neutrons). So the number of neutrons is $$A - Z$$.\n- Step 3: A neutral atom has zero net charge, which means electrons must exactly balance protons. So electrons $$= Z$$. For helium $$^{4}_{2}\\text{He}$$: 2 protons, $$4-2=2$$ neutrons, 2 electrons.\n\nThe trick: $$Z$$ alone fixes *both* the proton count and (when neutral) the electron count.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Why is it the electron (and not the proton) that moves when charge is transferred or when a current flows?", "answer": "The electron sits on the *outside* of the atom, loosely held — especially the outer ones in a metal, which are barely bound to any one nucleus. The proton sits buried deep in the nucleus, bound by the strong nuclear force, and is roughly **1840 times more massive** than the electron ($$m_p/m_e \\approx 1.67 \\times 10^{-27} / 9.11 \\times 10^{-31} \\approx 1830$$). So the electron is both physically accessible (on the outside) and dynamically nimble (tiny mass). Moving a proton would require ripping apart a nucleus; moving an electron just requires friction or a small voltage. This is why every static-electricity story is an electron-transfer story.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "State the relative charge and relative mass of the proton, neutron, and electron, a
