<script>
const DATA={"selected": [{"question": "Why is the electrostatic series chart useful when predicting the outcome of rubbing two insulators together? What does it tell you that you couldn't know otherwise? (2 steps)", "answer": "- Step 1: The chart ranks materials by their electron affinity (how strongly they hold electrons). When you rub any two materials together, you can look at their positions: the one *lower* on the chart holds electrons more strongly and will *gain* electrons (become negative), while the one *higher* will *lose* electrons (become positive).\n- Step 2: Without the chart, you'd have to memorise the outcome for every pair of materials. The chart gives you a general rule: whichever material is lower takes electrons and goes negative. This is why Alex could predict the sign of charge on any rubbed pair, even ones he hadn't seen before.", "source": "GLM 5.1 ③", "_id": "glm_3_47"}, {"question": "Misconception probe: \"If two objects are both charged, they must attract each other.\" Give a counterexample and state the correct rule. (2 steps)", "answer": "- Step 1: Counterexample: two negatively charged rods repel each other, even though both are charged. Being charged is not sufficient for attraction — the *signs* must be opposite.\n- Step 2: The correct rule: the force depends on whether the charges are like or unlike. Like charges (both positive or both negative) repel. Unlike charges (one positive, one negative) attract. A charged object can also attract a neutral object (by induction), but two objects with the same sign *always* repel.", "source": "GLM 5.1 ③", "_id": "glm_3_50"}, {"question": "Why does a charged plastic rod attract small pieces of paper but NOT repel them, even though the paper is a neutral insulator? What would happen if the paper were a conductor instead? (3 steps)", "answer": "- Step 1: The paper is neutral and insulating. The charged rod induces charge separation within each piece of paper: electrons in the paper are repelled to the far side, leaving the near side oppositely charged. The near-side attraction outweighs the far-side repulsion (because the near side is closer), so there is a net attractive force. The paper is pulled toward the rod.\n- Step 2: The paper is NOT repelled because it has no net charge of the same sign as the rod. The overall charge is zero — only the local separation creates the attraction. There is no repulsive force to overcome the attraction.\n- Step 3: If the paper were a conductor, the same induction would occur, but more effectively (free electrons move more easily). The attraction would still happen by the same mechanism. The key difference: a conductor could also be charged by *contact* if the rod touched it, after which it would have the same sign and would be *repelled*. But at a distance, induction produces attraction for both conductors and insulators.\n\nThe rule \"charged attracts neutral\" applies to both conductors and insulators — induction works in both cases.", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "Explain how lightning forms, identifying the charging mechanism and the discharge mechanism. (3 steps)", "answer": "- Step 1: *Charging by friction.* Inside a storm cloud, ice crystals and water droplets collide and rub against each other. This friction transfers charge — typically, the smaller ice crystals become positive and rise, while larger particles become negative and sink. The cloud base becomes negatively charged.\n- Step 2: *Induction on the ground.* The negative cloud base induce a positive charge on the ground below (electrons in the ground are repelled away from the surface, leaving the surface positive).\n- Step 3: *Discharge.* Air is normally a good insulator, but when the voltage (potential difference) between cloud and ground becomes high enough, the air *breaks down* — it ionises and becomes conducting. A massive spark (lightning) flows between the cloud and the ground, neutralising the charge separation.\n\nLightning is the same friction → charge → spark → current chain, but on an atmospheric scale.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "A forensic lifting sheet sits on an insulating floor with a metal plate nearby; 10 kV is applied between them. Explain how the sheet becomes negative and the plate becomes positive, and then why neutral dust is lifted onto the sheet. (3 steps)", "answer": "- Step 1: The high voltage drives electrons from the metal plate, through the control unit's circuitry, and onto the lifting sheet. (Note the direction: plate → sheet, because the sheet is being made negative.)\n- Step 2: As a result, the sheet gains electrons → becomes negative; the plate loses electrons → becomes positive. Each ends with a charge imbalance, equal and opposite by conservation.\n- Step 3: The now-charged lifting sheet attracts neutral dust particles by induction (Rule 3 / charged-attracts-neutral): the sheet's charge induces an opposite charge on the near surface of each dust particle, pulling them onto the sheet — preserving the footprint pattern.\n\nTakeaway: exam keyword \"use the idea of charge movement\" — describe the electrons moving and in which direction, not just the end-state.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Why can you NOT charge a pure copper rod by rubbing it with a cloth, even though friction is occurring? (2 steps)", "answer": "- Step 1: Friction does transfer electrons between the cloth and the copper surface. However, copper is a conductor — it has free electrons that can move throughout the material.\n- Step 2: Any charge that builds up on the copper immediately redistributes itself. If the copper is held in an insulating handle, some local charge may remain briefly, but if the copper is in contact with your hand or any earthed surface, the charge flows away instantly. You cannot produce a *lasting* static charge on a conductor by friction alone — the charge drains away too fast.\n\nThis is why all the friction-charging examples in this topic use insulators (plastic rods, balloons, carpets): only insulators trap the charge in place.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "What does it mean to say charge is **quantised**, and what is the relationship $$Q = ne$$ telling you? (2 steps)", "answer": "- Step 1: Quantisation means charge comes only in whole-number multiples of the elementary charge $$e = 1.60 \\times 10^{-19}\\,\\text{C}$$. You can't have half an electron's worth of charge sitting on an object — only integer counts.\n- Step 2: So if an object has gained or lost $$n$$ electrons, its net charge magnitude is $$Q = ne$$, with $$n$$ an integer. Rearranged: $$n = Q/e$$ counts how many electrons account for an observed charge. E.g. a charge of $$10\\,\\mu\\text{C}$$ corresponds to roughly $$10^{-5}/10^{-19} = 10^{14}$$ electrons — an enormous number, which is why even \"tiny\" static charges involve vast numbers of electrons.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "How does lightning illustrate friction charging, induction, and discharge through air all in one phenomenon? (4 steps)", "answer": "- Step 1: Friction charging: inside a storm cloud, ice crystals and water droplets collide and rub against each other. Charge separates — typically the cloud base becomes negative and the upper cloud positive.\n- Step 2: Induction: the negative cloud base induces a positive charge on the ground directly below it (electrons in the ground are repelled deeper down, leaving the surface positive).\n- Step 3: Air is normally an excellent insulator, so the charge sits there — sometimes building voltages of millions of volts.\n- Step 4: When the field becomes strong enough, the air breaks down (ionises), opening a conducting path. A massive discharge — lightning — flows between cloud and ground, equalising the imbalance in milliseconds.\n\nTakeaway: lightning is just a vastly scaled-up version of the carpet-shock — same physics, much more charge and much shorter discharge time.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "A student says: \"A neutral object cannot exert an electric force on a charged object, so the force in induction is one-way.\" Why is this wrong?", "answer": "- Step 1: By Newton's third law, every force comes in a pair: if A exerts a force on B, then B exerts an equal and opposite force on A. This applies to electrostatic forces too.\n- Step 2: When a charged object attracts a neutral object by induction, the induced charges on the neutral object (positive near side, negative far side) produce their own field. That field pulls back on the original charged object.\n- Step 3: So both objects feel an attractive force toward each other — the force is mutual, not one-way. The neutral object as a whole does exert a force on the charged object, even though the *net charge* of the neutral object is zero, because the charge separation breaks the symmetry.\n\nTakeaway: net charge zero ≠ no force; the spatial distribution of induced charge matters.", "source": "Opus 4.7 ①", "_id": "opus_1_35"}, {"question": "A charged balloon is brought near a neutral wall and sticks to it. Walk through the mechanism that causes the attraction. (4 steps)", "answer": "- Step 1: The balloon is negatively charged (rubbed earlier). The wall is neutral overall but contains mobile electrons.\n- Step 2: The balloon's negative charge repels the electrons in the wall's surface, pushing them away from the contact region into deeper layers.\n- Step 3: The near side of the wall is now depleted of electrons → it carries a slight positive charge (induced).\n- Step 4: The balloon (negative) and the wall's near surface (now positive) attract by Rule 2. Even though the wall is overall neutral, the close-range attraction outweighs the distant repulsion from the far side.\n\nTakeaway: induction is the secret ingredient that lets a charged object grip a neutral surface.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "A negatively charged balloon is brought near a neutral wall. The balloon sticks to the wall. Explain step-by-step why this happens, even though the wall started neutral. (3 steps)", "answer": "- Step 1: The balloon is negative, so it creates an electric field that pushes on the electrons in the wall. Electrons in the wall are repelled away from the balloon, towards the far side of the wall.\n- Step 2: The near side of the wall now has a deficit of electrons — it has become positively charged (induced charge). The far side has an excess of electrons — negatively charged. The wall is *still neutral overall*, but charge has been *redistributed* (polarised).\n- Step 3: The near side of the wall (positive) is closer to the balloon (negative) than the far side (negative). The attractive force between near-side and balloon is stronger than the repulsive force from the far side (because force falls off with distance). Net result: attraction — the balloon sticks.\n\nThis is the \"charged object attracts a neutral object\" rule, explained by induction.", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "What is the difference between **charging by friction** and **charging by induction**? (2 steps)", "answer": "- Step 1: **Friction** — two insulators in physical contact, rubbed together. Electrons are forcibly transferred from one to the other. Both objects end up with net charge (equal and opposite). No third party involved.\n- Step 2: **Induction** — a charged object is brought *near* (not touching) another object. The other object's electrons rearrange internally (move to one side), making it **polarised**. If the object is not touched/earthed, it's still neutral overall — just lopsided in distribution. If it *is* earthed during the induction, some electrons flow to/from earth, and when the earth connection is broken, the object is left with a net charge of the *opposite* sign to the inducing object.\n\nQuick test: friction needs contact and transfers electrons between the two objects; induction is at a distance and only rearranges (or, with earthing, swaps with earth).", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "Synthesis question: A balloon is rubbed on hair, then held near a thin stream of water from a tap. The water stream bends toward the balloon. Walk through everything that has to be true for this to happen, drawing on multiple concepts from the topic. (4 steps)", "answer": "- Step 1: **Friction charging**: the balloon (lower on the electrostatic series than hair) gains electrons during rubbing — it becomes negative. Hair becomes positive. Conservation of charge holds.\n- Step 2: The balloon is plastic — an **insulator** — so the charge stays put on the balloon's surface. (If the balloon were a conductor and you were holding it, the charge would leak to earth via you, and you'd see nothing.)\n- Step 3: The water stream is neutral overall, but water molecules are polar — they have a permanent dipole. Even without polar molecules, the bulk water polarises in the balloon's field: electrons in the water shift slightly, leaving the near side positive.\n- Step 4: The negative balloon attracts the (now-positive) near side of the water. Since attraction acts on the surface molecules, the stream visibly bends toward the balloon. This combines friction-charging, charge persistence on an insulator, polarisation/induction, and \"charged attracts neutral\" — the entire topic in one demonstration.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "An electroscope is positively charged. You want to return it to exactly neutral. Why is earthing more reliable than trying to add exactly the right number of electrons with a rod? (2 steps)", "answer": "- Step 1: If you use a negatively charged rod, it is difficult to control exactly how many electrons transfer. You might add too few (still slightly positive) or too many (overshoot to negative). The leaf would fall and then potentially rise again.\n- Step 2: Earthing connects the electroscope to the Earth, an effectively infinite charge reservoir. Electrons flow from Earth into the electroscope until it is exactly neutral, then stop — because once neutral, there is no longer any driving force for electron flow. The system self-regulates to exactly zero charge.\n\nThis is why earthing is the reliable, standard way to fully discharge any object.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "What does \"charge is quantised\" mean? Write the formula and explain why charge can never be a non-integer multiple of $$e$$. (2 steps)", "answer": "- Step 1: Quantisation means charge comes in discrete packets. The smallest possible packet is the elementary charge $$e = 1.60 \\times 10^{-19}\\text{ C}$$. Any object's charge is an integer multiple of this: $$Q = ne$$, where $$n$$ is a whole number (1, 2, 3, …).\n- Step 2: You cannot have half an electron, or 2.7 electrons transferred. Since each electron carries exactly $$-e$$, the total charge transferred is always a whole number times $$e$$. An object can have charge $$+3e$$ or $$-100e$$, but never $$+2.5e$$. In practice, because $$n$$ is astronomically large in macroscopic situations (billions of billions of electrons), the charge *appears* continuous — but fundamentally it is always quantised.\n\nTo find how many electrons correspond to a charge $$Q$$: rearrange to $$n = Q / e$$.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "Explain how electrostatic paint spraying works. Why does it give a more even coat with less waste? (3 steps)", "answer": "- Step 1: At the spray nozzle, the paint droplets are charged positive — electrons are removed from the paint as it is sprayed.\n- Step 2: The car body is charged negative (opposite charge). Unlike charges attract, so the positively charged paint droplets are pulled toward the negatively charged car body.\n- Step 3: Because the attraction is electrostatic, the paint droplets are drawn toward the car even around curves and into hidden/recessed areas that a simple spray might miss. Also, since all the paint droplets carry the same (positive) charge, they repel each other and spread out evenly, reducing clumping. Less paint misses the car, so there is less waste.\n\nThe key physics: unlike charges attract (paint to car) and like charges repel (paint droplets spread evenly).", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "A common misconception: \"If both objects start neutral and end with equal and opposite charges, then negative charge was created on one and positive charge on the other.\" What's the correct picture?", "answer": "- Step 1: No new charge is created anywhere — conservation of charge forbids it. Both signs were already present before rubbing, in the form of protons (in nuclei) and electrons (in atoms) within each object, in equal numbers.\n- Step 2: What changed is the *location* of electrons. Some electrons that used to belong to object A are now on object B. Object A has unmasked positive (its protons no longer fully balanced); object B has extra electrons.\n- Step 3: So \"becoming positive\" doesn't mean creating positive — it means revealing pre-existing protons by removing the electrons that were screening them. The accounting is just relocation, never creation.\n\nTakeaway: charging exposes asymmetry that was always latent; it doesn't manufacture new charge.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "How do you combine $$Q = ne$$ and $$I = \\Delta Q / \\Delta t$$ to find the number of electrons flowing in a current? Derive the combined formula. (3 steps)", "answer": "- Step 1: From $$Q = ne$$, the number of electrons responsible for a charge $$Q$$ is $$n = Q/e$$.\n- Step 2: From $$I = \\Delta Q / \\Delta t$$, the total charge flowing in time $$\\Delta t$$ is $$\\Delta Q = I\\Delta t$$.\n- Step 3: Substitute: $$n = \\frac{\\Delta Q}{e} = \\frac{I\\Delta t}{e}$$. This gives the number of electrons that flow past a point when a current $$I$$ flows for time $$\\Delta t$$.\n\nFor example, a current of 1 A for 1 s delivers $$\\Delta Q = 1$$ C, which is $$n = 1/(1.6 \\times 10^{-19}) \\approx 6.25 \\times 10^{18}$$ electrons — an enormous number.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "Edge case: Two objects with very different masses (a tiny piece of foil vs a heavy table) both carry the same amount of charge. They're brought close. What dominates the *visible* response, and why?", "answer": "The foil moves dramatically; the table doesn't visibly move at all. The **electric force** on each is the same in magnitude (Newton's third law — they push/pull each other equally). But the *acceleration* is force divided by mass. The foil's tiny mass means a huge acceleration; the table's huge mass means a microscopic acceleration. So in electrostatic demonstrations you always see light objects (paper, balloons, gold leaf) responding to forces — because *acceleration*, not force, is what's visible. This is also why gold (beaten thin and light) is used for the electroscope leaf rather than a thicker, heavier sheet.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "To find the number of electrons flowing in a current, you need the current $$I$$, the time $$\\Delta t$$, and the elementary charge $$e$$. Derive the formula for the number of electrons $$n$$, explaining how the two key equations link together. (3 steps)", "answer": "- Step 1: Start with the definition of current: $$I = \\Delta Q / \\Delta t$$. Rearrange to find the total charge that flows: $$\\Delta Q = I \\Delta t$$.\n- Step 2: Recognise that this total charge $$\\Delta Q$$ is made up of individual electrons, each carrying charge $$e$$. The quantisation equation is $$\\Delta Q = n e$$.\n- Step 3: Substitute the expression for $$\\Delta Q$$ from Step 1 into Step 2: $$I \\Delta t = n e$$. Rearrange to solve for the number of electrons: $$n = I \\Delta t / e$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "What is the key structural difference between a conductor and an insulator that determines whether static charge can build up on a material? (2 steps)", "answer": "- Step 1: In a conductor (e.g., copper, gold, graphite), some electrons are delocalised — free to move throughout the material. If the conductor gains extra electrons, they spread out and, if a path exists, flow away to earth or another object. Charge cannot remain localised.\n- Step 2: In an insulator (e.g., plastic, polythene, glass, rubber, wool), electrons are tightly bound to their atoms and cannot flow freely. Extra electrons placed on an insulator are *stuck* where they land — they cannot redistribute or flow away. This is why static charge only builds up on insulators.\n\nAlex's Teacher Notes: a static charge imbalance \"only happens on insulators\" — on a conductor the charge would just flow away.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "Conceptually, what is the connection between **static electricity** and an **electric current** flowing in a wire? (2 steps)", "answer": "- Step 1: Both involve the same fundamental phenomenon: an **imbalance of charge** (excess electrons somewhere, deficit elsewhere). Static electricity is this imbalance held *fixed* on an insulator; an electric current is the same imbalance, but with a *conductor* providing a path so the electrons can flow continuously from the surplus to the deficit.\n- Step 2: A battery is just a device that *maintains* the imbalance — chemistry inside the cell keeps removing electrons from one terminal and depositing them on the other. Connect the terminals with a wire and you've made the static imbalance \"flow\" — current. So a battery + wire is structurally the same as a charged rod + wire to earth: charge flowing because it can.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "Why is it a mistake to explain a rising electroscope leaf (after contact charging) as \"the neutral leaf is attracted by the negative rod\"?", "answer": "- Step 1: That explanation is the induction story, where a neutral object stays neutral overall and is attracted to a nearby charge. But in charging by contact, the rod actually touches the metal.\n- Step 2: Once the rod touches the metal of the electroscope, electrons flow into it. So the leaf is no longer neutral — it has gained electrons and become negative.\n- Step 3: A negative leaf supported by a negative rod experiences mutual repulsion, not attraction. The leaf is pushed away from the rod, not pulled towards it.\n- Step 4: The wrong explanation also fails to predict why the leaf stays up after the rod is removed — which is the real signature that the leaf itself is charged.\n\nTakeaway: contact = charge sharing = leaf same sign as rod = repulsion. Don't mix up contact and induction.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "Synthesis question: Explain how electrostatic paint spraying uses BOTH the \"like charges repel\" and \"unlike charges attract\" rules to produce an even, efficient coat. (3 steps)", "answer": "- Step 1: At the nozzle, paint droplets are charged positive (electrons removed). Since all droplets carry the same (positive) charge, *like charges repel* — the droplets push each other apart as they leave the nozzle. This causes them to spread out into a fine, even mist rather than clumping together.\n- Step 2: The car body is charged negative. As the positively charged droplets approach, *unlike charges attract* — the droplets are pulled toward the car body, even around curves and into recessed areas that a simple directional spray would miss.\n- Step 3: The combination gives a superior result: repulsion between droplets ensures even coverage (no clumping), and attraction to the car ensures minimal waste (droplets are pulled to the car rather than drifting past). Both rules are essential — one without the other would give a worse result.\n\nThis is a practical application where both electrostatic rules work together.", "source": "GLM 5.1 ①", "_id": "glm_1_59"}, {"question": "In the nuclide symbol $$^{A}_{Z}\\text{X}$$, what does the bottom number $$Z$$ represent, and what does the top number $$A$$ represent? How do you find the number of neutrons? (3 steps)", "answer": "- Step 1: The bottom number $$Z$$ is the atomic (proton) number — it tells you the number of protons in the nucleus. This identifies the element.\n- Step 2: The top number $$A$$ is the mass number — it tells you the total number of nucleons (protons + neutrons) in the nucleus.\n- Step 3: To find the number of neutrons, subtract: $$\\text{neutrons} = A - Z$$. For example, $$^{4}_{2}\\text{He}$$ has $$Z=2$$ protons and $$A-Z = 4-2 = 2$$ neutrons.\n\nThe mass number counts *nuclear particles only* — electrons are not included because their mass is negligible compared to nucleons.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "State the principle of conservation of charge. Why does this mean you can only *move* charge, never *create* it? (2 steps)", "answer": "- Step 1: The conservation of charge states: charge cannot be created or destroyed; charged particles can only be transferred between objects. The total charge of a closed system is always constant.\n- Step 2: This means when one object becomes charged, another object must receive or lose an equal and opposite charge. For example, if an object gains 5 electrons (becoming more negative by $$5e$$), those 5 electrons came from somewhere — the donor object lost 5 electrons and became more positive by $$5e$$. The net charge of both objects combined hasn't changed; it has just been redistributed.\n\nThis is analogous to conservation of energy — you redistribute it, you don't create or destroy it.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "A student charges an electroscope by contact with a negative rod and says \"the leaf rises because the neutral leaf is attracted to the negative rod.\" What is wrong with this explanation? (2 steps)", "answer": "- Step 1: The leaf is NOT neutral after contact. When the negative rod touches the metal, electrons flow into the entire metal system (plate, rod, leaf). The leaf becomes negatively charged — the same sign as the rod inside the electroscope.\n- Step 2: Since both the leaf and the rod are now negative (same charge), they repel — the leaf rises by repulsion, not attraction. Attraction of a neutral object is the *induction* story (bringing a charged object near without touching). By *contact*, charge is shared, so the leaf takes the same sign as the charging rod.\n\nThis was Phuc's error twice in the lesson. The fix: contact → charge shared → same sign → repulsion. Induction → no contact → neutral attracted.", "source": "GLM 5.1 ①", "_id": "glm_1_24"}, {"question": "On the Electrostatic Series Chart, materials near the top tend to become positive when rubbed, while materials near the bottom tend to become negative. What property of the material determines its position on this chart? (2 steps)", "answer": "- Step 1: Position on the chart is determined by how strongly the material holds onto its electrons. Materials near the top (acetate, perspex, glass, wool, hair) have a *weak* hold on electrons — they tend to lose them when rubbed, becoming positive.\n- Step 2: Materials near the bottom (rubber, sulphur, platinum, gold) have a *strong* hold on electrons — they tend to gain electrons when rubbed, becoming negative. When you rub any two materials together, the one with the stronger hold on electrons (lower on the chart) takes electrons from the other and becomes negative.\n\nNote: the lower group includes good conductors (platinum, gold), but the chart is about electron affinity, not conductivity. Alex corrected his own slip on this — don't confuse \"holds electrons strongly\" with \"is an insulator.\"", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "If you bring a positively charged rod near a neutral metal sphere (without touching), then while the rod is still close, you briefly earth the sphere, then remove the earth and finally remove the rod — what's the final charge on the sphere, and why? (4 steps)", "answer": "- Step 1: When the positive rod is brought near, it attracts electrons in the metal sphere to the near side. The far side is left positively charged. Net charge is still zero.\n- Step 2: Earth the sphere while the rod is still close. The repelled positive net charge on the far side attracts electrons up from the Earth (or you could say, allows electrons from earth to flow in). Electrons flow from Earth into the sphere.\n- Step 3: Disconnect the earth. The sphere now has extra electrons (more than neutral), but they're still being held on the near side by the rod.\n- Step 4: Remove the rod. The extra electrons redistribute over the sphere uniformly — it is now net negatively charged.\n\nTakeaway: induction + earthing leaves the object with the *opposite* sign to the inducing charge.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "In the chain \"friction → charge → spark → current\", what physical process does each arrow represent?", "answer": "- Step 1: friction → charge: rubbing two insulators transfers electrons from one to the other, creating a net charge imbalance on each surface.\n- Step 2: charge → spark: when the charged object gets close to a conductor (or another oppositely-charged surface), the electric field can become strong enough to ionise the air, allowing electrons to leap across the gap.\n- Step 3: spark → current: that leaping flow of electrons across the air gap *is* an electric current — short-lived but real. So \"spark\" and \"current\" are the same phenomenon described at different scales.\n\nTakeaway: static and current are not different physics — current is just static charge that has finally found a path to flow.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "Why is it the electrons that are transferred during static charging, rather than protons, based on their relative masses and locations within the atom? (2 steps)", "answer": "- Step 1: Location matters. Protons are locked inside the nucleus, bound by the strong nuclear force, making them incredibly difficult to remove. Electrons, however, orbit on the outside of the atom and are only held by the electromagnetic attraction to the nucleus, making them accessible to external forces.\n- Step 2: Mass matters. The electron has a relative mass of approximately $$1/1840$$ (nearly 0), while a proton has a relative mass of 1. Because electrons are roughly 1840 times lighter than protons, they require significantly less energy to move.\n+ Takeaway: Electrons are the \"mobile\" charge carriers because they are on the outside and extremely light.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "Synthesis: Why is a battery + wire \"really just static electricity in motion,\" and what role does the conductor play in the difference?", "answer": "A battery maintains a chemical imbalance that pushes electrons onto one terminal (making it negative) and removes them from the other (making it positive). If the terminals are isolated (no wire), this is identical to a charged-rod situation — a frozen imbalance, static. The instant you connect the terminals with a conductor, you give the surplus electrons a continuous *path* to flow from the − terminal back to the + terminal. The wire (conductor) is the thing that converts static-charge-stored-up-in-the-battery into a flowing current. So **conductor + voltage source = current**; remove the conductor, and you're back to static. The battery only needs to \"top up\" the imbalance as fast as electrons drain across, because chemistry replenishes the terminals continuously.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Synthesis: A petrol-station attendant uses a metal nozzle to fill a car. Friction inside the hose builds up charge. Why does this situation not produce a dangerous spark, when the same friction-charging *could* be deadly if the nozzle were plastic? (3 steps)", "answer": "- Step 1: Fuel flowing through any hose generates friction-charging on the fuel and the inner hose wall — this is unavoidable. So the question isn't whether charge is created, but where it goes.\n- Step 2: With a **metal nozzle** in contact with the car (or grounded via the pump), the nozzle is a conductor with a path to earth. Charge that builds up on the fuel or hose interior leaks continuously through the metal to ground at the rate it's generated. No accumulation, no spark.\n- Step 3: With a **plastic nozzle** (insulator), the charge would have nowhere to go. It would accumulate on the nozzle surface until the voltage was high enough to spark to the (earthed) car body or the attendant's hand. With petrol vapour around, that spark could ignite the fuel-air mixture.\n\nThe general rule: hazards live wherever insulators isolate accumulating charge from earth.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "Why can an object become positive only by *losing* electrons, never by *gaining* positive charge? What physical constraint makes this true? (2 steps)", "answer": "- Step 1: The positive charge carriers in matter are protons, which are locked inside the nucleus by the strong nuclear force. No everyday process (friction, induction, contact) has enough energy to remove protons from the nucleus.\n- Step 2: Therefore, the only mobile charge carriers are electrons. If an object ends up with a net positive charge, it must have *lost* electrons — the remaining protons now outnumber the electrons. You never \"add positive charge\"; you remove negative charge and the positive is what's left behind.\n\nThis is Alex's key phrase: \"we can't pick up positive charge, we can just lose negative charge.\"", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "Why does earthing a charged electroscope cause the leaf to fall exactly to neutral, rather than overshooting?", "answer": "- Step 1: Earthing connects the metal to the ground via a conductor. Charge can flow freely between the electroscope and Earth.\n- Step 2: Electrons flow in whichever direction restores balance — out if the electroscope was negative, in if it was positive.\n- Step 3: Crucially, the flow stops automatically when the electroscope reaches the same electrical state as Earth (i.e. neutral). There is no driving force once balance is achieved.\n- Step 4: Unlike using another charged rod (where you might supply too many or too few electrons), Earth supplies exactly the right number — it's self-regulating.\n\nTakeaway: earthing is a \"thermostat\" for charge — it lands precisely at neutral.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "Why does the lesson treat \"static\" and \"current\" as ends of a single continuum rather than two separate topics?", "answer": "- Step 1: Both phenomena involve the same physical entity — a charge imbalance, almost always caused by relocated electrons. There is no fundamental difference in what's there.\n- Step 2: The only distinction is whether the imbalance is *trapped* (static — sits on an insulator, can't flow) or *flowing* (current — moves through a conductor).\n- Step 3: The transition is literally the act of providing a conducting path. The Family Guy carpet shock is static; touching the door handle turns it into a (brief) current. A battery is \"frozen static\" until you connect a wire and it becomes current.\n\nTakeaway: static and current are the same physics differing only in whether the path is open or closed.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "Why does charging by induction sometimes leave the induced object with the **opposite** sign to the inducing object, while charging by contact leaves it the **same** sign? (3 steps)", "answer": "- Step 1: **Contact**: physical touch lets electrons flow freely between the charged object and the previously-neutral one. They share — both end up the same sign as the original charged object (just less concentrated). Same sign means they repel after separation.\n- Step 2: **Induction with earthing**: bring a charged object near (no touch). It polarises the neutral object — same-sign electrons in the neutral object are pushed to the far side. Now earth the far side — those same-sign electrons escape to ground. Break the earth, then remove the inducing object. The remaining charge on the (formerly-neutral) object is the *opposite* sign of what fled, i.e. the *opposite* sign of the original charged object.\n- Step 3: So: contact → same sign as inducer. Induction-with-earthing → opposite sign as inducer. These are physically different processes; the exam answer depends entirely on which one the question describes.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "A negatively charged rod is brought near (but does not touch) a metal sphere on an insulating stand. Describe the charge distribution on the sphere, and the sphere's net charge. (3 steps)", "answer": "- Step 1: The free electrons in the metal sphere feel a repulsive push from the negative rod. They drift to the **far side** of the sphere.\n- Step 2: The near side of the sphere is left with a deficit of electrons — it has an induced **positive** layer. The far side has the surplus electrons — an induced **negative** layer.\n- Step 3: The sphere's **net charge is still zero** (no electrons have entered or left). It is only **polarised**. If you now remove the rod, the electrons drift back and the polarisation disappears.\n\nThe polarisation only becomes a permanent net charge if you earth the sphere while the rod is still nearby — then electrons leave through the earth wire, and when you break the earth, the sphere is left positive.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "Why does static charge only build up on insulators in practice, even though you can in principle move electrons onto any object?", "answer": "- Step 1: When you rub a conductor (e.g. a metal rod held in your hand), electrons do transfer to/from it during friction.\n- Step 2: But because the conductor allows electrons to flow freely, the moment the rod gains/loses electrons, those electrons immediately flow away — usually through your body to earth.\n- Step 3: So no net imbalance accumulates on the conductor; charge is conducted away faster than friction can build it up.\n- Step 4: On an insulator, electrons can't escape from where they were deposited, so the imbalance is locked in place — visible as static charge.\n\nTakeaway: the issue isn't whether you can charge a conductor, but whether the charge stays put.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "Synthesis question: In the EDPL system, a 10 kV supply moves electrons from a metal plate to a lifting sheet. The sheet becomes negative and attracts neutral dust. If the power supply is switched off, what happens to the dust already on the sheet? Does it stay or fall? Consider both the electrostatic force and gravity. (3 steps)", "answer": "- Step 1: When the power is off, no further electrons are being supplied to the sheet. However, the charge already on the sheet does not immediately disappear — the sheet is on an insulating floor, so the charge has no path to earth and remains.\n- Step 2: The charged sheet continues to attract the neutral dust by induction, so the dust that has already been collected *stays* on the sheet as long as the charge persists.\n- Step 3: Over time, the charge may slowly leak away (humid air provides a slight conductive path), weakening the attraction. If the charge drops enough that the electrostatic force can no longer overcome gravity on the dust particles, they would fall. But in the short term, the dust stays.", "source": "GLM 5.1 ③", "_id": "glm_3_55"}, {"question": "How is the charge imbalance in static electricity related to the charge imbalance that drives current in a circuit? What is the key difference? (2 steps)", "answer": "- Step 1: Both involve the same physical phenomenon — an imbalance of electrons vs protons. In static electricity, one object has excess electrons and another has a deficit. In a circuit, the battery's EMF pushes electrons so one terminal is negative (excess electrons) and the other is positive (deficit) — the same kind of charge imbalance.\n- Step 2: The key difference is what happens next. In static electricity, the charge sits on an insulator and cannot flow — it is *static*. In a circuit, a conductor connects the two terminals, so the electrons flow continuously as a current. Static = charge held still on an insulator; current = the same charge free to flow through a conductor.\n\nAlex's link: a battery creates the same charge imbalance as rubbing a balloon — but the conductor allows continuous flow instead of a one-off spark.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "What is the fundamental similarity between static electricity and electric current in a circuit? How do they differ? (2 steps)", "answer": "- Similarity: Both involve the **same charge imbalance**. In static, excess electrons are stuck on an insulator. In current, the same excess electrons are free to flow through a conductor.\n+ A battery creates a charge imbalance at its terminals (one negative, one positive) — this is the same kind of charge separation as static, but with a conductor connecting the terminals, the electrons can flow.\n- Difference: **Static** = charge held **still** on an insulator; **Current** = charge **flowing** continuously through a conductor.\n+ The \"push\" (voltage/EMF) makes the difference — give charge a path (conductor) and it flows; block the path (insulator) and it stops, building up as static.\n\nAlex connected this explicitly: \"Static = charge held still; current = the same charge free to flow.\"", "source": "MiniMax ①", "_id": "minimax_1_14"}, {"question": "Why does a charged balloon stick to a *neutral* wall — given that we're told \"neutral objects don't interact electrically\"? (3 steps)", "answer": "- Step 1: The balloon is negative. Its electric field reaches into the wall and **repels electrons** in the wall's surface molecules, pushing them slightly deeper into the wall.\n- Step 2: The wall's surface (the side near the balloon) is now left with a small positive imbalance — even though the wall as a whole is still neutral.\n- Step 3: The balloon's negative charge attracts this induced positive layer. Since the near (positive) side is closer than the displaced (negative) side, attraction wins and the balloon sticks.\n\nThe deep point: **a neutral object can still respond to a field** because its internal charges can rearrange. \"Neutral overall\" ≠ \"doesn't interact.\"", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Synthesis question: A student rubs a polythene rod with a duster, making the rod negative. They then hold the rod near small pieces of aluminium foil (a conductor) resting on an insulating table. The foil jumps up to the rod, sticks briefly, then suddenly drops away. Explain the entire sequence using the concepts of induction, conduction, and electrostatic force. (4 steps)", "answer": "- Step 1: Induction (attraction) — the negative rod is brought near the neutral foil. It repels electrons in the foil to the far side, making the near side positive. The near side (positive) is closer to the rod, so attraction dominates and the foil jumps up.\n- Step 2: Conduction (contact) — when the foil touches the rod, electrons flow from the rod into the foil (metal is a conductor, so electrons flow freely). The foil now gains a net negative charge.\n- Step 3: Same-sign repulsion — now both the rod and the foil are negative. Like charges repel, so the foil is pushed away from the rod.\n- Step 4: The foil drops away. This sequence (attract → touch → repel) is a classic demonstration that combines induction (initial attraction of neutral object) with conduction (charge sharing on contact) and then repulsion (same sign after sharing).", "source": "GLM 5.1 ③", "_id": "glm_3_54"}, {"question": "When two insulators are rubbed together, one becomes positive and the other becomes negative. Why must the charges be *equal and opposite*? Which conservation principle guarantees this? (2 steps)", "answer": "- Step 1: Conservation of charge guarantees that the total charge of the system (both objects together) cannot change. Before rubbing, both are neutral, so total charge = 0.\n- Step 2: After rubbing, if one object has gained $$n$$ electrons (charge $$= -ne$$), the other has lost exactly those same $$n$$ electrons (charge $$= +ne$$). The sum is $$-ne + ne = 0$$ — still zero. The charges are equal in magnitude and opposite in sign because the same electrons were simply moved from one to the other.\n\nYou never create new charge or destroy it — you just relocate it.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "Why does charging by induction (without earthing) produce no net charge on the originally neutral object, while charging by induction *with* earthing does produce a net charge?", "answer": "- Step 1: In pure induction (no earth), bringing a charged object near merely separates the existing electrons within the neutral object — they shift to the far side, leaving the near side positive. But the total number of electrons on the object hasn't changed. Net charge stays zero.\n- Step 2: When the inducing object is removed, the electrons relax back into a uniform distribution. The neutral object returns to perfectly neutral.\n- Step 3: With earthing, while the inducer is still close, a path opens to or from Earth. Electrons either flow in (if the far side was repelled) or flow out (if the near side was attracted), changing the *total* electron count on the object.\n- Step 4: Once you disconnect the earth and remove the inducer, the object has a permanent net charge — equal in magnitude to the amount of charge that flowed via earth, and opposite in sign to the inducer.\n\nTakeaway: induction alone is reversible (no permanent change); induction + earthing is irreversible (permanent net charge).", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "In the nuclide symbol $$^{A}_{Z}\\text{X}$$, what do the subscript and superscript represent, and how do you deduce the neutron count and electron count for a neutral atom?", "answer": "- Step 1: The subscript $$Z$$ is the atomic (proton) number — it counts how many protons sit in the nucleus. This is the fingerprint of the element; change $$Z$$ and you change the element entirely.\n- Step 2: The superscript $$A$$ is the mass number — the total count of nucleons (protons + neutrons) in the nucleus. Electrons are not counted because their mass is negligible compared with the nucleus.\n- Step 3: Neutrons = $$A - Z$$ (subtract the protons from the total nucleons). For a neutral atom, electrons = protons = $$Z$$, because every proton's positive charge must be balanced by exactly one electron for the net charge to be zero.\n\nTakeaway: $$Z$$ identifies the element, $$A - Z$$ gives neutrons, and neutrality forces electrons to match protons.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "Suppose a charge of $$3.2 \\times 10^{-18}$$ C is transferred from object A to object B. Conceptually deduce how many electrons moved and the sign change of each object.", "answer": "- Step 1: Use $$n = Q/e$$. With $$Q = 3.2 \\times 10^{-18}$$ C and $$e = 1.6 \\times 10^{-19}$$ C, the ratio is 3.2/1.6 = 2 with an exponent difference of $$10^{-18}/10^{-19} = 10$$. So $$n = 20$$ electrons.\n- Step 2: Because electrons moved from A to B, object A lost 20 electrons → A becomes positive (charge $$+3.2 \\times 10^{-18}$$ C). Object B gained 20 electrons → B becomes negative (charge $$-3.2 \\times 10^{-18}$$ C).\n- Step 3: Check conservation: the total charge before was zero; after, it's $$(+3.2 \\times 10^{-18}) + (-3.2 \\times 10^{-18}) = 0$$. Balanced.\n\nTakeaway: every charge transfer can be counted exactly as an integer number of electrons.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Conceptually, what distinguishes a **conductor** from an **insulator**, and why does this difference mean static charge only builds up on insulators? (3 steps)", "answer": "- Step 1: In a conductor (metals, graphite), some electrons — the outer-shell ones — are **delocalised**: not tied to any individual nucleus, free to drift through the bulk material.\n- Step 2: In an insulator (plastic, glass, wool, rubber), every electron is tightly bound to its parent atom or molecule. There are no roaming electrons.\n- Step 3: If you deposit excess electrons on a conductor, they immediately spread out and flow to wherever they can — to your hand, to earth, anywhere they can go. The charge doesn't \"stay put.\" On an insulator, the excess electrons are stuck exactly where you put them, so an **imbalance** persists. That's static.\n\nSo \"static\" literally means *immobile* charge — only possible where electrons can't flow.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "What is the principle of conservation of charge, and what physical consequence does it impose on how objects can become positively charged?", "answer": "- Step 1: Conservation of charge says charge is never created or destroyed — only transferred from one object to another. The total charge of a closed system is constant.\n- Step 2: The consequence: you cannot \"add positive charge\" to an object as if positivity were a substance. There is no movable positive particle in everyday charging (protons are locked in the nucleus).\n- Step 3: Therefore an object becomes positive only by losing electrons. The \"positive charge\" is really a deficit of negatives. This is why Alex insisted: \"we can't pick up positive charge, we can just lose negative charge.\"\n\nTakeaway: every charging story is an electron-transfer story.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "Limiting/edge case: If charge is conserved, can an isolated single object ever become charged on its own (without contact with anything else)?", "answer": "No. Charging always requires a **second object** to either give or receive electrons. Conservation of charge means total charge before = total charge after, so if one object gained $$+Q$$, another must have lost $$+Q$$ (or gained $$-Q$$). You can't generate net charge from nothing. Even in friction charging — superficially \"just one rod and a cloth\" — both partners end up oppositely charged; you can't separate them and inspect \"only the rod\" without acknowledging that the cloth carries the equal and opposite. This is why every charging mechanism in this topic involves *at least two objects* (friction: rod + cloth; induction: rod + sphere; battery: chemistry inside provides the second \"object\" via redox).", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "Why is it the electron (and not the proton) that moves when charge is transferred or when a current flows?", "answer": "The electron sits on the *outside* of the atom, loosely held — especially the outer ones in a metal, which are barely bound to any one nucleus. The proton sits buried deep in the nucleus, bound by the strong nuclear force, and is roughly **1840 times more massive** than the electron ($$m_p/m_e \\approx 1.67 \\times 10^{-27} / 9.11 \\times 10^{-31} \\approx 1830$$). So the electron is both physically accessible (on the outside) and dynamically nimble (tiny mass). Moving a proton would require ripping apart a nucleus; moving an electron just requires friction or a small voltage. This is why every static-electricity story is an electron-transfer story.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "An electroscope is already positively charged (leaf raised). A negative rod is then brought near (not touching). Describe what happens to the leaf and why, including two possible outcomes. (4 steps)", "answer": "- Step 1: Starting state: the metal (plate + rod + leaf) is positive overall, so leaf and rod repel → leaf is raised.\n- Step 2: When a negative rod is brought near the top plate, it attracts the (mobile) electrons inside the metal upward toward the top. This depletes the rod-and-leaf region of positive net charge.\n- Step 3: As the leaf's positive net charge decreases, the repulsion between leaf and supporting rod weakens, so the leaf falls.\n- Step 4: Two outcomes depending on how strong the inducing charge is:\n+ If just enough electrons flow up to neutralise the leaf region exactly, the leaf hangs straight down (neutral).\n+ If even more electrons accumulate, the leaf region overshoots into being net negative — the leaf would rise again, now negatively charged.\n\nTakeaway: a falling leaf signals charge cancellation; you cannot tell from \"leaf flat\" alone whether it's exactly neutral or briefly passing through neutral.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "Why does the leaf of an electroscope NOT rise when you bring a charged rod *near* (without touching) a neutral electroscope, but it does rise when the same rod *touches* the top plate?", "answer": "- Step 1: When you bring the rod near without touching, induction occurs: electrons in the metal redistribute. If the rod is negative, electrons in the metal are repelled downward — accumulating in the leaf and rod region.\n- Step 2: Actually — the leaf and rod region accumulates electrons (becomes negative), and the top plate becomes positive. So the leaf does rise! (This is induction-only behaviour, and it works on an electroscope.)\n- Step 3: Caveat: when you remove the rod (without earthing), everything relaxes back to uniform neutrality, and the leaf falls again. The deflection is temporary.\n- Step 4: With contact, electrons are actually transferred onto the electroscope. The deflection persists after the rod is removed — that's the diagnostic difference. The leaf rising while the rod is near doesn't prove charging; the leaf staying up after the rod is gone does.\n\nTakeaway: induction can lift the leaf temporarily, but only contact (or induction + earthing) leaves a permanent deflection.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "Why does a charged object that is brought near (not touching) a neutral conductor *attract* it, while a charged object that touches a neutral conductor *gives it the same sign of charge*? Contrast the two mechanisms. (3 steps)", "answer": "- Step 1: By induction (near, not touching): the charged object's field rearranges electrons in the neutral conductor, polarising it. The near side becomes opposite in charge to the inducing object, so there is attraction. No electrons are transferred — the conductor is still neutral overall, just polarised.\n- Step 2: By contact (touching): electrons physically flow from the charged object into the conductor (or from the conductor to the charged object, depending on signs). The conductor gains a real net charge of the same sign as the object that touched it.\n- Step 3: The key difference: induction is *rearrangement without transfer* (attraction between opposite induced charges), while contact is *transfer and sharing* (same-sign repulsion after sharing). This is why the electroscope leaf rises by *repulsion* after contact charging, but a neutral paper scrap is *attracted* by induction.", "source": "GLM 5.1 ③", "_id": "glm_3_43"}, {"question": "How does charging by induction allow a charged balloon to stick to a neutral wall? Describe the electron rearrangement in the wall. (3 steps)", "answer": "- Step 1: **Charged object’s field**. A negatively charged balloon repels electrons in the wall’s surface.  \n- Step 2: **Induced charge separation**. The wall’s near side becomes positively charged (electrons pushed away), while the far side becomes negative.  \n- Step 3: **Net attraction**. The positive near side is closer to the balloon than the negative far side, creating a net attractive force.  \n\n+ **Visual intuition**: Sketch the wall’s charges: - - - [balloon] → + + + | - - - [wall].", "source": "Qwen 3 ①", "_id": "qwen_1_4"}, {"question": "Synthesis question: A person wearing rubber-soled shoes rubs their feet on a nylon carpet, becoming negatively charged. They then touch a neutral metal sphere on an insulating stand. Describe the full chain of physics, from the carpet to the sphere's final state. (4 steps)", "answer": "- Step 1: *Friction charges the person.* Rubbing feet on the nylon carpet (an insulator) transfers electrons from the carpet to the person. The person becomes negatively charged (excess electrons). The rubber soles are insulating, so the charge cannot flow to earth — it stays on the person.\n- Step 2: *Contact with the sphere.* When the negatively charged person touches the neutral metal sphere, electrons flow from the person (high electron concentration) into the sphere (a conductor, so electrons can enter and spread). This is charging by contact.\n- Step 3: *The sphere becomes negative.* The sphere gains electrons and becomes negatively charged. The person loses some electrons but may still be negative (depending on relative sizes). Both the person and the sphere now carry negative charge.\n- Step 4: *The sphere retains its charge.* Because the sphere is on an insulating stand, the excess electrons cannot flow to earth. The sphere remains negatively charged after the person removes their hand.\n\nThe full chain: friction → charge on person → contact → electron flow into sphere → sphere charged negative → insulating stand prevents discharge.", "source": "GLM 5.1 ①", "_id": "glm_1_58"}, {"question": "Conceptually, why are \"static electricity\" and \"electric current\" the same physics expressed differently? (3 steps)", "answer": "- Step 1: Both involve the same fundamental entity — charge imbalance, usually a surplus or deficit of electrons. There is no different \"kind\" of charge in static vs current.\n- Step 2: The difference is purely about the path. In static, the charge sits on an insulator and has nowhere to go — it's locked in place. In current, a conductor connects the imbalance, so the electrons drift continuously.\n- Step 3: Inside a battery, an EMF maintains a permanent charge imbalance between terminals (one + one −) — essentially \"permanent static.\" When you wire a conductor between them, that imbalance manifests as continuous current flow.\n\nTakeaway: static = trapped imbalance; current = the same imbalance, released through a conductor.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "Edge case: can a neutral atom of a conductor (like copper) be induced to have charge separation by a nearby charged object? If so, does the atom become charged overall? (2 steps)", "answer": "- Step 1: Yes, a nearby charged object can induce charge separation *within* a single atom of a conductor. The electron cloud shifts slightly toward or away from the external charge, creating a tiny electric dipole — one side of the atom is slightly more negative, the other slightly more positive.\n- Step 2: However, the atom remains *neutral overall* — the total number of electrons still equals the number of protons. Only the distribution has changed. For the atom to become genuinely charged (an ion), an electron must actually leave or arrive — which requires contact or a strong enough field to ionise the atom, not just induction.\n\nInduction rearranges charge; it does not create or destroy it — even at the atomic level.", "source": "GLM 5.1 ①", "_id": "glm_1_56"}, {"question": "Synthesis: Compare and contrast why a *charged rod attracts paper bits*, why a *charged balloon sticks to a wall*, and why *smoke is pulled onto charged plates in a precipitator*. What single principle unites all three?", "answer": "All three are examples of the rule \"**a charged object attracts a neutral object via induction**.\" In each case: (1) the charged object produces a field; (2) that field rearranges the electrons inside the neutral material (paper, wall, smoke particle), polarising it so the near side is opposite in sign; (3) the near side, being closer, experiences stronger attraction than the far side experiences repulsion, so net attraction wins. The materials differ (insulator paper, insulator wall, mixed dust particles), but the mechanism is identical. The unifying principle: **neutral objects respond to fields by polarising**, and polarisation always produces net attraction toward the field source — never repulsion.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "Edge case: Can a conductor ever hold a static charge? Under what specific condition? (2 steps)", "answer": "- Step 1: Yes, a conductor can hold a static charge, but *only* if it is isolated from earth — i.e., not connected to any path that allows charge to flow away. It must be on an insulating support.\n- Step 2: The gold-leaf electroscope is exactly this case: the metal plate, rod, and leaf are all conductors, but they are insulated from the case and from earth. Charge placed on them cannot escape, so it stays and the leaf remains raised. If you touch the plate with your finger (earthing it), the charge immediately flows away through you.\n\nSo \"conductors can't hold static charge\" is only true *if the conductor is earthed or has a conductive path to earth*. An isolated conductor can hold charge perfectly well.", "source": "GLM 5.1 ③", "_id": "glm_3_52"}, {"question": "Why is the electron's mass treated as negligible in atomic/static-electricity problems, while its charge is treated as fully equal in magnitude to the proton's?", "answer": "- Step 1: The mass ratio $$m_p / m_e \\approx 1840$$ — the proton is roughly two thousand times heavier than the electron. So when summing atomic mass, electron contributions are smaller than rounding error.\n- Step 2: But charge is a different quantity: the electron carries $$-e$$ and the proton carries $$+e$$ with exactly the same magnitude $$e = 1.60 \\times 10^{-19}$$ C. These are not approximations — they are equal and opposite to extraordinary precision.\n- Step 3: This asymmetry (tiny mass, full charge) is precisely why electrons — not protons — are the particles that get shuffled around in charging. They are light enough to be mobile, but each one carries a full unit of charge, so moving them produces real, measurable charge imbalances.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "What does it mean to \"**earth**\" an object, and why does earthing always end the discussion of charge build-up? (3 steps)", "answer": "- Step 1: To earth an object means to connect it to the ground via a conductor (e.g. a wire, a person standing on the floor). The Earth is an *effectively infinite* reservoir of electrons.\n- Step 2: Because the Earth is infinite, it can absorb any amount of excess electrons or supply any number of missing electrons without itself changing potential. So any charge imbalance on the object can fully equilibrate.\n- Step 3: A negatively charged earthed object **loses** its surplus electrons to ground; a positively charged one **gains** electrons from ground. Either way, the object ends up **neutral**. Earthing = guaranteed discharge.\n\nConceptually: charge \"wants\" to spread out. Earth offers an infinite place to spread to.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "Why can an insulator NOT be charged by induction in the same way a conductor can? What is the key property that makes induction work? (2 steps)", "answer": "- Step 1: Induction works by *rearranging* the electrons inside an object — pushing them to one side and creating a charge separation. This requires the electrons to be free to move within the material.\n- Step 2: In a conductor, free electrons can move throughout the material in response to an external electric field, creating the induced charge separation. In a pure insulator, electrons are tightly bound to their atoms and cannot move through the material. While the atoms/molecules in an insulator can *polarise* slightly (electron clouds shift within each atom), the bulk movement of charge needed for classical induction does not occur.\n\nThis is why the metal sphere can be charged by induction (free electrons move, then earthing removes them), but a plastic sphere cannot — the electrons are stuck.", "source": "GLM 5.1 ①", "_id": "glm_1_51"}, {"question": "Conceptually compare the physical processes in (i) charging by friction, (ii) charging by contact, (iii) charging by induction. What's transferred or rearranged in each?", "answer": "- Step 1: Friction (two insulators): electrons physically rip from one surface to the other due to mechanical rubbing. Net charge appears on both objects.\n- Step 2: Contact (touching a charged conductor to another conductor): electrons flow through the touch point until charge is shared. Both end with the same sign as the original charged object.\n- Step 3: Induction (no touching): the charged object's field rearranges electrons *within* a neutral conductor. No transfer between objects; just redistribution inside one. If earthing is added, electrons can flow to/from Earth, producing a permanent charge with opposite sign to the inducer.\n- Step 4: Pattern:\n+ Friction: transfers between two insulators (mechanical).\n+ Contact: shares between two conductors (electrical).\n+ Induction: rearranges within one conductor (field-driven, no transfer unless earthed).\n\nTakeaway: three distinct mechanisms — different setups, different outcomes, but all based on moving electrons.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Why is the property \"insulator vs conductor\" central to **every** electrostatic-safety scenario (petrol stations, lightning rods, ESD wristbands)? (2 steps)", "answer": "- Step 1: Charge build-up only happens on insulators (electrons can't flow away). So *if* a material is an insulator near a hazard (fuel vapour, sensitive electronics), charge will accumulate uncontrollably and eventually discharge as a spark — which can ignite or damage.\n- Step 2: Charge cannot build up on a conductor that has a path to earth. Lightning rods, wristbands worn by electronics technicians, and metal-coated fuel-pump nozzles all work by giving the charge a continuous, harmless route to ground as fast as it's generated. So the *electrical* property (conductor + earthed vs insulator) is what determines danger, not other properties like waterproofness, colour, or thickness.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "When you bring a charged rod near a neutral conducting sphere on an insulating stand, then walk away with the rod, the sphere goes back to a uniform neutral state. But if you'd earthed the sphere briefly while the rod was near, then removed the earth, then removed the rod, the sphere is now charged. Why? (3 steps)", "answer": "- Step 1: With no earthing, the rod just polarises the sphere temporarily. The total electron count on the sphere never changes — electrons just slosh to one side. Remove the rod, and the sphere relaxes back to uniform neutrality.\n- Step 2: With earthing while the rod is near: the rod pushes electrons (say, the rod is negative, so it repels the sphere's electrons) to the far side; with the earth wire connected, those repelled electrons can now leave the sphere entirely, escaping to ground.\n- Step 3: Break the earth wire while the rod is still near. The sphere now has fewer electrons than before — it's net positive. Remove the rod, and that net positive charge redistributes uniformly. The sphere ends up oppositely charged to the rod.\n\nThe key insight: earthing during induction lets you \"lock in\" a permanent charge of opposite sign.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "What's the difference between **conventional current** and the actual direction of electron flow?", "answer": "Conventional current is defined as the direction *positive* charge would flow — i.e. from the + terminal of a battery, through the circuit, back to the − terminal. But the actual mobile charge carriers in a wire are electrons, which flow in the **opposite direction**: from the − terminal toward the + terminal. This is a historical artefact: Benjamin Franklin guessed wrong about which carrier was moving before the electron was discovered. The convention stuck because by then it was deeply embedded in physics and engineering notation. So in every circuit diagram, current arrows point \"the wrong way\" relative to electrons.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "Explain the physics of a lightning strike in terms of friction, charge build-up, and insulator breakdown. (3 steps)", "answer": "- Step 1: Inside a storm cloud, ice crystals and water droplets collide and rub past each other — this is friction charging on a massive scale. Charges separate: the cloud base becomes strongly **negative**, while the upper cloud is positive.\n- Step 2: The negative cloud base induces a **positive** charge on the ground beneath (electrons in the earth are repelled away from the surface below the cloud).\n- Step 3: Air is normally an excellent insulator, so this huge charge imbalance is sustained. But when the voltage across the gap becomes enormous (millions of volts), the air **breaks down** — its molecules ionise — and a colossal current flows: lightning. It's the same friction → charge → spark → current chain, just at planetary scale.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "Why can't static charge build up on a *conductor* that is isolated from earth, if you try to charge it by rubbing? Or can it? Think carefully about what happens when you stop rubbing. (3 steps)", "answer": "- Step 1: While you are rubbing a conductor, friction does transfer electrons to or from it. So momentarily, the conductor can have an imbalance of charge.\n- Step 2: However, because the conductor has free (delocalised) electrons, the excess charge immediately redistributes itself across the entire surface of the conductor. The charge doesn't stay localised at the rubbing point.\n- Step 3: If the conductor is being held by a person or is on a surface, those excess electrons will quickly flow away through any conductive path (your hand, the bench). Only if the conductor is extremely well insulated (e.g., on an insulating stand) can it retain the charge — but this is unusual. This is why static charge \"only happens on insulators\" in practice.\n\nEdge case: a conductor on an insulating stand *can* hold static charge — this is exactly how the gold-leaf electroscope works. The metal must be insulated from earth.", "source": "GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "Synthesis: A battery, a charged balloon, and a gold-leaf electroscope all involve charge imbalances. Rank them from \"most temporary\" to \"most persistent\" charge, and explain why. (3 steps)", "answer": "- Step 1: Most temporary — the battery. The battery *maintains* its charge imbalance only while chemical energy drives the EMF. If the battery is connected to a circuit, charge flows continuously and the imbalance is constantly being restored. Disconnect the circuit and the terminals slowly equalise through internal leakage. The imbalance is actively maintained, not stored.\n- Step 2: Middle — the charged balloon. The balloon (insulator) holds its charge persistently because electrons cannot flow away. But the charge can slowly leak through humid air or be neutralised by touching a conductor. It's persistent but passive — no energy source maintains it.\n- Step 3: Most persistent — the electroscope. Like the balloon, the charge is trapped on an insulated conductor. But because the electroscope is designed with good insulation (air gap, insulating bush), the charge can persist for hours. It's the same mechanism as the balloon (charge trapped by insulation), but with better isolation.\n\nThe key variable is: *how easily can the charge find a path to flow away?*", "source": "GLM 5.1 ③", "_id": "glm_3_56"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "In the nuclide symbol $$_{Z}^{A}\\text{X}$$, what physical quantity does the bottom number $$Z$$ represent, and what does the top number $$A$$ represent? How do you find the neutron count from these? (2 steps)", "answer": "- Step 1: The bottom number $$Z$$ is the atomic (proton) number — it tells you the number of protons in the nucleus. The top number $$A$$ is the mass number — it tells you the total number of nucleons (protons + neutrons) in the nucleus.\n- Step 2: Since $$A$$ counts all nuclear particles and $$Z$$ counts only protons, the number of neutrons is $$A - Z$$. For example, $$_{2}^{4}\\text{He}$$ has $$Z = 2$$ protons and $$A - Z = 4 - 2 = 2$$ neutrons.\n\nThe neutron count is never written explicitly in the symbol — you always derive it as $$A - Z$$.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A neutral atom has proton number $$Z$$. How many electrons does it have, and why must this be true for the atom to be \"neutral\"? (2 steps)", "answer": "- Step 1: A neutral atom has zero net charge. Each proton contributes $$+1$$ relative charge and each electron contributes $$-1$$ relative charge. For the total to be zero, the number of positive charges must equal the number of negative charges.\n- Step 2: Therefore a neutral atom has exactly $$Z$$ electrons — the same number as its protons. If electrons $$\\neq$$ protons, the atom is an ion (charged), not neutral.\n\nThis is why the electron count of a neutral atom is never given separately — it is always equal to $$Z$$.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "State the relative charge and relative mass of a proton, a neutron, and an electron. Which particle has a mass so small it is often treated as zero, and roughly what fraction of a proton's mass is it? (2 steps)", "answer": "- Step 1: Proton: relative charge $$+1$$, relative mass $$1$$. Neutron: relative charge $$0$$, relative mass $$1$$. Electron: relative charge $$-1$$, relative mass $$\\approx \\frac{1}{1840}$$ (treated as \"very small\" or approximately zero for most static-electricity reasoning).\n- Step 2: The electron's mass is roughly $$\\frac{1}{1840}$$ of a proton's mass — about 0.05%. This is why, when charge transfers between objects, it is always the electrons that move: they are so light that the electrostatic force can easily pull them away from the atom, whereas protons are locked inside the heavy nucleus.\n\nThe $$\\frac{1}{1840}$$ ratio comes from $$m_p / m_e \\approx 1830\\text{–}1840$$ depending on the precision used.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "Why is it the electron that moves during charging, and never the proton? Connect your answer to the mass values of the particles. (2 steps)", "answer": "- Step 1: Protons are located inside the nucleus and each has a relative mass of 1. The nucleus as a whole is extremely heavy (thousands of times heavier than an electron). The forces holding the nucleus together (the strong nuclear force) are vastly stronger than the electrostatic forces involved in everyday friction or induction, so protons cannot be removed from the nucleus by rubbing or by bringing a charged object nearby.\n- Step 2: Electrons, with relative mass $$\\approx \\frac{1}{1840}$$, are on the outside of the atom and are only held by the electromagnetic attraction to the nucleus. In conductors, some electrons are already essentially free. Even in insulators, friction can supply enough energy to transfer surface electrons between materials. The key insight: it is always electrons that transfer, so an object becomes positive only by *losing* electrons — never by gaining \"positive charge.\"\n\nThis is why Alex stressed: \"we can't pick up positive charge, we can just lose negative charge.\"", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "What does it mean for charge to be \"conserved\"? In the context of static electricity, what is the practical consequence when two objects are rubbed together? (2 steps)", "answer": "- Step 1: Conservation of charge means charge cannot be created or destroyed — it can only be transferred from one object to another. The total charge of a closed system remains constant. This is analogous to conservation of energy.\n- Step 2: When two objects are rubbed together, electrons move from one to the other. One object gains electrons (becomes negative) and the other loses the same number of electrons (becomes positive). The two objects end up with equal and opposite charges. No new charge has been created — the same electrons that were already present have simply been redistributed.\n\nThis is why if you know one object became $$-3\\text{ nC}$$, the other must be $$+3\\text{ nC}$$ — the total is still zero, as it was before rubbing.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "What does \"charge is quantised\" mean? Write the formula and explain why charge can never be a non-integer multiple of $$e$$. (2 steps)", "answer": "- Step 1: Quantisation means charge comes in discrete packets. The smallest possible packet is the elementary charge $$e = 1.60 \\times 10^{-19}\\text{ C}$$. Any object's charge is an integer multiple of this: $$Q = ne$$, where $$n$$ is a whole number (1, 2, 3, …).\n- Step 2: You cannot have half an electron, or 2.7 electrons transferred. Since each electron carries exactly $$-e$$, the total charge transferred is always a whole number times $$e$$. An object can have charge $$+3e$$ or $$-100e$$, but never $$+2.5e$$. In practice, because $$n$$ is astronomically large in macroscopic situations (billions of billions of electrons), the charge *appears* continuous — but fundamentally it is always quantised.\n\nTo find how many electrons correspond to a charge $
