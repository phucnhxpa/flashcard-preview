nd explain why we use \"relative\" values rather than absolute SI values for this topic. (2 steps)", "answer": "- Step 1: The table:\n+ Proton: charge $$+1$$, mass $$1$$\n+ Neutron: charge $$0$$, mass $$1$$\n+ Electron: charge $$-1$$, mass $$\\approx 1/1840 \\approx 0$$\n- Step 2: For static-electricity questions we only care about **ratios and signs** — whether charges are equal and opposite, whether masses are comparable. The absolute values ($$e = 1.60 \\times 10^{-19}\\,\\text{C}$$, $$m_p = 1.67 \\times 10^{-27}\\,\\text{kg}$$) only enter when you count electrons or compute forces. Using relative units keeps the reasoning clean and avoids carrying tiny numbers around.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Why can we treat the electron's mass as \"essentially zero\" compared to the nucleus, and what physical consequence does this have?", "answer": "The mass ratio is $$m_p/m_e \\approx 1840$$. So even a helium nucleus (2p + 2n) is about $$4 \\times 1840 \\approx 7000$$ times heavier than one electron. The consequence: when electrons are stripped off or added to an object, the object's mass barely changes — you can charge a balloon to a clearly visible attraction without measurably altering its weight. It also means in any tug-of-war for electrons (friction, induction, current), the *electrons* are the ones that physically rearrange while the heavy nuclei stay put.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "State the principle of **conservation of charge** and explain why it forces us to describe positive charging only as \"losing electrons.\" (2 steps)", "answer": "- Step 1: Charge cannot be created or destroyed — it can only be **transferred** between objects. If object A ends up with $$+Q$$, then somewhere object B must end up with $$-Q$$. The total before equals the total after.\n- Step 2: In ordinary matter, the only mobile charge carriers are electrons. Protons are locked in nuclei. So you cannot \"add positive charge\" to something — you can only remove some of its electrons, leaving the protons in surplus. Saying \"the rod gained positive charge\" is sloppy; the correct picture is \"the rod lost electrons to the cloth.\"\n\nThe takeaway: every charging sentence in an exam should describe **which way the electrons moved**.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "What does it mean to say charge is **quantised**, and what is the relationship $$Q = ne$$ telling you? (2 steps)", "answer": "- Step 1: Quantisation means charge comes only in whole-number multiples of the elementary charge $$e = 1.60 \\times 10^{-19}\\,\\text{C}$$. You can't have half an electron's worth of charge sitting on an object — only integer counts.\n- Step 2: So if an object has gained or lost $$n$$ electrons, its net charge magnitude is $$Q = ne$$, with $$n$$ an integer. Rearranged: $$n = Q/e$$ counts how many electrons account for an observed charge. E.g. a charge of $$10\\,\\mu\\text{C}$$ corresponds to roughly $$10^{-5}/10^{-19} = 10^{14}$$ electrons — an enormous number, which is why even \"tiny\" static charges involve vast numbers of electrons.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "Conceptually, what distinguishes a **conductor** from an **insulator**, and why does this difference mean static charge only builds up on insulators? (3 steps)", "answer": "- Step 1: In a conductor (metals, graphite), some electrons — the outer-shell ones — are **delocalised**: not tied to any individual nucleus, free to drift through the bulk material.\n- Step 2: In an insulator (plastic, glass, wool, rubber), every electron is tightly bound to its parent atom or molecule. There are no roaming electrons.\n- Step 3: If you deposit excess electrons on a conductor, they immediately spread out and flow to wherever they can — to your hand, to earth, anywhere they can go. The charge doesn't \"stay put.\" On an insulator, the excess electrons are stuck exactly where you put them, so an **imbalance** persists. That's static.\n\nSo \"static\" literally means *immobile* charge — only possible where electrons can't flow.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "On the electrostatic series, materials near the **top** (acetate, perspex, glass, wool) versus near the **bottom** (rubber, sulphur, platinum, gold) — what does the position tell you about how they behave when rubbed? (2 steps)", "answer": "- Step 1: The series ranks materials by **how strongly they hold electrons**. Top-of-series materials have a *weak* hold; bottom-of-series materials have a *strong* hold.\n- Step 2: When two materials are rubbed together, electrons flow from the weaker holder to the stronger holder. So the upper-list material ends up **positive** (lost electrons), and the lower-list material ends up **negative** (gained electrons). This explains why polythene rubbed with wool becomes negative (polythene holds electrons more strongly than wool).\n\nThe rule of thumb: lower on the list = \"electron hog\" = becomes negative.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "When you rub a balloon on a wool jumper, which becomes negative and why? (2 steps)", "answer": "- Step 1: On the electrostatic series, the balloon (rubber/plastic) sits lower than wool. So the balloon has a stronger grip on electrons.\n- Step 2: Friction provides the energy to dislodge weakly-held electrons. They migrate from the wool (weaker hold) onto the balloon (stronger hold). Result: **balloon = negative, jumper = positive**, with equal and opposite magnitudes (conservation of charge).", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "State the three rules of electrostatic force used in this topic.", "answer": "(1) Like charges **repel** — two positives push apart, two negatives push apart. (2) Unlike charges **attract** — a positive and a negative pull together. (3) A **charged** object **attracts a neutral** object (by induction — it polarises the neutral object's electrons, making the near side oppositely charged). Note that the sign refers to the *overall (net)* charge of the object, not the sign of any individual particle inside.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "Two negatively charged rods are brought close together. Do they attract or repel, and what would a common student mistake be here? (2 steps)", "answer": "- Step 1: Both rods carry the **same sign** of net charge (both negative). Like charges repel ⇒ they **push apart**.\n- Step 2: The classic mistake is to reason \"they're both made of electrons, electrons are attracted to protons, so they attract\" — confusing the sign of the *constituent particles* with the *net charge* of each object. What matters for the force is each object's overall imbalance. Two negatives repel just as surely as two positives do.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "When the question says \"two objects have the same charge,\" what exactly does \"charge\" refer to — the protons inside, the electrons inside, or something else?", "answer": "It refers to the object's **overall (net) charge** — the sign of the imbalance between its total electrons and total protons. A \"positively charged\" object has fewer electrons than protons; a \"negatively charged\" object has more electrons than protons. The proton count alone tells you nothing about whether the object is +, −, or neutral. So \"same charge\" means same sign of *net* imbalance, regardless of which species (electrons removed vs added) caused it.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "Describe step by step what happens microscopically when a plastic rod is rubbed with a cloth and then held near small bits of paper. (4 steps)", "answer": "- Step 1: **Friction** between rod and cloth transfers electrons. Plastic holds electrons more strongly than cloth, so electrons move *cloth → rod*. The rod becomes negative, the cloth becomes positive.\n- Step 2: The paper bits are **neutral** — equal protons and electrons inside each scrap.\n- Step 3: When the negative rod is brought near, its field **repels electrons** within the paper, pushing them to the far side of each scrap. The near side of the paper now has a slight positive imbalance, the far side a slight negative imbalance. (The paper as a whole is still neutral.)\n- Step 4: The near (positive) side of the paper is closer to the negative rod than the far (negative) side, so the attraction wins out over the repulsion. The papers jump up to the rod.\n\nThis is **induction**: the rod never touches the paper, yet the paper polarises and is attracted.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "Why does a charged balloon stick to a *neutral* wall — given that we're told \"neutral objects don't interact electrically\"? (3 steps)", "answer": "- Step 1: The balloon is negative. Its electric field reaches into the wall and **repels electrons** in the wall's surface molecules, pushing them slightly deeper into the wall.\n- Step 2: The wall's surface (the side near the balloon) is now left with a small positive imbalance — even though the wall as a whole is still neutral.\n- Step 3: The balloon's negative charge attracts this induced positive layer. Since the near (positive) side is closer than the displaced (negative) side, attraction wins and the balloon sticks.\n\nThe deep point: **a neutral object can still respond to a field** because its internal charges can rearrange. \"Neutral overall\" ≠ \"doesn't interact.\"", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "What is the difference between **charging by friction** and **charging by induction**? (2 steps)", "answer": "- Step 1: **Friction** — two insulators in physical contact, rubbed together. Electrons are forcibly transferred from one to the other. Both objects end up with net charge (equal and opposite). No third party involved.\n- Step 2: **Induction** — a charged object is brought *near* (not touching) another object. The other object's electrons rearrange internally (move to one side), making it **polarised**. If the object is not touched/earthed, it's still neutral overall — just lopsided in distribution. If it *is* earthed during the induction, some electrons flow to/from earth, and when the earth connection is broken, the object is left with a net charge of the *opposite* sign to the inducing object.\n\nQuick test: friction needs contact and transfers electrons between the two objects; induction is at a distance and only rearranges (or, with earthing, swaps with earth).", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "A negatively charged rod is brought near (but does not touch) a metal sphere on an insulating stand. Describe the charge distribution on the sphere, and the sphere's net charge. (3 steps)", "answer": "- Step 1: The free electrons in the metal sphere feel a repulsive push from the negative rod. They drift to the **far side** of the sphere.\n- Step 2: The near side of the sphere is left with a deficit of electrons — it has an induced **positive** layer. The far side has the surplus electrons — an induced **negative** layer.\n- Step 3: The sphere's **net charge is still zero** (no electrons have entered or left). It is only **polarised**. If you now remove the rod, the electrons drift back and the polarisation disappears.\n\nThe polarisation only becomes a permanent net charge if you earth the sphere while the rod is still nearby — then electrons leave through the earth wire, and when you break the earth, the sphere is left positive.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "What does it mean to \"**earth**\" an object, and why does earthing always end the discussion of charge build-up? (3 steps)", "answer": "- Step 1: To earth an object means to connect it to the ground via a conductor (e.g. a wire, a person standing on the floor). The Earth is an *effectively infinite* reservoir of electrons.\n- Step 2: Because the Earth is infinite, it can absorb any amount of excess electrons or supply any number of missing electrons without itself changing potential. So any charge imbalance on the object can fully equilibrate.\n- Step 3: A negatively charged earthed object **loses** its surplus electrons to ground; a positively charged one **gains** electrons from ground. Either way, the object ends up **neutral**. Earthing = guaranteed discharge.\n\nConceptually: charge \"wants\" to spread out. Earth offers an infinite place to spread to.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "Why does a gold-leaf electroscope's leaf **rise** when a charged rod is touched onto the metal plate? (4 steps)", "answer": "- Step 1: The metal plate, rod and gold leaf are all electrically connected (all conducting metal), so any charge deposited spreads throughout them.\n- Step 2: When the rod (say, negatively charged) touches the plate, electrons flow from the rod into the metal — because metals conduct and the system tries to equalise.\n- Step 3: Now the plate, rod, and **the leaf itself** all carry the same sign of charge (negative).\n- Step 4: The leaf and the metal stem now repel each other (like charges repel), so the leaf swings outward — it rises.\n\nCrucial: charging by contact makes the leaf the **same sign** as the rod, not neutral. The leaf rises by repulsion, not attraction.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "A student says \"the negative rod attracts the neutral gold leaf, so the leaf rises.\" What's wrong with this explanation, and what's the correct one?", "answer": "The error is treating the leaf as **neutral**. In charging by contact, the rod actually transfers electrons into the connected metal system, so the leaf itself becomes negatively charged — it doesn't stay neutral. The leaf then **repels** the metal stem (both now negative, like charges repel), and that's what makes it rise. The \"neutral object attracted to charged object\" story is the *induction* story (e.g. paper bits, balloon-on-wall), not the contact story. Distinguishing these two mechanisms cleanly is the heart of electrostatics questions.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Why is gold specifically used for the leaf in a gold-leaf electroscope?", "answer": "Gold is uniquely malleable — it can be beaten into extraordinarily thin foil (gold leaf), thinner than almost any other metal. This makes it extremely **lightweight**, so even a small electrostatic repulsion can visibly deflect it. The metal-conduction property matters too (it has to share charge with the stem), but the *physical* reason gold is chosen rather than, say, aluminium, is just that it can be made vanishingly thin and therefore highly sensitive to small charges.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "An electroscope is already positively charged (leaf raised). A negative rod is brought near. Why does the leaf **fall**? (3 steps)", "answer": "- Step 1: Initially the rod and leaf both carry net positive charge, repelling each other — that's why the leaf is raised.\n- Step 2: Bringing a negative rod near the top plate attracts electrons up into the plate (or, by contact, supplies electrons that flow down). Either way, some positive charge on the metal system is **cancelled** by the arriving electrons.\n- Step 3: With less net positive charge on the leaf and stem, the repulsion weakens, and gravity pulls the leaf back down. If exactly enough electrons arrive, the system becomes neutral and the leaf hangs straight down. If too many arrive, the system goes negative, the leaf rises again — but for the opposite-sign reason.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Walking across a nylon carpet leaves you negatively charged; touching a metal handle gives you a shock. Walk through what's happening, step by step. (3 steps)", "answer": "- Step 1: Nylon is an insulator. As your shoes/feet rub the carpet (friction), electrons transfer from the carpet onto you. You accumulate a surplus of electrons — you become **negatively charged**. Because both you and the carpet are insulators, the charge can't easily flow away — it stays on you.\n- Step 2: The metal handle is a conductor, likely earthed (connected to the building's plumbing/structure). When your finger gets very close, the air gap is small.\n- Step 3: Your excess electrons see a path to earth via the handle. They rush across the gap (often as a tiny visible spark — the air briefly ionises) and flow into the handle, equalising your charge with the Earth. This **rapid electron flow is the current** you feel as a shock.\n\nThe whole shock sequence is: friction → charge → spark → current.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Why is it dangerous to wear a nylon jacket at a petrol station, and what is the *correct* reason a wax-coated or earthed jacket is safer? (2 steps)", "answer": "- Step 1: Nylon is an **insulator**. As you move, friction charges it (and you) up — but because nylon doesn't conduct, the charge has nowhere to go. It builds up. Near petrol vapour, a sudden discharge (spark) can ignite the vapour. Danger = build-up + spark.\n- Step 2: The safer jacket is safer because it **conducts** the charge harmlessly to earth (via your body to the ground) as it's being generated. No build-up means no spark.\n+ Common wrong answer: \"wax jackets are safe because they're waterproof.\" Water resistance is irrelevant — the property that matters is *electrical*, not whether rain gets in.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "Explain the physics of a lightning strike in terms of friction, charge build-up, and insulator breakdown. (3 steps)", "answer": "- Step 1: Inside a storm cloud, ice crystals and water droplets collide and rub past each other — this is friction charging on a massive scale. Charges separate: the cloud base becomes strongly **negative**, while the upper cloud is positive.\n- Step 2: The negative cloud base induces a **positive** charge on the ground beneath (electrons in the earth are repelled away from the surface below the cloud).\n- Step 3: Air is normally an excellent insulator, so this huge charge imbalance is sustained. But when the voltage across the gap becomes enormous (millions of volts), the air **breaks down** — its molecules ionise — and a colossal current flows: lightning. It's the same friction → charge → spark → current chain, just at planetary scale.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "How does electrostatic paint spraying give a more even coat and reach hidden surfaces? (3 steps)", "answer": "- Step 1: As the paint droplets exit the spray nozzle, electrons are stripped off (or added) so all the droplets carry the **same sign** of charge — say, positive.\n- Step 2: Since all droplets are the same sign, they repel each other and **fan out** evenly, rather than clumping.\n- Step 3: The target (car body) is given the **opposite** sign (negative). The positive droplets are attracted to the car from all directions — including around to the back side of curved surfaces. This gives even coverage even on hidden areas, and almost no paint is wasted by missing the target.\n\nThe principle: opposite charges attract through curved paths, not just straight lines.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Why do smoke precipitators (in chimneys) attract neutral smoke particles to charged plates?", "answer": "The plates are held at a high voltage — strongly charged. The smoke particles are neutral overall, but they're made of polarisable matter (small dust/soot particles with mobile or shiftable electrons). The strong field from the plates **polarises** each smoke particle, inducing an opposite-sign layer on the side facing the plate. The induced opposite layer is closer to the plate than the same-sign layer, so attraction dominates and the smoke is pulled out of the gas stream onto the plate. It's the same \"charged attracts neutral\" principle as paper-bits-and-rod, just industrially scaled.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "State the relationship between current, charge, and time (Edexcel IAL spec 64), with units, and explain why \"1 ampere = 1 coulomb per second\" is more than just a definition. (3 steps)", "answer": "- Step 1: $$I = \\dfrac{\\Delta Q}{\\Delta t}$$ with $$I$$ in amperes (A), $$\\Delta Q$$ in coulombs (C), $$\\Delta t$$ in seconds (s).\n- Step 2: This is the **definition** of current as the *rate of flow of charge*. Equivalently $$\\Delta Q = I\\,\\Delta t$$ — the charge that flows in time $$\\Delta t$$ when the current is $$I$$.\n- Step 3: \"$$1\\,\\text{A} = 1\\,\\text{C s}^{-1}$$\" is more than a unit equation: it says current and charge are not independent quantities. A steady current is just a continuous draining/supplying of charge. Knowing the current and the time, you can count the total charge that's been delivered — and from $$n = Q/e$$, the number of electrons.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "A current of $$I = 2\\,\\text{A}$$ flows for $$10\\,\\text{s}$$ through a wire. Conceptually, how do you find the number of electrons that passed a given cross-section in that time — without doing the full arithmetic? (3 steps)", "answer": "- Step 1: First find total charge: $$\\Delta Q = I\\,\\Delta t = 2 \\times 10 = 20\\,\\text{C}$$. This is the total amount of charge (in coulombs) that crossed the section.\n- Step 2: Then divide by the elementary charge to count electrons: $$n = \\Delta Q / e = 20 / (1.6 \\times 10^{-19})$$. You don't need the exact answer — recognise that dividing by $$\\sim 10^{-19}$$ gives a number on the order of $$10^{20}$$ electrons.\n- Step 3: The key conceptual point: even a very modest current (2 A for 10 s) corresponds to an *astronomical* number of electrons — about $$10^{20}$$. This is why charge looks continuous in everyday experience even though it's actually discrete.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Conceptually, what is the connection between **static electricity** and an **electric current** flowing in a wire? (2 steps)", "answer": "- Step 1: Both involve the same fundamental phenomenon: an **imbalance of charge** (excess electrons somewhere, deficit elsewhere). Static electricity is this imbalance held *fixed* on an insulator; an electric current is the same imbalance, but with a *conductor* providing a path so the electrons can flow continuously from the surplus to the deficit.\n- Step 2: A battery is just a device that *maintains* the imbalance — chemistry inside the cell keeps removing electrons from one terminal and depositing them on the other. Connect the terminals with a wire and you've made the static imbalance \"flow\" — current. So a battery + wire is structurally the same as a charged rod + wire to earth: charge flowing because it can.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "What's the difference between **conventional current** and the actual direction of electron flow?", "answer": "Conventional current is defined as the direction *positive* charge would flow — i.e. from the + terminal of a battery, through the circuit, back to the − terminal. But the actual mobile charge carriers in a wire are electrons, which flow in the **opposite direction**: from the − terminal toward the + terminal. This is a historical artefact: Benjamin Franklin guessed wrong about which carrier was moving before the electron was discovered. The convention stuck because by then it was deeply embedded in physics and engineering notation. So in every circuit diagram, current arrows point \"the wrong way\" relative to electrons.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "Two rods are rubbed with the same cloth so that both end up positively charged. To make them now **attract** each other, what would you have to do? (2 steps)", "answer": "- Step 1: Right now they have the **same sign** → they repel. To make them attract, you need them to have **opposite signs**.\n- Step 2: Keep one rod positive (do nothing). Recharge the other rod with a different material from further down the electrostatic series, so that *this time* the rod gains electrons rather than losing them — it becomes negative. Now one is +, the other is −, and they attract.\n\nThe lesson: it's the *combination* (same vs opposite) of signs that matters, not the absolute identity of either charge.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "In the forensic Electrostatic Dust-Print Lifter (lifting sheet + metal plate + 10 kV control unit), explain in terms of *electron movement* how the lifting sheet becomes negative and the plate becomes positive. (2 steps)", "answer": "- Step 1: The control unit applies a high voltage between the metal plate and the lifting sheet. It does this by driving electrons through the connecting wire: electrons are **pulled off the metal plate, through the control unit, onto the lifting sheet**.\n- Step 2: As a result: the lifting sheet *gains* electrons → becomes **negative**. The metal plate *loses* electrons → becomes **positive**. Each ends with an equal and opposite imbalance (conservation of charge).\n\nExaminer tip: when the question says \"use the idea of charge movement,\" you must explicitly describe the *direction* of electron flow (plate → sheet), not just state the final charges.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "In the dust-print lifter, after the lifting sheet is charged, why do *neutral* dust particles get lifted up onto it?", "answer": "The lifting sheet is now strongly charged (negative). When placed over neutral dust particles, the sheet's field **polarises** each dust grain — electrons inside the grain are pushed to the side away from the sheet, leaving a positive layer on the side facing the sheet. The near (positive) side is closer than the far (negative) side, so attraction wins and the dust particles jump up onto the sheet. This is the universal \"charged object attracts neutral\" rule — the same physics as paper-bits-and-rod or balloon-on-wall.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Out of paper, plastic, silver, and wood — which is an electrical conductor, and how would you reason this out from first principles?", "answer": "Silver. The reasoning: conductors are materials with mobile (delocalised) electrons. **Metals** have delocalised outer-shell electrons — this is what defines metallic bonding. Silver is a metal (in fact one of the best conductors known). Paper, plastic, and wood are all non-metallic — their electrons are tightly bound in covalent bonds or fixed to specific atoms, so no free flow is possible. Quick test for exam: spot the metal in the list.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Why does charging by induction sometimes leave the induced object with the **opposite** sign to the inducing object, while charging by contact leaves it the **same** sign? (3 steps)", "answer": "- Step 1: **Contact**: physical touch lets electrons flow freely between the charged object and the previously-neutral one. They share — both end up the same sign as the original charged object (just less concentrated). Same sign means they repel after separation.\n- Step 2: **Induction with earthing**: bring a charged object near (no touch). It polarises the neutral object — same-sign electrons in the neutral object are pushed to the far side. Now earth the far side — those same-sign electrons escape to ground. Break the earth, then remove the inducing object. The remaining charge on the (formerly-neutral) object is the *opposite* sign of what fled, i.e. the *opposite* sign of the original charged object.\n- Step 3: So: contact → same sign as inducer. Induction-with-earthing → opposite sign as inducer. These are physically different processes; the exam answer depends entirely on which one the question describes.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "A simple sanity-check: a neutral atom of lithium is $$^{7}_{3}\\text{Li}$$. How many protons, neutrons, and electrons does it have? (1 step)", "answer": "- Step 1: Protons = $$Z = 3$$. Neutrons = $$A - Z = 7 - 3 = 4$$. Electrons = 3 (since the atom is neutral, electrons must equal protons). So lithium-7 has **3 protons, 4 neutrons, 3 electrons**.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "A current of $$0.5\\,\\text{A}$$ flows for $$2$$ minutes. Without computing exact electron counts, describe how you'd find both the total charge and the order of magnitude of electrons involved. (3 steps)", "answer": "- Step 1: First convert time to seconds: $$2\\,\\text{min} = 120\\,\\text{s}$$. Always convert to base SI units before substituting.\n- Step 2: Charge: $$\\Delta Q = I\\,\\Delta t = 0.5 \\times 120 = 60\\,\\text{C}$$.\n- Step 3: Electrons: $$n = \\Delta Q / e = 60 / (1.6 \\times 10^{-19})$$. Dividing $$\\sim 10^2$$ by $$\\sim 10^{-19}$$ gives order of magnitude $$\\sim 10^{20-21}$$. So roughly a few hundred billion billion electrons cross the wire's cross-section — concrete reminder that even modest currents involve unimaginable numbers of charge carriers.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Why does Alex insist that, when answering \"describe and explain\" questions in electrostatics, you should **state the conclusion first** (e.g. \"they repel\") and **then justify** (\"because like charges repel\")?", "answer": "Because mark schemes typically allocate marks separately for the *observation* and the *reason*. If you only describe the cause-effect mechanism without explicitly stating what happens, you risk losing the \"describe\" mark. The two-stage answer — *what* happens, then *why* it happens — guarantees you bank both marks. It also forces conceptual clarity: you commit to a definite prediction before producing the explanation, which exposes any confusion in your reasoning early.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "A student writes: \"The rod gained positive charge by friction.\" Why is this physically wrong, and what should they write instead?", "answer": "The wording implies positive charge was *added* to the rod from somewhere — but positive charge (protons) can't be transferred in friction. Protons are locked in nuclei. What actually happened is that **electrons left** the rod (transferred to the other material), leaving the rod with fewer electrons than protons — a net positive imbalance. The correct phrasing: \"The rod **lost electrons** to the cloth, so it became positively charged.\" This phrasing is also what mark schemes expect.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "When you bring a charged rod near a neutral conducting sphere on an insulating stand, then walk away with the rod, the sphere goes back to a uniform neutral state. But if you'd earthed the sphere briefly while the rod was near, then removed the earth, then removed the rod, the sphere is now charged. Why? (3 steps)", "answer": "- Step 1: With no earthing, the rod just polarises the sphere temporarily. The total electron count on the sphere never changes — electrons just slosh to one side. Remove the rod, and the sphere relaxes back to uniform neutrality.\n- Step 2: With earthing while the rod is near: the rod pushes electrons (say, the rod is negative, so it repels the sphere's electrons) to the far side; with the earth wire connected, those repelled electrons can now leave the sphere entirely, escaping to ground.\n- Step 3: Break the earth wire while the rod is still near. The sphere now has fewer electrons than before — it's net positive. Remove the rod, and that net positive charge redistributes uniformly. The sphere ends up oppositely charged to the rod.\n\nThe key insight: earthing during induction lets you \"lock in\" a permanent charge of opposite sign.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "Why is the property \"insulator vs conductor\" central to **every** electrostatic-safety scenario (petrol stations, lightning rods, ESD wristbands)? (2 steps)", "answer": "- Step 1: Charge build-up only happens on insulators (electrons can't flow away). So *if* a material is an insulator near a hazard (fuel vapour, sensitive electronics), charge will accumulate uncontrollably and eventually discharge as a spark — which can ignite or damage.\n- Step 2: Charge cannot build up on a conductor that has a path to earth. Lightning rods, wristbands worn by electronics technicians, and metal-coated fuel-pump nozzles all work by giving the charge a continuous, harmless route to ground as fast as it's generated. So the *electrical* property (conductor + earthed vs insulator) is what determines danger, not other properties like waterproofness, colour, or thickness.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "Synthesis question: A balloon is rubbed on hair, then held near a thin stream of water from a tap. The water stream bends toward the balloon. Walk through everything that has to be true for this to happen, drawing on multiple concepts from the topic. (4 steps)", "answer": "- Step 1: **Friction charging**: the balloon (lower on the electrostatic series than hair) gains electrons during rubbing — it becomes negative. Hair becomes positive. Conservation of charge holds.\n- Step 2: The balloon is plastic — an **insulator** — so the charge stays put on the balloon's surface. (If the balloon were a conductor and you were holding it, the charge would leak to earth via you, and you'd see nothing.)\n- Step 3: The water stream is neutral overall, but water molecules are polar — they have a permanent dipole. Even without polar molecules, the bulk water polarises in the balloon's field: electrons in the water shift slightly, leaving the near side positive.\n- Step 4: The negative balloon attracts the (now-positive) near side of the water. Since attraction acts on the surface molecules, the stream visibly bends toward the balloon. This combines friction-charging, charge persistence on an insulator, polarisation/induction, and \"charged attracts neutral\" — the entire topic in one demonstration.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Synthesis: Why is a battery + wire \"really just static electricity in motion,\" and what role does the conductor play in the difference?", "answer": "A battery maintains a chemical imbalance that pushes electrons onto one terminal (making it negative) and removes them from the other (making it positive). If the terminals are isolated (no wire), this is identical to a charged-rod situation — a frozen imbalance, static. The instant you connect the terminals with a conductor, you give the surplus electrons a continuous *path* to flow from the − terminal back to the + terminal. The wire (conductor) is the thing that converts static-charge-stored-up-in-the-battery into a flowing current. So **conductor + voltage source = current**; remove the conductor, and you're back to static. The battery only needs to \"top up\" the imbalance as fast as electrons drain across, because chemistry replenishes the terminals continuously.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Synthesis: Compare and contrast why a *charged rod attracts paper bits*, why a *charged balloon sticks to a wall*, and why *smoke is pulled onto charged plates in a precipitator*. What single principle unites all three?", "answer": "All three are examples of the rule \"**a charged object attracts a neutral object via induction**.\" In each case: (1) the charged object produces a field; (2) that field rearranges the electrons inside the neutral material (paper, wall, smoke particle), polarising it so the near side is opposite in sign; (3) the near side, being closer, experiences stronger attraction than the far side experiences repulsion, so net attraction wins. The materials differ (insulator paper, insulator wall, mixed dust particles), but the mechanism is identical. The unifying principle: **neutral objects respond to fields by polarising**, and polarisation always produces net attraction toward the field source — never repulsion.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "Synthesis: A petrol-station attendant uses a metal nozzle to fill a car. Friction inside the hose builds up charge. Why does this situation not produce a dangerous spark, when the same friction-charging *could* be deadly if the nozzle were plastic? (3 steps)", "answer": "- Step 1: Fuel flowing through any hose generates friction-charging on the fuel and the inner hose wall — this is unavoidable. So the question isn't whether charge is created, but where it goes.\n- Step 2: With a **metal nozzle** in contact with the car (or grounded via the pump), the nozzle is a conductor with a path to earth. Charge that builds up on the fuel or hose interior leaks continuously through the metal to ground at the rate it's generated. No accumulation, no spark.\n- Step 3: With a **plastic nozzle** (insulator), the charge would have nowhere to go. It would accumulate on the nozzle surface until the voltage was high enough to spark to the (earthed) car body or the attendant's hand. With petrol vapour around, that spark could ignite the fuel-air mixture.\n\nThe general rule: hazards live wherever insulators isolate accumulating charge from earth.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Limiting/edge case: If charge is conserved, can an isolated single object ever become charged on its own (without contact with anything else)?", "answer": "No. Charging always requires a **second object** to either give or receive electrons. Conservation of charge means total charge before = total charge after, so if one object gained $$+Q$$, another must have lost $$+Q$$ (or gained $$-Q$$). You can't generate net charge from nothing. Even in friction charging — superficially \"just one rod and a cloth\" — both partners end up oppositely charged; you can't separate them and inspect \"only the rod\" without acknowledging that the cloth carries the equal and opposite. This is why every charging mechanism in this topic involves *at least two objects* (friction: rod + cloth; induction: rod + sphere; battery: chemistry inside provides the second \"object\" via redox).", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "Edge case: Two objects with very different masses (a tiny piece of foil vs a heavy table) both carry the same amount of charge. They're brought close. What dominates the *visible* response, and why?", "answer": "The foil moves dramatically; the table doesn't visibly move at all. The **electric force** on each is the same in magnitude (Newton's third law — they push/pull each other equally). But the *acceleration* is force divided by mass. The foil's tiny mass means a huge acceleration; the table's huge mass means a microscopic acceleration. So in electrostatic demonstrations you always see light objects (paper, balloons, gold leaf) responding to forces — because *acceleration*, not force, is what's visible. This is also why gold (beaten thin and light) is used for the electroscope leaf rather than a thicker, heavier sheet.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}], "count": 47}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 11942, "out_tokens": 15362, "reasoning_chars": 2631, "cost_eur": 0.061, "elapsed_s": 426, "content_chars": 63055}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 11942, "out_tokens": 11784, "reasoning_chars": 30411, "cost_eur": 0.0495, "elapsed_s": 240, "content_chars": 19287}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 11942, "out_tokens": 13619, "reasoning_chars": 1003, "cost_eur": 0.0554, "elapsed_s": 264, "content_chars": 55776}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 11697, "out_tokens": 6980, "reasoning_chars": 2280, "cost_eur": 0.0092, "elapsed_s": 61, "content_chars": 27409}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 11697, "out_tokens": 7298, "reasoning_chars": 2138, "cost_eur": 0.0095, "elapsed_s": 63, "content_chars": 28961}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 17946, "out_tokens": 17420, "reasoning_chars": 0, "cost_eur": 1.4496, "elapsed_s": 247, "content_chars": 47837}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 17946, "out_tokens": 16211, "reasoning_chars": 0, "cost_eur": 1.3662, "elapsed_s": 221, "conte const SK='phys_static_electricity_jun13';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
