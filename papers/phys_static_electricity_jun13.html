llions, billions, or trillions of billions? (2 steps)", "answer": "- Step 1: Use $$n = Q/e$$. The charge is $$Q \\approx 10^{-5}$$ C and $$e \\approx 1.6 \\times 10^{-19}$$ C. The order of magnitude is $$n \\approx \\frac{10^{-5}}{10^{-19}} = 10^{14}$$.\n- Step 2: The exact answer is about $$6.3 \\times 10^{13}$$, which is tens of trillions. So even a modest microcoulomb charge involves an astronomically large number of electrons — this is why you never notice individual electrons, only their collective effect.\n\nThe takeaway: everyday static charges involve enormous numbers of electrons, even though each carries a tiny charge.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "What is the key structural difference between a conductor and an insulator that determines whether static charge can build up on a material? (2 steps)", "answer": "- Step 1: In a conductor (e.g., copper, gold, graphite), some electrons are delocalised — free to move throughout the material. If the conductor gains extra electrons, they spread out and, if a path exists, flow away to earth or another object. Charge cannot remain localised.\n- Step 2: In an insulator (e.g., plastic, polythene, glass, rubber, wool), electrons are tightly bound to their atoms and cannot flow freely. Extra electrons placed on an insulator are *stuck* where they land — they cannot redistribute or flow away. This is why static charge only builds up on insulators.\n\nAlex's Teacher Notes: a static charge imbalance \"only happens on insulators\" — on a conductor the charge would just flow away.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "On the Electrostatic Series Chart, materials near the top tend to become positive when rubbed, while materials near the bottom tend to become negative. What property of the material determines its position on this chart? (2 steps)", "answer": "- Step 1: Position on the chart is determined by how strongly the material holds onto its electrons. Materials near the top (acetate, perspex, glass, wool, hair) have a *weak* hold on electrons — they tend to lose them when rubbed, becoming positive.\n- Step 2: Materials near the bottom (rubber, sulphur, platinum, gold) have a *strong* hold on electrons — they tend to gain electrons when rubbed, becoming negative. When you rub any two materials together, the one with the stronger hold on electrons (lower on the chart) takes electrons from the other and becomes negative.\n\nNote: the lower group includes good conductors (platinum, gold), but the chart is about electron affinity, not conductivity. Alex corrected his own slip on this — don't confuse \"holds electrons strongly\" with \"is an insulator.\"", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "When two insulators are rubbed together, one becomes positive and the other becomes negative. Why must the charges be *equal and opposite*? Which conservation principle guarantees this? (2 steps)", "answer": "- Step 1: Conservation of charge guarantees that the total charge of the system (both objects together) cannot change. Before rubbing, both are neutral, so total charge = 0.\n- Step 2: After rubbing, if one object has gained $$n$$ electrons (charge $$= -ne$$), the other has lost exactly those same $$n$$ electrons (charge $$= +ne$$). The sum is $$-ne + ne = 0$$ — still zero. The charges are equal in magnitude and opposite in sign because the same electrons were simply moved from one to the other.\n\nYou never create new charge or destroy it — you just relocate it.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "Alex wrote the chain: friction → charge → spark → current. Explain what happens at each link, connecting the physics from rubbing to a felt shock. (4 steps)", "answer": "- Step 1: Friction — two insulators are rubbed together. Surface contact transfers electrons from one material to the other.\n- Step 2: Charge — the object that gained electrons is now negatively charged; the other is positively charged. Because they're insulators, the charge stays put and builds up.\n- Step 3: Spark — when the charged object gets close to a conductor or earth, the voltage difference becomes large enough to overcome the air's insulation. Electrons jump across the gap, creating a brief spark (air breaks down).\n- Step 4: Current — that spark *is* electrons flowing, which is a (brief) electric current. The Family Guy static shock is the model: rubbing feet on carpet (friction → charge), then touching someone (spark → current felt as a shock).\n\nThe whole chain is one story: static charge is charge waiting to move; when it finally moves, it becomes current.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "State the three rules of electrostatic force. Which rule is most commonly forgotten or confused by students? (3 steps)", "answer": "- Step 1: Like charges repel — two positives push apart, two negatives push apart.\n- Step 2: Unlike charges attract — a positive and a negative pull together.\n- Step 3: A charged object attracts a neutral object (by induction — the charged object rearranges electrons in the neutral one, creating an opposite charge on the near side).\n\nThe most commonly confused rule is #1. Students often instinctively say two charged objects \"attract\" regardless of sign. Alex corrected Phuc multiple times: \"same charge ⇒ repel\" — two positives repel, two negatives also repel. Only *opposite* signs attract.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Two objects both carry a negative charge. Do they attract or repel? A student says \"they attract because they're both charged.\" What is the error? (2 steps)", "answer": "- Step 1: They repel. The rule is: like (same-sign) charges repel. Two negatives have the same sign, so they push apart — just as two positives would.\n- Step 2: The student's error is confusing \"charged\" with \"attractive.\" Being charged doesn't automatically mean attraction — it's the *relative sign* that matters. Two objects with the same sign always repel, regardless of whether both are positive or both are negative.\n\nThis was Phuc's most repeated mistake in the lesson. The fix: once you know both charges have the same sign, immediately write \"repel.\"", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "A student says \"the electrostatic force between two charged objects depends on which particle (proton or electron) caused the charge.\" Is this correct? Why or why not? (2 steps)", "answer": "- Step 1: This is incorrect. The force depends only on the *net sign* of the overall charge on each object, not on which subatomic particle caused the imbalance.\n- Step 2: Whether an object is positive because it lost electrons, or negative because it gained electrons, is irrelevant to the force rule. A rod with net charge $$+3e$$ repels another rod with net charge $$+5e$$ — the fact that both became positive by *losing electrons* doesn't change the \"like charges repel\" outcome. The force rule cares about the sign of the total charge, not the mechanism.\n\nPhuc raised this question and Alex confirmed: \"positive/negative\" refers to the object's overall (net) charge, not individual particles.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "A negatively charged balloon is brought near a neutral wall. The balloon sticks to the wall. Explain step-by-step why this happens, even though the wall started neutral. (3 steps)", "answer": "- Step 1: The balloon is negative, so it creates an electric field that pushes on the electrons in the wall. Electrons in the wall are repelled away from the balloon, towards the far side of the wall.\n- Step 2: The near side of the wall now has a deficit of electrons — it has become positively charged (induced charge). The far side has an excess of electrons — negatively charged. The wall is *still neutral overall*, but charge has been *redistributed* (polarised).\n- Step 3: The near side of the wall (positive) is closer to the balloon (negative) than the far side (negative). The attractive force between near-side and balloon is stronger than the repulsive force from the far side (because force falls off with distance). Net result: attraction — the balloon sticks.\n\nThis is the \"charged object attracts a neutral object\" rule, explained by induction.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "Why does a charged plastic rod pick up small neutral pieces of paper? Name the mechanism and explain the charge rearrangement. (3 steps)", "answer": "- Step 1: The mechanism is induction — the rod never touches the paper; it just comes near it.\n- Step 2: The charged rod (say negative) repels electrons in each paper scrap to the far side. The near side of each scrap becomes positive (electron deficit), and the far side becomes negative (electron excess). The paper is still neutral overall but polarised.\n- Step 3: The near side (opposite charge to the rod) is closer, so the attractive force outweighs the repulsive force from the far side. The net force is attractive, and the light paper scraps are pulled up to the rod.\n\nThis is Demonstration 2 from the lesson, and it's the same physics as the balloon on the wall.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "What is the difference between charging by *friction* and charging by *induction*? For each, state whether the objects touch, and what happens to the neutral object's charge. (3 steps)", "answer": "- Step 1: Charging by friction — two objects are physically rubbed together. Electrons are *transferred* from one to the other. Both objects end up with a real, permanent net charge (equal and opposite). The objects physically touch.\n- Step 2: Charging by induction — a charged object is brought *near* (not touching) a neutral object. The neutral object's electrons are *rearranged* (polarised), but no electrons leave or arrive — the object remains neutral overall. The objects do not touch.\n- Step 3: If you *want* the neutral object to keep a permanent charge after induction, you must add an earthing step: while the charged object is nearby, briefly touch the neutral object to earth. Electrons flow to/from earth. When you remove the earth and then the charged object, the formerly neutral object retains a net charge opposite to the inducing object.\n\nFriction = transfer (touch). Induction = rearrangement (no touch). Induction + earthing = permanent charge (brief touch to earth only).", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "What does \"earthing\" an object mean physically, and why does it cause a charged object to become neutral? (2 steps)", "answer": "- Step 1: Earthing means connecting the object to the ground (the Earth) using a conductor. The Earth acts as an effectively infinite reservoir of charge — it can supply or absorb electrons without its own charge changing noticeably.\n- Step 2: A negatively charged earthed object has excess electrons. These flow through the conductor to the Earth, because charge \"wants to be balanced.\" A positively charged earthed object has a deficit of electrons, so electrons flow *from* the Earth *to* the object. In both cases, the flow continues until the object is neutral.\n\nAlex's line: \"what's the biggest source of spare electrons in the world? The world.\"", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "A positively charged object is earthed. In which direction do electrons flow — from object to Earth, or from Earth to object? Why? (2 steps)", "answer": "- Step 1: The object is positive, meaning it has fewer electrons than protons. It has a deficit of electrons.\n- Step 2: Electrons flow *from Earth to the object* to fill that deficit. The Earth supplies electrons because charge wants to be balanced. The flow stops when the object's electron count matches its proton count — i.e., it becomes neutral.\n\nDirection of electron flow is always towards wherever there's a deficit (positive object) or away from wherever there's a surplus (negative object), via the earth path.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "What is the formula linking current, charge, and time? Define each symbol and its SI unit. What is the definition of one ampere in terms of coulombs and seconds? (3 steps)", "answer": "- Step 1: The formula is $$I = \\frac{\\Delta Q}{\\Delta t}$$, where $$I$$ = current (amperes, A), $$\\Delta Q$$ = charge that flows past a point (coulombs, C), and $$\\Delta t$$ = time taken (seconds, s).\n- Step 2: Rearranged: $$\\Delta Q = I \\Delta t$$. This says the total charge that flows equals current × time.\n- Step 3: One ampere is defined as one coulomb per second: $$1\\;\\text{A} = 1\\;\\text{C}\\;\\text{s}^{-1}$$. So if 1 C flows in 1 s, the current is 1 A. Always convert to A, C, and s before substituting (e.g., convert mA to A, μC to C, minutes to seconds).\n\nThis is IAL specification statement 64.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "How do you combine $$Q = ne$$ and $$I = \\Delta Q / \\Delta t$$ to find the number of electrons flowing in a current? Derive the combined formula. (3 steps)", "answer": "- Step 1: From $$Q = ne$$, the number of electrons responsible for a charge $$Q$$ is $$n = Q/e$$.\n- Step 2: From $$I = \\Delta Q / \\Delta t$$, the total charge flowing in time $$\\Delta t$$ is $$\\Delta Q = I\\Delta t$$.\n- Step 3: Substitute: $$n = \\frac{\\Delta Q}{e} = \\frac{I\\Delta t}{e}$$. This gives the number of electrons that flow past a point when a current $$I$$ flows for time $$\\Delta t$$.\n\nFor example, a current of 1 A for 1 s delivers $$\\Delta Q = 1$$ C, which is $$n = 1/(1.6 \\times 10^{-19}) \\approx 6.25 \\times 10^{18}$$ electrons — an enormous number.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "How is static electricity related to electric current? What is the same about them, and what is different? (3 steps)", "answer": "- Step 1: Both involve a charge imbalance — excess or deficit of electrons. The underlying physics (electrons, charge, conservation) is the same.\n- Step 2: The difference is *mobility*. In static electricity, the charge sits on an insulator and cannot flow — it is held in place. In a current, the charge is free to flow through a conductor, producing a continuous movement of electrons.\n- Step 3: The transition from static to current happens when the charge finally gets a path to move — this is the \"spark\" in Alex's chain (friction → charge → spark → current). A battery maintains a charge imbalance at its terminals (like static), but because a conductor connects them, electrons flow continuously as current rather than building up.\n\nStatic = charge held still on an insulator. Current = the same charge free to flow through a conductor.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "Inside a battery, what creates the charge imbalance at the terminals? How does this connect to static electricity? (3 steps)", "answer": "- Step 1: Inside the cell, the EMF (electromotive force) does work to push electrons from one terminal to the other. One terminal ends up with excess electrons (negative terminal) and the other has a deficit (positive terminal).\n- Step 2: This is the same type of charge imbalance as static electricity — a separation of positive and negative charge. The difference is that the battery *continuously maintains* this imbalance using chemical energy.\n- Step 3: When a conductor (wire) connects the terminals, electrons flow from the negative terminal through the circuit to the positive terminal — a continuous current. Without the conductor, the charge would just sit on the terminals (static). The battery is essentially a device that keeps \"recharging\" the static imbalance so current keeps flowing.\n\nConventional current flows from $$+$$ to $$-$$; electron flow is from $$-$$ to $$+$$.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "A gold-leaf electroscope has a metal plate on top, a metal rod, and a thin gold leaf. Why is *gold* used for the leaf, and what is the purpose of the instrument? (2 steps)", "answer": "- Step 1: Gold is used because it can be beaten into extremely thin, light sheets (gold leaf). The leaf must be light enough that even a small electrostatic repulsive force can push it away from the rod and make it visibly rise.\n- Step 2: The purpose of the electroscope is to *detect electric charge*. When the metal parts become charged, the leaf and rod share the same sign of charge and repel each other — the leaf rises. The greater the charge, the further the leaf deflects.\n\nThe entire metal assembly (plate, rod, leaf) is insulated from the case so that charge placed on it cannot leak away.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "A negatively charged rod is touched onto the metal plate of a gold-leaf electroscope. Explain step-by-step why the gold leaf rises. Identify the force responsible. (4 steps)", "answer": "- Step 1: The negative rod touches the metal plate. Because metal is a conductor, electrons flow from the rod into the metal (plate → rod → leaf). Charge is shared across the entire metal structure.\n- Step 2: The metal plate, metal rod, and gold leaf all become negatively charged — they all gained electrons.\n- Step 3: The metal rod and the gold leaf now carry the *same* (negative) charge.\n- Step 4: Like charges repel — the rod and the leaf push apart. The leaf is light and free to move, so it swings away from the rod and rises. The force is electrostatic *repulsion*, not attraction.\n\nKey misconception trap: the leaf does NOT rise because a neutral leaf is \"attracted\" to a negative rod. By contact, the leaf becomes the same sign as the rod and repels.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "A student explains the rising gold leaf (charged by contact with a negative rod) as: \"The neutral leaf is attracted to the negative rod.\" What is wrong with this explanation? What is the correct explanation? (2 steps)", "answer": "- Step 1: The error is that the leaf is no longer neutral. When the negative rod touched the plate, electrons flowed into the entire metal structure (plate, rod, leaf) by conduction. The leaf became negatively charged — it is not neutral.\n- Step 2: The correct explanation: both the metal rod and the gold leaf now carry the same (negative) charge. Like charges repel, so the leaf is pushed away from the rod. It rises by *repulsion*, not attraction.\n\nThis was Phuc's error twice in the lesson. The fix: by contact, charge is shared — the leaf takes the same sign as the rod and repels.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "An electroscope is given an overall positive charge, so the leaf is already raised. A negative rod is then brought near (but not touching) the top plate. What happens to the leaf, and why? (3 steps)", "answer": "- Step 1: The electroscope is positive (deficit of electrons), so the rod and leaf are both positive and repelling — the leaf is raised.\n- Step 2: When the negative rod is brought near the top plate, it attracts electrons. Electrons are drawn up from the rest of the metal towards the top plate (or, if the rod touches, electrons flow in from the rod). This partially cancels the positive charge on the metal.\n- Step 3: The net charge on the rod-and-leaf assembly decreases towards zero, so the repulsive force weakens and the leaf *falls*. If exactly enough electrons arrive to cancel all the positive charge, the electroscope becomes neutral and the leaf hangs straight down.\n\nPhuc's insight: if more electrons arrive than needed, the electroscope overshoots to negative and the leaf would rise again (same-sign repulsion, opposite direction).", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "An electroscope is positively charged (leaf raised). You want to make it exactly neutral with the leaf flat, not risk overshooting. What procedure guarantees this, and why? (2 steps)", "answer": "- Step 1: Earth the electroscope — connect it to the ground with a conductor. Charge will flow to/from the Earth until the electroscope is neutral.\n- Step 2: The Earth is an effectively infinite reservoir, so it can supply exactly the right number of electrons to fill the deficit (or absorb exactly the right number if the object is negative). It self-regulates: once the object is neutral, there's no longer any driving force for charge to flow, so the current stops automatically. No overshoot is possible because the flow stops at the equilibrium point.\n\nThis is why earthing is the reliable way to fully discharge a charged object.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "In the EDPL exam question, electrons are transferred from a metal plate to a lifting sheet via a control unit. The question says \"use the idea of charge movement.\" What must your answer include to get both marks? (2 steps)", "answer": "- Step 1: You must state that *electrons move* from the metal plate to the lifting sheet (specify the direction of electron flow). This is what \"charge movement\" means — electrons are the mobile charge carriers.\n- Step 2: You must state the resulting charges: the lifting sheet *gains* electrons so becomes negative; the metal plate *loses* electrons so becomes positive. Each mark requires a separate piece of information: (1) direction of electron movement, (2) resulting charge on each object.\n\nAlex's exam technique: match your wording to the command phrase. \"Use the idea of charge movement\" means you must talk about electrons moving and which way — not just state the final charges without explaining how they got there.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "In the EDPL, why are neutral dust particles attracted onto the charged lifting sheet? Name the rule and explain briefly. (2 steps)", "answer": "- Step 1: The rule is: a charged object attracts a neutral object. The lifting sheet is charged (negative), and the dust particles are neutral.\n- Step 2: By induction, the charged sheet repels electrons in each dust particle to the far side, making the near side of the dust positive. The near side (opposite charge) is closer, so attraction dominates. The dust is pulled onto the sheet.\n\nThis is the same physics as the plastic rod picking up paper — \"charged attracts neutral\" by induction.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "Why is it dangerous to wear a nylon jacket at a petrol station, but safe to wear a wax-coated jacket with metal/earthing? Identify the key electrical property, not a red herring. (3 steps)", "answer": "- Step 1: Nylon is an *insulator*. When you move in it, friction between the jacket and your clothing transfers electrons, building up static charge on the nylon. Because it's an insulator, the charge cannot flow away — it accumulates.\n- Step 2: If enough charge builds up, it can spark to a nearby earthed object (e.g., the metal pump). Near petrol vapour, that spark can cause ignition — this is the danger.\n- Step 3: A wax-coated jacket with metal/earthing is a *conductor* (or is earthed). Any charge that builds up immediately flows to earth through the conductive path, so no static accumulates and no spark can form — this is safe.\n\nCommon trap: saying wax is safe \"because it's waterproof.\" The property that matters is electrical conductivity and earthing, not water resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "Explain how a lightning strike forms, identifying each step: charging mechanism, charge distribution, and discharge. (3 steps)", "answer": "- Step 1: Inside a storm cloud, ice crystals collide and rub against each other (friction charging). This transfers charge, making parts of the cloud negatively charged (typically the base) and other parts positively charged.\n- Step 2: The negative cloud base induces a positive charge on the ground below it (by induction — electrons in the ground are repelled deeper, leaving the surface positive).\n- Step 3: Air is normally a good insulator, but when the voltage difference between cloud and ground becomes large enough, the air breaks down and loses its insulating property. A giant spark — lightning — flows between cloud and ground as electrons discharge to earth. This is the same friction → charge → spark → current chain, just on a massive scale.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "In electrostatic paint spraying, the paint droplets are charged positive and the car body is charged negative. Explain why this gives an even coat with little waste. (3 steps)", "answer": "- Step 1: At the nozzle, electrons are removed from the paint droplets, making them positively charged. The car body is connected to a negative terminal, giving it a negative charge.\n- Step 2: Unlike charges attract — the positive paint droplets are pulled towards the negative car body. This attraction guides the paint directly onto the car rather than drifting into the air.\n- Step 3: The attraction even pulls paint around edges and into hidden/recessed areas (the electric field lines curve around corners), giving a more even coat. Overspray is reduced because droplets that would miss are pulled back by the electrostatic attraction — little waste.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "How do smoke precipitators in chimneys use static electricity to remove waste particles from exhaust gases? (3 steps)", "answer": "- Step 1: Charged plates are placed inside the chimney. As smoke particles pass by, the charged plates induce opposite charge on the near side of the neutral smoke particles (by induction).\n- Step 2: The induced attraction pulls the smoke particles towards the charged plates. The particles stick to the plates and are removed from the gas flow.\n- Step 3: Periodically, the plates are cleaned (the collected particles are knocked off). The result is that exhaust gases leaving the chimney are much cleaner — the \"charged attracts neutral\" principle removes pollutants that would otherwise escape.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "A current of 0.50 A flows for 2.0 minutes. Without detailed calculation, estimate the order of magnitude of the number of electrons that flow. Is it closer to $$10^{10}$$, $$10^{20}$$, or $$10^{30}$$? (3 steps)", "answer": "- Step 1: Convert time: 2.0 minutes ≈ 120 s. Charge: $$\\Delta Q = I\\Delta t = 0.5 \\times 120 = 60$$ C.\n- Step 2: Number of electrons: $$n = \\Delta Q / e = 60 / (1.6 \\times 10^{-19})$$. The order of magnitude is $$n \\approx 60 \\times 10^{19} / 1.6 \\approx 40 \\times 10^{19} = 4 \\times 10^{20}$$.\n- Step 3: The exact answer is $$3.75 \\times 10^{20}$$, so the order is $$10^{20}$$. Even modest currents move enormous numbers of electrons per second.\n\nTakeaway: any current you encounter in everyday circuits involves roughly $$10^{18}$$–$$10^{20}$$ electrons per second.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "A perspex rod is rubbed with a cloth and becomes positive. (a) Which way did electrons move — from rod to cloth, or cloth to rod? (b) What is the charge on the cloth? (2 steps)", "answer": "- Step 1: The rod became positive, meaning it *lost* electrons. Therefore, electrons moved from the rod *onto the cloth* (rod → cloth).\n- Step 2: The cloth *gained* those electrons, so the cloth is negative. The charges are equal and opposite by conservation of charge — whatever charge the rod gained (+), the cloth gained the opposite (−).\n\nRemember: positive charging always means electron loss, never proton gain.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "Two polythene rods are both rubbed with a cloth and each becomes negative. They are brought near each other. A student says \"they attract because they're both the same material.\" What is wrong? (2 steps)", "answer": "- Step 1: The material being the same is irrelevant. What matters is the *sign of the charge*. Both rods are negative — they have the same sign of charge.\n- Step 2: Like charges repel. Two negative rods repel each other. The student is confusing \"same material\" with \"same charge\" — and even if both were true, same charge always means repulsion.\n\nThis was Question 6 from the lesson. Phuc initially said \"attract\" for the same-charge pair — a very common error.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "Walking across a nylon carpet makes you negatively charged. You then touch a metal door handle and feel a shock. Explain the complete chain from friction to shock, naming each physical process. (4 steps)", "answer": "- Step 1: Friction — your shoes/body rub against the nylon carpet. Nylon is an insulator, so electrons transfer from the carpet onto you.\n- Step 2: Charge — you gain surplus electrons, becoming negatively charged. Because your body (especially with insulating shoes) is not earthed, the charge builds up and stays on you.\n- Step 3: Spark — when you touch the metal handle, the handle is a conductor connected (through its mounting) to earth. The voltage difference between you (negative) and earth is large enough that electrons jump across the small gap at the moment of contact — a spark.\n- Step 4: Current — the rapid flow of electrons from you through the handle to earth is a brief electric current. You feel this as a shock. The charge \"wanted to be balanced\" and the handle gave it a path to earth.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "A student says: \"When you rub a balloon on your jumper, the balloon gains positive charge.\" Correct this statement and explain what actually happens. (2 steps)", "answer": "- Step 1: The balloon gains *electrons* from the jumper, so the balloon becomes *negative*, not positive. The jumper loses electrons and becomes positive.\n- Step 2: The direction of electron transfer depends on the relative electron affinity of the two materials (their positions on the electrostatic series). The material with the stronger hold on electrons takes them and becomes negative. In the balloon-jumper case, the balloon (rubber-like) holds electrons more strongly than the jumper (wool-like), so electrons move from jumper to balloon.\n\nThe statement is wrong in two ways: (1) the balloon becomes negative, not positive; (2) objects don't \"gain positive charge\" — they lose electrons and the positive is what remains.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "Why can't static charge build up on a *conductor* that is isolated from earth, if you try to charge it by rubbing? Or can it? Think carefully about what happens when you stop rubbing. (3 steps)", "answer": "- Step 1: While you are rubbing a conductor, friction does transfer electrons to or from it. So momentarily, the conductor can have an imbalance of charge.\n- Step 2: However, because the conductor has free (delocalised) electrons, the excess charge immediately redistributes itself across the entire surface of the conductor. The charge doesn't stay localised at the rubbing point.\n- Step 3: If the conductor is being held by a person or is on a surface, those excess electrons will quickly flow away through any conductive path (your hand, the bench). Only if the conductor is extremely well insulated (e.g., on an insulating stand) can it retain the charge — but this is unusual. This is why static charge \"only happens on insulators\" in practice.\n\nEdge case: a conductor on an insulating stand *can* hold static charge — this is exactly how the gold-leaf electroscope works. The metal must be insulated from earth.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "Alex's exam-technique advice: when a question asks you to describe and explain what happens between two charged objects, what two-step answer structure should you use? (2 steps)", "answer": "- Step 1: First, state the *observation/conclusion* — what happens (e.g., \"they repel\" or \"the leaf rises\"). This gets the first mark.\n- Step 2: Then, state the *reason* — why it happens (e.g., \"because they have the same charge\" or \"because like charges repel\"). This gets the second mark.\n\nThe model: \"Describe: they repel. Explain: because they have the same charge.\" Don't re-open the charging step if the question only asks about the force — once you know the signs, answer the force first.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "Why does a charged object that is brought near (not touching) a neutral conductor *attract* it, while a charged object that touches a neutral conductor *gives it the same sign of charge*? Contrast the two mechanisms. (3 steps)", "answer": "- Step 1: By induction (near, not touching): the charged object's field rearranges electrons in the neutral conductor, polarising it. The near side becomes opposite in charge to the inducing object, so there is attraction. No electrons are transferred — the conductor is still neutral overall, just polarised.\n- Step 2: By contact (touching): electrons physically flow from the charged object into the conductor (or from the conductor to the charged object, depending on signs). The conductor gains a real net charge of the same sign as the object that touched it.\n- Step 3: The key difference: induction is *rearrangement without transfer* (attraction between opposite induced charges), while contact is *transfer and sharing* (same-sign repulsion after sharing). This is why the electroscope leaf rises by *repulsion* after contact charging, but a neutral paper scrap is *attracted* by induction.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": true}, {"question": "A small, lightweight exercise: A nuclide is written $$^{7}_{3}\\text{Li}$$. How many protons, neutrons, and electrons does a neutral atom of this nuclide have? Do this mentally. (2 steps)", "answer": "- Step 1: Protons = $$Z = 3$$. Neutrons = $$A - Z = 7 - 3 = 4$$.\n- Step 2: A neutral atom has electrons = protons = 3. So the answer is 3 protons, 4 neutrons, 3 electrons.\n\nThis is a direct application of reading the nuclide symbol: bottom number = protons, top minus bottom = neutrons, neutral means electrons = protons.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "A small exercise: A current of 2 A flows for 10 seconds. Roughly what charge flows, and roughly how many electrons is that? (Order of magnitude only.) (2 steps)", "answer": "- Step 1: $$\\Delta Q = I\\Delta t = 2 \\times 10 = 20$$ C.\n- Step 2: $$n = \\Delta Q / e = 20 / (1.6 \\times 10^{-19}) \\approx 1.25 \\times 10^{20}$$. The order of magnitude is $$10^{20}$$ electrons.\n\nThe point: even 20 coulombs — a modest charge — involves over $$10^{20}$$ electrons. Individual electron charges are incredibly tiny.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "A small exercise: An object has a charge of $$+3.2 \\times 10^{-19}$$ C. How many electrons did it lose? (2 steps)", "answer": "- Step 1: Use $$n = Q/e = 3.2 \\times 10^{-19} / 1.6 \\times 10^{-19} = 2$$.\n- Step 2: The object lost 2 electrons. This is a clean integer because $$3.2 \\times 10^{-19}$$ is exactly $$2e$$ — charge is quantised, so you'd expect a whole number.\n\nIf the charge were, say, $$3.0 \\times 10^{-19}$$ C, you'd get $$n \\approx 1.875$$, which is not an integer — this would be impossible for a single object's net charge, confirming quantisation.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "Why is the electrostatic series chart useful when predicting the outcome of rubbing two insulators together? What does it tell you that you couldn't know otherwise? (2 steps)", "answer": "- Step 1: The chart ranks materials by their electron affinity (how strongly they hold electrons). When you rub any two materials together, you can look at their positions: the one *lower* on the chart holds electrons more strongly and will *gain* electrons (become negative), while the one *higher* will *lose* electrons (become positive).\n- Step 2: Without the chart, you'd have to memorise the outcome for every pair of materials. The chart gives you a general rule: whichever material is lower takes electrons and goes negative. This is why Alex could predict the sign of charge on any rubbed pair, even ones he hadn't seen before.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": true}, {"question": "A printer/photocopier uses static electricity to place toner on paper. Based on the principles in this chapter, explain the basic mechanism in one sentence. (1 step)", "answer": "- Step 1: Charged regions on a drum or plate attract neutral toner particles (by induction: \"charged attracts neutral\"), and then the toner is transferred to paper where opposite charge holds it in place, allowing very precise placement of ink at specific locations.\n\nThe key principle: static charge lets you control where charged or neutral particles go with precision, because the electrostatic force is directional and predictable.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "A student charges an electroscope by contact with a negative rod, then brings a positive rod near (not touching) the top plate. What happens to the leaf — does it rise further, fall, or stay the same? Explain. (3 steps)", "answer": "- Step 1: After contact with the negative rod, the electroscope is negative — the leaf and rod both carry negative charge and repel, so the leaf is raised.\n- Step 2: When the positive rod is brought near the top plate, it attracts electrons. Electrons are drawn towards the top plate (towards the positive rod), reducing the negative charge on the lower rod and leaf.\n- Step 3: With less negative charge on the leaf and rod, the repulsive force between them weakens, so the leaf *falls* (moves closer to the rod). This is the same logic as Q29 — bringing an oppositely charged rod near partially cancels the electroscope's charge.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "Misconception probe: \"If two objects are both charged, they must attract each other.\" Give a counterexample and state the correct rule. (2 steps)", "answer": "- Step 1: Counterexample: two negatively charged rods repel each other, even though both are charged. Being charged is not sufficient for attraction — the *signs* must be opposite.\n- Step 2: The correct rule: the force depends on whether the charges are like or unlike. Like charges (both positive or both negative) repel. Unlike charges (one positive, one negative) attract. A charged object can also attract a neutral object (by induction), but two objects with the same sign *always* repel.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": true}, {"question": "Misconception probe: \"When you rub a plastic rod with cloth, you create new charge on the rod.\" Why is this wrong? What actually happens? (2 steps)", "answer": "- Step 1: Charge is *conserved* — it cannot be created or destroyed. The total charge before and after rubbing is the same (zero, if both started neutral).\n- Step 2: What actually happens is *transfer*: electrons move from the cloth to the rod (or vice versa). The rod gains electrons and becomes negative; the cloth loses the same electrons and becomes positive. The net charge of the system is still zero — charge was relocated, not created.\n\n\"Creating charge\" is as impossible as \"creating energy\" — both are conserved quantities.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "Edge case: Can a conductor ever hold a static charge? Under what specific condition? (2 steps)", "answer": "- Step 1: Yes, a conductor can hold a static charge, but *only* if it is isolated from earth — i.e., not connected to any path that allows charge to flow away. It must be on an insulating support.\n- Step 2: The gold-leaf electroscope is exactly this case: the metal plate, rod, and leaf are all conductors, but they are insulated from the case and from earth. Charge placed on them cannot escape, so it stays and the leaf remains raised. If you touch the plate with your finger (earthing it), the charge immediately flows away through you.\n\nSo \"conductors can't hold static charge\" is only true *if the conductor is earthed or has a conductive path to earth*. An isolated conductor can hold charge perfectly well.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": true}, {"question": "Limiting case: What happens to the gold-leaf electroscope's deflection as the charge on it approaches zero? What does this tell you about the relationship between charge and force? (2 steps)", "answer": "- Step 1: As the charge on the electroscope approaches zero, the leaf deflection decreases — the leaf hangs closer and closer to the rod. At exactly zero charge, the leaf hangs straight down (no repulsion).\n- Step 2: This tells you the electrostatic repulsive force depends on the *magnitude* of the charges. Less charge → weaker repulsion → smaller deflection. At zero charge, there is no force at all. (Later in IAL Unit 4, Coulomb's law quantifies this: $$F \\propto Q_1 Q_2$$ — force is proportional to the product of the charges.)", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "Synthesis question: A student rubs a polythene rod with a duster, making the rod negative. They then hold the rod near small pieces of aluminium foil (a conductor) resting on an insulating table. The foil jumps up to the rod, sticks briefly, then suddenly drops away. Explain the entire sequence using the concepts of induction, conduction, and electrostatic force. (4 steps)", "answer": "- Step 1: Induction (attraction) — the negative rod is brought near the neutral foil. It repels electrons in the foil to the far side, making the near side positive. The near side (positive) is closer to the rod, so attraction dominates and the foil jumps up.\n- Step 2: Conduction (contact) — when the foil touches the rod, electrons flow from the rod into the foil (metal is a conductor, so electrons flow freely). The foil now gains a net negative charge.\n- Step 3: Same-sign repulsion — now both the rod and the foil are negative. Like charges repel, so the foil is pushed away from the rod.\n- Step 4: The foil drops away. This sequence (attract → touch → repel) is a classic demonstration that combines induction (initial attraction of neutral object) with conduction (charge sharing on contact) and then repulsion (same sign after sharing).", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": true}, {"question": "Synthesis question: In the EDPL system, a 10 kV supply moves electrons from a metal plate to a lifting sheet. The sheet becomes negative and attracts neutral dust. If the power supply is switched off, what happens to the dust already on the sheet? Does it stay or fall? Consider both the electrostatic force and gravity. (3 steps)", "answer": "- Step 1: When the power is off, no further electrons are being supplied to the sheet. However, the charge already on the sheet does not immediately disappear — the sheet is on an insulating floor, so the charge has no path to earth and remains.\n- Step 2: The charged sheet continues to attract the neutral dust by induction, so the dust that has already been collected *stays* on the sheet as long as the charge persists.\n- Step 3: Over time, the charge may slowly leak away (humid air provides a slight conductive path), weakening the attraction. If the charge drops enough that the electrostatic force can no longer overcome gravity on the dust particles, they would fall. But in the short term, the dust stays.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": true}, {"question": "Synthesis: A battery, a charged balloon, and a gold-leaf electroscope all involve charge imbalances. Rank them from \"most temporary\" to \"most persistent\" charge, and explain why. (3 steps)", "answer": "- Step 1: Most temporary — the battery. The battery *maintains* its charge imbalance only while chemical energy drives the EMF. If the battery is connected to a circuit, charge flows continuously and the imbalance is constantly being restored. Disconnect the circuit and the terminals slowly equalise through internal leakage. The imbalance is actively maintained, not stored.\n- Step 2: Middle — the charged balloon. The balloon (insulator) holds its charge persistently because electrons cannot flow away. But the charge can slowly leak through humid air or be neutralised by touching a conductor. It's persistent but passive — no energy source maintains it.\n- Step 3: Most persistent — the electroscope. Like the balloon, the charge is trapped on an insulated conductor. But because the electroscope is designed with good insulation (air gap, insulating bush), the charge can persist for hours. It's the same mechanism as the balloon (charge trapped by insulation), but with better isolation.\n\nThe key variable is: *how easily can the charge find a path to flow away?*", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": true}], "count": 57}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Given a neutral atom of lithium-7 (⁷₃Li), how many protons, neutrons, and electrons does it have? Explain how the nuclide symbol determines these values. (3 steps)", "answer": "- Step 1: **Protons** = atomic number (Z). The subscript ₃ in ⁷₃Li means Z = 3 → protons = 3.  \n- Step 2: **Neutrons** = mass number (A) - Z. The superscript ⁷ means A = 7 → neutrons = 7 - 3 = 4.  \n- Step 3: **Electrons** = protons in a neutral atom. Since the atom is neutral, electrons = protons = 3.  \n\n+ **Key takeaway**: The nuclide symbol ⁷₃Li encodes Z (protons) and A (protons + neutrons). Electrons equal protons in neutral atoms.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why is the electron’s mass considered \"negligible\" compared to a proton’s mass? Use the given absolute masses to justify this.", "answer": "The electron mass (9.11 × 10⁻³¹ kg) is ~1,830 times smaller than the proton mass (1.67 × 10⁻²⁷ kg). This ratio (m_p/m_e ≈ 1,830) means electrons contribute almost nothing to an atom’s total mass, which is why static electricity focuses on electron transfer, not proton movement.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "A plastic rod becomes negatively charged when rubbed with a wool cloth. Which material has a stronger hold on electrons, and why does this determine the charge transfer? (3 steps)", "answer": "- Step 1: **Electron transfer direction**. The material with the stronger hold on electrons (plastic) gains electrons.  \n- Step 2: **Electrostatic series**. Plastic is lower on the series (strong hold) → gains electrons → becomes negative. Wool (weaker hold) loses electrons → becomes positive.  \n- Step 3: **Conservation of charge**. Total charge remains zero: electrons moved from wool to plastic create equal and opposite charges.  \n\n+ **Misconception probe**: Why isn’t the wool \"gaining positive charge\"? Because positive charge isn’t transferred; wool becomes positive by losing electrons.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Two polythene rods are both charged negatively. What happens when they are brought close together? Explain using the principle of electrostatic force.", "answer": "They repel. Like charges (both negative) exert repulsive forces on each other. This is because the excess electrons on each rod push against each other, following Coulomb’s law (qualitative).  \n\n+ **Edge case**: What if one rod is neutral? The charged rod would induce a positive charge on the neutral rod’s near side, causing attraction.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How does charging by induction allow a charged balloon to stick to a neutral wall? Describe the electron rearrangement in the wall. (3 steps)", "answer": "- Step 1: **Charged object’s field**. A negatively charged balloon repels electrons in the wall’s surface.  \n- Step 2: **Induced charge separation**. The wall’s near side becomes positively charged (electrons pushed away), while the far side becomes negative.  \n- Step 3: **Net attraction**. The positive near side is closer to the balloon than the negative far side, creating a net attractive force.  \n\n+ **Visual intuition**: Sketch the wall’s charges: - - - [balloon] → + + + | - - - [wall].", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": true}, {"question": "Why does a gold-leaf electroscope’s leaf rise when a negatively charged rod is touched to its plate? Explain the role of electron flow and like charges. (3 steps)", "answer": "- Step 1: **Electron transfer**. The rod’s excess electrons flow into the plate and leaf.  \n- Step 2: **Charge distribution**. Both the plate and leaf become negatively charged.  \n- Step 3: **Repulsion**. Like charges on the leaf and rod repel, pushing the leaf upward.  \n\n+ **Common error**: \"The leaf is neutral and attracted.\" Correction: Contact charging ensures the leaf shares the rod’s charge, causing repulsion.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "A current of 0.25 A flows for 1 minute. How much charge passes through a point in the circuit? Use the formula I = ΔQ/Δt and explain why ampere-seconds (A·s) equal coulombs (C).", "answer": "ΔQ = I × Δt = 0.25 A × 60 s = 15 C.  \n- Step 1: Rearranging I = ΔQ/Δt → ΔQ = I × Δt.  \n- Step 2: Units: A = C/s → C/s × s = C.  \n- Step 3: Physical meaning. 1 A = 1 C/s, so 0.25 A over 60 s moves 15 C.  \n\n+ **Intuition**: Current measures \"charge flow rate,\" like liters per second in a water pipe.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "What is the difference between charging by friction and charging by induction? Compare how each affects the total charge of a system.", "answer": "- **Friction**: Electrons are transferred between two objects (e.g., wool + plastic rod). Total charge remains zero (conserved).  \n- **Induction**: Electrons are rearranged within a single object (e.g., balloon near wall). Total charge remains neutral.  \n\n+ **Contrast**: Friction creates equal/opposite charges; induction creates temporary charge separation without adding/removing electrons.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why is a nylon carpet dangerous in a petrol station, but a metal floor safe? Relate this to the role of conductors and insulators in static charge buildup.", "answer": "- **Nylon (insulator)**: Prevents electrons from flowing → static charge accumulates on a person walking → spark when touching a conductor.  \n- **Metal (conductor)**: Conducts electrons to ground → charge dissipates → no buildup.  \n\n+ **Safety rule**: Insulators → dangerous for static; conductors/earthed → safe.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "A gold-leaf electroscope is positively charged. A negatively charged rod is brought near (not touching) its plate. Why does the leaf fall? Explain the electron flow and charge neutralization. (3 steps)", "answer": "- Step 1: **Electron attraction**. The negative rod attracts electrons up to the plate from the leaf.  \n- Step 2: **Charge reduction**. The leaf’s positive charge decreases (electrons neutralize some protons).  \n- Step 3: **Reduced repulsion**. With less positive charge on the leaf and rod, repulsion weakens → leaf falls.  \n\n+ **Limiting case**: If enough electrons flow, the electroscope becomes neutral (leaf hangs straight).", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Describe the structure of an atom according to the Edexcel IAL model. Include the location, relative charge, and mass of protons, neutrons, and electrons. (3 steps)", "answer": "- Step 1: **Structure** – Atoms have a tiny central nucleus with protons and neutrons, surrounded by electrons in orbits.  \n+ **Protons**: Positively charged (+1), mass = 1 (relative to neutron).  \n+ **Neutrons**: Neutral (0), mass = 1.  \n+ **Electrons**: Negatively charged (-1), mass ≈ 1/1840 (≈ 0).  \n- Step 2: **Charge balance** – A neutral atom has equal protons and electrons.  \n- Step 3: **Nuclide notation** – For $ \\text{He} $ (⁴₂He):  \n  + Atomic number (Z) = 2 protons.  \n  + Mass number (A) = 4 ⇒ neutrons = A - Z = 2.  \n  + Electrons = 2 (neutral).", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why is the electron’s mass considered negligible in atomic calculations?", "answer": "- Step 1: **Electron mass vs. proton/neutron** –  \n  $ m_e = 9.11 \\times 10^{-31} \\, \\text{kg} $, while $ m_p = 1.67 \\times 10^{-27} \\, \\text{kg} $.  \n  - Ratio $ m_p/m_e \\approx 1830 $, so electrons contribute insignificantly to total mass.  \n- Step 2: **Impact on atomic mass** –  \n  Nucleus (protons + neutrons) accounts for 99.9% of atomic mass. Electrons are ignored in mass calculations (≈ 0).", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "What does charge conservation mean in static electricity? Give an example.", "answer": "- Step 1: **Definition** – Total charge in an isolated system remains constant; charged particles are transferred, not created/destroyed.  \n- Step 2: **Example** – Rubbing a plastic rod with wool:  \n  + Rod gains electrons (becomes -ve), wool loses electrons (becomes +ve). Net charge = 0.  \n- Step 3: **Key misconception** –  \n  “Positive charge is *not* created; it’s *lost electrons* (e.g., wool loses electrons, net +ve).”", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why is charge quantized? Calculate the charge of 5 electrons. (2 steps)", "answer": "- Step 1: **Quantization** – Charge exists in discrete units: $ Q = n e $, where $ e = 1.60 \\times 10^{-19} \\, \\text{C} $.  \n- Step 2: **Calculation** –  \n  $ Q = 5 \\times (-1.60 \\times 10^{-19}) = -8.0 \\times 10^{-19} \\, \\text{C} $.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Compare conductors and insulators in terms of electron mobility and static charge buildup.", "answer": "- Step 1: **Conductors** –  \n  + Free electrons (e.g., metals like copper) ⇒ charge flows easily.  \n  + Cannot hold static charge; electrons redistribute.  \n- Step 2: **Insulators** –  \n  + Tightly bound electrons (e.g., plastic, glass) ⇒ no flow.  \n  + Static charge builds up (electrons stuck where transferred).  \n- Step 3: **Real-world example** –  \n  + Wires (conductors) don’t hold static, but polythene rods (insulators) do.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "When two insulators are rubbed together, which becomes positive? Explain using the electrostatic series.", "answer": "- Step 1: **Electrostatic series** – Materials higher on the list (e.g., perspex, wool) weakly hold electrons ⇒ lose them.  \n- Step 2: **Outcome** –  \n  + Material with weaker electron hold loses electrons ⇒ becomes +ve.  \n  + Material with stronger hold gains electrons ⇒ becomes -ve.  \n- Step 3: **Example** –  \n  + Rubbing plastic rod with wool: plastic gains electrons (−ve), wool loses (becomes +ve).", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why does a charged object attract a neutral object? Use the plastic rod and paper demo to illustrate.", "answer": "- Step 1: **Induction process** –  \n  Charged rod repels/attacts electrons in the neutral object (paper).  \n  + Negative rod ⇒ repels electrons in paper ⇒ near side becomes +ve.  \n- Step 2: **Attraction** –  \n  Opposite charges (rod’s -ve and paper’s +ve near side) ⇒ attraction.  \n- Step 3: **Key insight** –  \n  Neutral objects are always attracted to charged ones due to induced charge separation.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "In the gold-leaf electroscope, why does the leaf rise when charged by contact?", "answer": "- Step 1: **Contact charging** –  \n  Charged rod touches metal plate ⇒ electrons transfer to the electroscope.  \n- Step 2: **Charge distribution** –  \n  Metal rod and leaf become same charge (e.g., -ve).  \n- Step 3: **Repulsion** –  \n  Like charges on rod and leaf repel ⇒ leaf rises.  \n- Step 4: **Common misconception** –  \n  Leaf isn’t neutral; it’s same charge as rod ⇒ repulsion, not attraction.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How does earthing neutralize a charged object? Explain for both positive and negative charges.", "answer": "- Step 1: **Definition** – Earthing connects object to Earth via a conductor (path for electrons).  \n- Step 2: **Positive case** –  \n  + Object lacks electrons ⇒ Earth donates electrons to neutralize it.  \n- Step 3: **Negative case** –  \n  + Object has excess electrons ⇒ electrons flow to Earth.  \n- Step 4: **Key idea** –  \n  “Earthing provides a path to balance charge, preventing static buildup.”", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why do two positively charged rods repel? Use Coulomb’s law and atomic-scale reasoning.", "answer": "- Step 1: **Coulomb’s law** –  \n  Like charges (both +ve) exert a repulsive force $ F = k \\frac{Q_1 Q_2}{r^2} $.  \n- Step 2: **Atomic-scale view** –  \n  Protons’ counts are fixed; net +ve charge from electron loss ⇒ excess protons.  \n  + Repulsion arises from matching net charges’ imbalance.  \n- Step 3: **Misconception check** –  \n  Not due to protons moving, but the net charge imbalance.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "In the nylon carpet shock scenario, explain why touching a metal handle causes a spark. (3 steps)", "answer": "- Step 1: **Friction charging** –  \n  Walking rubs nylon (insulator) against shoes ⇒ electrons transfer to body ⇒ -ve charge buildup.  \n- Step 2: **Earthing path** –  \n  Metal handle (conductor + earthed) provides path to ground.  \n- Step 3: **Discharge** –  \n  Electrons rush from body to Earth ⇒ rapid current = spark/shock.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "How does current relate to static charge? Use $ I = \\Delta Q / \\Delta t $ to link them.", "answer": "- Step 1: **Static vs. current** –  \n  Static = charge held on insulator; current = charge flow in conductor.  \n- Step 2: **Formula connection** –  \n  $ I = \\Delta Q / \\Delta t $: Current is rate of charge flow.  \n  + Example: 1 A = 1 C/s ⇒ 6.24 × 10¹⁸ electrons/second.  \n- Step 3: **Battery analogy** –  \n  Battery creates charge imbalance (static-like) but allows flow via conductor ⇒ sustained current.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}], "count": 12}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "State the relative charge and relative mass of a proton, a neutron, and an electron. (3 steps)", "answer": "- Step 1: **Proton** — located in the nucleus; relative charge = **+1**, relative mass = **1**\n- Step 2: **Neutron** — located in the nucleus; relative charge = **0** (neutral), relative mass = **1** (almost identical to proton)\n+ The neutron's mass is essentially the same as the proton's because both are nuclear particles\n- Step 3: **Electron** — orbits outside the nucleus; relative charge = **−1**, relative mass = **≈ 1/1840** (often treated as negligible/≈0)\n+ The electron is ~1840 times lighter than a proton — this is why electrons move in current, not the heavier nucleus\n\nThe absolute values from the Data Booklet are: electron charge e = 1.60 × 10⁻¹⁹ C, but for static electricity you only need the relative values.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Why is it that when an object becomes positively charged, we say it has \"lost electrons\" rather than \"gained positive charge\"? (2 steps)", "answer": "- Step 1: **Only electrons can move.** Protons are locked in the atomic nucleus and cannot be transferred between objects. Charge cannot be created or destroyed — it can only be transferred.\n- Step 2: When something becomes positive, electrons have left the object. The object now has more protons than electrons (an imbalance), giving it a net positive charge.\n+ You can never \"pick up\" positive charge — you can only lose negative charge (electrons).\n+ The same logic applies in reverse: a negatively charged object has gained excess electrons, never \"gained negative charge.\"\n\nThis distinction matters for exam answers — always phrase charging in terms of electron transfer.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "What does the equation Q = ne mean? Define each symbol and explain what \"quantisation of charge\" means. (3 steps)", "answer": "- Step 1: **Q** = total charge on an object (in coulombs, C); **n** = number of electrons gained or lost (an integer, no units); **e** = elementary charge = 1.60 × 10⁻¹⁹ C (the charge of a single electron).\n- Step 2: The equation says charge comes only in whole multiples of e. An object can have charge of 1e, 2e, 3e... but never 1.5e or half an electron's worth.\n+ This is \"quantisation\" — charge is \"quantized\" (comes in discrete packets), like steps on a staircase rather than a smooth ramp.\n- Step 3: For example, a charge of 10 μC equals n = 10 × 10⁻⁶ / 1.6 × 10⁻¹⁹ ≈ 6.3 × 10¹³ electrons.\n\nThis is why you can calculate how many electrons moved if you know the total charge transferred.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What is the fundamental difference between a conductor and an insulator at the atomic level? Give one example of each. (2 steps)", "answer": "- Step 1: **Conductors** (e.g., copper, gold, graphite) have some electrons that are **free to move** between atoms. These \"free electrons\" can drift through the material when a potential difference is applied — this is what constitutes an electric current.\n- Step 2: **Insulators** (e.g., plastic/polythene, glass, rubber, wool) have electrons **tightly held** by their nuclei and cannot flow freely. Charge gets stuck where you put it, allowing static charge to build up.\n+ The key insight: static charge only accumulates on insulators because on a conductor, excess charge would immediately flow away through the material.\n\nAlex's rule: \"static charge only happens on insulators\" — the charge can't go anywhere if electrons are bound.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "In the electrostatic series chart, which end \"gains electrons\" (becomes negative) and which \"loses electrons\" (becomes positive)? Why does position on the chart determine this? (3 steps)", "answer": "- Step 1: Materials **near the bottom** of the chart (rubber, sulphur, platinum, gold) have a **strong hold** on their electrons — they **gain electrons** and become **negative** when rubbed.\n- Step 2: Materials **near the top** (acetate, perspex, glass, wool, hair) have a **weak hold** on electrons — they **lose electrons** and become **positive**.\n+ When you rub two materials together, the one with the stronger hold on electrons pulls electrons from the other.\n- Step 3: The chart shows the **triboelectric series** — the ordering determines which material becomes which sign when two are rubbed together.\n\nAlex initially misstated this in the lesson and corrected himself live — this is a common trap. The bottom materials are \"electron grabbers.\"", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A plastic rod is rubbed with a cloth and becomes negatively charged. Describe exactly which particles move and in which direction. (3 steps)", "answer": "- Step 1: **Electrons transfer from the cloth onto the rod.** This is the only particle that moves — never protons.\n- Step 2: Plastic (polythene) has a stronger hold on electrons than the cloth, so electrons are pulled from the cloth to the plastic.\n+ The cloth loses electrons → becomes positively charged (fewer electrons than protons)\n+ The rod gains electrons → becomes negatively charged (more electrons than protons)\n- Step 3: Charge is **conserved**: the cloth and rod end up with **equal and opposite** charge. No new charge is created — electrons are simply redistributed.\n\nThis is \"charging by friction\" — the classic static electricity demonstration. The rod didn't \"acquire negative charge\" — it acquired excess electrons.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Two rods both carry a negative charge. When brought close together, do they attract or repel? State the rule you used. (1 step)", "answer": "They **repel**.\n\nThe rule: **Like (same-sign) charges repel; unlike (opposite-sign) charges attract.**\n\nTwo negatives repel just as two positives repel. The sign of the charge matters, not whether it's \"more negative\" or \"less negative.\" Both have the same overall charge sign (+ with + repels; − with − repels; + with − attracts).\n\nThis was the most repeated correction in the lesson — Phuc kept saying \"attract\" for same-charge scenarios.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "A negatively charged rod is brought near (but not touching) a small neutral piece of paper. Explain why the paper is attracted to the rod. (3 steps)", "answer": "- Step 1: The paper is neutral (equal protons and electrons), but it contains electrons that are free to move within its structure.\n- Step 2: The **negatively charged rod repels electrons** in the paper, pushing them to the far side of the paper. This leaves the **near side positively charged** (more protons than electrons in that region).\n+ This process is called **induction** — the charge in the rod has induced (caused) a separation of charge in the neutral paper without touching it.\n- Step 3: The near side of the paper is now **opposite** in sign to the rod (positive near side, negative rod), so they **attract**. The paper jumps toward the rod.\n\nKey point: A charged object attracts a neutral object via induction. This is why a charged plastic rod picks up tiny bits of paper.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Why does a charged balloon stick to a neutral wall, even though the wall is not charged? (2 steps)", "answer": "- Step 1: The balloon is negatively charged. When brought near the wall, its negative charge **repels electrons** in the wall's material, pushing them deeper into the wall.\n- Step 2: The **near surface of the wall becomes positive** (electron-depleted), while the balloon is still negative. Since opposite charges attract, the balloon sticks to the wall.\n+ This is induction — the wall hasn't become charged overall (still neutral), but charge has been **redistributed** within it, creating a local attraction.\n\nThe wall is a conductor/insulator depending on material, but the principle is the same: charge separation creates attraction even with a neutral object.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "What does \"earthing\" mean, and why does connecting a charged object to Earth remove its charge? (3 steps)", "answer": "- Step 1: **Earthing** means connecting the charged object to the ground (Earth) using a conductor — for example, touching a charged object with your hand (you are earthed through your feet on the ground).\n- Step 2: The Earth is an **enormous reservoir of charge** — effectively infinite compared to any object. It can absorb or supply electrons without changing its overall charge.\n- Step 3: If the object is **negatively charged**, excess electrons flow from the object into the Earth. If **positively charged**, electrons flow from the Earth into the object.\n+ Either way, the object ends up **neutral**. Charge \"wants to be balanced, so it will flow if it can\" — earthing gives it that path.\n\nThis is why you get a shock touching a metal handle after walking on carpet — the handle is earthed, giving your excess electrons a path to flow to Earth.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "A gold-leaf electroscope is charged by touching its top plate with a negatively charged rod. Explain why the gold leaf rises. (3 steps)", "answer": "- Step 1: The electroscope's metal plate, connecting rod, and gold leaf form one continuous piece of metal — a conductor.\n- Step 2: When the negative rod touches the plate, **electrons flow from the rod onto the metal**, spreading through the plate, rod, and leaf.\n+ The entire metal part (including the leaf) becomes **negatively charged**.\n- Step 3: Both the main rod and the hanging leaf now carry the **same (negative) charge**. Like charges repel, so the leaf is pushed away from the rod and **rises**.\n\n**Critical misconception trap:** The leaf does NOT rise because \"a neutral leaf is attracted to a negative rod.\" The leaf becomes negatively charged too (by contact) and rises by **repulsion**, not attraction. This distinction between contact (charge shared) and induction (neutral attracted) is exam-critical.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A gold-leaf electroscope has already been given a positive charge (leaf is raised). A negatively charged rod is then brought near the plate (without touching). What happens to the leaf, and why? (3 steps)", "answer": "- Step 1: The electroscope is already positively charged (deficit of electrons), so the leaf is repelled upward.\n- Step 2: The **negatively charged rod attracts electrons** from the electroscope's top plate. Extra electrons flow onto the plate, partially cancelling the positive charge.\n- Step 3: The **net charge on the electroscope decreases toward zero** — fewer electrons means less repulsion between the rod and leaf, so the **leaf falls**.\n+ If exactly enough electrons arrive to neutralize it, the leaf goes flat. If more arrive, it would become negative and rise again.\n\nEarthing the electroscope would achieve the same neutralization reliably — connecting to Earth lets charge flow on or off until balanced.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Define electric current and write the formula I = ΔQ/Δt. Define each symbol and state the units. (2 steps)", "answer": "- **I** = electric current, measured in **amperes (A)** or amps\n- **ΔQ** = charge that flows past a point, measured in **coulombs (C)**\n- **Δt** = time taken, measured in **seconds (s)**\n+ The formula **I = ΔQ/Δt** means current is the **rate of flow of charge** — how many coulombs pass a point per second.\n+ 1 A = 1 C s⁻¹; if 1 coulomb flows past a point every second, that's a current of 1 ampere.\n\nThis is specification statement 64: \"Electric current is the rate of flow of charge.\" It's the bridge connecting static charge (held still) to current (charge that flows).", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "A current of 0.50 A flows for 2.0 minutes. Calculate (a) the total charge that flows, and (b) how many electrons this represents. (3 steps)", "answer": "- Step 1: Convert time to seconds: Δt = 2.0 × 60 = **120 s**\n- Step 2: (a) Use ΔQ = I × Δt = 0.50 × 120 = **60 C**\n+ This is 60 coulombs of charge flowing past a point in 2 minutes.\n- Step 3: (b) Number of electrons: n = ΔQ / e = 60 / (1.6 × 10⁻¹⁹) = **3.75 × 10²⁰ electrons**\n+ Each electron carries 1.6 × 10⁻¹⁹ C, so 60 C corresponds to ~3.75 × 10²⁰ electrons.\n\nThis combines Q = ne with I = ΔQ/Δt → n = (I × Δt) / e. A huge number of tiny electrons creates measurable current.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "What is the fundamental similarity between static electricity and electric current in a circuit? How do they differ? (2 steps)", "answer": "- Similarity: Both involve the **same charge imbalance**. In static, excess electrons are stuck on an insulator. In current, the same excess electrons are free to flow through a conductor.\n+ A battery creates a charge imbalance at its terminals (one negative, one positive) — this is the same kind of charge separation as static, but with a conductor connecting the terminals, the electrons can flow.\n- Difference: **Static** = charge held **still** on an insulator; **Current** = charge **flowing** continuously through a conductor.\n+ The \"push\" (voltage/EMF) makes the difference — give charge a path (conductor) and it flows; block the path (insulator) and it stops, building up as static.\n\nAlex connected this explicitly: \"Static = charge held still; current = the same charge free to flow.\"", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": true}, {"question": "In the electrostatic dust-print lifter (EDPL) question, electrons are transferred from the metal plate to the lifting sheet. Which object becomes negative and which becomes positive? (2 steps)", "answer": "- Step 1: **Electrons move from the metal plate to the lifting sheet.**\n+ Electrons transfer in the direction shown by the arrow on the wire.\n- Step 2: The lifting sheet **gains electrons** → becomes **negative**. The metal plate **loses electrons** → becomes **positive**.\n+ Each is left with an **imbalance of charge** (not neutral).\n\n**Exam technique:** The question asked \"use the idea of charge movement\" — you must describe the electron direction, not just state the final charges. This is worth 2 marks.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Why are dust particles lifted onto a negatively charged lifting sheet, even though the dust is neutral? (1 step)", "answer": "This is the same rule as the charged rod attracting neutral paper: **a charged object attracts a neutral object** via induction.\n\nThe negatively charged sheet induces a positive charge on the near side of each neutral dust particle (electrons repelled to the far side), creating attraction. The dust is \"pulled\" onto the sheet.\n\nThis is the \"charged attracts neutral\" rule in action — one mark for naming the rule.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Why is it dangerous to wear a nylon jacket at a petrol station, but safe to wear a jacket with metal threads or that is earthed? (2 steps)", "answer": "- Step 1: **Nylon is an insulator.** When you move, friction between your jacket and your body transfers electrons onto the jacket, where they get stuck. Charge builds up.\n- Step 2: When you then touch the petrol pump (connected to earth), your accumulated charge can **spark** to earth through you. Near petrol vapour, this spark can cause a fire — dangerous!\n+ A jacket with metal threads or an earthed jacket is a **conductor**. Any charge that builds up can flow through the jacket to Earth, so no dangerous static buildup occurs.\n+ The safety property is **electrical conduction/earthing**, not \"waterproof\" — this was Phuc's slip in the lesson that Alex corrected.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Give one use and one danger of static electricity, and explain the physics behind each. (2 steps)", "answer": "- **Use — electrostatic paint spraying:** Paint droplets are given a positive charge at the nozzle (electrons removed). The car body is given a negative charge. Opposite charges attract, so paint is pulled onto the car evenly — even reaching hidden areas — with less waste.\n+ The ability to control where charged particles go makes static useful for precise coating.\n- **Danger — lightning:** In storm clouds, ice crystals rub together (friction), building up charge via electron transfer. The cloud base becomes negative, inducing positive charge on the ground. When voltage is high enough, air (normally an insulator) breaks down and a massive spark — lightning — strikes.\n+ Static danger comes when high voltage builds up on an insulated object, then discharges through an unexpected path (you!).", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "In the demonstration with two hanging rods, both rubbed with cloth to become positively charged, what happens when you bring them close? Why? (2 steps)", "answer": "- They **repel** — the hanging rod swings away from the other rod.\n- **Why:** Both rods carry the same (positive) charge. Like charges repel. The exact charging mechanism (electrons moving from each rod to each cloth) already happened — now only the force question matters.\n+ Alex had to steer Phuc back to this — Phuc kept re-explaining the electron transfer when the question only asked about the force. Once you know both signs, answer the force first.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "How could you make two initially neutral rods attract each other? (2 steps)", "answer": "- Step 1: Give them **opposite charges** — make one positive and one negative.\n+ For example: rub one with cloth (electrons move to cloth → rod becomes positive), and rub the other with a different material that pulls electrons onto the rod (rod becomes negative).\n- Step 2: When brought together, a **positive rod and a negative rod** will attract because unlike charges attract.\n\nThis is the inverse of the demonstration: same charge → repel; opposite charge → attract.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "What are the three rules of electrostatic force that every exam answer rests on? (1 step)", "answer": "From Alex's Teacher Notes:\n1. **Like charges repel** (+ and + repels; − and − repels)\n2. **Unlike charges attract** (+ and − attracts)\n3. **A charged object attracts a neutral object** (by induction)\n\nThese three rules are the foundation for every static electricity exam question. Memorise them. Test them: rod + paper → rule 3; two rods same sign → rule 1; two rods opposite → rule 2.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Why is gold used for the leaf in a gold-leaf electroscope, rather than a denser metal like iron? (1 step)", "answer": "Gold can be beaten into **extremely thin sheets** — it's highly malleable. A gold leaf is so light that even a small electrostatic force can make it move visibly.\n\nIron is much denser/heavier; the repulsion force wouldn't be strong enough to lift it against gravity. The electroscope needs a lightweight,movable indicator to detect charge — gold delivers that.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "In the exam question about the electrostatic dust-print lifter, what two marking points were required for the 2-mark question about how the lifting sheet becomes negative? (2 steps)", "answer": "- Mark point 1: **Electrons are transferred from the metal plate, through the control unit, to the lifting sheet.**\n+ You must describe **electron movement** (the direction), not just state the final charges.\n- Mark point 2: **The lifting sheet gains elec
