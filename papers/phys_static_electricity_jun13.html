The electroscope's **purpose** is to **detect electric charge**. When the metal parts become charged, the leaf and the rod carry the same sign of charge and repel each other, causing the leaf to rise. The amount of deflection gives a qualitative measure of how much charge is present.", "source": "GLM 5.1"}, {"q": "A negatively charged rod is touched onto the metal plate of a gold-leaf electroscope. Explain step by step why the gold leaf rises. What is the common misconception students fall into? (3 steps)", "a": "- Step 1: When the negative rod **touches** the metal plate, electrons flow from the rod into the metal (plate \u2192 rod \u2192 leaf). This is **charging by contact** \u2014 the conductor allows electrons to spread throughout the entire metal structure.\n- Step 2: The metal plate, the metal rod, and the gold leaf all become **negatively charged** (they all share the excess electrons). Since the leaf and the rod now carry the **same sign** of charge, they **repel** each other, and the leaf rises.\n- Step 3: The common misconception is to say \"the leaf is neutral and is attracted to the negative rod.\" This is wrong because the contact means the leaf is **not** neutral \u2014 it has gained electrons and become negative too. The leaf rises by **repulsion**, not attraction. Confusing contact (charge shared \u2192 same sign \u2192 repel) with induction (neutral object \u2192 near side opposite \u2192 attract) is a frequent exam trap.", "source": "GLM 5.1"}, {"q": "A gold-leaf electroscope is first given a **positive** charge (e.g. by a battery). The leaf is already raised. A negatively charged rod is then **brought near** (not touching) the top plate. Explain why the leaf falls. (3 steps)", "a": "- Step 1: The electroscope is initially positive \u2014 the rod and leaf both carry a net positive charge, and they repel, so the leaf is raised.\n- Step 2: When the negative rod approaches the top plate, it **attracts electrons up from the rest of the metal** into the top plate. (In a conductor, electrons can move freely.) These incoming electrons partially cancel the positive charge on the rod and leaf.\n- Step 3: With the net positive charge now reduced, the repulsive force between the rod and leaf weakens, so the leaf **falls**. If exactly enough electrons arrive to neutralise the positive charge, the leaf hangs straight down. If even more electrons arrive (overshoot), the electroscope becomes negative and the leaf would rise again (same-sign repulsion, but now both negative).", "source": "GLM 5.1"}, {"q": "An electroscope is positively charged. A student brings a negative rod near it and the leaf falls, then falls further, then starts to rise again. What is happening at each stage? (3 steps)", "a": "- Step 1: **Leaf falls** \u2014 as the negative rod approaches, electrons are attracted into the top plate, reducing the positive charge. The repulsion weakens and the leaf drops.\n- Step 2: **Leaf falls to flat (neutral)** \u2014 if enough electrons flow in to exactly cancel the positive charge, the electroscope becomes neutral. With no net charge on the rod or leaf, there is no repulsion, and the leaf hangs straight down.\n- Step 3: **Leaf rises again** \u2014 if the negative rod is brought even closer (or touched), more electrons flow in beyond what was needed for neutrality. The electroscope now has a **net negative** charge. The rod and leaf are both negative, so they **repel** again, and the leaf rises. This was the \"overshoot\" scenario Phuc described, which Alex called \"perfect.\"", "source": "GLM 5.1"}, {"q": "Why is earthing the **reliable** way to fully discharge a charged electroscope, compared to just bringing an oppositely charged rod near? (2 steps)", "a": "- Step 1: Bringing an oppositely charged rod near is **imprecise** \u2014 you might neutralise the electroscope exactly (leaf flat), or you might overshoot and leave it charged with the opposite sign (leaf rises again). It's hard to judge when you've delivered exactly the right number of electrons.\n- Step 2: Earthing is **reliable** because the Earth acts as an infinite reservoir. When you connect the electroscope to Earth, charge flows until the electroscope is at the same potential as the Earth (zero net charge). It cannot overshoot \u2014 once neutral, there is no driving force for further electron flow. The Earth automatically supplies or absorbs exactly the right amount of charge.", "source": "GLM 5.1"}, {"q": "Two polythene rods are both rubbed with a cloth and become positively charged. When brought close, do they attract or repel? State the rule you used. (2 steps)", "a": "- Step 1: They **repel**. Both rods carry the same (positive) charge.\n- Step 2: The rule: **like charges repel**. \"Like\" means the same sign \u2014 two positives repel, and two negatives also repel. The sign of the charge (positive or negative) doesn't change the direction; what matters is whether the signs are the same or different. Phuc initially said \"attract\" \u2014 this is the single most common error in the topic. Bolt it down: same sign \u21d2 repel.", "source": "GLM 5.1"}, {"q": "How could you make the two rods from the previous question **attract** instead of repel? Give the physical method and the rule. (2 steps)", "a": "- Step 1: Make the rods carry **opposite** charges. Leave one rod positive (rubbed with a cloth that takes electrons away), and charge the other rod negative (e.g. rub it with a different material that has a weaker hold on electrons, so electrons transfer *onto* the rod).\n- Step 2: The rule: **unlike charges attract**. Once the two rods have opposite signs of net charge, the electrostatic force between them is attractive. The key insight is that you control the sign by choosing which material the rod is rubbed with \u2014 the material with the stronger electron grip (lower on the electrostatic series) becomes negative.", "source": "GLM 5.1"}, {"q": "Walking across a nylon carpet makes you negatively charged. You then touch a metal door handle and feel a shock. Explain the full chain of events. (4 steps)", "a": "- Step 1: **Charging by friction** \u2014 as you walk, your shoes rub against the nylon carpet. Nylon is an insulator. Electrons transfer from the carpet onto you (nylon is higher on the electrostatic series than your shoes in this scenario), so you accumulate excess electrons and become negatively charged.\n- Step 2: **Charge stays on you** \u2014 because your body and the carpet are insulating enough, the excess electrons cannot easily flow away. The static charge builds up.\n- Step 3: **The metal handle is a conductor connected to earth** \u2014 metal allows electrons to flow freely, and the handle (via its mounting) is effectively earthed.\n- Step 4: **Discharge (spark \u2192 current)** \u2014 when your finger approaches the handle, the large charge difference causes electrons to jump from you, through the handle, to Earth. This rapid flow of charge is a brief current, which you feel as a shock. The chain is exactly: friction \u2192 charge \u2192 spark \u2192 current.", "source": "GLM 5.1"}, {"q": "Why is it dangerous to wear a **nylon** jacket at a petrol station, but safe to wear one with metal/earthing? A student says \"because wax is waterproof.\" Correct this. (2 steps)", "a": "- Step 1: Nylon is an **insulator**. When you move in a nylon jacket, friction between the jacket and your clothing builds up static charge, and because nylon doesn't conduct, the charge **cannot flow away**. If a spark occurs near petrol vapour, it can ignite the fuel \u2014 this is the danger.\n- Step 2: A jacket with metal/earthing is a **conductor** connected to Earth. Any charge that builds up immediately flows to Earth through the conducting path, so **no charge accumulates** and no spark can form. The student's answer \"waterproof\" is wrong \u2014 the relevant property is **electrical** (conductor vs. insulator, earthed vs. not), not water resistance. Safety depends on preventing charge buildup, not on keeping dry.", "source": "GLM 5.1"}, {"q": "Explain how **lightning** is an example of static electricity on a massive scale. Identify the charging mechanism and the discharge. (3 steps)", "a": "- Step 1: **Charging by friction** \u2014 inside a storm cloud, ice crystals and water droplets collide and rub against each other. This friction transfers charge, typically making the cloud base negatively charged and the top positively charged.\n- Step 2: **Induction on the ground** \u2014 the negatively charged cloud base induces a positive charge on the ground below (repelling electrons in the ground deeper into the Earth). A large charge separation builds up between cloud and ground.\n- Step 3: **Discharge** \u2014 air is normally a good insulator, but when the voltage (potential difference) becomes enormous, the air **breaks down** and loses its insulating property. A giant spark \u2014 lightning \u2014 flows between the cloud and the ground, which is a massive, brief current equalising the charge. This is the same friction \u2192 charge \u2192 spark \u2192 current chain, just at a gigantic scale.", "source": "GLM 5.1"}, {"q": "How does an electrostatic smoke precipitator (in a chimney) remove waste particles from exhaust gases? (3 steps)", "a": "- Step 1: Inside the chimney, metal plates or wires are given a **strong charge** (typically negative, by removing electrons). The charged surfaces create a strong electric field.\n- Step 2: As the smoke particles (which are neutral) pass through, the charged plates **attract** them by induction \u2014 the charged surface induces an opposite charge on the near side of each neutral particle, pulling it toward the plate.\n- Step 3: The particles stick to the charged plates and are periodically collected/cleaned. The exhaust gas that exits the chimney is therefore much cleaner. This is a direct application of the rule \"a charged object attracts a neutral object.\"", "source": "GLM 5.1"}, {"q": "In the EDPL (electrostatic dust-print lifter) exam question, the control unit applies 10 kV between a metal plate and a lifting sheet. Explain how the lifting sheet becomes negative and the metal plate becomes positive, using the idea of charge movement. (3 steps)", "a": "- Step 1: The high voltage from the control unit **drives electrons** from the metal plate, through the control unit's circuitry, to the lifting sheet. This is forced electron transfer \u2014 the voltage provides the energy to move electrons against their natural tendency.\n- Step 2: The lifting sheet **gains** electrons, so it now has more electrons than protons \u2014 it becomes **negatively charged**. The metal plate **loses** electrons, so it has fewer electrons than protons \u2014 it becomes **positively charged**.\n- Step 3: The key exam point: the question says \"use the idea of charge movement,\" so you must explicitly describe **electrons moving** and **which direction** they go (plate \u2192 sheet). Simply stating \"the sheet is negative and the plate is positive\" without describing the electron movement would lose marks. You must match your wording to what the question asks for.", "source": "GLM 5.1"}, {"q": "In the EDPL question, why are dust particles (which are neutral) attracted onto the charged lifting sheet? State the relevant electrostatic rule. (2 steps)", "a": "- Step 1: The lifting sheet is charged (negative). The dust particles are neutral. The relevant rule is: **a charged object attracts a neutral object**.\n- Step 2: The mechanism is induction \u2014 the charged sheet's electric field induces an opposite charge on the near side of each dust particle (pushing electrons in the dust to the far side, leaving the near side positive). The near-side attraction is stronger than the far-side repulsion (because it's closer), so the net force pulls the dust toward the sheet. This is the same physics as the plastic rod picking up paper.", "source": "GLM 5.1"}, {"q": "Which material from this list is an electrical conductor: paper, plastic, silver, wood? How can you tell? (2 steps)", "a": "- Step 1: **Silver** is the conductor. It is a metal, and metals have free (delocalised) electrons that can carry current.\n- Step 2: Paper, plastic, and wood are all **insulators** \u2014 their electrons are tightly bound and cannot flow freely. In general, metals (copper, silver, gold, aluminium) are conductors, while most non-metals (paper, plastic, wood, glass, rubber) are insulators. The exception among non-metals is graphite, which is a conductor.", "source": "GLM 5.1"}, {"q": "A perspex rod is rubbed with a cloth and becomes positive. (a) Which way did the electrons move? (b) What charge does the cloth now have, and why? (3 steps)", "a": "- Step 1: The rod is positive, meaning it has **lost** electrons. Therefore, electrons moved **from the rod to the cloth** during rubbing.\n- Step 2: The cloth **gained** those electrons, so it now has more electrons than protons. The cloth is therefore **negatively charged**.\n- Step 3: The charges are equal and opposite (conservation of charge): if the rod lost $$n$$ electrons (charge $$+ne$$), the cloth gained exactly those $$n$$ electrons (charge $$-ne$$). On the electrostatic series, perspex is near the top (weak hold on electrons), so it loses electrons to the cloth, which has a stronger grip.", "source": "GLM 5.1"}, {"q": "A student says \"the rod became positive because positive charge moved onto it.\" Why is this statement physically wrong, and how should it be phrased? (2 steps)", "a": "- Step 1: The statement is wrong because **protons do not move** in electrostatics \u2014 they are locked in the nucleus, which is far too heavy and too strongly bound to be transferred by rubbing. There is no mechanism for \"positive charge\" to move from one object to another in everyday static electricity.\n- Step 2: The correct phrasing: **the rod became positive by losing electrons**. The positive charge was always there (in the protons); it became the net charge because electrons departed. As Alex repeatedly emphasised: \"we can't pick up positive charge, we can just lose negative charge.\" Always describe charging as electron transfer.", "source": "GLM 5.1"}, {"q": "In the electrostatic series, if you rub **wool** against **rubber**, which material becomes positive and which becomes negative? Explain using the chart. (2 steps)", "a": "- Step 1: On the electrostatic series, **wool** is near the top (weak hold on electrons) and **rubber** is near the bottom (strong hold on electrons).\n- Step 2: When rubbed together, rubber's stronger grip pulls electrons off the wool. So **wool loses electrons \u2192 becomes positive**, and **rubber gains electrons \u2192 becomes negative**. The material lower on the chart always gains electrons and becomes negative; the material higher on the chart loses electrons and becomes positive.", "source": "GLM 5.1"}, {"q": "Why can't static charge build up on a **metal** rod held in your bare hand, even if you rub it? (2 steps)", "a": "- Step 1: Metal is a **conductor** \u2014 it has free electrons that can move throughout the material and also flow to other conductors in contact with it. Your hand (somewhat conductive, and connected through your body to the ground) provides a path to Earth.\n- Step 2: Any electrons transferred by rubbing would simply flow away through your hand and body to the ground (earthing). The charge cannot accumulate because it has an escape route. For static to build up, the object must be an **insulator** (so electrons are trapped) AND insulated from Earth (so charge can't leak away).", "source": "GLM 5.1"}, {"q": "A charged plastic rod is placed on a table (not held). Over time, the rod loses its charge. Why? (2 steps)", "a": "- Step 1: Although plastic is an insulator, the air around it contains moisture and some ions. These provide a **slowly conducting path** between the rod and the Earth.\n- Step 2: Over time, the excess charge on the rod gradually leaks away through the air (or through the surface of the table) to Earth. This is why static charge on everyday objects is temporary \u2014 the insulator isn't perfect, and the environment provides leakage paths. In perfectly dry, clean conditions, the charge would persist much longer.", "source": "GLM 5.1"}, {"q": "What is the difference between charging by **contact** and charging by **induction**? Give the key distinction in one sentence, then elaborate. (2 steps)", "a": "- Step 1: The key distinction: **contact involves electrons physically transferring between objects** (they touch); **induction involves electrons rearranging *within* a neutral object** (no contact, no transfer between objects).\n- Step 2: In contact, a charged object touches a conductor, and electrons flow from one to the other until they share the charge \u2014 the conductor ends up with the **same sign** of charge as the charged object. In induction, a charged object is merely brought *near* a neutral object, and its field pushes/pulls electrons within the neutral object to opposite sides \u2014 the near side gets the **opposite** sign, causing attraction, but the object as a whole is still neutral (unless you then earth it, which is a separate step).", "source": "GLM 5.1"}, {"q": "You bring a negatively charged rod near a neutral metal sphere (not touching), then earth the sphere briefly, then remove the rod. What is the final charge on the sphere? Walk through each step. (4 steps)", "a": "- Step 1: **Bring the negative rod near** \u2014 the rod repels electrons in the sphere to the far side. The near side becomes positive, the far side becomes negative. The sphere is still neutral overall.\n- Step 2: **Earth the sphere** \u2014 while the rod is still nearby, connecting the sphere to Earth gives the repelled electrons on the far side a path to escape. Electrons flow from the sphere **into the Earth**. The sphere now has a net positive charge (fewer electrons than protons).\n- Step 3: **Remove the earthing connection** \u2014 the sphere is now isolated again, with its net positive charge trapped (no path to Earth).\n- Step 4: **Remove the rod** \u2014 with the rod gone, the remaining protons (in excess) redistribute evenly over the sphere. The sphere's final charge is **positive**. This is the full \"charging by induction\" procedure \u2014 the sphere ends up with the **opposite** sign to the inducing rod, without the rod ever touching it.", "source": "GLM 5.1"}, {"q": "In the previous question, what would happen if you removed the rod *before* removing the earthing connection? Would the sphere stay positive? (2 steps)", "a": "- Step 1: No \u2014 if you remove the rod first, the repulsive force on the sphere's electrons disappears. Electrons can now flow back from the Earth **into** the sphere through the still-connected earthing path, because the sphere is electron-deficient (positive).\n- Step 2: The electrons flow back until the sphere is neutral again. Then when you disconnect the Earth, the sphere is neutral \u2014 the charging has failed. **The order matters**: you must remove the earthing connection *while the rod is still present*, then remove the rod. This locks in the charge imbalance.", "source": "GLM 5.1"}, {"q": "Coulomb's law gives the force between two point charges: $$F = \\frac{1}{4\\pi\\varepsilon_0}\\frac{Q_1 Q_2}{r^2}$$. Without memorising numbers, explain qualitatively: (a) what happens to the force if you double the distance? (b) what happens if you double one charge? (3 steps)", "a": "- Step 1: The force depends on $$1/r^2$$ \u2014 this is an **inverse-square law**. If you double the distance ($$r \\to 2r$$), the force becomes $$F/4$$ (one quarter). The force drops off rapidly with distance.\n- Step 2: The force is proportional to each charge: $$F \\propto Q_1 Q_2$$. If you double one charge ($$Q_1 \\to 2Q_1$$), the force doubles. If you double both charges, the force quadruples.\n- Step 3: The sign of $$Q_1 Q_2$$ tells you the direction: if both charges have the same sign, $$Q_1 Q_2 > 0$$ and the force is repulsive; if they have opposite signs, $$Q_1 Q_2 < 0$$ and the force is attractive. This connects directly to the \"like repel, unlike attract\" rule you already know \u2014 Coulomb's law is the quantitative version of that rule.", "source": "GLM 5.1"}, {"q": "A student rubs a polythene rod with a duster and says \"the rod gained positive charge.\" Explain why this is impossible and what actually happened. (2 steps)", "a": "- Step 1: The rod cannot \"gain positive charge\" because the only mobile charged particles are **electrons** (which are negative). Protons are locked in the nucleus and cannot be transferred by friction.\n- Step 2: What actually happened: the rod **lost electrons** to the duster. With fewer electrons than protons, the rod's *net* charge is positive. The positive charge was already there (in the protons); it just became the majority because electrons departed. The duster, having gained those electrons, is now negative. Always phrase it as \"electrons moved from X to Y.\"", "source": "GLM 5.1"}, {"q": "In the two-rod demonstration (Demo 4), both rods become positive after being rubbed with a cloth. A student explains: \"the electrons moved to the ruler, so they repel.\" What is wrong with this explanation? (2 steps)", "a": "- Step 1: The student is confusing the **charging step** with the **force step**. The question asks what happens when the two already-charged rods are brought together \u2014 the charging is already done. Both rods are positive, so they repel. The explanation should be: \"they carry the same (positive) charge, and like charges repel.\"\n- Step 2: The statement \"electrons moved to the ruler\" is also wrong for the charging step \u2014 if both rods are positive, electrons moved *off* the rods (onto the cloths), not onto them. Alex's correction: once you know the signs, answer the force first (same \u2192 repel), then explain the cause if marks are available. Don't re-open the charging step unnecessarily.", "source": "GLM 5.1"}, {"q": "Why does a charged balloon stick to a neutral wall, but not to a neutral metal plate that is earthed? (3 steps)", "a": "- Step 1: On a **neutral wall** (insulator): the balloon's charge induces an opposite charge on the near side of the wall by pushing electrons away. The near side becomes oppositely charged, and the attractive force holds the balloon in place. The wall's electrons can't flow away because it's an insulator.\n- Step 2: On a **neutral metal plate that is earthed** (conductor): the balloon's charge initially induces charge separation in the metal. But because the metal is earthed, the repelled electrons simply flow to Earth rather than accumulating on the far side.\n- Step 3: With electrons flowing to Earth, the metal plate develops a net positive charge (electron deficit). However, because the plate is earthed and the balloon is not making contact, the induced positive charge is spread across the plate and the attraction may be weaker. More importantly, in practice, the conducting surface often allows charge to redistribute so effectively that the local charge density (and thus the force) is much lower than on an insulating wall \u2014 the balloon is less likely to stick firmly.", "source": "GLM 5.1"}, {"q": "A current of 2 A flows for 30 seconds. (a) What charge flows? (b) Roughly how many electrons is that \u2014 give the order of magnitude. Walk through without a calculator. (3 steps)", "a": "- Step 1: $$\\Delta Q = I\\Delta t = 2 \\times 30 = 60\\text{ C}$$.\n- Step 2: $$n = \\Delta Q / e = 60 / (1.6 \\times 10^{-19})$$. Estimate: $$60 / 1.6 \\approx 60 / 1.5 = 40$$, so roughly $$40 \\times 10^{19} = 4 \\times 10^{20}$$ (more precisely $$3.75 \\times 10^{20}$$).\n- Step 3: The order of magnitude is $$10^{20}$$ electrons. This confirms the pattern: everyday currents move enormous numbers of electrons because each electron's charge ($$\\sim 10^{-19}\\text{ C}$$) is so tiny.", "source": "GLM 5.1"}, {"q": "An atom of uranium is written as $$_{92}^{238}\\text{U}$$. How many protons, neutrons, and electrons does the **neutral** atom have? (2 steps)", "a": "- Step 1: Protons = $$Z = 92$$. Neutrons = $$A - Z = 238 - 92 = 146$$.\n- Step 2: Since the atom is neutral, electrons = protons = 92. If it were an ion (e.g. $$\\text{U}^{2+}$$), it would have fewer electrons than protons, but the neutral atom always has equal numbers.", "source": "GLM 5.1"}, {"q": "Exam technique: a question says \"use the idea of charge movement to explain how the plate becomes positive.\" What must your answer include, and what would lose marks? (2 steps)", "a": "- Step 1: Your answer **must describe electrons moving** and state the **direction** of movement. For example: \"electrons move from the plate to [the other object], so the plate loses electrons and becomes positive.\"\n- Step 2: What loses marks: simply stating \"the plate is positive\" or \"the plate has a positive charge\" without describing electron movement and direction. The command phrase \"use the idea of charge movement\" tells you the mark scheme rewards *describing the movement*, not just stating the result. Match your wording to what the question explicitly asks for.", "source": "GLM 5.1"}, {"q": "Exam technique: Alex's model two-step answer for a \"describe and explain\" question is \"Describe: they repel. Explain: because they have the same charge.\" Why is this structure better than a single merged sentence? (2 steps)", "a": "- Step 1: Exam mark schemes often award **separate marks** for the observation/conclusion and for the justification. Writing \"they repel because they have the same charge\" in one sentence risks the examiner missing one of the two points, especially if the sentence is long or unclear.\n- Step 2: Splitting into two clear statements ensures you hit both marking points: (1) the conclusion/observation (what happens), and (2) the reason (why it happens). This also forces you to think clearly \u2014 state the result first, then justify it. It's a simple habit that protects marks.", "source": "GLM 5.1"}, {"q": "Why is it incorrect to say \"the electroscope leaf is attracted to the charged rod\" when the rod has been **touched** to the plate? What should you say instead? (2 steps)", "a": "- Step 1: When the rod **touches** the plate, electrons flow into the metal. The leaf is part of the same metal structure, so it **gains the same sign** of charge as the rod. The leaf and the rod (inside the electroscope) now carry the same charge and **repel** \u2014 the leaf rises by repulsion, not attraction.\n- Step 2: You should say: \"electrons flow from the rod into the metal, so the plate, rod, and leaf all become [same sign] charged; the leaf and the rod repel because they have the same charge, so the leaf rises.\" The \"neutral leaf attracted\" explanation only applies to **induction** (bringing a charged object *near* without touching), where the neutral object's electrons rearrange but don't transfer.", "source": "GLM 5.1"}, {"q": "A student claims that two negatively charged objects should attract because \"opposites attract and negatives are the opposite of positives.\" Identify and correct the logical error. (2 steps)", "a": "- Step 1: The error is in the phrase \"negatives are the opposite of positives.\" While it's true that negative and positive are opposite *signs*, the rule \"opposites attract\" applies to the signs of **two different objects being compared** \u2014 it means \"an object with a positive sign and an object with a negative sign attract each other.\"\n- Step 2: Two objects that are **both** negative have the **same** sign. The rule for same-sign objects is: **like charges repel**. \"Opposite\" in the rule means \"the two objects have different signs from each other,\" not \"negative is the mathematical opposite of positive.\" Two negatives are alike, not opposite \u2014 so they repel.", "source": "GLM 5.1"}, {"q": "Synthesis question: A forensic technician uses an electrostatic dust-print lifter. The lifting sheet becomes negative and dust is attracted to it. A student says \"the dust must be positive, because opposites attract.\" Is this correct? Explain fully. (3 steps)", "a": "- Step 1: The student's reasoning is **incorrect** (or at least incomplete). The dust particles are **neutral**, not positively charged.\n- Step 2: The mechanism is **induction**, not attraction between opposite charges. The negatively charged lifting sheet induces charge separation in each neutral dust particle: electrons in the dust are repelled to the far side, leaving the near side positive. The near-side attraction (positive to the sheet's negative) is stronger than the far-side repulsion (negative to the sheet's negative) because the near side is closer.\n- Step 3: The correct rule is: **a charged object attracts a neutral object**. You do not need the dust to be pre-charged. If the dust happened to be positively charged, it would also be attracted \u2014 but the typical case (and the one the exam expects) is that the dust is neutral and is attracted by induction.", "source": "GLM 5.1"}, {"q": "Synthesis question: A polythene rod is rubbed with wool and becomes negative. It is then brought near a neutral metal sphere on an insulating stand. (a) What happens to the sphere's electrons? (b) If you briefly earth the far side of the sphere while the rod is nearby, then remove the earth, then remove the rod \u2014 what is the sphere's final charge? (4 steps)", "a": "- Step 1: The negative rod **repels** electrons in the sphere toward the far side. The near side of the sphere becomes positive (electron deficit), the far side becomes negative (electron excess). The sphere is still neutral overall.\n- Step 2: **Earth the far side** \u2014 this gives the excess electrons on the far side a path to the ground. Electrons flow from the sphere into the Earth. The sphere now has a net **positive** charge (fewer electrons than protons).\n- Step 3: **Remove the earth connection** \u2014 the sphere is now isolated with its net positive charge. No more electrons can flow to or from Earth.\n- Step 4: **Remove the rod** \u2014 with the repulsive force gone, the remaining positive charge redistributes evenly over the sphere. The sphere's final charge is **positive**. This is the complete charging-by-induction procedure, and it always leaves the object with the **opposite** sign to the inducing rod.", "source": "GLM 5.1"}, {"q": "Why does the order of steps matter in charging by induction (earthing while the rod is near, then removing earth, then removing rod)? What goes wrong if you remove the rod too early? (2 steps)", "a": "- Step 1: The rod's presence is what **maintains** the charge separation in the object. While the rod is near, electrons are repelled to the far side, and earthing lets them escape. The object is left with a net charge opposite to the rod.\n- Step 2: If you remove the rod **before** removing the earth connection, the repulsive force vanishes, and electrons flow back from Earth into the now-electron-deficient object through the still-connected earthing path. The object returns to neutral. You must disconnect the earth **while the rod is still present** to \"lock in\" the charge imbalance, then remove the rod. The sequence is: rod near \u2192 earth \u2192 remove earth \u2192 remove rod.", "source": "GLM 5.1"}, {"q": "A student asks: \"If charge is conserved, how can earthing make a charged object neutral? Didn't the charge just get destroyed?\" Explain why this is not a violation of conservation of charge. (2 steps)", "a": "- Step 1: Earthing does **not** destroy charge \u2014 it transfers it. When you earth a negatively charged object, the excess electrons flow into the Earth. The total charge of the object + Earth system is unchanged: the object loses $$-Q$$, the Earth gains $$-Q$$, so the total is the same as before.\n- Step 2: The Earth is so large that the added or removed charge is undetectable \u2014 it doesn't change the Earth's overall charge in any measurable way. But the charge hasn't vanished; it has just been **redistributed** to a much larger system. Conservation of charge is about the total charge of a closed system, not about the charge of any one object within it.", "source": "GLM 5.1"}, {"q": "A printer uses static electricity to place toner on paper. The drum is charged negatively, and the paper is neutral. Explain the mechanism by which toner is attracted to the correct spots on the paper. (3 steps)", "a": "- Step 1: A laser selectively **removes** charge from specific areas of the negatively charged drum (by making those areas conductive so charge leaks away), creating a pattern of charged and uncharged regions \u2014 this is the image.\n- Step 2: Toner particles (which are negatively charged) are attracted to the **remaining positively charged** (or neutral) areas of the drum \u2014 actually, the toner is typically given a charge opposite to the drum's charge, or the drum's charged areas attract neutral toner by induction.\n- Step 3: The toner transfers to the paper, which has been given an opposite charge to pull the toner off the drum. The key principle: static electricity lets you **control exactly where charged particles go**, which is why photocopiers and printers rely on it. Precision of charge placement = precision of image.", "source": "GLM 5.1"}, {"q": "What is the relationship between conventional current direction and electron flow direction? Why do they differ? (2 steps)", "a": "- Step 1: **Conventional current** flows from positive to negative. **Electron flow** is in the opposite direction: from negative to positive. They differ because the convention was established before electrons were discovered \u2014 scientists arbitrarily chose a direction, and it turned out to be opposite to the actual movement of electrons.\n- Step 2: In circuit analysis, we always draw conventional current from + to \u2212. But physically, the mobile charge carriers (electrons) drift from \u2212 to +. For static electricity, when we describe electrons moving, we use the physical direction. For circuit equations ($$I = \\Delta Q / \\Delta t$$, Ohm's law, etc.), we use conventional current. Both are valid \u2014 just be consistent and aware of which one you're using.", "source": "GLM 5.1"}, {"q": "A charged object is placed near an **insulator** vs. near a **conductor**. In which case is the induced charge effect stronger, and why? (2 steps)", "a": "- Step 1: The induced effect is generally **stronger in a conductor**. In a conductor, electrons are free to move throughout the material, so they can be pushed/pulled to create a large charge separation (many electrons accumulate on one side, leaving a large opposite charge on the other side).\n- Step 2: In an insulator, electrons are tightly bound and can only shift slightly within their atoms (polarisation), not flow freely. The induced charge separation is therefore much smaller \u2014 individual atoms become slightly polarised, but there's no large-scale charge movement. The net effect is weaker attraction. However, the charged object still attracts the insulator \u2014 just less strongly than it would attract a conductor of the same size and shape.", "source": "GLM 5.1"}, {"q": "If you rub a glass rod with silk, the glass becomes positive. If you then bring this glass rod near a neutral conducting sphere on an insulating stand, what happens to the sphere's electrons? What net force does the sphere experience? (3 steps)", "a": "- Step 1: The positive glass rod **attracts** electrons in the sphere toward the near side. Electrons flow (within the conductor) to the side closest to the rod. The near side becomes negative; the far side becomes positive.\n- Step 2: The near side (negative) is closer to the positive rod than the far side (positive). The attractive force between near side and rod is stronger than the repulsive force between far side and rod (because force decreases with distance).\n- Step 3: The sphere experiences a **net attractive force** toward the rod. This is the \"charged attracts neutral\" rule in action \u2014 even though the sphere is neutral overall, the induced charge separation creates a net attraction because the opposite charges are closer together.", "source": "GLM 5.1"}, {"q": "Edge case: can an object have a charge of $$0.8\\,e$$ (0.8 times the elementary charge)? Why or why not? (2 steps)", "a": "- Step 1: **No.** Charge is quantised \u2014 it comes in integer multiples of $$e$$. An object's charge is $$Q = ne$$ where $$n$$ is an integer (0, 1, 2, 3, ...). You cannot have a fraction of an electron, so you cannot have a fractional multiple of $$e$$.\n- Step 2: A charge of $$0.8\\,e$$ would require 0.8 of an electron, which is physically impossible. The smallest non-zero charge any object can carry is $$\\pm e = \\pm 1.60 \\times 10^{-19}\\text{ C}$$. (Quarks have charges of $$\\pm \\frac{1}{3}e$$ or $$\\pm \\frac{2}{3}e$$, but quarks are never found in isolation \u2014 they are always bound into hadrons with integer-charge multiples of $$e$$.)", "source": "GLM 5.1"}, {"q": "A current of 0.1 A flows. Roughly how many electrons pass a point per second? Give the order of magnitude. (2 steps)", "a": "- Step 1: $$\\Delta Q = I\\Delta t = 0.1 \\times 1 = 0.1\\text{ C}$$. Then $$n = \\Delta Q / e = 0.1 / (1.6 \\times 10^{-19})$$.\n- Step 2: $$0.1 / 1.6 \\approx 0.06$$, so $$n \\approx 0.06 \\times 10^{19} = 6 \\times 10^{17}$$ electrons per second. The order of magnitude is $$10^{17}$$. Even a tiny current of 0.1 A involves hundreds of quadrillions of electrons per second.", "source": "GLM 5.1"}, {"q": "Synthesis: A student rubs a plastic rod with fur, making the rod negative. They then hold the rod near a stream of water from a tap, and the water bends toward the rod. Explain this observation fully, using all the relevant concepts from this topic. (4 steps)", "a": "- Step 1: **Charging by friction** \u2014 rubbing the plastic rod with fur transfers electrons from the fur to the rod (plastic/polythene has a stronger hold on electrons than fur). The rod becomes negatively charged.\n- Step 2: **Water is a conductor** (due to dissolved ions) \u2014 when the negatively charged rod is brought near the water stream, the rod's electric field induces charge separation in the water. Electrons in the water are repelled away from the rod, while positive ions are attracted toward it.\n- Step 3: **Charged attracts neutral by induction** \u2014 the near side of the water stream becomes positively charged (positive ions are closer), and the far side becomes negatively charged. The attractive force between the rod and the near-side positive charges is stronger than the repulsive force from the far-side negative charges (because the near side is closer).\n- Step 4: The water experiences a **net attractive force** toward the rod and bends toward it. This is a direct demonstration of the \"charged object attracts a neutral object\" rule, using induction in a conducting liquid rather than a solid conductor or insulator.", "source": "GLM 5.1"}, {"q": "Why does the electrostatic series chart have both insulators AND conductors on it? I thought static only built up on insulators. (2 steps)", "a": "- Step 1: The electrostatic series ranks materials by their **tendency to gain or lose electrons when rubbed**, regardless of whether they are conductors or insulators. It predicts the *sign* of the charge each material acquires.\n- Step 2: While it's true that static charge **builds up and persists** only on insulators, conductors can still *temporarily* acquire charge by friction \u2014 it just flows away quickly unless the conductor is insulated from Earth. The chart tells you *which way* electrons transfer during rubbing. Gold and platinum are conductors that appear at the bottom (strong hold on electrons, tend to become negative when rubbed with something above them), but any charge they gain would quickly dissipate unless they are isolated.", "source": "GLM 5.1"}];
function render() {
  const container = document.getElementById('cards');
  container.innerHTML = cards.map((c, i) => 
    '<div class="card" id="card-' + i + '">' +
    '<div class="card-header">' +
    '<input type="checkbox" class="card-select" data-id="' + i + '" checked onchange="updateCount()">' +
    '<div class="card-q">' + (i+1) + '. ' + escapeHtml(c.q) + '</div>' +
    '<span class="card-source">' + c.source + '</span>' +
    '</div>' +
    '<div class="card-answer" id="ans-' + i + '">' + formatAnswer(c.a) + '</div>' +
    '</div>'
  ).join('');
  updateCount();
}
function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatAnswer(t) {
  t = escapeHtml(t);
  t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + t + '</p>';
}
function toggleAll() { document.querySelectorAll('.card-answer').forEach(el => el.classList.toggle('show')); }
function selectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = true; cb.closest('.card').classList.remove('deselected'); }); updateCount(); }
function deselectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = false; cb.closest('.card').classList.add('deselected'); }); updateCount(); }
function updateCount() {
  const checked = document.querySelectorAll('.card-select:checked').length;
  document.getElementById('count').textContent = checked + ' selected';
  document.querySelectorAll('.card-select').forEach(cb => { cb.closest('.card').classList.toggle('deselected', !cb.checked); });
}
function exportSelected() {
  const selected = [];
  document.querySelectorAll('.card-select:checked').forEach(cb => {
    const idx = parseInt(cb.dataset.id);
    selected.push('## Q' + (selected.length + 1) + '\n**Q:** ' + cards[idx].q + '\n\n**A:** ' + cards[idx].a);
  });
  document.getElementById('exportText').value = selected.join('\n\n---\n\n');
  document.getElementById('exportArea').style.display = 'block';
}
render();
</script>
</body>
</html>
