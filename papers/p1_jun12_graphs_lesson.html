2$$: asymptote\n+ Alternating, every $$\\pi/2$$.\n\nThis single rule places every key feature instantly and correctly.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "When solving an equation like $$\\tan x = \\frac{1}{x}+1$$, why is the *algebraic* approach (e.g. trying $$2x = \\cos^{-1}(\\cdot)$$) a trap?", "answer": "It's analytically intractable — there's no closed-form solution. The exam intends the *graphical* method (\"hence\" in the question is the clue: they want you to use the sketch). Students who try to solve algebraically waste minutes and get nowhere. The picture is the entire method.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "What's the visual feature that lets you confirm \"one solution per $$\\pi$$ branch\" in Desmos when verifying a $$\\tan x = \\frac{1}{x}+1$$ count?", "answer": "For $$x$$ large (positive or negative), $$\\frac{1}{x}+1$$ becomes a near-horizontal line just above (or below) $$y=1$$. This line clearly slices through each $$\\tan$$ branch at exactly one point — providing the visual proof that the shortcut \"one crossing per branch\" is correct beyond the central pole-affected branch.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "For the upward-parabola sign rule, why does it specifically require $$a > 0$$ (leading coefficient positive)?", "answer": "The rule \"positive outside, negative between\" assumes the parabola opens **upward**. If $$a<0$$ (downward parabola), the signs flip: positive between the roots, negative outside. So when rearranging, **always multiply through to make the leading coefficient positive** (which may flip the inequality sign). This keeps the standard mnemonic applicable.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "When sketching a transformed curve like $$y = \\cos 2x^\\circ$$, what's the systematic point-mapping technique that beats trying to \"imagine the stretch\"?", "answer": "Take the key landmarks of the parent curve ($$\\cos x^\\circ$$: $$(0,1), (90,0), (180,-1), (270,0), (360,1)$$) and apply the mapping $$(x, y) \\mapsto (\\frac{x}{2}, y)$$ to each, producing the landmarks of the new curve:\n$$(0,1) \\to (45,0) \\to (90,-1) \\to (135,0) \\to (180,1) \\to \\dots$$\nThen connect with a smooth cosine shape. This builds the new curve **literally point-by-point** — no imagination required.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "What's the priority ordering Harry gave for revision time: topic homework vs past papers?", "answer": "**Reflective past papers > topic homework.** For an A* grade, the priority is doing as much *reflective* past-paper practice as possible, with a mistake-reflection after each paper. The two P1 past papers Harry already sent are the **top priority**, ahead of the narrower topic-based trig set. Pure 1 is foundational for P2 and P3 — consolidate it first.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "[Practice] For $$\\cos x^\\circ = p$$ on $$0\\le x\\le 270$$, the answer for \"exactly two solutions\" is $$-1 < p \\le 0$$ (with $$p=0$$ **included**), unlike Q5's answer where $$p=0$$ was excluded. Why the difference?", "answer": "The domain matters. Monotonic pieces here:\n+ $$S_1: [0,180]$$ falls $$1\\to-1$$\n+ $$S_2: [180,270]$$ rises $$-1\\to 0$$\n\nFor $$p=0$$: $$S_1$$ gives $$x=90$$; $$S_2$$ gives $$x=270$$ (its endpoint). Only 2 crossings. Compare to Q5 where the domain $$[0,225]$$ contained a third piece $$S_3$$ rising back to $$(180,1)$$ then falling, giving an extra crossing at $$p=0$$ ($$x=225$$).\n\nLesson: never copy a \"range of $$p$$\" answer — always re-derive for your specific domain.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "[Practice] For $$y = \\cos 3x^\\circ$$, the parent's minimum $$(180, -1)$$ maps to which point?", "answer": "Apply $$(x, y) \\mapsto (\\frac{x}{3}, y)$$ for $$f(3x)$$:\n$$(180, -1) \\mapsto (60, -1).$$\nCheck: $$\\cos(3 \\times 60)^\\circ = \\cos 180^\\circ = -1$$ ✓. Note the x-coordinate is **divided** by 3, confirming the squash. Period: $$\\frac{360}{3} = 120°$$.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "When you see a fraction like $$\\frac{a-b}{b-a}$$, what's the mental shortcut that beats explicit factoring?", "answer": "Recognise the swapped-difference pattern immediately as $$-1$$. Don't bother factoring out $$-1$$ each time — just write $$-1$$. This saves seconds per occurrence and prevents sign slips in larger expressions. Harry: \"spotting $$\\frac{x-y}{y-x}$$ is $$-1$$ on sight would speed you up a great deal.\"", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "What's the order convention for writing the answer to a quadratic inequality with two roots: \"$$x\\le -4$$ or $$x\\ge 2$$\" — why is the connective \"or\"?", "answer": "The two regions (left of left-root, right of right-root) are **disjoint** — no $$x$$ satisfies both simultaneously, so it's a *union* (logical OR, not AND). Writing \"and\" would be a mark-losing error — \"and\" would suggest intersection, which is empty. Always check: regions on opposite sides of two roots → \"or\"; region between two roots → no connective needed (single interval).", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "Suppose a transformed curve question on a partial domain ends with the curve rising back near its maximum but not completing a full cycle. Why is this geometry a major \"exactly $$n$$ solutions\" trap?", "answer": "A partial extra monotonic piece adds *extra* crossings only in the band of heights it covers — but the test-makers love placing the domain cutoff $$k$$ here precisely because students count only the \"obvious\" two monotonic pieces. Always:\n+ Trace the curve all the way from $$x=0$$ to $$x=k$$.\n+ Count the **distinct monotonic pieces**.\n+ For each value of $$p$$, check membership in each piece's range.\n\nThe partial piece is invisible to \"between the max and min\" reasoning — that's exactly why it's the trap.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "Why is the boundary value $$x = -10\\pi$$ in Q4(c)(ii) safe to include (it gives an extra crossing) while a boundary value at an asymptote would not?", "answer": "$$x = -10\\pi$$ is a **zero** of $$\\tan x$$ (since $$\\sin(-10\\pi)=0$$), so $$\\tan x$$ is defined there. The interval closes ($$x \\le \\frac{5\\pi}{2}$$ uses $$\\le$$). At a zero, the branches to its right are full branches available to be counted. By contrast, if the boundary were at an asymptote (e.g. $$x = -\\frac{19\\pi}{2}$$), $$\\tan x$$ is undefined there — no crossing can lie *on* the boundary, and partial branches need careful treatment.\n\nRule: check whether the boundary lands on a zero, an asymptote, or an interior point — each changes how you count.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}], "count": 45}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "When a question gives you ratios and asks for another ratio, what's the key trick that makes the algebra trivial, and why does it work?", "answer": "- Step 1: The trick is to **assign convenient integer lengths** that respect every given ratio, rather than carrying symbolic variables.\n- Step 2: Why it works: a ratio fixes only **relative** sizes, not absolute lengths. The final ratio is invariant under scaling, so any valid choice of lengths gives the same answer.\n- Step 3: This kills all the algebra with scaling factors $$kX, \\tfrac{3}{2}X$$ etc. — you just compute with numbers.\n\nTakeaway: Ratio in, ratio out ⇒ invent lengths.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "P1 ratio question with $$\\frac{QX}{PX} = \\frac{1}{6}$$ and $$\\frac{QX}{XR} = \\frac{2}{3}$$: how do you choose the anchor value for $$QX$$ to keep arithmetic clean?", "answer": "- Step 1: Identify the quantity that appears in **multiple** given ratios — here $$QX$$ shares both ratios, so it's the natural anchor.\n- Step 2: Examine the denominators of the multipliers: $$PX = 6\\,QX$$ (fine for any QX) and $$XR = \\tfrac{3}{2}\\,QX$$ — the $$\\tfrac{3}{2}$$ forces $$QX$$ to be **even** for integer $$XR$$.\n- Step 3: Smallest even integer ⇒ $$QX = 2$$. Then $$PX = 12$$, $$XR = 3$$, all integers.\n\nTakeaway: Pick the smallest value that makes **every** dependent length a nice integer.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "In the triangle ratio question, why is the given $$\\angle QXR = 90^\\circ$$ a deliberate distractor?", "answer": "The right angle is only needed if you attack the problem with **Pythagoras or coordinates**. The assign-lengths-and-compute-ratio method never uses it — all you need are the two ratios and the midpoint definition. Recognising irrelevant data is itself an exam skill: don't be tempted to invoke Pythagoras just because a right angle is shown.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "When you have a computed length $$PX$$ and the midpoint $$M$$ of $$PR$$, what's the sign-check you must make before writing $$MX = PX - PM$$? (2 steps)", "answer": "- Step 1: Check whether $$X$$ lies **before or after** $$M$$ on segment $$PR$$ by comparing $$PX$$ to $$PM$$.\n+ If $$PX > PM$$: $$X$$ is beyond the midpoint, so $$MX = PX - PM$$.\n+ If $$PX < PM$$: $$X$$ is before the midpoint, so $$MX = PM - PX$$.\n- Step 2: Skipping this check produces a negative length if you get the direction wrong.\n\nTakeaway: A \"length\" is always positive — always check ordering first.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "What's the \"burger method\" for computing $$\\dfrac{2}{4.5}$$ in your head, and what mistake does it prevent?", "answer": "- Step 1: Rewrite $$4.5 = \\tfrac{9}{2}$$ so the expression becomes $$\\dfrac{2}{\\,9/2\\,}$$ — a fraction over a fraction.\n- Step 2: Flip the bottom and multiply: $$\\dfrac{2}{1} \\times \\dfrac{2}{9} = \\dfrac{4}{9}$$.\n- Step 3: The pitfall it prevents: putting the result upside-down. The numerator-times-numerator stays on top.\n\nTakeaway: \"Two times two goes on the top\" — keep the numerators together.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "When simplifying $$4 + \\dfrac{4-x^2}{x^2-2x}$$, what feature should you scan the factored numerator/denominator for, and what does it tell you?", "answer": "- Step 1: Scan for a numerator factor that matches a denominator factor **except the terms are in opposite order** — e.g. $$(2-x)$$ in the numerator and $$(x-2)$$ in the denominator.\n- Step 2: This is the trigger for the identity $$(a-b) = -(b-a)$$, which means that factor pair cancels to $$-1$$, not $$+1$$.\n- Step 3: Pull out the $$-1$$ explicitly before cancelling so you don't lose the sign.\n\nTakeaway: Swapped-difference factors cancel to $$-1$$ on sight.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Why is $$\\dfrac{a-b}{b-a} = -1$$, not $$+1$$?", "answer": "Because $$a-b = -(b-a)$$ algebraically (factor out $$-1$$ from one of them). So $$\\dfrac{a-b}{b-a} = \\dfrac{-(b-a)}{b-a} = -1$$. The two expressions look \"the same\" but have the terms in opposite order — a sign distinguishes them.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "In simplifying $$4 + \\dfrac{-(2+x)}{x}$$, why must you write $$4 - \\dfrac{2+x}{x}$$ with a **bracket** before splitting the fraction?", "answer": "- Step 1: The minus sign must distribute over **both** terms of $$(2+x)$$, not just the first.\n- Step 2: Splitting gives $$4 - \\dfrac{2}{x} - \\dfrac{x}{x} = 4 - \\dfrac{2}{x} - 1 = 3 - \\dfrac{2}{x}$$.\n- Step 3: The classic trap: writing $$4 - \\dfrac{2}{x} + \\dfrac{x}{x}$$ (forgetting the implied bracket) gives $$5 - \\dfrac{2}{x}$$ — which is one of the deliberately offered wrong options.\n\nTakeaway: When pulling a minus across a sum, bracket first, distribute second.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "For a quadratic inequality like $$x^2 \\ge 8 - 2x$$, what is the very first move and why is it non-negotiable?", "answer": "- Step 1: Rearrange to **standard order on one side**: $$x^2 + 2x - 8 \\ge 0$$, with $$x^2$$, then $$x$$, then constant, leading coefficient **positive**.\n- Step 2: Why: you read roots and the \"outside/inside\" sign behaviour off the standard form. Out-of-order or sign-flipped expressions are the #1 way to pick the wrong option.\n- Step 3: Keeping the leading coefficient positive means the parabola opens **upward** and the rule \"positive outside the roots, negative between\" applies directly without sign flips.\n\nTakeaway: Never read roots off an unrearranged inequality.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "What's the mnemonic for the sign behaviour of an upward-opening parabola $$ax^2 + bx + c$$ with $$a > 0$$ and real roots $$\\alpha < \\beta$$?", "answer": "\"A **happy** (upward) parabola is **positive on the outside, negative in the middle**.\"\n- Positive ($$>0$$): $$x < \\alpha$$ or $$x > \\beta$$.\n- Negative ($$<0$$): $$\\alpha < x < \\beta$$.\n\nThe $$\\ge$$ / $$\\le$$ versions just include the roots themselves.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "When factorising $$x^2 + 2x - 8$$, what are the two conditions on the bracket numbers, and how do you sign-check?", "answer": "- Step 1: You need two numbers that **multiply to $$c = -8$$** and **add to $$b = +2$$**.\n- Step 2: Test pairs that multiply to $$-8$$: $$(+4, -2)$$ sums to $$+2$$ ✓.\n- Step 3: So $$x^2 + 2x - 8 = (x+4)(x-2)$$, roots $$x = -4$$ and $$x = 2$$.\n\nSign-check trap: $$(+2, -4)$$ also multiplies to $$-8$$ but sums to $$-2$$ — wrong sign of $$b$$. Always verify both conditions.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "What's the sum-and-product check for confirming the roots of $$ax^2 + bx + c$$?", "answer": "If the roots are $$\\alpha, \\beta$$ then:\n- Sum: $$\\alpha + \\beta = -\\dfrac{b}{a}$$\n- Product: $$\\alpha\\beta = \\dfrac{c}{a}$$\n\nFor $$x^2 + 2x - 8 = 0$$ with roots $$-4, 2$$: sum $$= -2 = -b/a$$ ✓, product $$= -8 = c/a$$ ✓. Use this as a fast post-factorisation check — it catches sign slips immediately.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "A student factorises $$x^2 + 2x - 8$$ as $$(x+2)(x-4)$$ giving roots $$-2$$ and $$4$$. What's the sum/product check that catches the mistake?", "answer": "- Step 1: Sum check: $$-2 + 4 = +2$$, but we need $$-b/a = -2$$. ✗\n- Step 2: Product check: $$(-2)(4) = -8$$ ✓ — so product alone doesn't catch it.\n- Step 3: The sum failing tells you the signs of both roots are swapped. Correct factorisation: $$(x+4)(x-2)$$ with roots $$-4, +2$$.\n\nTakeaway: Always check **both** sum and product — product alone misses sign-swaps.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "State the zeros and asymptotes of $$y = \\tan x$$ in terms of integer multiples.", "answer": "- Zeros wherever $$\\sin x = 0$$: $$x = n\\pi$$ for integer $$n$$ (every $$\\pi$$).\n- Vertical asymptotes wherever $$\\cos x = 0$$: $$x = \\dfrac{(2n+1)\\pi}{2}$$ — the **odd** multiples of $$\\tfrac{\\pi}{2}$$.\n- Period $$\\pi$$; between consecutive asymptotes $$\\tan x$$ rises continuously from $$-\\infty$$ to $$+\\infty$$, crossing zero in the middle.\n\nMnemonic: \"Something interesting happens every $$\\tfrac{\\pi}{2}$$ — either a zero or an asymptote.\"", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Why does any near-horizontal line $$y = c$$ meet each branch of $$\\tan x$$ **exactly once**, and what theorem is this?", "answer": "- Step 1: On a single branch (open interval of width $$\\pi$$ between adjacent asymptotes), $$\\tan x$$ is **continuous and strictly monotonically increasing**, rising from $$-\\infty$$ to $$+\\infty$$.\n- Step 2: By the **Intermediate Value Theorem**, a continuous function that takes every value between its limits will pass through any specific finite height exactly once on that branch.\n- Step 3: Hence one crossing per $$\\pi$$-wide branch — over an interval of width $$N\\pi$$, expect $$\\approx N$$ solutions.\n\nTakeaway: Each $$\\tan$$ branch is bijective onto $$\\mathbb{R}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "P1 Q4(c)(i): how do you instantly count the solutions of $$\\tan x = \\tfrac{1}{x}+1$$ on $$0 \\le x \\le 40\\pi$$ without sketching the whole thing?", "answer": "- Step 1: Recognise that for large $$x$$, $$\\tfrac{1}{x}+1 \\to 1$$, so the RHS is a near-horizontal line just above $$y=1$$.\n- Step 2: A near-horizontal line cuts each $$\\pi$$-wide branch of $$\\tan x$$ exactly once (one-crossing-per-branch result).\n- Step 3: The interval has width $$40\\pi$$ ⇒ contains $$40$$ branches ⇒ **40 solutions**.\n\nTakeaway: Interval width $$\\div \\pi$$ = solution count, for big intervals where the other curve is near-flat.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "When sketching $$y = \\tfrac{1}{x} + 1$$, what is the horizontal asymptote — and what is the classic mistake?", "answer": "- Step 1: Recognise that adding $$+1$$ is a **vertical translation up by 1**, which moves the **horizontal asymptote with the curve**.\n- Step 2: Plain $$y = \\tfrac{1}{x}$$ has horizontal asymptote $$y = 0$$; after shifting up, the new horizontal asymptote is $$y = 1$$.\n- Step 3: Classic mistake: leaving the asymptote at $$y = 0$$. The vertical asymptote $$x = 0$$ is **unchanged** because the shift is vertical, not horizontal.\n\nTakeaway: Vertical translations move horizontal asymptotes; redraw the asymptote *first*, then the curve relative to it.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "P1 Q4(c)(ii): for $$\\tan x = \\tfrac{1}{x}+1$$ on $$-10\\pi \\le x \\le \\tfrac{5\\pi}{2}$$, why is the branch containing $$x = 0$$ special, and what extra crossing must you not miss?", "answer": "- Step 1: On the middle branch $$\\left(-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2}\\right)$$, the function $$\\tfrac{1}{x}+1$$ has a **pole at $$x = 0$$** — it shoots to $$\\pm\\infty$$ **inside** the branch.\n- Step 2: This makes the branch carry **two** crossings, not one:\n+ On $$\\left(-\\tfrac{\\pi}{2}, 0\\right)$$: $$\\tfrac{1}{x}+1$$ dives to $$-\\infty$$ and meets the rising $$\\tan x$$ **below the $$x$$-axis** — the \"odd one out\" crossing.\n+ On $$\\left(0, \\tfrac{\\pi}{2}\\right)$$: $$\\tfrac{1}{x}+1$$ comes down from $$+\\infty$$, meeting $$\\tan x$$ above the axis.\n- Step 3: The below-axis one is the crossing most students miss (Phuc originally answered 12, missing this).\n\nTakeaway: When two curves have a pole inside a shared branch, count crossings on **each side** of the pole separately.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Harry counts the solutions in $$-10\\pi \\le x \\le \\tfrac{5\\pi}{2}$$ as $$10 + 1 + 3$$. What does each number correspond to geographically?", "answer": "- Step 1: **10**: ten ordinary $$\\pi$$-wide branches from $$-10\\pi$$ up to $$-\\tfrac{\\pi}{2}$$, each cut once by the near-horizontal $$y \\approx 1$$.\n- Step 2: **1**: the \"odd one out below the axis\" — the crossing on $$\\left(-\\tfrac{\\pi}{2}, 0\\right)$$ where $$\\tfrac{1}{x}+1 \\to -\\infty$$ meets rising $$\\tan x$$.\n- Step 3: **3**: from $$0$$ up to $$\\tfrac{5\\pi}{2}$$: one crossing on $$\\left(0, \\tfrac{\\pi}{2}\\right)$$ above the axis, plus the two ordinary branches centred at $$\\pi$$ and $$2\\pi$$.\n\nTotal: 14 solutions.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "When the lower endpoint of a $$\\tan x$$ interval is at $$x = -10\\pi$$, why does this **not** subtract a branch from the count?", "answer": "Because $$x = -10\\pi$$ is a **zero** of $$\\tan x$$ (since $$-10\\pi = n\\pi$$ with $$n = -10$$), **not** an asymptote. So the boundary lies in the interior of a $$\\tan$$ branch, and the branch immediately to its right is fully included in the interval — all ten branches from $$-10\\pi$$ to $$-\\tfrac{\\pi}{2}$$ get counted. If the endpoint had been on an asymptote like $$-\\tfrac{19\\pi}{2}$$, you'd have to recount.\n\nTakeaway: Always check whether interval endpoints land on a zero or an asymptote of $$\\tan x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "When the exam says \"**giving a reason**, state the number of solutions of $$\\tan x = \\tfrac{1}{x}+1$$\", what is the mark-winning sentence?", "answer": "Write: *\"There are $$N$$ solutions because the graph of $$y = \\tfrac{1}{x}+1$$ intersects the graph of $$y = \\tan x$$ $$N$$ times in the interval given.\"*\n\nThree required ingredients:\n- The number $$N$$.\n- **Both** curve equations named explicitly.\n- The interval referenced.\n\nThe count alone scores **nothing** without the justification sentence.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "What is the trigger phrase that tells you to solve an equation by **counting graph intersections** rather than by algebra?", "answer": "The word \"**hence**\" in a part like \"**Hence**, state the number of solutions of...\" is the clue. It tells you to use the graph you just sketched. Combined with phrasings like \"**state the number of solutions**\" (not \"find the solutions\"), this signals an intersection-counting approach. Trying to solve $$\\tan x = \\tfrac{1}{x}+1$$ algebraically is futile — the intended method is the picture.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "What is the general principle linking \"solutions of $$f(x) = g(x)$$\" to graph behaviour?", "answer": "$$\\#\\{\\text{solutions of } f(x) = g(x)\\} = \\#\\{\\text{intersection points of } y = f(x) \\text{ and } y = g(x)\\}$$\n\nA solution is exactly an $$x$$ where the two curves have the same height ⇒ a crossing. This converts an impossible algebra problem into a sketch-and-count exercise.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "P1 Q5: the curve $$y = \\cos 2x^\\circ$$ comes from $$y = \\cos x^\\circ$$ by what transformation, and what is the corresponding coordinate mapping?", "answer": "- Step 1: Replace $$x$$ with $$2x$$ — this is a **horizontal stretch of scale factor $$\\tfrac{1}{2}$$** (a squash toward the $$y$$-axis).\n- Step 2: Coordinate mapping: $$(x, y) \\mapsto \\left(\\tfrac{x}{2}, y\\right)$$. Every $$x$$-coordinate is **divided** by 2; $$y$$ unchanged.\n- Step 3: Period halves from $$360^\\circ$$ to $$\\tfrac{360}{2} = 180^\\circ$$.\n\nTakeaway: $$f(ax)$$ ⇒ divide $$x$$-coords by $$a$$; $$y$$ fixed.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "Derive **from first principles** why $$y = f(ax)$$ sends a point $$(X, Y)$$ on $$y = f(x)$$ to $$\\left(\\tfrac{X}{a}, Y\\right)$$. (3 steps)", "answer": "- Step 1: A point $$(X, Y)$$ lies on $$y = f(x)$$ exactly when $$Y = f(X)$$.\n- Step 2: For the matching point on $$y = g(x) = f(ax)$$, we need the **input to $$f$$** to equal $$X$$ — i.e. $$ax = X$$, so $$x = \\tfrac{X}{a}$$.\n- Step 3: Then $$g\\left(\\tfrac{X}{a}\\right) = f\\left(a \\cdot \\tfrac{X}{a}\\right) = f(X) = Y$$. So the point on the new curve is $$\\left(\\tfrac{X}{a}, Y\\right)$$.\n\nTakeaway: Solving \"what input do I need?\" forces $$x \\to x/a$$ — that's why $$a > 1$$ squashes.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "What's the easy-to-confuse rule pair: $$f(ax)$$ vs $$f(x/a)$$ — which is the squash, which is the widening?", "answer": "- $$f(ax)$$: horizontal stretch of scale factor $$\\tfrac{1}{a}$$. If $$a > 1$$ this **squashes** toward the $$y$$-axis.\n- $$f(x/a)$$: horizontal stretch of scale factor $$a$$. If $$a > 1$$ this **widens** away from the $$y$$-axis.\n\nAnchor: derivation gives $$(x, y) \\mapsto (x/a, y)$$ for $$f(ax)$$ — $$x$$-coords are **divided** by $$a$$ — so a big $$a$$ makes coordinates small ⇒ squash.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "State the period rule for $$\\cos(kx)^\\circ$$ and $$\\sin(kx)^\\circ$$ (degrees and radians).", "answer": "Degrees:\n$$\\text{period}(\\cos kx^\\circ) = \\frac{360^\\circ}{k}$$\n\nRadians:\n$$\\text{period}(\\cos kx) = \\frac{2\\pi}{k}$$\n\nThe period **divides by $$k$$** because the input $$kx$$ runs through a full $$360^\\circ$$ (or $$2\\pi$$) when $$x$$ runs through only $$\\tfrac{360}{k}$$ (or $$\\tfrac{2\\pi}{k}$$). For $$\\cos 2x^\\circ$$: period = $$180^\\circ$$.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "P1 Q5(a): how do you locate the point $$Q$$ — the minimum of $$y = \\cos 2x^\\circ$$ shown on the sketch?", "answer": "- Step 1: A minimum of $$\\cos(\\cdot)$$ occurs when the argument equals $$180^\\circ$$ (and $$y = -1$$).\n- Step 2: So $$2x = 180 \\Rightarrow x = 90$$.\n- Step 3: Therefore $$Q = (90^\\circ, -1)$$.\n\nAlternative: apply the mapping $$(x, y) \\mapsto (x/2, y)$$ to $$(180, -1)$$ on $$\\cos x^\\circ$$, giving $$(90, -1)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "P1 Q5(a)(ii): the sketch shows $$R(k, 0)$$. Why is $$k = 225$$, not $$270$$?", "answer": "- Step 1: $$R$$ is on the $$x$$-axis, so it's a **zero** of $$\\cos 2x^\\circ$$, not a minimum.\n- Step 2: Zeros occur where $$2x = 90, 270, 450, \\ldots$$ ⇒ $$x = 45, 135, 225, \\ldots$$\n- Step 3: From the sketch sequence $$(0,1) \\to (45, 0) \\to (90, -1)_Q \\to (135, 0) \\to (180, 1) \\to (225, 0)_R$$, $$R$$ is the third zero ⇒ $$k = 225$$.\n\nTrap: $$270$$ is the next **minimum** of $$\\cos 2x^\\circ$$ (where $$2x = 540$$), not a zero. Always check whether the named point is a zero, max, or min.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "For $$\\cos 2x^\\circ = p$$ on $$0 \\le x \\le 225$$, \"exactly two solutions\" — why is the tempting answer $$-1 < p < 1$$ **wrong**?", "answer": "- Step 1: The curve on $$[0, 225]$$ is **not monotonic** — it goes down ($$1 \\to -1$$), up ($$-1 \\to 1$$), then down ($$1 \\to 0$$).\n- Step 2: The extra third piece (rising from $$Q$$ back to $$(180, 1)$$ and then falling to $$R$$) means a generic positive $$p < 1$$ gets cut a **third time** on $$[180, 225]$$.\n- Step 3: So for $$0 < p < 1$$ there are **three** solutions, not two.\n\nCorrect answer: $$-1 < p < 0$$ or $$p = 1$$.\n\nTakeaway: Whenever the domain extends past a turning point, recount per monotonic piece — never assume \"interior values give two intersections\".", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "What's the systematic method to find the range of $$p$$ for which $$\\cos 2x^\\circ = p$$ has exactly $$N$$ solutions on a given domain? (4 steps)", "answer": "- Step 1: Split the domain into **monotonic pieces** (where the function is strictly increasing or strictly decreasing) by locating max/min turning points.\n- Step 2: For each piece, note the **range of $$y$$**-values it covers.\n- Step 3: For each candidate band of $$p$$, count the number of pieces it intersects (=1 per piece if $$p$$ is in that piece's range, 0 otherwise). Watch for shared endpoint values (max/min) where two pieces meet at the same $$y$$.\n- Step 4: Identify which bands give total = $$N$$.\n\nFor $$\\cos 2x^\\circ = p$$ on $$[0, 225]$$: pieces are $$S_1[0,90]:1\\to-1$$, $$S_2[90,180]:-1\\to1$$, $$S_3[180,225]:1\\to0$$. Result: $$-1 < p < 0$$ or $$p = 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "In the \"exactly two solutions\" counting table for $$\\cos 2x^\\circ = p$$ on $$[0, 225]$$, why does $$p = 1$$ give 2, not 3?", "answer": "- Step 1: $$p = 1$$ hits $$S_1$$ at $$x = 0$$ (max at left endpoint).\n- Step 2: $$p = 1$$ hits $$S_2$$ at $$x = 180$$ (max at right endpoint of $$S_2$$).\n- Step 3: $$S_3$$ starts at $$(180, 1)$$ which is the **same point** as the $$S_2$$ endpoint — not a separate solution. So $$S_3$$'s contribution at $$p=1$$ is already counted.\n\nTotal: 2 distinct solutions. This is the kind of endpoint-coincidence subtlety that distinguishes an A* answer.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "When sliding a horizontal line $$y = p$$ across the graph to count intersections, what's the rule for boundaries of $$p$$-bands?", "answer": "Boundaries of $$p$$-bands correspond to **special heights** where the count changes:\n- The minimum value (here $$p = -1$$): often gives a single repeated intersection at a turning point.\n- The maximum value (here $$p = 1$$): may give a count drop where the line just touches the peak.\n- $$p = 0$$: the curve crosses the $$x$$-axis, often giving extra zeros.\n- Any horizontal level where the curve's behaviour qualitatively changes.\n\nAlways **test each band and each boundary value** separately — never extrapolate from one band to the next.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "What does the horizontal asymptote of $$y = \\tfrac{1}{x} - 2$$ become, and why?", "answer": "- Step 1: This is $$y = \\tfrac{1}{x}$$ translated **down by 2** (the $$-2$$ adds to the $$y$$-value of every point).\n- Step 2: The horizontal asymptote of $$\\tfrac{1}{x}$$ is $$y = 0$$.\n- Step 3: Shifting down by 2 moves the asymptote to $$y = -2$$. Vertical asymptote $$x = 0$$ unchanged.\n\nTakeaway: Vertical shifts move horizontal asymptotes with them.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "What's the \"tick off what you've used\" exam-room habit Harry recommended, and why is it so effective on multi-step questions?", "answer": "- Step 1: As you use each given piece of information (ratio, angle, equation), put a small **tick** next to it on the question paper.\n- Step 2: On a multi-step problem, the **unused given is usually exactly the next step** — the exam writers don't waste data.\n- Step 3: If you're stuck, scan for the unticked piece — that's your nudge for what to do next.\n\nThis is the meta-skill that catches \"what haven't you used yet?\" moments under exam pressure.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Why does Harry call $$\\dfrac{x-y}{y-x} = -1$$ a \"spot on sight\" identity rather than something to factor each time?", "answer": "Recognising the swapped-difference pattern instantly — without writing out the $$-1$$ factoring — saves seconds per occurrence. Under exam time pressure these seconds compound. The pattern is: any fraction whose numerator and denominator are differences of the **same two terms in opposite order** equals $$-1$$. Train this until $$\\dfrac{p-q}{q-p}$$ reads as \"$$-1$$\" automatically.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "For $$\\tan x$$, what's the simple rhythm Harry teaches for placing every feature quickly?", "answer": "\"Something interesting happens every $$\\tfrac{\\pi}{2}$$ (or $$90^\\circ$$) — it's **either a zero or an asymptote**.\"\n\nStarting from $$x = 0$$ (zero) and stepping by $$\\tfrac{\\pi}{2}$$:\n- $$0$$: zero\n- $$\\tfrac{\\pi}{2}$$: asymptote\n- $$\\pi$$: zero\n- $$\\tfrac{3\\pi}{2}$$: asymptote\n- $$2\\pi$$: zero, etc.\n\nZeros at integer multiples of $$\\pi$$; asymptotes at odd multiples of $$\\tfrac{\\pi}{2}$$. This rhythm gets you a correct sketch in seconds.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Harry's blanket advice: when you see \"**how many solutions**\" in an exam, what's the default method?", "answer": "**Solve graphically, not algebraically.** Sketch both curves and count intersections. Students who try $$2x = \\cos^{-1}p$$ or similar algebra get stuck; the intended method is the picture. The word \"**hence**\" usually follows a \"sketch the curve\" part — that's the clue.\n\nFor a periodic curve vs a near-flat line: total ≈ (interval width) ÷ (period of one branch), then correct at the endpoints.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "What sanity check confirms that $$0 \\le x \\le 20\\pi$$ should give exactly half the solutions of $$0 \\le x \\le 40\\pi$$ for $$\\tan x = \\tfrac{1}{x}+1$$?", "answer": "Each $$\\pi$$-wide branch contributes one solution (for the near-horizontal line $$y \\approx 1$$). Doubling the interval doubles the branch count and hence the solution count: $$40\\pi \\to 40$$, $$20\\pi \\to 20$$. Linearity in interval width is a fast sanity check on any such count.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "When applying the mapping $$(x, y) \\mapsto (x/3, y)$$ to build $$y = \\cos 3x^\\circ$$ from $$y = \\cos x^\\circ$$, what is the image of the maximum $$(360, 1)$$, and how do you verify?", "answer": "- Step 1: Image: $$(360/3, 1) = (120, 1)$$.\n- Step 2: Verification: substitute into $$\\cos 3x^\\circ$$ ⇒ $$\\cos(3 \\times 120)^\\circ = \\cos 360^\\circ = 1$$ ✓.\n- Step 3: The point $$(120, 1)$$ really does lie on the new curve, confirming the $$x$$-coordinate is **divided** by 3.\n\nTakeaway: Always verify a transformation by substituting the image into the new function.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "State the general translation rules for $$y = f(x) + a$$ and $$y = f(x+a)$$.", "answer": "- $$y = f(x) + a$$: translate the graph **up by $$a$$** (and the horizontal asymptote moves up by $$a$$ too).\n- $$y = f(x+a)$$: translate the graph **left by $$a$$** (positive $$a$$ shifts left, the counter-intuitive direction).\n\nMnemonic for $$f(x+a)$$: ask \"what input do I need to get the original output?\" — the answer is $$x = X - a$$, i.e. $$a$$ less ⇒ shifted left.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "When sketching the line $$l$$ that's an asymptote to $$y = \\tan x$$ in the range $$-2\\pi \\le x < 2\\pi$$, and $$l$$ is the rightmost asymptote before $$2\\pi$$, what is its equation?", "answer": "- Step 1: Asymptotes are at odd multiples of $$\\tfrac{\\pi}{2}$$: $$\\pm\\tfrac{\\pi}{2}, \\pm\\tfrac{3\\pi}{2}$$.\n- Step 2: The asymptotes $$<2\\pi$$ from the right are $$\\tfrac{3\\pi}{2} = 1.5\\pi$$ — that's the last one before $$2\\pi$$.\n- Step 3: Equation: $$x = \\dfrac{3\\pi}{2}$$ (a vertical line, so the equation gives the constant $$x$$-value).", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "Why is a quadratic inequality solved by **factoring then reading off the parabola sign**, rather than by, say, the quadratic formula?", "answer": "- Step 1: Once factorised as $$a(x - \\alpha)(x - \\beta) \\lessgtr 0$$, the inequality is determined entirely by the **sign of the product**, which depends only on whether $$x$$ is in or out of $$[\\alpha, \\beta]$$.\n- Step 2: The upward parabola visualisation lets you read the answer instantly: positive outside, negative inside.\n- Step 3: The quadratic formula gives you decimal roots without insight; factoring keeps everything symbolic and the sign analysis is immediate.\n\nAlways factorise if you can; only use the formula as a fallback.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "In the lesson, what's the difference between \"Phuc answered 12\" and the correct answer of 14 in Q4(c)(ii) — what one concept did he miss?", "answer": "- Step 1: Phuc counted only the visible above-axis crossings: 10 ordinary branches + 2 above-axis crossings near $$x = 0$$ and $$x = \\pi$$, $$2\\pi$$ ⇒ 12.\n- Step 2: He missed the **\"odd one out below the axis\"** — the crossing on $$\\left(-\\tfrac{\\pi}{2}, 0\\right)$$ where $$\\tfrac{1}{x}+1 \\to -\\infty$$ meets rising $$\\tan x$$ below the $$x$$-axis.\n- Step 3: Concept missed: a pole inside a $$\\tan$$ branch produces an **extra crossing below the axis** that's invisible if you only scan the \"$$y \\approx 1$$\" region.\n\nTakeaway: Always look below the axis when one curve has a pole inside a shared branch.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "Practice problem: solve $$2x^2 + 3x \\le 5$$. What's the strategy and where do most sign errors creep in? (4 steps)", "answer": "- Step 1: Rearrange to standard order on one side: $$2x^2 + 3x - 5 \\le 0$$.\n- Step 2: Factorise — need product $$2 \\cdot (-5) = -10$$, sum $$+3$$. Pair: $$(+5, -2)$$. Split-the-middle: $$2x^2 + 5x - 2x - 5 = x(2x+5) - 1(2x+5) = (2x+5)(x-1)$$.\n- Step 3: Roots: $$x = -\\tfrac{5}{2}$$, $$x = 1$$. Upward parabola ($$a = 2 > 0$$) ⇒ $$\\le 0$$ **between** the roots.\n- Step 4: Answer: $$-\\tfrac{5}{2} \\le x \\le 1$$. Sign error trap: forgetting to flip from \"outside\" to \"between\" when the inequality is $$\\le 0$$ rather than $$\\ge 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Practice: simplify $$5 + \\dfrac{9 - x^2}{x^2 - 3x}$$.", "answer": "- Step 1: Factorise: $$9 - x^2 = (3-x)(3+x)$$, $$x^2 - 3x = x(x-3)$$.\n- Step 2: Swapped-difference: $$(3-x) = -(x-3)$$ ⇒ $$\\dfrac{(3-x)(3+x)}{x(x-3)} = \\dfrac{-(3+x)}{x}$$.\n- Step 3: Add the 5 with bracket: $$5 - \\dfrac{3+x}{x} = 5 - \\dfrac{3}{x} - 1 = 4 - \\dfrac{3}{x}$$.\n\nAnswer: $$4 - \\dfrac{3}{x}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "Practice: For $$f(x) = \\cos x^\\circ$$ on $$0 \\le x \\le 270$$, find the range of $$p$$ such that $$\\cos x^\\circ = p$$ has exactly two solutions.", "answer": "- Step 1: Monotonic pieces: $$S_1: [0, 180]$$, $$y: 1 \\to -1$$ (falling); $$S_2: [180, 270]$$, $$y: -1 \\to 0$$ (rising).\n- Step 2: Count $$y = p$$ crossings per band:\n+ $$p = 1$$: 1 crossing (at $$x = 0$$).\n+ $$0 < p < 1$$: 1 crossing (on $$S_1$$ only, $$S_2$$ max is 0).\n+ $$p = 0$$: 2 crossings ($$x = 90$$ on $$S_1$$, $$x = 270$$ on $$S_2$$).\n+ $$-1 < p < 0$$: 2 crossings (one each on $$S_1, S_2$$).\n+ $$p = -1$$: 1 crossing (at $$x = 180$$, shared endpoint).\n- Step 3: Answer: $$-1 < p \\le 0$$.\n\nNote: $$p = 0$$ is **included** here (unlike Q5 where it gave 3) — always recount for **your own** domain.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "Practice: $$A, B, C, D$$ in order on a line with $$\\dfrac{AB}{BC} = \\dfrac{1}{4}$$ and $$\\dfrac{BC}{CD} = \\dfrac{2}{3}$$. Find $$\\dfrac{AB}{AD}$$. What's the anchor strategy?", "answer": "- Step 1: $$BC$$ appears in both ratios ⇒ make $$BC$$ the anchor.\n- Step 2: From $$\\tfrac{BC}{CD} = \\tfrac{2}{3}$$, $$BC$$ must be a multiple of 2 for integer $$CD$$. Choose $$BC = 4$$ (also makes $$AB = 1$$ from $$\\tfrac{AB}{BC} = \\tfrac{1}{4}$$). Then $$CD = \\tfrac{3}{2} \\cdot 4 = 6$$.\n- Step 3: $$AD = AB + BC + CD = 1 + 4 + 6 = 11$$.\n\nAnswer: $$\\dfrac{AB}{AD} = \\dfrac{1}{11}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "For a quadratic inequality, why must you keep the **leading coefficient positive** before reading \"outside/inside the roots\"?", "answer": "- Step 1: The rule \"positive outside, negative inside\" applies to **upward-opening** parabolas (positive leading coefficient $$a > 0$$).\n- Step 2: If you have, say, $$-x^2 + 3x + 4 \\ge 0$$, the parabola opens **downward** and the rule **reverses**: positive inside, negative outside.\n- Step 3: To avoid mental sign flips, multiply through by $$-1$$ (flipping the inequality direction!) to get $$x^2 - 3x - 4 \\le 0$$ — then standard rule applies.\n\nTakeaway: Always normalise to positive leading coefficient so one rule works every time.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "What's the qualitative difference between $$\\tan x$$ vs a flat line $$y = c$$, and $$\\tan x$$ vs a curve with a pole (like $$\\tfrac{1}{x} + 1$$), in terms of solution counting?", "answer": "- Step 1: $$\\tan x$$ vs flat line: **one crossing per $$\\pi$$-branch**, simple counting by interval width.\n- Step 2: $$\\tan x$$ vs pole-curve: same **except** on the branch containing the pole, which has **two** crossings (one each side of the pole).\n- Step 3: The pole-branch is the trap — you must identify which $$\\tan$$ branch contains the pole and add the extra crossing.\n\nFor $$\\tfrac{1}{x}+1$$, the pole is at $$x = 0$$, inside the branch $$\\left(-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2}\\right)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "What's the priority Harry sets for exam preparation: topic homework or past papers?", "answer": "**Reflective past-paper practice > topic homework.** For A* aim:\n- Do as much reflective past-paper practice as possible (not just attempting them — **reflecting on mistakes** after).\n- Specifically: the two other P1 past papers Harry already sent take priority over the trig-only problem set.\n- Pure 1 first (foundational for P2/P3), then build on it.\n\nThe reflection step is what converts attempts into learning.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "Edge case: what happens to the $$\\tan x = \\tfrac{1}{x}+1$$ solution count if the interval boundary lands **exactly on an asymptote**?", "answer": "- Step 1: At an asymptote, $$\\tan x$$ is **undefined** — no point on the curve, so no crossing there.\n- Step 2: The branch terminating at that asymptote is **open** at that end, so its single crossing (somewhere in the branch interior) is still counted — but the asymptote itself contributes nothing.\n- Step 3: Similarly, if the boundary is on a **zero** of $$\\tan x$$, you have a point at $$y = 0$$ — whether that's a crossing depends const SK='p1_jun12_graphs_lesson';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
