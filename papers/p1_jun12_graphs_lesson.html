atic Inequalities** |  |  |\n| $$x^2 + 2x - 8 \\ge 0$$ | $$= (x+4)(x-2) \\ge 0$$ | Standard form after rearrangement |\n| $$ax^2 + bx + c$$ | $$= a(x-\\alpha)(x-\\beta)$$ | General factorized form |\n| $$\\alpha + \\beta$$ | $$= -\\frac{b}{a}$$ | Sum of roots formula |\n| $$\\alpha \\beta$$ | $$= \\frac{c}{a}$$ | Product of roots formula |\n| **Trigonometric Graphs** |  |  |\n| $$\\tan x$$ | $$= \\frac{\\sin x}{\\cos x}$$ | Definition of tan |\n| $$\\cos(kx)^\\circ$$ | $$\\text{Period} = \\frac{360^\\circ}{k}$$ | Period rule for cosine |\n| $$\\cos 2x^\\circ$$ | $$\\text{Period} = 180^\\circ$$ | Application of period rule |\n| **Transformations** |  |  |\n| $$f(ax)$$ | $$\\text{Horizontal stretch SF } \\frac{1}{a}$$ | Horizontal stretch rule |\n| $$(x,y)$$ | $$\\to \\left(\\frac{x}{a}, y\\right)$$ | Mapping for horizontal stretch |\n| **Solution Counting** |  |  |\n| $$f(x) = g(x)$$ | $$\\#\\{\\text{solutions}\\} = \\#\\{\\text{intersection points}\\}$$ | Equations as intersections principle |", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}], "count": 20}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "When a geometry problem only asks for a ratio (e.g., $\\frac{QX}{MX}$), what strategy should you use and why? (3 steps)", "answer": "- Step 1: **Assign convenient lengths** to one segment to respect given ratios. Ratios define relative sizes, not absolute lengths, so any valid choice preserves the final ratio.  \n- Step 2: **Choose an anchor quantity** that appears in multiple ratios (e.g., $QX$) and pick a value that avoids fractions (e.g., $QX=2$ ensures $XR=3$ and $PX=12$ are integers).  \n- Step 3: **Calculate derived lengths** (e.g., $PR=PX+XR=15$) and midpoints (e.g., $PM=7.5$) to compute the target ratio (e.g., $MX=4.5$).  \nMnemonic: \"Ratios are scale-free—assign the smallest even value to avoid decimals.\"", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "What is the first step when simplifying $4 + \\frac{4 - x^2}{x^2 - 2x}$, and why does this step work? (2 steps)", "answer": "- Step 1: **Factor numerator and denominator**: $4 - x^2 = (2 - x)(2 + x)$, $x^2 - 2x = x(x - 2)$.  \n- Step 2: **Apply the sign-flip identity**: $(2 - x) = -(x - 2)$, so the numerator becomes $-(x - 2)(x + 2)$, canceling with the denominator ($x(x - 2)$) to leave $-\\frac{(x + 2)}{x}$.  \nMnemonic: Swapped terms in a difference introduce a $-1$ factor.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Before solving a quadratic inequality like $x^2 \\ge 8 - 2x$, what must you do first and why? (2 steps)", "answer": "- Step 1: **Rearrange to standard form**: $x^2 + 2x - 8 \\ge 0$. This ensures the coefficient of $x^2$ is positive, aligning with the upward parabola rule.  \n- Step 2: **Factorize and apply the sign rule**: For an upward parabola, the inequality is satisfied outside the roots ($x \\le -4$ or $x \\ge 2$) because the parabola is positive there.  \nMnemonic: \"Standard order unlocks the happy parabola rule—positive outside, negative inside.\"", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why does the horizontal asymptote of $y = \\frac{1}{x} + 1$ lie at $y = 1$ instead of $y = 0$? (2 steps)", "answer": "- Step 1: **Recognize vertical translation**: Adding 1 shifts the entire graph of $y = \\frac{1}{x}$ upward by 1 unit.  \n- Step 2: **Apply translation to asymptotes**: The horizontal asymptote $y = 0$ moves to $y = 1$, while the vertical asymptote $x = 0$ remains unchanged.  \nMnemonic: Translations move asymptotes—vertical shifts affect horizontal asymptotes, horizontal shifts affect vertical ones.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why is the range of $p$ for exactly two solutions of $\\cos 2x^\\circ = p$ on $0 \\le x \\le 225$ not $-1 < p < 1$? (3 steps)", "answer": "- Step 1: **Split the domain into monotonic pieces**: $[0,90]$, $[90,180]$, $[180,225]$.  \n- Step 2: **Analyze intersections**:  \n  - For $0 < p < 1$, the horizontal line $y = p$ intersects three times (once in each piece).  \n  - For $-1 < p < 0$, it intersects twice (once in $[0,90]$ and once in $[90,180]$).  \n- Step 3: **Special case for $p = 1$**: Only two intersections at $x = 0$ and $x = 180$.  \nMnemonic: \"The curve rises back to $(180,1)$, creating a third intersection for positive $p$.\"", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "When solving $\\tan x = \\frac{1}{x} + 1$ over a large interval like $0 \\le x \\le 40\\pi$, what is the approximate solution count and why? (2 steps)", "answer": "- Step 1: **Identify branch spacing**: $\\tan x$ has vertical asymptotes every $\\pi$ units, creating branches of width $\\pi$.  \n- Step 2: **Apply the one-solution-per-branch rule**: For large $x$, $\\frac{1}{x} + 1 \\approx 1$, a near-horizontal line intersecting each branch once. Total branches = interval width ($40\\pi$) divided by $\\pi$ → **40 solutions**.  \nMnemonic: \"One branch per $\\pi$, one solution per branch.\"", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How does replacing $x$ with $2x$ in $\\cos x^\\circ$ affect its graph and period? (2 steps)", "answer": "- Step 1: **Apply horizontal squashing**: The transformation $(x, y) \\mapsto (\\frac{x}{2}, y)$ compresses the graph toward the $y$-axis by a factor of $2$.  \n- Step 2: **Calculate new period**: Original period $360^\\circ$ becomes $\\frac{360}{2} = 180^\\circ$.  \nMnemonic: \"Replace $x$ with $kx$ to squash by $\\frac{1}{k}$; period halves.\"", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "What is the key mistake students make when simplifying $\\frac{a - b}{b - a}$ and how can it be avoided? (2 steps)", "answer": "- Step 1: **Recognize the sign-flip identity**: $(a - b) = -(b - a)$, so $\\frac{a - b}{b - a} = -1$.  \n- Step 2: **Memorize common forms**: $\\frac{x - y}{y - x} = -1$, $\\frac{P - Q}{Q - P} = -1$.  \nMnemonic: Swapped terms cancel to $-1$, not $1$.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Why is the horizontal asymptote critical when counting solutions to $\\tan x = \\frac{1}{x} + 1$? (2 steps)", "answer": "- Step 1: **Determine asymptotic behavior**: $\\frac{1}{x} + 1 \\to 1$ as $x \\to \\pm\\infty$, creating a near-horizontal line.  \n- Step 2: **Match branches**: The asymptote at $y = 1$ ensures the line intersects every $\\tan x$ branch except where $\\tan x$ has asymptotes. Missing the asymptote leads to incorrect counts.  \nMnemonic: \"The asymptote of the reciprocal function dictates the horizontal reference for intersections.\"", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How should you split the domain of $\\cos 2x^\\circ$ on $0 \\le x \\le 225$ to count intersections with $y = p$? (2 steps)", "answer": "- Step 1: **Identify monotonic segments**: Split into $[0,90]$, $[90,180]$, $[180,225]$ where the curve is strictly falling, rising, or falling.  \n- Step 2: **Count per segment**: For $-1 < p < 0$, two intersections (one in $[0,90]$, one in $[90,180]$); for $0 < p < 1$, three intersections (all three segments).  \nMnemonic: \"Monotonic pieces ensure single-valued crossings—count per segment.\"", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What trick lets you simplify $\\frac{4-x^2}{x^2-2x}$ quickly without fully expanding? (2 steps)", "answer": "- Step 1: Factor both numerator and denominator: $4-x^2 = (2-x)(2+x)$ and $x^2-2x = x(x-2)$.\n- Step 2: Spot that $(2-x)$ and $(x-2)$ contain the same terms in opposite order. Use the identity $a-b = -(b-a)$, so $\\frac{2-x}{x-2} = -1$. This swaps to become $-1$, giving $\\frac{-(2+x)}{x} = -\\frac{2+x}{x}$. The fraction collapses in one move.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "When solving the inequality $x^2 \\ge 8 - 2x$, what's the critical first step before finding roots? (2 steps)", "answer": "- Step 1: Rearrange everything to one side in standard order — $x^2$, then $x$, then constant. So $x^2 \\ge 8-2x$ becomes $x^2 + 2x - 8 \\ge 0$.\n- Step 2: Only then factorise and find roots. This prevents sign errors from out-of-order terms. The classic mistake is trying to read roots from $x^2 \\ge 8 - 2x$ without moving everything left.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "For a quadratic inequality like $x^2 + 2x - 8 \\ge 0$, how do you determine where the expression is positive using the parabola's shape? (2 steps)", "answer": "- Step 1: Identify the coefficient of $x^2$ — here it's $+1 > 0$, so the parabola opens upward (a \"happy\" parabola).\n- Step 2: For an upward-opening parabola with roots $\\alpha < \\beta$, the expression is positive OUTSIDE the roots and negative BETWEEN them. So $x^2 + 2x - 8 \\ge 0$ means $x \\le -4$ or $x \\ge 2$. The mnemonic: \"happy parabola is positive on the outside, negative in the middle.\"", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What does the equation $\\tan x = \\frac{1}{x} + 1$ represent graphically, and why do we solve it by sketching rather than algebraically? (2 steps)", "answer": "- Step 1: Each solution corresponds to an intersection point of $y = \\tan x$ and $y = \\frac{1}{x} + 1$ on the same axes. The number of solutions equals the number of crossings.\n- Step 2: Solving $\\tan x = \\frac{1}{x} + 1$ algebraically is intractable (no closed form), but sketching both graphs lets you count crossings visually. The word \"hence\" in exam questions signals this graphical method is intended.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "For the graph of $y = \\tan x$, what is the pattern of zeros and asymptotes, and how does this help you sketch it quickly? (2 steps)", "answer": "- Step 1: Something interesting happens every $90^\\circ$ (or $\\frac{\\pi}{2}$ radians) — either a zero or a vertical asymptote. Zeros occur at $x = n\\pi$ (where $\\sin x = 0$); asymptotes occur at $x = \\frac{(2n+1)\\pi}{2}$ (where $\\cos x = 0$).\n- Step 2: Between any two consecutive asymptotes (width $\\pi$), the curve rises continuously from $-\\infty$ to $+\\infty$, passing through exactly one zero at the midpoint. This \"one branch per $\\pi$\" rhythm is all you need to place every feature.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Why does a near-horizontal line like $y \\approx 1$ intersect each branch of $\\tan x$ exactly once? (2 steps)", "answer": "- Step 1: On a single branch between consecutive asymptotes (width $\\pi$), $\\tan x$ is a strictly increasing continuous function from $-\\infty$ to $+\\infty$.\n- Step 2: By the Intermediate Value Theorem, any finite horizontal line $y = c$ must cross this branch exactly once. So for a line at $y \\approx 1$, you get exactly one solution per $\\pi$-wide branch — this is the \"one solution per branch\" rule.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "In the interval $-2\\pi \\le x < 2\\pi$, the curve $\\frac{1}{x} + 1$ has an \"odd one out\" crossing below the x-axis that students often miss. Where is it, and why is it different? (2 steps)", "answer": "- Step 1: It's on the branch $(-\\frac{\\pi}{2}, 0)$ — between the asymptotes at $-\\frac{\\pi}{2}$ and $0$.\n- Step 2: Normally each $\\tan x$ branch gives one crossing with the near-horizontal line $y \\approx 1$. But on $(-\\frac{\\pi}{2}, 0)$, the term $\\frac{1}{x} + 1$ has a vertical asymptote at $x = 0$ that makes it dive to $-\\infty$. This branch is cut twice — once below the axis (the \"odd one out\") and once above on $(0, \\frac{\\pi}{2})$. Students counting only the obvious above-axis crossings miss this one.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "What is the horizontal asymptote of $y = \\frac{1}{x} + 1$, and why is this a common mistake? (1 step)", "answer": "- The horizontal asymptote is $y = 1$, not $y = 0$. The $+1$ translates the entire curve upward, moving the horizontal asymptote from $y = 0$ (for $y = \\frac{1}{x}$) up to $y = 1$. The vertical asymptote at $x = 0$ stays unchanged because the translation is vertical, not horizontal.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "For $y = \\cos 2x^\\circ$, how do you derive the transformation from $y = \\cos x^\\circ$? (3 steps)", "answer": "- Step 1: Replacing $x$ with $2x$ gives $f(2x)$. The mapping sends every point $(X, Y)$ on $y = \\cos x^\\circ$ to $(\\frac{X}{2}, Y)$ on $y = \\cos 2x^\\circ$.\n- Step 2: This is a horizontal stretch with scale factor $\\frac{1}{2}$ — every x-coordinate is halved, pulling the curve toward the y-axis. The y-values are unchanged.\n- Step 3: Apply this to key landmarks: $(0,1) \\to (0,1)$, $(90,0) \\to (45,0)$, $(180,-1) \\to (90,-1)$, $(270,0) \\to (135,0)$, $(360,1) \\to (180,1)$. The period shrinks from $360^\\circ$ to $\\frac{360}{2} = 180^\\circ$.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "What's the period of $y = \\cos(kx)^\\circ$, and how do you find it quickly? (1 step)", "answer": "- For $y = \\cos x^\\circ$, the period is $360^\\circ$. Replacing $x$ with $kx$ divides the period by $k$: $\\text{period} = \\frac{360}{k}$ degrees. So $\\cos 2x^\\circ$ has period $180^\\circ$, and $\\cos 3x^\\circ$ has period $120^\\circ$. In radians, use $\\frac{2\\pi}{k}$.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "In the transformation $f(ax)$, what's the scale factor and direction of the horizontal stretch? (1 step)", "answer": "- $f(ax)$ is a horizontal stretch with scale factor $\\frac{1}{a}$. When $a > 1$, this actually squashes the graph toward the y-axis (width halves). The mapping is $(x, y) \\mapsto (\\frac{x}{a}, y)$ — the x-coordinates are divided by $a$. For the opposite stretch $f(\\frac{x}{a})$, the scale factor is $a$ (it widens).", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "When solving $\\cos 2x^\\circ = p$ on $0 \\le x \\le 225^\\circ$, why does the range $-1 < p < 1$ give the wrong number of solutions? (3 steps)", "answer": "- Step 1: The domain $0 \\le x \\le 225^\\circ$ contains three monotonic pieces: $S_1: [0, 90]$ (falling $1 \\to -1$), $S_2: [90, 180]$ (rising $-1 \\to 1$), and $S_3: [180, 225]$ (falling $1 \\to 0$).\n- Step 2: A horizontal line at a generic positive height $0 < p < 1$ crosses all three pieces, giving 3 solutions — not 2.\n- Step 3: Only when $p$ is in the range where $S_3$ doesn't contribute (i.e., $p < 0$) or at the maximum $p = 1$ do you get exactly 2 solutions. So the correct answer is $-1 < p < 0$ or $p = 1$, NOT $-1 < p < 1$.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "To find when $\\cos 2x^\\circ = p$ has exactly two solutions on a given interval, what should you always do first? (2 steps)", "answer": "- Step 1: Split the domain into monotonic pieces — intervals where the curve is strictly increasing or strictly decreasing. Each piece can be crossed by $y = p$ at most once.\n- Step 2: Count how many pieces the horizontal line $y = p$ intersects for different bands of $p$. This avoids missing the \"third intersection\" that occurs when the curve changes direction and then continues in the same vertical range.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In the ratio problem Q1, why is the right angle $\\angle QXR = 90^\\circ$ given but never used in the solution? (1 step)", "answer": "- It's a distractor. The \"assign convenient values\" method solves the problem using only the given ratios — the actual lengths and angles are irrelevant since we're asked for another ratio. The right angle would be needed only if you attacked the problem with Pythagoras or coordinates, but the ratio trick avoids that entirely.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "When simplifying $4 + \\frac{4-x^2}{x^2-2x}$, what is the common mistake with the minus sign when canceling $(2-x)$ against $(x-2)$? (2 steps)", "answer": "- Step 1: After factoring, you have $\\frac{(2-x)(2+x)}{x(x-2)}$. The factors $(2-x)$ and $(x-2) = -(2-x)$ are not identical — they differ by a sign.\n- Step 2: The mistake is canceling them as if they were the same, giving $+1$ instead of $-1$. The correct cancellation is $\\frac{-(x-2)(2+x)}{x(x-2)} = -\\frac{2+x}{x}$, which then distributes to $4 - \\frac{2}{x} - 1 = 3 - \\frac{2}{x}$.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "In Q4(c)(ii), how did Harry count 14 solutions in $-10\\pi \\le x \\le \\frac{5\\pi}{2}$? (3 steps)", "answer": "- Step 1: Count ordinary branches systematically. From $-10\\pi$ up to $-\\frac{\\pi}{2}$, there are 10 complete $\\pi$-wide branches, each giving one crossing.\n- Step 2: The branch $(-\\frac{\\pi}{2}, 0)$ is the \"odd one out\" — the pole at $x = 0$ makes $\\frac{1}{x}+1$ dive to $-\\infty$, giving a crossing below the x-axis that many miss. That's 1 more.\n- Step 3: From $0$ to $\\frac{5\\pi}{2}$, you get the crossing above the axis on $(0, \\frac{\\pi}{2})$, plus the two ordinary branches centered at $\\pi$ and $2\\pi$ — that's 3 more. Total: $10 + 1 + 3 = 14$.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "What's the \"burger method\" for evaluating $\\frac{2}{4.5}$, and when does it simplify ratio calculations? (2 steps)", "answer": "- Step 1: Write $4.5$ as a fraction: $\\frac{2}{\\frac{9}{2}} = 2 \\times \\frac{2}{9} = \\frac{4}{9}$. You \"stack\" the division and flip the bottom fraction — like dividing a burger into half.\n- Step 2: This is useful when your assigned values produce decimal or fractional lengths (like $MX = 4.5$). Instead of working with decimals, convert to fractions first — it keeps the arithmetic cleaner and avoids rounding errors.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "When solving $x^2 + 2x - 8 \\ge 0$, how can you use sum and product of roots to check your factorisation? (2 steps)", "answer": "- Step 1: For $x^2 + 2x - 8$, the coefficient form is $a = 1$, $b = 2$, $c = -8$. The roots $\\alpha, \\beta$ must satisfy $\\alpha + \\beta = -\\frac{b}{a} = -2$ and $\\alpha\\beta = \\frac{c}{a} = -8$.\n- Step 2: Your factorisation $(x - \\alpha)(x - \\beta)$ must give these sums and products. For $(x+4)(x-2)$, the roots are $-4$ and $2$: sum $= -4 + 2 = -2$ ✓, product $= -8$ ✓. This check catches sign errors in the brackets.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "For the transformation $y = \\frac{1}{x} + 1$, which asymptotes move and which stay fixed? (1 step)", "answer": "- The vertical asymptote $x = 0$ stays fixed (unchanged) because the translation is vertical, not horizontal. The horizontal asymptote moves UP by 1 — from $y = 0$ (for $y = \\frac{1}{x}$) to $y = 1$ (for $y = \\frac{1}{x} + 1$). Always re-draw the asymptotes first when sketching translated graphs.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "In the exam question \"giving a reason, state the number of solutions,\" what phrasing scores the method mark? (1 step)", "answer": "- Write exactly: \"There are $N$ solutions because the graph of [curve 1] intersects the graph of [curve 2] $N$ times in the interval given.\" You must name both curves and the interval — the count alone scores zero without this justification.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "What's the fastest way to estimate the number of solutions of $\\tan x = \\frac{1}{x} + 1$ in a large interval like $0 \\le x \\le 40\\pi$? (2 steps)", "answer": "- Step 1: For $x > 0$, $\\frac{1}{x} + 1$ is a near-horizontal line just above $y = 1$, which cuts each $\\pi$-wide $\\tan x$ branch exactly once.\n- Step 2: The interval width is $40\\pi$, which contains $40$ branches. So there are approximately $40$ solutions. This is a quick sanity check against the exact branch-by-branch count.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "In Q5, the point $R$ is given as $(k, 0)$ on the curve $y = \\cos 2x^\\circ$. How do you find $k$ from the pattern of zeros? (2 steps)", "answer": "- Step 1: Zeros of $\\cos 2x^\\circ$ occur when $2x = 90, 270, 450, \\ldots$, i.e., $x = 45, 135, 225, \\ldots$\n- Step 2: Looking at the figure, $R$ is the third zero from the origin, so $k = 225^\\circ$. The initial board answer $270$ was a mistake — that's the next minimum, not an x-intercept.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "When you see a fraction like $\\frac{x-y}{y-x}$, what's the instant simplification without any algebra? (1 step)", "answer": "- It equals $-1$ immediately. The numerator is the negative of the denominator: $x-y = -(y-x)$, so $\\frac{x-y}{y-x} = \\frac{-(y-x)}{y-x} = -1$. Spot this pattern on sight to save time — Harry called this \"spotting a swapped-difference fraction equals $-1$ mentally.\"", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "In a quadratic inequality with $a < 0$ (downward parabola), how does the sign rule reverse? (1 step)", "answer": "- For a downward-opening parabola ($a < 0$) with roots $\\alpha < \\beta$, the expression is positive BETWEEN the roots and negative OUTSIDE. It's the opposite of the upward case: $ax^2 + bx + c > 0$ when $\\alpha < x < \\beta$, and $< 0$ when $x < \\alpha$ or $x > \\beta$. The mnemonic flips: \"sad parabola is negative on the outside.\"", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": true}, {"question": "Why does the question \"exactly two solutions\" for $\\cos 2x^\\circ = p$ on $0 \\le x \\le 225^\\circ$ require careful case analysis, rather than just stating $-1 < p < 1$? (2 steps)", "answer": "- Step 1: The domain includes a complete down-up swing ($0 \\to 90 \\to 180$) PLUS a partial fall ($180 \\to 225$). A generic positive $p$ crosses all three monotonic pieces, giving 3 solutions.\n- Step 2: Only when $p$ is negative (so the line doesn't reach the falling piece $S_3$ which has range $[0, 1]$) or at the maximum $p = 1$ (shared by $S_1$ and $S_2$) do you get exactly 2. This is why $-1 < p < 1$ is too broad — it's the trap Harry highlighted.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "In Q4(a), how do you identify that the labeled asymptote $l$ is $x = \\frac{3\\pi}{2}$? (2 steps)", "answer": "- Step 1: Asymptotes of $\\tan x$ occur at odd multiples of $\\frac{\\pi}{2}$: $x = \\pm\\frac{\\pi}{2}, \\pm\\frac{3\\pi}{2}, \\pm\\frac{5\\pi}{2}, \\ldots$\n- Step 2: The interval shown is $-2\\pi \\le x < 2\\pi$, so the asymptotes are $-\\frac{3\\pi}{2}, -\\frac{\\pi}{2}, \\frac{\\pi}{2}, \\frac{3\\pi}{2}$. The rightmost one in the visible region is $x = \\frac{3\\pi}{2}$, which is labeled $l$ on the board.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "What's the key exam technique when you have \"unused information\" in a multi-step geometry problem? (1 step)", "answer": "- Check what you haven't used yet. Harry said: \"Put a little tick next to them so you can see what you have used and what you haven't.\" The unused given is usually exactly the next step you need. In Q1, the right angle $\\angle QXR = 90^\\circ$ was unused — it's a distractor, but often the unused given IS the next step.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "For the practice question \"exactly two solutions of $\\cos x^\\circ = p$ on $0 \\le x \\le 270$\", what's the answer and why? (3 steps)", "answer": "- Step 1: Split into monotonic pieces: $S_1: [0, 180]$ (falls $1 \\to -1$), $S_2: [180, 270]$ (rises $-1 \\to 0$).\n- Step 2: Count crossings: $p = 1 \\to 1$ solution (only $x = 0$); $0 < p < 1 \\to 1$ (just $S_1$); $p = 0 \\to 2$ ($x = 90, 270$); $-1 < p < 0 \\to 2$ (one on each piece); $p = -1 \\to 1$ ($x = 180$).\n- Step 3: Exactly two solutions when $-1 < p \\le 0$. Note $p = 0$ IS included here — you must recount for each specific domain, not copy answers from similar problems.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In transforming $\\cos x^\\circ$ to $\\cos 3x^\\circ$, what happens to the point $(180, -1)$? (2 steps)", "answer": "- Step 1: The transformation $f(x) \\to f(3x)$ maps every point $(x, y)$ to $(\\frac{x}{3}, y)$.\n- Step 2: The minimum point $(180, -1)$ becomes $(\\frac{180}{3}, -1) = (60, -1)$. Verify: $\\cos(3 \\times 60)^\\circ = \\cos 180^\\circ = -1$ ✓. This confirms the x-coordinate is divided by 3, not multiplied.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "What's the difference between $f(x+a)$ and $f(x) + a$ in terms of graph transformations? (2 steps)", "answer": "- Step 1: $f(x) + a$ is a vertical translation UP by $a$ — every point moves up, and the horizontal asymptote moves with it.\n- Step 2: $f(x + a)$ is a horizontal translation LEFT by $a$ — every point moves left. For $f(x + a)$, the vertical asymptotes shift but the horizontal asymptotes stay fixed (unless there's also a vertical shift).", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "When simplifying algebraic fractions, if after factoring you see $(3-x)$ in the numerator and $(x-3)$ in the denominator, what do you write and why? (1 step)", "answer": "- You write $(3-x) = -(x-3)$, so $\\frac{3-x}{x-3} = -1$. This is the swap-and-flip trick: swapping the order of terms in a difference introduces a minus sign. Then cancel the $-1$ (or keep it if other factors remain), giving the simplified result.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "In the practice problem \"solve $2x^2 + 3x \\le 5$\", what's the first step and why? (2 steps)", "answer": "- Step 1: Rearrange to standard form with everything on one side: $2x^2 + 3x - 5 \\le 0$. This is crucial before attempting to factor.\n- Step 2: Only now factor $2x^2 + 3x - 5$. You need two numbers that multiply to $2 \\times (-5) = -10$ and add to $3$ — these are $+5$ and $-2$. Split the middle term: $2x^2 + 5x - 2x - 5 = (2x+5)(x-1)$.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "For $y = \\tan x$ in the interval $-2\\pi \\le x < 2\\pi$, how many complete branches are there, and what's the total width covered? (1 step)", "answer": "- There are 4 complete branches. The asymptotes at $-\\frac{3\\pi}{2}, -\\frac{\\pi}{2}, \\frac{\\pi}{2}, \\frac{3\\pi}{2}$ create 4 intervals of width $\\pi$: $(-\\frac{3\\pi}{2}, -\\frac{\\pi}{2})$, $(-\\frac{\\pi}{2}, \\frac{\\pi}{2})$, $(\\frac{\\pi}{2}, \\frac{3\\pi}{2})$, $(\\frac{3\\pi}{2}, \\frac{5\\pi}{2})$. Within $-2\\pi \\le x < 2\\pi$, the last branch is cut off, leaving 4 complete branches.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "What's the simplest way to count solutions of $\\tan x = \\frac{1}{x} + 1$ in $0 \\le x \\le 20\\pi$ without sketching every crossing? (2 steps)", "answer": "- Step 1: For $x > 0$, $\\frac{1}{x} + 1$ is a near-horizontal line just above $y = 1$, cutting each $\\pi$-wide $\\tan x$ branch exactly once.\n- Step 2: The interval $0 \\le x \\le 20\\pi$ has width $20\\pi$, i.e., 20 complete branches. Therefore there are exactly 20 solutions. This is a direct application of \"one solution per branch.\"", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "In Q2's simplification $4 + \\frac{4-x^2}{x^2-2x}$, after canceling the sign-flip factor, what common arithmetic error leads to the wrong answer $5 - \\frac{2}{x}$? (2 steps)", "answer": "- Step 1: After getting $-\\frac{2+x}{x}$, you must subtract this from 4: $4 - \\frac{2+x}{x} = 4 - \\frac{2}{x} - \\frac{x}{x} = 4 - \\frac{2}{x} - 1 = 3 - \\frac{2}{x}$.\n- Step 2: The error is forgetting to subtract the $\\frac{x}{x} = 1$ term, giving $4 - \\frac{2}{x} = 5 - \\frac{2}{x}$. This is a deliberate trap — option $5 - \\frac{2}{x}$ is offered as a wrong answer to catch this mistake.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "Why is $\\frac{1}{x} + 1$ drawn as a single continuous curve with a vertical asymptote, rather than two separate branches that don't connect? (1 step)", "answer": "- $\\frac{1}{x} + 1$ is continuous everywhere except at $x = 0$ (the vertical asymptote). For $x > 0$, the branch comes down from $+\\infty$ and approaches $y = 1$ from above. For $x < 0$, the branch comes up from $-\\infty$ and approaches $y = 1$ from below. It's one function with a discontinuity at $x = 0$ — not two unrelated curves.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "In the ratio problem P4 from practice, with $\\frac{AB}{BC} = \\frac{1}{4}$ and $\\frac{BC}{CD} = \\frac{2}{3}$, why do you let $BC = 4$ rather than $BC = 1$? (1 step)", "answer": "- You want all lengths to be integers. With $\\frac{AB}{BC} = \\frac{1}{4}$, if $BC = 1$ then $AB = \\frac{1}{4}$ (not an integer). But if $BC = 4$, then $AB = 1$ cleanly. From $\\frac{BC}{CD} = \\frac{2}{3}$, this gives $CD = \\frac{3}{2} \\times 4 = 6$ (also an integer). The smallest choice that clears denominators everywhere is $BC = 4$.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "When asked for \"the range of possible values of $p$\" given a condition on solutions, why must you consider boundary cases like $p = 1$ separately? (2 steps)", "answer": "- Step 1: The condition \"exactly two solutions\" may be satisfied at a specific value (like $p = 1$ where the line touches at maxima) but not in a whole interval containing it.\n- Step 2: Always test the boundary values explicitly. At $p = 1$, the line $y = 1$ touches the curve at its maximum points — does this count as \"solutions\"? Yes, because equality holds. So $p = 1$ must be included as a separate case in the final answer, giving $-1 < p < 0$ or $p = 1$.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": true}, {"question": "What's the connection between the period of $\\cos(kx)^\\circ$ and the horizontal stretch scale factor? (1 step)", "answer": "- They are reciprocals. The period is $\\frac{360}{k}$, and the horizontal stretch scale factor is $\\frac{1}{k}$. For $\\cos 2x^\\circ$: period $180^\\circ$, scale factor $\\frac{1}{2}$. The x-coordinates get divided by $k$, so the curve repeats after $\\frac{360}{k}$ instead of $360$.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": true}], "count": 39}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "In the ratio problem, what's the \"burger method\" for computing $\\frac{QX}{MX} = \\frac{2}{4.5}$? (Q1)", "answer": "- Step 1: Recognize $4.5 = \\frac{9}{2}$, so you have $\\frac{2}{9/2}$.\n- Step 2: Stack the division as a multiplication: $\\frac{2}{1} \\times \\frac{2}{9} = \\frac{4}{9}$.\n- Step 3: This is equivalent to $2 \\div 4.5$ but avoids decimal errors — keep everything as fractions.\n\n**Takeaway:** The \"burger\" (or \"keep-change-flip\") method converts division of fractions into multiplication, keeping numerators on top and denominators on bottom.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "For the algebraic simplification $4+\\frac{4-x^2}{x^2-2x}$, what is the key recognition that leads to the cancellation? (Q2)", "answer": "- Step 1: Factor both numerator and denominator: $4-x^2 = (2-x)(2+x)$ and $x^2-2x = x(x-2)$.\n- Step 2: Look for a factor in the numerator that is the SAME as a denominator factor but with terms in OPPOSITE order — here $(2-x)$ vs $(x-2)$.\n- Step 3: Apply the identity $a-b = -(b-a)$, so $(2-x) = -(x-2)$.\n- Step 4: The $(x-2)$ factors cancel, leaving a $-1$ factor: $\\frac{-(x-2)(2+x)}{x(x-2)} = \\frac{-(2+x)}{x}$.\n\n**Takeaway:** Always scan for \"swapped-difference\" pairs — they're worth $-1$, not $+1$.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "What is the instant mental shortcut for $\\frac{x-y}{y-x}$ or $\\frac{p-q}{q-p}$ without writing out the factorization? (Q2)", "answer": "- Step 1: Recognize the pattern: numerator is exactly the negative of the denominator.\n- Step 2: By the identity $(a-b) = -(b-a)$, the ratio equals $-1$ immediately.\n- Step 3: No factoring needed — just spot the swap and write $-1$.\n\n**Takeaway:** This saves precious exam time — \"spot it mentally\" rather than factoring each time.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "In the quadratic inequality $x^2 \\ge 8-2x$, why must you rearrange BEFORE finding roots? (Q3)", "answer": "- Step 1: The inequality must be in standard form ($x^2$, then $x$, then constant) before reading off roots.\n- Step 2: Rearrange: $x^2 \\ge 8-2x \\Rightarrow x^2 + 2x - 8 \\ge 0$.\n- Step 3: If you skip this and try to read roots from $x^2 \\ge 8-2x$ directly, you'll get incorrect signs and pick the wrong answer option.\n- Step 4: Only after standard-order rearrangement can you factor correctly as $(x+4)(x-2) \\ge 0$.\n\n**Takeaway:** Standard order ensures the sum/product method works correctly — out-of-order terms flip signs.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "For an upward-opening quadratic $x^2+2x-8 \\ge 0$, how do you read the solution from the parabola sign? (Q3)", "answer": "- Step 1: The coefficient of $x^2$ is positive (+1), so the parabola opens upward.\n- Step 2: For upward parabolas: the graph is POSITIVE outside the roots and NEGATIVE between the roots.\n- Step 3: Roots are $x = -4$ and $x = 2$ (from $(x+4)(x-2)$).\n- Step 4: Therefore $x^2+2x-8 \\ge 0$ means $x \\le -4$ OR $x \\ge 2$.\n\n**Takeaway:** Mnemonic: \"A happy (upward) parabola is positive on the outside, negative in the middle.\"", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "How do you use the sum/product method to check your factorisation of $x^2+2x-8$? (Q3)", "answer": "- Step 1: For $x^2 + bx + c$, the roots $\\alpha, \\beta$ satisfy $\\alpha + \\beta = -b$ and $\\alpha\\beta = c$.\n- Step 2: Here $b = 2$, $c = -8$, so we need roots summing to $-2$ and multiplying to $-8$.\n- Step 3: Test $(+4, -2)$: product = $-8$ ✓, sum = $+2$ ✗ (wrong sign). Test $(-4, +2)$: product = $-8$ ✓, sum = $-2$ ✓.\n- Step 4: Confirm the factorisation is $(x+4)(x-2)$.\n\n**Takeaway:** Use sum/product as a CHECK on your factorisation — it catches sign errors.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "What does it mean graphically when we say \"solutions of $f(x) = g(x)$\"? (Q4)", "answer": "- Step 1: A solution $x = a$ means $f(a) = g(a)$ — the curves have the same height at $x = a$.\n- Step 2: Geometrically, this is a point where the two graphs CROSS or INTERSECT.\n- Step 3: Therefore: $\\#$solutions = $\\#$intersection points.\n- Step 4: This is why Harry said \"solve graphically, never algebraically\" — sketch both curves and count crossings.\n\n**Takeaway:** The word \"hence\" in a question is a clue — they want you to draw the graphs to find intersections.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "For $y = \\tan x$, what \"interesting things\" happen every $\\frac{\\pi}{2}$ radians? (Q4)", "answer": "- Step 1: At $x = n\\pi$ (every $\\pi$), $\\tan x = 0$ — these are the zeros.\n- Step 2: At $x = \\frac{(2n+1)\\pi}{2}$ (odd multiples of $\\frac{\\pi}{2}$), $\\cos x = 0$ so $\\tan x$ is undefined — these are the vertical asymptotes.\n- Step 3: So every $\\frac{\\pi}{2}$ you either hit a zero or an asymptote — this rhythm lets you sketch $\\tan x$ quickly.\n- Step 4: The period is $\\pi$ — the pattern repeats every $\\pi$ radians.\n\n**Takeaway:** \"Something interesting every 90°\" — zeros and asymptotes alternate.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "For $y = \\frac{1}{x} + 1$, what are its asymptotes and why is this a common mistake? (Q4)", "answer": "- Step 1: This is $y = \\frac{1}{x}$ translated UP by 1 unit.\n- Step 2: The vertical asymptote $x = 0$ is UNCHANGED (we moved up, not sideways).\n- Step 3: The horizontal asymptote $y = 0$ MOVES UP to $y = 1$ — this is the common error.\n- Step 4: For $x > 0$, the curve sits just above $y = 1$ and decreases toward it; for $x < 0$, it comes up from below and approaches $y = 1$ from underneath.\n\n**Takeaway:** Vertical shifts move the horizontal asymptote WITH the curve — always redraw asymptotes after a translation.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Why does a near-horizontal line $y = c$ intersect each branch of $\\tan x$ exactly once? (Q4)", "answer": "- Step 1: On a single branch (between two adjacent asymptotes, width $\\pi$), $\\tan x$ rises continuously from $-\\infty$ to $+\\infty$.\n- Step 2: By the Intermediate Value Theorem, any finite horizontal line $y = c$ must be crossed exactly once — the function passes through every value.\n- Step 3: This means: one solution per $\\pi$-wide branch for a near-flat line.\n- Step 4: For $\\tan x = \\frac{1}{x} + 1$, as $x$ gets large, $\\frac{1}{x} + 1 \\approx 1$, so the line $y \\approx 1$ cuts each branch once.\n\n**Takeaway:** This is the fast counting method: solutions ≈ (interval width) ÷ $\\pi$.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "In the interval $-2\\pi \\le x < 2\\pi$, why does $\\tan x = \\frac{1}{x} + 1$ have 4 solutions, and what's the \"odd one out\"? (Q4)", "answer": "- Step 1: Count the $\\pi$-wide branches: from $-2\\pi$ to $2\\pi$ spans 4 branches.\n- Step 2: However, the branch containing $x = 0$ is special — at $x = 0$, $\\frac{1}{x} + 1$ has a pole (shoots to $\\pm\\infty$).\n- Step 3: This branch actually contains TWO crossings: one on $(-\\frac{\\pi}{2}, 0)$ BELOW the axis, and one on $(0, \\frac{\\pi}{2})$ ABOVE the axis.\n- Step 4: The other 3 branches each give 1 crossing — total $3 + 2 = 5$? Wait — the endpoints at $-2\\pi$ and $2\\pi$ are zeros of $\\tan x$, not asymptotes, so we count carefully: actually 4 total.\n\n**Takeaway:** The \"odd one out below the axis\" is the crossing on $(-\\frac{\\pi}{2}, 0)$ — easy to miss if you only look above the axis.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "How do you count solutions of $\\tan x = \\frac{1}{x} + 1$ in a large interval like $0 \\le x \\le 40\\pi$? (Q4)", "answer": "- Step 1: For $x > 0$, $\\frac{1}{x} + 1$ is always $> 1$, so it's a near-horizontal line above $y = 1$.\n- Step 2: It cuts each $\\pi$-wide branch of $\\tan x$ exactly once.\n- Step 3: The interval $0 \\le x \\le 40\\pi$ has width $40\\pi$, which contains exactly 40 branches.\n- Step 4: Therefore there are 40 solutions — one per branch.\n\n**Takeaway:** Fast count: interval width ÷ $\\pi$ = number of branches ≈ number of solutions.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "In $-10\\pi \\le x \\le \\frac{5\\pi}{2}$, how did Harry group the 14 solutions? (Q4)", "answer": "- Step 1: First group: from $-10\\pi$ to $-\\frac{\\pi}{2}$ — ten ordinary branches, each cut once = 10 solutions.\n- Step 2: Second group: the \"odd one out\" on $(-\\frac{\\pi}{2}, 0)$ below the axis = 1 solution (the pole-side crossing).\n- Step 3: Third group: from $0$ to $\\frac{5\\pi}{2}$ — the crossing on $(0, \\frac{\\pi}{2})$ above the axis, plus the branches centered at $\\pi$ and $2\\pi$ = 3 solutions.\n- Step 4: Total: $10 + 1 + 3 = 14$.\n\n**Takeaway:** Always check the branch containing the pole ($x = 0$) separately — it can have two crossings.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "For $f(x) = \\cos 2x^\\circ$, what transformation maps $\\cos x^\\circ$ to $\\cos 2x^\\circ$, and what's the point mapping? (Q5)", "answer": "- Step 1: Replacing $x$ with $2x$ means $f(ax)$ with $a = 2$.\n- Step 2: This is a horizontal stretch with scale factor $\\frac{1}{a} = \\frac{1}{2}$ — the curve is squashed toward the y-axis.\n- Step 3: The mapping is $(x, y) \\mapsto (\\frac{x}{a}, y)$ — every $x$-coordinate is divided by $a$, $y$ stays the same.\n- Step 4: Example: $(0,1) \\to (0,1)$, $(90,0) \\to (45,0)$, $(180,-1) \\to (90,-1)$, $(360,1) \\to (180,1)$.\n\n**Takeaway:** $f(ax)$: $x$-coordinates divide by $a$ — this is why it becomes narrower.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "What is the period of $\\cos 2x^\\circ$, and how do you derive it from the period rule? (Q5)", "answer": "- Step 1: $\\cos x^\\circ$ has period $360^\\circ$.\n- Step 2: For $\\cos(kx)^\\circ$, the period is $\\frac{360}{k}$ degrees (or $\\frac{2\\pi}{k}$ in radians).\n- Step 3: Here $k = 2$, so period $= \\frac{360}{2} = 180^\\circ$.\n- Step 4: This matches the mapping: the distance from max to max shrinks from $360$ to $180$.\n\n**Takeaway:** The horizontal compression divides the period — $k$ goes in the denominator.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "For the curve $y = \\cos 2x^\\circ$ on $0 \\le x \\le 225^\\circ$, what are the monotonic pieces and why does this matter for counting solutions of $\\cos 2x^\\circ = p$? (Q5)", "answer": "- Step 1: The curve changes direction at $x = 90^\\circ$ (minimum) and $x = 180^\\circ$ (maximum).\n- Step 2: Split into monotonic pieces:\n  - $S_1$: $x \\in [0, 90]$, $y$ falls $1 \\to -1$\n  - $S_2$: $x \\in [90, 180]$, $y$ rises $-1 \\to 1$\n  - $S_3$: $x \\in [180, 225]$, $y$ falls $1 \\to 0$\n- Step 3: A horizontal line $y = p$ must be counted against EACH piece separately.\n- Step 4: For $0 < p < 1$, the line hits all three pieces = 3 solutions, not 2.\n\n**Takeaway:** Non-monotonic curves need splitting — count intersections piece by piece.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Why is the answer for \"exactly two solutions\" of $\\cos 2x^\\circ = p$ on $0 \\le x \\le 225^\\circ$ NOT $-1 < p < 1$? (Q5 — key trap)", "answer": "- Step 1: The tempting answer $-1 < p < 1$ would be correct for a single monotonic piece, but here we have THREE pieces ($S_1, S_2, S_3$).\n- Step 2: For $0 < p < 1$: $S_1$ gives 1 solution (falling), $S_2$ gives 1 (rising), $S_3$ gives 1 (falling, since $S_3$ ranges from 1 down to 0) — total 3 solutions.\n- Step 3: For $p = 0$: solutions at $x = 45^\\circ, 135^\\circ, 225^\\circ$ — three solutions.\n- Step 4: Only $-1 < p < 0$ (where $S_3$ doesn't reach) or $p = 1$ (shared at $x = 0$ and $x = 180$) give exactly 2 solutions.\n\n**Takeaway:** The extra piece $S_3$ (falling from max to $y = 0$) adds a third intersection for all positive $p < 1$.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": true}, {"question": "What is the coordinate of point $Q$ on $y = \\cos 2x^\\circ$, and how do you find it? (Q5)", "answer": "- Step 1: $Q$ is the minimum point shown on the graph.\n- Step 2: $\\cos \\theta = -1$ when $\\theta = 180^\\circ$ (in degrees).\n- Step 3: Here $\\cos 2x^\\circ = -1 \\Rightarrow 2x = 180 \\Rightarrow x = 90^\\circ$.\n- Step 4: Therefore $Q = (90^\\circ, -1)$.\n\n**Takeaway:** Find where the cosine reaches its minimum value (-1), then solve for $x$.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "How do you find $k$ given that $R(k, 0)$ is an x-intercept of $y = \\cos 2x^\\circ$ on the sketch? (Q5)", "answer": "- Step 1: Zeros of $\\cos 2x^\\circ$ occur when $2x = 90, 270, 450, \\dots$\n- Step 2: Solving: $x = 45, 135, 225, \\dots$\n- Step 3: From the sketch, $R$ is the third zero from the origin (after $45^\\circ$ and $135^\\circ$).\n- Step 4: Therefore $k = 225^\\circ$.\n\n**Takeaway:** Count the zeros from the origin — $R$ is the third one at $225^\\circ$.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "In a \"state the number of solutions\" question requiring a reason, what phrasing scores the mark? (Exam technique)", "answer": "- Step 1: The count alone is NOT enough — you need justification.\n- Step 2: The mark-winning sentence is: \"There are $N$ solutions because the graph of [curve 1] intersects the graph of [curve 2] $N$ times in the interval given.\"\n- Step 3: You must name BOTH curves and state the interval.\n- Step 4: Example: \"There are 4 solutions because the graph of $y = \\tan x$ intersects the graph of $y = \\frac{1}{x} + 1$ four times in $-2\\pi \\le x < 2\\pi$.\"\n\n**Takeaway:** \"State a reason\" demands the intersection justification — name both graphs and the interval.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "When solving $\\tan x = \\frac{1}{x} + 1$, what is the first thing you should sketch, and what asymptotes should you mark? (Q4 method)", "answer": "- Step 1: First draw $y = \\tan x$ with its asymptotes at $x = \\pm\\frac{\\pi}{2}, \\pm\\frac{3\\pi}{2}, \\dots$ (odd multiples of $\\frac{\\pi}{2}$).\n- Step 2: Mark the zeros at $x = \\dots, -2\\pi, -\\pi, 0, \\pi, 2\\pi, \\dots$\n- Step 3: Then sketch $y = \\frac{1}{x} + 1$ on top: vertical asymptote $x = 0$, horizontal asymptote $y = 1$, branches in Q1 and Q3.\n- Step 4: Count where they cross — the sketch is your solution method.\n\n**Takeaway:** Get asymptotes right FIRST — they're the骨架 of the graph.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "What's the difference between $f(ax)$ and $f\\left(\\frac{x}{a}\\right)$ in terms of horizontal stretch? (Transformation)", "answer": "- Step 1: $f(ax)$: horizontal stretch with scale factor $\\frac{1}{a}$ — if $a > 1$, this is a SQUASH (curve gets narrower).\n- Step 2: $f\\left(\\frac{x}{a}\\right)$: horizontal stretch with scale factor $a$ — if $a > 1$, this is a WIDEN (curve gets wider).\n- Step 3: Remember: the $x$-coordinate is divided by $a$ in $f(ax)$, multiplied by $a$ in $f(x/a)$.\n- Step 4: Mnemonic: \"ax compresses, x/a expands.\"\n\n**Takeaway:** The $a$ goes in the denominator of the scale factor for $f(ax)$.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "For the quadratic inequality $x^2 \\ge 8 - 2x$, what is the first formula you should write down before substituting any numbers? (Q3 — trigger phrase)", "answer": "- Step 1: The trigger phrase is \"inequality\" — your first action must be rearrangement.\n- Step 2: Write: $x^2 + 2x - 8 \\ge 0$ (everything on one side, in $x^2, x, \\text{constant}$ order).\n- Step 3: Only NOW factor: $(x+4)(x-2) \\ge 0$.\n- Step 4: Then apply the sign rule for upward parabola.\n\n**Takeaway:** Never factor an inequality before rearranging to standard form — the order matters.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In the ratio problem Q1, why is the right angle $\\angle QXR = 90^\\circ$ a distractor? (Q1)", "answer": "- Step 1: The question only asks for a ratio $\\frac{QX}{MX}$ — no actual angles or Pythagorean lengths are needed.\n- Step 2: The $90^\\circ$ would be relevant if you were solving for actual side lengths using coordinates or trigonometry.\n- Step 3: But since we can assign arbitrary convenient lengths to solve ratios, the right angle is never used.\n- Step 4: Harry's advice: \"Tick off what you've used\" — the $90^\\circ$ is unused, so ignore it.\n\n**Takeaway:** In ratio-only questions, ignore geometric information that doesn't affect the ratios.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "When simplifying $4 + \\frac{4-x^2}{x^2-2x}$, what is the common trap that gives the wrong answer $5 - \\frac{2}{x}$? (Q2)", "answer": "- Step 1: After cancelling, you get $4 - \\frac{2+x}{x}$.\n- Step 2: The trap is to write $4 - \\frac{2}{x} + \\frac{x}{x}$ (keeping the plus from the numerator).\n- Step 3: This incorrectly gives $4 - \\frac{2}{x} + 1 = 5 - \\frac{2}{x}$.\n- Step 4: The correct step is $4 - \\frac{2}{x} - \\frac{x}{x} = 4 - \\frac{2}{x} - 1 = 3 - \\frac{2}{x}$.\n\n**Takeaway:** The minus sign must distribute over BOTH terms in $(2+x)$, not just the first.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "How do you verify that your answer $\\frac{QX}{MX} = \\frac{4}{9}$ is correct in Q1 without knowing the actual diagram? (Q1)", "answer": "- Step 1: The ratio should be independent of your chosen convenient value — that's the whole point.\n- Step 2: If you chose $QX = 1$ instead: $PX = 6$, $XR = 1.5$, $PR = 7.5$, $PM = 3.75$, $MX = 6 - 3.75 = 2.25$.\n- Step 3: Then $\\frac{QX}{MX} = \\frac{1}{2.25} = \\frac{1}{9/4} = \\frac{4}{9}$ — same answer!\n- Step 4: This verifies your method is correct — any valid anchor gives the same final ratio.\n\n**Takeaway:** The \"correct by construction\" test: try a different convenient value and see if you get the same ratio.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "In the sum/product method for $ax^2 + bx + c$, what are the formulas for the roots $\\alpha, \\beta$? (Q3)", "answer": "- Step 1: If $ax^2 + bx + c = a(x - \\alpha)(x - \\beta)$, then expanding gives $x^2 - (\\alpha + \\beta)x + \\alpha\\beta$.\n- Step 2: Comparing coefficients: $\\alpha + \\beta = -\\frac{b}{a}$ and $\\alpha\\beta = \\frac{c}{a}$.\n- Step 3: For $x^2 + 2x - 8$: $a = 1$, $b = 2$, $c = -8$, so $\\alpha + \\beta = -2$, $\\alpha\\beta = -8$.\n- Step 4: Find $\\alpha, \\beta$ that satisfy these — then verify by checking the sum and product.\n\n**Takeaway:** Sum/product is a verification tool, not a primary solving method — use it to check factorizations.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "For $\\cos 2x^\\circ = p$ on $0 \\le x \\le 225^\\circ$, what are the solution counts for $p = 1$, $p = 0$, and $p = -1$? (Q5)", "answer": "- Step 1: For $p = 1$: solutions at $x = 0$ (max) and $x = 180$ (max) — but these share the point at $x = 180$? No, $x = 0$ and $x = 180$ are distinct, so 2 solutions.\n- Step 2: For $p = 0$: solutions at $x = 45^\\circ$ (zero), $x = 135^\\circ$ (zero), $x = 225^\\circ$ (zero) — 3 solutions.\n- Step 3: For $p = -1$: solution at $x = 90^\\circ$ (minimum) — only 1 solution (the minimum point).\n- Step 4: Only $p = 1$ and $-1 < p < 0$ give exactly 2 solutions.\n\n**Takeaway:** Edge cases ($p = \\pm 1$, $p = 0$) need individual checking — don't assume.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "What's the mental model for why $f(ax)$ gives a horizontal stretch of scale factor $\\frac{1}{a}$? (Transformation derivation)", "answer": "- Step 1: Consider point $(X, Y)$ on $y = f(x)$, so $Y = f(X)$.\n- Step 2: On $y = f(ax)$, we need input $x$ such that $ax = X$, i.e., $x = \\frac{X}{a}$.\n- Step 3: Then $f(ax) = f(X) = Y$, so the point is $(\\frac{X}{a}, Y)$.\n- Step 4: Every $x$-coordinate is divided by $a$ — by definition, this is a horizontal stretch with scale factor $\\frac{1}{a}$.\n\n**Takeaway:** The derivation shows WHY the stretch works — $x$-coordinates are divided, $y$-coordinates stay.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "In the quadratic inequality method, why should you keep the leading coefficient positive? (Q3)", "answer": "- Step 1: The rule \"outside roots = positive, inside = negative\" applies directly to upward parabolas ($a > 0$).\n- Step 2: If $a < 0$ (downward parabola), the rule is reversed: inside = positive, outside = negative.\n- Step 3: By rearranging so $a > 0$, you avoid sign confusion — you always know \"outside is positive.\"\n- Step 4: If you start with $a < 0$, multiply the inequality by $-1$ (flipping the inequality sign) to make $a > 0$.\n\n**Takeaway:** Standardize to $a > 0$ first — then the sign rule is always \"outside positive.\"", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "How do you handle the branch of $\\tan x$ containing $x = 0$ when counting intersections with $y = \\frac{1}{x} + 1$? (Q4 — special case)", "answer": "- Step 1: At $x = 0$, $\\frac{1}{x} + 1$ has a vertical asymptote (pole) — it goes to $+\\infty$ from the right and $-\\infty$ from the left.\n- Step 2: On $(-\\frac{\\pi}{2}, 0)$: $\\tan x$ rises from $-\\infty$ to $0$, while $\\frac{1}{x} + 1$ falls from $-1$ to $-\\infty$ — they cross BELOW the $x$-axis.\n- Step 3: On $(0, \\frac{\\pi}{2})$: $\\tan x$ rises from $0$ to $+\\infty$, while $\\frac{1}{x} + 1$ falls from $+\\infty$ to $1$ — they cross ABOVE the $x$-axis.\n- Step 4: This branch gives TWO crossings, not one — the \"odd one out below the axis.\"\n\n**Takeaway:** Always check the pole-containing branch separately — it can have two intersections.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "What is the horizontal asymptote of $y = \\frac{1}{x} + 1$, and why does it matter for intersections with $\\tan x$? (Q4)", "answer": "- Step 1: The horizontal asymptote is $y = 1$ (moved up from $y = 0$ by the $+1$ translation).\n- Step 2: This matters because $\\tan x$ crosses $y = 1$ exactly once per branch (at the midpoint of each branch).\n- Step 3: For large $x$, $\\frac{1}{x} + 1 \\to 1$ from above, so it cuts slightly above the midpoint of each $\\tan$ branch.\n- Step 4: If you incorrectly place the asymptote at $y = 0$, you completely miscount the intersections.\n\n**Takeaway:** The horizontal asymptote position determines where intersections occur — draw it correctly first.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "For the transformation $y = \\cos x^\\circ \\to y = \\cos 2x^\\circ$, what happens to the key points? (Q5)", "answer": "- Step 1: Apply $(x, y) \\mapsto (x/2, y)$ to each landmark of $\\cos x^\\circ$:\n  - $(0, 1) \\to (0, 1)$\n  - $(90, 0) \\to (45, 0)$\n  - $(180, -1) \\to (90, -1)$\n  - $(270, 0) \\to (135, 0)$\n  - $(360, 1) \\to (180, 1)$\n- Step 2: This creates the compressed curve with period $180^\\circ$.\n- Step 3: The maximum-to-minimum distance halves from $180^\\circ$ to $90^\\circ$.\n- Step 4: The domain shown in the question ends at the third zero ($225^\\circ$), not a full period.\n\n**Takeaway:** Build $\\cos 2x^\\circ$ point-by-point from $\\cos x^\\circ$ using the mapping.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "In a solution-counting problem, what should you do if the curve is not monotonic over the entire interval? (Q5 — method)", "answer": "- Step 1: Identify points where the curve changes direction (maxima, minima, zeros that split monotonic segments).\n- Step 2: Split the interval into monotonic pieces where the function is entirely increasing or entirely decreasing.\n- Step 3: Count how many times the horizontal line $y = p$ intersects EACH piece.\n- Step 4: Add up the counts from all pieces for the total number of solutions.\n\n**Takeaway:** \"Split into monotonic pieces\" — this is the key to avoiding the trap of overcounting.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": true}, {"question": "What is the period of $\\tan x$ in degrees, and how does this help you quickly place its features? (Q4)", "answer": "- Step 1: The period of $\\tan x$ is $180^\\circ$ (or $\\pi$ radians).\n- Step 2: This means the pattern of zero → asymptote → zero → asymptote repeats every $180^\\circ$.\n- Step 3: Starting from $x = 0$ (zero): at $90^\\circ$ is asymptote, at $180^\\circ$ is zero, at $270^\\circ$ is asymptote, etc.\n- Step 4: So you can sketch the entire graph by alternating zeros and asymptotes every $90^\\circ$.\n\n**Takeaway:** Period $180^\\circ$ = half the period of sine/cosine — features are twice as frequent.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "For $f(x) = \\cos 2x^\\circ$ on $0 \\le x \\le 225^\\circ$, why does $p = 0$ give 3 solutions? (Q5)", "answer": "- Step 1: $y = 0$ is a horizontal line at the x-axis.\n- Step 2: On $S_1$ ($0 \\le x \\le 90$): the curve crosses from positive to negative, hitting $y = 0$ once at $x = 45$.\n- Step 3: On $S_2$ ($90 \\le x \\le 180$): the curve crosses from negative to positive, hitting $y = 0$ once at $x = 135$.\n- Step 4: On $S_3$ ($180 \\le x \\le 225$): the curve is positive (from 1 down to 0), hitting $y = 0$ at the endpoint $x = 225$. Total: 3 solutions.\n\n**Takeaway:** The endpoint at $R(225, 0)$ counts as a solution — boundaries always count unless excluded.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "What should you check FIRST when asked to \"sketch $y = \\frac{1}{x} + 1$\"? (Q4)", "answer": "- Step 1: Identify it as a translation of $y = \\frac{1}{x}$ — the $+1$ means shift UP by 1.\n- Step 2: Mark the vertical asymptote at $x = 0$ (unchanged from $y = \\frac{1}{x}$).\n- Step 3: Mark the horizontal asymptote at $y = 1$ (moved up from $y = 0$).\n- Step 4: Then sketch the two branches: Q1 branch (positive, above $y = 1$) and Q3 branch (negative, below $y = 1$).\n\n**Takeaway:** Asymptotes first — they define the skeleton of your sketch.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "In the ratio problem, why did Harry choose $QX = 2$ rather than $QX = 1$? (Q1)", "answer": "- Step 1: From $\\frac{QX}{PX} = \\frac16$, we get $PX = 6 \\cdot QX$.\n- Step 2: From $\\frac{QX}{XR} = \\frac23$, we get $XR = \\frac32 \\cdot QX$.\n- Step 3: If $QX = 1$: $PX = 6$, $XR = 1.5$ (messy decimal).\n- Step 4: If $QX = 2$: $PX = 12$, $XR = 3$ (both integers) — cleaner to work with.\n- Step 5: Either works, but even numbers avoid fractions.\n\n**Takeaway:** Choose an anchor that makes all derived lengths integers — simplest is best.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "What's the key difference in counting solutions for $\\tan x = \\frac{1}{x} + 1$ in $0 \\le x \\le 40\\pi$ versus $-10\\pi \\le x \\le \\frac{5\\pi}{2}$? (Q4)", "answer": "- Step 1: $0 \\le x \\le 40\\pi$: all branches are \"ordinary\" — no poles, so exactly 1 solution per branch = 40.\n- Step 2: $-10\\pi \\le x \\le \\frac{5\\pi}{2}$: contains the pole at $x = 0$, so one branch has 2 solutions.\n- Step 3: Also has partial branches at the boundaries (starting at $-10\\pi$ which is a zero, ending at $\\frac{5\\pi}{2}$ which cuts through a branch).\n- Step 4: Must count carefully: 10 ordinary + 1 (odd one out) + 3 partial = 14.\n\n**Takeaway:** Big intervals without poles → simple width ÷ $\\pi$. Intervals with poles → count branches explicitly.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": true}], "count": 39}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "When a question gives you ratios between lengths (e.g. $$\\frac{QX}{PX}=\\frac{1}{6}$$) and asks for another ratio, what's the powerful first move that bypasses algebra entirely?", "answer": "Assign convenient numerical values to the lengths. Since a ratio only fixes *relative* sizes, the actual lengths are free — you can invent integer values that respect every given ratio, and the final ratio you compute is independent of your choice. This kills all the scaling factors and the algebra that would otherwise come with carrying $$6X$$, $$\\tfrac{3}{2}X$$, etc.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "In the assign-a-value trick for ratio problems, how do you choose *which* length to anchor and what value to give it? (2 steps)", "answer": "- Step 1: Pick the quantity that appears in **multiple** given ratios as your anchor (e.g. $$QX$$ appears in both $$\\frac{QX}{PX}=\\frac{1}{6}$$ and $$\\frac{QX}{XR}=\\frac{2}{3}$$).\n- Step 2: Choose the **smallest value** that makes *all* derived lengths come out as nice integers.\n+ For $$QX$$ anchor: $$PX=6\\,QX$$ and $$XR=\\tfrac{3}{2}\\,QX$$ — so $$QX$$ must be even.\n+ $$QX=2$$ gives $$PX=12$$, $$XR=3$$ (clean); $$QX=1$$ would force $$XR=1.5$$ (legal but messier).\n\nTakeaway: anchor on the shared variable, scale so all others are integers.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "In the Q1 triangle problem, the question states $$\\angle QXR = 90°$$. Why is this information a distractor for the ratio method?", "answer": "The right angle is only needed if you attack the problem with Pythagoras or coordinates. The ratio-substitution method computes $$\\frac{QX}{MX}$$ purely from the linear relationships along $$PR$$, so the angle plays no role. Recognising distractors keeps you from over-complicating a one-mark MCQ.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "What is the \"burger method\" trick for dividing by a fraction, and why does the order matter? (P1 Q1)", "answer": "Stack the division like a burger: $$\\frac{2}{\\,9/2\\,}$$, then flip the bottom to get $$\\frac{2}{1}\\times\\frac{2}{9}=\\frac{4}{9}$$. The key discipline: numerator-times-numerator goes on the **top**, denominator-times-denominator on the **bottom** — easy to flip upside-down under exam pressure. Harry's live correction was \"two times two goes on the *top*\".", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "What's the trigger phrase / pattern in an algebraic fraction that should immediately make you think \"this cancels to $$-1$$\"?", "answer": "Whenever you see a numerator factor and a denominator factor that contain the **same two terms but in opposite order** — like $$\\frac{2-x}{x-2}$$ or $$\\frac{a-b}{b-a}$$ — they cancel to $$-1$$. This uses the identity $$a-b=-(b-a)$$. Spot it on sight (don't re-factor each time) — Harry: \"it would speed you up a great deal.\"", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "When simplifying $$\\frac{4-x^2}{x^2-2x}$$, what specific cancellation strategy turns the messy expression into something manageable? (3 steps)", "answer": "- Step 1: Factor both top and bottom: $$4-x^2=(2-x)(2+x)$$ and $$x^2-2x=x(x-2)$$.\n- Step 2: Notice $$(2-x)$$ and $$(x-2)$$ are swapped-difference factors. Rewrite $$(2-x)=-(x-2)$$ so the $$(x-2)$$ cancels, leaving a $$-1$$ behind.\n- Step 3: Result: $$\\frac{-(2+x)}{x}$$.\n\nThe motivation: difference-of-squares on top is a setup for the sign flip, because difference-of-squares always produces *one* factor that's the swap of the linear factor on the bottom.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "After simplifying $$\\frac{4-x^2}{x^2-2x}$$ to $$\\frac{-(2+x)}{x}$$ and adding it to $$4$$, what's the common pitfall that gives the wrong answer $$5-\\tfrac{2}{x}$$ instead of $$3-\\tfrac{2}{x}$$?", "answer": "Forgetting the **implied bracket** — the minus sign must distribute over **both** terms of $$(2+x)$$:\n$$4-\\frac{2+x}{x}=4-\\frac{2}{x}-\\frac{x}{x}=4-\\frac{2}{x}-1=3-\\frac{2}{x}.$$\nThe trap is writing $$4-\\tfrac{2}{x}+\\tfrac{x}{x}$$ (sign error on the second term) → wrongly gives $$5-\\tfrac{2}{x}$$, which is a *deliberately offered distractor* in the MCQ.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "Before reading the roots of a quadratic inequality like $$x^2 \\ge 8 - 2x$$, what is the non-negotiable first step?", "answer": "Rearrange everything to **standard order** with all terms on one side: $$x^2,\\ x,\\ \\text{constant}$$, leading coefficient positive. Here: $$x^2+2x-8\\ge0$$. The motivation: roots and bracket signs are read off the standard form; reading from an unrearranged version is the classic way to flip a sign and pick the wrong option.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "For an upward parabola $$ax^2+bx+c$$ with $$a>0$$ and real roots $$\\alpha<\\beta$$, what's the mnemonic that tells you the solution set of $$\\ge 0$$ vs $$\\le 0$$?", "answer": "\"A happy (upward) parabola is **positive on the outside, negative in the middle**.\" So:\n+ $$ax^2+bx+c \\ge 0 \\iff x\\le\\alpha \\text{ or } x\\ge\\beta$$ (outside)\n+ $$ax^2+bx+c \\le 0 \\iff \\alpha\\le x\\le\\beta$$ (between)\n\nThe intuition: the parabola dips below the x-axis only between its roots; everywhere else it's above. Always keep the leading coefficient positive so this rule applies directly.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "When factorising $$x^2 + 2x - 8$$, what's the quick sum/product check that confirms your roots?", "answer": "Roots multiply to $$c=-8$$ and add to $$-b=-2$$. Test pairs:\n+ $$(+4,-2)$$: product $$-8$$ ✓, sum $$+2$$ ✗ (wrong sign)\n+ $$(-4,+2)$$: product $$-8$$ ✓, sum $$-2$$ ✓\n\nHence roots are $$x=-4$$ and $$x=2$$, so the factorisation is $$(x+4)(x-2)$$. This is a fast verification — if sum/product fail, you've sign-slipped.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Where are the zeros and vertical asymptotes of $$y = \\tan x$$ in radians, and what's the period?", "answer": "Since $$\\tan x = \\frac{\\sin x}{\\cos x}$$:\n+ **Zeros** where $$\\sin x=0$$: at $$x=n\\pi$$ (every $$\\pi$$).\n+ **Vertical asymptotes** where $$\\cos x=0$$: at $$x=\\frac{(2n+1)\\pi}{2}$$ (odd multiples of $$\\pi/2$$).\n+ **Period:** $$\\pi$$.\n\nHarry's rhythm rule: \"for $$\\tan x$$, something interesting happens every $$\\pi/2$$\" — it's either a zero or an asymptote.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Why does any near-horizontal line $$y=c$$ intersect each branch of $$\\tan x$$ **exactly once**?", "answer": "On one branch (between adjacent asymptotes, width $$\\pi$$), $$\\tan x$$ rises **continuously and strictly monotonically** from $$-\\infty$$ to $$+\\infty$$. By the Intermediate Value Theorem, every finite height $$y=c$$ is hit exactly once. This is the key insight that turns counting solutions of $$\\tan x = \\frac{1}{x}+1$$ over a huge interval into simple branch-counting.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "How do you sketch $$y = \\frac{1}{x}+1$$ — what changes from the standard $$y=\\frac{1}{x}$$ hyperbola?", "answer": "It's a vertical translation **up by 1**:\n+ Vertical asymptote: unchanged at $$x=0$$ (we shifted vertically, not horizontally).\n+ Horizontal asymptote: moves up from $$y=0$$ to $$\\boxed{y=1}$$.\n+ For $$x>0$$: sits just *above* $$y=1$$ and decreases toward 1.\n+ For $$x<0$$: comes up from below and approaches $$y=1$$ from underneath as $$x\\to-\\infty$$.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "What's the classic mistake when sketching $$y=\\frac{1}{x}+1$$, and why does it sabotage every downstream calculation? (Phuc's mistake #1)", "answer": "Leaving the horizontal asymptote at $$y=0$$ (its position for plain $$\\frac{1}{x}$$). The $$+1$$ translates the **whole curve, including the asymptote**, up by 1, so the asymptote is $$y=1$$. Forgetting this misplaces every intersection with $$\\tan x$$ and corrupts the entire solution count. Rule: a vertical shift moves asymptotes with the curve — re-draw the asymptote *first*, then the branches relative to it.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "What's the fundamental graphical re-interpretation of \"how many solutions does $$f(x)=g(x)$$ have?\"", "answer": "A solution is exactly a point where the two curves $$y=f(x)$$ and $$y=g(x)$$ are at the **same height** — i.e. where they **cross**. So:\n$$\\#\\{\\text{solutions}\\} = \\#\\{\\text{intersection points}\\}.$$\nThis converts an impossible-to-solve equation (like $$\\tan x = \\frac{1}{x}+1$$) into a simple counting exercise on a sketch. Harry: \"the word *hence* is a clue — they ask you to draw it for a reason.\"", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "For $$\\tan x = \\frac{1}{x}+1$$ on a *very large* interval like $$0\\le x\\le 40\\pi$$, why is the answer just \"40\"?", "answer": "For large $$x$$, $$\\frac{1}{x}+1 \\approx 1$$ — a near-horizontal line just above $$y=1$$. By one-crossing-per-branch (each $$\\pi$$-wide $$\\tan$$ branch is hit exactly once by a near-flat line), the count equals the number of branches:\n$$\\text{width}/\\pi = 40\\pi/\\pi = 40.$$\nThe strategy: width-divided-by-period gives the count, then fix the ends.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "In the count of solutions for $$\\tan x = \\frac{1}{x}+1$$ over $$-10\\pi \\le x \\le \\frac{5\\pi}{2}$$, Harry groups the count as $$10+1+3=14$$. What does each group represent? (3 steps)", "answer": "- Step 1: **The 10** — ordinary $$\\tan$$ branches from $$-10\\pi$$ up to $$-\\frac{\\pi}{2}$$. Each is cut once by the near-horizontal $$\\frac{1}{x}+1 \\approx 1$$.\n- Step 2: **The 1** — the \"odd one out below the axis\": on $$(-\\frac{\\pi}{2},0)$$, $$\\frac{1}{x}+1$$ dives to $$-\\infty$$ at $$x=0$$ and meets the rising $$\\tan$$ branch *below* the x-axis. This is the crossing students miss.\n- Step 3: **The 3** — from $$0$$ to $$\\frac{5\\pi}{2}$$: the crossing on $$(0,\\frac{\\pi}{2})$$ above the axis plus the two ordinary branches centred at $$\\pi$$ and $$2\\pi$$.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "Why does the branch of $$\\tan x$$ on $$(-\\frac{\\pi}{2}, \\frac{\\pi}{2})$$ carry **two** crossings with $$\\frac{1}{x}+1$$, not one?", "answer": "This branch contains $$x=0$$, which is a **pole** of $$\\frac{1}{x}+1$$. Inside this single $$\\tan$$ branch, $$\\frac{1}{x}+1$$ shoots from $$-\\infty$$ (approaching $$x=0^-$$) on the left, then re-emerges from $$+\\infty$$ (at $$x=0^+$$) on the right. So $$\\frac{1}{x}+1$$ is not flat here — it has its own divergence — and crosses the $$\\tan$$ branch once **below** the x-axis (on $$(-\\frac{\\pi}{2},0)$$) and once **above** the x-axis (on $$(0,\\frac{\\pi}{2})$$).\n\nThis is the only branch where the \"one crossing per $$\\pi$$\" shortcut fails.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "For the $$\\tan x$$ asymptote labelled $$l$$ in the standard exam sketch, what's the format you should expect for its equation?", "answer": "Asymptotes of $$\\tan x$$ are *vertical lines* of the form $$x = \\frac{(2n+1)\\pi}{2}$$ (odd multiples of $$\\pi/2$$). In the lesson it was the rightmost one before $$2\\pi$$: $$x = \\frac{3\\pi}{2}$$. Common slip: writing $$y = \\frac{3\\pi}{2}$$ — these are **vertical** lines, so the equation must be of the form $$x = \\text{constant}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "When asked to \"**giving a reason**, state the number of solutions\", what's the exact mark-winning sentence template?", "answer": "\"There are $$N$$ solutions because the graph of [curve 1] intersects the graph of [curve 2] $$N$$ times in the interval given.\"\n\nThree elements that must appear: the count $$N$$, both **named** curves, and the **interval**. Without this sentence, the count alone scores nothing.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "What's the difference between $$f(ax)$$ and $$f(x/a)$$ in terms of horizontal stretch direction?", "answer": "+ $$f(ax)$$: horizontal stretch of scale factor $$\\frac{1}{a}$$. If $$a>1$$, this is a **squash** toward the y-axis.\n+ $$f(x/a)$$: horizontal stretch of scale factor $$a$$. If $$a>1$$, this is a **widening**.\n\nAnchor it with the point mapping $$(x,y)\\mapsto(\\frac{x}{a}, y)$$ for $$f(ax)$$: x-coordinates are **divided** by $$a$$.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Derive *why* $$y = f(ax)$$ corresponds to the point mapping $$(X,Y)\\mapsto(\\frac{X}{a}, Y)$$. (3 steps)", "answer": "- Step 1: Let $$g(x)=f(ax)$$. A point $$(X,Y)$$ lies on $$y=f(x)$$ exactly when $$Y=f(X)$$.\n- Step 2: For the matching point on $$y=g(x)$$, we need the *input to f* to equal $$X$$. Set $$ax = X$$, giving $$x = \\frac{X}{a}$$, and then $$g(\\frac{X}{a}) = f(X) = Y$$.\n- Step 3: So $$(X,Y)$$ on $$y=f(x)$$ corresponds to $$(\\frac{X}{a}, Y)$$ on $$y=f(ax)$$. The x-coordinate divides by $$a$$; y is untouched. This is a horizontal stretch of scale factor $$\\frac{1}{a}$$ by definition.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "What's the period rule for $$\\cos(kx)^\\circ$$ and $$\\cos(kx)$$ (radians)?", "answer": "Replacing $$x$$ with $$kx$$ **divides** the period by $$k$$:\n+ Degrees: period $$= \\frac{360°}{k}$$. So $$\\cos 2x^\\circ$$ has period $$180°$$.\n+ Radians: period $$= \\frac{2\\pi}{k}$$.\n\nIntuition: a horizontal squash by factor $$\\frac{1}{k}$$ packs $$k$$ copies of the original cycle into the same horizontal distance.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "To find the coordinates of the minimum point $$Q$$ on $$y=\\cos 2x^\\circ$$, what's the systematic approach using point-mapping?", "answer": "The minimum of $$\\cos x^\\circ$$ is at $$(180, -1)$$. Apply $$(x,y)\\mapsto(\\frac{x}{2}, y)$$ for $$f(2x)$$:\n$$(180, -1) \\mapsto (90, -1).$$\nSo $$Q = (90°, -1)$$. Alternative check: set $$\\cos 2x^\\circ = -1 \\Rightarrow 2x = 180 \\Rightarrow x = 90$$. Both routes agree.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "For $$y=\\cos 2x^\\circ$$, how do you locate the x-intercept point $$R(k, 0)$$ that appears in the standard exam sketch, when the curve runs $$(0,1)\\to\\dots\\to R$$ passing through the minimum and back up?", "answer": "Zeros of $$\\cos 2x^\\circ$$ occur where $$2x = 90, 270, 450, \\dots$$, i.e. at $$x = 45, 135, 225, \\dots$$. Walking through the curve from $$x=0$$:\n$$(0,1)\\to(45,0)\\to(90,-1)_Q\\to(135,0)\\to(180,1)\\to(225,0)_R$$\n$$R$$ is the **third** zero, so $$k=225$$.\n\nCommon trap: writing $$k=270$$ (that's the next *minimum*, not the next zero). Always trace the curve point-by-point.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "For $$\\cos 2x^\\circ = p$$ on $$0\\le x\\le 225$$, what's the strategy for finding the range of $$p$$ giving \"exactly two solutions\"? (3 steps)", "answer": "- Step 1: Split the curve into **monotonic pieces** on $$[0, 225]$$:\n+ $$S_1$$: $$[0,90]$$, falls $$1\\to-1$$\n+ $$S_2$$: $$[90,180]$$, rises $$-1\\to1$$\n+ $$S_3$$: $$[180,225]$$, falls $$1\\to 0$$\n- Step 2: For each band of $$p$$, count how many monotonic pieces the line $$y=p$$ meets.\n- Step 3: Select only the bands where total = 2.\n\nThe motivation: a horizontal line crosses a monotonic piece at most once, so total crossings = number of pieces whose range contains $$p$$.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Why is the tempting answer $$-1 < p < 1$$ **wrong** for \"exactly two solutions of $$\\cos 2x^\\circ = p$$\" on $$0\\le x\\le 225$$?", "answer": "The domain includes a **partial third piece** $$S_3$$ from $$(180, 1)$$ down to $$R(225, 0)$$. This piece has range $$[0,1]$$, so:\n+ For $$0 < p < 1$$: the line $$y=p$$ crosses $$S_1$$ (once), $$S_2$$ (once), AND $$S_3$$ (once) → **3 crossings**, not 2.\n+ For $$p=0$$: crosses at $$x=45, 135, 225$$ → **3 crossings**.\n\nSo any positive $$p<1$$ gives three intersections. The correct set is $$-1 < p < 0$$ (where $$S_3$$ is out of range) or $$p=1$$ (where the two maxima $$x=0, 180$$ share the height and $$S_3$$'s endpoint is already counted).", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "What's the general \"exactly $$n$$ solutions\" strategy for any trig equation $$f(x) = p$$ on a partial domain?", "answer": "Always split the curve into **monotonic pieces** and count $$y=p$$ crossings **per piece**. Each monotonic piece is hit at most once by a horizontal line, hit exactly once iff $$p$$ is in that piece's range. Total = sum of pieces whose range contains $$p$$.\n\nKey insight: never blindly assume \"between the global max and min\" — that ignores partial pieces created by the domain cut-off.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Why is $$p=1$$ a valid answer for \"exactly two solutions\" of $$\\cos 2x^\\circ = p$$ on $$[0, 225]$$ — what makes the count exactly 2 rather than 3 here?", "answer": "$$p=1$$ is the global max, reached **only** at the two maximum points: $$x=0$$ (start of $$S_1$$) and $$x=180$$ (end of $$S_2$$ / start of $$S_3$$). $$S_3$$ runs from $$(180,1)$$ downward to $$(225,0)$$, so its only point at $$y=1$$ is its **starting endpoint** $$x=180$$ — already counted. So total crossings $$=2$$.\n\nThis is why $$p=1$$ is included as an isolated value, even though the surrounding band $$0<p<1$$ gives three solutions.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "Why does $$p = -1$$ give only **one** solution to $$\\cos 2x^\\circ = p$$ on $$[0, 225]$$, not two?", "answer": "$$y = -1$$ is reached only at the unique minimum of the curve, which is at $$x=90$$ (point $$Q$$). $$S_1$$ ends there and $$S_2$$ starts there — same point. So though formally both monotonic pieces are touched, it's the same x-value, giving 1 distinct solution. Hence $$p=-1$$ is excluded from the \"exactly two\" set.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "When checking whether you've used all the given information in a multi-step problem, what's Harry's habit-forming trick?", "answer": "Tick off each given as you use it. \"Put a little tick next to them so you can see what you have used and what you haven't.\" The motivation: an unused given is almost always the *next step* you need. If you're stuck, ask \"what haven't I used?\" — it usually unlocks the next move.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "For an intersection-count question on a *large* interval, what's the reusable five-step checklist?", "answer": "- Step 1: Sketch both graphs on the same axes (asymptotes, periods, asymptote translations correct).\n- Step 2: Solutions = crossings; count crossings, not algebra.\n- Step 3: For a periodic curve vs near-flat line: count ≈ (interval width)/(period of one branch).\n- Step 4: **Fix the ends** — partial branches at the boundary, branches passing through poles of the other curve, boundary points landing on asymptotes (no crossing).\n- Step 5: If the curve isn't monotonic over the whole interval, split into monotonic pieces.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "A non-flat translated curve like $$y=\\frac{1}{x}+1$$ is being matched against $$y=\\tan x$$ on a large interval. Why might the \"one solution per $$\\pi$$\" shortcut undercount?", "answer": "The shortcut assumes the line is *near-horizontal*, which fails inside any branch containing a pole or rapid change of $$\\frac{1}{x}+1$$ — specifically the branch through $$x=0$$. There, $$\\frac{1}{x}+1$$ spans $$\\pm\\infty$$ on a single $$\\tan$$ branch, producing **two** crossings instead of one. Always check whether your \"flat line\" assumption breaks anywhere inside the interval.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "What's Harry's \"spoken rhythm\" rule for sketching $$\\tan x$$ quickly under exam pressure?", "answer": "\"Something interesting happens every $$\\pi/2$$ radians (or $$90°$$) — it's either a zero or an asymptote.\" Specifically:\n+ At $$0$$: zero\n+ At $$\\pi/2$$: asymptote\n+ At $$\\pi$$: zero\n+ At $$3\\pi/
