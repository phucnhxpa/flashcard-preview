only $x = 180$ → 1. $0 < p < 1$: only $S_1$ → 1.\n- Step 3: Answer: $-1 < p \\le 0$. Here $p = 0$ *is* included because $S_2$ ends at $y = 0$, giving exactly 2 zeros. In Q5, $S_3$ added a *third* zero at $p = 0$. **Always recount for your own domain — don't copy another question's answer blindly.**", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "Simplify $5 + \\frac{9 - x^2}{x^2 - 3x}$. What's the sign-flip cancellation, and what's the final answer? (3 steps)", "answer": "- Step 1: Factorise: $9 - x^2 = (3-x)(3+x)$ and $x^2 - 3x = x(x-3)$. Spot that $(3-x) = -(x-3)$.\n- Step 2: Cancel: $\\frac{(3-x)(3+x)}{x(x-3)} = \\frac{-(x-3)(3+x)}{x(x-3)} = \\frac{-(3+x)}{x}$.\n- Step 3: Distribute: $5 - \\frac{3+x}{x} = 5 - \\frac{3}{x} - \\frac{x}{x} = 5 - \\frac{3}{x} - 1 = 4 - \\frac{3}{x}$. The minus sign distributes over both terms of $(3+x)$.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": true}, {"question": "On a line, $A, B, C, D$ lie in order with $\\frac{AB}{BC} = \\frac{1}{4}$ and $\\frac{BC}{CD} = \\frac{2}{3}$. Find $\\frac{AB}{AD}$ using the assign-a-value trick. (3 steps)", "answer": "- Step 1: Anchor on $BC$ (appears in both ratios). Let $BC = 4$ (smallest integer making $AB$ nice). Then $AB = 1$ (from $\\frac{AB}{BC} = \\frac{1}{4}$).\n- Step 2: From $\\frac{BC}{CD} = \\frac{2}{3}$: $CD = \\frac{3}{2} \\times 4 = 6$. Then $AD = AB + BC + CD = 1 + 4 + 6 = 11$.\n- Step 3: $\\frac{AB}{AD} = \\frac{1}{11}$. Any valid anchor gives the same ratio — that's the power of the trick.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": true}, {"question": "Solve $2x^2 + 3x \\le 5$. What extra step is needed compared to a monic quadratic? (3 steps)", "answer": "- Step 1: Rearrange to standard order: $2x^2 + 3x - 5 \\le 0$. Leading coefficient is $2$, not $1$.\n- Step 2: Factorise: need two numbers with product $2 \\times (-5) = -10$ and sum $+3$. The pair $(+5, -2)$ works. Split: $2x^2 + 5x - 2x - 5 = x(2x+5) - 1(2x+5) = (2x+5)(x-1)$. Roots: $x = -\\frac{5}{2}, x = 1$.\n- Step 3: Upward parabola ($a = 2 > 0$), $\\le 0$ **between** the roots: $-\\frac{5}{2} \\le x \\le 1$. The method is the same as monic — just the factorisation is harder.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "$y = \\cos x°$ is transformed to $y = \\cos 3x°$. State (i) the period and (ii) the image of the minimum $(180°, -1)$. (2 steps)", "answer": "- Step 1: (i) Period $= \\frac{360}{3} = 120°$. The horizontal squash by factor $\\frac{1}{3}$ compresses three full cycles into the original one-period width.\n- Step 2: (ii) Apply $(x, y) \\mapsto \\left(\\frac{x}{3}, y\\right)$: $(180°, -1) \\mapsto (60°, -1)$. Check: $\\cos(3 \\times 60)° = \\cos 180° = -1$ ✓. The $x$-coordinate is *divided* by $3$.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "What's Harry's priority advice for A* preparation — topic homework or past papers? (2 steps)", "answer": "- Step 1: **Reflective past-paper practice > topic homework.** \"Do as much *reflective* past-paper practice as possible.\" Work through the two other P1 past papers Harry sent, and *reflect on your mistakes* after each.\n- Step 2: If short on time, the past papers beat the narrower topic-only sets. Pure 1 is foundational for P2 and P3, so consolidating it through real exam questions is the highest-yield activity.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "For the equation of the asymptote $l$ of $y = \\tan x$ shown in Q4(a), how do you identify which asymptote it is? (2 steps)", "answer": "- Step 1: Asymptotes of $\\tan x$ are at $x = \\frac{(2n+1)\\pi}{2}$: $x = \\pm\\frac{\\pi}{2}, \\pm\\frac{3\\pi}{2}, \\dots$\n- Step 2: The line $l$ is the highlighted rightmost asymptote before $2\\pi$ in the sketch on $-2\\pi \\le x < 2\\pi$. That's $x = \\frac{3\\pi}{2}$. Always read which asymptote is labelled from the diagram, not from a formula alone.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "When counting $\\tan x = \\frac{1}{x}+1$ solutions over $-10\\pi \\le x \\le \\frac{5\\pi}{2}$, why can't you just compute width $\\div \\pi = \\frac{5\\pi/2 - (-10\\pi)}{\\pi} = 12.5$ and round? (2 steps)", "answer": "- Step 1: The \"width ÷ $\\pi$\" shortcut assumes one crossing per branch on *ordinary* branches. But the branch containing $x = 0$ (the pole of $\\frac{1}{x}+1$) carries **two** crossings, not one.\n- Step 2: Also, boundary effects matter: the interval starts at $x = -10\\pi$ (a zero of $\\tan x$, not an asymptote — so the branch just to the right is fully counted) and ends at $x = \\frac{5\\pi}{2}$ (an asymptote — no crossing there). The naive division gives 12.5, but the true count is 14. You must account for the pole-branch double crossing and the endpoints.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "What's the key visual insight from the Desmos confirmation in Q4? (2 steps)", "answer": "- Step 1: For large $x$, the curve $y = \\frac{1}{x}+1$ (red) becomes a near-horizontal line just above $y = 1$, cutting each $\\tan$ branch (blue) exactly once — the visual proof of \"one solution per $\\pi$.\"\n- Step 2: Harry: \"the key to this is a *really good sketch*… these are tricky, usually at the end of the paper.\" The Desmos image confirms what the sketch predicts — but on the exam, you must produce the sketch yourself and count from it.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "In Q5(b), what happens when you imagine the horizontal line $y = p$ sliding from $p = -1$ up to $p = 1$ across the curve $\\cos 2x°$ on $[0, 225]$? (3 steps)", "answer": "- Step 1: At $p = -1$: one touching point at $x = 90$. As $p$ rises into $-1 < p < 0$: the line now cuts $S_1$ and $S_2$ — exactly 2 solutions ✓.\n- Step 2: At $p = 0$: three zeros at $x = 45, 135, 225$ — 3 solutions ✗. For $0 < p < 1$: the line cuts $S_1$, $S_2$, *and* $S_3$ — 3 solutions ✗.\n- Step 3: At $p = 1$: the line touches the maxima at $x = 0$ and $x = 180$ — exactly 2 ✓. Above $p = 1$: no solutions. The sliding-line visualisation makes the band structure obvious: two-solution regions are $-1 < p < 0$ and $p = 1$.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": true}, {"question": "What's the general formula for sum and product of roots of $ax^2 + bx + c = 0$? (2 steps)", "answer": "- Step 1: If roots are $\\alpha$ and $\\beta$: $\\alpha + \\beta = -\\frac{b}{a}$ and $\\alpha\\beta = \\frac{c}{a}$.\n- Step 2: For the monic case $x^2 + bx + c$: $\\alpha + \\beta = -b$, $\\alpha\\beta = c$. Use these as a **fast check** after factorising — if your candidate roots don't satisfy both, you've made a sign error.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "What are the zeros and asymptotes of $y = \\frac{1}{x}$, and how do the branches behave? (3 steps)", "answer": "- Step 1: **Vertical asymptote** at $x = 0$ (the $y$-axis). **Horizontal asymptote** at $y = 0$ (the $x$-axis). The curve never touches either axis.\n- Step 2: For $x > 0$: the branch is in the first quadrant, positive and decreasing toward $0$. For $x < 0$: the branch is in the third quadrant, negative and approaching $0$ from below.\n- Step 3: It's a rectangular hyperbola. Knowing this base shape is essential because translations like $\\frac{1}{x} + 1$ shift it but preserve the branch structure.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": true}, {"question": "What's the translation rule for $y = f(x + a)$ — which direction and why? (2 steps)", "answer": "- Step 1: $y = f(x + a)$ moves the graph **left by $a$** (for $a > 0$). The $+a$ inside the argument shifts the curve in the *opposite* direction to the sign.\n- Step 2: Intuition: $f(x + a)$ reaches the same $y$-value at an $x$ that is $a$ units *earlier* (smaller). So every feature shifts left. Contrast with $f(x) + a$ (outside), which shifts *up* by $a$ — the direction matches the sign.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": true}, {"question": "What's the key difference between how $f(x) + a$ and $f(x + a)$ affect asymptotes? (2 steps)", "answer": "- Step 1: $f(x) + a$ (vertical shift up): **horizontal** asymptotes move up by $a$; **vertical** asymptotes are unchanged (the $x$-values where the function blows up haven't changed).\n- Step 2: $f(x + a)$ (horizontal shift left): **vertical** asymptotes shift left by $a$; **horizontal** asymptotes are unchanged (the $y$-values approached at infinity are the same). Asymptotes move in the direction of the translation.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": true}, {"question": "Why is the right angle $\\angle QXR = 90°$ given in Q1 if it's not used by the ratio trick? (2 steps)", "answer": "- Step 1: It's there for students who take the Pythagoras/coordinate geometry route — you *could* set up coordinates using the right angle and compute everything. That method works but is much slower.\n- Step 2: Exam craft: recognise when a given is a distractor for a faster method. If the question asks for a ratio and gives only ratios, the assign-a-value trick bypasses all geometry. The right angle is a \"trap door\" into a slower path — don't take it.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": true}, {"question": "In Q3, the board briefly had a sign-slip writing $x_1 = 4, x_2 = -2$ (factor $(x+2)(x-4)$). How does the sum/product check catch this? (2 steps)", "answer": "- Step 1: For $x^2 + 2x - 8$: sum should be $-b = -2$ and product should be $c = -8$. The pair $(4, -2)$: sum $= +2 \\ne -2$ ✗. The pair $(-4, 2)$: sum $= -2$ ✓, product $= -8$ ✓.\n- Step 2: The correct factorisation is $(x + 4)(x - 2)$, roots $-4$ and $2$. The sign-slip gives roots $-2$ and $4$, which would solve $x^2 - 2x - 8 \\ge 0$ — a different quadratic entirely. The sum/product check is a one-line verification that prevents this.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}], "count": 50}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "When a geometry problem gives you only ratios and asks for another ratio, what trick lets you avoid carrying unknowns through the whole calculation? (2 steps)", "answer": "- Step 1: **Assign convenient numerical values** to one of the lengths. Because a ratio fixes only *relative* sizes, the actual lengths are irrelevant — any valid choice produces the same final ratio. Pick the smallest convenient number that makes every other length come out as a nice integer.\n- Step 2: Compute the target ratio directly from your invented lengths. The answer is independent of your choice, so you are done.\n\nThe motivation: carrying \"$$6X$$\" and \"$$\\frac{3}{2}X$$\" through multiple steps creates algebra you don't need. Replacing them with integers kills the scaling factors and makes arithmetic trivial.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "In a ratio problem where $$QX$$ appears in two different given ratios, why is $$QX$$ the best \"anchor\" for the assign-a-value trick, and how do you choose its value wisely? (3 steps)", "answer": "- Step 1: Identify the **shared quantity** — the one appearing in the most ratios. Here $$QX$$ appears in both $$\\frac{QX}{PX}=\\frac{1}{6}$$ and $$\\frac{QX}{XR}=\\frac{2}{3}$$. Making $$QX$$ the anchor means both other lengths are simple multiples of it: $$PX=6\\cdot QX$$ and $$XR=\\frac{3}{2}\\cdot QX$$.\n- Step 2: Choose the **smallest value** that makes every derived length an integer. $$PX=6\\cdot QX$$ is always integer if $$QX$$ is integer. $$XR=\\frac{3}{2}\\cdot QX$$ requires $$QX$$ to be **even** (so that $$\\frac{3}{2}QX$$ is integer). The smallest even positive integer is $$QX=2$$.\n- Step 3: Verify: $$QX=2 \\Rightarrow PX=12$$, $$XR=3$$. All integers, no fractions. If you had chosen $$QX=1$$, then $$XR=1.5$$ — legal but messier. The cleanest choice always wins under exam time pressure.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "What is the \"burger method\" for simplifying a fraction divided by a fraction like $$\\frac{2}{9/2}$$, and why does it prevent a common upside-down error? (2 steps)", "answer": "- Step 1: **Stack the division** and flip the bottom fraction: $$\\frac{2}{9/2} = \\frac{2}{1} \\times \\frac{2}{9}$$. Keep the original numerator on top and the original denominator on the bottom — then multiply straight across.\n- Step 2: The result is $$\\frac{4}{9}$$. The trap Harry caught live: students sometimes write $$\\frac{2}{1}\\times\\frac{9}{2}=\\frac{18}{2}=9$$, flipping the wrong fraction. The rule is: **flip the denominator of the big fraction only**, never the numerator. \"Two times two goes on the *top*.\"", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "Q1 — The right angle $$\\angle QXR = 90°$$ is given in the problem. Why is it completely irrelevant when using the assign-a-value ratio trick?", "answer": "The assign-a-value trick exploits the fact that the question asks only for a **ratio** of two lengths ($$\\frac{QX}{MX}$$). Ratios depend on relative sizes, not on geometric constraints like angles. The right angle would matter if you were using Pythagoras or coordinate geometry to find actual lengths, but the ratio trick bypasses all of that. $$\\angle QXR = 90°$$ is a **distractor** — it's there to tempt you into a slower, more error-prone method.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "What is the algebraic identity for the \"sign flip\" when two terms in a difference are swapped, and what does the fraction version simplify to? (2 steps)", "answer": "- Step 1: Swapping the terms in a difference flips the sign: $$a - b = -(b - a)$$. This is because $$a - b + (b - a) = 0$$, so they are negatives of each other.\n- Step 2: The fraction consequence is the key cancellation trick: $$\\frac{a-b}{b-a} = \\frac{-(b-a)}{b-a} = -1$$. Whenever a numerator factor is the same as a denominator factor but with the terms in **opposite order**, they cancel to $$-1$$, not $$+1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "What should you recognise *on sight* without any working when you see a fraction like $$\\frac{x-y}{y-x}$$, and why is instant recognition valuable?", "answer": "$$\\frac{x-y}{y-x} = -1$$ **on sight**. The numerator is the denominator with the terms swapped, so by the sign-flip identity they cancel to $$-1$$. Harry's coaching: \"it would speed you up a great deal\" to spot this instantly under exam time pressure, rather than factoring out $$-1$$ every time. Other examples to recognise on sight: $$\\frac{P-Q}{Q-P}=-1$$, $$\\frac{2-x}{x-2}=-1$$, $$\\frac{3-x}{x-3}=-1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Q2 — After cancelling the sign-flip factor in $$\\frac{4-x^2}{x^2-2x}$$, you get $$\\frac{-(2+x)}{x}$$. When adding 4 and simplifying $$4 - \\frac{2+x}{x}$$, what is the **implied bracket trap** that produces the wrong answer $$5 - \\frac{2}{x}$$? (2 steps)", "answer": "- Step 1: The minus sign must **distribute over both terms** inside the implied bracket: $$4 - \\frac{2+x}{x} = 4 - \\frac{2}{x} - \\frac{x}{x} = 4 - \\frac{2}{x} - 1 = 3 - \\frac{2}{x}$$.\n- Step 2: The trap is writing $$4 - \\frac{2}{x} + \\frac{x}{x}$$, treating the minus as applying only to the first term. This gives $$4 - \\frac{2}{x} + 1 = 5 - \\frac{2}{x}$$ — a deliberately offered wrong option. The minus sign governs the **entire numerator** $$(2+x)$$, not just the 2.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "What is the first thing you must do before solving any quadratic inequality, and why is doing it out of order the \"classic way to flip a sign\"? (2 steps)", "answer": "- Step 1: **Rearrange to standard order** — $$x^2$$ term, then $$x$$ term, then constant, all on one side with the leading coefficient positive. For $$x^2 \\ge 8 - 2x$$: move everything left to get $$x^2 + 2x - 8 \\ge 0$$.\n- Step 2: Without standard order, you risk misreading the sum/product of roots or flipping the inequality direction. An out-of-order expression like $$x^2 - 8 + 2x$$ hides the true coefficient of $$x$$ (it's $$+2$$, not $$-2$$). Standard form makes the parabola's sign and the root signs immediately readable.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": true}, {"question": "For an upward parabola $$y = ax^2 + bx + c$$ with $$a > 0$$ and real roots $$\\alpha < \\beta$$, what is the sign rule for where the expression is positive vs negative? (2 steps)", "answer": "- Step 1: An upward (happy) parabola opens upward, so it is **above the $$x$$-axis (positive) outside the roots** and **below the axis (negative) between the roots**:\n  + $$ax^2 + bx + c > 0 \\iff x < \\alpha$$ or $$x > \\beta$$\n  + $$ax^2 + bx + c < 0 \\iff \\alpha < x < \\beta$$\n- Step 2: With \"$$\\ge$$\" or \"$$\\le$$\", simply **include the roots**. Mnemonic: *\"a happy parabola is positive on the outside, negative in the middle.\"* For $$x^2 + 2x - 8 \\ge 0$$ with roots $$-4$$ and $$2$$: the answer is $$x \\le -4$$ or $$x \\ge 2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "How do you use the sum and product of roots as a **fast check** on your factorisation, and what was the sign-slip that happened on the board in Q3? (3 steps)", "answer": "- Step 1: If $$x^2 + bx + c = (x - \\alpha)(x - \\beta)$$, then expanding gives $$x^2 - (\\alpha + \\beta)x + \\alpha\\beta$$. Matching coefficients: $$\\alpha + \\beta = -b$$ and $$\\alpha\\beta = c$$. For a general quadratic $$ax^2 + bx + c$$: $$\\alpha + \\beta = -\\frac{b}{a}$$, $$\\alpha\\beta = \\frac{c}{a}$$.\n- Step 2: For $$x^2 + 2x - 8$$: we need product $$= -8$$ and sum $$= -2$$. The pair $$(-4, +2)$$ multiplies to $$-8$$ ✓ and sums to $$-2$$ ✓. So the factorisation is $$(x + 4)(x - 2)$$.\n- Step 3: The board's in-progress slip: writing roots as $$+4$$ and $$-2$$ (which sum to $$+2$$, not $$-2$$), producing the wrong factorisation $$(x + 2)(x - 4)$$. The sum/product check catches this instantly — the sum should be $$-b/a = -2$$, not $$+2$$. Always verify: roots $$-4, 2$$ → sum $$= -2$$ ✓.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "Where are the zeros and asymptotes of $$y = \\tan x$$ (in radians), and what rhythm does Harry stress for placing every feature? (2 steps)", "answer": "- Step 1: **Zeros** at every integer multiple of $$\\pi$$: $$x = \\dots, -2\\pi, -\\pi, 0, \\pi, 2\\pi, \\dots$$ (wherever $$\\sin x = 0$$). **Asymptotes** at every odd multiple of $$\\frac{\\pi}{2}$$: $$x = \\pm\\frac{\\pi}{2}, \\pm\\frac{3\\pi}{2}, \\dots$$, i.e. $$x = \\frac{(2n+1)\\pi}{2}$$ (wherever $$\\cos x = 0$$).\n- Step 2: Harry's rhythm: *\"something interesting happens every $$\\frac{\\pi}{2}$$\"* — it alternates between zero and asymptote. Starting from 0: zero at 0, asymptote at $$\\frac{\\pi}{2}$$, zero at $$\\pi$$, asymptote at $$\\frac{3\\pi}{2}$$, zero at $$2\\pi$$, and so on. That single alternating pattern is all you need to place every feature.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "What is the fundamental structural fact about a single \"branch\" of $$y = \\tan x$$ (between two adjacent asymptotes), and why does it matter for counting solutions? (2 steps)", "answer": "- Step 1: On each open interval of width $$\\pi$$ between consecutive asymptotes, $$\\tan x$$ rises **continuously and strictly** from $$-\\infty$$ to $$+\\infty$$. It passes through exactly one zero in the middle.\n- Step 2: By the Intermediate Value Theorem, any horizontal line $$y = c$$ (for any finite $$c$$) is met **exactly once** by that branch. This is the foundation of the \"one crossing per branch\" counting strategy: you don't need to solve anything — just count how many branches fit in the interval.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "What are the asymptotes of $$y = \\frac{1}{x}$$, and what happens to them when you translate to $$y = \\frac{1}{x} + 1$$? (2 steps)", "answer": "- Step 1: For $$y = \\frac{1}{x}$$: vertical asymptote at $$x = 0$$ (the $$y$$-axis), horizontal asymptote at $$y = 0$$ (the $$x$$-axis). The curve never touches either axis.\n- Step 2: $$y = \\frac{1}{x} + 1$$ is a vertical translation **up by 1**. The vertical asymptote $$x = 0$$ is **unchanged** (we moved up, not sideways). The horizontal asymptote **moves up with the curve** from $$y = 0$$ to $$y = 1$$. Phuc's initial mistake was keeping the horizontal asymptote at $$y = 0$$ — a vertical shift moves everything, including asymptotes.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "Why must you always re-draw the asymptotes *first* when sketching a translated curve like $$y = \\frac{1}{x} + 1$$? (2 steps)", "answer": "- Step 1: A translation moves the **asymptotes with the curve**. For $$f(x) + a$$: the horizontal asymptote rises by $$a$$; the vertical asymptote is unchanged (because the shift is vertical, not horizontal). For $$y = \\frac{1}{x} + 1$$, the horizontal asymptote is $$y = 1$$, not $$y = 0$$.\n- Step 2: If you sketch the branches first relative to the old asymptote $$y = 0$$, you will place every intersection incorrectly. The fix: **always re-draw the asymptote first**, then sketch the branches relative to the new asymptote. This one habit prevents the entire solution count from being corrupted.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "What is the key insight that converts \"solving $$f(x) = g(x)$$\" into a graphical problem, and why is this the most powerful idea in the lesson? (2 steps)", "answer": "- Step 1: A solution of $$f(x) = g(x)$$ is an $$x$$-value where the two curves have the **same height**. Graphically, that is a **crossing point**. Therefore: $$\\#\\{\\text{solutions}\\} = \\#\\{\\text{intersection points of the two graphs}\\}$$.\n- Step 2: This converts an impossible algebraic problem (like $$\\tan x = \\frac{1}{x} + 1$$, which cannot be solved by hand) into a sketch-and-count task. The same picture answers the question for *any* interval — you just count the crossings that fall inside it. Harry: *\"visualising the intersection of two graphs is a highly effective way to solve equations.\"*", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "Q4 — When the exam says \"giving a reason, state the number of solutions,\" what is the mark-winning wording template you must write? (2 steps)", "answer": "- Step 1: The count alone scores nothing without the justification. You must name **both graphs** and the **interval**.\n- Step 2: Copy this template: *\"There are $$N$$ solutions because the graph of $$y = \\frac{1}{x}+1$$ intersects the graph of $$y = \\tan x$$ $$N$$ times in the interval given.\"* This single sentence is the reason mark. Omit either graph name or the interval, and you lose the mark.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "Why does a near-horizontal line like $$y \\approx 1$$ (the behaviour of $$\\frac{1}{x}+1$$ for large $$x$$) cut each $$\\pi$$-wide branch of $$\\tan x$$ exactly once? (2 steps)", "answer": "- Step 1: On each branch, $$\\tan x$$ rises continuously and strictly from $$-\\infty$$ to $$+\\infty$$. The line $$y = c$$ (for any finite $$c$$) sits at a fixed finite height. By the Intermediate Value Theorem, the branch must pass through height $$c$$ exactly once — the curve goes from below the line to above it.\n- Step 2: For $$\\frac{1}{x} + 1$$, as $$x$$ grows the curve approaches $$y = 1$$ from above, so it acts like a near-horizontal line just above $$y = 1$$. This line is finite, so it crosses every branch. Over an interval of width $$N\\pi$$, there are approximately $$N$$ solutions — one per branch.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Q4(c)(ii) — What is the \"odd one out below the axis\" crossing that Phuc missed, and why does it exist? (3 steps)", "answer": "- Step 1: On the branch $$\\left(-\\frac{\\pi}{2}, 0\\right)$$, the curve $$\\frac{1}{x}+1$$ has a **pole** at $$x = 0$$ — it dives to $$-\\infty$$ as $$x \\to 0^{-}$$. Meanwhile, $$\\tan x$$ on this branch rises from $$-\\infty$$ (at the asymptote $$x = -\\frac{\\pi}{2}$$) toward $$0$$ (at the zero $$x = 0$$).\n- Step 2: Both curves are in the negative region near $$x = 0^{-}$$, but $$\\frac{1}{x}+1$$ plunges faster to $$-\\infty$$ than $$\\tan x$$ rises. The two curves must cross somewhere in this branch — and the crossing is **below the $$x$$-axis** because both functions are negative there.\n- Step 3: This crossing is the one students most often miss because they focus on the positive crossings above the axis. Harry: *\"you were missing this kind of odd one out, which kind of lies below the axis.\"* Phuc first answered 12 instead of 14 because he missed this one and the related positive-side crossing on $$(0, \\frac{\\pi}{2})$$.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "Q4(c)(ii) — Explain Harry's \"10 + 1 + 3\" grouping for counting solutions of $$\\tan x = \\frac{1}{x}+1$$ on $$-10\\pi \\le x \\le \\frac{5\\pi}{2}$$. (3 steps)", "answer": "- Step 1: **The 10:** From $$-10\\pi$$ up to about $$-\\frac{\\pi}{2}$$, there are ten ordinary $$\\pi$$-wide branches of $$\\tan x$$. The curve $$\\frac{1}{x}+1$$ is nearly horizontal at $$y \\approx 1$$ in this region (since $$|x|$$ is large), so it cuts each branch once. Note: the boundary $$x = -10\\pi$$ is a **zero** of $$\\tan x$$, not an asymptote, so all ten branches are fully counted.\n- Step 2: **The 1:** This is the \"odd one out below the axis\" — the crossing on $$\\left(-\\frac{\\pi}{2}, 0\\right)$$ where $$\\frac{1}{x}+1$$ dives to $$-\\infty$$ at its pole and meets the rising $$\\tan$$ branch below the $$x$$-axis. This is exactly what Phuc missed.\n- Step 3: **The 3:** From $$0$$ up to $$\\frac{5\\pi}{2}$$: one crossing on $$\\left(0, \\frac{\\pi}{2}\\right)$$ above the axis (where $$\\frac{1}{x}+1$$ comes down from $$+\\infty$$), plus two ordinary branches centred at $$\\pi$$ and $$2\\pi$$. Total: $$10 + 1 + 3 = 14$$.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "Q4(c)(i) — For $$0 \\le x \\le 40\\pi$$, why is the solution count of $$\\tan x = \\frac{1}{x}+1$$ simply 40? (2 steps)", "answer": "- Step 1: For $$x > 0$$, the curve $$\\frac{1}{x}+1$$ is positive and decreasing toward $$y = 1$$, acting as a near-horizontal line just above $$y = 1$$. Each $$\\pi$$-wide branch of $$\\tan x$$ is cut once by this line.\n- Step 2: The interval $$0 \\le x \\le 40\\pi$$ has width $$40\\pi$$, spanning exactly 40 branches. Since the boundary $$x = 0$$ is a zero of $$\\tan x$$ (not an asymptote), the count is clean: **40 solutions, one per branch**. No partial branches or boundary complications.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Q5 — When transforming from $$y = \\cos x°$$ to $$y = \\cos 2x°$$, what is the mapping of each point, and why does it produce a squash? (3 steps)", "answer": "- Step 1: The transformation is $$f(x) \\to f(2x)$$, replacing $$x$$ by $$2x$$. By the horizontal stretch rule, this sends every point $$(x, y)$$ on $$y = \\cos x°$$ to $$\\left(\\frac{x}{2}, y\\right)$$ on $$y = \\cos 2x°$$. The $$x$$-coordinate is **divided by 2**; the $$y$$-coordinate is unchanged.\n- Step 2: Dividing every $$x$$-coordinate by 2 **pulls the curve in toward the $$y$$-axis** — it becomes half as wide. This is a horizontal stretch of scale factor $$\\frac{1}{2}$$, which for $$a > 1$$ is a **squash**.\n- Step 3: Example: $$(180, -1)$$ on $$y = \\cos x°$$ maps to $$\\left(\\frac{180}{2}, -1\\right) = (90, -1)$$ on $$y = \\cos 2x°$$. Check: $$\\cos(2 \\times 90)° = \\cos 180° = -1$$ ✓.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "What is the general rule for the period of $$\\cos(kx)°$$ or $$\\sin(kx)°$$, and what is the corresponding radian form? (2 steps)", "answer": "- Step 1: In degrees: $$\\text{period of } \\cos(kx)° = \\frac{360°}{k}$$. For $$\\cos 2x°$$: period $$= \\frac{360}{2} = 180°$$. The factor $$k$$ in the argument **divides** the original period.\n- Step 2: In radians the same rule reads $$\\frac{2\\pi}{k}$$. Intuition: compressing the graph horizontally by factor $$k$$ means the full cycle completes in $$\\frac{1}{k}$$ of the original distance, so the period shrinks by the same factor.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "Q5(a)(ii) — Why is $$k = 225$$ (not 270) for the point $$R(k, 0)$$ on $$y = \\cos 2x°$$? (2 steps)", "answer": "- Step 1: The zeros of $$\\cos 2x°$$ occur where $$2x = 90, 270, 450, \\dots$$, i.e. $$x = 45, 135, 225, \\dots$$. Reading the curve from left to right: $$(0,1) \\to (45,0) \\to (90,-1)_Q \\to (135,0) \\to (180,1) \\to (225,0)_R$$.\n- Step 2: $$R$$ is the **third zero** at $$x = 225$$. The board initially wrote $$k = 270$$, but $$x = 270$$ would give $$\\cos(2 \\times 270)° = \\cos 540° = \\cos 180° = -1$$, which is a **minimum**, not a zero. The zero is at $$x = 225$$. This is why you must always check: $$\\cos(2 \\times 225)° = \\cos 450° = \\cos 90° = 0$$ ✓.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "Q5(b) — What is the \"monotonic pieces\" method for finding the range of $$p$$ when \"$$\\cos 2x° = p$$ has exactly two solutions,\" and why can't you just say $$-1 < p < 1$$? (3 steps)", "answer": "- Step 1: Split the curve into its **monotonic pieces** on the domain. For $$y = \\cos 2x°$$ on $$[0, 225]$$: $$S_1: [0, 90]$$, $$y$$ falls $$1 \\to -1$$; $$S_2: [90, 180]$$, $$y$$ rises $$-1 \\to 1$$; $$S_3: [180, 225]$$, $$y$$ falls $$1 \\to 0$$.\n- Step 2: A horizontal line $$y = p$$ hits **each monotonic piece at most once** (since the function is strictly monotonic on each piece). Count the total crossings for each band of $$p$$: for $$0 < p < 1$$, the line hits all three pieces ($$S_1$$, $$S_2$$, and $$S_3$$), giving **3 solutions** — too many.\n- Step 3: The extra piece $$S_3$$ (which lives in $$[0, 1]$$) is what breaks the naive answer \"$$-1 < p < 1$$.\" For exactly two solutions, $$p$$ must be in a range where only two pieces are hit: $$-1 < p < 0$$ (hits $$S_1$$ and $$S_2$$ only, since $$S_3 \\ge 0$$), or $$p = 1$$ (hits the shared maximum at $$x = 0$$ and $$x = 180$$). Answer: $$-1 < p < 0$$ or $$p = 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "Q5(b) — Why does $$p = 1$$ give exactly two solutions (not three), even though the maximum value 1 appears on two monotonic pieces? (2 steps)", "answer": "- Step 1: The maximum $$y = 1$$ occurs at $$x = 0$$ (start of $$S_1$$) and $$x = 180$$ (end of $$S_2$$ / start of $$S_3$$). These are two distinct $$x$$-values, giving two solutions.\n- Step 2: The point $$(180, 1)$$ is a **shared endpoint** of $$S_2$$ and $$S_3$$ — it is counted once, not twice. The line $$y = 1$$ touches the peak at $$x = 0$$ and the peak at $$x = 180$$, and does not hit $$S_3$$ elsewhere (since $$S_3$$ falls away from 1). Total: exactly 2 solutions. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "Q5(b) — Why does $$p = 0$$ give three solutions, not two? (2 steps)", "answer": "- Step 1: $$y = 0$$ is hit at $$x = 45$$ (on $$S_1$$), $$x = 135$$ (on $$S_2$$), and $$x = 225$$ (the endpoint $$R$$, on $$S_3$$). That's three distinct $$x$$-values.\n- Step 2: The reason is that $$S_3$$ descends from $$y = 1$$ to $$y = 0$$, so the horizontal line $$y = 0$$ reaches the **endpoint** of $$S_3$$ at $$x = 225$$. This third crossing is what makes $$p = 0$$ fail the \"exactly two\" condition. This is precisely why the answer is not $$-1 < p \\le 0$$ or $$p = 1$$ — you must exclude $$p = 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "Practice P1 — For $$\\cos x° = p$$ on $$0 \\le x \\le 270$$ with \"exactly two solutions,\" the answer is $$-1 < p \\le 0$$. Why is $$p = 0$$ **included** here but **excluded** in Q5? (2 steps)", "answer": "- Step 1: For $$\\cos x°$$ on $$[0, 270]$$: $$S_1: [0, 180]$$, $$y$$ falls $$1 \\to -1$$; $$S_2: [180, 270]$$, $$y$$ rises $$-1 \\to 0$$. The line $$y = 0$$ hits $$x = 90$$ (on $$S_1$$) and $$x = 270$$ (endpoint of $$S_2$$) — that's **two** solutions. ✓\n- Step 2: In Q5, the domain was $$[0, 225]$$ and $$S_3$$ fell from 1 to 0, so $$y = 0$$ hit **three** points (at $$x = 45, 135, 225$$). Here, $$S_2$$ only reaches up to $$y = 0$$ (at the endpoint), so $$y = 0$$ hits exactly two points. **The monotonic-piece count depends entirely on the specific domain** — never copy a previous answer blindly; always recount for your own domain.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "What is the derivation that explains why $$f(ax)$$ is a horizontal stretch of scale factor $$\\frac{1}{a}$$, not $$a$$? (3 steps)", "answer": "- Step 1: Let $$g(x) = f(ax)$$. A point $$(X, Y)$$ lies on $$y = f(x)$$ when $$Y = f(X)$$. To find the matching point on $$y = g(x) = f(ax)$$, we need the **input to** $$f$$ **to equal** $$X$$: so $$ax = X$$, giving $$x = \\frac{X}{a}$$.\n- Step 2: Then $$g\\!\\left(\\frac{X}{a}\\right) = f(X) = Y$$. So the point $$(X, Y)$$ on $$y = f(x)$$ maps to $$\\left(\\frac{X}{a}, Y\\right)$$ on $$y = f(ax)$$. Every $$x$$-coordinate is **divided by** $$a$$; the $$y$$-coordinate is unchanged.\n- Step 3: Dividing all $$x$$-coordinates by $$a$$ is, by definition, a horizontal stretch of scale factor $$\\frac{1}{a}$$. With $$a = 2$$: every point moves to half its $$x$$-distance from the $$y$$-axis — a **squash** toward the $$y$$-axis. This is why $$f(2x)$$ compresses, not expands.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "What is the difference between $$f(ax)$$ and $$f\\!\\left(\\frac{x}{a}\\right)$$ in terms of stretch direction and scale factor? (2 steps)", "answer": "- Step 1: $$f(ax)$$: horizontal stretch of scale factor $$\\frac{1}{a}$$. If $$a > 1$$, this is a **squash** toward the $$y$$-axis (the curve gets narrower). Mapping: $$(x, y) \\mapsto \\left(\\frac{x}{a}, y\\right)$$.\n- Step 2: $$f\\!\\left(\\frac{x}{a}\\right)$$: horizontal stretch of scale factor $$a$$. If $$a > 1$$, this is a **widening** away from the $$y$$-axis. Mapping: $$(x, y) \\mapsto (ax, y)$$. The key memory anchor: the coefficient **inside** the function argument is the **reciprocal** of the scale factor. A bigger coefficient means a tighter squash.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "Q4(a) — The line $$l$$ is an asymptote to $$y = \\tan x$$ in the sketch. How do you state its equation, and what general form do all $$\\tan x$$ asymptotes share? (2 steps)", "answer": "- Step 1: The asymptotes of $$y = \\tan x$$ are at the **odd multiples of** $$\\frac{\\pi}{2}$$: $$x = \\pm\\frac{\\pi}{2}, \\pm\\frac{3\\pi}{2}, \\pm\\frac{5\\pi}{2}, \\dots$$. The general form is $$x = \\frac{(2n+1)\\pi}{2}$$ for any integer $$n$$.\n- Step 2: In the sketch ($$-2\\pi \\le x < 2\\pi$$), the asymptotes are at $$x = -\\frac{3\\pi}{2}, -\\frac{\\pi}{2}, \\frac{\\pi}{2}, \\frac{3\\pi}{2}$$. The line $$l$$ highlighted as the rightmost asymptote before $$2\\pi$$ is $$x = \\frac{3\\pi}{2}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}, {"question": "What is the reusable 5-step checklist for answering \"how many solutions of $$f(x) = g(x)$$ in an interval?\" (5 steps)", "answer": "- Step 1: **Sketch both graphs** on the same axes — get asymptotes and periods right.\n- Step 2: Solutions = **crossings**; count crossings, not algebra.\n- Step 3: For a periodic curve vs a near-flat line: count $$\\approx$$ (interval width) ÷ (period of one branch), then **fix the ends** — partial branches and boundary points on asymptotes.\n- Step 4: If the curve **changes direction** inside the interval, split it into **monotonic pieces** and count each piece separately (this is what catches the third intersection).\n- Step 5: **State a reason** naming both curves and the interval.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "Why is the word \"hence\" in an exam question a critical clue about the intended method? (2 steps)", "answer": "- Step 1: \"Hence\" means \"use what you just did.\" In Q4, part (b)(i) asks you to sketch $$y = \\frac{1}{x}+1$$, and part (b)(ii) says \"hence, giving a reason, state the number of solutions.\" The sketch is not optional decoration — it is the **method**.\n- Step 2: Students who ignore \"hence\" and try to solve $$\\tan x = \\frac{1}{x}+1$$ algebraically get stuck (it's impossible by hand). Harry: *\"the word 'hence' is a clue — they ask you to draw it for a reason.\"* The intended path is always: sketch → count crossings → state reason.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": true}, {"question": "What is Harry's exam advice about ticking off problem-solving checkpoints, and why does it work? (2 steps)", "answer": "- Step 1: As you use each piece of given information in a multi-step question, **put a little tick next to it** so you can see what you have used and what you haven't.\n- Step 2: On a multi-step question, the **unused given** is usually exactly the next step. Harry's nudge: *\"what haven't you used?\"* — if a ratio or condition is still unticked, it's almost certainly the key to the part you're stuck on. This prevents the common trap of forgetting to use a given piece of information.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": true}, {"question": "What is Harry's priority advice for achieving A*, and why does it outweigh topic-based homework? (2 steps)", "answer": "- Step 1: **Prioritise reflective past-paper practice** over topic homework. Work through full past papers, then **reflect on your mistakes** — understand exactly what went wrong and why.\n- Step 2: Past papers expose you to the *combination* of topics and the *trick phrasing* that topic drills miss. Harry: the $$\\cos 2x°$$ range-of-$$p$$ question *\"is for students that are aiming for A*... most students would miss this one completely.\"* Only past papers reliably produce these A*-level traps. If short on time, the two P1 past papers Harry sent beat the narrower trig-only set.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "Q4(c)(ii) — When counting solutions of $$\\tan x = \\frac{1}{x}+1$$ over an interval that includes the pole of $$\\frac{1}{x}+1$$ at $$x = 0$$, why does the branch $$\\left(-\\frac{\\pi}{2}, \\frac{\\pi}{2}\\right)$$ carry **two** crossings instead of one? (3 steps)", "answer": "- Step 1: On an ordinary branch (no pole inside), the near-horizontal line $$y \\approx 1$$ crosses once. But the branch $$\\left(-\\frac{\\pi}{2}, \\frac{\\pi}{2}\\right)$$ is **split by the pole** of $$\\frac{1}{x}+1$$ at $$x = 0$$.\n- Step 2: On the left half $$\\left(-\\frac{\\pi}{2}, 0\\right)$$: $$\\frac{1}{x}+1$$ dives to $$-\\infty$$ as $$x \\to 0^{-}$$, while $$\\tan x$$ rises from $$-\\infty$$ toward 0. Both are negative, and they cross **below the axis** — one crossing.\n- Step 3: On the right half $$\\left(0, \\frac{\\pi}{2}\\right)$$: $$\\frac{1}{x}+1$$ comes down from $$+\\infty$$ toward just above 1, while $$\\tan x$$ rises from 0 to $$+\\infty$$. They cross **above the axis** — one crossing. Total for this branch: **two crossings**, not one. This is why the \"width ÷ π\" shortcut must be corrected near the pole.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "Q2 — What are the two factorisations needed before applying the sign-flip cancellation in $$\\frac{4-x^2}{x^2-2x}$$? (2 steps)", "answer": "- Step 1: **Difference of two squares** on the numerator: $$4 - x^2 = (2-x)(2+x)$$. Recognise the form $$a^2 - b^2 = (a-b)(a+b)$$ with $$a = 2$$, $$b = x$$.\n- Step 2: **Common factor** on the denominator: $$x^2 - 2x = x(x - 2)$$. Factor out the $$x$$ first, leaving $$(x - 2)$$. Now the numerator has $$(2-x)$$ and the denominator has $$(x-2)$$ — same terms, opposite order. This is the sign-flip trigger: $$\\frac{2-x}{x-2} = -1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "Q4(c)(ii) — An equivalent regrouping of the 14 solutions is $$10 + 2 + 2$$ instead of Harry's $$10 + 1 + 3$$. What does the \"2\" represent in the $$10 + 2 + 2$$ version? (2 steps)", "answer": "- Step 1: The middle \"2\" pairs together the **two crossings on the pole-split branch** $$\\left(-\\frac{\\pi}{2}, \\frac{\\pi}{2}\\right)$$: one below the axis on $$\\left(-\\frac{\\pi}{2}, 0\\right)$$ and one above the axis on $$\\left(0, \\frac{\\pi}{2}\\right)$$.\n- Step 2: The last \"2\" counts the two ordinary branches from $$\\frac{\\pi}{2}$$ up to $$\\frac{5\\pi}{2}$$ (centred at $$\\pi$$ and $$2\\pi$$). Harry taught $$10 + 1 + 3$$ instead because the \"odd one out below the axis\" is exactly the crossing students miss — isolating it as a separate count makes it visible and checkable. Both groupings give 14; Harry's is pedagogically better for exam safety.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "Q5 — Build the key points of $$y = \\cos 2x°$$ by mapping the landmarks of $$y = \\cos x°$$. What mapping is applied, and what are the first six image points? (2 steps)", "answer": "- Step 1: The mapping is $$(x, y) \\mapsto \\left(\\frac{x}{2}, y\\right)$$ — each $$x$$-coordinate halves, $$y$$ is unchanged. Apply to the landmarks of $$\\cos x°$$:\n  + $$(0, 1) \\to (0, 1)$$\n  + $$(90, 0) \\to (45, 0)$$\n  + $$(180, -1) \\to (90, -1)$$\n  + $$(270, 0) \\to (135, 0)$$\n  + $$(360, 1) \\to (180, 1)$$\n  + $$(450, 0) \\to (225, 0)$$\n- Step 2: The maximum-to-maximum distance shrinks from $$360°$$ to $$180°$$ — the period halves, confirming the rule $$\\frac{360}{2} = 180°$$. This point-by-point construction is exactly how Harry built the curve on the board.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "When solving a quadratic inequality, why must you keep the leading coefficient **positive** before reading the sign rule? (2 steps)", "answer": "- Step 1: The sign rule (\"positive outside the roots, negative between\") applies to an **upward** parabola ($$a > 0$$). If the leading coefficient is negative, the parabola opens **downward**, and the rule flips: the expression is positive *between* the roots and negative *outside*.\n- Step 2: By always rearranging so the leading coefficient is positive (e.g. $$x^2 + 2x - 8 \\ge 0$$, not $$-x^2 - 2x + 8 \\le 0$$), you can always use the same simple rule: \"$$\\ge 0$$ outside the roots.\" This eliminates the need to think about the parabola's direction each time, reducing the chance of a sign-flip error.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "Practice P3 — For the inequality $$2x^2 + 3x \\le 5$$, how do you factorise after rearranging to standard order, when the leading coefficient is not 1? (3 steps)", "answer": "- Step 1: Rearrange: $$2x^2 + 3x - 5 \\le 0$$. Need two numbers that multiply to $$a \\times c = 2 \\times (-5) = -10$$ and add to $$b = 3$$. The pair $$(+5, -2)$$ works: $$5 \\times (-2) = -10$$ ✓, $$5 + (-2) = 3$$ ✓.\n- Step 2: Split the middle term: $$2x^2 + 5x - 2x - 5 = x(2x + 5) - 1(2x + 5) = (2x + 5)(x - 1)$$. Roots: $$x = -\\frac{5}{2}$$ and $$x = 1$$.\n- Step 3: Upward parabola ($$a = 2 > 0$$), \"$$\\le 0$$\" means **between** the roots: $$-\\frac{5}{2} \\le x \\le 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "Practice P4 — When $$A, B, C, D$$ lie in order on a line with $$\\frac{AB}{BC} = \\frac{1}{4}$$ and $$\\frac{BC}{CD} = \\frac{2}{3}$$, why is $$BC$$ the best anchor for the assign-a-value trick? (2 steps)", "answer": "- Step 1: $$BC$$ appears in **both** given ratios. From $$\\frac{AB}{BC} = \\frac{1}{4}$$: $$AB = \\frac{1}{4} \\cdot BC$$. From $$\\frac{BC}{CD} = \\frac{2}{3}$$: $$CD = \\frac{3}{2} \\cdot BC$$. Making $$BC$$ the anchor means both other lengths are simple fractions of it.\n- Step 2: Choose $$BC = 4$$ (the smallest value that makes $$AB = 1$$ an integer and $$CD = 6$$ an integer). Then $$AD = AB + BC + CD = 1 + 4 + 6 = 11$$, and $$\\frac{AB}{AD} = \\frac{1}{11}$$. The anchor appears in both ratios, so choosing it to clear all denominators is the cleanest path.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "Practice P6 — The minimum $$(180, -1)$$ of $$y = \\cos x°$$ maps to what point under the transformation to $$y = \\cos 3x°$$, and how do you verify it? (2 steps)", "answer": "- Step 1: The transformation $$f(x) \\to f(3x)$$ maps $$(x, y) \\to \\left(\\frac{x}{3}, y\\right)$$. So $$(180, -1) \\to \\left(\\frac{180}{3}, -1\\right) = (60, -1)$$.\n- Step 2: Verify: $$\\cos(3 \\times 60)° = \\cos 180° = -1$$ ✓. The point $$(60, -1)$$ really does lie on $$y = \\cos 3x°$$. This confirms the $$x$$-coordinate is **divided by 3** (not multiplied), and the period is $$\\frac{360}{3} = 120°$$.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "For Q5(b), why is the naive answer \"$$-1 < p < 1$$\" the headline trap of the lesson? (2 steps)", "answer": "- Step 1: Students think: \"$$\\cos$$ ranges from $$-1$$ to $$1$$, and I need exactly two solutions, so I exclude the endpoints where there's only one.\" This gives $$-1 < p < 1$$. But this reasoning ignores the **shape** of the curve on the specific domain.\n- Step 2: On $$[0, 225]$$, the curve goes down to $$-1$$, back up to $$1$$, and then **partially down again** to $$0$$ at $$R(225, 0)$$. This extra falling piece $$S_3$$ means every positive $$p < 1$$ (and $$p = 0$$) is hit **three times** — once on each of $$S_1$$, $$S_2$$, and $$S_3$$. The correct answer requires excluding all positive values: $$-1 < p < 0$$ or $$p = 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "What is the general principle behind the \"exactly $$n$$ solutions\" range-of-$$p$$ problem, applicable to any non-monotonic curve on a restricted domain? (2 steps)", "answer": "- Step 1: Split the curve into **monotonic pieces** on the given domain. On each piece, a horizontal line $$y = p$$ can intersect at most once (since the function is strictly monotonic there).\n- Step 2: For each band of $$p$$ values, count how many pieces the line $$y = p$$ crosses. The \"exactly $$n$$\" condition selects only those bands where the total count equals $$n$$. The key insight: a curve that **reverses direction** (goes down, then up, then partially down again) creates more intersection opportunities than a simple \"down-then-up\" shape. Always account for every piece, especially the **partial** piece at the end of the domain.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": true}, {"question": "Why does the boundary point $$x = -10\\pi$$ in Q4(c)(ii) not cause any counting difficulty, and when *would* a boundary point cause trouble? (2 steps)", "answer": "- Step 1: $$x = -10\\pi$$ is a **zero** of $$\\tan x$$ (since $$\\tan(-10\\pi) = 0$$), not an asymptote. A zero is a finite point on the curve, and the near-horizontal line $$y \\approx 1$$ is well above it, so there is no crossing at or near this boundary. All ten branches to its right are counted cleanly.\n- Step 2: A boundary **would** cause trouble if it landed on or very near an **asymptote** of $$\\tan x$$ (where the curve is undefined or blows up), or if the line $$y = \\frac{1}{x}+1$$ passed through the boundary value of $$\\tan x$$ exactly. In those cases you must check whether the boundary crossing counts or not. The rule: always verify what kind of point (zero, asymptote, or ordinary) sits at each boundary.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "When the exam question shows a labelled point on a curve (like $$Q$$ or $$R$$ in Q5) and asks you to \"state the coordinates,\" what must you read from the graph vs derive from the equation? (2 steps)", "answer": "- Step 1: Use the **equation** to derive the coordinates precisely, not just eyeball the sketch. For $$Q$$ on $$y = \\cos 2x°$$: the minimum where $$\\cos 2x° = -1$$ means $$2x = 180$$, so $$x = 90$$, $$y = -1$$. Answer: $$Q = (90°, -1)$$.\n- Step 2: For $$R(k, 0)$$: it's a zero of $$\\cos 2x°$$, so $$2x = 450$$ (the third zero), giving $$x = 225$$. The sketch tells you *which* zero it is (the third one, not the first or second), and the equation gives you the exact value. The board's initial $$k = 270$$ came from misidentifying which zero $$R$$ was — always cross-check with the equation.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": true}, {"question": "What is the difference between how a **vertical** translation and a **horizontal** translation affect asymptotes, and why? (2 steps)", "answer": "- Step 1: $$y = f(x) + a$$ (vertical translation up by $$a$$): the **horizontal** asymptote moves up by $$a$$ (from $$y = c$$ to $$y = c + a$$); the **vertical** asymptote is unchanged (we moved up, not sideways, so $$x$$-values where the function blows up are the same).\n- Step 2: $$y = f(x + a)$$ (horizontal translation left by $$a$$): the **vertical** asymptote moves left by $$a$$ (from $$x = c$$ to $$x = c - a$$); the **horizontal** asymptote is unchanged (we moved sideways, so the long-run value the function approaches is the same). The rule: a translation moves the asymptotes **in the same direction** as the curve.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": true}, {"question": "Q4(b)(i) — When sketching $$y = \\frac{1}{x} + 1$$ on top of $$y = \\tan x$$, what are the three essential features you must get right for the intersection count to be correct? (3 steps)", "answer": "- Step 1: **Vertical asymptote** at $$x = 0$$ (same as plain $$\\frac{1}{x}$$, since the $$+1$$ is a vertical shift).\n- Step 2: **Horizontal asymptote** at $$y = 1$$ (shifted up from $$y = 0$$ by the $$+1$$). For large positive $$x$$, the curve sits just above $$y = 1$$; for large negative $$x$$, it approaches $$y = 1$$ from below.\n- Step 3: **Pole behaviour** at $$x = 0$$: the curve shoots to $$+\\infty$$ as $$x \\to 0^{+}$$ and to $$-\\infty$$ as $$x \\to 0^{-}$$. This is what creates the extra crossing below the axis on the branch $$\\left(-\\frac{\\pi}{2}, 0\\right)$$ — the most-missed feature.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "Practice P5 — In simplifying $$5 + \\frac{9-x^2}{x^2-3x}$$, after the sign-flip cancellation gives $$\\frac{-(3+x)}{x}$$, why must you write $$5 - \\frac{3+x}{x}$$ and not $$5 + \\frac{-(3+x)}{x}$$ before splitting? (2 steps)", "answer": "- Step 1: Writing $$5 - \\frac{3+x}{x}$$ makes the minus sign **explicitly distribute** over the entire numerator $$(3+x)$$: $$5 - \\frac{3}{x} - \\frac{x}{x} = 5 - \\frac{3}{x} - 1 = 4 - \\frac{3}{x}$$.\n- Step 2: If you leave it as $$5 + \\frac{-(3+x)}{x}$$ and then split without care, you might write $$5 - \\frac{3}{x} + \\frac{x}{x}$$ (applying the minus only to the 3), giving $$5 - \\frac{3}{x} + 1 = 6 - \\frac{3}{x}$$ — wrong. The safe habit: always convert to an explicit subtraction, then split. The minus governs the **whole bracket**.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "What does Harry mean by \"these are very tricky problems, usually at the end of the paper,\" and what exam strategy does this imply? (2 steps)", "answer": "- Step 1: Graph-sketching intersection-count questions (like Q4) are placed at the **end of the paper** because they are A/A* discriminators. They test conceptual visualisation, not routine calculation. Most students lose marks here because they try algebra instead of sketching.\n- Step 2: The exam strategy: when you see a \"number of solutions\" question at the end of a paper, **immediately reach for the sketch method**. Don't attempt algebraic solution. Draw both curves carefully, mark every asymptote, and count crossings. The time investment is in the quality of the sketch, not in algebraic manipulation.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}], "count": 50}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "When a problem gives you only ratios of lengths and asks for another ratio, what trick should you immediately deploy, and WHY does it work? (3 steps)", "answer": "- Step 1: **Assign convenient integer values** to the lengths. Pick the smallest convenient number for one \"anchor\" quantity so that every other length comes out as a nice integer.\n- Step 2: Compute all the other lengths from the given ratios, then calculate the target ratio directly.\n- Step 3: This works because a ratio fixes only **relative** sizes, never actual lengths. The final ratio is **independent** of your choice — any valid choice gives the same answer. That is why you are free to invent.\n\nThe key insight: if the question never asks for an actual length, only a ratio, the absolute scale is irrelevant.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "In a ratio problem, how do you choose which quantity to anchor, and what makes a \"good\" choice? Use the Q1 example where $$\\dfrac{QX}{PX}=\\dfrac{1}{6}$$ and $$\\dfrac{QX}{XR}=\\dfrac{2}{3}$$. (3 steps)", "answer": "- Step 1: **Anchor on the quantity that appears in the most given ratios.** Here $$QX$$ appears in both ratios, so make it the anchor.\n- Step 2: From the ratios, $$PX = 6 \\cdot QX$$ and $$XR = \\tfrac{3}{2} \\cdot QX$$. To make both integers, $$QX$$ must be **even**. The smallest even choice is $$QX = 2$$, giving $$PX = 12$$ and $$XR = 3$$.\n- Step 3: Choosing $$QX = 1$$ is legal but forces $$XR = 1.5$$ — messier arithmetic for no benefit. Always pick the **smallest** value that clears all denominators.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "When computing a ratio like $$\\dfrac{QX}{MX} = \\dfrac{2}{4.5}$$, what is the \"burger method\" Harry taught, and what's the common direction mistake? (2 steps)", "answer": "- Step 1: Stack the division $$\\dfrac{2}{4.5} = \\dfrac{2}{9/2}$$. Flip the bottom fraction and multiply: $$\\dfrac{2}{1} \\times \\dfrac{2}{9} = \\dfrac{4}{9}$$.\n- Step 2: The common mistake is putting the product upside-down — writing $$\\dfrac{9}{4}$$ instead. Remember: **numerator × numerator stays on top**, denominator × denominator stays on the bottom. Harry's live correction: \"two times two goes on the *top*.\"", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "In Q1, $$\\angle QXR = 90°$$ is given. Is this angle used in the assign-a-value ratio method? What role does it actually play?", "answer": "No — it is a **distractor** for the ratio method. The right angle is only needed if you attack the problem with Pythagoras or coordinate geometry. The assign-a-value trick never uses it, because you only need the ratios of lengths along the line $$PR$$. Exam craft: don't let extra geometric information trick you into a harder method when a simpler one suffices.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "When you see a fraction like $$\\dfrac{4-x^2}{x^2-2x}$$, what is the very first algebraic move you should make? (Q2)", "answer": "**Factorise both the numerator and the denominator.** Look for difference of two squares on top ($$4 - x^2 = (2-x)(2+x)$$) and a common factor on the bottom ($$x^2 - 2x = x(x-2)$$). Only after factorising can you see what cancels — you can never cancel terms in an unfactorised expression.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "After factorising $$\\dfrac{(2-x)(2+x)}{x(x-2)}$$, you notice $$(2-x)$$ in the numerator and $$(x-2)$$ in the denominator — same terms, opposite order. What is the key identity, and what does the fraction collapse to? (2 steps)", "answer": "- Step 1: The identity is $$a - b = -(b - a)$$, i.e. swapping the terms in a difference **flips the sign**. So $$(2-x) = -(x-2)$$.\n- Step 2: Substituting: $$\\dfrac{-(x-2)(2+x)}{x(x-2)}$$. The $$(x-2)$$ cancels, leaving $$\\dfrac{-(2+x)}{x}$$.\n\nThe fraction $$\\dfrac{a-b}{b-a}$$ is **always** $$-1$$ — this is the single most useful cancelling identity in algebraic fractions.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "Harry says you should recognise $$\\dfrac{a-b}{b-a} = -1$$ \"on sight.\" Give three examples and explain why spotting this instantly saves time under exam pressure. (2 steps)", "answer": "- Step 1: Examples: $$\\dfrac{x-y}{y-x} = -1$$, $$\\dfrac{P-Q}{Q-P} = -1$$, $$\\dfrac{2-x}{x-2} = -1$$. In every case the numerator and denominator are the same difference with terms swapped.\n- Step 2: Under time pressure, if you don't spot it instantly, you might try to expand or do long division — wasting minutes. Or worse, you might \"cancel\" them to $$+1$$ instead of $$-1$$. Harry: \"it'd be very easy to cancel them out thinking they were the same, without putting the minus one.\"", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "After cancelling to get $$4 + \\dfrac{-(2+x)}{x}$$ in Q2, what is the trap when distributing the minus sign, and which wrong option does it produce? (2 steps)", "answer": "- Step 1: The minus sign must distribute over **both** terms of $$(2+x)$$. So $$4 - \\dfrac{2+x}{x} = 4 - \\dfrac{2}{x} - \\dfrac{x}{x} = 4 - \\dfrac{2}{x} - 1 = 3 - \\dfrac{2}{x}$$.\n- Step 2: The trap is forgetting the implied bracket and writing $$4 - \\dfrac{2}{x} + \\dfrac{x}{x} = 5 - \\dfrac{2}{x}$$. This gives the deliberately-offered wrong option $$5 - \\tfrac{2}{x}$$. Always distribute the minus over **every term** inside the bracket.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "When solving a quadratic inequality like $$x^2 \\ge 8 - 2x$$, what must you do BEFORE finding any roots, and why? (Q3) (2 steps)", "answer": "- Step 1: **Rearrange to standard order** — everything on one side, in the order $$x^2$$, then $$x$$, then constant, with a positive leading coefficient. Here: $$x^2 + 2x - 8 \\ge 0$$.\n- Step 2: Reading roots off an unrearranged or out-of-order expression is the classic way to flip a sign and pick the wrong option. Keeping the leading coefficient positive ensures the rule \"$$\\ge 0 \\Rightarrow$$ outside the roots\" applies directly for an upward parabola.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "How do you use the sum and product of roots as a fast CHECK on your factorisation of $$x^2 + 2x - 8$$? (2 steps)", "answer": "- Step 1: For $$x^2 + bx + c$$, the roots must satisfy $$\\alpha + \\beta = -b$$ and $$\\alpha\\beta = c$$. Here we need a product of $$-8$$ and a sum of $$-2$$.\n- Step 2: Test the pair $$(+4, -2)$$: product $$= -8$$ ✓, but sum $$= +2$$ ✗. Test $$(-4, +2)$$: product $$= -8$$ ✓ and sum $$= -2$$ ✓. So the factorisation is $$(x+4)(x-2)$$, roots $$x = -4$$ and $$x = 2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "For an upward parabola ($$a > 0$$) with roots $$\\alpha < \\beta$$, where is the quadratic $$\\ge 0$$, and where is it $$\\le 0$$? What's the mnemonic? (2 steps)", "answer": "- Step 1: $$ax^2 + bx + c \\ge 0 \\iff x \\le \\alpha \\text{ or } x \\ge \\beta$$ (outside the roots). $$ax^2 + bx + c \\le 0 \\iff \\alpha \\le x \\le \\beta$$ (between the roots).\n- Step 2: Mnemonic: **a happy (upward) parabola is positive on the outside, negative in the middle.** With \"$$\\ge$$ / $$\\le$$\" the roots themselves are included.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "In Q3, after factorising to $$(x+4)(x-2) \\ge 0$$, how do you read off the solution using the parabola's sign? (2 steps)", "answer": "- Step 1: The leading coefficient is $$+1 > 0$$, so the parabola opens upward. It is $$\\ge 0$$ **outside** (and at) its roots $$x = -4$$ and $$x = 2$$.\n- Step 2: Therefore $$(x+4)(x-2) \\ge 0 \\iff x \\le -4 \\text{ or } x \\ge 2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "What are the zeros and vertical asymptotes of $$y = \\tan x$$, and what is the key rhythm for placing every feature? (2 steps)", "answer": "- Step 1: **Zeros** wherever $$\\sin x = 0$$: at $$x = \\dots, -2\\pi, -\\pi, 0, \\pi, 2\\pi, \\dots$$ (every $$\\pi$$). **Vertical asymptotes** wherever $$\\cos x = 0$$: at $$x = \\pm\\dfrac{\\pi}{2}, \\pm\\dfrac{3\\pi}{2}, \\dots$$ (odd multiples of $$\\dfrac{\\pi}{2}$$, i.e. $$x = \\dfrac{(2n+1)\\pi}{2}$$).\n- Step 2: Harry's rhythm: **something interesting happens every $$\\dfrac{\\pi}{2}$$ radians** — it is either a zero or an asymptote, alternating. That single pattern places every feature.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Describe one full \"branch\" of $$y = \\tan x$$ and explain why a horizontal line $$y = c$$ crosses each branch exactly once. (3 steps)", "answer": "- Step 1: One branch lives in each open interval of width $$\\pi$$ between consecutive asymptotes (e.g. $$(-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2})$$).\n- Step 2: On that branch, $$\\tan x$$ rises **continuously and strictly** from $$-\\infty$$ to $$+\\infty$$.\n- Step 3: A horizontal line $$y = c$$ sits at a fixed finite height. By the Intermediate Value Theorem, the branch must pass through that height **exactly once**. Hence: one solution per $$\\pi$$-wide branch.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "What are the asymptotes of $$y = \\dfrac{1}{x}$$, and how do they change when the graph becomes $$y = \\dfrac{1}{x} + 1$$? (2 steps)", "answer": "- Step 1: For $$y = \\dfrac{1}{x}$$: vertical asymptote $$x = 0$$ (the $$y$$-axis), horizontal asymptote $$y = 0$$ (the $$x$$-axis).\n- Step 2: The $$+1$$ is a vertical translation **up by 1**. A vertical shift moves everything — including the asymptotes. So the horizontal asymptote rises from $$y = 0$$ to $$\\boxed{y = 1}$$. The vertical asymptote $$x = 0$$ is unchanged (we moved up, not sideways).", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "What was Phuc's mistake regarding the asymptote of $$y = \\dfrac{1}{x} + 1$$, and what is the general rule that prevents it?", "answer": "The horizontal asymptote was initially kept at $$y = 0$$ (its position for plain $$y = \\frac{1}{x}$$). The fix: **a vertical shift moves the asymptotes with the curve.** For $$f(x) + a$$: the horizontal asymptote rises by $$a$$; the vertical asymptote is unchanged. Always re-draw the asymptote **first**, then sketch the branches relative to it.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "When a question asks you to solve $$f(x) = g(x)$$, what is the most powerful graphical interpretation, and why is it especially useful for equations you can't solve algebraically? (2 steps)", "answer": "- Step 1: A solution of $$f(x) = g(x)$$ is exactly an $$x$$ where the two curves have the **same height** — i.e. a **crossing point**. So $$\\#\\{\\text{solutions}\\} = \\#\\{\\text{intersection points}\\}$$.\n- Step 2: For equations like $$\\tan x = \\frac{1}{x} + 1$$ that are impossible to solve by hand, you **sketch both graphs once and count crossings**. The same picture answers the question for any interval — you just count the crossings inside it. Harry: \"visualising the intersection of two graphs is a highly effective way to solve equations.\"", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "When a question says \"giving a reason, state the number of solutions,\" what exact wording wins the reason mark? (Q4b(ii)) (2 steps)", "answer": "- Step 1: The count alone scores nothing without ng PX = 12 and XR = 3.\n\n[One-sentence takeaway: When given only ratios and asked for a ratio, assign the smallest convenient value that respects all given ratios to simplify calculations.]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "What is the trick for identifying a sign-flip pattern like $\\frac{x-y}{y-x} = -1$ in algebraic simplification problems? (IAL P1 — Graphs, Transformations & Trig lesson, Q2)", "answer": "- Step 1: Recognize that when you see a fraction where the numerator and denominator have the same terms in opposite order, it simplifies to -1.\n- Step 2: Use the identity $(a-b) = -(b-a)$ to factor out the -1.\n+ Examples: $\\frac{x-y}{y-x} = -1$, $\\frac{P-Q}{Q-P} = -1$, $\\frac{2-x}{x-2} = -1$\n\n[One-sentence takeaway: When you see a fraction with the same terms in opposite order in numerator and denominator, immediately recognize it as -1.]", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "What is the first thing you should write down when solving a quadratic inequality like $x^2 \\ge 8 - 2x$?", "answer": "- Step 1: Rewrite the inequality in standard order with all terms on one side: $x^2 + 2x - 8 \\ge 0$.\n- Step 2: Factor the quadratic expression: $(x + 4)(x - 2) \\ge 0$\n+ This allows you to identify the roots and determine the intervals where the inequality holds.\n\n[One-sentence takeaway: Always rearrange a quadratic inequality to standard order before identifying the roots and determining the solution intervals.]", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "For the tan x graph, what are the positions of its zeros and vertical asymptotes?", "answer": "- Step 1: Zeros occur at $x = n\\pi$ where $n$ is any integer (..., -2π, -π, 0, π, 2π, ...).\n- Step 2: Vertical asymptotes occur at $x = \\frac{(2n+1)\\pi}{2}$ where $n$ is any integer (..., $-\\frac{3\\pi}{2}$, $-\\frac{\\pi}{2}$, $\\frac{\\pi}{2}$, $\\frac{3\\pi}{2}$, ...).\n+ Each branch of the tan x graph spans $\\pi$ radians between consecutive asymptotes.\n\n[One-sentence takeaway: The tan x graph has zeros at every multiple of π and vertical asymptotes at every odd multiple of $\\frac{\\pi}{2}$.]", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How do you determine the horizontal asymptote of $y = \\frac{1}{x} + 1$?", "answer": "- Step 1: Recognize that $y = \\frac{1}{x} + 1$ is a vertical translation of $y = \\frac{1}{x}$ by 1 unit upward.\n- Step 2: The horizontal asymptote of $y = \\frac{1}{x}$ is $y = 0$.\n- Step 3: Translate this asymptote upward by 1 unit to get $y = 1$.\n+ The vertical asymptote $x = 0$ remains unchanged since the translation is vertical.\n\n[One-sentence takeaway: A vertical translation shifts the horizontal asymptote but does not affect the vertical asymptote.]", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why is counting intersections of graphs an effective method for solving equations like $\\tan x = \\frac{1}{x} + 1$?", "answer": "- Step 1: Recognize that a solution to $f(x) = g(x)$ is an x-value where the graphs of $y = f(x)$ and $y = g(x)$ intersect.\n- Step 2: Graphically, count the number of intersection points in the specified interval.\n+ For periodic functions like tan x and nearly flat lines like $\\frac{1}{x} + 1$, there is typically one solution per $\\pi$-wide branch of tan x.\n\n[One-sentence takeaway: Counting graph intersections visually captures all solutions of an equation without needing to solve it algebraically.]", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What is the period of $y = \\cos 2x^\\circ$ and how is it derived?", "answer": "- Step 1: The period of $y = \\cos x^\\circ$ is $360^\\circ$.\n- Step 2: For $y = \\cos(kx)^\\circ$, the period is $\\frac{360^\\circ}{k}$.\n- Step 3: For $y = \\cos 2x^\\circ$, the period is $\\frac{360^\\circ}{2} = 180^\\circ$.\n+ This is because replacing $x$ with $2x$ compresses the graph horizontally by a factor of 2.\n\n[One-sentence takeaway: The period of a cosine function $y = \\cos(kx)^\\circ$ is $\\frac{360^\\circ}{k}$, reflecting the horizontal compression/stretch.]", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How do you determine the range of $p$ for which $\\cos 2x^\\circ = p$ has exactly two solutions on $0 \\le x \\le 225$?", "answer": "- Step 1: Split the domain into monotonic pieces: $S_1: [0,90]$, $S_2: [90,180]$, $S_3: [180,225]$.\n- Step 2: Count solutions for different values of $p$ across these pieces.\n+ For $-1 < p < 0$, there are 2 solutions (1 on $S_1$ and 1 on $S_2$).\n+ For $p = 1$, there are 2 solutions (at $x = 0$ and $x = 180$).\n+ For other values of $p$, there are either 1 or 3 solutions.\n\n[One-sentence takeaway: To find the range of $p$ with exactly two solutions, split the domain into monotonic pieces and count solutions per piece.]", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "What is the horizontal stretch rule for graph transformations and how does it apply to $f(ax)$?", "answer": "- Step 1: The rule states that replacing $x$ with $ax$ results in a horizontal stretch with scale factor $\\frac{1}{a}$.\n- Step 2: For $a > 1$, this is a compression toward the y-axis.\n- Step 3: For $0 < a < 1$, this is a stretch away from the y-axis.\n+ The point $(x, y)$ on $y = f(x)$ maps to $(\\frac{x}{a}, y)$ on $y = f(ax)$.\n\n[One-sentence takeaway: For $f(ax)$, each x-coordinate is divided by $a$ for the transformation, resulting in a horizontal stretch with scale factor $\\frac{1}{a}$.]", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "What is the key trap to avoid when determining the range of $p$ for which $\\cos 2x^\\circ = p$ has exactly two solutions?", "answer": "- Step 1: Recognize that the common mistake is to answer $-1 < p < 1$.\n- Step 2: Understand that for $0 < p < 1$ and $p = 0$, there are actually 3 solutions due to the extra piece $S_3$ on $[180,225]$.\n- Step 3: Correct answer is $-1 < p < 0$ or $p = 1$.\n+ The trap arises because the curve rises back to $y = 1$ at $x = 180$ and then falls to $y = 0$ at $x = 225$.\n\n[One-sentence takeaway: The trap is assuming all values between -1 and 1 yield exactly two solutions; actually, only $-1 < p < 0$ or $p = 1$ give exactly two solutions due to the curve's behavior on the extended domain.]", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "What is the \"burger method\" for simplifying a fraction over a fraction, and how was it used in Q1?", "answer": "- Step 1: Recognize when you have a fraction over a fraction, such as $\\frac{2}{\\frac{9}{2}}$.\n- Step 2: Flip the bottom fraction and multiply: $\\frac{2}{1} \\times \\frac{2}{9}$.\n- Step 3: Multiply numerators and denominators: $\\frac{4}{9}$.\n+ This method was used to simplify $\\frac{QX}{MX} = \\frac{2}{4.5} = \\frac{2}{\\frac{9}{2}}$ in the geometry ratio problem.\n\n[One-sentence takeaway: The \"burger method\" simplifies a fraction over a fraction by flipping the bottom and multiplying, keeping the correct orientation of products.]", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "What is the key strategy for solving quadratic inequalities, and why is it important to rearrange the inequality to standard order first?", "answer": "- Step 1: Rearrange the inequality to standard form $ax^2 + bx + c \\ge 0$ or $\\le 0$.\n- Step 2: Factorize the quadratic expression and find the roots.\n- Step 3: Use the sign of the leading coefficient to determine the parabola's direction and identify the intervals where the inequality holds.\n+ Rearranging first ensures the leading coefficient is positive, making it easier to apply the standard sign analysis.\n\n[One-sentence takeaway: Rearranging to standard order with a positive leading coefficient simplifies the sign analysis of the parabola for solving quadratic inequalities.]", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "How does the \"one solution per π\" rule apply to the equation $\\tan x = \\frac{1}{x} + 1$?", "answer": "- Step 1: Recognize that for large values of $x$, $\\frac{1}{x} + 1$ approaches 1, creating a nearly horizontal line.\n- Step 2: On each $\\pi$-wide branch of $\\tan x$, the function rises from $-\\infty$ to $+\\infty$.\n- Step 3: A horizontal line will intersect each branch exactly once.\n+ For an interval of width $N\\pi$, there are approximately $N$ solutions.\n\n[One-sentence takeaway: The \"one solution per π\" rule works because each $\\pi$-wide branch of $\\tan x$ spans all real values, guaranteeing one intersection with a nearly horizontal line.]", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "What is the correct image of the minimum point $(180, -1)$ of $y = \\cos x^\\circ$ under the transformation to $y = \\cos 2x^\\circ$?", "answer": "- Step 1: Recognize that the transformation $f(x) \\to f(2x)$ is a horizontal compression by a factor of 2.\n- Step 2: Apply the mapping $(x, y) \\to (\\frac{x}{2}, y)$.\n- Step 3: For $(180, -1)$, this becomes $(\\frac{180}{2}, -1) = (90, -1)$.\n+ This matches the point $Q = (90^\\circ, -1)$ identified in the worked example.\n\n[One-sentence takeaway: The horizontal compression by factor 2 maps the point $(180, -1)$ on $y = \\cos x^\\circ$ to $(90, -1)$ on $y = \\cos 2x^\\circ$.]", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "What is the key mistake students often make when determining the value of $k$ for the graph of $y = \\cos 2x^\\circ$ ending at point $R(k, 0)$?", "answer": "- Step 1: Recognize the zeros of $y = \\cos 2x^\\circ$ occur where $2x = 90, 270, 450, \\ldots$ or $x = 45, 135, 225, \\ldots$.\n- Step 2: Identify that $R(k, 0)$ is the third zero point on the graph.\n- Step 3: Correct value is $k = 225^\\circ$, not the next minimum at $270^\\circ$.\n+ The mistake is misidentifying which feature of the graph corresponds to the given point.\n\n[One-sentence takeaway: The value of $k$ for point $R(k, 0)$ is determined by identifying the correct zero point in the sequence of zeros of the cosine function.]", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "What is the key advice Harry gave for solving problems that ask \"hence, giving a reason\" for the number of solutions?", "answer": "- Step 1: Recognize that the word \"hence\" indicates you should use the graph you've already drawn.\n- Step 2: Count the intersections of the two graphs in the specified interval.\n- Step 3: Justify your answer with a complete sentence naming both graphs and the interval.\n+ The recommended phrasing is: \"There are $N$ solutions because the graph of [curve 1] intersects the graph of [curve 2] $N$ times in the interval given.\"\n\n[One-sentence takeaway: When asked to \"hence, giving a reason\" for the number of solutions, use your graph to count intersections and justify with the standard phrasing.]", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "What is the key reason why the horizontal asymptote of $y = \\frac{1}{x} + 1$ is $y = 1$ and not $y = 0$?", "answer": "- Step 1: Recognize that $y = \\frac{1}{x} + 1$ is a vertical translation of $y = \\frac{1}{x}$ by 1 unit upward.\n- Step 2: The horizontal asymptote of $y = \\frac{1}{x}$ is $y = 0$.\n- Step 3: A vertical translation moves the horizontal asymptote by the same amount.\n+ The vertical asymptote $x = 0$ remains unchanged since the translation is vertical.\n\n[One-sentence takeaway: Vertical translations move horizontal asymptotes but do not affect vertical asymptotes.]", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "What is the key strategy for solving ratio problems that involve multiple ratios?", "answer": "- Step 1: Identify the quantity that appears in multiple ratios as the anchor.\n- Step 2: Choose the smallest convenient value for the anchor that will produce integers for other quantities.\n- Step 3: Use the given ratios to calculate the other lengths based on the chosen value.\n+ For Q1, QX is the anchor as it appears in both $\\frac{QX}{PX} = \\frac{1}{6}$ and $\\frac{QX}{XR} = \\frac{2}{3}$.\n\n[One-sentence takeaway: When solving ratio problems with multiple ratios, identify the quantity that appears in multiple ratios as the anchor and choose a convenient value that simplifies calculations.]", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "What is the key reason for factoring a quadratic inequality and checking the sum and product of roots?", "answer": "- Step 1: Factor the quadratic to identify the roots.\n- Step 2: Use the sum and product of roots to verify the factorization.\n- Step 3: Apply the sign analysis of the parabola to determine the solution intervals.\n+ The sum and product of roots ($\\alpha + \\beta = -\\frac{b}{a}$, $\\alpha \\beta = \\frac{c}{a}$) provide a quick check on the factorization.\n\n[One-sentence takeaway: Factoring a quadratic inequality and checking the sum and product of roots ensures the factorization is correct, which is crucial for determining the correct solution intervals.]", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "What is the key reason why the graph of $y = \\cos 2x^\\circ$ is a horizontal compression of $y = \\cos x^\\circ$?", "answer": "- Step 1: Recognize that replacing $x$ with $2x$ in the cosine function results in a horizontal compression.\n- Step 2: The compression factor is $\\frac{1}{2}$, meaning each x-coordinate is halved.\n- Step 3: This results in the period being halved from $360^\\circ$ to $180^\\circ$.\n+ The mapping $(x, y) \\to (\\frac{x}{2}, y)$ transforms the graph of $y = \\cos x^\\circ$ into $y = \\cos 2x^\\circ$.\n\n[One-sentence takeaway: The graph of $y = \\cos 2x^\\circ$ is a horizontal compression of $y = \\cos x^\\circ$ by a factor of $\\frac{1}{2}$, resulting in a period of $180^\\circ$.]\n```\n\n## JARGON TABLE\n\n|  | What does it mean? |\n| --- | --- |\n| **Geometry Ratios** | |\n| Assign convenient lengths | When only ratios are given, choose the smallest convenient values for lengths to simplify calculations while respecting all given ratios. |\n| **Algebraic Simplification** | |\n| Sign-flip pattern | When a fraction has the same terms in opposite order in numerator and denominator (e.g., $\\frac{x-y}{y-x}$), it simplifies to -1. |\n| **Quadratic Inequalities** | |\n| Standard order | The conventional form of a quadratic inequality: $x^2$ term, then $x$ term, then constant, all on one side. |\n| Upward parabola sign analysis | For $a > 0$, the parabola is positive outside the roots and negative between them. |\n| **Trigonometric Graphs** | |\n| Tan x zeros | Occur at every multiple of $\\pi$: $x = n\\pi$ for any integer $n$. |\n| Tan x asymptotes | Occur at every odd multiple of $\\frac{\\pi}{2}$: $x = \\frac{(2n+1)\\pi}{2}$. |\n| Horizontal asymptote | A horizontal line that a graph approaches as $x$ goes to $\\pm\\infty$. |\n| **Transformations** | |\n| Horizontal stretch | A transformation that expands or compresses a graph parallel to the x-axis. |\n| Horizontal compression | A type of horizontal stretch with scale factor less than 1, making the graph narrower. |\n| **Solution Counting** | |\n| Intersections = solutions | Each intersection of two graphs represents a solution to the equation formed by setting the two functions equal. |\n\n## FORMULA TABLE\n\n| $$LHS = ?$$ | Answer | Name / Hint |\n| --- | --- | --- |\n| **Geometry Ratios** |  |  |\n| $$\\frac{QX}{PX} = \\frac{1}{6}, \\frac{QX}{XR} = \\frac{2}{3}$$ | $$QX = 2, PX = 12, XR = 3$$ | Assign convenient lengths to simplify calculations |\n| **Algebraic Simplification** |  |  |\n| $$a-b$$ | $$= -(b-a)$$ | Sign-flip identity |\n| $$\\frac{a-b}{b-a}$$ | $$= -1$$ | Sign-flip pattern result |\n| **Quadr
