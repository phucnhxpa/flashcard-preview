<script>
const DATA={"selected": [{"question": "When counting $\\tan x = \\frac{1}{x}+1$ solutions over $-10\\pi \\le x \\le \\frac{5\\pi}{2}$, why can't you just compute width $\\div \\pi = \\frac{5\\pi/2 - (-10\\pi)}{\\pi} = 12.5$ and round? (2 steps)", "answer": "- Step 1: The \"width ÷ $\\pi$\" shortcut assumes one crossing per branch on *ordinary* branches. But the branch containing $x = 0$ (the pole of $\\frac{1}{x}+1$) carries **two** crossings, not one.\n- Step 2: Also, boundary effects matter: the interval starts at $x = -10\\pi$ (a zero of $\\tan x$, not an asymptote — so the branch just to the right is fully counted) and ends at $x = \\frac{5\\pi}{2}$ (an asymptote — no crossing there). The naive division gives 12.5, but the true count is 14. You must account for the pole-branch double crossing and the endpoints.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "Why is a quadratic inequality solved by **factoring then reading off the parabola sign**, rather than by, say, the quadratic formula?", "answer": "- Step 1: Once factorised as $$a(x - \\alpha)(x - \\beta) \\lessgtr 0$$, the inequality is determined entirely by the **sign of the product**, which depends only on whether $$x$$ is in or out of $$[\\alpha, \\beta]$$.\n- Step 2: The upward parabola visualisation lets you read the answer instantly: positive outside, negative inside.\n- Step 3: The quadratic formula gives you decimal roots without insight; factoring keeps everything symbolic and the sign analysis is immediate.\n\nAlways factorise if you can; only use the formula as a fallback.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "After cancelling $(2-x)/(x-2) = -1$ in Q2, you reach $4 + \\frac{-(2+x)}{x}$. What's the trap when distributing the minus sign, and what wrong answer does it produce? (3 steps)", "answer": "- Step 1: The minus sign must distribute over **both** terms of $(2+x)$. Write $4 - \\frac{2+x}{x}$, then split: $4 - \\frac{2}{x} - \\frac{x}{x} = 4 - \\frac{2}{x} - 1 = 3 - \\frac{2}{x}$.\n- Step 2: **The trap:** forgetting the implied bracket and writing $4 - \\frac{2}{x} + \\frac{x}{x}$, which gives $4 - \\frac{2}{x} + 1 = 5 - \\frac{2}{x}$. This is a deliberately offered wrong option in MCQs.\n- Step 3: The minus sign from the $-1$ cancellation applies to the *entire* numerator $-(2+x)$, not just the first term. Always write the bracket explicitly: $4 - \\left(\\frac{2+x}{x}\\right)$.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "What's the qualitative difference between $$\\tan x$$ vs a flat line $$y = c$$, and $$\\tan x$$ vs a curve with a pole (like $$\\tfrac{1}{x} + 1$$), in terms of solution counting?", "answer": "- Step 1: $$\\tan x$$ vs flat line: **one crossing per $$\\pi$$-branch**, simple counting by interval width.\n- Step 2: $$\\tan x$$ vs pole-curve: same **except** on the branch containing the pole, which has **two** crossings (one each side of the pole).\n- Step 3: The pole-branch is the trap — you must identify which $$\\tan$$ branch contains the pole and add the extra crossing.\n\nFor $$\\tfrac{1}{x}+1$$, the pole is at $$x = 0$$, inside the branch $$\\left(-\\tfrac{\\pi}{2}, \\tfrac{\\pi}{2}\\right)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "What is the fundamental structural fact about a single \"branch\" of $$y = \\tan x$$ (between two adjacent asymptotes), and why does it matter for counting solutions? (2 steps)", "answer": "- Step 1: On each open interval of width $$\\pi$$ between consecutive asymptotes, $$\\tan x$$ rises **continuously and strictly** from $$-\\infty$$ to $$+\\infty$$. It passes through exactly one zero in the middle.\n- Step 2: By the Intermediate Value Theorem, any horizontal line $$y = c$$ (for any finite $$c$$) is met **exactly once** by that branch. This is the foundation of the \"one crossing per branch\" counting strategy: you don't need to solve anything — just count how many branches fit in the interval.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "When solving a quadratic inequality, why must you keep the leading coefficient **positive** before reading the sign rule? (2 steps)", "answer": "- Step 1: The sign rule (\"positive outside the roots, negative between\") applies to an **upward** parabola ($$a > 0$$). If the leading coefficient is negative, the parabola opens **downward**, and the rule flips: the expression is positive *between* the roots and negative *outside*.\n- Step 2: By always rearranging so the leading coefficient is positive (e.g. $$x^2 + 2x - 8 \\ge 0$$, not $$-x^2 - 2x + 8 \\le 0$$), you can always use the same simple rule: \"$$\\ge 0$$ outside the roots.\" This eliminates the need to think about the parabola's direction each time, reducing the chance of a sign-flip error.", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "What sanity check confirms that $$0 \\le x \\le 20\\pi$$ should give exactly half the solutions of $$0 \\le x \\le 40\\pi$$ for $$\\tan x = \\tfrac{1}{x}+1$$?", "answer": "Each $$\\pi$$-wide branch contributes one solution (for the near-horizontal line $$y \\approx 1$$). Doubling the interval doubles the branch count and hence the solution count: $$40\\pi \\to 40$$, $$20\\pi \\to 20$$. Linearity in interval width is a fast sanity check on any such count.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "In Q1, the right angle $\\angle QXR = 90°$ is given in the problem statement. Did the ratio trick use this information? What does that tell you about its role? (2 steps)", "answer": "- Step 1: **No.** The assign-a-value trick never uses the right angle. It only needs the two given ratios $\\frac{QX}{PX}$ and $\\frac{QX}{XR}$.\n- Step 2: **It's a distractor.** The right angle is there for students who try to attack with Pythagoras or coordinate geometry — a valid but much slower route. Recognising that ratio-asks-ratio means you can skip it entirely is part of the exam craft: don't use information you don't need.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "How do you use the sum and product of roots as a **fast check** on your factorisation, and what was the sign-slip that happened on the board in Q3? (3 steps)", "answer": "- Step 1: If $$x^2 + bx + c = (x - \\alpha)(x - \\beta)$$, then expanding gives $$x^2 - (\\alpha + \\beta)x + \\alpha\\beta$$. Matching coefficients: $$\\alpha + \\beta = -b$$ and $$\\alpha\\beta = c$$. For a general quadratic $$ax^2 + bx + c$$: $$\\alpha + \\beta = -\\frac{b}{a}$$, $$\\alpha\\beta = \\frac{c}{a}$$.\n- Step 2: For $$x^2 + 2x - 8$$: we need product $$= -8$$ and sum $$= -2$$. The pair $$(-4, +2)$$ multiplies to $$-8$$ ✓ and sums to $$-2$$ ✓. So the factorisation is $$(x + 4)(x - 2)$$.\n- Step 3: The board's in-progress slip: writing roots as $$+4$$ and $$-2$$ (which sum to $$+2$$, not $$-2$$), producing the wrong factorisation $$(x + 2)(x - 4)$$. The sum/product check catches this instantly — the sum should be $$-b/a = -2$$, not $$+2$$. Always verify: roots $$-4, 2$$ → sum $$= -2$$ ✓.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "Harry described the \"exactly two solutions\" part of Q5 as \"A* material.\" What is the conceptual habit that separates a student who answers $$-1 < p < 1$$ from one who answers correctly? (2 steps)", "answer": "- Step 1: The incorrect student treats the whole domain as if it were one period of a simple cosine wave, assuming a horizontal line at height $$p$$ meets it at most twice.\n- Step 2: The correct student splits the domain into monotonic pieces and tracks that the partial descending piece $$S_3$$ from $$180^\\circ$$ to $$225^\\circ$$ adds a third intersection for any $$0 \\le p < 1$$, forcing the true range to exclude all positive $$p$$ except the peak $$p = 1$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_41"}, {"question": "When sketching a transformed curve like $$y = \\cos 2x^\\circ$$, what's the systematic point-mapping technique that beats trying to \"imagine the stretch\"?", "answer": "Take the key landmarks of the parent curve ($$\\cos x^\\circ$$: $$(0,1), (90,0), (180,-1), (270,0), (360,1)$$) and apply the mapping $$(x, y) \\mapsto (\\frac{x}{2}, y)$$ to each, producing the landmarks of the new curve:\n$$(0,1) \\to (45,0) \\to (90,-1) \\to (135,0) \\to (180,1) \\to \\dots$$\nThen connect with a smooth cosine shape. This builds the new curve **literally point-by-point** — no imagination required.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "What are the zeros and asymptotes of $y = \\frac{1}{x}$, and how do the branches behave? (3 steps)", "answer": "- Step 1: **Vertical asymptote** at $x = 0$ (the $y$-axis). **Horizontal asymptote** at $y = 0$ (the $x$-axis). The curve never touches either axis.\n- Step 2: For $x > 0$: the branch is in the first quadrant, positive and decreasing toward $0$. For $x < 0$: the branch is in the third quadrant, negative and approaching $0$ from below.\n- Step 3: It's a rectangular hyperbola. Knowing this base shape is essential because translations like $\\frac{1}{x} + 1$ shift it but preserve the branch structure.", "source": "GLM 5.1 ①", "_id": "glm_1_45"}, {"question": "What is the difference between how a **vertical** translation and a **horizontal** translation affect asymptotes, and why? (2 steps)", "answer": "- Step 1: $$y = f(x) + a$$ (vertical translation up by $$a$$): the **horizontal** asymptote moves up by $$a$$ (from $$y = c$$ to $$y = c + a$$); the **vertical** asymptote is unchanged (we moved up, not sideways, so $$x$$-values where the function blows up are the same).\n- Step 2: $$y = f(x + a)$$ (horizontal translation left by $$a$$): the **vertical** asymptote moves left by $$a$$ (from $$x = c$$ to $$x = c - a$$); the **horizontal** asymptote is unchanged (we moved sideways, so the long-run value the function approaches is the same). The rule: a translation moves the asymptotes **in the same direction** as the curve.", "source": "GLM 5.1 ②", "_id": "glm_2_46"}, {"question": "When simplifying $$5 + \\dfrac{9-x^2}{x^2-3x}$$, why does recognising $$(3-x) = -(x-3)$$ immediately prevent a sign error? (2 steps)", "answer": "- Step 1: Factor as $$(3-x)(3+x)$$ over $$x(x-3)$$. Since $$(3-x) = -(x-3)$$, the fraction becomes $$-\\dfrac{3+x}{x}$$.\n- Step 2: Then $$5 - \\dfrac{3+x}{x} = 5 - \\dfrac{3}{x} - 1 = 4 - \\dfrac{3}{x}$$. Recognising the swapped-difference sign flip on sight prevents carrying an unsimplified expression and forgetting the leading minus.", "source": "Kimi K2.6 ②", "_id": "kimi_2_39"}, {"question": "Why is \"for an A* you need to imagine the horizontal line $$y = p$$ sliding from $$-\\infty$$ to $$+\\infty$$\" the key mental model for \"range of $$p$$\" questions?", "answer": "- Step 1: As $$p$$ slides up, the number of intersections of $$y = p$$ with the curve changes **only at special heights** — namely turning point values ($$\\max, \\min$$) and endpoint values.\n- Step 2: Between these special heights, the count is **constant** within each band.\n- Step 3: So you only need to test the count in each band (and at the boundary special values), which gives a complete classification.\n\nThis visualisation makes \"for which $$p$$ are there exactly $$N$$ solutions?\" a **finite checklist** rather than an algebra problem.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "Why does $$p = -1$$ give only **one** solution to $$\\cos 2x^\\circ = p$$ on $$[0, 225]$$, not two?", "answer": "$$y = -1$$ is reached only at the unique minimum of the curve, which is at $$x=90$$ (point $$Q$$). $$S_1$$ ends there and $$S_2$$ starts there — same point. So though formally both monotonic pieces are touched, it's the same x-value, giving 1 distinct solution. Hence $$p=-1$$ is excluded from the \"exactly two\" set.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "What is the general principle behind the \"exactly $$n$$ solutions\" range-of-$$p$$ problem, applicable to any non-monotonic curve on a restricted domain? (2 steps)", "answer": "- Step 1: Split the curve into **monotonic pieces** on the given domain. On each piece, a horizontal line $$y = p$$ can intersect at most once (since the function is strictly monotonic there).\n- Step 2: For each band of $$p$$ values, count how many pieces the line $$y = p$$ crosses. The \"exactly $$n$$\" condition selects only those bands where the total count equals $$n$$. The key insight: a curve that **reverses direction** (goes down, then up, then partially down again) creates more intersection opportunities than a simple \"down-then-up\" shape. Always account for every piece, especially the **partial** piece at the end of the domain.", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "$y = \\cos x°$ is transformed to $y = \\cos 3x°$. State (i) the period and (ii) the image of the minimum $(180°, -1)$. (2 steps)", "answer": "- Step 1: (i) Period $= \\frac{360}{3} = 120°$. The horizontal squash by factor $\\frac{1}{3}$ compresses three full cycles into the original one-period width.\n- Step 2: (ii) Apply $(x, y) \\mapsto \\left(\\frac{x}{3}, y\\right)$: $(180°, -1) \\mapsto (60°, -1)$. Check: $\\cos(3 \\times 60)° = \\cos 180° = -1$ ✓. The $x$-coordinate is *divided* by $3$.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "What's the connection between the period of $\\cos(kx)^\\circ$ and the horizontal stretch scale factor? (1 step)", "answer": "- They are reciprocals. The period is $\\frac{360}{k}$, and the horizontal stretch scale factor is $\\frac{1}{k}$. For $\\cos 2x^\\circ$: period $180^\\circ$, scale factor $\\frac{1}{2}$. The x-coordinates get divided by $k$, so the curve repeats after $\\frac{360}{k}$ instead of $360$.", "source": "MiniMax ①", "_id": "minimax_1_38"}, {"question": "What are the asymptotes of $y = \\tan x$ (in radians), and what rhythm do they follow? (3 steps)", "answer": "- Step 1: **Vertical asymptotes** where $\\cos x = 0$: at $x = \\pm\\frac{\\pi}{2}, \\pm\\frac{3\\pi}{2}, \\dots$, i.e. the **odd** multiples of $\\frac{\\pi}{2}$, written $x = \\frac{(2n+1)\\pi}{2}$.\n- Step 2: **Zeros** where $\\sin x = 0$: at $x = n\\pi$ (every $\\pi$).\n- Step 3: **Rhythm:** \"Something interesting happens every $\\frac{\\pi}{2}$\" — it's either a zero or an asymptote, alternating. This single pattern places every feature of the $\\tan$ graph. Harry stressed this as the key to sketching it quickly.", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "Q5(b) — Why does $$p = 1$$ give exactly two solutions (not three), even though the maximum value 1 appears on two monotonic pieces? (2 steps)", "answer": "- Step 1: The maximum $$y = 1$$ occurs at $$x = 0$$ (start of $$S_1$$) and $$x = 180$$ (end of $$S_2$$ / start of $$S_3$$). These are two distinct $$x$$-values, giving two solutions.\n- Step 2: The point $$(180, 1)$$ is a **shared endpoint** of $$S_2$$ and $$S_3$$ — it is counted once, not twice. The line $$y = 1$$ touches the peak at $$x = 0$$ and the peak at $$x = 180$$, and does not hit $$S_3$$ elsewhere (since $$S_3$$ falls away from 1). Total: exactly 2 solutions. ✓", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "For $f(x) \\to f(ax)$, what happens to the period, and for $f(x) \\to f\\!\\left(\\frac{x}{a}\\right)$? (2 steps)", "answer": "- Step 1: $f(ax)$: horizontal stretch SF $\\frac{1}{a}$. If the original period is $T$, the new period is $\\frac{T}{a}$ (squashed). E.g. $\\cos 2x°$: period $= \\frac{360}{2} = 180°$.\n- Step 2: $f\\!\\left(\\frac{x}{a}\\right)$: horizontal stretch SF $a$. The new period is $aT$ (widened). E.g. $\\cos\\!\\left(\\frac{x}{2}\\right)°$: period $= 2 \\times 360 = 720°$. **$f(ax)$ divides the period; $f(x/a)$ multiplies it.**", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "Practice P1 — For $$\\cos x° = p$$ on $$0 \\le x \\le 270$$ with \"exactly two solutions,\" the answer is $$-1 < p \\le 0$$. Why is $$p = 0$$ **included** here but **excluded** in Q5? (2 steps)", "answer": "- Step 1: For $$\\cos x°$$ on $$[0, 270]$$: $$S_1: [0, 180]$$, $$y$$ falls $$1 \\to -1$$; $$S_2: [180, 270]$$, $$y$$ rises $$-1 \\to 0$$. The line $$y = 0$$ hits $$x = 90$$ (on $$S_1$$) and $$x = 270$$ (endpoint of $$S_2$$) — that's **two** solutions. ✓\n- Step 2: In Q5, the domain was $$[0, 225]$$ and $$S_3$$ fell from 1 to 0, so $$y = 0$$ hit **three** points (at $$x = 45, 135, 225$$). Here, $$S_2$$ only reaches up to $$y = 0$$ (at the endpoint), so $$y = 0$$ hits exactly two points. **The monotonic-piece count depends entirely on the specific domain** — never copy a previous answer blindly; always recount for your own domain.", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "Derive **from first principles** why $$y = f(ax)$$ sends a point $$(X, Y)$$ on $$y = f(x)$$ to $$\\left(\\tfrac{X}{a}, Y\\right)$$. (3 steps)", "answer": "- Step 1: A point $$(X, Y)$$ lies on $$y = f(x)$$ exactly when $$Y = f(X)$$.\n- Step 2: For the matching point on $$y = g(x) = f(ax)$$, we need the **input to $$f$$** to equal $$X$$ — i.e. $$ax = X$$, so $$x = \\tfrac{X}{a}$$.\n- Step 3: Then $$g\\left(\\tfrac{X}{a}\\right) = f\\left(a \\cdot \\tfrac{X}{a}\\right) = f(X) = Y$$. So the point on the new curve is $$\\left(\\tfrac{X}{a}, Y\\right)$$.\n\nTakeaway: Solving \"what input do I need?\" forces $$x \\to x/a$$ — that's why $$a > 1$$ squashes.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "After factorising $$\\dfrac{(2-x)(2+x)}{x(x-2)}$$, you notice $$(2-x)$$ in the numerator and $$(x-2)$$ in the denominator — same terms, opposite order. What is the key identity, and what does the fraction collapse to? (2 steps)", "answer": "- Step 1: The identity is $$a - b = -(b - a)$$, i.e. swapping the terms in a difference **flips the sign**. So $$(2-x) = -(x-2)$$.\n- Step 2: Substituting: $$\\dfrac{-(x-2)(2+x)}{x(x-2)}$$. The $$(x-2)$$ cancels, leaving $$\\dfrac{-(2+x)}{x}$$.\n\nThe fraction $$\\dfrac{a-b}{b-a}$$ is **always** $$-1$$ — this is the single most useful cancelling identity in algebraic fractions.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "P1 Q5(a)(ii): the sketch shows $$R(k, 0)$$. Why is $$k = 225$$, not $$270$$?", "answer": "- Step 1: $$R$$ is on the $$x$$-axis, so it's a **zero** of $$\\cos 2x^\\circ$$, not a minimum.\n- Step 2: Zeros occur where $$2x = 90, 270, 450, \\ldots$$ ⇒ $$x = 45, 135, 225, \\ldots$$\n- Step 3: From the sketch sequence $$(0,1) \\to (45, 0) \\to (90, -1)_Q \\to (135, 0) \\to (180, 1) \\to (225, 0)_R$$, $$R$$ is the third zero ⇒ $$k = 225$$.\n\nTrap: $$270$$ is the next **minimum** of $$\\cos 2x^\\circ$$ (where $$2x = 540$$), not a zero. Always check whether the named point is a zero, max, or min.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "Why is the right angle $\\angle QXR = 90°$ given in Q1 if it's not used by the ratio trick? (2 steps)", "answer": "- Step 1: It's there for students who take the Pythagoras/coordinate geometry route — you *could* set up coordinates using the right angle and compute everything. That method works but is much slower.\n- Step 2: Exam craft: recognise when a given is a distractor for a faster method. If the question asks for a ratio and gives only ratios, the assign-a-value trick bypasses all geometry. The right angle is a \"trap door\" into a slower path — don't take it.", "source": "GLM 5.1 ①", "_id": "glm_1_48"}, {"question": "When sliding a horizontal line $$y = p$$ across the graph to count intersections, what's the rule for boundaries of $$p$$-bands?", "answer": "Boundaries of $$p$$-bands correspond to **special heights** where the count changes:\n- The minimum value (here $$p = -1$$): often gives a single repeated intersection at a turning point.\n- The maximum value (here $$p = 1$$): may give a count drop where the line just touches the peak.\n- $$p = 0$$: the curve crosses the $$x$$-axis, often giving extra zeros.\n- Any horizontal level where the curve's behaviour qualitatively changes.\n\nAlways **test each band and each boundary value** separately — never extrapolate from one band to the next.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "In a solution-counting problem, what should you do if the curve is not monotonic over the entire interval? (Q5 — method)", "answer": "- Step 1: Identify points where the curve changes direction (maxima, minima, zeros that split monotonic segments).\n- Step 2: Split the interval into monotonic pieces where the function is entirely increasing or entirely decreasing.\n- Step 3: Count how many times the horizontal line $y = p$ intersects EACH piece.\n- Step 4: Add up the counts from all pieces for the total number of solutions.\n\n**Takeaway:** \"Split into monotonic pieces\" — this is the key to avoiding the trap of overcounting.", "source": "MiniMax ②", "_id": "minimax_2_33"}, {"question": "Why does the branch of $\\tan x$ on $\\left(-\\frac{\\pi}{2}, \\frac{\\pi}{2}\\right)$ contain **two** crossings with $y = \\frac{1}{x}+1$ instead of the usual one? (3 steps)", "answer": "- Step 1: This branch spans the pole of $\\frac{1}{x}+1$ at $x = 0$. The reciprocal curve shoots to $+\\infty$ as $x \\to 0^+$ and to $-\\infty$ as $x \\to 0^-$.\n- Step 2: On $\\left(-\\frac{\\pi}{2}, 0\\right)$: $\\frac{1}{x}+1$ is large and negative (it dives to $-\\infty$), while $\\tan x$ rises from $-\\infty$ to $0$. They cross once *below* the $x$-axis.\n- Step 3: On $\\left(0, \\frac{\\pi}{2}\\right)$: $\\frac{1}{x}+1$ is large and positive (coming down from $+\\infty$), while $\\tan x$ rises from $0$ to $+\\infty$. They cross once *above* the $x$-axis. Two crossings total — the only branch where this happens.", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "When the exam says \"**giving a reason**, state the number of solutions of $$\\tan x = \\tfrac{1}{x}+1$$\", what is the mark-winning sentence?", "answer": "Write: *\"There are $$N$$ solutions because the graph of $$y = \\tfrac{1}{x}+1$$ intersects the graph of $$y = \\tan x$$ $$N$$ times in the interval given.\"*\n\nThree required ingredients:\n- The number $$N$$.\n- **Both** curve equations named explicitly.\n- The interval referenced.\n\nThe count alone scores **nothing** without the justification sentence.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "[Practice] For $$\\cos x^\\circ = p$$ on $$0\\le x\\le 270$$, the answer for \"exactly two solutions\" is $$-1 < p \\le 0$$ (with $$p=0$$ **included**), unlike Q5's answer where $$p=0$$ was excluded. Why the difference?", "answer": "The domain matters. Monotonic pieces here:\n+ $$S_1: [0,180]$$ falls $$1\\to-1$$\n+ $$S_2: [180,270]$$ rises $$-1\\to 0$$\n\nFor $$p=0$$: $$S_1$$ gives $$x=90$$; $$S_2$$ gives $$x=270$$ (its endpoint). Only 2 crossings. Compare to Q5 where the domain $$[0,225]$$ contained a third piece $$S_3$$ rising back to $$(180,1)$$ then falling, giving an extra crossing at $$p=0$$ ($$x=225$$).\n\nLesson: never copy a \"range of $$p$$\" answer — always re-derive for your specific domain.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "When solving an equation like $$\\tan x = \\frac{1}{x}+1$$, why is the *algebraic* approach (e.g. trying $$2x = \\cos^{-1}(\\cdot)$$) a trap?", "answer": "It's analytically intractable — there's no closed-form solution. The exam intends the *graphical* method (\"hence\" in the question is the clue: they want you to use the sketch). Students who try to solve algebraically waste minutes and get nowhere. The picture is the entire method.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "Q4(c)(ii) — An equivalent regrouping of the 14 solutions is $$10 + 2 + 2$$ instead of Harry's $$10 + 1 + 3$$. What does the \"2\" represent in the $$10 + 2 + 2$$ version? (2 steps)", "answer": "- Step 1: The middle \"2\" pairs together the **two crossings on the pole-split branch** $$\\left(-\\frac{\\pi}{2}, \\frac{\\pi}{2}\\right)$$: one below the axis on $$\\left(-\\frac{\\pi}{2}, 0\\right)$$ and one above the axis on $$\\left(0, \\frac{\\pi}{2}\\right)$$.\n- Step 2: The last \"2\" counts the two ordinary branches from $$\\frac{\\pi}{2}$$ up to $$\\frac{5\\pi}{2}$$ (centred at $$\\pi$$ and $$2\\pi$$). Harry taught $$10 + 1 + 3$$ instead because the \"odd one out below the axis\" is exactly the crossing students miss — isolating it as a separate count makes it visible and checkable. Both groupings give 14; Harry's is pedagogically better for exam safety.", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "(Q3 — factorising) What is the specific danger of the sum/product check when the quadratic is written $$x^2 + bx + c$$ but you accidentally confuse $$b$$ and $$-b$$? (2 steps)", "answer": "- Step 1: The roots $$\\alpha, \\beta$$ of $$(x-\\alpha)(x-\\beta)$$ satisfy $$\\alpha + \\beta = -b$$ and $$\\alpha\\beta = c$$; if you forget the sign flip, you might seek numbers that add to $$+b$$ instead of $$-b$$.\n- Step 2: This leads to reversed signs in the brackets (e.g., writing $$(x+2)(x-4)$$ instead of $$(x+4)(x-2)$$), which still multiplies to $$-8$$ but sums to $$-2$$ only in the correct version.", "source": "Kimi K2.6 ①", "_id": "kimi_1_32"}, {"question": "Suppose a transformed curve question on a partial domain ends with the curve rising back near its maximum but not completing a full cycle. Why is this geometry a major \"exactly $$n$$ solutions\" trap?", "answer": "A partial extra monotonic piece adds *extra* crossings only in the band of heights it covers — but the test-makers love placing the domain cutoff $$k$$ here precisely because students count only the \"obvious\" two monotonic pieces. Always:\n+ Trace the curve all the way from $$x=0$$ to $$x=k$$.\n+ Count the **distinct monotonic pieces**.\n+ For each value of $$p$$, check membership in each piece's range.\n\nThe partial piece is invisible to \"between the max and min\" reasoning — that's exactly why it's the trap.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "A student factorises $$x^2 + 2x - 8$$ as $$(x+2)(x-4)$$ giving roots $$-2$$ and $$4$$. What's the sum/product check that catches the mistake?", "answer": "- Step 1: Sum check: $$-2 + 4 = +2$$, but we need $$-b/a = -2$$. ✗\n- Step 2: Product check: $$(-2)(4) = -8$$ ✓ — so product alone doesn't catch it.\n- Step 3: The sum failing tells you the signs of both roots are swapped. Correct factorisation: $$(x+4)(x-2)$$ with roots $$-4, +2$$.\n\nTakeaway: Always check **both** sum and product — product alone misses sign-swaps.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "When the exam question shows a labelled point on a curve (like $$Q$$ or $$R$$ in Q5) and asks you to \"state the coordinates,\" what must you read from the graph vs derive from the equation? (2 steps)", "answer": "- Step 1: Use the **equation** to derive the coordinates precisely, not just eyeball the sketch. For $$Q$$ on $$y = \\cos 2x°$$: the minimum where $$\\cos 2x° = -1$$ means $$2x = 180$$, so $$x = 90$$, $$y = -1$$. Answer: $$Q = (90°, -1)$$.\n- Step 2: For $$R(k, 0)$$: it's a zero of $$\\cos 2x°$$, so $$2x = 450$$ (the third zero), giving $$x = 225$$. The sketch tells you *which* zero it is (the third one, not the first or second), and the equation gives you the exact value. The board's initial $$k = 270$$ came from misidentifying which zero $$R$$ was — always cross-check with the equation.", "source": "GLM 5.1 ②", "_id": "glm_2_45"}, {"question": "(Q1 — geometry) For the ratio problem Q1, after finding $$PR = 15$$ and $$PM = 7.5$$, how do you determine whether $$X$$ lies between $$P$$ and $$M$$ or between $$M$$ and $$R$$, and why does this matter for computing $$MX$$? (2 steps)", "answer": "- Step 1: Compare $$PX$$ with $$PM$$; since $$PX = 12$$ and $$PM = 7.5$$, we have $$PX > PM$$, so $$X$$ is farther from $$P$$ than the midpoint is, meaning $$X$$ lies between $$M$$ and $$R$$.\n- Step 2: This matters because $$MX = PX - PM$$ if $$X$$ is beyond $$M$$; if $$X$$ were between $$P$$ and $$M$$, you would instead compute $$MX = PM - PX$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_36"}, {"question": "In the lesson, what's the difference between \"Phuc answered 12\" and the correct answer of 14 in Q4(c)(ii) — what one concept did he miss?", "answer": "- Step 1: Phuc counted only the visible above-axis crossings: 10 ordinary branches + 2 above-axis crossings near $$x = 0$$ and $$x = \\pi$$, $$2\\pi$$ ⇒ 12.\n- Step 2: He missed the **\"odd one out below the axis\"** — the crossing on $$\\left(-\\tfrac{\\pi}{2}, 0\\right)$$ where $$\\tfrac{1}{x}+1 \\to -\\infty$$ meets rising $$\\tan x$$ below the $$x$$-axis.\n- Step 3: Concept missed: a pole inside a $$\\tan$$ branch produces an **extra crossing below the axis** that's invisible if you only scan the \"$$y \\approx 1$$\" region.\n\nTakeaway: Always look below the axis when one curve has a pole inside a shared branch.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "In Q5(b), what happens when you imagine the horizontal line $y = p$ sliding from $p = -1$ up to $p = 1$ across the curve $\\cos 2x°$ on $[0, 225]$? (3 steps)", "answer": "- Step 1: At $p = -1$: one touching point at $x = 90$. As $p$ rises into $-1 < p < 0$: the line now cuts $S_1$ and $S_2$ — exactly 2 solutions ✓.\n- Step 2: At $p = 0$: three zeros at $x = 45, 135, 225$ — 3 solutions ✗. For $0 < p < 1$: the line cuts $S_1$, $S_2$, *and* $S_3$ — 3 solutions ✗.\n- Step 3: At $p = 1$: the line touches the maxima at $x = 0$ and $x = 180$ — exactly 2 ✓. Above $p = 1$: no solutions. The sliding-line visualisation makes the band structure obvious: two-solution regions are $-1 < p < 0$ and $p = 1$.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "For an upward-opening parabola ($a > 0$) with real roots $\\alpha < \\beta$, where is the quadratic $\\ge 0$ and where is it $\\le 0$? Give the mnemonic. (2 steps)", "answer": "- Step 1: $ax^2 + bx + c \\ge 0 \\iff x \\le \\alpha$ **or** $x \\ge \\beta$ (outside the roots). $ax^2 + bx + c \\le 0 \\iff \\alpha \\le x \\le \\beta$ (between the roots).\n- Step 2: **Mnemonic:** \"A happy (upward) parabola is positive on the outside, negative in the middle.\" The ≥/≤ versions simply include the roots themselves. This is why standard order with positive leading coefficient matters — it makes this rule apply directly.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "When a problem gives you only ratios and asks for a ratio (e.g. $\\frac{QX}{PX}=\\frac{1}{6}$, $\\frac{QX}{XR}=\\frac{2}{3}$, find $\\frac{QX}{MX}$), what trick should you immediately deploy and why does it work? (3 steps)", "answer": "- Step 1: **Assign convenient numerical values** to the lengths. Pick the smallest nice integers that respect every given ratio, then just compute the target ratio with those numbers.\n- Step 2: **Why it works:** a ratio fixes only *relative* sizes, never absolute lengths. The final ratio is dimensionless and independent of scale, so any valid scaling gives the same answer. Inventing integers kills the ugly fractions and algebra that come with carrying symbols.\n- Step 3: **How to choose well:** anchor on the quantity that appears in *several* ratios (here $QX$ appears in both). Pick the smallest value that makes every derived length an integer — e.g. $QX=2$ (not $1$, which forces $XR=1.5$).\n\nThe answer is always the same no matter what valid value you pick — that's the whole point.", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "What is Harry's exam advice about ticking off problem-solving checkpoints, and why does it work? (2 steps)", "answer": "- Step 1: As you use each piece of given information in a multi-step question, **put a little tick next to it** so you can see what you have used and what you haven't.\n- Step 2: On a multi-step question, the **unused given** is usually exactly the next step. Harry's nudge: *\"what haven't you used?\"* — if a ratio or condition is still unticked, it's almost certainly the key to the part you're stuck on. This prevents the common trap of forgetting to use a given piece of information.", "source": "GLM 5.1 ②", "_id": "glm_2_32"}, {"question": "In Q5, point $$Q$$ is the minimum shown on $$y = \\cos(2x)^\\circ$$. Why is $$Q$$ located at $$(90^\\circ,-1)$$ and not at $$(180^\\circ,-1)$$? (2 steps)", "answer": "- Step 1: On $$y = \\cos(x)^\\circ$$, the minimum is at $$(180^\\circ,-1)$$. Under the squash $$(x,y) \\mapsto \\bigl(\\tfrac{x}{2},y\\bigr)$$, the $$x$$-coordinate halves.\n- Step 2: Therefore the minimum of $$\\cos(2x)^\\circ$$ occurs at $$x = \\tfrac{180^\\circ}{2} = 90^\\circ$$, giving $$Q = (90^\\circ,-1)$$. Check: $$\\cos(180^\\circ) = -1$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_24"}, {"question": "What is the algebraic identity for the \"sign flip\" when two terms in a difference are swapped, and what does the fraction version simplify to? (2 steps)", "answer": "- Step 1: Swapping the terms in a difference flips the sign: $$a - b = -(b - a)$$. This is because $$a - b + (b - a) = 0$$, so they are negatives of each other.\n- Step 2: The fraction consequence is the key cancellation trick: $$\\frac{a-b}{b-a} = \\frac{-(b-a)}{b-a} = -1$$. Whenever a numerator factor is the same as a denominator factor but with the terms in **opposite order**, they cancel to $$-1$$, not $$+1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "What's the key difference in counting solutions for $\\tan x = \\frac{1}{x} + 1$ in $0 \\le x \\le 40\\pi$ versus $-10\\pi \\le x \\le \\frac{5\\pi}{2}$? (Q4)", "answer": "- Step 1: $0 \\le x \\le 40\\pi$: all branches are \"ordinary\" — no poles, so exactly 1 solution per branch = 40.\n- Step 2: $-10\\pi \\le x \\le \\frac{5\\pi}{2}$: contains the pole at $x = 0$, so one branch has 2 solutions.\n- Step 3: Also has partial branches at the boundaries (starting at $-10\\pi$ which is a zero, ending at $\\frac{5\\pi}{2}$ which cuts through a branch).\n- Step 4: Must count carefully: 10 ordinary + 1 (odd one out) + 3 partial = 14.\n\n**Takeaway:** Big intervals without poles → simple width ÷ $\\pi$. Intervals with poles → count branches explicitly.", "source": "MiniMax ②", "_id": "minimax_2_38"}, {"question": "What's the translation rule for $y = f(x + a)$ — which direction and why? (2 steps)", "answer": "- Step 1: $y = f(x + a)$ moves the graph **left by $a$** (for $a > 0$). The $+a$ inside the argument shifts the curve in the *opposite* direction to the sign.\n- Step 2: Intuition: $f(x + a)$ reaches the same $y$-value at an $x$ that is $a$ units *earlier* (smaller). So every feature shifts left. Contrast with $f(x) + a$ (outside), which shifts *up* by $a$ — the direction matches the sign.", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "In Q4, why does the curve $$y = \\tfrac1x + 1$$ approach $$y = 1$$ from above as $$x \\to +\\infty$$, and why does this matter for counting intersections with $$\\tan x$$? (2 steps)", "answer": "- Step 1: Since $$1/x$$ is positive for $$x > 0$$, $$\\tfrac1x + 1 > 1$$, and as $$x$$ grows, $$1/x$$ becomes tiny, so the curve descends toward $$1$$ from above.\n- Step 2: This matters because it guarantees that for large $$x$$, the curve stays slightly above $$y = 1$$, crossing each rising $$\\tan$$ branch exactly once; if it dipped below $$y = 1$$, some branches might be missed or extra crossings could appear.", "source": "Kimi K2.6 ②", "_id": "kimi_2_42"}, {"question": "Why is the answer for \"exactly two solutions\" of $\\cos 2x^\\circ = p$ on $0 \\le x \\le 225^\\circ$ NOT $-1 < p < 1$? (Q5 — key trap)", "answer": "- Step 1: The tempting answer $-1 < p < 1$ would be correct for a single monotonic piece, but here we have THREE pieces ($S_1, S_2, S_3$).\n- Step 2: For $0 < p < 1$: $S_1$ gives 1 solution (falling), $S_2$ gives 1 (rising), $S_3$ gives 1 (falling, since $S_3$ ranges from 1 down to 0) — total 3 solutions.\n- Step 3: For $p = 0$: solutions at $x = 45^\\circ, 135^\\circ, 225^\\circ$ — three solutions.\n- Step 4: Only $-1 < p < 0$ (where $S_3$ doesn't reach) or $p = 1$ (shared at $x = 0$ and $x = 180$) give exactly 2 solutions.\n\n**Takeaway:** The extra piece $S_3$ (falling from max to $y = 0$) adds a third intersection for all positive $p < 1$.", "source": "MiniMax ②", "_id": "minimax_2_16"}, {"question": "In a quadratic inequality with $a < 0$ (downward parabola), how does the sign rule reverse? (1 step)", "answer": "- For a downward-opening parabola ($a < 0$) with roots $\\alpha < \\beta$, the expression is positive BETWEEN the roots and negative OUTSIDE. It's the opposite of the upward case: $ax^2 + bx + c > 0$ when $\\alpha < x < \\beta$, and $< 0$ when $x < \\alpha$ or $x > \\beta$. The mnemonic flips: \"sad parabola is negative on the outside.\"", "source": "MiniMax ①", "_id": "minimax_1_23"}, {"question": "For Q3, after factorising $$x^2 + 2x - 8$$ as $$(x+4)(x-2)$$, why must the solution be written as $$x \\le -4$$ **or** $$x \\ge 2$$ rather than **and**? (2 steps)", "answer": "- Step 1: The quadratic expression is non-negative outside the roots, which defines two disjoint intervals on the number line: one to the left of $$-4$$ and one to the right of $$2$$.\n- Step 2: The word \"and\" would imply a single connected region between the roots, which is the solution for $$\\le 0$$, not $$\\ge 0$$. \"Or\" correctly reflects the union of two separate outer intervals.", "source": "Kimi K2.6 ②", "_id": "kimi_2_44"}, {"question": "In the count of solutions for $$\\tan x = \\frac{1}{x}+1$$ over $$-10\\pi \\le x \\le \\frac{5\\pi}{2}$$, Harry groups the count as $$10+1+3=14$$. What does each group represent? (3 steps)", "answer": "- Step 1: **The 10** — ordinary $$\\tan$$ branches from $$-10\\pi$$ up to $$-\\frac{\\pi}{2}$$. Each is cut once by the near-horizontal $$\\frac{1}{x}+1 \\approx 1$$.\n- Step 2: **The 1** — the \"odd one out below the axis\": on $$(-\\frac{\\pi}{2},0)$$, $$\\frac{1}{x}+1$$ dives to $$-\\infty$$ at $$x=0$$ and meets the rising $$\\tan$$ branch *below* the x-axis. This is the crossing students miss.\n- Step 3: **The 3** — from $$0$$ to $$\\frac{5\\pi}{2}$$: the crossing on $$(0,\\frac{\\pi}{2})$$ above the axis plus the two ordinary branches centred at $$\\pi$$ and $$2\\pi$$.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "On a line, $A, B, C, D$ lie in order with $\\frac{AB}{BC} = \\frac{1}{4}$ and $\\frac{BC}{CD} = \\frac{2}{3}$. Find $\\frac{AB}{AD}$ using the assign-a-value trick. (3 steps)", "answer": "- Step 1: Anchor on $BC$ (appears in both ratios). Let $BC = 4$ (smallest integer making $AB$ nice). Then $AB = 1$ (from $\\frac{AB}{BC} = \\frac{1}{4}$).\n- Step 2: From $\\frac{BC}{CD} = \\frac{2}{3}$: $CD = \\frac{3}{2} \\times 4 = 6$. Then $AD = AB + BC + CD = 1 + 4 + 6 = 11$.\n- Step 3: $\\frac{AB}{AD} = \\frac{1}{11}$. Any valid anchor gives the same ratio — that's the power of the trick.", "source": "GLM 5.1 ①", "_id": "glm_1_36"}, {"question": "What is Harry's priority advice for achieving A*, and why does it outweigh topic-based homework? (2 steps)", "answer": "- Step 1: **Prioritise reflective past-paper practice** over topic homework. Work through full past papers, then **reflect on your mistakes** — understand exactly what went wrong and why.\n- Step 2: Past papers expose you to the *combination* of topics and the *trick phrasing* that topic drills miss. Harry: the $$\\cos 2x°$$ range-of-$$p$$ question *\"is for students that are aiming for A*... most students would miss this one completely.\"* Only past papers reliably produce these A*-level traps. If short on time, the two P1 past papers Harry sent beat the narrower trig-only set.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "When a question asks you to solve $$f(x) = g(x)$$, what is the most powerful graphical interpretation, and why is it especially useful for equations you can't solve algebraically? (2 steps)", "answer": "- Step 1: A solution of $$f(x) = g(x)$$ is exactly an $$x$$ where the two curves have the **same height** — i.e. a **crossing point**. So $$\\#\\{\\text{solutions}\\} = \\#\\{\\text{intersection points}\\}$$.\n- Step 2: For equations like $$\\tan x = \\frac{1}{x} + 1$$ that are impossible to solve by hand, you **sketch both graphs once and count crossings**. The same picture answers the question for any interval — you just count the crossings inside it. Harry: \"visualising the intersection of two graphs is a highly effective way to solve equations.\"", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "How do you build the key points of $y = \\cos 2x°$ from the key points of $y = \\cos x°$? (2 steps)", "answer": "- Step 1: Apply the mapping $(x, y) \\mapsto \\left(\\frac{x}{2}, y\\right)$ to each landmark of $\\cos x°$: $(0,1) \\to (0,1)$; $(90,0) \\to (45,0)$; $(180,-1) \\to (90,-1)$; $(270,0) \\to (135,0)$; $(360,1) \\to (180,1)$.\n- Step 2: The maximum-to-maximum distance shrinks from $360°$ to $180°$, confirming the period halves. Continuing: $(450,0) \\to (225,0)$, which gives $R(225, 0)$ in Q5.", "source": "GLM 5.1 ①", "_id": "glm_1_23"}, {"question": "Simplify $5 + \\frac{9 - x^2}{x^2 - 3x}$. What's the sign-flip cancellation, and what's the final answer? (3 steps)", "answer": "- Step 1: Factorise: $9 - x^2 = (3-x)(3+x)$ and $x^2 - 3x = x(x-3)$. Spot that $(3-x) = -(x-3)$.\n- Step 2: Cancel: $\\frac{(3-x)(3+x)}{x(x-3)} = \\frac{-(x-3)(3+x)}{x(x-3)} = \\frac{-(3+x)}{x}$.\n- Step 3: Distribute: $5 - \\frac{3+x}{x} = 5 - \\frac{3}{x} - \\frac{x}{x} = 5 - \\frac{3}{x} - 1 = 4 - \\frac{3}{x}$. The minus sign distributes over both terms of $(3+x)$.", "source": "GLM 5.1 ①", "_id": "glm_1_35"}, {"question": "Why must you always re-draw the asymptotes *first* when sketching a translated curve like $$y = \\frac{1}{x} + 1$$? (2 steps)", "answer": "- Step 1: A translation moves the **asymptotes with the curve**. For $$f(x) + a$$: the horizontal asymptote rises by $$a$$; the vertical asymptote is unchanged (because the shift is vertical, not horizontal). For $$y = \\frac{1}{x} + 1$$, the horizontal asymptote is $$y = 1$$, not $$y = 0$$.\n- Step 2: If you sketch the branches first relative to the old asymptote $$y = 0$$, you will place every intersection incorrectly. The fix: **always re-draw the asymptote first**, then sketch the branches relative to the new asymptote. This one habit prevents the entire solution count from being corrupted.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "What's the period of $\\cos(kx)°$ and why? Give the formula and the intuition. (2 steps)", "answer": "- Step 1: Period $= \\frac{360°}{k}$. Replacing $x$ with $kx$ compresses the horizontal axis by factor $k$, so the curve completes its cycle $k$ times faster — the period shrinks by factor $k$.\n- Step 2: Example: $\\cos 2x°$ has period $\\frac{360}{2} = 180°$. In radians the rule is $\\frac{2\\pi}{k}$. The same logic applies to $\\sin(kx)°$.", "source": "GLM 5.1 ①", "_id": "glm_1_22"}, {"question": "Q4(a) — The line $$l$$ is an asymptote to $$y = \\tan x$$ in the sketch. How do you state its equation, and what general form do all $$\\tan x$$ asymptotes share? (2 steps)", "answer": "- Step 1: The asymptotes of $$y = \\tan x$$ are at the **odd multiples of** $$\\frac{\\pi}{2}$$: $$x = \\pm\\frac{\\pi}{2}, \\pm\\frac{3\\pi}{2}, \\pm\\frac{5\\pi}{2}, \\dots$$. The general form is $$x = \\frac{(2n+1)\\pi}{2}$$ for any integer $$n$$.\n- Step 2: In the sketch ($$-2\\pi \\le x < 2\\pi$$), the asymptotes are at $$x = -\\frac{3\\pi}{2}, -\\frac{\\pi}{2}, \\frac{\\pi}{2}, \\frac{3\\pi}{2}$$. The line $$l$$ highlighted as the rightmost asymptote before $$2\\pi$$ is $$x = \\frac{3\\pi}{2}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "When asked for the equation of an asymptote of $$y = \\tan x$$, why is the form $$x = \\tfrac{(2n+1)\\pi}{2}$$ preferable to listing individual values? (1 step)", "answer": "The compact formula $$x = \\tfrac{(2n+1)\\pi}{2}$$ for integer $$n$$ captures every vertical asymptote at once, making it clear you understand the periodic pattern, whereas listing $$x = \\tfrac{\\pi}{2},\\ \\tfrac{3\\pi}{2},\\dots$$ risks omitting the negative ones or masking the general structure.", "source": "Kimi K2.6 ②", "_id": "kimi_2_34"}, {"question": "Why is the word \"hence\" in an exam question a critical clue about the intended method? (2 steps)", "answer": "- Step 1: \"Hence\" means \"use what you just did.\" In Q4, part (b)(i) asks you to sketch $$y = \\frac{1}{x}+1$$, and part (b)(ii) says \"hence, giving a reason, state the number of solutions.\" The sketch is not optional decoration — it is the **method**.\n- Step 2: Students who ignore \"hence\" and try to solve $$\\tan x = \\frac{1}{x}+1$$ algebraically get stuck (it's impossible by hand). Harry: *\"the word 'hence' is a clue — they ask you to draw it for a reason.\"* The intended path is always: sketch → count crossings → state reason.", "source": "GLM 5.1 ②", "_id": "glm_2_31"}, {"question": "When simplifying $4 + \\frac{4-x^2}{x^2-2x}$, what's the first algebraic move and why? (2 steps)", "answer": "- Step 1: **Factorise both numerator and denominator.** $4-x^2 = (2-x)(2+x)$ (difference of two squares) and $x^2-2x = x(x-2)$ (common factor $x$).\n- Step 2: **Why factorise first:** you can't cancel anything in unfactored form. Factoring exposes the structure — and here it reveals that the numerator has $(2-x)$ while the denominator has $(x-2)$, which are *almost* the same factor but with terms swapped. That's the gateway to the sign-flip cancellation.", "source": "GLM 5.1 ①", "_id": "glm_1_3"}, {"question": "Why is the boundary value $$x = -10\\pi$$ in Q4(c)(ii) safe to include (it gives an extra crossing) while a boundary value at an asymptote would not?", "answer": "$$x = -10\\pi$$ is a **zero** of $$\\tan x$$ (since $$\\sin(-10\\pi)=0$$), so $$\\tan x$$ is defined there. The interval closes ($$x \\le \\frac{5\\pi}{2}$$ uses $$\\le$$). At a zero, the branches to its right are full branches available to be counted. By contrast, if the boundary were at an asymptote (e.g. $$x = -\\frac{19\\pi}{2}$$), $$\\tan x$$ is undefined there — no crossing can lie *on* the boundary, and partial branches need careful treatment.\n\nRule: check whether the boundary lands on a zero, an asymptote, or an interior point — each changes how you count.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "What's the systematic method to find the range of $$p$$ for which $$\\cos 2x^\\circ = p$$ has exactly $$N$$ solutions on a given domain? (4 steps)", "answer": "- Step 1: Split the domain into **monotonic pieces** (where the function is strictly increasing or strictly decreasing) by locating max/min turning points.\n- Step 2: For each piece, note the **range of $$y$$**-values it covers.\n- Step 3: For each candidate band of $$p$$, count the number of pieces it intersects (=1 per piece if $$p$$ is in that piece's range, 0 otherwise). Watch for shared endpoint values (max/min) where two pieces meet at the same $$y$$.\n- Step 4: Identify which bands give total = $$N$$.\n\nFor $$\\cos 2x^\\circ = p$$ on $$[0, 225]$$: pieces are $$S_1[0,90]:1\\to-1$$, $$S_2[90,180]:-1\\to1$$, $$S_3[180,225]:1\\to0$$. Result: $$-1 < p < 0$$ or $$p = 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "In a ratio problem, how do you choose which quantity to anchor, and what makes a \"good\" choice? Use the Q1 example where $$\\dfrac{QX}{PX}=\\dfrac{1}{6}$$ and $$\\dfrac{QX}{XR}=\\dfrac{2}{3}$$. (3 steps)", "answer": "- Step 1: **Anchor on the quantity that appears in the most given ratios.** Here $$QX$$ appears in both ratios, so make it the anchor.\n- Step 2: From the ratios, $$PX = 6 \\cdot QX$$ and $$XR = \\tfrac{3}{2} \\cdot QX$$. To make both integers, $$QX$$ must be **even**. The smallest even choice is $$QX = 2$$, giving $$PX = 12$$ and $$XR = 3$$.\n- Step 3: Choosing $$QX = 1$$ is legal but forces $$XR = 1.5$$ — messier arithmetic for no benefit. Always pick the **smallest** value that clears all denominators.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "Why does a vertical translation $f(x) + a$ move the horizontal asymptote but not the vertical asymptote? (2 steps)", "answer": "- Step 1: $f(x) + a$ adds $a$ to every $y$-value. A horizontal asymptote is a $y$-value the curve approaches, so it shifts up by $a$. The vertical asymptote is an $x$-value where the curve blows up — that depends on the *input*, not the output, and the input hasn't changed.\n- Step 2: For $y = \\frac{1}{x} + 1$: the blow-up still happens at $x = 0$ (denominator is still $x$), but as $x \\to \\infty$ the curve now approaches $y = 1$ instead of $y = 0$.", "source": "GLM 5.1 ①", "_id": "glm_1_13"}, {"question": "What's the key difference between how $f(x) + a$ and $f(x + a)$ affect asymptotes? (2 steps)", "answer": "- Step 1: $f(x) + a$ (vertical shift up): **horizontal** asymptotes move up by $a$; **vertical** asymptotes are unchanged (the $x$-values where the function blows up haven't changed).\n- Step 2: $f(x + a)$ (horizontal shift left): **vertical** asymptotes shift left by $a$; **horizontal** asymptotes are unchanged (the $y$-values approached at infinity are the same). Asymptotes move in the direction of the translation.", "source": "GLM 5.1 ①", "_id": "glm_1_47"}, {"question": "For the equation $\\tan x = \\frac{1}{x}+1$ on $0 \\le x \\le 40\\pi$, why is the answer simply 40? (3 steps)", "answer": "- Step 1: For large $x$, $\\frac{1}{x}+1 \\approx 1$: a near-horizontal line just above $y = 1$. It's nearly flat.\n- Step 2: By the one-crossing-per-branch principle, this near-flat line cuts each $\\pi$-wide branch of $\\tan x$ exactly once.\n- Step 3: The interval $0 \\le x \\le 40\\pi$ has width $40\\pi$, spanning 40 branches. So 40 solutions. The fast count is: **interval width ÷ branch width** = $40\\pi / \\pi = 40$.", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "When asked for \"the range of possible values of $p$\" given a condition on solutions, why must you consider boundary cases like $p = 1$ separately? (2 steps)", "answer": "- Step 1: The condition \"exactly two solutions\" may be satisfied at a specific value (like $p = 1$ where the line touches at maxima) but not in a whole interval containing it.\n- Step 2: Always test the boundary values explicitly. At $p = 1$, the line $y = 1$ touches the curve at its maximum points — does this count as \"solutions\"? Yes, because equality holds. So $p = 1$ must be included as a separate case in the final answer, giving $-1 < p < 0$ or $p = 1$.", "source": "MiniMax ①", "_id": "minimax_1_37"}, {"question": "Practice problem: solve $$2x^2 + 3x \\le 5$$. What's the strategy and where do most sign errors creep in? (4 steps)", "answer": "- Step 1: Rearrange to standard order on one side: $$2x^2 + 3x - 5 \\le 0$$.\n- Step 2: Factorise — need product $$2 \\cdot (-5) = -10$$, sum $$+3$$. Pair: $$(+5, -2)$$. Split-the-middle: $$2x^2 + 5x - 2x - 5 = x(2x+5) - 1(2x+5) = (2x+5)(x-1)$$.\n- Step 3: Roots: $$x = -\\tfrac{5}{2}$$, $$x = 1$$. Upward parabola ($$a = 2 > 0$$) ⇒ $$\\le 0$$ **between** the roots.\n- Step 4: Answer: $$-\\tfrac{5}{2} \\le x \\le 1$$. Sign error trap: forgetting to flip from \"outside\" to \"between\" when the inequality is $$\\le 0$$ rather than $$\\ge 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "What is the \"burger method\" for simplifying a fraction divided by a fraction like $$\\frac{2}{9/2}$$, and why does it prevent a common upside-down error? (2 steps)", "answer": "- Step 1: **Stack the division** and flip the bottom fraction: $$\\frac{2}{9/2} = \\frac{2}{1} \\times \\frac{2}{9}$$. Keep the original numerator on top and the original denominator on the bottom — then multiply straight across.\n- Step 2: The result is $$\\frac{4}{9}$$. The trap Harry caught live: students sometimes write $$\\frac{2}{1}\\times\\frac{9}{2}=\\frac{18}{2}=9$$, flipping the wrong fraction. The rule is: **flip the denominator of the big fraction only**, never the numerator. \"Two times two goes on the *top*.\"", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "What is the first thing you must do before solving any quadratic inequality, and why is doing it out of order the \"classic way to flip a sign\"? (2 steps)", "answer": "- Step 1: **Rearrange to standard order** — $$x^2$$ term, then $$x$$ term, then constant, all on one side with the leading coefficient positive. For $$x^2 \\ge 8 - 2x$$: move everything left to get $$x^2 + 2x - 8 \\ge 0$$.\n- Step 2: Without standard order, you risk misreading the sum/product of roots or flipping the inequality direction. An out-of-order expression like $$x^2 - 8 + 2x$$ hides the true coefficient of $$x$$ (it's $$+2$$, not $$-2$$). Standard form makes the parabola's sign and the root signs immediately readable.", "source": "GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "What's the easy-to-confuse rule pair: $$f(ax)$$ vs $$f(x/a)$$ — which is the squash, which is the widening?", "answer": "- $$f(ax)$$: horizontal stretch of scale factor $$\\tfrac{1}{a}$$. If $$a > 1$$ this **squashes** toward the $$y$$-axis.\n- $$f(x/a)$$: horizontal stretch of scale factor $$a$$. If $$a > 1$$ this **widens** away from the $$y$$-axis.\n\nAnchor: derivation gives $$(x, y) \\mapsto (x/a, y)$$ for $$f(ax)$$ — $$x$$-coords are **divided** by $$a$$ — so a big $$a$$ makes coordinates small ⇒ squash.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "When a problem gives you only ratios and asks for a ratio (e.g. $\\frac{QX}{PX}=\\frac{1}{6}$, $\\frac{QX}{XR}=\\frac{2}{3}$, find $\\frac{QX}{MX}$), what trick should you immediately deploy and why does it work? (3 steps)", "answer": "- Step 1: **Assign convenient numerical values** to the lengths. Pick the smallest nice integers that respect every given ratio, then just compute the target ratio with those numbers.\n- Step 2: **Why it works:** a ratio fixes only *relative* sizes, never absolute lengths. The final ratio is dimensionless and independent of scale, so any valid scaling gives the same answer. Inventing integers kills the ugly fractions and algebra that come with carrying symbols.\n- Step 3: **How to choose well:** anchor on the quantity that appears in *several* ratios (here $QX$ appears in both). Pick the smallest value that makes every derived length an integer — e.g. $QX=2$ (not $1$, which forces $XR=1.5$).\n\nThe answer is always the same no matter what valid value you pick — that's the whole point.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "In a ratio problem, you've anchored $QX=2$ and found $PX=12$, $XR=3$, $PR=15$, $PM=7.5$, $MX=4.5$. The final step is $\\frac{QX}{MX}=\\frac{2}{4.5}$. What's the \"burger method\" for simplifying $\\frac{2}{9/2}$, and what's the common mistake? (2 steps)", "answer": "- Step 1: **Stack and flip.** Write $\\frac{2}{9/2}$ as $\\frac{2}{1}\\times\\frac{2}{9}=\\frac{4}{9}$. The \"burger\" is: numerator stays on top, flip the bottom fraction and multiply across.\n- Step 2: **The common mistake** is putting the product upside-down — writing $\\frac{9}{4}$ instead of $\\frac{4}{9}$. Harry's live correction: \"two times two goes on the *top*.\" The numerator of the original fraction times the numerator of the flipped denominator is your new numerator.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "In Q1, the right angle $\\angle QXR = 90°$ is given in the problem statement. Did the ratio trick use this information? What does that tell you about its role? (2 steps)", "answer": "- Step 1: **No.** The assign-a-value trick never uses the right angle. It only needs the two given ratios $\\frac{QX}{PX}$ and $\\frac{QX}{XR}$.\n- Step 2: **It's a distractor.** The right angle is there for students who try to attack with Pythagoras or coordinate geometry — a valid but much slower route. Recognising that ratio-asks-ratio means you can skip it entirely is part of the exam craft: don't use information you don't need.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "When simplifying $4 + \\frac{4-x^2}{x^2-2x}$, what's the first algebraic move and why? (2 steps)", "answer": "- Step 1: **Factorise both numerator and denominator.** $4-x^2 = (2-x)(2+x)$ (difference of two squares) and $x^2-2x = x(x-2)$ (common factor $x$).\n- Step 2: **Why factorise first:** you can't cancel anything in unfactored form. Factoring exposes the structure — and here it reveals that the numerator has $(2-x)$ while the denominator has $(x-2)$, which are *almost* the same factor but with terms swapped. That's the gateway to the sign-flip cancellation.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "What identity do you use when a numerator factor and a denominator factor have the same terms but in opposite order, e.g. $\\frac{2-x}{x-2}$? State the general rule and the result. (2 steps)", "answer": "- Step 1: The **sign-flip identity:** $a - b = -(b - a)$. Swapping the two terms in a difference flips the sign.\n- Step 2: Therefore $\\frac{a-b}{b-a} = \\frac{-(b-a)}{b-a} = -1$. So $\\frac{2-x}{x-2} = -1$, $\\frac{x-y}{y-x} = -1$, $\\frac{P-Q}{Q-P} = -1$. Harry drilled: \"it'd be very easy to cancel them out thinking they were the same, without putting the minus one.\"", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "What's the exam-speed trick for swapped-difference fractions like $\\frac{x-y}{y-x}$ or $\\frac{3-x}{x-3}$? (2 steps)", "answer": "- Step 1: **Recognise them on sight as $-1$.** Don't factor out $-1$ each time — that wastes seconds. If the numerator and denominator are the same two terms but in opposite order inside a subtraction, the fraction equals $-1$ instantly.\n- Step 2: Harry's motivation: \"it would speed you up a great deal\" under exam time pressure. The pattern-recognition shortcut saves a line of working on every appearance.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "After cancelling $(2-x)/(x-2) = -1$ in Q2, you reach $4 + \\frac{-(2+x)}{x}$. What's the trap when distributing the minus sign, and what wrong answer does it produce? (3 steps)", "answer": "- Step 1: The minus sign must distribute over **both** terms of $(2+x)$. Write $4 - \\frac{2+x}{x}$, then split: $4 - \\frac{2}{x} - \\frac{x}{x} = 4 - \\frac{2}{x} - 1 = 3 - \\frac{2}{x}$.\n- Step 2: **The trap:** forgetting the implied bracket and writing $4 - \\frac{2}{x} + \\frac{x}{x}$, which gives $4 - \\frac{2}{x} + 1 = 5 - \\frac{2}{x}$. This is a deliberately offered wrong option in MCQs.\n- Step 3: The minus sign from the $-1$ cancellation applies to the *entire* numerator $-(2+x)$, not just the first term. Always write the bracket explicitly: $4 - \\left(\\frac{2+x}{x}\\right)$.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "When solving $x^2 \\ge 8 - 2x$, what must you do before anything else, and why is skipping it dangerous? (2 steps)", "answer": "- Step 1: **Rearrange to standard order** on one side: $x^2 + 2x - 8 \\ge 0$. Always write $x^2$ term, then $x$ term, then constant, with the leading coefficient positive.\n- Step 2: **Why:** reading roots off an unrearranged or out-of-order expression is the classic way to flip a sign. If you try to factor $x^2 \\ge 8 - 2x$ as-is, you'll misread the sum/product and pick the wrong roots. Standard form lets you read off $-b/a$ and $c/a$ directly and apply the \"≥0 → outside the roots\" rule.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "How do you use the sum and product of roots as a *check* after factorising $x^2 + 2x - 8$? (3 steps)", "answer": "- Step 1: For $x^2 + bx + c = (x-\\alpha)(x-\\beta)$, expanding gives $x^2 - (\\alpha+\\beta)x + \\alpha\\beta$. So $\\alpha + \\beta = -b$ and $\\alpha\\beta = c$. Here $b=2$, $c=-8$.\n- Step 2: Candidate roots must multiply to $c = -8$ and add to $-b = -2$. Test $(+4, -2)$: product $= -8$ ✓, sum $= +2$ ✗ (wrong sign). Test $(-4, +2)$: product $= -8$ ✓, sum $= -2$ ✓.\n- Step 3: Correct factorisation: $x^2 + 2x - 8 = (x+4)(x-2)$, roots $x = -4$ and $x = 2$. The sum/product check catches the sign-slip that briefly appeared on the board (writing $x_1=4, x_2=-2$ instead).", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "For an upward-opening parabola ($a > 0$) with real roots $\\alpha < \\beta$, where is the quadratic $\\ge 0$ and where is it $\\le 0$? Give the mnemonic. (2 steps)", "answer": "- Step 1: $ax^2 + bx + c \\ge 0 \\iff x \\le \\alpha$ **or** $x \\ge \\beta$ (outside the roots). $ax^2 + bx + c \\le 0 \\iff \\alpha \\le x \\le \\beta$ (between the roots).\n- Step 2: **Mnemonic:** \"A happy (upward) parabola is positive on the outside, negative in the middle.\" The ≥/≤ versions simply include the roots themselves. This is why standard order with positive leading coefficient matters — it makes this rule apply directly.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "What are the asymptotes of $y = \\tan x$ (in radians), and what rhythm do they follow? (3 steps)", "answer": "- Step 1: **Vertical asymptotes** where $\\cos x = 0$: at $x = \\pm\\frac{\\pi}{2}, \\pm\\frac{3\\pi}{2}, \\dots$, i.e. the **odd** multiples of $\\frac{\\pi}{2}$, written $x = \\frac{(2n+1)\\pi}{2}$.\n- Step 2: **Zeros** where $\\sin x = 0$: at $x = n\\pi$ (every $\\pi$).\n- Step 3: **Rhythm:** \"Something interesting happens every $\\frac{\\pi}{2}$\" — it's either a zero or an asymptote, alternating. This single pattern places every feature of the $\\tan$ graph. Harry stressed this as the key to sketching it quickly.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "On a single branch of $\\tan x$ (the piece between two adjacent asymptotes, width $\\pi$), what range of values does $\\tan x$ take, and what consequence does this have for intersections with a horizontal line? (2 steps)", "answer": "- Step 1: On each branch, $\\tan x$ rises **continuously and strictly** from $-\\infty$ to $+\\infty$. It passes through one zero in the middle.\n- Step 2: By the Intermediate Value Theorem, a horizontal line $y = c$ at any fixed finite height is met **exactly once** per branch. This is the \"one crossing per $\\pi$-wide branch\" principle — the foundation for counting solutions of $\\tan x = c$ over large intervals.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "The curve $y = \\frac{1}{x} + 1$ is a translation of $y = \\frac{1}{x}$. What are its asymptotes, and what's the common mistake? (3 steps)", "answer": "- Step 1: $y = \\frac{1}{x} + 1$ is $y = \\frac{1}{x}$ shifted **up by 1**. This is a vertical translation.\n- Step 2: **Vertical asymptote** $x = 0$ (unchanged — we moved up, not sideways). **Horizontal asymptote** moves from $y = 0$ to $\\boxed{y = 1}$.\n- Step 3: **The common mistake** (Phuc's slip #1): keeping the horizontal asymptote at $y = 0$. A vertical translation moves the asymptotes with the curve. Always redraw the asymptote first, then sketch the branches relative to it.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Why does a vertical translation $f(x) + a$ move the horizontal asymptote but not the vertical asymptote? (2 steps)", "answer": "- Step 1: $f(x) + a$ adds $a$ to every $y$-value. A horizontal asymptote is a $y$-value the curve approaches, so it shifts up by $a$. The vertical asymptote is an $x$-value where the curve blows up — that depends on the *input*, not the output, and the input hasn't changed.\n- Step 2: For $y = \\frac{1}{x} + 1$: the blow-up still happens at $x = 0$ (denominator is still $x$), but as $x \\to \\infty$ the curve now approaches $y = 1$ instead of $y = 0$.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": true}, {"question": "When an exam says \"Hence, state the number of solutions of $\\tan x = \\frac{1}{x}+1$,\" what does the word \"hence\" signal about the intended method? (2 steps)", "answer": "- Step 1: **\"Hence\" means use the previous work** — in this case, the sketch you just drew. The intended method is graphical: count the intersections of $y = \\tan x$ and $y = \\frac{1}{x}+1$.\n- Step 2: Students who try to solve $\\tan x = \\frac{1}{x}+1$ algebraically get stuck (it's transcendental, no closed-form solution). Harry: \"the word *hence* is a clue — they ask you to draw it for a reason.\" The picture *is* the method.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "What's the fundamental principle that converts \"solutions of $f(x) = g(x)$\" into a graphical count? (2 steps)", "answer": "- Step 1: A solution of $f(x) = g(x)$ is an $x$ where both curves have the **same height**. Graphically, that's a point where they **cross**.\n- Step 2: Therefore $\\#\\{\\text{solutions of } f(x) = g(x)\\} = \\#\\{\\text{intersection points of the two graphs}\\}$. Harry: \"visualising the intersection of two graphs is a highly effective way to solve equations.\" This one idea powers the entire Q4 approach.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "For the equation $\\tan x = \\frac{1}{x}+1$ on $0 \\le x \\le 40\\pi$, why is the answer simply 40? (3 steps)", "answer": "- Step 1: For large $x$, $\\frac{1}{x}+1 \\approx 1$: a near-horizontal line just above $y = 1$. It's nearly flat.\n- Step 2: By the one-crossing-per-branch principle, this near-flat line cuts each $\\pi$-wide branch of $\\tan x$ exactly once.\n- Step 3: The interval $0 \\le x \\le 40\\pi$ has width $40\\pi$, spanning 40 branches. So 40 solutions. The fast count is: **interval width ÷ branch width** = $40\\pi / \\pi = 40$.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "For $\\tan x = \\frac{1}{x}+1$ on $-10\\pi \\le x \\le \\frac{5\\pi}{2}$, the answer is 14, counted as $10 + 1 + 3$. What does each group represent? (3 steps)", "answer": "- Step 1: **The 10:** ten ordinary $\\tan$ branches from $-10\\pi$ up to about $-\\frac{\\pi}{2}$. The near-horizontal part of $\\frac{1}{x}+1$ (which $\\approx 1$ for large $|x|$) cuts each branch once. The boundary $x = -10\\pi$ is a *zero* of $\\tan x$, not an asymptote, so all 10 branches to its right are counted.\n- Step 2: **The 1:** \"the odd one out which lies below the axis.\" On $\\left(-\\frac{\\pi}{2}, 0\\right)$, the curve $\\frac{1}{x}+1$ dives to $-\\infty$ at its pole $x = 0$ and meets the rising $\\tan$ branch *below* the $x$-axis. This is the crossing Phuc missed when he first answered 12.\n- Step 3: **The 3:** from $0$ up to $\\frac{5\\pi}{2}$: one crossing on $\\left(0, \\frac{\\pi}{2}\\right)$ *above* the axis (where $\\frac{1}{x}+1$ comes down from $+\\infty$), plus two ordinary branches centred at $\\pi$ and $2\\pi$.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Why does the branch of $\\tan x$ on $\\left(-\\frac{\\pi}{2}, \\frac{\\pi}{2}\\right)$ contain **two** crossings with $y = \\frac{1}{x}+1$ instead of the usual one? (3 steps)", "answer": "- Step 1: This branch spans the pole of $\\frac{1}{x}+1$ at $x = 0$. The reciprocal curve shoots to $+\\infty$ as $x \\to 0^+$ and to $-\\infty$ as $x \\to 0^-$.\n- Step 2: On $\\left(-\\frac{\\pi}{2}, 0\\right)$: $\\frac{1}{x}+1$ is large and negative (it dives to $-\\infty$), while $\\tan x$ rises from $-\\infty$ to $0$. They cross once *below* the $x$-axis.\n- Step 3: On $\\left(0, \\frac{\\pi}{2}\\right)$: $\\frac{1}{x}+1$ is large and positive (coming down from $+\\infty$), while $\\tan x$ rises from $0$ to $+\\infty$. They cross once *above* the $x$-axis. Two crossings total — the only branch where this happens.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "When a question says \"giving a reason, state the number of solutions,\" what exact wording earns the reason mark? (2 steps)", "answer": "- Step 1: The count alone scores nothing without justification. You must name **both** curves and the interval.\n- Step 2: Model answer: \"There are $N$ solutions because the graph of $y = \\tan x$ intersects the graph of $y = \\frac{1}{x}+1$ $N$ times in the interval $-2\\pi \\le x < 2\\pi$.\" This single sentence is the mark.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "What mapping describes the transformation from $y = f(x)$ to $y = f(ax)$, and how do you derive it? (3 steps)", "answer": "- Step 1: Let $g(x) = f(ax)$. A point $(X, Y)$ lies on $y = f(x)$ when $Y = f(X)$. Where is the matching point on $y = g(x)$?\n- Step 2: We need the *input to $f$* to equal $X$, so $ax = X$, giving $x = \\frac{X}{a}$. Then $g\\!\\left(\\frac{X}{a}\\right) = f(X) = Y$.\n- Step 3: So $(X, Y)$ on $y = f(x)$ maps to $\\left(\\frac{X}{a}, Y\\right)$ on $y = f(ax)$. Every $x$-coordinate is **divided by $a$**; $y$ is untouched. Dividing $x$-coordinates by $a$ is a horizontal stretch of scale factor $\\frac{1}{a}$.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "For $f(ax)$ with $a > 1$, is the graph stretched wider or squashed narrower? Explain using the mapping. (2 steps)", "answer": "- Step 1: $f(ax)$ sends every $x$-coordinate to $\\frac{x}{a}$. Since $a > 1$, $\\frac{x}{a} < x$: all points move *closer* to the $y$-axis. The graph is **squashed** narrower — horizontal stretch of scale factor $\\frac{1}{a} < 1$.\n- Step 2: For $\\cos 2x°$: $a = 2$, so scale factor $\\frac{1}{2}$. The curve is pulled in to half its width. Period halves from $360°$ to $180°$. **$f(ax)$ with $a > 1$ always squashes; $f\\!\\left(\\frac{x}{a}\\right)$ with $a > 1$ always widens.**", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "What's the period of $\\cos(kx)°$ and why? Give the formula and the intuition. (2 steps)", "answer": "- Step 1: Period $= \\frac{360°}{k}$. Replacing $x$ with $kx$ compresses the horizontal axis by factor $k$, so the curve completes its cycle $k$ times faster — the period shrinks by factor $k$.\n- Step 2: Example: $\\cos 2x°$ has period $\\frac{360}{2} = 180°$. In radians the rule is $\\frac{2\\pi}{k}$. The same logic applies to $\\sin(kx)°$.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": true}, {"question": "How do you build the key points of $y = \\cos 2x°$ from the key points of $y = \\cos x°$? (2 steps)", "answer": "- Step 1: Apply the mapping $(x, y) \\mapsto \\left(\\frac{x}{2}, y\\right)$ to each landmark of $\\cos x°$: $(0,1) \\to (0,1)$; $(90,0) \\to (45,0)$; $(180,-1) \\to (90,-1)$; $(270,0) \\to (135,0)$; $(360,1) \\to (180,1)$.\n- Step 2: The maximum-to-maximum distance shrinks from $360°$ to $180°$, confirming the period halves. Continuing: $(450,0) \\to (225,0)$, which gives $R(225, 0)$ in Q5.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}, {"question": "In Q5, the point $Q$ is the minimum of $y = \\cos 2x°$. What are its coordinates, and how do you find them? (2 steps)", "answer": "- Step 1: The minimum of $\\cos 2x° = -1$ occurs when $2x = 180°$, so $x = 90°$, $y = -1$.\n- Step 2: $Q = (90°, -1)$. Alternatively, from the mapping: the minimum of $\\cos x°$ is at $(180°, -1)$, which maps to $\\left(\\frac{180}{2}, -1\\right) = (90°, -1)$. Both routes agree.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "In Q5, $R(k, 0)$ is the rightmost $x$-intercept shown. Why is $k = 225$, not $270$? (3 steps)", "answer": "- Step 1: Zeros of $\\cos 2x°$ occur where $2x = 90, 270, 450, \\dots$, i.e. $x = 45, 135, 225, \\dots$\n- Step 2: Reading the sketch left to right: $(0,1) \\to (45,0) \\to (90,-1)_Q \\to (135,0) \\to (180,1) \\to (225,0)_R$. $R$ is the **third zero**, at $x = 225$.\n- Step 3: $x = 270$ would be the *next minimum* (where $\\cos 2x° = -1$ again), not an $x$-intercept. The board initially wrote $270$ then corrected to the committed answer $k = 225$. Always distinguish zeros from extrema.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "For \"exactly two solutions of $\\cos 2x° = p$ on $0 \\le x \\le 225$,\" why is $-1 < p < 1$ the WRONG answer? (3 steps)", "answer": "- Step 1: The domain $[0, 225]$ is not a clean full period — it contains the full down-up swing $[0, 180]$ PLUS a partial piece $[180, 225]$ where the curve falls from $1$ back down to $0$.\n- Step 2: For any $0 < p < 1$, the horizontal line $y = p$ meets the falling part $S_1$ once, the rising part $S_2$ once, AND the partial falling piece $S_3$ once — that's **three** intersections, not two.\n- Step 3: Similarly $p = 0$ gives three zeros ($x = 45, 135, 225$). The over-broad \"$-1 < p < 1$\" is the headline trap of the lesson. The curve *climbs back up* to $(180, 1)$ and then falls, creating that extra intersection.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "How do you systematically find the \"exactly $n$ solutions\" range for $\\cos 2x° = p$ on a domain? (3 steps)", "answer": "- Step 1: **Split the curve into monotonic pieces.** On $[0, 225]$: $S_1: [0, 90]$, $y$ falls $1 \\to -1$; $S_2: [90, 180]$, $y$ rises $-1 \\to 1$; $S_3: [180, 225]$, $y$ falls $1 \\to 0$.\n- Step 2: **For each band of $p$, count how many pieces the line $y = p$ crosses.** $p = 1$: endpoints of $S_1$ and $S_2$ (shared point at $x=0$ and $x=180$) → 2. $0 < p < 1$: crosses $S_1$, $S_2$, and $S_3$ → 3. $p = 0$: three zeros → 3. $-1 < p < 0$: crosses $S_1$ and $S_2$ only ($S_3$ stays above $0$) → 2. $p = -1$: only $x = 90$ → 1.\n- Step 3: **Exactly two solutions** when $-1 < p < 0$ or $p = 1$. The method generalises: always split into monotonic pieces and count per piece.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "In the \"exactly two solutions\" analysis for Q5(b), why does $p = 1$ give exactly 2 solutions, not 1 or 3? (3 steps)", "answer": "- Step 1: $p = 1$ means the line $y = 1$ touches the curve at its maxima. On $[0, 225]$, the maxima are at $x = 0$ and $x = 180$.\n- Step 2: $S_3$ starts at $(180, 1)$ — but this point is already counted as the endpoint of $S_2$. It's the *same* intersection, not a new one.\n- Step 3: So $p = 1$ gives exactly 2 solutions: $x = 0$ and $x = 180$. The shared endpoint between $S_2$ and $S_3$ doesn't double-count.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "In the \"exactly two solutions\" analysis, why does $-1 < p < 0$ give exactly 2? (2 steps)", "answer": "- Step 1: For $-1 < p < 0$, the line $y = p$ is a negative height. It crosses $S_1$ (falling from $1$ to $-1$, so it passes through $p$ once) and $S_2$ (rising from $-1$ to $1$, so it passes through $p$ once). That's 2 crossings.\n- Step 2: It does NOT cross $S_3$, because $S_3$ goes from $y = 1$ down to $y = 0$ — it never reaches a negative $p$. So no third intersection. Total: exactly 2.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "What's the reusable checklist for \"how many solutions of $f(x) = g(x)$ in an interval?\" (5 steps)", "answer": "- Step 1: Sketch **both** graphs on the same axes — get asymptotes and periods right.\n- Step 2: Solutions = crossings; **count crossings, not algebra.**\n- Step 3: For a periodic curve vs a near-flat line: count $\\approx$ (interval width) / (period of one branch), then **fix the ends** — partial branches and boundary points on asymptotes.\n- Step 4: If the curve changes direction inside the interval, split it into **monotonic pieces** and count each piece separately (this catches the third intersection).\n- Step 5: State a reason naming both curves and the interval.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "For $f(x) \\to f(ax)$, what happens to the period, and for $f(x) \\to f\\!\\left(\\frac{x}{a}\\right)$? (2 steps)", "answer": "- Step 1: $f(ax)$: horizontal stretch SF $\\frac{1}{a}$. If the original period is $T$, the new period is $\\frac{T}{a}$ (squashed). E.g. $\\cos 2x°$: period $= \\frac{360}{2} = 180°$.\n- Step 2: $f\\!\\left(\\frac{x}{a}\\right)$: horizontal stretch SF $a$. The new period is $aT$ (widened). E.g. $\\cos\\!\\left(\\frac{x}{2}\\right)°$: period $= 2 \\times 360 = 720°$. **$f(ax)$ divides the period; $f(x/a)$ multiplies it.**", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "What exam habit did Harry recommend for multi-step questions to avoid missing a given piece of information? (2 steps)", "answer": "- Step 1: **Tick off problem-solving checkpoints as you use them.** \"Put a little tick next to them so you can see what you have used and what you haven't.\"\n- Step 2: On a multi-step question, the unused given is usually exactly the next step. Harry's nudge: \"what haven't you used?\" — this directly led to finding the \"odd one out\" crossing that was missed.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "Why did Harry call the $\\cos 2x°$ \"range of $p$\" question A* material? (2 steps)", "answer": "- Step 1: \"Most students would miss this one completely\" — the tempting answer is $-1 < p < 1$ (everything in the range of cosine), which is wrong because the partial piece $S_3$ creates a third intersection for positive $p$.\n- Step 2: Knowing to split into monotonic pieces and count per piece — yielding $-1 < p < 0$ or $p = 1$ — is what separates the top grade. It requires seeing that the domain isn't a clean number of periods, and that the extra partial piece matters.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "For the practice question \"$\\cos x° = p$ has exactly two solutions on $0 \\le x \\le 270°$,\" what's the answer and why is $p = 0$ included here but NOT in Q5(b)? (3 steps)", "answer": "- Step 1: Monotonic pieces: $S_1: [0, 180]$, $y$ falls $1 \\to -1$; $S_2: [180, 270]$, $y$ rises $-1 \\to 0$.\n- Step 2: $p = 0$: line $y = 0$ meets $S_1$ at $x = 90$ and $S_2$ at $x = 270$ — exactly 2 solutions ✓. $-1 < p < 0$: crosses both $S_1$ and $S_2$ once → 2 solutions ✓. $p = -1$:
