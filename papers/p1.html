<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:#f5f5f7;color:#1d1d1f;line-height:1.6;-webkit-font-smoothing:antialiased}

.mp{background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;font-size:13px}

.ctrl{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:12px 16px;background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:14px;position:sticky;top:8px;z-index:20}

.ctrl .dk{background:#1d1d1f;color:#fff;border-color:#1d1d1f}

.ctrl .pp{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:#764ba2}

.cd.ds{opacity:0.5}
.ct{display:flex;align-items:flex-start;gap:10px}
.cb{flex-shrink:0;width:18px;height:18px;accent-color:#0071e3;cursor:pointer;margin-top:3px}

.cd.op .q::after{transform:rotate(90deg)}
.jp{display:inline-block;padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;margin-left:6px;vertical-align:middle}
.a{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f5;font-size:14px;color:#424245;line-height:1.7}

.tst{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.tst.sh{opacity:1}
.es{text-align:center;padding:60px 20px;color:#86868b;font-size:15px}

<script>
const DATA={"selected": [{"question": "If a region $$R$$ sits between a curve (the floor) and a line (the ceiling), how do you determine which inequality sign to use for the curve? (3 steps)", "answer": "- Step 1: The \"floor\" curve means $$R$$ lies ABOVE it. For points above the curve, the $$y$$-coordinate is larger than the curve's $$y$$-value at that $$x$$.\n- Step 2: So the inequality is $$y \\ge \\text{curve}$$ (not $$\\le$$).\n- Step 3: Sanity check: pick an $$x$$ in the region, compute the curve's $$y$$, and note the sample point has a larger $$y$$. If yes, confirms $$y \\ge$$; if smaller, flip to $$y \\le$$.\n\nMnemonic: \"above\" on the graph = $$\\ge$$ for $$y$$; \"below\" = $$\\le$$.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "Conceptually, what is the difference between the Sine Rule and the Cosine Rule in terms of the information they require? (2 steps)", "answer": "- Step 1: The **Sine Rule** ($$\\frac{a}{\\sin A} = \\frac{b}{\\sin B}$$) requires an angle-side pair (you need an angle and its opposite side to find another pair).\n- Step 2: The **Cosine Rule** ($$a^2 = b^2 + c^2 - 2bc \\cos A$$) is used when you have two sides and the included angle (to find the third side), or all three sides (to find an angle). It doesn't require an opposite angle-side pair initially.\n\nNo opposite pair? Sine Rule is useless. Use Cosine Rule.", "source": "GLM 5.1 ②", "_id": "glm_2_45"}, {"question": "Why must both the discriminant **and** the product of roots be positive for 4 distinct real intersections in $x^4 - 4x^2 + A = 0$?", "answer": "- Step 1: Substitute $y = x^2$ to get $y^2 - 4y + A = 0$.  \n- Step 2: For 4 real $x$, need 2 distinct **positive** $y$-roots (each gives $x = \\pm \\sqrt{y}$).  \n- Step 3: Conditions:  \n  - Discriminant $> 0$: $16 - 4A > 0 \\Rightarrow A < 4$.  \n  - Product of roots $> 0$: $A > 0$.  \n+ **Key insight**: Even if discriminant is positive, negative roots would not yield real $x$.", "source": "Qwen 3 ①", "_id": "qwen_1_7"}, {"question": "If a point $$A$$ lies on both the curve $$y = f'(x)$$ and the curve $$y = f''(x)$$, what equation can you write to find an unknown constant $$k$$? (2 steps)", "answer": "- Step 1: Being \"on both curves\" means that at the x-coordinate of $$A$$, both functions give the same y-value.\n- Step 2: Therefore, you substitute the x-coordinate of $$A$$ into both expressions and set them equal: $$f'(x_A) = f''(x_A)$$. Solve this resulting linear equation for $$k$$.\n\n\"Point on both curves\" is the exam trigger for substituting and equating the y-values.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "For the curve $$y=2x^{2}+8x+3$$ and the line $$y=4x+c$$, outline the conceptual sequence to find $$c$$ so that the line is tangent to the curve, without doing the full arithmetic. (4 steps)", "answer": "- Step 1: Differentiate the curve to obtain the gradient function $$\\frac{dy}{dx}=4x+8$$.\n- Step 2: Equate this derivative to the scalar gradient of the line. The line $$y=4x+c$$ has gradient $$4$$, so solve $$4x+8=4$$ to locate the $$x$$-coordinate of the tangent point.\n- Step 3: Substitute this $$x$$ back into the original curve equation (not the line) to find the corresponding $$y$$-coordinate, because the tangent point must lie on the curve.\n- Step 4: Insert the now-known point $$(x,y)$$ into the line equation $$y=4x+c$$ and rearrange to isolate $$c$$. The point must also satisfy the line.", "source": "Kimi K2.6 ②", "_id": "kimi_2_2"}, {"question": "For $$y = 12\\sin(x + B)$$, at what value(s) of $$(x + B)$$ does the minimum occur, and what is the minimum $$y$$-value? (2 steps)", "answer": "- Step 1: The sine function reaches its minimum of $$-1$$ when its argument equals $$\\frac{3\\pi}{2} + 2n\\pi$$ for integer $$n$$ (equivalently $$-\\frac{\\pi}{2} + 2n\\pi$$).\n- Step 2: At that argument, $$y = 12 \\times (-1) = -12$$. So the minimum $$y$$-value is $$-12$$, occurring when $$x + B = \\frac{3\\pi}{2} + 2n\\pi$$.\n\nCommon error: confusing $$\\sin = 1$$ (max, at $$\\pi/2$$) with $$\\sin = -1$$ (min, at $$3\\pi/2$$). Always check: minimum → argument is $$3\\pi/2$$ (not $$\\pi/2$$).", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "The extrema of sine occur at specific angles. State them in general form, and explain the \"$$+2n\\pi$$\" part. (3 steps)", "answer": "- Step 1: Maximum ($$\\sin = 1$$): $$\\theta = \\tfrac{\\pi}{2} + 2n\\pi$$ for integer $$n$$.\n- Step 2: Minimum ($$\\sin = -1$$): $$\\theta = \\tfrac{3\\pi}{2} + 2n\\pi$$ (equivalently $$-\\tfrac{\\pi}{2} + 2n\\pi$$).\n- Step 3: The \"$$+2n\\pi$$\" accounts for PERIODICITY: sine repeats every $$2\\pi$$. Each extremum occurs infinitely often, spaced $$2\\pi$$ apart. $$n = 0$$: principal; $$n \\ne 0$$: other occurrences.", "source": "Opus 4.7 ②", "_id": "opus_2_79"}, {"question": "When a region is defined by multiple inequalities simultaneously, how do you identify the correct overlapping area, and what is a reliable method to verify which side of a boundary to shade? (3 steps)", "answer": "- Step 1: Each inequality defines a half-plane or region on one side of a boundary. The solution to the system is the intersection (overlap) of all individual regions—the set of points satisfying every condition at once.\n- Step 2: To determine which side of a single boundary to shade, pick a test point not on the boundary—often the origin $$(0,0)$$ if it is not on the line—and substitute its coordinates into the inequality. If the statement is true, shade that side; otherwise, shade the opposite side.\n- Step 3: For combined inequalities like $$y < x+2$$ and $$y > x^2 - x$$, shade below the line and above the parabola respectively. The final region is the lens-shaped overlap where both conditions hold simultaneously.", "source": "Kimi K2.6 ①", "_id": "kimi_1_10"}, {"question": "Why does the inequality $$y > f(x)$$ describe the region strictly above the curve $$y = f(x)$$, and what boundary style should be used? (2 steps)", "answer": "- Step 1: For any fixed $$x$$, the values of $$y$$ satisfying $$y > f(x)$$ are all vertically above the point $$(x, f(x))$$. Since this holds for every $$x$$ in the domain, the region is the entire area above the curve.\n- Step 2: Because the inequality is strict ($$>$$ rather than $$\\geq$$), the boundary curve itself is not included in the solution set. This is represented by a dashed curve. If the inequality were $$y \\geq f(x)$$, a solid curve would indicate inclusion.", "source": "Kimi K2.6 ①", "_id": "kimi_1_9"}, {"question": "What does the discriminant $$\\Delta = b^2 - 4ac$$ tell you about the roots of $$ax^2 + bx + c = 0$$, and why is this geometrically meaningful? (3 steps)", "answer": "- Step 1: $$\\Delta > 0$$ means two distinct real roots — the parabola crosses the $$x$$-axis at two distinct points.\n- Step 2: $$\\Delta = 0$$ means one repeated root — the parabola touches (is tangent to) the $$x$$-axis at its vertex.\n- Step 3: $$\\Delta < 0$$ means no real roots — the parabola sits entirely above or below the $$x$$-axis and never crosses it.\n\nThe discriminant is the radicand under the square root in the quadratic formula: negative gives imaginary roots, zero gives a single root, positive gives the ± split into two distinct roots.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "Explain the biquadratic substitution $$u = x^2$$ for an equation like $$2x^4 - 7x^2 - 15 = 0$$, and why you need to check the sign of each $$u$$-root. (3 steps)", "answer": "- Step 1: The equation has only even powers of $$x$$. Let $$u = x^2$$, so $$x^4 = u^2$$. The equation becomes $$2u^2 - 7u - 15 = 0$$, a quadratic.\n- Step 2: Factor: $$(2u + 3)(u - 5) = 0 \\Rightarrow u = -\\tfrac{3}{2}$$ or $$u = 5$$.\n- Step 3: Back-substitute $$u = x^2$$:\n+ $$u = 5$$: $$x^2 = 5 \\Rightarrow x = \\pm\\sqrt{5}$$ — TWO real solutions.\n+ $$u = -\\tfrac{3}{2}$$: $$x^2 < 0$$ has NO real solution. REJECT.\n\nKey: $$x^2$$ can only equal a non-negative number, so NEGATIVE $$u$$-roots are always rejected.", "source": "Opus 4.7 ②", "_id": "opus_2_64"}, {"question": "How do you decompose the transformation $$y = f(-3x)$$ into simple steps, and what is the effect on a point $$(x_0, y_0)$$ on the original curve? (3 steps)", "answer": "- Step 1: The transformation $$f(-3x)$$ contains two operations inside the function argument: the negative sign indicates a reflection in the $$y$$-axis, and the coefficient $$3$$ indicates a horizontal compression by scale factor $$\\frac{1}{3}$$.\n- Step 2: To find the image of a point, replace the original $$x$$-coordinate with $$\\frac{x}{-3}$$. Equivalently, the new $$x$$-coordinate is $$-\\frac{x_0}{3}$$; the $$y$$-coordinate remains $$y_0$$.\n- Step 3: For example, a point at $$(-1, 0)$$ moves to $$\\left(\\frac{1}{3}, 0\\right)$$, and a point at $$(3,0)$$ moves to $$(-1,0)$$. A point on the $$y$$-axis $$(0, y_0)$$ is unchanged because $$x_0 = 0$$. Features like \"touches the axis\" are preserved because root multiplicities are maintained under scaling and reflection.", "source": "Kimi K2.6 ①", "_id": "kimi_1_15"}, {"question": "How does the formula $$a(x + b)^2 + c$$ link to the vertex form $$(h, k)$$, and why is there often a sign confusion?", "answer": "The vertex form is $$a(x - h)^2 + k$$, where the vertex is $$(h, k)$$. Comparing: $$(x + b)^2 = (x - (-b))^2$$, so $$h = -b$$.\n\n**The sign flip**: if you see $$(x + 3)^2$$, the $$x$$-coordinate of the vertex is $$-3$$ (not $$+3$$). If you see $$(x - 3)^2$$, the vertex $$x$$ is $$+3$$.\n\nMnemonic: \"What value of $$x$$ makes the inside zero?\" That's the vertex $$x$$. For $$(x+3)^2$$, it's $$x = -3$$.", "source": "Opus 4.7 ①", "_id": "opus_1_90"}, {"question": "Why does y = f(-3x) involve reflection and horizontal compression? Show coordinate transformation.", "answer": "- Step 1: Inside function f(-3x) affects x-coordinates.  \n- Step 2: Replace x with -x for reflection in y-axis.  \n- Step 3: Divide x by |3| for horizontal compression.  \n- Step 4: Combined: x → x/(-3)  \n+ Example: Original (3,0) becomes -1 (→ divide by -3).  \n+ **Visual intuition**: Think \"do math backwards\" for inside functions.", "source": "Qwen 3 ③", "_id": "qwen_3_8"}, {"question": "Explain the full translation of trigger phrases into discriminant conditions.", "answer": "- \"meets at a single point\" / \"tangent to\" / \"just touches\" → $$\\Delta = 0$$\n- \"two distinct points\" / \"cuts twice\" / \"two solutions\" → $$\\Delta > 0$$\n- \"does not meet\" / \"never intersects\" / \"no real solutions\" → $$\\Delta < 0$$\n- \"meets at least once\" / \"meets\" (without \"distinct\") → $$\\Delta \\geq 0$$\n\nThe discriminant IS the question: its sign controls the number of real intersections. Recognising these trigger phrases instantly tells you to reach for the discriminant tool.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "In working from a completed-the-square form $$a(x+b)^2 + c$$ back to expanded form $$Ax^2 + Bx + C$$, what relationships hold between $$a, b, c$$ and $$A, B, C$$?", "answer": "Expanding $$a(x + b)^2 + c = a(x^2 + 2bx + b^2) + c = ax^2 + 2abx + (ab^2 + c)$$.\n\nComparing to $$Ax^2 + Bx + C$$:\n- $$A = a$$ (leading coefficient matches).\n- $$B = 2ab$$, so $$b = \\frac{B}{2a} = \\frac{B}{2A}$$.\n- $$C = ab^2 + c$$, so $$c = C - ab^2 = C - \\frac{B^2}{4A}$$.\n\nSo completing the square: $$Ax^2 + Bx + C = A\\left(x + \\frac{B}{2A}\\right)^2 + C - \\frac{B^2}{4A}$$.\n\nThe $$-\\frac{B^2}{4A}$$ term IS the discriminant-related adjustment — note $$B^2 - 4AC = -4A \\cdot (C - \\frac{B^2}{4A}) = -4A \\cdot c$$.", "source": "Opus 4.7 ①", "_id": "opus_1_138"}, {"question": "What's the key formula relating arc length $$\\ell$$, radius $$r$$, and angle $$\\theta$$? Explain why it's LINEAR. (3 steps)", "answer": "- Step 1: Formula: $$\\ell = r\\theta$$ with $$\\theta$$ in radians.\n- Step 2: Linear because: arc length is proportional to angle (doubling $$\\theta$$ doubles arc), and also proportional to radius (twice as big circle has twice the arc for the same angle).\n- Step 3: Derivation: full circle has $$\\theta = 2\\pi$$ and circumference $$2\\pi r$$. So arc/circumference = $$\\theta/(2\\pi)$$, giving arc = $$r\\theta$$. Radians are chosen so the $$2\\pi$$'s cancel.", "source": "Opus 4.7 ②", "_id": "opus_2_72"}, {"question": "What does \"simplest form\" for an integration answer typically mean in IAL P1? (3 steps)", "answer": "- Step 1: No negative exponents in the final answer (convert $$x^{-n}$$ back to $$\\tfrac{1}{x^n}$$).\n- Step 2: No unreduced fractions; combine like terms; omit trivial coefficients.\n- Step 3: Always include $$+C$$ for indefinite integrals.\n\nExample: $$\\tfrac{3}{4}x^{-2}$$ should be written $$\\tfrac{3}{4x^2}$$ in the final answer.", "source": "Opus 4.7 ②", "_id": "opus_2_88"}, {"question": "When a question asks you to \"show that\" an equation equals a specific form, what must your working demonstrate? (2 steps)", "answer": "- Step 1: \"Show that\" means your working must **arrive at** the stated result from the given information. You can't just verify by substituting the answer back — you must derive it. Every step must be clear and logical.\n- Step 2: The mark scheme typically awards marks for key intermediate steps. For \"show that $$4p^{2}-33p+8=0$$,\" marks would be for: correct substitution, clearing fractions, and reaching the final form. If you skip steps and just write the answer, you may lose method marks even if the result is correct.\n\nTakeaway: \"Show that\" = derive it step by step. Don't verify; derive. Show all key intermediate steps.", "source": "GLM 5.1 ③", "_id": "glm_3_94"}, {"question": "When \"$$ADC$$ is a straight line\" is stated, what angle relationship does it create, and what's the consequence for $$\\sin$$ of those angles?", "answer": "Points $$A$$, $$D$$, $$C$$ collinear means $$\\angle BDA$$ and $$\\angle BDC$$ are supplementary: $$\\angle BDA + \\angle BDC = 180°$$ (angles on a straight line).\n\nConsequence: $$\\sin(\\angle BDA) = \\sin(\\angle BDC)$$ because $$\\sin(180° - \\theta) = \\sin\\theta$$. Supplementary angles have identical sines (but opposite cosines: $$\\cos(180° - \\theta) = -\\cos\\theta$$).\n\nThis is very useful in sine-rule calculations spanning both triangles — you can reuse the $$\\sin$$ value directly.", "source": "Opus 4.7 ①", "_id": "opus_1_61"}, {"question": "Summarise the six basic graph transformation rules for $$y = f(x)$$ — what each does to the graph. (3 steps)", "answer": "- Step 1: OUTSIDE the $$f$$ bracket (affects $$y$$, \"intuitive\" direction):\n+ $$f(x) + a$$: shift UP by $$a$$\n+ $$af(x)$$: vertical stretch, scale factor $$a$$\n+ $$-f(x)$$: reflect in the $$x$$-axis\n\n- Step 2: INSIDE the $$f$$ bracket (affects $$x$$, \"opposite\" direction):\n+ $$f(x + a)$$: shift LEFT by $$a$$\n+ $$f(ax)$$: horizontal compression by $$\\tfrac{1}{a}$$\n+ $$f(-x)$$: reflect in the $$y$$-axis\n\n- Step 3: Memory rule: \"Inside is horizontal and OPPOSITE; outside is vertical and AS-WRITTEN.\"", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "For a region $$R$$ bounded by 4 curves/lines, what's the standard strategy to write 4 inequalities? (3 steps)", "answer": "- Step 1: Label each boundary and its equation.\n- Step 2: For each boundary, determine which side $$R$$ sits on:\n+ Horizontal-oriented boundaries: use $$y \\ge$$ or $$y \\le$$.\n+ Vertical-oriented: use $$x \\ge$$ or $$x \\le$$.\n- Step 3: Write ALL four inequalities. Verify with a sample point inside $$R$$ — all four must hold.\n\nFor Oct 2023 Q11(d): $$y \\ge 0, y \\le -8x + 20, x \\ge 0, y \\le 2x^2 - 12x + 14$$.", "source": "Opus 4.7 ②", "_id": "opus_2_101"}, {"question": "Describe the general strategy for a \"compound shape composed of simpler shapes\" problem. (3 steps)", "answer": "- Step 1: SKETCH carefully, labelling all known lengths, angles, vertices.\n- Step 2: DECOMPOSE into standard pieces (rectangle, triangle, sector, segment) with known formulas.\n- Step 3: CALCULATE each piece, then SUM (or subtract, for \"donut\" shapes).\n\nDon't try to find a single whole-shape formula. Break it down.", "source": "Opus 4.7 ②", "_id": "opus_2_114"}, {"question": "What are the radian equivalents of common angles and the formulas for arc length and sector area? (3 formulas + conversions)", "answer": "- Conversions: $2\\pi$ rad = 360°, $\\pi$ rad = 180°, $1$ rad = $180/\\pi$ degrees\n+ $30° = \\pi/6$, $45° = \\pi/4$, $60° = \\pi/3$, $90° = \\pi/2$\n- Arc length: $L = r\\theta$ (θ in radians)\n- Sector area: $A = \\frac{1}{2}r^2\\theta$\n- Segment area: $A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$\n- Major angle = $2\\pi$ - minor angle\n\n**Common error:** Using degree formulas with radian values (or vice versa). Always check your calculator mode!", "source": "MiniMax ②", "_id": "minimax_2_26"}, {"question": "What's the structural pattern in \"show that $$k$$ satisfies [expression in $$k$$]\"? When do you expect this structure?", "answer": "This structure arises when:\n- Two curves (or a line and curve) depend on parameter $$k$$.\n- A geometric condition (tangent, single intersection, etc.) is imposed.\n- The condition produces a polynomial relation purely in $$k$$ (all $$x$$-dependence eliminated).\n\n**Why $$x$$ disappears**: the geometric condition (e.g., discriminant = 0) creates a relation among the coefficients of the quadratic in $$x$$. Those coefficients depend on $$k$$ and constants, not on $$x$$.\n\n**Phuc's insight**: the question gives you an expression purely in $$k$$ — that IS the discriminant trigger.", "source": "Opus 4.7 ①", "_id": "opus_1_150"}, {"question": "To rationalise a denominator like $$\\sqrt{3}-1$$, what do you multiply by, and why does this eliminate the surd? What is the general conjugate rule? (2 steps)", "answer": "- Step 1: Multiply both numerator and denominator by the **conjugate** $$\\sqrt{3}+1$$ (flip the sign between the terms). The denominator becomes $$(\\sqrt{3}-1)(\\sqrt{3}+1) = 3-1 = 2$$ by the difference of squares: $$(a-b)(a+b)=a^{2}-b^{2}$$.\n- Step 2: General rule: conjugate of $$a+b\\sqrt{c}$$ is $$a-b\\sqrt{c}$$; conjugate of $$\\sqrt{a}-\\sqrt{b}$$ is $$\\sqrt{a}+\\sqrt{b}$$. Multiplying by the conjugate always rationalises because $$\\sqrt{c}^{2}=c$$ — the surd squares to a rational number.\n\nAlways multiply **both** top and bottom by the conjugate to preserve equality.", "source": "GLM 5.1 ①", "_id": "glm_1_13"}, {"question": "Explain the general strategy \"substitute a point on the curve to find an unknown constant\". (3 steps)", "answer": "- Step 1: A curve equation often has unknown constants (e.g. $$f(x) = \\ldots + C$$ after integration).\n- Step 2: If $$(x_0, y_0)$$ is on the curve, then $$y_0 = f(x_0)$$ — one equation in unknowns.\n- Step 3: Solve. Multiple unknowns → multiple conditions (additional points or derivative conditions).\n\nExample: after integrating $$f'(x)$$, use $$(2, 8\\sqrt{2})$$ to find $$C$$.", "source": "Opus 4.7 ②", "_id": "opus_2_135"}, {"question": "What does a double root like $$(x+2)^{2}$$ mean graphically, and how does it affect intersection counting? (2 steps)", "answer": "- Step 1: A double root means the curve **touches** the $$x$$-axis at that point but doesn't cross — the curve approaches from one side, reaches zero, and returns to the same side. It's a tangent point to the axis.\n- Step 2: For intersection counting with another curve, a touch-point usually counts as **one** intersection (one real solution), not two. The curve doesn't cross through, so there's only one meeting point even though the algebraic multiplicity is 2.", "source": "GLM 5.1 ①", "_id": "glm_1_42"}, {"question": "When solving an equation like $$2 \\cdot 4^{x} - 2^{x+3} = 17 \\cdot 2^{x-1} - 4$$ by substituting $$p = 2^{x}$$, why is it legitimate to replace every term with a power of $$p$$, and what is the main algebraic pitfall to avoid? (3 steps)", "answer": "- Step 1: Every term must be expressed as a power of $$2^{x}$$ because $$p$$ represents exactly $$2^{x}$$. Using index laws: $$4^{x} = (2^{2})^{x} = (2^{x})^{2} = p^{2}$$; $$2^{x+3} = 2^{x}\\cdot 2^{3} = 8p$$; and $$2^{x-1} = 2^{x}\\cdot 2^{-1} = \\frac{p}{2}$$.\n- Step 2: After substitution, the equation becomes a polynomial in $$p$$ — in this case a quadratic. This is legitimate because the substitution is a bijection for real $$x$$; each $$x$$ gives one $$p>0$$ and each positive $$p$$ gives one $$x = \\log_{2}p$$.\n- Step 3: The main pitfall is forgetting to clear fractions after substitution. Here, the term $$\\frac{17p}{2}$$ requires multiplying the entire equation by $$2$$ to eliminate the denominator before collecting like terms.", "source": "Kimi K2.6 ②", "_id": "kimi_2_22"}, {"question": "When using the Cosine Rule $$a^2 = b^2 + c^2 - 2bc \\cos A$$ to find an angle $$A$$, what does a negative result for $$\\cos A$$ immediately tell you about the angle $$A$$, and why? (2 steps)", "answer": "- Step 1: A negative $$\\cos A$$ immediately tells you that angle $$A$$ is **obtuse** (i.e., $$A > 90^{\\circ}$$ or $$A > \\frac{\\pi}{2}$$ radians).\n- Step 2: In the unit circle or cosine graph, the cosine values are positive in the first quadrant ($$0$$ to $$90^{\\circ}$$) and negative in the second quadrant ($$90^{\\circ}$$ to $$180^{\\circ}$$). Since angles in a triangle cannot exceed $$180^{\\circ}$$, a negative cosine strictly implies an obtuse angle.\n\nThis is a powerful sanity check: if your triangle looks acute but $$\\cos A < 0$$, something is wrong.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "What is the area formula for a triangle when you know two sides and the included angle (SAS), and why does it involve sine rather than cosine?", "answer": "The SAS area formula is $$A = \\frac{1}{2}ab\\sin C$$, where $$a$$ and $$b$$ are the two known sides and $$C$$ is the included angle.\n\nWhy sine: the height of the triangle relative to base $$a$$ is $$b\\sin C$$ (the perpendicular component of side $$b$$). Area = $$\\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2}a(b\\sin C)$$.\n\nCosine gives the **adjacent** component ($$b\\cos C$$), which is projection along the base, not the height. Sine gives the **opposite** component — the perpendicular height.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "For Phuc's paper in the \"show that\" category: what's the difference between a correct \"show that\" working and an incorrect one?", "answer": "**Correct \"show that\" features**:\n- Starts from the given expressions (LHS or initial equations).\n- Each step is algebraically justified (expand, cancel, rearrange).\n- Ends with the target expression exactly as stated.\n- No circular reasoning (don't assume the target to prove the target).\n\n**Incorrect features**:\n- Asserting the target without derivation.\n- Skipping crucial manipulations (though minor arithmetic simplifications are fine).\n- Starting from both sides meeting in the middle (but this can be valid if done carefully).\n- Using unstated facts.\n\n**Goal**: a transparent chain from givens to target that any reader can follow line-by-line.", "source": "Opus 4.7 ①", "_id": "opus_1_181"}, {"question": "For a major sector with angle α in radians, why is θ_major = 2π - α? How does this affect area?", "answer": "- Step 1: Total circle angle is 2π radians.  \n- Step 2: θ_major = 2π - θ_minor ensures θ_major > θ_minor.  \n- Step 3: Area formula A = ½r²θ remains same structurally; θ just becomes larger.  \n+ **Visual intuition**: Major sector is the \"larger piece\" in a pizza slice.  \n+ **Limiting case**: When θ_minor = π, θ_major = π (equal semicircles).", "source": "Qwen 3 ③", "_id": "qwen_3_4"}, {"question": "Explain why \"curves meet at exactly one point\" leads to setting the discriminant to zero. What are the two geometric interpretations of a repeated root?", "answer": "- When two curves intersect, you typically set $$f(x) = g(x)$$ and rearrange to get a quadratic $$ax^2 + bx + c = 0$$.\n- The solutions to this quadratic give the $$x$$-coordinates of intersection points.\n- **If there's exactly ONE point of intersection**, the quadratic has exactly one solution — this means it has a **repeated root** (both solutions are the same).\n- A quadratic has a repeated root **iff** its discriminant is zero: $$\\Delta = b^2 - 4ac = 0$$.\n\n**Geometric interpretations:**\n1. The two curves are **tangent** to each other at that point (they touch but don't cross).\n2. The curves meet at a point where they have the **same gradient** (same slope).", "source": "MiniMax ①", "_id": "minimax_1_49"}, {"question": "What is the difference between the segment area and the sector area, and when would you need the segment? (2 steps)", "answer": "- Step 1: Sector area $$=\\frac{1}{2}r^{2}\\theta$$ (the pie slice). Segment area $$=\\frac{1}{2}r^{2}(\\theta-\\sin\\theta)$$ (the region between the chord and the arc — the pie slice minus the triangle).\n- Step 2: The segment is the sector minus the triangle: $$A_{\\text{segment}}=A_{\\text{sector}}-A_{\\text{triangle}}=\\frac{1}{2}r^{2}\\theta-\\frac{1}{2}r^{2}\\sin\\theta=\\frac{1}{2}r^{2}(\\theta-\\sin\\theta)$$. You need the segment when the shaded region is between the chord and arc (not including the triangle).\n\nTakeaway: Sector = pie slice. Segment = sector minus triangle. Formula: $$\\frac{1}{2}r^{2}(\\theta-\\sin\\theta)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_78"}, {"question": "For $$\\tan\\theta = \\frac{\\sin\\theta}{\\cos\\theta}$$, what happens when $$\\cos\\theta = 0$$?", "answer": "$$\\tan\\theta$$ is **undefined** when $$\\cos\\theta = 0$$ (division by zero).\n\nThis happens at $$\\theta = \\frac{\\pi}{2} + n\\pi$$ (i.e., $$90°, 270°, \\ldots$$) where $$\\cos = 0$$ but $$\\sin = \\pm 1$$.\n\nGeometrically, these are the vertical lines on the unit circle — tan measures \"rise over run,\" and at $$90°$$ the run is 0 and the rise is 1, so slope is \"infinite\" (undefined).\n\n**Graphically**: $$\\tan$$ has vertical asymptotes at those values.", "source": "Opus 4.7 ①", "_id": "opus_1_131"}, {"question": "After substituting $$u = x^2$$ into $$2x^4 - 7x^2 - 15 = 0$$ to obtain $$2u^2 - 7u - 15 = 0$$, why must negative solutions for $$u$$ be rejected? (2 steps)", "answer": "- Step 1: By definition, $$u = x^2$$, and the square of any real number is non-negative. Therefore, only solutions $$u \\geq 0$$ correspond to real $$x$$-values.\n- Step 2: A negative $$u$$ would require $$x = \\sqrt{\\text{negative}}$$, which is not real. After finding positive $$u$$-values, recover $$x = \\pm\\sqrt{u}$$, yielding two symmetric intersection points for each valid $$u$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_35"}, {"question": "For the Apr 5 Q5 triangle setup with $$\\angle ABE + 1.3 + \\tfrac{\\pi}{2} = \\pi$$ from collinearity of $$A, B, C$$, why is this setup correct? (3 steps)", "answer": "- Step 1: The three angles at $$B$$ ($$\\angle ABE, \\angle EBD, \\angle DBC$$) together span from ray $$BA$$ to ray $$BC$$.\n- Step 2: Since $$A, B, C$$ are collinear, rays $$BA$$ and $$BC$$ point in OPPOSITE directions, making a straight line. The angles between them sum to $$\\pi$$ rad.\n- Step 3: So $$\\angle ABE + \\angle EBD + \\angle DBC = \\pi$$. With $$\\angle EBD = 1.3, \\angle DBC = \\tfrac{\\pi}{2}$$: $$\\angle ABE = \\tfrac{\\pi}{2} - 1.3 \\approx 0.27$$ rad.", "source": "Opus 4.7 ②", "_id": "opus_2_108"}, {"question": "A common mistake is setting $$\\frac{dy}{dx}$$ equal to the entire tangent line equation $$y=mx+c$$ instead of just the gradient $$m$$. Why is this wrong, and what is the correct relationship? (2 steps)", "answer": "- Step 1: $$\\frac{dy}{dx}$$ evaluated at a point gives a single number — the slope (gradient) of the curve at that point. The line equation $$y=mx+c$$ contains both the gradient $$m$$ and the $$y$$-intercept $$c$$, plus the variable $$x$$. Setting a number equal to an expression with variables is dimensionally inconsistent.\n- Step 2: The correct procedure: differentiate the curve to get $$\\frac{dy}{dx}$$; set $$\\frac{dy}{dx}$$ equal to the gradient $$m$$ of the given line (just the coefficient of $$x$$); solve for the $$x$$-coordinate of the tangent point; substitute that $$x$$ back into the **curve** to get $$y$$; then use the point to find $$c$$ in $$y=mx+c$$.\n\nExample: For curve $$y=2x^{2}+8x+3$$ and line $$y=4x+c$$: $$\\frac{dy}{dx}=4x+8$$, set equal to gradient 4 (not $$4x+c$$), giving $$x=-1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "A triangle has sides 4 cm, 6 cm, and 9 cm. Using the cosine rule, find the angle opposite the longest side, and hence find the area of the major sector of radius 4 cm with that angle. (3 steps)", "answer": "- Step 1: **Apply cosine rule** to find angle $$\\alpha$$ opposite side 9:\n$$9^2 = 4^2 + 6^2 - 2(4)(6)\\cos\\alpha$$\n$$81 = 16 + 36 - 48\\cos\\alpha \\Rightarrow \\cos\\alpha = \\frac{-29}{48}$$\n$$\\alpha = \\cos^{-1}\\left(-\\frac{29}{48}\\right) \\approx 2.22 \\text{ rad}$$ (obtuse, since $$\\cos < 0$$)\n- Step 2: **Identify major vs minor:** Since $$\\alpha > \\frac{\\pi}{2}$$, this is the minor angle. Major angle $$\\theta_{major} = 2\\pi - \\alpha \\approx 4.063$$ rad.\n- Step 3: **Sector area formula** (in radians): $$A = \\frac{1}{2}r^2\\theta$$\n$$A_{major} = \\frac{1}{2}(4^2)(4.063) = \\frac{1}{2}(16)(4.063) \\approx 32.5 \\text{ cm}^2$$", "source": "MiniMax ①", "_id": "minimax_1_3"}, {"question": "After substituting $$p = 2^x$$ and solving a quadratic to find $$p$$, what is the final step to find $$x$$, and what common mistake occurs when $$p$$ is a fraction like $$\\frac{1}{4}$$? (2 steps)", "answer": "- Step 1: Set $$2^x = p$$ for each valid root and solve for $$x$$ by expressing $$p$$ as a power of 2.\n- Step 2: The common mistake is not knowing how to handle fractional values. You must convert the fraction to a negative index: e.g., $$2^x = \\frac{1}{4} = 2^{-2} \\Rightarrow x = -2$$.\n\nDon't take $$\\log_2$$ of a fraction manually; convert it to a base-2 power with a negative exponent first.", "source": "GLM 5.1 ②", "_id": "glm_2_32"}, {"question": "For a triangle with a horizontal base (on a line $$y = c$$), why is it easy to compute the area using $$\\tfrac{1}{2} \\times \\text{base} \\times \\text{height}$$? (3 steps)", "answer": "- Step 1: When the base lies on a horizontal line $$y = c$$, the perpendicular height from the apex to the base is simply the VERTICAL distance from the apex to the line.\n- Step 2: If the apex is at $$(x_0, y_0)$$ and the base is on $$y = c$$, the perpendicular height is $$|y_0 - c|$$ — no trigonometry needed.\n- Step 3: E.g. base $$AC$$ on $$y = 2$$, apex $$B = (15, 7)$$ → height is $$|7 - 2| = 5$$. Area $$= \\tfrac{1}{2}|AC| \\cdot 5$$.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "If you forget the SAS area formula mid-exam, how can you reconstruct it from the SOHCAHTOA definitions?", "answer": "- Step 1: Let $$a$$ and $$b$$ be two sides enclosing angle $$C$$. Drop a perpendicular from the vertex opposite to $$C$$ onto side $$a$$.\n- Step 2: The length of this perpendicular is $$b\\sin C$$ (from right-triangle definition: $$\\sin C = \\frac{\\text{opp}}{b}$$, so opp $$= b\\sin C$$).\n- Step 3: Area of triangle $$= \\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2} \\times a \\times b\\sin C = \\frac{1}{2}ab\\sin C$$.\n\nSo the formula IS $$\\frac{1}{2} \\times \\text{base} \\times \\text{height}$$ with $$b\\sin C$$ as the perpendicular height.", "source": "Opus 4.7 ①", "_id": "opus_1_104"}, {"question": "A question asks you to \"State the number of real solutions\" and \"give a reason.\" What two components must your answer contain to get full marks? (2 steps)", "answer": "- Step 1: You must state the integer number of solutions clearly.\n- Step 2: You must provide a reason referencing the graph (e.g., \"The line and curve intersect at 2 points\") or the discriminant (e.g., \"$$\\Delta > 0$$ so there are 2 distinct roots\"). Just writing the number scores 0 marks.\n\n\"State\" means no working is needed for the value, but \"reason\" means a justification is mandatory.", "source": "GLM 5.1 ②", "_id": "glm_2_49"}, {"question": "Why is $\\frac{dy}{dx}$ at a tangent point just the gradient $m$, not the full line equation $y=mx+c$?", "answer": "- Step 1: For a line $y=mx+c$, $m$ is the constant gradient.  \n- Step 2: $\\frac{dy}{dx}$ of the curve represents its slope at any point.  \n- Step 3: At the tangent point, these slopes must equal: $\\frac{dy}{dx} = m$.  \n+ Example: If $\\frac{dy}{dx}=4x+8$ and the line has $m=4$, solving $4x+8=4$ gives $x=-1$.  \n+ Misconception: $\\frac{dy}{dx}$ is a scalar (slope) at a point, not the entire line equation.  \n\n**Takeaway:** $\\frac{dy}{dx}$ gives the slope, which must match the line’s gradient for tangency.", "source": "Qwen 3 ④", "_id": "qwen_4_1"}, {"question": "For the SAS area formula $$\\frac{1}{2}ab\\sin C$$, the angle $$C$$ must be **between** the sides $$a$$ and $$b$$. What goes wrong if you use an angle not between them?", "answer": "The formula $$\\frac{1}{2}ab\\sin C$$ comes from: base $$a$$, perpendicular height $$= b\\sin C$$ (where $$C$$ is the angle that \"lifts\" side $$b$$ off the base $$a$$).\n\nIf $$C$$ is **not** between $$a$$ and $$b$$, then $$b\\sin C$$ is **not** the perpendicular height from the opposite vertex. You'd compute a wrong number (usually a larger value, since the sine of a non-included angle is different).\n\nVisual check: sketch the triangle. Ask: \"Is the angle at the shared vertex of these two sides?\" If yes, SAS applies. If not, you may need to use the sine rule to find the correct angle first.", "source": "Opus 4.7 ①", "_id": "opus_1_94"}, {"question": "If a curve $$y = f(x)$$ has a minimum at $$(3, -4)$$, and a line through $$(-1, 28)$$ and the minimum passes through the region $$R$$ bounded by line, curve, $$x$$-axis and $$y$$-axis — how does the region look qualitatively?", "answer": "Visualise:\n- The curve is a parabola opening upward with vertex $$(3, -4)$$ (below the $$x$$-axis).\n- It crosses the $$x$$-axis somewhere (at the roots of $$f$$).\n- The line passes from $$(-1, 28)$$ (top-left) through $$(3, -4)$$ (bottom).\n- The line has negative slope ($$m = -8$$).\n\nThe region $$R$$ bounded by all four lies in the first quadrant (right of $$y$$-axis, above $$x$$-axis), under the line, and either above or below the curve — depends on the geometry.\n\nKey: in the first quadrant, the parabola starts high (at $$x = 0$$, $$f(0) = 14$$), dips down to $$-4$$ at $$x = 3$$, then rises. So $$R$$ is below the curve's \"high\" part near $$x = 0$$ and doesn't extend beyond where the parabola dips below the $$x$$-axis.", "source": "Opus 4.7 ①", "_id": "opus_1_188"}, {"question": "When defining a region bounded above by a line and below by a parabola, why is the region described as $$y \\le \\text{line}$$ AND $$y \\ge \\text{parabola}$$ rather than the reverse? (2 steps)", "answer": "- Step 1: Visualise a vertical slice through the region. At any valid $$x$$, the $$y$$-value must lie between the lower curve and the upper curve. \"Above the parabola\" means $$y$$ is greater than the parabola's value, hence $$y \\ge \\text{parabola}$$.\n- Step 2: \"Below the line\" means $$y$$ is less than the line's value, hence $$y \\le \\text{line}$$. Reversing either inequality would describe the empty space outside the lens-shaped region or the area on the wrong side of one boundary.", "source": "Kimi K2.6 ②", "_id": "kimi_2_33"}, {"question": "When a question says two curves \"meet at a single point,\" what mathematical condition does this trigger, and what is the full procedure? (3 steps)", "answer": "- Step 1: \"Meet at a single point\" means exactly one intersection → the combined equation has **one repeated root** → discriminant $$\\Delta = 0$$.\n- Step 2: Equate the two curve equations, rearrange into a standard quadratic $$ax^{2}+bx+c=0$$, then compute $$\\Delta = b^{2}-4ac$$ and set it to zero. This gives an equation in the parameter (e.g. $$k$$) which you solve.\n- Step 3: Once you have the parameter value, substitute back into the quadratic to find the repeated $$x$$-root, then substitute into either original curve to find $$y$$ — giving the coordinates of the single meeting point.\n\nPhuc's insight: the discriminant equation only contains $$k$$ because the $$x$$ terms cancel when $$\\Delta=0$$ is enforced — that's why it produces a solvable equation for $$k$$.", "source": "GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "Why does the transformation $$y = f(x+3)$$ shift the graph horizontally to the left by 3 units, rather than to the right? (2 steps)", "answer": "- Step 1: The graph of $$y = f(x+3)$$ reaches the same output value $$y$$ at an $$x$$-coordinate that is $$3$$ units smaller than the original. For instance, the value originally at $$x=0$$ now occurs at $$x = -3$$.\n- Step 2: Because every point moves to a smaller $$x$$-value, the entire graph shifts left. A useful mnemonic is \"inside the brackets opposite to the sign\": $$f(x+a)$$ shifts left by $$a$$, while $$f(x-a)$$ shifts right by $$a$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_14"}, {"question": "The tangent-line formula $$y - f(a) = f'(a)(x - a)$$ — what's the intuition for each piece?", "answer": "- $$(x - a)$$: the horizontal distance from the point of tangency.\n- $$f'(a)$$: the slope at that point.\n- $$f'(a)(x - a)$$: the vertical rise due to that slope over distance $$(x - a)$$.\n- $$y - f(a)$$: the rise from the tangent point's height.\n\nSo the formula says \"the rise ($$y - f(a)$$) equals slope times horizontal distance\" — which is just the definition of a line with known slope through a known point (point-slope form).\n\n**Generalisation**: for a line through $$(x_1, y_1)$$ with slope $$m$$, use $$y - y_1 = m(x - x_1)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_135"}, {"question": "When integrating an expression like $$\\int\\left(10x^{4}-\\frac{3}{2x^{3}}-7\\right)dx$$, what is the critical first step that Phuc repeatedly forgot, and what happens if you skip it?", "answer": "The critical first step: **rewrite every term with $$x$$ in the denominator as a negative power**. $$\\frac{3}{2x^{3}} = \\frac{3}{2}x^{-3}$$. \n\nIf you skip this, you cannot apply the power rule $$\\int x^{n}dx = \\frac{x^{n+1}}{n+1}$$ because the rule requires $$x$$ to be in the numerator with an explicit exponent. The term $$\\frac{1}{x^{3}}$$ is not in $$x^{n}$$ form — it's in $$x^{-n}$$ form disguised as a fraction.\n\nAfter rewriting: $$\\int \\frac{3}{2}x^{-3}\\,dx = \\frac{3}{2}\\cdot\\frac{x^{-2}}{-2} = -\\frac{3}{4}x^{-2} = \\frac{3}{4x^{2}}$$. Always include $$+C$$ for indefinite integrals.", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "State the midpoint formula, and explain why it's just the average. (3 steps)", "answer": "- Step 1: Midpoint: $$M = \\left(\\tfrac{x_1 + x_2}{2}, \\tfrac{y_1 + y_2}{2}\\right)$$ — average coordinates.\n- Step 2: The midpoint is equidistant from both endpoints. The $$x$$-coordinate halfway between $$x_1$$ and $$x_2$$ is their arithmetic mean; similarly for $$y$$.\n- Step 3: Alternative: a point at fraction $$t$$ along the segment is $$((1-t)x_1 + tx_2, (1-t)y_1 + ty_2)$$. The midpoint is $$t = \\tfrac{1}{2}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_84"}, {"question": "The sector area formula is $$A = \\tfrac{1}{2}r^2\\theta$$. Why the $$\\tfrac{1}{2}$$ and why $$r^2$$ (not $$r$$)? (3 steps)", "answer": "- Step 1: Full circle area is $$\\pi r^2$$ for angle $$2\\pi$$. So area per radian is $$\\tfrac{\\pi r^2}{2\\pi} = \\tfrac{r^2}{2}$$.\n- Step 2: Multiplying by angle $$\\theta$$: $$A = \\tfrac{r^2}{2}\\theta = \\tfrac{1}{2}r^2\\theta$$.\n- Step 3: $$r^2$$ because area scales with the SQUARE of radius (2D scaling). The $$\\tfrac{1}{2}$$ emerges from dividing circle area by $$2\\pi$$.\n\nAlternative intuition: sector area is like a \"triangle\" with base $$\\ell = r\\theta$$ and height $$r$$, giving $$\\tfrac{1}{2}r \\cdot r\\theta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_73"}, {"question": "Conceptual synthesis — for Q8(c) (range of $$A$$ for 4 distinct intersections), link discriminant thinking to Vieta's to geometric intuition. (4 steps)", "answer": "- Step 1: Geometric: cubic-ish curve and rectangular hyperbola meet 4 times when the hyperbola is \"big enough\" to cross both arcs of the cubic.\n- Step 2: Algebraic (biquadratic): 4 distinct real $$x$$ requires 2 distinct positive $$u = x^2$$ roots.\n- Step 3: Analytic conditions:\n+ **Discriminant** ($$\\Delta > 0$$): $$16 - 4A > 0 \\Rightarrow A < 4$$ — \"two distinct $$u$$-roots exist.\"\n+ **Vieta product** ($$u_1 u_2 > 0$$): $$A > 0$$ — \"both roots positive.\"\n+ **Vieta sum** ($$u_1 + u_2 > 0$$): $$4 > 0$$ ✓ — \"automatically satisfied.\"\n- Step 4: Combine: $$0 < A < 4$$. This range reflects the \"Goldilocks\" zone — $$A$$ not too small (no intersections) and not too large (curves separate).\n\nSynthesis: discriminant controls number of $$u$$-roots; Vieta controls their signs; together they control $$x$$-root structure.", "source": "Opus 4.7 ①", "_id": "opus_1_127"}, {"question": "For $$f(x) = 2x^3 - kx^2 + 14x + 24$$, derive expressions for $$f'(x)$$ and $$f''(x)$$, then explain how knowing $$A$$ is on both lets you find $$k$$. (4 steps)", "answer": "- Step 1: Differentiate once using the power rule: $$f'(x) = 6x^2 - 2kx + 14$$.\n- Step 2: Differentiate again: $$f''(x) = 12x - 2k$$.\n- Step 3: Use $$x_A = 5$$: compute $$f'(5) = 150 - 10k + 14 = 164 - 10k$$ and $$f''(5) = 60 - 2k$$.\n- Step 4: Set them equal (since $$A$$ is on both): $$164 - 10k = 60 - 2k \\Rightarrow 104 = 8k \\Rightarrow k = 13$$.\n\nThe method chains: differentiation → substitution of known coordinate → algebraic elimination.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "When students (like Phuc) compute an expression like $$(16 x^{-1/2})^3$$, why do they often forget to cube the $$x^{-1/2}$$? (3 steps)", "answer": "- Step 1: Cognitive trap: when looking at \"16\" (a plain number) and \"$$x^{-1/2}$$\" (an expression), the numerical part is processed first (\"$$16^3 = 4096$$\") and the expression feels \"carried along unchanged\".\n- Step 2: But the rule $$(AB)^n = A^n B^n$$ applies to EVERY factor. So $$(16 \\cdot x^{-1/2})^3 = 16^3 \\cdot (x^{-1/2})^3 = 4096 x^{-3/2}$$.\n- Step 3: Defensive habit: write EACH factor explicitly with its own exponent before simplifying. Cubing just one factor creates a mismatch you can often catch with a test value (e.g. $$x = 1$$).", "source": "Opus 4.7 ②", "_id": "opus_2_69"}, {"question": "When cubing an expression like $$b = 16x^{-1/2}$$, what is the most common error, and how do you correctly apply the power to both the coefficient and the variable? (2 steps)", "answer": "- Step 1: The most common error is cubing the 16 but forgetting to cube the $$x^{-1/2}$$ term.\n- Step 2: The rule $$(ab)^n = a^n b^n$$ means **every factor** gets the exponent. So, $$(16x^{-1/2})^3 = 16^3 \\cdot (x^{-1/2})^3 = 4096 x^{-3/2}$$.\n\nTreat the coefficient and the variable as separate passengers on a bus; when the bus gets cubed, both passengers get cubed.", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "For a region $$R$$ bounded by (i) $$x$$-axis, (ii) line $$y = -8x + 20$$, (iii) $$y$$-axis, (iv) curve $$y = 2x^2 - 12x + 14$$, write inequalities. How do you determine each sign?", "answer": "- Above $$x$$-axis: $$y \\geq 0$$\n- Below the line: $$y \\leq -8x + 20$$\n- Right of $$y$$-axis: $$x \\geq 0$$\n- Below the curve (assuming $$R$$ is between line and curve, below): $$y \\leq 2x^2 - 12x + 14$$\n\nTo confirm signs: pick a sample point INSIDE $$R$$ (say, based on the figure) and check each inequality holds. Adjust $$\\leq$$ vs $$\\geq$$ if a sample fails. \"$$n$$ boundaries → $$n$$ inequalities\" is the general rule.", "source": "Opus 4.7 ①", "_id": "opus_1_67"}, {"question": "How to derive sector area formula A = ½r²θ from triangle approximation?", "answer": "- Step 1: Divide sector into many small isosceles triangles.  \n- Step 2: Area of small triangle ≈ ½r²Δθ (using small angle approximation).  \n- Step 3: Sum all Δθ → ∫₀^θ ½r² dθ = ½r²θ  \n+ **Visual intuition**: Like pizza slices with infinitesimally small crusts.", "source": "Qwen 3 ③", "_id": "qwen_3_13"}, {"question": "If you find $$\\sin \\theta = \\frac{8}{15}$$ and are told that $$\\theta$$ is obtuse, how do you find $$\\cos \\theta$$, and why is the sign important? (3 steps)", "answer": "- Step 1: Use the Pythagorean identity: $$\\sin^2 \\theta + \\cos^2 \\theta = 1$$. Calculate $$\\cos^2 \\theta = 1 - (\\frac{8}{15})^2 = \\frac{161}{225}$$.\n- Step 2: Find the magnitude: $$\\cos \\theta = \\pm\\frac{\\sqrt{161}}{15}$$.\n- Step 3: Apply the quadrant sign. An obtuse angle lies in the 2nd quadrant, where cosine is **negative**. Therefore, $$\\cos \\theta = -\\frac{\\sqrt{161}}{15}$$.\n\nForgetting the negative sign for obtuse angles is a critical error when substituting into the Cosine Rule.", "source": "GLM 5.1 ②", "_id": "glm_2_30"}, {"question": "Explain why rationalizing 1/(a+√b) requires multiplying by (a-√b)/(a-√b).", "answer": "- Step 1: Use difference of squares identity: (a+√b)(a-√b) = a² - b.  \n- Step 2: Multiply numerator and denominator by conjugate to eliminate √.  \n- Step 3: Preserves equality since multiplying by 1.  \n+ **Edge case**: What if a-√b =0? Not possible unless a=√b.", "source": "Qwen 3 ③", "_id": "qwen_3_14"}, {"question": "The cubic $$y = x(x+2)^2$$ has what key features, and how do you count intersections with $$y = \\frac{1}{x+2}$$? (3 steps)", "answer": "- Step 1: Cubic features: crosses $$x$$-axis at $$x = 0$$ (simple root, goes through); touches $$x$$-axis at $$x = -2$$ (double root, just touches without crossing); as $$x \\to +\\infty$$, $$y \\to +\\infty$$; as $$x \\to -\\infty$$, $$y \\to -\\infty$$.\n- Step 2: Hyperbola $$y = \\frac{1}{x+2}$$ features: vertical asymptote at $$x = -2$$; $$y \\to 0^+$$ as $$x \\to \\infty$$; $$y \\to 0^-$$ as $$x \\to -\\infty$$; positive for $$x > -2$$, negative for $$x < -2$$.\n- Step 3: Sketch both: to the right of $$x = -2$$, cubic grows from 0 (at $$x=-2$$, touching) up through $$(0,0)$$ and up to infinity; hyperbola drops from $$+\\infty$$ at $$x=-2$$ to $$0$$. They cross ONCE. To the left of $$x = -2$$, cubic drops from $$0$$ to $$-\\infty$$; hyperbola goes from $$-\\infty$$ to $$0^-$$. They cross ONCE.\n\nTotal: **2 real solutions**.", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "When using the Cosine Rule to find an angle, how does the sign of $$\\cos \\theta$$ reveal whether the angle is acute or obtuse, and why does this matter for the area formula? (3 steps)", "answer": "- Step 1: Rearranging the Cosine Rule gives $$\\cos A = \\frac{b^2+c^2-a^2}{2bc}$$. If $$\\cos A > 0$$, then $$A < 90^\\circ$$ (acute). If $$\\cos A < 0$$, then $$A > 90^\\circ$$ (obtuse).\n- Step 2: For obtuse angles between $$90^\\circ$$ and $$180^\\circ$$, $$\\sin \\theta$$ remains positive while $$\\cos \\theta$$ is negative. This matters because the area formula $$\\frac{1}{2}ab\\sin C$$ uses sine, which is positive in both the first and second quadrants.\n- Step 3: Therefore, when finding $$\\cos \\theta$$ from $$\\sin \\theta$$ via $$\\cos^2\\theta = 1-\\sin^2\\theta$$, you must select the negative root if the problem states $$\\theta > 90^\\circ$$; choosing the positive root would lead to an incorrect subsequent cosine rule calculation.", "source": "Kimi K2.6 ①", "_id": "kimi_1_1"}, {"question": "Why does integrating $ x^{-1} $ differ from other power rules? (3 steps)", "answer": "- Step 1: Power rule $ \\int x^n dx = \\frac{x^{n+1}}{n+1} + C $ fails for $ n = -1 $ (division by zero).  \n- Step 2: Instead, $ \\int \\frac{1}{x} dx = \\ln|x| + C $, derived from the derivative of $ \\ln|x| $.  \n- Step 3: This reflects the natural logarithm's unique property as the inverse of the exponential function.\n\n**Contrast**: Negative exponents like $ x^{-2} $ integrate to $ -x^{-1} + C $, but $ x^{-1} $ is a special case.", "source": "Qwen 3 ②", "_id": "qwen_2_5"}, {"question": "Why does \"curves meet at a single point\" force the quadratic obtained by equating their $$y$$-values to have a REPEATED root rather than just any root? (3 steps)", "answer": "- Step 1: Setting $$y_1 = y_2$$ gives an equation whose solutions are the $$x$$-coordinates of ALL intersections.\n- Step 2: \"A single point\" means exactly one intersection, so the equation has exactly one real solution.\n- Step 3: A quadratic has exactly one real solution only when it has a REPEATED root (double root), which requires $$\\Delta = 0$$. A simple (non-repeated) root would still yield a second distinct root from the ± in the quadratic formula.\n\nGeometrically: tangency — the curve and line touch without crossing, which is the \"double-root\" algebraic manifestation.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "State the sector area formula (in radians) and the arc length formula. Why must $$\\theta$$ be in radians for these? (3 steps)", "answer": "- Step 1: Arc length: $$\\ell = r\\theta$$. Sector area: $$A = \\tfrac{1}{2}r^2\\theta$$.\n- Step 2: These formulas rely on the DEFINITION of a radian — one radian is the angle that subtends an arc equal in length to the radius. So $$\\ell/r = \\theta$$ only if $$\\theta$$ is in radians.\n- Step 3: In degrees you'd need an extra factor: arc length $$= \\tfrac{\\theta^{\\circ}}{360} \\cdot 2\\pi r$$ and sector area $$= \\tfrac{\\theta^{\\circ}}{360}\\cdot \\pi r^2$$. Radians absorb this factor cleanly.\n\nAlways convert to radians BEFORE plugging into $$\\ell = r\\theta$$ or $$A = \\tfrac{1}{2}r^2\\theta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "In the Phuc's strategy for \"two unknowns in integration\" (using $$f''$$ first), what's the mental model — why doesn't the integration constant appear in $$f''$$?", "answer": "Because $$f''$$ is the derivative of $$f'$$. The integration constant $$C$$ only appears when you INTEGRATE (go up in derivative order: $$f' \\to f$$). Going DOWN (differentiation, $$f' \\to f''$$) has no constants introduced.\n\nFlow:\n- $$f'' = $$ (depends on $$x$$ and $$k$$ only)\n- $$f' = $$ (depends on $$x$$ and $$k$$ only — given)\n- $$f = \\int f'\\,dx + C$$ (depends on $$x$$, $$k$$, and $$C$$)\n\nSo conditions on $$f''$$ or $$f'$$ don't involve $$C$$ — great for isolating $$k$$ without bringing in the extra unknown $$C$$.", "source": "Opus 4.7 ①", "_id": "opus_1_167"}, {"question": "Critical thinking — combining topics: A line tangent to a parabola; find the constant of integration using a point; identify a region between the line, the parabola, and the $$x$$-axis. Describe the sequence of concepts you'd invoke.", "answer": "- Step 1: **Tangent condition** → set derivative of parabola = slope of line, solve for point of tangency.\n- Step 2: Use the point of tangency to find the line's constant ($$c$$) via substitution.\n- Step 3: **Intersection points** of line and parabola: the tangent condition gives ONE intersection; if the line were not tangent (but a chord), we'd solve the full quadratic for two roots.\n- Step 4: **Region definition** via inequalities: identify each boundary (line, parabola, $$x$$-axis), determine sides via sample points.\n- Step 5: Chain differentiation, substitution, quadratic solving, inequality interpretation.\n\nConceptually spanning: discriminants, tangency, regions, and inequalities — all topics in the P1 syllabus woven together.", "source": "Opus 4.7 ①", "_id": "opus_1_110"}, {"question": "Given $$\\sin\\theta = \\frac{8}{15}$$ and $$\\theta > 90°$$, how do you find $$\\cos\\theta$$? Why does the constraint matter? (3 steps)", "answer": "- Step 1: Apply the Pythagorean identity: $$\\cos^2\\theta = 1 - \\sin^2\\theta = 1 - \\frac{64}{225} = \\frac{161}{225}$$.\n- Step 2: Take the square root: $$\\cos\\theta = \\pm\\frac{\\sqrt{161}}{15}$$. The $$\\pm$$ reflects that both signs satisfy $$\\cos^2\\theta = \\frac{161}{225}$$.\n- Step 3: The condition $$\\theta > 90°$$ (obtuse) places $$\\theta$$ in the second quadrant, where cosine is NEGATIVE. So $$\\cos\\theta = -\\frac{\\sqrt{161}}{15}$$.\n\nWithout the constraint, you'd have two possible triangles — the problem narrows it down by specifying obtuseness.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "In the cosine rule $$BC^2 = AB^2 + AC^2 - 2(AB)(AC)\\cos\\theta$$, when $$\\cos\\theta < 0$$, the last term becomes a *plus*. Why, and what geometric insight does this capture?", "answer": "With $$\\cos\\theta < 0$$, $$-2(AB)(AC)\\cos\\theta$$ becomes positive (negative times negative).\n\nGeometric insight: the cosine rule generalises Pythagoras. For a *right* angle ($$\\cos = 0$$), it reduces to $$a^2 = b^2 + c^2$$. For an *acute* angle, $$-2bc\\cos A < 0$$, so the opposite side is SHORTER than the Pythagoras prediction (the triangle \"folds in\"). For an *obtuse* angle, the last term adds, so the opposite side is LONGER than Pythagoras — the angle spreads the opposite vertices apart.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "Edge case: What happens if one of the $$y$$-roots in the substitution $$y=x^{2}$$ equals exactly zero? How many $$x$$-values does this give? (2 steps)", "answer": "- Step 1: If $$y=0$$ is a root, then $$x^{2}=0$$ gives $$x=0$$ — a single (repeated) real root. This contributes only **one** distinct real $$x$$-value, not two.\n- Step 2: So for a quartic in $$x^{2}$$ to have 4 distinct real roots, you need two DISTINCT POSITIVE (strictly $$>0$$) $$y$$-roots. If one root is zero, you'd get at most 3 distinct $$x$$-values (two from the positive root, one from zero). This is why the product condition is $$A>0$$ (strict), not $$A\\geq 0$$.\n\nTakeaway: $$y=0$$ root → only 1 real $$x$$. For 4 distinct real $$x$$-roots, need two strictly positive $$y$$-roots.", "source": "GLM 5.1 ③", "_id": "glm_3_67"}, {"question": "For the problem of Phuc mixing up \"$$a f(x)$$ stretches vertically\" vs \"$$f(ax)$$ compresses horizontally\" — why the different language (stretch vs compress) for the same factor $$a$$?", "answer": "The two transformations have different mathematical roles:\n- **Outside** $$f$$: $$y = af(x)$$ multiplies the output. Points $$(x, y)$$ become $$(x, ay)$$. If $$a > 1$$: stretch vertically (taller). If $$0 < a < 1$$: compress vertically.\n- **Inside** $$f$$: $$y = f(ax)$$ changes the input scale. Points $$(x, y)$$ become $$(x/a, y)$$. If $$a > 1$$: compress horizontally (narrower). If $$0 < a < 1$$: stretch horizontally.\n\nNote the **inversion**: the factor has the \"opposite\" effect when inside vs outside. This is why the same factor $$a > 1$$ stretches (outside) but compresses (inside).", "source": "Opus 4.7 ①", "_id": "opus_1_116"}, {"question": "What does the \"no calculator\" instruction signal in an Edexcel P1 question? (3 steps)", "answer": "- Step 1: Certain questions forbid calculator use (e.g. \"show ... without a calculator\"). Targets EXACT algebraic work.\n- Step 2: Expected answer in SURD or exact form, not a decimal approximation.\n- Step 3: Pulling out a calculator and reporting a decimal loses method marks.\n\nCommon contexts: rationalising surds, trig at special angles, clean-base exponentials.", "source": "Opus 4.7 ②", "_id": "opus_2_133"}, {"question": "What is the conceptual basis for the \"split the middle term\" method when factorising a quadratic like $$ax^2 + bx + c$$ with $$a \\neq 1$$? (3 steps)", "answer": "- Step 1: We seek a factorisation $$(px+q)(rx+s) = prx^2 + (ps+qr)x + qs$$. Comparing coefficients, we need two numbers that multiply to $$ac = (pr)(qs)$$ and add to $$b = ps+qr$$.\n- Step 2: Finding two numbers $$m$$ and $$n$$ such that $$mn = ac$$ and $$m+n = b$$ allows us to rewrite the middle term: $$ax^2 + mx + nx + c$$. We then factor by grouping.\n- Step 3: For example, in $$21x^2 + 10x + 1$$, the numbers are $$7$$ and $$3$$ because $$7 \\times 3 = 21$$ and $$7+3 = 10$$. This splits the middle term to enable grouping: $$7x(3x+1) + 1(3x+1) = (7x+1)(3x+1)$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_7"}, {"question": "Explain the period of $$y = A\\sin(Bx + C)$$ and why it's $$\\tfrac{2\\pi}{|B|}$$. (3 steps)", "answer": "- Step 1: Base $$y = \\sin x$$ has period $$2\\pi$$.\n- Step 2: For $$\\sin(Bx)$$: the inner argument $$Bx$$ increases by $$2\\pi$$ when $$x$$ increases by $$\\tfrac{2\\pi}{B}$$. So period is $$\\tfrac{2\\pi}{|B|}$$.\n- Step 3: Phase $$C$$ and amplitude $$A$$ don't affect period.\n\nExamples:\n+ $$y = \\sin(2x)$$: period $$\\pi$$.\n+ $$y = \\sin(\\tfrac{x}{2})$$: period $$4\\pi$$.\n+ $$y = \\cos(3x)^\\circ$$: period $$120°$$.", "source": "Opus 4.7 ②", "_id": "opus_2_109"}, {"question": "Why does the distance formula use $$(x_2 - x_1)^2 + (y_2 - y_1)^2$$ and not $$|x_2 - x_1| + |y_2 - y_1|$$?", "answer": "The latter is **Manhattan distance** (sum of absolute differences), measuring the path along grid lines — not the straight-line (Euclidean) distance.\n\nThe straight-line distance is the HYPOTENUSE of the right triangle with horizontal leg $$|x_2 - x_1|$$ and vertical leg $$|y_2 - y_1|$$. Pythagoras gives:\n$$d^2 = (x_2 - x_1)^2 + (y_2 - y_1)^2 \\Rightarrow d = \\sqrt{\\ldots}$$\n\nManhattan distance would be correct only in a grid-restricted movement context, which isn't what \"distance between two points\" means in standard geometry.", "source": "Opus 4.7 ①", "_id": "opus_1_137"}, {"question": "When a problem asks for the region satisfying two inequalities simultaneously (e.g. $$y < x+2$$ AND $$y > x^{2}-x$$), how do you determine the solution region? (2 steps)", "answer": "- Step 1: Shade each inequality separately. For $$y < x+2$$, shade below the line. For $$y > x^{2}-x$$, shade above the parabola.\n- Step 2: The solution is the **overlap** (intersection) of the two shaded regions — the \"lens-shaped\" area between the line above and the parabola below.\n\nThe intersection points of the boundaries (where $$x+2 = x^{2}-x$$) mark where the two regions meet. Between those $$x$$-values, the line sits above the parabola, creating the enclosed lens.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "State the derivatives of $$\\sin x$$ and $$\\cos x$$ in radians. Why is the radian requirement critical? (3 steps)", "answer": "- Step 1: $$\\tfrac{d}{dx}\\sin x = \\cos x$$; $$\\tfrac{d}{dx}\\cos x = -\\sin x$$ (in radians).\n- Step 2: In degrees: derivatives pick up $$\\tfrac{\\pi}{180}$$ factor. Clean formulas REQUIRE radians.\n- Step 3: This is why calculus + trig uses radians; degrees would introduce messy conversions.\n\nDouble-check calculator mode!", "source": "Opus 4.7 ②", "_id": "opus_2_142"}, {"question": "For an integer (non-fractional) exponent like $$x^3$$, what's the conceptual differentiation rule, and why does the same rule apply to $$x^{3/2}$$?", "answer": "Power rule: $$\\frac{d}{dx}(x^n) = nx^{n-1}$$, for ANY real $$n$$ (integer, fraction, negative, irrational).\n\n**Why universal**: the rule derives from the limit definition $$\\frac{d}{dx}(x^n) = \\lim_{h \\to 0} \\frac{(x+h)^n - x^n}{h}$$. For integer $$n$$, expanding via binomial gives the rule. For fractional/irrational $$n$$, one uses the more general $$x^n = e^{n\\ln x}$$ and chain rule, again yielding the same formula.\n\nSo $$\\frac{d}{dx}(x^{3/2}) = \\frac{3}{2}x^{1/2}$$ — same mechanism as integer case.", "source": "Opus 4.7 ①", "_id": "opus_1_169"}, {"question": "Why is it critical to identify whether an angle is acute or obtuse when using the cosine rule? Demonstrate with an example. (conceptual)", "answer": "- Step 1: The cosine rule has a $-2bc\\cos A$ term. If angle A is acute, $\\cos A > 0$, so the term subtracts — making the side shorter.\n- Step 2: If angle A is obtuse (> 90°), $\\cos A < 0$, so the term ADDS — making the side LONGER than it would be with the same two sides and an acute angle.\n- Example: With sides 15 and 25, if angle = 60° (acute), $a^2 = 225 + 625 - 2(15)(25)(0.5) = 700$. If angle = 120° (obtuse), $a^2 = 225 + 625 - 2(15)(25)(-0.5) = 1000$.\n- The obtuse case gives a larger third side even though the other two sides are identical.\n\n**Critical test:** After finding sin from area, use $\\sin^2 + \\cos^2 = 1$ to find cos. Then choose the NEGATIVE sign if the angle is given as obtuse (> 90°).", "source": "MiniMax ②", "_id": "minimax_2_33"}, {"question": "For the sin min problem $$y = 12\\sin(x + B)$$, at $$x = \\pi/4$$, why is $$A = -12$$ (and not $$A = -12\\sin(\\pi/4)$$)?", "answer": "Because at a MINIMUM point of $$12\\sin(\\cdot)$$, the sine function reaches its smallest value $$-1$$, regardless of the input. So $$y = 12 \\times (-1) = -12$$ at ANY minimum, not just one specific $$x$$.\n\nThe confusion: \"At $$x = \\pi/4$$, $$\\sin = \\sin(\\pi/4) = \\frac{\\sqrt{2}}{2}$$.\" But the function is $$\\sin(x + B)$$, not $$\\sin(x)$$. The argument $$x + B$$ takes whatever value (depending on $$B$$) makes $$\\sin$$ be $$-1$$ at this particular $$x$$.\n\n**Lesson**: at minima/maxima, the whole expression reaches its extremum, regardless of the specific $$x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_164"}, {"question": "What's the conceptual advantage of the substitution method $$u = x^2$$ over other approaches to quartics?", "answer": "It converts a 4th-degree equation (potentially complex to solve) into a 2nd-degree equation (easy to solve with the quadratic formula or factoring).\n\n**Limitation**: only works for biquadratics (only even powers of $$x$$). If odd powers $$x, x^3$$ appear, the substitution doesn't simplify.\n\n**Extension**: for general quartics $$ax^4 + bx^3 + cx^2 + dx + e = 0$$, the general method is more complex (Ferrari's formula). For biquadratics, the substitution is elegant and sufficient.\n\n**Moral**: recognise structural features (here, only even powers) to pick the right tool.", "source": "Opus 4.7 ①", "_id": "opus_1_172"}, {"question": "What does the completed-square form $$a(x+b)^{2}+c$$ immediately reveal about the vertex and the minimum or maximum of a quadratic, assuming $$a>0$$? (1 step)", "answer": "- Step 1: Because $$(x+b)^{2} \\ge 0$$ for all real $$x$$, the smallest possible value of the expression is $$0$$, achieved when $$x = -b$$. Substituting this $$x$$ gives the minimum output $$y=c$$. Therefore the vertex is at $$(-b,c)$$. If $$a<0$$, the same squared term gives a maximum because the parabola opens downward.", "source": "Kimi K2.6 ②", "_id": "kimi_2_35"}, {"question": "Given $$m = 2^{n}$$, explain conceptually why expressing $$16^{3n}$$ in terms of $$m$$ requires changing the base to 2 first, and what index law justifies each step. (3 steps)", "answer": "- Step 1: The substitution $$p = 2^{n}$$ (or $$m = 2^{n}$$) only helps if every term is rewritten as a power of $$2^{n}$$. Since $$16$$ is not a power of $$n$$ but of $$2$$, we use $$16 = 2^{4}$$.\n- Step 2: Apply the power-of-a-power law: $$(a^{m})^{n} = a^{mn}$$. Thus $$16^{3n} = (2^{4})^{3n} = 2^{12n}$$.\n- Step 3: Recognise $$2^{12n} = (2^{n})^{12}$$ using the same law in reverse. Since $$m = 2^{n}$$, this becomes $$m^{12}$$. Without converting to base 2, the link to $$m$$ would remain hidden.", "source": "Kimi K2.6 ②", "_id": "kimi_2_9"}, {"question": "A question says \"hence\" and gives a curve sketch. What's your strategic response?", "answer": "- Step 1: Re-read the prior part that produced or invoked the sketch. The \"hence\" means you MUST use that sketch/result.\n- Step 2: Typically, \"hence\" signals a counting/reading question (e.g., number of real roots from intersection points) or a plug-in (use derived formula to find $$k$$).\n- Step 3: DON'T restart with algebra. Look at the sketch. Count intersections, read off values, interpret slopes.\n\n**Time savings**: \"hence\" questions often take 30 seconds if you trust the sketch vs 5 minutes if you re-derive. Examiners reward pattern recognition.", "source": "Opus 4.7 ①", "_id": "opus_1_120"}, {"question": "In $$2x^2 - 12x + 14 = 2(x-3)^2 - 4$$, why does the minimum occur at $$x = 3$$ (and not at $$x = -3$$), and why is the minimum value $$-4$$ (and not $$+4$$)?", "answer": "Looking at $$2(x-3)^2 - 4$$: the squared term $$(x-3)^2$$ is always $$\\geq 0$$, with minimum value $$0$$ achieved exactly when $$x = 3$$ (the value that makes the inside zero).\n\nAt that $$x$$, $$f(3) = 2(0) - 4 = -4$$. The \"$$-3$$\" INSIDE the square gets negated when we solve $$x - 3 = 0$$.\n\nMnemonic: in $$a(x - h)^2 + k$$, the vertex is $$(h, k)$$ — \"$$h$$ is opposite the sign inside.\" And $$k$$ is the minimum (if $$a > 0$$) or maximum (if $$a < 0$$) value.", "source": "Opus 4.7 ①", "_id": "opus_1_68"}, {"question": "What does each sign of the discriminant $$\\Delta = b^2 - 4ac$$ tell you about the roots of a quadratic? (3 steps)", "answer": "- Step 1: $$\\Delta > 0$$ means the expression under the square root is positive, so $$\\pm\\sqrt{\\Delta}$$ gives two different real values → **two distinct real roots**.\n- Step 2: $$\\Delta = 0$$ means $$\\pm\\sqrt{0} = 0$$, so the $$\\pm$$ collapses → **one repeated root** (a \"double\" root where the curve just touches the x-axis).\n- Step 3: $$\\Delta < 0$$ means square-rooting a negative gives no real value → **no real roots** (curve never crosses the x-axis).\n\nVisualise: the discriminant measures how many times a parabola slices the x-axis — 2, 1, or 0.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "Summarise the key conceptual insight behind \"same variable substitution\" like $$u = x^2$$ or $$p = 2^x$$. (3 steps)", "answer": "- Step 1: When an equation has multiple instances of a common subexpression, substituting a new variable HIDES complexity and reveals a simpler polynomial.\n- Step 2: Usually a quadratic, solvable by factoring or formula. Back-substitute for original variable.\n- Step 3: CAUTION: substitution may restrict domain (e.g. $$u = x^2 \\ge 0$$ forbids negative $$u$$). Always check admissibility of $$u$$-solutions.\n\nA \"change of variable\" — simplify by looking at the problem in the right frame.", "source": "Opus 4.7 ②", "_id": "opus_2_137"}, {"question": "If you are told that $$f''(x) = 0$$ at a point $$P$$, what does this tell you about $$f'(x)$$ and $$f(x)$$ at that point? (2 steps)", "answer": "- Step 1: Since $$f''$$ is the derivative of $$f'$$, the condition $$f''(x) = 0$$ indicates that $$f'$$ has a stationary point at $$x_P$$. This means the gradient of the original curve $$f$$ is momentarily not changing; it could be a point of inflection on $$f$$ where the concavity changes.\n- Step 2: It does not necessarily tell you directly about $$f$$ itself unless additional information (such as $$f'(P)=0$$) is given. However, setting $$f''(P)=0$$ provides a clean equation to solve for unknown parameters before performing integration, as it avoids introducing integration constants.", "source": "Kimi K2.6 ①", "_id": "kimi_1_44"}, {"question": "When you have $$f'(x)$$ with an unknown constant $$k$$ and a point $$P$$ on the curve, why is it a trap to integrate $$f'(x)$$ first and then try to find both $$k$$ and $$C$$ simultaneously? (3 steps)", "answer": "- Step 1: If you integrate $$f'(x)=4x^{3/2}+\\frac{k}{x^{2}}$$ first, you get $$f(x)=\\frac{8}{5}x^{5/2}-\\frac{k}{x}+C$$. Substituting the point $$P(2,8\\sqrt{2})$$ gives one equation: $$8\\sqrt{2}=\\frac{8}{5}(4\\sqrt{2})-\\frac{k}{2}+C$$. This is **one equation with TWO unknowns** ($$k$$ and $$C$$) — unsolvable.\n- Step 2: The escape: use the condition $$f''(P)=0$$ FIRST. Differentiate $$f'$$ to get $$f''(x)=6x^{1/2}-2kx^{-3}$$. Setting $$f''(2)=0$$ gives: $$6\\sqrt{2}-\\frac{2k}{8}=0 \\Rightarrow k=24\\sqrt{2}$$. Now $$k$$ is known — only one unknown remains.\n- Step 3: Then integrate with the known $$k$$ and use point $$P$$ to find $$C$$. The strategy: **exploit any extra condition involving only $$k$$ first, then integrate and find $$C$$.** The \"$$f''(P)=0$$\" condition is the key that unlocks $$k$$ before you need to integrate.\n\nTakeaway: Two unknowns → find the one that can be determined independently first, then use the point for the other.", "source": "GLM 5.1 ③", "_id": "glm_3_32"}, {"question": "When integrating $$\\frac{3}{2x^3}$$, what's the critical first move, and why is it easy to forget? (3 steps)", "answer": "- Step 1: Rewrite as a negative exponent BEFORE integrating: $$\\frac{3}{2x^3} = \\frac{3}{2}x^{-3}$$.\n- Step 2: Forgetting this is easy because the expression \"looks like\" a fraction — but the power rule only applies to $$x^n$$, so the $$x$$ must be in the numerator with an exponent (possibly negative).\n- Step 3: Then apply the power rule: $$\\int \\tfrac{3}{2}x^{-3}\\,dx = \\tfrac{3}{2}\\cdot\\tfrac{x^{-2}}{-2} = -\\tfrac{3}{4}x^{-2}$$... wait, careful with the sign — if the original term is $$-\\tfrac{3}{2x^3}$$, then integrating gives $$+\\tfrac{3}{4x^2}$$ (two negatives).\n\nMantra: \"See a fraction with $$x$$ in the bottom → convert to negative power FIRST.\"", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "Outline the process to rationalise $$\\tfrac{13 + 2\\sqrt{3}}{5 + 10\\sqrt{3}}$$ (conceptual walkthrough, not final decimal). (3 steps)", "answer": "- Step 1: Identify denominator conjugate: $$5 - 10\\sqrt{3}$$.\n- Step 2: Multiply numerator and denominator by the conjugate:\n+ Numerator: $$(13 + 2\\sqrt{3})(5 - 10\\sqrt{3}) = 65 - 130\\sqrt{3} + 10\\sqrt{3} - 60 = 5 - 120\\sqrt{3}$$.\n+ Denominator: $$25 - 300 = -275$$.\n- Step 3: Simplify: $$\\tfrac{5 - 120\\sqrt{3}}{-275} = \\tfrac{120\\sqrt{3} - 5}{275} = \\tfrac{24\\sqrt{3} - 1}{55}$$ (divide by 5).\n\nNow in $$\\tfrac{p + q\\sqrt{3}}{r}$$ form with rational denominator.", "source": "Opus 4.7 ②", "_id": "opus_2_99"}, {"question": "For a region $$R$$ bounded by a curve $$C$$, a line $$l$$, and the $$x$$-axis, how do you determine whether each inequality uses $$\\leq$$ or $$\\geq$$? (3 steps)", "answer": "- Step 1: Identify all boundaries of $$R$$. If $$R$$ is bounded by the curve $$y=2x^{2}+x-21$$, the line $$y=5x+75$$, and the $$x$$-axis, then $$R$$ has three boundary curves, so you need three inequalities.\n- Step 2: For each boundary, determine whether $$R$$ is above or below it:\n+ $$R$$ is above the $$x$$-axis → $$y \\geq 0$$\n+ $$R$$ is below the line → $$y \\leq 5x+75$$\n+ $$R$$ is above the curve → $$y \\geq 2x^{2}+x-21$$\n- Step 3: **Verify with a test point.** Pick a point clearly inside $$R$$ and check all inequalities. If the point satisfies all three, your signs are correct. Phuc's trap: writing $$y \\leq 2x^{2}+x-21$$ when $$R$$ is actually ABOVE the curve — always check with a sample point, don't guess the direction.\n\nTakeaway: For each boundary, is $$R$$ above ($$\\geq$$) or below ($$\\leq$$)? Verify with a test point inside $$R$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "Why does integrating $$f'(x)$$ to find $$f(x)$$ always produce an integration constant $$C$$, and how should you conceptually view its determination? (2 steps)", "answer": "- Step 1: Differentiation destroys constant information because the derivative of any constant is zero. Therefore, integration recovers the family of all curves that share the same gradient function, differing only by vertical translation. The constant $$C$$ represents this unknown vertical shift.\n- Step 2: To fix $$C$$, you need one point $$(a, f(a))$$ that lies on the specific curve. Substituting this point into the integrated equation $$f(x) = F(x) + C$$ isolates $$C = f(a) - F(a)$$. Without such a point, the family of solutions remains infinitely large.", "source": "Kimi K2.6 ①", "_id": "kimi_1_38"}, {"question": "In a compound shape made of a sector + triangle + right triangle, how do you split the area computation? (3 steps)", "answer": "- Step 1: Identify ALL constituent pieces (sketch + label).\n- Step 2: Match each piece to its formula:\n+ Sector: $$\\tfrac{1}{2}r^2\\theta$$\n+ Triangle (SAS): $$\\tfrac{1}{2}ab\\sin C$$\n+ Right triangle: $$\\tfrac{1}{2} \\cdot \\text{legs}$$\n- Step 3: Sum the areas. Ensure radian-mode for sector.\n\nSketch FIRST. Don't compute before you see the decomposition.", "source": "Opus 4.7 ②", "_id": "opus_2_96"}, {"question": "When integrating $$\\int\\left(10x^{4}-\\frac{3}{2x^{3}}-7\\right)dx$$, what is the complete step-by-step approach and what is the most commonly forgotten element? (3 steps)", "answer": "- Step 1: Rewrite each term in power form: $$10x^{4}$$ stays, $$\\frac{3}{2x^{3}} = \\frac{3}{2}x^{-3}$$, and $$-7 = -7x^{0}$$. Every term must be in the form $$kx^{n}$$ before the power rule applies.\n- Step 2: Integrate term by term: $$\\int 10x^{4}\\,dx = \\frac{10x^{5}}{5} = 2x^{5}$$; $$\\int -\\frac{3}{2}x^{-3}\\,dx = -\\frac{3}{2}\\cdot\\frac{x^{-2}}{-2} = \\frac{3}{4}x^{-2} = \\frac{3}{4x^{2}}$$; $$\\int -7\\,dx = -7x$$.\n- Step 3: Combine and **add $$+C$$**: $$2x^{5}+\\frac{3}{4x^{2}}-7x+C$$. The most commonly forgotten element is the **constant of integration $$+C$$** for indefinite integrals. Without it, you've found *an* antiderivative, not *the general* antiderivative — and you'll lose a mark.\n\nTakeaway: Rewrite → integrate each term → combine → always add $$+C$$ for indefinite integrals.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "What does a negative outer exponent like $$\\left(\\frac{A}{B}\\right)^{-n}$$ do, and why? (2 steps)", "answer": "- Step 1: $$\\left(\\frac{A}{B}\\right)^{-n}=\\left(\\frac{B}{A}\\right)^{n}$$ — a negative exponent **flips** the fraction (reciprocates) and makes the exponent positive.\n- Step 2: This comes from $$\\left(\\frac{A}{B}\\right)^{-n}=\\frac{A^{-n}}{B^{-n}}=\\frac{1/A^{n}}{1/B^{n}}=\\frac{B^{n}}{A^{n}}=\\left(\\frac{B}{A}\\right)^{n}$$. Phuc didn't recognise this flip in part (c) of the indices question.\n\nAlso: $$\\frac{1}{x^{-k}}=x^{k}$$ — bringing a negative power up from the denominator flips its sign.", "source": "GLM 5.1 ①", "_id": "glm_1_40"}, {"question": "Explain why, when integrating $$f'(x) = 4x^{3/2} + \\frac{k}{x^2}$$ where $$k$$ is unknown, directly integrating leads to a \"two unknowns\" trap — and how to avoid it. (3 steps)", "answer": "- Step 1: Direct integration gives $$f(x) = \\frac{8}{5}x^{5/2} - \\frac{k}{x} + C$$, containing TWO unknowns ($$k$$ and $$C$$). Using a single known point $$P$$ gives only ONE equation — you can't solve for both.\n- Step 2: Solution: exploit any OTHER condition that pins down $$k$$ without involving $$C$$. Here, we're told $$f''(P) = 0$$.\n- Step 3: Compute $$f''$$ from $$f'$$ by differentiating once more (no integration constant introduced). Apply the condition $$f''(2) = 0$$, which involves only $$k$$, solve for $$k$$, THEN integrate with the known $$k$$ and use $$P$$ to find $$C$$.\n\nStrategy: separate the unknowns by using non-integration-based conditions first.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "What's the relationship between \"inequalities describing a region\" and \"shaded region on a graph\"?", "answer": "They are two representations of the same thing:\n- **Inequalities**: algebraic — e.g., $$y \\geq 0$$ AND $$y \\leq 5x + 75$$ AND $$y \\geq 2x^2 + x - 21$$.\n- **Shaded region**: geometric — points $$(x, y)$$ in the plane satisfying ALL the inequalities.\n\n**Conversion**:\n- Inequalities → shading: for each inequality, shade the correct side; the region is the intersection (overlap) of all shadings.\n- Shading → inequalities: for each boundary, determine which side is shaded and translate to the right inequality sign.\n\n**Sanity check**: a point inside the shaded region should satisfy ALL inequalities; a point outside should violate at least one.", "source": "Opus 4.7 ①", "_id": "opus_1_186"}, {"question": "If a line passes through $$A(4,2)$$ and is parallel to the $$x$$-axis, what is its equation? What if it were parallel to the $$y$$-axis? (2 steps)", "answer": "- Step 1: A line parallel to the $$x$$-axis is **horizontal** — every point on it has the same $$y$$-coordinate. Through $$(4,2)$$, the equation is simply $$y=2$$. The $$x$$-coordinate of the given point is irrelevant for the equation; the line extends for all $$x$$ at height 2.\n- Step 2: A line parallel to the $$y$$-axis is **vertical** — every point has the same $$x$$-coordinate. Through $$(4,2)$$, the equation is $$x=4$$. These lines have undefined/infinite gradient and cannot be written in the form $$y=mx+c$$.\n\nTakeaway: Parallel to $$x$$-axis through $$(a,b)$$: $$y=b$$. Parallel to $$y$$-axis through $$(a,b)$$: $$x=a$$.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "Why is \"angles in a triangle sum to $$\\pi$$ radians\" equivalent to \"angles in a triangle sum to $$180°$$\"?", "answer": "Because $$\\pi$$ rad = $$180°$$ by definition of the radian. The statement is the same fact in different units.\n\nPractical: when working in radians, use $$\\pi$$; when in degrees, use $$180$$. Mixing units is a frequent error source. Always check calculator mode — \"rad\" for radians, \"deg\" for degrees.\n\nExample: in $$\\triangle ABC$$ with $$\\angle A = \\pi/3$$ and $$\\angle B = \\pi/4$$, $$\\angle C = \\pi - \\pi/3 - \\pi/4 = \\pi \\cdot (1 - 1/3 - 1/4) = \\pi \\cdot 5/12$$.", "source": "Opus 4.7 ①", "_id": "opus_1_93"}, {"question": "A curve $$y = f(x)$$ *touches* the $$x$$-axis at $$(3, 0)$$. After applying $$y = f(x + 3)$$, does the new curve still touch the axis, or does it now cross?", "answer": "It still **touches** — touching/crossing behaviour is a local property determined by the multiplicity of the root (a double root gives touching). Horizontal translations, stretches, and reflections are rigid/scale transformations that preserve double roots (the factored form $$(x - 3)^2$$ just becomes $$((x+3) - 3)^2 = x^2$$, still a double root at $$x = 0$$).\n\nTouching survives all transformations except those that could change the functional form (e.g., adding a constant vertically could lift the curve off the axis entirely).", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "What are Vieta's formulas for a quadrati
