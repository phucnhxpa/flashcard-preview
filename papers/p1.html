\\sqrt{5})^2 = 5$$ perfectly, whereas $$2.236^2 \\approx 4.999$$. Keeping exact forms ensures $$(x_2 - x_1)^2 + (y_2 - y_1)^2$$ simplifies to a clean integer or simple fraction under the square root.\n\nExact form is not just an exam requirement; it is a computational safeguard.", "source": "GLM 5.1 ②", "_id": "glm_2_47"}, {"question": "What's the geometric meaning of \"curves $$C_1$$ and $$C_2$$ meet at $$P$$ and $$Q$$\" in the context of defining a region $$R$$ between them? (3 steps)", "answer": "- Step 1: $$P$$ and $$Q$$ are the intersection points — the \"end-caps\" where the boundary of $$R$$ switches from one curve to the other.\n- Step 2: Between $$P$$ and $$Q$$ ($$x$$-wise), one curve is the upper boundary and the other is lower.\n- Step 3: $$R$$ may also have additional boundaries (e.g. $$x$$-axis) that extend beyond $$P$$ or $$Q$$. Sketch to identify each.", "source": "Opus 4.7 ②", "_id": "opus_2_129"}, {"question": "Why is $$+C$$ essential for indefinite integrals, and when is it NOT needed? (3 steps)", "answer": "- Step 1: Differentiation annihilates constants: $$\\tfrac{d}{dx}(f(x) + C) = f'(x)$$ for any constant $$C$$. So any antiderivative has infinitely many \"parallel\" forms differing by a constant.\n- Step 2: The $$+C$$ represents this ambiguity: indefinite integration gives a family of functions, not a unique one.\n- Step 3: $$+C$$ is NOT needed for DEFINITE integrals $$\\int_a^b f(x)\\,dx$$, because evaluating at both endpoints cancels it: $$[F(b) + C] - [F(a) + C] = F(b) - F(a)$$.\n\nExam: losing the $$+C$$ on an indefinite integral typically costs 1 mark.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "For a composite region with $$n$$ boundary curves/lines, one inequality might be $$y \\leq x^2 + ...$$ and another $$y \\leq 5x + ...$$ Why is it possible to have two \"below\" inequalities simultaneously?", "answer": "Because the two boundaries (a curve and a line) can both be ABOVE the region. The region is \"below the curve\" AND \"below the line\" — these don't contradict; they both describe the same region from different perspectives.\n\nExample: imagine a region bounded above by a line $$y = 5x + 75$$ AND by a parabola $$y = 2x^2 + x - 21$$. For an $$x$$ where the line is lower than the parabola, \"$$y \\leq \\text{line}$$\" is the tighter constraint. For an $$x$$ where the parabola is lower, \"$$y \\leq \\text{parabola}$$\" is tighter.\n\nThe region is the intersection — bounded by whichever is lower at each $$x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_114"}, {"question": "Why is $$+C$$ essential for indefinite integrals but irrelevant for definite integrals?", "answer": "An indefinite integral asks \"what's the most general antiderivative?\" — infinitely many functions differ by a constant yet all have the same derivative (since $$\\frac{d}{dx}C = 0$$). So we MUST write $$+C$$ to represent the entire family.\n\nA definite integral $$\\int_a^b f(x)\\,dx$$ evaluates to a single number: $$F(b) - F(a)$$. Whatever constant is in $$F$$ cancels because it appears in both evaluations. So $$+C$$ is unnecessary (and incorrect to include in the final answer) for definite integrals.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "When using the Cosine Rule to show an expression for $$\\cos \\theta$$, you often get an equation like $$x^2 = 25 + 1 + 2x + x^2 - 10(1+x)\\cos \\theta$$. What is the crucial simplification step? (2 steps)", "answer": "- Step 1: You must cancel the $$x^2$$ terms that appear on both sides of the equation.\n- Step 2: This leaves a linear equation in $$x$$ and $$\\cos \\theta$$, which can be easily rearranged to isolate $$\\cos \\theta$$ as a rational expression in $$x$$.\n\nFailing to cancel the squared terms leads to unnecessarily complex algebra and prevents solving for $$\\cos \\theta$$.", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "A student says \"for $y = f(x+3)$, the graph shifts right by 3 because x gets bigger.\" Explain why this is wrong and the correct rule. (misconception)", "answer": "- This is the most common transformation error!\n- Inside the function ($f(x+a)$) works in REVERSE: $y = f(x+3)$ shifts the graph LEFT by 3, not right.\n- Why? Let the original point be $(x, y)$. For the transformed graph to produce the same y-value, we need $x+3$ to equal the original x. So new $x$ must be $x_{original} - 3$.\n- Outside the function ($f(x) + a$) works normally: $y = f(x) + 3$ shifts UP by 3.\n\n**Memory trick:** Think \"opposite\" for horizontal. Inside $f()$ = horizontal = opposite direction. Outside $f()$ = vertical = same direction.", "source": "MiniMax ②", "_id": "minimax_2_37"}, {"question": "How do horizontal stretches and compressions affect a graph $ y = f(kx) $? (3 steps)", "answer": "- Step 1: **Horizontal stretch** by factor $ \\frac{1}{k} $ if $ 0 < |k| < 1 $.  \n- Step 2: **Horizontal compression** by factor $ \\frac{1}{k} $ if $ |k| > 1 $.  \n- Step 3: If $ k < 0 $, reflect over the y-axis (e.g., $ y = f(-3x) $ is a reflection + compression).  \n\n**Example**: $ f(x) = \\sin x $ vs. $ f(2x) $ oscillates twice as fast.\n\n**Misconception**: Why isn't $ f(2x) $ a vertical compression? (Horizontal transformations affect **x** values directly.)", "source": "Qwen 3 ②", "_id": "qwen_2_4"}, {"question": "For parallel and perpendicular lines, state the gradient relationships.", "answer": "- **Parallel**: $$m_1 = m_2$$ (same gradient). Two parallel lines never meet.\n- **Perpendicular**: $$m_1 \\cdot m_2 = -1$$, equivalently $$m_2 = -\\frac{1}{m_1}$$ (negative reciprocal).\n- **Special cases**: horizontal and vertical lines are perpendicular; horizontal has slope $$0$$, vertical has undefined slope. The formula $$m_1 m_2 = -1$$ fails here (you can't multiply by undefined), so treat them as a special case.\n\nDerivation of perpendicular: rotate a line by $$90°$$, which sends direction vector $$(1, m)$$ to $$(-m, 1)$$, giving new slope $$-\\frac{1}{m}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_73"}, {"question": "In a problem where curves meet when $$2x^{4}-7x^{2}-15=0$$, why is it valid to multiply both sides of a derived equation by $$2x$$ to reach this quartic, and what domain caveat must be remembered? (2 steps)", "answer": "- Step 1: Multiplying an equation by a non-zero quantity preserves equality. If the original equation involved fractions such as $$\\frac{15}{2x}$$, multiplying by $$2x$$ eliminates the denominator and clears the fraction, revealing the polynomial structure.\n- Step 2: The caveat is that $$x=0$$ must be excluded from the domain of the original equation because division by zero is undefined. Although $$x=0$$ is not a root of the final quartic here, one must always note that the multiplication step assumes $$x \\neq 0$$, so any solution $$x=0$$ introduced later would be extraneous.", "source": "Kimi K2.6 ②", "_id": "kimi_2_27"}, {"question": "Understand the connection: $$(x+2)^2$$ factor of a cubic means the graph does what at $$x = -2$$?", "answer": "It **touches** the $$x$$-axis at $$x = -2$$ without crossing. This is because $$(x+2)^2 \\geq 0$$ for all $$x$$, so the sign of $$f$$ near $$x = -2$$ is governed by the other factor. The cubic doesn't change sign at $$x = -2$$ — it just \"kisses\" the axis.\n\n**Contrast**: $$(x+2)^1$$ (simple factor) would mean the graph CROSSES at $$x = -2$$, changing sign.\n\nIn general: factor raised to even power → touches; odd power → crosses.", "source": "Opus 4.7 ①", "_id": "opus_1_161"}, {"question": "For the curve $$y = x(4 - x^2)$$ and line $$y = A/x$$, why does substituting one into the other yield a quartic in $$x$$?", "answer": "Equating: $$x(4 - x^2) = \\frac{A}{x}$$. Multiply by $$x$$ (valid for $$x \\neq 0$$): $$x^2(4 - x^2) = A$$, which expands to $$4x^2 - x^4 = A$$, or rearranging: $$x^4 - 4x^2 + A = 0$$.\n\nThe quartic arises because (cubic) $$\\times x$$ = quartic. This structure — powers of $$x$$ appearing in both curves — often produces higher-degree polynomials once cross-multiplied.\n\nSubstitution $$u = x^2$$ then reduces it to a quadratic in $$u$$ (a standard \"biquadratic\" trick when only even powers appear).", "source": "Opus 4.7 ①", "_id": "opus_1_76"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "When solving a quadratic $$21x^{2}+10x+1=0$$ by factorisation, what is the \"split-the-middle-term\" trick, and why does finding two numbers that multiply to $$ac$$ and add to $$b$$ guarantee the factorisation works? (3 steps)", "answer": "- Step 1: For $$ax^{2}+bx+c$$, we need two numbers $$p$$ and $$q$$ such that $$p \\times q = a \\times c$$ and $$p + q = b$$. Here $$a=21, c=1$$ so $$ac=21$$, and $$b=10$$. The two numbers are 7 and 3 since $$7 \\times 3 = 21$$ and $$7 + 3 = 10$$.\n- Step 2: Rewrite the middle term as a sum: $$21x^{2}+10x+1 = 21x^{2}+7x+3x+1$$. Now factor by grouping: $$7x(3x+1)+1(3x+1)=(7x+1)(3x+1)$$.\n- Step 3: This always works because splitting $$bx$$ into $$px+qx$$ (where $$p+q=b$$) and then factoring by grouping produces $$(\\text{factor})(3x+1)$$ — the shared bracket emerges precisely because $$pq=ac$$ ensures both groups contain the same linear factor.\n\nThe quadratic formula $$x=\\frac{-b \\pm \\sqrt{b^{2}-4ac}}{2a}$$ is the fallback when no integer pair exists for the $$ac$$-method.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "What does the discriminant $$\\Delta = b^{2}-4ac$$ tell you about the nature of roots, and why does each sign condition correspond to that number of real roots? (3 steps)", "answer": "- Step 1: The quadratic formula gives $$x = \\frac{-b \\pm \\sqrt{\\Delta}}{2a}$$, so the number of real roots depends entirely on whether $$\\sqrt{\\Delta}$$ is real and non-zero.\n- Step 2: If $$\\Delta > 0$$, the square root is a real non-zero number, so we get two distinct values from the $$\\pm$$ — two distinct real roots. If $$\\Delta = 0$$, the square root is zero, so both $$+0$$ and $$-0$$ give the same $$x$$ — one repeated root (the curve is tangent to the $$x$$-axis). If $$\\Delta < 0$$, the square root is imaginary — no real roots at all.\n- Step 3: Geometrically: $$\\Delta > 0$$ means the parabola crosses the $$x$$-axis twice; $$\\Delta = 0$$ means it touches (tangent) at one point; $$\\Delta < 0$$ means it never reaches the $$x$$-axis.\n\nTrigger words: \"single point / tangent\" → $$\\Delta = 0$$; \"two distinct points\" → $$\\Delta > 0$$; \"does not intersect\" → $$\\Delta < 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "A common mistake is setting $$\\frac{dy}{dx}$$ equal to the entire tangent line equation $$y=mx+c$$ instead of just the gradient $$m$$. Why is this wrong, and what is the correct relationship? (2 steps)", "answer": "- Step 1: $$\\frac{dy}{dx}$$ evaluated at a point gives a single number — the slope (gradient) of the curve at that point. The line equation $$y=mx+c$$ contains both the gradient $$m$$ and the $$y$$-intercept $$c$$, plus the variable $$x$$. Setting a number equal to an expression with variables is dimensionally inconsistent.\n- Step 2: The correct procedure: differentiate the curve to get $$\\frac{dy}{dx}$$; set $$\\frac{dy}{dx}$$ equal to the gradient $$m$$ of the given line (just the coefficient of $$x$$); solve for the $$x$$-coordinate of the tangent point; substitute that $$x$$ back into the **curve** to get $$y$$; then use the point to find $$c$$ in $$y=mx+c$$.\n\nExample: For curve $$y=2x^{2}+8x+3$$ and line $$y=4x+c$$: $$\\frac{dy}{dx}=4x+8$$, set equal to gradient 4 (not $$4x+c$$), giving $$x=-1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "What is the full step-by-step strategy for finding the constant $$c$$ so that a line $$y=mx+c$$ is tangent to a curve $$y=f(x)$$? (4 steps)", "answer": "- Step 1: Differentiate the curve: compute $$f'(x) = \\frac{dy}{dx}$$.\n- Step 2: Set $$f'(x) = m$$ (the gradient of the line, i.e. the coefficient of $$x$$ in $$y=mx+c$$). Solve for the $$x$$-coordinate of the tangent point.\n- Step 3: Substitute that $$x$$ into the **curve** equation $$y=f(x)$$ (not the line) to find the $$y$$-coordinate. You now have the tangent point $$(x_1, y_1)$$.\n- Step 4: Substitute $$(x_1, y_1)$$ into the line equation $$y = mx + c$$ and solve for $$c$$.\n\nKey insight: the tangent point must lie on **both** the curve and the line. Step 3 uses the curve because we haven't found $$c$$ yet; Step 4 uses the line to finally determine $$c$$.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "For the inequality $$y < f(x)$$, which region is shaded, and why? What changes for $$y > f(x)$$, and what is the visual rule for strict vs non-strict inequalities?", "answer": "$$y < f(x)$$ means all points whose $$y$$-value is less than the curve's $$y$$-value at the same $$x$$ — this is the region **below** the curve. $$y > f(x)$$ means the region **above** the curve.\n\nFor boundary drawing: strict inequality ($$<$$ or $$>$$) → **dashed** curve (points on the curve are excluded); non-strict ($$\\leq$$ or $$\\geq$$) → **solid** curve (points on the curve are included).\n\nVisual mnemonic: \"less than = lower than; greater than = higher than.\"", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "When a problem asks for the region satisfying two inequalities simultaneously (e.g. $$y < x+2$$ AND $$y > x^{2}-x$$), how do you determine the solution region? (2 steps)", "answer": "- Step 1: Shade each inequality separately. For $$y < x+2$$, shade below the line. For $$y > x^{2}-x$$, shade above the parabola.\n- Step 2: The solution is the **overlap** (intersection) of the two shaded regions — the \"lens-shaped\" area between the line above and the parabola below.\n\nThe intersection points of the boundaries (where $$x+2 = x^{2}-x$$) mark where the two regions meet. Between those $$x$$-values, the line sits above the parabola, creating the enclosed lens.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "What is a \"major sector\" versus a \"minor sector,\" and how do you compute the major angle from the minor angle? Why must you always check which is being asked for?", "answer": "A **minor sector** uses the smaller angle at the centre; a **major sector** uses the larger angle — the rest of the circle. If the minor angle is $$\\alpha$$ radians, the major angle is $$\\theta_{\\text{major}} = 2\\pi - \\alpha$$.\n\nAlways check the question: \"find the area of the major sector\" means use $$2\\pi - \\alpha$$, not $$\\alpha$$ itself. A common mistake is computing the minor sector area when the major sector was requested.\n\nExample: If $$\\alpha \\approx 2.22$$ rad, then $$\\theta_{\\text{major}} = 2\\pi - 2.22 \\approx 4.063$$ rad.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "When you compute $$\\cos\\alpha$$ and get a negative value (e.g. $$\\cos\\alpha = -\\frac{29}{48}$$), what does this tell you about the angle $$\\alpha$$, and why does it confirm the angle belongs to a major sector context? (2 steps)", "answer": "- Step 1: $$\\cos\\alpha < 0$$ means $$\\alpha$$ is in the second quadrant — an **obtuse** angle with $$\\frac{\\pi}{2} < \\alpha < \\pi$$ (between 90° and 180°). This is because cosine is negative precisely in that range.\n- Step 2: An obtuse angle is already larger than $$\\frac{\\pi}{2}$$, so if the question asks for the **major** sector, you still need $$2\\pi - \\alpha$$ (which will be even larger). The negative cosine simply confirms $$\\alpha$$ is obtuse — it doesn't automatically make $$\\alpha$$ the major angle.\n\nKey rule: obtuse ($$\\alpha > \\frac{\\pi}{2}$$) → $$\\cos\\alpha < 0$$; acute ($$\\alpha < \\frac{\\pi}{2}$$) → $$\\cos\\alpha > 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "What are the Cosine Rule and Sine Rule, and when should you choose one over the other? (2 steps)", "answer": "- Step 1: **Cosine Rule**: $$a^{2} = b^{2}+c^{2}-2bc\\cos A$$. Use when you have **two sides and the included angle** (to find the third side), or **three sides** (to find an angle). It directly handles obtuse angles via the negative cosine term.\n- Step 2: **Sine Rule**: $$\\frac{a}{\\sin A} = \\frac{b}{\\sin B} = \\frac{c}{\\sin C}$$. Use when you have an **angle-side pair** and need another side or angle. Warning: the sine rule can give two possible angles (ambiguous case) — always check if the angle should be acute or obtuse.\n\nThis was Phuc's #1 weakness — forgotten in all 4 papers. Memorise and drill daily.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "What is the area formula for a triangle when you know two sides and the included angle (SAS), and why does it involve sine rather than cosine?", "answer": "The SAS area formula is $$A = \\frac{1}{2}ab\\sin C$$, where $$a$$ and $$b$$ are the two known sides and $$C$$ is the included angle.\n\nWhy sine: the height of the triangle relative to base $$a$$ is $$b\\sin C$$ (the perpendicular component of side $$b$$). Area = $$\\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2}a(b\\sin C)$$.\n\nCosine gives the **adjacent** component ($$b\\cos C$$), which is projection along the base, not the height. Sine gives the **opposite** component — the perpendicular height.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "When integrating an expression like $$\\int\\left(10x^{4}-\\frac{3}{2x^{3}}-7\\right)dx$$, what is the critical first step that Phuc repeatedly forgot, and what happens if you skip it?", "answer": "The critical first step: **rewrite every term with $$x$$ in the denominator as a negative power**. $$\\frac{3}{2x^{3}} = \\frac{3}{2}x^{-3}$$. \n\nIf you skip this, you cannot apply the power rule $$\\int x^{n}dx = \\frac{x^{n+1}}{n+1}$$ because the rule requires $$x$$ to be in the numerator with an explicit exponent. The term $$\\frac{1}{x^{3}}$$ is not in $$x^{n}$$ form — it's in $$x^{-n}$$ form disguised as a fraction.\n\nAfter rewriting: $$\\int \\frac{3}{2}x^{-3}\\,dx = \\frac{3}{2}\\cdot\\frac{x^{-2}}{-2} = -\\frac{3}{4}x^{-2} = \\frac{3}{4x^{2}}$$. Always include $$+C$$ for indefinite integrals.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "Why does $$\\int x^{-3}\\,dx = \\frac{x^{-2}}{-2}$$ and not $$\\frac{x^{-2}}{-2} + C$$ at the term level? When does the $$+C$$ appear? (2 steps)", "answer": "- Step 1: Each term is integrated separately using the power rule $$\\int x^{n}\\,dx = \\frac{x^{n+1}}{n+1}$$, but we do NOT add a separate constant for each term. The integration constant represents the entire family of antiderivatives, and multiple constants would just collapse into one: $$C_1 + C_2 + C_3 = C$$.\n- Step 2: The single $$+C$$ is added at the **end**, after all terms have been integrated and combined. For $$\\int(10x^{4}-\\frac{3}{2}x^{-3}-7)\\,dx$$, the answer is $$2x^{5}+\\frac{3}{4x^{2}}-7x+C$$ — one constant only.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "Given $$m = 2^{n}$$, express $$2^{n+3}$$ and $$16^{3n}$$ in terms of $$m$$. What index laws are used for each? (2 steps)", "answer": "- Step 1: $$2^{n+3} = 2^{n}\\cdot 2^{3} = 8\\cdot 2^{n} = 8m$$. Law used: $$a^{b+c} = a^{b}\\cdot a^{c}$$ (add exponents when multiplying same base).\n- Step 2: $$16^{3n} = (2^{4})^{3n} = 2^{12n} = (2^{n})^{12} = m^{12}$. Law used: change base first ($$16=2^{4}$$), then $$\\left(a^{m}\\right)^{n} = a^{mn}$$ (multiply exponents when raising a power to a power), then recognise $$2^{12n} = (2^{n})^{12}$$.\n\nCommon bases to memorise: $$4=2^{2}$$, $$8=2^{3}$$, $$16=2^{4}$$, $$\\frac{1}{4}=2^{-2}$$, $$9=3^{2}$$, $$27=3^{3}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "To rationalise a denominator like $$\\sqrt{3}-1$$, what do you multiply by, and why does this eliminate the surd? What is the general conjugate rule? (2 steps)", "answer": "- Step 1: Multiply both numerator and denominator by the **conjugate** $$\\sqrt{3}+1$$ (flip the sign between the terms). The denominator becomes $$(\\sqrt{3}-1)(\\sqrt{3}+1) = 3-1 = 2$$ by the difference of squares: $$(a-b)(a+b)=a^{2}-b^{2}$$.\n- Step 2: General rule: conjugate of $$a+b\\sqrt{c}$$ is $$a-b\\sqrt{c}$$; conjugate of $$\\sqrt{a}-\\sqrt{b}$$ is $$\\sqrt{a}+\\sqrt{b}$$. Multiplying by the conjugate always rationalises because $$\\sqrt{c}^{2}=c$$ — the surd squares to a rational number.\n\nAlways multiply **both** top and bottom by the conjugate to preserve equality.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": true}, {"question": "For the graph transformation $$y=f(x+3)$$, what happens to every point on the original graph, and why is the direction \"reversed\" (left instead of right)? (2 steps)", "answer": "- Step 1: Each point $$(x_0, y_0)$$ on $$y=f(x)$$ moves to $$(x_0-3, y_0)$$ on $$y=f(x+3)$$ — a shift **LEFT** by 3. The curve passes through where $$f(x+3)=0$$, i.e. $$x=-3$$ instead of $$x=0$$.\n- Step 2: The reversal happens because transformations **inside** $$f()$$ affect the $$x$$-axis in the opposite direction. To get the same output $$f(0)$$, you need $$x+3=0$$, so $$x=-3$$ — the input that previously needed $$x=0$$ now needs $$x=-3$$, shifting everything left.\n\nRule: inside $$f()$$ → horizontal (reversed direction); outside $$f()$$ → vertical (intuitive direction).", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "For the combined transformation $$y=f(-3x)$$, what two operations are applied, and how do you transform each coordinate? What property is preserved? (3 steps)", "answer": "- Step 1: $$f(-3x)$$ combines a **reflection in the $$y$$-axis** (from the negative sign) and a **horizontal compression by factor $$\\frac{1}{3}$$** (from the 3).\n- Step 2: For each original point $$(x_0, y_0)$$, replace $$x$$ by $$\\frac{x}{-3}$$: the new $$x$$-coordinate is $$\\frac{x_0}{-3}$$ and the $$y$$-coordinate stays $$y_0$$. Example: $$(-1,0)$$ → $$\\left(\\frac{1}{3}, 0\\right)$$; $$(3,0)$$ → $$(-1, 0)$$; $$(0,2)$$ → $$\\left(0, 2\\right)$$ (unchanged because $$x=0$$).\n- Step 3: A \"touches\" property (double root) is preserved — if the original curve touches the $$x$$-axis at a point, the transformed curve still touches (doesn't cross) at the corresponding point.\n\nOrder doesn't matter for this particular combination: reflect then compress, or compress then reflect — same result.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "What is the complete transformation cheat sheet for graph transformations, and what is the mnemonic for remembering which direction?", "answer": "| Transformation | Effect | On coordinates |\n|---|---|---|\n| $$f(x)+a$$ | shift UP by $$a$$ | $$y \\to y+a$$ |\n| $$f(x+a)$$ | shift LEFT by $$a$$ | $$x \\to x-a$$ |\n| $$af(x)$$ | vertical stretch SF $$a$$ | $$y \\to ay$$ |\n| $$f(ax)$$ | horizontal compress SF $$\\frac{1}{a}$$ | $$x \\to \\frac{x}{a}$$ |\n| $$-f(x)$$ | reflect in $$x$$-axis | $$y \\to -y$$ |\n| $$f(-x)$$ | reflect in $$y$$-axis | $$x \\to -x$$ |\n\nMnemonic: **Inside** $$f()$$ → **horizontal** (reversed direction — add goes left, multiply compresses); **Outside** $$f()$$ → **vertical** (intuitive direction — add goes up, multiply stretches).", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "When a question says two curves \"meet at a single point,\" what mathematical condition does this trigger, and what is the full procedure? (3 steps)", "answer": "- Step 1: \"Meet at a single point\" means exactly one intersection → the combined equation has **one repeated root** → discriminant $$\\Delta = 0$$.\n- Step 2: Equate the two curve equations, rearrange into a standard quadratic $$ax^{2}+bx+c=0$$, then compute $$\\Delta = b^{2}-4ac$$ and set it to zero. This gives an equation in the parameter (e.g. $$k$$) which you solve.\n- Step 3: Once you have the parameter value, substitute back into the quadratic to find the repeated $$x$$-root, then substitute into either original curve to find $$y$$ — giving the coordinates of the single meeting point.\n\nPhuc's insight: the discriminant equation only contains $$k$$ because the $$x$$ terms cancel when $$\\Delta=0$$ is enforced — that's why it produces a solvable equation for $$k$$.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "What are the discriminant trigger words and their corresponding conditions? What is a common trap when only checking $$\\Delta > 0$$? (2 steps)", "answer": "- Step 1: Trigger words map to discriminant conditions: \"tangent / single point / meets at exactly one point\" → $$\\Delta = 0$$; \"two distinct points / cuts at two points\" → $$\\Delta > 0$$; \"does not intersect / never crosses\" → $$\\Delta < 0$$.\n- Step 2: Common trap (Phuc's error in Q8c): $$\\Delta > 0$$ alone does NOT guarantee the right type of roots if there are **sign constraints**. For example, if roots must be positive (e.g. $$y = x^{2}$$ substitution where $$y > 0$$), you also need product of roots $$> 0$$ and sum of roots $$> 0$$, in addition to $$\\Delta > 0$$.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "To find the area of a sector with radius $$r$$ and angle $$\\theta$$ in radians, what formula do you use? Why must $$\\theta$$ be in radians? (2 steps)", "answer": "- Step 1: Sector area = $$\\frac{1}{2}r^{2}\\theta$$ and arc length = $$r\\theta$$. These formulas only work when $$\\theta$$ is in radians.\n- Step 2: In radians, the arc length is the fraction $$\\frac{\\theta}{2\\pi}$$ of the full circumference $$2\\pi r$$, giving $$\\ell = \\frac{\\theta}{2\\pi}\\cdot 2\\pi r = r\\theta$$. The sector area is the same fraction of the full circle area $$\\pi r^{2}$$: $$A = \\frac{\\theta}{2\\pi}\\cdot \\pi r^{2} = \\frac{1}{2}r^{2}\\theta$$. If $$\\theta$$ were in degrees, the fraction would be $$\\frac{\\theta}{360}$$ and the formulas would need extra conversion factors.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Angles on a straight line sum to what value (in radians)? Angles in a triangle sum to what? How did this appear in the sector+triangle problem? (2 steps)", "answer": "- Step 1: Angles on a straight line sum to $$\\pi$$ radians (180°). Angles in a triangle sum to $$\\pi$$ radians. These are fundamental radian facts.\n- Step 2: In the garden problem, three angles sat on a straight line at point $$B$$: $$\\angle ABE + \\angle EBD + \\angle DBC = \\pi$$. Given $$\\angle EBD = 1.3$$ rad and $$\\angle DBC = \\frac{\\pi}{2}$$ (right angle), solving: $$\\angle ABE = \\pi - 1.3 - \\frac{\\pi}{2} = \\frac{\\pi}{2} - 1.3 \\approx 0.27$$ rad.\n\nAlways check: are your angles on a straight line, in a triangle, or at a point? Each has a different sum rule.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "In a right-angled triangle with hypotenuse $$h$$ and an angle $$\\theta$$ adjacent to it, what are the expressions for the other two sides? Why? (2 steps)", "answer": "- Step 1: Adjacent side (next to $$\\theta$$) = $$h\\cos\\theta$$; Opposite side (across from $$\\theta$$) = $$h\\sin\\theta$$. These come directly from SOH-CAH-TOA: $$\\cos\\theta = \\frac{\\text{adj}}{h}$$ and $$\\sin\\theta = \\frac{\\text{opp}}{h}$$.\n- Step 2: In the garden problem, right triangle $$BCD$$ had hypotenuse $$BD=6$$ and angle $$\\angle DBC = 1.3$$ rad. So $$BC = 6\\cos(1.3)$$ and $$CD = 6\\sin(1.3)$$, giving the two legs and enabling area calculation.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "When a region $$R$$ is bounded between a curve (floor) and a line (ceiling) above the $$x$$-axis, what three inequalities define it? How do you determine which is \"floor\" and which is \"ceiling\"? (2 steps)", "answer": "- Step 1: The three inequalities are: $$y \\geq 0$$ (above $$x$$-axis), $$y \\geq \\text{curve}$$ (above the floor), and $$y \\leq \\text{line}$$ (below the ceiling). The region is \"sandwiched.\"\n- Step 2: To identify floor vs ceiling, pick a **sample point** inside $$R$$ and check: is its $$y$$-value above the curve or below it? Above → curve is floor ($$y \\geq$$ curve). Below the line → line is ceiling ($$y \\leq$$ line).\n\nPhuc's mistake: wrote $$y \\leq 2x^{2}+x-21$$ (below curve) when the region was actually above the curve. Always verify with a sample point.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": true}, {"question": "What does \"$$y \\geq 0$$\" mean geometrically, and what does \"$$x \\geq 0$$\" mean? How do these appear as boundaries of a region?", "answer": "$$y \\geq 0$$ means the region is **above the $$x$$-axis** (including the axis itself). $$x \\geq 0$$ means the region is **to the right of the $$y$$-axis** (including the axis).\n\nThese are half-plane boundaries. A region bounded by both axes plus two curves would need four inequalities: $$x \\geq 0$$, $$y \\geq 0$$, $$y \\leq$$ (upper curve/line), and $$y \\leq$$ or $$y \\geq$$ (other boundary).", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}, {"question": "If a point $$A$$ lies on both curves $$y=f'(x)$$ and $$y=f''(x)$$, what equation do you set up, and why? What is the \"substitute coordinates\" trick? (2 steps)", "answer": "- Step 1: Since $$A$$ is on both curves, its $$x$$-coordinate gives the same $$y$$-value from both equations: $$f'(x_A) = f''(x_A)$$. This is a single equation in the unknown parameter $$k$$.\n- Step 2: Substitute $$x_A$$ into both derivative expressions, set them equal, and solve for $$k$$. Example: with $$f'(x)=6x^{2}-2kx+14$$ and $$f''(x)=12x-2k$$, at $$x=5$$: $$6(25)-2k(5)+14 = 12(5)-2k$$, giving $$164-10k = 60-2k$$, so $$k=13$$.\n\nThis avoids the \"two unknowns\" trap — you find $$k$$ first using the second derivative condition, then integrate.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "After finding one intersection point $$A$$ (with $$x=5$$) between $$y=f'(x)$$ and $$y=f''(x)$$, how do you find the other intersection $$B$$? (2 steps)", "answer": "- Step 1: With the known $$k$$ value, set $$f'(x) = f''(x)$$ again. This gives a quadratic equation where $$x=5$$ is already a known root.\n- Step 2: Factor out $$(x-5)$$ from the quadratic (or solve fully). The other factor gives $$x_B$$. Example: $$6x^{2}-26x+14 = 12x-26$$ simplifies to $$3x^{2}-19x+20=0 = (3x-4)(x-5)$$, so $$x_B = \\frac{4}{3}$$.\n\nThen substitute $$x_B$$ into either curve (use the simpler one, usually $$f''$$) to get $$y_B$$.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "For 4 distinct real intersections of $$y=x(4-x^{2})$$ and $$y=\\frac{A}{x}$$, the equation reduces to $$x^{4}-4x^{2}+A=0$$. Why is $$\\Delta > 0$$ not sufficient, and what three conditions must hold? (3 steps)", "answer": "- Step 1: Substitute $$y=x^{2}$$ to get the quadratic $$y^{2}-4y+A=0$$ in $$y$$. Each positive $$y$$-root gives two $$x$$-values ($$\\pm\\sqrt{y}$$), so for 4 distinct $$x$$-roots we need **2 distinct positive** $$y$$-roots.\n- Step 2: Condition 1: $$\\Delta > 0$$ (two distinct $$y$$-roots) → $$16-4A>0$$ → $$A<4$$. Condition 2: product of roots $$> 0$$ (both same sign, and we need positive) → product = $$A > 0$$. Condition 3: sum of roots $$> 0$$ (both positive, not both negative) → sum = $$4 > 0$$ ✓ (automatic).\n- Step 3: Combining: $$0 < A < 4$$. Phuc's trap: stopping at $$A<4$$ without checking $$A>0$$ — negative $$A$$ would give two negative $$y$$-roots, yielding zero real $$x$$-values (can't take $$\\sqrt{\\text{negative}}$$).\n\nVieta's formulas: for $$ay^{2}+by+c=0$$, sum $$= -\\frac{b}{a}$$, product $$= \\frac{c}{a}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "What does \"a line parallel to the $$x$$-axis through point $$(a,b)$$\" mean, and what is its equation? What about parallel to the $$y$$-axis? (2 steps)", "answer": "- Step 1: Parallel to the $$x$$-axis → horizontal line → constant $$y$$ → equation is $$y=b$$. Every point on this line has the same $$y$$-coordinate $$b$$, regardless of $$x$$.\n- Step 2: Parallel to the $$y$$-axis → vertical line → constant $$x$$ → equation is $$x=a$$. Every point has the same $$x$$-coordinate $$a$$, regardless of $$y$$.\n\nPhuc didn't recognise \"$$l_2$$ parallel to $$x$$-axis through $$A(4,2)$$\" means $$y=2$$, making $$C=(x,2)$$ with unknown $$x$$.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "What is the distance formula between two points, and how is it derived? (2 steps)", "answer": "- Step 1: Distance between $$(x_1,y_1)$$ and $$(x_2,y_2)$$ is $$d = \\sqrt{(x_2-x_1)^{2}+(y_2-y_1)^{2}}$$.\n- Step 2: This is Pythagoras' theorem applied to the right triangle formed by the horizontal leg $$|x_2-x_1|$$ and the vertical leg $$|y_2-y_1|$$: $$d^{2} = (\\text{horizontal})^{2}+(\\text{vertical})^{2}$$.\n\nExample: distance from $$B=(15,7)$$ to $$C=(x,2)$$ is $$\\sqrt{(15-x)^{2}+25}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "At what angles does $$\\sin\\theta = -1$$ (minimum), and at what angles does $$\\sin\\theta = 1$$ (maximum)? What are the general solutions? (2 steps)", "answer": "- Step 1: $$\\sin\\theta = 1$$ (maximum) at $$\\theta = \\frac{\\pi}{2}+2n\\pi$$ for integer $$n$$. $$\\sin\\theta = -1$$ (minimum) at $$\\theta = \\frac{3\\pi}{2}+2n\\pi$$ (equivalently $$-\\frac{\\pi}{2}+2n\\pi$$).\n- Step 2: For $$y=A\\sin(x+B)$$ with a given minimum at $$x=x_0$$: set $$x_0+B = \\frac{3\\pi}{2}+2n\\pi$$ and solve for $$B$$. Choose the smallest positive $$B$$ by selecting the appropriate $$n$$.\n\nExample: minimum at $$x=\\frac{\\pi}{4}$$ → $$\\frac{\\pi}{4}+B=\\frac{3\\pi}{2}$$ → $$B=\\frac{5\\pi}{4}$$ (with $$n=0$$).", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "What are the extrema locations for cosine, and how do they differ from sine's extrema? (2 steps)", "answer": "- Step 1: $$\\cos\\theta = 1$$ (maximum) at $$\\theta = 2n\\pi$$ (every full rotation from 0). $$\\cos\\theta = -1$$ (minimum) at $$\\theta = \\pi+2n\\pi$$ (every half-rotation offset).\n- Step 2: Sine peaks at $$\\frac{\\pi}{2}$$; cosine peaks at $$0$$. Sine troughs at $$\\frac{3\\pi}{2}$$; cosine troughs at $$\\pi$$. They are shifted by $$\\frac{\\pi}{2}$$ relative to each other: $$\\sin\\theta = \\cos\\left(\\theta-\\frac{\\pi}{2}\\right)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "Given the area of a triangle and two sides (SAS), how do you find the included angle? What sign issue arises if the angle is obtuse? (3 steps)", "answer": "- Step 1: Use $$A = \\frac{1}{2}ab\\sin C$$ and rearrange: $$\\sin C = \\frac{2A}{ab}$$.\n- Step 2: $$\\sin C$$ gives two possible angles: $$C$$ and $$180°-C$$ (or $$\\pi-C$$ in radians). The question must specify which — \"given $$\\theta > 90°$$\" means choose the obtuse option.\n- Step 3: To find $$\\cos C$$ for the Cosine Rule, use $$\\cos^{2}C = 1-\\sin^{2}C$$ and **pick the negative root** if $$C$$ is obtuse (since cosine is negative for angles between 90° and 180°).\n\nExample: $$\\sin\\theta = \\frac{8}{15}$$, $$\\theta > 90°$$ → $$\\cos\\theta = -\\frac{\\sqrt{161}}{15}$$ (negative root).", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "Why does an obtuse angle have a negative cosine? What is the geometric intuition? (2 steps)", "answer": "- Step 1: On the unit circle, cosine is the $$x$$-coordinate. For angles in the second quadrant ($$90° < \\theta < 180°$$, or $$\\frac{\\pi}{2}<\\theta<\\pi$$), the $$x$$-coordinate is negative — the point is to the left of the $$y$$-axis.\n- Step 2: In the Cosine Rule $$a^{2}=b^{2}+c^{2}-2bc\\cos A$$, when $$\\cos A$$ is negative, the term $$-2bc\\cos A$$ becomes **positive**, making $$a^{2}$$ larger than $$b^{2}+c^{2}$$ — the side opposite the obtuse angle is longer than what a right triangle would predict.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "When substituting $$p=2^{x}$$ into an equation like $$2\\cdot 4^{x}-2^{x+3}=17\\cdot 2^{x-1}-4$$, how do you rewrite each term as a power of $$2^{x}$$? (3 steps)", "answer": "- Step 1: Express everything with base 2: $$4^{x}=(2^{2})^{x}=(2^{x})^{2}=p^{2}$$, so $$2\\cdot 4^{x}=2p^{2}$$.\n- Step 2: $$2^{x+3}=2^{x}\\cdot 2^{3}=8p$$ and $$2^{x-1}=2^{x}\\cdot 2^{-1}=\\frac{p}{2}$$, so $$17\\cdot 2^{x-1}=\\frac{17p}{2}$$.\n- Step 3: Substitute: $$2p^{2}-8p=\\frac{17p}{2}-4$$. Clear the fraction (multiply by 2): $$4p^{2}-16p=17p-8$$, giving $$4p^{2}-33p+8=0$$.\n\nKey laws: $$a^{x+c}=a^{x}\\cdot a^{c}$$; $$a^{cx}=(a^{x})^{c}$$; $$a^{x-c}=\\frac{a^{x}}{a^{c}}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "After solving a substituted equation like $$4p^{2}-33p+8=0$$ to get $$p=8$$ or $$p=\\frac{1}{4}$$, how do you back-substitute $$p=2^{x}$$ to find $$x$$? (2 steps)", "answer": "- Step 1: $$p=8=2^{3}$$, so $$2^{x}=2^{3}$$ → $$x=3$$. $$p=\\frac{1}{4}=2^{-2}$$, so $$2^{x}=2^{-2}$$ → $$x=-2$$.\n- Step 2: Always express the $$p$$-value as a power of the same base. If $$p$$ is not a clean power (e.g. $$p=3$$ with base 2), use logarithms — but in IAL P1, they always design it so $$p$$ is a nice power.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "What is the segment area formula, and how does it relate to the sector area and triangle area? (2 steps)", "answer": "- Step 1: Segment area = $$\\frac{1}{2}r^{2}(\\theta-\\sin\\theta)$$, where $$\\theta$$ is in radians. This is the area between the chord and the arc.\n- Step 2: Intuitively, segment = sector minus triangle. Sector area = $$\\frac{1}{2}r^{2}\\theta$$; triangle area = $$\\frac{1}{2}r^{2}\\sin\\theta$$ (using SAS with two radii and angle $$\\theta$$). Subtracting: $$\\frac{1}{2}r^{2}\\theta - \\frac{1}{2}r^{2}\\sin\\theta = \\frac{1}{2}r^{2}(\\theta-\\sin\\theta)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "In the platform problem with ratio $$DA:AO=3:5$$, how do you set up and use the ratio to find unknown lengths? (2 steps)", "answer": "- Step 1: Let $$DA=3x$$ and $$AO=5x$$, so the inner radius $$DO=DA+AO=8x$$ and the outer radius $$AO=5x$$.\n- Step 2: Use one known measurement to solve for $$x$$. Here, arc $$CD=9$$ m on the inner circle with angle 0.8 rad: $$\\ell=r\\theta$$ gives $$8x\\cdot 0.8=9$$, so $$x=1.40625$$, then $$AO=5x\\approx 7.03$$ m.\n\nRatio trick: assign parts as multiples of $$x$$, then use any concrete measurement to pin down $$x$$.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "When computing the perimeter of a compound shape (platform = outer major arc + inner minor arc + two straight edges), what are the components, and how do you find each? (3 steps)", "answer": "- Step 1: Major arc (outer): angle = $$2\\pi-0.8$$, radius = outer radius. Length = $$r_{\\text{outer}}\\times(2\\pi-0.8)$$.\n- Step 2: Minor arc (inner): this is given or computed from $$\\ell=r_{\\text{inner}}\\theta_{\\text{minor}}$$.\n- Step 3: Two straight edges: each equals the difference between outer and inner radii (or the given straight portion like $$DA=3x$$). Sum all four components.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "What is the \"two-unknowns trap\" in integration problems, and how do you avoid it? (3 steps)", "answer": "- Step 1: If you integrate $$f'(x)$$ containing an unknown $$k$$, you get $$f(x)$$ with **both** $$k$$ and the integration constant $$C$$ — two unknowns, one equation from the given point. You can't solve for both simultaneously.\n- Step 2: Avoid the trap by using any **extra condition** that involves only $$k$$. If $$f''(P)=0$$ is given, differentiate $$f'$$ to get $$f''$$, substitute the point, and solve for $$k$$ alone.\n- Step 3: With $$k$$ known, integrate $$f'$$ to get $$f(x)+C$$, then use the given point $$P$$ on the curve to find $$C$$ — now just one unknown.\n\nExample: $$f'(x)=4x^{3/2}+\\frac{k}{x^{2}}$$, $$f''(2)=0$$ → find $$k=24\\sqrt{2}$$ first, then integrate and find $$C$$.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "When raising an expression like $$16x^{-1/2}$$ to the power 3, what mistake did Phuc make, and what is the correct procedure? (2 steps)", "answer": "- Step 1: Phuc cubed the 16 ($$16^{3}=4096$$) but **forgot to cube** $$x^{-1/2}$$. The correct application of $$\\left(ab\\right)^{n}=a^{n}b^{n}$$ means **every factor** gets the exponent: $$\\left(16x^{-1/2}\\right)^{3}=16^{3}\\cdot\\left(x^{-1/2}\\right)^{3}=4096\\cdot x^{-3/2}$$.\n- Step 2: General rule: $$\\left(a\\cdot x^{n}\\right)^{m}=a^{m}\\cdot x^{nm}$$. The coefficient and the variable part each receive the outer exponent independently. Never apply the exponent to only one factor.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "What does a negative outer exponent like $$\\left(\\frac{A}{B}\\right)^{-n}$$ do, and why? (2 steps)", "answer": "- Step 1: $$\\left(\\frac{A}{B}\\right)^{-n}=\\left(\\frac{B}{A}\\right)^{n}$$ — a negative exponent **flips** the fraction (reciprocates) and makes the exponent positive.\n- Step 2: This comes from $$\\left(\\frac{A}{B}\\right)^{-n}=\\frac{A^{-n}}{B^{-n}}=\\frac{1/A^{n}}{1/B^{n}}=\\frac{B^{n}}{A^{n}}=\\left(\\frac{B}{A}\\right)^{n}$$. Phuc didn't recognise this flip in part (c) of the indices question.\n\nAlso: $$\\frac{1}{x^{-k}}=x^{k}$$ — bringing a negative power up from the denominator flips its sign.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": true}, {"question": "How do you determine the number of real solutions of an equation by interpreting it as the intersection of two graphs? (3 steps)", "answer": "- Step 1: Rearrange the equation into the form $$f(x)=g(x)$$ — one expression on each side.\n- Step 2: Real solutions correspond to **intersection points** of the graphs $$y=f(x)$$ and $$y=g(x)$$. Each intersection gives an $$x$$-value where both functions output the same $$y$$.\n- Step 3: If a sketch of both curves is already given (or was drawn in a previous part marked \"hence\"), count intersections visually — no algebra needed. A double root means the curve **touches** (doesn't cross) the other curve at that point.\n\nExample: cubic $$y=x(x+2)^{2}$$ vs hyperbola $$y=\\frac{1}{x+2}$$ — they cross on each side of the asymptote, giving 2 real solutions.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "What does a double root like $$(x+2)^{2}$$ mean graphically, and how does it affect intersection counting? (2 steps)", "answer": "- Step 1: A double root means the curve **touches** the $$x$$-axis at that point but doesn't cross — the curve approaches from one side, reaches zero, and returns to the same side. It's a tangent point to the axis.\n- Step 2: For intersection counting with another curve, a touch-point usually counts as **one** intersection (one real solution), not two. The curve doesn't cross through, so there's only one meeting point even though the algebraic multiplicity is 2.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": true}, {"question": "When equating two curves to find intersections and one side has a fraction like $$\\frac{15}{2x}+5$$, what algebraic steps are needed? (3 steps)", "answer": "- Step 1: Equate the $$y$$-values: $$\\frac{15}{2x}+5=x^{3}-\\frac{7}{2}x+5$$.\n- Step 2: Cancel any terms appearing on both sides — the $$+5$$ cancels immediately, simplifying to $$\\frac{15}{2x}=x^{3}-\\frac{7}{2}x$$.\n- Step 3: Multiply through by the denominator ($$2x$$, noting $$x\\neq 0$$) to clear the fraction: $$15=2x^{4}-7x^{2}$$, rearrange to $$2x^{4}-7x^{2}-15=0$$.\n\nWatch for immediately-cancelling terms — they simplify the problem significantly.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": true}, {"question": "How do you solve a biquadratic (quartic in $$x^{2}$$) like $$2x^{4}-7x^{2}-15=0$$? (2 steps)", "answer": "- Step 1: Substitute $$u=x^{2}$$ to convert to a quadratic: $$2u^{2}-7u-15=0$$. Solve: $$(2u+3)(u-5)=0$$, so $$u=-\\frac{3}{2}$$ (reject since $$u=x^{2}\\geq 0$$) or $$u=5$$.\n- Step 2: Back-substitute: $$x^{2}=5$$ → $$x=\\pm\\sqrt{5}$$ (two real solutions). The negative $$u$$-root is always rejected because $$x^{2}$$ cannot be negative.\n\nThis substitution technique is the same idea as $$y=x^{2}$$ for quartic intersection problems.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "How do you complete the square for $$f(x)=2x^{2}-12x+14$$, and what does the completed form reveal? (3 steps)", "answer": "- Step 1: Factor out the leading coefficient from the quadratic terms: $$2(x^{2}-6x)+14$$.\n- Step 2: Complete the square inside: $$x^{2}-6x=(x-3)^{2}-9$$. So $$2\\left[(x-3)^{2}-9\\right]+14=2(x-3)^{2}-18+14=2(x-3)^{2}-4$$.\n- Step 3: The completed form $$a(x-h)^{2}+k$$ reveals: minimum at $$(h,k)=(3,-4)$$ since $$a=2>0$$ (parabola opens upward). If $$a<0$$, it would be a maximum.\n\nGeneral formula: $$ax^{2}+bx+c=a\\left(x+\\frac{b}{2a}\\right)^{2}+c-\\frac{b^{2}}{4a}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": true}, {"question": "For a region $$R$$ bounded by 4 boundaries (e.g. $$x$$-axis, $$y$$-axis, a line, and a curve), why do you need exactly 4 inequalities, and how do you determine the sign ($$\\leq$$ vs $$\\geq$$) for each? (3 steps)", "answer": "- Step 1: Each boundary curve/line divides the plane into two half-planes. The region $$R$$ lies in one specific half-plane per boundary, so each boundary contributes one inequality.\n- Step 2: For each boundary, determine which side $$R$$ is on: $$y\\geq 0$$ (above $$x$$-axis), $$x\\geq 0$$ (right of $$y$$-axis), $$y\\leq$$ line (below the line), $$y\\leq$$ curve (below the curve).\n- Step 3: Verify by picking a **sample point inside $$R$$** and checking that it satisfies all four inequalities simultaneously. If any inequality fails, flip its sign.\n\nPhuc's error: getting the wrong sign on the curve inequality. The sample-point check catches this.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "What is Vieta's formulas (sum and product of roots) for a quadratic $$ax^{2}+bx+c=0$$, and how are they used to check root sign conditions? (2 steps)", "answer": "- Step 1: Sum of roots $$= -\\frac{b}{a}$$; Product of roots $$= \\frac{c}{a}$$. These come from comparing $$a(x-r_1)(x-r_2)=ax^{2}-a(r_1+r_2)x+ar_1r_2$$ with $$ax^{2}+bx+c$$.\n- Step 2: For both roots to be **positive**: sum $$> 0$$ AND product $$> 0$$ AND $$\\Delta > 0$$ (distinct). For both **negative**: sum $$< 0$$ AND product $$> 0$$ AND $$\\Delta > 0$$. Product $$< 0$$ means roots have opposite signs.\n\nUsed in the 4-intersection problem: need both $$y$$-roots positive → sum $$=4>0$$ ✓, product $$=A>0$$ required.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "What is the Pythagorean identity, and how is it used to find cosine from sine (or vice versa) when solving triangle problems? (2 steps)", "answer": "- Step 1: $$\\sin^{2}\\theta+\\cos^{2}\\theta=1$$ — always true for any angle $$\\theta$$. Rearrange: $$\\cos^{2}\\theta=1-\\sin^{2}\\theta$$ or $$\\sin^{2}\\theta=1-\\cos^{2}\\theta$$.\n- Step 2: Given $$\\sin\\theta=\\frac{8}{15}$$, compute $$\\cos^{2}\\theta=1-\\frac{64}{225}=\\frac{161}{225}$$, so $$\\cos\\theta=\\pm\\frac{\\sqrt{161}}{15}$$. **Choose the sign based on the angle**: if $$\\theta$$ is obtuse ($$>90°$$), pick **negative**; if acute, pick **positive**.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": true}, {"question": "What does \"hence\" mean in an exam question, and why is it a critical instruction? (2 steps)", "answer": "- Step 1: \"Hence\" means you **must use your previous answer** to proceed — it's not optional. The exam is telling you there's a direct link between parts.\n- Step 2: If part (a) asked you to show $$k^{2}+26k+169=0$$ and part (b) says \"hence find coordinates of $$P$$\", you solve $$(k+13)^{2}=0$$ to get $$k=-13$$, then substitute — you don't start from scratch.\n\nIgnoring \"hence\" and redoing work from the beginning wastes time and may not earn method marks.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": true}, {"question": "What is the difference between \"show that,\" \"find,\" \"state,\" and \"explain\" in exam language? (2 steps)", "answer": "- Step 1: \"Show that\" → your working must lead clearly to the stated answer (they give you the destination; demonstrate the route). \"Find\" → produce the answer yourself (destination unknown). \"State\" → no working needed, just write the answer (implies it's directly obvious). \"Explain\" → words required, not just algebra; give a reason or justification.\n- Step 2: \"Exact value\" → leave in surd/fraction form, no decimals. \"To 3 s.f.\" → decimal rounding required. Mixing these up loses marks.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": true}, {"question": "A triangle has base on the horizontal line $$y=2$$ and a vertex at $$B=(15,7)$$. What is the perpendicular height, and how do you compute the area? (2 steps)", "answer": "- Step 1: Perpendicular height from $$B$$ to the line $$y=2$$ is simply $$|7-2|=5$$ — the vertical distance, since the base is horizontal.\n- Step 2: Area = $$\\frac{1}{2}\\times\\text{base}\\times\\text{perpendicular height}=\\frac{1}{2}\\times AC \\times 5$$. The base $$AC$$ is the horizontal distance between $$A$$ and $$C$$ on $$y=2$$.\n\nFor minimum area, choose the $$C$$ that gives the shortest base $$AC$$.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "What are the common radian-degree conversions you should memorise, and why is checking your calculator mode critical? (2 steps)", "answer": "- Step 1: Memorise: $$30°=\\frac{\\pi}{6}$$, $$45°=\\frac{\\pi}{4}$$, $$60°=\\frac{\\pi}{3}$$, $$90°=\\frac{\\pi}{2}$$, $$180°=\\pi$$, $$360°=2\\pi$$. General conversion: $$\\text{radians}=\\text{degrees}\\times\\frac{\\pi}{180}$$.\n- Step 2: Before any trig calculation, **check degrees vs radians mode** on your calculator. Using degrees when the formula requires radians (or vice versa) gives wrong answers with no obvious warning. Sector formulas ($$r\\theta$$, $$\\frac{1}{2}r^{2}\\theta$$) require $$\\theta$$ in radians.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "What is the period of $$y=A\\sin(Bx+C)$$ in radians, and how does changing $$B$$ affect it? What about $$y=\\cos(nx)$$ in degrees? (2 steps)", "answer": "- Step 1: In radians: period = $$\\frac{2\\pi}{|B|}$$. Larger $$B$$ → shorter period (more oscillations per unit length). In degrees: period = $$\\frac{360°}{|B|}$$.\n- Step 2: For $$y=\\cos\\left(\\frac{x}{n}\\right)$$ in degrees, the period is $$360n$$ (longer period — stretched out). Common trap: confusing $$\\frac{360}{n}$$ (compress) with $$360n$$ (stretch). Inside the function: larger divisor = longer period.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": true}, {"question": "When rationalising a denominator like $$5+10\\sqrt{3}$$, what conjugate do you use, and what does the denominator become? (2 steps)", "answer": "- Step 1: Conjugate of $$5+10\\sqrt{3}$$ is $$5-10\\sqrt{3}$$ (flip the sign of the surd term). Multiply both numerator and denominator by this.\n- Step 2: Denominator: $$(5+10\\sqrt{3})(5-10\\sqrt{3})=25-100\\cdot 3=25-300=-275$$. The surd eliminates because $$\\sqrt{3}^{2}=3$$ (rational), via difference of squares: $$(a+b)(a-b)=a^{2}-b^{2}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}, {"question": "What does \"$$ADC$$ is a straight line\" imply about angles at $$D$$, and how does this help in multi-triangle problems? (2 steps)", "answer": "- Step 1: If $$ADC$$ is a straight line, then angles $$\\angle BDA$$ and $$\\angle BDC$$ are **supplementary**: $$\\angle BDA+\\angle BDC=180°$$ (or $$\\pi$$ radians).\n- Step 2: Supplementary angles have the **same sine** ($$\\sin(180°-\\theta)=\\sin\\theta$$) but **opposite cosine** ($$\\cos(180°-\\theta)=-\\cos\\theta$$). This lets you transfer angle information between the two", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": false}], "count": 56}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "When factorising a quadratic $$ax^2 + bx + c$$ where $$a \\neq 1$$, what is the \"AC method\" trick for splitting the middle term, and why does finding two numbers that multiply to $$ac$$ and add to $$b$$ work? (3 steps)", "answer": "- Step 1: The goal is to split the middle term $$bx$$ into two terms $$px + qx$$ so that we can factor by grouping. We need $$p + q = b$$ and the coefficients of the split terms must share a common factor with $$a$$ and $$c$$ respectively.\n- Step 2: By finding two numbers that multiply to $$ac$$ and add to $$b$$, we guarantee that when we split $$bx$$ into $$px + qx$$, the ratio of the coefficients will be consistent. For example, in $$21x^2 + 10x + 1$$, $$ac = 21$$ and $$b = 10$$. The numbers 7 and 3 multiply to 21 and add to 10.\n+ Sub-case: We split as $$21x^2 + 7x + 3x + 1$$.\n- Step 3: Factor by grouping: $$7x(3x + 1) + 1(3x + 1) = (7x + 1)(3x + 1)$$. This works because the product of the \"outer\" and \"inner\" coefficients ($$7 \\times 3 = 21$$) gives the required $$ac$$ term, while their sum gives the $$b$$ term.\n\nThe AC method transforms a hard-to-factor quadratic into a simple grouping problem.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": true}, {"question": "If you cannot easily factorise a quadratic $$ax^2 + bx + c = 0$$, what fallback formula must you use, and what is the expression for the roots? (2 steps)", "answer": "- Step 1: You must use the quadratic formula, which is a guaranteed method for finding the roots of any quadratic equation. It is NOT provided in the Edexcel formula booklet, so it must be memorised.\n- Step 2: The formula is $$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$, where $$a$$, $$b$$, and $$c$$ are the coefficients from the equation $$ax^2 + bx + c = 0$$.\n\nAlways check the discriminant $$\\Delta = b^2 - 4ac$$ first to know if real roots exist before calculating.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "A line $$y = mx + c$$ is tangent to a curve $$y = f(x)$$. A common mistake is to set $$\\frac{dy}{dx}$$ equal to the entire line equation $$mx + c$$. Conceptually, why is this wrong, and what should $$\\frac{dy}{dx}$$ equal at the tangent point? (2 steps)", "answer": "- Step 1: The derivative $$\\frac{dy}{dx}$$ represents the *gradient* (rate of change) of the curve at a specific point. It is a scalar value representing steepness, not an equation of a line.\n- Step 2: At the point of tangency, the gradient of the curve must equal the gradient of the line. Since the line $$y = mx + c$$ has a constant gradient of $$m$$, we set $$\\frac{dy}{dx} = m$$ (just the number, not the whole line equation). The $$+ c$$ part is the y-intercept, which has nothing to do with the gradient.\n\n$$\\frac{dy}{dx}$$ gives you the slope $$m$$; to find $$c$$, you must substitute the tangent point's coordinates back into $$y = mx + c$$.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "To find the y-intercept $$c$$ of a tangent line $$y = mx + c$$ to a curve, what two pieces of information must you find first, and why can't you find $$c$$ just from knowing the gradient $$m$$? (2 steps)", "answer": "- Step 1: You must find the gradient $$m$$ (by setting $$\\frac{dy}{dx}$$ equal to the given line's gradient to find the x-coordinate, then substituting x into the *curve* equation to find the y-coordinate). This gives you the exact point of tangency $$(x_1, y_1)$$.\n- Step 2: You cannot find $$c$$ from just $$m$$ because infinitely many parallel lines share the same gradient $$m$$ but have different y-intercepts. You need the specific point $$(x_1, y_1)$$ that the line passes through to solve $$y_1 = mx_1 + c$$ for $$c$$.\n\nA line is uniquely defined by a point and a gradient; missing the point means missing the intercept.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "For the inequality $$y < f(x)$$, which region relative to the curve is shaded, and how does this change if the inequality is $$y > f(x)$$? (2 steps)", "answer": "- Step 1: $$y < f(x)$$ means the y-values are smaller than the curve's output, which corresponds to the region strictly **below** the curve $$y = f(x)$$.\n- Step 2: $$y > f(x)$$ means the y-values are larger than the curve's output, which corresponds to the region strictly **above** the curve $$y = f(x)$$.\n\nThink of the curve as a boundary: \"less than\" sinks below it, \"greater than\" floats above it.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "When sketching a region defined by a strict inequality like $$y < f(x)$$ versus a non-strict inequality like $$y \\leq f(x)$$, what is the visual difference in how the boundary curve is drawn, and why? (2 steps)", "answer": "- Step 1: For a strict inequality ($$<$$ or $$>$$), the boundary curve itself is **not** included in the region. Therefore, it is drawn as a **dashed** line/curve.\n- Step 2: For a non-strict inequality ($$\\leq$$ or $$\\geq$$), the points on the boundary curve are included in the region. Therefore, it is drawn as a **solid** line/curve.\n\nThe dashed line visually communicates \"approach but do not touch/include.\"", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "If a region is defined by two simultaneous inequalities (e.g., $$y < f(x)$$ AND $$y > g(x)$$), how do you determine the final shaded solution region? (2 steps)", "answer": "- Step 1: Shade the region for the first inequality (e.g., below $$f(x)$$) and the region for the second inequality (e.g., above $$g(x)$$) separately.\n- Step 2: The solution region for the system is the **intersection (overlap)** of the two shaded areas. Only the area that satisfies *both* conditions simultaneously is the final answer.\n\nThink of \"AND\" as the overlap; if it were \"OR,\" you would take the union of both regions.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Given a minor sector angle $$\\alpha$$, how do you find the major sector angle $$\\theta_{\\text{major}}$$, and what is the conceptual reason based on the shape of a full circle? (2 steps)", "answer": "- Step 1: The major angle is found using the formula $$\\theta_{\\text{major}} = 2\\pi - \\alpha$$.\n- Step 2: Conceptually, a full circle has an angle of $$2\\pi$$ radians. The minor sector takes up the smaller \"slice\" of angle $$\\alpha$$, so the remaining \"large slice\" that wraps around the rest of the circle must be $$2\\pi - \\alpha$$.\n\nMajor always means the larger portion, so you subtract the smaller portion from the whole.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "When using the Cosine Rule $$a^2 = b^2 + c^2 - 2bc \\cos A$$ to find an angle $$A$$, what does a negative result for $$\\cos A$$ immediately tell you about the angle $$A$$, and why? (2 steps)", "answer": "- Step 1: A negative $$\\cos A$$ immediately tells you that angle $$A$$ is **obtuse** (i.e., $$A > 90^{\\circ}$$ or $$A > \\frac{\\pi}{2}$$ radians).\n- Step 2: In the unit circle or cosine graph, the cosine values are positive in the first quadrant ($$0$$ to $$90^{\\circ}$$) and negative in the second quadrant ($$90^{\\circ}$$ to $$180^{\\circ}$$). Since angles in a triangle cannot exceed $$180^{\\circ}$$, a negative cosine strictly implies an obtuse angle.\n\nThis is a powerful sanity check: if your triangle looks acute but $$\\cos A < 0$$, something is wrong.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "When integrating a term with $$x$$ in the denominator, such as $$\\frac{3}{2x^3}$$, what is the essential first step before applying the power rule for integration? (2 steps)", "answer": "- Step 1: You must rewrite the term using a **negative exponent**. The expression $$\\frac{3}{2x^3}$$ becomes $$\\frac{3}{2}x^{-3}$$.\n- Step 2: Only then can you apply the power rule $$\\int x^n \\, dx = \\frac{x^{n+1}}{n+1}$$. Attempting to integrate a fraction directly without converting to a negative power almost always leads to errors like incorrectly changing the denominator.\n\nAlways convert denominators to negative powers first; it makes the algebra obey the standard rules.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Why must you always add \"$$+ C$$\" (the constant of integration) when evaluating an indefinite integral, and what happens conceptually if you forget it? (2 steps)", "answer": "- Step 1: Differentiation eliminates constants (the derivative of $$x^3 + 5$$ and $$x^3 - 2$$ are both $$3x^2$$). Therefore, when integrating (reversing differentiation), there is no way to know what constant was originally there.\n- Step 2: Adding \"$$+ C$$\" represents the entire **family of curves** that share the same derivative. Forgetting it means you are only stating one specific curve (where $$C=0$$), ignoring all vertical translations, which loses marks in an exam.\n\n$$+ C$$ acknowledges the information lost during differentiation.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "Given $$m = 2^n$$, express $$2^{n+3}$$ in terms of $$m$$. What index law allows this simplification? (2 steps)", "answer": "- Step 1: Use the index law for addition of exponents: $$a^{x+y} = a^x \\cdot a^y$$. Applying this, $$2^{n+3} = 2^n \\cdot 2^3$$.\n- Step 2: Since $$2^3 = 8$$ and $$2^n = m$$, substitute these in to get $$8m$$.\n\nSplitting the exponent separates the known variable part ($$m$$) from the pure number part.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Given $$m = 2^n$$, express $$16^{3n}$$ in terms of $$m$$. What base-conversion and power-of-a-power steps are required? (3 steps)", "answer": "- Step 1: Convert the base 16 to a power of 2, since $$m$$ is defined in base 2. Since $$16 = 2^4$$, we have $$16^{3n} = (2^4)^{3n}$$.\n- Step 2: Apply the power-of-a-power rule $$(a^x)^y = a^{xy}$$. This gives $$2^{4 \\times 3n} = 2^{12n}$$.\n- Step 3: Rewrite $$2^{12n}$$ as $$(2^n)^{12}$$ using the reverse of the power-of-a-power rule. Substitute $$m = 2^n$$ to get $$m^{12}$$.\n\nAlways convert to the base of the given substitution variable before applying the outer exponents.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "To rationalise a denominator of the form $$a - \\sqrt{b}$$, what must you multiply both the numerator and denominator by, and why does this eliminate the surd? (2 steps)", "answer": "- Step 1: Multiply both top and bottom by the **conjugate**, which is $$a + \\sqrt{b}$$ (change the sign in the middle).\n- Step 2: The denominator becomes a difference of two squares: $$(a - \\sqrt{b})(a + \\sqrt{b}) = a^2 - (\\sqrt{b})^2 = a^2 - b$$. Since $$a^2 - b$$ is a rational number, the surd is eliminated from the denominator.\n\nMultiplying by the conjugate exploits the algebraic identity $$(x-y)(x+y) = x^2 - y^2$$ to cancel the irrational parts.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "For the graph transformation $$y = f(x + a)$$, the shift is horizontal. Does the graph shift left or right by $$a$$ units, and why is the direction often considered \"counter-intuitive\"? (2 steps)", "answer": "- Step 1: The graph shifts **left** by $$a$$ units.\n- Step 2: It feels counter-intuitive because $$+a$$ usually means \"more\" or \"right\". However, the transformation is applied to the *input* $$x$$. To get the same $$y$$-output as before, you now need an $$x$$-value that is $$a$$ units *smaller* to offset the $$+a$$ inside the function. E.g., for $$f(x+3)$$, the old origin $$x=0$$ now occurs at $$x=-3$$.\n\nInside the function brackets, additions shift opposite to the sign: $$+a$$ shifts left, $$-a$$ shifts right.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "For the transformation $$y = f(-3x)$$, there are two distinct effects on the graph. Name them and explain how they affect the x-coordinates. (3 steps)", "answer": "- Step 1: **Reflection in the y-axis**, caused by the negative sign. This changes the sign of all x-coordinates ($$x \\rightarrow -x$$).\n- Step 2: **Horizontal compression by a scale factor of $$\\frac{1}{3}$$**, caused by the multiplier 3. This divides all x-coordinates by 3 ($$x \\rightarrow \\frac{x}{3}$$).\n- Step 3: Combined, each original x-coordinate $$x_0$$ is replaced by $$\\frac{x_0}{-3}$$. For example, a point at $$(3, 0)$$ moves to $$(-1, 0)$$.\n\nThe rule for $$y = f(ax)$$ is to replace $$x$$ with $$\\frac{x}{a}$$. Here $$a = -3$$, so $$x \\rightarrow -\\frac{x}{3}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "If the original curve $$y = f(x)$$ \"touches\" the x-axis at a point (indicating a repeated root), how is this \"touching\" property affected by the transformation $$y = f(-3x)$$, and why? (2 steps)", "answer": "- Step 1: The \"touching\" property is **preserved**; the new curve will still touch (not cross) the x-axis at the transformed point.\n- Step 2: A \"touch\" indicates a double root where the curve sits on one side of the axis. Reflection flips left and right but doesn't change the side relative to the x-axis locally, and compression squeezes the curve but doesn't flip it over the axis. The root remains a repeated root.\n\nGeometric transformations (shifts, stretches, reflections) preserve the fundamental shape and crossing/touching nature of the curve.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "When a question states that a line and a curve \"meet at a single point\" or are \"tangent to each other,\" what algebraic condition must be satisfied by the discriminant $$\\Delta$$ of the resulting quadratic, and why? (2 steps)", "answer": "- Step 1: The discriminant must equal zero: $$\\Delta = b^2 - 4ac = 0$$.\n- Step 2: Meeting at a \"single point\" means there is exactly one solution for $$x$$. This implies a **repeated root**. The only way a quadratic has a repeated root is if the square root part of the quadratic formula is zero, which means $$\\Delta = 0$$.\n\n$$\\Delta = 0$$ is the algebraic translation of \"touching\" or \"tangent.\"", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "When asked to show that two curves meeting at a single point leads to a specific equation in $$k$$, what is the standard sequence of algebraic steps? (3 steps)", "answer": "- Step 1: Set the equations of the two curves equal to each other ($$y_1 = y_2$$).\n- Step 2: Rearrange all terms to one side to form a quadratic equation in $$x$$ of the form $$ax^2 + bx + c = 0$$ (where coefficients will contain $$k$$).\n- Step 3: Apply the condition for a single intersection ($$\\Delta = 0$$). Calculate $$b^2 - 4ac$$ and set it equal to 0. This yields an equation purely in terms of $$k$$.\n\nEquate $$\\rightarrow$$ Rearrange to quadratic $$\\rightarrow$$ Set $$\\Delta = 0$$.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "In a geometry problem involving a sector attached to a straight line, if three points $$A$$, $$B$$, and $$C$$ are collinear with $$B$$ between $$A$$ and $$C$$, what is the relationship between the angles formed at $$B$$? (2 steps)", "answer": "- Step 1: The angles on a straight line sum to $$\\pi$$ radians (or $$180^{\\circ}$$).\n- Step 2: If one sector angle is $$\\theta_1$$ and the other angle is $$\\theta_2$$, then $$\\theta_1 + \\theta_2 = \\pi$$. You can find an unknown angle by subtracting the known angle from $$\\pi$$.\n\nStraight lines enforce a strict angle budget of $$\\pi$$ radians.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "In a right-angled triangle with hypotenuse $$h$$ and an adjacent angle $$\\theta$$, what are the formulas for the adjacent and opposite sides? (2 steps)", "answer": "- Step 1: The adjacent side is found using the cosine ratio: $$\\text{adjacent} = h \\cos \\theta$$.\n- Step 2: The opposite side is found using the sine ratio: $$\\text{opposite} = h \\sin \\theta$$.\n\nThis is just SOH CAH TOA rearranged. Since $$\\cos \\theta = \\frac{\\text{adj}}{h}$$, multiply by $$h$$ to isolate the adjacent side.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "When defining a region $$R$$ bounded by a curve and a line, how do you determine whether to use $$y \\leq f(x)$$ or $$y \\geq f(x)$$ for a specific boundary? (2 steps)", "answer": "- Step 1: Identify which boundary is the \"ceiling\" (top) and which is the \"floor\" (bottom) of the region.\n- Step 2: If the region is *below* the curve, use $$y \\leq f(x)$$. If the region is *above* the curve, use $$y \\geq f(x)$$. If unsure, pick a sample point clearly inside the region and test whether its y-value is less than or greater than the boundary's output.\n\nAlways think of the region as a sandwich: the bottom boundary gets a $$\\geq$$ sign and the top boundary gets a $$\\leq$$ sign.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "If a point $$A$$ lies on both the curve $$y = f'(x)$$ and the curve $$y = f''(x)$$, what equation can you write to find an unknown constant $$k$$? (2 steps)", "answer": "- Step 1: Being \"on both curves\" means that at the x-coordinate of $$A$$, both functions give the same y-value.\n- Step 2: Therefore, you substitute the x-coordinate of $$A$$ into both expressions and set them equal: $$f'(x_A) = f''(x_A)$$. Solve this resulting linear equation for $$k$$.\n\n\"Point on both curves\" is the exam trigger for substituting and equating the y-values.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "After finding that two curves intersect at point $$A$$ (with $$x = x_A$$) and forming a quadratic equation for the intersections, how do you find the *other* intersection point $$B$$? (2 steps)", "answer": "- Step 1: Since $$x_A$$ is a known root of the quadratic, $$(x - x_A)$$ must be a factor. You can factorise the quadratic, e.g., $$3(x - 5)(x - \\frac{4}{3}) = 0$$.\n- Step 2: The other root gives the x-coordinate of point $$B$$. Substitute this x-value back into either original curve equation to find the corresponding y-coordinate for $$B$$.\n\nIf one root is known, the quadratic is effectively reduced to a linear equation for the other root.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "To find the number of distinct real roots of a quartic equation like $$x^4 - 4x^2 + A = 0$$, what substitution reduces it to a quadratic, and what is the critical constraint on the roots of this new quadratic? (3 steps)", "answer": "- Step 1: Substitute $$y = x^2$$ (since all powers of $$x$$ are even). The equation becomes a quadratic in $$y$$: $$y^2 - 4y + A = 0$$.\n- Step 2: For the original equation to have real roots in $$x$$, the quadratic in $$y$$ must yield positive values (since $$y = x^2 \\geq 0$$).\n- Step 3: Furthermore, for 4 *distinct* real roots in $$x$$, the quadratic in $$y$$ must have **two distinct positive roots** (each positive $$y$$-root gives two $$x$$-roots: $$x = \\pm\\sqrt{y}$$).\n\nThe substitution $$y = x^2$$ bridges the quartic to a quadratic, but the positivity constraint on $$y$$ is the hidden trap.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "For the quadratic in $$y$$ (from the substitution $$y = x^2$$) to yield 4 distinct real x-roots, three conditions must be met. One is $$\\Delta > 0$$. What are the other two conditions, derived from Vieta's formulas, that ensure the y-roots are positive? (3 steps)", "answer": "- Step 1: The product of the roots must be positive. For $$ay^2 + by + c = 0$$, the product is $$\\frac{c}{a}$$. If product > 0, the roots are either both positive or both negative.\n- Step 2: The sum of the roots must be positive. The sum is $$-\\frac{b}{a}$$. If sum > 0 and product > 0, they cannot both be negative, so they must both be positive.\n- Step 3: Therefore, the conditions are: $$\\Delta > 0$$ (two distinct y-roots), $$\\frac{c}{a} > 0$$ (same sign), and $$-\\frac{b}{a} > 0$$ (specifically positive sign).\n\nA common mistake is checking only $$\\Delta > 0$$ and forgetting that two negative y-roots yield zero real x-roots.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "A line passes through the point $$(4, 2)$$ and is parallel to the x-axis. What is the equation of this line, and why doesn't the x-coordinate 4 appear in the equation? (2 steps)", "answer": "- Step 1: The equation is simply $$y = 2$$.\n- Step 2: A line parallel to the x-axis is horizontal, meaning its y-value never changes regardless of the x-value. The point $$(4, 2)$$ merely confirms the line sits at a height of 2. The x-coordinate just tells you one place where the line exists, but doesn't restrict it.\n\nParallel to x-axis $$\\rightarrow$$ constant y. Parallel to y-axis $$\\rightarrow$$ constant x.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "When finding the area of a triangle with a horizontal base, why is it advantageous to use the horizontal side as the \"base\" in $$\\frac{1}{2} \\times \\text{base} \\times \\text{height}$$? (2 steps)", "answer": "- Step 1: If the base is horizontal (e.g., lying on $$y = 2$$), the length of the base is simply the difference of the x-coordinates: $$|x_2 - x_1|$$.\n- Step 2: The perpendicular height is then simply the difference in the y-coordinates between the third vertex and the base line. No trigonometry or complex distance formulas are needed.\n\nAligning the base with a coordinate axis simplifies the height calculation to just reading coordinate differences.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "For the function $$y = A \\sin(x + B)$$, at what general values of the angle $$\\theta = x + B$$ does the function reach its minimum value, and what is that minimum value? (2 steps)", "answer": "- Step 1: The sine function reaches its minimum of -1 at angles $$\\theta = \\frac{3\\pi}{2} + 2n\\pi$$ (where $$n$$ is an integer).\n- Step 2: Therefore, the minimum value of $$y$$ is $$A \\times (-1) = -A$$ (assuming $$A > 0$$). You set $$x + B = \\frac{3\\pi}{2} + 2n\\pi$$ to find the corresponding $$x$$ or $$B$$ values.\n\nDo not confuse the minimum angle ($$\\frac{3\\pi}{2}$$) with the maximum angle ($$\\frac{\\pi}{2}$$ where $$\\sin = 1$$).", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "When given the area of a triangle and two sides (SAS), which formula is the most direct to find the included angle, and why can't you use the Cosine Rule immediately? (2 steps)", "answer": "- Step 1: Use the Area formula: $$\\text{Area} = \\frac{1}{2} a b \\sin C$$.\n- Step 2: The Cosine Rule ($$a^2 = b^2 + c^2 - 2bc \\cos A$$) requires knowing the third side or the angle itself. Since you only have two sides and the area, you can isolate $$\\sin C$$ directly from the area formula to find the angle.\n\nArea $$\\rightarrow \\sin$$. Side $$\\rightarrow$$ Cosine/Sine rule.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}, {"question": "If you find $$\\sin \\theta = \\frac{8}{15}$$ and are told that $$\\theta$$ is obtuse, how do you find $$\\cos \\theta$$, and why is the sign important? (3 steps)", "answer": "- Step 1: Use the Pythagorean identity: $$\\sin^2 \\theta + \\cos^2 \\theta = 1$$. Calculate $$\\cos^2 \\theta = 1 - (\\frac{8}{15})^2 = \\frac{161}{225}$$.\n- Step 2: Find the magnitude: $$\\cos \\theta = \\pm\\frac{\\sqrt{161}}{15}$$.\n- Step 3: Apply the quadrant sign. An obtuse angle lies in the 2nd quadrant, where cosine is **negative**. Therefore, $$\\cos \\theta = -\\frac{\\sqrt{161}}{15}$$.\n\nForgetting the negative sign for obtuse angles is a critical error when substituting into the Cosine Rule.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}, {"question": "When solving an equation with different bases like $$2 \\cdot 4^x - 2^{x+3} = 17 \\cdot 2^{x-1} - 4$$, what is the crucial first step before substituting $$p = 2^x$$? (2 steps)", "answer": "- Step 1: You must express **every term** as a power of the substitution base (in this case, base 2). For example, $$4^x = (2^2)^x = (2^x)^2 = p^2$$.\n- Step 2: Apply index laws to separate constants: $$2^{x+3} = 2^x \\cdot 2^3 = 8p$$, and $$2^{x-1} = 2^x \\cdot 2^{-1} = \\frac{p}{2}$$.\n\nIf bases aren't unified, the substitution $$p = 2^x$$ cannot capture all terms, leaving stray $$x$$'s.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "After substituting $$p = 2^x$$ and solving a quadratic to find $$p$$, what is the final step to find $$x$$, and what common mistake occurs when $$p$$ is a fraction like $$\\frac{1}{4}$$? (2 steps)", "answer": "- Step 1: Set $$2^x = p$$ for each valid root and solve for $$x$$ by expressing $$p$$ as a power of 2.\n- Step 2: The common mistake is not knowing how to handle fractional values. You must convert the fraction to a negative index: e.g., $$2^x = \\frac{1}{4} = 2^{-2} \\Rightarrow x = -2$$.\n\nDon't take $$\\log_2$$ of a fraction manually; convert it to a base-2 power with a negative exponent first.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": true}, {"question": "In a sector problem where lengths are given as a ratio (e.g., $$DA : AO = 3 : 5$$), what is the best algebraic strategy to represent these lengths? (2 steps)", "answer": "- Step 1: Introduce a single variable $$x$$ and write the lengths as multiples of $$x$$. E.g., $$DA = 3x$$ and $$AO = 5x$$.\n- Step 2: Use another given piece of information (like arc length $$= 9$$ m) to form an equation in $$x$$, solve for $$x$$, and then calculate the actual lengths.\n\nRatios imply a shared \"unit\" $$x$$. Finding $$x$$ unlocks all individual lengths simultaneously.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "When calculating the perimeter of a composite shape (like a platform with inner and outer arcs), what is the most common mistake regarding the straight edges? (2 steps)", "answer": "- Step 1: The most common mistake is forgetting to count the straight edges that connect the inner and outer arcs, or only counting one of them.\n- Step 2: You must carefully trace the boundary. For a shape with a major outer arc, a minor inner arc, and a gap between them, the perimeter is: Major Arc + Minor Arc + Straight Edge 1 + Straight Edge 2.\n\nPerimeter is the total distance around the *outside*. Trace it with your finger to ensure no edge is missed.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "When finding the original function $$f(x)$$ from $$f'(x) = 4x^{3/2} + \\frac{k}{x^2}$$, you face a \"two-unknowns trap\" (both $$k$$ and the integration constant $$C$$ are unknown). What strategy avoids this trap? (3 steps)", "answer": "- Step 1: Differentiate $$f'(x)$$ to get $$f''(x)$$. This eliminates the integration constant $$C$$ entirely.\n- Step 2: Use a given condition about $$f''(x)$$ (e.g., $$f''(2) = 0$$) to find $$k$$ first. Now you only have one unknown.\n- Step 3: Integrate $$f'(x)$$ with the known $$k$$ to find $$f(x)$$ in terms of $$C$$. Use the point on the curve $$(x, y)$$ to finally find $$C$$.\n\nNever integrate first if you have two unknowns and a condition on the second derivative; exploit the derivative condition first.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "When cubing an expression like $$b = 16x^{-1/2}$$, what is the most common error, and how do you correctly apply the power to both the coefficient and the variable?
