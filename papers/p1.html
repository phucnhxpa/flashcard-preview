h an inner sector removed\" (like a donut slice), we'd SUBTRACT. Carefully visualising which sector angles describe which regions is critical.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}, {"question": "Explain why, when integrating $$f'(x) = 4x^{3/2} + \\frac{k}{x^2}$$ where $$k$$ is unknown, directly integrating leads to a \"two unknowns\" trap — and how to avoid it. (3 steps)", "answer": "- Step 1: Direct integration gives $$f(x) = \\frac{8}{5}x^{5/2} - \\frac{k}{x} + C$$, containing TWO unknowns ($$k$$ and $$C$$). Using a single known point $$P$$ gives only ONE equation — you can't solve for both.\n- Step 2: Solution: exploit any OTHER condition that pins down $$k$$ without involving $$C$$. Here, we're told $$f''(P) = 0$$.\n- Step 3: Compute $$f''$$ from $$f'$$ by differentiating once more (no integration constant introduced). Apply the condition $$f''(2) = 0$$, which involves only $$k$$, solve for $$k$$, THEN integrate with the known $$k$$ and use $$P$$ to find $$C$$.\n\nStrategy: separate the unknowns by using non-integration-based conditions first.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "For $$f'(x) = 4x^{3/2} + kx^{-2}$$, differentiate to get $$f''(x)$$, and use the condition $$f''(2) = 0$$ to find $$k$$ exactly. (3 steps)", "answer": "- Step 1: Power rule: $$f''(x) = 4 \\cdot \\frac{3}{2}x^{1/2} + k(-2)x^{-3} = 6x^{1/2} - 2kx^{-3}$$.\n- Step 2: Substitute $$x = 2$$: $$f''(2) = 6\\sqrt{2} - \\frac{2k}{8} = 6\\sqrt{2} - \\frac{k}{4}$$.\n- Step 3: Set $$= 0$$: $$6\\sqrt{2} = \\frac{k}{4} \\Rightarrow k = 24\\sqrt{2}$$.\n\nThe exact form $$24\\sqrt{2}$$ is necessary since the question asks for an \"exact\" value — no decimal approximation.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "After finding $$k = 24\\sqrt{2}$$, integrate $$f'(x) = 4x^{3/2} + 24\\sqrt{2}\\,x^{-2}$$ and determine $$C$$ using $$P = (2, 8\\sqrt{2})$$. (3 steps)", "answer": "- Step 1: Integrate term-by-term: $$\\int 4x^{3/2}\\,dx = \\frac{8}{5}x^{5/2}$$; $$\\int 24\\sqrt{2}\\,x^{-2}\\,dx = -\\frac{24\\sqrt{2}}{x}$$. So $$f(x) = \\frac{8}{5}x^{5/2} - \\frac{24\\sqrt{2}}{x} + C$$.\n- Step 2: Substitute $$P$$: $$8\\sqrt{2} = \\frac{8}{5}(2^{5/2}) - \\frac{24\\sqrt{2}}{2} + C$$. Note $$2^{5/2} = 4\\sqrt{2}$$, so $$\\frac{8}{5}(4\\sqrt{2}) = \\frac{32\\sqrt{2}}{5}$$ and $$\\frac{24\\sqrt{2}}{2} = 12\\sqrt{2}$$.\n- Step 3: Solve: $$8\\sqrt{2} = \\frac{32\\sqrt{2}}{5} - 12\\sqrt{2} + C$$, so $$C = 8\\sqrt{2} + 12\\sqrt{2} - \\frac{32\\sqrt{2}}{5} = \\frac{100\\sqrt{2} - 32\\sqrt{2}}{5} = \\frac{68\\sqrt{2}}{5}$$.\n\nFinal: $$f(x) = \\frac{8}{5}x^{5/2} - \\frac{24\\sqrt{2}}{x} + \\frac{68\\sqrt{2}}{5}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "Express $$2^{5/2}$$, $$2^{3/2}$$, and $$2^{1/2}$$ as simple surd values, and explain the pattern.", "answer": "- $$2^{1/2} = \\sqrt{2}$$\n- $$2^{3/2} = 2 \\cdot 2^{1/2} = 2\\sqrt{2}$$\n- $$2^{5/2} = 4 \\cdot 2^{1/2} = 4\\sqrt{2}$$\n\nPattern: $$2^{n/2}$$ for odd $$n$$ = $$2^{(n-1)/2}\\sqrt{2}$$. The integer part is the biggest power of 2 we can pull out; the $$\\sqrt{2}$$ remains.\n\nPractical tip: when simplifying expressions with $$2^{n/2}$$, always factor out $$\\sqrt{2}$$ to get a clean surd form.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "For $$b = \\frac{16}{\\sqrt{x}}$$, compute $$b^3$$ in the form $$kx^n$$. Highlight the common error. (3 steps)", "answer": "- Step 1: Rewrite: $$b = 16x^{-1/2}$$. Both factors are now explicit.\n- Step 2: Cube the ENTIRE expression, applying the exponent to each factor: $$b^3 = (16)^3 \\cdot (x^{-1/2})^3 = 4096 \\cdot x^{-3/2}$$.\n- Step 3: So $$b^3 = 4096x^{-3/2}$$.\n\n**Common error** (Phuc's trap): cubing the $$16$$ but forgetting to cube the $$x^{-1/2}$$, giving the wrong answer $$4096x^{-1/2}$$. The rule $$(AB)^n = A^n B^n$$ means EVERY factor gets the exponent.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "Given $$b = 16x^{-1/2}$$, express $$\\frac{16}{b^3}$$ in the form $$kx^n$$. (3 steps)", "answer": "- Step 1: From prior computation, $$b^3 = 4096x^{-3/2}$$.\n- Step 2: Form $$\\frac{16}{b^3} = \\frac{16}{4096x^{-3/2}} = \\frac{16}{4096} \\cdot \\frac{1}{x^{-3/2}}$$.\n- Step 3: Simplify: $$\\frac{16}{4096} = \\frac{1}{256}$$; $$\\frac{1}{x^{-3/2}} = x^{3/2}$$ (reciprocal of negative power flips sign). So $$\\frac{16}{b^3} = \\frac{1}{256}x^{3/2}$$. Hence $$k = \\frac{1}{256}$$, $$n = \\frac{3}{2}$$.\n\nKey identity: $$\\frac{1}{x^{-n}} = x^n$$ — the \"flip\" rule.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "For $$\\left(\\frac{A}{B}\\right)^{-n}$$, what does the negative exponent do, and why?", "answer": "$$\\left(\\frac{A}{B}\\right)^{-n} = \\left(\\frac{B}{A}\\right)^n$$ — the negative exponent FLIPS the fraction and turns the exponent positive.\n\nReasoning: $$\\left(\\frac{A}{B}\\right)^{-n} = \\frac{1}{\\left(\\frac{A}{B}\\right)^n} = \\frac{1}{\\frac{A^n}{B^n}} = \\frac{B^n}{A^n} = \\left(\\frac{B}{A}\\right)^n$$.\n\nPractical move: whenever you see a fraction raised to a negative power, immediately flip top and bottom and change the sign of the exponent. This simplifies the subsequent exponent manipulation.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "The equation $$(x+2)(x^3 + 4x^2 + 4x) = 1$$ is to be solved. Without expanding, rearrange it to a form whose solutions correspond to the intersection of two familiar curves. (2 steps)", "answer": "- Step 1: Divide both sides by $$(x+2)$$ (valid when $$x \\neq -2$$): $$x^3 + 4x^2 + 4x = \\frac{1}{x+2}$$.\n- Step 2: So real solutions of the original equation correspond to intersections of the cubic $$y = x^3 + 4x^2 + 4x$$ and the hyperbola $$y = \\frac{1}{x+2}$$.\n\nThis rearrangement turns an algebraically messy equation into a visual/graphical problem — ideal when the curves are already sketched in an earlier part of the question.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "The cubic $$y = x(x+2)^2$$ has what key features, and how do you count intersections with $$y = \\frac{1}{x+2}$$? (3 steps)", "answer": "- Step 1: Cubic features: crosses $$x$$-axis at $$x = 0$$ (simple root, goes through); touches $$x$$-axis at $$x = -2$$ (double root, just touches without crossing); as $$x \\to +\\infty$$, $$y \\to +\\infty$$; as $$x \\to -\\infty$$, $$y \\to -\\infty$$.\n- Step 2: Hyperbola $$y = \\frac{1}{x+2}$$ features: vertical asymptote at $$x = -2$$; $$y \\to 0^+$$ as $$x \\to \\infty$$; $$y \\to 0^-$$ as $$x \\to -\\infty$$; positive for $$x > -2$$, negative for $$x < -2$$.\n- Step 3: Sketch both: to the right of $$x = -2$$, cubic grows from 0 (at $$x=-2$$, touching) up through $$(0,0)$$ and up to infinity; hyperbola drops from $$+\\infty$$ at $$x=-2$$ to $$0$$. They cross ONCE. To the left of $$x = -2$$, cubic drops from $$0$$ to $$-\\infty$$; hyperbola goes from $$-\\infty$$ to $$0^-$$. They cross ONCE.\n\nTotal: **2 real solutions**.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "What's the conceptual principle: \"number of real solutions to $$f(x) = g(x)$$\" equals what graphical quantity?", "answer": "It equals the number of **intersection points** of $$y = f(x)$$ and $$y = g(x)$$.\n\nReasoning: a real solution of $$f(x) = g(x)$$ is an $$x$$-value where the two curves share the same $$y$$-value. Each such $$x$$ gives an intersection point $$(x, f(x)) = (x, g(x))$$, so the count is identical.\n\nThis converts algebra (\"how many roots?\") into geometry (\"how many crossings?\"), which is often vastly easier when sketches are already given.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": true}, {"question": "For cosine rule applied to $$\\triangle BCD$$ with $$BD = x$$, $$CD = 1+x$$, $$BC = 5$$, angle $$\\theta$$ at $$C$$, derive $$\\cos\\theta = \\frac{13+x}{5+5x}$$. (4 steps)", "answer": "- Step 1: Apply cosine rule with $$BD$$ opposite angle $$\\theta$$: $$BD^2 = BC^2 + CD^2 - 2(BC)(CD)\\cos\\theta$$, i.e., $$x^2 = 25 + (1+x)^2 - 10(1+x)\\cos\\theta$$.\n- Step 2: Expand $$(1+x)^2 = 1 + 2x + x^2$$: $$x^2 = 25 + 1 + 2x + x^2 - 10(1+x)\\cos\\theta$$.\n- Step 3: Cancel $$x^2$$ from both sides: $$0 = 26 + 2x - 10(1+x)\\cos\\theta$$, so $$10(1+x)\\cos\\theta = 26 + 2x$$.\n- Step 4: Divide: $$\\cos\\theta = \\frac{26 + 2x}{10(1+x)} = \\frac{2(13+x)}{10(1+x)} = \\frac{13+x}{5(1+x)} = \\frac{13+x}{5+5x}$$.\n\nThe $$x^2$$ cancellation is the critical simplification — it reduces the expression to something linear.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": false}, {"question": "When \"$$ADC$$ is a straight line\" is stated, what angle relationship does it create, and what's the consequence for $$\\sin$$ of those angles?", "answer": "Points $$A$$, $$D$$, $$C$$ collinear means $$\\angle BDA$$ and $$\\angle BDC$$ are supplementary: $$\\angle BDA + \\angle BDC = 180°$$ (angles on a straight line).\n\nConsequence: $$\\sin(\\angle BDA) = \\sin(\\angle BDC)$$ because $$\\sin(180° - \\theta) = \\sin\\theta$$. Supplementary angles have identical sines (but opposite cosines: $$\\cos(180° - \\theta) = -\\cos\\theta$$).\n\nThis is very useful in sine-rule calculations spanning both triangles — you can reuse the $$\\sin$$ value directly.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": true}, {"question": "To derive $$2x^4 - 7x^2 - 15 = 0$$ from $$C_1: y = \\frac{15}{2x} + 5$$ and $$C_2: y = x^3 - \\frac{7x}{2} + 5$$, walk through the steps. (4 steps)", "answer": "- Step 1: Equate the two $$y$$ expressions: $$\\frac{15}{2x} + 5 = x^3 - \\frac{7x}{2} + 5$$.\n- Step 2: The $$+5$$ on both sides cancels: $$\\frac{15}{2x} = x^3 - \\frac{7x}{2}$$.\n- Step 3: Multiply through by $$2x$$ (valid since $$x \\neq 0$$): $$15 = 2x \\cdot x^3 - 2x \\cdot \\frac{7x}{2} = 2x^4 - 7x^2$$.\n- Step 4: Rearrange: $$2x^4 - 7x^2 - 15 = 0$$.\n\nStrategy insight: before expanding complicated terms, always check for cancelling pieces (like the $$+5$$) to simplify work.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": false}, {"question": "For $$2x^4 - 7x^2 - 15 = 0$$, use substitution $$u = x^2$$ to find all real $$x$$-values. (4 steps)", "answer": "- Step 1: Substitute: $$2u^2 - 7u - 15 = 0$$.\n- Step 2: Factor: find two numbers multiplying to $$2 \\times (-15) = -30$$ and adding to $$-7$$: those are $$-10$$ and $$3$$. So $$(2u + 3)(u - 5) = 0$$.\n- Step 3: Solve for $$u$$: $$u = -\\frac{3}{2}$$ or $$u = 5$$.\n- Step 4: Back-substitute: $$u = -\\frac{3}{2}$$ gives $$x^2 = -\\frac{3}{2}$$ — REJECT (no real $$x$$). $$u = 5$$ gives $$x^2 = 5 \\Rightarrow x = \\pm\\sqrt{5}$$.\n\nSo $$x = \\sqrt{5}$$ and $$x = -\\sqrt{5}$$ are the real solutions. Quartic → quadratic via $$u = x^2$$ is a standard technique — remember to reject negative $$u$$.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": false}, {"question": "At $$x = \\pm\\sqrt{5}$$, find the corresponding $$y$$-values and hence the distance $$PQ$$ between the two intersection points. (3 steps)", "answer": "- Step 1: Use $$C_1: y = \\frac{15}{2x} + 5$$. At $$x = \\sqrt{5}$$: $$y = \\frac{15}{2\\sqrt{5}} + 5 = \\frac{15}{2\\sqrt{5}} \\cdot \\frac{\\sqrt{5}}{\\sqrt{5}} + 5 = \\frac{15\\sqrt{5}}{10} + 5 = \\frac{3\\sqrt{5}}{2} + 5$$. At $$x = -\\sqrt{5}$$: by symmetry $$y = -\\frac{3\\sqrt{5}}{2} + 5$$.\n- Step 2: Differences: $$\\Delta x = 2\\sqrt{5}$$, $$\\Delta y = 3\\sqrt{5}$$ (the $$+5$$ cancels in the difference).\n- Step 3: Distance: $$PQ = \\sqrt{(2\\sqrt{5})^2 + (3\\sqrt{5})^2} = \\sqrt{20 + 45} = \\sqrt{65}$$.\n\nElegant: the problem has hidden symmetry — $$P$$ and $$Q$$ are mirror images across the $$y$$-axis-ish center.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": false}, {"question": "For $$f(x) = 2x^2 - 12x + 14$$, complete the square to find its vertex. (4 steps)", "answer": "- Step 1: Factor out the leading coefficient from the first two terms: $$2(x^2 - 6x) + 14$$.\n- Step 2: Complete the square inside: $$x^2 - 6x = (x-3)^2 - 9$$.\n- Step 3: Substitute back: $$2((x-3)^2 - 9) + 14 = 2(x-3)^2 - 18 + 14 = 2(x-3)^2 - 4$$.\n- Step 4: So $$f(x) = 2(x-3)^2 - 4$$. The minimum occurs at $$x = 3$$ with $$y = -4$$; vertex is $$(3, -4)$$.\n\nForm $$a(x+b)^2 + c$$: $$a = 2$$, $$b = -3$$, $$c = -4$$. The vertex $$(-b, c) = (3, -4)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": false}, {"question": "To find the equation of the line through $$(-1, 28)$$ and the vertex $$P = (3, -4)$$, walk through the gradient-intercept method. (3 steps)", "answer": "- Step 1: Gradient $$m = \\frac{-4 - 28}{3 - (-1)} = \\frac{-32}{4} = -8$$.\n- Step 2: Use point-slope form with either point, say $$(-1, 28)$$: $$y - 28 = -8(x - (-1)) = -8(x + 1)$$.\n- Step 3: Simplify: $$y = -8x - 8 + 28 = -8x + 20$$.\n\nVerify: at $$x = 3$$, $$y = -24 + 20 = -4$$ ✓. At $$x = -1$$, $$y = 8 + 20 = 28$$ ✓. Both endpoints check.", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": false}, {"question": "For a region $$R$$ bounded by (i) $$x$$-axis, (ii) line $$y = -8x + 20$$, (iii) $$y$$-axis, (iv) curve $$y = 2x^2 - 12x + 14$$, write inequalities. How do you determine each sign?", "answer": "- Above $$x$$-axis: $$y \\geq 0$$\n- Below the line: $$y \\leq -8x + 20$$\n- Right of $$y$$-axis: $$x \\geq 0$$\n- Below the curve (assuming $$R$$ is between line and curve, below): $$y \\leq 2x^2 - 12x + 14$$\n\nTo confirm signs: pick a sample point INSIDE $$R$$ (say, based on the figure) and check each inequality holds. Adjust $$\\leq$$ vs $$\\geq$$ if a sample fails. \"$$n$$ boundaries → $$n$$ inequalities\" is the general rule.", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": true}, {"question": "In $$2x^2 - 12x + 14 = 2(x-3)^2 - 4$$, why does the minimum occur at $$x = 3$$ (and not at $$x = -3$$), and why is the minimum value $$-4$$ (and not $$+4$$)?", "answer": "Looking at $$2(x-3)^2 - 4$$: the squared term $$(x-3)^2$$ is always $$\\geq 0$$, with minimum value $$0$$ achieved exactly when $$x = 3$$ (the value that makes the inside zero).\n\nAt that $$x$$, $$f(3) = 2(0) - 4 = -4$$. The \"$$-3$$\" INSIDE the square gets negated when we solve $$x - 3 = 0$$.\n\nMnemonic: in $$a(x - h)^2 + k$$, the vertex is $$(h, k)$$ — \"$$h$$ is opposite the sign inside.\" And $$k$$ is the minimum (if $$a > 0$$) or maximum (if $$a < 0$$) value.", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": true}, {"question": "State the arc length and sector area formulas, with units and restrictions.", "answer": "- **Arc length**: $$\\ell = r\\theta$$\n- **Sector area**: $$A = \\frac{1}{2}r^2\\theta$$\n- **Segment area** (cap cut by chord): $$A_{\\text{segment}} = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$\n\n**Restriction**: $$\\theta$$ MUST be in **radians**, not degrees. If given degrees, convert first: $$\\theta_{\\text{rad}} = \\theta_{\\text{deg}} \\times \\frac{\\pi}{180}$$.\n\n**Units**: $$r$$ in cm gives $$\\ell$$ in cm and $$A$$ in $$\\text{cm}^2$$. Mixed units are an easy mistake — always cross-check.", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": true}, {"question": "Why is the sector area $$\\frac{1}{2}r^2\\theta$$ and not $$\\pi r^2 \\cdot \\frac{\\theta}{2\\pi}$$? Show these are equivalent. (2 steps)", "answer": "- Step 1: A sector is a fraction of the whole disc. The disc's total area is $$\\pi r^2$$, and the sector's fraction is $$\\frac{\\theta}{2\\pi}$$ (angle over full angle). So sector area $$= \\pi r^2 \\cdot \\frac{\\theta}{2\\pi}$$.\n- Step 2: Simplify: $$\\pi r^2 \\cdot \\frac{\\theta}{2\\pi} = \\frac{\\pi r^2 \\theta}{2\\pi} = \\frac{r^2\\theta}{2} = \\frac{1}{2}r^2\\theta$$.\n\nThey ARE the same — the compact form $$\\frac{1}{2}r^2\\theta$$ just cancels the $$\\pi$$'s. Understanding this derivation makes the formula memorable: it's \"fraction of the circle × full area.\"", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": false}, {"question": "Converting between radians and degrees: what are the key reference values?", "answer": "- $$360° = 2\\pi$$ rad; $$180° = \\pi$$ rad; $$90° = \\frac{\\pi}{2}$$ rad.\n- $$60° = \\frac{\\pi}{3}$$; $$45° = \\frac{\\pi}{4}$$; $$30° = \\frac{\\pi}{6}$$.\n- General conversion: $$\\theta_{\\text{rad}} = \\theta_{\\text{deg}} \\times \\frac{\\pi}{180}$$, and $$\\theta_{\\text{deg}} = \\theta_{\\text{rad}} \\times \\frac{180}{\\pi}$$.\n\nMnemonic: \"$$\\pi$$ = 180°\" — all other conversions follow by scaling. Always check calculator mode when mixing — a common source of silent errors.", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": false}, {"question": "For a tangent line to a curve at a point, why does the tangent's gradient equal $$f'(x)$$ at that point, and what's the formula for the tangent line?", "answer": "By definition, $$f'(a)$$ is the instantaneous rate of change of $$f$$ at $$x = a$$, which geometrically is the gradient of the tangent line there.\n\n**Tangent line formula**: $$y - f(a) = f'(a)(x - a)$$, i.e., point-slope form with slope $$= f'(a)$$ and point $$(a, f(a))$$.\n\n**Normal line** (perpendicular to tangent): $$y - f(a) = -\\frac{1}{f'(a)}(x - a)$$, using $$m_{\\text{normal}} \\cdot m_{\\text{tangent}} = -1$$.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": true}, {"question": "For parallel and perpendicular lines, state the gradient relationships.", "answer": "- **Parallel**: $$m_1 = m_2$$ (same gradient). Two parallel lines never meet.\n- **Perpendicular**: $$m_1 \\cdot m_2 = -1$$, equivalently $$m_2 = -\\frac{1}{m_1}$$ (negative reciprocal).\n- **Special cases**: horizontal and vertical lines are perpendicular; horizontal has slope $$0$$, vertical has undefined slope. The formula $$m_1 m_2 = -1$$ fails here (you can't multiply by undefined), so treat them as a special case.\n\nDerivation of perpendicular: rotate a line by $$90°$$, which sends direction vector $$(1, m)$$ to $$(-m, 1)$$, giving new slope $$-\\frac{1}{m}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_73", "judge_pick": true}, {"question": "The formula for the distance between $$(x_1, y_1)$$ and $$(x_2, y_2)$$ is $$d = \\sqrt{(x_2 - x_1)^2 + (y_2 - y_1)^2}$$. Explain why this is the Pythagorean theorem in disguise.", "answer": "Draw a right triangle with:\n- Horizontal leg: $$|x_2 - x_1|$$ (change in $$x$$)\n- Vertical leg: $$|y_2 - y_1|$$ (change in $$y$$)\n- Hypotenuse: the straight-line distance $$d$$.\n\nPythagoras says $$d^2 = (\\Delta x)^2 + (\\Delta y)^2$$, so $$d = \\sqrt{(\\Delta x)^2 + (\\Delta y)^2}$$. The squaring absorbs the absolute values (since $$(-3)^2 = 3^2$$), so we can just use signed differences.\n\nThe formula generalises to 3D: $$d = \\sqrt{(\\Delta x)^2 + (\\Delta y)^2 + (\\Delta z)^2}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_74", "judge_pick": true}, {"question": "State the power rule for differentiation and for integration, and explain the link.", "answer": "- **Differentiation**: $$\\frac{d}{dx}(x^n) = nx^{n-1}$$ — bring the power down; subtract 1.\n- **Integration**: $$\\int x^n\\,dx = \\frac{x^{n+1}}{n+1} + C$$ (for $$n \\neq -1$$) — add 1 to the power; divide by the new power.\n\nThey're **inverse operations**: integrating the derivative recovers the original (up to constant). If $$f(x) = \\frac{x^{n+1}}{n+1}$$, then $$f'(x) = \\frac{(n+1)x^n}{n+1} = x^n$$ ✓.\n\n**Restriction $$n \\neq -1$$**: $$\\int x^{-1}\\,dx = \\ln|x| + C$$, which is outside the scope of IAL P1.", "source": "Opus 4.7 ①", "_id": "opus_1_75", "judge_pick": true}, {"question": "For the curve $$y = x(4 - x^2)$$ and line $$y = A/x$$, why does substituting one into the other yield a quartic in $$x$$?", "answer": "Equating: $$x(4 - x^2) = \\frac{A}{x}$$. Multiply by $$x$$ (valid for $$x \\neq 0$$): $$x^2(4 - x^2) = A$$, which expands to $$4x^2 - x^4 = A$$, or rearranging: $$x^4 - 4x^2 + A = 0$$.\n\nThe quartic arises because (cubic) $$\\times x$$ = quartic. This structure — powers of $$x$$ appearing in both curves — often produces higher-degree polynomials once cross-multiplied.\n\nSubstitution $$u = x^2$$ then reduces it to a quadratic in $$u$$ (a standard \"biquadratic\" trick when only even powers appear).", "source": "Opus 4.7 ①", "_id": "opus_1_76", "judge_pick": true}, {"question": "For the biquadratic $$u^2 - 4u + A = 0$$ (from $$x^4 - 4x^2 + A = 0$$ via $$u = x^2$$), why does \"2 distinct real $$x$$-values per positive $$u$$\" justify our counting of 4 total $$x$$-solutions?", "answer": "Each value of $$u$$ corresponds to the set of $$x$$ satisfying $$x^2 = u$$:\n- If $$u > 0$$: $$x = \\pm\\sqrt{u}$$ → **2 distinct real $$x$$**.\n- If $$u = 0$$: $$x = 0$$ → **1 real $$x$$** (double, but not distinct).\n- If $$u < 0$$: no real $$x$$.\n\nSo 4 distinct real $$x$$ requires **2 distinct positive $$u$$-roots** of the quadratic. That's why we need (i) discriminant $$> 0$$, (ii) both roots positive (via sum and product > 0).\n\nIf $$u = 0$$ were allowed, it'd give only 1 $$x$$, failing the \"4 distinct\" requirement.", "source": "Opus 4.7 ①", "_id": "opus_1_77", "judge_pick": true}, {"question": "Sum and product of roots (Vieta's formulas) for $$ax^2 + bx + c = 0$$?", "answer": "- **Sum of roots**: $$\\alpha + \\beta = -\\frac{b}{a}$$\n- **Product of roots**: $$\\alpha\\beta = \\frac{c}{a}$$\n\nDerivation: factorise as $$a(x - \\alpha)(x - \\beta) = ax^2 - a(\\alpha + \\beta)x + a\\alpha\\beta$$. Comparing coefficients gives the formulas.\n\n**Utility**: lets you analyse sign constraints on roots *without solving* the equation. Both roots positive requires $$\\alpha + \\beta > 0$$ AND $$\\alpha\\beta > 0$$. Both roots negative: sum $$< 0$$ AND product $$> 0$$. Opposite signs: product $$< 0$$.", "source": "Opus 4.7 ①", "_id": "opus_1_78", "judge_pick": false}, {"question": "Why is the second derivative test $$f''(a) > 0 \\Rightarrow$$ local min, $$f''(a) < 0 \\Rightarrow$$ local max, $$f''(a) = 0$$ inconclusive? Give the geometric intuition.", "answer": "$$f''$$ measures **concavity** (curvature):\n- $$f'' > 0$$: curve bends upward (like $$\\cup$$) → if $$f' = 0$$ here, it's the bottom of the \"cup\" → local min.\n- $$f'' < 0$$: curve bends downward (like $$\\cap$$) → if $$f' = 0$$ here, it's the top of the \"hill\" → local max.\n- $$f'' = 0$$: no curvature info → the point could be a min, max, or inflection (e.g., $$y = x^4$$ at $$x = 0$$ is a min with $$f'' = 0$$).\n\nWhen $$f'' = 0$$, fall back on checking the sign of $$f'$$ either side of the stationary point (first-derivative test).", "source": "Opus 4.7 ①", "_id": "opus_1_79", "judge_pick": true}, {"question": "For $$y = A\\sin(Bx + C)$$, what are the period, amplitude, and phase shift?", "answer": "- **Amplitude**: $$|A|$$ (the max distance from the mean line; range is $$[-|A|, |A|]$$).\n- **Period**: $$\\frac{2\\pi}{|B|}$$ (radians) or $$\\frac{360°}{|B|}$$ (degrees). The graph repeats every period.\n- **Phase shift** (horizontal shift): solve $$Bx + C = 0$$ to get $$x = -\\frac{C}{B}$$ — the graph is shifted left by $$\\frac{C}{B}$$ (if $$B, C$$ same sign).\n\nNote: $$B$$ inside $$\\sin$$ compresses horizontally by factor $$\\frac{1}{|B|}$$, doubling the frequency if $$B = 2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_80", "judge_pick": true}, {"question": "For $$y = \\cos(nx)°$$, what is the period? What about $$y = \\cos(x/n)°$$?", "answer": "- $$y = \\cos(nx)°$$ has period $$\\frac{360°}{n}$$ (faster oscillation for larger $$n$$).\n- $$y = \\cos(x/n)°$$ has period $$360n°$$ (slower oscillation for larger $$n$$).\n\nThe reason: the period is the change in $$x$$ that makes the *argument* change by a full period ($$360°$$). If argument is $$nx$$, then $$nx$$ changing by $$360$$ means $$x$$ changes by $$\\frac{360}{n}$$. If argument is $$x/n$$, then $$x/n$$ changing by $$360$$ means $$x$$ changes by $$360n$$.\n\nEasy confusion: $$\\frac{360}{n}$$ vs $$360n$$. The rule: multiplying $$x$$ → divide period; dividing $$x$$ → multiply period.", "source": "Opus 4.7 ①", "_id": "opus_1_81", "judge_pick": false}, {"question": "What does \"exact value\" mean in an A-level context, and what forms are acceptable?", "answer": "\"Exact\" means **NO DECIMAL APPROXIMATIONS**. Acceptable forms include:\n- Integers: $$5$$, $$-7$$\n- Fractions: $$\\frac{3}{7}$$, $$\\frac{-1}{2}$$\n- Surds: $$\\sqrt{5}$$, $$3 + 2\\sqrt{3}$$\n- Expressions with $$\\pi$$: $$\\frac{\\pi}{3}$$, $$2\\pi$$\n- Logarithms: $$\\ln 2$$, $$e^3$$\n- Combinations: $$\\frac{\\sqrt{161}}{15}$$, $$\\frac{68\\sqrt{2}}{5}$$\n\n**Not acceptable**: $$3.14$$, $$1.414$$, $$0.693$$ (these are approximations).\n\nCalculating devices may produce decimals, but you MUST convert back to exact symbolic form for the answer.", "source": "Opus 4.7 ①", "_id": "opus_1_82", "judge_pick": false}, {"question": "What is the purpose and use of the word \"hence\" in A-level exam questions?", "answer": "\"Hence\" signals that your answer to the current part MUST use the result from a previous part — it's a structural hint that work should build on earlier work, not restart from scratch.\n\nExample: if part (a) derives $$k^2 + 26k + 169 = 0$$, and part (b) says \"hence find $$k$$,\" you're expected to factorise this exact expression.\n\n**Implication**: if you find yourself re-deriving part (a) in part (b), you're missing the \"hence\" link. The examiner wants efficiency and recognition of structure.", "source": "Opus 4.7 ①", "_id": "opus_1_83", "judge_pick": false}, {"question": "For a problem \"show that [expression],\" what are the expectations for working?", "answer": "- **Working must clearly lead to the stated result** — no shortcuts, and the final line should match the target expression verbatim.\n- Each algebraic step should be justifiable; skipping crucial manipulations risks mark loss.\n- You **cannot just state** the answer — the method IS the answer.\n\nContrast with \"find\" or \"state\": those care primarily about the correct answer. \"Show that\" cares about the PATH. Examiners grade the chain of reasoning.\n\nStrategy: start from the given expressions and manipulate FORWARDS toward the target. Don't start at the target.", "source": "Opus 4.7 ①", "_id": "opus_1_84", "judge_pick": false}, {"question": "When are you safe to \"divide by $$x$$\" in an equation, and when must you be cautious? (2 steps)", "answer": "- Step 1: Dividing by $$x$$ is valid ONLY when $$x \\neq 0$$. If $$x = 0$$ is a possible solution, dividing loses it.\n- Step 2: If solving an equation where $$x = 0$$ might be a solution, instead **factor** $$x$$ out: $$x^3 - 2x = 0 \\Rightarrow x(x^2 - 2) = 0 \\Rightarrow x = 0$$ or $$x^2 = 2$$.\n\nException: when working with $$C_1: y = \\frac{1}{x}$$ type equations, the domain already excludes $$x = 0$$, so dividing is safe.\n\n**Rule**: always check whether dividing loses a solution BEFORE doing it.", "source": "Opus 4.7 ①", "_id": "opus_1_85", "judge_pick": true}, {"question": "A shaded region $$R$$ is bounded by 4 curves/lines. Systematically derive the 4 inequalities. (3 steps)", "answer": "- Step 1: Identify each of the 4 boundaries and their equations (e.g., $$x$$-axis: $$y = 0$$; $$y$$-axis: $$x = 0$$; line: $$y = 5x + 75$$; curve: $$y = 2x^2 + x - 21$$).\n- Step 2: For each boundary, determine on which side $$R$$ lies using the sketch or by picking a sample point.\n- Step 3: Write the inequality with correct direction: e.g., \"$$R$$ is above the $$x$$-axis\" → $$y \\geq 0$$; \"$$R$$ is below the line\" → $$y \\leq 5x + 75$$.\n\nGolden rule: **$$n$$ boundaries = $$n$$ inequalities**. Missing one means $$R$$ extends infinitely in some direction (incorrect).", "source": "Opus 4.7 ①", "_id": "opus_1_86", "judge_pick": false}, {"question": "Why might an integer answer like \"$$A < 4$$\" be incomplete, and how does checking boundary values fix it?", "answer": "Phuc got $$A < 4$$ from the discriminant condition alone — but this allows $$A = -10$$ (for instance), where the product of $$u$$-roots is $$-10 < 0$$, meaning one root is negative. That negative $$u$$ doesn't give real $$x$$, so the curves only intersect in 2 points (not 4).\n\n**Fix**: when the problem requires specific sign constraints on roots (e.g., \"4 distinct real $$x$$\"), check each algebraically:\n- Discriminant (number of roots): $$16 - 4A > 0 \\Rightarrow A < 4$$.\n- Sign of roots (via Vieta): sum $$= 4 > 0$$ ✓, product $$= A > 0 \\Rightarrow A > 0$$.\n\nCombine: $$0 < A < 4$$. Missing the lower bound was Phuc's trap.", "source": "Opus 4.7 ①", "_id": "opus_1_87", "judge_pick": true}, {"question": "Derive the identity $$\\sin^2\\theta + \\cos^2\\theta = 1$$ from a right triangle.", "answer": "Consider a right triangle with hypotenuse $$1$$. The other two sides are:\n- Opposite angle $$\\theta$$: length $$\\sin\\theta$$ (by definition of $$\\sin = \\text{opp}/\\text{hyp}$$)\n- Adjacent to $$\\theta$$: length $$\\cos\\theta$$\n\nBy Pythagoras: $$\\sin^2\\theta + \\cos^2\\theta = 1^2 = 1$$.\n\nThis holds for all $$\\theta$$, even outside $$[0, \\pi/2]$$, because on the unit circle, $$(\\cos\\theta, \\sin\\theta)$$ always satisfies $$x^2 + y^2 = 1$$.\n\nThe identity is THE most important trig fact — it lets you compute $$\\cos$$ from $$\\sin$$ (or vice versa), up to a sign determined by the quadrant.", "source": "Opus 4.7 ①", "_id": "opus_1_88", "judge_pick": true}, {"question": "In complete the square form $$a(x + b)^2 + c$$ (with $$a > 0$$), where is the minimum, and what is the minimum value?", "answer": "- **Minimum $$x$$-value**: $$x = -b$$ (the value that makes the inside zero).\n- **Minimum $$y$$-value**: $$c$$ (the constant outside).\n\nReasoning: $$(x + b)^2 \\geq 0$$ always, with equality iff $$x = -b$$. So $$a(x+b)^2 \\geq 0$$, and $$a(x+b)^2 + c \\geq c$$, with minimum $$c$$ achieved at $$x = -b$$.\n\nIf $$a < 0$$: same formula gives the MAXIMUM, not minimum (since $$a(x+b)^2 \\leq 0$$ now).", "source": "Opus 4.7 ①", "_id": "opus_1_89", "judge_pick": false}, {"question": "How does the formula $$a(x + b)^2 + c$$ link to the vertex form $$(h, k)$$, and why is there often a sign confusion?", "answer": "The vertex form is $$a(x - h)^2 + k$$, where the vertex is $$(h, k)$$. Comparing: $$(x + b)^2 = (x - (-b))^2$$, so $$h = -b$$.\n\n**The sign flip**: if you see $$(x + 3)^2$$, the $$x$$-coordinate of the vertex is $$-3$$ (not $$+3$$). If you see $$(x - 3)^2$$, the vertex $$x$$ is $$+3$$.\n\nMnemonic: \"What value of $$x$$ makes the inside zero?\" That's the vertex $$x$$. For $$(x+3)^2$$, it's $$x = -3$$.", "source": "Opus 4.7 ①", "_id": "opus_1_90", "judge_pick": true}, {"question": "The gradient of a line $$y = mx + c$$ is $$m$$, a **number**, not the expression $$mx + c$$. Explain the conceptual distinction and why this matters for tangent problems.", "answer": "The expression $$mx + c$$ IS the entire line — it tells you $$y$$ as a function of $$x$$. The **gradient** is a single numerical property of the line: how steeply it rises per unit $$x$$. That's $$m$$ — a constant, since a line has the same slope everywhere.\n\nIn tangent problems: you want the CURVE's slope (which varies with $$x$$) to equal the LINE's slope (a constant). So set $$\\frac{dy}{dx}|_{\\text{curve}} = m$$, NOT $$\\frac{dy}{dx}|_{\\text{curve}} = mx + c$$.\n\nAnalogy: the weight of a brick is a number (e.g., 5 kg), not the description of a brick.", "source": "Opus 4.7 ①", "_id": "opus_1_91", "judge_pick": true}, {"question": "For a composite shape with a **right-angled triangle**, how do trig ratios ($$\\sin$$, $$\\cos$$) let you compute missing sides? (Example: $$BD = 6$$, $$\\angle DBC = 1.3$$ rad, $$\\angle BCD = \\pi/2$$)", "answer": "In a right-angled triangle with hypotenuse $$h$$ and angle $$\\theta$$ (at a non-right vertex):\n- **Adjacent side** (to angle $$\\theta$$): $$h\\cos\\theta$$\n- **Opposite side** (to angle $$\\theta$$): $$h\\sin\\theta$$\n\nExample ($$BD = 6$$ as hypotenuse, $$\\angle DBC = 1.3$$ at vertex $$B$$):\n- $$BC$$ is adjacent to $$\\angle DBC$$: $$BC = 6\\cos(1.3)$$\n- $$CD$$ is opposite $$\\angle DBC$$: $$CD = 6\\sin(1.3)$$\n\nUse these values in area formulas or to derive subsequent sides.", "source": "Opus 4.7 ①", "_id": "opus_1_92", "judge_pick": false}, {"question": "Why is \"angles in a triangle sum to $$\\pi$$ radians\" equivalent to \"angles in a triangle sum to $$180°$$\"?", "answer": "Because $$\\pi$$ rad = $$180°$$ by definition of the radian. The statement is the same fact in different units.\n\nPractical: when working in radians, use $$\\pi$$; when in degrees, use $$180$$. Mixing units is a frequent error source. Always check calculator mode — \"rad\" for radians, \"deg\" for degrees.\n\nExample: in $$\\triangle ABC$$ with $$\\angle A = \\pi/3$$ and $$\\angle B = \\pi/4$$, $$\\angle C = \\pi - \\pi/3 - \\pi/4 = \\pi \\cdot (1 - 1/3 - 1/4) = \\pi \\cdot 5/12$$.", "source": "Opus 4.7 ①", "_id": "opus_1_93", "judge_pick": true}, {"question": "For the SAS area formula $$\\frac{1}{2}ab\\sin C$$, the angle $$C$$ must be **between** the sides $$a$$ and $$b$$. What goes wrong if you use an angle not between them?", "answer": "The formula $$\\frac{1}{2}ab\\sin C$$ comes from: base $$a$$, perpendicular height $$= b\\sin C$$ (where $$C$$ is the angle that \"lifts\" side $$b$$ off the base $$a$$).\n\nIf $$C$$ is **not** between $$a$$ and $$b$$, then $$b\\sin C$$ is **not** the perpendicular height from the opposite vertex. You'd compute a wrong number (usually a larger value, since the sine of a non-included angle is different).\n\nVisual check: sketch the triangle. Ask: \"Is the angle at the shared vertex of these two sides?\" If yes, SAS applies. If not, you may need to use the sine rule to find the correct angle first.", "source": "Opus 4.7 ①", "_id": "opus_1_94", "judge_pick": true}, {"question": "Describe the angles-on-a-straight-line fact, and give a practical example of using it.", "answer": "Angles on a straight line (at a point where several rays emerge from the line) sum to $$\\pi$$ rad or $$180°$$.\n\n**Example**: if rays from point $$B$$ cross the straight line $$ABC$$ into three sectors with angles $$\\angle ABE$$, $$\\angle EBD = 1.3$$, and $$\\angle DBC = \\pi/2$$, then:\n$$\\angle ABE + 1.3 + \\frac{\\pi}{2} = \\pi \\Rightarrow \\angle ABE = \\pi - 1.3 - \\frac{\\pi}{2} = \\frac{\\pi}{2} - 1.3$$\n\nUse: finding an unknown angle to plug into a subsequent area or length calculation.", "source": "Opus 4.7 ①", "_id": "opus_1_95", "judge_pick": false}, {"question": "Common base conversions for index problems: write $$4$$, $$8$$, $$16$$, $$32$$, $$64$$, $$\\frac{1}{4}$$, $$\\frac{1}{8}$$ as powers of 2; $$9$$, $$27$$, $$81$$, $$\\frac{1}{9}$$ as powers of 3.", "answer": "Powers of 2: $$4 = 2^2$$, $$8 = 2^3$$, $$16 = 2^4$$, $$32 = 2^5$$, $$64 = 2^6$$, $$\\frac{1}{4} = 2^{-2}$$, $$\\frac{1}{8} = 2^{-3}$$.\n\nPowers of 3: $$9 = 3^2$$, $$27 = 3^3$$, $$81 = 3^4$$, $$\\frac{1}{9} = 3^{-2}$$.\n\nAlso useful: $$16 = 2^4 = 4^2$$, $$64 = 2^6 = 4^3 = 8^2$$, so problems with base $$4$$ or $$8$$ can often be reduced to base $$2$$.\n\nQuick recall of these is essential for substitution-style index problems.", "source": "Opus 4.7 ①", "_id": "opus_1_96", "judge_pick": true}, {"question": "Outline the 4-step general strategy for $$p = a^x$$ substitution problems.", "answer": "- Step 1: Rewrite every term in the equation as powers of $$a^x$$, using laws like $$a^{x+c} = a^x \\cdot a^c$$ and $$a^{2x} = (a^x)^2$$.\n- Step 2: Substitute $$p = a^x$$ and clear fractions to get a polynomial in $$p$$ (usually quadratic).\n- Step 3: Solve the polynomial for $$p$$.\n- Step 4: Back-substitute each positive $$p$$-value: $$a^x = p \\Rightarrow x = \\log_a p$$. **Reject any non-positive $$p$$** since $$a^x > 0$$ always.\n\nThis technique reduces transcendental exponential equations to algebraic ones.", "source": "Opus 4.7 ①", "_id": "opus_1_97", "judge_pick": true}, {"question": "In the \"discriminant\" method, why does setting $$\\Delta = 0$$ correspond geometrically to the line being *tangent* to the curve?", "answer": "Tangent = line touches the curve at exactly one point (no crossing). Setting line $$=$$ curve gives a quadratic in $$x$$; \"exactly one solution\" means the quadratic has a repeated root, which is $$\\Delta = 0$$.\n\nVisual: imagine a line approaching a parabola from outside. At first they don't intersect ($$\\Delta < 0$$). As the line moves closer, they touch ($$\\Delta = 0$$, tangent). As the line moves through, they intersect in two places ($$\\Delta > 0$$).\n\nThe discriminant is the \"intersection counter\" that distinguishes these three regimes.", "source": "Opus 4.7 ①", "_id": "opus_1_98", "judge_pick": true}, {"question": "Why does $$f(-x)$$ produce a reflection in the $$y$$-axis?", "answer": "Consider a point $$(a, b)$$ on $$y = f(x)$$, so $$b = f(a)$$.\n\nAfter the transformation, the new function is $$g(x) = f(-x)$$. At what new $$x$$-value does $$g$$ equal $$b$$? We need $$f(-x) = b = f(a) \\Rightarrow -x = a \\Rightarrow x = -a$$.\n\nSo the new point is $$(-a, b)$$ — same $$y$$, but $$x$$-coordinate is negated. Every point $$(a, b)$$ on the original becomes $$(-a, b)$$ on the new, which is the definition of reflection in the $$y$$-axis.\n\nAnalogous: $$-f(x)$$ negates the $$y$$-coordinate (reflection in the $$x$$-axis).", "source": "Opus 4.7 ①", "_id": "opus_1_99", "judge_pick": true}, {"question": "When a region $$R$$ has boundaries including curves and lines, what's the difference between using $$<$$/$$>$$ (strict) vs $$\\leq$$/$$\\geq$$ (non-strict)?", "answer": "- **$$<$$/$$>$$ (strict)**: the boundary is NOT part of $$R$$. Graphically, boundary drawn dashed. Useful when the problem explicitly excludes the boundary.\n- **$$\\leq$$/$$\\geq$$ (non-strict)**: the boundary IS part of $$R$$. Graphically, solid. Typically used when the problem says \"including the boundary\" or silently assumes closure.\n\nIn most IAL region problems, non-strict is the default (solid boundaries). Check the question's wording carefully — \"bounded by $$X$$\" usually includes $$X$$; \"between $$X$$ and $$Y$$ (exclusive)\" would be strict.", "source": "Opus 4.7 ①", "_id": "opus_1_100", "judge_pick": true}, {"question": "\"Region $$R$$ has 4 boundaries: $$x$$-axis, $$y$$-axis, line $$l$$, curve $$C$$.\" What's the general expectation for the inequalities?", "answer": "4 boundaries → 4 inequalities. For each boundary, determine which side $$R$$ lies on:\n- $$x$$-axis ($$y = 0$$): above ($$y \\geq 0$$) or below ($$y \\leq 0$$)?\n- $$y$$-axis ($$x = 0$$): right ($$x \\geq 0$$) or left ($$x \\leq 0$$)?\n- Line $$l$$: above/below, via comparing to $$y = \\text{line expression}$$.\n- Curve $$C$$: above/below, via $$y \\geq / \\leq \\text{curve expression}$$.\n\nAlways verify with a sample point inside $$R$$. Never fewer than 4 inequalities, never more.", "source": "Opus 4.7 ①", "_id": "opus_1_101", "judge_pick": true}, {"question": "For the perpendicular foot / horizontal-base triangle area strategy: why is $$\\text{Area} = \\frac{1}{2} \\times \\text{base} \\times \\text{height}$$ the easiest when the base is horizontal or vertical?", "answer": "When the base lies along a horizontal line (e.g., $$y = 2$$), the perpendicular height from the opposite vertex is simply the **vertical distance** between that vertex and the line — i.e., $$|y_{\\text{vertex}} - 2|$$.\n\nNo need to use SAS or compute $$\\sin$$. You just read off the $$y$$-coordinate difference.\n\nSimilarly, for a vertical base ($$x = \\text{const}$$), the height is the horizontal distance $$|x_{\\text{vertex}} - \\text{const}|$$.\n\nThis makes triangle-area problems with horizontal/vertical bases much easier — always look for them first.", "source": "Opus 4.7 ①", "_id": "opus_1_102", "judge_pick": false}, {"question": "Phuc repeatedly forgot the sine/cosine rule across 4 separate papers. What's a drill strategy to fix this long-term, rather than just relearning each time?", "answer": "Since the sine and cosine rules are NOT in the formula booklet, treat them as atomic facts:\n- Write them at the top of every revision session (as warm-up).\n- Drill them: for any triangle given 3 sides / 2 sides + 1 angle, practice identifying which rule applies.\n- Connect to the \"trigger\" pattern:\n+ Angle-side pair? → **Sine rule**.\n+ Two sides + included angle, or three sides? → **Cosine rule**.\n\n**Most important**: active recall via mini-problems DAILY until formulas come automatically. Passive rereading doesn't work for formula recall.", "source": "Opus 4.7 ①", "_id": "opus_1_103", "judge_pick": false}, {"question": "If you forget the SAS area formula mid-exam, how can you reconstruct it from the SOHCAHTOA definitions?", "answer": "- Step 1: Let $$a$$ and $$b$$ be two sides enclosing angle $$C$$. Drop a perpendicular from the vertex opposite to $$C$$ onto side $$a$$.\n- Step 2: The length of this perpendicular is $$b\\sin C$$ (from right-triangle definition: $$\\sin C = \\frac{\\text{opp}}{b}$$, so opp $$= b\\sin C$$).\n- Step 3: Area of triangle $$= \\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2} \\times a \\times b\\sin C = \\frac{1}{2}ab\\sin C$$.\n\nSo the formula IS $$\\frac{1}{2} \\times \\text{base} \\times \\text{height}$$ with $$b\\sin C$$ as the perpendicular height.", "source": "Opus 4.7 ①", "_id": "opus_1_104", "judge_pick": true}, {"question": "Why does the cosine rule reduce to Pythagoras when the angle is $$90°$$?", "answer": "Cosine rule: $$a^2 = b^2 + c^2 - 2bc\\cos A$$. At $$A = 90°$$, $$\\cos A = 0$$, so the last term vanishes: $$a^2 = b^2 + c^2$$ — Pythagoras!\n\nThis is the definitional anchor of the cosine rule: it's a generalised Pythagoras that accounts for non-right angles. The $$-2bc\\cos A$$ term is a \"correction\" for how the angle differs from $$90°$$:\n- $$A < 90°$$ (acute): $$\\cos A > 0$$, correction subtracts, $$a$$ shorter than Pythagoras.\n- $$A > 90°$$ (obtuse): $$\\cos A < 0$$, correction adds, $$a$$ longer than Pythagoras.", "source": "Opus 4.7 ①", "_id": "opus_1_105", "judge_pick": true}, {"question": "In the cosine rule, why must the angle $$A$$ be the one opposite side $$a$$, and what happens if you pair them wrongly?", "answer": "The formula $$a^2 = b^2 + c^2 - 2bc\\cos A$$ works ONLY when $$A$$ is opposite $$a$$ and $$b, c$$ are the two sides enclosing $$A$$. Pairing wrongly gives the wrong result.\n\nMnemonic: \"the angle and its opposite side form a pair; the other two sides enclose the angle.\" If you use the angle at vertex $$B$$ but put $$a$$ on the left, you're asking \"what's the side opposite $$A$$?\" but using the wrong angle.\n\nSafety check: label the triangle carefully. Letter each side as lowercase = opposite vertex's uppercase.", "source": "Opus 4.7 ①", "_id": "opus_1_106", "judge_pick": true}, {"question": "In the context of Phuc's paper weakness analysis, what's the highest-priority topic, and why?", "answer": "**Sine rule / Cosine rule** — forgotten in all 4 papers (Mar 9 Q8, Apr 5 Q5, Apr 6 Q2, Apr 11 Q5).\n\nWhy top priority:\n- Appears in EVERY paper (guaranteed topic).\n- NOT in the formula booklet (must be memorised).\n- Core of many composite problems (sector + triangle, quadrilateral decompositions, etc.).\n- One formula → one question → potentially 5+ marks.\n\nDrill daily until automatic: both formulas, both forms (angle version of cosine rule), plus area $$\\frac{1}{2}ab\\sin C$$.", "source": "Opus 4.7 ①", "_id": "opus_1_107", "judge_pick": false}, {"question": "In inequalities on a region $$R$$, Phuc's typical error was writing $$y \\leq 2x^2 + x - 21$$ instead of $$y \\geq$$. What's the diagnostic 2-step check that catches this?", "answer": "- Step 1: Pick a point CLEARLY inside $$R$$ (not on a boundary). If the figure shows $$R$$ above the parabola, pick $$(0, 10)$$ or similar.\n- Step 2: Plug into the inequality: $$y \\geq 2x^2 + x - 21$$ becomes $$10 \\geq 0 + 0 - 21 = -21$$ → TRUE. Now test with the wrong version: $$y \\leq$$ would give $$10 \\leq -21$$ → FALSE.\n\nIf the sample fails, the sign is wrong. This test is instant and fool-proof.", "source": "Opus 4.7 ①", "_id": "opus_1_108", "judge_pick": false}, {"question": "Conceptually, why does \"line parallel to $$y$$-axis\" mean the equation is $$x = \\text{constant}$$, not $$y = \\text{constant}$$?", "answer": "A line parallel to the $$y$$-axis is vertical. On a vertical line, every point has the same $$x$$-coordinate (like $$x = 4$$ for the line through $$(4, 2)$$, $$(4, 7)$$, $$(4, -1)$$, etc.). The $$y$$-values vary freely.\n\nContrast: a line parallel to the $$x$$-axis is horizontal — every point has the same $$y$$. The equation is $$y = \\text{constant}$$.\n\n**Memory aid**: \"parallel to axis $$X$$\" means the line points in the direction of axis $$X$$ and has a constant value in the OTHER coordinate.", "source": "Opus 4.7 ①", "_id": "opus_1_109", "judge_pick": true}, {"question": "Critical thinking — combining topics: A line tangent to a parabola; find the constant of integration using a point; identify a region between the line, the parabola, and the $$x$$-axis. Describe the sequence of concepts you'd invoke.", "answer": "- Step 1: **Tangent condition** → set derivative of parabola = slope of line, solve for point of tangency.\n- Step 2: Use the point of tangency to find the line's constant ($$c$$) via substitution.\n- Step 3: **Intersection points** of line and parabola: the tangent condition gives ONE intersection; if the line were not tangent (but a chord), we'd solve the full quadratic for two roots.\n- Step 4: **Region definition** via inequalities: identify each boundary (line, parabola, $$x$$-axis), determine sides via sample points.\n- Step 5: Chain differentiation, substitution, quadratic solving, inequality interpretation.\n\nConceptually spanning: discriminants, tangency, regions, and inequalities — all topics in the P1 syllabus woven together.", "source": "Opus 4.7 ①", "_id": "opus_1_110", "judge_pick": true}, {"question": "What's wrong with solving $$21x^2 + 10x + 1 = 0$$ by trying to factor as $$(3x + 1)^2$$?", "answer": "- $$(3x + 1)^2 = 9x^2 + 6x + 1$$ — the leading coefficient is $$9$$, not $$21$$. So this doesn't match.\n- Attempting to factor quadratics with leading coefficient $$\\neq 1$$ requires the \"$$ac$$-method\" or quadratic formula, not guessing a perfect square.\n\nThe correct factorisation $$(7x + 1)(3x + 1) = 21x^2 + 10x + 1$$ uses the product $$21$$ with two factors $$7$$ and $$3$$ (both distinct). A perfect square like $$(ax + b)^2$$ would give a discriminant of $$0$$, not $$100 - 84 = 16$$ as here.", "source": "Opus 4.7 ①", "_id": "opus_1_111", "judge_pick": false}, {"question": "When integrating a polynomial with a constant $$C$$ and a parameter $$k$$ (two unknowns), why does using only ONE point fail?", "answer": "Each unknown needs an equation to solve. One point gives ONE equation (the point satisfies the function). If you have 2 unknowns ($$C$$ and $$k$$), you need at least 2 equations — i.e., 2 conditions.\n\nIf you only have 1 point given but 2 unknowns, you'll end up with a relation like \"$$C + k = 5$$,\" which doesn't pin down either.\n\n**Solution** (Phuc's insight): look for an ADDITIONAL condition that's independent of $$C$$. Since $$C$$ is an integration constant, conditions involving the DERIVATIVE (e.g., $$f''(a) = 0$$) don't involve $$C$$ and can pin down $$k$$ alone. Then use the point to find $$C$$.", "source": "Opus 4.7 ①", "_id": "opus_1_112", "judge_pick": true}, {"question": "A quartic equation $$ax^4 + bx^2 + c = 0$$ (biquadratic — only even powers) always reduces to a quadratic via what substitution?", "answer": "Substitute $$u = x^2$$, giving $$au^2 + bu + c = 0$$.\n\nWhy it works: every $$x^4$$ is $$(x^2)^2 = u^2$$, and every $$x^2$$ is just $$u$$. No odd powers of $$x$$ exist in a biquadratic, so they all convert cleanly.\n\n**After solving for $$u$$**: each $$u$$-root gives 0, 1, or 2 real $$x$$-values:\n- $$u > 0$$: $$x = \\pm\\sqrt{u}$$ (2 values)\n- $$u = 0$$: $$x = 0$$ (1 value)\n- $$u < 0$$: no real $$x$$ (reject)\n\nMaximum 4 distinct real $$x$$-values, from 2 positive $$u$$-roots.", "source": "Opus 4.7 ①", "_id": "opus_1_113", "judge_pick": false}, {"question": "For a composite region with $$n$$ boundary curves/lines, one inequality might be $$y \\leq x^2 + ...$$ and another $$y \\leq 5x + ...$$ Why is it possible to have two \"below\" inequalities simultaneously?", "answer": "Because the two boundaries (a curve and a line) can both be ABOVE the region. The region is \"below the curve\" AND \"below the line\" — these don't contradict; they both describe the same region from different perspectives.\n\nExample: imagine a region bounded above by a line $$y = 5x + 75$$ AND by a parabola $$y = 2x^2 + x - 21$$. For an $$x$$ where the line is lower than the parabola, \"$$y \\leq \\text{line}$$\" is the tighter constraint. For an $$x$$ where the parabola is lower, \"$$y \\leq \\text{parabola}$$\" is tighter.\n\nThe region is the intersection — bounded by whichever is lower at each $$x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_114", "judge_pick": true}, {"question": "The formula $$(A \\cdot B)^n = A^n \\cdot B^n$$ — what's the common mistake when applying it to $$(16x^{-1/2})^3$$?", "answer": "**Mistake**: cubing only the $$16$$ (getting $$16^3 x^{-1/2}$$) or only the $$x^{-1/2}$$ (getting $$16 x^{-3/2}$$). Both are wrong.\n\n**Correct**: apply the cube to BOTH factors: $$(16x^{-1/2})^3 = 16^3 \\cdot (x^{-1/2})^3 = 4096 x^{-3/2}$$.\n\nRule: when a product is raised to a power, **every factor** gets the power. It's easy to forget the $$x$$ piece because it looks \"small\" or because the exponent is fractional.\n\nMantra: \"applies to ALL factors, no exceptions.\"", "source": "Opus 4.7 ①", "_id": "opus_1_115", "judge_pick": true}, {"question": "For the problem of Phuc mixing up \"$$a f(x)$$ stretches vertically\" vs \"$$f(ax)$$ compresses horizontally\" — why the different language (stretch vs compress) for the same factor $$a$$?", "answer": "The two transformations have different mathematical roles:\n- **Outside** $$f$$: $$y = af(x)$$ multiplies the output. Points $$(x, y)$$ become $$(x, ay)$$. If $$a > 1$$: stretch vertically (taller). If $$0 < a < 1$$: compress vertically.\n- **Inside** $$f$$: $$y = f(ax)$$ changes the input scale. Points $$(x, y)$$ become $$(x/a, y)$$. If $$a > 1$$: compress horizontally (narrower). If $$0 < a < 1$$: stretch horizontally.\n\nNote the **inversion**: the factor has the \"opposite\" effect when inside vs outside. This is why the same factor $$a > 1$$ stretches (outside) but compresses (inside).", "source": "Opus 4.7 ①", "_id": "opus_1_116", "judge_pick": true}, {"question": "For a transformation $$y = f(-3x)$$, why is the point $$(0, 2)$$ unchanged?", "answer": "Under $$f(-3x)$$, each $$x$$-coordinate maps to $$x/(-3) = -x/3$$. So a point $$(a, b)$$ maps to $$(-a/3, b)$$.\n\nFor $$(0, 2)$$: $$(-0/3, 2) = (0, 2)$$. The origin $$x$$-coordinate is a **fixed point** of the transformation — it stays put.\n\nGeneral fact: the point $$(0, f(0))$$ is fixed under any horizontal scaling/reflection $$f(ax)$$ (as long as $$a \\neq 0$$), because horizontal transformations all fix the $$y$$-axis.", "source": "Opus 4.7 ①", "_id": "opus_1_117", "judge_pick": true}, {"question": "When a question states \"curve $$y = f(x)$$ touches the $$x$$-axis at $$(3, 0)$$,\" what's the algebraic implication?", "answer": "Touching (not crossing) means $$(x - 3)^2$$ is a factor of $$f(x)$$ — the root at $$x = 3$$ has **multiplicity $$\\geq 2$$** (even multiplicity in general).\n\nGeometric: the curve approaches the axis, kisses it at $$x = 3$$, and retreats without crossing. This is characteristic of double roots — the curve has a horizontal tangent at that point AND touches the axis.\n\nIn transformations: touching is preserved. A double root remains double after horizontal/vertical transformations (unless we cube or take roots, which can change multiplicity).", "source": "Opus 4.7 ①", "_id": "opus_1_118", "judge_pick": true}, {"question": "For integration in a chain — integrate $$f'$$ to get $$f$$, then use a point to find $$C$$ — why MUST you use the given point in $$f$$, not in $$f'$$?", "answer": "The given point $$P$$ satisfies $$y = f(x)$$ (not $$f'(x)$$). The value $$f(P_x)$$ at the $$x$$-coordinate of $$P$$ is the $$y$$-coordinate of $$P$$.\n\nIf we have $$f'$$, we don't know $$y_P$$ directly from $$f'$$ — we know the SLOPE at that point. So $$P_y = f(P_x)$$, which determines $$C$$ after integration.\n\nUsing $$P$$ in $$f'$$ would give us $$f'(P_x) = P_y$$, which conflates position with slope — not generally true.\n\n**Critical**: keep track of which function you're using. The integrated $$f$$ uses $$P_y = f(P_x)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_119", "judge_pick": true}, {"question": "A question says \"hence\" and gives a curve sketch. What's your strategic response?", "answer": "- Step 1: Re-read the prior part that produced or invoked the sketch. The \"hence\" means you MUST use that sketch/result.\n- Step 2: Typically, \"hence\" signals a counting/reading question (e.g., number of real roots from intersection points) or a plug-in (use derived formula to find $$k$$).\n- Step 3: DON'T restart with algebra. Look at the sketch. Count intersections, read off values, interpret slopes.\n\n**Time savings**: \"hence\" questions often take 30 seconds if you trust the sketch vs 5 minutes if you re-derive. Examiners reward pattern recognition.", "source": "Opus 4.7 ①", "_id": "opus_1_120", "judge_pick": true}, {"question": "For a cubic $$y = x(x+2)^2$$ meeting a hyperbola $$y = \\frac{1}{x+2}$$, why is the count of real solutions \"2\" and not \"3\" or \"4\"?", "answer": "The hyperbola has a vertical asymptote at $$x = -2$$, splitting its domain into two pieces: $$x < -2$$ (where $$y < 0$$) and $$x > -2$$ (where $$y > 0$$).\n\n**Right of $$-2$$**: cubic starts at $$(−2, 0)$$ (touching), rises through $$(0,0)$$, goes to $$+\\infty$$. Hyperbola drops from $$+\\infty$$ at $$x = -2^+$$ to $$0$$ at $$+\\infty$$. They cross exactly ONCE (hyperbola starts above cubic, cubic overtakes).\n\n**Left of $$-2$$**: cubic goes from $$0$$ (at $$x=-2$$) down to $$-\\infty$$. Hyperbola drops from $$0^-$$ at $$-\\infty$$ to $$-\\infty$$ at $$x = -2^-$$. They cross exactly ONCE.\n\nTotal: **2 intersections**. The double root at $$x = -2$$ doesn't give an intersection because the hyperbola has an asymptote exactly there.", "source": "Opus 4.7 ①", "_id": "opus_1_121", "judge_pick": true}, {"question": "Why is $$\\int x^{-1}\\,dx$$ special, and what's it equal to (even though it's not in IAL P1 syllabus)?", "answer": "The power rule $$\\int x^n\\,dx = \\frac{x^{n+1}}{n+1} + C$$ would give $$\\int x^{-1}\\,dx = \\frac{x^0}{0}$$, which is undefined — division by zero.\n\nThe correct answer is $$\\int x^{-1}\\,dx = \\ln|x| + C$$, but this requires logarithms (beyond IAL P1).\n\n**IAL P1 relevance**: you'll never be asked to integrate $$x^{-1}$$. However, you SHOULD recognise why: the power rule explicitly excludes $$n = -1$$. Be extra careful that after rewriting fractions as negative powers, no $$x^{-1}$$ sneaks in (e.g., $$\\frac{1}{x}$$ literally).", "source": "Opus 4.7 ①", "_id": "opus_1_122", "judge_pick": false}, {"question": "The two intersection points for the \"minimum area\" problem are $$C = (5, 2)$$ and $$C = (25, 2)$$ with $$A = (4, 2)$$, $$B = (15, 7)$$. Why is the MINIMUM area case $$C = (5, 2)$$ rather than the one closer to $$B$$'s projected foot?", "answer": "The perpendicular foot from $$B = (15, 7)$$ to the line $$y = 2$$ is $$(15, 2)$$. Distance from $$A$$ to this foot is $$|15 - 4| = 11$$.\n\nBoth candidate $$C$$'s are on opposite sides of this foot (at $$x = 5$$ and $$x = 25$$, each $$10$$ away from foot). But the base $$|AC|$$ differs:\n- $$C = (5, 2)$$: $$|AC| = |5 - 4| = 1$$ (SAME side of $$A$$ as the foot).\n- $$C = (25, 2)$$: $$|AC| = |25 - 4| = 21$$ (OPPOSITE side of $$A$$ from the foot).\n\nArea $$= \\frac{1}{2} \\cdot |AC| \\cdot 5$$. Smaller $$|AC|$$ → smaller area. So $$C = (5, 2)$$ gives minimum area $$= 2.5$$.", "source": "Opus 4.7 ①", "_id": "opus_1_123", "judge_pick": true}, {"question": "When you're asked for the \"smallest positive $$B$$\" in $$y = 12\\sin(x + B)$$, why is the answer $$\\frac{5\\pi}{4}$$ and not $$\\frac{3\\pi}{2}$$?", "answer": "We need $$\\frac{\\pi}{4} + B = \\frac{3\\pi}{2} + 2n\\pi$$ (for the minimum at $$x = \\pi/4$$). Solving: $$B = \\frac{5\\pi}{4} + 2n\\pi$$.\n\nFor $$B > 0$$:\n- $$n = 0$$: $$B = \\frac{5\\pi}{4}$$ (positive, valid).\n- $$n = -1$$: $$B = \\frac{5\\pi}{4} - 2\\pi = -\\frac{3\\pi}{4}$$ (negative, rejected).\n\nThe \"smallest positive\" means we pick the $$B$$ value that's positive and minimal. That's $$\\frac{5\\pi}{4}$$, not $$\\frac{3\\pi}{2}$$.\n\n**Common confusion**: $$\\frac{3\\pi}{2}$$ is the argument value where $$\\sin = -1$$, NOT the $$B$$ value. Don't confuse the two.", "source": "Opus 4.7 ①", "_id": "opus_1_124", "judge_pick": true}, {"question": "State the sine rule, including both its standard and reciprocal forms, and explain when each is most useful.", "answer": "**Standard**: $$\\frac{a}{\\sin A} = \\frac{b}{\\sin B} = \\frac{c}{\\sin C}$$\n\n**Reciprocal**: $$\\frac{\\sin A}{a} = \\frac{\\sin B}{b} = \\frac{\\sin C}{c}$$\n\n**When to use which**:\n- If solving for a SIDE: use standard. E.g., $$a = \\frac{\\sin A}{\\sin B} \\cdot b$$.\n- If solving for an ANGLE: use reciprocal. E.g., $$\\sin A = \\frac{\\sin B}{b} \\cdot a$$, then $$A = \\sin^{-1}(\\ldots)$$.\n\n**Trigger**: you need an angle-opposite-side pair already known (e.g., $$B$$ and $$b$$), and are finding a partner for another pair.", "source": "Opus 4.7 ①", "_id": "opus_1_125", "judge_pick": true}, {"question": "For $$y = f(x + 3)$$, a point \"touches\" the $$x$$-axis at $$(3, 0)$$. Where does it touch after the transformation, and why does \"touching\" still hold?", "answer": "Horizontal shift left by 3: point $$(3, 0)$$ → $$(0, 0)$$. So after the transformation, the graph touches the $$x$$-axis at the origin.\n\n**Why touching is preserved**: near the original point, the curve behaves like $$c(x - 3)^2$$ (local quadratic approximation for touching). After shifting, the local behaviour is $$c((x + 3) - 3)^2 = cx^2$$ — still a parabola-like touch, centred at $$x = 0$$.\n\nTranslations don't change the type of contact (double root stays double).", "source": "Opus 4.7 ①", "_id": "opus_1_126", "judge_pick": false}, {"question": "Conceptual synthesis — for Q8(c) (range of $$A$$ for 4 distinct intersections), link discriminant thinking to Vieta's to geometric intuition. (4 steps)", "answer": "- Step 1: Geometric: cubic-ish curve and rectangular hyperbola meet 4 times when the hyperbola is \"big enough\" to cross both arcs of the cubic.\n- Step 2: Algebraic (biquadratic): 4 distinct real $$x$$ requires 2 distinct positive $$u = x^2$$ roots.\n- Step 3: Analytic conditions:\n+ **Discriminant** ($$\\Delta > 0$$): $$16 - 4A > 0 \\Rightarrow A < 4$$ — \"two distinct $$u$$-roots exist.\"\n+ **Vieta product** ($$u_1 u_2 > 0$$): $$A > 0$$ — \"both roots positive.\"\n+ **Vieta sum** ($$u_1 + u_2 > 0$$): $$4 > 0$$ ✓ — \"automatically satisfied.\"\n- Step 4: Combine: $$0 < A < 4$$. This range reflects the \"Goldilocks\" zone — $$A$$ not too small (no intersections) and not too large (curves separate).\n\nSynthesis: discriminant controls number of $$u$$-roots; Vieta controls their signs; together they control $$x$$-root structure.", "source": "Opus 4.7 ①", "_id": "opus_1_127", "judge_pick": true}, {"question": "A triangle has sides $$p$$, $$q$$, $$r$$ with $$r$$ being the longest. How can you tell from $$p^2 + q^2$$ vs $$r^2$$ whether it's acute, right, or obtuse? (3 cases)", "answer": "- $$p^2 + q^2 > r^2$$: **acute** (all angles $$< 90°$$). From cosine rule: $$\\cos C = \\frac{p^2 + q^2 - r^2}{2pq} > 0$$, so $$C < 90°$$, and since $$r$$ is the longest, $$C$$ is the largest angle — all others are even smaller.\n- $$p^2 + q^2 = r^2$$: **right-angled** (at the angle opposite $$r$$). Classic Pythagoras.\n- $$p^2 + q^2 < r^2$$: **obtuse** (at the angle opposite $$r$$). $$\\cos C < 0$$.\n\n**Quick test**: compare $$p^2 + q^2$$ with $$r^2$$ (where $$r$$ is the longest side). For sides $$4, 6, 9$$: $$16 + 36 = 52 < 81$$ → obtuse. Matches Phuc's problem.", "source": "Opus 4.7 ①", "_id": "opus_1_128", "judge_pick": true}, {"question": "In the stationary-point-of-$$f''$$ problem, what does \"$$f''(P) = 0$$\" tell us geometrically about the curve $$f$$?", "answer": "$$f''(x)$$ measures concavity. When $$f'' = 0$$, the concavity changes sign (potentially) — this is a **point of inflection** on $$f$$ (provided $$f''$$ changes sign through it).\n\nSo saying \"$$f''(P) = 0$$\" is saying \"$$P$$ might be an inflection point of $$f$$.\"\n\n**Note**: a stationary point of $$f''$$ itself is slightly different — it's where $$f'''$$ (the derivative of $$f''$$) vanishes. But in this problem, Phuc's interpretation ($$f''(P) = 0$$ at $$P$$) matches the actual question: we're told $$P$$ is where $$f''$$ equals zero, and we use that to find $$k$$.", "source": "Opus 4.7 ①", "_id": "opus_1_129", "judge_pick": true}, {"question": "A fast substitution mistake: $$\\frac{15}{2x} + 5 = x^3 - \\frac{7x}{2} + 5$$ — a student expands by multiplying through by $$2x$$ and gets $$15 + 10x = 2x^4 - 7x^2 + 10x$$. What's the error? (2 steps)", "answer": "- Step 1: The $$+5$$ terms cancel on both sides BEFORE multiplying: $$\\frac{15}{2x} = x^3 - \\frac{7x}{2}$$. If they don't, the student must multiply EVERY term by $$2x$$, not just the fractions.\n- Step 2: If the student forgets to cancel and multiplies all by $$2x$$: LHS $$= 15 + 10x$$, RHS $$= 2x^4 - 7x^2 + 10x$$. Setting equal: $$15 + 10x = 2x^4 - 7x^2 + 10x$$, which correctly simplifies to $$15 = 2x^4 - 7x^2$$ (the $$10x$$ cancels).\n\n**Lesson**: either method works IF executed carefully. But cancelling the $$+5$$'s FIRST is simpler and safer.", "source": "Opus 4.7 ①", "_id": "opus_1_130", "judge_pick": true}, {"question": "For $$\\tan\\theta = \\frac{\\sin\\theta}{\\cos\\theta}$$, what happens when $$\\cos\\theta = 0$$?", "answer": "$$\\tan\\theta$$ is **undefined** when $$\\cos\\theta = 0$$ (division by zero).\n\nThis happens at $$\\theta = \\frac{\\pi}{2} + n\\pi$$ (i.e., $$90°, 270°, \\ldots$$) where $$\\cos = 0$$ but $$\\sin = \\pm 1$$.\n\nGeometrically, these are the vertical lines on the unit circle — tan measures \"rise over run,\" and at $$90°$$ the run is 0 and the rise is 1, so slope is \"infinite\" (undefined).\n\n**Graphically**: $$\\tan$$ has vertical asymptotes at those values.", "source": "Opus 4.7 ①", "_id": "opus_1_131", "judge_pick": true}, {"question": "Why is the major sector's angle $$\\theta_{\\text{major}} = 2\\pi - \\theta_{\\text{minor}}$$ rather than $$\\pi - \\theta_{\\text{minor}}$$?", "answer": "A full disc has angle $$2\\pi$$ (a complete revolution). The disc is divided by two radii into two sectors: minor and major. Together they sum to the whole disc, so:\n$$\\theta_{\\text{major}} + \\theta_{\\text{minor}} = 2\\pi$$, giving $$\\theta_{\\text{major}} = 2\\pi - \\theta_{\\text{minor}}$$.\n\nThe alternative $$\\pi - \\theta_{\\text{minor}}$$ would correspond to a HEMISPHERE (semi-disc), not a full disc. That's a different geometric situation.\n\nMemory tip: \"major + minor = full revolution = $$2\\pi$$.\"", "source": "Opus 4.7 ①", "_id": "opus_1_132", "judge_pick": false}, {"question": "Explain the \"obtuse angle → negative cosine\" rule and how to verify with the sign of the cosine rule result.", "answer": "On the unit circle, obtuse angles ($$90° < \\theta < 180°$$) lie in the second quadrant, where the $$x$$-coordinate (which equals $$\\cos\\theta$$) is NEGATIVE.\n\n**Verification using cosine rule**: if $$\\cos A = \\frac{b^2 + c^2 - a^2}{2bc}$$ gives a negative value, then $$A > 90°$$ (obtuse). If positive, $$A < 90°$$ (acute). If zero, $$A = 90°$$ (right).\n\n**Example**: sides 4, 6, 9. $$\\cos A = \\frac{16 + 36 - 81}{48} = \\frac{-29}{48} < 0 \\Rightarrow A$$ obtuse.\n\nThis is a built-in sign check — you don't need a separate inequality check.", "source": "Opus 4.7 ①", "_id": "opus_1_133", "judge_pick": true}, {"question": "The expression $$\\sqrt{161}$$ doesn't simplify further — how do you know?", "answer": "$$\\sqrt{n}$$ simplifies iff $$n$$ has a perfect-square factor greater than 1. Prime factorisation: $$161 = 7 \\times 23$$. Both primes, neither squared. So no perfect square factor → $$\\sqrt{161}$$ is in simplest form.\n\n**Contrast**: $$\\sqrt{180} = \\sqrt{36 \\cdot 5} = 6\\sqrt{5}$$ simplifies because $$180 = 36 \\cdot 5$$ has a perfect-square factor.\n\n**Rule of thumb**: check divisibility by squares of small primes: $$4, 9, 25, 49, \\ldots$$ If none divide $$n$$, $$\\sqrt{n}$$ is simplest.", "source": "Opus 4.7 ①", "_id": "opus_1_134", "judge_pick": true}, {"question": "The tangent-line formula $$y - f(a) = f'(a)(x - a)$$ — what's the intuition for each piece?", "answer": "- $$(x - a)$$: the horizontal distance from the point of tangency.\n- $$f'(a)$$: the slope at that point.\n- $$f'(a)(x - a)$$: the vertical rise due to that slope over distance $$(x - a)$$.\n- $$y - f(a)$$: the rise from the tangent point's height.\n\nSo the formula says \"the rise ($$y - f(a)$$) equals slope times horizontal distance\" — which is just the definition of a line with known slope through a known point (point-slope form).\n\n**Generalisation**: for a line through $$(x_1, y_1)$$ with slope $$m$$, use $$y - y_1 = m(x - x_1)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_135", "judge_pick": true}, {"question": "Why is the normal's slope $$-\\frac{1}{f'(a)}$$?", "answer": "The normal is perpendicular to the tangent. Perpendicular lines have slopes that multiply to $$-1$$ (assuming neither is horizontal/vertical).\n\nSo $$m_{\\text{normal}} \\cdot f'(a) = -1 \\Rightarrow m_{\\text{normal}} = -\\frac{1}{f'(a)}$$.\n\n**Special cases**:\n- If $$f'(a) = 0$$ (horizontal tangent), the normal is vertical: $$x = a$$.\n- If the tangent is vertical (derivative undefined, e.g., cusp), the normal is horizontal: $$y = f(a)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_136", "judge_pick": true}, {"question": "Why does the distance formula use $$(x_2 - x_1)^2 + (y_2 - y_1)^2$$ and not $$|x_2 - x_1| + |y_2 - y_1|$$?", "answer": "The latter is **Manhattan distance** (sum of absolute differences), measuring the path along grid lines — not the straight-line (Euclidean) distance.\n\nThe straight-line distance is the HYPOTENUSE of the right triangle with horizontal leg $$|x_2 - x_1|$$ and vertical leg $$|y_2 - y_1|$$. Pythagoras gives:\n$$d^2 = (x_2 - x_1)^2 + (y_2 - y_1)^2 \\Rightarrow d = \\sqrt{\\ldots}$$\n\nManhattan distance would be correct only in a grid-restricted movement context, which isn't what \"distance between two points\" means in standard geometry.", "source": "Opus 4.7 ①", "_id": "opus_1_137", "judge_pick": true}, {"question": "In working from a completed-the-square form $$a(x+b)^2 + c$$ back to expanded form $$Ax^2 + Bx + C$$, what relationships hold between $$a, b, c$$ and $$A, B, C$$?", "answer": "Expanding $$a(x + b)^2 + c = a(x^2 + 2bx + b^2) + c = ax^2 + 2abx + (ab^2 + c)$$.\n\nComparing to $$Ax^2 + Bx + C$$:\n- $$A = a$$ (leading coefficient matches).\n- $$B = 2ab$$, so $$b = \\frac{B}{2a} = \\frac{B}{2A}$$.\n- $$C = ab^2 + c$$, so $$c = C - ab^2 = C - \\frac{B^2}{4A}$$.\n\nSo completing the square: $$Ax^2 + Bx + C = A\\left(x + \\frac{B}{2A}\\right)^2 + C - \\frac{B^2}{4A}$$.\n\nThe $$-\\frac{B^2}{4A}$$ term IS the discriminant-related adjustment — note $$B^2 - 4AC = -4A \\cdot (C - \\frac{B^2}{4A}) = -4A \\cdot c$$.", "source": "Opus 4.7 ①", "_id": "opus_1_138", "judge_pick": true}, {"question": "Critical thinking — suppose a cubic curve intersects a line at 1 point (tangent) and a rectangular hyperbola at 2 points. Could it be tangent to the line AND hyperbola at the same point? What discriminant conditions apply?", "answer": "Yes, conceivably. Being tangent to the line means the cubic's slope matches the line's slope at the intersection, AND the intersection is a double root of (cubic - line = 0).\n\nBeing tangent to the hyperbola at the same point means the same slope match with the hyperbola AND double root of (cubic - hyperbola = 0).\n\n**Conditions**: at the point $$P = (a, b)$$:\n- $$f(a) = \\text{line}(a) = \\text{hyperbola}(a) = b$$\n- $$f'(a) = \\text{slope of line}$$\n- $$f'(a) = \\text{slope of hyperbola at } a$$\n\nSo slopes of line and hyperbola must match at $$P$$. This is a \"triple coincidence\" condition — possible but uncommon. Demonstrates how tangent conditions stack.", "source": "Opus 4.7 ①", "_id": "opus_1_139", "judge_pick": true}, {"question": "Why does multiplying an inequality by a negative number flip the inequality sign, but multiplying by a positive doesn't?", "answer": "Inequalities describe ordering on the number line. Multiplying by a positive preserves order: if $$a < b$$, then $$3a < 3b$$.\n\nMultiplying by a negative REVERSES order: if $$a < b$$, then $$-3a > -3b$$. Example: $$2 < 5$$, but $$-2 > -5$$.\n\nGeometric intuition: multiplication by a negative reflects the number line through 0. Whatever was to the left is now to the right.\n\n**Application**: when manipulating inequalities in region problems, be careful — if you divide or multiply by a variable expression, you must know its sign (or split into cases).", "source": "Opus 4.7 ①", "_id": "opus_1_140", "judge_pick": true}, {"question": "A simple exercise: differentiate $$y = 3x^4 - \\frac{2}{x^3}$$. Show conceptual understanding of each step. (3 steps)", "answer": "- Step 1: Rewrite $$\\frac{2}{x^3}$$ as $$2x^{-3}$$, so $$y = 3x^4 - 2x^{-3}$$.\n- Step 2: Apply power rule term by term: $$\\frac{d}{dx}(3x^4) = 12x^3$$; $$\\frac{d}{dx}(-2x^{-3}) = -2(-3)x^{-4} = 6x^{-4}$$.\n- Step 3: Combine: $$\\frac{dy}{dx} = 12x^3 + 6x^{-4}$$, or equivalently $$12x^3 + \\frac{6}{x^4}$$.\n\nKey: rewrite fractions as negative powers FIRST, then apply the power rule mechanically.", "source": "Opus 4.7 ①", "_id": "opus_1_141", "judge_pick": false}, {"question": "A simple exercise: find the equation of the tangent to $$y = x^2 + 1$$ at the point where $$x = 2$$. (3 steps)", "answer": "- Step 1: Find $$y$$ at $$x = 2$$: $$y = 4 + 1 = 5$$. Point of tangency: $$(2, 5)$$.\n- Step 2: Derivative: $$\\frac{dy}{dx} = 2x$$. At $$x = 2$$: slope $$m = 4$$.\n- Step 3: Tangent line via point-slope: $$y - 5 = 4(x - 2) \\Rightarrow y = 4x - 3$$.\n\nVerify: at $$x = 2$$, tangent gives $$y = 5$$ ✓.", "source": "Opus 4.7 ①", "_id": "opus_1_142", "judge_pick": false}, {"question": "A simple exercise: find the angle $$\\theta$$ in a triangle with sides $$3, 4, 5$$ opposite to side $$5$$. Interpret the result. (2 steps)", "answer": "- Step 1: Cosine rule: $$5^2 = 3^2 + 4^2 - 2(3)(4)\\cos\\theta \\Rightarrow 25 = 9 + 16 - 24\\cos\\theta \\Rightarrow \\cos\\theta = 0$$.\n- Step 2: $$\\cos\\theta = 0 \\Rightarrow \\theta = 90°$$. The triangle is right-angled at that vertex.\n\nThis confirms the classic 3-4-5 right triangle. The cosine rule reproduces Pythagoras here ($$3^2 + 4^2 = 5^2$$).", "source": "Opus 4.7 ①", "_id": "opus_1_143", "judge_pick": true}, {"question": "A simple exercise: find the sector area of a circle with radius $$10$$ cm and angle $$\\frac{\\pi}{3}$$. (2 steps)", "answer": "- Step 1: Use $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2}(100)(\\frac{\\pi}{3}) = \\frac{50\\pi}{3}$$.\n- Step 2: Simplify: $$\\frac{50\\pi}{3} \\approx 52.4$$ cm² (to 3 s.f.), but for exact answer, keep as $$\\frac{50\\pi}{3}$$ cm².\n\nNote: always check that $$\\theta$$ is in radians. If given $$60°$$, convert first: $$60° = \\frac{\\pi}{3}$$ rad.", "source": "Opus 4.7 ①", "_id": "opus_1_144", "judge_pick": false}, {"question": "A simple exercise: for $$ax^2 + bx + c = 0$$, what values of the discriminant correspond to \"tangent to\" graphically? (1 step)", "answer": "- Step 1: \"Tangent\" = single intersection = one repeated real root = $$\\Delta = 0$$, i.e., $$b^2 - 4ac = 0$$.\n\nThe boundary between \"no intersection\" ($$\\Delta < 0$$) and \"two intersections\" ($$\\Delta > 0$$) is exactly where the line just touches the curve — tangent.", "source": "Opus 4.7 ①", "_id": "opus_1_145", "judge_pick": false}, {"question": "A simple exercise: solve $$4^x = 64$$ without a calculator. (2 steps)", "answer": "- Step 1: Express both sides as powers of the same base: $$4 = 2^2$$, so $$4^x = 2^{2x}$$. Also, $$64 = 2^6$$.\n- Step 2: Equate exponents: $$2x = 6 \\Rightarrow x = 3$$.\n\nAlternatively: $$4^x = 64 = 4^3 \\Rightarrow x = 3$$ directly (no need to go to base 2).", "source": "Opus 4.7 ①", "_id": "opus_1_146", "judge_pick": false}, {"question": "A simple exercise: $$\\int (3x^2 - \\frac{1}{x^2} + 4)\\,dx$$. Show each step. (3 steps)", "answer": "- Step 1: Rewrite: $$\\int (3x^2 - x^{-2} + 4)\\,dx$$.\n- Step 2: Integrate term by term using power rule:\n+ $$\\int 3x^2\\,dx = x^3$$\n+ $$\\int -x^{-2}\\,dx = -\\frac{x^{-1}}{-1} = x^{-1} = \\frac{1}{x}$$\n+ $$\\int 4\\,dx = 4x$$\n- Step 3: Combine: $$x^3 + \\frac{1}{x} + 4x + C$$.\n\nDon't forget $$+C$$.", "source": "Opus 4.7 ①", "_id": "opus_1_147", "judge_pick": false}, {"question": "Difference between \"tangent to\" a curve and \"meets at one point\" — are they the same?", "answer": "Yes, in the context of lines vs. curves where the curve is quadratic or higher. A line is tangent to a curve at point $$P$$ iff it touches the curve at $$P$$ without crossing (locally), which corresponds to a double root of (line - curve = 0).\n\nFor higher-degree curves, \"tangent\" still implies a double-root contact, but \"meets at one point\" might be ambiguous — could mean a simple intersection where other intersections are absent for other reasons.\n\nIn IAL P1 context: both phrases typically mean $$\\Delta = 0$$ of the combined quadratic. Treat them identically.", "source": "Opus 4.7 ①", "_id": "opus_1_148", "judge_pick": true}, {"question": "If a problem says \"curves meet at exactly 2 distinct points,\" what's the discriminant condition, and why isn't it also $$\\Delta = 0$$?", "answer": "$$\\Delta > 0$$ (strict).\n\nReasoning: \"exactly 2 distinct points\" means two DIFFERENT $$x$$-values satisfy both curves. A quadratic with $$\\Delta > 0$$ has two distinct real roots. $$\\Delta = 0$$ gives ONE repeated root (only 1 distinct point), which would be \"meets at 1 point\" (tangent).\n\n**Summary**:\n- 2 distinct points: $$\\Delta > 0$$\n- Tangent / single point: $$\\Delta = 0$$\n- No intersection: $$\\Delta < 0$$\n- At least 1 intersection: $$\\Delta \\geq 0$$", "source": "Opus 4.7 ①", "_id": "opus_1_149", "judge_pick": false}, {"question": "What's the structural pattern in \"show that $$k$$ satisfies [expression in $$k$$]\"? When do you expect this structure?", "answer": "This structure arises when:\n- Two curves (or a line and curve) depend on parameter $$k$$.\n- A geometric condition (tangent, single intersection, etc.) is imposed.\n- The condition produces a polynomial relation purely in $$k$$ (all $$x$$-dependence eliminated).\n\n**Why $$x$$ disappears**: the geometric condition (e.g., discriminant = 0) creates a relation among the coefficients of the quadratic in $$x$$. Those coefficients depend on $$k$$ and constants, not on $$x$$.\n\n**Phuc's insight**: the question gives you an expression purely in $$k$$ — that IS the discriminant trigger.", "source": "Opus 4.7 ①", "_id": "opus_1_150", "judge_pick": true}, {"question": "For $$f(x) = 2x^3 - kx^2 + 14x + 24$$, differentiate twice and state $$f'$$ and $$f''$$. (2 steps)", "answer": "- Step 1: $$f'(x) = 6x^2 - 2kx + 14$$. Power rule: $$2x^3 \\to 6x^2$$, $$-kx^2 \\to -2kx$$, $$14x \\to 14$$, constant $$\\to 0$$.\n- Step 2: $$f''(x) = 12x - 2k$$. Differentiating $$f'$$: $$6x^2 \\to 12x$$, $$-2kx \\to -2k$$, $$14 \\to 0$$.\n\nKey: $$k$$ is a constant (not a function of $$x$$), so differentiating $$-kx^2$$ gives $$-2kx$$, treating $$k$$ as a constant multiplier.", "source": "Opus 4.7 ①", "_id": "opus_1_151", "judge_pick": false}, {"question": "For the question $$4p^2 - 33p + 8 = 0$$, factor it and verify. (3 steps)", "answer": "- Step 1: Find two numbers multiplying to $$4 \\times 8 = 32$$ and adding to $$-33$$. These are $$-32$$ and $$-1$$.\n- Step 2: Split: $$4p^2 - 32p - p + 8 = 4p(p - 8) - 1(p - 8) = (4p - 1)(p - 8)$$.\n- Step 3: Verify: $$(4p - 1)(p - 8) = 4p^2 - 32p - p + 8 = 4p^2 - 33p + 8$$ ✓.\n\nRoots: $$p = \\frac{1}{4}$$ or $$p = 8$$.", "source": "Opus 4.7 ①", "_id": "opus_1_152", "judge_pick": false}, {"question": "The curve $$f(x) = 2x^2 - 12x + 14$$ — why is $$(-1, 28)$$ on the curve? Verify.", "answer": "Plug $$x = -1$$ into $$f$$: $$f(-1) = 2(1) - 12(-1) + 14 = 2 + 12 + 14 = 28$$. ✓\n\nThe point $$(-1, 28)$$ lies on the curve because its coordinates satisfy the equation. Good checkpoint: any given \"this point is on the curve\" can be verified by substitution.", "source": "Opus 4.7 ①", "_id": "opus_1_153", "judge_pick": false}, {"question": "For the minimum of $$f(x) = 2x^2 - 12x + 14$$, what's the $$x$$-value of the stationary point? Compute via $$f'(x) = 0$$. (2 steps)", "answer": "- Step 1: $$f'(x) = 4x - 12$$.\n- Step 2: Set $$f'(x) = 0 \\Rightarrow 4x - 12 = 0 \\Rightarrow x = 3$$.\n\nThis matches the completed-square form $$2(x - 3)^2 - 4$$ (vertex at $$x = 3$$). Two methods (calculus and completing the square) give the same stationary point — good cross-check.", "source": "Opus 4.7 ①", "_id": "opus_1_154", "judge_pick": false}, {"question": "For an integer-answer question \"the angle $$\\theta > 90°$$\" in the context of $$\\sin\\theta = \\frac{8}{15}$$, what's the other possible angle that gives the same sine, and why would we reject it?", "answer": "$$\\sin\\theta = \\frac{8}{15}$$ has TWO solutions in $$[0°, 180°]$$:\n- **Acute**: $$\\theta_1 = \\sin^{-1}(\\frac{8}{15}) \\approx 32.2°$$\n- **Obtuse**: $$\\theta_2 = 180° - 32.2° = 147.8°$$\n\nThese are **supplementary** (sum to $$180°$$) and both have the same sine (since $$\\sin(180° - \\theta) = \\sin\\theta$$).\n\nThe problem states $$\\theta > 90°$$, so we pick the obtuse $$\\theta_2 \\approx 147.8°$$. Consequently $$\\cos\\theta < 0$$ (second quadrant).", "source": "Opus 4.7 ①", "_id": "opus_1_155", "judge_pick": true}, {"question": "Mental sanity check for a multi-step problem: after deriving a quadratic from \"meet at one point,\" how can you quickly verify your algebra before solving?", "answer": "- **Check 1 — leading coefficient**: for the problem setup (adding quadratics), if $$C_1$$ has $$+x^2$$ and $$C_2$$ has $$-3x^2$$, then $$C_1 - C_2$$ should have $$+4x^2$$. This matches $$4x^2 + \\ldots$$ ✓.\n- **Check 2 — constant term**: $$-9 - k$$ from $$C_1$$ minus $$k$$ from $$C_2$$'s constant. Sign matters.\n- **Check 3 — discriminant plug-in**: with simple test values (e.g., $$k = 0$$), does your quadratic make sense?\n- **Check 4 — dimensionality**: is the final expression purely in $$k$$? If there's still $$x$$, an algebra error crept in.\n\nRunning these checks takes 10 seconds and catches most errors.", "source": "Opus 4.7 ①", "_id": "opus_1_156", "judge_pick": true}, {"question": "For calculator-free rationalisation like $$\\frac{13 + 2\\sqrt{3}}{5 + 10\\sqrt{3}}$$, what's the conjugate, and what's the simplified denominator after multiplying?", "answer": "Conjugate of $$5 + 10\\sqrt{3}$$: flip the sign of the surd → $$5 - 10\\sqrt{3}$$.\n\nDenominator after multiplying: $$(5 + 10\\sqrt{3})(5 - 10\\sqrt{3}) = 25 - 100 \\cdot 3 = 25 - 300 = -275$$.\n\n**Note**: the denominator becomes a NEGATIVE number because $$(10\\sqrt{3})^2 = 300$$ exceeds $$25$$. Don't be surprised by negative denominators; handle them carefully in the final simplification (might require factoring out negatives).\n\nGeneral pattern: $$(a + b\\sqrt{c})(a - b\\sqrt{c}) = a^2 - b^2 c$$, which can be positive or negative.", "source": "Opus 4.7 ①", "_id": "opus_1_157", "judge_pick": true}, {"question": "The purpose of rationalising the denominator isn't strictly mathematic
