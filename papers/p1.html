al — why is it conventional?", "answer": "Mathematically, $$\\frac{1}{\\sqrt{3}}$$ and $$\\frac{\\sqrt{3}}{3}$$ represent the same number. The reasons rationalisation is conventional:\n\n- **Uniqueness / Comparison**: comparing $$\\frac{7\\sqrt{3}}{3}$$ and $$\\frac{7}{\\sqrt{3}}$$ requires first putting them in a common form.\n- **Historical**: before calculators, computing $$\\frac{1}{\\sqrt{3}}$$ required long division by $$1.732\\ldots$$, while $$\\frac{\\sqrt{3}}{3}$$ is division by 3.\n- **Standard form**: exams typically expect the rationalised form for marks.\n\nModern usage: it's the conventional \"simplest form\" for surds. Not doing it might lose a mark on \"simplest form\" questions.", "source": "Opus 4.7 ①", "_id": "opus_1_158", "judge_pick": true}, {"question": "For complex compound transformations (e.g., $$f(-3x + 2)$$), what's the order of operations?", "answer": "Inside-out, following the order of modifications to $$x$$:\n- Step 1: Factor out: $$f(-3x + 2) = f(-3(x - \\frac{2}{3}))$$.\n- Step 2: This corresponds to: shift right by $$\\frac{2}{3}$$, then reflect + compress by factor $$-3$$.\n\nAlternatively, think of it as mapping: to go from original point $$(a, b)$$, solve $$-3x + 2 = a$$ for $$x$$: $$x = \\frac{2 - a}{3}$$. So new point is $$(\\frac{2-a}{3}, b)$$.\n\n**Warning**: the \"shift then reflect/scale\" order is NOT the same as \"reflect/scale then shift.\" Careful with the order — factor out the coefficient of $$x$$ first to see the order clearly.", "source": "Opus 4.7 ①", "_id": "opus_1_159", "judge_pick": true}, {"question": "For a region $$R$$ defined by $$y \\geq 0$$, $$y \\leq x + 2$$, $$y \\geq x^2 - x$$: describe the region in words.", "answer": "- $$y \\geq 0$$: above the $$x$$-axis.\n- $$y \\leq x + 2$$: below the line $$y = x + 2$$.\n- $$y \\geq x^2 - x$$: above the parabola $$y = x^2 - x$$.\n\n**Combining**: $$R$$ is the region above the $$x$$-axis AND bounded between the parabola (below) and the line (above). Since the parabola $$y = x^2 - x = x(x-1)$$ crosses the $$x$$-axis at $$x = 0, 1$$, the bottom boundary is sometimes the parabola and sometimes the $$x$$-axis (whichever is higher).\n\n$$R$$ is a somewhat complex shape — a \"three-sided\" region with a lid (line), floor (parabola above the axis OR the axis itself), and ends where the line meets the parabola.", "source": "Opus 4.7 ①", "_id": "opus_1_160", "judge_pick": true}, {"question": "Understand the connection: $$(x+2)^2$$ factor of a cubic means the graph does what at $$x = -2$$?", "answer": "It **touches** the $$x$$-axis at $$x = -2$$ without crossing. This is because $$(x+2)^2 \\geq 0$$ for all $$x$$, so the sign of $$f$$ near $$x = -2$$ is governed by the other factor. The cubic doesn't change sign at $$x = -2$$ — it just \"kisses\" the axis.\n\n**Contrast**: $$(x+2)^1$$ (simple factor) would mean the graph CROSSES at $$x = -2$$, changing sign.\n\nIn general: factor raised to even power → touches; odd power → crosses.", "source": "Opus 4.7 ①", "_id": "opus_1_161", "judge_pick": true}, {"question": "For time management in exams: when should you \"redo\" a question, and when should you commit to moving on?", "answer": "- **Redo** if:\n+ The question is worth many marks (e.g., 5+).\n+ You've spotted a specific error you can fix quickly.\n+ You've done the question to a sanity-check point that reveals an inconsistency.\n- **Move on** if:\n+ You've spent more than ~1.5x the \"time budget\" (based on marks).\n+ You've hit a conceptual block you can't identify.\n+ Other easier questions remain unattempted.\n\n**Strategy**: mark the question for later return. Complete easier/bigger-value questions first. Return with fresh eyes if time permits.", "source": "Opus 4.7 ①", "_id": "opus_1_162", "judge_pick": true}, {"question": "Why is checking units and signs crucial in composite-shape problems (sectors + triangles)?", "answer": "Units (m, cm) must be consistent across the problem — mixing gives results off by factors of 100 or 1000. Signs are crucial because:\n- Obtuse angles → negative cosines.\n- Shapes may be added or subtracted (e.g., \"region with a sector bitten out\").\n- Perimeter requires straight sides OUT of the shape (can't double-count shared edges).\n\n**Habit**: at each step, ask \"Is this positive? Should it be?\" \"Are my units consistent?\" Small but frequent checks catch big errors.", "source": "Opus 4.7 ①", "_id": "opus_1_163", "judge_pick": true}, {"question": "For the sin min problem $$y = 12\\sin(x + B)$$, at $$x = \\pi/4$$, why is $$A = -12$$ (and not $$A = -12\\sin(\\pi/4)$$)?", "answer": "Because at a MINIMUM point of $$12\\sin(\\cdot)$$, the sine function reaches its smallest value $$-1$$, regardless of the input. So $$y = 12 \\times (-1) = -12$$ at ANY minimum, not just one specific $$x$$.\n\nThe confusion: \"At $$x = \\pi/4$$, $$\\sin = \\sin(\\pi/4) = \\frac{\\sqrt{2}}{2}$$.\" But the function is $$\\sin(x + B)$$, not $$\\sin(x)$$. The argument $$x + B$$ takes whatever value (depending on $$B$$) makes $$\\sin$$ be $$-1$$ at this particular $$x$$.\n\n**Lesson**: at minima/maxima, the whole expression reaches its extremum, regardless of the specific $$x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_164", "judge_pick": true}, {"question": "When a problem says \"find $$f(x)$$,\" and gives $$f'(x)$$ plus a point $$P$$ on $$y = f(x)$$ plus an extra condition on $$f''$$, outline the workflow. (3 steps)", "answer": "- Step 1: Identify unknowns: usually an integration constant $$C$$ and possibly a parameter $$k$$ inside $$f'$$.\n- Step 2: Use the condition on $$f''$$ (e.g., $$f''(P) = 0$$) to solve for $$k$$. Differentiate $$f'$$ once more to get $$f''$$, plug in $$P$$'s $$x$$, set equal to 0.\n- Step 3: Once $$k$$ is known, integrate $$f'$$ to get $$f$$ (with $$+C$$). Use the point $$P$$ to find $$C$$: $$f(P_x) = P_y$$.\n\nFinal $$f(x)$$: fully determined polynomial/rational with all constants known.", "source": "Opus 4.7 ①", "_id": "opus_1_165", "judge_pick": false}, {"question": "What's the geometric meaning of \"$$x = \\pm\\sqrt{5}$$\" corresponding to curve intersections being symmetric?", "answer": "If the intersection $$x$$-values are $$\\pm\\sqrt{5}$$, the two intersection points are symmetric about the $$y$$-axis (reflections through $$x = 0$$).\n\nThis symmetry usually comes from a quartic equation $$x^4 + \\ldots = 0$$ where only even powers appear — the equation is even, so roots come in $$\\pm$$ pairs.\n\nPractical: if you see even-only polynomial, expect $$\\pm$$ roots. Use the substitution $$u = x^2$$ to exploit this.\n\n**In the Q8 problem**: $$2x^4 - 7x^2 - 15 = 0$$ is biquadratic → $$x = \\pm\\sqrt{5}$$ are symmetric.", "source": "Opus 4.7 ①", "_id": "opus_1_166", "judge_pick": true}, {"question": "In the Phuc's strategy for \"two unknowns in integration\" (using $$f''$$ first), what's the mental model — why doesn't the integration constant appear in $$f''$$?", "answer": "Because $$f''$$ is the derivative of $$f'$$. The integration constant $$C$$ only appears when you INTEGRATE (go up in derivative order: $$f' \\to f$$). Going DOWN (differentiation, $$f' \\to f''$$) has no constants introduced.\n\nFlow:\n- $$f'' = $$ (depends on $$x$$ and $$k$$ only)\n- $$f' = $$ (depends on $$x$$ and $$k$$ only — given)\n- $$f = \\int f'\\,dx + C$$ (depends on $$x$$, $$k$$, and $$C$$)\n\nSo conditions on $$f''$$ or $$f'$$ don't involve $$C$$ — great for isolating $$k$$ without bringing in the extra unknown $$C$$.", "source": "Opus 4.7 ①", "_id": "opus_1_167", "judge_pick": true}, {"question": "Differentiate $$f'(x) = 4x^{3/2} + kx^{-2}$$ and write the derivative $$f''$$. (3 steps)", "answer": "- Step 1: Apply power rule to first term: $$\\frac{d}{dx}(4x^{3/2}) = 4 \\cdot \\frac{3}{2} x^{1/2} = 6x^{1/2}$$.\n- Step 2: Second term: $$\\frac{d}{dx}(kx^{-2}) = k \\cdot (-2) x^{-3} = -2kx^{-3}$$.\n- Step 3: Combine: $$f''(x) = 6x^{1/2} - 2kx^{-3}$$.\n\nKey: power rule applies to each term, even with fractional and negative exponents.", "source": "Opus 4.7 ①", "_id": "opus_1_168", "judge_pick": false}, {"question": "For an integer (non-fractional) exponent like $$x^3$$, what's the conceptual differentiation rule, and why does the same rule apply to $$x^{3/2}$$?", "answer": "Power rule: $$\\frac{d}{dx}(x^n) = nx^{n-1}$$, for ANY real $$n$$ (integer, fraction, negative, irrational).\n\n**Why universal**: the rule derives from the limit definition $$\\frac{d}{dx}(x^n) = \\lim_{h \\to 0} \\frac{(x+h)^n - x^n}{h}$$. For integer $$n$$, expanding via binomial gives the rule. For fractional/irrational $$n$$, one uses the more general $$x^n = e^{n\\ln x}$$ and chain rule, again yielding the same formula.\n\nSo $$\\frac{d}{dx}(x^{3/2}) = \\frac{3}{2}x^{1/2}$$ — same mechanism as integer case.", "source": "Opus 4.7 ①", "_id": "opus_1_169", "judge_pick": true}, {"question": "Can a line $$y = mx + c$$ be parallel to the $$x$$-axis? If so, what are $$m$$ and $$c$$?", "answer": "Yes. Parallel to $$x$$-axis means horizontal, which means slope = 0. So $$m = 0$$, and the equation reduces to $$y = c$$, a constant.\n\nSo a line parallel to the $$x$$-axis has the form $$y = c$$ (any real $$c$$). Through the point $$(4, 2)$$: $$c = 2$$, giving $$y = 2$$.\n\n**Cannot**: a line $$y = mx + c$$ with $$m$$ nonzero cannot be horizontal. Conversely, vertical lines ($$x = a$$) cannot be expressed as $$y = mx + c$$ at all — vertical lines have undefined slope.", "source": "Opus 4.7 ①", "_id": "opus_1_170", "judge_pick": true}, {"question": "Why should you always CHECK an intersection-count result against the boundary cases of the discriminant?", "answer": "To catch off-by-one errors. E.g., for \"4 distinct\" requiring $$0 < A < 4$$:\n- Check $$A = 0$$: substitution gives $$x^4 - 4x^2 = 0 \\Rightarrow x^2(x^2 - 4) = 0 \\Rightarrow x = 0, \\pm 2$$. Only 3 distinct $$x$$ — not 4. So $$A = 0$$ is indeed excluded ✓.\n- Check $$A = 4$$: $$x^4 - 4x^2 + 4 = (x^2 - 2)^2 = 0 \\Rightarrow x^2 = 2 \\Rightarrow x = \\pm\\sqrt{2}$$. Only 2 distinct $$x$$ — not 4. So $$A = 4$$ is excluded ✓.\n- Check $$A = 2$$ (interior): $$x^4 - 4x^2 + 2 = 0$$. Discriminant in $$u$$: $$16 - 8 = 8 > 0$$. Roots $$u = (4 \\pm 2\\sqrt{2})/2 = 2 \\pm \\sqrt{2}$$, both positive. So 4 real $$x$$ ✓.\n\nBoundary testing validates the range you derived.", "source": "Opus 4.7 ①", "_id": "opus_1_171", "judge_pick": true}, {"question": "What's the conceptual advantage of the substitution method $$u = x^2$$ over other approaches to quartics?", "answer": "It converts a 4th-degree equation (potentially complex to solve) into a 2nd-degree equation (easy to solve with the quadratic formula or factoring).\n\n**Limitation**: only works for biquadratics (only even powers of $$x$$). If odd powers $$x, x^3$$ appear, the substitution doesn't simplify.\n\n**Extension**: for general quartics $$ax^4 + bx^3 + cx^2 + dx + e = 0$$, the general method is more complex (Ferrari's formula). For biquadratics, the substitution is elegant and sufficient.\n\n**Moral**: recognise structural features (here, only even powers) to pick the right tool.", "source": "Opus 4.7 ①", "_id": "opus_1_172", "judge_pick": true}, {"question": "For Phuc's paper results, the weakness diagnostic suggests a specific revision priority order. What is it, and why is this order sensible?", "answer": "Priority (from most critical):\n1. **Sine/cosine rule** — forgotten in every paper. Not in booklet. Appears in sector/triangle problems.\n2. **Radian formulas** — arc, sector, segment. Platform-style questions common.\n3. **Index laws** — cubing, negative exponents, substitution $$p = a^x$$.\n4. **Inequalities/regions** — sign direction, boundary counting.\n5. **Graph transformations** — combined reflections + compressions.\n6. **Integration with fractions** — rewrite negative powers first.\n7. **Discriminant triggers** — recognise key phrases.\n8. **Trig periods** — $$360/n$$ vs $$360n$$.\n\n**Ordering logic**: top is most frequent and most commonly missed. Fixing the top reaps the biggest mark gains.", "source": "Opus 4.7 ①", "_id": "opus_1_173", "judge_pick": false}, {"question": "A question: \"The curve passes through $$(0, 2)$$\" — what does this tell you algebraically?", "answer": "Plugging $$x = 0, y = 2$$ into the curve's equation gives a TRUE statement (the point satisfies the equation). In practice, this is one equation involving the parameters of the curve.\n\nFor $$y = f(x) = \\frac{8}{5}x^{5/2} - \\frac{24\\sqrt{2}}{x} + C$$, plugging the point gives one equation relating $$C$$ to the other knowns.\n\nEach \"passes through\" point provides one equation for the unknowns. With $$n$$ unknowns, you need at least $$n$$ such points (or other conditions) to solve the system.", "source": "Opus 4.7 ①", "_id": "opus_1_174", "judge_pick": true}, {"question": "Why is the answer $$A = -12$$ (not $$A = 12$$ or $$A = 0$$) for the minimum of $$y = 12\\sin(x + B)$$?", "answer": "The sine function has range $$[-1, 1]$$, attaining:\n- Max: $$\\sin = 1 \\Rightarrow y = 12 \\cdot 1 = 12$$ (at the MAXIMUM point of the curve).\n- Min: $$\\sin = -1 \\Rightarrow y = 12 \\cdot (-1) = -12$$ (at the MINIMUM point).\n- Mean (zero crossing): $$\\sin = 0 \\Rightarrow y = 0$$.\n\nSince the problem specifies the MINIMUM point, $$A = -12$$. Picking $$A = 12$$ would describe the maximum; $$A = 0$$ would describe a zero crossing.\n\nMnemonic: \"minimum of $$a\\sin(\\cdot)$$ with $$a > 0$$ is $$-a$$.\"", "source": "Opus 4.7 ①", "_id": "opus_1_175", "judge_pick": true}, {"question": "Conceptual: why might Edexcel's \"October 2023\" paper be labeled \"harder\" — what does \"requires manipulation\" mean?", "answer": "Mr Fuat noted: \"This paper is different because it requires manipulation — rationalising, identifying the link between parts (hence).\"\n\n**Harder because**:\n- **Rationalising**: surd in denominator, must multiply by conjugate. Requires algebraic dexterity, not just formula plug-in.\n- **Identifying \"hence\" links**: must see how part (a)'s result feeds into part (b). Requires seeing structure.\n- **Multiple-step derivations**: e.g., \"show that $$2x^4 - 7x^2 - 15 = 0$$\" requires cross-multiplication and cancellation — 4 steps before the answer.\n\n**Easier paper style**: direct plug-and-chug where each question stands alone and uses one concept. The harder style weaves concepts together.", "source": "Opus 4.7 ①", "_id": "opus_1_176", "judge_pick": false}, {"question": "Suppose you're given that a region $$R$$ has exactly 3 boundaries: a line, a curve, and the $$x$$-axis. What inequalities might describe $$R$$?", "answer": "3 boundaries → 3 inequalities. The specific signs depend on $$R$$'s location:\n\nExample setup:\n- $$R$$ above the $$x$$-axis: $$y \\geq 0$$\n- $$R$$ below the line $$y = mx + c$$: $$y \\leq mx + c$$\n- $$R$$ above the curve $$y = ax^2 + bx + d$$: $$y \\geq ax^2 + bx + d$$\n\nOR different sign combinations depending on whether $$R$$ is above/below each boundary. Always verify with a sample point inside $$R$$.", "source": "Opus 4.7 ①", "_id": "opus_1_177", "judge_pick": true}, {"question": "For the cosine rule problem: $$\\cos\\theta = \\frac{13 + 2\\sqrt{3}}{5 + 10\\sqrt{3}}$$ — after rationalising, the answer is $$\\frac{24\\sqrt{3} - 1}{55}$$. Walk through the rationalisation. (3 steps)", "answer": "- Step 1: Multiply top and bottom by conjugate $$5 - 10\\sqrt{3}$$:\n+ Numerator: $$(13 + 2\\sqrt{3})(5 - 10\\sqrt{3}) = 65 - 130\\sqrt{3} + 10\\sqrt{3} - 20 \\cdot 3 = 65 - 120\\sqrt{3} - 60 = 5 - 120\\sqrt{3}$$\n+ Denominator: $$(5 + 10\\sqrt{3})(5 - 10\\sqrt{3}) = 25 - 300 = -275$$\n- Step 2: Simplify $$\\frac{5 - 120\\sqrt{3}}{-275} = \\frac{-(5 - 120\\sqrt{3})}{275} = \\frac{120\\sqrt{3} - 5}{275}$$.\n- Step 3: Reduce by 5: $$\\frac{24\\sqrt{3} - 1}{55}$$.\n\nAlways double-check the sign of the denominator and carry through any negative signs carefully.", "source": "Opus 4.7 ①", "_id": "opus_1_178", "judge_pick": false}, {"question": "What's the concept of \"supplementary angles\" and their trig relationships?", "answer": "Supplementary angles sum to $$180°$$ (or $$\\pi$$ rad). If $$\\alpha + \\beta = 180°$$:\n- $$\\sin\\beta = \\sin(180° - \\alpha) = \\sin\\alpha$$ (sines are equal).\n- $$\\cos\\beta = \\cos(180° - \\alpha) = -\\cos\\alpha$$ (cosines are opposite signs).\n- $$\\tan\\beta = -\\tan\\alpha$$.\n\n**Useful in geometry**: \"straight line at point $$D$$\" implies supplementary angles. When one uses sine rule across a straight line, the sine doesn't change — so the \"same\" sine is reused.", "source": "Opus 4.7 ①", "_id": "opus_1_179", "judge_pick": false}, {"question": "In triangle area problems, why is it important to identify which angle is \"included\" between the given sides?", "answer": "The SAS area formula $$\\frac{1}{2}ab\\sin C$$ requires $$C$$ to be the angle BETWEEN sides $$a$$ and $$b$$. Using a non-included angle produces the WRONG number.\n\n**Why**: the formula comes from height = $$b\\sin C$$ (perpendicular from the opposite vertex onto side $$a$$). If $$C$$ weren't between $$a$$ and $$b$$, then $$b\\sin C$$ wouldn't be the correct height.\n\n**Practical check**: label the triangle's vertices. The angle at vertex $$P$$ IS between the two sides emanating from $$P$$. If the angle given is at $$P$$, then the sides emanating from $$P$$ are the two sides to use with SAS.", "source": "Opus 4.7 ①", "_id": "opus_1_180", "judge_pick": true}, {"question": "For Phuc's paper in the \"show that\" category: what's the difference between a correct \"show that\" working and an incorrect one?", "answer": "**Correct \"show that\" features**:\n- Starts from the given expressions (LHS or initial equations).\n- Each step is algebraically justified (expand, cancel, rearrange).\n- Ends with the target expression exactly as stated.\n- No circular reasoning (don't assume the target to prove the target).\n\n**Incorrect features**:\n- Asserting the target without derivation.\n- Skipping crucial manipulations (though minor arithmetic simplifications are fine).\n- Starting from both sides meeting in the middle (but this can be valid if done carefully).\n- Using unstated facts.\n\n**Goal**: a transparent chain from givens to target that any reader can follow line-by-line.", "source": "Opus 4.7 ①", "_id": "opus_1_181", "judge_pick": true}, {"question": "In solving $$(k+13)^2 = 0$$ — explain why there's a REPEATED root and what it means geometrically for the $$k$$-equation's discriminant.", "answer": "$$(k+13)^2 = 0$$ is equivalent to $$k^2 + 26k + 169 = 0$$, a quadratic IN $$k$$. Its discriminant is $$26^2 - 4(1)(169) = 676 - 676 = 0$$.\n\nSo the quadratic in $$k$$ has a REPEATED root: $$k = -13$$ (twice).\n\n**Geometric meaning**: the \"discriminant = 0\" condition on the original quadratic (in $$x$$) produces another \"discriminant = 0\" condition in $$k$$, which is a polynomial equation with a single (repeated) root.\n\nThis is elegant: the \"tangent\" condition propagates through the algebra — tangency of curves translates to \"tangency\" (repeated root) in the parameter equation.", "source": "Opus 4.7 ①", "_id": "opus_1_182", "judge_pick": true}, {"question": "In the Platform problem, why is the total area the outer major sector PLUS the inner minor sector?", "answer": "Visualise: the outer major sector is like a large \"Pac-Man\" missing a wedge (where the minor angle is). The inner minor sector fills that wedge, but only up to a smaller radius.\n\nSo the combined shape is:\n- **Outer major sector**: everything within the outer radius EXCEPT the minor-angle wedge.\n- **Inner minor sector**: the minor-angle wedge, but only within the inner radius.\n\nAdding: together they cover the entire platform (all of the outer Pac-Man plus the inner wedge filler).\n\n**NOT subtraction**: subtracting would remove the minor wedge from the outer sector, leaving a hole — not the geometry here.", "source": "Opus 4.7 ①", "_id": "opus_1_183", "judge_pick": true}, {"question": "Mental math check: verify that $$2^{5/2} = 4\\sqrt{2}$$.", "answer": "$$2^{5/2} = 2^{2 + 1/2} = 2^2 \\cdot 2^{1/2} = 4 \\cdot \\sqrt{2} = 4\\sqrt{2}$$.\n\nAlternatively: $$2^{5/2} = (2^5)^{1/2} = \\sqrt{32} = \\sqrt{16 \\cdot 2} = 4\\sqrt{2}$$.\n\nNumerical: $$4\\sqrt{2} \\approx 4 \\times 1.414 \\approx 5.656$$. And $$2^{5/2} = 2^{2.5} \\approx 5.656$$ ✓.\n\nMemorise: $$2^{n/2} = 2^{\\lfloor n/2 \\rfloor} \\sqrt{2}$$ for odd $$n$$.", "source": "Opus 4.7 ①", "_id": "opus_1_184", "judge_pick": false}, {"question": "Sanity check the answer $$C = \\frac{68\\sqrt{2}}{5}$$ for the integration problem: compute $$f(2)$$ with the final $$f(x)$$ and verify it equals $$8\\sqrt{2}$$. (3 steps)", "answer": "- Step 1: $$f(2) = \\frac{8}{5}(2^{5/2}) - \\frac{24\\sqrt{2}}{2} + \\frac{68\\sqrt{2}}{5}$$\n- Step 2: Simplify each term:\n+ $$\\frac{8}{5}(4\\sqrt{2}) = \\frac{32\\sqrt{2}}{5}$$\n+ $$\\frac{24\\sqrt{2}}{2} = 12\\sqrt{2}$$\n+ $$\\frac{68\\sqrt{2}}{5}$$\n- Step 3: Sum: $$\\frac{32\\sqrt{2}}{5} - 12\\sqrt{2} + \\frac{68\\sqrt{2}}{5} = \\frac{32\\sqrt{2} + 68\\sqrt{2}}{5} - 12\\sqrt{2} = \\frac{100\\sqrt{2}}{5} - 12\\sqrt{2} = 20\\sqrt{2} - 12\\sqrt{2} = 8\\sqrt{2}$$ ✓\n\nVerified!", "source": "Opus 4.7 ①", "_id": "opus_1_185", "judge_pick": false}, {"question": "What's the relationship between \"inequalities describing a region\" and \"shaded region on a graph\"?", "answer": "They are two representations of the same thing:\n- **Inequalities**: algebraic — e.g., $$y \\geq 0$$ AND $$y \\leq 5x + 75$$ AND $$y \\geq 2x^2 + x - 21$$.\n- **Shaded region**: geometric — points $$(x, y)$$ in the plane satisfying ALL the inequalities.\n\n**Conversion**:\n- Inequalities → shading: for each inequality, shade the correct side; the region is the intersection (overlap) of all shadings.\n- Shading → inequalities: for each boundary, determine which side is shaded and translate to the right inequality sign.\n\n**Sanity check**: a point inside the shaded region should satisfy ALL inequalities; a point outside should violate at least one.", "source": "Opus 4.7 ①", "_id": "opus_1_186", "judge_pick": true}, {"question": "Across all Phuc's 23 redo questions, what's the meta-lesson about what *types* of errors cost the most marks?", "answer": "Meta-lesson: **formula recall errors** and **recognition errors** (trigger words) dominate. Not algebraic/computational errors.\n\nEvidence:\n- Sine/cosine rule forgotten in 4 papers (formula recall).\n- Radian/sector formulas forgotten (formula recall).\n- Discriminant trigger missed (recognition).\n- \"Parallel to x-axis\" not recognised as $$y = \\text{const}$$ (recognition).\n- Indices cubing rule misapplied (formula details).\n\n**Implication**: Phuc's algebra is generally sound. The fix is **memorisation + pattern recognition**. Daily flashcard recall of formulas and trigger phrases will have higher ROI than doing more practice problems.", "source": "Opus 4.7 ①", "_id": "opus_1_187", "judge_pick": false}, {"question": "If a curve $$y = f(x)$$ has a minimum at $$(3, -4)$$, and a line through $$(-1, 28)$$ and the minimum passes through the region $$R$$ bounded by line, curve, $$x$$-axis and $$y$$-axis — how does the region look qualitatively?", "answer": "Visualise:\n- The curve is a parabola opening upward with vertex $$(3, -4)$$ (below the $$x$$-axis).\n- It crosses the $$x$$-axis somewhere (at the roots of $$f$$).\n- The line passes from $$(-1, 28)$$ (top-left) through $$(3, -4)$$ (bottom).\n- The line has negative slope ($$m = -8$$).\n\nThe region $$R$$ bounded by all four lies in the first quadrant (right of $$y$$-axis, above $$x$$-axis), under the line, and either above or below the curve — depends on the geometry.\n\nKey: in the first quadrant, the parabola starts high (at $$x = 0$$, $$f(0) = 14$$), dips down to $$-4$$ at $$x = 3$$, then rises. So $$R$$ is below the curve's \"high\" part near $$x = 0$$ and doesn't extend beyond where the parabola dips below the $$x$$-axis.", "source": "Opus 4.7 ①", "_id": "opus_1_188", "judge_pick": true}, {"question": "What's the geometric intuition for why the discriminant $$\\Delta$$ of a quadratic relates to whether a parabola intersects a line?", "answer": "Setting line $$=$$ parabola gives a quadratic. The discriminant measures the \"spread\" of the roots:\n- $$\\Delta > 0$$: roots are distinct real values → parabola crosses the line at 2 distinct points (line cuts through).\n- $$\\Delta = 0$$: one repeated root → line just touches the parabola at 1 point (tangent).\n- $$\\Delta < 0$$: no real roots → line and parabola never meet.\n\nThe discriminant is the \"intersection-counter\": think of it as how far the line is from being tangent. As $$\\Delta$$ grows from $$-\\infty$$ to $$+\\infty$$, the line transitions from \"outside\" to \"tangent\" to \"cutting through.\"", "source": "Opus 4.7 ①", "_id": "opus_1_189", "judge_pick": true}, {"question": "Practical tip: when solving for the minimum/maximum of $$y = A\\sin(Bx + C)$$, the **amplitude** and **period** don't affect where the extrema occur in terms of $$x$$, but they affect the $$y$$-values. Explain.", "answer": "- **Where extrema occur** (in $$x$$): determined by where $$\\sin$$'s argument is $$\\pi/2 + 2n\\pi$$ (max) or $$3\\pi/2 + 2n\\pi$$ (min). Only $$B$$ and $$C$$ matter (the frequency and phase), not $$A$$.\n- **What extrema values are** (in $$y$$): determined by the amplitude $$A$$:\n+ Max $$y = A$$ (when $$\\sin = 1$$).\n+ Min $$y = -A$$ (when $$\\sin = -1$$).\n\n**Separation**: the \"when\" is controlled by the argument; the \"how high\" is controlled by the amplitude.", "source": "Opus 4.7 ①", "_id": "opus_1_190", "judge_pick": true}, {"question": "Conceptual exercise: state in one sentence the essence of each P1 topic:\n- Quadratics\n- Coordinate geometry\n- Graph transformations\n- Trigonometry\n- Radians\n- Differentiation\n- Integration", "answer": "- **Quadratics**: a parabola $$y = ax^2 + bx + c$$ with vertex, roots controlled by $$\\Delta$$, factorisable via splitting the middle.\n- **Coordinate geometry**: points in the plane, lines have slopes, distance/midpoint/perpendicularity encoded by simple formulas.\n- **Graph transformations**: shifts/stretches/reflections applied via modifications inside or outside $$f$$, with inside effects \"reversed.\"\n- **Trigonometry**: sine/cosine rules for triangles, with specific rules for SAS area, using radians internally.\n- **Radians**: natural unit where $$\\pi = 180°$$, making arc $$= r\\theta$$ and sector $$= \\frac{1}{2}r^2\\theta$$ dimensionally clean.\n- **Differentiation**: instantaneous slope; power rule dominates; second derivative gives concavity/extrema.\n- **Integration**: reverse of differentiation; $$+C$$ for indefinite; rewrite fractions as negative powers first.", "source": "Opus 4.7 ①", "_id": "opus_1_191", "judge_pick": false}], "count": 192}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "State the quadratic formula for solving $$ax^2 + bx + c = 0$$, and explain why you should commit it to memory for the Edexcel IAL P1 exam.", "answer": "The formula is $$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$. You must memorise it because it is NOT printed in the Edexcel P1 formula booklet — if you blank on it in the exam, you'll be stuck for any quadratic that doesn't factorise cleanly. Use factorisation as your first-choice method (fewer arithmetic slips), and fall back to this formula only when factors aren't obvious.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "For the quadratic $$ax^2 + bx + c$$, describe the \"AC method\" factorisation trick that avoids guessing. (3 steps)", "answer": "- Step 1: Compute the product $$ac$$ and find two numbers that multiply to $$ac$$ AND add to $$b$$.\n- Step 2: Split the middle term $$bx$$ into two terms using those two numbers.\n- Step 3: Factor by grouping — group the first two and last two terms, pull out the common factor, then extract the common bracket.\n\nFor $$21x^2 + 10x + 1$$: $$ac = 21$$, so find two numbers multiplying to $$21$$ and adding to $$10$$ — that's $$7$$ and $$3$$. Split: $$21x^2 + 7x + 3x + 1 = 7x(3x+1) + 1(3x+1) = (7x+1)(3x+1)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "What does the discriminant $$\\Delta = b^2 - 4ac$$ tell you about the roots of $$ax^2 + bx + c = 0$$, and why is this geometrically meaningful? (3 steps)", "answer": "- Step 1: $$\\Delta > 0$$ means two distinct real roots — the parabola crosses the $$x$$-axis at two distinct points.\n- Step 2: $$\\Delta = 0$$ means one repeated root — the parabola touches (is tangent to) the $$x$$-axis at its vertex.\n- Step 3: $$\\Delta < 0$$ means no real roots — the parabola sits entirely above or below the $$x$$-axis and never crosses it.\n\nThe discriminant is the radicand under the square root in the quadratic formula: negative gives imaginary roots, zero gives a single root, positive gives the ± split into two distinct roots.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "After substituting $$y = -4x - 1$$ into a quadratic curve, you get $$21x^2 + 10x + 1 = 0$$. Without relying on the quadratic formula, what's the cleanest route to the roots? (3 steps)", "answer": "- Step 1: Recognise $$21 \\times 1 = 21$$ and we need two numbers multiplying to $$21$$ summing to $$10$$ — the pair $$(7, 3)$$ works.\n- Step 2: Split and group: $$21x^2 + 7x + 3x + 1 = 7x(3x+1) + 1(3x+1) = (7x+1)(3x+1)$$.\n- Step 3: Set each factor to zero: $$x = -\\tfrac{1}{7}$$ or $$x = -\\tfrac{1}{3}$$.\n\nFactorisation is preferred here because the arithmetic is tighter (fewer places to slip) than computing $$\\sqrt{16}$$ in the formula and handling the ± split.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "For the curve $$y = 2x^2 + 8x + 3$$ and line $$y = 4x + c$$, explain the common misconception about what $$\\frac{dy}{dx}$$ should be set equal to when finding the value of $$c$$ that makes the line tangent.", "answer": "The trap is writing $$\\frac{dy}{dx} = 4x + c$$ — setting the derivative equal to the whole line equation. This is WRONG. At the point of tangency, the gradient of the curve equals the gradient of the line, and the gradient of $$y = mx + c$$ is just $$m$$ (the coefficient of $$x$$), a scalar. So you set $$\\frac{dy}{dx} = 4$$, not $$\\frac{dy}{dx} = 4x + c$$. The $$c$$ is the $$y$$-intercept, not part of the gradient.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Outline the 4-step strategy to find the constant $$c$$ such that the line $$y = 4x + c$$ is a tangent to the curve $$y = 2x^2 + 8x + 3$$. (4 steps)", "answer": "- Step 1: Differentiate the curve: $$\\frac{dy}{dx} = 4x + 8$$.\n- Step 2: Set the curve's gradient equal to the line's gradient (which is the coefficient of $$x$$, i.e. $$4$$): $$4x + 8 = 4 \\Rightarrow x = -1$$.\n- Step 3: Find the $$y$$-coordinate of the tangent point by substituting into the CURVE (not the line): $$y = 2(-1)^2 + 8(-1) + 3 = -3$$.\n- Step 4: Plug the tangent point $$(-1, -3)$$ into the line equation to solve for $$c$$: $$-3 = 4(-1) + c \\Rightarrow c = 1$$.\n\nThe tangent point lies on both curve and line — always compute its $$y$$ using the CURVE, because the line still contains the unknown.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "Give the general equation of a tangent line at the point $$(x_1, y_1)$$ on a curve $$y = f(x)$$, and explain the role of each piece. (3 steps)", "answer": "- Step 1: The tangent line equation in point-gradient form: $$y - y_1 = f'(x_1)(x - x_1)$$.\n- Step 2: $$f'(x_1)$$ is the gradient of the curve at $$x_1$$, and equals the gradient of the tangent line — a SCALAR, not a whole equation.\n- Step 3: $$(x_1, y_1)$$ is the point of tangency, which must lie on BOTH the curve and the tangent line. This form fixes both slope and a single point, uniquely determining the line.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "For the inequality $$y < f(x)$$, which side of the curve $$y = f(x)$$ is the solution region, and when would the curve itself be included? (3 steps)", "answer": "- Step 1: $$y < f(x)$$ means the region BELOW the curve — for any chosen $$x$$, the $$y$$-coordinate must be less than $$f(x)$$.\n- Step 2: The strict inequality $$<$$ EXCLUDES the curve itself, so the boundary is drawn dashed.\n- Step 3: If the inequality is $$\\le$$, the curve IS included in the region and drawn solid.\n\nMirror rule: $$y > f(x)$$ means ABOVE the curve (and $$\\ge$$ includes it, solid boundary).", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "You have two inequalities $$y < x + 2$$ AND $$y > x^2 - x$$. Describe the process to identify the region satisfying BOTH simultaneously. (3 steps)", "answer": "- Step 1: Sketch both boundary curves on the same axes — the line $$y = x + 2$$ and the parabola $$y = x^2 - x$$.\n- Step 2: Shade each region individually: below the line for $$y < x+2$$, above the parabola for $$y > x^2 - x$$.\n- Step 3: The solution is the INTERSECTION (overlap) of the two shaded regions — the lens-shaped area sandwiched between the line above and the parabola below.\n\nA sample point from inside the overlap (e.g. $$(0, 1)$$: is $$1 < 2$$? yes; is $$1 > 0$$? yes) confirms you've got the right region.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Explain conceptually why a \"less than\" inequality involving $$y$$ gives the region BELOW the curve, using the notion of what $$y$$ represents geometrically.", "answer": "The $$y$$-coordinate of any point measures its vertical height. The curve $$y = f(x)$$ is the set of points whose height EQUALS $$f(x)$$. Asking for $$y < f(x)$$ is asking: \"at this $$x$$, is the point's height LESS than the curve's height?\" Points below the curve have smaller $$y$$-values at the same $$x$$, so they're the ones satisfying the inequality. It's a direct vertical comparison at each $$x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "What is the distinguishing feature of the MAJOR sector of a circle (vs the minor), and how do their angles relate? (3 steps)", "answer": "- Step 1: A sector is the \"pizza slice\" region bounded by two radii and an arc.\n- Step 2: Any two radii divide a circle into TWO sectors — the minor sector has the smaller angle (less than $$\\pi$$ radians), and the major sector has the larger angle (more than $$\\pi$$ radians).\n- Step 3: The two angles always sum to a full turn: $$\\theta_{\\text{major}} + \\theta_{\\text{minor}} = 2\\pi$$, so $$\\theta_{\\text{major}} = 2\\pi - \\theta_{\\text{minor}}$$.\n\nOnce you find one angle, the other is a subtraction away.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "State the sector area formula (in radians) and the arc length formula. Why must $$\\theta$$ be in radians for these? (3 steps)", "answer": "- Step 1: Arc length: $$\\ell = r\\theta$$. Sector area: $$A = \\tfrac{1}{2}r^2\\theta$$.\n- Step 2: These formulas rely on the DEFINITION of a radian — one radian is the angle that subtends an arc equal in length to the radius. So $$\\ell/r = \\theta$$ only if $$\\theta$$ is in radians.\n- Step 3: In degrees you'd need an extra factor: arc length $$= \\tfrac{\\theta^{\\circ}}{360} \\cdot 2\\pi r$$ and sector area $$= \\tfrac{\\theta^{\\circ}}{360}\\cdot \\pi r^2$$. Radians absorb this factor cleanly.\n\nAlways convert to radians BEFORE plugging into $$\\ell = r\\theta$$ or $$A = \\tfrac{1}{2}r^2\\theta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "A triangle has sides 4, 6, and 9 cm. You need to find the angle opposite the side of length 9. Which rule applies, and why? (3 steps)", "answer": "- Step 1: The Cosine Rule $$a^2 = b^2 + c^2 - 2bc\\cos A$$ is the tool whenever you know three sides (and want an angle) OR two sides and the included angle (and want the third side).\n- Step 2: The Sine Rule requires knowing at least one angle-opposite-side pair, which we do NOT have here — so it can't even get started.\n- Step 3: Rearrange: $$\\cos A = \\tfrac{b^2 + c^2 - a^2}{2bc}$$, with $$a = 9$$ (the side opposite the wanted angle) and $$b, c = 4, 6$$. This gives $$\\cos\\alpha = \\tfrac{16 + 36 - 81}{48} = -\\tfrac{29}{48}$$, which is negative, so $$\\alpha$$ is obtuse.\n\nCue: \"three sides given, angle wanted\" → always Cosine Rule.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "Why does a negative cosine value immediately tell you the angle is obtuse? (3 steps)", "answer": "- Step 1: On the unit circle, $$\\cos\\theta$$ is the $$x$$-coordinate of the point at angle $$\\theta$$ from the positive $$x$$-axis.\n- Step 2: For $$0 < \\theta < \\tfrac{\\pi}{2}$$ (acute), the point lies in the first quadrant where $$x > 0$$, so $$\\cos\\theta > 0$$.\n- Step 3: For $$\\tfrac{\\pi}{2} < \\theta < \\pi$$ (obtuse), the point lies in the second quadrant where $$x < 0$$, so $$\\cos\\theta < 0$$.\n\nSo $$\\cos\\theta < 0 \\iff \\theta$$ is obtuse (in a triangle context, where angles are between $$0$$ and $$\\pi$$).", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Given minor sector angle $$\\alpha \\approx 2.22$$ rad in a circle of radius 4, describe how to find the area of the MAJOR sector. (3 steps)", "answer": "- Step 1: Compute the major angle via $$\\theta_{\\text{major}} = 2\\pi - \\alpha$$ (the two angles sum to a full turn).\n- Step 2: Apply the sector-area formula $$A = \\tfrac{1}{2}r^2\\theta_{\\text{major}}$$ with $$r = 4$$.\n- Step 3: Since $$2\\pi \\approx 6.28$$, the major angle is about $$4.06$$ rad — significantly more than half a circle — so the major sector area is roughly $$\\tfrac{1}{2}(16)(4.06) \\approx 32.5$$ cm².\n\nKey check: if the minor is obtuse, the major must still be larger (major $$>\\pi >$$ minor in this case).", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "When integrating $$\\frac{3}{2x^3}$$, what's the critical first move, and why is it easy to forget? (3 steps)", "answer": "- Step 1: Rewrite as a negative exponent BEFORE integrating: $$\\frac{3}{2x^3} = \\frac{3}{2}x^{-3}$$.\n- Step 2: Forgetting this is easy because the expression \"looks like\" a fraction — but the power rule only applies to $$x^n$$, so the $$x$$ must be in the numerator with an exponent (possibly negative).\n- Step 3: Then apply the power rule: $$\\int \\tfrac{3}{2}x^{-3}\\,dx = \\tfrac{3}{2}\\cdot\\tfrac{x^{-2}}{-2} = -\\tfrac{3}{4}x^{-2}$$... wait, careful with the sign — if the original term is $$-\\tfrac{3}{2x^3}$$, then integrating gives $$+\\tfrac{3}{4x^2}$$ (two negatives).\n\nMantra: \"See a fraction with $$x$$ in the bottom → convert to negative power FIRST.\"", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "State the power rule for integration and explain the exception. (3 steps)", "answer": "- Step 1: $$\\int x^n\\,dx = \\frac{x^{n+1}}{n+1} + C$$, valid for any real $$n$$ EXCEPT $$n = -1$$.\n- Step 2: The exception is because if $$n = -1$$, the formula would give a denominator of $$0$$ — undefined. In fact, $$\\int x^{-1}\\,dx = \\ln|x| + C$$ (not examined in IAL P1).\n- Step 3: Constant scalar factors out: $$\\int ax^n\\,dx = \\frac{a}{n+1}x^{n+1} + C$$. Don't forget the $$+C$$ for indefinite integrals.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "Why is $$+C$$ essential for indefinite integrals, and when is it NOT needed? (3 steps)", "answer": "- Step 1: Differentiation annihilates constants: $$\\tfrac{d}{dx}(f(x) + C) = f'(x)$$ for any constant $$C$$. So any antiderivative has infinitely many \"parallel\" forms differing by a constant.\n- Step 2: The $$+C$$ represents this ambiguity: indefinite integration gives a family of functions, not a unique one.\n- Step 3: $$+C$$ is NOT needed for DEFINITE integrals $$\\int_a^b f(x)\\,dx$$, because evaluating at both endpoints cancels it: $$[F(b) + C] - [F(a) + C] = F(b) - F(a)$$.\n\nExam: losing the $$+C$$ on an indefinite integral typically costs 1 mark.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "If $$m = 2^n$$, how do you express $$2^{n+3}$$ and $$16^{3n}$$ in terms of $$m$$? (3 steps)", "answer": "- Step 1: $$2^{n+3}$$: split using the product rule of exponents: $$2^{n+3} = 2^n \\cdot 2^3 = m \\cdot 8 = 8m$$.\n- Step 2: $$16^{3n}$$: change the base from $$16$$ to $$2$$ first, since $$16 = 2^4$$: $$16^{3n} = (2^4)^{3n} = 2^{12n}$$.\n- Step 3: Rewrite $$2^{12n}$$ as a power of $$2^n$$: $$2^{12n} = (2^n)^{12} = m^{12}$$.\n\nKey insight: whenever the index is $$n + c$$ or $$cn$$, you can always rewrite using the base $$m = 2^n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Solve $$x\\sqrt{3} - 3 = x + \\sqrt{3}$$ in the form $$p + q\\sqrt{3}$$ without a calculator. Describe the method. (3 steps)", "answer": "- Step 1: Collect $$x$$-terms on one side, constants on the other: $$x(\\sqrt{3} - 1) = 3 + \\sqrt{3}$$.\n- Step 2: Divide to isolate $$x$$: $$x = \\frac{3 + \\sqrt{3}}{\\sqrt{3} - 1}$$. Rationalise by multiplying top and bottom by the conjugate $$\\sqrt{3} + 1$$.\n- Step 3: Expand numerator $$(3+\\sqrt{3})(\\sqrt{3}+1) = 3\\sqrt{3} + 3 + 3 + \\sqrt{3} = 6 + 4\\sqrt{3}$$, and denominator $$(\\sqrt{3})^2 - 1^2 = 2$$. Divide: $$x = 3 + 2\\sqrt{3}$$, giving $$p = 3, q = 2$$.\n\nThe trick: multiply by conjugate to kill the surd in the denominator via difference of squares.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "What is the \"conjugate\" of $$a + b\\sqrt{c}$$, and why does multiplying by it rationalise a denominator? (3 steps)", "answer": "- Step 1: The conjugate of $$a + b\\sqrt{c}$$ is $$a - b\\sqrt{c}$$ — same terms, opposite middle sign.\n- Step 2: Their product uses the difference-of-squares identity: $$(a + b\\sqrt{c})(a - b\\sqrt{c}) = a^2 - b^2 c$$, a RATIONAL number (no surds left).\n- Step 3: So multiplying top and bottom of a fraction by the conjugate of the denominator removes the surd while keeping the value unchanged (since you've multiplied by 1 in the form $$\\tfrac{\\text{conj}}{\\text{conj}}$$).\n\nAlways multiply BOTH top and bottom — multiplying only one changes the value.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "For the transformation $$y = f(x + 3)$$, what happens to the graph of $$y = f(x)$$, and why is the direction \"counter-intuitive\"? (3 steps)", "answer": "- Step 1: $$y = f(x + 3)$$ is a horizontal shift to the LEFT by $$3$$ units.\n- Step 2: Counter-intuitive because the $$+3$$ looks like \"add 3\" (suggesting rightward), but the effect is opposite. Reason: to get the same $$y$$-value as before, the input $$x + 3$$ must equal the original input $$x_0$$, so $$x = x_0 - 3$$ — every point moves 3 LEFT.\n- Step 3: Algebraically, replace every $$x$$-coordinate with $$x - 3$$. E.g. $$(3, 0) \\to (0, 0)$$, $$(-1, 0) \\to (-4, 0)$$, $$(0, 2) \\to (-3, 2)$$.\n\nRule of thumb: inside the bracket → horizontal, OPPOSITE direction to what's written.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Describe the effect of $$y = f(ax)$$ on the graph of $$y = f(x)$$ when $$a$$ is a positive number. What about when $$a$$ is negative? (3 steps)", "answer": "- Step 1: $$y = f(ax)$$ is a horizontal compression by scale factor $$\\tfrac{1}{|a|}$$ — points get squeezed toward the $$y$$-axis if $$|a| > 1$$, or stretched away if $$|a| < 1$$.\n- Step 2: Replace every $$x$$-coordinate with $$\\tfrac{x}{a}$$. The $$y$$-coordinate is unchanged.\n- Step 3: If $$a < 0$$, the transformation ALSO includes a reflection in the $$y$$-axis. So $$f(-3x)$$ is reflect-in-$$y$$ then compress by $$\\tfrac{1}{3}$$ (the two commute here).", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "For $$y = f(-3x)$$, apply the transformation to the points $$(-1, 0), (0, 2), (3, 0)$$ (last is a \"touch\" point). (3 steps)", "answer": "- Step 1: The rule for $$y = f(ax)$$ with $$a = -3$$ is: each $$x$$-coordinate divides by $$a = -3$$; $$y$$-coordinates unchanged.\n- Step 2: Apply:\n+ $$(-1, 0) \\to (-1/(-3), 0) = (\\tfrac{1}{3}, 0)$$\n+ $$(0, 2) \\to (0/(-3), 2) = (0, 2)$$ (unchanged — point on $$y$$-axis is fixed)\n+ $$(3, 0) \\to (3/(-3), 0) = (-1, 0)$$ (still touches, since tangency is preserved)\n- Step 3: Combined interpretation: reflect in $$y$$-axis (negates $$x$$), then compress horizontally by factor $$\\tfrac{1}{3}$$. Or apply as a single rule: $$x \\to x/(-3)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "Summarise the six basic graph transformation rules for $$y = f(x)$$ — what each does to the graph. (3 steps)", "answer": "- Step 1: OUTSIDE the $$f$$ bracket (affects $$y$$, \"intuitive\" direction):\n+ $$f(x) + a$$: shift UP by $$a$$\n+ $$af(x)$$: vertical stretch, scale factor $$a$$\n+ $$-f(x)$$: reflect in the $$x$$-axis\n\n- Step 2: INSIDE the $$f$$ bracket (affects $$x$$, \"opposite\" direction):\n+ $$f(x + a)$$: shift LEFT by $$a$$\n+ $$f(ax)$$: horizontal compression by $$\\tfrac{1}{a}$$\n+ $$f(-x)$$: reflect in the $$y$$-axis\n\n- Step 3: Memory rule: \"Inside is horizontal and OPPOSITE; outside is vertical and AS-WRITTEN.\"", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "The problem says \"$$C_1$$ and $$C_2$$ meet at a single point $$P$$\" and asks to show $$k^2 + 26k + 169 = 0$$. What mathematical trigger word should fire in your brain, and why? (3 steps)", "answer": "- Step 1: \"Meet at a single point\" = one intersection = one real solution to the simultaneous system, i.e. the quadratic obtained by equating has ONE repeated root.\n- Step 2: Repeated root ⟺ discriminant equals zero: $$\\Delta = b^2 - 4ac = 0$$.\n- Step 3: Phuc's insight: the expression to be shown has ONLY $$k$$ — and $$\\Delta = 0$$ becomes an equation purely in $$k$$ after $$x$$-coefficients are plugged in. The target containing only $$k$$ confirms the discriminant is the right tool.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Give the three trigger phrases in exam questions that indicate you should use the discriminant condition, and the corresponding discriminant sign. (3 steps)", "answer": "- Step 1: \"Meets at a single point\" / \"is a tangent to\" / \"touches\" → $$\\Delta = 0$$ (one repeated root).\n- Step 2: \"Meets at two distinct points\" / \"cuts at two points\" / \"has two distinct real solutions\" → $$\\Delta > 0$$.\n- Step 3: \"Does not intersect\" / \"never meets\" / \"has no real solutions\" → $$\\Delta < 0$$.\n\nAfter equating the two curves, rearrange to $$ax^2 + bx + c = 0$$ form, then apply the appropriate sign condition on $$\\Delta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Why does \"curves meet at a single point\" force the quadratic obtained by equating their $$y$$-values to have a REPEATED root rather than just any root? (3 steps)", "answer": "- Step 1: Setting $$y_1 = y_2$$ gives an equation whose solutions are the $$x$$-coordinates of ALL intersections.\n- Step 2: \"A single point\" means exactly one intersection, so the equation has exactly one real solution.\n- Step 3: A quadratic has exactly one real solution only when it has a REPEATED root (double root), which requires $$\\Delta = 0$$. A simple (non-repeated) root would still yield a second distinct root from the ± in the quadratic formula.\n\nGeometrically: tangency — the curve and line touch without crossing, which is the \"double-root\" algebraic manifestation.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "For the garden problem with a sector $$BDE$$ of radius 6, angle $$\\angle EBD = 1.3$$ rad, what is the area of the sector? Give a conceptual walkthrough.", "answer": "Apply $$A = \\tfrac{1}{2}r^2\\theta = \\tfrac{1}{2}(6)^2(1.3) = 18 \\times 1.3 = 23.4$$ m². The angle MUST be in radians for this formula; $$1.3$$ rad is clearly in radians (no degree symbol, and the value is well below $$2\\pi$$). If it were degrees it would need converting first — always check units.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "In a diagram, points $$A, B, C$$ are collinear, and at $$B$$ the angles are $$\\angle ABE$$, $$\\angle EBD = 1.3$$ rad, and $$\\angle DBC = \\tfrac{\\pi}{2}$$. How do you find $$\\angle ABE$$? (3 steps)", "answer": "- Step 1: Angles on a straight line sum to $$\\pi$$ rad (i.e. $$180°$$). Since $$A, B, C$$ are collinear, the angles at $$B$$ between rays $$BA$$ and $$BC$$ must sum to $$\\pi$$.\n- Step 2: $$\\angle ABE + \\angle EBD + \\angle DBC = \\pi \\Rightarrow \\angle ABE + 1.3 + \\tfrac{\\pi}{2} = \\pi$$.\n- Step 3: Solve: $$\\angle ABE = \\pi - \\tfrac{\\pi}{2} - 1.3 = \\tfrac{\\pi}{2} - 1.3 \\approx 0.27$$ rad.\n\nKey idea: use the straight-line constraint to extract the missing angle.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "State the SAS (two sides + included angle) formula for the area of a triangle, and contrast it with the $$\\tfrac{1}{2} \\times \\text{base} \\times \\text{height}$$ version. (3 steps)", "answer": "- Step 1: SAS formula: $$\\text{Area} = \\tfrac{1}{2}ab\\sin C$$, where $$a$$ and $$b$$ are the two sides and $$C$$ is the angle BETWEEN them (the included angle).\n- Step 2: The classic formula $$\\tfrac{1}{2} \\times \\text{base} \\times \\text{height}$$ needs a perpendicular height, which often requires a separate calculation.\n- Step 3: SAS is derived from the classic: if one side is the base $$a$$ and the other side $$b$$ makes angle $$C$$ with it, then the perpendicular height is $$b\\sin C$$, giving $$\\tfrac{1}{2}a \\cdot b\\sin C$$.\n\nUse SAS whenever you have two sides and the angle between them.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "In a right-angled triangle with hypotenuse $$h = 6$$ and adjacent angle $$\\theta = 1.3$$ rad, how do you express the two legs? (3 steps)", "answer": "- Step 1: For a right triangle, with $$\\theta$$ one of the non-right angles:\n+ adjacent leg $$= h\\cos\\theta$$\n+ opposite leg $$= h\\sin\\theta$$\n- Step 2: These come from SOH-CAH-TOA: $$\\cos\\theta = \\tfrac{\\text{adjacent}}{\\text{hypotenuse}}$$, $$\\sin\\theta = \\tfrac{\\text{opposite}}{\\text{hypotenuse}}$$.\n- Step 3: So: adjacent $$= 6\\cos(1.3) \\approx 1.6$$; opposite $$= 6\\sin(1.3) \\approx 5.8$$.\n\nNote: $$1.3$$ rad is close to $$\\tfrac{\\pi}{2} \\approx 1.57$$, so the angle is close to $$90°$$ — hence opposite is close to the full hypotenuse.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "For a region $$R$$ bounded by a curve $$C$$ (with $$R$$ above $$C$$), a line $$l$$ (with $$R$$ below $$l$$), and the $$x$$-axis (with $$R$$ above it), how do you write the three inequalities? (3 steps)", "answer": "- Step 1: \"$$R$$ above the $$x$$-axis\" ⟹ $$y \\ge 0$$.\n- Step 2: \"$$R$$ below the line\" ⟹ $$y \\le (\\text{line equation})$$.\n- Step 3: \"$$R$$ above the curve\" ⟹ $$y \\ge (\\text{curve equation})$$.\n\nVerification: pick any sample point inside $$R$$ and check it satisfies all three. Common trap: writing $$y \\le$$ (curve) when $$R$$ is above — Phuc's exact mistake.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "If a region $$R$$ sits between a curve (the floor) and a line (the ceiling), how do you determine which inequality sign to use for the curve? (3 steps)", "answer": "- Step 1: The \"floor\" curve means $$R$$ lies ABOVE it. For points above the curve, the $$y$$-coordinate is larger than the curve's $$y$$-value at that $$x$$.\n- Step 2: So the inequality is $$y \\ge \\text{curve}$$ (not $$\\le$$).\n- Step 3: Sanity check: pick an $$x$$ in the region, compute the curve's $$y$$, and note the sample point has a larger $$y$$. If yes, confirms $$y \\ge$$; if smaller, flip to $$y \\le$$.\n\nMnemonic: \"above\" on the graph = $$\\ge$$ for $$y$$; \"below\" = $$\\le$$.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "For $$f(x) = 2x^3 - kx^2 + 14x + 24$$, give the formulas for $$f'(x)$$ and $$f''(x)$$ in terms of $$x$$ and $$k$$. (2 steps)", "answer": "- Step 1: Differentiate term by term using $$\\tfrac{d}{dx}(x^n) = nx^{n-1}$$:\n+ $$\\tfrac{d}{dx}(2x^3) = 6x^2$$\n+ $$\\tfrac{d}{dx}(-kx^2) = -2kx$$\n+ $$\\tfrac{d}{dx}(14x) = 14$$\n+ $$\\tfrac{d}{dx}(24) = 0$$\n\nSo $$f'(x) = 6x^2 - 2kx + 14$$.\n\n- Step 2: Differentiate $$f'$$ to get $$f''(x) = 12x - 2k$$ (power rule again; constants drop to zero).", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "If a point $$A$$ lies on BOTH $$y = f'(x)$$ and $$y = f''(x)$$, and its $$x$$-coordinate is $$x_A = 5$$, how do you find the unknown constant $$k$$? (3 steps)", "answer": "- Step 1: \"$$A$$ on both curves\" means $$f'(5) = f''(5)$$ — the two curves have the same $$y$$-value at $$x = 5$$.\n- Step 2: Plug $$x = 5$$ into both expressions and equate. If $$f'(x) = 6x^2 - 2kx + 14$$ and $$f''(x) = 12x - 2k$$, then $$f'(5) = 164 - 10k$$ and $$f''(5) = 60 - 2k$$.\n- Step 3: Solve: $$164 - 10k = 60 - 2k \\Rightarrow 8k = 104 \\Rightarrow k = 13$$.\n\nThe \"aha\" moment Phuc missed: substituting the point's $$x$$ into both expressions and setting equal gives one equation in one unknown.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "After finding $$k = 13$$, how would you locate the OTHER intersection point $$B$$ of $$f'(x)$$ and $$f''(x)$$, knowing $$x_A = 5$$ is one intersection? (3 steps)", "answer": "- Step 1: Set $$f'(x) = f''(x)$$ with $$k = 13$$: $$6x^2 - 26x + 14 = 12x - 26$$, rearranging to $$3x^2 - 19x + 20 = 0$$.\n- Step 2: You know $$x = 5$$ is a root, so $$(x - 5)$$ is a factor: $$3x^2 - 19x + 20 = (x - 5)(3x - 4)$$.\n- Step 3: The other root is $$x = \\tfrac{4}{3}$$. Substitute into the simpler $$f''$$: $$y = 12 \\cdot \\tfrac{4}{3} - 26 = -10$$. So $$B = (\\tfrac{4}{3}, -10)$$.\n\nStrategy: knowing one root lets you factor and reduce the quadratic to the other root instantly.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "You're told $$C_1: y = x(4 - x^2)$$ and $$C_2: y = \\tfrac{A}{x}$$ meet, and intersections satisfy $$x^4 - 4x^2 + A = 0$$. For them to meet at 4 distinct points, why is the discriminant condition alone NOT sufficient? (3 steps)", "answer": "- Step 1: Substitute $$y = x^2$$ to get a quadratic in $$y$$: $$y^2 - 4y + A = 0$$.\n- Step 2: For 4 distinct real $$x$$, you need TWO distinct $$y$$-values (each non-zero positive $$y$$ gives $$x = \\pm\\sqrt{y}$$, two roots). The discriminant $$\\Delta > 0$$ only guarantees two distinct $$y$$'s — it says nothing about whether those $$y$$'s are positive.\n- Step 3: If a $$y$$-root is NEGATIVE, then $$x^2 = y < 0$$ has NO real solution, so that root contributes zero $$x$$-values. You need BOTH $$y$$-roots strictly positive.\n\nPhuc's trap: he got $$\\Delta > 0 \\Rightarrow A < 4$$ but forgot to impose $$A > 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "For the quadratic $$y^2 - 4y + A = 0$$, describe the three conditions that must hold for both roots to be real, distinct, and POSITIVE. (3 steps)", "answer": "- Step 1: Distinct real roots: discriminant $$\\Delta > 0 \\Rightarrow 16 - 4A > 0 \\Rightarrow A < 4$$.\n- Step 2: Both roots positive — use Vieta: product of roots $$= \\tfrac{c}{a} = A$$, so product $$> 0 \\Rightarrow A > 0$$.\n- Step 3: Sum of roots positive: sum $$= -\\tfrac{b}{a} = 4 > 0$$, automatically satisfied.\n\nCombining: $$0 < A < 4$$. All three sign conditions together rule out cases where a root is zero or negative.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "State Vieta's formulas for a quadratic $$ax^2 + bx + c = 0$$, and explain why they're useful for checking signs of roots without solving. (3 steps)", "answer": "- Step 1: Sum of roots: $$\\alpha + \\beta = -\\tfrac{b}{a}$$.\n- Step 2: Product of roots: $$\\alpha\\beta = \\tfrac{c}{a}$$.\n- Step 3: Usage for sign checks without root-finding:\n+ Both roots positive: SUM $$> 0$$ AND PRODUCT $$> 0$$.\n+ Both roots negative: SUM $$< 0$$ AND PRODUCT $$> 0$$.\n+ Opposite signs: PRODUCT $$< 0$$.\n+ One root zero: PRODUCT $$= 0$$.\n\nVery useful for showing parameter ranges where the roots have desired properties.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "The line $$l_2$$ passes through point $$A(4, 2)$$ and is PARALLEL to the $$x$$-axis. What is the equation of $$l_2$$?", "answer": "A line parallel to the $$x$$-axis is HORIZONTAL — it has zero gradient and a constant $$y$$-value. Since $$l_2$$ passes through $$(4, 2)$$, its $$y$$-value everywhere is $$2$$. So $$l_2: y = 2$$. Similarly, \"parallel to $$y$$-axis through $$(a, b)$$\" means $$x = a$$. This is a quick one-line translation that Phuc initially missed.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "State the distance formula between two points $$(x_1, y_1)$$ and $$(x_2, y_2)$$, and explain its geometric origin. (3 steps)", "answer": "- Step 1: Formula: $$d = \\sqrt{(x_2 - x_1)^2 + (y_2 - y_1)^2}$$.\n- Step 2: It comes directly from Pythagoras: the horizontal leg is $$|x_2 - x_1|$$, the vertical leg is $$|y_2 - y_1|$$, and the line between the points is the hypotenuse of that right triangle.\n- Step 3: The squaring makes signs irrelevant (distances are non-negative), which is why we square the differences rather than using absolute values.\n\nUsage: $$B = (15, 7)$$, $$C = (x, 2)$$, $$BC = 5\\sqrt{5}$$: $$(15 - x)^2 + 25 = 125 \\Rightarrow x = 5$$ or $$x = 25$$.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "For a triangle with a horizontal base (on a line $$y = c$$), why is it easy to compute the area using $$\\tfrac{1}{2} \\times \\text{base} \\times \\text{height}$$? (3 steps)", "answer": "- Step 1: When the base lies on a horizontal line $$y = c$$, the perpendicular height from the apex to the base is simply the VERTICAL distance from the apex to the line.\n- Step 2: If the apex is at $$(x_0, y_0)$$ and the base is on $$y = c$$, the perpendicular height is $$|y_0 - c|$$ — no trigonometry needed.\n- Step 3: E.g. base $$AC$$ on $$y = 2$$, apex $$B = (15, 7)$$ → height is $$|7 - 2| = 5$$. Area $$= \\tfrac{1}{2}|AC| \\cdot 5$$.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "For $$y = 12\\sin(x + B)$$, at a minimum the value of $$\\sin$$ must equal what? And what is the $$y$$-value at any minimum? (3 steps)", "answer": "- Step 1: The range of $$\\sin\\theta$$ is $$[-1, 1]$$. Scaling by 12 gives $$y \\in [-12, 12]$$.\n- Step 2: Minimum of $$y = 12\\sin(\\ldots)$$ occurs when the inner $$\\sin(\\ldots) = -1$$ (its smallest value), giving $$y_{\\min} = 12 \\times (-1) = -12$$.\n- Step 3: The minimum $$y$$-value is $$-12$$, REGARDLESS of $$B$$ — $$B$$ only shifts the location (the $$x$$-value at which min occurs), not the minimum value itself.\n\nCommon confusion Phuc had: confusing $$\\sin = 1$$ (max) with $$\\sin = -1$$ (min).", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "$$\\sin\\theta = -1$$ when $$\\theta$$ equals what, in general form? (3 steps)", "answer": "- Step 1: $$\\sin\\theta = -1$$ at the bottom of the unit circle, where the point is $$(0, -1)$$.\n- Step 2: The principal angle is $$\\theta = \\tfrac{3\\pi}{2}$$ (equivalently $$-\\tfrac{\\pi}{2}$$).\n- Step 3: By periodicity of sine (period $$2\\pi$$), general solution: $$\\theta = \\tfrac{3\\pi}{2} + 2n\\pi$$ for any integer $$n$$.\n\nComplement: $$\\sin\\theta = 1$$ at $$\\theta = \\tfrac{\\pi}{2} + 2n\\pi$$; $$\\cos\\theta = 1$$ at $$\\theta = 2n\\pi$$; $$\\cos\\theta = -1$$ at $$\\theta = \\pi + 2n\\pi$$.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "For $$y = 12\\sin(x + B)$$ with $$B > 0$$, and the minimum with SMALLEST POSITIVE $$x$$ at $$x = \\tfrac{\\pi}{4}$$, find the smallest positive value of $$B$$. (3 steps)", "answer": "- Step 1: At a minimum, the inner argument equals $$\\tfrac{3\\pi}{2} + 2n\\pi$$: $$x + B = \\tfrac{3\\pi}{2} + 2n\\pi$$.\n- Step 2: Substitute $$x = \\tfrac{\\pi}{4}$$: $$\\tfrac{\\pi}{4} + B = \\tfrac{3\\pi}{2} + 2n\\pi \\Rightarrow B = \\tfrac{5\\pi}{4} + 2n\\pi$$.\n- Step 3: The smallest positive $$B$$ corresponds to $$n = 0$$, giving $$B = \\tfrac{5\\pi}{4}$$. For $$n = -1$$: $$B = -\\tfrac{3\\pi}{4} < 0$$ (rejected).\n\nGeneral pattern: set inner argument equal to the min/max-location general solution, solve for $$B$$, pick the right branch.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "A triangle has $$AB = 15$$ cm, $$AC = 25$$ cm, and area 100 cm². How do you find $$\\sin\\theta$$ where $$\\theta = \\angle BAC$$? (3 steps)", "answer": "- Step 1: Use the SAS area formula: $$\\text{Area} = \\tfrac{1}{2}AB \\cdot AC \\cdot \\sin\\theta$$.\n- Step 2: Substitute known values: $$100 = \\tfrac{1}{2}(15)(25)\\sin\\theta = 187.5 \\sin\\theta$$.\n- Step 3: Solve: $$\\sin\\theta = \\tfrac{100}{187.5} = \\tfrac{8}{15}$$.\n\nNote this gives the sine but doesn't uniquely determine $$\\theta$$ — there are two possibilities (acute and obtuse) since $$\\sin(180° - \\theta) = \\sin\\theta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "Given $$\\sin\\theta = \\tfrac{8}{15}$$ and $$\\theta > 90°$$ (obtuse), how do you find $$\\cos\\theta$$ with the correct sign? (3 steps)", "answer": "- Step 1: Use the Pythagorean identity: $$\\sin^2\\theta + \\cos^2\\theta = 1 \\Rightarrow \\cos^2\\theta = 1 - \\tfrac{64}{225} = \\tfrac{161}{225}$$, so $$\\cos\\theta = \\pm\\tfrac{\\sqrt{161}}{15}$$.\n- Step 2: The ± gives two candidates. Obtuse angles (between $$90°$$ and $$180°$$) live in the second quadrant, where cosine is NEGATIVE.\n- Step 3: So $$\\cos\\theta = -\\tfrac{\\sqrt{161}}{15}$$.\n\nKey: once you have $$\\sin$$, use the identity to get $$|\\cos|$$, then use the angle's range (acute/obtuse) to pick the sign.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "For the substitution $$p = 2^x$$, express each of these in terms of $$p$$: (i) $$2 \\cdot 4^x$$, (ii) $$2^{x+3}$$, (iii) $$17 \\cdot 2^{x-1}$$. (3 steps)", "answer": "- Step 1: $$2 \\cdot 4^x$$: rewrite $$4 = 2^2$$, so $$4^x = (2^2)^x = (2^x)^2 = p^2$$. Thus $$2 \\cdot 4^x = 2p^2$$.\n- Step 2: $$2^{x+3} = 2^x \\cdot 2^3 = 8p$$ (pull the constant exponent out as a scalar factor).\n- Step 3: $$17 \\cdot 2^{x-1} = 17 \\cdot 2^x \\cdot 2^{-1} = \\tfrac{17p}{2}$$.\n\nMantra: if every term can be written as a scalar times $$p^k$$, the substitution reduces a transcendental equation to a polynomial one.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "After substituting $$p = 2^x$$ into an equation, you get $$4p^2 - 33p + 8 = 0$$, factorising to $$(4p - 1)(p - 8) = 0$$. How do you recover the values of $$x$$? (3 steps)", "answer": "- Step 1: Solve for $$p$$: $$p = \\tfrac{1}{4}$$ or $$p = 8$$.\n- Step 2: Back-substitute $$p = 2^x$$ and match to powers of 2:\n+ $$2^x = 8 = 2^3 \\Rightarrow x = 3$$\n+ $$2^x = \\tfrac{1}{4} = 2^{-2} \\Rightarrow x = -2$$\n- Step 3: Both values are valid because $$2^x > 0$$ always, and both $$\\tfrac{1}{4}$$ and $$8$$ are positive. A negative or zero $$p$$-root would be REJECTED.\n\nCommon matches: $$\\tfrac{1}{2} = 2^{-1}, \\tfrac{1}{4} = 2^{-2}, \\tfrac{1}{8} = 2^{-3}, 4 = 2^2, 8 = 2^3, 16 = 2^4$$.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "In a composite \"platform\" shape with an inner sector $$DOC$$ (radius $$DO$$) and outer sector centred at $$O$$ (radius $$AO$$), $$\\angle AOB = 0.8$$ rad, arc $$CD = 9$$ m, and ratio $$DA:AO = 3:5$$, how do you find $$AO$$? (3 steps)", "answer": "- Step 1: Introduce a variable from the ratio: let $$DA = 3x$$ and $$AO = 5x$$, so the inner radius $$DO = DA + AO = 8x$$.\n- Step 2: The arc $$CD$$ lies on the inner circle of radius $$8x$$ with angle $$0.8$$ rad. Using $$\\ell = r\\theta$$: $$9 = 8x \\cdot 0.8 = 6.4x$$.\n- Step 3: Solve: $$x = \\tfrac{9}{6.4} = 1.40625$$, so $$AO = 5x \\approx 7.03$$ m.\n\nKey insight: a single unknown $$x$$ parameterises the ratio, and ONE additional equation (the arc length) pins it down.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "A platform has inner sector $$DOC$$ (angle $$0.8$$ rad) and outer MAJOR sector $$AOBEA$$ (angle $$2\\pi - 0.8$$). Describe how to assemble the total PERIMETER. (4 steps)", "answer": "- Step 1: Identify all boundary pieces:\n+ Outer major arc $$AEB$$ (outer radius × major angle)\n+ Inner arc $$DC$$ (given as 9 m)\n+ Two straight segments $$DA$$ and $$BC$$ (the \"ring-width\" on each side)\n\n- Step 2: Use $$\\ell = r\\theta$$ for each arc. For the major, angle $$= 2\\pi - 0.8 \\approx 5.48$$ rad.\n\n- Step 3: Each straight segment = $$DA = 3x$$ (since $$AO = 5x$$ and $$DO = 8x$$). Both left and right straights have the same length.\n\n- Step 4: Sum all four pieces. Don't count INTERNAL boundaries — only the external perimeter.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "For the platform problem (outer radius $$\\approx 7.03$$, inner radius $$\\approx 11.25$$, outer major angle $$\\approx 5.48$$ rad, inner minor angle $$0.8$$ rad), how do you compute the TOTAL AREA? (3 steps)", "answer": "- Step 1: Total area = outer major sector area + inner minor sector area (depending on the exact geometry of how they join).\n- Step 2: Apply $$A = \\tfrac{1}{2}r^2\\theta$$ to each:\n+ Outer: $$\\tfrac{1}{2}(7.03)^2(5.48) \\approx 135.5$$ m²\n+ Inner: $$\\tfrac{1}{2}(11.25)^2(0.8) \\approx 50.6$$ m²\n- Step 3: Sum: $$\\approx 186$$ m².\n\nWatch the radii: outer radius $$= AO = 5x$$; inner radius $$= DO = 8x$$ (larger because it extends beyond) — counter-intuitive but forced by the geometry.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "When given $$f'(x) = 4x^{3/2} + \\tfrac{k}{x^2}$$ and need to find $$f$$ AND determine $$k$$, explain why the ORDER matters: solve for $$k$$ first, then integrate. (3 steps)", "answer": "- Step 1: Approach A (integrate first): get $$f(x) = \\tfrac{8}{5}x^{5/2} - \\tfrac{k}{x} + C$$ — now TWO unknowns ($$k$$ and $$C$$), and only one equation (point on curve). Stuck.\n- Step 2: Approach B ($$k$$ first): the extra condition $$f''(P) = 0$$ involves only $$k$$, not $$C$$ (differentiation kills constants). Solve for $$k$$ in isolation using this.\n- Step 3: Then integrate with $$k$$ known, and use the point $$P$$ on the curve to find $$C$$ — one unknown at a time.\n\nGeneral principle: when you have multiple conditions, exploit the one with FEWER unknowns first.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "Given $$f'(x) = 4x^{3/2} + kx^{-2}$$ and $$f''(x)$$ has a zero at $$x = 2$$, describe how to find $$k$$. (3 steps)", "answer": "- Step 1: Differentiate $$f'$$ to get $$f''$$: $$f''(x) = 6x^{1/2} - 2kx^{-3}$$ (power rule: $$\\tfrac{d}{dx}(x^{3/2}) = \\tfrac{3}{2}x^{1/2}$$, so $$\\tfrac{d}{dx}(4x^{3/2}) = 6x^{1/2}$$).\n- Step 2: Set $$f''(2) = 0$$: $$6\\sqrt{2} - \\tfrac{2k}{8} = 0 \\Rightarrow 6\\sqrt{2} = \\tfrac{k}{4}$$.\n- Step 3: Solve: $$k = 24\\sqrt{2}$$.\n\nKey: $$x^{1/2} = \\sqrt{x}$$, so $$2^{1/2} = \\sqrt{2}$$; and $$x^{-3}$$ at $$x = 2$$ is $$\\tfrac{1}{8}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "After finding $$k = 24\\sqrt{2}$$, and knowing $$f'(x) = 4x^{3/2} + 24\\sqrt{2} \\cdot x^{-2}$$ with $$P = (2, 8\\sqrt{2})$$ on $$y = f(x)$$, sketch the method to find $$f(x)$$. (3 steps)", "answer": "- Step 1: Integrate $$f'$$ term by term: $$\\int 4x^{3/2}\\,dx = \\tfrac{8}{5}x^{5/2}$$; $$\\int 24\\sqrt{2}\\,x^{-2}\\,dx = -24\\sqrt{2}\\,x^{-1}$$. So $$f(x) = \\tfrac{8}{5}x^{5/2} - \\tfrac{24\\sqrt{2}}{x} + C$$.\n- Step 2: Substitute $$P = (2, 8\\sqrt{2})$$, using $$2^{5/2} = 4\\sqrt{2}$$: $$f(2) = \\tfrac{32\\sqrt{2}}{5} - 12\\sqrt{2} + C$$.\n- Step 3: Set $$f(2) = 8\\sqrt{2}$$ and solve: $$C = 8\\sqrt{2} + 12\\sqrt{2} - \\tfrac{32\\sqrt{2}}{5} = \\tfrac{100\\sqrt{2} - 32\\sqrt{2}}{5} = \\tfrac{68\\sqrt{2}}{5}$$.\n\nFinal: $$f(x) = \\tfrac{8}{5}x^{5/2} - \\tfrac{24\\sqrt{2}}{x} + \\tfrac{68\\sqrt{2}}{5}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": false}, {"question": "For $$a = \\tfrac{1}{64}x^2$$ and $$b = \\tfrac{16}{\\sqrt{x}}$$, computing $$\\tfrac{16}{b^3}$$ in the form $$kx^n$$ — what's the key step Phuc missed, and why does it matter? (3 steps)", "answer": "- Step 1: Rewrite $$b$$ as a $$kx^n$$ form first: $$b = 16 x^{-1/2}$$.\n- Step 2: Compute $$b^3$$ — the exponent applies to EVERY factor: $$b^3 = 16^3 (x^{-1/2})^3 = 4096 x^{-3/2}$$. Phuc's mistake was cubing 16 but forgetting to cube $$x^{-1/2}$$.\n- Step 3: Then $$\\tfrac{16}{b^3} = \\tfrac{16}{4096 x^{-3/2}} = \\tfrac{1}{256} x^{3/2}$$ (using $$\\tfrac{1}{x^{-3/2}} = x^{3/2}$$).\n\nGolden rule: $$(ab)^n = a^n b^n$$. EVERY factor in a product gets the exponent.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": false}, {"question": "What does $$\\left(\\tfrac{A}{B}\\right)^{-n}$$ equal, and why? (3 steps)", "answer": "- Step 1: A negative exponent means \"reciprocal to the positive power\": $$X^{-n} = \\tfrac{1}{X^n}$$.\n- Step 2: Applied to a fraction: $$\\left(\\tfrac{A}{B}\\right)^{-n} = \\left(\\tfrac{B}{A}\\right)^n$$ — FLIP the fraction and raise to the positive exponent.\n- Step 3: Why: $$\\left(\\tfrac{A}{B}\\right)^{-n} = \\tfrac{1}{(A/B)^n} = \\tfrac{1}{A^n/B^n} = \\tfrac{B^n}{A^n}$$.\n\nUsed constantly: whenever you see a negative exponent on a fraction, FLIP FIRST, then raise to the positive power.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "Explain the general strategy for a question that asks for the NUMBER of real solutions to an equation like $$f(x) = g(x)$$, when a sketch of $$f$$ (or $$g$$) is already given. (3 steps)", "answer": "- Step 1: Recognise that \"real solutions of $$f(x) = g(x)$$\" ⟺ \"intersection points of $$y = f(x)$$ and $$y = g(x)$$\".\n- Step 2: If one graph (say $$f$$) is already sketched, OVERLAY the other graph ($$g$$) on the same axes — or mentally picture it.\n- Step 3: COUNT the intersection points. The answer is usually a small integer. No algebra needed if the graphs are simple and well-separated.\n\n\"Hence\" word cue: the question expects you to use the previous sketch — don't re-derive from scratch.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": true}, {"question": "For the equation $$(x+2)(x^3 + 4x^2 + 4x) = 1$$, explain the rearrangement that turns it into an intersection-counting problem, given $$x^3 + 4x^2 + 4x = x(x+2)^2$$. (3 steps)", "answer": "- Step 1: Divide both sides by $$(x + 2)$$ (assuming $$x \\neq -2$$; anyway $$x = -2$$ gives 0 on the left): $$x^3 + 4x^2 + 4x = \\tfrac{1}{x+2}$$.\n- Step 2: This is now \"curve = curve\", where curve 1 is the cubic $$y = x(x+2)^2$$ and curve 2 is the hyperbola $$y = \\tfrac{1}{x+2}$$ (vertical asymptote at $$x = -2$$).\n- Step 3: Number of real solutions = number of intersections. By sketching, one intersection on each side of the asymptote → 2 real solutions.\n\nKey conceptual move: rewrite equation as \"something = hyperbola\" when a hyperbola is the \"hint\" graph.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": true}, {"question": "The cubic $$y = x(x+2)^2$$ has a double-root factor $$(x+2)^2$$. What's the geometric effect at $$x = -2$$? (3 steps)", "answer": "- Step 1: A single root $$(x - a)$$ means the curve CROSSES the $$x$$-axis at $$x = a$$ (sign changes).\n- Step 2: A double (repeated) root $$(x - a)^2$$ means the curve TOUCHES the $$x$$-axis at $$x = a$$ without crossing — reaches $$y = 0$$ and bounces back (sign doesn't change).\n- Step 3: So for $$y = x(x+2)^2$$: at $$x = 0$$ (single), crosses; at $$x = -2$$ (double), touches. The curve dips to touch at $$(-2, 0)$$ and returns.\n\nTouches are preserved under transformations because the factorisation structure survives.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": true}, {"question": "In the roof-frame question ($$\\triangle BCD$$: $$BD = x$$, $$CD = 1+x$$, $$BC = 5$$, $$\\angle BCD = \\theta$$), derive $$\\cos\\theta = \\tfrac{13+x}{5+5x}$$. (3 steps)", "answer": "- Step 1: Apply the Cosine Rule with $$BD$$ opposite $$\\theta$$: $$x^2 = 25 + (1+x)^2 - 10(1+x)\\cos\\theta$$.\n- Step 2: Expand $$(1+x)^2 = 1 + 2x + x^2$$ and substitute: $$x^2 = 25 + 1 + 2x + x^2 - 10(1+x)\\cos\\theta$$. The $$x^2$$ terms cancel: $$10(1+x)\\cos\\theta = 26 + 2x$$.\n- Step 3: Rearrange: $$\\cos\\theta = \\tfrac{26 + 2x}{10(1+x)} = \\tfrac{2(13+x)}{10(1+x)} = \\tfrac{13+x}{5(1+x)} = \\tfrac{13+x}{5+5x}$$.\n\nKey moves: expand, cancel like terms, factor out 2, simplify.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": true}, {"question": "For the roof frame, when $$ADC$$ is a STRAIGHT LINE, what's the relationship between $$\\angle BDA$$ and $$\\angle BDC$$, and why does it matter for sine calculations? (3 steps)", "answer": "- Step 1: Points on a straight line: $$\\angle BDA + \\angle BDC = 180°$$ — SUPPLEMENTARY.\n- Step 2: The sine of supplementary angles is equal: $$\\sin(180° - \\theta) = \\sin\\theta$$. So $$\\sin(\\angle BDA) = \\sin(\\angle BDC)$$.\n- Step 3: This means if you compute $$\\sin(\\angle BDC)$$ using triangle $$BCD$$, you ALSO have $$\\sin(\\angle BDA)$$ for triangle $$BDA$$ — no need to find the actual angle.\n\nBe careful with COSINE: $$\\cos(180° - \\theta) = -\\cos\\theta$$ — sign flip.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": false}, {"question": "Two curves $$C_1: y = \\tfrac{15}{2x} + 5$$ and $$C_2: y = x^3 - \\tfrac{7}{2}x + 5$$. Derive the quartic equation for their intersection $$x$$-values. (3 steps)", "answer": "- Step 1: Equate: $$\\tfrac{15}{2x} + 5 = x^3 - \\tfrac{7}{2}x + 5$$. The $$+5$$'s cancel: $$\\tfrac{15}{2x} = x^3 - \\tfrac{7}{2}x$$.\n- Step 2: Multiply through by $$2x$$ (valid since $$x \\neq 0$$): $$15 = 2x^4 - 7x^2$$.\n- Step 3: Rearrange: $$2x^4 - 7x^2 - 15 = 0$$.\n\nTwo traps: (i) cancel the $$+5$$'s EARLY, (ii) multiplying by $$2x$$ could introduce extraneous roots at $$x = 0$$, but $$x = 0$$ isn't a solution of the original anyway.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": false}, {"question": "Explain the biquadratic substitution $$u = x^2$$ for an equation like $$2x^4 - 7x^2 - 15 = 0$$, and why you need to check the sign of each $$u$$-root. (3 steps)", "answer": "- Step 1: The equation has only even powers of $$x$$. Let $$u = x^2$$, so $$x^4 = u^2$$. The equation becomes $$2u^2 - 7u - 15 = 0$$, a quadratic.\n- Step 2: Factor: $$(2u + 3)(u - 5) = 0 \\Rightarrow u = -\\tfrac{3}{2}$$ or $$u = 5$$.\n- Step 3: Back-substitute $$u = x^2$$:\n+ $$u = 5$$: $$x^2 = 5 \\Rightarrow x = \\pm\\sqrt{5}$$ — TWO real solutions.\n+ $$u = -\\tfrac{3}{2}$$: $$x^2 < 0$$ has NO real solution. REJECT.\n\nKey: $$x^2$$ can only equal a non-negative number, so NEGATIVE $$u$$-roots are always rejected.", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": true}, {"question": "For a region $$R$$ bounded by (i) the $$x$$-axis, (ii) a line $$l$$, (iii) the $$y$$-axis, and (iv) a curve $$C$$, how many inequalities do you need, and how do you determine each sign? (3 steps)", "answer": "- Step 1: One inequality per boundary — so FOUR inequalities.\n- Step 2: Sketch $$R$$ carefully. For each boundary:\n+ Above/below (horizontal features like $$x$$-axis or $$y = f(x)$$): above → $$y \\ge$$; below → $$y \\le$$.\n+ Left/right (vertical features like $$y$$-axis or $$x = a$$): right → $$x \\ge$$; left → $$x \\le$$.\n- Step 3: Verify with a sample point inside $$R$$ — it must satisfy ALL four. If one fails, flip that inequality.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": false}, {"question": "For $$f(x) = 2x^2 - 12x + 14$$, complete the square into the form $$a(x+b)^2 + c$$. (3 steps)", "answer": "- Step 1: Factor the leading coefficient out of $$x^2$$ and $$x$$ terms: $$f(x) = 2(x^2 - 6x) + 14$$.\n- Step 2: Complete the square inside the bracket: $$x^2 - 6x = (x - 3)^2 - 9$$ (halve the $$x$$-coefficient, square, subtract). Substitute: $$f(x) = 2((x-3)^2 - 9) + 14 = 2(x-3)^2 - 4$$.\n- Step 3: In the form $$a(x+b)^2 + c$$: $$a = 2, b = -3, c = -4$$.\n\nAlways factor the leading coefficient out FIRST (from only the $$x^2$$ and $$x$$ terms), then complete the square inside.", "source": "Opus 4.7 ②", "_id": "opus_2_66", "judge_pick": false}, {"question": "What is the vertex (minimum if $$a > 0$$) of the parabola $$y = a(x - h)^2 + k$$, and why? (3 steps)", "answer": "- Step 1: $$(x - h)^2 \\ge 0$$ for all $$x$$, with equality iff $$x = h$$.\n- Step 2: So $$a(x - h)^2 \\ge 0$$ (for $$a > 0$$), meaning the minimum of this term is $$0$$ at $$x = h$$.\n- Step 3: Thus $$y = a(x-h)^2 + k$$ has minimum value $$k$$ at $$x = h$$, giving the vertex $$(h, k)$$. For $$a < 0$$, this becomes the maximum.\n\nExample: $$2(x-3)^2 - 4$$ has minimum vertex at $$(3, -4)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_67", "judge_pick": true}, {"question": "Describe the formula for the gradient of the line through two points $$(x_1, y_1)$$ and $$(x_2, y_2)$$, and derive the line equation. (3 steps)", "answer": "- Step 1: Gradient: $$m = \\tfrac{y_2 - y_1}{x_2 - x_1}$$ — rise over run, measuring rate of vertical change per unit horizontal change.\n- Step 2: Line equation in point-gradient form: $$y - y_1 = m(x - x_1)$$. Passes through $$(x_1, y_1)$$ with correct slope.\n- Step 3: Expand to $$y = mx + c$$ form: $$c = y_1 - mx_1$$.\n\nExample: line through $$(-1, 28)$$ and $$(3, -4)$$: $$m = \\tfrac{-32}{4} = -8$$. Then $$y = -8x + 20$$.", "source": "Opus 4.7 ②", "_id": "opus_2_68", "judge_pick": false}, {"question": "When students (like Phuc) compute an expression like $$(16 x^{-1/2})^3$$, why do they often forget to cube the $$x^{-1/2}$$? (3 steps)", "answer": "- Step 1: Cognitive trap: when looking at \"16\" (a plain number) and \"$$x^{-1/2}$$\" (an expression), the numerical part is processed first (\"$$16^3 = 4096$$\") and the expression feels \"carried along unchanged\".\n- Step 2: But the rule $$(AB)^n = A^n B^n$$ applies to EVERY factor. So $$(16 \\cdot x^{-1/2})^3 = 16^3 \\cdot (x^{-1/2})^3 = 4096 x^{-3/2}$$.\n- Step 3: Defensive habit: write EACH factor explicitly with its own exponent before simplifying. Cubing just one factor creates a mismatch you can often catch with a test value (e.g. $$x = 1$$).", "source": "Opus 4.7 ②", "_id": "opus_2_69", "judge_pick": true}, {"question": "Compare the \"inside the bracket\" vs \"outside the bracket\" effect for graph transformations of $$y = f(x)$$. Why do they act on different axes and in opposite directions? (3 steps)", "answer": "- Step 1: OUTSIDE the bracket: transformations act on $$y$$ directly — e.g. $$f(x) + 3$$ adds 3 to every $$y$$, shifting UP. \"Do what it says\".\n- Step 2: INSIDE the bracket: transformations act on $$x$$ INVERSELY — e.g. $$f(x + 3)$$ shifts LEFT by 3. Because to get the same $$y$$ as before, the input $$x + 3$$ must equal the old $$x_0$$, so $$x = x_0 - 3$$.\n- Step 3: Mnemonic: outside is \"do what it says\" (vertical, direct). Inside is \"do the opposite\" (horizontal, reversed). Root cause: inside transforms change the DOMAIN, so their effect on the graph is mirrored.", "source": "Opus 4.7 ②", "_id": "opus_2_70", "judge_pick": false}, {"question": "The \"touches\" property (double root, e.g. $$(x+2)^2$$) is preserved under ALL standard transformations. Why? (3 steps)", "answer": "- Step 1: A \"touch\" at $$x = a$$ means $$f(a) = 0$$ AN
