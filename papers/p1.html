nce or otherwise\" — what's the difference? (3 steps)", "answer": "- Step 1: \"Hence\" means you MUST use the previous result. Not doing so risks losing marks even with correct answer.\n- Step 2: \"Hence or otherwise\" means the previous result is allowed but other methods are acceptable.\n- Step 3: If the previous part shows \"$$f(x) = g(x)$$\" and this part asks \"hence find solutions\", RE-USE $$g(x)$$ — don't re-derive.\n\nMissing the \"hence\" link is one of the most common silly errors.", "source": "Opus 4.7 ②", "_id": "opus_2_104"}, {"question": "A simple exercise: find the angle $$\\theta$$ in a triangle with sides $$3, 4, 5$$ opposite to side $$5$$. Interpret the result. (2 steps)", "answer": "- Step 1: Cosine rule: $$5^2 = 3^2 + 4^2 - 2(3)(4)\\cos\\theta \\Rightarrow 25 = 9 + 16 - 24\\cos\\theta \\Rightarrow \\cos\\theta = 0$$.\n- Step 2: $$\\cos\\theta = 0 \\Rightarrow \\theta = 90°$$. The triangle is right-angled at that vertex.\n\nThis confirms the classic 3-4-5 right triangle. The cosine rule reproduces Pythagoras here ($$3^2 + 4^2 = 5^2$$).", "source": "Opus 4.7 ①", "_id": "opus_1_143"}, {"question": "State the sine rule, including both its standard and reciprocal forms, and explain when each is most useful.", "answer": "**Standard**: $$\\frac{a}{\\sin A} = \\frac{b}{\\sin B} = \\frac{c}{\\sin C}$$\n\n**Reciprocal**: $$\\frac{\\sin A}{a} = \\frac{\\sin B}{b} = \\frac{\\sin C}{c}$$\n\n**When to use which**:\n- If solving for a SIDE: use standard. E.g., $$a = \\frac{\\sin A}{\\sin B} \\cdot b$$.\n- If solving for an ANGLE: use reciprocal. E.g., $$\\sin A = \\frac{\\sin B}{b} \\cdot a$$, then $$A = \\sin^{-1}(\\ldots)$$.\n\n**Trigger**: you need an angle-opposite-side pair already known (e.g., $$B$$ and $$b$$), and are finding a partner for another pair.", "source": "Opus 4.7 ①", "_id": "opus_1_125"}, {"question": "For 4 distinct real intersections of $$y=x(4-x^{2})$$ and $$y=\\frac{A}{x}$$, the equation reduces to $$x^{4}-4x^{2}+A=0$$. Why is $$\\Delta > 0$$ not sufficient, and what three conditions must hold? (3 steps)", "answer": "- Step 1: Substitute $$y=x^{2}$$ to get the quadratic $$y^{2}-4y+A=0$$ in $$y$$. Each positive $$y$$-root gives two $$x$$-values ($$\\pm\\sqrt{y}$$), so for 4 distinct $$x$$-roots we need **2 distinct positive** $$y$$-roots.\n- Step 2: Condition 1: $$\\Delta > 0$$ (two distinct $$y$$-roots) → $$16-4A>0$$ → $$A<4$$. Condition 2: product of roots $$> 0$$ (both same sign, and we need positive) → product = $$A > 0$$. Condition 3: sum of roots $$> 0$$ (both positive, not both negative) → sum = $$4 > 0$$ ✓ (automatic).\n- Step 3: Combining: $$0 < A < 4$$. Phuc's trap: stopping at $$A<4$$ without checking $$A>0$$ — negative $$A$$ would give two negative $$y$$-roots, yielding zero real $$x$$-values (can't take $$\\sqrt{\\text{negative}}$$).\n\nVieta's formulas: for $$ay^{2}+by+c=0$$, sum $$= -\\frac{b}{a}$$, product $$= \\frac{c}{a}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "For $$y = 12\\sin(x + B)$$ with $$B > 0$$, and the minimum with SMALLEST POSITIVE $$x$$ at $$x = \\tfrac{\\pi}{4}$$, find the smallest positive value of $$B$$. (3 steps)", "answer": "- Step 1: At a minimum, the inner argument equals $$\\tfrac{3\\pi}{2} + 2n\\pi$$: $$x + B = \\tfrac{3\\pi}{2} + 2n\\pi$$.\n- Step 2: Substitute $$x = \\tfrac{\\pi}{4}$$: $$\\tfrac{\\pi}{4} + B = \\tfrac{3\\pi}{2} + 2n\\pi \\Rightarrow B = \\tfrac{5\\pi}{4} + 2n\\pi$$.\n- Step 3: The smallest positive $$B$$ corresponds to $$n = 0$$, giving $$B = \\tfrac{5\\pi}{4}$$. For $$n = -1$$: $$B = -\\tfrac{3\\pi}{4} < 0$$ (rejected).\n\nGeneral pattern: set inner argument equal to the min/max-location general solution, solve for $$B$$, pick the right branch.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "Why is memorising the quadratic formula more important than memorising factorisation tricks? (3 steps)", "answer": "- Step 1: Quadratic formula works for EVERY quadratic — universal tool.\n- Step 2: Factorisation tricks only work when roots are rational (usually) — a special case.\n- Step 3: In exam: if factorisation isn't obvious within 20 seconds, fall back to formula. Not memorising leaves you stuck on irrational-root questions.\n\nMemorise both, but the formula is non-negotiable.", "source": "Opus 4.7 ②", "_id": "opus_2_141"}, {"question": "For a triangle with $$AB = 15$$, $$AC = 25$$, and area $$= 100$$, find $$\\sin\\theta$$ where $$\\theta = \\angle BAC$$. (2 steps)", "answer": "- Step 1: Use the SAS area formula $$\\text{Area} = \\frac{1}{2}ab\\sin C$$ with $$a = 15$$, $$b = 25$$, $$C = \\theta$$: $$100 = \\frac{1}{2}(15)(25)\\sin\\theta = 187.5\\sin\\theta$$.\n- Step 2: Solve: $$\\sin\\theta = \\frac{100}{187.5} = \\frac{8}{15}$$.\n\nThe general pattern: whenever you're given two sides and an area, you can solve for $$\\sin$$ of the included angle directly.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "What general heuristic prevents missing translations like \"line $$l_2$$ parallel to $$x$$-axis through $$A(4, 2)$$\" → \"$$y = 2$$\"? (3 steps)", "answer": "- Step 1: Translate geometric descriptions into algebraic equations BEFORE doing anything else.\n- Step 2: Common dictionary:\n+ \"Parallel to $$x$$-axis through $$(a, b)$$\" → $$y = b$$\n+ \"Parallel to $$y$$-axis through $$(a, b)$$\" → $$x = a$$\n+ \"Midpoint of $$AB$$\" → average coordinates\n+ \"Perpendicular bisector\" → line through midpoint with $$-1/m_{AB}$$ gradient\n- Step 3: Writing the equation EXPLICITLY (not just visualising) pins down what's asked.", "source": "Opus 4.7 ②", "_id": "opus_2_143"}, {"question": "The purpose of rationalising the denominator isn't strictly mathematical — why is it conventional?", "answer": "Mathematically, $$\\frac{1}{\\sqrt{3}}$$ and $$\\frac{\\sqrt{3}}{3}$$ represent the same number. The reasons rationalisation is conventional:\n\n- **Uniqueness / Comparison**: comparing $$\\frac{7\\sqrt{3}}{3}$$ and $$\\frac{7}{\\sqrt{3}}$$ requires first putting them in a common form.\n- **Historical**: before calculators, computing $$\\frac{1}{\\sqrt{3}}$$ required long division by $$1.732\\ldots$$, while $$\\frac{\\sqrt{3}}{3}$$ is division by 3.\n- **Standard form**: exams typically expect the rationalised form for marks.\n\nModern usage: it's the conventional \"simplest form\" for surds. Not doing it might lose a mark on \"simplest form\" questions.", "source": "Opus 4.7 ①", "_id": "opus_1_158"}, {"question": "Find the equation of the tangent line to $y = 2x^2 + 8x + 3$ that is parallel to $y = 4x + c$. (4 steps)", "answer": "- Step 1: Differentiate the curve: $\\frac{dy}{dx} = 4x + 8$\n- Step 2: For parallel lines, gradients must be equal. The line $y = 4x + c$ has gradient 4 (the coefficient of x), NOT $4x+c$.\n+ Set $4x + 8 = 4 \\Rightarrow x = -1$\n- Step 3: Find y-coordinate on the curve at $x = -1$: $y = 2(1) + 8(-1) + 3 = 2 - 8 + 3 = -3$\n- Step 4: Use point-slope form with point $(-1, -3)$ and gradient 4: $y - (-3) = 4(x - (-1))$\n+ $y + 3 = 4x + 4 \\Rightarrow y = 4x + 1$, so $c = 1$\n\n**Common error:** Students sometimes try to equate $4x + 8$ to the entire line equation $4x + c$, which is dimensionally wrong. $\\frac{dy}{dx}$ gives a number (gradient) at a specific point, not an equation.", "source": "MiniMax ②", "_id": "minimax_2_2"}, {"question": "When the Cosine Rule gives you $$\\cos\\theta=\\frac{13+x}{5+5x}$$ and you need to rationalise after substituting a surd for $$x$$, what's the approach? (3 steps)", "answer": "- Step 1: Substitute $$x=2\\sqrt{3}$$: $$\\cos\\theta=\\frac{13+2\\sqrt{3}}{5+10\\sqrt{3}}$$. The denominator has a surd, so rationalise by multiplying top and bottom by the conjugate $$5-10\\sqrt{3}$$.\n- Step 2: Denominator: $$(5+10\\sqrt{3})(5-10\\sqrt{3})=25-100\\cdot 3=25-300=-275$$. Numerator: $$(13+2\\sqrt{3})(5-10\\sqrt{3})=65-130\\sqrt{3}+10\\sqrt{3}-20\\cdot 3=65-120\\sqrt{3}-60=5-120\\sqrt{3}$$.\n- Step 3: $$\\cos\\theta=\\frac{5-120\\sqrt{3}}{-275}=\\frac{120\\sqrt{3}-5}{275}=\\frac{24\\sqrt{3}-1}{55}$$. The negative denominator flips the signs. This is the exact form; numerically $$\\cos\\theta\\approx 0.738$$, giving $$\\theta\\approx 42.5°$$.\n\nTakeaway: Rationalise surd denominators using conjugates. Watch sign flips from negative denominators.", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "For complex compound transformations (e.g., $$f(-3x + 2)$$), what's the order of operations?", "answer": "Inside-out, following the order of modifications to $$x$$:\n- Step 1: Factor out: $$f(-3x + 2) = f(-3(x - \\frac{2}{3}))$$.\n- Step 2: This corresponds to: shift right by $$\\frac{2}{3}$$, then reflect + compress by factor $$-3$$.\n\nAlternatively, think of it as mapping: to go from original point $$(a, b)$$, solve $$-3x + 2 = a$$ for $$x$$: $$x = \\frac{2 - a}{3}$$. So new point is $$(\\frac{2-a}{3}, b)$$.\n\n**Warning**: the \"shift then reflect/scale\" order is NOT the same as \"reflect/scale then shift.\" Careful with the order — factor out the coefficient of $$x$$ first to see the order clearly.", "source": "Opus 4.7 ①", "_id": "opus_1_159"}, {"question": "Critical thinking — suppose a cubic curve intersects a line at 1 point (tangent) and a rectangular hyperbola at 2 points. Could it be tangent to the line AND hyperbola at the same point? What discriminant conditions apply?", "answer": "Yes, conceivably. Being tangent to the line means the cubic's slope matches the line's slope at the intersection, AND the intersection is a double root of (cubic - line = 0).\n\nBeing tangent to the hyperbola at the same point means the same slope match with the hyperbola AND double root of (cubic - hyperbola = 0).\n\n**Conditions**: at the point $$P = (a, b)$$:\n- $$f(a) = \\text{line}(a) = \\text{hyperbola}(a) = b$$\n- $$f'(a) = \\text{slope of line}$$\n- $$f'(a) = \\text{slope of hyperbola at } a$$\n\nSo slopes of line and hyperbola must match at $$P$$. This is a \"triple coincidence\" condition — possible but uncommon. Demonstrates how tangent conditions stack.", "source": "Opus 4.7 ①", "_id": "opus_1_139"}, {"question": "What's the formula for the area of a triangle using two sides and the included angle (SAS), and why is this called the SAS formula?", "answer": "$$\\text{Area} = \\frac{1}{2}ab\\sin C$$ where $$C$$ is the angle between sides $$a$$ and $$b$$.\n\nIt's called SAS because you need **Side-Angle-Side** — two sides with the angle *between* them. Intuition: $$b\\sin C$$ is the perpendicular height when $$a$$ is treated as the base, so the formula is just $$\\frac{1}{2} \\times \\text{base} \\times \\text{height}$$ in disguise.\n\nMisconception: the angle MUST be between the two given sides. Using a non-included angle gives the wrong height.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "When given $$f'(x) = 4x^{3/2} + \\tfrac{k}{x^2}$$ and need to find $$f$$ AND determine $$k$$, explain why the ORDER matters: solve for $$k$$ first, then integrate. (3 steps)", "answer": "- Step 1: Approach A (integrate first): get $$f(x) = \\tfrac{8}{5}x^{5/2} - \\tfrac{k}{x} + C$$ — now TWO unknowns ($$k$$ and $$C$$), and only one equation (point on curve). Stuck.\n- Step 2: Approach B ($$k$$ first): the extra condition $$f''(P) = 0$$ involves only $$k$$, not $$C$$ (differentiation kills constants). Solve for $$k$$ in isolation using this.\n- Step 3: Then integrate with $$k$$ known, and use the point $$P$$ on the curve to find $$C$$ — one unknown at a time.\n\nGeneral principle: when you have multiple conditions, exploit the one with FEWER unknowns first.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "Given $$m = 2^n$$, express $$16^{3n}$$ in terms of $$m$$. What base-conversion and power-of-a-power steps are required? (3 steps)", "answer": "- Step 1: Convert the base 16 to a power of 2, since $$m$$ is defined in base 2. Since $$16 = 2^4$$, we have $$16^{3n} = (2^4)^{3n}$$.\n- Step 2: Apply the power-of-a-power rule $$(a^x)^y = a^{xy}$$. This gives $$2^{4 \\times 3n} = 2^{12n}$$.\n- Step 3: Rewrite $$2^{12n}$$ as $$(2^n)^{12}$$ using the reverse of the power-of-a-power rule. Substitute $$m = 2^n$$ to get $$m^{12}$$.\n\nAlways convert to the base of the given substitution variable before applying the outer exponents.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "What is the period of $$y=A\\sin(Bx+C)$$ in radians, and how does changing $$B$$ affect it? What about $$y=\\cos(nx)$$ in degrees? (2 steps)", "answer": "- Step 1: In radians: period = $$\\frac{2\\pi}{|B|}$$. Larger $$B$$ → shorter period (more oscillations per unit length). In degrees: period = $$\\frac{360°}{|B|}$$.\n- Step 2: For $$y=\\cos\\left(\\frac{x}{n}\\right)$$ in degrees, the period is $$360n$$ (longer period — stretched out). Common trap: confusing $$\\frac{360}{n}$$ (compress) with $$360n$$ (stretch). Inside the function: larger divisor = longer period.", "source": "GLM 5.1 ①", "_id": "glm_1_53"}, {"question": "When integrating $\\int(10x^4 - \\frac{3}{2x^3} - 7)dx$, a student writes $\\int 10x^4 dx = 2x^5$, but writes $\\int \\frac{3}{2x^3} dx = \\frac{3}{2} \\cdot \\frac{x^{-2}}{-2}$. What's wrong and what's the correct approach? (conceptual)", "answer": "- Step 1: The error is in the negative power rule. When integrating $x^{-3}$, the power increases: $-3 + 1 = -2$.\n- Step 2: The correct approach: First rewrite $\\frac{3}{2x^3}$ as $\\frac{3}{2}x^{-3}$ (NOT $\\frac{3}{2} \\cdot x^{-3}$ with the coefficient inside)\n- Step 3: Then integrate: $\\int \\frac{3}{2}x^{-3} dx = \\frac{3}{2} \\cdot \\frac{x^{-2}}{-2} = -\\frac{3}{4}x^{-2} = -\\frac{3}{4x^2}$\n- Step 4: The complete answer: $2x^5 - \\frac{3}{4x^2} - 7x + C$\n\n**Key point:** The coefficient (3/2) stays outside the integration — only x gets the power change. The negative sign comes from the calculation, not from making it negative initially.", "source": "MiniMax ②", "_id": "minimax_2_32"}, {"question": "How do you systematically translate a shaded region bounded by four curves or lines into a set of inequalities? (4 steps)", "answer": "- Step 1: Identify each boundary explicitly. Typical boundaries include the $$x$$-axis ($$y=0$$), the $$y$$-axis ($$x=0$$), a straight line, and a curve such as a parabola.\n- Step 2: For each boundary, determine the direction of the inequality by picking a test point known to be inside the region. For example, if $$(1,1)$$ lies inside and satisfies $$y < -8x + 20$$, then that is the correct inequality for the line boundary.\n- Step 3: Check whether boundaries are included (solid line, $$\\leq$$ or $$\\geq$$) or excluded (dashed line, $$<$$ or $$>$$). In A-Level contexts, closed regions usually use inclusive inequalities.\n- Step 4: List all inequalities simultaneously. A region bounded by four distinct curves generally requires exactly four inequalities. Common missing boundaries are $$x \\geq 0$$ or $$y \\geq 0$$ when the region abuts an axis.", "source": "Kimi K2.6 ①", "_id": "kimi_1_36"}, {"question": "Walk through the full 4-step procedure to find $$c$$ so that $$y = 4x + c$$ is tangent to $$y = 2x^2 + 8x + 3$$. (4 steps)", "answer": "- Step 1: Differentiate the curve to get its gradient function: $$\\frac{dy}{dx} = 4x + 8$$.\n- Step 2: Set this equal to the slope of the line (the coefficient of $$x$$, which is $$4$$): $$4x + 8 = 4 \\Rightarrow x = -1$$.\n- Step 3: Find the $$y$$-coordinate at the tangent point by substituting $$x = -1$$ into the CURVE (not the line, since the line has unknown $$c$$): $$y = 2(1) + 8(-1) + 3 = -3$$.\n- Step 4: Substitute the tangent point $$(-1, -3)$$ into the line to find $$c$$: $$-3 = 4(-1) + c \\Rightarrow c = 1$$.\n\nMental checkpoint: derivative (1 mark), equation (1 mark), $$x$$-coordinate (1 mark), $$y$$-coordinate (1 mark), find $$c$$ (1 mark) = 5 marks total.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "The formula $$(A \\cdot B)^n = A^n \\cdot B^n$$ — what's the common mistake when applying it to $$(16x^{-1/2})^3$$?", "answer": "**Mistake**: cubing only the $$16$$ (getting $$16^3 x^{-1/2}$$) or only the $$x^{-1/2}$$ (getting $$16 x^{-3/2}$$). Both are wrong.\n\n**Correct**: apply the cube to BOTH factors: $$(16x^{-1/2})^3 = 16^3 \\cdot (x^{-1/2})^3 = 4096 x^{-3/2}$$.\n\nRule: when a product is raised to a power, **every factor** gets the power. It's easy to forget the $$x$$ piece because it looks \"small\" or because the exponent is fractional.\n\nMantra: \"applies to ALL factors, no exceptions.\"", "source": "Opus 4.7 ①", "_id": "opus_1_115"}, {"question": "When told \"$$ADC$$ is a straight line\" in a geometry problem, what trigonometric relationship does this give you? (2 steps)", "answer": "- Step 1: If $$ADC$$ is a straight line, then angles $$\\angle BDA$$ and $$\\angle BDC$$ are **supplementary** — they add to $$180°$$ (or $$\\pi$$ radians). This is because they sit on opposite sides of point $$D$$ on the straight line.\n- Step 2: The key trigonometric consequence: $$\\sin(\\angle BDA)=\\sin(\\angle BDC)$$ (supplementary angles have equal sines). However, $$\\cos(\\angle BDA)=-\\cos(\\angle BDC)$$ (cosines are negatives of each other). This lets you transfer angle information between triangles $$ABD$$ and $$BCD$$ that share the straight line.\n\nTakeaway: Straight line → supplementary angles → sines equal, cosines opposite. This connects two triangles sharing an edge.", "source": "GLM 5.1 ③", "_id": "glm_3_39"}, {"question": "When a fraction has $$\\sqrt{x}$$ in the denominator, how do you rewrite it in power form for integration or differentiation? (2 steps)", "answer": "- Step 1: $$\\sqrt{x}=x^{1/2}$$, so $$\\frac{1}{\\sqrt{x}}=x^{-1/2}$$. More generally, $$\\frac{k}{\\sqrt{x}}=kx^{-1/2}$$. The scalar stays in front; only the variable part gets the negative exponent.\n- Step 2: For integration: $$\\int x^{-1/2}\\,dx=\\frac{x^{1/2}}{1/2}+C=2\\sqrt{x}+C$$. The exponent goes from $$-\\frac{1}{2}$$ to $$\\frac{1}{2}$$, and dividing by $$\\frac{1}{2}$$ multiplies by 2. For $$\\frac{3}{\\sqrt{x}}$$: $$\\int 3x^{-1/2}\\,dx=6\\sqrt{x}+C$$.\n\nTakeaway: $$\\frac{1}{\\sqrt{x}}=x^{-1/2}$$. Integrate: $$\\int x^{-1/2}\\,dx=2\\sqrt{x}+C$$.", "source": "GLM 5.1 ③", "_id": "glm_3_83"}, {"question": "Conceptually, why does \"line parallel to $$y$$-axis\" mean the equation is $$x = \\text{constant}$$, not $$y = \\text{constant}$$?", "answer": "A line parallel to the $$y$$-axis is vertical. On a vertical line, every point has the same $$x$$-coordinate (like $$x = 4$$ for the line through $$(4, 2)$$, $$(4, 7)$$, $$(4, -1)$$, etc.). The $$y$$-values vary freely.\n\nContrast: a line parallel to the $$x$$-axis is horizontal — every point has the same $$y$$. The equation is $$y = \\text{constant}$$.\n\n**Memory aid**: \"parallel to axis $$X$$\" means the line points in the direction of axis $$X$$ and has a constant value in the OTHER coordinate.", "source": "Opus 4.7 ①", "_id": "opus_1_109"}, {"question": "For a tangent line to a curve at a point, why does the tangent's gradient equal $$f'(x)$$ at that point, and what's the formula for the tangent line?", "answer": "By definition, $$f'(a)$$ is the instantaneous rate of change of $$f$$ at $$x = a$$, which geometrically is the gradient of the tangent line there.\n\n**Tangent line formula**: $$y - f(a) = f'(a)(x - a)$$, i.e., point-slope form with slope $$= f'(a)$$ and point $$(a, f(a))$$.\n\n**Normal line** (perpendicular to tangent): $$y - f(a) = -\\frac{1}{f'(a)}(x - a)$$, using $$m_{\\text{normal}} \\cdot m_{\\text{tangent}} = -1$$.", "source": "Opus 4.7 ①", "_id": "opus_1_72"}, {"question": "State the power rule for differentiation and for integration, and explain the link.", "answer": "- **Differentiation**: $$\\frac{d}{dx}(x^n) = nx^{n-1}$$ — bring the power down; subtract 1.\n- **Integration**: $$\\int x^n\\,dx = \\frac{x^{n+1}}{n+1} + C$$ (for $$n \\neq -1$$) — add 1 to the power; divide by the new power.\n\nThey're **inverse operations**: integrating the derivative recovers the original (up to constant). If $$f(x) = \\frac{x^{n+1}}{n+1}$$, then $$f'(x) = \\frac{(n+1)x^n}{n+1} = x^n$$ ✓.\n\n**Restriction $$n \\neq -1$$**: $$\\int x^{-1}\\,dx = \\ln|x| + C$$, which is outside the scope of IAL P1.", "source": "Opus 4.7 ①", "_id": "opus_1_75"}, {"question": "Phuc's mistake was writing $$y \\leq 2x^2 + x - 21$$ when the correct was $$y \\geq 2x^2 + x - 21$$. How do you catch this error with a sample point?", "answer": "Pick any point clearly inside $$R$$ — say $$(0, 10)$$ if $$R$$ is above the parabola. Check:\n- $$y = 10$$, $$2x^2 + x - 21 = -21$$. Is $$10 \\leq -21$$? NO. Is $$10 \\geq -21$$? YES.\n\nSo the correct sign is $$\\geq$$. This sample-point test is foolproof — one point is enough to rule out the wrong sign, since if the sign were reversed, the sample wouldn't satisfy it.\n\nAlways verify by plugging in an obvious interior point.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "Derive the identity $$\\sin^2\\theta + \\cos^2\\theta = 1$$ from a right triangle.", "answer": "Consider a right triangle with hypotenuse $$1$$. The other two sides are:\n- Opposite angle $$\\theta$$: length $$\\sin\\theta$$ (by definition of $$\\sin = \\text{opp}/\\text{hyp}$$)\n- Adjacent to $$\\theta$$: length $$\\cos\\theta$$\n\nBy Pythagoras: $$\\sin^2\\theta + \\cos^2\\theta = 1^2 = 1$$.\n\nThis holds for all $$\\theta$$, even outside $$[0, \\pi/2]$$, because on the unit circle, $$(\\cos\\theta, \\sin\\theta)$$ always satisfies $$x^2 + y^2 = 1$$.\n\nThe identity is THE most important trig fact — it lets you compute $$\\cos$$ from $$\\sin$$ (or vice versa), up to a sign determined by the quadrant.", "source": "Opus 4.7 ①", "_id": "opus_1_88"}, {"question": "State the power rule for integration and explain the exception. (3 steps)", "answer": "- Step 1: $$\\int x^n\\,dx = \\frac{x^{n+1}}{n+1} + C$$, valid for any real $$n$$ EXCEPT $$n = -1$$.\n- Step 2: The exception is because if $$n = -1$$, the formula would give a denominator of $$0$$ — undefined. In fact, $$\\int x^{-1}\\,dx = \\ln|x| + C$$ (not examined in IAL P1).\n- Step 3: Constant scalar factors out: $$\\int ax^n\\,dx = \\frac{a}{n+1}x^{n+1} + C$$. Don't forget the $$+C$$ for indefinite integrals.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "When a question gives you a factorisation like $$x^{3}+4x^{2}+4x=x(x+2)^{2}$$ and then asks about solutions of a related equation, why must you use the \"hence\" approach? (2 steps)", "answer": "- Step 1: The factorisation tells you the shape of the graph: the cubic touches the $$x$$-axis at $$x=-2$$ (double root) and crosses at $$x=0$$. This is crucial visual information that you should reuse rather than re-derive.\n- Step 2: The related equation $$(x+2)(x^{3}+4x^{2}+4x)=1$$ simplifies to $$x(x+2)^{2}=\\frac{1}{x+2}$$, which asks for intersections of the cubic with a hyperbola. You count these from the sketch — no algebra needed. The \"hence\" signals: don't solve the equation algebraically; use the graphical insight from the factorisation.\n\nTakeaway: \"Hence\" after a factorisation → use the graph shape to count intersections, not algebra.", "source": "GLM 5.1 ③", "_id": "glm_3_96"}, {"question": "When you're asked for the \"smallest positive $$B$$\" in $$y = 12\\sin(x + B)$$, why is the answer $$\\frac{5\\pi}{4}$$ and not $$\\frac{3\\pi}{2}$$?", "answer": "We need $$\\frac{\\pi}{4} + B = \\frac{3\\pi}{2} + 2n\\pi$$ (for the minimum at $$x = \\pi/4$$). Solving: $$B = \\frac{5\\pi}{4} + 2n\\pi$$.\n\nFor $$B > 0$$:\n- $$n = 0$$: $$B = \\frac{5\\pi}{4}$$ (positive, valid).\n- $$n = -1$$: $$B = \\frac{5\\pi}{4} - 2\\pi = -\\frac{3\\pi}{4}$$ (negative, rejected).\n\nThe \"smallest positive\" means we pick the $$B$$ value that's positive and minimal. That's $$\\frac{5\\pi}{4}$$, not $$\\frac{3\\pi}{2}$$.\n\n**Common confusion**: $$\\frac{3\\pi}{2}$$ is the argument value where $$\\sin = -1$$, NOT the $$B$$ value. Don't confuse the two.", "source": "Opus 4.7 ①", "_id": "opus_1_124"}, {"question": "For $$\\int \\frac{3}{2x^3} \\, dx$$, what is the very first mental move, and why does the integration rule require it? (3 steps)", "answer": "- Step 1: Rewrite $$\\frac{3}{2x^3}$$ as $$\\frac{3}{2} x^{-3}$$. The $$\\frac{3}{2}$$ stays as a scalar; only the $$x^3$$ in the denominator becomes $$x^{-3}$$.\n- Step 2: Why? The power rule $$\\int x^n \\, dx = \\frac{x^{n+1}}{n+1}$$ only works when $$x$$ is written in the form $$x^n$$. With $$x$$ in the denominator, the rule isn't directly applicable.\n- Step 3: Now integrate: $$\\int \\frac{3}{2} x^{-3} \\, dx = \\frac{3}{2} \\cdot \\frac{x^{-2}}{-2} = -\\frac{3}{4}x^{-2} = -\\frac{3}{4x^2}$$.\n\nCommon trap: some students bring the $$\\frac{3}{2}$$ scalar up into the exponent. Keep scalars out of the power.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "Why does the power rule for integration fail when the exponent is $$n = -1$$, and how does this relate to the formula for $$\\int x^n \\, dx$$? (2 steps)", "answer": "- Step 1: The power rule $$\\int x^n \\, dx = \\frac{x^{n+1}}{n+1} + C$$ requires dividing by $$n+1$$. When $$n = -1$$, this would involve division by zero, so the rule is undefined.\n- Step 2: In A-Level P1, integrals yielding logarithms are not in the syllabus; therefore, if you encounter $$\\frac{1}{x}$$, check whether the question expects a different form or whether you have misread the exponent. For all other negative integers like $$-2$$ or $$-3$$, the rule works perfectly: $$\\int x^{-3} dx = \\frac{x^{-2}}{-2}$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_43"}, {"question": "When using the Cosine Rule with an obtuse angle, what happens to the sign of the $$-2bc\\cos A$$ term, and how does it affect the side length? (2 steps)", "answer": "- Step 1: The Cosine Rule: $$a^{2}=b^{2}+c^{2}-2bc\\cos A$$. When $$A$$ is obtuse, $$\\cos A<0$$, so the term $$-2bc\\cos A$$ becomes **positive** (negative × negative = positive). This means $$a^{2}$$ is LARGER than $$b^{2}+c^{2}$$.\n- Step 2: In the example with $$b=15$$, $$c=25$$, $$\\cos\\theta=-\\frac{\\sqrt{161}}{15}$$: $$BC^{2}=225+625-2(15)(25)\\left(-\\frac{\\sqrt{161}}{15}\\right)=850+50\\sqrt{161}$$. The negative cosine adds to the side length instead of subtracting, making the opposite side longer than it would be for an acute angle. This is geometrically intuitive: an obtuse angle \"opens wider,\" so the opposite side spans more distance.\n\nTakeaway: Obtuse angle → negative cosine → $$-2bc\\cos A$$ is positive → opposite side is longer.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "Why is the cosine rule, $$a^2 = b^2 + c^2 - 2bc\\cos A$$, a \"generalisation\" of Pythagoras' theorem? (3 steps)", "answer": "- Step 1: Pythagoras: $$a^2 = b^2 + c^2$$ for a RIGHT triangle with right angle opposite side $$a$$.\n- Step 2: In cosine rule, set $$A = 90°$$: $$\\cos 90° = 0$$, reducing to $$a^2 = b^2 + c^2$$ — exactly Pythagoras.\n- Step 3: For non-right triangles, the \"correction\" $$-2bc\\cos A$$ adjusts:\n+ $$A$$ acute ($$\\cos A > 0$$): term is negative, so $$a^2 < b^2 + c^2$$ (side opposite acute is shorter).\n+ $$A$$ obtuse ($$\\cos A < 0$$): term is positive, so $$a^2 > b^2 + c^2$$ (side opposite obtuse is longer).\n\nPythagoras is the special case $$A = 90°$$.", "source": "Opus 4.7 ②", "_id": "opus_2_77"}, {"question": "After finding the point of contact between a curve and its tangent line of known gradient $$m$$, what is the conceptual reason we substitute the contact point into $$y = mx + c$$ rather than into the curve's equation? (2 steps)", "answer": "- Step 1: The contact point lies on both the curve and the line, so its coordinates satisfy both equations. However, the curve's equation does not contain the unknown $$c$$; the line's equation does.\n- Step 2: Substituting the known $$x$$ and $$y$$ into the line equation $$y = mx + c$$ creates a linear equation in the single unknown $$c$$, which can be solved directly. Using the curve equation would provide no information about $$c$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_6"}, {"question": "When integrating a polynomial with a constant $$C$$ and a parameter $$k$$ (two unknowns), why does using only ONE point fail?", "answer": "Each unknown needs an equation to solve. One point gives ONE equation (the point satisfies the function). If you have 2 unknowns ($$C$$ and $$k$$), you need at least 2 equations — i.e., 2 conditions.\n\nIf you only have 1 point given but 2 unknowns, you'll end up with a relation like \"$$C + k = 5$$,\" which doesn't pin down either.\n\n**Solution** (Phuc's insight): look for an ADDITIONAL condition that's independent of $$C$$. Since $$C$$ is an integration constant, conditions involving the DERIVATIVE (e.g., $$f''(a) = 0$$) don't involve $$C$$ and can pin down $$k$$ alone. Then use the point to find $$C$$.", "source": "Opus 4.7 ①", "_id": "opus_1_112"}, {"question": "The sine rule is $$\\tfrac{a}{\\sin A} = \\tfrac{b}{\\sin B} = \\tfrac{c}{\\sin C}$$. What data pattern triggers its use? (3 steps)", "answer": "- Step 1: You need at least ONE angle-opposite-side pair (know both $$a$$ AND $$A$$, or both $$b$$ AND $$B$$), otherwise the chain has no anchor.\n- Step 2: With this anchor, you can: find a missing side given an angle opposite it; OR find a missing angle given a side opposite it.\n- Step 3: Contrast with the cosine rule, which needs THREE sides (for an angle) or TWO sides + included angle (for the third side), without needing any angle-side pair.\n\nMnemonic: \"side-angle pair → sine; all sides OR two-sides-angle → cosine.\"", "source": "Opus 4.7 ②", "_id": "opus_2_76"}, {"question": "In the stationary-point-of-$$f''$$ problem, what does \"$$f''(P) = 0$$\" tell us geometrically about the curve $$f$$?", "answer": "$$f''(x)$$ measures concavity. When $$f'' = 0$$, the concavity changes sign (potentially) — this is a **point of inflection** on $$f$$ (provided $$f''$$ changes sign through it).\n\nSo saying \"$$f''(P) = 0$$\" is saying \"$$P$$ might be an inflection point of $$f$$.\"\n\n**Note**: a stationary point of $$f''$$ itself is slightly different — it's where $$f'''$$ (the derivative of $$f''$$) vanishes. But in this problem, Phuc's interpretation ($$f''(P) = 0$$ at $$P$$) matches the actual question: we're told $$P$$ is where $$f''$$ equals zero, and we use that to find $$k$$.", "source": "Opus 4.7 ①", "_id": "opus_1_129"}, {"question": "After finding that two curves meet at point $$A$$ with $$x=5$$, how do you find the OTHER intersection point $$B$$? (2 steps)", "answer": "- Step 1: You know one root of the equation $$f'(x)=f''(x)$$ is $$x=5$$. After rearranging to a quadratic, you can factor out $$(x-5)$$: $$6x^{2}-26x+14=12x-26 \\Rightarrow 3x^{2}-19x+20=0 \\Rightarrow (3x-4)(x-5)=0$$.\n- Step 2: The other root is $$x=\\frac{4}{3}$$. Substitute into either expression for the $$y$$-coordinate: $$y=12\\cdot\\frac{4}{3}-26=16-26=-10$$. So $$B=(\\frac{4}{3},-10)$$. The key: you already know one factor, so you can find the other by polynomial division or by comparing coefficients.\n\nTakeaway: Known root → factor it out → solve the remaining factor for the other intersection.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "Why does $$f(-x)$$ produce a reflection in the $$y$$-axis?", "answer": "Consider a point $$(a, b)$$ on $$y = f(x)$$, so $$b = f(a)$$.\n\nAfter the transformation, the new function is $$g(x) = f(-x)$$. At what new $$x$$-value does $$g$$ equal $$b$$? We need $$f(-x) = b = f(a) \\Rightarrow -x = a \\Rightarrow x = -a$$.\n\nSo the new point is $$(-a, b)$$ — same $$y$$, but $$x$$-coordinate is negated. Every point $$(a, b)$$ on the original becomes $$(-a, b)$$ on the new, which is the definition of reflection in the $$y$$-axis.\n\nAnalogous: $$-f(x)$$ negates the $$y$$-coordinate (reflection in the $$x$$-axis).", "source": "Opus 4.7 ①", "_id": "opus_1_99"}, {"question": "A curve is transformed according to the following sequence: first reflected in the $$x$$-axis, then stretched vertically by factor 2, then translated 3 units right. If the original point on the curve is $$(1, 4)$$, find its final image.", "answer": "- Start: $$(1, 4)$$\n- Step 1: **Reflect in $$x$$-axis:** $$(x, y) \\rightarrow (x, -y)$$. Point becomes $$(1, -4)$$.\n- Step 2: **Vertical stretch by factor 2:** $$(x, y) \\rightarrow (x, 2y)$$. Point becomes $$(1, -8)$$.\n- Step 3: **Translate 3 right:** $$(x, y) \\rightarrow (x+3, y)$$. Point becomes $$(4, -8)$$.\n\nFinal image: $$(4, -8)$$", "source": "MiniMax ①", "_id": "minimax_1_56"}, {"question": "Why is the second derivative test $$f''(a) > 0 \\Rightarrow$$ local min, $$f''(a) < 0 \\Rightarrow$$ local max, $$f''(a) = 0$$ inconclusive? Give the geometric intuition.", "answer": "$$f''$$ measures **concavity** (curvature):\n- $$f'' > 0$$: curve bends upward (like $$\\cup$$) → if $$f' = 0$$ here, it's the bottom of the \"cup\" → local min.\n- $$f'' < 0$$: curve bends downward (like $$\\cap$$) → if $$f' = 0$$ here, it's the top of the \"hill\" → local max.\n- $$f'' = 0$$: no curvature info → the point could be a min, max, or inflection (e.g., $$y = x^4$$ at $$x = 0$$ is a min with $$f'' = 0$$).\n\nWhen $$f'' = 0$$, fall back on checking the sign of $$f'$$ either side of the stationary point (first-derivative test).", "source": "Opus 4.7 ①", "_id": "opus_1_79"}, {"question": "When you substitute $$u = x^2$$ into a biquadratic and get one positive $$u$$-root and one negative, how many $$x$$-solutions emerge? (3 steps)", "answer": "- Step 1: Positive $$u_1 > 0$$: $$x = \\pm\\sqrt{u_1}$$ — TWO real solutions.\n- Step 2: Negative $$u_2 < 0$$: $$x^2 = u_2 < 0$$ has NO real solution.\n- Step 3: Total: TWO real $$x$$-solutions.\n\nFor 4 distinct real $$x$$: BOTH $$u$$-roots must be positive and distinct.", "source": "Opus 4.7 ②", "_id": "opus_2_119"}, {"question": "For $$y = A\\sin(Bx + C)$$, what are the period, amplitude, and phase shift?", "answer": "- **Amplitude**: $$|A|$$ (the max distance from the mean line; range is $$[-|A|, |A|]$$).\n- **Period**: $$\\frac{2\\pi}{|B|}$$ (radians) or $$\\frac{360°}{|B|}$$ (degrees). The graph repeats every period.\n- **Phase shift** (horizontal shift): solve $$Bx + C = 0$$ to get $$x = -\\frac{C}{B}$$ — the graph is shifted left by $$\\frac{C}{B}$$ (if $$B, C$$ same sign).\n\nNote: $$B$$ inside $$\\sin$$ compresses horizontally by factor $$\\frac{1}{|B|}$$, doubling the frequency if $$B = 2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_80"}, {"question": "What is the equation of a line passing through the point $$(a,b)$$ that is parallel to the $$x$$-axis, and why does the distance formula naturally pair with this setup? (2 steps)", "answer": "- Step 1: A line parallel to the $$x$$-axis has zero gradient, so its equation is simply $$y = b$$. Every point on this line shares the same $$y$$-coordinate $$b$$ regardless of $$x$$.\n- Step 2: When a second point $$B$$ is given and you need to find points $$C$$ on this line at a fixed distance from $$B$$, the distance formula simplifies because $$y_C = b$$. The vertical difference becomes $$(y_B - b)^2$$, leaving a single unknown $$x_C$$ to solve from $$(x_B - x_C)^2 + (y_B - b)^2 = d^2$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_24"}, {"question": "Given the area of a triangle and two sides (SAS), how do you find the included angle? What sign issue arises if the angle is obtuse? (3 steps)", "answer": "- Step 1: Use $$A = \\frac{1}{2}ab\\sin C$$ and rearrange: $$\\sin C = \\frac{2A}{ab}$$.\n- Step 2: $$\\sin C$$ gives two possible angles: $$C$$ and $$180°-C$$ (or $$\\pi-C$$ in radians). The question must specify which — \"given $$\\theta > 90°$$\" means choose the obtuse option.\n- Step 3: To find $$\\cos C$$ for the Cosine Rule, use $$\\cos^{2}C = 1-\\sin^{2}C$$ and **pick the negative root** if $$C$$ is obtuse (since cosine is negative for angles between 90° and 180°).\n\nExample: $$\\sin\\theta = \\frac{8}{15}$$, $$\\theta > 90°$$ → $$\\cos\\theta = -\\frac{\\sqrt{161}}{15}$$ (negative root).", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "A line is tangent to the curve $$y = 2x^2 + 8x + 3$$ at point $$P$$. If the line is $$y = 4x + c$$, find the value of $$c$$. (4 steps)", "answer": "- Step 1: **Differentiate the curve** to find its gradient function:\n$$\\frac{dy}{dx} = 4x + 8$$\n- Step 2: **Equate gradients** at the tangent point — the derivative equals the line's gradient ($$m = 4$$, the coefficient of $$x$$, NOT the whole equation):\n$$4x + 8 = 4 \\Rightarrow x = -1$$\n- Step 3: **Find $$y$$ at this $$x$$** using the original curve equation:\n$$y = 2(-1)^2 + 8(-1) + 3 = 2 - 8 + 3 = -3$$\nTangent point is $$P(-1, -3)$$.\n- Step 4: **Substitute point into the line** to find $$c$$:\n$$-3 = 4(-1) + c \\Rightarrow c = 1$$\n\nKey insight: $$\\frac{dy}{dx}$$ at the tangent point equals the gradient (scalar), not the line equation.", "source": "MiniMax ①", "_id": "minimax_1_1"}, {"question": "What is the general rule for mapping coordinates under the transformation $$y = f(ax+b)$$, and why does the order of operations matter? (3 steps)", "answer": "- Step 1: First isolate the operation inside the brackets by rewriting as $$y = f\\left(a\\left(x + \\frac{b}{a}\\right)\\right)$$ if $$a \\neq 0$$. The transformation acts horizontally: the new $$x$$-coordinate is found by solving $$ax_{\\text{new}} + b = x_{\\text{old}}$$, giving $$x_{\\text{new}} = \\frac{x_{\\text{old}} - b}{a}$$.\n- Step 2: This reveals a horizontal shift of $$-\\frac{b}{a}$$ (opposite to the sign inside) and a horizontal compression by factor $$\\frac{1}{a}$$. The $$y$$-coordinate remains unchanged because the transformation is inside the function argument.\n- Step 3: Order matters because shifts and stretches do not commute. Applying the shift before the compression produces a different result than compression followed by shift. Always factor the coefficient of $$x$$ out first to identify the correct sequence.", "source": "Kimi K2.6 ①", "_id": "kimi_1_39"}, {"question": "Why does multiplying the numerator and denominator by the conjugate $$(a - \\sqrt{b})$$ eliminate the surd from the denominator of $$\\frac{c}{a + \\sqrt{b}}$$? (2 steps)", "answer": "- Step 1: The product of a sum and difference $$(a + \\sqrt{b})(a - \\sqrt{b})$$ follows the difference-of-squares identity, yielding $$a^2 - (\\sqrt{b})^2 = a^2 - b$$, which is purely rational.\n- Step 2: By multiplying both numerator and denominator by the conjugate, we preserve the value of the fraction (multiplying by $$1$$) while converting the denominator to an integer. For example, $$\\frac{3+\\sqrt{3}}{\\sqrt{3}-1}$$ becomes $$\\frac{(3+\\sqrt{3})(\\sqrt{3}+1)}{(\\sqrt{3})^2 - 1^2} = \\frac{6+4\\sqrt{3}}{2}$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_13"}, {"question": "The expression $$\\sqrt{161}$$ doesn't simplify further — how do you know?", "answer": "$$\\sqrt{n}$$ simplifies iff $$n$$ has a perfect-square factor greater than 1. Prime factorisation: $$161 = 7 \\times 23$$. Both primes, neither squared. So no perfect square factor → $$\\sqrt{161}$$ is in simplest form.\n\n**Contrast**: $$\\sqrt{180} = \\sqrt{36 \\cdot 5} = 6\\sqrt{5}$$ simplifies because $$180 = 36 \\cdot 5$$ has a perfect-square factor.\n\n**Rule of thumb**: check divisibility by squares of small primes: $$4, 9, 25, 49, \\ldots$$ If none divide $$n$$, $$\\sqrt{n}$$ is simplest.", "source": "Opus 4.7 ①", "_id": "opus_1_134"}, {"question": "You're told $$C_1: y = x(4 - x^2)$$ and $$C_2: y = \\tfrac{A}{x}$$ meet, and intersections satisfy $$x^4 - 4x^2 + A = 0$$. For them to meet at 4 distinct points, why is the discriminant condition alone NOT sufficient? (3 steps)", "answer": "- Step 1: Substitute $$y = x^2$$ to get a quadratic in $$y$$: $$y^2 - 4y + A = 0$$.\n- Step 2: For 4 distinct real $$x$$, you need TWO distinct $$y$$-values (each non-zero positive $$y$$ gives $$x = \\pm\\sqrt{y}$$, two roots). The discriminant $$\\Delta > 0$$ only guarantees two distinct $$y$$'s — it says nothing about whether those $$y$$'s are positive.\n- Step 3: If a $$y$$-root is NEGATIVE, then $$x^2 = y < 0$$ has NO real solution, so that root contributes zero $$x$$-values. You need BOTH $$y$$-roots strictly positive.\n\nPhuc's trap: he got $$\\Delta > 0 \\Rightarrow A < 4$$ but forgot to impose $$A > 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Why must the substituted variable $$p = 2^x$$ always be positive, and when might a solution $$p = \\text{negative}$$ need to be rejected?", "answer": "Because $$2^x > 0$$ for all real $$x$$ (exponential functions with positive base are always positive). So if factoring gives $$p = -3$$, there's no corresponding real $$x$$ — reject it.\n\nThis is an essential check in any \"$$p = a^x$$\" substitution: after solving the polynomial in $$p$$, verify each root is positive before converting back to $$x$$. Failing to reject a negative root typically leads to claiming extra, nonexistent solutions.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "When a question states \"curve $$y = f(x)$$ touches the $$x$$-axis at $$(3, 0)$$,\" what's the algebraic implication?", "answer": "Touching (not crossing) means $$(x - 3)^2$$ is a factor of $$f(x)$$ — the root at $$x = 3$$ has **multiplicity $$\\geq 2$$** (even multiplicity in general).\n\nGeometric: the curve approaches the axis, kisses it at $$x = 3$$, and retreats without crossing. This is characteristic of double roots — the curve has a horizontal tangent at that point AND touches the axis.\n\nIn transformations: touching is preserved. A double root remains double after horizontal/vertical transformations (unless we cube or take roots, which can change multiplicity).", "source": "Opus 4.7 ①", "_id": "opus_1_118"}, {"question": "Misconception probe: \"For $$y=f(2x)$$, the graph stretches horizontally by scale factor 2.\" True or false? Explain. (2 steps)", "answer": "- Step 1: **False.** $$y=f(2x)$$ **compresses** the graph horizontally by scale factor $$\\frac{1}{2}$$, not stretches it. Each $$x$$-coordinate is divided by 2, so points move closer to the $$y$$-axis.\n- Step 2: The confusion comes from the intuitive expectation that \"multiplying by 2 makes things bigger.\" But for horizontal transformations inside $$f(\\;)$$, the effect is **reversed**: $$f(2x)$$ compresses, $$f(\\frac{x}{2})$$ stretches. Think of it this way: to get the same output, you only need half the input, so everything happens in half the horizontal space.\n\nTakeaway: Inside the function: larger coefficient = compression, smaller coefficient = stretch. Direction is reversed.", "source": "GLM 5.1 ③", "_id": "glm_3_93"}, {"question": "Difference between \"tangent to\" a curve and \"meets at one point\" — are they the same?", "answer": "Yes, in the context of lines vs. curves where the curve is quadratic or higher. A line is tangent to a curve at point $$P$$ iff it touches the curve at $$P$$ without crossing (locally), which corresponds to a double root of (line - curve = 0).\n\nFor higher-degree curves, \"tangent\" still implies a double-root contact, but \"meets at one point\" might be ambiguous — could mean a simple intersection where other intersections are absent for other reasons.\n\nIn IAL P1 context: both phrases typically mean $$\\Delta = 0$$ of the combined quadratic. Treat them identically.", "source": "Opus 4.7 ①", "_id": "opus_1_148"}, {"question": "How do you determine the region defined by a quadratic inequality like $ y > x^2 - 4 $? (2 steps)", "answer": "- Step 1: **Graph the parabola**: For $ y = x^2 - 4 $, plot vertex at (0, -4) and upward opening.  \n- Step 2: **Test a point**: Choose (0, 0). Substitute: $ 0 > 0 - 4 \\Rightarrow 0 > -4 $ (True).  \n  + Shade **above** the parabola (where inequality holds).  \n  + Use a dashed line for strict inequalities (> or <), solid line for ≤ or ≥.\n\n**Edge Case**: If inequality is $ y \\geq x^2 - 4 $, include the parabola boundary.", "source": "Qwen 3 ②", "_id": "qwen_2_2"}, {"question": "Why is the normal's slope $$-\\frac{1}{f'(a)}$$?", "answer": "The normal is perpendicular to the tangent. Perpendicular lines have slopes that multiply to $$-1$$ (assuming neither is horizontal/vertical).\n\nSo $$m_{\\text{normal}} \\cdot f'(a) = -1 \\Rightarrow m_{\\text{normal}} = -\\frac{1}{f'(a)}$$.\n\n**Special cases**:\n- If $$f'(a) = 0$$ (horizontal tangent), the normal is vertical: $$x = a$$.\n- If the tangent is vertical (derivative undefined, e.g., cusp), the normal is horizontal: $$y = f(a)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_136"}, {"question": "In the Platform problem, why is the total area the outer major sector PLUS the inner minor sector?", "answer": "Visualise: the outer major sector is like a large \"Pac-Man\" missing a wedge (where the minor angle is). The inner minor sector fills that wedge, but only up to a smaller radius.\n\nSo the combined shape is:\n- **Outer major sector**: everything within the outer radius EXCEPT the minor-angle wedge.\n- **Inner minor sector**: the minor-angle wedge, but only within the inner radius.\n\nAdding: together they cover the entire platform (all of the outer Pac-Man plus the inner wedge filler).\n\n**NOT subtraction**: subtracting would remove the minor wedge from the outer sector, leaving a hole — not the geometry here.", "source": "Opus 4.7 ①", "_id": "opus_1_183"}, {"question": "Outline the 4-step general strategy for $$p = a^x$$ substitution problems.", "answer": "- Step 1: Rewrite every term in the equation as powers of $$a^x$$, using laws like $$a^{x+c} = a^x \\cdot a^c$$ and $$a^{2x} = (a^x)^2$$.\n- Step 2: Substitute $$p = a^x$$ and clear fractions to get a polynomial in $$p$$ (usually quadratic).\n- Step 3: Solve the polynomial for $$p$$.\n- Step 4: Back-substitute each positive $$p$$-value: $$a^x = p \\Rightarrow x = \\log_a p$$. **Reject any non-positive $$p$$** since $$a^x > 0$$ always.\n\nThis technique reduces transcendental exponential equations to algebraic ones.", "source": "Opus 4.7 ①", "_id": "opus_1_97"}, {"question": "For a quartic reduced via $$u = x^2$$ to a quadratic in $$u$$, how many real $$x$$-solutions in each sign scenario? (3 steps)", "answer": "- Step 1: Both $$u$$-roots positive & distinct → 4 distinct real $$x$$ ($$\\pm\\sqrt{u_1}, \\pm\\sqrt{u_2}$$).\n- Step 2: Additional scenarios:\n+ Both positive & equal: 2 distinct real $$x$$ (each with multiplicity 2).\n+ One positive, one negative: 2 distinct real $$x$$.\n+ One positive, one zero: 3 distinct real $$x$$.\n+ Both zero: 1 real $$x$$ ($$x = 0$$).\n+ Both negative: 0 real $$x$$.\n+ Complex $$u$$-roots: 0 real $$x$$.\n- Step 3: So 4 distinct real $$x$$ requires two DISTINCT POSITIVE $$u$$-roots.", "source": "Opus 4.7 ②", "_id": "opus_2_139"}, {"question": "Misconception probe: \"If $$f''(a)=0$$, then $$x=a$$ is definitely a point of inflection.\" True or false? Give a counterexample. (2 steps)", "answer": "- Step 1: **False.** $$f''(a)=0$$ is necessary but NOT sufficient for a point of inflection. A point of inflection requires the concavity to CHANGE (from concave up to concave down, or vice versa).\n- Step 2: Counterexample: $$f(x)=x^{4}$$. Then $$f''(x)=12x^{2}$$, and $$f''(0)=0$$. But $$f''(x)\\geq 0$$ for all $$x$$ — the concavity never changes. The point $$(0,0)$$ is actually a minimum, not an inflection. To confirm an inflection, you must check that $$f''$$ changes sign at $$x=a$$.\n\nTakeaway: $$f''(a)=0$$ alone doesn't prove inflection. Need sign change in $$f''$$. Example: $$x^{4}$$ has $$f''(0)=0$$ but it's a minimum.", "source": "GLM 5.1 ③", "_id": "glm_3_81"}, {"question": "When are you safe to \"divide by $$x$$\" in an equation, and when must you be cautious? (2 steps)", "answer": "- Step 1: Dividing by $$x$$ is valid ONLY when $$x \\neq 0$$. If $$x = 0$$ is a possible solution, dividing loses it.\n- Step 2: If solving an equation where $$x = 0$$ might be a solution, instead **factor** $$x$$ out: $$x^3 - 2x = 0 \\Rightarrow x(x^2 - 2) = 0 \\Rightarrow x = 0$$ or $$x^2 = 2$$.\n\nException: when working with $$C_1: y = \\frac{1}{x}$$ type equations, the domain already excludes $$x = 0$$, so dividing is safe.\n\n**Rule**: always check whether dividing loses a solution BEFORE doing it.", "source": "Opus 4.7 ①", "_id": "opus_1_85"}, {"question": "Give the general equation of a tangent line at the point $$(x_1, y_1)$$ on a curve $$y = f(x)$$, and explain the role of each piece. (3 steps)", "answer": "- Step 1: The tangent line equation in point-gradient form: $$y - y_1 = f'(x_1)(x - x_1)$$.\n- Step 2: $$f'(x_1)$$ is the gradient of the curve at $$x_1$$, and equals the gradient of the tangent line — a SCALAR, not a whole equation.\n- Step 3: $$(x_1, y_1)$$ is the point of tangency, which must lie on BOTH the curve and the tangent line. This form fixes both slope and a single point, uniquely determining the line.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "A triangle has sides $$p$$, $$q$$, $$r$$ with $$r$$ being the longest. How can you tell from $$p^2 + q^2$$ vs $$r^2$$ whether it's acute, right, or obtuse? (3 cases)", "answer": "- $$p^2 + q^2 > r^2$$: **acute** (all angles $$< 90°$$). From cosine rule: $$\\cos C = \\frac{p^2 + q^2 - r^2}{2pq} > 0$$, so $$C < 90°$$, and since $$r$$ is the longest, $$C$$ is the largest angle — all others are even smaller.\n- $$p^2 + q^2 = r^2$$: **right-angled** (at the angle opposite $$r$$). Classic Pythagoras.\n- $$p^2 + q^2 < r^2$$: **obtuse** (at the angle opposite $$r$$). $$\\cos C < 0$$.\n\n**Quick test**: compare $$p^2 + q^2$$ with $$r^2$$ (where $$r$$ is the longest side). For sides $$4, 6, 9$$: $$16 + 36 = 52 < 81$$ → obtuse. Matches Phuc's problem.", "source": "Opus 4.7 ①", "_id": "opus_1_128"}, {"question": "For the substitution $$p = 2^x$$, express each of these in terms of $$p$$: (i) $$2 \\cdot 4^x$$, (ii) $$2^{x+3}$$, (iii) $$17 \\cdot 2^{x-1}$$. (3 steps)", "answer": "- Step 1: $$2 \\cdot 4^x$$: rewrite $$4 = 2^2$$, so $$4^x = (2^2)^x = (2^x)^2 = p^2$$. Thus $$2 \\cdot 4^x = 2p^2$$.\n- Step 2: $$2^{x+3} = 2^x \\cdot 2^3 = 8p$$ (pull the constant exponent out as a scalar factor).\n- Step 3: $$17 \\cdot 2^{x-1} = 17 \\cdot 2^x \\cdot 2^{-1} = \\tfrac{17p}{2}$$.\n\nMantra: if every term can be written as a scalar times $$p^k$$, the substitution reduces a transcendental equation to a polynomial one.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "Can a line $$y = mx + c$$ be parallel to the $$x$$-axis? If so, what are $$m$$ and $$c$$?", "answer": "Yes. Parallel to $$x$$-axis means horizontal, which means slope = 0. So $$m = 0$$, and the equation reduces to $$y = c$$, a constant.\n\nSo a line parallel to the $$x$$-axis has the form $$y = c$$ (any real $$c$$). Through the point $$(4, 2)$$: $$c = 2$$, giving $$y = 2$$.\n\n**Cannot**: a line $$y = mx + c$$ with $$m$$ nonzero cannot be horizontal. Conversely, vertical lines ($$x = a$$) cannot be expressed as $$y = mx + c$$ at all — vertical lines have undefined slope.", "source": "Opus 4.7 ①", "_id": "opus_1_170"}, {"question": "When is a quadratic inequality in $$y$$ NOT sufficient to answer a question about $$x$$? Give the classic example.", "answer": "If the original variable $$x$$ is related to $$y$$ via a non-invertible relation (like $$y = x^2$$), conditions on $$y$$ don't translate directly to conditions on $$x$$. Classic example: $$y^2 - 4y + A = 0$$ must have TWO DISTINCT POSITIVE roots for the ORIGINAL quartic to have 4 distinct real $$x$$-roots. The discriminant alone (giving distinctness) is insufficient; we also need POSITIVITY of the roots, since $$x^2 \\ge 0$$. Diagnostic: whenever you've substituted $$u = x^2$$ (or similar), always check (i) discriminant (ii) sign of sum (iii) sign of product.", "source": "Opus 4.7 ②", "_id": "opus_2_86"}, {"question": "How do you verify a completed-square form $$a(x+b)^2 + c$$? (3 steps)", "answer": "- Step 1: EXPAND back to standard form: $$a(x+b)^2 + c = ax^2 + 2abx + ab^2 + c$$.\n- Step 2: Compare to original $$ax^2 + bx + c$$. Check: $$x^2$$-coefficient is $$a$$; $$x$$-coefficient is $$2ab$$; constant is $$ab^2 + c$$.\n- Step 3: If any mismatch, redo the completing-the-square steps.\n\nExample: $$2(x-3)^2 - 4 = 2x^2 - 12x + 18 - 4 = 2x^2 - 12x + 14$$ ✓", "source": "Opus 4.7 ②", "_id": "opus_2_130"}, {"question": "How do you choose between $$<$$ (strict) and $$\\le$$ (non-strict) for inequalities over regions? (3 steps)", "answer": "- Step 1: Depends on whether the boundary is INCLUDED in $$R$$.\n- Step 2: \"Region bounded by...\" (no further specification) typically allows inclusion → $$\\le$$/$$\\ge$$.\n- Step 3: \"Strictly above/below\" or \"excluding boundary\" → strict $$<$$/$$>$$. In IAL P1, default is often $$\\le$$/$$\\ge$$ unless stated.", "source": "Opus 4.7 ②", "_id": "opus_2_131"}, {"question": "If the original curve $$y = f(x)$$ \"touches\" the x-axis at a point (indicating a repeated root), how is this \"touching\" property affected by the transformation $$y = f(-3x)$$, and why? (2 steps)", "answer": "- Step 1: The \"touching\" property is **preserved**; the new curve will still touch (not cross) the x-axis at the transformed point.\n- Step 2: A \"touch\" indicates a double root where the curve sits on one side of the axis. Reflection flips left and right but doesn't change the side relative to the x-axis locally, and compression squeezes the curve but doesn't flip it over the axis. The root remains a repeated root.\n\nGeometric transformations (shifts, stretches, reflections) preserve the fundamental shape and crossing/touching nature of the curve.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "Solve $$x\\sqrt{3} - 3 = x + \\sqrt{3}$$ in the form $$p + q\\sqrt{3}$$ without a calculator. Describe the method. (3 steps)", "answer": "- Step 1: Collect $$x$$-terms on one side, constants on the other: $$x(\\sqrt{3} - 1) = 3 + \\sqrt{3}$$.\n- Step 2: Divide to isolate $$x$$: $$x = \\frac{3 + \\sqrt{3}}{\\sqrt{3} - 1}$$. Rationalise by multiplying top and bottom by the conjugate $$\\sqrt{3} + 1$$.\n- Step 3: Expand numerator $$(3+\\sqrt{3})(\\sqrt{3}+1) = 3\\sqrt{3} + 3 + 3 + \\sqrt{3} = 6 + 4\\sqrt{3}$$, and denominator $$(\\sqrt{3})^2 - 1^2 = 2$$. Divide: $$x = 3 + 2\\sqrt{3}$$, giving $$p = 3, q = 2$$.\n\nThe trick: multiply by conjugate to kill the surd in the denominator via difference of squares.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "The second-derivative test: how do you classify stationary points using $$f''$$? (3 steps)", "answer": "- Step 1: At a stationary point $$x = a$$ (where $$f'(a) = 0$$):\n+ $$f''(a) > 0$$: local MIN (curve concave up, \"cup\").\n+ $$f''(a) < 0$$: local MAX (curve concave down, \"cap\").\n+ $$f''(a) = 0$$: INCONCLUSIVE — could be min, max, or stationary inflection.\n- Step 2: Intuition: $$f''$$ measures concavity. Stationary point where curve bends upward sits at the bottom of a local dip.\n- Step 3: $$f''(a) = 0$$ is the degenerate case — don't conclude anything. Check $$f'$$ signs on either side.", "source": "Opus 4.7 ②", "_id": "opus_2_93"}, {"question": "In the cosine rule, why must the angle $$A$$ be the one opposite side $$a$$, and what happens if you pair them wrongly?", "answer": "The formula $$a^2 = b^2 + c^2 - 2bc\\cos A$$ works ONLY when $$A$$ is opposite $$a$$ and $$b, c$$ are the two sides enclosing $$A$$. Pairing wrongly gives the wrong result.\n\nMnemonic: \"the angle and its opposite side form a pair; the other two sides enclose the angle.\" If you use the angle at vertex $$B$$ but put $$a$$ on the left, you're asking \"what's the side opposite $$A$$?\" but using the wrong angle.\n\nSafety check: label the triangle carefully. Letter each side as lowercase = opposite vertex's uppercase.", "source": "Opus 4.7 ①", "_id": "opus_1_106"}, {"question": "For the biquadratic $$u^2 - 4u + A = 0$$ (from $$x^4 - 4x^2 + A = 0$$ via $$u = x^2$$), why does \"2 distinct real $$x$$-values per positive $$u$$\" justify our counting of 4 total $$x$$-solutions?", "answer": "Each value of $$u$$ corresponds to the set of $$x$$ satisfying $$x^2 = u$$:\n- If $$u > 0$$: $$x = \\pm\\sqrt{u}$$ → **2 distinct real $$x$$**.\n- If $$u = 0$$: $$x = 0$$ → **1 real $$x$$** (double, but not distinct).\n- If $$u < 0$$: no real $$x$$.\n\nSo 4 distinct real $$x$$ requires **2 distinct positive $$u$$-roots** of the quadratic. That's why we need (i) discriminant $$> 0$$, (ii) both roots positive (via sum and product > 0).\n\nIf $$u = 0$$ were allowed, it'd give only 1 $$x$$, failing the \"4 distinct\" requirement.", "source": "Opus 4.7 ①", "_id": "opus_1_77"}, {"question": "When is the cosine rule preferred over the sine rule? (3 steps)", "answer": "- Step 1: Three sides, want an angle: ONLY cosine works.\n- Step 2: Two sides + included angle, want third side: ONLY cosine works directly.\n- Step 3: When you have a choice: prefer cosine for obtuse angles (unambiguous); prefer sine if you want a specific opposite side/angle.\n\n\"Three-of-a-kind (SSS, SAS) → cosine; mix-and-match (AAS, SSA) → sine.\"", "source": "Opus 4.7 ②", "_id": "opus_2_116"}, {"question": "A fast substitution mistake: $$\\frac{15}{2x} + 5 = x^3 - \\frac{7x}{2} + 5$$ — a student expands by multiplying through by $$2x$$ and gets $$15 + 10x = 2x^4 - 7x^2 + 10x$$. What's the error? (2 steps)", "answer": "- Step 1: The $$+5$$ terms cancel on both sides BEFORE multiplying: $$\\frac{15}{2x} = x^3 - \\frac{7x}{2}$$. If they don't, the student must multiply EVERY term by $$2x$$, not just the fractions.\n- Step 2: If the student forgets to cancel and multiplies all by $$2x$$: LHS $$= 15 + 10x$$, RHS $$= 2x^4 - 7x^2 + 10x$$. Setting equal: $$15 + 10x = 2x^4 - 7x^2 + 10x$$, which correctly simplifies to $$15 = 2x^4 - 7x^2$$ (the $$10x$$ cancels).\n\n**Lesson**: either method works IF executed carefully. But cancelling the $$+5$$'s FIRST is simpler and safer.", "source": "Opus 4.7 ①", "_id": "opus_1_130"}, {"question": "Why does each positive root of the quadratic in $$y=x^{2}$$ give exactly two real $$x$$-values, while a zero root gives only one? (2 steps)", "answer": "- Step 1: If $$y=k>0$$ is a root, then $$x^{2}=k$$ gives $$x=+\\sqrt{k}$$ and $$x=-\\sqrt{k}$$ — two distinct values. This is because squaring maps both $$+\\sqrt{k}$$ and $$-\\sqrt{k}$$ to the same $$y$$-value.\n- Step 2: If $$y=0$$ is a root, then $$x^{2}=0$$ gives only $$x=0$$ — a repeated root. And if $$y=k<0$$ is a root, then $$x^{2}=k$$ has no real solutions (you can't square a real number to get a negative). So the sign of each $$y$$-root directly determines how many $$x$$-solutions it contributes: positive → 2, zero → 1, negative → 0.\n\nTakeaway: Positive $$y$$-root → 2 real $$x$$-values. Zero → 1. Negative → 0. Count carefully.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "What's the geometric intuition for why the discriminant $$\\Delta$$ of a quadratic relates to whether a parabola intersects a line?", "answer": "Setting line $$=$$ parabola gives a quadratic. The discriminant measures the \"spread\" of the roots:\n- $$\\Delta > 0$$: roots are distinct real values → parabola crosses the line at 2 distinct points (line cuts through).\n- $$\\Delta = 0$$: one repeated root → line just touches the parabola at 1 point (tangent).\n- $$\\Delta < 0$$: no real roots → line and parabola never meet.\n\nThe discriminant is the \"intersection-counter\": think of it as how far the line is from being tangent. As $$\\Delta$$ grows from $$-\\infty$$ to $$+\\infty$$, the line transitions from \"outside\" to \"tangent\" to \"cutting through.\"", "source": "Opus 4.7 ①", "_id": "opus_1_189"}, {"question": "What's the general structure of a \"hence find...\" question after a \"show that...\" proof? (3 steps)", "answer": "- Step 1: \"Show that\" establishes a useful intermediate (factorisation, specific equation).\n- Step 2: \"Hence find\" uses that result directly — EXPECTS you to leverage the prior work.\n- Step 3: Approach: restate the \"show that\" result, then manipulate further. Don't derive from scratch.\n\nExample: \"Show $$k^2 + 26k + 169 = 0$$\" → \"Hence find $$P$$\". Use $$(k+13)^2 = 0 \\Rightarrow k = -13$$.", "source": "Opus 4.7 ②", "_id": "opus_2_124"}, {"question": "To find the y-intercept $$c$$ of a tangent line $$y = mx + c$$ to a curve, what two pieces of information must you find first, and why can't you find $$c$$ just from knowing the gradient $$m$$? (2 steps)", "answer": "- Step 1: You must find the gradient $$m$$ (by setting $$\\frac{dy}{dx}$$ equal to the given line's gradient to find the x-coordinate, then substituting x into the *curve* equation to find the y-coordinate). This gives you the exact point of tangency $$(x_1, y_1)$$.\n- Step 2: You cannot find $$c$$ from just $$m$$ because infinitely many parallel lines share the same gradient $$m$$ but have different y-intercepts. You need the specific point $$(x_1, y_1)$$ that the line passes through to solve $$y_1 = mx_1 + c$$ for $$c$$.\n\nA line is uniquely defined by a point and a gradient; missing the point means missing the intercept.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "State the cosine rule, sine rule, and the area formula $\\frac{1}{2}ab\\sin C$. When would you use each? (3 formulas)", "answer": "- Cosine Rule: $a^2 = b^2 + c^2 - 2bc\\cos A$\n+ Use when: (1) given two sides and included angle → find third side, OR (2) given all three sides → find an angle\n- Sine Rule: $\\frac{a}{\\sin A} = \\frac{b}{\\sin B} = \\frac{c}{\\sin C}$\n+ Use when: given two angles and one side (AAS/ASA), or two sides and a non-included angle (SSA — beware ambiguous case)\n- Area formula: $Area = \\frac{1}{2}ab\\sin C$\n+ Use when: given two sides and the included angle (SAS)\n\n**Common error:** Students forget which rule applies where. Cosine rule is universal for sides; sine rule needs angle-side pairs. The area formula is just the cosine rule rearranged.", "source": "MiniMax ②", "_id": "minimax_2_7"}, {"question": "When a question says \"express in the form $$kx^{n}$$,\" what exactly are you being asked to do? (2 steps)", "answer": "- Step 1: You must simplify the expression to a single term: a numerical coefficient $$k$$ times a power of $$x$$. No fractions with $$x$$ in the denominator, no surds with $$x$$ inside, no sums of terms. Everything collapses to one monomial.\n- Step 2: The process: rewrite all roots as fractional exponents, all denominators as negative exponents, apply power rules to combine, and simplify the numerical coefficient. For example, $$\\frac{16}{4096x^{-3/2}}=\\frac{1}{256}x^{3/2}$$, so $$k=\\frac{1}{256}$$ and $$n=\\frac{3}{2}$$.\n\nTakeaway: \"Form $$kx^{n}$$\" means one coefficient × one power of $$x$$. No fractions in $$x$$, no sums.", "source": "GLM 5.1 ③", "_id": "glm_3_59"}, {"question": "The \"touches\" property (double root, e.g. $$(x+2)^2$$) is preserved under ALL standard transformations. Why? (3 steps)", "answer": "- Step 1: A \"touch\" at $$x = a$$ means $$f(a) = 0$$ AND $$f'(a) = 0$$ — both function and derivative vanish. Algebraically: a repeated factor $$(x - a)^2$$ in $$f$$.\n- Step 2: Under linear transformations of $$x$$ (shift, stretch, reflect), the factorisation $$f(x) = g(x)(x-a)^2$$ transforms to $$\\tilde{f}(x) = g(h(x))(h(x) - a)^2$$ for some linear $$h$$ — still a square times something.\n- Step 3: Under vertical transformations, the double-root structure in $$f$$ is unaffected. The location of the touch moves predictably, but the NATURE (touch vs cross) stays.", "source": "Opus 4.7 ②", "_id": "opus_2_71"}, {"question": "Why is checking units and signs crucial in composite-shape problems (sectors + triangles)?", "answer": "Units (m, cm) must be consistent across the problem — mixing gives results off by factors of 100 or 1000. Signs are crucial because:\n- Obtuse angles → negative cosines.\n- Shapes may be added or subtracted (e.g., \"region with a sector bitten out\").\n- Perimeter requires straight sides OUT of the shape (can't double-count shared edges).\n\n**Habit**: at each step, ask \"Is this positive? Should it be?\" \"Are my units consistent?\" Small but frequent checks catch big errors.", "source": "Opus 4.7 ①", "_id": "opus_1_163"}, {"question": "Mental sanity check for a multi-step problem: after deriving a quadratic from \"meet at one point,\" how can you quickly verify your algebra before solving?", "answer": "- **Check 1 — leading coefficient**: for the problem setup (adding quadratics), if $$C_1$$ has $$+x^2$$ and $$C_2$$ has $$-3x^2$$, then $$C_1 - C_2$$ should have $$+4x^2$$. This matches $$4x^2 + \\ldots$$ ✓.\n- **Check 2 — constant term**: $$-9 - k$$ from $$C_1$$ minus $$k$$ from $$C_2$$'s constant. Sign matters.\n- **Check 3 — discriminant plug-in**: with simple test values (e.g., $$k = 0$$), does your quadratic make sense?\n- **Check 4 — dimensionality**: is the final expression purely in $$k$$? If there's still $$x$$, an algebra error crept in.\n\nRunning these checks takes 10 seconds and catches most errors.", "source": "Opus 4.7 ①", "_id": "opus_1_156"}, {"question": "State the complete set of index laws needed for P1, with one-line justifications. (7 steps)", "answer": "- Step 1: Product: $$a^m \\cdot a^n = a^{m+n}$$ (same base, add exponents).\n- Step 2: Quotient: $$\\tfrac{a^m}{a^n} = a^{m-n}$$.\n- Step 3: Power of power: $$(a^m)^n = a^{mn}$$.\n- Step 4: Power of product: $$(ab)^n = a^n b^n$$ (every factor gets the exponent).\n- Step 5: Negative: $$a^{-n} = \\tfrac{1}{a^n}$$.\n- Step 6: Fractional: $$a^{1/n} = \\sqrt[n]{a}$$; $$a^{m/n} = (\\sqrt[n]{a})^m$$.\n- Step 7: Zero: $$a^0 = 1$$ ($$a \\ne 0$$).\n\nAll other index manipulations combine these.", "source": "Opus 4.7 ②", "_id": "opus_2_111"}, {"question": "Why does $$\\int x^{-3}\\,dx = \\frac{x^{-2}}{-2}$$ and not $$\\frac{x^{-2}}{-2} + C$$ at the term level? When does the $$+C$$ appear? (2 steps)", "answer": "- Step 1: Each term is integrated separately using the power rule $$\\int x^{n}\\,dx = \\frac{x^{n+1}}{n+1}$$, but we do NOT add a separate constant for each term. The integration constant represents the entire family of antiderivatives, and multiple constants would just collapse into one: $$C_1 + C_2 + C_3 = C$$.\n- Step 2: The single $$+C$$ is added at the **end**, after all terms have been integrated and combined. For $$\\int(10x^{4}-\\frac{3}{2}x^{-3}-7)\\,dx$$, the answer is $$2x^{5}+\\frac{3}{4x^{2}}-7x+C$$ — one constant only.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "The two intersection points for the \"minimum area\" problem are $$C = (5, 2)$$ and $$C = (25, 2)$$ with $$A = (4, 2)$$, $$B = (15, 7)$$. Why is the MINIMUM area case $$C = (5, 2)$$ rather than the one closer to $$B$$'s projected foot?", "answer": "The perpendicular foot from $$B = (15, 7)$$ to the line $$y = 2$$ is $$(15, 2)$$. Distance from $$A$$ to this foot is $$|15 - 4| = 11$$.\n\nBoth candidate $$C$$'s are on opposite sides of this foot (at $$x = 5$$ and $$x = 25$$, each $$10$$ away from foot). But the base $$|AC|$$ differs:\n- $$C = (5, 2)$$: $$|AC| = |5 - 4| = 1$$ (SAME side of $$A$$ as the foot).\n- $$C = (25, 2)$$: $$|AC| = |25 - 4| = 21$$ (OPPOSITE side of $$A$$ from the foot).\n\nArea $$= \\frac{1}{2} \\cdot |AC| \\cdot 5$$. Smaller $$|AC|$$ → smaller area. So $$C = (5, 2)$$ gives minimum area $$= 2.5$$.", "source": "Opus 4.7 ①", "_id": "opus_1_123"}, {"question": "In a tangent-line problem, a student sets $$\\frac{dy}{dx}$$ of the curve equal to the full line equation $$y=mx+c$$. What is the correct conceptual interpretation of what $$\\frac{dy}{dx}$$ equals at the point of tangency, and why is the student's approach wrong? (2 steps)", "answer": "- Step 1: The derivative $$\\frac{dy}{dx}$$ evaluated at the tangent point is a single scalar: the gradient $$m$$ of the tangent line. It represents the instantaneous rate of change of the curve, which must match the slope of the line, not the line's output value.\n- Step 2: The line equation $$y=mx+c$$ is a function mapping $$x$$ to $$y$$. Setting a derivative equal to a function creates a category error — you are equating a rate to a position. The correct equation is $$\\frac{dy}{dx}\\big\\vert_{x=x_{0}} = m$$, after which you use the point $$(x_{0},y_{0})$$ on the curve to find $$c$$ via $$y_{0}=mx_{0}+c$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_1"}, {"question": "A curve has a stationary point of its DERIVATIVE (i.e. $$f''(x_0) = 0$$). What does this mean geometrically, and how can you exploit it? (3 steps)", "answer": "- Step 1: $$f''(x_0) = 0$$ means the rate of change of the gradient is zero at $$x_0$$ — a stationary point of $$y = f'(x)$$.\n- Step 2: Geometrically: a point where the concavity of $$f$$ is momentarily flat — often an inflection point of $$f$$.\n- Step 3: In problems: if $$f''(x_0) = 0$$ gives an equation involving only parameters of $$f''$$ (no integration constant), you can solve for a parameter WITHOUT needing $$f$$ itself.\n\nClassic use: finding $$k$$ in a parametrised $$f'$$ before integrating for $$f$$.", "source": "Opus 4.7 ②", "_id": "opus_2_94"}, {"question": "What is the Pythagorean identity, and how is it used to find cosine from sine (or vice versa) when solving triangle problems? (2 steps)", "answer": "- Step 1: $$\\sin^{2}\\theta+\\cos^{2}\\theta=1$$ — always true for any angle $$\\theta$$. Rearrange: $$\\cos^{2}\\theta=1-\\sin^{2}\\theta$$ or $$\\sin^{2}\\theta=1-\\cos^{2}\\theta$$.\n- Step 2: Given $$\\sin\\theta=\\frac{8}{15}$$, compute $$\\cos^{2}\\theta=1-\\frac{64}{225}=\\frac{161}{225}$$, so $$\\cos\\theta=\\pm\\frac{\\sqrt{161}}{15}$$. **Choose the sign based on the angle**: if $$\\theta$$ is obtuse ($$>90°$$), pick **negative**; if acute, pick **positive**.", "source": "GLM 5.1 ①", "_id": "glm_1_48"}, {"question": "After substituting $$y = -4x - 1$$ into a quadratic curve, you get $$21x^2 + 10x + 1 = 0$$. Without relying on the quadratic formula, what's the cleanest route to the roots? (3 steps)", "answer": "- Step 1: Recognise $$21 \\times 1 = 21$$ and we need two numbers multiplying to $$21$$ summing to $$10$$ — the pair $$(7, 3)$$ works.\n- Step 2: Split and group: $$21x^2 + 7x + 3x + 1 = 7x(3x+1) + 1(3x+1) = (7x+1)(3x+1)$$.\n- Step 3: Set each factor to zero: $$x = -\\tfrac{1}{7}$$ or $$x = -\\tfrac{1}{3}$$.\n\nFactorisation is preferred here because the arithmetic is tighter (fewer places to slip) than computing $$\\sqrt{16}$$ in the formula and handling the ± split.", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "For an integer-answer question \"the angle $$\\theta > 90°$$\" in the context of $$\\sin\\theta = \\frac{8}{15}$$, what's the other possible angle that gives the same sine, and why would we reject it?", "answer": "$$\\sin\\theta = \\frac{8}{15}$$ has TWO solutions in $$[0°, 180°]$$:\n- **Acute**: $$\\theta_1 = \\sin^{-1}(\\frac{8}{15}) \\approx 32.2°$$\n- **Obtuse**: $$\\theta_2 = 180° - 32.2° = 147.8°$$\n\nThese are **supplementary** (sum to $$180°$$) and both have the same sine (since $$\\sin(180° - \\theta) = \\sin\\theta$$).\n\nThe problem states $$\\theta > 90°$$, so we pick the obtuse $$\\theta_2 \\approx 147.8°$$. Consequently $$\\cos\\theta < 0$$ (second quadrant).", "source": "Opus 4.7 ①", "_id": "opus_1_155"}, {"question": "What are the conditions for using the sine rule vs. cosine rule in triangle problems? (3 steps)", "answer": "- Step 1: Use **sine rule** when:  \n  + You know two sides and a non-included angle (AAS/SSA).  \n  + You know two angles and one side (ASA/AAS).  \n  + Formula: $ \\frac{a}{\\sin A} = \\frac{b}{\\sin B} = \\frac{c}{\\sin C} $.  \n\n- Step 2: Use **cosine rule** when:  \n  + You know all three sides (SSS) and need an angle.  \n  + You know two sides and the included angle (SAS) to find the third side.  \n  + Formula: $ a^2 = b^2 + c^2 - 2bc \\cos A $.  \n\n- Step 3: **Ambiguous Case**: Sine rule can give two possible angles (acute or obtuse) in SSA configurations, while cosine rule avoids this by directly solving for sides or angles.\n\n**Key Insight**: Sine rule is better for proportional relationships between angles/sides, while cosine rule accounts for angle-side interactions explicitly.", "source": "Qwen 3 ②", "_id": "qwen_2_0"}, {"question": "What do these question triggers tell you to do? (a) \"Show that...\" (b) \"Hence...\" (c) \"Find the exact value...\" (d) \"Hence, state...\" (e) \"With respect to the $$x$$-axis...\"", "answer": "- **(a) \"Show that...\"** — Your working must algebraically lead to the given answer. Don't just state it; derive it step by step.\n- **(b) \"Hence...\"** — You MUST use your answer from the previous part. Don't recalculate from scratch — link the parts together.\n- **(c) \"Find the exact value...\"** — Give your answer as a surd or fraction, NOT a decimal.\n- **(d) \"Hence, state...\"** — No working needed, just read off or combine from previous work.\n- **(e) \"With respect to the $$x$$-axis...\"** — This tells you to consider symmetry: for every point $$(x, y)$$, there is also $$(x, -y)$$. This often doubles the number of solutions.", "source": "MiniMax ①", "_id": "minimax_1_26"}, {"question": "The graph of $$y = f(x)$$ is transformed to give $$y = f(2x - 6) + 3$$. Describe this transformation as a sequence of basic transformations, and state the order in which they should be applied.", "answer": "- This is a COMBINED transformation. Rewrite the argument as $$f(2(x - 3))$$.\n- **Step 1:** Horizontal compression by factor $$\\frac{1}{2}$$ (from the $$2x$$): $$x \\rightarrow \\frac{x}{2}$$.\n- **Step 2:** Horizontal shift RIGHT by 3 (from the $$-6$$ inside): $$x \\rightarrow x - 3$$.\n- **Step 3:** Vertical shift UP by 3 (from the $$+3$$ outside).\n\nOrder matters! The correct sequence is: **compress by 1/2, then shift right by 3, then shift up by 3**.\n\nGeneral principle: Transformations inside $$f()$$ are applied in reverse order (rightmost first); transformations outside $$f()$$ are applied in the order written (up/down last).", "source": "MiniMax ①", "_id": "minimax_1_28"}, {"question": "For a transformation $$y = f(-3x)$$, why is the point $$(0, 2)$$ unchanged?", "answer": "Under $$f(-3x)$$, each $$x$$-coordinate maps to $$x/(-3) = -x/3$$. So a point $$(a, b)$$ maps to $$(-a/3, b)$$.\n\nFor $$(0, 2)$$: $$(-0/3, 2) = (0, 2)$$. The origin $$x$$-coordinate is a **fixed point** of the transformation — it stays put.\n\nGeneral fact: the point $$(0, f(0))$$ is fixed under any horizontal scaling/reflection $$f(ax)$$ (as long as $$a \\neq 0$$), because horizontal transformations all fix the $$y$$-axis.", "source": "Opus 4.7 ①", "_id": "opus_1_117"}, {"question": "In completing the square for $$f(x)=2x^{2}-12x+14$$, what is the conceptual purpose of factoring out the leading coefficient from the first two terms before halving the linear coefficient? (3 steps)", "answer": "- Step 1: The square-completion identity $$(x+b)^{2}=x^{2}+2bx+b^{2}$$ assumes a unit coefficient on $$x^{2}$$. If the leading coefficient is $$2$$, the expression $$2x^{2}-12x$$ is not directly a perfect square trinomial.\n- Step 2: Factor out the $$2$$ to isolate a monic quadratic: $$2[x^{2}-6x]+14$$. Now the bracketed expression has leading coefficient $$1$$, so we can legally halve the $$-6$$ to get $$-3$$ and square it to $$9$$.\n- Step 3: Insert and balance the $$9$$ inside the brackets: $$2[(x-3)^{2}-9]+14 = 2(x-3)^{2}-18+14 = 2(x-3)^{2}-4$$. Without factoring out the $$2$$ first, adding $$9$$ would incorrectly alter the quadratic by $$9$$ rather than by $$2 \\times 9$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_34"}, {"question": "Practical tip: when solving for the minimum/maximum of $$y = A\\sin(Bx + C)$$, the **amplitude** and **period** don't affect where the extrema occur in terms of $$x$$, but they affect the $$y$$-values. Explain.", "answer": "- **Where extrema occur** (in $$x$$): determined by where $$\\sin$$'s argument is $$\\pi/2 + 2n\\pi$$ (max) or $$3\\pi/2 + 2n\\pi$$ (min). Only $$B$$ and $$C$$ matter (the frequency and phase), not $$A$$.\n- **What extrema values are** (in $$y$$): determined by the amplitude $$A$$:\n+ Max $$y = A$$ (when $$\\sin = 1$$).\n+ Min $$y = -A$$ (when $$\\sin = -1$$).\n\n**Separation**: the \"when\" is controlled by the argument; the \"how high\" is controlled by the amplitude.", "source": "Opus 4.7 ①", "_id": "opus_1_190"}, {"question": "Explain why the \"natural\" angle unit in calculus and circle formulas is the RADIAN, not the degree. (3 steps)", "answer": "- Step 1: Radians are defined so an arc of length $$r$$ subtends 1 rad. This makes $$\\ell/r = \\theta$$ a clean ratio.\n- Step 2: Degrees are an arbitrary historical choice (360 ≈ days in a year). They introduce a factor $$\\tfrac{\\pi}{180}$$ whenever they interact with calculus-style relationships.\n- Step 3: In radians: $$\\tfrac{d}{dx}\\sin x = \\cos x$$ cleanly. In degrees: $$\\tfrac{d}{dx}\\sin(x^\\circ) = \\tfrac{\\pi}{180}\\cos(x^\\circ)$$ — ugly. All calculus results are cleaner in radians.\n\nIAL P1 uses radians for all calculus + circle work.", "source": "Opus 4.7 ②", "_id": "opus_2_75"}, {"question": "When applying the sine rule to find a MISSING ANGLE, why must you watch out for the ambiguous case? (3 steps)", "answer": "- Step 1: $$\\arcsin(\\ldots)$$ returns a value in $$[0°, 90°]$$ on a calculator.\n- Step 2: But sine is SYMMETRIC: $$\\sin(180° - A) = \\sin A$$. So an obtuse angle gives the same sine value.\n- Step 3: If the triangle could have an obtuse angle at that vertex (SSA data), check BOTH possibilities: $$A$$ and $$180° - A$$. Use triangle angle sum ($$180°$$) to rule out impossibilities.\n\nCosine rule doesn't have this ambiguity.", "source": "Opus 4.7 ②", "_id": "opus_2_115"}, {"question": "What's the difference between a STATIONARY point and a TURNING point? (3 steps)", "answer": "- Step 1: Stationary point: ANY point where $$f'(x) = 0$$ — tangent horizontal.\n- Step 2: Turning point: stationary point where $$f$$ CHANGES DIRECTION — local min or max.\n- Step 3: A stationary point that's NOT turning is a stationary point of inflection (e.g. $$y = x^3$$ at $$x = 0$$): function continues in same direction.\n\nTest: $$f''$$ or sign-of-$$f'$$ on either side.", "source": "Opus 4.7 ②", "_id": "opus_2_138"}, {"question": "Why does integration require you to expand bracket products or split fractions BEFORE applying the power rule? (3 steps)", "answer": "- Step 1: Power rule applies to individual $$kx^n$$ terms, not to products or quotients directly.\n- Step 2: Integration is LINEAR ($$\\int(f+g) = \\int f + \\int g$$) but NOT multiplicative ($$\\int fg \\ne \\int f \\cdot \\int g$$).\n- Step 3: Preparation: expand $$x(x+1) = x^2 + x$$, THEN integrate each term. For fractions: split $$\\tfrac{x^2 + 1}{x} = x + \\tfrac{1}{x}$$ (note: $$\\tfrac{1}{x}$$ doesn't fit power rule).\n\nAlways distribute/simplify FIRST.", "source": "Opus 4.7 ②", "_id": "opus_2_102"}, {"question": "Why does the area formula $$\\frac{1}{2}ab\\sin C$$ work for the area of a triangle when two sides and the included angle are known, and what happens if angle $$C$$ is obtuse? (2 steps)", "answer": "- Step 1: Drop a perpendicular from one vertex to the opposite side (or its extension) to form height $$h$$. Using right-triangle trigonometry, $$h = a\\sin C$$. Substituting into $$\\frac{1}{2}\\times\\text{base}\\times\\text{height}$$ with base $$b$$ yields $$\\frac{1}{2}ab\\sin C$$.\n- Step 2: If $$C$$ is obtuse, $$\\sin C$$ is still positive because sine is positive in the second quadrant ($$\\sin(180^{\\circ}-C)=\\sin C$$). Geometrically, the perpendicular falls outside the base segment, but the signed lengths still combine to give the same positive area. Thus the formula remains valid for obtuse included angles.", "source": "Kimi K2.6 ②", "_id": "kimi_2_13"}, {"question": "When finding the exact distance between two points $$P$$ and $$Q$$ with coordinates involving surds, why is it important to keep the values in exact surd form until the very end? (2 steps)", "answer": "- Step 1: Rounding surds to decimals early introduces cumulative rounding errors, which can change the final answer significantly.\n- Step 2: Surd algebra often simplifies elegantly. For example, $$(
