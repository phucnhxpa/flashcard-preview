en $$m=3^{x}$$, express $$3^{x+2}$$ and $$9^{x}$$ in terms of $$m$$. (2 steps)", "answer": "- Step 1: $$3^{x+2}=3^{x}\\cdot 3^{2}=9m$$. Addition in the exponent → multiply by the constant $$3^{2}=9$$.\n- Step 2: $$9^{x}=(3^{2})^{x}=3^{2x}=(3^{x})^{2}=m^{2}$$. Change base: $$9=3^{2}$$, then $$(3^{x})^{2}=m^{2}$$. The coefficient 2 on $$x$$ becomes the power on $$m$$.\n\nTakeaway: $$a^{x+c}=a^{c}\\cdot m$$; $$(a^{2})^{x}=m^{2}$$. Same pattern regardless of the base.", "source": "GLM 5.1 ③", "_id": "glm_3_70", "judge_pick": false}, {"question": "Simple exercise: A circle sector has radius 5 and angle 1.2 rad. Find the arc length and sector area using mental math or simple calculation. (2 steps)", "answer": "- Step 1: Arc length: $$\\ell=r\\theta=5\\times 1.2=6$$. Just multiply radius by angle (in radians).\n- Step 2: Sector area: $$A=\\frac{1}{2}r^{2}\\theta=\\frac{1}{2}(25)(1.2)=\\frac{30}{2}=15$$. Half the radius squared times the angle.\n\nTakeaway: $$\\ell=r\\theta$$ and $$A=\\frac{1}{2}r^{2}\\theta$$ are quick multiplications when angle is in radians.", "source": "GLM 5.1 ③", "_id": "glm_3_71", "judge_pick": false}, {"question": "Simple exercise: The transformation $$y=f(2x)$$ is applied to a point $$(6,4)$$ on the original curve. What is the new coordinates? (2 steps)", "answer": "- Step 1: For $$y=f(ax)$$, the $$x$$-coordinate is divided by $$a$$: $$x_{\\text{new}}=\\frac{x}{a}=\\frac{6}{2}=3$$. The $$y$$-coordinate is unchanged: $$y_{\\text{new}}=4$$.\n- Step 2: The new point is $$(3,4)$$. The graph has been horizontally compressed by scale factor $$\\frac{1}{2}$$ — everything is half as far from the $$y$$-axis.\n\nTakeaway: $$f(ax)$$: divide $$x$$-coords by $$a$$. $$y$$-coords unchanged.", "source": "GLM 5.1 ③", "_id": "glm_3_72", "judge_pick": false}, {"question": "Simple exercise: A triangle has sides 7 and 10 with included angle 0.5 rad. Find its area. (1 step)", "answer": "- Step 1: Area $$=\\frac{1}{2}ab\\sin C=\\frac{1}{2}(7)(10)\\sin(0.5)=35\\sin(0.5)\\approx 35\\times 0.479\\approx 16.8$$. Direct application of the SAS formula — no need to find the third side.\n\nTakeaway: SAS area $$=\\frac{1}{2}ab\\sin C$$. Quick and direct when you have two sides and the included angle.", "source": "GLM 5.1 ③", "_id": "glm_3_73", "judge_pick": false}, {"question": "Simple exercise: $$\\left(\\frac{2}{x^{-3}}\\right)$$ simplifies to what? (1 step)", "answer": "- Step 1: $$\\frac{2}{x^{-3}}=2\\cdot x^{3}$$ (a negative exponent in the denominator flips to positive in the numerator). This is the rule $$\\frac{1}{x^{-n}}=x^{n}$$. So $$\\frac{2}{x^{-3}}=2x^{3}$$.\n\nTakeaway: Negative exponent in denominator → flip to positive in numerator. $$\\frac{1}{x^{-n}}=x^{n}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_74", "judge_pick": false}, {"question": "What is the tangent line formula, and how does it differ from the normal line formula? (2 steps)", "answer": "- Step 1: Tangent at $$(a,f(a))$$: $$y-f(a)=f'(a)(x-a)$$. The gradient is $$f'(a)$$ — the derivative at the point.\n- Step 2: Normal at $$(a,f(a))$$: $$y-f(a)=-\\frac{1}{f'(a)}(x-a)$$. The gradient is $$-\\frac{1}{f'(a)}$$ — the negative reciprocal. The normal is **perpendicular** to the tangent. If the tangent has gradient $$m$$, the normal has gradient $$-\\frac{1}{m}$$ (and $$m_{1}m_{2}=-1$$).\n\nTakeaway: Tangent gradient = $$f'(a)$$. Normal gradient = $$-\\frac{1}{f'(a)}$$. They are perpendicular.", "source": "GLM 5.1 ③", "_id": "glm_3_75", "judge_pick": true}, {"question": "When finding where $$C_{1}$$ and $$C_{2}$$ meet, what's the first algebraic step, and why must you rearrange to standard quadratic form before using the discriminant? (2 steps)", "answer": "- Step 1: Set the equations equal: $$f(x)=g(x)$$. This gives an equation in $$x$$ (possibly with parameters). The intersections are the solutions.\n- Step 2: Rearrange to standard form $$ax^{2}+bx+c=0$$ before applying $$\\Delta=b^{2}-4ac$$. The discriminant formula only applies to quadratics in the form $$ax^{2}+bx+c=0$$ — if there are $$x$$ terms on both sides, you must collect them first. For example, $$x^{2}+kx-9=-3x^{2}-5x+k$$ must become $$4x^{2}+(k+5)x-(9+k)=0$$ before computing $$\\Delta$$.\n\nTakeaway: Set equal → rearrange to $$ax^{2}+bx+c=0$$ → then apply discriminant. Never skip the rearrangement.", "source": "GLM 5.1 ③", "_id": "glm_3_76", "judge_pick": false}, {"question": "What does \"collinear\" mean in a geometry problem, and what angle relationship does it imply? (2 steps)", "answer": "- Step 1: \"Collinear\" means three or more points lie on the same straight line. If $$A$$, $$B$$, $$C$$ are collinear with $$B$$ between $$A$$ and $$C$$, then the angle at $$B$$ on one side is $$\\pi$$ (180°).\n- Step 2: The angle relationship: angles on a straight line sum to $$\\pi$$. If $$\\angle ABE$$, $$\\angle EBD$$, and $$\\angle DBC$$ all sit on the straight line through $$A$$, $$B$$, $$C$$, then $$\\angle ABE+\\angle EBD+\\angle DBC=\\pi$$. This lets you find unknown angles from known ones.\n\nTakeaway: Collinear → straight line → angles on it sum to $$\\pi$$. Use this to find missing angles.", "source": "GLM 5.1 ③", "_id": "glm_3_77", "judge_pick": true}, {"question": "What is the difference between the segment area and the sector area, and when would you need the segment? (2 steps)", "answer": "- Step 1: Sector area $$=\\frac{1}{2}r^{2}\\theta$$ (the pie slice). Segment area $$=\\frac{1}{2}r^{2}(\\theta-\\sin\\theta)$$ (the region between the chord and the arc — the pie slice minus the triangle).\n- Step 2: The segment is the sector minus the triangle: $$A_{\\text{segment}}=A_{\\text{sector}}-A_{\\text{triangle}}=\\frac{1}{2}r^{2}\\theta-\\frac{1}{2}r^{2}\\sin\\theta=\\frac{1}{2}r^{2}(\\theta-\\sin\\theta)$$. You need the segment when the shaded region is between the chord and arc (not including the triangle).\n\nTakeaway: Sector = pie slice. Segment = sector minus triangle. Formula: $$\\frac{1}{2}r^{2}(\\theta-\\sin\\theta)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_78", "judge_pick": true}, {"question": "What is the complete list of index laws, and which ones are most frequently tested in exams? (2 steps)", "answer": "- Step 1: The index laws:\n+ $$a^{m}\\cdot a^{n}=a^{m+n}$$ (multiply → add exponents)\n+ $$\\frac{a^{m}}{a^{n}}=a^{m-n}$$ (divide → subtract exponents)\n+ $$(a^{m})^{n}=a^{mn}$$ (power of power → multiply exponents)\n+ $$a^{-n}=\\frac{1}{a^{n}}$$ (negative exponent → reciprocal)\n+ $$a^{1/n}=\\sqrt[n]{a}$$ (fractional exponent → root)\n+ $$a^{m/n}=(\\sqrt[n]{a})^{m}$$ (fractional exponent → root then power)\n+ $$a^{0}=1$$ (zero exponent → 1)\n- Step 2: Most frequently tested: $$(a^{m})^{n}=a^{mn}$$ (especially with substitution), $$a^{-n}=\\frac{1}{a^{n}}$$ (especially $$\\frac{1}{x^{-k}}=x^{k}$$), and changing bases ($$16=2^{4}$$, etc.). Phuc's recurring errors involve forgetting to apply the exponent to ALL factors in brackets.\n\nTakeaway: The \"power of power\" and \"negative exponent\" rules are the most tested. Always apply exponents to every factor.", "source": "GLM 5.1 ③", "_id": "glm_3_79", "judge_pick": false}, {"question": "What is the conjugate of a surd expression, and why does multiplying by it eliminate the surd from the denominator? (2 steps)", "answer": "- Step 1: The conjugate of $$(a+b\\sqrt{c})$$ is $$(a-b\\sqrt{c})$$. The conjugate of $$(\\sqrt{3}-1)$$ is $$(\\sqrt{3}+1)$$. The sign of the surd term is flipped.\n- Step 2: When you multiply $$(a+b\\sqrt{c})(a-b\\sqrt{c})=a^{2}-b^{2}c$$, the result is rational (no surds). This is the difference of squares: $$(A+B)(A-B)=A^{2}-B^{2}$$, where $$A=a$$ and $$B=b\\sqrt{c}$$. The surd terms cancel because $$+ab\\sqrt{c}$$ and $$-ab\\sqrt{c}$$ are opposites. This is why rationalisation works.\n\nTakeaway: Conjugate flips the surd sign. Product = difference of squares = rational number. This eliminates surds from denominators.", "source": "GLM 5.1 ③", "_id": "glm_3_80", "judge_pick": false}, {"question": "Misconception probe: \"If $$f''(a)=0$$, then $$x=a$$ is definitely a point of inflection.\" True or false? Give a counterexample. (2 steps)", "answer": "- Step 1: **False.** $$f''(a)=0$$ is necessary but NOT sufficient for a point of inflection. A point of inflection requires the concavity to CHANGE (from concave up to concave down, or vice versa).\n- Step 2: Counterexample: $$f(x)=x^{4}$$. Then $$f''(x)=12x^{2}$$, and $$f''(0)=0$$. But $$f''(x)\\geq 0$$ for all $$x$$ — the concavity never changes. The point $$(0,0)$$ is actually a minimum, not an inflection. To confirm an inflection, you must check that $$f''$$ changes sign at $$x=a$$.\n\nTakeaway: $$f''(a)=0$$ alone doesn't prove inflection. Need sign change in $$f''$$. Example: $$x^{4}$$ has $$f''(0)=0$$ but it's a minimum.", "source": "GLM 5.1 ③", "_id": "glm_3_81", "judge_pick": true}, {"question": "What does \"hence\" mean in an exam question, and what happens if you ignore it and solve from scratch? (2 steps)", "answer": "- Step 1: \"Hence\" means you **must use the result from the previous part**. The examiner is telling you that the two parts are connected, and your solution to part (b) should build on part (a). Solving from scratch may get you the right answer but will lose method marks.\n- Step 2: Example: if part (a) asks you to show $$2x^{4}-7x^{2}-15=0$$, and part (b) says \"hence find the exact distance $$PQ$$,\" you must use the quartic from (a) — substitute $$u=x^{2}$$, solve, then find coordinates. If you try to find $$PQ$$ by a different method, you may lose marks even if the answer is correct.\n\nTakeaway: \"Hence\" = mandatory link to previous work. Ignoring it costs method marks.", "source": "GLM 5.1 ③", "_id": "glm_3_82", "judge_pick": false}, {"question": "When a fraction has $$\\sqrt{x}$$ in the denominator, how do you rewrite it in power form for integration or differentiation? (2 steps)", "answer": "- Step 1: $$\\sqrt{x}=x^{1/2}$$, so $$\\frac{1}{\\sqrt{x}}=x^{-1/2}$$. More generally, $$\\frac{k}{\\sqrt{x}}=kx^{-1/2}$$. The scalar stays in front; only the variable part gets the negative exponent.\n- Step 2: For integration: $$\\int x^{-1/2}\\,dx=\\frac{x^{1/2}}{1/2}+C=2\\sqrt{x}+C$$. The exponent goes from $$-\\frac{1}{2}$$ to $$\\frac{1}{2}$$, and dividing by $$\\frac{1}{2}$$ multiplies by 2. For $$\\frac{3}{\\sqrt{x}}$$: $$\\int 3x^{-1/2}\\,dx=6\\sqrt{x}+C$$.\n\nTakeaway: $$\\frac{1}{\\sqrt{x}}=x^{-1/2}$$. Integrate: $$\\int x^{-1/2}\\,dx=2\\sqrt{x}+C$$.", "source": "GLM 5.1 ③", "_id": "glm_3_83", "judge_pick": true}, {"question": "What are all the common degree-to-radian conversions you should know, and what's the quick conversion factor? (2 steps)", "answer": "- Step 1: Key conversions: $$30°=\\frac{\\pi}{6}$$, $$45°=\\frac{\\pi}{4}$$, $$60°=\\frac{\\pi}{3}$$, $$90°=\\frac{\\pi}{2}$$, $$180°=\\pi$$, $$360°=2\\pi$$. These should be instant.\n- Step 2: The conversion factor: $$1\\text{ rad}=\\frac{180°}{\\pi}\\approx 57.3°$$. To convert degrees to radians, multiply by $$\\frac{\\pi}{180}$$. To convert radians to degrees, multiply by $$\\frac{180}{\\pi}$$. Always check your calculator mode before computing trig functions — using degrees when the angle is in radians (or vice versa) is a classic error.\n\nTakeaway: Memorise the six standard conversions. Conversion: degrees × $$\\frac{\\pi}{180}$$ = radians. Always check calculator mode.", "source": "GLM 5.1 ③", "_id": "glm_3_84", "judge_pick": false}, {"question": "When computing the distance between two points with surd coordinates, how do you simplify the result to exact form? (2 steps)", "answer": "- Step 1: Apply the distance formula: $$d=\\sqrt{(x_{2}-x_{1})^{2}+(y_{2}-y_{1})^{2}}$$. With surd coordinates, expand carefully. For $$P=(\\sqrt{5},\\frac{3\\sqrt{5}}{2}+5)$$ and $$Q=(-\\sqrt{5},-\\frac{3\\sqrt{5}}{2}+5)$$: $$\\Delta x=2\\sqrt{5}$$, $$\\Delta y=3\\sqrt{5}$$.\n- Step 2: $$d=\\sqrt{(2\\sqrt{5})^{2}+(3\\sqrt{5})^{2}}=\\sqrt{20+45}=\\sqrt{65}$$. When squaring surds: $$(k\\sqrt{n})^{2}=k^{2}n$$. The result $$\\sqrt{65}$$ cannot be simplified further since 65 = 5 × 13 has no square factors.\n\nTakeaway: Distance with surds → expand squares → add → simplify the root. $$(k\\sqrt{n})^{2}=k^{2}n$$.", "source": "GLM 5.1 ③", "_id": "glm_3_85", "judge_pick": false}, {"question": "Why is it critical to use the CURVE equation (not the line) when finding the $$y$$-coordinate of the tangent point? (2 steps)", "answer": "- Step 1: The tangent point lies on BOTH the curve and the line. But after finding $$x$$ from the gradient condition, you should substitute into the **curve** equation because the curve is the original, unmodified function. The line equation still has an unknown $$c$$ at this stage — you can't use it to find $$y$$.\n- Step 2: Even if $$c$$ were known, using the curve is safer because it's the definitive location of the point. The line equation might have been written incorrectly. The sequence is always: differentiate curve → match gradient → find $$x$$ → substitute into curve for $$y$$ → then use the point in the line equation for $$c$$.\n\nTakeaway: Find $$y$$ from the curve (known equation), not the line (has unknown $$c$$). Curve first, line second.", "source": "GLM 5.1 ③", "_id": "glm_3_86", "judge_pick": true}, {"question": "What is the power rule for differentiation, and how does it apply to fractional and negative exponents? (2 steps)", "answer": "- Step 1: $$\\frac{d}{dx}(x^{n})=nx^{n-1}$$. Bring the exponent down as a multiplier, then decrease the exponent by 1. This works for ALL real $$n$$ — integer, fractional, and negative.\n- Step 2: Examples:\n+ $$\\frac{d}{dx}(x^{3/2})=\\frac{3}{2}x^{1/2}$$ (fractional exponent)\n+ $$\\frac{d}{dx}(x^{-2})=-2x^{-3}$$ (negative exponent)\n+ $$\\frac{d}{dx}(4x^{3/2})=4\\cdot\\frac{3}{2}x^{1/2}=6x^{1/2}$$ (coefficient stays)\nThe most common error: forgetting to decrease the exponent, or mishandling the sign when the exponent is negative.\n\nTakeaway: Power rule: $$nx^{n-1}$$. Works for all real $$n$$. Decrease exponent by 1, multiply by original exponent.", "source": "GLM 5.1 ③", "_id": "glm_3_87", "judge_pick": false}, {"question": "What is the power rule for integration, and what is the one value of $$n$$ where it breaks down? (2 steps)", "answer": "- Step 1: $$\\int x^{n}\\,dx=\\frac{x^{n+1}}{n+1}+C$$ for $$n\\neq -1$$. Increase the exponent by 1, then divide by the new exponent. Don't forget $$+C$$.\n- Step 2: The rule breaks down when $$n=-1$$ because you'd be dividing by $$n+1=0$$. $$\\int x^{-1}\\,dx=\\ln|x|+C$$, which is a completely different formula. At P1 level, you shouldn't encounter $$n=-1$$ in integration, but if you do, recognise it as the logarithm case.\n\nTakeaway: $$\\int x^{n}\\,dx=\\frac{x^{n+1}}{n+1}+C$$ for $$n\\neq -1$$. The $$n=-1$$ case requires $$\\ln|x|$$.", "source": "GLM 5.1 ③", "_id": "glm_3_88", "judge_pick": false}, {"question": "When a problem involves both differentiation and integration of the same function, what's the relationship between $$f$$, $$f'$$, and $$f''$$, and how do you navigate between them? (2 steps)", "answer": "- Step 1: The hierarchy: $$f \\xrightarrow{\\text{differentiate}} f' \\xrightarrow{\\text{differentiate}} f''$$. Going the other direction: $$f'' \\xrightarrow{\\text{integrate}} f' \\xrightarrow{\\text{integrate}} f$$ (plus constants). Each integration introduces a constant of integration.\n- Step 2: Strategy: if you're given $$f'(x)$$ and need $$f(x)$$, integrate once (one constant $$C$$). If you're given $$f'(x)$$ and need $$f''(x)$$, differentiate once (no new constants). The problem in Q10: given $$f'$$ with unknown $$k$$, we used $$f''(P)=0$$ to find $$k$$ (differentiation, no constant), then integrated $$f'$$ to get $$f$$ (one constant $$C$$, found from point $$P$$).\n\nTakeaway: Differentiate → move down the chain (no constants). Integrate → move up the chain (+constants). Use conditions to find constants.", "source": "GLM 5.1 ③", "_id": "glm_3_89", "judge_pick": true}, {"question": "When the question says \"state the number of real solutions with reason,\" what level of justification is expected? (2 steps)", "answer": "- Step 1: \"State\" means just give the number, but \"with reason\" means you must provide a brief justification. This is typically one sentence referencing the graph: \"The curves intersect at 2 points\" or \"The line is tangent to the curve (1 point of contact).\"\n- Step 2: The reason should reference the geometric interpretation (intersection count), not just the algebraic condition ($$\\Delta=0$$). For example: \"2 real solutions, because the cubic and the hyperbola intersect at exactly 2 points, one on each side of the asymptote.\" A sketch with the intersection points marked is ideal.\n\nTakeaway: \"State with reason\" = answer + one-sentence geometric justification. Reference the graph, not just the algebra.", "source": "GLM 5.1 ③", "_id": "glm_3_90", "judge_pick": false}, {"question": "What is the gradient condition for two lines to be parallel, and for two lines to be perpendicular? (2 steps)", "answer": "- Step 1: Two lines are **parallel** if and only if they have the **same gradient**: $$m_{1}=m_{2}$$. For example, $$y=3x+5$$ and $$y=3x-7$$ are parallel (both have gradient 3).\n- Step 2: Two lines are **perpendicular** if and only if the product of their gradients is $$-1$$: $$m_{1}\\cdot m_{2}=-1$$. Equivalently, $$m_{2}=-\\frac{1}{m_{1}}$$ (negative reciprocal). For example, $$y=2x+1$$ and $$y=-\\frac{1}{2}x+3$$ are perpendicular because $$2\\times(-\\frac{1}{2})=-1$$.\n\nTakeaway: Parallel → same gradient. Perpendicular → gradients multiply to $$-1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_91", "judge_pick": false}, {"question": "What are the midpoint and distance formulas, and when do they appear in exam questions? (2 steps)", "answer": "- Step 1: Midpoint of $$(x_{1},y_{1})$$ and $$(x_{2},y_{2})$$: $$\\left(\\frac{x_{1}+x_{2}}{2},\\frac{y_{1}+y_{2}}{2}\\right)$$. Average the $$x$$'s and average the $$y$$'s.\n- Step 2: Distance: $$d=\\sqrt{(x_{2}-x_{1})^{2}+(y_{2}-y_{1})^{2}}$$. This is the Pythagorean theorem — the distance is the hypotenuse of the right triangle with legs $$|x_{2}-x_{1}|$$ and $$|y_{2}-y_{1}|$$. These appear when finding the length of a side, verifying a point is equidistant, or computing the distance between intersection points.\n\nTakeaway: Midpoint = averages. Distance = Pythagorean theorem in 2D.", "source": "GLM 5.1 ③", "_id": "glm_3_92", "judge_pick": false}, {"question": "Misconception probe: \"For $$y=f(2x)$$, the graph stretches horizontally by scale factor 2.\" True or false? Explain. (2 steps)", "answer": "- Step 1: **False.** $$y=f(2x)$$ **compresses** the graph horizontally by scale factor $$\\frac{1}{2}$$, not stretches it. Each $$x$$-coordinate is divided by 2, so points move closer to the $$y$$-axis.\n- Step 2: The confusion comes from the intuitive expectation that \"multiplying by 2 makes things bigger.\" But for horizontal transformations inside $$f(\\;)$$, the effect is **reversed**: $$f(2x)$$ compresses, $$f(\\frac{x}{2})$$ stretches. Think of it this way: to get the same output, you only need half the input, so everything happens in half the horizontal space.\n\nTakeaway: Inside the function: larger coefficient = compression, smaller coefficient = stretch. Direction is reversed.", "source": "GLM 5.1 ③", "_id": "glm_3_93", "judge_pick": true}, {"question": "When a question asks you to \"show that\" an equation equals a specific form, what must your working demonstrate? (2 steps)", "answer": "- Step 1: \"Show that\" means your working must **arrive at** the stated result from the given information. You can't just verify by substituting the answer back — you must derive it. Every step must be clear and logical.\n- Step 2: The mark scheme typically awards marks for key intermediate steps. For \"show that $$4p^{2}-33p+8=0$$,\" marks would be for: correct substitution, clearing fractions, and reaching the final form. If you skip steps and just write the answer, you may lose method marks even if the result is correct.\n\nTakeaway: \"Show that\" = derive it step by step. Don't verify; derive. Show all key intermediate steps.", "source": "GLM 5.1 ③", "_id": "glm_3_94", "judge_pick": true}, {"question": "What is the key difference between $$\\frac{3}{4x^{2}}$$ and $$\\frac{3}{4}x^{-2}$$, and why is this distinction important? (2 steps)", "answer": "- Step 1: They are **the same expression** written differently: $$\\frac{3}{4x^{2}}=\\frac{3}{4}\\cdot\\frac{1}{x^{2}}=\\frac{3}{4}x^{-2}$$. The scalar $$\\frac{3}{4}$$ stays as a fraction; only the $$x$$-part gets the negative exponent.\n- Step 2: The distinction matters because the trap is writing $$\\frac{3}{4x^{2}}$$ as $$\\frac{3}{4}x^{-2}$$ and then incorrectly integrating as if the whole thing were $$\\frac{3}{4x^{2}}=(3)(4x^{2})^{-1}$$ — which is WRONG. The correct interpretation is $$\\frac{3}{4}\\cdot x^{-2}$$, where $$\\frac{3}{4}$$ is just a constant coefficient. When rewriting, keep the numerical coefficient separate from the variable part.\n\nTakeaway: $$\\frac{3}{4x^{2}}=\\frac{3}{4}\\cdot x^{-2}$$. The scalar is $$\\frac{3}{4}$$, not 3. Don't put the 4 inside the power.", "source": "GLM 5.1 ③", "_id": "glm_3_95", "judge_pick": true}, {"question": "When a question gives you a factorisation like $$x^{3}+4x^{2}+4x=x(x+2)^{2}$$ and then asks about solutions of a related equation, why must you use the \"hence\" approach? (2 steps)", "answer": "- Step 1: The factorisation tells you the shape of the graph: the cubic touches the $$x$$-axis at $$x=-2$$ (double root) and crosses at $$x=0$$. This is crucial visual information that you should reuse rather than re-derive.\n- Step 2: The related equation $$(x+2)(x^{3}+4x^{2}+4x)=1$$ simplifies to $$x(x+2)^{2}=\\frac{1}{x+2}$$, which asks for intersections of the cubic with a hyperbola. You count these from the sketch — no algebra needed. The \"hence\" signals: don't solve the equation algebraically; use the graphical insight from the factorisation.\n\nTakeaway: \"Hence\" after a factorisation → use the graph shape to count intersections, not algebra.", "source": "GLM 5.1 ③", "_id": "glm_3_96", "judge_pick": true}, {"question": "For the expression $$\\left(\\frac{ab^{3}}{2}\\right)^{-4/3}$$, walk through the complete simplification to $$kx^{n}$$ form, given $$a=\\frac{1}{64}x^{2}$$ and $$b=16x^{-1/2}$$. (4 steps)", "answer": "- Step 1: Compute $$ab^{3}$$: $$\\frac{1}{64}x^{2}\\cdot(16x^{-1/2})^{3}=\\frac{1}{64}x^{2}\\cdot 4096x^{-3/2}=64x^{1/2}$$. (Each factor inside the brackets gets cubed: $$16^{3}=4096$$ and $$(x^{-1/2})^{3}=x^{-3/2}$$.)\n- Step 2: Form the fraction: $$\\frac{ab^{3}}{2}=\\frac{64x^{1/2}}{2}=32x^{1/2}$$.\n- Step 3: Apply the negative exponent (flip): $$\\left(\\frac{ab^{3}}{2}\\right)^{-4/3}=\\left(\\frac{2}{ab^{3}}\\right)^{4/3}=\\left(\\frac{1}{32}x^{-1/2}\\right)^{4/3}$$. The fraction flips and the exponent becomes positive.\n- Step 4: Apply the positive exponent: $$\\left(\\frac{1}{32}\\right)^{4/3}\\cdot(x^{-1/2})^{4/3}=32^{-4/3}\\cdot x^{-2/3}$$. The numerical coefficient simplifies to a surd, and the variable part gives $$x^{-2/3}$$. The key steps: compute inside → flip → apply exponent to each factor.\n\nTakeaway: Negative exponent → flip first. Then apply positive exponent to every factor: coefficient and variable separately.", "source": "GLM 5.1 ③", "_id": "glm_3_97", "judge_pick": false}, {"question": "What is the revision priority order based on the weakness analysis, and why is sine/cosine rule ranked first? (2 steps)", "answer": "- Step 1: Priority order:\n1. Sine/Cosine Rule (forgotten in ALL 4 papers)\n2. Radian formulas: arc, sector, segment\n3. Index laws: cubing, negative exponents, substitution\n4. Inequalities/regions: $$\\leq$$ vs $$\\geq$$, above/below\n5. Graph transformations: combined reflection + compression\n6. Integration with fractions: rewrite negative powers first\n7. Discriminant trigger words\n8. Trig period formulas and sin/cos extrema\n- Step 2: Sine/Cosine rule is ranked first because it appeared as a weakness in every single paper — it's the most consistent gap. Despite being a straightforward formula, the failure to recall it blocks progress on multi-step geometry problems worth 5+ marks each. Daily drill until automatic is the prescribed action.\n\nTakeaway: Prioritise by frequency and impact. Sine/Cosine rule is the #1 gap — drill it daily.", "source": "GLM 5.1 ③", "_id": "glm_3_98", "judge_pick": false}, {"question": "What are Phuc's specific documented traps across all four papers, and how can each be prevented? (3 steps)", "answer": "- Step 1: **Formula recall traps**: forgetting sine/cosine rule, sector/arc formulas, quadratic formula. Prevention: daily flashcard drill on these six formulas until they're automatic.\n- Step 2: **Sign and direction traps**: $$\\leq$$ vs $$\\geq$$ for regions, $$\\cos\\theta$$ sign for obtuse angles, forgetting $$A>0$$ for 4 distinct roots, confusing $$\\sin=1$$ (max) with $$\\sin=-1$$ (min). Prevention: always use a test point for regions; always check the angle range for cosine sign; always check positivity constraints on substituted variables; memorise \"sin min = $$-1$$ at $$\\frac{3\\pi}{2}$$.\"\n- Step 3: **Process traps**: setting $$\\frac{dy}{dx}$$ equal to the line equation instead of just the gradient; forgetting to cube ALL factors; not recognising \"hence\" links; integrating before finding $$k$$ (two-unknowns trap); forgetting $$+C$$. Prevention: $$\\frac{dy}{dx}$$ = scalar gradient only; $$(AB)^{n}=A^{n}B^{n}$$ always; \"hence\" = reuse previous work; resolve unknowns with fewest conditions first; always add $$+C$$.\n\nTakeaway: Three categories of traps: formula recall, sign/direction, and process errors. Each has a specific prevention strategy.", "source": "GLM 5.1 ③", "_id": "glm_3_99", "judge_pick": false}], "count": 100}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "(3 steps)  \nExplain how to factorize $21x^2 + 10x + 1$ using the **\"split middle term\"** method.", "answer": "- Step 1: Multiply $a \\cdot c = 21 \\cdot 1 = 21$.  \n- Step 2: Find two numbers that multiply to 21 and add to 10: $7$ and $3$.  \n- Step 3: Split the middle term and factor by grouping:  \n  $$\n  21x^2 + 7x + 3x + 1 = 7x(3x + 1) + 1(3x + 1) = (7x + 1)(3x + 1)\n  $$  \n+ **Key insight**: This method avoids the quadratic formula and reduces arithmetic errors.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why is $\\frac{dy}{dx}$ at a tangent point equal to the **slope** of the line, not the entire line equation?", "answer": "- Step 1: The derivative $\\frac{dy}{dx}$ of a curve at a point gives the **slope** of the tangent line at that point, not the full equation.  \n- Step 2: For a line $y = mx + c$, the slope is $m$, not $mx + c$.  \n- Step 3: To find the tangent line, use the point-slope form $y - y_1 = m(x - x_1)$, where $m = \\frac{dy}{dx}$.  \n+ **Misconception**: Confusing $\\frac{dy}{dx}$ (a scalar) with the full line equation (a function).", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How do you determine the region where $y < x + 2$ **and** $y > x^2 - x$ overlap?", "answer": "- Step 1: For $y < x + 2$, shade **below** the line $y = x + 2$.  \n- Step 2: For $y > x^2 - x$, shade **above** the parabola $y = x^2 - x$.  \n- Step 3: The overlapping region is the \"lens\" where both shadings intersect.  \n+ **Key rule**: $y < f(x)$ → shade below; $y > f(x)$ → shade above.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "(3 steps)  \nHow do you find the area of a **major sector** given triangle sides $4, 6, 9$ cm and a radius of $4$ cm?", "answer": "- Step 1: Use the cosine rule to find angle $\\alpha$ opposite the side of length 9:  \n  $$\n  9^2 = 4^2 + 6^2 - 2 \\cdot 4 \\cdot 6 \\cdot \\cos\\alpha \\Rightarrow \\cos\\alpha = -\\frac{29}{48}\n  $$  \n- Step 2: Convert angle to radians: $\\alpha \\approx 2.22$ rad.  \n- Step 3: Compute major sector area with $\\theta_{\\text{major}} = 2\\pi - \\alpha$:  \n  $$\n  A = \\frac{1}{2} r^2 \\theta_{\\text{major}} \\approx \\frac{1}{2} \\cdot 16 \\cdot (4.063) \\approx 32.5 \\, \\text{cm}^2\n  $$  \n+ **Key formula**: Major angle = $2\\pi - \\text{minor angle}$.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": true}, {"question": "How to integrate $\\int \\left(10x^4 - \\frac{3}{2x^3} - 7\\right) dx$?", "answer": "- Step 1: Rewrite $\\frac{3}{2x^3}$ as $\\frac{3}{2}x^{-3}$.  \n- Step 2: Integrate term-by-term:  \n  $$\n  \\int 10x^4 dx = 2x^5, \\quad \\int -\\frac{3}{2}x^{-3} dx = \\frac{3}{4}x^{-2}, \\quad \\int -7 dx = -7x\n  $$  \n- Step 3: Combine with $+C$:  \n  $$\n  2x^5 + \\frac{3}{4x^2} - 7x + C\n  $$  \n+ **Key rule**: Always rewrite terms with $x$ in the denominator as negative exponents before integrating.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How to express $2^{n+3}$ and $16^{3n}$ in terms of $m = 2^n$?", "answer": "- Step 1: $2^{n+3} = 2^n \\cdot 2^3 = 8m$.  \n- Step 2: $16^{3n} = (2^4)^{3n} = 2^{12n} = (2^n)^{12} = m^{12}$.  \n+ **Key insight**: Express all bases as powers of $2$ to simplify substitution.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Describe the graph transformation $y = f(-3x)$ given the original points $(-1, 0), (0, 2), (3, 0)$.", "answer": "- Step 1: For $y = f(-3x)$, replace $x$ with $-\\frac{x}{3}$.  \n- Step 2: Apply to each point:  \n  - $(-1, 0) \\rightarrow \\left(\\frac{1}{3}, 0\\right)$  \n  - $(0, 2) \\rightarrow (0, 2)$  \n  - $(3, 0) \\rightarrow (-1, 0)$  \n- Step 3: This is a horizontal **compression by $\\frac{1}{3}$** and **reflection over the y-axis**.  \n+ **Key rule**: Inside the function $f()$ affects $x$-coordinates inversely (e.g., $f(ax)$ compresses by $\\frac{1}{a}$).", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why must both the discriminant **and** the product of roots be positive for 4 distinct real intersections in $x^4 - 4x^2 + A = 0$?", "answer": "- Step 1: Substitute $y = x^2$ to get $y^2 - 4y + A = 0$.  \n- Step 2: For 4 real $x$, need 2 distinct **positive** $y$-roots (each gives $x = \\pm \\sqrt{y}$).  \n- Step 3: Conditions:  \n  - Discriminant $> 0$: $16 - 4A > 0 \\Rightarrow A < 4$.  \n  - Product of roots $> 0$: $A > 0$.  \n+ **Key insight**: Even if discriminant is positive, negative roots would not yield real $x$.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": true}, {"question": "How to find the minimum value of $y = 12\\sin(x + B)$ and the corresponding $x$?", "answer": "- Step 1: The minimum of $\\sin\\theta$ is $-1$, so $y_{\\text{min}} = 12 \\cdot (-1) = -12$.  \n- Step 2: Solve $x + B = \\frac{3\\pi}{2} + 2n\\pi$ for the smallest positive $x$.  \n- Step 3: If $x = \\frac{\\pi}{4}$ is given as the minimum point, solve for $B$:  \n  $$\n  \\frac{\\pi}{4} + B = \\frac{3\\pi}{2} \\Rightarrow B = \\frac{5\\pi}{4}\n  $$  \n+ **Key rule**: Sine minima occur at $\\theta = \\frac{3\\pi}{2} + 2n\\pi$.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How to derive the quadratic formula from $ax^2 + bx + c = 0$?", "answer": "- Step 1: Divide by $a$: $x^2 + \\frac{b}{a}x + \\frac{c}{a} = 0$.  \n- Step 2: Complete the square:  \n  $$\n  x^2 + \\frac{b}{a}x = -\\frac{c}{a} \\Rightarrow \\left(x + \\frac{b}{2a}\\right)^2 = \\frac{b^2 - 4ac}{4a^2}\n  $$  \n- Step 3: Take square roots and solve for $x$:  \n  $$\n  x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}\n  $$  \n+ **Key insight**: Completing the square is the bridge from standard form to the quadratic formula.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": true}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What are the conditions for using the sine rule vs. cosine rule in triangle problems? (3 steps)", "answer": "- Step 1: Use **sine rule** when:  \n  + You know two sides and a non-included angle (AAS/SSA).  \n  + You know two angles and one side (ASA/AAS).  \n  + Formula: $ \\frac{a}{\\sin A} = \\frac{b}{\\sin B} = \\frac{c}{\\sin C} $.  \n\n- Step 2: Use **cosine rule** when:  \n  + You know all three sides (SSS) and need an angle.  \n  + You know two sides and the included angle (SAS) to find the third side.  \n  + Formula: $ a^2 = b^2 + c^2 - 2bc \\cos A $.  \n\n- Step 3: **Ambiguous Case**: Sine rule can give two possible angles (acute or obtuse) in SSA configurations, while cosine rule avoids this by directly solving for sides or angles.\n\n**Key Insight**: Sine rule is better for proportional relationships between angles/sides, while cosine rule accounts for angle-side interactions explicitly.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": true}, {"question": "Why is the formula for the area of a sector $ A = \\frac{1}{2} r^2 \\theta $? (3 steps)", "answer": "- Step 1: A full circle's area is $ \\pi r^2 $, and a full angle is $ 2\\pi $ radians.  \n- Step 2: The sector fraction is $ \\frac{\\theta}{2\\pi} $, so the area becomes:  \n  $$\n  A = \\pi r^2 \\cdot \\frac{\\theta}{2\\pi} = \\frac{1}{2} r^2 \\theta\n  $$  \n- Step 3: This works because **θ** is in radians (dimensionless), making the formula dimensionally consistent. For degrees, convert to radians first.\n\n**Misconception Probe**: Why isn't the formula $ \\frac{1}{2} r \\theta $? (Because area scales with **r²**, not **r**.)", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How do you determine the region defined by a quadratic inequality like $ y > x^2 - 4 $? (2 steps)", "answer": "- Step 1: **Graph the parabola**: For $ y = x^2 - 4 $, plot vertex at (0, -4) and upward opening.  \n- Step 2: **Test a point**: Choose (0, 0). Substitute: $ 0 > 0 - 4 \\Rightarrow 0 > -4 $ (True).  \n  + Shade **above** the parabola (where inequality holds).  \n  + Use a dashed line for strict inequalities (> or <), solid line for ≤ or ≥.\n\n**Edge Case**: If inequality is $ y \\geq x^2 - 4 $, include the parabola boundary.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": true}, {"question": "Why does the discriminant $ \\Delta = b^2 - 4ac $ determine the nature of roots? (4 steps)", "answer": "- Step 1: The quadratic formula $ x = \\frac{-b \\pm \\sqrt{\\Delta}}{2a} $ depends on $ \\sqrt{\\Delta} $.  \n- Step 2: **Δ > 0**: Two distinct real roots (±√Δ gives two values).  \n- Step 3: **Δ = 0**: One repeated real root (±√0 collapses to 0).  \n- Step 4: **Δ < 0**: No real roots (square root of negative number is undefined in reals).  \n\n**Derivation Insight**: Completing the square on $ ax^2 + bx + c $ leads to the discriminant in the radical.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "How do horizontal stretches and compressions affect a graph $ y = f(kx) $? (3 steps)", "answer": "- Step 1: **Horizontal stretch** by factor $ \\frac{1}{k} $ if $ 0 < |k| < 1 $.  \n- Step 2: **Horizontal compression** by factor $ \\frac{1}{k} $ if $ |k| > 1 $.  \n- Step 3: If $ k < 0 $, reflect over the y-axis (e.g., $ y = f(-3x) $ is a reflection + compression).  \n\n**Example**: $ f(x) = \\sin x $ vs. $ f(2x) $ oscillates twice as fast.\n\n**Misconception**: Why isn't $ f(2x) $ a vertical compression? (Horizontal transformations affect **x** values directly.)", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "Why does integrating $ x^{-1} $ differ from other power rules? (3 steps)", "answer": "- Step 1: Power rule $ \\int x^n dx = \\frac{x^{n+1}}{n+1} + C $ fails for $ n = -1 $ (division by zero).  \n- Step 2: Instead, $ \\int \\frac{1}{x} dx = \\ln|x| + C $, derived from the derivative of $ \\ln|x| $.  \n- Step 3: This reflects the natural logarithm's unique property as the inverse of the exponential function.\n\n**Contrast**: Negative exponents like $ x^{-2} $ integrate to $ -x^{-1} + C $, but $ x^{-1} $ is a special case.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "How does substituting $ p = 2^x $ simplify exponential equations like $ 2^{2x} + 3 \\cdot 2^x + 2 = 0 $? (3 steps)", "answer": "- Step 1: Let $ p = 2^x $, so $ 2^{2x} = (2^x)^2 = p^2 $.  \n- Step 2: Substitute: $ p^2 + 3p + 2 = 0 \\Rightarrow (p+1)(p+2) = 0 $.  \n- Step 3: Solve $ p = -1 $ (invalid, since $ 2^x > 0 $) or $ p = -2 $ (also invalid). No real solutions.  \n\n**Key Insight**: Substitution reduces the equation to a quadratic, but constraints on $ p $ must be checked.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": true}], "count": 7}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Using the discriminant $$\\Delta = b^2 - 4ac$$, state the condition on $$\\Delta$$ for each case: (i) two distinct real roots, (ii) one repeated root, (iii) no real roots.", "answer": "- For any quadratic $$ax^2 + bx + c = 0$$:\n- (i) **Two distinct real roots** $$\\Rightarrow \\Delta > 0$$\n- (ii) **One repeated root (tangent)** $$\\Rightarrow \\Delta = 0$$\n- (iii) **No real roots** $$\\Rightarrow \\Delta < 0$$\n\nThe discriminant tells you how many times the parabola crosses the $$x$$-axis.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A line is tangent to the curve $$y = 2x^2 + 8x + 3$$ at point $$P$$. If the line is $$y = 4x + c$$, find the value of $$c$$. (4 steps)", "answer": "- Step 1: **Differentiate the curve** to find its gradient function:\n$$\\frac{dy}{dx} = 4x + 8$$\n- Step 2: **Equate gradients** at the tangent point — the derivative equals the line's gradient ($$m = 4$$, the coefficient of $$x$$, NOT the whole equation):\n$$4x + 8 = 4 \\Rightarrow x = -1$$\n- Step 3: **Find $$y$$ at this $$x$$** using the original curve equation:\n$$y = 2(-1)^2 + 8(-1) + 3 = 2 - 8 + 3 = -3$$\nTangent point is $$P(-1, -3)$$.\n- Step 4: **Substitute point into the line** to find $$c$$:\n$$-3 = 4(-1) + c \\Rightarrow c = 1$$\n\nKey insight: $$\\frac{dy}{dx}$$ at the tangent point equals the gradient (scalar), not the line equation.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "For the region defined by $$y < x + 2$$ AND $$y > x^2 - x$$, describe how to find the solution region graphically.", "answer": "- Step 1: **Handle each inequality separately:**\n- $$y < x + 2$$: region BELOW the line (dashed boundary since strict)\n- $$y > x^2 - x$$: region ABOVE the parabola\n- Step 2: **Shade each region** on the same axes.\n- Step 3: **The solution is the OVERLAP** (the \"lens-shaped\" region between the line above and parabola below).\n\nGeneral rule: $$y < f(x)$$ means BELOW the curve; $$y > f(x)$$ means ABOVE. Pick a test point to verify.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "A triangle has sides 4 cm, 6 cm, and 9 cm. Using the cosine rule, find the angle opposite the longest side, and hence find the area of the major sector of radius 4 cm with that angle. (3 steps)", "answer": "- Step 1: **Apply cosine rule** to find angle $$\\alpha$$ opposite side 9:\n$$9^2 = 4^2 + 6^2 - 2(4)(6)\\cos\\alpha$$\n$$81 = 16 + 36 - 48\\cos\\alpha \\Rightarrow \\cos\\alpha = \\frac{-29}{48}$$\n$$\\alpha = \\cos^{-1}\\left(-\\frac{29}{48}\\right) \\approx 2.22 \\text{ rad}$$ (obtuse, since $$\\cos < 0$$)\n- Step 2: **Identify major vs minor:** Since $$\\alpha > \\frac{\\pi}{2}$$, this is the minor angle. Major angle $$\\theta_{major} = 2\\pi - \\alpha \\approx 4.063$$ rad.\n- Step 3: **Sector area formula** (in radians): $$A = \\frac{1}{2}r^2\\theta$$\n$$A_{major} = \\frac{1}{2}(4^2)(4.063) = \\frac{1}{2}(16)(4.063) \\approx 32.5 \\text{ cm}^2$$", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": true}, {"question": "Evaluate $$\\int\\left(10x^4 - \\frac{3}{2x^3} - 7\\right)dx$$ in simplest form. (3 steps)", "answer": "- Step 1: **Rewrite the denominator term** as a negative power:\n$$\\frac{3}{2x^3} = \\frac{3}{2}x^{-3}$$\n- Step 2: **Integrate each term** using $$\\int x^n dx = \\frac{x^{n+1}}{n+1} + C$$:\n$$\\int 10x^4 dx = 2x^5$$\n$$\\int -\\frac{3}{2}x^{-3} dx = -\\frac{3}{2} \\cdot \\frac{x^{-2}}{-2} = \\frac{3}{4}x^{-2} = \\frac{3}{4x^2}$$\n$$\\int -7 dx = -7x$$\n- Step 3: **Combine + constant:**\n$$2x^5 + \\frac{3}{4x^2} - 7x + C$$\n\nKey rule: ALWAYS rewrite $$\\frac{1}{x^n}$$ as $$x^{-n}$$ BEFORE integrating.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "(a) Given $$m = 2^n$$, express in terms of $$m$$: (i) $$2^{n+3}$$ (ii) $$16^{3n}$$. (b) Solve $$x\\sqrt{3} - 3 = x + \\sqrt{3}$$ in the form $$p + q\\sqrt{3}$$. (3 steps)", "answer": "- Step 1: **(a)(i)** Use $$2^{n+3} = 2^n \\cdot 2^3 = 8 \\cdot 2^n = 8m$$\n**(a)(ii)** Change base: $$16 = 2^4$$, so $$16^{3n} = (2^4)^{3n} = 2^{12n} = (2^n)^{12} = m^{12}$$\n- Step 2: **(b) Collect x-terms:**\n$$x\\sqrt{3} - x = 3 + \\sqrt{3} \\Rightarrow x(\\sqrt{3} - 1) = 3 + \\sqrt{3}$$\n- Step 3: **Rationalise** by multiplying numerator and denominator by conjugate $$(\\sqrt{3} + 1)$$:\n$$x = \\frac{(3+\\sqrt{3})(\\sqrt{3}+1)}{(\\sqrt{3}-1)(\\sqrt{3}+1)} = \\frac{6 + 4\\sqrt{3}}{3 - 1} = \\frac{6 + 4\\sqrt{3}}{2} = 3 + 2\\sqrt{3}$$\nSo $$p = 3, q = 2$$.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "A curve $$y = f(x)$$ passes through $$(-1, 0)$$, $$(0, 2)$$, and touches the $$x$$-axis at $$(3, 0)$$. Sketch (a) $$y = f(x + 3)$$ and (b) $$y = f(-3x)$$. Give the new coordinates of these three key points for each transformation.", "answer": "- Step 1: **For $$y = f(x + 3)$$** — horizontal shift LEFT by 3 (inside $$f$$ means horizontal, reversed direction):\n- $$(-1, 0) \\rightarrow (-4, 0)$$\n- $$(0, 2) \\rightarrow (-3, 2)$$\n- $$(3, 0)$$ (touches) $$\\rightarrow (0, 0)$$ (still touches)\n- Step 2: **For $$y = f(-3x)$$** — reflection in $$y$$-axis AND horizontal compression by factor of $$\\frac{1}{3}$$ (divide each $$x$$-coordinate by $$-3$$):\n- $$(-1, 0) \\rightarrow \\left(\\frac{-1}{-3}, 0\\right) = \\left(\\frac{1}{3}, 0\\right)$$\n- $$(0, 2) \\rightarrow (0, 2)$$ (unchanged)\n- $$(3, 0)$$ (touches) $$\\rightarrow \\left(\\frac{3}{-3}, 0\\right) = (-1, 0)$$ (still touches)", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Curves $$C_1: y = x^2 + kx - 9$$ and $$C_2: y = -3x^2 - 5x + k$$ meet at exactly one point. Find (a) the equation satisfied by $$k$$, and (b) the coordinates of this point. (3 steps)", "answer": "- Step 1: **Set equations equal** and rearrange to form a quadratic:\n$$x^2 + kx - 9 = -3x^2 - 5x + k$$\n$$4x^2 + (k+5)x - (9 + k) = 0$$\n- Step 2: **\"Single point\" = one repeated root** $$\\Rightarrow \\Delta = 0$$:\n$$\\Delta = (k+5)^2 - 4(4)(-(9+k)) = (k+5)^2 + 16(9+k)$$\n$$= k^2 + 10k + 25 + 144 + 16k = k^2 + 26k + 169 = 0$$\n- Step 3: **Solve for the point:** From $$\\Delta = 0$$ equation, $$(k+13)^2 = 0 \\Rightarrow k = -13$$. Substitute back:\n$$4x^2 - 8x + 4 = 0 \\Rightarrow (x-1)^2 = 0 \\Rightarrow x = 1$$\n$$y = 1 - 13 - 9 = -21$$\nPoint $$P = (1, -21)$$.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "The line $$l: y - 5x = 75$$ and curve $$C: y = 2x^2 + x - 21$$ intersect at points $$P$$ and $$Q$$. The region $$R$$ is bounded by $$C$$, $$l$$, and the $$x$$-axis. Define $$R$$ using inequalities. (3 steps)", "answer": "- Step 1: **Find intersection points** (for reference): $$x^2 - 2x - 48 = 0 \\Rightarrow x = 8, -6$$\nSo $$P = (-6, 45)$$, $$Q = (8, 115)$$.\n- Step 2: **Identify each boundary** and its inequality direction:\n- $$x$$-axis: above $$\\Rightarrow y \\geq 0$$\n- Line $$l$$ (below the region): $$y \\leq 5x + 75$$\n- Curve $$C$$ (above the region): $$y \\geq 2x^2 + x - 21$$\n- Step 3: **Write the four inequalities:**\n$$\\boxed{y \\geq 0, \\quad y \\leq 5x + 75, \\quad y \\geq 2x^2 + x - 21}$$\n\nThe region is \"sandwiched\" between the curve (floor) and line (ceiling), above the $$x$$-axis.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Curves $$C_1: y = x(4 - x^2)$$ and $$C_2: y = \\frac{A}{x}$$ meet at 4 distinct points. The intersection equation is $$x^4 - 4x^2 + A = 0$$. Find the range of values of $$A$$. (3 steps)", "answer": "- Step 1: **Substitute $$y = x^2$$** (where $$y \\geq 0$$) to convert to quadratic in $$y$$:\n$$y^2 - 4y + A = 0$$\n- Step 2: **For 4 distinct real $$x$$**, we need TWO distinct POSITIVE $$y$$-roots (each positive $$y$$ gives $$x = \\pm\\sqrt{y}$$).\n- Condition 1: **Discriminant > 0** for distinct roots:\n$$\\Delta = 16 - 4A > 0 \\Rightarrow A < 4$$\n- Condition 2: **Product of roots > 0** (both positive):\n$$Product = A > 0$$\n- Condition 3: Sum of roots = 4 > 0 (automatically satisfied)\n- Step 3: **Combine:**\n$$\\boxed{0 < A < 4}$$\n\nCommon trap: Only checking $$\\Delta > 0$$ is insufficient — roots could be negative or zero!", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Point $$A = (4, 2)$$, $$B = (15, 7)$$. A line $$l_2$$ passes through $$A$$ and is parallel to the $$x$$-axis. Point $$C$$ lies on $$l_2$$ such that $$BC = 5\\sqrt{5}$$. Find the possible coordinates of $$C$$. (3 steps)", "answer": "- Step 1: **Identify the line:** \"Parallel to the $$x$$-axis through $$(a, b)$$\" means simply $$y = b$$. So through $$A(4, 2)$$: $$l_2: y = 2$$. Thus $$C = (x, 2)$$.\n- Step 2: **Use distance formula** with $$B = (15, 7)$$:\n$$(15 - x)^2 + (7 - 2)^2 = (5\\sqrt{5})^2 = 125$$\n$$(15 - x)^2 + 25 = 125 \\Rightarrow (15 - x)^2 = 100$$\n- Step 3: **Solve:**\n$$15 - x = \\pm 10$$\n- If $$15 - x = 10 \\Rightarrow x = 5 \\Rightarrow C = (5, 2)$$\n- If $$15 - x = -10 \\Rightarrow x = 25 \\Rightarrow C = (25, 2)$$", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "The curve $$y = 12\\sin(x + B)$$ has its minimum point (smallest positive $$x$$) at $$\\left(\\frac{\\pi}{4}, A\\right)$$. Find (i) the value of $$A$$ and (ii) the smallest positive value of $$B$$. (2 steps)", "answer": "- Step 1: **(i) Find $$A$$:** At a minimum, $$\\sin(\\text{angle}) = -1$$ (the lowest value sine can take).\n$$A = 12 \\times (-1) = -12$$\n- Step 2: **(ii) Find $$B$$:** The angle giving $$\\sin\\theta = -1$$ is $$\\theta = \\frac{3\\pi}{2} + 2n\\pi$$ (for integer $$n$$).\nAt the minimum point $$x = \\frac{\\pi}{4}$$:\n$$\\frac{\\pi}{4} + B = \\frac{3\\pi}{2} + 2n\\pi \\Rightarrow B = \\frac{5\\pi}{4} + 2n\\pi$$\nFor smallest positive $$B$$, take $$n = 0$$:\n$$B = \\frac{5\\pi}{4}$$", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "In $$\\triangle ABC$$, $$AB = 15$$ cm, $$AC = 25$$ cm, and the area is 100 cm$$^2$$. Given that $$\\theta = \\angle BAC > 90^\\circ$$, find (a) $$\\sin\\theta$$ and (b) the length $$BC$$ to 3 s.f. (3 steps)", "answer": "- Step 1: **(a) Use area formula** (SAS): $$Area = \\frac{1}{2}ab\\sin C$$\n$$100 = \\frac{1}{2}(15)(25)\\sin\\theta = 187.5\\sin\\theta$$\n$$\\sin\\theta = \\frac{8}{15}$$\n- Step 2: **(b) Find $$\\cos\\theta$$** using $$\\sin^2\\theta + \\cos^2\\theta = 1$$:\n$$\\cos^2\\theta = 1 - \\left(\\frac{8}{15}\\right)^2 = 1 - \\frac{64}{225} = \\frac{161}{225}$$\nSince $$\\theta > 90^\\circ$$ (obtuse), $$\\cos\\theta < 0$$:\n$$\\cos\\theta = -\\frac{\\sqrt{161}}{15}$$\n- Step 3: **Apply cosine rule** to find $$BC$$ (side opposite $$\\theta$$):\n$$BC^2 = 15^2 + 25^2 - 2(15)(25)\\cos\\theta = 225 + 625 - 750\\left(-\\frac{\\sqrt{161}}{15}\\right)$$\n$$= 850 + 50\\sqrt{161}$$\n$$BC \\approx 36.8 \\text{ cm}$$", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "By substituting $$p = 2^x$$, show that $$2 \\cdot 4^x - 2^{x+3} = 17 \\cdot 2^{x-1} - 4$$ becomes the quadratic $$4p^2 - 33p + 8 = 0$$. Hence find $$x$$. (3 steps)", "answer": "- Step 1: **Rewrite each term** as a power of $$2^x = p$$:\n- $$4^x = (2^2)^x = (2^x)^2 = p^2$$, so $$2 \\cdot 4^x = 2p^2$$\n- $$2^{x+3} = 2^x \\cdot 2^3 = 8p$$\n- $$2^{x-1} = 2^x \\cdot 2^{-1} = \\frac{p}{2}$$\n- Step 2: **Substitute into equation:**\n$$2p^2 - 8p = 17\\left(\\frac{p}{2}\\right) - 4$$\n$$2p^2 - 8p = \\frac{17p}{2} - 4$$\nMultiply by 2 to clear fractions:\n$$4p^2 - 16p = 17p - 8 \\Rightarrow 4p^2 - 33p + 8 = 0$$\n- Step 3: **Factor and solve:**\n$$(4p - 1)(p - 8) = 0 \\Rightarrow p = \\frac{1}{4}$$ or $$p = 8$$\n- If $$p = 8 \\Rightarrow 2^x = 8 = 2^3 \\Rightarrow x = 3$$\n- If $$p = \\frac{1}{4} \\Rightarrow 2^x = \\frac{1}{4} = 2^{-2} \\Rightarrow x = -2$$", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": true}, {"question": "A platform consists of two concentric circular sectors. The inner sector has radius ratio $$DA:AO = 3:5$$, and arc $$CD = 9$$ m with central angle 0.8 rad. Find the outer radius $$AO$$. (3 steps)", "answer": "- Step 1: **Set up from the ratio:** Let $$DA = 3x$$, $$AO = 5x$$. Then inner radius $$DO = DA + AO = 3x + 5x = 8x$$.\n- Step 2: **Use arc length formula** $$\\ell = r\\theta$$ with given arc $$CD = 9$$ m:\n$$8x \\times 0.8 = 9 \\Rightarrow 6.4x = 9 \\Rightarrow x = \\frac{9}{6.4} = 1.40625$$\n- Step 3: **Find $$AO$$:**\n$$AO = 5x = 5(1.40625) = 7.03125 \\approx 7.03 \\text{ m}$$", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Find the perimeter of the platform in the previous question, given the outer sector's angle is 0.8 rad. (3 steps)", "answer": "- Step 1: **Identify all boundary segments:**\n- Outer major arc (angle $$2\\pi - 0.8 = 5.4832$$ rad)\n- Inner arc $$CD = 9$$ m (given)\n- Two straight edges: $$DA$$ and $$BC$$ (each $$= 3x = 3(1.40625) = 4.21875$$ m)\n- Step 2: **Calculate outer major arc:**\n$$\\ell_{major} = r\\theta = 7.03125 \\times 5.4832 \\approx 38.6 \\text{ m}$$\n- Step 3: **Sum all boundaries:**\n$$P \\approx 38.6 + 9 + 4.21875 + 4.21875 \\approx 56.0 \\text{ m}$$", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "A curve has $$f'(x) = 4x^{3/2} + \\frac{k}{x^2}$$. Given that $$f''(2) = 0$$ at point $$P(2, 8\\sqrt{2})$$, find (a) the exact value of $$k$$ and (b) the equation of the curve. (4 steps)", "answer": "- Step 1: **(a) Find $$f''(x)$$** by differentiating $$f'(x)$$:\n$$f'(x) = 4x^{3/2} + kx^{-2}$$\n$$f''(x) = 4 \\cdot \\frac{3}{2}x^{1/2} + k(-2)x^{-3} = 6x^{1/2} - 2kx^{-3}$$\n- Step 2: **Set $$f''(2) = 0$$** to find $$k$$:\n$$6\\sqrt{2} - 2k(2^{-3}) = 0 \\Rightarrow 6\\sqrt{2} - \\frac{2k}{8} = 0$$\n$$6\\sqrt{2} = \\frac{k}{4} \\Rightarrow k = 24\\sqrt{2}$$\n- Step 3: **(b) Integrate $$f'(x)$$** with $$k = 24\\sqrt{2}$$:\n$$f(x) = \\int\\left(4x^{3/2} + \\frac{24\\sqrt{2}}{x^2}\\right)dx = \\frac{8}{5}x^{5/2} - \\frac{24\\sqrt{2}}{x} + C$$\n- Step 4: **Use point $$P(2, 8\\sqrt{2})$$** to find $$C$$:\n$$8\\sqrt{2} = \\frac{8}{5}(2^{5/2}) - \\frac{24\\sqrt{2}}{2} + C$$\n$$2^{5/2} = 4\\sqrt{2}$$, so:\n$$8\\sqrt{2} = \\frac{8}{5}(4\\sqrt{2}) - 12\\sqrt{2} + C = \\frac{32\\sqrt{2}}{5} - 12\\sqrt{2} + C$$\n$$C = 8\\sqrt{2} + 12\\sqrt{2} - \\frac{32\\sqrt{2}}{5} = \\frac{68\\sqrt{2}}{5}$$\n$$f(x) = \\frac{8}{5}x^{5/2} - \\frac{24\\sqrt{2}}{x} + \\frac{68\\sqrt{2}}{5}$$", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": true}, {"question": "Express each of the following in the form $$kx^n$$: (a) $$\\sqrt{\\frac{x^2}{64}}$$ (b) $$\\frac{16}{b^3}$$ where $$b = \\frac{16}{\\sqrt{x}}$$ (c) $$\\left(\\frac{ab^3}{2}\\right)^{-4/3}$$ where $$a = \\frac{x^2}{64}$$. (3 steps)", "answer": "- Step 1: **(a)** $$\\sqrt{\\frac{x^2}{64}} = \\left(\\frac{x^2}{64}\\right)^{1/2} = \\frac{x}{8} = \\frac{1}{8}x^1$$\nSo $$k = \\frac{1}{8}, n = 1$$.\n- Step 2: **(b)** First rewrite $$b = 16x^{-1/2}$$. Then:\n$$b^3 = 16^3 \\cdot x^{-3/2} = 4096x^{-3/2}$$\n$$\\frac{16}{b^3} = \\frac{16}{4096x^{-3/2}} = \\frac{1}{256}x^{3/2}$$\nSo $$k = \\frac{1}{256}, n = \\frac{3}{2}$$.\n- Step 3: **(c)** Compute $$ab^3$$:\n$$a \\cdot b^3 = \\frac{x^2}{64} \\cdot 4096x^{-3/2} = 64x^{1/2}$$\nThen $$\\left(\\frac{ab^3}{2}\\right)^{-4/3} = \\left(\\frac{64x^{1/2}}{2}\\right)^{-4/3} = \\left(32x^{1/2}\\right)^{-4/3}$$\nNegative exponent flips: $$= \\left(\\frac{2}{32x^{1/2}}\\right)^{4/3} = \\left(\\frac{1}{16x^{1/2}}\\right)^{4/3} = 16^{-4/3} \\cdot x^{-2/3}$$\n$$= \\frac{1}{(\\sqrt[3]{16})^4} x^{-2/3} = \\frac{1}{4\\sqrt[3]{4}}x^{-2/3} = \\frac{\\sqrt[3]{4}}{4x^{2/3}}$$\nOr equivalently: $$k = \\frac{\\sqrt[3]{4}}{4}, n = -\\frac{2}{3}$$", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "The curves $$y = \\frac{1}{x+2}$$ and $$y = x(x+2)^2$$ are sketched. State, with reasoning, the number of real solutions to $$(x+2)(x^3 + 4x^2 + 4x) = 1$$. (3 steps)", "answer": "- Step 1: **Rearrange** the equation:\n$$(x+2)(x^3 + 4x^2 + 4x) = 1 \\Leftrightarrow x(x+2)^2 = \\frac{1}{x+2}$$\nThis represents the intersection of $$y = x(x+2)^2$$ (cubic) and $$y = \\frac{1}{x+2}$$ (hyperbola).\n- Step 2: **Interpret graphically:**\n- Cubic $$y = x(x+2)^2$$: touches at $$x = -2$$ (double root), crosses at $$x = 0$$\n- Hyperbola $$y = \\frac{1}{x+2}$$: vertical asymptote at $$x = -2$$\n- Step 3: **Count intersections:** The curves intersect once on the right of the asymptote ($$x > -2$$) and once on the left ($$x < -2$$).\n$$\\boxed{2 \\text{ real solutions}}$$", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": true}, {"question": "Curves $$C_1: xy = \\frac{15}{2} + 5x$$ (i.e., $$y = \\frac{15}{2x} + 5$$) and $$C_2: y = x^3 - \\frac{7}{2}x + 5$$ intersect. Show that their intersection satisfies $$2x^4 - 7x^2 - 15 = 0$$. (3 steps)", "answer": "- Step 1: **Equate the $$y$$-values:**\n$$\\frac{15}{2x} + 5 = x^3 - \\frac{7}{2}x + 5$$\n- Step 2: **Notice the +5 cancels** on both sides:\n$$\\frac{15}{2x} = x^3 - \\frac{7}{2}x$$\n- Step 3: **Multiply through by $$2x$$** (valid since $$x \\neq 0$$):\n$$15 = 2x^4 - 7x^2$$\n- Step 4: **Rearrange to standard form:**\n$$2x^4 - 7x^2 - 15 = 0$$\n\nThis is a biquadratic (quartic in $$x^2$$).", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "From the previous question, find the exact distance between the intersection points. (4 steps)", "answer": "- Step 1: **Solve the biquadratic** by substituting $$u = x^2$$:\n$$2u^2 - 7u - 15 = 0$$\n$$(2u + 3)(u - 5) = 0$$\nSo $$u = -\\frac{3}{2}$$ (reject, since $$u = x^2 \\geq 0$$) or $$u = 5$$.\n- Step 2: **Find $$x$$ values:** $$x^2 = 5 \\Rightarrow x = \\pm\\sqrt{5}$$\n- Step 3: **Find corresponding $$y$$ values** using either curve:\n$$y = \\frac{15}{2x} + 5 = \\frac{15}{2(\\pm\\sqrt{5})} + 5 = \\frac{15}{\\pm 2\\sqrt{5}} + 5 = \\frac{15\\sqrt{5}}{\\pm 10} + 5 = \\frac{3\\sqrt{5}}{\\pm 2} + 5$$\n- So: at $$x = \\sqrt{5}$$, $$y = \\frac{3\\sqrt{5}}{2} + 5$$; at $$x = -\\sqrt{5}$$, $$y = -\\frac{3\\sqrt{5}}{2} + 5$$\n- Step 4: **Distance formula:**\n$$\\Delta x = \\sqrt{5} - (-\\sqrt{5}) = 2\\sqrt{5}$$\n$$\\Delta y = \\left(5 + \\frac{3\\sqrt{5}}{2}\\right) - \\left(5 - \\frac{3\\sqrt{5}}{2}\\right) = 3\\sqrt{5}$$\n$$PQ = \\sqrt{(2\\sqrt{5})^2 + (3\\sqrt{5})^2} = \\sqrt{20 + 45} = \\sqrt{65}$$", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "A curve is given by $$f(x) = 2x^2 - 12x + 14$$. (a) Write it in the form $$a(x+b)^2 + c$$. (b) Find the coordinates of the minimum point. (c) A line passes through $$(-1, 28)$$ and this minimum point. Find its equation. (d) The region $$R$$ is bounded by this line, the curve, the $$x$$-axis, and the $$y$$-axis. Define $$R$$ using inequalities. (4 steps)", "answer": "- Step 1: **(a) Complete the square:**\n$$2x^2 - 12x + 14 = 2(x^2 - 6x) + 14 = 2\\left[(x-3)^2 - 9\\right] + 14$$\n$$= 2(x-3)^2 - 18 + 14 = 2(x-3)^2 - 4$$\nSo $$a = 2, b = -3, c = -4$$.\n- Step 2: **(b) Minimum point:** At $$x = 3$$, $$y = -4$$. So $$P = (3, -4)$$.\n- Step 3: **(c) Find line equation:** Gradient $$m = \\frac{-4 - 28}{3 - (-1)} = \\frac{-32}{4} = -8$$\nUsing point $$(-1, 28)$$: $$y - 28 = -8(x + 1) \\Rightarrow y = -8x + 20$$\n- Step 4: **(d) Four inequalities for region $$R$$:**\n- Above $$x$$-axis: $$y \\geq 0$$\n- Below the line: $$y \\leq -8x + 20$$\n- Right of $$y$$-axis: $$x \\geq 0$$\n- Below the curve: $$y \\leq 2x^2 - 12x + 14$$", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Given the function $$f(x) = 2x^3 - kx^2 + 14x + 24$$. The curves $$y = f'(x)$$ and $$y = f''(x)$$ intersect at point $$A$$ with $$x_A = 5$$. Find the value of $$k$$. (3 steps)", "answer": "- Step 1: **Find $$f'(x)$$ and $$f''(x)$$:**\n$$f'(x) = 6x^2 - 2kx + 14$$\n$$f''(x) = 12x - 2k$$\n- Step 2: **At intersection point $$A$$**, both expressions equal the same $$y$$-value, so:\n$$f'(5) = f''(5)$$\n$$6(25) - 2k(5) + 14 = 12(5) - 2k$$\n$$164 - 10k = 60 - 2k$$\n$$104 = 8k \\Rightarrow k = 13$$\n\nThe trick: \"point on both curves\" means substitute the same $$x$$ into both and set equal.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Using the previous question, with $$k = 13$$, find the other intersection point $$B$$ of $$y = f'(x)$$ and $$y = f''(x)$$. (3 steps)", "answer": "- Step 1: **Write the two expressions** with $$k = 13$$:\n$$f'(x) = 6x^2 - 26x + 14$$\n$$f''(x) = 12x - 26$$\n- Step 2: **Set equal and solve:**\n$$6x^2 - 26x + 14 = 12x - 26$$\n$$6x^2 - 38x + 40 = 0$$\nDivide by 2: $$3x^2 - 19x + 20 = 0$$\nFactor: $$(3x - 4)(x - 5) = 0$$\n- Step 3: **Find the solutions:** $$x = 5$$ (point $$A$$) or $$x = \\frac{4}{3}$$ (point $$B$$).\nAt $$x = \\frac{4}{3}$$: $$y = 12\\left(\\frac{4}{3}\\right) - 26 = 16 - 26 = -10$$\nSo $$B = \\left(\\frac{4}{3}, -10\\right)$$.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "A garden consists of a triangle $$ABE$$, a circular sector $$BDE$$ (radius 6 m, angle 1.3 rad), and a right-angled triangle $$BCD$$ ($$BD = 6$$ m is the hypotenuse, $$\\angle BCD = \\pi/2$$). Given $$AB = 10.8$$ m, $$AE = 12.2$$ m, find: (a) the area of the sector, (b) angle $$\\angle ABE$$ in radians, (c) the total area. (3 steps)", "answer": "- Step 1: **(a) Sector area:** $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2}(6^2)(1.3) = \\frac{1}{2}(36)(1.3) = 23.4 \\text{ m}^2$$\n- Step 2: **(b) Angle $$\\angle ABE$$:** Angles on a straight line sum to $$\\pi$$.\n$$\\angle ABE + 1.3 + \\frac{\\pi}{2} = \\pi$$\n$$\\angle ABE = \\pi - 1.3 - \\frac{\\pi}{2} = \\frac{\\pi}{2} - 1.3 \\approx 0.27 \\text{ rad}$$\n- Step 3: **(c) Total area:**\n- Triangle $$ABE$$ (SAS): $$A = \\frac{1}{2}(10.8)(6)\\sin(0.27) \\approx 8.64 \\text{ m}^2$$\n- Triangle $$BCD$$: $$BC = 6\\cos(1.3) \\approx 1.606$$ m, $$CD = 6\\sin(1.3) \\approx 5.780$$ m\n$$A = \\frac{1}{2}(1.606)(5.780) \\approx 4.64 \\text{ m}^2$$\n- Total: $$8.64 + 23.4 + 4.64 \\approx 36.7 \\text{ m}^2$$", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Explain why for the quadratic equation $$ax^2 + bx + c = 0$$, the discriminant tells you the number of $$x$$-intercepts. What are the three cases?", "answer": "- The discriminant $$\\Delta = b^2 - 4ac$$ comes from the quadratic formula — it's what's under the square root.\n- **Case 1: $$\\Delta > 0$$** — the square root is a real number, giving two distinct real solutions. The parabola crosses the $$x$$-axis at two points.\n- **Case 2: $$\\Delta = 0$$** — the square root is zero, giving exactly one real solution (a repeated root). The parabola touches the $$x$$-axis at its vertex — it's tangent.\n- **Case 3: $$\\Delta < 0$$** — the square root is of a negative number (imaginary), giving no real solutions. The parabola lies entirely above or below the $$x$$-axis, never crossing it.\n\nThis geometric interpretation is used constantly in curve intersection problems.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "What do these question triggers tell you to do? (a) \"Show that...\" (b) \"Hence...\" (c) \"Find the exact value...\" (d) \"Hence, state...\" (e) \"With respect to the $$x$$-axis...\"", "answer": "- **(a) \"Show that...\"** — Your working must algebraically lead to the given answer. Don't just state it; derive it step by step.\n- **(b) \"Hence...\"** — You MUST use your answer from the previous part. Don't recalculate from scratch — link the parts together.\n- **(c) \"Find the exact value...\"** — Give your answer as a surd or fraction, NOT a decimal.\n- **(d) \"Hence, state...\"** — No working needed, just read off or combine from previous work.\n- **(e) \"With respect to the $$x$$-axis...\"** — This tells you to consider symmetry: for every point $$(x, y)$$, there is also $$(x, -y)$$. This often doubles the number of solutions.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": true}, {"question": "Complete the square for $$3x^2 - 12x + 7$$. State the coordinates of the minimum/maximum point and state whether it is a minimum or maximum.", "answer": "- Step 1: **Factor out the coefficient of $$x^2$$** from the first two terms:\n$$3x^2 - 12x + 7 = 3(x^2 - 4x) + 7$$\n- Step 2: **Complete the square inside:**\n$$x^2 - 4x = (x - 2)^2 - 4$$\nSo: $$3[(x - 2)^2 - 4] + 7 = 3(x - 2)^2 - 12 + 7 = 3(x - 2)^2 - 5$$\n- Step 3: **Identify the vertex:** At $$x = 2$$, $$y = -5$$.\n- Step 4: **Minimum or maximum?** Since the coefficient of $$(x-2)^2$$ is positive ($$3 > 0$$), the parabola opens upward — this is a **minimum** point.\n\nGeneral rule: For $$a(x-h)^2 + k$$, if $$a > 0$$ it's a minimum at $$(h, k)$$; if $$a < 0$$ it's a maximum.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "The graph of $$y = f(x)$$ is transformed to give $$y = f(2x - 6) + 3$$. Describe this transformation as a sequence of basic transformations, and state the order in which they should be applied.", "answer": "- This is a COMBINED transformation. Rewrite the argument as $$f(2(x - 3))$$.\n- **Step 1:** Horizontal compression by factor $$\\frac{1}{2}$$ (from the $$2x$$): $$x \\rightarrow \\frac{x}{2}$$.\n- **Step 2:** Horizontal shift RIGHT by 3 (from the $$-6$$ inside): $$x \\rightarrow x - 3$$.\n- **Step 3:** Vertical shift UP by 3 (from the $$+3$$ outside).\n\nOrder matters! The correct sequence is: **compress by 1/2, then shift right by 3, then shift up by 3**.\n\nGeneral principle: Transformations inside $$f()$$ are applied in reverse order (rightmost first); transformations outside $$f()$$ are applied in the order written (up/down last).", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": true}, {"question": "For the curve $$y = \\sin(x)$$, state the $$x$$-coordinates (in radians) where it attains its (i) maximum and (ii) minimum values. Give the general solution.", "answer": "- **(i) Maximum:** $$\\sin x = 1$$ occurs when $$x = \\frac{\\pi}{2} + 2n\\pi$$, where $$n \\in \\mathbb{Z}$$.\n- **(ii) Minimum:** $$\\sin x = -1$$ occurs when $$x = \\frac{3\\pi}{2} + 2n\\pi$$ (equivalently $$-\\frac{\\pi}{2} + 2n\\pi$$).\n\nFor cosine $$y = \\cos x$$:\n- Maximum ($$\\cos x = 1$$): $$x = 2n\\pi$$\n- Minimum ($$\\cos x = -1$$): $$x = \\pi + 2n\\pi$$", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "What is the period of (a) $$y = \\sin(3x)$$, (b) $$y = \\cos\\left(\\frac{x}{4}\\right)$$, (c) $$y = \\tan(2x)$$? Give your answer in degrees and radians.", "answer": "- General rule: For $$y = \\sin(nx)$$ or $$y = \\cos(nx)$$, the period is $$\\frac{2\\pi}{|n|}$$ (radians) or $$\\frac{360^\\circ}{|n|}$$ (degrees). For $$y = \\tan(nx)$$, the period is $$\\frac{\\pi}{|n|}$$ (radians) or $$\\frac{180^\\circ}{|n|}$$ (degrees).\n- **(a)** Period $$= \\frac{2\\pi}{3}$$ rad $$= 120^\\circ$$\n- **(b)** Period $$= \\frac{2\\pi}{1/4} = 8\\pi$$ rad $$= 1440^\\circ$$\n- **(c)** Period $$= \\frac{\\pi}{2}$$ rad $$= 90^\\circ$$", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "Differentiate (a) $$y = x^5 + 3x^{-2} - \\frac{2}{x^3}$$ (b) $$y = \\sqrt{x}$$ (c) $$y = \\frac{1}{x^4}$$. Simplify each answer.", "answer": "- **(a)** First rewrite negative powers:\n$$y = x^5 + 3x^{-2} - 2x^{-3}$$\nUsing $$\\frac{d}{dx}(x^n) = nx^{n-1}$$:\n$$\\frac{dy}{dx} = 5x^4 + 3(-2)x^{-3} - 2(-3)x^{-4} = 5x^4 - 6x^{-3} + 6x^{-4}$$\n$$= 5x^4 - \\frac{6}{x^3} + \\frac{6}{x^4}$$\n- **(b)** $$\\sqrt{x} = x^{1/2}$$, so $$\\frac{dy}{dx} = \\frac{1}{2}x^{-1/2} = \\frac{1}{2\\sqrt{x}}$$\n- **(c)** $$\\frac{1}{x^4} = x^{-4}$$, so $$\\frac{dy}{dx} = -4x^{-5} = -\\frac{4}{x^5}$$", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "Evaluate these integrals: (a) $$\\int 6x^2 dx$$ (b) $$\\int \\frac{4}{x^5} dx$$ (c) $$\\int (3x^{-1/2} + 7) dx$$", "answer": "- **(a)** Using $$\\int x^n dx = \\frac{x^{n+1}}{n+1} + C$$ (for $$n \\neq -1$$):\n$$\\int 6x^2 dx = 6 \\cdot \\frac{x^3}{3} = 2x^3 + C$$\n- **(b)** Rewrite $$\\frac{4}{x^5} = 4x^{-5}$$:\n$$\\int 4x^{-5} dx = 4 \\cdot \\frac{x^{-4}}{-4} = -x^{-4} + C = -\\frac{1}{x^4} + C$$\n- **(c)** $$\\int 3x^{-1/2} dx = 3 \\cdot \\frac{x^{1/2}}{1/2} = 3 \\cdot 2x^{1/2} = 6\\sqrt{x}$$\n$$\\int 7 dx = 7x$$\nCombine: $$6\\sqrt{x} + 7x + C$$", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "Find the equation of the tangent to the curve $$y = x^3 - 4x$$ at the point $$P(2, 0)$$.", "answer": "- Step 1: **Differentiate:** $$\\frac{dy}{dx} = 3x^2 - 4$$\n- Step 2: **Find gradient at $$x = 2$$:** $$m = 3(2)^2 - 4 = 12 - 4 = 8$$\n- Step 3: **Use point-slope form:** $$y - y_1 = m(x - x_1)$$\n$$y - 0 = 8(x - 2) \\Rightarrow y = 8x - 16$$\n\nThe tangent line at $$(2, 0)$$ has equation $$y = 8x - 16$$.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Find the equation of the normal to the curve $$y = \\sqrt{x + 4}$$ at the point where $$x = 5$$.", "answer": "- Step 1: **Find the point:** At $$x = 5$$, $$y = \\sqrt{5 + 4} = \\sqrt{9} = 3$$. Point is $$(5, 3)$$.\n- Step 2: **Differentiate:** $$y = (x + 4)^{1/2}$$, so $$\\frac{dy}{dx} = \\frac{1}{2}(x + 4)^{-1/2} = \\frac{1}{2\\sqrt{x+4}}$$.\n- Step 3: **Find gradient at $$x = 5$$:** $$m_{tangent} = \\frac{1}{2\\sqrt{9}} = \\frac{1}{6}$$\n- Step 4: **Normal gradient:** $$m_{normal} = -\\frac{1}{m_{tangent}} = -6$$\n- Step 5: **Equation:** $$y - 3 = -6(x - 5) \\Rightarrow y = -6x + 30 + 3 = -6x + 33$$", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "Use the sine rule to find the unknown side in $$\\triangle ABC$$ where $$A = 30^\\circ$$, $$B = 45^\\circ$$, and $$a = 10$$ cm. Find side $$b$$.", "answer": "- Sine rule: $$\\frac{a}{\\sin A} = \\frac{b}{\\sin B} = \\frac{c}{\\sin C}$$\n- First find angle $$C$$: $$C = 180^\\circ - 30^\\circ - 45^\\circ = 105^\\circ$$\n- Then: $$\\frac{10}{\\sin 30^\\circ} = \\frac{b}{\\sin 45^\\circ}$$\n- $$\\sin 30^\\circ = \\frac{1}{2}$$, $$\\sin 45^\\circ = \\frac{\\sqrt{2}}{2}$$\n- $$\\frac{10}{0.5} = \\frac{b}{\\sqrt{2}/2} \\Rightarrow 20 = \\frac{2b}{\\sqrt{2}} \\Rightarrow 20 = b\\sqrt{2}$$\n- $$b = \\frac{20}{\\sqrt{2}} = 10\\sqrt{2} \\approx 14.14 \\text{ cm}$$", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "A sector has radius $$r = 8$$ cm and angle $$\\theta = \\frac{3\\pi}{4}$$ rad. Find (a) the arc length and (b) the area of the sector.", "answer": "- **(a) Arc length:** $$\\ell = r\\theta = 8 \\times \\frac{3\\pi}{4} = 6\\pi \\approx 18.85 \\text{ cm}$$\n- **(b) Sector area:** $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2}(64)\\left(\\frac{3\\pi}{4}\\right) = 32 \\times \\frac{3\\pi}{4} = 24\\pi \\approx 75.40 \\text{ cm}^2$$\n\nRemember: These formulas ONLY work when $$\\theta$$ is in **radians**.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "A sector has a minor angle of $$\\frac{\\pi}{6}$$ rad. What is the major angle? If the radius is 5 cm, find the area of the major sector.", "answer": "- **Major angle** $$= 2\\pi - \\text{minor angle} = 2\\pi - \\frac{\\pi}{6} = \\frac{12\\pi - \\pi}{6} = \\frac{11\\pi}{6}$$ rad.\n- **Area of major sector:** $$A = \\frac{1}{2}r^2\\theta = \\frac{1}{2}(25)\\left(\\frac{11\\pi}{6}\\right) = \\frac{275\\pi}{12} \\approx 71.95 \\text{ cm}^2$$", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "Convert (a) $$150^\\circ$$ to radians (b) $$\\frac{5\\pi}{6}$$ rad to degrees (c) $$1$$ rad to degrees (give to 2 d.p.).", "answer": "- Conversion rules: $$\\pi \\text{ rad} = 180^\\circ$$\n- **(a)** $$150^\\circ = 150 \\times \\frac{\\pi}{180} = \\frac{5\\pi}{6}$$ rad\n- **(b)** $$\\frac{5\\pi}{6} = \\frac{5\\pi}{6} \\times \\frac{180}{\\pi} = 150^\\circ$$\n- **(c)** $$1 \\text{ rad} = \\frac{180}{\\pi} \\approx 57.30^\\circ$$", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "Find the midpoint and distance between the points $$P(-3, 7)$$ and $$Q(5, -1)$$.", "answer": "- **Midpoint formula:** $$\\left(\\frac{x_1 + x_2}{2}, \\frac{y_1 + y_2}{2}\\right) = \\left(\\frac{-3 + 5}{2}, \\frac{7 + (-1)}{2}\\right) = \\left(\\frac{2}{2}, \\frac{6}{2}\\right) = (1, 3)$$\n- **Distance formula:** $$d = \\sqrt{(x_2 - x_1)^2 + (y_2 - y_1)^2} = \\sqrt{(5 - (-3))^2 + (-1 - 7)^2} = \\sqrt{8^2 + (-8)^2} = \\sqrt{64 + 64} = \\sqrt{128} = 8\\sqrt{2} \\approx 11.31$$", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "The line $$l$$ passes through points $$A(1, 4)$$ and $$B(5, 16)$$. Find (a) the gradient of $$l$$, (b) the equation of the line through $$C(0, -2)$$ parallel to $$l$$, (c) the equation of the line through $$D(3, 1)$$ perpendicular to $$l$$.", "answer": "- **(a) Gradient:** $$m = \\frac{16 - 4}{5 - 1} = \\frac{12}{4} = 3$$\n- **(b) Parallel line** has same gradient $$m = 3$$. Through $$C(0, -2)$$:\n$$y - (-2) = 3(x - 0) \\Rightarrow y = 3x - 2$$\n- **(c) Perpendicular line** has gradient $$m = -\\frac{1}{3}$$ (product $$-1$$). Through $$D(3, 1)$$:\n$$y - 1 = -\\frac{1}{3}(x - 3) \\Rightarrow y = -\\frac{1}{3}x + 2$$", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "Simplify (a) $$\\sqrt{72}$$ (b) $$\\frac{3}{\\sqrt{5}}$$ (c) $$\\frac{1}{\\sqrt{3} + \\sqrt{2}}$$.", "answer": "- **(a)** $$\\sqrt{72} = \\sqrt{36 \\times 2} = 6\\sqrt{2}$$\n- **(b)** Rationalise the denominator: $$\\frac{3}{\\sqrt{5}} \\times \\frac{\\sqrt{5}}{\\sqrt{5}} = \\frac{3\\sqrt{5}}{5}$$\n- **(c)** Multiply by the conjugate:\n$$\\frac{1}{\\sqrt{3} + \\sqrt{2}} \\times \\frac{\\sqrt{3} - \\sqrt{2}}{\\sqrt{3} - \\sqrt{2}} = \\frac{\\sqrt{3} - \\sqrt{2}}{3 - 2} = \\sqrt{3} - \\sqrt{2}$$", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "If $$\\sin\\theta = \\frac{3}{5}$$ and $$\\theta$$ is acute, find $$\\cos\\theta$$ and $$\\tan\\theta$$.", "answer": "- Using $$\\sin^2\\theta + \\cos^2\\theta = 1$$:\n$$\\cos^2\\theta = 1 - \\sin^2\\theta = 1 - \\left(\\frac{3}{5}\\right)^2 = 1 - \\frac{9}{25} = \\frac{16}{25}$$\nSince $$\\theta$$ is acute ($$\\theta < 90^\\circ$$), $$\\cos\\theta > 0$$:\n$$\\cos\\theta = \\frac{4}{5}$$\n- $$\\tan\\theta = \\frac{\\sin\\theta}{\\cos\\theta} = \\frac{3/5}{4/5} = \\frac{3}{4}$$", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "If $$\\sin\\theta = \\frac{3}{5}$$ and $$\\theta$$ is obtuse ($$\\theta > 90^\\circ$$), find $$\\cos\\theta$$.", "answer": "- From the identity, $$\\cos^2\\theta = \\frac{16}{25}$$ still holds, giving $$\\cos\\theta = \\pm\\frac{4}{5}$$.\n- For an **obtuse angle** (between $$90^\\circ$$ and $$180^\\circ$$), the cosine is **negative**.\n- Therefore, $$\\cos\\theta = -\\frac{4}{5}$$.\n\nKey point: When you know only $$\\sin\\theta$$ (and not which quadrant), you must consider the sign of $$\\cos\\theta$$ based on the quadrant — positive in QI and QIV, negative in QII and QIII.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "Sketch the graph of $$y = \\sin x$$ from $$0$$ to $$2\\pi$$. Mark the maximum, minimum, and zeros.", "answer": "From $$0$$ to $$2\\pi$$:\n- At $$x = 0$$: $$y = 0$$ (zero)\n- At $$x = \\frac{\\pi}{2}$$: $$y = 1$$ (maximum)\n- At $$x = \\pi$$: $$y = 0$$ (zero)\n- At $$x = \\frac{3\\pi}{2}$$: $$y = -1$$ (minimum)\n- At $$x = 2\\pi$$: $$y = 0$$ (zero)\n\nThe graph is a wave starting at the origin, rising to peak at $$\\frac{\\pi}{2}$$, crossing at $$\\pi$$, falling to trough at $$\\frac{3\\pi}{2}$$, and returning to zero at $$2\\pi$$.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": true}, {"question": "Sketch the graph of $$y = \\cos x$$ from $$0$$ to $$2\\pi$$. Mark the maximum, minimum, and zeros.", "answer": "From $$0$$ to $$2\\pi$$:\n- At $$x = 0$$: $$y = 1$$ (maximum)\n- At $$x = \\frac{\\pi}{2}$$: $$y = 0$$ (zero)\n- At $$x = \\pi$$: $$y = -1$$ (minimum)\n- At $$x = \\frac{3\\pi}{2}$$: $$y = 0$$ (zero)\n- At $$x = 2\\pi$$: $$y = 1$$ (maximum)\n\nThe cosine graph starts at its maximum (at $$y = 1$$), crosses down through zero at $$\\frac{\\pi}{2}$$, reaches minimum at $$\\pi$$, crosses up through zero at $$\\frac{3\\pi}{2}$$, and returns to maximum at $$2\\pi$$.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "For the curve $$y = x^3 - 3x + 2$$, find (a) the stationary points and (b) determine their nature. (3 steps)", "answer": "- Step 1: **Differentiate:** $$\\frac{dy}{dx} = 3x^2 - 3$$\n- Step 2: **Set derivative to zero** for stationary points:\n$$3x^2 - 3 = 0 \\Rightarrow x^2 = 1 \\Rightarrow x = \\pm 1$$\n- Step 3: **Find $$y$$ values** and use the second derivative test:\n$$f''(x) = 6x$$\n- At $$x = 1$$: $$f''(1) = 6 > 0 \\Rightarrow$$ **minimum** at $$(1, 1 - 3 + 2) = (1, 0)$$\n- At $$x = -1$$: $$f''(-1) = -6 < 0 \\Rightarrow$$ **maximum** at $$(-1, -1 + 3 + 2) = (-1, 4)$$", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "Find the area bounded by the curve $$y = x^2 + 2$$, the $$x$$-axis, and the lines $$x = 1$$ and $$x = 3$$.", "answer": "- This is a definite integral: $$A = \\int_{1}^{3} (x^2 + 2) dx$$\n- Integrate: $$\\int (x^2 + 2) dx = \\frac{x^3}{3} + 2x$$\n- Evaluate between $$x = 1$$ and $$x = 3$$:\n$$A = \\left[\\frac{x^3}{3} + 2x\\right]_{1}^{3} = \\left(\\frac{27}{3} + 6\\right) - \\left(\\frac{1}{3} + 2\\right) = (9 + 6) - \\left(\\frac{7}{3}\\right) = 15 - \\frac{7}{3} = \\frac{45 - 7}{3} = \\frac{38}{3} \\approx 12.67 \\text{ units}^2$$", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "The line $$y = 3x + k$$ is tangent to the parabola $$y = x^2 + 5$$. Find the value of $$k$$ and the point of contact. (3 steps)", "answer": "- Step 1: **Equate** the two equations:\n$$x^2 + 5 = 3x + k \\Rightarrow x^2 - 3x + (5 - k) = 0$$\n- Step 2: **For tangency**, this quadratic must have exactly one solution: $$\\Delta = 0$$\n$$\\Delta = (-3)^2 - 4(1)(5 - k) = 9 - 20 + 4k = 4k - 11 = 0$$\n$$k = \\frac{11}{4} = 2.75$$\n- Step 3: **Find the point**: With $$k = 2.75$$, the quadratic becomes:\n$$x^2 - 3x + (5 - 2.75) = x^2 - 3x + 2.25 = 0$$\n$$(x - 1.5)^2 = 0 \\Rightarrow x = 1.5$$\n$$y = 3(1.5) + 2.75 = 4.5 + 2.75 = 7.25$$\nPoint of contact: $$(1.5, 7.25)$$", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "Explain why \"curves meet at exactly one point\" leads to setting the discriminant to zero. What are the two geometric interpretations of a repeated root?", "answer": "- When two curves intersect, you typically set $$f(x) = g(x)$$ and rearrange to get a quadratic $$ax^2 + bx + c = 0$$.\n- The solutions to this quadratic give the $$x$$-coordinates of intersection points.\n- **If there's exactly ONE point of intersection**, the quadratic has exactly one solution — this means it has a **repeated root** (both solutions are the same).\n- A quadratic has a repeated root **iff** its discriminant is zero: $$\\Delta = b^2 - 4ac = 0$$.\n\n**Geometric interpretations:**\n1. The two curves are **tangent** to each other at that point (they touch but don't cross).\n2. The curves meet at a point where they have the **same gradient** (same slope).", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": true}, {"question": "In the inequality $$y > f(x)$$, how do you determine which region to shade? How would you verify your choice is correct?", "answer": "- **Rule:** $$y > f(x)$$ means the region **ABOVE** the curve; $$y < f(x)$$ means the region **BELOW** the curve.\n- For strict inequalities ($$>$$ or $$<$$), the boundary is drawn as a **dashed line** (not included).\n- For non-strict ($$\\geq$$ or $$\\leq$$), the boundary is drawn as a **solid line** (included).\n- **Verification method:** Pick a **test point** clearly inside your shaded region (but NOT on the boundary). Substitute its coordinates into the inequality — if it satisfies the inequality, your shading is correct; if not, shade the opposite side.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "The curve $$y = f(x)$$ passes through $$(2, 5)$$ and has gradient function $$f'(x) = 3x^2 - 4x + 1$$. Find the equation of the curve.", "answer": "- Step 1: **Integrate** the gradient function:\n$$f(x) = \\int (3x^2 - 4x + 1) dx = x^3 - 2x^2 + x + C$$\n- Step 2: **Use the given point** $$(2, 5)$$ to find $$C$$:\n$$5 = (2)^3 - 2(2)^2 + 2 + C = 8 - 8 + 2 + C = 2 + C$$\n$$C = 3$$\n- So $$f(x) = x^3 - 2x^2 + x + 3$$\n\nThis illustrates why you need a point when integrating: the constant of integration $$C$$ is unknown, and the point allows you to solve for it.", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "A curve passes through $$(-1, 4)$$ and has gradient $$\\frac{dy}{dx} = 2x - 3$$. Find the equation and evaluate at $$x = 2$$.", "answer": "- Step 1: **Integrate:**\n$$\\int (2x - 3) dx = x^2 - 3x + C$$\n- Step 2: **Find C** using $$(-1, 4)$$:\n$$4 = (-1)^2 - 3(-1) + C = 1 + 3 + C = 4 + C \\Rightarrow C = 0$$\n- So $$y = x^2 - 3x$$\n- Step 3: **Evaluate at $$x = 2$$:**\n$$y = 2^2 - 3(2) = 4 - 6 = -2$$", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "What is the key strategy when a problem gives you two unknown constants in an integration problem (e.g., $$f'(x)$$ contains $$k$$ and the integrated $$f(x)$$ contains $$C$$)?", "answer": "- **The trap:** You have two unknowns but only one equation from the given point — you can't solve directly.\n- **The solution:** Look for an **additional condition** that involves ONLY ONE of the unknowns.\n- In the revision notes, this appears in Paper 3 Q10: You had $$f'(x) = 4x^{3/2} + \\frac{k}{x^2}$$ and after integrating, $$f(x)$$ has constant $$C$$. The extra condition was $$f''(2) = 0$$ (the second derivative test at a stationary point).\n- This condition involved ONLY $$k$$, allowing you to solve for $$k$$ first. Then you integrate and use the point to find $$C$$.\n- **Always look for:** Stationary points ($$f'(x) = 0$$), inflection points ($$f''(x) = 0$$), tangency conditions (equal gradients), or any other condition that reduces the number of unknowns to one at first.", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": true}, {"question": "How do you find the vertex (maximum or minimum) of a quadratic $$y = ax^2 + bx + c$$ without completing the square? What's the formula?", "answer": "- For any quadratic $$y = ax^2 + bx + c$$, the $$x$$-coordinate of the vertex is:\n$$x = -\\frac{b}{2a}$$\n- The $$y$$-coordinate is then found by substituting this $$x$$ back into the equation.\n- This comes from the axis of symmetry of the parabola.\n- Example: For $$y = 2x^2 - 8x + 3$$, the vertex is at:\n$$x = -\\frac{-8}{2(2)} = \\frac{8}{4} = 2$$\n$$y = 2(4) - 8(2) + 3 = 8 - 16 + 3 = -5$$\nVertex is $$(2, -5)$$. Since $$a = 2 > 0$$, it's a minimum.", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "Rationalise the denominator of $$\\frac{5}{3 + \\sqrt{2}}$$ and simplify.", "answer": "- Multiply numerator and denominator by the **conjugate** of the denominator: $$3 - \\sqrt{2}$$\n$$\\frac{5}{3 + \\sqrt{2}} \\times \\frac{3 - \\sqrt{2}}{3 - \\sqrt{2}} = \\frac{5(3 - \\sqrt{2})}{9 - 2} = \\frac{5(3 - \\sqrt{2})}{7} = \\frac{15 - 5\\sqrt{2}}{7}$$\n\nThe conjugate of $$(a + b\\sqrt{c})$$ is $$(a - b\\sqrt{c})$$; their product removes the surd from the denominator.", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": false}, {"question": "A curve is transfor
