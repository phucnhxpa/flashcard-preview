D $$f'(a) = 0$$ — both function and derivative vanish. Algebraically: a repeated factor $$(x - a)^2$$ in $$f$$.\n- Step 2: Under linear transformations of $$x$$ (shift, stretch, reflect), the factorisation $$f(x) = g(x)(x-a)^2$$ transforms to $$\\tilde{f}(x) = g(h(x))(h(x) - a)^2$$ for some linear $$h$$ — still a square times something.\n- Step 3: Under vertical transformations, the double-root structure in $$f$$ is unaffected. The location of the touch moves predictably, but the NATURE (touch vs cross) stays.", "source": "Opus 4.7 ②", "_id": "opus_2_71", "judge_pick": true}, {"question": "What's the key formula relating arc length $$\\ell$$, radius $$r$$, and angle $$\\theta$$? Explain why it's LINEAR. (3 steps)", "answer": "- Step 1: Formula: $$\\ell = r\\theta$$ with $$\\theta$$ in radians.\n- Step 2: Linear because: arc length is proportional to angle (doubling $$\\theta$$ doubles arc), and also proportional to radius (twice as big circle has twice the arc for the same angle).\n- Step 3: Derivation: full circle has $$\\theta = 2\\pi$$ and circumference $$2\\pi r$$. So arc/circumference = $$\\theta/(2\\pi)$$, giving arc = $$r\\theta$$. Radians are chosen so the $$2\\pi$$'s cancel.", "source": "Opus 4.7 ②", "_id": "opus_2_72", "judge_pick": true}, {"question": "The sector area formula is $$A = \\tfrac{1}{2}r^2\\theta$$. Why the $$\\tfrac{1}{2}$$ and why $$r^2$$ (not $$r$$)? (3 steps)", "answer": "- Step 1: Full circle area is $$\\pi r^2$$ for angle $$2\\pi$$. So area per radian is $$\\tfrac{\\pi r^2}{2\\pi} = \\tfrac{r^2}{2}$$.\n- Step 2: Multiplying by angle $$\\theta$$: $$A = \\tfrac{r^2}{2}\\theta = \\tfrac{1}{2}r^2\\theta$$.\n- Step 3: $$r^2$$ because area scales with the SQUARE of radius (2D scaling). The $$\\tfrac{1}{2}$$ emerges from dividing circle area by $$2\\pi$$.\n\nAlternative intuition: sector area is like a \"triangle\" with base $$\\ell = r\\theta$$ and height $$r$$, giving $$\\tfrac{1}{2}r \\cdot r\\theta$$.", "source": "Opus 4.7 ②", "_id": "opus_2_73", "judge_pick": true}, {"question": "What's the segment area formula, and when is it relevant vs the sector formula? (3 steps)", "answer": "- Step 1: A SEGMENT of a circle is the region bounded by a CHORD and an ARC (the \"slice\" minus the triangle of radii).\n- Step 2: Formula: $$A_{\\text{segment}} = \\tfrac{1}{2}r^2(\\theta - \\sin\\theta)$$, $$\\theta$$ in radians.\n- Step 3: Derivation: segment = sector − triangle. Sector area $$= \\tfrac{1}{2}r^2\\theta$$; triangle (SAS: two radii, angle $$\\theta$$) $$= \\tfrac{1}{2}r^2\\sin\\theta$$. Subtract.\n\nUse for \"segment of circle\" or \"region between chord and arc\".", "source": "Opus 4.7 ②", "_id": "opus_2_74", "judge_pick": false}, {"question": "Explain why the \"natural\" angle unit in calculus and circle formulas is the RADIAN, not the degree. (3 steps)", "answer": "- Step 1: Radians are defined so an arc of length $$r$$ subtends 1 rad. This makes $$\\ell/r = \\theta$$ a clean ratio.\n- Step 2: Degrees are an arbitrary historical choice (360 ≈ days in a year). They introduce a factor $$\\tfrac{\\pi}{180}$$ whenever they interact with calculus-style relationships.\n- Step 3: In radians: $$\\tfrac{d}{dx}\\sin x = \\cos x$$ cleanly. In degrees: $$\\tfrac{d}{dx}\\sin(x^\\circ) = \\tfrac{\\pi}{180}\\cos(x^\\circ)$$ — ugly. All calculus results are cleaner in radians.\n\nIAL P1 uses radians for all calculus + circle work.", "source": "Opus 4.7 ②", "_id": "opus_2_75", "judge_pick": true}, {"question": "The sine rule is $$\\tfrac{a}{\\sin A} = \\tfrac{b}{\\sin B} = \\tfrac{c}{\\sin C}$$. What data pattern triggers its use? (3 steps)", "answer": "- Step 1: You need at least ONE angle-opposite-side pair (know both $$a$$ AND $$A$$, or both $$b$$ AND $$B$$), otherwise the chain has no anchor.\n- Step 2: With this anchor, you can: find a missing side given an angle opposite it; OR find a missing angle given a side opposite it.\n- Step 3: Contrast with the cosine rule, which needs THREE sides (for an angle) or TWO sides + included angle (for the third side), without needing any angle-side pair.\n\nMnemonic: \"side-angle pair → sine; all sides OR two-sides-angle → cosine.\"", "source": "Opus 4.7 ②", "_id": "opus_2_76", "judge_pick": true}, {"question": "Why is the cosine rule, $$a^2 = b^2 + c^2 - 2bc\\cos A$$, a \"generalisation\" of Pythagoras' theorem? (3 steps)", "answer": "- Step 1: Pythagoras: $$a^2 = b^2 + c^2$$ for a RIGHT triangle with right angle opposite side $$a$$.\n- Step 2: In cosine rule, set $$A = 90°$$: $$\\cos 90° = 0$$, reducing to $$a^2 = b^2 + c^2$$ — exactly Pythagoras.\n- Step 3: For non-right triangles, the \"correction\" $$-2bc\\cos A$$ adjusts:\n+ $$A$$ acute ($$\\cos A > 0$$): term is negative, so $$a^2 < b^2 + c^2$$ (side opposite acute is shorter).\n+ $$A$$ obtuse ($$\\cos A < 0$$): term is positive, so $$a^2 > b^2 + c^2$$ (side opposite obtuse is longer).\n\nPythagoras is the special case $$A = 90°$$.", "source": "Opus 4.7 ②", "_id": "opus_2_77", "judge_pick": true}, {"question": "Write out the Pythagorean identity, and show how to get $$\\cos\\theta$$ from a given $$\\sin\\theta$$. (3 steps)", "answer": "- Step 1: Identity: $$\\sin^2\\theta + \\cos^2\\theta = 1$$, valid for all real $$\\theta$$.\n- Step 2: Rearrange: $$\\cos^2\\theta = 1 - \\sin^2\\theta$$, so $$\\cos\\theta = \\pm\\sqrt{1 - \\sin^2\\theta}$$.\n- Step 3: Resolve ± by quadrant:\n+ Acute: $$\\cos > 0$$, take +\n+ Obtuse (in a triangle): $$\\cos < 0$$, take −\n\nFor an obtuse angle: pick the negative root.", "source": "Opus 4.7 ②", "_id": "opus_2_78", "judge_pick": true}, {"question": "The extrema of sine occur at specific angles. State them in general form, and explain the \"$$+2n\\pi$$\" part. (3 steps)", "answer": "- Step 1: Maximum ($$\\sin = 1$$): $$\\theta = \\tfrac{\\pi}{2} + 2n\\pi$$ for integer $$n$$.\n- Step 2: Minimum ($$\\sin = -1$$): $$\\theta = \\tfrac{3\\pi}{2} + 2n\\pi$$ (equivalently $$-\\tfrac{\\pi}{2} + 2n\\pi$$).\n- Step 3: The \"$$+2n\\pi$$\" accounts for PERIODICITY: sine repeats every $$2\\pi$$. Each extremum occurs infinitely often, spaced $$2\\pi$$ apart. $$n = 0$$: principal; $$n \\ne 0$$: other occurrences.", "source": "Opus 4.7 ②", "_id": "opus_2_79", "judge_pick": true}, {"question": "The extrema of cosine have general forms. State them.", "answer": "Cosine maximum ($$\\cos = 1$$): $$\\theta = 2n\\pi$$ for integer $$n$$ ($$0, \\pm 2\\pi, \\pm 4\\pi, \\ldots$$). Cosine minimum ($$\\cos = -1$$): $$\\theta = \\pi + 2n\\pi$$. The max occurs at even multiples of $$\\pi$$ and the min at odd multiples — because cosine is the $$x$$-coordinate on the unit circle, and it's $$+1$$ at $$(1, 0)$$ (every full turn) and $$-1$$ at $$(-1, 0)$$ (every half turn past).", "source": "Opus 4.7 ②", "_id": "opus_2_80", "judge_pick": false}, {"question": "For $$y = A\\sin(Bx + C) + D$$, describe the geometric effect of each parameter. (3 steps)", "answer": "- Step 1: $$A$$ (amplitude): vertical stretch by $$|A|$$. Range becomes $$[D - |A|, D + |A|]$$. $$A < 0$$ also reflects vertically.\n- Step 2: $$B$$ (angular frequency): horizontal compression by $$\\tfrac{1}{|B|}$$. Period becomes $$\\tfrac{2\\pi}{|B|}$$.\n- Step 3: $$C$$ (phase): shifts horizontally by $$-\\tfrac{C}{B}$$. $$D$$ (vertical shift): shifts graph up by $$D$$.\n\nFor $$y = 12\\sin(x + B)$$: amplitude 12, period $$2\\pi$$, shifted left by $$B$$, no vertical shift.", "source": "Opus 4.7 ②", "_id": "opus_2_81", "judge_pick": true}, {"question": "For Phuc's \"discriminant trigger\" insight: why does \"the target equation has only $$k$$\" work AS A DIAGNOSTIC for choosing the discriminant method? (3 steps)", "answer": "- Step 1: The target to be shown has only $$k$$ (no $$x$$).\n- Step 2: Typical quadratic coefficients (after equating curves) involve both $$x$$ and $$k$$. The discriminant $$\\Delta = b^2 - 4ac$$ is built from these coefficients and thus involves $$k$$. Setting $$\\Delta = 0$$ ELIMINATES $$x$$, leaving an equation purely in $$k$$.\n- Step 3: So if the target has ONLY $$k$$ and matches the structure of discriminant output, the discriminant is the tool.\n\nUseful habit: look at the variables in the target equation; the relevant method eliminates all OTHER variables.", "source": "Opus 4.7 ②", "_id": "opus_2_82", "judge_pick": true}, {"question": "Compare the parallelism and perpendicularity conditions for two lines with gradients $$m_1$$ and $$m_2$$. (3 steps)", "answer": "- Step 1: Parallel: $$m_1 = m_2$$. Same rise-over-run, so lines never meet (or coincide).\n- Step 2: Perpendicular: $$m_1 \\cdot m_2 = -1$$ (equivalently $$m_2 = -\\tfrac{1}{m_1}$$) — \"negative reciprocals\".\n- Step 3: Geometric reasoning: a 90° rotation of direction vector $$(1, m)$$ gives $$(-m, 1)$$; slope of the rotated is $$-\\tfrac{1}{m}$$, so product is $$-1$$. Special: horizontal ($$m=0$$) ⊥ vertical (undefined $$m$$).", "source": "Opus 4.7 ②", "_id": "opus_2_83", "judge_pick": false}, {"question": "State the midpoint formula, and explain why it's just the average. (3 steps)", "answer": "- Step 1: Midpoint: $$M = \\left(\\tfrac{x_1 + x_2}{2}, \\tfrac{y_1 + y_2}{2}\\right)$$ — average coordinates.\n- Step 2: The midpoint is equidistant from both endpoints. The $$x$$-coordinate halfway between $$x_1$$ and $$x_2$$ is their arithmetic mean; similarly for $$y$$.\n- Step 3: Alternative: a point at fraction $$t$$ along the segment is $$((1-t)x_1 + tx_2, (1-t)y_1 + ty_2)$$. The midpoint is $$t = \\tfrac{1}{2}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_84", "judge_pick": true}, {"question": "For curves $$C_1: y = x(4-x^2)$$ and $$C_2: y = \\tfrac{A}{x}$$: why do 4 distinct intersection points require 2 distinct POSITIVE $$y$$-roots of the reduced quadratic $$y^2 - 4y + A = 0$$ (where $$y = x^2$$)? (3 steps)", "answer": "- Step 1: The original quartic $$x^4 - 4x^2 + A = 0$$ has the form where each $$x$$-root comes paired with $$-x$$ (by evenness of powers).\n- Step 2: Substituting $$y = x^2$$: each distinct POSITIVE $$y$$-root gives TWO distinct $$x$$-roots ($$\\pm\\sqrt{y}$$). A zero $$y$$-root gives one ($$x = 0$$). A NEGATIVE $$y$$-root gives NO real $$x$$-roots.\n- Step 3: So for 4 distinct real $$x$$-roots, we need exactly 2 distinct POSITIVE $$y$$-roots.", "source": "Opus 4.7 ②", "_id": "opus_2_85", "judge_pick": false}, {"question": "When is a quadratic inequality in $$y$$ NOT sufficient to answer a question about $$x$$? Give the classic example.", "answer": "If the original variable $$x$$ is related to $$y$$ via a non-invertible relation (like $$y = x^2$$), conditions on $$y$$ don't translate directly to conditions on $$x$$. Classic example: $$y^2 - 4y + A = 0$$ must have TWO DISTINCT POSITIVE roots for the ORIGINAL quartic to have 4 distinct real $$x$$-roots. The discriminant alone (giving distinctness) is insufficient; we also need POSITIVITY of the roots, since $$x^2 \\ge 0$$. Diagnostic: whenever you've substituted $$u = x^2$$ (or similar), always check (i) discriminant (ii) sign of sum (iii) sign of product.", "source": "Opus 4.7 ②", "_id": "opus_2_86", "judge_pick": true}, {"question": "Integration question: $$\\int(10x^4 - \\tfrac{3}{2x^3} - 7)\\,dx$$. Describe the process. (4 steps)", "answer": "- Step 1: Rewrite the middle term as $$kx^n$$: $$\\tfrac{3}{2x^3} = \\tfrac{3}{2}x^{-3}$$. Now all terms have the $$kx^n$$ form.\n- Step 2: Apply the power rule term by term:\n+ $$\\int 10x^4\\,dx = 2x^5$$\n+ $$\\int -\\tfrac{3}{2}x^{-3}\\,dx = -\\tfrac{3}{2} \\cdot \\tfrac{x^{-2}}{-2} = \\tfrac{3}{4}x^{-2}$$\n+ $$\\int -7\\,dx = -7x$$\n- Step 3: Combine: $$2x^5 + \\tfrac{3}{4}x^{-2} - 7x$$.\n- Step 4: Add $$+C$$ and convert to \"simplest form\": $$2x^5 + \\tfrac{3}{4x^2} - 7x + C$$.", "source": "Opus 4.7 ②", "_id": "opus_2_87", "judge_pick": false}, {"question": "What does \"simplest form\" for an integration answer typically mean in IAL P1? (3 steps)", "answer": "- Step 1: No negative exponents in the final answer (convert $$x^{-n}$$ back to $$\\tfrac{1}{x^n}$$).\n- Step 2: No unreduced fractions; combine like terms; omit trivial coefficients.\n- Step 3: Always include $$+C$$ for indefinite integrals.\n\nExample: $$\\tfrac{3}{4}x^{-2}$$ should be written $$\\tfrac{3}{4x^2}$$ in the final answer.", "source": "Opus 4.7 ②", "_id": "opus_2_88", "judge_pick": true}, {"question": "Why must you rewrite $$\\tfrac{1}{x^n}$$ as $$x^{-n}$$ BEFORE integrating, not after? (3 steps)", "answer": "- Step 1: The power rule $$\\int x^k\\,dx = \\tfrac{x^{k+1}}{k+1}$$ applies to variables raised to a power in the NUMERATOR — i.e. $$x^k$$ form.\n- Step 2: $$\\tfrac{1}{x^n}$$ doesn't directly fit. Rewriting as $$x^{-n}$$ puts it in monomial form so the power rule applies with $$k = -n$$.\n- Step 3: Exception: $$n = 1$$ (i.e. $$\\tfrac{1}{x}$$) integrates to $$\\ln|x|$$, not a power — the power rule FAILS at $$k = -1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_89", "judge_pick": false}, {"question": "For $$a = \\tfrac{1}{64}x^2, b = \\tfrac{16}{\\sqrt{x}}$$, describe the approach to simplify $$\\left(\\tfrac{ab^3}{2}\\right)^{-4/3}$$ into $$kx^n$$ form. (4 steps)", "answer": "- Step 1: Rewrite $$b = 16 x^{-1/2}$$.\n- Step 2: Handle the negative exponent first — FLIP the base: $$\\left(\\tfrac{ab^3}{2}\\right)^{-4/3} = \\left(\\tfrac{2}{ab^3}\\right)^{4/3}$$.\n- Step 3: Compute $$ab^3$$: first $$b^3 = 16^3 x^{-3/2} = 4096 x^{-3/2}$$, then $$ab^3 = \\tfrac{1}{64}x^2 \\cdot 4096 x^{-3/2} = 64 x^{1/2}$$.\n- Step 4: Apply the positive power: $$\\left(\\tfrac{2}{64 x^{1/2}}\\right)^{4/3} = \\left(\\tfrac{1}{32}x^{-1/2}\\right)^{4/3} = 32^{-4/3} x^{-2/3}$$.\n\nKey: FLIP negative exponents FIRST, then apply positive power. Always raise every factor in a product.", "source": "Opus 4.7 ②", "_id": "opus_2_90", "judge_pick": true}, {"question": "Write the tangent line equation at point $$P = (a, f(a))$$ in two forms.", "answer": "Point-gradient form: $$y - f(a) = f'(a)(x - a)$$. Slope-intercept form: $$y = f'(a) \\cdot x + [f(a) - a \\cdot f'(a)]$$. The gradient is $$m = f'(a)$$ (scalar), and the $$y$$-intercept is $$c = f(a) - a \\cdot f'(a)$$. Point-gradient is cleaner for exam presentation; slope-intercept makes intercept visible but is messier algebraically.", "source": "Opus 4.7 ②", "_id": "opus_2_91", "judge_pick": false}, {"question": "A curve $$y = f(x)$$ has a NORMAL at point $$P = (a, f(a))$$. State the normal equation and why it's perpendicular to the tangent. (3 steps)", "answer": "- Step 1: The tangent at $$P$$ has gradient $$f'(a)$$. The normal is PERPENDICULAR to the tangent.\n- Step 2: Perpendicular gradients: product $$= -1$$. So normal gradient $$= -\\tfrac{1}{f'(a)}$$.\n- Step 3: Normal equation: $$y - f(a) = -\\tfrac{1}{f'(a)}(x - a)$$. Special case: if $$f'(a) = 0$$, normal is vertical: $$x = a$$.", "source": "Opus 4.7 ②", "_id": "opus_2_92", "judge_pick": true}, {"question": "The second-derivative test: how do you classify stationary points using $$f''$$? (3 steps)", "answer": "- Step 1: At a stationary point $$x = a$$ (where $$f'(a) = 0$$):\n+ $$f''(a) > 0$$: local MIN (curve concave up, \"cup\").\n+ $$f''(a) < 0$$: local MAX (curve concave down, \"cap\").\n+ $$f''(a) = 0$$: INCONCLUSIVE — could be min, max, or stationary inflection.\n- Step 2: Intuition: $$f''$$ measures concavity. Stationary point where curve bends upward sits at the bottom of a local dip.\n- Step 3: $$f''(a) = 0$$ is the degenerate case — don't conclude anything. Check $$f'$$ signs on either side.", "source": "Opus 4.7 ②", "_id": "opus_2_93", "judge_pick": true}, {"question": "A curve has a stationary point of its DERIVATIVE (i.e. $$f''(x_0) = 0$$). What does this mean geometrically, and how can you exploit it? (3 steps)", "answer": "- Step 1: $$f''(x_0) = 0$$ means the rate of change of the gradient is zero at $$x_0$$ — a stationary point of $$y = f'(x)$$.\n- Step 2: Geometrically: a point where the concavity of $$f$$ is momentarily flat — often an inflection point of $$f$$.\n- Step 3: In problems: if $$f''(x_0) = 0$$ gives an equation involving only parameters of $$f''$$ (no integration constant), you can solve for a parameter WITHOUT needing $$f$$ itself.\n\nClassic use: finding $$k$$ in a parametrised $$f'$$ before integrating for $$f$$.", "source": "Opus 4.7 ②", "_id": "opus_2_94", "judge_pick": true}, {"question": "For a region $$R$$ described by inequalities, how do you check your answer? (3 steps)", "answer": "- Step 1: Pick a sample point CLEARLY inside $$R$$ (not on any boundary).\n- Step 2: Substitute into each inequality. ALL must hold true.\n- Step 3: If any fails, flip that inequality's direction. Also: pick a point clearly OUTSIDE $$R$$ and verify at least one inequality fails — guards against degenerate cases.", "source": "Opus 4.7 ②", "_id": "opus_2_95", "judge_pick": false}, {"question": "In a compound shape made of a sector + triangle + right triangle, how do you split the area computation? (3 steps)", "answer": "- Step 1: Identify ALL constituent pieces (sketch + label).\n- Step 2: Match each piece to its formula:\n+ Sector: $$\\tfrac{1}{2}r^2\\theta$$\n+ Triangle (SAS): $$\\tfrac{1}{2}ab\\sin C$$\n+ Right triangle: $$\\tfrac{1}{2} \\cdot \\text{legs}$$\n- Step 3: Sum the areas. Ensure radian-mode for sector.\n\nSketch FIRST. Don't compute before you see the decomposition.", "source": "Opus 4.7 ②", "_id": "opus_2_96", "judge_pick": true}, {"question": "With $$f'(x) = 6x^2 - 2kx + 14$$, $$f''(x) = 12x - 2k$$, and these curves intersect at $$A$$ and $$B$$ with $$x_A = 5$$, explain how to find $$x_B$$ after $$k = 13$$ is known. (3 steps)", "answer": "- Step 1: Equate the two curves: $$6x^2 - 2kx + 14 = 12x - 2k$$. Rearrange to quadratic form.\n- Step 2: With $$k = 13$$: $$3x^2 - 19x + 20 = 0$$ (after dividing by 2).\n- Step 3: Since $$x = 5$$ is a root, $$(x - 5)$$ factors out: $$3x^2 - 19x + 20 = (x - 5)(3x - 4)$$. Other root: $$x = \\tfrac{4}{3}$$. Then $$y = 12 \\cdot \\tfrac{4}{3} - 26 = -10$$. So $$B = (\\tfrac{4}{3}, -10)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_97", "judge_pick": false}, {"question": "To rationalise $$\\tfrac{\\text{num}}{5 + 10\\sqrt{3}}$$ — what's the conjugate, and what's the resulting denominator? (3 steps)", "answer": "- Step 1: Conjugate of $$a + b\\sqrt{c}$$ is $$a - b\\sqrt{c}$$. For $$5 + 10\\sqrt{3}$$: conjugate is $$5 - 10\\sqrt{3}$$.\n- Step 2: Multiply top and bottom by the conjugate.\n- Step 3: New denominator via difference of squares: $$5^2 - (10\\sqrt{3})^2 = 25 - 300 = -275$$.\n\nDenominator can be negative — fine, factor the sign out later.", "source": "Opus 4.7 ②", "_id": "opus_2_98", "judge_pick": false}, {"question": "Outline the process to rationalise $$\\tfrac{13 + 2\\sqrt{3}}{5 + 10\\sqrt{3}}$$ (conceptual walkthrough, not final decimal). (3 steps)", "answer": "- Step 1: Identify denominator conjugate: $$5 - 10\\sqrt{3}$$.\n- Step 2: Multiply numerator and denominator by the conjugate:\n+ Numerator: $$(13 + 2\\sqrt{3})(5 - 10\\sqrt{3}) = 65 - 130\\sqrt{3} + 10\\sqrt{3} - 60 = 5 - 120\\sqrt{3}$$.\n+ Denominator: $$25 - 300 = -275$$.\n- Step 3: Simplify: $$\\tfrac{5 - 120\\sqrt{3}}{-275} = \\tfrac{120\\sqrt{3} - 5}{275} = \\tfrac{24\\sqrt{3} - 1}{55}$$ (divide by 5).\n\nNow in $$\\tfrac{p + q\\sqrt{3}}{r}$$ form with rational denominator.", "source": "Opus 4.7 ②", "_id": "opus_2_99", "judge_pick": true}, {"question": "For $$f(x) = 2x^2 - 12x + 14$$, find its minimum point. (3 steps)", "answer": "- Step 1: Complete the square: $$f(x) = 2(x^2 - 6x) + 14 = 2[(x-3)^2 - 9] + 14 = 2(x-3)^2 - 4$$.\n- Step 2: Minimum of $$a(x-h)^2 + k$$ with $$a > 0$$ is at $$(h, k)$$.\n- Step 3: So minimum point $$P = (3, -4)$$.\n\nAlternative: $$f'(x) = 4x - 12 = 0 \\Rightarrow x = 3$$; $$f(3) = -4$$. Same.", "source": "Opus 4.7 ②", "_id": "opus_2_100", "judge_pick": false}, {"question": "For a region $$R$$ bounded by 4 curves/lines, what's the standard strategy to write 4 inequalities? (3 steps)", "answer": "- Step 1: Label each boundary and its equation.\n- Step 2: For each boundary, determine which side $$R$$ sits on:\n+ Horizontal-oriented boundaries: use $$y \\ge$$ or $$y \\le$$.\n+ Vertical-oriented: use $$x \\ge$$ or $$x \\le$$.\n- Step 3: Write ALL four inequalities. Verify with a sample point inside $$R$$ — all four must hold.\n\nFor Oct 2023 Q11(d): $$y \\ge 0, y \\le -8x + 20, x \\ge 0, y \\le 2x^2 - 12x + 14$$.", "source": "Opus 4.7 ②", "_id": "opus_2_101", "judge_pick": true}, {"question": "Why does integration require you to expand bracket products or split fractions BEFORE applying the power rule? (3 steps)", "answer": "- Step 1: Power rule applies to individual $$kx^n$$ terms, not to products or quotients directly.\n- Step 2: Integration is LINEAR ($$\\int(f+g) = \\int f + \\int g$$) but NOT multiplicative ($$\\int fg \\ne \\int f \\cdot \\int g$$).\n- Step 3: Preparation: expand $$x(x+1) = x^2 + x$$, THEN integrate each term. For fractions: split $$\\tfrac{x^2 + 1}{x} = x + \\tfrac{1}{x}$$ (note: $$\\tfrac{1}{x}$$ doesn't fit power rule).\n\nAlways distribute/simplify FIRST.", "source": "Opus 4.7 ②", "_id": "opus_2_102", "judge_pick": true}, {"question": "\"Exact value\" in an IAL question means what, and when does it appear? (3 steps)", "answer": "- Step 1: \"Exact value\" means leave your answer in SURD, $$\\pi$$, or fraction form — NOT a decimal.\n- Step 2: Common contexts: trig at special angles, surd manipulation ($$p + q\\sqrt{c}$$), integration constants involving $$\\pi$$ or surds.\n- Step 3: Giving a decimal when exact is asked loses the accuracy mark.\n\nSpot the word: \"exact\" → NO decimals.", "source": "Opus 4.7 ②", "_id": "opus_2_103", "judge_pick": false}, {"question": "\"Hence\" vs \"Hence or otherwise\" — what's the difference? (3 steps)", "answer": "- Step 1: \"Hence\" means you MUST use the previous result. Not doing so risks losing marks even with correct answer.\n- Step 2: \"Hence or otherwise\" means the previous result is allowed but other methods are acceptable.\n- Step 3: If the previous part shows \"$$f(x) = g(x)$$\" and this part asks \"hence find solutions\", RE-USE $$g(x)$$ — don't re-derive.\n\nMissing the \"hence\" link is one of the most common silly errors.", "source": "Opus 4.7 ②", "_id": "opus_2_104", "judge_pick": true}, {"question": "\"Show that\" — what's the expected standard of working? (3 steps)", "answer": "- Step 1: Every non-trivial algebraic move written out; working must CLEARLY LEAD to the stated answer.\n- Step 2: Expected: culminate at EXACTLY the target line. If target is $$k^2 + 26k + 169 = 0$$, final line matches.\n- Step 3: If algebra gives a different form (e.g. $$(k+13)^2 = 0$$), expand to match target. Finishing with a decimal on \"show that\" is almost always wrong.", "source": "Opus 4.7 ②", "_id": "opus_2_105", "judge_pick": false}, {"question": "Describe conceptually what happens when you have a quadratic equation with $$\\Delta < 0$$. (3 steps)", "answer": "- Step 1: Discriminant negative → negative number under $$\\sqrt{}$$ — no real root.\n- Step 2: Quadratic formula yields COMPLEX roots (involving $$i$$), not real.\n- Step 3: Geometrically: the parabola doesn't cross the $$x$$-axis. If $$a > 0$$, sits entirely ABOVE; if $$a < 0$$, BELOW.\n\nAt IAL P1: \"no real solutions\" is the interpretation.", "source": "Opus 4.7 ②", "_id": "opus_2_106", "judge_pick": false}, {"question": "Contrast the \"angle on a straight line\" rule in radians vs degrees. (3 steps)", "answer": "- Step 1: In radians: angles on a straight line sum to $$\\pi$$ rad.\n- Step 2: In degrees: angles sum to $$180°$$.\n- Step 3: Both are equivalent ($$\\pi$$ rad = $$180°$$), but mixing units causes errors. Match the answer to the question's unit.", "source": "Opus 4.7 ②", "_id": "opus_2_107", "judge_pick": false}, {"question": "For the Apr 5 Q5 triangle setup with $$\\angle ABE + 1.3 + \\tfrac{\\pi}{2} = \\pi$$ from collinearity of $$A, B, C$$, why is this setup correct? (3 steps)", "answer": "- Step 1: The three angles at $$B$$ ($$\\angle ABE, \\angle EBD, \\angle DBC$$) together span from ray $$BA$$ to ray $$BC$$.\n- Step 2: Since $$A, B, C$$ are collinear, rays $$BA$$ and $$BC$$ point in OPPOSITE directions, making a straight line. The angles between them sum to $$\\pi$$ rad.\n- Step 3: So $$\\angle ABE + \\angle EBD + \\angle DBC = \\pi$$. With $$\\angle EBD = 1.3, \\angle DBC = \\tfrac{\\pi}{2}$$: $$\\angle ABE = \\tfrac{\\pi}{2} - 1.3 \\approx 0.27$$ rad.", "source": "Opus 4.7 ②", "_id": "opus_2_108", "judge_pick": true}, {"question": "Explain the period of $$y = A\\sin(Bx + C)$$ and why it's $$\\tfrac{2\\pi}{|B|}$$. (3 steps)", "answer": "- Step 1: Base $$y = \\sin x$$ has period $$2\\pi$$.\n- Step 2: For $$\\sin(Bx)$$: the inner argument $$Bx$$ increases by $$2\\pi$$ when $$x$$ increases by $$\\tfrac{2\\pi}{B}$$. So period is $$\\tfrac{2\\pi}{|B|}$$.\n- Step 3: Phase $$C$$ and amplitude $$A$$ don't affect period.\n\nExamples:\n+ $$y = \\sin(2x)$$: period $$\\pi$$.\n+ $$y = \\sin(\\tfrac{x}{2})$$: period $$4\\pi$$.\n+ $$y = \\cos(3x)^\\circ$$: period $$120°$$.", "source": "Opus 4.7 ②", "_id": "opus_2_109", "judge_pick": true}, {"question": "Express the degree-to-radian conversions: $$30°, 45°, 60°, 90°, 180°, 360°$$.", "answer": "Conversion factor: $$180° = \\pi$$ rad, so $$1° = \\tfrac{\\pi}{180}$$ rad. Common values: $$30° = \\tfrac{\\pi}{6}$$, $$45° = \\tfrac{\\pi}{4}$$, $$60° = \\tfrac{\\pi}{3}$$, $$90° = \\tfrac{\\pi}{2}$$, $$180° = \\pi$$, $$360° = 2\\pi$$. Memorise these — they appear in almost every P1 trig and radian question.", "source": "Opus 4.7 ②", "_id": "opus_2_110", "judge_pick": false}, {"question": "State the complete set of index laws needed for P1, with one-line justifications. (7 steps)", "answer": "- Step 1: Product: $$a^m \\cdot a^n = a^{m+n}$$ (same base, add exponents).\n- Step 2: Quotient: $$\\tfrac{a^m}{a^n} = a^{m-n}$$.\n- Step 3: Power of power: $$(a^m)^n = a^{mn}$$.\n- Step 4: Power of product: $$(ab)^n = a^n b^n$$ (every factor gets the exponent).\n- Step 5: Negative: $$a^{-n} = \\tfrac{1}{a^n}$$.\n- Step 6: Fractional: $$a^{1/n} = \\sqrt[n]{a}$$; $$a^{m/n} = (\\sqrt[n]{a})^m$$.\n- Step 7: Zero: $$a^0 = 1$$ ($$a \\ne 0$$).\n\nAll other index manipulations combine these.", "source": "Opus 4.7 ②", "_id": "opus_2_111", "judge_pick": true}, {"question": "For a tangent line in the form $$y = mx + c$$ (given $$m$$), what's the \"shortcut\" flowchart? (3 steps)", "answer": "- Step 1: The tangent has gradient $$m$$. Set $$f'(x) = m$$ to find the tangent point's $$x$$.\n- Step 2: Compute $$y = f(x_0)$$ using the CURVE.\n- Step 3: Substitute $$(x_0, y_0)$$ into the line equation $$y = mx + c$$ to find $$c$$.\n\nTotal: ~5 marks (derivative, setting equal, $$x$$, $$y$$, $$c$$).", "source": "Opus 4.7 ②", "_id": "opus_2_112", "judge_pick": false}, {"question": "Why is sketching FIRST more important than writing inequalities FIRST for a region $$R$$? (3 steps)", "answer": "- Step 1: The inequality form depends on $$R$$'s spatial location relative to each boundary — above/below, left/right.\n- Step 2: Without a sketch, you're guessing signs. One wrong sign gives a completely different region.\n- Step 3: A good sketch shows (i) each boundary, (ii) intersection points, (iii) the bounded region shaded. Then writing inequalities is nearly mechanical.\n\nPhuc's sign errors typically stem from under-detailed sketches.", "source": "Opus 4.7 ②", "_id": "opus_2_113", "judge_pick": true}, {"question": "Describe the general strategy for a \"compound shape composed of simpler shapes\" problem. (3 steps)", "answer": "- Step 1: SKETCH carefully, labelling all known lengths, angles, vertices.\n- Step 2: DECOMPOSE into standard pieces (rectangle, triangle, sector, segment) with known formulas.\n- Step 3: CALCULATE each piece, then SUM (or subtract, for \"donut\" shapes).\n\nDon't try to find a single whole-shape formula. Break it down.", "source": "Opus 4.7 ②", "_id": "opus_2_114", "judge_pick": true}, {"question": "When applying the sine rule to find a MISSING ANGLE, why must you watch out for the ambiguous case? (3 steps)", "answer": "- Step 1: $$\\arcsin(\\ldots)$$ returns a value in $$[0°, 90°]$$ on a calculator.\n- Step 2: But sine is SYMMETRIC: $$\\sin(180° - A) = \\sin A$$. So an obtuse angle gives the same sine value.\n- Step 3: If the triangle could have an obtuse angle at that vertex (SSA data), check BOTH possibilities: $$A$$ and $$180° - A$$. Use triangle angle sum ($$180°$$) to rule out impossibilities.\n\nCosine rule doesn't have this ambiguity.", "source": "Opus 4.7 ②", "_id": "opus_2_115", "judge_pick": true}, {"question": "When is the cosine rule preferred over the sine rule? (3 steps)", "answer": "- Step 1: Three sides, want an angle: ONLY cosine works.\n- Step 2: Two sides + included angle, want third side: ONLY cosine works directly.\n- Step 3: When you have a choice: prefer cosine for obtuse angles (unambiguous); prefer sine if you want a specific opposite side/angle.\n\n\"Three-of-a-kind (SSS, SAS) → cosine; mix-and-match (AAS, SSA) → sine.\"", "source": "Opus 4.7 ②", "_id": "opus_2_116", "judge_pick": true}, {"question": "Give the full line equation through two points $$(x_1, y_1)$$ and $$(x_2, y_2)$$. (3 steps)", "answer": "- Step 1: Gradient: $$m = \\tfrac{y_2 - y_1}{x_2 - x_1}$$.\n- Step 2: Point-gradient form with either point: $$y - y_1 = m(x - x_1)$$.\n- Step 3: Expand to $$y = mx + c$$ where $$c = y_1 - mx_1$$.\n\nExample: $$(-1, 28)$$ and $$(3, -4)$$: $$m = \\tfrac{-32}{4} = -8$$. Line: $$y = -8x + 20$$.", "source": "Opus 4.7 ②", "_id": "opus_2_117", "judge_pick": false}, {"question": "Describe the structure of an equation that can be reduced via a substitution (e.g. $$u = x^2$$ or $$p = 2^x$$). What's the tell? (3 steps)", "answer": "- Step 1: The equation contains multiple instances of the same \"compound expression\" — e.g. $$x^2$$ appears in both $$x^4$$ and $$x^2$$ terms; or $$2^x$$ in $$4^x$$ and $$2^x$$.\n- Step 2: Substituting a single variable for the compound reveals a simpler polynomial structure.\n- Step 3: Common patterns:\n+ Biquadratic: $$u = x^2$$\n+ Exponential: $$p = r^x$$\n+ After solving in the new variable, BACK-SUBSTITUTE. Check for rejected roots (e.g. $$u < 0$$ when $$u = x^2$$).", "source": "Opus 4.7 ②", "_id": "opus_2_118", "judge_pick": true}, {"question": "When you substitute $$u = x^2$$ into a biquadratic and get one positive $$u$$-root and one negative, how many $$x$$-solutions emerge? (3 steps)", "answer": "- Step 1: Positive $$u_1 > 0$$: $$x = \\pm\\sqrt{u_1}$$ — TWO real solutions.\n- Step 2: Negative $$u_2 < 0$$: $$x^2 = u_2 < 0$$ has NO real solution.\n- Step 3: Total: TWO real $$x$$-solutions.\n\nFor 4 distinct real $$x$$: BOTH $$u$$-roots must be positive and distinct.", "source": "Opus 4.7 ②", "_id": "opus_2_119", "judge_pick": true}, {"question": "Explain why Phuc's tutor emphasised: \"This paper requires MANIPULATION — rationalising, identifying the 'hence' link\". (3 steps)", "answer": "- Step 1: Some papers test PROCEDURAL skill: differentiate, integrate, factorise — apply a recipe.\n- Step 2: Other papers (like Oct 2023) test SYNTHESIS: chaining multiple techniques, recognising part-to-part links, algebraic manipulation (rationalising, index simplification).\n- Step 3: Key skills:\n+ Notice \"hence\" and re-use previous work.\n+ Rationalise without dropping factors.\n+ Track exponents in indices problems.\n+ Identify the right substitution.\n\nProcedure alone isn't enough — you need JUDGMENT to select techniques.", "source": "Opus 4.7 ②", "_id": "opus_2_120", "judge_pick": false}, {"question": "Phuc frequently forgets sine/cosine rule. What's the most efficient way to memorise them permanently? (3 steps)", "answer": "- Step 1: DERIVE them once from geometry (so they're not arbitrary strings).\n- Step 2: Practice until AUTOMATIC — write out daily for a week without looking.\n- Step 3: Associate with TRIGGER CUES:\n+ \"Three sides, want angle\": cosine rule.\n+ \"Angle-side pair given, want side/angle\": sine rule.\n+ \"Area with two sides + included angle\": $$\\tfrac{1}{2}ab\\sin C$$.\n\nWrite them at the top of your exam paper during the first 2 minutes to offload memory.", "source": "Opus 4.7 ②", "_id": "opus_2_121", "judge_pick": false}, {"question": "In Apr 11 Q8, the tutor said: \"From $$C_1$$: $$y = \\tfrac{15}{2x} + 5$$. Set equal; $$+5$$ cancels, multiply by $$2x$$, land on $$2x^4 - 7x^2 - 15 = 0$$.\" Why is recognising the cancelling $$+5$$ important? (3 steps)", "answer": "- Step 1: The $$+5$$ on both sides cancels for free — saves manipulation and reduces mistakes.\n- Step 2: If you don't notice: you'd multiply everything by $$2x$$, carry more terms, and eventually cancel — but with 4 extra error opportunities.\n- Step 3: Habit: before multiplying through, look for like terms on both sides. Each cancellation is a small win.\n\nMini-principle: \"simplify before scaling\".", "source": "Opus 4.7 ②", "_id": "opus_2_122", "judge_pick": false}, {"question": "Phuc's Apr 5 paper had 10/11 questions flagged. What systemic pattern was revealed? (3 steps)", "answer": "- Step 1: Formula recall failures: sine/cosine rule, integration of negative powers, surd manipulation — formulas weren't accessible on demand.\n- Step 2: Trigger-word recognition failures: missed \"single point\" → discriminant, \"region\" → inequalities, \"parallel to $$x$$-axis\" → $$y = \\text{const}$$.\n- Step 3: Two-layer remedy:\n+ Memorise formulas via spaced repetition.\n+ Practice pattern recognition on QUESTION STEMS (read phrase, say method, before any algebra).", "source": "Opus 4.7 ②", "_id": "opus_2_123", "judge_pick": false}, {"question": "What's the general structure of a \"hence find...\" question after a \"show that...\" proof? (3 steps)", "answer": "- Step 1: \"Show that\" establishes a useful intermediate (factorisation, specific equation).\n- Step 2: \"Hence find\" uses that result directly — EXPECTS you to leverage the prior work.\n- Step 3: Approach: restate the \"show that\" result, then manipulate further. Don't derive from scratch.\n\nExample: \"Show $$k^2 + 26k + 169 = 0$$\" → \"Hence find $$P$$\". Use $$(k+13)^2 = 0 \\Rightarrow k = -13$$.", "source": "Opus 4.7 ②", "_id": "opus_2_124", "judge_pick": true}, {"question": "For an exponential equation like $$2 \\cdot 4^x - 2^{x+3} = 17 \\cdot 2^{x-1} - 4$$, what's the critical \"setting up\" move before substituting $$p = 2^x$$? (3 steps)", "answer": "- Step 1: Rewrite EVERY term as $$k \\cdot (2^x)^m$$ — constant times a power of $$2^x$$:\n+ $$2 \\cdot 4^x = 2(2^x)^2$$\n+ $$2^{x+3} = 8 \\cdot 2^x$$\n+ $$17 \\cdot 2^{x-1} = \\tfrac{17}{2} \\cdot 2^x$$\n- Step 2: Substitute $$p = 2^x$$: $$2p^2 - 8p = \\tfrac{17p}{2} - 4$$.\n- Step 3: Clear fractions (× 2) and rearrange: $$4p^2 - 33p + 8 = 0$$.\n\nNow in polynomial form — factor or quadratic-formula, then back-substitute.", "source": "Opus 4.7 ②", "_id": "opus_2_125", "judge_pick": false}, {"question": "Give common \"base conversion\" identities for indices with bases 2 and 3.", "answer": "Base 2: $$4 = 2^2, 8 = 2^3, 16 = 2^4, 32 = 2^5, 64 = 2^6, \\tfrac{1}{2} = 2^{-1}, \\tfrac{1}{4} = 2^{-2}, \\tfrac{1}{8} = 2^{-3}$$. Base 3: $$9 = 3^2, 27 = 3^3, 81 = 3^4, \\tfrac{1}{3} = 3^{-1}$$. Mixed: $$6 = 2 \\cdot 3, 12 = 2^2 \\cdot 3$$. Key move: BEFORE substituting, make sure every number is a power of the same base.", "source": "Opus 4.7 ②", "_id": "opus_2_126", "judge_pick": false}, {"question": "Why is the tangent of the minimum point's $$x$$-location important for $$y = A\\sin(Bx + C) + D$$ questions? (3 steps)", "answer": "- Step 1: At a minimum, the inner argument $$Bx + C$$ equals $$\\tfrac{3\\pi}{2} + 2n\\pi$$ (where sine $$= -1$$).\n- Step 2: You can solve for any unknown (often $$C$$) given the minimum's $$x$$.\n- Step 3: For \"smallest positive\" constraints, pick the $$n$$ giving the smallest positive solution.\n\nCommon trap: confusing max ($$\\tfrac{\\pi}{2} + 2n\\pi$$) with min ($$\\tfrac{3\\pi}{2} + 2n\\pi$$).", "source": "Opus 4.7 ②", "_id": "opus_2_127", "judge_pick": true}, {"question": "For Phuc's Mar 9 Q4, what's the general \"tangent with given gradient\" flowchart? (4 steps)", "answer": "- Step 1: Identify tangent line's gradient $$m$$ (coefficient of $$x$$).\n- Step 2: Differentiate curve, set $$f'(x) = m$$, solve for $$x_0$$.\n- Step 3: Evaluate $$y_0 = f(x_0)$$ using the CURVE.\n- Step 4: Substitute $$(x_0, y_0)$$ into line equation for remaining unknown (usually $$c$$).\n\nClean division: curve gives $$f'$$ and $$f$$; line gives $$m$$ and $$c$$.", "source": "Opus 4.7 ②", "_id": "opus_2_128", "judge_pick": false}, {"question": "What's the geometric meaning of \"curves $$C_1$$ and $$C_2$$ meet at $$P$$ and $$Q$$\" in the context of defining a region $$R$$ between them? (3 steps)", "answer": "- Step 1: $$P$$ and $$Q$$ are the intersection points — the \"end-caps\" where the boundary of $$R$$ switches from one curve to the other.\n- Step 2: Between $$P$$ and $$Q$$ ($$x$$-wise), one curve is the upper boundary and the other is lower.\n- Step 3: $$R$$ may also have additional boundaries (e.g. $$x$$-axis) that extend beyond $$P$$ or $$Q$$. Sketch to identify each.", "source": "Opus 4.7 ②", "_id": "opus_2_129", "judge_pick": true}, {"question": "How do you verify a completed-square form $$a(x+b)^2 + c$$? (3 steps)", "answer": "- Step 1: EXPAND back to standard form: $$a(x+b)^2 + c = ax^2 + 2abx + ab^2 + c$$.\n- Step 2: Compare to original $$ax^2 + bx + c$$. Check: $$x^2$$-coefficient is $$a$$; $$x$$-coefficient is $$2ab$$; constant is $$ab^2 + c$$.\n- Step 3: If any mismatch, redo the completing-the-square steps.\n\nExample: $$2(x-3)^2 - 4 = 2x^2 - 12x + 18 - 4 = 2x^2 - 12x + 14$$ ✓", "source": "Opus 4.7 ②", "_id": "opus_2_130", "judge_pick": true}, {"question": "How do you choose between $$<$$ (strict) and $$\\le$$ (non-strict) for inequalities over regions? (3 steps)", "answer": "- Step 1: Depends on whether the boundary is INCLUDED in $$R$$.\n- Step 2: \"Region bounded by...\" (no further specification) typically allows inclusion → $$\\le$$/$$\\ge$$.\n- Step 3: \"Strictly above/below\" or \"excluding boundary\" → strict $$<$$/$$>$$. In IAL P1, default is often $$\\le$$/$$\\ge$$ unless stated.", "source": "Opus 4.7 ②", "_id": "opus_2_131", "judge_pick": true}, {"question": "Why is the equation $$(k + 13)^2 = 0$$ recognisable from $$k^2 + 26k + 169 = 0$$? (3 steps)", "answer": "- Step 1: Recognise the pattern: constant $$169 = 13^2$$; middle $$26 = 2 \\cdot 13$$.\n- Step 2: Matches the expansion $$(k + 13)^2 = k^2 + 2(13)k + 13^2$$.\n- Step 3: So $$k^2 + 26k + 169 = (k + 13)^2$$, giving $$(k+13)^2 = 0 \\Rightarrow k = -13$$ (unique).\n\nPerfect square trinomial check: middle coefficient = $$2\\sqrt{a \\cdot c}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_132", "judge_pick": true}, {"question": "What does the \"no calculator\" instruction signal in an Edexcel P1 question? (3 steps)", "answer": "- Step 1: Certain questions forbid calculator use (e.g. \"show ... without a calculator\"). Targets EXACT algebraic work.\n- Step 2: Expected answer in SURD or exact form, not a decimal approximation.\n- Step 3: Pulling out a calculator and reporting a decimal loses method marks.\n\nCommon contexts: rationalising surds, trig at special angles, clean-base exponentials.", "source": "Opus 4.7 ②", "_id": "opus_2_133", "judge_pick": true}, {"question": "Why does Phuc's \"flagging questions for REDO\" pattern matter for learning? (3 steps)", "answer": "- Step 1: Flagging isolates specific concepts/techniques that caused difficulty.\n- Step 2: Targeted revision: re-studying just the flagged questions closes specific gaps.\n- Step 3: Cross-paper pattern emergence: flagging reveals systemic weaknesses (e.g. sine/cosine forgotten 4 times → needs daily drilling).\n\nMeta-skill: distinguishing \"didn't know\" from \"knew but forgot\" from \"made a slip\".", "source": "Opus 4.7 ②", "_id": "opus_2_134", "judge_pick": false}, {"question": "Explain the general strategy \"substitute a point on the curve to find an unknown constant\". (3 steps)", "answer": "- Step 1: A curve equation often has unknown constants (e.g. $$f(x) = \\ldots + C$$ after integration).\n- Step 2: If $$(x_0, y_0)$$ is on the curve, then $$y_0 = f(x_0)$$ — one equation in unknowns.\n- Step 3: Solve. Multiple unknowns → multiple conditions (additional points or derivative conditions).\n\nExample: after integrating $$f'(x)$$, use $$(2, 8\\sqrt{2})$$ to find $$C$$.", "source": "Opus 4.7 ②", "_id": "opus_2_135", "judge_pick": true}, {"question": "For a region $$R$$ bounded by 4 boundaries, how do you use a sample point to verify the 4 inequalities? (3 steps)", "answer": "- Step 1: Pick a point clearly INSIDE $$R$$ (not on any boundary).\n- Step 2: Substitute into each inequality — all must evaluate true.\n- Step 3: If any inequality fails, flip its sign. Re-test until all pass.\n\nAlso: test a point clearly OUTSIDE one boundary; at least one inequality should fail.", "source": "Opus 4.7 ②", "_id": "opus_2_136", "judge_pick": false}, {"question": "Summarise the key conceptual insight behind \"same variable substitution\" like $$u = x^2$$ or $$p = 2^x$$. (3 steps)", "answer": "- Step 1: When an equation has multiple instances of a common subexpression, substituting a new variable HIDES complexity and reveals a simpler polynomial.\n- Step 2: Usually a quadratic, solvable by factoring or formula. Back-substitute for original variable.\n- Step 3: CAUTION: substitution may restrict domain (e.g. $$u = x^2 \\ge 0$$ forbids negative $$u$$). Always check admissibility of $$u$$-solutions.\n\nA \"change of variable\" — simplify by looking at the problem in the right frame.", "source": "Opus 4.7 ②", "_id": "opus_2_137", "judge_pick": true}, {"question": "What's the difference between a STATIONARY point and a TURNING point? (3 steps)", "answer": "- Step 1: Stationary point: ANY point where $$f'(x) = 0$$ — tangent horizontal.\n- Step 2: Turning point: stationary point where $$f$$ CHANGES DIRECTION — local min or max.\n- Step 3: A stationary point that's NOT turning is a stationary point of inflection (e.g. $$y = x^3$$ at $$x = 0$$): function continues in same direction.\n\nTest: $$f''$$ or sign-of-$$f'$$ on either side.", "source": "Opus 4.7 ②", "_id": "opus_2_138", "judge_pick": true}, {"question": "For a quartic reduced via $$u = x^2$$ to a quadratic in $$u$$, how many real $$x$$-solutions in each sign scenario? (3 steps)", "answer": "- Step 1: Both $$u$$-roots positive & distinct → 4 distinct real $$x$$ ($$\\pm\\sqrt{u_1}, \\pm\\sqrt{u_2}$$).\n- Step 2: Additional scenarios:\n+ Both positive & equal: 2 distinct real $$x$$ (each with multiplicity 2).\n+ One positive, one negative: 2 distinct real $$x$$.\n+ One positive, one zero: 3 distinct real $$x$$.\n+ Both zero: 1 real $$x$$ ($$x = 0$$).\n+ Both negative: 0 real $$x$$.\n+ Complex $$u$$-roots: 0 real $$x$$.\n- Step 3: So 4 distinct real $$x$$ requires two DISTINCT POSITIVE $$u$$-roots.", "source": "Opus 4.7 ②", "_id": "opus_2_139", "judge_pick": true}, {"question": "Why is $$\\Delta > 0$$ in the reduced quadratic $$y^2 - 4y + A = 0$$ (from $$x^4 - 4x^2 + A = 0$$) insufficient for 4 distinct real $$x$$? (3 steps)", "answer": "- Step 1: $$\\Delta > 0$$ only guarantees TWO DISTINCT REAL $$y$$-roots, not their SIGN.\n- Step 2: If one or both $$y$$-roots are $$\\le 0$$, the corresponding $$x^2 = y$$ has fewer (or no) real solutions.\n- Step 3: Need ADDITIONAL conditions: both $$y$$-roots strictly POSITIVE. Via Vieta:\n+ Product $$> 0$$\n+ Sum $$> 0$$\n\nPhuc's trap: stopping at $$\\Delta > 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_140", "judge_pick": false}, {"question": "Why is memorising the quadratic formula more important than memorising factorisation tricks? (3 steps)", "answer": "- Step 1: Quadratic formula works for EVERY quadratic — universal tool.\n- Step 2: Factorisation tricks only work when roots are rational (usually) — a special case.\n- Step 3: In exam: if factorisation isn't obvious within 20 seconds, fall back to formula. Not memorising leaves you stuck on irrational-root questions.\n\nMemorise both, but the formula is non-negotiable.", "source": "Opus 4.7 ②", "_id": "opus_2_141", "judge_pick": true}, {"question": "State the derivatives of $$\\sin x$$ and $$\\cos x$$ in radians. Why is the radian requirement critical? (3 steps)", "answer": "- Step 1: $$\\tfrac{d}{dx}\\sin x = \\cos x$$; $$\\tfrac{d}{dx}\\cos x = -\\sin x$$ (in radians).\n- Step 2: In degrees: derivatives pick up $$\\tfrac{\\pi}{180}$$ factor. Clean formulas REQUIRE radians.\n- Step 3: This is why calculus + trig uses radians; degrees would introduce messy conversions.\n\nDouble-check calculator mode!", "source": "Opus 4.7 ②", "_id": "opus_2_142", "judge_pick": true}, {"question": "What general heuristic prevents missing translations like \"line $$l_2$$ parallel to $$x$$-axis through $$A(4, 2)$$\" → \"$$y = 2$$\"? (3 steps)", "answer": "- Step 1: Translate geometric descriptions into algebraic equations BEFORE doing anything else.\n- Step 2: Common dictionary:\n+ \"Parallel to $$x$$-axis through $$(a, b)$$\" → $$y = b$$\n+ \"Parallel to $$y$$-axis through $$(a, b)$$\" → $$x = a$$\n+ \"Midpoint of $$AB$$\" → average coordinates\n+ \"Perpendicular bisector\" → line through midpoint with $$-1/m_{AB}$$ gradient\n- Step 3: Writing the equation EXPLICITLY (not just visualising) pins down what's asked.", "source": "Opus 4.7 ②", "_id": "opus_2_143", "judge_pick": true}], "count": 144}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 14849, "out_tokens": 12737, "reasoning_chars": 8423, "cost_eur": 0.0554, "elapsed_s": 301, "content_chars": 39651}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 19544, "out_tokens": 13483, "reasoning_chars": 8255, "cost_eur": 0.0623, "elapsed_s": 376, "content_chars": 37692}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": const SK='p1_pp';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
