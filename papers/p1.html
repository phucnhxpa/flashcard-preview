 (2 steps)", "answer": "- Step 1: The most common error is cubing the 16 but forgetting to cube the $$x^{-1/2}$$ term.\n- Step 2: The rule $$(ab)^n = a^n b^n$$ means **every factor** gets the exponent. So, $$(16x^{-1/2})^3 = 16^3 \\cdot (x^{-1/2})^3 = 4096 x^{-3/2}$$.\n\nTreat the coefficient and the variable as separate passengers on a bus; when the bus gets cubed, both passengers get cubed.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "What does a negative exponent on a bracket, like $$\\left(\\frac{A}{B}\\right)^{-4/3}$$, do to the fraction inside, and why? (2 steps)", "answer": "- Step 1: A negative exponent means \"reciprocal,\" so it **flips the fraction**. $$\\left(\\frac{A}{B}\\right)^{-4/3} = \\left(\\frac{B}{A}\\right)^{4/3}$$.\n- Step 2: This comes from the index law $$a^{-n} = \\frac{1}{a^n}$$. Applying it to a fraction gives $$\\left(\\frac{A}{B}\\right)^{-n} = \\frac{1}{(A/B)^n} = \\left(\\frac{B}{A}\\right)^n$$.\n\nAlways flip first to make the exponent positive; it makes subsequent calculations much less error-prone.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "When asked for the number of real solutions to $$f(x) = g(x)$$, and you are given or have sketched the graphs of $$y = f(x)$$ and $$y = g(x)$$, what is the most efficient way to answer? (2 steps)", "answer": "- Step 1: Do not attempt to solve the equation algebraically. Instead, interpret \"real solutions\" as the **intersection points** of the two graphs.\n- Step 2: Simply count the number of times the two curves cross each other. State the number and the reason (e.g., \"The curves intersect at 2 distinct points\").\n\nGraphs turn algebraic solutions into visual intersections. If a sketch is given, \"hence\" means use it visually.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "When equating two curves to find intersections, one curve is $$y = \\frac{15}{2x} + 5$$ and the other is $$y = x^3 - \\frac{7}{2}x + 5$$. What algebraic shortcut immediately simplifies the equation? (2 steps)", "answer": "- Step 1: Look for identical terms on both sides. The $$+5$$ appears in both equations.\n- Step 2: When you set them equal, the $$+5$$ cancels out immediately: $$\\frac{15}{2x} = x^3 - \\frac{7}{2}x$$. This leaves a much simpler equation to clear fractions from.\n\nAlways scan for terms that cancel before expanding or finding common denominators.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "An equation like $$2x^4 - 7x^2 - 15 = 0$$ is a \"biquadratic.\" What substitution reduces this to a standard quadratic, and what must you remember to do after solving for the substituted variable? (3 steps)", "answer": "- Step 1: Substitute $$u = x^2$$ (or $$y = x^2$$). The equation becomes $$2u^2 - 7u - 15 = 0$$.\n- Step 2: Solve this quadratic for $$u$$.\n- Step 3: You must **back-substitute** to find $$x$$. Since $$u = x^2$$, you have $$x^2 = u$$. Reject any negative values for $$u$$ (as $$x^2$$ cannot be negative) and take $$x = \\pm\\sqrt{u}$$ for the positive values.\n\nSolving for $$u$$ is only the halfway point; the exam asks for $$x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "A region is bounded by 4 boundaries: the x-axis, the y-axis, a line, and a curve. How many inequalities are required to define this region, and why? (2 steps)", "answer": "- Step 1: You need exactly **4 inequalities**, one for each boundary.\n- Step 2: Each boundary restricts the region in one direction (e.g., above the x-axis, right of the y-axis, below the curve, below the line). The region is the intersection of all 4 of these individual constraints.\n\nEvery boundary line/curve translates to one inequality. Missing one means the region is unbounded in that direction.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "To find the minimum point of a quadratic like $$f(x) = 2x^2 - 12x + 14$$, why is completing the square more reliable than using calculus for this specific algebraic form? (2 steps)", "answer": "- Step 1: Completing the square directly rewrites the function into vertex form: $$f(x) = a(x - h)^2 + k$$, where $$(h, k)$$ is the minimum point.\n- Step 2: While setting $$f'(x) = 0$$ also works, completing the square gives the exact y-coordinate (the minimum value $$k$$) without needing to substitute the x-value back in, reducing the chance of arithmetic errors.\n\nVertex form explicitly separates the \"shifting\" from the \"scaling,\" making the minimum visually obvious.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "When using the Cosine Rule to show an expression for $$\\cos \\theta$$, you often get an equation like $$x^2 = 25 + 1 + 2x + x^2 - 10(1+x)\\cos \\theta$$. What is the crucial simplification step? (2 steps)", "answer": "- Step 1: You must cancel the $$x^2$$ terms that appear on both sides of the equation.\n- Step 2: This leaves a linear equation in $$x$$ and $$\\cos \\theta$$, which can be easily rearranged to isolate $$\\cos \\theta$$ as a rational expression in $$x$$.\n\nFailing to cancel the squared terms leads to unnecessarily complex algebra and prevents solving for $$\\cos \\theta$$.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": true}, {"question": "If points $$A$$, $$D$$, and $$C$$ lie on a straight line, what is the relationship between the angles $$\\angle BDA$$ and $$\\angle BDC$$, and how does this help with the Sine Rule? (2 steps)", "answer": "- Step 1: They are **supplementary angles**, meaning $$\\angle BDA + \\angle BDC = 180^{\\circ}$$.\n- Step 2: A key property of supplementary angles is that they share the same sine value: $$\\sin(\\angle BDA) = \\sin(\\angle BDC)$$. This allows you to easily switch between triangles $$ABD$$ and $$BCD$$ when using the Sine Rule.\n\nSupplementary sines are equal, a fact heavily exploited in geometry problems with straight lines.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "Conceptually, what is the difference between the Sine Rule and the Cosine Rule in terms of the information they require? (2 steps)", "answer": "- Step 1: The **Sine Rule** ($$\\frac{a}{\\sin A} = \\frac{b}{\\sin B}$$) requires an angle-side pair (you need an angle and its opposite side to find another pair).\n- Step 2: The **Cosine Rule** ($$a^2 = b^2 + c^2 - 2bc \\cos A$$) is used when you have two sides and the included angle (to find the third side), or all three sides (to find an angle). It doesn't require an opposite angle-side pair initially.\n\nNo opposite pair? Sine Rule is useless. Use Cosine Rule.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": true}, {"question": "For a transformed trig function like $$y = A \\cos(Bx)$$, what is the period of the function, and how does the multiplier $$B$$ affect it compared to the standard $$2\\pi$$ period? (2 steps)", "answer": "- Step 1: The period is $$\\frac{2\\pi}{|B|}$$ (or $$\\frac{360^{\\circ}}{|B|}$$).\n- Step 2: The multiplier $$B$$ inside the argument compresses the graph horizontally, meaning the curve completes its cycle $$B$$ times faster. Thus, the period is divided by $$B$$.\n\nA multiplier inside the function ($$Bx$$) divides the period; a multiplier outside ($$Ay$$) changes the amplitude.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": true}, {"question": "When finding the exact distance between two points $$P$$ and $$Q$$ with coordinates involving surds, why is it important to keep the values in exact surd form until the very end? (2 steps)", "answer": "- Step 1: Rounding surds to decimals early introduces cumulative rounding errors, which can change the final answer significantly.\n- Step 2: Surd algebra often simplifies elegantly. For example, $$(\\sqrt{5})^2 = 5$$ perfectly, whereas $$2.236^2 \\approx 4.999$$. Keeping exact forms ensures $$(x_2 - x_1)^2 + (y_2 - y_1)^2$$ simplifies to a clean integer or simple fraction under the square root.\n\nExact form is not just an exam requirement; it is a computational safeguard.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": true}, {"question": "If a question asks for an \"exact value,\" what forms are acceptable, and what is strictly forbidden in the final answer? (2 steps)", "answer": "- Step 1: Acceptable forms include fractions, surds (e.g., $$3\\sqrt{5}$$), and exact trigonometric values (e.g., $$\\frac{\\pi}{3}$$, $$\\sin^{-1}(\\frac{1}{4})$$).\n- Step 2: Decimals are **strictly forbidden**, even if they are very long or repeated. $$3.14159$$ is not an exact value for $$\\pi$$.\n\nExact means symbolic and mathematically precise, never approximated.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "A question asks you to \"State the number of real solutions\" and \"give a reason.\" What two components must your answer contain to get full marks? (2 steps)", "answer": "- Step 1: You must state the integer number of solutions clearly.\n- Step 2: You must provide a reason referencing the graph (e.g., \"The line and curve intersect at 2 points\") or the discriminant (e.g., \"$$\\Delta > 0$$ so there are 2 distinct roots\"). Just writing the number scores 0 marks.\n\n\"State\" means no working is needed for the value, but \"reason\" means a justification is mandatory.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": true}], "count": 50}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "When solving a quadratic like $$21x^{2}+10x+1=0$$ by factorisation, what is the systematic \"split the middle term\" method, and why does looking for two numbers that multiply to $$ac$$ (not $$c$$) work? (3 steps)", "answer": "- Step 1: For $$ax^{2}+bx+c$$, we need two numbers that **multiply to $$a \\times c$$** and **add to $$b$$**. Here, $$a \\times c = 21 \\times 1 = 21$$ and $$b = 10$$. The two numbers are 7 and 3, since $$7 \\times 3 = 21$$ and $$7 + 3 = 10$$. The reason we use $$ac$$ instead of just $$c$$ is that after splitting, each group must share a common factor with the leading coefficient $$a$$ built in — the method is essentially reverse-engineering the FOIL expansion where the outer and inner terms combine to give $$bx$$.\n- Step 2: Split the middle term and factor by grouping: $$21x^{2}+10x+1 = 21x^{2}+7x+3x+1 = 7x(3x+1)+1(3x+1) = (7x+1)(3x+1)$$. The key insight is that after splitting, both groups share the bracket $$(3x+1)$$, which only happens when the two numbers are chosen correctly.\n- Step 3: Set each factor to zero: $$(7x+1)(3x+1)=0 \\Rightarrow x=-\\frac{1}{7}$$ or $$x=-\\frac{1}{3}$$. Factorisation is preferred over the quadratic formula because it avoids arithmetic errors with the square root and fractions.\n\nTakeaway: The \"multiply to $$ac$$, add to $$b$$\" rule is the universal factorisation test — it works even when $$a \\neq 1$$.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "What is the quadratic formula, and what does each part of $$x=\\frac{-b \\pm \\sqrt{b^{2}-4ac}}{2a}$$ represent conceptually? (2 steps)", "answer": "- Step 1: The quadratic formula solves $$ax^{2}+bx+c=0$$ for $$x$$. It is **NOT in the Edexcel formula booklet**, so it must be memorised. The term under the square root, $$\\Delta = b^{2}-4ac$$, is the **discriminant** — it tells you the *nature* of the roots before you even compute them.\n- Step 2: Conceptually, $$\\frac{-b}{2a}$$ is the axis of symmetry (the midpoint of the two roots), and $$\\frac{\\sqrt{\\Delta}}{2a}$$ is the half-distance between the roots. The $$\\pm$$ gives you one root on each side of the axis of symmetry. If $$\\Delta=0$$, the two roots collapse to the same point (repeated root); if $$\\Delta<0$$, the square root is imaginary and there are no real roots.\n\nTakeaway: The formula decomposes into \"centre ± spread\" — the axis of symmetry plus/minus the half-width.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "A common confusion: when finding where a line $$y=4x+c$$ is tangent to a curve, should you set $$\\frac{dy}{dx}$$ equal to the full line equation $$4x+c$$, or to something else? Explain why. (3 steps)", "answer": "- Step 1: You set $$\\frac{dy}{dx}$$ equal to the **gradient** of the line only, which is the scalar $$m=4$$ — NOT the full line equation $$4x+c$$. The derivative $$\\frac{dy}{dx}$$ at a point is a single number (the slope), not an expression in $$x$$.\n- Step 2: The line $$y=4x+c$$ has a **constant** gradient of 4 everywhere. The curve's gradient varies with $$x$$. At the tangent point, these two gradients must match: $$\\frac{dy}{dx}\\bigg|_{\\text{curve}} = m_{\\text{line}}$$. So for curve $$y=2x^{2}+8x+3$$, we get $$4x+8=4$$, giving $$x=-1$$.\n- Step 3: After finding the tangent point on the **curve** ($$y=2(-1)^{2}+8(-1)+3=-3$$), substitute into the **line** equation to find $$c$$: $$-3=4(-1)+c \\Rightarrow c=1$$. The sequence is: differentiate → match gradient → find point on curve → substitute into line.\n\nTakeaway: $$\\frac{dy}{dx}$$ is a slope (scalar), not a line equation. The gradient of $$y=mx+c$$ is always just $$m$$.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "What is the conceptual difference between $$\\frac{dy}{dx}$$ and the equation of the tangent line? Why might someone confuse them? (2 steps)", "answer": "- Step 1: $$\\frac{dy}{dx}$$ evaluated at a point $$x=a$$ gives a **single number** — the instantaneous rate of change (slope). The tangent line equation $$y-y_{1}=m(x-x_{1})$$ is a **full equation of a line** that passes through $$(x_{1},y_{1})$$ with that slope. The derivative is just the $$m$$ part; the tangent line also needs a point to anchor it.\n- Step 2: The confusion arises because in algebra, we often \"set things equal\" — so the instinct is to set $$\\frac{dy}{dx}$$ equal to the whole line $$y=mx+c$$. But $$\\frac{dy}{dx}$$ is a function of $$x$$ (giving slope at each point), while the line's gradient is a constant. The equality is between the **slope values**, not between a slope function and a line equation.\n\nTakeaway: Derivative = slope number; tangent line = slope number + anchor point.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "For the inequality $$y < f(x)$$, which region do you shade, and how does this change for strict vs non-strict inequalities? What visual cue distinguishes them? (2 steps)", "answer": "- Step 1: $$y < f(x)$$ means shade the region **below** the curve $$y=f(x)$$. The logic: every point $$(x,y)$$ satisfying this has a $$y$$-value smaller than the curve's $$y$$-value at that $$x$$ — which means it sits below. Conversely, $$y > f(x)$$ shades **above** the curve.\n- Step 2: For strict inequality ($$<$$ or $$>$$), the boundary curve is drawn as a **dashed line** — points on the curve are NOT included. For non-strict ($$\\leq$$ or $$\\geq$$), the boundary is a **solid line** — points on the curve ARE included. This is the same convention as open vs closed circles on a number line.\n\nTakeaway: Below = less than; Above = greater than. Dashed = strict (not on curve); Solid = non-strict (on curve included).", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "When you have two simultaneous inequalities like $$y < x+2$$ AND $$y > x^{2}-x$$, how do you find the solution region? (2 steps)", "answer": "- Step 1: Handle each inequality independently first. For $$y < x+2$$, shade below the line. For $$y > x^{2}-x$$, shade above the parabola. Each gives its own region.\n- Step 2: The solution is the **overlap (intersection)** of both shaded regions — the \"lens-shaped\" area where both conditions hold simultaneously. If you picked a test point inside this overlap, it would satisfy both: its $$y$$ is below the line AND above the parabola. The boundary intersection points come from solving $$x+2=x^{2}-x$$.\n\nTakeaway: Multiple inequalities → shade each → answer is the overlap. It's the AND of all conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "What is the difference between a minor sector and a major sector, and how do you compute the major angle? (2 steps)", "answer": "- Step 1: A **minor sector** is the smaller slice of a circle cut by an angle $$\\alpha$$ (where $$\\alpha < \\pi$$). A **major sector** is the larger slice — the rest of the circle. The major angle is $$\\theta_{\\text{major}} = 2\\pi - \\alpha$$.\n- Step 2: When a question says \"major sector,\" you must use $$\\theta_{\\text{major}}$$ in the sector formulas, NOT the angle you computed. For example, if $$\\alpha \\approx 2.22$$ rad, then $$\\theta_{\\text{major}} \\approx 2\\pi - 2.22 \\approx 4.06$$ rad. A negative cosine ($$\\cos\\alpha < 0$$) confirms the angle is obtuse ($$\\alpha > \\pi/2$$), but it could still be the minor angle — \"major\" always means the *larger* of the two possible sectors.\n\nTakeaway: Major angle = $$2\\pi -$$ minor angle. Always check whether the question wants the major or minor sector before substituting.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "When using the Cosine Rule to find an angle from three sides, what sign of $$\\cos\\alpha$$ tells you the angle is obtuse, and why? (2 steps)", "answer": "- Step 1: The Cosine Rule gives $$\\cos A = \\frac{b^{2}+c^{2}-a^{2}}{2bc}$$. If $$a^{2} > b^{2}+c^{2}$$, then the numerator is negative, so $$\\cos A < 0$$, meaning $$A > 90°$$ (obtuse). In the example with sides 4, 6, 9: $$81 > 16+36=52$$, so $$\\cos\\alpha = \\frac{-29}{48} < 0$$, confirming an obtuse angle.\n- Step 2: This matters because if you're given $$\\sin\\theta$$ and asked for $$\\cos\\theta$$, there are TWO possible values (positive and negative). The sign of $$\\cos\\theta$$ depends on whether the angle is acute or obtuse. If the question states $$\\theta > 90°$$, you MUST pick the negative value of $$\\cos\\theta$$ when using $$\\cos^{2}\\theta = 1-\\sin^{2}\\theta$$.\n\nTakeaway: Negative cosine = obtuse angle. When finding cosine from sine, the angle's range determines the sign.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "Why must you rewrite $$\\frac{3}{2x^{3}}$$ as $$\\frac{3}{2}x^{-3}$$ before integrating, rather than trying to integrate the fraction directly? (3 steps)", "answer": "- Step 1: The power rule for integration $$\\int x^{n}\\,dx = \\frac{x^{n+1}}{n+1}+C$$ only applies when the variable is in the **numerator** with a single exponent. The expression $$\\frac{3}{2x^{3}}$$ has $$x$$ in the denominator, which the power rule doesn't directly handle.\n- Step 2: Rewriting: $$\\frac{3}{2x^{3}} = \\frac{3}{2} \\cdot \\frac{1}{x^{3}} = \\frac{3}{2}x^{-3}$$. Now the power rule applies directly: $$\\int -\\frac{3}{2}x^{-3}\\,dx = -\\frac{3}{2} \\cdot \\frac{x^{-2}}{-2}+C = \\frac{3}{4}x^{-2}+C = \\frac{3}{4x^{2}}+C$$. Note the double negative: $$n=-3$$, so $$n+1=-2$$, and dividing by $$-2$$ flips the sign.\n- Step 3: Common trap: keeping the scalar inside the denominator. $$\\frac{3}{4x^{2}}$$ is NOT $$\\frac{3}{4}x^{-2}$$ rewritten as $$\\frac{3}{4} \\cdot x^{-2}$$ — wait, it IS. But the trap is writing the final answer as $$\\frac{3}{4}x^{-2}$$ instead of converting back to $$\\frac{3}{4x^{2}}$$ for \"simplest form.\" Check what the question asks for.\n\nTakeaway: Always convert denominator variables to negative exponents before integrating. Convert back to positive exponents for the final answer.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "When integrating $$\\int\\left(10x^{4}-\\frac{3}{2x^{3}}-7\\right)dx$$, what is the complete step-by-step approach and what is the most commonly forgotten element? (3 steps)", "answer": "- Step 1: Rewrite each term in power form: $$10x^{4}$$ stays, $$\\frac{3}{2x^{3}} = \\frac{3}{2}x^{-3}$$, and $$-7 = -7x^{0}$$. Every term must be in the form $$kx^{n}$$ before the power rule applies.\n- Step 2: Integrate term by term: $$\\int 10x^{4}\\,dx = \\frac{10x^{5}}{5} = 2x^{5}$$; $$\\int -\\frac{3}{2}x^{-3}\\,dx = -\\frac{3}{2}\\cdot\\frac{x^{-2}}{-2} = \\frac{3}{4}x^{-2} = \\frac{3}{4x^{2}}$$; $$\\int -7\\,dx = -7x$$.\n- Step 3: Combine and **add $$+C$$**: $$2x^{5}+\\frac{3}{4x^{2}}-7x+C$$. The most commonly forgotten element is the **constant of integration $$+C$$** for indefinite integrals. Without it, you've found *an* antiderivative, not *the general* antiderivative — and you'll lose a mark.\n\nTakeaway: Rewrite → integrate each term → combine → always add $$+C$$ for indefinite integrals.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "Given $$m=2^{n}$$, how do you express $$2^{n+3}$$ and $$16^{3n}$$ in terms of $$m$$? What index law is each using? (2 steps)", "answer": "- Step 1: $$2^{n+3} = 2^{n} \\cdot 2^{3} = 8 \\cdot 2^{n} = 8m$$. This uses the law $$a^{p+q}=a^{p}\\cdot a^{q}$$ — when you add exponents, you multiply the powers. The \"$$+3$$\" in the exponent becomes a factor of $$2^{3}=8$$ out front.\n- Step 2: $$16^{3n} = (2^{4})^{3n} = 2^{12n} = (2^{n})^{12} = m^{12}$$. This uses two laws: first, change the base ($$16=2^{4}$$) using $$(a^{p})^{q}=a^{pq}$$, giving $$2^{12n}$$; then recognise that $$2^{12n}=(2^{n})^{12}=m^{12}$$. The key insight is that $$12n = 12 \\times n$$, so $$(2^{n})^{12}$$ packages the whole exponent as a power of $$m$$.\n\nTakeaway: Addition in the exponent → multiply by a factor. Multiplication in the exponent → raise $$m$$ to a power.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "When solving $$x\\sqrt{3}-3=x+\\sqrt{3}$$ for $$x$$ in the form $$p+q\\sqrt{3}$$, why must you rationalise the denominator, and what is the conjugate trick? (3 steps)", "answer": "- Step 1: Collect $$x$$-terms on one side: $$x\\sqrt{3}-x=3+\\sqrt{3}$$, so $$x(\\sqrt{3}-1)=3+\\sqrt{3}$$. This gives $$x=\\frac{3+\\sqrt{3}}{\\sqrt{3}-1}$$. The denominator contains a surd, which means the expression isn't in the required form $$p+q\\sqrt{3}$$.\n- Step 2: Rationalise by multiplying **both** numerator and denominator by the **conjugate** $$\\sqrt{3}+1$$: $$x=\\frac{(3+\\sqrt{3})(\\sqrt{3}+1)}{(\\sqrt{3}-1)(\\sqrt{3}+1)}$$. The denominator uses the difference of squares: $$(\\sqrt{3})^{2}-(1)^{2}=3-1=2$$. This is why the conjugate works — it eliminates the surd from the denominator.\n- Step 3: Expand the numerator: $$3\\sqrt{3}+3+3+\\sqrt{3}=6+4\\sqrt{3}$$. Divide by 2: $$x=3+2\\sqrt{3}$$. So $$p=3, q=2$$. Always multiply BOTH top and bottom by the conjugate — multiplying only the top changes the value of the expression.\n\nTakeaway: Conjugate of $$a+b\\sqrt{c}$$ is $$a-b\\sqrt{c}$$. Denominator becomes $$a^{2}-b^{2}c$$ (difference of squares).", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "For the graph transformation $$y=f(x+3)$$, does the graph shift left or right, and why is the direction counterintuitive? (2 steps)", "answer": "- Step 1: $$y=f(x+3)$$ shifts the graph **LEFT by 3**. Each original point $$(x,y)$$ moves to $$(x-3,y)$$. For example, $$(-1,0)$$ becomes $$(-4,0)$$ and $$(0,2)$$ becomes $$(-3,2)$$. The shift is in the opposite direction of the sign inside the brackets.\n- Step 2: The counterintuitive direction arises because the transformation is on the **input**. To get the same output as the original at $$x$$, you now need to feed in $$x+3$$ — meaning the graph has moved to where $$x$$ is 3 less. The rule: **inside the function → horizontal, and the direction is reversed**. This contrasts with $$f(x)+3$$ (outside), which shifts UP by 3 — the intuitive direction.\n\nTakeaway: Inside $$f(\\;)$$ → horizontal (reversed direction). Outside $$f(\\;)$$ → vertical (intuitive direction).", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "For the transformation $$y=f(-3x)$$, what two transformations happen simultaneously, and how do you transform the coordinates? (3 steps)", "answer": "- Step 1: $$y=f(-3x)$$ combines a **reflection in the $$y$$-axis** (from the negative sign) and a **horizontal compression by scale factor $$\\frac{1}{3}$$** (from the factor of 3). These happen simultaneously, not sequentially.\n- Step 2: The coordinate rule for $$y=f(ax)$$ is: replace each $$x$$-coordinate with $$\\frac{x}{a}$$. Here $$a=-3$$, so each $$x$$-coordinate is divided by $$-3$$: $$(-1,0) \\to (\\frac{1}{3},0)$$; $$(0,2) \\to (0,2)$$; $$(3,0) \\to (-1,0)$$. The $$y$$-coordinates are unchanged.\n- Step 3: Note that $$(0,2)$$ stays at $$(0,2)$$ because $$\\frac{0}{-3}=0$$. The origin is always a fixed point for horizontal reflections. Also, a \"touches\" point (double root) remains a \"touches\" point — the transformation preserves the nature of the contact with the axis.\n\nTakeaway: $$f(ax)$$: divide $$x$$-coords by $$a$$. Negative $$a$$ adds reflection. The \"touches\" property is preserved.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "What is the complete transformation cheat sheet — for each of the six standard transformations, what happens and how do coordinates change? (2 steps)", "answer": "- Step 1: The six standard transformations and their effects:\n+ $$f(x)+a$$: shift UP by $$a$$ → $$y \\to y+a$$\n+ $$f(x+a)$$: shift LEFT by $$a$$ → $$x \\to x-a$$\n+ $$af(x)$$: vertical stretch SF $$a$$ → $$y \\to ay$$\n+ $$f(ax)$$: horizontal compress SF $$\\frac{1}{a}$$ → $$x \\to \\frac{x}{a}$$\n+ $$-f(x)$$: reflect in $$x$$-axis → $$y \\to -y$$\n+ $$f(-x)$$: reflect in $$y$$-axis → $$x \\to -x$$\n- Step 2: The mnemonic: **inside** $$f(\\;)$$ → **horizontal** (and direction reverses: $$+a$$ goes left, $$\\times a$$ compresses). **Outside** $$f(\\;)$$ → **vertical** (and direction is intuitive: $$+a$$ goes up, $$\\times a$$ stretches). This inside/outside distinction is the single most important thing to remember.\n\nTakeaway: Inside = horizontal (reversed); Outside = vertical (intuitive).", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "What trigger words in a question tell you to use the discriminant, and what condition does each trigger on $$\\Delta$$? (2 steps)", "answer": "- Step 1: The discriminant $$\\Delta = b^{2}-4ac$$ determines the nature of intersection between two curves (after you set them equal and form a quadratic). The trigger words map to conditions on $$\\Delta$$:\n+ \"Meets at a single point\" / \"tangent to\" / \"touches\" → $$\\Delta = 0$$ (one repeated root)\n+ \"Two distinct points\" / \"cuts at two points\" / \"intersects twice\" → $$\\Delta > 0$$\n+ \"Does not intersect\" / \"never crosses\" / \"no real solutions\" → $$\\Delta < 0$$\n- Step 2: The key insight (from Phuc): when the question asks you to show an equation that only contains the parameter $$k$$ (no $$x$$), that's a signal to use the discriminant. After equating the curves and rearranging to a quadratic in $$x$$, the discriminant eliminates $$x$$ entirely and gives you an equation purely in $$k$$.\n\nTakeaway: \"Single point\" = $$\\Delta=0$$; \"Two distinct\" = $$\\Delta>0$$; \"No intersection\" = $$\\Delta<0$$. If the target equation has no $$x$$, think discriminant.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "When two curves meet at a single point, why does setting the discriminant to zero work, and what's the full procedure? (3 steps)", "answer": "- Step 1: Set the two curve equations equal. For $$y=x^{2}+kx-9$$ and $$y=-3x^{2}-5x+k$$: $$x^{2}+kx-9=-3x^{2}-5x+k \\Rightarrow 4x^{2}+(k+5)x-(9+k)=0$$. This is a quadratic in $$x$$ with coefficients involving $$k$$.\n- Step 2: \"Single point\" means the quadratic has exactly one solution — a repeated root. This happens when $$\\Delta=0$$: $$(k+5)^{2}+16(9+k)=0$$. Expanding: $$k^{2}+10k+25+144+16k=k^{2}+26k+169=0$$.\n- Step 3: Solve for $$k$$: $$(k+13)^{2}=0 \\Rightarrow k=-13$$. Then substitute back into the quadratic to find the intersection point: $$4x^{2}-8x+4=0 \\Rightarrow (x-1)^{2}=0 \\Rightarrow x=1$$, and $$y=1-13-9=-21$$. Point $$P=(1,-21)$$.\n\nTakeaway: Single intersection → $$\\Delta=0$$ → solve for parameter → back-substitute for coordinates.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "When finding the area of a composite shape involving a sector and triangles, what's the systematic approach? (3 steps)", "answer": "- Step 1: **Decompose** the shape into standard pieces: sectors, triangles, rectangles. For a garden $$ABCDEA$$, this might be triangle $$ABE$$ + sector $$BDE$$ + right triangle $$BCD$$. Each piece uses a different formula.\n- Step 2: **Compute each piece** using the appropriate formula:\n+ Sector area: $$A=\\frac{1}{2}r^{2}\\theta$$ (angle in radians)\n+ SAS triangle area: $$A=\\frac{1}{2}ab\\sin C$$\n+ Right triangle: $$A=\\frac{1}{2}\\times\\text{base}\\times\\text{height}$$, where base/height come from $$h\\cos\\theta$$ and $$h\\sin\\theta$$\n- Step 3: **Sum** all pieces for the total area. Watch for angles on a straight line (sum to $$\\pi$$) and angles in a triangle (sum to $$\\pi$$). For example, $$\\angle ABE = \\pi - 1.3 - \\frac{\\pi}{2}$$ because $$A$$, $$B$$, $$C$$ are collinear and $$\\angle BCD = \\frac{\\pi}{2}$$.\n\nTakeaway: Decompose → compute each with the right formula → sum. Angles on a straight line = $$\\pi$$.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "For a region $$R$$ bounded by a curve $$C$$, a line $$l$$, and the $$x$$-axis, how do you determine whether each inequality uses $$\\leq$$ or $$\\geq$$? (3 steps)", "answer": "- Step 1: Identify all boundaries of $$R$$. If $$R$$ is bounded by the curve $$y=2x^{2}+x-21$$, the line $$y=5x+75$$, and the $$x$$-axis, then $$R$$ has three boundary curves, so you need three inequalities.\n- Step 2: For each boundary, determine whether $$R$$ is above or below it:\n+ $$R$$ is above the $$x$$-axis → $$y \\geq 0$$\n+ $$R$$ is below the line → $$y \\leq 5x+75$$\n+ $$R$$ is above the curve → $$y \\geq 2x^{2}+x-21$$\n- Step 3: **Verify with a test point.** Pick a point clearly inside $$R$$ and check all inequalities. If the point satisfies all three, your signs are correct. Phuc's trap: writing $$y \\leq 2x^{2}+x-21$$ when $$R$$ is actually ABOVE the curve — always check with a sample point, don't guess the direction.\n\nTakeaway: For each boundary, is $$R$$ above ($$\\geq$$) or below ($$\\leq$$)? Verify with a test point inside $$R$$.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "When told \"point $$A$$ lies on both curves $$y=f'(x)$$ and $$y=f''(x)$$,\" what exactly does this mean algebraically, and how do you exploit it? (2 steps)", "answer": "- Step 1: If $$A$$ lies on both curves with $$x_{A}=5$$, then substituting $$x=5$$ into both expressions gives the same $$y$$-value: $$f'(5)=f''(5)$$. This is a single equation in the unknown $$k$$, which you can solve directly.\n- Step 2: For $$f'(x)=6x^{2}-2kx+14$$ and $$f''(x)=12x-2k$$: $$6(25)-2k(5)+14=12(5)-2k \\Rightarrow 164-10k=60-2k \\Rightarrow k=13$$. The key trick is recognising that \"on both curves\" means the two expressions are **equal at that specific $$x$$-value** — it gives you one equation with one unknown (if $$k$$ is the only unknown).\n\nTakeaway: \"Point on both curves\" → substitute the point into both → set equal → solve for the parameter.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "After finding that two curves meet at point $$A$$ with $$x=5$$, how do you find the OTHER intersection point $$B$$? (2 steps)", "answer": "- Step 1: You know one root of the equation $$f'(x)=f''(x)$$ is $$x=5$$. After rearranging to a quadratic, you can factor out $$(x-5)$$: $$6x^{2}-26x+14=12x-26 \\Rightarrow 3x^{2}-19x+20=0 \\Rightarrow (3x-4)(x-5)=0$$.\n- Step 2: The other root is $$x=\\frac{4}{3}$$. Substitute into either expression for the $$y$$-coordinate: $$y=12\\cdot\\frac{4}{3}-26=16-26=-10$$. So $$B=(\\frac{4}{3},-10)$$. The key: you already know one factor, so you can find the other by polynomial division or by comparing coefficients.\n\nTakeaway: Known root → factor it out → solve the remaining factor for the other intersection.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "For a quartic equation $$x^{4}-4x^{2}+A=0$$, why is the condition $$\\Delta>0$$ NOT sufficient to guarantee 4 distinct real roots? What additional conditions are needed? (3 steps)", "answer": "- Step 1: Substitute $$y=x^{2}$$ (where $$y \\geq 0$$) to get the quadratic $$y^{2}-4y+A=0$$. The discriminant $$\\Delta=16-4A>0$$ gives $$A<4$$, which ensures two distinct $$y$$-roots. But these $$y$$-roots might be negative, giving no real $$x$$-values.\n- Step 2: For each positive $$y$$-root, we get TWO real $$x$$-values ($$x=\\pm\\sqrt{y}$$). For each zero $$y$$-root, we get one real $$x$$-value ($$x=0$$). For each negative $$y$$-root, we get NO real $$x$$-values. So for 4 distinct real $$x$$-roots, we need TWO DISTINCT POSITIVE $$y$$-roots.\n- Step 3: Three conditions for two distinct positive roots:\n+ $$\\Delta>0$$: $$A<4$$ (two distinct roots)\n+ Product $$>0$$: $$A>0$$ (both roots have the same sign — both positive or both negative)\n+ Sum $$>0$$: sum $$=4>0$$ (automatic, so both roots must be positive)\nCombined: $$0<A<4$$. Phuc's trap: forgetting the $$A>0$$ condition.\n\nTakeaway: For 4 distinct real roots of a quartic in $$x^{2}$$: need $$\\Delta>0$$ AND both roots of the quadratic in $$y$$ must be positive.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "Why does each positive root of the quadratic in $$y=x^{2}$$ give exactly two real $$x$$-values, while a zero root gives only one? (2 steps)", "answer": "- Step 1: If $$y=k>0$$ is a root, then $$x^{2}=k$$ gives $$x=+\\sqrt{k}$$ and $$x=-\\sqrt{k}$$ — two distinct values. This is because squaring maps both $$+\\sqrt{k}$$ and $$-\\sqrt{k}$$ to the same $$y$$-value.\n- Step 2: If $$y=0$$ is a root, then $$x^{2}=0$$ gives only $$x=0$$ — a repeated root. And if $$y=k<0$$ is a root, then $$x^{2}=k$$ has no real solutions (you can't square a real number to get a negative). So the sign of each $$y$$-root directly determines how many $$x$$-solutions it contributes: positive → 2, zero → 1, negative → 0.\n\nTakeaway: Positive $$y$$-root → 2 real $$x$$-values. Zero → 1. Negative → 0. Count carefully.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "If a line passes through $$A(4,2)$$ and is parallel to the $$x$$-axis, what is its equation? What if it were parallel to the $$y$$-axis? (2 steps)", "answer": "- Step 1: A line parallel to the $$x$$-axis is **horizontal** — every point on it has the same $$y$$-coordinate. Through $$(4,2)$$, the equation is simply $$y=2$$. The $$x$$-coordinate of the given point is irrelevant for the equation; the line extends for all $$x$$ at height 2.\n- Step 2: A line parallel to the $$y$$-axis is **vertical** — every point has the same $$x$$-coordinate. Through $$(4,2)$$, the equation is $$x=4$$. These lines have undefined/infinite gradient and cannot be written in the form $$y=mx+c$$.\n\nTakeaway: Parallel to $$x$$-axis through $$(a,b)$$: $$y=b$$. Parallel to $$y$$-axis through $$(a,b)$$: $$x=a$$.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "At a minimum point of $$y=12\\sin(x+B)$$, what value does the sine function take, and what is the general solution for the angle? (2 steps)", "answer": "- Step 1: The sine function ranges from $$-1$$ to $$+1$$. At a **minimum**, $$\\sin(\\theta)=-1$$, so the minimum value of $$y$$ is $$12 \\times (-1) = -12$$. The common mistake is confusing max with min: $$\\sin=+1$$ gives a MAXIMUM, $$\\sin=-1$$ gives a MINIMUM.\n- Step 2: $$\\sin\\theta=-1$$ when $$\\theta=\\frac{3\\pi}{2}+2n\\pi$$ (equivalently $$-\\frac{\\pi}{2}+2n\\pi$$). So at the minimum point, $$x+B=\\frac{3\\pi}{2}+2n\\pi$$. If the minimum occurs at $$x=\\frac{\\pi}{4}$$, then $$B=\\frac{3\\pi}{2}-\\frac{\\pi}{4}+2n\\pi=\\frac{5\\pi}{4}+2n\\pi$$. Smallest positive $$B$$: $$\\frac{5\\pi}{4}$$.\n\nTakeaway: $$\\sin=-1$$ at $$\\frac{3\\pi}{2}+2n\\pi$$. Maximum is $$\\sin=+1$$ at $$\\frac{\\pi}{2}+2n\\pi$$. Don't mix them up.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "What are the exact angles where $$\\sin$$ and $$\\cos$$ achieve their maximum and minimum values? (2 steps)", "answer": "- Step 1: For sine:\n+ $$\\sin\\theta=1$$ (maximum) at $$\\theta=\\frac{\\pi}{2}+2n\\pi$$\n+ $$\\sin\\theta=-1$$ (minimum) at $$\\theta=\\frac{3\\pi}{2}+2n\\pi$$ (or $$-\\frac{\\pi}{2}+2n\\pi$$)\n- Step 2: For cosine:\n+ $$\\cos\\theta=1$$ (maximum) at $$\\theta=2n\\pi$$ (i.e., $$0, 2\\pi, 4\\pi, \\ldots$$)\n+ $$\\cos\\theta=-1$$ (minimum) at $$\\theta=\\pi+2n\\pi$$ (i.e., $$\\pi, 3\\pi, 5\\pi, \\ldots$$)\nThese are the \"peak\" and \"trough\" positions on the standard unit circle diagrams, and they recur every $$2\\pi$$.\n\nTakeaway: Sine max at $$\\frac{\\pi}{2}$$, min at $$\\frac{3\\pi}{2}$$. Cosine max at $$0$$, min at $$\\pi$$. All $$+2n\\pi$$.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "Given the area of a triangle and two sides, how do you find the included angle, and why must you be careful about obtuse angles? (3 steps)", "answer": "- Step 1: Use the SAS area formula $$A=\\frac{1}{2}ab\\sin C$$ and solve for $$\\sin C$$. For area $$=100$$, $$a=15$$, $$b=25$$: $$100=\\frac{1}{2}(15)(25)\\sin\\theta \\Rightarrow \\sin\\theta=\\frac{8}{15}$$.\n- Step 2: From $$\\sin\\theta=\\frac{8}{15}$$, you get $$\\cos^{2}\\theta=1-\\frac{64}{225}=\\frac{161}{225}$$, so $$\\cos\\theta=\\pm\\frac{\\sqrt{161}}{15}$$. There are TWO possible angles with the same sine — one acute, one obtuse.\n- Step 3: If the question states $$\\theta>90°$$ (obtuse), then $$\\cos\\theta<0$$, so you must pick $$\\cos\\theta=-\\frac{\\sqrt{161}}{15}$$. This directly affects the Cosine Rule calculation for the opposite side. Using the wrong sign gives the wrong side length.\n\nTakeaway: $$\\sin\\theta$$ alone doesn't uniquely determine the angle. The range (acute vs obtuse) determines the sign of $$\\cos\\theta$$.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "When using the Cosine Rule with an obtuse angle, what happens to the sign of the $$-2bc\\cos A$$ term, and how does it affect the side length? (2 steps)", "answer": "- Step 1: The Cosine Rule: $$a^{2}=b^{2}+c^{2}-2bc\\cos A$$. When $$A$$ is obtuse, $$\\cos A<0$$, so the term $$-2bc\\cos A$$ becomes **positive** (negative × negative = positive). This means $$a^{2}$$ is LARGER than $$b^{2}+c^{2}$$.\n- Step 2: In the example with $$b=15$$, $$c=25$$, $$\\cos\\theta=-\\frac{\\sqrt{161}}{15}$$: $$BC^{2}=225+625-2(15)(25)\\left(-\\frac{\\sqrt{161}}{15}\\right)=850+50\\sqrt{161}$$. The negative cosine adds to the side length instead of subtracting, making the opposite side longer than it would be for an acute angle. This is geometrically intuitive: an obtuse angle \"opens wider,\" so the opposite side spans more distance.\n\nTakeaway: Obtuse angle → negative cosine → $$-2bc\\cos A$$ is positive → opposite side is longer.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "When substituting $$p=2^{x}$$ into an equation involving powers of 2, what are the three key rewriting rules, and what's a common base conversion? (3 steps)", "answer": "- Step 1: The three index rewriting rules:\n+ $$2^{x+c}=2^{x}\\cdot 2^{c}=p\\cdot 2^{c}$$ (addition in exponent → multiply by constant)\n+ $$2^{cx}=(2^{x})^{c}=p^{c}$$ (coefficient on $$x$$ → raise $$p$$ to that power)\n+ $$2^{x-c}=\\frac{2^{x}}{2^{c}}=\\frac{p}{2^{c}}$$ (subtraction in exponent → divide by constant)\n- Step 2: Common base conversions: $$4=2^{2}$$, $$8=2^{3}$$, $$16=2^{4}$$, $$32=2^{5}$$, $$64=2^{6}$$, $$\\frac{1}{2}=2^{-1}$$, $$\\frac{1}{4}=2^{-2}$$. So $$4^{x}=(2^{2})^{x}=2^{2x}=(2^{x})^{2}=p^{2}$$, and $$16^{3n}=(2^{4})^{3n}=2^{12n}=(2^{n})^{12}=m^{12}$$.\n- Step 3: After substituting and solving the polynomial in $$p$$, back-substitute: if $$p=8$$, then $$2^{x}=2^{3}$$ so $$x=3$$; if $$p=\\frac{1}{4}$$, then $$2^{x}=2^{-2}$$ so $$x=-2$$. Each positive value of $$p$$ gives exactly one real $$x$$ because $$2^{x}$$ is one-to-one.\n\nTakeaway: Convert all terms to powers of $$2^{x}=p$$, solve the polynomial, then back-substitute using logarithm-free matching.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "In the equation $$2\\cdot 4^{x}-2^{x+3}=17\\cdot 2^{x-1}-4$$, walk through the substitution $$p=2^{x}$$ step by step to arrive at $$4p^{2}-33p+8=0$$. (3 steps)", "answer": "- Step 1: Rewrite each term using $$p=2^{x}$$:\n+ $$2\\cdot 4^{x}=2\\cdot(2^{2})^{x}=2\\cdot(2^{x})^{2}=2p^{2}$$\n+ $$2^{x+3}=2^{x}\\cdot 2^{3}=8p$$\n+ $$17\\cdot 2^{x-1}=17\\cdot\\frac{2^{x}}{2}=\\frac{17p}{2}$$\n- Step 2: Substitute into the equation: $$2p^{2}-8p=\\frac{17p}{2}-4$$. There's a fraction, which is awkward.\n- Step 3: Clear the fraction by multiplying everything by 2: $$4p^{2}-16p=17p-8 \\Rightarrow 4p^{2}-33p+8=0$$. Factor: $$(4p-1)(p-8)=0 \\Rightarrow p=8$$ or $$p=\\frac{1}{4}$$. Back-substitute: $$x=3$$ or $$x=-2$$.\n\nTakeaway: Rewrite all terms as powers of $$p$$ → clear fractions → solve polynomial → back-substitute.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "For a composite radian problem with an inner and outer sector sharing the same angle, how do you use a ratio like $$DA:AO=3:5$$ to find the radii? (3 steps)", "answer": "- Step 1: Express lengths using the ratio. If $$DA:AO=3:5$$, let $$DA=3x$$ and $$AO=5x$$. The inner radius is $$DO=DA+AO=8x$$, and the outer radius is $$AO=5x$$ (if $$A$$ is on the outer arc) — wait, read carefully. In this problem, the outer radius is the full distance from centre to outer arc.\n- Step 2: Use one known measurement to find $$x$$. The inner arc $$CD=9$$ m with angle $$0.8$$ rad: $$\\ell=r\\theta$$ gives $$8x\\times 0.8=9 \\Rightarrow 6.4x=9 \\Rightarrow x=1.40625$$. Then $$AO=5x\\approx 7.03$$ m and $$DO=8x\\approx 11.25$$ m.\n- Step 3: Now all radii are known. For perimeter, add: major arc (outer) + minor arc (inner) + two straight segments. For area, add: major sector (outer) + minor sector (inner). The major arc uses angle $$2\\pi-0.8$$; the minor arc uses angle $$0.8$$.\n\nTakeaway: Ratio → introduce $$x$$ → use one known length to find $$x$$ → compute everything else.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "When computing the perimeter of a composite sector shape, what are the components, and what's the most common mistake? (2 steps)", "answer": "- Step 1: The perimeter consists of: outer arc + inner arc + two straight connecting segments. Each arc uses $$\\ell=r\\theta$$ with the correct radius and angle. The straight segments connect the inner and outer arcs — their length comes from the difference in radii (or from the ratio, e.g., $$DA=3x$$).\n- Step 2: The most common mistake is using the wrong angle — the **major arc** uses $$\\theta_{\\text{major}}=2\\pi-\\theta_{\\text{minor}}$$, not the given minor angle. Also, don't forget to count BOTH straight segments (there are two, one on each side). And perimeter does NOT include any internal edges — only the outer boundary.\n\nTakeaway: Perimeter = outer arc + inner arc + 2 straights. Use major angle for major arc. Count both straights.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "When you have $$f'(x)$$ with an unknown constant $$k$$ and a point $$P$$ on the curve, why is it a trap to integrate $$f'(x)$$ first and then try to find both $$k$$ and $$C$$ simultaneously? (3 steps)", "answer": "- Step 1: If you integrate $$f'(x)=4x^{3/2}+\\frac{k}{x^{2}}$$ first, you get $$f(x)=\\frac{8}{5}x^{5/2}-\\frac{k}{x}+C$$. Substituting the point $$P(2,8\\sqrt{2})$$ gives one equation: $$8\\sqrt{2}=\\frac{8}{5}(4\\sqrt{2})-\\frac{k}{2}+C$$. This is **one equation with TWO unknowns** ($$k$$ and $$C$$) — unsolvable.\n- Step 2: The escape: use the condition $$f''(P)=0$$ FIRST. Differentiate $$f'$$ to get $$f''(x)=6x^{1/2}-2kx^{-3}$$. Setting $$f''(2)=0$$ gives: $$6\\sqrt{2}-\\frac{2k}{8}=0 \\Rightarrow k=24\\sqrt{2}$$. Now $$k$$ is known — only one unknown remains.\n- Step 3: Then integrate with the known $$k$$ and use point $$P$$ to find $$C$$. The strategy: **exploit any extra condition involving only $$k$$ first, then integrate and find $$C$$.** The \"$$f''(P)=0$$\" condition is the key that unlocks $$k$$ before you need to integrate.\n\nTakeaway: Two unknowns → find the one that can be determined independently first, then use the point for the other.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": true}, {"question": "When cubing an expression like $$b=16x^{-1/2}$$, what is the most common error, and how do you avoid it? (2 steps)", "answer": "- Step 1: The most common error is cubing the numerical coefficient but **forgetting to cube the variable part**. Correctly: $$b^{3}=(16x^{-1/2})^{3}=16^{3}\\cdot(x^{-1/2})^{3}=4096x^{-3/2}$$. The mistake would be writing $$b^{3}=4096x^{-1/2}$$ — only cubing the 16, not the $$x^{-1/2}$$.\n- Step 2: The rule is: $$(AB)^{n}=A^{n}\\cdot B^{n}$$ — **EVERY factor gets the exponent**. When you see brackets with multiple factors, the exponent distributes to all of them. Similarly, $$(2p^{2})^{2}=4p^{4}$$, not $$2p^{4}$$.\n\nTakeaway: $$(AB)^{n}=A^{n}B^{n}$$. Every factor inside the brackets gets the exponent — no exceptions.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "What does a negative outer exponent like $$\\left(\\frac{A}{B}\\right)^{-n}$$ do to the fraction, and why? (2 steps)", "answer": "- Step 1: $$\\left(\\frac{A}{B}\\right)^{-n}=\\left(\\frac{B}{A}\\right)^{n}$$. A negative exponent **flips the fraction** (reciprocates) and makes the exponent positive. This is because $$x^{-n}=\\frac{1}{x^{n}}$$, so $$\\left(\\frac{A}{B}\\right)^{-n}=\\frac{1}{(A/B)^{n}}=\\frac{B^{n}}{A^{n}}=\\left(\\frac{B}{A}\\right)^{n}$$.\n- Step 2: Application: $$\\left(\\frac{ab^{3}}{2}\\right)^{-4/3}=\\left(\\frac{2}{ab^{3}}\\right)^{4/3}$$. First flip, then apply the positive exponent. This is much cleaner than trying to work with negative exponents throughout. Similarly, $$\\frac{1}{x^{-k}}=x^{k}$$ — a negative exponent in the denominator flips to positive in the numerator.\n\nTakeaway: Negative exponent on a fraction → flip the fraction, make exponent positive. Then compute.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "When expressing $$\\frac{16}{b^{3}}$$ where $$b=16x^{-1/2}$$ in the form $$kx^{n}$$, walk through the full simplification. (3 steps)", "answer": "- Step 1: Compute $$b^{3}=(16x^{-1/2})^{3}=16^{3}\\cdot x^{-3/2}=4096x^{-3/2}$$. Every factor gets cubed.\n- Step 2: Write the fraction: $$\\frac{16}{b^{3}}=\\frac{16}{4096x^{-3/2}}$$. Now, $$x^{-3/2}$$ is in the denominator, so $$\\frac{1}{x^{-3/2}}=x^{3/2}$$ (negative exponent in denominator flips to positive in numerator).\n- Step 3: $$\\frac{16}{4096x^{-3/2}}=\\frac{16}{4096}\\cdot x^{3/2}=\\frac{1}{256}x^{3/2}$$. So $$k=\\frac{1}{256}$$ and $$n=\\frac{3}{2}$$. The key insight: dividing by $$x^{-3/2}$$ is the same as multiplying by $$x^{3/2}$$.\n\nTakeaway: $$\\frac{1}{x^{-k}}=x^{k}$$. When a negative power is in the denominator, it flips to positive in the numerator.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "When asked for the number of real solutions of an equation like $$(x+2)(x^{3}+4x^{2}+4x)=1$$, how can you determine this from a sketch without solving algebraically? (3 steps)", "answer": "- Step 1: Rearrange to $$f(x)=g(x)$$ form: $$x^{3}+4x^{2}+4x=\\frac{1}{x+2}$$. The number of real solutions equals the number of intersection points of $$y=x^{3}+4x^{2}+4x$$ and $$y=\\frac{1}{x+2}$$.\n- Step 2: Factor the cubic: $$x^{3}+4x^{2}+4x=x(x+2)^{2}$$. This touches the $$x$$-axis at $$x=-2$$ (double root → tangent) and crosses at $$x=0$$. The hyperbola has a vertical asymptote at $$x=-2$$ and approaches 0 as $$x\\to\\pm\\infty$$.\n- Step 3: Count intersections from the sketch: right of $$x=-2$$, the cubic rises from 0 while the hyperbola decreases from $$+\\infty$$ — they cross once. Left of $$x=-2$$, the cubic goes to $$-\\infty$$ while the hyperbola approaches $$0^{-}$$ — they cross once. Total: **2 real solutions**. The \"hence\" keyword means reuse your sketch — no algebra needed.\n\nTakeaway: Number of real solutions = number of graph intersections. Factor and sketch, then count crossings.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "What does a double root like $$(x+2)^{2}$$ mean for the shape of the graph at that point? (2 steps)", "answer": "- Step 1: A double root means the curve **touches** the $$x$$-axis at that point but does **not cross** it. The graph is tangent to the axis — it approaches, touches, and turns back. For $$y=x(x+2)^{2}$$, at $$x=-2$$ the curve touches the axis (local minimum at 0) and at $$x=0$$ it crosses through.\n- Step 2: This matters for counting intersections: if another curve approaches the axis near $$x=-2$$, the \"touching\" behaviour means there might be zero or two nearby intersections (depending on the other curve), not just one. A single root always gives a crossing; a double root gives a touch.\n\nTakeaway: Double root → touches, doesn't cross. Single root → crosses through. This affects intersection counting.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "When the Cosine Rule gives you $$\\cos\\theta=\\frac{13+x}{5+5x}$$ and you need to rationalise after substituting a surd for $$x$$, what's the approach? (3 steps)", "answer": "- Step 1: Substitute $$x=2\\sqrt{3}$$: $$\\cos\\theta=\\frac{13+2\\sqrt{3}}{5+10\\sqrt{3}}$$. The denominator has a surd, so rationalise by multiplying top and bottom by the conjugate $$5-10\\sqrt{3}$$.\n- Step 2: Denominator: $$(5+10\\sqrt{3})(5-10\\sqrt{3})=25-100\\cdot 3=25-300=-275$$. Numerator: $$(13+2\\sqrt{3})(5-10\\sqrt{3})=65-130\\sqrt{3}+10\\sqrt{3}-20\\cdot 3=65-120\\sqrt{3}-60=5-120\\sqrt{3}$$.\n- Step 3: $$\\cos\\theta=\\frac{5-120\\sqrt{3}}{-275}=\\frac{120\\sqrt{3}-5}{275}=\\frac{24\\sqrt{3}-1}{55}$$. The negative denominator flips the signs. This is the exact form; numerically $$\\cos\\theta\\approx 0.738$$, giving $$\\theta\\approx 42.5°$$.\n\nTakeaway: Rationalise surd denominators using conjugates. Watch sign flips from negative denominators.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "When told \"$$ADC$$ is a straight line\" in a geometry problem, what trigonometric relationship does this give you? (2 steps)", "answer": "- Step 1: If $$ADC$$ is a straight line, then angles $$\\angle BDA$$ and $$\\angle BDC$$ are **supplementary** — they add to $$180°$$ (or $$\\pi$$ radians). This is because they sit on opposite sides of point $$D$$ on the straight line.\n- Step 2: The key trigonometric consequence: $$\\sin(\\angle BDA)=\\sin(\\angle BDC)$$ (supplementary angles have equal sines). However, $$\\cos(\\angle BDA)=-\\cos(\\angle BDC)$$ (cosines are negatives of each other). This lets you transfer angle information between triangles $$ABD$$ and $$BCD$$ that share the straight line.\n\nTakeaway: Straight line → supplementary angles → sines equal, cosines opposite. This connects two triangles sharing an edge.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": true}, {"question": "When equating two curves that both contain a constant term (like $$+5$$), what should you look for before doing heavy algebra? (2 steps)", "answer": "- Step 1: Before expanding or rearranging, check if any terms **cancel immediately**. For $$\\frac{15}{2x}+5=x^{3}-\\frac{7}{2}x+5$$, the $$+5$$ appears on both sides and cancels, giving $$\\frac{15}{2x}=x^{3}-\\frac{7}{2}x$$. This is much simpler.\n- Step 2: After cancellation, multiply through by the denominator to clear fractions: $$15=2x^{4}-7x^{2}$$, giving $$2x^{4}-7x^{2}-15=0$$. The substitution $$u=x^{2}$$ then reduces this to a quadratic: $$2u^{2}-7u-15=0$$. Always simplify first, then clear fractions, then substitute.\n\nTakeaway: Cancel common terms FIRST, then clear fractions by multiplying through. Don't do unnecessary algebra.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "What is the \"biquadratic trick\" for solving equations like $$2x^{4}-7x^{2}-15=0$$, and why must you check the sign of $$u$$? (3 steps)", "answer": "- Step 1: Substitute $$u=x^{2}$$ to convert the quartic in $$x$$ to a quadratic in $$u$$: $$2u^{2}-7u-15=0$$. Factor: $$(2u+3)(u-5)=0$$, so $$u=-\\frac{3}{2}$$ or $$u=5$$.\n- Step 2: Since $$u=x^{2}\\geq 0$$, the root $$u=-\\frac{3}{2}$$ is **rejected** (no real $$x$$ gives a negative $$x^{2}$$). Only $$u=5$$ is valid, giving $$x=\\pm\\sqrt{5}$$.\n- Step 3: This is the same principle as the 4-distinct-roots problem: not all roots of the quadratic in $$u$$ translate to real roots in $$x$$. You must always check that $$u\\geq 0$$ (and $$u>0$$ if you need distinct $$x$$-values).\n\nTakeaway: $$u=x^{2}$$ reduces degree, but reject negative $$u$$-roots since $$x^{2}\\geq 0$$ always.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "When defining a region $$R$$ by inequalities and there are 4 boundaries (e.g., $$x$$-axis, $$y$$-axis, a line, and a curve), how many inequalities do you need and how do you determine the sign of each? (3 steps)", "answer": "- Step 1: You need exactly **one inequality per boundary**. Four boundaries → four inequalities. Each boundary divides the plane into two half-planes, and you need to specify which side $$R$$ is on.\n- Step 2: Determine above/below for each boundary:\n+ $$x$$-axis: if $$R$$ is above, then $$y\\geq 0$$\n+ $$y$$-axis: if $$R$$ is to the right, then $$x\\geq 0$$\n+ Line $$l$$: if $$R$$ is below the line, then $$y\\leq mx+c$$\n+ Curve $$C$$: if $$R$$ is below the curve, then $$y\\leq f(x)$$\n- Step 3: **Verify with a test point** inside $$R$$. Pick a point that is clearly in the interior and check all four inequalities. If any fails, flip the sign. Phuc's recurring error: getting the $$\\leq$$ vs $$\\geq$$ wrong on the curve boundary — always double-check.\n\nTakeaway: $$n$$ boundaries → $$n$$ inequalities. Determine above/below for each, verify with a test point.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": true}, {"question": "When completing the square for $$2x^{2}-12x+14$$, walk through the steps and explain what the result tells you about the minimum. (3 steps)", "answer": "- Step 1: Factor out the leading coefficient from the first two terms: $$2(x^{2}-6x)+14$$.\n- Step 2: Complete the square inside: half of $$-6$$ is $$-3$$, so $$x^{2}-6x=(x-3)^{2}-9$$. This gives $$2[(x-3)^{2}-9]+14=2(x-3)^{2}-18+14=2(x-3)^{2}-4$$.\n- Step 3: Since $$2(x-3)^{2}\\geq 0$$ for all $$x$$, the minimum occurs when $$(x-3)^{2}=0$$, i.e., at $$x=3$$. The minimum value is $$-4$$, so the minimum point is $$P=(3,-4)$$. The form $$a(x-h)^{2}+k$$ directly reads off the vertex $$(h,k)$$.\n\nTakeaway: Complete the square → read off minimum point $$(h,k)$$ from $$a(x-h)^{2}+k$$.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "What is the general formula for completing the square of $$ax^{2}+bx+c$$, and what does each part represent? (2 steps)", "answer": "- Step 1: $$ax^{2}+bx+c=a\\left(x+\\frac{b}{2a}\\right)^{2}+c-\\frac{b^{2}}{4a}$$. The term $$\\frac{b}{2a}$$ is half the linear coefficient divided by the leading coefficient. The term $$c-\\frac{b^{2}}{4a}$$ adjusts for the constant added by squaring.\n- Step 2: The vertex is at $$x=-\\frac{b}{2a}$$, and the minimum/maximum value is $$c-\\frac{b^{2}}{4a}$$ (minimum if $$a>0$$, maximum if $$a<0$$). The axis of symmetry is the vertical line $$x=-\\frac{b}{2a}$$. This connects to the quadratic formula: the axis of symmetry $$\\frac{-b}{2a}$$ is the midpoint of the two roots.\n\nTakeaway: $$ax^{2}+bx+c=a\\left(x+\\frac{b}{2a}\\right)^{2}+\\left(c-\\frac{b^{2}}{4a}\\right)$$. Vertex at $$x=-\\frac{b}{2a}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "How do you find the equation of a line through two known points, like $$(-1,28)$$ and $$(3,-4)$$? (2 steps)", "answer": "- Step 1: Find the gradient: $$m=\\frac{y_{2}-y_{1}}{x_{2}-x_{1}}=\\frac{-4-28}{3-(-1)}=\\frac{-32}{4}=-8$$. The gradient is the change in $$y$$ divided by the change in $$x$$.\n- Step 2: Use point-slope form: $$y-y_{1}=m(x-x_{1}) \\Rightarrow y-28=-8(x-(-1))=-8(x+1)=-8x-8$$. So $$y=-8x+20$$. Verify with the other point: $$-8(3)+20=-24+20=-4$$ ✓.\n\nTakeaway: Gradient = $$\\frac{\\Delta y}{\\Delta x}$$, then use $$y-y_{1}=m(x-x_{1})$$ with either point.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "What are Vieta's formulas for a quadratic $$ax^{2}+bx+c=0$$, and how are they used to check sign conditions on roots? (2 steps)", "answer": "- Step 1: Vieta's formulas: sum of roots $$= -\\frac{b}{a}$$, product of roots $$= \\frac{c}{a}$$. These come directly from the factorisation $$a(x-r_{1})(x-r_{2})=ax^{2}-a(r_{1}+r_{2})x+ar_{1}r_{2}$$.\n- Step 2: Sign conditions:\n+ Both roots positive ↔ sum $$>0$$ AND product $$>0$$\n+ Both roots negative ↔ sum $$<0$$ AND product $$>0$$\n+ Roots of opposite sign ↔ product $$<0$$\n+ At least one zero root ↔ product $$=0$$\nFor the 4-distinct-roots problem: $$y^{2}-4y+A=0$$ has sum $$=4>0$$ (automatic) and product $$=A$$. For both positive: need $$A>0$$ and $$\\Delta>0$$ (i.e., $$A<4$$).\n\nTakeaway: Vieta gives sum and product of roots from coefficients. Use sign logic to determine if roots are positive/negative.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": true}, {"question": "What is the distance formula, and how is it used to find unknown coordinates when one coordinate is fixed? (2 steps)", "answer": "- Step 1: Distance between $$(x_{1},y_{1})$$ and $$(x_{2},y_{2})$$: $$d=\\sqrt{(x_{2}-x_{1})^{2}+(y_{2}-y_{1})^{2}}$$. This is the Pythagorean theorem in 2D.\n- Step 2: If $$C=(x,2)$$ lies on $$y=2$$ and $$BC=5\\sqrt{5}$$ with $$B=(15,7)$$: $$(15-x)^{2}+(7-2)^{2}=125 \\Rightarrow (15-x)^{2}+25=125 \\Rightarrow (15-x)^{2}=100 \\Rightarrow 15-x=\\pm 10$$. So $$x=5$$ or $$x=25$$, giving two possible points $$C$$.\n\nTakeaway: Distance formula → Pythagorean equation → solve for unknown coordinate. The $$\\pm$$ gives two solutions.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "For a triangle with a horizontal base, how do you compute the area, and how does the position of the third vertex affect it? (2 steps)", "answer": "- Step 1: If the base is horizontal (on a line $$y=k$$), the base length is $$|x_{2}-x_{1}|$$ and the perpendicular height is $$|y_{3}-k|$$ (vertical distance from the third vertex to the base line). Area $$=\\frac{1}{2}\\times\\text{base}\\times\\text{height}$$.\n- Step 2: In the example: base $$AC$$ on $$y=2$$, vertex $$B=(15,7)$$. Height $$=|7-2|=5$$. For $$C=(5,2)$$: base $$=|5-4|=1$$, area $$=2.5$$. For $$C=(25,2)$$: base $$=|25-4|=21$$, area $$=52.5$$. The minimum area corresponds to the smallest base.\n\nTakeaway: Horizontal base → base = horizontal distance, height = vertical distance. Simple $$\\frac{1}{2}bh$$.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "What is the Sine Rule, and when should you use it versus the Cosine Rule? (2 steps)", "answer": "- Step 1: **Sine Rule**: $$\\frac{a}{\\sin A}=\\frac{b}{\\sin B}=\\frac{c}{\\sin C}$$. Use it when you have an **angle-side pair** (you know an angle and the opposite side) and need to find another angle or side. It connects angle-opposite-side pairs.\n- Step 2: **Cosine Rule**: $$a^{2}=b^{2}+c^{2}-2bc\\cos A$$. Use it when you have **two sides and the included angle** (to find the opposite side), or **three sides** (to find an angle). The Cosine Rule doesn't require an angle-side pair — it's for when you're missing the opposite side or angle.\n\nTakeaway: Have an angle-side pair? → Sine Rule. Have two sides + included angle, or three sides? → Cosine Rule.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "What are the key radian formulas for arc length, sector area, and segment area, and why must the angle be in radians? (2 steps)", "answer": "- Step 1: Arc length: $$\\ell=r\\theta$$. Sector area: $$A=\\frac{1}{2}r^{2}\\theta$$. Segment area: $$A=\\frac{1}{2}r^{2}(\\theta-\\sin\\theta)$$. All three require $$\\theta$$ in **radians**. If the angle is in degrees, you must convert first: $$\\theta_{\\text{rad}}=\\theta_{\\text{deg}}\\times\\frac{\\pi}{180}$$.\n- Step 2: These formulas only work in radians because they derive from the definition of a radian: an angle of 1 radian subtends an arc of length $$r$$ on a circle of radius $$r$$. The degree-based formulas require extra factors of $$\\frac{\\pi}{180}$$, which is why the radian versions are cleaner. Common conversions: $$30°=\\frac{\\pi}{6}$$, $$45°=\\frac{\\pi}{4}$$, $$60°=\\frac{\\pi}{3}$$, $$90°=\\frac{\\pi}{2}$$.\n\nTakeaway: $$\\ell=r\\theta$$, $$A_{\\text{sector}}=\\frac{1}{2}r^{2}\\theta$$, $$A_{\\text{segment}}=\\frac{1}{2}r^{2}(\\theta-\\sin\\theta)$$. Angle MUST be in radians.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "What is the area of a triangle given two sides and the included angle (SAS formula), and why does it work? (2 steps)", "answer": "- Step 1: Area $$=\\frac{1}{2}ab\\sin C$$, where $$a$$ and $$b$$ are two sides and $$C$$ is the included angle. For example, with sides 10.8 and 6 and included angle 0.27 rad: $$A=\\frac{1}{2}(10.8)(6)\\sin(0.27)\\approx 8.64$$.\n- Step 2: This formula comes from the standard $$\\frac{1}{2}\\times\\text{base}\\times\\text{height}$$, where the height is $$b\\sin C$$ (the perpendicular from one vertex to the opposite side). When you know two sides and the angle between them, this is the most direct area formula — no need to find the third side first.\n\nTakeaway: SAS area $$=\\frac{1}{2}ab\\sin C$$. It's just $$\\frac{1}{2}\\times\\text{base}\\times\\text{height}$$ with height $$=b\\sin C$$.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "For a right-angled triangle with hypotenuse $$h$$ and angle $$\\theta$$, how do you find the adjacent and opposite sides? (2 steps)", "answer": "- Step 1: Adjacent (next to the angle) $$= h\\cos\\theta$$. Opposite (across from the angle) $$= h\\sin\\theta$$. These come directly from SOH-CAH-TOA: $$\\cos\\theta=\\frac{\\text{adj}}{h}$$ and $$\\sin\\theta=\\frac{\\text{opp}}{h}$$.\n- Step 2: In the sector problem: right triangle $$BCD$$ with hypotenuse $$BD=6$$ and angle $$\\angle DBC=1.3$$ rad. Then $$BC=6\\cos(1.3)\\approx 1.61$$ and $$CD=6\\sin(1.3)\\approx 5.78$$. Area $$=\\frac{1}{2}(1.61)(5.78)\\approx 4.64$$.\n\nTakeaway: Right triangle with hypotenuse $$h$$: adj $$= h\\cos\\theta$$, opp $$= h\\sin\\theta$$. Quick and direct.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "What are the key exam command words and what does each require you to do (or not do)? (2 steps)", "answer": "- Step 1: The command words:\n+ \"Hence\" → you MUST use your previous answer; the problem is linked\n+ \"Show that\" → your working must lead clearly to the stated result; don't just verify\n+ \"Exact value\" → give surd/fraction form; no decimals\n+ \"Explain\" → words required, not just algebra\n+ \"State\" → no working needed, just the answer\n- Step 2: Practical implications:\n+ \"Hence\" after a sketch → RE-USE the sketch, don't start from scratch\n+ \"Show that\" → work towards the given answer, showing every step\n+ \"Exact\" → don't reach for your calculator; leave $$\\sqrt{5}$$, $$\\pi$$, fractions as they are\n+ \"State\" → don't waste time showing working; the answer should be immediate\n\nTakeaway: Command words dictate your approach. \"Hence\" = use previous work. \"Show\" = derive it. \"Exact\" = no decimals. \"State\" = no working.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "What is the period of $$y=A\\sin(Bx+C)$$, and how do you avoid the common confusion between $$\\frac{360}{n}$$ and $$360n$$? (2 steps)", "answer": "- Step 1: The period of $$y=A\\sin(Bx+C)$$ is $$\\frac{2\\pi}{|B|}$$ radians (or $$\\frac{360°}{|B|}$$ in degrees). The coefficient $$B$$ in front of $$x$$ **compresses** the graph horizontally, fitting more cycles into the same space, so the period gets **smaller**. It's always $$\\frac{\\text{base period}}{B}$$.\n- Step 2: The common trap: $$y=\\cos(nx)$$ has period $$\\frac{360°}{n}$$ (dividing), NOT $$360n$$ (multiplying). Think of it this way: if $$n=2$$, you get two full cycles in 360°, so each cycle is 180°. The period shrinks. Conversely, $$y=\\cos(x/n)$$ has period $$360n$$ — a slower oscillation, so the period stretches. The rule: coefficient inside → divide; coefficient as divisor → multiply.\n\nTakeaway: Period of $$\\sin(Bx)$$ = $$\\frac{2\\pi}{B}$$. $$B$$ inside → period shrinks (divide). $$1/B$$ inside → period stretches (multiply).", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "What is the second derivative test for classifying stationary points, and what happens if $$f''(a)=0$$? (2 steps)", "answer": "- Step 1: At a stationary point where $$f'(a)=0$$:\n+ $$f''(a)>0$$ → local **minimum** (curve is concave up, like a bowl)\n+ $$f''(a)<0$$ → local **maximum** (curve is concave down, like a hill)\n+ $$f''(a)=0$$ → **inconclusive** (could be a point of inflection, or a max/min — need further testing)\n- Step 2: When $$f''(a)=0$$, you must check the sign of $$f'$$ on either side of $$a$$: if $$f'$$ changes from positive to negative, it's a max; negative to positive, a min; same sign both sides, a point of inflection. The second derivative test is a shortcut that fails at the boundary case.\n\nTakeaway: $$f''>0$$ → min; $$f''<0$$ → max; $$f''=0$$ → inconclusive, check first derivative signs.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "Why is the condition \"$$f''(P)=0$$\" useful in problems with an unknown constant $$k$$, and how does it help avoid the two-unknowns trap? (2 steps)", "answer": "- Step 1: $$f''(P)=0$$ gives you an equation involving only $$k$$ (and known values), because $$f''$$ is computed from $$f'$$ by differentiation — no integration constant appears. For $$f'(x)=4x^{3/2}+kx^{-2}$$: $$f''(x)=6x^{1/2}-2kx^{-3}$$, and setting $$f''(2)=0$$ gives $$6\\sqrt{2}-\\frac{2k}{8}=0 \\Rightarrow k=24\\sqrt{2}$$.\n- Step 2: Without this condition, integrating $$f'$$ would introduce both $$k$$ and $$C$$, and a single point $$P$$ gives only one equation — insufficient for two unknowns. The $$f''$$ condition resolves $$k$$ first, leaving only $$C$$ to find from the point. The strategy: always look for conditions that involve fewer unknowns and resolve them first.\n\nTakeaway: $$f''(P)=0$$ gives an equation in $$k$$ only — resolve $$k$$ first, then integrate to find $$C$$.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": true}, {"question": "When integrating $$f'(x)=4x^{3/2}+\\frac{k}{x^{2}}$$ with a known $$k$$, walk through the integration and the use of a boundary point to find $$C$$. (3 steps)", "answer": "- Step 1: Rewrite: $$f'(x)=4x^{3/2}+kx^{-2}$$. Integrate: $$f(x)=\\frac{4x^{5/2}}{5/2}+\\frac{kx^{-1}}{-1}+C=\\frac{8}{5}x^{5/2}-\\frac{k}{x}+C$$.\n- Step 2: With $$k=24\\sqrt{2}$$: $$f(x)=\\frac{8}{5}x^{5/2}-\\frac{24\\sqrt{2}}{x}+C$$. Use point $$P(2,8\\sqrt{2})$$: $$8\\sqrt{2}=\\frac{8}{5}(2)^{5/2}-\\frac{24\\sqrt{2}}{2}+C$$. Note $$2^{5/2}=2^{2}\\cdot 2^{1/2}=4\\sqrt{2}$$.\n- Step 3: $$8\\sqrt{2}=\\frac{8}{5}(4\\sqrt{2})-12\\sqrt{2}+C=\\frac{32\\sqrt{2}}{5}-12\\sqrt{2}+C$$. So $$C=8\\sqrt{2}+12\\sqrt{2}-\\frac{32\\sqrt{2}}{5}=\\frac{68\\sqrt{2}}{5}$$. The final answer: $$f(x)=\\frac{8}{5}x^{5/2}-\\frac{24\\sqrt{2}}{x}+\\frac{68\\sqrt{2}}{5}$$.\n\nTakeaway: Integrate → substitute known $$k$$ → use boundary point for $$C$$. Know your power-of-2 surds: $$2^{5/2}=4\\sqrt{2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "What are the useful power-of-2 surd values to memorise, and why do they appear in integration problems? (2 steps)", "answer": "- Step 1: Key values: $$2^{1/2}=\\sqrt{2}$$, $$2^{3/2}=2\\sqrt{2}$$, $$2^{5/2}=4\\sqrt{2}$$, $$2^{7/2}=8\\sqrt{2}$$. The pattern: each increment of $$\\frac{1}{2}$$ in the exponent multiplies by $$\\sqrt{2}$$, and each increment of 1 multiplies by 2.\n- Step 2: These appear in integration problems because when you evaluate $$x^{n/2}$$ at $$x=2$$, you get $$2^{n/2}$$, which is one of these surds. Recognising them saves time and avoids decimal approximation errors. Always leave answers in exact surd form when asked.\n\nTakeaway: $$2^{1/2}=\\sqrt{2}$$, $$2^{3/2}=2\\sqrt{2}$$, $$2^{5/2}=4\\sqrt{2}$$. Each +1 in exponent doubles; each +½ multiplies by $$\\sqrt{2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "When a question says \"express in the form $$kx^{n}$$,\" what exactly are you being asked to do? (2 steps)", "answer": "- Step 1: You must simplify the expression to a single term: a numerical coefficient $$k$$ times a power of $$x$$. No fractions with $$x$$ in the denominator, no surds with $$x$$ inside, no sums of terms. Everything collapses to one monomial.\n- Step 2: The process: rewrite all roots as fractional exponents, all denominators as negative exponents, apply power rules to combine, and simplify the numerical coefficient. For example, $$\\frac{16}{4096x^{-3/2}}=\\frac{1}{256}x^{3/2}$$, so $$k=\\frac{1}{256}$$ and $$n=\\frac{3}{2}$$.\n\nTakeaway: \"Form $$kx^{n}$$\" means one coefficient × one power of $$x$$. No fractions in $$x$$, no sums.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": true}, {"question": "What is the Pythagorean identity $$\\sin^{2}\\theta+\\cos^{2}\\theta=1$$ used for in exam problems, and what's the sign trap? (2 steps)", "answer": "- Step 1: The identity lets you find $$\\cos\\theta$$ from $$\\sin\\theta$$ (or vice versa): $$\\cos^{2}\\theta=1-\\sin^{2}\\theta$$, so $$\\cos\\theta=\\pm\\sqrt{1-\\sin^{2}\\theta}$$. Similarly, $$\\sin\\theta=\\pm\\sqrt{1-\\cos^{2}\\theta}$$.\n- Step 2: The sign trap: there are TWO possible values (positive and negative). You must use the angle's range to pick the correct sign. If $$\\theta$$ is obtuse ($$90°<\\theta<180°$$), then $$\\cos\\theta<0$$ — pick the negative root. If acute, pick positive. This directly affects Cosine Rule calculations.\n\nTakeaway: $$\\sin^{2}\\theta+\\cos^{2}\\theta=1$$ gives magnitude; the angle's range gives the sign. Always check acute vs obtuse.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": false}, {"question": "Conceptual synthesis: A curve $$y=f(x)$$ and a line $$y=mx+c$$ are said to be tangent. Outline the complete chain of reasoning from this statement to finding $$c$$. (4 steps)", "answer": "- Step 1: \"Tangent\" means they meet at exactly one point. This tells us the discriminant of the resulting quadratic is zero: $$\\Delta=0$$.\n- Step 2: Set $$f(x)=mx+c$$, rearrange to a quadratic in $$x$$, and apply $$\\Delta=0$$ to find any unknown parameters (like $$m$$ or a coefficient in $$f$$).\n- Step 3: With parameters known, solve the quadratic (which now has a repeated root) to find the $$x$$-coordinate of the tangent point. Substitute back into the **curve** equation for $$y$$.\n- Step 4: Substitute the tangent point $$(x_{0},y_{0})$$ into the line equation $$y_{0}=mx_{0}+c$$ to find $$c$$. The key order: discriminant condition → solve for parameters → find point → find $$c$$.\n\nTakeaway: Tangent → $$\\Delta=0$$ → find parameters → find point → find $$c$$. Never skip the discriminant step.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "Conceptual synthesis: You're given a composite shape with a sector, a triangle, and a straight-line angle condition. Outline the systematic approach to find its total area. (4 steps)", "answer": "- Step 1: **Identify all sub-shapes** and the formulas needed for each: sector ($$\\frac{1}{2}r^{2}\\theta$$), SAS triangle ($$\\frac{1}{2}ab\\sin C$$), right triangle ($$\\frac{1}{2}bh$$).\n- Step 2: **Find all angles** using angle sum rules: straight line = $$\\pi$$, triangle = $$\\pi$$, major angle = $$2\\pi-\\text{minor}$$. If you have three sides, use the Cosine Rule for the angle. If you have an angle-side pair, use the Sine Rule.\n- Step 3: **Find all lengths** you need. Use the Sine Rule or Cosine Rule for non-right triangles. For right triangles, use $$h\\cos\\theta$$ and $$h\\sin\\theta$$. If a ratio is given, introduce $$x$$ and solve.\n- Step 4: **Compute each area and sum.** Be careful with units and rounding: only round at the final answer, not intermediate steps. Check whether the question asks for the major or minor sector.\n\nTakeaway: Decompose → find angles → find lengths → compute areas → sum. Round only at the end.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": false}, {"question": "Conceptual synthesis: You encounter an equation with different bases of 2 (like $$4^{x}$$, $$2^{x+3}$$, $$2^{x-1}$$). Outline the substitution method to solve it. (4 steps)", "answer": "- Step 1: **Convert all terms to powers of the same base** using index laws. $$4^{x}=(2^{2})^{x}=(2^{x})^{2}$$, $$2^{x+3}=2^{x}\\cdot 8$$, $$2^{x-1}=\\frac{2^{x}}{2}$$.\n- Step 2: **Substitute** $$p=2^{x}$$ (or whatever the common base variable is). Every term becomes a power or multiple of $$p$$. This converts the exponential equation into a polynomial equation in $$p$$.\n- Step 3: **Solve the polynomial** (usually quadratic). Factor or use the quadratic formula. Reject any negative or zero roots of $$p$$ (since $$p=2^{x}>0$$ always).\n- Step 4: **Back-substitute**: $$p=a \\Rightarrow 2^{x}=a$$. If $$a$$ is a power of 2, read off $$x$$ directly. If not, use logarithms (though at this level, $$a$$ is always a nice power of 2). Each valid $$p$$ gives exactly one $$x$$.\n\nTakeaway: Convert bases → substitute → solve polynomial → back-substitute. Reject $$p\\leq 0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": false}, {"question": "Conceptual synthesis: A region $$R$$ is described as \"bounded by\" several curves and lines. Outline how to translate this into a system of inequalities. (4 steps)", "answer": "- Step 1: **List all boundaries** mentioned. If the question says \"bounded by the $$x$$-axis, the $$y$$-axis, the line $$l$$, and the curve $$C$$,\" that's four boundaries → four inequalities.\n- Step 2: **Write the equation of each boundary.** You may need to find these first (e.g., complete the square for the curve, find the line equation from two points).\n- Step 3: **Determine the direction** of each inequality by checking whether $$R$$ is above/below (for horizontal boundaries) or left/right (for vertical boundaries). Use a test point inside $$R$$ to verify.\n- Step 4: **Write the complete system** and double-check that the test point satisfies ALL inequalities simultaneously. If any fails, flip that inequality sign.\n\nTakeaway: List boundaries → find equations → determine direction (test point) → write all inequalities → verify.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": false}, {"question": "Why is it important to distinguish between \"exact value\" and \"decimal approximation\" in exam answers, and what counts as exact? (2 steps)", "answer": "- Step 1: \"Exact value\" means no rounding or decimal approximation whatsoever. Acceptable forms include: fractions ($$\\frac{3}{7}$$), surds ($$\\sqrt{5}$$, $$3+2\\sqrt{3}$$), multiples of $$\\pi$$ ($$\\frac{5\\pi}{4}$$), and combinations thereof. Writing $$\\sqrt{5}\\approx 2.24$$ is NOT exact.\n- Step 2: The practical reason: exact values preserve mathematical relationships that decimals destroy. For instance, $$\\frac{68\\sqrt{2}}{5}$$ is exact; writing it as $$19.23$$ loses precision and would lose marks. When a question says \"find the exact value,\" using your calculator for a decimal will cost you the mark even if the number is close.\n\nTakeaway: Exact = surds, fractions, $$\\pi$$. No decimals. Calculator stays in exact mode for these questions.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": false}, {"question": "Misconception probe: \"If $$\\Delta>0$$ for a quadratic, it always has two real roots.\" Is this statement always true when the quadratic comes from a substitution like $$y=x^{2}$$? Explain. (2 steps)", "answer": "- Step 1: The statement is true for the quadratic itself — $$\\Delta>0$$ guarantees two distinct real roots of the quadratic in its variable. But if the quadratic is in a substituted variable like $$y$$ (where $$y=x^{2}$$), then a negative root of the quadratic in $$y$$ does NOT correspond to any real $$x$$-value.\n- Step 2: Example: $$y^{2}-4y+A=0$$ with $$A=-1$$ gives $$\\Delta=16+4=20>0$$, so two real $$y$$-roots. But the roots are approximately $$4.24$$ and $$-0.24$$. The negative root gives no real $$x$$, so only 2 (not 4) real $$x$$-solutions exist. The discriminant condition is necessary but not sufficient when there are domain constraints on the substituted variable.\n\nTakeaway: $$\\Delta>0$$ guarantees two real roots of the quadratic, but NOT necessarily valid roots after back-substitution. Check sign constraints.", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": true}, {"question": "Edge case: What happens if one of the $$y$$-roots in the substitution $$y=x^{2}$$ equals exactly zero? How many $$x$$-values does this give? (2 steps)", "answer": "- Step 1: If $$y=0$$ is a root, then $$x^{2}=0$$ gives $$x=0$$ — a single (repeated) real root. This contributes only **one** distinct real $$x$$-value, not two.\n- Step 2: So for a quartic in $$x^{2}$$ to have 4 distinct real roots, you need two DISTINCT POSITIVE (strictly $$>0$$) $$y$$-roots. If one root is zero, you'd get at most 3 distinct $$x$$-values (two from the positive root, one from zero). This is why the product condition is $$A>0$$ (strict), not $$A\\geq 0$$.\n\nTakeaway: $$y=0$$ root → only 1 real $$x$$. For 4 distinct real $$x$$-roots, need two strictly positive $$y$$-roots.", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": true}, {"question": "Simple exercise: A line $$y=3x+7$$ is tangent to a curve $$y=x^{2}+kx+1$$. Set up (don't solve) the equation you would use to find $$k$$. (2 steps)", "answer": "- Step 1: Set the curve equal to the line: $$x^{2}+kx+1=3x+7 \\Rightarrow x^{2}+(k-3)x-6=0$$. This is a quadratic in $$x$$ with parameter $$k$$.\n- Step 2: For tangency (single point of contact), set $$\\Delta=0$$: $$(k-3)^{2}+24=0$$. This is the equation you'd solve for $$k$$. Note: this particular equation has no real solution (sum of squares can't be zero), meaning no value of $$k$$ makes this line tangent to this curve — a good check on whether the problem is solvable.\n\nTakeaway: Equate → rearrange to quadratic → set $$\\Delta=0$$ → solve for parameter. Check if the resulting equation has solutions.", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": false}, {"question": "Simple exercise: Rewrite $$\\frac{5}{3x^{2}}$$ in power form and state what it becomes after integration. (2 steps)", "answer": "- Step 1: $$\\frac{5}{3x^{2}}=\\frac{5}{3}x^{-2}$$. The scalar $$\\frac{5}{3}$$ stays; only the $$x$$-part gets the negative exponent.\n- Step 2: Integrate: $$\\int \\frac{5}{3}x^{-2}\\,dx=\\frac{5}{3}\\cdot\\frac{x^{-1}}{-1}+C=-\\frac{5}{3x}+C$$. The exponent goes from $$-2$$ to $$-1$$, and dividing by $$-1$$ flips the sign.\n\nTakeaway: $$\\frac{k}{x^{n}}=kx^{-n}$$. Integrate: exponent increases by 1, divide by new exponent, don't forget $$+C$$.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": false}, {"question": "Simple exercise: Giv
