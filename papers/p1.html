med according to the following sequence: first reflected in the $$x$$-axis, then stretched vertically by factor 2, then translated 3 units right. If the original point on the curve is $$(1, 4)$$, find its final image.", "answer": "- Start: $$(1, 4)$$\n- Step 1: **Reflect in $$x$$-axis:** $$(x, y) \\rightarrow (x, -y)$$. Point becomes $$(1, -4)$$.\n- Step 2: **Vertical stretch by factor 2:** $$(x, y) \\rightarrow (x, 2y)$$. Point becomes $$(1, -8)$$.\n- Step 3: **Translate 3 right:** $$(x, y) \\rightarrow (x+3, y)$$. Point becomes $$(4, -8)$$.\n\nFinal image: $$(4, -8)$$", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": true}, {"question": "The graph of $$y = f(x)$$ has a stationary point at $$x = 2$$ and passes through $$(2, 3)$$ and $$(3, 5)$$. Sketch $$y = f(2x)$$ and state the coordinates of the image of the stationary point.", "answer": "- For $$y = f(2x)$$: This is a **horizontal compression** by factor $$\\frac{1}{2}$$ (every $$x$$-coordinate is halved).\n- The stationary point originally at $$x = 2$$ now moves to $$x = \\frac{2}{2} = 1$$.\n- The $$y$$-coordinate remains unchanged at $$y = 3$$.\n- Image of stationary point: $$(1, 3)$$.\n\nFor the other points: $$(2, 3) \\rightarrow (1, 3)$$ and $$(3, 5) \\rightarrow (1.5, 5)$$.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "A function is defined as $$f(x) = \\frac{2x + 3}{x - 1}$$. Find (a) $$f^{-1}(x)$$ (b) the domain and range of $$f$$.", "answer": "- **(a) Find inverse:**\nLet $$y = \\frac{2x + 3}{x - 1}$$\nSwap $$x$$ and $$y$$: $$x = \\frac{2y + 3}{y - 1}$$\nSolve for $$y$$:\n$$x(y - 1) = 2y + 3$$\n$$xy - x = 2y + 3$$\n$$xy - 2y = x + 3$$\n$$y(x - 2) = x + 3$$\n$$y = \\frac{x + 3}{x - 2}$$\nSo $$f^{-1}(x) = \\frac{x + 3}{x - 2}$$\n- **(b) Domain and range:**\n- Domain of $$f$$: All real $$x$$ except $$x = 1$$ (vertical asymptote).\n- Range of $$f$$: All real $$y$$ except $$y = 2$$ (horizontal asymptote).\n- This also means: Domain of $$f^{-1}$$ is $$x \\neq 2$$; Range of $$f^{-1}$$ is $$y \\neq 3$$.", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}], "count": 59}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "What does the discriminant $\\Delta = b^2 - 4ac$ tell you about the roots of $ax^2 + bx + c = 0$? (3 cases)", "answer": "- Step 1: $\\Delta > 0$: Two distinct real roots (curve crosses x-axis at two points)\n- Step 2: $\\Delta = 0$: One repeated real root (curve touches x-axis — tangent)\n- Step 3: $\\Delta < 0$: No real roots (curve never crosses x-axis)\n\n**Key takeaway:** The discriminant determines how many times a quadratic intersects the x-axis. This connects to curve intersections — \"meets at a single point\" means $\\Delta = 0$.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "The curves $y = x^2 + kx - 9$ and $y = -3x^2 - 5x + k$ meet at exactly one point. Set up the discriminant condition and find k. (3 steps)", "answer": "- Step 1: Equate the y-expressions: $x^2 + kx - 9 = -3x^2 - 5x + k$\n- Step 2: Rearrange to standard quadratic form: $4x^2 + (k+5)x - (9+k) = 0$\n- Step 3: \"Single point\" = tangent = repeated root = discriminant equals zero\n+ $\\Delta = (k+5)^2 - 4(4)(-(9+k)) = k^2 + 10k + 25 + 144 + 16k = k^2 + 26k + 169 = 0$\n+ This factorises as $(k+13)^2 = 0$, so $k = -13$\n\n**Misconception probe:** Why can't we just say \"one solution\" means one x-value? Because one x-value can come from a repeated root (tangent) or from solving simultaneous equations where the quadratic degenerates. The discriminant captures this precisely.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": true}, {"question": "Find the equation of the tangent line to $y = 2x^2 + 8x + 3$ that is parallel to $y = 4x + c$. (4 steps)", "answer": "- Step 1: Differentiate the curve: $\\frac{dy}{dx} = 4x + 8$\n- Step 2: For parallel lines, gradients must be equal. The line $y = 4x + c$ has gradient 4 (the coefficient of x), NOT $4x+c$.\n+ Set $4x + 8 = 4 \\Rightarrow x = -1$\n- Step 3: Find y-coordinate on the curve at $x = -1$: $y = 2(1) + 8(-1) + 3 = 2 - 8 + 3 = -3$\n- Step 4: Use point-slope form with point $(-1, -3)$ and gradient 4: $y - (-3) = 4(x - (-1))$\n+ $y + 3 = 4x + 4 \\Rightarrow y = 4x + 1$, so $c = 1$\n\n**Common error:** Students sometimes try to equate $4x + 8$ to the entire line equation $4x + c$, which is dimensionally wrong. $\\frac{dy}{dx}$ gives a number (gradient) at a specific point, not an equation.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": true}, {"question": "For $y = f(x)$ where do you find the gradient of the tangent line? Is it $f'(x)$ or the full equation? Explain with an example. (conceptual)", "answer": "- Step 1: $f'(x)$ gives the gradient (slope) of the tangent at a particular x-value — it's a number, not an equation.\n- Step 2: The tangent line equation itself is $y - y_1 = f'(x_1)(x - x_1)$, where $(x_1, y_1)$ is the point of tangency.\n- Step 3: For the curve $y = x^2$ at the point $(3, 9)$: $f'(x) = 2x$, so at $x = 3$, gradient = 6. The tangent line is $y - 9 = 6(x - 3)$.\n\n**Key insight:** $f'(a) = m$ where m is the scalar gradient. The full line equation is $y = mx + c$. Never confuse the derivative (a number) with the line equation (a relationship between x and y).", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "The region R is defined by $y < x + 2$ AND $y > x^2 - x$. Describe how to find this region graphically and state the three boundaries. (3 steps)", "answer": "- Step 1: For each inequality, identify the boundary curve/line and which side to shade.\n+ $y < x + 2$: boundary is the line $y = x + 2$; since it's \"less than\", shade BELOW the line\n+ $y > x^2 - x$: boundary is the parabola; since it's \"greater than\", shade ABOVE the curve\n- Step 2: Sketch both boundaries and shade each region\n- Step 3: The solution is the OVERLAP (intersection) of both shaded regions — the \"lens-shaped\" region between the line (as ceiling) and parabola (as floor)\n\n**Key concept:** For inequalities with curves, \"less than\" = below, \"greater than\" = above. The solution to a system is always the intersection of individual regions.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": true}, {"question": "A region is bounded by the x-axis, the line $y = 5x + 75$, and the curve $y = 2x^2 + x - 21$. Write FOUR inequalities that define this region. (4 steps)", "answer": "- Step 1: Identify each boundary and determine the inequality direction by testing a point inside the region.\n+ Above x-axis: test $(0, 1)$. $1 > 0$ ✓. So $y \\geq 0$\n+ Below line: test $(0, 0)$. $0 < 75$ ✓. So $y \\leq 5x + 75$\n+ Above curve: test $(0, 0)$. $0 > -21$ ✓. So $y \\geq 2x^2 + x - 21$\n- Step 2: The fourth boundary comes from the intersection points of line and curve (given as $x = -6$ and $x = 8$ in the question)\n- Step 3: Four inequalities: $y \\geq 0$, $y \\leq 5x + 75$, $y \\geq 2x^2 + x - 21$, and $-6 \\leq x \\leq 8$\n\n**Misconception probe:** Why do we need to check with a sample point? Because it's easy to confuse $\\leq$ with $\\geq$ when curves open in different directions. The sample point method never fails.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "In a triangle with sides 4cm, 6cm, and 9cm, find (a) the angle opposite the longest side using cosine rule, (b) identify whether it's acute or obtuse, (c) find the area of the major sector with radius 4cm. (3 steps)", "answer": "- Step 1: Cosine rule: $a^2 = b^2 + c^2 - 2bc\\cos A$. Let $a = 9$ (opposite angle to find), $b = 4$, $c = 6$:\n+ $81 = 16 + 36 - 2(4)(6)\\cos A$\n+ $81 = 52 - 48\\cos A \\Rightarrow \\cos A = \\frac{-29}{48}$\n- Step 2: $\\cos A$ is negative $\\Rightarrow$ angle is obtuse (> 90°). $A = \\cos^{-1}(-29/48) \\approx 2.22$ radians\n- Step 3: Major sector uses the larger angle: $\\theta_{major} = 2\\pi - \\alpha \\approx 4.063$ radians\n+ Area = $\\frac{1}{2}r^2\\theta = \\frac{1}{2}(16)(4.063) \\approx 32.5$ cm²\n\n**Key insight:** When using cosine rule, negative cosine ALWAYS means obtuse angle. The major sector is the one with angle > π radians.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "State the cosine rule, sine rule, and the area formula $\\frac{1}{2}ab\\sin C$. When would you use each? (3 formulas)", "answer": "- Cosine Rule: $a^2 = b^2 + c^2 - 2bc\\cos A$\n+ Use when: (1) given two sides and included angle → find third side, OR (2) given all three sides → find an angle\n- Sine Rule: $\\frac{a}{\\sin A} = \\frac{b}{\\sin B} = \\frac{c}{\\sin C}$\n+ Use when: given two angles and one side (AAS/ASA), or two sides and a non-included angle (SSA — beware ambiguous case)\n- Area formula: $Area = \\frac{1}{2}ab\\sin C$\n+ Use when: given two sides and the included angle (SAS)\n\n**Common error:** Students forget which rule applies where. Cosine rule is universal for sides; sine rule needs angle-side pairs. The area formula is just the cosine rule rearranged.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": true}, {"question": "Find $\\int(10x^4 - \\frac{3}{2x^3} - 7)dx$. Show the key step of rewriting before integrating. (3 steps)", "answer": "- Step 1: CRITICAL — rewrite any term with x in the denominator as a negative power:\n+ $\\frac{3}{2x^3} = \\frac{3}{2}x^{-3}$\n- Step 2: Integrate each term using $\\int x^n dx = \\frac{x^{n+1}}{n+1} + C$:\n+ $\\int 10x^4 dx = 10 \\cdot \\frac{x^5}{5} = 2x^5$\n+ $\\int -\\frac{3}{2}x^{-3} dx = -\\frac{3}{2} \\cdot \\frac{x^{-2}}{-2} = \\frac{3}{4}x^{-2} = \\frac{3}{4x^2}$\n+ $\\int -7 dx = -7x$\n- Step 3: Combine: $2x^5 + \\frac{3}{4x^2} - 7x + C$\n\n**Key insight:** Never integrate $\\frac{1}{x^n}$ directly. Always convert to $x^{-n}$ first, then apply the power rule.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": true}, {"question": "Given $m = 2^n$, express in terms of m: (a) $2^{n+3}$, (b) $16^{3n}$. (2 parts)", "answer": "- Part (a): Use $2^{n+3} = 2^n \\cdot 2^3 = 8 \\cdot 2^n = 8m$\n- Part (b): First convert base 16 to base 2: $16 = 2^4$\n+ $16^{3n} = (2^4)^{3n} = 2^{12n}$\n+ Since $2^n = m$, then $2^{12n} = (2^n)^{12} = m^{12}$\n\n**Key technique:** When in doubt, rewrite bases in terms of the given variable. $8 = 2^3$, $16 = 2^4$, $4 = 2^2$.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Solve $x\\sqrt{3} - 3 = x + \\sqrt{3}$ for x in the form $p + q\\sqrt{3}$ using rationalisation. (4 steps)", "answer": "- Step 1: Collect x-terms: $x\\sqrt{3} - x = 3 + \\sqrt{3} \\Rightarrow x(\\sqrt{3} - 1) = 3 + \\sqrt{3}$\n- Step 2: Solve for x: $x = \\frac{3 + \\sqrt{3}}{\\sqrt{3} - 1}$\n- Step 3: Rationalise — multiply numerator and denominator by the conjugate $(\\sqrt{3} + 1)$:\n+ $x = \\frac{(3 + \\sqrt{3})(\\sqrt{3} + 1)}{(\\sqrt{3} - 1)(\\sqrt{3} + 1)}$\n- Step 4: Simplify: Numerator = $3\\sqrt{3} + 3 + 3 + \\sqrt{3} = 6 + 4\\sqrt{3}$; Denominator = $3 - 1 = 2$\n+ $x = \\frac{6 + 4\\sqrt{3}}{2} = 3 + 2\\sqrt{3}$\n\nSo $p = 3, q = 2$.\n\n**Key insight:** Rationalising eliminates the surd from the denominator. The conjugate of $(a - b\\sqrt{c})$ is $(a + b\\sqrt{c})$.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A curve y = f(x) passes through (-1, 0), (0, 2), and touches the x-axis at (3, 0). Find the transformed coordinates for (a) y = f(x + 3), (b) y = f(-3x). (2 parts)", "answer": "- Part (a): $y = f(x + 3)$ shifts the graph LEFT by 3 (opposite sign of what's inside).\n+ Replace x with x - 3 in original coordinates:\n+ $(-1, 0) \\rightarrow (-4, 0)$; $(0, 2) \\rightarrow (-3, 2)$; $(3, 0)$ (touch) $\\rightarrow (0, 0)$ still touches\n- Part (b): $y = f(-3x)$ involves reflection in y-axis AND horizontal compression by factor of 1/3.\n+ Replace x with x/(-3) = -x/3, or equivalently divide each x-coordinate by -3:\n+ $(-1, 0) \\rightarrow (1/3, 0)$; $(0, 2) \\rightarrow (0, 2)$ unchanged; $(3, 0) \\rightarrow (-1, 0)$\n\n**Transformation rule:** Inside $f()$ affects x (reverse direction: $f(x+a)$ shifts left by a). Outside affects y. For $f(ax)$, divide x-coordinates by $a$.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Complete the transformation table: what does each transformation do to the graph y = f(x)? (6 transformations)", "answer": "| Transformation | Effect | Direction |\n|---|---|---|\n| $f(x) + a$ | Shift UP by a | Vertical (intuitive) |\n| $f(x + a)$ | Shift LEFT by a | Horizontal (reversed!) |\n| $a \\cdot f(x)$ | Vertical stretch by scale factor a | Vertical |\n| $f(a \\cdot x)$ | Horizontal compression by 1/a | Horizontal |\n| $-f(x)$ | Reflect in x-axis | Vertical |\n| $f(-x)$ | Reflect in y-axis | Horizontal |\n\n**Memory trick:** Inside $f()$ does horizontal things, but with REVERSED intuition ($x + 3$ means shift LEFT). Outside $f()$ does vertical things with normal intuition (plus 3 means shift UP).", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "What is the discriminant condition for the curves $y = x(4 - x^2)$ and $y = \\frac{A}{x}$ to intersect at exactly 4 distinct points? The equation reduces to $x^4 - 4x^2 + A = 0$. (3 conditions)", "answer": "- Step 1: Substitute $y = x^2$ (so $y \\geq 0$): $x^4 - 4x^2 + A = 0$ becomes $y^2 - 4y + A = 0$\n- Step 2: For 4 distinct x-values, we need 2 distinct positive y-values (each positive y gives $\\pm\\sqrt{y}$)\n- Step 3: Three conditions:\n+ (i) Discriminant > 0: $16 - 4A > 0 \\Rightarrow A < 4$\n+ (ii) Product of roots > 0: $A > 0$ (both roots must have same sign, and sum = 4 > 0)\n+ (iii) Each root > 0: This is guaranteed by (ii) and sum = 4 > 0\n\n**Key insight:** Just having $\\Delta > 0$ is NOT enough! The roots must also be positive. A could be negative, giving two real roots but both negative (no real x-solutions).", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A line $l_2$ passes through A(4, 2) and is parallel to the x-axis. A point C on $l_2$ is 5√5 units from B(15, 7). Find the possible coordinates of C. (3 steps)", "answer": "- Step 1: Parallel to x-axis through (4, 2) $\\Rightarrow$ the y-coordinate is constant: $l_2$ is $y = 2$. So $C = (x, 2)$\n- Step 2: Use distance formula: $BC = \\sqrt{(15-x)^2 + (7-2)^2} = 5\\sqrt{5}$\n- Step 3: Square both sides: $(15-x)^2 + 25 = 125 \\Rightarrow (15-x)^2 = 100$\n+ $15 - x = \\pm 10$\n+ If $15 - x = 10$: $x = 5 \\Rightarrow C = (5, 2)$\n+ If $15 - x = -10$: $x = 25 \\Rightarrow C = (25, 2)$\n\n**Key insight:** \"Parallel to x-axis through (a, b)\" always means $y = b$. The y-coordinate never changes. Similarly, parallel to y-axis means $x = a$.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "For $y = 12\\sin(x + B)$ where B > 0, the minimum point with smallest positive x is at $(\\pi/4, A)$. Find (a) the value of A, (b) the smallest positive B. (2 parts)", "answer": "- Part (a): At a minimum, sine achieves its minimum value of -1. So $A = 12 \\times (-1) = -12$\n- Part (b): $\\sin \\theta = -1$ when $\\theta = \\frac{3\\pi}{2} + 2n\\pi$ (or $-\\frac{\\pi}{2} + 2n\\pi$)\n+ At the minimum point: $x + B = \\frac{3\\pi}{2} + 2n\\pi$\n+ With $x = \\frac{\\pi}{4}$: $\\frac{\\pi}{4} + B = \\frac{3\\pi}{2} + 2n\\pi$\n+ $B = \\frac{3\\pi}{2} - \\frac{\\pi}{4} + 2n\\pi = \\frac{6\\pi - \\pi}{4} + 2n\\pi = \\frac{5\\pi}{4} + 2n\\pi$\n+ Smallest positive B: take $n = 0$, so $B = \\frac{5\\pi}{4}$\n\n**Key facts to memorise:** $\\sin = -1$ (minimum) at $3\\pi/2 + 2n\\pi$; $\\sin = 1$ (maximum) at $\\pi/2 + 2n\\pi$.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "In triangle ABC, AB = 15cm, AC = 25cm, and area = 100 cm². (a) Find $\\sin \\theta$ where $\\theta$ is angle BAC. (b) Given $\\theta > 90°$, find BC. (2 steps)", "answer": "- Part (a): Use area formula: $Area = \\frac{1}{2}ab\\sin C$\n+ $100 = \\frac{1}{2} \\times 15 \\times 25 \\times \\sin\\theta$\n+ $100 = 187.5 \\sin\\theta \\Rightarrow \\sin\\theta = \\frac{8}{15}$\n- Part (b): First find $\\cos\\theta$ using $\\sin^2\\theta + \\cos^2\\theta = 1$:\n+ $\\cos^2\\theta = 1 - \\frac{64}{225} = \\frac{161}{225}$\n+ Since $\\theta > 90°$ (obtuse), $\\cos\\theta < 0$: $\\cos\\theta = -\\frac{\\sqrt{161}}{15}$\n+ Apply cosine rule: $BC^2 = 15^2 + 25^2 - 2(15)(25)\\cos\\theta$\n+ $BC^2 = 225 + 625 - 2(15)(25)(-\\frac{\\sqrt{161}}{15}) = 850 + 50\\sqrt{161}$\n+ $BC \\approx 36.8$ cm\n\n**Critical point:** When $\\theta > 90°$, cos is negative. This changes the sign in the cosine rule, making the side LONGER than it would be with an acute angle.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "By substituting $p = 2^x$, show that $2 \\cdot 4^x - 2^{x+3} = 17 \\cdot 2^{x-1} - 4$ becomes $4p^2 - 33p + 8 = 0$. (3 steps)", "answer": "- Step 1: Rewrite each term as a power of $2^x = p$:\n+ $2 \\cdot 4^x = 2 \\cdot (2^2)^x = 2 \\cdot (2^x)^2 = 2p^2$\n+ $2^{x+3} = 2^x \\cdot 2^3 = 8p$\n+ $17 \\cdot 2^{x-1} = 17 \\cdot 2^x \\cdot 2^{-1} = \\frac{17}{2}p$\n- Step 2: Substitute into the equation:\n+ $2p^2 - 8p = \\frac{17}{2}p - 4$\n- Step 3: Multiply by 2 to clear fractions:\n+ $4p^2 - 16p = 17p - 8$\n+ $4p^2 - 33p + 8 = 0$\n\n**Key technique:** When you see equations with the same base raised to different powers, substitute the base raised to x as p.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A platform consists of a major sector (outer) and minor sector (inner). Given arc CD = 9m on inner circle with angle 0.8 rad, and ratio DA:AO = 3:5, find the outer radius AO. (2 steps)", "answer": "- Step 1: Let $DA = 3x$, $AO = 5x$. Then the inner radius $DO = DA + AO = 3x + 5x = 8x$\n- Step 2: Arc length formula: $L = r\\theta$. For arc CD on inner circle:\n+ $8x \\times 0.8 = 9 \\Rightarrow 6.4x = 9 \\Rightarrow x = \\frac{9}{6.4} = 1.40625$\n+ $AO = 5x = 5(1.40625) \\approx 7.03$ m\n\n**Key insight:** When given a ratio and one dimension, use a variable x. The ratio tells you the proportion, not the absolute values.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A curve has $f'(x) = 4x^{3/2} + \\frac{k}{x^2}$. Given that $f''(2) = 0$ at point P(2, 8√2), find (a) the value of k, (b) the full equation f(x). (4 steps)", "answer": "- Part (a): First find f''(x) by differentiating f'(x):\n+ $f'(x) = 4x^{3/2} + kx^{-2}$\n+ $f''(x) = 4 \\cdot \\frac{3}{2}x^{1/2} + (-2)kx^{-3} = 6x^{1/2} - 2kx^{-3}$\n+ At $x = 2$: $f''(2) = 6\\sqrt{2} - \\frac{2k}{8} = 6\\sqrt{2} - \\frac{k}{4} = 0$\n+ $6\\sqrt{2} = \\frac{k}{4} \\Rightarrow k = 24\\sqrt{2}$\n- Part (b): Integrate f'(x) with this k:\n+ $f(x) = \\int (4x^{3/2} + 24\\sqrt{2}x^{-2}) dx$\n+ $f(x) = 4 \\cdot \\frac{x^{5/2}}{5/2} + 24\\sqrt{2} \\cdot \\frac{x^{-1}}{-1} + C = \\frac{8}{5}x^{5/2} - \\frac{24\\sqrt{2}}{x} + C$\n+ Use point P(2, 8√2): $8\\sqrt{2} = \\frac{8}{5}(2^{5/2}) - \\frac{24\\sqrt{2}}{2} + C$\n+ $2^{5/2} = 4\\sqrt{2}$, so: $8\\sqrt{2} = \\frac{32\\sqrt{2}}{5} - 12\\sqrt{2} + C$\n+ $C = 8\\sqrt{2} + 12\\sqrt{2} - \\frac{32\\sqrt{2}}{5} = \\frac{68\\sqrt{2}}{5}$\n\n**Common trap:** Integrating gives a constant C. You need TWO conditions to find both k AND C. Use the extra condition on f'' (or similar) to find k FIRST, THEN integrate and use the point to find C.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": true}, {"question": "Express in the form $kx^n$: (a) $\\sqrt{\\frac{x^2}{64}}$, (b) $\\frac{16}{(16/\\sqrt{x})^3}$, (c) $(\\frac{ab^3}{2})^{-4/3}$ given $a = x^2/64, b = 16/\\sqrt{x}$. (3 parts)", "answer": "- Part (a): $\\sqrt{x^2/64} = \\sqrt{x^2}/\\sqrt{64} = \\frac{|x|}{8}$. For $x > 0$, this is $\\frac{1}{8}x$. So $k = \\frac{1}{8}, n = 1$\n- Part (b): First rewrite $b = 16x^{-1/2}$. Then $b^3 = 16^3 \\cdot x^{-3/2} = 4096x^{-3/2}$\n+ $\\frac{16}{b^3} = \\frac{16}{4096x^{-3/2}} = \\frac{1}{256}x^{3/2}$\n+ So $k = \\frac{1}{256}, n = \\frac{3}{2}$\n- Part (c): First find $ab^3$: $a \\cdot b^3 = \\frac{x^2}{64} \\cdot 4096x^{-3/2} = 64x^{1/2}$\n+ $(\\frac{ab^3}{2})^{-4/3} = (32x^{-1/2})^{4/3}$ (after the negative flip)\n+ $32^{4/3} = (32^{1/3})^4 = 2^4 = 16$; $x^{-1/2 \\cdot 4/3} = x^{-2/3}$\n+ Result: $16x^{-2/3}$\n\n**Key rule:** When cubing something like $(16x^{-1/2})^3$, EVERY factor gets the exponent: $16^3 \\cdot (x^{-1/2})^3 = 4096x^{-3/2}$.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "The curves $y = \\frac{1}{x+2}$ and $y = x(x+2)^2$ are sketched. How many real solutions does $(x+2)(x^3 + 4x^2 + 4x) = 1$ have? Explain using the graph. (3 steps)", "answer": "- Step 1: Rewrite: $(x+2) \\cdot x(x+2)^2 = 1 \\Rightarrow x(x+2)^2 = \\frac{1}{x+2}$\n- Step 2: This is the intersection of $y = x(x+2)^2$ (cubic) and $y = \\frac{1}{x+2}$ (hyperbola with vertical asymptote at $x = -2$)\n- Step 3: From the sketch: the cubic touches the x-axis at $x = -2$ (double root), crosses at $x = 0$; the hyperbola approaches $y = 0$ as $x \\to \\pm\\infty$\n+ Right of $x = -2$: curves cross once\n+ Left of $x = -2$: curves cross once\n\n**Answer: 2 real solutions**\n\n**Key insight:** When a question says \"hence\" after providing a sketch, you should interpret graphically — no algebraic solving needed!", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": true}, {"question": "Two curves $C_1: xy = \\frac{15}{2} + 5x$ and $C_2: y = x^3 - \\frac{7}{2}x + 5$ meet. Show they satisfy $2x^4 - 7x^2 - 15 = 0$. (3 steps)", "answer": "- Step 1: Rewrite $C_1$ as $y = \\frac{15}{2x} + 5$\n- Step 2: Equate y-values: $\\frac{15}{2x} + 5 = x^3 - \\frac{7}{2}x + 5$\n- Step 3: Notice the +5 cancels! $\\frac{15}{2x} = x^3 - \\frac{7}{2}x$\n+ Multiply both sides by $2x$ (valid since $x \\neq 0$): $15 = 2x^4 - 7x^2$\n+ Rearrange: $2x^4 - 7x^2 - 15 = 0$\n\n**Watch for:** Terms that cancel immediately. Also note the domain restriction $x \\neq 0$ (from the denominator).", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "Complete the square for $f(x) = 2x^2 - 12x + 14$ in the form $a(x+b)^2 + c$, and find the coordinates of the minimum point. (2 steps)", "answer": "- Step 1: Factor out the coefficient of $x^2$ first: $2(x^2 - 6x) + 14$\n+ Complete square inside: $x^2 - 6x = (x - 3)^2 - 9$\n+ So $2[(x-3)^2 - 9] + 14 = 2(x-3)^2 - 18 + 14 = 2(x-3)^2 - 4$\n- Step 2: In the form $a(x+b)^2 + c$: $a = 2$, $b = -3$ (note the sign!), $c = -4$\n+ Minimum occurs at $x = -b = 3$, with value $c = -4$\n+ Minimum point: $(3, -4)$\n\n**Formula:** For $ax^2 + bx + c$, complete as $a(x + \\frac{b}{2a})^2 + c - \\frac{b^2}{4a}$. Note the sign change!", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A region R is bounded by the x-axis, the line through (-1, 28) and (3, -4), the y-axis, and the curve $y = 2x^2 - 12x + 14$. Write four inequalities defining R. (4 steps)", "answer": "- Step 1: The line through (-1, 28) and (3, -4): gradient = $\\frac{-4-28}{3+1} = -8$, equation: $y = -8x + 20$\n- Step 2: Determine each inequality by testing a point in the region (e.g., x = 1, y = 0):\n+ Above x-axis: test (1, 0). $0 \\geq 0$ ✓ → $y \\geq 0$\n+ Below line: test (1, 0). $0 \\leq -8 + 20 = 12$ ✓ → $y \\leq -8x + 20$\n+ Right of y-axis: $x \\geq 0$\n+ Below curve: test (1, 0). $0 \\leq 2 - 12 + 14 = 4$ ✓ → $y \\leq 2x^2 - 12x + 14$\n- Step 3: Four inequalities: $y \\geq 0$, $y \\leq -8x + 20$, $x \\geq 0$, $y \\leq 2x^2 - 12x + 14$\n\n**Method:** Always test a point inside the region to determine the correct inequality direction.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "A garden consists of triangle ABE, sector BDE, and right triangle BCD. Given AB = 10.8m, BE = 6m, angle ABE = 0.27 rad, radius BD = 6m, angle EBD = 1.3 rad, angle BCD = 90°. Find the total area. (4 steps)", "answer": "- Step 1: Area of sector BDE: $A = \\frac{1}{2}r^2\\theta = \\frac{1}{2}(6^2)(1.3) = 23.4$ m²\n- Step 2: Area of triangle ABE (SAS): $A = \\frac{1}{2}ab\\sin C = \\frac{1}{2}(10.8)(6)\\sin(0.27) \\approx 8.64$ m²\n- Step 3: Area of triangle BCD (right-angled):\n+ BC = $6\\cos(1.3) \\approx 1.606$ m\n+ CD = $6\\sin(1.3) \\approx 5.780$ m\n+ Area = $\\frac{1}{2} \\times BC \\times CD \\approx \\frac{1}{2}(1.606)(5.780) \\approx 4.64$ m²\n- Step 4: Total area ≈ $8.64 + 23.4 + 4.64 \\approx 36.7$ m² (3 s.f.)\n\n**Key formulas:** Sector area = $\\frac{1}{2}r^2\\theta$ (θ in radians). Right triangle: adjacent = $h\\cos\\theta$, opposite = $h\\sin\\theta$.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "What are the radian equivalents of common angles and the formulas for arc length and sector area? (3 formulas + conversions)", "answer": "- Conversions: $2\\pi$ rad = 360°, $\\pi$ rad = 180°, $1$ rad = $180/\\pi$ degrees\n+ $30° = \\pi/6$, $45° = \\pi/4$, $60° = \\pi/3$, $90° = \\pi/2$\n- Arc length: $L = r\\theta$ (θ in radians)\n- Sector area: $A = \\frac{1}{2}r^2\\theta$\n- Segment area: $A = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$\n- Major angle = $2\\pi$ - minor angle\n\n**Common error:** Using degree formulas with radian values (or vice versa). Always check your calculator mode!", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": true}, {"question": "For $f(x) = 2x^3 - kx^2 + 14x + 24$, the curves $y = f'(x)$ and $y = f''(x)$ intersect at point A with x-coordinate 5. Find k and the other intersection point B. (3 steps)", "answer": "- Step 1: Find derivatives: $f'(x) = 6x^2 - 2kx + 14$, $f''(x) = 12x - 2k$\n- Step 2: At intersection point A, both equal, so at x = 5:\n+ $f'(5) = f''(5)$\n+ $6(25) - 2k(5) + 14 = 12(5) - 2k$\n+ $164 - 10k = 60 - 2k \\Rightarrow 8k = 104 \\Rightarrow k = 13$\n- Step 3: With k = 13, set f'(x) = f''(x) to find other intersection:\n+ $6x^2 - 26x + 14 = 12x - 26$\n+ $6x^2 - 38x + 40 = 0 \\Rightarrow 3x^2 - 19x + 20 = 0$\n+ $(3x - 4)(x - 5) = 0 \\Rightarrow x = 5$ (point A) or $x = 4/3$ (point B)\n+ At x = 4/3: y = $12(4/3) - 26 = 16 - 26 = -10$\n+ Point B = $(4/3, -10)$\n\n**Key insight:** When curves intersect, their x-coordinates satisfy the equation formed by setting them equal. If you know one intersection (like x = 5), factor it out to find the other.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "The curves $C_1: xy = \\frac{15}{2} + 5x$ and $C_2: y = x^3 - \\frac{7}{2}x + 5$ meet at P and Q. Given they satisfy $2x^4 - 7x^2 - 15 = 0$, find the exact distance PQ. (4 steps)", "answer": "- Step 1: Let $u = x^2$. Then $2u^2 - 7u - 15 = 0$\n- Step 2: Factor: $(2u + 3)(u - 5) = 0 \\Rightarrow u = 5$ or $u = -3/2$\n+ Since $u = x^2 \\geq 0$, reject $u = -3/2$\n+ $x^2 = 5 \\Rightarrow x = \\pm\\sqrt{5}$\n- Step 3: Find y-coordinates:\n+ For $x = \\sqrt{5}$: $y = \\frac{15}{2\\sqrt{5}} + 5 = \\frac{3\\sqrt{5}}{2} + 5$\n+ For $x = -\\sqrt{5}$: $y = \\frac{15}{-2\\sqrt{5}} + 5 = -\\frac{3\\sqrt{5}}{2} + 5$\n- Step 4: Distance PQ = $\\sqrt{(\\sqrt{5} - (-\\sqrt{5}))^2 + (\\frac{3\\sqrt{5}}{2} + 5 - (-\\frac{3\\sqrt{5}}{2} + 5))^2}$\n+ = $\\sqrt{(2\\sqrt{5})^2 + (3\\sqrt{5})^2} = \\sqrt{20 + 45} = \\sqrt{65}$\n\n**Key technique:** Biquadratic equations ($ax^4 + bx^2 + c = 0$) are solved by substituting $u = x^2$.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": true}, {"question": "What do these exam command words mean? (a) \"Hence\", (b) \"Show that\", (c) \"Exact value\", (d) \"State\" (4 definitions)", "answer": "- (a) \"Hence\" → USE your answer from the previous part. There's a mathematical link.\n- (b) \"Show that\" → Your working must lead clearly to the stated result. Don't just state it.\n- (c) \"Exact value\" → Give answer as a surd or fraction, NOT a decimal.\n- (d) \"State\" → No working required, just write the answer.\n\n**Other command words:** \"Find\" → some working needed. \"Calculate\" → numerical work. \"Explain\" → words required, not just algebra.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "The line $y = 4x + c$ is a tangent to $y = 2x^2 + 8x + 3$. Mr Fuat says derivative equals gradient (not the equation). Explain why this is the key insight and where students commonly confuse. (conceptual)", "answer": "- Step 1: The derivative $\\frac{dy}{dx}$ gives the SLOPE (gradient) of the curve at a specific point. It's a NUMBER, not an equation.\n- Step 2: For a line $y = mx + c$, the gradient is simply $m$ (the coefficient of x). It's NOT $mx + c$.\n- Step 3: Common confusion: Students set $4x + 8 = 4x + c$, trying to equate the whole expressions. But $\\frac{dy}{dx}$ at the tangent point equals the GRADIENT of the tangent line (which is 4), not the whole line equation.\n\n**Visualisation:** At the tangent point, the curve and line have the same steepness. The steepness is a single number (the gradient), not the entire line equation.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A student solves $x^4 - 4x^2 + A = 0$ for 4 distinct intersections and gets A < 4 from discriminant. Why is this answer incomplete? What else is needed? (2 conditions)", "answer": "- The discriminant condition $\\Delta > 0$ gives two distinct real roots for $x^2$.\n- BUT: For 4 distinct x-values, we need TWO distinct POSITIVE x² values.\n- Why? Because $x^2 = y$ gives $x = \\pm\\sqrt{y}$. If y is negative, there are no real x. If y = 0, we only get one x (not two).\n- Additional condition: Product of roots = $A > 0$ (ensures both roots have same sign)\n- Combined: $0 < A < 4$\n\n**Misconception:** Many students stop at \"discriminant > 0\" without checking the sign constraints. Always consider what the substitution actually represents ($x^2 \\geq 0$).", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "When integrating $\\int(10x^4 - \\frac{3}{2x^3} - 7)dx$, a student writes $\\int 10x^4 dx = 2x^5$, but writes $\\int \\frac{3}{2x^3} dx = \\frac{3}{2} \\cdot \\frac{x^{-2}}{-2}$. What's wrong and what's the correct approach? (conceptual)", "answer": "- Step 1: The error is in the negative power rule. When integrating $x^{-3}$, the power increases: $-3 + 1 = -2$.\n- Step 2: The correct approach: First rewrite $\\frac{3}{2x^3}$ as $\\frac{3}{2}x^{-3}$ (NOT $\\frac{3}{2} \\cdot x^{-3}$ with the coefficient inside)\n- Step 3: Then integrate: $\\int \\frac{3}{2}x^{-3} dx = \\frac{3}{2} \\cdot \\frac{x^{-2}}{-2} = -\\frac{3}{4}x^{-2} = -\\frac{3}{4x^2}$\n- Step 4: The complete answer: $2x^5 - \\frac{3}{4x^2} - 7x + C$\n\n**Key point:** The coefficient (3/2) stays outside the integration — only x gets the power change. The negative sign comes from the calculation, not from making it negative initially.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": true}, {"question": "Why is it critical to identify whether an angle is acute or obtuse when using the cosine rule? Demonstrate with an example. (conceptual)", "answer": "- Step 1: The cosine rule has a $-2bc\\cos A$ term. If angle A is acute, $\\cos A > 0$, so the term subtracts — making the side shorter.\n- Step 2: If angle A is obtuse (> 90°), $\\cos A < 0$, so the term ADDS — making the side LONGER than it would be with the same two sides and an acute angle.\n- Example: With sides 15 and 25, if angle = 60° (acute), $a^2 = 225 + 625 - 2(15)(25)(0.5) = 700$. If angle = 120° (obtuse), $a^2 = 225 + 625 - 2(15)(25)(-0.5) = 1000$.\n- The obtuse case gives a larger third side even though the other two sides are identical.\n\n**Critical test:** After finding sin from area, use $\\sin^2 + \\cos^2 = 1$ to find cos. Then choose the NEGATIVE sign if the angle is given as obtuse (> 90°).", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": true}, {"question": "For $y = A\\sin(Bx + C)$, state the formulas for: (a) period in radians, (b) period in degrees, (c) how to find maximum and minimum values. (3 facts)", "answer": "- (a) Period in radians: $\\frac{2\\pi}{|B|}$\n- (b) Period in degrees: $\\frac{360°}{|B|}$\n- (c) Maximum value = $|A|$ (when sine = 1); minimum value = $-|A|$ (when sine = -1)\n+ Maximum occurs when $Bx + C = \\frac{\\pi}{2} + 2n\\pi$\n+ Minimum occurs when $Bx + C = \\frac{3\\pi}{2} + 2n\\pi$ (or $-\\frac{\\pi}{2} + 2n\\pi$)\n\n**Note:** The sign of A affects whether the graph is above or below the x-axis, but the amplitude (maximum displacement from axis) is always $|A|$.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "Complete the square for $3x^2 + 12x + 7$ and hence write down the minimum value and where it occurs. (2 steps)", "answer": "- Step 1: Factor out 3: $3(x^2 + 4x) + 7$\n+ Complete square: $x^2 + 4x = (x + 2)^2 - 4$\n+ So: $3[(x+2)^2 - 4] + 7 = 3(x+2)^2 - 12 + 7 = 3(x+2)^2 - 5$\n- Step 2: Minimum occurs when $(x+2)^2 = 0$, i.e., at $x = -2$\n+ Minimum value = $-5$\n\n**Quick formula:** For $ax^2 + bx + c$, minimum/maximum value is $c - \\frac{b^2}{4a}$ (at $x = -\\frac{b}{2a}$). Here: $7 - \\frac{144}{12} = 7 - 12 = -5$ ✓", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "What is the \"two unknowns trap\" in integration problems involving a constant k, and how do you avoid it? (conceptual)", "answer": "- The trap: If you integrate $f'(x) = 4x^{3/2} + \\frac{k}{x^2}$ to find $f(x)$, you get $f(x) = \\frac{8}{5}x^{5/2} - \\frac{k}{x} + C$. Now you have TWO unknowns: $k$ AND $C$.\n- But you only have ONE point to use ($P(2, 8\\sqrt{2})$). You can't solve for both.\n- The solution: Use an EXTRA condition involving only k first. In this case, $f''(2) = 0$ gives $k = 24\\sqrt{2}$ immediately.\n- THEN integrate with k known, and use the point to find C.\n\n**Strategy:** Look for any condition that involves only k (or only C) — like $f''(a) = 0$, or a derivative equals something at a specific point. Use that FIRST.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A student says \"for $y = f(x+3)$, the graph shifts right by 3 because x gets bigger.\" Explain why this is wrong and the correct rule. (misconception)", "answer": "- This is the most common transformation error!\n- Inside the function ($f(x+a)$) works in REVERSE: $y = f(x+3)$ shifts the graph LEFT by 3, not right.\n- Why? Let the original point be $(x, y)$. For the transformed graph to produce the same y-value, we need $x+3$ to equal the original x. So new $x$ must be $x_{original} - 3$.\n- Outside the function ($f(x) + a$) works normally: $y = f(x) + 3$ shifts UP by 3.\n\n**Memory trick:** Think \"opposite\" for horizontal. Inside $f()$ = horizontal = opposite direction. Outside $f()$ = vertical = same direction.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": true}, {"question": "The curves $y = x^2 + kx - 9$ and $y = -3x^2 - 5x + k$ meet at exactly one point. Without solving fully, explain how you know to use the discriminant and what $\\Delta = 0$ represents geometrically. (conceptual)", "answer": "- Step 1: When you equate the two curves, you get a quadratic equation in x (after collecting terms).\n- Step 2: \"Exactly one point\" means this quadratic has exactly one solution — a repeated root.\n- Step 3: Geometrically, this means the curves touch each other (are tangent), rather than crossing.\n- Step 4: The discriminant $\\Delta = 0$ is the algebraic condition for a repeated root. So you set up the quadratic, compute its discriminant, and set it equal to zero.\n\n**Trigger words mapping:**\n- \"Meets at a single point\" → $\\Delta = 0$ (tangent)\n- \"Meets at two distinct points\" → $\\Delta > 0$ (crosses)\n- \"Does not meet\" → $\\Delta < 0$ (no intersection)", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "Find the coordinates of the stationary points of $y = 2x^3 - 3x^2 - 12x + 5$ and determine their nature using the second derivative test. (3 steps)", "answer": "- Step 1: Find first derivative: $y' = 6x^2 - 6x - 12 = 6(x^2 - x - 2) = 6(x-2)(x+1)$\n- Step 2: Set $y' = 0$: $x = 2$ or $x = -1$\n+ At $x = 2$: $y = 16 - 12 - 24 + 5 = -15$\n+ At $x = -1$: $y = -2 - 3 + 12 + 5 = 12$\n- Step 3: Second derivative: $y'' = 12x - 6$\n+ At $x = 2$: $y'' = 24 - 6 = 18 > 0$ → local minimum at (2, -15)\n+ At $x = -1$: $y'' = -12 - 6 = -18 < 0$ → local maximum at (-1, 12)\n\n**Second derivative test:** $f''(a) > 0$ = minimum (concave up); $f''(a) < 0$ = maximum (concave down); $f''(a) = 0$ = inconclusive (could be point of inflection).", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "A curve has equation $y = \\frac{1}{x-2}$. Write down (a) the equation of the normal at x = 3, (b) the equation of the tangent at x = 1. (2 parts)", "answer": "- First find $\\frac{dy}{dx}$: $y = (x-2)^{-1}$, so $\\frac{dy}{dx} = -1(x-2)^{-2} = -\\frac{1}{(x-2)^2}$\n- (a) At x = 3: point = (3, 1), gradient = $-\\frac{1}{(1)^2} = -1$\n+ Tangent: $y - 1 = -1(x - 3) \\Rightarrow y = -x + 4$\n+ Normal: perpendicular gradient = 1 (negative reciprocal of -1)\n+ Normal: $y - 1 = 1(x - 3) \\Rightarrow y = x - 2$\n- (b) At x = 1: point = (1, -1), gradient = $-\\frac{1}{(-1)^2} = -1$\n+ Tangent: $y + 1 = -1(x - 1) \\Rightarrow y = -x$\n\n**Key formula:** Normal gradient = $-\\frac{1}{\\text{tangent gradient}}$. Only valid when tangent gradient $\\neq 0$.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "Rationalise the denominator of $\\frac{3}{5 + 2\\sqrt{3}}$ and simplify to the form $p + q\\sqrt{3}$. (3 steps)", "answer": "- Step 1: Multiply numerator and denominator by the conjugate $(5 - 2\\sqrt{3})$:\n+ $\\frac{3}{5 + 2\\sqrt{3}} \\times \\frac{5 - 2\\sqrt{3}}{5 - 2\\sqrt{3}} = \\frac{3(5 - 2\\sqrt{3})}{25 - (2\\sqrt{3})^2}$\n- Step 2: Denominator: $25 - 4(3) = 25 - 12 = 13$\n- Step 3: Numerator: $15 - 6\\sqrt{3}$\n+ Final: $\\frac{15 - 6\\sqrt{3}}{13} = \\frac{15}{13} - \\frac{6}{13}\\sqrt{3}$\n\nSo $p = \\frac{15}{13}, q = -\\frac{6}{13}$\n\n**General rule:** For $\\frac{a}{b + c\\sqrt{d}}$, multiply by $b - c\\sqrt{d}$ to get rational denominator $b^2 - c^2d$.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "The line $y = mx + c$ passes through (1, 5) and is perpendicular to $2x + 3y = 12$. Find m and c. (3 steps)", "answer": "- Step 1: Find gradient of $2x + 3y = 12$:\n+ $3y = -2x + 12 \\Rightarrow y = -\\frac{2}{3}x + 4$\n+ Gradient $m_1 = -\\frac{2}{3}$\n- Step 2: Perpendicular lines: $m_1 \\cdot m_2 = -1$\n+ $-\\frac{2}{3} \\cdot m = -1 \\Rightarrow m = \\frac{3}{2}$\n- Step 3: Use point (1, 5) to find c:\n+ $5 = \\frac{3}{2}(1) + c \\Rightarrow c = 5 - \\frac{3}{2} = \\frac{7}{2}$\n\n**Alternative method:** The perpendicular line has equation $3x - 2y = k$. Since it passes through (1, 5): $3 - 10 = -7$, so $3x - 2y = -7 \\Rightarrow y = \\frac{3}{2}x + \\frac{7}{2}$ ✓", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "Sketch the graph of $y = \\sin x$ for $0 \\leq x \\leq 2\\pi$, marking the maximum, minimum, and x-intercepts. (visual concept)", "answer": "- At $x = 0$: $y = 0$\n- At $x = \\frac{\\pi}{2}$: $y = 1$ (maximum)\n- At $x = \\pi$: $y = 0$ (x-intercept)\n- At $x = \\frac{3\\pi}{2}$: $y = -1$ (minimum)\n- At $x = 2\\pi$: $y = 0$ (x-intercept, returns to start)\n\n**Key points to remember:** $\\sin x$ crosses at $0, \\pi, 2\\pi$; peaks at $\\pi/2$; troughs at $3\\pi/2$. Period = $2\\pi$ radians.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "Write down the exact solutions to $\\sin x = \\frac{1}{2}$ and $\\cos x = -\\frac{\\sqrt{3}}{2}$ in the range $0 \\leq x < 2\\pi$. (2 parts)", "answer": "- $\\sin x = \\frac{1}{2}$:\n+ Solutions in [0, 2π): $x = \\frac{\\pi}{6}$ and $x = \\frac{5\\pi}{6}$ (both have sine = 1/2)\n- $\\cos x = -\\frac{\\sqrt{3}}{2}$:\n+ Cosine is negative in QII and QIII\n+ Solutions in [0, 2π): $x = \\frac{5\\pi}{6}$ and $x = \\frac{7\\pi}{6}$\n\n**General solutions:** $\\sin x = \\sin \\alpha \\Rightarrow x = \\alpha + 2n\\pi$ or $x = \\pi - \\alpha + 2n\\pi$. $\\cos x = \\cos \\alpha \\Rightarrow x = \\pm \\alpha + 2n\\pi$.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "The gradient of the curve $y = x^3 - 3x$ at the point P is 0. Find the coordinates of P and determine its nature. (3 steps)", "answer": "- Step 1: Differentiate: $y' = 3x^2 - 3$\n- Step 2: Set gradient = 0: $3x^2 - 3 = 0 \\Rightarrow x^2 = 1 \\Rightarrow x = \\pm 1$\n+ At $x = 1$: $y = 1 - 3 = -2$. Point: (1, -2)\n+ At $x = -1$: $y = -1 + 3 = 2$. Point: (-1, 2)\n- Step 3: Second derivative: $y'' = 6x$\n+ At $x = 1$: $y'' = 6 > 0$ → local minimum at (1, -2)\n+ At $x = -1$: $y'' = -6 < 0$ → local maximum at (-1, 2)\n\n**Geometric insight:** For $y = x^3 - 3x$ (an S-shaped cubic), there's a \"hill\" (maximum) and a \"valley\" (minimum). The gradient is zero at both turning points.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "Find $\\int_1^4 (2x + \\frac{3}{x^2})dx$. (3 steps)", "answer": "- Step 1: Rewrite the fraction: $\\frac{3}{x^2} = 3x^{-2}$\n- Step 2: Integrate: $\\int (2x + 3x^{-2}) dx = \\frac{2x^2}{2} + \\frac{3x^{-1}}{-1} + C = x^2 - \\frac{3}{x} + C$\n- Step 3: Evaluate definite integral:\n+ At $x = 4$: $16 - \\frac{3}{4} = \\frac{64}{4} - \\frac{3}{4} = \\frac{61}{4}$\n+ At $x = 1$: $1 - 3 = -2$\n+ $\\int_1^4 = \\frac{61}{4} - (-2) = \\frac{61}{4} + 2 = \\frac{61}{4} + \\frac{8}{4} = \\frac{69}{4}$\n\n**Key reminder:** Don't forget to rewrite $1/x^n$ as $x^{-n}$ BEFORE integrating. The power rule requires the exponent to be visible.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "A curve passes through (2, 7) and has gradient function $\\frac{dy}{dx} = 3x^2 - 4x + 1$. Find the equation of the curve. (2 steps)", "answer": "- Step 1: Integrate to find y: $y = \\int (3x^2 - 4x + 1)dx = x^3 - 2x^2 + x + C$\n- Step 2: Use the point (2, 7) to find C:\n+ $7 = 2^3 - 2(2)^2 + 2 + C = 8 - 8 + 2 + C = 2 + C$\n+ $C = 5$\n- Equation: $y = x^3 - 2x^2 + x + 5$\n\n**Key point:** Always find the constant of integration C. Without it, you only have a family of curves. Use a given point to determine which specific curve you need.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "Find the area of the region bounded by $y = x^2$, the x-axis, and $x = 2$. (3 steps)", "answer": "- Step 1: The region is between the parabola $y = x^2$ and the x-axis (y = 0), from x = 0 to x = 2\n- Step 2: Set up the integral: $\\int_0^2 x^2 dx$\n- Step 3: Evaluate: $\\int x^2 dx = \\frac{x^3}{3}$, so $\\left[\\frac{x^3}{3}\\right]_0^2 = \\frac{8}{3} - 0 = \\frac{8}{3}$ square units\n\n**Geometric check:** This is the area under $y = x^2$ from 0 to 2. The area is slightly more than a triangle with base 2 and height 4 (area = 4), but less than rectangle 2 × 4 = 8. $\\frac{8}{3} ≈ 2.67$ fits.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}], "count": 49}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "When solving $$21x^2 + 10x + 1 = 0$$ by factorisation, what is the systematic \"split the middle term\" approach? (4 steps)", "answer": "- Step 1: Identify the product $$ac = 21 \\times 1 = 21$$ and the sum $$b = 10$$.\n- Step 2: Find two numbers that multiply to $$21$$ and add to $$10$$. These are $$7$$ and $$3$$ (since $$7 \\times 3 = 21$$ and $$7 + 3 = 10$$).\n- Step 3: Split the middle term using those numbers: $$21x^2 + 7x + 3x + 1$$.\n- Step 4: Factor by grouping: $$7x(3x+1) + 1(3x+1) = (7x+1)(3x+1)$$.\n\nThe key insight: whenever leading coefficient isn't 1, the \"ac method\" converts the problem into the classic \"find two numbers\" problem you already know.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "State the quadratic formula from memory, and explain why it must be memorised rather than looked up.", "answer": "The formula is $$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$ for $$ax^2 + bx + c = 0$$.\n\nIt must be memorised because it is NOT included in the Edexcel IAL formula booklet. The examiner expects automatic recall — it's a core skill, not a \"look-it-up\" fact. Understanding why it works (derived from completing the square) helps cement the memory: you're essentially solving $$a\\left(x + \\frac{b}{2a}\\right)^2 = \\frac{b^2 - 4ac}{4a}$$ for $$x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "What does each sign of the discriminant $$\\Delta = b^2 - 4ac$$ tell you about the roots of a quadratic? (3 steps)", "answer": "- Step 1: $$\\Delta > 0$$ means the expression under the square root is positive, so $$\\pm\\sqrt{\\Delta}$$ gives two different real values → **two distinct real roots**.\n- Step 2: $$\\Delta = 0$$ means $$\\pm\\sqrt{0} = 0$$, so the $$\\pm$$ collapses → **one repeated root** (a \"double\" root where the curve just touches the x-axis).\n- Step 3: $$\\Delta < 0$$ means square-rooting a negative gives no real value → **no real roots** (curve never crosses the x-axis).\n\nVisualise: the discriminant measures how many times a parabola slices the x-axis — 2, 1, or 0.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "A student is told the line $$y = 4x + c$$ is a tangent to the curve $$y = 2x^2 + 8x + 3$$. They write $$\\frac{dy}{dx} = 4x + c$$. What conceptual error have they made?", "answer": "They've conflated the *line* with its *gradient*. For a line $$y = mx + c$$, the symbol $$m$$ is a single number — the gradient. Setting $$\\frac{dy}{dx}$$ equal to the whole line equation $$4x + c$$ treats it as if the gradient itself depends on $$x$$, which is only true for curves.\n\nThe correct interpretation: at a tangent point, the *slope of the curve* equals the *slope of the line*, which is simply the coefficient of $$x$$ in the line's equation. So we set $$4x + 8 = 4$$, not $$4x + 8 = 4x + c$$. The $$+c$$ is the y-intercept and plays no role in matching gradients.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "Walk through the full 4-step procedure to find $$c$$ so that $$y = 4x + c$$ is tangent to $$y = 2x^2 + 8x + 3$$. (4 steps)", "answer": "- Step 1: Differentiate the curve to get its gradient function: $$\\frac{dy}{dx} = 4x + 8$$.\n- Step 2: Set this equal to the slope of the line (the coefficient of $$x$$, which is $$4$$): $$4x + 8 = 4 \\Rightarrow x = -1$$.\n- Step 3: Find the $$y$$-coordinate at the tangent point by substituting $$x = -1$$ into the CURVE (not the line, since the line has unknown $$c$$): $$y = 2(1) + 8(-1) + 3 = -3$$.\n- Step 4: Substitute the tangent point $$(-1, -3)$$ into the line to find $$c$$: $$-3 = 4(-1) + c \\Rightarrow c = 1$$.\n\nMental checkpoint: derivative (1 mark), equation (1 mark), $$x$$-coordinate (1 mark), $$y$$-coordinate (1 mark), find $$c$$ (1 mark) = 5 marks total.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "For sketching inequality regions, state the directional rule for $$y < f(x)$$, $$y > f(x)$$, and the distinction between strict and non-strict inequalities.", "answer": "- **$$y < f(x)$$**: shade BELOW the curve (points where $$y$$ is less than the curve's height).\n- **$$y > f(x)$$**: shade ABOVE the curve.\n- **Strict ($$<$$ or $$>$$)**: the boundary curve is **dashed** — the boundary is NOT part of the region.\n- **Non-strict ($$\\leq$$ or $$\\geq$$)**: the boundary is **solid** — the boundary IS included.\n\nWhen you have multiple inequalities, the solution region is the **overlap** (intersection) of all individual shaded regions — not the union.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "Given the inequalities $$y < x+2$$ AND $$y > x^2 - x$$, describe the shape and location of the region that satisfies both.", "answer": "- Step 1: $$y < x+2$$ is everything below the straight line.\n- Step 2: $$y > x^2 - x$$ is everything above the parabola (which opens upwards).\n- Step 3: The overlap is a **lens-shaped region** between the line (top boundary) and the parabola (bottom boundary), existing only where the line lies above the parabola.\n\nThe endpoints of this lens are found by solving $$x + 2 = x^2 - x$$, giving $$x = 1 \\pm \\sqrt{3}$$. Outside this $$x$$-range, no overlap exists.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "In a circle, when are the minor sector and major sector \"complementary,\" and what's the formula linking their angles?", "answer": "The two sectors together form the whole disc, so their angles sum to the full revolution: $$\\theta_{\\text{major}} + \\theta_{\\text{minor}} = 2\\pi$$.\n\nTherefore $$\\theta_{\\text{major}} = 2\\pi - \\theta_{\\text{minor}}$$. A useful sanity check: the minor sector's angle is always $$\\leq \\pi$$ (since it's the \"smaller piece\"), while the major's angle is always $$\\geq \\pi$$. If you compute an angle and it's obtuse (say, 2.22 rad), that's still the minor angle if it's less than $$\\pi \\approx 3.14$$.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "State the cosine rule and describe the two situations where it's the correct tool to reach for.", "answer": "The cosine rule: $$a^2 = b^2 + c^2 - 2bc\\cos A$$ (where $$A$$ is the angle *opposite* side $$a$$, and $$b, c$$ are the two sides *enclosing* $$A$$).\n\nUse it when:\n- **SAS**: you know two sides and the included angle, and want the third side.\n- **SSS**: you know all three sides and want to find an angle (rearrange to $$\\cos A = \\frac{b^2 + c^2 - a^2}{2bc}$$).\n\nCritically, you CANNOT use the sine rule in these cases because you don't have an angle-opposite-side pair. The trigger is \"no matched angle-side pair\" → cosine rule.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "In a triangle with sides 4, 6, 9 cm, you want the angle opposite the longest side. Before computing, what does geometry tell you about the nature of this angle, and what sign will $$\\cos$$ have? (3 steps)", "answer": "- Step 1: The longest side of a triangle is always opposite the largest angle — this is a direct consequence of the sine rule ($$\\sin$$ increases with angle on $$[0, \\pi/2]$$).\n- Step 2: Check if the triangle is obtuse: if $$a^2 > b^2 + c^2$$ (with $$a$$ largest), then the opposite angle exceeds $$\\pi/2$$. Here, $$81 > 16 + 36 = 52$$, so the angle IS obtuse.\n- Step 3: Obtuse angle → $$\\cos < 0$$. So when applying the cosine rule, expect $$\\cos\\alpha = \\frac{52 - 81}{48} = -\\frac{29}{48}$$ (negative, as predicted).\n\nThis \"obtuse check\" is a powerful sanity filter before you even compute.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "For $$\\int \\frac{3}{2x^3} \\, dx$$, what is the very first mental move, and why does the integration rule require it? (3 steps)", "answer": "- Step 1: Rewrite $$\\frac{3}{2x^3}$$ as $$\\frac{3}{2} x^{-3}$$. The $$\\frac{3}{2}$$ stays as a scalar; only the $$x^3$$ in the denominator becomes $$x^{-3}$$.\n- Step 2: Why? The power rule $$\\int x^n \\, dx = \\frac{x^{n+1}}{n+1}$$ only works when $$x$$ is written in the form $$x^n$$. With $$x$$ in the denominator, the rule isn't directly applicable.\n- Step 3: Now integrate: $$\\int \\frac{3}{2} x^{-3} \\, dx = \\frac{3}{2} \\cdot \\frac{x^{-2}}{-2} = -\\frac{3}{4}x^{-2} = -\\frac{3}{4x^2}$$.\n\nCommon trap: some students bring the $$\\frac{3}{2}$$ scalar up into the exponent. Keep scalars out of the power.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "Why is $$+C$$ essential for indefinite integrals but irrelevant for definite integrals?", "answer": "An indefinite integral asks \"what's the most general antiderivative?\" — infinitely many functions differ by a constant yet all have the same derivative (since $$\\frac{d}{dx}C = 0$$). So we MUST write $$+C$$ to represent the entire family.\n\nA definite integral $$\\int_a^b f(x)\\,dx$$ evaluates to a single number: $$F(b) - F(a)$$. Whatever constant is in $$F$$ cancels because it appears in both evaluations. So $$+C$$ is unnecessary (and incorrect to include in the final answer) for definite integrals.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "Given $$m = 2^n$$, express $$2^{n+3}$$ in terms of $$m$$. Show the index-law reasoning. (2 steps)", "answer": "- Step 1: Use the product rule for exponents: $$2^{n+3} = 2^n \\cdot 2^3$$.\n- Step 2: Substitute $$m = 2^n$$ and compute $$2^3 = 8$$: $$2^{n+3} = m \\cdot 8 = 8m$$.\n\nThe concept: any exponent can be split into factors using $$a^{x+y} = a^x \\cdot a^y$$. This is the workhorse move when \"in terms of\" another exponential is requested.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Given $$m = 2^n$$, express $$16^{3n}$$ in terms of $$m$$. What two exponent laws are being chained? (3 steps)", "answer": "- Step 1: Convert the base to match $$m$$'s base: $$16 = 2^4$$, so $$16^{3n} = (2^4)^{3n}$$.\n- Step 2: Apply $$(a^m)^n = a^{mn}$$: $$(2^4)^{3n} = 2^{12n}$$.\n- Step 3: Reshape to use $$m = 2^n$$. Since $$2^{12n} = (2^n)^{12}$$: answer is $$m^{12}$$.\n\nThe trick: when bases differ, change them to a common base first, then reshape the exponent until the \"known\" piece (here $$2^n$$) appears.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "To solve $$x\\sqrt{3} - 3 = x + \\sqrt{3}$$ for $$x$$ in the form $$p + q\\sqrt{3}$$, what's the strategy once you've collected $$x$$ terms? (3 steps)", "answer": "- Step 1: Collect $$x$$-terms on one side: $$x\\sqrt{3} - x = 3 + \\sqrt{3}$$, factor: $$x(\\sqrt{3} - 1) = 3 + \\sqrt{3}$$.\n- Step 2: Divide: $$x = \\frac{3 + \\sqrt{3}}{\\sqrt{3} - 1}$$. The surd in the denominator is the obstacle.\n- Step 3: Rationalise by multiplying top and bottom by the conjugate $$\\sqrt{3} + 1$$:\n+ Numerator: $$(3 + \\sqrt{3})(\\sqrt{3} + 1) = 3\\sqrt{3} + 3 + 3 + \\sqrt{3} = 6 + 4\\sqrt{3}$$\n+ Denominator: $$(\\sqrt{3} - 1)(\\sqrt{3} + 1) = 3 - 1 = 2$$\n\nFinal: $$x = \\frac{6 + 4\\sqrt{3}}{2} = 3 + 2\\sqrt{3}$$, so $$p = 3, q = 2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Why does multiplying by the conjugate $$(\\sqrt{3} + 1)$$ eliminate the surd in the denominator of $$\\frac{1}{\\sqrt{3} - 1}$$?", "answer": "Because $$(\\sqrt{3} - 1)(\\sqrt{3} + 1)$$ is a **difference of squares**: $$(\\sqrt{3})^2 - 1^2 = 3 - 1 = 2$$. Squaring the $$\\sqrt{3}$$ removes the surd entirely, leaving a rational number.\n\nGeneral pattern: $$(a + b\\sqrt{c})(a - b\\sqrt{c}) = a^2 - b^2 c$$, always rational.\n\nYou MUST multiply both numerator and denominator by the conjugate — otherwise you've changed the value of the expression (violated equality).", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "For the transformation $$y = f(x + 3)$$, in which direction does the graph move, and by how much? Why is it the \"opposite\" of what most students first guess?", "answer": "The graph shifts **LEFT by 3 units**. \n\nThe intuition: $$f(x+3)$$ at input $$x$$ uses the original function's value at $$x+3$$. So a feature originally at $$x = 5$$ now appears when the new input is $$x = 2$$ (since $$2 + 3 = 5$$). The graph's features all shift to smaller $$x$$ values, i.e., LEFT.\n\nRule: anything INSIDE $$f(\\,\\cdot\\,)$$ affects the input, and the effect is REVERSED from what the sign suggests. $$f(x + a)$$ shifts left by $$a$$; $$f(x - a)$$ shifts right by $$a$$.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Describe the geometric effect of $$y = f(-3x)$$ on a curve, and explain how to update a point $$(a, b)$$ on the original graph. (3 steps)", "answer": "- Step 1: The factor $$a = -3$$ inside $$f$$ produces two effects: a horizontal stretch by $$\\frac{1}{|a|} = \\frac{1}{3}$$ (so a *compression* by factor 3), and the negative sign produces a reflection in the $$y$$-axis.\n- Step 2: Combined effect on $$x$$-coordinates: each $$x$$ becomes $$\\frac{x}{-3}$$ (i.e., divide by $$-3$$).\n- Step 3: So point $$(a, b)$$ maps to $$\\left(-\\frac{a}{3}, b\\right)$$. The $$y$$-coordinate is unchanged — transformations inside $$f$$ only affect $$x$$.\n\nExample: $$(3, 0)$$ → $$(-1, 0)$$, $$(0, 2)$$ → $$(0, 2)$$, $$(-1, 0)$$ → $$(\\frac{1}{3}, 0)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "Why do transformations INSIDE $$f(\\,\\cdot\\,)$$ affect $$x$$-coordinates in the \"opposite\" direction, while those OUTSIDE affect $$y$$ \"intuitively\"?", "answer": "- **Outside** $$f$$: e.g., $$y = 2f(x) + 3$$ directly scales and shifts the output value. If $$f(x) = 5$$, then $$y = 2(5) + 3 = 13$$. The transformation is applied to $$y$$ the moment after computing $$f(x)$$ — so effects are direct/intuitive.\n- **Inside** $$f$$: e.g., $$y = f(2x + 3)$$ modifies the input BEFORE computing. To produce the same output as the original $$f(5)$$, the new $$x$$ must satisfy $$2x + 3 = 5$$, giving $$x = 1$$. You're \"solving backwards\" for the input, which inverts the operations.\n\nMnemonic: inside $$f$$ → reversed; outside $$f$$ → direct.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "A curve $$y = f(x)$$ *touches* the $$x$$-axis at $$(3, 0)$$. After applying $$y = f(x + 3)$$, does the new curve still touch the axis, or does it now cross?", "answer": "It still **touches** — touching/crossing behaviour is a local property determined by the multiplicity of the root (a double root gives touching). Horizontal translations, stretches, and reflections are rigid/scale transformations that preserve double roots (the factored form $$(x - 3)^2$$ just becomes $$((x+3) - 3)^2 = x^2$$, still a double root at $$x = 0$$).\n\nTouching survives all transformations except those that could change the functional form (e.g., adding a constant vertically could lift the curve off the axis entirely).", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "When a problem says \"curves $$C_1$$ and $$C_2$$ meet at a single point,\" what condition must the combined quadratic satisfy, and why?", "answer": "The combined equation (setting $$y$$'s equal) must have discriminant $$\\Delta = 0$$.\n\nReasoning: \"meet at a single point\" means exactly one $$x$$-value (and hence one intersection point) satisfies both curves simultaneously. After setting $$C_1 = C_2$$ and rearranging, you get a quadratic in $$x$$. \"One solution\" for a quadratic corresponds to a repeated root, which is exactly the condition $$b^2 - 4ac = 0$$.\n\nPhuc's insight: if the question asks to \"show $$k$$ satisfies [some expression in $$k$$],\" and $$k$$ is the only unknown, that's your cue — the discriminant condition produces a polynomial in $$k$$.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Explain the full translation of trigger phrases into discriminant conditions.", "answer": "- \"meets at a single point\" / \"tangent to\" / \"just touches\" → $$\\Delta = 0$$\n- \"two distinct points\" / \"cuts twice\" / \"two solutions\" → $$\\Delta > 0$$\n- \"does not meet\" / \"never intersects\" / \"no real solutions\" → $$\\Delta < 0$$\n- \"meets at least once\" / \"meets\" (without \"distinct\") → $$\\Delta \\geq 0$$\n\nThe discriminant IS the question: its sign controls the number of real intersections. Recognising these trigger phrases instantly tells you to reach for the discriminant tool.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "For $$C_1: y = x^2 + kx - 9$$ and $$C_2: y = -3x^2 - 5x + k$$ that meet at a single point, outline the strategy to produce a single equation for $$k$$. (3 steps)", "answer": "- Step 1: Equate the two expressions: $$x^2 + kx - 9 = -3x^2 - 5x + k$$, then rearrange into standard quadratic form in $$x$$: $$4x^2 + (k+5)x - (9+k) = 0$$.\n- Step 2: For a single intersection, set $$\\Delta = 0$$: $$(k+5)^2 - 4(4)(-(9+k)) = 0$$, which simplifies to $$(k+5)^2 + 16(9+k) = 0$$.\n- Step 3: Expand: $$k^2 + 10k + 25 + 144 + 16k = k^2 + 26k + 169 = 0$$.\n\nKey insight: in steps 1-2, $$x$$ disappears; the equation is now purely in $$k$$, matching the promised form.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Once you've derived $$k^2 + 26k + 169 = 0$$, how do you find the coordinates of the single intersection point? (3 steps)", "answer": "- Step 1: Solve for $$k$$: $$(k+13)^2 = 0 \\Rightarrow k = -13$$.\n- Step 2: Substitute $$k = -13$$ back into the quadratic $$4x^2 + (k+5)x - (9+k) = 0$$, giving $$4x^2 - 8x + 4 = 0 \\Rightarrow (x-1)^2 = 0 \\Rightarrow x = 1$$.\n- Step 3: Plug $$x = 1$$ into EITHER original curve (easier one): $$y = 1^2 + (-13)(1) - 9 = -21$$. So $$P = (1, -21)$$.\n\nSanity check: $$(x - 1)^2 = 0$$ having a repeated root confirms the \"single point\" geometry.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "What's the formula for the area of a triangle using two sides and the included angle (SAS), and why is this called the SAS formula?", "answer": "$$\\text{Area} = \\frac{1}{2}ab\\sin C$$ where $$C$$ is the angle between sides $$a$$ and $$b$$.\n\nIt's called SAS because you need **Side-Angle-Side** — two sides with the angle *between* them. Intuition: $$b\\sin C$$ is the perpendicular height when $$a$$ is treated as the base, so the formula is just $$\\frac{1}{2} \\times \\text{base} \\times \\text{height}$$ in disguise.\n\nMisconception: the angle MUST be between the two given sides. Using a non-included angle gives the wrong height.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "In a sector + triangle composite area problem (e.g., a garden), what's the systematic decomposition strategy? (3 steps)", "answer": "- Step 1: Partition the shape into pieces whose areas have known formulas: triangles (use $$\\frac{1}{2}ab\\sin C$$ or $$\\frac{1}{2} \\times b \\times h$$) and sectors (use $$\\frac{1}{2}r^2\\theta$$).\n- Step 2: For each piece, identify what's given vs what must be derived (e.g., if a triangle is right-angled, trig ratios give the missing sides).\n- Step 3: Use angle relationships at the join points — angles on a straight line sum to $$\\pi$$; angles around a point sum to $$2\\pi$$; angles in a triangle sum to $$\\pi$$.\n\nFinally, sum all piece areas for the total.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "In a garden with $$A$$, $$B$$, $$C$$ collinear and with sector angle $$\\angle EBD = 1.3$$ rad and $$\\angle BCD = \\pi/2$$, how do you find $$\\angle ABE$$? (2 steps)", "answer": "- Step 1: Angles along the straight line $$ABC$$ at point $$B$$ must sum to $$\\pi$$. The angles at $$B$$ are $$\\angle ABE$$ (part of triangle $$ABE$$), $$\\angle EBD = 1.3$$ (sector), and $$\\angle DBC = \\pi/2$$ (part of right triangle $$BCD$$).\n- Step 2: Therefore $$\\angle ABE + 1.3 + \\frac{\\pi}{2} = \\pi$$, giving $$\\angle ABE = \\frac{\\pi}{2} - 1.3 \\approx 0.27$$ rad.\n\nThis \"angles on a line\" is a standard geometry fact but easy to miss when buried in a composite figure.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "When inequalities bound a region $$R$$ between a curve and a line (e.g., line above, curve below), how do you assign the correct inequality sign? (3 steps)", "answer": "- Step 1: Identify the position of $$R$$ relative to each boundary by eye or by picking a sample point INSIDE $$R$$.\n- Step 2: For the line $$y = 5x + 75$$: if $$R$$ lies below, write $$y \\leq 5x + 75$$. For the curve $$y = 2x^2 + x - 21$$: if $$R$$ lies above, write $$y \\geq 2x^2 + x - 21$$.\n- Step 3: For axis boundaries: \"above x-axis\" is $$y \\geq 0$$; \"right of y-axis\" is $$x \\geq 0$$.\n\nSanity test: plug a sample point from inside $$R$$ into each inequality — all should hold.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Phuc's mistake was writing $$y \\leq 2x^2 + x - 21$$ when the correct was $$y \\geq 2x^2 + x - 21$$. How do you catch this error with a sample point?", "answer": "Pick any point clearly inside $$R$$ — say $$(0, 10)$$ if $$R$$ is above the parabola. Check:\n- $$y = 10$$, $$2x^2 + x - 21 = -21$$. Is $$10 \\leq -21$$? NO. Is $$10 \\geq -21$$? YES.\n\nSo the correct sign is $$\\geq$$. This sample-point test is foolproof — one point is enough to rule out the wrong sign, since if the sign were reversed, the sample wouldn't satisfy it.\n\nAlways verify by plugging in an obvious interior point.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "When a question says \"point $$A$$ lies on both $$y = f'(x)$$ and $$y = f''(x)$$,\" what's the immediate algebraic move to find unknown parameters? (2 steps)", "answer": "- Step 1: Since $$A$$ is on both curves, its coordinates satisfy both equations. If the $$x$$-coordinate of $$A$$ is known (say $$x_A = 5$$), then $$f'(5) = f''(5)$$ because both must give the same $$y$$-value at $$A$$.\n- Step 2: Substitute $$x = 5$$ into both $$f'$$ and $$f''$$ expressions (which involve the unknown $$k$$), set them equal, and solve the resulting linear equation in $$k$$.\n\nThis is the \"substitute the coordinate\" trick — the power of knowing a specific point shared by two curves reduces a problem with unknowns to a single equation.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "For $$f(x) = 2x^3 - kx^2 + 14x + 24$$, derive expressions for $$f'(x)$$ and $$f''(x)$$, then explain how knowing $$A$$ is on both lets you find $$k$$. (4 steps)", "answer": "- Step 1: Differentiate once using the power rule: $$f'(x) = 6x^2 - 2kx + 14$$.\n- Step 2: Differentiate again: $$f''(x) = 12x - 2k$$.\n- Step 3: Use $$x_A = 5$$: compute $$f'(5) = 150 - 10k + 14 = 164 - 10k$$ and $$f''(5) = 60 - 2k$$.\n- Step 4: Set them equal (since $$A$$ is on both): $$164 - 10k = 60 - 2k \\Rightarrow 104 = 8k \\Rightarrow k = 13$$.\n\nThe method chains: differentiation → substitution of known coordinate → algebraic elimination.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "After finding $$k = 13$$, how do you locate the *other* intersection $$B$$ of $$f'$$ and $$f''$$? (3 steps)", "answer": "- Step 1: With $$k = 13$$, set the two functions equal: $$6x^2 - 26x + 14 = 12x - 26$$, giving $$6x^2 - 38x + 40 = 0$$, or $$3x^2 - 19x + 20 = 0$$.\n- Step 2: Factor, using the knowledge that $$x = 5$$ is a root: $$(x - 5)(3x - 4) = 0$$. So $$x = 5$$ (point $$A$$) or $$x = \\frac{4}{3}$$ (point $$B$$).\n- Step 3: Plug $$x = \\frac{4}{3}$$ into $$f''(x) = 12x - 26$$ (simpler than $$f'$$): $$y = 12 \\cdot \\frac{4}{3} - 26 = 16 - 26 = -10$$. So $$B = (\\frac{4}{3}, -10)$$.\n\nTrick: factor out the *known* root — it's always easier than re-solving from scratch.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "For $$C_1: y = x(4 - x^2)$$ and $$C_2: y = \\frac{A}{x}$$ to meet at **4 distinct** points, why isn't \"discriminant > 0\" enough?", "answer": "Setting $$C_1 = C_2$$ gives $$x^4 - 4x^2 + A = 0$$. Substituting $$u = x^2$$ reduces this to a quadratic $$u^2 - 4u + A = 0$$.\n\nThe subtlety: for a real $$x$$, we need $$u = x^2 \\geq 0$$. For TWO DISTINCT real $$x$$-values per $$u$$, we need $$u > 0$$ (since $$u = 0$$ gives only one $$x$$, and $$u < 0$$ gives none).\n\nSo 4 distinct real $$x$$ requires **2 distinct POSITIVE $$u$$-roots**. This needs:\n- $$\\Delta > 0$$ (2 distinct roots)\n- Both roots positive, requiring sum > 0 AND product > 0.\n\n\"$$\\Delta > 0$$\" alone allows one root to be negative (giving only 2 real $$x$$'s), so it's insufficient.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "For $$u^2 - 4u + A = 0$$ to have two distinct positive roots, derive the range of $$A$$. (4 steps)", "answer": "- Step 1: Discriminant condition: $$\\Delta = 16 - 4A > 0 \\Rightarrow A < 4$$.\n- Step 2: Sum of roots by Vieta: sum $$= 4$$ (the coefficient $$-b/a$$). This is automatically $$> 0$$, so no constraint from the sum.\n- Step 3: Product of roots by Vieta: product $$= A$$ (the $$c/a$$). For both roots positive, product $$> 0$$, so $$A > 0$$.\n- Step 4: Combine: $$0 < A < 4$$.\n\nThe lesson: Vieta's formulas let you check root signs without solving. Sum and product tell you everything about whether both roots are positive.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "What's the equation of a line \"parallel to the $$x$$-axis through $$(4, 2)$$,\" and why?", "answer": "$$y = 2$$.\n\nReasoning: a line parallel to the $$x$$-axis has gradient 0 (horizontal). Its $$y$$-value is constant everywhere. Since the line passes through $$(4, 2)$$, that constant must be $$2$$.\n\nContrast: a line parallel to the $$y$$-axis through $$(4, 2)$$ would be $$x = 4$$ (vertical, undefined slope). Remember: parallel to $$x$$-axis → $$y = \\text{constant}$$; parallel to $$y$$-axis → $$x = \\text{constant}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Given $$B = (15, 7)$$ and a point $$C = (x, 2)$$ on the horizontal line $$y = 2$$ with $$BC = 5\\sqrt{5}$$, find both possible $$C$$. (3 steps)", "answer": "- Step 1: Apply the distance formula: $$\\sqrt{(15-x)^2 + (7-2)^2} = 5\\sqrt{5}$$, so $$(15-x)^2 + 25 = 125$$.\n- Step 2: Simplify: $$(15-x)^2 = 100 \\Rightarrow 15 - x = \\pm 10 \\Rightarrow x = 5 \\text{ or } x = 25$$.\n- Step 3: So $$C = (5, 2)$$ or $$C = (25, 2)$$.\n\nThe $$\\pm$$ is the source of the two solutions. Geometrically, there are two points on the horizontal line at the specified distance from $$B$$ — one on each side of the perpendicular foot from $$B$$.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "For triangle $$ABC$$ with $$A = (4,2)$$, $$B = (15,7)$$, and $$C$$ on $$y = 2$$, why does choosing the *closer* $$C$$ minimise the triangle's area?", "answer": "With both $$A$$ and $$C$$ on the line $$y = 2$$, segment $$AC$$ is the base, lying horizontally. The perpendicular height from $$B$$ is the vertical distance from $$B$$ to this line, which is fixed: $$|7 - 2| = 5$$.\n\nArea $$= \\frac{1}{2} \\times \\text{base} \\times \\text{height} = \\frac{1}{2} \\times |AC| \\times 5$$.\n\nSo area scales with $$|AC|$$. The minimum area corresponds to the minimum $$|AC|$$, i.e., the $$C$$ closest to $$A$$. Here $$C = (5, 2)$$ gives $$|AC| = 1$$ and area $$= 2.5$$, while $$C = (25, 2)$$ gives $$|AC| = 21$$ and area $$= 52.5$$.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "For $$y = 12\\sin(x + B)$$, at what value(s) of $$(x + B)$$ does the minimum occur, and what is the minimum $$y$$-value? (2 steps)", "answer": "- Step 1: The sine function reaches its minimum of $$-1$$ when its argument equals $$\\frac{3\\pi}{2} + 2n\\pi$$ for integer $$n$$ (equivalently $$-\\frac{\\pi}{2} + 2n\\pi$$).\n- Step 2: At that argument, $$y = 12 \\times (-1) = -12$$. So the minimum $$y$$-value is $$-12$$, occurring when $$x + B = \\frac{3\\pi}{2} + 2n\\pi$$.\n\nCommon error: confusing $$\\sin = 1$$ (max, at $$\\pi/2$$) with $$\\sin = -1$$ (min, at $$3\\pi/2$$). Always check: minimum → argument is $$3\\pi/2$$ (not $$\\pi/2$$).", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "For $$y = 12\\sin(x + B)$$, the minimum point with smallest positive $$x$$ is $$(\\pi/4, A)$$. Find the smallest positive $$B$$. (3 steps)", "answer": "- Step 1: At a minimum, $$x + B = \\frac{3\\pi}{2} + 2n\\pi$$. Plugging in $$x = \\frac{\\pi}{4}$$: $$\\frac{\\pi}{4} + B = \\frac{3\\pi}{2} + 2n\\pi$$.\n- Step 2: Solve for $$B$$: $$B = \\frac{3\\pi}{2} - \\frac{\\pi}{4} + 2n\\pi = \\frac{6\\pi - \\pi}{4} + 2n\\pi = \\frac{5\\pi}{4} + 2n\\pi$$.\n- Step 3: For smallest positive $$B$$, take $$n = 0$$: $$B = \\frac{5\\pi}{4}$$.\n\nSanity check: if $$n = -1$$, $$B = \\frac{5\\pi}{4} - 2\\pi = -\\frac{3\\pi}{4} < 0$$, so $$n = 0$$ is indeed the smallest non-negative choice.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "State the general solutions for $$\\sin\\theta = 1$$, $$\\sin\\theta = -1$$, $$\\cos\\theta = 1$$, $$\\cos\\theta = -1$$.", "answer": "- $$\\sin\\theta = 1$$ (max): $$\\theta = \\frac{\\pi}{2} + 2n\\pi$$\n- $$\\sin\\theta = -1$$ (min): $$\\theta = \\frac{3\\pi}{2} + 2n\\pi$$ (equivalently $$-\\frac{\\pi}{2} + 2n\\pi$$)\n- $$\\cos\\theta = 1$$ (max): $$\\theta = 2n\\pi$$ (i.e., $$0, 2\\pi, 4\\pi, \\ldots$$)\n- $$\\cos\\theta = -1$$ (min): $$\\theta = \\pi + 2n\\pi$$ (i.e., $$\\pi, 3\\pi, \\ldots$$)\n\nMemory aid: $$\\sin$$ extrema are at $$\\pm 90°$$, $$\\cos$$ extrema are at $$0°$$ and $$180°$$ (the \"horizontal\" directions on the unit circle).", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "For a triangle with $$AB = 15$$, $$AC = 25$$, and area $$= 100$$, find $$\\sin\\theta$$ where $$\\theta = \\angle BAC$$. (2 steps)", "answer": "- Step 1: Use the SAS area formula $$\\text{Area} = \\frac{1}{2}ab\\sin C$$ with $$a = 15$$, $$b = 25$$, $$C = \\theta$$: $$100 = \\frac{1}{2}(15)(25)\\sin\\theta = 187.5\\sin\\theta$$.\n- Step 2: Solve: $$\\sin\\theta = \\frac{100}{187.5} = \\frac{8}{15}$$.\n\nThe general pattern: whenever you're given two sides and an area, you can solve for $$\\sin$$ of the included angle directly.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "Given $$\\sin\\theta = \\frac{8}{15}$$ and $$\\theta > 90°$$, how do you find $$\\cos\\theta$$? Why does the constraint matter? (3 steps)", "answer": "- Step 1: Apply the Pythagorean identity: $$\\cos^2\\theta = 1 - \\sin^2\\theta = 1 - \\frac{64}{225} = \\frac{161}{225}$$.\n- Step 2: Take the square root: $$\\cos\\theta = \\pm\\frac{\\sqrt{161}}{15}$$. The $$\\pm$$ reflects that both signs satisfy $$\\cos^2\\theta = \\frac{161}{225}$$.\n- Step 3: The condition $$\\theta > 90°$$ (obtuse) places $$\\theta$$ in the second quadrant, where cosine is NEGATIVE. So $$\\cos\\theta = -\\frac{\\sqrt{161}}{15}$$.\n\nWithout the constraint, you'd have two possible triangles — the problem narrows it down by specifying obtuseness.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "In the cosine rule $$BC^2 = AB^2 + AC^2 - 2(AB)(AC)\\cos\\theta$$, when $$\\cos\\theta < 0$$, the last term becomes a *plus*. Why, and what geometric insight does this capture?", "answer": "With $$\\cos\\theta < 0$$, $$-2(AB)(AC)\\cos\\theta$$ becomes positive (negative times negative).\n\nGeometric insight: the cosine rule generalises Pythagoras. For a *right* angle ($$\\cos = 0$$), it reduces to $$a^2 = b^2 + c^2$$. For an *acute* angle, $$-2bc\\cos A < 0$$, so the opposite side is SHORTER than the Pythagoras prediction (the triangle \"folds in\"). For an *obtuse* angle, the last term adds, so the opposite side is LONGER than Pythagoras — the angle spreads the opposite vertices apart.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "For the substitution $$p = 2^x$$ applied to $$2 \\cdot 4^x - 2^{x+3} = 17 \\cdot 2^{x-1} - 4$$, how is each term rewritten? (3 steps)", "answer": "- Step 1: $$2 \\cdot 4^x = 2 \\cdot (2^2)^x = 2 \\cdot (2^x)^2 = 2p^2$$. The key move: $$4^x = (2^x)^2$$.\n- Step 2: $$2^{x+3} = 2^x \\cdot 2^3 = 8p$$. Split the exponent using addition → multiplication.\n- Step 3: $$17 \\cdot 2^{x-1} = 17 \\cdot 2^x \\cdot 2^{-1} = \\frac{17p}{2}$$. Negative exponents give reciprocals.\n\nAfter substitution: $$2p^2 - 8p = \\frac{17p}{2} - 4$$, then multiply by $$2$$ and rearrange to the standard quadratic in $$p$$: $$4p^2 - 33p + 8 = 0$$.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "After obtaining $$4p^2 - 33p + 8 = 0$$ via substitution $$p = 2^x$$, how do you back-solve for $$x$$? (3 steps)", "answer": "- Step 1: Factor: $$(4p - 1)(p - 8) = 0$$, giving $$p = \\frac{1}{4}$$ or $$p = 8$$.\n- Step 2: Back-substitute each: $$p = 8 \\Rightarrow 2^x = 8 = 2^3 \\Rightarrow x = 3$$; $$p = \\frac{1}{4} \\Rightarrow 2^x = 2^{-2} \\Rightarrow x = -2$$.\n- Step 3: Both are valid (both $$p$$-values are positive; $$2^x$$ is always positive so no roots to reject).\n\nImportant: if a $$p$$-value comes out non-positive, REJECT it — $$2^x > 0$$ for all real $$x$$. For this problem, both roots are positive, so both $$x$$-solutions stand.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "Why must the substituted variable $$p = 2^x$$ always be positive, and when might a solution $$p = \\text{negative}$$ need to be rejected?", "answer": "Because $$2^x > 0$$ for all real $$x$$ (exponential functions with positive base are always positive). So if factoring gives $$p = -3$$, there's no corresponding real $$x$$ — reject it.\n\nThis is an essential check in any \"$$p = a^x$$\" substitution: after solving the polynomial in $$p$$, verify each root is positive before converting back to $$x$$. Failing to reject a negative root typically leads to claiming extra, nonexistent solutions.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "A platform is composed of an inner sector $$DOC$$ (radius $$DO$$) and an outer major sector $$AOBEA$$ (radius $$AO$$), with $$DA:AO = 3:5$$. Why does setting $$AO = 5x$$ and $$DA = 3x$$ lead to $$DO = 8x$$? (2 steps)", "answer": "- Step 1: The ratio $$DA:AO = 3:5$$ means if $$AO = 5x$$, then $$DA = 3x$$ (same scale factor $$x$$).\n- Step 2: Since $$A$$ lies on segment $$DO$$ (between $$D$$ and $$O$$), the total inner radius is $$DO = DA + AO = 3x + 5x = 8x$$.\n\nSo the inner sector has radius $$8x$$ and the outer sector has radius $$5x$$. Ratios provide a single parameter $$x$$ that links both radii, which you solve for from a given arc length or other constraint.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "For a platform with inner arc $$CD = 9$$ m and sector angle $$0.8$$ rad, find the inner radius $$DO = 8x$$ and hence $$AO = 5x$$. (2 steps)", "answer": "- Step 1: Arc length formula: $$\\ell = r\\theta$$, so $$9 = 8x \\times 0.8 = 6.4x$$. Solve: $$x = \\frac{9}{6.4} = 1.40625$$.\n- Step 2: $$AO = 5x = 5 \\times 1.40625 = 7.03125$$, which rounds to $$7.03$$ m (3 s.f.).\n\nThis shows the \"ratio → single unknown $$x$$ → solve\" strategy. A single equation from the arc length pins down $$x$$, after which all lengths follow.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "The perimeter of a composite platform = outer major arc + inner minor arc + two straight sides $$DA$$ and $$BC$$. Why are these the only boundary pieces, and how do you compute each? (3 steps)", "answer": "- Step 1: The straight sides $$DA$$ and $$BC$$ connect the inner radius endpoints to the outer radius endpoints. Since $$A$$ is between $$D$$ and $$O$$, the straight piece that's on the boundary is $$DA$$ (and its counterpart $$BC$$) — NOT the full radius $$DO$$.\n- Step 2: Outer major arc: $$\\ell = (5x)(2\\pi - 0.8)$$ — note we use $$2\\pi - 0.8$$ because the *major* sector spans the complement of $$0.8$$ rad.\n- Step 3: Inner minor arc is the given $$9$$ m (from arc $$CD$$). The two straight sides each have length $$DA = 3x$$.\n\nTotal: $$\\ell_{\\text{major}} + 9 + 2(3x)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "Why does the total area of the platform equal (outer major sector area) + (inner minor sector area), not just the difference?", "answer": "The platform occupies two adjacent regions: the **outer** major sector (which extends from the outer boundary to the central angle of $$2\\pi - 0.8$$) AND the **inner** minor sector (which fills the \"bite\" where the minor angle $$0.8$$ is located, up to the inner radius).\n\nThese are non-overlapping and together cover the platform. So we ADD them.\n\nIf the shape were \"outer sector wit
