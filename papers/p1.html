c $$ax^{2}+bx+c=0$$, and how are they used to check sign conditions on roots? (2 steps)", "answer": "- Step 1: Vieta's formulas: sum of roots $$= -\\frac{b}{a}$$, product of roots $$= \\frac{c}{a}$$. These come directly from the factorisation $$a(x-r_{1})(x-r_{2})=ax^{2}-a(r_{1}+r_{2})x+ar_{1}r_{2}$$.\n- Step 2: Sign conditions:\n+ Both roots positive ↔ sum $$>0$$ AND product $$>0$$\n+ Both roots negative ↔ sum $$<0$$ AND product $$>0$$\n+ Roots of opposite sign ↔ product $$<0$$\n+ At least one zero root ↔ product $$=0$$\nFor the 4-distinct-roots problem: $$y^{2}-4y+A=0$$ has sum $$=4>0$$ (automatic) and product $$=A$$. For both positive: need $$A>0$$ and $$\\Delta>0$$ (i.e., $$A<4$$).\n\nTakeaway: Vieta gives sum and product of roots from coefficients. Use sign logic to determine if roots are positive/negative.", "source": "GLM 5.1 ③", "_id": "glm_3_46"}, {"question": "A question: \"The curve passes through $$(0, 2)$$\" — what does this tell you algebraically?", "answer": "Plugging $$x = 0, y = 2$$ into the curve's equation gives a TRUE statement (the point satisfies the equation). In practice, this is one equation involving the parameters of the curve.\n\nFor $$y = f(x) = \\frac{8}{5}x^{5/2} - \\frac{24\\sqrt{2}}{x} + C$$, plugging the point gives one equation relating $$C$$ to the other knowns.\n\nEach \"passes through\" point provides one equation for the unknowns. With $$n$$ unknowns, you need at least $$n$$ such points (or other conditions) to solve the system.", "source": "Opus 4.7 ①", "_id": "opus_1_174"}, {"question": "In the \"discriminant\" method, why does setting $$\\Delta = 0$$ correspond geometrically to the line being *tangent* to the curve?", "answer": "Tangent = line touches the curve at exactly one point (no crossing). Setting line $$=$$ curve gives a quadratic in $$x$$; \"exactly one solution\" means the quadratic has a repeated root, which is $$\\Delta = 0$$.\n\nVisual: imagine a line approaching a parabola from outside. At first they don't intersect ($$\\Delta < 0$$). As the line moves closer, they touch ($$\\Delta = 0$$, tangent). As the line moves through, they intersect in two places ($$\\Delta > 0$$).\n\nThe discriminant is the \"intersection counter\" that distinguishes these three regimes.", "source": "Opus 4.7 ①", "_id": "opus_1_98"}, {"question": "The curves $y = \\frac{1}{x+2}$ and $y = x(x+2)^2$ are sketched. How many real solutions does $(x+2)(x^3 + 4x^2 + 4x) = 1$ have? Explain using the graph. (3 steps)", "answer": "- Step 1: Rewrite: $(x+2) \\cdot x(x+2)^2 = 1 \\Rightarrow x(x+2)^2 = \\frac{1}{x+2}$\n- Step 2: This is the intersection of $y = x(x+2)^2$ (cubic) and $y = \\frac{1}{x+2}$ (hyperbola with vertical asymptote at $x = -2$)\n- Step 3: From the sketch: the cubic touches the x-axis at $x = -2$ (double root), crosses at $x = 0$; the hyperbola approaches $y = 0$ as $x \\to \\pm\\infty$\n+ Right of $x = -2$: curves cross once\n+ Left of $x = -2$: curves cross once\n\n**Answer: 2 real solutions**\n\n**Key insight:** When a question says \"hence\" after providing a sketch, you should interpret graphically — no algebraic solving needed!", "source": "MiniMax ②", "_id": "minimax_2_21"}, {"question": "State the quadratic formula from memory, and explain why it must be memorised rather than looked up.", "answer": "The formula is $$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$ for $$ax^2 + bx + c = 0$$.\n\nIt must be memorised because it is NOT included in the Edexcel IAL formula booklet. The examiner expects automatic recall — it's a core skill, not a \"look-it-up\" fact. Understanding why it works (derived from completing the square) helps cement the memory: you're essentially solving $$a\\left(x + \\frac{b}{2a}\\right)^2 = \\frac{b^2 - 4ac}{4a}$$ for $$x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "The cubic $$y = x(x+2)^2$$ has a double-root factor $$(x+2)^2$$. What's the geometric effect at $$x = -2$$? (3 steps)", "answer": "- Step 1: A single root $$(x - a)$$ means the curve CROSSES the $$x$$-axis at $$x = a$$ (sign changes).\n- Step 2: A double (repeated) root $$(x - a)^2$$ means the curve TOUCHES the $$x$$-axis at $$x = a$$ without crossing — reaches $$y = 0$$ and bounces back (sign doesn't change).\n- Step 3: So for $$y = x(x+2)^2$$: at $$x = 0$$ (single), crosses; at $$x = -2$$ (double), touches. The curve dips to touch at $$(-2, 0)$$ and returns.\n\nTouches are preserved under transformations because the factorisation structure survives.", "source": "Opus 4.7 ②", "_id": "opus_2_60"}, {"question": "For Phuc's \"discriminant trigger\" insight: why does \"the target equation has only $$k$$\" work AS A DIAGNOSTIC for choosing the discriminant method? (3 steps)", "answer": "- Step 1: The target to be shown has only $$k$$ (no $$x$$).\n- Step 2: Typical quadratic coefficients (after equating curves) involve both $$x$$ and $$k$$. The discriminant $$\\Delta = b^2 - 4ac$$ is built from these coefficients and thus involves $$k$$. Setting $$\\Delta = 0$$ ELIMINATES $$x$$, leaving an equation purely in $$k$$.\n- Step 3: So if the target has ONLY $$k$$ and matches the structure of discriminant output, the discriminant is the tool.\n\nUseful habit: look at the variables in the target equation; the relevant method eliminates all OTHER variables.", "source": "Opus 4.7 ②", "_id": "opus_2_82"}, {"question": "For the graph transformation $$y=f(x+3)$$, does the graph shift left or right, and why is the direction counterintuitive? (2 steps)", "answer": "- Step 1: $$y=f(x+3)$$ shifts the graph **LEFT by 3**. Each original point $$(x,y)$$ moves to $$(x-3,y)$$. For example, $$(-1,0)$$ becomes $$(-4,0)$$ and $$(0,2)$$ becomes $$(-3,2)$$. The shift is in the opposite direction of the sign inside the brackets.\n- Step 2: The counterintuitive direction arises because the transformation is on the **input**. To get the same output as the original at $$x$$, you now need to feed in $$x+3$$ — meaning the graph has moved to where $$x$$ is 3 less. The rule: **inside the function → horizontal, and the direction is reversed**. This contrasts with $$f(x)+3$$ (outside), which shifts UP by 3 — the intuitive direction.\n\nTakeaway: Inside $$f(\\;)$$ → horizontal (reversed direction). Outside $$f(\\;)$$ → vertical (intuitive direction).", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "Given the area of a triangle and two sides, how do you find the included angle, and why must you be careful about obtuse angles? (3 steps)", "answer": "- Step 1: Use the SAS area formula $$A=\\frac{1}{2}ab\\sin C$$ and solve for $$\\sin C$$. For area $$=100$$, $$a=15$$, $$b=25$$: $$100=\\frac{1}{2}(15)(25)\\sin\\theta \\Rightarrow \\sin\\theta=\\frac{8}{15}$$.\n- Step 2: From $$\\sin\\theta=\\frac{8}{15}$$, you get $$\\cos^{2}\\theta=1-\\frac{64}{225}=\\frac{161}{225}$$, so $$\\cos\\theta=\\pm\\frac{\\sqrt{161}}{15}$$. There are TWO possible angles with the same sine — one acute, one obtuse.\n- Step 3: If the question states $$\\theta>90°$$ (obtuse), then $$\\cos\\theta<0$$, so you must pick $$\\cos\\theta=-\\frac{\\sqrt{161}}{15}$$. This directly affects the Cosine Rule calculation for the opposite side. Using the wrong sign gives the wrong side length.\n\nTakeaway: $$\\sin\\theta$$ alone doesn't uniquely determine the angle. The range (acute vs obtuse) determines the sign of $$\\cos\\theta$$.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "How do you complete the square for $$f(x)=2x^{2}-12x+14$$, and what does the completed form reveal? (3 steps)", "answer": "- Step 1: Factor out the leading coefficient from the quadratic terms: $$2(x^{2}-6x)+14$$.\n- Step 2: Complete the square inside: $$x^{2}-6x=(x-3)^{2}-9$$. So $$2\\left[(x-3)^{2}-9\\right]+14=2(x-3)^{2}-18+14=2(x-3)^{2}-4$$.\n- Step 3: The completed form $$a(x-h)^{2}+k$$ reveals: minimum at $$(h,k)=(3,-4)$$ since $$a=2>0$$ (parabola opens upward). If $$a<0$$, it would be a maximum.\n\nGeneral formula: $$ax^{2}+bx+c=a\\left(x+\\frac{b}{2a}\\right)^{2}+c-\\frac{b^{2}}{4a}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_45"}, {"question": "When factorising a quadratic $$ax^2 + bx + c$$ where $$a \\neq 1$$, what is the \"AC method\" trick for splitting the middle term, and why does finding two numbers that multiply to $$ac$$ and add to $$b$$ work? (3 steps)", "answer": "- Step 1: The goal is to split the middle term $$bx$$ into two terms $$px + qx$$ so that we can factor by grouping. We need $$p + q = b$$ and the coefficients of the split terms must share a common factor with $$a$$ and $$c$$ respectively.\n- Step 2: By finding two numbers that multiply to $$ac$$ and add to $$b$$, we guarantee that when we split $$bx$$ into $$px + qx$$, the ratio of the coefficients will be consistent. For example, in $$21x^2 + 10x + 1$$, $$ac = 21$$ and $$b = 10$$. The numbers 7 and 3 multiply to 21 and add to 10.\n+ Sub-case: We split as $$21x^2 + 7x + 3x + 1$$.\n- Step 3: Factor by grouping: $$7x(3x + 1) + 1(3x + 1) = (7x + 1)(3x + 1)$$. This works because the product of the \"outer\" and \"inner\" coefficients ($$7 \\times 3 = 21$$) gives the required $$ac$$ term, while their sum gives the $$b$$ term.\n\nThe AC method transforms a hard-to-factor quadratic into a simple grouping problem.", "source": "GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "How does writing $$f(x) = 2x^2 - 12x + 14$$ in completed-square form $$a(x+b)^2 + c$$ help identify the boundary inequalities for a region involving the curve? (2 steps)", "answer": "- Step 1: Completing the square yields $$2(x-3)^2 - 4$$, immediately revealing the vertex at $$(3, -4)$$. This is the minimum point of the parabola, which is crucial because the region may be bounded below by this minimum or may lie above/below the curve.\n- Step 2: Knowing the vertex and direction of opening (upwards, since $$a=2>0$$) allows you to sketch the curve accurately. The inequality describing the region relative to the curve—whether $$y \\leq f(x)$$ or $$y \\geq f(x)$$—can then be verified by testing a point and referencing the vertex location.", "source": "Kimi K2.6 ①", "_id": "kimi_1_37"}, {"question": "How do you conceptually distinguish vertical transformations (outside $$f$$) from horizontal transformations (inside $$f$$), and why do horizontal ones feel \"backwards\"? (2 steps)", "answer": "- Step 1: Transformations outside the function, such as $$af(x)$$ or $$f(x)+a$$, act directly on the output $$y$$. They stretch, compress, or shift the graph vertically in the intuitive direction: addition moves up, negative reflection flips over the $$x$$-axis.\n- Step 2: Transformations inside the function, such as $$f(x+a)$$ or $$f(ax)$$, act on the input $$x$$ before the function processes it. Because the input is altered pre-computation, the graph moves horizontally in the opposite direction to the sign. This \"reversal\" occurs because you must compensate in the input domain to reach the same internal value of $$f$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_16"}, {"question": "In a triangle with sides 4, 6, 9 cm, you want the angle opposite the longest side. Before computing, what does geometry tell you about the nature of this angle, and what sign will $$\\cos$$ have? (3 steps)", "answer": "- Step 1: The longest side of a triangle is always opposite the largest angle — this is a direct consequence of the sine rule ($$\\sin$$ increases with angle on $$[0, \\pi/2]$$).\n- Step 2: Check if the triangle is obtuse: if $$a^2 > b^2 + c^2$$ (with $$a$$ largest), then the opposite angle exceeds $$\\pi/2$$. Here, $$81 > 16 + 36 = 52$$, so the angle IS obtuse.\n- Step 3: Obtuse angle → $$\\cos < 0$$. So when applying the cosine rule, expect $$\\cos\\alpha = \\frac{52 - 81}{48} = -\\frac{29}{48}$$ (negative, as predicted).\n\nThis \"obtuse check\" is a powerful sanity filter before you even compute.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "When an expression like $$\\left(\\frac{ab^{3}}{2}\\right)^{-4/3}$$ appears, what is the conceptual first move, and why is it often easier to flip the fraction before handling the fractional exponent? (3 steps)", "answer": "- Step 1: Recognise that the negative exponent applies to the entire grouped fraction. The first move is to rewrite the expression as the reciprocal raised to the positive exponent: $$\\left(\\frac{2}{ab^{3}}\\right)^{4/3}$$.\n- Step 2: Flipping first is easier because fractional exponents involve both roots and powers; working with positive exponents keeps the interpretation straightforward (raise to the 4th power, then take the cube root, or vice versa).\n- Step 3: After flipping, simplify the inner product $$ab^{3}$$ using previously found values if available, then distribute the exponent $$4/3$$ across the remaining numerator and denominator separately.", "source": "Kimi K2.6 ②", "_id": "kimi_2_25"}, {"question": "Sketch the graph of $$y = \\sin x$$ from $$0$$ to $$2\\pi$$. Mark the maximum, minimum, and zeros.", "answer": "From $$0$$ to $$2\\pi$$:\n- At $$x = 0$$: $$y = 0$$ (zero)\n- At $$x = \\frac{\\pi}{2}$$: $$y = 1$$ (maximum)\n- At $$x = \\pi$$: $$y = 0$$ (zero)\n- At $$x = \\frac{3\\pi}{2}$$: $$y = -1$$ (minimum)\n- At $$x = 2\\pi$$: $$y = 0$$ (zero)\n\nThe graph is a wave starting at the origin, rising to peak at $$\\frac{\\pi}{2}$$, crossing at $$\\pi$$, falling to trough at $$\\frac{3\\pi}{2}$$, and returning to zero at $$2\\pi$$.", "source": "MiniMax ①", "_id": "minimax_1_44"}, {"question": "What does the discriminant $$\\Delta = b^2 - 4ac$$ of a quadratic reveal geometrically about the intersection of a line and a curve, and how does this connect to the quadratic formula? (3 steps)", "answer": "- Step 1: When a line and curve intersect, substituting the line equation into the curve yields a quadratic. The discriminant of this quadratic determines the number of real solutions.\n- Step 2: Geometrically, $$\\Delta > 0$$ means two distinct intersection points; $$\\Delta = 0$$ means the line is tangent to the curve (exactly one repeated root); $$\\Delta < 0$$ means no real intersection.\n- Step 3: In the quadratic formula $$x = \\frac{-b \\pm \\sqrt{\\Delta}}{2a}$$, the term $$\\sqrt{\\Delta}$$ is only real when $$\\Delta \\geq 0$$. The value of $$\\Delta$$ therefore controls whether real $$x$$-coordinates exist and whether they are distinct.", "source": "Kimi K2.6 ①", "_id": "kimi_1_8"}, {"question": "Why does multiplying an inequality by a negative number flip the inequality sign, but multiplying by a positive doesn't?", "answer": "Inequalities describe ordering on the number line. Multiplying by a positive preserves order: if $$a < b$$, then $$3a < 3b$$.\n\nMultiplying by a negative REVERSES order: if $$a < b$$, then $$-3a > -3b$$. Example: $$2 < 5$$, but $$-2 > -5$$.\n\nGeometric intuition: multiplication by a negative reflects the number line through 0. Whatever was to the left is now to the right.\n\n**Application**: when manipulating inequalities in region problems, be careful — if you divide or multiply by a variable expression, you must know its sign (or split into cases).", "source": "Opus 4.7 ①", "_id": "opus_1_140"}, {"question": "State the arc length and sector area formulas, with units and restrictions.", "answer": "- **Arc length**: $$\\ell = r\\theta$$\n- **Sector area**: $$A = \\frac{1}{2}r^2\\theta$$\n- **Segment area** (cap cut by chord): $$A_{\\text{segment}} = \\frac{1}{2}r^2(\\theta - \\sin\\theta)$$\n\n**Restriction**: $$\\theta$$ MUST be in **radians**, not degrees. If given degrees, convert first: $$\\theta_{\\text{rad}} = \\theta_{\\text{deg}} \\times \\frac{\\pi}{180}$$.\n\n**Units**: $$r$$ in cm gives $$\\ell$$ in cm and $$A$$ in $$\\text{cm}^2$$. Mixed units are an easy mistake — always cross-check.", "source": "Opus 4.7 ①", "_id": "opus_1_69"}, {"question": "\"Region $$R$$ has 4 boundaries: $$x$$-axis, $$y$$-axis, line $$l$$, curve $$C$$.\" What's the general expectation for the inequalities?", "answer": "4 boundaries → 4 inequalities. For each boundary, determine which side $$R$$ lies on:\n- $$x$$-axis ($$y = 0$$): above ($$y \\geq 0$$) or below ($$y \\leq 0$$)?\n- $$y$$-axis ($$x = 0$$): right ($$x \\geq 0$$) or left ($$x \\leq 0$$)?\n- Line $$l$$: above/below, via comparing to $$y = \\text{line expression}$$.\n- Curve $$C$$: above/below, via $$y \\geq / \\leq \\text{curve expression}$$.\n\nAlways verify with a sample point inside $$R$$. Never fewer than 4 inequalities, never more.", "source": "Opus 4.7 ①", "_id": "opus_1_101"}, {"question": "A curve has $$f'(x) = 4x^{3/2} + \\frac{k}{x^2}$$. Given that $$f''(2) = 0$$ at point $$P(2, 8\\sqrt{2})$$, find (a) the exact value of $$k$$ and (b) the equation of the curve. (4 steps)", "answer": "- Step 1: **(a) Find $$f''(x)$$** by differentiating $$f'(x)$$:\n$$f'(x) = 4x^{3/2} + kx^{-2}$$\n$$f''(x) = 4 \\cdot \\frac{3}{2}x^{1/2} + k(-2)x^{-3} = 6x^{1/2} - 2kx^{-3}$$\n- Step 2: **Set $$f''(2) = 0$$** to find $$k$$:\n$$6\\sqrt{2} - 2k(2^{-3}) = 0 \\Rightarrow 6\\sqrt{2} - \\frac{2k}{8} = 0$$\n$$6\\sqrt{2} = \\frac{k}{4} \\Rightarrow k = 24\\sqrt{2}$$\n- Step 3: **(b) Integrate $$f'(x)$$** with $$k = 24\\sqrt{2}$$:\n$$f(x) = \\int\\left(4x^{3/2} + \\frac{24\\sqrt{2}}{x^2}\\right)dx = \\frac{8}{5}x^{5/2} - \\frac{24\\sqrt{2}}{x} + C$$\n- Step 4: **Use point $$P(2, 8\\sqrt{2})$$** to find $$C$$:\n$$8\\sqrt{2} = \\frac{8}{5}(2^{5/2}) - \\frac{24\\sqrt{2}}{2} + C$$\n$$2^{5/2} = 4\\sqrt{2}$$, so:\n$$8\\sqrt{2} = \\frac{8}{5}(4\\sqrt{2}) - 12\\sqrt{2} + C = \\frac{32\\sqrt{2}}{5} - 12\\sqrt{2} + C$$\n$$C = 8\\sqrt{2} + 12\\sqrt{2} - \\frac{32\\sqrt{2}}{5} = \\frac{68\\sqrt{2}}{5}$$\n$$f(x) = \\frac{8}{5}x^{5/2} - \\frac{24\\sqrt{2}}{x} + \\frac{68\\sqrt{2}}{5}$$", "source": "MiniMax ①", "_id": "minimax_1_16"}, {"question": "For a region $$R$$ defined by $$y \\geq 0$$, $$y \\leq x + 2$$, $$y \\geq x^2 - x$$: describe the region in words.", "answer": "- $$y \\geq 0$$: above the $$x$$-axis.\n- $$y \\leq x + 2$$: below the line $$y = x + 2$$.\n- $$y \\geq x^2 - x$$: above the parabola $$y = x^2 - x$$.\n\n**Combining**: $$R$$ is the region above the $$x$$-axis AND bounded between the parabola (below) and the line (above). Since the parabola $$y = x^2 - x = x(x-1)$$ crosses the $$x$$-axis at $$x = 0, 1$$, the bottom boundary is sometimes the parabola and sometimes the $$x$$-axis (whichever is higher).\n\n$$R$$ is a somewhat complex shape — a \"three-sided\" region with a lid (line), floor (parabola above the axis OR the axis itself), and ends where the line meets the parabola.", "source": "Opus 4.7 ①", "_id": "opus_1_160"}, {"question": "What does \"hence\" mean in an exam question, and why is it a critical instruction? (2 steps)", "answer": "- Step 1: \"Hence\" means you **must use your previous answer** to proceed — it's not optional. The exam is telling you there's a direct link between parts.\n- Step 2: If part (a) asked you to show $$k^{2}+26k+169=0$$ and part (b) says \"hence find coordinates of $$P$$\", you solve $$(k+13)^{2}=0$$ to get $$k=-13$$, then substitute — you don't start from scratch.\n\nIgnoring \"hence\" and redoing work from the beginning wastes time and may not earn method marks.", "source": "GLM 5.1 ①", "_id": "glm_1_49"}, {"question": "The formula for the distance between $$(x_1, y_1)$$ and $$(x_2, y_2)$$ is $$d = \\sqrt{(x_2 - x_1)^2 + (y_2 - y_1)^2}$$. Explain why this is the Pythagorean theorem in disguise.", "answer": "Draw a right triangle with:\n- Horizontal leg: $$|x_2 - x_1|$$ (change in $$x$$)\n- Vertical leg: $$|y_2 - y_1|$$ (change in $$y$$)\n- Hypotenuse: the straight-line distance $$d$$.\n\nPythagoras says $$d^2 = (\\Delta x)^2 + (\\Delta y)^2$$, so $$d = \\sqrt{(\\Delta x)^2 + (\\Delta y)^2}$$. The squaring absorbs the absolute values (since $$(-3)^2 = 3^2$$), so we can just use signed differences.\n\nThe formula generalises to 3D: $$d = \\sqrt{(\\Delta x)^2 + (\\Delta y)^2 + (\\Delta z)^2}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_74"}, {"question": "Why must the angle $$\\theta$$ be measured in radians for the arc-length formula $$\\ell = r\\theta$$ and the sector-area formula $$A=\\frac{1}{2}r^{2}\\theta$$ to hold true without extra conversion factors? (3 steps)", "answer": "- Step 1: One radian is defined as the angle subtended at the centre of a circle by an arc whose length equals the radius. By definition, when $$\\theta = 1$$ radian, the arc length is exactly $$r$$.\n- Step 2: The full circumference is $$2\\pi r$$. Since a full revolution is $$2\\pi$$ radians, the formula $$\\ell = r\\theta$$ gives $$r(2\\pi)=2\\pi r$$, matching the circumference perfectly. If degrees were used, a conversion factor $$\\frac{\\pi}{180}$$ would be required.\n- Step 3: Sector area is the fraction $$\\frac{\\theta}{2\\pi}$$ of the full circle area $$\\pi r^{2}$$. Multiplying gives $$A = \\frac{\\theta}{2\\pi}\\cdot\\pi r^{2} = \\frac{1}{2}r^{2}\\theta$$. Again, this clean cancellation only works because the angle is in radians, making the $$2\\pi$$ denominators cancel naturally.", "source": "Kimi K2.6 ②", "_id": "kimi_2_6"}, {"question": "Suppose you're given that a region $$R$$ has exactly 3 boundaries: a line, a curve, and the $$x$$-axis. What inequalities might describe $$R$$?", "answer": "3 boundaries → 3 inequalities. The specific signs depend on $$R$$'s location:\n\nExample setup:\n- $$R$$ above the $$x$$-axis: $$y \\geq 0$$\n- $$R$$ below the line $$y = mx + c$$: $$y \\leq mx + c$$\n- $$R$$ above the curve $$y = ax^2 + bx + d$$: $$y \\geq ax^2 + bx + d$$\n\nOR different sign combinations depending on whether $$R$$ is above/below each boundary. Always verify with a sample point inside $$R$$.", "source": "Opus 4.7 ①", "_id": "opus_1_177"}, {"question": "Find $\\int(10x^4 - \\frac{3}{2x^3} - 7)dx$. Show the key step of rewriting before integrating. (3 steps)", "answer": "- Step 1: CRITICAL — rewrite any term with x in the denominator as a negative power:\n+ $\\frac{3}{2x^3} = \\frac{3}{2}x^{-3}$\n- Step 2: Integrate each term using $\\int x^n dx = \\frac{x^{n+1}}{n+1} + C$:\n+ $\\int 10x^4 dx = 10 \\cdot \\frac{x^5}{5} = 2x^5$\n+ $\\int -\\frac{3}{2}x^{-3} dx = -\\frac{3}{2} \\cdot \\frac{x^{-2}}{-2} = \\frac{3}{4}x^{-2} = \\frac{3}{4x^2}$\n+ $\\int -7 dx = -7x$\n- Step 3: Combine: $2x^5 + \\frac{3}{4x^2} - 7x + C$\n\n**Key insight:** Never integrate $\\frac{1}{x^n}$ directly. Always convert to $x^{-n}$ first, then apply the power rule.", "source": "MiniMax ②", "_id": "minimax_2_8"}, {"question": "For time management in exams: when should you \"redo\" a question, and when should you commit to moving on?", "answer": "- **Redo** if:\n+ The question is worth many marks (e.g., 5+).\n+ You've spotted a specific error you can fix quickly.\n+ You've done the question to a sanity-check point that reveals an inconsistency.\n- **Move on** if:\n+ You've spent more than ~1.5x the \"time budget\" (based on marks).\n+ You've hit a conceptual block you can't identify.\n+ Other easier questions remain unattempted.\n\n**Strategy**: mark the question for later return. Complete easier/bigger-value questions first. Return with fresh eyes if time permits.", "source": "Opus 4.7 ①", "_id": "opus_1_162"}, {"question": "In solving $$(k+13)^2 = 0$$ — explain why there's a REPEATED root and what it means geometrically for the $$k$$-equation's discriminant.", "answer": "$$(k+13)^2 = 0$$ is equivalent to $$k^2 + 26k + 169 = 0$$, a quadratic IN $$k$$. Its discriminant is $$26^2 - 4(1)(169) = 676 - 676 = 0$$.\n\nSo the quadratic in $$k$$ has a REPEATED root: $$k = -13$$ (twice).\n\n**Geometric meaning**: the \"discriminant = 0\" condition on the original quadratic (in $$x$$) produces another \"discriminant = 0\" condition in $$k$$, which is a polynomial equation with a single (repeated) root.\n\nThis is elegant: the \"tangent\" condition propagates through the algebra — tangency of curves translates to \"tangency\" (repeated root) in the parameter equation.", "source": "Opus 4.7 ①", "_id": "opus_1_182"}, {"question": "When a question asks for the region satisfying two inequalities simultaneously — for example $$y < x+2$$ and $$y > x^{2}-x$$ — what is the correct conceptual procedure to identify the final shaded area? (3 steps)", "answer": "- Step 1: Handle each inequality independently. Shade the half-plane below the line for the first inequality, and shade the region above the parabola for the second inequality.\n- Step 2: The solution set of a system of inequalities is the intersection (overlap) of the individual solution sets. Only points that satisfy both conditions simultaneously are valid.\n- Step 3: The resulting region is the \"lens\" where the two shadings coincide. If asked for boundary points, solve the equality $$x+2 = x^{2}-x$$ to find where the boundaries intersect; these intersection $$x$$-values often define the horizontal extent of the overlapping region.", "source": "Kimi K2.6 ②", "_id": "kimi_2_4"}, {"question": "What is the difference between \"show that,\" \"find,\" \"state,\" and \"explain\" in exam language? (2 steps)", "answer": "- Step 1: \"Show that\" → your working must lead clearly to the stated answer (they give you the destination; demonstrate the route). \"Find\" → produce the answer yourself (destination unknown). \"State\" → no working needed, just write the answer (implies it's directly obvious). \"Explain\" → words required, not just algebra; give a reason or justification.\n- Step 2: \"Exact value\" → leave in surd/fraction form, no decimals. \"To 3 s.f.\" → decimal rounding required. Mixing these up loses marks.", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "Write out the Pythagorean identity, and show how to get $$\\cos\\theta$$ from a given $$\\sin\\theta$$. (3 steps)", "answer": "- Step 1: Identity: $$\\sin^2\\theta + \\cos^2\\theta = 1$$, valid for all real $$\\theta$$.\n- Step 2: Rearrange: $$\\cos^2\\theta = 1 - \\sin^2\\theta$$, so $$\\cos\\theta = \\pm\\sqrt{1 - \\sin^2\\theta}$$.\n- Step 3: Resolve ± by quadrant:\n+ Acute: $$\\cos > 0$$, take +\n+ Obtuse (in a triangle): $$\\cos < 0$$, take −\n\nFor an obtuse angle: pick the negative root.", "source": "Opus 4.7 ②", "_id": "opus_2_78"}, {"question": "A student is told the line $$y = 4x + c$$ is a tangent to the curve $$y = 2x^2 + 8x + 3$$. They write $$\\frac{dy}{dx} = 4x + c$$. What conceptual error have they made?", "answer": "They've conflated the *line* with its *gradient*. For a line $$y = mx + c$$, the symbol $$m$$ is a single number — the gradient. Setting $$\\frac{dy}{dx}$$ equal to the whole line equation $$4x + c$$ treats it as if the gradient itself depends on $$x$$, which is only true for curves.\n\nThe correct interpretation: at a tangent point, the *slope of the curve* equals the *slope of the line*, which is simply the coefficient of $$x$$ in the line's equation. So we set $$4x + 8 = 4$$, not $$4x + 8 = 4x + c$$. The $$+c$$ is the y-intercept and plays no role in matching gradients.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "The curves $C_1: xy = \\frac{15}{2} + 5x$ and $C_2: y = x^3 - \\frac{7}{2}x + 5$ meet at P and Q. Given they satisfy $2x^4 - 7x^2 - 15 = 0$, find the exact distance PQ. (4 steps)", "answer": "- Step 1: Let $u = x^2$. Then $2u^2 - 7u - 15 = 0$\n- Step 2: Factor: $(2u + 3)(u - 5) = 0 \\Rightarrow u = 5$ or $u = -3/2$\n+ Since $u = x^2 \\geq 0$, reject $u = -3/2$\n+ $x^2 = 5 \\Rightarrow x = \\pm\\sqrt{5}$\n- Step 3: Find y-coordinates:\n+ For $x = \\sqrt{5}$: $y = \\frac{15}{2\\sqrt{5}} + 5 = \\frac{3\\sqrt{5}}{2} + 5$\n+ For $x = -\\sqrt{5}$: $y = \\frac{15}{-2\\sqrt{5}} + 5 = -\\frac{3\\sqrt{5}}{2} + 5$\n- Step 4: Distance PQ = $\\sqrt{(\\sqrt{5} - (-\\sqrt{5}))^2 + (\\frac{3\\sqrt{5}}{2} + 5 - (-\\frac{3\\sqrt{5}}{2} + 5))^2}$\n+ = $\\sqrt{(2\\sqrt{5})^2 + (3\\sqrt{5})^2} = \\sqrt{20 + 45} = \\sqrt{65}$\n\n**Key technique:** Biquadratic equations ($ax^4 + bx^2 + c = 0$) are solved by substituting $u = x^2$.", "source": "MiniMax ②", "_id": "minimax_2_28"}, {"question": "Given $$f'(x) = 4x^{3/2} + kx^{-2}$$ and $$f''(x)$$ has a zero at $$x = 2$$, describe how to find $$k$$. (3 steps)", "answer": "- Step 1: Differentiate $$f'$$ to get $$f''$$: $$f''(x) = 6x^{1/2} - 2kx^{-3}$$ (power rule: $$\\tfrac{d}{dx}(x^{3/2}) = \\tfrac{3}{2}x^{1/2}$$, so $$\\tfrac{d}{dx}(4x^{3/2}) = 6x^{1/2}$$).\n- Step 2: Set $$f''(2) = 0$$: $$6\\sqrt{2} - \\tfrac{2k}{8} = 0 \\Rightarrow 6\\sqrt{2} = \\tfrac{k}{4}$$.\n- Step 3: Solve: $$k = 24\\sqrt{2}$$.\n\nKey: $$x^{1/2} = \\sqrt{x}$$, so $$2^{1/2} = \\sqrt{2}$$; and $$x^{-3}$$ at $$x = 2$$ is $$\\tfrac{1}{8}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "Why is it critical to use the CURVE equation (not the line) when finding the $$y$$-coordinate of the tangent point? (2 steps)", "answer": "- Step 1: The tangent point lies on BOTH the curve and the line. But after finding $$x$$ from the gradient condition, you should substitute into the **curve** equation because the curve is the original, unmodified function. The line equation still has an unknown $$c$$ at this stage — you can't use it to find $$y$$.\n- Step 2: Even if $$c$$ were known, using the curve is safer because it's the definitive location of the point. The line equation might have been written incorrectly. The sequence is always: differentiate curve → match gradient → find $$x$$ → substitute into curve for $$y$$ → then use the point in the line equation for $$c$$.\n\nTakeaway: Find $$y$$ from the curve (known equation), not the line (has unknown $$c$$). Curve first, line second.", "source": "GLM 5.1 ③", "_id": "glm_3_86"}, {"question": "What does \"$$y \\geq 0$$\" mean geometrically, and what does \"$$x \\geq 0$$\" mean? How do these appear as boundaries of a region?", "answer": "$$y \\geq 0$$ means the region is **above the $$x$$-axis** (including the axis itself). $$x \\geq 0$$ means the region is **to the right of the $$y$$-axis** (including the axis).\n\nThese are half-plane boundaries. A region bounded by both axes plus two curves would need four inequalities: $$x \\geq 0$$, $$y \\geq 0$$, $$y \\leq$$ (upper curve/line), and $$y \\leq$$ or $$y \\geq$$ (other boundary).", "source": "GLM 5.1 ①", "_id": "glm_1_23"}, {"question": "When given the area of a triangle and two sides (SAS), which formula is the most direct to find the included angle, and why can't you use the Cosine Rule immediately? (2 steps)", "answer": "- Step 1: Use the Area formula: $$\\text{Area} = \\frac{1}{2} a b \\sin C$$.\n- Step 2: The Cosine Rule ($$a^2 = b^2 + c^2 - 2bc \\cos A$$) requires knowing the third side or the angle itself. Since you only have two sides and the area, you can isolate $$\\sin C$$ directly from the area formula to find the angle.\n\nArea $$\\rightarrow \\sin$$. Side $$\\rightarrow$$ Cosine/Sine rule.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "The perimeter of a composite platform = outer major arc + inner minor arc + two straight sides $$DA$$ and $$BC$$. Why are these the only boundary pieces, and how do you compute each? (3 steps)", "answer": "- Step 1: The straight sides $$DA$$ and $$BC$$ connect the inner radius endpoints to the outer radius endpoints. Since $$A$$ is between $$D$$ and $$O$$, the straight piece that's on the boundary is $$DA$$ (and its counterpart $$BC$$) — NOT the full radius $$DO$$.\n- Step 2: Outer major arc: $$\\ell = (5x)(2\\pi - 0.8)$$ — note we use $$2\\pi - 0.8$$ because the *major* sector spans the complement of $$0.8$$ rad.\n- Step 3: Inner minor arc is the given $$9$$ m (from arc $$CD$$). The two straight sides each have length $$DA = 3x$$.\n\nTotal: $$\\ell_{\\text{major}} + 9 + 2(3x)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "Why is the condition \"$$f''(P)=0$$\" useful in problems with an unknown constant $$k$$, and how does it help avoid the two-unknowns trap? (2 steps)", "answer": "- Step 1: $$f''(P)=0$$ gives you an equation involving only $$k$$ (and known values), because $$f''$$ is computed from $$f'$$ by differentiation — no integration constant appears. For $$f'(x)=4x^{3/2}+kx^{-2}$$: $$f''(x)=6x^{1/2}-2kx^{-3}$$, and setting $$f''(2)=0$$ gives $$6\\sqrt{2}-\\frac{2k}{8}=0 \\Rightarrow k=24\\sqrt{2}$$.\n- Step 2: Without this condition, integrating $$f'$$ would introduce both $$k$$ and $$C$$, and a single point $$P$$ gives only one equation — insufficient for two unknowns. The $$f''$$ condition resolves $$k$$ first, leaving only $$C$$ to find from the point. The strategy: always look for conditions that involve fewer unknowns and resolve them first.\n\nTakeaway: $$f''(P)=0$$ gives an equation in $$k$$ only — resolve $$k$$ first, then integrate to find $$C$$.", "source": "GLM 5.1 ③", "_id": "glm_3_56"}, {"question": "$$\\sin\\theta = -1$$ when $$\\theta$$ equals what, in general form? (3 steps)", "answer": "- Step 1: $$\\sin\\theta = -1$$ at the bottom of the unit circle, where the point is $$(0, -1)$$.\n- Step 2: The principal angle is $$\\theta = \\tfrac{3\\pi}{2}$$ (equivalently $$-\\tfrac{\\pi}{2}$$).\n- Step 3: By periodicity of sine (period $$2\\pi$$), general solution: $$\\theta = \\tfrac{3\\pi}{2} + 2n\\pi$$ for any integer $$n$$.\n\nComplement: $$\\sin\\theta = 1$$ at $$\\theta = \\tfrac{\\pi}{2} + 2n\\pi$$; $$\\cos\\theta = 1$$ at $$\\theta = 2n\\pi$$; $$\\cos\\theta = -1$$ at $$\\theta = \\pi + 2n\\pi$$.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "A triangle has sides 4, 6, and 9 cm. You need to find the angle opposite the side of length 9. Which rule applies, and why? (3 steps)", "answer": "- Step 1: The Cosine Rule $$a^2 = b^2 + c^2 - 2bc\\cos A$$ is the tool whenever you know three sides (and want an angle) OR two sides and the included angle (and want the third side).\n- Step 2: The Sine Rule requires knowing at least one angle-opposite-side pair, which we do NOT have here — so it can't even get started.\n- Step 3: Rearrange: $$\\cos A = \\tfrac{b^2 + c^2 - a^2}{2bc}$$, with $$a = 9$$ (the side opposite the wanted angle) and $$b, c = 4, 6$$. This gives $$\\cos\\alpha = \\tfrac{16 + 36 - 81}{48} = -\\tfrac{29}{48}$$, which is negative, so $$\\alpha$$ is obtuse.\n\nCue: \"three sides given, angle wanted\" → always Cosine Rule.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "In triangle area problems, why is it important to identify which angle is \"included\" between the given sides?", "answer": "The SAS area formula $$\\frac{1}{2}ab\\sin C$$ requires $$C$$ to be the angle BETWEEN sides $$a$$ and $$b$$. Using a non-included angle produces the WRONG number.\n\n**Why**: the formula comes from height = $$b\\sin C$$ (perpendicular from the opposite vertex onto side $$a$$). If $$C$$ weren't between $$a$$ and $$b$$, then $$b\\sin C$$ wouldn't be the correct height.\n\n**Practical check**: label the triangle's vertices. The angle at vertex $$P$$ IS between the two sides emanating from $$P$$. If the angle given is at $$P$$, then the sides emanating from $$P$$ are the two sides to use with SAS.", "source": "Opus 4.7 ①", "_id": "opus_1_180"}, {"question": "When finding the equation of a tangent line $$y = mx + c$$ to a curve, why must $$\\frac{dy}{dx}$$ be set equal to the scalar gradient $$m$$ rather than to the full line expression $$mx + c$$? (3 steps)", "answer": "- Step 1: The derivative $$\\frac{dy}{dx}$$ represents the instantaneous gradient of the curve at a specific point, which is a single numerical value (a rate of change), not a $$y$$-coordinate.\n- Step 2: The line $$y = mx + c$$ has its own gradient, the coefficient $$m$$. At the point of tangency, the curve's gradient equals the line's gradient. Setting $$\\frac{dy}{dx} = mx + c$$ incorrectly equates a slope to a $$y$$-value, violating dimensional consistency.\n- Step 3: The correct procedure is: solve $$\\frac{dy}{dx} = m$$ to find the $$x$$-coordinate of contact, compute the corresponding $$y$$-coordinate from the original curve, and only then substitute this point into $$y = mx + c$$ to solve for $$c$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_5"}, {"question": "When equating two curves to find intersections and one side has a fraction like $$\\frac{15}{2x}+5$$, what algebraic steps are needed? (3 steps)", "answer": "- Step 1: Equate the $$y$$-values: $$\\frac{15}{2x}+5=x^{3}-\\frac{7}{2}x+5$$.\n- Step 2: Cancel any terms appearing on both sides — the $$+5$$ cancels immediately, simplifying to $$\\frac{15}{2x}=x^{3}-\\frac{7}{2}x$$.\n- Step 3: Multiply through by the denominator ($$2x$$, noting $$x\\neq 0$$) to clear the fraction: $$15=2x^{4}-7x^{2}$$, rearrange to $$2x^{4}-7x^{2}-15=0$$.\n\nWatch for immediately-cancelling terms — they simplify the problem significantly.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "Why does a major sector’s angle equal $2\\pi - \\alpha$ when $\\alpha$ is acute?", "answer": "- Step 1: A full circle is $2\\pi$ radians.  \n- Step 2: If $\\alpha$ is acute ($< \\frac{\\pi}{2}$), the remaining angle $2\\pi - \\alpha$ spans the larger portion.  \n- Step 3: Sector area uses the angle $2\\pi - \\alpha$ for the major sector.  \n+ Example: If $\\alpha = \\frac{\\pi}{3}$, the major angle is $2\\pi - \\frac{\\pi}{3} = \\frac{5\\pi}{3}$.  \n+ Misconception: A major sector is always larger than a semicircle ($\\pi$ radians).  \n\n**Takeaway:** The major sector’s angle is the larger of the two angles formed by a chord in a circle.", "source": "Qwen 3 ④", "_id": "qwen_4_3"}, {"question": "Why is sketching FIRST more important than writing inequalities FIRST for a region $$R$$? (3 steps)", "answer": "- Step 1: The inequality form depends on $$R$$'s spatial location relative to each boundary — above/below, left/right.\n- Step 2: Without a sketch, you're guessing signs. One wrong sign gives a completely different region.\n- Step 3: A good sketch shows (i) each boundary, (ii) intersection points, (iii) the bounded region shaded. Then writing inequalities is nearly mechanical.\n\nPhuc's sign errors typically stem from under-detailed sketches.", "source": "Opus 4.7 ②", "_id": "opus_2_113"}, {"question": "What is the vertex (minimum if $$a > 0$$) of the parabola $$y = a(x - h)^2 + k$$, and why? (3 steps)", "answer": "- Step 1: $$(x - h)^2 \\ge 0$$ for all $$x$$, with equality iff $$x = h$$.\n- Step 2: So $$a(x - h)^2 \\ge 0$$ (for $$a > 0$$), meaning the minimum of this term is $$0$$ at $$x = h$$.\n- Step 3: Thus $$y = a(x-h)^2 + k$$ has minimum value $$k$$ at $$x = h$$, giving the vertex $$(h, k)$$. For $$a < 0$$, this becomes the maximum.\n\nExample: $$2(x-3)^2 - 4$$ has minimum vertex at $$(3, -4)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_67"}, {"question": "Why should you always CHECK an intersection-count result against the boundary cases of the discriminant?", "answer": "To catch off-by-one errors. E.g., for \"4 distinct\" requiring $$0 < A < 4$$:\n- Check $$A = 0$$: substitution gives $$x^4 - 4x^2 = 0 \\Rightarrow x^2(x^2 - 4) = 0 \\Rightarrow x = 0, \\pm 2$$. Only 3 distinct $$x$$ — not 4. So $$A = 0$$ is indeed excluded ✓.\n- Check $$A = 4$$: $$x^4 - 4x^2 + 4 = (x^2 - 2)^2 = 0 \\Rightarrow x^2 = 2 \\Rightarrow x = \\pm\\sqrt{2}$$. Only 2 distinct $$x$$ — not 4. So $$A = 4$$ is excluded ✓.\n- Check $$A = 2$$ (interior): $$x^4 - 4x^2 + 2 = 0$$. Discriminant in $$u$$: $$16 - 8 = 8 > 0$$. Roots $$u = (4 \\pm 2\\sqrt{2})/2 = 2 \\pm \\sqrt{2}$$, both positive. So 4 real $$x$$ ✓.\n\nBoundary testing validates the range you derived.", "source": "Opus 4.7 ①", "_id": "opus_1_171"}, {"question": "A curve $$y = f(x)$$ has a NORMAL at point $$P = (a, f(a))$$. State the normal equation and why it's perpendicular to the tangent. (3 steps)", "answer": "- Step 1: The tangent at $$P$$ has gradient $$f'(a)$$. The normal is PERPENDICULAR to the tangent.\n- Step 2: Perpendicular gradients: product $$= -1$$. So normal gradient $$= -\\tfrac{1}{f'(a)}$$.\n- Step 3: Normal equation: $$y - f(a) = -\\tfrac{1}{f'(a)}(x - a)$$. Special case: if $$f'(a) = 0$$, normal is vertical: $$x = a$$.", "source": "Opus 4.7 ②", "_id": "opus_2_92"}, {"question": "Misconception probe: \"If $$\\Delta>0$$ for a quadratic, it always has two real roots.\" Is this statement always true when the quadratic comes from a substitution like $$y=x^{2}$$? Explain. (2 steps)", "answer": "- Step 1: The statement is true for the quadratic itself — $$\\Delta>0$$ guarantees two distinct real roots of the quadratic in its variable. But if the quadratic is in a substituted variable like $$y$$ (where $$y=x^{2}$$), then a negative root of the quadratic in $$y$$ does NOT correspond to any real $$x$$-value.\n- Step 2: Example: $$y^{2}-4y+A=0$$ with $$A=-1$$ gives $$\\Delta=16+4=20>0$$, so two real $$y$$-roots. But the roots are approximately $$4.24$$ and $$-0.24$$. The negative root gives no real $$x$$, so only 2 (not 4) real $$x$$-solutions exist. The discriminant condition is necessary but not sufficient when there are domain constraints on the substituted variable.\n\nTakeaway: $$\\Delta>0$$ guarantees two real roots of the quadratic, but NOT necessarily valid roots after back-substitution. Check sign constraints.", "source": "GLM 5.1 ③", "_id": "glm_3_66"}, {"question": "Why does a line parallel to the $x$-axis through $A(4,2)$ have equation $y=2$?", "answer": "- Step 1: A horizontal line has constant $y$ for all $x$.  \n- Step 2: Since $A$ has $y=2$, the line is $y=2$.  \n- Step 3: Any point on this line, like $C(x,2)$, shares the same $y$-coordinate.  \n+ Misconception: Confusing horizontal ($y=c$) and vertical ($x=c$) lines.  \n+ Edge case: If $A$ were $(a,b)$, the line would be $y=b$ regardless of $a$.  \n\n**Takeaway:** Horizontal lines maintain a constant $y$-value, independent of $x$.", "source": "Qwen 3 ④", "_id": "qwen_4_9"}, {"question": "For the transformation $$y=f(-3x)$$, what two transformations happen simultaneously, and how do you transform the coordinates? (3 steps)", "answer": "- Step 1: $$y=f(-3x)$$ combines a **reflection in the $$y$$-axis** (from the negative sign) and a **horizontal compression by scale factor $$\\frac{1}{3}$$** (from the factor of 3). These happen simultaneously, not sequentially.\n- Step 2: The coordinate rule for $$y=f(ax)$$ is: replace each $$x$$-coordinate with $$\\frac{x}{a}$$. Here $$a=-3$$, so each $$x$$-coordinate is divided by $$-3$$: $$(-1,0) \\to (\\frac{1}{3},0)$$; $$(0,2) \\to (0,2)$$; $$(3,0) \\to (-1,0)$$. The $$y$$-coordinates are unchanged.\n- Step 3: Note that $$(0,2)$$ stays at $$(0,2)$$ because $$\\frac{0}{-3}=0$$. The origin is always a fixed point for horizontal reflections. Also, a \"touches\" point (double root) remains a \"touches\" point — the transformation preserves the nature of the contact with the axis.\n\nTakeaway: $$f(ax)$$: divide $$x$$-coords by $$a$$. Negative $$a$$ adds reflection. The \"touches\" property is preserved.", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "For integration in a chain — integrate $$f'$$ to get $$f$$, then use a point to find $$C$$ — why MUST you use the given point in $$f$$, not in $$f'$$?", "answer": "The given point $$P$$ satisfies $$y = f(x)$$ (not $$f'(x)$$). The value $$f(P_x)$$ at the $$x$$-coordinate of $$P$$ is the $$y$$-coordinate of $$P$$.\n\nIf we have $$f'$$, we don't know $$y_P$$ directly from $$f'$$ — we know the SLOPE at that point. So $$P_y = f(P_x)$$, which determines $$C$$ after integration.\n\nUsing $$P$$ in $$f'$$ would give us $$f'(P_x) = P_y$$, which conflates position with slope — not generally true.\n\n**Critical**: keep track of which function you're using. The integrated $$f$$ uses $$P_y = f(P_x)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_119"}, {"question": "When defining a region $$R$$ by inequalities and there are 4 boundaries (e.g., $$x$$-axis, $$y$$-axis, a line, and a curve), how many inequalities do you need and how do you determine the sign of each? (3 steps)", "answer": "- Step 1: You need exactly **one inequality per boundary**. Four boundaries → four inequalities. Each boundary divides the plane into two half-planes, and you need to specify which side $$R$$ is on.\n- Step 2: Determine above/below for each boundary:\n+ $$x$$-axis: if $$R$$ is above, then $$y\\geq 0$$\n+ $$y$$-axis: if $$R$$ is to the right, then $$x\\geq 0$$\n+ Line $$l$$: if $$R$$ is below the line, then $$y\\leq mx+c$$\n+ Curve $$C$$: if $$R$$ is below the curve, then $$y\\leq f(x)$$\n- Step 3: **Verify with a test point** inside $$R$$. Pick a point that is clearly in the interior and check all four inequalities. If any fails, flip the sign. Phuc's recurring error: getting the $$\\leq$$ vs $$\\geq$$ wrong on the curve boundary — always double-check.\n\nTakeaway: $$n$$ boundaries → $$n$$ inequalities. Determine above/below for each, verify with a test point.", "source": "GLM 5.1 ③", "_id": "glm_3_42"}, {"question": "What is the key difference between $$\\frac{3}{4x^{2}}$$ and $$\\frac{3}{4}x^{-2}$$, and why is this distinction important? (2 steps)", "answer": "- Step 1: They are **the same expression** written differently: $$\\frac{3}{4x^{2}}=\\frac{3}{4}\\cdot\\frac{1}{x^{2}}=\\frac{3}{4}x^{-2}$$. The scalar $$\\frac{3}{4}$$ stays as a fraction; only the $$x$$-part gets the negative exponent.\n- Step 2: The distinction matters because the trap is writing $$\\frac{3}{4x^{2}}$$ as $$\\frac{3}{4}x^{-2}$$ and then incorrectly integrating as if the whole thing were $$\\frac{3}{4x^{2}}=(3)(4x^{2})^{-1}$$ — which is WRONG. The correct interpretation is $$\\frac{3}{4}\\cdot x^{-2}$$, where $$\\frac{3}{4}$$ is just a constant coefficient. When rewriting, keep the numerical coefficient separate from the variable part.\n\nTakeaway: $$\\frac{3}{4x^{2}}=\\frac{3}{4}\\cdot x^{-2}$$. The scalar is $$\\frac{3}{4}$$, not 3. Don't put the 4 inside the power.", "source": "GLM 5.1 ③", "_id": "glm_3_95"}, {"question": "Why does the cosine rule reduce to Pythagoras when the angle is $$90°$$?", "answer": "Cosine rule: $$a^2 = b^2 + c^2 - 2bc\\cos A$$. At $$A = 90°$$, $$\\cos A = 0$$, so the last term vanishes: $$a^2 = b^2 + c^2$$ — Pythagoras!\n\nThis is the definitional anchor of the cosine rule: it's a generalised Pythagoras that accounts for non-right angles. The $$-2bc\\cos A$$ term is a \"correction\" for how the angle differs from $$90°$$:\n- $$A < 90°$$ (acute): $$\\cos A > 0$$, correction subtracts, $$a$$ shorter than Pythagoras.\n- $$A > 90°$$ (obtuse): $$\\cos A < 0$$, correction adds, $$a$$ longer than Pythagoras.", "source": "Opus 4.7 ①", "_id": "opus_1_105"}, {"question": "For the equation $$(x+2)(x^3 + 4x^2 + 4x) = 1$$, explain the rearrangement that turns it into an intersection-counting problem, given $$x^3 + 4x^2 + 4x = x(x+2)^2$$. (3 steps)", "answer": "- Step 1: Divide both sides by $$(x + 2)$$ (assuming $$x \\neq -2$$; anyway $$x = -2$$ gives 0 on the left): $$x^3 + 4x^2 + 4x = \\tfrac{1}{x+2}$$.\n- Step 2: This is now \"curve = curve\", where curve 1 is the cubic $$y = x(x+2)^2$$ and curve 2 is the hyperbola $$y = \\tfrac{1}{x+2}$$ (vertical asymptote at $$x = -2$$).\n- Step 3: Number of real solutions = number of intersections. By sketching, one intersection on each side of the asymptote → 2 real solutions.\n\nKey conceptual move: rewrite equation as \"something = hyperbola\" when a hyperbola is the \"hint\" graph.", "source": "Opus 4.7 ②", "_id": "opus_2_59"}, {"question": "For the quartic equation $$x^{4}-4x^{2}+A=0$$, explain why substituting $$u=x^{2}$$ reduces it to a quadratic, and what conditions on the resulting quadratic are necessary to guarantee four distinct real solutions for $$x$$. (3 steps)", "answer": "- Step 1: The equation contains only even powers of $$x$$: $$x^{4}=(x^{2})^{2}$$ and $$x^{2}$$. Setting $$u=x^{2}$$ gives $$u^{2}-4u+A=0$$, a quadratic in $$u$$ because the structure mirrors a standard quadratic with $$u$$ replacing $$x$$.\n- Step 2: Each positive solution $$u$$ generates two real $$x$$-values: $$x=\\pm\\sqrt{u}$$. To obtain four distinct real $$x$$-values, the quadratic in $$u$$ must have two distinct positive roots.\n- Step 3: Three conditions ensure this: (i) the discriminant must be positive ($$\\Delta > 0$$) so there are two distinct real $$u$$-roots; (ii) the product of the roots must be positive ($$u_{1}u_{2}=A>0$$) so both roots share the same sign; (iii) the sum of the roots must be positive ($$u_{1}+u_{2}=4>0$$) confirming they are both positive rather than both negative. Checking only $$\\Delta>0$$ is insufficient.", "source": "Kimi K2.6 ②", "_id": "kimi_2_26"}, {"question": "How to derive the quadratic formula from $ax^2 + bx + c = 0$?", "answer": "- Step 1: Divide by $a$: $x^2 + \\frac{b}{a}x + \\frac{c}{a} = 0$.  \n- Step 2: Complete the square:  \n  $$\n  x^2 + \\frac{b}{a}x = -\\frac{c}{a} \\Rightarrow \\left(x + \\frac{b}{2a}\\right)^2 = \\frac{b^2 - 4ac}{4a^2}\n  $$  \n- Step 3: Take square roots and solve for $x$:  \n  $$\n  x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}\n  $$  \n+ **Key insight**: Completing the square is the bridge from standard form to the quadratic formula.", "source": "Qwen 3 ①", "_id": "qwen_1_9"}, {"question": "The region R is defined by $y < x + 2$ AND $y > x^2 - x$. Describe how to find this region graphically and state the three boundaries. (3 steps)", "answer": "- Step 1: For each inequality, identify the boundary curve/line and which side to shade.\n+ $y < x + 2$: boundary is the line $y = x + 2$; since it's \"less than\", shade BELOW the line\n+ $y > x^2 - x$: boundary is the parabola; since it's \"greater than\", shade ABOVE the curve\n- Step 2: Sketch both boundaries and shade each region\n- Step 3: The solution is the OVERLAP (intersection) of both shaded regions — the \"lens-shaped\" region between the line (as ceiling) and parabola (as floor)\n\n**Key concept:** For inequalities with curves, \"less than\" = below, \"greater than\" = above. The solution to a system is always the intersection of individual regions.", "source": "MiniMax ②", "_id": "minimax_2_4"}, {"question": "For $$y = A\\sin(Bx + C) + D$$, describe the geometric effect of each parameter. (3 steps)", "answer": "- Step 1: $$A$$ (amplitude): vertical stretch by $$|A|$$. Range becomes $$[D - |A|, D + |A|]$$. $$A < 0$$ also reflects vertically.\n- Step 2: $$B$$ (angular frequency): horizontal compression by $$\\tfrac{1}{|B|}$$. Period becomes $$\\tfrac{2\\pi}{|B|}$$.\n- Step 3: $$C$$ (phase): shifts horizontally by $$-\\tfrac{C}{B}$$. $$D$$ (vertical shift): shifts graph up by $$D$$.\n\nFor $$y = 12\\sin(x + B)$$: amplitude 12, period $$2\\pi$$, shifted left by $$B$$, no vertical shift.", "source": "Opus 4.7 ②", "_id": "opus_2_81"}, {"question": "Why is the answer $$A = -12$$ (not $$A = 12$$ or $$A = 0$$) for the minimum of $$y = 12\\sin(x + B)$$?", "answer": "The sine function has range $$[-1, 1]$$, attaining:\n- Max: $$\\sin = 1 \\Rightarrow y = 12 \\cdot 1 = 12$$ (at the MAXIMUM point of the curve).\n- Min: $$\\sin = -1 \\Rightarrow y = 12 \\cdot (-1) = -12$$ (at the MINIMUM point).\n- Mean (zero crossing): $$\\sin = 0 \\Rightarrow y = 0$$.\n\nSince the problem specifies the MINIMUM point, $$A = -12$$. Picking $$A = 12$$ would describe the maximum; $$A = 0$$ would describe a zero crossing.\n\nMnemonic: \"minimum of $$a\\sin(\\cdot)$$ with $$a > 0$$ is $$-a$$.\"", "source": "Opus 4.7 ①", "_id": "opus_1_175"}, {"question": "(3 steps)  \nHow do you find the area of a **major sector** given triangle sides $4, 6, 9$ cm and a radius of $4$ cm?", "answer": "- Step 1: Use the cosine rule to find angle $\\alpha$ opposite the side of length 9:  \n  $$\n  9^2 = 4^2 + 6^2 - 2 \\cdot 4 \\cdot 6 \\cdot \\cos\\alpha \\Rightarrow \\cos\\alpha = -\\frac{29}{48}\n  $$  \n- Step 2: Convert angle to radians: $\\alpha \\approx 2.22$ rad.  \n- Step 3: Compute major sector area with $\\theta_{\\text{major}} = 2\\pi - \\alpha$:  \n  $$\n  A = \\frac{1}{2} r^2 \\theta_{\\text{major}} \\approx \\frac{1}{2} \\cdot 16 \\cdot (4.063) \\approx 32.5 \\, \\text{cm}^2\n  $$  \n+ **Key formula**: Major angle = $2\\pi - \\text{minor angle}$.", "source": "Qwen 3 ①", "_id": "qwen_1_3"}, {"question": "When a region $$R$$ has boundaries including curves and lines, what's the difference between using $$<$$/$$>$$ (strict) vs $$\\leq$$/$$\\geq$$ (non-strict)?", "answer": "- **$$<$$/$$>$$ (strict)**: the boundary is NOT part of $$R$$. Graphically, boundary drawn dashed. Useful when the problem explicitly excludes the boundary.\n- **$$\\leq$$/$$\\geq$$ (non-strict)**: the boundary IS part of $$R$$. Graphically, solid. Typically used when the problem says \"including the boundary\" or silently assumes closure.\n\nIn most IAL region problems, non-strict is the default (solid boundaries). Check the question's wording carefully — \"bounded by $$X$$\" usually includes $$X$$; \"between $$X$$ and $$Y$$ (exclusive)\" would be strict.", "source": "Opus 4.7 ①", "_id": "opus_1_100"}, {"question": "What is the key strategy when a problem gives you two unknown constants in an integration problem (e.g., $$f'(x)$$ contains $$k$$ and the integrated $$f(x)$$ contains $$C$$)?", "answer": "- **The trap:** You have two unknowns but only one equation from the given point — you can't solve directly.\n- **The solution:** Look for an **additional condition** that involves ONLY ONE of the unknowns.\n- In the revision notes, this appears in Paper 3 Q10: You had $$f'(x) = 4x^{3/2} + \\frac{k}{x^2}$$ and after integrating, $$f(x)$$ has constant $$C$$. The extra condition was $$f''(2) = 0$$ (the second derivative test at a stationary point).\n- This condition involved ONLY $$k$$, allowing you to solve for $$k$$ first. Then you integrate and use the point to find $$C$$.\n- **Always look for:** Stationary points ($$f'(x) = 0$$), inflection points ($$f''(x) = 0$$), tangency conditions (equal gradients), or any other condition that reduces the number of unknowns to one at first.", "source": "MiniMax ①", "_id": "minimax_1_53"}, {"question": "In a diagram, points $$A, B, C$$ are collinear, and at $$B$$ the angles are $$\\angle ABE$$, $$\\angle EBD = 1.3$$ rad, and $$\\angle DBC = \\tfrac{\\pi}{2}$$. How do you find $$\\angle ABE$$? (3 steps)", "answer": "- Step 1: Angles on a straight line sum to $$\\pi$$ rad (i.e. $$180°$$). Since $$A, B, C$$ are collinear, the angles at $$B$$ between rays $$BA$$ and $$BC$$ must sum to $$\\pi$$.\n- Step 2: $$\\angle ABE + \\angle EBD + \\angle DBC = \\pi \\Rightarrow \\angle ABE + 1.3 + \\tfrac{\\pi}{2} = \\pi$$.\n- Step 3: Solve: $$\\angle ABE = \\pi - \\tfrac{\\pi}{2} - 1.3 = \\tfrac{\\pi}{2} - 1.3 \\approx 0.27$$ rad.\n\nKey idea: use the straight-line constraint to extract the missing angle.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "What's the geometric meaning of \"$$x = \\pm\\sqrt{5}$$\" corresponding to curve intersections being symmetric?", "answer": "If the intersection $$x$$-values are $$\\pm\\sqrt{5}$$, the two intersection points are symmetric about the $$y$$-axis (reflections through $$x = 0$$).\n\nThis symmetry usually comes from a quartic equation $$x^4 + \\ldots = 0$$ where only even powers appear — the equation is even, so roots come in $$\\pm$$ pairs.\n\nPractical: if you see even-only polynomial, expect $$\\pm$$ roots. Use the substitution $$u = x^2$$ to exploit this.\n\n**In the Q8 problem**: $$2x^4 - 7x^2 - 15 = 0$$ is biquadratic → $$x = \\pm\\sqrt{5}$$ are symmetric.", "source": "Opus 4.7 ①", "_id": "opus_1_166"}, {"question": "The curves $$y = \\frac{1}{x+2}$$ and $$y = x(x+2)^2$$ are sketched. State, with reasoning, the number of real solutions to $$(x+2)(x^3 + 4x^2 + 4x) = 1$$. (3 steps)", "answer": "- Step 1: **Rearrange** the equation:\n$$(x+2)(x^3 + 4x^2 + 4x) = 1 \\Leftrightarrow x(x+2)^2 = \\frac{1}{x+2}$$\nThis represents the intersection of $$y = x(x+2)^2$$ (cubic) and $$y = \\frac{1}{x+2}$$ (hyperbola).\n- Step 2: **Interpret graphically:**\n- Cubic $$y = x(x+2)^2$$: touches at $$x = -2$$ (double root), crosses at $$x = 0$$\n- Hyperbola $$y = \\frac{1}{x+2}$$: vertical asymptote at $$x = -2$$\n- Step 3: **Count intersections:** The curves intersect once on the right of the asymptote ($$x > -2$$) and once on the left ($$x < -2$$).\n$$\\boxed{2 \\text{ real solutions}}$$", "source": "MiniMax ①", "_id": "minimax_1_18"}, {"question": "In the roof-frame question ($$\\triangle BCD$$: $$BD = x$$, $$CD = 1+x$$, $$BC = 5$$, $$\\angle BCD = \\theta$$), derive $$\\cos\\theta = \\tfrac{13+x}{5+5x}$$. (3 steps)", "answer": "- Step 1: Apply the Cosine Rule with $$BD$$ opposite $$\\theta$$: $$x^2 = 25 + (1+x)^2 - 10(1+x)\\cos\\theta$$.\n- Step 2: Expand $$(1+x)^2 = 1 + 2x + x^2$$ and substitute: $$x^2 = 25 + 1 + 2x + x^2 - 10(1+x)\\cos\\theta$$. The $$x^2$$ terms cancel: $$10(1+x)\\cos\\theta = 26 + 2x$$.\n- Step 3: Rearrange: $$\\cos\\theta = \\tfrac{26 + 2x}{10(1+x)} = \\tfrac{2(13+x)}{10(1+x)} = \\tfrac{13+x}{5(1+x)} = \\tfrac{13+x}{5+5x}$$.\n\nKey moves: expand, cancel like terms, factor out 2, simplify.", "source": "Opus 4.7 ②", "_id": "opus_2_61"}, {"question": "Explain the \"obtuse angle → negative cosine\" rule and how to verify with the sign of the cosine rule result.", "answer": "On the unit circle, obtuse angles ($$90° < \\theta < 180°$$) lie in the second quadrant, where the $$x$$-coordinate (which equals $$\\cos\\theta$$) is NEGATIVE.\n\n**Verification using cosine rule**: if $$\\cos A = \\frac{b^2 + c^2 - a^2}{2bc}$$ gives a negative value, then $$A > 90°$$ (obtuse). If positive, $$A < 90°$$ (acute). If zero, $$A = 90°$$ (right).\n\n**Example**: sides 4, 6, 9. $$\\cos A = \\frac{16 + 36 - 81}{48} = \\frac{-29}{48} < 0 \\Rightarrow A$$ obtuse.\n\nThis is a built-in sign check — you don't need a separate inequality check.", "source": "Opus 4.7 ①", "_id": "opus_1_133"}, {"question": "For a cubic $$y = x(x+2)^2$$ meeting a hyperbola $$y = \\frac{1}{x+2}$$, why is the count of real solutions \"2\" and not \"3\" or \"4\"?", "answer": "The hyperbola has a vertical asymptote at $$x = -2$$, splitting its domain into two pieces: $$x < -2$$ (where $$y < 0$$) and $$x > -2$$ (where $$y > 0$$).\n\n**Right of $$-2$$**: cubic starts at $$(−2, 0)$$ (touching), rises through $$(0,0)$$, goes to $$+\\infty$$. Hyperbola drops from $$+\\infty$$ at $$x = -2^+$$ to $$0$$ at $$+\\infty$$. They cross exactly ONCE (hyperbola starts above cubic, cubic overtakes).\n\n**Left of $$-2$$**: cubic goes from $$0$$ (at $$x=-2$$) down to $$-\\infty$$. Hyperbola drops from $$0^-$$ at $$-\\infty$$ to $$-\\infty$$ at $$x = -2^-$$. They cross exactly ONCE.\n\nTotal: **2 intersections**. The double root at $$x = -2$$ doesn't give an intersection because the hyperbola has an asymptote exactly there.", "source": "Opus 4.7 ①", "_id": "opus_1_121"}, {"question": "By substituting $$p = 2^x$$, show that $$2 \\cdot 4^x - 2^{x+3} = 17 \\cdot 2^{x-1} - 4$$ becomes the quadratic $$4p^2 - 33p + 8 = 0$$. Hence find $$x$$. (3 steps)", "answer": "- Step 1: **Rewrite each term** as a power of $$2^x = p$$:\n- $$4^x = (2^2)^x = (2^x)^2 = p^2$$, so $$2 \\cdot 4^x = 2p^2$$\n- $$2^{x+3} = 2^x \\cdot 2^3 = 8p$$\n- $$2^{x-1} = 2^x \\cdot 2^{-1} = \\frac{p}{2}$$\n- Step 2: **Substitute into equation:**\n$$2p^2 - 8p = 17\\left(\\frac{p}{2}\\right) - 4$$\n$$2p^2 - 8p = \\frac{17p}{2} - 4$$\nMultiply by 2 to clear fractions:\n$$4p^2 - 16p = 17p - 8 \\Rightarrow 4p^2 - 33p + 8 = 0$$\n- Step 3: **Factor and solve:**\n$$(4p - 1)(p - 8) = 0 \\Rightarrow p = \\frac{1}{4}$$ or $$p = 8$$\n- If $$p = 8 \\Rightarrow 2^x = 8 = 2^3 \\Rightarrow x = 3$$\n- If $$p = \\frac{1}{4} \\Rightarrow 2^x = \\frac{1}{4} = 2^{-2} \\Rightarrow x = -2$$", "source": "MiniMax ①", "_id": "minimax_1_13"}, {"question": "How does substituting $ p = 2^x $ simplify exponential equations like $ 2^{2x} + 3 \\cdot 2^x + 2 = 0 $? (3 steps)", "answer": "- Step 1: Let $ p = 2^x $, so $ 2^{2x} = (2^x)^2 = p^2 $.  \n- Step 2: Substitute: $ p^2 + 3p + 2 = 0 \\Rightarrow (p+1)(p+2) = 0 $.  \n- Step 3: Solve $ p = -1 $ (invalid, since $ 2^x > 0 $) or $ p = -2 $ (also invalid). No real solutions.  \n\n**Key Insight**: Substitution reduces the equation to a quadratic, but constraints on $ p $ must be checked.", "source": "Qwen 3 ②", "_id": "qwen_2_6"}, {"question": "How do you determine whether a region bounded by two curves requires $$y \\geq f(x)$$ or $$y \\leq f(x)$$, and what is the role of a test point? (3 steps)", "answer": "- Step 1: Sketch or visualise the two boundaries. Identify which curve acts as the \"upper\" boundary and which acts as the \"lower\" boundary within the interval of interest.\n- Step 2: Pick a sample $$x$$-value lying inside the region (for example, midway between intersection points) and evaluate both curves. The curve giving the larger $$y$$-value is the upper boundary; the region below it satisfies $$y \\leq \\text{upper}(x)$$.\n- Step 3: Conversely, the region above the lower boundary satisfies $$y \\geq \\text{lower}(x)$$. A common error is reversing these signs: if the region is sandwiched between a parabola below and a line above, the correct description is $$2x^2+x-21 \\leq y \\leq 5x+75$$, not the reverse.", "source": "Kimi K2.6 ①", "_id": "kimi_1_20"}, {"question": "Why might an integer answer like \"$$A < 4$$\" be incomplete, and how does checking boundary values fix it?", "answer": "Phuc got $$A < 4$$ from the discriminant condition alone — but this allows $$A = -10$$ (for instance), where the product of $$u$$-roots is $$-10 < 0$$, meaning one root is negative. That negative $$u$$ doesn't give real $$x$$, so the curves only intersect in 2 points (not 4).\n\n**Fix**: when the problem requires specific sign constraints on roots (e.g., \"4 distinct real $$x$$\"), check each algebraically:\n- Discriminant (number of roots): $$16 - 4A > 0 \\Rightarrow A < 4$$.\n- Sign of roots (via Vieta): sum $$= 4 > 0$$ ✓, product $$= A > 0 \\Rightarrow A > 0$$.\n\nCombine: $$0 < A < 4$$. Missing the lower bound was Phuc's trap.", "source": "Opus 4.7 ①", "_id": "opus_1_87"}, {"question": "Why is the tangent of the minimum point's $$x$$-location important for $$y = A\\sin(Bx + C) + D$$ questions? (3 steps)", "answer": "- Step 1: At a minimum, the inner argument $$Bx + C$$ equals $$\\tfrac{3\\pi}{2} + 2n\\pi$$ (where sine $$= -1$$).\n- Step 2: You can solve for any unknown (often $$C$$) given the minimum's $$x$$.\n- Step 3: For \"smallest positive\" constraints, pick the $$n$$ giving the smallest positive solution.\n\nCommon trap: confusing max ($$\\tfrac{\\pi}{2} + 2n\\pi$$) with min ($$\\tfrac{3\\pi}{2} + 2n\\pi$$).", "source": "Opus 4.7 ②", "_id": "opus_2_127"}, {"question": "Describe the structure of an equation that can be reduced via a substitution (e.g. $$u = x^2$$ or $$p = 2^x$$). What's the tell? (3 steps)", "answer": "- Step 1: The equation contains multiple instances of the same \"compound expression\" — e.g. $$x^2$$ appears in both $$x^4$$ and $$x^2$$ terms; or $$2^x$$ in $$4^x$$ and $$2^x$$.\n- Step 2: Substituting a single variable for the compound reveals a simpler polynomial structure.\n- Step 3: Common patterns:\n+ Biquadratic: $$u = x^2$$\n+ Exponential: $$p = r^x$$\n+ After solving in the new variable, BACK-SUBSTITUTE. Check for rejected roots (e.g. $$u < 0$$ when $$u = x^2$$).", "source": "Opus 4.7 ②", "_id": "opus_2_118"}, {"question": "The curves $y = x^2 + kx - 9$ and $y = -3x^2 - 5x + k$ meet at exactly one point. Set up the discriminant condition and find k. (3 steps)", "answer": "- Step 1: Equate the y-expressions: $x^2 + kx - 9 = -3x^2 - 5x + k$\n- Step 2: Rearrange to standard quadratic form: $4x^2 + (k+5)x - (9+k) = 0$\n- Step 3: \"Single point\" = tangent = repeated root = discriminant equals zero\n+ $\\Delta = (k+5)^2 - 4(4)(-(9+k)) = k^2 + 10k + 25 + 144 + 16k = k^2 + 26k + 169 = 0$\n+ This factorises as $(k+13)^2 = 0$, so $k = -13$\n\n**Misconception probe:** Why can't we just say \"one solution\" means one x-value? Because one x-value can come from a repeated root (tangent) or from solving simultaneous equations where the quadratic degenerates. The discriminant captures this precisely.", "source": "MiniMax ②", "_id": "minimax_2_1"}, {"question": "What's the conceptual principle: \"number of real solutions to $$f(x) = g(x)$$\" equals what graphical quantity?", "answer": "It equals the number of **intersection points** of $$y = f(x)$$ and $$y = g(x)$$.\n\nReasoning: a real solution of $$f(x) = g(x)$$ is an $$x$$-value where the two curves share the same $$y$$-value. Each such $$x$$ gives an intersection point $$(x, f(x)) = (x, g(x))$$, so the count is identical.\n\nThis converts algebra (\"how many roots?\") into geometry (\"how many crossings?\"), which is often vastly easier when sketches are already given.", "source": "Opus 4.7 ①", "_id": "opus_1_59"}, {"question": "To find the minimum point of a quadratic like $$f(x) = 2x^2 - 12x + 14$$, why is completing the square more reliable than using calculus for this specific algebraic form? (2 steps)", "answer": "- Step 1: Completing the square directly rewrites the function into vertex form: $$f(x) = a(x - h)^2 + k$$, where $$(h, k)$$ is the minimum point.\n- Step 2: While setting $$f'(x) = 0$$ also works, completing the square gives the exact y-coordinate (the minimum value $$k$$) without needing to substitute the x-value back in, reducing the chance of arithmetic errors.\n\nVertex form explicitly separates the \"shifting\" from the \"scaling,\" making the minimum visually obvious.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "For $$a = \\tfrac{1}{64}x^2, b = \\tfrac{16}{\\sqrt{x}}$$, describe the approach to simplify $$\\left(\\tfrac{ab^3}{2}\\right)^{-4/3}$$ into $$kx^n$$ form. (4 steps)", "answer": "- Step 1: Rewrite $$b = 16 x^{-1/2}$$.\n- Step 2: Handle the negative exponent first — FLIP the base: $$\\left(\\tfrac{ab^3}{2}\\right)^{-4/3} = \\left(\\tfrac{2}{ab^3}\\right)^{4/3}$$.\n- Step 3: Compute $$ab^3$$: first $$b^3 = 16^3 x^{-3/2} = 4096 x^{-3/2}$$, then $$ab^3 = \\tfrac{1}{64}x^2 \\cdot 4096 x^{-3/2} = 64 x^{1/2}$$.\n- Step 4: Apply the positive power: $$\\left(\\tfrac{2}{64 x^{1/2}}\\right)^{4/3} = \\left(\\tfrac{1}{32}x^{-1/2}\\right)^{4/3} = 32^{-4/3} x^{-2/3}$$.\n\nKey: FLIP negative exponents FIRST, then apply positive power. Always raise every factor in a product.", "source": "Opus 4.7 ②", "_id": "opus_2_90"}, {"question": "For a transformed trig function like $$y = A \\cos(Bx)$$, what is the period of the function, and how does the multiplier $$B$$ affect it compared to the standard $$2\\pi$$ period? (2 steps)", "answer": "- Step 1: The period is $$\\frac{2\\pi}{|B|}$$ (or $$\\frac{360^{\\circ}}{|B|}$$).\n- Step 2: The multiplier $$B$$ inside the argument compresses the graph horizontally, meaning the curve completes its cycle $$B$$ times faster. Thus, the period is divided by $$B$$.\n\nA multiplier inside the function ($$Bx$$) divides the period; a multiplier outside ($$Ay$$) changes the amplitude.", "source": "GLM 5.1 ②", "_id": "glm_2_46"}, {"question": "Explain the general strategy for a question that asks for the NUMBER of real solutions to an equation like $$f(x) = g(x)$$, when a sketch of $$f$$ (or $$g$$) is already given. (3 steps)", "answer": "- Step 1: Recognise that \"real solutions of $$f(x) = g(x)$$\" ⟺ \"intersection points of $$y = f(x)$$ and $$y = g(x)$$\".\n- Step 2: If one graph (say $$f$$) is already sketched, OVERLAY the other graph ($$g$$) on the same axes — or mentally picture it.\n- Step 3: COUNT the intersection points. The answer is usually a small integer. No algebra needed if the graphs are simple and well-separated.\n\n\"Hence\" word cue: the question expects you to use the previous sketch — don't re-derive from scratch.", "source": "Opus 4.7 ②", "_id": "opus_2_58"}, {"question": "When a problem involves both differentiation and integration of the same function, what's the relationship between $$f$$, $$f'$$, and $$f''$$, and how do you navigate between them? (2 steps)", "answer": "- Step 1: The hierarchy: $$f \\xrightarrow{\\text{differentiate}} f' \\xrightarrow{\\text{differentiate}} f''$$. Going the other direction: $$f'' \\xrightarrow{\\text{integrate}} f' \\xrightarrow{\\text{integrate}} f$$ (plus constants). Each integration introduces a constant of integration.\n- Step 2: Strategy: if you're given $$f'(x)$$ and need $$f(x)$$, integrate once (one constant $$C$$). If you're given $$f'(x)$$ and need $$f''(x)$$, differentiate once (no new constants). The problem in Q10: given $$f'$$ with unknown $$k$$, we used $$f''(P)=0$$ to find $$k$$ (differentiation, no constant), then integrated $$f'$$ to get $$f$$ (one constant $$C$$, found from point $$P$$).\n\nTakeaway: Differentiate → move down the chain (no constants). Integrate → move up the chain (+constants). Use conditions to find constants.", "source": "GLM 5.1 ③", "_id": "glm_3_89"}, {"question": "A platform is composed of an inner sector $$DOC$$ (radius $$DO$$) and an outer major sector $$AOBEA$$ (radius $$AO$$), with $$DA:AO = 3:5$$. Why does setting $$AO = 5x$$ and $$DA = 3x$$ lead to $$DO = 8x$$? (2 steps)", "answer": "- Step 1: The ratio $$DA:AO = 3:5$$ means if $$AO = 5x$$, then $$DA = 3x$$ (same scale factor $$x$$).\n- Step 2: Since $$A$$ lies on segment $$DO$$ (between $$D$$ and $$O$$), the total inner radius is $$DO = DA + AO = 3x + 5x = 8x$$.\n\nSo the inner sector has radius $$8x$$ and the outer sector has radius $$5x$$. Ratios provide a single parameter $$x$$ that links both radii, which you solve for from a given arc length or other constraint.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "What trigger words in a question tell you to use the discriminant, and what condition does each trigger on $$\\Delta$$? (2 steps)", "answer": "- Step 1: The discriminant $$\\Delta = b^{2}-4ac$$ determines the nature of intersection between two curves (after you set them equal and form a quadratic). The trigger words map to conditions on $$\\Delta$$:\n+ \"Meets at a single point\" / \"tangent to\" / \"touches\" → $$\\Delta = 0$$ (one repeated root)\n+ \"Two distinct points\" / \"cuts at two points\" / \"intersects twice\" → $$\\Delta > 0$$\n+ \"Does not intersect\" / \"never crosses\" / \"no real solutions\" → $$\\Delta < 0$$\n- Step 2: The key insight (from Phuc): when the question asks you to show an equation that only contains the parameter $$k$$ (no $$x$$), that's a signal to use the discriminant. After equating the curves and rearranging to a quadratic in $$x$$, the discriminant eliminates $$x$$ entirely and gives you an equation purely in $$k$$.\n\nTakeaway: \"Single point\" = $$\\Delta=0$$; \"Two distinct\" = $$\\Delta>0$$; \"No intersection\" = $$\\Delta<0$$. If the target equation has no $$x$$, think discriminant.", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "What is the tangent line formula, and how does it differ from the normal line formula? (2 steps)", "answer": "- Step 1: Tangent at $$(a,f(a))$$: $$y-f(a)=f'(a)(x-a)$$. The gradient is $$f'(a)$$ — the derivative at the point.\n- Step 2: Normal at $$(a,f(a))$$: $$y-f(a)=-\\frac{1}{f'(a)}(x-a)$$. The gradient is $$-\\frac{1}{f'(a)}$$ — the negative reciprocal. The normal is **perpendicular** to the tangent. If the tangent has gradient $$m$$, the normal has gradient $$-\\frac{1}{m}$$ (and $$m_{1}m_{2}=-1$$).\n\nTakeaway: Tangent gradient = $$f'(a)$$. Normal gradient = $$-\\frac{1}{f'(a)}$$. They are perpendicular.", "source": "GLM 5.1 ③", "_id": "glm_3_75"}, {"question": "How can you determine the number of real solutions to $$(x+2)(x^3+4x^2+4x) = 1$$ by interpreting it as a curve intersection rather than expanding? (3 steps)", "answer": "- Step 1: Divide both sides by $$(x+2)$$ (noting $$x \\neq -2$$) to rewrite the equation as $$x^3+4x^2+4x = \\frac{1}{x+2}$$. This expresses the problem as the intersection of a cubic curve and a hyperbola.\n- Step 2: Factor the cubic where possible: $$x^3+4x^2+4x = x(x+2)^2$$. This reveals that the cubic touches the $$x$$-axis at $$x = -2$$ (double root) and crosses at $$x = 0$$.\n- Step 3: Sketch both graphs. The hyperbola $$y = \\frac{1}{x+2}$$ has a vertical asymptote at $$x = -2$$. By inspecting the branches, you can count crossings: one intersection exists to the left of $$x = -2$$ and one to the right, giving exactly two real solutions.", "source": "Kimi K2.6 ①", "_id": "kimi_1_32"}, {"question": "When simplifying an expression like $$(16x^{-1/2})^3$$ into the form $$kx^n$$, what are the two most common index-law errors? (2 steps)", "answer": "- Step 1: The first error is forgetting to raise the numerical coefficient to the power: $$(16)^3$$ must be computed, not left as $$16$$. The power applies to every factor inside the bracket, including constants.\n- Step 2: The second error is mishandling the negative exponent: $$(x^{-1/2})^3 = x^{-3/2}$$, and if this appears in a denominator, it may need to be brought to the numerator as $$x^{3/2}$$. Remember that $$\\frac{1}{x^{-n}} = x^n$$; a negative exponent in the denominator becomes positive when moved to the numerator.", "source": "Kimi K2.6 ①", "_id": "kimi_1_31"}, {"question": "What does \"collinear\" mean in a geometry problem, and what angle relationship does it imply? (2 steps)", "answer": "- Step 1: \"Collinear\" means three or more points lie on the same straight line. If $$A$$, $$B$$, $$C$$ are collinear with $$B$$ between $$A$$ and $$C$$, then the angle at $$B$$ on one side is $$\\pi$$ (180°).\n- Step 2: The angle relationship: angles on a straight line sum to $$\\pi$$. If $$\\angle ABE$$, $$\\angle EBD$$, and $$\\angle DBC$$ all sit on the straight line through $$A$$, $$B$$, $$C$$, then $$\\angle ABE+\\angle EBD+\\angle DBC=\\pi$$. This lets you find unknown angles from known ones.\n\nTakeaway: Collinear → straight line → angles on it sum to $$\\pi$$. Use this to find missing angles.", "source": "GLM 5.1 ③", "_id": "glm_3_77"}, {"question": "Common base conversions for index problems: write $$4$$, $$8$$, $$16$$, $$32$$, $$64$$, $$\\frac{1}{4}$$, $$\\frac{1}{8}$$ as powers of 2; $$9$$, $$27$$, $$81$$, $$\\frac{1}{9}$$ as powers of 3.", "answer": "Powers of 2: $$4 = 2^2$$, $$8 = 2^3$$, $$16 = 2^4$$, $$32 = 2^5$$, $$64 = 2^6$$, $$\\frac{1}{4} = 2^{-2}$$, $$\\frac{1}{8} = 2^{-3}$$.\n\nPowers of 3: $$9 = 3^2$$, $$27 = 3^3$$, $$81 = 3^4$$, $$\\frac{1}{9} = 3^{-2}$$.\n\nAlso useful: $$16 = 2^4 = 4^2$$, $$64 = 2^6 = 4^3 = 8^2$$, so problems with base $$4$$ or $$8$$ can often be reduced to base $$2$$.\n\nQuick recall of these is essential for substitution-style index problems.", "source": "Opus 4.7 ①", "_id": "opus_1_96"}, {"question": "For $$y = f(-3x)$$, apply the transformation to the points $$(-1, 0), (0, 2), (3, 0)$$ (last is a \"touch\" point). (3 steps)", "answer": "- Step 1: The rule for $$y = f(ax)$$ with $$a = -3$$ is: each $$x$$-coordinate divides by $$a = -3$$; $$y$$-coordinates unchanged.\n- Step 2: Apply:\n+ $$(-1, 0) \\to (-1/(-3), 0) = (\\tfrac{1}{3}, 0)$$\n+ $$(0, 2) \\to (0/(-3), 2) = (0, 2)$$ (unchanged — point on $$y$$-axis is fixed)\n+ $$(3, 0) \\to (3/(-3), 0) = (-1, 0)$$ (still touches, since tangency is preserved)\n- Step 3: Combined interpretation: reflect in $$y$$-axis (negates $$x$$), then compress horizontally by factor $$\\tfrac{1}{3}$$. Or apply as a single rule: $$x \\to x/(-3)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "When two intersection points have coordinates involving surds, what is the conceptual approach to finding the exact distance between them without approximating? (2 steps)", "answer": "- Step 1: Compute the differences $$\\Delta x = x_2 - x_1$$ and $$\\Delta y = y_2 - y_1$$ algebraically. Often, the surd terms simplify dramatically; for instance, if $$x_1 = \\sqrt{5}$$ and $$x_2 = -\\sqrt{5}$$, then $$\\Delta x = 2\\sqrt{5}$$.\n- Step 2: Substitute into $$d = \\sqrt{(\\Delta x)^2 + (\\Delta y)^2}$$. Squaring eliminates the square roots in the differences: $$(2\\sqrt{5})^2 = 20$$. Sum the squared differences and simplify the radical. The result is an exact value such as $$\\sqrt{65}$$, which satisfies \"exact value\" requirements.", "source": "Kimi K2.6 ①", "_id": "kimi_1_45"}, {"question": "The gradient of a line $$y = mx + c$$ is $$m$$, a **number**, not the expression $$mx + c$$. Explain the conceptual distinction and why this matters for tangent problems.", "answer": "The expression $$mx + c$$ IS the entire line — it tells you $$y$$ as a function of $$x$$. The **gradient** is a single numerical property of the line: how steeply it rises per unit $$x$$. That's $$m$$ — a constant, since a line has the same slope everywhere.\n\nIn tangent problems: you want the CURVE's slope (which varies with $$x$$) to equal the LINE's slope (a constant). So set $$\\frac{dy}{dx}|_{\\text{curve}} = m$$, NOT $$\\frac{dy}{dx}|_{\\text{curve}} = mx + c$$.\n\nAnalogy: the weight of a brick is a number (e.g., 5 kg), not the description of a brick.", "source": "Opus 4.7 ①", "_id": "opus_1_91"}, {"question": "Why is the equation $$(k + 13)^2 = 0$$ recognisable from $$k^2 + 26k + 169 = 0$$? (3 steps)", "answer": "- Step 1: Recognise the pattern: constant $$169 = 13^2$$; middle $$26 = 2 \\cdot 13$$.\n- Step 2: Matches the expansion $$(k + 13)^2 = k^2 + 2(13)k + 13^2$$.\n- Step 3: So $$k^2 + 26k + 169 = (k + 13)^2$$, giving $$(k+13)^2 = 0 \\Rightarrow k = -13$$ (unique).\n\nPerfect square trinomial check: middle coefficient = $$2\\sqrt{a \\cdot c}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_132"}, {"question": "For calculator-free rationalisation like $$\\frac{13 + 2\\sqrt{3}}{5 + 10\\sqrt{3}}$$, what's the conjugate, and what's the simplified denominator after multiplying?", "answer": "Conjugate of $$5 + 10\\sqrt{3}$$: flip the sign of the surd → $$5 - 10\\sqrt{3}$$.\n\nDenominator after multiplying: $$(5 + 10\\sqrt{3})(5 - 10\\sqrt{3}) = 25 - 100 \\cdot 3 = 25 - 300 = -275$$.\n\n**Note**: the denominator becomes a NEGATIVE number because $$(10\\sqrt{3})^2 = 300$$ exceeds $$25$$. Don't be surprised by negative denominators; handle them carefully in the final simplification (might require factoring out negatives).\n\nGeneral pattern: $$(a + b\\sqrt{c})(a - b\\sqrt{c}) = a^2 - b^2 c$$, which can be positive or negative.", "source": "Opus 4.7 ①", "_id": "opus_1_157"}, {"question": "A curve has $f'(x) = 4x^{3/2} + \\frac{k}{x^2}$. Given that $f''(2) = 0$ at point P(2, 8√2), find (a) the value of k, (b) the full equation f(x). (4 steps)", "answer": "- Part (a): First find f''(x) by differentiating f'(x):\n+ $f'(x) = 4x^{3/2} + kx^{-2}$\n+ $f''(x) = 4 \\cdot \\frac{3}{2}x^{1/2} + (-2)kx^{-3} = 6x^{1/2} - 2kx^{-3}$\n+ At $x = 2$: $f''(2) = 6\\sqrt{2} - \\frac{2k}{8} = 6\\sqrt{2} - \\frac{k}{4} = 0$\n+ $6\\sqrt{2} = \\frac{k}{4} \\Rightarrow k = 24\\sqrt{2}$\n- Part (b): Integrate f'(x) with this k:\n+ $f(x) = \\int (4x^{3/2} + 24\\sqrt{2}x^{-2}) dx$\n+ $f(x) = 4 \\cdot \\frac{x^{5/2}}{5/2} + 24\\sqrt{2} \\cdot \\frac{x^{-1}}{-1} + C = \\frac{8}{5}x^{5/2} - \\frac{24\\sqrt{2}}{x} + C$\n+ Use point P(2, 8√2): $8\\sqrt{2} = \\frac{8}{5}(2^{5/2}) - \\frac{24\\sqrt{2}}{2} + C$\n+ $2^{5/2} = 4\\sqrt{2}$, so: $8\\sqrt{2} = \\frac{32\\sqrt{2}}{5} - 12\\sqrt{2} + C$\n+ $C = 8\\sqrt{2} + 12\\sqrt{2} - \\frac{32\\sqrt{2}}{5} = \\frac{68\\sqrt{2}}{5}$\n\n**Common trap:** Integrating gives a constant C. You need TWO conditions to find both k AND C. Use the extra condition on f'' (or similar) to find k FIRST, THEN integrate and use the point to find C.", "source": "MiniMax ②", "_id": "minimax_2_19"}, {"question": "When a region $$R$$ is bounded between a curve (floor) and a line (ceiling) above the $$x$$-axis, what three inequalities define it? How do you determine which is \"floor\" and which is \"ceiling\"? (2 steps)", "answer": "- Step 1: The three inequalities are: $$y \\geq 0$$ (above $$x$$-axis), $$y \\geq \\text{curve}$$ (above the floor), and $$y \\leq \\text{line}$$ (below the ceiling). The region is \"sandwiched.\"\n- Step 2: To identify floor vs ceiling, pick a **sample point** inside $$R$$ and check: is its $$y$$-value above the curve or below it? Above → curve is floor ($$y \\geq$$ curve). Below the line → line is ceiling ($$y \\leq$$ line).\n\nPhuc's mistake: wrote $$y \\leq 2x^{2}+x-21$$ (below curve) when the region was actually above the curve. Always verify with a sample point.", "source": "GLM 5.1 ①", "_id": "glm_1_22"}, {"question": "\"Hence\" vs \"He
