ting \"$$(\\alpha+\\beta)^3-\\alpha\\beta(\\alpha+\\beta)$$\" (missing the 3) is the single most common error on roots-manipulation questions — this identity is **not in the formula booklet**, so you must memorise it cold.\n\nThe −3 comes directly from the binomial expansion of $$(\\alpha+\\beta)^3$$.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": true}, {"question": "What is the identity for $$\\alpha^4+\\beta^4$$ in terms of $$\\alpha^2+\\beta^2$$ and $$\\alpha\\beta$$, and what's the strategic reason to express it this way rather than in terms of $$\\alpha+\\beta$$ directly? (2 steps)", "answer": "- Step 1: $$\\alpha^4+\\beta^4=(\\alpha^2+\\beta^2)^2-2(\\alpha\\beta)^2$$. This mirrors the pattern of $$\\alpha^2+\\beta^2=(\\alpha+\\beta)^2-2\\alpha\\beta$$, but one level up — squaring the sum of squares and subtracting twice the square of the product.\n- Step 2: Expressing it in terms of $$\\alpha^2+\\beta^2$$ is strategic because you already know $$\\alpha^2+\\beta^2=(\\alpha+\\beta)^2-2\\alpha\\beta$$, so you can chain: compute $$\\alpha^2+\\beta^2$$ first, then square it and subtract $$2(\\alpha\\beta)^2$$. This is cleaner and less error-prone than expanding $$(\\alpha+\\beta)^4$$ and collecting terms, which produces many more intermediate terms.\n\nNot in the formula booklet — memorise.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "FP1 Jan 2023 Q1 — When you see a matrix product $$(m \\times n)(n \\times p)$$, what is the very first thing you should confirm before computing any entry, and why? (2 steps)", "answer": "- Step 1: Confirm the **output shape** is $$(m \\times p)$$. The inner dimensions $$n$$ must match (otherwise the product is undefined); the outer dimensions give the result. For example, $$(2 \\times 3)(3 \\times 2) \\to 2 \\times 2$$.\n- Step 2: Writing down the output shape before computing protects you from two errors: (a) attempting an impossible multiplication, and (b) filling the wrong number of entries. Knowing the result is $$2 \\times 2$$ means you expect exactly four entries — if you find yourself computing a third row, something is wrong.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "FP1 Jan 2023 Q1 — What physical annotation trick should you use on the question paper before computing a matrix product that contains negative entries, and why? (2 steps)", "answer": "- Step 1: **Circle every negative entry** in both matrices before starting the dot products. For example, in $$B = \\begin{pmatrix}1&k\\\\0&3\\\\-2k&2\\end{pmatrix}$$, circle the $$-2k$$ in position $$(3,1)$$.\n- Step 2: The reason is that sign-flipping on negative entries during dot products is the most common arithmetic error in matrix multiplication. When you compute $$(2)(1)+(-1)(0)+(3)(-2k)$$, the circled $$-2k$$ forces your eye to register the minus before multiplying. Phuc lost a sign on exactly this entry, producing $$+12k^2$$ instead of $$-12k^2$$ in the determinant, which turned clean integer roots into messy surds.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "FP1 Jan 2023 Q1 — After computing $$\\det(AB)$$ and obtaining a quadratic in $$k$$, why should you factorise it rather than use the quadratic formula? (2 steps)", "answer": "- Step 1: Factorising (e.g. $$6(2k^2-9k+4) = 6(2k-1)(k-4)$$) produces a cleaner mark trail — the examiner can see your factorisation method marks even if a minor arithmetic slip occurred earlier.\n- Step 2: The quadratic formula introduces surds or decimals that obscure whether the roots are \"nice\" numbers. Edexcel FP1 questions almost always have integer or simple fraction roots. If your formula gives $$k = \\frac{9 \\pm \\sqrt{153}}{4}$$, that's a red flag that an earlier sign error occurred — factorising forces you to confront this.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "FP1 Jan 2023 Q1 — Why is computing $$\\det(A)\\cdot\\det(B)$$ an invalid way to find $$\\det(AB)$$ for the matrices in this question? (2 steps)", "answer": "- Step 1: The property $$\\det(AB)=\\det(A)\\cdot\\det(B)$$ only holds when both $$A$$ and $$B$$ are **square** matrices. Here, $$A$$ is $$2 \\times 3$$ and $$B$$ is $$3 \\times 2$$ — neither is square, so neither has a determinant individually.\n- Step 2: The product $$AB$$ happens to be $$2 \\times 2$$ (square), so it does have a determinant — but you must compute $$AB$$ first, then take its determinant. There is no shortcut through individual determinants of non-square matrices.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "FP1 Jan 2023 Q1 — After finding the values of $$k$$ that make $$\\det(AB)=0$$, what final check must you perform against the question's wording, and why? (2 steps)", "answer": "- Step 1: Check that both roots are **non-zero**, because the question states \"$$k$$ is a non-zero constant.\" Here the roots are $$k=\\frac{1}{2}$$ and $$k=4$$ — both non-zero, so both are valid.\n- Step 2: If the quadratic had produced $$k=0$$ as a root, you would need to reject it and report only the non-zero root(s). Reporting $$k=0$$ when the question explicitly excludes it loses the accuracy mark.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "FP1 Jan 2023 Q2 — When you see a sum like $$\\sum_{r=1}^{n}(7r-5)^2$$, what is the very first algebraic step, and why can't you apply the standard sum formulas directly? (2 steps)", "answer": "- Step 1: **Expand the summand** first: $$(7r-5)^2 = 49r^2 - 70r + 25$$. You must do this because the standard formulas are for $$\\sum r$$, $$\\sum r^2$$, and $$\\sum 1$$ — not for $$\\sum(7r-5)^2$$ directly.\n- Step 2: Only after expanding can you use linearity of summation: $$\\sum(49r^2-70r+25) = 49\\sum r^2 - 70\\sum r + 25\\sum 1$$. Each piece now matches a standard formula.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "FP1 Jan 2023 Q2 — When computing $$\\sum_{r=1}^{n} 25$$ (or any constant), what is the result, and what is the common wrong answer? (2 steps)", "answer": "- Step 1: $$\\sum_{r=1}^{n} 25 = 25n$$. There are $$n$$ terms in the sum from $$r=1$$ to $$n$$, each equal to 25, so the total is $$25 \\times n$$.\n- Step 2: The common wrong answer is $$25(n+1)$$, confusing it with the number of terms in a sequence like $$0, 1, 2, \\ldots, n$$ which has $$n+1$$ terms. But the summation index runs from 1 to $$n$$, giving exactly $$n$$ terms.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "FP1 Jan 2023 Q2 — After substituting the standard sum formulas and reaching a common denominator of 6, what strategic step should you take before factorising, and how does the question's required form telegraph this? (2 steps)", "answer": "- Step 1: Factor out $$\\frac{n}{6}$$ immediately — write the expression as $$\\frac{n}{6}[\\text{bracket}]$$. The question asks you to show the result equals $$\\frac{n}{6}(7n+1)(An+B)$$, so the $$\\frac{n}{6}$$ factor is already separated in the target form.\n- Step 2: Pulling $$\\frac{n}{6}$$ out first simplifies the remaining bracket to a quadratic in $$n$$, which you can then factorise cleanly. If you try to factorise the entire expression at once, you'll fight unnecessary complexity.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "FP1 Jan 2023 Q2 — When expanding $$(7r-5)^2$$, what is the middle term and what is the common sign error? (2 steps)", "answer": "- Step 1: The middle term is $$-70r$$, because $$(7r-5)^2 = (7r)^2 + 2(7r)(-5) + (-5)^2 = 49r^2 - 70r + 25$$.\n- Step 2: The common error is writing $$-35r$$, either by forgetting to double the product or by computing $$7 \\times 5 = 35$$ and forgetting the factor of 2 from the binomial expansion. This cascades through the entire solution, making the final factorisation impossible.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "FP1 Jan 2023 Q2 — After factorising the quadratic $$98n^2 - 63n - 11$$ as $$(7n+1)(14n-11)$$, how do you verify you have the correct ordering and not $$(14n+1)(7n-11)$$? (2 steps)", "answer": "- Step 1: Multiply out both candidates and check the middle term. $$(7n+1)(14n-11) = 98n^2 - 77n + 14n - 11 = 98n^2 - 63n - 11$$. ✓ The middle term is $$-63n$$, matching.\n- Step 2: $$(14n+1)(7n-11) = 98n^2 - 154n + 7n - 11 = 98n^2 - 147n - 11$$. The middle term is $$-147n \\ne -63n$$. Only one ordering produces the correct linear coefficient.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "FP1 Jan 2023 Q2 — What quick sanity check can you perform at $$n=1$$ to verify your final answer $$\\frac{n}{6}(7n+1)(14n-11)$$? (2 steps)", "answer": "- Step 1: At $$n=1$$, the LHS is $$(7(1)-5)^2 = 2^2 = 4$$.\n- Step 2: The RHS is $$\\frac{1}{6}(7+1)(14-11) = \\frac{1}{6}(8)(3) = \\frac{24}{6} = 4$$. LHS = RHS ✓. This one-second check catches sign errors and factorisation mistakes instantly.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "FP1 Jan 2023 Q3 — When told \"−3 is a root of $$f(z)=0$$\", what is the very first thing you write down and why? (2 steps)", "answer": "- Step 1: Write $$f(-3) = 0$$ and substitute. This is the Factor Theorem: if $$r$$ is a root of $$f$$, then $$f(r) = 0$$. Substituting $$z = -3$$ into $$4z^3 + pz^2 + 24z + 108$$ gives an equation in $$p$$ alone.\n- Step 2: The key sign pitfall is $$(-3)^2 = +9$$, NOT $$-9$$. Writing $$-9p$$ instead of $$+9p$$ flips the sign of $$p$$ and destroys the rest of the question. Always pause on even powers of negative numbers.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "FP1 Jan 2023 Q3 — When performing polynomial division (or matching coefficients) on $$4z^3+8z^2+24z+108$$ by $$(z+3)$$, what trick avoids confusion from the leading coefficient 4? (3 steps)", "answer": "- Step 1: Write $$(z+3)(4z^2+az+b)$$ and expand: $$4z^3 + az^2 + bz + 12z^2 + 3az + 3b$$.\n- Step 2: Match coefficients. The $$z^2$$ term: $$a + 12 = 8 \\Rightarrow a = -4$$. The constant: $$3b = 108 \\Rightarrow b = 36$$. Check with the $$z$$ term: $$b + 3a = 36 - 12 = 24$$ ✓.\n- Step 3: The trick is to keep the 4 inside the quadratic factor from the start (writing $$4z^2$$, not just $$z^2$$). This avoids dragging the 4 through long division and making alignment errors. The leading coefficient of the quotient must be 4 so that $$(z)(4z^2) = 4z^3$$.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "FP1 Jan 2023 Q3 — After finding the quadratic factor $$4z^2-4z+36$$, what should you do before solving, and why? (2 steps)", "answer": "- Step 1: Factor out the 4: $$4(z^2 - z + 9)$$, then solve $$z^2 - z + 9 = 0$$. This makes the quadratic formula application cleaner — the discriminant and roots are simpler without the leading 4.\n- Step 2: Applying the quadratic formula to $$4z^2-4z+36=0$$ directly gives $$z = \\frac{4 \\pm \\sqrt{16-576}}{8}$$, which works but requires more arithmetic and introduces an extra chance for errors. Factoring out first gives $$z = \\frac{1 \\pm \\sqrt{1-36}}{2} = \\frac{1 \\pm i\\sqrt{35}}{2}$$ — cleaner and less error-prone.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "FP1 Jan 2023 Q3 — For the quadratic $$z^2-z+9=0$$ with complex conjugate roots $$\\alpha, \\bar{\\alpha}$$, what is the slick shortcut to find $$|\\alpha|$$ without computing $$\\sqrt{(\\text{Re})^2+(\\text{Im})^2}$$? (2 steps)", "answer": "- Step 1: For a quadratic $$z^2 + bz + c = 0$$ with conjugate roots $$\\alpha, \\bar{\\alpha}$$, the product of roots is $$\\alpha\\bar{\\alpha} = c$$. But $$\\alpha\\bar{\\alpha} = |\\alpha|^2$$, so $$|\\alpha|^2 = c$$.\n- Step 2: Here $$c = 9$$, so $$|\\alpha|^2 = 9$$, giving $$|\\alpha| = 3$$. This avoids computing $$\\sqrt{(1/2)^2 + (\\sqrt{35}/2)^2} = \\sqrt{1/4 + 35/4} = \\sqrt{9} = 3$$. Both routes give 3, but the product-of-roots route is one step instead of three.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "FP1 Jan 2023 Q3 — On an Argand diagram showing three roots including a conjugate pair, what geometric features must you mark to score full marks? (3 steps)", "answer": "- Step 1: Plot and **label all three points** with their coordinates: $$(-3, 0)$$, $$(\\frac{1}{2}, \\frac{\\sqrt{35}}{2})$$, $$(\\frac{1}{2}, -\\frac{\\sqrt{35}}{2})$$. No labels = no marks.\n- Step 2: Mark the **real axis** and **imaginary axis** clearly with the origin labelled. Mark a scale or at least indicate key values.\n- Step 3: Indicate the **conjugate symmetry** — the two complex roots are reflections of each other in the real axis. A dashed vertical line through their real part ($$x = \\frac{1}{2}$$) makes this visually obvious. Also note they lie on the circle of radius 3 centred at the origin (passing through $$-3$$).", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "FP1 Jan 2023 Q3 — What is the common error in computing the modulus $$|z|$$ of a complex number $$z = x + iy$$, and what is the correct formula? (2 steps)", "answer": "- Step 1: The correct formula is $$|z| = \\sqrt{x^2 + y^2}$$. This comes from Pythagoras — the distance from the origin to the point $$(x, y)$$ on the Argand diagram.\n- Step 2: The common error is writing $$\\sqrt{|x| + |y|}$$ or $$\\sqrt{|x|^2 + |y|^2}$$ (the latter is technically the same but reveals confused thinking). You must **square** the real and imaginary parts, **add** them, then take the **square root**. No absolute values needed before squaring because squaring already makes everything positive.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "FP1 Jan 2023 Q4 — When differentiating $$\\frac{1}{8x^4}$$, what algebraic step must you take first, and what is the most common differentiation error? (3 steps)", "answer": "- Step 1: Rewrite as $$\\frac{1}{8}x^{-4}$$ BEFORE differentiating. Putting the exponent on top reminds you to bring it down when applying the power rule.\n- Step 2: Apply the power rule: $$\\frac{d}{dx}\\left[\\frac{1}{8}x^{-4}\\right] = \\frac{1}{8}(-4)x^{-5} = -\\frac{1}{2}x^{-5}$$. The factor of $$-4$$ multiplies the $$\\frac{1}{8}$$ to give $$-\\frac{4}{8} = -\\frac{1}{2}$$.\n- Step 3: The most common error is forgetting to multiply by the exponent — writing $$-\\frac{1}{8}x^{-5}$$ instead of $$-\\frac{1}{2}x^{-5}$$. The exponent $$-4$$ must come down and multiply the coefficient. This is the \"chain factor for $$x^{-n}$$\" error.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "FP1 Jan 2023 Q4(a)(ii) — The question asks why $$x_0 = 0.25$$ cannot be used as an initial approximation in Newton-Raphson. What is the correct reason (NOT \"$$f'(0.25)=0$$\"), and how do you verify this? (3 steps)", "answer": "- Step 1: The structural reason \"NR fails when $$f'(x_n)=0$$ because of division by zero\" is a correct general principle, but it does NOT apply here. Computing $$f'(0.25) = -\\frac{1}{2}(0.25)^{-5} + 2(0.25)^{-8} \\ne 0$$ — it is a large positive number.\n- Step 2: The actual reason is that $$x = 0.25$$ is the **right-hand endpoint of the bracket** $$[0.15, 0.25]$$. The tangent at an endpoint can shoot the next iterate outside the interval, producing a divergent or oscillating sequence.\n- Step 3: The lesson: **never assert $$f'(x_0) = 0$$ without computing it**. State your reason only after verification. Phuc's structural reasoning was fine in general but misapplied to this specific function.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "FP1 Jan 2023 Q4 — When applying Newton-Raphson, how should you lay out your working to maximise method marks and minimise sign errors? (3 steps)", "answer": "- Step 1: Evaluate $$f(x_0)$$ and $$f'(x_0)$$ **separately and labelled** — write \"Numerator: $$f(0.15) = \\ldots$$\" and \"Denominator: $$f'(0.15) = \\ldots$$\" on separate lines.\n- Step 2: Then write the full NR formula $$x_1 = x_0 - \\frac{f(x_0)}{f'(x_0)}$$ with the numerical values substituted, before computing. This shows the examiner your method even if arithmetic goes wrong.\n- Step 3: Keep **full calculator precision** throughout — do not round intermediate values to 3 dp. Only round the final answer to 3 dp at the very end. Rounding early cascades errors.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "FP1 Jan 2023 Q4(b) — What is the linear interpolation formula, and how does it differ geometrically from Newton-Raphson? (2 steps)", "answer": "- Step 1: Linear interpolation: $$x \\approx x_1 - f(x_1) \\cdot \\frac{x_2 - x_1}{f(x_2) - f(x_1)}$$. This finds where the **chord** (straight line) between $$(x_1, f(x_1))$$ and $$(x_2, f(x_2))$$ crosses the $$x$$-axis.\n- Step 2: Newton-Raphson uses the **tangent** at a single point, requiring the derivative. Linear interpolation uses **two function values** (no derivative needed). NR converges quadratically when well-behaved; LI converges linearly. They are fundamentally different methods — never confuse them.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "FP1 Jan 2023 Q4(b) — Before applying linear interpolation on $$[0.15, 0.25]$$, what sign check must you perform, and why? (2 steps)", "answer": "- Step 1: Verify that $$f(0.15)$$ and $$f(0.25)$$ have **opposite signs**. This confirms a root exists in the interval by the Intermediate Value Theorem (sign change = root).\n- Step 2: If both values have the same sign, there is no guarantee of a root in the interval, and the linear interpolation formula would give a point that is meaningless. The sign change is a prerequisite for the method to be valid.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "FP1 Jan 2023 Q5(a) — For the quadratic $$4x^2-3x+k=0$$ with roots $$\\alpha, \\beta$$, what are Vieta's formulas for $$\\alpha+\\beta$$ and $$\\alpha\\beta$$, and what is the common sign error? (2 steps)", "answer": "- Step 1: For $$ax^2+bx+c=0$$: $$\\alpha+\\beta = -\\frac{b}{a}$$ and $$\\alpha\\beta = \\frac{c}{a}$$. Here $$a=4, b=-3, c=k$$, so $$\\alpha+\\beta = -\\frac{-3}{4} = \\frac{3}{4}$$ and $$\\alpha\\beta = \\frac{k}{4}$$.\n- Step 2: The common sign error is forgetting the minus in $$\\alpha+\\beta = -b/a$$ and writing $$\\alpha+\\beta = -3/4$$. The minus sign in the formula is non-negotiable — it comes from the factorisation $$a(x-\\alpha)(x-\\beta) = ax^2 - a(\\alpha+\\beta)x + a\\alpha\\beta$$, so comparing to $$ax^2+bx+c$$ gives $$b = -a(\\alpha+\\beta)$$, hence $$\\alpha+\\beta = -b/a$$.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "FP1 Jan 2023 Q5(b) — When you see the expression $$\\frac{\\alpha}{\\beta^2}+\\frac{\\beta}{\\alpha^2}$$, what is the first algebraic manoeuvre and why? (2 steps)", "answer": "- Step 1: Combine over the common denominator $$\\alpha^2\\beta^2$$: $$\\frac{\\alpha}{\\beta^2}+\\frac{\\beta}{\\alpha^2} = \\frac{\\alpha^3+\\beta^3}{\\alpha^2\\beta^2} = \\frac{\\alpha^3+\\beta^3}{(\\alpha\\beta)^2}$$.\n- Step 2: This is strategic because the denominator becomes $$(\\alpha\\beta)^2$$, which you already know from Vieta, and the numerator becomes $$\\alpha^3+\\beta^3$$, which you can evaluate using the cubic identity. The expression is designed to decompose into known quantities.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "FP1 Jan 2023 Q5(b) — What is the critical identity for $$\\alpha^3+\\beta^3$$, and what is the exact mistake Phuc made? (2 steps)", "answer": "- Step 1: The identity is $$\\alpha^3+\\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$$. The coefficient of the second term is **3**, not 1.\n- Step 2: Phuc wrote $$(\\alpha+\\beta)^3 - \\alpha\\beta(\\alpha+\\beta)$$, missing the factor of 3. This produced the wrong numerical answer for part (b) and cascaded into part (c). This identity is NOT in the formula booklet — you must memorise it, and the \"3\" is the most commonly forgotten part.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "FP1 Jan 2023 Q5(c) — After finding that the new quadratic has sum $$\\frac{9(3-4k)}{4k^2}$$ and product $$\\frac{4}{k}$$, what final step does the question demand that is easy to forget? (2 steps)", "answer": "- Step 1: The quadratic with new roots is $$x^2 - (\\text{sum})x + (\\text{product}) = 0$$, i.e. $$x^2 - \\frac{9(3-4k)}{4k^2}x + \\frac{4}{k} = 0$$. But the question requires the form $$px^2+qx+r=0$$ where $$p,q,r$$ are **integers in terms of $$k$$**.\n- Step 2: Multiply through by $$4k^2$$ to clear all denominators: $$4k^2 x^2 - 9(3-4k)x + 16k = 0$$, i.e. $$4k^2 x^2 + (36k-27)x + 16k = 0$$. Forgetting to clear denominators — leaving fractional coefficients — loses the final accuracy mark because the rubric explicitly demands integers.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "FP1 Jan 2023 Q5(c) — What is the product $$\\frac{\\alpha}{\\beta^2} \\cdot \\frac{\\beta}{\\alpha^2}$$, and what elegant simplification does it undergo? (2 steps)", "answer": "- Step 1: $$\\frac{\\alpha}{\\beta^2} \\cdot \\frac{\\beta}{\\alpha^2} = \\frac{\\alpha\\beta}{\\alpha^2\\beta^2} = \\frac{1}{\\alpha\\beta}$$. The $$\\alpha\\beta$$ in the numerator cancels one factor from the denominator's $$\\alpha^2\\beta^2$$.\n- Step 2: Since $$\\alpha\\beta = k/4$$, the product is $$\\frac{1}{k/4} = \\frac{4}{k}$$. This is remarkably simple — the product of the new roots depends only on $$k$$, not on $$\\alpha+\\beta$$. Recognising this cancellation saves significant work.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "FP1 Jan 2023 Q5(c) — When assembling the quadratic $$x^2 - (\\text{sum})x + (\\text{product}) = 0$$ from new roots, what sign must you be careful about? (2 steps)", "answer": "- Step 1: The quadratic is $$x^2 - (\\alpha'+\\beta')x + \\alpha'\\beta' = 0$$. The coefficient of $$x$$ is the **negative** of the sum of roots — the minus sign is built into the formula.\n- Step 2: A common error is writing $$x^2 + (\\alpha'+\\beta')x + \\alpha'\\beta' = 0$$, forgetting the minus. This flips the sign of the linear coefficient and produces the wrong quadratic. Always write the template \"$$x^2$$ minus sum $$x$$ plus product = 0\" explicitly.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "FP1 Jan 2023 Q6(a) — Given the rectangular hyperbola $$xy=20$$ and the general point $$P(2t\\sqrt{a}, \\frac{2\\sqrt{a}}{t})$$, how do you determine $$a$$? (2 steps)", "answer": "- Step 1: Since $$P$$ lies on $$xy=20$$, substitute: $$x_P \\cdot y_P = (2t\\sqrt{a})\\left(\\frac{2\\sqrt{a}}{t}\\right) = 4a$$. The $$t$$ cancels and the $$\\sqrt{a}$$ terms multiply to $$a$$.\n- Step 2: Set $$4a = 20$$, giving $$a = 5$$. Don't guess — always verify by substituting the parametric coordinates into the curve equation. The parametric form of $$xy=c^2$$ is $$(ct, c/t)$$, and here $$c = 2\\sqrt{5}$$ since $$(2\\sqrt{5})^2 = 20$$.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "FP1 Jan 2023 Q6(b) — For the rectangular hyperbola $$xy=20$$, how do you find $$\\frac{dy}{dx}$$ using implicit differentiation, and what is the gradient of the normal? (3 steps)", "answer": "- Step 1: Differentiate $$xy = 20$$ implicitly: $$y + x\\frac{dy}{dx} = 0$$, so $$\\frac{dy}{dx} = -\\frac{y}{x}$$.\n- Step 2: At $$P = (2t\\sqrt{5}, \\frac{2\\sqrt{5}}{t})$$: $$\\frac{dy}{dx}\\bigg|_P = -\\frac{2\\sqrt{5}/t}{2t\\sqrt{5}} = -\\frac{1}{t^2}$$. The gradient of the tangent is $$-\\frac{1}{t^2}$$.\n- Step 3: The normal is perpendicular to the tangent, so its gradient is the negative reciprocal: $$m_N = t^2$$. (Product of tangent and normal gradients = $$-1$$: $$(-1/t^2)(t^2) = -1$$ ✓.)", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "FP1 Jan 2023 Q6(b) — When deriving the normal equation, what algebraic step cleans up the $$1/t$$ fraction, and why should you do it early? (2 steps)", "answer": "- Step 1: Multiply the entire normal equation through by $$t$$ to eliminate the $$\\frac{1}{t}$$ term. The raw equation $$y - \\frac{2\\sqrt{5}}{t} = t^2(x - 2t\\sqrt{5})$$ becomes $$ty - 2\\sqrt{5} = t^3 x - 2t^4\\sqrt{5}$$.\n- Step 2: Doing this early avoids carrying fractions through subsequent rearrangement, which is where sign errors and algebraic slips accumulate. The target form $$ty - t^3 x - 2\\sqrt{5}(1-t^4) = 0$$ has no fractions — multiply by $$t$$ first to match it cleanly.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "FP1 Jan 2023 Q6(c) — When substituting point $$B$$'s coordinates into the normal at $$A$$, what is the critical distinction about which parameter goes where? (3 steps)", "answer": "- Step 1: The normal equation from part (b) uses parameter $$t$$. Since $$A$$ has parameter $$c$$, the normal at $$A$$ is obtained by replacing $$t$$ with $$c$$: $$cy - c^3 x - 2\\sqrt{5}(1-c^4) = 0$$.\n- Step 2: Point $$B$$ has parameter $$-\\frac{1}{2c}$$, so its coordinates are $$x_B = -\\frac{\\sqrt{5}}{c}$$ and $$y_B = -4c\\sqrt{5}$$. These are the values you substitute for $$x$$ and $$y$$ in the normal equation.\n- Step 3: The error is substituting $$B$$'s parameter $$-\\frac{1}{2c}$$ into the normal equation *in place of* $$c$$. The equation is **A's normal** — its parameter is fixed as $$c$$. You substitute **B's coordinates** $$(x_B, y_B)$$, not B's parameter, into A's equation.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "FP1 Jan 2023 Q6(c) — After substituting and simplifying to $$2c^4 - 3c^2 - 2 = 0$$, what substitution should you make immediately upon seeing only even powers of $$c$$, and why? (2 steps)", "answer": "- Step 1: Substitute $$u = c^2$$ immediately. The equation becomes $$2u^2 - 3u - 2 = 0$$, a standard quadratic in $$u$$ that factorises as $$(2u+1)(u-2) = 0$$.\n- Step 2: Solving $$2c^4 - 3c^2 - 2 = 0$$ directly as a \"quadratic in $$c$$\" is wrong — it's degree 4 in $$c$$. The substitution $$u = c^2$$ is the standard trick whenever only even powers appear. It reduces the degree by half and makes factorisation transparent.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "FP1 Jan 2023 Q6(c) — After solving $$u = c^2$$ and getting $$u = -\\frac{1}{2}$$ or $$u = 2$$, what must you reject and why, and what final values do you report? (2 steps)", "answer": "- Step 1: Reject $$u = -\\frac{1}{2}$$ because $$u = c^2 \\geq 0$$ for real $$c$$. A square cannot be negative.\n- Step 2: From $$c^2 = 2$$, report **both** $$c = \\sqrt{2}$$ and $$c = -\\sqrt{2}$$. A common error is reporting only the positive root. Since $$c$$ is a real parameter (not specified as positive), both signs are valid.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "FP1 Jan 2023 Q6(c) — When simplifying the substitution of B's coordinates into A's normal equation, what common factor can you divide out of every term, and why is this important? (2 steps)", "answer": "- Step 1: Every term in the expanded equation contains a factor of $$\\sqrt{5}$$. Dividing through by $$\\sqrt{5}$$ eliminates it entirely, leaving $$-4c^2 + c^2 - 2 + 2c^4 = 0$$.\n- Step 2: This is important because carrying $$\\sqrt{5}$$ through subsequent algebra creates visual clutter and increases the chance of dropping it from one term. Factoring it out early simplifies the equation to a pure polynomial in $$c$$.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "FP1 Jan 2023 Q7(i)(a) — When given the matrix $$P = \\begin{pmatrix}0&1\\\\-1&0\\end{pmatrix}$$ and asked to describe the transformation, what quick test on the entries tells you it must be a rotation? (2 steps)", "answer": "- Step 1: Check the entries. If the matrix has the form $$\\begin{pmatrix}a&-b\\\\b&a\\end{pmatrix}$$ (or with sign variations) with entries that are 0, 1, or −1, it's a rotation by a multiple of 90°. Here $$(0,1,-1,0)$$ fits $$\\begin{pmatrix}\\cos\\theta&-\\sin\\theta\\\\\\sin\\theta&\\cos\\theta\\end{pmatrix}$$ with $$\\theta = -90°$$.\n- Step 2: Mr Fuat's heuristic: \"If you get values different from 1 and −1, it must be a rotation [by a non-right angle].\" A reflection would have determinant −1 and entries ±1 only (for right-angle reflections). The determinant of $$P$$ is $$0(0)-1(-1)=1$$, confirming rotation (not reflection).", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": true}, {"question": "FP1 Jan 2023 Q7(i)(a) — When describing a rotation transformation fully, what three pieces of information must you state? (2 steps)", "answer": "- Step 1: You must state: **angle**, **direction** (clockwise or anticlockwise), and **centre**. For $$P$$: rotation of 90° clockwise about the origin (equivalently 270° anticlockwise).\n- Step 2: Omitting any of the three loses marks. \"Rotation of 90°\" without direction is incomplete. \"Rotation about the origin\" without angle is incomplete. The centre is almost always the origin in FP1, but you must still state it.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "FP1 Jan 2023 Q7(i)(b) — When a transformation is a rotation followed by an enlargement, how do you construct the combined matrix, and in what order? (2 steps)", "answer": "- Step 1: First write the rotation matrix $$R_{240°} = \\begin{pmatrix}\\cos 240°&-\\sin 240°\\\\\\sin 240°&\\cos 240°\\end{pmatrix} = \\begin{pmatrix}-1/2&\\sqrt{3}/2\\\\-\\sqrt{3}/2&-1/2\\end{pmatrix}$$. Then the enlargement by factor 6 about the origin is $$6I$$, which scales every entry of the rotation matrix by 6.\n- Step 2: The combined matrix is $$Q = 6R_{240°} = \\begin{pmatrix}-3&3\\sqrt{3}\\\\-3\\sqrt{3}&-3\\end{pmatrix}$$. Since the enlargement is a scalar multiple of the identity, it commutes with the rotation — order doesn't matter here. But in general, write the rotation matrix first and then scale.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "FP1 Jan 2023 Q7(i)(b) — What is the value of $$\\sin 240°$$, and what is the common sign error? (2 steps)", "answer": "- Step 1: $$\\sin 240° = -\\frac{\\sqrt{3}}{2}$$. The angle 240° is in the third quadrant, where both sine and cosine are negative.\n- Step 2: The common error is writing $$\\sin 240° = +\\frac{\\sqrt{3}}{2}$$, treating it as if it were in the second quadrant (like 120°). Always sketch the angle on the unit circle to determine the sign: 240° = 180° + 60°, firmly in Q3.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "FP1 Jan 2023 Q7(i)(c) — The transformation $$U$$ is followed by $$V$$. What is the matrix for the combined transformation, and why does the order matter? (2 steps)", "answer": "- Step 1: \"$$U$$ then $$V$$\" means apply $$U$$ first, then $$V$$. The combined matrix is $$R = VU = QP$$ (rightmost acts first on the column vector). So compute $$QP$$, NOT $$PQ$$.\n- Step 2: Matrix multiplication is not commutative: $$QP \\ne PQ$$ in general. The convention is that if you apply transformation $$U$$ to a point $$\\mathbf{v}$$, the result is $$U\\mathbf{v}$$; then applying $$V$$ gives $$V(U\\mathbf{v}) = (VU)\\mathbf{v}$$. The rightmost matrix in the product acts first.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "FP1 Jan 2023 Q7(ii) — When the matrix $$W$$ maps $$(\\lambda, 1)$$ to $$(4\\lambda, 4)$$, how do you set up the problem and what consistency check must you perform? (3 steps)", "answer": "- Step 1: Write the matrix equation $$W\\begin{pmatrix}\\lambda\\\\1\\end{pmatrix} = \\begin{pmatrix}4\\lambda\\\\4\\end{pmatrix}$$ and extract two component equations: one from the top row, one from the bottom row.\n- Step 2: Solve each equation for $$\\lambda$$ separately. This gives two expressions for $$\\lambda$$ — one from each row.\n- Step 3: **Set them equal** (consistency check). If they agree, you've found $$\\lambda$$. If they contradict, there's an error in the matrix entries or your algebra. Always solve both equations — solving only the first and ignoring the second is a common pitfall that can produce an inconsistent answer.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "FP1 Jan 2023 Q7(ii) — When comparing two surd expressions for $$\\lambda$$ that appear different, what algebraic technique do you use to check if they're equal? (2 steps)", "answer": "- Step 1: **Rationalise the denominator** of each expression. Multiply numerator and denominator by the conjugate of the denominator to eliminate surds from the denominator.\n- Step 2: After rationalising, both expressions should simplify to the same form. If they don't, cross-multiply and check algebraically. As a last resort, square both sides (valid when both sides are positive) to eliminate square roots and compare.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": true}, {"question": "FP1 Jan 2023 Q8(a) — For the parabola $$y^2=4ax$$, what is the focus-directrix shortcut for computing $$PS$$ (distance from point $$P$$ to focus $$S$$), and why is it better than the distance formula? (3 steps)", "answer": "- Step 1: By the focus-directrix property, for any point $$P$$ on the parabola, the distance to the focus equals the distance to the directrix: $$PS = x_P - (-a) = x_P + a$$.\n- Step 2: Given $$y = k$$, find $$x_P = \\frac{k^2}{4a}$$, so $$PS = \\frac{k^2}{4a} + a = \\frac{k^2+4a^2}{4a}$$. This is a two-line calculation.\n- Step 3: Using the distance formula $$\\sqrt{(x_P-a)^2+k^2}$$ requires squaring, expanding, and simplifying — much more algebra and more chances for errors. The focus-directrix property gives the answer directly. Always use it as the first approach for parabola distance-to-focus questions.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "FP1 Jan 2023 Q8 — For the parabola $$y^2=4ax$$, what are the coordinates of the focus and the equation of the directrix? (2 steps)", "answer": "- Step 1: The focus is $$S = (a, 0)$$ and the directrix is the vertical line $$x = -a$$. These are the defining features of the parabola — every point on the curve is equidistant from the focus and the directrix.\n- Step 2: The vertex (closest point to both) is at the origin $$(0,0)$$, which is the midpoint between focus and directrix. The distance from vertex to focus is $$a$$, and from vertex to directrix is also $$a$$.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "FP1 Jan 2023 Q8(b) — The directrix $$x=-a$$ meets the $$x$$-axis at what point, and why is it NOT the origin? (2 steps)", "answer": "- Step 1: The directrix $$x = -a$$ meets the $$x$$-axis (where $$y = 0$$) at the point $$(-a, 0)$$. This is the foot of the directrix on the horizontal axis.\n- Step 2: This is NOT the origin unless $$a = 0$$ (degenerate case). The origin $$(0,0)$$ is the vertex of the parabola, which is a different point. Confusing the directrix-x-axis intersection with the origin leads to wrong coordinates for the line $$l_2$$ in part (b).", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "FP1 Jan 2023 Q8(c) — When computing the area of triangle $$BPA$$ where $$B$$ and $$P$$ share the same $$y$$-coordinate, what is the strategic choice of base, and why? (2 steps)", "answer": "- Step 1: Choose $$BP$$ as the base because it is **horizontal** (both endpoints have $$y = k$$). The length is simply $$|x_P - x_B| = \\frac{k^2}{4a} - (-a) = \\frac{k^2+4a^2}{4a}$$.\n- Step 2: The height is then the perpendicular distance from $$A$$ to the line $$y = k$$, which is just $$|k - y_A|$$. Choosing a horizontal base makes the height a simple vertical distance — no need for the general perpendicular-distance formula. Choosing $$AP$$ as the base would require a much messier calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": true}, {"question": "FP1 Jan 2023 Q8(c) — The perpendicular distance from point $$A$$ to the horizontal line $$y = k$$ is what expression, and how do you simplify it? (2 steps)", "answer": "- Step 1: The distance is $$|k - y_A| = k - \\frac{4a^2k}{k^2+4a^2}$$ (since $$k > y_A$$ for positive $$a, k$$).\n- Step 2: Combine over a common denominator: $$\\frac{k(k^2+4a^2) - 4a^2k}{k^2+4a^2} = \\frac{k^3 + 4a^2k - 4a^2k}{k^2+4a^2} = \\frac{k^3}{k^2+4a^2}$$. The $$4a^2k$$ terms cancel beautifully, leaving $$\\frac{k^3}{k^2+4a^2}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": true}, {"question": "FP1 Jan 2023 Q8(c) — After computing $$\\text{Area}(BPA) = \\frac{k^3}{8a}$$ and $$\\text{Area}(OSP) = \\frac{ak}{2}$$, what happens to $$k$$ when you form the ratio, and why is this significant? (2 steps)", "answer": "- Step 1: $$\\frac{\\text{Area}(BPA)}{\\text{Area}(OSP)} = \\frac{k^3/(8a)}{ak/2} = \\frac{k^3}{8a} \\cdot \\frac{2}{ak} = \\frac{k^2}{4a^2}$$. One factor of $$k$$ cancels from numerator and denominator.\n- Step 2: This is significant because the ratio simplifies to an expression in $$a$$ alone (and $$k^2$$), and setting it equal to $$4k^2$$ makes the $$k^2$$ cancel on both sides: $$\\frac{k^2}{4a^2} = 4k^2 \\Rightarrow \\frac{1}{4a^2} = 4$$. Working symbolically first lets the algebra clean itself before substituting numbers.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "FP1 Jan 2023 Q8(c) — After solving $$a^2 = \\frac{1}{16}$$, why must you report $$a = \\frac{1}{4}$$ and not $$a = \\pm\\frac{1}{4}$$? (2 steps)", "answer": "- Step 1: The question states \"$$a$$ is a positive constant.\" This constraint eliminates the negative root.\n- Step 2: Reporting $$a = \\pm\\frac{1}{4}$$ without checking the sign constraint is a common error. Always re-read the question's conditions before finalising — \"positive constant\" means you discard the negative solution.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "FP1 Jan 2023 Q9 — When setting up a proof by induction, what must you state explicitly at the very beginning, and why? (2 steps)", "answer": "- Step 1: State the proposition $$P(n)$$ explicitly. Here: \"$$P(n)$$: $$\\sum_{r=1}^{n}\\log(2r-1) = \\log\\!\\left(\\frac{(2n)!}{2^n \\cdot n!}\\right)$$\". Writing it out shows the examiner exactly what you're proving.\n- Step 2: Without an explicit statement of $$P(n)$$, your base case and inductive step have no clear anchor. The examiner cannot award method marks for a proof whose target is unstated. This is a formal requirement, not just good practice.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": false}, {"question": "FP1 Jan 2023 Q9 — When verifying the base case $$n=1$$, what must you show, and what is the common shortcut that loses marks? (2 steps)", "answer": "- Step 1: Compute both LHS and RHS **separately** and show they equal the same value. LHS = $$\\log(2(1)-1) = \\log 1 = 0$$. RHS = $$\\log\\!\\left(\\frac{2!}{2^1 \\cdot 1!}\\right) = \\log(2/2) = \\log 1 = 0$$. LHS = RHS ✓.\n- Step 2: The common shortcut is just writing \"LHS = RHS = 0\" without showing the intermediate computation. This risks losing the base-case mark if the examiner can't see your working. Show both sides reducing to the same number independently.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": true}, {"question": "FP1 Jan 2023 Q9 — In the inductive step, what is the first algebraic move after writing \"Assume $$P(k)$$\", and what log law do you use? (2 steps)", "answer": "- Step 1: Write $$\\sum_{r=1}^{k+1}\\log(2r-1) = \\sum_{r=1}^{k}\\log(2r-1) + \\log(2(k+1)-1) = \\sum_{r=1}^{k}\\log(2r-1) + \\log(2k+1)$$. This splits off the new term.\n- Step 2: Apply the hypothesis to the sum: $$= \\log\\!\\left(\\frac{(2k)!}{2^k \\cdot k!}\\right) + \\log(2k+1)$$. Now use the log-sum law: $$\\log A + \\log B = \\log(AB)$$. This gives $$\\log\\!\\left(\\frac{(2k)!(2k+1)}{2^k \\cdot k!}\\right)$$. **Not** $$\\log(A + B)$$ — the law is product, not sum.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "FP1 Jan 2023 Q9 — After combining to get $$\\log\\!\\left(\\frac{(2k)!(2k+1)}{2^k \\cdot k!}\\right)$$, you need to show this equals $$\\log\\!\\left(\\frac{(2k+2)!}{2^{k+1}(k+1)!}\\right)$$. What factorial expansion chain makes this work? (3 steps)", "answer": "- Step 1: Recognise that $$(2k+1)! = (2k+1) \\cdot (2k)!$$, so the numerator $$\\frac{(2k)!(2k+1)}{2^k \\cdot k!} = \\frac{(2k+1)!}{2^k \\cdot k!}$$. This is what you have.\n- Step 2: Expand the target's numerator and denominator: $$\\frac{(2k+2)!}{2^{k+1}(k+1)!} = \\frac{(2k+2)(2k+1)!}{2 \\cdot 2^k \\cdot (k+1) \\cdot k!}$$. Note $$(2k+2) = 2(k+1)$$.\n- Step 3: Cancel: $$\\frac{2(k+1)(2k+1)!}{2 \\cdot 2^k \\cdot (k+1) \\cdot k!} = \\frac{(2k+1)!}{2^k \\cdot k!}$$. This matches what you have from Step 1. ✓ The key cancellations are: the factor of 2 in $$(2k+2) = 2(k+1)$$ cancels the 2 in $$2^{k+1} = 2 \\cdot 2^k$$, and $$(k+1)$$ cancels with $$(k+1)! = (k+1) \\cdot k!$$.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "FP1 Jan 2023 Q9 — What is the most common factorial cancellation error in inductive proofs, and how do you avoid it? (2 steps)", "answer": "- Step 1: The most common error is \"half-cancelling\" — e.g. writing $$(2k+2)! = (2k+2) \\cdot (2k+1)!$$ but then failing to further expand $$(2k+1)! = (2k+1) \\cdot (2k)!$$ when needed. Phuc kept $$(2k+1)!$$ in the numerator without connecting it to $$(2k)!$$.\n- Step 2: The fix: **write out every factorial step on a separate line**. Never skip from $$(2k+2)!$$ to a partially expanded form in one jump. The chain is: $$(2k+2)! = (2k+2)(2k+1)! = (2k+2)(2k+1)(2k)!$$. Each line is one application of $$n! = n \\cdot (n-1)!$$.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": false}, {"question": "FP1 Jan 2023 Q9 — What conclusion sentence must you write at the end of an induction proof, and what happens if you omit it? (2 steps)", "answer": "- Step 1: Write: \"$$P(1)$$ is true, and $$P(k) \\Rightarrow P(k+1)$$. Therefore, by the Principle of Mathematical Induction, $$P(n)$$ is true for all positive integers $$n$$.\"\n- Step 2: The mark scheme grants a dedicated mark for this conclusion sentence. Omitting it — even if all the mathematics is correct — loses this mark. Examiners look for it specifically. It must reference the base case, the inductive step, and the final claim.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": false}, {"question": "What is the identity for $$\\alpha^2+\\beta^2$$ in terms of $$\\alpha+\\beta$$ and $$\\alpha\\beta$$, and how does its structure relate to the identities for $$\\alpha^3+\\beta^3$$ and $$\\alpha^4+\\beta^4$$? (2 steps)", "answer": "- Step 1: $$\\alpha^2+\\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$. You square the sum and subtract twice the product.\n- Step 2: The pattern is: to express $$\\alpha^n+\\beta^n$$, you square (or cube) the previous-level sum and subtract a correction term involving $$\\alpha\\beta$$. Specifically: $$\\alpha^3+\\beta^3$$ uses $$(\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$$, and $$\\alpha^4+\\beta^4$$ uses $$(\\alpha^2+\\beta^2)^2 - 2(\\alpha\\beta)^2$$. Each correction term has a coefficient (2 or 3) that comes from the binomial expansion — never omit it.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": true}, {"question": "For the rectangular hyperbola $$xy = c^2$$, what is the standard parametric form, and what is the gradient at the general point? (2 steps)", "answer": "- Step 1: The parametric form is $$\\left(ct, \\frac{c}{t}\\right)$$ where $$t \\ne 0$$. You can verify: $$x \\cdot y = ct \\cdot \\frac{c}{t} = c^2$$ ✓.\n- Step 2: The gradient at the general point is $$-\\frac{1}{t^2}$$ (obtained from implicit differentiation: $$y + x\\frac{dy}{dx} = 0$$, so $$\\frac{dy}{dx} = -\\frac{y}{x} = -\\frac{c/t}{ct} = -\\frac{1}{t^2}$$). This is always negative (for $$t \\ne 0$$), consistent with the hyperbola's decreasing branches. Not in the formula booklet — memorise.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": false}, {"question": "For the parabola $$y^2=4ax$$, what is the parametric form, and what is the gradient at the general point? (2 steps)", "answer": "- Step 1: The parametric form is $$(at^2, 2at)$$. You can verify: $$(2at)^2 = 4a^2t^2 = 4a(at^2)$$ ✓.\n- Step 2: The gradient at the general point is $$\\frac{1}{t}$$ (from implicit differentiation: $$2y\\frac{dy}{dx} = 4a$$, so $$\\frac{dy}{dx} = \\frac{2a}{y} = \\frac{2a}{2at} = \\frac{1}{t}$$). Not in the formula booklet — memorise.", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": false}, {"question": "When a question says \"give your answer in the form $$px^2+qx+r=0$$ where $$p, q, r$$ are integers\", what does this constraint force you to do if your current coefficients are fractions? (2 steps)", "answer": "- Step 1: Multiply through by the lowest common multiple of the denominators to clear all fractions. For example, if you have $$x^2 - \\frac{9(3-4k)}{4k^2}x + \\frac{4}{k} = 0$$, multiply by $$4k^2$$.\n- Step 2: After clearing, verify that all coefficients are indeed integers (in terms of any parameters). If $$k$$ is an integer, then $$4k^2$$, $$36k-27$$, and $$16k$$ are all integers ✓. Leaving fractional coefficients when the rubric demands integers loses the final accuracy mark.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": false}, {"question": "What is the general principle for determining the order of matrix multiplication when combining transformations, and what mnemonic helps? (2 steps)", "answer": "- Step 1: \"$$U$$ then $$V$$\" means apply $$U$$ first, then $$V$$. The combined matrix is $$VU$$ — the **rightmost** matrix acts first on the column vector $$\\mathbf{v}$$, because $$V(U\\mathbf{v}) = (VU)\\mathbf{v}$$.\n- Step 2: Mnemonic: the order of writing matches the order of reading the transformation description **right to left**. \"First $$U$$, then $$V$$\" = write $$VU$$ (rightmost = first applied). Or: the matrix closest to the vector acts first.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": false}, {"question": "For the rotation matrix $$\\begin{pmatrix}\\cos\\theta&-\\sin\\theta\\\\\\sin\\theta&\\cos\\theta\\end{pmatrix}$$, what is the determinant, and what does it tell you about the transformation? (2 steps)", "answer": "- Step 1: $$\\det = \\cos^2\\theta + \\sin^2\\theta = 1$$. The determinant of any pure rotation matrix is 1.\n- Step 2: A determinant of 1 means the transformation preserves area (and orientation). If the determinant were −1, it would be a reflection (preserves area but reverses orientation). This is a quick check: if you compute a \"rotation\" matrix and get $$\\det \\ne 1$$, you've made an error.", "source": "GLM 5.1 ②", "_id": "glm_2_62", "judge_pick": false}, {"question": "When a question gives you a \"show that\" target form like $$\\frac{n}{6}(7n+1)(An+B)$$, how does this telegraph your strategy? (2 steps)", "answer": "- Step 1: The target form tells you the final factorisation. The $$\\frac{n}{6}$$ factor is already separated, so you should pull it out early. The remaining quadratic $$(7n+1)(An+B)$$ tells you the quadratic factorises with one root at $$n = -1/7$$.\n- Step 2: Work **towards** the target. Every algebraic step should move you closer to the required form. If you're going in a different direction (e.g. trying to factorise without first extracting $$\\frac{n}{6}$$), pause and realign. \"Show that\" questions are signposted — follow the signs.", "source": "GLM 5.1 ②", "_id": "glm_2_63", "judge_pick": false}, {"question": "What is the exam pacing rule for FP1 (75 marks, 90 minutes), and what should you do when you exceed the time budget on a question? (2 steps)", "answer": "- Step 1: Pace = 1.2 minutes per mark. A 5-mark question should take ≤ 6 minutes; a 6-mark induction ≤ 7 minutes.\n- Step 2: If you're stuck past the pace budget, **flag and move on**. Return at the end with fresh eyes. Spending 15 minutes on a 5-mark question and leaving a 6-mark question blank is a catastrophic trade. Every mark is worth the same — collect the easy ones first.", "source": "GLM 5.1 ②", "_id": "glm_2_64", "judge_pick": false}, {"question": "What annotation strategy should you apply to every FP1 question before solving, and what does it prevent? (2 steps)", "answer": "- Step 1: Circle constants, underline unknowns, and **draw a diagram** for any geometry question. Two minutes on annotation prevents ten minutes of confusion.\n- Step 2: For matrix questions, circle negative entries. For parametric questions, label which point has which parameter. For conic questions, sketch the curve with focus and directrix marked. Annotation forces you to read the question carefully and creates a visual reference that prevents substitution errors mid-calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_65", "judge_pick": false}, {"question": "When should you use your calculator for matrix operations, and when must you work by hand? (2 steps)", "answer": "- Step 1: Use the calculator for matrix multiplication with **purely numerical** entries. This is fast and accurate.\n- Step 2: You MUST work by hand when the matrices contain **unknowns** (like $$k$$, $$\\lambda$$, $$t$$). The calculator cannot handle symbolic entries. Mr Fuat is explicit: \"If there is an unknown inside the matrices, you cannot use your calculator. You must solve by hand.\"", "source": "GLM 5.1 ②", "_id": "glm_2_66", "judge_pick": false}, {"question": "What is the single highest-leverage skill for this paper, and how should you drill it? (2 steps)", "answer": "- Step 1: **Identity recall** is the highest-leverage skill. Questions 3, 5, and 9 all hinge on remembering algebraic identities cold: Vieta's formulas, the power-sum identities ($$\\alpha^2+\\beta^2$$, $$\\alpha^3+\\beta^3$$, $$\\alpha^4+\\beta^4$$), and factorial expansions.\n- Step 2: Drill by spending 10 minutes daily writing them out from memory. The four critical identities are: $$\\alpha^2+\\beta^2 = (\\alpha+\\beta)^2-2\\alpha\\beta$$, $$\\alpha^3+\\beta^3 = (\\alpha+\\beta)^3-3\\alpha\\beta(\\alpha+\\beta)$$, $$\\alpha^4+\\beta^4 = (\\alpha^2+\\beta^2)^2-2(\\alpha\\beta)^2$$, and the Vieta pair $$\\alpha+\\beta = -b/a$$, $$\\alpha\\beta = c/a$$. None are in the formula booklet.", "source": "GLM 5.1 ②", "_id": "glm_2_67", "judge_pick": true}, {"question": "What is the common error pattern \"quadratic-in-disguise\", and what is the universal first response when you see only even powers of the variable? (2 steps)", "answer": "- Step 1: A quadratic-in-disguise is an equation like $$2c^4 - 3c^2 - 2 = 0$$ that looks like a quartic but is actually quadratic in $$c^2$$.\n- Step 2: The universal first response: whenever you see **only even powers** of the variable, substitute $$u = x^2$$ immediately. This reduces $$2c^4 - 3c^2 - 2 = 0$$ to $$2u^2 - 3u - 2 = 0$$, which factorises as $$(2u+1)(u-2) = 0$$. Never try to factorise the quartic directly.", "source": "GLM 5.1 ②", "_id": "glm_2_68", "judge_pick": false}, {"question": "When computing the area of a triangle with vertices at known coordinates, what strategic choice minimises computation, and how do you recognise it? (2 steps)", "answer": "- Step 1: Choose as the base the edge connecting two vertices that **share a coordinate** (same $$x$$ or same $$y$$). This makes the base length a simple subtraction and the height a simple perpendicular distance (horizontal or vertical).\n- Step 2: For example, if two vertices have the same $$y$$-coordinate, the base is horizontal and the height is the vertical distance from the third vertex to that horizontal line. This avoids the general formula $$\\frac{1}{2}|x_1(y_2-y_3)+x_2(y_3-y_1)+x_3(y_1-y_2)|$$ entirely.", "source": "GLM 5.1 ②", "_id": "glm_2_69", "judge_pick": false}, {"question": "In the inductive step of a proof involving logs, what is the log law $$\\log A + \\log B = \\log(AB)$$, and what is the common wrong application? (2 steps)", "answer": "- Step 1: $$\\log A + \\log B = \\log(AB)$$. The sum of logs equals the log of the product. This is what lets you combine $$\\log\\!\\left(\\frac{(2k)!}{2^k k!}\\right) + \\log(2k+1)$$ into $$\\log\\!\\left(\\frac{(2k)!(2k+1)}{2^k k!}\\right)$$.\n- Step 2: The common wrong application is writing $$\\log A + \\log B = \\log(A+B)$$ — putting the sum inside the log instead of the product. This is never correct and immediately breaks the proof.", "source": "GLM 5.1 ②", "_id": "glm_2_70", "judge_pick": false}, {"question": "When substituting a negative number into a polynomial, what is the systematic way to handle signs, and what is the most common error? (2 steps)", "answer": "- Step 1: Compute each term separately, paying attention to the parity of the exponent. $$(-3)^3 = -27$$ (odd power preserves sign), $$(-3)^2 = +9$$ (even power makes positive), $$(-3)^1 = -3$$ (odd power preserves sign).\n- Step 2: The most common error is writing $$(-3)^2 = -9$$. Even powers of negative numbers are always positive. Write each term on a separate line if necessary: $$4(-27) + p(9) + 24(-3) + 108 = -108 + 9p - 72 + 108$$.", "source": "GLM 5.1 ②", "_id": "glm_2_71", "judge_pick": false}, {"question": "For a quadratic $$z^2+bz+c=0$$ with complex conjugate roots, what is the real quadratic factor, and how do you use it? (2 steps)", "answer": "- Step 1: If the roots are $$\\alpha \\pm i\\beta$$, the real quadratic factor is $$z^2 - 2\\alpha z + (\\alpha^2+\\beta^2)$$. The coefficient of $$z$$ is $$-2 \\times \\text{Re}$$ and the constant is $$|\\alpha+i\\beta|^2$$.\n- Step 2: This factor is useful when you need to divide a real-coefficient polynomial by the conjugate pair without working with complex numbers directly. It also gives you $$|z|^2 = \\alpha^2+\\beta^2 = c$$ (the constant term) instantly.", "source": "GLM 5.1 ②", "_id": "glm_2_72", "judge_pick": false}, {"question": "What is the Newton-Raphson formula, and what single condition must hold for it to be valid at a given iteration? (2 steps)", "answer": "- Step 1: $$x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$$. This finds where the tangent at $$(x_n, f(x_n))$$ crosses the $$x$$-axis.\n- Step 2: The condition is $$f'(x_n) \\ne 0$$. If the derivative is zero, the tangent is horizontal and never crosses the $$x$$-axis — the formula involves division by zero and fails. Always verify this condition before applying NR.", "source": "GLM 5.1 ②", "_id": "glm_2_73", "judge_pick": false}, {"question": "What is the linear interpolation formula in the similar-triangles form, and when is it preferable to Newton-Raphson? (2 steps)", "answer": "- Step 1: The similar-triangles form is $$\\frac{x - x_1}{x_2 - x_1} = \\frac{0 - f(x_1)}{f(x_2) - f(x_1)}$$. Solving for $$x$$: $$x = x_1 - f(x_1) \\cdot \\frac{x_2 - x_1}{f(x_2) - f(x_1)}$$.\n- Step 2: LI is preferable when you don't have (or don't want to compute) the derivative — it only requires two function values. It's also more stable when the derivative is near zero or changes sign within the interval. However, it converges more slowly than NR (linear vs quadratic convergence).", "source": "GLM 5.1 ②", "_id": "glm_2_74", "judge_pick": false}, {"question": "When a question asks for an answer to 3 decimal places, what rounding rule must you follow for intermediate calculations? (2 steps)", "answer": "- Step 1: Keep **full calculator precision** for all intermediate steps. Never round intermediate values to 3 dp.\n- Step 2: Only round the **final answer** to 3 dp. Rounding early introduces cumulative errors that can change the final digit. For example, if the true answer is 0.1946..., rounding an intermediate to 0.195 and then computing further could push the final answer to 0.195 instead of the correct 0.195. Always store full values in calculator memory.", "source": "GLM 5.1 ②", "_id": "glm_2_75", "judge_pick": false}, {"question": "What is the $$\\alpha^2\\beta + \\alpha\\beta^2$$ identity, and how does it relate to the other power-sum identities? (2 steps)", "answer": "- Step 1: $$\\alpha^2\\beta + \\alpha\\beta^2 = \\alpha\\beta(\\alpha+\\beta)$$. This factors directly — it's the product of the two Vieta quantities.\n- Step 2: This identity appears when expanding $$(\\alpha+\\beta)^3 = \\alpha^3 + 3\\alpha^2\\beta + 3\\alpha\\beta^2 + \\beta^3$$. The middle terms are $$3(\\alpha^2\\beta + \\alpha\\beta^2) = 3\\alpha\\beta(\\alpha+\\beta)$$, which is exactly the correction term in the $$\\alpha^3+\\beta^3$$ identity. Understanding this connection makes the identities easier to memorise.", "source": "GLM 5.1 ②", "_id": "glm_2_76", "judge_pick": false}, {"question": "When the mark scheme for a \"show that\" question gives method marks, what does this mean for your working? (2 steps)", "answer": "- Step 1: Method marks are awarded for correct steps even if the final answer has a minor arithmetic error. This means you should show **every algebraic step** — expanding, factorising, substituting — each on its own line.\n- Step 2: If you jump from one expression to another in a single line and make an arithmetic slip, the examiner cannot see where the error occurred and may not award the method marks for that step. \"Show all stages of your working\" is a literal instruction, not a suggestion.", "source": "GLM 5.1 ②", "_id": "glm_2_77", "judge_pick": false}, {"question": "For the parabola $$y^2=4ax$$, what is the focus-directrix property stated as a definition, and why is it the most powerful tool for parabola problems? (2 steps)", "answer": "- Step 1: The focus-directrix property: for any point $$P$$ on the parabola, the distance from $$P$$ to the focus $$S=(a,0)$$ equals the distance from $$P$$ to the directrix $$x=-a$$. That is, $$PS = x_P + a$$.\n- Step 2: This is the most powerful tool because it converts a distance calculation (which requires the distance formula with square roots and squaring) into a simple algebraic expression. Any time a question asks for a distance involving the focus, use this property first — it will save significant algebra.", "source": "GLM 5.1 ②", "_id": "glm_2_78", "judge_pick": true}, {"question": "What is the final 5-minute exam strategy, and what specific action does it involve? (2 steps)", "answer": "- Step 1: In the final 5 minutes, perform a **sanity check on arithmetic** — re-evaluate one term per part. A sign error caught is a mark saved.\n- Step 2: Focus on the most error-prone steps: sign management in matrix products, the coefficient of the middle term in expansions, and the sign of $$\\alpha+\\beta = -b/a$$. One re-checked term per part is achievable in 5 minutes and can recover 3–5 marks across the paper.", "source": "GLM 5.1 ②", "_id": "glm_2_79", "judge_pick": false}, {"question": "What pattern connects Q1, Q5, and Q9 on this paper in terms of the type of algebraic skill tested? (2 steps)", "answer": "- Step 1: All three are **identity-driven manipulation** questions. Q1 requires the determinant identity $$ad-bc$$. Q5 requires the power-sum identities $$\\alpha^3+\\beta^3$$ and Vieta's formulas. Q9 requires the factorial identity $$n! = n \\cdot (n-1)!$$ and the log-sum law.\n- Step 2: The consistent pattern is: the question gives you a target form, and you reach it by applying known identities step by step. The marks are in the identity application, not in creative problem-solving. This means identity recall is the single highest-leverage skill — drill it daily.", "source": "GLM 5.1 ②", "_id": "glm_2_80", "judge_pick": true}, {"question": "What is the enlargement matrix for scale factor $$k$$ about the origin, and how does it compose with a rotation matrix? (2 steps)", "answer": "- Step 1: The enlargement matrix is $$kI = \\begin{pmatrix}k&0\\\\0&k\\end{pmatrix}$$. It scales every coordinate by $$k$$.\n- Step 2: When composed with a rotation matrix $$R$$, the result is simply $$kR$$ — every entry of the rotation matrix is multiplied by $$k$$. This works because $$kI$$ commutes with any matrix: $$(kI)R = k(IR) = kR = R(kI)$$. So the order (enlargement then rotation, or rotation then enlargement) doesn't matter.", "source": "GLM 5.1 ②", "_id": "glm_2_81", "judge_pick": false}, {"question": "Conceptual check — Why does $$\\alpha\\bar{\\alpha} = |\\alpha|^2$$ for a complex number $$\\alpha = x+iy$$? (2 steps)", "answer": "- Step 1: $$\\alpha\\bar{\\alpha} = (x+iy)(x-iy) = x^2 - iyx + ixy - i^2y^2 = x^2 + y^2$$ (the cross terms cancel and $$i^2 = -1$$ so $$-i^2y^2 = +y^2$$).\n- Step 2: $$|\\alpha|^2 = x^2 + y^2$$ by definition (Pythagoras on the Argand diagram). So $$\\alpha\\bar{\\alpha} = |\\alpha|^2$$. This is why, for a quadratic with conjugate roots and constant term $$c$$, we get $$|z|^2 = c$$ — because the product of roots $$\\alpha\\bar{\\alpha}$$ equals $$c$$.", "source": "GLM 5.1 ②", "_id": "glm_2_82", "judge_pick": false}, {"question": "Simple exercise — For the quadratic $$2x^2-5x+3=0$$ with roots $$\\alpha, \\beta$$, quickly state $$\\alpha+\\beta$$ and $$\\alpha\\beta$$. (1 step)", "answer": "- Step 1: By Vieta's formulas: $$\\alpha+\\beta = -\\frac{-5}{2} = \\frac{5}{2}$$ and $$\\alpha\\beta = \\frac{3}{2}$$. Remember: the sum is $$-b/a$$ (minus sign!), and the product is $$c/a$$ (no minus sign).", "source": "GLM 5.1 ②", "_id": "glm_2_83", "judge_pick": false}, {"question": "Simple exercise — If $$\\alpha+\\beta = 3$$ and $$\\alpha\\beta = 2$$, compute $$\\alpha^3+\\beta^3$$ using the identity. (2 steps)", "answer": "- Step 1: Apply the identity: $$\\alpha^3+\\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta) = 3^3 - 3(2)(3) = 27 - 18 = 9$$.\n- Step 2: The key is the coefficient 3 in the correction term. Without it, you'd get $$27 - 6 = 21$$, which is wrong. Always write the full identity before substituting.", "source": "GLM 5.1 ②", "_id": "glm_2_84", "judge_pick": false}, {"question": "Simple exercise — If you see the equation $$3u^4 - 10u^2 + 3 = 0$$, what substitution do you make and what does it become? (2 steps)", "answer": "- Step 1: Only even powers of $$u$$ appear, so substitute $$v = u^2$$. The equation becomes $$3v^2 - 10v + 3 = 0$$.\n- Step 2: Factorise: $$(3v-1)(v-3) = 0$$, so $$v = 1/3$$ or $$v = 3$$. Back-substitute: $$u^2 = 1/3$$ gives $$u = \\pm 1/\\sqrt{3}$$, and $$u^2 = 3$$ gives $$u = \\pm\\sqrt{3}$$. Four real roots.", "source": "GLM 5.1 ②", "_id": "glm_2_85", "judge_pick": false}, {"question": "Simple exercise — For the matrix $$\\begin{pmatrix}3&-2\\\\1&4\\end{pmatrix}$$, compute the determinant. (1 step)", "answer": "- Step 1: $$\\det = (3)(4) - (-2)(1) = 12 + 2 = 14$$. Remember: $$ad - bc$$, and the minus sign in the formula means $$-(-2)(1) = +2$$, not $$-2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_86", "judge_pick": false}, {"question": "Simple exercise — If $$P = (3, 7)$$ and the line $$y = 7$$ is horizontal, what is the perpendicular distance from $$P$$ to this line? (1 step)", "answer": "- Step 1: The distance is $$|7 - 7| = 0$$. The point is ON the line. More generally, the perpendicular distance from $$(x_0, y_0)$$ to the horizontal line $$y = c$$ is $$|y_0 - c|$$. This is why choosing a horizontal base for a triangle with two vertices on the same horizontal line is so clean — the height is just a vertical distance.", "source": "GLM 5.1 ②", "_id": "glm_2_87", "judge_pick": false}, {"question": "Misconception probe — Why can't you write $$\\alpha^3+\\beta^3 = (\\alpha+\\beta)^3$$? What's missing? (2 steps)", "answer": "- Step 1: Expanding $$(\\alpha+\\beta)^3 = \\alpha^3 + 3\\alpha^2\\beta + 3\\alpha\\beta^2 + \\beta^3$$. The extra terms $$3\\alpha^2\\beta + 3\\alpha\\beta^2 = 3\\alpha\\beta(\\alpha+\\beta)$$ are not part of $$\\alpha^3+\\beta^3$$.\n- Step 2: So $$(\\alpha+\\beta)^3 = \\alpha^3+\\beta^3 + 3\\alpha\\beta(\\alpha+\\beta)$$, which rearranges to $$\\alpha^3+\\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$$. The $$3\\alpha\\beta(\\alpha+\\beta)$$ is the \"correction\" you subtract. Forgetting the 3 or the entire correction term are both fatal errors.", "source": "GLM 5.1 ②", "_id": "glm_2_88", "judge_pick": true}, {"question": "Edge case — What happens to $$\\frac{\\alpha}{\\beta^2}+\\frac{\\beta}{\\alpha^2}$$ if $$k=0$$ in the quadratic $$4x^2-3x+k=0$$, and why is this case excluded? (2 steps)", "answer": "- Step 1: If $$k=0$$, then $$\\alpha\\beta = k/4 = 0$$, meaning at least one root is zero. The expression has $$\\beta^2$$ and $$\\alpha^2$$ in the denominators, so if either root is zero, the expression is undefined (division by zero).\n- Step 2: This is why the question implicitly excludes $$k=0$$ — the expression in part (b) would blow up. When you see denominators involving the roots, always check whether any root could be zero.", "source": "GLM 5.1 ②", "_id": "glm_2_89", "judge_pick": false}, {"question": "Why does the linear interpolation formula $$x \\approx x_1 - f(x_1)\\cdot\\frac{x_2-x_1}{f(x_2)-f(x_1)}$$ work geometrically? (2 steps)", "answer": "- Step 1: It finds where the **chord** (straight line) between $$(x_1, f(x_1))$$ and $$(x_2, f(x_2))$$ crosses the $$x$$-axis. By similar triangles, the ratio of the horizontal distance from $$x_1$$ to the root, divided by the total horizontal distance $$x_2-x_1$$, equals the ratio of $$|f(x_1)|$$ to $$|f(x_2)-f(x_1)|$$.\n- Step 2: Solving this proportion gives the formula. The key insight is that the chord approximates the curve between the two endpoints — it's a linear approximation of $$f$$, whereas NR uses the tangent (a local linear approximation at one point).", "source": "GLM 5.1 ②", "_id": "glm_2_90", "judge_pick": true}, {"question": "Counterexample — Why can't you always use Newton-Raphson starting from the endpoint of a bracket $$[a,b]$$ containing a root, even if $$f'(a) \\ne 0$$? (2 steps)", "answer": "- Step 1: The tangent at an endpoint can point **away** from the root, sending the next iterate outside the bracket. For example, if $$f$$ is concave up with a root in $$[a,b]$$, the tangent at $$x=a$$ (where $$f < 0$$) might slope steeply upward and cross the $$x$$-axis to the left of $$a$$.\n- Step 2: Newton-Raphson has no built-in guarantee of staying within the bracket. Linear interpolation, by contrast, always produces a point between $$x_1$$ and $$x_2$$ (because the chord crosses the axis between the two endpoints). This is why LI is more robust for initial iterations, though slower to converge.", "source": "GLM 5.1 ②", "_id": "glm_2_91", "judge_pick": true}, {"question": "When differentiating $$\\frac{c}{x^n}$$ where $$c$$ is a constant, what is the step-by-step procedure, and what is the common error? (3 steps)", "answer": "- Step 1: Rewrite as $$cx^{-n}$$ before differentiating.\n- Step 2: Apply the power rule: $$\\frac{d}{dx}[cx^{-n}] = c(-n)x^{-n-1} = -cnx^{-(n+1)}$$.\n- Step 3: The common error is forgetting to multiply by the exponent $$(-n)$$ — writing $$cx^{-n-1}$$ instead of $$-cnx^{-n-1}$$. The exponent must come down AND multiply the existing coefficient. For $$\\frac{1}{8}x^{-4}$$, this means $$\\frac{1}{8}(-4)x^{-5} = -\\frac{1}{2}x^{-5}$$, not $$-\\frac{1}{8}x^{-5}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_92", "judge_pick": false}, {"question": "What is the $$\\sum 1$$ formula, and why is writing $$\\sum_{r=1}^{n}1 = n+1$$ wrong? (2 steps)", "answer": "- Step 1: $$\\sum_{r=1}^{n}1 = n$$. You are summing the constant 1, a total of $$n$$ times (from $$r=1$$ to $$r=n$$), giving $$1+1+\\cdots+1 = n$$.\n- Step 2: The error $$n+1$$ comes from confusing the number of terms with the largest index. The largest index is $$n$$, but there are exactly $$n$$ terms (1 through $$n$$), not $$n+1$$. The sum from $$r=0$$ to $$n$$ would give $$n+1$$ terms, but that's a different sum.", "source": "GLM 5.1 ②", "_id": "glm_2_93", "judge_pick": false}, {"question": "For the parabola $$y^2=4ax$$ with $$a>0$$, the point $$P$$ has $$y$$-coordinate $$k>0$$. Why is $$PS = x_P + a$$ rather than requiring the full distance formula? Walk through the logic. (3 steps)", "answer": "- Step 1: By the focus-directrix definition, $$PS$$ equals the distance from $$P$$ to the directrix $$x=-a$$. This distance is the horizontal distance from $$P$$ to the line $$x=-a$$, which is $$x_P - (-a) = x_P + a$$.\n- Step 2: This works because the directrix is a vertical line. The shortest distance from any point to a vertical line is horizontal (perpendicular), so it's simply the difference in $$x$$-coordinates.\n- Step 3: Using the distance formula $$\\sqrt{(x_P-a)^2+k^2}$$ gives the same answer but requires more work: $$\\sqrt{(k^2/(4a)-a)^2+k^2} = \\sqrt{((k^2-4a^2)/(4a))^2+k^2}$$. Expanding and simplifying eventually gives $$(k^2+4a^2)/(4a)$$, but it's 5+ lines instead of 1.", "source": "GLM 5.1 ②", "_id": "glm_2_94", "judge_pick": true}, {"question": "When the question says \"using algebra, solve $$f(z)=0$$ completely\", what does this prohibit, and what must you show? (2 steps)", "answer": "- Step 1: This prohibits using the polynomial solver on your calculator. You must show the algebraic process: finding one root, factorising, and solving the remaining quadratic.\n- Step 2: You must show: (1) using the known root to form a factor, (2) dividing/matching coefficients to find the quadratic factor, (3) applying the quadratic formula to find the remaining roots. Just writing the three roots with no working earns zero marks.", "source": "GLM 5.1 ②", "_id": "glm_2_95", "judge_pick": false}, {"question": "In the inductive step, what is the relationship between $$P(k+1)$$ and $$P(k)$$ structurally, and what template does Mr Fuat suggest? (2 steps)", "answer": "- Step 1: $$P(k+1)$$ is always \"$$P(k)$$ plus one more term\" (for summation problems). Specifically, $$\\sum_{r=1}^{k+1} = \\sum_{r=1}^{k} + (\\text{new term})$$.\n- Step 2: Mr Fuat's template: \"$$F(k+1)$$ equals something times $$F(k)$$ plus something.\" Apply the inductive hypothesis to the $$F(k)$$ part, then manipulate the remaining terms to match the target form. The key is: always split the $$k+1$$ sum into the $$k$$ sum (where you use the hypothesis) plus the new term.", "source": "GLM 5.1 ②", "_id": "glm_2_96", "judge_pick": true}, {"question": "What is the key insight that makes the factorial cancellation work in Q9's inductive step — specifically, why does $$(2k+2) = 2(k+1)$$ matter? (2 steps)", "answer": "- Step 1: The target expression has $$2^{k+1}(k+1)!$$ in the denominator. Expanding: $$2^{k+1}(k+1)! = 2 \\cdot 2^k \\cdot (k+1) \\cdot k!$$. The numerator has $$(2k+2)! = (2k+2)(2k+1)! = 2(k+1)(2k+1)!$$.\n- Step 2: The factor $$2(k+1)$$ in the numerator cancels exactly with $$2 \\cdot (k+1)$$ in the denominator, leaving $$\\frac{(2k+1)!}{2^k \\cdot k!}$$ — which is exactly what we derived from the inductive hypothesis. Without recognising $$(2k+2) = 2(k+1)$$, this cancellation is invisible and the proof appears stuck.", "source": "GLM 5.1 ②", "_id": "glm_2_97", "judge_pick": true}, {"question": "When you need to rationalise a denominator like $$4 - 2\\sqrt{2}$$, what do you multiply by, and what identity makes it work? (2 steps)", "answer": "- Step 1: Multiply numerator and denominator by the **conjugate** $$4 + 2\\sqrt{2}$$. The product $$(4-2\\sqrt{2})(4+2\\sqrt{2}) = 16 - (2\\sqrt{2})^2 = 16 - 8 = 8$$.\n- Step 2: This works by the difference of squares identity $$(a-b)(a+b) = a^2 - b^2$$. Setting $$a=4$$ and $$b=2\\sqrt{2}$$ eliminates the surd from the denominator. Always rationalise when comparing two surd expressions — it makes equality checks transparent.", "source": "GLM 5.1 ②", "_id": "glm_2_98", "judge_pick": false}, {"question": "For a $$2 \\times 2$$ matrix $$\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix}$$ with determinant zero, what geometric property does the matrix have, and how can you verify it by inspection? (2 steps)", "answer": "- Step 1: A singular matrix (det = 0) collapses 2D space onto a line. Geometrically, the rows are proportional (one is a scalar multiple of the other), and the columns are proportional.\n- Step 2: To verify by inspection: substitute one of your roots (e.g. $$k = 4$$) back into $$AB$$ and check if the rows are proportional. $$AB = \\begin{pmatrix}2-24&8+3\\\\-2&9-8\\end{pmatrix} = \\begin{pmatrix}-22&11\\\\-2&1\\end{pmatrix}$$. Row 1 = 11 × Row 2 ✓. This confirms the matrix is singular.", "source": "GLM 5.1 ②", "_id": "glm_2_99", "judge_pick": false}], "count": 100}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What are the two algebraic identities for $$\\alpha^3+\\beta^3$$ and $$\\alpha^4+\\beta^4$$ that are NOT in the Edexcel formula booklet and must be memorised? (2 steps)", "answer": "- Step 1: $$\\alpha^3+\\beta^3=(\\alpha+\\beta)^3-3\\alpha\\beta(\\alpha+\\beta)$$. The intuition: expanding $$(\\alpha+\\beta)^3$$ gives $$\\alpha^3+3\\alpha^2\\beta+3\\alpha\\beta^2+\\beta^3 = \\alpha^3+\\beta^3+3\\alpha\\beta(\\alpha+\\beta)$$, so rearranging isolates the sum of cubes. The critical coefficient is **3** — missing it is the single most common error on roots-manipulation questions.\n- Step 2: $$\\alpha^4+\\beta^4=(\\alpha^2+\\beta^2)^2-2(\\alpha\\beta)^2$$. The intuition: squaring $$\\alpha^2+\\beta^2$$ produces $$\\alpha^4+2\\alpha^2\\beta^2+\\beta^4$$, so subtract $$2(\\alpha\\beta)^2$$ to isolate the fourth-power sum.\n\nThese two identities carried Q5 and reappear constantly — they are high-leverage memorisation targets.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "FP1 Jan 2023 Q1 — When multiplying two matrices of dimensions $$(m \\times n)$$ and $$(n \\times p)$$, what is the output shape, and what must be true about the inner dimensions?", "answer": "The output shape is $$(m \\times p)$$. The inner dimensions (the $$n$$'s) must match — this is the compatibility condition. If the inner dimensions don't agree, the product is undefined. Always confirm the output shape **before** you start computing entries — it tells you how many entries you need to calculate and acts as a structural sanity check. For Q1: $$(2\\times3)(3\\times2) \\to 2\\times2$$, so the product is a $$2\\times2$$ matrix with exactly 4 entries.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "FP1 Jan 2023 Q1 — What is the most common sign error when computing a matrix product like $$AB$$ where $$B$$ has a negative entry such as $$B_{31}=-2k$$, and what physical strategy prevents it?", "answer": "The most common slip is **dropping the minus sign** on a negative entry of $$B$$ during the dot-product computation. For example, computing $$(3)(+2k)$$ instead of $$(3)(-2k)$$ when multiplying row 1 of $$A$$ against column 2 of $$B$$. The preventive strategy: **circle every negative entry** on the question paper before you start computing, so your eye catches the sign every time you reference that entry. This is a mechanical discipline issue, not a conceptual one — the math is straightforward, but sign management under time pressure is where marks are lost.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "FP1 Jan 2023 Q1 — After computing $$\\det(AB)$$ and obtaining a quadratic in $$k$$, why should you factorise it rather than use the quadratic formula?", "answer": "Factorising produces a cleaner mark trail — the examiner can see each method mark clearly (factor out common factor → identify quadratic → factorise → read off roots). The quadratic formula introduces surds and decimals that can obscure whether your arithmetic was correct, and a sign error in the formula's $$b^2-4ac$$ is harder to trace. In Q1, the determinant simplifies to $$6(2k-1)(k-4)$$ — factorising makes the roots $$k=\\frac{1}{2}$$ and $$k=4$$ immediately visible and obviously non-zero (satisfying the problem's constraint).", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "FP1 Jan 2023 Q1 — Why can't you compute $$\\det(A)\\cdot\\det(B)$$ instead of computing $$\\det(AB)$$ directly for this question?", "answer": "Because $$A$$ is $$2\\times3$$ and $$B$$ is $$3\\times2$$ — both are **non-square** matrices. The determinant is only defined for square matrices. Even though their product $$AB$$ is square ($$2\\times2$$) and therefore has a determinant, you cannot decompose it as $$\\det(AB)=\\det(A)\\det(B)$$ because $$\\det(A)$$ and $$\\det(B)$$ don't exist individually. The identity $$\\det(AB)=\\det(A)\\det(B)$$ only holds when both $$A$$ and $$B$$ are square matrices of the same size.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "FP1 Jan 2023 Q1 — After finding roots of $$\\det(AB)=0$$, why must you check that both roots are non-zero, and what quick verification should you perform?", "answer": "The problem states \"$$k$$ is a non-zero constant,\" so $$k=0$$ must be excluded if it appears as a root. Quick verification: substitute one root back into $$AB$$ and check the resulting matrix is singular by inspection — if the rows (or columns) are proportional, the determinant is indeed zero, confirming your root is correct. For example, with $$k=\\frac{1}{2}$$: $$AB=\\begin{pmatrix}-1&4\\\\-2&8\\end{pmatrix}$$ where row 2 is exactly twice row 1 — singular, confirmed.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "What is Mr Fuat's key rule about when you can and cannot use your calculator for matrix operations?", "answer": "If the matrices contain **unknowns** (like the parameter $$k$$ in Q1), you **cannot** use the calculator — you must solve by hand. Calculators can only handle fully numerical matrices. This is both a practical limitation (the calculator can't symbol-multiply) and an exam requirement (method marks require seeing your working). For matrices with all numerical entries (like Q7), you can and should use the calculator to save time.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "FP1 Jan 2023 Q2 — When expanding $$(7r-5)^2$$, what is the most common sign error on the middle term?", "answer": "Writing the middle term as $$-35r$$ instead of $$-70r$$. The correct expansion is $$(7r-5)^2 = 49r^2 - 2(7r)(5) + 25 = 49r^2 - 70r + 25$$. The error comes from either forgetting the factor of 2 in the binomial expansion formula $$(a-b)^2=a^2-2ab+b^2$$, or from computing $$7\\times5=35$$ and forgetting to double it. Always write out the full formula $$a^2-2ab+b^2$$ before substituting, so the \"2\" is explicit.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "FP1 Jan 2023 Q2 — When splitting $$\\sum_{r=1}^{n}(49r^2-70r+25)$$ using linearity, what is the value of $$\\sum_{r=1}^{n}25$$, and what is the common mistake?", "answer": "$$\\sum_{r=1}^{n}25 = 25n$$. The common mistake is writing $$25(n+1)$$ — confusing the constant sum with the count of integers from 1 to $$n$$. The rule is simple: $$\\sum_{r=1}^{n}c = cn$$ for any constant $$c$$. You are adding $$c$$ to itself $$n$$ times, which gives $$cn$$. The expression $$n+1$$ never appears in this context.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "FP1 Jan 2023 Q2 — The question asks you to show the sum equals $$\\frac{n}{6}(7n+1)(An+B)$$. How does this required form telegraph your manipulation strategy? (2 steps)", "answer": "- Step 1: The factor $$\\frac{n}{6}$$ sitting outside tells you to pull out $$\\frac{n}{6}$$ as a common factor early — bring everything onto denominator 6, then factor $$n$$ out of the numerator. This is not a hint you discover at the end; it's a structural instruction you follow from the moment you have a single fraction.\n- Step 2: The remaining factor $$(7n+1)(An+B)$$ tells you the quadratic inside the brackets will factorise with $$(7n+1)$$ as one factor. When you reach the quadratic $$98n^2-63n-11$$, you already know one root comes from $$7n+1=0$$, so $$n=-\\frac{1}{7}$$ must satisfy the quadratic — a powerful check on your algebra.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"questi
