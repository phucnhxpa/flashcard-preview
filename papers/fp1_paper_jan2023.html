<script>
const DATA={"selected": [{"question": "What's the identity for $$\\alpha^4 + \\beta^4$$ in terms of $$\\alpha+\\beta$$ and $$\\alpha\\beta$$, and why is it derived in two steps?", "answer": "- Step 1: First express $$\\alpha^4 + \\beta^4 = (\\alpha^2 + \\beta^2)^2 - 2(\\alpha\\beta)^2$$ — this is the same structure as $$\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$ applied to $$\\alpha^2, \\beta^2$$.\n- Step 2: Then substitute $$\\alpha^2 + \\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$ into the first expression to get everything in terms of $$\\alpha+\\beta$$ and $$\\alpha\\beta$$.\n- Step 3: The two-step structure makes the derivation easy to remember: \"$$\\alpha^{2k}+\\beta^{2k}$$ collapses to $$(\\alpha^k+\\beta^k)^2 - 2(\\alpha\\beta)^k$$\" — same identity, just applied at a higher power.\n\nNot in the booklet. Memorise.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "After substitution in Q12, you obtain $2c^4 - 3c^2 - 2 = 0$. How do you solve this for $c$? (2 steps)", "answer": "- Step 1: Recognise only even powers of $c$ appear — substitute $u = c^2$, giving $2u^2 - 3u - 2 = 0$.\n- Step 2: Factor: $(2u+1)(u-2) = 0$, so $u = -\\frac{1}{2}$ or $u = 2$. Since $u = c^2 \\geq 0$, reject $u = -\\frac{1}{2}$. Thus $c^2 = 2$, so $c = \\pm\\sqrt{2}$.\n\n**Key insight:** Always substitute $u = x^2$ when only even powers appear.", "source": "MiniMax ①", "_id": "minimax_1_11"}, {"question": "FP1 Jan 2023 Q3(c) — what's the slick shortcut to find $$|z|$$ for the complex roots of $$z^2-z+9=0$$, avoiding the $$\\sqrt{x^2+y^2}$$ calculation?", "answer": "For a real-coefficient quadratic $$z^2+bz+c=0$$ with conjugate roots $$\\alpha, \\bar{\\alpha}$$: the **product of roots equals the constant**, so $$\\alpha\\bar{\\alpha}=c$$. But $$\\alpha\\bar{\\alpha}=|\\alpha|^2$$, hence $$|\\alpha|=\\sqrt{c}$$. Here $$c=9$$, so $$|\\alpha|=3$$ instantly — no need to compute $$x$$ and $$y$$ separately. This shortcut works only for the **reduced** quadratic (leading coefficient 1) with **conjugate** roots.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "FP1 Jan 2023 Q7(i)(b) — A rotation by 240° anticlockwise is followed by an enlargement with scale factor 6 about the origin. How do you combine these into a single matrix?", "answer": "The enlargement by factor 6 about the origin is represented by $$6I$$, which simply scales every entry of the rotation matrix by 6. So $$Q=6R_{240}=\\begin{pmatrix}-3&3\\sqrt{3}\\\\-3\\sqrt{3}&-3\\end{pmatrix}$$. When an enlargement is composed with a rotation (both centred at the origin), you just **multiply every entry of the rotation matrix by the scale factor** — no separate matrix multiplication needed. The order doesn't matter because scalar multiplication commutes with matrix multiplication.", "source": "GLM 5.1 ③", "_id": "glm_3_36"}, {"question": "Mr Fuat's heuristic for spotting a rotation matrix at a glance — what is it?", "answer": "\"If you get values different from $$1$$ and $$-1$$ in the matrix entries, it must be a rotation.\" Reflections and reflections-through-axes have entries only $$\\pm 1$$ and $$0$$; enlargements have all-same scaling. Surd values like $$\\tfrac{\\sqrt{3}}{2}$$ or $$\\tfrac{1}{2}$$ appearing as entries are strong signals of $$\\cos\\theta$$ / $$\\sin\\theta$$ for a non-trivial angle. Use this as a fast classifier before attempting to identify the angle.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "FP1 Jan 2023 Q4(b) — what is the prerequisite condition you must verify before applying Linear Interpolation on an interval $$[x_1, x_2]$$, and what's the formula in similar-triangles form?", "answer": "- Step 1: Verify $$f(x_1)$$ and $$f(x_2)$$ have OPPOSITE signs. Otherwise there is no guaranteed root in the interval, and LI produces a meaningless number.\n- Step 2: Similar-triangles formula: $$\\frac{x - x_1}{x_2 - x_1} = \\frac{0 - f(x_1)}{f(x_2) - f(x_1)}$$.\n- Step 3: Rearranged: $$x = x_1 - f(x_1) \\cdot \\frac{x_2 - x_1}{f(x_2) - f(x_1)}$$. Use either form — both are equivalent.\n\nThe sign check is the LI analogue of the $$f'(x_n) \\neq 0$$ check in NR. Always verify the prerequisite first.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "What is the identity for $$\\alpha^3+\\beta^3$$ in terms of $$\\alpha+\\beta$$ and $$\\alpha\\beta$$, and why can't you just cube the sum? (2 steps)", "answer": "- Step 1: The identity is $$\\alpha^3+\\beta^3=(\\alpha+\\beta)^3-3\\alpha\\beta(\\alpha+\\beta)$$. You cannot just write $$(\\alpha+\\beta)^3$$ because expanding it gives $$\\alpha^3+3\\alpha^2\\beta+3\\alpha\\beta^2+\\beta^3$$, which contains the cross-terms $$3\\alpha\\beta(\\alpha+\\beta)$$ that are not part of $$\\alpha^3+\\beta^3$$.\n- Step 2: The critical coefficient is the **−3** in front of $$\\alpha\\beta(\\alpha+\\beta)$$. Writing \"$$(\\alpha+\\beta)^3-\\alpha\\beta(\\alpha+\\beta)$$\" (missing the 3) is the single most common error on roots-manipulation questions — this identity is **not in the formula booklet**, so you must memorise it cold.\n\nThe −3 comes directly from the binomial expansion of $$(\\alpha+\\beta)^3$$.", "source": "GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "FP1 Jan 2023 Q2 — When factorising $$98n^2-63n-11$$, you get $$(7n+1)(14n-11)$$. Why is $$(14n+1)(7n-11)$$ wrong, and how do you verify?", "answer": "Multiply out $$(14n+1)(7n-11) = 98n^2 - 154n + 7n - 11 = 98n^2 - 147n - 11$$. The middle coefficient is $$-147$$, not $$-63$$. The correct factorisation $$(7n+1)(14n-11)$$ gives $$98n^2 - 77n + 14n - 11 = 98n^2 - 63n - 11$$. The key check: the cross-terms must sum to $$-63$$. Only one ordering of the factors produces this. Always multiply back out to verify before committing.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "For the parabola $y^2 = 4ax$, the point $P$ has $y$-coordinate $k$. How do you find $PS$ (distance from $P$ to focus $S$) without using the distance formula? (Q8)", "answer": "- Step 1: Use the focus-directrix property: for any point $P$ on the parabola, $PS = \\text{distance to directrix}$.\n- Step 2: For $y^2 = 4ax$, focus is $S(a, 0)$ and directrix is $x = -a$.\n- Step 3: Find $x_P$ by substituting $y = k$ into the parabola: $k^2 = 4ax_P \\Rightarrow x_P = \\frac{k^2}{4a}$.\n- Step 4: Distance from $P$ to directrix (horizontal distance): $x_P - (-a) = x_P + a = \\frac{k^2}{4a} + a = \\frac{k^2 + 4a^2}{4a}$.\n+ The shortcut: always use $PS = x_P + a$ for $y^2 = 4ax$. Never use the distance formula $\\sqrt{(x_P - a)^2 + k^2}$.\n\n**Q:** In triangle $BPA$, two vertices share the same $y$-coordinate. Why is this significant for finding the area? (Q8)\n\n**A:** - Step 1: Vertices $B(-a, k)$ and $P(\\frac{k^2}{4a}, k)$ both have $y$-coordinate $k$, so $BP$ is horizontal.\n- Step 2: For a triangle with a horizontal base, area = $\\frac{1}{2} \\times \\text{base length} \\times \\text{height}$, where height is the perpendicular distance from the third point to the line $y = k$.\n- Step 3: Base $= |x_P - x_B| = \\frac{k^2}{4a} - (-a) = \\frac{k^2 + 4a^2}{4a}$.\n- Step 4: Height $= |k - y_A| = k - \\frac{4a^2k}{k^2 + 4a^2} = \\frac{k^3}{k^2 + 4a^2}$.\n+ The insight: horizontal or vertical edges become the base — the height is just the difference in the perpendicular coordinate.", "source": "MiniMax ②", "_id": "minimax_2_6"}, {"question": "For the rectangular hyperbola $$xy = c^2$$, what's the gradient at the parametric point $$(ct, c/t)$$, and how do you derive it quickly?", "answer": "- Step 1: Implicit differentiation: $$y + x \\frac{dy}{dx} = 0$$, so $$\\frac{dy}{dx} = -\\frac{y}{x}$$.\n- Step 2: At $$(ct, c/t)$$: $$\\frac{dy}{dx} = -\\frac{c/t}{ct} = -\\frac{1}{t^2}$$.\n- Step 3: This is a fact worth memorising: **tangent gradient at parameter $$t$$ on $$xy=c^2$$ is $$-\\frac{1}{t^2}$$**; normal gradient is therefore $$+t^2$$ (negative reciprocal).\n\nNot in the booklet for $$xy=c^2$$ — drill it.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "FP1 Jan 2023 Q6(c) — when the normal at $$A$$ (parameter $$c$$) meets the curve again at $$B$$ (parameter $$-\\frac{1}{2c}$$), what's the parameter-management rule you must follow?", "answer": "- Step 1: The normal equation has parameter $$c$$ baked into it (it's A's normal). Keep $$c$$ as the equation's parameter throughout.\n- Step 2: Substitute B's COORDINATES $$\\left(-\\frac{\\sqrt 5}{c}, -4c\\sqrt 5\\right)$$ (computed from B's parameter $$-\\frac{1}{2c}$$) into A's normal equation.\n- Step 3: The common error: replacing the $$c$$ in the normal equation with $$-\\frac{1}{2c}$$. This is wrong — you're not changing whose normal it is, you're checking that B lies on A's normal.\n\nWhose equation × Whose coordinates: lock the equation's parameter, vary only the substituted point.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "FP1 Jan 2023 Q8(c) — when forming an area ratio and you have $$k$$ appearing on both sides, what's the strategic move before plugging in numerical conditions?", "answer": "- Step 1: Form the symbolic ratio FIRST and simplify it algebraically.\n- Step 2: Here $$\\frac{\\text{Area}(BPA)}{\\text{Area}(OSP)} = \\frac{k^3/(8a)}{ak/2} = \\frac{k^2}{4a^2}$$ — the $$k$$ partially cancels, leaving $$k^2$$.\n- Step 3: Then set $$\\frac{k^2}{4a^2} = 4k^2$$ and the $$k^2$$ DROPS OUT, giving $$\\frac{1}{4a^2} = 4 \\Rightarrow a = \\frac{1}{4}$$. If you'd plugged in a specific $$k$$ earlier, you'd never have noticed it cancels.\n\nSymbolic cancellation often reveals that the answer is independent of variables you assumed mattered.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "In the inductive step of Q9, you need to show $$(2k+1)!/(2^k k!)$$ equals $$(2k+2)!/(2^{k+1}(k+1)!)$$. What's the factorial-expansion-by-line discipline?", "answer": "- Step 1: Expand $$(2k+2)! = (2k+2)(2k+1)!$$ — peel off one factor only.\n- Step 2: Expand $$2^{k+1} = 2 \\cdot 2^k$$.\n- Step 3: Expand $$(k+1)! = (k+1) \\cdot k!$$.\n- Step 4: Note $$(2k+2) = 2(k+1)$$, which lets $$2(k+1)$$ cancel against $$2 \\cdot (k+1)$$ in the denominator.\n\nResult: $$\\dfrac{2(k+1)(2k+1)!}{2 \\cdot 2^k \\cdot (k+1) \\cdot k!} = \\dfrac{(2k+1)!}{2^k k!}$$. ✓\n\nPhuc's slip: jumping straight to cancellation without writing each expansion line. Discipline: NEVER skip a factorial-expansion step in an induction proof.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "FP1 Jan 2023 Q7(i)(c) — When a question says \"transformation $$U$$ followed by transformation $$V$$,\" what is the order of matrix multiplication, and why? (3 steps)", "answer": "- Step 1: \"$$U$$ followed by $$V$$\" means: first apply $$U$$ to the point, then apply $$V$$ to the result. If the point is $$\\mathbf{x}$$, the result is $$V(U(\\mathbf{x}))=V(P\\mathbf{x})=Q(P\\mathbf{x})=(QP)\\mathbf{x}$$.\n- Step 2: The combined matrix is $$R=QP$$ — the **rightmost matrix acts first**. This is the standard convention: matrix multiplication is read right-to-left in terms of the order of operations.\n- Step 3: The common error is computing $$PQ$$ instead of $$QP$$. Remember: the transformation mentioned **first** ($$U$$) corresponds to the matrix written **rightmost** ($$P$$). \"First in words = rightmost in product.\"\n\nAlways write out \"$$U$$ then $$V$$ $$\\Rightarrow$$ matrix $$VU$$\" as a reminder before computing.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "What is the key difference between Newton-Raphson and linear interpolation in terms of what each method uses? (2 steps)", "answer": "- Step 1: Newton-Raphson uses the **tangent line** at a single point $$x_n$$. It requires the **derivative** $$f'(x_n)$$ and the function value $$f(x_n)$$. It converges quadratically (fast) when $$f'$$ is well-behaved near the root.\n- Step 2: Linear interpolation uses the **chord** (secant line) between two points $$(x_1,f(x_1))$$ and $$(x_2,f(x_2))$$. It requires **two function values** but no derivative. It converges linearly (slower). The formula is $$x\\approx x_1-f(x_1)\\cdot\\frac{x_2-x_1}{f(x_2)-f(x_1)}$$.\n\nNR = tangent + derivative; LI = chord + two function values. Don't confuse them.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "FP1 Jan 2023 — What is the standard parametric form for the parabola $$y^2=4ax$$, and how do you find the coordinates of a point given a parameter value? (2 steps)", "answer": "- Step 1: The parametric form is $$(at^2,2at)$$. Verify: $$y^2=(2at)^2=4a^2t^2=4a(at^2)=4ax$$. ✓\n- Step 2: Given a parameter value $$t$$, substitute directly: e.g., $$t=3$$ gives $$(9a,6a)$$. To find the parameter from coordinates: if $$P=(x_P,y_P)$$, then $$t=\\frac{y_P}{2a}$$ (from the $$y$$-coordinate) or $$t=\\sqrt{x_P/a}$$ (from the $$x$$-coordinate, taking the appropriate sign).\n\nThis is in the formula booklet, but knowing how to use it fluently saves time.", "source": "GLM 5.1 ①", "_id": "glm_1_88"}, {"question": "FP1 Jan 2023 Q7(ii) — The equation $$W\\begin{pmatrix}\\lambda\\\\1\\end{pmatrix}=\\begin{pmatrix}4\\lambda\\\\4\\end{pmatrix}$$ gives two component equations. Why must you solve BOTH, and what does it mean if they give different values of $$\\lambda$$?", "answer": "Each component equation gives a constraint on $$\\lambda$$. If both equations yield the same $$\\lambda$$, the point $$(\\lambda,1)$$ genuinely maps to $$(4\\lambda,4)$$ under $$W$$. If they give **different** values, no such point exists — the system is inconsistent, meaning there is no real $$\\lambda$$ satisfying the mapping. This is a **consistency check**. Solving only the first equation without verifying the second is a common pitfall — you might claim a solution that doesn't actually work. Always write both equations side by side, solve one for $$\\lambda$$, and substitute into the other.", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "Misconception probe — Why can't you write $$\\alpha^3+\\beta^3 = (\\alpha+\\beta)^3$$? What's missing? (2 steps)", "answer": "- Step 1: Expanding $$(\\alpha+\\beta)^3 = \\alpha^3 + 3\\alpha^2\\beta + 3\\alpha\\beta^2 + \\beta^3$$. The extra terms $$3\\alpha^2\\beta + 3\\alpha\\beta^2 = 3\\alpha\\beta(\\alpha+\\beta)$$ are not part of $$\\alpha^3+\\beta^3$$.\n- Step 2: So $$(\\alpha+\\beta)^3 = \\alpha^3+\\beta^3 + 3\\alpha\\beta(\\alpha+\\beta)$$, which rearranges to $$\\alpha^3+\\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$$. The $$3\\alpha\\beta(\\alpha+\\beta)$$ is the \"correction\" you subtract. Forgetting the 3 or the entire correction term are both fatal errors.", "source": "GLM 5.1 ②", "_id": "glm_2_88"}, {"question": "In the inductive step, what is the relationship between $$P(k+1)$$ and $$P(k)$$ structurally, and what template does Mr Fuat suggest? (2 steps)", "answer": "- Step 1: $$P(k+1)$$ is always \"$$P(k)$$ plus one more term\" (for summation problems). Specifically, $$\\sum_{r=1}^{k+1} = \\sum_{r=1}^{k} + (\\text{new term})$$.\n- Step 2: Mr Fuat's template: \"$$F(k+1)$$ equals something times $$F(k)$$ plus something.\" Apply the inductive hypothesis to the $$F(k)$$ part, then manipulate the remaining terms to match the target form. The key is: always split the $$k+1$$ sum into the $$k$$ sum (where you use the hypothesis) plus the new term.", "source": "GLM 5.1 ②", "_id": "glm_2_96"}, {"question": "What's the proof template \"$$P(1)$$ holds and $$P(k) \\Rightarrow P(k+1)$$, so by induction $$P(n)$$ holds for all $$n \\in \\mathbb{Z}^+$$\" — why must the EXACT phrasing be written?", "answer": "- Step 1: Examiners mark induction proofs using a checklist that includes a \"conclusion\" mark, awarded only when the proof states the logical chain explicitly.\n- Step 2: Even if your base case and inductive step are perfect, omitting the conclusion sentence loses the closing mark (typically 1 out of 6).\n- Step 3: Habit: at the end of every induction proof, write a one-line closing in the standard form. It's free marks and frames the proof as complete.\n\nMark scheme literally checks for this sentence. Don't paraphrase — match it.", "source": "Opus 4.7 ①", "_id": "opus_1_64"}, {"question": "FP1 Jan 2023 Q8(c) — When computing the area of triangle $$BPA$$ where $$B$$ and $$P$$ share the same $$y$$-coordinate, what is the strategic choice of base, and why? (2 steps)", "answer": "- Step 1: Choose $$BP$$ as the base because it is **horizontal** (both endpoints have $$y = k$$). The length is simply $$|x_P - x_B| = \\frac{k^2}{4a} - (-a) = \\frac{k^2+4a^2}{4a}$$.\n- Step 2: The height is then the perpendicular distance from $$A$$ to the line $$y = k$$, which is just $$|k - y_A|$$. Choosing a horizontal base makes the height a simple vertical distance — no need for the general perpendicular-distance formula. Choosing $$AP$$ as the base would require a much messier calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_47"}, {"question": "FP1 Jan 2023 Q8(c) — After computing the areas of triangles $$BPA$$ and $$OSP$$ and forming their ratio, the $$k$$'s cancel. Why is it important to substitute the ratio symbolically before plugging in specific values? (2 steps)", "answer": "- Step 1: Working symbolically lets you see cancellations that would be obscured by numbers. Here, $$\\frac{\\text{Area}(BPA)}{\\text{Area}(OSP)}=\\frac{k^3/(8a)}{ak/2}=\\frac{k^2}{4a^2}$$. The $$k$$ in the numerator and denominator cancels partially, leaving a clean expression.\n- Step 2: If you had substituted a numerical value for $$k$$ early, you'd get a messy decimal ratio that's hard to set equal to $$4k^2:1$$. The symbolic approach reveals that the ratio simplifies to $$\\frac{k^2}{4a^2}$$, which makes solving $$\\frac{k^2}{4a^2}=4k^2$$ straightforward: cancel $$k^2$$ and solve $$\\frac{1}{4a^2}=4$$.\n\nKeep everything in terms of letters until the final step. The algebra is designed to simplify — trust the process.", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "FP1 Jan 2023 Q4(a)(ii) — The Newton-Raphson formula requires $$f'(x_n)\\neq0$$. Phuc said \"$$x=0.25$$ can't be used because $$f'(0.25)=0$$.\" What was wrong with this reasoning? (2 steps)", "answer": "- Step 1: Phuc's **structural** reason is correct — if $$f'(x_n)=0$$, NR fails because you'd divide by zero. But he never **verified** that $$f'(0.25)=0$$ for this specific function. Computing it: $$f'(0.25)=-\\frac{1}{2(0.25)^5}+\\frac{2}{(0.25)^8}$$. With $$0.25=\\frac{1}{4}$$, this becomes $$-\\frac{1}{2}\\cdot4^5+2\\cdot4^8=-512+131072\\neq0$$.\n- Step 2: The actual reason $$0.25$$ is problematic is that it's the **right-hand endpoint of the bracket** $$[0.15,0.25]$$. The tangent at an endpoint can shoot the next iterate outside the interval, producing divergence or oscillation. The lesson: never assert a property ($$f'=0$$) without computing it first. State the general principle, then verify it for the specific case.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "When constructing a triangle $$BPA$$ where two vertices share a $$y$$-coordinate, what's the natural choice of base, and why?", "answer": "Take the edge connecting the two shared-coordinate vertices as the base — it's horizontal (or vertical), so its length is just the difference of $$x$$-coordinates, and the \"height\" is the perpendicular distance from the third vertex to that horizontal line, which is just $$|y_3 - y_{\\text{base}}|$$. In FP1 Jan 2023 Q8(c), $$B(-a,k)$$ and $$P(\\tfrac{k^2}{4a},k)$$ share $$y=k$$, so $$BP$$ horizontal is the natural base. Picking the non-horizontal edge $$AP$$ or $$AB$$ requires the messy perpendicular-distance formula.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "What is the complex conjugate factor property: if a real-coefficient polynomial has complex roots $$\\alpha\\pm i\\beta$$, what is the real quadratic factor?", "answer": "The real quadratic factor is $$z^2-2\\alpha z+(\\alpha^2+\\beta^2)$$. This comes from $$(z-(\\alpha+i\\beta))(z-(\\alpha-i\\beta))=z^2-2\\alpha z+\\alpha^2+\\beta^2$$. The constant term $$\\alpha^2+\\beta^2=|\\alpha+i\\beta|^2$$ is always positive (for non-real roots), guaranteeing the quadratic has no real roots. This is useful when you need to extract the real quadratic factor from a polynomial after finding one complex root.", "source": "GLM 5.1 ③", "_id": "glm_3_59"}, {"question": "Why is the identity $\\alpha^3 + \\beta^3 = (\\alpha + \\beta)^3 - 3\\alpha\\beta(\\alpha + \\beta)$ used in polynomial root manipulation?", "answer": "This identity allows expressing $\\alpha^3 + \\beta^3$ in terms of $\\alpha + \\beta$ and $\\alpha\\beta$, which are known from Vieta’s formulas. It avoids computing individual roots and leverages symmetric sums for simplification.\n\nFor example, if $\\alpha + \\beta = \\frac{3}{4}$ and $\\alpha\\beta = \\frac{k}{4}$, substituting into the identity yields:  \n$$\n\\alpha^3 + \\beta^3 = \\left(\\frac{3}{4}\\right)^3 - 3 \\cdot \\frac{k}{4} \\cdot \\frac{3}{4} = \\frac{27}{64} - \\frac{9k}{16}\n$$\n\nThe motivation is to reduce complex expressions to combinations of known quantities.", "source": "Qwen 3 ③", "_id": "qwen_3_4"}, {"question": "FP1 Jan 2023 Q1 — Why can't you compute $$\\det(A)\\cdot\\det(B)$$ instead of computing $$\\det(AB)$$ directly for this question?", "answer": "Because $$A$$ is $$2\\times3$$ and $$B$$ is $$3\\times2$$ — both are **non-square** matrices. The determinant is only defined for square matrices. Even though their product $$AB$$ is square ($$2\\times2$$) and therefore has a determinant, you cannot decompose it as $$\\det(AB)=\\det(A)\\det(B)$$ because $$\\det(A)$$ and $$\\det(B)$$ don't exist individually. The identity $$\\det(AB)=\\det(A)\\det(B)$$ only holds when both $$A$$ and $$B$$ are square matrices of the same size.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "FP1 Jan 2023 Q6(c) — After substituting, you get $$2c^4-3c^2-2=0$$. Why must you substitute $$u=c^2$$ rather than treating this as a quadratic in $$c$$?", "answer": "Because the equation is **degree 4 in $$c$$**, not degree 2. It only contains even powers of $$c$$ ($$c^4$$ and $$c^2$$), which means it's a quadratic in disguise: setting $$u=c^2$$ transforms it into $$2u^2-3u-2=0$$, which factorises as $$(2u+1)(u-2)=0$$. This gives $$u=-\\frac{1}{2}$$ (rejected since $$u=c^2\\geq0$$) or $$u=2$$, so $$c^2=2$$ and $$c=\\pm\\sqrt{2}$$. The general rule: **whenever only even powers appear, substitute $$u=x^2$$ on first sight** — it reduces the degree by half and makes factorisation straightforward.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "When deriving the normal equation on $$xy=20$$ at $$P$$, what's the algebraic trick to clear the $$\\dfrac{1}{t}$$ in the equation early?", "answer": "Multiply the entire equation through by $$t$$ as soon as it appears. From $$y - \\dfrac{2\\sqrt{5}}{t} = t^2(x - 2t\\sqrt{5})$$, multiplying by $$t$$ gives $$ty - 2\\sqrt{5} = t^3 x - 2t^4\\sqrt{5}$$. This keeps all subsequent algebra polynomial in $$t$$ and avoids fraction-handling errors. Strategy: any parametric equation with $$1/t$$ should have $$t$$ cleared at the earliest opportunity.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "FP1 Jan 2023 Q2 — The question asks you to show the sum equals $$\\frac{n}{6}(7n+1)(An+B)$$. How does this required form telegraph your manipulation strategy? (2 steps)", "answer": "- Step 1: The factor $$\\frac{n}{6}$$ sitting outside tells you to pull out $$\\frac{n}{6}$$ as a common factor early — bring everything onto denominator 6, then factor $$n$$ out of the numerator. This is not a hint you discover at the end; it's a structural instruction you follow from the moment you have a single fraction.\n- Step 2: The remaining factor $$(7n+1)(An+B)$$ tells you the quadratic inside the brackets will factorise with $$(7n+1)$$ as one factor. When you reach the quadratic $$98n^2-63n-11$$, you already know one root comes from $$7n+1=0$$, so $$n=-\\frac{1}{7}$$ must satisfy the quadratic — a powerful check on your algebra.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "In the hyperbola normal problem (part c), you have points $A$ (parameter $c$) and $B$ (parameter $-1/(2c)$). The normal at $A$ passes through $B$. What do you substitute into what? (3 steps)", "answer": "- Step 1: Write the normal at $A$ (using parameter $c$): $cy - c^3x - 2\\sqrt{5}(1-c^4) = 0$.\n- Step 2: Find $B$'s coordinates using its parameter $-1/(2c)$: $x_B = -\\frac{\\sqrt{5}}{c}$, $y_B = -4c\\sqrt{5}$.\n- Step 3: Substitute $(x_B, y_B)$ into the normal equation from step 1 — keep the parameter $c$ in the equation, substitute the coordinates of $B$.\n\n**Common error:** Substituting $B$'s parameter into the equation instead of $B$'s coordinates.", "source": "MiniMax ①", "_id": "minimax_1_10"}, {"question": "Why is it invalid to compute $$\\det(A)\\cdot\\det(B)$$ when finding $$\\det(AB)$$ for non-square matrices $$A$$ and $$B$$? (2 steps)", "answer": "- Step 1: The identity $$\\det(AB)=\\det(A)\\cdot\\det(B)$$ requires both $$A$$ and $$B$$ to be **square** matrices. Only square matrices have determinants.\n- Step 2: When $$A$$ is $$2\\times3$$ and $$B$$ is $$3\\times2$$, neither $$\\det(A)$$ nor $$\\det(B)$$ exists individually. But the product $$AB$$ is $$2\\times2$$, which does have a determinant. You must compute $$AB$$ first, then find $$\\det(AB)$$ directly.\n\nThe determinant product rule is a temptation that looks fast but is categorically wrong for non-square matrices.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "What's the conceptual difference between Newton-Raphson and Linear Interpolation in terms of which geometric object they use, and how does this affect convergence?", "answer": "- Step 1: NR uses the **tangent** at $$(x_n, f(x_n))$$, then finds where this tangent crosses the $$x$$-axis. It is a single-point local-linearization method.\n- Step 2: LI uses the **chord** between two points $$(x_1, f(x_1))$$ and $$(x_2, f(x_2))$$ that bracket the root, then finds where the chord crosses the $$x$$-axis.\n- Step 3: NR converges **quadratically** (number of correct digits roughly doubles per iteration) when $$f'$$ is well-behaved near the root; LI converges only **linearly** (digits gained at a constant rate per iteration). NR is faster but needs $$f'$$ and a good starting point.\n\nTangent = fast but fragile (needs derivative); chord = slower but robust (only needs sign change).", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "FP1 Jan 2023 Q5(b) — when you see $$\\frac{\\alpha}{\\beta^2} + \\frac{\\beta}{\\alpha^2}$$, what's the immediate algebraic move, and what common denominator emerges?", "answer": "- Step 1: Combine over the common denominator $$\\alpha^2 \\beta^2 = (\\alpha\\beta)^2$$: $$\\frac{\\alpha}{\\beta^2} + \\frac{\\beta}{\\alpha^2} = \\frac{\\alpha \\cdot \\alpha^2 + \\beta \\cdot \\beta^2}{\\alpha^2 \\beta^2} = \\frac{\\alpha^3 + \\beta^3}{(\\alpha\\beta)^2}$$.\n- Step 2: The numerator is now a power sum (use the $$\\alpha^3+\\beta^3$$ identity), and the denominator is just $$(\\alpha\\beta)^2$$ — both expressible via Vieta.\n- Step 3: Recognition cue: whenever you see $$\\frac{\\alpha}{\\beta^n} + \\frac{\\beta}{\\alpha^n}$$, the common denominator is $$(\\alpha\\beta)^n$$ and the numerator becomes $$\\alpha^{n+1}+\\beta^{n+1}$$.\n\nThis recognition shortcut converts a \"weird fraction\" into a \"known identity\" problem.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "What is Mr Fuat's key rule about when you can and cannot use your calculator for matrix operations?", "answer": "If the matrices contain **unknowns** (like the parameter $$k$$ in Q1), you **cannot** use the calculator — you must solve by hand. Calculators can only handle fully numerical matrices. This is both a practical limitation (the calculator can't symbol-multiply) and an exam requirement (method marks require seeing your working). For matrices with all numerical entries (like Q7), you can and should use the calculator to save time.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "FP1 Jan 2023 Q5(c) — after finding the sum and product of the new roots, why must you multiply through to clear denominators?", "answer": "The question specifies the answer in the form $$px^2+qx+r=0$$ \"where $$p,q,r$$ are **integer** values in terms of $$k$$.\" The natural form $$x^2 - (\\text{sum})x + \\text{product}=0$$ contains $$\\dfrac{9(3-4k)}{4k^2}$$ and $$\\dfrac{4}{k}$$ — fractions in $$k$$. Multiply the whole equation by $$4k^2$$ (the LCD of the fractions in $$k$$) to get integer coefficients: $$4k^2x^2 + (36k-27)x + 16k = 0$$. The motivation: rubrics demand integer coefficients; failing this loses marks even if the equation is algebraically correct.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "FP1 Jan 2023 Q5(c) — Mr Fuat says \"Since there are two equations [sum, product] and three unknowns $$p,q,r$$, we are free to select the value for one variable.\" What does this mean in practice?", "answer": "The quadratic with roots $$\\alpha',\\beta'$$ is $$x^2-(\\alpha'+\\beta')x+\\alpha'\\beta'=0$$. This gives you the sum and product of the new roots — two equations relating $$p,q,r$$ in $$px^2+qx+r=0$$. Since there are three unknowns and only two equations, you have one degree of freedom: you can choose $$p$$ (the leading coefficient) freely. The natural choice is the LCD of the fractional coefficients, which clears all denominators and makes $$p,q,r$$ integers. In Q5(c), multiplying through by $$4k^2$$ achieves this.", "source": "GLM 5.1 ③", "_id": "glm_3_76"}, {"question": "For the parabola $$y^2=4ax$$, what is the focus-directrix property stated as a definition, and why is it the most powerful tool for parabola problems? (2 steps)", "answer": "- Step 1: The focus-directrix property: for any point $$P$$ on the parabola, the distance from $$P$$ to the focus $$S=(a,0)$$ equals the distance from $$P$$ to the directrix $$x=-a$$. That is, $$PS = x_P + a$$.\n- Step 2: This is the most powerful tool because it converts a distance calculation (which requires the distance formula with square roots and squaring) into a simple algebraic expression. Any time a question asks for a distance involving the focus, use this property first — it will save significant algebra.", "source": "GLM 5.1 ②", "_id": "glm_2_78"}, {"question": "In Newton-Raphson, if asked to explain why a particular starting value cannot be used, what is the correct reasoning (not just structural) and what must you actually compute? (3 steps)", "answer": "- Step 1: The Newton-Raphson formula is $x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$, requiring $f'(x_n) \\neq 0$.\n- Step 2: For the specific function $f(x) = 1 + \\frac{1}{8x^4} - \\frac{2}{7x^7}$ at $x = 0.25$, compute $f'(0.25)$ — it equals $-512 + 131072 \\neq 0$.\n- Step 3: The actual reason $0.25$ cannot be used is that it is the right-hand endpoint of the bracketing interval — the tangent at this endpoint would project outside the interval, leading to divergence.\n\n**Critical rule:** Never assert \"$f'(x_0) = 0$\" without computing it first.", "source": "MiniMax ①", "_id": "minimax_1_4"}, {"question": "FP1 Jan 2023 Q7(i)(a) — How do you identify that the matrix $$P=\\begin{pmatrix}0&1\\\\-1&0\\end{pmatrix}$$ represents a rotation, and what is the heuristic for spotting this? (3 steps)", "answer": "- Step 1: Test on the basis vectors: $$P\\binom{1}{0}=\\binom{0}{-1}$$ (the $$x$$-axis maps to the negative $$y$$-axis) and $$P\\binom{0}{1}=\\binom{1}{0}$$ (the $$y$$-axis maps to the $$x$$-axis). This is a rotation.\n- Step 2: Compare with the rotation matrix $$\\begin{pmatrix}\\cos\\theta&-\\sin\\theta\\\\\\sin\\theta&\\cos\\theta\\end{pmatrix}$$. Matching entries: $$\\cos\\theta=0$$ and $$\\sin\\theta=-1$$, so $$\\theta=-90°$$ (clockwise) or equivalently $$270°$$ anticlockwise.\n- Step 3: Mr Fuat's heuristic: if the entries are $$0$$, $$\\pm1$$ but not the identity or a pure reflection, it must be a rotation by a multiple of $$90°$$. If entries are surds or non-integer, it's a rotation by a non-standard angle.\n\nThe full description must include: angle, direction (clockwise/anticlockwise), and centre (the origin). Missing any of these loses a mark.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "FP1 Jan 2023 Q5(b) — When dividing $$\\frac{9(3-4k)/64}{k^2/16}$$, what is the common error in the division? (2 steps)", "answer": "- Step 1: Division by a fraction: $$\\frac{A/64}{B/16}=\\frac{A}{64}\\cdot\\frac{16}{B}=\\frac{A}{4B}$$. The 16 cancels part of the 64, leaving a factor of 4 in the denominator.\n- Step 2: The common error is writing $$\\frac{A/64}{B/16}=\\frac{A}{64}\\cdot\\frac{1}{B/16}=\\frac{A}{64}\\cdot\\frac{16}{B}$$ correctly but then failing to simplify $$\\frac{16}{64}=\\frac{1}{4}$$. The correct result is $$\\frac{9(3-4k)}{4k^2}$$.\n\nWhen dividing fractions with different denominators, always flip and multiply, then simplify the numerical factors before tackling the algebraic ones.", "source": "GLM 5.1 ①", "_id": "glm_1_69"}, {"question": "FP1 Jan 2023 — Mr Fuat says: \"If you get values different from 1 and −1, it must be a rotation.\" What is the context and logic behind this heuristic for identifying $$2\\times2$$ matrix transformations? (3 steps)", "answer": "- Step 1: The four standard $$2\\times2$$ transformations are: identity (entries 0 and 1), reflection (entries 0 and ±1), rotation (entries include $$\\cos\\theta$$ and $$\\sin\\theta$$), and enlargement (scalar multiple of identity).\n- Step 2: If a matrix has entries that are not 0, 1, or −1 (e.g., surds or fractions), it cannot be a pure reflection or the identity. An enlargement has the form $$kI$$ (diagonal with equal entries, zeros off-diagonal), which is also ruled out if the off-diagonal entries are non-zero.\n- Step 3: By elimination, if the entries are non-trivial (surds, fractions, non-zero off-diagonal), the transformation must be a rotation (possibly combined with an enlargement, which just scales all entries).\n\nThis is a quick classification heuristic, not a proof. Always verify by checking against the rotation matrix template $$\\begin{pmatrix}\\cos\\theta&-\\sin\\theta\\\\\\sin\\theta&\\cos\\theta\\end{pmatrix}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_89"}, {"question": "FP1 Jan 2023 Q7(i)(a) — When given the matrix $$P = \\begin{pmatrix}0&1\\\\-1&0\\end{pmatrix}$$ and asked to describe the transformation, what quick test on the entries tells you it must be a rotation? (2 steps)", "answer": "- Step 1: Check the entries. If the matrix has the form $$\\begin{pmatrix}a&-b\\\\b&a\\end{pmatrix}$$ (or with sign variations) with entries that are 0, 1, or −1, it's a rotation by a multiple of 90°. Here $$(0,1,-1,0)$$ fits $$\\begin{pmatrix}\\cos\\theta&-\\sin\\theta\\\\\\sin\\theta&\\cos\\theta\\end{pmatrix}$$ with $$\\theta = -90°$$.\n- Step 2: Mr Fuat's heuristic: \"If you get values different from 1 and −1, it must be a rotation [by a non-right angle].\" A reflection would have determinant −1 and entries ±1 only (for right-angle reflections). The determinant of $$P$$ is $$0(0)-1(-1)=1$$, confirming rotation (not reflection).", "source": "GLM 5.1 ②", "_id": "glm_2_37"}, {"question": "FP1 Jan 2023 Q8(c) — What is the length of $$BP$$, and how does it relate to a quantity from part (a)? (2 steps)", "answer": "- Step 1: $$B=(-a,k)$$ and $$P=\\left(\\frac{k^2}{4a},k\\right)$$. Since they share the same $$y$$-coordinate, $$|BP|=\\frac{k^2}{4a}-(-a)=\\frac{k^2}{4a}+a=\\frac{k^2+4a^2}{4a}$$.\n- Step 2: This is exactly $$PS$$ from part (a)! The focus-directrix property gives $$PS=x_P+a=\\frac{k^2+4a^2}{4a}$$, and the horizontal distance $$BP$$ equals the same expression. This is not a coincidence — it's a geometric consequence of the parabola's definition.\n\nRecognising that $$BP=PS$$ simplifies the area calculation and serves as a cross-check between parts.", "source": "GLM 5.1 ①", "_id": "glm_1_76"}, {"question": "Why can't you use the shortcut $$\\det(AB) = \\det(A)\\det(B)$$ on FP1 Jan 2023 Q1, even though it's true in general?", "answer": "- Step 1: The identity $$\\det(AB) = \\det(A)\\det(B)$$ requires both $$A$$ and $$B$$ to be square — only square matrices have determinants.\n- Step 2: Here $$A$$ is $$2\\times 3$$ and $$B$$ is $$3\\times 2$$ — neither has a determinant on its own.\n- Step 3: However, $$AB$$ is $$2\\times 2$$ (square), so $$\\det(AB)$$ DOES exist — you just have to compute $$AB$$ first and then take its determinant directly.\n\nRule: $$\\det$$ only exists for square matrices. Non-square matrices can still multiply to a square one.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "FP1 Jan 2023 Q3(d) — on an Argand diagram for a cubic with one real root and a conjugate pair, what symmetry property must your diagram exhibit, and why?", "answer": "- Step 1: The two complex roots are conjugates ($$z$$ and $$\\bar z$$), so they have equal real parts and opposite imaginary parts.\n- Step 2: Geometrically: they are mirror images across the real axis. Indicate this with a dashed vertical line connecting them, or note it explicitly.\n- Step 3: Reason: any polynomial with real coefficients has complex roots in conjugate pairs (Complex Conjugate Root Theorem) — this is forced by the reality of the coefficients.\n\nArgand symmetry is a mark-earning detail; conjugate roots are NEVER asymmetric across the real axis.", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "When factorising the quadratic $$98n^2-63n-11$$, how do you decide which ordering $$(7n+1)(14n-11)$$ vs $$(14n+1)(7n-11)$$ is correct?", "answer": "- Step 1: Expand the middle term in each candidate and compare to $$-63n$$.\n- Step 2: $$(7n+1)(14n-11)$$ gives middle $$= -77n + 14n = -63n$$. ✓\n- Step 3: $$(14n+1)(7n-11)$$ gives middle $$= -154n + 7n = -147n$$. ✗\n\nThe strategy: when the constant term has multiple factor pairs and the leading coefficient is composite, **multiply out the middle term explicitly** for each candidate. Don't guess.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "FP1 Jan 2023 Q9 — When verifying the base case $$n=1$$, what must you show, and what is the common shortcut that loses marks? (2 steps)", "answer": "- Step 1: Compute both LHS and RHS **separately** and show they equal the same value. LHS = $$\\log(2(1)-1) = \\log 1 = 0$$. RHS = $$\\log\\!\\left(\\frac{2!}{2^1 \\cdot 1!}\\right) = \\log(2/2) = \\log 1 = 0$$. LHS = RHS ✓.\n- Step 2: The common shortcut is just writing \"LHS = RHS = 0\" without showing the intermediate computation. This risks losing the base-case mark if the examiner can't see your working. Show both sides reducing to the same number independently.", "source": "GLM 5.1 ②", "_id": "glm_2_52"}, {"question": "Why does the linear interpolation formula $$x \\approx x_1 - f(x_1)\\cdot\\frac{x_2-x_1}{f(x_2)-f(x_1)}$$ work geometrically? (2 steps)", "answer": "- Step 1: It finds where the **chord** (straight line) between $$(x_1, f(x_1))$$ and $$(x_2, f(x_2))$$ crosses the $$x$$-axis. By similar triangles, the ratio of the horizontal distance from $$x_1$$ to the root, divided by the total horizontal distance $$x_2-x_1$$, equals the ratio of $$|f(x_1)|$$ to $$|f(x_2)-f(x_1)|$$.\n- Step 2: Solving this proportion gives the formula. The key insight is that the chord approximates the curve between the two endpoints — it's a linear approximation of $$f$$, whereas NR uses the tangent (a local linear approximation at one point).", "source": "GLM 5.1 ②", "_id": "glm_2_90"}, {"question": "What is the trick for computing the area of triangle $BPA$ with horizontal side $BP$?", "answer": "- Step 1: Use the horizontal side $BP$ as the base; calculate its length via $x_P - x_B$.  \n- Step 2: The height is the vertical distance from $A$ to $BP$ (i.e., $k - y_A$).  \n+ Example: Area = $\\frac{1}{2} \\cdot \\text{base} \\cdot \\text{height} = \\frac{1}{2} \\cdot \\frac{k^2 + 4a^2}{4a} \\cdot \\frac{k^3}{k^2 + 4a^2}$.  \n- Step 3: Simplify numerator/denominator before substituting into the area ratio.  \n\n**Key takeaway:** Choose the base to exploit parallelism, simplifying height calculation and algebraic cancellation.", "source": "Qwen 3 ④", "_id": "qwen_4_7"}, {"question": "FP1 Jan 2023 Q4(a)(ii) — The Newton-Raphson iteration is $$x_{n+1}=x_n-\\frac{f(x_n)}{f'(x_n)}$$. What condition must hold for NR to work, and what is the critical error Phuc made when explaining why $$x_0=0.25$$ \"can't be used\"? (3 steps)", "answer": "- Step 1: NR requires $$f'(x_n)\\ne 0$$, because the formula divides by $$f'(x_n)$$. If $$f'(x_n)=0$$, the iteration is undefined (tangent is horizontal, never crosses the $$x$$-axis).\n- Step 2: Phuc's structural reasoning — \"NR fails when $$f'(x_0)=0$$\" — is correct as a general principle. But he **asserted** $$f'(0.25)=0$$ without computing it. When you actually compute $$f'(0.25)$$ for this function, it is **not zero** — so the reason he gave is factually wrong for this specific case.\n- Step 3: The actual reason $$x_0=0.25$$ is problematic is that it's the **endpoint of the bracket** $$[0.15,0.25]$$. The tangent at the endpoint can shoot the next iterate outside the interval, causing divergence or oscillation. The lesson: **never assert a mathematical fact without verifying it** — compute $$f'(x_0)$$ first, then decide.\n\nThe mark scheme expects you to tie your reasoning to **this specific function** and **this specific value**, not just quote the general NR failure condition.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "Why is the formal conclusion sentence in an induction proof not optional?", "answer": "The mark scheme grants a specific \"conclusion mark\" only if the formal closing sentence appears. Phrases like \"true for $$n=1$$, assumed for $$n=k$$, shown for $$n=k+1$$, therefore by induction true for all $$n \\in \\mathbb{Z}^+$$\" are required. Skipping it because \"it's obvious\" loses 1 mark every time. Strategy: write the conclusion sentence as a templated last line of every induction proof.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "What is the identity for $$\\alpha^2+\\beta^2$$ in terms of $$\\alpha+\\beta$$ and $$\\alpha\\beta$$, and how does its structure relate to the identities for $$\\alpha^3+\\beta^3$$ and $$\\alpha^4+\\beta^4$$? (2 steps)", "answer": "- Step 1: $$\\alpha^2+\\beta^2 = (\\alpha+\\beta)^2 - 2\\alpha\\beta$$. You square the sum and subtract twice the product.\n- Step 2: The pattern is: to express $$\\alpha^n+\\beta^n$$, you square (or cube) the previous-level sum and subtract a correction term involving $$\\alpha\\beta$$. Specifically: $$\\alpha^3+\\beta^3$$ uses $$(\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$$, and $$\\alpha^4+\\beta^4$$ uses $$(\\alpha^2+\\beta^2)^2 - 2(\\alpha\\beta)^2$$. Each correction term has a coefficient (2 or 3) that comes from the binomial expansion — never omit it.", "source": "GLM 5.1 ②", "_id": "glm_2_57"}, {"question": "For combined transformations, \"$$U$$ followed by $$V$$\" — what is the correct matrix product, and what's the order-error trap?", "answer": "- Step 1: The combined matrix is $$VU$$, NOT $$UV$$. The rightmost matrix acts first because it sits next to the vector.\n- Step 2: Logic: $$V(U\\mathbf{x}) = (VU)\\mathbf{x}$$ by associativity — the matrix nearest to $$\\mathbf{x}$$ is applied first.\n- Step 3: Trap: native English reading order (\"$$U$$ then $$V$$\") suggests $$UV$$ left-to-right, but matrix composition reads RIGHT-to-LEFT. State the convention explicitly in your answer to dodge a sign-style mistake.\n\nMatrix multiplication is non-commutative; \"$$U$$ then $$V$$\" $$\\to VU$$ is non-negotiable.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "Strategic recognition: when a parametric problem (like $$xy = c^2$$ or $$y^2 = 4ax$$) gives a \"parameter relation\" between two points (e.g., $$B$$'s parameter is $$-\\tfrac{1}{2c}$$ when $$A$$'s is $$c$$), what's the typical structure of the equation you'll derive?", "answer": "A polynomial in $$c$$ (or in the \"first\" parameter), often with only certain powers present. Common outcomes: a quadratic in $$c$$, a quadratic in $$c^2$$ (degree 4 in $$c$$ but solvable by $$u = c^2$$), or a relation like $$c \\cdot (-1/(2c)) = -1/2$$ (product of parameters fixed). Strategy: expect a low-degree polynomial; if even powers only, substitute $$u = c^2$$ immediately; reject $$u < 0$$; take both roots of $$c$$.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "When manipulating factorial expressions in induction, what's the universal step-by-step expansion rule that prevents miscancellation?", "answer": "- Step 1: $$n! = n \\cdot (n-1)!$$ — peel off the largest factor, expose the smaller factorial.\n- Step 2: For $$(2k+2)!$$ in induction: $$(2k+2)! = (2k+2)(2k+1)!$$, and if needed $$(2k+1)! = (2k+1)(2k)!$$ — write EACH step on its own line.\n- Step 3: For $$2^{k+1}$$ in the same denominator: $$2^{k+1} = 2 \\cdot 2^k$$ — peel off the same way.\n\nThe factor of $$2$$ from $$(2k+2) = 2(k+1)$$ then cancels with the factor of $$2$$ in $$2^{k+1} = 2 \\cdot 2^k$$, leaving the hypothesis form. Never skip a peel-off step.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Why is forming a new quadratic from given roots-of-original-quadratic free up to scaling? (2 steps)", "answer": "- Step 1: A quadratic $$px^2+qx+r=0$$ with two specified roots determines $$p:q:r$$ as a ratio, not absolute values — you can multiply through by any nonzero constant and the equation has the same roots.\n- Step 2: Mr Fuat: \"Since there are two equations [sum, product] and three unknowns $$p,q,r$$, we are free to select the value for one variable.\" Use this freedom to make $$p,q,r$$ integers.\n\nSo when fractional sums/products appear, scale by the LCD to clear denominators.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "What's the general \"$$F(k+1) = F(k) \\cdot (\\text{small factor})$$\" mental model for induction, and how do you apply it?", "answer": "- Step 1: Most induction targets satisfy a multiplicative or additive recurrence: $$F(k+1) = F(k) \\cdot g(k)$$ or $$F(k+1) = F(k) + h(k)$$.\n- Step 2: Strategy: compute $$\\frac{F(k+1)}{F(k)}$$ (or $$F(k+1) - F(k)$$) symbolically — this is the \"small factor\" you must reach via the new term added by the sum.\n- Step 3: Then show the new term equals this small factor (or its log, in the case of log-sum identities). The inductive step is \"hypothesis + new term = hypothesis × small factor\".\n\nReframing induction as a recurrence problem makes the algebra forward-directed, not blind.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "Why does multiplying matrices in the wrong order (e.g., $PV$ instead of $VP$) result in a wrong answer for combined transformations?", "answer": "- Step 1: Transformation order is right-to-left in matrix multiplication: apply $U$ then $V$ uses $VU$.  \n- Step 2: Example: Rotate then Scale $\\neq$ Scale then Rotate – operations are non-commutative.  \n+ Example: Rotating 90° then scaling by 6 changes the axis orientation compared to scaling first.  \n- Step 3: Always state the correct order explicitly: \"V applied after U\" → $R = VP$.  \n\n**Key takeaway:** Matrix multiplication order mirrors function composition; reverse the written instruction.", "source": "Qwen 3 ④", "_id": "qwen_4_6"}, {"question": "FP1 Jan 2023 Q1 — Why is computing $$\\det(A)\\cdot\\det(B)$$ an invalid way to find $$\\det(AB)$$ for the matrices in this question? (2 steps)", "answer": "- Step 1: The property $$\\det(AB)=\\det(A)\\cdot\\det(B)$$ only holds when both $$A$$ and $$B$$ are **square** matrices. Here, $$A$$ is $$2 \\times 3$$ and $$B$$ is $$3 \\times 2$$ — neither is square, so neither has a determinant individually.\n- Step 2: The product $$AB$$ happens to be $$2 \\times 2$$ (square), so it does have a determinant — but you must compute $$AB$$ first, then take its determinant. There is no shortcut through individual determinants of non-square matrices.", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "FP1 Jan 2023 Q4(a)(ii) — what is the structurally correct reason Newton-Raphson can fail at a given point $$x_0$$, and what's the verification step you MUST perform before invoking it?", "answer": "- Step 1: Structural reason: NR formula is $$x_{n+1} = x_n - \\frac{f(x_n)}{f'(x_n)}$$. If $$f'(x_n) = 0$$, division by zero blocks the iteration entirely.\n- Step 2: Verification: you MUST compute $$f'(x_0)$$ numerically and show it is zero. You cannot assert it.\n- Step 3: For this question, the actual reason $$x_0=0.25$$ fails is more subtle — $$f'(0.25) \\neq 0$$, but $$0.25$$ is the right endpoint of the bracket, and the tangent at the endpoint shoots the next iterate outside the interval (divergence or oscillation).\n\nThe takeaway: \"NR fails because $$f'(x_0)=0$$\" is a TEMPLATE answer. Always compute first; if $$f' \\neq 0$$, the failure is a different reason (endpoint, divergence, etc.).", "source": "Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "FP1 Jan 2023 Q3(a) — what's the specific sign trap when substituting $$z=-3$$ into a term like $$pz^2$$?", "answer": "- Step 1: $$(-3)^2 = +9$$, not $$-9$$. The square of any real number is non-negative.\n- Step 2: The error pattern: people see the $$-3$$ and unconsciously carry the minus, writing the $$pz^2$$ term as $$-9p$$.\n- Step 3: Defence: when substituting a negative number, write the squaring step EXPLICITLY: $$z^2 = (-3)(-3) = 9$$, on its own line, before plugging into $$f$$.\n\nNegative-number-squared sign blindness is a top-3 algebra slip — slow down on the substitution line.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "FP1 Jan 2023 Q3(c) — What is the \"slick\" shortcut for finding the modulus of a complex conjugate pair that are roots of a quadratic, and why does it work? (2 steps)", "answer": "- Step 1: If the quadratic is $$z^2+bz+c=0$$ with conjugate roots $$\\alpha, \\bar{\\alpha}$$, then by Vieta's formulas the product of roots is $$\\alpha\\bar{\\alpha}=c$$.\n- Step 2: But $$\\alpha\\bar{\\alpha}=|\\alpha|^2$$ (this is the fundamental property of complex conjugates). Therefore $$|\\alpha|^2=c$$, so $$|\\alpha|=\\sqrt{c}$$. For $$z^2-z+9=0$$: $$|\\alpha|^2=9$$, so $$|\\alpha|=3$$. No need to compute $$\\sqrt{(1/2)^2+(\\sqrt{35}/2)^2}$$ — the constant term gives you the answer instantly.\n\nThis works because the constant term of a real-coefficient quadratic with complex roots encodes the squared modulus directly.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "FP1 Jan 2023 Q5(b) — What is the critical identity for $$\\alpha^3+\\beta^3$$, and what is the exact mistake Phuc made? (2 steps)", "answer": "- Step 1: The identity is $$\\alpha^3+\\beta^3 = (\\alpha+\\beta)^3 - 3\\alpha\\beta(\\alpha+\\beta)$$. The coefficient of the second term is **3**, not 1.\n- Step 2: Phuc wrote $$(\\alpha+\\beta)^3 - \\alpha\\beta(\\alpha+\\beta)$$, missing the factor of 3. This produced the wrong numerical answer for part (b) and cascaded into part (c). This identity is NOT in the formula booklet — you must memorise it, and the \"3\" is the most commonly forgotten part.", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "For a conjugate pair of complex roots $$x \\pm iy$$, why does $$|z|^2 = x^2 + y^2$$ and NOT $$|x| + |y|$$?", "answer": "The modulus of a complex number $$z = x + iy$$ is its distance from the origin in the Argand plane — by Pythagoras, $$|z| = \\sqrt{x^2 + y^2}$$. The \"$$|x| + |y|$$\" is the Manhattan distance, a different metric, and incorrect here. Mental model: $$|z|$$ is the radial distance, the hypotenuse of the right triangle with legs $$x$$ and $$y$$. So $$|z|^2 = x^2 + y^2$$, and any conjugate-pair product $$z\\bar{z} = (x+iy)(x-iy) = x^2 + y^2 = |z|^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "What is the most common error when recalling the identity $$\\alpha^3+\\beta^3=(\\alpha+\\beta)^3-3\\alpha\\beta(\\alpha+\\beta)$$? (2 steps)", "answer": "- Step 1: The most common error is writing $$\\alpha^3+\\beta^3=(\\alpha+\\beta)^3-\\alpha\\beta(\\alpha+\\beta)$$ — **missing the factor of 3** in front of $$\\alpha\\beta(\\alpha+\\beta)$$.\n- Step 2: This factor of 3 comes from the binomial expansion: $$(\\alpha+\\beta)^3=\\alpha^3+3\\alpha^2\\beta+3\\alpha\\beta^2+\\beta^3=\\alpha^3+\\beta^3+3\\alpha\\beta(\\alpha+\\beta)$$. The coefficients 3 and 3 combine into the single factor of 3.\n\nThis is flagged as **HIGH severity** in the weakness analysis. Drill it until the \"3\" is automatic. Writing the identity out before substituting earns method marks even if arithmetic slips later.", "source": "GLM 5.1 ①", "_id": "glm_1_27"}, {"question": "Why does $$2k+2 = 2(k+1)$$ matter so much in the factorial cancellation step of FP1 Jan 2023 Q9?", "answer": "- Step 1: The target expression at $$k+1$$ is $$\\frac{(2k+2)!}{2^{k+1}(k+1)!}$$. The hypothesis gives $$\\frac{(2k)!}{2^k k!}$$. The difference between them must collapse to $$\\log(2k+1)$$ alone.\n- Step 2: Expand: $$(2k+2)! = (2k+2)(2k+1)(2k)! = 2(k+1)(2k+1)(2k)!$$, and $$(k+1)! = (k+1)k!$$, and $$2^{k+1} = 2 \\cdot 2^k$$.\n- Step 3: Now the target becomes $$\\frac{2(k+1)(2k+1)(2k)!}{2 \\cdot 2^k \\cdot (k+1) \\cdot k!} = \\frac{(2k+1)(2k)!}{2^k k!}$$ — the $$2$$ and $$(k+1)$$ cancel cleanly. This matches hypothesis-times-$$(2k+1)$$ exactly.\n\nWithout factoring $$2k+2$$ as $$2(k+1)$$, the cancellation against $$2^{k+1}$$ never happens.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "When dividing a cubic $$4z^3+8z^2+24z+108$$ by a known factor $$(z+3)$$, why is \"match coefficients of $$(z+3)(4z^2+az+b)$$\" often cleaner than polynomial long division? (3 steps)", "answer": "- Step 1: Polynomial long division with a leading coefficient $$\\neq 1$$ (here $$4$$) creates fractional intermediate quotients that students mishandle.\n- Step 2: Coefficient matching keeps the leading coefficient anchored in the second factor: write $$(z+3)(4z^2+az+b)$$ and expand to $$4z^3+(a+12)z^2+(b+3a)z+3b$$.\n- Step 3: Now you match $$z^2$$, constant, and use $$z^1$$ as a check — three simple linear equations in $$a, b$$.\n\nPhuc got confused by the leading $$4$$ during division; coefficient matching sidesteps this entirely.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "FP1 Jan 2023 Q3(c) — Route B for finding the modulus of complex roots uses the property $$\\alpha\\bar{\\alpha}=|\\alpha|^2$$. Why does this equal the constant term of the quadratic? (3 steps)", "answer": "- Step 1: For a quadratic $$z^2+bz+c=0$$ with roots $$\\alpha$$ and $$\\bar{\\alpha}$$, Vieta's formula gives the product of roots as $$\\alpha\\cdot\\bar{\\alpha}=c$$.\n- Step 2: For any complex number, $$\\alpha\\bar{\\alpha}=|\\alpha|^2$$. This is because if $$\\alpha=x+iy$$, then $$\\bar{\\alpha}=x-iy$$, and $$(x+iy)(x-iy)=x^2+y^2=|\\alpha|^2$$.\n- Step 3: Combining: $$|\\alpha|^2=c$$, so $$|\\alpha|=\\sqrt{c}$$. For $$z^2-z+9=0$$: $$c=9$$, so $$|\\alpha|=3$$.\n\nThis is the slick route — it bypasses the need to find the real and imaginary parts of the roots entirely. The constant term of the reduced quadratic **is** the squared modulus.", "source": "GLM 5.1 ①", "_id": "glm_1_67"}, {"question": "Why is $x=0.25$ a poor initial guess for Newton-Raphson on $f(x)=1+\\frac{1}{8x^4}-\\frac{2}{7x^7}$? (3 steps)", "answer": "- Step 1: Newton-Raphson requires $f'(x_n) \\ne 0$ to avoid division by zero.\n- Step 2: Compute $f'(x)$ using negative exponents:\n  $$\n  f'(x) = -\\tfrac{1}{2}x^{-5} + 2x^{-8}\n  $$\n- Step 3: Evaluate $f'(0.25)$ algebraically:  \n  $$\n  f'(0.25) = -\\tfrac{1}{2}(4^5) + 2(4^8) \\ne 0\n  $$\n  **However**, $0.25$ is the endpoint of the bracket $[0.15,0.25]$, risking divergence.", "source": "Qwen 3 ②", "_id": "qwen_2_3"}, {"question": "FP1 Jan 2023 Q2 — When a summation question asks you to show $$\\sum = \\frac{n}{6}(7n+1)(An+B)$$, how does the required form telegraph your strategy? (3 steps)", "answer": "- Step 1: The presence of $$\\frac{n}{6}$$ outside the bracket tells you to use the common denominator 6 early and factor out $$\\frac{n}{6}$$ before attempting to factorise the remaining polynomial.\n- Step 2: The factored form $$(7n+1)(An+B)$$ tells you the remaining quadratic in the bracket must factorise into two linear factors — one of which is $$(7n+1)$$. This is your target.\n- Step 3: Work towards the required form: expand the standard sum formulas, bring to denominator 6, factor out $$n/6$$, then expand and simplify the bracket. The factorisation of the resulting quadratic should produce the $$(7n+1)$$ factor, confirming your algebra.\n\nThis is the general principle for \"show that\" questions: the target form tells you what the answer looks like, so engineer your working to arrive there.", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "What does the topic-level weakness table identify as the HIGH severity error, and what is the prescribed drill?", "answer": "**Roots of polynomials — identities**: forgetting the \"−3\" in $$\\alpha^3+\\beta^3=(\\alpha+\\beta)^3-3\\alpha\\beta(\\alpha+\\beta)$$. The prescribed drill: write all four identities ($$\\alpha^2+\\beta^2$$, $$\\alpha^3+\\beta^3$$, $$\\alpha^4+\\beta^4$$, $$\\alpha^2\\beta+\\alpha\\beta^2$$) on flashcards and drill 10 instant-recall sums daily for a week. The goal is to make the coefficient automatic — you should be able to write the identity correctly within 2 seconds without thinking.", "source": "GLM 5.1 ③", "_id": "glm_3_72"}, {"question": "What is the single highest-leverage skill for this paper, and how should you drill it? (2 steps)", "answer": "- Step 1: **Identity recall** is the highest-leverage skill. Questions 3, 5, and 9 all hinge on remembering algebraic identities cold: Vieta's formulas, the power-sum identities ($$\\alpha^2+\\beta^2$$, $$\\alpha^3+\\beta^3$$, $$\\alpha^4+\\beta^4$$), and factorial expansions.\n- Step 2: Drill by spending 10 minutes daily writing them out from memory. The four critical identities are: $$\\alpha^2+\\beta^2 = (\\alpha+\\beta)^2-2\\alpha\\beta$$, $$\\alpha^3+\\beta^3 = (\\alpha+\\beta)^3-3\\alpha\\beta(\\alpha+\\beta)$$, $$\\alpha^4+\\beta^4 = (\\alpha^2+\\beta^2)^2-2(\\alpha\\beta)^2$$, and the Vieta pair $$\\alpha+\\beta = -b/a$$, $$\\alpha\\beta = c/a$$. None are in the formula booklet.", "source": "GLM 5.1 ②", "_id": "glm_2_67"}, {"question": "FP1 Jan 2023 Q9 — What is the critical cancellation $$(2k+2)=2(k+1)$$ used for, and why is it easy to miss?", "answer": "In the target expression $$\\frac{(2k+2)!}{2^{k+1}(k+1)!}$$, you need to expand $$(2k+2)!=(2k+2)(2k+1)!=2(k+1)(2k+1)!$$. The factor of **2** from $$2(k+1)$$ cancels with the extra 2 in $$2^{k+1}=2\\cdot2^k$$, and the factor $$(k+1)$$ cancels with $$(k+1)!=(k+1)\\cdot k!$$. This is easy to miss because students see $$(2k+2)!$$ and try to write it as $$(2k+2)(2k+1)(2k)!$$, going too far. The discipline: **expand only one step** (peel off just the outermost factor), then look for cancellations before expanding further.", "source": "GLM 5.1 ③", "_id": "glm_3_51"}, {"question": "FP1 exam strategy — For \"show that\" questions, what principle guides your working? (2 steps)", "answer": "- Step 1: The target form **telegraphs the manipulation**. If the question asks you to show $$\\sum=\\frac{n}{6}(7n+1)(An+B)$$, the $$\\frac{n}{6}$$ tells you to factor it out early, and the $$(7n+1)$$ factor tells you what the quadratic should factorise into.\n- Step 2: Work **towards** the required form. Every algebraic step earns method marks even if the final form has a typo. Don't work in a different direction and hope it matches — engineer your working to arrive at the target.\n\n\"Show that\" questions are generous: they give you the answer and ask you to reach it. Use the answer as your roadmap.", "source": "GLM 5.1 ①", "_id": "glm_1_64"}, {"question": "What is the identity for $$\\alpha^4+\\beta^4$$ in terms of $$\\alpha^2+\\beta^2$$ and $$\\alpha\\beta$$, and why is it structured this way?", "answer": "$$\\alpha^4+\\beta^4=(\\alpha^2+\\beta^2)^2-2(\\alpha\\beta)^2$$. It follows the same pattern as $$\\alpha^2+\\beta^2$$: square the sum of the \"smaller\" power, subtract twice the product. Here the \"sum\" is $$\\alpha^2+\\beta^2$$ (not $$\\alpha+\\beta$$) and the \"product squared\" is $$(\\alpha\\beta)^2$$. This recursive structure means you only ever need $$\\alpha+\\beta$$ and $$\\alpha\\beta$$ to compute any even power sum: first compute $$\\alpha^2+\\beta^2$$, then $$\\alpha^4+\\beta^4$$, and so on.", "source": "GLM 5.1 ③", "_id": "glm_3_56"}, {"question": "FP1 Jan 2023 Q1 — when asked to compute $$AB$$ where $$A$$ is $$2\\times 3$$ and $$B$$ is $$3\\times 2$$, what's the FIRST thing you should write down before doing any multiplication, and why?", "answer": "- Step 1: Write the dimension check explicitly: $$(2\\times 3)(3\\times 2) \\to (2\\times 2)$$. The inner dimensions must match (the two $$3$$s), and the outer dimensions tell you the output shape.\n- Step 2: This is not just a formality — it forces you to mentally commit to the size of the result, which prevents you from accidentally writing a $$3\\times 3$$ or $$2\\times 3$$ matrix in the answer.\n- Step 3: It also signals to the examiner you understand matrix compatibility — a free method mark even before any arithmetic.\n\nDimension check first, arithmetic second — always.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "For \"show that\" questions, why does the target form constitute a strategic roadmap rather than just a result?", "answer": "The target tells you exactly what algebraic structure to aim for. In Q2, \"$$\\frac{n}{6}(7n+1)(An+B)$$\" tells you to factor out $$n/6$$ early and produce a factorisable quadratic in the bracket. In Q6(b), the target \"$$ty - t^3 x - 2\\sqrt{5}(1-t^4) = 0$$\" tells you to multiply by $$t$$ to clear fractions and arrange terms. Strategy: read the target form FIRST, plan backward, then work forward with confidence. Every algebraic step that moves toward the target form earns method marks even if the final form has a small typo.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "What is the connection between Q5 and Q9 as \"identity-heavy manipulation problems\"?", "answer": "Both require you to recall and apply algebraic identities correctly under time pressure. Q5 uses the power-sum identities ($$\\alpha^3+\\beta^3$$), Q9 uses the factorial recursion ($$n!=n\\cdot(n-1)!$$) and log laws. In both, the error pattern is the same: **missing a coefficient or factor in the identity** (the 3 in Q5, the chain in Q9). The fix is the same: write the identity out in full before substituting, and expand one step at a time. Identity recall is the single highest-leverage skill on this paper — Q3, Q5, and Q9 all hinge on it.", "source": "GLM 5.1 ③", "_id": "glm_3_79"}, {"question": "When forming a new quadratic with roots that have a specific sum and product, why are you \"free to scale\" $$p, q, r$$, and how does this freedom give you integer coefficients?", "answer": "- Step 1: A quadratic $$px^2 + qx + r = 0$$ is determined by its roots only up to overall scaling — $$2x^2 - 4x + 2 = 0$$ and $$x^2 - 2x + 1 = 0$$ have the same roots.\n- Step 2: The constraints \"sum of roots $$= -q/p$$, product of roots $$= r/p$$\" are two equations in three unknowns, leaving one degree of freedom.\n- Step 3: Use that freedom: pick $$p$$ to be the LCM of the denominators in your sum/product expressions. This guarantees $$q$$ and $$r$$ also come out as integers (or integers-in-terms-of-$$k$$).\n\nScaling freedom is why \"find a quadratic\" never has a unique answer — and why integer demands are always satisfiable.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "When evaluating $$f(0.25)$$ or $$f'(0.25)$$ with decimal bases, what substitution makes the arithmetic cleaner?", "answer": "Substitute $$0.25=\\frac{1}{4}$$, so $$(0.25)^n=4^{-n}$$. Then $$\\frac{1}{(0.25)^n}=4^n$$, which is a clean integer. For example, $$f'(0.25)=-\\frac{1}{2}\\cdot4^5+2\\cdot4^8$$, both integer terms. Working with powers of 4 is far less error-prone than computing $$(0.25)^5$$ and $$(0.25)^8$$ as decimals. The general principle: **convert terminating decimals to fractions** before raising to powers.", "source": "GLM 5.1 ③", "_id": "glm_3_64"}, {"question": "What's the structural difference in mental model between Newton-Raphson and Linear Interpolation?", "answer": "NR uses the **tangent** at one point $$x_0$$: $$x_1 = x_0 - f(x_0)/f'(x_0)$$. It needs $$f'$$ and is local. LI uses the **chord** between two points $$x_1, x_2$$ bracketing the root: $$x \\approx x_1 - f(x_1)\\cdot\\frac{x_2-x_1}{f(x_2)-f(x_1)}$$. NR converges quadratically when $$f'$$ is well-behaved; LI converges linearly. NR needs derivative; LI needs sign change.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "FP1 Jan 2023 Q6(c) — When simplifying the substitution of B's coordinates into A's normal equation, what common factor can you divide out of every term, and why is this important? (2 steps)", "answer": "- Step 1: Every term in the expanded equation contains a factor of $$\\sqrt{5}$$. Dividing through by $$\\sqrt{5}$$ eliminates it entirely, leaving $$-4c^2 + c^2 - 2 + 2c^4 = 0$$.\n- Step 2: This is important because carrying $$\\sqrt{5}$$ through subsequent algebra creates visual clutter and increases the chance of dropping it from one term. Factoring it out early simplifies the equation to a pure polynomial in $$c$$.", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "FP1 Jan 2023 Q3(b) — after knowing $$-3$$ is a root of a cubic with leading coefficient $$4$$, how do you cleanly extract the remaining quadratic factor without messy long division?", "answer": "- Step 1: Write the factorisation form: $$4z^3+8z^2+24z+108 = (z+3)(4z^2 + az + b)$$. The leading coefficient $$4$$ goes onto the quadratic factor (since $$(z+3)$$ has leading coefficient $$1$$).\n- Step 2: Expand the right side and match coefficients term by term: $$z^2$$ coefficient gives $$a$$, constant gives $$b$$, and the $$z$$ coefficient becomes your free consistency check.\n- Step 3: This avoids long division entirely and produces a clearer mark trail — every coefficient match is a method mark.\n\nCoefficient matching beats polynomial long division almost every time on FP1.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "What general conditions make a starting value $$x_0$$ unsuitable for Newton-Raphson? (3 steps)", "answer": "- Step 1: $$f'(x_0) = 0$$ — division by zero in $$x_{n+1} = x_n - f(x_n)/f'(x_n)$$.\n- Step 2: $$f'(x_0)$$ very small — the tangent is nearly horizontal, throwing $$x_1$$ far from the root (possibly outside the bracket).\n- Step 3: The tangent at $$x_0$$ doesn't cross the $$x$$-axis within the containing interval — leads to divergence or to a different root.\n\nFor exam answers, identify which one applies to the specific $$x_0$$ given, with numerical justification.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "Why must you re-derive constants from the curve equation (like $$a$$ in $$y^2 = 4ax$$) rather than relying on the parametric form's appearance?", "answer": "The parametric form may use a constant ($$c$$, $$a$$) that LOOKS like the curve's parameter but might not match — always verify by substituting parametric coordinates into the curve equation. In Q6, $$P(2t\\sqrt{a}, 2\\sqrt{a}/t)$$ gives $$xy = 4a$$, and we need this to equal 20, so $$a=5$$. If you assumed $$a=20/4=5$$ without verification, you'd be right by luck — but if the parametric form had been $$(t\\sqrt{a}, 4\\sqrt{a}/t)$$, $$xy = 4a$$ would still equal 20 giving $$a=5$$, despite different appearance. Always substitute.", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "FP1 Jan 2023 Q8(c) — When computing the area of triangle $$BPA$$ where $$B$$ and $$P$$ share the same $$y$$-coordinate, what is the smart choice of base and why? (2 steps)", "answer": "- Step 1: Since $$B=(-a,k)$$ and $$P=(\\frac{k^2}{4a},k)$$ share $$y=k$$, the side $$BP$$ is **horizontal**. Choose $$BP$$ as the base — its length is simply $$|x_P-x_B|=\\frac{k^2}{4a}-(-a)=\\frac{k^2+4a^2}{4a}$$.\n- Step 2: The height is the perpendicular distance from $$A$$ to the line $$y=k$$, which is just $$|k-y_A|$$. No distance formula, no angle needed — the horizontal base makes the height trivially the vertical distance. Choosing $$AP$$ or $$AB$$ as the base would require the full distance formula and the sine of an angle — far messier.", "source": "GLM 5.1 ③", "_id": "glm_3_42"}, {"question": "FP1 Jan 2023 Q1 — what's the sign-management trick to avoid the most common slip on entries of $$B$$ when computing $$AB$$ by hand?", "answer": "- Step 1: Before any multiplication, physically circle every negative entry in $$B$$ on the question paper (e.g. the $$-2k$$ in row 3).\n- Step 2: When doing each dot product, read the circled entries aloud or check them off — the brain's pattern-matching often drops the minus on the LAST entry of a row.\n- Step 3: This single habit prevents the dominant error mode on this question, which is flipping the sign of $$-2k$$ in $$B_{31}$$ and getting $$\\det(AB) = -12k^2 + 54k + 24$$ instead of the correct $$+12k^2 - 54k + 24$$.\n\nThe error doesn't come from not knowing how to multiply — it comes from sign blindness mid-computation.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "Q8(c) gives $$a^2 = \\tfrac{1}{16}$$. What's the final constraint-check and why does it matter?", "answer": "The problem states \"$$a$$ is a **positive** constant\", so take the positive root only: $$a = \\tfrac{1}{4}$$, rejecting $$a = -\\tfrac{1}{4}$$. Reporting \"$$a = \\pm\\tfrac{1}{4}$$\" loses a mark. General principle: at the end of every conic question, re-read the problem statement for any sign/positivity restrictions on the constant and apply them. Don't carry both signs through if one was disallowed at the start.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "In the rectangular hyperbola $xy = c^2$, what is the parametric form and what is the gradient of the tangent at parameter $t$? (1 step)", "answer": "Parametric form: $(ct, \\frac{c}{t})$ for $t \\neq 0$. The gradient of the tangent at $(ct, \\frac{c}{t})$ is $-\\frac{1}{t^2}$.\n\n**Note:** For $xy = 20$, with $c = 2\\sqrt{5}$ (since $(2\\sqrt{5})^2 = 20$), the point becomes $(2t\\sqrt{5}, \\frac{2\\sqrt{5}}{t})$.", "source": "MiniMax ①", "_id": "minimax_1_26"}, {"question": "What's the matrix for an enlargement by scale factor $$k$$ about the origin, and how does it combine with a rotation?", "answer": "- Step 1: Enlargement by factor $$k$$ about origin is $$kI = \\begin{pmatrix} k & 0 \\\\ 0 & k \\end{pmatrix}$$.\n- Step 2: Combining with a rotation $$R$$: the product is $$kR$$ — every entry of the rotation matrix is just multiplied by $$k$$.\n- Step 3: This is special to enlargements (because $$kI$$ commutes with everything): you don't need to do full matrix multiplication; scale entry-wise.\n\nMr Fuat's heuristic: if a $$2 \\times 2$$ matrix has entries that are not $$\\pm 1$$ or $$0$$, it likely involves a rotation (possibly composed with scaling).", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "Why is the focus-directrix property called the \"defining\" property of a parabola?", "answer": "- Step 1: A parabola is DEFINED as the locus of points equidistant from a fixed point (focus) and a fixed line (directrix). This is the geometric definition, predating the algebraic equation.\n- Step 2: From this definition, you can DERIVE $$y^2 = 4ax$$ by placing the focus at $$(a, 0)$$ and the directrix at $$x = -a$$, then setting $$\\sqrt{(x-a)^2 + y^2} = x + a$$ and squaring.\n- Step 3: So when you use $$PS = x_P + a$$, you're using the definition itself — the most fundamental and clean tool available.\n\nDefinitions are tools. The focus-directrix property is \"free knowledge\" once you know the parabola.", "source": "Opus 4.7 ①", "_id": "opus_1_63"}, {"question": "FP1 Jan 2023 Q6(c) — when the normal at $$A$$ (parameter $$c$$) meets the hyperbola again at $$B$$ (parameter $$-\\tfrac{1}{2c}$$), what's the critical parameter-substitution discipline?", "answer": "Substitute $$B$$'s **coordinates** into $$A$$'s **normal equation**, keeping the equation's parameter as $$c$$ throughout. The normal equation is parameterised by which point it's normal AT, not by some general $$t$$. Phuc's error: he replaced $$c$$ in the normal equation with $$B$$'s parameter $$-\\tfrac{1}{2c}$$, getting a degenerate equation. Discipline: label \"(this is A's normal, parameter = $$c$$)\" and \"(B's coords being substituted)\" explicitly.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "What is the key insight that makes the factorial cancellation work in Q9's inductive step — specifically, why does $$(2k+2) = 2(k+1)$$ matter? (2 steps)", "answer": "- Step 1: The target expression has $$2^{k+1}(k+1)!$$ in the denominator. Expanding: $$2^{k+1}(k+1)! = 2 \\cdot 2^k \\cdot (k+1) \\cdot k!$$. The numerator has $$(2k+2)! = (2k+2)(2k+1)! = 2(k+1)(2k+1)!$$.\n- Step 2: The factor $$2(k+1)$$ in the numerator cancels exactly with $$2 \\cdot (k+1)$$ in the denominator, leaving $$\\frac{(2k+1)!}{2^k \\cdot k!}$$ — which is exactly what we derived from the inductive hypothesis. Without recognising $$(2k+2) = 2(k+1)$$, this cancellation is invisible and the proof appears stuck.", "source": "GLM 5.1 ②", "_id": "glm_2_97"}, {"question": "For the parabola $$y^2=4ax$$ with $$a>0$$, the point $$P$$ has $$y$$-coordinate $$k>0$$. Why is $$PS = x_P + a$$ rather than requiring the full distance formula? Walk through the logic. (3 steps)", "answer": "- Step 1: By the focus-directrix definition, $$PS$$ equals the distance from $$P$$ to the directrix $$x=-a$$. This distance is the horizontal distance from $$P$$ to the line $$x=-a$$, which is $$x_P - (-a) = x_P + a$$.\n- Step 2: This works because the directrix is a vertical line. The shortest distance from any point to a vertical line is horizontal (perpendicular), so it's simply the difference in $$x$$-coordinates.\n- Step 3: Using the distance formula $$\\sqrt{(x_P-a)^2+k^2}$$ gives the same answer but requires more work: $$\\sqrt{(k^2/(4a)-a)^2+k^2} = \\sqrt{((k^2-4a^2)/(4a))^2+k^2}$$. Expanding and simplifying eventually gives $$(k^2+4a^2)/(4a)$$, but it's 5+ lines instead of 1.", "source": "GLM 5.1 ②", "_id": "glm_2_94"}, {"question": "Why does the shortcut \"$$|z|^2 = $$ constant term of reduced quadratic\" only work for conjugate pairs and not real roots?", "answer": "Vieta gives \"product of roots = constant\" for any quadratic, but $$\\alpha\\beta = |\\alpha|^2$$ ONLY when $$\\beta = \\bar{\\alpha}$$ (because $$z\\bar{z}=|z|^2$$ is a definition for complex numbers). If both roots are real and distinct, $$\\alpha\\beta \\ne |\\alpha|^2$$ in general. So the trigger condition is: discriminant $$<0$$ (genuinely complex), AND leading coefficient is 1 (otherwise divide first).", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "Why does $$|z|^2 = z\\bar z$$ for any complex $$z$$, and how does it connect to the product-of-roots shortcut?", "answer": "- Step 1: Write $$z = x + iy$$. Then $$\\bar z = x - iy$$, and $$z\\bar z = (x+iy)(x-iy) = x^2 - (iy)^2 = x^2 + y^2$$.\n- Step 2: But $$|z|^2 = x^2 + y^2$$ by definition (Pythagoras on the Argand plane).\n- Step 3: So $$z\\bar z = |z|^2$$ — the product of conjugates IS the modulus squared. When a real quadratic has conjugate roots, Vieta gives $$\\alpha\\bar\\alpha = c$$, hence $$|z|^2 = c$$.\n\nThis identity is why complex moduli are computable without ever splitting into real/imaginary parts.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "FP1 Jan 2023 Q9 — what are the FOUR structural pieces every induction proof must contain, and which is most often forgotten?", "answer": "- Step 1: **State $$P(n)$$ explicitly** at the top — write out the proposition.\n- Step 2: **Base case**: verify $$P(1)$$ by computing LHS and RHS separately, showing both equal.\n- Step 3: **Inductive step**: assume $$P(k)$$, then prove $$P(k+1)$$, typically by writing $$\\sum_{r=1}^{k+1} = \\sum_{r=1}^{k} + (\\text{new term})$$ and applying the hypothesis.\n- Step 4: **Conclusion sentence**: \"$$P(1)$$ holds and $$P(k) \\Rightarrow P(k+1)$$, so by the Principle of Mathematical Induction, $$P(n)$$ is true for all positive integers $$n$$.\"\n\nMost-forgotten: the conclusion sentence. Mark schemes grant the closing mark only when this exact phrasing appears. Write it as a reflex.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "FP1 Jan 2023 Q7(ii) — When comparing two surd expressions for $$\\lambda$$ that appear different, what algebraic technique do you use to check if they're equal? (2 steps)", "answer": "- Step 1: **Rationalise the denominator** of each expression. Multiply numerator and denominator by the conjugate of the denominator to eliminate surds from the denominator.\n- Step 2: After rationalising, both expressions should simplify to the same form. If they don't, cross-multiply and check algebraically. As a last resort, square both sides (valid when both sides are positive) to eliminate square roots and compare.", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "Counterexample — Why can't you always use Newton-Raphson starting from the endpoint of a bracket $$[a,b]$$ containing a root, even if $$f'(a) \\ne 0$$? (2 steps)", "answer": "- Step 1: The tangent at an endpoint can point **away** from the root, sending the next iterate outside the bracket. For example, if $$f$$ is concave up with a root in $$[a,b]$$, the tangent at $$x=a$$ (where $$f < 0$$) might slope steeply upward and cross the $$x$$-axis to the left of $$a$$.\n- Step 2: Newton-Raphson has no built-in guarantee of staying within the bracket. Linear interpolation, by contrast, always produces a point between $$x_1$$ and $$x_2$$ (because the chord crosses the axis between the two endpoints). This is why LI is more robus
