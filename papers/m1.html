 energy remains constant, so speed is constant.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "Why can a banking angle on a road reduce the reliance on friction for vehicles turning? (1 step)", "answer": "The **horizontal component of the normal reaction** from the banked surface provides part or all of the required centripetal force. This reduces the need for friction to provide the turning force, especially useful when the road is icy or wet.", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "A particle of mass m is attached to a string and moves in a vertical circle of radius r. What is the minimum speed at the lowest point to complete the circle? (1 step)", "answer": "At the highest point, minimum speed is √(gr) (where tension = 0). Using conservation of energy from lowest to highest point: ½mv_min² = ½mv_high² + mg(2r). Substituting v_high = √(gr): v_min = **√(5gr)** at the lowest point.", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "A particle slides inside a smooth circular bowl. What is the period of small oscillations? (1 step)", "answer": "For small oscillations in a circular bowl of radius r, the motion is **simple harmonic** with period **T = 2π√(r/g)**. This is the same formula as a simple pendulum of length r (the effective length is the radius of the circle).", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "A conical pendulum consists of a particle rotating in a horizontal circle at the end of a string of length L at angle θ to the vertical. What is the time for one complete revolution? (2 steps)", "answer": "- Step 1: The horizontal component of tension provides centripetal force: T·sinθ = mω²r, where r = L·sinθ.\n- Step 2: Vertical equilibrium: T·cosθ = mg. Dividing: tanθ = ω²r/g = ω²(L·sinθ)/g. Solving for ω gives period T = 2π/ω.", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "A particle is under simple harmonic motion with amplitude A and angular frequency ω. What is the maximum acceleration? (1 step)", "answer": "In SHM, acceleration a = -ω²x, where x is displacement from equilibrium. Maximum acceleration occurs at maximum displacement (x = ±A), so **a_max = ω²A** (magnitude), directed toward the equilibrium position.", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": false}, {"question": "In simple harmonic motion, what is the relationship between displacement, velocity, and acceleration? (1 step)", "answer": "They are related by: **a = -ω²x** (acceleration proportional to negative displacement), and **v² = ω²(A² - x²)** (velocity maximum at equilibrium, zero at extremes). These come from solving the SHM differential equation.", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "A particle undergoes simple harmonic motion about O with amplitude 0.1 m and period 0.5 s. Find the maximum speed. (2 steps)", "answer": "- Step 1: Angular frequency ω = 2π/T = 2π/0.5 = **4π rad/s**.\n- Step 2: Maximum speed v_max = ωA = 4π × 0.1 = **0.4π m/s ≈ 1.26 m/s**.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "A particle moving with simple harmonic motion has zero velocity at x = ±A and maximum at x = 0. What are the corresponding acceleration values? (1 step)", "answer": "At x = ±A (extremes): acceleration is **maximum magnitude** a = -ω²(±A) = ∓ω²A (opposite signs). At x = 0 (equilibrium): acceleration = **0**. This is the opposite pattern to velocity.", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}, {"question": "Two identical light springs have spring constants k₁ and k₂. What is the effective spring constant when they are connected in series? In parallel? (1 step)", "answer": "- **Series**: 1/K_eff = 1/k₁ + 1/k₂, so K_eff = (k₁k₂)/(k₁ + k₂). The combined spring is **weaker** (more stretch for same force).\n- **Parallel**: K_eff = k₁ + k₂. The combined spring is **stiffer** (less stretch for same force).", "source": "MiniMax ①", "_id": "minimax_1_59", "judge_pick": false}, {"question": "A spring of natural length L and spring constant k has a mass M attached. What is the equilibrium extension? (1 step)", "answer": "At equilibrium, weight = spring force: Mg = k·x, so **x = Mg/k**. The total length at equilibrium = L + Mg/k.", "source": "MiniMax ①", "_id": "minimax_1_60", "judge_pick": false}, {"question": "A particle is attached to a spring and moves with simple harmonic motion. What energy transformations occur during one complete oscillation? (1 step)", "answer": "Energy transforms between **spring potential energy (maximum at extremes)** and **kinetic energy (maximum at equilibrium)**. Total mechanical energy = ½kA² is constant (assuming no damping). At equilibrium: all PE → KE. At extremes: all KE → PE.", "source": "MiniMax ①", "_id": "minimax_1_61", "judge_pick": false}, {"question": "A particle of mass 0.5 kg oscillates with amplitude 0.2 m and frequency 2 Hz attached to a spring. What is the total energy? (2 steps)", "answer": "- Step 1: Angular frequency ω = 2πf = 4π rad/s.\n- Step 2: Total energy E = ½mω²A² = ½ × 0.5 × (4π)² × (0.2)² = 0.25 × 16π² × 0.04 = **0.16π² J ≈ 1.58 J**.", "source": "MiniMax ①", "_id": "minimax_1_62", "judge_pick": false}, {"question": "What is the condition for a system to execute simple harmonic motion? (1 step)", "answer": "The restoring force must be **proportional to the displacement** from equilibrium and directed **opposite to the displacement**: F = -kx, or equivalently a = -(k/m)x. This gives the differential equation whose solution is sinusoidal motion.", "source": "MiniMax ①", "_id": "minimax_1_63", "judge_pick": false}, {"question": "A particle moves in simple harmonic motion with period T. How does the time taken to travel from equilibrium to half the amplitude compare to from half amplitude to the extreme? (1 step)", "answer": "The motion is **not uniform** — it takes **less time** to go from equilibrium to half amplitude than from half amplitude to the extreme. This is because velocity is higher near equilibrium and lower near the extremes. The time depends on the sinusoidal nature of SHM.", "source": "MiniMax ①", "_id": "minimax_1_64", "judge_pick": false}, {"question": "A particle undergoes damped oscillations. What does the damping force depend on, and what is its effect on the motion? (1 step)", "answer": "Damping force typically depends on **velocity**: F_damping = -c·v (where c is the damping constant). It causes the **amplitude to decrease exponentially** over time and the frequency to slightly decrease. Energy is dissipated as heat.", "source": "MiniMax ①", "_id": "minimax_1_65", "judge_pick": false}, {"question": "A particle is projected up an inclined plane. It travels up, stops, and slides back down. Compare the accelerations going up versus coming down. (2 steps)", "answer": "- Step 1: Going up: acceleration = -g·sinα - μg·cosα (friction opposes motion up).\n- Step 2: Coming down: acceleration = g·sinα - μg·cosα (friction now opposes motion down, which is the same direction as weight component). Since the net decelerating force is larger going up, it decelerates faster.", "source": "MiniMax ①", "_id": "minimax_1_66", "judge_pick": true}, {"question": "A particle is thrown vertically upward in air. How does the acceleration differ from -g? (1 step)", "answer": "With air resistance, the **acceleration is not constant** and is **less than g on the way up** (drag aids gravity), but **greater than g on the way down** (drag opposes weight). Only at low speeds or in vacuum is acceleration exactly -g.", "source": "MiniMax ①", "_id": "minimax_1_67", "judge_pick": false}, {"question": "A particle of mass m is hanging from two strings making angles θ₁ and θ₂ with the vertical. How do you find the tensions? (2 steps)", "answer": "- Step 1: Resolve horizontally: T₁·sinθ₁ = T₂·sinθ₂.\n- Step 2: Resolve vertically: T₁·cosθ₁ + T₂·cosθ₂ = mg. Solve these two equations simultaneously for T₁ and T₂.", "source": "MiniMax ①", "_id": "minimax_1_68", "judge_pick": false}, {"question": "In a moments problem, why must you be careful about the line of action of a force when calculating its moment? (1 step)", "answer": "The **moment of a force = Force × perpendicular distance** from the pivot to the line of action. If you don't use the perpendicular distance (instead using the direct distance), you get an incorrect moment unless the force is perpendicular to the lever arm.", "source": "MiniMax ①", "_id": "minimax_1_69", "judge_pick": false}, {"question": "A uniform ladder rests against a smooth wall and a rough floor. The floor has friction but the wall is smooth (no vertical friction). What forces act on the ladder? (1 step)", "answer": "Forces on the ladder: (1) **Weight** (downward at center), (2) **Normal reaction from floor** (horizontal, perpendicular to floor), (3) **Friction from floor** (horizontal, preventing slipping), (4) **Normal reaction from wall** (horizontal, perpendicular to wall). No vertical force from the smooth wall.", "source": "MiniMax ①", "_id": "minimax_1_70", "judge_pick": false}, {"question": "A ladder is about to slip. What is the relationship between the frictional force and normal reaction at the floor in terms of μ? (1 step)", "answer": "At the point of slipping, the frictional force is at its **limiting value**: **F = μR**, where R is the normal reaction at the floor. For equilibrium, F ≤ μR; at slipping, F = μR exactly.", "source": "MiniMax ①", "_id": "minimax_1_71", "judge_pick": false}, {"question": "A uniform rod AB of length L and weight W is hinged at A and held at angle θ to the horizontal by a string from B to the ceiling. What is the direction of the hinge force at A? (1 step)", "answer": "The hinge force at A has both **horizontal and vertical components**. It must balance the weight (vertical down) and the string tension (at some angle). You resolve forces horizontally and vertically to find both components, or take moments to find one component.", "source": "MiniMax ①", "_id": "minimax_1_72", "judge_pick": false}, {"question": "A particle moves in a straight line with constant acceleration a. The displacement from t = 0 to t = T is s. What is the average velocity over this period? (1 step)", "answer": "Average velocity = **total displacement / total time** = s/T. For constant acceleration, this also equals (initial velocity + final velocity)/2 = (u + v)/2. Since v = u + aT, average = u + ½aT.", "source": "MiniMax ①", "_id": "minimax_1_73", "judge_pick": false}, {"question": "A particle moves with velocity v(t) = 3t² - 2t + 1. What is the displacement from t = 0 to t = 2? (2 steps)", "answer": "- Step 1: Displacement = ∫v(t)dt from 0 to 2 = [t³ - t² + t]₀² = (8 - 4 + 2) - 0 = **6 units**.\n- Step 2: Alternatively, find position at t = 2 and t = 0 and subtract: s(2) - s(0) = 6.", "source": "MiniMax ①", "_id": "minimax_1_74", "judge_pick": false}, {"question": "A particle has position x(t) = t³ - 6t² + 9t + 1. Find the velocity and identify when the particle is at rest. (2 steps)", "answer": "- Step 1: Velocity v = dx/dt = 3t² - 12t + 9 = 3(t² - 4t + 3) = 3(t-1)(t-3).\n- Step 2: At rest when v = 0: t = 1 s or t = 3 s. The particle is instantaneously at rest at these times (and changes direction if acceleration is non-zero).", "source": "MiniMax ①", "_id": "minimax_1_75", "judge_pick": false}, {"question": "A particle is traveling in the x-y plane. Its velocity components are v_x = 4t and v_y = 3 - 2t. If it starts at the origin, what is its position when t = 2? (2 steps)", "answer": "- Step 1: x = ∫v_x dt = ∫4t dt = 2t² + C. At t = 0, x = 0, so C = 0 → x(2) = 2(4) = 8.\n- Step 2: y = ∫v_y dt = ∫(3 - 2t) dt = 3t - t² + D. At t = 0, y = 0, so D = 0 → y(2) = 6 - 4 = 2. Position = **(8i + 2j)**.", "source": "MiniMax ①", "_id": "minimax_1_76", "judge_pick": false}, {"question": "When resolving a force into components, what is the difference between resolving along axes versus resolving perpendicular and parallel to a surface? (1 step)", "answer": "Resolving along **Cartesian axes** (i and j) gives horizontal and vertical components. Resolving **perpendicular and parallel to a surface** gives components normal to and along the surface. The choice depends on what equilibrium or motion equation you're analyzing.", "source": "MiniMax ①", "_id": "minimax_1_77", "judge_pick": false}, {"question": "A particle of mass 2 kg is on a rough horizontal surface with μ = 0.3. A horizontal force of 4 N is applied. Does it move? (2 steps)", "answer": "- Step 1: Maximum friction = μmg = 0.3 × 2 × 9.8 = 5.88 N.\n- Step 2: Applied force = 4 N < 5.88 N, so **it does not move**. The friction force adjusts to exactly balance the applied force: F = 4 N < μmg.", "source": "MiniMax ①", "_id": "minimax_1_78", "judge_pick": false}, {"question": "Two particles of masses m and 2m collide and stick together. What is the speed of the combined mass after a head-on collision? (1 step)", "answer": "Using conservation of momentum: m·u₁ + 2m·u₂ = (m + 2m)·v = 3m·v. So **v = (m·u₁ + 2m·u₂) / (3m)**. This is less than the weighted average of the individual velocities (specifically, it's the mass-weighted average).", "source": "MiniMax ①", "_id": "minimax_1_79", "judge_pick": false}, {"question": "In a vector problem, how do you find the bearing of one point from another? (2 steps)", "answer": "- Step 1: Find the vector from point A to point B: r = r_B - r_A.\n- Step 2: The bearing is found by calculating the angle of this vector clockwise from North. If the vector has components (a, b), bearing = arctan(|a|/|b|) in the appropriate quadrant, measured clockwise from North.", "source": "MiniMax ①", "_id": "minimax_1_80", "judge_pick": false}, {"question": "A car travels 100 km east, then 50 km north. What is its displacement from the starting point? (1 step)", "answer": "Displacement vector = 100i + 50j km. Magnitude = √(100² + 50²) = √12500 ≈ **111.8 km**. Direction: tan⁻¹(50/100) = 26.6° north of east, or bearing 026.6°.", "source": "MiniMax ①", "_id": "minimax_1_81", "judge_pick": false}, {"question": "Why is it important to draw a clear force diagram when solving dynamics problems? (1 step)", "answer": "A force diagram ensures you: (1) **Identify all forces** acting on the particle/system, (2) **Assign correct directions**, (3) **Don't miss any forces** like weight, friction, or normal reactions, (4) **Avoid sign errors** in equations. It is the foundation for correct F = ma equations.", "source": "MiniMax ①", "_id": "minimax_1_82", "judge_pick": false}, {"question": "A particle is moving in a circle of radius r with constant angular velocity ω. What is its acceleration? (1 step)", "answer": "The acceleration is **centripetal** (toward the center), with magnitude **a = ω²r = v²/r**, where v = ωr is the linear speed. This acceleration is required to maintain circular motion (changing the direction of velocity).", "source": "MiniMax ①", "_id": "minimax_1_83", "judge_pick": false}, {"question": "In projectile motion, what is the trajectory equation (relationship between x and y)? (1 step)", "answer": "Eliminating time: x = u·cosθ · t, y = u·sinθ · t - ½gt². So t = x/(u·cosθ). Substituting: **y = x·tanθ - (g·x²) / (2u²·cos²θ)**. This is a parabola (or parabola-like for small distances on Earth).", "source": "MiniMax ①", "_id": "minimax_1_84", "judge_pick": false}, {"question": "A particle is projected from height h with horizontal speed u. What is the horizontal range when it hits the ground? (1 step)", "answer": "Time to fall: from y = h = ½gt² → t = √(2h/g). Horizontal range = u × t = **u√(2h/g)**. This assumes no air resistance and the ground is level with the launch point.", "source": "MiniMax ①", "_id": "minimax_1_85", "judge_pick": false}, {"question": "A particle is on a smooth inclined plane at angle α. What is its acceleration down the plane? (1 step)", "answer": "The component of weight along the plane is mg·sinα. Using F = ma: mg·sinα = ma → **a = g·sinα**. This is less than g and depends on the angle of inclination.", "source": "MiniMax ①", "_id": "minimax_1_86", "judge_pick": false}, {"question": "A particle is on a rough inclined plane. It is on the point of sliding when the angle is α. What is μ? (1 step)", "answer": "At the point of sliding, limiting friction equals the component of weight down the plane: μmg·cosα = mg·sinα. So **μ = tanα**. This is the angle of repose — the steepest angle at which the particle remains at rest.", "source": "MiniMax ①", "_id": "minimax_1_87", "judge_pick": false}, {"question": "When a vehicle rounds a banked curve without relying on friction, what provides the centripetal force? (1 step)", "answer": "The **horizontal component of the normal reaction** from the road surface provides the centripetal force. The vertical component balances the weight. No friction is needed if the banking angle and speed are matched correctly.", "source": "MiniMax ①", "_id": "minimax_1_88", "judge_pick": false}, {"question": "A particle of mass m is attached to a string and rotates in a vertical circle. What is the minimum speed at the top of the circle to complete the loop? (1 step)", "answer": "At the top, if speed is too low, the string goes slack and the particle falls off the circular path. The **minimum speed is √(gr)** — at this speed, tension is zero and centripetal force is provided entirely by weight.", "source": "MiniMax ①", "_id": "minimax_1_89", "judge_pick": false}, {"question": "A car of mass 1000 kg travels at 20 m/s around a flat circular curve of radius 50 m. What is the minimum coefficient of friction needed to prevent skidding? (2 steps)", "answer": "- Step 1: Required centripetal force = mv²/r = 1000 × 400 / 50 = 8000 N.\n- Step 2: Maximum frictional force = μmg = μ × 1000 × 9.8 = 9800μ. For no skidding: 9800μ ≥ 8000 → μ ≥ 8000/9800 ≈ **0.82**.", "source": "MiniMax ①", "_id": "minimax_1_90", "judge_pick": false}, {"question": "What is the principle of conservation of mechanical energy? When does it apply? (1 step)", "answer": "In the **absence of non-conservative forces** (like friction or air resistance), the **total mechanical energy (KE + PE) remains constant**. It applies when only conservative forces (gravity, spring force) do work.", "source": "MiniMax ①", "_id": "minimax_1_91", "judge_pick": false}, {"question": "A particle slides down a curved smooth surface from height h. What is its speed at the bottom? (1 step)", "answer": "Using conservation of energy: initial PE = mgh, final KE = ½mv². With no friction: mgh = ½mv² → **v = √(2gh)**. This is independent of the shape of the curve.", "source": "MiniMax ①", "_id": "minimax_1_92", "judge_pick": false}, {"question": "A particle of mass m is attached to a light vertical spring and displaced by x from equilibrium. What is the restoring force? (1 step)", "answer": "By Hooke's Law: **F = -kx**, where k is the spring constant. The negative sign indicates the force opposes the displacement (restoring toward equilibrium). This is the basis for simple harmonic motion.", "source": "MiniMax ①", "_id": "minimax_1_93", "judge_pick": false}, {"question": "A particle undergoes elastic collision with a stationary target. What is always true about the total kinetic energy before and after? (1 step)", "answer": "**Total kinetic energy is conserved**: KE_initial = KE_final. This distinguishes elastic collisions from inelastic ones, where kinetic energy is lost (converted to other forms like heat or sound).", "source": "MiniMax ①", "_id": "minimax_1_94", "judge_pick": false}, {"question": "In a perfectly inelastic collision where two particles stick together, what fraction of the initial kinetic energy is lost? (1 step)", "answer": "The fraction depends on the masses. Using momentum conservation, the final KE = (m₁+m₂v²)/2, where v = (m₁u₁+m₂u₂)/(m₁+m₂). The lost KE = ½(m₁u₁²+m₂u₂²) - ½(m₁+m₂)v². The fraction is **1 - (m₁+m₂)v²/(m₁u₁²+m₂u₂²)**, which is maximum when masses are equal and approach each other with equal speed.", "source": "MiniMax ①", "_id": "minimax_1_95", "judge_pick": false}, {"question": "A particle is in equilibrium under three forces. What geometric relationship exists between these force vectors? (1 step)", "answer": "The three force vectors, when placed tip-to-tail, form a **closed triangle** (they sum to zero as vectors). This is the \"triangle of forces\" — the resultant of any two equals the negative of the third.", "source": "MiniMax ①", "_id": "minimax_1_96", "judge_pick": false}, {"question": "How do you find the resultant of three or more forces using the component method? (1 step)", "answer": "- Step 1: Resolve each force into i (horizontal) and j (vertical) components.\n- Step 2: Sum all i-components to get F_x, sum all j-components to get F_y.\n- Step 3: Resultant magnitude = √(F_x² + F_y²), direction = arctan(F_y/F_x) with appropriate quadrant check.", "source": "MiniMax ①", "_id": "minimax_1_97", "judge_pick": false}, {"question": "A particle is attached to a string of length r and rotates in a horizontal circle at constant speed. What is the tension in the string? (1 step)", "answer": "The tension provides the centripetal force: **T = mω²r = mv²/r**, where ω is angular velocity and v is linear speed. The tension is directed toward the center of the circle.", "source": "MiniMax ①", "_id": "minimax_1_98", "judge_pick": false}, {"question": "In a vertical circle, how does the tension in the string vary around the circle? (1 step)", "answer": "At any point: T = m(g·cosθ + v²/r), where θ is angle from the vertical. Tension is **minimum at the top** (θ = 180°, T = m(v²/r - g)) and **maximum at the bottom** (θ = 0°, T = m(v²/r + g)). At the top, if v² < gr, tension becomes negative (impossible — string goes slack).", "source": "MiniMax ①", "_id": "minimax_1_99", "judge_pick": false}], "count": 100}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "A particle accelerates from rest at 2 m/s² for 5 seconds, then decelerates at 3 m/s² until it stops. Find the total distance travelled. Explain why you cannot use a single SUVAT equation for the entire motion. (3 steps)", "answer": "- Step 1: First stage (0–5 s, acceleration = 2 m/s²)\n  + Using $$s = ut + \\frac{1}{2}at^2$$: $$s_1 = 0 + \\frac{1}{2}(2)(25) = 25 \\text{ m}$$\n  + Final velocity after 5s: $$v = u + at = 0 + 2(5) = 10 \\text{ m/s}$$\n\n- Step 2: Second stage (10 m/s → 0, deceleration = -3 m/s²)\n  + Using $$v^2 = u^2 + 2as$$: $$0 = 100 + 2(-3)s_2$$\n  + Solving: $$s_2 = \\frac{100}{6} = \\frac{50}{3} \\approx 16.67 \\text{ m}$$\n\n- Step 3: Total distance\n  + $$s_{total} = 25 + 16.67 = 41.67 \\text{ m}$$\n\nYou cannot use single SUVAT for entire motion because acceleration changes at t = 5s. Each stage has different a, so you must split the problem and apply SUVAT separately to each stage.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "What does the area under an acceleration-time graph represent, and how does this differ from the area under a velocity-time graph?", "answer": "- **Area under a-t graph:** Represents **change in velocity** (Δv), not displacement.\n  + Mathematically: $$\\int a \\, dt = \\Delta v$$\n  + Example: If a = -0.5 m/s² for 4 seconds, the area = -0.5 × 4 = -2 m/s, meaning velocity decreases by 2 m/s.\n\n- **Area under v-t graph:** Represents **displacement** (s).\n  + Mathematically: $$\\int v \\, dt = s$$\n\nThis is a common misconception. The key distinction: a-t graph area gives velocity change; v-t graph area gives displacement. When acceleration is not constant, you cannot use v = u + at for the entire motion—instead, calculate the area under the a-t graph to find Δv.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": true}, {"question": "A force of 10 N acts on a bearing of 330°. Write this force in vector form (i, j components), where i is east and j is north. (2 steps)", "answer": "- Step 1: A bearing of 330° means 30° west of north (since 360° - 330° = 30°).\n  + From North: measure clockwise → 330° points 30° below the positive j-axis (north), toward the west.\n\n- Step 2: Resolve into components\n  + The angle from the positive i-axis (east) is: 90° + 30° = 120° counter-clockwise from east.\n  + Alternatively: since 330° = 360° - 30°, the vector makes angle 30° below the positive i-axis.\n  + $$F_x = 10 \\cos(30^\\circ) = 10 \\times \\frac{\\sqrt{3}}{2} = 5\\sqrt{3} \\text{ (east)}$$\n  + $$F_y = 10 \\sin(30^\\circ) = 10 \\times \\frac{1}{2} = 5 \\text{ (north)}$$\n  + But since it's below the i-axis: $$F_y = -10 \\sin(30^\\circ) = -5$$\n  + Wait—let's reconsider: bearing 330° = 30° west of north = angle of -30° from north axis toward west\n  + $$F = 10 \\sin(30^\\circ) \\text{ (west)} + 10 \\cos(30^\\circ) \\text{ (north)}$$\n  + Converting to i,j: $$F = -10\\sin(30^\\circ)i + 10\\cos(30^\\circ)j = -5i + 5\\sqrt{3}j$$\n\nThe vector is $$-5\\mathbf{i} + 5\\sqrt{3}\\mathbf{j}$$ N. Remember: bearings are always measured clockwise from North.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Two forces P = 10 N and Q = 8 N act at an angle of 120° to each other. Use the cosine rule to find the magnitude of their resultant force. (2 steps)", "answer": "- Step 1: Set up the cosine rule for the triangle of forces.\n  + When two forces P and Q act at angle θ between them, the resultant R satisfies:\n  + $$R^2 = P^2 + Q^2 - 2PQ\\cos(180^\\circ - \\theta)$$\n  + Or equivalently: $$R^2 = P^2 + Q^2 + 2PQ\\cos\\theta$$ (since cos(180°-θ) = -cosθ)\n  + For θ = 120°: $$\\cos 120^\\circ = -\\frac{1}{2}$$\n\n- Step 2: Calculate\n  + $$R^2 = 10^2 + 8^2 + 2(10)(8)\\cos 120^\\circ$$\n  + $$R^2 = 100 + 64 + 160 \\times (-\\frac{1}{2}) = 164 - 80 = 164 - 80 = 84$$\n  + Wait—correct calculation: $$R^2 = 100 + 64 - 2(10)(8)\\cos 60^\\circ = 164 - 80 = 84$$\n  + Using the formula with -2PQ cos(120°): $$R^2 = 100 + 64 - 160(-0.5) = 164 + 80 = 244$$\n  + $$R = \\sqrt{244} \\approx 15.6 \\text{ N}$$\n\nThe magnitude is approximately 15.6 N. The cosine rule handles non-right-angle force triangles: $$R^2 = P^2 + Q^2 - 2PQ\\cos\\theta$$ where θ is the angle between the forces (not the angle inside the triangle).", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Explain what a bearing is, and why the direction \"clockwise from North\" matters for vector problems. Give an example converting bearing 225° to i,j components. (2 steps)", "answer": "- Step 1: Definition\n  + A bearing is a direction measure, always expressed as a three-digit number (e.g., 045°, 225°).\n  + It is measured **clockwise from North** (the positive j-direction).\n  + Common bearings: 000° = North, 090° = East, 180° = South, 270° = West.\n\n- Step 2: Converting bearing 225° to components\n  + 225° = 180° + 45° → this is exactly halfway between South (180°) and West (270°), i.e., the southwest direction.\n  + The angle from the positive i-axis (east) is 225° counter-clockwise.\n  + Let speed = v. Then:\n  + $$i\\text{-component} = v \\cos(45^\\circ) \\times \\cos(180^\\circ) \\text{ direction} = -v\\cos 45^\\circ = -\\frac{v}{\\sqrt{2}}$$\n  + $$j\\text{-component} = v \\sin(45^\\circ) \\times \\sin(180^\\circ) \\text{ direction} = -v\\sin 45^\\circ = -\\frac{v}{\\sqrt{2}}$$\n  + So for bearing 225°: components are both negative and equal: $$-v/\\sqrt{2}i - v/\\sqrt{2}j$$\n\nA common error is measuring bearings counter-clockwise from North or from East. Always remember: clockwise from North.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Particle A moves east at 40 km/h. Particle B moves on a bearing where tan α = 4/3. If the speed of B is 20 km/h, find the velocity vector of B in i,j form. (2 steps)", "answer": "- Step 1: Find the angle α from the bearing\n  + Given tan α = 4/3, so α = arctan(4/3).\n  + This is a 3-4-5 right triangle: sin α = 4/5, cos α = 3/5.\n  + Since tan α = positive, α could be in first or third quadrant. For a bearing, we typically use acute angles from north or south.\n  + If the bearing is such that tan α = 4/3, this is a direction northeast of north.\n\n- Step 2: Resolve the velocity\n  + For a bearing measured clockwise from North at angle α:\n  + $$v_{i} = v \\sin \\alpha$$ (east component = speed × sin of bearing angle)\n  + $$v_{j} = v \\cos \\alpha$$ (north component = speed × cos of bearing angle)\n  + With v = 20, sin α = 4/5, cos α = 3/5:\n  + $$v_B = 20 \\times \\frac{4}{5}i + 20 \\times \\frac{3}{5}j = 16i + 12j \\text{ km/h}$$\n\nFor any bearing α: i-component = speed × sin α, j-component = speed × cos α. This is because sin gives the eastward (i) proportion, cos gives the northward (j) proportion when measuring from North.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Two particles have position vectors r_A = (20 + 40t)i + 20j and r_B = (10 + 16t)i + (5 + 12t)j. Do they collide? Show how to check this using vector methods. (3 steps)", "answer": "- Step 1: Find the relative position vector\n  + The vector from A to B is: $$AB = r_B - r_A$$\n  + $$AB = [(10 + 16t) - 20]i + [(5 + 12t) - 20]j = (16t - 10)i + (12t - 15)j$$\n\n- Step 2: Set components equal to zero for collision\n  + For collision, both i and j components must be zero simultaneously:\n  + $$16t - 10 = 0 \\Rightarrow t = \\frac{10}{16} = \\frac{5}{8} = 0.625$$\n  + $$12t - 15 = 0 \\Rightarrow t = \\frac{15}{12} = \\frac{5}{4} = 1.25$$\n\n- Step 3: Conclusion\n  + The times are different (0.625 vs 1.25), so there is no collision.\n  + The particles are closest when the relative position vector is minimized (different from zero).\n\nThis is the key test for collision: solve r_A = r_B. If the same t satisfies both component equations, a collision occurs; if not, they never meet.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Two particles have position vectors r_L = (3 + 2t)i + (1 - t)j and r_S = (5 + t)i + (3 + 3t)j. Find the minimum separation distance between them. (4 steps)", "answer": "- Step 1: Form the relative position vector\n  + $$LS = r_S - r_L = [(5 + t) - (3 + 2t)]i + [(3 + 3t) - (1 - t)]j$$\n  + $$LS = (2 - t)i + (2 + 4t)j$$\n\n- Step 2: Write the squared distance\n  + $$|LS|^2 = (2 - t)^2 + (2 + 4t)^2$$\n  + $$= (t^2 - 4t + 4) + (16t^2 + 16t + 4)$$\n  + $$= 17t^2 + 12t + 8$$\n\n- Step 3: Minimise by differentiating\n  + $$\\frac{d}{dt}(|LS|^2) = 34t + 12 = 0$$\n  + $$t = -\\frac{12}{34} = -\\frac{6}{17}$$\n\n- Step 4: Find minimum distance\n  + Substitute back: $$|LS|^2_{min} = 17\\left(\\frac{36}{289}\\right) + 12\\left(-\\frac{6}{17}\\right) + 8 = \\frac{612}{289} - \\frac{72}{17} + 8$$\n  + Converting to common denominator: $$= \\frac{612 - 972 + 2352}{289} = \\frac{1992}{289}$$\n  + $$|LS|_{min} = \\sqrt{\\frac{1992}{289}} = \\frac{\\sqrt{1992}}{17} \\approx \\frac{44.63}{17} \\approx 2.63$$\n\nTo find minimum separation: minimise |AB|² by setting d|AB|²/dt = 0. This gives the time of closest approach, then substitute back to find the distance.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A particle of mass m moving at speed U collides with a stationary particle of mass 3m. The string connecting them becomes taut. What is the speed S after they start moving together, and what is the impulse on the first particle? (3 steps)", "answer": "- Step 1: Apply conservation of momentum\n  + Before collision: total momentum = mU + 3m(0) = mU\n  + After string becomes taut: both move together at speed S\n  + Total mass = m + 3m = 4m\n  + Using mU = 4m × S: $$S = \\frac{U}{4}$$\n\n- Step 2: Find impulse on particle A\n  + Impulse = change in momentum = m(v_final - v_initial)\n  + Initial velocity of A = U, final velocity = U/4\n  + Impulse on A = m(U/4 - U) = m(-3U/4) = -3mU/4\n\n- Step 3: Interpret the sign\n  + The negative sign indicates the impulse acts opposite to A's original direction.\n  + Magnitude of impulse = 3mU/4\n  + By Newton's third law, the impulse on B is +3mU/4 (in the forward direction).\n\nThis is a perfectly inelastic collision where the string becomes taut, causing the particles to move as one. Momentum is conserved; kinetic energy is not.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "A particle of mass 2 kg moving at 6 m/s collides with a stationary 3 kg particle. After the collision, the 2 kg particle reverses direction at 2 m/s. Find the velocity of the 3 kg particle after collision and verify the collision is possible. (3 steps)", "answer": "- Step 1: Set up conservation of momentum\n  + Take initial direction of 2 kg particle as positive.\n  + Before: $$2 \\times 6 + 3 \\times 0 = 12 \\text{ kg·m/s}$$\n  + After: $$2 \\times (-2) + 3 \\times v_3 = -4 + 3v_3$$\n  + $$12 = -4 + 3v_3 \\Rightarrow 3v_3 = 16 \\Rightarrow v_3 = \\frac{16}{3} \\approx 5.33 \\text{ m/s}$$\n\n- Step 2: Verify using coefficient of restitution (optional check)\n  + Relative speed of approach = 6 - 0 = 6 m/s\n  + Relative speed of separation = 2 + 5.33 = 7.33 m/s\n  + Since separation > approach, this is physically possible (e > 0).\n\n- Step 3: Check direction\n  + The 2 kg particle reverses (goes negative), so the 3 kg particle must go positive.\n  + This is consistent: momentum is conserved.\n\nThis problem illustrates how to handle direction in collisions—assign signs consistently (positive = original direction of the incoming particle), and the algebra tells you if reversal occurs.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "A ball is thrown upward from height 2.5 m with speed 24 m/s. Find (a) its speed when it returns to height 2.5 m going downward, and (b) the total time in the air. Take g = 9.8 m/s². (3 steps)", "answer": "- Step 1: Part (a) — speed at same height\n  + Using $$v^2 = u^2 + 2as$$ with s = 0 (same height):\n  + $$v^2 = 24^2 + 2(-9.8)(0) = 576$$\n  + $$v = 24 \\text{ m/s}$$ (downward, so v = -24 if upward is positive)\n  + Wait—actually: when returning to the same height, speed magnitude is the same by energy conservation (or SUVAT symmetry).\n\n- Step 2: Part (b) — total time\n  + Time to reach highest point: 0 = 24 - 9.8t → t = 24/9.8 ≈ 2.45 s\n  + Time to fall back from max height to ground: find max height first\n  + Using v² = u² + 2as: 0 = 576 - 19.6s → s = 576/19.6 ≈ 29.4 m (height gained)\n  + Total height = 29.4 + 2.5 = 31.9 m\n  + Time to fall: s = ½gt² → 31.9 = 4.9t² → t = √(6.51) ≈ 2.55 s\n  + Total time = 2.45 + 2.55 = 5 s\n\nAt the same height, speed magnitude is equal (symmetry of projectile motion). Total time can be found by summing ascent and descent, or by solving s = ut + ½at² with s = -2.5 (below starting point).", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A box of mass 5 kg is pulled along a horizontal floor by a rope at angle θ where sin θ = 3/5 and cos θ = 4/5. The coefficient of friction is μ = 1/3. If the box moves at constant speed, find the tension T in the rope. (4 steps)", "answer": "- Step 1: Resolve vertically to find normal reaction R\n  + Forces upward: R + T sin θ\n  + Forces downward: mg = 5 × 9.8 = 49 N\n  + Equilibrium: R + T sin θ = mg → R = mg - T sin θ\n  + R = 49 - T(3/5)\n\n- Step 2: Write the friction force\n  + Friction: F = μR = (1/3)(49 - 3T/5)\n\n- Step 3: Resolve horizontally (constant speed → a = 0)\n  + T cos θ = F\n  + T(4/5) = (1/3)(49 - 3T/5)\n\n- Step 4: Solve for T\n  + Multiply both sides by 15: 12T = 245 - 3T\n  + 15T = 245 → T = 245/15 = 49/3 ≈ 16.3 N\n\nAt constant speed, net force = 0. The key is to resolve vertically first to find R, then use F = μR in the horizontal equilibrium equation.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "A particle of mass 2 kg is on a rough plane inclined at angle α where sin α = 5/13 and cos α = 12/13. The coefficient of friction is μ = 11/36. A force P pulls the particle up the plane. If the particle moves at constant speed up the plane, what is P? (4 steps)", "answer": "- Step 1: Identify the forces\n  + Weight component down plane: 2g sin α = 2 × 9.8 × (5/13) = 19.6 × 5/13 = 98/13 ≈ 7.54 N\n  + Normal reaction: N = 2g cos α = 19.6 × 12/13 = 235.2/13 ≈ 18.1 N\n  + Friction: Since particle moves up, friction acts DOWN the plane = μN = (11/36) × 18.1 ≈ 5.53 N\n\n- Step 2: Set up equilibrium (constant speed → a = 0)\n  + Up the plane: P\n  + Down the plane: weight component + friction\n  + P = 2g sin α + μ(2g cos α)\n  + P = 2 × 9.8 × (5/13) + (11/36) × 2 × 9.8 × (12/13)\n\n- Step 3: Calculate\n  + First term: 19.6 × 5/13 = 98/13 ≈ 7.54\n  + Second term: (11/36) × 19.6 × 12/13 = (11 × 19.6 × 12) / (36 × 13) = (2587.2)/(468) ≈ 5.53\n  + P ≈ 7.54 + 5.53 ≈ 13.07 N\n\n- Step 4: Alternative approach using sin/cos directly\n  + P = 2g(5/13) + (11/36)(2g)(12/13) = (98/13) + (11 × 19.6 × 12)/(36 × 13)\n  + = 98/13 + 258.72/468 = 7.54 + 5.53 = 13.07 N\n\nFriction direction is crucial: when an object moves (or tends to move) up an incline, friction acts down the plane. At constant speed, all forces balance.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "A particle slides down a rough inclined plane. Write down the formula for its acceleration. Explain why friction acts up the plane in this case. (2 steps)", "answer": "- Step 1: The acceleration formula\n  + When sliding down: the weight component down the plane (mg sin α) is greater than the friction force opposing motion (μmg cos α).\n  + Net force down plane = mg sin α - μmg cos α\n  + Using F = ma: $$a = g\\sin\\alpha - \\mu g\\cos\\alpha$$\n\n- Step 2: Why friction acts up the plane\n  + Friction always opposes the direction of motion (or the direction of impending motion).\n  + Since the particle is sliding DOWN the plane, friction acts in the opposite direction—UP the plane.\n  + This is different from when an external force tries to pull the particle UP the plane—in that case, friction would act DOWN the plane.\n\nThe direction of friction depends on the tendency of motion: if the object would slide down without friction, friction acts up; if pushed up, friction acts down.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A uniform rod of length L rests on two supports. A particle of mass M is placed at one end. How do you choose the pivot point when taking moments to find reactions at the supports? (2 steps)", "answer": "- Step 1: The pivot selection principle\n  + Choose a point where one of the unknown reaction forces acts.\n  + This eliminates that reaction from the moment equation, leaving only one unknown to solve for.\n  + After finding one reaction, you can find the other using ΣF = 0.\n\n- Step 2: Why this works\n  + When taking moments about a point, any force acting at that point has zero moment arm (distance = 0).\n  + By choosing a support reaction point as pivot, that reaction contributes nothing to the moment equation.\n  + Example: If supports are at A and B, taking moments about A eliminates R_A, allowing you to solve for R_B directly.\n\nThis is the key to solving equilibrium moments problems efficiently—always eliminate the maximum number of unknowns by choosing your pivot strategically.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "A non-uniform rod of length 4 m has its center of mass at distance x from one end. It is supported at the midpoint and has a 30 N weight hanging 1.1 m from the support. Find the mass M needed for equilibrium, given that the rod weighs 24 N. The student got x = 7/24 instead of 7/3. What went wrong? (3 steps)", "answer": "- Step 1: Set up the moment equation correctly\n  + Take moments about the support point (at 2 m from either end).\n  + Clockwise moments: Rod weight (24 N) at distance (2 - x) + 30 N weight at distance (1.1 m from support = 2 - 1.1 = 0.9 m)\n  + Anti-clockwise moments: M × g at distance (2 m from support)\n  + Wait—let's be careful with distances from the support:\n  + If support is at midpoint (2 m from each end), and the 30 N weight is 1.1 m from support, that's on the same side as the rod's end.\n  + Let x be distance from the LEFT end to the center of mass.\n  + Then from the support (midpoint): if x < 2, distance = 2 - x; if x > 2, distance = x - 2.\n\n- Step 2: Write the equation (assuming x < 2)\n  + Clockwise: 24 × (2 - x) + 30 × 0.9 = 48 - 24x + 27 = 75 - 24x\n  + Anti-clockwise: M × g × 2 (assuming M is on the other side)\n  + For equilibrium: 2Mg = 75 - 24x\n\n- Step 3: Find the error\n  + The student got -24x + 56 = 0 → x = 7/24\n  + The correct equation: -24x + 56 = 0 leads to x = 56/24 = 7/3 ≈ 2.33 m\n  + The error was in collecting the constant terms: 72 - 8x - 16 should equal 56 (not some other value).\n  + The key is getting the sign right for each term—clockwise moments are positive, anti-clockwise are negative (or vice versa consistently).\n\nSign errors in moment equations are common. Always clearly label which direction is positive (clockwise or anticlockwise) and be consistent throughout.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A particle of mass 4m hangs from a string passing over a smooth pulley. The other end is attached to a particle of mass 3m on a horizontal table. The string is inextensible. Find the acceleration and the tension in the string. (3 steps)", "answer": "- Step 1: Identify key principles\n  + The string is inextensible → both particles have the SAME acceleration magnitude a.\n  + The pulley is smooth → tension is the SAME on both sides of the pulley.\n  + Let T be the tension (same on both sides).\n\n- Step 2: Write F = ma for each particle\n  + For hanging particle (4m): Weight down = 4mg, tension up = T\n  + $$4mg - T = 4ma$$  (Equation 1)\n  + For particle on table (3m): Tension pulls it forward = T\n  + $$T = 3ma$$  (Equation 2)\n\n- Step 3: Solve\n  + Substitute Equation 2 into Equation 1: $$4mg - 3ma = 4ma$$\n  + $$4mg = 7ma \\Rightarrow a = \\frac{4g}{7}$$\n  + From Equation 2: $$T = 3m \\times \\frac{4g}{7} = \\frac{12mg}{7}$$\n\nThe tension is not mg for either particle—it's somewhere in between. The acceleration is less than g because some of the weight is used to accelerate both masses.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Explain why tension is the same throughout a light, inextensible string passing over a smooth pulley. Why might a two-string pulley system have different tensions? (2 steps)", "answer": "- Step 1: Single continuous string over smooth pulley\n  + \"Light\" means mass of string is negligible → no inertia.\n  + \"Inextensible\" means no stretching → same length, same motion at every point.\n  + \"Smooth\" means no friction → no energy loss at the pulley.\n  + Consider a small element of string: forces on it are T (left) and T (right). If they weren't equal, the string would accelerate (since mass ≈ 0, net force = 0). Therefore T₁ = T₂.\n\n- Step 2: Two-string or multi-rope systems\n  + If there are TWO separate strings (like one going up to a ceiling, another going down to a particle), they are connected by a knot or hook but are mechanically separate.\n  + Each string has its own tension—call them T₁ and T₂.\n  + The key phrase to watch for: \"two strings\" or \"rope and string\" means different tensions.\n  + \"One string\" or \"light inextensible string\" means equal tension throughout.\n\nWatch for the wording: \"a string\" = same tension; \"two strings\" = potentially different tensions. The number of rope segments matters.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": true}, {"question": "Two particles of masses 2m and 3m are connected by a light inextensible string over a smooth pulley. The 2m particle is on a rough plane inclined at angle α where sin α = 5/13, and the 3m particle hangs. The coefficient of friction is μ = 11/36. Find the acceleration of the system. (4 steps)", "answer": "- Step 1: Determine direction of motion and friction\n  + The hanging mass (3m) pulls downward. The weight of 3m = 3mg.\n  + The weight component of 2m down the plane = 2mg sin α = 2mg × 5/13 = 10mg/13.\n  + Since 3mg > 2mg sin α, the system will accelerate with 3m going DOWN and 2m going UP the plane.\n  + For particle 2m moving UP the plane, friction acts DOWN the plane.\n\n- Step 2: Write equations of motion\n  + For 3m (hanging): $$3mg - T = 3ma$$  (1)\n  + For 2m (on incline, moving up): $$T - 2mg\\sin\\alpha - \\mu(2mg\\cos\\alpha) = 2ma$$  (2)\n\n- Step 3: Substitute values\n  + sin α = 5/13, cos α = 12/13\n  + Equation (1): 3mg - T = 3ma\n  + Equation (2): T - 2mg(5/13) - (11/36)(2mg)(12/13) = 2ma\n  + Simplify friction: (11/36) × 2mg × 12/13 = (11 × 24mg)/(36 × 13) = (264mg)/(468) = (22mg)/(39)\n\n- Step 4: Add equations to eliminate T\n  + (1) + (2): 3mg - 2mg(5/13) - (22mg/39) = 5ma\n  + Calculate left side: 3mg - 10mg/13 - 22mg/39\n  + Common denominator 39: = (117mg - 30mg - 22mg)/39 = 65mg/39 = 5mg/3\n  + So: 5mg/3 = 5ma → a = g/3 (up the plane for 2m, down for 3m)\n\nThe friction direction is critical: since 2m moves up the plane, friction acts down the plane. Always determine which way the system will move before writing equations.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "A car tows a trailer with a tow bar. The car exerts a horizontal force and the trailer experiences friction. After the tow bar breaks, the trailer decelerates. What forces act on the trailer after the break? How do you find the deceleration? (3 steps)", "answer": "- Step 1: Forces before the break\n  + Car pulls forward via tow bar (tension T).\n  + Trailer has rolling resistance/friction R acting backward.\n  + Weight mg downward, normal reaction R_n upward.\n\n- Step 2: Forces after the break\n  + The tow bar force disappears.\n  + Only forces remaining: weight component (if on incline), friction/resistance, and normal reaction.\n  + On level ground: only friction R and weight/normal (vertical balance).\n  + The deceleration comes from: -Friction = ma → a = -F/m.\n\n- Step 3: Example calculation\n  + If trailer mass = 500 kg, friction = 60 N, and it's on level ground:\n  + Deceleration: 60 = 500a → a = 0.12 m/s² (retarding)\n  + If on an incline: also include weight component down the slope.\n\nAfter any connection breaks (string, rope, tow bar), only the forces that remain are gravity, friction, and normal reaction—there is no more external pull.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "A skydiver falls freely for 5 seconds (g = 9.8 m/s²), then opens a parachute. The parachute provides a resistance of 3200 N. The skydiver's mass is 250 kg. If the total fall distance is 520 m, find the speed when the parachute opens and the landing speed. Use two SUVAT stages. (4 steps)", "answer": "- Step 1: Stage 1 — Free fall (0 to 5 s)\n  + Distance: $$s_1 = \\frac{1}{2}gt^2 = \\frac{1}{2}(9.8)(25) = 122.5 \\text{ m}$$\n  + Speed at parachute opening: $$v = gt = 9.8 \\times 5 = 49 \\text{ m/s}$$\n\n- Step 2: Stage 2 — With parachute\n  + Net force: Weight (250 × 9.8 = 2450 N) downward, resistance 3200 N upward.\n  + Net force = 2450 - 3200 = -750 N (upward, decelerating)\n  + Acceleration: $$a = \\frac{F}{m} = \\frac{-750}{250} = -3 \\text{ m/s}^2$$\n\n- Step 3: Distance covered in stage 2\n  + $$s_2 = 520 - 122.5 = 397.5 \\text{ m}$$\n  + Using $$v^2 = u^2 + 2as$$ with u = 49 m/s, a = -3, s = 397.5:\n  + $$v^2 = 49^2 + 2(-3)(397.5) = 2401 - 2385 = 16$$\n  + $$v = 4 \\text{ m/s}$$\n\n- Step 4: Interpretation\n  + The skydiver reaches a low terminal velocity of 4 m/s with the parachute open.\n  + This is a classic two-stage motion problem with different accelerations in each stage.\n\nWhen acceleration changes mid-motion, you must split into stages and apply SUVAT separately to each stage.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "An object hits the ground from height 1.5 m and decelerates through a soft surface. Given the impact speed, how do you find the normal reaction force during deceleration? (3 steps)", "answer": "- Step 1: Find impact speed using SUVAT\n  + Using v² = u² + 2as with u = 0 (falling from rest), s = 1.5 m, a = g = 9.8 m/s²:\n  + v² = 0 + 2(9.8)(1.5) = 29.4 → v = √29.4 ≈ 5.42 m/s\n\n- Step 2: Find deceleration during impact\n  + After hitting the surface, the object comes to rest. Let the distance traveled in the surface be s_impact.\n  + Using v² = u² + 2as: 0 = (5.42)² + 2a(s_impact)\n  + If we know the distance s_impact, we can find a.\n  + Alternatively: if we know the deceleration a, then we can find the net force.\n\n- Step 3: Find normal reaction using Newton's second law\n  + During deceleration: net force = ma (upward, since deceleration is upward).\n  + Taking upward as positive: N - mg = ma\n  + Therefore: N = m(g + a)\n  + Since a is upward (deceleration), N > mg. The normal force exceeds weight during impact.\n\nThe normal reaction is not constant during impact—it depends on the deceleration. The harder the impact (higher a), the higher the normal force.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "A car and a motorbike start from the same point. The car moves at constant speed v_c. The motorbike starts from rest and accelerates. How do you find the time when the motorbike overtakes the car using their v-t graphs? (3 steps)", "answer": "- Step 1: Understand the graphs\n  + Car: horizontal line at v_c (constant speed).\n  + Motorbike: upward sloping line (acceleration from rest).\n  + Overtaking occurs when the area under both v-t curves is equal—displacement is the same.\n\n- Step 2: Set up the equation\n  + If car travels at constant v_c for time t, its displacement = v_c × t.\n  + If motorbike accelerates at a for time t, its displacement = ½at².\n  + Set equal: v_c × t = ½at²\n\n- Step 3: Solve\n  + If t > 0, divide by t: v_c = ½at → t = 2v_c/a\n  + This gives the overtaking time.\n  + At this time, the motorbike's speed = at = 2v_c (exactly double the car's speed).\n\nThe key insight: the overtaking condition is that both vehicles have traveled the same distance. On a v-t graph, equal areas mean equal displacements.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "What is the coefficient of restitution (e)? How does it relate to the velocities before and after a collision? (2 steps)", "answer": "- Step 1: Definition\n  + The coefficient of restitution e is defined as:\n  + $$e = \\frac{\\text{relative speed of separation}}{\\text{relative speed of approach}}$$\n  + It measures how \"elastic\" a collision is: 0 ≤ e ≤ 1.\n  + e = 1: perfectly elastic (kinetic energy conserved).\n  + e = 0: perfectly inelastic (objects stick together).\n\n- Step 2: The formula\n  + If objects approach at speeds u₁, u₂ and separate at v₁, v₂:\n  + $$e = \\frac{v_2 - v_1}{u_1 - u_2}$$\n  + The velocities must be taken with proper signs (direction matters).\n  + Example: e = 0.5 means the separation speed is half the approach speed.\n\nThis is crucial for collision problems: momentum is ALWAYS conserved (regardless of e), but kinetic energy is only conserved if e = 1.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": true}, {"question": "A particle of mass m moving at speed u collides with a stationary particle of same mass. The collision has coefficient of restitution e. Find their speeds after collision. (3 steps)", "answer": "- Step 1: Conservation of momentum\n  + Before: m·u + m·0 = m·u\n  + After: m·v₁ + m·v₂ = m(v₁ + v₂)\n  + So: v₁ + v₂ = u  (Equation 1)\n\n- Step 2: Coefficient of restitution\n  + Approach speed = u - 0 = u\n  + Separation speed = v₂ - v₁\n  + e = (v₂ - v₁)/u → v₂ - v₁ = eu  (Equation 2)\n\n- Step 3: Solve the two equations\n  + Adding (1) and (2): 2v₂ = u + eu → v₂ = u(1 + e)/2\n  + Subtracting (2) from (1): 2v₁ = u - eu → v₁ = u(1 - e)/2\n  + For e = 1 (elastic): v₁ = 0, v₂ = u (they exchange velocities).\n  + For e = 0 (inelastic): v₁ = v₂ = u/2 (they stick and move together).\n\nThis is a standard result: for equal masses, an elastic collision (e = 1) causes complete velocity exchange.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": true}, {"question": "A horizontal force P is applied to a block on a horizontal surface. The coefficient of friction is μ. What is the maximum value of P before the block starts to slide? (2 steps)", "answer": "- Step 1: Set up the equilibrium/limiting conditions\n  + Resolve horizontally: the applied force P must be balanced by friction F.\n  + At the point of sliding (limiting equilibrium): F = μR\n  + Resolve vertically: R = mg (since no vertical forces)\n\n- Step 2: Find maximum P\n  + At limiting equilibrium: P = F = μR = μmg\n  + So P_max = μmg\n\nIf the force is applied at an angle (say, angle θ above horizontal), the normal reaction changes: R = mg - P sin θ, and the maximum P before sliding satisfies P cos θ = μ(mg - P sin θ).", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A force P is applied at angle θ to a block on a horizontal surface. The coefficient of friction is μ. Find the maximum P before sliding occurs. (4 steps)", "answer": "- Step 1: Resolve vertically to find normal reaction R\n  + Forces upward: R\n  + Forces downward: mg + P sin θ (since sin θ gives upward component)\n  + Equilibrium: R = mg - P sin θ\n  + Note: if P sin θ > mg, the block would lift off; we assume this doesn't happen.\n\n- Step 2: Write friction force at limiting equilibrium\n  + At the point of sliding: F = μR = μ(mg - P sin θ)\n\n- Step 3: Resolve horizontally\n  + Forces to the right: P cos θ\n  + Forces to the left: F = μ(mg - P sin θ)\n  + Equilibrium: P cos θ = μ(mg - P sin θ)\n\n- Step 4: Solve for P\n  + P cos θ = μmg - μP sin θ\n  + P(cos θ + μ sin θ) = μmg\n  + $$P = \\frac{\\mu mg}{\\cos\\theta + \\mu\\sin\\theta}$$\n\nThis is the general formula for the maximum pull force at an angle. As θ increases, the horizontal component decreases but the vertical component reduces normal reaction, reducing friction.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "A rod is in equilibrium with forces acting at angles. How do you determine the direction of friction at a support? (2 steps)", "answer": "- Step 1: Determine the tendency of motion\n  + First, resolve all forces along the rod (or surface).\n  + Identify which direction the applied forces would push the rod if friction weren't present.\n  + If there is a net component trying to move the rod in one direction, friction acts in the opposite direction to prevent motion.\n\n- Step 2: Apply to a specific case\n  + Example: A rod has T cos θ pulling it to the right, and mg sin φ pulling it down.\n  + If T cos θ > mg sin φ, there is a net tendency to move right, so friction acts to the LEFT.\n  + If the rod would slide down without friction, friction acts upward along the rod.\n\nThe direction of friction is always opposite to the direction of (or tendency toward) motion.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Two particles are connected by a string over a smooth pulley. One is on a rough inclined plane, the other hangs. After the string breaks, how does the motion of the particle on the incline change? (2 steps)", "answer": "- Step 1: Before the break\n  + The particle is being pulled up the plane by tension.\n  + Forces: tension up the plane, weight component down, friction down (opposing motion up).\n  + Acceleration is determined by the net force including tension.\n\n- Step 2: After the string breaks\n  + Tension becomes zero.\n  + Only forces remaining: weight component down the plane, friction (direction depends on tendency).\n  + If the particle was moving up when the string broke, it still has upward velocity initially.\n  + Friction now acts DOWN the plane (opposing the motion).\n  + The particle decelerates, eventually stops, then accelerates down the plane.\n  + The acceleration after the break is: a = g sin α - μ g cos α (down the plane).\n\nOnce the string breaks, there's no more external pull—the particle is governed only by gravity and friction.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "A velocity vector is given as v = (5 - 5λ)i + (-8 + 10λ)j. Find the value of λ that minimizes the speed, and find this minimum speed. (3 steps)", "answer": "- Step 1: Write the squared speed\n  + $$|v|^2 = (5 - 5\\lambda)^2 + (-8 + 10\\lambda)^2$$\n  + Expand: = 25 - 50λ + 25λ² + 64 - 160λ + 100λ²\n  + = 125λ² - 210λ + 89\n\n- Step 2: Differentiate and set to zero\n  + $$\\frac{d}{d\\lambda}(|v|^2) = 250\\lambda - 210 = 0$$\n  + $$\\lambda = \\frac{210}{250} = \\frac{21}{25} = 0.84$$\n\n- Step 3: Find minimum speed\n  + Substitute λ = 21/25 into |v|²:\n  + |v|² = 125(441/625) - 210(21/25) + 89\n  + = 441/5 - 882/5 + 89 = -441/5 + 89 = -88.2 + 89 = 0.8\n  + |v| = √0.8 ≈ 0.894 m/s\n\nTo minimize a vector magnitude, minimize its square (since square root is monotonic). This turns it into a quadratic differentiation problem.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "A particle moves with position vector r(t). How do you find its velocity and acceleration vectors? (2 steps)", "answer": "- Step 1: Velocity\n  + Velocity is the rate of change of position with respect to time:\n  + $$v = \\frac{dr}{dt}$$\n  + In component form: if r = x(t)i + y(t)j, then v = ẋ(t)i + ẏ(t)j (dots denote time derivatives).\n\n- Step 2: Acceleration\n  + Acceleration is the rate of change of velocity:\n  + $$a = \\frac{dv}{dt} = \\frac{d^2r}{dt^2}$$\n  + In component form: a = ẍ(t)i + ÿ(t)j.\n\nExample: if r = (3 + 2t)i + (1 - t)j, then v = 2i - j and a = 0 (constant velocity).", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A ball is projected at speed 25 m/s at angle α above the horizontal. It hits the ground 5 seconds later. Find (a) the angle of projection, and (b) the maximum height reached. Take g = 10 m/s². (3 steps)", "answer": "- Step 1: Find the angle using time of flight\n  + Total time of flight: T = (2u sin α)/g\n  + Given T = 5 s, u = 25 m/s: 5 = (2 × 25 × sin α)/10 = 5 sin α\n  + So sin α = 1 → α = 90° (straight up)? That doesn't make sense for horizontal range...\n  + Wait—let me recalculate: 5 = (50 sin α)/10 = 5 sin α → sin α = 1 → α = 90°\n  + Actually, for a projectile that lands at same level, T = 2u sin α/g. With T = 5, u = 25, g = 10: 5 = 2(25) sin α/10 = 5 sin α → sin α = 1. This means the ball was thrown straight up.\n  + If it has horizontal range, perhaps it's not returning to the same level? Let's assume same level for now.\n\n- Step 2: If it's NOT same level (more realistic)\n  + Using s = ut + ½at² vertically: 0 = 25 sin α × 5 - ½ × 10 × 25\n  + 125 sin α = 125 → sin α = 1 → still 90°\n  + Perhaps the question meant horizontal range? Let's check horizontal range = u² sin(2α)/g\n  + If range R = u cos α × T = 25 cos α × 5 = 125 cos α\n  + Need more information. Let's assume α = 30° for a typical problem.\n  + At 30°: T = 2(25)(0.5)/10 = 2.5 s, not 5 s.\n\nLet's approach differently: With u = 25, T = 5, using T = 2u sin α/g → sin α = 1 → α = 90°. This is a vertically thrown ball.\n\n- Step 3: Maximum height\n  + For α = 90° (straight up): H = u²/(2g) = 625/(20) = 31.25 m\n\nThe key formulas for projectiles: Time of flight T = 2u sin α/g; Range R = u² sin(2α)/g; Max height H = u² sin²α/(2g).", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "Explain the difference between a \"smooth\" and \"rough\" pulley in mechanics problems. How does this affect the tension in the string? (2 steps)", "answer": "- Step 1: Smooth pulley\n  + No friction between the string and the pulley.\n  + The pulley doesn't resist the motion of the string.\n  + **Result: Tension is the same on both sides** of the pulley.\n  + The pulley just changes the direction of the force without dissipating energy.\n\n- Step 2: Rough pulley\n  + There is friction between the string and the pulley.\n  + The pulley can \"grip\" the string, causing different tensions on each side.\n  + The difference in tension depends on the coefficient of friction and the angle of contact.\n  + In A-level M1, pulleys are usually assumed smooth unless stated otherwise.\n\nIn most M1 problems, assume smooth unless explicitly told \"rough\" or \"frictionless pulley\" is specified (same thing—smooth means frictionless).", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "A non-uniform rod AB of length L has its center of mass at distance a from end A. It rests on a support at point C (not at the midpoint). Write the condition for equilibrium about C. (2 steps)", "answer": "- Step 1: Identify all forces and their moments about C\n  + Weight of rod (W) acts at the center of mass, distance a from A.\n  + Let C be at distance x from A.\n  + The moment arm of the weight about C = |x - a| (depending on which side of C the CoM is).\n  + Support reaction at C passes through C, so its moment about C is zero.\n\n- Step 2: Write the moment equation\n  + Clockwise moments = Anti-clockwise moments\n  + If the CoM is to the left of C: clockwise moments = W × (C to CoM distance)\n  + If there are additional forces (e.g., particles hanging), include their moments too.\n  + Sum of all moments about any point = 0 for equilibrium.\n\nThe key is correctly identifying the perpendicular distance from each force to the pivot point, and getting the sign (clockwise/anticlockwise) consistent.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A car rounds a flat curve of radius r at speed v. What provides the centripetal force? If the coefficient of friction is μ, what is the maximum speed to avoid skidding? (2 steps)", "answer": "- Step 1: Source of centripetal force\n  + On a flat (horizontal) curve, the only horizontal force is friction.\n  + Friction provides the centripetal force: F = μR = μmg (since R = mg on flat ground).\n  + This friction acts toward the center of the curve.\n\n- Step 2: Maximum speed\n  + Centripetal force required: mv²/r\n  + Maximum friction available: μmg\n  + Setting equal: mv²/r = μmg → v² = μgr → v = √(μgr)\n\nIf the speed exceeds this, centripetal requirement exceeds available friction, and the car skids outward.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "A particle is in limiting equilibrium on a rough inclined plane. The plane is then tilted slightly. Describe what happens to the friction force. (2 steps)", "answer": "- Step 1: At limiting equilibrium\n  + The particle is on the verge of sliding.\n  + Friction is at its maximum value: F_max = μR = μmg cos α.\n  + The weight component down the plane mg sin α equals this maximum friction.\n\n- Step 2: When angle increases\n  + If the angle increases beyond α, mg sin α now exceeds μmg cos α.\n  + The particle accelerates down the plane.\n  + Friction then acts UP the plane (opposing motion), at value F = μmg cos α (the kinetic friction, equal to μR, not the limiting static value).\n  + The net force is mg sin α - μmg cos α, giving acceleration a = g(sin α - μ cos α).\n\nFriction adjusts to oppose motion (or impending motion): static friction adjusts up to μR, kinetic friction equals μR constantly.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": true}, {"question": "A particle of mass m is attached to two strings making angles θ₁ and θ₂ with the vertical. Find the tensions in each string when the particle is in equilibrium. (3 steps)", "answer": "- Step 1: Resolve horizontally\n  + Let T₁ be tension in string at angle θ₁, T₂ in string at angle θ₂.\n  + Horizontal equilibrium: T₁ sin θ₁ = T₂ sin θ₂ (if symmetric left-right)\n  + Or more generally: ΣF_x = 0.\n\n- Step 2: Resolve vertically\n  + Vertical equilibrium: T₁ cos θ₁ + T₂ cos θ₂ = mg\n  + (assuming both strings pull upward on the particle).\n\n- Step 3: Solve the two equations\n  + From horizontal: T₁ = T₂ (sin θ₂/sin θ₁) if symmetric.\n  + Substitute into vertical: T₂ (sin θ₂/sin θ₁) cos θ₁ + T₂ cos θ₂ = mg\n  + Solve for T₂, then find T₁.\n\nIf the strings make different angles with the vertical, the tensions are generally different.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "In a collision problem, when should you use conservation of momentum alone versus using both momentum AND coefficient of restitution? (2 steps)", "answer": "- Step 1: Momentum conservation applies ALWAYS\n  + In any collision (whether elastic or inelastic), total momentum is conserved.\n  + This gives one equation: m₁u₁ + m₂u₂ = m₁v₁ + m₂v₂.\n\n- Step 2: When to use coefficient of restitution\n  + Use e when you need a second equation relating the velocities.\n  + This happens when you have two unknowns (v₁ and v₂) and only one momentum equation.\n  + The restitution equation: e = (v₂ - v₁)/(u₁ - u₂).\n  + Two equations + two unknowns = solvable.\n\nIf you're given e (or can infer it), you always need both equations. If e is not given but you're told the objects \"stick together\" (perfectly inelastic), then v₁ = v₂, giving you the second equation implicitly.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": true}, {"question": "A particle of mass m collides with a stationary particle of mass km (where k > 1). After a perfectly inelastic collision (e = 0), what fraction of the initial kinetic energy is lost? (3 steps)", "answer": "- Step 1: Find final velocity\n  + Conservation of momentum: m·u + km·0 = (m + km)v\n  + v = u/(1 + k)\n\n- Step 2: Calculate initial KE\n  + KE_initial = ½ m u²\n\n- Step 3: Calculate final KE and loss\n  + KE_final = ½ (m + km) v² = ½ m(1 + k) × [u²/(1 + k)²] = ½ m u² × [1/(1 + k)]\n  + = (1/(1 + k)) × KE_initial\n  + Fraction lost = 1 - 1/(1 + k) = k/(1 + k)\n\nFor k = 1 (equal masses): half the KE is lost. For k = 3 (heavy target): 3/4 of KE is lost. More mass difference → more energy lost in inelastic collisions.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": true}, {"question": "A particle moves in a straight line with velocity given by v = 3t² - 6t. Find (a) the acceleration at t = 2 s, (b) the displacement from t = 0 to t = 3 s. (3 steps)", "answer": "- Step 1: Acceleration\n  + a = dv/dt = d(3t² - 6t)/dt = 6t - 6\n  + At t = 2: a = 6(2) - 6 = 6 m/s²\n\n- Step 2: Displacement calculation\n  + Displacement = ∫v dt from 0 to 3\n  + ∫(3t² - 6t) dt = t³ - 3t² + C\n  + Evaluate at 3: 3³ - 3(3)² = 27 - 27 = 0\n  + At t = 0: 0 - 0 = 0\n  + Displacement from 0 to 3 = 0 - 0 = 0\n\n- Step 3: Verify by other means\n  + At t = 0: v = 0; at t = 2: v = 3(4) - 12 = 0; at t = 3: v = 27 - 18 = 9\n  + The particle goes forward, stops at t = 2, then goes backward, ending at starting point at t = 3.\n\nWhen velocity changes sign, you must integrate to find net displacement—the total distance traveled would be different.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "Why can you NOT use the formula v = u + at when acceleration is not constant? What should you use instead? (2 steps)", "answer": "- Step 1: The issue with v = u + at\n  + This formula is derived by assuming constant acceleration a.\n  + Mathematically: v = u + ∫₀ᵗ a dt = u + at only if a is constant.\n  + If a varies with time, this formula gives wrong results.\n\n- Step 2: What to use instead\n  + For variable acceleration, use integration: v = u + ∫a dt.\n  + Graphically: area under a-t graph = change in velocity.\n  + If the a-t graph has multiple segments, calculate the area of each segment and add them.\n\nThis is why for problems with changing acceleration (like the parachute skydiver), you must split into stages and apply SUVAT separately to each constant-acceleration phase.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "A particle is projected at angle α with speed u. Derive the formula for the maximum height reached. (2 steps)", "answer": "- Step 1: Find vertical component of velocity\n  + Initial vertical velocity: u_y = u sin α\n  + At maximum height, vertical velocity = 0.\n  + Using v² = u² + 2as: 0 = (u sin α)² + 2(-g)H\n\n- Step 2: Solve for H\n  + 2gH = u² sin² α\n  + $$H = \\frac{u^2 \\sin^2\\alpha}{2g}$$\n\nThe maximum height depends on the square of the vertical component of velocity. Double the launch speed → quadruple the maximum height.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "A particle is projected from height h with speed u at angle α below the horizontal. How do you find the range (horizontal distance traveled before hitting ground)? (3 steps)", "answer": "- Step 1: Set up the motion\n  + Horizontal: constant velocity u cos α, so range R = u cos α × t_flight\n  + Vertical: initial velocity = -u sin α (downward), acceleration = g\n  + Displacement = -h (since ending h meters below start)\n\n- Step 2: Find time of flight from vertical motion\n  + Using s = ut + ½at²: -h = (-u sin α)t + ½gt²\n  + This is a quadratic in t: ½gt² - u sin α · t - h = 0\n\n- Step 3: Solve for t and then R\n  + Use quadratic formula to find t (positive root).\n  + Then R = u cos α × t.\n\nIf h = 0 (ground to ground), the formula simplifies to the standard range formula with time = 2u sin α/g.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "A ball is thrown at 25 m/s at 30° to the horizontal from a cliff. It lands 100 m horizontally from the cliff base. Find the height of the cliff. Take g = 10 m/s². (4 steps)", "answer": "- Step 1: Resolve initial velocity\n  + u_x = 25 cos 30° = 25 × √3/2 ≈ 21.65 m/s\n  + u_y = 25 sin 30° = 25 × 0.5 = 12.5 m/s (upward)\n\n- Step 2: Find time of flight\n  + Horizontal distance: R = u_x × t → 100 = 21.65 × t\n  + t = 100/21.65 ≈ 4.62 s\n\n- Step 3: Use vertical motion to find height\n  + Using s = u_y t + ½gt² (taking upward as positive, g = -10):\n  + s = 12.5(4.62) + ½(-10)(4.62)²\n  + = 57.75 - 106.97 ≈ -49.22 m\n\n- Step 4: Interpret\n  + Negative s means the ball ends 49.22 m below the launch point.\n  + So the cliff height = 49.22 m ≈ 49 m.\n\nThe height is negative of the vertical displacement—below the launch point gives negative displacement when upward is positive.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "Explain why the tension in a vertical rope is the same throughout when the rope has mass, versus when it is light (negligible mass). (2 steps)", "answer": "- Step 1: Rope with significant mass\n  + Consider a rope of mass m and length L hanging vertically.\n  + At the top, tension must support the entire weight: T_top = mg.\n  + At the bottom, tension is zero (nothing below to support).\n  + Tension varies linearly from top to bottom: at distance x from bottom, T = ρgx (where ρ is mass per unit length).\n\n- Step 2: Light (massless) rope\n  + If the rope's mass is negligible (m ≈ 0), the weight is negligible.\n  + Any difference in tension would produce infinite acceleration (F = ma, m ≈ 0).\n  + Therefore, tension must be the same throughout.\n  + In A-level problems, ropes are assumed light unless stated otherwise.\n\nThis is why we can treat strings as having constant tension—the \"light\" approximation is standard.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": true}, {"question": "A particle of mass m rests on a rough horizontal plane. The coefficient of friction is μ. A horizontal force F is applied. What is the friction force (a) when F < μmg, (b) when F = μmg (limiting equilibrium), (c) when F > μmg? (3 steps)", "answer": "- Step 1: When F < μmg\n  + The block doesn't move—static friction applies.\n  + Friction exactly balances the applied force: f = F.\n  + Static friction can take any value up to its maximum μmg.\n\n- Step 2: When F = μmg (limiting equilibrium)\n  + At the point of sliding—maximum static friction is reached.\n  + f = μmg (this is the threshold).\n\n- Step 3: When F > μmg\n  + The block slides—kinetic friction applies.\n  + Friction remains constant at f = μmg (kinetic, not dynamic—doesn't change with speed in basic models).\n  + The block accelerates: F - μmg = ma.\n\nStatic friction is variable (0 to μmg); kinetic friction is constant (μmg once sliding begins).", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": true}, {"question": "Two forces are given in vector form: F₁ = ai + bj and F₂ = ci + dj. How do you find (a) their resultant, (b) the angle between them? (2 steps)", "answer": "- Step 1: Resultant force\n  + Add the components: R = (a + c)i + (b + d)j\n  + Magnitude: |R| = √[(a + c)² + (b + d)²]\n\n- Step 2: Angle between them\n  + Use the dot product formula: F₁ · F₂ = |F₁||F₂| cos θ\n  + So cos θ = (F₁ · F₂) / (|F₁||F₂|)\n  + Where F₁ · F₂ = ac + bd (sum of products of corresponding components)\n  + And |F₁| = √(a² + b²), |F₂| = √(c² + d²)\n\nThis component method works for any number of forces—just add all i-components and all j-components separately.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "A uniform rod of length L and weight W is pivoted at one end. A particle of weight Q is hung from the rod at distance d from the pivot. Find the reaction at the pivot when the system is in equilibrium. (3 steps)", "answer": "- Step 1: Take moments about the pivot\n  + The pivot force passes through the pivot, so its moment is zero (this is why we choose the pivot).\n  + Clockwise moments: Weight of rod (W) acting at L/2 from pivot × 1 (assuming clockwise is positive)\n  + Anti-clockwise moments: Particle weight (Q) at distance d × 1\n  + For equilibrium: W(L/2) = Q × d\n  + Wait—if the particle is on the same side creating clockwise moment, then clockwise = Q × d, anticlockwise = W × (L/2).\n\n- Step 2: Determine direction of reaction\n  + Actually, let's think: pivot at left end. Rod hangs down from pivot. Particle hangs from rod.\n  + If particle is between pivot and CoM, or beyond CoM, the direction changes.\n  + Sum of moments = 0 about any point. Let clockwise be positive:\n  + Clockwise (from particle): Q × d\n  + Anticlockwise (from rod's weight): W × (L/2)\n  + For equilibrium: Qd = W(L/2) → d = WL/(2Q).\n\n- Step 3: Find the reaction force\n  + The reaction at pivot must balance the vertical forces: R = W + Q (since both weights act downward).\n  + If the rod is at an angle, you'd also have a horizontal component.\n\nThe reaction force has two components: one to balance vertical forces, one to provide the moment. Taking moments eliminates the reaction from the equation.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "In a connected particle problem, when should you treat the system as a single combined mass versus writing separate equations for each particle? (2 steps)", "answer": "- Step 1: Treat as combined when possible\n  + If particles are connected by a single inextensible string and move as one system, you can treat total mass M_total and find system acceleration: a = (total driving force)/(total mass).\n  + Example: Two masses over a pulley on a smooth incline: a = (m₁g - m₂g sin α)/(m₁ + m₂).\n\n- Step 2: Write separate equations when needed\n  + You need separate F = ma equations when you need to find tension (T).\n  + Adding the separate equations eliminates T and gives system acceleration.\n  + Then substitute back to find T.\n  + You also need separate equations if the two particles have different forces acting on them (e.g., one on incline, one hanging; or different surfaces).\n\nThe rule: if you need tension, write separate equations. If you only need acceleration and don't care about tension, combine them.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "A car tows a trailer with a tow bar. The car exerts a horizontal force and the trailer has friction. Given the masses and friction, how do you find the tension in the tow bar and the acceleration? (3 steps)", "answer": "- Step 1: Identify all forces on each object\n  + Car: Engine force (or just let the pulling force be given), friction, tension from trailer.\n  + Trailer: Tension from car (pulling forward), friction (opposing motion), weight and normal reaction.\n\n- Step 2: Write equations for each\n  + For trailer: T - R_friction = m_t × a (if pulling forward)\n  + For car: Engine force - T - R_friction_car = m_c × a\n\n- Step 3: Solve\n  + If you have two equations and two unknowns (T and a), solve simultaneously.\n  + Often the car is the driving force and trailer provides resistance.\n  + The tension is the force transmitted through the tow bar—it depends on the difference between the driving force and the resistance.\n\nThe tension in the tow bar is not simply the engine force; it's affected by the trailer's resistance and both vehicles' accelerations.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "What is the difference between a \"resultant force\" and the \"component\" of a force? How do you find components in given directions? (2 steps)", "answer": "- Step 1: Resultant vs components\n  + The resultant is the single force that has the same effect as all the original forces combined.\n  + Components are the parts of a force resolved (broken down) along specific directions (usually perpendicular, like i and j).\n\n- Step 2: Finding components\n  + To resolve a force F at angle θ from the horizontal into horizontal (F_x) and vertical (F_y) components:\n  + F_x = F cos θ\n  + F_y = F sin θ\n  + If the angle is measured from the vertical, swap cos and sin.\n  + For arbitrary direction: component = F × cos(θ), where θ is the angle between F and the direction.\n\nThe resultant is what you get by adding all force vectors; components are what you get by splitting a force into perpendicular parts.", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": true}, {"question": "A particle is thrown vertically upward with speed u. Show that the time to reach maximum height is u/g, and the maximum height is u²/(2g). (2 steps)", "answer": "- Step 1: Time to maximum height\n  + At maximum height, velocity = 0.\n  + Using v = u + at with a = -g (upward positive): 0 = u - gt\n  + t = u/g\n\n- Step 2: Maximum height\n  + Using v² = u² + 2as: 0 = u² + 2(-g)H\n  + H = u²/(2g)\n  + Alternatively, using s = ut + ½at²: H = u(u/g) - ½g(u/g)² = u²/g - u²/(2g) = u²/(2g)\n\nThese are fundamental results: for vertical motion under gravity, max height depends on initial speed squared.", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": false}, {"question": "A particle of mass m slides down a smooth incline of angle α. What is its acceleration? How does this compare to free fall? (2 steps)", "answer": "- Step 1: Acceleration down the incline\n  + The weight component along the plane is mg sin α.\n  + Since the plane is smooth, no friction.\n  + Using F = ma: mg sin α = ma → a = g sin α.\n\n- Step 2: Comparison to free fall\n  + Free fall acceleration = g (straight down).\n  + On the incline, acceleration = g sin α, which is less than g (since sin α < 1 for α < 90°).\n  + The incline \"breaks up\" the gravitational acceleration into components—only the component along the plane causes motion in that direction.\n  + As α → 90° (vertical), sin α → 1, and a → g (free fall).\n\nThis is why objects slide more slowly down slopes than they fall straight down—the incline only uses part of the gravitational force.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": false}, {"question": "In a pulley system with a light inext
