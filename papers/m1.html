1 becomes the initial speed for Stage 2. In Stage 2 (parachute open), the net force is weight minus resistance: $$250g - 3200$$. This gives a NEW constant acceleration (which is negative — deceleration). You cannot use the same SUVAT equation across both stages because the acceleration has changed.\n- Step 3: In Stage 2, use $$v^2 = u^2 + 2as$$ with the Stage 2 initial speed (from end of Stage 1), the Stage 2 acceleration, and the remaining distance (520 m minus Stage 1 distance) to find the landing speed.\n\nKey rule: Whenever acceleration changes, you MUST split the problem into stages. Never use a single SUVAT equation across a change in acceleration.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": true}, {"question": "A body of mass 250 kg falls under gravity with a parachute providing 3200 N of upward resistance. Compute the acceleration during the parachute stage and state whether the body is speeding up or slowing down. (2 steps)", "answer": "- Step 1: Net force = weight − resistance = $$250 \\times 9.8 - 3200 = 2450 - 3200 = -750$$ N. The negative sign means the net force is upward (opposing the downward motion).\n- Step 2: By Newton's 2nd Law: $$F = ma$$, so $$-750 = 250a$$, giving $$a = -3$$ m/s². The body is decelerating (slowing down) because the acceleration is in the opposite direction to the velocity. The speed is decreasing at 3 m/s every second.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "A block is pulled at constant speed along a rough horizontal surface by a rope making angle $$\\theta$$ with the horizontal, where $$\\tan\\theta = \\frac{3}{4}$$. Explain why \"constant speed\" is a crucial piece of information and what equation it leads to. (2 steps)", "answer": "- Step 1: Constant speed means zero acceleration, which means the net force on the block is zero in every direction. This is an equilibrium condition — even though the block is moving, it is in dynamic equilibrium.\n- Step 2: This gives two equations: horizontal equilibrium ($$T\\cos\\theta - F = 0$$, so the pulling force's horizontal component exactly equals friction) and vertical equilibrium ($$R + T\\sin\\theta - mg = 0$$, so the normal reaction plus the vertical lift from the rope equals the weight). These two equations, combined with $$F = \\mu R$$ (since the block is moving, friction is limiting), allow you to solve for any unknown.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "A rope at angle $$\\theta$$ (where $$\\tan\\theta = \\frac{3}{4}$$) pulls a block at constant speed on a rough surface with $$\\mu = \\frac{1}{3}$$. Why does the normal reaction $$R$$ NOT equal $$mg$$? Derive the expression for $$R$$. (3 steps)", "answer": "- Step 1: The rope has a vertical component $$T\\sin\\theta$$ that pulls the block upward, partially \"lifting\" it off the surface. This reduces the force the surface needs to exert upward.\n- Step 2: Vertical equilibrium: $$R + T\\sin\\theta = mg$$, so $$R = mg - T\\sin\\theta$$. Since $$\\sin\\theta = \\frac{3}{5}$$ (from the 3-4-5 triangle), we get $$R = mg - \\frac{3T}{5}$$. The normal reaction is LESS than $$mg$$ because the rope's vertical component supports some of the weight.\n- Step 3: This is a common trap: students write $$R = mg$$ for any horizontal surface, but when a force has a vertical component (pulling up or pushing down), $$R$$ changes. If the rope pushed down, $$R$$ would be GREATER than $$mg$$.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Continuing from Q17: with $$\\tan\\theta = \\frac{3}{4}$$, $$\\mu = \\frac{1}{3}$$, and constant speed, derive the tension $$T$$ in terms of $$mg$$. (3 steps)", "answer": "- Step 1: From horizontal equilibrium: $$T\\cos\\theta = F = \\mu R$$. With $$\\cos\\theta = \\frac{4}{5}$$ and $$\\mu = \\frac{1}{3}$$: $$\\frac{4T}{5} = \\frac{1}{3}R$$.\n- Step 2: Substitute $$R = mg - \\frac{3T}{5}$$: $$\\frac{4T}{5} = \\frac{1}{3}\\left(mg - \\frac{3T}{5}\\right) = \\frac{mg}{3} - \\frac{T}{5}$$.\n- Step 3: Collect T terms: $$\\frac{4T}{5} + \\frac{T}{5} = \\frac{mg}{3}$$, so $$T = \\frac{mg}{3}$$. The tension is exactly one-third of the weight.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "A particle moves on a bearing $$\\alpha$$ at speed $$v$$. Write the velocity in terms of $$\\mathbf{i}$$ (East) and $$\\mathbf{j}$$ (North) components. Explain why the i-component uses $$\\sin\\alpha$$ and the j-component uses $$\\cos\\alpha$$. (2 steps)", "answer": "- Step 1: A bearing is measured clockwise from North. At bearing $$\\alpha$$, the direction makes angle $$\\alpha$$ with the North ($$\\mathbf{j}$$) direction, measured clockwise. The component along North ($$\\mathbf{j}$$) is $$v\\cos\\alpha$$ (adjacent side), and the component along East ($$\\mathbf{i}$$) is $$v\\sin\\alpha$$ (opposite side, since East is 90° clockwise from North).\n- Step 2: So $$\\mathbf{v} = v\\sin\\alpha\\,\\mathbf{i} + v\\cos\\alpha\\,\\mathbf{j}$$. This is the OPPOSITE of the usual maths convention where angle is from the x-axis. In bearings, the angle is from the y-axis (North), so sine and cosine swap their usual roles for the i-component.\n\nCommon error: Writing $$v\\cos\\alpha\\,\\mathbf{i} + v\\sin\\alpha\\,\\mathbf{j}$$ — this is wrong for bearings. For bearings: i = speed × sin(bearing), j = speed × cos(bearing).", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Ship A is at position $$20\\mathbf{j}$$ km and moves east at 40 km/h. Ship B is at position $$(10\\mathbf{i} + 5\\mathbf{j})$$ km and moves on a bearing where $$\\tan\\alpha = \\frac{4}{3}$$ at 20 km/h. Write the position vectors of both ships as functions of time $$t$$ hours. (2 steps)", "answer": "- Step 1: Ship A moves east at 40 km/h, so its velocity is $$40\\mathbf{i}$$. Position: $$\\mathbf{r}_A = 40t\\,\\mathbf{i} + 20\\,\\mathbf{j}$$.\n- Step 2: Ship B moves on bearing $$\\alpha$$ where $$\\tan\\alpha = \\frac{4}{3}$$ (a 3-4-5 triangle), so $$\\sin\\alpha = \\frac{4}{5}$$, $$\\cos\\alpha = \\frac{3}{5}$$. Speed = 20 km/h. Velocity: $$\\mathbf{v}_B = 20 \\times \\frac{4}{5}\\,\\mathbf{i} + 20 \\times \\frac{3}{5}\\,\\mathbf{j} = 16\\mathbf{i} + 12\\mathbf{j}$$. Position: $$\\mathbf{r}_B = (10 + 16t)\\mathbf{i} + (5 + 12t)\\mathbf{j}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "Two particles A and B have position vectors as functions of time. Explain the method to determine whether they collide. What condition must be satisfied? (3 steps)", "answer": "- Step 1: Form the displacement vector from A to B: $$\\mathbf{AB} = \\mathbf{r}_B - \\mathbf{r}_A = (a_1 + b_1 t)\\mathbf{i} + (a_2 + b_2 t)\\mathbf{j}$$, where the coefficients come from subtracting the position vectors.\n- Step 2: For a collision, both particles must be at the SAME point at the SAME time. This means BOTH the $$\\mathbf{i}$$-component and the $$\\mathbf{j}$$-component of $$\\mathbf{AB}$$ must be zero simultaneously.\n- Step 3: Set the i-component = 0 and solve for $$t$$. Set the j-component = 0 and solve for $$t$$. If both give the SAME value of $$t$$, the particles collide. If they give DIFFERENT values of $$t$$, there is no collision — the particles are at the same East-West position at one time and the same North-South position at a different time, but never both simultaneously.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "The displacement vector from A to B is $$\\mathbf{AB} = (10 - 24t)\\mathbf{i} + (12t - 15)\\mathbf{j}$$. Setting each component to zero gives $$t = \\frac{5}{12}$$ from the i-component and $$t = \\frac{5}{4}$$ from the j-component. What conclusion do you draw? (2 steps)", "answer": "- Step 1: Since $$\\frac{5}{12} \\neq \\frac{5}{4}$$, there is no single time at which both components are zero simultaneously. The particles do NOT collide.\n- Step 2: At $$t = \\frac{5}{12}$$, the particles have the same East-West position (same i-coordinate) but different North-South positions. At $$t = \\frac{5}{4}$$, they have the same North-South position but different East-West positions. They \"cross paths\" at different times — like two ships passing through the same longitude and latitude at different moments.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "To find the minimum distance between two moving particles with position vectors as functions of time, explain why we minimise $$|\\mathbf{AB}|^2$$ rather than $$|\\mathbf{AB}|$$. (2 steps)", "answer": "- Step 1: The distance $$|\\mathbf{AB}| = \\sqrt{(a+bt)^2 + (c+dt)^2}$$ involves a square root, which is messy to differentiate. Minimising the square root is equivalent to minimising the expression under the square root, since the square root function is monotonically increasing.\n- Step 2: So we minimise $$|\\mathbf{AB}|^2 = (a+bt)^2 + (c+dt)^2$$, which is a simple quadratic in $$t$$. Differentiate with respect to $$t$$ and set equal to zero: $$\\frac{d}{dt}|\\mathbf{AB}|^2 = 2b(a+bt) + 2d(c+dt) = 0$$. Solve for $$t$$, then substitute back to find the minimum distance.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "The squared distance between two particles is $$D^2 = (10-24t)^2 + (12t-15)^2$$. Explain the steps to find the time at which the distance is minimised. (3 steps)", "answer": "- Step 1: Differentiate $$D^2$$ with respect to $$t$$: $$\\frac{d(D^2)}{dt} = 2(-24)(10-24t) + 2(12)(12t-15) = -48(10-24t) + 24(12t-15)$$.\n- Step 2: Set the derivative to zero: $$-480 + 576t + 288t - 360 = 0$$, so $$864t = 840$$, giving $$t = \\frac{840}{864} = \\frac{35}{36}$$ hours.\n- Step 3: Substitute $$t = \\frac{35}{36}$$ back into the expression for $$D^2$$ to find the minimum squared distance, then take the square root for the minimum distance. This is the closest the two particles ever get to each other.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "Particle A (mass $$2m$$) is on a rough inclined plane at angle $$\\alpha$$ (where $$\\tan\\alpha = \\frac{5}{12}$$), connected by a light inextensible string over a smooth pulley to particle B (mass $$3m$$) hanging vertically. A moves UP the plane. In which direction does friction act on A, and why? (2 steps)", "answer": "- Step 1: Friction always opposes the motion (or tendency of motion) of the object. Since A moves UP the plane, friction acts DOWN the plane on A, opposing its upward motion.\n- Step 2: This is crucial for the force equation on A. When A moves up: the forces opposing motion are the component of weight down the slope ($$2mg\\sin\\alpha$$) AND friction down the slope ($$\\mu \\times 2mg\\cos\\alpha$$). The equation for A becomes: $$T - 2mg\\sin\\alpha - \\mu(2mg\\cos\\alpha) = 2ma$$.\n\nCommon error: Getting the friction direction wrong. If A slides up, friction is down. If A slides down, friction is up. Always ask: \"which way is the object moving?\" and then \"friction opposes that.\"", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "For the system in Q25, with $$\\tan\\alpha = \\frac{5}{12}$$, state the values of $$\\sin\\alpha$$ and $$\\cos\\alpha$$ and explain the 5-12-13 triangle method. (2 steps)", "answer": "- Step 1: If $$\\tan\\alpha = \\frac{5}{12}$$, draw a right triangle with opposite = 5, adjacent = 12. The hypotenuse = $$\\sqrt{5^2 + 12^2} = \\sqrt{169} = 13$$.\n- Step 2: Therefore $$\\sin\\alpha = \\frac{5}{13}$$ and $$\\cos\\alpha = \\frac{12}{13}$$. This 5-12-13 triangle is a Pythagorean triple that appears frequently in M1 exams. Always use this method when given $$\\tan\\alpha$$ as a fraction — never try to find $$\\alpha$$ and use a calculator, as the exact fractions are cleaner.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "For the system in Q25 with $$\\mu = \\frac{11}{36}$$, write the two F = ma equations and explain how to find the acceleration $$a$$ and tension $$T$$. (3 steps)", "answer": "- Step 1: For B (hanging, mass $$3m$$): $$3mg - T = 3ma$$ (weight drives B down, tension opposes).\n- Step 2: For A (on plane, mass $$2m$$, moving up): $$T - 2mg\\sin\\alpha - \\mu(2mg\\cos\\alpha) = 2ma$$. Substituting: $$T - 2mg \\times \\frac{5}{13} - \\frac{11}{36} \\times 2mg \\times \\frac{12}{13} = 2ma$$.\n- Step 3: Add the two equations to eliminate $$T$$: $$(3mg - T) + (T - \\frac{10mg}{13} - \\frac{264mg}{468}) = 3ma + 2ma$$. Simplify the left side to get the net driving force = $$5ma$$, then solve for $$a$$. Substitute $$a$$ back into either equation to find $$T$$.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "After the string in Q25 is cut, particle A is still on the rough inclined plane. Explain what happens to A's motion and how to find its deceleration. (3 steps)", "answer": "- Step 1: When the string is cut, tension $$T$$ disappears. The only forces on A are now: weight component down the slope ($$2mg\\sin\\alpha$$), friction, and normal reaction. Since A was moving up, it will decelerate (gravity and friction both act down the slope while A moves up).\n- Step 2: While A is still moving UP: $$-2mg\\sin\\alpha - \\mu(2mg\\cos\\alpha) = 2ma$$ (both forces oppose motion). This gives a large negative acceleration (deceleration).\n- Step 3: Eventually A comes to rest. Then check: is $$2mg\\sin\\alpha > \\mu(2mg\\cos\\alpha)$$? If yes (i.e., $$\\tan\\alpha > \\mu$$), A will start sliding back DOWN, and friction now acts UP the slope. The acceleration down the slope would be $$g\\sin\\alpha - \\mu g\\cos\\alpha$$.\n\nKey insight: Friction direction depends on the direction of motion, which can change after the string is cut.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "A particle on a rough inclined plane (angle $$\\alpha$$, coefficient $$\\mu$$) slides DOWN the plane. Derive the expression for its acceleration and explain each term. (3 steps)", "answer": "- Step 1: The component of weight parallel to the slope (downward) is $$mg\\sin\\alpha$$. This drives the particle down the slope.\n- Step 2: Friction opposes the motion, so it acts UP the slope. The friction force is $$\\mu N = \\mu mg\\cos\\alpha$$ (where $$N = mg\\cos\\alpha$$ is the normal reaction on a slope with no other vertical forces).\n- Step 3: By F = ma along the slope (taking down-slope as positive): $$mg\\sin\\alpha - \\mu mg\\cos\\alpha = ma$$, so $$a = g\\sin\\alpha - \\mu g\\cos\\alpha = g(\\sin\\alpha - \\mu\\cos\\alpha)$$. The particle accelerates down only if $$\\sin\\alpha > \\mu\\cos\\alpha$$, i.e., $$\\tan\\alpha > \\mu$$.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": true}, {"question": "A particle hangs in equilibrium supported by two strings at angles. One string makes angle $$\\theta$$ with the horizontal where $$\\cos\\theta = \\frac{4}{5}$$. If the horizontal component of tension in this string is 2 N, find the total tension in this string. (2 steps)", "answer": "- Step 1: The horizontal component of tension is $$T\\cos\\theta = 2$$. Given $$\\cos\\theta = \\frac{4}{5}$$, we have $$T \\times \\frac{4}{5} = 2$$.\n- Step 2: Therefore $$T = 2 \\times \\frac{5}{4} = 2.5$$ N. The total tension is 2.5 N, of which 2 N is horizontal and the vertical component is $$2.5 \\times \\frac{3}{5} = 1.5$$ N.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "Two objects A and B collide head-on. A was moving right, B was moving left (towards A). After the collision, A continues moving right but slower. What can you deduce about B's direction after the collision? (2 steps)", "answer": "- Step 1: Since A continues moving right (same direction) but slower, A has transferred some rightward momentum to B. By Newton's 3rd Law, B experienced a force to the right during the collision.\n- Step 2: Therefore B must now be moving to the RIGHT (or at least has been pushed rightward). B was originally moving left, so B has reversed direction. The key physical insight: if A continues in the same direction, B must be pushed in A's original direction — they cannot pass through each other.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "In a collision problem, object A (mass $$m$$) moves at speed $$u$$ and object B (mass $$3m$$) moves at speed $$v$$ in the opposite direction. Explain how to set up the conservation of momentum equation with correct signs. (3 steps)", "answer": "- Step 1: Choose a positive direction (e.g., rightward = A's original direction). Then A's initial velocity is $$+u$$ and B's initial velocity is $$-v$$ (since B moves in the opposite direction).\n- Step 2: Conservation of momentum: $$m(u) + 3m(-v) = m v_A + 3m v_B$$, where $$v_A$$ and $$v_B$$ are the final velocities (with signs determined by their directions).\n- Step 3: The key rule: if objects were approaching each other before the collision, they must be separating after the collision (or at most moving together). So $$v_A$$ and $$v_B$$ cannot have the wrong relative signs. If both are positive, A is still moving right and B has reversed to also move right — they are separating, which is physically valid.\n\nCommon error: Forgetting to make one velocity negative when objects approach each other, leading to incorrect momentum calculations.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "An acceleration-time graph shows acceleration changing at $$t = 4$$ s. Explain why you cannot use a single SUVAT equation for the entire motion, and what method you must use instead. (3 steps)", "answer": "- Step 1: SUVAT equations assume CONSTANT acceleration throughout the interval. If acceleration changes (e.g., at $$t = 4$$ s), no single SUVAT equation can describe the full motion from $$t = 0$$ to the end.\n- Step 2: Instead, use the area under the a-t graph. The area under the acceleration-time graph between two times gives the change in velocity: $$\\Delta v = \\int a\\,dt = \\text{area under } a\\text{-}t \\text{ graph}$$.\n- Step 3: Split the motion into regions where acceleration is constant (or where the area is easy to calculate). For each region, find the area to get the velocity change, then accumulate to find velocity at any time. For displacement, you would need the area under the v-t graph (which you construct first).\n\nKey rule: Area under a-t graph = change in velocity. Area under v-t graph = change in displacement.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "An a-t graph has acceleration = $$-0.5$$ m/s² for the first 4 seconds, then changes. If the initial velocity is 12 m/s, find the velocity at $$t = 4$$ s using the area method. (2 steps)", "answer": "- Step 1: The area under the a-t graph from $$t = 0$$ to $$t = 4$$ is a rectangle: $$\\text{area} = -0.5 \\times 4 = -2$$ m/s. This is the change in velocity.\n- Step 2: Since $$\\Delta v = -2$$, the velocity at $$t = 4$$ is $$v = 12 + (-2) = 10$$ m/s. The negative acceleration reduced the velocity by 2 m/s over 4 seconds.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "For uniform acceleration, a car travels 400 m in 20 seconds, reaching a speed of 28 m/s. Find the initial speed using SUVAT. (2 steps)", "answer": "- Step 1: Use $$s = \\frac{1}{2}(u+v)t$$, which is valid for constant acceleration. Substitute: $$400 = \\frac{1}{2}(u + 28) \\times 20$$.\n- Step 2: Simplify: $$400 = 10(u + 28)$$, so $$u + 28 = 40$$, giving $$u = 12$$ m/s. The car started at 12 m/s and accelerated to 28 m/s over 20 seconds.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "Two forces $$\\mathbf{F}_1 = 6\\mathbf{i} + 8\\mathbf{j}$$ N and $$\\mathbf{F}_2 = -14\\mathbf{i} + 7\\mathbf{j}$$ N act on a particle. Find the resultant force and its magnitude. (2 steps)", "answer": "- Step 1: Resultant = $$\\mathbf{F}_1 + \\mathbf{F}_2 = (6 - 14)\\mathbf{i} + (8 + 7)\\mathbf{j} = -8\\mathbf{i} + 15\\mathbf{j}$$ N.\n- Step 2: Magnitude = $$\\sqrt{(-8)^2 + 15^2} = \\sqrt{64 + 225} = \\sqrt{289} = 17$$ N. The resultant is 17 N in the second quadrant (negative i, positive j).", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "The resultant force on a particle is $$-8\\mathbf{i} + 15\\mathbf{j}$$ N. Find the angle this resultant makes with the positive i-direction, and explain why it is in the second quadrant. (3 steps)", "answer": "- Step 1: The angle with the i-axis satisfies $$\\tan\\alpha = \\frac{15}{|-8|} = \\frac{15}{8}$$. But we must check the quadrant: the i-component is negative and the j-component is positive, placing the vector in the second quadrant.\n- Step 2: The reference angle is $$\\arctan\\left(\\frac{15}{8}\\right) \\approx 61.9°$$. Since the vector is in the second quadrant, the angle measured anticlockwise from the positive i-axis is $$180° - 61.9° \\approx 118.1°$$.\n- Step 3: Common error: computing $$\\arctan\\left(\\frac{15}{-8}\\right)$$ on a calculator, which may give a negative angle or fourth-quadrant angle. Always check the signs of both components to determine the correct quadrant.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "A non-uniform rod of weight $$W$$ rests horizontally on two supports. To find the position of the centre of mass, explain the strategy of taking moments about different points. (3 steps)", "answer": "- Step 1: First, use vertical equilibrium ($$\\Sigma F_y = 0$$) to find the reaction forces at the supports if needed. The sum of both reactions equals the total weight (plus any additional masses).\n- Step 2: Take moments about one support to find the reaction at the other support (or vice versa). This eliminates one unknown from the equation.\n- Step 3: To find the centre of mass position, take moments about a convenient point. The weight of the rod acts at its centre of mass (unknown distance from one end). Set up the moments equation: sum of clockwise moments = sum of anticlockwise moments. Solve for the unknown distance.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": true}, {"question": "When writing a moments equation for a rod in equilibrium, a student gets $$-24x + 72 - 8x - 16 = 0$$ and simplifies to $$-24x + 56 = 0$$. Verify this simplification and find $$x$$. (2 steps)", "answer": "- Step 1: Collect the $$x$$-terms and constant terms separately. The $$x$$-terms: $$-24x - 8x = -32x$$. The constant terms: $$72 - 16 = 56$$. Wait — the notes say the correct collection gives $$-24x + 56 = 0$$, implying the $$-8x$$ term was not present or was grouped differently. Let me re-examine: if the equation is $$-24x + 72 - 8x - 16 = 0$$, collecting properly: $$(-24x - 8x) + (72 - 16) = -32x + 56 = 0$$, giving $$x = \\frac{56}{32} = \\frac{7}{4}$$. But the notes say the answer is $$x = \\frac{7}{3}$$, suggesting the original equation was different.\n- Step 2: The key lesson from the error: collect like terms very carefully. Sign errors in moment equations are extremely common. Write each moment term on a separate line with its sign, then add. Double-check: is each term clockwise (positive) or anticlockwise (negative)?\n\nThe critical takeaway: sign errors in moments are the most common mistake. Always verify each term's sign independently.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "A ball is thrown vertically downward with speed 24 m/s from a height of 2.5 m. Find the speed at the bottom using SUVAT, carefully handling the sign of $$g$$. (3 steps)", "answer": "- Step 1: Take downward as positive. Then $$u = +24$$ m/s, $$a = +g = +9.8$$ m/s², $$s = +2.5$$ m. We want $$v$$.\n- Step 2: Use $$v^2 = u^2 + 2as = 24^2 + 2(9.8)(2.5) = 576 + 49 = 625$$.\n- Step 3: $$v = \\sqrt{625} = 25$$ m/s (taking the positive root since the ball is moving downward). The ball gains 1 m/s from the 2.5 m fall, from 24 to 25 m/s.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "A ball is projected vertically upward from the ground and passes a point 10 m above the ground at two different times. Explain why there are two times and how to find both. (3 steps)", "answer": "- Step 1: The ball goes up past 10 m (first time), reaches its maximum height, then comes back down past 10 m (second time). Both are valid solutions to the SUVAT equation.\n- Step 2: Using $$s = ut + \\frac{1}{2}at^2$$ with $$s = 10$$, $$u$$ = initial upward speed, $$a = -g$$: $$10 = ut - 4.9t^2$$, or $$4.9t^2 - ut + 10 = 0$$. This is a quadratic in $$t$$.\n- Step 3: The quadratic has two positive roots (discriminant > 0, and both roots positive since the ball passes 10 m going up and coming down). Solve using the quadratic formula to get both times.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "A velocity vector is given by $$\\mathbf{v} = (5 - 5\\lambda)\\mathbf{i} + (-8 + 10\\lambda)\\mathbf{j}$$ for parameter $$\\lambda$$. Explain the method to find the minimum speed of the particle. (3 steps)", "answer": "- Step 1: Speed = $$|\\mathbf{v}| = \\sqrt{(5-5\\lambda)^2 + (-8+10\\lambda)^2}$$. To minimise, minimise $$|\\mathbf{v}|^2 = (5-5\\lambda)^2 + (-8+10\\lambda)^2$$.\n- Step 2: Expand: $$|\\mathbf{v}|^2 = 25 - 50\\lambda + 25\\lambda^2 + 64 - 160\\lambda + 100\\lambda^2 = 125\\lambda^2 - 210\\lambda + 89$$. Differentiate with respect to $$\\lambda$$: $$\\frac{d|\\mathbf{v}|^2}{d\\lambda} = 250\\lambda - 210 = 0$$, so $$\\lambda = \\frac{210}{250} = \\frac{21}{25}$$.\n- Step 3: Substitute $$\\lambda = \\frac{21}{25}$$ back into $$|\\mathbf{v}|^2$$: $$125\\left(\\frac{21}{25}\\right)^2 - 210\\left(\\frac{21}{25}\\right) + 89$$. Since this is a minimum (second derivative = 250 > 0), the minimum speed is $$\\sqrt{|\\mathbf{v}|^2_{\\min}}$$.\n\nKey insight: Minimising the square of the magnitude avoids square roots and gives the same answer.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "A rod is in equilibrium with a force applied at an angle. The component of tension along the rod is greater than the component of weight along the rod. In which direction must friction act? Explain why. (2 steps)", "answer": "- Step 1: If the tension component along the rod (up the rod) exceeds the weight component along the rod (down the rod), there is a net force up the rod. The rod would accelerate up without friction.\n- Step 2: For equilibrium, friction must oppose this net tendency. So friction acts DOWN the rod (opposing the upward pull of tension). The rule: friction always acts to oppose the direction the object would move if the surface were smooth.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "A particle of mass $$m$$ falls from rest through a distance of 1.5 m and then hits the ground, decelerating to rest. Explain how to find the normal reaction force during the deceleration phase. (3 steps)", "answer": "- Step 1: First, find the speed just before impact using $$v^2 = u^2 + 2as = 0 + 2g(1.5) = 3g$$. So the impact speed is $$v = \\sqrt{3g}$$.\n- Step 2: During deceleration on the ground, the particle goes from speed $$\\sqrt{3g}$$ to 0 over some distance. Find the deceleration $$a$$ using $$v^2 = u^2 + 2as$$ with the given stopping distance, or use the given information to find $$a$$.\n- Step 3: During deceleration, the normal reaction $$N$$ and weight $$mg$$ both act. Taking upward as positive: $$N - mg = ma$$ (where $$a$$ is the upward deceleration). So $$N = m(g + a)$$. The normal reaction is GREATER than $$mg$$ because the ground must not only support the weight but also decelerate the object.\n\nNote: If the object is decelerating while moving downward, the acceleration is upward, so $$N = m(g + a)$$ where $$a$$ is the magnitude of deceleration. If the question states the deceleration differently, adjust signs accordingly.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "A car and a motorbike travel along the same road. The car moves at constant speed; the motorbike starts from rest and accelerates uniformly. Explain the condition for the motorbike to overtake the car and how to set up the equation. (3 steps)", "answer": "- Step 1: Overtaking means the motorbike has travelled the same distance as the car (assuming they start from the same point or you account for any head start). At the overtaking moment, their displacements are equal.\n- Step 2: Car distance = constant speed × time = $$v_c \\times T$$. Motorbike distance = area under its v-t graph = $$\\frac{1}{2} \\times a_m \\times T^2$$ (uniform acceleration from rest).\n- Step 3: Set the distances equal: $$v_c T = \\frac{1}{2} a_m T^2$$. Solve for $$T$$ (there will be two solutions: $$T = 0$$, the trivial start, and the overtaking time). If the v-t graph is more complex (e.g., the motorbike has different acceleration phases), calculate the area for each phase separately.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "A block of weight $$W$$ rests on a rough horizontal surface. A force $$P$$ is applied at angle $$\\theta$$ to the horizontal (pulling up and to the right), where $$\\cos\\theta = \\frac{4}{5}$$ and $$\\sin\\theta = \\frac{3}{5}$$. The coefficient of friction is $$\\mu = \\frac{1}{4}$$. Derive the maximum value of $$P$$ before the block slips. (3 steps)", "answer": "- Step 1: Resolve vertically: $$R + P\\sin\\theta = W$$, so $$R = W - \\frac{3P}{5}$$. The normal reaction decreases as $$P$$ increases because the vertical component of $$P$$ lifts the block.\n- Step 2: At the point of slipping, friction is limiting: $$F = \\mu R = \\frac{1}{4}\\left(W - \\frac{3P}{5}\\right)$$. Resolve horizontally: $$P\\cos\\theta = F$$, so $$\\frac{4P}{5} = \\frac{1}{4}\\left(W - \\frac{3P}{5}\\right)$$.\n- Step 3: Solve: $$\\frac{4P}{5} = \\frac{W}{4} - \\frac{3P}{20}$$. Multiply by 20: $$16P = 5W - 3P$$, so $$19P = 5W$$, giving $$P = \\frac{5W}{19}$$. Wait — the notes say $$P \\leq \\frac{5W}{7}$$, which suggests different values of $$\\cos\\theta$$ and $$\\sin\\theta$$. The method is the same regardless: resolve in both directions, use $$F = \\mu R$$ at limiting friction, and solve for the maximum $$P$$.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "A car tows a trailer on a rough inclined road. The tow bar breaks while the system is moving at 12 m/s. Explain what forces now act on the trailer and how to find its deceleration. (3 steps)", "answer": "- Step 1: After the tow bar breaks, the tension in the tow bar becomes zero. The trailer is now a free body subject only to: its weight (with a component down the slope), the normal reaction, and friction.\n- Step 2: If the trailer is moving up the slope: friction acts DOWN the slope (opposing motion). The total decelerating force = weight component down slope + friction down slope. If moving on the level: only friction decelerates the trailer.\n- Step 3: Use F = ma for the trailer alone: net force = mass × deceleration. With the net decelerating force and the trailer's mass, find $$a$$. Then use SUVAT with $$u = 12$$ m/s and $$v = 0$$ to find the stopping distance.\n\nCommon error: Forgetting to include BOTH friction and the weight component on an inclined road after the tow bar breaks.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "When a rod is on the point of tilting about a support, what happens to the reaction force at the other support? Explain why this is useful. (2 steps)", "answer": "- Step 1: When the rod is about to tilt about support C, it is on the verge of rotating about C. The other support (say D) is about to lose contact, meaning the reaction at D is zero.\n- Step 2: This is extremely useful because it eliminates an unknown. When you take moments about C, you don't need the reaction at D (it's zero), and you don't need the reaction at C (its moment about C is zero). You can solve for the remaining unknown directly.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "A particle P collides with a fixed peg and rebounds. The impulse on the peg is asked for. Explain how to find it using Newton's 3rd Law. (2 steps)", "answer": "- Step 1: The impulse on the peg equals the change in momentum of the peg. But the peg is fixed, so its change in momentum appears to be zero. However, by Newton's 3rd Law, the impulse on the peg is equal and opposite to the impulse on the particle.\n- Step 2: So: Impulse on peg = −(Impulse on particle) = −($$mv - mu$$) = $$mu - mv$$, where $$u$$ and $$v$$ are the particle's velocities before and after collision. If the particle was moving toward the peg at speed $$u$$ and rebounds at speed $$v$$, the impulse on the peg is $$m(u + v)$$ (taking the original direction as positive, the rebound makes $$v$$ negative, so $$mu - m(-v) = m(u + v)$$).", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "After a collision, a peg moves into a surface and decelerates. The peg has initial speed 9 m/s after the collision and decelerates uniformly. Explain how to find the distance it travels before stopping. (2 steps)", "answer": "- Step 1: Use $$v^2 = u^2 + 2as$$ with $$v = 0$$ (comes to rest), $$u = 9$$ m/s, and $$a$$ = the deceleration (a negative value). If the deceleration is given or can be found from the net force and mass, substitute it in.\n- Step 2: $$0 = 81 + 2as$$, so $$s = \\frac{-81}{2a}$$. Since $$a$$ is negative (deceleration), $$s$$ is positive. The peg travels this distance before stopping.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "A ship moves on bearing 225°. Describe this direction in compass terms and explain what it means for the i and j components of its displacement vector. (2 steps)", "answer": "- Step 1: Bearing 225° is measured clockwise from North: 180° (South) + 45° more = Southwest. It is exactly 45° south of west (or 45° west of south). This is the SW direction.\n- Step 2: At 45° SW, the i-component (East) is negative and the j-component (North) is negative, and they have EQUAL magnitude: $$|\\Delta i| = |\\Delta j|$$. So if the displacement vector is $$\\mathbf{d} = a\\mathbf{i} + b\\mathbf{j}$$, then $$a = b$$ and both are negative. This equality is the key to solving problems where the bearing is 225°.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "Two ships A and B have position vectors as functions of time. The bearing of B from A at a particular instant is 225°. Explain how to use this information to find the time at which this occurs. (3 steps)", "answer": "- Step 1: Form the displacement vector $$\\mathbf{AB} = \\mathbf{r}_B - \\mathbf{r}_A = (a_1 + b_1 t)\\mathbf{i} + (a_2 + b_2 t)\\mathbf{j}$$.\n- Step 2: Bearing 225° means the direction is SW, so both components are negative and have equal magnitude: $$a_1 + b_1 t = a_2 + b_2 t$$ (with both being negative, but the equality of magnitudes gives $$|a_1 + b_1 t| = |a_2 + b_2 t|$$).\n- Step 3: Since both are negative: $$-(a_1 + b_1 t) = -(a_2 + b_2 t)$$, or equivalently $$a_1 + b_1 t = a_2 + b_2 t$$. Solve for $$t$$. Then substitute back to find the distance $$|\\mathbf{AB}|$$ at that time.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": false}, {"question": "A smooth pulley has a light inextensible string over it with masses on both sides. Prove that the tension is the same on both sides of the pulley. (3 steps)", "answer": "- Step 1: Consider a small element of the string in contact with the pulley. If the pulley is smooth, there is no friction between the string and pulley. This means no tangential force is needed to move the string over the pulley.\n- Step 2: For a light string (mass zero), the net force on any segment must be zero (otherwise $$F = ma$$ with $$m = 0$$ would give infinite acceleration). So the tension pulling from one side must equal the tension pulling from the other side.\n- Step 3: Therefore, $$T_1 = T_2$$ on both sides. If the pulley were rough, or the string had mass, the tensions could differ. But for a light string over a smooth pulley, tension is uniform throughout.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": true}, {"question": "A particle of mass $$m$$ is in limiting equilibrium on a rough inclined plane at angle $$\\alpha$$. Derive the relationship between $$\\mu$$ and $$\\alpha$$. (3 steps)", "answer": "- Step 1: Limiting equilibrium means the particle is on the point of sliding but is still stationary. The friction force is at its maximum: $$F = \\mu R$$.\n- Step 2: Resolve perpendicular to the plane: $$R = mg\\cos\\alpha$$. Resolve along the plane (equilibrium, so net force = 0): $$mg\\sin\\alpha = F = \\mu R = \\mu mg\\cos\\alpha$$.\n- Step 3: Cancel $$mg$$: $$\\sin\\alpha = \\mu\\cos\\alpha$$, so $$\\mu = \\tan\\alpha$$. This is the angle of friction relationship: if $$\\mu = \\tan\\alpha$$, the particle is in limiting equilibrium. If $$\\mu > \\tan\\alpha$$, it stays put. If $$\\mu < \\tan\\alpha$$, it slides.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": true}, {"question": "A velocity vector is $$\\mathbf{v} = (3 + 2t)\\mathbf{i} + (4 - t)\\mathbf{j}$$ m/s. Explain how to find the speed of the particle at time $$t$$ and how to find the minimum speed. (3 steps)", "answer": "- Step 1: Speed = $$|\\mathbf{v}| = \\sqrt{(3+2t)^2 + (4-t)^2}$$. At any specific time, substitute $$t$$ and compute.\n- Step 2: To find the minimum speed, minimise $$|\\mathbf{v}|^2 = (3+2t)^2 + (4-t)^2 = 9 + 12t + 4t^2 + 16 - 8t + t^2 = 5t^2 + 4t + 25$$.\n- Step 3: Differentiate: $$\\frac{d|\\mathbf{v}|^2}{dt} = 10t + 4 = 0$$, so $$t = -0.4$$ s. This is before $$t = 0$$, so the minimum within the physical time domain would be at $$t = 0$$ (if $$t \\geq 0$$). Always check whether the critical point is in the valid time range.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}, {"question": "A car travels at constant speed $$v_c$$ for time $$T$$. A motorbike starts from rest at the same point with uniform acceleration $$a_m$$. At what time does the motorbike catch the car, assuming $$T$$ is the total time? (2 steps)", "answer": "- Step 1: Distance travelled by car = $$v_c \\cdot t$$. Distance travelled by motorbike = $$\\frac{1}{2}a_m t^2$$. For the motorbike to catch the car: $$\\frac{1}{2}a_m t^2 = v_c \\cdot t$$.\n- Step 2: Dividing by $$t$$ (since $$t \\neq 0$$): $$\\frac{1}{2}a_m t = v_c$$, so $$t = \\frac{2v_c}{a_m}$$. This is the overtaking time. The motorbike's speed at this instant is $$a_m \\times t = 2v_c$$ — exactly twice the car's speed.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}, {"question": "In a connected particles problem over a pulley, the whole-system equation is $$(m_B - m_A)g = (m_A + m_B)a$$. Explain the physical meaning of each part of this equation. (2 steps)", "answer": "- Step 1: The left side $$(m_B - m_A)g$$ is the net driving force — the difference in weights. If B is heavier, the net force pulls B down and A up. This is the only external force causing the system to accelerate (tension is internal and cancels).\n- Step 2: The right side $$(m_A + m_B)a$$ is the total mass times acceleration. Newton's 2nd Law for the whole system: net external force = total mass × acceleration. This equation only works for finding $$a$$; to find $$T$$, you must use an individual particle's equation.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": true}, {"question": "A ball is thrown vertically upward with initial speed $$u$$ from a height above the ground. It reaches the ground with speed $$V$$ after total time $$T$$. If the ball passes a certain height twice, explain how to determine the total time of flight. (2 steps)", "answer": "- Step 1: Taking upward as positive, the ball's displacement from launch is $$s = ut - \\frac{1}{2}gt^2$$. When it reaches the ground, $$s = -h$$ (below the launch point), giving $$-h = uT - \\frac{1}{2}gT^2$$.\n- Step 2: Solve this quadratic for $$T$$, taking the positive root (the later time). Alternatively, use $$V^2 = u^2 + 2g \\times h$$ (where $$h$$ is the total distance fallen from the top, including the height gained and the drop to the ground) and $$V = u + gT$$ (taking downward as positive throughout).", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": false}, {"question": "When resolving forces on an inclined plane, explain why the normal reaction is $$R = mg\\cos\\alpha$$ and NOT $$mg$$, even though the plane is supporting the object. (2 steps)", "answer": "- Step 1: On a flat surface, the plane supports the full weight, so $$R = mg$$. On an inclined plane, only the component of weight perpendicular to the surface presses into the surface. This component is $$mg\\cos\\alpha$$.\n- Step 2: The other component, $$mg\\sin\\alpha$$, is parallel to the surface and causes the object to slide down (if unopposed). The normal reaction only balances the perpendicular component, so $$R = mg\\cos\\alpha$$. Think of it this way: on a steeper slope, less of the weight pushes into the surface, so $$R$$ is smaller.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": true}, {"question": "A force $$\\mathbf{F}_3 = c\\mathbf{i} + 2\\mathbf{j}$$ N is added to the system from Q36 (resultant was $$-8\\mathbf{i} + 15\\mathbf{j}$$). The new resultant is $$k\\mathbf{j}$$ (purely vertical). Find $$c$$ and explain the method. (2 steps)", "answer": "- Step 1: New resultant = $$(-8 + c)\\mathbf{i} + (15 + 2)\\mathbf{j} = (-8 + c)\\mathbf{i} + 17\\mathbf{j}$$. For this to be purely vertical (no i-component): $$-8 + c = 0$$, so $$c = 8$$.\n- Step 2: The new resultant is $$17\\mathbf{j}$$ N — a purely upward force of 17 N. The method: add the new force component-wise, then set the unwanted component to zero and solve for the unknown.", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": false}, {"question": "Explain the difference between \"impulse\" and \"momentum\" and how they are related. Give the equation and its meaning. (2 steps)", "answer": "- Step 1: Momentum of a particle = mass × velocity = $$mv$$ (a vector quantity). It describes how much \"motion\" the particle has. Impulse = change in momentum = $$mv - mu = \\Delta(mv)$$. It describes the effect of a force acting over a time interval.\n- Step 2: The relationship is: Impulse = Force × time = $$Ft = \\Delta(mv)$$. A large force acting for a short time can produce the same impulse as a small force acting for a long time. In M1, impulse is typically calculated as the change in momentum, not from $$Ft$$ directly.", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": true}, {"question": "A ball of mass 0.2 kg hits a wall at 9 m/s and rebounds at 5 m/s. Calculate the impulse on the ball, carefully handling signs. (3 steps)", "answer": "- Step 1: Take the initial direction (toward the wall) as positive. Initial momentum = $$0.2 \\times 9 = 1.8$$ kg m/s. Final momentum = $$0.2 \\times (-5) = -1.0$$ kg m/s (negative because it rebounds).\n- Step 2: Impulse on ball = change in momentum = $$-1.0 - 1.8 = -2.8$$ Ns. The negative sign means the impulse is in the opposite direction to the initial motion (the wall pushed the ball back).\n- Step 3: By Newton's 3rd Law, the impulse on the wall is $$+2.8$$ Ns (in the original direction of the ball). The magnitude of the impulse is 2.8 Ns for both.", "source": "GLM 5.1 ①", "_id": "glm_1_60", "judge_pick": false}, {"question": "A particle is attached to a light inextensible string which passes over a smooth fixed pulley. The string is initially slack. When the string becomes taut, explain why this is like a perfectly inelastic collision and why kinetic energy is NOT conserved. (3 steps)", "answer": "- Step 1: When the string becomes taut, both particles suddenly move at the same speed (because the string is inextensible). This is exactly like a perfectly inelastic collision where two objects stick together and share a common velocity.\n- Step 2: Momentum IS conserved (no external horizontal/vertical forces in the direction of motion). But kinetic energy is NOT conserved because some energy is converted to heat/sound/deformation when the string jerks taut — just like in a real inelastic collision.\n- Step 3: You can verify: KE before = $$\\frac{1}{2}mU^2$$, KE after = $$\\frac{1}{2}(4m)\\left(\\frac{U}{4}\\right)^2 = \\frac{mU^2}{8}$$. The KE has decreased from $$\\frac{mU^2}{2}$$ to $$\\frac{mU^2}{8}$$ — a significant loss. This is why you must use conservation of momentum, not conservation of energy, for \"string becomes taut\" problems.", "source": "GLM 5.1 ①", "_id": "glm_1_61", "judge_pick": true}, {"question": "A particle slides down a rough inclined plane (angle $$\\alpha$$, coefficient of friction $$\\mu$$). The particle is initially moving up the plane. Describe how the acceleration changes from the upward phase to the downward phase. (3 steps)", "answer": "- Step 1: While moving UP: both the weight component ($$mg\\sin\\alpha$$) and friction ($$\\mu mg\\cos\\alpha$$) act DOWN the slope. The deceleration is $$a_{up} = -g\\sin\\alpha - \\mu g\\cos\\alpha$$ (large deceleration).\n- Step 2: When the particle comes to rest momentarily, check if it slides back. It will slide back if $$mg\\sin\\alpha > \\mu mg\\cos\\alpha$$, i.e., $$\\tan\\alpha > \\mu$$. If $$\\tan\\alpha \\leq \\mu$$, the particle remains at rest (friction is sufficient to hold it).\n- Step 3: While sliding DOWN: the weight component acts down the slope but friction now acts UP the slope (opposing the downward motion). The acceleration is $$a_{down} = g\\sin\\alpha - \\mu g\\cos\\alpha$$ (smaller acceleration than the deceleration was). The magnitude of deceleration going up is GREATER than the magnitude of acceleration going down, because friction assists deceleration going up but opposes acceleration going down.", "source": "GLM 5.1 ①", "_id": "glm_1_62", "judge_pick": true}, {"question": "A non-uniform rod AB of length 6 m has its centre of mass at distance $$x$$ from A. It rests horizontally on a support at A and a support at distance 4 m from A. The reaction at A is 8 N. Explain how to find $$x$$. (3 steps)", "answer": "- Step 1: Take moments about the support at 4 m from A. This eliminates the reaction at that support from the equation. The forces creating moments about this point are: the weight of the rod (acting at distance $$x - 4$$ from this point, if $$x > 4$$, or $$4 - x$$ if $$x < 4$$) and the reaction at A (acting at distance 4 m from this point).\n- Step 2: The moment of the 8 N reaction at A about the 4 m point is $$8 \\times 4 = 32$$ Nm (check direction: if A is to the left, the upward reaction at A creates an anticlockwise moment about the 4 m point). The weight creates a clockwise moment about the 4 m point.\n- Step 3: Setting clockwise = anticlockwise: $$W(x - 4) = 32$$ (if the centre of mass is to the right of the 4 m support). Solve for $$x$$ given the weight $$W$$. If the centre of mass is to the left of the 4 m support, the signs reverse. Always check the geometry carefully.", "source": "GLM 5.1 ①", "_id": "glm_1_63", "judge_pick": true}, {"question": "When a particle is at rest on a rough surface and a force is applied, explain the difference between static friction and limiting friction. When do you use $$F = \\mu R$$? (2 steps)", "answer": "- Step 1: Static friction is whatever force is needed to keep the particle in equilibrium, up to a maximum. If the applied force is small, friction matches it exactly and the particle doesn't move. Static friction can be ANY value from 0 up to $$\\mu R$$.\n- Step 2: Limiting friction ($$F = \\mu R$$) is the MAXIMUM static friction, reached when the particle is on the point of sliding. You only use $$F = \\mu R$$ when: (a) the particle is moving (kinetic friction = limiting friction in M1), or (b) the particle is on the point of moving (limiting equilibrium). If the particle is stationary and NOT about to slide, friction is LESS than $$\\mu R$$ and you find it from equilibrium equations.", "source": "GLM 5.1 ①", "_id": "glm_1_64", "judge_pick": true}, {"question": "A position vector is given by $$\\mathbf{r} = (2 + 3t)\\mathbf{i} + (5 - t)\\mathbf{j}$$. Explain how to find the velocity vector and the speed at time $$t$$. (2 steps)", "answer": "- Step 1: Velocity is the derivative of position with respect to time: $$\\mathbf{v} = \\frac{d\\mathbf{r}}{dt} = 3\\mathbf{i} - \\mathbf{j}$$ m/s. The velocity is constant (doesn't depend on $$t$$), meaning the particle moves with constant speed in a fixed direction.\n- Step 2: Speed = $$|\\mathbf{v}| = \\sqrt{3^2 + (-1)^2} = \\sqrt{10}$$ m/s. This is constant for all time. If the velocity depended on $$t$$, the speed would change and you would evaluate it at the specific time required.", "source": "GLM 5.1 ①", "_id": "glm_1_65", "judge_pick": false}, {"question": "In a speed-time graph problem, what does the area under the graph represent, and what does the gradient represent? Give a practical example of each. (2 steps)", "answer": "- Step 1: The area under a speed-time graph represents DISPLACEMENT (distance from the start, taking direction into account). For example, if a car travels at 20 m/s for 10 s, the area is $$20 \\times 10 = 200$$ m — the distance travelled.\n- Step 2: The gradient of a speed-time graph represents ACCELERATION. A positive gradient means speeding up; a negative gradient means slowing down; a zero gradient means constant speed. For example, if the speed increases from 0 to 30 m/s in 6 s, the gradient is $$\\frac{30}{6} = 5$$ m/s².", "source": "GLM 5.1 ①", "_id": "glm_1_66", "judge_pick": false}, {"question": "A particle of mass 0.45 kg is moving with velocity $$(3\\mathbf{i} - 2\\mathbf{j})$$ m/s when it receives an impulse $$(0.9\\mathbf{i} + 1.8\\mathbf{j})$$ Ns. Find the new velocity. (3 steps)", "answer": "- Step 1: Impulse = change in momentum = $$m\\mathbf{v} - m\\mathbf{u}$$. So $$m\\mathbf{v} = m\\mathbf{u} + \\text{Impulse}$$.\n- Step 2: Initial momentum = $$0.45(3\\mathbf{i} - 2\\mathbf{j}) = 1.35\\mathbf{i} - 0.9\\mathbf{j}$$ kg m/s. Add impulse: $$(1.35 + 0.9)\\mathbf{i} + (-0.9 + 1.8)\\mathbf{j} = 2.25\\mathbf{i} + 0.9\\mathbf{j}$$ kg m/s.\n- Step 3: New velocity = $$\\frac{2.25\\mathbf{i} + 0.9\\mathbf{j}}{0.45} = 5\\mathbf{i} + 2\\mathbf{j}$$ m/s. The impulse changed both the i and j components of the velocity.", "source": "GLM 5.1 ①", "_id": "glm_1_67", "judge_pick": false}, {"question": "When solving a connected particles problem with a pulley, a student writes one equation: $$(m_2 - m_1)g = (m_1 + m_2)a$$. This gives the correct acceleration. Why is this equation valid, and what are its limitations? (2 steps)", "answer": "- Step 1: This equation is valid because it applies Newton's 2nd Law to the entire system. The net external force (difference in weights) equals the total mass times acceleration. The tension is an internal force and cancels out (it pulls one mass up and the other down by the same amount).\n- Step 2: The limitation is that this equation alone cannot find the tension $$T$$. Since $$T$$ is internal, it doesn't appear in the whole-system equation. To find $$T$$, you MUST write a separate F = ma equation for one of the individual particles, substitute the known acceleration, and solve for $$T$$.", "source": "GLM 5.1 ①", "_id": "glm_1_68", "judge_pick": true}, {"question": "A uniform beam of length 5 m and mass 40 kg is supported at both ends. A mass of 60 kg is placed 2 m from end A. Find the reaction at each support. (3 steps)", "answer": "- Step 1: Total downward force = $$40g + 60g = 100g$$. By vertical equilibrium: $$R_A + R_B = 100g$$.\n- Step 2: Take moments about A: $$R_B \\times 5 = 40g \\times 2.5 + 60g \\times 2 = 100g + 120g = 220g$$. So $$R_B = \\frac{220g}{5} = 44g$$ N.\n- Step 3: $$R_A = 100g - 44g = 56g$$ N. Check by taking moments about B: $$R_A \\times 5 = 40g \\times 2.5 + 60g \\times 3 = 100g + 180g = 280g$$, so $$R_A = 56g$$. ✓ Both methods agree.", "source": "GLM 5.1 ①", "_id": "glm_1_69", "judge_pick": false}, {"question": "A particle is projected horizontally from a height. Explain why the horizontal and vertical components of motion are independent, and which SUVAT variables apply to each. (2 steps)", "answer": "- Step 1: Horizontal motion: no horizontal force (ignoring air resistance), so $$a_x = 0$$, $$v_x = u_x$$ (constant), $$s_x = u_x t$$. The horizontal distance increases linearly with time.\n- Step 2: Vertical motion: gravity acts downward, so $$a_y = g$$, $$u_y = 0$$ (projected horizontally), $$s_y = \\frac{1}{2}gt^2$$, $$v_y = gt$$. The vertical distance increases quadratically with time. The two motions are linked only by the common variable $$t$$ — the time of flight determines both the horizontal range and the vertical drop.", "source": "GLM 5.1 ①", "_id": "glm_1_70", "judge_pick": false}, {"question": "A ball is thrown upward at 24 m/s from a height. It reaches the ground 5 seconds later. Verify this is consistent by finding the height from which it was thrown. (3 steps)", "answer": "- Step 1: Take upward as positive. $$u = 24$$ m/s, $$a = -9.8$$ m/s², $$t = 5$$ s. Use $$s = ut + \\frac{1}{2}at^2$$.\n- Step 2: $$s = 24(5) + \\frac{1}{2}(-9.8)(25) = 120 - 122.5 = -2.5$$ m. The negative sign means the ball ends up 2.5 m below the launch point.\n- Step 3: So the ball was thrown from a height of 2.5 m above the ground. This is consistent with the given information.", "source": "GLM 5.1 ①", "_id": "glm_1_71", "judge_pick": true}, {"question": "Two forces of magnitudes $$P$$ and $$Q$$ act at a point with an angle $$\\theta$$ between them. Explain when you would use the component method versus the cosine rule to find the resultant. (2 steps)", "answer": "- Step 1: The component method is best when the forces are given in or easily converted to perpendicular components (e.g., one force along $$\\mathbf{i}$$ and $$\\mathbf{j}$$). Add the i-components and j-components separately, then find the magnitude and direction of the resultant vector.\n- Step 2: The cosine rule is best when you know the magnitudes of both forces and the angle between them directly. It gives the magnitude of the resultant in one step: $$R^2 = P^2 + Q^2 + 2PQ\\cos\\theta$$ (if $$\\theta$$ is the angle between the forces). Both methods give the same answer; use whichever is more convenient for the given information.", "source": "GLM 5.1 ①", "_id": "glm_1_72", "judge_pick": false}, {"question": "A student needs to find the bearing of a resultant force. The resultant vector is $$-8\\mathbf{i} + 15\\mathbf{j}$$. Explain how to convert this to a bearing. (3 steps)", "answer": "- Step 1: The vector is in the second quadrant (negative i, positive j), meaning the direction is NW. Find the angle with North: the angle from North (j-direction) clockwise to the vector.\n- Step 2: The angle from the positive j-direction to the vector is $$\\arctan\\left(\\frac{|-8|}{15}\\right) = \\arctan\\left(\\frac{8}{15}\\right) \\approx 28.1°$$. Since the vector is to the LEFT of North (west of north), this angle is anticlockwise from North.\n- Step 3: Bearing = clockwise from North, so bearing = 360° − 28.1° ≈ 332°. Alternatively, if the vector were in a different quadrant, adjust accordingly. Always remember: bearing is measured clockwise from North.", "source": "GLM 5.1 ①", "_id": "glm_1_73", "judge_pick": true}, {"question": "A particle moves with position vector $$\\mathbf{r} = (1 + 2t)\\mathbf{i} + (3 - t)\\mathbf{j}$$. Another particle moves with position vector $$\\mathbf{s} = (5 - t)\\mathbf{i} + (1 + 2t)\\mathbf{j}$$. Find the time at which they are closest together. (3 steps)", "answer": "- Step 1: Displacement between them: $$\\mathbf{r} - \\mathbf{s} = (1 + 2t - 5 + t)\\mathbf{i} + (3 - t - 1 - 2t)\\mathbf{j} = (3t - 4)\\mathbf{i} + (2 - 3t)\\mathbf{j}$$.\n- Step 2: Square of distance: $$D^2 = (3t-4)^2 + (2-3t)^2 = 9t^2 - 24t + 16 + 4 - 12t + 9t^2 = 18t^2 - 36t + 20$$.\n- Step 3: Differentiate: $$\\frac{d(D^2)}{dt} = 36t - 36 = 0$$, so $$t = 1$$ second. At this time, $$D^2 = 18 - 36 + 20 = 2$$, so minimum distance = $$\\sqrt{2}$$ metres. This is a simple example — the same method applies to more complex vector expressions.", "source": "GLM 5.1 ①", "_id": "glm_1_74", "judge_pick": false}, {"question": "A particle of mass $$m$$ is on the point of slipping down a rough plane inclined at angle $$\\alpha$$. A horizontal force $$P$$ is applied to prevent slipping. Explain why the normal reaction changes when $$P$$ is applied, and derive the new expression for $$R$$. (3 steps)", "answer": "- Step 1: Without $$P$$, the normal reaction balances only the perpendicular component of weight: $$R = mg\\cos\\alpha$$. When $$P$$ is applied horizontally, it has a component perpendicular to the slope that pushes the particle INTO the surface.\n- Step 2: Resolving perpendicular to the slope: $$R = mg\\cos\\alpha + P\\sin\\alpha$$. The horizontal force $$P$$ has a component $$P\\sin\\alpha$$ perpendicular to the slope (pushing into the surface), increasing the normal reaction.\n- Step 3: This is important because the maximum friction force $$F_{max} = \\mu R$$ now increases. The applied force both prevents sliding directly (via its component up the slope, $$P\\cos\\alpha$$) and indirectly (by increasing $$R$$ and hence $$F_{max}$$). Both effects help prevent slipping.", "source": "GLM 5.1 ①", "_id": "glm_1_75", "judge_pick": true}, {"question": "In a moments problem, a student takes moments about point C and gets an answer. Another student takes moments about point D and gets a different answer for the same unknown. What must be true, and what is the likely source of error? (2 steps)", "answer": "- Step 1: In equilibrium, the sum of moments about ANY point must be zero. So taking moments about different points should give the same answer for any unknown. If the answers differ, there is an error in one (or both) of the moment equations.\n- Step 2: The most likely source of error is a sign mistake — assigning a clockwise moment as anticlockwise or vice versa. Other possibilities: using the wrong perpendicular distance, forgetting a force entirely, or making an algebraic error when collecting terms. Always double-check by taking moments about a different point as a verification.", "source": "GLM 5.1 ①", "_id": "glm_1_76", "judge_pick": true}, {"question": "A truck of mass 1500 kg tows a trailer of mass 600 kg along a rough horizontal road. The engine provides a driving force of 5000 N. Resistance to motion on the truck is 200 N and on the trailer is 60 N. Find the acceleration and the tension in the tow bar. (3 steps)", "answer": "- Step 1: Whole system: net force = driving force − total resistance = $$5000 - 200 - 60 = 4740$$ N. Total mass = $$1500 + 600 = 2100$$ kg. Acceleration: $$a = \\frac{4740}{2100} \\approx 2.26$$ m/s².\n- Step 2: For the trailer alone: net force = $$T - 60 = 600a$$, so $$T = 60 + 600 \\times \\frac{4740}{2100} = 60 + 1354.3 \\approx 1414$$ N.\n- Step 3: Check with truck alone: $$5000 - 200 - T = 1500a$$, so $$T = 4800 - 1500 \\times \\frac{4740}{2100} = 4800 - 3385.7 \\approx 1414$$ N. ✓ Both methods give the same tension.", "source": "GLM 5.1 ①", "_id": "glm_1_77", "judge_pick": false}, {"question": "After the tow bar in Q79 breaks, the truck continues with the same driving force but the trailer decelerates. If the trailer was moving at 12 m/s when the tow bar broke, find the distance it travels before stopping. (3 steps)", "answer": "- Step 1: After the tow bar breaks, the only horizontal force on the trailer is resistance = 60 N (opposing motion). By F = ma: $$-60 = 600a$$, so $$a = -0.1$$ m/s².\n- Step 2: Use $$v^2 = u^2 + 2as$$ with $$v = 0$$, $$u = 12$$, $$a = -0.1$$: $$0 = 144 + 2(-0.1)s$$, so $$s = \\frac{144}{0.2} = 720$$ m.\n- Step 3: The trailer travels 720 m before stopping. On an inclined road, you would also include the weight component in the deceleration calculation.", "source": "GLM 5.1 ①", "_id": "glm_1_78", "judge_pick": false}], "count": 79}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "Two particles A and B are connected by a slack string on a smooth horizontal plane. A is projected with speed U, B is at rest. When the string becomes taut, what physical principle governs their subsequent shared speed, and why is kinetic energy NOT conserved? (3 steps)", "answer": "- Step 1: The string becoming taut acts like a perfectly inelastic \"jerk\". Because the string is inextensible, both particles must immediately move with the same velocity $$V$$ once it is taut.\n- Step 2: In the absence of external horizontal forces, linear momentum is conserved. The total momentum before the jerk equals the total momentum after: $$m_A U + m_B(0) = (m_A + m_B)V$$.\n- Step 3: Kinetic energy is NOT conserved because the sudden \"jerk\" involves internal energy losses (like heat/sound from the instantaneous tension). This makes it a perfectly inelastic interaction where energy is lost to the surroundings.\n\nTakeaway: A string becoming taut is mathematically identical to a perfectly inelastic collision.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "In the scenario where a slack string becomes taut, how does the impulse experienced by particle A compare to the impulse experienced by particle B, both in magnitude and direction? (2 steps)", "answer": "- Step 1: By Newton's Third Law, the string pulls A backwards and B forwards with equal and opposite forces over the same instantaneous time interval, so the impulses have equal magnitude.\n- Step 2: The impulse on A is $$m_A V - m_A U$$ (a negative value, slowing A down), and the impulse on B is $$m_B V - 0$$ (a positive value, speeding B up). Their magnitudes are equal because the total change in momentum is zero (momentum conservation): $$|m_A(V-U)| = |m_B V|$$.\n\nTakeaway: Impulse is equal and opposite for connected particles, just like forces.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "A force acts on a bearing of 330°. Explain what \"bearing of 330°\" means geometrically, and how this determines the angle between this force and the positive i (East) direction. (3 steps)", "answer": "- Step 1: A bearing is ALWAYS measured clockwise from North (the positive j-direction). A bearing of 330° means rotating 330° clockwise from North, which is equivalent to 30° anti-clockwise from North (or 30° West of North).\n- Step 2: The positive i-direction is East (90° clockwise from North). The angle between the force direction and the i-direction is $$360° - 330° + 90° = 120°$$.\n- Step 3: Alternatively, think of it as: the force is in the NW quadrant. The angle from the positive i-axis to the force vector (measured anti-clockwise) is $$180° - 30° = 150°$$, but the angle *between* the two force vectors (if one is East, one is 330°) is $$90° + 30° = 120°$$.\n\nTakeaway: Bearings are clockwise from North; always draw the vector triangle to find the angle *between* the vectors.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Two forces P and Q act at a point. P acts along the positive i-axis, and Q acts at an angle θ to P. Contrast using the Cosine Rule versus the Component Method to find the magnitude of the resultant force R. (3 steps)", "answer": "- Step 1: The Cosine Rule uses the vector triangle directly. Since $$R = P + Q$$, the angle between P and Q in the triangle is θ. The magnitude is $$|R|^2 = |P|^2 + |Q|^2 - 2|P||Q|\\cos(180° - \\theta)$$.\n- Step 2: The Component Method resolves forces along perpendicular axes. $$R_x = P + Q\\cos\\theta$$ and $$R_y = Q\\sin\\theta$$. The magnitude is $$|R| = \\sqrt{R_x^2 + R_y^2}$$.\n- Step 3: Both yield the same result algebraically. The Component Method is generally safer for avoiding angle-identification errors in the vector triangle, while the Cosine Rule is faster if the angle between the forces is explicitly known and simple.\n\nTakeaway: Use Component Method for safety; Cosine Rule for speed if the angle is obvious.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "A resultant force is given by $$\\mathbf{R} = a\\mathbf{i} + b\\mathbf{j}$$ where $$a < 0$$ and $$b > 0$$. Explain the geometric significance of calculating $$\\arctan(b/|a|)$$ versus $$\\arctan(b/a)$$. (2 steps)", "answer": "- Step 1: $$\\mathbf{R}$$ lies in the second quadrant (negative x, positive y). If you compute $$\\arctan(b/a)$$, since $$a$$ is negative, your calculator will give a negative angle (fourth quadrant), which is incorrect for the true angle measured anti-clockwise from i.\n- Step 2: You must compute the acute angle $$\\alpha = \\arctan(b/|a|)$$, which is the angle $$\\mathbf{R}$$ makes with the negative i-axis. The true angle measured anti-clockwise from the positive i-axis is then $$180° - \\alpha$$.\n\nTakeaway: Always sketch the vector to determine its quadrant before trusting the calculator's arctan output.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Two particles of different masses are connected by a light, inextensible string over a smooth pulley. Explain why the tension is the same on both sides of the pulley, and why their accelerations have the same magnitude. (3 steps)", "answer": "- Step 1: \"Light\" string means the string's mass is negligible. If there were different tensions on either side of a segment, the net force on that massless segment would be non-zero, leading to infinite acceleration ($$F=ma \\rightarrow \\infty$$), which is unphysical. Hence, tension is uniform.\n- Step 2: \"Smooth\" pulley means there is no friction between the string and pulley to resist sliding, so the pulley doesn't change the tension from one side to the other (unlike a rough pulley which can have different tensions).\n- Step 3: \"Inextensible\" means the string cannot stretch. Therefore, if particle A moves down by 1 metre, particle B must move up by 1 metre at exactly the same time. This constrains their speeds and accelerations to be equal in magnitude.\n\nTakeaway: Light + smooth = equal tension; inextensible = equal acceleration magnitude.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "When solving for a connected particle system over a pulley, why must we write separate $$F=ma$$ equations for each particle rather than just one equation for the whole system? (3 steps)", "answer": "- Step 1: A single system equation (e.g., $$m_{total}a = \\text{Net external driving force}$$) is useful for finding acceleration $$a$$ directly, but it eliminates the internal tension $$T$$.\n- Step 2: If the question asks for the tension in the string, or if friction acts on only one particle, we need the exact value of $$T$$.\n- Step 3: Writing $$F=ma$$ for each particle individually includes $$T$$ as an unknown. We get two equations (one for each particle) with two unknowns ($$a$$ and $$T$$). Adding these equations cancels $$T$$ to find $$a$$; substituting back yields $$T$$.\n\nTakeaway: Always write separate equations for each particle to expose the tension.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "In a system where a particle P hangs from a string, which itself is connected to another string attached to the ceiling, why are the tensions in the upper and lower strings different? (2 steps)", "answer": "- Step 1: The lower string only supports the weight of particle P (minus any accelerating force), so its tension $$T_{lower}$$ relates only to P's mass and acceleration.\n- Step 2: The upper string must support the weight of P AND provide the tension in the lower string (since it pulls up both P and the lower string's pull). Effectively, the upper string bears the combined system. If the system is accelerating, $$T_{upper} - T_{lower} - m_P g = m_P a$$, showing they are distinct.\n\nTakeaway: The string closer to the ceiling supports more mass/force than the string closer to the particle.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "A particle is on a rough inclined plane. Explain how to determine the direction of the friction force, and how this direction changes if the particle is being pulled UP the plane versus sliding DOWN the plane. (3 steps)", "answer": "- Step 1: Friction always opposes relative motion (or the tendency of relative motion) between surfaces.\n- Step 2: If the particle is pulled UP the plane, it is moving upwards, so kinetic friction acts DOWN the plane (opposing the upward motion).\n- Step 3: If the particle slides DOWN the plane, it is moving downwards, so kinetic friction acts UP the plane (opposing the downward motion). If it is in equilibrium, static friction acts in whichever direction is needed to prevent the slide.\n\nTakeaway: Friction direction is never assumed; it always opposes the direction of motion or impending motion.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "Particle A (mass $$2m$$) is on a rough inclined plane (angle $$\\alpha$$), connected by a string over a smooth pulley to particle B (mass $$3m$$) hanging vertically. B descends. Set up the general form of the two $$F=ma$$ equations. (3 steps)", "answer": "- Step 1: For B (hanging, descending), the weight pulls down and tension pulls up. Taking downwards as positive: $$3mg - T = 3ma$$.\n- Step 2: For A (on plane, moving up), tension pulls up the plane, friction pulls down the plane (opposing upward motion), and the weight component $$2mg\\sin\\alpha$$ pulls down the plane. Taking up the plane as positive: $$T - 2mg\\sin\\alpha - \\mu(2mg\\cos\\alpha) = 2ma$$.\n- Step 3: Adding these two equations eliminates $$T$$: $$3mg - 2mg\\sin\\alpha - 2\\mu mg\\cos\\alpha = 5ma$$, allowing you to solve for $$a$$.\n\nTakeaway: Define a positive direction for each particle (usually the direction of travel) and stick to it.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "A car tows a trailer up a hill at constant speed. The tow bar suddenly breaks. Describe the change in forces acting on the trailer, and how this determines its subsequent acceleration. (3 steps)", "answer": "- Step 1: Before breaking, the trailer is in equilibrium (constant speed): Tow bar tension + friction + weight component = 0.\n- Step 2: After breaking, the tension from the tow bar is removed. The only forces remaining on the trailer are its weight component down the slope and friction.\n- Step 3: Since it was moving up the slope, friction now acts DOWN the slope (opposing motion). The net force is now downwards along the slope, causing a deceleration: $$a = -g\\sin\\alpha - \\mu g\\cos\\alpha$$.\n\nTakeaway: When a connection breaks, remove the tension/force and recalculate with remaining forces.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "A uniform rod rests horizontally on two supports at points A and B, with a particle placed on it. When solving for an unknown mass or distance, what is the strategic criterion for choosing the point about which to take moments? (2 steps)", "answer": "- Step 1: Choose a point where an unknown force acts (usually one of the support reactions). By taking moments about that point, the perpendicular distance of that force is zero, so its moment is zero, eliminating it from the equation.\n- Step 2: This reduces the number of unknowns in your moment equation. If you take moments about a point where no unknowns act, you will have an equation with multiple unknowns, requiring you to solve simultaneous equations with a vertical equilibrium equation.\n\nTakeaway: Pivot selection is a strategic choice to eliminate unknowns and simplify algebra.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "When writing a moment equation for a system in equilibrium, how do you handle the signs (positive/negative) of the moments, and what is a common error? (2 steps)", "answer": "- Step 1: Define one direction of rotation as positive (e.g., clockwise) and the other as negative (anti-clockwise). For equilibrium, the sum of all moments must equal zero: $$\\Sigma (\\text{Clockwise moments}) - \\Sigma (\\text{Anti-clockwise moments}) = 0$$.\n- Step 2: A common error is misidentifying whether a force causes a clockwise or anti-clockwise rotation about the chosen pivot. Always imagine the rod pivoting at your chosen point and ask: \"Which way would this force, acting alone, spin the rod?\"\n\nTakeaway: Never assume the sign of a moment based on the direction of the force alone; it depends on the pivot location.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "A non-uniform rod of weight $$W$$ and length $$L$$ rests in equilibrium. How does the position of the centre of mass differ from a uniform rod, and how is it found using moments? (3 steps)", "answer": "- Step 1: For a uniform rod, the centre of mass is exactly at the midpoint ($$L/2$$). For a non-uniform rod, the mass distribution is uneven, so the centre of mass is at some unknown distance $$x$$ from one end.\n- Step 2: When taking moments, you cannot use $$L/2$$ for the weight's distance. Instead, you use the unknown distance $$x$$.\n- Step 3: By taking moments about a point and using the equilibrium condition (sum of moments = 0), you can solve the equation for the unknown distance $$x$$. The value of $$x$$ tells you where the rod is \"heaviest\".\n\nTakeaway: \"Non-uniform\" is a keyword telling you the centre of mass is an unknown variable $$x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "A rod is supported at both ends and is about to tilt about one of the supports. What physical condition defines the moment just before tilting, and what force becomes zero? (2 steps)", "answer": "- Step 1: Just before tilting, the rod is on the verge of rotating about the pivot support. The reaction force at the *other* support becomes zero because the rod is losing contact with it.\n- Step 2: The system is no longer in full equilibrium; it is in limiting equilibrium about the tilting pivot. You take moments about the tilting pivot, knowing the reaction there is the only vertical support force, to find the critical mass or force causing the tilt.\n\nTakeaway: \"About to tilt\" means the reaction at the opposite end is exactly 0.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "A skydiver falls freely for 5 seconds before opening a parachute which provides a constant upward resistance. Why can you NOT use a single set of SUVAT equations for the entire motion, and how must you approach the problem? (3 steps)", "answer": "- Step 1: SUVAT equations require constant acceleration. Free fall has acceleration $$g$$ downwards. When the parachute opens, the resistance causes a new, different acceleration (deceleration).\n- Step 2: You must split the motion into two distinct stages. Stage 1: free fall with $$a = g$$. Use SUVAT to find the velocity and distance at the exact moment the parachute opens.\n- Step 3: Stage 2: parachute open. The final velocity of Stage 1 becomes the initial velocity of Stage 2. The distance fallen in Stage 1 is subtracted from the total height to find the remaining distance for Stage 2.\n\nTakeaway: Changing forces means changing acceleration; split the problem at the point of change.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "If acceleration is not constant but varies with time, you cannot use $$v = u + at$$. Explain how to find the change in velocity from an acceleration-time ($$a$$-$$t$$) graph. (2 steps)", "answer": "- Step 1: By Newton's Second Law, $$a = \\frac{dv}{dt}$$. Therefore, the change in velocity $$\\Delta v$$ is the integral of acceleration with respect to time.\n- Step 2: Graphically, the integral of $$a$$ with respect to $$t$$ is the area under the $$a$$-$$t$$ graph. You calculate the area for each time interval (trapeziums, triangles, rectangles) to find the velocity at the end of each stage.\n\nTakeaway: Area under a-t graph = change in velocity; Area under v-t graph = change in displacement.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "An object falls from a height and hits the ground, decelerating to rest. During the deceleration phase, is the normal reaction force from the ground greater than, equal to, or less than the object's weight? Explain using Newton's laws. (3 steps)", "answer": "- Step 1: Let upward be positive. The object decelerates downwards, meaning its acceleration is upwards (positive).\n- Step 2: The forces acting on the object are the normal reaction $$N$$ (upwards) and weight $$mg$$ (downwards). Applying $$F = ma$$: $$N - mg = ma$$.\n- Step 3: Since $$a > 0$$ (upwards), $$N = mg + ma$$. Therefore, the normal reaction is GREATER than the weight. The ground must push up harder than gravity pulls down to stop the object.\n\nTakeaway: To decelerate a falling object, the upward reaction force must exceed the downward weight.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "A car travels at constant speed $$V$$. A motorbike starts from rest behind the car with constant acceleration $$a$$. Explain how to use a speed-time graph to find the time $$T$$ when the motorbike catches the car. (3 steps)", "answer": "- Step 1: On the v-t graph, the car's motion is a horizontal line at height $$V$$. The motorbike's motion is a straight line from the origin with gradient $$a$$.\n- Step 2: The displacement of each is the area under their respective v-t lines. For the car, it's a rectangle ($$V \\times T$$). For the motorbike, it's a triangle ($$\\frac{1}{2} \\times aT \\times T$$).\n- Step 3: The motorbike catches the car when their displacements from the start are equal. Set the areas equal: $$VT = \\frac{1}{2}aT^2$$, and solve for $$T$$.\n\nTakeaway: Overtaking means equal displacement; equate areas under the v-t graph.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "A block of mass $$m$$ is pulled at constant speed along a rough horizontal plane by a rope at angle $$\\theta$$ to the horizontal. Explain why the normal reaction $$R$$ is NOT equal to $$mg$$. (3 steps)", "answer": "- Step 1: Constant speed implies equilibrium ($$a=0$$), so net force in any direction is zero.\n- Step 2: Resolving vertically: the upward forces must equal the downward forces. The rope provides an upward component $$T\\sin\\theta$$.\n- Step 3: Therefore, $$R + T\\sin\\theta = mg$$, which rearranges to $$R = mg - T\\sin\\theta$$. The normal reaction is LESS than the weight because the rope lifts the block slightly.\n\nTakeaway: Pulling at an upward angle reduces the normal reaction, which in turn reduces the maximum friction.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "A force $$P$$ is applied to a block on a rough surface at an angle $$\\theta$$. As $$P$$ increases, the block eventually slips. Explain the two competing effects of increasing $$P$$ on the maximum available friction. (3 steps)", "answer": "- Step 1: The maximum static friction is $$F_{max} = \\mu R$$. We need to see how $$P$$ affects $$R$$.\n- Step 2: Resolving vertically: $$R + P\\sin\\theta = mg \\rightarrow R = mg - P\\sin\\theta$$. As $$P$$ increases, the upward pull increases, so $$R$$ decreases.\n- Step 3: Because $$R$$ decreases, $$F_{max}$$ decreases. However, the horizontal pulling force $$P\\cos\\theta$$ increases. Slipping occurs when the required friction $$P\\cos\\theta$$ exceeds the maximum available friction $$\\mu(mg - P\\sin\\theta)$$.\n\nTakeaway: Pulling harder increases the driving force but decreases the available grip.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": true}, {"question": "A ship moves with speed $$v$$ on a bearing $$\\alpha$$. Derive the i and j components of its velocity vector,
