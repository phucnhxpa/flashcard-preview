<script>
const DATA={"selected": [{"question": "What does the area under an acceleration-time graph represent, and how does this differ from the area under a velocity-time graph?", "answer": "- **Area under a-t graph:** Represents **change in velocity** (Δv), not displacement.\n  + Mathematically: $$\\int a \\, dt = \\Delta v$$\n  + Example: If a = -0.5 m/s² for 4 seconds, the area = -0.5 × 4 = -2 m/s, meaning velocity decreases by 2 m/s.\n\n- **Area under v-t graph:** Represents **displacement** (s).\n  + Mathematically: $$\\int v \\, dt = s$$\n\nThis is a common misconception. The key distinction: a-t graph area gives velocity change; v-t graph area gives displacement. When acceleration is not constant, you cannot use v = u + at for the entire motion—instead, calculate the area under the a-t graph to find Δv.", "source": "MiniMax ②", "_id": "minimax_2_1"}, {"question": "Two particles A (mass $$m$$) and B (mass $$3m$$) are on a smooth horizontal plane, connected by a slack inextensible string. A is projected at speed $$U$$. When the string becomes taut, what physical principle governs the resulting motion, and why is kinetic energy NOT conserved? (3 steps)", "answer": "- Step 1: The string becoming taut is a **perfectly inelastic \"jerking\" event**. The two particles are now constrained to move together at a common speed. The governing principle is **conservation of momentum**: the total momentum before the jerk equals the total momentum after, because there are no external horizontal forces.\n- Step 2: Applying conservation of momentum: $$mU + 3m(0) = (m + 3m)V$$, so $$mU = 4mV$$, giving $$V = U/4$$. The combined mass moves at one-quarter of A's original speed.\n- Step 3: Kinetic energy is NOT conserved because the string does internal work in \"jerking\" B into motion. Energy is lost (converted to heat/sound in a real string, or mathematically \"lost\" from the kinetic energy sum). Before: $$\\frac{1}{2}mU^2$$. After: $$\\frac{1}{2}(4m)(U/4)^2 = mU^2/8$$. The ratio shows significant energy loss — this is characteristic of any inelastic connection event.\n\nThe key insight: momentum is always conserved in the absence of external forces, but kinetic energy is only conserved in perfectly elastic interactions.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "A rod is in equilibrium with a force applied at an angle. The component of tension along the rod is greater than the component of weight along the rod. In which direction must friction act? Explain why. (2 steps)", "answer": "- Step 1: If the tension component along the rod (up the rod) exceeds the weight component along the rod (down the rod), there is a net force up the rod. The rod would accelerate up without friction.\n- Step 2: For equilibrium, friction must oppose this net tendency. So friction acts DOWN the rod (opposing the upward pull of tension). The rule: friction always acts to oppose the direction the object would move if the surface were smooth.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "A skydiver falls freely for 5 seconds before opening a parachute which provides a constant upward resistance. Why can you NOT use a single set of SUVAT equations for the entire motion, and how must you approach the problem? (3 steps)", "answer": "- Step 1: SUVAT equations require constant acceleration. Free fall has acceleration $$g$$ downwards. When the parachute opens, the resistance causes a new, different acceleration (deceleration).\n- Step 2: You must split the motion into two distinct stages. Stage 1: free fall with $$a = g$$. Use SUVAT to find the velocity and distance at the exact moment the parachute opens.\n- Step 3: Stage 2: parachute open. The final velocity of Stage 1 becomes the initial velocity of Stage 2. The distance fallen in Stage 1 is subtracted from the total height to find the remaining distance for Stage 2.\n\nTakeaway: Changing forces means changing acceleration; split the problem at the point of change.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "A horizontal rod is supported at two points and carries several particles. Explain the concept of \"tilting\" and why, at the instant the rod is about to tilt about one support, the reaction at the other support becomes zero. (3 steps)", "answer": "- Step 1: As you move a load toward one end, that end is pushed down and the other end lifts. The rod begins to rotate about the nearer support.\n- Step 2: Just before lift-off, the contact at the far support is infinitesimally light. Physically, the rod is no longer pressing on it, so by Newton's third law, the reaction force there is zero.\n- Step 3: Setting that reaction to zero gives the limiting condition for equilibrium. It removes one unknown and lets you solve for the critical load position or mass using moments about the remaining support.", "source": "Kimi K2.6 ②", "_id": "kimi_2_23"}, {"question": "In a speed-time graph problem involving a car and a motorbike, how do you determine when the motorbike **overtakes** the car? (3 steps)", "answer": "- Step 1: Overtaking occurs when both vehicles have travelled the **same distance** from the start and are at the **same position**. Distance = area under the v-t graph.\n- Step 2: Write expressions for the area under each vehicle's v-t graph as functions of time. The car might have constant speed (rectangular area), while the motorbike accelerates from rest (triangular then rectangular area).\n- Step 3: Set the two areas **equal** and solve for $$T$$. This gives the time at which the motorbike catches up. After this time, the motorbike is ahead.\n\n+ Check: at $$T$$, both areas are equal. Just before $$T$$, the car's area is larger (car is ahead). Just after $$T$$, the motorbike's area is larger (motorbike is ahead). This confirms overtaking.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "A force of magnitude 10 N acts due North and a force of magnitude 8 N acts on bearing 330°. Using the cosine rule with angle 120° between them, compute the resultant magnitude. Show why cos(120°) matters. (3 steps)", "answer": "- Step 1: Set up the cosine rule: $$F^2 = P^2 + Q^2 - 2PQ\\cos(120°) = 10^2 + 8^2 - 2(10)(8)\\cos(120°)$$.\n- Step 2: $$\\cos(120°) = -\\frac{1}{2}$$. So $$F^2 = 100 + 64 - 160 \\times (-\\frac{1}{2}) = 164 + 80 = 244$$.\n- Step 3: $$F = \\sqrt{244} \\approx 15.6$$ N. Notice the negative cosine made the cross-term positive, increasing the resultant. If the angle had been 60° instead, the cross-term would subtract, giving a much smaller resultant. This is why two forces at a wide angle produce a larger resultant than two forces at a narrow angle (for the same magnitudes).", "source": "GLM 5.1 ①", "_id": "glm_1_4"}, {"question": "(Moments) When solving for the minimum mass $ M $ on a horizontal rod to prevent tilting, why is the pivot point chosen where the reaction force disappears? (2 steps)", "answer": "- Step 1: Taking moments about the pivot eliminates the **unknown reaction force** at that point (since its moment arm is zero).  \n- Step 2: This simplifies the equation to only involve $ M $, making it solvable without needing the reaction force.  \n\n**Takeaway:** Selecting a pivot with unknown forces reduces variables in the moment equation.", "source": "Qwen 3 ③", "_id": "qwen_3_3"}, {"question": "What are the conditions for a rod to be in **complete equilibrium**, and how many independent equations can you write? (2 steps)", "answer": "- Step 1: Complete equilibrium requires: (1) **Translational equilibrium**: net force is zero in any direction. This gives $$\\sum F_x = 0$$ and $$\\sum F_y = 0$$ (two equations). (2) **Rotational equilibrium**: net moment about any point is zero. This gives $$\\sum \\text{moments} = 0$$ (one equation, but it must hold about ANY point).\n- Step 2: You can write three independent equations: two force equations and one moment equation. Any additional moment equations are NOT independent — they can be derived from the three. Strategy: use the moment equation to eliminate one unknown, then use force equations for the rest.\n\n+ Choosing the moment pivot wisely (at a reaction force) eliminates that unknown from the moment equation, effectively giving you the information of a force equation \"for free.\"", "source": "GLM 5.1 ③", "_id": "glm_3_63"}, {"question": "Two forces $$\\mathbf{P}$$ and $$\\mathbf{Q}$$ act at a point with a tail-to-tail angle of $$120°$$ between their directions. Explain why using $$120°$$ directly in the standard cosine rule with a minus sign gives the wrong resultant magnitude, and state the correct formula. (3 steps)", "answer": "- Step 1: The standard cosine rule $$c^2 = a^2 + b^2 - 2ab\\cos C$$ uses $$C$$ as the **interior angle of the triangle** opposite side $$c$$. In a vector addition triangle (head-to-tail), the interior angle between $$\\mathbf{P}$$ and $$\\mathbf{Q}$$ is $$180° - 120° = 60°$$, not $$120°$$.\n- Step 2: Using the interior angle $$60°$$ gives $$|\\mathbf{R}|^2 = P^2 + Q^2 - 2PQ\\cos(60°)$$. Alternatively, using the tail-to-tail angle $$θ = 120°$$ directly in the dot-product identity avoids triangle ambiguity entirely: $$|\\mathbf{P} + \\mathbf{Q}|^2 = P^2 + Q^2 + 2PQ\\cos θ$$.\n- Step 3: Since $$\\cos(120°) = -\\frac{1}{2}$$, both correct methods yield $$|\\mathbf{R}|^2 = P^2 + Q^2 - PQ$$. Plugging $$120°$$ into the standard cosine rule with a minus sign produces $$P^2 + Q^2 + PQ$$, which is actually $$|\\mathbf{P} - \\mathbf{Q}|^2$$, the magnitude of the difference, not the sum.", "source": "Kimi K2.6 ②", "_id": "kimi_2_1"}, {"question": "What is the key difference between a **scalar** and a **vector** in mechanics, and which quantities in M1 are which? (2 steps)", "answer": "- Step 1: A **scalar** has magnitude only; a **vector** has magnitude AND direction. Scalars: speed, distance, mass, time, energy, coefficient of friction. Vectors: velocity, displacement, acceleration, force, momentum, impulse.\n- Step 2: The critical distinction: you can add scalars directly, but vectors must be added component-by-component or geometrically. Two forces of 3 N and 4 N can give a resultant anywhere from 1 N to 7 N depending on the angle between them (not always 7 N).\n\n+ The \"same speed but different direction\" error (Q63) arises from confusing speed (scalar) with velocity (vector). Momentum conservation uses velocities (vectors with signs), not speeds.", "source": "GLM 5.1 ③", "_id": "glm_3_80"}, {"question": "In a connected particle problem over a smooth pulley, why must you write separate F = ma equations for each particle rather than one equation for the whole system? (2 steps)", "answer": "- Step 1: Writing separate equations for each particle lets you include the tension T as an unknown, which then cancels when you add the two equations. This gives you the acceleration directly. For particle A: forces include T; for particle B: forces also include T (in the opposite direction).\n- Step 2: If you write one equation for the whole system, you can only do so if you correctly account for the net driving force (weight difference) and total mass. This works for finding acceleration, but you CANNOT find T from a whole-system equation alone — T is internal to the system and cancels out. To find T, you must go back to one of the individual equations.\n\nTakeaway: Always write two separate F = ma equations. Add them to eliminate T and find a; substitute back to find T.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "To find the minimum distance between two moving particles with position vectors as functions of time, explain why we minimise $$|\\mathbf{AB}|^2$$ rather than $$|\\mathbf{AB}|$$. (2 steps)", "answer": "- Step 1: The distance $$|\\mathbf{AB}| = \\sqrt{(a+bt)^2 + (c+dt)^2}$$ involves a square root, which is messy to differentiate. Minimising the square root is equivalent to minimising the expression under the square root, since the square root function is monotonically increasing.\n- Step 2: So we minimise $$|\\mathbf{AB}|^2 = (a+bt)^2 + (c+dt)^2$$, which is a simple quadratic in $$t$$. Differentiate with respect to $$t$$ and set equal to zero: $$\\frac{d}{dt}|\\mathbf{AB}|^2 = 2b(a+bt) + 2d(c+dt) = 0$$. Solve for $$t$$, then substitute back to find the minimum distance.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "An object falls from a height and hits the ground, decelerating to rest. During the deceleration phase, is the normal reaction force from the ground greater than, equal to, or less than the object's weight? Explain using Newton's laws. (3 steps)", "answer": "- Step 1: Let upward be positive. The object decelerates downwards, meaning its acceleration is upwards (positive).\n- Step 2: The forces acting on the object are the normal reaction $$N$$ (upwards) and weight $$mg$$ (downwards). Applying $$F = ma$$: $$N - mg = ma$$.\n- Step 3: Since $$a > 0$$ (upwards), $$N = mg + ma$$. Therefore, the normal reaction is GREATER than the weight. The ground must push up harder than gravity pulls down to stop the object.\n\nTakeaway: To decelerate a falling object, the upward reaction force must exceed the downward weight.", "source": "GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "When a particle on a rough inclined plane is connected to a hanging particle over a smooth pulley at the top of the plane, and the system is released from rest, how do you determine which direction the system moves? (3 steps)", "answer": "- Step 1: Compare the \"driving force\" (weight of hanging mass $$m_B g$$) with the \"resisting forces\" on the plane particle (weight component down the slope $$m_A g\\sin\\alpha$$ plus maximum friction $$\\mu m_A g\\cos\\alpha$$).\n- Step 2: If $$m_B g > m_A g\\sin\\alpha + \\mu m_A g\\cos\\alpha$$: the hanging mass falls and the plane particle moves UP the slope. Friction on A acts DOWN the slope (opposing upward motion).\n- Step 3: If $$m_B g < m_A g\\sin\\alpha - \\mu m_A g\\cos\\alpha$$: the plane particle slides DOWN and the hanging mass rises. Friction on A acts UP the slope (opposing downward motion). If neither condition holds, the system remains at rest (friction can hold it).\n\n+ This \"direction test\" must be done BEFORE writing equations, because the direction of friction depends on the direction of motion. Getting the direction wrong makes the entire solution invalid.", "source": "GLM 5.1 ③", "_id": "glm_3_67"}, {"question": "A ball is dropped from height and hits the floor with speed v, decelerating to zero over distance s. How do you find the normal reaction force during the deceleration phase? (2 steps)", "answer": "- Step 1: First find deceleration a using v² = u² + 2as (with u = v, final velocity = 0, so a = -v²/(2s)).\n- Step 2: Apply Newton's Second Law vertically: N - mg = m·a (taking upward as positive). Since a is upward (deceleration), N = m(g + a) or more commonly N = m(g - downward acceleration). The normal force is **less than mg** during deceleration.", "source": "MiniMax ①", "_id": "minimax_1_17"}, {"question": "What does it mean for a string to be **light**, and how does this assumption simplify problems? (2 steps)", "answer": "- Step 1: A \"light\" string has **zero mass**. This means the string's weight is negligible and doesn't contribute to any force calculations. The tension is the same at all points along a horizontal light string (no weight to cause variation).\n- Step 2: This simplification means: (1) You never include the string's weight in force diagrams. (2) For a light string over a smooth pulley, tension is the same on both sides. (3) For a light string with a particle attached, the tension on each side of the particle can be different (the particle's mass \"breaks\" the tension equality).\n\n+ If a string were \"heavy\" (had mass), the tension would vary along its length (greater at the top to support the weight of string below). This is beyond M1 scope.", "source": "GLM 5.1 ③", "_id": "glm_3_74"}, {"question": "Explain the difference between \"impulse\" and \"momentum\" and how they are related. Give the equation and its meaning. (2 steps)", "answer": "- Step 1: Momentum of a particle = mass × velocity = $$mv$$ (a vector quantity). It describes how much \"motion\" the particle has. Impulse = change in momentum = $$mv - mu = \\Delta(mv)$$. It describes the effect of a force acting over a time interval.\n- Step 2: The relationship is: Impulse = Force × time = $$Ft = \\Delta(mv)$$. A large force acting for a short time can produce the same impulse as a small force acting for a long time. In M1, impulse is typically calculated as the change in momentum, not from $$Ft$$ directly.", "source": "GLM 5.1 ①", "_id": "glm_1_59"}, {"question": "Two forces $$P$$ and $$Q$$ act at a point with an angle $$\\theta$$ between them. When should you use the **cosine rule** vs the **component method** to find the resultant, and how does the cosine rule formula incorporate the angle? (3 steps)", "answer": "- Step 1: **Cosine rule** is fastest when you know the angle between the two forces directly. The resultant magnitude: $$R^2 = P^2 + Q^2 - 2PQ\\cos(180° - \\theta) = P^2 + Q^2 + 2PQ\\cos\\theta$$ if $$\\theta$$ is the angle between the forces. But if the triangle angle (supplement) is used: $$R^2 = P^2 + Q^2 - 2PQ\\cos A$$ where $$A$$ is the angle in the force triangle opposite to $$R$$.\n- Step 2: **Component method** is more systematic and less error-prone. Resolve each force into $$\\mathbf{i}$$ and $$\\mathbf{j}$$, sum components, then use $$R = \\sqrt{R_x^2 + R_y^2}$$.\n- Step 3: For the specific case from the notes: $$P = 10$$ N, $$Q = 8$$ N, angle between them = 120°. Cosine rule: $$R^2 = 10^2 + 8^2 - 2(10)(8)\\cos 120° = 164 - 160(-\\frac{1}{2}) = 164 + 80 = 244$$. The key: $$\\cos 120° = -1/2$$, so the negative sign in the cosine rule flips it to addition, making the resultant larger than either individual force.\n\nThe cosine rule works because forces form a vector triangle when placed head-to-tail.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "A ball is thrown vertically upward. Explain conceptually why there are two times (one ascending, one descending) at which the ball passes any height below its maximum, and how symmetry helps find the total time of flight. (3 steps)", "answer": "- Step 1: The ball decelerates under gravity at $$g$$ until its velocity is zero at the peak. It then accelerates downward at $$g$$. The motion is symmetric about the peak time because acceleration is constant throughout.\n- Step 2: For any height $$h$$ below the launch point (but above the ground), the ball passes it once going up with speed $$v$$ and once coming down with speed $$-v$$. The quadratic $$s = ut - \\frac{1}{2}gt^2$$ yields two roots.\n- Step 3: Total time of flight can be found by solving for when displacement returns to zero (if caught at launch height), giving $$t = 2u/g$$, or by using the time to peak ($$t_{\\text{up}} = u/g$$) and doubling it.", "source": "Kimi K2.6 ②", "_id": "kimi_2_14"}, {"question": "How do you determine the direction of friction on an inclined plane?", "answer": "- Step 1: Determine the **direction of motion** or impending motion.  \n- Step 2: Friction opposes relative motion:  \n  - If object slides up, friction acts down.  \n  - If object slides down, friction acts up.  \n- Step 3: If in equilibrium, compare driving forces (e.g., weight component) vs. max friction (F ≤ μR).  \nExample: Connected particles → motion direction dictates friction direction.", "source": "Qwen 3 ①", "_id": "qwen_1_4"}, {"question": "In a projectile problem, why is it crucial to treat horizontal and vertical motion **independently**, and what is the one quantity that links them? (2 steps)", "answer": "- Step 1: The only acceleration in projectile motion (ignoring air resistance) is $$g$$ downward. This means: horizontal motion has **zero acceleration** (constant horizontal velocity), while vertical motion has **constant acceleration** $$g$$ downward. These are two independent SUVAT problems.\n- Step 2: The one quantity linking them is **time** $$t$$. Both the horizontal and vertical motions take the same time. You can often find $$t$$ from one component (e.g., vertical: time to reach maximum height or return to ground) and use it in the other (horizontal: range calculation).\n\n+ Common error: trying to use a single SUVAT equation for the diagonal motion. SUVAT only works in one dimension at a time. Resolve into components first.", "source": "GLM 5.1 ③", "_id": "glm_3_35"}, {"question": "In M1 mechanics, a bearing is defined as an angle measured from North. What is the specific direction of measurement, and what is the common error made when converting a bearing to vector components? (3 steps)", "answer": "- Step 1: Bearings are measured **clockwise** from the North line ($$0°$$). A common error is measuring anti-clockwise, which swaps the roles of sine and cosine in component resolution.\n- Step 2: For a bearing $$α$$, the vector components relative to $$\\mathbf{i}$$ (East) and $$\\mathbf{j}$$ (North) are: East component = $$v \\sin α$$, North component = $$v \\cos α$$. This is because the angle is measured from the North axis, so the adjacent side (cosine) aligns with North and the opposite side (sine) aligns with East.\n- Step 3: For example, a bearing of $$330°$$ means $$30°$$ west of North. The $$\\mathbf{i}$$ component is negative (westward), and the $$\\mathbf{j}$$ component is positive (northward): $$v\\sin(330°) = -v\\sin(30°)$$, $$v\\cos(330°) = +v\\cos(30°)$$.\n+ If you mistakenly use anti-clockwise, you would place the angle in the wrong quadrant and reverse the sign pattern.", "source": "Kimi K2.6 ②", "_id": "kimi_2_0"}, {"question": "A particle of mass m is projected up a rough inclined plane with initial speed u. It comes to rest momentarily and slides back down. How do you find (a) the distance up the plane, (b) the speed when it returns to the bottom? (3 steps)", "answer": "- Step 1: Going up—the particle decelerates\n  + Forces: gravity component down plane = mg sin α, friction also down plane (opposing motion) = μmg cos α.\n  + Net deceleration: a_up = -g(sin α + μ cos α)\n  + Using v² = u² + 2as: 0 = u² + 2(-a_up)s → s = u²/(2g(sin α + μ cos α))\n\n- Step 2: Coming down—the particle accelerates\n  + Now motion is down, so friction acts UP the plane.\n  + Net acceleration: a_down = g(sin α - μ cos α)\n  + Starting from rest at the top, using v² = u² + 2as with u = 0:\n  + v² = 2 × g(sin α - μ cos α) × s\n  + Substitute s from part (1): v² = u² × (sin α - μ cos α)/(sin α + μ cos α)\n\n- Step 3: Interpretation\n  + The return speed is less than the launch speed (as expected—the rough surface removes energy).\n  + If μ = 0 (smooth), v = u (energy conserved).\n  + If μ is large enough that μ > tan α, the particle won't slide back down at all.\n\nFriction removes mechanical energy: the return speed is always less than launch speed unless the surface is smooth.", "source": "MiniMax ②", "_id": "minimax_2_56"}, {"question": "When finding the **bearing of approach** of one ship towards another, what does this mean geometrically, and how do you set up the equation? (3 steps)", "answer": "- Step 1: \"Bearing of approach\" means the direction from which ship A sees ship B approaching — i.e., the direction of the vector $$\\mathbf{AB} = \\mathbf{r}_B - \\mathbf{r}_A$$ at that instant.\n- Step 2: If the bearing of approach is given (e.g., 225° = SW direction), this constrains the ratio of the $$\\mathbf{i}$$ and $$\\mathbf{j}$$ components of $$\\mathbf{AB}$$. For bearing 225°, the direction is 45° South of West, so $$|\\Delta x| = |\\Delta y|$$ with both negative.\n- Step 3: Set up the equation: $$\\Delta x = \\Delta y$$ (or $$\\Delta x = -\\Delta y$$, depending on the quadrant). Since $$\\mathbf{AB}(t) = (a + bt)\\mathbf{i} + (c + dt)\\mathbf{j}$$, set the appropriate component equality and solve for $$t$$.\n\n+ Example: bearing 225° means $$\\Delta x < 0$$ and $$\\Delta y < 0$$ with $$|\\Delta x| = |\\Delta y|$$. So $$a + bt = -(c + dt)$$, giving $$a + c = -(b + d)t$$, so $$t = -(a+c)/(b+d)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "In moments problems, how do you correctly assign **positive and negative signs** to moments, and what is the most common sign error? (3 steps)", "answer": "- Step 1: Choose a convention: clockwise = positive, anti-clockwise = negative (or vice versa — just be consistent). Every moment is $$\\text{Force} \\times \\text{perpendicular distance}$$, and the sign comes from the rotation direction it would cause about the pivot.\n- Step 2: The most common error: **assuming all forces on one side of the pivot produce the same sign of moment**. A force to the left of the pivot can produce either a clockwise or anti-clockwise moment depending on whether it acts upward or downward.\n- Step 3: Systematic check: for each force, imagine the pivot is a fulcrum. Ask \"which way would this force alone rotate the object?\" — that determines the sign. An upward force to the right of the pivot = anti-clockwise. A downward force to the right = clockwise.\n\n+ Example from notes: $$-24x + 72 - 8x - 16 = 0$$ should simplify to $$-32x + 56 = 0$$, but a sign error gave $$-24x + 56 = 0$$. The error was miscounting the $$x$$-terms. Always collect like terms carefully after writing the full equation.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "A rod is held in equilibrium by a string at an angle, with friction acting along the rod. How do you determine the **direction of friction**? (3 steps)", "answer": "- Step 1: Friction opposes the **tendency of motion**. If the rod would slide one way without friction, friction acts the other way.\n- Step 2: To determine the tendency: resolve forces along the rod WITHOUT friction. If the component of the applied force along the rod exceeds the component of weight along the rod, the rod would slide in the applied force's direction — so friction acts in the opposite direction.\n- Step 3: Example: if the tension's component along the rod ($$T\\cos\\theta$$) is greater than the weight component along the rod ($$mg\\sin\\phi$$), the rod would slide UP without friction, so friction acts DOWN the rod.\n\n+ If you're unsure, assume a direction for friction, solve, and check: if you get a negative value for $$F$$, it means friction acts in the opposite direction to what you assumed.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "Particle A (mass $$2m$$) is on a rough inclined plane (angle $$\\alpha$$), connected by a string over a smooth pulley to particle B (mass $$3m$$) hanging vertically. B descends. Set up the general form of the two $$F=ma$$ equations. (3 steps)", "answer": "- Step 1: For B (hanging, descending), the weight pulls down and tension pulls up. Taking downwards as positive: $$3mg - T = 3ma$$.\n- Step 2: For A (on plane, moving up), tension pulls up the plane, friction pulls down the plane (opposing upward motion), and the weight component $$2mg\\sin\\alpha$$ pulls down the plane. Taking up the plane as positive: $$T - 2mg\\sin\\alpha - \\mu(2mg\\cos\\alpha) = 2ma$$.\n- Step 3: Adding these two equations eliminates $$T$$: $$3mg - 2mg\\sin\\alpha - 2\\mu mg\\cos\\alpha = 5ma$$, allowing you to solve for $$a$$.\n\nTakeaway: Define a positive direction for each particle (usually the direction of travel) and stick to it.", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "What's the key difference between static and kinetic friction in problems?", "answer": "- Step 1: Static friction (0 ≤ F ≤ μ_s R) acts when object is stationary; adjusts to match applied force.\n- Step 2: Kinetic friction (F = μ_k R) acts when object is moving; constant value.\n+ Example: Pushing a box: static friction increases until μ_s R, then drops to μ_k R when moving.\n\n**Takeaway:** Use μ_s R when object is about to move; μ_k R when moving.", "source": "Qwen 3 ②", "_id": "qwen_2_11"}, {"question": "A particle P of mass $$m$$ hangs from a string, which passes over a smooth pulley to a particle Q of mass $$2m$$. The string holding the pulley to the ceiling has tension $$T_{ceil}$$. How does $$T_{ceil}$$ relate to the tension in the main string $$T_{string}$$? (2 steps)", "answer": "- Step 1: The pulley is in equilibrium (or assumed massless and not accelerating vertically). The main string passes over it, exerting a downward force of $$T_{string}$$ on both sides.\n- Step 2: Therefore, the ceiling string must support the total downward pull on the pulley. $$T_{ceil} = 2T_{string}$$. If the system is in equilibrium, $$T_{string}$$ relates to the masses, but the ceiling string always sees double the main string's tension.", "source": "GLM 5.1 ②", "_id": "glm_2_48"}, {"question": "Explain why tension is the same throughout a light, inextensible string passing over a smooth pulley. Why might a two-string pulley system have different tensions? (2 steps)", "answer": "- Step 1: Single continuous string over smooth pulley\n  + \"Light\" means mass of string is negligible → no inertia.\n  + \"Inextensible\" means no stretching → same length, same motion at every point.\n  + \"Smooth\" means no friction → no energy loss at the pulley.\n  + Consider a small element of string: forces on it are T (left) and T (right). If they weren't equal, the string would accelerate (since mass ≈ 0, net force = 0). Therefore T₁ = T₂.\n\n- Step 2: Two-string or multi-rope systems\n  + If there are TWO separate strings (like one going up to a ceiling, another going down to a particle), they are connected by a knot or hook but are mechanically separate.\n  + Each string has its own tension—call them T₁ and T₂.\n  + The key phrase to watch for: \"two strings\" or \"rope and string\" means different tensions.\n  + \"One string\" or \"light inextensible string\" means equal tension throughout.\n\nWatch for the wording: \"a string\" = same tension; \"two strings\" = potentially different tensions. The number of rope segments matters.", "source": "MiniMax ②", "_id": "minimax_2_17"}, {"question": "When a particle slides **down** a rough inclined plane, what is its acceleration, and under what condition will it NOT slide at all? (2 steps)", "answer": "- Step 1: Forces down the slope: $$mg\\sin\\alpha$$ (weight component). Forces up the slope: $$\\mu mg\\cos\\alpha$$ (friction, opposing downward motion). Net force: $$mg\\sin\\alpha - \\mu mg\\cos\\alpha = ma$$, so $$a = g(\\sin\\alpha - \\mu\\cos\\alpha)$$.\n- Step 2: The particle will NOT slide if $$a \\leq 0$$, i.e., $$\\sin\\alpha \\leq \\mu\\cos\\alpha$$, i.e., $$\\tan\\alpha \\leq \\mu$$. If $$\\mu \\geq \\tan\\alpha$$, friction alone can hold the particle stationary on the slope.\n\n+ If the particle is given an initial push down the slope but $$\\mu > \\tan\\alpha$$, it will decelerate and stop. The deceleration is $$a = g(\\mu\\cos\\alpha - \\sin\\alpha)$$, which is positive (up the slope, opposing the downward motion).", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "A non-uniform rod of weight $$W$$ and length $$L$$ rests in equilibrium. How does the position of the centre of mass differ from a uniform rod, and how is it found using moments? (3 steps)", "answer": "- Step 1: For a uniform rod, the centre of mass is exactly at the midpoint ($$L/2$$). For a non-uniform rod, the mass distribution is uneven, so the centre of mass is at some unknown distance $$x$$ from one end.\n- Step 2: When taking moments, you cannot use $$L/2$$ for the weight's distance. Instead, you use the unknown distance $$x$$.\n- Step 3: By taking moments about a point and using the equilibrium condition (sum of moments = 0), you can solve the equation for the unknown distance $$x$$. The value of $$x$$ tells you where the rod is \"heaviest\".\n\nTakeaway: \"Non-uniform\" is a keyword telling you the centre of mass is an unknown variable $$x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "Two particles are connected by a light inextensible string over a smooth pulley. Particle A (mass 2m) is on a rough inclined plane, particle B (mass 3m) hangs vertically. When the string is cut, in which direction does friction act on A, and why? (2 steps)", "answer": "- Step 1: Friction always **opposes the direction of motion** (or the direction it would move if there were no friction).\n- Step 2: Since B (the heavier mass) would pull A **up the plane**, if the string is cut, A would naturally slide **down the plane** due to gravity. Therefore, friction acts **up the plane** to oppose this motion.", "source": "MiniMax ①", "_id": "minimax_1_9"}, {"question": "Object A moves East at $$u$$, Object B moves West at $$v$$. After a head-on collision, how do you determine the direction of A and B? (3 steps)", "answer": "- Step 1: Define a positive direction (e.g., East is positive, so B's initial velocity is $$-v$$). Apply conservation of momentum: $$m_A u - m_B v = m_A v_A + m_B v_B$$.\n- Step 2: The algebraic sign of the final velocities $$v_A$$ and $$v_B$$ tells you their direction. If $$v_A > 0$$, A moves East; if $$v_A < 0$$, A moves West.\n- Step 3: A physical check: since they were approaching, they must separate after collision. If A rebounds West ($$v_A < 0$$), B must be moving West ($$v_B < 0$$) or slower East; they cannot pass through each other.\n\nTakeaway: The sign of the final velocity from your momentum equation directly tells you the direction.", "source": "GLM 5.1 ②", "_id": "glm_2_30"}, {"question": "Why does the normal reaction decrease when an elevator decelerates upward?", "answer": "- Step 1: Newton’s 2nd law: N - mg = -ma (deceleration upward = net downward acceleration).  \n- Step 2: N = m(g - a). If elevator falls freely (a = g), N = 0 (weightless).  \n- Step 3: Deceleration upward feels like reduced gravity – e.g., during elevator impact.", "source": "Qwen 3 ①", "_id": "qwen_1_14"}, {"question": "In a two-stage motion problem, the first stage ends at velocity $$v_1$$ and the second stage begins at the same velocity. If you incorrectly use $$u = 0$$ for the second stage, what is the conceptual error? (2 steps)", "answer": "- Step 1: The error is treating the second stage as starting from rest, ignoring the velocity accumulated during the first stage. The object doesn't \"reset\" when the parachute opens — it continues with the velocity it had at the end of Stage 1.\n- Step 2: This would dramatically underestimate the distance travelled in Stage 2 and the final landing speed. For example, if Stage 1 ends at 49 m/s and you use $$u = 0$$ for Stage 2, you'd calculate a much shorter stopping distance and wrong final speed.\n\n+ The continuity of velocity at the transition is the critical link between stages. Position is also continuous (the object doesn't teleport), but velocity is the quantity that most often causes errors when forgotten.", "source": "GLM 5.1 ③", "_id": "glm_3_72"}, {"question": "When a string goes slack in a connected particles problem, what changes about the motion, and when might the string become taut again? (3 steps)", "answer": "- Step 1: When the string goes slack, there is no tension force on either particle. They move independently under whatever other forces act (gravity, friction, etc.).\n- Step 2: The string becomes taut again when the distance between the particles equals the length of the string. At this instant, the string \"jerks\" and the particles are constrained to move together (conservation of momentum applies, as in Q1).\n- Step 3: Example: if A is projected away from B with the string slack, A decelerates (due to friction or gravity) while B is stationary. When A has moved the length of the string away, the string becomes taut and both particles jerk to a common speed.\n\n+ The \"jerk\" when the string becomes taut is an impulsive event — it happens instantaneously and involves a sudden change in velocity. Use conservation of momentum, NOT conservation of energy.", "source": "GLM 5.1 ③", "_id": "glm_3_51"}, {"question": "A uniform rod of mass 1.2 kg and length 4.5 m rests horizontally on a support at point C. A particle of mass 4 kg is placed at end D. A mass M is placed at the other end to prevent tilting. Explain how to find the minimum value of M. (3 steps)", "answer": "- Step 1: The rod is about to tilt about point C. When the rod is on the point of tilting, the reaction at the other support becomes zero (it's just about to lift off). This is the key condition for \"minimum mass to prevent tilting.\"\n- Step 2: Take moments about C. The clockwise moments must balance the anticlockwise moments. The rod's weight acts at its centre (2.25 m from each end). The particle D acts at one end. The mass M acts at the other end.\n- Step 3: Set up: (moment of rod's weight about C) + (moment of particle D about C) = (moment of mass M about C). Solve for M. The minimum M is the value where the reaction at the other support is exactly zero — any less and the rod tilts.", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "In a two-string pulley system, why can the tensions in the two different strings be different, even though tension is the same throughout any single string? (2 steps)", "answer": "- Step 1: Each separate string has its own tension. If particle P is connected to an upper string (tension $$T_1$$) and a lower string (tension $$T_2$$) via a pulley or connection point, $$T_1$$ and $$T_2$$ are independent — they are tensions in different strings.\n- Step 2: Within any ONE string, tension is uniform (for a light, inextensible string over a smooth pulley). But the connection point (e.g., a pulley or a knot) can have different strings attached, each with its own tension. The key is: \"same string = same tension; different strings = different tensions.\"", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "Conceptually, why does the tension in a string over a smooth pulley remain constant, even when the masses on each side are different? (2 steps)", "answer": "- Step 1: Tension is a force transmitted through the string. If the pulley is smooth (frictionless), there is nothing to \"grip\" the string and create a tension difference between the two sides. The string slides freely over the pulley, and the tension pulls equally on both segments.\n- Step 2: The different masses cause different net forces on each particle (leading to acceleration), but the tension itself is the same throughout. Think of it like a rope in a tug-of-war over a frictionless post: the rope transmits the same force to both sides, even though one team might be \"winning.\"\n\n+ If the pulley has mass (not light) or friction (not smooth), it can absorb or transmit different tensions. At M1 level, pulleys are always light and smooth unless stated otherwise.", "source": "GLM 5.1 ③", "_id": "glm_3_50"}, {"question": "After the string in Q25 is cut, particle A is still on the rough inclined plane. Explain what happens to A's motion and how to find its deceleration. (3 steps)", "answer": "- Step 1: When the string is cut, tension $$T$$ disappears. The only forces on A are now: weight component down the slope ($$2mg\\sin\\alpha$$), friction, and normal reaction. Since A was moving up, it will decelerate (gravity and friction both act down the slope while A moves up).\n- Step 2: While A is still moving UP: $$-2mg\\sin\\alpha - \\mu(2mg\\cos\\alpha) = 2ma$$ (both forces oppose motion). This gives a large negative acceleration (deceleration).\n- Step 3: Eventually A comes to rest. Then check: is $$2mg\\sin\\alpha > \\mu(2mg\\cos\\alpha)$$? If yes (i.e., $$\\tan\\alpha > \\mu$$), A will start sliding back DOWN, and friction now acts UP the slope. The acceleration down the slope would be $$g\\sin\\alpha - \\mu g\\cos\\alpha$$.\n\nKey insight: Friction direction depends on the direction of motion, which can change after the string is cut.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "(Limiting case) A particle on a rough horizontal surface is pulled by a horizontal force $$P$$. As the angle of pull $$\\theta$$ above the horizontal increases from $$0°$$ to $$90°$$, describe conceptually how the maximum sustainable $$P$$ before slipping changes and why there is a trade-off. (3 steps)", "answer": "- Step 1: Vertically: $$R = mg - P\\sin\\theta$$. As $$\\theta$$ increases, the lift component increases, reducing $$R$$ and thus the maximum friction $$\\mu R$$.\n- Step 2: Horizontally: the propulsive component is $$P\\cos\\theta$$. At $$\\theta = 0°$$, propulsion is maximised but so is $$R$$. At $$\\theta = 90°$$, propulsion is zero.\n- Step 3: There is a trade-off: increased angle reduces friction (good) but also reduces forward pull (bad). In M1 problems with a specific angle, you solve $$P\\cos\\theta = \\mu(mg - P\\sin\\theta)$$ for the limiting $$P$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_36"}, {"question": "A box is pushed along a rough floor at constant speed. The coefficient of friction is μ. If the push force is at angle θ above the horizontal, how does the normal reaction change compared to when the force is horizontal? (1 step)", "answer": "When the force has an **upward component**, it reduces the normal reaction: R = mg - P·sinθ. This is **smaller than mg**, which in turn reduces the frictional force (F = μR). Therefore, less horizontal force is needed to maintain constant speed.", "source": "MiniMax ①", "_id": "minimax_1_41"}, {"question": "A particle is pulled along a rough horizontal plane at constant speed by a rope inclined at angle $$θ$$ above the horizontal. Explain why the normal reaction is less than $$mg$$, and how this affects the friction force. (3 steps)", "answer": "- Step 1: Resolve vertically. The forces are weight $$mg$$ down, normal reaction $$R$$ up, and vertical component of tension $$T\\sin\\theta$$ up. Since there is no vertical acceleration: $$R + T\\sin\\theta = mg$$, so $$R = mg - T\\sin\\theta$$.\n- Step 2: The tension helps support the particle, reducing the contact force with the plane. Because friction is $$F = \\mu R$$ at limiting equilibrium, a smaller $$R$$ means a smaller maximum possible friction.\n- Step 3: Horizontally, at constant speed: $$T\\cos\\theta = F = \\mu R = \\mu(mg - T\\sin\\theta)$$. The upward pull simultaneously propels the particle forward and reduces the grip needed to prevent sinking.", "source": "Kimi K2.6 ②", "_id": "kimi_2_16"}, {"question": "If acceleration is not constant but varies with time, you cannot use $$v = u + at$$. Explain how to find the change in velocity from an acceleration-time ($$a$$-$$t$$) graph. (2 steps)", "answer": "- Step 1: By Newton's Second Law, $$a = \\frac{dv}{dt}$$. Therefore, the change in velocity $$\\Delta v$$ is the integral of acceleration with respect to time.\n- Step 2: Graphically, the integral of $$a$$ with respect to $$t$$ is the area under the $$a$$-$$t$$ graph. You calculate the area for each time interval (trapeziums, triangles, rectangles) to find the velocity at the end of each stage.\n\nTakeaway: Area under a-t graph = change in velocity; Area under v-t graph = change in displacement.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "(Connected Particles) Why is tension the same on both sides of a smooth, light pulley? (2 steps)", "answer": "- Step 1: **Smooth pulley** implies no friction, so no force opposes rotation.  \n- Step 2: **Light string** (massless) ensures tension balances across the pulley to maintain equilibrium.  \n\n**Takeaway:** Tension equality is a consequence of the idealized assumptions (smooth pulley, inextensible string).", "source": "Qwen 3 ③", "_id": "qwen_3_2"}, {"question": "Why does acceleration stay the same throughout an inextensible string?", "answer": "- Step 1: Inextensible means length doesn't change → all particles in string move same distance in same time.\n- Step 2: If one end accelerates, the other end must accelerate equally (a₁ = a₂).\n+ Example: Two masses over pulley → both have same acceleration magnitude.\n\n**Takeaway:** Inextensibility ensures synchronized motion → equal acceleration.", "source": "Qwen 3 ②", "_id": "qwen_2_12"}, {"question": "A ball is thrown vertically downward with speed 24 m/s from a height of 2.5 m. Find the speed at the bottom using SUVAT, carefully handling the sign of $$g$$. (3 steps)", "answer": "- Step 1: Take downward as positive. Then $$u = +24$$ m/s, $$a = +g = +9.8$$ m/s², $$s = +2.5$$ m. We want $$v$$.\n- Step 2: Use $$v^2 = u^2 + 2as = 24^2 + 2(9.8)(2.5) = 576 + 49 = 625$$.\n- Step 3: $$v = \\sqrt{625} = 25$$ m/s (taking the positive root since the ball is moving downward). The ball gains 1 m/s from the 2.5 m fall, from 24 to 25 m/s.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "A particle collides with a fixed peg and rebounds. How do you calculate the impulse exerted on the peg, and why is it not simply the change in momentum of the peg? (3 steps)", "answer": "- Step 1: Impulse is the change in momentum of the object the impulse acts on. The particle experiences an impulse $$I = m(v - u)$$ from the peg.\n- Step 2: By Newton's Third Law, the peg experiences an equal and opposite impulse from the particle. So, Impulse on peg = $$-I = m(u - v)$$.\n- Step 3: The peg is fixed, so its velocity is zero before and after. Its change in momentum is zero. However, the *internal forces* between the wall/Earth and the peg provide the necessary impulse to keep it fixed, balancing the particle's impulse. We calculate the magnitude as $$|m(v-u)|$$.\n\nTakeaway: Impulse on a fixed object is calculated via Newton's 3rd Law from the moving object.", "source": "GLM 5.1 ②", "_id": "glm_2_27"}, {"question": "An acceleration-time graph shows acceleration changing at $$t = 4$$ s. Explain why you cannot use a single SUVAT equation for the entire motion, and what method you must use instead. (3 steps)", "answer": "- Step 1: SUVAT equations assume CONSTANT acceleration throughout the interval. If acceleration changes (e.g., at $$t = 4$$ s), no single SUVAT equation can describe the full motion from $$t = 0$$ to the end.\n- Step 2: Instead, use the area under the a-t graph. The area under the acceleration-time graph between two times gives the change in velocity: $$\\Delta v = \\int a\\,dt = \\text{area under } a\\text{-}t \\text{ graph}$$.\n- Step 3: Split the motion into regions where acceleration is constant (or where the area is easy to calculate). For each region, find the area to get the velocity change, then accumulate to find velocity at any time. For displacement, you would need the area under the v-t graph (which you construct first).\n\nKey rule: Area under a-t graph = change in velocity. Area under v-t graph = change in displacement.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "(Conceptual) A student calculates the minimum separation between two ships and finds a negative value for the minimising time $$t$$. What does this imply physically, and how should the answer be interpreted? (2 steps)", "answer": "- Step 1: A negative $$t$$ means the minimum separation would have occurred in the past (before $$t=0$$). Since the model is only valid for $$t \\ge 0$$, the actual minimum separation within the valid domain occurs at the boundary $$t = 0$$.\n- Step 2: Therefore, the ships are already separating at $$t=0$$; the closest they get during the observed motion is at the start. Always check whether the critical point lies within the physically meaningful time interval.", "source": "Kimi K2.6 ②", "_id": "kimi_2_42"}, {"question": "When a particle is in **limiting equilibrium** on a rough inclined plane, and an additional force is applied up the plane, how does the friction direction change? (3 steps)", "answer": "- Step 1: In limiting equilibrium without the applied force, the particle is about to slide DOWN. Friction acts UP the plane. $$mg\\sin\\alpha = \\mu mg\\cos\\alpha$$.\n- Step 2: When an additional force is applied UP the plane, it helps support the particle. The particle no longer tends to slide down, so friction may decrease or even reverse direction.\n- Step 3: If the applied force is large enough, the particle would tend to slide UP (without friction). Then friction acts DOWN the plane to oppose this tendency. The transition point is where the applied force exactly balances the weight component: $$F_{\\text{applied}} = mg\\sin\\alpha$$, and friction = 0.\n\n+ Friction always opposes the TENDENCY of motion, not a fixed direction. As the applied force increases from zero, friction decreases (less tendency to slide down), reaches zero (no tendency), then increases in the opposite direction (tendency to slide up).", "source": "GLM 5.1 ③", "_id": "glm_3_82"}, {"question": "When solving a connected particles problem with a pulley, a student writes one equation: $$(m_2 - m_1)g = (m_1 + m_2)a$$. This gives the correct acceleration. Why is this equation valid, and what are its limitations? (2 steps)", "answer": "- Step 1: This equation is valid because it applies Newton's 2nd Law to the entire system. The net external force (difference in weights) equals the total mass times acceleration. The tension is an internal force and cancels out (it pulls one mass up and the other down by the same amount).\n- Step 2: The limitation is that this equation alone cannot find the tension $$T$$. Since $$T$$ is internal, it doesn't appear in the whole-system equation. To find $$T$$, you MUST write a separate F = ma equation for one of the individual particles, substitute the known acceleration, and solve for $$T$$.", "source": "GLM 5.1 ①", "_id": "glm_1_68"}, {"question": "Explain what is meant by \"terminal velocity\" in the context of a falling object with air resistance. When does it occur? (2 steps)", "answer": "- Step 1: What terminal velocity means\n  + Terminal velocity is the constant speed reached when air resistance equals the weight.\n  + At this point, net force = 0, so acceleration = 0.\n  + The object continues falling at constant speed.\n\n- Step 2: When it occurs\n  + Air resistance typically increases with speed (R = kv or R = cv²).\n  + Initially, weight > resistance → acceleration downward.\n  + As speed increases, resistance increases.\n  + Eventually resistance = weight → equilibrium → constant velocity.\n  + In the skydiver problem: after parachute opens, resistance jumps (3200 N > weight 2450 N), causing upward acceleration (deceleration), then settling to new terminal velocity.\n\nTerminal velocity is the equilibrium between driving force (gravity) and resisting force (drag)—the speed at which forces balance.", "source": "MiniMax ②", "_id": "minimax_2_57"}, {"question": "A car tows a trailer. Explain conceptually why the tension in the tow bar is an internal force for the whole system but an external force when analysing the trailer alone, and how this affects deceleration after the tow bar breaks. (3 steps)", "answer": "- Step 1: For the **whole system** (car + trailer), the tow-bar tension is internal: the forward pull on the trailer is matched by a backward pull on the car. Internal forces cancel in $$F=ma$$ for the combined mass.\n- Step 2: For the **trailer alone**, the tension is an external forward force. When the bar breaks, that forward force disappears. The trailer is now subject only to external resistances (e.g., friction, weight component if inclined) which act opposite to its motion.\n- Step 3: After the break, the trailer's deceleration is found from the sum of all resisting forces alone: $$\\sum F_{\\text{resist}} = m_{\\text{trailer}} a$$. You must not forget any resistance that was previously balanced by tension.", "source": "Kimi K2.6 ②", "_id": "kimi_2_10"}, {"question": "(SUVAT) Why can’t you use the SUVAT equation $ v^2 = u^2 + 2as $ for the entire motion of a parachutist who free-falls for 5 seconds then opens their parachute? (3 steps)", "answer": "- Step 1: SUVAT equations only apply to **constant acceleration**.  \n- Step 2: In the first 5 seconds, acceleration is $ g $ (free fall). After parachute opens, air resistance increases, making acceleration **non-uniform**.  \n- Step 3: The equation $ v^2 = u^2 + 2as $ assumes a single constant acceleration, so it cannot model the entire motion with changing acceleration.  \n\n**Takeaway:** Always check for uniform acceleration before applying SUVAT equations.", "source": "Qwen 3 ③", "_id": "qwen_3_0"}, {"question": "A particle is at rest on a rough inclined plane. The plane angle is increased until the particle just begins to slide. What is the relationship between the angle and $$\\mu$$ at this point? (2 steps)", "answer": "- Step 1: At the point of slipping, friction is limiting: $$F = \\mu R$$. The forces along the plane balance: $$mg\\sin\\alpha = F = \\mu R$$. The forces perpendicular to the plane balance: $$R = mg\\cos\\alpha$$.\n- Step 2: Substituting: $$mg\\sin\\alpha = \\mu mg\\cos\\alpha$$, so $$\\mu = \\tan\\alpha$$. The angle at which the particle just begins to slide is called the **angle of friction**, and it satisfies $$\\mu = \\tan\\alpha$$. Measuring this angle is one way to experimentally determine $$\\mu$$.\n\n+ This is a clean, memorable result. If $$\\mu = 0.5$$, the angle of friction is $$\\arctan(0.5) \\approx 26.6°$$. Any incline steeper than 26.6° will cause sliding; shallower inclines won't.", "source": "GLM 5.1 ③", "_id": "glm_3_78"}, {"question": "In a moments problem, a student takes moments about point C and gets an answer. Another student takes moments about point D and gets a different answer for the same unknown. What must be true, and what is the likely source of error? (2 steps)", "answer": "- Step 1: In equilibrium, the sum of moments about ANY point must be zero. So taking moments about different points should give the same answer for any unknown. If the answers differ, there is an error in one (or both) of the moment equations.\n- Step 2: The most likely source of error is a sign mistake — assigning a clockwise moment as anticlockwise or vice versa. Other possibilities: using the wrong perpendicular distance, forgetting a force entirely, or making an algebraic error when collecting terms. Always double-check by taking moments about a different point as a verification.", "source": "GLM 5.1 ①", "_id": "glm_1_76"}, {"question": "A smooth bead is threaded on a rough wire. How does the normal reaction direction differ from a particle on a rough surface? (2 steps)", "answer": "- Step 1: On a flat surface, the normal reaction is always perpendicular to the surface (vertically upward for a horizontal surface). On a wire or rod at an angle, the normal reaction is perpendicular to the wire/rod, not necessarily vertical.\n- Step 2: For a bead on an inclined wire, the normal reaction is perpendicular to the wire. Friction acts along the wire (opposing motion or tendency of motion). You must resolve forces along and perpendicular to the wire, not horizontally and vertically.\n\n+ This is why rod-in-equilibrium problems require resolving along and perpendicular to the rod — the normal reaction and friction are naturally expressed in these directions.", "source": "GLM 5.1 ③", "_id": "glm_3_49"}, {"question": "What does \"**inextensible string**\" physically mean, and what two consequences does it have for the motion of connected particles? (2 steps)", "answer": "- Step 1: \"Inextensible\" means the string cannot stretch or compress — its length is fixed. This means that if one end moves, the other end must move by exactly the same distance in the same time.\n- Step 2: The two consequences are: (1) **Same acceleration**: both connected particles have the same magnitude of acceleration at all times. (2) **Same speed**: if the string is taut, both particles move at the same speed. If the string goes slack, these constraints no longer apply — the particles move independently until the string becomes taut again.\n\n+ Edge case: if a string breaks, the particles are no longer connected and each moves under its own forces independently — they may have different accelerations.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "A particle of mass m moving at speed u collides with a stationary particle of same mass. The collision has coefficient of restitution e. Find their speeds after collision. (3 steps)", "answer": "- Step 1: Conservation of momentum\n  + Before: m·u + m·0 = m·u\n  + After: m·v₁ + m·v₂ = m(v₁ + v₂)\n  + So: v₁ + v₂ = u  (Equation 1)\n\n- Step 2: Coefficient of restitution\n  + Approach speed = u - 0 = u\n  + Separation speed = v₂ - v₁\n  + e = (v₂ - v₁)/u → v₂ - v₁ = eu  (Equation 2)\n\n- Step 3: Solve the two equations\n  + Adding (1) and (2): 2v₂ = u + eu → v₂ = u(1 + e)/2\n  + Subtracting (2) from (1): 2v₁ = u - eu → v₁ = u(1 - e)/2\n  + For e = 1 (elastic): v₁ = 0, v₂ = u (they exchange velocities).\n  + For e = 0 (inelastic): v₁ = v₂ = u/2 (they stick and move together).\n\nThis is a standard result: for equal masses, an elastic collision (e = 1) causes complete velocity exchange.", "source": "MiniMax ②", "_id": "minimax_2_24"}, {"question": "(Conceptual recall) State the exact meaning of a \"smooth\" surface, a \"rough\" surface, and a \"light\" object in M1 modelling assumptions, and explain why each assumption simplifies the mathematics. (3 steps)", "answer": "- Step 1: **Smooth**: no friction force acts ($$F = 0$$). This removes the inequality $$F \\le \\mu R$$ and the unknown friction direction from the model.\n- Step 2: **Rough**: friction may act up to $$\\mu R$$. This introduces a force opposing motion and allows limiting equilibrium analysis.\n- Step 3: **Light**: mass is negligible ($$m \\approx 0$$), so no force is needed to accelerate the object itself. For a light pulley, this means no rotational inertia, so tension is equal on both sides. For a light string, tension is uniform along its length.", "source": "Kimi K2.6 ②", "_id": "kimi_2_45"}, {"question": "A particle on a rough surface is pulled by a force at angle $$\\theta$$. What is the condition for the **maximum pulling force** before the particle slips, and how do you find it? (3 steps)", "answer": "- Step 1: The particle is on the point of slipping when friction is **limiting**: $$F = \\mu R$$ (not $$F < \\mu R$$). This is the boundary condition.\n- Step 2: Set up the two equilibrium equations (assuming constant speed or rest): Horizontal: $$P\\cos\\theta = \\mu R$$. Vertical: $$R + P\\sin\\theta = mg$$, so $$R = mg - P\\sin\\theta$$.\n- Step 3: Substitute: $$P\\cos\\theta = \\mu(mg - P\\sin\\theta)$$. Expand: $$P\\cos\\theta + \\mu P\\sin\\theta = \\mu mg$$. Factor: $$P(\\cos\\theta + \\mu\\sin\\theta) = \\mu mg$$. So $$P = \\frac{\\mu mg}{\\cos\\theta + \\mu\\sin\\theta}$$. Any force larger than this causes slipping.\n\n+ With $$\\mu = 1/4$$, $$\\sin\\theta = 4/5$$, $$\\cos\\theta = 3/5$$: $$P = \\frac{mg/4}{3/5 + (1/4)(4/5)} = \\frac{mg/4}{3/5 + 1/5} = \\frac{mg/4}{4/5} = \\frac{5mg}{16}$$. This is the maximum force before slipping.", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "(Misconception probe) In a connected particle system over a pulley, a student assumes $$T_1 \\neq T_2$$ because the masses are different. Explain why $$T_1 = T_2$$ for a light, smooth pulley despite unequal masses. (2 steps)", "answer": "- Step 1: A smooth pulley exerts no tangential friction on the string, so there is no mechanism to change the tension as the string passes over it. Therefore, tension is transmitted unchanged from one side to the other.\n- Step 2: The difference in masses is what creates the **net force** and hence acceleration ($$m_2 g - m_1 g = (m_1 + m_2)a$$), not a difference in tension. If the pulley had mass or friction, tensions could differ.", "source": "Kimi K2.6 ②", "_id": "kimi_2_34"}, {"question": "In a one-dimensional head-on collision, how do you infer whether a particle reverses direction after impact without knowing the coefficient of restitution, using only conservation of momentum and physical constraints? (3 steps)", "answer": "- Step 1: Establish a positive direction and write $$m_1u_1 + m_2u_2 = m_1v_1 + m_2v_2$$ with correct signs. If the objects approach each other, one initial velocity is negative relative to the other.\n- Step 2: After solving for the unknown velocity (or using the given information), apply the physical constraint that solid particles **cannot pass through each other**. If A continues forward ($$v_1 > 0$$), B must be projected forward faster than A to avoid overlap.\n- Step 3: If the algebra yields $$v_1 < 0$$, A has reversed. If your solution implies the particles are still approaching after collision ($$v_2 < v_1$$ with inappropriate signs), that solution is physically inadmissible. The valid post-collision state has them separating.", "source": "Kimi K2.6 ②", "_id": "kimi_2_5"}, {"question": "The displacement vector from A to B is $$\\mathbf{AB} = (10 - 24t)\\mathbf{i} + (12t - 15)\\mathbf{j}$$. Setting each component to zero gives $$t = \\frac{5}{12}$$ from the i-component and $$t = \\frac{5}{4}$$ from the j-component. What conclusion do you draw? (2 steps)", "answer": "- Step 1: Since $$\\frac{5}{12} \\neq \\frac{5}{4}$$, there is no single time at which both components are zero simultaneously. The particles do NOT collide.\n- Step 2: At $$t = \\frac{5}{12}$$, the particles have the same East-West position (same i-coordinate) but different North-South positions. At $$t = \\frac{5}{4}$$, they have the same North-South position but different East-West positions. They \"cross paths\" at different times — like two ships passing through the same longitude and latitude at different moments.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "When a slack string between two particles becomes taut, how do you calculate the **impulse** exerted on the particle that was already moving? What sign convention should you use? (3 steps)", "answer": "- Step 1: Impulse on a particle equals its **change in momentum**: $$I = \\Delta(mv) = m(v_{\\text{after}} - v_{\\text{before}})$$.\n- Step 2: For particle A (mass $$m$$, initial speed $$U$$, final speed $$U/4$$): $$I_A = m(U/4 - U) = m(-3U/4) = -3mU/4$$.\n- Step 3: The **negative sign** means the impulse on A acts in the opposite direction to its initial motion (it slows A down). The magnitude is $$3mU/4$$. By Newton's 3rd Law, the impulse on B is equal and opposite: $$+3mU/4$$ (speeding B up in A's direction).\n\nTakeaway: Impulse on the initially-moving particle is always negative (opposing its motion) — it loses momentum to the other particle.", "source": "GLM 5.1 ③", "_id": "glm_3_1"}, {"question": "What is the **impulse-momentum theorem**, and how do you apply it to find the impulse on an object during a collision? (2 steps)", "answer": "- Step 1: Impulse = change in momentum: $$I = m(v - u)$$, where $$u$$ is initial velocity and $$v$$ is final velocity (taking direction into account with signs). Impulse is a vector quantity measured in Ns (newton-seconds).\n- Step 2: For a collision with a fixed object (like a peg), the impulse on the peg equals the change in momentum of the particle but in the opposite direction (Newton's 3rd Law). If a particle of mass $$m$$ hits a peg at speed $$u$$ and rebounds at speed $$v$$: impulse on particle = $$m(-v - u) = -m(u+v)$$ (opposing initial direction), and impulse on peg = $$+m(u+v)$$.\n\n+ Key: impulse on the particle is always in the direction that changes its momentum. If it slows down or reverses, the impulse opposes its initial motion.", "source": "GLM 5.1 ③", "_id": "glm_3_33"}, {"question": "(Conceptual) When a particle is in equilibrium under three forces, how does Lami's theorem relate the forces to the angles between them, and why is it equivalent to resolving? (2 steps)", "answer": "- Step 1: Lami's theorem states $$\\frac{F_1}{\\sin\\alpha} = \\frac{F_2}{\\sin\\beta} = \\frac{F_3}{\\sin\\gamma}$$, where $$\\alpha$$ is the angle opposite $$F_1$$, etc. It arises from the vector triangle of forces and the sine rule.\n- Step 2: It is equivalent to resolving because both are consequences of the same vector sum being zero. Lami's theorem is often faster when three forces and their mutual angles are known, while resolving is more general for any number of forces.", "source": "Kimi K2.6 ②", "_id": "kimi_2_46"}, {"question": "A force vector is expressed as $$\\mathbf{F} = a\\mathbf{i} + b\\mathbf{j}$$. How do you determine the angle this resultant makes with the positive $$\\mathbf{i}$$-axis, and why is checking the quadrant essential? (3 steps)", "answer": "- Step 1: The acute reference angle $$α$$ satisfies $$\\tan α = \\left| \\frac{b}{a} \\right|$$. However, this only gives the angle relative to the nearest horizontal axis and lies in $$(-90°, 90°)$$.\n- Step 2: You must inspect the signs of $$a$$ and $$b$$ to identify the quadrant. If $$a < 0$$ and $$b > 0$$, the vector lies in the second quadrant, so the true angle measured anticlockwise from the positive $$\\mathbf{i}$$-axis is $$180° - α$$, not simply $$α$$.\n- Step 3: For example, $$\\mathbf{F} = -8\\mathbf{i} + 15\\mathbf{j}$$ has reference angle $$\\arctan(15/8)$$, but the true angle from $$\\mathbf{i}$$ is $$180° - \\arctan(15/8)$$ because it points left and up. Failing to add the quadrant correction leads to bearings and directions that are $$180°$$ out.", "source": "Kimi K2.6 ②", "_id": "kimi_2_2"}, {"question": "In a connected particles problem over a pulley, the whole-system equation is $$(m_B - m_A)g = (m_A + m_B)a$$. Explain the physical meaning of each part of this equation. (2 steps)", "answer": "- Step 1: The left side $$(m_B - m_A)g$$ is the net driving force — the difference in weights. If B is heavier, the net force pulls B down and A up. This is the only external force causing the system to accelerate (tension is internal and cancels).\n- Step 2: The right side $$(m_A + m_B)a$$ is the total mass times acceleration. Newton's 2nd Law for the whole system: net external force = total mass × acceleration. This equation only works for finding $$a$$; to find $$T$$, you must use an individual particle's equation.", "source": "GLM 5.1 ①", "_id": "glm_1_55"}, {"question": "A particle of mass $$m$$ is on the point of slipping down a rough plane inclined at angle $$\\alpha$$. A horizontal force $$P$$ is applied to prevent slipping. Explain why the normal reaction changes when $$P$$ is applied, and derive the new expression for $$R$$. (3 steps)", "answer": "- Step 1: Without $$P$$, the normal reaction balances only the perpendicular component of weight: $$R = mg\\cos\\alpha$$. When $$P$$ is applied horizontally, it has a component perpendicular to the slope that pushes the particle INTO the surface.\n- Step 2: Resolving perpendicular to the slope: $$R = mg\\cos\\alpha + P\\sin\\alpha$$. The horizontal force $$P$$ has a component $$P\\sin\\alpha$$ perpendicular to the slope (pushing into the surface), increasing the normal reaction.\n- Step 3: This is important because the maximum friction force $$F_{max} = \\mu R$$ now increases. The applied force both prevents sliding directly (via its component up the slope, $$P\\cos\\alpha$$) and indirectly (by increasing $$R$$ and hence $$F_{max}$$). Both effects help prevent slipping.", "source": "GLM 5.1 ①", "_id": "glm_1_75"}, {"question": "In the conservation of momentum equation $$m_1u_1 + m_2u_2 = m_1v_1 + m_2v_2$$, what are the assumptions, and when does conservation of momentum NOT apply? (2 steps)", "answer": "- Step 1: The assumptions are: (1) The system is isolated — no external forces act on the system of particles. (2) The collision is instantaneous (or we consider the moment just before and just after, so external forces like gravity have no time to act). (3) The objects don't break apart or merge (unless it's a perfectly inelastic collision, in which case they stick together).\n- Step 2: Momentum conservation does NOT apply when: (1) There is a significant external impulse during the collision (e.g., one particle is also attached to a spring). (2) The \"collision\" is actually a gradual process over time with external forces. (3) Relativistic speeds (beyond M1 scope).\n\n+ In most M1 problems, momentum IS conserved during collisions and \"string becoming taut\" events because these are instantaneous. But momentum is NOT conserved for a particle sliding on a rough surface over time (friction is an external force acting over a duration).", "source": "GLM 5.1 ③", "_id": "glm_3_83"}, {"question": "A particle of mass m collides with a stationary particle of mass km (where k > 1). After a perfectly inelastic collision (e = 0), what fraction of the initial kinetic energy is lost? (3 steps)", "answer": "- Step 1: Find final velocity\n  + Conservation of momentum: m·u + km·0 = (m + km)v\n  + v = u/(1 + k)\n\n- Step 2: Calculate initial KE\n  + KE_initial = ½ m u²\n\n- Step 3: Calculate final KE and loss\n  + KE_final = ½ (m + km) v² = ½ m(1 + k) × [u²/(1 + k)²] = ½ m u² × [1/(1 + k)]\n  + = (1/(1 + k)) × KE_initial\n  + Fraction lost = 1 - 1/(1 + k) = k/(1 + k)\n\nFor k = 1 (equal masses): half the KE is lost. For k = 3 (heavy target): 3/4 of KE is lost. More mass difference → more energy lost in inelastic collisions.", "source": "MiniMax ②", "_id": "minimax_2_38"}, {"question": "A force $$P$$ is applied to a block on a rough surface at an angle $$\\theta$$. As $$P$$ increases, the block eventually slips. Explain the two competing effects of increasing $$P$$ on the maximum available friction. (3 steps)", "answer": "- Step 1: The maximum static friction is $$F_{max} = \\mu R$$. We need to see how $$P$$ affects $$R$$.\n- Step 2: Resolving vertically: $$R + P\\sin\\theta = mg \\rightarrow R = mg - P\\sin\\theta$$. As $$P$$ increases, the upward pull increases, so $$R$$ decreases.\n- Step 3: Because $$R$$ decreases, $$F_{max}$$ decreases. However, the horizontal pulling force $$P\\cos\\theta$$ increases. Slipping occurs when the required friction $$P\\cos\\theta$$ exceeds the maximum available friction $$\\mu(mg - P\\sin\\theta)$$.\n\nTakeaway: Pulling harder increases the driving force but decreases the available grip.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "In a collision problem, when should you use conservation of momentum alone versus using both momentum AND coefficient of restitution? (2 steps)", "answer": "- Step 1: Momentum conservation applies ALWAYS\n  + In any collision (whether elastic or inelastic), total momentum is conserved.\n  + This gives one equation: m₁u₁ + m₂u₂ = m₁v₁ + m₂v₂.\n\n- Step 2: When to use coefficient of restitution\n  + Use e when you need a second equation relating the velocities.\n  + This happens when you have two unknowns (v₁ and v₂) and only one momentum equation.\n  + The restitution equation: e = (v₂ - v₁)/(u₁ - u₂).\n  + Two equations + two unknowns = solvable.\n\nIf you're given e (or can infer it), you always need both equations. If e is not given but you're told the objects \"stick together\" (perfectly inelastic), then v₁ = v₂, giving you the second equation implicitly.", "source": "MiniMax ②", "_id": "minimax_2_37"}, {"question": "Two particles A and B have position vectors as functions of time. Explain the method to determine whether they collide. What condition must be satisfied? (3 steps)", "answer": "- Step 1: Form the displacement vector from A to B: $$\\mathbf{AB} = \\mathbf{r}_B - \\mathbf{r}_A = (a_1 + b_1 t)\\mathbf{i} + (a_2 + b_2 t)\\mathbf{j}$$, where the coefficients come from subtracting the position vectors.\n- Step 2: For a collision, both particles must be at the SAME point at the SAME time. This means BOTH the $$\\mathbf{i}$$-component and the $$\\mathbf{j}$$-component of $$\\mathbf{AB}$$ must be zero simultaneously.\n- Step 3: Set the i-component = 0 and solve for $$t$$. Set the j-component = 0 and solve for $$t$$. If both give the SAME value of $$t$$, the particles collide. If they give DIFFERENT values of $$t$$, there is no collision — the particles are at the same East-West position at one time and the same North-South position at a different time, but never both simultaneously.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "A particle hangs in equilibrium supported by two strings. One string is horizontal with tension $$T_1$$, the other is at angle $$\\theta$$ to the vertical with tension $$T_2$$. Explain how to find the unknown tension and mass by resolving. (3 steps)", "answer": "- Step 1: Resolve **horizontally**: the only horizontal forces are $$T_1$$ and the horizontal component of $$T_2$$. Equilibrium gives $$T_1 = T_2 \\sin\\theta$$ (assuming $$\\theta$$ is measured from the vertical).\n- Step 2: Resolve **vertically**: the vertical component of $$T_2$$ balances the weight: $$T_2\\cos\\theta = mg$$.\n- Step 3: If $$T_1$$ is known, divide the horizontal equation by the vertical to eliminate $$T_2$$ and solve for $$mg$$, or solve for $$T_2$$ first from the horizontal equation and substitute. The key is identifying which component involves sine and which cosine relative to the stated angle.", "source": "Kimi K2.6 ②", "_id": "kimi_2_50"}, {"question": "A particle on a rough inclined plane (angle $$\\alpha$$, coefficient $$\\mu$$) slides DOWN the plane. Derive the expression for its acceleration and explain each term. (3 steps)", "answer": "- Step 1: The component of weight parallel to the slope (downward) is $$mg\\sin\\alpha$$. This drives the particle down the slope.\n- Step 2: Friction opposes the motion, so it acts UP the slope. The friction force is $$\\mu N = \\mu mg\\cos\\alpha$$ (where $$N = mg\\cos\\alpha$$ is the normal reaction on a slope with no other vertical forces).\n- Step 3: By F = ma along the slope (taking down-slope as positive): $$mg\\sin\\alpha - \\mu mg\\cos\\alpha = ma$$, so $$a = g\\sin\\alpha - \\mu g\\cos\\alpha = g(\\sin\\alpha - \\mu\\cos\\alpha)$$. The particle accelerates down only if $$\\sin\\alpha > \\mu\\cos\\alpha$$, i.e., $$\\tan\\alpha > \\mu$$.", "source": "GLM 5.1 ①", "_id": "glm_1_27"}, {"question": "(Synthesis) A car and trailer system moves up an incline. The engine provides a driving force. Explain how to find the tension in the tow bar and the acceleration of the system by treating the system as a whole and then isolating one part. (3 steps)", "answer": "- Step 1: **Whole system**: the tension is internal and cancels. The net external force is driving force minus total weight component minus total resistance. Apply $$F_{\\text{net}} = (M_{\\text{car}} + M_{\\text{trailer}})a$$ to find acceleration.\n- Step 2: **Isolate trailer**: forces are tension $$T$$ forward, weight component down slope, and resistance backward. Apply $$T - (\\text{trailer resistances}) = M_{\\text{trailer}} a$$.\n- Step 3: Substitute the known acceleration to solve for $$T$$. Alternatively, isolate the car to get an equation involving driving force and $$T$$; subtracting the trailer equation yields the same result.", "source": "Kimi K2.6 ②", "_id": "kimi_2_38"}, {"question": "For a light, inextensible string passing over a smooth pulley, explain why the tension has the same magnitude on both sides and why the accelerations of the two particles have equal magnitude. (3 steps)", "answer": "- Step 1: **Smooth pulley**: there is no friction at the axle or rim, so the tension does not change as the string passes over the pulley. Therefore $$T_1 = T_2 = T$$.\n- Step 2: **Light pulley**: the pulley has negligible mass, so no net torque is needed to accelerate it. If the pulley had mass, the tensions would differ to provide rotational torque $$I\\alpha$$.\n- Step 3: **Inextensible string**: the total length is constant. If one particle moves down by distance $$s$$, the other must move up by exactly $$s$$. Differentiating twice, their speeds and accelerations have equal magnitudes at every instant. This collapses the system to one unknown tension and one unknown acceleration magnitude.", "source": "Kimi K2.6 ②", "_id": "kimi_2_7"}, {"question": "(Misconception probe) A student writes: \"Bearings are measured anti-clockwise from North.\" Explain why this is wrong, give the correct convention, and state the bearing of a vector pointing due East using the correct convention. (1 step)", "answer": "Bearings are measured **clockwise** from North. The student’s convention describes standard mathematical polar angles (anti-clockwise from the positive x-axis), not navigational bearings. Confusing the two swaps sine and cosine in component calculations. Due East is bearing $$090°$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_32"}, {"question": "On a rough inclined plane, a particle A is connected by a string over a pulley to a hanging particle B. Explain how to decide the direction of the friction force on A when the system is released, and what changes if the string breaks. (3 steps)", "answer": "- Step 1: Friction always **opposes the direction of motion or attempted motion**. If B is heavy enough to pull A **up** the slope, A slides upward, so friction on A acts **down** the plane.\n- Step 2: Draw the force diagram for A: tension $$T$$ up the plane, component of weight $$mg\\sin\\alpha$$ down the plane, friction $$F$$ down the plane, normal reaction $$R = mg\\cos\\alpha$$ into the plane. The equation is $$T - mg\\sin\\alpha - F = ma$$.\n- Step 3: If the string breaks, tension vanishes. A now slides **down** the plane (assuming $$mg\\sin\\alpha > 0$$). Friction reverses to act **up** the plane, opposing the new motion: $$mg\\sin\\alpha - F = ma'$$. Friction only reverses when the velocity reverses.", "source": "Kimi K2.6 ②", "_id": "kimi_2_9"}, {"question": "In a connected particles problem with a pulley, particle A on a rough inclined plane and particle B hanging vertically, what is the systematic approach to find both the acceleration and the tension? (4 steps)", "answer": "- Step 1: Determine the direction of motion. Compare the weight of B ($$m_B g$$) with the component of A's weight down the slope plus maximum friction ($$m_A g\\sin\\alpha + \\mu m_A g\\cos\\alpha$$). If B is heavier \"effectively,\" B goes down and A goes u
