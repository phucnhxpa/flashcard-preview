$$t = 5/4$$.\n- Step 2: Physically, the particles cross the same $$x$$-coordinate at one time and the same $$y$$-coordinate at a different time. They \"miss\" each other — like two ships passing through the same latitude and longitude but at different times.\n\n+ The minimum distance between the particles occurs at some time between 5/12 and 5/4 (or possibly outside this range — you need to differentiate $$|AB|^2$$ to find exactly when).", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "A non-uniform rod of weight $$W$$ rests on two supports. One support reaction is known. How do you find the position of the centre of mass? (3 steps)", "answer": "- Step 1: Draw the diagram with the rod, both supports, the weight at unknown position $$x$$ from one end, and both reaction forces. Label all distances.\n- Step 2: Take moments about one support to eliminate one reaction. The moment equation involves the weight at distance $$x$$ and the other reaction at a known distance. Set clockwise = anti-clockwise.\n- Step 3: Solve for $$x$$. If you also need to verify, use vertical equilibrium ($$R_1 + R_2 = W$$) to check consistency.\n\n+ Example from notes: taking moments gives $$-24x + 56 = 0$$, so $$x = 56/24 = 7/3$$ m. The common error is collecting terms incorrectly — always expand each moment term fully before combining.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "What is the significance of the sign of the discriminant when checking if two particles collide using position vectors? (2 steps)", "answer": "- Step 1: Setting $$\\mathbf{r}_A = \\mathbf{r}_B$$ gives two equations (one for $$\\mathbf{i}$$, one for $$\\mathbf{j}$$). Each is linear in $$t$$. If both give the same $$t$$, collision occurs. If they give different values, no collision.\n- Step 2: This is NOT a discriminant problem (the equations are linear, not quadratic). However, when finding the **minimum distance**, you differentiate a quadratic in $$t$$, and the nature of the minimum depends on the positive coefficient of $$t^2$$ (always a minimum since $$b^2 + d^2 > 0$$).\n\n+ The collision check is simpler than students expect: just two linear equations. If they're consistent (same $$t$$), collision. If inconsistent, no collision. No quadratics needed for the collision check itself.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": true}, {"question": "When solving for the time a projectile reaches a certain height, you get a quadratic. What does each root represent, and what if the discriminant is negative? (2 steps)", "answer": "- Step 1: The two roots represent the two times the projectile passes through that height: once going up (smaller root) and once coming down (larger root). This only happens if the height is between the launch height and the maximum height.\n- Step 2: If the discriminant is negative, the projectile **never reaches** that height — it doesn't go high enough. If the discriminant is zero, the projectile just reaches that height at its apex (one repeated root).\n\n+ Example: if a ball is thrown at 24 m/s, max height = $$24^2/(2 \\times 9.8) \\approx 29.4$$ m. Any height above 29.4 m is unreachable (discriminant negative). At exactly 29.4 m, the ball just touches that height at the top of its path.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "A rod is hinged at one end and supported by a string at the other. How does the hinge reaction differ from a simple support reaction? (2 steps)", "answer": "- Step 1: A simple support (like a peg or table edge) only provides a **vertical** reaction force. A hinge can provide both a **horizontal and vertical** reaction force, because it prevents both vertical and horizontal movement at that point.\n- Step 2: This means a hinge problem has two unknown reaction components ($$R_H$$ and $$R_V$$) at the hinge, plus possibly a tension. You need moments and both force equilibrium equations ($$\\sum F_x = 0$$, $$\\sum F_y = 0$$) to solve for all unknowns.\n\n+ At M1 level, most problems use simple supports (single vertical reaction). If a hinge appears, be prepared for two reaction components.", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": true}, {"question": "In the formula $$a = g(\\sin\\alpha - \\mu\\cos\\alpha)$$ for a particle sliding down a rough inclined plane, what happens physically as $$\\mu$$ increases from 0 to $$\\tan\\alpha$$? (2 steps)", "answer": "- Step 1: When $$\\mu = 0$$ (smooth plane): $$a = g\\sin\\alpha$$ (maximum acceleration down the slope). As $$\\mu$$ increases, the friction term $$\\mu g\\cos\\alpha$$ grows, reducing the net acceleration.\n- Step 2: When $$\\mu = \\tan\\alpha$$: $$a = g(\\sin\\alpha - \\tan\\alpha\\cos\\alpha) = g(\\sin\\alpha - \\sin\\alpha) = 0$$. The particle is in limiting equilibrium. For $$\\mu > \\tan\\alpha$$: the formula gives $$a < 0$$, meaning the particle wouldn't slide at all from rest — friction is strong enough to hold it.\n\n+ This gives a clean physical picture: $$\\mu = 0$$ → free sliding, $$\\mu = \\tan\\alpha$$ → borderline, $$\\mu > \\tan\\alpha$$ → no sliding. The \"angle of friction\" $$\\phi = \\arctan\\mu$$ is the critical incline angle.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": true}, {"question": "In a connected particles problem, when should you use the **whole system equation** vs **separate particle equations**? (2 steps)", "answer": "- Step 1: Use the **whole system equation** (adding both F = ma equations) when you only need to find acceleration and both particles are connected by the same string. Tension cancels, giving: $$(\\text{net driving force}) - (\\text{net resisting force}) = (m_A + m_B)a$$.\n- Step 2: Use **separate particle equations** when you need to find the tension, or when the problem has additional complexity (different strings, friction on only one particle, or forces that don't cancel nicely). Always write separate equations if unsure — you can always add them later.\n\n+ Best practice: write separate equations for each particle FIRST, then add if you want to eliminate tension. This is safer than trying to write the whole-system equation directly, which risks missing forces.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "A particle is projected along a rough horizontal surface. How does friction affect the motion, and what is the deceleration? (2 steps)", "answer": "- Step 1: On a horizontal surface, there's no component of gravity along the surface. The only horizontal force is friction, which opposes the direction of motion. Normal reaction: $$R = mg$$ (no vertical acceleration).\n- Step 2: Deceleration: $$F = \\mu R = \\mu mg$$, so by F = ma: $$\\mu mg = ma$$, giving $$a = -\\mu g$$. The particle decelerates at a constant rate determined solely by $$\\mu$$ and $$g$$, independent of the particle's mass.\n\n+ Example: $$\\mu = 0.4$$ gives $$a = -0.4 \\times 9.8 = -3.92$$ m/s². A particle projected at 10 m/s stops in $$t = 10/3.92 \\approx 2.55$$ s, having travelled $$s = 10^2/(2 \\times 3.92) \\approx 12.8$$ m.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": false}, {"question": "How do you determine the **speed of a particle** given its velocity vector $$\\mathbf{v} = a\\mathbf{i} + b\\mathbf{j}$$, and how does this differ from velocity? (2 steps)", "answer": "- Step 1: Speed is the **magnitude** of the velocity vector: $$\\text{speed} = |\\mathbf{v}| = \\sqrt{a^2 + b^2}$$. Speed is a scalar (always positive), while velocity is a vector (has direction).\n- Step 2: The direction of velocity is given by the angle with the positive $$\\mathbf{i}$$-direction: $$\\theta = \\arctan(b/a)$$ (adjusting for quadrant). Speed tells you \"how fast,\" velocity tells you \"how fast and in which direction.\"\n\n+ Example: $$\\mathbf{v} = -3\\mathbf{i} + 4\\mathbf{j}$$. Speed = $$\\sqrt{9 + 16} = 5$$ m/s. Direction = $$\\arctan(4/(-3))$$ in the 2nd quadrant ≈ 126.9° from positive $$\\mathbf{i}$$-direction.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": true}, {"question": "When finding the minimum distance between two particles, you get $$|\\mathbf{d}|^2 = (3 + 2t)^2 + (1 - 4t)^2$$. Walk through the differentiation and interpretation. (3 steps)", "answer": "- Step 1: Expand: $$|\\mathbf{d}|^2 = 9 + 12t + 4t^2 + 1 - 8t + 16t^2 = 20t^2 + 4t + 10$$. Differentiate: $$\\frac{d}{dt}|\\mathbf{d}|^2 = 40t + 4$$.\n- Step 2: Set to zero: $$40t + 4 = 0$$, so $$t = -4/40 = -1/10$$. The minimum occurs at $$t = -0.1$$ s. If this is negative (before the observation period starts), the minimum distance within the valid time range occurs at $$t = 0$$.\n- Step 3: At $$t = -0.1$$: $$|\\mathbf{d}|^2 = 20(0.01) + 4(-0.1) + 10 = 0.2 - 0.4 + 10 = 9.8$$, so minimum distance = $$\\sqrt{9.8} \\approx 3.13$$ units. Since the coefficient of $$t^2$$ is positive (20 > 0), this is indeed a minimum.\n\n+ Always check if the critical point falls within the physically valid time range. If not, the minimum is at the boundary of the time interval.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "In an impulse problem, a ball of mass 0.2 kg hits a wall at 9 m/s and rebounds at 9 m/s. What is the impulse, and why is it NOT zero even though the speed is the same before and after? (2 steps)", "answer": "- Step 1: Impulse = change in momentum = $$m(v - u)$$. Taking the initial direction as positive: $$I = 0.2(-9 - 9) = 0.2 \\times (-18) = -3.6$$ Ns. The magnitude is 3.6 Ns.\n- Step 2: The impulse is NOT zero because **velocity** has changed direction, even though **speed** hasn't. Momentum is $$m\\mathbf{v}$$ (a vector), so a change in direction means a change in momentum. The wall exerts a force that reverses the ball's direction.\n\n+ Common error: thinking \"same speed = no impulse.\" Speed is a scalar; momentum and impulse are vectors. Direction matters! A 180° reversal at the same speed gives the maximum possible impulse for that speed.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": true}, {"question": "What are the conditions for a rod to be in **complete equilibrium**, and how many independent equations can you write? (2 steps)", "answer": "- Step 1: Complete equilibrium requires: (1) **Translational equilibrium**: net force is zero in any direction. This gives $$\\sum F_x = 0$$ and $$\\sum F_y = 0$$ (two equations). (2) **Rotational equilibrium**: net moment about any point is zero. This gives $$\\sum \\text{moments} = 0$$ (one equation, but it must hold about ANY point).\n- Step 2: You can write three independent equations: two force equations and one moment equation. Any additional moment equations are NOT independent — they can be derived from the three. Strategy: use the moment equation to eliminate one unknown, then use force equations for the rest.\n\n+ Choosing the moment pivot wisely (at a reaction force) eliminates that unknown from the moment equation, effectively giving you the information of a force equation \"for free.\"", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": true}, {"question": "A car accelerates uniformly from rest, while a motorbike starts later and accelerates uniformly. How do you set up the equation for when the motorbike catches the car using v-t graphs? (3 steps)", "answer": "- Step 1: Draw both v-t graphs on the same axes. The car's graph starts at $$t = 0$$ with a certain slope. The motorbike's graph starts at a later time $$t_0$$ with a steeper slope (greater acceleration).\n- Step 2: Distance = area under v-t graph. For the car: area from 0 to $$T$$ (trapezium or triangle + rectangle). For the motorbike: area from $$t_0$$ to $$T$$ (triangle or trapezium).\n- Step 3: Set the two areas equal (same distance = caught up) and solve for $$T$$. This typically gives a quadratic equation. The relevant solution is the one where $$T > t_0$$ (after the motorbike starts).\n\n+ The motorbike must have a greater acceleration to catch the car. At the catching point, the motorbike's speed may be greater than, equal to, or less than the car's speed — what matters is that the AREAS (distances) are equal, not the speeds.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": true}, {"question": "What is the difference between **limiting friction** and **static friction**, and when do you use $$F = \\mu R$$ vs $$F \\leq \\mu R$$? (2 steps)", "answer": "- Step 1: **Static friction** ($$F \\leq \\mu R$$) applies when the object is stationary but has a tendency to move. Friction matches the applied force up to a maximum of $$\\mu R$$. The object doesn't move until the applied force exceeds $$\\mu R$$.\n- Step 2: **Limiting friction** ($$F = \\mu R$$) is the maximum value of static friction, reached at the exact point where the object is about to slide. Once sliding begins, kinetic friction applies (also $$F = \\mu R$$ at M1 level, using the same $$\\mu$$). Use $$F = \\mu R$$ when the object is sliding OR about to slide.\n\n+ In \"constant speed\" problems, the object IS moving, so $$F = \\mu R$$ (kinetic friction). In \"find the maximum force before slipping\" problems, use $$F = \\mu R$$ (limiting friction). In \"equilibrium, is it sliding?\" problems, check if the required friction exceeds $$\\mu R$$.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": false}, {"question": "A particle hangs in equilibrium suspended by two strings at different angles from the vertical. String 1 makes angle 37° with the vertical ($$\\cos 37° = 4/5$$) and has tension $$T$$. If the horizontal component of the force in string 1 is 2 N, find $$T$$. (2 steps)", "answer": "- Step 1: The horizontal component of the tension in string 1 is $$T\\cos 37°$$ (if 37° is from the vertical, the horizontal component uses the cosine). So $$T \\times \\frac{4}{5} = 2$$.\n- Step 2: $$T = 2 \\div \\frac{4}{5} = 2 \\times \\frac{5}{4} = 2.5$$ N. The vertical component would be $$T\\sin 37° = 2.5 \\times \\frac{3}{5} = 1.5$$ N, which contributes to supporting the weight along with the other string.\n\n+ Always check: is the angle given from the vertical or from the horizontal? This determines whether you use $$\\sin$$ or $$\\cos$$ for each component. \"Angle with the vertical\" → horizontal component = $$T\\sin\\theta$$, vertical component = $$T\\cos\\theta$$. \"Angle with the horizontal\" → swap.", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": false}, {"question": "When a particle on a rough inclined plane is connected to a hanging particle over a smooth pulley at the top of the plane, and the system is released from rest, how do you determine which direction the system moves? (3 steps)", "answer": "- Step 1: Compare the \"driving force\" (weight of hanging mass $$m_B g$$) with the \"resisting forces\" on the plane particle (weight component down the slope $$m_A g\\sin\\alpha$$ plus maximum friction $$\\mu m_A g\\cos\\alpha$$).\n- Step 2: If $$m_B g > m_A g\\sin\\alpha + \\mu m_A g\\cos\\alpha$$: the hanging mass falls and the plane particle moves UP the slope. Friction on A acts DOWN the slope (opposing upward motion).\n- Step 3: If $$m_B g < m_A g\\sin\\alpha - \\mu m_A g\\cos\\alpha$$: the plane particle slides DOWN and the hanging mass rises. Friction on A acts UP the slope (opposing downward motion). If neither condition holds, the system remains at rest (friction can hold it).\n\n+ This \"direction test\" must be done BEFORE writing equations, because the direction of friction depends on the direction of motion. Getting the direction wrong makes the entire solution invalid.", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": true}, {"question": "In a moments problem, when a rod is about to **tilt** about a support, what happens to the reaction at the other support, and how does this simplify the problem? (2 steps)", "answer": "- Step 1: When the rod is about to tilt about support C, it loses contact with support D. The reaction at D becomes **zero**: $$R_D = 0$$. The rod pivots about C under the combined effect of the weights and any applied forces.\n- Step 2: This simplifies the problem because you now have one fewer unknown. Taking moments about C: only the weights and any applied forces create moments (since $$R_C$$ passes through the pivot and $$R_D = 0$$). This gives one equation with typically one unknown (the critical mass or position).\n\n+ The \"tilting\" condition is the boundary between the rod being supported at both points and it toppling. At the exact tilting point, the rod is still just in equilibrium, but any further increase in the tipping force/weight would cause rotation.", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": false}, {"question": "What is the physical interpretation of the **area under an a-t graph**, and how does this differ from the area under a v-t graph? (2 steps)", "answer": "- Step 1: Area under **a-t graph** = change in velocity ($$\\Delta v$$). This is because $$a = dv/dt$$, so $$\\int a \\, dt = \\Delta v$$. The area tells you how much the speed has changed, not the speed itself (you need the initial velocity for that).\n- Step 2: Area under **v-t graph** = change in displacement ($$\\Delta s$$). This is because $$v = ds/dt$$, so $$\\int v \\, dt = \\Delta s$$. The area tells you how far the object has moved, not its position (you need the initial position for that).\n\n+ Both are applications of the fundamental theorem of calculus to kinematics. The a-t graph gives velocity changes; the v-t graph gives displacement changes. Neither directly gives the absolute value — you always need initial conditions.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": false}, {"question": "A particle moves with velocity $$\\mathbf{v} = (5 - 5\\lambda)\\mathbf{i} + (-8 + 10\\lambda)\\mathbf{j}$$ m/s. At what value of $$\\lambda$$ is the particle moving due North, and how would you check this? (2 steps)", "answer": "- Step 1: Moving due North means the velocity is purely in the $$\\mathbf{j}$$-direction: the $$\\mathbf{i}$$-component must be zero. Set $$5 - 5\\lambda = 0$$, giving $$\\lambda = 1$$.\n- Step 2: Check: at $$\\lambda = 1$$, $$\\mathbf{v} = 0\\mathbf{i} + 2\\mathbf{j}$$, which is indeed purely Northward (positive $$\\mathbf{j}$$). The speed at this point is 2 m/s.\n\n+ Similarly, moving due East requires $$\\mathbf{j}$$-component = 0, and moving due West requires $$\\mathbf{j}$$-component = 0 with $$\\mathbf{i}$$-component negative. Each cardinal direction constrains one component to zero.", "source": "GLM 5.1 ③", "_id": "glm_3_70", "judge_pick": false}, {"question": "Why is it important to use consistent sign conventions throughout a mechanics problem, and what goes wrong if you don't? (2 steps)", "answer": "- Step 1: In mechanics, signs represent directions. If you choose \"right = positive\" for one particle and \"left = positive\" for another in the same connected system, the tension forces will have wrong signs when you add the equations, leading to incorrect acceleration and tension values.\n- Step 2: Common error: for connected particles, if A moves right and B moves down, you might choose right as positive for A and down as positive for B. This is fine AS LONG AS the tension appears with opposite signs in the two equations (pulling A left = negative, pulling B up = negative in B's equation). If both tensions appear with the same sign, you've been inconsistent.\n\n+ Best practice: explicitly state your positive direction at the start of each equation. For example: \"For A (up the plane positive): $$T - mg\\sin\\alpha - F = ma$$\" and \"For B (downward positive): $$mg - T = ma$$.\" Notice $$T$$ is positive in A's equation (pulling up) and negative in B's equation (opposing downward motion).", "source": "GLM 5.1 ③", "_id": "glm_3_71", "judge_pick": true}, {"question": "In a two-stage motion problem, the first stage ends at velocity $$v_1$$ and the second stage begins at the same velocity. If you incorrectly use $$u = 0$$ for the second stage, what is the conceptual error? (2 steps)", "answer": "- Step 1: The error is treating the second stage as starting from rest, ignoring the velocity accumulated during the first stage. The object doesn't \"reset\" when the parachute opens — it continues with the velocity it had at the end of Stage 1.\n- Step 2: This would dramatically underestimate the distance travelled in Stage 2 and the final landing speed. For example, if Stage 1 ends at 49 m/s and you use $$u = 0$$ for Stage 2, you'd calculate a much shorter stopping distance and wrong final speed.\n\n+ The continuity of velocity at the transition is the critical link between stages. Position is also continuous (the object doesn't teleport), but velocity is the quantity that most often causes errors when forgotten.", "source": "GLM 5.1 ③", "_id": "glm_3_72", "judge_pick": true}, {"question": "A rod of length 4 m and mass $$M$$ kg is non-uniform, with centre of mass at distance $$x$$ from end A. It rests horizontally on supports at A and B (the other end). A particle of mass 30 kg is placed 1.5 m from B. If the reaction at A is 245 N, find $$M$$ and $$x$$. (4 steps)", "answer": "- Step 1: Draw the diagram. Forces: weight $$Mg$$ at distance $$x$$ from A, particle weight $$30g$$ at distance $$4 - 1.5 = 2.5$$ m from A, reaction at A = 245 N (upward), reaction at B (upward).\n- Step 2: Vertical equilibrium: $$245 + R_B = Mg + 30g$$. Take moments about A: $$R_B \\times 4 = Mg \\times x + 30g \\times 2.5$$. This has three unknowns ($$M$$, $$x$$, $$R_B$$) but only two equations.\n- Step 3: We need another piece of information. If the problem gives a specific condition (like the rod being about to tilt, or a specific $$R_B$$ value), use it. From the notes example, taking moments about another point or using a given reaction value provides the third equation.\n- Step 4: From the notes: moments about D gave $$R_C = 686 - 245x$$, then moments about C gave $$M \\times 0.4 = 30 \\times 1.1$$, so $$M = 82.5$$ kg. The key was choosing the right pivot to get a solvable equation.\n\n+ Strategy: if you have too many unknowns, look for a pivot that eliminates all but one unknown. This often requires trying different pivot points.", "source": "GLM 5.1 ③", "_id": "glm_3_73", "judge_pick": false}, {"question": "What does it mean for a string to be **light**, and how does this assumption simplify problems? (2 steps)", "answer": "- Step 1: A \"light\" string has **zero mass**. This means the string's weight is negligible and doesn't contribute to any force calculations. The tension is the same at all points along a horizontal light string (no weight to cause variation).\n- Step 2: This simplification means: (1) You never include the string's weight in force diagrams. (2) For a light string over a smooth pulley, tension is the same on both sides. (3) For a light string with a particle attached, the tension on each side of the particle can be different (the particle's mass \"breaks\" the tension equality).\n\n+ If a string were \"heavy\" (had mass), the tension would vary along its length (greater at the top to support the weight of string below). This is beyond M1 scope.", "source": "GLM 5.1 ③", "_id": "glm_3_74", "judge_pick": true}, {"question": "In a collision, the impulse on object A is $$+I$$ Ns. What is the impulse on object B, and why? (2 steps)", "answer": "- Step 1: By Newton's 3rd Law, the force that A exerts on B is equal and opposite to the force that B exerts on A. Since impulse = force × time (and the contact time is the same for both), the impulse on B is $$-I$$ Ns.\n- Step 2: This means: if A gains momentum in one direction due to the collision, B loses the same amount of momentum in that direction (or gains it in the opposite direction). Total momentum is conserved: $$\\Delta p_A + \\Delta p_B = 0$$.\n\n+ Example: if A's momentum changes by $$-3mU/4$$ (loses momentum), then B's momentum changes by $$+3mU/4$$ (gains the same amount). The impulses are equal and opposite.", "source": "GLM 5.1 ③", "_id": "glm_3_75", "judge_pick": true}, {"question": "When drawing a free-body diagram for a particle on an inclined plane, what are the typical forces, and what is the most common mistake in drawing them? (3 steps)", "answer": "- Step 1: The typical forces are: (1) Weight $$mg$$ vertically downward, (2) Normal reaction $$R$$ perpendicular to the plane (not vertical!), (3) Friction $$F$$ along the plane (direction depends on motion/tendency), (4) Any applied force or tension.\n- Step 2: The most common mistake: drawing the normal reaction **vertically** instead of **perpendicular to the plane**. On an inclined plane, \"normal\" means perpendicular to the surface, which is at angle $$\\alpha$$ to the vertical.\n- Step 3: Another common mistake: drawing friction in the wrong direction. Friction opposes the MOTION (or tendency of motion), not the weight component. If the particle moves up the slope, friction acts down the slope, regardless of the weight direction.\n\n+ Resolve forces either along and perpendicular to the plane (usually easier for inclined plane problems) or horizontally and vertically (sometimes easier when external forces are involved).", "source": "GLM 5.1 ③", "_id": "glm_3_76", "judge_pick": true}, {"question": "When resolving forces on an inclined plane, why is it often easier to resolve **along and perpendicular to the plane** rather than horizontally and vertically? (2 steps)", "answer": "- Step 1: When you resolve along and perpendicular to the plane, the normal reaction and friction each appear in only ONE equation (R perpendicular, F along). This makes the equations simpler and more intuitive.\n- Step 2: If you resolve horizontally and vertically, both R and F have components in both directions (since they're at angle $$\\alpha$$ to horizontal/vertical). This introduces $$\\sin\\alpha$$ and $$\\cos\\alpha$$ into both equations, making them messier and more error-prone.\n\n+ Exception: if an external force acts horizontally or vertically (like a pushing force), it might be easier to resolve in those directions. Choose the resolution that minimises the number of components you need to calculate.", "source": "GLM 5.1 ③", "_id": "glm_3_77", "judge_pick": true}, {"question": "A particle is at rest on a rough inclined plane. The plane angle is increased until the particle just begins to slide. What is the relationship between the angle and $$\\mu$$ at this point? (2 steps)", "answer": "- Step 1: At the point of slipping, friction is limiting: $$F = \\mu R$$. The forces along the plane balance: $$mg\\sin\\alpha = F = \\mu R$$. The forces perpendicular to the plane balance: $$R = mg\\cos\\alpha$$.\n- Step 2: Substituting: $$mg\\sin\\alpha = \\mu mg\\cos\\alpha$$, so $$\\mu = \\tan\\alpha$$. The angle at which the particle just begins to slide is called the **angle of friction**, and it satisfies $$\\mu = \\tan\\alpha$$. Measuring this angle is one way to experimentally determine $$\\mu$$.\n\n+ This is a clean, memorable result. If $$\\mu = 0.5$$, the angle of friction is $$\\arctan(0.5) \\approx 26.6°$$. Any incline steeper than 26.6° will cause sliding; shallower inclines won't.", "source": "GLM 5.1 ③", "_id": "glm_3_78", "judge_pick": true}, {"question": "In a speed-time graph, what does the **gradient** represent, and what does a negative gradient mean? (2 steps)", "answer": "- Step 1: The gradient of a v-t graph represents **acceleration**: $$a = dv/dt$$. A positive gradient means the object is speeding up (in the positive direction). A zero gradient means constant speed.\n- Step 2: A **negative gradient** means the object is decelerating (slowing down in the positive direction, or speeding up in the negative direction). If the velocity crosses zero and becomes negative, the object has reversed direction.\n\n+ In the two-stage parachute problem: Stage 1 has positive gradient ($$a = g > 0$$, speeding up downward). Stage 2 has negative gradient ($$a = -3$$ m/s², slowing down while still moving downward). The velocity remains positive throughout (downward) but decreases in Stage 2.", "source": "GLM 5.1 ③", "_id": "glm_3_79", "judge_pick": false}, {"question": "What is the key difference between a **scalar** and a **vector** in mechanics, and which quantities in M1 are which? (2 steps)", "answer": "- Step 1: A **scalar** has magnitude only; a **vector** has magnitude AND direction. Scalars: speed, distance, mass, time, energy, coefficient of friction. Vectors: velocity, displacement, acceleration, force, momentum, impulse.\n- Step 2: The critical distinction: you can add scalars directly, but vectors must be added component-by-component or geometrically. Two forces of 3 N and 4 N can give a resultant anywhere from 1 N to 7 N depending on the angle between them (not always 7 N).\n\n+ The \"same speed but different direction\" error (Q63) arises from confusing speed (scalar) with velocity (vector). Momentum conservation uses velocities (vectors with signs), not speeds.", "source": "GLM 5.1 ③", "_id": "glm_3_80", "judge_pick": true}, {"question": "A force $$\\mathbf{F} = 3\\mathbf{i} + 4\\mathbf{j}$$ N acts on a particle of mass 2 kg. Find the acceleration vector and the magnitude of acceleration. (2 steps)", "answer": "- Step 1: By Newton's 2nd Law: $$\\mathbf{F} = m\\mathbf{a}$$, so $$\\mathbf{a} = \\mathbf{F}/m = (3\\mathbf{i} + 4\\mathbf{j})/2 = 1.5\\mathbf{i} + 2\\mathbf{j}$$ m/s².\n- Step 2: Magnitude of acceleration: $$|\\mathbf{a}| = \\sqrt{1.5^2 + 2^2} = \\sqrt{2.25 + 4} = \\sqrt{6.25} = 2.5$$ m/s². The direction of acceleration is the same as the direction of the net force (Newton's 2nd Law is a vector equation).\n\n+ This is a simple example of F = ma in vector form. Each component satisfies $$F_x = ma_x$$ and $$F_y = ma_y$$ independently. You can work with components throughout and combine at the end.", "source": "GLM 5.1 ③", "_id": "glm_3_81", "judge_pick": false}, {"question": "When a particle is in **limiting equilibrium** on a rough inclined plane, and an additional force is applied up the plane, how does the friction direction change? (3 steps)", "answer": "- Step 1: In limiting equilibrium without the applied force, the particle is about to slide DOWN. Friction acts UP the plane. $$mg\\sin\\alpha = \\mu mg\\cos\\alpha$$.\n- Step 2: When an additional force is applied UP the plane, it helps support the particle. The particle no longer tends to slide down, so friction may decrease or even reverse direction.\n- Step 3: If the applied force is large enough, the particle would tend to slide UP (without friction). Then friction acts DOWN the plane to oppose this tendency. The transition point is where the applied force exactly balances the weight component: $$F_{\\text{applied}} = mg\\sin\\alpha$$, and friction = 0.\n\n+ Friction always opposes the TENDENCY of motion, not a fixed direction. As the applied force increases from zero, friction decreases (less tendency to slide down), reaches zero (no tendency), then increases in the opposite direction (tendency to slide up).", "source": "GLM 5.1 ③", "_id": "glm_3_82", "judge_pick": true}, {"question": "In the conservation of momentum equation $$m_1u_1 + m_2u_2 = m_1v_1 + m_2v_2$$, what are the assumptions, and when does conservation of momentum NOT apply? (2 steps)", "answer": "- Step 1: The assumptions are: (1) The system is isolated — no external forces act on the system of particles. (2) The collision is instantaneous (or we consider the moment just before and just after, so external forces like gravity have no time to act). (3) The objects don't break apart or merge (unless it's a perfectly inelastic collision, in which case they stick together).\n- Step 2: Momentum conservation does NOT apply when: (1) There is a significant external impulse during the collision (e.g., one particle is also attached to a spring). (2) The \"collision\" is actually a gradual process over time with external forces. (3) Relativistic speeds (beyond M1 scope).\n\n+ In most M1 problems, momentum IS conserved during collisions and \"string becoming taut\" events because these are instantaneous. But momentum is NOT conserved for a particle sliding on a rough surface over time (friction is an external force acting over a duration).", "source": "GLM 5.1 ③", "_id": "glm_3_83", "judge_pick": true}, {"question": "A 2 kg object falls 1.5 m from rest and hits the ground, decelerating to rest over a distance of 0.05 m. Find the normal reaction force during impact. (3 steps)", "answer": "- Step 1: Speed at impact: $$v^2 = 0 + 2(9.8)(1.5) = 29.4$$, so $$v = \\sqrt{29.4} \\approx 5.42$$ m/s.\n- Step 2: Deceleration during impact: $$0 = 29.4 + 2a(0.05)$$, so $$a = -29.4/0.1 = -294$$ m/s² (upward). This is about 30g — a very large deceleration over a short distance.\n- Step 3: Normal reaction: $$N - mg = ma$$ (upward positive), so $$N = m(g + a) = 2(9.8 + 294) = 2 \\times 303.8 = 607.6$$ N. This is about 31 times the object's weight — the ground pushes very hard during the brief impact.\n\n+ The shorter the stopping distance, the greater the deceleration and the greater the normal reaction. This is why cushioning (increasing stopping distance) reduces impact forces — a key principle in safety design.", "source": "GLM 5.1 ③", "_id": "glm_3_84", "judge_pick": false}], "count": 85}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why is acceleration constant in SUVAT problems, and what physical scenarios does this model? (3 steps)", "answer": "- Step 1: **Constant acceleration implies uniform net force** (F = ma). This applies when forces like gravity dominate and resistive forces (air resistance) are negligible.  \n- Step 2: **Free fall near Earth's surface** (g ≈ 9.8 m/s²) and frictionless motion are ideal scenarios. For example, a ball thrown upward experiences constant deceleration.  \n+ Example: A car braking with constant friction force (ignoring speed-dependent drag).  \n+ Counterexample: Skydiver opening a parachute – acceleration changes, so SUVAT cannot be used for the entire motion.  \n- Step 3: **SUVAT equations derive from integrating acceleration** (v = u + at), velocity (s = ut + ½at²), and eliminating variables. Non-uniform acceleration requires calculus (a-t graph area = Δv).  \n\n[Optional: Takeaway: SUVAT works only when net force is constant.]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How do you convert a bearing (e.g., 330°) to vector components?", "answer": "Bearings measure **clockwise from North**, so trigonometric functions are inverted compared to standard angles:  \n- For bearing α:  \n  - **i-component (East)** = speed × sin(α)  \n  - **j-component (North)** = speed × cos(α)  \nExample: α = 330° → sin(330°) = -½ (West), cos(330°) = √3/2 (North). A 10 m/s wind from 330° → v = -5i + 5√3j.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "In a two-stage projectile, why can’t you use SUVAT for the entire motion?", "answer": "Because acceleration changes between stages. SUVAT assumes constant a:  \n- **Stage 1 (free fall):** a = g downward.  \n- **Stage 2 (parachute):** a = (mg - R)/m (net force upward).  \nDifferent accelerations mean separate equations are required. Area under a-t graph gives Δv for each segment.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why does tension remain the same on both sides of a smooth pulley?", "answer": "A **smooth pulley exerts no frictional torque**, so the string slips freely. If tensions differed, the pulley would accelerate rotationally (τ = Iα), but massless pulleys (I = 0) require τ = 0 → T₁ = T₂. Real pulleys with mass would have T₁ ≠ T₂.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How do you determine the direction of friction on an inclined plane?", "answer": "- Step 1: Determine the **direction of motion** or impending motion.  \n- Step 2: Friction opposes relative motion:  \n  - If object slides up, friction acts down.  \n  - If object slides down, friction acts up.  \n- Step 3: If in equilibrium, compare driving forces (e.g., weight component) vs. max friction (F ≤ μR).  \nExample: Connected particles → motion direction dictates friction direction.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": true}, {"question": "Why choose a specific pivot for moments?", "answer": "To eliminate unknown forces. For example:  \n- **Reaction at C disappears** when taking moments about C.  \n- **Tension in a string cancels** if perpendicular distance is zero.  \nChoosing the pivot where multiple forces act simplifies equations by reducing unknowns.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What’s the physical meaning of impulse as a negative value?", "answer": "Impulse (J = Δp) is a vector. Negative sign indicates direction:  \n- Example: A ball hitting a wall reverses velocity. If initial momentum is +mu, final is -mu → J = -mu - mu = -2mu.  \nImpulse on the wall is +2mu (Newton’s 3rd law pair).", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": true}, {"question": "How do you minimize the distance |AB| between two particles using vectors?", "answer": "- Step 1: Express position vectors r_A(t) and r_B(t).  \n- Step 2: Vector AB = r_B - r_A = (a + bt)i + (c + dt)j.  \n- Step 3: Minimize |AB|² = (a + bt)² + (c + dt)² by differentiating w.r.t. t and setting d/dt = 0.  \n+ Example: AB = (10 - 24t)i + (12t - 15)j → |AB|² = (10 - 24t)² + (12t - 15)² → diff → solve for t.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why does a string becoming taut conserve momentum but not kinetic energy?", "answer": "- Step 1: **Momentum conservation** applies because internal forces (tension) cancel in the system (A + B).  \n- Step 2: **KE loss** occurs due to inelastic collision – the string absorbs energy as heat/sound when tightening.  \n- Step 3: Use m₁u₁ + m₂u₂ = (m₁ + m₂)V, but KE_initial ≠ KE_final.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": true}, {"question": "How does friction direction depend on motion when a force is applied at an angle?", "answer": "- Step 1: Resolve applied force into horizontal (F cosθ) and vertical (F sinθ).  \n- Step 2: Friction opposes horizontal motion → F_friction = μ(R), where R = mg - F sinθ.  \n- Step 3: If pulling upward (e.g., a rope), R decreases → friction decreases. If pushing downward, R increases → friction increases.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Why does the speed-time graph’s area give displacement?", "answer": "- Step 1: Integral of velocity over time = displacement.  \n- Step 2: For constant velocity, area = rectangle (v × t).  \n- Step 3: For accelerating motion, area = trapezoid/triangle (e.g., ½(u + v)t).  \nCounterexample: If acceleration changes, split graph into segments and sum areas.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "How do you resolve forces on a rod in equilibrium?", "answer": "- Step 1: Resolve **parallel and perpendicular** to the rod (not just horizontal/vertical).  \n- Step 2: For parallel forces: T cosθ (tension) vs. mg sinα (weight component down slope).  \n- Step 3: For perpendicular forces: R = T sinθ + mg cosα.  \nExample: A friction force acts down the rod if T cosθ > mg sinα.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "What’s the role of μ in limiting equilibrium?", "answer": "- Step 1: F_friction ≤ μR. At limiting equilibrium, F = μR.  \n- Step 2: μ is a material property – higher μ means more friction (e.g., rubber on concrete vs. ice on ice).  \n- Step 3: If object is stationary, use F ≤ μR. If moving, use F = μR (kinetic friction).", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "How do connected particles on a pulley accelerate when one is on an incline?", "answer": "- Step 1: Write F = ma for each particle:  \n  - Hanging mass: mg - T = ma  \n  - Incline mass: T - mg sinα - F_friction = ma  \n- Step 2: Add equations to eliminate T:  \n  mg - mg sinα - F_friction = 2ma  \n- Step 3: Solve for a. If system reverses direction, reverse friction direction.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Why does the normal reaction decrease when an elevator decelerates upward?", "answer": "- Step 1: Newton’s 2nd law: N - mg = -ma (deceleration upward = net downward acceleration).  \n- Step 2: N = m(g - a). If elevator falls freely (a = g), N = 0 (weightless).  \n- Step 3: Deceleration upward feels like reduced gravity – e.g., during elevator impact.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": true}], "count": 15}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Why are SUVAT equations only valid for constant acceleration? (3 steps)", "answer": "- Step 1: SUVAT equations are derived from integrating acceleration (a = constant) twice to get velocity and displacement.\n- Step 2: If acceleration varies with time (e.g., parachute opens), the integral ∫a(t)dt ≠ at, breaking the derivation.\n+ Example: When a skydiver opens their parachute, air resistance changes → acceleration isn't constant.\n- Step 3: For variable acceleration, use area under a-t graph (Δv = ∫a dt) or differentiation (a = dv/dt).\n\n**Takeaway:** SUVAT assumes a = const because its derivation integrates constant a twice.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "When should you split motion into stages for SUVAT? (3 steps)", "answer": "- Step 1: Split when acceleration changes (e.g., parachute opens, object hits a surface).\n+ Example: Two-stage motion: free fall (a = g) then parachute (a = -3 m/s²).\n- Step 2: Apply SUVAT separately to each stage, ensuring continuity of velocity between stages.\n- Step 3: Use final velocity of Stage 1 as initial velocity of Stage 2.\n\n**Takeaway:** Split when acceleration isn't constant; maintain velocity continuity between stages.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why must bearings be measured clockwise from North?", "answer": "Bearings are a navigational standard to avoid ambiguity. Measuring clockwise from North:\n- Ensures everyone (pilots, sailors) interprets directions the same way.\n- Unlike mathematical angles (counter-clockwise from x-axis), bearings prioritize practical navigation.\n- Example: 090° bearing = East (clockwise from North), not 0° (which would be North).\n\n**Takeaway:** Bearings use clockwise from North for universal consistency in real-world navigation.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": true}, {"question": "How to convert a bearing α to i/j vector components? (3 steps)", "answer": "- Step 1: Draw a compass: bearing α is clockwise from North (j-axis).\n- Step 2: The angle with the i-axis (East) is 90° - α if α < 90°, or α - 90° if α > 90°.\n- Step 3: For speed v: vᵢ = v sinα, vⱼ = v cosα.\n+ Example: Bearing 330° → sin(330°) = -0.5, cos(330°) = √3/2 → vᵢ = -0.5v, vⱼ = (√3/2)v.\n\n**Takeaway:** Bearings use North as 0°, so i-component = sinα, j-component = cosα.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why does tension remain equal in a two-string pulley system with different masses?", "answer": "- Step 1: Inextensible string → all parts move the same distance → same acceleration for all masses.\n- Step 2: Light string → mass = 0, so ∑F = 0 on string → T₁ = T₂ even with different masses.\n+ Example: Two masses over pulley → T acts upward on both, but acceleration adjusts to balance forces.\n- Step 3: Frictionless pulley → no torque → T₁ = T₂.\n\n**Takeaway:** Tension equality comes from massless, inextensible string and frictionless pulley.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How to handle connected particles with a string becoming taut? (3 steps)", "answer": "- Step 1: Before string taut: particles move independently (momentum not conserved).\n- Step 2: When string becomes taut: impulsive tension causes instantaneous momentum transfer.\n+ Example: If A (mass m) moving at u, B (mass 3m) at rest → m u = (m + 3m)v → v = u/4.\n- Step 3: Impulse = change in momentum (e.g., on A: J = m(v - u) = -3mu/4).\n\n**Takeaway:** Use conservation of momentum only when string becomes taut (impulsive tension).", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why does friction act opposite to motion on an inclined plane? (3 steps)", "answer": "- Step 1: Friction opposes relative motion between surfaces. If object slides down, friction acts up.\n+ Example: Block A moving up plane → friction acts down.\n- Step 2: On inclined plane: resolve weight into mg sinθ (parallel) and mg cosθ (perpendicular).\n- Step 3: F_friction = μN = μ mg cosθ. Net force = mg sinθ ± F_friction (depends on motion direction).\n\n**Takeaway:** Friction direction depends on motion direction, not just slope.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "When to choose a pivot for moments to eliminate unknown forces?", "answer": "- Step 1: Take moments about a point where an unknown force acts → its moment = 0.\n+ Example: Reaction at support C → take moments about C to eliminate R_C.\n- Step 2: Ensure pivot choice leaves only one unknown in the moment equation.\n+ Example: Finding mass M on rod → take moments about pivot to eliminate reaction force.\n\n**Takeaway:** Choose pivot at the line of action of unknown forces to simplify equations.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How to find minimum distance between two moving particles using vectors? (3 steps)", "answer": "- Step 1: Write position vectors r₁(t) and r₂(t) for both particles.\n- Step 2: Vector between them: Δr = r₂ - r₁. Square of magnitude: |Δr|² = (Δx)² + (Δy)².\n- Step 3: Differentiate |Δr|² with respect to t, set derivative = 0 → solve for t_min.\n+ Example: Δr = (10 - 24t)i + (12t - 15)j → |Δr|² = (10 - 24t)² + (12t - 15)².\n\n**Takeaway:** Minimize |Δr|² (easier than |Δr|) by calculus.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why does normal reaction differ from weight during vertical deceleration?", "answer": "- Step 1: Newton's 2nd Law: N - mg = -ma (if decelerating upward).\n+ Example: Object hitting floor decelerates upward → N > mg.\n- Step 2: When object decelerates (a upward), N = m(g - a). If a is downward: N = m(g + a).\n+ Example: Free fall (a = g) → N = 0 (weightless).\n\n**Takeaway:** N ≠ mg when there's vertical acceleration; N = m(g ± a) depending on direction.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}, {"question": "How to resolve forces with a rope at angle θ when moving at constant speed?", "answer": "- Step 1: Constant speed → equilibrium: F_net = 0. Resolve vertically: R + T sinθ = mg.\n- Step 2: Horizontally: T cosθ = F_friction = μR.\n- Step 3: Substitute R from Step 1 into Step 2 to solve for T.\n+ Example: If μ = 1/3, sinθ = 3/5 → T = mg/3.\n\n**Takeaway:** Use vertical equilibrium to find R, then horizontal equilibrium for T.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "What's the key difference between static and kinetic friction in problems?", "answer": "- Step 1: Static friction (0 ≤ F ≤ μ_s R) acts when object is stationary; adjusts to match applied force.\n- Step 2: Kinetic friction (F = μ_k R) acts when object is moving; constant value.\n+ Example: Pushing a box: static friction increases until μ_s R, then drops to μ_k R when moving.\n\n**Takeaway:** Use μ_s R when object is about to move; μ_k R when moving.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": true}, {"question": "Why does acceleration stay the same throughout an inextensible string?", "answer": "- Step 1: Inextensible means length doesn't change → all particles in string move same distance in same time.\n- Step 2: If one end accelerates, the other end must accelerate equally (a₁ = a₂).\n+ Example: Two masses over pulley → both have same acceleration magnitude.\n\n**Takeaway:** Inextensibility ensures synchronized motion → equal acceleration.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": true}, {"question": "How to apply conservation of momentum when direction changes?", "answer": "- Step 1: Choose positive direction. Assign signs to velocities based on direction.\n- Step 2: If object reverses direction, its velocity becomes negative.\n+ Example: If A moves right (+), B left (-), after collision A moves left (-), B right (+).\n- Step 3: Check physical sense: objects shouldn't pass through each other.\n\n**Takeaway:** Sign convention is critical; direction determines velocity sign.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "Why does the area under a-t graph equal change in velocity?", "answer": "- Step 1: a = dv/dt → integrating both sides: ∫a dt = Δv.\n- Step 2: Graphically, area under a-t = ∫a dt = v_final - v_initial.\n+ Example: If acceleration = -0.5 m/s² for 4s → Δv = -0.5 × 4 = -2 m/s.\n\n**Takeaway:** Area under a-t = Δv, just like area under v-t = displacement.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": true}, {"question": "How to find overtaking condition on a speed-time graph?", "answer": "- Step 1: Area under v-t graph = displacement. Set areas equal for overtaking.\n- Step 2: Car (constant speed) and motorbike (accelerating from rest): find T where areas match.\n+ Example: Car distance = 20T, motorbike distance = ½aT². Solve 20T = ½aT² → T = 40/a.\n\n**Takeaway:** Overtaking occurs when both have same displacement at same time T.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "Why does the reaction force at a pivot disappear in moment calculations?", "answer": "- Step 1: Moment = Force × Perpendicular distance. Reaction at pivot has 0 distance → moment = 0.\n- Step 2: Eliminates need to calculate reaction force in equilibrium equations.\n+ Example: Taking moments about C → R_C disappears, simplifying equation.\n\n**Takeaway:** Reaction at pivot contributes zero moment → choose pivot there to eliminate unknowns.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "How to determine friction direction on an inclined plane with connected particles?", "answer": "- Step 1: Assume direction of motion (e.g., A moves up plane → friction acts down).\n- Step 2: Write F = ma for each particle, considering friction direction.\n+ Example: If A moves up, friction = μN down plane; if A slides down, friction = up plane.\n- Step 3: If acceleration comes negative, reverse friction direction.\n\n**Takeaway:** Friction opposes motion; direction depends on assumed motion direction.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "What's the key equation for minimum/maximum of |v(t)| in vectors?", "answer": "- Step 1: Express |v(t)|² as a quadratic in t (e.g., (a + bt)² + (c + dt)²).\n- Step 2: Differentiate |v(t)|² with respect to t: d/dt[quadratic] = 0 → solve for t_min.\n+ Example: |v|² = 25λ² - 210λ + 89 → d/dλ = 50λ - 210 = 0 → λ = 4.2.\n- Step 3: Substitute t_min back into |v(t)|² to find minimum.\n\n**Takeaway:** Minimize |v(t)|² (quadratic) by calculus.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "Why does the tension in a tow bar disappear when it breaks?", "answer": "- Step 1: Tow bar applies tension force when intact. When broken, no force → acceleration changes.\n- Step 2: After break, trailer decelerates under friction and weight component.\n+ Example: Trailer on slope: a = -g sinθ - μg cosθ.\n\n**Takeaway:** Breaking the connection removes tension force; only friction and weight remain.", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}, {"question": "How to convert a vector to bearing and speed?", "answer": "- Step 1: Find angle with North (j-axis): tanθ = east-west component / north-south component.\n- Step 2: Bearing = angle clockwise from North. Use arctan(b/a) for vector ai + bj.\n+ Example: v = 16i + 12j → tanθ = 16/12 → θ ≈ 53.1° → bearing 053°.\n- Step 3: Speed = |v| = √(a² + b²).\n\n**Takeaway:** Bearing is clockwise from North; speed is vector magnitude.", "source": "Qwen 3 ②", "_id": "qwen_2_20", "judge_pick": false}, {"question": "When to use limiting friction in equilibrium problems?", "answer": "- Step 1: If object is in limiting equilibrium, friction is at maximum: F = μR.\n- Step 2: If object is stationary but about to move, use F = μR.\n+ Example: Block on verge of sliding → friction = μR.\n- Step 3: If object is moving, use F = μ_k R (kinetic friction).\n\n**Takeaway:** Limiting friction applies at point of slipping; F = μ_s R.", "source": "Qwen 3 ②", "_id": "qwen_2_21", "judge_pick": false}], "count": 22}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What does a bearing measure, and in which direction does it measure from North? Give an example: what is the bearing of a vector pointing directly West? (1 step)", "answer": "A bearing measures the **clockwise** angle from the North direction (0°). It is always expressed as a three-digit number between 000° and 360°. For example, a vector pointing directly West has a bearing of **270°** (90° clockwise from North).", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A force of magnitude F acts on a bearing of 330°. If the force magnitude is 8 N, write its vector in i-j component form. (2 steps)", "answer": "- Step 1: A bearing of 330° means 30° west of North. The angle from the positive i-axis (East) is 60° counterclockwise.\n- Step 2: i-component = F × sin(330°) = 8 × (-½) = -4 N; j-component = F × cos(330°) = 8 × (√3/2) ≈ 6.93 N. So the vector is **(-4i + 6.93j) N**.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "When finding the resultant of two forces P and Q that have an angle of 120° between them, what formula do you use and why can't you use Pythagoras? (2 steps)", "answer": "- Step 1: You use the **cosine rule**: R² = P² + Q² - 2PQ·cos(θ), where θ is the angle between the forces.\n- Step 2: Pythagoras only works for **right triangles** (90°). When the angle between forces is not 90°, you need cosine rule because the triangle is obtuse. The minus sign appears because cos(120°) = -½, which actually **increases** the resultant.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Two particles A and B, with masses m and 3m respectively, are connected by a light inextensible string. A moves with speed U towards B, which is at rest. The string becomes taut. What is the speed S of both particles immediately after, and what is the impulse on A? (3 steps)", "answer": "- Step 1: Use **conservation of momentum** at the instant the string becomes taut (assuming no external horizontal forces).\n- Step 2: mU + 3m(0) = (m + 3m)S → mU = 4mS → **S = U/4**.\n- Step 3: Impulse on A = change in momentum = m(S - U) = m(U/4 - U) = **-3mU/4** (negative means A's momentum decreased; magnitude = 3mU/4).", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "A particle is projected upward with speed 24 m/s. It passes a height of 10 m twice (once going up, once coming down). How do you find the total time in the air using SUVAT equations? (2 steps)", "answer": "- Step 1: Use s = ut + ½at² with s = 10 m, u = 24 m/s, a = -9.8 m/s². This gives: 10 = 24t - 4.9t² → 4.9t² - 24t + 10 = 0.\n- Step 2: Solve the quadratic to find two positive times (t₁ going up, t₂ coming down). The **total time** is t₂ - t₁ (or use v = u + at to find time to apex, then double).", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "A particle falls freely for 5 seconds, then a parachute opens creating a constant deceleration of 3 m/s² for another 397.5 m. What is the key principle when applying SUVAT to this two-stage motion? (1 step)", "answer": "You must **apply SUVAT separately to each stage** because the acceleration is different in each stage. The final velocity of Stage 1 becomes the initial velocity (u) for Stage 2. Using a single SUVAT equation across both stages would give an incorrect answer because acceleration changes.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "An acceleration-time graph shows acceleration changing at t = 4 s. How do you find the change in velocity over a 20-second period from such a graph? (2 steps)", "answer": "- Step 1: You cannot use v = u + at because acceleration is not constant. Instead, use the **area under the a-t graph** = change in velocity.\n- Step 2: Split into regions: 0→4 s (calculate area), 4→20 s (calculate area). Add them with appropriate signs to get total Δv.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "A box is pulled at constant speed by a rope at angle θ to the horizontal, where tanθ = 3/4. The coefficient of friction is μ = 1/3. Why does \"constant speed\" mean the net force is zero? (2 steps)", "answer": "- Step 1: Newton's First Law states an object at rest or moving at constant velocity has **zero net force** (equilibrium).\n- Step 2: \"Constant speed\" means acceleration a = 0, so from F = ma, the sum of all forces = 0. This gives T cosθ = F (horizontal) and R + T sinθ = mg (vertical), where F = μR.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "In the pulley system shown, a particle P of mass 4m hangs below a string connected to particle Q of mass 2m (both on the same string over a smooth pulley). What is the key property of the string that relates the accelerations of P and Q? (1 step)", "answer": "The string is **inextensible** (cannot stretch), which means the **acceleration is the same magnitude throughout the entire string**. If P moves down by distance x, Q moves up by the same distance x, so their velocities and accelerations are equal in magnitude.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Two particles are connected by a light inextensible string over a smooth pulley. Particle A (mass 2m) is on a rough inclined plane, particle B (mass 3m) hangs vertically. When the string is cut, in which direction does friction act on A, and why? (2 steps)", "answer": "- Step 1: Friction always **opposes the direction of motion** (or the direction it would move if there were no friction).\n- Step 2: Since B (the heavier mass) would pull A **up the plane**, if the string is cut, A would naturally slide **down the plane** due to gravity. Therefore, friction acts **up the plane** to oppose this motion.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": true}, {"question": "When taking moments about a point in equilibrium, what is the key criterion for choosing which point to take moments about? Give an example from a rod problem. (2 steps)", "answer": "- Step 1: Choose a point that **eliminates an unknown force** from the equation, making it easier to solve.\n- Step 2: For example, if a rod is supported at points A and B with reactions R_A and R_A, take moments about point A to eliminate R_A, leaving only R_B to find. This avoids solving simultaneous equations.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A uniform rod is in equilibrium with forces acting on it. When writing the moment equation, how do you determine whether a moment is clockwise or anti-clockwise? (1 step)", "answer": "A moment is **clockwise** if the force would cause rotation in the clockwise direction about the pivot, and **anti-clockwise** if it would cause rotation in the anti-clockwise direction. Convention: take one direction as positive (e.g., clockwise positive) and the other as negative.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Two ships have position vectors r_A = (20j + 40t·i) km and r_B = ((10 + 16t)i + (5 + 12t)j) km at time t hours. How do you check if they will collide? (2 steps)", "answer": "- Step 1: For collision, the position vectors must be equal at the **same time**: r_A = r_B.\n- Step 2: This gives two equations: 40t = 10 + 16t (i-component) and 20 = 5 + 12t (j-component). Solve each — if they give **different values of t**, there is no collision. If the same t satisfies both, they collide.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "The vector between two particles is given by LS = (a + bt)i + (c + dt)j. How do you find the minimum separation distance between them? (3 steps)", "answer": "- Step 1: The distance is |LS| = √[(a + bt)² + (c + dt)²]. Minimizing distance is equivalent to minimizing |LS|².\n- Step 2: Write D² = (a + bt)² + (c + dt)². Differentiate with respect to t: d(D²)/dt = 2b(a + bt) + 2d(c + dt) = 0.\n- Step 3: Solve for t, then substitute back to find minimum D. This gives the closest approach.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "A particle's velocity is given by v = (5 - 5λ)i + (-8 + 10λ)j for some parameter λ. How do you find the minimum speed of the particle? (3 steps)", "answer": "- Step 1: Speed = |v| = √[(5 - 5λ)² + (-8 + 10λ)²]. Minimize speed by minimizing |v|².\n- Step 2: |v|² = 25 - 50λ + 25λ² + 64 - 160λ + 100λ² = 125λ² - 210λ + 89.\n- Step 3: Differentiate: d(|v|²)/dλ = 250λ - 210 = 0 → λ = 210/250 = 21/25. Substitute back to find minimum speed.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "A particle collides with a stationary peg and sticks to it. The particle has mass m = 0.2 kg and speed u = 15 m/s before collision. After collision, they move together at speed v. What is the impulse on the peg? (2 steps)", "answer": "- Step 1: Use conservation of momentum: m·u = (m + M)·v, where M is the peg mass. Find v.\n- Step 2: Impulse on peg = change in momentum of peg = M·v - 0 (since it was stationary). Alternatively, impulse on particle = m(v - u), and by Newton's Third Law, impulse on peg = -impulse on particle.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Two objects A and B approach each other head-on with speeds u and v respectively. After a perfectly elastic collision, A reverses direction. How do you determine the sign convention for velocities in the conservation of momentum equation? (2 steps)", "answer": "- Step 1: Choose a **positive direction** (e.g., to the right). Velocities in that direction are positive, opposite are negative.\n- Step 2: If A moves right at +u and B moves left at -v, then after collision if A reverses and moves left, its velocity is negative. Apply m_A·u_A + m_B·u_B = m_A·v_A + m_B·v_B with these signed values.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "A ball is dropped from height and hits the floor with speed v, decelerating to zero over distance s. How do you find the normal reaction force during the deceleration phase? (2 steps)", "answer": "- Step 1: First find deceleration a using v² = u² + 2as (with u = v, final velocity = 0, so a = -v²/(2s)).\n- Step 2: Apply Newton's Second Law vertically: N - mg = m·a (taking upward as positive). Since a is upward (deceleration), N = m(g + a) or more commonly N = m(g - downward acceleration). The normal force is **less than mg** during deceleration.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": true}, {"question": "A car travels at constant speed, and a motorbike starts from rest and accelerates to catch up. What condition represents the motorbike overtaking the car? (1 step)", "answer": "The **areas under their velocity-time graphs must be equal** at the overtaking time T. The car travels distance d_car = v·T (rectangle area). The motorbike travels distance d_motorbike = area under its v-t graph from 0 to T. Set d_car = d_motorbike and solve for T.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "A horizontal force P is applied at angle θ to a block on a horizontal surface with coefficient of friction μ. What is the maximum value of P before the block slips? (3 steps)", "answer": "- Step 1: Resolve vertically: R + P sinθ = mg → R = mg - P sinθ.\n- Step 2: Resolve horizontally: P cosθ = F, where F ≤ μR (limiting friction F = μR).\n- Step 3: P cosθ = μ(mg - P sinθ) → P(cosθ + μ sinθ) = μmg → P = μmg / (cosθ + μ sinθ).", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A trailer being towed by a car has a tow bar that suddenly breaks. The trailer was moving at 12 m/s. What forces act on the trailer after the break to cause deceleration? (2 steps)", "answer": "- Step 1: After the break, there is **no engine force** from the car.\n- Step 2: The trailer decelerates due to: (1) **Weight component** along any incline, and (2) **Friction** at the wheels (opposing motion). The net force = -μR - mg·sinθ (if on incline), giving a = -(μg cosθ + g sinθ).", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "In a moments problem with a non-uniform rod and particles placed on it, you need to find the mass M that keeps the rod in equilibrium. Why is it important to check the sign of each term in your moment equation? (1 step)", "answer": "A sign error will give an **incorrect value** (e.g., 7/24 instead of 7/3). The sign depends on whether the moment causes **clockwise or anti-clockwise rotation** about the pivot. One direction (e.g., clockwise) is taken as positive, the other as negative. Terms must be consistently added with correct signs.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A particle moves on a bearing of α where tanα = 4/3. If the speed is v = 20 km/h, what are the i and j components of its velocity? (2 steps)", "answer": "- Step 1: tanα = 4/3 means sinα = 4/5 and cosα = 3/5 (from a 3-4-5 right triangle).\n- Step 2: i-component (east) = v·sinα = 20 × (4/5) = 16 km/h; j-component (north) = v·cosα = 20 × (3/5) = 12 km/h. So v = 16i + 12j km/h.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "When a particle slides down a rough inclined plane at constant speed, what can you say about the net force parallel to the plane? (1 step)", "answer": "At **constant speed**, acceleration = 0, so by Newton's Second Law, the **net force parallel to the plane is zero**. This means the component of weight down the plane is exactly balanced by the friction force up the plane: mg·sinα = μmg·cosα.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In a pulley system with two different masses on either side of a smooth pulley, why do we write two separate F = ma equations instead of one equation for the whole system? (2 steps)", "answer": "- Step 1: The two masses may have **different forces acting on them** (e.g., weight components on an inclined plane vs. full weight when hanging).\n- Step 2: Writing separate equations allows you to include the **different gravitational forces** and then eliminate the tension T by adding/subtracting the equations to find acceleration and then tension.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "A car tows a trailer with mass 50 kg. The tow bar exerts a force of 1000 N on the trailer. What is the acceleration of the trailer, and what is the frictional resistance if the car maintains constant speed? (2 steps)", "answer": "- Step 1: At constant speed, acceleration = 0, so net force = 0. The tow bar force is balanced by frictional resistance: F_friction = 1000 N.\n- Step 2: If the car accelerates, use F = ma: 1000 - F_friction = 50a. To find F_friction from the constant speed case, you need additional information (like the resistive force per unit mass or coefficient).", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "An object of mass m is on a rough horizontal surface with coefficient of friction μ. A force P is applied at angle θ upward from the horizontal. Write the equations for the normal reaction R and the friction force F in terms of P, m, g, θ, and μ. (2 steps)", "answer": "- Step 1: Vertical equilibrium: R + P sinθ = mg → **R = mg - P sinθ**.\n- Step 2: Maximum friction (limiting equilibrium): F = μR = **μ(mg - P sinθ)**. If P is too large and causes lifting, this changes, but typically we assume no lifting.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Why does the tension in a light inextensible string passing over a smooth pulley remain the same on both sides? (1 step)", "answer": "The pulley is **smooth** (no friction) and **light** (negligible mass), so there is no external force to create a difference in tension. If the tension were different, the pulley would experience a net torque and would not be in equilibrium (or would accelerate infinitely given its negligible mass).", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "A particle is projected at 25 m/s at 30° above the horizontal. What are the horizontal and vertical components of its initial velocity? (1 step)", "answer": "Horizontal component (u_x) = 25 cos(30°) = 25 × (√3/2) ≈ 21.65 m/s; Vertical component (u_y) = 25 sin(30°) = 25 × ½ = 12.5 m/s upward. Remember: vertical component uses sin, horizontal uses cos for angle above horizontal.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A car accelerates from rest with constant acceleration a. After time t, what is its velocity and displacement? (1 step)", "answer": "Velocity: v = u + at = 0 + at = **at** (since u = 0). Displacement: s = ut + ½at² = 0 + ½at² = **½at²**. These are the SUVAT equations for constant acceleration from rest.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In a collision problem, what is the difference between an elastic and an inelastic collision in terms of kinetic energy? (1 step)", "answer": "In an **elastic collision**, kinetic energy is **conserved** (total KE before = total KE after). In an **inelastic collision**, kinetic energy is **not conserved** (some KE is converted to other forms like heat or sound). In perfectly inelastic collisions, objects stick together.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "A force of 10 N acts at 30° to the horizontal. What is its component parallel to a plane inclined at 15° to the horizontal? (2 steps)", "answer": "- Step 1: The angle between the force and the plane is 30° - 15° = 15°.\n- Step 2: The component parallel to the plane = F × cos(15°) = 10 × cos(15°) ≈ 10 × 0.966 = **9.66 N** (approximately).", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "A particle of mass m rests on a rough inclined plane with angle α. The coefficient of friction is μ. What is the condition for the particle to remain at rest? (1 step)", "answer": "For no motion, the maximum available friction μmg·cosα must be at least as large as the component of weight down the plane mg·sinα. The condition is: **μ ≥ tanα**. If μ < tanα, the particle slides down.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A ball is thrown upward from ground level and returns to the ground. Why does it take the same time to go up as to come down (ignoring air resistance)? (1 step)", "answer": "Due to **symmetry of motion under constant acceleration**. The upward journey has acceleration -g, starting with velocity u and ending with velocity 0. The downward journey starts with velocity 0 and accelerates at +g. The time to reach v = 0 going up = u/g, and time to reach speed u going down = u/g. These are equal.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": true}, {"question": "A particle moves with position vector r(t) = (3t² + 2)i + (4t - t²)j. Find its velocity vector. (1 step)", "answer": "Velocity is the derivative of position: v = dr/dt = **(6t)i + (4 - 2t)j**. The speed is |v| = √[(6t)² + (4 - 2t)²].", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "When using the cosine rule for finding a resultant force, the formula is R² = P² + Q² - 2PQ·cosθ. Why is there a minus sign before the 2PQ term? (1 step)", "answer": "The minus sign comes from the **general cosine rule** for any triangle: a² = b² + c² - 2bc·cos(A), where A is the angle between sides b and c. When θ = 90°, cos(90°) = 0 and we get Pythagoras. When θ > 90°, cosθ is negative, making the minus term positive (increasing R).", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "A uniform rod of length L and weight W is supported at both ends. What is the reaction force at each support? (1 step)", "answer": "For a **uniform rod** (weight acts at the center), by symmetry and taking moments about one end: R₁ + R₂ = W, and taking moments about the center: R₁·(L/2) = R₂·(L/2). This gives **R₁ = R₂ = W/2** each.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "A particle is projected horizontally from height h above the ground. How do you find the time of flight and range? (2 steps)", "answer": "- Step 1: Time of flight: treat vertical motion with u = 0, s = h, a = g. Use s = ½gt² → t = √(2h/g).\n- Step 2: Range: horizontal velocity u × time of flight = u × √(2h/g). The horizontal velocity remains constant (no air resistance).", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "Two forces F₁ = 6i + 8j and F₂ = -14i + 7j act on a particle. What is the angle of the resultant force with the positive i-axis? (3 steps)", "answer": "- Step 1: Resultant F = F₁ + F₂ = (6 - 14)i + (8 + 7)j = **-8i + 15j**.\n- Step 2: tanθ = |Fj|/Fi| = 15/8 = 1.875. But since Fx is negative and Fy positive, the vector is in the **second quadrant**.\n- Step 3: θ = 180° - arctan(15/8) ≈ 180° - 62° = **118°** from positive i-axis (or 28° above the negative i-axis).", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "A particle of mass 0.5 kg falls from rest. After falling 1.5 m, it hits a soft surface and comes to rest over 0.5 m. What is the average deceleration during the impact? (2 steps)", "answer": "- Step 1: Find speed just before impact: v² = u² + 2gs = 0 + 2 × 9.8 × 1.5 = 29.4 → v = √29.4 ≈ 5.42 m/s.\n- Step 2: During impact: v² = u² + 2as with u = 5.42, v = 0, s = 0.5. So 0 = 29.4 + 2a(0.5) → a = -29.4 m/s² (deceleration). This is about 3g.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "Why is it incorrect to use v = u + at when acceleration is not constant throughout the motion? (1 step)", "answer": "The equation v = u + at is derived by **integrating constant acceleration** (a = dv/dt = constant). When a varies with time, you cannot simply add at to u. Instead, you must use the area under the a-t graph or integrate a(t) to find the change in velocity.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "A box is pushed along a rough floor at constant speed. The coefficient of friction is μ. If the push force is at angle θ above the horizontal, how does the normal reaction change compared to when the force is horizontal? (1 step)", "answer": "When the force has an **upward component**, it reduces the normal reaction: R = mg - P·sinθ. This is **smaller than mg**, which in turn reduces the frictional force (F = μR). Therefore, less horizontal force is needed to maintain constant speed.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": true}, {"question": "A rod is pivoted at point C. You need to find the minimum mass M that will prevent the rod from tilting. Why might you take moments about point C? (1 step)", "answer": "Taking moments about point C **eliminates the reaction force at C** from the equation. Since you want to find the minimum mass, you need only consider the moments due to the weight of the rod and the other particles, without dealing with an unknown reaction force.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "In a pulley system with a light inextensible string, particle A (mass m) on a smooth table is connected to particle B (mass m) hanging vertically. What is the acceleration of the system? (2 steps)", "answer": "- Step 1: For B: mg - T = ma. For A: T = ma (no friction, smooth table).\n- Step 2: Substituting: mg - ma = ma → mg = 2ma → **a = g/2**. Both particles move with this acceleration, A horizontally, B vertically.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "A particle is moving in the i-j plane. Its position at time t is given by r = (2t + 3)i + (t² - 4t)j. Find when its velocity is parallel to the vector i + j. (2 steps)", "answer": "- Step 1: Velocity v = dr/dt = 2i + (2t - 4)j. For v to be parallel to i + j, the ratio of j to i components must be 1: (2t - 4)/2 = 1.\n- Step 2: 2t - 4 = 2 → 2t = 6 → **t = 3 seconds**. At t = 3, v = 2i + 2j = 2(i + j).", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "Two particles are connected by a string over a smooth pulley. Particle A (mass 2m) is on a smooth plane inclined at 30°, particle B (mass m) hangs. Find the acceleration. (3 steps)", "answer": "- Step 1: For A (up the plane positive): T - 2m·g·sin30° = 2m·a → T - 2m·g·(½) = 2ma → T - mg = 2ma.\n- Step 2: For B (downward positive): m·g - T = m·a.\n- Step 3: Add equations: mg - mg = 2ma + ma → 0 = 3ma → **a = 0** (they balance exactly with these masses). If masses were different, you'd get non-zero acceleration.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "A particle slides down a rough plane (μ = 0.2) inclined at angle α where tanα = 3/4. What is the acceleration? (2 steps)", "answer": "- Step 1: sinα = 3/5, cosα = 4/5. Downward component of weight: mg·sinα = mg·(3/5). Friction: μmg·cosα = 0.2·mg·(4/5) = 0.8mg/5 = 0.16mg.\n- Step 2: Net force down plane = mg·sinα - μmg·cosα = mg(3/5 - 4/25) = mg(15/25 - 4/25) = 11mg/25. Acceleration = **11g/25 ≈ 0.44g**.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "In a collision, the coefficient of restitution is e. What does e = 0 and e = 1 represent? (1 step)", "answer": "**e = 0** means a **perfectly inelastic** collision (objects stick together, maximum kinetic energy lost). **e = 1** means a **perfectly elastic** collision (no kinetic energy lost). The coefficient measures the ratio of relative speed of separation to relative speed of approach: e = v_separation / v_approach.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "A particle is thrown from ground level at speed u at angle θ to the horizontal. What is the maximum height reached? (1 step)", "answer": "At maximum height, vertical velocity = 0. Using v² = u² + 2as with u_y = u·sinθ, a = -g, v_y = 0: 0 = (u·sinθ)² - 2gH → **H = (u²·sin²θ) / (2g)**.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "A car travels around a bend of radius r at constant speed v. What provides the centripetal force, and what is its magnitude? (1 step)", "answer": "The **friction between tires and road** provides the centripetal force (assuming no banking). Magnitude: **F = mv²/r**, directed toward the center of the curve. If friction is insufficient, the car skids outward.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "A particle moves in a circle with constant speed. Is there any net work done on the particle? (1 step)", "answer": "**No net work is done** because the force (centripetal, toward center) is **perpendicular** to the displacement at all times. Work = F·d = Fd·cos(90°) = 0. Kinetic
