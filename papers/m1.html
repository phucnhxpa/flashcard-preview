ensible string, the same mass hangs on both sides. What is the acceleration if one side is on a smooth incline and the other hangs vertically? (2 steps)", "answer": "- Step 1: Set up the system\n  + Both masses = m.\n  + Incline angle = α.\n  + Let the hanging side pull downward (determine direction from weights).\n  + Weight pulling down on hanging side = mg.\n  + Weight component down incline on other side = mg sin α.\n  + Since mg > mg sin α for α < 90°, the hanging side will go down.\n\n- Step 2: Find acceleration\n  + Net driving force = mg - mg sin α = mg(1 - sin α)\n  + Total mass = m + m = 2m\n  + a = (net force)/(total mass) = mg(1 - sin α)/(2m) = g(1 - sin α)/2\n\nThis is less than g/2 (which would be the acceleration if one side were horizontal with no friction). The incline reduces the effective weight difference.", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": false}, {"question": "A ball of mass m hits a wall perpendicularly with speed u and rebounds with speed v. What is the impulse on the ball? What is the impulse on the wall? (2 steps)", "answer": "- Step 1: Impulse on the ball\n  + Impulse = change in momentum = m(v_final - v_initial)\n  + Initial velocity = u (toward wall, positive direction)\n  + Final velocity = -v (away from wall, negative direction)\n  + Impulse = m(-v - u) = -m(v + u)\n  + Magnitude = m(v + u), direction away from wall.\n\n- Step 2: Impulse on the wall\n  + By Newton's third law, forces are equal and opposite.\n  + Impulse on wall = - (impulse on ball) = m(v + u) in magnitude, toward the wall.\n  + The wall (assumed immovable/fixed) doesn't move, so its impulse isn't observable as motion, but the force exchange is real.\n\nImpulse is a vector—sign matters. The negative impulse on the ball shows the reversal of direction.", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "When is it appropriate to model a surface as \"smooth\" versus \"rough\"? What information typically tells you which to use? (2 steps)", "answer": "- Step 1: Smooth surfaces\n  + No friction—used when the problem doesn't mention friction or explicitly says \"smooth,\" \"frictionless,\" or \"roughness is negligible.\"\n  + Easier to solve—no friction force to consider.\n  + Typical in idealised problems.\n\n- Step 2: Rough surfaces\n  + When friction is mentioned (\"rough,\" \"coefficient of friction μ,\" or gives a friction force value).\n  + When realistic behavior is needed—you can't have perpetual motion on a rough surface.\n  + The problem might say \"the rough surface\" or give μ explicitly.\n  + If no information is given about friction, default to smooth (unless stated otherwise in context).\n\nIn A-level M1, always check the wording: \"smooth\" = no friction; \"rough\" or any μ value = friction present; no mention = assume smooth (but this varies by exam board convention—Edexcel usually states explicitly).", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "A particle of mass m is projected up a rough inclined plane with initial speed u. It comes to rest momentarily and slides back down. How do you find (a) the distance up the plane, (b) the speed when it returns to the bottom? (3 steps)", "answer": "- Step 1: Going up—the particle decelerates\n  + Forces: gravity component down plane = mg sin α, friction also down plane (opposing motion) = μmg cos α.\n  + Net deceleration: a_up = -g(sin α + μ cos α)\n  + Using v² = u² + 2as: 0 = u² + 2(-a_up)s → s = u²/(2g(sin α + μ cos α))\n\n- Step 2: Coming down—the particle accelerates\n  + Now motion is down, so friction acts UP the plane.\n  + Net acceleration: a_down = g(sin α - μ cos α)\n  + Starting from rest at the top, using v² = u² + 2as with u = 0:\n  + v² = 2 × g(sin α - μ cos α) × s\n  + Substitute s from part (1): v² = u² × (sin α - μ cos α)/(sin α + μ cos α)\n\n- Step 3: Interpretation\n  + The return speed is less than the launch speed (as expected—the rough surface removes energy).\n  + If μ = 0 (smooth), v = u (energy conserved).\n  + If μ is large enough that μ > tan α, the particle won't slide back down at all.\n\nFriction removes mechanical energy: the return speed is always less than launch speed unless the surface is smooth.", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": true}, {"question": "Explain what is meant by \"terminal velocity\" in the context of a falling object with air resistance. When does it occur? (2 steps)", "answer": "- Step 1: What terminal velocity means\n  + Terminal velocity is the constant speed reached when air resistance equals the weight.\n  + At this point, net force = 0, so acceleration = 0.\n  + The object continues falling at constant speed.\n\n- Step 2: When it occurs\n  + Air resistance typically increases with speed (R = kv or R = cv²).\n  + Initially, weight > resistance → acceleration downward.\n  + As speed increases, resistance increases.\n  + Eventually resistance = weight → equilibrium → constant velocity.\n  + In the skydiver problem: after parachute opens, resistance jumps (3200 N > weight 2450 N), causing upward acceleration (deceleration), then settling to new terminal velocity.\n\nTerminal velocity is the equilibrium between driving force (gravity) and resisting force (drag)—the speed at which forces balance.", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": true}, {"question": "A particle is attached to a string and rotates in a horizontal circle at constant speed. What provides the centripetal force? If the string makes an angle to the vertical, how does this affect the analysis? (2 steps)", "answer": "- Step 1: Horizontal circular motion\n  + The particle moves in a horizontal circle at constant speed.\n  + The centripetal force required is mv²/r, directed toward the center.\n  + This is provided by the horizontal component of the string tension: T sin θ.\n\n- Step 2: With string at an angle to vertical\n  + Vertical equilibrium: T cos θ = mg (the vertical component supports the weight).\n  + Horizontal centripetal force: T sin θ = mv²/r.\n  + From these: T = mg/cos θ, and the radius of the circle is r = L sin θ (where L is string length).\n  + Combining: (mg/cos θ) sin θ = mv²/r → mg tan θ = mv²/r.\n\nThe angle of the string adjusts so that the horizontal component of tension provides exactly the centripetal force needed, while the vertical component balances the weight.", "source": "MiniMax ②", "_id": "minimax_2_58", "judge_pick": false}], "count": 59}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 8896, "out_tokens": 22439, "reasoning_chars": 1620, "cost_eur": 0.0808, "elapsed_s": 486, "content_chars": 76137}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 8896, "out_tokens": 23902, "reasoning_chars": 44575, "cost_eur": 0.0856, "elapsed_s": 500, "content_chars": 44106}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 8896, "out_tokens": 25866, "reasoning_chars": 2170, "cost_eur": 0.0919, "elapsed_s": 777, "content_chars": 90896}, "kimi_2": {"run": 2, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.7, "in_tokens": 8854, "out_tokens": 35993, "reasoning_chars": 82925, "cost_eur": 0.1602, "elapsed_s": 693, "content_chars": 52598}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 8741, "out_tokens": 14221, "reasoning_chars": 2736, "cost_eur": 0.016, "elapsed_s": 145, "content_chars": 47802}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 8741, "out_tokens": 19503, "reasoning_chars": 2036, "cost_eur": 0.0213, "elapsed_s": 193, "content_chars": 64001}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 9138, "out_tokens": 3414, "reasoning_chars": 4181, "cost_eur": 0.0055, "elapsed_s": 52, "content_chars": 9008}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 9138, "out_tokens": 4417, "reasoning_chars": 4515, "cost_eur": 0.0066, "elapsed_s": 64, "content_chars": 12402}, "qwen_3": {"run": 3, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 9138, "out_tokens": 2706, "reasoning_chars": 4023, "cost_eur": 0.0047, "elapsed_s": 44, "content_chars": 6988}, "qwen_4": {"run": 4, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 9138, "out_tokens": 2953, "reasoning_chars": 4448, "cost_eur": 0.0049, "elapsed_s": 45, "content_chars": 6217}}};
const SK='m1_past_papers';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
