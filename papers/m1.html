p.\n- Step 2: Write F = ma for A (along the plane, in the direction of motion): $$T - m_A g\\sin\\alpha - \\mu m_A g\\cos\\alpha = m_A a$$ (friction opposes A's upward motion).\n- Step 3: Write F = ma for B (downward positive): $$m_B g - T = m_B a$$.\n- Step 4: Add the two equations to eliminate $$T$$: $$m_B g - m_A g\\sin\\alpha - \\mu m_A g\\cos\\alpha = (m_A + m_B)a$$. Solve for $$a$$, then substitute back to find $$T$$.\n\n+ This systematic approach works for ALL connected particle problems: (1) determine direction, (2) write equation for each particle, (3) add to eliminate T, (4) solve.", "source": "GLM 5.1 ③", "_id": "glm_3_39"}, {"question": "When resolving forces on an inclined plane, why is it often easier to resolve **along and perpendicular to the plane** rather than horizontally and vertically? (2 steps)", "answer": "- Step 1: When you resolve along and perpendicular to the plane, the normal reaction and friction each appear in only ONE equation (R perpendicular, F along). This makes the equations simpler and more intuitive.\n- Step 2: If you resolve horizontally and vertically, both R and F have components in both directions (since they're at angle $$\\alpha$$ to horizontal/vertical). This introduces $$\\sin\\alpha$$ and $$\\cos\\alpha$$ into both equations, making them messier and more error-prone.\n\n+ Exception: if an external force acts horizontally or vertically (like a pushing force), it might be easier to resolve in those directions. Choose the resolution that minimises the number of components you need to calculate.", "source": "GLM 5.1 ③", "_id": "glm_3_77"}, {"question": "Why does normal reaction differ from weight during vertical deceleration?", "answer": "- Step 1: Newton's 2nd Law: N - mg = -ma (if decelerating upward).\n+ Example: Object hitting floor decelerates upward → N > mg.\n- Step 2: When object decelerates (a upward), N = m(g - a). If a is downward: N = m(g + a).\n+ Example: Free fall (a = g) → N = 0 (weightless).\n\n**Takeaway:** N ≠ mg when there's vertical acceleration; N = m(g ± a) depending on direction.", "source": "Qwen 3 ②", "_id": "qwen_2_9"}, {"question": "Why is it important to use consistent sign conventions throughout a mechanics problem, and what goes wrong if you don't? (2 steps)", "answer": "- Step 1: In mechanics, signs represent directions. If you choose \"right = positive\" for one particle and \"left = positive\" for another in the same connected system, the tension forces will have wrong signs when you add the equations, leading to incorrect acceleration and tension values.\n- Step 2: Common error: for connected particles, if A moves right and B moves down, you might choose right as positive for A and down as positive for B. This is fine AS LONG AS the tension appears with opposite signs in the two equations (pulling A left = negative, pulling B up = negative in B's equation). If both tensions appear with the same sign, you've been inconsistent.\n\n+ Best practice: explicitly state your positive direction at the start of each equation. For example: \"For A (up the plane positive): $$T - mg\\sin\\alpha - F = ma$$\" and \"For B (downward positive): $$mg - T = ma$$.\" Notice $$T$$ is positive in A's equation (pulling up) and negative in B's equation (opposing downward motion).", "source": "GLM 5.1 ③", "_id": "glm_3_71"}, {"question": "A particle slides down a rough inclined plane (angle $$\\alpha$$, coefficient of friction $$\\mu$$). The particle is initially moving up the plane. Describe how the acceleration changes from the upward phase to the downward phase. (3 steps)", "answer": "- Step 1: While moving UP: both the weight component ($$mg\\sin\\alpha$$) and friction ($$\\mu mg\\cos\\alpha$$) act DOWN the slope. The deceleration is $$a_{up} = -g\\sin\\alpha - \\mu g\\cos\\alpha$$ (large deceleration).\n- Step 2: When the particle comes to rest momentarily, check if it slides back. It will slide back if $$mg\\sin\\alpha > \\mu mg\\cos\\alpha$$, i.e., $$\\tan\\alpha > \\mu$$. If $$\\tan\\alpha \\leq \\mu$$, the particle remains at rest (friction is sufficient to hold it).\n- Step 3: While sliding DOWN: the weight component acts down the slope but friction now acts UP the slope (opposing the downward motion). The acceleration is $$a_{down} = g\\sin\\alpha - \\mu g\\cos\\alpha$$ (smaller acceleration than the deceleration was). The magnitude of deceleration going up is GREATER than the magnitude of acceleration going down, because friction assists deceleration going up but opposes acceleration going down.", "source": "GLM 5.1 ①", "_id": "glm_1_62"}, {"question": "A student says \"If two objects stick together after a collision, kinetic energy must be conserved because momentum is conserved.\" Evaluate this statement. (2 steps)", "answer": "- Step 1: The statement is false. Momentum is ALWAYS conserved in a closed system with no external forces, regardless of the type of collision.\n- Step 2: Kinetic energy is only conserved in perfectly elastic collisions. When objects stick together (perfectly inelastic collision), maximum kinetic energy is lost (converted to heat, sound, deformation). Conserving momentum does NOT imply conserving kinetic energy.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "An acceleration-time ($$a$$-$$t$$) graph dips below the horizontal axis between $$t=4$$ and $$t=6$$. What does a negative area signify physically? (2 steps)", "answer": "- Step 1: The area under an $$a$$-$$t$$ graph represents the change in velocity $$\\Delta v$$.\n- Step 2: A negative area means the change in velocity is negative; the object is decelerating (or accelerating in the negative direction). If the object was moving in the positive direction, it is slowing down.", "source": "GLM 5.1 ②", "_id": "glm_2_45"}, {"question": "What is the physical meaning of $$N = m(g - a)$$ for an object falling and then decelerating on impact? When is $$N > mg$$ and when is $$N < mg$$? (3 steps)", "answer": "- Step 1: During impact, the normal reaction $$N$$ acts upward and weight $$mg$$ acts downward. Newton's 2nd Law (taking upward as positive): $$N - mg = ma$$, where $$a$$ is the acceleration (positive if upward).\n- Step 2: Rearranging: $$N = m(g + a)$$. During deceleration on landing, $$a$$ is positive (upward deceleration), so $$N = m(g + a) > mg$$. You feel heavier during impact.\n- Step 3: If the object were in a lift accelerating downward, $$a$$ would be negative (downward acceleration), so $$N = m(g - |a|) < mg$$. You feel lighter. In free fall ($$a = -g$$): $$N = m(g - g) = 0$$ — weightlessness!\n\n+ The formula $$N = m(g - a)$$ from the notes uses downward as positive for $$a$$, so $$a$$ is negative when decelerating upward, giving $$N = m(g + |a|) > mg$$. The sign convention must be consistent.", "source": "GLM 5.1 ③", "_id": "glm_3_42"}, {"question": "What is the definition of a **bearing**, and how do you convert a bearing angle into $$\\mathbf{i}$$ and $$\\mathbf{j}$$ vector components? (3 steps)", "answer": "- Step 1: A bearing is measured **clockwise from North** (the positive $$\\mathbf{j}$$ direction). This is the opposite convention to standard maths angles (anti-clockwise from positive $$x$$-axis).\n- Step 2: For a bearing $$\\alpha$$, think of the direction as rotated $$\\alpha°$$ clockwise from North. The components are: $$\\mathbf{i}$$-component = speed × $$\\sin\\alpha$$ (East), $$\\mathbf{j}$$-component = speed × $$\\cos\\alpha$$ (North).\n- Step 3: Example: bearing 330° means 330° clockwise from North = 30° West of North. So $$\\sin 330° = -\\sin 30° = -1/2$$ (West component) and $$\\cos 330° = \\cos 30° = \\sqrt{3}/2$$ (North component). If speed is 20: velocity = $$20(-\\frac{1}{2}\\mathbf{i} + \\frac{\\sqrt{3}}{2}\\mathbf{j}) = -10\\mathbf{i} + 10\\sqrt{3}\\mathbf{j}$$.\n\nCommon error: using bearing as if it were a standard angle from the positive $$x$$-axis. Always draw: North up, then rotate clockwise.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "What’s the physical meaning of impulse as a negative value?", "answer": "Impulse (J = Δp) is a vector. Negative sign indicates direction:  \n- Example: A ball hitting a wall reverses velocity. If initial momentum is +mu, final is -mu → J = -mu - mu = -2mu.  \nImpulse on the wall is +2mu (Newton’s 3rd law pair).", "source": "Qwen 3 ①", "_id": "qwen_1_6"}, {"question": "On a rough inclined plane at angle $$α$$ to the horizontal, derive why the component of weight acting down the slope is $$mg\\sinα$$ and the component perpendicular into the plane is $$mg\\cosα$$. (3 steps)", "answer": "- Step 1: Draw the right triangle formed by the weight vector $$mg$$ (vertically down), its component parallel to the slope, and its component perpendicular to the slope. The angle between the vertical and the normal to the slope is $$α$$.\n- Step 2: By geometry, the angle between the weight vector and the normal to the plane is $$α$$. Therefore, the component perpendicular to the plane (adjacent to $$α$$) is $$mg\\cosα$$.\n- Step 3: The component parallel to the plane (opposite to $$α$$) is $$mg\\sinα$$. Alternatively, use a rotated coordinate system with $$x$$ down the slope and $$y$$ perpendicular; then gravity makes angle $$α$$ with the negative $$y$$-axis, yielding the same components.", "source": "Kimi K2.6 ②", "_id": "kimi_2_18"}, {"question": "A particle is being pulled UP a rough inclined plane by a string. The string breaks. Explain why the particle might eventually slide DOWN, and what forces act on it during the downward slide. (3 steps)", "answer": "- Step 1: Once the string breaks, the upward tension is removed. The only forces remaining are the weight component down the slope and friction.\n- Step 2: The particle will decelerate to a stop. At the instant it stops, the driving force up the slope is zero.\n- Step 3: If the weight component down the slope ($$mg\\sin\\alpha$$) exceeds the maximum static friction up the slope ($$\\mu mg\\cos\\alpha$$), the particle will start to slide DOWN. During this downward slide, kinetic friction acts UP the slope, opposing the downward motion.", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "A particle is attached to a light inextensible string which passes over a smooth fixed pulley. The string is initially slack. When the string becomes taut, explain why this is like a perfectly inelastic collision and why kinetic energy is NOT conserved. (3 steps)", "answer": "- Step 1: When the string becomes taut, both particles suddenly move at the same speed (because the string is inextensible). This is exactly like a perfectly inelastic collision where two objects stick together and share a common velocity.\n- Step 2: Momentum IS conserved (no external horizontal/vertical forces in the direction of motion). But kinetic energy is NOT conserved because some energy is converted to heat/sound/deformation when the string jerks taut — just like in a real inelastic collision.\n- Step 3: You can verify: KE before = $$\\frac{1}{2}mU^2$$, KE after = $$\\frac{1}{2}(4m)\\left(\\frac{U}{4}\\right)^2 = \\frac{mU^2}{8}$$. The KE has decreased from $$\\frac{mU^2}{2}$$ to $$\\frac{mU^2}{8}$$ — a significant loss. This is why you must use conservation of momentum, not conservation of energy, for \"string becomes taut\" problems.", "source": "GLM 5.1 ①", "_id": "glm_1_61"}, {"question": "Why must bearings be measured clockwise from North?", "answer": "Bearings are a navigational standard to avoid ambiguity. Measuring clockwise from North:\n- Ensures everyone (pilots, sailors) interprets directions the same way.\n- Unlike mathematical angles (counter-clockwise from x-axis), bearings prioritize practical navigation.\n- Example: 090° bearing = East (clockwise from North), not 0° (which would be North).\n\n**Takeaway:** Bearings use clockwise from North for universal consistency in real-world navigation.", "source": "Qwen 3 ②", "_id": "qwen_2_2"}, {"question": "(Edge case) In a moments problem involving a rod on the point of tilting, why must the reaction force at the support about which it tilts remain non-zero, while the reaction at the other support becomes zero? (2 steps)", "answer": "- Step 1: Tilting means rotation begins about one support. The other support loses contact because the rod lifts off it; without contact, there can be no normal reaction (action-reaction pair requires proximity).\n- Step 2: The pivot support must still exert a reaction because the rod is pressing on it (it is the centre of rotation). This reaction and any friction at that point generally remain unknown unless specifically asked for.", "source": "Kimi K2.6 ②", "_id": "kimi_2_41"}, {"question": "(Conceptual) Why does the impulse-momentum principle $$I = \\Delta(mv)$$ not require the force to be constant, whereas the SUVAT equations do require constant acceleration? (2 steps)", "answer": "- Step 1: Impulse is defined as the integral of force over time, $$I = \\int F \\, dt$$. By Newton's second law, $$F = \\frac{d(mv)}{dt}$$, so integrating yields $$I = \\Delta(mv)$$ regardless of how $$F$$ varies in time.\n- Step 2: The SUVAT equations are derived by integrating $$a = \\text{const}$$. If $$a$$ varies, $$v = u + at$$ and $$s = ut + \\frac{1}{2}at^2$$ are false because they assume constant slope in the $$v$$-$$t$$ graph.", "source": "Kimi K2.6 ②", "_id": "kimi_2_44"}, {"question": "Why does the area under a-t graph equal change in velocity?", "answer": "- Step 1: a = dv/dt → integrating both sides: ∫a dt = Δv.\n- Step 2: Graphically, area under a-t = ∫a dt = v_final - v_initial.\n+ Example: If acceleration = -0.5 m/s² for 4s → Δv = -0.5 × 4 = -2 m/s.\n\n**Takeaway:** Area under a-t = Δv, just like area under v-t = displacement.", "source": "Qwen 3 ②", "_id": "qwen_2_14"}, {"question": "When a particle is at rest on a rough surface and a force is applied, explain the difference between static friction and limiting friction. When do you use $$F = \\mu R$$? (2 steps)", "answer": "- Step 1: Static friction is whatever force is needed to keep the particle in equilibrium, up to a maximum. If the applied force is small, friction matches it exactly and the particle doesn't move. Static friction can be ANY value from 0 up to $$\\mu R$$.\n- Step 2: Limiting friction ($$F = \\mu R$$) is the MAXIMUM static friction, reached when the particle is on the point of sliding. You only use $$F = \\mu R$$ when: (a) the particle is moving (kinetic friction = limiting friction in M1), or (b) the particle is on the point of moving (limiting equilibrium). If the particle is stationary and NOT about to slide, friction is LESS than $$\\mu R$$ and you find it from equilibrium equations.", "source": "GLM 5.1 ①", "_id": "glm_1_64"}, {"question": "A particle is in limiting equilibrium on a rough inclined plane. The plane is then tilted slightly. Describe what happens to the friction force. (2 steps)", "answer": "- Step 1: At limiting equilibrium\n  + The particle is on the verge of sliding.\n  + Friction is at its maximum value: F_max = μR = μmg cos α.\n  + The weight component down the plane mg sin α equals this maximum friction.\n\n- Step 2: When angle increases\n  + If the angle increases beyond α, mg sin α now exceeds μmg cos α.\n  + The particle accelerates down the plane.\n  + Friction then acts UP the plane (opposing motion), at value F = μmg cos α (the kinetic friction, equal to μR, not the limiting static value).\n  + The net force is mg sin α - μmg cos α, giving acceleration a = g(sin α - μ cos α).\n\nFriction adjusts to oppose motion (or impending motion): static friction adjusts up to μR, kinetic friction equals μR constantly.", "source": "MiniMax ②", "_id": "minimax_2_35"}, {"question": "A student draws the tension force pointing TOWARDS the particle on a free-body diagram. Why is this incorrect, and what is the correct direction? (2 steps)", "answer": "- Step 1: A string can only PULL; it cannot push. Therefore, the tension force exerted BY the string ON the particle must pull the particle towards the string.\n- Step 2: The correct direction is AWAY from the particle, along the string. If the string is attached above the particle, tension points vertically upwards. If attached to a pulley, it points along the string away from the particle towards the pulley.", "source": "GLM 5.1 ②", "_id": "glm_2_44"}, {"question": "What is the coefficient of restitution (e)? How does it relate to the velocities before and after a collision? (2 steps)", "answer": "- Step 1: Definition\n  + The coefficient of restitution e is defined as:\n  + $$e = \\frac{\\text{relative speed of separation}}{\\text{relative speed of approach}}$$\n  + It measures how \"elastic\" a collision is: 0 ≤ e ≤ 1.\n  + e = 1: perfectly elastic (kinetic energy conserved).\n  + e = 0: perfectly inelastic (objects stick together).\n\n- Step 2: The formula\n  + If objects approach at speeds u₁, u₂ and separate at v₁, v₂:\n  + $$e = \\frac{v_2 - v_1}{u_1 - u_2}$$\n  + The velocities must be taken with proper signs (direction matters).\n  + Example: e = 0.5 means the separation speed is half the approach speed.\n\nThis is crucial for collision problems: momentum is ALWAYS conserved (regardless of e), but kinetic energy is only conserved if e = 1.", "source": "MiniMax ②", "_id": "minimax_2_23"}, {"question": "A ball is thrown vertically upward with initial speed 24 m/s from a height of 2.5 m above the ground. Conceptually, how do you find the speed when it hits the ground and the total time of flight? (3 steps)", "answer": "- Step 1: For the speed at the ground, use $$v^2 = u^2 + 2as$$ with $$u = 24$$ m/s (upward), $$a = -9.8$$ m/s², $$s = -2.5$$ m (displacement is downward). $$v^2 = 576 + 2(9.8)(2.5) = 576 + 49 = 625$$, so $$v = 25$$ m/s.\n- Step 2: For total time, use $$s = ut + \\frac{1}{2}at^2$$: $$-2.5 = 24t - 4.9t^2$$, or $$4.9t^2 - 24t - 2.5 = 0$$. Solve the quadratic for the positive root.\n- Step 3: Alternatively, use $$v = u + at$$: $$-25 = 24 - 9.8t$$ (taking downward as negative for velocity), giving $$t = 49/9.8 = 5$$ s. The sign of $$v$$ is negative because the ball is moving downward at impact.\n\n+ Key insight: the ball is moving FASTER at the ground (25 m/s) than when thrown (24 m/s) because it started 2.5 m above the ground, gaining additional speed from the extra fall distance.", "source": "GLM 5.1 ③", "_id": "glm_3_36"}, {"question": "In the scenario from Q1, the impulse on A when the string becomes taut is asked for. Explain what impulse means here, why it is negative, and derive its magnitude. (3 steps)", "answer": "- Step 1: Impulse on A = change in momentum of A = $$m v_A - m u_A$$. Before the string is taut, A moves at $$U$$; after, A moves at $$\\frac{U}{4}$$. So Impulse on A = $$m\\left(\\frac{U}{4}\\right) - mU = -\\frac{3mU}{4}$$.\n- Step 2: The impulse is negative because A was moving in the positive direction and the string pulled it back — it slowed down. The string exerts a backward force on A (tension acts away from A, towards B), so the impulse on A is in the opposite direction to A's motion.\n- Step 3: The magnitude of the impulse on A is $$\\frac{3mU}{4}$$. By Newton's 3rd Law, the impulse on B is equal and opposite: $$+\\frac{3mU}{4}$$ (forward), which matches B's momentum change from 0 to $$3m \\times \\frac{U}{4}$$.\n\nTakeaway: Impulse on each object in the system is equal and opposite; the magnitude equals the change in momentum of either particle.", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "In an impulse problem, a ball of mass 0.2 kg hits a wall at 9 m/s and rebounds at 9 m/s. What is the impulse, and why is it NOT zero even though the speed is the same before and after? (2 steps)", "answer": "- Step 1: Impulse = change in momentum = $$m(v - u)$$. Taking the initial direction as positive: $$I = 0.2(-9 - 9) = 0.2 \\times (-18) = -3.6$$ Ns. The magnitude is 3.6 Ns.\n- Step 2: The impulse is NOT zero because **velocity** has changed direction, even though **speed** hasn't. Momentum is $$m\\mathbf{v}$$ (a vector), so a change in direction means a change in momentum. The wall exerts a force that reverses the ball's direction.\n\n+ Common error: thinking \"same speed = no impulse.\" Speed is a scalar; momentum and impulse are vectors. Direction matters! A 180° reversal at the same speed gives the maximum possible impulse for that speed.", "source": "GLM 5.1 ③", "_id": "glm_3_62"}, {"question": "(Misconception probe) A student tries to solve a two-stage motion problem by plugging the total time and total distance into a single $$s = ut + \\frac{1}{2}at^2$$. Explain the flaw in this reasoning using the concept of acceleration. (2 steps)", "answer": "- Step 1: The equation $$s = ut + \\frac{1}{2}at^2$$ assumes acceleration $$a$$ is **constant** over the entire time interval $$t$$. In a two-stage problem, the acceleration changes (e.g., from free fall to parachute drag).\n- Step 2: Using a single equation effectively assumes a fictitious constant acceleration that equals neither stage's true acceleration. The correct method is to apply the equation separately to each stage, using the final state of stage 1 as the initial state of stage 2.", "source": "Kimi K2.6 ②", "_id": "kimi_2_33"}, {"question": "How do you find the **angle** a resultant force vector $$\\mathbf{F} = a\\mathbf{i} + b\\mathbf{j}$$ makes with the positive $$\\mathbf{i}$$-direction, and what is the common quadrant error? (3 steps)", "answer": "- Step 1: The angle satisfies $$\\tan\\theta = b/a$$. But $$\\arctan(b/a)$$ only gives values between $$-90°$$ and $$+90°$$, which covers the 1st and 4th quadrants.\n- Step 2: You must check the **signs of both components** to determine the correct quadrant. If $$a > 0, b > 0$$: 1st quadrant. If $$a < 0, b > 0$$: 2nd quadrant (add 180°). If $$a < 0, b < 0$$: 3rd quadrant (add 180°). If $$a > 0, b < 0$$: 4th quadrant.\n- Step 3: Example: $$\\mathbf{F} = -8\\mathbf{i} + 15\\mathbf{j}$$. $$\\tan\\theta = 15/(-8)$$. The calculator gives $$\\arctan(-15/8) \\approx -62°$$, but since $$a < 0$$ and $$b > 0$$, the vector is in the **2nd quadrant**. The correct angle is $$180° - 62° = 118°$$ from the positive $$\\mathbf{i}$$-direction.\n\n+ Common error: blindly using the calculator's $$\\arctan$$ value without checking the quadrant. Always sketch the vector first — which quadrant is the arrow pointing into?", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "(Speed-Time Graphs) Why is the area under a velocity-time graph equal to displacement, but the area under an acceleration-time graph equals change in velocity? (3 steps)", "answer": "- Step 1: By definition, $ v = \\frac{ds}{dt} $, so integrating $ v \\, dt $ gives $ s $.  \n- Step 2: Similarly, $ a = \\frac{dv}{dt} $, so integrating $ a \\, dt $ gives $ \\Delta v $.  \n- Step 3: Graphically, area under $ v(t) $ accumulates distance; area under $ a(t) $ accumulates speed changes.  \n\n**Takeaway:** Integration reverses differentiation: $ \\int v \\, dt = s $, $ \\int a \\, dt = \\Delta v $.", "source": "Qwen 3 ③", "_id": "qwen_3_8"}, {"question": "In the scenario where a slack string becomes taut, how does the impulse experienced by particle A compare to the impulse experienced by particle B, both in magnitude and direction? (2 steps)", "answer": "- Step 1: By Newton's Third Law, the string pulls A backwards and B forwards with equal and opposite forces over the same instantaneous time interval, so the impulses have equal magnitude.\n- Step 2: The impulse on A is $$m_A V - m_A U$$ (a negative value, slowing A down), and the impulse on B is $$m_B V - 0$$ (a positive value, speeding B up). Their magnitudes are equal because the total change in momentum is zero (momentum conservation): $$|m_A(V-U)| = |m_B V|$$.\n\nTakeaway: Impulse is equal and opposite for connected particles, just like forces.", "source": "GLM 5.1 ②", "_id": "glm_2_1"}, {"question": "Why does a string becoming taut conserve momentum but not kinetic energy?", "answer": "- Step 1: **Momentum conservation** applies because internal forces (tension) cancel in the system (A + B).  \n- Step 2: **KE loss** occurs due to inelastic collision – the string absorbs energy as heat/sound when tightening.  \n- Step 3: Use m₁u₁ + m₂u₂ = (m₁ + m₂)V, but KE_initial ≠ KE_final.", "source": "Qwen 3 ①", "_id": "qwen_1_8"}, {"question": "How can you find the change in velocity of a particle directly from an acceleration-time graph, and why does this work even when the acceleration function is not constant? (2 steps)", "answer": "- Step 1: Since $$a = \\frac{dv}{dt}$$, integrating acceleration with respect to time gives velocity change: $$\\Delta v = \\int_{t_1}^{t_2} a \\, dt$$. Geometrically, this integral is the **signed area** under the $$a$$-$$t$$ graph between those times.\n- Step 2: This works for **any** shape of the $$a$$-$$t$$ graph because integration does not require constant acceleration. For piecewise-linear graphs, compute areas of triangles, rectangles, and trapezia and sum them with correct signs.", "source": "Kimi K2.6 ②", "_id": "kimi_2_12"}, {"question": "A uniform rod of length $$L$$ rests on two supports, one at end A and one at distance $$d$$ from end B. A weight is placed at B. As the weight increases, which support does the rod tilt about, and what happens to the reaction at the other support? (3 steps)", "answer": "- Step 1: The rod will tilt about the support closest to the weight, which is the one at distance $$d$$ from B. This support becomes the pivot.\n- Step 2: As the weight increases, it causes a clockwise moment about this pivot. To maintain equilibrium, the reaction at A must provide an anti-clockwise moment.\n- Step 3: However, the reaction at A cannot be negative (a support can only push UP). When the weight is so large that the moment cannot be balanced, the reaction at A drops to zero, and the rod loses contact with A, tilting about the support near B.", "source": "GLM 5.1 ②", "_id": "glm_2_49"}, {"question": "A rough inclined plane problem gives $$\\tan α = 5/12$$. Without a calculator, explain how to obtain exact values for $$\\sin α$$ and $$\\cos α$$ using a Pythagorean triple, and why this is useful for keeping equations exact. (2 steps)", "answer": "- Step 1: If $$\\tan α = \\frac{\\text{opposite}}{\\text{adjacent}} = \\frac{5}{12}$$, imagine a right triangle with those legs. The hypotenuse is $$\\sqrt{5^2 + 12^2} = 13$$.\n- Step 2: Therefore $$\\sin α = \\frac{5}{13}$$ and $$\\cos α = \\frac{12}{13}$$. Using these exact fractions avoids decimal rounding errors during algebraic manipulation, allowing clean cancellation of $$m$$ and $$g$$ terms.", "source": "Kimi K2.6 ②", "_id": "kimi_2_19"}, {"question": "An object falls freely under gravity, then opens a parachute causing a constant upward resistance. Sketch conceptually how the speed-time graph looks for the two stages and explain the slopes. (3 steps)", "answer": "- Step 1: Stage 1 (free fall): acceleration is constant $$g$$ downward. On a speed-time graph, speed increases linearly with time; the slope is $$+g$$ (taking speed as magnitude).\n- Step 2: Stage 2 (parachute open): there is a large upward air resistance. The net acceleration is downward but smaller than $$g$$, or even upward if resistance exceeds weight. The slope of the speed-time graph changes abruptly to a smaller positive value or a negative value (deceleration).\n- Step 3: The graph is continuous in speed (the parachute does not cause an instantaneous speed jump—there is no infinite impulse), but the slope (acceleration) has a corner or discontinuity at the opening instant.", "source": "Kimi K2.6 ②", "_id": "kimi_2_13"}, {"question": "In a collision, the impulse on object A is $$+I$$ Ns. What is the impulse on object B, and why? (2 steps)", "answer": "- Step 1: By Newton's 3rd Law, the force that A exerts on B is equal and opposite to the force that B exerts on A. Since impulse = force × time (and the contact time is the same for both), the impulse on B is $$-I$$ Ns.\n- Step 2: This means: if A gains momentum in one direction due to the collision, B loses the same amount of momentum in that direction (or gains it in the opposite direction). Total momentum is conserved: $$\\Delta p_A + \\Delta p_B = 0$$.\n\n+ Example: if A's momentum changes by $$-3mU/4$$ (loses momentum), then B's momentum changes by $$+3mU/4$$ (gains the same amount). The impulses are equal and opposite.", "source": "GLM 5.1 ③", "_id": "glm_3_75"}, {"question": "For a light, inextensible string passing over a **smooth pulley**, what can you say about the tension on each side? What if the pulley is **rough**? (2 steps)", "answer": "- Step 1: For a **smooth pulley**, there is no friction between the string and pulley to create a tension difference. Therefore, **the tension is the same on both sides** of the pulley: $$T_1 = T_2$$. This is true regardless of the masses attached.\n- Step 2: For a **rough pulley**, friction between the string and pulley can create different tensions on each side: $$T_1 \\neq T_2$$. At A-level M1, pulleys are assumed smooth unless stated otherwise. Also, \"light\" string means the string has zero mass, so there's no weight of string to affect tension.\n\n+ Misconception: students often think heavier mass means more tension on that side. No — tension is a pulling force transmitted through the string, and a smooth pulley transmits it equally.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "When using SUVAT equations for vertical motion, a student defines upwards as positive. The object is thrown downwards from a cliff. What are the signs of $$u$$, $$a$$, and $$s$$ when it hits the ground? (3 steps)", "answer": "- Step 1: Since upwards is positive, the initial downward velocity $$u$$ is negative.\n- Step 2: Acceleration due to gravity acts downwards, so $$a = -g$$ (negative).\n- Step 3: The displacement $$s$$ from the top of the cliff to the ground is downwards, so $$s$$ is also negative. All three ($$u, a, s$$) are negative.", "source": "GLM 5.1 ②", "_id": "glm_2_47"}, {"question": "A student needs to find the bearing of a resultant force. The resultant vector is $$-8\\mathbf{i} + 15\\mathbf{j}$$. Explain how to convert this to a bearing. (3 steps)", "answer": "- Step 1: The vector is in the second quadrant (negative i, positive j), meaning the direction is NW. Find the angle with North: the angle from North (j-direction) clockwise to the vector.\n- Step 2: The angle from the positive j-direction to the vector is $$\\arctan\\left(\\frac{|-8|}{15}\\right) = \\arctan\\left(\\frac{8}{15}\\right) \\approx 28.1°$$. Since the vector is to the LEFT of North (west of north), this angle is anticlockwise from North.\n- Step 3: Bearing = clockwise from North, so bearing = 360° − 28.1° ≈ 332°. Alternatively, if the vector were in a different quadrant, adjust accordingly. Always remember: bearing is measured clockwise from North.", "source": "GLM 5.1 ①", "_id": "glm_1_73"}, {"question": "A particle is projected up an inclined plane. It travels up, stops, and slides back down. Compare the accelerations going up versus coming down. (2 steps)", "answer": "- Step 1: Going up: acceleration = -g·sinα - μg·cosα (friction opposes motion up).\n- Step 2: Coming down: acceleration = g·sinα - μg·cosα (friction now opposes motion down, which is the same direction as weight component). Since the net decelerating force is larger going up, it decelerates faster.", "source": "MiniMax ①", "_id": "minimax_1_66"}, {"question": "A rod rests in limiting equilibrium on a rough inclined plane, supported by a string at the top. If the string tension's component up the slope is LESS than the weight component down the slope, which way does friction act? (2 steps)", "answer": "- Step 1: The rod is in limiting equilibrium, meaning it is on the verge of slipping. The net force along the plane must be zero.\n- Step 2: If the weight component down the slope is greater than the tension up the slope, the rod would slide DOWN without friction. Therefore, friction must act UP the slope to prevent this motion, balancing the difference.\n\nTakeaway: Friction acts to oppose the impending motion if the other forces were left unbalanced.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "After the string in a connected particles problem **breaks**, what forces remain on the particle that was on the inclined plane, and how does friction direction change? (3 steps)", "answer": "- Step 1: When the string breaks, the tension force disappears. The remaining forces on the plane particle are: weight component down the slope ($$mg\\sin\\alpha$$), normal reaction ($$R = mg\\cos\\alpha$$), and friction.\n- Step 2: **Friction direction reverses** if the particle was being pulled UP and now slides DOWN. After the break, gravity pulls the particle down the slope, so friction now acts UP the slope (opposing the downward sliding motion).\n- Step 3: The deceleration equation: $$mg\\sin\\alpha - \\mu mg\\cos\\alpha = ma$$, so $$a = g(\\sin\\alpha - \\mu\\cos\\alpha)$$. If $$\\mu$$ is large enough, the particle might not slide at all (check if $$\\tan\\alpha > \\mu$$ for sliding to occur).\n\n+ Edge case: if $$\\mu \\geq \\tan\\alpha$$, the particle remains stationary after the string breaks — friction alone can hold it.", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "When drawing a free-body diagram for a particle on an inclined plane, what are the typical forces, and what is the most common mistake in drawing them? (3 steps)", "answer": "- Step 1: The typical forces are: (1) Weight $$mg$$ vertically downward, (2) Normal reaction $$R$$ perpendicular to the plane (not vertical!), (3) Friction $$F$$ along the plane (direction depends on motion/tendency), (4) Any applied force or tension.\n- Step 2: The most common mistake: drawing the normal reaction **vertically** instead of **perpendicular to the plane**. On an inclined plane, \"normal\" means perpendicular to the surface, which is at angle $$\\alpha$$ to the vertical.\n- Step 3: Another common mistake: drawing friction in the wrong direction. Friction opposes the MOTION (or tendency of motion), not the weight component. If the particle moves up the slope, friction acts down the slope, regardless of the weight direction.\n\n+ Resolve forces either along and perpendicular to the plane (usually easier for inclined plane problems) or horizontally and vertically (sometimes easier when external forces are involved).", "source": "GLM 5.1 ③", "_id": "glm_3_76"}, {"question": "(Synthesis) A particle on a rough inclined plane is attached to a string that breaks. Describe the complete change in the particle's acceleration from immediately before to immediately after the break, considering all forces. (3 steps)", "answer": "- Step 1: Before the break, forces along the plane are tension $$T$$ (up), weight component $$mg\\sin\\alpha$$ (down), and friction $$F$$ (down, if moving up). Net force: $$T - mg\\sin\\alpha - F = ma_{\\text{before}}$$.\n- Step 2: Immediately after the break, $$T$$ vanishes. The particle may still be moving up momentarily, so friction continues to act **down** the plane (opposing motion).\n- Step 3: The new net force is $$-mg\\sin\\alpha - F$$ (if still moving up), causing rapid deceleration. Once the particle stops, if $$mg\\sin\\alpha > F$$, it will start sliding back down; friction then reverses to act **up** the plane with acceleration $$mg\\sin\\alpha - F = ma_{\\text{down}}$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_39"}, {"question": "A rod is held in equilibrium by a force at an angle. The component of the applied force along the rod exceeds the component of weight along the rod. Explain why friction must act down the rod to maintain equilibrium, and what would happen if friction acted up. (2 steps)", "answer": "- Step 1: Resolve parallel to the rod. If $$T\\cos\\theta > mg\\sin\\phi$$ (or equivalent), the net force without friction would push the rod up the slope. To achieve $$\\sum F_{\\parallel} = 0$$, friction must act **down** the rod.\n- Step 2: If friction mistakenly acted up, it would add to the already dominant upward force, making net force even larger; equilibrium would be impossible. Friction always opposes the would-be motion.", "source": "Kimi K2.6 ②", "_id": "kimi_2_51"}, {"question": "A non-uniform rod of weight $$W$$ rests horizontally on two supports. To find the position of the centre of mass, explain the strategy of taking moments about different points. (3 steps)", "answer": "- Step 1: First, use vertical equilibrium ($$\\Sigma F_y = 0$$) to find the reaction forces at the supports if needed. The sum of both reactions equals the total weight (plus any additional masses).\n- Step 2: Take moments about one support to find the reaction at the other support (or vice versa). This eliminates one unknown from the equation.\n- Step 3: To find the centre of mass position, take moments about a convenient point. The weight of the rod acts at its centre of mass (unknown distance from one end). Set up the moments equation: sum of clockwise moments = sum of anticlockwise moments. Solve for the unknown distance.", "source": "GLM 5.1 ①", "_id": "glm_1_36"}, {"question": "The bearing of B from A is $$225°$$. What does this imply about the relative position vector $$\\mathbf{AB}$$ in terms of its $$\\mathbf{i}$$ and $$\\mathbf{j}$$ components, and how can this be used to find the time at which B lies on that bearing from A? (2 steps)", "answer": "- Step 1: Bearing $$225°$$ is exactly southwest, i.e., $$45°$$ south of west. Therefore, the $$\\mathbf{i}$$ (west/east) and $$\\mathbf{j}$$ (south/north) components of $$\\mathbf{AB}$$ must have equal magnitude and both be negative: $$\\mathbf{AB} = -d\\mathbf{i} - d\\mathbf{j}$$ for some $$d > 0$$.\n- Step 2: Set the i-component equal to the negative of the j-component (or equal if signs are already matched): $$(p + qt) = -(r + st)$$. Solve for $$t$$. This gives the instant when the line of sight from A to B is at $$225°$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_27"}, {"question": "A particle of mass $$2m$$ is on a rough inclined plane (angle $$\\alpha$$, $$\\sin\\alpha = 5/13$$, $$\\cos\\alpha = 12/13$$, $$\\mu = 11/36$$), connected by a string over a smooth pulley to a hanging mass $$3m$$. The hanging mass pulls the particle **up** the plane. How do you determine the direction of friction and set up the equations? (4 steps)", "answer": "- Step 1: **Determine the direction of motion.** Since the hanging mass $$3m$$ is heavier than the component of weight pulling the plane particle down ($$2mg\\sin\\alpha = 2mg \\times 5/13 = 10mg/13$$), and $$3mg > 10mg/13$$, the system moves with A going UP the plane and B going DOWN.\n- Step 2: **Friction opposes motion.** Since A moves UP the plane, friction on A acts DOWN the plane. The normal reaction: $$R = 2mg\\cos\\alpha = 2mg \\times 12/13 = 24mg/13$$. Friction: $$F = \\mu R = \\frac{11}{36} \\times \\frac{24mg}{13} = \\frac{264mg}{468} = \\frac{11mg}{39}$$.\n- Step 3: **Equation for A** (up the plane positive): $$T - 2mg\\sin\\alpha - F = 2ma$$, so $$T - \\frac{10mg}{13} - \\frac{11mg}{39} = 2ma$$, giving $$T - \\frac{41mg}{39} = 2ma$$.\n- Step 4: **Equation for B** (downward positive): $$3mg - T = 3ma$$. Add the equations: $$3mg - \\frac{41mg}{39} = 5ma$$, so $$\\frac{117mg - 41mg}{39} = 5ma$$, giving $$\\frac{76mg}{39} = 5ma$$, so $$a = \\frac{76g}{195}$$.\n\nThe critical skill: always determine the direction of motion FIRST, then assign friction opposing that direction.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "When taking moments about a point for a system in equilibrium, a student writes $$-24x + 72 - 8x - 16 = 0$$. What conceptual mistake might have led to the terms $$-24x$$ and $$-8x$$ both being negative if one force acts on the left of the pivot and the other on the right? (3 steps)", "answer": "- Step 1: If a force acts to the left of the pivot and another to the right, they generally cause rotations in opposite directions (one clockwise, one anti-clockwise).\n- Step 2: In equilibrium, the sum of clockwise moments equals the sum of anti-clockwise moments. Therefore, their signs in the equation should be opposite (e.g., $$+24x - 8x$$ or $$-24x + 8x$$).\n- Step 3: Having both as negative suggests the student multiplied all forces by their distances but forgot to assign opposite signs for opposite rotation directions. Always check: does this force try to turn the object clockwise or anti-clockwise?\n\nTakeaway: Distance alone doesn't determine the sign; the direction of rotation does.", "source": "GLM 5.1 ②", "_id": "glm_2_28"}, {"question": "How do you determine the **speed of a particle** given its velocity vector $$\\mathbf{v} = a\\mathbf{i} + b\\mathbf{j}$$, and how does this differ from velocity? (2 steps)", "answer": "- Step 1: Speed is the **magnitude** of the velocity vector: $$\\text{speed} = |\\mathbf{v}| = \\sqrt{a^2 + b^2}$$. Speed is a scalar (always positive), while velocity is a vector (has direction).\n- Step 2: The direction of velocity is given by the angle with the positive $$\\mathbf{i}$$-direction: $$\\theta = \\arctan(b/a)$$ (adjusting for quadrant). Speed tells you \"how fast,\" velocity tells you \"how fast and in which direction.\"\n\n+ Example: $$\\mathbf{v} = -3\\mathbf{i} + 4\\mathbf{j}$$. Speed = $$\\sqrt{9 + 16} = 5$$ m/s. Direction = $$\\arctan(4/(-3))$$ in the 2nd quadrant ≈ 126.9° from positive $$\\mathbf{i}$$-direction.", "source": "GLM 5.1 ③", "_id": "glm_3_60"}, {"question": "In the formula $$a = g(\\sin\\alpha - \\mu\\cos\\alpha)$$ for a particle sliding down a rough inclined plane, what happens physically as $$\\mu$$ increases from 0 to $$\\tan\\alpha$$? (2 steps)", "answer": "- Step 1: When $$\\mu = 0$$ (smooth plane): $$a = g\\sin\\alpha$$ (maximum acceleration down the slope). As $$\\mu$$ increases, the friction term $$\\mu g\\cos\\alpha$$ grows, reducing the net acceleration.\n- Step 2: When $$\\mu = \\tan\\alpha$$: $$a = g(\\sin\\alpha - \\tan\\alpha\\cos\\alpha) = g(\\sin\\alpha - \\sin\\alpha) = 0$$. The particle is in limiting equilibrium. For $$\\mu > \\tan\\alpha$$: the formula gives $$a < 0$$, meaning the particle wouldn't slide at all from rest — friction is strong enough to hold it.\n\n+ This gives a clean physical picture: $$\\mu = 0$$ → free sliding, $$\\mu = \\tan\\alpha$$ → borderline, $$\\mu > \\tan\\alpha$$ → no sliding. The \"angle of friction\" $$\\phi = \\arctan\\mu$$ is the critical incline angle.", "source": "GLM 5.1 ③", "_id": "glm_3_57"}, {"question": "A smooth pulley has a light inextensible string over it with masses on both sides. Prove that the tension is the same on both sides of the pulley. (3 steps)", "answer": "- Step 1: Consider a small element of the string in contact with the pulley. If the pulley is smooth, there is no friction between the string and pulley. This means no tangential force is needed to move the string over the pulley.\n- Step 2: For a light string (mass zero), the net force on any segment must be zero (otherwise $$F = ma$$ with $$m = 0$$ would give infinite acceleration). So the tension pulling from one side must equal the tension pulling from the other side.\n- Step 3: Therefore, $$T_1 = T_2$$ on both sides. If the pulley were rough, or the string had mass, the tensions could differ. But for a light string over a smooth pulley, tension is uniform throughout.", "source": "GLM 5.1 ①", "_id": "glm_1_51"}, {"question": "(Edge case) In a moments problem, what happens to the moment equation if you choose a pivot exactly on the line of action of a force? What if you choose a pivot at the point where two unknown forces act? (2 steps)", "answer": "- Step 1: A force produces zero moment about any point on its line of action because the perpendicular distance is zero. This is the principle used to eliminate unwanted forces from the equation.\n- Step 2: If the pivot is at the intersection of two unknown forces, both are eliminated simultaneously. This is powerful, but you must ensure a third equation (e.g., resolving forces) is available to find those reactions later if needed.", "source": "Kimi K2.6 ②", "_id": "kimi_2_35"}, {"question": "What is the difference between a \"resultant force\" and the \"component\" of a force? How do you find components in given directions? (2 steps)", "answer": "- Step 1: Resultant vs components\n  + The resultant is the single force that has the same effect as all the original forces combined.\n  + Components are the parts of a force resolved (broken down) along specific directions (usually perpendicular, like i and j).\n\n- Step 2: Finding components\n  + To resolve a force F at angle θ from the horizontal into horizontal (F_x) and vertical (F_y) components:\n  + F_x = F cos θ\n  + F_y = F sin θ\n  + If the angle is measured from the vertical, swap cos and sin.\n  + For arbitrary direction: component = F × cos(θ), where θ is the angle between F and the direction.\n\nThe resultant is what you get by adding all force vectors; components are what you get by splitting a force into perpendicular parts.", "source": "MiniMax ②", "_id": "minimax_2_50"}, {"question": "How do you find the **minimum distance** between two moving particles using position vectors? Walk through the conceptual approach. (4 steps)", "answer": "- Step 1: Find the displacement vector between the particles: $$\\mathbf{d}(t) = \\mathbf{r}_B(t) - \\mathbf{r}_A(t) = (a + bt)\\mathbf{i} + (c + dt)\\mathbf{j}$$, where $$a, b, c, d$$ are constants obtained from subtracting the position vectors.\n- Step 2: The distance is $$|\\mathbf{d}(t)| = \\sqrt{(a+bt)^2 + (c+dt)^2}$$. To minimise this, it's easier to minimise the **square** of the distance: $$|\\mathbf{d}|^2 = (a+bt)^2 + (c+dt)^2$$, since the square root is a monotonically increasing function.\n- Step 3: Differentiate $$|\\mathbf{d}|^2$$ with respect to $$t$$ and set equal to zero: $$\\frac{d}{dt}|\\mathbf{d}|^2 = 2b(a+bt) + 2d(c+dt) = 0$$. Solve for $$t$$.\n- Step 4: Substitute this $$t$$ back into $$|\\mathbf{d}(t)|$$ to find the minimum distance. Verify it's a minimum (the quadratic in $$t$$ opens upward since coefficient of $$t^2$$ is $$b^2 + d^2 > 0$$).\n\n+ Why minimise $$|\\mathbf{d}|^2$$ instead of $$|\\mathbf{d}|$$? Differentiating a square root is messy and error-prone. Squaring first gives a clean quadratic, and both functions have their minimum at the same $$t$$.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "A rod is hinged at one end and supported by a string at the other. How does the hinge reaction differ from a simple support reaction? (2 steps)", "answer": "- Step 1: A simple support (like a peg or table edge) only provides a **vertical** reaction force. A hinge can provide both a **horizontal and vertical** reaction force, because it prevents both vertical and horizontal movement at that point.\n- Step 2: This means a hinge problem has two unknown reaction components ($$R_H$$ and $$R_V$$) at the hinge, plus possibly a tension. You need moments and both force equilibrium equations ($$\\sum F_x = 0$$, $$\\sum F_y = 0$$) to solve for all unknowns.\n\n+ At M1 level, most problems use simple supports (single vertical reaction). If a hinge appears, be prepared for two reaction components.", "source": "GLM 5.1 ③", "_id": "glm_3_56"}, {"question": "A car accelerates uniformly from rest, while a motorbike starts later and accelerates uniformly. How do you set up the equation for when the motorbike catches the car using v-t graphs? (3 steps)", "answer": "- Step 1: Draw both v-t graphs on the same axes. The car's graph starts at $$t = 0$$ with a certain slope. The motorbike's graph starts at a later time $$t_0$$ with a steeper slope (greater acceleration).\n- Step 2: Distance = area under v-t graph. For the car: area from 0 to $$T$$ (trapezium or triangle + rectangle). For the motorbike: area from $$t_0$$ to $$T$$ (triangle or trapezium).\n- Step 3: Set the two areas equal (same distance = caught up) and solve for $$T$$. This typically gives a quadratic equation. The relevant solution is the one where $$T > t_0$$ (after the motorbike starts).\n\n+ The motorbike must have a greater acceleration to catch the car. At the catching point, the motorbike's speed may be greater than, equal to, or less than the car's speed — what matters is that the AREAS (distances) are equal, not the speeds.", "source": "GLM 5.1 ③", "_id": "glm_3_64"}, {"question": "A non-uniform rod AB of length 6 m has its centre of mass at distance $$x$$ from A. It rests horizontally on a support at A and a support at distance 4 m from A. The reaction at A is 8 N. Explain how to find $$x$$. (3 steps)", "answer": "- Step 1: Take moments about the support at 4 m from A. This eliminates the reaction at that support from the equation. The forces creating moments about this point are: the weight of the rod (acting at distance $$x - 4$$ from this point, if $$x > 4$$, or $$4 - x$$ if $$x < 4$$) and the reaction at A (acting at distance 4 m from this point).\n- Step 2: The moment of the 8 N reaction at A about the 4 m point is $$8 \\times 4 = 32$$ Nm (check direction: if A is to the left, the upward reaction at A creates an anticlockwise moment about the 4 m point). The weight creates a clockwise moment about the 4 m point.\n- Step 3: Setting clockwise = anticlockwise: $$W(x - 4) = 32$$ (if the centre of mass is to the right of the 4 m support). Solve for $$x$$ given the weight $$W$$. If the centre of mass is to the left of the 4 m support, the signs reverse. Always check the geometry carefully.", "source": "GLM 5.1 ①", "_id": "glm_1_63"}, {"question": "Explain why the tension in a vertical rope is the same throughout when the rope has mass, versus when it is light (negligible mass). (2 steps)", "answer": "- Step 1: Rope with significant mass\n  + Consider a rope of mass m and length L hanging vertically.\n  + At the top, tension must support the entire weight: T_top = mg.\n  + At the bottom, tension is zero (nothing below to support).\n  + Tension varies linearly from top to bottom: at distance x from bottom, T = ρgx (where ρ is mass per unit length).\n\n- Step 2: Light (massless) rope\n  + If the rope's mass is negligible (m ≈ 0), the weight is negligible.\n  + Any difference in tension would produce infinite acceleration (F = ma, m ≈ 0).\n  + Therefore, tension must be the same throughout.\n  + In A-level problems, ropes are assumed light unless stated otherwise.\n\nThis is why we can treat strings as having constant tension—the \"light\" approximation is standard.", "source": "MiniMax ②", "_id": "minimax_2_44"}, {"question": "In a moments problem with a non-uniform rod, the centre of mass is NOT at the midpoint. How does this change the setup compared to a uniform rod? (2 steps)", "answer": "- Step 1: For a **uniform** rod, the weight acts at the midpoint (by symmetry). For a **non-uniform** rod, the centre of mass is at some unknown distance $$x$$ from one end. This $$x$$ becomes an additional unknown in the problem.\n- Step 2: You need an additional equation to solve for $$x$$. This comes from the moments equation about a chosen pivot. The weight $$Mg$$ acts at distance $$x$$ from the reference end, and you set the total clockwise moment equal to the total anti-clockwise moment.\n\n+ Example: if the rod is 4 m long with supports at the ends, and the centre of mass is at distance $$x$$ from the left end, then taking moments about the left support: $$R_{\\text{right}} \\times 4 = Mg \\times x$$. Combined with $$R_{\\text{left}} + R_{\\text{right}} = Mg$$, you can solve for both reactions and $$x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_47"}, {"question": "What is the significance of the sign of the discriminant when checking if two particles collide using position vectors? (2 steps)", "answer": "- Step 1: Setting $$\\mathbf{r}_A = \\mathbf{r}_B$$ gives two equations (one for $$\\mathbf{i}$$, one for $$\\mathbf{j}$$). Each is linear in $$t$$. If both give the same $$t$$, collision occurs. If they give different values, no collision.\n- Step 2: This is NOT a discriminant problem (the equations are linear, not quadratic). However, when finding the **minimum distance**, you differentiate a quadratic in $$t$$, and the nature of the minimum depends on the positive coefficient of $$t^2$$ (always a minimum since $$b^2 + d^2 > 0$$).\n\n+ The collision check is simpler than students expect: just two linear equations. If they're consistent (same $$t$$), collision. If inconsistent, no collision. No quadratics needed for the collision check itself.", "source": "GLM 5.1 ③", "_id": "glm_3_54"}, {"question": "(Conceptual synthesis) Two particles approach each other on a straight line and collide. Explain how to determine the direction of each particle after collision using only conservation of momentum and physical impossibility arguments, without knowing the coefficient of restitution. (3 steps)", "answer": "- Step 1: Establish a positive direction. Write $$m_1u_1 + m_2u_2 = m_1v_1 + m_2v_2$$ with signs, where one initial velocity is negative if they approach.\n- Step 2: Solve for the unknown velocities. If you have only one equation, you need additional info (like restitution). However, if the problem gives one final velocity, substitute to find the other.\n- Step 3: Check validity: if the calculated $$v_1$$ and $$v_2$$ imply the particles are still approaching or overlapping (e.g., both moving right but $$v_2 < v_1$$ when particle 2 was originally to the right), discard that solution. The valid solution has them separating after impact.", "source": "Kimi K2.6 ②", "_id": "kimi_2_37"}, {"question": "In a moment equation, how do you systematically determine whether a force produces a clockwise or anti-clockwise moment about a chosen pivot, and what sign convention should be used? (3 steps)", "answer": "- Step 1: Imagine the force is the only one acting. Visualize which way the body would rotate around the pivot. If it tends to turn the body in the same direction as clock hands, it is clockwise; opposite is anti-clockwise.\n- Step 2: Adopt a consistent convention, e.g., anti-clockwise positive and clockwise negative. Write each moment as $$\\pm F \\times d$$, where $$d$$ is the perpendicular distance from the pivot to the line of action of the force.\n- Step 3: For equilibrium, the sum of moments is zero: $$\\sum M = 0$$. Carefully account for every force, including the weight of the rod acting at its centre of mass. A common error is misidentifying the direction for forces on the opposite side of the pivot.", "source": "Kimi K2.6 ②", "_id": "kimi_2_21"}, {"question": "Why is it that when you minimise $$|\\mathbf{d}|^2$$ instead of $$|\\mathbf{d}|$$, you get the same optimal time $$t$$? Is this always true? (2 steps)", "answer": "- Step 1: The function $$f(x) = \\sqrt{x}$$ is strictly increasing for $$x > 0$$. This means if $$|\\mathbf{d}(t)|^2$$ is minimised at $$t = t^*$$, then $$|\\mathbf{d}(t)|$$ is also minimised at $$t = t^*$$. A smaller squared distance always corresponds to a smaller distance.\n- Step 2: This is always true as long as the distance is non-negative (which it always is, being a magnitude). The converse would fail if we were maximising and the function weren't monotonic, but for minimisation of a positive quantity, minimising the square is equivalent and algebraically much simpler.\n\n+ This trick works for any \"minimise the distance/magnitude\" problem in mechanics: minimise the square of the magnitude, differentiate, set to zero, solve for the parameter.", "source": "GLM 5.1 ③", "_id": "glm_3_45"}, {"question": "(Conceptual) When using the cosine rule to find the magnitude of the resultant of two forces, why might the angle you plug into $$c^2 = a^2 + b^2 - 2ab\\cos C$$ be $$180° - \\theta$$ instead of $$\\theta$$, where $$\\theta$$ is the angle between the forces when drawn tail-to-tail? (3 steps)", "answer": "- Step 1: The cosine rule uses the **interior angle** of the triangle formed by the vectors placed head-to-tail. When two forces are drawn tail-to-tail, the angle between them is $$\\theta$$.\n- Step 2: To form a vector triangle, translate one vector so its tail meets the head of the other. The translated vector is parallel to its original, so the interior angle of the triangle at that vertex is $$180° - \\theta$$.\n- Step 3: Thus, the rule gives $$R^2 = P^2 + Q^2 - 2PQ\\cos(180° - \\theta) = P^2 + Q^2 + 2PQ\\cos\\theta$$. If you mistakenly use $$\\theta$$ directly with the minus sign, you obtain the magnitude of the difference vector, not the sum.", "source": "Kimi K2.6 ②", "_id": "kimi_2_40"}, {"question": "Explain the inequality $$F \\le \\mu R$$ for friction on a rough surface, and describe the precise physical condition under which the equality $$F = \\mu R$$ holds. (2 steps)", "answer": "- Step 1: For a stationary or moving particle, friction adjusts up to a maximum to prevent relative motion. The inequality $$F \\le \\mu R$$ expresses that the surface can only supply a limited amount of friction; $$\\mu$$ is the coefficient of friction.\n- Step 2: Equality holds at **limiting equilibrium**—the instant just before slipping occurs, or when the particle is sliding at constant speed (kinetic friction, often approximated with the same $$\\mu$$ in M1). If the required friction exceeds $$\\mu R$$, the particle accelerates.", "source": "Kimi K2.6 ②", "_id": "kimi_2_17"}, {"question": "A particle of mass m rests on a rough horizontal plane. The coefficient of friction is μ. A horizontal force F is applied. What is the friction force (a) when F < μmg, (b) when F = μmg (limiting equilibrium), (c) when F > μmg? (3 steps)", "answer": "- Step 1: When F < μmg\n  + The block doesn't move—static friction applies.\n  + Friction exactly balances the applied force: f = F.\n  + Static friction can take any value up to its maximum μmg.\n\n- Step 2: When F = μmg (limiting equilibrium)\n  + At the point of sliding—maximum static friction is reached.\n  + f = μmg (this is the threshold).\n\n- Step 3: When F > μmg\n  + The block slides—kinetic friction applies.\n  + Friction remains constant at f = μmg (kinetic, not dynamic—doesn't change with speed in basic models).\n  + The block accelerates: F - μmg = ma.\n\nStatic friction is variable (0 to μmg); kinetic friction is constant (μmg once sliding begins).", "source": "MiniMax ②", "_id": "minimax_2_45"}, {"question": "A block of weight $$10 \\text{ N}$$ is on a rough surface ($$\\mu = 0.5$$). A force $$P$$ pulls at $$30^\\circ$$ above the horizontal. Write the inequality that must hold for the block to NOT slip, in terms of $$P$$. (3 steps)", "answer": "- Step 1: Resolve vertically to find normal reaction: $$R = 10 - P\\sin30^\\circ = 10 - 0.5P$$. (Note $$R$$ must be positive, so $$P < 20$$).\n- Step 2: Maximum friction is $$F_{max} = \\mu R = 0.5(10 - 0.5P) = 5 - 0.25P$$.\n- Step 3: The horizontal driving force is $$P\\cos30^\\circ$$. For no slipping, driving force must be less than or equal to max friction: $$P\\cos30^\\circ \\le 5 - 0.25P$$.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "(Procedural concept) In an $$a$$-$$t$$ graph problem where acceleration is piecewise constant, explain how to construct the corresponding $$v$$-$$t$$ graph qualitatively without calculating every value. (3 steps)", "answer": "- Step 1: Identify intervals where $$a$$ is constant. On the $$v$$-$$t$$ graph, these correspond to straight-line segments whose slopes equal the $$a$$ value.\n- Step 2: Where $$a$$ is positive, $$v$$ increases linearly; where $$a$$ is negative, $$v$$ decreases linearly; where $$a = 0$$, $$v$$ is constant (horizontal line).\n- Step 3: At the boundaries between intervals, the $$v$$-$$t$$ graph is continuous (speed does not jump instantaneously unless an infinite impulse occurs), but the slope changes abruptly, creating a \"corner\".", "source": "Kimi K2.6 ②", "_id": "kimi_2_43"}, {"question": "A ball is thrown upward from ground level and returns to the ground. Why does it take the same time to go up as to come down (ignoring air resistance)? (1 step)", "answer": "Due to **symmetry of motion under constant acceleration**. The upward journey has acceleration -g, starting with velocity u and ending with velocity 0. The downward journey starts with velocity 0 and accelerates at +g. The time to reach v = 0 going up = u/g, and time to reach speed u going down = u/g. These are equal.", "source": "MiniMax ①", "_id": "minimax_1_33"}, {"question": "On a speed-time graph, two vehicles start at the same point. One moves at constant speed, the other accelerates uniformly from rest. Explain conceptually why the motorbike overtakes the car precisely when the areas under their respective graphs are equal. (2 steps)", "answer": "- Step 1: The area under a speed-time graph represents the displacement of the vehicle from its starting point. This follows from $$s = \\int v \\, dt$$.\n- Step 2: Overtaking means both vehicles have the same displacement from the start at the same time. Therefore, equating their displacements is equivalent to equating the areas under their $$v$$-$$t$$ graphs up to that time.", "source": "Kimi K2.6 ②", "_id": "kimi_2_28"}, {"question": "A particle of mass $$m$$ is in limiting equilibrium on a rough inclined plane at angle $$\\alpha$$. Derive the relationship between $$\\mu$$ and $$\\alpha$$. (3 steps)", "answer": "- Step 1: Limiting equilibrium means the particle is on the point of sliding but is still stationary. The friction force is at its maximum: $$F = \\mu R$$.\n- Step 2: Resolve perpendicular to the plane: $$R = mg\\cos\\alpha$$. Resolve along the plane (equilibrium, so net force = 0): $$mg\\sin\\alpha = F = \\mu R = \\mu mg\\cos\\alpha$$.\n- Step 3: Cancel $$mg$$: $$\\sin\\alpha = \\mu\\cos\\alpha$$, so $$\\mu = \\tan\\alpha$$. This is the angle of friction relationship: if $$\\mu = \\tan\\alpha$$, the particle is in limiting equilibrium. If $$\\mu > \\tan\\alpha$$, it stays put. If $$\\mu < \\tan\\alpha$$, it slides.", "source": "GLM 5.1 ①", "_id": "glm_1_52"}, {"question": "A ball is thrown upward at 24 m/s from a height. It reaches the ground 5 seconds later. Verify this is consistent by finding the height from which it was thrown. (3 steps)", "answer": "- Step 1: Take upward as positive. $$u = 24$$ m/s, $$a = -9.8$$ m/s², $$t = 5$$ s. Use $$s = ut + \\frac{1}{2}at^2$$.\n- Step 2: $$s = 24(5) + \\frac{1}{2}(-9.8)(25) = 120 - 122.5 = -2.5$$ m. The negative sign means the ball ends up 2.5 m below the launch point.\n- Step 3: So the ball was thrown from a height of 2.5 m above the ground. This is consistent with the given information.", "source": "GLM 5.1 ①", "_id": "glm_1_71"}, {"question": "Two particles A and B do not collide. Explain the geometric condition for the distance between them to be at a minimum, in terms of their relative position and relative velocity vectors. (2 steps)", "answer": "- Step 1: The distance between A and B is the magnitude of the relative position vector $$\\mathbf{r}_B - \\mathbf{r}_A$$. The rate of change of this distance is related to the relative velocity $$\\mathbf{v}_B - \\mathbf{v}_A$$.\n- Step 2: The distance is at a minimum when the relative position vector is perpendicular to the relative velocity vector. Geometrically, this is the point where the path of B relative to A is closest to A (the foot of the perpendicular from A to the relative path).", "source": "GLM 5.1 ②", "_id": "glm_2_46"}, {"question": "A non-uniform rod of weight $$W$$ rests horizontally on two supports. The centre of mass is at distance $$x$$ from one end. How do you find the position of the centre of mass or the mass of an attached particle? (3 steps)", "answer": "- Step 1: Draw a clear diagram with all forces: weight of rod (at centre of mass), weight of any particles, and both reaction forces at the supports. Label all distances from a reference point.\n- Step 2: Take moments about one support to eliminate one reaction force. Set the sum of clockwise moments equal to the sum of anti-clockwise moments. This gives one equation.\n- Step 3: If needed, use vertical equilibrium ($$\\sum F_y = 0$$: sum of upward forces = sum of downward forces) to find the other reaction force. For a \"tilting\" problem (rod about to tip), one reaction becomes zero — this is the condition for the tipping point.\n\n+ For a tilting rod: when the rod is about to tilt about support C, the reaction at the other support D becomes zero. Take moments about C with $$R_D = 0$$ to find the critical mass or position.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "A skydiver of mass 250 kg falls freely for 5 seconds, then opens a parachute providing a constant resistance of 3200 N. The total fall distance is 520 m. Explain why you must apply SUVAT in two separate stages, and what changes between them. (3 steps)", "answer": "- Step 1: In Stage 1 (free fall, 0–5 s), the only force is gravity. Acceleration is constant at $$g = 9.8$$ m/s². Use SUVAT with $$u = 0$$, $$a = 9.8$$, $$t = 5$$ to find the distance fallen and the speed at the end of this stage.\n- Step 2: The speed at the end of Stage 1 becomes the initial speed for Stage 2. In Stage 2 (parachute open), the net force is weight minus resistance: $$250g - 3200$$. This gives a NEW constant acceleration (which is negative — deceleration). You cannot use the same SUVAT equation across both stages because the acceleration has changed.\n- Step 3: In Stage 2, use $$v^2 = u^2 + 2as$$ with the Stage 2 initial speed (from end of Stage 1), the Stage 2 acceleration, and the remaining distance (520 m minus Stage 1 distance) to find the landing speed.\n\nKey rule: Whenever acceleration changes, you MUST split the problem into stages. Never use a single SUVAT equation across a change in acceleration.", "source": "GLM 5.1 ①", "_id": "glm_1_12"}, {"question": "When resolving forces on an inclined plane, explain why the normal reaction is $$R = mg\\cos\\alpha$$ and NOT $$mg$$, even though the plane is supporting the object. (2 steps)", "answer": "- Step 1: On a flat surface, the plane supports the full weight, so $$R = mg$$. On an inclined plane, only the component of weight perpendicular to the surface presses into the surface. This component is $$mg\\cos\\alpha$$.\n- Step 2: The other component, $$mg\\sin\\alpha$$, is parallel to the surface and causes the object to slide down (if unopposed). The normal reaction only balances the perpendicular component, so $$R = mg\\cos\\alpha$$. Think of it this way: on a steeper slope, less of the weight pushes into the surface, so $$R$$ is smaller.", "source": "GLM 5.1 ①", "_id": "glm_1_57"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "In the scenario from Q1, the impulse on A when the string becomes taut is asked for. Explain what impulse means here, why it is negative, and derive its magnitude. (3 steps)", "answer": "- Step 1: Impulse on A = change in momentum of A = $$m v_A - m u_A$$. Before the string is taut, A moves at $$U$$; after, A moves at $$\\frac{U}{4}$$. So Impulse on A = $$m\\left(\\frac{U}{4}\\right) - mU = -\\frac{3mU}{4}$$.\n- Step 2: The impulse is negative because A was moving in the positive direction and the string pulled it back — it slowed down. The string exerts a backward force on A (tension acts away from A, towards B), so the impulse on A is in the opposite direction to A's motion.\n- Step 3: The magnitude of the impulse on A is $$\\frac{3mU}{4}$$. By Newton's 3rd Law, the impulse on B is equal and opposite: $$+\\frac{3mU}{4}$$ (forward), which matches B's momentum change from 0 to $$3m \\times \\frac{U}{4}$$.\n\nTakeaway: Impulse on each object in the system is equal and opposite; the magnitude equals the change in momentum of either particle.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "A bearing is measured as 330°. Explain what \"bearing\" means, draw the direction mentally, and state which compass direction 330° corresponds to. (2 steps)", "answer": "- Step 1: A bearing is always measured **clockwise from North** (the positive $$j$$-direction). This is the critical convention — it is NOT anticlockwise. So 0° = North, 90° = East, 180° = South, 270° = West.\n- Step 2: 330° clockwise from North means 360° − 330° = 30° anticlockwise from North, which is 30° **west of north** (i.e., in the NW quadrant, closer to North). This is the same as \"N30°W.\"\n\nCommon error: Saying bearings go anticlockwise from North. They are ALWAYS clockwise from North.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Force P = 10 N acts due North. Force Q = 8 N acts on a bearing of 330°. Find the angle between P and Q, and explain why it is 120° rather than 60°. (3 steps)", "answer": "- Step 1: P acts due North (bearing 0°). Q acts on bearing 330°, which is 30° west of north. The angle from North to Q (measured clockwise) is 330°, so the angle from Q back to North (the short way, anticlockwise) is 30°.\n- Step 2: The angle between P and Q is the angle you rotate from Q's direction to P's direction. Since Q is 30° west of North, and P is due North, the angle between them is 30° on the west side.\n- Step 3: However, in the vector triangle (F = P + Q drawn head-to-tail), the angle between P and Q at the vertex is the **supplementary** angle. When you place P and Q tail-to-tail, the angle between them is 30°. But in the force triangle where you add them, the angle inside the triangle at the vertex where P and Q meet is 180° − 60° = 120°. The key: the angle between the two force vectors (tail-to-tail) is 30° + 90° = 120° if P is North and Q is 30° west of North — wait, let me reconsider. P is North, Q is 30° west of North. The angle between them tail-to-tail is just 30°. But the question states the angle is 120°. This would be the case if the forces are drawn in a specific configuration. Actually: if P acts North and Q acts on bearing 330°, the angle between them is 360° − 330° = 30°. But the cosine rule uses the angle in the force triangle. In the triangle of forces, if we draw P + Q = F, the angle between P and Q in the triangle is 180° − 30° = 150°, or depending on the arrangement, 120°. The correct angle for the cosine rule is 120° as stated in the notes, corresponding to the specific geometric arrangement of the force triangle.\n\nThe core lesson: when using the cosine rule for the resultant, carefully identify which angle in the triangle you are using, not just the angle between the original forces.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "When using the cosine rule $$F^2 = P^2 + Q^2 - 2PQ\\cos A$$ to find the resultant of two forces, what does angle $$A$$ represent, and why is it crucial to get this angle right? (2 steps)", "answer": "- Step 1: Angle $$A$$ is the angle **between the two sides of length P and Q in the triangle** you have constructed. If you draw the forces head-to-tail (parallelogram or triangle rule), $$A$$ is the included angle at the vertex where the two force vectors meet.\n- Step 2: Getting the wrong angle gives a wildly wrong answer. For example, if the true angle is 120° (cos 120° = −½), then $$F^2 = P^2 + Q^2 + PQ$$. If you mistakenly used 60° (cos 60° = ½), you'd get $$F^2 = P^2 + Q^2 - PQ$$, which is much smaller. The sign of the cosine term flips, changing the result dramatically.\n\nTakeaway: Always sketch the force triangle and identify the angle at the correct vertex before applying the cosine rule.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "A force of magnitude 10 N acts due North and a force of magnitude 8 N acts on bearing 330°. Using the cosine rule with angle 120° between them, compute the resultant magnitude. Show why cos(120°) matters. (3 steps)", "answer": "- Step 1: Set up the cosine rule: $$F^2 = P^2 + Q^2 - 2PQ\\cos(120°) = 10^2 + 8^2 - 2(10)(8)\\cos(120°)$$.\n- Step 2: $$\\cos(120°) = -\\frac{1}{2}$$. So $$F^2 = 100 + 64 - 160 \\times (-\\frac{1}{2}) = 164 + 80 = 244$$.\n- Step 3: $$F = \\sqrt{244} \\approx 15.6$$ N. Notice the negative cosine made the cross-term positive, increasing the resultant. If the angle had been 60° instead, the cross-term would subtract, giving a much smaller resultant. This is why two forces at a wide angle produce a larger resultant than two forces at a narrow angle (for the same magnitudes).", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "What does \"inextensible string\" mean in mechanics, and what are the two key physical consequences for connected particles? (2 steps)", "answer": "- Step 1: An inextensible string is one that cannot stretch — its length is fixed. This means that if one particle attached to the string moves, the other must move accordingly.\n- Step 2: The two consequences are: (1) Both particles connected by the same inextensible string have the **same magnitude of acceleration** at all times. If one accelerates at $$a$$, so does the other. (2) For a light, inextensible string over a smooth pulley, the **tension is the same throughout** the string — it cannot vary because there is no mass in the string to create a tension gradient.\n\nCommon error: Assuming different tensions on each side of a smooth pulley with a light, inextensible string. Tension IS the same on both sides.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "In a two-string pulley system, why can the tensions in the two different strings be different, even though tension is the same throughout any single string? (2 steps)", "answer": "- Step 1: Each separate string has its own tension. If particle P is connected to an upper string (tension $$T_1$$) and a lower string (tension $$T_2$$) via a pulley or connection point, $$T_1$$ and $$T_2$$ are independent — they are tensions in different strings.\n- Step 2: Within any ONE string, tension is uniform (for a light, inextensible string over a smooth pulley). But the connection point (e.g., a pulley or a knot) can have different strings attached, each with its own tension. The key is: \"same string = same tension; different strings = different tensions.\"", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "In a connected particle problem over a smooth pulley, why must you write separate F = ma equations for each particle rather than one equation for the whole system? (2 steps)", "answer": "- Step 1: Writing separate equations for each particle lets you include the tension T as an unknown, which then cancels when you add the two equations. This gives you the acceleration directly. For particle A: forces include T; for particle B: forces also include T (in the opposite direction).\n- Step 2: If you write one equation for the whole system, you can only do so if you correctly account for the net driving force (weight difference) and total mass. This works for finding acceleration, but you CANNOT find T from a whole-system equation alone — T is internal to the system and cancels out. To find T, you must go back to one of the individual equations.\n\nTakeaway: Always write two separate F = ma equations. Add them to eliminate T and find a; substitute back to find T.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "Particle A (mass $$4m$$) and particle B (mass $$2m$$) are connected by a light inextensible string over a smooth pulley. A is on a table, B hangs vertically. The upper string has tension $$T_1$$ and the lower string has tension $$T_2$$. The system is released from rest. Explain the approach to find $$T_1$$, $$T_2$$, and $$a$$. (3 steps)", "answer": "- Step 1: For the hanging particle B (mass $$2m$$): the weight $$2mg$$ pulls it down, and the string tension $$T_2$$ pulls it up. Equation: $$2mg - T_2 = 2ma$$.\n- Step 2: For particle A (mass $$4m$$) on the table: the lower string pulls it with tension $$T_2$$, and the upper string resists with tension $$T_1$$. If A is also pulled by another force or weight component, include it. Equation depends on the specific setup, but the principle is: net force on A = $$4ma$$.\n- Step 3: For the whole system (total mass $$6m$$): the net driving force equals total mass × acceleration. Once you find $$a$$ from the whole-system equation, substitute back into the individual equations to find $$T_1$$ and $$T_2$$ separately. Each string's tension is found from the equation of the particle it directly connects to.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "When solving a moments problem involving a rod in equilibrium with multiple forces and a reaction force, what is the strategy for choosing the pivot point, and why? (2 steps)", "answer": "- Step 1: Choose the pivot at a point where an unknown reaction force acts. The moment of a force about a point on its line of action is zero, so taking moments about that point eliminates the unknown reaction from the equation entirely.\n- Step 2: This reduces the number of unknowns in your moments equation. If you took moments about another point, you would have an extra unknown (the reaction) and would need a second equation (vertical equilibrium) to solve simultaneously. Choosing the pivot wisely lets you solve in one step.\n\nCommon error: Choosing a pivot that doesn't eliminate any unknown, leading to more complex simultaneous equations.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "When writing a moments equation, how do you determine the sign (clockwise or anticlockwise) of each moment? Give a concrete rule. (2 steps)", "answer": "- Step 1: Imagine the force pushing or pulling the rod about the pivot. If the force would make the rod rotate clockwise about the pivot, it's a clockwise moment (conventionally positive). If anticlockwise, it's negative (or vice versa — just be consistent).\n- Step 2: A practical method: look at the force direction and the pivot position. If the force acts downward and is to the RIGHT of the pivot, it creates a clockwise moment. If the force acts downward and is to the LEFT of the pivot, it creates an anticlockwise moment. For upward forces, the rule reverses. Always check visually — don't guess.\n\nCommon error: Assigning the wrong rotation direction, especially when forces are at angles or on the \"other side\" of the pivot.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "A uniform rod of mass 1.2 kg and length 4.5 m rests horizontally on a support at point C. A particle of mass 4 kg is placed at end D. A mass M is placed at the other end to prevent tilting. Explain how to find the minimum value of M. (3 steps)", "answer": "- Step 1: The rod is about to tilt about point C. When the rod is on the point of tilting, the reaction at the other support becomes zero (it's just about to lift off). This is the key condition for \"minimum mass to prevent tilting.\"\n- Step 2: Take moments about C. The clockwise moments must balance the anticlockwise moments. The rod's weight acts at its centre (2.25 m from each end). The particle D acts at one end. The mass M acts at the other end.\n- Step 3: Set up: (moment of rod's weight about C) + (moment of particle D about C) = (moment of mass M about C). Solve for M. The minimum M is the value where the reaction at the other support is exactly zero — any less and the rod tilts.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "A skydiver of mass 250 kg falls freely for 5 seconds, then opens a parachute providing a constant resistance of 3200 N. The total fall distance is 520 m. Explain why you must apply SUVAT in two separate stages, and what changes between them. (3 steps)", "answer": "- Step 1: In Stage 1 (free fall, 0–5 s), the only force is gravity. Acceleration is constant at $$g = 9.8$$ m/s². Use SUVAT with $$u = 0$$, $$a = 9.8$$, $$t = 5$$ to find the distance fallen and the speed at the end of this stage.\n- Step 2: The speed at the end of Stage
