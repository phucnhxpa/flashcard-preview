explaining the role of the bearing definition. (3 steps)", "answer": "- Step 1: A bearing is measured clockwise from North (the positive j-direction). The angle between the velocity vector and the positive i-direction (East) is $$90° - \\alpha$$ (if $$\\alpha < 90$$).\n- Step 2: The i-component (East) is $$v \\sin\\alpha$$ and the j-component (North) is $$v \\cos\\alpha$$.\n- Step 3: This is the reverse of standard trigonometry (where x is cosine, y is sine) because the bearing angle is measured from the y-axis (North), not the x-axis.\n\nTakeaway: Bearing to components: i = speed × sin(bearing), j = speed × cos(bearing).", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "Two particles have position vectors $$\\mathbf{r}_A(t)$$ and $$\\mathbf{r}_B(t)$$. Explain the mathematical condition for them to collide, and why solving for $$t$$ in only the i-component is insufficient. (3 steps)", "answer": "- Step 1: For a collision, the particles must be at the exact same point at the exact same time. Mathematically, $$\\mathbf{r}_A(t) = \\mathbf{r}_B(t)$$.\n- Step 2: This vector equation yields two scalar equations: one for the i-components and one for the j-components.\n- Step 3: You must find a value of $$t$$ that satisfies BOTH equations simultaneously. If the i-components give $$t = 3$$ but the j-components give $$t = 5$$, they are never at the same point at the same time, so they DO NOT collide (they just cross paths at different times).\n\nTakeaway: Collision requires the SAME t for both i and j components.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "To find the minimum distance between two moving particles with position vectors $$\\mathbf{r}_A$$ and $$\\mathbf{r}_B$$, we minimise $$|\\mathbf{r}_B - \\mathbf{r}_A|^2$$. Why do we minimise the square of the distance rather than the distance itself? (2 steps)", "answer": "- Step 1: The distance $$|\\mathbf{r}_B - \\mathbf{r}_A| = \\sqrt{(x_B-x_A)^2 + (y_B-y_A)^2}$$. Differentiating this square root function is algebraically messy and prone to errors.\n- Step 2: Since the square root function is strictly increasing, minimising the distance is equivalent to minimising the squared distance. The squared distance $$D^2 = (x_B-x_A)^2 + (y_B-y_A)^2$$ is a simple quadratic in $$t$$, which is much easier to differentiate and set to zero: $$\\frac{d(D^2)}{dt} = 0$$.\n\nTakeaway: Always minimise the square of the distance to avoid nasty square root derivatives.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "A particle has a velocity vector $$\\mathbf{v}(\\lambda)$$ dependent on a parameter $$\\lambda$$. Explain the conceptual steps to find the minimum speed of the particle. (3 steps)", "answer": "- Step 1: Speed is the magnitude of the velocity vector: $$|\\mathbf{v}(\\lambda)| = \\sqrt{v_i^2 + v_j^2}$$.\n- Step 2: Similar to minimum distance, minimise the square of the speed: $$|\\mathbf{v}|^2 = v_i^2 + v_j^2$$. Expand this to get a quadratic in $$\\lambda$$.\n- Step 3: Differentiate with respect to $$\\lambda$$ and set to zero: $$\\frac{d(|\\mathbf{v}|^2)}{d\\lambda} = 0$$. Solve for $$\\lambda$$, then substitute back into the $$|\\mathbf{v}|$$ expression to find the minimum speed.\n\nTakeaway: Minimising speed follows the exact same \"minimise the square\" logic as minimising distance.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "A particle is suspended in equilibrium by two strings at different angles to the vertical. Explain the strategy to find the tensions in both strings. (3 steps)", "answer": "- Step 1: Since the particle is in equilibrium, the net force is zero. Resolve forces horizontally: the horizontal components of the two tensions must balance each other ($$T_1 \\sin\\theta_1 = T_2 \\sin\\theta_2$$).\n- Step 2: Resolve forces vertically: the vertical components of both tensions must balance the weight ($$T_1 \\cos\\theta_1 + T_2 \\cos\\theta_2 = mg$$).\n- Step 3: You now have two simultaneous equations with two unknowns ($$T_1$$ and $$T_2$$). Solve them algebraically to find the tensions.\n\nTakeaway: Equilibrium means resolving in two perpendicular directions gives two independent equations.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "Two objects A and B collide. Before the collision, A moves right and B is at rest. After the collision, A continues moving right but slower. What can you infer about the direction of B after the collision, and why? (2 steps)", "answer": "- Step 1: By conservation of momentum, the total momentum remains positive (since A was moving right). If A is still moving right but has lost momentum, B must have gained that positive momentum.\n- Step 2: Therefore, B must be moving to the right. Physically, A pushed B forward, so B moves in the direction A was travelling.\n\nTakeaway: Momentum must be conserved directionally; if A loses rightward momentum, B must gain it.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "A particle collides with a fixed peg and rebounds. How do you calculate the impulse exerted on the peg, and why is it not simply the change in momentum of the peg? (3 steps)", "answer": "- Step 1: Impulse is the change in momentum of the object the impulse acts on. The particle experiences an impulse $$I = m(v - u)$$ from the peg.\n- Step 2: By Newton's Third Law, the peg experiences an equal and opposite impulse from the particle. So, Impulse on peg = $$-I = m(u - v)$$.\n- Step 3: The peg is fixed, so its velocity is zero before and after. Its change in momentum is zero. However, the *internal forces* between the wall/Earth and the peg provide the necessary impulse to keep it fixed, balancing the particle's impulse. We calculate the magnitude as $$|m(v-u)|$$.\n\nTakeaway: Impulse on a fixed object is calculated via Newton's 3rd Law from the moving object.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": true}, {"question": "When taking moments about a point for a system in equilibrium, a student writes $$-24x + 72 - 8x - 16 = 0$$. What conceptual mistake might have led to the terms $$-24x$$ and $$-8x$$ both being negative if one force acts on the left of the pivot and the other on the right? (3 steps)", "answer": "- Step 1: If a force acts to the left of the pivot and another to the right, they generally cause rotations in opposite directions (one clockwise, one anti-clockwise).\n- Step 2: In equilibrium, the sum of clockwise moments equals the sum of anti-clockwise moments. Therefore, their signs in the equation should be opposite (e.g., $$+24x - 8x$$ or $$-24x + 8x$$).\n- Step 3: Having both as negative suggests the student multiplied all forces by their distances but forgot to assign opposite signs for opposite rotation directions. Always check: does this force try to turn the object clockwise or anti-clockwise?\n\nTakeaway: Distance alone doesn't determine the sign; the direction of rotation does.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": true}, {"question": "A rod rests in limiting equilibrium on a rough inclined plane, supported by a string at the top. If the string tension's component up the slope is LESS than the weight component down the slope, which way does friction act? (2 steps)", "answer": "- Step 1: The rod is in limiting equilibrium, meaning it is on the verge of slipping. The net force along the plane must be zero.\n- Step 2: If the weight component down the slope is greater than the tension up the slope, the rod would slide DOWN without friction. Therefore, friction must act UP the slope to prevent this motion, balancing the difference.\n\nTakeaway: Friction acts to oppose the impending motion if the other forces were left unbalanced.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}, {"question": "Object A moves East at $$u$$, Object B moves West at $$v$$. After a head-on collision, how do you determine the direction of A and B? (3 steps)", "answer": "- Step 1: Define a positive direction (e.g., East is positive, so B's initial velocity is $$-v$$). Apply conservation of momentum: $$m_A u - m_B v = m_A v_A + m_B v_B$$.\n- Step 2: The algebraic sign of the final velocities $$v_A$$ and $$v_B$$ tells you their direction. If $$v_A > 0$$, A moves East; if $$v_A < 0$$, A moves West.\n- Step 3: A physical check: since they were approaching, they must separate after collision. If A rebounds West ($$v_A < 0$$), B must be moving West ($$v_B < 0$$) or slower East; they cannot pass through each other.\n\nTakeaway: The sign of the final velocity from your momentum equation directly tells you the direction.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}, {"question": "An object falls from rest and hits a surface, coming to rest in a distance $$d$$. How do you find the normal reaction force $$N$$ during the impact? (3 steps)", "answer": "- Step 1: First, find the velocity just before impact using $$v^2 = u^2 + 2gs$$ (where $$s$$ is the fall height).\n- Step 2: During impact, the object decelerates from this velocity to 0 over distance $$d$$. Use $$0 = v^2 - 2ad$$ to find the deceleration $$a$$.\n- Step 3: Apply Newton's Second Law during impact. The net upward force is $$N - mg = ma$$. Solve for $$N = m(g + a)$$. Note that $$a$$ is the magnitude of the upward deceleration.\n\nTakeaway: Find the impact deceleration first using SUVAT, then use F=ma to find the reaction force.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "A car travels at a constant $$10 \\text{ m/s}$$. A bike starts from rest with acceleration $$2 \\text{ m/s}^2$$ at the same time and place. At what time $$T$$ does the bike catch the car? (3 steps)", "answer": "- Step 1: Displacement of the car is the area of a rectangle: $$s_{car} = 10T$$.\n- Step 2: Displacement of the bike is the area of a triangle: $$s_{bike} = \\frac{1}{2}(2T)(T) = T^2$$.\n- Step 3: Set them equal for catching up: $$T^2 = 10T$$. Since $$T > 0$$, divide by $$T$$ to get $$T = 10 \\text{ s}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "A block of weight $$10 \\text{ N}$$ is on a rough surface ($$\\mu = 0.5$$). A force $$P$$ pulls at $$30^\\circ$$ above the horizontal. Write the inequality that must hold for the block to NOT slip, in terms of $$P$$. (3 steps)", "answer": "- Step 1: Resolve vertically to find normal reaction: $$R = 10 - P\\sin30^\\circ = 10 - 0.5P$$. (Note $$R$$ must be positive, so $$P < 20$$).\n- Step 2: Maximum friction is $$F_{max} = \\mu R = 0.5(10 - 0.5P) = 5 - 0.25P$$.\n- Step 3: The horizontal driving force is $$P\\cos30^\\circ$$. For no slipping, driving force must be less than or equal to max friction: $$P\\cos30^\\circ \\le 5 - 0.25P$$.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "Particle P has position vector $$\\mathbf{r}_P = 2t\\mathbf{i} + \\mathbf{j}$$ and particle Q has $$\\mathbf{r}_Q = \\mathbf{i} + (5-t)\\mathbf{j}$$. Set up the expression for the squared distance $$D^2$$ between them. (3 steps)", "answer": "- Step 1: Find the separation vector: $$\\mathbf{r}_Q - \\mathbf{r}_P = (1-2t)\\mathbf{i} + (4-t)\\mathbf{j}$$.\n- Step 2: Square the components and sum: $$D^2 = (1-2t)^2 + (4-t)^2$$.\n- Step 3: Expand: $$D^2 = (1 - 4t + 4t^2) + (16 - 8t + t^2) = 5t^2 - 12t + 17$$.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "Ship A is at the origin, Ship B is at $$10\\mathbf{i} + 10\\mathbf{j}$$. B moves on a bearing such that its approach to A is on a bearing of 225°. What does this imply about the i and j components of B's velocity? (3 steps)", "answer": "- Step 1: A bearing of 225° is exactly South-West (45° below the negative i-axis). The direction of approach means B is moving towards A from the NE.\n- Step 2: For the approach to be exactly on this bearing, the velocity vector of B relative to A must point SW. This means the i and j components of the relative velocity must be equal in magnitude and negative.\n- Step 3: Therefore, $$v_{B,i} - v_{A,i} = v_{B,j} - v_{A,j}$$, and both must be negative. If A is stationary, B's velocity components are equal and negative.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "A particle is being pulled UP a rough inclined plane by a string. The string breaks. Explain why the particle might eventually slide DOWN, and what forces act on it during the downward slide. (3 steps)", "answer": "- Step 1: Once the string breaks, the upward tension is removed. The only forces remaining are the weight component down the slope and friction.\n- Step 2: The particle will decelerate to a stop. At the instant it stops, the driving force up the slope is zero.\n- Step 3: If the weight component down the slope ($$mg\\sin\\alpha$$) exceeds the maximum static friction up the slope ($$\\mu mg\\cos\\alpha$$), the particle will start to slide DOWN. During this downward slide, kinetic friction acts UP the slope, opposing the downward motion.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "Force P of 5N acts East. Force Q of 5N acts on a bearing of 300°. Without full calculation, explain why the magnitude of the resultant is between 5N and 10N. (3 steps)", "answer": "- Step 1: The angle between East (bearing 90°) and bearing 300° (which is 60° West of North) is 150°.\n- Step 2: The resultant magnitude is found by the cosine rule: $$R^2 = 5^2 + 5^2 - 2(5)(5)\\cos(150°) = 50 - 50(-\\frac{\\sqrt{3}}{2}) = 50 + 25\\sqrt{3}$$.\n- Step 3: Since $$\\sqrt{3} \\approx 1.73$$, $$25\\sqrt{3} \\approx 43.3$$. So $$R^2 \\approx 93.3$$, meaning $$R \\approx 9.6 \\text{ N}$$, which is indeed between 5 and 10. (If they were in the same direction, it would be 10; if opposite, 0).", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "A 2kg mass A moving at 5 m/s collides with a 3kg mass B at rest on a smooth plane. After collision, they move together. Find the magnitude of the impulse experienced by A. (3 steps)", "answer": "- Step 1: Use conservation of momentum to find their shared velocity $$V$$: $$(2 \\times 5) + (3 \\times 0) = (2+3)V \\rightarrow 10 = 5V \\rightarrow V = 2 \\text{ m/s}$$.\n- Step 2: Impulse on A is its change in momentum: $$I_A = m_A(V - u_A) = 2(2 - 5) = -6 \\text{ Ns}$$.\n- Step 3: The magnitude of the impulse on A is 6 Ns. (The negative sign just indicates the impulse slowed A down).", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "A non-uniform rod AB of length 4m and weight 20N rests horizontally on supports at A and B. A 10N weight is placed 1m from A. The reaction at A is 18N. Find the distance of the centre of mass from A. (3 steps)", "answer": "- Step 1: Take moments about A to eliminate the reaction at A. The clockwise moments must equal the anti-clockwise moments.\n- Step 2: The 10N weight acts at 1m (clockwise). The 20N weight acts at distance $$x$$ (clockwise). The reaction at B acts at 4m (anti-clockwise).\n- Step 3: First, find reaction at B: $$R_B = 20 + 10 - 18 = 12 \\text{ N}$$. Now take moments about A: $$(10 \\times 1) + (20 \\times x) = 12 \\times 4 \\rightarrow 10 + 20x = 48 \\rightarrow 20x = 38 \\rightarrow x = 1.9 \\text{ m}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "A ball is dropped from rest and falls for 2 seconds, then experiences a constant upward air resistance force causing a net deceleration of $$2 \\text{ m/s}^2$$. Find the total distance fallen in the first 4 seconds. (3 steps)", "answer": "- Step 1: Stage 1 (free fall, 0 to 2s): $$s_1 = \\frac{1}{2}gt^2 = \\frac{1}{2}(10)(2^2) = 20 \\text{ m}$$. Velocity at 2s: $$v_1 = gt = 10(2) = 20 \\text{ m/s}$$.\n- Step 2: Stage 2 (deceleration, 2s to 4s): $$a = 10 - 2 = 8 \\text{ m/s}^2$$ downwards. $$s_2 = ut + \\frac{1}{2}at^2 = 20(2) + \\frac{1}{2}(8)(2^2) = 40 + 16 = 56 \\text{ m}$$.\n- Step 3: Total distance = $$s_1 + s_2 = 20 + 56 = 76 \\text{ m}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "A 5kg mass hangs vertically over a smooth pulley, connected to a 3kg mass on a rough inclined plane ($$\\mu = 0.2$$, angle $$\\alpha$$ where $$\\sin\\alpha = 0.6$$). The 5kg mass descends. Find the acceleration. (3 steps)", "answer": "- Step 1: For the 5kg mass (descending positive): $$5g - T = 5a$$.\n- Step 2: For the 3kg mass (moving up plane positive): $$T - 3g\\sin\\alpha - \\mu(3g\\cos\\alpha) = 3a$$. Since $$\\sin\\alpha = 0.6$$, $$\\cos\\alpha = 0.8$$. So $$T - 3g(0.6) - 0.2(3g)(0.8) = 3a \\rightarrow T - 1.8g - 0.48g = 3a \\rightarrow T - 2.28g = 3a$$.\n- Step 3: Add the equations: $$5g - 2.28g = 8a \\rightarrow 2.72g = 8a \\rightarrow a = 0.34g \\approx 3.33 \\text{ m/s}^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "A student says \"If two objects stick together after a collision, kinetic energy must be conserved because momentum is conserved.\" Evaluate this statement. (2 steps)", "answer": "- Step 1: The statement is false. Momentum is ALWAYS conserved in a closed system with no external forces, regardless of the type of collision.\n- Step 2: Kinetic energy is only conserved in perfectly elastic collisions. When objects stick together (perfectly inelastic collision), maximum kinetic energy is lost (converted to heat, sound, deformation). Conserving momentum does NOT imply conserving kinetic energy.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "A particle rests on a rough inclined plane. As the angle of the plane is slowly increased, the particle eventually slips. Just before it slips, what is the relationship between the weight component and the friction force? (2 steps)", "answer": "- Step 1: Just before slipping, the particle is in limiting equilibrium. The static friction has reached its maximum value: $$F = \\mu R$$.\n- Step 2: The weight component down the slope ($$mg\\sin\\alpha$$) is exactly balanced by this maximum friction force up the slope ($$\\mu mg\\cos\\alpha$$). So, $$mg\\sin\\alpha = \\mu mg\\cos\\alpha$$, which gives $$\\tan\\alpha = \\mu$$.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "A student draws the tension force pointing TOWARDS the particle on a free-body diagram. Why is this incorrect, and what is the correct direction? (2 steps)", "answer": "- Step 1: A string can only PULL; it cannot push. Therefore, the tension force exerted BY the string ON the particle must pull the particle towards the string.\n- Step 2: The correct direction is AWAY from the particle, along the string. If the string is attached above the particle, tension points vertically upwards. If attached to a pulley, it points along the string away from the particle towards the pulley.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": true}, {"question": "An acceleration-time ($$a$$-$$t$$) graph dips below the horizontal axis between $$t=4$$ and $$t=6$$. What does a negative area signify physically? (2 steps)", "answer": "- Step 1: The area under an $$a$$-$$t$$ graph represents the change in velocity $$\\Delta v$$.\n- Step 2: A negative area means the change in velocity is negative; the object is decelerating (or accelerating in the negative direction). If the object was moving in the positive direction, it is slowing down.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": true}, {"question": "Two particles A and B do not collide. Explain the geometric condition for the distance between them to be at a minimum, in terms of their relative position and relative velocity vectors. (2 steps)", "answer": "- Step 1: The distance between A and B is the magnitude of the relative position vector $$\\mathbf{r}_B - \\mathbf{r}_A$$. The rate of change of this distance is related to the relative velocity $$\\mathbf{v}_B - \\mathbf{v}_A$$.\n- Step 2: The distance is at a minimum when the relative position vector is perpendicular to the relative velocity vector. Geometrically, this is the point where the path of B relative to A is closest to A (the foot of the perpendicular from A to the relative path).", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": true}, {"question": "When using SUVAT equations for vertical motion, a student defines upwards as positive. The object is thrown downwards from a cliff. What are the signs of $$u$$, $$a$$, and $$s$$ when it hits the ground? (3 steps)", "answer": "- Step 1: Since upwards is positive, the initial downward velocity $$u$$ is negative.\n- Step 2: Acceleration due to gravity acts downwards, so $$a = -g$$ (negative).\n- Step 3: The displacement $$s$$ from the top of the cliff to the ground is downwards, so $$s$$ is also negative. All three ($$u, a, s$$) are negative.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": true}, {"question": "A particle P of mass $$m$$ hangs from a string, which passes over a smooth pulley to a particle Q of mass $$2m$$. The string holding the pulley to the ceiling has tension $$T_{ceil}$$. How does $$T_{ceil}$$ relate to the tension in the main string $$T_{string}$$? (2 steps)", "answer": "- Step 1: The pulley is in equilibrium (or assumed massless and not accelerating vertically). The main string passes over it, exerting a downward force of $$T_{string}$$ on both sides.\n- Step 2: Therefore, the ceiling string must support the total downward pull on the pulley. $$T_{ceil} = 2T_{string}$$. If the system is in equilibrium, $$T_{string}$$ relates to the masses, but the ceiling string always sees double the main string's tension.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": true}, {"question": "A uniform rod of length $$L$$ rests on two supports, one at end A and one at distance $$d$$ from end B. A weight is placed at B. As the weight increases, which support does the rod tilt about, and what happens to the reaction at the other support? (3 steps)", "answer": "- Step 1: The rod will tilt about the support closest to the weight, which is the one at distance $$d$$ from B. This support becomes the pivot.\n- Step 2: As the weight increases, it causes a clockwise moment about this pivot. To maintain equilibrium, the reaction at A must provide an anti-clockwise moment.\n- Step 3: However, the reaction at A cannot be negative (a support can only push UP). When the weight is so large that the moment cannot be balanced, the reaction at A drops to zero, and the rod loses contact with A, tilting about the support near B.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": true}], "count": 50}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "Two particles A (mass $$m$$) and B (mass $$3m$$) are on a smooth horizontal plane, connected by a slack inextensible string. A is projected at speed $$U$$. When the string becomes taut, what physical principle governs the resulting motion, and why is kinetic energy NOT conserved? (3 steps)", "answer": "- Step 1: The string becoming taut is a **perfectly inelastic \"jerking\" event**. The two particles are now constrained to move together at a common speed. The governing principle is **conservation of momentum**: the total momentum before the jerk equals the total momentum after, because there are no external horizontal forces.\n- Step 2: Applying conservation of momentum: $$mU + 3m(0) = (m + 3m)V$$, so $$mU = 4mV$$, giving $$V = U/4$$. The combined mass moves at one-quarter of A's original speed.\n- Step 3: Kinetic energy is NOT conserved because the string does internal work in \"jerking\" B into motion. Energy is lost (converted to heat/sound in a real string, or mathematically \"lost\" from the kinetic energy sum). Before: $$\\frac{1}{2}mU^2$$. After: $$\\frac{1}{2}(4m)(U/4)^2 = mU^2/8$$. The ratio shows significant energy loss — this is characteristic of any inelastic connection event.\n\nThe key insight: momentum is always conserved in the absence of external forces, but kinetic energy is only conserved in perfectly elastic interactions.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "When a slack string between two particles becomes taut, how do you calculate the **impulse** exerted on the particle that was already moving? What sign convention should you use? (3 steps)", "answer": "- Step 1: Impulse on a particle equals its **change in momentum**: $$I = \\Delta(mv) = m(v_{\\text{after}} - v_{\\text{before}})$$.\n- Step 2: For particle A (mass $$m$$, initial speed $$U$$, final speed $$U/4$$): $$I_A = m(U/4 - U) = m(-3U/4) = -3mU/4$$.\n- Step 3: The **negative sign** means the impulse on A acts in the opposite direction to its initial motion (it slows A down). The magnitude is $$3mU/4$$. By Newton's 3rd Law, the impulse on B is equal and opposite: $$+3mU/4$$ (speeding B up in A's direction).\n\nTakeaway: Impulse on the initially-moving particle is always negative (opposing its motion) — it loses momentum to the other particle.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "What is the definition of a **bearing**, and how do you convert a bearing angle into $$\\mathbf{i}$$ and $$\\mathbf{j}$$ vector components? (3 steps)", "answer": "- Step 1: A bearing is measured **clockwise from North** (the positive $$\\mathbf{j}$$ direction). This is the opposite convention to standard maths angles (anti-clockwise from positive $$x$$-axis).\n- Step 2: For a bearing $$\\alpha$$, think of the direction as rotated $$\\alpha°$$ clockwise from North. The components are: $$\\mathbf{i}$$-component = speed × $$\\sin\\alpha$$ (East), $$\\mathbf{j}$$-component = speed × $$\\cos\\alpha$$ (North).\n- Step 3: Example: bearing 330° means 330° clockwise from North = 30° West of North. So $$\\sin 330° = -\\sin 30° = -1/2$$ (West component) and $$\\cos 330° = \\cos 30° = \\sqrt{3}/2$$ (North component). If speed is 20: velocity = $$20(-\\frac{1}{2}\\mathbf{i} + \\frac{\\sqrt{3}}{2}\\mathbf{j}) = -10\\mathbf{i} + 10\\sqrt{3}\\mathbf{j}$$.\n\nCommon error: using bearing as if it were a standard angle from the positive $$x$$-axis. Always draw: North up, then rotate clockwise.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "Two forces $$P$$ and $$Q$$ act at a point with an angle $$\\theta$$ between them. When should you use the **cosine rule** vs the **component method** to find the resultant, and how does the cosine rule formula incorporate the angle? (3 steps)", "answer": "- Step 1: **Cosine rule** is fastest when you know the angle between the two forces directly. The resultant magnitude: $$R^2 = P^2 + Q^2 - 2PQ\\cos(180° - \\theta) = P^2 + Q^2 + 2PQ\\cos\\theta$$ if $$\\theta$$ is the angle between the forces. But if the triangle angle (supplement) is used: $$R^2 = P^2 + Q^2 - 2PQ\\cos A$$ where $$A$$ is the angle in the force triangle opposite to $$R$$.\n- Step 2: **Component method** is more systematic and less error-prone. Resolve each force into $$\\mathbf{i}$$ and $$\\mathbf{j}$$, sum components, then use $$R = \\sqrt{R_x^2 + R_y^2}$$.\n- Step 3: For the specific case from the notes: $$P = 10$$ N, $$Q = 8$$ N, angle between them = 120°. Cosine rule: $$R^2 = 10^2 + 8^2 - 2(10)(8)\\cos 120° = 164 - 160(-\\frac{1}{2}) = 164 + 80 = 244$$. The key: $$\\cos 120° = -1/2$$, so the negative sign in the cosine rule flips it to addition, making the resultant larger than either individual force.\n\nThe cosine rule works because forces form a vector triangle when placed head-to-tail.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "What does \"**inextensible string**\" physically mean, and what two consequences does it have for the motion of connected particles? (2 steps)", "answer": "- Step 1: \"Inextensible\" means the string cannot stretch or compress — its length is fixed. This means that if one end moves, the other end must move by exactly the same distance in the same time.\n- Step 2: The two consequences are: (1) **Same acceleration**: both connected particles have the same magnitude of acceleration at all times. (2) **Same speed**: if the string is taut, both particles move at the same speed. If the string goes slack, these constraints no longer apply — the particles move independently until the string becomes taut again.\n\n+ Edge case: if a string breaks, the particles are no longer connected and each moves under its own forces independently — they may have different accelerations.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "For a light, inextensible string passing over a **smooth pulley**, what can you say about the tension on each side? What if the pulley is **rough**? (2 steps)", "answer": "- Step 1: For a **smooth pulley**, there is no friction between the string and pulley to create a tension difference. Therefore, **the tension is the same on both sides** of the pulley: $$T_1 = T_2$$. This is true regardless of the masses attached.\n- Step 2: For a **rough pulley**, friction between the string and pulley can create different tensions on each side: $$T_1 \\neq T_2$$. At A-level M1, pulleys are assumed smooth unless stated otherwise. Also, \"light\" string means the string has zero mass, so there's no weight of string to affect tension.\n\n+ Misconception: students often think heavier mass means more tension on that side. No — tension is a pulling force transmitted through the string, and a smooth pulley transmits it equally.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "In a connected particles problem over a smooth pulley, why must you write **two separate F = ma equations** (one for each particle) instead of one equation for the whole system? (3 steps)", "answer": "- Step 1: Writing F = ma for the \"whole system\" (adding both equations) eliminates the tension $$T$$ and gives you the acceleration directly: $$(m_B - m_A)g = (m_A + m_B)a$$ for a simple Atwood machine. This is useful for finding $$a$$.\n- Step 2: However, the whole-system equation **cannot find tension** because $$T$$ is an internal force that cancels out. To find $$T$$, you MUST write a separate equation for at least one particle and substitute the known acceleration.\n- Step 3: The systematic approach: (1) Write F = ma for particle A. (2) Write F = ma for particle B. (3) Add the equations to eliminate $$T$$ and find $$a$$. (4) Substitute $$a$$ back into either equation to find $$T$$.\n\n+ If friction or an inclined plane is involved, the whole-system approach becomes more complex and error-prone — separate equations are safer.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "A particle of mass $$2m$$ is on a rough inclined plane (angle $$\\alpha$$, $$\\sin\\alpha = 5/13$$, $$\\cos\\alpha = 12/13$$, $$\\mu = 11/36$$), connected by a string over a smooth pulley to a hanging mass $$3m$$. The hanging mass pulls the particle **up** the plane. How do you determine the direction of friction and set up the equations? (4 steps)", "answer": "- Step 1: **Determine the direction of motion.** Since the hanging mass $$3m$$ is heavier than the component of weight pulling the plane particle down ($$2mg\\sin\\alpha = 2mg \\times 5/13 = 10mg/13$$), and $$3mg > 10mg/13$$, the system moves with A going UP the plane and B going DOWN.\n- Step 2: **Friction opposes motion.** Since A moves UP the plane, friction on A acts DOWN the plane. The normal reaction: $$R = 2mg\\cos\\alpha = 2mg \\times 12/13 = 24mg/13$$. Friction: $$F = \\mu R = \\frac{11}{36} \\times \\frac{24mg}{13} = \\frac{264mg}{468} = \\frac{11mg}{39}$$.\n- Step 3: **Equation for A** (up the plane positive): $$T - 2mg\\sin\\alpha - F = 2ma$$, so $$T - \\frac{10mg}{13} - \\frac{11mg}{39} = 2ma$$, giving $$T - \\frac{41mg}{39} = 2ma$$.\n- Step 4: **Equation for B** (downward positive): $$3mg - T = 3ma$$. Add the equations: $$3mg - \\frac{41mg}{39} = 5ma$$, so $$\\frac{117mg - 41mg}{39} = 5ma$$, giving $$\\frac{76mg}{39} = 5ma$$, so $$a = \\frac{76g}{195}$$.\n\nThe critical skill: always determine the direction of motion FIRST, then assign friction opposing that direction.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "After the string in a connected particles problem **breaks**, what forces remain on the particle that was on the inclined plane, and how does friction direction change? (3 steps)", "answer": "- Step 1: When the string breaks, the tension force disappears. The remaining forces on the plane particle are: weight component down the slope ($$mg\\sin\\alpha$$), normal reaction ($$R = mg\\cos\\alpha$$), and friction.\n- Step 2: **Friction direction reverses** if the particle was being pulled UP and now slides DOWN. After the break, gravity pulls the particle down the slope, so friction now acts UP the slope (opposing the downward sliding motion).\n- Step 3: The deceleration equation: $$mg\\sin\\alpha - \\mu mg\\cos\\alpha = ma$$, so $$a = g(\\sin\\alpha - \\mu\\cos\\alpha)$$. If $$\\mu$$ is large enough, the particle might not slide at all (check if $$\\tan\\alpha > \\mu$$ for sliding to occur).\n\n+ Edge case: if $$\\mu \\geq \\tan\\alpha$$, the particle remains stationary after the string breaks — friction alone can hold it.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "What are the two **pivot selection criteria** for moments problems, and why is choosing the right pivot crucial? (3 steps)", "answer": "- Step 1: **Criterion 1**: Choose the pivot at a point where an unknown reaction force acts. This eliminates that force from the equation because a force at the pivot has zero moment (perpendicular distance = 0).\n- Step 2: **Criterion 2**: Choose a pivot that leaves only one unknown in the moment equation. This allows you to solve directly without simultaneous equations.\n- Step 3: Why it matters: if you choose a \"bad\" pivot, you introduce multiple unknowns and must set up multiple equations. Choosing the reaction point as pivot means you don't even need to know that reaction force to solve for the other unknowns.\n\n+ Example: if a rod rests on supports at C and D, and you want to find the mass at point P, take moments about C to eliminate the reaction at C, or about D to eliminate the reaction at D.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "In moments problems, how do you correctly assign **positive and negative signs** to moments, and what is the most common sign error? (3 steps)", "answer": "- Step 1: Choose a convention: clockwise = positive, anti-clockwise = negative (or vice versa — just be consistent). Every moment is $$\\text{Force} \\times \\text{perpendicular distance}$$, and the sign comes from the rotation direction it would cause about the pivot.\n- Step 2: The most common error: **assuming all forces on one side of the pivot produce the same sign of moment**. A force to the left of the pivot can produce either a clockwise or anti-clockwise moment depending on whether it acts upward or downward.\n- Step 3: Systematic check: for each force, imagine the pivot is a fulcrum. Ask \"which way would this force alone rotate the object?\" — that determines the sign. An upward force to the right of the pivot = anti-clockwise. A downward force to the right = clockwise.\n\n+ Example from notes: $$-24x + 72 - 8x - 16 = 0$$ should simplify to $$-32x + 56 = 0$$, but a sign error gave $$-24x + 56 = 0$$. The error was miscounting the $$x$$-terms. Always collect like terms carefully after writing the full equation.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "A non-uniform rod of weight $$W$$ rests horizontally on two supports. The centre of mass is at distance $$x$$ from one end. How do you find the position of the centre of mass or the mass of an attached particle? (3 steps)", "answer": "- Step 1: Draw a clear diagram with all forces: weight of rod (at centre of mass), weight of any particles, and both reaction forces at the supports. Label all distances from a reference point.\n- Step 2: Take moments about one support to eliminate one reaction force. Set the sum of clockwise moments equal to the sum of anti-clockwise moments. This gives one equation.\n- Step 3: If needed, use vertical equilibrium ($$\\sum F_y = 0$$: sum of upward forces = sum of downward forces) to find the other reaction force. For a \"tilting\" problem (rod about to tip), one reaction becomes zero — this is the condition for the tipping point.\n\n+ For a tilting rod: when the rod is about to tilt about support C, the reaction at the other support D becomes zero. Take moments about C with $$R_D = 0$$ to find the critical mass or position.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "In a two-stage motion problem (e.g., free fall then parachute opens), why can't you use a single set of SUVAT equations, and how do you connect the stages? (3 steps)", "answer": "- Step 1: SUVAT equations require **constant acceleration** throughout the interval. When the parachute opens, the acceleration changes (from $$g$$ downward to a much smaller or even upward net acceleration). You must split the motion at the point where acceleration changes.\n- Step 2: The **connection point**: the final velocity of Stage 1 becomes the initial velocity of Stage 2. The total displacement is the sum of displacements from each stage. This is the only link between the two independent SUVAT analyses.\n- Step 3: Example: free fall for 5 s, then parachute. Stage 1: $$s_1 = \\frac{1}{2}(9.8)(25) = 122.5$$ m, $$v = 9.8 \\times 5 = 49$$ m/s. Stage 2: $$u = 49$$ m/s, $$a = -3$$ m/s² (net upward), $$s_2 = 397.5$$ m. Use $$v^2 = u^2 + 2as$$ to find landing speed.\n\n+ The speed-time graph shows a kink at the transition: slope changes from $$+g$$ to $$-3$$ m/s². The graph is continuous (no jump in speed) but not smooth (slope changes abruptly).", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "How do you calculate the **net acceleration** when a parachutist of mass 250 kg experiences both gravity and a resistive force of 3200 N? (2 steps)", "answer": "- Step 1: Draw a free-body diagram. Weight acts downward: $$W = 250 \\times 9.8 = 2450$$ N. Resistance acts upward: $$F = 3200$$ N. The net force is $$2450 - 3200 = -750$$ N (upward, i.e., decelerating).\n- Step 2: By Newton's 2nd Law: $$F_{\\text{net}} = ma$$, so $$-750 = 250a$$, giving $$a = -3$$ m/s². The negative sign means the parachutist is decelerating (slowing down while still moving downward).\n\n+ Key insight: even though the net force is upward, the parachutist is still moving downward — just slowing down. Deceleration ≠ reversal of direction (unless the parachutist slows to zero and then starts moving up, which doesn't happen here before landing).", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "A block is pulled at **constant speed** on a rough horizontal surface by a rope at angle $$\\theta$$ above the horizontal. Why is $$a = 0$$ significant, and how does the angled rope affect the normal reaction? (3 steps)", "answer": "- Step 1: Constant speed means **zero acceleration**, so the net force is zero in both horizontal and vertical directions. This gives two equilibrium equations instead of F = ma equations.\n- Step 2: The angled rope has a **vertical component** ($$T\\sin\\theta$$ upward) that partially supports the block's weight. This reduces the normal reaction: $$R = mg - T\\sin\\theta$$ (not just $$R = mg$$).\n- Step 3: Since $$F = \\mu R$$ and $$R$$ is reduced, the friction force is also reduced compared to a horizontal pull. The horizontal equilibrium gives: $$T\\cos\\theta = F = \\mu R = \\mu(mg - T\\sin\\theta)$$. Solve for $$T$$.\n\n+ Misconception: pulling at an angle makes it \"harder\" to pull. Actually, the vertical lift reduces normal reaction and hence friction, so a small angle can make pulling easier. But too steep an angle wastes force vertically. The optimal angle balances these effects.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "Given $$\\tan\\theta = 3/4$$, how do you quickly find $$\\sin\\theta$$ and $$\\cos\\theta$$, and why is this ratio common in exam questions? (2 steps)", "answer": "- Step 1: Draw a right triangle with opposite = 3, adjacent = 4. The hypotenuse = $$\\sqrt{9 + 16} = 5$$. Therefore $$\\sin\\theta = 3/5$$ and $$\\cos\\theta = 4/5$$. These are the **3-4-5 Pythagorean triple** values.\n- Step 2: This ratio is common in exams because it gives clean fractions ($$3/5$$, $$4/5$$, $$5/5 = 1$$) rather than decimals. Other common triples: 5-12-13 ($$\\sin = 5/13$$, $$\\cos = 12/13$$) and 8-15-17.\n\n+ When you see $$\\tan\\alpha = 5/12$$, immediately think: opposite = 5, adjacent = 12, hypotenuse = 13, so $$\\sin\\alpha = 5/13$$ and $$\\cos\\alpha = 12/13$$.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "A particle on a rough surface is pulled by a force at angle $$\\theta$$. What is the condition for the **maximum pulling force** before the particle slips, and how do you find it? (3 steps)", "answer": "- Step 1: The particle is on the point of slipping when friction is **limiting**: $$F = \\mu R$$ (not $$F < \\mu R$$). This is the boundary condition.\n- Step 2: Set up the two equilibrium equations (assuming constant speed or rest): Horizontal: $$P\\cos\\theta = \\mu R$$. Vertical: $$R + P\\sin\\theta = mg$$, so $$R = mg - P\\sin\\theta$$.\n- Step 3: Substitute: $$P\\cos\\theta = \\mu(mg - P\\sin\\theta)$$. Expand: $$P\\cos\\theta + \\mu P\\sin\\theta = \\mu mg$$. Factor: $$P(\\cos\\theta + \\mu\\sin\\theta) = \\mu mg$$. So $$P = \\frac{\\mu mg}{\\cos\\theta + \\mu\\sin\\theta}$$. Any force larger than this causes slipping.\n\n+ With $$\\mu = 1/4$$, $$\\sin\\theta = 4/5$$, $$\\cos\\theta = 3/5$$: $$P = \\frac{mg/4}{3/5 + (1/4)(4/5)} = \\frac{mg/4}{3/5 + 1/5} = \\frac{mg/4}{4/5} = \\frac{5mg}{16}$$. This is the maximum force before slipping.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "How do you convert a velocity given as \"speed $$v$$ on bearing $$\\alpha$$\" into $$\\mathbf{i}$$-$$\\mathbf{j}$$ vector form? (2 steps)", "answer": "- Step 1: Recall: bearing is measured clockwise from North ($$\\mathbf{j}$$-direction). The $$\\mathbf{i}$$-component (East) = $$v\\sin\\alpha$$ and the $$\\mathbf{j}$$-component (North) = $$v\\cos\\alpha$$.\n- Step 2: Example: speed 20 km/h on bearing $$\\alpha$$ where $$\\tan\\alpha = 4/3$$. Since $$\\sin\\alpha = 4/5$$ and $$\\cos\\alpha = 3/5$$: velocity = $$20(\\frac{4}{5}\\mathbf{i} + \\frac{3}{5}\\mathbf{j}) = 16\\mathbf{i} + 12\\mathbf{j}$$ km/h.\n\n+ For bearing 090° (due East): $$\\sin 90° = 1$$, $$\\cos 90° = 0$$, so velocity = $$v\\mathbf{i}$$. ✓ For bearing 000° (due North): $$\\sin 0° = 0$$, $$\\cos 0° = 1$$, so velocity = $$v\\mathbf{j}$$. ✓ These sanity checks confirm the formula.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "How do you check if two moving particles **collide**, given their position vectors as functions of time? (3 steps)", "answer": "- Step 1: Write position vectors: $$\\mathbf{r}_A = \\mathbf{r}_{A,0} + \\mathbf{v}_A t$$ and $$\\mathbf{r}_B = \\mathbf{r}_{B,0} + \\mathbf{v}_B t$$.\n- Step 2: For collision, set $$\\mathbf{r}_A = \\mathbf{r}_B$$, which means both the $$\\mathbf{i}$$ and $$\\mathbf{j}$$ components must be equal at the **same time** $$t$$. This gives two equations: one from $$\\mathbf{i}$$-components, one from $$\\mathbf{j}$$-components.\n- Step 3: Solve each equation for $$t$$. If both give the **same** value of $$t$$, collision occurs at that time. If they give **different** values of $$t$$, the particles never collide — they pass through the same $$x$$-position and same $$y$$-position at different times.\n\n+ Example: $$\\mathbf{i}$$-equation gives $$t = 5/12$$ but $$\\mathbf{j}$$-equation gives $$t = 5/4$$. Different times → no collision. The particles miss each other.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "How do you find the **minimum distance** between two moving particles using position vectors? Walk through the conceptual approach. (4 steps)", "answer": "- Step 1: Find the displacement vector between the particles: $$\\mathbf{d}(t) = \\mathbf{r}_B(t) - \\mathbf{r}_A(t) = (a + bt)\\mathbf{i} + (c + dt)\\mathbf{j}$$, where $$a, b, c, d$$ are constants obtained from subtracting the position vectors.\n- Step 2: The distance is $$|\\mathbf{d}(t)| = \\sqrt{(a+bt)^2 + (c+dt)^2}$$. To minimise this, it's easier to minimise the **square** of the distance: $$|\\mathbf{d}|^2 = (a+bt)^2 + (c+dt)^2$$, since the square root is a monotonically increasing function.\n- Step 3: Differentiate $$|\\mathbf{d}|^2$$ with respect to $$t$$ and set equal to zero: $$\\frac{d}{dt}|\\mathbf{d}|^2 = 2b(a+bt) + 2d(c+dt) = 0$$. Solve for $$t$$.\n- Step 4: Substitute this $$t$$ back into $$|\\mathbf{d}(t)|$$ to find the minimum distance. Verify it's a minimum (the quadratic in $$t$$ opens upward since coefficient of $$t^2$$ is $$b^2 + d^2 > 0$$).\n\n+ Why minimise $$|\\mathbf{d}|^2$$ instead of $$|\\mathbf{d}|$$? Differentiating a square root is messy and error-prone. Squaring first gives a clean quadratic, and both functions have their minimum at the same $$t$$.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "How do you find the **minimum speed** of a particle whose velocity is given as $$\\mathbf{v} = (5 - 5\\lambda)\\mathbf{i} + (-8 + 10\\lambda)\\mathbf{j}$$ for a parameter $$\\lambda$$? (3 steps)", "answer": "- Step 1: Speed = $$|\\mathbf{v}| = \\sqrt{(5-5\\lambda)^2 + (-8+10\\lambda)^2}$$. As with minimum distance, minimise the **square** of the speed: $$|\\mathbf{v}|^2 = (5-5\\lambda)^2 + (-8+10\\lambda)^2$$.\n- Step 2: Expand: $$|\\mathbf{v}|^2 = 25 - 50\\lambda + 25\\lambda^2 + 64 - 160\\lambda + 100\\lambda^2 = 125\\lambda^2 - 210\\lambda + 89$$. Differentiate: $$\\frac{d}{d\\lambda}|\\mathbf{v}|^2 = 250\\lambda - 210 = 0$$, so $$\\lambda = 210/250 = 21/25$$.\n- Step 3: Substitute back: $$|\\mathbf{v}|^2 = 125(21/25)^2 - 210(21/25) + 89$$. The minimum speed is the square root of this value. Since the coefficient of $$\\lambda^2$$ is positive ($$125 > 0$$), this is indeed a minimum.\n\n+ This is the same technique as minimum distance — both involve minimising the magnitude of a vector that depends linearly on a parameter.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "In a collision problem, how do you determine the **direction of motion** of each particle after the collision? What physical constraint must be satisfied? (3 steps)", "answer": "- Step 1: Apply conservation of momentum: $$m_1u_1 + m_2u_2 = m_1v_1 + m_2v_2$$. Choose a positive direction (usually the initial direction of the first particle).\n- Step 2: After collision, the particles **cannot pass through each other**. This means if A was moving right and B was moving left (approaching), after collision they must be separating — A cannot overtake B. So if A continues right, B must also move right (or A reverses).\n- Step 3: If the maths gives you a choice of sign for $$v_1$$ or $$v_2$$, check which is physically consistent. If A continues in the same direction but slower, B must have been pushed in A's direction (Newton's 3rd Law — A pushes B forward, B pushes A backward, slowing it).\n\n+ Example: if A reverses ($$v_1 < 0$$), it has been pushed back by B. This is consistent with B moving in A's original direction. Both particles move in the same direction after collision if A's speed was insufficient to push B away while continuing forward.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "What is the relationship between the **area under an acceleration-time graph** and the motion quantities? Why can't you use SUVAT when acceleration is variable? (2 steps)", "answer": "- Step 1: The **area under an a-t graph** equals the **change in velocity** ($$\\Delta v$$). This is because $$a = dv/dt$$, so integrating $$a$$ over time gives $$v$$. Similarly, the **area under a v-t graph** equals the **displacement**.\n- Step 2: SUVAT equations assume $$a$$ is constant throughout the time interval. When acceleration changes (e.g., at $$t = 4$$ s the acceleration suddenly changes), you must **split the motion at the transition point** and apply SUVAT (or area methods) separately to each interval with constant acceleration.\n\n+ Example: if the a-t graph shows $$a = -0.5$$ m/s² for 0–4 s and then $$a = +0.8$$ m/s² for 4–10 s, the velocity change in the first interval is $$-0.5 \\times 4 = -2$$ m/s, and in the second is $$+0.8 \\times 6 = +4.8$$ m/s. Total $$\\Delta v = +2.8$$ m/s. You could NOT use a single SUVAT equation for the full 10 seconds.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "How do you find the **angle** a resultant force vector $$\\mathbf{F} = a\\mathbf{i} + b\\mathbf{j}$$ makes with the positive $$\\mathbf{i}$$-direction, and what is the common quadrant error? (3 steps)", "answer": "- Step 1: The angle satisfies $$\\tan\\theta = b/a$$. But $$\\arctan(b/a)$$ only gives values between $$-90°$$ and $$+90°$$, which covers the 1st and 4th quadrants.\n- Step 2: You must check the **signs of both components** to determine the correct quadrant. If $$a > 0, b > 0$$: 1st quadrant. If $$a < 0, b > 0$$: 2nd quadrant (add 180°). If $$a < 0, b < 0$$: 3rd quadrant (add 180°). If $$a > 0, b < 0$$: 4th quadrant.\n- Step 3: Example: $$\\mathbf{F} = -8\\mathbf{i} + 15\\mathbf{j}$$. $$\\tan\\theta = 15/(-8)$$. The calculator gives $$\\arctan(-15/8) \\approx -62°$$, but since $$a < 0$$ and $$b > 0$$, the vector is in the **2nd quadrant**. The correct angle is $$180° - 62° = 118°$$ from the positive $$\\mathbf{i}$$-direction.\n\n+ Common error: blindly using the calculator's $$\\arctan$$ value without checking the quadrant. Always sketch the vector first — which quadrant is the arrow pointing into?", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "An object falls from rest through a distance of 1.5 m and then hits the ground, decelerating to rest. How do you find the **normal reaction force** during the deceleration phase? (3 steps)", "answer": "- Step 1: First, find the speed just before impact using SUVAT: $$v^2 = u^2 + 2as = 0 + 2(9.8)(1.5) = 29.4$$, so $$v = \\sqrt{29.4}$$ m/s.\n- Step 2: During deceleration on the ground, the net upward force is $$N - mg = ma$$, where $$a$$ is the (upward) deceleration. Using SUVAT for the stopping phase: $$0 = v^2 - 2a \\times d_{\\text{stop}}$$, giving $$a = v^2/(2d_{\\text{stop}})$$.\n- Step 3: Therefore $$N = mg + ma = m(g + a)$$. The normal reaction is **greater than** $$mg$$ during deceleration because the ground must both support the weight AND provide the decelerating force.\n\n+ Key insight: when an object decelerates upon landing, $$N > mg$$ (you feel \"heavier\" during impact). When an object accelerates downward (like in a dropping lift), $$N < mg$$ (you feel \"lighter\"). This is the same physics as apparent weight in lifts.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "In a speed-time graph problem involving a car and a motorbike, how do you determine when the motorbike **overtakes** the car? (3 steps)", "answer": "- Step 1: Overtaking occurs when both vehicles have travelled the **same distance** from the start and are at the **same position**. Distance = area under the v-t graph.\n- Step 2: Write expressions for the area under each vehicle's v-t graph as functions of time. The car might have constant speed (rectangular area), while the motorbike accelerates from rest (triangular then rectangular area).\n- Step 3: Set the two areas **equal** and solve for $$T$$. This gives the time at which the motorbike catches up. After this time, the motorbike is ahead.\n\n+ Check: at $$T$$, both areas are equal. Just before $$T$$, the car's area is larger (car is ahead). Just after $$T$$, the motorbike's area is larger (motorbike is ahead). This confirms overtaking.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "A car tows a trailer on an inclined road. When the tow bar **breaks**, what forces act on the trailer, and how do you find its deceleration and stopping distance? (3 steps)", "answer": "- Step 1: After the tow bar breaks, the trailer is no longer connected to the car. The forces on the trailer are: weight component along the slope ($$mg\\sin\\alpha$$, down the slope), friction ($$\\mu mg\\cos\\alpha$$, opposing motion = up the slope if trailer slides down), and normal reaction.\n- Step 2: If the trailer is moving uphill when the bar breaks, it decelerates under both gravity and friction (both act down the slope against the motion). Net deceleration: $$a = -g\\sin\\alpha - \\mu g\\cos\\alpha$$.\n- Step 3: Use SUVAT to find stopping distance: $$v^2 = u^2 + 2as$$, with $$v = 0$$, $$u =$$ speed at break, $$a =$$ deceleration from Step 2. So $$s = -u^2/(2a) = u^2/(2(g\\sin\\alpha + \\mu g\\cos\\alpha))$$.\n\n+ Common error: forgetting that both gravity AND friction contribute to deceleration after the tow bar breaks. The trailer isn't just slowing due to friction — the incline's gravity component also slows it.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "A particle is in equilibrium, suspended by two strings at angles. How do you find the tensions in each string? (3 steps)", "answer": "- Step 1: Since the particle is in equilibrium, the net force is zero. Resolve forces in two perpendicular directions (horizontal and vertical).\n- Step 2: Horizontal equilibrium: the horizontal components of the two tensions must balance. If string 1 makes angle $$\\theta_1$$ and string 2 makes angle $$\\theta_2$$: $$T_1\\cos\\theta_1 = T_2\\cos\\theta_2$$ (or similar, depending on geometry).\n- Step 3: Vertical equilibrium: the vertical components of both tensions must support the weight: $$T_1\\sin\\theta_1 + T_2\\sin\\theta_2 = mg$$. Solve the two simultaneous equations for $$T_1$$ and $$T_2$$.\n\n+ If one tension and the weight are known, you can find the other tension directly from one equation. For example, if horizontal equilibrium gives $$T_1 = 2.5$$ N, substitute into vertical equilibrium to find $$T_2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "In a **tilting rod** problem, what physical condition defines the moment of tilting, and which reaction force becomes zero? (2 steps)", "answer": "- Step 1: A rod tilts when it is about to rotate about one of its supports. The condition is that the **reaction at the other support becomes zero** — it's on the verge of lifting off.\n- Step 2: To solve: take moments about the support the rod is tilting towards (the one it pivots about), with the reaction at the other support set to zero. This gives one equation with one unknown (the critical mass, force, or position).\n\n+ Example: if a rod rests on supports at C and D, and tilts about C, then $$R_D = 0$$. Take moments about C: only the weights and $$R_D = 0$$ appear. Solve for the unknown.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "A rod is held in equilibrium by a string at an angle, with friction acting along the rod. How do you determine the **direction of friction**? (3 steps)", "answer": "- Step 1: Friction opposes the **tendency of motion**. If the rod would slide one way without friction, friction acts the other way.\n- Step 2: To determine the tendency: resolve forces along the rod WITHOUT friction. If the component of the applied force along the rod exceeds the component of weight along the rod, the rod would slide in the applied force's direction — so friction acts in the opposite direction.\n- Step 3: Example: if the tension's component along the rod ($$T\\cos\\theta$$) is greater than the weight component along the rod ($$mg\\sin\\phi$$), the rod would slide UP without friction, so friction acts DOWN the rod.\n\n+ If you're unsure, assume a direction for friction, solve, and check: if you get a negative value for $$F$$, it means friction acts in the opposite direction to what you assumed.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "For a particle on a rough inclined plane in **limiting equilibrium**, what is the relationship between $$\\mu$$, $$\\sin\\alpha$$, and $$\\cos\\alpha$$? (2 steps)", "answer": "- Step 1: In limiting equilibrium, the particle is on the point of sliding. Forces along the plane balance: $$mg\\sin\\alpha = F = \\mu R = \\mu mg\\cos\\alpha$$. Therefore $$mg\\sin\\alpha = \\mu mg\\cos\\alpha$$, giving $$\\mu = \\tan\\alpha$$.\n- Step 2: This is a powerful result: **the angle of friction** $$\\alpha$$ satisfies $$\\mu = \\tan\\alpha$$. If the incline angle equals the angle of friction, the particle is in limiting equilibrium. If the incline is steeper ($$\\alpha$$ larger), it slides. If shallower, it stays.\n\n+ This means: given $$\\mu = 1/8$$, the angle of friction is $$\\arctan(1/8) \\approx 7.1°$$. Any incline steeper than this will cause sliding (assuming no other forces).", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "When a particle slides **down** a rough inclined plane, what is its acceleration, and under what condition will it NOT slide at all? (2 steps)", "answer": "- Step 1: Forces down the slope: $$mg\\sin\\alpha$$ (weight component). Forces up the slope: $$\\mu mg\\cos\\alpha$$ (friction, opposing downward motion). Net force: $$mg\\sin\\alpha - \\mu mg\\cos\\alpha = ma$$, so $$a = g(\\sin\\alpha - \\mu\\cos\\alpha)$$.\n- Step 2: The particle will NOT slide if $$a \\leq 0$$, i.e., $$\\sin\\alpha \\leq \\mu\\cos\\alpha$$, i.e., $$\\tan\\alpha \\leq \\mu$$. If $$\\mu \\geq \\tan\\alpha$$, friction alone can hold the particle stationary on the slope.\n\n+ If the particle is given an initial push down the slope but $$\\mu > \\tan\\alpha$$, it will decelerate and stop. The deceleration is $$a = g(\\mu\\cos\\alpha - \\sin\\alpha)$$, which is positive (up the slope, opposing the downward motion).", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "How do you find the **bearing** of one particle from another, given their position vectors? (3 steps)", "answer": "- Step 1: Find the displacement vector from A to B: $$\\mathbf{AB} = \\mathbf{r}_B - \\mathbf{r}_A = \\Delta x\\mathbf{i} + \\Delta y\\mathbf{j}$$.\n- Step 2: The angle from North (bearing) is found using: if $$\\mathbf{AB}$$ has components $$\\Delta x$$ (East) and $$\\Delta y$$ (North), then the bearing $$\\beta$$ satisfies $$\\tan\\beta = \\Delta x / \\Delta y$$ (note: East over North, not the usual $$y/x$$).\n- Step 3: Adjust for quadrant. If $$\\Delta x > 0, \\Delta y > 0$$: bearing is between 000° and 090°. If $$\\Delta x < 0, \\Delta y > 0$$: between 270° and 360°. If $$\\Delta x < 0, \\Delta y < 0$$: between 180° and 270°. If $$\\Delta x > 0, \\Delta y < 0$$: between 090° and 180°.\n\n+ Example: $$\\mathbf{AB} = -5\\mathbf{i} - 5\\mathbf{j}$$. Both components negative → SW direction → bearing = 225°. Check: $$|\\Delta x| = |\\Delta y|$$ → exactly 45° South of West → 180° + 45° = 225°. ✓", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "What is the **impulse-momentum theorem**, and how do you apply it to find the impulse on an object during a collision? (2 steps)", "answer": "- Step 1: Impulse = change in momentum: $$I = m(v - u)$$, where $$u$$ is initial velocity and $$v$$ is final velocity (taking direction into account with signs). Impulse is a vector quantity measured in Ns (newton-seconds).\n- Step 2: For a collision with a fixed object (like a peg), the impulse on the peg equals the change in momentum of the particle but in the opposite direction (Newton's 3rd Law). If a particle of mass $$m$$ hits a peg at speed $$u$$ and rebounds at speed $$v$$: impulse on particle = $$m(-v - u) = -m(u+v)$$ (opposing initial direction), and impulse on peg = $$+m(u+v)$$.\n\n+ Key: impulse on the particle is always in the direction that changes its momentum. If it slows down or reverses, the impulse opposes its initial motion.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": true}, {"question": "After a collision, a particle moves with deceleration due to friction. How do you combine the impulse/momentum calculation with SUVAT for the full problem? (3 steps)", "answer": "- Step 1: First, use conservation of momentum (or given information) to find the velocity immediately after the collision. This is the \"initial velocity\" for the post-collision phase.\n- Step 2: For the post-collision phase, identify the decelerating force (usually friction: $$F = \\mu mg$$ on a horizontal surface, giving $$a = -\\mu g$$). Use SUVAT with this deceleration and the post-collision velocity.\n- Step 3: Apply the relevant SUVAT equation: to find stopping distance, use $$v^2 = u^2 + 2as$$ with $$v = 0$$. To find stopping time, use $$v = u + at$$ with $$v = 0$$.\n\n+ The two phases (collision and post-collision sliding) are linked only by the velocity at the instant after collision. The collision is instantaneous (no time passes), so position doesn't change during the collision itself.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "In a projectile problem, why is it crucial to treat horizontal and vertical motion **independently**, and what is the one quantity that links them? (2 steps)", "answer": "- Step 1: The only acceleration in projectile motion (ignoring air resistance) is $$g$$ downward. This means: horizontal motion has **zero acceleration** (constant horizontal velocity), while vertical motion has **constant acceleration** $$g$$ downward. These are two independent SUVAT problems.\n- Step 2: The one quantity linking them is **time** $$t$$. Both the horizontal and vertical motions take the same time. You can often find $$t$$ from one component (e.g., vertical: time to reach maximum height or return to ground) and use it in the other (horizontal: range calculation).\n\n+ Common error: trying to use a single SUVAT equation for the diagonal motion. SUVAT only works in one dimension at a time. Resolve into components first.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": true}, {"question": "A ball is thrown vertically upward with initial speed 24 m/s from a height of 2.5 m above the ground. Conceptually, how do you find the speed when it hits the ground and the total time of flight? (3 steps)", "answer": "- Step 1: For the speed at the ground, use $$v^2 = u^2 + 2as$$ with $$u = 24$$ m/s (upward), $$a = -9.8$$ m/s², $$s = -2.5$$ m (displacement is downward). $$v^2 = 576 + 2(9.8)(2.5) = 576 + 49 = 625$$, so $$v = 25$$ m/s.\n- Step 2: For total time, use $$s = ut + \\frac{1}{2}at^2$$: $$-2.5 = 24t - 4.9t^2$$, or $$4.9t^2 - 24t - 2.5 = 0$$. Solve the quadratic for the positive root.\n- Step 3: Alternatively, use $$v = u + at$$: $$-25 = 24 - 9.8t$$ (taking downward as negative for velocity), giving $$t = 49/9.8 = 5$$ s. The sign of $$v$$ is negative because the ball is moving downward at impact.\n\n+ Key insight: the ball is moving FASTER at the ground (25 m/s) than when thrown (24 m/s) because it started 2.5 m above the ground, gaining additional speed from the extra fall distance.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": true}, {"question": "When solving a projectile problem where the ball passes through a given height **twice** (once going up, once coming down), how do you find both times? (2 steps)", "answer": "- Step 1: Use $$s = ut + \\frac{1}{2}at^2$$ with $$s =$$ the given height. This gives a quadratic in $$t$$: $$\\frac{1}{2}gt^2 - ut + h = 0$$ (taking upward as positive).\n- Step 2: The quadratic has **two positive roots**: the smaller root is the time going up (ball reaches that height on the way up), and the larger root is the time coming down (ball passes through that height again on the way down).\n\n+ Example: $$10 = 24t - 4.9t^2$$ gives $$4.9t^2 - 24t + 10 = 0$$. The discriminant $$576 - 196 = 380 > 0$$, confirming two real roots. Both are positive since the ball starts below 10 m and goes above 10 m before returning.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "Two particles approach each other from opposite directions. Object A moves at $$+u$$ and object B moves at $$-v$$ (in the chosen positive direction). After collision, how do you handle the signs in the conservation of momentum equation? (3 steps)", "answer": "- Step 1: Choose a positive direction (e.g., A's initial direction). Then A's initial velocity is $$+u$$ and B's initial velocity is $$-v$$ (since B moves in the opposite direction).\n- Step 2: Conservation of momentum: $$m_A(u) + m_B(-v) = m_A v_A + m_B v_B$$. The unknowns $$v_A$$ and $$v_B$$ can be positive or negative — their signs tell you the direction after collision.\n- Step 3: Physical constraint: after a head-on collision, the objects must be **separating** (moving apart). So if A was moving right and B was moving left, after collision either A moves left and B moves right (both reversed), or one reverses and the other continues but slower. The relative velocity of separation must be positive.\n\n+ Common error: writing both initial velocities as positive. If objects approach each other, one velocity MUST be negative in your chosen coordinate system.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "In a connected particles problem with a pulley, particle A on a rough inclined plane and particle B hanging vertically, what is the systematic approach to find both the acceleration and the tension? (4 steps)", "answer": "- Step 1: Determine the direction of motion. Compare the weight of B ($$m_B g$$) with the component of A's weight down the slope plus maximum friction ($$m_A g\\sin\\alpha + \\mu m_A g\\cos\\alpha$$). If B is heavier \"effectively,\" B goes down and A goes up.\n- Step 2: Write F = ma for A (along the plane, in the direction of motion): $$T - m_A g\\sin\\alpha - \\mu m_A g\\cos\\alpha = m_A a$$ (friction opposes A's upward motion).\n- Step 3: Write F = ma for B (downward positive): $$m_B g - T = m_B a$$.\n- Step 4: Add the two equations to eliminate $$T$$: $$m_B g - m_A g\\sin\\alpha - \\mu m_A g\\cos\\alpha = (m_A + m_B)a$$. Solve for $$a$$, then substitute back to find $$T$$.\n\n+ This systematic approach works for ALL connected particle problems: (1) determine direction, (2) write equation for each particle, (3) add to eliminate T, (4) solve.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": true}, {"question": "A two-string pulley system has different tensions in the two strings. Under what conditions are the tensions different, and how does this affect the equations? (2 steps)", "answer": "- Step 1: Tensions are different when the strings are **separate** (not the same string over a pulley). If two different strings connect the particles to the pulley or support, each has its own tension $$T_1$$ and $$T_2$$. A single inextensible string over a smooth pulley has the SAME tension throughout.\n- Step 2: With two different tensions, you have three unknowns ($$T_1$$, $$T_2$$, $$a$$) and need three equations: F = ma for particle A, F = ma for particle B, and (if the pulley is light and smooth) the constraint that both particles have the same acceleration magnitude.\n\n+ Example: a particle P hangs from string 1 (tension $$T_1$$) connected to the ceiling, and string 2 (tension $$T_2$$) connects P to a lower particle Q over a pulley. For P: $$T_1 - T_2 - m_P g = m_P a$$. For Q: $$T_2 - m_Q g = m_Q a$$.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "When finding the **bearing of approach** of one ship towards another, what does this mean geometrically, and how do you set up the equation? (3 steps)", "answer": "- Step 1: \"Bearing of approach\" means the direction from which ship A sees ship B approaching — i.e., the direction of the vector $$\\mathbf{AB} = \\mathbf{r}_B - \\mathbf{r}_A$$ at that instant.\n- Step 2: If the bearing of approach is given (e.g., 225° = SW direction), this constrains the ratio of the $$\\mathbf{i}$$ and $$\\mathbf{j}$$ components of $$\\mathbf{AB}$$. For bearing 225°, the direction is 45° South of West, so $$|\\Delta x| = |\\Delta y|$$ with both negative.\n- Step 3: Set up the equation: $$\\Delta x = \\Delta y$$ (or $$\\Delta x = -\\Delta y$$, depending on the quadrant). Since $$\\mathbf{AB}(t) = (a + bt)\\mathbf{i} + (c + dt)\\mathbf{j}$$, set the appropriate component equality and solve for $$t$$.\n\n+ Example: bearing 225° means $$\\Delta x < 0$$ and $$\\Delta y < 0$$ with $$|\\Delta x| = |\\Delta y|$$. So $$a + bt = -(c + dt)$$, giving $$a + c = -(b + d)t$$, so $$t = -(a+c)/(b+d)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "What is the physical meaning of $$N = m(g - a)$$ for an object falling and then decelerating on impact? When is $$N > mg$$ and when is $$N < mg$$? (3 steps)", "answer": "- Step 1: During impact, the normal reaction $$N$$ acts upward and weight $$mg$$ acts downward. Newton's 2nd Law (taking upward as positive): $$N - mg = ma$$, where $$a$$ is the acceleration (positive if upward).\n- Step 2: Rearranging: $$N = m(g + a)$$. During deceleration on landing, $$a$$ is positive (upward deceleration), so $$N = m(g + a) > mg$$. You feel heavier during impact.\n- Step 3: If the object were in a lift accelerating downward, $$a$$ would be negative (downward acceleration), so $$N = m(g - |a|) < mg$$. You feel lighter. In free fall ($$a = -g$$): $$N = m(g - g) = 0$$ — weightlessness!\n\n+ The formula $$N = m(g - a)$$ from the notes uses downward as positive for $$a$$, so $$a$$ is negative when decelerating upward, giving $$N = m(g + |a|) > mg$$. The sign convention must be consistent.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": true}, {"question": "In a v-t graph problem, how do you calculate displacement and what does the **area** represent for different graph shapes? (2 steps)", "answer": "- Step 1: The **area under a v-t graph** represents displacement. For constant velocity: area = rectangle = $$v \\times t$$. For constant acceleration from rest: area = triangle = $$\\frac{1}{2}v \\times t$$. For constant acceleration from non-zero speed: area = trapezium = $$\\frac{1}{2}(u + v)t$$.\n- Step 2: For a multi-phase journey (e.g., acceleration then constant speed then deceleration), split the graph into regions, calculate each area separately, and sum them. Area below the time axis represents negative displacement (movement in the opposite direction).\n\n+ The v-t graph for the two-stage parachute problem: first segment is a triangle (accelerating under gravity), second segment is a trapezium (decelerating under parachute). Total displacement = area of triangle + area of trapezium.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "A particle of mass $$m$$ is on a rough surface with $$\\mu = 1/4$$. A force $$P$$ is applied at angle $$\\theta$$ where $$\\sin\\theta = 4/5$$. Find the maximum value of $$P$$ before the particle slips. (3 steps)", "answer": "- Step 1: Resolve vertically: $$R + P\\sin\\theta = mg$$, so $$R = mg - \\frac{4P}{5}$$. Resolve horizontally: $$P\\cos\\theta = F$$. At limiting friction: $$F = \\mu R$$.\n- Step 2: Substitute: $$\\frac{3P}{5} = \\frac{1}{4}(mg - \\frac{4P}{5}) = \\frac{mg}{4} - \\frac{P}{5}$$.\n- Step 3: Collect terms: $$\\frac{3P}{5} + \\frac{P}{5} = \\frac{mg}{4}$$, so $$\\frac{4P}{5} = \\frac{mg}{4}$$, giving $$P = \\frac{5mg}{16}$$. Any force greater than this causes the particle to slip.\n\n+ Check: at this value, $$R = mg - \\frac{4}{5} \\times \\frac{5mg}{16} = mg - \\frac{mg}{4} = \\frac{3mg}{4} > 0$$. The normal reaction is positive, confirming the particle remains on the surface. If $$P$$ were so large that $$R < 0$$, the particle would lift off before slipping.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "Why is it that when you minimise $$|\\mathbf{d}|^2$$ instead of $$|\\mathbf{d}|$$, you get the same optimal time $$t$$? Is this always true? (2 steps)", "answer": "- Step 1: The function $$f(x) = \\sqrt{x}$$ is strictly increasing for $$x > 0$$. This means if $$|\\mathbf{d}(t)|^2$$ is minimised at $$t = t^*$$, then $$|\\mathbf{d}(t)|$$ is also minimised at $$t = t^*$$. A smaller squared distance always corresponds to a smaller distance.\n- Step 2: This is always true as long as the distance is non-negative (which it always is, being a magnitude). The converse would fail if we were maximising and the function weren't monotonic, but for minimisation of a positive quantity, minimising the square is equivalent and algebraically much simpler.\n\n+ This trick works for any \"minimise the distance/magnitude\" problem in mechanics: minimise the square of the magnitude, differentiate, set to zero, solve for the parameter.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": true}, {"question": "A car of mass 600 kg tows a trailer of mass 400 kg up a hill inclined at $$\\arcsin(1/10)$$ against a resistance of 60 N on the trailer. The tow bar has tension 1000 N. When the tow bar breaks at speed 12 m/s, find the deceleration of the trailer. (3 steps)", "answer": "- Step 1: After the tow bar breaks, the trailer has no driving force. Forces on the trailer: weight component down the slope = $$400g \\times \\sin\\alpha = 400 \\times 9.8 \\times 1/10 = 392$$ N, and resistance = 60 N (also opposing motion, since trailer moves uphill). Both act down the slope against the motion.\n- Step 2: Total decelerating force = $$392 + 60 = 452$$ N. By F = ma: $$452 = 400a$$, so $$a = 452/400 = 1.13$$ m/s².\n- Step 3: Stopping distance from SUVAT: $$v^2 = u^2 + 2as$$, with $$v = 0$$, $$u = 12$$, $$a = -1.13$$: $$s = 12^2/(2 \\times 1.13) = 144/2.26 \\approx 63.7$$ m.\n\n+ Key insight: both gravity (through the incline component) and friction/resistance contribute to deceleration. Don't forget either one.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "In a moments problem with a non-uniform rod, the centre of mass is NOT at the midpoint. How does this change the setup compared to a uniform rod? (2 steps)", "answer": "- Step 1: For a **uniform** rod, the weight acts at the midpoint (by symmetry). For a **non-uniform** rod, the centre of mass is at some unknown distance $$x$$ from one end. This $$x$$ becomes an additional unknown in the problem.\n- Step 2: You need an additional equation to solve for $$x$$. This comes from the moments equation about a chosen pivot. The weight $$Mg$$ acts at distance $$x$$ from the reference end, and you set the total clockwise moment equal to the total anti-clockwise moment.\n\n+ Example: if the rod is 4 m long with supports at the ends, and the centre of mass is at distance $$x$$ from the left end, then taking moments about the left support: $$R_{\\text{right}} \\times 4 = Mg \\times x$$. Combined with $$R_{\\text{left}} + R_{\\text{right}} = Mg$$, you can solve for both reactions and $$x$$.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": true}, {"question": "What is the difference between the **component method** and the **cosine rule method** for finding the resultant of two forces, and when is each preferable? (2 steps)", "answer": "- Step 1: **Component method**: resolve each force into $$\\mathbf{i}$$ and $$\\mathbf{j}$$ components, add them, then find the magnitude and direction of the resultant. This is systematic and works for any number of forces at any angles. It's the \"safe\" method that always works.\n- Step 2: **Cosine rule**: if you have exactly two forces and know the angle between them, $$R^2 = F_1^2 + F_2^2 + 2F_1 F_2\\cos\\theta$$ (where $$\\theta$$ is the angle between the forces). This is faster for two forces but doesn't generalise well to three or more forces.\n\n+ Both methods should give the same answer — use one as a check for the other in exams. The component method is more reliable under time pressure because it's harder to make angle-identification errors.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "A smooth bead is threaded on a rough wire. How does the normal reaction direction differ from a particle on a rough surface? (2 steps)", "answer": "- Step 1: On a flat surface, the normal reaction is always perpendicular to the surface (vertically upward for a horizontal surface). On a wire or rod at an angle, the normal reaction is perpendicular to the wire/rod, not necessarily vertical.\n- Step 2: For a bead on an inclined wire, the normal reaction is perpendicular to the wire. Friction acts along the wire (opposing motion or tendency of motion). You must resolve forces along and perpendicular to the wire, not horizontally and vertically.\n\n+ This is why rod-in-equilibrium problems require resolving along and perpendicular to the rod — the normal reaction and friction are naturally expressed in these directions.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": true}, {"question": "Conceptually, why does the tension in a string over a smooth pulley remain constant, even when the masses on each side are different? (2 steps)", "answer": "- Step 1: Tension is a force transmitted through the string. If the pulley is smooth (frictionless), there is nothing to \"grip\" the string and create a tension difference between the two sides. The string slides freely over the pulley, and the tension pulls equally on both segments.\n- Step 2: The different masses cause different net forces on each particle (leading to acceleration), but the tension itself is the same throughout. Think of it like a rope in a tug-of-war over a frictionless post: the rope transmits the same force to both sides, even though one team might be \"winning.\"\n\n+ If the pulley has mass (not light) or friction (not smooth), it can absorb or transmit different tensions. At M1 level, pulleys are always light and smooth unless stated otherwise.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": true}, {"question": "When a string goes slack in a connected particles problem, what changes about the motion, and when might the string become taut again? (3 steps)", "answer": "- Step 1: When the string goes slack, there is no tension force on either particle. They move independently under whatever other forces act (gravity, friction, etc.).\n- Step 2: The string becomes taut again when the distance between the particles equals the length of the string. At this instant, the string \"jerks\" and the particles are constrained to move together (conservation of momentum applies, as in Q1).\n- Step 3: Example: if A is projected away from B with the string slack, A decelerates (due to friction or gravity) while B is stationary. When A has moved the length of the string away, the string becomes taut and both particles jerk to a common speed.\n\n+ The \"jerk\" when the string becomes taut is an impulsive event — it happens instantaneously and involves a sudden change in velocity. Use conservation of momentum, NOT conservation of energy.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": true}, {"question": "In a vector collision check, if the $$\\mathbf{i}$$-component equation gives $$t = 5/12$$ and the $$\\mathbf{j}$$-component equation gives $$t = 5/4$$, what can you conclude and what does this mean physically? (2 steps)", "answer": "- Step 1: Since the two equations give **different times**, the particles never occupy the same position at the same time. They do NOT collide. The $$\\mathbf{i}$$-components are equal at $$t = 5/12$$ (same $$x$$-position) but the $$\\mathbf{j}$$-components are different at that time. Vice versa at
