n": "If f(x) = 2x + 3 with domain x в€€ в„ќ, find fвЃ»В№(x) and state its domain. (3 steps)", "answer": "- Step 1: Let y = 2x + 3, swap: x = 2y + 3\n- Step 2: Solve for y: x - 3 = 2y в†’ y = (x - 3)/2, so fвЃ»В№(x) = (x - 3)/2\n- Step 3: Domain of fвЃ»В№ = range of f. Since f(x) = 2x + 3 with domain в„ќ produces all real numbers (range = в„ќ), the domain of fвЃ»В№ is also all real numbers в„ќ.", "source": "MiniMax в‘ ", "_id": "minimax_1_10", "judge_pick": false}, {"question": "If f(x) = xВІ with domain x в‰Ґ 0, find fвЃ»В№(x) and state its domain. (3 steps)", "answer": "- Step 1: Let y = xВІ, swap: x = yВІ\n- Step 2: Solve for y: y = В±в€љx. Since the original domain was x в‰Ґ 0 and we restricted to make f one-to-one (x в‰Ґ 0), we take the positive root: y = в€љx. So fвЃ»В№(x) = в€љx.\n- Step 3: Domain of fвЃ»В№ = range of f. Since f(x) = xВІ with x в‰Ґ 0 produces outputs y в‰Ґ 0, the domain of fвЃ»В№ is x в‰Ґ 0.", "source": "MiniMax в‘ ", "_id": "minimax_1_11", "judge_pick": false}, {"question": "If f(x) = xВІ with domain x в‰¤ 0, find fвЃ»В№(x) and state its domain. How does this differ from the x в‰Ґ 0 case? (3 steps)", "answer": "- Step 1: Let y = xВІ, swap: x = yВІ\n- Step 2: Solve for y: y = В±в€љx. With domain x в‰¤ 0, f(x) produces outputs y в‰Ґ 0, but now we take the negative root to maintain one-to-one mapping: y = -в€љx. So fвЃ»В№(x) = -в€љx.\n- Step 3: Domain of fвЃ»В№ = range of f = x в‰Ґ 0. This differs from the x в‰Ґ 0 case where fвЃ»В№(x) = +в€љx вЂ” the sign of the square root depends on which branch of the original parabola we're inverting.", "source": "MiniMax в‘ ", "_id": "minimax_1_12", "judge_pick": false}, {"question": "Why can't f(x) = xВІ with its natural domain of \"all real numbers\" have an inverse function? (2 steps)", "answer": "- Step 1: The natural domain в„ќ fails the horizontal line test вЂ” horizontal lines (e.g., y = 4) intersect the parabola at two points (x = 2 and x = -2).\n- Step 2: This means the function is not one-to-one: f(2) = f(-2) = 4. If we tried to define an inverse, it would give fвЃ»В№(4) = В±2, which is not a function (one input gives two outputs). We must restrict the domain to x в‰Ґ 0 or x в‰¤ 0 to make it one-to-one.", "source": "MiniMax в‘ ", "_id": "minimax_1_13", "judge_pick": false}, {"question": "What does the notation fвЃ»В№(x) represent, and how is it different from (f(x))вЃ»В№? (2 steps)", "answer": "- Step 1: fвЃ»В№(x) denotes the inverse function вЂ” the function that reverses the mapping of f. It satisfies fвЃ»В№(f(x)) = x and f(fвЃ»В№(x)) = x.\n- Step 2: (f(x))вЃ»В№ means the reciprocal of the output, i.e., 1/f(x). These are completely different operations: inverse function vs. reciprocal. For example, if f(x) = 2x, then fвЃ»В№(x) = x/2, but (f(x))вЃ»В№ = 1/(2x).", "source": "MiniMax в‘ ", "_id": "minimax_1_14", "judge_pick": false}, {"question": "A function maps students to their exam scores (each student has exactly one score). Can this function have an inverse? What condition might prevent it? (2 steps)", "answer": "- Step 1: If no two students have the same score, then the function is one-to-one and an inverse exists вЂ” given a score, you can identify the unique student.\n- Step 2: However, if two different students can get the same score (which is common in exams), the function is not one-to-one and an inverse doesn't exist as a function. We'd need to restrict to a subset where scores are unique to have an inverse.", "source": "MiniMax в‘ ", "_id": "minimax_1_15", "judge_pick": false}, {"question": "When finding the inverse of a rational function like f(x) = (x+1)/(x-2), what domain restrictions must you consider for both f and fвЃ»В№? (3 steps)", "answer": "- Step 1: For f(x) = (x+1)/(x-2), the original function cannot have x = 2 in its domain (division by zero). So domain of f is x в‰  2.\n- Step 2: Find fвЃ»В№: y = (x+1)/(x-2) в†’ swap: x = (y+1)/(y-2) в†’ solve for y в†’ fвЃ»В№(x) = (2x+1)/(x-1).\n- Step 3: The range of f excludes y = 1 (the horizontal asymptote value), so domain of fвЃ»В№ is x в‰  1. Also, the original domain restriction x в‰  2 becomes the range restriction for fвЃ»В№: fвЃ»В№(x) в‰  2.", "source": "MiniMax в‘ ", "_id": "minimax_1_16", "judge_pick": false}, {"question": "A function f has domain [0, 10] and range [2, 8]. A student claims fвЃ»В№(x) has domain [2, 8] and range [0, 10]. Is the student correct? Explain. (1 step)", "answer": "Yes, the student is correct. The domain of an inverse function always equals the range of the original function, and the range of an inverse function always equals the domain of the original function. This is a fundamental property: fвЃ»В№ \"undoes\" what f does, so it must accept exactly the outputs that f can produce and produce exactly the inputs that f accepts.", "source": "MiniMax в‘ ", "_id": "minimax_1_17", "judge_pick": false}, {"question": "What is the graphical interpretation of why the domain of fвЃ»В№ must equal the range of f? (2 steps)", "answer": "- Step 1: When reflecting the graph of y = f(x) across the line y = x, every y-value that f can produce becomes an x-coordinate on the inverse's graph.\n- Step 2: Therefore, the set of possible x-values for fвЃ»В№ (its domain) must be exactly the set of y-values that f can output (its range). If we tried to include an x-value that f never produces, there would be no corresponding point on the original graph to reflect.", "source": "MiniMax в‘ ", "_id": "minimax_1_18", "judge_pick": false}, {"question": "True or False: If f is a one-to-one function, then fвЃ»В№(f(x)) = x for all x in the domain of f. (1 step)", "answer": "True. This is the fundamental property of inverse functions: applying f to x, then applying its inverse fвЃ»В№, returns you to the original x. The domain of f inside this composition must be valid (i.e., x must be in the domain of f), and the output of f must be in the domain of fвЃ»В№ (which it always is, since it equals the range of f).", "source": "MiniMax в‘ ", "_id": "minimax_1_19", "judge_pick": false}, {"question": "True or False: If f and g are inverse functions, then the composition fg(x) equals x. (1 step)", "answer": "False. The composition fg(x) means f(g(x)), not g(f(x)). For inverse functions, both fg(x) = x AND gf(x) = x hold, but the order matters. Specifically:\n- fg(x) = f(g(x)) = x for x in the domain of g (which equals the range of f)\n- gf(x) = g(f(x)) = x for x in the domain of f\n\nBoth compositions equal x, but each is only defined on the appropriate domain.", "source": "MiniMax в‘ ", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Why does the horizontal line test determine whether a function has an inverse? (2 steps)", "answer": "- Step 1: The horizontal line test checks if a function is one-to-one: if any horizontal line intersects the graph more than once, the function fails the test.\n- Step 2: If a horizontal line hits the graph at two points (say x = a and x = b with f(a) = f(b) = k), then the inverse would need to give both fвЃ»В№(k) = a and fвЃ»В№(k) = b вЂ” which is impossible for a function (one input cannot map to two outputs). Thus, an inverse exists only if the horizontal line test is passed.", "source": "MiniMax в‘ ", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A function f has an inverse fвЃ»В№. If f(3) = 7, what is fвЃ»В№(7)? If fвЃ»В№(5) = 2, what is f(2)? (1 step)", "answer": "fвЃ»В№(7) = 3 (since f(3) = 7, the inverse takes 7 back to 3)\nf(2) = 5 (since fвЃ»В№(5) = 2, the inverse takes 5 to 2, so forward function takes 2 to 5)\n\nThis illustrates the \"undoing\" nature of inverses: applying f then fвЃ»В№ (or vice versa) returns you to your starting value.", "source": "MiniMax в‘ ", "_id": "minimax_1_22", "judge_pick": false}], "count": 23}, "minimax_2": {"label": "MiniMax в‘Ў", "cards": [{"question": "Describe the algebraic method for finding fвЃ»В№(x) from f(x), step by step. (4 steps)", "answer": "- Step 1: **Replace f(x) with y** вЂ” write the function as y = f(x).\n- Step 2: **Swap x and y** вЂ” interchange their positions to get x = f(y). This is the key step that creates the inverse relationship.\n- Step 3: **Solve for y** вЂ” rearrange the equation to isolate y on its own. This new expression for y is fвЃ»В№(x).\n- Step 4: **State the domain of fвЃ»В№(x)** вЂ” this must equal the range of the original function f(x). For example, if f(x) = xВІ with domain x в‰Ґ 0, then fвЃ»В№(x) = в€љx with domain x в‰Ґ 0.", "source": "MiniMax в‘Ў", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Why must we swap x and y when finding an inverse function algebraically? What does this represent graphically?", "answer": "- Step 1: The original function maps x в†’ y (input x produces output y). The inverse function reverses this relationship: it takes an output y and returns the original input x.\n- Step 2: By swapping x and y in the equation, we're essentially solving for \"what input would give me this output?\" вЂ” which is exactly what the inverse function does.\n- + Graphically, swapping x and y corresponds to reflecting the graph across the line y = x. This is why the graph of y = fвЃ»В№(x) is always the reflection of y = f(x) in the line y = x.\n- + If we didn't swap, we'd just be solving for the same original relationship, not its inverse.", "source": "MiniMax в‘Ў", "_id": "minimax_2_1", "judge_pick": false}, {"question": "If f(x) has domain D and range R, what are the domain and range of its inverse function fвЃ»В№(x)? (2 facts)", "answer": "- The **domain of fвЃ»В№** = **range of f**, which is R. This makes sense: the inputs to the inverse are the outputs from the original function.\n- The **range of fвЃ»В№** = **domain of f**, which is D. This also makes sense: the outputs from the inverse are the original inputs to the function.\n- + Example: For f(x) = ln(x), domain is x > 0, range is all real numbers. So fвЃ»В№(x) = e^x has domain all real numbers (the range of ln) and range x > 0 (the domain of ln).", "source": "MiniMax в‘Ў", "_id": "minimax_2_2", "judge_pick": false}, {"question": "True or False: The inverse of f(x) = xВІ is fвЃ»В№(x) = в€љx. Explain your answer with domain considerations.", "answer": "FALSE вЂ” this statement is incomplete and potentially misleading.\n- Step 1: The function f(x) = xВІ, by default, has domain all real numbers (x в€€ в„ќ) and range y в‰Ґ 0.\n- Step 2: Since the range is y в‰Ґ 0 (not all real numbers), we can only define an inverse on this restricted range. The full function xВІ is not one-to-one, so it doesn't have a true inverse over its entire domain.\n- Step 3: To define an inverse, we must restrict the domain. If we restrict to x в‰Ґ 0, then fвЃ»В№(x) = в€љx with domain x в‰Ґ 0. If we restrict to x в‰¤ 0, then fвЃ»В№(x) = -в€љx with domain x в‰Ґ 0.\n- + The key insight: whenever we define an inverse, we must explicitly state the restricted domain of the original function that makes it one-to-one.", "source": "MiniMax в‘Ў", "_id": "minimax_2_3", "judge_pick": true}, {"question": "The graph of y = fвЃ»В№(x) is a reflection of y = f(x) in the line y = x. Using this property, explain why point (a, b) on f(x) corresponds to point (b, a) on fвЃ»В№(x).", "answer": "- Step 1: If (a, b) lies on y = f(x), this means f(a) = b вЂ” input a produces output b.\n- Step 2: The reflection in y = x swaps the x and y coordinates of every point. So (a, b) becomes (b, a).\n- Step 3: At point (b, a) on the reflected graph, the y-value is a. This means fвЃ»В№(b) = a вЂ” taking input b gives output a, which is exactly the inverse relationship.\n- + This confirms that the inverse \"undoes\" what the original function did: f maps a в†’ b, and fвЃ»В№ maps b в†’ a.", "source": "MiniMax в‘Ў", "_id": "minimax_2_4", "judge_pick": false}, {"question": "A student finds the inverse of f(x) = (x-2)/3 and writes fвЃ»В№(x) = 3x + 2, but doesn't state the domain. What is wrong with this answer, and what should the complete answer be?", "answer": "- Step 1: The algebraic work is correct вЂ” swapping and solving gives fвЃ»В№(x) = 3x + 2.\n- Step 2: The PROBLEM is the domain was not stated. For a complete answer, we must specify the domain.\n- Step 3: The domain of fвЃ»В№(x) equals the range of f(x). Since f(x) = (x-2)/3 is a linear function with unrestricted domain (all real numbers), its range is also all real numbers.\n- + Therefore, the complete answer is: fвЃ»В№(x) = 3x + 2, with domain x в€€ в„ќ (all real numbers).\n- + This is exactly the type of mistake noted in the study material: \"forgot to state the domain of the inverse function.\"", "source": "MiniMax в‘Ў", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Why can't every function have an inverse? What property must a function satisfy to have an inverse function?", "answer": "- Step 1: A function must be **one-to-one** (injective) to have an inverse. This means each output comes from exactly one input вЂ” no two different inputs produce the same output.\n- Step 2: If a function is not one-to-one (it's many-to-one), we cannot \"undo\" it uniquely. For example, f(x) = xВІ has f(2) = 4 and f(-2) = 4. If we ask \"what input gives output 4?\", there are two possible answers (В±2), so an inverse function doesn't exist uniquely.\n- + To make such functions invertible, we must **restrict the domain** to a region where the function becomes one-to-one (e.g., x в‰Ґ 0 for xВІ).\n- + The horizontal line test visually checks for one-to-one: if any horizontal line crosses the graph more than once, the function is not one-to-one.", "source": "MiniMax в‘Ў", "_id": "minimax_2_6", "judge_pick": true}, {"question": "How do you find where f(x) = x using the graph of f(x) or its inverse? What does this point represent?", "answer": "- Step 1: The equation f(x) = x asks \"where does the function equal its input?\" This is where the function intersects the line y = x (the line of symmetry for inverses).\n- Step 2: Geometrically, at any intersection of y = f(x) with y = x, we have f(a) = a. Since the inverse satisfies fвЃ»В№(a) = a at the same point, this is where f(x) and fвЃ»В№(x) intersect.\n- + Important property: If fвЃ»В№(x) = f(x) (the function is its own inverse), then every point on the graph satisfies f(x) = x, meaning the entire graph lies on y = x. Examples include f(x) = x and f(x) = 1/x (on appropriate domains).", "source": "MiniMax в‘Ў", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Given f(x) = e^(x+1), find fвЃ»В№(x) and state its domain completely.", "answer": "- Step 1: Write y = e^(x+1)\n- Step 2: Swap x and y: x = e^(y+1)\n- Step 3: Take natural log of both sides: ln(x) = y + 1\n- Step 4: Solve for y: y = ln(x) - 1\n- Step 5: So fвЃ»В№(x) = ln(x) - 1\n- + Domain: The domain of fвЃ»В№ equals the range of f. Since e^(x+1) has range x > 0 (all positive numbers), the domain of fвЃ»В№ is x > 0.\n- + Complete answer: fвЃ»В№(x) = ln(x) - 1, domain x > 0", "source": "MiniMax в‘Ў", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Find the inverse of f(x) = (x+1)ВІ where the domain has been restricted to x в‰Ґ -1. State the domain of the inverse.", "answer": "- Step 1: y = (x+1)ВІ\n- Step 2: Swap: x = (y+1)ВІ\n- Step 3: Take square root: в€љx = y + 1 (we take the positive root because x в‰Ґ -1 means y в‰Ґ -1, so y+1 в‰Ґ 0)\n- Step 4: y = в€љx - 1\n- + So fвЃ»В№(x) = в€љx - 1\n- + Domain of fвЃ»В№: Since the original domain was x в‰Ґ -1 (giving range y в‰Ґ 0), the domain of fвЃ»В№ is x в‰Ґ 0.", "source": "MiniMax в‘Ў", "_id": "minimax_2_9", "judge_pick": false}, {"question": "A student claims: \"The inverse of f(x) = 1/x is fвЃ»В№(x) = 1/x, so f is its own inverse.\" Is this correct? What is the domain consideration here?", "answer": "YES, this is correct вЂ” f(x) = 1/x IS its own inverse (an involution), but we must still specify the domain.\n- Step 1: Algebraically: if f(x) = 1/x, then f(f(x)) = f(1/x) = 1/(1/x) = x, confirming fвЃ»В№(x) = f(x).\n- Step 2: Graphically: the hyperbola y = 1/x is symmetric about y = x, which is the defining feature of self-inverse functions.\n- + However, we must state the domain: x в‰  0 (the function is undefined at x = 0).\n- + The domain restriction is necessary because division by zero is undefined. The domain is all real numbers except 0: x в€€ в„ќ \\ {0}.", "source": "MiniMax в‘Ў", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Explain why fвЃ»В№(f(x)) = x and f(fвЃ»В№(x)) = x. What do these composite expressions represent?", "answer": "- Step 1: fвЃ»В№(f(x)) = x means: start with x, apply f to get f(x), then apply the inverse to \"undo\" f and return to x. The inverse perfectly reverses what f did.\n- Step 2: f(fвЃ»В№(x)) = x means: start with x, apply fвЃ»В№ to get some intermediate value, then apply f to \"undo\" the undoing, returning to the original x.\n- + These are the defining properties of inverse functions: they completely cancel each other out.\n- + Analogy: Think of f as \"multiply by 2\" and fвЃ»В№ as \"divide by 2\". Multiply by 2 then divide by 2 gives you back what you started with.", "source": "MiniMax в‘Ў", "_id": "minimax_2_11", "judge_pick": false}, {"question": "Consider the function f(x) = ln(x) + 1. Find fвЃ»В№(x) and state its domain. Explain why the domain is not \"all real numbers.\"", "answer": "- Step 1: y = ln(x) + 1\n- Step 2: Swap: x = ln(y) + 1\n- Step 3: Rearrange: x - 1 = ln(y)\n- Step 4: Exponentiate: e^(x-1) = y\n- + So fвЃ»В№(x) = e^(x-1)\n- + Domain of fвЃ»В№ = range of f. Since ln(x) has range all real numbers, ln(x) + 1 also has range all real numbers. Wait, let me reconsider...\n- + Actually: f(x) = ln(x) + 1 has domain x > 0, range all real numbers (adding 1 just shifts vertically). Therefore, fвЃ»В№(x) = e^(x-1) has domain all real numbers (x в€€ в„ќ).\n- + My correction: The domain IS all real numbers! I initially hesitated, but adding a constant doesn't change the range. The domain of fвЃ»В№(x) = e^(x-1) is indeed all real numbers.", "source": "MiniMax в‘Ў", "_id": "minimax_2_12", "judge_pick": false}, {"question": "Why must we restrict the domain of trigonometric functions (like sin, cos) to define their inverse functions? What restrictions are typically used?", "answer": "- Step 1: Trigonometric functions like sin(x) and cos(x) are periodic вЂ” they are many-to-one, meaning they repeat output values. For example, sin(ПЂ/6) = sin(5ПЂ/6) = 0.5. If we tried to define an inverse without restriction, each output would correspond to multiple inputs.\n- Step 2: To make them one-to-one, we restrict the domain to a principal range where the function is monotonic (strictly increasing or decreasing).\n- + For arcsin: domain [-1, 1], range [-ПЂ/2, ПЂ/2]\n- + For arccos: domain [-1, 1], range [0, ПЂ]\n- + For arctan: domain в„ќ, range (-ПЂ/2, ПЂ/2)\n- + These principal ranges are chosen so the inverse functions are continuous and cover all possible output values.", "source": "MiniMax в‘Ў", "_id": "minimax_2_13", "judge_pick": false}, {"question": "A function maps domain [0, в€ћ) to range [2, в€ћ) via f(x) = xВІ + 2. Find fвЃ»В№(x) and verify that the domain of fвЃ»В№ equals the range of f.", "answer": "- Step 1: Given y = xВІ + 2, swap: x = yВІ + 2\n- Step 2: Solve for y: yВІ = x - 2, so y = в€љ(x - 2) (taking positive root since original domain x в‰Ґ 0)\n- + So fвЃ»В№(x) = в€љ(x - 2)\n- + Original range: since xВІ в‰Ґ 0, xВІ + 2 в‰Ґ 2, so range is [2, в€ћ)\n- + Domain of fвЃ»В№: x - 2 в‰Ґ 0, so x в‰Ґ 2, which is [2, в€ћ) вЂ” exactly the range of f!\n- + This confirms the principle: domain of inverse = range of original.", "source": "MiniMax в‘Ў", "_id": "minimax_2_14", "judge_pick": false}, {"question": "What's wrong with this student's answer? They wrote: \"f(x) = xВі, so fвЃ»В№(x) = в€›x\" without stating any domain. Is this acceptable?", "answer": "- Step 1: The algebraic answer is correct: the inverse of xВі is indeed the cube root в€›x.\n- Step 2: However, it's INCOMPLETE without stating the domain. But in this case...\n- + The domain of fвЃ»В№ = range of f. Since xВі has domain all real numbers and range all real numbers (it's one-to-one), the inverse в€›x also has domain all real numbers.\n- + So the technically complete answer is: fвЃ»В№(x) = в€›x, domain x в€€ в„ќ.\n- + While this might seem trivial since both are unrestricted, it's still better practice to explicitly state \"domain: all real numbers\" to form good habits for cases where domain restrictions matter.", "source": "MiniMax в‘Ў", "_id": "minimax_2_15", "judge_pick": false}, {"question": "If fg(x) represents f(g(x)), and both f and fвЃ»В№ exist, what is (fg)вЃ»В№ equal to? Explain using the concept of \"undoing\" operations.", "answer": "- Step 1: The composite fg means: first apply g, then apply f to the result.\n- Step 2: To undo this composite, we must undo in reverse order: first undo f (by applying fвЃ»В№), then undo g (by applying gвЃ»В№).\n- + So (fg)вЃ»В№ = gвЃ»В№fвЃ»В№ (note the reversed order!)\n- + Example: If f = \"add 2\" and g = \"multiply by 3\", then fg(x) = 3x + 2. To undo: subtract 2, then divide by 3. That's gвЃ»В№(fвЃ»В№(x)) = (x - 2)/3.\n- + This is a common source of errors вЂ” students often forget to reverse the order.", "source": "MiniMax в‘Ў", "_id": "minimax_2_16", "judge_pick": true}, {"question": "A function is defined as f(x) = в€љ(5 - x). What is the largest possible domain that makes f one-to-one? Find fвЃ»В№(x) for this domain.", "answer": "- Step 1: For f(x) = в€љ(5 - x) to be defined, we need 5 - x в‰Ґ 0, so x в‰¤ 5. The natural domain is (-в€ћ, 5].\n- Step 2: On this domain, as x increases from -в€ћ to 5, the expression (5 - x) decreases from в€ћ to 0, so в€љ(5 - x) decreases from в€ћ to 0. This is strictly decreasing, so it's one-to-one.\n- + The largest one-to-one domain is x в‰¤ 5 (or (-в€ћ, 5]).\n- + Finding the inverse: y = в€љ(5 - x), swap: x = в€љ(5 - y), square: xВІ = 5 - y, so y = 5 - xВІ.\n- + fвЃ»В№(x) = 5 - xВІ, domain x в‰Ґ 0 (since the range of f is [0, в€ћ))", "source": "MiniMax в‘Ў", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Why is it incorrect to write \"the inverse of f(x) = xВІ is fвЃ»В№(x) = В±в€љx\"? Explain the fundamental error.", "answer": "- Step 1: The symbol fвЃ»В№(x) denotes a **function** вЂ” by definition, a function must give exactly ONE output for each input.\n- Step 2: The expression В±в€љx gives TWO outputs for positive x (both +в€љx and -в€љx), which is not a function вЂ” it's a relation.\n- Step 3: To make an inverse function, we must choose ONE branch. We restrict the domain of the original function to either x в‰Ґ 0 (giving fвЃ»В№(x) = в€љx) or x в‰¤ 0 (giving fвЃ»В№(x) = -в€љx).\n- + The key insight: \"inverse function\" implies a true function, so we cannot have the В± ambiguity. Domain restriction is mandatory to make the inverse well-defined.", "source": "MiniMax в‘Ў", "_id": "minimax_2_18", "judge_pick": true}], "count": 19}, "opus_1": {"label": "Opus 4.7 в‘ ", "cards": [{"question": "When defining any function (including an inverse), what two pieces of information must always be stated together, and why is one of them insufficient on its own?", "answer": "- Step 1: A function requires **both an equation/rule** (how inputs map to outputs) **and a domain** (the set of allowed inputs). Without the domain, the function is not fully specified.\n- Step 2: The reason: the same algebraic rule can behave very differently depending on what inputs you allow. For example, $$f(x) = x^2$$ on $$x \\geq 0$$ is one-to-one and invertible, but on all of $$\\mathbb{R}$$ it is not invertible. Same formula, fundamentally different function.\n- Step 3: So Harry's rule of thumb вЂ” *\"two things: the equation and the domain\"* вЂ” exists because the rule alone doesn't determine the function's range, its invertibility, or even whether it's well-defined.\n\nTakeaway: a function = rule + domain. Forgetting the domain is forgetting half the function.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_0", "judge_pick": true}, {"question": "After algebraically finding $$f^{-1}(x)$$, what specific domain must you state for it, and what is the underlying reason this is the correct domain to choose?", "answer": "- Step 1: The domain of $$f^{-1}$$ must equal the **range of the original function $$f$$**.\n- Step 2: Intuition: the inverse \"undoes\" $$f$$. So the inputs into $$f^{-1}$$ are exactly the outputs that $$f$$ could have produced. If $$f$$ never outputs a particular value, then $$f^{-1}$$ has nothing to map that value back from вЂ” it's not in its domain.\n- Step 3: Graphically, this matches the reflection in $$y = x$$: the $$y$$-values of $$f$$ become the $$x$$-values of $$f^{-1}$$.\n\nTakeaway: **Domain of $$f^{-1}$$ = Range of $$f$$**, because inverse inputs are original outputs.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_1", "judge_pick": true}, {"question": "A student writes $$f^{-1}(x) = \\tfrac{x-3}{2}$$ as their final answer to an inverse function question. What is missing, and how should the answer be properly written?", "answer": "- Step 1: The algebraic rule is given, but the **domain of $$f^{-1}$$ has not been stated**. The function is incomplete.\n- Step 2: The proper format is to write both:\n+ The rule: $$f^{-1}(x) = \\tfrac{x-3}{2}$$\n+ The domain: e.g. $$x \\in \\mathbb{R}$$ or $$x \\geq 0$$, etc. вЂ” whatever equals the range of the original $$f$$.\n- Step 3: In an exam, marks are routinely lost here. Examiners treat \"find the inverse function\" as a request for a fully-defined function, not just a formula.\n\nTakeaway: always finish with \"вЂ¦, domain: вЂ¦\". Make it muscle memory.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_2", "judge_pick": true}, {"question": "Why is the range of $$f$$ (not the domain of $$f$$) the correct domain for $$f^{-1}$$? Reason from the graphical reflection in $$y = x$$. (3 steps)", "answer": "- Step 1: Reflecting a graph in the line $$y = x$$ swaps every point $$(a, b)$$ on $$f$$ to $$(b, a)$$ on $$f^{-1}$$.\n- Step 2: Under this swap:\n+ Old $$x$$-coordinates (domain of $$f$$) become new $$y$$-coordinates (range of $$f^{-1}$$).\n+ Old $$y$$-coordinates (range of $$f$$) become new $$x$$-coordinates (domain of $$f^{-1}$$).\n- Step 3: So the horizontal extent of $$f^{-1}$$ (its domain) is literally the vertical extent of $$f$$ (its range). The reflection physically swaps the two.\n\nTakeaway: domain/range swap isn't a rule to memorize вЂ” it's just what reflection in $$y=x$$ *does*.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_3", "judge_pick": true}, {"question": "A function $$f$$ has domain $$x \\geq 2$$ and range $$f(x) \\geq 5$$. Without computing the inverse formula, what is the domain and range of $$f^{-1}$$? (2 steps)", "answer": "- Step 1: Apply the swap rule directly:\n+ Domain of $$f^{-1}$$ = Range of $$f$$ = $$x \\geq 5$$.\n+ Range of $$f^{-1}$$ = Domain of $$f$$ = $$f^{-1}(x) \\geq 2$$.\n- Step 2: Notice you didn't need the formula at all вЂ” the swap is purely structural. This is why stating the domain of $$f^{-1}$$ is *easy* once you know the range of $$f$$; people only forget because they rush past it.\n\nTakeaway: domain of inverse comes from range of original вЂ” a clean swap, no algebra needed.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_4", "judge_pick": false}, {"question": "What is the proper notation for an inverse function, and what does the \"$$-1$$\" superscript NOT mean here?", "answer": "- Step 1: The notation is $$f^{-1}(x)$$, read as \"f inverse of x.\"\n- Step 2: The $$-1$$ is **not an exponent** вЂ” it does *not* mean $$\\tfrac{1}{f(x)}$$ (that would be the reciprocal). It is purely a symbolic label indicating \"the inverse function of $$f$$.\"\n- Step 3: This is a classic notational trap. $$\\sin^{-1}(x)$$ means arcsine, not $$\\tfrac{1}{\\sin x}$$ (which is $$\\csc x$$). Same convention.\n\nTakeaway: $$f^{-1}$$ is a name, not a power. Reciprocals and inverses are different objects.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_5", "judge_pick": true}, {"question": "Why might an algebraic formula for $$f^{-1}(x)$$ accept inputs that are not actually valid for the inverse function? Give an example of the danger. (3 steps)", "answer": "- Step 1: When you solve $$x = f(y)$$ for $$y$$, the resulting algebraic expression often has a larger natural domain than the inverse function actually has.\n- Step 2: Example: if $$f(x) = \\sqrt{x-1}$$ with domain $$x \\geq 1$$, then the range of $$f$$ is $$y \\geq 0$$. Solving for the inverse gives $$f^{-1}(x) = x^2 + 1$$.\n+ The formula $$x^2 + 1$$ is defined for all real $$x$$.\n+ But the *function* $$f^{-1}$$ only accepts $$x \\geq 0$$, because those were the outputs of $$f$$.\n- Step 3: If you fed $$x = -3$$ into the formula you'd get $$10$$, but $$f$$ never produced $$-3$$, so $$f^{-1}(-3)$$ is undefined. **Stating the domain prevents this nonsense.**\n\nTakeaway: the formula is \"greedy\" вЂ” the domain restriction is what keeps $$f^{-1}$$ honest as the true inverse.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_6", "judge_pick": true}, {"question": "Walk through the full four-step procedure to find $$f^{-1}(x)$$ algebraically, emphasizing the step most students forget. (4 steps)", "answer": "- Step 1: **Write** $$y = f(x)$$ вЂ” replace the function notation with $$y$$ so you can manipulate it like an equation.\n- Step 2: **Swap** $$x$$ and $$y$$ вЂ” this enforces the inverse relationship (every $$(a,b)$$ becomes $$(b,a)$$).\n- Step 3: **Solve** the new equation for $$y$$. This gives $$y = f^{-1}(x)$$.\n- Step 4: **State the domain** of $$f^{-1}$$, which equals the range of $$f$$. *This is the step most commonly forgotten and the one Harry specifically flagged.*\n\nTakeaway: rule + swap + solve + domain. Four steps, not three.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_7", "judge_pick": false}, {"question": "Consider $$f(x) = 2x + 3$$ with domain $$x \\in \\mathbb{R}$$. Find $$f^{-1}(x)$$ and state its domain, explaining each step conceptually. (4 steps)", "answer": "- Step 1: Set $$y = 2x + 3$$.\n- Step 2: Swap: $$x = 2y + 3$$. This step encodes the inverse relationship вЂ” we're now asking \"what input $$y$$ would $$f$$ need to produce output $$x$$?\"\n- Step 3: Solve for $$y$$: $$y = \\tfrac{x - 3}{2}$$. So $$f^{-1}(x) = \\tfrac{x-3}{2}$$.\n- Step 4: Domain: since $$f$$ is a linear function over all reals, its range is all reals, so $$f^{-1}$$ has domain $$x \\in \\mathbb{R}$$.\n\nTakeaway: even for \"easy\" inverses, the domain statement is non-negotiable.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_8", "judge_pick": false}, {"question": "For $$f(x) = e^x$$ with domain $$x \\in \\mathbb{R}$$, what is $$f^{-1}(x)$$ and вЂ” critically вЂ” what is its domain, and how does this connect to the natural logarithm's properties? (3 steps)", "answer": "- Step 1: The inverse of $$e^x$$ is $$\\ln(x)$$. (Swap and solve: $$x = e^y \\Rightarrow y = \\ln x$$.)\n- Step 2: Domain of $$f^{-1} = \\ln(x)$$: the range of $$e^x$$ is $$y > 0$$, so the domain of $$\\ln$$ is $$x > 0$$.\n- Step 3: This is exactly *why* $$\\ln(x)$$ has the domain $$x > 0$$ вЂ” it's not an arbitrary restriction, it's because $$e^x$$ never outputs zero or a negative number. The vertical asymptote of $$\\ln(x)$$ at $$x = 0$$ is the reflection of the horizontal asymptote of $$e^x$$ at $$y = 0$$.\n\nTakeaway: $$\\ln$$'s domain isn't a random rule вЂ” it's $$e^x$$'s range, reflected.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_9", "judge_pick": true}, {"question": "A student claims: \"I don't need to write the domain of $$f^{-1}$$ because if you look at the formula, you can see what values work.\" Why is this reasoning wrong in an exam context? (3 steps)", "answer": "- Step 1: As shown earlier, the algebraic formula often *accepts* more inputs than the inverse function legitimately should. The formula alone doesn't carry the domain restriction inherited from the original function's range.\n- Step 2: Mathematically, a function is **defined** by its rule + domain. Omitting the domain means you have not defined a function вЂ” you've written an expression.\n- Step 3: Exam mark schemes treat the domain as a separate mark (or part of the function's identity). Even if the formula is correct, missing the domain loses marks and demonstrates incomplete understanding.\n\nTakeaway: \"you can see it from the formula\" is wrong both mathematically and procedurally.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_10", "judge_pick": true}, {"question": "If $$f(x) = x^2$$ on the restricted domain $$x \\geq 0$$, what is $$f^{-1}(x)$$ with its domain, and why does the domain restriction on $$f$$ matter so much? (3 steps)", "answer": "- Step 1: With domain $$x \\geq 0$$, $$f$$ is one-to-one (each output comes from one input), so the inverse exists. Solving: $$f^{-1}(x) = \\sqrt{x}$$ (positive root only).\n- Step 2: Range of $$f$$ on $$x \\geq 0$$ is $$y \\geq 0$$, so the domain of $$f^{-1}$$ is $$x \\geq 0$$.\n- Step 3: If we hadn't restricted $$f$$'s domain, $$x^2$$ wouldn't be invertible (both $$2$$ and $$-2$$ map to $$4$$). The domain restriction is what *makes the inverse exist*, and it then determines the inverse's range.\n\nTakeaway: domain restrictions and invertibility are inseparable вЂ” and they propagate into the inverse's definition.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_11", "judge_pick": true}, {"question": "When writing the final answer for an inverse function on an exam, in what form should the domain typically be expressed, and what are the common acceptable notations?", "answer": "- Step 1: State the domain using a clear set or inequality notation. Common forms include:\n+ Inequality: $$x \\geq 0$$, $$x > 1$$, $$0 < x < 5$$.\n+ Set notation: $$x \\in \\mathbb{R}$$, $$x \\in [0, \\infty)$$.\n+ Worded: \"for all real $$x$$\" (acceptable but less precise).\n- Step 2: Match the form to the context вЂ” if the original function had a restricted domain like $$x \\geq 2$$, the inverse's domain will be a similar inequality describing the range of $$f$$.\n- Step 3: Always write it *alongside* the rule, e.g. \"$$f^{-1}(x) = \\tfrac{x-3}{2}, \\; x \\in \\mathbb{R}$$.\"\n\nTakeaway: clean format = rule **comma** domain. Train the comma.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_12", "judge_pick": false}], "count": 13}, "opus_2": {"label": "Opus 4.7 в‘Ў", "cards": [{"question": "When defining any function (including an inverse), what two pieces of information must always be specified, and why is each necessary? (3 steps)", "answer": "- Step 1: A function requires the **rule/equation** вЂ” this tells you how an input is mapped to an output (e.g. $$f(x) = 2x+1$$).\n- Step 2: A function also requires the **domain** вЂ” the set of allowed inputs. Without a domain, the same rule can describe many different functions.\n+ Example: $$f(x) = x^2$$ on $$x \\geq 0$$ is invertible, but $$f(x)=x^2$$ on $$\\mathbb{R}$$ is not.\n+ The range is determined once the rule and domain are fixed, so it does not need to be stated separately.\n- Step 3: Conclusion: a function is the *pair* (rule, domain). Stating only the equation leaves the function ambiguous.\n\nTakeaway: \"Equation + domain\" is the minimum spec вЂ” a rule without a domain is not a complete function.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_0", "judge_pick": true}, {"question": "Why must the domain of $$f^{-1}(x)$$ be explicitly stated when writing down an inverse function, even after correctly solving for $$y$$? (3 steps)", "answer": "- Step 1: An inverse $$f^{-1}$$ is itself a function, and by the rule above, every function needs both equation and domain to be fully defined.\n- Step 2: The algebraic rearrangement only gives the *formula* of $$f^{-1}$$. The formula alone may be valid over a larger set than the actual inverse permits.\n+ Example: if $$f(x)=x^2$$ with domain $$x\\geq 0$$, then $$f^{-1}(x)=\\sqrt{x}$$ вЂ” but $$\\sqrt{x}$$ as a formula could be considered for $$x \\geq 0$$, which happens to match here; in other cases the inverse formula could be defined for inputs that were never actual outputs of $$f$$.\n- Step 3: Omitting the domain leaves $$f^{-1}$$ undefined as a function вЂ” the marker treats it as incomplete, exactly Harry's point.\n\nTakeaway: the formula is half the answer; the domain completes the definition.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_1", "judge_pick": true}, {"question": "State the relationship between the domain and range of $$f$$ and those of $$f^{-1}$$, and explain conceptually why this relationship must hold. (3 steps)", "answer": "- Step 1: The rules are: **Domain of $$f^{-1}$$ = Range of $$f$$**, and **Range of $$f^{-1}$$ = Domain of $$f$$**.\n- Step 2: Why? An inverse function \"undoes\" $$f$$. The inputs of $$f^{-1}$$ are precisely the outputs that $$f$$ actually produced вЂ” you cannot invert a value that $$f$$ never outputs.\n+ If $$f$$ sends $$a \\mapsto b$$, then $$f^{-1}$$ sends $$b \\mapsto a$$.\n+ So the set of $$b$$'s (range of $$f$$) becomes the input set of $$f^{-1}$$.\n- Step 3: Equivalently, reflecting $$y=f(x)$$ in $$y=x$$ swaps the $$x$$- and $$y$$-axis roles, which swaps domain and range geometrically.\n\nTakeaway: domain and range simply trade places under inversion вЂ” this gives you the domain of $$f^{-1}$$ for free.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_2", "judge_pick": true}, {"question": "A student writes: \"$$f^{-1}(x) = \\sqrt{x-1}$$\" as their final answer for the inverse of $$f(x)=x^2+1$$, $$x\\geq 0$$. What is missing, and what should the complete answer look like? (3 steps)", "answer": "- Step 1: The **formula is correct**, but the **domain of $$f^{-1}$$ is not stated** вЂ” this is the exact mistake Harry called out.\n- Step 2: Find the domain of $$f^{-1}$$ by finding the range of $$f$$. With $$x\\geq 0$$, $$f(x)=x^2+1$$ starts at $$f(0)=1$$ and increases, so range of $$f$$ is $$y\\geq 1$$.\n- Step 3: The complete answer is: $$f^{-1}(x)=\\sqrt{x-1}, \\quad x\\geq 1$$.\n\nTakeaway: always finish with \"comma, domain\" вЂ” treat it as part of the formula, not an afterthought.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_3", "judge_pick": false}, {"question": "Why is it not enough to \"guess\" the domain of $$f^{-1}$$ by looking at where the formula is defined (e.g. picking $$x\\geq 1$$ for $$\\sqrt{x-1}$$ just because of the square root)? (3 steps)", "answer": "- Step 1: The natural domain of the formula and the range of $$f$$ can coincide, but they don't always вЂ” relying on the formula's natural domain is a coincidence, not a method.\n- Step 2: The *correct* logical chain is: domain of $$f^{-1}$$ comes from the **range of $$f$$**, which depends on the original domain you were given for $$f$$.\n+ Example: if $$f(x)=x^2+1$$ on $$x\\geq 2$$ instead, the range is $$y\\geq 5$$, so $$f^{-1}$$ needs domain $$x\\geq 5$$, even though $$\\sqrt{x-1}$$ is defined for all $$x\\geq 1$$.\n- Step 3: So always derive the domain of $$f^{-1}$$ from $$f$$'s range вЂ” not from the inverse formula's surface appearance.\n\nTakeaway: the inverse's domain inherits from $$f$$'s outputs, not from what the inverse formula \"looks like.\"", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_4", "judge_pick": true}, {"question": "Outline the full algebraic procedure for finding $$f^{-1}(x)$$ from $$f(x)$$, and identify the step most commonly forgotten. (4 steps)", "answer": "- Step 1: Write $$y = f(x)$$ вЂ” replace the function notation with $$y$$ so you can manipulate algebraically.\n- Step 2: Swap $$x$$ and $$y$$ вЂ” this reflects the relationship $$x \\leftrightarrow y$$, which is exactly what inversion does.\n- Step 3: Solve the new equation for $$y$$ вЂ” this yields $$y = f^{-1}(x)$$.\n- Step 4: **State the domain of $$f^{-1}$$**, equal to the range of $$f$$ вЂ” this is the step most commonly forgotten and the one Harry flagged.\n\nTakeaway: the procedure has *four* steps, not three вЂ” the domain statement is part of the algorithm.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_5", "judge_pick": true}, {"question": "What is the correct notation for an inverse function, and what common notational confusion must be avoided? (2 steps)", "answer": "- Step 1: The inverse of $$f$$ is written $$f^{-1}(x)$$. The \"$$-1$$\" is a *functional* superscript indicating inversion, not an exponent.\n- Step 2: It does **not** mean $$\\dfrac{1}{f(x)}$$ (the reciprocal). Confusing the two is a common error.\n+ E.g. if $$f(x)=2x$$, then $$f^{-1}(x)=\\tfrac{x}{2}$$, not $$\\tfrac{1}{2x}$$.\n\nTakeaway: $$f^{-1}$$ undoes $$f$$; $$\\tfrac{1}{f}$$ divides by $$f$$. Different operations, same-looking notation.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_6", "judge_pick": false}, {"question": "Given $$f(x) = e^x - 3$$ with domain $$x \\in \\mathbb{R}$$, conceptually describe how you would find $$f^{-1}$$ and state its domain вЂ” without doing heavy algebra. (3 steps)", "answer": "- Step 1: Conceptually, $$f$$ takes any real number, exponentiates it (giving a positive value), then subtracts 3. The outputs therefore satisfy $$y > -3$$, so range of $$f$$ is $$y > -3$$.\n- Step 2: The inverse formula comes from solving $$x = e^y - 3$$, giving $$y = \\ln(x+3)$$, so $$f^{-1}(x)=\\ln(x+3)$$.\n- Step 3: The domain of $$f^{-1}$$ is the range of $$f$$, namely $$x > -3$$. Final answer: $$f^{-1}(x)=\\ln(x+3),\\ x>-3$$.\n\nTakeaway: identify the range of $$f$$ first (often the conceptual bottleneck), and the inverse's domain follows automatically.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_7", "judge_pick": false}, {"question": "A student says: \"The domain of $$f^{-1}$$ is just all real numbers because the formula $$\\ln(x+3)$$ accepts anything where $$x+3>0$$.\" Why is this reasoning flawed in principle, even when it gives the right answer? (3 steps)", "answer": "- Step 1: The student is computing the *natural domain of the formula*, not the domain of $$f^{-1}$$ as a function.\n- Step 2: Those two can coincide (as they do here, because $$f$$'s range is exactly $$y>-3$$), but the reasoning is backwards.\n+ The correct reasoning: domain of $$f^{-1}$$ = range of $$f$$.\n+ The student's reasoning: domain of $$f^{-1}$$ = wherever the formula works.\n- Step 3: When $$f$$ has a restricted domain (e.g. $$x\\geq 2$$), the two methods diverge, and only the range-of-$$f$$ method gives the correct answer.\n\nTakeaway: right answer, wrong method вЂ” and the wrong method fails as soon as $$f$$ has a restricted domain.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_8", "judge_pick": false}, {"question": "Geometrically, how does the graph of $$y=f^{-1}(x)$$ relate to that of $$y=f(x)$$, and why does this geometric relationship enforce the domainвЂ“range swap? (3 steps)", "answer": "- Step 1: The graph of $$y=f^{-1}(x)$$ is the reflection of $$y=f(x)$$ in the line $$y=x$$. Every point $$(a,b)$$ on $$f$$ becomes $$(b,a)$$ on $$f^{-1}$$.\n- Step 2: Reflection in $$y=x$$ swaps the horizontal and vertical axes. The set of $$x$$-values (domain) of $$f$$ becomes the set of $$y$$-values (range) of $$f^{-1}$$, and vice versa.\n- Step 3: So the algebraic rule \"domain of $$f^{-1}$$ = range of $$f$$\" is just the geometric statement that reflection swaps axes вЂ” they're the same fact, different language.\n\nTakeaway: visualise the reflection, and the domain-swap rule becomes obvious rather than memorised.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_9", "judge_pick": true}, {"question": "If $$f(x) = \\dfrac{1}{x-2}$$ with domain $$x>2$$, what conceptual reasoning gives the domain of $$f^{-1}$$? (3 steps)", "answer": "- Step 1: As $$x \\to 2^+$$, $$f(x) \\to +\\infty$$; as $$x \\to \\infty$$, $$f(x) \\to 0^+$$. So $$f$$ outputs strictly positive values: range is $$y>0$$.\n- Step 2: Therefore domain of $$f^{-1}$$ is $$x>0$$.\n- Step 3: The formula (by swap-and-solve) is $$f^{-1}(x)=\\tfrac{1}{x}+2$$, and the full answer must include the domain $$x>0$$.\n\nTakeaway: identifying the range often requires limit/behaviour reasoning, not just plugging in endpoints.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_10", "judge_pick": false}, {"question": "Why does a function need to be **one-to-one** (injective) on its domain for an inverse to exist, and how does this connect to the requirement to state a domain when defining $$f$$? (3 steps)", "answer": "- Step 1: An inverse must map each output of $$f$$ back to a *unique* input. If two different $$x$$-values give the same $$f(x)$$, the inverse can't choose between them.\n- Step 2: Many functions (like $$x^2$$) are not one-to-one on their natural domain but become one-to-one if the domain is restricted (e.g. $$x\\geq 0$$).\n- Step 3: This is precisely why specifying the domain of $$f$$ matters: the domain choice *creates* invertibility. Without it, you can't even claim $$f^{-1}$$ exists.\n\nTakeaway: the domain isn't just bookkeeping вЂ” it determines whether the inverse exists at all.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_11", "judge_pick": true}, {"question": "A student computes $$f^{-1}$$ for $$f(x) = (x-1)^2$$ on $$x \\geq 1$$ and writes $$f^{-1}(x) = 1 \\pm \\sqrt{x}$$. What two things are wrong with this answer? (3 steps)", "answer": "- Step 1: Wrong issue #1: a function must give a *single* output per input. Writing \"$$\\pm$$\" produces two outputs and isn't a function.\n+ Since $$f$$ is defined on $$x\\geq 1$$, the inverse must return values $$\\geq 1$$, so choose the \"+\" branch: $$f^{-1}(x)=1+\\sqrt{x}$$.\n- Step 2: Wrong issue #2: **no domain stated**. The range of $$f$$ is $$y\\geq 0$$ (since $$(x-1)^2 \\geq 0$$), so domain of $$f^{-1}$$ is $$x\\geq 0$$.\n- Step 3: Correct full answer: $$f^{-1}(x)=1+\\sqrt{x},\\ x\\geq 0$$.\n\nTakeaway: choose the correct branch using the *range constraint* of $$f^{-1}$$ (= domain of $$f$$), then state the domain.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_12", "judge_pick": true}, {"question": "When stating the domain of $$f^{-1}$$, why must you use the *original* given domain of $$f$$, not the maximal domain on which the formula of $$f$$ happens to work? (3 steps)", "answer": "- Step 1: The question defines $$f$$ via \"equation + domain.\" That given domain is part of the function's identity.\n- Step 2: The range of $$f$$ depends on which inputs are actually allowed. Using a larger domain than was given would compute the range of a *different* function.\n+ Example: $$f(x)=x^2$$ on $$x\\geq 0$$ has range $$y\\geq 0$$; on $$\\mathbb{R}$$ it would also have range $$y\\geq 0$$ but $$f$$ wouldn't be invertible at all.\n- Step 3: So always anchor your range calculation to the stated domain вЂ” not the \"natural\" or \"biggest possible\" one.\n\nTakeaway: respect the domain you were given; it defines the function.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_13", "judge_pick": true}, {"question": "Suppose $$f$$ has domain $$x\\in[0,4]$$ and is increasing, with $$f(0)=2$$ and $$f(4)=10$$. Without knowing the formula, what is the domain of $$f^{-1}$$? (2 steps)", "answer": "- Step 1: Since $$f$$ is increasing on $$[0,4]$$, its outputs sweep continuously from $$f(0)=2$$ to $$f(4)=10$$. Range of $$f$$ is $$[2,10]$$.\n- Step 2: Therefore domain of $$f^{-1}$$ is $$[2,10]$$ вЂ” directly read off, no formula needed.\n\nTakeaway: monotonicity + endpoint values give you the range (and hence the inverse's domain) without any algebra.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_14", "judge_pick": false}, {"question": "Contrast: what does \"domain of $$f^{-1}$$\" mean versus \"where $$f^{-1}$$'s formula is mathematically valid\"? (3 steps)", "answer": "- Step 1: \"Domain of $$f^{-1}$$\" is a *function-theoretic* concept: the set of inputs that the inverse function is officially defined for, dictated by the range of $$f$$.\n- Step 2: \"Where the formula is mathematically valid\" is a *symbolic* concept: where the expression doesn't blow up (no division by zero, no $$\\sqrt{\\text{negative}}$$, etc.).\n- Step 3: These can disagree. E.g. $$f^{-1}(x)=\\sqrt{x-1}$$ has formula validity $$x\\geq 1$$, but if range of $$f$$ is only $$x\\geq 5$$, the actual domain of $$f^{-1}$$ is $$x\\geq 5$$ вЂ” a strict subset.\n\nTakeaway: the function's domain can be smaller than where the formula technically works; never substitute one for the other.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_15", "judge_pick": true}, {"question": "True or false: \"If I correctly write the inverse formula but forget the domain, I have still defined $$f^{-1}$$.\" Justify. (2 steps)", "answer": "- Step 1: **False.** A function is defined by *both* its rule and its domain. An expression without a stated domain is just a formula, not a function.\n- Step 2: In an exam, this typically loses a mark вЂ” and Harry's correction emphasises exactly this: stating the domain is not optional, it's part of \"defining\" the function.\n\nTakeaway: no domain = no function = incomplete answer.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_16", "judge_pick": false}], "count": 17}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 3155, "out_tokens": 29974, "reasoning_chars": 51987, "cost_eur": 0.0996, "elapsed_s": 510, "content_chars": 45782}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 3155, "out_tokens": 10315, "reasoning_chars": 1769, "cost_eur": 0.0363, "elapsed_s": 102, "content_chars": 31425}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 3155, "out_tokens": 12859, "reasoning_chars": 20555, "cost_eur": 0.0445, "elapsed_s": 171, "content_chars": 21889}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 3099, "out_tokens": 4435, "reasoning_chars": 1079, "cost_eur": 0.0051, "elapsed_s": 34, "content_chars": 13593}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 3099, "out_tokens": 5500, "reasoning_chars": 1900, "cost_eur": 0.0061, "elapsed_s": 45, "content_chars": 16676}, "opus_1": {"r const SK='auto_unknown_20260623';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">вЂў ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">вЂў ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'вЂ”'}
function fC(n){return n!=null?'в‚¬'+n.toFixed(4):'вЂ”'}
function fT(s){if(!s)return'вЂ”';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">рџ“Њ My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">вњЁ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'вЂ”'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'вЂ”'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'вЂ”'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">рџ“‹</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});

}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('вЂ”')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error в†’ clipboard fallback
    return _ntbCopy();
  })
}
