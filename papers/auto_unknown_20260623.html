)$$.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_36", "judge_pick": false}, {"question": "State the double angle formula for $$\\tan(2A)$$. (2 steps)", "answer": "- Step 1: $$\\tan(2A) = \\frac{2\\tan(A)}{1 - \\tan^2(A)}$$.\n- Step 2: This comes from the addition formula: $$\\tan(A + A) = \\frac{\\tan(A) + \\tan(A)}{1 - \\tan(A)\\tan(A)} = \\frac{2\\tan(A)}{1 - \\tan^2(A)}$$. The numerator combines the two identical $$\\tan(A)$$ terms, and the denominator has 1 minus the product of the two identical terms.\n\nNote the denominator: $$1 - \\tan^2(A)$$, not $$1 + \\tan^2(A)$$. Mixing this up is a common error.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_37", "judge_pick": false}, {"question": "For each form of $$\\cos(2A)$$, describe a scenario where it's the best choice: (a) $$\\cos^2(A) - \\sin^2(A)$$, (b) $$2\\cos^2(A) - 1$$, (c) $$1 - 2\\sin^2(A)$$. (3 steps)", "answer": "- Step 1: $$\\cos(2A) = \\cos^2(A) - \\sin^2(A)$$ вЂ” best when you need both $$\\sin$$ and $$\\cos$$ in the answer, or when the problem naturally involves both functions symmetrically.\n- Step 2: $$\\cos(2A) = 2\\cos^2(A) - 1$$ вЂ” best when you want everything in terms of $$\\cos(A)$$, or when solving for $$\\cos^2(A)$$. Rearranging gives $$\\cos^2(A) = \\frac{1 + \\cos(2A)}{2}$$, the power-reduction formula.\n- Step 3: $$\\cos(2A) = 1 - 2\\sin^2(A)$$ вЂ” best when you want everything in terms of $$\\sin(A)$$, or when solving for $$\\sin^2(A)$$. Rearranging gives $$\\sin^2(A) = \\frac{1 - \\cos(2A)}{2}$$.\n\nRule of thumb: match the form to the function you want to keep. Want only $$\\cos$$? Use form 2. Want only $$\\sin$$? Use form 3.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_38", "judge_pick": false}, {"question": "Outline the strategy for expressing $$\\sin(3x)$$ in terms of $$\\sin(x)$$ only, using double angle and addition formulas. (3 steps)", "answer": "- Step 1: Write $$\\sin(3x) = \\sin(2x + x)$$ and apply the addition formula: $$\\sin(2x + x) = \\sin(2x)\\cos(x) + \\cos(2x)\\sin(x)$$.\n- Step 2: Replace $$\\sin(2x)$$ with $$2\\sin(x)\\cos(x)$$ and replace $$\\cos(2x)$$ with $$1 - 2\\sin^2(x)$$ (choosing the form that eliminates $$\\cos^2$$):\n  $$\\sin(3x) = 2\\sin(x)\\cos(x)\\cos(x) + (1 - 2\\sin^2(x))\\sin(x) = 2\\sin(x)\\cos^2(x) + \\sin(x) - 2\\sin^3(x)$$.\n- Step 3: Replace $$\\cos^2(x)$$ with $$1 - \\sin^2(x)$$:\n  $$= 2\\sin(x)(1 - \\sin^2(x)) + \\sin(x) - 2\\sin^3(x) = 2\\sin(x) - 2\\sin^3(x) + \\sin(x) - 2\\sin^3(x) = 3\\sin(x) - 4\\sin^3(x)$$.\n\nThe strategy: expand using addition formulas в†’ substitute double angle identities в†’ use Pythagorean identity to eliminate all $$\\cos$$ terms в†’ collect like terms.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_39", "judge_pick": false}, {"question": "What is $$\\int \\cos(x)\\, dx$$, and how do you verify your answer is correct? (2 steps)", "answer": "- Step 1: $$\\int \\cos(x)\\, dx = \\sin(x) + c$$, where $$c$$ is the constant of integration.\n- Step 2: Verify by differentiation: $$\\frac{d}{dx}[\\sin(x) + c] = \\cos(x)$$. Since integration is the reverse of differentiation, and the derivative of $$\\sin(x)$$ is $$\\cos(x)$$, the integral of $$\\cos(x)$$ must be $$\\sin(x) + c$$.\n\nThe constant $$c$$ appears because differentiation of any constant gives 0, so we can't determine the constant from the derivative alone.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_40", "judge_pick": false}, {"question": "What is $$\\int \\sin(x)\\, dx$$, and why is there a negative sign in the result? (2 steps)", "answer": "- Step 1: $$\\int \\sin(x)\\, dx = -\\cos(x) + c$$.\n- Step 2: The negative sign appears because $$\\frac{d}{dx}[\\cos(x)] = -\\sin(x)$$, so $$\\frac{d}{dx}[-\\cos(x)] = -(-\\sin(x)) = \\sin(x)$$. The negative sign is needed to \"cancel\" the negative that comes from differentiating $$\\cos$$.\n\nA common mistake is forgetting the negative sign. Quick check: differentiate your answer. Differentiating $$\\cos(x)$$ gives $$-\\sin(x)$$ (wrong sign), but differentiating $$-\\cos(x)$$ gives $$\\sin(x)$$ (correct).", "source": "GLM 5.1 в‘ ", "_id": "glm_1_41", "judge_pick": false}, {"question": "What is $$\\int \\sec^2(x)\\, dx$$, and what derivative rule confirms this? (2 steps)", "answer": "- Step 1: $$\\int \\sec^2(x)\\, dx = \\tan(x) + c$$.\n- Step 2: This follows because $$\\frac{d}{dx}[\\tan(x)] = \\sec^2(x)$$. Since $$\\tan(x) = \\frac{\\sin(x)}{\\cos(x)}$$, differentiating using the quotient rule gives $$\\frac{\\cos^2(x) + \\sin^2(x)}{\\cos^2(x)} = \\frac{1}{\\cos^2(x)} = \\sec^2(x)$$.\n\nMemorise this as a standard result alongside $$\\int \\cos(x)\\, dx$$ and $$\\int \\sin(x)\\, dx$$.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_42", "judge_pick": false}, {"question": "Using the reverse chain rule, find $$\\int \\cos(3x)\\, dx$$. Walk through the reasoning. (3 steps)", "answer": "- Step 1: We know $$\\int \\cos(x)\\, dx = \\sin(x) + c$$. For $$\\cos(3x)$$, the \"inner function\" is $$3x$$, whose derivative is 3. The chain rule for differentiation introduces this factor, so the reverse chain rule for integration must compensate.\n- Step 2: If we try $$\\sin(3x)$$, differentiating gives $$3\\cos(3x)$$ вЂ” there's an extra factor of 3. To cancel it, we need $$\\frac{1}{3}\\sin(3x)$$.\n- Step 3: Check: $$\\frac{d}{dx}\\left[\\frac{1}{3}\\sin(3x)\\right] = \\frac{1}{3} \\times 3\\cos(3x) = \\cos(3x)$$. вњ“ Therefore $$\\int \\cos(3x)\\, dx = \\frac{1}{3}\\sin(3x) + c$$.\n\nThe general pattern: $$\\int \\cos(ax + b)\\, dx = \\frac{1}{a}\\sin(ax + b) + c$$. You divide by the coefficient of $$x$$ inside the cosine.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_43", "judge_pick": false}, {"question": "For $$\\int \\sin(ax + b)\\, dx$$, what is the general result? Explain why both the negative sign and the $$\\frac{1}{a}$$ factor appear. (2 steps)", "answer": "- Step 1: $$\\int \\sin(ax + b)\\, dx = -\\frac{1}{a}\\cos(ax + b) + c$$.\n- Step 2: Two things happen compared to $$\\int \\sin(x)\\, dx = -\\cos(x) + c$$:\n  + The negative sign from $$\\int \\sin = -\\cos$$ is still present.\n  + The factor $$\\frac{1}{a}$$ appears to compensate for the chain rule: differentiating $$-\\frac{1}{a}\\cos(ax + b)$$ gives $$-\\frac{1}{a} \\times (-a)\\sin(ax + b) = \\sin(ax + b)$$. вњ“\n\nBoth the negative sign and the $$\\frac{1}{a}$$ factor are essential. Omitting either one is a common error.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_44", "judge_pick": false}, {"question": "$$f(x) = e^x$$ with domain $$x \\in \\mathbb{R}$$. Find $$f^{-1}(x)$$, state its domain, and explain why the domain comes from the range of $$f$$. (3 steps)", "answer": "- Step 1: Find $$f^{-1}$$: let $$y = e^x$$, swap to get $$x = e^y$$, solve: $$y = \\ln(x)$$. So $$f^{-1}(x) = \\ln(x)$$.\n- Step 2: The range of $$f(x) = e^x$$ is $$y > 0$$ (exponential outputs are always positive). Therefore the domain of $$f^{-1}$$ is $$x > 0$$.\n- Step 3: The domain $$x > 0$$ for $$\\ln(x)$$ makes perfect sense: $$\\ln(x)$$ is only defined for positive inputs, and these positive inputs are exactly the values that $$e^x$$ can produce. The domain of the inverse is not arbitrary вЂ” it's dictated by what the original function outputs.\n\nThis beautifully connects the algebraic method (finding the inverse) with the conceptual requirement (stating the domain from the range).", "source": "GLM 5.1 в‘ ", "_id": "glm_1_45", "judge_pick": false}, {"question": "A student writes: \"$$f(x) = x^2 + 1$$, so $$f^{-1}(x) = \\sqrt{x - 1}$$, domain $$x \\in \\mathbb{R}$$.\" Identify two errors in this answer. (3 steps)", "answer": "- Step 1: Error 1 вЂ” The domain $$x \\in \\mathbb{R}$$ is wrong. The expression $$\\sqrt{x - 1}$$ requires $$x - 1 \\geq 0$$, i.e., $$x \\geq 1$$. More importantly, the domain should come from the range of $$f$$: since $$f(x) = x^2 + 1 \\geq 1$$ for all $$x$$, the range is $$y \\geq 1$$, so the domain of $$f^{-1}$$ is $$x \\geq 1$$.\n- Step 2: Error 2 вЂ” The student hasn't specified the domain of $$f$$. If $$f$$ has domain $$x \\in \\mathbb{R}$$, then $$f$$ is not one-to-one ($$f(1) = f(-1) = 2$$), so $$f^{-1}$$ doesn't exist as a function. The student needs to restrict the domain of $$f$$ (e.g., $$x \\geq 0$$) for the inverse to be well-defined.\n- Step 3: The corrected answer: if $$f(x) = x^2 + 1$$ with domain $$x \\geq 0$$, then range is $$y \\geq 1$$, and $$f^{-1}(x) = \\sqrt{x - 1}$$ with domain $$x \\geq 1$$.\n\nThis tests multiple concepts simultaneously: domain of inverse, one-to-one requirement, and the connection between range of $$f$$ and domain of $$f^{-1}$$.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_46", "judge_pick": true}, {"question": "Why must a function be one-to-one (injective) for its inverse to exist as a function? What happens if it's not? (2 steps)", "answer": "- Step 1: A function maps each input to exactly one output. For $$f^{-1}$$ to also be a function, it must map each input to exactly one output. But $$f^{-1}$$ reverses $$f$$: if $$f(a) = f(b) = c$$ with $$a \\neq b$$, then $$f^{-1}(c)$$ would need to equal both $$a$$ and $$b$$, violating the function rule.\n- Step 2: If $$f$$ is not one-to-one, the \"inverse\" would assign multiple outputs to a single input, which is not a function. The horizontal line test detects this: if any horizontal line crosses the graph of $$f$$ more than once, $$f$$ is not one-to-one and has no inverse function (unless the domain is restricted).\n\nThis is why domain restrictions are so important вЂ” they can make a function one-to-one, enabling an inverse.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_47", "judge_pick": true}, {"question": "Can a constant function $$f(x) = 5$$ (for all $$x$$ in its domain) have an inverse? Why or why not? (2 steps)", "answer": "- Step 1: No, a constant function cannot have an inverse. $$f(x) = 5$$ maps every input to the same output 5, so it's maximally many-to-one.\n- Step 2: If we tried to define $$f^{-1}(5)$$, it would need to return every $$x$$ in the domain simultaneously, which violates the definition of a function (one output per input). The horizontal line test confirms this: the horizontal line $$y = 5$$ intersects the graph at every point, not just one.\n\nThis is an extreme case of the one-to-one requirement: constant functions are as far from one-to-one as possible.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_48", "judge_pick": true}, {"question": "$$f(x) = 2x + 4$$ with domain $$x > 1$$. Find: (a) the range of $$f$$, (b) $$f^{-1}(x)$$ and its domain, (c) $$ff^{-1}(10)$$. (3 steps)", "answer": "- Step 1: Range of $$f$$: when $$x > 1$$, then $$2x > 2$$, so $$2x + 4 > 6$$. The range is $$y > 6$$.\n- Step 2: $$f^{-1}$$: let $$y = 2x + 4$$, swap: $$x = 2y + 4$$, solve: $$y = \\frac{x - 4}{2}$$. Domain of $$f^{-1}$$ = range of $$f$$ = $$x > 6$$. So $$f^{-1}(x) = \\frac{x - 4}{2}$$, $$x > 6$$.\n- Step 3: $$ff^{-1}(10) = f\\!\\left(\\frac{10 - 4}{2}\\right) = f(3) = 2(3) + 4 = 10$$. This illustrates the fundamental property: $$f(f^{-1}(x)) = x$$ for all $$x$$ in the domain of $$f^{-1}$$. The inverse undoes the function.\n\nNote: we can use 10 because $$10 > 6$$ (it's in the domain of $$f^{-1}$$). If we tried $$ff^{-1}(5)$$, it would be undefined since 5 is not in the domain of $$f^{-1}$$.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_49", "judge_pick": false}, {"question": "You're given that $$f(1.2) = -0.3$$ and $$f(1.5) = 0.8$$, and $$f$$ is continuous. A student writes: \"There is a root between 1.2 and 1.5 because the signs are different.\" Improve this statement to be mathematically complete. (2 steps)", "answer": "- Step 1: The student's statement is missing the continuity condition. The sign change alone doesn't guarantee a root вЂ” the function must be continuous on the interval.\n- Step 2: The complete statement: \"Since $$f(1.2) < 0$$, $$f(1.5) > 0$$, and $$f$$ is continuous on $$[1.2, 1.5]$$, there is a root in the interval $$(1.2, 1.5)$$ by the sign change rule.\"\n\nThis mirrors Harry's correction about always stating the continuity condition. Both conditions (sign change AND continuity) must be explicitly mentioned for full marks.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_50", "judge_pick": false}, {"question": "If $$f(x) = \\ln(x)$$, what is $$f^{-1}(x)$$? State both the formula and its domain and range, explaining the reasoning. (3 steps)", "answer": "- Step 1: Let $$y = \\ln(x)$$, swap: $$x = \\ln(y)$$, solve: $$y = e^x$$. So $$f^{-1}(x) = e^x$$.\n- Step 2: Domain of $$f^{-1}$$ = Range of $$f$$ = all real numbers ($$x \\in \\mathbb{R}$$), since $$\\ln(x)$$ can produce any real value.\n- Step 3: Range of $$f^{-1}$$ = Domain of $$f$$ = $$x > 0$$ (i.e., $$y > 0$$), since $$\\ln(x)$$ only accepts positive inputs.\n\nThe inverse pair $$\\ln(x)$$ and $$e^x$$ perfectly illustrate the domain-range swap: $$\\ln$$ has domain $$x > 0$$ and range $$\\mathbb{R}$$; $$e^x$$ has domain $$\\mathbb{R}$$ and range $$y > 0$$.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_51", "judge_pick": false}, {"question": "A student solving an intersection problem writes down $$2x^2 - x - 3 = 0$$ when the correct equation is $$x^2 - x - 3 = 0$$. If they proceed to solve their incorrect equation, what will happen and how might they detect the error? (2 steps)", "answer": "- Step 1: The student will get wrong intersection points because they're solving a different equation. The roots of $$2x^2 - x - 3 = 0$$ are different from the roots of $$x^2 - x - 3 = 0$$, so all subsequent work is based on a false premise.\n- Step 2: Detection: substitute the found intersection points back into both original curve equations. If the points don't satisfy both original equations, a transcription or algebraic error has occurred. Also, comparing the rearranged equation term-by-term with the original before solving catches most copying mistakes immediately.\n\nThis is the specific error Harry caught: \"I think you've miscopied the quadratic actually.\" The lesson: verify before you solve, and check after you solve.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_52", "judge_pick": false}], "count": 53}, "glm_2": {"label": "GLM 5.1 в‘Ў", "cards": [{"question": "A function is not just a formula or rule вЂ” it requires two components to be fully defined. What are they, and why is the second one indispensable? (2 steps)", "answer": "- Step 1: A function is defined by **(1) the rule** (e.g., $$f(x) = 2x + 1$$) and **(2) the domain** (the set of allowed input values, e.g., $$x \\in \\mathbb{R}$$). Without the domain, the rule alone is ambiguous вЂ” it doesn't tell you where the function \"lives.\"\n- Step 2: The domain is indispensable because the same rule applied to different domains can produce different ranges, different behaviours, and different inverses. For example, $$f(x) = x^2$$ with domain $$x \\geq 0$$ has range $$y \\geq 0$$ and is one-to-one (invertible), but $$f(x) = x^2$$ with domain $$x \\in \\mathbb{R}$$ has range $$y \\geq 0$$ and is NOT one-to-one (not invertible without restricting the domain). The domain changes everything.\n\nThink of the domain as the \"terms and conditions\" of the function вЂ” without it, you don't know what you've agreed to.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_0", "judge_pick": true}, {"question": "When finding an inverse function algebraically, you swap $$x$$ and $$y$$ and solve for $$y$$. But there is a critical fourth step that students routinely forget. What is it, and why does omitting it make your answer incomplete? (3 steps)", "answer": "- Step 1: The four steps are: (1) Write $$y = f(x)$$, (2) Swap $$x$$ and $$y$$, (3) Solve for $$y$$ to get $$y = f^{-1}(x)$$, and **(4) State the domain of $$f^{-1}(x)$$**.\n- Step 2: The domain of $$f^{-1}$$ equals the **range of the original function $$f$$**. This is because the inverse swaps inputs and outputs вЂ” whatever was an output of $$f$$ becomes an input of $$f^{-1}$$.\n- Step 3: Without this step, you've given a rule but not a function. The examiner (and any mathematician) cannot accept a \"function\" without a domain вЂ” it's like giving directions without a starting point. In exams, you **lose marks** for this omission every time.\n\nThe rule without its domain is not a function вЂ” it's just a floating expression.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_1", "judge_pick": true}, {"question": "If $$f(x) = 2x + 3$$ with domain $$x \\geq 1$$, what is the domain of $$f^{-1}(x)$$, and how do you determine it? (3 steps)", "answer": "- Step 1: The domain of $$f^{-1}$$ equals the range of $$f$$. So first find the range of $$f(x) = 2x + 3$$ with domain $$x \\geq 1$$.\n- Step 2: When $$x = 1$$, $$f(1) = 2(1) + 3 = 5$$. As $$x$$ increases beyond 1, $$2x + 3$$ increases without bound. So the range of $$f$$ is $$y \\geq 5$$.\n- Step 3: Therefore, the domain of $$f^{-1}(x)$$ is $$x \\geq 5$$. Notice that the algebraic rule for the inverse is $$f^{-1}(x) = \\frac{x - 3}{2}$$, which on its own (with no domain) would accept any real $$x$$. But the domain restriction $$x \\geq 5$$ is essential вЂ” it ensures $$f^{-1}$$ truly undoes $$f$$ and nothing more.\n\nThe inverse formula \"wants\" to accept all reals, but the domain restriction constrains it to only the values that actually came out of $$f$$.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_2", "judge_pick": false}, {"question": "If $$f(x) = x^2 + 1$$ with domain $$x \\geq 0$$, explain what goes wrong if you find $$f^{-1}(x)$$ and state its domain as \"all real numbers.\" (3 steps)", "answer": "- Step 1: The range of $$f$$ is $$y \\geq 1$$ (since $$x^2 \\geq 0$$ for all $$x$$, so $$x^2 + 1 \\geq 1$$). Therefore the correct domain of $$f^{-1}$$ is $$x \\geq 1$$.\n- Step 2: The algebraic inverse is $$f^{-1}(x) = \\sqrt{x - 1}$$. If you incorrectly claim the domain is all reals, then someone might try to evaluate $$f^{-1}(0) = \\sqrt{0 - 1} = \\sqrt{-1}$$, which is not a real number вЂ” the function is undefined there.\n- Step 3: Even if you avoid negative inputs, consider $$f^{-1}(0.5) = \\sqrt{0.5 - 1} = \\sqrt{-0.5}$$, still undefined. The domain must be $$x \\geq 1$$ because values below 1 were never outputs of $$f$$, so the inverse has nothing to \"undo\" for those inputs. Claiming \"all reals\" makes the function ill-defined.\n\nForgetting the domain doesn't just lose marks вЂ” it produces a function that literally doesn't exist for certain inputs.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_3", "judge_pick": true}, {"question": "Why does the domain of $$f^{-1}$$ equal the range of $$f$$, and the range of $$f^{-1}$$ equal the domain of $$f$$? Explain using the input-output swap. (3 steps)", "answer": "- Step 1: The inverse function $$f^{-1}$$ reverses what $$f$$ does. If $$f$$ maps input $$a$$ to output $$b$$ (i.e., $$f(a) = b$$), then $$f^{-1}$$ maps input $$b$$ to output $$a$$ (i.e., $$f^{-1}(b) = a$$).\n- Step 2: Notice that the **output** of $$f$$ becomes the **input** of $$f^{-1}$$. So the set of all outputs of $$f$$ (the range of $$f$$) is exactly the set of all valid inputs of $$f^{-1}$$ (the domain of $$f^{-1}$$). Hence: domain of $$f^{-1}$$ = range of $$f$$.\n- Step 3: By the same logic in reverse, the outputs of $$f^{-1}$$ are the original inputs of $$f$$. So the set of all outputs of $$f^{-1}$$ (range of $$f^{-1}$$) equals the set of all valid inputs of $$f$$ (domain of $$f$$). Hence: range of $$f^{-1}$$ = domain of $$f$$.\n\nThe inverse is a perfect role-reversal: inputs and outputs trade places.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_4", "judge_pick": true}, {"question": "The graph of $$y = f^{-1}(x)$$ is the reflection of $$y = f(x)$$ in the line $$y = x$$. How does this geometric fact explain why the domain of $$f^{-1}$$ equals the range of $$f$$? (3 steps)", "answer": "- Step 1: When you reflect a graph in the line $$y = x$$, every point $$(a, b)$$ on the original graph becomes $$(b, a)$$ on the reflected graph. The $$x$$-coordinate and $$y$$-coordinate swap.\n- Step 2: The domain of a function is the set of $$x$$-values covered by its graph (the horizontal extent). The range is the set of $$y$$-values covered (the vertical extent). After reflection, the old $$y$$-values become the new $$x$$-values, and the old $$x$$-values become the new $$y$$-values.\n- Step 3: Therefore, the horizontal extent of the reflected graph (domain of $$f^{-1}$$) is exactly the vertical extent of the original graph (range of $$f$$). And the vertical extent of the reflected graph (range of $$f^{-1}$$) is exactly the horizontal extent of the original graph (domain of $$f$$).\n\nReflection in $$y = x$$ is the geometric manifestation of the input-output swap.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_5", "judge_pick": true}, {"question": "$$f(x) = e^x$$ has domain $$x \\in \\mathbb{R}$$ and range $$y > 0$$. What is $$f^{-1}(x)$$, and crucially, what is its domain? (2 steps)", "answer": "- Step 1: The inverse of $$f(x) = e^x$$ is $$f^{-1}(x) = \\ln(x)$$. You can verify: if $$y = e^x$$, swap to get $$x = e^y$$, solve to get $$y = \\ln(x)$$.\n- Step 2: The domain of $$f^{-1}$$ equals the range of $$f$$, which is $$y > 0$$. So the domain of $$f^{-1}(x) = \\ln(x)$$ is $$x > 0$$. This matches the well-known fact that you cannot take the logarithm of zero or a negative number вЂ” and now you understand **why** from the inverse-function perspective: $$e^x$$ never produces zero or negative outputs, so there's nothing for $$\\ln(x)$$ to \"undo\" at those inputs.\n\nThe domain restriction of $$\\ln(x)$$ isn't arbitrary вЂ” it's inherited from the range of $$e^x$$.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_6", "judge_pick": false}, {"question": "A student computes the inverse of $$f(x) = 3x - 2$$ with domain $$x \\geq 4$$ and writes: \"$$f^{-1}(x) = \\frac{x+2}{3}$$, domain $$x \\in \\mathbb{R}$$.\" What is wrong, and what should the domain be? (3 steps)", "answer": "- Step 1: The student correctly found the algebraic rule but assigned the wrong domain. They used the \"natural\" domain of the formula $$\\frac{x+2}{3}$$ (all reals) instead of the domain dictated by the inverse relationship.\n- Step 2: Find the range of $$f$$: when $$x = 4$$, $$f(4) = 3(4) - 2 = 10$$. As $$x$$ increases, $$3x - 2$$ increases without bound. So the range of $$f$$ is $$y \\geq 10$$.\n- Step 3: Therefore, the domain of $$f^{-1}$$ is $$x \\geq 10$$, not $$x \\in \\mathbb{R}$$. For example, $$f^{-1}(5) = \\frac{5+2}{3} = \\frac{7}{3}$$, but $$f\\!\\left(\\frac{7}{3}\\right) = 3 \\cdot \\frac{7}{3} - 2 = 5$$... wait, that seems to work? **No** вЂ” the issue is $$\\frac{7}{3} \\approx 2.33$$, which is NOT in the original domain $$x \\geq 4$$. So $$f^{-1}(5)$$ should not be defined, because $$5$$ was never an output of $$f$$ restricted to $$x \\geq 4$$.\n\nThe algebraic rule alone can't tell you the domain вЂ” you must derive it from the range of the original function.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_7", "judge_pick": false}, {"question": "What does the notation $$f^{-1}$$ actually mean, and what is a common misinterpretation of it? (2 steps)", "answer": "- Step 1: $$f^{-1}$$ denotes the **inverse function** вЂ” the function that reverses the action of $$f$$. If $$f(a) = b$$, then $$f^{-1}(b) = a$$. It is defined by the rule AND its domain (which is the range of $$f$$).\n- Step 2: A common misinterpretation is confusing $$f^{-1}(x)$$ with $$[f(x)]^{-1} = \\frac{1}{f(x)}$$. The superscript $$-1$$ on the function name means \"inverse,\" not \"reciprocal.\" For example, if $$f(x) = 2x$$, then $$f^{-1}(x) = \\frac{x}{2}$$ (the inverse function), whereas $$[f(x)]^{-1} = \\frac{1}{2x}$$ (the reciprocal). These are completely different.\n\n$$f^{-1}$$ undoes $$f$$; $$\\frac{1}{f}$$ divides by $$f$$. Never confuse them.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_8", "judge_pick": true}, {"question": "For an inverse function to exist, the original function must be one-to-one. Explain what \"one-to-one\" means, and why it's necessary for an inverse. (3 steps)", "answer": "- Step 1: A function is **one-to-one (injective)** if each output comes from exactly one input. Formally: if $$f(a) = f(b)$$, then $$a = b$$. Graphically, the function passes the **horizontal line test** вЂ” no horizontal line intersects the graph more than once.\n- Step 2: An inverse function must map each output back to the input that produced it. If $$f$$ maps two different inputs to the same output (i.e., $$f(a) = f(b)$$ with $$a \\neq b$$), then the inverse would need to map that single output to two different inputs вЂ” which violates the definition of a function (one input в†’ one output).\n- Step 3: This is why $$f(x) = x^2$$ on all of $$\\mathbb{R}$$ has no inverse (both $$x = 2$$ and $$x = -2$$ give output 4), but $$f(x) = x^2$$ restricted to $$x \\geq 0$$ does have an inverse ($$f^{-1}(x) = \\sqrt{x}$$). The domain restriction makes it one-to-one.\n\nNo one-to-one в†’ no inverse. Domain restrictions can rescue invertibility.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_9", "judge_pick": true}, {"question": "A student finds $$f^{-1}(x) = \\frac{x+1}{4}$$ and writes \"domain: $$x \\in \\mathbb{R}$$\" because the formula works for all reals. Explain conceptually why this reasoning is flawed, even if the answer happens to be correct in some cases. (3 steps)", "answer": "- Step 1: The student is using the **natural domain** of the algebraic expression (the largest set of inputs for which the formula produces real outputs). For $$\\frac{x+1}{4}$$, that's all reals. But the domain of an inverse function is not determined by the formula вЂ” it's determined by the **range of the original function**.\n- Step 2: In some cases (like $$f(x) = 4x - 1$$ with domain $$x \\in \\mathbb{R}$$ and range $$y \\in \\mathbb{R}$$), the range of $$f$$ happens to be all reals, so the domain of $$f^{-1}$$ IS all reals вЂ” and the student's answer is accidentally correct. But this is luck, not reasoning.\n- Step 3: If the original function had a restricted domain (e.g., $$f(x) = 4x - 1$$ with domain $$x \\geq 0$$, range $$y \\geq -1$$), then the domain of $$f^{-1}$$ should be $$x \\geq -1$$, not all reals. The student's method would give the wrong answer. Always derive the domain from the range of $$f$$, never from the algebraic formula.\n\nThe formula's natural domain is a trap вЂ” the real domain comes from the inverse relationship.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_10", "judge_pick": true}, {"question": "Given $$f(x) = \\ln(x)$$ with domain $$x > 0$$, find $$f^{-1}(x)$$ and state its domain. Walk through the full algebraic method. (4 steps)", "answer": "- Step 1: Write $$y = f(x)$$: $$y = \\ln(x)$$.\n- Step 2: Swap $$x$$ and $$y$$: $$x = \\ln(y)$$.\n- Step 3: Solve for $$y$$: rewrite in exponential form, $$y = e^x$$. So $$f^{-1}(x) = e^x$$.\n- Step 4: State the domain of $$f^{-1}$$: this equals the range of $$f$$. Since $$f(x) = \\ln(x)$$ has range $$y \\in \\mathbb{R}$$ (the logarithm can produce any real number), the domain of $$f^{-1}(x) = e^x$$ is $$x \\in \\mathbb{R}$$. Note: the range of $$f^{-1}$$ is $$y > 0$$, which matches the domain of the original $$f$$.\n\nFull answer: $$f^{-1}(x) = e^x$$, domain $$x \\in \\mathbb{R}$$.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_11", "judge_pick": false}, {"question": "A function $$f$$ has domain $$-2 \\leq x \\leq 5$$ and range $$3 \\leq y \\leq 9$$. Without knowing the rule of $$f$$, what can you state about the domain and range of $$f^{-1}$$? (2 steps)", "answer": "- Step 1: By the inverse relationship, the domain of $$f^{-1}$$ equals the range of $$f$$, and the range of $$f^{-1}$$ equals the domain of $$f$$. No algebraic rule is needed вЂ” this is purely a set-theoretic consequence of the input-output swap.\n- Step 2: Therefore, domain of $$f^{-1}$$ is $$3 \\leq x \\leq 9$$, and range of $$f^{-1}$$ is $$-2 \\leq y \\leq 5$$.\n\nYou can determine the domain and range of the inverse from the original function's domain and range alone вЂ” even with zero knowledge of the formula.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_12", "judge_pick": false}, {"question": "Suppose $$f(x) = \\frac{1}{x-1}$$ with domain $$x > 1$$. Find the range of $$f$$, and hence state the domain of $$f^{-1}$$. (3 steps)", "answer": "- Step 1: For $$x > 1$$, the denominator $$x - 1 > 0$$, so $$f(x) = \\frac{1}{x-1}$$ is positive. As $$x$$ approaches 1 from above, $$x - 1 \\to 0^+$$, so $$f(x) \\to +\\infty$$. As $$x \\to \\infty$$, $$x - 1 \\to \\infty$$, so $$f(x) \\to 0^+$$.\n- Step 2: The function is continuous and strictly decreasing on $$x > 1$$, taking every value from just above 0 to $$+\\infty$$. So the range of $$f$$ is $$y > 0$$.\n- Step 3: Therefore, the domain of $$f^{-1}$$ is $$x > 0$$. (For verification: the algebraic inverse is $$f^{-1}(x) = 1 + \\frac{1}{x}$$, which is undefined at $$x = 0$$ and negative for $$x < 0$$ вЂ” consistent with domain $$x > 0$$.)\n\nThe range analysis (limits at boundaries + monotonicity) is the reliable method to find the inverse's domain.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_13", "judge_pick": false}, {"question": "Why can't you simply look at the formula for $$f^{-1}(x)$$ and read off its domain? Give a concrete counterexample. (2 steps)", "answer": "- Step 1: The formula for $$f^{-1}$$ may be defined for a wider set of inputs than the actual inverse function allows. The formula's \"natural domain\" includes all inputs that don't cause mathematical errors (division by zero, square roots of negatives, etc.), but the inverse function's domain is restricted to only those inputs that were actually outputs of $$f$$.\n- Step 2: Counterexample: $$f(x) = \\sqrt{x}$$ with domain $$x \\geq 0$$ has range $$y \\geq 0$$. The inverse is $$f^{-1}(x) = x^2$$. The formula $$x^2$$ is defined for all real $$x$$, but the domain of $$f^{-1}$$ is only $$x \\geq 0$$ (the range of $$f$$). If you allowed $$x = -3$$, then $$f^{-1}(-3) = 9$$, but $$f(9) = 3 \\neq -3$$ вЂ” the inverse doesn't undo $$f$$ for inputs outside the correct domain.\n\nThe formula lies; the range of $$f$$ tells the truth.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_14", "judge_pick": true}, {"question": "A student writes: \"Since $$f^{-1}(x) = \\sqrt{x-2}$$, the domain is $$x \\geq 2$$.\" Is this reasoning correct or coincidental, and how can you tell? (3 steps)", "answer": "- Step 1: The student determined the domain by finding where the expression $$\\sqrt{x-2}$$ is defined (the radicand must be non-negative: $$x - 2 \\geq 0$$, so $$x \\geq 2$$). This gives the **natural domain** of the formula.\n- Step 2: This reasoning is **coincidental** in the sense that it happens to give the correct answer, but for the wrong reason. The correct method is: the domain of $$f^{-1}$$ equals the range of $$f$$. You must verify that the range of $$f$$ is indeed $$y \\geq 2$$.\n- Step 3: In this case, the original function was likely $$f(x) = x^2 + 2$$ with domain $$x \\geq 0$$, whose range IS $$y \\geq 2$$. So the answers agree. But if the original function had a more restricted domain (e.g., $$x \\geq 3$$, giving range $$y \\geq 11$$), the formula method would give $$x \\geq 2$$ (wrong) while the correct domain would be $$x \\geq 11$$.\n\nAlways derive the domain of the inverse from the range of the original вЂ” the formula's natural domain is unreliable.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_15", "judge_pick": true}, {"question": "When writing a full exam-style answer for an inverse function, what are the essential components you must include to earn full marks? (2 steps)", "answer": "- Step 1: You must state **two things**: (1) the rule for $$f^{-1}(x)$$, and (2) the domain of $$f^{-1}(x)$$. For example: \"$$f^{-1}(x) = \\frac{x+5}{3}$$, $$x \\geq 2$$\" вЂ” not just the formula alone.\n- Step 2: The domain must be derived from the range of the original function $$f$$, not from inspecting the inverse formula. Show your working for the range of $$f$$ (even briefly), as examiners look for evidence that you used the correct method, not just the formula's natural domain.\n\nFormula + domain = function. Formula alone = incomplete. Every time.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_16", "judge_pick": false}, {"question": "$$f(x) = x^2 - 3$$ with domain $$x \\geq 0$$. Find $$f^{-1}(x)$$ including its domain. (4 steps)", "answer": "- Step 1: Write $$y = x^2 - 3$$. Swap: $$x = y^2 - 3$$. Solve: $$y^2 = x + 3$$, so $$y = \\sqrt{x + 3}$$ (we take the positive root only, because the original domain $$x \\geq 0$$ means we only want non-negative outputs of the inverse, corresponding to non-negative inputs of $$f$$). So $$f^{-1}(x) = \\sqrt{x+3}$$.\n- Step 2: Find the range of $$f$$: when $$x = 0$$, $$f(0) = 0 - 3 = -3$$. As $$x \\to \\infty$$, $$f(x) \\to \\infty$$. The function is continuous and strictly increasing on $$x \\geq 0$$, so the range is $$y \\geq -3$$.\n- Step 3: Therefore, the domain of $$f^{-1}$$ is $$x \\geq -3$$.\n- Step 4: Verify: the natural domain of $$\\sqrt{x+3}$$ is $$x \\geq -3$$ вЂ” in this case it agrees, but the correct reasoning path is via the range of $$f$$.\n\nFull answer: $$f^{-1}(x) = \\sqrt{x+3}$$, domain $$x \\geq -3$$.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_17", "judge_pick": false}, {"question": "A common exam mistake is to find the inverse correctly but forget to state the domain. If the question is worth 4 marks, roughly how many marks would you expect to lose, and why is the penalty so severe? (2 steps)", "answer": "- Step 1: You would typically lose 1вЂ“2 marks out of 4 (often 1 mark for the domain specifically, sometimes an additional mark if the domain was needed for a subsequent part). The penalty is significant because the question asks you to \"find the inverse function,\" and a function without a domain is not a function.\n- Step 2: The penalty is severe because the domain is not a minor detail вЂ” it fundamentally determines what the function IS. Without it, you've given an expression, not a function. In mathematical communication, stating a function without its domain is like writing a cheque without the amount вЂ” the form is there but the content is incomplete.\n\nOne mark may not sound like much, but repeated across a paper, it compounds. Build the habit: formula + domain, always.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_18", "judge_pick": false}, {"question": "If $$f(x) = 5 - 2x$$ with domain $$x \\leq 3$$, find the range of $$f$$ and hence the domain of $$f^{-1}$$. (3 steps)", "answer": "- Step 1: The function $$f(x) = 5 - 2x$$ is linear and decreasing (coefficient of $$x$$ is $$-2 < 0$$). So the maximum value occurs at the leftmost point of the domain, and the minimum at the rightmost... but wait вЂ” the domain is $$x \\leq 3$$, which extends to $$-\\infty$$ on the left.\n- Step 2: At $$x = 3$$: $$f(3) = 5 - 2(3) = -1$$. As $$x \\to -\\infty$$, $$f(x) = 5 - 2x \\to +\\infty$$. Since the function is continuous and strictly decreasing on $$x \\leq 3$$, the range is $$y \\geq -1$$.\n- Step 3: Therefore, the domain of $$f^{-1}$$ is $$x \\geq -1$$. The algebraic inverse is $$f^{-1}(x) = \\frac{5-x}{2}$$, whose natural domain is all reals вЂ” but the correct domain is $$x \\geq -1$$.\n\nFor unbounded domains, check the behaviour as $$x \\to \\pm\\infty$$ to determine the range.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_19", "judge_pick": false}, {"question": "What is the relationship between the graphs of $$y = f(x)$$, $$y = f^{-1}(x)$$, and $$y = x$$, and how does this help you visually verify the domain of the inverse? (3 steps)", "answer": "- Step 1: The graph of $$y = f^{-1}(x)$$ is the **reflection** of $$y = f(x)$$ in the line $$y = x$$. This is because the inverse swaps coordinates: point $$(a, b)$$ on $$f$$ becomes $$(b, a)$$ on $$f^{-1}$$.\n- Step 2: The line $$y = x$$ is the **mirror line** for this reflection. Points on $$y = x$$ (where $$f(a) = a$$) are fixed points вЂ” they lie on both graphs.\n- Step 3: To visually verify the domain of $$f^{-1}$$: look at the **vertical extent** (range) of $$f$$'s graph вЂ” that becomes the **horizontal extent** (domain) of $$f^{-1}$$'s graph after reflection. If $$f$$ has range $$y \\geq 5$$, then after reflection, $$f^{-1}$$ starts at $$x = 5$$ and extends rightward. Sketch both graphs and check symmetry about $$y = x$$.\n\nThe graphical picture is a powerful sanity check: if the reflected graph doesn't match your algebraic inverse, something is wrong.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_20", "judge_pick": true}, {"question": "A student argues: \"I don't need to state the domain of the inverse because the formula makes it obvious where it's defined.\" Give two counterexamples showing this argument fails. (3 steps)", "answer": "- Step 1: The argument confuses the **natural domain of the expression** with the **domain of the inverse function**. These can differ.\n- Step 2: **Counterexample 1**: $$f(x) = x^2$$ with domain $$x \\geq 0$$. The inverse is $$f^{-1}(x) = \\sqrt{x}$$. The formula's natural domain is $$x \\geq 0$$, which matches the range of $$f$$ ($$y \\geq 0$$). Here it works вЂ” but only by coincidence, not by logic.\n- Step 3: **Counterexample 2**: $$f(x) = 2x + 1$$ with domain $$x \\geq 0$$. The range is $$y \\geq 1$$. The inverse formula is $$f^{-1}(x) = \\frac{x-1}{2}$$, whose natural domain is all reals. But the correct domain of $$f^{-1}$$ is $$x \\geq 1$$. The formula gives no hint of this restriction вЂ” you'd be wrong if you relied on it.\n\nThe formula's natural domain is a lower bound on the actual domain, but never a substitute for the range-of-$$f$$ method.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_21", "judge_pick": false}, {"question": "When finding the inverse of $$f(x) = x^2$$ with domain $$x \\leq 0$$ (instead of the usual $$x \\geq 0$$), what changes about $$f^{-1}(x)$$ and its domain? (3 steps)", "answer": "- Step 1: The range of $$f(x) = x^2$$ with domain $$x \\leq 0$$ is still $$y \\geq 0$$ (squaring a non-positive number still gives a non-negative result). So the domain of $$f^{-1}$$ is still $$x \\geq 0$$.\n- Step 2: However, the inverse rule changes. When we solve $$x = y^2$$ for $$y$$, we get $$y = \\pm\\sqrt{x}$$. Since the original domain was $$x \\leq 0$$ (non-positive inputs), the range of $$f^{-1}$$ must be $$y \\leq 0$$ (non-positive outputs). So we choose the **negative** root: $$f^{-1}(x) = -\\sqrt{x}$$.\n- Step 3: Full answer: $$f^{-1}(x) = -\\sqrt{x}$$, domain $$x \\geq 0$$. Notice that the domain of $$f^{-1}$$ is the same as the $$x \\geq 0$$ case, but the rule is different (negative root vs. positive root). The domain restriction of the original function determines which branch of the square root you take.\n\nSame range в†’ same domain for the inverse, but different original domain в†’ different inverse rule.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_22", "judge_pick": false}, {"question": "In the step \"swap $$x$$ and $$y$$\" when finding the inverse, what is actually happening conceptually? Why does this work? (2 steps)", "answer": "- Step 1: Swapping $$x$$ and $$y$$ is the algebraic version of reflecting the graph in $$y = x$$. The original equation $$y = f(x)$$ describes the set of points $$(x, f(x))$$. After swapping, $$x = f(y)$$ describes the set of points $$(f(y), y)$$ вЂ” which is exactly the reflected graph.\n- Step 2: Conceptually, swapping $$x$$ and $$y$$ interchanges the roles of input and output. The original function takes input $$x$$ and gives output $$y$$; the inverse takes the old output (now called $$x$$) and returns the old input (now called $$y$$). This is why solving for $$y$$ after the swap yields the inverse rule.\n\nThe swap is not a trick вЂ” it's the definition of the inverse encoded in algebra.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_23", "judge_pick": true}, {"question": "Quick exercise: $$f(x) = 3x + 1$$ with domain $$x \\geq 2$$. Without doing any algebra, what is the domain of $$f^{-1}$$? (2 steps)", "answer": "- Step 1: The domain of $$f^{-1}$$ equals the range of $$f$$. Find the minimum value of $$f$$: at $$x = 2$$, $$f(2) = 3(2) + 1 = 7$$. Since $$f$$ is increasing, the range is $$y \\geq 7$$.\n- Step 2: Therefore, the domain of $$f^{-1}$$ is $$x \\geq 7$$.\n\nNo algebra needed for the domain вЂ” just find the range of $$f$$.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_24", "judge_pick": false}, {"question": "Composite functions: if $$f(x) = x + 3$$ with domain $$x \\geq 0$$, and $$g(x) = x^2$$ with domain $$x \\in \\mathbb{R}$$, explain why finding the domain of $$fg(x)$$ requires care. (3 steps)", "answer": "- Step 1: $$fg(x) = f(g(x)) = g(x) + 3 = x^2 + 3$$. But this doesn't mean the domain is all reals. The domain of a composite must satisfy two conditions: (1) $$x$$ is in the domain of the inner function $$g$$, AND (2) $$g(x)$$ is in the domain of the outer function $$f$$.\n- Step 2: Condition 1: $$x \\in \\mathbb{R}$$ (domain of $$g$$). Condition 2: $$g(x) = x^2$$ must be in the domain of $$f$$, which is $$x \\geq 0$$. So we need $$x^2 \\geq 0$$, which is always true.\n- Step 3: Therefore, the domain of $$fg$$ is $$x \\in \\mathbb{R}$$. In this case it works out to all reals, but the reasoning matters. If $$f$$ had domain $$x \\geq 5$$, then we'd need $$x^2 \\geq 5$$, giving $$|x| \\geq \\sqrt{5}$$ вЂ” a much more restricted domain.\n\nComposite function domains require checking both layers вЂ” the inner function's domain and the outer function's domain applied to the inner function's output.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_25", "judge_pick": false}, {"question": "Why is it that $$fg(x) \\neq gf(x)$$ in general? Give a concrete example with simple numbers. (2 steps)", "answer": "- Step 1: $$fg(x) = f(g(x))$$ means \"apply $$g$$ first, then $$f$$.\" $$gf(x) = g(f(x))$$ means \"apply $$f$$ first, then $$g$$.\" The order of operations is reversed, and most functions don't commute under composition.\n- Step 2: Example: let $$f(x) = x + 10$$ and $$g(x) = 2x$$. Then $$fg(3) = f(g(3)) = f(6) = 16$$. But $$gf(3) = g(f(3)) = g(13) = 26$$. Different results. In general, \"add 10 then double\" is not the same as \"double then add 10.\"\n\nFunction composition is not commutative вЂ” order matters, just like putting on socks then shoes в‰  shoes then socks.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_26", "judge_pick": true}, {"question": "A student writes the inverse of $$f(x) = 2x - 4$$ (domain $$x \\geq 0$$) as \"$$f^{-1}(x) = \\frac{x+4}{2}$$\" with no domain stated. What is the complete, correct answer? (3 steps)", "answer": "- Step 1: The algebraic inverse is correct: $$y = 2x - 4 \\Rightarrow x = 2y - 4 \\Rightarrow 2y = x + 4 \\Rightarrow y = \\frac{x+4}{2}$$.\n- Step 2: Find the range of $$f$$: at $$x = 0$$, $$f(0) = -4$$. Since $$f$$ is increasing (coefficient 2 > 0) and the domain extends to infinity, the range is $$y \\geq -4$$.\n- Step 3: The complete answer is: $$f^{-1}(x) = \\frac{x+4}{2}$$, domain $$x \\geq -4$$.\n\nThe formula was right, but without the domain, it's an incomplete function definition.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_27", "judge_pick": false}, {"question": "Suppose you're told that $$f^{-1}(x) = \\frac{x-3}{5}$$ with domain $$x \\geq 7$$. What was the range of the original function $$f$$? (2 steps)", "answer": "- Step 1: The domain of $$f^{-1}$$ equals the range of $$f$$. The given domain of $$f^{-1}$$ is $$x \\geq 7$$.\n- Step 2: Therefore, the range of $$f$$ was $$y \\geq 7$$. (You can also deduce the domain of $$f$$: the range of $$f^{-1}$$ equals the domain of $$f$$. Since $$f^{-1}(x) = \\frac{x-3}{5}$$ with domain $$x \\geq 7$$, the minimum output is $$f^{-1}(7) = \\frac{7-3}{5} = \\frac{4}{5}$$, and as $$x \\to \\infty$$, $$f^{-1}(x) \\to \\infty$$. So range of $$f^{-1}$$ is $$y \\geq \\frac{4}{5}$$, meaning domain of $$f$$ was $$x \\geq \\frac{4}{5}$$.)\n\nThe inverse relationship works both ways вЂ” you can reconstruct $$f$$'s domain and range from $$f^{-1}$$'s domain and range.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_28", "judge_pick": false}, {"question": "Why must you state the domain of the inverse even when the original function has domain \"all real numbers\"? Is there ever a case where this is unnecessary? (2 steps)", "answer": "- Step 1: Even when the original domain is $$\\mathbb{R}$$, the range might not be. For example, $$f(x) = x^2$$ with domain $$\\mathbb{R}$$ has range $$y \\geq 0$$, so $$f^{-1}$$ (if it existed on a restricted domain) would need domain $$x \\geq 0$$. For a function like $$f(x) = 3x + 1$$ with domain $$\\mathbb{R}$$ and range $$\\mathbb{R}$$, the inverse's domain is also $$\\mathbb{R}$$ вЂ” but you still state it.\n- Step 2: There is **never** a case where stating the domain is unnecessary. Even if the domain is \"all reals,\" stating \"$$x \\in \\mathbb{R}$$\" confirms you've considered the question and derived the answer correctly. Omitting it could mean you forgot, or it could mean you assumed вЂ” the examiner can't tell the difference, and neither can a reader.\n\nStating the domain is like signing your name on a document вЂ” it proves you completed the job.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_29", "judge_pick": false}], "count": 30}, "glm_3": {"label": "GLM 5.1 в‘ў", "cards": [{"question": "When defining a function, what two essential components must you always state? (2 steps)", "answer": "- Step 1: A function is defined by two things: the **rule** (the equation mapping inputs to outputs) and the **domain** (the set of permissible input values). Without both, the definition is incomplete.\n- Step 2: The domain matters because the same equation behaves differently on different domains. For example, $$f(x) = x^2$$ on domain $$x \\in \\mathbb{R}$$ is **not** one-to-one (so no inverse function exists), but $$f(x) = x^2$$ on domain $$x \\geq 0$$ **is** one-to-one (so an inverse does exist). The domain determines fundamental properties like invertibility.\n\nA function without a stated domain is like a machine with no label on its input slot вЂ” you don't know what it can accept.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_0", "judge_pick": false}, {"question": "When you define an inverse function $$f^{-1}(x)$$, its domain must equal a specific property of the original function $$f$$. What property?", "answer": "The **domain** of $$f^{-1}$$ equals the **range** of $$f$$.\n\nThis is because $$f^{-1}$$ reverses the mapping of $$f$$: it takes the *outputs* of $$f$$ as its *inputs*. The set of all outputs of $$f$$ is exactly the range of $$f$$, so that becomes the set of valid inputs (domain) for $$f^{-1}$$.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_1", "judge_pick": true}, {"question": "Similarly, the range of $$f^{-1}$$ equals what property of the original function $$f$$?", "answer": "The **range** of $$f^{-1}$$ equals the **domain** of $$f$$.\n\nSince $$f^{-1}$$ reverses $$f$$, the outputs of $$f^{-1}$$ are the original inputs to $$f$$. The set of all original inputs to $$f$$ is its domain, so that set becomes the range (all possible outputs) of $$f^{-1}$$.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_2", "judge_pick": true}, {"question": "Why does the domain of $$f^{-1}$$ equal the *range* of $$f$$, rather than the domain of $$f$$? Explain the conceptual reasoning. (3 steps)", "answer": "- Step 1: The inverse function $$f^{-1}$$ reverses the mapping of $$f$$. If $$f$$ maps input $$a$$ to output $$b$$ (so $$f(a) = b$$), then $$f^{-1}$$ maps input $$b$$ back to output $$a$$ (so $$f^{-1}(b) = a$$).\n- Step 2: This means $$f^{-1}$$ can only accept as inputs the values that $$f$$ actually produces as outputs вЂ” those are exactly the elements of the **range** of $$f$$.\n- Step 3: The **domain** of $$f$$ is the set of inputs to $$f$$, which become the *outputs* of $$f^{-1}$$ (i.e., the range of $$f^{-1}$$), not the inputs to $$f^{-1}$$. So domain of $$f^{-1}$$ в‰  domain of $$f$$ in general.\n\nThe input-output roles are completely swapped under inversion.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_3", "judge_pick": true}, {"question": "Why must a function be one-to-one for its inverse to also qualify as a function? What goes wrong if it isn't? (3 steps)", "answer": "- Step 1: A function maps each input to exactly one output. For an inverse to be a valid function, it must also map each input to exactly one output.\n- Step 2: If $$f$$ is not one-to-one, then there exist two distinct inputs $$a \\neq b$$ with $$f(a) = f(b) = c$$. The inverse would need to map $$c$$ back to both $$a$$ and $$b$$, producing two outputs for one input.\n- Step 3: This violates the definition of a function (one input в†’ one output). So $$f^{-1}$$ would not be a function unless we restrict $$f$$'s domain to make it one-to-one.\n+ Example: $$f(x) = x^2$$ on domain $$\\mathbb{R}$$ fails because $$f(2) = f(-2) = 4$$. The \"inverse\" would need to map 4 to both 2 and в€’2 вЂ” not a function.\n+ Fix: Restrict domain to $$x \\geq 0$$, making $$f$$ one-to-one. Then $$f^{-1}(x) = \\sqrt{x}$$ is a valid function.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_4", "judge_pick": false}, {"question": "A student computes $$f^{-1}(x) = \\frac{x - 3}{2}$$ and writes only this equation as their full answer. What critical piece have they omitted, and why does it matter? (2 steps)", "answer": "- Step 1: They have omitted the **domain** of $$f^{-1}$$. A function is not fully defined without its domain вЂ” the equation alone is incomplete.\n- Step 2: Without the domain, we don't know what input values $$f^{-1}$$ accepts. The domain of $$f^{-1}$$ must equal the range of the original $$f$$. For instance, if $$f$$ had range $$y > 0$$, then $$f^{-1}$$ has domain $$x > 0$$ вЂ” which fundamentally restricts what inputs are valid, even though the algebraic expression $$\\frac{x-3}{2}$$ could technically be evaluated for any $$x$$.\n\nIn exams, omitting the domain loses marks because it shows you haven't understood the full relationship between $$f$$ and $$f^{-1}$$.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_5", "judge_pick": false}, {"question": "What is the step-by-step algebraic process for finding an inverse function $$f^{-1}(x)$$? (4 steps)", "answer": "- Step 1: **Write** $$y = f(x)$$. Replace the function notation with a variable to make the swap easier.\n- Step 2: **Swap** $$x$$ and $$y$$: rewrite as $$x = f(y)$$. This reverses the roles of input and output, which is exactly what an inverse does conceptually.\n- Step 3: **Solve** for $$y$$ in terms of $$x$$. Rearrange $$x = f(y)$$ to express $$y$$ alone. This gives the rule for $$f^{-1}(x)$$.\n- Step 4: **State the domain** of $$f^{-1}$$, which equals the range of the original function $$f$$. Without this, the inverse function definition is incomplete.\n\nThe swap step is the heart of the method вЂ” it literally enacts the \"reversal\" that an inverse represents.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_6", "judge_pick": false}, {"question": "The notation $$f^{-1}(x)$$ uses a superscript $$-1$$. Does this mean $$\\frac{1}{f(x)}$$? Why or why not? (2 steps)", "answer": "- Step 1: No. The $$-1$$ in $$f^{-1}$$ denotes the **inverse function**, not a reciprocal. $$f^{-1}(x)$$ means \"the input that $$f$$ maps to $$x$$,\" i.e., the function that reverses $$f$$.\n- Step 2: This is about function composition: $$f^{-1} \\circ f = \\text{identity}$$, meaning $$f^{-1}(f(x)) = x$$. This is entirely different from the algebraic operation $$\\frac{1}{f(x)}$$, which would be written as $$[f(x)]^{-1}$$.\n+ Example: For $$f(x) = 2x$$, $$f^{-1}(x) = \\frac{x}{2}$$ (the inverse), whereas $$[f(x)]^{-1} = \\frac{1}{2x}$$ (the reciprocal). These are completely different functions.\n+ Confusion source: For numbers, $$x^{-1} = \\frac{1}{x}$$, so students naturally extend this to functions. But $$f^{-1}$$ is a separate, established convention meaning \"inverse function,\" not \"1 over f.\"", "source": "GLM 5.1 в‘ў", "_id": "glm_3_7", "judge_pick": true}, {"question": "How is the graph of $$y = f^{-1}(x)$$ geometrically related to the graph of $$y = f(x)$$?", "answer": "The graph of $$y = f^{-1}(x)$$ is the **reflection** of $$y = f(x)$$ in the line $$y = x$$.\n\nReflecting in $$y = x$$ swaps every point $$(a, b)$$ to $$(b, a)$$, which is exactly what an inverse does: it swaps inputs and outputs. If $$f$$ maps $$a \\to b$$, then $$f^{-1}$$ maps $$b \\to a$$, so the point $$(a, b)$$ on $$f$$'s graph becomes $$(b, a)$$ on $$f^{-1}$$'s graph.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_8", "judge_pick": false}, {"question": "When you reflect a graph in the line $$y = x$$, the domain and range swap. Explain this visually вЂ” why does the reflection cause this swap? (2 steps)", "answer": "- Step 1: Reflection in $$y = x$$ swaps the coordinates of every point: $$(a, b)$$ becomes $$(b, a)$$. This means the $$x$$-values of the new graph are the $$y$$-values of the original, and the $$y$$-values of the new graph are the $$x$$-values of the original.\n- Step 2: The set of all $$x$$-values of a graph is its **domain**, and the set of all $$y$$-values is its **range**. Since the reflection swaps $$x$$-values with $$y$$-values, the domain of the reflected graph ($$f^{-1}$$) equals the range of the original ($$f$$), and the range of the reflected graph ($$f^{-1}$$) equals the domain of the original ($$f$$).\n\nThe coordinate swap under reflection is the visual counterpart of the algebraic swap (Step 2 of finding $$f^{-1}$$).", "source": "GLM 5.1 в‘ў", "_id": "glm_3_9", "judge_pick": true}, {"question": "A student is asked to sketch $$y = \\ln(x)$$ and instead draws $$y = e^x$$. Why might this confusion occur, and how do you distinguish the two graphs using their key features? (3 steps)", "answer": "- Step 1: The confusion occurs because $$\\ln(x)$$ and $$e^x$$ are **inverse functions** of each other. Their graphs are reflections in $$y = x$$, so they share a similar \"curving\" shape but in opposite orientations.\n- Step 2: Key distinguishing features: $$y = e^x$$ passes through $$(0, 1)$$, increases rapidly, and has the $$x$$-axis ($$y = 0$$) as a **horizontal** asymptote. Domain: all real $$x$$; range: $$y > 0$$. $$y = \\ln(x)$$ passes through $$(1, 0)$$, increases slowly, and has the $$y$$-axis ($$x = 0$$) as a **vertical** asymptote. Domain: $$x > 0$$; range: all real $$y$$.\n- Step 3: Quick visual check: which axis has the asymptote? If **horizontal** (the graph flattens toward an axis), it's $$e^x$$. If **vertical** (the graph shoots up/down near a line), it's $$\\ln(x)$$.\n\nThe inverse relationship means their domains and ranges are swapped вЂ” if you remember that $$e^x$$ has range $$y > 0$$, then $$\\ln(x)$$ must have domain $$x > 0$$.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_10", "judge_pick": true}, {"question": "Consider $$f(x) = 5$$, a constant function with domain $$x \\in \\mathbb{R}$. Can this function have an inverse function? Explain why or why not. (2 steps)", "answer": "- Step 1: No. $$f(x) = 5$$ maps every input to the same output: $$f(0) = 5$$, $$f(1) = 5$$, $$f(100) = 5$$, etc. This is **not one-to-one**.\n- Step 2: The \"inverse\" would need to map the single input $$5$$ to every real number simultaneously (since all real numbers map to $$5$$ under $$f$$). One input producing multiple outputs violates the definition of a function. Therefore, no inverse function exists.\n+ The range of $$f$$ is just $$\\{5\\}$$, a single value. Even if we tried to define $$f^{-1}$$ on domain $$\\{5\\}$$, it would need to output every real number, which is impossible for a function.\n\nA constant function is the extreme counterexample: maximum non-one-to-one behavior.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_11", "judge_pick": true}, {"question": "$$f(x) = x^2$$ is given with no domain specified. A student computes $$f^{-1}(x) = \\sqrt{x}$$ and states domain $$x \\geq 0$$. Is this fully correct? What subtle issue exists? (3 steps)", "answer": "- Step 1: The answer $$f^{-1}(x) = \\sqrt{x}$$ with domain $$x \\geq 0$$ is **only correct** if the original function was defined on the restricted domain $$x \\geq 0$$ (making it one-to-one).\n- Step 2: If no domain was stated for $$f$$, the default maximal domain for $$x^2$$ is all of $$\\mathbb{R}$$, where $$f$$ is **not one-to-one** (since $$f(-a) = f(a)$$). On $$\\mathbb{R}$$, no inverse function exists at all.\n- Step 3: The student's answer implicitly assumes $$f$$ was restricted to $$x \\geq 0$$. The range of $$f$$ on domain $$x \\geq 0$$ is $$y \\geq 0$$, which correctly gives $$f^{-1}$$ domain $$x \\geq 0$$. But the student should **first** state or verify that $$f$$'s domain makes it one-to-one before finding the inverse.\n+ You cannot find an inverse for $$f(x) = x^2$$ without first establishing (or restricting) $$f$$'s domain to ensure one-to-one behaviour.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_12", "judge_pick": false}, {"question": "A function $$f$$ maps the set $$\\{1, 2, 3\\}$$ to $$\\{4, 5, 6\\}$$ respectively (so $$f(1)=4$$, $$f(2)=5$$, $$f(3)=6$$). What are the domain and range of $$f^{-1}$$?", "answer": "**Domain** of $$f^{-1}$$: $$\\{4, 5, 6\\}$$ (the range of $$f$$).\n**Range** of $$f^{-1}$$: $$\\{1, 2, 3\\}$$ (the domain of $$f$$).\n\nThe inverse reverses the mapping: $$f^{-1}(4) = 1$$, $$f^{-1}(5) = 2$$, $$f^{-1}(6) = 3$$. So $$f^{-1}$$'s inputs (domain) are $$f$$'s outputs (range), and $$f^{-1}$$'s outputs (range) are $$f$$'s inputs (domain). This tiny example makes the swap concrete: the two sets simply exchange roles.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_13", "judge_pick": false}, {"question": "Let $$f(x) = 2x + 1$$ with domain $$x \\in \\mathbb{R}$$ and range $$y \\in \\mathbb{R}$$. Find the inverse function $$f^{-1}(x)$$, stating both the rule and the domain. (4 steps)", "answer": "- Step 1: Write $$y = 2x + 1$$.\n- Step 2: Swap $$x$$ and $$y$$: $$x = 2y + 1$$.\n- Step 3: Solve for $$y$$: $$x - 1 = 2y$$, so $$y = \\frac{x - 1}{2}$$. This gives $$f^{-1}(x) = \\frac{x - 1}{2}$$.\n- Step 4: State the domain of $$f^{-1}$$. The range of $$f(x) = 2x + 1$$ on domain $$\\mathbb{R}$$ is all real numbers (a linear function with non-zero slope covers all $$y$$). So domain of $$f^{-1}$$ is $$x \\in \\mathbb{R}$$.\n+ Verification: $$f^{-1}(f(x)) = \\frac{2x + 1 - 1}{2} = \\frac{2x}{2} = x$$ вњ“. And $$f(f^{-1}(x)) = 2 \\cdot \\frac{x-1}{2} + 1 = x - 1 + 1 = x$$ вњ“.\n\nFull answer: $$f^{-1}(x) = \\frac{x - 1}{2}$$, $$x \\in \\mathbb{R}$$.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_14", "judge_pick": false}, {"question": "Let $$f(x) = e^x$$ with domain $$x \\in \\mathbb{R}$$ and range $$f(x) > 0$$. Fully define the inverse function $$f^{-1}(x)$$ вЂ” give both the rule and the domain. (3 steps)", "answer": "- Step 1: Write $$y = e^x$$, swap to get $$x = e^y$$, solve: $$y = \\ln(x)$$. So $$f^{-1}(x) = \\ln(x)$$.\n- Step 2: The domain of $$f^{-1}$$ equals the range of $$f$$, which is $$y > 0$$. So $$f^{-1}$$ has domain $$x > 0$$.\n- Step 3: Full definition: $$f^{-1}(x) = \\ln(x)$$, $$x > 0$$. Without stating \"$$x > 0$$,\" the function is incomplete вЂ” $$\\ln(x)$$ is undefined for $$x \\leq 0$$, and the domain must be explicitly stated to show understanding of the $$f$$/$$f^{-1}$$ relationship.\n+ The domain $$x > 0$$ comes directly from the range of $$e^x$$ being $$y > 0$$, not from arbitrarily choosing what \"looks right.\"", "source": "GLM 5.1 в‘ў", "_id": "glm_3_15", "judge_pick": false}, {"question": "A student finds $$f^{-1}(x) = \\sqrt{x - 1}$$ and states the domain as $$x \\geq 0$$ by default. Is this correct? What should they have done instead? (2 steps)", "answer": "- Step 1: The domain $$x \\geq 0$$ is **incorrect**. The expression $$\\sqrt{x - 1}$$ requires $$x - 1 \\geq 0$$, i.e., $$x \\geq 1$$, for the square root to be real. But more importantly, the domain of $$f^{-1}$$ must equal the **range of the original function $$f$$**, not be chosen arbitrarily or by copying a generic domain.\n- Step 2: The student should have first determined the range of $$f$$, then stated that as the domain of $$f^{-1}$$. If $$f$$'s range is $$y \\geq 1$$, then $$f^{-1}$$'s domain is $$x \\geq 1$$ вЂ” which happens to coincide with what the expression requires, but the justification must come from the range of $$f$$, not from eyeballing the formula.\n+ Common error: Students write the domain based on what \"looks right\" or by copying the domain of $$f$$, rather than computing the range of $$f$$ and using that.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_16", "judge_pick": false}, {"question": "Why is it insufficient to write only $$f^{-1}(x) = \\text{[expression]}$$ without the domain, even if the expression naturally restricts itself (e.g., $$\\ln(x)$$ only works for $$x > 0$$)? (2 steps)", "answer": "- Step 1: Even if the expression has natural restrictions (like $$\\ln(x)$$ only defined for $$x > 0$$), you must **explicitly state** the domain as part of the function definition. A function is defined by both its rule and its domain вЂ” the domain is a required component, not optional.\n- Step 2: In an exam, omitting the domain loses marks because stating it demonstrates **understanding of the relationship** between $$f$$ and $$f^{-1}$$: domain of $$f^{-1}$$ = range of $$f$$. This is a conceptual insight, not just a practical necessity. Writing the domain shows you know *why* it's $$x > 0$$ (because the range of $$e^x$$ is $$y > 0$$), not just that $$\\ln$$ happens to need positive inputs.\n\nThe domain isn't a bonus detail вЂ” it's half of the function's definition and the key evidence of conceptual understanding.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_17", "judge_pick": true}, {"question": "Suppose $$f(x) = \\frac{1}{x}$$ with domain $$x > 0$$ and range $$y > 0$$. What is $$f^{-1}(x)$$ including its domain, and what surprising property does this function have regarding its inverse? (3 steps)", "answer": "- Step 1: Write $$y = \\frac{1}{x}$$, swap: $$x = \\frac{1}{y}$$, solve: $$y = \\frac{1}{x}$$. So $$f^{-1}(x) = \\frac{1}{x}$$.\n- Step 2: The domain of $$f^{-1}$$ equals the range of $$f$$, which is $$y > 0$$. So $$f^{-1}(x) = \\frac{1}{x}$$, $$x > 0$$.\n- Step 3: The inverse has the **same rule and same domain** as the original function. This is because $$f$$ is a **self-inverse** function on this domain: applying it twice returns the original input ($$f(f(x)) = \\frac{1}{1/x} = x$$).\n+ Not all self-inverse functions look identical вЂ” e.g., $$f(x) = a - x$$ is also self-inverse but doesn't have the same \"shape.\" The key is $$f \\circ f = \\text{identity}$$.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_18", "judge_pick": false}, {"question": "If a function $$f$$ has domain $$x \\geq 3$$ and range $$y \\leq 10$$, what are the domain and range of $$f^{-1}$$ вЂ” and what does this tell you about the \"direction\" of the inequality signs? (2 steps)", "answer": "- Step 1: Domain of $$f^{-1}$$ = range of $$f$$ = $$x \\leq 10$$ (note: the inequality sign carries over directly). Range of $$f^{-1}$$ = domain of $$f$$ = $$y \\geq 3$$.\n- Step 2: The inequality signs **do not flip** during the swap. The range of $$f$$ is \"outputs в‰¤ 10,\" so inputs to $$f^{-1}$$ must be \"в‰¤ 10.\" The domain of $$f$$ is \"inputs в‰Ґ 3,\" so outputs of $$f^{-1}$$ are \"в‰Ґ 3.\" Only the variable name changes (from $$y$$ to $$x$$ for the domain, from $$x$$ to $$y$$ for the range); the inequality direction stays the same.\n+ Common mistake: Students sometimes flip inequality signs when swapping, treating it like solving an inequality. But we're just relabelling sets вЂ” the set \"all values в‰Ґ 3\" is still \"all values в‰Ґ 3\" regardless of whether we call them $$x$$ or $$y$$.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_19", "judge_pick": false}, {"question": "You're given $$f(x) = 3x - 5$$ with domain $$x \\geq 2$$. Find $$f^{-1}(x)$$ with its full domain, and explain how the restricted domain of $$f$$ affects the domain of $$f^{-1}$$ compared to the unrestricted case. (4 steps)", "answer": "- Step 1: Write $$y = 3x - 5$$, swap: $$x = 3y - 5$$, solve: $$3y = x + 5$$, so $$y = \\frac{x + 5}{3}$$. The rule is $$f^{-1}(x) = \\frac{x + 5}{3}$$.\n- Step 2: Find the range of $$f$$ on domain $$x \\geq 2$$: when $$x = 2$$, $$f(2) = 3(2) - 5 = 1$$. As $$x$$ increases beyond 2, $$f(x)$$ increases without bound. So range of $$f$$ is $$y \\geq 1$$.\n- Step 3: Domain of $$f^{-1}$$ = range of $$f$$ = $$x \\geq 1$$.\n- Step 4: If $$f$$ had the unrestricted domain $$x \\in \\mathbb{R}$$, the range would be all real numbers, and $$f^{-1}$$ would have domain $$x \\in \\mathbb{R}$$. But because $$f$$'s domain is restricted to $$x \\geq 2$$, its range shrinks to $$y \\geq 1$$, and this directly restricts $$f^{-1}$$'s domain to $$x \\geq 1$$.\n+ The expression $$\\frac{x+5}{3}$$ can be evaluated for any $$x$$, but the **domain** $$x \\geq 1$$ comes from the range of $$f$$, not from the expression itself.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_20", "judge_pick": false}], "count": 21}, "qwen_1": {"label": "Qwen 3 в‘ ", "cards": [{"question": "What are the four steps to algebraically find the inverse of a function f(x)? (4 steps)", "answer": "- Step 1: Replace f(x) with y. Example: y = 3x + 2  \n- Step 2: Swap x and y. Example: x = 3y + 2  \n- Step 3: Solve for y. Example: y = (x - 2)/3  \n- Step 4: Replace y with fвЃ»В№(x) and state the domain. Example: fвЃ»В№(x) = (x - 2)/3, domain x в€€ в„ќ  \n+ Domain of fвЃ»В№(x) equals range of f(x)  \n+ Range of fвЃ»В№(x) equals domain of f(x)  \n\n**Takeaway:** Inverses reverse inputs/outputs, requiring domain/range swaps.", "source": "Qwen 3 в‘ ", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why must we always state the domain when defining an inverse function?", "answer": "- Inverse functions exist only for **one-to-one** functions (each output maps to one input)  \n- Stating the domain ensures the original function is one-to-one over that interval  \n- Example: f(x) = xВІ has no inverse over all real numbers, but fвЃ»В№(x) = в€љx exists if f(x) is restricted to x в‰Ґ 0  \n+ If domain isn't stated, the inverse might not be mathematically valid  \n\n**Takeaway:** Domain defines the functionвЂ™s behavior; without it, the inverse is ambiguous.", "source": "Qwen 3 в‘ ", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How does the graph of fвЃ»В№(x) relate to the graph of f(x)? (2 steps)", "answer": "- Step 1: Reflect f(x) across the line y = x (mirror over 45В° line)  \n- Step 2: Domain/range switch places вЂ” f(x)вЂ™s domain becomes fвЃ»В№(x)вЂ™s range, and vice versa  \n+ Example: If f(x) = e^x (domain x в€€ в„ќ, range y > 0), then fвЃ»В№(x) = ln(x) (domain x > 0, range y в€€ в„ќ)  \n\n**Takeaway:** Inverse graphs trade axes вЂ” x-values become y-values and vice versa.", "source": "Qwen 3 в‘ ", "_id": "qwen_1_2", "judge_pick": false}, {"question": "What condition must a function satisfy to have an inverse? Why?", "answer": "- Function must be **one-to-one** (passes horizontal line test)  \n- Reason: Inverse functions reverse inputs/outputs. If multiple inputs share an output (many-to-one), the inverse would be undefined (one-to-many)  \n+ Counterexample: f(x) = xВІ fails horizontal line test в†’ no inverse unless domain restricted  \n\n**Takeaway:** Only one-to-one functions guarantee unique outputs for inverse operations.", "source": "Qwen 3 в‘ ", "_id": "qwen_1_3", "judge_pick": false}, {"question": "If f(x) = в€љx has domain x в‰Ґ 0 and range y в‰Ґ 0, what are the domain and range of fвЃ»В№(x)? (2 steps)", "answer": "- Step 1: Domain of fвЃ»В№(x) = range of f(x) в†’ x в‰Ґ 0  \n- Step 2: Range of fвЃ»В№(x) = domain of f(x) в†’ y в‰Ґ 0  \n+ fвЃ»В№(x) = xВІ with domain x в‰Ґ 0 (since original f(x) was restricted)  \n\n**Takeaway:** Inverses swap domain/range, but original restrictions propagate.", "source": "Qwen 3 в‘ ", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why canвЂ™t f(x) = xВІ have an inverse over its entire domain (x в€€ в„ќ)?", "answer": "- Function isnвЂ™t one-to-one: f(2) = 4 and f(-2) = 4 в†’ same output for different inputs  \n- Inverse would require в€љ4 = 2 AND -2, violating function definition (one input в†’ one output)  \n+ Resolution: Restrict domain (e.g., x в‰Ґ 0) to make it one-to-one  \n\n**Takeaway:** Non-injective functions lose information, making reversal impossible.", "source": "Qwen 3 в‘ ", "_id": "qwen_1_5", "judge_pick": true}, {"question": iginal function via domain and range. (3 steps)", "answer": "- Step 1: The inverse function fвЃ»В№(x) satisfies f(fвЃ»В№(x)) = x and fвЃ»В№(f(x)) = x.\n- Step 2: The domain of fвЃ»В№ is the **range** of f; the range of fвЃ»В№ is the **domain** of f.\n+ Example: If f(x) = e^x, domain x в€€ в„ќ в†’ range y > 0, so fвЃ»В№(x) = ln(x) has domain x > 0.", "source": "Qwen 3 в‘Ў", "_id": "qwen_2_0", "judge_pick": false}, {"question": "What are the four steps to algebraically find fвЃ»В№(x)? Why is the final step critical? (4 steps)", "answer": "- Step 1: Replace f(x) with y.\n- Step 2: Swap x and y in the equation.\n- Step 3: Solve for y to isolate it.\n- Step 4: **State the domain of fвЃ»В№**, which equals the range of f.\n+ Misconception: Omitting the domain might incorrectly restrict the inverse (e.g., f(x) = xВІ в†’ fвЃ»В№(x) = в€љx requires domain x в‰Ґ 0).", "source": "Qwen 3 в‘Ў", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How does the graph of y = fвЃ»В№(x) relate to y = f(x)? What happens to a point (a, b) on f(x) when reflected? (2 steps)", "answer": "- Step 1: The graph of fвЃ»В№(x) is the **reflection** of f(x) across the line y = x.\n- Step 2: A point (a, b) on f(x) becomes (b, a) on fвЃ»В№(x).\n+ Visual intuition: This swaps x and y coordinates, mirroring the graph diagonally.", "source": "Qwen 3 в‘Ў", "_id": "qwen_2_2", "judge_pick": false}, {"question": "If f(x) has a range of y в‰Ґ 5, what is the domain of fвЃ»В№(x)? Why is this relationship logically necessary? (2 steps)", "answer": "- Step 1: Domain of fвЃ»В№(x) = Range of f(x) в‡’ x в‰Ґ 5.\n- Step 2: The inverse \"reverses\" the original function's mapping: inputs to fвЃ»В№ must be outputs from f.\n+ Edge case: If f(x) = в€љx with range y в‰Ґ 0, fвЃ»В№(x) = xВІ is only valid for x в‰Ґ 0.", "source": "Qwen 3 в‘Ў", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why canвЂ™t f(x) = xВІ have an inverse over its entire natural domain? How is this resolved? (3 steps)", "answer": "- Step 1: f(x) = xВІ fails the **horizontal line test** (non-injective: both x=2 and x=-2 give y=4).\n- Step 2: Without a restricted domain, fвЃ»В№(x) would map y=4 to multiple x-values, violating the function definition.\n- Step 3: Restrict domain of f to x в‰Ґ 0 в†’ fвЃ»В№(x) = в€љx (or x в‰¤ 0 в†’ fвЃ»В№(x) = -в€љx).", "source": "Qwen 3 в‘Ў", "_id": "qwen_2_4", "judge_pick": false}, {"question": "What is the correct interpretation of fвЃ»В№(x)? How is this notation commonly misunderstood? (2 steps)", "answer": "- Step 1: fвЃ»В№(x) denotes the **inverse function**, not the reciprocal 1/f(x).\n- Step 2: Example: f(x) = 2x + 3 в‡’ fвЃ»В№(x) = (x - 3)/2, while 1/f(x) = 1/(2x + 3).", "source": "Qwen 3 в‘Ў", "_id": "qwen_2_5", "judge_pick": false}, {"question": "How do you solve f(x) = x graphically using the line y = x? (2 steps)", "answer": "- Step 1: Find points where f(x) intersects y = x. These x-values satisfy f(x) = x.\n- Step 2: Such points lie on both f(x) and fвЃ»В№(x) since fвЃ»В№(x) is a reflection over y = x.\n+ Example: If f(x) = 2x intersects y = x at (0, 0), then fвЃ»В№(x) also passes through (0, 0).", "source": "Qwen 3 в‘Ў", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why is stating the domain critical when defining fвЃ»В№(x)? Use f(x) = ln(x) to illustrate. (3 steps)", "answer": "- Step 1: The inverse function is only valid for inputs that were outputs of f.\n- Step 2: ln(x) has domain x > 0 в‡’ f(x) = ln(x) has range y в€€ в„ќ.\n- Step 3: Thus, fвЃ»В№(x) = e^x has domain x в€€ в„ќ (range of ln(x)) and range y > 0 (domain of ln(x)).", "source": "Qwen 3 в‘Ў", "_id": "qwen_2_7", "judge_pick": false}, {"question": "If f(x) = в€љx, what is fвЃ»В№(x)? Why canвЂ™t fвЃ»В№(x) = xВІ be valid for all real numbers? (3 steps)", "answer": "- Step 1: f(x) = в€љx has domain x в‰Ґ 0 and range y в‰Ґ 0.\n- Step 2: fвЃ»В№(x) = xВІ, but domain must be restricted to x в‰Ґ 0 to match fвЂ™s range.\n- Step 3: If xВІ included all real numbers, it would map negative x-values to y в‰Ґ 0, contradicting fвЂ™s original domain.", "source": "Qwen 3 в‘Ў", "_id": "qwen_2_8", "judge_pick": false}, {"question": "What condition must a function satisfy to have an inverse? How does this relate to horizontal line tests? (2 steps)", "answer": "- Step 1: A function must be **one-to-one** (passes horizontal line test: no horizontal line intersects graph > once).\n- Step 2: If not one-to-one, restrict domain to create an invertible piece.\n+ Counterexample: f(x) = |x| requires domain restriction x в‰Ґ 0 for inverse.", "source": "Qwen 3 в‘Ў", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax в‘ ", "cards": [{"question": "Why must you always state the domain when defining an inverse function fвЃ»В№(x)? (2 steps)", "answer": "- Step 1: The domain of fвЃ»В№ equals the range of f, not necessarily all real numbers. For example, if f(x) = xВІ with domain x в‰Ґ 0, then fвЃ»В№(x) = в€љx has domain x в‰Ґ 0 (the range of the original f).\n- Step 2: Without stating the domain, the inverse function is incomplete вЂ” it violates the fundamental requirement that every function needs both a rule and a domain to be properly defined.", "source": "MiniMax в‘ ", "_id": "minimax_1_0", "judge_pick": false}, {"question": "If f(x) has domain [a, b] and range [c, d], what are the domain and range of its inverse function fвЃ»В№(x)? (1 step)", "answer": "- Domain of fвЃ»В№ = [c, d] (the range of f)\n- Range of fвЃ»В№ = [a, b] (the domain of f)\n\nThis is because the inverse function \"reverses\" the mapping вЂ” what was an output becomes an input, and vice versa.", "source": "MiniMax в‘ ", "_id": "minimax_1_1", "judge_pick": false}, {"question": "A student finds that fвЃ»В№(x) = в€љx and writes \"fвЃ»В№(x) = в€љx\" without stating a domain. What is wrong with this? (2 steps)", "answer": "- Step 1: The expression в€љx implies x в‰Ґ 0 by convention (since we typically take the principal square root), but this is not explicitly stated.\n- Step 2: More importantly, this domain x в‰Ґ 0 only works if it equals the range of the original f(x). If f(x) had a different range (say, y в‰¤ 0), then fвЃ»В№(x) would need domain x в‰¤ 0 instead. The domain must be explicitly stated to match the range of f, not assumed from the square root notation.", "source": "MiniMax в‘ ", "_id": "minimax_1_2", "judge_pick": false}, {"question": "How are the graphs of y = f(x) and y = fвЃ»В№(x) related geometrically? (2 steps)", "answer": "- Step 1: The graph of y = fвЃ»В№(x) is the reflection of the graph of y = f(x) in the line y = x.\n- Step 2: This means if (a, b) is on the graph of f, then (b, a) is on the graph of fвЃ»В№ вЂ” the coordinates swap because the inverse essentially \"reverses\" the input-output relationship.", "source": "MiniMax в‘ ", "_id": "minimax_1_3", "judge_pick": false}, {"question": "If the point (2, 5) lies on the graph of y = f(x), what point must lie on the graph of y = fвЃ»В№(x)? (1 step)", "answer": "The point (5, 2) lies on y = fвЃ»В№(x).\n\nThis follows directly from the reflection property: the inverse swaps the x and y coordinates, so every point (a, b) on f becomes (b, a) on fвЃ»В№.", "source": "MiniMax в‘ ", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Why can't every function have an inverse? What condition must a function satisfy to have an inverse? (2 steps)", "answer": "- Step 1: A function must be one-to-one (injective) to have an inverse вЂ” each x maps to exactly one y, and no two different x values map to the same y.\n- Step 2: If a function fails this test (e.g., f(x) = xВІ maps both x = 2 and x = -2 to y = 4), we must restrict its domain to make it one-to-one before an inverse can exist. Otherwise, the inverse would not be a function (one x would give two possible y values).", "source": "MiniMax в‘ ", "_id": "minimax_1_5", "judge_pick": false}, {"question": "For f(x) = eЛЈ, what is fвЃ»В№(x) and what are its domain and range? (2 steps)", "answer": "- Step 1: To find fвЃ»В№: y
