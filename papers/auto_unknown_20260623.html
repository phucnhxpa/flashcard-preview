const DATA={"selected": [{"question": "Why canвЂ™t f(x) = xВІ have an inverse over its entire domain (x в€€ в„ќ)?", "answer": "- Function isnвЂ™t one-to-one: f(2) = 4 and f(-2) = 4 в†’ same output for different inputs  \n- Inverse would require в€љ4 = 2 AND -2, violating function definition (one input в†’ one output)  \n+ Resolution: Restrict domain (e.g., x в‰Ґ 0) to make it one-to-one  \n\n**Takeaway:** Non-injective functions lose information, making reversal impossible.", "source": "Qwen 3 в‘ ", "_id": "qwen_1_5"}, {"question": "What is the domain of $$f(x) = \\ln(x)$$, and what goes wrong if you try to evaluate $$\\ln(0)$$ or $$\\ln(-1)$$? (2 steps)", "answer": "- Step 1: The domain of $$\\ln(x)$$ is $$x > 0$$. The natural logarithm is only defined for positive inputs.\n- Step 2: Understanding why from the definition вЂ” $$\\ln(x)$$ asks \"e raised to what power gives $$x$$?\":\n  + $$\\ln(0)$$: there is no real power of $$e$$ that equals 0, since $$e^{\\text{anything}} > 0$$ always. Undefined.\n  + $$\\ln(-1)$$: no real power of $$e$$ produces a negative number. Undefined.\n  \nThe vertical asymptote at $$x = 0$$ on the graph of $$\\ln(x)$$ visually represents this boundary вЂ” the function approaches $$-\\infty$$ but never reaches $$x = 0$$.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_2"}, {"question": "$$f(x) = x^2$$ with domain $$x \\in \\mathbb{R}$$ (all real numbers). Explain why $$f^{-1}$$ does not exist in this case. (2 steps)", "answer": "- Step 1: For an inverse to exist, $$f$$ must be one-to-one (injective): each output must come from exactly one input. But $$f(x) = x^2$$ fails this: $$f(3) = 9$$ and $$f(-3) = 9$$. The same output comes from two different inputs.\n- Step 2: If we tried to define $$f^{-1}(9)$$, should it return 3 or -3? There's no unique answer, so $$f^{-1}$$ is not a function (a function must give exactly one output for each input). The inverse simply doesn't exist as a function unless we restrict the domain (e.g., $$x \\geq 0$$ or $$x \\leq 0$$) to make $$f$$ one-to-one.\n\nThis is why domain restrictions matter вЂ” they can turn a non-invertible function into an invertible one.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_12"}, {"question": "Why is it that $$fg(x) \\neq gf(x)$$ in general? Give a concrete example with simple numbers. (2 steps)", "answer": "- Step 1: $$fg(x) = f(g(x))$$ means \"apply $$g$$ first, then $$f$$.\" $$gf(x) = g(f(x))$$ means \"apply $$f$$ first, then $$g$$.\" The order of operations is reversed, and most functions don't commute under composition.\n- Step 2: Example: let $$f(x) = x + 10$$ and $$g(x) = 2x$$. Then $$fg(3) = f(g(3)) = f(6) = 16$$. But $$gf(3) = g(f(3)) = g(13) = 26$$. Different results. In general, \"add 10 then double\" is not the same as \"double then add 10.\"\n\nFunction composition is not commutative вЂ” order matters, just like putting on socks then shoes в‰  shoes then socks.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_26"}, {"question": "The notation $$f^{-1}(x)$$ uses a superscript $$-1$$. Does this mean $$\\frac{1}{f(x)}$$? Why or why not? (2 steps)", "answer": "- Step 1: No. The $$-1$$ in $$f^{-1}$$ denotes the **inverse function**, not a reciprocal. $$f^{-1}(x)$$ means \"the input that $$f$$ maps to $$x$$,\" i.e., the function that reverses $$f$$.\n- Step 2: This is about function composition: $$f^{-1} \\circ f = \\text{identity}$$, meaning $$f^{-1}(f(x)) = x$$. This is entirely different from the algebraic operation $$\\frac{1}{f(x)}$$, which would be written as $$[f(x)]^{-1}$$.\n+ Example: For $$f(x) = 2x$$, $$f^{-1}(x) = \\frac{x}{2}$$ (the inverse), whereas $$[f(x)]^{-1} = \\frac{1}{2x}$$ (the reciprocal). These are completely different functions.\n+ Confusion source: For numbers, $$x^{-1} = \\frac{1}{x}$$, so students naturally extend this to functions. But $$f^{-1}$$ is a separate, established convention meaning \"inverse function,\" not \"1 over f.\"", "source": "GLM 5.1 в‘ў", "_id": "glm_3_7"}, {"question": "Outline the full algebraic procedure for finding $$f^{-1}(x)$$ from $$f(x)$$, and identify the step most commonly forgotten. (4 steps)", "answer": "- Step 1: Write $$y = f(x)$$ вЂ” replace the function notation with $$y$$ so you can manipulate algebraically.\n- Step 2: Swap $$x$$ and $$y$$ вЂ” this reflects the relationship $$x \\leftrightarrow y$$, which is exactly what inversion does.\n- Step 3: Solve the new equation for $$y$$ вЂ” this yields $$y = f^{-1}(x)$$.\n- Step 4: **State the domain of $$f^{-1}$$**, equal to the range of $$f$$ вЂ” this is the step most commonly forgotten and the one Harry flagged.\n\nTakeaway: the procedure has *four* steps, not three вЂ” the domain statement is part of the algorithm.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_5"}, {"question": "If the point $$(3, 7)$$ lies on the graph of $$y = f(x)$$, what point must lie on the graph of $$y = f^{-1}(x)$$, and why? (2 steps)", "answer": "- Step 1: $$(3, 7)$$ on $$y = f(x)$$ means $$f(3) = 7$$. The inverse function reverses this: $$f^{-1}(7) = 3$$.\n- Step 2: $$f^{-1}(7) = 3$$ means the point $$(7, 3)$$ lies on $$y = f^{-1}(x)$$. The coordinates swap, which is exactly the reflection in $$y = x$$: $$(3, 7) \\to (7, 3)$$.\n\nQuick check for any inverse: pick a point on $$f$$, swap coordinates, and you have the corresponding point on $$f^{-1}$$.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_30"}, {"question": "A student writes $$f^{-1}(x) = \\tfrac{x-3}{2}$$ as their final answer to an inverse function question. What is missing, and how should the answer be properly written?", "answer": "- Step 1: The algebraic rule is given, but the **domain of $$f^{-1}$$ has not been stated**. The function is incomplete.\n- Step 2: The proper format is to write both:\n+ The rule: $$f^{-1}(x) = \\tfrac{x-3}{2}$$\n+ The domain: e.g. $$x \\in \\mathbb{R}$$ or $$x \\geq 0$$, etc. вЂ” whatever equals the range of the original $$f$$.\n- Step 3: In an exam, marks are routinely lost here. Examiners treat \"find the inverse function\" as a request for a fully-defined function, not just a formula.\n\nTakeaway: always finish with \"вЂ¦, domain: вЂ¦\". Make it muscle memory.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_2"}, {"question": "A function is not just a formula or rule вЂ” it requires two components to be fully defined. What are they, and why is the second one indispensable? (2 steps)", "answer": "- Step 1: A function is defined by **(1) the rule** (e.g., $$f(x) = 2x + 1$$) and **(2) the domain** (the set of allowed input values, e.g., $$x \\in \\mathbb{R}$$). Without the domain, the rule alone is ambiguous вЂ” it doesn't tell you where the function \"lives.\"\n- Step 2: The domain is indispensable because the same rule applied to different domains can produce different ranges, different behaviours, and different inverses. For example, $$f(x) = x^2$$ with domain $$x \\geq 0$$ has range $$y \\geq 0$$ and is one-to-one (invertible), but $$f(x) = x^2$$ with domain $$x \\in \\mathbb{R}$$ has range $$y \\geq 0$$ and is NOT one-to-one (not invertible without restricting the domain). The domain changes everything.\n\nThink of the domain as the \"terms and conditions\" of the function вЂ” without it, you don't know what you've agreed to.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_0"}, {"question": "When you define an inverse function $$f^{-1}(x)$$, its domain must equal a specific property of the original function $$f$$. What property?", "answer": "The **domain** of $$f^{-1}$$ equals the **range** of $$f$$.\n\nThis is because $$f^{-1}$$ reverses the mapping of $$f$$: it takes the *outputs* of $$f$$ as its *inputs*. The set of all outputs of $$f$$ is exactly the range of $$f$$, so that becomes the set of valid inputs (domain) for $$f^{-1}$$.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_1"}, {"question": "What is the relationship between the graphs of $$y = f(x)$$, $$y = f^{-1}(x)$$, and $$y = x$$, and how does this help you visually verify the domain of the inverse? (3 steps)", "answer": "- Step 1: The graph of $$y = f^{-1}(x)$$ is the **reflection** of $$y = f(x)$$ in the line $$y = x$$. This is because the inverse swaps coordinates: point $$(a, b)$$ on $$f$$ becomes $$(b, a)$$ on $$f^{-1}$$.\n- Step 2: The line $$y = x$$ is the **mirror line** for this reflection. Points on $$y = x$$ (where $$f(a) = a$$) are fixed points вЂ” they lie on both graphs.\n- Step 3: To visually verify the domain of $$f^{-1}$$: look at the **vertical extent** (range) of $$f$$'s graph вЂ” that becomes the **horizontal extent** (domain) of $$f^{-1}$$'s graph after reflection. If $$f$$ has range $$y \\geq 5$$, then after reflection, $$f^{-1}$$ starts at $$x = 5$$ and extends rightward. Sketch both graphs and check symmetry about $$y = x$$.\n\nThe graphical picture is a powerful sanity check: if the reflected graph doesn't match your algebraic inverse, something is wrong.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_20"}, {"question": "What is the proper notation for an inverse function, and what does the \"$$-1$$\" superscript NOT mean here?", "answer": "- Step 1: The notation is $$f^{-1}(x)$$, read as \"f inverse of x.\"\n- Step 2: The $$-1$$ is **not an exponent** вЂ” it does *not* mean $$\\tfrac{1}{f(x)}$$ (that would be the reciprocal). It is purely a symbolic label indicating \"the inverse function of $$f$$.\"\n- Step 3: This is a classic notational trap. $$\\sin^{-1}(x)$$ means arcsine, not $$\\tfrac{1}{\\sin x}$$ (which is $$\\csc x$$). Same convention.\n\nTakeaway: $$f^{-1}$$ is a name, not a power. Reciprocals and inverses are different objects.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_5"}, {"question": "Why does a function need to be **one-to-one** (injective) on its domain for an inverse to exist, and how does this connect to the requirement to state a domain when defining $$f$$? (3 steps)", "answer": "- Step 1: An inverse must map each output of $$f$$ back to a *unique* input. If two different $$x$$-values give the same $$f(x)$$, the inverse can't choose between them.\n- Step 2: Many functions (like $$x^2$$) are not one-to-one on their natural domain but become one-to-one if the domain is restricted (e.g. $$x\\geq 0$$).\n- Step 3: This is precisely why specifying the domain of $$f$$ matters: the domain choice *creates* invertibility. Without it, you can't even claim $$f^{-1}$$ exists.\n\nTakeaway: the domain isn't just bookkeeping вЂ” it determines whether the inverse exists at all.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_11"}, {"question": "Why must a function be one-to-one (injective) for its inverse to exist as a function? What happens if it's not? (2 steps)", "answer": "- Step 1: A function maps each input to exactly one output. For $$f^{-1}$$ to also be a function, it must map each input to exactly one output. But $$f^{-1}$$ reverses $$f$$: if $$f(a) = f(b) = c$$ with $$a \\neq b$$, then $$f^{-1}(c)$$ would need to equal both $$a$$ and $$b$$, violating the function rule.\n- Step 2: If $$f$$ is not one-to-one, the \"inverse\" would assign multiple outputs to a single input, which is not a function. The horizontal line test detects this: if any horizontal line crosses the graph of $$f$$ more than once, $$f$$ is not one-to-one and has no inverse function (unless the domain is restricted).\n\nThis is why domain restrictions are so important вЂ” they can make a function one-to-one, enabling an inverse.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_47"}, {"question": "A student computes $$f^{-1}$$ for $$f(x) = (x-1)^2$$ on $$x \\geq 1$$ and writes $$f^{-1}(x) = 1 \\pm \\sqrt{x}$$. What two things are wrong with this answer? (3 steps)", "answer": "- Step 1: Wrong issue #1: a function must give a *single* output per input. Writing \"$$\\pm$$\" produces two outputs and isn't a function.\n+ Since $$f$$ is defined on $$x\\geq 1$$, the inverse must return values $$\\geq 1$$, so choose the \"+\" branch: $$f^{-1}(x)=1+\\sqrt{x}$$.\n- Step 2: Wrong issue #2: **no domain stated**. The range of $$f$$ is $$y\\geq 0$$ (since $$(x-1)^2 \\geq 0$$), so domain of $$f^{-1}$$ is $$x\\geq 0$$.\n- Step 3: Correct full answer: $$f^{-1}(x)=1+\\sqrt{x},\\ x\\geq 0$$.\n\nTakeaway: choose the correct branch using the *range constraint* of $$f^{-1}$$ (= domain of $$f$$), then state the domain.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_12"}, {"question": "Why is it insufficient to write only $$f^{-1}(x) = \\text{[expression]}$$ without the domain, even if the expression naturally restricts itself (e.g., $$\\ln(x)$$ only works for $$x > 0$$)? (2 steps)", "answer": "- Step 1: Even if the expression has natural restrictions (like $$\\ln(x)$$ only defined for $$x > 0$$), you must **explicitly state** the domain as part of the function definition. A function is defined by both its rule and its domain вЂ” the domain is a required component, not optional.\n- Step 2: In an exam, omitting the domain loses marks because stating it demonstrates **understanding of the relationship** between $$f$$ and $$f^{-1}$$: domain of $$f^{-1}$$ = range of $$f$$. This is a conceptual insight, not just a practical necessity. Writing the domain shows you know *why* it's $$x > 0$$ (because the range of $$e^x$$ is $$y > 0$$), not just that $$\\ln$$ happens to need positive inputs.\n\nThe domain isn't a bonus detail вЂ” it's half of the function's definition and the key evidence of conceptual understanding.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_17"}, {"question": "What does the notation $$f^{-1}$$ actually mean, and what is a common misinterpretation of it? (2 steps)", "answer": "- Step 1: $$f^{-1}$$ denotes the **inverse function** вЂ” the function that reverses the action of $$f$$. If $$f(a) = b$$, then $$f^{-1}(b) = a$$. It is defined by the rule AND its domain (which is the range of $$f$$).\n- Step 2: A common misinterpretation is confusing $$f^{-1}(x)$$ with $$[f(x)]^{-1} = \\frac{1}{f(x)}$$. The superscript $$-1$$ on the function name means \"inverse,\" not \"reciprocal.\" For example, if $$f(x) = 2x$$, then $$f^{-1}(x) = \\frac{x}{2}$$ (the inverse function), whereas $$[f(x)]^{-1} = \\frac{1}{2x}$$ (the reciprocal). These are completely different.\n\n$$f^{-1}$$ undoes $$f$$; $$\\frac{1}{f}$$ divides by $$f$$. Never confuse them.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_8"}, {"question": "Geometrically, how does the graph of $$y=f^{-1}(x)$$ relate to that of $$y=f(x)$$, and why does this geometric relationship enforce the domainвЂ“range swap? (3 steps)", "answer": "- Step 1: The graph of $$y=f^{-1}(x)$$ is the reflection of $$y=f(x)$$ in the line $$y=x$$. Every point $$(a,b)$$ on $$f$$ becomes $$(b,a)$$ on $$f^{-1}$$.\n- Step 2: Reflection in $$y=x$$ swaps the horizontal and vertical axes. The set of $$x$$-values (domain) of $$f$$ becomes the set of $$y$$-values (range) of $$f^{-1}$$, and vice versa.\n- Step 3: So the algebraic rule \"domain of $$f^{-1}$$ = range of $$f$$\" is just the geometric statement that reflection swaps axes вЂ” they're the same fact, different language.\n\nTakeaway: visualise the reflection, and the domain-swap rule becomes obvious rather than memorised.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_9"}, {"question": "When stating the domain of $$f^{-1}$$, why must you use the *original* given domain of $$f$$, not the maximal domain on which the formula of $$f$$ happens to work? (3 steps)", "answer": "- Step 1: The question defines $$f$$ via \"equation + domain.\" That given domain is part of the function's identity.\n- Step 2: The range of $$f$$ depends on which inputs are actually allowed. Using a larger domain than was given would compute the range of a *different* function.\n+ Example: $$f(x)=x^2$$ on $$x\\geq 0$$ has range $$y\\geq 0$$; on $$\\mathbb{R}$$ it would also have range $$y\\geq 0$$ but $$f$$ wouldn't be invertible at all.\n- Step 3: So always anchor your range calculation to the stated domain вЂ” not the \"natural\" or \"biggest possible\" one.\n\nTakeaway: respect the domain you were given; it defines the function.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_13"}, {"question": "Why can't every function have an inverse? What property must a function satisfy to have an inverse function?", "answer": "- Step 1: A function must be **one-to-one** (injective) to have an inverse. This means each output comes from exactly one input вЂ” no two different inputs produce the same output.\n- Step 2: If a function is not one-to-one (it's many-to-one), we cannot \"undo\" it uniquely. For example, f(x) = xВІ has f(2) = 4 and f(-2) = 4. If we ask \"what input gives output 4?\", there are two possible answers (В±2), so an inverse function doesn't exist uniquely.\n- + To make such functions invertible, we must **restrict the domain** to a region where the function becomes one-to-one (e.g., x в‰Ґ 0 for xВІ).\n- + The horizontal line test visually checks for one-to-one: if any horizontal line crosses the graph more than once, the function is not one-to-one.", "source": "MiniMax в‘Ў", "_id": "minimax_2_6"}, {"question": "Why is the range of $$f$$ (not the domain of $$f$$) the correct domain for $$f^{-1}$$? Reason from the graphical reflection in $$y = x$$. (3 steps)", "answer": "- Step 1: Reflecting a graph in the line $$y = x$$ swaps every point $$(a, b)$$ on $$f$$ to $$(b, a)$$ on $$f^{-1}$$.\n- Step 2: Under this swap:\n+ Old $$x$$-coordinates (domain of $$f$$) become new $$y$$-coordinates (range of $$f^{-1}$$).\n+ Old $$y$$-coordinates (range of $$f$$) become new $$x$$-coordinates (domain of $$f^{-1}$$).\n- Step 3: So the horizontal extent of $$f^{-1}$$ (its domain) is literally the vertical extent of $$f$$ (its range). The reflection physically swaps the two.\n\nTakeaway: domain/range swap isn't a rule to memorize вЂ” it's just what reflection in $$y=x$$ *does*.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_3"}, {"question": "A student writes: \"$$f(x) = x^2 + 1$$, so $$f^{-1}(x) = \\sqrt{x - 1}$$, domain $$x \\in \\mathbb{R}$$.\" Identify two errors in this answer. (3 steps)", "answer": "- Step 1: Error 1 вЂ” The domain $$x \\in \\mathbb{R}$$ is wrong. The expression $$\\sqrt{x - 1}$$ requires $$x - 1 \\geq 0$$, i.e., $$x \\geq 1$$. More importantly, the domain should come from the range of $$f$$: since $$f(x) = x^2 + 1 \\geq 1$$ for all $$x$$, the range is $$y \\geq 1$$, so the domain of $$f^{-1}$$ is $$x \\geq 1$$.\n- Step 2: Error 2 вЂ” The student hasn't specified the domain of $$f$$. If $$f$$ has domain $$x \\in \\mathbb{R}$$, then $$f$$ is not one-to-one ($$f(1) = f(-1) = 2$$), so $$f^{-1}$$ doesn't exist as a function. The student needs to restrict the domain of $$f$$ (e.g., $$x \\geq 0$$) for the inverse to be well-defined.\n- Step 3: The corrected answer: if $$f(x) = x^2 + 1$$ with domain $$x \\geq 0$$, then range is $$y \\geq 1$$, and $$f^{-1}(x) = \\sqrt{x - 1}$$ with domain $$x \\geq 1$$.\n\nThis tests multiple concepts simultaneously: domain of inverse, one-to-one requirement, and the connection between range of $$f$$ and domain of $$f^{-1}$$.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_46"}, {"question": "In the step \"swap $$x$$ and $$y$$\" when finding the inverse, what is actually happening conceptually? Why does this work? (2 steps)", "answer": "- Step 1: Swapping $$x$$ and $$y$$ is the algebraic version of reflecting the graph in $$y = x$$. The original equation $$y = f(x)$$ describes the set of points $$(x, f(x))$$. After swapping, $$x = f(y)$$ describes the set of points $$(f(y), y)$$ вЂ” which is exactly the reflected graph.\n- Step 2: Conceptually, swapping $$x$$ and $$y$$ interchanges the roles of input and output. The original function takes input $$x$$ and gives output $$y$$; the inverse takes the old output (now called $$x$$) and returns the old input (now called $$y$$). This is why solving for $$y$$ after the swap yields the inverse rule.\n\nThe swap is not a trick вЂ” it's the definition of the inverse encoded in algebra.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_23"}, {"question": "When finding an inverse function algebraically, you swap $$x$$ and $$y$$ and solve for $$y$$. But there is a critical fourth step that students routinely forget. What is it, and why does omitting it make your answer incomplete? (3 steps)", "answer": "- Step 1: The four steps are: (1) Write $$y = f(x)$$, (2) Swap $$x$$ and $$y$$, (3) Solve for $$y$$ to get $$y = f^{-1}(x)$$, and **(4) State the domain of $$f^{-1}(x)$$**.\n- Step 2: The domain of $$f^{-1}$$ equals the **range of the original function $$f$$**. This is because the inverse swaps inputs and outputs вЂ” whatever was an output of $$f$$ becomes an input of $$f^{-1}$$.\n- Step 3: Without this step, you've given a rule but not a function. The examiner (and any mathematician) cannot accept a \"function\" without a domain вЂ” it's like giving directions without a starting point. In exams, you **lose marks** for this omission every time.\n\nThe rule without its domain is not a function вЂ” it's just a floating expression.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_1"}, {"question": "After algebraically finding $$f^{-1}(x)$$, what specific domain must you state for it, and what is the underlying reason this is the correct domain to choose?", "answer": "- Step 1: The domain of $$f^{-1}$$ must equal the **range of the original function $$f$$**.\n- Step 2: Intuition: the inverse \"undoes\" $$f$$. So the inputs into $$f^{-1}$$ are exactly the outputs that $$f$$ could have produced. If $$f$$ never outputs a particular value, then $$f^{-1}$$ has nothing to map that value back from вЂ” it's not in its domain.\n- Step 3: Graphically, this matches the reflection in $$y = x$$: the $$y$$-values of $$f$$ become the $$x$$-values of $$f^{-1}$$.\n\nTakeaway: **Domain of $$f^{-1}$$ = Range of $$f$$**, because inverse inputs are original outputs.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_1"}, {"question": "Why might an algebraic formula for $$f^{-1}(x)$$ accept inputs that are not actually valid for the inverse function? Give an example of the danger. (3 steps)", "answer": "- Step 1: When you solve $$x = f(y)$$ for $$y$$, the resulting algebraic expression often has a larger natural domain than the inverse function actually has.\n- Step 2: Example: if $$f(x) = \\sqrt{x-1}$$ with domain $$x \\geq 1$$, then the range of $$f$$ is $$y \\geq 0$$. Solving for the inverse gives $$f^{-1}(x) = x^2 + 1$$.\n+ The formula $$x^2 + 1$$ is defined for all real $$x$$.\n+ But the *function* $$f^{-1}$$ only accepts $$x \\geq 0$$, because those were the outputs of $$f$$.\n- Step 3: If you fed $$x = -3$$ into the formula you'd get $$10$$, but $$f$$ never produced $$-3$$, so $$f^{-1}(-3)$$ is undefined. **Stating the domain prevents this nonsense.**\n\nTakeaway: the formula is \"greedy\" вЂ” the domain restriction is what keeps $$f^{-1}$$ honest as the true inverse.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_6"}, {"question": "A student finds $$f^{-1}(x) = \\frac{x+1}{4}$$ and writes \"domain: $$x \\in \\mathbb{R}$$\" because the formula works for all reals. Explain conceptually why this reasoning is flawed, even if the answer happens to be correct in some cases. (3 steps)", "answer": "- Step 1: The student is using the **natural domain** of the algebraic expression (the largest set of inputs for which the formula produces real outputs). For $$\\frac{x+1}{4}$$, that's all reals. But the domain of an inverse function is not determined by the formula вЂ” it's determined by the **range of the original function**.\n- Step 2: In some cases (like $$f(x) = 4x - 1$$ with domain $$x \\in \\mathbb{R}$$ and range $$y \\in \\mathbb{R}$$), the range of $$f$$ happens to be all reals, so the domain of $$f^{-1}$$ IS all reals вЂ” and the student's answer is accidentally correct. But this is luck, not reasoning.\n- Step 3: If the original function had a restricted domain (e.g., $$f(x) = 4x - 1$$ with domain $$x \\geq 0$$, range $$y \\geq -1$$), then the domain of $$f^{-1}$$ should be $$x \\geq -1$$, not all reals. The student's method would give the wrong answer. Always derive the domain from the range of $$f$$, never from the algebraic formula.\n\nThe formula's natural domain is a trap вЂ” the real domain comes from the inverse relationship.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_10"}, {"question": "State the relationship between the domain and range of $$f$$ and those of $$f^{-1}$$, and explain conceptually why this relationship must hold. (3 steps)", "answer": "- Step 1: The rules are: **Domain of $$f^{-1}$$ = Range of $$f$$**, and **Range of $$f^{-1}$$ = Domain of $$f$$**.\n- Step 2: Why? An inverse function \"undoes\" $$f$$. The inputs of $$f^{-1}$$ are precisely the outputs that $$f$$ actually produced вЂ” you cannot invert a value that $$f$$ never outputs.\n+ If $$f$$ sends $$a \\mapsto b$$, then $$f^{-1}$$ sends $$b \\mapsto a$$.\n+ So the set of $$b$$'s (range of $$f$$) becomes the input set of $$f^{-1}$$.\n- Step 3: Equivalently, reflecting $$y=f(x)$$ in $$y=x$$ swaps the $$x$$- and $$y$$-axis roles, which swaps domain and range geometrically.\n\nTakeaway: domain and range simply trade places under inversion вЂ” this gives you the domain of $$f^{-1}$$ for free.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_2"}, {"question": "Why must the domain of $$f^{-1}(x)$$ be explicitly stated when writing down an inverse function, even after correctly solving for $$y$$? (3 steps)", "answer": "- Step 1: An inverse $$f^{-1}$$ is itself a function, and by the rule above, every function needs both equation and domain to be fully defined.\n- Step 2: The algebraic rearrangement only gives the *formula* of $$f^{-1}$$. The formula alone may be valid over a larger set than the actual inverse permits.\n+ Example: if $$f(x)=x^2$$ with domain $$x\\geq 0$$, then $$f^{-1}(x)=\\sqrt{x}$$ вЂ” but $$\\sqrt{x}$$ as a formula could be considered for $$x \\geq 0$$, which happens to match here; in other cases the inverse formula could be defined for inputs that were never actual outputs of $$f$$.\n- Step 3: Omitting the domain leaves $$f^{-1}$$ undefined as a function вЂ” the marker treats it as incomplete, exactly Harry's point.\n\nTakeaway: the formula is half the answer; the domain completes the definition.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_1"}, {"question": "Contrast: what does \"domain of $$f^{-1}$$\" mean versus \"where $$f^{-1}$$'s formula is mathematically valid\"? (3 steps)", "answer": "- Step 1: \"Domain of $$f^{-1}$$\" is a *function-theoretic* concept: the set of inputs that the inverse function is officially defined for, dictated by the range of $$f$$.\n- Step 2: \"Where the formula is mathematically valid\" is a *symbolic* concept: where the expression doesn't blow up (no division by zero, no $$\\sqrt{\\text{negative}}$$, etc.).\n- Step 3: These can disagree. E.g. $$f^{-1}(x)=\\sqrt{x-1}$$ has formula validity $$x\\geq 1$$, but if range of $$f$$ is only $$x\\geq 5$$, the actual domain of $$f^{-1}$$ is $$x\\geq 5$$ вЂ” a strict subset.\n\nTakeaway: the function's domain can be smaller than where the formula technically works; never substitute one for the other.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_15"}, {"question": "Why is it not enough to \"guess\" the domain of $$f^{-1}$$ by looking at where the formula is defined (e.g. picking $$x\\geq 1$$ for $$\\sqrt{x-1}$$ just because of the square root)? (3 steps)", "answer": "- Step 1: The natural domain of the formula and the range of $$f$$ can coincide, but they don't always вЂ” relying on the formula's natural domain is a coincidence, not a method.\n- Step 2: The *correct* logical chain is: domain of $$f^{-1}$$ comes from the **range of $$f$$**, which depends on the original domain you were given for $$f$$.\n+ Example: if $$f(x)=x^2+1$$ on $$x\\geq 2$$ instead, the range is $$y\\geq 5$$, so $$f^{-1}$$ needs domain $$x\\geq 5$$, even though $$\\sqrt{x-1}$$ is defined for all $$x\\geq 1$$.\n- Step 3: So always derive the domain of $$f^{-1}$$ from $$f$$'s range вЂ” not from the inverse formula's surface appearance.\n\nTakeaway: the inverse's domain inherits from $$f$$'s outputs, not from what the inverse formula \"looks like.\"", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_4"}, {"question": "Can a constant function $$f(x) = 5$$ (for all $$x$$ in its domain) have an inverse? Why or why not? (2 steps)", "answer": "- Step 1: No, a constant function cannot have an inverse. $$f(x) = 5$$ maps every input to the same output 5, so it's maximally many-to-one.\n- Step 2: If we tried to define $$f^{-1}(5)$$, it would need to return every $$x$$ in the domain simultaneously, which violates the definition of a function (one output per input). The horizontal line test confirms this: the horizontal line $$y = 5$$ intersects the graph at every point, not just one.\n\nThis is an extreme case of the one-to-one requirement: constant functions are as far from one-to-one as possible.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_48"}, {"question": "A student claims: \"I don't need to write the domain of $$f^{-1}$$ because if you look at the formula, you can see what values work.\" Why is this reasoning wrong in an exam context? (3 steps)", "answer": "- Step 1: As shown earlier, the algebraic formula often *accepts* more inputs than the inverse function legitimately should. The formula alone doesn't carry the domain restriction inherited from the original function's range.\n- Step 2: Mathematically, a function is **defined** by its rule + domain. Omitting the domain means you have not defined a function вЂ” you've written an expression.\n- Step 3: Exam mark schemes treat the domain as a separate mark (or part of the function's identity). Even if the formula is correct, missing the domain loses marks and demonstrates incomplete understanding.\n\nTakeaway: \"you can see it from the formula\" is wrong both mathematically and procedurally.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_10"}, {"question": "A student writes: \"Since $$f^{-1}(x) = \\sqrt{x-2}$$, the domain is $$x \\geq 2$$.\" Is this reasoning correct or coincidental, and how can you tell? (3 steps)", "answer": "- Step 1: The student determined the domain by finding where the expression $$\\sqrt{x-2}$$ is defined (the radicand must be non-negative: $$x - 2 \\geq 0$$, so $$x \\geq 2$$). This gives the **natural domain** of the formula.\n- Step 2: This reasoning is **coincidental** in the sense that it happens to give the correct answer, but for the wrong reason. The correct method is: the domain of $$f^{-1}$$ equals the range of $$f$$. You must verify that the range of $$f$$ is indeed $$y \\geq 2$$.\n- Step 3: In this case, the original function was likely $$f(x) = x^2 + 2$$ with domain $$x \\geq 0$$, whose range IS $$y \\geq 2$$. So the answers agree. But if the original function had a more restricted domain (e.g., $$x \\geq 3$$, giving range $$y \\geq 11$$), the formula method would give $$x \\geq 2$$ (wrong) while the correct domain would be $$x \\geq 11$$.\n\nAlways derive the domain of the inverse from the range of the original вЂ” the formula's natural domain is unreliable.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_15"}, {"question": "Similarly, the range of $$f^{-1}$$ equals what property of the original function $$f$$?", "answer": "The **range** of $$f^{-1}$$ equals the **domain** of $$f$$.\n\nSince $$f^{-1}$$ reverses $$f$$, the outputs of $$f^{-1}$$ are the original inputs to $$f$$. The set of all original inputs to $$f$$ is its domain, so that set becomes the range (all possible outputs) of $$f^{-1}$$.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_2"}, {"question": "Consider $$f(x) = 5$$, a constant function with domain $$x \\in \\mathbb{R}$. Can this function have an inverse function? Explain why or why not. (2 steps)", "answer": "- Step 1: No. $$f(x) = 5$$ maps every input to the same output: $$f(0) = 5$$, $$f(1) = 5$$, $$f(100) = 5$$, etc. This is **not one-to-one**.\n- Step 2: The \"inverse\" would need to map the single input $$5$$ to every real number simultaneously (since all real numbers map to $$5$$ under $$f$$). One input producing multiple outputs violates the definition of a function. Therefore, no inverse function exists.\n+ The range of $$f$$ is just $$\\{5\\}$$, a single value. Even if we tried to define $$f^{-1}$$ on domain $$\\{5\\}$$, it would need to output every real number, which is impossible for a function.\n\nA constant function is the extreme counterexample: maximum non-one-to-one behavior.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_11"}, {"question": "A student is asked to sketch $$y = \\ln(x)$$ and instead draws $$y = e^x$$. Why might this confusion occur, and how do you distinguish the two graphs using their key features? (3 steps)", "answer": "- Step 1: The confusion occurs because $$\\ln(x)$$ and $$e^x$$ are **inverse functions** of each other. Their graphs are reflections in $$y = x$$, so they share a similar \"curving\" shape but in opposite orientations.\n- Step 2: Key distinguishing features: $$y = e^x$$ passes through $$(0, 1)$$, increases rapidly, and has the $$x$$-axis ($$y = 0$$) as a **horizontal** asymptote. Domain: all real $$x$$; range: $$y > 0$$. $$y = \\ln(x)$$ passes through $$(1, 0)$$, increases slowly, and has the $$y$$-axis ($$x = 0$$) as a **vertical** asymptote. Domain: $$x > 0$$; range: all real $$y$$.\n- Step 3: Quick visual check: which axis has the asymptote? If **horizontal** (the graph flattens toward an axis), it's $$e^x$$. If **vertical** (the graph shoots up/down near a line), it's $$\\ln(x)$$.\n\nThe inverse relationship means their domains and ranges are swapped вЂ” if you remember that $$e^x$$ has range $$y > 0$$, then $$\\ln(x)$$ must have domain $$x > 0$$.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_10"}, {"question": "For $$f(x) = e^x$$ with domain $$x \\in \\mathbb{R}$$, what is $$f^{-1}(x)$$ and вЂ” critically вЂ” what is its domain, and how does this connect to the natural logarithm's properties? (3 steps)", "answer": "- Step 1: The inverse of $$e^x$$ is $$\\ln(x)$$. (Swap and solve: $$x = e^y \\Rightarrow y = \\ln x$$.)\n- Step 2: Domain of $$f^{-1} = \\ln(x)$$: the range of $$e^x$$ is $$y > 0$$, so the domain of $$\\ln$$ is $$x > 0$$.\n- Step 3: This is exactly *why* $$\\ln(x)$$ has the domain $$x > 0$$ вЂ” it's not an arbitrary restriction, it's because $$e^x$$ never outputs zero or a negative number. The vertical asymptote of $$\\ln(x)$$ at $$x = 0$$ is the reflection of the horizontal asymptote of $$e^x$$ at $$y = 0$$.\n\nTakeaway: $$\\ln$$'s domain isn't a random rule вЂ” it's $$e^x$$'s range, reflected.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_9"}, {"question": "If $$f(x) = x^2$$ on the restricted domain $$x \\geq 0$$, what is $$f^{-1}(x)$$ with its domain, and why does the domain restriction on $$f$$ matter so much? (3 steps)", "answer": "- Step 1: With domain $$x \\geq 0$$, $$f$$ is one-to-one (each output comes from one input), so the inverse exists. Solving: $$f^{-1}(x) = \\sqrt{x}$$ (positive root only).\n- Step 2: Range of $$f$$ on $$x \\geq 0$$ is $$y \\geq 0$$, so the domain of $$f^{-1}$$ is $$x \\geq 0$$.\n- Step 3: If we hadn't restricted $$f$$'s domain, $$x^2$$ wouldn't be invertible (both $$2$$ and $$-2$$ map to $$4$$). The domain restriction is what *makes the inverse exist*, and it then determines the inverse's range.\n\nTakeaway: domain restrictions and invertibility are inseparable вЂ” and they propagate into the inverse's definition.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_11"}, {"question": "The graph of $$y = f^{-1}(x)$$ is the reflection of $$y = f(x)$$ in the line $$y = x$$. How does this geometric fact explain why the domain of $$f^{-1}$$ equals the range of $$f$$? (3 steps)", "answer": "- Step 1: When you reflect a graph in the line $$y = x$$, every point $$(a, b)$$ on the original graph becomes $$(b, a)$$ on the reflected graph. The $$x$$-coordinate and $$y$$-coordinate swap.\n- Step 2: The domain of a function is the set of $$x$$-values covered by its graph (the horizontal extent). The range is the set of $$y$$-values covered (the vertical extent). After reflection, the old $$y$$-values become the new $$x$$-values, and the old $$x$$-values become the new $$y$$-values.\n- Step 3: Therefore, the horizontal extent of the reflected graph (domain of $$f^{-1}$$) is exactly the vertical extent of the original graph (range of $$f$$). And the vertical extent of the reflected graph (range of $$f^{-1}$$) is exactly the horizontal extent of the original graph (domain of $$f$$).\n\nReflection in $$y = x$$ is the geometric manifestation of the input-output swap.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_5"}, {"question": "When you reflect a graph in the line $$y = x$$, the domain and range swap. Explain this visually вЂ” why does the reflection cause this swap? (2 steps)", "answer": "- Step 1: Reflection in $$y = x$$ swaps the coordinates of every point: $$(a, b)$$ becomes $$(b, a)$$. This means the $$x$$-values of the new graph are the $$y$$-values of the original, and the $$y$$-values of the new graph are the $$x$$-values of the original.\n- Step 2: The set of all $$x$$-values of a graph is its **domain**, and the set of all $$y$$-values is its **range**. Since the reflection swaps $$x$$-values with $$y$$-values, the domain of the reflected graph ($$f^{-1}$$) equals the range of the original ($$f$$), and the range of the reflected graph ($$f^{-1}$$) equals the domain of the original ($$f$$).\n\nThe coordinate swap under reflection is the visual counterpart of the algebraic swap (Step 2 of finding $$f^{-1}$$).", "source": "GLM 5.1 в‘ў", "_id": "glm_3_9"}, {"question": "For the composite $$fg(x) = f(g(x))$$ to be defined at some input $$x$$, what must be true about the relationship between $$g$$'s output and $$f$$'s domain? (2 steps)", "answer": "- Step 1: The output of $$g(x)$$ must lie within the domain of $$f$$. If $$g$$ produces a value that $$f$$ can't accept, the composition breaks down at that point.\n- Step 2: For example, if $$g(x) = x - 3$$ and $$f(x) = \\sqrt{x}$$ with domain $$x \\geq 0$$, then $$fg(x) = \\sqrt{x-3}$$ is only defined when $$g(x) \\geq 0$$, i.e., when $$x - 3 \\geq 0$$, so $$x \\geq 3$$. Even though $$g$$ accepts all real $$x$$, the composite $$fg$$ only works for $$x \\geq 3$$.\n\nThe domain of a composite function is not simply the domain of the inner function вЂ” it's restricted to those inputs where the inner function's output is valid for the outer function.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_20"}, {"question": "Why can't you simply look at the formula for $$f^{-1}(x)$$ and read off its domain? Give a concrete counterexample. (2 steps)", "answer": "- Step 1: The formula for $$f^{-1}$$ may be defined for a wider set of inputs than the actual inverse function allows. The formula's \"natural domain\" includes all inputs that don't cause mathematical errors (division by zero, square roots of negatives, etc.), but the inverse function's domain is restricted to only those inputs that were actually outputs of $$f$$.\n- Step 2: Counterexample: $$f(x) = \\sqrt{x}$$ with domain $$x \\geq 0$$ has range $$y \\geq 0$$. The inverse is $$f^{-1}(x) = x^2$$. The formula $$x^2$$ is defined for all real $$x$$, but the domain of $$f^{-1}$$ is only $$x \\geq 0$$ (the range of $$f$$). If you allowed $$x = -3$$, then $$f^{-1}(-3) = 9$$, but $$f(9) = 3 \\neq -3$$ вЂ” the inverse doesn't undo $$f$$ for inputs outside the correct domain.\n\nThe formula lies; the range of $$f$$ tells the truth.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_14"}, {"question": "When defining any function (including an inverse), what two pieces of information must always be specified, and why is each necessary? (3 steps)", "answer": "- Step 1: A function requires the **rule/equation** вЂ” this tells you how an input is mapped to an output (e.g. $$f(x) = 2x+1$$).\n- Step 2: A function also requires the **domain** вЂ” the set of allowed inputs. Without a domain, the same rule can describe many different functions.\n+ Example: $$f(x) = x^2$$ on $$x \\geq 0$$ is invertible, but $$f(x)=x^2$$ on $$\\mathbb{R}$$ is not.\n+ The range is determined once the rule and domain are fixed, so it does not need to be stated separately.\n- Step 3: Conclusion: a function is the *pair* (rule, domain). Stating only the equation leaves the function ambiguous.\n\nTakeaway: \"Equation + domain\" is the minimum spec вЂ” a rule without a domain is not a complete function.", "source": "Opus 4.7 в‘Ў", "_id": "opus_2_0"}, {"question": "Why does the domain of $$f^{-1}$$ equal the *range* of $$f$$, rather than the domain of $$f$$? Explain the conceptual reasoning. (3 steps)", "answer": "- Step 1: The inverse function $$f^{-1}$$ reverses the mapping of $$f$$. If $$f$$ maps input $$a$$ to output $$b$$ (so $$f(a) = b$$), then $$f^{-1}$$ maps input $$b$$ back to output $$a$$ (so $$f^{-1}(b) = a$$).\n- Step 2: This means $$f^{-1}$$ can only accept as inputs the values that $$f$$ actually produces as outputs вЂ” those are exactly the elements of the **range** of $$f$$.\n- Step 3: The **domain** of $$f$$ is the set of inputs to $$f$$, which become the *outputs* of $$f^{-1}$$ (i.e., the range of $$f^{-1}$$), not the inputs to $$f^{-1}$$. So domain of $$f^{-1}$$ в‰  domain of $$f$$ in general.\n\nThe input-output roles are completely swapped under inversion.", "source": "GLM 5.1 в‘ў", "_id": "glm_3_3"}, {"question": "Why is it incorrect to write \"the inverse of f(x) = xВІ is fвЃ»В№(x) = В±в€љx\"? Explain the fundamental error.", "answer": "- Step 1: The symbol fвЃ»В№(x) denotes a **function** вЂ” by definition, a function must give exactly ONE output for each input.\n- Step 2: The expression В±в€љx gives TWO outputs for positive x (both +в€љx and -в€љx), which is not a function вЂ” it's a relation.\n- Step 3: To make an inverse function, we must choose ONE branch. We restrict the domain of the original function to either x в‰Ґ 0 (giving fвЃ»В№(x) = в€љx) or x в‰¤ 0 (giving fвЃ»В№(x) = -в€љx).\n- + The key insight: \"inverse function\" implies a true function, so we cannot have the В± ambiguity. Domain restriction is mandatory to make the inverse well-defined.", "source": "MiniMax в‘Ў", "_id": "minimax_2_18"}, {"question": "True or False: The inverse of f(x) = xВІ is fвЃ»В№(x) = в€љx. Explain your answer with domain considerations.", "answer": "FALSE вЂ” this statement is incomplete and potentially misleading.\n- Step 1: The function f(x) = xВІ, by default, has domain all real numbers (x в€€ в„ќ) and range y в‰Ґ 0.\n- Step 2: Since the range is y в‰Ґ 0 (not all real numbers), we can only define an inverse on this restricted range. The full function xВІ is not one-to-one, so it doesn't have a true inverse over its entire domain.\n- Step 3: To define an inverse, we must restrict the domain. If we restrict to x в‰Ґ 0, then fвЃ»В№(x) = в€љx with domain x в‰Ґ 0. If we restrict to x в‰¤ 0, then fвЃ»В№(x) = -в€љx with domain x в‰Ґ 0.\n- + The key insight: whenever we define an inverse, we must explicitly state the restricted domain of the original function that makes it one-to-one.", "source": "MiniMax в‘Ў", "_id": "minimax_2_3"}, {"question": "If $$f(x) = x^2 + 1$$ with domain $$x \\geq 0$$, explain what goes wrong if you find $$f^{-1}(x)$$ and state its domain as \"all real numbers.\" (3 steps)", "answer": "- Step 1: The range of $$f$$ is $$y \\geq 1$$ (since $$x^2 \\geq 0$$ for all $$x$$, so $$x^2 + 1 \\geq 1$$). Therefore the correct domain of $$f^{-1}$$ is $$x \\geq 1$$.\n- Step 2: The algebraic inverse is $$f^{-1}(x) = \\sqrt{x - 1}$$. If you incorrectly claim the domain is all reals, then someone might try to evaluate $$f^{-1}(0) = \\sqrt{0 - 1} = \\sqrt{-1}$$, which is not a real number вЂ” the function is undefined there.\n- Step 3: Even if you avoid negative inputs, consider $$f^{-1}(0.5) = \\sqrt{0.5 - 1} = \\sqrt{-0.5}$$, still undefined. The domain must be $$x \\geq 1$$ because values below 1 were never outputs of $$f$$, so the inverse has nothing to \"undo\" for those inputs. Claiming \"all reals\" makes the function ill-defined.\n\nForgetting the domain doesn't just lose marks вЂ” it produces a function that literally doesn't exist for certain inputs.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_3"}, {"question": "When defining any function (including an inverse), what two pieces of information must always be stated together, and why is one of them insufficient on its own?", "answer": "- Step 1: A function requires **both an equation/rule** (how inputs map to outputs) **and a domain** (the set of allowed inputs). Without the domain, the function is not fully specified.\n- Step 2: The reason: the same algebraic rule can behave very differently depending on what inputs you allow. For example, $$f(x) = x^2$$ on $$x \\geq 0$$ is one-to-one and invertible, but on all of $$\\mathbb{R}$$ it is not invertible. Same formula, fundamentally different function.\n- Step 3: So Harry's rule of thumb вЂ” *\"two things: the equation and the domain\"* вЂ” exists because the rule alone doesn't determine the function's range, its invertibility, or even whether it's well-defined.\n\nTakeaway: a function = rule + domain. Forgetting the domain is forgetting half the function.", "source": "Opus 4.7 в‘ ", "_id": "opus_1_0"}, {"question": "The domain of $$f^{-1}$$ equals the range of $$f$$. Explain why this must be true, using the idea that $$f^{-1}$$ \"undoes\" $$f$$. (2 steps)", "answer": "- Step 1: The range of $$f$$ is the set of all outputs that $$f$$ produces. These outputs are the only values that $$f^{-1}$$ can possibly receive as inputs, because $$f^{-1}$$ maps you back from an output of $$f$$ to the original input.\n- Step 2: If a value $$y_0$$ is NOT in the range of $$f$$, then no input to $$f$$ ever produced $$y_0$$. So $$f^{-1}(y_0)$$ has no meaning вЂ” there's nothing to \"undo.\" Therefore the domain of $$f^{-1}$$ is exactly the range of $$f$$: only values that $$f$$ actually produced can be fed back into $$f^{-1}$$.\n\nThis is a logical necessity, not a convention. The inverse function's domain is constrained by what the original function can output.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_8"}, {"question": "Why does the domain of $$f^{-1}$$ equal the range of $$f$$, and the range of $$f^{-1}$$ equal the domain of $$f$$? Explain using the input-output swap. (3 steps)", "answer": "- Step 1: The inverse function $$f^{-1}$$ reverses what $$f$$ does. If $$f$$ maps input $$a$$ to output $$b$$ (i.e., $$f(a) = b$$), then $$f^{-1}$$ maps input $$b$$ to output $$a$$ (i.e., $$f^{-1}(b) = a$$).\n- Step 2: Notice that the **output** of $$f$$ becomes the **input** of $$f^{-1}$$. So the set of all outputs of $$f$$ (the range of $$f$$) is exactly the set of all valid inputs of $$f^{-1}$$ (the domain of $$f^{-1}$$). Hence: domain of $$f^{-1}$$ = range of $$f$$.\n- Step 3: By the same logic in reverse, the outputs of $$f^{-1}$$ are the original inputs of $$f$$. So the set of all outputs of $$f^{-1}$$ (range of $$f^{-1}$$) equals the set of all valid inputs of $$f$$ (domain of $$f$$). Hence: range of $$f^{-1}$$ = domain of $$f$$.\n\nThe inverse is a perfect role-reversal: inputs and outputs trade places.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_4"}, {"question": "For an inverse function to exist, the original function must be one-to-one. Explain what \"one-to-one\" means, and why it's necessary for an inverse. (3 steps)", "answer": "- Step 1: A function is **one-to-one (injective)** if each output comes from exactly one input. Formally: if $$f(a) = f(b)$$, then $$a = b$$. Graphically, the function passes the **horizontal line test** вЂ” no horizontal line intersects the graph more than once.\n- Step 2: An inverse function must map each output back to the input that produced it. If $$f$$ maps two different inputs to the same output (i.e., $$f(a) = f(b)$$ with $$a \\neq b$$), then the inverse would need to map that single output to two different inputs вЂ” which violates the definition of a function (one input в†’ one output).\n- Step 3: This is why $$f(x) = x^2$$ on all of $$\\mathbb{R}$$ has no inverse (both $$x = 2$$ and $$x = -2$$ give output 4), but $$f(x) = x^2$$ restricted to $$x \\geq 0$$ does have an inverse ($$f^{-1}(x) = \\sqrt{x}$$). The domain restriction makes it one-to-one.\n\nNo one-to-one в†’ no inverse. Domain restrictions can rescue invertibility.", "source": "GLM 5.1 в‘Ў", "_id": "glm_2_9"}, {"question": "The domain and range swap between $$f$$ and $$f^{-1}$$. How does the reflection in $$y = x$$ explain this geometrically? (2 steps)", "answer": "- Step 1: The domain of $$f$$ is the set of $$x$$-values (horizontal extent) of its graph. After reflection in $$y = x$$, horizontal distances become vertical distances and vice versa. So the horizontal extent of $$f$$ becomes the vertical extent of $$f^{-1}$$.\n- Step 2: Specifically:\n  + Domain of $$f$$ (horizontal extent of $$f$$'s graph) в†’ becomes the vertical extent of $$f^{-1}$$'s graph в†’ range of $$f^{-1}$$\n  + Range of $$f$$ (vertical extent of $$f$$'s graph) в†’ becomes the horizontal extent of $$f^{-1}$$'s graph в†’ domain of $$f^{-1}$$\n\nThe reflection literally swaps the roles of $$x$$ and $$y$$, which swaps domain and range. This is the geometric reason behind the algebraic rule.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_28"}, {"question": "If fg(x) represents f(g(x)), and both f and fвЃ»В№ exist, what is (fg)вЃ»В№ equal to? Explain using the concept of \"undoing\" operations.", "answer": "- Step 1: The composite fg means: first apply g, then apply f to the result.\n- Step 2: To undo this composite, we must undo in reverse order: first undo f (by applying fвЃ»В№), then undo g (by applying gвЃ»В№).\n- + So (fg)вЃ»В№ = gвЃ»В№fвЃ»В№ (note the reversed order!)\n- + Example: If f = \"add 2\" and g = \"multiply by 3\", then fg(x) = 3x + 2. To undo: subtract 2, then divide by 3. That's gвЃ»В№(fвЃ»В№(x)) = (x - 2)/3.\n- + This is a common source of errors вЂ” students often forget to reverse the order.", "source": "MiniMax в‘Ў", "_id": "minimax_2_16"}], "models": {"glm_1": {"label": "GLM 5.1 в‘ ", "cards": [{"question": "Two curves $$y = f(x)$$ and $$y = g(x)$$ intersect at point $$P$$. What equation must hold at $$P$$, and what algebraic form should you rearrange it into before solving? (2 steps)", "answer": "- Step 1: At any intersection point $$P$$ with $$x$$-coordinate $$x_P$$, both curves share the same $$y$$-value, so $$f(x_P) = g(x_P)$$. \"Intersection\" literally means the curves agree on both coordinates.\n- Step 2: Rearrange everything to one side to get a polynomial equal to zero: $$h(x) = 0$$. This standard form exposes the roots directly and lets you apply factorisation or the quadratic formula. Never try to solve with the polynomial split across two sides.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_0", "judge_pick": false}, {"question": "When solving for intersection points, a student miscopies a coefficient (e.g., writes $$2x^2$$ instead of $$x^2$$). What two practical strategies catch this error? (2 steps)", "answer": "- Step 1: Before solving, compare your rearranged equation back to the original equations term-by-term. A 5-second side-by-side check catches most transcription errors.\n- Step 2: After finding intersection points, substitute them back into both original equations. If a point doesn't satisfy both, you've made an algebraic or copying error. Under exam pressure, this verification is the safety net that prevents losing all marks on a question.\n\nHarry's lesson: \"I think you've miscopied the quadratic actually.\" Double-check before you solve.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_1", "judge_pick": false}, {"question": "What is the domain of $$f(x) = \\ln(x)$$, and what goes wrong if you try to evaluate $$\\ln(0)$$ or $$\\ln(-1)$$? (2 steps)", "answer": "- Step 1: The domain of $$\\ln(x)$$ is $$x > 0$$. The natural logarithm is only defined for positive inputs.\n- Step 2: Understanding why from the definition вЂ” $$\\ln(x)$$ asks \"e raised to what power gives $$x$$?\":\n  + $$\\ln(0)$$: there is no real power of $$e$$ that equals 0, since $$e^{\\text{anything}} > 0$$ always. Undefined.\n  + $$\\ln(-1)$$: no real power of $$e$$ produces a negative number. Undefined.\n  \nThe vertical asymptote at $$x = 0$$ on the graph of $$\\ln(x)$$ visually represents this boundary вЂ” the function approaches $$-\\infty$$ but never reaches $$x = 0$$.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_2", "judge_pick": true}, {"question": "What is the range of $$f(x) = \\ln(x)$$? Explain by considering the behaviour as $$x \\to 0^+$$ and as $$x \\to \\infty$$. (2 steps)", "answer": "- Step 1: The range of $$\\ln(x)$$ is all real numbers: $$y \\in \\mathbb{R}$$, or equivalently $$(-\\infty, \\infty)$$.\n- Step 2: The graph explains why:\n  + As $$x \\to 0^+$$ (approaching 0 from the right), $$\\ln(x) \\to -\\infty$$. The function plunges downward without bound.\n  + As $$x \\to \\infty$$, $$\\ln(x) \\to \\infty$$. The function grows without bound, though extremely slowly.\n  \nSince $$\\ln(x)$$ passes through every value from $$-\\infty$$ to $$\\infty$$ continuously, its range covers all real numbers. This contrasts sharply with $$e^x$$, whose range is only $$y > 0$$.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_3", "judge_pick": false}, {"question": "A student sketches $$y = e^x$$ when asked for $$y = \\ln(x)$$. Give two key visual features that distinguish these graphs. (2 steps)", "answer": "- Step 1: Asymptote direction:\n  + $$y = e^x$$: horizontal asymptote at $$y = 0$$ (approaches 0 as $$x \\to -\\infty$$), shoots upward rapidly for positive $$x$$. Domain: all real $$x$$. Range: $$y > 0$$.\n  + $$y = \\ln(x)$$: vertical asymptote at $$x = 0$$, rises slowly for positive $$x$$. Domain: $$x > 0$$. Range: all real $$y$$.\n- Step 2: Key landmark points:\n  + $$\\ln(x)$$ passes through $$(1, 0)$$ because $$\\ln(1) = 0$$ (since $$e^0 = 1$$).\n  + $$e^x$$ passes through $$(0, 1)$$ because $$e^0 = 1$$.\n  \nThese points are reflections of each other in $$y = x$$, which makes sense вЂ” the two functions are inverses! Quick mental check: vertical asymptote = $$\\ln$$, horizontal asymptote = $$e^x$$.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_4", "judge_pick": false}, {"question": "Without memorising, explain why $$\\ln(1) = 0$$ using the definition of natural logarithm. (2 steps)", "answer": "- Step 1: By definition, $$\\ln(x)$$ means \"the power you raise $$e$$ to, to get $$x$$.\" So $$\\ln(1)$$ asks: what power of $$e$$ equals 1?\n- Step 2: Since $$e^0 = 1$$ (any non-zero number raised to the power 0 equals 1), the answer is 0. Therefore $$\\ln(1) = 0$$.\n\nThis is why the graph of $$y = \\ln(x)$$ always passes through $$(1, 0)$$ вЂ” it's a logical consequence of what logarithms mean, not an arbitrary fact.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_5", "judge_pick": false}, {"question": "What are the four steps to find $$f^{-1}(x)$$ algebraically? (4 steps)", "answer": "- Step 1: Replace $$f(x)$$ with $$y$$: write $$y = f(x)$$. This frees up the notation so you can manipulate the equation freely.\n- Step 2: Swap $$x$$ and $$y$$: write $$x = f(y)$$. This is the algebraic expression of \"reversing the roles of input and output\" вЂ” what was the output becomes the input and vice versa.\n- Step 3: Solve for $$y$$: rearrange to make $$y$$ the subject. This $$y$$ is your $$f^{-1}(x)$$.\n- Step 4: State the domain of $$f^{-1}(x)$$. This equals the range of the original function $$f(x)$$. Without this, you have not fully defined a function.\n\nThe swap in Step 2 is the heart of the inverse вЂ” you're literally reversing the mapping direction. Step 4 is the step most commonly forgotten.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_6", "judge_pick": false}, {"question": "When defining an inverse function $$f^{-1}(x)$$, why must you always state the domain? What goes wrong if you omit it? (3 steps)", "answer": "- Step 1: A function is defined by TWO things: its rule (equation) AND its domain. Without a domain, you don't have a function вЂ” you just have an expression floating without context.\n- Step 2: The domain of $$f^{-1}$$ is inherited from the range of $$f$$. For example, if $$f(x) = x^2$$ with domain $$x \\geq 0$$, then range of $$f$$ is $$y \\geq 0$$, so domain of $$f^{-1}$$ is $$x \\geq 0$$. If you write $$f^{-1}(x) = \\sqrt{x}$$ without stating $$x \\geq 0$$, someone might misunderstand the function's scope or try invalid inputs.\n- Step 3: In exams, marks are specifically allocated for stating the domain. Omitting it loses these marks even if your equation is perfectly correct. The domain is not optional decoration вЂ” it's a fundamental part of the function's identity.\n\nHarry's warning: \"whenever we define a function we need two things... the equation... But two, we need to give the domain as well.\"", "source": "GLM 5.1 в‘ ", "_id": "glm_1_7", "judge_pick": false}, {"question": "The domain of $$f^{-1}$$ equals the range of $$f$$. Explain why this must be true, using the idea that $$f^{-1}$$ \"undoes\" $$f$$. (2 steps)", "answer": "- Step 1: The range of $$f$$ is the set of all outputs that $$f$$ produces. These outputs are the only values that $$f^{-1}$$ can possibly receive as inputs, because $$f^{-1}$$ maps you back from an output of $$f$$ to the original input.\n- Step 2: If a value $$y_0$$ is NOT in the range of $$f$$, then no input to $$f$$ ever produced $$y_0$$. So $$f^{-1}(y_0)$$ has no meaning вЂ” there's nothing to \"undo.\" Therefore the domain of $$f^{-1}$$ is exactly the range of $$f$$: only values that $$f$$ actually produced can be fed back into $$f^{-1}$$.\n\nThis is a logical necessity, not a convention. The inverse function's domain is constrained by what the original function can output.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_8", "judge_pick": true}, {"question": "Find $$f^{-1}(x)$$ for $$f(x) = 2x + 3$$ with domain $$x \\in \\mathbb{R}$$, and state the domain of $$f^{-1}$$. (3 steps)", "answer": "- Step 1: Let $$y = 2x + 3$$. Swap $$x$$ and $$y$$: $$x = 2y + 3$$.\n- Step 2: Solve for $$y$$: $$x - 3 = 2y$$, so $$y = \\frac{x-3}{2}$$. Therefore $$f^{-1}(x) = \\frac{x-3}{2}$$.\n- Step 3: Since $$f$$ has domain $$x \\in \\mathbb{R}$$ and range $$y \\in \\mathbb{R}$$ (a linear function with non-zero slope covers all real outputs), the domain of $$f^{-1}$$ is $$x \\in \\mathbb{R}$$.\n\nThe inverse of a linear function is always linear вЂ” reversing a straight-line mapping gives another straight line.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_9", "judge_pick": false}, {"question": "$$f(x) = x^2$$ with domain $$x \\geq 0$$. Find the range of $$f$$, and hence state the domain of $$f^{-1}$$. (2 steps)", "answer": "- Step 1: When $$x \\geq 0$$, squaring gives $$x^2 \\geq 0$$. The smallest value is 0 (at $$x = 0$$), and as $$x$$ increases, $$x^2$$ increases without bound. So the range of $$f$$ is $$y \\geq 0$$, or $$[0, \\infty)$$.\n- Step 2: The domain of $$f^{-1}$$ equals the range of $$f$$, so domain of $$f^{-1}$$ is $$x \\geq 0$$. The inverse is $$f^{-1}(x) = \\sqrt{x}$$ with domain $$x \\geq 0$$.\n\nNotice: without the restriction $$x \\geq 0$$ on $$f$$, the function wouldn't be one-to-one (both $$x = 2$$ and $$x = -2$$ give $$y = 4$$), and no inverse would exist. The domain restriction is what makes the inverse possible.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_10", "judge_pick": false}, {"question": "A student finds $$f^{-1}(x) = \\sqrt{x}$$ and writes only \"$$f^{-1}(x) = \\sqrt{x}$$\" as their complete answer. What critical piece of information is missing, and why does it matter even when the domain might seem \"obvious\"? (2 steps)", "answer": "- Step 1: The student has omitted the domain. A function requires both a rule AND a domain. Writing only the equation is like giving a phone number without an area code вЂ” incomplete and potentially misleading.\n- Step 2: Even if $$\\sqrt{x}$$ seems obviously defined for $$x \\geq 0$$, the domain of $$f^{-1}$$ comes from the range of $$f$$, not from the algebra of $$f^{-1}$$ itself. If $$f$$ had range $$x > 1$$, then $$f^{-1}(x) = \\sqrt{x}$$ would have domain $$x > 1$$, not $$x \\geq 0$$. Stating the domain explicitly removes all ambiguity and shows you understand where it comes from.\n\nThis was Harry's key correction: you must always state the domain when defining a function.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_11", "judge_pick": false}, {"question": "$$f(x) = x^2$$ with domain $$x \\in \\mathbb{R}$$ (all real numbers). Explain why $$f^{-1}$$ does not exist in this case. (2 steps)", "answer": "- Step 1: For an inverse to exist, $$f$$ must be one-to-one (injective): each output must come from exactly one input. But $$f(x) = x^2$$ fails this: $$f(3) = 9$$ and $$f(-3) = 9$$. The same output comes from two different inputs.\n- Step 2: If we tried to define $$f^{-1}(9)$$, should it return 3 or -3? There's no unique answer, so $$f^{-1}$$ is not a function (a function must give exactly one output for each input). The inverse simply doesn't exist as a function unless we restrict the domain (e.g., $$x \\geq 0$$ or $$x \\leq 0$$) to make $$f$$ one-to-one.\n\nThis is why domain restrictions matter вЂ” they can turn a non-invertible function into an invertible one.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_12", "judge_pick": true}, {"question": "$$f(x) = 3x - 1$$ with domain $$x > 0$$. What is the range of $$f$$, and hence what domain must you state for $$f^{-1}$$? (2 steps)", "answer": "- Step 1: When $$x > 0$$, then $$3x > 0$$, so $$3x - 1 > -1$$. As $$x$$ increases from just above 0, $$f(x)$$ increases from just above $$-1$$ without bound. The range of $$f$$ is $$y > -1$$.\n- Step 2: The domain of $$f^{-1}$$ equals the range of $$f$$, so domain of $$f^{-1}$$ is $$x > -1$$. The inverse function is $$f^{-1}(x) = \\frac{x+1}{3}$$ with domain $$x > -1$$.\n\nEven though the equation $$\\frac{x+1}{3}$$ is defined for all real $$x$$, the domain restriction $$x > -1$$ must be stated because it comes from the range of $$f$$, not from the algebra of $$f^{-1}$$ itself.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_13", "judge_pick": false}, {"question": "A student claims \"the domain of $$f^{-1}$$ is the same as the domain of $$f$$.\" Why is this wrong, and what is the correct relationship? (2 steps)", "answer": "- Step 1: The correct relationship is: domain of $$f^{-1}$$ = range of $$f$$, and range of $$f^{-1}$$ = domain of $$f$$. The domain and range swap between a function and its inverse.\n- Step 2: This makes logical sense because $$f^{-1}$$ reverses the mapping of $$f$$. The inputs to $$f$$ become outputs of $$f^{-1}$$, and the outputs of $$f$$ become inputs to $$f^{-1}$$. So what was the domain (input set) of $$f$$ is now the range (output set) of $$f^{-1}$$, and vice versa.\n\nExample: $$f(x) = e^x$$ has domain $$x \\in \\mathbb{R}$$ and range $$y > 0$$. Its inverse $$f^{-1}(x) = \\ln(x)$$ has domain $$x > 0$$ and range $$y \\in \\mathbb{R}$$. The domain and range have swapped.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_14", "judge_pick": false}, {"question": "What does the notation $$f^{-1}$$ mean in the context of functions? Is it the same as $$\\frac{1}{f}$$? (2 steps)", "answer": "- Step 1: $$f^{-1}$$ denotes the inverse function of $$f$$ вЂ” the function that \"undoes\" $$f$$. If $$f(a) = b$$, then $$f^{-1}(b) = a$$. It reverses the mapping.\n- Step 2: $$f^{-1}$$ is NOT the same as $$\\frac{1}{f}$$. The notation $$^{-1}$$ on a function name means \"inverse,\" not \"reciprocal.\" For example, if $$f(x) = x + 3$$, then $$f^{-1}(x) = x - 3$$ (the inverse function), while $$\\frac{1}{f(x)} = \\frac{1}{x+3}$$ (the reciprocal). These are completely different things.\n\nThis is a common notational confusion, especially since $$^{-1}$$ on numbers means reciprocal. Context matters: on function names, $$^{-1}$$ means inverse.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_15", "judge_pick": false}, {"question": "How can you verify that $$g(x)$$ is truly the inverse of $$f(x)$$? What two compositions must you check? (2 steps)", "answer": "- Step 1: Check that $$f(g(x)) = x$$ for all $$x$$ in the domain of $$g$$. This confirms that applying $$g$$ then $$f$$ brings you back to the starting value вЂ” $$f$$ undoes $$g$$.\n- Step 2: Check that $$g(f(x)) = x$$ for all $$x$$ in the domain of $$f$$. This confirms that applying $$f$$ then $$g$$ also brings you back вЂ” $$g$$ undoes $$f$$.\n\nBoth compositions must equal $$x$$. If only one works, something is wrong (often a domain issue). This verification is the definitive test for whether you've found the correct inverse.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_16", "judge_pick": false}, {"question": "What does the notation $$fg(x)$$ mean вЂ” which function is applied first, and why might this be confusing? (2 steps)", "answer": "- Step 1: $$fg(x)$$ means $$f(g(x))$$. You apply $$g$$ first to the input $$x$$, then apply $$f$$ to the result. Think of it as reading from inside out: the innermost function acts first.\n- Step 2: The notation can be confusing because $$fg(x)$$ looks like \"f times g\" but it's actually \"f of g\" вЂ” function composition, not multiplication. If $$g(x) = x^2$$ and $$f(x) = x + 1$$, then $$fg(x) = f(x^2) = x^2 + 1$$. You square first (g), then add 1 (f).\n\nAlways read composition from the inside out: whatever is closest to $$x$$ acts first.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_17", "judge_pick": false}, {"question": "In general, $$fg(x) \\neq gf(x)$$. Give a conceptual explanation for why function composition is not commutative, using an analogy. (2 steps)", "answer": "- Step 1: $$fg(x) = f(g(x))$$ applies $$g$$ first, then $$f$$. $$gf(x) = g(f(x))$$ applies $$f$$ first, then $$g$$. These are different operations in different orders вЂ” the second function operates on the output of the first, and different starting points generally lead to different results.\n- Step 2: Think of it like getting dressed: putting on socks then shoes ($$fg$$) is very different from putting on shoes then socks ($$gf$$). The order of operations matters because each step transforms the situation, and transforming from a different starting point gives a different outcome.\n\nOnly in special cases (like both being linear functions with particular relationships) does composition commute.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_18", "judge_pick": false}, {"question": "$$f(x) = x + 1$$ and $$g(x) = 2x$$. Find $$fg(3)$$ and $$gf(3)$$ to show they differ. (2 steps)", "answer": "- Step 1: $$fg(3) = f(g(3)) = f(2 \\times 3) = f(6) = 6 + 1 = 7$$. Apply $$g$$ first (double it в†’ 6), then $$f$$ (add 1 в†’ 7).\n- Step 2: $$gf(3) = g(f(3)) = g(3 + 1) = g(4) = 2 \\times 4 = 8$$. Apply $$f$$ first (add 1 в†’ 4), then $$g$$ (double it в†’ 8).\n\nSince $$7 \\neq 8$$, we've confirmed $$fg(3) \\neq gf(3)$$. The order of composition matters even for simple functions.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_19", "judge_pick": false}, {"question": "For the composite $$fg(x) = f(g(x))$$ to be defined at some input $$x$$, what must be true about the relationship between $$g$$'s output and $$f$$'s domain? (2 steps)", "answer": "- Step 1: The output of $$g(x)$$ must lie within the domain of $$f$$. If $$g$$ produces a value that $$f$$ can't accept, the composition breaks down at that point.\n- Step 2: For example, if $$g(x) = x - 3$$ and $$f(x) = \\sqrt{x}$$ with domain $$x \\geq 0$$, then $$fg(x) = \\sqrt{x-3}$$ is only defined when $$g(x) \\geq 0$$, i.e., when $$x - 3 \\geq 0$$, so $$x \\geq 3$$. Even though $$g$$ accepts all real $$x$$, the composite $$fg$$ only works for $$x \\geq 3$$.\n\nThe domain of a composite function is not simply the domain of the inner function вЂ” it's restricted to those inputs where the inner function's output is valid for the outer function.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_20", "judge_pick": true}, {"question": "State the condition (including the crucial assumption) that guarantees a root exists in the interval $$(a, b)$$ for a function $$f$$. (2 steps)", "answer": "- Step 1: If $$f(a)$$ and $$f(b)$$ have opposite signs (one positive, one negative), and $$f(x)$$ is continuous on $$[a, b]$$, then there exists at least one root in the interval $$(a, b)$$.\n- Step 2: The continuity condition is essential and must be explicitly stated. A sign change alone is not sufficient вЂ” the function must not have any \"jumps\" or \"breaks\" in the interval. If the function is discontinuous, it could jump from negative to positive without ever crossing zero.\n\nHarry's correction: \"There is something we need to add to that, and that is to say that g of x is continuous on this interval.\" Always state continuity.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_21", "judge_pick": false}, {"question": "Give a counterexample showing that a sign change between $$f(a)$$ and $$f(b)$$ does NOT guarantee a root if continuity is not assumed. (2 steps)", "answer": "- Step 1: Consider $$f(x) = \\frac{1}{x}$$ on the interval $$[-1, 1]$$. We have $$f(-1) = -1$$ (negative) and $$f(1) = 1$$ (positive) вЂ” a sign change exists.\n- Step 2: However, $$f(x) = \\frac{1}{x}$$ is undefined at $$x = 0$$ and has a discontinuity there. The function jumps from $$-\\infty$$ to $$+\\infty$$ without ever equalling zero. There is no root in $$(-1, 1)$$, despite the sign change.\n\nThis counterexample proves why the continuity condition cannot be omitted from the sign change theorem. Without continuity, the sign change tells you nothing.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_22", "judge_pick": false}, {"question": "$$f(1) = -3$$ and $$f(3) = 5$$. Can you conclude there is a root in $$(1, 3)$$? What must you also state for the conclusion to be valid? (2 steps)", "answer": "- Step 1: $$f(1) = -3 < 0$$ and $$f(3) = 5 > 0$$, so there is a sign change. This suggests a root might exist.\n- Step 2: You can only conclude a root exists if $$f$$ is continuous on $$[1, 3]$$. The complete correct statement is: \"Since $$f(1) < 0$$, $$f(3) > 0$$, and $$f$$ is continuous on $$[1, 3]$$, there is a root in the interval $$(1, 3)$$.\"\n\nIn exams, failing to mention continuity will cost marks even if everything else is correct. Make it automatic: sign change + continuity = root exists.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_23", "judge_pick": false}, {"question": "To solve $$f(x) = 0$$ using iteration, what form do you rearrange the equation into, and what is the general iterative formula? (2 steps)", "answer": "- Step 1: Rearrange $$f(x) = 0$$ into the form $$x = g(x)$$, where $$g$$ is some function of $$x$$. This isolates $$x$$ on one side, creating a \"fixed point\" equation.\n- Step 2: The iterative formula is $$x_{n+1} = g(x_n)$$. Starting from an initial value $$x_0$$, substitute into $$g$$ to get $$x_1$$, then substitute $$x_1$$ into $$g$$ to get $$x_2$$, and so on. If the iteration converges, $$x_n$$ approaches a root of $$f(x) = 0$$.\n\nThe key insight: at a root $$\\alpha$$, we have $$\\alpha = g(\\alpha)$$, so the root is a \"fixed point\" of $$g$$. The iteration homes in on this fixed point.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_24", "judge_pick": false}, {"question": "Describe the efficient calculator technique for performing iterative calculations $$x_{n+1} = g(x_n)$$. (2 steps)", "answer": "- Step 1: Store the starting value $$x_0$$ in the calculator's \"Ans\" memory. Type $$x_0$$ and press = so it becomes the current Ans value.\n- Step 2: Type the formula $$g$$ in terms of Ans (e.g., type \"cos(Ans)\" if $$g(x) = \\cos(x)$$). Each press of = substitutes the current Ans into $$g$$, computes the new value, and updates Ans automatically. Pressing = repeatedly generates $$x_1, x_2, x_3, \\ldots$$ without retyping.\n\nThis eliminates transcription errors and speeds up the process enormously. Just make sure you type the formula correctly the first time!", "source": "GLM 5.1 в‘ ", "_id": "glm_1_25", "judge_pick": false}, {"question": "When an iteration $$x_{n+1} = g(x_n)$$ converges to a root $$\\alpha$$, what equation does $$\\alpha$$ satisfy, and what happens to the difference between successive values? (2 steps)", "answer": "- Step 1: As the iteration converges, the difference between successive values shrinks: $$|x_{n+1} - x_n| \\to 0$$. The values \"settle down\" to a limiting value.\n- Step 2: At the limit, $$x_{n+1} = x_n = \\alpha$$, so $$\\alpha = g(\\alpha)$$. The root $$\\alpha$$ is a fixed point of $$g$$ вЂ” plugging it in gives back the same value. This is why the rearrangement $$x = g(x)$$ works: the fixed point of $$g$$ is exactly the root of $$f(x) = 0$$.\n\nConvergence means the iteration has found the solution to $$x = g(x)$$, which is equivalent to $$f(x) = 0$$.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_26", "judge_pick": false}, {"question": "How is the graph of $$y = f^{-1}(x)$$ related to the graph of $$y = f(x)$$? Name the geometric transformation and explain why it works. (2 steps)", "answer": "- Step 1: The graph of $$y = f^{-1}(x)$$ is the reflection of $$y = f(x)$$ in the line $$y = x$$.\n- Step 2: Reflection in $$y = x$$ swaps the $$x$$ and $$y$$ coordinates of every point. If $$(a, b)$$ lies on $$y = f(x)$$ (meaning $$f(a) = b$$), then $$(b, a)$$ lies on $$y = f^{-1}(x)$$ (meaning $$f^{-1}(b) = a$$). This coordinate swap is exactly what reflecting in $$y = x$$ does вЂ” and it's exactly what the inverse function does logically.\n\nYou can use this to sketch $$f^{-1}$$: draw $$f$$, draw the line $$y = x$$, then \"flip\" the curve over that line.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_27", "judge_pick": false}, {"question": "The domain and range swap between $$f$$ and $$f^{-1}$$. How does the reflection in $$y = x$$ explain this geometrically? (2 steps)", "answer": "- Step 1: The domain of $$f$$ is the set of $$x$$-values (horizontal extent) of its graph. After reflection in $$y = x$$, horizontal distances become vertical distances and vice versa. So the horizontal extent of $$f$$ becomes the vertical extent of $$f^{-1}$$.\n- Step 2: Specifically:\n  + Domain of $$f$$ (horizontal extent of $$f$$'s graph) в†’ becomes the vertical extent of $$f^{-1}$$'s graph в†’ range of $$f^{-1}$$\n  + Range of $$f$$ (vertical extent of $$f$$'s graph) в†’ becomes the horizontal extent of $$f^{-1}$$'s graph в†’ domain of $$f^{-1}$$\n\nThe reflection literally swaps the roles of $$x$$ and $$y$$, which swaps domain and range. This is the geometric reason behind the algebraic rule.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_28", "judge_pick": true}, {"question": "To solve the equation $$f(x) = x$$ graphically, what do you look for on the graph of $$y = f(x)$$? (2 steps)", "answer": "- Step 1: The equation $$f(x) = x$$ asks: for which $$x$$-values does the function output the same value as its input? Graphically, $$y = f(x)$$ equals $$y = x$$ at these points.\n- Step 2: Therefore, the solutions are the $$x$$-coordinates where the graph of $$y = f(x)$$ intersects the line $$y = x$$. Each intersection point $$(a, a)$$ gives a solution $$x = a$$.\n\nThis also connects to inverse functions: if $$f(a) = a$$, then $$f^{-1}(a) = a$$ too. Points where $$f$$ intersects $$y = x$$ are fixed points shared by both $$f$$ and $$f^{-1}$$.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_29", "judge_pick": false}, {"question": "If the point $$(3, 7)$$ lies on the graph of $$y = f(x)$$, what point must lie on the graph of $$y = f^{-1}(x)$$, and why? (2 steps)", "answer": "- Step 1: $$(3, 7)$$ on $$y = f(x)$$ means $$f(3) = 7$$. The inverse function reverses this: $$f^{-1}(7) = 3$$.\n- Step 2: $$f^{-1}(7) = 3$$ means the point $$(7, 3)$$ lies on $$y = f^{-1}(x)$$. The coordinates swap, which is exactly the reflection in $$y = x$$: $$(3, 7) \\to (7, 3)$$.\n\nQuick check for any inverse: pick a point on $$f$$, swap coordinates, and you have the corresponding point on $$f^{-1}$$.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_30", "judge_pick": true}, {"question": "$$f$$ has domain $$[2, 5]$$ and range $$[-1, 3]$$. What are the domain and range of $$f^{-1}$$? (2 steps)", "answer": "- Step 1: Domain of $$f^{-1}$$ = Range of $$f$$ = $$[-1, 3]$$. The inputs to $$f^{-1}$$ are the outputs of $$f$$.\n- Step 2: Range of $$f^{-1}$$ = Domain of $$f$$ = $$[2, 5]$$. The outputs of $$f^{-1}$$ are the inputs of $$f$$.\n\nThe swap is mechanical: whatever $$f$$ takes in, $$f^{-1}$$ puts out; whatever $$f$$ puts out, $$f^{-1}$$ takes in. Domain в†” Range simply exchange.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_31", "judge_pick": false}, {"question": "If $$f$$ is strictly increasing, what can you say about whether $$f^{-1}$$ is increasing or decreasing? Explain using the reflection in $$y = x$$. (2 steps)", "answer": "- Step 1: If $$f$$ is strictly increasing, then $$f^{-1}$$ is also strictly increasing. As you move right along $$f$$'s graph, the $$y$$-values increase. After reflecting in $$y = x$$, moving right along $$f^{-1}$$'s graph corresponds to increasing $$y$$-values on $$f$$ (which become $$x$$-values on $$f^{-1}$$), and the output also increases.\n- Step 2: Intuitively: if larger inputs to $$f$$ give larger outputs, then larger inputs to $$f^{-1}$$ (which were outputs of $$f$$) correspond to larger outputs of $$f^{-1}$$ (which were inputs of $$f$$). The increasing property is preserved by the reflection.\n\nUseful for sketching: if you know $$f$$ increases, you know $$f^{-1}$$ also increases вЂ” no need to compute specific points.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_32", "judge_pick": false}, {"question": "State the double angle formula for $$\\sin(2A)$$. A common mistake is omitting a coefficient вЂ” what is it, and where does it come from? (2 steps)", "answer": "- Step 1: The formula is $$\\sin(2A) = 2\\sin(A)\\cos(A)$$.\n- Step 2: The common mistake is writing $$\\sin(2A) = \\sin(A)\\cos(A)$$, missing the coefficient 2. This coefficient arises because $$\\sin(2A)$$ comes from the addition formula $$\\sin(A + A) = \\sin(A)\\cos(A) + \\cos(A)\\sin(A) = 2\\sin(A)\\cos(A)$$. The two identical terms combine to give the factor of 2.\n\nHarry's correction: \"Do you see what you're missing here? You're missing the 2.\" Always verify the coefficient is present.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_33", "judge_pick": false}, {"question": "State all three equivalent forms of the double angle formula for $$\\cos(2A)$$. (3 steps)", "answer": "- Step 1: $$\\cos(2A) = \\cos^2(A) - \\sin^2(A)$$. This comes directly from the addition formula: $$\\cos(A + A) = \\cos(A)\\cos(A) - \\sin(A)\\sin(A)$$.\n- Step 2: $$\\cos(2A) = 2\\cos^2(A) - 1$$. Derived by replacing $$\\sin^2(A)$$ with $$1 - \\cos^2(A)$$ in the first form: $$\\cos^2(A) - (1 - \\cos^2(A)) = 2\\cos^2(A) - 1$$.\n- Step 3: $$\\cos(2A) = 1 - 2\\sin^2(A)$$. Derived by replacing $$\\cos^2(A)$$ with $$1 - \\sin^2(A)$$ in the first form: $$(1 - \\sin^2(A)) - \\sin^2(A) = 1 - 2\\sin^2(A)$$.\n\nAll three are the same identity written differently. The choice depends on what's convenient for the problem.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_34", "judge_pick": false}, {"question": "Starting from $$\\cos(2A) = \\cos^2(A) - \\sin^2(A)$$, show how to derive $$\\cos(2A) = 2\\cos^2(A) - 1$$. (2 steps)", "answer": "- Step 1: Use the Pythagorean identity $$\\sin^2(A) = 1 - \\cos^2(A)$$ to replace $$\\sin^2(A)$$ in the original formula.\n- Step 2: $$\\cos(2A) = \\cos^2(A) - \\sin^2(A) = \\cos^2(A) - (1 - \\cos^2(A)) = \\cos^2(A) - 1 + \\cos^2(A) = 2\\cos^2(A) - 1$$.\n\nThe key decision: when you want to eliminate $$\\sin^2$$, replace it with $$1 - \\cos^2$$. When you want to eliminate $$\\cos^2$$, replace it with $$1 - \\sin^2$$. This gives you the two alternative forms.", "source": "GLM 5.1 в‘ ", "_id": "glm_1_35", "judge_pick": false}, {"question": "Starting from $$\\cos(2A) = \\cos^2(A) - \\sin^2(A)$$, show how to derive $$\\cos(2A) = 1 - 2\\sin^2(A)$$. (2 steps)", "answer": "- Step 1: Use the Pythagorean identity $$\\cos^2(A) = 1 - \\sin^2(A)$$ to replace $$\\cos^2(A)$$ in the original formula.\n- Step 2: $$\\cos(2A) = \\cos^2(A) - \\sin^2(A) = (1 - \\sin^2(A)) - \\sin^2(A) = 1 - \\sin^2(A) - \\sin^2(A) = 1 - 2\\sin^2(A)$$.\n\nThis form is useful when your problem involves $$\\sin^2(A)$$, because it expresses $$\\cos(2A)$$ entirely in terms of $$\\sin(A
