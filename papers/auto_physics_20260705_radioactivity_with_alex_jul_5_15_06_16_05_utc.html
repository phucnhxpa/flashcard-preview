<script>
const DATA={"selected": [{"question": "A student sets up the gamma absorption experiment but forgets to measure the background count. They take readings and plot count rate vs lead thickness. What will the graph look like, and how will it affect their conclusion about gamma absorption? (3 steps)", "answer": "- Step 1: The graph will show count rate **decreasing** as thickness increases (because lead absorbs gamma), but the curve will **level off at the background value** rather than approaching zero.\n- Step 2: The student might mistakenly conclude that gamma \"passes through\" some thickness of lead unchanged — when in reality, the gamma has been fully absorbed, and what they're still measuring is just background radiation.\n- Step 3: The fix: subtract the background from every reading first, then plot. The corrected curve will approach zero, revealing the true absorption behaviour. This is why **background measurement is a critical control step** in any radiation experiment.", "source": "MiniMax ①", "_id": "minimax_1_85"}, {"question": "During beta-minus ($$\\beta^-$$) decay, a nucleus emits a high-energy electron ($$^0_{-1}\\text{e}$$). Since electrons do not exist inside the nucleus, explain the fundamental nucleon transformation that occurs, and deduce how this affects the atomic number ($$Z$$) and mass number ($$A$$) of the daughter nucleus. (3 steps)", "answer": "- Step 1: **Identify the nucleon transformation.** Inside an unstable nucleus with too many neutrons, a neutron transforms into a proton. To conserve charge and lepton number, this process simultaneously creates and ejects a high-energy electron (the beta particle) and an electron antineutrino.\n- Step 2: **Determine the effect on the atomic number ($$Z$$).** Because a neutral neutron has turned into a positively charged proton, the total number of protons in the nucleus increases by 1. Therefore, the atomic number $$Z$$ increases by 1, transmuting the element into the next one on the periodic table.\n- Step 3: **Determine the effect on the mass number ($$A$$).** The mass number counts the total number of nucleons (protons + neutrons). Since one neutron was lost but one proton was gained, the total number of nucleons remains exactly the same. Therefore, the mass number $$A$$ is unchanged.\n\n*Takeaway: Beta decay is not the emission of an orbital electron, but the internal transmutation of a neutron into a proton, shifting the element one place up the periodic table without changing its mass number.*", "source": "Qwen 3 ②", "_id": "qwen_2_2"}, {"question": "Gamma radiation has no charge and no mass. Yet it can still damage living cells. How does an uncharged, massless electromagnetic wave ionise atoms, and why does it need a \"larger dose\" to cause the same damage as alpha? (3 steps)", "answer": "- Step 1: Gamma rays are high-energy **electromagnetic photons**. Although they have no charge or mass, they carry energy (related to frequency by $$E = hf$$). When a gamma photon interacts with an atom, it can transfer its energy to an atomic electron through processes like the **photoelectric effect** or **Compton scattering**, ejecting the electron and ionising the atom.\n- Step 2: However, because gamma rays have **no charge**, they do not experience the Coulomb attraction/repulsion that alpha and beta particles do when passing near atoms. This means the probability of a gamma photon interacting with any given atom is much lower — most gamma photons pass through matter without interacting at all. This is why gamma is **weakly ionising**.\n- Step 3: Because each gamma photon has a low probability of causing an ionisation event, you need **many more gamma photons** (a larger dose) to produce the same number of ionisations as a much smaller number of alpha particles. But it is incorrect to say \"gamma cannot harm cells\" — it absolutely can, just less efficiently per photon.\n\nKey takeaway: Gamma *does* ionise and *does* harm cells — it's just less efficient at it per particle/photon, so a larger dose is needed for equivalent damage.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "Alpha radiation is described as \"strongly ionising\" but \"weakly penetrating.\" Explain the physical reason why high ionising ability and low penetrating ability go hand-in-hand. (2 steps)", "answer": "- Step 1: Ionisation occurs when a particle transfers energy to electrons in nearby atoms, knocking them free. Alpha particles have a large charge ($$+2e$$) and large mass, so they exert strong Coulomb forces on atomic electrons and transfer significant energy per interaction.\n- Step 2: Because the alpha particle loses a large amount of energy in *each* interaction, it rapidly runs out of kinetic energy after only a short distance through matter. This makes its range very short (a few cm in air, stopped by paper/skin). High ionisation per unit distance = rapid energy loss = low penetration.\n\nThe two properties are causally linked: the same mechanism (strong electromagnetic interaction with electrons) produces both effects simultaneously.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "In the ESAT-style uranium decay problem, a stationary U-238 nucleus decays by alpha emission with total kinetic energy $$E$$. Without doing the full algebra, explain why the alpha particle's kinetic energy is approximately $$\\frac{234}{238} E$$ rather than a small fraction. (2 steps)", "answer": "- Step 1: Momentum conservation forces the light alpha to move much faster than the heavy thorium. Since kinetic energy is $$\\frac{1}{2}mv^2$$, and the alpha's velocity is much larger, the alpha's energy is disproportionately large despite its small mass.\n- Step 2: The exact result is $$KE_{\\alpha} = \\frac{m_{Th}}{m_{Th} + m_{\\alpha}} E = \\frac{234}{234 + 4} E = \\frac{234}{238} E \\approx 0.983 E$$. This fraction arises because momentum conservation distributes the velocity inversely with mass, and energy goes as $$v^2$$. The heavier fragment gets the tiny fraction, not the lighter one.\n\nIn any two-body decay from rest, the lighter fragment always carries the lion's share of kinetic energy — a direct consequence of momentum conservation combined with $$KE \\propto v^2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_40"}, {"question": "When handling radioactive sources for the gamma absorption practical, safety guidelines dictate using tongs and keeping the source as far away as reasonably practicable. Explain the physical law that makes distance such an effective safety measure against gamma radiation in air. (3 steps)", "answer": "- Step 1: Gamma rays travel in straight lines and spread out uniformly in three dimensions from a point source.\n- Step 2: This geometric spreading means the intensity of the radiation is inversely proportional to the square of the distance from the source ($$I \\propto \\frac{1}{r^2}$$).\n- Step 3: Consequently, simply doubling the distance between yourself and the source reduces the radiation intensity (and your exposure dose) to one-quarter of its original value, making distance a highly effective and immediate safety shield.", "source": "Qwen 3 ①", "_id": "qwen_1_16"}, {"question": "When measuring the activity of a radioactive source using a GM tube in a laboratory, the raw count rate displayed on the counter is always higher than the true activity of the source itself. Explain the origin of this discrepancy and the specific mathematical step required to find the \"corrected count rate\". (2 steps)", "answer": "- Step 1: **Identify the origin of the discrepancy.** The GM tube detects all ionising radiation in its vicinity, not just the radiation from the source. It constantly picks up \"background radiation\" originating from natural sources (like radon gas, cosmic rays, and radioactive isotopes in the building materials) and man-made sources (like medical fallout). \n- Step 2: **Apply the mathematical correction.** To isolate the radiation coming *only* from the source, you must first measure the background count rate with the radioactive source removed (or shielded). Then, you subtract this background count rate from the raw measured count rate to obtain the true \"corrected count rate\".\n\n*Takeaway: Raw count rate = Source activity + Background radiation. You must always subtract the background to find the true activity of the source.*", "source": "Qwen 3 ②", "_id": "qwen_2_10"}, {"question": "The half-life of a radioactive isotope is defined as the time taken for half the undecayed nuclei to decay. If you have exactly 4 atoms of an isotope with a half-life of 10 minutes, explain why it is incorrect to guarantee that exactly 2 atoms will remain after 10 minutes. (3 steps)", "answer": "- Step 1: Radioactive decay is a fundamentally random process at the level of individual nuclei, meaning we cannot predict exactly when a specific atom will decay.\n- Step 2: The half-life represents a statistical probability; for any single nucleus, there is a 50% chance it will decay within one half-life.\n- Step 3: With a macroscopic sample (e.g., $$10^{20}$$ atoms), the law of large numbers ensures almost exactly half will decay, but with a tiny sample of just 4 atoms, statistical fluctuations dominate, meaning you could easily end up with 0, 1, 2, 3, or 4 atoms remaining after 10 minutes.", "source": "Qwen 3 ①", "_id": "qwen_1_5"}, {"question": "Compare the **ionising power** of alpha, beta, and gamma radiation. Why is alpha the most ionising, even though it is the least penetrating? (3 steps)", "answer": "- Step 1: **The ranking (most → least ionising).**\n+ **Alpha**: most ionising\n+ **Beta**: moderately ionising\n+ **Gamma**: least ionising (but **not zero** — it still ionises, just weakly)\n- Step 2: **Why alpha is the most ionising.** Two reasons combine: (a) it has a **+2 charge**, so it pulls strongly on electrons in nearby atoms, and (b) it is **slow and heavy**, so it spends more time near each atom it passes, giving it more opportunity to ionise.\n- Step 3: **The inverse relationship.** Because alpha ionises so strongly, it dumps its energy into a small region very quickly — so it stops after a short distance. Gamma barely interacts, so it can travel through metres of material — but the trade-off is that the few interactions it *does* have are widely spread out.\n\nThis is why **alpha is the most dangerous if it gets inside your body** (lungs, stomach): all its ionising power is delivered directly to living cells. Outside the body, your dead skin layer stops it before it reaches anything important.", "source": "MiniMax ②", "_id": "minimax_2_8"}, {"question": "A nuclear decay sequence from isotope P to isotope Q involves both alpha and beta decays. The mass number drops by 4 and the atomic number drops by 1. How many of each type of decay occurred? (3 steps)", "answer": "- Step 1: Only alpha decay changes the mass number. A drop of 4 means exactly **1 alpha decay** occurred.\n- Step 2: One alpha decay reduces the atomic number by 2. But the net change is only -1. Therefore, the atomic number must have been *increased* by 1 somewhere — this requires **1 beta-minus decay** (which increases $$Z$$ by 1).\n- Step 3: Check: start with $$_{Z}^{A}P$$. After 1 alpha: $$_{Z-2}^{A-4}$$. After 1 beta: $$_{Z-1}^{A-4}Q$$. Net: $$\\Delta A = -4$$, $$\\Delta Z = -1$$. ✓\n\nFor multi-step decay problems, always determine the number of alpha decays from the mass number change first, then use the atomic number to find the number of beta decays.", "source": "GLM 5.1 ③", "_id": "glm_3_39"}, {"question": "In the alpha decay of a stationary uranium-238 nucleus, the total kinetic energy released is E. How does this energy E split between the alpha particle and the recoiling thorium-234 nucleus? Which particle carries most of the kinetic energy, and why? (3 steps)", "answer": "- Step 1: The total kinetic energy is $$E = \\frac{1}{2} m_\\alpha v_\\alpha^2 + \\frac{1}{2} m_{Th} v_{Th}^2$$. We need to express this in terms of one velocity using the momentum relation. From momentum conservation: $$m_{Th} v_{Th} = m_\\alpha v_\\alpha$$, so $$v_{Th} = \\frac{m_\\alpha v_\\alpha}{m_{Th}}$$.\n- Step 2: Substitute into the thorium's kinetic energy: $$KE_{Th} = \\frac{1}{2} m_{Th} \\left(\\frac{m_\\alpha v_\\alpha}{m_{Th}}\\right)^2 = \\frac{1}{2} \\frac{m_\\alpha^2 v_\\alpha^2}{m_{Th}}$$. Meanwhile, the alpha's KE is $$KE_\\alpha = \\frac{1}{2} m_\\alpha v_\\alpha^2$$. The ratio is: $$\\frac{KE_{Th}}{KE_\\alpha} = \\frac{m_\\alpha}{m_{Th}} = \\frac{4}{234} \\approx \\frac{1}{58.5}$$.\n- Step 3: The thorium carries only about **1.7%** of the total kinetic energy, while the alpha particle carries about **98.3%**. This is because kinetic energy depends on $$v^2$$, and the lighter alpha moves much faster. In any two-body decay from rest, the lighter fragment carries almost all the kinetic energy — the heavy fragment's kinetic energy is negligible by comparison.\n\nKey takeaway: In alpha decay from a stationary nucleus, the light alpha particle carries nearly all the kinetic energy. The heavy daughter's recoil energy is tiny because its velocity is small (inversely proportional to its mass).", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "Why can't a decay equation where the mass number stays the same but the atomic number *decreases* by 2 represent any single nuclear decay process? What fundamental conservation law does this violate? (2 steps)", "answer": "- Step 1: No single decay process reduces the atomic number by 2 while keeping the mass number constant. Alpha decay reduces both $$A$$ (by 4) and $$Z$$ (by 2). Beta decay changes $$Z$$ by ±1 but keeps $$A$$ the same. Gamma decay changes neither.\n- Step 2: A decrease of $$Z$$ by 2 with no change in $$A$$ would require losing 2 protons while somehow *gaining* 2 neutrons — converting 2 protons to 2 neutrons. This would be a **double beta-plus (positron) decay** or **double electron capture**, which is extremely rare and would never be described as a \"single\" standard decay at this level.\n\nAt A-level, the only standard single decays are: alpha (ΔA = −4, ΔZ = −2), beta-minus (ΔA = 0, ΔZ = +1), and gamma (ΔA = 0, ΔZ = 0). Any other combination requires multiple decays or exotic processes.", "source": "GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "A radioactive source is placed outside someone's body. Which type of radiation — alpha, beta, or gamma — is the least dangerous in this scenario, and which is the most dangerous? Why does the answer change if the source is ingested? (3 steps)", "answer": "- Step 1: **Outside the body:** Alpha is the least dangerous because it is stopped by the outer dead layer of skin — it cannot reach living cells. Gamma is the most dangerous externally because it penetrates deep into tissue and can reach internal organs. Beta is intermediate.\n- Step 2: **Inside the body (ingested/inhaled):** The situation reverses for alpha. Once inside, there is no skin to stop it. The alpha particles' high ionising power now acts directly on delicate internal tissues, causing intense localised damage. Alpha becomes the most dangerous internally.\n- Step 3: Beta and gamma are still dangerous internally, but their ionising power per unit distance is lower, so the damage per particle is less concentrated. The key insight is: **danger depends on whether the radiation can reach living cells**, and the skin barrier makes external alpha harmless but internal alpha devastating.\n\nKey takeaway: The same radiation type can be relatively harmless in one context and extremely dangerous in another — always consider the location of the source relative to the body.", "source": "GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "A misconception: \"Gamma rays are the most dangerous because they are the most penetrating.\" Evaluate this claim — is it always true? When would alpha actually be more dangerous? (3 steps)", "answer": "- Step 1: The claim is oversimplified. \"Most penetrating\" means gamma travels furthest through matter, but \"most dangerous\" depends on *context* — specifically, whether the radiation is outside or inside the body.\n- Step 2: **Outside the body**: Gamma is indeed the most concerning because it can penetrate skin and reach internal organs. Alpha is stopped by skin, beta by a few mm of tissue. So externally, gamma delivers the deepest dose.\n- Step 3: **Inside the body**: Alpha becomes the most dangerous because it is the most ionising. With no skin barrier, alpha deposits enormous energy in a tiny volume of living tissue, causing intense local damage. Gamma, being weakly ionising, would cause much less damage per unit dose internally.\n\nTakeaway: \"Most dangerous\" is context-dependent — external exposure favours gamma as the threat; internal exposure favours alpha.", "source": "GLM 5.1 ②", "_id": "glm_2_34"}, {"question": "A student says fission is \"smashing two nuclei together.\" Correct this misconception by defining fission and fusion properly. (3 steps)", "answer": "- Step 1: Fission is the *splitting* of one large nucleus into two smaller nuclei — the student described fusion, not fission.\n- Step 2: Fusion is the *joining* of two small nuclei into one larger nucleus, requiring enormous pressure and energy to overcome the Coulomb (electrostatic) repulsion between the positively charged nuclei.\n- Step 3: Fission needs comparatively less input energy to trigger, because splitting doesn't require forcing two repelling positive charges together — it just needs a trigger to overcome the binding holding the nucleus together.\n\nTakeaway: fission = one splits into two; fusion = two join into one (and fusion is far harder to start).", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "What is the significance of the \"ln 2\" in the half-life equation $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$? Walk through where it comes from conceptually. (2 steps)", "answer": "- Step 1: Half-life is defined as the time when $$N = \\frac{N_0}{2}$$. Substituting into $$N = N_0 e^{-\\lambda t}$$: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$, which simplifies to $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$.\n- Step 2: Taking the natural log of both sides: $$\\ln\\left(\\frac{1}{2}\\right) = -\\lambda t_{1/2}$$. Since $$\\ln\\left(\\frac{1}{2}\\right) = -\\ln 2$$, we get $$-\\ln 2 = -\\lambda t_{1/2}$$, giving $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$. The $$\\ln 2$$ appears because we took the natural log of $$\\frac{1}{2}$$ — it is the mathematical consequence of asking \"when does an exponential drop to half?\"\n\n$$\\ln 2 \\approx 0.693$$ is a mathematical constant, not a physics constant. It appears whenever you convert between half-life and exponential decay rate.", "source": "GLM 5.1 ③", "_id": "glm_3_52"}, {"question": "A beta particle ($$\\beta^{-}$$) is emitted from the nucleus. What exactly is it, and why does it have an atomic number of $$-1$$ in nuclear equations? What process inside the nucleus actually creates it? (3 steps)", "answer": "- Step 1: A beta-minus particle is a **high-energy electron** emitted from the nucleus. It has negligible mass (compared to nucleons) and a charge of $$-1e$$.\n- Step 2: The atomic number $$Z$$ in nuclear notation counts *proton charge*. Since a beta particle carries charge $$-1e$$, it is assigned $$Z = -1$$ in decay equations so that charge balances. This is a bookkeeping convention, not a statement that electrons \"live\" in the nucleus.\n- Step 3: The beta electron is *created* when a **neutron inside the nucleus converts into a proton**: $$^{1}_{0}\\text{n} \\rightarrow ^{1}_{1}\\text{p} + ^{0}_{-1}\\beta^{-} + \\bar{\\nu}_e$$ (an antineutrino is also emitted to conserve energy and lepton number). The electron didn't exist beforehand — it is born at the moment of decay and immediately ejected.\n\nTakeaway: The $$Z = -1$$ notation is charge bookkeeping; the electron is *manufactured* by neutron-to-proton conversion, not stored in the nucleus.", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "Why is **radon gas** particularly dangerous compared to other background sources, even though it's an alpha emitter (which we said is harmless externally)? (2 steps)", "answer": "- Step 1: Radon is a **gas**, so it can be **inhaled** into the lungs. Once inside the body, the alpha-emitting radon (and its decay products) deposit all their ionising energy into a very small volume of **living lung tissue**.\n- Step 2: This intense, localised ionisation can **damage DNA** in lung cells, leading to an increased risk of **lung cancer**. Radon is in fact the second leading cause of lung cancer after smoking — a striking example of how alpha's \"weakness\" (low penetration) becomes its danger when the source is internal.", "source": "MiniMax ①", "_id": "minimax_1_67"}, {"question": "In the ESAT lesson question about uranium-238 alpha decay, the student derived that the alpha particle carries approximately $$\\frac{234}{234+4} \\times E = \\frac{234}{238} E$$ of the total energy. Verify this ratio conceptually: does a lighter decay product always carry a larger *fraction* of the released kinetic energy? Why? (3 steps)", "answer": "- Step 1: From momentum conservation: $$m_1 v_1 = m_2 v_2$$, so $$v_1 = \\frac{m_2}{m_1} v_2$$ (the lighter particle moves faster). The kinetic energies are $$E_1 = \\frac{1}{2}m_1 v_1^2 = \\frac{1}{2}m_1 \\left(\\frac{m_2}{m_1}\\right)^2 v_2^2 = \\frac{m_2^2}{2m_1} v_2^2$$ and $$E_2 = \\frac{1}{2}m_2 v_2^2$$.\n- Step 2: The ratio: $$\\frac{E_1}{E_2} = \\frac{m_2^2 / (2m_1)}{m_2 / 2} = \\frac{m_2}{m_1}$$. So the lighter particle's energy fraction is $$\\frac{E_1}{E_1 + E_2} = \\frac{m_2}{m_1 + m_2}$$ — the *other* particle's mass divided by the total mass.\n- Step 3: For uranium-238 → thorium-234 + alpha-4: alpha's fraction = $$\\frac{m_{\\text{Th}}}{m_{\\text{Th}} + m_{\\alpha}} = \\frac{234}{238} \\approx 98.3\\%$$. Yes — the lighter product always carries a larger fraction because it must move much faster (momentum conservation), and KE scales with v².\n\nTakeaway: In any two-body decay from rest, the lighter fragment always gets the lion's share of kinetic energy — a direct consequence of momentum conservation.", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "Why does the SaveMyExams document mention that \"carbon-14 in biological material\" is a natural background source? Why is the amount in living things roughly constant, but decreases after death? (3 steps)", "answer": "- Step 1: Carbon-14 is **continuously produced in the upper atmosphere** by cosmic rays colliding with nitrogen, so there's a roughly constant supply.\n- Step 2: Living plants and animals constantly **take in carbon** (through CO₂ in air, or food), so they're constantly replenishing their C-14 supply as it decays. This keeps the C-14 level in a living organism in equilibrium with the atmosphere.\n- Step 3: After death, **no new carbon is taken in**, so the C-14 decays without being replaced. The fraction of C-14 remaining tells you how long ago the organism died — this is the basis of **carbon dating**.", "source": "MiniMax ①", "_id": "minimax_1_68"}, {"question": "The decay constant $$\\lambda$$ is defined as \"the probability per second that a given nucleus will decay.\" If $$\\lambda = 0.05 \\text{ s}^{-1}$$, does this mean each nucleus has a 5% chance of decaying every second? Why can't we simply say a nucleus will definitely decay after $$1/\\lambda = 20$$ seconds? (3 steps)", "answer": "- Step 1: Yes, $$\\lambda = 0.05 \\text{ s}^{-1}$$ means each nucleus has a 5% probability of decaying in any given second. But this is a **constant probability** — it doesn't accumulate. After one second, the nucleus has a 5% chance of having decayed and a 95% chance of still being undecayed.\n- Step 2: After two seconds, the probability of *still* being undecayed is not 90% — it's $$(1 - 0.05)^2 = 0.95^2 = 0.9025$$, or about 90.25%. After 20 seconds, the probability of still being undecayed is $$0.95^{20} \\approx 0.36$$, so there's only about a 64% chance it has decayed — not 100%.\n- Step 3: The quantity $$1/\\lambda$$ (20 seconds in this case) is the **mean lifetime** (τ), which is the *average* time a nucleus survives before decaying. But \"average\" means some decay much sooner and some much later. There is no guaranteed time at which any specific nucleus *will* decay — the process is random, and the exponential distribution has a long tail.\n\nKey takeaway: $$\\lambda$$ is a *rate* (probability per second), not a guarantee. $$1/\\lambda$$ is the average lifetime, not a fixed decay time. Individual nuclei can survive far longer or shorter than the mean.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "Why does the activity equation $$A = \\lambda N$$ have a **minus sign** in the differential form $$A = -\\frac{dN}{dt} = \\lambda N$$? What would happen physically if the sign were positive? (2 steps)", "answer": "- Step 1: The minus sign indicates that N is **decreasing** over time — nuclei are being lost (decaying). $$\\frac{dN}{dt}$$ is the *rate of change* of N, and since N is falling, $$\\frac{dN}{dt}$$ is negative. The activity A (a positive quantity, representing the number of decays per second) is the **magnitude** of this rate: $$A = -\\frac{dN}{dt} = \\lambda N$$.\n- Step 2: If the sign were positive ($$\\frac{dN}{dt} = +\\lambda N$$), the equation would say \"the number of nuclei is **increasing** exponentially\" — nuclei would be appearing from nowhere, which violates conservation of nucleon number. The positive sign would describe a process of creation, not decay. The minus sign is essential to describe a **diminishing** quantity.\n\nKey takeaway: The minus sign encodes the physical reality that radioactive decay *reduces* the number of undecayed nuclei. Activity is the positive magnitude of this negative rate of change.", "source": "GLM 5.1 ①", "_id": "glm_1_45"}, {"question": "Why is it impossible to predict *which* specific nucleus in a sample will decay next, even though you can predict *how many* will decay in the next second on average? Connect this to the definition of the decay constant. (2 steps)", "answer": "- Step 1: Each nucleus has an identical, constant probability $$\\lambda$$ of decaying in any given second. But *which* nucleus realises that probability is fundamentally random — like rolling dice for each nucleus every second. You know that on average $$\\lambda N$$ will \"roll a decay,\" but you cannot predict which specific ones.\n- Step 2: This is the essence of the random nature of decay. The decay constant gives you **population-level statistics** (average rate), not **individual-level prediction** (which nucleus, when). It's analogous to knowing a coin has a 50% chance of landing heads — you can predict ~500 heads from 1000 flips, but cannot predict whether flip #37 will be heads.\n\nTakeaway: λ is a statistical tool for populations, not a deterministic clock for individuals — decay is random at the single-nucleus level.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "In Core Practical 15, why should you use a radioactive source with a *long* half-life, and why should you take *three* readings per thickness rather than one? (2 steps)", "answer": "- Step 1: A long half-life ensures the source's activity remains approximately constant throughout the experiment. If the half-life were short, the activity would decrease significantly during data collection, and you couldn't distinguish absorption by lead from natural decay of the source.\n- Step 2: Taking three readings per thickness and averaging reduces the impact of **random fluctuations** in radioactive decay. Since decay is random, individual one-minute counts vary significantly. Averaging smooths out these statistical fluctuations and gives a more reliable measure of the true count rate.\n\nRadioactive decay follows Poisson statistics: the standard deviation of $$n$$ counts is approximately $$\\sqrt{n}$$. Averaging multiple readings reduces this uncertainty.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "In Core Practical 15, which investigates the absorption of gamma rays by varying thicknesses of lead, the thickness of the lead is the independent variable. Identify two critical control variables related to the geometry of the setup, and explain how failing to control the distance between the source and the GM tube would introduce a massive systematic error. (3 steps)", "answer": "- Step 1: **Identify the geometric control variables.** The two most critical geometric variables to keep constant are the distance from the radioactive source to the GM tube window, and the physical alignment/positioning of the source relative to the tube.\n- Step 2: **Explain the physics of the distance variable.** Gamma radiation intensity obeys the inverse-square law ($$I \\propto 1/d^2$$). This means that as distance increases, the count rate drops off rapidly simply because the radiation spreads out over a larger spherical area.\n- Step 3: **Describe the systematic error.** If the distance is not strictly controlled (e.g., if adding thicker lead sheets accidentally pushes the source further away from the tube), the count rate will drop due to the inverse-square law. The student would mistakenly attribute this drop in counts to *absorption* by the lead, resulting in a completely invalid conclusion about the lead's absorbing properties.\n\n*Takeaway: In radiation absorption experiments, any change in distance mimics absorption due to the inverse-square law, making strict geometric control absolutely vital.*", "source": "Qwen 3 ②", "_id": "qwen_2_11"}, {"question": "The number of neutrons in a nucleus is $$N = A - Z$$. For uranium-238 ($$^{238}_{92}\\text{U}$$), how many neutrons does it have? Why do heavier nuclei need *more neutrons relative to protons* (i.e., $$N/Z$$ increases with $$A$$)? (2 steps)", "answer": "- Step 1: Neutrons = $$A - Z = 238 - 92 = 146$$ neutrons. The neutron-to-proton ratio is $$146/92 \\approx 1.59$$ — significantly more neutrons than protons.\n- Step 2: In heavier nuclei, more protons means more Coulomb repulsion pushing protons apart. Extra neutrons don't add Coulomb repulsion (they're uncharged) but *do* contribute to the strong nuclear force's binding effect. They act as \"neutral glue\" that helps hold the increasingly repulsive proton cluster together. As $$Z$$ grows, more glue (neutrons) is needed per proton.\n\nTakeaway: Neutrons are the neutral adhesive — heavier elements need disproportionately many neutrons to counteract growing proton-proton repulsion.", "source": "GLM 5.1 ②", "_id": "glm_2_40"}, {"question": "The **decay constant** $$\\lambda$$ is defined as \"the probability per second that a given nucleus will decay.\" How does this definition lead directly to the activity equation $$A = \\lambda N$$? Walk through the reasoning. (3 steps)", "answer": "- Step 1: If each individual nucleus has a probability $$\\lambda$$ of decaying in any one-second interval, and there are $$N$$ undecayed nuclei in the sample, then the *expected* number of decays in that one second is simply the sum of all individual probabilities: $$\\text{expected decays per second} = \\lambda \\times N$$\n- Step 2: This expected number of decays per second is exactly what we call **activity** ($$A$$) — it measures how \"active\" the sample is. So: $$A = \\lambda N$$\n- Step 3: The more rigorous form includes a minus sign to indicate the number of remaining nuclei is decreasing: $$A = \\frac{\\Delta N}{\\Delta t} = -\\lambda N$$ (the negative sign shows $$N$$ shrinks over time). Activity is measured in Becquerels (Bq), where $$1 \\text{ Bq} = 1 \\text{ decay per second} = 1 \\text{ s}^{-1}$$.\n\nTakeaway: Activity is just \"probability per nucleus × number of nuclei\" — a direct consequence of the decay constant's definition applied to a population.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "**Synthesis question:** Why does a sample of plutonium-239 (half-life ~24,000 years) stay warm and continue to emit radiation for *thousands of years*, while a sample of polonium-214 (half-life ~164 microseconds) decays almost instantly? Connect this to the **decay constant λ**. (2 steps)", "answer": "- Step 1: **The decay constant link.** From $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$, a long half-life means a *small* λ, and a short half-life means a *large* λ.\n+ Plutonium-239: very long half-life → very small λ (each Pu nucleus has a tiny probability of decaying per second) → decay is slow but persistent.\n+ Polonium-214: extremely short half-life → very large λ (each Po nucleus has a near-certainty of decaying almost immediately) → decay is explosive.\n- Step 2: **Why plutonium stays warm.** \"Warmth\" comes from the kinetic energy of emitted particles and the gamma/alpha radiation being absorbed by the surroundings. Plutonium's small λ means its activity is *low* (a few Bq per gram), but it never stops — so over thousands of years, the steady trickle of decay energy keeps the sample slightly warmer than its surroundings. Polonium emits the same *total* energy but does it in microseconds — so it gives a sharp burst of heat, not a sustained warming.\n\nThe connection: total energy released per nucleus is similar, but the *rate* of release (governed by λ) determines whether you see a flash or a slow glow.", "source": "MiniMax ②", "_id": "minimax_2_44"}, {"question": "Explain what it means for radioactive decay to be **random**. Why is it impossible to predict when *one* nucleus will decay, even though we *can* predict the behaviour of a large sample? (3 steps)", "answer": "- Step 1: **Definition of random.** A *random* process is one in which the **exact time of decay of any individual nucleus cannot be predicted**, no matter how much information you have about it.\n- Step 2: **The reason.** Quantum mechanics tells us that the nucleus exists in a probabilistic state — at any instant, each unstable nucleus has a fixed *probability* of decaying in the next second, but there is no hidden \"clock\" inside the nucleus. So even with perfect information, you cannot say *when* a specific nucleus will decay.\n- Step 3: **Why large samples are predictable.** When you have billions of nuclei, the *average* behaviour becomes very reliable. If each nucleus has a 50% chance of decaying in 1 hour, then in a sample of 1 billion nuclei, very close to 500 million will decay in that hour — with only tiny statistical fluctuations. This is why **half-life works**: it's a *statistical* property of the whole sample, not a property of any one atom.\n\nThe \"irregular clicking\" of a Geiger counter around a small source is direct experimental evidence of randomness.", "source": "MiniMax ②", "_id": "minimax_2_17"}, {"question": "In a multiple-choice ESAT question, you see four nuclear decay options. Option A shows mass number staying the same and atomic number decreasing by 2. Why can you immediately eliminate this as a single decay? (2 steps)", "answer": "- Step 1: No single standard decay process keeps the mass number constant while decreasing the atomic number by 2. The three standard decays are: alpha (ΔA = −4, ΔZ = −2), beta-minus (ΔA = 0, ΔZ = +1), and gamma (ΔA = 0, ΔZ = 0).\n- Step 2: Option A's pattern (ΔA = 0, ΔZ = −2) doesn't match any of these. It would require losing 2 protons while gaining 2 neutrons — which is not a recognised single decay at this level. You can eliminate it without further calculation.\n\nThis is a powerful elimination strategy: memorise the (ΔA, ΔZ) signatures for alpha, beta-minus, and gamma, and any option that doesn't match one of these (or a valid combination) can be rejected immediately.", "source": "GLM 5.1 ③", "_id": "glm_3_51"}, {"question": "In the SaveMyExams notes, the activity equation is presented as $$\\frac{\\Delta N}{\\Delta t} = -\\lambda N$$. If we treat this as a differential equation and solve it, we get $$N(t) = N_0 e^{-\\lambda t}$$. Sketch the reasoning that connects these two equations. (3 steps)", "answer": "- Step 1: The equation $$\\frac{\\Delta N}{\\Delta t} = -\\lambda N$$ says the rate of change of N is proportional to N itself. This is a **first-order differential equation**.\n- Step 2: The only function whose rate of change is proportional to itself (with a negative constant) is the **exponential decay**: $$N(t) = N_0 e^{-\\lambda t}$$. You can verify by differentiating: $$\\frac{dN}{dt} = -\\lambda N_0 e^{-\\lambda t} = -\\lambda N$$, which matches.\n- Step 3: At t = 0, $$N = N_0$$. After one half-life, $$N = N_0/2$$, which gives $$e^{-\\lambda t_{1/2}} = 1/2$$, hence $$t_{1/2} = \\ln 2 / \\lambda$$. This is the rigorous derivation of the half-life formula.", "source": "MiniMax ①", "_id": "minimax_1_91"}, {"question": "A student says \"beta particles are electrons, so they come from the electron shells around the atom.\" Identify the misconception and explain where beta particles actually originate. (2 steps)", "answer": "- Step 1: The misconception is that beta particles are orbital electrons ejected from the atom's electron cloud. This is wrong — beta particles originate from the **nucleus**, not the electron shells.\n- Step 2: In beta-minus decay, a **neutron inside the nucleus** converts into a proton, an electron (the beta particle), and an antineutrino. The electron is **created** in this process — it did not exist beforehand. It is emitted from the nucleus with high kinetic energy, which is why it is far more energetic than orbital electrons. The beta particle is a *new* particle born from the nuclear transformation, not a pre-existing electron.\n\nKey takeaway: Beta particles are nuclear in origin — they are created when a neutron decays inside the nucleus. They are not stripped from the electron cloud.", "source": "GLM 5.1 ①", "_id": "glm_1_38"}, {"question": "A student says: \"Fission needs less energy than fusion, so fission must be easier.\" Correct the misconception and explain the real reason for the energy difference. (3 steps)", "answer": "- Step 1: The student is right that fission requires less *initiating* energy, but the reason isn't about \"easiness\" — it's about the **Coulomb barrier**.\n- Step 2: In fusion, you must push two **positively charged** nuclei close enough together for the strong nuclear force to take over. The Coulomb repulsion between protons creates a huge energy barrier that must be overcome (this is why fusion needs extreme temperatures and pressures — like inside the Sun).\n- Step 3: In fission, the **strong nuclear force is already holding the large nucleus together**. You just need to add a slow neutron (electrically neutral, so no Coulomb barrier) to destabilise it. The nucleus then splits because the strong force can no longer hold all those protons apart — Coulomb repulsion wins in a large nucleus.", "source": "MiniMax ①", "_id": "minimax_1_38"}, {"question": "A nucleus $$_{92}^{238}U$$ decays to $$_{82}^{206}Pb$$ through a series of alpha and beta-minus decays. How many alpha decays and how many beta decays must have occurred? (3 steps)", "answer": "- Step 1: Each alpha decay reduces the mass number by 4. The total mass number change is $$238 - 206 = 32$$. Since only alpha decays change the mass number, the number of alpha decays is $$\\frac{32}{4} = 8$$.\n- Step 2: Each alpha decay reduces the atomic number by 2. Eight alpha decays reduce the atomic number by $$8 \\times 2 = 16$$, from 92 to $$92 - 16 = 76$$.\n- Step 3: But the final atomic number is 82, which is 6 higher than 76. Each beta decay increases the atomic number by 1. Therefore, $$82 - 76 = 6$$ beta decays occurred. The answer: **8 alpha decays and 6 beta decays**.\n\nAlways solve alpha count first (from mass number), then beta count (from atomic number). Beta doesn't affect mass number, so alpha count is determined independently.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "A nucleus with $$A = 218$$ and $$Z = 84$$ undergoes one alpha decay followed by two beta-minus decays. What are the final $$A$$ and $$Z$$ values? What general pattern does \"one alpha + two beta\" produce for the atomic number? (3 steps)", "answer": "- Step 1: After alpha decay: $$A$$ drops by 4 → $$218 - 4 = 214$$; $$Z$$ drops by 2 → $$84 - 2 = 82$$.\n- Step 2: After first beta decay: $$A$$ unchanged → 214; $$Z$$ increases by 1 → $$82 + 1 = 83$$.\n- Step 3: After second beta decay: $$A$$ unchanged → 214; $$Z$$ increases by 1 → $$83 + 1 = 84$$.\n+ Net effect: $$A$$ decreased by 4 (from alpha only), $$Z$$ decreased by 2 then increased by 2 = **net change of 0 in $$Z$$**.\n+ The general pattern: one alpha + two beta returns the atomic number to its original value while reducing mass by 4. This is why in the ESAT question from the lesson, option A was correct — the element transmutes away and back.\n\nTakeaway: \"1α + 2β\" is a classic combination that shifts the mass down by 4 but brings $$Z$$ back to where it started — the element effectively cycles through two neighbours and returns.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "In beta-minus decay, a neutron transforms into a proton and an electron. The mass number stays the same, but the atomic number increases by 1. How can the mass number remain unchanged when a new proton has been \"created\"? (3 steps)", "answer": "- Step 1: The mass number counts the **total number of nucleons** (protons + neutrons). Before decay, the nucleus has N neutrons and Z protons, giving mass number A = N + Z. After decay, one neutron has become a proton: the nucleus now has (N − 1) neutrons and (Z + 1) protons, giving mass number A = (N − 1) + (Z + 1) = N + Z. The total nucleon count is unchanged.\n- Step 2: The electron emitted in beta decay is **not a nucleon** — it is a lepton, not a proton or neutron. It does not contribute to the mass number. The mass number only counts nucleons in the *nucleus*, and the total nucleon count hasn't changed.\n- Step 3: The atomic number increases by 1 because there is now one more proton in the nucleus. This means the daughter nucleus is a **different element** from the parent — it has moved one place to the right in the periodic table.\n\nKey takeaway: Beta decay converts a neutron to a proton *inside* the nucleus — one nucleon type changes into the other, so the total nucleon count (mass number) is conserved, but the proton count (atomic number) changes, changing the element.", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "**Misconception probe:** A student says: *\"Heating a radioactive sample will make it decay faster.\"* Why is this incorrect, and what's the correct way to think about it? (2 steps)", "answer": "- Step 1: **Why it's wrong.** Radioactive decay is *spontaneous* — by definition, it is **not affected by temperature, pressure, or chemical environment**. The decay rate is governed by processes inside the nucleus (the weak nuclear force), which operate on energy scales and distances totally inaccessible to outside conditions.\n- Step 2: **The correct mental model.** The only things that affect how fast a sample decays are (a) the **decay constant λ** of that particular isotope (a fixed nuclear property), and (b) the **number of nuclei N** still present. Heating the sample doesn't change λ, so the decay rate is unchanged.\n\nThis is different from *chemical* reactions, which DO depend on temperature (higher T → faster reaction). The nuclear force is on a completely different energy scale from chemical bond energies.", "source": "MiniMax ②", "_id": "minimax_2_28"}, {"question": "Nuclear fusion requires extremely high temperatures and pressures, while fission occurs at room temperature once triggered. Why does fusion need such extreme conditions but fission does not? (3 steps)", "answer": "- Step 1: **Fusion** involves bringing two **positively charged** nuclei close enough for the **strong nuclear force** to bind them together. However, the strong force only acts at very short ranges (~1 fm). Before the nuclei can get that close, they must overcome the **Coulomb repulsion** between their positive charges. This requires enormous **kinetic energy** (high temperature) to approach fast enough, and high **density** (high pressure) so nuclei encounter each other frequently.\n- Step 2: **Fission** involves a neutron entering a **single** large nucleus. The neutron is uncharged, so there is **no Coulomb barrier** to overcome. The nucleus is already unstable (too large to be held together stably by the strong force), so absorbing a neutron tips it over the edge and it splits. No extreme temperature or pressure is needed — the nucleus does the work internally once the neutron is captured.\n- Step 3: The fundamental asymmetry: fusion requires overcoming repulsion between *two* positive nuclei (external energy needed), while fission exploits the *internal* instability of an already-assembled, overly large nucleus (triggered by a neutral particle that faces no barrier).\n\nKey takeaway: Fusion is hard because you must push positive charges together against Coulomb repulsion. Fission is easier because a charge-free neutron can enter the nucleus without resistance, and the nucleus is already unstable.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "In an atom, the nucleus contains nearly all the mass but occupies a minuscule fraction of the atomic volume. Conceptually, how do the masses, charges, and locations of the constituent subatomic particles explain the overall electrical neutrality and mass distribution of a standard atom? (3 steps)", "answer": "- Step 1: **Identify the particles and their locations.** The atom consists of a dense central nucleus containing protons and neutrons (nucleons), surrounded by a vast, mostly empty space where electrons orbit in energy levels. \n- Step 2: **Analyze the mass distribution.** Protons and neutrons have roughly the same mass (approximately $$1 \\text{ u}$$ each), which is about 1840 times the mass of an electron. Because the electrons are practically massless in comparison, almost 100% of the atom's mass is concentrated in the tiny nucleus.\n- Step 3: **Analyze the electrical neutrality.** Protons carry a $$+1$$ relative charge, electrons carry a $$-1$$ relative charge, and neutrons carry a $$0$$ charge. In a neutral atom, the number of protons exactly equals the number of electrons. The positive charge of the nucleus is perfectly cancelled out by the negative charge of the electron cloud, resulting in an electrically neutral atom overall.\n\n*Takeaway: The atom is mostly empty space, with its mass locked in a tiny, positive core, balanced electrically by a diffuse cloud of negligible-mass electrons.*", "source": "Qwen 3 ②", "_id": "qwen_2_0"}, {"question": "In the gamma absorption core practical, the count rate through lead decreases *gradually* with increasing thickness — it never suddenly drops to zero at a specific thickness. What type of mathematical relationship describes this, and why is it fundamentally different from how alpha or beta radiation are absorbed? (3 steps)", "answer": "- Step 1: Gamma absorption follows an **exponential** relationship: $$I = I_0 e^{-\\mu x}$$ where $$I$$ is intensity, $$x$$ is thickness, and $$\\mu$$ is the absorption coefficient. Each additional layer of lead reduces intensity by a constant *fraction*, not a constant *amount*.\n- Step 2: This is because gamma rays are uncharged photons — they interact probabilistically with atoms. Each layer of lead gives each photon a certain probability of being absorbed or scattered, but no layer guarantees 100% absorption. Some photons always slip through.\n- Step 3: Alpha and beta are different because they are charged particles that *continuously* lose energy through ionisation as they travel. Once their kinetic energy is depleted, they stop abruptly at a specific range. Gamma photons either interact (and are removed) or pass through — there's no gradual energy drain, so there's always a non-zero probability of transmission.\n\nTakeaway: Charged particles drain energy continuously and stop at a definite thickness; gamma photons face probabilistic barriers and never have a guaranteed stopping point.", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "Why does the SaveMyExams document warn that \"the accuracy of such an experiment is improved with using a reliable source of radiation with a long half-life\"? How does half-life affect accuracy in Core Practical 15? (3 steps)", "answer": "- Step 1: If the source has a **short half-life**, its activity decreases significantly *during* the experiment itself. So readings taken at the start (with thinner lead) would be systematically higher than readings at the end (with thicker lead), not because of the lead, but because the source has decayed.\n- Step 2: A **long half-life** means the source activity is essentially constant throughout the experiment, so any change in count rate is genuinely due to the lead thickness.\n- Step 3: A **high activity** (well above background) also reduces the *relative* size of random fluctuations, giving more precise readings.", "source": "MiniMax ①", "_id": "minimax_1_72"}, {"question": "A doctor injects a patient with a radioactive tracer for medical imaging. Explain, using the concepts of activity and biological clearance, why an isotope with a half-life of 6 hours is ideal, whereas a half-life of 6 minutes or 6 years would be highly problematic for this specific application. (3 steps)", "answer": "- Step 1: **Evaluate the 6-minute half-life.** A half-life of 6 minutes is far too short. The activity would drop to negligible levels before the medical staff could properly administer the tracer, position the patient, and complete the imaging scans. The radiation would vanish before it could be useful.\n- Step 2: **Evaluate the 6-year half-life.** A half-life of 6 years is far too long. The activity would remain high long after the scan is complete. The patient would be subjected to prolonged, unnecessary internal ionising radiation, vastly increasing the risk of cellular damage and radiation-induced cancers.\n- Step 3: **Evaluate the 6-hour half-life.** A 6-hour half-life is the \"Goldilocks\" zone. It provides a high enough activity for clear imaging over a few hours, but decays rapidly enough that within a day or two, the activity drops to safe, negligible levels, minimizing long-term biological damage.\n\n*Takeaway: Medical tracers require a half-life long enough to perform the diagnostic procedure, but short enough to minimize the patient's long-term radiation dose.*", "source": "Qwen 3 ②", "_id": "qwen_2_13"}, {"question": "In a nuclear fission reactor, uranium-235 nuclei are split by absorbing a neutron. Explain the mechanism of a \"chain reaction\" in this context, and conceptually why the newly released neutrons must be slowed down (moderated) to sustain the reaction in U-235. (3 steps)", "answer": "- Step 1: When a U-235 nucleus absorbs a neutron, it becomes unstable and splits into two smaller daughter nuclei, releasing a large amount of energy and 2 or 3 additional fast-moving neutrons.\n- Step 2: These newly released neutrons can then go on to be absorbed by other U-235 nuclei, causing them to split and release even more neutrons, creating a self-sustaining \"chain reaction.\"\n- Step 3: The released neutrons are initially moving too fast to be easily absorbed by other U-235 nuclei; they must be slowed down (moderated) because slower neutrons spend more time in the vicinity of a nucleus, significantly increasing the probability of absorption (the absorption cross-section).", "source": "Qwen 3 ①", "_id": "qwen_1_7"}, {"question": "An alpha ($$\\alpha$$) particle is essentially a helium nucleus ($$^4_2\\text{He}$$). Explain the physical mechanism that causes alpha radiation to have the highest ionising power but the lowest penetrating power among the three main types of nuclear radiation. (3 steps)", "answer": "- Step 1: **Examine the physical properties of the alpha particle.** An alpha particle is relatively massive (4 nucleons) and carries a strong $$+2$$ electrical charge. \n- Step 2: **Connect charge to ionising power.** As the alpha particle travels through matter, its strong $$+2$$ charge exerts a powerful electrostatic (Coulomb) pull on the electrons of nearby atoms. It easily strips these electrons away, ionising the atoms. Because it interacts so strongly, it ionises heavily along its path.\n- Step 3: **Connect ionisation to penetrating power.** Every ionisation event transfers kinetic energy from the alpha particle to the surrounding matter. Because it causes so many ionisations in a very short distance, it loses its kinetic energy extremely rapidly. Consequently, it comes to a halt after just a few centimetres in air or is stopped by a single sheet of paper, giving it very low penetrating power.\n\n*Takeaway: High ionising power and low penetrating power are two sides of the same coin; the alpha particle dumps its energy into the surrounding matter too quickly to travel far.*", "source": "Qwen 3 ②", "_id": "qwen_2_1"}, {"question": "Why is the SaveMyExams equation $$A = -\\lambda N$$ called an **exponential** relationship, and what does the word \"exponential\" mean here? (2 steps)", "answer": "- Step 1: Solving the differential equation gives $$N(t) = N_0 e^{-\\lambda t}$$, and since $$A = \\lambda N$$, we also have $$A(t) = A_0 e^{-\\lambda t}$$. Both N and A decay **exponentially** with time.\n- Step 2: \"Exponential\" means the rate of change is **proportional to the current value**. As N gets smaller, the rate of decay gets smaller too — but it never quite reaches zero. This produces the characteristic \"steep at first, then flattening\" decay curve, with the half-life being a constant time interval regardless of where you start measuring.", "source": "MiniMax ①", "_id": "minimax_1_98"}, {"question": "What does it mean that radioactive decay is **spontaneous**? List three environmental factors that *cannot* influence the rate of decay, and explain the physical reasoning behind this independence. (3 steps)", "answer": "- Step 1: **Spontaneous** means the decay process cannot be influenced by any external environmental factors. Whether you heat it, crush it, dissolve it, or irradiate it, the probability of a given nucleus decaying in the next second remains the same.\n- Step 2: Three factors that cannot influence decay rate:\n+ **Temperature** — even at extreme temperatures, nuclear binding energies (~MeV) dwarf thermal energies (~eV), so thermal agitation has no effect on the nucleus.\n+ **Pressure** — compressing or expanding the material changes inter-atomic distances but does nothing to the nucleus, which is ~10⁻¹⁵ m in size and shielded by the electron cloud.\n+ **Chemical conditions** — bonding, dissolving, or reacting changes electron arrangements, but the nucleus is unaffected by chemistry.\n- Step 3: The physical reason: nuclear processes are governed by the strong nuclear force and quantum tunnelling within the nucleus, operating at energy scales millions of times larger than any chemical or thermal energy. External conditions simply cannot reach or modify the internal nuclear dynamics.\n\nTakeaway: Spontaneous = \"the nucleus decides on its own, and nothing external can speed it up or slow it down.\"", "source": "GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "Edge case: A radioactive sample has only **one nucleus** left. Can you predict when it will decay? What does the concept of half-life mean for a single nucleus? (2 steps)", "answer": "- Step 1: No — you cannot predict when a single nucleus will decay. It might decay in the next millisecond, or it might survive for many half-lives. The decay is random; the probability per second is $$\\lambda$$, but that's a probability, not a schedule.\n- Step 2: For a single nucleus, \"half-life\" has no deterministic meaning. It only means that there is a 50% probability the nucleus will survive beyond $$t_{1/2}$$, and a 50% chance it decays before then. Half-life is a *statistical median* for a population — for one nucleus, it's just a coin flip.\n\nTakeaway: Half-life is a population statistic — for a single nucleus, it's merely the time at which survival odds are 50/50, with no guaranteed outcome.", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "The half-life ($$t_{1/2}$$) of a radioactive isotope is defined as the time taken for the number of undecayed nuclei ($$N$$) to halve. Explain conceptually why the physical mass of the radioactive sample and the measured activity (count rate) of the sample also halve in this exact same time period, despite being entirely different physical quantities. (2 steps)", "answer": "- Step 1: **Relate mass to the number of nuclei.** The physical mass of the radioactive isotope in the sample is directly proportional to the number of undecayed nuclei ($$m \\propto N$$). If half of the radioactive nuclei have decayed into different elements, the mass of the *original radioactive isotope* remaining has exactly halved.\n- Step 2: **Relate activity to the number of nuclei.** Activity ($$A$$) is the rate of decay, defined by the equation $$A = \\lambda N$$. Since the decay constant ($$\\lambda$$) is a fixed probability for a given isotope, the activity is directly proportional to the number of remaining nuclei ($$A \\propto N$$). Therefore, when $$N$$ halves, the activity $$A$$ must also perfectly halve.\n\n*Takeaway: Because both the mass of the isotope and its activity are directly, linearly proportional to the number of remaining undecayed nuclei, they all share the exact same half-life.*", "source": "Qwen 3 ②", "_id": "qwen_2_7"}, {"question": "A common misconception is that \"alpha radiation is the most dangerous because it's the most ionising.\" Why is this statement **misleading**, and when is alpha radiation actually the most dangerous? (3 steps)", "answer": "- Step 1: The statement is misleading because **ionising power ≠ penetrating power**. Alpha is the most strongly ionising, but it is also the **least penetrating** — a sheet of paper or the dead outer layer of skin stops it completely.\n- Step 2: So if an alpha source is **outside** your body (e.g. held in your hand), it is essentially harmless — your skin absorbs it before it reaches living cells.\n- Step 3: Alpha becomes the **most dangerous** when the source gets **inside** your body — for example, if you inhale radon gas or ingest a particle of plutonium. Then there is no skin barrier, the alpha radiation deposits all its energy into a tiny volume of living tissue, and the intense local ionisation can cause serious damage (including lung cancer from radon).\n\nTakeaway: For external sources, gamma is the biggest external hazard (it penetrates your body). For internal sources, alpha is the biggest internal hazard (it dumps all its energy locally).", "source": "MiniMax ①", "_id": "minimax_1_12"}, {"question": "Gamma ($$\\gamma$$) decay frequently follows immediately after alpha or beta decay. Conceptually, what is the physical state of the daughter nucleus right after an alpha/beta emission that necessitates gamma emission, and why does this gamma emission leave the mass and atomic numbers completely unchanged? (2 steps)", "answer": "- Step 1: **Identify the state of the nucleus.** When a nucleus undergoes alpha or beta decay, the resulting daughter nucleus is often left in an \"excited\" quantum energy state. Its nucleons are not yet arranged in their lowest, most stable energy configuration. To relax down to the ground state, the nucleus must shed this excess energy.\n- Step 2: **Explain the nature of the gamma emission.** The nucleus releases this excess energy by emitting a gamma ray, which is a high-energy photon (electromagnetic radiation). Because a photon has zero rest mass and zero electrical charge, emitting it does not change the number of protons or neutrons. Thus, both the mass number ($$A$$) and atomic number ($$Z$$) remain perfectly unchanged.\n\n*Takeaway: Gamma decay is simply a nucleus \"cooling down\" from an excited state by emitting a photon of pure energy, altering neither its identity nor its mass.*", "source": "Qwen 3 ②", "_id": "qwen_2_3"}, {"question": "After a stationary nucleus decays into two fragments, which fragment carries *more* kinetic energy — the light alpha or the heavy daughter nucleus? Reason conceptually. (3 steps)", "answer": "- Step 1: Both fragments have equal momentum magnitude ($$p = mv$$), so the lighter one must move much faster: $$v \\propto 1/m$$.\n- Step 2: Kinetic energy is $$E_k = \\tfrac{1}{2}mv^2 = \\dfrac{p^2}{2m}$$, so for equal momentum, kinetic energy is *inversely* proportional to mass.\n- Step 3: The much lighter alpha particle therefore carries the larger share of the kinetic energy, while the heavy thorium nucleus recoils slowly with only a small fraction.\n\nTakeaway: with equal momenta, the lighter fragment (alpha) gets most of the kinetic energy since $$E_k = p^2/2m$$.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "**Synthesis question:** A smoke detector contains a tiny amount of **americium-241**, which is an **alpha emitter**. The alpha radiation ionises air inside a chamber, creating a small current. Smoke particles absorb the alpha radiation, the current drops, and the alarm triggers. (a) Why is an alpha emitter chosen, and (b) why is this safe for a household, even though alpha is \"the most dangerous\" inside the body? (2 steps)", "answer": "- Step 1: **Why alpha for smoke detection.** Alpha radiation is **strongly ionising** — it creates lots of ions in the air, giving a strong, easily measured current. It's also **stopped by paper or a few cm of air**, so it stays inside the detector chamber and doesn't escape into the house. The combination of strong ionisation and zero escape is perfect.\n- Step 2: **Why it's safe in a household.** The americium is sealed inside a solid plastic/metal chamber, so the alpha particles cannot reach the occupants. Even if the device is dropped and broken, americium-241 has a long half-life (~430 years) and the amount is tiny (micrograms). The risk of inhaling it is negligible for normal use. The \"alpha is dangerous inside the body\" rule applies to *internal* contamination — sealed inside a device, the alpha cannot get into your body, so the danger doesn't materialise.\n\nThis illustrates an important principle: **the danger of a radiation source depends on (a) the type of radiation, (b) whether the source is inside or outside the body, and (c) whether the source is sealed.**", "source": "MiniMax ②", "_id": "minimax_2_40"}, {"question": "The activity $$A$$ of a sample is given by the equation $$A = \\lambda N$$. Define the decay constant $$\\lambda$$ conceptually, and explain why a highly radioactive sample (high $$A$$) doesn't necessarily mean the isotope has a large decay constant. (3 steps)", "answer": "- Step 1: The decay constant $$\\lambda$$ is defined as the probability that a single, specific nucleus will decay per unit time (usually per second).\n- Step 2: The activity $$A$$ represents the total number of decays happening in the entire sample per unit time, which depends on both the probability of individual decay ($$\\lambda$$) and the total number of undecayed nuclei present ($$N$$).\n- Step 3: Therefore, a sample can have a very high activity (high $$A$$) simply because it contains a massive number of radioactive atoms (huge $$N$$), even if the intrinsic probability of any single atom decaying ($$\\lambda$$) is very small (meaning it has a long half-life).", "source": "Qwen 3 ①", "_id": "qwen_1_11"}, {"question": "A question asks which of the following decay sequences could transform $$^{211}_{83}Bi$$ into $$^{207}_{82}Pb$$: (A) 1 alpha, (B) 1 alpha + 1 beta, (C) 1 alpha + 2 beta, (D) 1 alpha + 3 beta. How do you systematically determine which is correct? (3 steps)", "answer": "- Step 1: Calculate the **net change** in A and Z required. Going from Bi (A=211, Z=83) to Pb (A=207, Z=82): ΔA = 207 − 211 = −4, ΔZ = 82 − 83 = −1.\n- Step 2: Each alpha decay contributes ΔA = −4, ΔZ = −2. Each beta decay contributes ΔA = 0, ΔZ = +1. With 1 alpha: ΔA = −4, ΔZ = −2. We need ΔZ = −1, so we need an additional +1 change in Z, which is exactly 1 beta decay.\n- Step 3: Check: 1 alpha (ΔA = −4, ΔZ = −2) + 1 beta (ΔA = 0, ΔZ = +1) = total (ΔA = −4, ΔZ = −1). This matches the required change. The answer is **(B) 1 alpha + 1 beta**.\n\nKey takeaway: Work backwards from the required net change. Alpha gives (−4, −2), beta gives (0, +1). Find the combination of these that produces the target (ΔA, ΔZ).", "source": "GLM 5.1 ①", "_id": "glm_1_48"}, {"question": "A common misconception is that \"alpha radiation cannot harm human cells.\" Why is this statement *partially correct but dangerously incomplete*? Under what specific condition does alpha become the *most* dangerous type of radiation to a person? (2 steps)", "answer": "- Step 1: The statement is partially correct *externally* — alpha particles are stopped by the outer dead layer of skin, so an external alpha source cannot reach living cells. From outside the body, alpha is the least hazardous.\n- Step 2: The statement becomes dangerously wrong *internally* — if an alpha-emitting substance is **ingested, inhaled, or enters through a wound**, the alpha radiation is now inside the body with no skin barrier. Directly adjacent to living tissue, alpha's extremely high ionising power causes intense, localised damage to cells and DNA. In this scenario, alpha is the *most* dangerous radiation type.\n\nTakeaway: \"Alpha can't harm cells\" is only true from outside the body. Inside the body, alpha is the worst — context matters critically.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "**Misconception probe:** A student says: *\"The half-life of carbon-14 is 5,700 years, so after 5,700 years, all the carbon-14 in a sample will be gone.\"* What's wrong with this? (2 steps)", "answer": "- Step 1: **What half-life actually means.** After one half-life, **half** of the original carbon-14 has decayed — not *all* of it. After *two* half-lives (11,400 years), **¼** of the original is left. After *three* (17,100 years), **⅛** is left. And so on.\n- Step 2: **The correct picture.** The amount of carbon-14 approaches zero **asymptotically** — it gets halved, then halved again, then again, getting closer and closer to zero but never quite reaching it. In practice, after about 10 half-lives (~57,000 years), only ~0.1% of the original remains, which is undetectable — so we say the sample is \"effectively\" gone. But mathematically, the activity is never exactly zero.\n\nThis is why carbon-14 dating is reliable for samples up to about 50,000–60,000 years old, but not for older samples — the remaining carbon-14 is too small to measure accurately.", "source": "MiniMax ②", "_id": "minimax_2_29"}, {"question": "Why is beta radiation described as *moderately* ionising and *moderately* penetrating — what physical properties of the beta particle place it between alpha and gamma in both categories? (2 steps)", "answer": "- Step 1: **Moderately ionising** — a beta particle has charge $$-1e$$ (half the charge magnitude of alpha's $$+2e$$) and much less mass, so it moves faster. It still ionises atoms it passes (its electric field deflects electrons), but each interaction transfers less energy than alpha's heavy, slow collisions. It creates fewer ions per unit distance.\n- Step 2: **Moderately penetrating** — because it deposits less energy per unit distance, it can travel further before exhausting its energy. Beta particles travel roughly 20 cm to 3 m in air and are stopped by a few millimetres of aluminium. They penetrate further than alpha (stopped by paper) but far less than gamma (needs thick lead).\n\nTakeaway: Beta is the \"middle child\" — its single charge and low mass mean it interacts less violently than alpha but more than the uncharged gamma.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "**Misconception probe:** A student says: *\"In beta decay, the beta particle comes from the electron cloud around the nucleus.\"* Why is this wrong? (2 steps)", "answer": "- Step 1: **Where the electron really comes from.** The beta particle (electron) is created *inside the nucleus* when a neutron transforms into a proton plus an electron. The electron is then immediately ejected from the nucleus at high speed. It never existed in the electron shells — the electron cloud is a *separate* thing governed by the electromagnetic force.\n- Step 2: **Why this matters.** The atomic number Z *changes* in beta decay, which would be impossible if the electron came from the shells (the shells don't change the nucleus). The transformation of a neutron into a proton is what raises Z by 1, and the electron is the by-product of that nuclear process.\n\nSo: beta particles emerge *from* the nucleus, but the *cause* of beta decay is instability in the neutron-to-proton ratio, not anything happening in the electron shells.", "source": "MiniMax ②", "_id": "minimax_2_27"}, {"question": "What is a **Geiger-Müller (GM) tube**, and how does it detect radiation? (3 steps)", "answer": "- Step 1: **What it is.** A GM tube is a sealed tube filled with low-pressure gas, with an electrode down the middle and the outer casing acting as another electrode. A high voltage is applied between them.\n- Step 2: **How it detects.** When alpha, beta, or gamma radiation enters the tube, it **ionises** the gas inside — knocking electrons off gas atoms. These free electrons are accelerated by the high voltage and cause a cascade of further ionisations, producing a measurable pulse of current.\n- Step 3: **Output.** Each detected decay causes a \"click\" or count, which is registered as a count rate (counts per second or per minute). The count rate is proportional to the activity of the source.\n\nThe key physical principle: radiation must *ionise* something to be detected, which is why all three types can be picked up by a GM tube (though with very different efficiencies).", "source": "MiniMax ②", "_id": "minimax_2_2"}, {"question": "When a uranium nucleus undergoes fission after absorbing a neutron, it splits into two smaller nuclei and releases 2–3 neutrons. Explain how this leads to a **chain reaction**, and why controlling the number of neutrons available is critical in a nuclear reactor. (3 steps)", "answer": "- Step 1: The original slow neutron is absorbed by a uranium nucleus, causing it to split. The 2–3 neutrons released in this fission event are **fast-moving**. If these neutrons are not absorbed or slowed, each one can go on to trigger another fission event in a neighbouring uranium nucleus.\n- Step 2: If each fission releases ~3 neutrons, and each of those triggers another fission, the number of fissions grows: 1 → 3 → 9 → 27 → 81 → ... This is an **exponentially growing chain reaction**. In an uncontrolled chain reaction (nuclear weapon), this runaway process releases enormous energy in a fraction of a second.\n- Step 3: In a **nuclear reactor**, control rods (made of neutron-absorbing material like boron) are inserted to absorb some of the neutrons. By controlling how many neutrons are available to cause further fissions, the reaction rate is kept **critical but not supercritical** — each fission produces on average exactly one neutron that goes on to cause another fission, maintaining a steady power output.\n\nKey takeaway: The chain reaction is the exponential multiplication of fission events via released neutrons. Control rods regulate this by absorbing excess neutrons, preventing runaway.", "source": "GLM 5.1 ①", "_id": "glm_1_30"}, {"question": "A stationary uranium-238 nucleus undergoes alpha decay, producing thorium-234 and an alpha particle. The total kinetic energy released is $$E$$. Using conservation of momentum and energy, explain qualitatively why the alpha particle carries away *most* of the energy $$E$$, not a small fraction. (3 steps)", "answer": "- Step 1: The initial momentum is zero (the nucleus is stationary). By conservation of momentum: $$m_{Th} v_{Th} = m_{\\alpha} v_{\\alpha}$$. Since $$m_{Th} = 234$$ u and $$m_{\\alpha} = 4$$ u, the thorium must move much *slower* than the alpha to balance momentum: $$v_{Th} = \\frac{4}{234} v_{\\alpha}$$.\n- Step 2: Kinetic energy is $$\\frac{1}{2}mv^2$$. The thorium has large mass but tiny velocity (squared). The alpha has small mass but large velocity (squared). Since kinetic energy scales with $$v^2$$, the alpha's high velocity dominates: $$KE_{\\alpha} = \\frac{1}{2}(4)v_{\\alpha}^2$$ while $$KE_{Th} = \\frac{1}{2}(234)\\left(\\frac{4}{234}\\right)^2 v_{\\alpha}^2 = \\frac{1}{2}\\frac{16}{234}v_{\\alpha}^2$$.\n- Step 3: Comparing: $$KE_{Th} = \\frac{4}{234} KE_{\\alpha} \\approx \\frac{1}{58.5} KE_{\\alpha}$$. The alpha particle carries about 98.3% of the total energy. This is a general principle: in any decay where a light fragment is emitted, the lighter fragment carries most of the kinetic energy because momentum conservation forces it to move much faster, and $$KE \\propto v^2$$.\n\nThis is analogous to a cannon: the light cannonball flies off at high speed with most of the kinetic energy, while the heavy cannon recoils slowly.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "Nuclear fusion requires temperatures of millions of degrees and immense pressure to occur, whereas nuclear fission can be initiated at room temperature by a slow-moving neutron. Explain this stark difference in initiation conditions using the concepts of electrostatic forces and the strong nuclear force. (3 steps)", "answer": "- Step 1: **Analyze the barrier to fusion.** Fusion involves forcing two light, positively charged nuclei (like hydrogen isotopes) together. Because like charges repel, there is a massive electrostatic (Coulomb) repulsion between them. To overcome this barrier and get close enough for the attractive strong nuclear force to take over, the nuclei must have immense kinetic energy, which requires extreme temperatures and pressures.\n- Step 2: **Analyze the initiation of fission.** Fission involves splitting a heavy, unstable nucleus (like Uranium-235). This is triggered by a neutron. Because the neutron has zero electrical charge, it experiences absolutely no Coulomb repulsion from the protons in the nucleus.\n- Step 3: **Explain the fission mechanism.** The neutral neutron can easily wander into the nucleus even at low speeds. Once absorbed, it adds excitation energy and disrupts the delicate balance between the attractive strong nuclear force and the repulsive electrostatic force within the large nucleus, causing it to oscillate and split apart without needing extreme external heat.\n\n*Takeaway: Fusion requires brute force to overcome the Coulomb barrier between two positive charges, while fission uses a neutral \"trojan horse\" (the neutron) to bypass the barrier entirely.*", "source": "Qwen 3 ②", "_id": "qwen_2_5"}, {"question": "When a nucleus undergoes beta-minus decay, the **mass number stays the same** but the **atomic number increases by 1**. Explain the physical reason inside the nucleus that causes this specific change. (3 steps)", "answer": "- Step 1: Beta-minus decay occurs when the nucleus has **too many neutrons** relative to protons. A neutron inside the nucleus spontaneously converts: $$^{1}_{0}\\text{n} \\rightarrow ^{1}_{1}\\text{p} + ^{0}_{-1}\\beta^{-} + \\bar{\\nu}_e$$\n- Step 2: One neutron disappears and one proton appears. Since both have mass ≈ 1u, the total nucleon count ($$A$$) is unchanged: you lost a neutron but gained a proton — net mass number change = 0.\n- Step 3: The proton number ($$Z$$) increases by 1 because a neutron (charge 0) became a proton (charge +1). The beta particle (charge -1) and antineutrino (charge 0) are ejected, so net charge on the remaining nucleus goes up by +1. The general equation: $$^{A}_{Z}\\text{X} \\rightarrow ^{A}_{Z+1}\\text{Y} + ^{0}_{-1}\\beta^{-} + \\bar{\\nu}_e$$\n\nTakeaway: Beta-minus decay is a neutron upgrading itself into a proton — mass stays the same, but the element transmutes one step up the periodic table.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "Nuclear fission is triggered by a *slow* neutron hitting a uranium nucleus. Why must the neutron be slow, and why can't a proton be used instead to trigger the chain reaction? (3 steps)", "answer": "- Step 1: A **slow neutron** is used because it needs to be **captured** by the uranium nucleus. If the neutron is moving too fast, it passes through the nucleus without being absorbed — like a fast ball glancing off a catcher's mitt. A slow neutron lingers near the nucleus long enough for the strong nuclear force to capture it, making the nucleus unstable and causing it to split.\n- Step 2: A **proton** cannot be used because it is **positively charged**. The uranium nucleus also has a large positive charge (Z = 92). The proton would be **repelled** by the Coulomb force before it could get close enough for the short-range strong nuclear force to capture it. You would need enormous energy to overcome this repulsion.\n- Step 3: A neutron has **zero charge**, so it experiences **no Coulomb repulsion** from the nucleus. It can approach freely and be captured at low energy. This is why neutrons are the ideal \"trigger\" for fission — they can penetrate the nucleus without needing to overcome any electrical barrier.\n\nKey takeaway: Neutrons are the key to fission because they are uncharged — they can enter the nucleus at low energy. Protons are repelled by the nuclear charge barrier.", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "In an atom, the nucleus contains almost all the mass but occupies a tiny fraction of the volume. Conceptually, how does this extreme density difference explain why alpha par
