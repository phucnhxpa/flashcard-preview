particle is 2 protons + 2 neutrons, so it carries away 4 nucleons total and 2 units of positive charge.\n- Step 2: The nucleon (mass) number therefore decreases by 4: $$A \\to A-4$$.\n- Step 3: The proton (atomic) number decreases by 2: $$Z \\to Z-2$$.\n\nWritten out: $$^{A}_{Z}X \\to \\, ^{A-4}_{Z-2}Y + \\, ^{4}_{2}\\alpha$$. Balance check: $$A = (A-4)+4$$ and $$Z = (Z-2)+2$$. ✓", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "In beta-minus decay, an electron is emitted from the nucleus. How do $$A$$ and $$Z$$ change, and why is the beta particle written with atomic number $$-1$$?", "answer": "- Step 1: In $$\\beta^-$$ decay a neutron effectively converts into a proton plus the emitted electron. This happens in nuclei with too many neutrons.\n- Step 2: The total nucleon count is unchanged, so the mass number stays the same: $$A \\to A$$. But a neutron became a proton, so the proton number increases by 1: $$Z \\to Z+1$$.\n- Step 3: The beta particle is written $$^{0}_{-1}\\beta$$ — the top 0 means it has negligible mass, and the bottom $$-1$$ represents its charge (electrons are negative, so a negative \"atomic number\").\n\nTakeaway: for balance, $$Z$$ on the left must equal $$(Z+1) + (-1)$$ on the right — the $$-1$$ of the electron is what makes it work.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "In gamma decay, why do the mass number and atomic number both stay unchanged?", "answer": "- Step 1: A gamma ray is pure electromagnetic energy — it has no mass and no charge.\n- Step 2: Since nothing with mass or charge leaves the nucleus, neither the nucleon count ($$A$$) nor the proton count ($$Z$$) changes.\n- Step 3: What does change is the energy of the nucleus: gamma decay lets an \"excited\" nucleus drop to a lower-energy state without altering its composition.\n\nTakeaway: gamma decay reshuffles energy, not structure — same nucleus, less energy.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Rank alpha, beta, and gamma by penetrating power, from least to most, and give a rough stopping material for each.", "answer": "- Step 1: Alpha is the least penetrating — it's stopped by a sheet of paper (or a few cm of air, or the skin).\n- Step 2: Beta is moderately penetrating — it passes through paper but is stopped by a few millimetres of aluminium.\n- Step 3: Gamma is the most penetrating — it needs thick, dense material (like lead or concrete) and is only ever partially reduced, never fully \"stopped\" easily.\n\nTakeaway: penetrating power increases $$\\alpha < \\beta < \\gamma$$; stopping material gets thicker/denser in the same order.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "Rank alpha, beta, and gamma by ionising power. Why does the most penetrating one ionise the least?", "answer": "- Step 1: Alpha is the most strongly ionising, beta is moderate, gamma is the weakest ioniser — the reverse of the penetration order.\n- Step 2: A strong ioniser interacts heavily with atoms it passes, ripping off electrons frequently. Alpha (big, +2 charge, slow) collides a lot, dumps its energy fast, so it stops quickly.\n- Step 3: Gamma (no charge, no mass) interacts weakly, so it rarely ionises — but because it rarely interacts, it travels far before being absorbed.\n\nTakeaway: strong ionisation and deep penetration are opposites — the more you interact, the sooner you stop.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "An exam option says \"alpha radiation cannot harm human cells.\" Why is this statement false?", "answer": "- Step 1: Outside the body, alpha is stopped by the skin, so external alpha is relatively harmless.\n- Step 2: But if an alpha emitter gets inside the body (e.g. by inhaling or eating it), the alpha particles are released right next to living tissue.\n- Step 3: Because alpha is strongly ionising, internal alpha is extremely damaging to cells — so it absolutely can harm cells; the claim is false.\n\nTakeaway: alpha's danger depends on location — harmless outside, very dangerous inside.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "A multiple-choice question claims gamma radiation \"cannot harm cells.\" Why is this a misconception?", "answer": "- Step 1: Gamma is weakly ionising, so per particle it does little damage — this is the seed of the confusion.\n- Step 2: But \"weakly ionising\" is not \"non-ionising.\" Gamma still ionises atoms and causes chemical changes and cell damage.\n- Step 3: You simply need a larger dose of gamma to cause the same damage as a smaller dose of alpha or beta. All three types can harm cells.\n\nTakeaway: gamma damages cells too — it just takes more of it.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Match each type of radiation to its charge: which is positively charged, which negative, and which has no charge?", "answer": "- Step 1: Alpha is positively charged — it's 2 protons + 2 neutrons, giving charge $$+2e$$.\n- Step 2: Beta ($$\\beta^-$$) is negatively charged — it's an electron, charge $$-1e$$.\n- Step 3: Gamma has no charge — it's electromagnetic radiation.\n\nCharge determines behaviour: charged particles (alpha, beta) can be deflected by electric/magnetic fields; uncharged gamma cannot.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Which type of radiation has the greatest range in air, and which has the shortest? Connect this to their charge and mass.", "answer": "- Step 1: Alpha has the shortest range — it's big, heavy, and highly charged, so it collides with air molecules constantly and loses energy within a few centimetres.\n- Step 2: Beta has an intermediate range (roughly 20 cm to a few metres in air) — lighter and less charged than alpha, so it travels further.\n- Step 3: Gamma has the greatest range — no charge, no mass, so it barely interacts and penetrates far through air.\n\nTakeaway: range in air mirrors penetrating power: $$\\alpha$$ shortest, $$\\gamma$$ longest.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "How do you read a half-life directly off a decay graph if you start with 100 units of activity?", "answer": "- Step 1: Locate the starting value on the y-axis — here 100 units at time zero.\n- Step 2: Find half of that value on the y-axis — here 50 units.\n- Step 3: Read across to the curve and down to the time axis; that time is one half-life.\n\nTakeaway: half-life = the time for the y-value to fall from any point to half that point — read it straight off the graph.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "After 3 half-lives, what fraction of the original amount remains? Explain using the halving idea.", "answer": "- Step 1: Each half-life multiplies the remaining amount by $$\\tfrac{1}{2}$$.\n- Step 2: After 3 half-lives, the amount is $$\\left(\\tfrac{1}{2}\\right)^3 = \\tfrac{1}{8}$$ of the original.\n- Step 3: Check by stepping down: $$100\\% \\to 50\\% \\to 25\\% \\to 12.5\\%$$ — three halvings gives 12.5%, which is $$\\tfrac{1}{8}$$.\n\nGeneral rule: fraction remaining after $$n$$ half-lives is $$\\left(\\tfrac{1}{2}\\right)^n$$.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "If a sample undergoes 3 half-lives in 7.8 days, how do you find the length of one half-life, and how many half-lives fit in 13 days?", "answer": "- Step 1: One half-life = total time ÷ number of half-lives = $$7.8 \\div 3 = 2.6$$ days.\n- Step 2: To find how many half-lives are in 13 days, divide: $$13 \\div 2.6 = 5$$ half-lives.\n- Step 3: So over 13 days the sample halves 5 times, meaning the remaining fraction is $$\\left(\\tfrac{1}{2}\\right)^5 = \\tfrac{1}{32}$$ of the original.\n\nTakeaway: convert everything into \"number of half-lives\" first, then apply the halving rule.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "A medical tracer starts with 100,000 nuclei and is disposed of after ~5 half-lives, leaving roughly 3,000 nuclei. How do you judge whether disposal is \"safe\"?", "answer": "- Step 1: Compute the surviving fraction: $$3{,}000 / 100{,}000 = 3\\%$$ of the original amount of radioactive nuclei.\n- Step 2: Compare to context: the tracer is used briefly (a couple of days) to image the body, so its early activity was acceptable for patient use.\n- Step 3: If only ~3% of the original radiation remains at disposal, that's a small fraction of an already-tolerable dose, so it is reasonable to call it safe.\n\nTakeaway: \"safe\" is a relative judgement — express the remainder as a fraction of the original and argue it's now negligible.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "You're told $$100{,}000$$ tracer nuclei decay through half-lives. Set up the \"magic table\" columns needed to track this over time — what goes in each column?", "answer": "- Step 1: Column 1 — number of half-lives elapsed, starting at $$0$$ (so 0, 1, 2, 3, ...).\n- Step 2: Column 2 — the elapsed time in days, found by multiplying the half-life count by one half-life (e.g. steps of 2.6 days).\n- Step 3: Column 3 — the number of nuclei remaining, starting at 100,000 and halving each row (100,000 → 50,000 → 25,000 → ...).\n\nTakeaway: the table converts \"days\" into \"number of halvings,\" then halves the count row by row.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "In a decay equation, if the atomic number $$Z$$ decreases by 2 while the mass number $$A$$ decreases by 4, which decay occurred? What if $$Z$$ increases by 1 with $$A$$ unchanged?", "answer": "- Step 1: $$Z$$ down by 2 and $$A$$ down by 4 means 2 protons and 2 neutrons left — that's an alpha particle, so it's alpha decay.\n- Step 2: $$Z$$ up by 1 with $$A$$ the same means a neutron turned into a proton and an electron was emitted — that's beta-minus decay.\n- Step 3: (For contrast) $$Z$$ and $$A$$ both unchanged with energy released is gamma decay.\n\nTakeaway: read the changes in $$A$$ and $$Z$$ like a fingerprint to identify the decay type.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "An exam option shows a decay where the atomic number $$Z$$ decreases but the mass number $$A$$ stays the same. Why is this \"invalid\" — impossible via standard decay?", "answer": "- Step 1: In alpha decay, $$A$$ must drop by 4 (not stay the same), so this can't be alpha.\n- Step 2: In beta-minus decay, $$Z$$ increases (not decreases), and $$A$$ stays the same — so a decrease in $$Z$$ rules out beta-minus.\n- Step 3: Gamma decay changes neither $$A$$ nor $$Z$$, so a change in $$Z$$ rules out gamma. No standard decay lowers $$Z$$ while keeping $$A$$ fixed → invalid.\n\nTakeaway: check each decay's signature against the observed change; if none fit, the process is impossible.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "A nucleus goes from proton number $$Q$$ down through a chain, ending with a change explainable only as \"1 alpha and some beta decays.\" How do you count the alphas and betas from the mass and atomic number changes?", "answer": "- Step 1: Count alphas from the change in mass number: each alpha drops $$A$$ by 4, so (total drop in $$A$$) ÷ 4 = number of alphas.\n- Step 2: Each alpha also drops $$Z$$ by 2, so compute the expected $$Z$$ after the alphas alone.\n- Step 3: Compare that expected $$Z$$ to the actual final $$Z$$: each beta-minus adds 1 to $$Z$$ (and doesn't change $$A$$), so the leftover discrepancy in $$Z$$ tells you the number of betas.\n\nTakeaway: mass number pins down the alphas; the remaining atomic-number mismatch pins down the betas.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Contrast fission and fusion: what physically happens to the nuclei in each?", "answer": "- Step 1: Fission is splitting one large nucleus into two smaller nuclei (plus a few neutrons).\n- Step 2: Fusion is joining two small nuclei together into one larger nucleus.\n- Step 3: The tutor's student initially swapped the definitions — a common confusion. Anchor it: \"fiSSion = SplittS,\" \"fUSion = fUSes together.\"\n\nTakeaway: fission = break apart; fusion = merge together.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Why does fusion require enormous temperature and pressure to get started, while overcoming a specific force?", "answer": "- Step 1: Fusion joins two nuclei, both of which are positively charged (they contain protons).\n- Step 2: Like charges repel via the Coulomb (electrostatic) force, so the two nuclei strongly push each other apart as they approach.\n- Step 3: To force them close enough to fuse, you need extreme temperature (high kinetic energy) and pressure to overcome that Coulomb repulsion.\n\nNote: the student mixed up which process this applies to; this repulsion barrier is the hallmark of *fusion*, not fission starting.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "What particle triggers nuclear fission in a material like uranium, and why does this lead to a chain reaction?", "answer": "- Step 1: A (slow) neutron is absorbed by a large nucleus, making it unstable so it splits into two smaller nuclei.\n- Step 2: The splitting also releases 2 or 3 further neutrons.\n- Step 3: Each released neutron can be absorbed by another large nucleus, triggering more fissions — this self-sustaining cascade is the chain reaction.\n\nWhy a neutron? It has no charge, so it isn't repelled by the positive nucleus and can walk right in.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "Why is a neutron (rather than a proton, beta, or gamma) the ideal particle to initiate fission?", "answer": "- Step 1: To split a nucleus you must get a particle *into* it.\n- Step 2: A proton or alpha is positively charged, so the positive nucleus repels it (Coulomb barrier) — hard to get in.\n- Step 3: A neutron is uncharged, so it feels no electrostatic repulsion and can be absorbed even when moving slowly — perfect for triggering fission.\n\nTakeaway: no charge → no repulsion → easy nuclear entry, which is why neutrons drive fission.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "What are the two types of nuclear bomb, and why must a hydrogen bomb start with a fission reaction?", "answer": "- Step 1: The two types are the fission bomb (\"atomic bomb,\" the original Oppenheimer design) and the fusion bomb (\"hydrogen bomb\").\n- Step 2: Fusion requires extremely high temperature and pressure to overcome the Coulomb repulsion between light nuclei.\n- Step 3: A fission explosion is used as the \"trigger\" — it produces the heat and pressure needed to ignite the fusion stage.\n\nTakeaway: fission is easy to start and is used to create the conditions that fusion needs.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "Define background radiation and give at least one natural and one man-made source.", "answer": "- Step 1: Background radiation is the low level of radiation from environmental sources that is always present around us.\n- Step 2: Natural sources include radon gas from rocks, cosmic rays from space, and radioactive isotopes in food (e.g. potassium-40 in bananas, carbon-14 in living matter).\n- Step 3: Man-made sources include medical uses (X-rays, tracers), nuclear waste, nuclear weapons fallout, and nuclear accidents.\n\nExam tip: always quote at least one natural AND one man-made source — they're marked as separate categories.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Why is radon gas a particularly notable natural background source, and why is it dangerous if inhaled?", "answer": "- Step 1: Heavy radioactive elements like uranium and thorium occur naturally in rocks; uranium decays into radon, which is a gas.\n- Step 2: Radon is an alpha emitter, and it can seep out of rocks and soil into the air we breathe.\n- Step 3: Alpha outside the body is harmless (stopped by skin), but inhaled radon puts an alpha source directly inside the lungs, where the strong ionisation badly damages tissue.\n\nTakeaway: radon's danger comes from being an internal alpha source in the lungs.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "What is the \"corrected count rate,\" and why must you measure it when using a radioactive source in the lab?", "answer": "- Step 1: A detector always picks up background radiation, even with no source present — this inflates readings.\n- Step 2: You first measure the count with no source (the background), then measure with the source present.\n- Step 3: Subtracting the background from the with-source reading gives the corrected count rate — the true contribution of your source alone.\n\nTakeaway: corrected count rate = (reading with source) − (background reading).", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "On a count-rate-vs-distance graph, how can you identify the background radiation level, and how does this reveal a common exam \"trap\"?", "answer": "- Step 1: As the source moves far away, its radiation is absorbed by the air and stops reaching the detector.\n- Step 2: Beyond that distance the reading stops falling and levels off at a constant, non-zero value.\n- Step 3: That constant floor is the background radiation — the count never drops to zero because background is always present.\n\nExam trap: watch for count rates that don't drop to zero, or half-life graphs tending to a value above zero — that's background you must account for.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "How does a radiation detector like a Geiger-Müller tube actually \"detect\" alpha or beta radiation?", "answer": "- Step 1: As alpha or beta radiation passes close to atoms, it delivers enough energy to knock electrons off, ionising the atoms.\n- Step 2: The detector senses either the ions produced or the chemical changes those ions cause.\n- Step 3: Each detection event registers as a count; other detectors (photographic film, ionisation chambers, scintillation counters, spark counters) work on similar ionisation principles.\n\nTakeaway: detection relies on radiation's ability to ionise — no ionisation, no signal.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "In Core Practical 15 (gamma absorption by lead), identify the independent, dependent, and key control variables — and explain why each control matters.", "answer": "- Step 1: Independent variable = thickness of the lead absorber (what you deliberately change).\n- Step 2: Dependent variable = count rate measured by the GM tube (what you measure in response).\n- Step 3: Control variables and why:\n+ Same radioactive source — different sources have different activities/energies.\n+ Fixed distance from source to tube — count rate falls with distance, so it must be constant.\n+ Same location/background — background varies by place, which would distort the corrected count.\n\nTakeaway: only lead thickness should change; everything else that affects count rate must be held fixed.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "In the gamma-absorption experiment, why do you first measure the count with no source, and how do you know when the gamma has been \"fully absorbed\" by the lead?", "answer": "- Step 1: You measure with no source to get the background count rate, which must be subtracted from later readings (corrected count rate).\n- Step 2: As you add thicker lead, the count rate drops because more gamma is absorbed.\n- Step 3: When the count over the interval falls to background levels (allowing for a little random variation), essentially all the source's gamma has been absorbed — that tells you the lead thickness needed.\n\nTakeaway: \"fully absorbed\" = reading has dropped back down to just background.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "List key safety precautions when handling a radioactive source in the lab, and give the reasoning behind each.", "answer": "- Step 1: Store the source in a lead-lined container when not in use — lead absorbs the radiation and protects everyone nearby.\n- Step 2: Keep a good distance (about a metre) during use — intensity falls sharply with distance, so distance lowers your dose.\n- Step 3: Handle with tweezers/tongs and point the source away from you — this maximises distance to sensitive tissue and avoids skin contact.\n\nAlso: wash hands and remove outer clothing afterwards to remove any contamination.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "Define radioactive decay, and explain what makes it both \"spontaneous\" and \"random.\"", "answer": "- Step 1: Radioactive decay is the spontaneous disintegration of a nucleus into a more stable nucleus, emitting an alpha, beta, or gamma particle.\n- Step 2: Spontaneous means the decay cannot be influenced by external environmental factors — temperature, pressure, and chemical conditions have no effect.\n- Step 3: Random means you cannot predict the exact moment a given nucleus decays; each nucleus only has a fixed *probability* of decaying per unit time.\n\nTakeaway: spontaneous = unaffected by surroundings; random = unpredictable timing per nucleus.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "If individual decays are random and unpredictable, how can we still make reliable predictions about a radioactive sample's behaviour?", "answer": "- Step 1: Each nucleus has the same constant probability of decaying in a given time — that probability is fixed even though timing is random.\n- Step 2: A real sample contains an enormous number of nuclei (huge statistics).\n- Step 3: With such large numbers, statistical averaging smooths out the randomness, so the group's overall decay (activity, half-life) becomes highly predictable — like predicting coin-flip proportions over millions of flips.\n\nTakeaway: randomness per nucleus + huge numbers = predictable average behaviour.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "How does a Geiger-Müller tube provide direct evidence that radioactive decay is random?", "answer": "- Step 1: Place a GM tube near a source and record counts over time.\n- Step 2: The counts come out irregular and cannot be predicted from one moment to the next — the reading fluctuates.\n- Step 3: Each count is one nuclear decay, so these erratic fluctuations directly show that individual decays happen at unpredictable moments — evidence of randomness.\n\nTakeaway: the jittery, irregular count rate is the visible signature of underlying random decay.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Define the decay constant $$\\lambda$$. What does a large value of $$\\lambda$$ tell you about a sample?", "answer": "- Step 1: The decay constant $$\\lambda$$ is the probability, per second, that any given nucleus will decay.\n- Step 2: A large $$\\lambda$$ means each nucleus is very likely to decay soon, so many decays happen per second.\n- Step 3: Therefore a large $$\\lambda$$ corresponds to high activity (and a short half-life) — the sample is very radioactive.\n\nTakeaway: $$\\lambda$$ is a per-nucleus decay probability; bigger $$\\lambda$$ → faster decay → higher activity.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "Explain the equation $$A = \\dfrac{\\Delta N}{\\Delta t} = -\\lambda N$$: what each term means and why there's a minus sign.", "answer": "- Step 1: $$A$$ is the activity — the number of decays per unit time, measured in becquerels (Bq), where 1 Bq = 1 decay per second.\n- Step 2: $$\\lambda N$$ says the activity equals the per-nucleus decay probability ($$\\lambda$$) times the number of undecayed nuclei present ($$N$$) — more nuclei and higher $$\\lambda$$ both raise activity.\n- Step 3: $$\\dfrac{\\Delta N}{\\Delta t}$$ is the rate of change of the number of nuclei; the minus sign appears because $$N$$ is *decreasing* over time (nuclei are being lost), so the rate of change is negative.\n\nTakeaway: activity is proportional to how many nuclei remain; the minus sign just encodes that the population shrinks.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "Why does the activity of a sample fall over time, and how does this connect to the shape of the decay curve?", "answer": "- Step 1: Activity is $$A = \\lambda N$$, so it's proportional to the number of remaining nuclei $$N$$.\n- Step 2: As nuclei decay, $$N$$ falls, which means $$A$$ falls too — fewer nuclei left means fewer decays per second.\n- Step 3: Because the rate of decay depends on how much is left, the decay is exponential: it falls fast at first (many nuclei) and ever more slowly later (few nuclei), producing the characteristic curve that halves over each fixed half-life.\n\nTakeaway: activity tracks $$N$$, and the \"rate depends on amount left\" is exactly what makes decay exponential.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "1 Bq means what, physically? If sample X reads 500 Bq and sample Y reads 50 Bq, what can you say about them?", "answer": "- Step 1: 1 becquerel (Bq) = one nuclear decay per second.\n- Step 2: 500 Bq means sample X undergoes 500 decays every second; 50 Bq means Y undergoes 50 decays per second.\n- Step 3: Sample X is ten times more active, meaning (for the same element) it has about ten times as many undecayed nuclei remaining, since $$A = \\lambda N$$.\n\nTakeaway: Bq is a direct count of decays per second; higher Bq = more active = more remaining nuclei (same isotope).", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "Why does living matter maintain a roughly constant amount of carbon-14, and what does this hint about how such isotopes could be used?", "answer": "- Step 1: All organic matter contains a tiny amount of carbon-14.\n- Step 2: While alive, plants and animals constantly take in and replace carbon, so their carbon-14 is topped up as fast as it decays — keeping the level almost constant.\n- Step 3: This constant-while-alive, decaying-after-death behaviour is the basis for using carbon-14 as a natural clock (radioactive dating), though the level itself contributes to background radiation.\n\nTakeaway: constant intake balances decay while alive — a stable baseline that only starts falling once replacement stops.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "Two nuclei fly apart after an alpha decay from a stationary parent. Why must the light alpha particle move much faster than the heavy daughter nucleus?", "answer": "- Step 1: The parent was stationary, so total momentum before is zero; by conservation of momentum, total momentum after must also be zero.\n- Step 2: This means the two fragments carry equal and opposite momenta: (mass of daughter)×(its speed) = (mass of alpha)×(its speed).\n- Step 3: Since the alpha is far lighter than the daughter nucleus, it must have a correspondingly larger speed to balance the momentum equation.\n\nTakeaway: equal momentum split + tiny mass → the alpha gets the big velocity (and, in fact, most of the kinetic energy).", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}], "count": 47}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "An atom is made of a central nucleus surrounded by electrons in energy levels. Compare the mass and charge of the three subatomic particles, and explain which dominates the atom's mass. (3 steps)", "answer": "- Step 1: The nucleus contains protons and neutrons, which have approximately equal mass (each about one atomic mass unit). The electrons orbit in energy levels outside the nucleus.\n- Step 2: For charge: protons carry $$+1$$, electrons carry $$-1$$, and neutrons carry $$0$$. In a neutral atom the number of protons equals the number of electrons so charges cancel.\n- Step 3: Almost all the mass is in the nucleus because protons and neutrons are roughly 1800 times heavier than electrons — the electron mass is negligible by comparison.\n\nTakeaway: nucleus = nearly all the mass + positive charge; electrons = charge balance but negligible mass.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "What is \"nuclear radiation\" fundamentally describing at the level of the nucleus? (2 steps)", "answer": "- Step 1: Nuclear radiation is the process of an unstable nucleus emitting (\"spitting out\") something to become more stable — the emission comes from the nucleus itself, not from the electrons.\n- Step 2: This happens because the nucleus has an unbalanced number of nucleons; emitting a particle or energy lets it rearrange toward a more stable configuration.\n\nTakeaway: radiation = an unstable nucleus shedding mass/charge/energy to reach stability.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "Name the three main types of nuclear radiation and describe what each one physically emits from the nucleus. (3 steps)", "answer": "- Step 1: Alpha (α) — emits a small nucleus of 2 protons and 2 neutrons (identical to a helium nucleus).\n- Step 2: Beta (β⁻) — emits a high-energy electron that comes from the nucleus itself.\n- Step 3: Gamma (γ) — emits high-energy electromagnetic radiation (a wave, no mass, no charge).\n\nTakeaway: alpha = chunk of nucleus; beta = fast electron; gamma = pure energy.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Besides alpha, beta and gamma, there is a rarer fourth emission mentioned. What is it, and why is it usually ignored in exams? (2 steps)", "answer": "- Step 1: A nucleus can sometimes emit a neutron (neutron emission), often alongside other emissions, a bit like gamma accompanies other decays.\n- Step 2: It's very rare and not in the GCSE spec, so you won't be asked about it unless the question explicitly tells you neutron emission is happening — then just don't be surprised.\n\nTakeaway: neutron emission exists but only appears when the question spoon-feeds it to you.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Define half-life, and name the three different quantities it can describe for a radioactive sample. (3 steps)", "answer": "- Step 1: Half-life is the time taken for the radioactive quantity of a sample to fall to half its original value.\n- Step 2: The \"quantity\" can be any of three things:\n+ The number of radioactive (undecayed) nuclei\n+ The mass of radioactive material\n+ The activity (how much radiation it gives out per unit time)\n- Step 3: All three halve over the same half-life because they are proportional to each other — if the number of nuclei halves, both mass and activity halve too.\n\nTakeaway: one half-life value works for nuclei, mass, and activity — they all shrink by half together.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "A sample has a half-life such that its activity, mass, and number of undecayed nuclei each halve over the same time. Why is this \"same rule, divide by 2\" true for all three at once? (2 steps)", "answer": "- Step 1: The activity is directly proportional to the number of undecayed nuclei (more nuclei → more decays per second), and mass is directly proportional to the number of nuclei present.\n- Step 2: Because all three are proportional to the number of nuclei, whenever the number of nuclei halves, mass and activity must also halve — so they share the identical half-life.\n\nTakeaway: proportionality forces a single common half-life across nuclei, mass, and activity.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "In a nuclear equation, what do the symbols $$A$$ and $$Z$$ represent, and why must a decay equation \"balance\"? (3 steps)", "answer": "- Step 1: $$A$$ is the mass (nucleon) number — the total number of protons plus neutrons. $$Z$$ is the atomic (proton) number — just the number of protons.\n- Step 2: When a nucleus emits something, it must change to compensate, so the original nucleus adjusts its protons and/or neutrons accordingly.\n- Step 3: The equation balances like a chemical equation: the sum of top ($$A$$) numbers on the left equals the sum on the right, and likewise the sum of bottom ($$Z$$) numbers balances — because charge and nucleon count are conserved.\n\nTakeaway: $$A$$ = total nucleons, $$Z$$ = protons; both totals are conserved, so both must balance across the arrow.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Write the general nuclear equation for alpha decay and explain how $$A$$ and $$Z$$ of the parent nucleus change. (3 steps)", "answer": "- Step 1: An alpha particle is $$^{4}_{2}\\alpha$$ (2 protons, 2 neutrons — a helium nucleus).\n- Step 2: General form: $$^{A}_{Z}X \\rightarrow \\,^{A-4}_{Z-2}Y + \\,^{4}_{2}\\alpha$$\n- Step 3: The mass number drops by 4 (loses 4 nucleons) and the atomic number drops by 2 (loses 2 protons), so the element changes into a new element two places back in the periodic table.\n\nTakeaway: alpha decay: $$A \\to A-4$$, $$Z \\to Z-2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Write the general nuclear equation for beta-minus decay and explain why the emitted particle is given an atomic number of $$-1$$. (3 steps)", "answer": "- Step 1: General form: $$^{A}_{Z}X \\rightarrow \\,^{A}_{Z+1}Y + \\,^{\\;\\;0}_{-1}\\beta$$\n- Step 2: The beta particle is an electron; its mass number is 0 (negligible mass), and it is written with atomic number $$-1$$ because here \"atomic number\" is being used to represent charge.\n- Step 3: Protons (positive) get positive numbers, so the negative electron must get $$-1$$. This makes the bottom row balance: $$Z = (Z+1) + (-1)$$.\n\nTakeaway: beta decay: mass unchanged, proton number rises by 1; the $$-1$$ keeps charge balanced.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "Physically, why does beta-minus decay increase the proton number by 1 even though an electron is emitted? (2 steps)", "answer": "- Step 1: Beta-minus is emitted by nuclei that have too many neutrons. Inside the nucleus, a neutron converts into a proton, and the leftover charge is carried away by the emitted electron.\n- Step 2: The nucleon count stays the same (a neutron becomes a proton — still one nucleon), so $$A$$ is unchanged, but the number of protons rises by 1, so $$Z$$ increases by 1.\n\nTakeaway: a neutron turns into a proton + electron; mass number stays, proton number climbs.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "During gamma decay, what happens to the mass number and atomic number of the nucleus, and why? (2 steps)", "answer": "- Step 1: Neither the mass number $$A$$ nor the atomic number $$Z$$ changes, because a gamma ray has no mass and no charge — nothing is removed from the nucleon or proton count.\n- Step 2: Gamma decay only lowers the *energy* of the nucleus. The nucleus goes from a high-energy (excited) state to a lower-energy state, releasing the difference as a high-energy electromagnetic photon.\n\nTakeaway: gamma decay changes energy only — structure ($$A$$ and $$Z$$) stays identical.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "A student says fission is \"smashing two nuclei together.\" Correct this misconception by defining fission and fusion properly. (3 steps)", "answer": "- Step 1: Fission is the *splitting* of one large nucleus into two smaller nuclei — the student described fusion, not fission.\n- Step 2: Fusion is the *joining* of two small nuclei into one larger nucleus, requiring enormous pressure and energy to overcome the Coulomb (electrostatic) repulsion between the positively charged nuclei.\n- Step 3: Fission needs comparatively less input energy to trigger, because splitting doesn't require forcing two repelling positive charges together — it just needs a trigger to overcome the binding holding the nucleus together.\n\nTakeaway: fission = one splits into two; fusion = two join into one (and fusion is far harder to start).", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "Why does fusion require overcoming the Coulomb force, and what does this force do between two protons? (2 steps)", "answer": "- Step 1: Both nuclei being fused are positively charged (protons), and like charges repel via the Coulomb (electrostatic) force, so as they approach they push apart strongly.\n- Step 2: To fuse them you must force them close enough for the short-range strong nuclear force to bind them, which means supplying huge energy and pressure to defeat this repulsion — that's why fusion needs extreme conditions (like inside stars).\n\nTakeaway: Coulomb repulsion is the barrier fusion must smash through with heat and pressure.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "What particle triggers nuclear fission in a lump of uranium, and why does this lead to a chain reaction? (3 steps)", "answer": "- Step 1: A slow-moving neutron is absorbed by a large uranium nucleus, making it unstable so it splits into two smaller nuclei.\n- Step 2: When it splits, it also releases 2 or 3 extra neutrons.\n- Step 3: Each of these released neutrons can be absorbed by another uranium nucleus, causing it to split too — this self-sustaining, ever-multiplying process is the chain reaction.\n\nTakeaway: one neutron in → split + more neutrons out → those trigger more splits = chain reaction.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "Distinguish between a \"nuclear bomb\" and a \"hydrogen bomb,\" and explain why the hydrogen bomb still needs fission. (3 steps)", "answer": "- Step 1: A nuclear (atomic) bomb works by fission — splitting large nuclei like uranium (the original Oppenheimer-type bomb).\n- Step 2: A hydrogen bomb works by fusion — joining light hydrogen nuclei, releasing even more energy.\n- Step 3: To start the fusion you first need extreme temperature and pressure, so a fission bomb is detonated *inside* the hydrogen bomb to create the conditions that ignite the fusion.\n\nTakeaway: fission bomb = the primary explosion; hydrogen bomb = a fission trigger igniting a much bigger fusion.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Rank alpha, beta, and gamma radiation by their range in air (shortest to longest), and briefly link this to how easily they are stopped. (3 steps)", "answer": "- Step 1: Alpha has the shortest range — only a few centimetres in air, stopped by a sheet of paper.\n- Step 2: Beta has a moderate range (around 20 cm to a few metres in air), stopped by a few millimetres of aluminium.\n- Step 3: Gamma has the longest range and is the most penetrating — needing thick lead or concrete to significantly reduce it.\n\nTakeaway: penetration goes α < β < γ; stopping material goes paper → aluminium → lead.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Which type of radiation is the most strongly ionising and which is the weakest, and how does ionising power relate to penetration? (3 steps)", "answer": "- Step 1: Alpha is the most strongly ionising because it is large and highly charged, so it interacts strongly and frequently with atoms it passes.\n- Step 2: Gamma is the most weakly ionising because it has no charge and interacts only rarely.\n- Step 3: There's an inverse relationship: the most ionising radiation loses its energy quickly over a short distance (so low penetration = alpha), while the weakly ionising gamma travels far before interacting (high penetration).\n\nTakeaway: strongly ionising = short range (alpha); weakly ionising = long range (gamma).", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "A statement says \"gamma radiation cannot harm cells because it's only weakly ionising.\" Why is this a misconception? (2 steps)", "answer": "- Step 1: Gamma *is* weakly ionising, but weakly ionising still means it ionises — and any ionisation can damage or kill living cells by causing chemical changes.\n- Step 2: The difference is dose: you simply need a larger dose of gamma to cause the same damage that a smaller dose of alpha or beta would cause. So gamma absolutely can harm cells.\n\nTakeaway: \"weakly ionising\" ≠ harmless — it just means more of it is needed to do equal damage.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "Why is alpha radiation relatively harmless from *outside* the body but very dangerous if the source is *ingested or inhaled*? (3 steps)", "answer": "- Step 1: Alpha is strongly ionising but has very short range and low penetration — the outer layer of dead skin easily stops it before it reaches living tissue.\n- Step 2: But if you eat or inhale an alpha emitter (e.g. inhaling radon gas), the alpha particles are released *inside* the body, right next to living cells.\n- Step 3: There, its strong ionising power does concentrated, intense damage to those cells with no skin barrier to protect them.\n\nTakeaway: alpha is stopped by skin outside, but lethal inside because there's nothing to shield living cells.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "State the charge of each radiation type (alpha, beta, gamma) and identify which has no charge. (2 steps)", "answer": "- Step 1: Alpha carries charge $$+2$$ (two protons), beta carries charge $$-1$$ (an electron).\n- Step 2: Gamma has no charge (0) — it is electromagnetic radiation with neither mass nor charge, which is why it is only weakly ionising and highly penetrating.\n\nTakeaway: α = +2, β = −1, γ = 0 (chargeless).", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "How can you identify the type of decay just by looking at how the mass number and atomic number change? (3 steps)", "answer": "- Step 1: If mass number drops by 4 and atomic number drops by 2 → alpha decay.\n- Step 2: If mass number stays the same but atomic number increases by 1 → beta-minus decay (a neutron became a proton).\n- Step 3: If both mass number and atomic number stay unchanged → gamma decay (only energy is released).\n\nTakeaway: read the ΔA and ΔZ like a fingerprint: (−4, −2) = α; (0, +1) = β; (0, 0) = γ.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "A nucleus goes from having proton number $$Q$$ to $$Q$$ (unchanged) but its mass number decreases. Why is this an *invalid* decay? (2 steps)", "answer": "- Step 1: None of the standard decays produces \"mass number down, proton number unchanged\": alpha changes both, beta changes only the proton number (mass stays), gamma changes neither.\n- Step 2: There is no combination of alpha and beta emissions that lowers $$A$$ while keeping $$Z$$ fixed, so such a transition can't happen — it's not a valid radioactive process.\n\nTakeaway: if the (ΔA, ΔZ) pattern matches no decay type, the decay is impossible.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Given a graph of number of nuclei vs time starting at 100 units, how do you read off the half-life from the graph? (3 steps)", "answer": "- Step 1: Find the starting value on the y-axis (here 100) and halve it (50).\n- Step 2: Draw a horizontal line across from y = 50 until it meets the curve, then drop a vertical line down to the time axis.\n- Step 3: The time value you read off is the half-life — the time for the quantity to fall from 100 to 50.\n\nTakeaway: halve the starting value on the y-axis, trace to the curve, drop down to read the half-life on the time axis.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "A sample starts at 100,000 nuclei. After 3 half-lives, roughly what fraction remains? Do this conceptually, not by exact arithmetic. (3 steps)", "answer": "- Step 1: Each half-life multiplies the amount by $$\\tfrac{1}{2}$$, so after $$n$$ half-lives the fraction remaining is $$\\left(\\tfrac{1}{2}\\right)^n$$.\n- Step 2: After 3 half-lives: $$\\left(\\tfrac{1}{2}\\right)^3 = \\tfrac{1}{8}$$.\n- Step 3: So about $$\\tfrac{1}{8}$$ of 100,000 remains — roughly 12,500 nuclei (halving 100k → 50k → 25k → 12.5k).\n\nTakeaway: after $$n$$ half-lives, fraction left $$= (1/2)^n$$; three half-lives leaves one-eighth.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "A tracer's total half-life corresponds to 3 half-lives over 7.8 days. If asked to build a \"magic table\" to track decay, what goes in each of the three columns? (3 steps)", "answer": "- Step 1: Column 1 = number of half-lives elapsed (start at 0, then 1, 2, 3, …).\n- Step 2: Column 2 = time in days (each half-life step adds one half-life duration; here $$7.8 \\div 3 = 2.6$$ days per half-life).\n- Step 3: Column 3 = number of nuclei remaining (start at the initial value and halve each row).\n\nTakeaway: the table columns are: half-lives count → elapsed time → nuclei remaining, halving each row.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "If 3 half-lives equal 7.8 days, how do you find one half-life, and how many half-lives fit into 13 days? (3 steps)", "answer": "- Step 1: One half-life $$= 7.8 \\div 3 = 2.6$$ days.\n- Step 2: To count half-lives in 13 days: $$13 \\div 2.6 = 5$$ half-lives.\n- Step 3: So the sample undergoes 5 halvings over 13 days.\n\nTakeaway: divide total time by one-half-life duration to get the number of halvings.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "A medical tracer starts at 100,000 nuclei; a doctor claims after 13 days (5 half-lives) it's safe to dispose of. Conceptually, how do you judge whether it's safe? (3 steps)", "answer": "- Step 1: Count how many nuclei remain after 5 half-lives: $$100{,}000 \\times (1/2)^5 \\approx 3{,}000$$ nuclei.\n- Step 2: Compare to the starting amount: $$3{,}000 / 100{,}000 = 3\\%$$ of the original activity remains.\n- Step 3: Since the safe/useful dose during use was on the order of tens of thousands of nuclei, having only ~3% left means the radiation has dropped to a very low level → safe to dispose.\n\nTakeaway: express remaining nuclei as a % of the start; a few % remaining indicates it's decayed to a safe level.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Define background radiation and give its unit of measurement. (2 steps)", "answer": "- Step 1: Background radiation is the low level of radiation from environmental sources that is always present around us, regardless of any deliberate radioactive source.\n- Step 2: Radiation is measured as counts per second in Becquerels (Bq), where 1 Bq = 1 decay per second.\n\nTakeaway: background radiation = the ever-present environmental radiation; measured in Bq (counts/second).", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "List natural sources of background radiation and give one that is especially dangerous when inhaled. (3 steps)", "answer": "- Step 1: Radon gas from rocks and soil — heavy elements like uranium and thorium in the ground decay, producing radon gas (an alpha emitter). This is particularly dangerous if inhaled in large quantities.\n- Step 2: Cosmic rays from space — the sun emits huge numbers of protons; when they hit air molecules they produce gamma radiation. Supernovae also contribute.\n- Step 3: Radioactive material in food/drink and living things — e.g. carbon-14 in all organic matter and potassium-40 in bananas, though amounts are minuscule.\n\nTakeaway: natural = radon (dangerous if inhaled), cosmic rays, and radioactive material in food/organisms.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "List man-made sources of background radiation. (3 steps)", "answer": "- Step 1: Medical sources — X-rays, CT scans, radioactive tracers, and radiation therapy.\n- Step 2: Nuclear waste (dangerous mainly for handlers) and nuclear fallout — residue radioactive material thrown into the air after a nuclear explosion or weapons testing.\n- Step 3: Nuclear accidents — such as Chernobyl, which released a large dose into the environment; rare but catastrophic.\n\nTakeaway: man-made = medical uses, nuclear waste/weapons fallout, and nuclear accidents.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "When memorising causes of background radiation for an exam, what balance should you aim for and why? (2 steps)", "answer": "- Step 1: Always include at least one natural cause (e.g. radon, cosmic rays) and at least one man-made cause (e.g. medical, fallout).\n- Step 2: Examiners treat natural and man-made sources as two separate categories, so listing only one type risks losing marks — a balanced answer covers both.\n\nTakeaway: name at least one natural AND one man-made source to safely secure the marks.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "What is the \"corrected count rate\" and how do you find it in a laboratory measurement? (2 steps)", "answer": "- Step 1: The corrected count rate is the count rate due to the radioactive source *alone*, with the ever-present background contribution removed.\n- Step 2: You measure the count rate with no source present (this is the background), then subtract it from the count rate measured with the source present.\n\nTakeaway: corrected count rate = (count with source) − (background count).", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "In a graph of count rate vs distance from a source, how do you determine the background radiation count, and what physically causes the levelling off? (3 steps)", "answer": "- Step 1: As distance increases, the source's radiation gets absorbed by the air, so fewer source-particles reach the detector.\n- Step 2: Beyond a certain distance (e.g. after 1 metre), the source contribution has been absorbed entirely, so the count stops falling and levels off at a constant value.\n- Step 3: That constant, non-zero levelling value is the background radiation count — the reading present even when the source is not detected.\n\nTakeaway: the flat, non-zero floor the graph settles to = background radiation.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "An examiner hint says to watch for count rates that \"do not drop to zero\" or half-life graphs tending to a value above zero. What is this signalling? (2 steps)", "answer": "- Step 1: A radioactive source's contribution alone would decay toward zero, but the total measured count never reaches zero — it settles at a floor.\n- Step 2: That non-zero floor is the background radiation, which is always present; the question expects you to recognise it and account for it (by subtracting) even if \"background radiation\" isn't mentioned in the text.\n\nTakeaway: a graph settling above zero is a hidden clue that background radiation is present.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "How do radiation detectors like the Geiger-Muller tube actually detect radiation? (2 steps)", "answer": "- Step 1: When alpha or beta radiation passes close to an atom, it delivers enough energy to knock out electrons, ionising the atom (creating ions).\n- Step 2: The detector works by detecting the presence of these ions or the chemical changes they produce — each detected ionisation event is registered as a \"count.\"\n\nTakeaway: detectors sense the ions (or chemical changes) that radiation creates by ionising atoms.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Name several types of radiation detectors used to measure radioactivity. (2 steps)", "answer": "- Step 1: The most common one is the Geiger-Muller (GM) tube (Geiger counter).\n- Step 2: Others include: photographic film (used in badges), ionisation chambers, scintillation counters, and spark counters.\n\nTakeaway: GM tube, photographic film, ionisation chamber, scintillation counter, spark counter.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Radioactive decay is described as both \"spontaneous\" and \"random.\" Define what \"spontaneous\" means in this context. (2 steps)", "answer": "- Step 1: A spontaneous process is one that cannot be influenced by external environmental factors.\n- Step 2: This means radioactive decay is not affected by temperature, pressure, or chemical conditions — the nucleus decays on its own regardless of surroundings.\n\nTakeaway: spontaneous = decay happens independently of external conditions (temp, pressure, chemistry).", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Define what makes radioactive decay a \"random\" process, and explain the apparent paradox that we can still predict a sample's behaviour. (3 steps)", "answer": "- Step 1: Random means the exact time at which any individual nucleus decays cannot be predicted — you can't say when a specific nucleus will decay.\n- Step 2: However, each nucleus has a constant probability (the same chance) of decaying in a given time interval.\n- Step 3: With a very large number of nuclei, these individual probabilities average out, so you can statistically predict the behaviour of the whole group — even though each single decay is unpredictable.\n\nTakeaway: individual decays are unpredictable, but large numbers behave predictably via statistics.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "How does observing a Geiger-Muller tube near a source provide evidence for the *randomness* of radioactive decay? (3 steps)", "answer": "- Step 1: Each count on the GM tube corresponds to one decay of an unstable nucleus.\n- Step 2: When you watch the counts, they are irregular and cannot be predicted — the count rate fluctuates unpredictably over time.\n- Step 3: These irregular fluctuations are direct evidence that decay events happen randomly, not on a fixed schedule.\n\nTakeaway: the erratic, fluctuating GM count rate is visible proof that decay timing is random.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "Define radioactive decay in the precise way an exam expects. (2 steps)", "answer": "- Step 1: Radioactive decay is the spontaneous disintegration of a nucleus to form a more stable nucleus.\n- Step 2: This disintegration results in the emission of an alpha, beta, or gamma particle (or radiation).\n\nTakeaway: spontaneous disintegration of a nucleus → more stable nucleus + emission of α, β, or γ.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Define the decay constant $$\\lambda$$ and explain what a large value physically means. (3 steps)", "answer": "- Step 1: The decay constant $$\\lambda$$ is the probability, per second, that a given nucleus will decay.\n- Step 2: A large $$\\lambda$$ means each nucleus is highly likely to decay in any given second, so there are many decays per unit time.\n- Step 3: This means a high level of activity — the sample is highly radioactive but also decays quickly (short half-life).\n\nTakeaway: $$\\lambda$$ = per-second decay probability; large $$\\lambda$$ = high activity and fast decay.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "Write the equation for activity in terms of the decay constant and explain what the minus sign means. (3 steps)", "answer": "- Step 1: Activity is $$A = \\dfrac{\\Delta N}{\\Delta t} = -\\lambda N$$, where $$N$$ is the number of undecayed nuclei remaining and $$\\lambda$$ is the decay constant.\n- Step 2: The equation shows activity depends on both $$\\lambda$$ (a bigger decay constant gives higher activity) and $$N$$ (more remaining nuclei means more decays per second).\n- Step 3: The minus sign indicates that the number of nuclei remaining is *decreasing* — as decays happen, $$N$$ falls over time.\n\nTakeaway: $$A = -\\lambda N$$; activity ∝ both $$\\lambda$$ and $$N$$; the minus sign shows $$N$$ is shrinking.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "What is the unit of activity, and what does one unit physically represent? (2 steps)", "answer": "- Step 1: Activity is measured in Becquerels (Bq).\n- Step 2: An activity of 1 Bq equals one decay per second ($$1\\ \\text{s}^{-1}$$) — so a sample with activity 500 Bq has 500 nuclei decaying every second on average.\n\nTakeaway: 1 Bq = 1 decay per second.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "As a radioactive sample ages, its activity falls over time. Using $$A = -\\lambda N$$, explain *why* the activity decreases even though $$\\lambda$$ stays constant. (3 steps)", "answer": "- Step 1: The decay constant $$\\lambda$$ is a fixed property of the isotope — it never changes for a given element.\n- Step 2: But as decays happen, the number of undecayed nuclei $$N$$ keeps falling.\n- Step 3: Since $$A = \\lambda N$$, a shrinking $$N$$ directly means a shrinking activity — fewer nuclei left means fewer decays per second, so the sample gets less active over time.\n\nTakeaway: $$\\lambda$$ is constant, but $$N$$ dwindles, so activity $$= \\lambda N$$ falls as the sample decays.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "In Core Practical 15 (gamma absorption by lead), identify the independent, dependent, and control variables. (3 steps)", "answer": "- Step 1: Independent variable = thickness of the lead absorber (what you deliberately change).\n- Step 2: Dependent variable = count rate (what you measure in response).\n- Step 3: Control variables (kept constant): the radioactive source used, the distance from the GM tube to the source, and the location (to keep background radiation constant).\n\nTakeaway: change = lead thickness; measure = count rate; keep constant = source, distance, location.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "In the gamma-absorption practical, why must you measure background radiation *first*, before introducing the source? (2 steps)", "answer": "- Step 1: The GM tube always picks up background radiation even with no source present, so this contribution is mixed into every reading.\n- Step 2: By measuring background over a five-minute period first and averaging it per minute, you can subtract it from later readings to get the corrected count rate due to the source alone.\n\nTakeaway: measuring background first lets you subtract it out, isolating the source's true count rate.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "In the gamma-absorption practical, how do you know when the lead has absorbed all the gamma radiation? (2 steps)", "answer": "- Step 1: You keep increasing the lead thickness and watching the count rate; it will keep falling as more radiation is absorbed.\n- Step 2: When the count over an interval falls to background levels (allowing for a little random variation), all the source radiation has been absorbed — that thickness is the amount of lead needed to fully absorb it.\n\nTakeaway: full absorption is reached when the count drops back down to the background level.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "List the key safety precautions when handling a radioactive source in an experiment. (3 steps)", "answer": "- Step 1: Store the source in a lead-lined container when not in use, and keep it well away from the counter during the experiment.\n- Step 2: When in use, keep a good distance (a metre or so) from the source, handle it with tweezers/tongs, and point it away from you.\n- Step 3: Wash your hands and remove your outer layer of clothing after handling the source.\n\nTakeaway: shield it (lead container), keep distance, use tongs pointing away, and wash/change clothing afterward.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "How can you improve the reliability of the gamma-absorption experiment, and what type of source is best? (2 steps)", "answer": "- Step 1: Use a reliable source with a long half-life (so its activity doesn't noticeably change during the experiment) and an activity well above background level (so the signal is clearly distinguishable).\n- Step 2: Conduct all runs in the same location to keep background radiation constant (avoiding a systematic error), and take repeat readings to reduce random error.\n\nTakeaway: long-half-life, high-activity source + fixed location + repeats = reliable results.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "A student writes an isotope as uranium-238 and it decays to thorium-234. How can you deduce that the emitted particle has a mass number of 4, and what particle is it? (2 steps)", "answer": "- Step 1: The mass number dropped from 238 to 234, a decrease of 4. Nucleon count is conserved, so the emitted particle must carry away exactly 4 nucleons.\n- Step 2: A particle with mass number 4 emitted from a large nucleus is an alpha particle ($$^{4}_{2}\\alpha$$), which also lowers the proton number by 2.\n\nTakeaway: a mass-number drop of 4 (with proton drop of 2) is the signature of alpha emission.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "A stationary uranium-238 nucleus undergoes alpha decay into thorium-234 and an alpha particle. Why must the momenta of the two products be equal and opposite? (3 steps)", "answer": "- Step 1: Before decay the nucleus is stationary, so the total momentum of the system is zero.\n- Step 2: Momentum is conserved, so the total momentum after decay must also be zero.\n- Step 3: With only two products (thorium and alpha), their momenta must be equal in magnitude and opposite in direction so they cancel to zero: $$m_{Th}v_{Th} = m_\\alpha v_\\alpha$$.\n\nTakeaway: zero initial momentum forces the two fragments to recoil with equal and opposite momenta.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "After a stationary nucleus decays into two fragments, which fragment carries *more* kinetic energy — the light alpha or the heavy daughter nucleus? Reason conceptually. (3 steps)", "answer": "- Step 1: Both fragments have equal momentum magnitude ($$p = mv$$), so the lighter one must move much faster: $$v \\propto 1/m$$.\n- Step 2: Kinetic energy is $$E_k = \\tfrac{1}{2}mv^2 = \\dfrac{p^2}{2m}$$, so for equal momentum, kinetic energy is *inversely* proportional to mass.\n- Step 3: The much lighter alpha particle therefore carries the larger share of the kinetic energy, while the heavy thorium nucleus recoils slowly with only a small fraction.\n\nTakeaway: with equal momenta, the lighter fragment (alpha) gets most of the kinetic energy since $$E_k = p^2/2m$$.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "Density is defined as mass over volume. For a solid block with a hole drilled out of it, how do you find the correct volume to use? (3 steps)", "answer": "- Step 1: Density $$\\rho = \\dfrac{m}{V}$$, so you need the *actual* volume of material present.\n- Step 2: Calculate the volume of the full solid block as if there were no hole, then calculate the volume of the hole separately.\n- Step 3: Subtract the hole's volume from the block's volume to get the actual volume of material, then divide the mass by this to find density.\n\nTakeaway: actual volume = full block volume − hole volume; then $$\\rho = m / V_{actual}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "In a physics problem the weight of an object is given as 30 N. How do you obtain its mass, and what value of $$g$$ can you use in the ESAT? (2 steps)", "answer": "- Step 1: Weight relates to mass by $$W = mg$$, so mass $$m = W/g = 30/g$$.\n- Step 2: For the ESAT you can typically use $$g = 10\\ \\text{m s}^{-2}$$ (rather than 9.81), which makes the mental arithmetic much simpler — so $$m = 30/10 = 3\\ \\text{kg}$$.\n\nTakeaway: rearrange $$W = mg$$ to get $$m = W/g$$, and use $$g \\approx 10$$ for quick ESAT mental maths.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "A radioactive nuclide undergoes a series of decays. If you're told a decay chain step increases the proton number by 1 without changing the mass number, which decay must have occurred, and how do you build a full decay chain? (3 steps)", "answer": "- Step 1: Proton number up by 1, mass number unchanged → a beta-minus decay occurred (a neutron converted to a proton).\n- Step 2: To match a full chain, track cumulative changes: each alpha subtracts 4 from mass and 2 from proton number; each beta adds 1 to proton number leaving mass unchanged.\n- Step 3: Work out how many alphas are needed to fix the mass-number change, then how many betas are needed to fix the leftover proton-number difference — e.g. \"1 alpha + 2 beta\" satisfies a specific (ΔA, ΔZ) requirement.\n\nTakeaway: use alpha to fix ΔA (steps of −4) then use beta to fine-tune ΔZ (steps of +1), counting each until both match.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": false}, {"question": "Why does an unstable nucleus emit radiation in the first place — what determines whether a nucleus is radioactive? (2 steps)", "answer": "- Step 1: A nucleus is unstable when its number of nucleons is unbalanced — for example, too many neutrons relative to protons, or a nucleus that is simply too large.\n- Step 2: To become more stable it emits particles and/or electromagnetic radiation, rearranging its protons and neutrons toward a more balanced, lower-energy configuration.\n\nTakeaway: nuclei radiate because an unbalanced/oversized nucleus sheds particles or energy to reach a stable configuration.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": false}, {"question": "Why does a nucleus that is \"too large\" tend to emit an alpha particle specifically, rather than a single proton or neutron? (2 steps)", "answer": "- Step 1: Very large nuclei struggle to hold together because the electrostatic repulsion between many protons competes with the short-range strong force.\n- Step 2: Emitting an alpha particle (a tightly bound, very stable 2-proton-2-neutron unit) removes a chunk of both protons and neutrons at once, efficiently reducing size and repulsion in one stable package.\n\nTakeaway: large nuclei shed an alpha because it removes both protons and neutrons in one tightly bound, stable bundle.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": false}, {"question": "A living plant keeps its carbon-14 level almost constant, but this changes after it dies. Conceptually, why is carbon-14 useful and what happens after death? (2 steps)", "answer": "- Step 1: While alive, plants and animals constantly replace the carbon in their bodies, so the tiny fraction of carbon-14 stays roughly constant, matching the environment.\n- Step 2: After death, no new carbon is taken in, so the carbon-14 simply decays away with its fixed half-life — the amount left tells you how long ago the organism died (radiocarbon dating).\n\nTakeaway: living things top up C-14 (constant level); after death it only decays, acting as a natural clock.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": false}], "count": 58}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 16082, "out_tokens": 19169, "reasoning_chars": 4967, "cost_eur": 0.0678, "elapsed_s": 346, "content_chars": 72980}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 16082, "out_tokens": 16327, "reasoning_chars": 3521, "cost_eur": 0.0599, "elapsed_s": 330, "content_chars": 60703}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 16082, "out_tokens": 14746, "reasoning_chars": 1658, "cost_eur": 0.0555, "elapsed_s": 213, "content_chars": 57198}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m3", "display": "MiniMax M3", "temperature": 0.7, "in_tokens": 15729, "out_tokens": 20603, "reasoning_chars": 2401, "cost_eur": 0.0271, "elapsed_s": 275, "content_chars": 81281}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m3", "display": "MiniMax M3", "temperature": 0.8, "in_tokens": 15732, "out_tokens": 15308, "reasoning_chars": 13633, "cost_eur": 0.0212, "elapsed_s": 209, "content_chars": 48734}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4.8", "display": "Claude Opus 4.8", "temperature": 1.0, "in_tokens": 23006, "out_tokens": 13930, "reasoning_chars": 0, "cost_eur": 0.4262, "elapsed_s": 169, "content_chars": 35253}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4.8", "display": "Claude Opus 4.8", "temperature": 1.0, "in_tokens": 23006, "out_tokens": 16439, "reasoning_chars": 0, "cost_eur": 0.4839, "elapsed_s": 197, "content_chars": 42064}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3.7-max", "display": "Qwen 3.7 Max", "temperature": 0.7, "in_tokens": 16395, "out_tokens": 14094, "reasoning_chars": 37681, "cost_eur": 0.0675, "elapsed_s": 257, "content_chars": 21590}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3.7-max", "display": "Qwen 3.7 Max", "temperature": 0.8, "in_tokens": 16395, "out_tokens": 11176, "reasoning_chars": 19158, "cost_eur": 0.0574, "elapsed_s": 204, "content_chars": 27219}}};
const SK='auto_physics_20260705_radioactivity_with_alex_jul_5_15_06_16_05_utc';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function eI(s){return eH(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>')}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eI(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eI(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eI(tr.slice(2))}</div>`;continue}
    h+=`<div>${eI(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    const cardClass=(im||cur==='judge')?'':'ds';
    h+=`<div class="cd ${cardClass}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eI(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch&&cur!=='judge');
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
