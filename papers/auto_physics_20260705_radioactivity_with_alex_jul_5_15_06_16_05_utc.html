 nuclei.\n- Step 2: It is crucial for the sustainability of the reaction because the emission of these 2 or 3 neutrons provides the necessary projectiles to trigger the fission of neighboring nuclei, thereby sustaining the chain reaction.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}], "count": 20}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "In an atom, the nucleus contains nearly all the mass but occupies a minuscule fraction of the atomic volume. Conceptually, how do the masses, charges, and locations of the constituent subatomic particles explain the overall electrical neutrality and mass distribution of a standard atom? (3 steps)", "answer": "- Step 1: **Identify the particles and their locations.** The atom consists of a dense central nucleus containing protons and neutrons (nucleons), surrounded by a vast, mostly empty space where electrons orbit in energy levels. \n- Step 2: **Analyze the mass distribution.** Protons and neutrons have roughly the same mass (approximately $$1 \\text{ u}$$ each), which is about 1840 times the mass of an electron. Because the electrons are practically massless in comparison, almost 100% of the atom's mass is concentrated in the tiny nucleus.\n- Step 3: **Analyze the electrical neutrality.** Protons carry a $$+1$$ relative charge, electrons carry a $$-1$$ relative charge, and neutrons carry a $$0$$ charge. In a neutral atom, the number of protons exactly equals the number of electrons. The positive charge of the nucleus is perfectly cancelled out by the negative charge of the electron cloud, resulting in an electrically neutral atom overall.\n\n*Takeaway: The atom is mostly empty space, with its mass locked in a tiny, positive core, balanced electrically by a diffuse cloud of negligible-mass electrons.*", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": true}, {"question": "An alpha ($$\\alpha$$) particle is essentially a helium nucleus ($$^4_2\\text{He}$$). Explain the physical mechanism that causes alpha radiation to have the highest ionising power but the lowest penetrating power among the three main types of nuclear radiation. (3 steps)", "answer": "- Step 1: **Examine the physical properties of the alpha particle.** An alpha particle is relatively massive (4 nucleons) and carries a strong $$+2$$ electrical charge. \n- Step 2: **Connect charge to ionising power.** As the alpha particle travels through matter, its strong $$+2$$ charge exerts a powerful electrostatic (Coulomb) pull on the electrons of nearby atoms. It easily strips these electrons away, ionising the atoms. Because it interacts so strongly, it ionises heavily along its path.\n- Step 3: **Connect ionisation to penetrating power.** Every ionisation event transfers kinetic energy from the alpha particle to the surrounding matter. Because it causes so many ionisations in a very short distance, it loses its kinetic energy extremely rapidly. Consequently, it comes to a halt after just a few centimetres in air or is stopped by a single sheet of paper, giving it very low penetrating power.\n\n*Takeaway: High ionising power and low penetrating power are two sides of the same coin; the alpha particle dumps its energy into the surrounding matter too quickly to travel far.*", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": true}, {"question": "During beta-minus ($$\\beta^-$$) decay, a nucleus emits a high-energy electron ($$^0_{-1}\\text{e}$$). Since electrons do not exist inside the nucleus, explain the fundamental nucleon transformation that occurs, and deduce how this affects the atomic number ($$Z$$) and mass number ($$A$$) of the daughter nucleus. (3 steps)", "answer": "- Step 1: **Identify the nucleon transformation.** Inside an unstable nucleus with too many neutrons, a neutron transforms into a proton. To conserve charge and lepton number, this process simultaneously creates and ejects a high-energy electron (the beta particle) and an electron antineutrino.\n- Step 2: **Determine the effect on the atomic number ($$Z$$).** Because a neutral neutron has turned into a positively charged proton, the total number of protons in the nucleus increases by 1. Therefore, the atomic number $$Z$$ increases by 1, transmuting the element into the next one on the periodic table.\n- Step 3: **Determine the effect on the mass number ($$A$$).** The mass number counts the total number of nucleons (protons + neutrons). Since one neutron was lost but one proton was gained, the total number of nucleons remains exactly the same. Therefore, the mass number $$A$$ is unchanged.\n\n*Takeaway: Beta decay is not the emission of an orbital electron, but the internal transmutation of a neutron into a proton, shifting the element one place up the periodic table without changing its mass number.*", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": true}, {"question": "Gamma ($$\\gamma$$) decay frequently follows immediately after alpha or beta decay. Conceptually, what is the physical state of the daughter nucleus right after an alpha/beta emission that necessitates gamma emission, and why does this gamma emission leave the mass and atomic numbers completely unchanged? (2 steps)", "answer": "- Step 1: **Identify the state of the nucleus.** When a nucleus undergoes alpha or beta decay, the resulting daughter nucleus is often left in an \"excited\" quantum energy state. Its nucleons are not yet arranged in their lowest, most stable energy configuration. To relax down to the ground state, the nucleus must shed this excess energy.\n- Step 2: **Explain the nature of the gamma emission.** The nucleus releases this excess energy by emitting a gamma ray, which is a high-energy photon (electromagnetic radiation). Because a photon has zero rest mass and zero electrical charge, emitting it does not change the number of protons or neutrons. Thus, both the mass number ($$A$$) and atomic number ($$Z$$) remain perfectly unchanged.\n\n*Takeaway: Gamma decay is simply a nucleus \"cooling down\" from an excited state by emitting a photon of pure energy, altering neither its identity nor its mass.*", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": true}, {"question": "A common misconception is that alpha radiation is the \"safest\" type of radiation because it is easily stopped by a sheet of paper or the outer layer of dead skin cells. Explain why this reasoning fails catastrophically if an alpha-emitting isotope (like Radon gas) is inhaled or ingested, contrasting it with gamma radiation in this specific internal scenario. (2 steps)", "answer": "- Step 1: **Analyze external vs. internal exposure.** Externally, alpha particles are stopped by the dead layer of skin, causing no harm to living tissue. However, if inhaled (e.g., Radon gas) or ingested, the alpha source is now inside the body, directly adjacent to delicate, living internal cells (like lung tissue) with no dead skin barrier to protect them.\n- Step 2: **Compare the biological damage.** Because alpha particles have the highest ionising power, they deposit a massive amount of destructive energy into a very small volume of living cells, causing severe, localized DNA damage and high cancer risk. Gamma rays, while highly penetrating, are weakly ionising; they are more likely to pass straight through the body without interacting, causing less concentrated cellular damage per decay event than an internal alpha emitter.\n\n*Takeaway: The danger of radiation depends heavily on the exposure pathway; alpha is harmless outside the body but the most destructive inside it due to its intense, localized ionising power.*", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "Nuclear fusion requires temperatures of millions of degrees and immense pressure to occur, whereas nuclear fission can be initiated at room temperature by a slow-moving neutron. Explain this stark difference in initiation conditions using the concepts of electrostatic forces and the strong nuclear force. (3 steps)", "answer": "- Step 1: **Analyze the barrier to fusion.** Fusion involves forcing two light, positively charged nuclei (like hydrogen isotopes) together. Because like charges repel, there is a massive electrostatic (Coulomb) repulsion between them. To overcome this barrier and get close enough for the attractive strong nuclear force to take over, the nuclei must have immense kinetic energy, which requires extreme temperatures and pressures.\n- Step 2: **Analyze the initiation of fission.** Fission involves splitting a heavy, unstable nucleus (like Uranium-235). This is triggered by a neutron. Because the neutron has zero electrical charge, it experiences absolutely no Coulomb repulsion from the protons in the nucleus.\n- Step 3: **Explain the fission mechanism.** The neutral neutron can easily wander into the nucleus even at low speeds. Once absorbed, it adds excitation energy and disrupts the delicate balance between the attractive strong nuclear force and the repulsive electrostatic force within the large nucleus, causing it to oscillate and split apart without needing extreme external heat.\n\n*Takeaway: Fusion requires brute force to overcome the Coulomb barrier between two positive charges, while fission uses a neutral \"trojan horse\" (the neutron) to bypass the barrier entirely.*", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": true}, {"question": "In a nuclear fission reactor, a Uranium-235 nucleus absorbs a neutron and splits into two smaller daughter nuclei. Explain why this single event can lead to a self-sustaining chain reaction, and identify the specific particle responsible for propagating it. (2 steps)", "answer": "- Step 1: **Identify the byproducts of the split.** When the U-235 nucleus splits, it doesn't just form two daughter nuclei; it also releases a significant amount of energy and, crucially, ejects 2 to 3 fast-moving free neutrons.\n- Step 2: **Explain the propagation of the chain reaction.** These newly ejected neutrons can then travel outward and be absorbed by neighboring U-235 nuclei. Each absorption triggers another fission event, which releases even more neutrons, creating an exponential, self-sustaining cascade of nuclear splitting known as a chain reaction.\n\n*Takeaway: The chain reaction is driven by the fact that the \"fuel\" consumed (one neutron) is replaced by a greater number of \"fuels\" produced (2-3 neutrons) in every single fission event.*", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": true}, {"question": "The half-life ($$t_{1/2}$$) of a radioactive isotope is defined as the time taken for the number of undecayed nuclei ($$N$$) to halve. Explain conceptually why the physical mass of the radioactive sample and the measured activity (count rate) of the sample also halve in this exact same time period, despite being entirely different physical quantities. (2 steps)", "answer": "- Step 1: **Relate mass to the number of nuclei.** The physical mass of the radioactive isotope in the sample is directly proportional to the number of undecayed nuclei ($$m \\propto N$$). If half of the radioactive nuclei have decayed into different elements, the mass of the *original radioactive isotope* remaining has exactly halved.\n- Step 2: **Relate activity to the number of nuclei.** Activity ($$A$$) is the rate of decay, defined by the equation $$A = \\lambda N$$. Since the decay constant ($$\\lambda$$) is a fixed probability for a given isotope, the activity is directly proportional to the number of remaining nuclei ($$A \\propto N$$). Therefore, when $$N$$ halves, the activity $$A$$ must also perfectly halve.\n\n*Takeaway: Because both the mass of the isotope and its activity are directly, linearly proportional to the number of remaining undecayed nuclei, they all share the exact same half-life.*", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": true}, {"question": "Radioactive decay is rigorously defined as both \"random\" and \"spontaneous\". Distinguish between these two terms by explaining what a Geiger-Müller (GM) tube would detect to prove the \"random\" nature, and what experimental attempts would fail to prove the \"spontaneous\" nature. (3 steps)", "answer": "- Step 1: **Define and prove \"random\".** Random means that the exact moment a specific nucleus will decay cannot be predicted; it only has a constant probability of decaying. A GM tube proves this because the clicks (counts) are irregular and erratic, fluctuating unpredictably around an average mean rather than ticking at perfectly spaced, uniform intervals.\n- Step 2: **Define \"spontaneous\".** Spontaneous means that the decay process is entirely independent of external environmental factors or the chemical state of the atom. It is driven purely by internal nuclear instability.\n- Step 3: **Describe failed experimental attempts.** To prove it is spontaneous, one might try to alter the decay rate by heating the sample to extreme temperatures, subjecting it to immense physical pressure, or bonding it into different chemical compounds. All these attempts will completely fail; the half-life and activity will remain entirely unchanged regardless of the macroscopic environment.\n\n*Takeaway: \"Random\" refers to the unpredictable timing of individual decays, while \"spontaneous\" refers to the inability of external physical or chemical conditions to influence the decay rate.*", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": true}, {"question": "The activity $$A$$ of a radioactive sample is given by the equation $$A = \\lambda N$$. Conceptually, what does the decay constant $$\\lambda$$ represent at the level of a single nucleus, and why does the overall activity of a sample decrease over time even though $$\\lambda$$ remains perfectly constant? (2 steps)", "answer": "- Step 1: **Define the decay constant conceptually.** The decay constant ($$\\lambda$$) represents the fixed, intrinsic probability that any *single, specific* nucleus will decay in the next one second. It is a fundamental property of the isotope and does not change over time.\n- Step 2: **Explain the decrease in activity.** Activity is the *total* number of decays happening per second across the *entire* sample. Even though the probability per nucleus ($$\\lambda$$) stays the same, the total pool of available nuclei ($$N$$) is constantly shrinking as they decay. With fewer nuclei left to decay, the total number of decays per second ($$A$$) inevitably drops over time.\n\n*Takeaway: Activity drops not because the nuclei become \"more stable\" over time, but simply because there are fewer unstable nuclei left in the sample to undergo the constant-probability decay.*", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": true}, {"question": "When measuring the activity of a radioactive source using a GM tube in a laboratory, the raw count rate displayed on the counter is always higher than the true activity of the source itself. Explain the origin of this discrepancy and the specific mathematical step required to find the \"corrected count rate\". (2 steps)", "answer": "- Step 1: **Identify the origin of the discrepancy.** The GM tube detects all ionising radiation in its vicinity, not just the radiation from the source. It constantly picks up \"background radiation\" originating from natural sources (like radon gas, cosmic rays, and radioactive isotopes in the building materials) and man-made sources (like medical fallout). \n- Step 2: **Apply the mathematical correction.** To isolate the radiation coming *only* from the source, you must first measure the background count rate with the radioactive source removed (or shielded). Then, you subtract this background count rate from the raw measured count rate to obtain the true \"corrected count rate\".\n\n*Takeaway: Raw count rate = Source activity + Background radiation. You must always subtract the background to find the true activity of the source.*", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": true}, {"question": "In Core Practical 15, which investigates the absorption of gamma rays by varying thicknesses of lead, the thickness of the lead is the independent variable. Identify two critical control variables related to the geometry of the setup, and explain how failing to control the distance between the source and the GM tube would introduce a massive systematic error. (3 steps)", "answer": "- Step 1: **Identify the geometric control variables.** The two most critical geometric variables to keep constant are the distance from the radioactive source to the GM tube window, and the physical alignment/positioning of the source relative to the tube.\n- Step 2: **Explain the physics of the distance variable.** Gamma radiation intensity obeys the inverse-square law ($$I \\propto 1/d^2$$). This means that as distance increases, the count rate drops off rapidly simply because the radiation spreads out over a larger spherical area.\n- Step 3: **Describe the systematic error.** If the distance is not strictly controlled (e.g., if adding thicker lead sheets accidentally pushes the source further away from the tube), the count rate will drop due to the inverse-square law. The student would mistakenly attribute this drop in counts to *absorption* by the lead, resulting in a completely invalid conclusion about the lead's absorbing properties.\n\n*Takeaway: In radiation absorption experiments, any change in distance mimics absorption due to the inverse-square law, making strict geometric control absolutely vital.*", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": true}, {"question": "When balancing a nuclear decay equation, the sum of the mass numbers (top numbers) and the sum of the atomic numbers (bottom numbers) must be equal on both sides of the reaction arrow. What fundamental conservation laws of physics do these two specific balancing rules represent? (2 steps)", "answer": "- Step 1: **Analyze the mass number (top number).** The mass number counts the total number of nucleons (protons + neutrons). Balancing this number represents the **conservation of nucleon number** (more fundamentally, the conservation of baryon number). It ensures that no protons or neutons are magically created or destroyed, only rearranged or transformed. *(Note: It is not strictly conservation of mass, as a small amount of mass is converted to energy via $$E=mc^2$$).*\n- Step 2: **Analyze the atomic number (bottom number).** The atomic number represents the number of protons, which dictates the total positive charge of the nucleus. Balancing this number represents the **conservation of electrical charge**. The total net charge of the system before the decay must exactly equal the total net charge after the decay.\n\n*Takeaway: Nuclear equations are essentially accounting ledgers for the universe's strict rules: you cannot create or destroy baryons, and you cannot create or destroy electrical charge.*", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": true}, {"question": "A doctor injects a patient with a radioactive tracer for medical imaging. Explain, using the concepts of activity and biological clearance, why an isotope with a half-life of 6 hours is ideal, whereas a half-life of 6 minutes or 6 years would be highly problematic for this specific application. (3 steps)", "answer": "- Step 1: **Evaluate the 6-minute half-life.** A half-life of 6 minutes is far too short. The activity would drop to negligible levels before the medical staff could properly administer the tracer, position the patient, and complete the imaging scans. The radiation would vanish before it could be useful.\n- Step 2: **Evaluate the 6-year half-life.** A half-life of 6 years is far too long. The activity would remain high long after the scan is complete. The patient would be subjected to prolonged, unnecessary internal ionising radiation, vastly increasing the risk of cellular damage and radiation-induced cancers.\n- Step 3: **Evaluate the 6-hour half-life.** A 6-hour half-life is the \"Goldilocks\" zone. It provides a high enough activity for clear imaging over a few hours, but decays rapidly enough that within a day or two, the activity drops to safe, negligible levels, minimizing long-term biological damage.\n\n*Takeaway: Medical tracers require a half-life long enough to perform the diagnostic procedure, but short enough to minimize the patient's long-term radiation dose.*", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": true}, {"question": "A sample of Iodine-131 has an initial activity of $$800 \\text{ Bq}$$. Without using a calculator, determine the activity of the sample after exactly three half-lives have passed, and explain the mental sequence used to arrive at this value. (3 steps)", "answer": "- Step 1: **Understand the mathematical operation.** Each passing half-life multiplies the current activity by $$\\frac{1}{2}$$ (or divides it by 2). Three half-lives means we must halve the initial value three consecutive times.\n- Step 2: **Perform the first and second halving.** Start with $$800 \\text{ Bq}$$. After the first half-life, the activity is $$800 / 2 = 400 \\text{ Bq}$$. After the second half-life, it is $$400 / 2 = 200 \\text{ Bq}$$.\n- Step 3: **Perform the final halving.** After the third half-life, we halve the $$200 \\text{ Bq}$$ to get $$200 / 2 = 100 \\text{ Bq}$$. \n\n*Takeaway: For integer numbers of half-lives, simply divide the initial value by 2 repeatedly; $$800 \\rightarrow 400 \\rightarrow 200 \\rightarrow 100$$.*", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "Uranium-238 ($$^{238}_{92}\\text{U}$$) undergoes alpha decay to form an isotope of Thorium (Th). Without looking up the periodic table, determine the mass number and atomic number of the resulting Thorium isotope, and write the fully balanced nuclear equation. (3 steps)", "answer": "- Step 1: **Identify the emitted particle.** An alpha particle is a helium nucleus, represented as $$^4_2\\text{He}$$ (or $$^4_2\\alpha$$). It has a mass number of 4 and an atomic number of 2.\n- Step 2: **Calculate the daughter nucleus numbers.** To balance the equation, subtract the alpha particle's numbers from the parent Uranium nucleus. \n+ Mass number: $$238 - 4 = 234$$.\n+ Atomic number: $$92 - 2 = 90$$.\n- Step 3: **Construct the final equation.** The daughter nucleus is Thorium-234. The balanced equation is:\n$$^{238}_{92}\\text{U} \\rightarrow ^{234}_{90}\\text{Th} + ^4_2\\text{He}$$\n\n*Takeaway: Alpha decay always reduces the mass number by 4 and the atomic number by 2, shifting the element two places down the periodic table.*", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "A radioactive sample contains $$10,000$$ undecayed nuclei and has a decay constant $$\\lambda = 0.05 \\text{ s}^{-1}$$. Using mental math, calculate the initial activity of the sample in Becquerels, and explain what this resulting number physically means in terms of nuclear events. (2 steps)", "answer": "- Step 1: **Calculate the activity.** Use the formula $$A = \\lambda N$$. Multiply the decay constant by the number of nuclei: $$0.05 \\times 10,000$$. Moving the decimal two places to the right gives $$5 \\times 100 = 500 \\text{ Bq}$$.\n- Step 2: **Interpret the physical meaning.** An activity of $$500 \\text{ Bq}$$ means that, on average, exactly 500 nuclei in the sample are undergoing radioactive decay every single second. \n\n*Takeaway: The Becquerel (Bq) is simply a rate: 1 Bq = 1 decay per second. It tells you how \"busy\" the sample is at that exact moment.*", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "Radon gas is a significant natural source of background radiation, particularly in areas with granite rock. Explain why radon gas poses a severe internal health hazard compared to other natural background sources like Carbon-14 in food, referencing its decay mode and physical state. (3 steps)", "answer": "- Step 1: **Analyze the physical state and exposure route.** Unlike solid food sources, radon is a noble gas. It seeps out of the ground and accumulates in poorly ventilated buildings, meaning it is continuously inhaled directly into the deep tissues of the lungs.\n- Step 2: **Identify the decay mode.** Radon-222 is an alpha emitter. As established, alpha particles have a very high ionising power but low penetrating power.\n- Step 3: **Explain the biological hazard.** Once inside the lungs, the alpha particles are emitted directly into delicate, living alveolar cells. Because they don't penetrate far, they dump all their massive ionising energy into a tiny cluster of living cells, causing severe, localized DNA double-strand breaks, which significantly increases the risk of lung cancer. Carbon-14, by contrast, is a weak beta emitter distributed throughout the body, causing far less concentrated damage.\n\n*Takeaway: Radon is dangerous because it brings a highly ionising alpha source directly into contact with vulnerable internal lung tissue via inhalation.*", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": true}], "count": 18}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "In the Edexcel IAL Physics model of the atom, what are the three subatomic particles that make up an atom, and how do their masses and charges compare? (3 steps)", "answer": "- Step 1: The three subatomic particles are **protons**, **neutrons**, and **electrons**. Protons and neutrons sit together in the **nucleus** at the centre, while electrons orbit in energy levels (shells) around the nucleus.\n- Step 2: **Protons and neutrons have approximately the same mass** (both ≈ 1 atomic mass unit), and together they account for **virtually all the mass of the atom**. The electron's mass is **negligible** in comparison (about 1/1836 of a proton).\n- Step 3: For charge: **proton = +1**, **electron = −1**, **neutron = 0**. The atom as a whole is normally neutral because the number of protons equals the number of electrons, so charges cancel.\n\nTakeaway: When we say \"the nucleus contains nearly all the mass,\" it's because the electrons are so light that we ignore them in mass calculations — this is why radioactive decay (which only changes the nucleus) barely changes the atom's total mass.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "What is **background radiation**, and what is its unit of measurement?", "answer": "Background radiation is the **low level of ionising radiation that is always present around us** in the environment, from both natural and man-made sources. It comes from things like radon gas seeping out of rocks, cosmic rays from space, radioactive material in food (e.g. potassium-40 in bananas), and also from human activities like medical X-rays and nuclear accidents.\n\nThe unit of measurement is the **Becquerel (Bq)**, where **1 Bq = 1 count (decay) per second**. Note that this is the unit for the *activity* of a source — i.e. the number of decays per second — not the dose absorbed by a person.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Background radiation is split into two broad categories. Name them and give **two** examples of each. (3 steps)", "answer": "- Step 1: The two categories are **natural sources** and **man-made sources**.\n- Step 2: **Natural sources** include: (a) **radon gas** seeping from rocks and soil (radon is itself an alpha emitter and is particularly dangerous if inhaled), and (b) **cosmic rays** from space — high-energy protons from the sun (and supernovae) that collide with air molecules and produce gamma radiation. Carbon-14 in living things and potassium-40 in food are also natural sources.\n- Step 3: **Man-made sources** include: (a) **medical sources** such as X-rays, CT scans, radioactive tracers, and radiation therapy, and (b) **nuclear accidents/fallout** such as Chernobyl, or residue from nuclear weapons testing.\n\nTakeaway: In an exam, when asked to \"give two sources of background radiation,\" you should pick **at least one natural and one man-made** — the examiner wants to see you understand both categories, not just list several natural ones.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What is the **corrected count rate**, and why must we subtract it from experimental readings? (2 steps)", "answer": "- Step 1: The **corrected count rate** = (measured count rate with source present) − (background count rate measured with no source). It represents the count rate due **only to the radioactive source being studied**, with the always-present environmental radiation removed.\n- Step 2: We must subtract it because a Geiger-Müller tube detects **all** ionising radiation hitting it, including background. If we didn't subtract, every reading would be artificially high by the same constant amount, which would distort any graph or half-life calculation we perform.\n\nTakeaway: A tell-tale exam clue is a half-life graph whose curve **does not fall to zero** but levels off at some value above zero — that residual value is the background, and you should subtract it before finding the half-life.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Name **three** different types of radiation detector and explain, in one sentence each, how each works.", "answer": "- **Geiger-Müller (GM) tube**: detects ionising radiation by registering the brief electrical pulse produced when radiation ionises the gas inside the tube.\n- **Photographic film** (used in radiation badges): radiation exposes the film just like light does, so the developed film shows a darkening proportional to the dose received.\n- **Spark counter / scintillation counter / ionisation chamber**: each detects either the ions created in air (spark counter, ionisation chamber) or the tiny flashes of light (scintillations) produced when radiation strikes certain materials.\n\nTakeaway: All of these detectors ultimately rely on the same fundamental property — that ionising radiation **knocks electrons off atoms**, producing ions or chemical changes that we can register.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "What makes a nucleus **unstable** and therefore radioactive? (2 steps)", "answer": "- Step 1: A nucleus becomes unstable when the number of **nucleons (protons + neutrons) doesn't balance** in the right way — typically when the nucleus is too large, or when there are too many neutrons relative to protons, or when it has excess energy.\n- Step 2: To reach a more stable configuration, the nucleus **emits particles and/or electromagnetic radiation**. This emission is what we call radioactive decay, and the nucleus that does it is said to be **radioactive**.\n\nTakeaway: \"Unstable\" doesn't mean the nucleus is about to fall apart — it means it has a higher-energy configuration than it could have, and it lowers its energy by ejecting something. The \"something\" it ejects tells us which type of decay it is.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Describe the composition of an **alpha (α) particle** and explain why it is emitted by large unstable nuclei.", "answer": "An alpha particle is made of **2 protons and 2 neutrons** — it is identical to the nucleus of a helium-4 atom. It is written as $$_{2}^{4}\\alpha$$ or $$_{2}^{4}\\text{He}$$.\n\nLarge nuclei emit alpha particles because ejecting a tightly-bound \"package\" of 2 protons + 2 neutrons is an energetically efficient way for a heavy, proton-rich nucleus to reduce its size and move toward a more stable proton-to-neutron ratio. The alpha particle itself is very stable (helium-4 has a very high binding energy per nucleon), so it carries away energy efficiently.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "Describe the composition of a **beta-minus (β⁻) particle** and explain why it is emitted from the nucleus even though the nucleus doesn't contain electrons.", "answer": "A beta-minus particle is a **high-energy electron** emitted from the nucleus. It is written as $$_{-1}^{0}e$$ or $$_{-1}^{0}\\beta$$.\n\nThe nucleus contains only protons and neutrons, so where does the electron come from? Inside the nucleus, a **neutron transforms into a proton** plus an electron (the beta particle) plus an antineutrino. The proton stays in the nucleus (increasing Z by 1), and the electron is ejected at high speed. This happens in nuclei that have **too many neutrons** relative to protons — converting one neutron into a proton brings the ratio closer to stability.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "What is a **gamma (γ) ray**, and how does its emission differ from alpha or beta emission in terms of what changes inside the nucleus?", "answer": "A gamma ray is a **high-energy electromagnetic wave** (very high-frequency photon) emitted from the nucleus. It is written as $$_{0}^{0}\\gamma$$ — the zeros indicate it carries **no mass and no charge**.\n\nThe crucial difference: gamma emission **does not change the number of protons or the number of neutrons** in the nucleus. The nucleus's identity (which element it is) and its mass number both stay the same. What changes is the **energy** of the nucleus — gamma emission is how a nucleus that is in an excited, high-energy state sheds excess energy without altering its composition.\n\nTakeaway: Gamma often follows alpha or beta decay — after the nucleus ejects a particle, it is often left in an excited state, and a gamma photon is released almost immediately afterwards to \"settle\" the nucleus.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Rank alpha, beta, and gamma radiation in order of **ionising power** (most → least ionising). Why does this ranking exist? (3 steps)", "answer": "- Step 1: The ranking from most to least ionising is: **alpha > beta > gamma**.\n- Step 2: Ionising power depends on **how easily the radiation can knock electrons off atoms** it passes. Alpha particles are massive (≈ 4 u) and doubly charged (+2), so they plough through atoms and rip electrons off very efficiently — they lose energy quickly in a short distance.\n- Step 3: Beta particles are much lighter (electron mass) with a single −1 charge, so they interact less strongly with atoms. Gamma rays are uncharged photons with no rest mass, so they pass through matter with very little interaction — they are weakly ionising.\n\nTakeaway: There's an inverse relationship between **ionising power** and **penetrating power** (next question). The same property (charge × mass) that makes alpha great at ionising also means it loses energy fast and stops quickly.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Rank alpha, beta, and gamma radiation in order of **penetrating power** (most → least penetrating), and state what each one can be stopped by.", "answer": "- Most penetrating: **Gamma** — needs many centimetres of lead or thick concrete to attenuate significantly.\n- Middle: **Beta** — penetrates roughly 20 cm to 3 m in air, and is stopped by a **few millimetres of aluminium**.\n- Least penetrating: **Alpha** — stopped by a **sheet of paper** or even the **outer layer of dead skin cells**.\n\nWhy this ranking? Penetrating power depends on how much the radiation interacts with matter. Alpha (heavy, +2 charge) interacts strongly and dumps all its energy in a short distance. Gamma (uncharged, no mass) barely interacts at all and zips through.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "State the **charge** of each of alpha, beta, and gamma radiation, and explain how this single property determines the ranking of their ionising power.", "answer": "- Alpha: charge **+2** (it is 2 protons + 2 neutrons).\n- Beta-minus: charge **−1** (it is one electron).\n- Gamma: charge **0** (it is a photon, an electromagnetic wave).\n\nThe greater the charge and the greater the mass, the stronger the electromagnetic interaction with the electrons of atoms the radiation passes — and so the more easily it ionises them. Alpha (+2, heavy) is the strongest ioniser; beta (−1, light) is moderate; gamma (0, no mass) is the weakest. Charge alone doesn't determine ionising power (gamma has 0 charge but is still weakly ionising via other interactions), but it is the dominant factor for alpha vs beta.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "A common misconception is that \"alpha radiation is the most dangerous because it's the most ionising.\" Why is this statement **misleading**, and when is alpha radiation actually the most dangerous? (3 steps)", "answer": "- Step 1: The statement is misleading because **ionising power ≠ penetrating power**. Alpha is the most strongly ionising, but it is also the **least penetrating** — a sheet of paper or the dead outer layer of skin stops it completely.\n- Step 2: So if an alpha source is **outside** your body (e.g. held in your hand), it is essentially harmless — your skin absorbs it before it reaches living cells.\n- Step 3: Alpha becomes the **most dangerous** when the source gets **inside** your body — for example, if you inhale radon gas or ingest a particle of plutonium. Then there is no skin barrier, the alpha radiation deposits all its energy into a tiny volume of living tissue, and the intense local ionisation can cause serious damage (including lung cancer from radon).\n\nTakeaway: For external sources, gamma is the biggest external hazard (it penetrates your body). For internal sources, alpha is the biggest internal hazard (it dumps all its energy locally).", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": true}, {"question": "In a nuclear decay equation, what do the symbols **A** (mass/nucleon number) and **Z** (atomic/proton number) represent, and what two conservation laws must the equation obey?", "answer": "- **A** = the **nucleon (mass) number** = total number of protons + neutrons in the nucleus.\n- **Z** = the **atomic (proton) number** = number of protons in the nucleus (this also tells you which element it is).\n\nThe two conservation laws:\n+ **Conservation of nucleon number (A):** the total A on the left must equal the total A on the right.\n+ **Conservation of charge / atomic number (Z):** the total Z on the left must equal the total Z on the right.\n\nThese are just like balancing chemical equations — except instead of balancing atoms, you balance protons + neutrons (top number) and protons only (bottom number).", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Write the **general form of an alpha decay equation** in terms of A and Z, and explain why both A and Z change. (2 steps)", "answer": "- Step 1: The general form is:\n$$_{Z}^{A}\\text{X} \\rightarrow _{Z-2}^{A-4}\\text{Y} + _{2}^{4}\\alpha$$\n- Step 2: An alpha particle carries away **2 protons and 2 neutrons**, so the daughter nucleus Y has **2 fewer protons (Z decreases by 2)** and **4 fewer total nucleons (A decreases by 4)**. Both numbers change because alpha is a real, massive, charged particle.\n\nExample: $$_{92}^{238}\\text{U} \\rightarrow _{90}^{234}\\text{Th} + _{2}^{4}\\alpha$$ — uranium-238 becomes thorium-234.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Write the **general form of a beta-minus decay equation** in terms of A and Z, and explain why A stays the same but Z increases by 1. (3 steps)", "answer": "- Step 1: The general form is:\n$$_{Z}^{A}\\text{X} \\rightarrow _{Z+1}^{A}\\text{Y} + _{-1}^{0}e$$\n- Step 2: The beta particle is given an **atomic number of −1** because, in these equations, the bottom number is being used to represent **charge**, not just proton count. A proton has charge +1, an electron has charge −1.\n- Step 3: The total nucleon count A is unchanged because the neutron that turned into a proton + electron was already inside the nucleus — the proton stays (adding +1 to Z), and the electron leaves (carrying −1 charge but 0 nucleons). So Z increases by 1, but A is unchanged.\n\nExample: $$_{6}^{14}\\text{C} \\rightarrow _{7}^{14}\\text{N} + _{-1}^{0}e$$ — carbon-14 becomes nitrogen-14.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Write the **general form of a gamma decay equation**, and explain why A and Z are both unchanged. (2 steps)", "answer": "- Step 1: The general form is:\n$$_{Z}^{A}\\text{X}^{*} \\rightarrow _{Z}^{A}\\text{X} + _{0}^{0}\\gamma$$\n(The asterisk indicates the nucleus is in an excited, high-energy state.)\n- Step 2: A gamma ray has **no mass and no charge**, so emitting one cannot change either A or Z. The nucleus simply drops from a higher energy state to a lower one, releasing the energy difference as a high-energy photon.\n\nExample: $$_{92}^{238}\\text{U}^{*} \\rightarrow _{92}^{238}\\text{U} + _{0}^{0}\\gamma$$ — the uranium nucleus is the same element and has the same mass, but it has less energy afterwards.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "A nucleus undergoes the following sequence of decays: 1 alpha decay, then 2 beta decays, then 1 alpha decay. Starting from $$_{92}^{238}\\text{U}$$, what is the final nucleus? Show your reasoning step by step. (4 steps)", "answer": "- Step 1: Start: $$_{92}^{238}\\text{U}$$.\n- Step 2: After 1 alpha decay: A drops by 4, Z drops by 2 → $$_{90}^{234}\\text{Th}$$.\n- Step 3: After 2 beta decays: each beta decay leaves A unchanged and increases Z by 1, so Z increases by 2 → $$_{92}^{234}\\text{U}$$ (uranium again, but with A = 234).\n- Step 4: After 1 more alpha decay: A drops by 4, Z drops by 2 → $$_{90}^{230}\\text{Th}$$.\n\nFinal nucleus: $$_{90}^{230}\\text{Th}$$ (thorium-230). Notice how the alpha decays change both numbers, but the betas only shuffle Z — they're a way to \"rebalance\" the proton/neutron ratio without changing mass.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "What is the difference between a **spontaneous** process and a **random** process in the context of radioactive decay? (2 steps)", "answer": "- Step 1: A **spontaneous** process is one that **cannot be influenced by environmental factors**. For radioactive decay, this means temperature, pressure, chemical conditions, or any other external variable has no effect on whether or when a particular nucleus will decay.\n- Step 2: A **random** process is one in which **the exact time at which any individual nucleus decays cannot be predicted**. Instead, each nucleus has a **constant probability** of decaying in any given time interval — we can statistically predict the behaviour of a large group of nuclei, but not the fate of any single one.\n\nTakeaway: Spontaneous = \"we can't control it.\" Random = \"we can't predict it for one nucleus.\" Both are true of radioactive decay, and both are common exam-definition questions.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "A student places a GM tube near a radioactive source and observes that the counts per second fluctuate irregularly. What does this tell us about the nature of radioactive decay, and why does this *not* mean the experiment is faulty? (3 steps)", "answer": "- Step 1: The irregular fluctuations show that **radioactive decay is random** — we cannot predict exactly when the next decay will occur. Each \"click\" of the GM tube represents the decay of one unstable nucleus, and these decays happen at unpredictable times.\n- Step 2: This is **not** an experimental error. The randomness is a fundamental property of the decay process itself, not a fault of the equipment. Even with a perfectly calibrated GM tube, you'd see the same fluctuations.\n- Step 3: However, if you take a reading over a **long time interval** (or with a very large number of nuclei), the **average** count rate becomes stable and predictable — this is why we can still do meaningful experiments and use radioactive sources reliably in medicine and industry.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Define the **activity (A)** of a radioactive sample. What is its SI unit, and what does 1 Bq actually mean in terms of decays?", "answer": "Activity is the **average number of decays per unit time** in a radioactive sample. It is a measure of how strongly radioactive a source is — how many nuclei are disintegrating each second.\n\nThe SI unit is the **Becquerel (Bq)**, where **1 Bq = 1 decay per second** (i.e. 1 s⁻¹).\n\nTakeaway: A 4000 Bq source emits 4000 particles per second on average. Note that this is the *average* — because decay is random, the actual count in any given second will fluctuate around this value.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "State the equation relating **activity (A)**, the **decay constant (λ)**, and the **number of undecayed nuclei (N)**. Explain what the decay constant physically represents. (3 steps)", "answer": "- Step 1: The equation is:\n$$A = -\\lambda N$$\nor equivalently, the rate of change of N:\n$$\\frac{\\Delta N}{\\Delta t} = -\\lambda N$$\n- Step 2: The **decay constant λ** is defined as the **probability per second that a given nucleus will decay**. Its unit is s⁻¹.\n- Step 3: The negative sign tells us that N is *decreasing* over time. The greater λ, the faster the activity drops — a large λ means each nucleus has a high probability of decaying soon, so the sample loses nuclei (and activity) quickly. A small λ means a long-lived isotope.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A sample has activity 2000 Bq and contains $$10^{10}$$ undecayed nuclei. Calculate the decay constant. (2 steps)", "answer": "- Step 1: Rearrange $$A = \\lambda N$$ to give $$\\lambda = \\frac{A}{N}$$.\n- Step 2: Substitute: $$\\lambda = \\frac{2000}{10^{10}} = 2 \\times 10^{-7} \\text{ s}^{-1}$$.\n\nInterpretation: each nucleus has only a 2-in-10-million chance of decaying in any given second — so this is a fairly long-lived isotope. (For reference, carbon-14 has λ ≈ 3.8 × 10⁻¹² s⁻¹, even smaller.)", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "The equation $$A = \\lambda N$$ shows that activity is proportional to N. Explain in your own words why doubling the number of undecayed nuclei **doubles the activity**, and why this proportionality is consistent with the random nature of decay. (3 steps)", "answer": "- Step 1: Each individual nucleus decays independently, with the **same probability per second (λ)** regardless of how many other nuclei are around. The probability of decay doesn't change with sample size.\n- Step 2: The total number of decays per second is just the sum of the probabilities for each nucleus. If you have N nuclei, the expected number of decays per second is N × (probability per nucleus per second) = N × λ.\n- Step 3: So if you double N, you double the expected number of decays per second. This is a direct consequence of **statistical independence**: each nucleus \"rolls its own dice\" every second, and the total count is the sum of all those rolls.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Two radioactive samples have the same activity (1000 Bq), but sample 1 has decay constant $$10^{-6}$$ s⁻¹ and sample 2 has $$10^{-9}$$ s⁻¹. Which sample contains more nuclei, and by what factor? (2 steps)", "answer": "- Step 1: From $$A = \\lambda N$$, we get $$N = \\frac{A}{\\lambda}$$.\n- Step 2: For sample 1: $$N_1 = \\frac{1000}{10^{-6}} = 10^{9}$$ nuclei. For sample 2: $$N_2 = \\frac{1000}{10^{-9}} = 10^{12}$$ nuclei.\n\nSample 2 contains **1000 times more nuclei** than sample 1. This makes sense: sample 2 has a much smaller probability of decay per nucleus, so to achieve the same total activity, it needs vastly more nuclei decaying (just less often each).", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Define **half-life** in the context of radioactive decay. Why is it useful to define half-life in terms of the *probability* of decay rather than a fixed lifetime? (3 steps)", "answer": "- Step 1: The half-life ($$t_{1/2}$$) is the **average time taken for the activity (or number of undecayed nuclei, or mass) of a sample to halve**.\n- Step 2: Because decay is **random**, no individual nucleus has a \"lifespan\" — we cannot say \"this nucleus will decay at exactly 3 pm.\" Instead, each nucleus has a fixed probability λ of decaying per second, and the half-life is a **statistical average** over many nuclei.\n- Step 3: The half-life is related to the decay constant by $$t_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.693}{\\lambda}$$. A larger λ (higher decay probability) means a shorter half-life.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Explain why the half-life is the **same** whether you measure it by counting nuclei, by mass, or by activity. (2 steps)", "answer": "- Step 1: All three quantities (number of undecayed nuclei N, mass of radioactive material m, and activity A) are **directly proportional to each other**: $$A = \\lambda N$$ and the mass is just (N × mass per nucleus), so mass is proportional to N, and A is proportional to N.\n- Step 2: If N halves, mass halves, and A all halve — and they all do so over the **same time interval** (one half-life). So measuring any one of them gives you the same half-life.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "A radioactive sample starts with $$10{,}000$$ nuclei and has a half-life of 3 days. After 9 days, how many nuclei remain? Show two different methods to get the answer. (3 steps)", "answer": "- Step 1: **Method 1 — successive halving.** 9 days = 3 half-lives. Halve three times: 10,000 → 5,000 → 2,500 → **1,250 nuclei**.\n- Step 2: **Method 2 — formula.** Use $$N = N_0 \\left(\\frac{1}{2}\\right)^n$$ where n = number of half-lives:\n$$N = 10{,}000 \\times \\left(\\frac{1}{2}\\right)^3 = 10{,}000 \\times \\frac{1}{8} = 1{,}250 \\text{ nuclei}$$\n- Step 3: Both methods give 1,250. The formula is just a compact way of doing the successive-halving, and is faster when n is large.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "A doctor uses a radioactive tracer with half-life 7.8 days, starting with 100,000 unstable nuclei. After 13 days, what **percentage** of the original nuclei remain, and is the sample safe to dispose of? (3 steps)", "answer": "- Step 1: 13 days ÷ 7.8 days/half-life ≈ 1.67 half-lives. Use the formula: $$N = 100{,}000 \\times (1/2)^{1.67}$$. Since (1/2)^1.67 ≈ 0.315, we get N ≈ 31,500 nuclei, i.e. about **3%** of the original.\n- Step 2: Compare to a typical medical dose: a tracer is designed to be active for a couple of days inside the body. After 13 days, only ~3% of the original activity remains — a tiny fraction of the original dose.\n- Step 3: Therefore, **yes, it is safe to dispose of** — the activity has fallen to a level comparable to background radiation, posing negligible additional risk.\n\nTakeaway: In exam questions, \"safe to dispose of\" usually means the activity has dropped to background levels. The trick is to convert total time into number of half-lives, then use the (1/2)^n formula.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A half-life decay graph (activity vs time) does **not** fall to zero but levels off at a small positive value. What does this residual value represent, and how would you use the graph to find the true half-life? (3 steps)", "answer": "- Step 1: The residual value represents the **background radiation** — radiation that is always present from the environment, which the GM tube keeps detecting even when the source has effectively decayed away.\n- Step 2: To find the true half-life, you must **subtract the background count** from every reading first, then plot the corrected count rate vs time. The corrected curve will now drop toward zero.\n- Step 3: The half-life is read off the corrected graph as the time for the corrected count rate to fall to **half** of its starting value (e.g. from 1000 Bq to 500 Bq).\n\nTakeaway: This is why \"corrected count rate\" exists — without it, half-life graphs would give the wrong answer whenever background radiation is significant.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In the **Core Practical 15** (gamma absorption by lead), identify the **independent**, **dependent**, and **control** variables. (2 steps)", "answer": "- Step 1: **Independent variable** = the **thickness of lead** absorber placed between the source and the GM tube (this is what you deliberately vary).\n- Step 2: **Dependent variable** = the **count rate** measured by the GM tube. **Control variables** include: the **same radioactive source** (so activity is consistent), the **fixed distance** (e.g. 10 cm) between source and tube, and the **location** of the experiment (so background radiation stays constant).", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "Describe the **method** of Core Practical 15 in order, explaining the purpose of each step. (5 steps)", "answer": "- Step 1: First, **measure the background count rate** over 5 minutes with no source present, then convert to counts per minute. This is the value you'll subtract from all later readings.\n- Step 2: **Measure each lead absorber's thickness** at three points using Vernier calipers and take the average. This gives you reliable values for the independent variable.\n- Step 3: Place the source a **fixed distance** (10 cm) from the GM tube and record the count rate over 1 minute. **Repeat 3 times** and average — this reduces random error from the random nature of decay.\n- Step 4: Insert the thinnest lead absorber between source and tube, and again take 3 repeat readings of count rate. Repeat for each thicker absorber.\n- Step 5: Subtract background from each averaged reading to get corrected count rate. Plot corrected count rate vs lead thickness to see how gamma is attenuated.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In Core Practical 15, why is it important to take **repeat readings** (3 measurements per thickness) and average them? (2 steps)", "answer": "- Step 1: Because radioactive decay is **random**, the count rate fluctuates from one reading to the next even under identical conditions. A single 1-minute reading could easily be 30% off the true average just by chance.\n- Step 2: Taking 3 (or more) repeats and averaging **reduces the random (statistical) error**. The more repeats, the closer the average gets to the true mean count rate. This is a fundamental principle when measuring any random process.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "List the **safety precautions** you would take when handling the radioactive source in Core Practical 15, and explain why each one matters. (3 steps)", "answer": "- Step 1: **Store the source in a lead-lined container** when not in use. Lead attenuates gamma radiation, so this protects you from unnecessary exposure between measurements.\n- Step 2: **Keep your distance** — about a metre or more from the source when it's out. Intensity follows an inverse-square law, so doubling your distance quarters your dose.\n- Step 3: **Use tweezers (not fingers)** to handle the source, and **point it away from your body**. Wash your hands afterwards and remove outer clothing that may have been exposed — this prevents contamination and ingestion of any radioactive material.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "The SaveMyExams practical tip suggests the acronym **SCREAMS** for remembering how to answer core-practical questions. What does each letter stand for? (2 steps)", "answer": "- Step 1: **S** = which variable will you keep the **same** (control variables); **C** = which variable should you **change** (independent); **R** = what will you do to make your experiment **reliable** (repeats, averaging); **E** = what special **equipment** and equations are required.\n- Step 2: **A** = how will you **analyse** your results (graph, calculation); **M** = which variable will you **measure** (dependent); **S** = what **safety** precautions will you take.\n\nTakeaway: This is a useful checklist to walk through whenever you face a \"describe how you would investigate X\" question — it ensures you cover every mark scheme point.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In Core Practical 15, distinguish between **systematic** and **random** errors that could affect the experiment, giving one example of each.", "answer": "- **Systematic errors** are consistent, repeatable biases that shift all readings in the same direction. Example: forgetting to subtract background radiation from every reading would systematically *overestimate* the count rate at every thickness.\n- **Random errors** are unpredictable fluctuations that scatter readings around the true value. Example: the inherent randomness of radioactive decay means each 1-minute count rate will vary slightly even with the same setup.\n\nTo reduce random errors: take more repeats and average. To reduce systematic errors: calibrate equipment, subtract background, and use consistent technique throughout.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "Why is **gamma radiation** specifically chosen as the source for an absorption experiment (rather than alpha or beta)? (2 steps)", "answer": "- Step 1: Alpha is stopped by a sheet of paper and beta by a few mm of aluminium — neither would penetrate even the thinnest lead absorber meaningfully, so you couldn't measure how thickness affects penetration.\n- Step 2: Gamma rays are **highly penetrating**, so varying the lead thickness produces a measurable change in count rate. This lets you plot a meaningful relationship between absorber thickness and transmitted intensity.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "Distinguish between **fission** and **fusion** in terms of (a) what happens to the nuclei and (b) the energy required.", "answer": "- **Fission**: a **large nucleus splits into two smaller nuclei**. It requires relatively little energy to initiate (just one slow neutron absorbed by a large nucleus like uranium-235). The resulting smaller nuclei have higher binding energy per nucleon, releasing energy.\n- **Fusion**: **two small nuclei combine to form a larger nucleus**. It requires enormous energy input because the two positively charged nuclei must overcome the **Coulomb repulsion** between their protons before the strong nuclear force can bind them together. Once they fuse, the resulting nucleus has higher binding energy per nucleon, releasing even more energy than fission (per unit mass).\n\nTakeaway: Both processes release energy because the products have a higher binding energy per nucleon (closer to the peak of the binding-energy curve around iron-56) than the reactants.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "A student says: \"Fission needs less energy than fusion, so fission must be easier.\" Correct the misconception and explain the real reason for the energy difference. (3 steps)", "answer": "- Step 1: The student is right that fission requires less *initiating* energy, but the reason isn't about \"easiness\" — it's about the **Coulomb barrier**.\n- Step 2: In fusion, you must push two **positively charged** nuclei close enough together for the strong nuclear force to take over. The Coulomb repulsion between protons creates a huge energy barrier that must be overcome (this is why fusion needs extreme temperatures and pressures — like inside the Sun).\n- Step 3: In fission, the **strong nuclear force is already holding the large nucleus together**. You just need to add a slow neutron (electrically neutral, so no Coulomb barrier) to destabilise it. The nucleus then splits because the strong force can no longer hold all those protons apart — Coulomb repulsion wins in a large nucleus.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": true}, {"question": "Explain how a **chain reaction** works in nuclear fission, and why a **slow neutron** is used to initiate it. (3 steps)", "answer": "- Step 1: A slow (thermal) neutron is absorbed by a large, unstable nucleus (e.g. uranium-235). The new nucleus is so unstable that it **splits into two smaller nuclei** (fission fragments), releasing energy.\n- Step 2: The split also releases **2 or 3 more neutrons**. Each of these neutrons can then be absorbed by another uranium-235 nucleus, causing it to split and release more neutrons — a self-sustaining **chain reaction**.\n- Step 3: Slow neutrons are used because uranium-235 has a **much higher probability of absorbing a slow neutron** than a fast one. Fast neutrons tend to bounce off or pass through without being captured, so the chain reaction wouldn't sustain.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "A student says: \"A nuclear weapon uses fusion, because hydrogen bombs are the most powerful.\" Correct this misconception.", "answer": "The misconception confuses two different weapons. The **original atomic bomb** (like the ones dropped on Hiroshima and Nagasaki) uses **fission** of uranium or plutonium. The **hydrogen (thermonuclear) bomb** uses **fusion** of hydrogen isotopes, but it actually uses a **fission bomb as the trigger** — the fission explosion provides the extreme temperature and pressure needed to initiate fusion.\n\nSo both fission and fusion are involved in an H-bomb, but the original atomic bomb is purely fission. The student's statement is wrong on two counts: fission weapons exist, and fusion weapons aren't \"pure\" fusion.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "In Core Practical 15, the experiment is conducted at a \"fixed location.\" Why does the location matter for the validity of the experiment? (2 steps)", "answer": "- Step 1: **Background radiation varies from place to place** — different rocks, different building materials, different elevations (cosmic ray intensity increases with altitude). If you moved the experiment between rooms or buildings, the background count could change.\n- Step 2: Since you subtract the same background value from every reading, you need that background value to be **representative of the conditions during all measurements**. Doing all runs in the same location keeps the background constant, so the comparison between thicknesses is valid.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "A nucleus undergoes two decays in sequence. The first changes A by 4 and Z by 2; the second changes A by 0 and Z by 1. What types of decay are these, in order? (2 steps)", "answer": "- Step 1: First decay: A changes by 4, Z changes by 2 → this is **alpha decay** (alpha carries away 2 protons + 2 neutrons).\n- Step 2: Second decay: A unchanged, Z increases by 1 → this is **beta-minus decay** (a neutron converts to a proton, ejecting an electron).\n\nSo the sequence is alpha then beta. (You'd never see beta then alpha with these specific numbers, because alpha always changes both A and Z.)", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "A radioactive decay equation shows: $$_{Z}^{A}\\text{X} \\rightarrow _{Z+1}^{A}\\text{Y} + ?$$. Identify the missing particle, and explain how you deduced its identity from conservation laws. (3 steps)", "answer": "- Step 1: Apply **conservation of A**: A on the left = A on the right. So the missing particle must have **mass number 0**.\n- Step 2: Apply **conservation of Z**: Z on the left = (Z+1) + (Z of missing particle). So the missing particle's atomic number must be **−1**.\n- Step 3: A particle with mass number 0 and atomic number −1 is an **electron**, written as $$_{-1}^{0}e$$ — this is a **beta-minus particle**. The decay is beta-minus decay.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "A radioactive decay equation shows: $$_{Z}^{A}\\text{X} \\rightarrow _{Z-2}^{A-4}\\text{Y} + ?$$. Identify the missing particle and state what type of decay this is.", "answer": "The missing particle has mass number 4 and atomic number 2 — this is an **alpha particle**, $$_{2}^{4}\\alpha$$ (or $$_{2}^{4}\\text{He}$$). The decay is **alpha decay**, in which the parent nucleus ejects a helium-4 nucleus, reducing both its mass number by 4 and its atomic number by 2.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "Why does **gamma radiation** have no effect on a nucleus's A and Z values, and how does this fact help you recognise gamma decay in a nuclear equation? (2 steps)", "answer": "- Step 1: A gamma ray is a **photon** — it has no rest mass and no charge. So when it's emitted, neither the total number of nucleons (A) nor the total charge (Z) of the nucleus changes.\n- Step 2: In an equation, this means the **same element symbol appears on both sides** with identical A and Z values, plus a $$_{0}^{0}\\gamma$$ on the right. If you see \"X → X + γ,\" it's gamma decay.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "In the equation $$A = -\\lambda N$$, what is the meaning of the **negative sign**, and what would happen to the equation if you forgot it? (2 steps)", "answer": "- Step 1: The negative sign indicates that **N is decreasing** over time — each decay removes one nucleus from the undecayed population. So $$\\Delta N/\\Delta t$$ is negative, but activity A is defined as a positive quantity (decays per second), so the minus sign makes the right-hand side come out positive.\n- Step 2: If you forgot the negative sign, you'd write $$A = +\\lambda N$$, which would still give the right *magnitude* for activity, but the equation $$\\Delta N/\\Delta t = -\\lambda N$$ (used in calculus-based derivations) would lose its meaning — it would predict N *growing* exponentially, which is the opposite of what happens.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "A sample has decay constant $$3 \\times 10^{-7}$$ s⁻¹. Estimate its half-life in years. (3 steps)", "answer": "- Step 1: Use $$t_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.693}{\\lambda}$$.\n- Step 2: $$t_{1/2} = \\frac{0.693}{3 \\times 10^{-7}} \\approx 2.3 \\times 10^{6}$$ seconds.\n- Step 3: Convert to years: divide by (60 × 60 × 24 × 365) ≈ 3.15 × 10⁷. So $$t_{1/2} \\approx \\frac{2.3 \\times 10^{6}}{3.15 \\times 10^{7}} \\approx 0.07$$ years, i.e. about **26 days**.\n\n(You don't need to memorise the conversion — just know that 1 year ≈ 3.15 × 10⁷ s, so any half-life in seconds can be quickly converted.)", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "A GM tube measures 250 counts per minute when a source is present, and 50 counts per minute with no source. What is the corrected count rate, and what is the **percentage uncertainty** if each reading has ±10 counts/min uncertainty? (3 steps)", "answer": "- Step 1: Corrected count rate = 250 − 50 = **200 counts per minute**.\n- Step 2: The uncertainties add in quadrature (or simply add, in school physics): total uncertainty ≈ 10 + 10 = ±20 counts/min (worst case) or $$\\sqrt{10^2 + 10^2} \\approx 14$$ (statistical).\n- Step 3: Percentage uncertainty ≈ $$\\frac{20}{200} \\times 100\\% = 10\\%$$ (worst case) or about 7% statistically.\n\nTakeaway: Subtracting background doesn't just change the value — it also *increases* the relative uncertainty, because the same absolute uncertainty now applies to a smaller corrected value.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "A half-life graph shows activity dropping from 800 Bq to 100 Bq in 12 seconds. Estimate the half-life. (2 steps)", "answer": "- Step 1: Count the number of half-lives needed to go from 800 to 100: 800 → 400 → 200 → 100. That's **3 half-lives**.\n- Step 2: 3 half-lives = 12 seconds, so **1 half-life = 4 seconds**.\n\nTakeaway: A quick mental trick — if the activity drops by a factor of 8 (= 2³), that's 3 half-lives; if by 16 (= 2⁴), that's 4 half-lives, etc.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "Why is **carbon-14 dating** able to date organic material up to about 50,000 years old, but not dinosaur bones (which are ~65 million years old)? (3 steps)", "answer": "- Step 1: Carbon-14 has a half-life of about **5,700 years**. After ~10 half-lives (≈ 57,000 years), only about 1/1000 of the original C-14 remains — detectable but already very small.\n- Step 2: After ~11,000 half-lives (65 million years), the remaining C-14 fraction would be $$(1/2)^{11{,}000}$$ — astronomically small, far below any measurable level. So C-14 dating simply can't reach that far back.\n- Step 3: For older samples, we use **isotopes with much longer half-lives**, like potassium-40 (half-life 1.25 billion years), which can date geological timescales. The choice of isotope depends on the age of the sample.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "Explain in your own words why a **large sample of radioactive material** behaves predictably (e.g. has a stable average count rate), even though each individual decay is random. (2 steps)", "answer": "- Step 1: Each nucleus decays independently and randomly, like rolling a die. With one die, the outcome is unpredictable. But with **millions of dice**, the *average* result becomes very predictable — this is the **law of large numbers**.\n- Step 2: A typical radioactive sample contains an enormous number of nuclei (often $$10^{15}$$ or more). Even though we can't predict any single decay, the **total** number of decays per second averages out to a stable value. So the activity A is well-defined and measurable, even though individual decay times are not.", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "In the SaveMyExams notes, the equation is written as $$A = \\frac{\\Delta N}{\\Delta t} = -\\lambda N$$. Why are there **two equal signs** in this expression, and what does each part tell you? (2 steps)", "answer": "- Step 1: The first equality, $$A = \\frac{\\Delta N}{\\Delta t}$$, defines activity as the **rate of change of the number of undecayed nuclei** — i.e. how many nuclei decay per unit time. By convention, A is taken as a positive number.\n- Step 2: The second equality, $$\\frac{\\Delta N}{\\Delta t} = -\\lambda N$$, comes from the physics: the rate of decay is proportional to the number of nuclei present (more nuclei → more decays), with proportionality constant λ. The minus sign is needed because N is *decreasing* over time. Combining these gives the compact form $$A = \\lambda N$$.", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "A student confuses **activity** with **dose**. Define each term and explain why doubling the activity does **not** double the dose received by a person standing nearby. (3 steps)", "answer": "- Step 1: **Activity** is the number of decays per second in a source (measured in Bq). It tells you how radioactive the source is, not how dangerous it is to you.\n- Step 2: **Dose** is the amount of ionising energy absorbed per kilogram of body tissue (measured in Sieverts, Sv). Dose depends on activity, but also on the **type of radiation** (alpha is more damaging per decay than gamma) and the **distance** and **shielding** between you and the source.\n- Step 3: So doubling the activity doubles the number of decay particles heading your way, but if you also doubled your distance, the intensity reaching you would drop to one-quarter (inverse-square law), making the actual dose received much less than double.", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "Why does **intensity of radiation decrease with the square of the distance** from the source? Sketch the reasoning. (3 steps)", "answer": "- Step 1: Radiation spreads out **spherically** from a point source. Imagine the radiation passing through an imaginary sphere centred on the source.\n- Step 2: The **surface area** of a sphere is $$4\\pi r^2$$. So the same total radiation is spread over an area that grows as $$r^2$$.\n- Step 3: The intensity (power per unit area) is therefore proportional to $$1/r^2$$. Doubling the distance quarters the intensity; tripling it reduces it to one-ninth. This is the **inverse-square law**.", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "A nucleus has 7 protons and 8 neutrons. It undergoes **beta-minus decay**. What are the proton and neutron counts of the daughter nucleus? (2 steps)", "answer": "- Step 1: In beta-minus decay, a neutron converts into a proton (which stays) plus an electron (which leaves). So protons increase by 1, neutrons decrease by 1.\n- Step 2: Daughter nucleus: **8 protons, 7 neutrons**. Total nucleons unchanged at 15 — but the element has changed (from nitrogen-15 to oxygen-15).", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": false}, {"question": "A nucleus has 92 protons and 146 neutrons. It undergoes **alpha decay**. What are the proton and neutron counts of the daughter nucleus? (2 steps)", "answer": "- Step 1: An alpha particle removes **2 protons and 2 neutrons** from the nucleus.\n- Step 2: Daughter nucleus: **90 protons, 144 neutrons**. Total nucleons drop from 238 to 234. The element changes from uranium (Z=92) to thorium (Z=90).", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "Why does **gamma emission often follow alpha or beta decay** in a decay chain? (2 steps)", "answer": "- Step 1: After alpha or beta decay, the daughter nucleus is often left in an **excited, high-energy state** — like a bell that's just been struck and is still ringing.\n- Step 2: To reach its true ground state, the nucleus releases the excess energy as a **gamma photon**. So a decay like $$_{92}^{238}\\text{U} \\rightarrow _{90}^{234}\\text{Th}^{*} + \\alpha$$ is usually followed almost immediately by $$_{90}^{234}\\text{Th}^{*} \\rightarrow _{90}^{234}\\text{Th} + \\gamma$$.\n\nTakeaway: When you see a decay chain in exam questions, look for the gamma at the end — it doesn't change the element, just the energy.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "A common misconception is that \"radioactive decay can be sped up by heating the sample.\" Why is this wrong, and what property of decay does it violate? (2 steps)", "answer": "- Step 1: This is wrong because radioactive decay is a **spontaneous** process — it cannot be influenced by environmental factors such as temperature, pressure, or chemical conditions.\n- Step 2: The decay is governed by the **nuclear strong force** and the weak interaction inside the nucleus, neither of which is affected by external conditions. Heating might speed up a chemical reaction (which depends on electron bonds), but it doesn't change the probability of any individual nucleus decaying.", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}, {"question": "In Core Practical 15, you take 3 readings of count rate at each thickness. Reading 1 = 245, Reading 2 = 268, Reading 3 = 251 counts/min. The background is 30 counts/min. Calculate the **mean corrected count rate** and a rough idea of the **random uncertainty**. (3 steps)", "answer": "- Step 1: Mean raw count rate = (245 + 268 + 251) / 3 ≈ **255 counts/min**.\n- Step 2: Subtract background: 255 − 30 = **225 counts/min** (corrected).\n- Step 3: Random uncertainty ≈ half the range = (268 − 245) / 2 ≈ 12 counts/min, so the result is approximately **225 ± 12 counts/min**.\n\nTakeaway: For school labs, the \"half-range\" estimate of uncertainty is a quick and reasonable way to express the spread in repeat readings.", "source": "MiniMax ①", "_id": "minimax_1_59", "judge_pick": false}, {"question": "Why is the **Geiger-Müller tube** resolution quoted as $$0.01 \\text{ μSv/hr}$$ in the practical — and what does this tell you about how precisely it can measure dose rate?", "answer": "The resolution is the **smallest change in reading that the detector can reliably distinguish**. A resolution of 0.01 μSv/hr means the GM tube can detect changes as small as 0.01 μSv/hr — it cannot meaningfully resolve differences smaller than that.\n\nThis is the *precision* of the instrument, separate from any random or systematic errors in your procedure. A high-resolution instrument reduces the limit below which measurements become unreliable.", "source": "MiniMax ①", "_id": "minimax_1_60", "judge_pick": false}, {"question": "A student says: \"Activity is measured in Becquerels, so 1 Bq means 1 Becquerel of radiation.\" What's wrong with this statement?", "answer": "The statement confuses the **unit** with the **physical quantity**. **Becquerel (Bq)** is the unit of *activity* — it tells you how many decays per second, not how much radiation energy is involved. **1 Bq = 1 decay per second**, regardless of what kind of particle is emitted or how energetic it is.\n\nA 1 Bq alpha source and a 1 Bq gamma source both have \"1 decay per second,\" but the alpha source is far more damaging per decay because alpha particles are far more ionising. The Becquerel measures rate, not danger.", "source": "MiniMax ①", "_id": "minimax_1_61", "judge_pick": false}, {"question": "Why does the SaveMyExams document emphasise that \"exam questions may expect you to remember about background radiation without mentioning it\"? What does this mean for how you should approach a half-life graph question? (2 steps)", "answer": "- Step 1: The examiner may give you a half-life graph that **does not drop to zero** but levels off at some positive value, expecting you to notice this and recognise it as background radiation — without the question explicitly mentioning background.\n- Step 2: So whenever you see a graph that doesn't reach zero, **subtract the residual value from all readings** before reading off the half-life. This is a \"hidden\" mark that students often miss because they don't think to look for it.", "source": "MiniMax ①", "_id": "minimax_1_62", "judge_pick": false}, {"question": "Sketch a typical **radioactive decay curve** (activity vs time) and label: the initial activity, one half-life, two half-lives, and the background level. (2 steps)", "answer": "- Step 1: The curve is an **exponential decay**: it starts at the initial activity $$A_0$$, drops steeply at first, then levels off as it approaches the **background level** (a horizontal asymptote, not zero).\n- Step 2: After each half-life, the activity halves:\n  + At t = 0: activity = $$A_0$$\n  + At t = $$t_{1/2}$$: activity = $$A_0/2$$\n  + At t = $$2 t_{1/2}$$: activity = $$A_0/4$$\n  + At t = $$3 t_{1/2}$$: activity = $$A_0/8$$\n\nThe half-life is read off as the time for the activity to halve (e.g. from $$A_0$$ to $$A_0/2$$), using the **corrected** curve (after subtracting background).", "source": "MiniMax ①", "_id": "minimax_1_63", "judge_pick": false}, {"question": "A sample contains $$8 \\times 10^{10}$$ nuclei of an isotope with decay constant $$\\lambda = 2.5 \\times 10^{-4} \\text{ s}^{-1}$$. Calculate the activity. (2 steps)", "answer": "- Step 1: Use $$A = \\l
