ambda N$$.\n- Step 2: $$A = (2.5 \\times 10^{-4}) \\times (8 \\times 10^{10}) = 2 \\times 10^{7}$$ Bq = 20 MBq.\n\nInterpretation: 20 million decays per second — a fairly active laboratory source. (For reference, a typical medical tracer might be ~MBq; a reactor fuel pellet might be ~GBq.)", "source": "MiniMax ①", "_id": "minimax_1_64", "judge_pick": false}, {"question": "Why are radioactive **tracers** used in medicine, and what property of the radiation makes them safe to use internally? (3 steps)", "answer": "- Step 1: A tracer is a radioactive substance (e.g. technetium-99m) that is **injected into the body** and travels to specific organs or tissues. Because it emits gamma radiation, doctors can use a gamma camera **outside** the body to image where the tracer accumulates.\n- Step 2: **Gamma is used** (not alpha or beta) because gamma **escapes the body** — alpha and beta would be absorbed inside and couldn't be detected externally. Gamma's high penetrating power is exactly what you want for an external detector.\n- Step 3: The tracer is safe because it has a **short half-life** (hours for Tc-99m), so the activity drops to background levels quickly. Also, the dose is kept low, and the gamma radiation, while ionising, is much less damaging per decay than alpha or beta.", "source": "MiniMax ①", "_id": "minimax_1_65", "judge_pick": false}, {"question": "A common confusion: \"If alpha is the most ionising, why don't we use it for medical imaging?\" Explain using two distinct reasons. (2 steps)", "answer": "- Reason 1 (penetration): Alpha is **stopped by paper or skin** — it cannot escape the body to be detected by an external camera. So even if you injected an alpha tracer, you couldn't image it from outside.\n- Reason 2 (damage): Alpha is **so strongly ionising** that it would cause far more tissue damage than gamma for the same number of decays. The whole point of a medical tracer is to image without harming the patient.\n\nGamma sits in the sweet spot: ionising enough to be detected, but weakly enough to be safe in small doses, and penetrating enough to escape the body.", "source": "MiniMax ①", "_id": "minimax_1_66", "judge_pick": false}, {"question": "Why is **radon gas** particularly dangerous compared to other background sources, even though it's an alpha emitter (which we said is harmless externally)? (2 steps)", "answer": "- Step 1: Radon is a **gas**, so it can be **inhaled** into the lungs. Once inside the body, the alpha-emitting radon (and its decay products) deposit all their ionising energy into a very small volume of **living lung tissue**.\n- Step 2: This intense, localised ionisation can **damage DNA** in lung cells, leading to an increased risk of **lung cancer**. Radon is in fact the second leading cause of lung cancer after smoking — a striking example of how alpha's \"weakness\" (low penetration) becomes its danger when the source is internal.", "source": "MiniMax ①", "_id": "minimax_1_67", "judge_pick": true}, {"question": "Why does the SaveMyExams document mention that \"carbon-14 in biological material\" is a natural background source? Why is the amount in living things roughly constant, but decreases after death? (3 steps)", "answer": "- Step 1: Carbon-14 is **continuously produced in the upper atmosphere** by cosmic rays colliding with nitrogen, so there's a roughly constant supply.\n- Step 2: Living plants and animals constantly **take in carbon** (through CO₂ in air, or food), so they're constantly replenishing their C-14 supply as it decays. This keeps the C-14 level in a living organism in equilibrium with the atmosphere.\n- Step 3: After death, **no new carbon is taken in**, so the C-14 decays without being replaced. The fraction of C-14 remaining tells you how long ago the organism died — this is the basis of **carbon dating**.", "source": "MiniMax ①", "_id": "minimax_1_68", "judge_pick": true}, {"question": "A nucleus undergoes the following sequence: alpha, alpha, beta, beta, alpha. Starting from $$_{94}^{242}\\text{Pu}$$, what is the final nucleus? (3 steps)", "answer": "- Step 1: Track the cumulative changes. Each alpha: A −4, Z −2. Each beta: A unchanged, Z +1.\n- Step 2: Three alphas and two betas: A change = 3 × (−4) = −12; Z change = 3 × (−2) + 2 × (+1) = −6 + 2 = −4.\n- Step 3: Final nucleus: A = 242 − 12 = 230; Z = 94 − 4 = 90 → $$_{90}^{230}\\text{Th}$$ (thorium-230).\n\nTakeaway: When solving multi-step decay chains, you don't need to write each intermediate — just sum the A and Z changes, then apply them to the starting nucleus.", "source": "MiniMax ①", "_id": "minimax_1_69", "judge_pick": false}, {"question": "A student says: \"Carbon dating works because old things contain less carbon.\" Correct this misconception.", "answer": "Old things don't necessarily contain less **carbon** — they contain the same total carbon, but a smaller fraction of it is the **radioactive isotope C-14**. Living things maintain a constant ratio of C-14 to stable C-12 (because they keep exchanging carbon with the environment). Once they die, the C-14 decays away without being replaced, so the **C-14/C-12 ratio decreases** over time. We measure this ratio to determine the age.", "source": "MiniMax ①", "_id": "minimax_1_70", "judge_pick": false}, {"question": "In the SaveMyExams notes, the equation $$A = -\\lambda N$$ is presented alongside the definition \"the probability per second that a given nucleus will decay.\" Why does this *probability* definition make sense given that decay is random? (2 steps)", "answer": "- Step 1: Because decay is random, we can't say *when* a specific nucleus will decay — but we **can** say what its chance of decaying in the next second is. This chance is λ, the decay constant.\n- Step 2: For a single nucleus, λ is small but nonzero. Over many nuclei, the expected number decaying per second is N × λ, which is exactly the activity A. So the probability definition and the activity equation are two sides of the same coin: λ is the per-nucleus rate, A is the total rate.", "source": "MiniMax ①", "_id": "minimax_1_71", "judge_pick": false}, {"question": "Why does the SaveMyExams document warn that \"the accuracy of such an experiment is improved with using a reliable source of radiation with a long half-life\"? How does half-life affect accuracy in Core Practical 15? (3 steps)", "answer": "- Step 1: If the source has a **short half-life**, its activity decreases significantly *during* the experiment itself. So readings taken at the start (with thinner lead) would be systematically higher than readings at the end (with thicker lead), not because of the lead, but because the source has decayed.\n- Step 2: A **long half-life** means the source activity is essentially constant throughout the experiment, so any change in count rate is genuinely due to the lead thickness.\n- Step 3: A **high activity** (well above background) also reduces the *relative* size of random fluctuations, giving more precise readings.", "source": "MiniMax ①", "_id": "minimax_1_72", "judge_pick": true}, {"question": "A nucleus decays by emitting a particle with charge +2 and mass 4. Identify the particle and explain why the parent nucleus must have been heavier than the daughter.", "answer": "The particle is an **alpha particle**, $$_{2}^{4}\\alpha$$ — it has charge +2 (2 protons) and mass 4 (2 protons + 2 neutrons), making it identical to a helium-4 nucleus.\n\nThe parent must have been heavier because the alpha particle carries **4 nucleons** out of the parent. By conservation of nucleon number, the daughter has **4 fewer nucleons** than the parent. So parent A = daughter A + 4 — the parent is always heavier by 4 mass units in alpha decay.", "source": "MiniMax ①", "_id": "minimax_1_73", "judge_pick": false}, {"question": "What is the relationship between **decay constant λ** and **half-life $$t_{1/2}$$**, and explain *why* this relationship exists using the definitions of each. (3 steps)", "answer": "- Step 1: The relationship is $$t_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.693}{\\lambda}$$.\n- Step 2: λ is the probability per second of decay. A larger λ means each nucleus is more likely to decay soon — so the sample halves faster, and the half-life is shorter.\n- Step 3: The exact constant (ln 2 ≈ 0.693) comes from solving $$N = N_0 e^{-\\lambda t}$$ for the time at which $$N = N_0/2$$. Setting $$1/2 = e^{-\\lambda t_{1/2}}$$ and taking the natural log gives $$\\ln(1/2) = -\\lambda t_{1/2}$$, i.e. $$t_{1/2} = \\ln 2 / \\lambda$$.", "source": "MiniMax ①", "_id": "minimax_1_74", "judge_pick": false}, {"question": "A sample has half-life 8 days. After 24 days, what fraction of the original nuclei remain? (2 steps)", "answer": "- Step 1: Number of half-lives = 24 / 8 = 3.\n- Step 2: Fraction remaining = $$(1/2)^3 = 1/8$$. So **1/8 of the original** nuclei remain, i.e. 12.5%.\n\nTakeaway: Always convert total time to \"number of half-lives\" first — that's the only number that matters for the (1/2)^n formula.", "source": "MiniMax ①", "_id": "minimax_1_75", "judge_pick": false}, {"question": "In the SaveMyExams practical, why are **Vernier calipers** used to measure the thickness of the lead absorbers rather than a simple ruler? (2 steps)", "answer": "- Step 1: A standard ruler has a resolution of about **1 mm**, which is too coarse to detect small differences in thickness between lead sheets — and the experiment's whole point is to see how count rate changes with thickness.\n- Step 2: Vernier calipers have a resolution of about **0.1 mm or better**, allowing precise measurement. Also, taking the **average of three measurements at different points** on each sheet accounts for any small variations in thickness across the sheet.", "source": "MiniMax ①", "_id": "minimax_1_76", "judge_pick": false}, {"question": "Why is the GM tube placed a **fixed 10 cm** from the source in Core Practical 15, rather than varying the distance? (2 steps)", "answer": "- Step 1: Intensity follows an **inverse-square law** with distance. If you varied the distance, you'd be changing two variables at once (lead thickness *and* distance), so you couldn't tell which one caused any change in count rate.\n- Step 2: By fixing the distance, you **control** that variable — so any change in count rate can be confidently attributed to the lead thickness (the independent variable). This is a fundamental principle of a fair test.", "source": "MiniMax ①", "_id": "minimax_1_77", "judge_pick": false}, {"question": "A student says: \"Radioactivity is dangerous, so all radioactive sources should be banned.\" Give **two** counter-arguments based on the material in this lesson.", "answer": "- **Counter-argument 1 (medical benefit):** Radioactive tracers and radiation therapy save lives. Banning all sources would mean losing diagnostic tools (e.g. Tc-99m imaging) and cancer treatments that have no equivalent non-radioactive alternative.\n- **Counter-argument 2 (natural background is unavoidable):** Background radiation is natural and unavoidable — it comes from cosmic rays, radon gas, and even our food. Banning artificial sources doesn't eliminate exposure; it just removes the *controlled* uses where the benefits (e.g. clean energy from nuclear power, medical imaging) outweigh the carefully-managed risks.", "source": "MiniMax ①", "_id": "minimax_1_78", "judge_pick": false}, {"question": "Looking back at the entire chapter, summarise in **3–4 sentences** the chain of reasoning that connects: (1) instability of the nucleus → (2) emission of a particle → (3) change in A and Z → (4) random timing.", "answer": "- Sentence 1: A nucleus becomes unstable when its proton-neutron balance is off (too many protons, too many neutrons, or too much energy), and to regain stability it **emits a particle** (alpha, beta, or gamma).\n- Sentence 2: Because each particle carries specific mass and charge, the emission **changes A and Z in characteristic ways**: alpha drops A by 4 and Z by 2, beta leaves A unchanged and raises Z by 1, gamma leaves both unchanged.\n- Sentence 3: The decay is **random** — we can't predict when any single nucleus decays, only that each has a constant probability λ per second.\n- Sentence 4: But for a **large sample**, the random behaviour averages out into a predictable exponential decay with a well-defined half-life, governed by $$N = N_0 (1/2)^{t/t_{1/2}}$$.", "source": "MiniMax ①", "_id": "minimax_1_79", "judge_pick": false}, {"question": "A nucleus has half-life 4 hours. Starting with 800 Bq of activity, what is the activity after 12 hours? (2 steps)", "answer": "- Step 1: 12 hours = 3 half-lives.\n- Step 2: Activity after 3 half-lives: $$800 \\times (1/2)^3 = 800/8 = 100 \\text{ Bq}$$.", "source": "MiniMax ①", "_id": "minimax_1_80", "judge_pick": false}, {"question": "Why does the SaveMyExams document warn that \"exam questions may expect you to remember about background radiation without mentioning it\"? Give a specific example of how this could trip you up.", "answer": "A common trap: a half-life graph is drawn so that the curve **levels off at a small positive value** (say 20 Bq) instead of dropping to zero. If you don't notice this and try to read the half-life directly off the graph, you'll get the wrong answer because the curve is being \"lifted\" by background.\n\nThe correct approach: notice the asymptote, subtract it from every reading to get a corrected curve that does approach zero, then read the half-life off the corrected curve. The \"20 Bq\" is the background — the question never tells you this directly, but expects you to recognise it.", "source": "MiniMax ①", "_id": "minimax_1_81", "judge_pick": false}, {"question": "In the SaveMyExams notes, the equation for activity is given as both $$A = \\frac{\\Delta N}{\\Delta t}$$ and $$A = -\\lambda N$$. Why are both forms useful, and when would you use each? (2 steps)", "answer": "- Step 1: $$A = \\frac{\\Delta N}{\\Delta t}$$ is the **operational definition** — it tells you how to *measure* activity experimentally: count the decays in a time interval, divide by the interval. This is what a GM tube does directly.\n- Step 2: $$A = -\\lambda N$$ is the **physical model** — it tells you activity depends on the *number of undecayed nuclei* and the decay constant. This is useful for **predicting** activity from known properties of the source, or for deriving the exponential decay law.", "source": "MiniMax ①", "_id": "minimax_1_82", "judge_pick": false}, {"question": "A nucleus undergoes the decay sequence: alpha, then 2 betas, then alpha, then gamma. Starting from $$_{94}^{239}\\text{Pu}$$, what is the final nucleus? (3 steps)", "answer": "- Step 1: Track cumulative changes. Two alphas: A −8, Z −4. Two betas: A unchanged, Z +2. Gamma: nothing changes.\n- Step 2: Net: A change = −8, Z change = −4 + 2 = −2.\n- Step 3: Final nucleus: A = 239 − 8 = 231; Z = 94 − 2 = 92 → $$_{92}^{231}\\text{U}$$ (uranium-231).", "source": "MiniMax ①", "_id": "minimax_1_83", "judge_pick": false}, {"question": "Why is the **Becquerel** defined as \"one decay per second\" rather than \"one particle emitted per second\"? (2 steps)", "answer": "- Step 1: A single decay event corresponds to **one nucleus transforming**, and that transformation produces a definite set of emissions (e.g. one alpha, or one beta, possibly with a gamma). So \"one decay per second\" and \"one particle emitted per second\" are usually equivalent.\n- Step 2: However, in some decay chains, **multiple particles** can be emitted per decay (e.g. an alpha decay followed almost instantly by a gamma). The Becquerel counts *decays*, not particles — so a 1 Bq source emits 1 decay event per second, even if that event produces both an alpha and a gamma. The Becquerel is tied to the *nuclear transformation*, not the radiation output.", "source": "MiniMax ①", "_id": "minimax_1_84", "judge_pick": false}, {"question": "A student sets up the gamma absorption experiment but forgets to measure the background count. They take readings and plot count rate vs lead thickness. What will the graph look like, and how will it affect their conclusion about gamma absorption? (3 steps)", "answer": "- Step 1: The graph will show count rate **decreasing** as thickness increases (because lead absorbs gamma), but the curve will **level off at the background value** rather than approaching zero.\n- Step 2: The student might mistakenly conclude that gamma \"passes through\" some thickness of lead unchanged — when in reality, the gamma has been fully absorbed, and what they're still measuring is just background radiation.\n- Step 3: The fix: subtract the background from every reading first, then plot. The corrected curve will approach zero, revealing the true absorption behaviour. This is why **background measurement is a critical control step** in any radiation experiment.", "source": "MiniMax ①", "_id": "minimax_1_85", "judge_pick": true}, {"question": "In the SaveMyExams notes, the relationship between activity and decay constant is summarised as: \"the greater the decay constant, the greater the activity of the sample.\" Why is this true, and what assumption about N does it rely on? (2 steps)", "answer": "- Step 1: From $$A = \\lambda N$$, activity is proportional to λ (with N held constant). So if you compare two samples with the **same number of nuclei**, the one with the larger λ has more decays per second — higher activity.\n- Step 2: The assumption is that N is the same. In practice, two different isotopes with different λ will typically have very different N (long-lived isotopes need many more nuclei to give the same activity). So the statement is true *for a fixed N*, but in real life you often see long-lived isotopes with low activity precisely because they have low λ.", "source": "MiniMax ①", "_id": "minimax_1_86", "judge_pick": false}, {"question": "A nucleus has 11 protons and 12 neutrons. It emits a beta-minus particle. What is the **identity** of the daughter nucleus (i.e. which element is it)? (2 steps)", "answer": "- Step 1: After beta-minus decay, the proton count increases by 1 (a neutron turned into a proton). So the daughter has **12 protons** and **11 neutrons**.\n- Step 2: Z = 12 corresponds to **magnesium (Mg)**. The daughter is **magnesium-23** ($$_{12}^{23}\\text{Mg}$$).", "source": "MiniMax ①", "_id": "minimax_1_87", "judge_pick": false}, {"question": "Why is the activity of a sample **not constant**, even though the decay constant λ is fixed? (2 steps)", "answer": "- Step 1: Activity depends on **both** λ and N: $$A = \\lambda N$$. The decay constant λ is a fixed property of the isotope (it doesn't change), but N — the number of undecayed nuclei — **decreases over time** as nuclei decay.\n- Step 2: So as N shrinks, A shrinks in proportion. Activity is therefore **not constant**; it decays exponentially with the same half-life as N. Only the *probability* per nucleus (λ) stays the same.", "source": "MiniMax ①", "_id": "minimax_1_88", "judge_pick": false}, {"question": "A radioactive sample has activity 5000 Bq. After 4 hours, its activity is 1250 Bq. What is the half-life? (2 steps)", "answer": "- Step 1: Activity dropped by factor of 5000/1250 = 4 = 2². So 2 half-lives have passed.\n- Step 2: 2 half-lives = 4 hours, so **1 half-life = 2 hours**.", "source": "MiniMax ①", "_id": "minimax_1_89", "judge_pick": false}, {"question": "Why is the activity of a sample measured in **Becquerels per second** sometimes written as just **s⁻¹**? What does this tell you about the nature of the unit?", "answer": "Because 1 Bq is *defined* as 1 decay per second, the unit Bq is dimensionally equivalent to s⁻¹ (per second). Writing it as s⁻¹ emphasises that Becquerel is a **rate** — a count per unit time — not a quantity of radiation. It's the same way we say \"frequency is measured in Hz = s⁻¹.\" Both are rates of events per second.", "source": "MiniMax ①", "_id": "minimax_1_90", "judge_pick": false}, {"question": "In the SaveMyExams notes, the activity equation is presented as $$\\frac{\\Delta N}{\\Delta t} = -\\lambda N$$. If we treat this as a differential equation and solve it, we get $$N(t) = N_0 e^{-\\lambda t}$$. Sketch the reasoning that connects these two equations. (3 steps)", "answer": "- Step 1: The equation $$\\frac{\\Delta N}{\\Delta t} = -\\lambda N$$ says the rate of change of N is proportional to N itself. This is a **first-order differential equation**.\n- Step 2: The only function whose rate of change is proportional to itself (with a negative constant) is the **exponential decay**: $$N(t) = N_0 e^{-\\lambda t}$$. You can verify by differentiating: $$\\frac{dN}{dt} = -\\lambda N_0 e^{-\\lambda t} = -\\lambda N$$, which matches.\n- Step 3: At t = 0, $$N = N_0$$. After one half-life, $$N = N_0/2$$, which gives $$e^{-\\lambda t_{1/2}} = 1/2$$, hence $$t_{1/2} = \\ln 2 / \\lambda$$. This is the rigorous derivation of the half-life formula.", "source": "MiniMax ①", "_id": "minimax_1_91", "judge_pick": true}, {"question": "Why does the SaveMyExams document emphasise that \"the activity depends on the number of undecayed nuclei remaining in the sample\"? Give a practical example showing why this matters.", "answer": "Because activity is proportional to N, the activity of a sample **decreases continuously** as the sample decays. This matters in practice: a radioactive tracer injected into a patient is highly active at first (easy to image), but as time passes and N decreases, the activity drops — eventually becoming too weak to detect, and the patient is no longer radioactive.\n\nThis is also why **fresh tracers** must be produced regularly in hospitals: a tracer with half-life 6 hours has half the activity after 6 hours, one-quarter after 12 hours, etc. After a day or two, it's effectively useless.", "source": "MiniMax ①", "_id": "minimax_1_92", "judge_pick": false}, {"question": "A nucleus undergoes alpha decay, then the daughter nucleus undergoes beta decay. Can the daughter of the beta decay be the **same element** as the original parent? Show with an example. (2 steps)", "answer": "- Step 1: Start with parent element X with atomic number Z. After alpha decay, Z drops by 2, so the daughter is element with Z − 2. After beta decay, Z increases by 1, so the granddaughter is element with Z − 1.\n- Step 2: This is **not** the same element as the parent (which had Z), but it's **one Z less**. For example: $$_{92}^{238}\\text{U} \\xrightarrow{\\alpha} _{90}^{234}\\text{Th} \\xrightarrow{\\beta} _{91}^{234}\\text{Pa}$$ — uranium (Z=92) → thorium (Z=90) → protactinium (Z=91). The final element is not uranium.\n\nSo one alpha + one beta ≠ original element; it leaves you with Z − 1 (one fewer proton than you started with).", "source": "MiniMax ①", "_id": "minimax_1_93", "judge_pick": false}, {"question": "Why is the **inverse-square law** important for radiation safety? Give a quantitative example. (2 steps)", "answer": "- Step 1: Doubling your distance from a radioactive source **quarters** the intensity (and thus your dose rate). Tripling it reduces it to 1/9. So even small increases in distance dramatically reduce exposure.\n- Step 2: Example: if a source delivers 100 μSv/hr at 0.5 m, then at 1 m (double distance) it delivers 25 μSv/hr, and at 2 m (4× distance) it delivers 6.25 μSv/hr. This is why the practical's safety advice says \"**keep a good distance (a metre or so)**\" — moving back from a source is one of the simplest and most effective ways to reduce your dose.", "source": "MiniMax ①", "_id": "minimax_1_94", "judge_pick": false}, {"question": "A student says: \"Activity tells you how dangerous a source is.\" Why is this an oversimplification? Give **two** factors that activity alone doesn't capture. (2 steps)", "answer": "- Factor 1: **Type of radiation.** A 1000 Bq alpha source is far more dangerous than a 1000 Bq gamma source, because alpha is much more ionising per decay. Activity counts decays, not damage.\n- Factor 2: **Energy per decay.** A high-energy beta decay deposits more energy in tissue than a low-energy one, even at the same activity. The same number of decays can produce different doses.\n- (Bonus factor 3: **Distance and shielding** — a source 10 cm from you delivers more dose than the same source 1 m away, even with identical activity.)", "source": "MiniMax ①", "_id": "minimax_1_95", "judge_pick": true}, {"question": "Why does the SaveMyExams document specifically warn about **\"count rates that do not drop to zero\"** in half-life graphs? What's the underlying physics? (2 steps)", "answer": "- Step 1: A Geiger-Müller tube measures **all** ionising radiation hitting it — including the ever-present background radiation from cosmic rays, radon, etc. So even when the source has effectively decayed away (or is fully shielded), the tube still records background counts.\n- Step 2: On a graph, this means the curve **asymptotes to the background level**, not to zero. If you don't recognise this, you'll misread the half-life. The fix is to subtract the background count rate (the asymptotic value) from every reading before analysing the curve.", "source": "MiniMax ①", "_id": "minimax_1_96", "judge_pick": false}, {"question": "In the SaveMyExams notes, the activity equation is given with both ΔN and N. What is the difference between these two symbols, and why do they appear in the same equation? (2 steps)", "answer": "- Step 1: **N** is the **total number of undecayed nuclei** still present in the sample — a snapshot of \"how many are left.\"\n- Step 2: **ΔN** is the **change in N over a time interval Δt** — specifically, how many nuclei decayed during that interval. ΔN is negative (N decreases), but we define activity A as positive, so the equation has the minus sign: $$A = -\\Delta N / \\Delta t = \\lambda N$$.\n\nThe two symbols together capture both the *current state* (N) and the *rate of change* (ΔN/Δt) — the same way velocity relates position to its rate of change.", "source": "MiniMax ①", "_id": "minimax_1_97", "judge_pick": false}, {"question": "Why is the SaveMyExams equation $$A = -\\lambda N$$ called an **exponential** relationship, and what does the word \"exponential\" mean here? (2 steps)", "answer": "- Step 1: Solving the differential equation gives $$N(t) = N_0 e^{-\\lambda t}$$, and since $$A = \\lambda N$$, we also have $$A(t) = A_0 e^{-\\lambda t}$$. Both N and A decay **exponentially** with time.\n- Step 2: \"Exponential\" means the rate of change is **proportional to the current value**. As N gets smaller, the rate of decay gets smaller too — but it never quite reaches zero. This produces the characteristic \"steep at first, then flattening\" decay curve, with the half-life being a constant time interval regardless of where you start measuring.", "source": "MiniMax ①", "_id": "minimax_1_98", "judge_pick": true}, {"question": "Looking at the chapter as a whole, what are the **three most important exam definitions** you should be able to recall word-for-word, and why does each matter? (3 steps)", "answer": "- Step 1: **Activity (A):** \"the average number of decays per unit time,\" measured in Becquerels (Bq), where 1 Bq = 1 decay per second. This is the foundation of all quantitative radioactivity problems.\n- Step 2: **Decay constant (λ):** \"the probability per second that a given nucleus will decay.\" This connects the microscopic (per-nucleus behaviour) to the macroscopic (activity of the whole sample) via $$A = \\lambda N$$.\n- Step 3: **Half-life ($$t_{1/2}$$):** \"the average time taken for the activity (or number of undecayed nuclei, or mass) of a sample to halve.\" This is the most commonly tested quantity in problems and is what you read off decay graphs.\n\nEach definition is exam-tagged in the SaveMyExams notes as a common short-answer question — memorising them precisely is worth easy marks.", "source": "MiniMax ①", "_id": "minimax_1_99", "judge_pick": false}], "count": 100}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "What is **background radiation**, and what unit is it measured in? (2 steps)", "answer": "- Step 1: **Definition.** Background radiation is the low-level radiation that is present all around us in the environment, all the time. It comes from both natural sources (rocks, cosmic rays, food) and man-made sources (medical procedures, nuclear fallout, nuclear accidents).\n- Step 2: **Unit.** Radiation is measured in **becquerels (Bq)**, where 1 Bq = 1 count (or 1 decay) per second. When using a Geiger counter, you can also express it as counts per second (or per minute).\n\nTakeaway: background radiation never goes to zero, which is why it must be accounted for in every lab experiment.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Give one example of a **natural** and one example of a **man-made** source of background radiation, and explain why radon gas is particularly dangerous. (3 steps)", "answer": "- Step 1: **Natural example — Radon gas.** Heavy radioactive elements like uranium and thorium exist in rocks. Uranium decays into radon gas, which is an **alpha emitter**. If inhaled, the alpha radiation is released directly inside the lungs, where it can damage living tissue.\n- Step 2: **Man-made example — Medical sources.** X-rays, CT scans, radioactive tracers, and radiation therapy all contribute additional radiation dose to people receiving treatment.\n- Step 3: **Why radon is dangerous.** Alpha radiation has very low penetrating power (stopped by paper/skin), so it's harmless *outside* the body. But *inside* the lungs, the alpha particles ionise surrounding cells directly, which is why radon inhalation is a leading cause of lung cancer in non-smokers.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "What is a **Geiger-Müller (GM) tube**, and how does it detect radiation? (3 steps)", "answer": "- Step 1: **What it is.** A GM tube is a sealed tube filled with low-pressure gas, with an electrode down the middle and the outer casing acting as another electrode. A high voltage is applied between them.\n- Step 2: **How it detects.** When alpha, beta, or gamma radiation enters the tube, it **ionises** the gas inside — knocking electrons off gas atoms. These free electrons are accelerated by the high voltage and cause a cascade of further ionisations, producing a measurable pulse of current.\n- Step 3: **Output.** Each detected decay causes a \"click\" or count, which is registered as a count rate (counts per second or per minute). The count rate is proportional to the activity of the source.\n\nThe key physical principle: radiation must *ionise* something to be detected, which is why all three types can be picked up by a GM tube (though with very different efficiencies).", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": true}, {"question": "A student measures a count rate of 240 counts per minute from a source, but their background reading was 15 counts per minute. What is the **corrected count rate**, and why is this correction necessary? (2 steps)", "answer": "- Step 1: **Calculation.**\n$$\\text{Corrected count rate} = \\text{Measured count rate} - \\text{Background count rate} = 240 - 15 = 225 \\text{ counts/min}$$\n- Step 2: **Why correct it?** Background radiation is always present, even with no source nearby. If you don't subtract it, every measurement you take is **inflated** by the same constant amount, which makes your experiment inaccurate. The correction isolates the count coming purely from your radioactive source.\n\nA common exam trap: if a question gives you a half-life graph whose line *does not* approach zero, the non-zero asymptote is the background count.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A neutral atom has atomic number 11 and mass number 23. How many **protons**, **neutrons**, and **electrons** does it contain? Why is the electron's mass usually said to be \"negligible\"? (2 steps)", "answer": "- Step 1: **Counting the particles.**\n+ Protons = atomic number Z = **11**\n+ Neutrons = mass number A − atomic number Z = 23 − 11 = **12**\n+ Electrons = same as protons in a neutral atom = **11**\n- Step 2: **Why electron mass is negligible.** The mass of one proton ≈ $$1.67 \\times 10^{-27} \\text{ kg}$$, while the mass of one electron ≈ $$9.11 \\times 10^{-31} \\text{ kg}$$ — about **1/1836** of a proton. So nearly all the mass of the atom is concentrated in the nucleus. The electron cloud is essentially \"weightless\" compared to the nucleus.\n\nThis is the reason the **mass number A** is taken to be just (protons + neutrons) — it ignores the electrons entirely.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "What are the **three main types of nuclear radiation**, and what exactly is each one? (3 steps)", "answer": "- Step 1: **Alpha (α).** A particle consisting of **2 protons and 2 neutrons** — identical to the nucleus of a helium-4 atom. Emitted from large, unstable nuclei.\n- Step 2: **Beta (β⁻).** A **high-energy electron** emitted from the *nucleus* (not the electron cloud). Occurs when a neutron inside the nucleus converts into a proton + electron, and the electron is ejected.\n- Step 3: **Gamma (γ).** A **high-energy electromagnetic wave** (photon) emitted from the nucleus. It carries away excess energy but has no mass and no charge.\n\nThere's also a rare fourth type — **neutron emission** — but this isn't on the standard GCSE/A-Level spec and is only mentioned if a question explicitly introduces it.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "Why is a **beta particle** given a mass number of 0 and an atomic number of **−1** in nuclear equations, even though it is just an electron? (3 steps)", "answer": "- Step 1: **Mass number A.** By convention, A counts the number of *nucleons* (protons + neutrons) in the nucleus. An electron is *not* a nucleon — it lives in the electron cloud and is not in the nucleus. So in the nuclear equation, the beta particle contributes **0 to the mass number**.\n- Step 2: **Atomic number Z.** In chemical equations, Z = number of protons. But in nuclear equations, Z is used to track **charge**. The beta particle is an electron, which has charge **−1**, so its Z is written as −1.\n- Step 3: **The physics behind it.** In beta-minus decay, a neutron inside the nucleus turns into a proton (which *stays* in the nucleus) plus an electron (which is ejected as the beta particle). So the nucleus *gains* a proton (Z increases by 1) and the mass number is unchanged (a neutron became a proton, total nucleons stay the same).\n\nSo the \"−1\" is not saying the electron has the opposite of a proton's properties — it's saying the electron's *charge* is opposite.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": true}, {"question": "Compare the **penetrating power** of alpha, beta, and gamma radiation. What stops each one, and why is there such a difference? (3 steps)", "answer": "- Step 1: **The ranking (weakest → strongest penetration).**\n+ **Alpha**: stopped by a sheet of **paper** (or a few cm of air).\n+ **Beta**: stopped by a few **mm of aluminium**.\n+ **Gamma**: requires **thick lead** or thick concrete to reduce significantly; it can never be fully \"stopped,\" only attenuated.\n- Step 2: **Why alpha is weakest.** Alpha is a heavy, +2-charged particle. As it moves through matter, it **strongly attracts** the electrons in nearby atoms, ionising them rapidly and losing energy very quickly. It collides, loses speed, and stops within a few cm.\n- Step 3: **Why gamma is strongest.** Gamma is a photon with **no charge and no mass**. It doesn't interact with matter through electrostatic attraction — it only gets absorbed occasionally by random atomic interactions. So it travels a long way before being attenuated.\n\nPenetrating power and ionising power are **inversely related** — the more strongly a radiation ionises, the faster it loses energy, so the less far it travels.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Compare the **ionising power** of alpha, beta, and gamma radiation. Why is alpha the most ionising, even though it is the least penetrating? (3 steps)", "answer": "- Step 1: **The ranking (most → least ionising).**\n+ **Alpha**: most ionising\n+ **Beta**: moderately ionising\n+ **Gamma**: least ionising (but **not zero** — it still ionises, just weakly)\n- Step 2: **Why alpha is the most ionising.** Two reasons combine: (a) it has a **+2 charge**, so it pulls strongly on electrons in nearby atoms, and (b) it is **slow and heavy**, so it spends more time near each atom it passes, giving it more opportunity to ionise.\n- Step 3: **The inverse relationship.** Because alpha ionises so strongly, it dumps its energy into a small region very quickly — so it stops after a short distance. Gamma barely interacts, so it can travel through metres of material — but the trade-off is that the few interactions it *does* have are widely spread out.\n\nThis is why **alpha is the most dangerous if it gets inside your body** (lungs, stomach): all its ionising power is delivered directly to living cells. Outside the body, your dead skin layer stops it before it reaches anything important.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": true}, {"question": "In a nuclear decay equation, what do the symbols $$^A_ZX$$ represent? Specifically, what are A and Z? (2 steps)", "answer": "- Step 1: **Z (the bottom number) is the atomic number** = number of **protons** in the nucleus. This defines which element the atom is. For example, Z = 92 is always uranium.\n- Step 2: **A (the top number) is the mass (nucleon) number** = total number of **protons + neutrons** in the nucleus. This defines the isotope of the element. So $$^{238}_{92}\\text{U}$$ is uranium with 92 protons and 238 − 92 = 146 neutrons.\n\nA useful mnemonic: **Z**oom — Z is the smallest (protons only). **A**ll — A is everything (protons + neutrons).", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "When a nucleus undergoes **alpha decay**, how do the mass number A and atomic number Z of the daughter nucleus compare to the parent? Write the general equation. (2 steps)", "answer": "- Step 1: **The changes.**\n+ Mass number A: **decreases by 4** (the alpha particle takes away 4 nucleons: 2 protons + 2 neutrons)\n+ Atomic number Z: **decreases by 2** (the alpha particle takes away 2 protons)\n- Step 2: **The general equation.**\n$$^A_ZX \\rightarrow\\ ^{A-4}_{Z-2}Y + \\ ^4_2\\text{He}$$\nwhere X is the parent nucleus and Y is the daughter nucleus (a different element, two places earlier in the periodic table).\n\nExample: $$^{238}_{92}\\text{U} \\rightarrow\\ ^{234}_{90}\\text{Th} + \\ ^4_2\\text{He}$$. Uranium-238 becomes thorium-234 plus an alpha particle.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "When a nucleus undergoes **beta-minus decay**, how do A and Z change? Why is Z *increased* even though an electron is being emitted? (3 steps)", "answer": "- Step 1: **The changes.**\n+ Mass number A: **unchanged** (a neutron becomes a proton — total nucleons conserved)\n+ Atomic number Z: **increases by 1** (one new proton is created in the nucleus)\n- Step 2: **The general equation.**\n$$^A_ZX \\rightarrow\\ ^{A}_{Z+1}Y + \\ ^0_{-1}e$$\nThe electron (the beta particle) is written with mass number 0 and atomic number −1.\n- Step 3: **Why Z increases.** The electron is ejected from the *nucleus*, not the electron cloud. Inside the nucleus, a **neutron transforms into a proton + electron** (plus an antineutrino, which is ignored in A-Level equations). The proton stays behind (so Z goes up by 1) and the electron is shot out as the beta particle.\n\nThis is why the **same element** can have different isotopes with different stabilities — the nucleus is essentially trying to fix an imbalance in its proton-to-neutron ratio.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "When a nucleus undergoes **gamma decay**, how do A and Z change? What *does* change? (2 steps)", "answer": "- Step 1: **A and Z are unchanged.** A gamma ray has **no mass and no charge**, so the nucleus keeps the same number of protons and the same number of neutrons. The element and isotope are the same before and after.\n- Step 2: **What changes is the energy of the nucleus.** After alpha or beta decay, the daughter nucleus is often left in an \"excited\" high-energy state. It releases this excess energy as a gamma-ray photon, dropping to a more stable lower-energy state. So:\n$$^A_ZX^* \\rightarrow\\ ^{A}_{Z}X + \\ ^0_0\\gamma$$\n\nThe asterisk (*) denotes the excited nucleus. Gamma emission often **follows** alpha or beta decay — it's a way for the nucleus to \"settle down\" after the bigger event.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "In the nuclear equation $$^{210}_{84}\\text{Po} \\rightarrow\\ ^{206}_{82}\\text{Pb} + X$$, identify particle X, and explain how you deduced it. (3 steps)", "answer": "- Step 1: **Conservation of mass number A.** On the left: A = 210. On the right (Pb only): A = 206. So X must have A = 210 − 206 = **4**.\n- Step 2: **Conservation of atomic number Z.** On the left: Z = 84. On the right (Pb only): Z = 82. So X must have Z = 84 − 82 = **2**.\n- Step 3: **Identifying X.** A = 4 and Z = 2 means X is **2 protons + 2 neutrons** = a **helium-4 nucleus** = an **alpha particle**, $$^4_2\\text{He}$$.\n\nThe general trick for any nuclear equation: write down \"A total\" and \"Z total\" on each side. If they don't match, you have the wrong particle or unbalanced equation.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "In the nuclear equation $$^{14}_6\\text{C} \\rightarrow\\ ^{14}_7\\text{N} + X$$, identify X, and explain your reasoning. (2 steps)", "answer": "- Step 1: **Mass number A is unchanged** (14 = 14), so X has A = 0.\n- Step 2: **Atomic number Z changes from 6 to 7**, so X has Z = 6 − 7 = **−1**.\n\nSo X has A = 0, Z = −1: that is a **beta-minus particle** (an electron), $$^0_{-1}e$$. The carbon-14 nucleus has decayed into nitrogen-14 by emitting a beta particle.\n\nThis is a real reaction that happens in carbon-14 dating — used by archaeologists to find the age of organic material.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "A radioactive nucleus X first emits an alpha particle, and the resulting daughter then emits a beta particle. If X is $$^{238}_{92}\\text{U}$$, write out both decay steps and identify the **final** nucleus. (3 steps)", "answer": "- Step 1: **Alpha decay of uranium-238.**\n$$^{238}_{92}\\text{U} \\rightarrow\\ ^{234}_{90}\\text{Th} + \\ ^4_2\\text{He}$$\n(A drops by 4, Z drops by 2 → thorium-234)\n- Step 2: **Beta decay of thorium-234.**\n$$^{234}_{90}\\text{Th} \\rightarrow\\ ^{234}_{91}\\text{Pa} + \\ ^0_{-1}e$$\n(A unchanged, Z increases by 1 → protactinium-234)\n- Step 3: **The final nucleus** is **protactinium-234**, $$^{234}_{91}\\text{Pa}$$.\n\nThis kind of **decay chain** is common for heavy radioactive elements — they go through many alpha and beta decays before reaching a stable isotope (in this case, eventually lead-206).", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Explain what it means for radioactive decay to be **spontaneous**. What is the *evidence* for this? (2 steps)", "answer": "- Step 1: **Definition.** A *spontaneous* process is one that **cannot be influenced by external environmental factors**. For radioactive decay, this means the rate of decay does not change if you alter:\n+ Temperature\n+ Pressure\n+ Chemical conditions (e.g., what compound the atom is part of)\n- Step 2: **Evidence.** Experiments have heated radioactive samples to thousands of degrees, pressurised them enormously, and chemically reacted them with other substances — the count rate stays exactly the same. This is strong evidence that decay is governed by processes *inside the nucleus*, not by the atom's chemical or thermal environment.\n\nThe weak and strong nuclear forces operate over femtometre distances inside the nucleus, so conditions outside the nucleus simply cannot reach in to change them.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": true}, {"question": "Explain what it means for radioactive decay to be **random**. Why is it impossible to predict when *one* nucleus will decay, even though we *can* predict the behaviour of a large sample? (3 steps)", "answer": "- Step 1: **Definition of random.** A *random* process is one in which the **exact time of decay of any individual nucleus cannot be predicted**, no matter how much information you have about it.\n- Step 2: **The reason.** Quantum mechanics tells us that the nucleus exists in a probabilistic state — at any instant, each unstable nucleus has a fixed *probability* of decaying in the next second, but there is no hidden \"clock\" inside the nucleus. So even with perfect information, you cannot say *when* a specific nucleus will decay.\n- Step 3: **Why large samples are predictable.** When you have billions of nuclei, the *average* behaviour becomes very reliable. If each nucleus has a 50% chance of decaying in 1 hour, then in a sample of 1 billion nuclei, very close to 500 million will decay in that hour — with only tiny statistical fluctuations. This is why **half-life works**: it's a *statistical* property of the whole sample, not a property of any one atom.\n\nThe \"irregular clicking\" of a Geiger counter around a small source is direct experimental evidence of randomness.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": true}, {"question": "What is the **activity** of a radioactive sample, and in what units is it measured? (2 steps)", "answer": "- Step 1: **Definition.** Activity is the **average number of nuclei that decay per unit time** in a sample. It tells you how \"radioactive\" the sample currently is — a high activity means lots of decays per second.\n- Step 2: **Unit.** Activity is measured in **becquerels (Bq)**, where:\n$$1 \\text{ Bq} = 1 \\text{ decay per second}$$\n\nSo a source with activity 5000 Bq is producing 5000 nuclear decays every second. Note: 1 Bq is actually a very small activity — 1 gram of uranium has an activity of about 25,000 Bq.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "What is the **decay constant** λ? How does a *large* λ differ from a *small* λ in terms of activity? (2 steps)", "answer": "- Step 1: **Definition.** The decay constant λ is the **probability, per second, that any given nucleus will decay**. It is a fixed property of a particular radioactive isotope. Its unit is **s⁻¹** (per second).\n- Step 2: **Interpretation.**\n+ A **large λ** (e.g., 0.1 s⁻¹) means each nucleus has a high chance of decaying every second → the sample is highly active and decays quickly (short half-life).\n+ A **small λ** (e.g., 10⁻¹⁰ s⁻¹) means each nucleus has a tiny chance of decaying every second → the sample is barely active and decays very slowly (long half-life).\n\nSo λ and half-life are inversely related — the bigger the λ, the shorter the half-life.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Write the equation relating **activity A**, **decay constant λ**, and **number of remaining nuclei N**. Explain the meaning of the **minus sign** in this equation. (3 steps)", "answer": "- Step 1: **The equation.**\n$$A = -\\lambda N$$\nor equivalently, $$A = \\frac{\\Delta N}{\\Delta t} = -\\lambda N$$\n- Step 2: **What it tells you.** Activity A is proportional to the number of undecayed nuclei N still in the sample. The more nuclei you have left, the more decays per second you're getting.\n- Step 3: **The minus sign.** As time passes, **N decreases** (nuclei are decaying away). So the *rate of change* of N is negative. The minus sign makes A come out as a *positive* number (because activity is always positive — it's a count of decays). Mathematically: $$\\frac{\\Delta N}{\\Delta t} = -\\lambda N$$ has ΔN/Δt negative (N shrinks), so A = −λN is positive.\n\nSo: positive A = (positive λ) × (positive N), with the minus sign already absorbed into the formula.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Why does the **activity** of a radioactive sample **decrease over time**? Is there a point at which the activity reaches zero? (2 steps)", "answer": "- Step 1: **Why it decreases.** As decays happen, N (the number of undecayed nuclei) gets smaller. From $$A = \\lambda N$$, if N falls, A must also fall — proportionally. So the activity decays away over time.\n- Step 2: **Does it reach zero?** Strictly, **no** — N decreases exponentially, meaning it gets smaller and smaller but never quite hits zero. In practice, after many half-lives, the activity becomes so tiny that the sample is effectively \"gone,\" but mathematically, the last nucleus still has a non-zero probability of decay, so technically the activity is never exactly zero.\n\nThis is exactly why **half-life** is used: after one half-life, activity is ½ of original; after two, ¼; after n half-lives, $$(1/2)^n$$ of the original.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Define **half-life**. Which three different physical quantities can \"half\" during one half-life? (2 steps)", "answer": "- Step 1: **Definition.** The half-life of a radioactive isotope is the **time taken for the activity (or the number of undecayed nuclei, or the mass of the radioactive material) to fall to half its original value**.\n- Step 2: **Three quantities that \"half\".**\n+ The **number of radioactive nuclei** N\n+ The **activity** A (count rate, corrected for background)\n+ The **mass** of the radioactive material still present\n\nAll three fall by the same factor in the same half-life, because they're all proportional to N. So if you halve the count rate, you've also halved the number of parent nuclei and the mass of the parent isotope.\n\nA common misconception: \"half-life is the time for the radiation to completely disappear.\" Wrong — it never fully disappears, it just halves repeatedly.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "A sample has a half-life of 5 days. After 15 days, what fraction of the original activity remains? Walk through your reasoning. (3 steps)", "answer": "- Step 1: **Count the half-lives.** 15 days ÷ 5 days/half-life = **3 half-lives** have passed.\n- Step 2: **Halve three times.** After 1 half-life: ½. After 2: ¼. After 3: ⅛.\n- Step 3: **Final answer.** The fraction remaining is:\n$$\\left(\\frac{1}{2}\\right)^3 = \\frac{1}{8}$$\nSo **1/8 (12.5%) of the original activity** remains.\n\nThe general rule: after $$n$$ half-lives, the fraction remaining is $$\\left(\\frac{1}{2}\\right)^n$$.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A sample starts with activity 80,000 Bq. After 3 half-lives, what is the activity? Then after 6 half-lives, what is it? (2 steps)", "answer": "- Step 1: **After 3 half-lives.** Each half-life halves the activity, so:\n$$80{,}000 \\times \\left(\\frac{1}{2}\\right)^3 = 80{,}000 \\times \\frac{1}{8} = 10{,}000 \\text{ Bq}$$\n- Step 2: **After 6 half-lives.**\n$$80{,}000 \\times \\left(\\frac{1}{2}\\right)^6 = 80{,}000 \\times \\frac{1}{64} = 1{,}250 \\text{ Bq}$$\n\nNotice the pattern: 6 half-lives is just \"two rounds\" of 3 half-lives, so 10,000 → 1,250 (halved, then halved, then halved again).", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "What is the relationship between the **half-life** $$t_{1/2}$$ and the **decay constant** λ? Explain *why* they are inversely related. (2 steps)", "answer": "- Step 1: **The equation.**\n$$t_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.693}{\\lambda}$$\n- Step 2: **Why inverse?** λ is the *probability per second* of any nucleus decaying. If λ is high, each nucleus decays quickly, so the sample halves in a *short* time → short half-life. If λ is low, each nucleus takes a long time on average to decay, so the sample halves *slowly* → long half-life. So a bigger λ *must* mean a smaller $$t_{1/2}$$, which is exactly what the equation says.\n\nA useful check: λ has units of s⁻¹; dividing a dimensionless number (ln 2) by s⁻¹ gives seconds. ✓", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "**Misconception probe:** A student says: *\"Gamma radiation isn't dangerous because it doesn't ionise atoms.\"* Why is this statement wrong, and how would you correct it? (2 steps)", "answer": "- Step 1: **The error.** Gamma radiation *is* ionising — it just does so **weakly**. The statement that gamma \"doesn't ionise\" is a common misconception. Gamma photons can knock electrons out of atoms, but they do so much less often than alpha or beta.\n- Step 2: **The correction.** Gamma is the **least ionising** of the three, but it is **still ionising**. The real danger of gamma is its high penetrating power: it gets deep into the body and deposits ionising radiation into many internal tissues. You would need a larger *dose* of gamma to cause the same localised damage as a single alpha particle — but it reaches places alpha cannot.\n\nSo the correct ordering is: alpha is the most dangerous *if ingested*, but gamma is the most dangerous *for external exposure* because it reaches the whole body.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": true}, {"question": "**Misconception probe:** A student says: *\"In beta decay, the beta particle comes from the electron cloud around the nucleus.\"* Why is this wrong? (2 steps)", "answer": "- Step 1: **Where the electron really comes from.** The beta particle (electron) is created *inside the nucleus* when a neutron transforms into a proton plus an electron. The electron is then immediately ejected from the nucleus at high speed. It never existed in the electron shells — the electron cloud is a *separate* thing governed by the electromagnetic force.\n- Step 2: **Why this matters.** The atomic number Z *changes* in beta decay, which would be impossible if the electron came from the shells (the shells don't change the nucleus). The transformation of a neutron into a proton is what raises Z by 1, and the electron is the by-product of that nuclear process.\n\nSo: beta particles emerge *from* the nucleus, but the *cause* of beta decay is instability in the neutron-to-proton ratio, not anything happening in the electron shells.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": true}, {"question": "**Misconception probe:** A student says: *\"Heating a radioactive sample will make it decay faster.\"* Why is this incorrect, and what's the correct way to think about it? (2 steps)", "answer": "- Step 1: **Why it's wrong.** Radioactive decay is *spontaneous* — by definition, it is **not affected by temperature, pressure, or chemical environment**. The decay rate is governed by processes inside the nucleus (the weak nuclear force), which operate on energy scales and distances totally inaccessible to outside conditions.\n- Step 2: **The correct mental model.** The only things that affect how fast a sample decays are (a) the **decay constant λ** of that particular isotope (a fixed nuclear property), and (b) the **number of nuclei N** still present. Heating the sample doesn't change λ, so the decay rate is unchanged.\n\nThis is different from *chemical* reactions, which DO depend on temperature (higher T → faster reaction). The nuclear force is on a completely different energy scale from chemical bond energies.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": true}, {"question": "**Misconception probe:** A student says: *\"The half-life of carbon-14 is 5,700 years, so after 5,700 years, all the carbon-14 in a sample will be gone.\"* What's wrong with this? (2 steps)", "answer": "- Step 1: **What half-life actually means.** After one half-life, **half** of the original carbon-14 has decayed — not *all* of it. After *two* half-lives (11,400 years), **¼** of the original is left. After *three* (17,100 years), **⅛** is left. And so on.\n- Step 2: **The correct picture.** The amount of carbon-14 approaches zero **asymptotically** — it gets halved, then halved again, then again, getting closer and closer to zero but never quite reaching it. In practice, after about 10 half-lives (~57,000 years), only ~0.1% of the original remains, which is undetectable — so we say the sample is \"effectively\" gone. But mathematically, the activity is never exactly zero.\n\nThis is why carbon-14 dating is reliable for samples up to about 50,000–60,000 years old, but not for older samples — the remaining carbon-14 is too small to measure accurately.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": true}, {"question": "What is the difference between **fission** and **fusion**? (2 steps)", "answer": "- Step 1: **Fission.** A large, heavy nucleus **splits into two smaller nuclei**, releasing energy and (usually) a few neutrons. Requires relatively little energy to *initiate* once a stray neutron triggers the split.\n- Step 2: **Fusion.** Two light nuclei **combine to form a heavier nucleus**, releasing energy. Requires an enormous amount of energy to *initiate* because the two positively charged nuclei strongly repel each other (Coulomb repulsion) and must be forced very close together for the strong nuclear force to take over and bind them.\n\nFission = splitting, fusion = joining. Both release energy, but the *initiation* difficulty is very different: fission is easy to start, fusion is hard to start. (This is why fusion reactors are still experimental, while fission reactors are well-established.)", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "Explain how a **nuclear chain reaction** works in a fission reactor. What particle \"carries\" the chain reaction forward? (3 steps)", "answer": "- Step 1: **The trigger.** A slow-moving **neutron** is fired into a large, unstable nucleus (e.g., uranium-235). The neutron is absorbed, making the nucleus even more unstable.\n- Step 2: **The split.** The unstable nucleus **splits into two smaller daughter nuclei** (fission fragments), releasing a huge amount of energy. It also ejects **2 or 3 new neutrons** as by-products.\n- Step 3: **The chain.** Each of these new neutrons can hit another uranium-235 nucleus, causing *it* to split and release *more* neutrons, and so on. This self-sustaining cascade is the **chain reaction**.\n\nTo control the rate, control rods (made of materials that absorb neutrons) are inserted to soak up excess neutrons. If the chain runs away uncontrolled → nuclear bomb. If moderated → nuclear reactor.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "Why does **fusion** require much higher temperatures and pressures than fission? (2 steps)", "answer": "- Step 1: **The Coulomb barrier.** Both nuclei being fused are positively charged (because they're full of protons). Like charges repel, and this **electrostatic repulsion** is enormous when nuclei are forced close together — the repulsive force at short range is massive.\n- Step 2: **Overcoming the barrier.** To fuse, the nuclei must be pushed close enough for the **strong nuclear force** (which only acts at very short range, ~1 fm) to take over and bind them. This requires the nuclei to be moving at extremely high speeds, which means extremely high temperatures (millions of degrees) and pressures. The kinetic energy has to be high enough to overcome the Coulomb repulsion.\n\nInside the Sun, gravity provides the immense pressure needed. On Earth, we use magnetic confinement or laser implosion to achieve fusion conditions — both are very difficult engineering problems.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "In **Core Practical 15** (investigating gamma absorption by lead), identify the **independent**, **dependent**, and **control variables**. (2 steps)", "answer": "- Step 1: **Independent variable** = the **thickness of lead** absorber placed between the source and the GM tube. This is what the experimenter deliberately changes.\n- Step 2: **Dependent variable** = the **corrected count rate** (counts per minute, with background subtracted) measured by the GM tube. This is what's measured in response.\n\n**Control variables** (kept the same to ensure a fair test):\n+ The same radioactive source throughout\n+ The fixed distance (10 cm) between source and GM tube\n+ The location of the experiment (so background radiation is constant)\n\nIf you change more than one variable at a time, you can't tell which one caused any change in count rate.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "In the gamma absorption practical, why is it important to (a) measure background radiation first, and (b) repeat the count for each thickness three times? (2 steps)", "answer": "- Step 1: **Why background first.** Background radiation is *always* present and varies from place to place. If you don't measure it and subtract it, every count rate is inflated by the same background amount, making your data inaccurate. You take a 5-minute background reading and convert to counts/min.\n- Step 2: **Why three repeats.** Because radioactive decay is **random**, the count rate fluctuates naturally between one reading and the next. A single reading could be misleadingly high or low by chance. Taking three repeats and averaging them **reduces the random error** and gives a more reliable mean. The closer the three repeats are to each other, the more reproducible (and trustworthy) your data is.\n\nSystematic errors in this experiment come from things like changes in background level during the experiment (run all in the same place) or the source being moved accidentally.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "When handling radioactive sources in a lab, list **three safety precautions** and explain the physics reasoning behind each. (3 steps)", "answer": "- Step 1: **Keep the source in a lead-lined container when not in use.** Lead is a dense material with many electrons per unit volume, so it absorbs gamma rays effectively. This prevents the source from irradiating you while you set up the experiment.\n- Step 2: **Use tweezers (or tongs), not your fingers, and keep the source pointing away from you.** This maximises the distance between the source and your body, and ensures the radiation is emitted away from you. (Inverse square law: doubling the distance quarters the intensity.)\n- Step 3: **Wash hands and remove outer clothing after handling.** Radioactive dust or contamination on skin or clothing can deliver a prolonged dose or be ingested accidentally. Washing removes any contamination before it can cause harm.\n\nThe general principle: **minimise time, maximise distance, use shielding** — these three rules dramatically reduce your radiation dose.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "Why is **alpha radiation** harmless when a source is *outside* your body, but extremely dangerous if the source is *inside* your body? (2 steps)", "answer": "- Step 1: **Outside the body.** Alpha particles have a range of only a few cm in air and are stopped by a sheet of paper — or the **dead outer layer of your skin** (the stratum corneum). So an external alpha source cannot reach living cells, and the radiation is absorbed before it does any biological damage.\n- Step 2: **Inside the body.** If an alpha-emitting substance is *inhaled* (like radon gas) or *eaten* (contaminated food), the alpha particles are released **directly next to living cells**, with no skin in the way. All the alpha's ionising power is dumped into a small region of soft tissue, where it can cause significant DNA damage and increase cancer risk.\n\nThis is also why **smoking + radon exposure** is so dangerous: the alpha-emitting radon daughters lodge in the lung tissue and irradiate it directly.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": true}, {"question": "**Edge case:** What would happen to a half-life graph if the **background count** were *not* subtracted? How would the shape of the graph change? (2 steps)", "answer": "- Step 1: **What you'd see.** The line would not drop towards zero on the y-axis. Instead, it would approach a horizontal asymptote at the **background count rate** (e.g., 15 counts/min). The data points would sit 15 above the \"true\" decay curve at every time.\n- Step 2: **Why this is a problem.** It would look like the sample never fully decays — which is actually true physically, but the graph would mislead you about the source itself. The half-life would still be measurable (just take the time to drop to half of \"asymptote + initial excess\"), but the shape would be misleading for understanding the source's intrinsic behaviour.\n\nThis is exactly the visual cue examiners use to test whether students know to correct for background: if a decay curve \"levels off\" above zero, the level is the background.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "**Edge case:** A student has a sample with a half-life of 6 hours. If they measure the count rate **once per hour** for 8 hours, will they capture a full half-life drop? Why or why not? (1 step)", "answer": "- Yes — after 6 hours, the count rate should be **half** the initial value, and after 8 hours it should be a bit below half. So in 8 hours of data, the student captures slightly *more* than one half-life drop. But to find the half-life accurately, they'd read off the time at which the count = ½ × initial, which lies between their 6-hour and 7-hour readings (interpolating).\n\nThe point: always collect data over a time range **longer than the expected half-life** to ensure the curve has time to clearly halve — otherwise you'd be guessing.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "**Synthesis question:** A doctor wants to use a radioactive tracer to image a patient's thyroid. The tracer emits **gamma radiation** and has a half-life of about **6 hours**. Explain *why* gamma is chosen (not alpha or beta) and *why* a short half-life is desirable. (3 steps)", "answer": "- Step 1: **Why gamma, not alpha.** Alpha cannot escape the body to reach the detector — it's stopped within the body. Beta is partially stopped, but gamma penetrates out of the body and reaches the imaging camera clearly. So gamma is the only practical choice for *external* detection.\n- Step 2: **Why not just use more penetrating radiation at any half-life.** The patient must not be exposed to radiation for longer than necessary. A **short half-life** (6 hours) means the activity halves every 6 hours — so within a day, the activity is about 1/16 of the original. The patient is exposed briefly, and the radiation effectively disappears.\n- Step 3: **The trade-off.** The half-life must also be *long enough* for the imaging procedure to be completed. 6 hours is a good balance: long enough to perform the scan, short enough to clear the body quickly. If the half-life were too short (e.g., seconds), the radiation would decay before the scan. If too long (e.g., years), the patient would carry radioactive material for an unacceptably long time.\n\nThis is a beautiful example of physics + biology + safety all coming together in one design decision.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "**Synthesis question:** A smoke detector contains a tiny amount of **americium-241**, which is an **alpha emitter**. The alpha radiation ionises air inside a chamber, creating a small current. Smoke particles absorb the alpha radiation, the current drops, and the alarm triggers. (a) Why is an alpha emitter chosen, and (b) why is this safe for a household, even though alpha is \"the most dangerous\" inside the body? (2 steps)", "answer": "- Step 1: **Why alpha for smoke detection.** Alpha radiation is **strongly ionising** — it creates lots of ions in the air, giving a strong, easily measured current. It's also **stopped by paper or a few cm of air**, so it stays inside the detector chamber and doesn't escape into the house. The combination of strong ionisation and zero escape is perfect.\n- Step 2: **Why it's safe in a household.** The americium is sealed inside a solid plastic/metal chamber, so the alpha particles cannot reach the occupants. Even if the device is dropped and broken, americium-241 has a long half-life (~430 years) and the amount is tiny (micrograms). The risk of inhaling it is negligible for normal use. The \"alpha is dangerous inside the body\" rule applies to *internal* contamination — sealed inside a device, the alpha cannot get into your body, so the danger doesn't materialise.\n\nThis illustrates an important principle: **the danger of a radiation source depends on (a) the type of radiation, (b) whether the source is inside or outside the body, and (c) whether the source is sealed.**", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": true}, {"question": "**Synthesis question:** Compare and contrast the **nuclear equations** for alpha, beta, and gamma decay. For each, state the changes in A and Z, and explain the *physical reason* for those changes. (3 steps)", "answer": "- Step 1: **Alpha decay.**\n+ A decreases by 4, Z decreases by 2.\n+ Reason: the nucleus physically ejects a helium-4 nucleus (2 protons + 2 neutrons). The ejected particle *takes* those 4 nucleons and 2 protons with it.\n+ Equation: $$^A_ZX \\rightarrow\\ ^{A-4}_{Z-2}Y + \\ ^4_2\\text{He}$$\n- Step 2: **Beta-minus decay.**\n+ A unchanged, Z increases by 1.\n+ Reason: a neutron *inside the nucleus* converts into a proton (stays in the nucleus) + an electron (ejected as the beta particle). Total nucleons conserved, but one more proton remains in the nucleus.\n+ Equation: $$^A_ZX \\rightarrow\\ ^{A}_{Z+1}Y + \\ ^0_{-1}e$$\n- Step 3: **Gamma decay.**\n+ A unchanged, Z unchanged.\n+ Reason: gamma is a pure-energy photon — no mass, no charge. It's emitted to release *excess nuclear energy* (from a previously excited nucleus), not to change the nuclear composition.\n+ Equation: $$^A_ZX^* \\rightarrow\\ ^{A}_{Z}X + \\ ^0_0\\gamma$$\n\nThe key insight: A and Z are bookkeeping numbers — they reflect what's physically happening to the protons and neutrons, not abstract labels.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "Why does **gamma emission** often happen *after* alpha or beta decay, rather than on its own? (2 steps)", "answer": "- Step 1: **What happens during alpha/beta decay.** When a nucleus emits an alpha or beta particle, the daughter nucleus is often left in an **excited, high-energy state** — the energy levels of its remaining nucleons are jumbled up.\n- Step 2: **Why gamma follows.** The excited nucleus drops down to a more stable, lower-energy state by emitting a **gamma-ray photon**, which carries away the excess energy. So gamma is essentially the nucleus \"settling down\" after the bigger event. It's a way of shedding energy *without* changing the proton or neutron count.\n\nThis is why a decay chain can produce a burst of *both* alpha/beta and gamma at the same time — the alpha/beta comes out first, then a gamma photon follows milliseconds later from the same nucleus.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": true}, {"question": "A GM tube records an average of **80 counts per minute** from a source, and the background is **20 counts per minute**. If the source has a half-life of **10 minutes**, what is the corrected count rate after **30 minutes**? (3 steps)", "answer": "- Step 1: **Correct the count rate first.**\n$$\\text{Corrected initial rate} = 80 - 20 = 60 \\text{ counts/min}$$\n- Step 2: **Count the half-lives.** 30 minutes ÷ 10 minutes = **3 half-lives** have passed.\n- Step 3: **Apply the halving.**\n$$60 \\times \\left(\\frac{1}{2}\\right)^3 = 60 \\times \\frac{1}{8} = 7.5 \\text{ counts/min}$$\n\nThis is the corrected count rate from the source after 30 minutes. (The 20 counts/min of background is still there, but it's *not from the source* — it's just always there.)", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "**Synthesis question:** Why does a sample of plutonium-239 (half-life ~24,000 years) stay warm and continue to emit radiation for *thousands of years*, while a sample of polonium-214 (half-life ~164 microseconds) decays almost instantly? Connect this to the **decay constant λ**. (2 steps)", "answer": "- Step 1: **The decay constant link.** From $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$, a long half-life means a *small* λ, and a short half-life means a *large* λ.\n+ Plutonium-239: very long half-life → very small λ (each Pu nucleus has a tiny probability of decaying per second) → decay is slow but persistent.\n+ Polonium-214: extremely short half-life → very large λ (each Po nucleus has a near-certainty of decaying almost immediately) → decay is explosive.\n- Step 2: **Why plutonium stays warm.** \"Warmth\" comes from the kinetic energy of emitted particles and the gamma/alpha radiation being absorbed by the surroundings. Plutonium's small λ means its activity is *low* (a few Bq per gram), but it never stops — so over thousands of years, the steady trickle of decay energy keeps the sample slightly warmer than its surroundings. Polonium emits the same *total* energy but does it in microseconds — so it gives a sharp burst of heat, not a sustained warming.\n\nThe connection: total energy released per nucleus is similar, but the *rate* of release (governed by λ) determines whether you see a flash or a slow glow.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": true}], "count": 45}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "In an atom, where is nearly all the mass concentrated, and why is the electron's contribution treated as negligible?", "answer": "- Step 1: An atom has a central nucleus made of protons and neutrons, with electrons occupying energy levels (shells) around it.\n- Step 2: Protons and neutrons have approximately the same mass, and both are roughly 1800 times heavier than an electron.\n- Step 3: Since electrons weigh so little compared to nucleons, the total atomic mass is essentially the mass of the nucleus — the electrons contribute almost nothing.\n\nTakeaway: mass lives in the nucleus; electrons carry charge and occupy space but add negligible mass.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "State the charge of a proton, neutron, and electron in units of the elementary charge $$e$$.", "answer": "- Step 1: A proton carries charge $$+1e$$ — it is the positive particle in the nucleus.\n- Step 2: An electron carries charge $$-1e$$ — equal in magnitude but opposite in sign to the proton.\n- Step 3: A neutron carries charge $$0$$ — it is electrically neutral, hence the name \"neutron.\"\n\nThis charge balance (equal protons and electrons) is why a neutral atom has no net charge.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "What is nuclear radiation, conceptually, and why do some nuclei emit it?", "answer": "- Step 1: Nuclear radiation is the process of a nucleus \"spitting out\" particles or energy from the nucleus itself (not from the electron cloud).\n- Step 2: This happens because some nuclei are unstable — the balance between the number of protons and neutrons is wrong for stability.\n- Step 3: To become more stable, the nucleus emits particles and/or electromagnetic radiation, ending up as a more stable configuration.\n\nTakeaway: radiation is a nucleus's route to a lower-energy, more stable state.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "Name the three main types of nuclear radiation and what each one physically emits.", "answer": "- Step 1: Alpha ($$\\alpha$$) — the nucleus emits a cluster of 2 protons and 2 neutrons (identical to a helium nucleus).\n- Step 2: Beta ($$\\beta^-$$) — the nucleus emits a high-energy electron.\n- Step 3: Gamma ($$\\gamma$$) — the nucleus emits high-energy electromagnetic radiation (no mass, no charge).\n\nThese are the three you're tested on; each represents a different way of shedding instability.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "A tutor mentions a \"fourth\" type of emission that isn't usually examined. What is it and why is it treated separately?", "answer": "- Step 1: The fourth type is neutron emission — a nucleus can eject a neutron.\n- Step 2: It's rare and typically happens alongside other emissions (a bit like gamma tagging along).\n- Step 3: It's not in the GCSE spec and you won't be asked about it unless a question explicitly tells you it's happening — so recognise it but don't be surprised by it.\n\nTakeaway: neutron emission exists but is a \"flagged in the question\" special case, not a core one.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "Define half-life, and name three different quantities that halve over one half-life.", "answer": "- Step 1: Half-life is the time taken for a radioactive quantity to drop to half its value.\n- Step 2: That \"quantity\" can be interpreted in three equivalent ways:\n+ The number of radioactive (undecayed) nuclei\n+ The mass of the radioactive material\n+ The activity (how much radiation is being given out per second)\n- Step 3: All three halve over the same half-life because they are all proportional to the amount of undecayed material present.\n\nTakeaway: whichever quantity you track, the halving rule and the half-life value are identical.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "A student asks whether the half-life for activity is the same as the half-life for mass. Why is the answer yes?", "answer": "- Step 1: Activity is proportional to the number of undecayed nuclei ($$A = \\lambda N$$), and mass is also proportional to the number of nuclei.\n- Step 2: Since all three quantities (nuclei, mass, activity) are directly proportional to each other, they all decay in lockstep.\n- Step 3: Halving the number of nuclei automatically halves the mass and halves the activity in the same time interval.\n\nTakeaway: same underlying quantity, so same half-life — the \"divide by 2\" rule applies to all.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "When a nucleus undergoes decay and emits something, why must the original atom \"change to compensate\"? What two numbers must always balance?", "answer": "- Step 1: A nucleus is described by two numbers: the mass number $$A$$ (total protons + neutrons) and the atomic number $$Z$$ (number of protons).\n- Step 2: When it emits a particle, that particle carries away some mass and some charge, so the leftover nucleus must have different $$A$$ and $$Z$$.\n- Step 3: Like a chemical equation, a nuclear equation balances: the sum of $$A$$ values on the left equals the sum on the right, and the same for $$Z$$ values.\n\nTakeaway: conservation of nucleons and conservation of charge force the parent nucleus to change into a different daughter.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "In alpha decay, how do the mass number $$A$$ and atomic number $$Z$$ of the nucleus change, and why?", "answer": "- Step 1: An alpha
