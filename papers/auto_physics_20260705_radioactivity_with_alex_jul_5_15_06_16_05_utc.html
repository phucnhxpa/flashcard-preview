ith no guaranteed outcome.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": true}, {"question": "In the SCREAMS acronym for core practicals, what does each letter stand for, and how does it apply specifically to the gamma absorption experiment? (3 steps)", "answer": "- Step 1: SCREAMS breakdown:\n+ **S** (Same) — Control variables: same source, same distance, same location\n+ **C** (Change) — Independent variable: thickness of lead absorber\n+ **R** (Reliability) — Take 3 readings per thickness and average; use a long-half-life source for consistency\n+ **E** (Equipment) — GM tube + counter, Vernier calipers for thickness, lead sheets, radioactive source\n+ **A** (Analysis) — Plot corrected count rate vs. thickness; identify exponential absorption pattern\n- Step 2: Remaining letters:\n+ **M** (Measure) — Dependent variable: count rate (in counts per minute)\n+ **S** (Safety) — Lead-lined storage, tweezers/tongs, distance, wash hands, remove outer clothing\n- Step 3: Applying SCREAMS ensures you've considered every aspect of experimental design: what you vary, what you control, how you ensure data quality, what equipment and analysis you need, and how you stay safe.\n\nTakeaway: SCREAMS is a checklist that forces you to address all dimensions of an experiment — missing any letter means missing a critical design element.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "A student measures background radiation as 15 counts/min over 5 minutes. They then measure a source at 10 cm distance and get 90 counts/min in one minute. Why is it important that the background measurement was taken over a *longer* period (5 min) while the source measurement was only 1 min? (2 steps)", "answer": "- Step 1: Background radiation has low count rates and significant random fluctuations. A longer measurement period (5 minutes) averages out these fluctuations, giving a more reliable estimate of the true background rate. The 5-minute total divided by 5 gives a stable per-minute average.\n- Step 2: The source measurement has a much higher count rate, so random fluctuations are proportionally smaller (the signal-to-noise ratio is better). A 1-minute reading is acceptable here because the source's counts dominate. However, repeating the source measurement 3 times and averaging would still improve reliability.\n\nTakeaway: Low count rates need longer measurement windows to average out randomness; high count rates are more stable per unit time.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "A radioactive source has a half-life of 3 days. After 9 days, the corrected count rate is 20 Bq. What was the initial corrected count rate? Work backwards through the half-lives. (2 steps)", "answer": "- Step 1: 9 days = 3 half-lives (since $$9/3 = 3$$). The count rate has been halved 3 times to reach 20 Bq.\n- Step 2: Work backwards — double three times: After 2 half-lives (6 days): $$20 \\times 2 = 40$$ Bq. After 1 half-life (3 days): $$40 \\times 2 = 80$$ Bq. At time zero: $$80 \\times 2 = 160$$ Bq. Alternatively: $$A_0 = A \\times 2^n = 20 \\times 2^3 = 20 \\times 8 = 160 \\text{ Bq}$$\n\nTakeaway: You can reverse the halving process — multiply by $$2^n$$ to find the initial value from a later measurement.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "Why does a fission chain reaction require a **critical mass** of fissile material? What happens if the mass is below this threshold? (2 steps)", "answer": "- Step 1: Each fission event releases 2-3 neutrons. For a chain reaction to sustain itself, at least one of these neutrons must successfully reach and trigger another fission. In a small sample, many neutrons escape the material's surface before hitting another nucleus — too many leak out, and the reaction fizzles.\n- Step 2: **Critical mass** is the minimum amount of fissile material where the rate of neutron production (from fissions) equals or exceeds the rate of neutron loss (from escape + non-fission absorption). Below critical mass, neutron losses dominate, and each generation produces fewer fissions than the last — the reaction dies out. Above critical mass, each generation produces more fissions → exponential growth → sustained chain reaction.\n\nTakeaway: Critical mass is the threshold where neutron gains outpace neutron losses — below it, the reaction suffocates; above it, it snowballs.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": true}, {"question": "In nuclear equations, both mass number and atomic number must balance on both sides. A student writes: $$^{230}_{90}\\text{X} \\rightarrow ^{226}_{88}\\text{Y} + ^{0}_{-1}\\beta^{-}$$. Identify the error and correct it. (2 steps)", "answer": "- Step 1: Check mass number balance: Left = 230, Right = $$226 + 0 = 226$$. 230 ≠ 226 — mass numbers don't balance. This is the error.\n- Step 2: If this were alpha decay, mass would drop by 4 and charge by 2: $$^{230}_{90}\\text{X} \\rightarrow ^{226}_{88}\\text{Y} + ^{4}_{2}\\alpha$$ — now both sides have mass = 230 and charge = 90. If it were beta decay, mass would stay the same: $$^{230}_{90}\\text{X} \\rightarrow ^{230}_{91}\\text{Y} + ^{0}_{-1}\\beta^{-}$$ — mass = 230 on both sides, charge = 90 on both sides. The student mixed up the two decay types.\n\nTakeaway: Always verify both A and Z balance — mixing alpha and beta rules produces equations that fail on one or both conservation laws.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "What is the **atomic mass unit** (u), and why is it useful in nuclear physics instead of using kilograms? Give its approximate value in kg and in MeV/c². (2 steps)", "answer": "- Step 1: The atomic mass unit (u) is defined as **1/12 of the mass of a carbon-12 atom**. It provides a convenient scale where nucleon masses are approximately 1u (proton ≈ 1.0073u, neutron ≈ 1.0087u) rather than tiny numbers in kilograms.\n- Step 2: In kilograms: $$1\\text{u} \\approx 1.66 \\times 10^{-27} \\text{ kg}$$. In energy units (using $$E = mc^2$$): $$1\\text{u} \\approx 931.5 \\text{ MeV/c}^2$$, meaning the mass-energy of 1u is about 931.5 MeV. This MeV/c² unit is especially useful because nuclear energy releases are typically in the MeV range.\n\nTakeaway: u avoids unwieldy kg values and connects directly to MeV energy scales — the natural currency of nuclear physics.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}], "count": 50}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "An atom's nucleus contains protons and neutrons. If a nucleus has mass number $$A = 7$$ and atomic number $$Z = 3$$, how many neutrons does it have, and why isn't the electron count included in $$A$$? (2 steps)", "answer": "- Step 1: The number of neutrons $$N_n = A - Z = 7 - 3 = 4$$. The mass number $$A$$ counts *nucleons* (protons + neutrons) only, because electrons have negligible mass compared to nucleons — roughly $$\\frac{1}{1836}$$ of a proton's mass.\n- Step 2: Electrons orbit in energy levels outside the nucleus and contribute almost nothing to the atom's total mass, so they are excluded from $$A$$. The atomic number $$Z$$ tells you the proton count (and, for a neutral atom, also the electron count), but mass is dominated by the nucleus.\n\nThe nucleus holds ≈99.97% of the atom's mass; electrons are structurally important but gravitationally negligible.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "What are the charge and relative mass values for a proton, a neutron, and an electron? Why does the neutron have zero charge despite being made of charged quarks? (2 steps)", "answer": "- Step 1: Relative charges and masses:\n+ Proton: charge $$+1e$$, relative mass $$1$$\n+ Neutron: charge $$0$$, relative mass $$1$$\n+ Electron: charge $$-1e$$, relative mass $$\\approx \\frac{1}{1836}$$ (negligible)\n- Step 2: A neutron is composed of three quarks: one up ($$+\\frac{2}{3}e$$) and two down ($$-\\frac{1}{3}e$$ each). The net charge is $$+\\frac{2}{3} - \\frac{1}{3} - \\frac{1}{3} = 0$$. So internally it has charged constituents, but the *net* observable charge at nuclear scales is zero.\n\nProtons and neutrons have nearly identical mass; the tiny mass difference (~0.1%) comes from quark composition and binding energy differences.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "Background radiation is always present. Name the largest single natural source of background radiation in the UK, and explain why it is particularly dangerous compared to cosmic rays. (2 steps)", "answer": "- Step 1: The largest natural source is **radon gas** emitted from rocks and soil. Uranium in the ground decays into radon, which is an alpha emitter.\n- Step 2: Radon is especially dangerous because it is a *gas* — it can be inhaled into the lungs. Alpha radiation is highly ionising but normally stopped by skin; inside the lungs, there is no protective dead-skin layer, so alpha particles can directly damage living lung tissue. Cosmic rays, by contrast, have already been partially attenuated by the atmosphere and contribute a lower dose at ground level.\n\nRadon accounts for roughly 50% of the average person's background dose; cosmic rays contribute roughly 10%.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "A Geiger-Müller tube measures 15 counts per minute when placed far from any source. When brought near a source, it reads 115 counts per minute. What is the corrected count rate, and why must this correction be made? (2 steps)", "answer": "- Step 1: The corrected count rate is $$115 - 15 = 100$$ counts per minute. Background radiation is always detected by the GM tube regardless of the source, so you must subtract it to find the counts due *only* to your source.\n- Step 2: Without correction, any measurement of the source's activity is inflated. This matters especially for half-life experiments: if uncorrected, the count rate would approach 15 (not zero) as time passes, producing a curve that asymptotes to a non-zero value — leading to incorrect half-life calculations.\n\nAlways measure background first (with no source present), then subtract it from all subsequent readings.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "An alpha particle has the same composition as a specific common nucleus. Which one, and what does this tell you about the alpha particle's charge and mass number? (2 steps)", "answer": "- Step 1: An alpha particle is identical to a **helium-4 nucleus**: 2 protons and 2 neutrons. Its notation is $$_{2}^{4}\\alpha$$, giving it mass number $$A = 4$$ and atomic number $$Z = 2$$.\n- Step 2: This means the alpha particle carries a charge of $$+2e$$ (double the proton charge) and has a relatively large mass (4 u). These two facts — high charge and high mass — are what make alpha particles strongly ionising but easily stopped: they interact strongly with electrons in matter but lose energy quickly due to their size.\n\nAn alpha particle is NOT a helium *atom* (which would include 2 electrons); it is the bare nucleus.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "Alpha radiation is described as \"strongly ionising\" but \"weakly penetrating.\" Explain the physical reason why high ionising ability and low penetrating ability go hand-in-hand. (2 steps)", "answer": "- Step 1: Ionisation occurs when a particle transfers energy to electrons in nearby atoms, knocking them free. Alpha particles have a large charge ($$+2e$$) and large mass, so they exert strong Coulomb forces on atomic electrons and transfer significant energy per interaction.\n- Step 2: Because the alpha particle loses a large amount of energy in *each* interaction, it rapidly runs out of kinetic energy after only a short distance through matter. This makes its range very short (a few cm in air, stopped by paper/skin). High ionisation per unit distance = rapid energy loss = low penetration.\n\nThe two properties are causally linked: the same mechanism (strong electromagnetic interaction with electrons) produces both effects simultaneously.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "A beta-minus (β⁻) particle is described as a \"high-energy electron emitted from the nucleus.\" But the nucleus contains only protons and neutrons — no electrons. Where does this electron come from? (3 steps)", "answer": "- Step 1: The electron does *not* pre-exist in the nucleus. It is *created* at the moment of decay when a neutron converts into a proton: $$n \\rightarrow p + e^{-} + \\bar{\\nu}_e$$.\n- Step 2: A neutron is made of one up quark and two down quarks (udd). One down quark transforms into an up quark (emitting a $$W^{-}$$ boson, which decays into an electron and antineutrino). The neutron (udd) becomes a proton (uud).\n- Step 3: This is why beta decay increases the atomic number by 1 (a new proton is created) while the mass number stays the same (a neutron is replaced by a proton — same nucleon count). The emitted electron is the beta particle.\n\nThe antineutrino ($$\\bar{\\nu}_e$$) carries away some energy and momentum, ensuring conservation laws are satisfied.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "Beta particles are \"moderately ionising\" and \"moderately penetrating.\" Why are they intermediate between alpha and gamma in both properties? (2 steps)", "answer": "- Step 1: Beta particles carry a single unit of charge ($$-1e$$, compared to alpha's $$+2e$$) and have a small mass (~1/1836 of a proton). They therefore exert weaker Coulomb forces per interaction than alpha, ionising less per unit distance — hence \"moderately ionising.\"\n- Step 2: Because each ionisation event removes less energy from the beta particle, it can travel much farther (20 cm – 3 m in air, stopped by a few mm of aluminium) before being stopped — hence \"moderately penetrating.\" Gamma rays, having no charge or mass, interact even less per unit distance and penetrate further.\n\nThe ionising–penetrating trade-off is a spectrum: alpha (most ionising, least penetrating) → beta (moderate both) → gamma (least ionising, most penetrating).", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "Gamma radiation has zero mass and zero charge. How can something with no charge still cause ionisation, and why is it the *weakest* ioniser of the three types? (2 steps)", "answer": "- Step 1: Gamma rays are high-energy electromagnetic waves. Although they have no charge to exert Coulomb forces, they can still ionise atoms via the **photoelectric effect** or **Compton scattering** — a gamma photon transfers enough energy to an atomic electron to eject it entirely from the atom.\n- Step 2: Because photons have no charge, the probability of interacting with any given electron is low. Most gamma photons pass straight through matter without any interaction at all. This low interaction probability per unit distance means weak ionisation but also very high penetration (requires many cm of lead or metres of concrete to significantly reduce intensity).\n\nGamma ionisation is an \"all-or-nothing\" interaction per photon: either the photon is absorbed/scattered by an electron, or it passes through unaffected.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "Write the general nuclear equation for alpha decay of a parent nucleus $$_{Z}^{A}X$$. What happens to the mass number and atomic number, and why must both sides of the equation balance? (2 steps)", "answer": "- Step 1: The equation is: $$_{Z}^{A}X \\rightarrow _{Z-2}^{A-4}Y + _{2}^{4}\\alpha$$. The mass number decreases by 4 (the alpha carries away 4 nucleons), and the atomic number decreases by 2 (the alpha carries away 2 protons).\n- Step 2: Both sides must balance because of **conservation of nucleon number** and **conservation of charge**. The total number of protons + neutrons on the left equals the total on the right; likewise, the total positive charge (proton count) is conserved. This is a fundamental nuclear accounting principle.\n\nNuclear equations are balanced the same way as chemical equations — what goes in must come out, counted by both mass number and atomic number.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "Write the general nuclear equation for beta-minus decay of $$_{Z}^{A}X$$. Why does the beta particle have an atomic number of $$-1$$ in the notation? (2 steps)", "answer": "- Step 1: The equation is: $$_{Z}^{A}X \\rightarrow _{Z+1}^{A}Y + _{-1}^{0}\\beta$$. Mass number stays the same (a neutron became a proton — same total nucleons); atomic number increases by 1 (a new proton was created).\n- Step 2: The beta particle is written as $$_{-1}^{0}\\beta$$ because the \"atomic number\" position in nuclear notation is being used to track **charge**. An electron has charge $$-1e$$, so it is assigned $$Z = -1$$ to make the charge balance work: $$Z$$ on the left equals $$(Z+1) + (-1) = Z$$ on the right.\n\nThis notation convention is a bookkeeping tool: the mass number tracks nucleons (electrons have none), and the atomic number track tracks net charge.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "During gamma decay, neither the mass number nor the atomic number of the parent nucleus changes. What *does* change, and why is gamma emission often associated with other types of decay? (2 steps)", "answer": "- Step 1: What changes is the **energy** of the nucleus. The gamma ray carries away excess energy, leaving the nucleus in a lower-energy (more stable) state. The nucleus's identity — its proton and neutron count — is unchanged.\n- Step 2: After alpha or beta decay, the daughter nucleus is often left in an *excited* state with surplus energy. It \"relaxes\" to its ground state by emitting one or more gamma photons. This is why gamma emission frequently *accompanies* alpha or beta decay rather than occurring alone — it is the nuclear equivalent of an electron dropping to a lower orbital and emitting a photon.\n\nGamma decay equation: $$_{Z}^{A}X^{*} \\rightarrow _{Z}^{A}X + \\gamma$$, where the asterisk indicates an excited nucleus.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "A radioactive isotope decays by emitting one alpha particle followed by two beta-minus particles. If the original nucleus is $$_{Z}^{A}X$$, what are the final mass number and atomic number? Does the final product have any special relationship to the original? (3 steps)", "answer": "- Step 1: After alpha decay: mass number becomes $$A - 4$$, atomic number becomes $$Z - 2$$. The alpha particle removes 2 protons and 2 neutrons.\n- Step 2: After first beta decay: mass number stays at $$A - 4$$, atomic number becomes $$(Z - 2) + 1 = Z - 1$$. A neutron converted to a proton.\n- Step 3: After second beta decay: mass number stays at $$A - 4$$, atomic number becomes $$(Z - 1) + 1 = Z$$. The final nucleus is $$_{Z}^{A-4}Y$$. Notice the atomic number has *returned* to the original $$Z$$ — the final product is an **isotope** of the original element (same number of protons) but with 4 fewer neutrons.\n\nThis is why a sequence of \"1 alpha + 2 beta\" decays returns you to the same element — a useful fact for solving multi-step decay problems.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "Half-life is defined as the time taken for the number of radioactive nuclei to halve. Does the *mass* of the radioactive substance, and the *activity* of the sample, also halve in one half-life? Explain why. (2 steps)", "answer": "- Step 1: Yes — both the mass and the activity halve in one half-life. The number of undecayed nuclei $$N$$ halves, and since mass is proportional to the number of nuclei ($$m \\propto N$$), the mass of the radioactive substance also halves.\n- Step 2: Activity $$A = \\lambda N$$, where $$\\lambda$$ is the decay constant (fixed for a given isotope). Since $$\\lambda$$ doesn't change and $$N$$ halves, the activity also halves. All three quantities ($$N$$, $$m$$, $$A$$) follow the same exponential decay pattern with the same half-life.\n\nThis is a powerful result: measure *any* of these quantities over time, and you'll determine the same half-life. The half-life is a property of the *isotope*, not of the quantity measured.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "A sample starts with 80,000 radioactive nuclei and has a half-life of 6 hours. How many nuclei remain after 18 hours, and what fraction of the original sample is this? (2 steps)", "answer": "- Step 1: 18 hours corresponds to $$\\frac{18}{6} = 3$$ half-lives. After each half-life, the number halves: after 1: 40,000; after 2: 20,000; after 3: 10,000.\n- Step 2: The fraction remaining is $$\\left(\\frac{1}{2}\\right)^3 = \\frac{1}{8}$$. You can verify: $$\\frac{10{,}000}{80{,}000} = \\frac{1}{8}$$. The general formula: after $$n$$ half-lives, the fraction remaining is $$\\left(\\frac{1}{2}\\right)^n$$.\n\nFor quick mental math: each half-life is a factor of $$\\frac{1}{2}$$. Three half-lives = divide by 8. Five half-lives = divide by 32. Ten half-lives = divide by 1024 (roughly 1000).", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "Radioactive decay is described as both \"spontaneous\" and \"random.\" Distinguish between these two terms — what does each mean, and what is the practical consequence of each property? (3 steps)", "answer": "- Step 1: **Spontaneous** means the decay cannot be influenced by external environmental factors — temperature, pressure, chemical bonding, or electromagnetic fields do not change the decay rate. The nucleus decides independently when to decay.\n- Step 2: **Random** means the *exact moment* at which any individual nucleus decays cannot be predicted. Each nucleus has the same constant probability of decaying per unit time, but which specific nucleus decays at which instant is fundamentally unpredictable.\n- Step 3: The practical consequence: for a *single* nucleus, you cannot predict when it will decay. But for a *large collection* of identical nuclei, the statistical average behaviour is highly predictable — the half-life is well-defined and reproducible. Randomness at the individual level produces reliable statistics at the population level.\n\nA Geiger counter shows irregular, fluctuating counts — this visible randomness is direct evidence of the random nature of decay.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "The decay constant $$\\lambda$$ is defined as \"the probability per second that a given nucleus will decay.\" If isotope X has $$\\lambda = 0.10 \\text{ s}^{-1}$$ and isotope Y has $$\\lambda = 0.01 \\text{ s}^{-1}$$, which is more radioactive, and how does $$\\lambda$$ relate to half-life qualitatively? (2 steps)", "answer": "- Step 1: Isotope X is more radioactive. A larger $$\\lambda$$ means each nucleus has a higher probability of decaying each second, so more decays happen per unit time — higher activity.\n- Step 2: $$\\lambda$$ and half-life $$t_{1/2}$$ are inversely related. A large $$\\lambda$$ (high decay probability) means nuclei decay quickly → short half-life. A small $$\\lambda$$ means slow decay → long half-life. The exact relationship is $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$.\n\nIntuitively: if each nucleus has a 10% chance of decaying per second, the population will halve quickly. If only 1% per second, it takes much longer to halve.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "The activity equation is $$A = \\lambda N$$. Explain what each symbol means and why there is a negative sign in the differential form $$\\frac{dN}{dt} = -\\lambda N$$. What does the negative sign physically represent? (2 steps)", "answer": "- Step 1: $$A$$ is activity (decays per second, in Bq), $$\\lambda$$ is the decay constant (probability of decay per nucleus per second), and $$N$$ is the number of undecayed nuclei remaining. The equation says: the rate of decay equals the number of nuclei times the probability that each one decays.\n- Step 2: In the differential form $$\\frac{dN}{dt} = -\\lambda N$$, the negative sign indicates that $$N$$ is *decreasing* over time. Each decay event removes a nucleus from the population of undecayed nuclei, so the rate of change of $$N$$ is negative. Without the minus sign, the equation would incorrectly imply the number of nuclei is *increasing*.\n\nThis is mathematically identical to exponential decay in other contexts (e.g., capacitor discharge, damping). The solution is $$N = N_0 e^{-\\lambda t}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "Derive the relationship between half-life and the decay constant: $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$. Walk through the logic starting from $$N = N_0 e^{-\\lambda t}$$. (4 steps)", "answer": "- Step 1: Start with the exponential decay law: $$N = N_0 e^{-\\lambda t}$$, where $$N_0$$ is the initial number of nuclei and $$N$$ is the number remaining after time $$t$$.\n- Step 2: By definition of half-life, when $$t = t_{1/2}$$, the number of nuclei has halved: $$N = \\frac{N_0}{2}$$. Substitute: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$.\n- Step 3: Divide both sides by $$N_0$$: $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$. Take natural logs: $$\\ln\\left(\\frac{1}{2}\\right) = -\\lambda t_{1/2}$$. Since $$\\ln\\left(\\frac{1}{2}\\right) = -\\ln 2$$, this gives $$-\\ln 2 = -\\lambda t_{1/2}$$.\n- Step 4: Cancel the negatives and rearrange: $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$. Note that $$\\ln 2 \\approx 0.693$$, so $$t_{1/2} \\approx \\frac{0.693}{\\lambda}$$. The half-life depends *only* on the decay constant — it is a fixed property of the isotope.\n\nThis derivation shows why half-life is constant regardless of how much material you start with: the exponential function always takes the same time to halve, no matter where you start on the curve.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "A radioactive tracer is used in medicine. It has an initial activity of 100,000 Bq and a half-life of 2.6 days. After 13 days, a doctor claims it is safe to dispose of. Is 13 days a reasonable time, and roughly what fraction of the original activity remains? (3 steps)", "answer": "- Step 1: Calculate the number of half-lives: $$n = \\frac{13}{2.6} = 5$$ half-lives.\n- Step 2: The fraction remaining is $$\\left(\\frac{1}{2}\\right)^5 = \\frac{1}{32} \\approx 3\\%$$. The remaining activity is approximately $$\\frac{100{,}000}{32} \\approx 3{,}100$$ Bq.\n- Step 3: At roughly 3% of the original dose, the radiation exposure is very low. For a medical tracer designed to be short-lived, this is a reasonable threshold for safety. The key reasoning: 5 half-lives reduces the sample to ~3% — generally considered negligible for medical purposes.\n\nThe \"rule of thumb\" in radiation safety: after ~5–6 half-lives, the remaining activity is low enough to be negligible (1/32 to 1/64 of original).", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Nuclear fission is initiated when a particular type of particle is absorbed by a large nucleus like uranium-235. Which particle is it, and why is *this* particle specifically chosen rather than a proton or alpha particle? (2 steps)", "answer": "- Step 1: A **slow (thermal) neutron** is absorbed by the uranium-235 nucleus, causing it to become unstable and split into two smaller nuclei plus 2–3 additional neutrons.\n- Step 2: A neutron is chosen because it has **no charge**. A proton or alpha particle would be repelled by the Coulomb barrier of the positively charged nucleus and would need enormous energy to get close enough for the strong nuclear force to capture it. A neutron, being neutral, can drift into the nucleus without any Coulomb repulsion, even at low (thermal) energies.\n\nThis is why \"slow\" neutrons work — they don't need kinetic energy to overcome a barrier; they simply need to reach the nucleus, where the short-range strong nuclear force captures them.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "Explain how a chain reaction is sustained in nuclear fission. What would happen if, on average, fewer than one of the released neutrons per fission event caused another fission? (2 steps)", "answer": "- Step 1: Each fission event releases 2–3 neutrons. If, on average, at least one of these neutrons goes on to cause *another* fission event, the reaction sustains itself — each generation of fission triggers the next. This is the chain reaction.\n- Step 2: If fewer than one neutron (on average) causes a subsequent fission, the reaction **dies out** — this is a *subcritical* condition. If exactly one, the reaction continues at a steady rate (*critical* — used in nuclear power). If more than one, the reaction grows exponentially (*supercritical* — used in nuclear weapons).\n\nControl rods in reactors absorb excess neutrons to keep the reaction exactly critical. Removing them makes it supercritical; inserting them fully makes it subcritical.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "Nuclear fusion requires enormous temperature and pressure, while fission can be triggered by a single neutron. Why is fusion so much harder to initiate? (2 steps)", "answer": "- Step 1: Fusion requires bringing two *positively charged* nuclei close enough together for the short-range strong nuclear force to attract and bind them. But at any significant distance, the Coulomb repulsion between the protons pushes them apart. Overcoming this electrostatic barrier requires extremely high kinetic energies — corresponding to temperatures of millions of degrees.\n- Step 2: Fission, by contrast, is triggered by a *neutral* neutron that enters the nucleus with no Coulomb barrier to overcome. The nucleus is already large and unstable — adding a neutron simply pushes it over the edge into splitting. No extreme temperature or pressure is needed.\n\nThis is why stars (with immense gravitational pressure and temperature) are natural fusion reactors, while fission can happen at room temperature with the right materials.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "A hydrogen bomb uses both fission and fusion. Why can't the fusion part be triggered directly — why is fission needed first? (2 steps)", "answer": "- Step 1: Fusion requires temperatures of millions of degrees and enormous pressures to overcome Coulomb repulsion between light nuclei. Conventional explosives cannot produce these conditions.\n- Step 2: A fission bomb (the \"primary\") *is* triggered first using conventional explosives. The fission explosion generates the extreme temperature and pressure needed to initiate fusion in the \"secondary\" (containing hydrogen isotopes). Fission acts as the \"spark plug\" for fusion.\n\nThis two-stage design is called a thermonuclear weapon. The fission stage creates the conditions; the fusion stage then releases far more energy than fission alone could.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "In Core Practical 15, you investigate gamma absorption by different thicknesses of lead. Identify the independent, dependent, and at least two control variables. (2 steps)", "answer": "- Step 1: Independent variable = thickness of lead absorber (what you deliberately change). Dependent variable = count rate measured by the Geiger-Müller tube (what changes in response).\n- Step 2: Control variables (must be kept constant):\n+ The radioactive source used (same isotope, same activity)\n+ Distance from source to GM tube (fixed at e.g. 10 cm)\n+ Location/background radiation (same room, same position)\n\nIf the distance varied, the inverse-square law would change the count rate independently of the lead thickness, confounding the results.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "In Core Practical 15, why must you measure background radiation before starting, and how do you determine when all gamma radiation has been absorbed? (2 steps)", "answer": "- Step 1: Background radiation is measured with no source present over several minutes, then averaged to a per-minute rate. This value is subtracted from all subsequent readings to get the *corrected count rate* attributable only to the gamma source.\n- Step 2: As you increase lead thickness, the corrected count rate decreases. When the corrected count rate reaches zero (or fluctuates randomly around zero, within statistical uncertainty), all gamma radiation from the source has been absorbed. The thickness at which this occurs is the absorption thickness.\n\nThe count rate never truly reaches zero because of statistical fluctuations — you look for when the count is statistically indistinguishable from background.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "In Core Practical 15, why should you use a radioactive source with a *long* half-life, and why should you take *three* readings per thickness rather than one? (2 steps)", "answer": "- Step 1: A long half-life ensures the source's activity remains approximately constant throughout the experiment. If the half-life were short, the activity would decrease significantly during data collection, and you couldn't distinguish absorption by lead from natural decay of the source.\n- Step 2: Taking three readings per thickness and averaging reduces the impact of **random fluctuations** in radioactive decay. Since decay is random, individual one-minute counts vary significantly. Averaging smooths out these statistical fluctuations and gives a more reliable measure of the true count rate.\n\nRadioactive decay follows Poisson statistics: the standard deviation of $$n$$ counts is approximately $$\\sqrt{n}$$. Averaging multiple readings reduces this uncertainty.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "List three safety precautions when handling a radioactive source in the lab, and explain the physical principle behind each. (3 steps)", "answer": "- Step 1: **Store the source in a lead-lined container when not in use** — lead absorbs the radiation, shielding people from exposure. This minimises dose when the source is idle.\n- Step 2: **Handle with tongs/tweezers and point the source away from you** — increasing distance from the source dramatically reduces dose (inverse-square law: doubling distance quarters the intensity). Tongs add distance between your hands and the source.\n- Step 3: **Wash hands and remove outer clothing after handling** — this removes any contamination (radioactive material on surfaces/skin) that could cause prolonged exposure, especially from alpha emitters which are dangerous if ingested or inhaled.\n\nThe principles are: shielding (absorb radiation), distance (reduce intensity), time (minimise duration of exposure), and contamination control.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "A stationary uranium-238 nucleus undergoes alpha decay, producing thorium-234 and an alpha particle. The total kinetic energy released is $$E$$. Using conservation of momentum and energy, explain qualitatively why the alpha particle carries away *most* of the energy $$E$$, not a small fraction. (3 steps)", "answer": "- Step 1: The initial momentum is zero (the nucleus is stationary). By conservation of momentum: $$m_{Th} v_{Th} = m_{\\alpha} v_{\\alpha}$$. Since $$m_{Th} = 234$$ u and $$m_{\\alpha} = 4$$ u, the thorium must move much *slower* than the alpha to balance momentum: $$v_{Th} = \\frac{4}{234} v_{\\alpha}$$.\n- Step 2: Kinetic energy is $$\\frac{1}{2}mv^2$$. The thorium has large mass but tiny velocity (squared). The alpha has small mass but large velocity (squared). Since kinetic energy scales with $$v^2$$, the alpha's high velocity dominates: $$KE_{\\alpha} = \\frac{1}{2}(4)v_{\\alpha}^2$$ while $$KE_{Th} = \\frac{1}{2}(234)\\left(\\frac{4}{234}\\right)^2 v_{\\alpha}^2 = \\frac{1}{2}\\frac{16}{234}v_{\\alpha}^2$$.\n- Step 3: Comparing: $$KE_{Th} = \\frac{4}{234} KE_{\\alpha} \\approx \\frac{1}{58.5} KE_{\\alpha}$$. The alpha particle carries about 98.3% of the total energy. This is a general principle: in any decay where a light fragment is emitted, the lighter fragment carries most of the kinetic energy because momentum conservation forces it to move much faster, and $$KE \\propto v^2$$.\n\nThis is analogous to a cannon: the light cannonball flies off at high speed with most of the kinetic energy, while the heavy cannon recoils slowly.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": true}, {"question": "A nucleus $$_{92}^{238}U$$ decays to $$_{82}^{206}Pb$$ through a series of alpha and beta-minus decays. How many alpha decays and how many beta decays must have occurred? (3 steps)", "answer": "- Step 1: Each alpha decay reduces the mass number by 4. The total mass number change is $$238 - 206 = 32$$. Since only alpha decays change the mass number, the number of alpha decays is $$\\frac{32}{4} = 8$$.\n- Step 2: Each alpha decay reduces the atomic number by 2. Eight alpha decays reduce the atomic number by $$8 \\times 2 = 16$$, from 92 to $$92 - 16 = 76$$.\n- Step 3: But the final atomic number is 82, which is 6 higher than 76. Each beta decay increases the atomic number by 1. Therefore, $$82 - 76 = 6$$ beta decays occurred. The answer: **8 alpha decays and 6 beta decays**.\n\nAlways solve alpha count first (from mass number), then beta count (from atomic number). Beta doesn't affect mass number, so alpha count is determined independently.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": true}, {"question": "A sample of 100,000 nuclei has a half-life of 2.6 days. Using the \"magic table\" method, set up the table columns and fill in the first 3 rows. What are the column headers and why? (3 steps)", "answer": "- Step 1: The three column headers are: **Number of half-lives** (0, 1, 2, ...), **Number of nuclei** (or mass/activity), and **Time** (in the given units — here, days).\n- Step 2: Row 0: half-lives = 0, nuclei = 100,000, time = 0 days. This is the starting point before any decay.\n- Step 3: Row 1: half-lives = 1, nuclei = 50,000, time = 2.6 days. Row 2: half-lives = 2, nuclei = 25,000, time = 5.2 days. Each row halves the nuclei count and adds one half-life to the time.\n\nThe \"magic table\" is a systematic way to handle half-life problems. It's especially useful when the time given doesn't correspond to an exact number of half-lives — you can read between rows or use interpolation.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": false}, {"question": "Is it correct to say \"alpha radiation cannot harm human cells\"? Explain the misconception and the condition under which alpha radiation becomes the *most* dangerous type. (2 steps)", "answer": "- Step 1: This is a **misconception**. Alpha radiation *can* harm cells — it is the most ionising type. Outside the body, alpha is stopped by the dead layer of skin, causing little damage. But this does not mean it \"cannot harm cells.\"\n- Step 2: If an alpha-emitting source is **ingested or inhaled**, the alpha particles are directly adjacent to living tissue with no protective barrier. The high ionisation then causes severe cellular damage. In this scenario, alpha is the *most dangerous* radiation type because each particle deposits a large amount of energy in a very small volume of tissue.\n\nThe danger of radiation depends on both the type *and* the location relative to the body. External alpha = low risk; internal alpha = high risk.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "Gamma radiation is described as \"weakly ionising.\" Does this mean it is harmless? Explain the misconception. (2 steps)", "answer": "- Step 1: No — gamma radiation can still cause significant harm. \"Weakly ionising\" means each gamma photon has a *low probability* of interacting with any given atom, so it ionises fewer atoms per unit distance than alpha or beta.\n- Step 2: However, gamma's high penetration means it can pass through the entire body, reaching internal organs. While each interaction is unlikely, a large enough *dose* (many gamma photons) still ionises enough atoms to cause damage. You simply need a larger exposure of gamma to achieve the same biological damage as a smaller exposure of alpha.\n\n\"Weakly ionising\" ≠ \"harmless.\" It means you need a bigger dose for the same effect, but the effect is still real and dangerous at sufficient intensity.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "The exponential decay equation is $$N = N_0 e^{-\\lambda t}$$. Qualitatively, what does the shape of this graph tell you about the rate of decay — is it constant, accelerating, or decelerating over time, and why? (2 steps)", "answer": "- Step 1: The decay is **decelerating** — the number of decays per second is highest at the start and decreases over time. The curve drops steeply at first, then flattens out.\n- Step 2: This is because the activity $$A = \\lambda N$$ depends on how many nuclei remain. Early on, many undecayed nuclei exist → many decays per second. As nuclei decay, fewer remain → fewer decays per second. The rate of decay is proportional to the current population, creating a self-limiting feedback loop.\n\nThe curve never truly reaches zero — it asymptotically approaches it. This is why half-life is a useful measure: no matter how much material you start with, it always takes the same time to halve.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": true}, {"question": "A sample has activity 800 Bq and contains $$2 \\times 10^7$$ nuclei. What is the decay constant $$\\lambda$$? If the half-life of this isotope is roughly 14 hours, does your answer seem consistent? (2 steps)", "answer": "- Step 1: Using $$A = \\lambda N$$: $$\\lambda = \\frac{A}{N} = \\frac{800}{2 \\times 10^7} = 4 \\times 10^{-5} \\text{ s}^{-1}$$.\n- Step 2: Check consistency with $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$: $$t_{1/2} = \\frac{0.693}{4 \\times 10^{-5}} \\approx 17{,}300 \\text{ s} \\approx 4.8 \\text{ hours}$$. This is *not* consistent with 14 hours — either the half-life is actually ~5 hours, or the given numbers don't match. The point: always check that your $$\\lambda$$ and $$t_{1/2}$$ are self-consistent via $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$.\n\nConsistency checking catches errors: if $$\\lambda$$ and $$t_{1/2}$$ don't satisfy their defining relationship, something is wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "What is the key difference between nuclear fission and nuclear fusion in terms of which elements are involved? Why do heavy elements fission but light elements fuse? (2 steps)", "answer": "- Step 1: **Fission** involves *heavy* nuclei (like uranium, plutonium) splitting into lighter fragments. **Fusion** involves *light* nuclei (like hydrogen, helium) joining together into heavier ones.\n- Step 2: This is driven by **binding energy per nucleon**. Iron-56 has the highest binding energy per nucleon. Nuclei heavier than iron can become more stable by *splitting* (fission) — moving toward iron. Nuclei lighter than iron can become more stable by *joining* (fusion) — also moving toward iron. Both processes release energy because they move toward the maximum binding energy.\n\nBoth fission and fusion release energy — they just approach the peak of binding energy per nucleon from opposite sides.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "A nuclear equation shows a mystery particle $$_{Z}^{A}x$$ being emitted alongside known products. If the left side has $$A = 210, Z = 84$$ and the right side (excluding the mystery particle) has $$A = 206, Z = 82$$, identify the mystery particle. (3 steps)", "answer": "- Step 1: Balance the mass numbers: $$210 = 206 + A_x$$, so $$A_x = 4$$.\n- Step 2: Balance the atomic numbers: $$84 = 82 + Z_x$$, so $$Z_x = 2$$.\n- Step 3: A particle with $$A = 4$$ and $$Z = 2$$ is an alpha particle ($$_{2}^{4}\\alpha$$). This is alpha decay.\n\nThis bookkeeping method works for any nuclear equation: the sums of mass numbers and atomic numbers must balance on both sides. The mystery particle is whatever makes the totals equal.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "Radiation detectors work by detecting ions created when radiation passes through matter. Name three types of radiation detector and briefly explain the principle behind the Geiger-Müller tube. (2 steps)", "answer": "- Step 1: Three detectors: **photographic film** (darkens when exposed to radiation), **Geiger-Müller tube** (detects ionisation in a gas), **scintillation counter** (emits light flashes when radiation strikes a special material).\n- Step 2: A GM tube contains a gas at low pressure. When radiation enters, it ionises the gas molecules. The resulting ions and electrons are attracted to electrodes, creating a brief pulse of current. Each pulse is counted, giving the count rate. The tube is sensitive to alpha, beta, and gamma (with appropriate window materials).\n\nThe GM tube doesn't distinguish between types of radiation — it simply counts each ionisation event. For energy discrimination, other detectors (like scintillation counters) are needed.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "Man-made sources of background radiation include medical uses and nuclear accidents. Name two more man-made sources, and explain why nuclear *waste* contributes little to the *average* person's background dose but is still a serious concern. (2 steps)", "answer": "- Step 1: Two additional man-made sources: **nuclear fallout** from weapons testing (residual radioactive material thrown into the atmosphere) and **nuclear accidents** (e.g., Chernobyl, Fukushima).\n- Step 2: Nuclear waste contributes little to the *average background dose* because it is heavily shielded (stored in lead and concrete casks, deep underground) and geographically isolated from the general population. However, it is a serious concern for *workers* handling it, and any breach of containment could release significant radiation into the environment.\n\nBackground radiation is an *average* measure — individual exposure varies greatly depending on occupation, location, and medical history.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "A nuclear decay sequence from isotope P to isotope Q involves both alpha and beta decays. The mass number drops by 4 and the atomic number drops by 1. How many of each type of decay occurred? (3 steps)", "answer": "- Step 1: Only alpha decay changes the mass number. A drop of 4 means exactly **1 alpha decay** occurred.\n- Step 2: One alpha decay reduces the atomic number by 2. But the net change is only -1. Therefore, the atomic number must have been *increased* by 1 somewhere — this requires **1 beta-minus decay** (which increases $$Z$$ by 1).\n- Step 3: Check: start with $$_{Z}^{A}P$$. After 1 alpha: $$_{Z-2}^{A-4}$$. After 1 beta: $$_{Z-1}^{A-4}Q$$. Net: $$\\Delta A = -4$$, $$\\Delta Z = -1$$. ✓\n\nFor multi-step decay problems, always determine the number of alpha decays from the mass number change first, then use the atomic number to find the number of beta decays.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": true}, {"question": "In the ESAT-style uranium decay problem, a stationary U-238 nucleus decays by alpha emission with total kinetic energy $$E$$. Without doing the full algebra, explain why the alpha particle's kinetic energy is approximately $$\\frac{234}{238} E$$ rather than a small fraction. (2 steps)", "answer": "- Step 1: Momentum conservation forces the light alpha to move much faster than the heavy thorium. Since kinetic energy is $$\\frac{1}{2}mv^2$$, and the alpha's velocity is much larger, the alpha's energy is disproportionately large despite its small mass.\n- Step 2: The exact result is $$KE_{\\alpha} = \\frac{m_{Th}}{m_{Th} + m_{\\alpha}} E = \\frac{234}{234 + 4} E = \\frac{234}{238} E \\approx 0.983 E$$. This fraction arises because momentum conservation distributes the velocity inversely with mass, and energy goes as $$v^2$$. The heavier fragment gets the tiny fraction, not the lighter one.\n\nIn any two-body decay from rest, the lighter fragment always carries the lion's share of kinetic energy — a direct consequence of momentum conservation combined with $$KE \\propto v^2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": true}, {"question": "Why can't a decay equation where the mass number stays the same but the atomic number *decreases* by 2 represent any single nuclear decay process? What fundamental conservation law does this violate? (2 steps)", "answer": "- Step 1: No single decay process reduces the atomic number by 2 while keeping the mass number constant. Alpha decay reduces both $$A$$ (by 4) and $$Z$$ (by 2). Beta decay changes $$Z$$ by ±1 but keeps $$A$$ the same. Gamma decay changes neither.\n- Step 2: A decrease of $$Z$$ by 2 with no change in $$A$$ would require losing 2 protons while somehow *gaining* 2 neutrons — converting 2 protons to 2 neutrons. This would be a **double beta-plus (positron) decay** or **double electron capture**, which is extremely rare and would never be described as a \"single\" standard decay at this level.\n\nAt A-level, the only standard single decays are: alpha (ΔA = −4, ΔZ = −2), beta-minus (ΔA = 0, ΔZ = +1), and gamma (ΔA = 0, ΔZ = 0). Any other combination requires multiple decays or exotic processes.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "When reading a half-life graph, the count rate asymptotes to 15 counts per minute rather than zero. What does this tell you, and what should you do to find the true half-life? (2 steps)", "answer": "- Step 1: The asymptote at 15 counts per minute (not zero) indicates the presence of **background radiation**. The GM tube is detecting both the decaying source and the constant background.\n- Step 2: To find the true half-life, first subtract the background count from all data points (corrected count rate). Then the corrected curve *will* asymptote to zero, and you can read the half-life as the time for the corrected count rate to halve from its initial value.\n\nExam tip: if a graph's curve levels off above zero, the y-intercept of the flat portion is the background count rate. Subtract it from all readings before analysis.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "A scientist claims that increasing the temperature of a radioactive sample would increase its decay rate. Is this correct? Explain using the concept of spontaneous decay. (2 steps)", "answer": "- Step 1: **No** — this is incorrect. Radioactive decay is **spontaneous**, meaning it cannot be influenced by environmental factors including temperature, pressure, or chemical conditions.\n- Step 2: The decay rate depends only on the decay constant $$\\lambda$$, which is an intrinsic property of the isotope determined by the nuclear structure. Temperature affects atomic electrons (chemical reactions), but decay happens inside the nucleus, governed by the strong and weak nuclear forces, which are unaffected by thermal energy at any achievable temperature.\n\nEven at temperatures of millions of degrees (inside stars), the decay constant of a given isotope remains the same. This is fundamentally different from chemical reaction rates, which are highly temperature-dependent.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "Cosmic rays from the Sun are mostly protons. How do these protons ultimately produce gamma radiation in the atmosphere? (2 steps)", "answer": "- Step 1: Solar protons enter the atmosphere at very high speeds (high kinetic energy). When they collide with molecules in the air (nitrogen, oxygen), these high-energy collisions produce a shower of secondary particles — including pions, muons, electrons, and photons.\n- Step 2: Among these secondary products are **gamma ray photons**. The cascade of particle interactions converts the kinetic energy of the original proton into various forms of radiation, including gamma. This is why cosmic rays (charged particles) contribute to the gamma component of background radiation.\n\nThe cosmic ray \"air shower\" is a complex particle physics cascade — the original proton's energy is distributed among many secondary particles through successive interactions.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "Carbon-14 in living organisms stays roughly constant, but in dead organisms it decays. Why does the level stay constant in living things, and what is this the basis of? (2 steps)", "answer": "- Step 1: Living organisms continuously exchange carbon with the environment (eating, breathing, photosynthesis). Carbon-14 is constantly being replenished from the atmosphere, where it is produced by cosmic ray interactions with nitrogen-14. As long as the organism is alive, the intake of new carbon-14 balances the radioactive decay.\n- Step 2: When the organism dies, it stops exchanging carbon with the environment. The carbon-14 already in its body decays with a half-life of ~5,730 years, and is not replenished. By measuring the remaining carbon-14 relative to carbon-12, you can estimate how long ago the organism died. This is the basis of **radiocarbon dating**.\n\nThe ratio of carbon-14 to carbon-12 in a living organism matches the atmospheric ratio. After death, this ratio decreases exponentially.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "In the gamma absorption core practical, you measure lead thickness with Vernier calipers at three points on each sheet and average. Why three points rather than one? (2 steps)", "answer": "- Step 1: Lead sheets may not have perfectly uniform thickness — there can be slight variations across the sheet due to manufacturing imperfections. Measuring at three different points captures this variation.\n- Step 2: Averaging the three measurements gives a more representative value of the *effective* thickness and reduces the impact of any single anomalous measurement (e.g., at a bump or thin spot). This improves the reliability and accuracy of the experiment.\n\nThis is a general principle in experimental physics: repeated measurements of the same quantity reduce random errors and reveal systematic non-uniformity.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": false}, {"question": "A radioactive source is used in a hospital as a tracer. It must have a half-life that is neither too short nor too long. Explain the practical problems with each extreme. (2 steps)", "answer": "- Step 1: If the half-life is **too short**, the tracer decays before it can reach the target organ or before imaging is complete. The patient receives a large initial dose (to ensure enough remains for detection), but most of it is wasted energy. The medical team also has very little time to work with.\n- Step 2: If the half-life is **too long**, the tracer remains radioactive in the patient's body for an extended period after the procedure, causing unnecessary radiation exposure. It also creates waste disposal problems for the hospital. The ideal tracer half-life is just long enough to complete the procedure, then it decays away quickly.\n\nTypical medical tracers have half-lives of hours to a few days (e.g., technetium-99m: 6 hours, iodine-131: 8 days).", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "Explain the difference between \"count rate\" and \"activity.\" Why might the count rate measured by a GM tube be significantly lower than the source's true activity? (2 steps)", "answer": "- Step 1: **Activity** ($$A$$, in Bq) is the total number of decays per second from the entire source. **Count rate** (in counts per second) is what the detector actually registers. They are related but not equal.\n- Step 2: The count rate is lower than the activity because: (a) the detector only captures radiation emitted *towards* it (solid angle effect — most radiation goes in other directions), (b) the detector has less than 100% detection efficiency, (c) absorption by air or other materials between source and detector reduces the count, and (d) background subtraction may further reduce the net count.\n\nA source with activity 10,000 Bq might give a count rate of only a few hundred counts per second — the detector \"sees\" only a small fraction of all decays.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "You are told that a sample of 1,000,000 nuclei of isotope X has a decay constant of $$5 \\times 10^{-4} \\text{ s}^{-1}$$. Without detailed calculation, estimate the activity and the approximate half-life. (2 steps)", "answer": "- Step 1: Activity $$A = \\lambda N = 5 \\times 10^{-4} \\times 10^6 = 500$$ Bq (500 decays per second). This is a straightforward multiplication.\n- Step 2: Half-life $$t_{1/2} = \\frac{\\ln 2}{\\lambda} \\approx \\frac{0.7}{5 \\times 10^{-4}} = \\frac{0.7}{0.0005} = 1400$$ seconds ≈ 23 minutes. A quick estimate: $$\\frac{0.693}{\\lambda}$$ is close enough for conceptual purposes; you don't need a calculator to get the order of magnitude.\n\nFor mental estimation: $$\\frac{0.7}{\\lambda}$$ is a good approximation. If $$\\lambda = 0.001$$, half-life ≈ 700 s ≈ 12 min. If $$\\lambda = 0.1$$, half-life ≈ 7 s.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "A neutron emission is listed as a fourth type of nuclear radiation. Why is it rarely discussed compared to alpha, beta, and gamma, and under what circumstances does it typically occur? (2 steps)", "answer": "- Step 1: Neutron emission is rare because it requires a nucleus to be so energetically unstable that it ejects a neutron — this typically only happens during or after *other* nuclear processes (like fission), not as a standalone decay mode for naturally occurring isotopes.\n- Step 2: Neutron emission commonly occurs as a *by-product* of nuclear fission (each fission event releases 2–3 neutrons) or in certain artificially produced neutron-rich isotopes. It is not a standard decay mode for the naturally radioactive elements studied at A-level.\n\nYou won't be asked about neutron emission unless the question explicitly introduces it. When it does appear, treat it like any other nuclear equation: balance mass number and atomic number (neutrons have $$A = 1, Z = 0$$).", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": false}, {"question": "In a multiple-choice ESAT question, you see four nuclear decay options. Option A shows mass number staying the same and atomic number decreasing by 2. Why can you immediately eliminate this as a single decay? (2 steps)", "answer": "- Step 1: No single standard decay process keeps the mass number constant while decreasing the atomic number by 2. The three standard decays are: alpha (ΔA = −4, ΔZ = −2), beta-minus (ΔA = 0, ΔZ = +1), and gamma (ΔA = 0, ΔZ = 0).\n- Step 2: Option A's pattern (ΔA = 0, ΔZ = −2) doesn't match any of these. It would require losing 2 protons while gaining 2 neutrons — which is not a recognised single decay at this level. You can eliminate it without further calculation.\n\nThis is a powerful elimination strategy: memorise the (ΔA, ΔZ) signatures for alpha, beta-minus, and gamma, and any option that doesn't match one of these (or a valid combination) can be rejected immediately.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": true}, {"question": "What is the significance of the \"ln 2\" in the half-life equation $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$? Walk through where it comes from conceptually. (2 steps)", "answer": "- Step 1: Half-life is defined as the time when $$N = \\frac{N_0}{2}$$. Substituting into $$N = N_0 e^{-\\lambda t}$$: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$, which simplifies to $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$.\n- Step 2: Taking the natural log of both sides: $$\\ln\\left(\\frac{1}{2}\\right) = -\\lambda t_{1/2}$$. Since $$\\ln\\left(\\frac{1}{2}\\right) = -\\ln 2$$, we get $$-\\ln 2 = -\\lambda t_{1/2}$$, giving $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$. The $$\\ln 2$$ appears because we took the natural log of $$\\frac{1}{2}$$ — it is the mathematical consequence of asking \"when does an exponential drop to half?\"\n\n$$\\ln 2 \\approx 0.693$$ is a mathematical constant, not a physics constant. It appears whenever you convert between half-life and exponential decay rate.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": true}], "count": 53}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "In an atom, the nucleus contains almost all the mass but occupies a tiny fraction of the volume. Conceptually, how does this extreme density difference explain why alpha particles can pass straight through the electron cloud but are strongly repelled by the nucleus? (3 steps)", "answer": "- Step 1: The electron cloud is mostly empty space with very low mass density, meaning an alpha particle (which is relatively massive and fast) will not experience significant collisions or energy loss when passing through it.\n- Step 2: The nucleus, however, contains nearly all the atom's mass and all of its positive charge, packed into an incredibly tiny volume, creating an intense localized positive electric field.\n- Step 3: When an alpha particle (also positively charged) approaches this dense nucleus, the strong Coulomb repulsion between the two positive charges causes the alpha particle to scatter or bounce back, proving the mass and charge are concentrated in the center.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": true}, {"question": "Alpha particles are described as having high ionizing power but low penetrating power. Explain the physical mechanism that links these two properties, making them inversely related. (3 steps)", "answer": "- Step 1: Alpha particles have a relatively large mass and a high electrical charge ($$+2e$$), which creates a strong electromagnetic field around them.\n- Step 2: As they travel through a material, this strong field interacts heavily with the orbital electrons of the surrounding atoms, easily pulling them away and creating many ion pairs (high ionizing power).\n- Step 3: Because they transfer so much of their kinetic energy to the surrounding atoms in a very short distance, they rapidly lose their own kinetic energy and come to a stop quickly (low penetrating power).", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "In beta-minus decay, a high-energy electron is emitted from the nucleus. Since nuclei only contain protons and neutrons, explain the fundamental nucleon transformation that allows an electron to be emitted, and state how this affects the atomic number ($$Z$$) and mass number ($$A$$). (3 steps)", "answer": "- Step 1: Inside an unstable nucleus with too many neutrons, a neutron undergoes a fundamental transformation and converts into a proton.\n- Step 2: To conserve charge and lepton number during this conversion, the nucleus emits a high-energy electron (the beta particle) and an electron antineutrino.\n- Step 3: Because a neutron (mass 1, charge 0) became a proton (mass 1, charge +1), the total number of nucleons (mass number $$A$$) remains unchanged, but the number of protons (atomic number $$Z$$) increases by 1.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Following an alpha or beta decay, a nucleus often emits a gamma ray. Why does the emission of a gamma ray not change the chemical identity of the element, and what specific state of the nucleus does it resolve? (2 steps)", "answer": "- Step 1: A gamma ray is high-energy electromagnetic radiation, meaning it has no rest mass and no electrical charge; therefore, its emission does not change the number of protons or neutrons in the nucleus.\n- Step 2: After alpha or beta decay, the daughter nucleus is often left in an \"excited\" state with excess internal energy; emitting a gamma ray allows the nucleus to drop to a lower, more stable energy state without altering its chemical identity.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "You have three radioactive sources: alpha, beta, and gamma. Conceptually map which radiation is stopped by a sheet of paper, a few millimeters of aluminum, and a thick lead block, and explain why gamma requires dense materials like lead to attenuate it significantly. (3 steps)", "answer": "- Step 1: Alpha radiation is stopped by a single sheet of paper (or human skin) due to its high ionizing power and rapid energy loss.\n- Step 2: Beta radiation passes through paper but is stopped by a few millimeters of aluminum, as its lower charge ($$-1e$$) and smaller mass allow it to penetrate further before losing its energy.\n- Step 3: Gamma radiation passes through both paper and aluminum; because it has no charge, it doesn't interact via continuous Coulomb forces, but rather through rare, probabilistic collisions with electrons or nuclei, requiring high-density, high-atomic-number materials like lead to maximize the probability of these interactions and attenuate the beam.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": true}, {"question": "The half-life of a radioactive isotope is defined as the time taken for half the undecayed nuclei to decay. If you have exactly 4 atoms of an isotope with a half-life of 10 minutes, explain why it is incorrect to guarantee that exactly 2 atoms will remain after 10 minutes. (3 steps)", "answer": "- Step 1: Radioactive decay is a fundamentally random process at the level of individual nuclei, meaning we cannot predict exactly when a specific atom will decay.\n- Step 2: The half-life represents a statistical probability; for any single nucleus, there is a 50% chance it will decay within one half-life.\n- Step 3: With a macroscopic sample (e.g., $$10^{20}$$ atoms), the law of large numbers ensures almost exactly half will decay, but with a tiny sample of just 4 atoms, statistical fluctuations dominate, meaning you could easily end up with 0, 1, 2, 3, or 4 atoms remaining after 10 minutes.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": true}, {"question": "When selecting a radioactive isotope to use as a medical tracer inside the human body, doctors typically choose one with a half-life of a few hours (e.g., Technetium-99m has 6 hours). Explain the two competing medical and safety factors that make a half-life of a few hours the optimal compromise. (2 steps)", "answer": "- Step 1: The half-life must be long enough to allow the medical staff sufficient time to administer the tracer, let it circulate through the body, and complete the imaging scans or procedures.\n- Step 2: Conversely, the half-life must be short enough so that the radioactivity drops to safe, negligible levels quickly, minimizing the prolonged radiation dose and biological damage to the patient's healthy cells.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "In a nuclear fission reactor, uranium-235 nuclei are split by absorbing a neutron. Explain the mechanism of a \"chain reaction\" in this context, and conceptually why the newly released neutrons must be slowed down (moderated) to sustain the reaction in U-235. (3 steps)", "answer": "- Step 1: When a U-235 nucleus absorbs a neutron, it becomes unstable and splits into two smaller daughter nuclei, releasing a large amount of energy and 2 or 3 additional fast-moving neutrons.\n- Step 2: These newly released neutrons can then go on to be absorbed by other U-235 nuclei, causing them to split and release even more neutrons, creating a self-sustaining \"chain reaction.\"\n- Step 3: The released neutrons are initially moving too fast to be easily absorbed by other U-235 nuclei; they must be slowed down (moderated) because slower neutrons spend more time in the vicinity of a nucleus, significantly increasing the probability of absorption (the absorption cross-section).", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": true}, {"question": "Nuclear fusion involves combining two light nuclei (like hydrogen isotopes) into a heavier nucleus. Explain why this process requires extreme temperatures and pressures, specifically referencing the electromagnetic force. (3 steps)", "answer": "- Step 1: All atomic nuclei are positively charged due to their protons, which means they experience a strong electrostatic repulsion (the Coulomb force) when brought close together.\n- Step 2: To overcome this Coulomb barrier and get the nuclei close enough for the attractive strong nuclear force to bind them together, they must collide with immense kinetic energy.\n- Step 3: Extreme temperatures provide the particles with this high kinetic energy, while extreme pressures force the nuclei close together, increasing the collision frequency and the probability of fusion occurring.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "A student measures the count rate of a weak radioactive source using a Geiger-Müller tube and records 45 counts per minute. The background radiation in the room is 20 counts per minute. Calculate the corrected count rate and explain conceptually why failing to subtract background radiation leads to a massive percentage error for weak sources, but a negligible error for highly active sources. (3 steps)", "answer": "- Step 1: The corrected count rate is found by subtracting the background radiation from the measured count rate: $$45 - 20 = 25$$ counts per minute.\n- Step 2: For a weak source, the background radiation is a large fraction of the total signal.\n+ Failing to subtract the background (20) from the total (45) would overestimate the source's true activity (25) by a massive 80%.\n- Step 3: For a highly active source (e.g., 10,000 counts per minute), the background radiation of 20 represents only 0.2% of the total.\n+ In this limiting case, the error introduced by ignoring the background is practically negligible.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "In nuclear physics, radioactive decay is described as both \"random\" and \"spontaneous\". Clearly distinguish between these two terms by providing a specific physical example of what each term means in the context of a decaying nucleus. (2 steps)", "answer": "- Step 1: \"Random\" means that it is impossible to predict exactly *which* specific nucleus in a sample will decay next, or the exact *time* at which an individual nucleus will decay; it is governed purely by probability.\n- Step 2: \"Spontaneous\" means that the rate of decay (the probability of decay per unit time) cannot be altered or influenced by any external environmental factors, such as changing the temperature, applying high pressure, or altering the chemical bonds of the atom.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "The activity $$A$$ of a sample is given by the equation $$A = \\lambda N$$. Define the decay constant $$\\lambda$$ conceptually, and explain why a highly radioactive sample (high $$A$$) doesn't necessarily mean the isotope has a large decay constant. (3 steps)", "answer": "- Step 1: The decay constant $$\\lambda$$ is defined as the probability that a single, specific nucleus will decay per unit time (usually per second).\n- Step 2: The activity $$A$$ represents the total number of decays happening in the entire sample per unit time, which depends on both the probability of individual decay ($$\\lambda$$) and the total number of undecayed nuclei present ($$N$$).\n- Step 3: Therefore, a sample can have a very high activity (high $$A$$) simply because it contains a massive number of radioactive atoms (huge $$N$$), even if the intrinsic probability of any single atom decaying ($$\\lambda$$) is very small (meaning it has a long half-life).", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": true}, {"question": "Write the general nuclear equation for the alpha decay of a parent nucleus $$^A_Z X$$. Explain why the sum of the mass numbers and the sum of the atomic numbers must be equal on both sides of the equation. (3 steps)", "answer": "- Step 1: The general equation is: $$^A_Z X \\rightarrow ^{A-4}_{Z-2} Y + ^4_2 \\alpha$$ (or $$^4_2 He$$).\n- Step 2: The sum of the top numbers (mass numbers) must be equal on both sides ($$A = (A-4) + 4$$) to satisfy the conservation of nucleon number, meaning the total number of protons and neutrons is conserved.\n- Step 3: The sum of the bottom numbers (atomic numbers) must be equal ($$Z = (Z-2) + 2$$) to satisfy the conservation of electrical charge, ensuring the total positive charge of the protons remains constant.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "In the nuclear equation for beta-minus decay, the emitted electron is written as $$^0_{-1} e$$. Explain why the atomic number (bottom number) is -1, and how this ensures the conservation of charge when a neutron ($$^1_0 n$$) turns into a proton ($$^1_1 p$$). (3 steps)", "answer": "- Step 1: In nuclear equations, the bottom number represents the electrical charge of the particle relative to the elementary charge $$e$$, not just the number of protons.\n- Step 2: An electron has a charge of $$-1e$$, so it is assigned an atomic number of -1 to reflect this negative charge in the balancing equation.\n- Step 3: When a neutral neutron ($$^1_0 n$$) decays into a positive proton ($$^1_1 p$$), the bottom numbers must balance: $$0 = 1 + (-1)$$, which perfectly demonstrates the conservation of electrical charge.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "When a stationary heavy nucleus undergoes alpha decay, it splits into an alpha particle and a heavier daughter nucleus. Using conservation of momentum, explain conceptually why the alpha particle carries away the vast majority of the released kinetic energy, despite both particles having the same magnitude of momentum. (4 steps)", "answer": "- Step 1: Since the parent nucleus is initially stationary, the total initial momentum is zero.\n+ By conservation of momentum, the alpha particle and the daughter nucleus must move in opposite directions with equal and opposite momenta ($$p_\\alpha = p_{daughter}$$).\n- Step 2: The kinetic energy of a particle can be expressed in terms of momentum and mass using the formula $$KE = \\frac{p^2}{2m}$$.\n- Step 3: Because both particles have the exact same magnitude of momentum ($$p$$), the kinetic energy is inversely proportional to the mass of the particle ($$KE \\propto \\frac{1}{m}$$).\n- Step 4: Since the mass of the alpha particle is vastly smaller than the mass of the heavy daughter nucleus ($$m_\\alpha \\ll m_{daughter}$$), the alpha particle must possess a vastly larger kinetic energy.\n+ This is why the alpha particle carries away almost all the kinetic energy, while the heavy daughter nucleus merely recoils slowly.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "In the core practical investigating the absorption of gamma rays by lead, the distance between the source and the GM tube is kept constant. Explain what unwanted variable would be introduced if this distance changed, and how it would affect the count rate independently of the lead's absorption. (3 steps)", "answer": "- Step 1: Gamma radiation spreads out radially from a point source, meaning its intensity follows the inverse square law ($$I \\propto \\frac{1}{r^2}$$).\n- Step 2: If the distance ($$r$$) between the source and the detector were to increase, the count rate would drop significantly simply because the radiation is spreading over a larger area, not because it is being absorbed.\n- Step 3: Therefore, distance must be strictly controlled as a constant variable; otherwise, you would not be able to determine whether a drop in count rate was caused by the lead absorbers or simply by the source moving further away.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "When handling radioactive sources for the gamma absorption practical, safety guidelines dictate using tongs and keeping the source as far away as reasonably practicable. Explain the physical law that makes distance such an effective safety measure against gamma radiation in air. (3 steps)", "answer": "- Step 1: Gamma rays travel in straight lines and spread out uniformly in three dimensions from a point source.\n- Step 2: This geometric spreading means the intensity of the radiation is inversely proportional to the square of the distance from the source ($$I \\propto \\frac{1}{r^2}$$).\n- Step 3: Consequently, simply doubling the distance between yourself and the source reduces the radiation intensity (and your exposure dose) to one-quarter of its original value, making distance a highly effective and immediate safety shield.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": true}, {"question": "Both nuclear fission (splitting heavy nuclei) and nuclear fusion (joining light nuclei) release massive amounts of energy. Conceptually, what property of the resulting nuclei in both processes explains why energy is released in both seemingly opposite reactions? (3 steps)", "answer": "- Step 1: The stability of a nucleus is determined by its binding energy per nucleon; a higher binding energy per nucleon means the nucleus is more tightly bound and stable.\n- Step 2: In both fission (splitting very heavy elements like Uranium) and fusion (joining very light elements like Hydrogen), the resulting product nuclei have a higher binding energy per nucleon than the original reactant nuclei.\n- Step 3: This increase in binding energy corresponds to a decrease in total mass (mass defect); the \"missing\" mass is converted into a massive release of kinetic energy according to Einstein's equation $$E = \\Delta m c^2$$.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "A student plots a graph of count rate against time for a radioactive source and notices the exponential decay curve does not approach zero, but instead levels off at a constant positive value on the y-axis. Explain what this non-zero asymptote represents and how the student should process their raw data to find the true half-life. (3 steps)", "answer": "- Step 1: The non-zero asymptote represents the constant background radiation present in the environment, which the Geiger-Müller tube detects alongside the source's radiation.\n- Step 2: To find the true half-life, the student must subtract this background count rate value from every single raw data point recorded during the experiment.\n- Step 3: Plotting these new \"corrected count rates\" against time will yield a true exponential decay curve that approaches zero, allowing the student to accurately read the time it takes for the source's activity to halve.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "While alpha, beta, and gamma are the primary types of decay, neutron emission can also occur. In what specific type of nuclear reaction is neutron emission most commonly observed, and why is it crucial for the sustainability of that reaction? (2 steps)", "answer": "- Step 1: Neutron emission is most commonly observed during nuclear fission, where a heavy nucleus (like U-235) splits into two smaller daughter
