 a **single** large nucleus. The neutron is uncharged, so there is **no Coulomb barrier** to overcome. The nucleus is already unstable (too large to be held together stably by the strong force), so absorbing a neutron tips it over the edge and it splits. No extreme temperature or pressure is needed — the nucleus does the work internally once the neutron is captured.\n- Step 3: The fundamental asymmetry: fusion requires overcoming repulsion between *two* positive nuclei (external energy needed), while fission exploits the *internal* instability of an already-assembled, overly large nucleus (triggered by a neutral particle that faces no barrier).\n\nKey takeaway: Fusion is hard because you must push positive charges together against Coulomb repulsion. Fission is easier because a charge-free neutron can enter the nucleus without resistance, and the nucleus is already unstable.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "A hydrogen bomb (thermonuclear weapon) uses fusion, but it is triggered by a fission explosion. Why can't fusion be triggered without first using fission? (2 steps)", "answer": "- Step 1: Fusion requires temperatures of millions of degrees and enormous pressures — conditions that do not exist in conventional environments. A fission explosion (like the \"primary\" in a hydrogen bomb) generates precisely these extreme conditions: temperatures of tens of millions of degrees and intense compression from the X-ray radiation.\n- Step 2: No other practical method exists to create these conditions in a weapon-sized package. The fission \"spark\" provides the energy to overcome the Coulomb barrier for the hydrogen isotopes (deuterium and tritium), initiating fusion. Once started, the fusion reaction releases far more energy than the initial fission trigger, which is why hydrogen bombs are far more powerful than pure fission weapons.\n\nKey takeaway: The fission stage is the \"match\" that lights the fusion \"bonfire\" — fusion needs extreme conditions that only a fission explosion can practically create in a weapon.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": true}, {"question": "A stationary uranium-238 nucleus (mass 238u) undergoes alpha decay, emitting an alpha particle (mass 4u). By conservation of momentum, the thorium-234 daughter nucleus must recoil. If the alpha particle moves with velocity $$v_\\alpha$$, what is the recoil velocity of the thorium nucleus? Express it in terms of $$v_\\alpha$$. (3 steps)", "answer": "- Step 1: Before decay, the nucleus is stationary, so total momentum = 0. By conservation of momentum, the total momentum after decay must also = 0. So: $$m_{Th} v_{Th} + m_\\alpha v_\\alpha = 0$$, meaning the thorium and alpha move in **opposite directions**.\n- Step 2: Substitute the masses: $$234 \\times v_{Th} + 4 \\times v_\\alpha = 0$$, so $$v_{Th} = -\\frac{4 v_\\alpha}{234} = -\\frac{2 v_\\alpha}{117}$$. The negative sign confirms opposite direction.\n- Step 3: The recoil velocity of thorium is approximately $$\\frac{4}{234} \\approx \\frac{1}{58.5}$$ times the alpha velocity, in the opposite direction. Because thorium is ~58.5 times heavier, it recoils ~58.5 times **slower** than the alpha. This is the nuclear physics equivalent of a cannon — the heavy nucleus (cannon) recoils slowly while the light alpha (cannonball) flies out fast.\n\nKey takeaway: Conservation of momentum forces the heavy daughter nucleus to recoil slowly in the opposite direction to the light alpha particle. The mass ratio determines the velocity ratio.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "In the alpha decay of a stationary uranium-238 nucleus, the total kinetic energy released is E. How does this energy E split between the alpha particle and the recoiling thorium-234 nucleus? Which particle carries most of the kinetic energy, and why? (3 steps)", "answer": "- Step 1: The total kinetic energy is $$E = \\frac{1}{2} m_\\alpha v_\\alpha^2 + \\frac{1}{2} m_{Th} v_{Th}^2$$. We need to express this in terms of one velocity using the momentum relation. From momentum conservation: $$m_{Th} v_{Th} = m_\\alpha v_\\alpha$$, so $$v_{Th} = \\frac{m_\\alpha v_\\alpha}{m_{Th}}$$.\n- Step 2: Substitute into the thorium's kinetic energy: $$KE_{Th} = \\frac{1}{2} m_{Th} \\left(\\frac{m_\\alpha v_\\alpha}{m_{Th}}\\right)^2 = \\frac{1}{2} \\frac{m_\\alpha^2 v_\\alpha^2}{m_{Th}}$$. Meanwhile, the alpha's KE is $$KE_\\alpha = \\frac{1}{2} m_\\alpha v_\\alpha^2$$. The ratio is: $$\\frac{KE_{Th}}{KE_\\alpha} = \\frac{m_\\alpha}{m_{Th}} = \\frac{4}{234} \\approx \\frac{1}{58.5}$$.\n- Step 3: The thorium carries only about **1.7%** of the total kinetic energy, while the alpha particle carries about **98.3%**. This is because kinetic energy depends on $$v^2$$, and the lighter alpha moves much faster. In any two-body decay from rest, the lighter fragment carries almost all the kinetic energy — the heavy fragment's kinetic energy is negligible by comparison.\n\nKey takeaway: In alpha decay from a stationary nucleus, the light alpha particle carries nearly all the kinetic energy. The heavy daughter's recoil energy is tiny because its velocity is small (inversely proportional to its mass).", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": true}, {"question": "A common exam trick: a graph of count rate vs. time for a radioactive sample shows the curve levelling off at a count rate of 12 counts per minute, not zero. A student calculates the half-life by finding where the count rate is half the *initial* value. What mistake have they made? (3 steps)", "answer": "- Step 1: The graph's asymptote at 12 counts per minute is the **background radiation** level. The curve never reaches zero because the Geiger counter always detects environmental radiation regardless of the source.\n- Step 2: The student's mistake is using the **raw** count rate (which includes background) to find the half-life. The half-life should be found from the **corrected** count rate (raw minus background). The initial corrected count rate is (initial raw − 12), and the half-life is the time for the corrected count rate to halve.\n- Step 3: If the initial raw count is 112, the corrected initial is 100. Half-life is when corrected = 50, which corresponds to a raw reading of 50 + 12 = 62 counts per minute. Finding the time when raw = 56 (half of 112) would give the **wrong** answer because it doesn't account for the constant background offset.\n\nKey takeaway: Always subtract background before reading half-life from a graph. The half-life is the time for the *source's* count rate to halve, not the *total* count rate.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": true}, {"question": "A student claims that \"after two half-lives, all the radioactive nuclei have decayed.\" Why is this wrong, and what is the correct statement? (2 steps)", "answer": "- Step 1: After each half-life, **half** of the *remaining* nuclei decay. After one half-life, half remain ($$N_0/2$$). After two half-lives, half of those half remain ($$N_0/4$$). After three, $$N_0/8$$. The number never reaches zero — it keeps halving but never vanishes entirely.\n- Step 2: The correct statement is: after two half-lives, **three-quarters** (75%) of the original nuclei have decayed, and **one-quarter** (25%) remain. In principle, there will always be some undecayed nuclei (though in practice, when N becomes very small, statistical fluctuations dominate and eventually the last nucleus will decay).\n\nKey takeaway: Each half-life halves what remains — it doesn't subtract a fixed amount. The number of undecayed nuclei approaches zero asymptotically but never mathematically reaches it.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": true}, {"question": "Carbon-14 in living organisms is constantly replenished, but in dead organisms it decays with a half-life of ~5700 years. Why does the carbon-14 level stay \"almost constant\" in living things, and what happens when the organism dies? (2 steps)", "answer": "- Step 1: Living organisms continuously exchange carbon with the environment (eating, breathing, photosynthesis). This keeps the ratio of carbon-14 to carbon-12 **almost constant** — any carbon-14 that decays is replaced by new carbon-14 from the environment. The organism is in **equilibrium** with the atmospheric carbon-14 level.\n- Step 2: When the organism dies, it stops exchanging carbon with the environment. The carbon-14 already in its remains now decays with no replenishment. The carbon-14 level decreases exponentially with a half-life of ~5700 years. By measuring the remaining carbon-14 fraction compared to the atmospheric baseline, scientists can estimate how long ago the organism died — this is the basis of **radiocarbon dating**.\n\nKey takeaway: Carbon-14 dating works because death \"freezes\" the carbon-14 clock — the equilibrium is broken and decay proceeds unchecked.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "A student says \"beta particles are electrons, so they come from the electron shells around the atom.\" Identify the misconception and explain where beta particles actually originate. (2 steps)", "answer": "- Step 1: The misconception is that beta particles are orbital electrons ejected from the atom's electron cloud. This is wrong — beta particles originate from the **nucleus**, not the electron shells.\n- Step 2: In beta-minus decay, a **neutron inside the nucleus** converts into a proton, an electron (the beta particle), and an antineutrino. The electron is **created** in this process — it did not exist beforehand. It is emitted from the nucleus with high kinetic energy, which is why it is far more energetic than orbital electrons. The beta particle is a *new* particle born from the nuclear transformation, not a pre-existing electron.\n\nKey takeaway: Beta particles are nuclear in origin — they are created when a neutron decays inside the nucleus. They are not stripped from the electron cloud.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": true}, {"question": "A sample contains two radioactive isotopes: isotope X with a short half-life and isotope Y with a long half-life. The measured activity over time initially drops rapidly, then levels off to a slow, steady decline. Explain this shape. (3 steps)", "answer": "- Step 1: Initially, the **short-lived isotope X** dominates the measured activity because it has a large decay constant (high activity per nucleus). It decays rapidly, causing the count rate to drop steeply in the first part of the graph.\n- Step 2: After X has largely decayed away (many half-lives of X have passed), the **long-lived isotope Y** becomes the dominant contributor. Since Y has a small decay constant, its activity decreases very slowly, giving the gradual, almost flat decline in the later part of the graph.\n- Step 3: The transition between the two regimes occurs when the activity of X falls below the activity of Y. Before this point, the graph looks like X's decay curve; after it, the graph looks like Y's decay curve. This two-component decay is common in real samples and explains why the overall curve is not a single simple exponential.\n\nKey takeaway: A non-single-exponential decay curve suggests multiple isotopes with different half-lives. The steep early drop is the short-lived component; the gentle later decline is the long-lived component.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": false}, {"question": "In the core practical on gamma absorption, the independent variable is the thickness of lead and the dependent variable is the count rate. List three control variables and explain why each must be kept constant. (3 steps)", "answer": "- Step 1: **Distance from source to detector** must be kept constant. If the distance changes, the intensity of radiation reaching the detector changes (approximately following the inverse square law for a point source), which would confound the effect of the lead thickness.\n- Step 2: **The same radioactive source** must be used throughout. Different sources have different activities and emit different types/intensities of radiation. Even the same source's activity changes over time (it decays), so the experiment should be completed quickly relative to the source's half-life.\n- Step 3: **Location / background radiation level** must be constant. Background radiation varies with location (radon levels, proximity to building materials). If you move the apparatus, the background level could change, introducing a systematic error in the corrected count rate.\n\nKey takeaway: Fair testing requires changing only the independent variable. Distance, source identity, and location are the critical controls in this practical.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "Why is a source with a **long** half-life preferred for the gamma absorption practical? What problem would a short half-life source cause? (2 steps)", "answer": "- Step 1: A source with a **long half-life** has a nearly constant activity during the experiment. The count rate barely changes over the time it takes to complete all measurements, so any changes in count rate can be confidently attributed to the changing lead thickness, not to the source itself decaying.\n- Step 2: A source with a **short half-life** would have its activity decrease significantly during the experiment. This would introduce a **systematic error**: the count rate would drop not only because the lead absorbs more radiation, but also because the source is getting weaker. You would not be able to separate these two effects, making the results unreliable.\n\nKey takeaway: Long half-life ≈ constant activity ≈ one fewer confounding variable. The experiment assumes the source's output is stable throughout.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "A nuclear equation shows: $$^{238}_{92}U \\rightarrow ^{234}_{90}Th + ^{4}_{2}He$$. A student says the helium nucleus on the right is just a regular helium atom. What is wrong with this statement? (2 steps)", "answer": "- Step 1: The particle $$^{4}_{2}He$$ written in the nuclear equation is a **helium nucleus** (also called an alpha particle), not a helium **atom**. It has 2 protons and 2 neutrons but **no electrons**. A helium atom would be written differently — it would include 2 orbital electrons and be electrically neutral.\n- Step 2: In nuclear equations, all particles represent **nuclei** or **nuclear particles** only — the equations deal with what happens inside the nucleus. Electrons only appear as beta particles (which are created in the nucleus during beta decay). The alpha particle is a bare nucleus with charge +2e, not a neutral atom.\n\nKey takeaway: Nuclear equations describe nuclei, not atoms. An alpha particle is a helium *nucleus*, not a helium *atom* — it has no electron cloud.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": false}, {"question": "Is it possible for a nucleus to undergo both alpha and beta decay? Can a nucleus emit gamma rays *at the same time* as an alpha particle? Explain. (3 steps)", "answer": "- Step 1: Yes, a nucleus can undergo **both** alpha and beta decay, but typically not simultaneously. Many radioactive decay series involve a sequence of alpha and beta decays (e.g., uranium-238 decays through a series of both). Each individual decay event is either alpha or beta — one nucleus decays by one mechanism at a time.\n- Step 2: However, after an alpha or beta decay, the daughter nucleus is often left in an **excited state** (with excess energy). It then releases this energy by emitting a **gamma ray**. So gamma emission frequently *accompanies* alpha or beta decay, but it is technically a separate step — the alpha/beta emission happens first, then the daughter nucleus de-excites by gamma emission.\n- Step 3: In practice, the gamma emission often happens so quickly after the alpha/beta decay (typically within nanoseconds) that it appears simultaneous. But they are distinct processes: alpha/beta changes the nucleus's composition; gamma changes only its energy state.\n\nKey takeaway: Alpha and beta decays are sequential (one nucleus, one mechanism at a time). Gamma emission often follows immediately as the daughter nucleus de-excites, but it is a separate physical process.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "A question gives you a decay sequence: nucleus P undergoes alpha decay to Q, then Q undergoes beta decay to R. If P has Z = 92 and A = 238, what are Z and A for R? Walk through each step. (3 steps)", "answer": "- Step 1: **Alpha decay of P → Q:** Z decreases by 2, A decreases by 4. So Q has Z = 92 − 2 = 90, A = 238 − 4 = 234. Q is $$^{234}_{90}$$Th.\n- Step 2: **Beta decay of Q → R:** Z increases by 1, A stays the same. So R has Z = 90 + 1 = 91, A = 234. R is $$^{234}_{91}$$Pa.\n- Step 3: Verify: the net change from P to R is Z: 92 → 91 (−1), A: 238 → 234 (−4). This is equivalent to one alpha decay (−2, −4) plus one beta decay (+1, 0), giving net (−1, −4). The element has changed from uranium (Z=92) to protactinium (Z=91).\n\nKey takeaway: Track each decay step individually — alpha changes both A and Z, beta changes only Z, gamma changes neither.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": false}, {"question": "Why does the activity equation $$A = \\lambda N$$ have a **minus sign** in the differential form $$A = -\\frac{dN}{dt} = \\lambda N$$? What would happen physically if the sign were positive? (2 steps)", "answer": "- Step 1: The minus sign indicates that N is **decreasing** over time — nuclei are being lost (decaying). $$\\frac{dN}{dt}$$ is the *rate of change* of N, and since N is falling, $$\\frac{dN}{dt}$$ is negative. The activity A (a positive quantity, representing the number of decays per second) is the **magnitude** of this rate: $$A = -\\frac{dN}{dt} = \\lambda N$$.\n- Step 2: If the sign were positive ($$\\frac{dN}{dt} = +\\lambda N$$), the equation would say \"the number of nuclei is **increasing** exponentially\" — nuclei would be appearing from nowhere, which violates conservation of nucleon number. The positive sign would describe a process of creation, not decay. The minus sign is essential to describe a **diminishing** quantity.\n\nKey takeaway: The minus sign encodes the physical reality that radioactive decay *reduces* the number of undecayed nuclei. Activity is the positive magnitude of this negative rate of change.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": true}, {"question": "A student measures the count rate from a source and gets 200 counts per minute. The background is 20 cpm. They wait one half-life and measure again, getting 120 cpm. They calculate the half-life as correct because 120 is \"roughly half of 200.\" Evaluate this reasoning. (3 steps)", "answer": "- Step 1: The student must use **corrected** count rates. Initial corrected count = 200 − 20 = 180 cpm. After one half-life, corrected count should be 180/2 = 90 cpm, giving a raw count of 90 + 20 = 110 cpm.\n- Step 2: The student measured 120 cpm raw, which gives a corrected count of 120 − 20 = 100 cpm. This is close to but not exactly 90 cpm — the discrepancy could be due to random fluctuations in the count rate (nuclear decay is random, so individual minute-long counts vary).\n- Step 3: The student's reasoning is **flawed** because they used the raw count (200 → 120) without subtracting background. They claimed \"120 is roughly half of 200,\" but half of 200 is 100, and 120 ≠ 100. The correct approach is to always subtract background first, then check if the corrected count has halved. The background of 20 cpm makes a significant difference when the source's count rate is not hugely larger than background.\n\nKey takeaway: Always correct for background *before* checking half-life. The raw count rate does not halve — the *source's* count rate (raw minus background) halves.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "In the ESAT-style problem discussed in the lesson, a stationary uranium-238 nucleus undergoes alpha decay. The total kinetic energy released is E. Using momentum conservation and energy conservation, express the kinetic energy of the alpha particle in terms of E. Walk through the key algebraic steps conceptually. (4 steps)", "answer": "- Step 1: Set up the two conservation laws. Momentum: $$m_{Th}v_{Th} = m_\\alpha v_\\alpha$$ (from rest, total momentum = 0, so momenta are equal and opposite). Energy: $$E = \\frac{1}{2}m_\\alpha v_\\alpha^2 + \\frac{1}{2}m_{Th}v_{Th}^2$$ (total KE = E).\n- Step 2: From momentum conservation, express $$v_{Th}$$ in terms of $$v_\\alpha$$: $$v_{Th} = \\frac{m_\\alpha}{m_{Th}} v_\\alpha = \\frac{4}{234}v_\\alpha$$.\n- Step 3: Substitute into the thorium's KE: $$KE_{Th} = \\frac{1}{2}(234)\\left(\\frac{4}{234}v_\\alpha\\right)^2 = \\frac{1}{2}\\cdot\\frac{16}{234}v_\\alpha^2$$. The alpha's KE is $$KE_\\alpha = \\frac{1}{2}(4)v_\\alpha^2 = 2v_\\alpha^2$$. So $$E = KE_\\alpha + KE_{Th} = 2v_\\alpha^2 + \\frac{8}{234}v_\\alpha^2 = 2v_\\alpha^2\\left(1 + \\frac{4}{234}\\right) = 2v_\\alpha^2 \\cdot \\frac{238}{234}$$.\n- Step 4: Since $$KE_\\alpha = 2v_\\alpha^2$$ and $$E = 2v_\\alpha^2 \\cdot \\frac{238}{234}$$, we get $$KE_\\alpha = E \\cdot \\frac{234}{238}$$. The alpha particle carries $$\\frac{234}{238} \\approx 98.3\\%$$ of the total energy E. The thorium recoil carries only $$\\frac{4}{238} \\approx 1.7\\%$$ of E.\n\nKey takeaway: In nuclear decay from rest, the lighter fragment carries almost all the energy. The exact fraction is $$\\frac{m_{Th}}{m_{Th} + m_\\alpha} = \\frac{234}{238}$$ for the alpha, and $$\\frac{m_\\alpha}{m_{Th} + m_\\alpha} = \\frac{4}{238}$$ for the thorium.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": true}, {"question": "A question asks which of the following decay sequences could transform $$^{211}_{83}Bi$$ into $$^{207}_{82}Pb$$: (A) 1 alpha, (B) 1 alpha + 1 beta, (C) 1 alpha + 2 beta, (D) 1 alpha + 3 beta. How do you systematically determine which is correct? (3 steps)", "answer": "- Step 1: Calculate the **net change** in A and Z required. Going from Bi (A=211, Z=83) to Pb (A=207, Z=82): ΔA = 207 − 211 = −4, ΔZ = 82 − 83 = −1.\n- Step 2: Each alpha decay contributes ΔA = −4, ΔZ = −2. Each beta decay contributes ΔA = 0, ΔZ = +1. With 1 alpha: ΔA = −4, ΔZ = −2. We need ΔZ = −1, so we need an additional +1 change in Z, which is exactly 1 beta decay.\n- Step 3: Check: 1 alpha (ΔA = −4, ΔZ = −2) + 1 beta (ΔA = 0, ΔZ = +1) = total (ΔA = −4, ΔZ = −1). This matches the required change. The answer is **(B) 1 alpha + 1 beta**.\n\nKey takeaway: Work backwards from the required net change. Alpha gives (−4, −2), beta gives (0, +1). Find the combination of these that produces the target (ΔA, ΔZ).", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": true}, {"question": "Why is it incorrect to say \"alpha radiation cannot harm human cells\"? Under what specific condition does alpha radiation become the most dangerous type? (2 steps)", "answer": "- Step 1: Alpha radiation **can** harm human cells — it is the *most* ionising type of radiation, causing intense damage to any cells it passes through. The statement is only true if the alpha source is **outside the body**, because alpha particles are stopped by the dead outer layer of skin and cannot reach living cells.\n- Step 2: If an alpha-emitting substance is **ingested or inhaled** (e.g., radon gas), the alpha particles directly irradiate living internal tissue with no protective barrier. In this scenario, alpha radiation is the **most dangerous** type because it deposits all its energy in a tiny volume, causing concentrated, severe cell damage. The danger depends entirely on whether the radiation can reach living cells.\n\nKey takeaway: \"Alpha can't harm cells\" is only true for external sources stopped by skin. Internally, alpha is the most harmful due to its high ionising power and short range concentrating damage.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "A radioactive source has an activity of 800 Bq and a half-life of 6 hours. What is its activity after 24 hours? Do this using the half-life method (not the exponential equation). (2 steps)", "answer": "- Step 1: Number of half-lives in 24 hours = 24/6 = 4 half-lives.\n- Step 2: After each half-life, activity halves: after 4 half-lives, $$A = 800 \\times \\left(\\frac{1}{2}\\right)^4 = 800 \\times \\frac{1}{16} = 50$$ Bq.\n\nKey takeaway: For integer numbers of half-lives, simply halve repeatedly. Activity follows the same exponential law as N: $$A = A_0 \\times (1/2)^n$$ where n = number of half-lives.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": false}, {"question": "The mass of a radioactive sample decreases over time due to decay. Does the mass follow the same half-life as the number of nuclei? Why? (2 steps)", "answer": "- Step 1: Yes, the mass follows the **same half-life** as the number of nuclei. Since each nucleus has (approximately) the same mass, and the mass of the sample is proportional to the number of nuclei ($$m = N \\times m_{\\text{nucleus}}$$), the mass decays with the same exponential form: $$m = m_0 e^{-\\lambda t}$$.\n- Step 2: The half-life of the mass is therefore identical to the half-life of N, since they are related by a constant factor. Whether you measure N, activity A, or mass m, you get the same half-life. This is why we can use \"the time for the mass to halve\" as a valid definition of half-life.\n\nKey takeaway: N, A, and mass all decay with the same half-life because they are all proportional to each other. The exponential constant $$\\lambda$$ is a property of the isotope, not of which quantity you measure.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "What is the difference between the **mean lifetime** $$\\tau = 1/\\lambda$$ and the **half-life** $$t_{1/2} = \\ln 2 / \\lambda$$? Which is longer, and why? (2 steps)", "answer": "- Step 1: The **mean lifetime** $$\\tau = 1/\\lambda$$ is the average time a nucleus exists before decaying. The **half-life** $$t_{1/2} = \\ln 2 / \\lambda$$ is the time for half the nuclei in a sample to decay. Since $$\\ln 2 \\approx 0.693 < 1$$, we have $$t_{1/2} = 0.693\\tau$$, so the half-life is **shorter** than the mean lifetime.\n- Step 2: The reason the mean lifetime is longer is that the exponential decay distribution has a **long tail** — some nuclei survive much longer than the half-life. These \"long-lived\" nuclei pull the average (mean) lifetime above the median (half-life, which is the time by which 50% have decayed). In an exponential distribution, the mean is always larger than the median by a factor of $$1/\\ln 2 \\approx 1.44$$.\n\nKey takeaway: Half-life = median survival time; mean lifetime = average survival time. Mean lifetime ≈ 1.44 × half-life. The long tail of the exponential distribution makes the mean exceed the median.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "A Geiger counter, photographic film badge, and scintillation counter are all radiation detectors. Briefly explain the principle behind how each one detects radiation. (3 steps)", "answer": "- Step 1: **Geiger-Müller (GM) tube:** Radiation enters the tube and ionises the gas inside. The ions and electrons produced are attracted to electrodes, creating a pulse of current. Each pulse corresponds to one ionising event (one decay detected). The counter tallies these pulses.\n- Step 2: **Photographic film badge:** Radiation causes chemical changes in the film (similar to visible light exposing film). The degree of darkening indicates the total radiation dose received. Workers wear these badges to monitor cumulative exposure over time.\n- Step 3: **Scintillation counter:** Radiation strikes a special material (scintillator) that emits a tiny flash of light (scintillation) when energy is deposited. A photomultiplier tube detects and amplifies these light flashes, converting them to electrical signals. This method is very sensitive and can measure individual photon/particle energies.\n\nKey takeaway: All detectors work by sensing the **ionisation or excitation** that radiation causes in matter — whether in gas (GM), in photographic chemicals (film), or in a crystal (scintillator).", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}], "count": 54}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "What is \"background radiation,\" and why must a physicist account for it before measuring any radioactive source's count rate? (2 steps)", "answer": "- Step 1: Background radiation is the low-level radiation always present in the environment from both natural and artificial sources. It means that even with no radioactive sample nearby, a Geiger-Müller tube will still register counts — this is the \"baseline\" the world gives you for free.\n- Step 2: When measuring a source, the raw count rate includes both the source's radiation *and* background. To find the true source activity, you must subtract the background count rate (measured with no source present) from the raw reading. This gives the **corrected count rate**: $$\\text{Corrected count rate} = \\text{Measured count rate} - \\text{Background count rate}$$\n\nTakeaway: Background radiation is the ever-present noise you must subtract to isolate the signal from your source.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A student measures 15 counts per minute with no source, then 100 counts per minute with a source present. What is the corrected count rate, and why is this subtraction necessary rather than just reporting the raw 100? (2 steps)", "answer": "- Step 1: The corrected count rate is $$100 - 15 = 85 \\text{ counts/min}$$ — this is the radiation attributable *only* to the source.\n- Step 2: The raw 100 includes 15 counts that were happening anyway (from cosmic rays, radon, etc.). If you reported 100, you'd be overstating the source's activity. Without correction, you conflate environmental noise with the phenomenon you're studying.\n\nTakeaway: Always subtract background — it's the same logic as zeroing a scale before weighing.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "Name two natural sources of background radiation and briefly explain *why* each produces radiation. Which natural source is considered the most dangerous to humans, and why? (3 steps)", "answer": "- Step 1: Two natural sources:\n+ **Radon gas** — heavy radioactive elements (uranium, thorium) in rocks decay into radon, which is an alpha emitter. Being gaseous, it seeps out of the ground and can accumulate in buildings.\n+ **Cosmic rays** — high-energy protons from the Sun (and supernovae) enter the atmosphere and collide with air molecules, producing gamma radiation and other secondary particles.\n- Step 2: Radon gas is considered the most dangerous natural source because it is an alpha emitter that can be inhaled into the lungs. Alpha radiation is highly ionising but normally can't penetrate skin — however, *inside* the body, there's no skin barrier, so alpha can directly damage lung tissue.\n- Step 3: Other natural sources include carbon-14 in organic matter (all living things contain trace $$^{14}\\text{C}$$) and potassium-40 in foods like bananas — but these contribute minuscule, harmless doses.\n\nTakeaway: Radon is the standout danger because alpha + inhalation = no protective barrier + high ionising power.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "Name two man-made sources of background radiation. How does the contribution of nuclear accidents (like Chernobyl) differ in character from medical sources, even though both are \"man-made\"? (2 steps)", "answer": "- Step 1: Two man-made sources:\n+ **Medical sources** — X-rays, CT scans, radioactive tracers, and radiation therapy deliberately use radiation for diagnosis/treatment.\n+ **Nuclear fallout / accidents** — residual radioactive material from weapons testing or reactor accidents (e.g., Chernobyl) that disperses into the environment.\n- Step 2: Medical sources are *controlled, intentional, and localised* — the dose is administered to a specific person for a specific purpose. Nuclear accidents are *uncontrolled, unintentional, and widespread* — they release large quantities of radiation into the environment, affecting populations and ecosystems over large areas for long periods.\n\nTakeaway: Both are anthropogenic, but medical radiation is targeted and deliberate; accident fallout is indiscriminate and uncontrolled.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "An alpha particle ($$\\alpha$$) has a specific composition. What is it, and why does this composition make alpha particles both the *most ionising* and the *least penetrating* type of nuclear radiation? (3 steps)", "answer": "- Step 1: An alpha particle consists of **2 protons and 2 neutrons** — identical to a helium nucleus, written as $$^{4}_{2}\\alpha$$ or $$^{4}_{2}\\text{He}$$. It has a charge of $$+2e$$ and a relatively large mass ($$\\approx 4\\text{u}$$).\n- Step 2: **Most ionising** — because of its large charge ($$+2e$$) and large mass, an alpha particle moves relatively slowly and interacts strongly with atoms it passes. Its strong electric field easily pulls electrons off nearby atoms, creating many ions per unit distance. Think of a big, slow, heavily-charged bulldozer ploughing through atoms.\n- Step 3: **Least penetrating** — the same reason! Because it ionises so aggressively, it loses energy rapidly with each ionisation event. It can only travel a few centimetres in air and is stopped by a single sheet of paper or human skin. All its energy is dumped into a short distance.\n\nTakeaway: High ionising power and low penetrating power are *not independent* — they are the same physical mechanism viewed from two sides. Energy deposited per unit distance is high, so total distance travelled is short.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "A beta particle ($$\\beta^{-}$$) is emitted from the nucleus. What exactly is it, and why does it have an atomic number of $$-1$$ in nuclear equations? What process inside the nucleus actually creates it? (3 steps)", "answer": "- Step 1: A beta-minus particle is a **high-energy electron** emitted from the nucleus. It has negligible mass (compared to nucleons) and a charge of $$-1e$$.\n- Step 2: The atomic number $$Z$$ in nuclear notation counts *proton charge*. Since a beta particle carries charge $$-1e$$, it is assigned $$Z = -1$$ in decay equations so that charge balances. This is a bookkeeping convention, not a statement that electrons \"live\" in the nucleus.\n- Step 3: The beta electron is *created* when a **neutron inside the nucleus converts into a proton**: $$^{1}_{0}\\text{n} \\rightarrow ^{1}_{1}\\text{p} + ^{0}_{-1}\\beta^{-} + \\bar{\\nu}_e$$ (an antineutrino is also emitted to conserve energy and lepton number). The electron didn't exist beforehand — it is born at the moment of decay and immediately ejected.\n\nTakeaway: The $$Z = -1$$ notation is charge bookkeeping; the electron is *manufactured* by neutron-to-proton conversion, not stored in the nucleus.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "Why is beta radiation described as *moderately* ionising and *moderately* penetrating — what physical properties of the beta particle place it between alpha and gamma in both categories? (2 steps)", "answer": "- Step 1: **Moderately ionising** — a beta particle has charge $$-1e$$ (half the charge magnitude of alpha's $$+2e$$) and much less mass, so it moves faster. It still ionises atoms it passes (its electric field deflects electrons), but each interaction transfers less energy than alpha's heavy, slow collisions. It creates fewer ions per unit distance.\n- Step 2: **Moderately penetrating** — because it deposits less energy per unit distance, it can travel further before exhausting its energy. Beta particles travel roughly 20 cm to 3 m in air and are stopped by a few millimetres of aluminium. They penetrate further than alpha (stopped by paper) but far less than gamma (needs thick lead).\n\nTakeaway: Beta is the \"middle child\" — its single charge and low mass mean it interacts less violently than alpha but more than the uncharged gamma.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "What is a gamma ray ($$\\gamma$$), and why is it the *most penetrating* but *least ionising* of the three main radiation types? What material and thickness is typically needed to significantly reduce gamma intensity? (3 steps)", "answer": "- Step 1: A gamma ray is a **high-energy electromagnetic wave** (photon) emitted from a nucleus that needs to lose energy. It has **no mass and no charge**.\n- Step 2: **Least ionising** — because it has no charge, a gamma ray does not exert a Coulomb force on nearby electrons. It can only ionise atoms if it happens to pass very close and directly transfer energy to an electron (via the photoelectric effect or Compton scattering). These \"direct hits\" are rare, so gamma ionises few atoms per unit distance.\n- Step 3: **Most penetrating** — precisely because it rarely interacts, gamma rays lose energy very slowly. They can travel metres in air and require **thick lead** (several centimetres) to significantly absorb them. Even then, absorption is *exponential* — gamma intensity decreases gradually, never dropping to zero at a sharp boundary like alpha or beta.\n\nTakeaway: Gamma's neutrality means it slips through matter easily but rarely \"grabs\" electrons — low interaction rate = high penetration + low ionisation.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "A common misconception is that \"alpha radiation cannot harm human cells.\" Why is this statement *partially correct but dangerously incomplete*? Under what specific condition does alpha become the *most* dangerous type of radiation to a person? (2 steps)", "answer": "- Step 1: The statement is partially correct *externally* — alpha particles are stopped by the outer dead layer of skin, so an external alpha source cannot reach living cells. From outside the body, alpha is the least hazardous.\n- Step 2: The statement becomes dangerously wrong *internally* — if an alpha-emitting substance is **ingested, inhaled, or enters through a wound**, the alpha radiation is now inside the body with no skin barrier. Directly adjacent to living tissue, alpha's extremely high ionising power causes intense, localised damage to cells and DNA. In this scenario, alpha is the *most* dangerous radiation type.\n\nTakeaway: \"Alpha can't harm cells\" is only true from outside the body. Inside the body, alpha is the worst — context matters critically.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "When uranium-238 undergoes alpha decay, what happens to the **mass number** ($$A$$) and **atomic number** ($$Z$$) of the parent nucleus? Write the general alpha decay equation pattern and explain why the numbers must balance. (3 steps)", "answer": "- Step 1: In alpha decay, the nucleus ejects a $$^{4}_{2}\\alpha$$ particle (2 protons + 2 neutrons). The mass number decreases by 4 and the atomic number decreases by 2.\n- Step 2: The general equation pattern: $$^{A}_{Z}\\text{X} \\rightarrow ^{A-4}_{Z-2}\\text{Y} + ^{4}_{2}\\alpha$$ where X is the parent nucleus and Y is the daughter nucleus.\n- Step 3: Nuclear equations must conserve **nucleon number** and **charge** (proton number). On the left: total mass = $$A$$, total charge = $$Z$$. On the right: total mass = $$({A-4}) + 4 = A$$, total charge = $$({Z-2}) + 2 = Z$$. Both balance — this is a necessary check for any nuclear equation.\n\nTakeaway: Alpha decay shifts the nucleus down by 2 places in the periodic table and reduces its mass by 4 — always verify both mass and charge conservation.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "When a nucleus undergoes beta-minus decay, the **mass number stays the same** but the **atomic number increases by 1**. Explain the physical reason inside the nucleus that causes this specific change. (3 steps)", "answer": "- Step 1: Beta-minus decay occurs when the nucleus has **too many neutrons** relative to protons. A neutron inside the nucleus spontaneously converts: $$^{1}_{0}\\text{n} \\rightarrow ^{1}_{1}\\text{p} + ^{0}_{-1}\\beta^{-} + \\bar{\\nu}_e$$\n- Step 2: One neutron disappears and one proton appears. Since both have mass ≈ 1u, the total nucleon count ($$A$$) is unchanged: you lost a neutron but gained a proton — net mass number change = 0.\n- Step 3: The proton number ($$Z$$) increases by 1 because a neutron (charge 0) became a proton (charge +1). The beta particle (charge -1) and antineutrino (charge 0) are ejected, so net charge on the remaining nucleus goes up by +1. The general equation: $$^{A}_{Z}\\text{X} \\rightarrow ^{A}_{Z+1}\\text{Y} + ^{0}_{-1}\\beta^{-} + \\bar{\\nu}_e$$\n\nTakeaway: Beta-minus decay is a neutron upgrading itself into a proton — mass stays the same, but the element transmutes one step up the periodic table.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "During gamma decay, neither the mass number nor the atomic number changes. What then *does* change, and why is gamma emission often written alongside (rather than instead of) alpha or beta decay? (2 steps)", "answer": "- Step 1: Gamma decay changes the **energy state** of the nucleus. After alpha or beta decay, the daughter nucleus is often in an excited (high-energy) state. It releases this excess energy by emitting a gamma photon: $$^{A}_{Z}\\text{X}^{*} \\rightarrow ^{A}_{Z}\\text{X} + \\gamma$$ where the asterisk denotes the excited state. No nucleons are lost or transformed, so $$A$$ and $$Z$$ remain identical.\n- Step 2: Gamma emission typically *follows* alpha or beta decay because those processes leave the daughter nucleus energetically unstable. The nuclear structure is already decided by the alpha/beta step; gamma just lets the nucleus \"relax\" to its lowest energy configuration. This is why gamma is written alongside: $$^{A}_{Z}\\text{X} \\rightarrow ^{A-4}_{Z-2}\\text{Y} + ^{4}_{2}\\alpha + \\gamma$$\n\nTakeaway: Gamma decay doesn't change *what* the nucleus is — it changes *how energetic* it is. It's the nucleus exhaling after the real transformation.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A nucleus with $$A = 218$$ and $$Z = 84$$ undergoes one alpha decay followed by two beta-minus decays. What are the final $$A$$ and $$Z$$ values? What general pattern does \"one alpha + two beta\" produce for the atomic number? (3 steps)", "answer": "- Step 1: After alpha decay: $$A$$ drops by 4 → $$218 - 4 = 214$$; $$Z$$ drops by 2 → $$84 - 2 = 82$$.\n- Step 2: After first beta decay: $$A$$ unchanged → 214; $$Z$$ increases by 1 → $$82 + 1 = 83$$.\n- Step 3: After second beta decay: $$A$$ unchanged → 214; $$Z$$ increases by 1 → $$83 + 1 = 84$$.\n+ Net effect: $$A$$ decreased by 4 (from alpha only), $$Z$$ decreased by 2 then increased by 2 = **net change of 0 in $$Z$$**.\n+ The general pattern: one alpha + two beta returns the atomic number to its original value while reducing mass by 4. This is why in the ESAT question from the lesson, option A was correct — the element transmutes away and back.\n\nTakeaway: \"1α + 2β\" is a classic combination that shifts the mass down by 4 but brings $$Z$$ back to where it started — the element effectively cycles through two neighbours and returns.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": true}, {"question": "What does it mean that radioactive decay is **spontaneous**? List three environmental factors that *cannot* influence the rate of decay, and explain the physical reasoning behind this independence. (3 steps)", "answer": "- Step 1: **Spontaneous** means the decay process cannot be influenced by any external environmental factors. Whether you heat it, crush it, dissolve it, or irradiate it, the probability of a given nucleus decaying in the next second remains the same.\n- Step 2: Three factors that cannot influence decay rate:\n+ **Temperature** — even at extreme temperatures, nuclear binding energies (~MeV) dwarf thermal energies (~eV), so thermal agitation has no effect on the nucleus.\n+ **Pressure** — compressing or expanding the material changes inter-atomic distances but does nothing to the nucleus, which is ~10⁻¹⁵ m in size and shielded by the electron cloud.\n+ **Chemical conditions** — bonding, dissolving, or reacting changes electron arrangements, but the nucleus is unaffected by chemistry.\n- Step 3: The physical reason: nuclear processes are governed by the strong nuclear force and quantum tunnelling within the nucleus, operating at energy scales millions of times larger than any chemical or thermal energy. External conditions simply cannot reach or modify the internal nuclear dynamics.\n\nTakeaway: Spontaneous = \"the nucleus decides on its own, and nothing external can speed it up or slow it down.\"", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": true}, {"question": "What does it mean that radioactive decay is **random**? How is this randomness experimentally observed, and how does it paradoxically allow us to make *statistical predictions* about large samples? (3 steps)", "answer": "- Step 1: **Random** means the exact moment any particular nucleus will decay cannot be predicted. Each nucleus has a constant *probability* of decaying per unit time, but which specific nucleus decays at which specific instant is fundamentally unpredictable.\n- Step 2: This randomness is observed experimentally using a Geiger-Müller tube near a source. The counts arrive at irregular, unpredictable intervals — the count rate fluctuates from one second to the next. These fluctuations are direct evidence of randomness.\n- Step 3: Despite individual randomness, with **large numbers of nuclei**, statistical behaviour emerges. If each nucleus has a constant probability $$\\lambda$$ of decaying per second, then on average $$\\lambda N$$ nuclei will decay per second (where $$N$$ is the total number). This gives us predictable *average* behaviour (half-life, exponential decay curves) even though individual events are random — analogous to how you can't predict one coin flip but can predict that 1000 flips yield ~500 heads.\n\nTakeaway: Random = unpredictable at the individual level, but statistically predictable at the population level — quantum dice rolled in bulk look smooth.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "The **decay constant** $$\\lambda$$ is defined as \"the probability per second that a given nucleus will decay.\" How does this definition lead directly to the activity equation $$A = \\lambda N$$? Walk through the reasoning. (3 steps)", "answer": "- Step 1: If each individual nucleus has a probability $$\\lambda$$ of decaying in any one-second interval, and there are $$N$$ undecayed nuclei in the sample, then the *expected* number of decays in that one second is simply the sum of all individual probabilities: $$\\text{expected decays per second} = \\lambda \\times N$$\n- Step 2: This expected number of decays per second is exactly what we call **activity** ($$A$$) — it measures how \"active\" the sample is. So: $$A = \\lambda N$$\n- Step 3: The more rigorous form includes a minus sign to indicate the number of remaining nuclei is decreasing: $$A = \\frac{\\Delta N}{\\Delta t} = -\\lambda N$$ (the negative sign shows $$N$$ shrinks over time). Activity is measured in Becquerels (Bq), where $$1 \\text{ Bq} = 1 \\text{ decay per second} = 1 \\text{ s}^{-1}$$.\n\nTakeaway: Activity is just \"probability per nucleus × number of nuclei\" — a direct consequence of the decay constant's definition applied to a population.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "Starting from the activity equation $$\\frac{dN}{dt} = -\\lambda N$$, derive the exponential decay formula $$N = N_0 e^{-\\lambda t}$$. Explain each mathematical step and why the result is exponential rather than linear. (4 steps)", "answer": "- Step 1: Begin with $$\\frac{dN}{dt} = -\\lambda N$$. This says \"the rate of decrease of $$N$$ is proportional to $$N$$ itself.\" Rearrange: $$\\frac{dN}{N} = -\\lambda \\, dt$$\n- Step 2: Integrate both sides. The left side integrates as $$\\ln N$$, the right side as $$-\\lambda t$$ plus a constant: $$\\ln N = -\\lambda t + C$$\n- Step 3: At time $$t = 0$$, the number of nuclei is $$N_0$$, so $$\\ln N_0 = C$$. Substitute: $$\\ln N = -\\lambda t + \\ln N_0$$, which rearranges to $$\\ln N - \\ln N_0 = -\\lambda t$$, i.e., $$\\ln\\left(\\frac{N}{N_0}\\right) = -\\lambda t$$\n- Step 4: Exponentiate both sides: $$\\frac{N}{N_0} = e^{-\\lambda t}$$, giving the final result: $$N = N_0 e^{-\\lambda t}$$\n+ Why exponential, not linear? Because the *rate* of decay depends on how many nuclei remain — as $$N$$ shrinks, the rate slows down. This self-referential dependency (rate ∝ current value) is exactly what produces exponential curves. A linear decrease would require a constant rate regardless of $$N$$, which is impossible here.\n\nTakeaway: Exponential decay arises because \"the more you have, the faster you lose\" — each nucleus decays independently, so the population drains faster when it's larger.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": true}, {"question": "Derive the relationship between half-life ($$t_{1/2}$$) and the decay constant ($$\\lambda$$): $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$. Explain why a larger decay constant means a shorter half-life. (3 steps)", "answer": "- Step 1: By definition, after one half-life, the number of nuclei has halved: $$N = \\frac{N_0}{2}$$ at $$t = t_{1/2}$$. Substitute into the exponential formula: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$\n- Step 2: Divide both sides by $$N_0$$: $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$. Take natural log of both sides: $$\\ln\\left(\\frac{1}{2}\\right) = -\\lambda t_{1/2}$$, which is $$-\\ln 2 = -\\lambda t_{1/2}$$\n- Step 3: Cancel the negatives and solve: $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$\n+ Why does larger $$\\lambda$$ mean shorter half-life? $$\\lambda$$ is the probability of decay per second — a higher probability means nuclei decay faster, so the population halves in less time. The formula confirms this: $$t_{1/2}$$ is inversely proportional to $$\\lambda$$.\n\nTakeaway: Half-life and decay constant are inversely related — one measures \"how long until half is gone,\" the other measures \"how likely each nucleus is to go per second.\"", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "Since activity $$A = \\lambda N$$ and $$N = N_0 e^{-\\lambda t}$$, what is the expression for activity as a function of time? Does activity also follow an exponential decay with the *same* decay constant? (2 steps)", "answer": "- Step 1: Substitute $$N = N_0 e^{-\\lambda t}$$ into $$A = \\lambda N$$: $$A = \\lambda \\cdot N_0 e^{-\\lambda t} = (\\lambda N_0) e^{-\\lambda t} = A_0 e^{-\\lambda t}$$ where $$A_0 = \\lambda N_0$$ is the initial activity.\n- Step 2: Yes — activity decays exponentially with the **same** decay constant $$\\lambda$$ and the **same** half-life $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$ as the number of nuclei. This makes physical sense: activity is proportional to the number of undecayed nuclei, so as the population shrinks exponentially, the activity shrinks in lockstep.\n\nTakeaway: Activity and nuclei count share the same exponential curve — when half the nuclei are gone, the activity is also halved.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "Half-life can apply to the number of nuclei, the mass of radioactive substance, or the activity. After 3 half-lives, what fraction of the *original* number of nuclei, mass, and activity remain? Explain why all three follow the same halving pattern. (2 steps)", "answer": "- Step 1: After each half-life, each quantity halves. After 3 half-lives: $$\\text{Fraction remaining} = \\left(\\frac{1}{2}\\right)^3 = \\frac{1}{8}$$ — so only 1/8 of the original nuclei, 1/8 of the original mass, and 1/8 of the original activity remain.\n- Step 2: All three follow the same pattern because they are all proportional to each other. Mass of radioactive substance = (number of nuclei) × (mass per nucleus). Activity = λ × (number of nuclei). If nuclei count halves, mass and activity must also halve — they're just different ways of measuring the same underlying population.\n\nTakeaway: \"Half-life\" is universal across nuclei count, mass, and activity because they all scale with the same population.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "A radioactive tracer has 100,000 nuclei initially. After 13 days, approximately 3,000 nuclei remain. If the initial dose was considered safe for medical use, is the remaining dose at 13 days likely safe? How would you reason about this qualitatively? (2 steps)", "answer": "- Step 1: The fraction remaining is approximately $$\\frac{3000}{100000} = 0.03 = 3\\%$$ of the original dose. Since the original dose was deemed safe for medical imaging (a tracer used over a couple of days), receiving only 3% of that dose means the radiation exposure is dramatically reduced.\n- Step 2: By 13 days, the activity has also dropped to ~3% of its initial value (activity scales with nuclei count). The tracer is now emitting negligible radiation compared to what was intentionally administered. Qualitatively, this is safe to dispose of — the remaining radiation is a tiny fraction of a dose that was already acceptable for deliberate injection into a patient.\n\nTakeaway: Safety judgments compare remaining radiation to the originally safe dose — 3% of a safe dose is negligible.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "In the core practical investigating gamma radiation absorption by lead, what are the independent, dependent, and key control variables? Why must background radiation be measured *before* taking any source readings? (3 steps)", "answer": "- Step 1: Variables:\n+ **Independent** = thickness of lead absorber\n+ **Dependent** = count rate (measured by GM tube)\n+ **Control** = radioactive source (same one throughout), distance from GM tube to source, and location/background radiation conditions\n- Step 2: Background radiation must be measured first (with no source present) over a sustained period (e.g., 5 minutes) and averaged per minute. This gives the baseline count that exists regardless of the experiment.\n- Step 3: Without this background measurement, you cannot calculate the corrected count rate for each lead thickness. Background counts would be mixed into every reading, making it impossible to isolate how much gamma radiation *actually* penetrates each lead thickness. The background subtraction is essential for valid data.\n\nTakeaway: Measure background first, subtract it always — otherwise your absorption data is contaminated by environmental noise.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "In the gamma absorption core practical, the count rate through lead decreases *gradually* with increasing thickness — it never suddenly drops to zero at a specific thickness. What type of mathematical relationship describes this, and why is it fundamentally different from how alpha or beta radiation are absorbed? (3 steps)", "answer": "- Step 1: Gamma absorption follows an **exponential** relationship: $$I = I_0 e^{-\\mu x}$$ where $$I$$ is intensity, $$x$$ is thickness, and $$\\mu$$ is the absorption coefficient. Each additional layer of lead reduces intensity by a constant *fraction*, not a constant *amount*.\n- Step 2: This is because gamma rays are uncharged photons — they interact probabilistically with atoms. Each layer of lead gives each photon a certain probability of being absorbed or scattered, but no layer guarantees 100% absorption. Some photons always slip through.\n- Step 3: Alpha and beta are different because they are charged particles that *continuously* lose energy through ionisation as they travel. Once their kinetic energy is depleted, they stop abruptly at a specific range. Gamma photons either interact (and are removed) or pass through — there's no gradual energy drain, so there's always a non-zero probability of transmission.\n\nTakeaway: Charged particles drain energy continuously and stop at a definite thickness; gamma photons face probabilistic barriers and never have a guaranteed stopping point.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "List three safety precautions from the gamma absorption core practical and explain the *physical reasoning* behind each one. (3 steps)", "answer": "- Step 1: **Store the source in a lead-lined container when not in use** — lead is dense and effectively absorbs gamma radiation, preventing unnecessary exposure to anyone nearby.\n- Step 2: **Handle the source with tweezers/tongs and point it away from yourself** — distance reduces radiation intensity (inverse square law for gamma), and tongs prevent direct contact, reducing the risk of contamination or close-range exposure. Pointing it away ensures the directed radiation isn't aimed at your body.\n- Step 3: **Wash hands and remove outer clothing after handling** — radioactive material can contaminate surfaces through transfer. Washing removes any trace contamination on skin; removing outer clothing eliminates any particles that settled on fabric, preventing prolonged low-level exposure.\n\nTakeaway: Safety = minimise exposure time, maximise distance, use shielding, and prevent contamination transfer.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "A Geiger-Müller tube detects radiation by sensing ionisation. Briefly explain the mechanism: how does radiation passing through the tube produce a measurable electrical signal? (3 steps)", "answer": "- Step 1: The GM tube contains a gas (often argon) at low pressure between two electrodes. When alpha, beta, or gamma radiation enters the tube, it ionises gas atoms — knocking electrons off them, creating positive ions and free electrons.\n- Step 2: A high voltage between the electrodes accelerates the freed electrons toward the anode and the positive ions toward the cathode. The accelerating electrons gain enough energy to ionise *more* gas atoms, creating a cascade (Townsend discharge) — one initial ionisation event triggers many.\n- Step 3: This cascade produces a brief, measurable pulse of current. Each pulse corresponds to one radiation event entering the tube. The counter tallies these pulses over time to give the count rate.\n\nTakeaway: GM tubes convert ionisation events into electrical pulses via a gas discharge cascade — one particle triggers a detectable current avalanche.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "Nuclear fission is triggered by a **slow neutron** being absorbed by a heavy nucleus (like uranium-235). Why must the neutron be *slow* (thermal), and what happens after absorption that leads to the nucleus splitting? (3 steps)", "answer": "- Step 1: A **slow (thermal) neutron** has low kinetic energy, allowing it to spend more time near the uranium nucleus. This increases the probability of being captured by the strong nuclear force, which operates at very short range. A fast neutron would zip past before the nucleus can \"grab\" it.\n- Step 2: Once absorbed, the uranium-235 nucleus becomes uranium-236, which is highly unstable. The extra neutron disrupts the delicate balance between the strong nuclear force (holding nucleons together) and the Coulomb repulsion (pushing protons apart) in this already-large nucleus.\n- Step 3: The unstable $$^{236}\\text{U}$$ nucleus deforms, elongates, and splits into two smaller fission fragments, releasing 2-3 fast neutrons plus enormous energy (from the mass defect — the products are lighter than the original). The released neutrons can then trigger further fissions → **chain reaction**.\n\nTakeaway: Slow neutron gets captured → destabilises the already-strained large nucleus → splits + releases more neutrons → chain reaction.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "Nuclear fusion requires enormous temperature and pressure. What fundamental force must be overcome, and why is fusion so much harder to achieve than fission? Contrast the energy requirements. (3 steps)", "answer": "- Step 1: Fusion forces two light nuclei (e.g., hydrogen isotopes) together. The **Coulomb repulsion** between their positively-charged protons pushes them apart. This electrostatic force must be overcome before the nuclei get close enough for the short-range **strong nuclear force** to bind them.\n- Step 2: The Coulomb barrier is significant — protons must approach within ~10⁻¹⁵ m for the strong force to dominate. Achieving this requires enormous kinetic energy (extremely high temperature, ~millions of kelvin) and high particle density (pressure) so collisions happen frequently.\n- Step 3: Fission is easier because you're *splitting apart* a nucleus that is already oversized and internally strained (the Coulomb repulsion among its many protons is already fighting the strong force). A single neutron can tip the balance. Fusion requires *pushing together* two nuclei that naturally repel — you must fight the Coulomb force from scratch.\n\nTakeaway: Fission releases a nucleus that's already bursting at the seams; fusion forces two reluctant nuclei to embrace — much harder to initiate.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "A hydrogen bomb (thermonuclear weapon) uses fusion, but it requires a fission explosion to start. Why can't fusion be initiated without this fission \"trigger\"? (2 steps)", "answer": "- Step 1: Fusion requires temperatures of millions of kelvin and enormous pressures — conditions that cannot be practically achieved by conventional explosives or simple heating. The Coulomb barrier between protons is too strong.\n- Step 2: A fission explosion (like an atomic bomb) momentarily creates exactly these extreme conditions: intense heat and pressure in a tiny region for a fraction of a second. This brief, extreme environment is sufficient to ignite fusion in the surrounding hydrogen fuel. Without the fission trigger, there's no practical way to reach the necessary temperature and pressure simultaneously.\n\nTakeaway: Fission is the spark plug; fusion is the engine — you need the fission detonation to create conditions fusion can't reach on its own.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": true}, {"question": "Uranium-238 (stationary) undergoes alpha decay, producing thorium-234 and an alpha particle (mass 4u). The total kinetic energy released is $$E$$. Using conservation of momentum and energy, explain qualitatively why the alpha particle carries *most* of the kinetic energy, not just half. (3 steps)", "answer": "- Step 1: Before decay, momentum is zero (stationary nucleus). After decay, momentum must still total zero: $$m_{\\alpha} v_{\\alpha} = m_{\\text{Th}} v_{\\text{Th}}$$ (the alpha and thorium fly off in opposite directions with equal momentum magnitudes).\n- Step 2: Since $$m_{\\text{Th}} = 234\\text{u}$$ and $$m_{\\alpha} = 4\\text{u}$$, the thorium is ~58.5 times heavier. For momenta to be equal, the alpha must move ~58.5 times *faster*: $$v_{\\alpha} = \\frac{234}{4} v_{\\text{Th}}$$\n- Step 3: Kinetic energy is $$\\frac{1}{2}mv^2$$ — the alpha has much less mass but much more speed, and speed is *squared* in the energy formula. Plugging in the velocity ratio: $$E_{\\alpha} = \\frac{1}{2}(4)\\left(\\frac{234}{4}\\right)^2 v_{\\text{Th}}^2$$ while $$E_{\\text{Th}} = \\frac{1}{2}(234)v_{\\text{Th}}^2$$. The ratio $$\\frac{E_{\\alpha}}{E_{\\text{Th}}} = \\frac{234}{4} \\approx 58.5$$ — the alpha gets ~98.3% of the total energy $$E$$.\n\nTakeaway: Conservation of momentum forces the lighter particle to move much faster, and since KE ∝ v², the light alpha particle hogs almost all the energy.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": true}, {"question": "A sample has an initial activity of 800 Bq and a half-life of 6 hours. After 18 hours, what is the approximate activity? Do this using the \"half-life counting\" method without complex calculation. (2 steps)", "answer": "- Step 1: Count the number of half-lives elapsed: $$\\frac{18 \\text{ hours}}{6 \\text{ hours per half-life}} = 3 \\text{ half-lives}$$\n- Step 2: Apply successive halving: After 1 half-life: $$800/2 = 400$$ Bq. After 2: $$400/2 = 200$$ Bq. After 3: $$200/2 = 100$$ Bq. Alternatively, use the formula: $$A = A_0 \\times \\left(\\frac{1}{2}\\right)^n = 800 \\times \\left(\\frac{1}{2}\\right)^3 = 800 \\times \\frac{1}{8} = 100 \\text{ Bq}$$\n\nTakeaway: For whole-number half-lives, just count halving steps — no exponential formula needed.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "A radioactive isotope has a half-life of 2.6 days. If you start with 100,000 nuclei, roughly how many remain after 5.2 days and after 7.8 days? Use mental arithmetic. (2 steps)", "answer": "- Step 1: After 5.2 days: $$\\frac{5.2}{2.6} = 2$$ half-lives. Nuclei remaining: $$100000 \\times \\left(\\frac{1}{2}\\right)^2 = 100000 \\times \\frac{1}{4} = 25,000$$\n- Step 2: After 7.8 days: $$\\frac{7.8}{2.6} = 3$$ half-lives. Nuclei remaining: $$100000 \\times \\left(\\frac{1}{2}\\right)^3 = 100000 \\times \\frac{1}{8} = 12,500$$\n\nTakeaway: When the time is a neat multiple of the half-life, just count half-lives and halve repeatedly.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "What is the unit of activity, and what does it physically represent? If a sample has an activity of 500 Bq, approximately how many decays occur in 10 seconds? (2 steps)", "answer": "- Step 1: Activity is measured in **Becquerels (Bq)**, where $$1 \\text{ Bq} = 1 \\text{ decay per second} = 1 \\text{ s}^{-1}$$. It represents the average rate at which nuclei in the sample are decaying.\n- Step 2: At 500 Bq, there are on average 500 decays per second. Over 10 seconds: $$500 \\times 10 = 5000$$ decays (approximately — individual counts fluctuate randomly, but the average is reliable).\n\nTakeaway: Bq is simply \"decays per second\" — multiply by time to get total expected decays.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "On a graph of count rate vs. time for a radioactive source, the curve approaches a non-zero horizontal asymptote rather than dropping to zero. What does this asymptote represent, and how do you use it to find the corrected count rate at any time? (2 steps)", "answer": "- Step 1: The non-zero asymptote represents the **background radiation count rate** — the radiation that is always present regardless of the source. As the source decays, its contribution shrinks exponentially toward zero, but background persists forever.\n- Step 2: To find the corrected count rate at any time, subtract the background value (the asymptote) from the total count rate at that time: $$\\text{Corrected count rate} = \\text{Total count rate} - \\text{Background (asymptote value)}$$. If you want to analyse the source's half-life from the graph, you must use corrected values — the raw curve's \"half-life\" would be distorted by the constant background offset.\n\nTakeaway: A decay graph that doesn't reach zero is screaming \"background radiation exists!\" — subtract the asymptote before doing any half-life analysis.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "A misconception: \"If a nucleus emits a beta particle, it must have contained an electron beforehand.\" Why is this wrong? Where does the beta electron actually come from? (2 steps)", "answer": "- Step 1: Nuclei contain only protons and neutrons — no electrons reside in the nucleus. The nucleus is far too small and its potential energy far too high for an electron to exist there stably.\n- Step 2: The beta electron is **created at the moment of decay** when a neutron transforms into a proton via the weak nuclear force: $$n \\rightarrow p + e^{-} + \\bar{\\nu}_e$$. The electron is literally born from the conversion process and immediately ejected. It did not pre-exist inside the nucleus — it is a product, not a stored component.\n\nTakeaway: The beta electron is manufactured on-site by neutron decay, not retrieved from nuclear storage — the nucleus is a proton-neutron club, electrons are visitors only at emission.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "A misconception: \"Gamma rays are the most dangerous because they are the most penetrating.\" Evaluate this claim — is it always true? When would alpha actually be more dangerous? (3 steps)", "answer": "- Step 1: The claim is oversimplified. \"Most penetrating\" means gamma travels furthest through matter, but \"most dangerous\" depends on *context* — specifically, whether the radiation is outside or inside the body.\n- Step 2: **Outside the body**: Gamma is indeed the most concerning because it can penetrate skin and reach internal organs. Alpha is stopped by skin, beta by a few mm of tissue. So externally, gamma delivers the deepest dose.\n- Step 3: **Inside the body**: Alpha becomes the most dangerous because it is the most ionising. With no skin barrier, alpha deposits enormous energy in a tiny volume of living tissue, causing intense local damage. Gamma, being weakly ionising, would cause much less damage per unit dose internally.\n\nTakeaway: \"Most dangerous\" is context-dependent — external exposure favours gamma as the threat; internal exposure favours alpha.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": true}, {"question": "Neutron emission is listed as a fourth type of nuclear radiation, though rare. If a nucleus emits a neutron, what happens to its mass number $$A$$ and atomic number $$Z$$? Why is neutron emission rarely discussed in basic radioactivity courses? (2 steps)", "answer": "- Step 1: A neutron has mass number 1 and atomic number 0 (no charge). When emitted: $$A$$ decreases by 1, $$Z$$ stays the same. The equation pattern: $$^{A}_{Z}\\text{X} \\rightarrow ^{A-1}_{Z}\\text{Y} + ^{1}_{0}\\text{n}$$\n- Step 2: Neutron emission is rarely discussed because it is uncommon for natural radioactive decay. It typically occurs in very specific scenarios (e.g., during nuclear fission when fragments are neutron-rich, or in artificially induced reactions). Exam questions won't test it unless they explicitly introduce it in the problem context.\n\nTakeaway: Neutron emission reduces mass by 1, leaves charge unchanged — rare in nature, only relevant when a question specifically mentions it.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "A student reads a count rate of 40 counts/min from a source. The background in the same lab is 10 counts/min. The source has a half-life of 5 days. What is the corrected count rate now, and what will it be approximately after 10 days? (2 steps)", "answer": "- Step 1: Corrected count rate now = $$40 - 10 = 30$$ counts/min (this is the source's contribution alone).\n- Step 2: After 10 days = 2 half-lives, the source's contribution halves twice: $$30 \\times \\left(\\frac{1}{2}\\right)^2 = 30 \\times \\frac{1}{4} = 7.5$$ counts/min. The total measured count rate would be $$7.5 + 10 = 17.5$$ counts/min (source + background). Notice the total never drops below background (10).\n\nTakeaway: Always correct for background first, then apply half-life to the corrected value — background doesn't decay.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "Why can't you determine the half-life of a very long-lived isotope (like uranium-238, half-life ~4.5 billion years) by simply watching its count rate drop over a lab session? What method *can* work for such isotopes? (2 steps)", "answer": "- Step 1: Over a lab session (hours or days), the count rate barely changes because the fraction of nuclei decaying is minuscule. For $$t_{1/2} = 4.5 \\times 10^9$$ years, in one hour only $$\\sim 10^{-13}$$ of the nuclei decay — the activity appears essentially constant. You can't measure a half-life from a flat line.\n- Step 2: Instead, you can determine the decay constant by measuring the **activity** ($$A$$) and the **number of nuclei** ($$N$$) separately, then calculating $$\\lambda = \\frac{A}{N}$$, and finally $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$. The activity tells you the current decay rate; the mass/composition tells you $$N$$ — together they yield $$\\lambda$$ without needing to observe any decline.\n\nTakeaway: Long half-lives require the $$\\lambda = A/N$$ method, not the \"watch it decay\" method — the decline is too slow to see.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "In the ESAT lesson question about uranium-238 alpha decay, the student derived that the alpha particle carries approximately $$\\frac{234}{234+4} \\times E = \\frac{234}{238} E$$ of the total energy. Verify this ratio conceptually: does a lighter decay product always carry a larger *fraction* of the released kinetic energy? Why? (3 steps)", "answer": "- Step 1: From momentum conservation: $$m_1 v_1 = m_2 v_2$$, so $$v_1 = \\frac{m_2}{m_1} v_2$$ (the lighter particle moves faster). The kinetic energies are $$E_1 = \\frac{1}{2}m_1 v_1^2 = \\frac{1}{2}m_1 \\left(\\frac{m_2}{m_1}\\right)^2 v_2^2 = \\frac{m_2^2}{2m_1} v_2^2$$ and $$E_2 = \\frac{1}{2}m_2 v_2^2$$.\n- Step 2: The ratio: $$\\frac{E_1}{E_2} = \\frac{m_2^2 / (2m_1)}{m_2 / 2} = \\frac{m_2}{m_1}$$. So the lighter particle's energy fraction is $$\\frac{E_1}{E_1 + E_2} = \\frac{m_2}{m_1 + m_2}$$ — the *other* particle's mass divided by the total mass.\n- Step 3: For uranium-238 → thorium-234 + alpha-4: alpha's fraction = $$\\frac{m_{\\text{Th}}}{m_{\\text{Th}} + m_{\\alpha}} = \\frac{234}{238} \\approx 98.3\\%$$. Yes — the lighter product always carries a larger fraction because it must move much faster (momentum conservation), and KE scales with v².\n\nTakeaway: In any two-body decay from rest, the lighter fragment always gets the lion's share of kinetic energy — a direct consequence of momentum conservation.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "What is the difference between the **atomic (proton) number** $$Z$$ and the **nucleon (mass) number** $$A$$? In the notation $$^{A}_{Z}\\text{X}$$, what does each number count, and why is $$A$$ always ≥ $$Z$$ for known nuclei? (2 steps)", "answer": "- Step 1: $$Z$$ counts the number of **protons** in the nucleus — it determines the element's identity (which column of the periodic table). $$A$$ counts the total number of **nucleons** (protons + neutrons) — it determines the isotope's mass.\n- Step 2: $$A \\geq Z$$ because $$A = Z + N$$ where $$N$$ is the neutron count. For all known stable and radioactive nuclei, $$N \\geq 0$$, so $$A$$ is at least as large as $$Z$$. In practice, for heavier elements, $$N > Z$$ because extra neutrons are needed to dilute the Coulomb repulsion between many protons.\n\nTakeaway: $$Z$$ = \"what element,\" $$A$$ = \"how heavy\" — $$A$$ minus $$Z$$ gives the neutron count, which is always non-negative.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "The number of neutrons in a nucleus is $$N = A - Z$$. For uranium-238 ($$^{238}_{92}\\text{U}$$), how many neutrons does it have? Why do heavier nuclei need *more neutrons relative to protons* (i.e., $$N/Z$$ increases with $$A$$)? (2 steps)", "answer": "- Step 1: Neutrons = $$A - Z = 238 - 92 = 146$$ neutrons. The neutron-to-proton ratio is $$146/92 \\approx 1.59$$ — significantly more neutrons than protons.\n- Step 2: In heavier nuclei, more protons means more Coulomb repulsion pushing protons apart. Extra neutrons don't add Coulomb repulsion (they're uncharged) but *do* contribute to the strong nuclear force's binding effect. They act as \"neutral glue\" that helps hold the increasingly repulsive proton cluster together. As $$Z$$ grows, more glue (neutrons) is needed per proton.\n\nTakeaway: Neutrons are the neutral adhesive — heavier elements need disproportionately many neutrons to counteract growing proton-proton repulsion.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": true}, {"question": "A sample's activity is measured as 120 Bq with background of 20 Bq. The sample contains $$5 \\times 10^8$$ nuclei. Calculate the decay constant $$\\lambda$$ and then estimate the half-life in seconds. Use $$\\ln 2 \\approx 0.693$$. (3 steps)", "answer": "- Step 1: Corrected activity = $$120 - 20 = 100$$ Bq. This is the true source activity.\n- Step 2: Using $$A = \\lambda N$$: $$\\lambda = \\frac{A}{N} = \\frac{100}{5 \\times 10^8} = 2 \\times 10^{-7} \\text{ s}^{-1}$$\n- Step 3: Half-life = $$\\frac{\\ln 2}{\\lambda} = \\frac{0.693}{2 \\times 10^{-7}} \\approx 3.47 \\times 10^6$$ seconds ≈ ~40 days (roughly $$3.5 \\times 10^6 / 86400 \\approx 40$$)\n\nTakeaway: Measure activity and nuclei count → get λ → get half-life. This is the method for isotopes where you can't watch the decline.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "Why is it impossible to predict *which* specific nucleus in a sample will decay next, even though you can predict *how many* will decay in the next second on average? Connect this to the definition of the decay constant. (2 steps)", "answer": "- Step 1: Each nucleus has an identical, constant probability $$\\lambda$$ of decaying in any given second. But *which* nucleus realises that probability is fundamentally random — like rolling dice for each nucleus every second. You know that on average $$\\lambda N$$ will \"roll a decay,\" but you cannot predict which specific ones.\n- Step 2: This is the essence of the random nature of decay. The decay constant gives you **population-level statistics** (average rate), not **individual-level prediction** (which nucleus, when). It's analogous to knowing a coin has a 50% chance of landing heads — you can predict ~500 heads from 1000 flips, but cannot predict whether flip #37 will be heads.\n\nTakeaway: λ is a statistical tool for populations, not a deterministic clock for individuals — decay is random at the single-nucleus level.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "Edge case: A radioactive sample has only **one nucleus** left. Can you predict when it will decay? What does the concept of half-life mean for a single nucleus? (2 steps)", "answer": "- Step 1: No — you cannot predict when a single nucleus will decay. It might decay in the next millisecond, or it might survive for many half-lives. The decay is random; the probability per second is $$\\lambda$$, but that's a probability, not a schedule.\n- Step 2: For a single nucleus, \"half-life\" has no deterministic meaning. It only means that there is a 50% probability the nucleus will survive beyond $$t_{1/2}$$, and a 50% chance it decays before then. Half-life is a *statistical median* for a population — for one nucleus, it's just a coin flip.\n\nTakeaway: Half-life is a population statistic — for a single nucleus, it's merely the time at which survival odds are 50/50, w
