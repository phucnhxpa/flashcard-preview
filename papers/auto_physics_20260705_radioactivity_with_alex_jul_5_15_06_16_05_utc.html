ticles can pass straight through the electron cloud but are strongly repelled by the nucleus? (3 steps)", "answer": "- Step 1: The electron cloud is mostly empty space with very low mass density, meaning an alpha particle (which is relatively massive and fast) will not experience significant collisions or energy loss when passing through it.\n- Step 2: The nucleus, however, contains nearly all the atom's mass and all of its positive charge, packed into an incredibly tiny volume, creating an intense localized positive electric field.\n- Step 3: When an alpha particle (also positively charged) approaches this dense nucleus, the strong Coulomb repulsion between the two positive charges causes the alpha particle to scatter or bounce back, proving the mass and charge are concentrated in the center.", "source": "Qwen 3 ①", "_id": "qwen_1_0"}, {"question": "When a nucleus undergoes alpha decay, it emits a particle with 2 protons and 2 neutrons. Why does the mass number decrease by exactly 4 and the atomic number by exactly 2? Why doesn't the atomic number decrease by 4? (2 steps)", "answer": "- Step 1: The **mass number (A)** counts the total number of nucleons (protons + neutrons). The alpha particle carries away 2 protons + 2 neutrons = 4 nucleons total. So the mass number of the daughter nucleus is A − 4.\n- Step 2: The **atomic number (Z)** counts only the number of protons (which determines the element). The alpha particle carries away 2 protons, so the atomic number decreases by 2. The 2 neutrons in the alpha particle do not affect Z because neutrons have zero charge — they contribute to mass but not to the proton count or the element's identity.\n\nKey takeaway: Mass number drops by 4 (total nucleons removed), atomic number drops by 2 (only protons removed). The element changes because Z changes.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "Uranium-238 (stationary) undergoes alpha decay, producing thorium-234 and an alpha particle (mass 4u). The total kinetic energy released is $$E$$. Using conservation of momentum and energy, explain qualitatively why the alpha particle carries *most* of the kinetic energy, not just half. (3 steps)", "answer": "- Step 1: Before decay, momentum is zero (stationary nucleus). After decay, momentum must still total zero: $$m_{\\alpha} v_{\\alpha} = m_{\\text{Th}} v_{\\text{Th}}$$ (the alpha and thorium fly off in opposite directions with equal momentum magnitudes).\n- Step 2: Since $$m_{\\text{Th}} = 234\\text{u}$$ and $$m_{\\alpha} = 4\\text{u}$$, the thorium is ~58.5 times heavier. For momenta to be equal, the alpha must move ~58.5 times *faster*: $$v_{\\alpha} = \\frac{234}{4} v_{\\text{Th}}$$\n- Step 3: Kinetic energy is $$\\frac{1}{2}mv^2$$ — the alpha has much less mass but much more speed, and speed is *squared* in the energy formula. Plugging in the velocity ratio: $$E_{\\alpha} = \\frac{1}{2}(4)\\left(\\frac{234}{4}\\right)^2 v_{\\text{Th}}^2$$ while $$E_{\\text{Th}} = \\frac{1}{2}(234)v_{\\text{Th}}^2$$. The ratio $$\\frac{E_{\\alpha}}{E_{\\text{Th}}} = \\frac{234}{4} \\approx 58.5$$ — the alpha gets ~98.3% of the total energy $$E$$.\n\nTakeaway: Conservation of momentum forces the lighter particle to move much faster, and since KE ∝ v², the light alpha particle hogs almost all the energy.", "source": "GLM 5.1 ②", "_id": "glm_2_28"}, {"question": "In a graph of count rate vs distance from a source, how do you determine the background radiation count, and what physically causes the levelling off? (3 steps)", "answer": "- Step 1: As distance increases, the source's radiation gets absorbed by the air, so fewer source-particles reach the detector.\n- Step 2: Beyond a certain distance (e.g. after 1 metre), the source contribution has been absorbed entirely, so the count stops falling and levels off at a constant value.\n- Step 3: That constant, non-zero levelling value is the background radiation count — the reading present even when the source is not detected.\n\nTakeaway: the flat, non-zero floor the graph settles to = background radiation.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "Nuclear fusion requires enormous temperature and pressure. What fundamental force must be overcome, and why is fusion so much harder to achieve than fission? Contrast the energy requirements. (3 steps)", "answer": "- Step 1: Fusion forces two light nuclei (e.g., hydrogen isotopes) together. The **Coulomb repulsion** between their positively-charged protons pushes them apart. This electrostatic force must be overcome before the nuclei get close enough for the short-range **strong nuclear force** to bind them.\n- Step 2: The Coulomb barrier is significant — protons must approach within ~10⁻¹⁵ m for the strong force to dominate. Achieving this requires enormous kinetic energy (extremely high temperature, ~millions of kelvin) and high particle density (pressure) so collisions happen frequently.\n- Step 3: Fission is easier because you're *splitting apart* a nucleus that is already oversized and internally strained (the Coulomb repulsion among its many protons is already fighting the strong force). A single neutron can tip the balance. Fusion requires *pushing together* two nuclei that naturally repel — you must fight the Coulomb force from scratch.\n\nTakeaway: Fission releases a nucleus that's already bursting at the seams; fusion forces two reluctant nuclei to embrace — much harder to initiate.", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "An alpha particle ($$\\alpha$$) has a specific composition. What is it, and why does this composition make alpha particles both the *most ionising* and the *least penetrating* type of nuclear radiation? (3 steps)", "answer": "- Step 1: An alpha particle consists of **2 protons and 2 neutrons** — identical to a helium nucleus, written as $$^{4}_{2}\\alpha$$ or $$^{4}_{2}\\text{He}$$. It has a charge of $$+2e$$ and a relatively large mass ($$\\approx 4\\text{u}$$).\n- Step 2: **Most ionising** — because of its large charge ($$+2e$$) and large mass, an alpha particle moves relatively slowly and interacts strongly with atoms it passes. Its strong electric field easily pulls electrons off nearby atoms, creating many ions per unit distance. Think of a big, slow, heavily-charged bulldozer ploughing through atoms.\n- Step 3: **Least penetrating** — the same reason! Because it ionises so aggressively, it loses energy rapidly with each ionisation event. It can only travel a few centimetres in air and is stopped by a single sheet of paper or human skin. All its energy is dumped into a short distance.\n\nTakeaway: High ionising power and low penetrating power are *not independent* — they are the same physical mechanism viewed from two sides. Energy deposited per unit distance is high, so total distance travelled is short.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "An alpha particle has a charge of +2e and a mass of 4u, while a beta particle has a charge of −1e and a much smaller mass. How do these charge and mass differences explain why alpha is more strongly ionising but less penetrating than beta? (3 steps)", "answer": "- Step 1: **Ionisation** occurs when radiation passes close to an atom and delivers enough energy to knock out an electron. Alpha particles have **+2e charge** and **4u mass** — they are large, heavy, and doubly charged. This means they exert strong electromagnetic forces on atomic electrons as they pass, pulling electrons off atoms very effectively over a very short distance. Each collision transfers significant energy, so the alpha loses energy rapidly.\n- Step 2: **Penetration** depends on how far the radiation can travel before losing all its energy. Because alpha particles ionise so strongly (high energy loss per unit distance), they dump all their energy into the first few thousand atoms they encounter. They travel only a few cm in air and are stopped by paper or skin.\n+ Beta particles have −1e charge (weaker electromagnetic interaction) and ~1/8000th the mass of an alpha (much lighter). They ionise less per unit distance, so they lose energy more slowly.\n- Step 3: The trade-off is fundamental: **higher ionising power = faster energy loss = lower penetration**. Alpha: most ionising, least penetrating. Beta: moderately ionising, moderately penetrating. Gamma: weakly ionising (no charge, no mass — only indirect ionisation via photoelectric/Compton effects), most penetrating.\n\nKey takeaway: Ionising power and penetrating power are inversely related — the very property that makes radiation good at damaging atoms also makes it run out of energy quickly.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "A hydrogen bomb (thermonuclear weapon) uses fusion, but it is triggered by a fission explosion. Why can't fusion be triggered without first using fission? (2 steps)", "answer": "- Step 1: Fusion requires temperatures of millions of degrees and enormous pressures — conditions that do not exist in conventional environments. A fission explosion (like the \"primary\" in a hydrogen bomb) generates precisely these extreme conditions: temperatures of tens of millions of degrees and intense compression from the X-ray radiation.\n- Step 2: No other practical method exists to create these conditions in a weapon-sized package. The fission \"spark\" provides the energy to overcome the Coulomb barrier for the hydrogen isotopes (deuterium and tritium), initiating fusion. Once started, the fusion reaction releases far more energy than the initial fission trigger, which is why hydrogen bombs are far more powerful than pure fission weapons.\n\nKey takeaway: The fission stage is the \"match\" that lights the fusion \"bonfire\" — fusion needs extreme conditions that only a fission explosion can practically create in a weapon.", "source": "GLM 5.1 ①", "_id": "glm_1_32"}, {"question": "Half-life $$t_{1/2}$$ is defined as the time for half the nuclei to decay. Starting from $$N = N_0 e^{-\\lambda t}$$, derive the relationship $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$. Explain why a larger decay constant means a shorter half-life. (3 steps)", "answer": "- Step 1: At the half-life time $$t = t_{1/2}$$, by definition $$N = \\frac{N_0}{2}$$. Substitute into the exponential equation: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$.\n- Step 2: Divide both sides by $$N_0$$: $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$. Take natural logs: $$\\ln\\left(\\frac{1}{2}\\right) = -\\lambda t_{1/2}$$, which gives $$-\\ln 2 = -\\lambda t_{1/2}$$, so $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$.\n- Step 3: Since $$\\ln 2 \\approx 0.693$$ is a constant, $$t_{1/2}$$ is **inversely proportional** to $$\\lambda$$. A larger decay constant means each nucleus has a higher probability of decaying per second, so the sample decays faster and reaches the half-way point sooner. Conversely, a very stable isotope (small $$\\lambda$$) has a very long half-life.\n\nKey takeaway: $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$ — half-life and decay constant are two ways of expressing the same property. A large $$\\lambda$$ = short half-life = highly active; a small $$\\lambda$$ = long half-life = slowly decaying.", "source": "GLM 5.1 ①", "_id": "glm_1_24"}, {"question": "Starting from the activity equation $$\\frac{dN}{dt} = -\\lambda N$$, derive the exponential decay formula $$N = N_0 e^{-\\lambda t}$$. Explain each mathematical step and why the result is exponential rather than linear. (4 steps)", "answer": "- Step 1: Begin with $$\\frac{dN}{dt} = -\\lambda N$$. This says \"the rate of decrease of $$N$$ is proportional to $$N$$ itself.\" Rearrange: $$\\frac{dN}{N} = -\\lambda \\, dt$$\n- Step 2: Integrate both sides. The left side integrates as $$\\ln N$$, the right side as $$-\\lambda t$$ plus a constant: $$\\ln N = -\\lambda t + C$$\n- Step 3: At time $$t = 0$$, the number of nuclei is $$N_0$$, so $$\\ln N_0 = C$$. Substitute: $$\\ln N = -\\lambda t + \\ln N_0$$, which rearranges to $$\\ln N - \\ln N_0 = -\\lambda t$$, i.e., $$\\ln\\left(\\frac{N}{N_0}\\right) = -\\lambda t$$\n- Step 4: Exponentiate both sides: $$\\frac{N}{N_0} = e^{-\\lambda t}$$, giving the final result: $$N = N_0 e^{-\\lambda t}$$\n+ Why exponential, not linear? Because the *rate* of decay depends on how many nuclei remain — as $$N$$ shrinks, the rate slows down. This self-referential dependency (rate ∝ current value) is exactly what produces exponential curves. A linear decrease would require a constant rate regardless of $$N$$, which is impossible here.\n\nTakeaway: Exponential decay arises because \"the more you have, the faster you lose\" — each nucleus decays independently, so the population drains faster when it's larger.", "source": "GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "Nuclear fusion requires enormous temperature and pressure, while fission can be triggered by a single neutron. Why is fusion so much harder to initiate? (2 steps)", "answer": "- Step 1: Fusion requires bringing two *positively charged* nuclei close enough together for the short-range strong nuclear force to attract and bind them. But at any significant distance, the Coulomb repulsion between the protons pushes them apart. Overcoming this electrostatic barrier requires extremely high kinetic energies — corresponding to temperatures of millions of degrees.\n- Step 2: Fission, by contrast, is triggered by a *neutral* neutron that enters the nucleus with no Coulomb barrier to overcome. The nucleus is already large and unstable — adding a neutron simply pushes it over the edge into splitting. No extreme temperature or pressure is needed.\n\nThis is why stars (with immense gravitational pressure and temperature) are natural fusion reactors, while fission can happen at room temperature with the right materials.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "Why does **gamma emission** often happen *after* alpha or beta decay, rather than on its own? (2 steps)", "answer": "- Step 1: **What happens during alpha/beta decay.** When a nucleus emits an alpha or beta particle, the daughter nucleus is often left in an **excited, high-energy state** — the energy levels of its remaining nucleons are jumbled up.\n- Step 2: **Why gamma follows.** The excited nucleus drops down to a more stable, lower-energy state by emitting a **gamma-ray photon**, which carries away the excess energy. So gamma is essentially the nucleus \"settling down\" after the bigger event. It's a way of shedding energy *without* changing the proton or neutron count.\n\nThis is why a decay chain can produce a burst of *both* alpha/beta and gamma at the same time — the alpha/beta comes out first, then a gamma photon follows milliseconds later from the same nucleus.", "source": "MiniMax ②", "_id": "minimax_2_42"}, {"question": "A student says: \"Activity tells you how dangerous a source is.\" Why is this an oversimplification? Give **two** factors that activity alone doesn't capture. (2 steps)", "answer": "- Factor 1: **Type of radiation.** A 1000 Bq alpha source is far more dangerous than a 1000 Bq gamma source, because alpha is much more ionising per decay. Activity counts decays, not damage.\n- Factor 2: **Energy per decay.** A high-energy beta decay deposits more energy in tissue than a low-energy one, even at the same activity. The same number of decays can produce different doses.\n- (Bonus factor 3: **Distance and shielding** — a source 10 cm from you delivers more dose than the same source 1 m away, even with identical activity.)", "source": "MiniMax ①", "_id": "minimax_1_95"}, {"question": "The exponential decay equation is $$N = N_0 e^{-\\lambda t}$$. Qualitatively, what does the shape of this graph tell you about the rate of decay — is it constant, accelerating, or decelerating over time, and why? (2 steps)", "answer": "- Step 1: The decay is **decelerating** — the number of decays per second is highest at the start and decreases over time. The curve drops steeply at first, then flattens out.\n- Step 2: This is because the activity $$A = \\lambda N$$ depends on how many nuclei remain. Early on, many undecayed nuclei exist → many decays per second. As nuclei decay, fewer remain → fewer decays per second. The rate of decay is proportional to the current population, creating a self-limiting feedback loop.\n\nThe curve never truly reaches zero — it asymptotically approaches it. This is why half-life is a useful measure: no matter how much material you start with, it always takes the same time to halve.", "source": "GLM 5.1 ③", "_id": "glm_3_33"}, {"question": "You have three radioactive sources: alpha, beta, and gamma. Conceptually map which radiation is stopped by a sheet of paper, a few millimeters of aluminum, and a thick lead block, and explain why gamma requires dense materials like lead to attenuate it significantly. (3 steps)", "answer": "- Step 1: Alpha radiation is stopped by a single sheet of paper (or human skin) due to its high ionizing power and rapid energy loss.\n- Step 2: Beta radiation passes through paper but is stopped by a few millimeters of aluminum, as its lower charge ($$-1e$$) and smaller mass allow it to penetrate further before losing its energy.\n- Step 3: Gamma radiation passes through both paper and aluminum; because it has no charge, it doesn't interact via continuous Coulomb forces, but rather through rare, probabilistic collisions with electrons or nuclei, requiring high-density, high-atomic-number materials like lead to maximize the probability of these interactions and attenuate the beam.", "source": "Qwen 3 ①", "_id": "qwen_1_4"}, {"question": "Since activity $$A = \\lambda N$$ and $$N = N_0 e^{-\\lambda t}$$, write the expression for how activity changes with time. Does activity have the same half-life as the number of nuclei? (3 steps)", "answer": "- Step 1: Substitute $$N = N_0 e^{-\\lambda t}$$ into $$A = \\lambda N$$: $$A = \\lambda N_0 e^{-\\lambda t}$$. At $$t = 0$$, the initial activity is $$A_0 = \\lambda N_0$$, so we can write: $$A = A_0 e^{-\\lambda t}$$.\n- Step 2: This has exactly the same exponential form as the equation for N. The activity decays exponentially with the **same decay constant** $$\\lambda$$.\n- Step 3: Since the half-life depends only on $$\\lambda$$ (via $$t_{1/2} = \\ln 2 / \\lambda$$), the half-life of the **activity** is the **same** as the half-life of the number of nuclei. This makes physical sense: if half the nuclei have decayed, then half the potential \"decayers\" are gone, so the activity must also be halved.\n\nKey takeaway: N, A, and even the mass of the radioactive substance all decay with the **same half-life** and the same exponential form. They are all proportional to each other.", "source": "GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "Explain what it means for radioactive decay to be **spontaneous**. What is the *evidence* for this? (2 steps)", "answer": "- Step 1: **Definition.** A *spontaneous* process is one that **cannot be influenced by external environmental factors**. For radioactive decay, this means the rate of decay does not change if you alter:\n+ Temperature\n+ Pressure\n+ Chemical conditions (e.g., what compound the atom is part of)\n- Step 2: **Evidence.** Experiments have heated radioactive samples to thousands of degrees, pressurised them enormously, and chemically reacted them with other substances — the count rate stays exactly the same. This is strong evidence that decay is governed by processes *inside the nucleus*, not by the atom's chemical or thermal environment.\n\nThe weak and strong nuclear forces operate over femtometre distances inside the nucleus, so conditions outside the nucleus simply cannot reach in to change them.", "source": "MiniMax ②", "_id": "minimax_2_16"}, {"question": "A student claims that \"after two half-lives, all the radioactive nuclei have decayed.\" Why is this wrong, and what is the correct statement? (2 steps)", "answer": "- Step 1: After each half-life, **half** of the *remaining* nuclei decay. After one half-life, half remain ($$N_0/2$$). After two half-lives, half of those half remain ($$N_0/4$$). After three, $$N_0/8$$. The number never reaches zero — it keeps halving but never vanishes entirely.\n- Step 2: The correct statement is: after two half-lives, **three-quarters** (75%) of the original nuclei have decayed, and **one-quarter** (25%) remain. In principle, there will always be some undecayed nuclei (though in practice, when N becomes very small, statistical fluctuations dominate and eventually the last nucleus will decay).\n\nKey takeaway: Each half-life halves what remains — it doesn't subtract a fixed amount. The number of undecayed nuclei approaches zero asymptotically but never mathematically reaches it.", "source": "GLM 5.1 ①", "_id": "glm_1_36"}, {"question": "Why is **alpha radiation** harmless when a source is *outside* your body, but extremely dangerous if the source is *inside* your body? (2 steps)", "answer": "- Step 1: **Outside the body.** Alpha particles have a range of only a few cm in air and are stopped by a sheet of paper — or the **dead outer layer of your skin** (the stratum corneum). So an external alpha source cannot reach living cells, and the radiation is absorbed before it does any biological damage.\n- Step 2: **Inside the body.** If an alpha-emitting substance is *inhaled* (like radon gas) or *eaten* (contaminated food), the alpha particles are released **directly next to living cells**, with no skin in the way. All the alpha's ionising power is dumped into a small region of soft tissue, where it can cause significant DNA damage and increase cancer risk.\n\nThis is also why **smoking + radon exposure** is so dangerous: the alpha-emitting radon daughters lodge in the lung tissue and irradiate it directly.", "source": "MiniMax ②", "_id": "minimax_2_36"}, {"question": "A common misconception is that alpha radiation is the \"safest\" type of radiation because it is easily stopped by a sheet of paper or the outer layer of dead skin cells. Explain why this reasoning fails catastrophically if an alpha-emitting isotope (like Radon gas) is inhaled or ingested, contrasting it with gamma radiation in this specific internal scenario. (2 steps)", "answer": "- Step 1: **Analyze external vs. internal exposure.** Externally, alpha particles are stopped by the dead layer of skin, causing no harm to living tissue. However, if inhaled (e.g., Radon gas) or ingested, the alpha source is now inside the body, directly adjacent to delicate, living internal cells (like lung tissue) with no dead skin barrier to protect them.\n- Step 2: **Compare the biological damage.** Because alpha particles have the highest ionising power, they deposit a massive amount of destructive energy into a very small volume of living cells, causing severe, localized DNA damage and high cancer risk. Gamma rays, while highly penetrating, are weakly ionising; they are more likely to pass straight through the body without interacting, causing less concentrated cellular damage per decay event than an internal alpha emitter.\n\n*Takeaway: The danger of radiation depends heavily on the exposure pathway; alpha is harmless outside the body but the most destructive inside it due to its intense, localized ionising power.*", "source": "Qwen 3 ②", "_id": "qwen_2_4"}, {"question": "When balancing a nuclear decay equation, the sum of the mass numbers (top numbers) and the sum of the atomic numbers (bottom numbers) must be equal on both sides of the reaction arrow. What fundamental conservation laws of physics do these two specific balancing rules represent? (2 steps)", "answer": "- Step 1: **Analyze the mass number (top number).** The mass number counts the total number of nucleons (protons + neutrons). Balancing this number represents the **conservation of nucleon number** (more fundamentally, the conservation of baryon number). It ensures that no protons or neutons are magically created or destroyed, only rearranged or transformed. *(Note: It is not strictly conservation of mass, as a small amount of mass is converted to energy via $$E=mc^2$$).*\n- Step 2: **Analyze the atomic number (bottom number).** The atomic number represents the number of protons, which dictates the total positive charge of the nucleus. Balancing this number represents the **conservation of electrical charge**. The total net charge of the system before the decay must exactly equal the total net charge after the decay.\n\n*Takeaway: Nuclear equations are essentially accounting ledgers for the universe's strict rules: you cannot create or destroy baryons, and you cannot create or destroy electrical charge.*", "source": "Qwen 3 ②", "_id": "qwen_2_12"}, {"question": "The activity $$A$$ of a radioactive sample is given by the equation $$A = \\lambda N$$. Conceptually, what does the decay constant $$\\lambda$$ represent at the level of a single nucleus, and why does the overall activity of a sample decrease over time even though $$\\lambda$$ remains perfectly constant? (2 steps)", "answer": "- Step 1: **Define the decay constant conceptually.** The decay constant ($$\\lambda$$) represents the fixed, intrinsic probability that any *single, specific* nucleus will decay in the next one second. It is a fundamental property of the isotope and does not change over time.\n- Step 2: **Explain the decrease in activity.** Activity is the *total* number of decays happening per second across the *entire* sample. Even though the probability per nucleus ($$\\lambda$$) stays the same, the total pool of available nuclei ($$N$$) is constantly shrinking as they decay. With fewer nuclei left to decay, the total number of decays per second ($$A$$) inevitably drops over time.\n\n*Takeaway: Activity drops not because the nuclei become \"more stable\" over time, but simply because there are fewer unstable nuclei left in the sample to undergo the constant-probability decay.*", "source": "Qwen 3 ②", "_id": "qwen_2_9"}, {"question": "A common exam trick: a graph of count rate vs. time for a radioactive sample shows the curve levelling off at a count rate of 12 counts per minute, not zero. A student calculates the half-life by finding where the count rate is half the *initial* value. What mistake have they made? (3 steps)", "answer": "- Step 1: The graph's asymptote at 12 counts per minute is the **background radiation** level. The curve never reaches zero because the Geiger counter always detects environmental radiation regardless of the source.\n- Step 2: The student's mistake is using the **raw** count rate (which includes background) to find the half-life. The half-life should be found from the **corrected** count rate (raw minus background). The initial corrected count rate is (initial raw − 12), and the half-life is the time for the corrected count rate to halve.\n- Step 3: If the initial raw count is 112, the corrected initial is 100. Half-life is when corrected = 50, which corresponds to a raw reading of 50 + 12 = 62 counts per minute. Finding the time when raw = 56 (half of 112) would give the **wrong** answer because it doesn't account for the constant background offset.\n\nKey takeaway: Always subtract background before reading half-life from a graph. The half-life is the time for the *source's* count rate to halve, not the *total* count rate.", "source": "GLM 5.1 ①", "_id": "glm_1_35"}, {"question": "Radioactive decay is rigorously defined as both \"random\" and \"spontaneous\". Distinguish between these two terms by explaining what a Geiger-Müller (GM) tube would detect to prove the \"random\" nature, and what experimental attempts would fail to prove the \"spontaneous\" nature. (3 steps)", "answer": "- Step 1: **Define and prove \"random\".** Random means that the exact moment a specific nucleus will decay cannot be predicted; it only has a constant probability of decaying. A GM tube proves this because the clicks (counts) are irregular and erratic, fluctuating unpredictably around an average mean rather than ticking at perfectly spaced, uniform intervals.\n- Step 2: **Define \"spontaneous\".** Spontaneous means that the decay process is entirely independent of external environmental factors or the chemical state of the atom. It is driven purely by internal nuclear instability.\n- Step 3: **Describe failed experimental attempts.** To prove it is spontaneous, one might try to alter the decay rate by heating the sample to extreme temperatures, subjecting it to immense physical pressure, or bonding it into different chemical compounds. All these attempts will completely fail; the half-life and activity will remain entirely unchanged regardless of the macroscopic environment.\n\n*Takeaway: \"Random\" refers to the unpredictable timing of individual decays, while \"spontaneous\" refers to the inability of external physical or chemical conditions to influence the decay rate.*", "source": "Qwen 3 ②", "_id": "qwen_2_8"}, {"question": "**Misconception probe:** A student says: *\"Gamma radiation isn't dangerous because it doesn't ionise atoms.\"* Why is this statement wrong, and how would you correct it? (2 steps)", "answer": "- Step 1: **The error.** Gamma radiation *is* ionising — it just does so **weakly**. The statement that gamma \"doesn't ionise\" is a common misconception. Gamma photons can knock electrons out of atoms, but they do so much less often than alpha or beta.\n- Step 2: **The correction.** Gamma is the **least ionising** of the three, but it is **still ionising**. The real danger of gamma is its high penetrating power: it gets deep into the body and deposits ionising radiation into many internal tissues. You would need a larger *dose* of gamma to cause the same localised damage as a single alpha particle — but it reaches places alpha cannot.\n\nSo the correct ordering is: alpha is the most dangerous *if ingested*, but gamma is the most dangerous *for external exposure* because it reaches the whole body.", "source": "MiniMax ②", "_id": "minimax_2_26"}, {"question": "In a nuclear fission reactor, a Uranium-235 nucleus absorbs a neutron and splits into two smaller daughter nuclei. Explain why this single event can lead to a self-sustaining chain reaction, and identify the specific particle responsible for propagating it. (2 steps)", "answer": "- Step 1: **Identify the byproducts of the split.** When the U-235 nucleus splits, it doesn't just form two daughter nuclei; it also releases a significant amount of energy and, crucially, ejects 2 to 3 fast-moving free neutrons.\n- Step 2: **Explain the propagation of the chain reaction.** These newly ejected neutrons can then travel outward and be absorbed by neighboring U-235 nuclei. Each absorption triggers another fission event, which releases even more neutrons, creating an exponential, self-sustaining cascade of nuclear splitting known as a chain reaction.\n\n*Takeaway: The chain reaction is driven by the fact that the \"fuel\" consumed (one neutron) is replaced by a greater number of \"fuels\" produced (2-3 neutrons) in every single fission event.*", "source": "Qwen 3 ②", "_id": "qwen_2_6"}, {"question": "Radon gas is a significant natural source of background radiation, particularly in areas with granite rock. Explain why radon gas poses a severe internal health hazard compared to other natural background sources like Carbon-14 in food, referencing its decay mode and physical state. (3 steps)", "answer": "- Step 1: **Analyze the physical state and exposure route.** Unlike solid food sources, radon is a noble gas. It seeps out of the ground and accumulates in poorly ventilated buildings, meaning it is continuously inhaled directly into the deep tissues of the lungs.\n- Step 2: **Identify the decay mode.** Radon-222 is an alpha emitter. As established, alpha particles have a very high ionising power but low penetrating power.\n- Step 3: **Explain the biological hazard.** Once inside the lungs, the alpha particles are emitted directly into delicate, living alveolar cells. Because they don't penetrate far, they dump all their massive ionising energy into a tiny cluster of living cells, causing severe, localized DNA double-strand breaks, which significantly increases the risk of lung cancer. Carbon-14, by contrast, is a weak beta emitter distributed throughout the body, causing far less concentrated damage.\n\n*Takeaway: Radon is dangerous because it brings a highly ionising alpha source directly into contact with vulnerable internal lung tissue via inhalation.*", "source": "Qwen 3 ②", "_id": "qwen_2_17"}, {"question": "A beta-minus (β⁻) particle is described as a \"high-energy electron emitted from the nucleus.\" But the nucleus contains only protons and neutrons — no electrons. Where does this electron come from? (3 steps)", "answer": "- Step 1: The electron does *not* pre-exist in the nucleus. It is *created* at the moment of decay when a neutron converts into a proton: $$n \\rightarrow p + e^{-} + \\bar{\\nu}_e$$.\n- Step 2: A neutron is made of one up quark and two down quarks (udd). One down quark transforms into an up quark (emitting a $$W^{-}$$ boson, which decays into an electron and antineutrino). The neutron (udd) becomes a proton (uud).\n- Step 3: This is why beta decay increases the atomic number by 1 (a new proton is created) while the mass number stays the same (a neutron is replaced by a proton — same nucleon count). The emitted electron is the beta particle.\n\nThe antineutrino ($$\\bar{\\nu}_e$$) carries away some energy and momentum, ensuring conservation laws are satisfied.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "A hydrogen bomb (thermonuclear weapon) uses fusion, but it requires a fission explosion to start. Why can't fusion be initiated without this fission \"trigger\"? (2 steps)", "answer": "- Step 1: Fusion requires temperatures of millions of kelvin and enormous pressures — conditions that cannot be practically achieved by conventional explosives or simple heating. The Coulomb barrier between protons is too strong.\n- Step 2: A fission explosion (like an atomic bomb) momentarily creates exactly these extreme conditions: intense heat and pressure in a tiny region for a fraction of a second. This brief, extreme environment is sufficient to ignite fusion in the surrounding hydrogen fuel. Without the fission trigger, there's no practical way to reach the necessary temperature and pressure simultaneously.\n\nTakeaway: Fission is the spark plug; fusion is the engine — you need the fission detonation to create conditions fusion can't reach on its own.", "source": "GLM 5.1 ②", "_id": "glm_2_27"}, {"question": "Why is a **beta particle** given a mass number of 0 and an atomic number of **−1** in nuclear equations, even though it is just an electron? (3 steps)", "answer": "- Step 1: **Mass number A.** By convention, A counts the number of *nucleons* (protons + neutrons) in the nucleus. An electron is *not* a nucleon — it lives in the electron cloud and is not in the nucleus. So in the nuclear equation, the beta particle contributes **0 to the mass number**.\n- Step 2: **Atomic number Z.** In chemical equations, Z = number of protons. But in nuclear equations, Z is used to track **charge**. The beta particle is an electron, which has charge **−1**, so its Z is written as −1.\n- Step 3: **The physics behind it.** In beta-minus decay, a neutron inside the nucleus turns into a proton (which *stays* in the nucleus) plus an electron (which is ejected as the beta particle). So the nucleus *gains* a proton (Z increases by 1) and the mass number is unchanged (a neutron became a proton, total nucleons stay the same).\n\nSo the \"−1\" is not saying the electron has the opposite of a proton's properties — it's saying the electron's *charge* is opposite.", "source": "MiniMax ②", "_id": "minimax_2_6"}, {"question": "Why does a fission chain reaction require a **critical mass** of fissile material? What happens if the mass is below this threshold? (2 steps)", "answer": "- Step 1: Each fission event releases 2-3 neutrons. For a chain reaction to sustain itself, at least one of these neutrons must successfully reach and trigger another fission. In a small sample, many neutrons escape the material's surface before hitting another nucleus — too many leak out, and the reaction fizzles.\n- Step 2: **Critical mass** is the minimum amount of fissile material where the rate of neutron production (from fissions) equals or exceeds the rate of neutron loss (from escape + non-fission absorption). Below critical mass, neutron losses dominate, and each generation produces fewer fissions than the last — the reaction dies out. Above critical mass, each generation produces more fissions → exponential growth → sustained chain reaction.\n\nTakeaway: Critical mass is the threshold where neutron gains outpace neutron losses — below it, the reaction suffocates; above it, it snowballs.", "source": "GLM 5.1 ②", "_id": "glm_2_47"}, {"question": "In the ESAT-style problem discussed in the lesson, a stationary uranium-238 nucleus undergoes alpha decay. The total kinetic energy released is E. Using momentum conservation and energy conservation, express the kinetic energy of the alpha particle in terms of E. Walk through the key algebraic steps conceptually. (4 steps)", "answer": "- Step 1: Set up the two conservation laws. Momentum: $$m_{Th}v_{Th} = m_\\alpha v_\\alpha$$ (from rest, total momentum = 0, so momenta are equal and opposite). Energy: $$E = \\frac{1}{2}m_\\alpha v_\\alpha^2 + \\frac{1}{2}m_{Th}v_{Th}^2$$ (total KE = E).\n- Step 2: From momentum conservation, express $$v_{Th}$$ in terms of $$v_\\alpha$$: $$v_{Th} = \\frac{m_\\alpha}{m_{Th}} v_\\alpha = \\frac{4}{234}v_\\alpha$$.\n- Step 3: Substitute into the thorium's KE: $$KE_{Th} = \\frac{1}{2}(234)\\left(\\frac{4}{234}v_\\alpha\\right)^2 = \\frac{1}{2}\\cdot\\frac{16}{234}v_\\alpha^2$$. The alpha's KE is $$KE_\\alpha = \\frac{1}{2}(4)v_\\alpha^2 = 2v_\\alpha^2$$. So $$E = KE_\\alpha + KE_{Th} = 2v_\\alpha^2 + \\frac{8}{234}v_\\alpha^2 = 2v_\\alpha^2\\left(1 + \\frac{4}{234}\\right) = 2v_\\alpha^2 \\cdot \\frac{238}{234}$$.\n- Step 4: Since $$KE_\\alpha = 2v_\\alpha^2$$ and $$E = 2v_\\alpha^2 \\cdot \\frac{238}{234}$$, we get $$KE_\\alpha = E \\cdot \\frac{234}{238}$$. The alpha particle carries $$\\frac{234}{238} \\approx 98.3\\%$$ of the total energy E. The thorium recoil carries only $$\\frac{4}{238} \\approx 1.7\\%$$ of E.\n\nKey takeaway: In nuclear decay from rest, the lighter fragment carries almost all the energy. The exact fraction is $$\\frac{m_{Th}}{m_{Th} + m_\\alpha} = \\frac{234}{238}$$ for the alpha, and $$\\frac{m_\\alpha}{m_{Th} + m_\\alpha} = \\frac{4}{238}$$ for the thorium.", "source": "GLM 5.1 ①", "_id": "glm_1_47"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "A Geiger counter in an empty lab records 15 counts per minute even with no radioactive source nearby. What is this called, and why doesn't the reading drop to zero? (2 steps)", "answer": "- Step 1: This is **background radiation** — low-level radiation from environmental sources that is always present around us. It is measured in Becquerel (Bq), where 1 Bq = 1 decay per second. The counter detects this constant \"hum\" of radiation from the environment itself.\n- Step 2: The reading never drops to zero because radiation comes from natural sources (radon gas from rocks, cosmic rays from space, carbon-14 in biological material, radioactive elements in food/soil) and man-made sources (medical X-rays, nuclear waste, fallout from weapons testing, nuclear accidents). These sources are omnipresent and cannot be eliminated from the environment.\n\nKey takeaway: Background radiation is an unavoidable baseline — you must always subtract it from your measurements to get the **corrected count rate** from your actual source.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A student measures radiation counts near a granite cliff and records a significantly higher count than in a lab. Which natural source of background radiation most likely explains this, and why is it particularly dangerous if inhaled? (2 steps)", "answer": "- Step 1: Granite contains heavy radioactive elements such as **uranium and thorium**. When uranium in the rocks decays, it produces **radon gas**, which is an alpha emitter. This radon gas seeps out of the rocks and soil, increasing the local radiation count.\n- Step 2: Radon is particularly dangerous when inhaled because it is an **alpha emitter**. Alpha particles are highly ionising but have very short range — they cannot penetrate skin. However, when radon gas is inhaled into the lungs, the alpha radiation directly ionises delicate lung tissue with no protective skin barrier, making it a serious internal hazard.\n\nKey takeaway: The danger of an alpha emitter depends on *where* it is — harmless outside the body (stopped by skin), but devastating inside it.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "Cosmic rays from the Sun are primarily protons, yet they contribute to background **gamma** radiation at ground level. How does a beam of protons from space lead to gamma radiation reaching the surface? (2 steps)", "answer": "- Step 1: The Sun emits enormous numbers of high-energy protons every second. These protons travel at high speeds and enter Earth's upper atmosphere.\n- Step 2: When these fast protons **collide with molecules in the air**, the interactions produce secondary radiation — including **gamma rays**. Other high-energy cosmic events (supernovae, etc.) also contribute. So the gamma radiation detected at ground level is not directly from space, but is *produced* in the atmosphere by these collisions.\n\nKey takeaway: Cosmic \"rays\" are not themselves gamma rays at the source — the gamma component of background radiation is a *secondary product* of particle collisions in the atmosphere.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "A student measures a radioactive source with a Geiger counter and records 520 counts per minute. The background radiation in the same room was previously measured at 20 counts per minute. What is the corrected count rate, and why is this correction necessary? (2 steps)", "answer": "- Step 1: The corrected count rate = measured count rate − background count rate = 520 − 20 = **500 counts per minute**. This represents the counts coming from the radioactive source alone.\n- Step 2: This correction is necessary because the Geiger counter cannot distinguish between radiation from the source and radiation from the environment. Without subtracting the background, you would overestimate the source's activity. This is especially critical when the source's count rate is low — the background becomes a significant fraction of the total reading.\n\nKey takeaway: Always measure background first (with no source present), then subtract it from every subsequent reading.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "A graph shows count rate vs. distance from a radioactive source. Beyond about 1 metre, the count rate levels off at 15 counts per minute and does not decrease further, even at 2 metres. What does this plateau value represent, and why does it stop decreasing? (2 steps)", "answer": "- Step 1: The plateau at 15 counts per minute represents the **background radiation** level. At large distances, the radiation from the source has been absorbed by the air before it can reach the detector.\n- Step 2: The reading stops decreasing because background radiation is independent of the source — it comes from the environment (radon, cosmic rays, etc.) and is present everywhere in the room regardless of distance from the source. The Geiger counter continues to detect this environmental radiation even when the source's radiation can no longer reach it.\n\nKey takeaway: If a decay or distance graph tends towards a value *above zero*, that non-zero asymptote is the background radiation level.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "An alpha particle has a charge of +2e and a mass of 4u, while a beta particle has a charge of −1e and a much smaller mass. How do these charge and mass differences explain why alpha is more strongly ionising but less penetrating than beta? (3 steps)", "answer": "- Step 1: **Ionisation** occurs when radiation passes close to an atom and delivers enough energy to knock out an electron. Alpha particles have **+2e charge** and **4u mass** — they are large, heavy, and doubly charged. This means they exert strong electromagnetic forces on atomic electrons as they pass, pulling electrons off atoms very effectively over a very short distance. Each collision transfers significant energy, so the alpha loses energy rapidly.\n- Step 2: **Penetration** depends on how far the radiation can travel before losing all its energy. Because alpha particles ionise so strongly (high energy loss per unit distance), they dump all their energy into the first few thousand atoms they encounter. They travel only a few cm in air and are stopped by paper or skin.\n+ Beta particles have −1e charge (weaker electromagnetic interaction) and ~1/8000th the mass of an alpha (much lighter). They ionise less per unit distance, so they lose energy more slowly.\n- Step 3: The trade-off is fundamental: **higher ionising power = faster energy loss = lower penetration**. Alpha: most ionising, least penetrating. Beta: moderately ionising, moderately penetrating. Gamma: weakly ionising (no charge, no mass — only indirect ionisation via photoelectric/Compton effects), most penetrating.\n\nKey takeaway: Ionising power and penetrating power are inversely related — the very property that makes radiation good at damaging atoms also makes it run out of energy quickly.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "Gamma radiation has no charge and no mass. Yet it can still damage living cells. How does an uncharged, massless electromagnetic wave ionise atoms, and why does it need a \"larger dose\" to cause the same damage as alpha? (3 steps)", "answer": "- Step 1: Gamma rays are high-energy **electromagnetic photons**. Although they have no charge or mass, they carry energy (related to frequency by $$E = hf$$). When a gamma photon interacts with an atom, it can transfer its energy to an atomic electron through processes like the **photoelectric effect** or **Compton scattering**, ejecting the electron and ionising the atom.\n- Step 2: However, because gamma rays have **no charge**, they do not experience the Coulomb attraction/repulsion that alpha and beta particles do when passing near atoms. This means the probability of a gamma photon interacting with any given atom is much lower — most gamma photons pass through matter without interacting at all. This is why gamma is **weakly ionising**.\n- Step 3: Because each gamma photon has a low probability of causing an ionisation event, you need **many more gamma photons** (a larger dose) to produce the same number of ionisations as a much smaller number of alpha particles. But it is incorrect to say \"gamma cannot harm cells\" — it absolutely can, just less efficiently per photon.\n\nKey takeaway: Gamma *does* ionise and *does* harm cells — it's just less efficient at it per particle/photon, so a larger dose is needed for equivalent damage.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "A radioactive source is placed outside someone's body. Which type of radiation — alpha, beta, or gamma — is the least dangerous in this scenario, and which is the most dangerous? Why does the answer change if the source is ingested? (3 steps)", "answer": "- Step 1: **Outside the body:** Alpha is the least dangerous because it is stopped by the outer dead layer of skin — it cannot reach living cells. Gamma is the most dangerous externally because it penetrates deep into tissue and can reach internal organs. Beta is intermediate.\n- Step 2: **Inside the body (ingested/inhaled):** The situation reverses for alpha. Once inside, there is no skin to stop it. The alpha particles' high ionising power now acts directly on delicate internal tissues, causing intense localised damage. Alpha becomes the most dangerous internally.\n- Step 3: Beta and gamma are still dangerous internally, but their ionising power per unit distance is lower, so the damage per particle is less concentrated. The key insight is: **danger depends on whether the radiation can reach living cells**, and the skin barrier makes external alpha harmless but internal alpha devastating.\n\nKey takeaway: The same radiation type can be relatively harmless in one context and extremely dangerous in another — always consider the location of the source relative to the body.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": true}, {"question": "In the nuclear equation for beta decay, the emitted electron is assigned an atomic number of −1. Why is a *negative* atomic number used for a particle, and what does this number actually represent in nuclear equations? (3 steps)", "answer": "- Step 1: In nuclear equations, the **lower number (atomic number, Z)** is not just a count of protons — it represents **charge in units of the elementary charge $$e$$**. A proton has charge +1e, so it has Z = +1. An electron has charge −1e, so it has Z = −1.\n- Step 2: This convention ensures that nuclear equations **balance in charge** as well as in mass. When a nucleus undergoes beta decay, a neutron converts into a proton and an electron. If the electron is assigned Z = −1, then: the original nucleus had charge Z; after decay, the new nucleus has charge Z + 1, and the electron has charge −1, so total charge on the right = (Z + 1) + (−1) = Z. Charge is conserved.\n- Step 3: Without this convention, you could not balance the equation. The atomic number is really a **charge number** — it just happens to equal the number of protons for nuclei, but for emitted particles it encodes their charge. The antineutrino (also emitted in beta decay) has Z = 0 because it is neutral.\n\nKey takeaway: In nuclear equations, the lower number = charge in units of $$e$$, not just \"number of protons.\" This is why the beta particle gets Z = −1.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "When a nucleus undergoes alpha decay, it emits a particle with 2 protons and 2 neutrons. Why does the mass number decrease by exactly 4 and the atomic number by exactly 2? Why doesn't the atomic number decrease by 4? (2 steps)", "answer": "- Step 1: The **mass number (A)** counts the total number of nucleons (protons + neutrons). The alpha particle carries away 2 protons + 2 neutrons = 4 nucleons total. So the mass number of the daughter nucleus is A − 4.\n- Step 2: The **atomic number (Z)** counts only the number of protons (which determines the element). The alpha particle carries away 2 protons, so the atomic number decreases by 2. The 2 neutrons in the alpha particle do not affect Z because neutrons have zero charge — they contribute to mass but not to the proton count or the element's identity.\n\nKey takeaway: Mass number drops by 4 (total nucleons removed), atomic number drops by 2 (only protons removed). The element changes because Z changes.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "In beta-minus decay, a neutron transforms into a proton and an electron. The mass number stays the same, but the atomic number increases by 1. How can the mass number remain unchanged when a new proton has been \"created\"? (3 steps)", "answer": "- Step 1: The mass number counts the **total number of nucleons** (protons + neutrons). Before decay, the nucleus has N neutrons and Z protons, giving mass number A = N + Z. After decay, one neutron has become a proton: the nucleus now has (N − 1) neutrons and (Z + 1) protons, giving mass number A = (N − 1) + (Z + 1) = N + Z. The total nucleon count is unchanged.\n- Step 2: The electron emitted in beta decay is **not a nucleon** — it is a lepton, not a proton or neutron. It does not contribute to the mass number. The mass number only counts nucleons in the *nucleus*, and the total nucleon count hasn't changed.\n- Step 3: The atomic number increases by 1 because there is now one more proton in the nucleus. This means the daughter nucleus is a **different element** from the parent — it has moved one place to the right in the periodic table.\n\nKey takeaway: Beta decay converts a neutron to a proton *inside* the nucleus — one nucleon type changes into the other, so the total nucleon count (mass number) is conserved, but the proton count (atomic number) changes, changing the element.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "A nucleus undergoes gamma decay. Do its mass number and atomic number change? What physical property of the nucleus *does* change, and why? (2 steps)", "answer": "- Step 1: In gamma decay, the nucleus emits a high-energy **photon** (electromagnetic wave). A photon has zero mass and zero charge, so it carries away **no nucleons and no charge**. Therefore, both the mass number (A) and atomic number (Z) of the nucleus remain **unchanged**. The element does not change.\n- Step 2: What changes is the **energy state** of the nucleus. The nucleus was in an excited (high-energy) state, typically after a previous alpha or beta decay. By emitting a gamma photon, it loses energy and drops to a lower, more stable energy state. The nucleus's internal structure (arrangement of nucleons) relaxes, but its composition (number of protons and neutrons) stays the same.\n\nKey takeaway: Gamma decay is an **energy release**, not a composition change. It's the nuclear equivalent of an electron dropping to a lower energy level and emitting a photon.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Uranium-238 (Z = 92) undergoes one alpha decay followed by two beta decays. What is the mass number and atomic number of the final daughter nucleus? Show how each decay step changes A and Z. (3 steps)", "answer": "- Step 1: **Alpha decay:** A decreases by 4, Z decreases by 2. Starting from $$^{238}_{92}$$U: A → 238 − 4 = 234, Z → 92 − 2 = 90. The intermediate nucleus is $$^{234}_{90}$$Th (thorium).\n- Step 2: **First beta decay:** A stays the same, Z increases by 1. A → 234, Z → 90 + 1 = 91. The nucleus is now $$^{234}_{91}$$Pa (protactinium).\n- Step 3: **Second beta decay:** A stays the same, Z increases by 1 again. A → 234, Z → 91 + 1 = 92. The final nucleus is $$^{234}_{92}$$U (uranium). Notice that the final atomic number is back to 92 (same as the original element), but the mass number has dropped from 238 to 234 — it is a different isotope of uranium.\n\nKey takeaway: Multiple decays can return the atomic number to its original value (via alpha + two betas: −2 + 1 + 1 = 0 net change in Z), but the mass number will always be reduced by the alpha decays.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "A nuclear equation shows a nucleus with Z = 86 decaying into a nucleus with Z = 84 and an alpha particle. If the parent nucleus has mass number 222, what is the mass number of the daughter? How do you verify the equation balances? (2 steps)", "answer": "- Step 1: The alpha particle has mass number 4 and atomic number 2. By conservation of mass number: 222 = A(daughter) + 4, so A(daughter) = 222 − 4 = **218**. By conservation of atomic number: 86 = 84 + 2, which checks out. The daughter is $$^{218}_{84}$$Po.\n- Step 2: To verify balance: sum of upper numbers on the left = 222; sum on the right = 218 + 4 = 222. ✓ Sum of lower numbers on the left = 86; sum on the right = 84 + 2 = 86. ✓ Both mass number and charge are conserved.\n\nKey takeaway: Nuclear equations must balance in **both** the upper (mass/nucleon) number and the lower (charge/atomic) number, just like chemical equations balance atoms and charge.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "In the core practical investigating gamma radiation absorption by lead, why is it essential to measure background radiation *before* taking any readings with the source, and why must the experiment be conducted in the same location throughout? (2 steps)", "answer": "- Step 1: Measuring background radiation first (with no source present, over a five-minute period) gives you the **baseline count rate** from environmental radiation. This must be subtracted from all subsequent readings to obtain the **corrected count rate** due to the source alone. Without this correction, the absorption results would be systematically wrong — the lead would appear less effective than it really is, because the background counts are unaffected by the lead.\n- Step 2: The experiment must stay in the **same location** because background radiation levels vary from place to place (e.g., near concrete walls, different radon levels). If you moved to a different location mid-experiment, the background level could change, introducing a **systematic error** in the corrected count rates. Keeping all variables constant except the lead thickness ensures a fair test.\n\nKey takeaway: Background subtraction removes systematic bias; consistent location prevents systematic drift in that background level.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "In the gamma absorption practical, why are Vernier callipers used to measure lead sheet thickness instead of a standard ruler, and why is the thickness measured at *three points* on each sheet? (2 steps)", "answer": "- Step 1: **Vernier callipers** have a resolution of 0.01 mm (compared to a ruler's 1 mm). Since the lead sheets are thin (a few mm), a ruler would introduce a large **percentage uncertainty** in the thickness measurement. Vernier callipers reduce this uncertainty significantly, making the independent variable more precise.\n- Step 2: Measuring at **three points** on each sheet accounts for the fact that the sheets may not be **perfectly uniform** in thickness — some areas may be slightly thicker or thinner. Taking three measurements and calculating the average thickness gives a more representative value and reduces the effect of random variations in the sheet's manufacture.\n\nKey takeaway: Precision in the independent variable (thickness) is critical — Vernier callipers reduce instrument uncertainty, and multiple measurements reduce random variation in the material itself.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "In the gamma absorption practical, why are three count rate readings taken for each thickness of lead rather than just one? How would you determine when the gamma radiation has been fully absorbed? (2 steps)", "answer": "- Step 1: Taking **three readings per thickness** and calculating a mean reduces the effect of **random fluctuations** in the count rate. Nuclear decay is random, so the count rate varies from minute to minute even under identical conditions. Averaging multiple readings gives a more reliable measure of the true count rate for that thickness.\n- Step 2: You determine that gamma radiation has been fully absorbed when the corrected count rate (after subtracting background) **falls to zero** — or more practically, when the count rate with the source and absorber equals the background count rate (allowing for small random variations). At this point, all the source's radiation has been absorbed by the lead, and only background radiation is being detected.\n\nKey takeaway: Repetition handles random fluctuations in decay; comparing to background determines when absorption is complete.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "When handling a radioactive source in the lab, you are told to use tongs, point the source away from you, and wash your hands afterwards. Which type of radiation is the primary concern for each safety rule, and why? (3 steps)", "answer": "- Step 1: **Using tongs (or keeping a metre distance):** This is primarily about **gamma and beta radiation**, which can penetrate air and reach your body at a distance. Increasing distance reduces the intensity (inverse square law for a point source), dramatically reducing your exposure. Tongs also reduce skin contact time.\n- Step 2: **Pointing the source away from you:** This relates to **directional emission**. While radiation is emitted in all directions, the most intense flux is along the axis of some sources. More importantly, this ensures you're not in the direct beam path. For beta emitters, the radiation is somewhat directional; for gamma, distance matters more.\n- Step 3: **Washing hands and removing outer clothing:** This is primarily about **alpha contamination**. If radioactive material gets on your hands or clothes (microscopic dust or contamination), you could later ingest or inhale it. Once inside the body, alpha radiation becomes extremely dangerous. Washing removes any surface contamination before it can enter your body through food or mouth contact.\n\nKey takeaway: Distance and shielding protect against external gamma/beta; decontamination protects against internal alpha exposure.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Radioactive decay is described as both \"spontaneous\" and \"random.\" These are two distinct properties. What is the difference between them, and what evidence supports each? (3 steps)", "answer": "- Step 1: **Spontaneous** means the decay is not influenced by any external environmental factors — temperature, pressure, chemical bonding, or electromagnetic fields cannot speed up or slow down the decay. Evidence: experiments showing that the decay rate of a sample is unchanged regardless of heating, cooling, compressing, or dissolving the substance.\n- Step 2: **Random** means the exact time at which any *individual* nucleus will decay cannot be predicted. Each nucleus has a constant probability of decaying per unit time, but you cannot say which nucleus will decay next or when. Evidence: the **fluctuations** in Geiger counter readings — the count rate varies irregularly from second to second, with no predictable pattern.\n- Step 3: The key distinction: \"spontaneous\" is about **external independence** (the environment doesn't affect it), while \"random\" is about **unpredictability** (individual decays can't be foreseen). Together, they mean that while we can't predict or control individual decays, we can statistically predict the *average* behaviour of a large sample — this is what gives rise to the exponential decay law.\n\nKey takeaway: Spontaneous = unaffected by environment; Random = individual decays are unpredictable. Both must be true for the statistical (exponential) decay law to hold.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A student heats a radioactive sample to 500°C and measures its activity. Another student places an identical sample under high pressure. Neither finds a change in activity compared to room conditions. Which property of nuclear decay does this demonstrate, and why can't we influence nuclear processes the way we influence chemical ones? (2 steps)", "answer": "- Step 1: This demonstrates the **spontaneous** nature of nuclear decay — it is not influenced by environmental factors such as temperature or pressure. The activity remains the same regardless of conditions.\n- Step 2: The reason is that nuclear processes are governed by the **strong nuclear force** and the **weak nuclear force** (which mediates beta decay), operating at distances of ~1 fm ($$10^{-15}$$ m) inside the nucleus. Thermal energies at 500°C (~0.07 eV) are utterly negligible compared to nuclear energy scales (MeV). Chemical bonds and external conditions affect the electron cloud (at $$10^{-10}$$ m scales), but they cannot reach into the nucleus to alter the balance of forces that determines stability. The nucleus is effectively isolated from its chemical and thermal environment.\n\nKey takeaway: Nuclear energies are millions of times larger than thermal/chemical energies, so external conditions cannot influence nuclear decay — this is what \"spontaneous\" means physically.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "A Geiger counter near a radioactive source shows the count rate fluctuating: 82, 91, 77, 85, 93, 80 counts per minute over six consecutive minutes. What property of decay does this demonstrate, and why can we still make accurate predictions about the sample's long-term behaviour? (2 steps)", "answer": "- Step 1: The irregular, unpredictable fluctuations in count rate demonstrate the **random** nature of nuclear decay. Each count corresponds to the decay of one nucleus, and you cannot predict exactly when the next decay will happen. The count rate varies because the exact number of decays in each minute is a random variable.\n- Step 2: Despite this randomness, with **large numbers of nuclei**, the statistical behaviour becomes predictable. The average count rate follows the exponential decay law $$N = N_0 e^{-\\lambda t}$$. This is analogous to flipping a coin: you can't predict one flip, but with a million flips you can confidently predict ~50% heads. The law of large numbers ensures that the *average* decay rate is well-defined and follows deterministic equations, even though individual decays are random.\n\nKey takeaway: Randomness governs individual events; statistics governs ensembles. The exponential decay law is an emergent statistical regularity from random individual decays.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "The decay constant $$\\lambda$$ is defined as \"the probability per second that a given nucleus will decay.\" If $$\\lambda = 0.05 \\text{ s}^{-1}$$, does this mean each nucleus has a 5% chance of decaying every second? Why can't we simply say a nucleus will definitely decay after $$1/\\lambda = 20$$ seconds? (3 steps)", "answer": "- Step 1: Yes, $$\\lambda = 0.05 \\text{ s}^{-1}$$ means each nucleus has a 5% probability of decaying in any given second. But this is a **constant probability** — it doesn't accumulate. After one second, the nucleus has a 5% chance of having decayed and a 95% chance of still being undecayed.\n- Step 2: After two seconds, the probability of *still* being undecayed is not 90% — it's $$(1 - 0.05)^2 = 0.95^2 = 0.9025$$, or about 90.25%. After 20 seconds, the probability of still being undecayed is $$0.95^{20} \\approx 0.36$$, so there's only about a 64% chance it has decayed — not 100%.\n- Step 3: The quantity $$1/\\lambda$$ (20 seconds in this case) is the **mean lifetime** (τ), which is the *average* time a nucleus survives before decaying. But \"average\" means some decay much sooner and some much later. There is no guaranteed time at which any specific nucleus *will* decay — the process is random, and the exponential distribution has a long tail.\n\nKey takeaway: $$\\lambda$$ is a *rate* (probability per second), not a guarantee. $$1/\\lambda$$ is the average lifetime, not a fixed decay time. Individual nuclei can survive far longer or shorter than the mean.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "The activity of a sample is given by $$A = \\lambda N$$. If a sample has 10,000 nuclei and $$\\lambda = 0.01 \\text{ s}^{-1}$$, what is its activity? As the sample decays and N decreases, what happens to the activity, and why? (3 steps)", "answer": "- Step 1: Activity $$A = \\lambda N = 0.01 \\times 10{,}000 = 100$$ decays per second = 100 Bq. This means, on average, 100 nuclei in the sample decay each second at this moment.\n- Step 2: As time passes, nuclei decay and **N decreases**. Since $$A = \\lambda N$$ and $$\\lambda$$ is constant for a given isotope, the activity **decreases proportionally** with N. As there are fewer undecayed nuclei remaining, there are fewer \"candidates\" available to decay each second.\n- Step 3: This creates a self-regulating feedback: high activity → many decays → N drops quickly → activity drops → fewer decays → N drops more slowly. This is why radioactive decay follows an **exponential** curve rather than a linear one — the rate of decay is always proportional to the amount remaining, giving the characteristic curved decline that starts steep and gradually flattens.\n\nKey takeaway: $$A = \\lambda N$$ tells us that activity is directly proportional to the number of undecayed nuclei. As N falls, so does A — this is the physical origin of exponential decay.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "Starting from the statement \"the rate of change of N is proportional to N,\" derive the exponential decay equation $$N = N_0 e^{-\\lambda t}$$. Walk through each step and explain the physical meaning. (4 steps)", "answer": "- Step 1: The fundamental observation is that the **rate of decay** (number of nuclei decaying per unit time) is proportional to the **number of undecayed nuclei remaining**: $$\\frac{dN}{dt} = -\\lambda N$$. The minus sign indicates N is decreasing over time. The constant of proportionality $$\\lambda$$ is the decay constant.\n- Step 2: This is a differential equation. Rearrange to separate variables: $$\\frac{dN}{N} = -\\lambda \\, dt$$. This says \"the fractional change in N equals $$-\\lambda$$ times the time interval.\"\n- Step 3: Integrate both sides. Left side: $$\\int \\frac{dN}{N} = \\ln N$$. Right side: $$\\int -\\lambda \\, dt = -\\lambda t + C$$ (where C is a constant). So: $$\\ln N = -\\lambda t + C$$.\n- Step 4: At $$t = 0$$, $$N = N_0$$ (the initial number of nuclei), so $$\\ln N_0 = C$$. Substituting: $$\\ln N = -\\lambda t + \\ln N_0$$, which gives $$\\ln\\left(\\frac{N}{N_0}\\right) = -\\lambda t$$, and finally: $$N = N_0 e^{-\\lambda t}$$.\n\nKey takeaway: The exponential form arises because the decay *rate* is proportional to the *amount remaining* — this is the defining characteristic of any exponential process (same mathematics as cooling, discharge of a capacitor, etc.).", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "Half-life $$t_{1/2}$$ is defined as the time for half the nuclei to decay. Starting from $$N = N_0 e^{-\\lambda t}$$, derive the relationship $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$. Explain why a larger decay constant means a shorter half-life. (3 steps)", "answer": "- Step 1: At the half-life time $$t = t_{1/2}$$, by definition $$N = \\frac{N_0}{2}$$. Substitute into the exponential equation: $$\\frac{N_0}{2} = N_0 e^{-\\lambda t_{1/2}}$$.\n- Step 2: Divide both sides by $$N_0$$: $$\\frac{1}{2} = e^{-\\lambda t_{1/2}}$$. Take natural logs: $$\\ln\\left(\\frac{1}{2}\\right) = -\\lambda t_{1/2}$$, which gives $$-\\ln 2 = -\\lambda t_{1/2}$$, so $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$.\n- Step 3: Since $$\\ln 2 \\approx 0.693$$ is a constant, $$t_{1/2}$$ is **inversely proportional** to $$\\lambda$$. A larger decay constant means each nucleus has a higher probability of decaying per second, so the sample decays faster and reaches the half-way point sooner. Conversely, a very stable isotope (small $$\\lambda$$) has a very long half-life.\n\nKey takeaway: $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$ — half-life and decay constant are two ways of expressing the same property. A large $$\\lambda$$ = short half-life = highly active; a small $$\\lambda$$ = long half-life = slowly decaying.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "A sample has a half-life of 15 minutes. After 45 minutes, what fraction of the original nuclei remain? Do this without a calculator by reasoning about the number of half-lives elapsed. (2 steps)", "answer": "- Step 1: The number of half-lives elapsed is $$\\frac{45}{15} = 3$$ half-lives. Each half-life reduces the number of undecayed nuclei by a factor of 2.\n- Step 2: After 3 half-lives, the fraction remaining is $$\\left(\\frac{1}{2}\\right)^3 = \\frac{1}{8}$$. So only one-eighth (12.5%) of the original nuclei remain. In general, after $$n$$ half-lives, the fraction remaining is $$\\left(\\frac{1}{2}\\right)^n$$.\n\nKey takeaway: For integer numbers of half-lives, just halve repeatedly. After n half-lives, fraction remaining = $$(1/2)^n$$.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "A radioactive isotope used as a medical tracer starts with 100,000 nuclei and has a half-life of 2.6 days. After 13 days, roughly what percentage of the original nuclei remain, and is the dose likely safe? (3 steps)", "answer": "- Step 1: Number of half-lives in 13 days = $$\\frac{13}{2.6} = 5$$ half-lives.\n- Step 2: Fraction remaining = $$(1/2)^5 = 1/32 \\approx 0.031$$, so about **3.1%** of the original nuclei remain. Out of 100,000, that's roughly 3,100 nuclei.\n- Step 3: Whether this is \"safe\" depends on context, but the key insight is that after 5 half-lives, the activity has dropped to ~3% of its original value. For a medical tracer designed to be used over a couple of days, this represents a significant reduction in radiation dose. The doctor's claim that it's safe to dispose of after 13 days is reasonable — the remaining activity is a small fraction of the already-small medical dose.\n\nKey takeaway: Each half-life roughly halves the activity. After 5 half-lives, you're at ~3% — after 10 half-lives, you'd be at ~0.1%. This exponential reduction is what makes short-half-life tracers safe for temporary medical use.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "The half-life equation and the exponential equation describe the same decay. If you know the half-life is 10 years, how would you find the decay constant $$\\lambda$$, and then use it to predict what fraction remains after 25 years? (3 steps)", "answer": "- Step 1: From the relationship $$t_{1/2} = \\frac{\\ln 2}{\\lambda}$$, rearrange: $$\\lambda = \\frac{\\ln 2}{t_{1/2}} = \\frac{0.693}{10} \\approx 0.0693 \\text{ yr}^{-1}$$.\n- Step 2: Use the exponential decay equation: $$N = N_0 e^{-\\lambda t} = N_0 e^{-0.0693 \\times 25} = N_0 e^{-1.7325}$$.\n- Step 3: Without a calculator, we can reason: $$e^{-1.7325}$$ means the fraction remaining is between $$e^{-1} \\approx 0.37$$ and $$e^{-2} \\approx 0.14$$. Since 1.73 is closer to 2, the fraction is closer to 0.18 (roughly). Alternatively, 25 years = 2.5 half-lives, so fraction = $$(1/2)^{2.5} = (1/2)^2 \\times (1/2)^{0.5} = 0.25 \\times 0.707 \\approx 0.177$$, so about **18%** remains.\n\nKey takeaway: For non-integer half-lives, use the exponential equation with $$\\lambda = \\ln 2 / t_{1/2}$$. You can also estimate by breaking the time into whole + fractional half-lives.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "Since activity $$A = \\lambda N$$ and $$N = N_0 e^{-\\lambda t}$$, write the expression for how activity changes with time. Does activity have the same half-life as the number of nuclei? (3 steps)", "answer": "- Step 1: Substitute $$N = N_0 e^{-\\lambda t}$$ into $$A = \\lambda N$$: $$A = \\lambda N_0 e^{-\\lambda t}$$. At $$t = 0$$, the initial activity is $$A_0 = \\lambda N_0$$, so we can write: $$A = A_0 e^{-\\lambda t}$$.\n- Step 2: This has exactly the same exponential form as the equation for N. The activity decays exponentially with the **same decay constant** $$\\lambda$$.\n- Step 3: Since the half-life depends only on $$\\lambda$$ (via $$t_{1/2} = \\ln 2 / \\lambda$$), the half-life of the **activity** is the **same** as the half-life of the number of nuclei. This makes physical sense: if half the nuclei have decayed, then half the potential \"decayers\" are gone, so the activity must also be halved.\n\nKey takeaway: N, A, and even the mass of the radioactive substance all decay with the **same half-life** and the same exponential form. They are all proportional to each other.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "Nuclear fission is triggered by a *slow* neutron hitting a uranium nucleus. Why must the neutron be slow, and why can't a proton be used instead to trigger the chain reaction? (3 steps)", "answer": "- Step 1: A **slow neutron** is used because it needs to be **captured** by the uranium nucleus. If the neutron is moving too fast, it passes through the nucleus without being absorbed — like a fast ball glancing off a catcher's mitt. A slow neutron lingers near the nucleus long enough for the strong nuclear force to capture it, making the nucleus unstable and causing it to split.\n- Step 2: A **proton** cannot be used because it is **positively charged**. The uranium nucleus also has a large positive charge (Z = 92). The proton would be **repelled** by the Coulomb force before it could get close enough for the short-range strong nuclear force to capture it. You would need enormous energy to overcome this repulsion.\n- Step 3: A neutron has **zero charge**, so it experiences **no Coulomb repulsion** from the nucleus. It can approach freely and be captured at low energy. This is why neutrons are the ideal \"trigger\" for fission — they can penetrate the nucleus without needing to overcome any electrical barrier.\n\nKey takeaway: Neutrons are the key to fission because they are uncharged — they can enter the nucleus at low energy. Protons are repelled by the nuclear charge barrier.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}, {"question": "When a uranium nucleus undergoes fission after absorbing a neutron, it splits into two smaller nuclei and releases 2–3 neutrons. Explain how this leads to a **chain reaction**, and why controlling the number of neutrons available is critical in a nuclear reactor. (3 steps)", "answer": "- Step 1: The original slow neutron is absorbed by a uranium nucleus, causing it to split. The 2–3 neutrons released in this fission event are **fast-moving**. If these neutrons are not absorbed or slowed, each one can go on to trigger another fission event in a neighbouring uranium nucleus.\n- Step 2: If each fission releases ~3 neutrons, and each of those triggers another fission, the number of fissions grows: 1 → 3 → 9 → 27 → 81 → ... This is an **exponentially growing chain reaction**. In an uncontrolled chain reaction (nuclear weapon), this runaway process releases enormous energy in a fraction of a second.\n- Step 3: In a **nuclear reactor**, control rods (made of neutron-absorbing material like boron) are inserted to absorb some of the neutrons. By controlling how many neutrons are available to cause further fissions, the reaction rate is kept **critical but not supercritical** — each fission produces on average exactly one neutron that goes on to cause another fission, maintaining a steady power output.\n\nKey takeaway: The chain reaction is the exponential multiplication of fission events via released neutrons. Control rods regulate this by absorbing excess neutrons, preventing runaway.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": true}, {"question": "Nuclear fusion requires extremely high temperatures and pressures, while fission occurs at room temperature once triggered. Why does fusion need such extreme conditions but fission does not? (3 steps)", "answer": "- Step 1: **Fusion** involves bringing two **positively charged** nuclei close enough for the **strong nuclear force** to bind them together. However, the strong force only acts at very short ranges (~1 fm). Before the nuclei can get that close, they must overcome the **Coulomb repulsion** between their positive charges. This requires enormous **kinetic energy** (high temperature) to approach fast enough, and high **density** (high pressure) so nuclei encounter each other frequently.\n- Step 2: **Fission** involves a neutron entering
