bites en Espagne?*) is the most informal. You keep the exact statement structure but raise your voice at the end. It's strictly oral and casual.\n- Step 2: 2) *Est-ce que* (*Est-ce que tu habites en Espagne?*) is the middle ground. It's a universal \"question flag\" that works in both oral and written French without changing the rest of the sentence.\n- Step 3: 3) Inversion (*Habites-tu en Espagne?*) is the most formal. You physically flip the verb and subject pronoun, connecting them with a hyphen. This is common in writing, formal speeches, and literature, but sounds stiff in casual conversation.\n+ The hyphen in inversion is the visual grammatical signal that the sentence is a question, even without a question mark.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "The question word \"Est-ce que\" is added to the front of a statement to turn it into a question. What is the literal, historical meaning of \"Est-ce que,\" and why does it act as an unchanging \"question flag\" regardless of the subject or verb that follows? (2 steps)", "answer": "- Step 1: *Est-ce que* literally breaks down to \"Is it that...\" (*Est* = is, *ce* = it, *que* = that). Historically, asking a question meant asking \"Is it true that [statement]?\" So \"Est-ce que tu habites en Espagne?\" literally means \"Is it that you live in Spain?\"\n- Step 2: Over time, *est-ce que* fossilized into an unchanging grammatical unit. You never conjugate the *est* to match the main verb. It always stays *est-ce que* (or *est-ce qu'* before a vowel), acting purely as a question-triggering prefix that leaves the original sentence completely intact.\n+ It is the most versatile question form because it requires no complex grammar (no inversion) and works for any subject or verb.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "When doing inversion with a verb ending in a vowel and a subject pronoun starting with a vowel (e.g., *Aime-il?*), French inserts a \"t\" to break the clash: *Aime-t-il*. Why is this phonetic \"t\" necessary, and what does it reveal about French pronunciation priorities? (2 steps)", "answer": "- Step 1: If the verb ends in a vowel (*aime*) and the subject pronoun starts with a vowel (*il*), you get a phonetic clash: *aime-il* would sound like a stuttering, blurred mess of vowels running together.\n- Step 2: French pronunciation demands smooth transitions and hates consecutive vowels (hiatus). To break the collision, a phonetic \"t\" is artificially inserted between the verb and the pronoun: *Aime-t-il*. This \"t\" has no grammatical meaning—it is purely a phonetic lubricant to make the sentence flow smoothly.\n+ This most commonly appears with -er verbs (whose forms end in 'e') and verbs like *a* (A-t-il?) or *est* (Est-il? uses the existing 't' in 'est').", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "The CEFR defines levels by \"can-do\" descriptors, not by fixed hour quotas. However, schools estimate A1→A2 takes ~100-120 guided hours. Why is \"finishing a course unit\" not the same as being \"exam-ready,\" and why does the roadmap add a 20% buffer to the core hours? (2 steps)", "answer": "- Step 1: The CEFR defines levels by what you can *actually do* in the language, not by checking off a textbook syllabus. Finishing an A2 course unit means you saw the material; it doesn't mean you can reliably produce A2 output under exam pressure.\n- Step 2: A 20% buffer is added to the core guided hours (e.g., 110h becomes 132h) because exam readiness requires comfortable, spontaneous recall, not just familiar recognition. You need extra hours to move from \"I understand this when I see it\" to \"I can use this correctly when speaking or writing.\"\n+ B2 in particular requires you to argue and defend opinions. You can't pass a B2 test just by \"knowing the grammar rules\"—you need output fluency, which demands extra practice hours.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "If you are applying for a French \"carte de séjour\" (residence permit) versus \"naturalisation\" (nationality), what CEFR levels are legally required for each, and why does the government demand a jump from A2/B1 to B2 for full citizenship? (2 steps)", "answer": "- Step 1: For a *carte de séjour pluriannuelle* (multi-year residence permit), the legal requirement is A2 (basic survival French). For a *carte de résident* (long-term resident card), it jumps to B1 (independent daily life).\n- Step 2: For *naturalisation* (nationality/citizenship), it leaps to B2. The government demands B2 because full citizenship involves civic participation: defending complex opinions, understanding legal and political arguments, and integrating deeply into French society. A2/B1 cannot support this level of civic engagement.\n+ B2 is also the minimum for most French higher education institutions, with C1 recommended for humanities.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "The roadmap distinguishes \"guided hours\" from \"passive background exposure.\" Why is watching a French Netflix show not counted the same as a structured 90-minute lesson, and what must you actively do during listening for it to count as guided learning? (2 steps)", "answer": "- Step 1: Passive exposure (watching Netflix, listening to music) builds familiarity and intuition, but it doesn't force your brain to retrieve structures or produce output. You can understand a show without being able to speak a word of French yourself.\n- Step 2: Guided hours require active cognitive engagement: deliberate recall, error correction, structured output (writing/speaking), and comprehension exercises with feedback. For passive listening to count towards guided learning, you must actively do something with it—shadowing (repeating aloud), noting vocabulary, answering comprehension questions, or pausing to parse grammar.\n+ Casual scrolling is a bonus, not a core hour. It helps immersion but does not build reliable output skill on its own.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "Scenario S3 (2 lessons/week + review + 20 min/day) takes ~1.9 years to reach B2, while school-only (2 lessons/week) takes ~4.6 years. Conceptually, why does a small daily habit (20 min) slash the total timeline by more than half, and what cognitive mechanism does daily practice leverage? (3 steps)", "answer": "- Step 1: School-only (3h/week) takes ~4.6 years because the spacing between lessons is too wide. The brain forgets a large portion of what was learned before the next lesson, creating a constant re-learning loop.\n- Step 2: Scenario S3 adds just 20 minutes of daily practice. Daily practice leverages the \"spacing effect\" and \"retrieval practice\"—forcing the brain to recall newly learned items right at the edge of forgetting, which is the optimal moment for memory consolidation.\n- Step 3: By preventing the decay that happens between weekly lessons, 20 minutes/day slashes the total time by over half. You spend less total time re-learning forgotten material and more time advancing to new material.\n+ This proves that frequency of exposure beats duration of exposure. Small, daily doses are far more efficient than large, weekly blocks.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": true}, {"question": "Convert the affirmative sentence \"Vous avez une crème brûlée\" into the negative form. Walk through the structural changes to the verb and the article. (2 steps)", "answer": "- Step 1: Start with the affirmative: \"Vous avez une crème brûlée.\" The verb is *avez*. Apply the negation sandwich: *ne* before *avez*, *pas* after *avez*. This creates \"Vous n'avez pas...\" (Note: *ne* drops its 'e' and becomes *n'* because *avez* starts with a vowel).\n- Step 2: Apply the negative article rule: the indefinite article *une* collapses to *de* in the negative (since *crème* doesn't start with a vowel here, we use *de*, not *d'*). The final sentence is: \"Vous n'avez pas de crème brûlée.\"", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "Take the statement \"Vous regardez la télévision le soir.\" Convert it into the *est-ce que* question format and the *inversion* question format. (2 steps)", "answer": "- Step 1: For the *est-ce que* form, simply prefix the statement with the unchanging question flag. The original sentence remains untouched: \"Est-ce que vous regardez la télévision le soir?\"\n- Step 2: For the inversion form, flip the conjugated verb (*regardez*) and the subject pronoun (*vous*), linking them with a hyphen. The rest of the sentence stays the same: \"Regardez-vous la télévision le soir?\"\n+ Notice that *la télévision le soir* (the object and time context) never moves in either format. Only the subject-verb relationship changes.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "If 70 is *soixante-dix* ($$60+10$$) and 80 is *quatre-vingts* ($$4 \\times 20$$), how would you logically construct 77 and 84 based on the French vigesimal arithmetic rules? (2 steps)", "answer": "- Step 1: For 77: Start with the 60 block (*soixante*) and add 17 (*dix-sept*), following the $$60+10$$ logic where 70-79 are built off of 60. The result is *soixante-dix-sept*.\n- Step 2: For 84: Start with the $$4 \\times 20$$ block (*quatre-vingt*—note the 's' drops because a number follows) and add 4 (*quatre*). The result is *quatre-vingt-quatre*.\n+ Mental math check: $$60+17 = 77$$, $$4 \\times 20 + 4 = 84$$. The logic holds perfectly, even if it feels unfamiliar to English speakers.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "You are ordering at a restaurant. You want \"some water\" (uncountable) and \"a croque-monsieur\" (countable, one item). Which articles do you use for each: *un/une/des* or *du/de la/de l'/des*? (2 steps)", "answer": "- Step 1: For \"some water\": *eau* is feminine and starts with a vowel. Since water is an uncountable mass, you need the partitive article. *De la* becomes *de l'* before a vowel, so you say *de l'eau*.\n- Step 2: For \"a croque-monsieur\": *croque-monsieur* is a countable, discrete item. You want exactly one. Since it's masculine, you use the indefinite article *un*, so you say *un croque-monsieur*.\n+ If you wanted \"some croque-monsieurs\" (plural, countable), you would use *des croque-monsieurs*. If you wanted \"some coffee\" (uncountable, masculine), you would use *du café*.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}], "count": 28}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "How do you conjugate the verb \"avoir\" (to have) in the present tense for all six subject pronouns? (6 steps)", "answer": "- Step 1: **Je j’ai** – \"I have\" (e.g., *J’ai un livre*).  \n- Step 2: **Tu as** – \"You have\" (informal, e.g., *Tu as une voiture*).  \n- Step 3: **Il/Elle/On a** – \"He/She/One has\" (e.g., *Elle a un chat*).  \n- Step 4: **Nous avons** – \"We have\" (e.g., *Nous avons des amis*).  \n- Step 5: **Vous avez** – \"You have\" (formal/plural, e.g., *Vous avez un rendez-vous*).  \n- Step 6: **Ils/Elles ont** – \"They have\" (masculine/feminine, e.g., *Ils ont des problèmes*).  \n\n**Takeaway:** The irregular conjugation follows a unique pattern; memorize it as a foundational verb.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How do you form the negative of \"avoir\" (e.g., \"I don’t have\")? (6 steps)", "answer": "- Step 1: **Je n’ai pas** – \"I don’t have\" (e.g., *Je n’ai pas de stylo*).  \n- Step 2: **Tu n’as pas** – \"You don’t have\" (informal, e.g., *Tu n’as pas de temps*).  \n- Step 3: **Il/Elle/On n’a pas** – \"He/She/One doesn’t have\" (e.g., *On n’a pas de billets*).  \n- Step 4: **Nous n’avons pas** – \"We don’t have\" (e.g., *Nous n’avons pas de plan*).  \n- Step 5: **Vous n’avez pas** – \"You don’t have\" (formal/plural, e.g., *Vous n’avez pas raison*).  \n- Step 6: **Ils/Elles n’ont pas** – \"They don’t have\" (e.g., *Elles n’ont pas de questions*).  \n\n**Takeaway:** Negation wraps \"ne...pas\" around the conjugated verb; note the contracted \"n’\" before vowels.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "When do you use \"un/une/des\" vs \"du/de la/des\" with the verb \"avoir\"? Give examples.", "answer": "- **Un/une/des** = specific, countable nouns (e.g., *J’ai un chat* = \"I have a cat\").  \n- **Du/de la/des** = uncountable/abstract nouns (e.g., *J’ai du temps* = \"I have time\").  \n+ **Un** (masculine, *un café*), **une** (feminine, *une pomme*), **des** (plural, *des amis*).  \n+ **Du** (masculine, *du pain*), **de la** (feminine, *de la musique*), **des** (plural, *des idées*).  \n\n**Takeaway:** Use \"un/une/des\" for countable items; \"du/de la/des\" for uncountable substances or abstract concepts.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How do you ask basic personal questions in French (name, age, location, job, hobbies)?", "answer": "- **Comment tu t’appelles ?** = \"What’s your name?\"  \n- **Tu as quel âge ?** = \"How old are you?\"  \n- **Tu habites où ?** = \"Where do you live?\"  \n- **Tu travailles dans quoi ?** = \"What do you do for work?\"  \n- **Quels sont tes loisirs ?** = \"What are your hobbies?\"  \n\n**Takeaway:** Questions use subject-verb inversion (e.g., *habites-tu*), \"est-ce que,\" or rising intonation.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How do you order food in a restaurant using formal and informal requests?", "answer": "- **Formal:**  \n  - *Je voudrais...* = \"I would like...\"  \n  - *Pourrais-je avoir... s’il vous plaît ?* = \"Could I have... please?\"  \n- **Informal:**  \n  - *Je prends...* = \"I’ll have...\"  \n  - *Est-ce que je peux avoir... s’il te plaît ?* = \"Can I have... please?\"  \n\n**Takeaway:** Use formal phrasing (*vous*) in professional settings; informal (*tu*) with friends.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "What are the French terms for meat doneness: rare, medium, well-done?", "answer": "- **Bleu** = \"Very rare\" (literally \"blue\").  \n- **Saignant** = \"Rare\" (bloody).  \n- **À point** = \"Medium rare.\"  \n- **Bien cuit** = \"Well-done.\"  \n\n**Takeaway:** These terms are restaurant-specific; avoid literal translations.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "How do you form questions in French using the three methods?", "answer": "- **Intonation:** Statement → question (e.g., *Tu viens ?* \"Are you coming?\").  \n- **Est-ce que:** Add before a statement (e.g., *Est-ce que tu viens ?*).  \n- **Inversion:** Verb-subject swap (e.g., *Viens-tu ?*; formal/written).  \n\n**Takeaway:** Intonation is casual, \"est-ce que\" is neutral, and inversion is formal.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "What are the French numbers from 70 to 99? (3 steps)", "answer": "- Step 1: **70–79** = *soixante-dix* (60+10) to *soixante-dix-neuf* (60+19).  \n- Step 2: **80–89** = *quatre-vingts* (4×20) to *quatre-vingt-neuf* (4×20+9).  \n- Step 3: **90–99** = *quatre-vingt-dix* (4×20+10) to *quatre-vingt-dix-neuf* (4×20+19).  \n\n**Takeaway:** French uses a vigesimal (base-20) system for 70–99, unlike English.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": true}, {"question": "Why is \"quatre-vingts\" used for 80 instead of a direct word?", "answer": "- Historical influence of the Celtic *vigesimal* system (base-20), which merged with Latin numerals.  \n- *Quatre-vingts* = \"four twenties\" (4×20).  \n- Belgium/Switzerland use *octante* (80) and *nonante* (90), but France standardizes *quatre-vingts*.  \n\n**Takeaway:** Cultural legacy explains irregular numbers; memorize them through repetition.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How do you make a restaurant reservation in French?", "answer": "- **Step 1:** Greeting: *Bonjour, je voudrais réserver une table.*  \n- **Step 2:** Details: *Pour deux personnes, à 19h30, ce soir.*  \n- **Step 3:** Confirmation: *Pouvez-vous me donner votre numéro de téléphone ?*  \n\n**Takeaway:** Structure: purpose → time/date → contact verification.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "What are the days of the week, months, and seasons in French?", "answer": "- **Days:** *lundi, mardi, mercredi, jeudi, vendredi, samedi, dimanche*.  \n- **Months:** *janvier, février, mars, avril, mai, juin, juillet, août, septembre, octobre, novembre, décembre*.  \n- **Seasons:** *l’hiver, le printemps, l’été, l’automne*.  \n\n**Takeaway:** Days/months are masculine; seasons use articles (*l’été*, *l’automne*).", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "How do you use \"c’est\" vs \"il est\" for descriptions?", "answer": "- **C’est** + noun: *C’est un professeur* (He is a teacher).  \n- **Il est** + adjective: *Il est gentil* (He is kind).  \n- **Exception:** Nationalities with *être* (*Je suis français*).  \n\n**Takeaway:** Use \"c’est\" for identity (nouns) and \"il est\" for qualities (adjectives).", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Why is \"Qu’est-ce que c’est?\" used for \"What is this?\"", "answer": "- *Qu’est-ce que* = contraction of *que est-ce que* (\"what is it that\").  \n- *C’est* = \"it is.\"  \n- Combined: *What is it that it is?* (literal), but colloquially \"What is this?\"  \n\n**Takeaway:** The phrase combines multiple question markers for clarity.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "How do you write telephone numbers in French?", "answer": "- **Format:** Groups of two digits (e.g., *06 78 65 67 87*).  \n- **Pronunciation:** *zéro six, soixante-dix-huit, soixante-cinq, etc.*  \n- **Exception:** \"70\" = *soixante-dix*, \"80\" = *quatre-vingts*.  \n\n**Takeaway:** Numbers are read in pairs; use appropriate vigesimal terms.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "How do you conjugate \"être\" (to be) in the present tense? (6 steps)", "answer": "- Step 1: **Je suis** – \"I am\" (*Je suis à Paris*).  \n- Step 2: **Tu es** – \"You are\" (*Tu es gentil*).  \n- Step 3: **Il/Elle/On est** – \"He/She/One is\" (*Elle est médecin*).  \n- Step 4: **Nous sommes** – \"We are\" (*Nous sommes amis*).  \n- Step 5: **Vous êtes** – \"You are\" (*Vous êtes rapide*).  \n- Step 6: **Ils/Elles sont** – \"They are\" (*Ils sont ici*).  \n\n**Takeaway:** \"Être\" is irregular but critical for identity/location descriptions.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "What are common mistakes when using \"avoir\" vs \"être\"?", "answer": "- **False possession:** Using \"avoir\" for \"to be\" (*J’ai 25 ans* = \"I am 25 years old\").  \n- **False identity:** Using \"être\" for possession (*Je suis un livre* = \"I am a book\").  \n- **Negation errors:** *Je n’ai pas de livre* (correct) vs *Je ne suis pas de livre* (incorrect).  \n\n**Takeaway:** \"Avoir\" = possession; \"être\" = identity/state.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "How do you describe hobbies in French?", "answer": "- **Structure:** *J’adore + noun/verb* (*J’adore le football* or *J’aime jouer au tennis*).  \n- **Common hobbies:** *le sport, la musique, les films, la lecture*.  \n- **Frequency:** *Quatre fois par semaine* (four times a week).  \n\n**Takeaway:** Use \"adorer\" for strong preference; \"aimer\" for general liking.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "What are the key phrases for restaurant interactions (ordering, asking for the bill)?", "answer": "- **Ordering:** *Je voudrais..., Est-ce que je peux avoir...*  \n- **Bill:** *L’addition, s’il vous plaît* or *La note, s’il vous plaît*.  \n- **Problems:** *Non, il n’y a pas de problème* (No issues).  \n\n**Takeaway:** Politeness markers (*s’il vous plaît*) are essential in service settings.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "Why do French numbers use \"soixante-dix\" (70) instead of a unique word?", "answer": "- Historical Celtic influence: Base-20 counting persisted in Old French.  \n- *Soixante-dix* = 60 + 10; *quatre-vingts* = 4 × 20.  \n- Belgium/Switzerland use *septante* (70) and *nonante* (90), but France standardized the vigesimal system.  \n\n**Takeaway:** Regional dialects vs. French standardization explain number differences.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "How do you use \"quel/quelle/quels/quelles\" for \"which\"?", "answer": "- **Agreement:** Matches the noun’s gender/number.  \n  - *Quel livre ?* (masculine singular)  \n  - *Quelle couleur ?* (feminine singular)  \n  - *Quels livres ?* (masculine plural)  \n  - *Quelles couleurs ?* (feminine plural)  \n\n**Takeaway:** Always match \"quel\" to the noun it modifies.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}], "count": 20}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Explain the conjugation of \"avoir\" in present tense, listing all six forms with their pronouns. (6 steps)", "answer": "- Step 1: First-person singular - **j’ai** (from Latin *habeo*; irregular stem \"ai\").\n- Step 2: Second-person singular - **tu as** (retains archaic \"s\" sound from Latin *habes*).\n+ Example: \"Tu as un chat?\" (Do you have a cat?)\n- Step 3: Third-person singular - **il/elle/on a** (shared form for singular third-person subjects).\n+ Example: \"Elle a du temps libre\" (She has free time)\n- Step 4: First-person plural - **nous avons** (literally \"we with-have\", from Latin *habemus*).\n+ Example: \"Nous avons des idées\" (We have ideas)\n- Step 5: Second-person plural - **vous avez** (formal \"you\" or plural \"you\").\n+ Example: \"Vous avez un problème?\" (Do you have a problem?)\n- Step 6: Third-person plural - **ils/elles ont** (gendered plural forms).\n+ Example: \"Ils ont des projets\" (They have projects)\n\n**Takeaway:** Avoir’s irregularity stems from Latin roots but forms the basis for many French expressions.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why does French distinguish between \"un/une/des\" and \"de la/du/des\"? Provide example scenarios. (4 steps)", "answer": "- Step 1: **Un/une/des** = countable nouns (\"a/an\", \"some\" for plural).\n+ Restaurant order: \"Je voudrais **une salade** et **des frites**\"\n- Step 2: **De la/du/des** = uncountable/mass nouns (\"some\" without numerability).\n+ Beverage request: \"Je vais prendre **du vin rouge**\"\n- Step 3: Contrast in negation:\n+ Positive: \"J’ai **des pommes**\" → Negative: \"Je n’ai **pas de pommes**\"\n+ Positive: \"Il y a **de l’eau**\" → Negative: \"Il n’y a **pas d’eau**\"\n- Step 4: Grammatical gender/pronouns:\n+ Masculine: \"du pain\" → \"En veux-tu?\" (Do you want some?)\n+ Feminine: \"de la confiture\" → \"En as-tu?\" (Do you have some?)\n\n**Takeaway:** The distinction reflects physical countability in reality (e.g., \"water\" vs. \"bottles of water\").", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How do you form negative sentences with \"avoir\"? Explain the pattern and common pitfalls. (3 steps)", "answer": "- Step 1: Structure: **ne + verb + pas** around \"avoir\":\n+ \"Je n’ai pas de livre\" (I don’t have a book)\n- Step 2: Elision in first-person:\n+ \"Je n’ai pas\" vs. \"*Je ne ai pas\" (incorrect)\n+ \"Tu n’as pas\" vs. \"*Tu ne as pas\"\n- Step 3: Misconception: Using \"pas\" with both parts:\n+ Incorrect: \"*Je n’ai pas des pommes\"\n+ Correct: \"Je n’ai **pas de** pommes\" (No \"des\" in negation)\n\n**Takeaway:** Negation in French \"erases\" the positive article, requiring \"de\" instead of \"un/une/des\".", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Demonstrate three ways to ask \"Do you have a reservation?\" in French, explaining when each is appropriate. (3 steps)", "answer": "- Step 1: **Intonation shift** (\"Vous avez une réservation?\") → Casual spoken French, rising tone at end.\n+ Common in daily interactions with waitstaff\n- Step 2: **Est-ce que** inversion (\"Est-ce que vous avez une réservation?\") → Neutral register, both spoken/written.\n+ Example: Booking confirmation call\n- Step 3: **Subject-verb inversion** (\"Avez-vous une réservation?\") → Formal written context or official settings.\n+ Hotel reception check-in\n\n**Takeaway:** The formality level determines construction choice, not grammatical correctness.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why do French numbers from 70-99 follow a vigesimal (base-20) system? Illustrate with examples. (3 steps)", "answer": "- Step 1: Historical Celtic/French Basque influence:\n+ \"Soixante-dix\" = 60 + 10 (70)\n- Step 2: Double-base pattern:\n+ \"Quatre-vingts\" = 4×20 (80)\n+ \"Quatre-vingt-dix\" = 4×20 + 10 (90)\n- Step 3: Practical usage:\n+ Restaurant order: \"Soixante-dix-sept euros\" (77€)\n+ Train platform: \"Quatre-vingt-onze passagers\" (91 passengers)\n\n**Takeaway:** This system persists in France despite complexity, unlike Belgium/Switzerland’s \"septante\" (70) and \"nonante\" (90).", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Compare \"tu\" vs. \"vous\" in questions using \"as\" vs. \"avez\" and explain social implications. (4 steps)", "answer": "- Step 1: **Tu + as** = informal singular.\n+ Friends: \"Tu as faim?\" (Are you hungry?)\n- Step 2: **Vous + avez** = formal/plural.\n+ Stranger: \"Vous avez une question?\" (Do you have a question?)\n- Step 3: Regional variation:\n+ Belgium: \"Vous\" can address 2+ people regardless of formality\n- Step 4: Consequences of misuse:\n+ Using \"tu\" with professor = disrespect\n+ Using \"vous\" with peers = awkwardness\n\n**Takeaway:** Pronouns encode social relationships, requiring contextual awareness.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "What determines meat doneness expressions in French restaurant orders? Explain full spectrum. (5 steps)", "answer": "- Step 1: **Bleu** (blue) = flash-seared, raw center.\n+ \"Entrecôte bleue\" → Cooked 30s per side\n- Step 2: **Saignant** (bloody) = light pink core.\n+ Temperature: ~52°C\n- Step 3: **À point** (medium rare) = warm red center.\n+ Most popular choice in France\n- Step 4: **Bien cuite** (well done) = gray/brown throughout.\n+ Overcooked for steak purists\n- Step 5: Cultural note:\n+ French chefs consider well-done meat \"wasted\"\n\n**Takeaway:** Doneness terms reflect culinary precision; incorrect choice risks meal quality.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why does French use \"être\" for self-introduction but \"avoir\" for age? Contrast their grammatical logic. (3 steps)", "answer": "- Step 1: **Être** establishes identity:\n+ \"Je suis Phuc\" = existential state of \"being\"\n- Step 2: **Avoir** counts life years:\n+ \"J’ai 25 ans\" = \"I possess 25 years\"\n- Step 3: Cross-linguistic comparison:\n+ English: \"I am 25\" (state) vs. French: \"I have 25 years\"\n+ Similar to Spanish: \"Tengo 25 años\"\n\n**Takeaway:** Verbs match semantic roles: \"être\" for identity, \"avoir\" for measurement.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": true}], "count": 8}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "How do you say \"I don't have a chocolate\" in French? (1 step)", "answer": "**\"Je n'ai pas de chocolat.\"**\n\nExplanation: In French, when using the verb **avoir** (to have) in the negative, you place **ne...pas** around the conjugated verb. The key rule: after a negative form of **avoir**, you replace **un/une/du/de la/des** with **de** (or **d'** before a vowel). This is why we say \"de chocolat\" not \"du chocolat\" in the negative. The word **de** acts as a neutral article in negative sentences.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Conjugate the verb **AVOIR** (to have) in the negative form for all subject pronouns. (2 steps)", "answer": "- Step 1: The structure is **ne + conjugated verb + pas**, and the article changes from un/une/du/de la/des to **de/d'**.\n\n- Step 2: Full conjugation in the negative:\n  + **Je n'ai pas** (I don't have)\n  + **Tu n'as pas** (You don't have)\n  + **Il/elle/on n'a pas** (He/she/we don't have)\n  + **Nous n'avons pas** (We don't have)\n  + **Vous n'avez pas** (You [formal/plural] don't have)\n  + **Ils/elles n'ont pas** (They don't have)\n\nKey pattern: Notice that **avoir** loses its vowel in the **il/elle/on** form in the negative — it becomes **n'a pas**, not **n'a pas**.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "What is the difference between **un**, **une**, **des**, and **du/de la** in French? When do you use each? (2 steps)", "answer": "- Step 1: **Un** (masculine singular) and **une** (feminine singular) are **definite articles** for **countable nouns**. **Des** is the **plural definite article** for both genders. **Du** (masculine) and **de la** (feminine) are used with **uncountable/mass nouns** (things you can't count, like liquids, abstract concepts).\n\n- Step 2:\n  + **Un** café = a coffee (one countable item)\n  + **Une** assiette = a plate (feminine countable)\n  + **Des** chocolates = some chocolates (plural countable)\n  + **Du** chocolat = some chocolate (uncountable, like a substance)\n  + **De la** crème = some cream (uncountable)\n\nThe key insight: French makes a fundamental distinction between countable things (un/une/des) and uncountable substances (du/de la). In English, \"some\" covers both, but French separates them grammatically.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Write these numbers in French: 21, 41, 71, 81, 91 (1 step)", "answer": "- **21** = **vingt-et-un**\n- **41** = **quarante-et-un**\n- **71** = **soixante-et-onze** (not \"septante-et-un\" — French uses the base-60 system for 70)\n- **81** = **quatre-vingts-un** (note: **quatre-vingts** drops the **s** when followed by another number)\n- **91** = **quatre-vingts-onze**\n\nThe French number system is unique: 70-79 use **soixante** (60) + 10-19, and 80-99 use **quatre-vingts** (4×20). This reflects an older counting system.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "How do you form a question in French using **three different methods**? Give an example. (3 steps)", "answer": "- Step 1: **Intonation** — Simply raise your voice at the end of the statement. Most common in spoken French. Example: \"Tu habites à Paris?\" (Do you live in Paris?)\n\n- Step 2: **Est-ce que** — Add \"Est-ce que\" at the beginning. Works in both spoken and written French. Example: \"Est-ce que tu habites à Paris?\"\n\n- Step 3: **Inversion** — Reverse the verb and pronoun. More formal, common in writing. Example: \"Habites-tu à Paris?\"\n\nThe **est-ce que** form is often the easiest for A1 learners because it follows normal sentence structure (just add the phrase at the start), while **inversion** requires knowing the full conjugation and is more formal.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Transform this statement into a question using all three methods: \"Tu parles français.\" (3 steps)", "answer": "- Step 1: **Intonation**: \"Tu parles français?\" (voice rises at end)\n\n- Step 2: **Est-ce que**: \"Est-ce que tu parles français?\"\n\n- Step 3: **Inversion**: \"Parles-tu français?\" (verb comes before subject pronoun)\n\nNote: In inversion, the pronoun attaches to the verb with a hyphen. For verbs ending in a vowel (like **parles**), a **-t-** is often inserted between the verb and pronoun when the verb ends in a consonant + vowel + consonant pattern to ease pronunciation, though this doesn't apply to **parler**.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "What is the difference between **s'il te plaît** and **s'il vous plaît**? When would you use each? (1 step)", "answer": "Both mean \"please\" in French, but:\n- **S'il te plaît** uses the **tu** form (informal \"you\") — use with friends, family, children, or people your age/younger\n- **S'il vous plaît** uses the **vous** form (formal \"you\") — use with strangers, elders, professionals, or in polite service situations\n\nIn a restaurant with a waiter/waitress, you would typically use **s'il vous plaît** (formal). With a friend you're dining with, you'd say **s'il te plaît**.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "At a French restaurant, the server asks \"Quelle cuisson pour la viande ?\" What do the following terms mean: **bleu**, **saignant**, **à point**, **bien cuit**? (2 steps)", "answer": "- Step 1: These are steak cooking levels:\n  + **Bleu** = very rare (barely cooked, cold center)\n  + **Saignant** = rare (cooked outside, red/rare inside)\n  + **À point** = medium rare (pink inside, the most popular in France)\n  + **Bien cuit** = well done (thoroughly cooked, no pink)\n\n- Step 2: The typical order from rarest to most cooked is: **bleu → saignant → à point → bien cuit**. French restaurants take steak cooking seriously — \"à point\" is considered ideal, while \"bien cuit\" is often seen as ruining a good piece of meat.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "How would you ask for the bill in a French restaurant? Give three ways to say \"the bill, please.\" (2 steps)", "answer": "- Step 1: Here are three natural ways:\n  + **L'addition, s'il vous plaît.** (most common)\n  + **La note, s'il vous plaît.** (slightly more casual)\n  + **Je pourrais avoir l'addition, s'il vous plaît?** (most polite, literally \"Could I have the bill?\")\n\n- Step 2: **L'addition** is the most commonly used term in French restaurants. **La note** is understood everywhere but slightly less formal. The third option with \"je pourrais\" (I could) adds politeness through hypothesis rather than direct demand.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Conjugate **ETRE** (to be) in both positive and negative forms. (2 steps)", "answer": "- Step 1: **Positive forms:**\n  + **Je suis** (I am)\n  + **Tu es** (You are)\n  + **Il/elle/on est** (He/she/we are)\n  + **Nous sommes** (We are)\n  + **Vous êtes** (You are [formal/plural])\n  + **Ils/elles sont** (They are)\n\n- Step 2: **Negative forms** (ne + verb + pas):\n  + **Je ne suis pas** (I am not)\n  + **Tu n'es pas**\n  + **Il/elle/on n'est pas**\n  + **Nous ne sommes pas**\n  + **Vous n'êtes pas**\n  + **Ils/elles ne sont pas**\n\nNote: **Etre** is one of the two most important French verbs (with **avoir**). All other verbs conjugate based on these two models.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "What are the three ways to say \"I would like\" when ordering in a French restaurant? (1 step)", "answer": "- **Je voudrais** + [item] — the most common and polite (literally \"I would like\")\n- **Je pourrais avoir** + [item] — very polite, literally \"Could I have...\"\n- **J'aimerais** + [item] — formal, literally \"I would love\"\n\nAll three are appropriate in a restaurant. **Je voudrais** is the safest default choice for A1 learners. Example: *\"Je voudrais le hamburger, s'il vous plaît.\"*", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "What does \"Est-ce que vous les voulez en même temps?\" mean in a restaurant context? (1 step)", "answer": "This means \"Would you like them at the same time?\" — the server is asking whether you want all your ordered items (drinks, appetizers, main courses) served together or separately.\n\n**Les** refers to whatever items you've ordered. **En même temps** = \"at the same time\" (simultaneously). This is a common question when you've ordered multiple courses.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "Complete this restaurant reservation dialogue. The server asks: \"C'est pour une réservation?\" What is a proper response for someone **with** a reservation? What is a response for someone **without**? (2 steps)", "answer": "- Step 1: **With a reservation** (affirmative):\n  + \"Oui, j'ai une réservation pour deux personnes.\" (Yes, I have a reservation for two people.)\n\n- Step 2: **Without a reservation** (negative):\n  + \"Non, je n'ai pas de réservation.\" (No, I don't have a reservation.)\n  + OR simply \"Non, c'est pour maintenant.\" (No, it's for now — meaning \"I'd like a table now, without reservation.\")\n\nKey point: Notice the **de** in \"je n'ai pas de réservation\" — this follows the same rule as other negative **avoir** sentences (replace article with **de**).", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In French, why do we say \"J'habite **à** Paris\" but \"Je suis vietnamien\" (without a preposition)? (1 step)", "answer": "- The preposition **à** is used with **habiter** (to live) to indicate **location/city**: \"J'habite **à** Paris\", \"J'habite **à** Lyon\"\n- However, **nationality, profession, and identity** use **être** without any preposition: \"Je suis vietnamien\" (I am Vietnamese), \"Je suis ingénieur\" (I am an engineer)\n\nThe key distinction: French uses **être + [noun/adjective]** for inherent identity (nationality, profession, religion), while location uses **habiter à + [place]**. This is a fundamental difference from English where \"live in\" requires a preposition.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "What are the days of the week in French? Which ones are masculine? Are any not used in French (unlike English)? (2 steps)", "answer": "- Step 1: Days in order:\n  + **Lundi** (Monday)\n  + **Mardi** (Tuesday)\n  + **Mercredi** (Wednesday)\n  + **Jeudi** (Thursday)\n  + **Vendredi** (Friday)\n  + **Samedi** (Saturday)\n  + **Dimanche** (Sunday)\n\n- Step 2: In French, all days are **masculine** (we say \"le lundi,\" \"le mardi\"). Unlike English, French does **not** capitalize days of the week. Also note: in French-speaking countries, the week traditionally starts on **Monday** (not Sunday), so when someone says \"la semaine prochaine\" (next week), they mean starting Monday.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Name the 12 months of the year in French. How are they different from English? (1 step)", "answer": "- **Janvier, Février, Mars, Avril, Mai, Juin, Juillet, Août, Septembre,Octobre, Novembre, Décembre**\n\nKey differences from English:\n- French months are **not capitalized** (unlike English)\n- Most are very similar to English, but note: **Mai** (May), **Juin** (June), **Juillet** (July), **Août** (August) — the accents matter!\n- **Août** (August) is often pronounced like \"oo\" (like \"boot\") in French", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "What are the four seasons in French? What is special about how \"l'été\" and \"l'hiver\" are used with articles? (1 step)", "answer": "- **L'hiver** (winter), **Le printemps** (spring), **L'été** (summer), **L'automne** (autumn/fall)\n\nNotice: **L'été** and **L'hiver** begin with vowels, so they take the **elision** form **l'** (l'). **Le printemps** and **l'automne** also often appear with **l'** in literary/formal contexts. In everyday French, you might hear \"en été\" (in summer), \"en hiver\" (in winter), \"au printemps,\" \"en autumn.\"", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "How do you say \"see you soon\" and \"goodbye\" in French? What are the differences? (1 step)", "answer": "- **Au revoir** = goodbye (literally \"until seeing again\" — the standard farewell)\n- **À bientôt** = see you soon (literally \"until soon\")\n- **À très vite** = see you very soon (more casual, implies very quick reunion)\n\nAll are appropriate for leaving. **Au revoir** is the most common and formal. **À bientôt** is friendly and implies you expect to see the person again relatively soon.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "In your own introduction, how would you say: \"I work in artificial intelligence\" in French? (1 step)", "answer": "- **\"Je suis ingénieur dans l'intelligence artificielle.\"**\n\nBreaking it down:\n- **Je suis** = I am\n- **Ingénieur** = engineer (note: no article needed after **être** for profession)\n- **Dans** = in (the domain/field)\n- **L'intelligence artificielle** = artificial intelligence (feminine noun, hence **l'**)\n\nThis follows the pattern: **Je suis + [profession] + dans + [field/domain]**", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "What is the French for \"What are your hobbies?\" and how would you respond? (2 steps)", "answer": "- Step 1: The question is **\"Quels sont tes loisirs?\"** (informal) or **\"Quels sont vos loisirs?\"** (formal/plural)\n\n- Step 2: Sample response: **\"J'adore le sport, les films et la musique.\"** (I love sports, films, and music)\n\nNote: **Loisirs** is the formal word for \"hobbies/leisure activities.\" In casual conversation, you might also hear \"Tu fais quoi comme loisirs?\" or \"Tu aimes faire quoi?\"", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "When a French waiter says \"Que désirez-vous boire?\" what are some appropriate responses? (1 step)", "answer": "Here are natural ways to respond:\n\n- **Je voudrais une bouteille d'eau gazeuse, s'il vous plaît.** (I would like a bottle of sparkling water.)\n- **Un café, s'il vous plaît.** (A coffee, please.)\n- **Un verre de vin rouge.** (A glass of red wine.)\n- **De l'eau plate, s'il vous plaît.** (Still water, please.)\n\nThe question literally means \"What would you like to drink?\" — **désirez** is a formal verb for \"wish/want,\" and **boire** is the infinitive \"to drink.\"", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Why does French say \"Je vais à la gym\" instead of \"à la basketball\"? (1 step)", "answer": "- **La gym** (gymnastique/gym) is feminine and singular, so it takes **la**.\n- But for sports, French often uses **faire du + [sport]** or **jouer au + [sport]**.\n\nCorrect forms:\n- **Je vais à la gym** (going to the gym location)\n- **Je fais du sport** (I do sports — generic)\n- **Je joue au basketball** (I play basketball — note the **au**)\n- **Je joue au tennis** (I play tennis)\n\nThe key rule: **Faire du** = do/play (activities), **Jouer au** = play (sports with a ball/racket).", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "What is the French question word for \"How many times per week?\" and how would you answer \"Four times per week\"? (1 step)", "answer": "- Question: **\"Combien de fois par semaine?\"**\n- Answer: **\"Quatre fois par semaine.\"**\n\nKey patterns:\n- **Combien de** + [noun] = how many/much (e.g., combien de fois, combien de personnes, combien de temps)\n- **Par** + [time period] = per/by (par semaine, par mois, par an)", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Explain why French numbers 70-99 are unusual. How would you say 78 and 99? (1 step)", "answer": "- French uses a vigesimal (base-20) system for numbers 70-99, inherited from older French counting.\n- **78** = **soixante-dix-huit** (60 + 10 + 8 = 78) — literally \"sixty-ten-eight\"\n- **99** = **quatre-vingts-dix-neuf** (80 + 10 + 9 = 99) — literally \"four-twenty-ten-nine\"\n\nThis system exists because Old French used base-20 (vigesimal) counting. In some French-speaking regions (Belgium, Switzerland), they use **septante** (70), **octante** (80), and **nonante** (90), but standard French uses the base-20 system.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": true}, {"question": "What does \"Il a un café\" mean versus \"Il a du café\"? What's the difference? (2 steps)", "answer": "- Step 1: **Il a un café** = He has a coffee (one countable item — a cup of coffee as a specific thing)\n- Step 2: **Il a du café** = He has some coffee (uncountable — the substance/quantity of coffee)\n\nThe distinction:\n- **Un café** — one coffee, as in \"one cup/order\" (countable)\n- **Du café** — some coffee, as in \"some amount of the substance\" (uncountable)\n\nThis is the same distinction as with all un/une vs. du/de la/des articles.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Your French friend asks \"Comment tu t'appelles?\" How do you respond? What about \"Tu as quel âge?\" and \"Tu habites où?\" (1 step)", "answer": "- **Comment tu t'appelles?** = What's your name?\n  + Response: **Je m'appelle [Phuc].**\n  \n- **Tu as quel âge?** = How old are you?\n  + Response: **J'ai [25] ans.** (I am 25 years old.)\n  \n- **Tu habites où?** = Where do you live?\n  + Response: **J'habite à Paris.** (I live in Paris.)\n\nKey patterns: Note **s'appeler** (to be called) uses the reflexive structure, and **avoir** is used for age in French (literally \"I have 25 years\"), not **être** like in many languages.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "What is the negative of \"Je suis vietnamien\"? How would you say \"I am not Vietnamese\"? (1 step)", "answer": "- **Je ne suis pas vietnamien.**\n\nThe negative structure with **être** is simply **ne + être + pas**. There is **no change of article** with **être** — unlike with **avoir**, where you change un/une/du/de la/des to de/d'.\n\nCompare:\n- **Je suis vietnamien** → **Je ne suis pas vietnamien** (no article change)\n- **J'ai un chocolate** → **Je n'ai pas de chocolat** (article changes to de)", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "In a restaurant, the server asks \"Avez-vous fait votre choix?\" What does this mean, and what are possible responses? (1 step)", "answer": "- The question means \"Have you made your choice?\" (i.e., \"Are you ready to order?\")\n\nPossible responses:\n- **Oui, je vais prendre le hamburger.** (Yes, I'll take the hamburger.)\n- **Oui, j'aimerais le saumon grillé.** (Yes, I'd like the grilled salmon.)\n- **Oui, je pourrais avoir l'entrecôte, s'il vous plaît?** (Yes, could I have the entrecôte?)\n\n**Le choix** = the choice. **Faire son choix** = to make one's choice.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "How do you say \"I love [something]\" in French versus \"I like [something]\"? What's the difference? (1 step)", "answer": "- **J'adore** = I love (strong positive, intense liking)\n- **J'aime** = I like (moderate positive)\n- **J'aime beaucoup** = I like a lot\n\nExample:\n- **J'adore le sport** = I love sports (very strong)\n- **J'aime le sport** = I like sports (neutral)\n\n**Adorer** is stronger than **aimer**. In French, you don't say \"I love you\" as **je t'aime** — this is actually quite serious! Instead, for casual \"I like you,\" French might say \"tu me plais\" or \"je t'aime bien.\"", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "What is the French for \"Please\" in a restaurant when speaking to a waiter? Is there a difference between formal and informal? (1 step)", "answer": "- **S'il vous plaît** is the standard \"please\" in any formal or polite context, including with a waiter.\n\nFormal vs. informal:\n- **S'il vous plaît** = please (formal \"you\" — always appropriate with strangers,服务员, elders)\n- **S'il te plaît** = please (informal \"you\" — use with friends, family)\n\nIn a restaurant with a server, **always use s'il vous plaît**. It's the respectful, default form in any service situation.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "What is the proper response to \"Est-ce que tout va bien?\" in a restaurant? (1 step)", "answer": "- As a customer: **Oui, tout va bien, merci.** (Yes, everything is fine, thank you.)\n\nThis phrase means \"Is everything going well?\" — it's a check-in from the server. A full response might be:\n- **Oui, tout va bien, merci. C'est délicieux!** (Yes, everything is great, thank you. It's delicious!)", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "The server says \"Je reviens tout de suite.\" What does this mean and when would they say it? (1 step)", "answer": "- **\"Je reviens tout de suite\"** = \"I'll be right back.\"\n\nThis is something a server says when leaving your table temporarily — to get more items, check on your food, bring the bill, etc. It's a polite assurance that they won't be long.\n\n**Tout de suite** = right away/immediately. This is a very common phrase in French service contexts.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In a French restaurant, what question would the server ask about where you want to sit, and how would you respond if you prefer outdoor seating? (2 steps)", "answer": "- Step 1: The server asks: **\"À l'intérieur ou en terrasse?\"** (Inside or on the terrace?)\n\n- Step 2: Your response: **\"Je préfère en terrasse, s'il vous plaît.\"** (I prefer outside on the terrace, please.)\n\nKey vocabulary:\n- **L'intérieur** = the inside\n- **La terrasse** = the terrace/outdoor seating\n- **Je préfère** = I prefer", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "You call a restaurant to make a reservation. They ask for udent, the article is often dropped in modern French: **Je suis étudiant.**\n\nThe safest A1 rule: After **être**, don't add un/une before professions.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "How would you ask \"What is this?\" in French, using two different methods? (2 steps)", "answer": "- Step 1: **\"Qu'est-ce que c'est?\"** — The most common way (literally \"What is it that it is?\")\n- Step 2: **\"C'est quoi?\"** — More casual/informal (literally \"It's what?\")\n\nTo ask about something specific: **\"Qu'est-ce que c'est, la salade niçoise?\"** (What is niçoise salad?)\n\n**Que** becomes **qu'est-ce que** when forming a question with **est-ce que**. The inversion would be **\"Qu'est-ce?\"** (very formal/literary).", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "What does \"Je ne suis pas\" mean, and why is the \"e\" in \"ne\" sometimes dropped? (1 step)", "answer": "- **Je ne suis pas** = I am not\n\nThe \"e\" in **ne** is often dropped in speech and informal writing when the next word begins with a vowel (called **élision**):\n- **Je n'habite pas** (not \"je ne habite pas\")\n- **Il n'a pas** (not \"il ne a pas\")\n- **Elle n'est pas** (not \"il ne est pas\")\n\nThis is called **élision** — the letter \"e\" is replaced by an apostrophe (**'**) before a vowel sound. This happens with many French words (like **je** → **j'** before vowels).", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "At a restaurant, the server says \"Quelle thérapeut?\" Wait, that's not right. What should the correct French question be about steak cooking, and what are the answer options? (2 steps)", "answer": "- Step 1: The correct question is: **\"Quelle cuisson pour la viande, Monsieur/Madame?\"** (What cooking for the meat, Sir/Ma'am?)\n\n- Step 2: The answer options are:\n  + **Bleu** — very rare\n  + **Saignant** — rare  \n  + **À point** — medium rare\n  + **Bien cuit** — well done\n\nThe server is asking **quelle cuisson** (what cooking/degree of cooking) for your meat. This is an essential vocabulary set for ordering steak in France.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "Why do we say \"J'ai une carafe d'eau\" but \"J'ai de l'eau\"? What's the pattern? (2 steps)", "answer": "- Step 1: **Une carafe d'eau** = a carafe of water (the carafe is countable, the water inside is uncountable)\n- Step 2: **De l'eau** = some water (just the uncountable substance)\n\nThe pattern: When you have a **container** + **substance**, you use **de/d'**:\n- **Une tasse de café** (a cup of coffee)\n- **Une bouteille d'eau** (a bottle of water)\n- **Un verre de vin** (a glass of wine)\n\nThe **de/d'** shows \"of/containing.\" This is different from **du** (which is just the article for uncountable things). So: **de l'eau** (some water — article) vs. **une carafe d'eau** (a carafe OF water — container relationship).", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "What does the French expression \"le plat du jour\" mean? How would you use it in a restaurant context? (1 step)", "answer": "- **Le plat du jour** = the dish of the day / today's special\n\nIn a restaurant:\n- The server might say: **\"Aujourd'hui, nous avons un excellent plat du jour.\"** (Today, we have an excellent dish of the day.)\n- You could ask: **\"Quel est le plat du jour?\"** (What is the dish of the day?)\n\n**Le plat** = the dish/main course. **Du jour** = of the day (from \"jour\" = day). This is similar to \"daily special\" or \"chef's special\" in English.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "What is the difference between \"je vais prendre\" and \"je voudrais\" when ordering? Which is more common? (2 steps)", "answer": "- Step 1: **\"Je vais prendre...\"** = \"I'm going to take...\" (present tense, more direct, very common)\n- Step 2: **\"Je voudrais...\"** = \"I would like...\" (conditional, more polite, very common)\n\nBoth are equally appropriate in restaurants. **Je vais prendre** is slightly more casual and direct — it's stating your intention. **Je voudrais** is more polite and hypothetical. In practice, French speakers use both frequently. For maximum politeness, add **s'il vous plaît**.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "How would you say \"I live in Paris and I am Vietnamese\" in French? (1 step)", "answer": "- **\"J'habite à Paris et je suis vietnamien.\"**\n\nBreaking it down:\n- **J'habite à Paris** = I live in Paris (note: **habiter à** + city)\n- **Je suis vietnamien** = I am Vietnamese (nationality after **être**)\n\nKey point: In French, you say \"I am Vietnamese\" (**je suis vietnamien**) — no preposition needed with nationality after **être**. But with **habiter**, you need **à** before the city name.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "If someone says \"Je n'ai pas de réservation,\" what are they saying? And why is \"de\" used instead of \"une\"? (1 step)", "answer": "- They are saying \"I don't have a reservation.\"\n\nThe rule: In negative sentences with **avoir**, the article changes:\n- Positive: **J'ai une réservation** (I have a reservation)\n- Negative: **Je n'ai pas de réservation** (I don't have a reservation)\n\n**De** replaces **un/une/des** in negative **avoir** sentences. This is a fixed grammatical rule — you always use **de/d'** after **ne...pas** with **avoir**.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "What is the correct French question word for \"How much/how many\" when asking about quantity? Give an example. (1 step)", "answer": "- The word is **\"Combien\"**.\n\nExamples:\n- **Combien de personnes?** — How many people?\n- **Combien de fois par semaine?** — How many times per week?\n- **Combien ça coûte?** — How much does it cost?\n\nThe pattern is always **Combien de + [noun]** — the **de** never changes regardless of gender or number.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "In French, why do we say \"Je m'appelle\" instead of \"Je m'appelle\"? Wait — is there an accent? (1 step)", "answer": "- **Je m'appelle** — yes, there IS an accent!\n\nThe verb is **s'appeler** (to call oneself). The conjugation:\n- **Je m'appelle** (I call myself / My name is)\n- **Tu t'appelles** (You call yourself)\n- **Il/elle s'appelle** (He/she calls himself/herself)\n\nThe **ll** in **appelle** has a soft **-elle** sound, not a hard \"el\" — the second **e** is pronounced, making it sound like \"ah-PELL.\"\n\nThe accent on the first **e** (**è**) is what makes the **e** sound open/soft. Without the accent (**appelle**), it would be pronounced differently.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "What's the difference between \"je\" and \"j'\" before a vowel? Give an example. (1 step)", "answer": "- Before a vowel sound, **je** becomes **j'** (this is called **élision**).\n\nExamples:\n- **Je suis** → **J'habite** (I live)\n- **Je suis** → **J'aime** (I like)\n- **Je suis** → **J'ai** (I have)\n\nThis happens to avoid having two vowel sounds next to each other. It's not optional — it's mandatory in both speech and writing. The apostrophe replaces the silent \"e\" in **je**.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "In French, what is the difference between \"il a\" and \"elle a\"? Are there any pronunciation similarities? (1 step)", "answer": "- **Il a** = he has (masculine)\n- **Elle a** = she has (feminine)\n\nPronunciation: Both sound identical! **Il a** and **elle a** are both pronounced exactly the same: **[il a]** (like \"eel ah\").\n\nThis is why context is crucial in French — you often can't tell the gender from the verb sound alone. In writing, the difference is clear (il vs. elle), but in speech, you need context to know whether \"il a\" means \"he has\" or \"she has.\"", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "How do you form the negative with \"faire\" (to do/make)? Example: \"I don't do sports.\" (1 step)", "answer": "- **Je ne fais pas de sport.**\n\nThe structure is the same as with **avoir**:\n- **Ne + verb + pas + de** (instead of du/des/des)\n- Positive: **Je fais du sport** (I do sports)\n- Negative: **Je ne fais pas de sport** (I don't do sports)\n\nThe **de** replaces **du/des** in negative sentences. This is a consistent rule: any time you have a negative construction with **avoir** or **faire** and an article, the article becomes **de/d'**.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "What does the phrase \"Tu travailles dans quoi?\" mean, and how would you respond with your profession? (1 step)", "answer": "- **\"Tu travailles dans quoi?\"** = \"What do you work in?\" / \"What field do you work in?\" (literally \"You work in what?\")\n\nResponse example: **\"Je suis ingénieur dans l'intelligence artificielle.\"** (I am an engineer in artificial intelligence.)\n\nThe phrase **dans quoi** uses the informal **tu** form. The formal version would be **\"Vous travaillez dans quoi?\"** or more formally **\"Dans quel domaine travaillez-vous?\"**", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "In the context of CEFR levels, what can someone do at A1 level in French? At A2? (2 steps)", "answer": "- Step 1: **A1 (Breakthrough)**: Can understand and use familiar everyday expressions and very basic phrases. Can introduce themselves and others, ask and answer questions about personal details. Can interact in a simple way if the other person talks slowly and clearly.\n\n- Step 2: **A2 (Waystage)**: Can communicate in simple and routine tasks requiring direct exchange of information on familiar topics. Can describe their immediate environment and matters in areas of immediate need.\n\nThe key difference: A1 is survival/basic introduction. A2 is handling routine social situations and simple past events.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "Why is \"Quatre-vingts\" sometimes written without the 's'? When do you add and remove the 's'? (1 step)", "answer": "- **Quatre-vingts** (80) takes an **s** when it stands alone, but loses it when followed by another number.\n\n- **Quatre-vingts** (80 alone) — WITH the s\n- **Quatre-vingt-un** (81) — WITHOUT the s\n- **Quatre-vingts-dix** (90) — WITHOUT the s\n\nThe same rule applies to **cent** (100): **cent** (100 alone), **cent un** (101), but **deux cents** (200 alone, with s), **deux cent un** (201, without s).", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "In French, why is \"J'adore le sport\" grammatically correct but \"J'adore les sport\" is wrong? (1 step)", "answer": "- **Sport** is masculine singular, so it takes **le** (the definite article for masculine nouns). **Les** is only used for **plural** nouns.\n\nCorrect: **J'adore le sport** (I love sports — masculine singular)\nWrong: **J'adore les sport** ← This doesn't work because **les** requires a plural noun\n\nIf you wanted to say \"I love the sports (plural),\" you would need a plural noun: **J'adore les sports.** But **sport** in French is typically used as a mass/uncountable noun (like \"sports\" as an activity), so it stays singular: **le sport.**", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "What does \"Je reviens\" mean, and why is the present tense used to describe a future action? (1 step)", "answer": "- **Je reviens** = \"I'm coming back\" or \"I'll be back.\"\n\nIn French, the present tense (**je reviens**) is often used to describe **immediate future** actions, especially when combined with time expressions like \"tout de suite\" (right away). This is called the \"present near future\" in casual speech.\n\nCompare:\n- **Je reviens tout de suite.** (I'm coming back right away → immediate future)\n- **Je vais revenir.** (I will come back → near future with \"aller\")\n\nBoth are correct, but the present tense feels more immediate in service contexts like a restaurant.", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "What is the French word for \"order\" as a noun, and how is it different from \"commander\"? (1 step)", "answer": "- **L'ordre** = the order (as in a request/command, or arrangement)\n- **Commander** = to order (in a restaurant context)\n\nIn a restaurant:\n- **J'aimerais commander.** = I'd like to order.\n- **L'addition, s'il vous plaît.** = The bill, please.\n\nYou **commandez** (order) the food, and you receive **l'addition** (the bill). These are different from **l'ordre** (order as in command/sequence).", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "How do you say \"I work\" in French? What about \"I don't work on Saturdays\"? (2 steps)", "answer": "- Step 1: **Je travaille** (the verb is **travailler** — to work)\n\n- Step 2: **Je ne travaille pas le samedi.** (I don't work on Saturdays.)\n\nNote the preposition **le** before **samedi** — in French, you say \"on Saturdays\" as **le samedi** (the Saturday), using the definite article. This applies to all days: **le lundi**, **le mardi**, etc.\n\nAlso note: In negative sentences with **avoir** or other verbs, you might see **ne...pas de**, but with **travailler** there's no direct object, so it's simply **ne + verb + pas**.", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": false}, {"question": "Why is French often considered more formal in service situations than English? Give an example from restaurant vocabulary. (1 step)", "answer": "- French uses more polite structures as the **default** in service situations. For example:\n\nEnglish: \"What do you want?\" → French: **\"Que désirez-vous?\"** (What do you wish? — using the formal **vous**)\n\nEnglish: \"I'll have...\" → French: **\"Je voudrais...\"** (I would like... — conditional politeness)\n\nEven simple requests add **s'il vous plaît** more consistently than English \"please.\" The server also addresses you as **Monsieur/Madame** and asks **\"C'est pour une réservation?\"** (Is it for a reservation?) rather than the more direct English \"Reservation?\"\n\nThis isn't about being overly polite — it's about social norms. Using **tu** with a waiter would be considered rude.", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "What does \"Non, je n'ai pas de réservation\" mean, and how does the negative structure work? (1 step)", "answer": "- **\"Non, je n'ai pas de réservation\"** = \"No, I don't have a reservation.\"\n\nBreaking down the negative:\n- **Je n'ai pas** = I don't have (the **e** in **ne** drops before vowel → **n'**)\n- **de réservation** = a reservation (the article **une** becomes **de** in the negative)\n\nThis follows the rule: after **ne...pas** with **avoir**, all articles (un/une/du/de la/des) become **de/d'**.\n\nCompare with **être** negative: **Je ne suis pas vietnamien** — no article change, because **être** doesn't take articles after it in the same way.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "In the restaurant reservation conversation, what information does the server typically ask for? (1 step)", "answer": "A typical French restaurant reservation includes:\n\n1. **Date** — \"Pour quand?\" (For when?)\n2. **Time** — \"À quelle heure?\" (At what time?)\n3. **Number of people** — \"Pour combien de personnes?\" (For how many people?)\n4. **Name** — \"Au nom de?\" (Under what name?)\n5. **Phone number** — \"Votre numéro de téléphone?\" (Your phone number?)\n\nAll of this confirms the reservation. The server repeats back: **\"C'est noté, Monsieur/Madame. À ce soir!\"** (It's noted. See you tonight!)", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}, {"question": "What is the difference between \"saignant\" and \"saignant\" in French when describing steak? Wait, is that a trick question? (1 step)", "answer": "- No trick! They're the same word: **saignant** (rare — cooked outside, red/rare inside).\n\nThe confusion might come from the different meat doneness:\n- **Bleu** = very rare (almost raw)\n- **Saignant** = rare (red inside)\n- **À point** = medium rare (pink)\n- **Bien cuit** = well done (no pink)\n\n**Saignant** literally means \"bleeding\" — which is why it's used for rare steak. In French cuisine, this is considered the ideal way to cook a good steak!", "source": "MiniMax ①", "_id": "minimax_1_59", "judge_pick": false}, {"question": "In the sentence \"Je voudrais le hamburger s'il vous plaît,\" identify each word's role (subject, verb, object, etc.). (2 steps)", "answer": "- Step 1: **Je** = subject (pronoun)\n  + **voudrais** = verb (conditional of **vouloir** = would like)\n  + **le hamburger** = direct object (the item being requested)\n  + **s'il vous plaît** = politeness phrase\n\n- Step 2: Breaking down **s'il vous plaît**:\n  + **s'il** = si + il = if + it/he (contracted)\n  + **vous plaît** = you please (literally \"it pleases you\")\n  \nThe full meaning: \"I would like the hamburger, if it pleases you\" — which is the polite French way of saying \"please.\"", "source": "MiniMax ①", "_id": "minimax_1_60", "judge_pick": false}, {"question": "What does the phrase \"Je vais à la gym quatre fois par semaine\" literally translate to, and why is this construction used? (2 steps)", "answer": "- Step 1: Literal translation: \"I go to the gym four times per week.\"\n\n- Step 2: Breaking it down:\n  + **Je vais** = I go (present tense of **aller** = to go)\n  + **à la gym** = to the gym (note: **gym** is feminine, takes **la**)\n  + **quatre fois** = four times (**fois** = times/occurrences)\n  + **par semaine** = per week (**par** = by/per)\n\nThe construction **aller à** + place indicates movement toward a location. Note that you say **à la gym** (the), not just **à gym** — French always uses articles with most nouns.", "source": "MiniMax ①", "_id": "minimax_1_61", "judge_pick": false}, {"question": "Why is \"J'ai 25 ans\" the correct way to say \"I am 25 years old\" rather than \"J'ai 25 ans\" using être? (1 step)", "answer": "- French uses **avoir** (to have) for age, not **être** (to be).\n\nThe logic: In French, age is conceptualized as \"having\" years, not \"being\" years. Compare:\n- English: \"I **am** 25 years old\"\n- French: \"J'**ai** 25 ans\" (I **have** 25 years)\n\nThis is a common source of error for English speakers. The same pattern applies to:\n- **J'ai chaud** = I am hot (literally \"I have heat\")\n- **J'ai froid** = I am cold (literally \"I have cold\")\n- **J'ai raison** = I am right (literally \"I have reason\")\n- **J'ai tort** = I am wrong (literally \"I have wrong\")", "source": "MiniMax ①", "_id": "minimax_1_62", "judge_pick": false}, {"question": "If someone asks \"Tu fais quoi comme sports?\", what are possible responses? (1 step)", "answer": "Possible responses include:\n- **Je vais à la gym.** (I go to the gym.)\n- **Je joue au football.** (I play soccer.)\n- **Je fais de la natation.** (I swim — note **de la** because **natation** is feminine)\n- **Je fais du jogging.** (I jog.)\n- **Je fais du tennis.** (I play tennis.)\n\nNote the pattern:\n- **Aller à la + [place]** = going to a location\n- **Jouer au + [sport]** = playing a sport (with ball/racket)\n- **Faire du + [sport]** = doing a sport (general activity)", "source": "MiniMax ①", "_id": "minimax_1_63", "judge_pick": false}, {"question": "What is the French for \"see you again/see you soon\"? How is this different from \"goodbye\"? (1 step)", "answer": "- **À bientôt** = see you soon / see you again\n- **À très vite** = see you very soon (more casual)\n- **Au revoir** = goodbye (literally \"until seeing again\")\n\nThe difference:\n- **Au revoir** is a **farewell** — you use it when leaving, regardless of when you'll meet again\n- **À bientôt** implies you'll see them **soon** — it's more of a \"see you soon\" than a permanent goodbye\n\nBoth are used when parting. **Au revoir** is the safest default; **à bientôt** adds a warmth implying imminent reunion.", "source": "MiniMax ①", "_id": "minimax_1_64", "judge_pick": false}, {"question": "In the restaurant, when would a server say \"Suivez-moi, s'il vous plaît\"? What does it mean? (1 step)", "answer": "- This is what the server says to引导 you to your table: **\"Suivez-moi, s'il vous plaît\"** = \"Follow me, please.\"\n\nBreaking it down:\n- **Suivez** = follow (imperative of **suivre**)\n- **moi** = me\n- **s'il vous plaît** = please\n\nThis is a command/imperative form. After seating you, the server might say:\n- **Installez-vous** = get seated / make yourself comfortable\n\nThese are common phrases when you first enter a French restaurant.", "source": "MiniMax ①", "_id": "minimax_1_65", "judge_pick": false}, {"question": "What is the phrase \"Vous avez une réservation?\" asking, and what information does the word \"une\" tell you about the answer? (1 step)", "answer": "- The question means \"Do you have a reservation?\"\n\nThe presence of **une** (feminine singular article) tells you:\n- The expected answer is **either/or**: yes (with a reservation) or no (without)\n- **Oui, j'ai une réservation** = Yes, I have ONE reservation (singular)\n- **Non, je n'ai pas de réservation** = No, I don't have a reservation\n\nThe **une** is a clue that we're talking about a countable item (one reservation). If it were uncountable, it would be **de la** or **du**, but reservations are countable.", "source": "MiniMax ①", "_id": "minimax_1_66", "judge_pick": false}, {"question": "How do you form the question \"Est-ce que vous avez des frères et sœurs?\" in two other ways? (2 steps)", "answer": "- Step 1: **Inversion** (more formal): **Avez-vous des frères et sœurs?**\n- Step 2: **Intonation** (informal spoken): **Vous avez des frères et sœurs?**\n\nNote: The answer would likely be:\n- **Oui, j'ai un frère et une sœur.** (Yes, I have a brother and a sister.)\n- **Non, je n'ai pas de frères ni de sœurs.** (No, I don't have any brothers or sisters.)\n\nIn negative, both **des** become **de**: **ni de frères ni de sœurs** (neither brothers nor sisters).", "source": "MiniMax ①", "_id": "minimax_1_67", "judge_pick": false}, {"question": "In the restaurant, what does the server mean by \"Est-ce que vous les voulez en même temps?\" and how might you respond? (1 step)", "answer": "- The question means \"Would you like them at the same time?\" — asking if you want all your ordered items served together.\n\nPossible responses:\n- **Oui, s'il vous plaît.** (Yes, please.)\n- **Non, je vais commencer par l'entrée.** (No, I'm going to start with the appetizer.)\n- **Oui, tout ensemble.** (Yes, everything together.)\n\n**Les** refers to whatever items you've ordered (could be drinks, courses, etc.). **En même temps** = at the same time.", "source": "MiniMax ①", "_id": "minimax_1_68", "judge_pick": false}, {"question": "What is the difference between \"le serveur\" and \"la serveuse\" in French? Is one more correct than the other? (1 step)", "answer": "- **Le serveur** = the (male) waiter\n- **La serveuse** = the (female) waitress\n\nBoth are correct. French has grammatical gender — every noun is either masculine or feminine. The gender of the person determines the article:\n- **Le serveur** (masculine)\n- **La serveuse** (feminine)\n\nIn modern French, you might also hear **le serveur** used as a gender-neutral term in some contexts, but traditionally, you match the article to the gender of the person. The same applies to other professions: **l'étudiant / l'étudiante**, **le professeur / la professeur** (or **professeure** in some regions).", "source": "MiniMax ①", "_id": "minimax_1_69", "judge_pick": false}], "count": 70}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "What is the difference between \"un/une/des\" and \"du/de la/des\" in French? (2 steps)", "answer": "- Step 1: \"Un\" (masculine) and \"une\" (feminine) are indefinite articles used with **countable** nouns — things you can count as individual items.\n- Step 2: \"Du\" (masculine), \"de la\" (feminine), and \"des\" are used with **uncountable** nouns (like liquids, concepts, or general things). \"Du\" and \"de la\" are often called \"partitive articles\" — they mean \"some.\"\n\n+ Example: \"J'ai un chocolat\" (one chocolate bar — countable) vs \"J'ai du chocolat\" (some chocolate — uncountable amount)", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Complete the conjugation of AVOIR in the present tense: je ___, tu ___, il/elle/on ___, nous ___, vous ___, ils/elles ___.", "answer": "- Step 1: The verb AVOIR is irregular — you must memorize it.\n- Step 2: The complete present tense conjugation is:\n\n| Subject | AVOIR |\n|---|---|\n| je | ai |\n| tu | as |\n| il/elle/on | a |\n| nous | avons |\n| vous | avez |\n| ils/elles | ont |\n\nThis verb is essential and appears constantly in French — not just for possession, but also in many idiomatic expressions.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "What are three ways to ask a question in French at A1 level? (3 steps)", "answer": "- Step 1: **Intonation question** — Keep the same sentence structure but raise your voice at the end: \"Tu habites à Paris?\"\n- Step 2: **Est-ce que** — Add \"est-ce que\" at the beginning: \"Est-ce que tu habites à Paris?\"\n- Step 3: **Inversion** — Swap the verb and pronoun (more formal, common in writing): \"Habites-tu à Paris?\"\n\n+ Intonation is most common in spoken French. Est-ce que is safe in both speech and writing. Inversion is more formal and written.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Transform \"Tu parles français?\" into the two other question forms. (2 steps)", "answer": "- Step 1: Using **Est-ce que**: \"Est-ce que tu parles français?\"\n- Step 2: Using **Inversion**: \"Parles-tu français?\"\n\nNote: Inversion requires adding a hyphen between the verb and pronoun. This form sounds more formal and is more common in written French or polite speech.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "What is the difference between \"s'il vous plaît\" and \"s'il te plaît\"? When do you use each? (2 steps)", "answer": "- Step 1: \"S'il vous plaît\" is the **formal** \"please\" — use with strangers, elders, waiters, shop assistants, anyone you don't know well.\n- Step 2: \"S'il te plaît\" is the **informal** \"please\" — use with friends, family, children, people your own age.\n\nThe choice depends on your relationship with the person, not the situation. In a restaurant, you would always use \"s'il vous plaît\" with the waiter/waitress.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "How do you say these meat cooking levels in French: very rare, rare, medium rare, well done? (2 steps)", "answer": "- Step 1: In a French restaurant, the waiter will ask: \"Quelle cuisson pour la viande, Monsieur/Madame?\"\n- Step 2: The responses are:\n  + **Bleu** = very rare (essentially raw)\n  + **Saignant** = rare\n  + **À point** = medium rare\n  + **Bien cuit** = well done\n\nThis is essential vocabulary for ordering steak in France.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "How do you ask for the bill in a French restaurant? Give two polite ways. (2 steps)", "answer": "- Step 1: Formal/polite: \"Je pourrais avoir l'addition s'il vous plaît?\" or \"Pourrais-je avoir l'addition s'il vous plaît?\"\n- Step 2: More casual: \"L'addition s'il vous plaît\" or \"La note s'il vous plaît\"\n\n\"Addition\" is more common in France; \"note\" is also understood. Always use \"s'il vous plaît\" with the waiter — it's the polite form.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Conjugate ÊTRE (to be) in the present tense, positive and negative. (2 steps)", "answer": "- Step 1: **Positive form:**\n| Subject | ÊTRE |\n|---|---|\n| je | suis |\n| tu | es |\n| il/elle/on | est |\n| nous | sommes |\n| vous | êtes |\n| ils/elles | sont |\n\n- Step 2: **Negative form** (add \"ne...pas\"):\n| Subject | Negative |\n|---|---|\n| je | ne suis pas |\n| tu | n'es pas |\n| il/elle/on | n'est pas |\n| nous | ne sommes pas |\n| vous | n'êtes pas |\n| ils/elles | ne sont pas |", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "In French, when do you say \"c'est\" vs \"il/elle est\"? What's the rule? (2 steps)", "answer": "- Step 1: **\"C'est\"** is used for describing things in a general, exclamatory way, or when referring to a noun that follows: \"C'est beau!\" (It's beautiful!), \"C'est un livre.\" (It's a book.)\n- Step 2: **\"Il/Elle est\"** is used when describing a noun with an adjective that directly follows (without an article): \"La réunion est urgente.\" (The meeting is urgent.), \"La réunion est finie.\" (The meeting is over.)\n\nKey insight: After \"c'est,\" you often have an article or adjective; after \"il/elle est,\" the adjective stands alone describing the noun.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "What are the French days of the week? Write them in order starting with Monday. (1 step)", "answer": "The days are:\n- **Lundi** (Monday)\n- **Mardi** (Tuesday)\n- **Mercredi** (Wednesday)\n- **Jeudi** (Thursday)\n- **Vendredi** (Friday)\n- **Samedi** (Saturday)\n- **Dimanche** (Sunday)\n\nNote: In French, days are not capitalized. Also, there is no \"on\" — you say \"le lundi\" for \"on Mondays\" (every Monday).", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "What are the 12
