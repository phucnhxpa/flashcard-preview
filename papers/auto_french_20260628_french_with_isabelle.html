 in how they behave? (3 steps)", "answer": "- Step 1: ÊTRE present tense: $$Je\\;suis$$, $$tu\\;es$$, $$il/elle/on\\;est$$, $$nous\\;sommes$$, $$vous\\;êtes$$, $$ils/elles\\;sont$$. Like AVOIR, this verb is entirely irregular and must be memorised.\n- Step 2: The negative follows the same ne … pas sandwich: $$Je\\;ne\\;suis\\;pas$$, $$tu\\;n'es\\;pas$$, $$il/elle/on\\;n'est\\;pas$$, $$nous\\;ne\\;sommes\\;pas$$, $$vous\\;n'êtes\\;pas$$, $$ils/elles\\;ne\\;sont\\;pas$$. Note: \"tu n'es pas\" and \"il n'est pas\" both elide ne → n' before a vowel.\n- Step 3: The critical functional difference: ÊTRE is a **linking verb** — it connects the subject to an adjective or noun that describes it, and that adjective **agrees in gender and number** with the subject. AVOIR is a **transitive verb** — it takes a direct object, and the object does NOT agree with the subject. This is why \"La réunion est urgente\" (the meeting is urgent — adjective agrees with feminine noun \"réunion\") but \"J'ai un rendez-vous\" (I have an appointment — the object stands independently).\n\n+ Misconception trap: \"La réunion est finie\" — \"finie\" is feminine singular because \"réunion\" is feminine singular. If it were masculine (e.g., \"Le projet\"), you'd say \"Le projet est fini.\" AVOIR never triggers this agreement on the object.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "In the notes, it says \"après c'est, l'adjectif est toujours masculin: c'est beau.\" Why does the adjective after \"c'est\" always stay masculine, even when referring to something feminine? (2 steps)", "answer": "- Step 1: The construction **c'est + adjective** is an **impersonal** structure. The \"ce\" in \"c'est\" is a neutral demonstrative pronoun — it doesn't carry gender. It means \"it/that\" in a general, abstract sense. Because the pronoun \"ce\" is grammatically neuter/masculine by default, the adjective that follows does not agree with any specific feminine noun. So you say $$c'est\\;beau$$ (it's beautiful) regardless of whether you're looking at a painting (masculine) or a sculpture (feminine).\n- Step 2: Contrast this with **subject + être + adjective**, where the adjective MUST agree with the subject: \"La réunion est urgente\" (feminine), \"Le projet est urgent\" (masculine). The difference is structural: \"c'est\" is an impersonal dummy subject, while \"la réunion est\" has a specific gendered subject.\n\n+ If you want to specify and agree, you use the noun: \"C'est une belle sculpture\" (beautiful sculpture — belle agrees with sculpture). But \"C'est beau\" as a standalone reaction stays masculine.\n+ Edge case: \"C'est facile,\" \"C'est bon,\" \"C'est vrai\" — all masculine default, all the time after c'est.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": true}, {"question": "You are at a French restaurant and want to order politely. What are three different ways to say \"I would like\" or \"I'll have,\" ranked from most common to more formal? (3 steps)", "answer": "- Step 1: **Je vais prendre / Je vais choisir** — literally \"I am going to take / choose.\" This is the most common, natural, and direct way to order in a restaurant. Example: \"Je vais prendre le hamburger s'il vous plaît\" = I'll have the hamburger please.\n- Step 2: **Je voudrais / J'aimerais** — conditional tense, meaning \"I would like.\" More polite and slightly softer than \"je vais prendre.\" \"Je voudrais\" is the standard polite ordering phrase taught in most textbooks. \"J'aimerais avoir\" (I would like to have) is even softer.\n- Step 3: **Je pourrais avoir** — literally \"Could I have\" / \"Est-ce que je peux avoir\" = \"Can I have.\" This is more tentative and question-like, treating the order as a request rather than a statement. \"Pourrais-je avoir\" is the formal inversion version, used in very formal contexts.\n\n+ Mental model: \"Je vais prendre\" = decision made, just informing you. \"Je voudrais\" = polite request. \"Je pourrais avoir\" = asking permission. All are acceptable; the first is most natural in everyday dining.\n+ When ordering as a group: \"On va prendre\" (we'll have) or \"On aimerait\" (we would like) — using \"on\" for \"we.\"", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "What is the difference between \"s'il vous plaît\" and \"s'il te plaît\"? When would you use each, and what is the underlying social rule? (2 steps)", "answer": "- Step 1: Both mean \"please,\" but they differ in register based on the pronoun inside: $$s'il\\;vous\\;plaît$$ uses **vous** (formal/plural \"you\"), while $$s'il\\;te\\;plaît$$ uses **te** (informal singular \"you\"). Use \"s'il vous plaît\" with strangers, servers, colleagues you don't know well, elders, and anytime you'd use \"vous.\" Use \"s'il te plaît\" with friends, family, and people you'd call \"tu.\"\n- Step 2: In a restaurant, you would always say \"s'il vous plaît\" to the server — even if you're a regular. The server is in a professional role; \"vous\" is the default. Using \"s'il te plaît\" with a server would sound inappropriately intimate or condescending. The underlying rule: French distinguishes **vouvoiement** (using vous = respect/distance) from **tutoiement** (using tu = familiarity/closeness), and \"please\" inherits this distinction.\n\n+ Lit: \"s'il vous/te plaît\" = \"if it pleases you\" — the verb \"plaît\" agrees with the pronoun (vous vs te).", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "At a French restaurant, the server asks \"Quelle cuisson pour la viande, Monsieur?\" What are the four levels of meat cooking, and what does each actually mean in terms of how the meat is cooked? (2 steps)", "answer": "- Step 1: The four levels, from least to most cooked: $$bleu$$ (very rare — seared on the outside, almost raw inside, red and cool in the centre), $$saignant$$ (rare — red and warm in the centre, more seared than bleu), $$à\\;point$$ (medium rare — pink in the centre, the French standard \"perfect\" cook), $$bien\\;cuit$$ (well done — no pink, fully cooked through, considered overcooked by French steak standards).\n- Step 2: Important cultural note: there is no exact French equivalent for the American \"medium\" or \"medium well.\" \"À point\" is the closest to medium-rare and is the default expectation in France. Ordering \"bien cuit\" may get you a slightly disappointed look from the server, as French culinary culture values juiciness. Also note: \"saignant\" literally means \"bleeding\" — the name tells you what the meat looks like.\n\n+ Misconception: \"à point\" does NOT mean \"well done\" — it means \"to the point\" (i.e., just right). If you want well done, you must say \"bien cuit.\"", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "How do you ask for the bill at a French restaurant? Give two expressions and explain the nuance between them. (2 steps)", "answer": "- Step 1: The two main expressions: (1) $$L'addition,\\;s'il\\;vous\\;plaît$$ — the most common and direct way. \"L'addition\" = the bill/check. (2) $$La\\;note,\\;s'il\\;vous\\;plaît$$ — \"la note\" also means the bill, slightly less common but perfectly understood.\n- Step 2: For a more polite, request-like phrasing: $$Je\\;pourrais\\;avoir\\;l'addition,\\;s'il\\;vous\\;plaît$$ (Could I have the bill, please?) or the formal inversion $$Pourrais-je\\;avoir\\;l'addition,\\;s'il\\;vous\\;plaît$$ (Might I have the bill, please?). These are softer but longer — most French diners simply catch the server's eye and say \"L'addition, s'il vous plaît.\"\n\n+ Note: In France, the bill is not automatically brought to the table at the end of the meal. You must ask for it. This is cultural — meals are not rushed.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "How do you ask \"What is this?\" in French when you see something on a menu you don't recognise? Give the expression and show how you'd ask about a specific dish. (2 steps)", "answer": "- Step 1: The expression is $$Qu'est-ce\\;que\\;c'est$$ (pronounced \"kes-kuh say\" in rapid speech). Literally: \"What is it that it is?\" This is the standard way to ask \"What is this/that?\"\n- Step 2: To ask about a specific dish, you can say: \"Qu'est-ce que c'est la salade niçoise?\" = What is the salade niçoise? You can also use \"Qu'est-ce qu'il y a dans…\" = What is there in…? (asking about ingredients). Example: \"Qu'est-ce qu'il y a dans le croque-monsieur?\" = What's in the croque-monsieur?\n\n+ Pronunciation note: \"Qu'est-ce que\" is almost always pronounced \"kesk(ə)\" in connected speech — the full pronunciation is very formal/unusual.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "When a French server first approaches your table, what are three typical questions they might ask, and what do each mean? (2 steps)", "answer": "- Step 1: The three most common server opening questions: (1) $$Est-ce\\;que\\;vous\\;avez\\;une\\;réservation?$$ = Do you have a reservation? (2) $$À\\;l'intérieur\\;ou\\;en\\;terrasse?$$ = Inside or on the terrace? (3) $$Suivez-moi,\\;s'il\\;vous\\;plaît$$ = Follow me, please (then $$Installez-vous$$ = Get settled/take a seat).\n- Step 2: Once seated, the server returns with: $$Que\\;désirez-vous\\;boire?$$ = What would you like to drink? or $$Souhaitez-vous\\;une\\;bouteille\\;d'eau\\;gazeuse\\;ou\\;d'eau\\;plate?$$ = Would you like a bottle of sparkling or still water? Later: $$Avez-vous\\;choisi?$$ or $$Avez-vous\\;fait\\;votre\\;choix?$$ = Have you chosen / Have you made your choice?\n\n+ \"Est-ce que tout va bien?\" = Is everything okay? (check-in during the meal)\n+ \"Je reviens tout de suite\" = I'm coming back right away", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "You call a French restaurant to make a reservation. What is the typical structure of the conversation, and what are the key phrases for both the caller and the restaurant? (3 steps)", "answer": "- Step 1: **Opening**: Restaurant answers with its name. \"Le restaurant la Tour Eiffel, bonsoir.\" You respond: \"Bonsoir Madame.\" The restaurant then asks: \"C'est pour une réservation?\" = Is it for a reservation? You: \"Oui, pour ce soir\" = Yes, for tonight.\n- Step 2: **Details exchange**: Restaurant: \"À quelle heure?\" = At what time? You: \"À 19h30 (sept heures et demie) s'il vous plaît.\" Restaurant: \"Pour combien de personnes?\" = For how many people? You: \"Pour 2 personnes s'il vous plaît.\" Restaurant: \"Votre numéro de téléphone pour confirmer?\" = Your phone number to confirm?\n- Step 3: **Closing**: You give your number digit by digit. Restaurant: \"C'est noté Monsieur. À ce soir!\" = That's noted, sir. See you tonight! You: \"Merci beaucoup, au revoir!\" = Thank you very much, goodbye!\n\n+ Note: Phone numbers in France are given as pairs of digits. 06 78 65 67 87 is read as \"zéro six, soixante-dix-huit, soixante-cinq, soixante-sept, quatre-vingt-sept\" — each pair is a number 0-99.\n+ \"À quelle heure\" uses \"à\" for time — always \"à\" + time.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "In French, there are three ways to say goodbye depending on how soon you expect to see the person again. What are they? (2 steps)", "answer": "- Step 1: The three expressions: (1) $$Au\\;revoir$$ = Goodbye (neutral, general — no assumption about seeing again). (2) $$À\\;bientôt$$ = See you soon (implies you expect to see the person again in the near future). (3) $$À\\;très\\;vite$$ = See you very soon (even stronger expectation of a quick reunion, more enthusiastic).\n- Step 2: All three start with \"à\" which means \"until\" or \"to\" in temporal expressions. \"Au revoir\" literally means \"to the seeing-again\" (au = à + le). \"À bientôt\" = until soon. \"À très vite\" = until very quickly. The pattern: à + time expression = see you [at that time]. Other examples: \"À demain\" = see you tomorrow, \"À lundi\" = see you on Monday.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "When giving a phone number in France, digits are grouped in pairs and each pair is read as a number from 0 to 99. Why does this create a complication specifically for numbers 70-99? (3 steps)", "answer": "- Step 1: French does not have single unique words for 70, 80, or 90. Instead: 70 = $$soixante-dix$$ (sixty-ten), 80 = $$quatre-vingts$$ (four-twenties), 90 = $$quatre-vingt-dix$$ (four-twenty-ten). This means that any pair containing a digit 7, 8, or 9 in the tens place requires mental arithmetic.\n- Step 2: When reading phone number 78, you say \"soixante-dix-huit\" (60+18 = 78). For 87, you say \"quatre-vingt-sept\" (4×20+7 = 87). For 91, you say \"quatre-vingt-onze\" (4×20+11 = 91). You are constantly doing addition in your head.\n- Step 3: This is why French phone numbers are read in pairs — each pair is a two-digit number from 00 to 99, and French numbers above 69 already encode two-digit arithmetic. Reading 06 78 65 67 87 means: zéro-six, soixante-dix-huit, soixante-cinq, soixante-sept, quatre-vingt-sept.\n\n+ This is a vestige of a vigesimal (base-20) counting system that was once common in medieval French. Belgian and Swiss French use simpler forms: septante (70), octante/huitante (80), nonante (90) — but metropolitan/standard French uses the arithmetic forms.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "French numbers 0-16 each have a unique word. Starting from 17, a compositional pattern emerges. What is this pattern, and where exactly does the \"break point\" occur? (2 steps)", "answer": "- Step 1: The unique words are: zéro (0), un (1), deux (2), trois (3), quatre (4), cinq (5), six (6), sept (7), huit (8), neuf (9), dix (10), onze (11), douze (12), treize (13), quatorze (14), quinze (15), seize (16). These 17 forms must all be memorised — there is no compositional logic to them.\n- Step 2: From 17 onward, French switches to a **ten + unit** composition: $$dix-sept$$ (10+7), $$dix-huit$$ (10+8), $$dix-neuf$$ (10+9). Then 20 is $$vingt$$ (new unique word), and 21-29 follow the pattern vingt + unit. The break point is at 17 — everything from 17 to 19 is transparently compositional, while 0-16 are opaque.\n\n+ This parallels English: \"eleven\" and \"twelve\" are unique, while \"thirteen, fourteen…\" are compositional. French just extends the unique period to 16 instead of 12.\n+ Pronunciation notes from the notes: six = \"siss,\" sept = \"set,\" dix = \"diss,\" quatorze = \"katorz,\" quinze = \"kinz.\"", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "In French, numbers 21, 31, 41, 51, and 61 all use the conjunction \"et\" (and) between the tens word and \"un.\" But 71 does NOT follow this pattern. What is 71, and why is it different? (3 steps)", "answer": "- Step 1: The \"et-un\" pattern: $$vingt-et-un$$ (21), $$trente-et-un$$ (31), $$quarante-et-un$$ (41), $$cinquante-et-un$$ (51), $$soixante-et-un$$ (61). The \"et\" (and) links the tens word to \"un\" — it's the only compound unit that uses \"et\" instead of a hyphen.\n- Step 2: For 71, French does not say *soixante-dix-et-un*. Instead, 71 = $$soixante-et-onze$$ (sixty-and-eleven). The logic: since 70 = soixante-dix (sixty-ten), 71 is calculated as 60 + 11, not 70 + 1. So the \"unit\" added to soixante is onze, not un.\n- Step 3: The \"et\" in \"soixante-et-onze\" connects 60 and 11 — it is NOT the same \"et-un\" pattern. It's a unique exception. From 72 onward, it's hyphenated composition: soixante-douze (60+12), soixante-treize (60+13), etc.\n\n+ Why no \"et-un\" for 71? Because the base is 60, not 70. You're adding eleven to sixty, not one to seventy. The \"et-un\" pattern only applies when you're adding exactly 1 to a round tens number (20, 30, 40, 50, 60).\n+ Similarly: 81 = quatre-vingt-un (no \"et\"), 91 = quatre-vingt-onze (not quatre-vingt-dix-un).", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "The number 80 in French is \"quatre-vingts\" (four-twenties). When you form 81, two changes happen to this word. What are they, and why? (2 steps)", "answer": "- Step 1: 81 = $$quatre-vingt-un$$ (not *quatre-vingts-un*). Two changes: (1) The \"et\" conjunction does NOT appear — it's quatre-vingt-un, not *quatre-vingt-et-un*. This is because \"quatre-vingts\" is a multiplicative compound (4×20), not a simple tens word like vingt or trente. The \"et-un\" pattern only applies to simple tens words. (2) The \"s\" on \"vingts\" disappears — it becomes \"vingt\" without the s. This is because when \"vingts\" is followed by another number, it is no longer plural (it's part of a compound), so the plural s drops.\n- Step 2: This s-dropping rule applies generally: quatre-vingt-un (81), quatre-vingt-deux (82), etc. — no s on vingt. But when 80 stands alone or is the last word, the s stays: \"quatre-vingts\" = 80, \"quatre-vingts pages\" = 80 pages (before a noun, the s stays because it's a round number, though this has nuances).\n\n+ Same logic for \"cent\": deux cents (200, standalone) but deux cent un (201, s drops before another number).", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "How do you count from 70 to 79 in standard (metropolitan) French? Explain the arithmetic logic that makes this range unique. (2 steps)", "answer": "- Step 1: French has no single word for 70. Instead, 70 = $$soixante-dix$$ (sixty-ten). The numbers 70-79 are then built on a base of 60, adding 10-19: soixante-dix (70), soixante-et-onze (71), soixante-douze (72), soixante-treize (73), soixante-quatorze (74), soixante-quinze (75), soixante-seize (76), soixante-dix-sept (77), soixante-dix-huit (78), soixante-dix-neuf (79).\n- Step 2: The arithmetic logic: from 70-79, you are counting in the \"sixties teens.\" 72 = 60 + 12 (soixante-douze). 75 = 60 + 15 (soixante-quinze). 77 = 60 + 17 (soixante-dix-sept = sixty-ten-seven). Notice that 77-79 revert to the \"dix-sept, dix-huit, dix-neuf\" pattern within the soixante-dix block.\n\n+ The numbers 11-16 (onze through seize) have unique names, so 71-76 use those unique names. But 77-79 need to compose \"ten-seven, ten-eight, ten-nine\" — hence soixante-dix-sept, etc.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "How do you count from 90 to 99 in standard French? What is the arithmetic, and what is 91 specifically? (2 steps)", "answer": "- Step 1: 90 = $$quatre-vingt-dix$$ (four-twenty-ten = 4×20+10). The numbers 90-99 follow the same logic as 70-79 but shifted to the 80s base: quatre-vingt-dix (90), quatre-vingt-onze (91), quatre-vingt-douze (92), quatre-vingt-treize (93), quatre-vingt-quatorze (94), quatre-vingt-quinze (95), quatre-vingt-seize (96), quatre-vingt-dix-sept (97), quatre-vingt-dix-huit (98), quatre-vingt-dix-neuf (99).\n- Step 2: Specifically, 91 = $$quatre-vingt-onze$$ (4×20+11). It is NOT *quatre-vingt-dix-un* — just as 71 is not *soixante-dix-un*. The pattern is: add 11-19 to the base (80), not 1-9 to 90. And 97-99 use the \"dix-sept, dix-huit, dix-neuf\" pattern: quatre-vingt-dix-sept, etc.\n\n+ Full arithmetic for 95: 4×20+15 = quatre-vingt-quinze. For 99: 4×20+19 = quatre-vingt-dix-neuf.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "How do you introduce yourself in French (se présenter)? Give the key question-answer pairs for: greeting, name, age, where you live, nationality, job, and hobbies. (3 steps)", "answer": "- Step 1: **Greeting and name**: Question: \"Comment tu t'appelles?\" (What's your name?) → Answer: \"Je m'appelle Phuc.\" The verb \"s'appeler\" means \"to call oneself\" — je m'appelle = I call myself. For greeting: \"Bonjour! Ça va?\" = Hello! How are you?\n- Step 2: **Age, location, nationality, job**: Question: \"Tu as quel âge?\" (How old are you?) → Answer: \"J'ai 25 ans\" (I am 25 years old — note: use \"avoir\" not \"être\" for age). Question: \"Tu habites où?\" or implied → \"J'habite à Paris\" (I live in Paris). \"Je suis vietnamien\" (I am Vietnamese — nationality uses être). \"Tu travailles dans quoi?\" (What do you work in?) → \"Je suis ingénieur dans l'intelligence artificielle\" (I am an engineer in AI).\n- Step 3: **Hobbies**: Question: \"Quels sont tes loisirs?\" (What are your hobbies?) → Answer: \"J'adore le sport, les films et la musique\" (I love sports, films, and music). Follow-up: \"Tu fais quoi comme sports?\" (What sports do you do?) → \"Je vais à la gym\" (I go to the gym). \"Combien de fois par semaine?\" (How many times per week?) → \"Quatre fois par semaine\" (Four times a week).\n\n+ Critical pattern: Age uses AVOIR (j'ai 25 ans), NOT être. This is different from English \"I am 25 years old.\" In French, you \"have\" 25 years.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "Why does French use AVOIR (to have) for age instead of ÊTRE (to be), unlike English? What is the conceptual difference? (2 steps)", "answer": "- Step 1: In French, you say $$J'ai\\;25\\;ans$$ — literally \"I have 25 years.\" The conceptual model is that years are something you possess or accumulate, like objects in a collection. You \"have\" them. English says \"I am 25\" — using \"to be,\" where age is an identity/state.\n- Step 2: This AVOIR-for-age pattern extends to other states that English expresses with \"to be\": \"J'ai faim\" (I have hunger = I am hungry), \"J'ai soif\" (I have thirst = I am thirsty), \"J'ai froid\" (I have cold = I am cold), \"J'ai peur\" (I have fear = I am afraid). The French mental model: these are temporary conditions you \"have,\" not permanent identities you \"are.\"\n\n+ This is why the question is \"Tu as quel âge?\" (You have what age?) not *Tu es quel âge?* (You are what age?).", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": true}, {"question": "What are the days of the week in French, and what is one important grammatical rule about them that differs from English? (2 steps)", "answer": "- Step 1: The days of the week: $$lundi$$ (Monday), $$mardi$$ (Tuesday), $$mercredi$$ (Wednesday), $$jeudi$$ (Thursday), $$vendredi$$ (Friday), $$samedi$$ (Saturday), $$dimanche$$ (Sunday).\n- Step 2: Key grammatical difference from English: French days of the week are **not capitalised** (unless at the start of a sentence). You write \"lundi,\" not \"Lundi.\" This is part of a broader rule — in French, days, months, seasons, and languages are not capitalised, unlike English.\n\n+ Another key rule: to say \"on Monday\" or \"Mondays\" (habitual), you use the article \"le\" without capitalisation: \"le lundi\" = on Mondays (every Monday). \"Je travaille le samedi\" = I work on Saturdays. No preposition needed — just \"le\" + day.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "What are the months of the year in French, and what spelling traps should you watch for? (2 steps)", "answer": "- Step 1: The months: $$janvier$$ (January), $$février$$ (February), $$mars$$ (March), $$avril$$ (April), $$mai$$ (May), $$juin$$ (June), $$juillet$$ (July), $$août$$ (August), $$septembre$$ (September), $$octobre$$ (October), $$novembre$$ (November), $$décembre$$ (December).\n- Step 2: Spelling traps: (1) \"février\" has an accent (é) — not *fevrier*. (2) \"août\" has a circumflex — not *aout*. (3) \"juin\" vs \"juillet\" — June and July look similar; \"juillet\" is longer (July). (4) Like days, months are NOT capitalised in French: \"juin,\" not \"Juin.\"\n\n+ To say \"in [month]\": use \"en\" — \"en juin\" = in June. But months starting with a vowel also use \"en\": \"en août,\" \"en avril.\" No article needed.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "What are the four seasons in French, and what articles and prepositions do they take? (2 steps)", "answer": "- Step 1: The seasons: $$l'hiver$$ (winter), $$le\\;printemps$$ (spring), $$l'été$$ (summer), $$l'automne$$ (autumn). Note: the notes list \"l'hiver\" twice, but the correct four seasons are hiver, printemps, été, automne.\n- Step 2: Seasons take definite articles (le/la/l') when speaking generally: \"J'aime l'hiver\" = I like winter. To say \"in [season]\": use \"en\" for feminine/vowel-initial seasons (en été, en automne, en hiver) but \"au\" for masculine consonant-initial: \"au printemps\" (in spring). This is because \"printemps\" is masculine and starts with a consonant, so \"en\" → \"au\" (= à + le).\n\n+ Pattern: en + feminine/vowel = en été, en hiver, en automne. au + masculine consonant = au printemps. This is the same preposition rule as for countries.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "In French, there are three ways to form a question. What are they, and what is the formality/register difference between them? (3 steps)", "answer": "- Step 1: **Intonation** (la plus simple): Keep the exact same word order as a statement, but raise your voice at the end. \"Tu habites en Espagne?\" = You live in Spain? This is the most common in casual spoken French. No structural change at all.\n- Step 2: **Est-ce que**: Add \"Est-ce que\" (or \"Est-ce qu'\" before a vowel) to the beginning of the statement. \"Est-ce que tu habites en Espagne?\" = Do you live in Spain? This works in both spoken and written French. It's neutral — neither too formal nor too casual.\n- Step 3: **Inversion**: Swap the verb and subject pronoun, connected by a hyphen. \"Habites-tu en Espagne?\" = Do you live in Spain? This is the most formal, primarily used in writing, formal speeches, and literature. In everyday speech, it can sound stiff or pretentious for simple questions.\n\n+ Summary: Intonation = oral/casual (voice goes up). Est-ce que = universal/neutral (adds a question marker). Inversion = formal/written (grammatical restructuring).", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "Convert the statement \"Tu parles français\" into the other two question forms besides intonation. (2 steps)", "answer": "- Step 1: The intonation form is simply the statement with rising voice: \"Tu parles français?\" To form the **est-ce que** version, add \"Est-ce que\" at the beginning: $$Est-ce\\;que\\;tu\\;parles\\;français?$$ The word order of the original statement is preserved — \"est-ce que\" is just a question wrapper.\n- Step 2: To form the **inversion** version, invert the verb and subject: the verb \"parles\" and subject \"tu\" swap and join with a hyphen: $$Parles-tu\\;français?$$ The verb comes first, then the subject pronoun with a hyphen, then the rest of the sentence.\n\n+ Note: with inversion, if the verb ends in a vowel and the pronoun starts with one (e.g., third person), a \"t\" is inserted: \"Parle-t-il français?\" (not *Parle-il*). But with \"tu,\" no t is needed because \"tu\" starts with a consonant.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "Convert \"Est-ce que vous aimez le café?\" into the other two question forms. (2 steps)", "answer": "- Step 1: The **intonation** form strips \"Est-ce que\" and just uses the statement with rising voice: $$Vous\\;aimez\\;le\\;café?$$ Simple — same words, question mark, upward intonation.\n- Step 2: The **inversion** form inverts \"aimez\" and \"vous\": $$Aimez-vous\\;le\\;café?$$ Verb first, then hyphenated subject pronoun, then the rest.\n\n+ Note: \"vous\" forms are very common with inversion because they're inherently formal — \"Aimez-vous le café?\" sounds perfectly natural in a formal context, whereas \"Manges-tu le café?\" would be odd (you don't eat coffee). Context matters.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "The inversion question \"Habitez-vous en Espagne?\" can be converted into the other two forms. What are they? (2 steps)", "answer": "- Step 1: The **est-ce que** form: undo the inversion (put subject back before verb) and add \"Est-ce que\" at the start: $$Est-ce\\;que\\;vous\\;habitez\\;en\\;Espagne?$$\n- Step 2: The **intonation** form: undo the inversion and use rising voice: $$Vous\\;habitez\\;en\\;Espagne?$$ No structural change from a normal statement — just the question mark and rising tone.\n\n+ When converting from inversion, the key step is always: put the subject back before the verb first, then apply the target form's rule.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "When would you choose inversion over est-ce que or intonation? Give a concrete scenario where each would be the most appropriate choice. (3 steps)", "answer": "- Step 1: **Intonation** is best in casual conversation with friends, family, or informal settings. Example: asking a friend \"Tu veux un café?\" (You want a coffee?) — natural, warm, no formality needed.\n- Step 2: **Est-ce que** is the safe default when you're unsure of register — it works everywhere. Example: asking a colleague \"Est-ce que vous avez la note?\" (Do you have the bill?) — polite without being stiff, appropriate for most situations.\n- Step 3: **Inversion** is for formal writing, official correspondence, speeches, or very polite service encounters. Example: a server asking \"Désirez-vous autre chose?\" (Would you like anything else?) — formal and professional. Or in a letter: \"Pourriez-vous me confirmer ma réservation?\" (Could you confirm my reservation?)\n\n+ Misconception: using inversion in casual speech (\"As-tu un stylo?\" to a friend) sounds weirdly literary — like speaking in Shakespearean English at a pizza shop. Default to intonation or est-ce que in speech.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "In French, the pronoun \"on\" can mean \"we\" in informal speech. How does this work in restaurant ordering, and what conjugation does \"on\" take? (2 steps)", "answer": "- Step 1: In informal spoken French, \"on\" commonly replaces \"nous\" to mean \"we.\" The verb after \"on\" is conjugated in the **third person singular** (same as il/elle). So: \"On va prendre\" = We'll have (literally \"one is going to take\"), \"On aimerait\" = We would like, \"On pourrait avoir\" = We could have / Can we have.\n- Step 2: In the restaurant context, when ordering for a group, you'd say: \"On va prendre la salade niçoise\" (We'll have the salade niçoise) rather than \"Nous allons prendre…\" The \"on\" form is shorter and more natural in speech. \"Nous\" is not wrong — it's just more formal and less common in casual spoken French.\n\n+ \"Est-ce qu'on pourrait avoir l'addition?\" = Can we have the bill? (informal group request)\n+ Important: \"on\" conjugates like il/elle, NOT like nous. \"On a\" (not *on avons*), \"On est\" (not *on sommes*).", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": true}, {"question": "When a restaurant host asks \"Vous avez une réservation?\", what are the two possible responses, and what grammar pattern do they illustrate? (2 steps)", "answer": "- Step 1: The affirmative response: \"Oui, j'ai une réservation pour deux personnes\" = Yes, I have a reservation for two people. This uses the standard affirmative AVOIR with the indefinite article \"une.\"\n- Step 2: The negative response: \"Non, je n'ai pas de réservation\" = No, I don't have a reservation. This illustrates the **negation + de rule**: after \"ne … pas,\" the article \"une\" changes to \"de.\" You do NOT say *Je n'ai pas une réservation* — the article reduces to \"de\" because negation eliminates the specificity.\n\n+ This is a direct application of the rule from Q5: after negation, un/une/des/du/de la → de. \"J'ai une réservation\" → \"Je n'ai pas de réservation.\"", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "When the host asks \"À l'intérieur ou en terrasse?\", how do you express your preference, and what preposition is key? (2 steps)", "answer": "- Step 1: The question means \"Inside or on the terrace?\" — $$à\\;l'intérieur$$ = inside, $$en\\;terrasse$$ = on the terrace (outdoor seating).\n- Step 2: To express preference: \"Je préfère en terrasse\" = I prefer on the terrace. The preposition \"en\" is used with \"terrasse\" — not *sur la terrasse* or *à la terrasse*. \"En terrasse\" is the fixed expression for outdoor restaurant seating.\n\n+ Note: \"Je préfère\" = I prefer (from the verb préférer). This is a useful verb for expressing any preference: \"Je préfère le thé\" = I prefer tea.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "What does \"il y a\" mean in French, and how do you make it negative? What happens to the article? (3 steps)", "answer": "- Step 1: $$Il\\;y\\;a$$ means \"there is\" or \"there are\" — it is an impersonal expression (no specific subject). \"Il y a un problème\" = There is a problem. \"Il y a des chocolats\" = There are some chocolates.\n- Step 2: The negative form is $$il\\;n'y\\;a\\;pas$$ (there is not / there are not). The \"ne\" elides with \"y\" to become \"n'\": il n'y a pas. Example: \"Non, il n'y a pas de problème\" = No, there's no problem.\n- Step 3: The article rule applies here too: after the negation \"il n'y a pas,\" articles change to \"de.\" \"Il y a un problème\" → \"Il n'y a pas **de** problème\" (not *pas un problème*). \"Il y a des chocolats\" → \"Il n'y a pas **de** chocolats.\"\n\n+ \"Il y a\" is invariable — it never changes for singular/plural. \"Il y a un chat\" and \"Il y a des chats\" both use the same \"il y a.\"", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "In Phuc's homework, the correction \"avez != avons\" appears. What is the common mistake this flags, and how can you avoid it? (2 steps)", "answer": "- Step 1: The mistake is confusing $$avez$$ (vous avez = you have, formal/plural) with $$avons$$ (nous avons = we have). These are two different conjugations of AVOIR for two different subjects. The homework error likely came from writing something like \"Nous avez\" (wrong — should be \"nous avons\") or \"Vous avons\" (wrong — should be \"vous avez\").\n- Step 2: To avoid this, memorise the full paradigm as a unit: nous AVONS, vous AVEZ. The vowel pattern is reversed: nous takes the O-vowel (avOns), vous takes the E-vowel (avEz). A memory hook: \"nOus avOns\" has matching O sounds; \"vOus avEz\" does not match, but \"avEz\" links to \"vous\" through the E-vowel in the second syllable of both.\n\n+ This is one of the most common A1 errors — mixing up the nous and vous forms. Always double-check: who is the subject? Then match the conjugation.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "What CEFR level is required for French naturalisation/citizenship, and why is this level significant? (2 steps)", "answer": "- Step 1: French nationality/naturalisation requires **B2** level (CEFR/CECRL), both oral and written, as stated by Service-Public and confirmed by France Éducation internationale's TCF IRN. This is the highest admin requirement on the French integration ladder.\n- Step 2: B2 is significant because it represents **independent user** proficiency — you can argue, defend opinions, understand complex content, and participate fluently in discussion. This is not just survival French (A1-A2) or getting-by French (B1) — it is the level where you can function as a fully participating member of French society in debates, professional settings, and civic life.\n\n+ The full admin ladder: Carte de séjour pluriannuelle = A2, Carte de résident = B1, Naturalisation = B2. Each level unlocks more permanent status.\n+ B2 is also the usual minimum for most French higher education institutions (Campus France), with C1 recommended for humanities/social sciences.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "According to the roadmap, approximately how many guided hours does each CEFR transition require (exam-ready estimate), and why is a 20% buffer added on top of the core estimates? (3 steps)", "answer": "- Step 1: The core guided-hour estimates (from Campus Langues, a Paris FLE school) are: A1→A2 = 100-120h, A2→B1 = 180-200h, B1→B2 = 200-250h. These are midpoints: 110h, 190h, 225h respectively.\n- Step 2: The **exam-ready** estimates add a 20% buffer: A1→A2 = 132h, A2→B1 = 228h, B1→B2 = 270h. Total A1→B2 = 630h. The buffer exists because \"finishing a course unit\" is not the same as being comfortable enough to pass a DELF/TCF/TEF-style four-skill test.\n- Step 3: The 20% matters most at B2, which requires reliable **speaking and writing output** — not just recognising grammar in reading/listening. Many learners can passively understand B2 content but cannot produce it under exam conditions. The buffer accounts for this productive gap.\n\n+ If you are starting from A0 (true beginner, not even A1), add roughly 90-120 guided hours for the A0→A1 bootstrap phase before these transitions begin.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "What counts as a \"guided hour\" in the roadmap, and what does NOT count? Why does this distinction matter for planning? (2 steps)", "answer": "- Step 1: Guided hours include: school lesson hours, teacher-assigned platform work, deliberate after-lesson review, active listening with exercises, corrected writing/speaking practice, and exam practice under timed conditions. These are all **structured, intentional learning activities** with feedback or deliberate focus.\n- Step 2: What does NOT count equally: passive background exposure — French music playing while you cook, Netflix with French subtitles while half-watching, casual social media scrolling in French. These help as bonus exposure but are NOT equivalent to class time because they lack the active recall, correction, and deliberate practice that drives real progress.\n\n+ This distinction matters because it's tempting to count \"I watched two hours of Netflix in French\" as two hours of study. It's not — unless you're actively doing comprehension exercises, shadowing, note-taking, or output. Passive exposure supports learning but does not replace guided hours.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "The roadmap recommends Scenario S3 as the \"best balanced route\" for A1→B2. What does S3 consist of, and approximately how long does it take? (2 steps)", "answer": "- Step 1: Scenario S3 = **2 lessons per week + 1 hour review + 20 minutes daily practice**. This means: 2×90min lessons (= 3h/week class) + 1h structured review + ~2.3h daily practice (20min × 7 days) = approximately 6.3 guided hours per week.\n- Step 2: At this pace, A1→B2 takes approximately **22.7 months / 1.9 years** (with the 15% real-life buffer for missed weeks, holidays, etc.). This is considered the best balance because it achieves B2 in under 2 years without requiring an overwhelming weekly load.\n\n+ Compare: school-only (2 lessons/week, no review) = 55.6 months / 4.6 years. Adding review and daily practice cuts the timeline by more than half. The daily 20 minutes is the single most impactful addition because it leverages spaced repetition and prevents decay between lessons.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "Why does the roadmap say \"school-only is too slow\" for reaching B2? What is the approximate timeline with 2 lessons per week and no additional study? (2 steps)", "answer": "- Step 1: With only 2 lessons per week (3 hours/week of class) and no review or daily practice, A1→B2 takes approximately **55.6 months / 4.6 years**. This is because 3 hours/week × 52 weeks = 156 hours/year, and you need 630 exam-ready hours. Even without any breaks, that's over 4 years of pure class time.\n- Step 2: The problem is compounded by the **forgetting curve** — without review between lessons, you lose a significant portion of each lesson before the next one. The 15% buffer for real-life interruptions (holidays, exams, illness, travel) makes it even longer. School-only is the slowest path because you're relying entirely on input time with no structured reinforcement.\n\n+ The roadmap's conclusion: if B2 is the goal (for naturalisation, university, or professional reasons), school-only is not a credible strategy within a reasonable timeframe. You need the multiplier effect of self-study and daily practice.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": true}, {"question": "What is the Qualité FLE label, and why does the roadmap recommend preferring schools that have it? (2 steps)", "answer": "- Step 1: The $$Qualité\\;FLE$$ label is an official quality guarantee initiated by three French ministries (Education, Higher Education, Foreign Affairs) to identify and promote French language centres whose teaching and services meet quality standards. It is the closest thing to an official accreditation for French language schools in France.\n- Step 2: The roadmap recommends it because paying for a school without quality assurance is risky — unregulated schools may lack CEFR alignment, placement testing, teacher feedback, attendance structure, or qualified instructors. Apps and casual tutors can supplement, but they should not replace a structured school if the target is B2 evidence (like a DELF diploma).\n\n+ Practical rule from the roadmap: when choosing a school, look for CEFR-aligned programme, placement testing, teacher feedback, attendance structure, and ideally Qualité FLE recognition. Ask before enrolling.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": true}, {"question": "What does CEFR A1 practically unlock, and how does it compare to A2? Give concrete \"can-do\" examples for each. (2 steps)", "answer": "- Step 1: **A1** = basic survival. You can introduce yourself, fill in forms, buy things and pay, ask simple questions, and understand simple oral instructions and short texts. Example: you can walk into a bakery and order a baguette, give your name and address, and understand a simple schedule.\n- Step 2: **A2** = everyday routines. You can handle shops and transport, have simple conversations about daily life, describe past events, give and understand directions, and write simple personal letters. Example: you can have a basic conversation about your weekend, explain a simple problem to a pharmacist, or write a short email to a friend about your holiday.\n\n+ The jump from A1 to A2 is significant: A1 is \"survival mode\" (memorised phrases), while A2 is \"daily life mode\" (you can create your own sentences about familiar topics). A2 requires about 100-120 additional guided hours beyond A1.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "What does CEFR B1 unlock compared to B2? Why is B2 considered the \"key official target\"? (3 steps)", "answer": "- Step 1: **B1** = independent daily life. You can handle travel and life problems, explain opinions with reasons, recount experiences, understand main points of news, and express agreement/disagreement. You can function independently in most daily situations but with limitations in nuance and complexity.\n- Step 2: **B2** = serious independent French. You can defend an opinion with arguments and examples, discuss advantages and disadvantages, express cause and consequence, reformulate ideas, and understand complex current-affairs documents. You can participate with fluency and spontaneity in discussion with native speakers.\n- Step 3: B2 is the key official target because: (1) it is required for French naturalisation (Service-Public); (2) it is the usual minimum for French higher education (Campus France); (3) it represents the threshold where you can truly function in French society as an independent, contributing participant — not just survive or get by. B1 lets you cope; B2 lets you engage.\n\n+ Campus France adds that C1 is \"strongly recommended for humanities/social sciences\" — meaning B2 is the floor, not the ceiling, for academic French.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": true}, {"question": "After each French lesson, the roadmap recommends a structured review block. If you have 30 minutes, what should you prioritise? If you have 60 or 90 minutes, what do you add? (3 steps)", "answer": "- Step 1: **30-minute block**: Prioritise (1) reviewing notes from the lesson immediately, (2) making flashcards for new vocabulary and grammar, and (3) doing one quick active recall exercise (e.g., self-testing on conjugations or key phrases). The 30-minute block is about preventing forgetting — it locks in what you just learned.\n- Step 2: **60-minute block**: Add (1) a focused vocabulary drill using spaced repetition (Anki or similar), (2) a listening exercise related to the lesson topic (e.g., a short audio clip with comprehension questions), and (3) a short writing exercise (3-5 sentences using the new grammar/vocabulary). You now have time for input reinforcement.\n- Step 3: **90-minute block**: Add (1) a speaking/output exercise (shadowing, recording yourself, or practicing with a language partner), (2) a grammar deep-dive into the trickiest point from the lesson, and (3) preview of the next lesson's topic. This is the full reinforcement cycle: review → drill → input → output → preview.\n\n+ The key principle: the first 30 minutes are non-negotiable (review within hours of the lesson, before the forgetting curve steepens). Everything beyond that accelerates progress but the 30-minute minimum already captures most of the retention benefit.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "The roadmap describes four \"study lanes.\" What are they, and why does it recommend running all four simultaneously rather than focusing on just one? (3 steps)", "answer": "- Step 1: The four lanes: (1) **Lane 1: Structured school progression** — following a CEFR-aligned course with a teacher and curriculum. (2) **Lane 2: Active recall and vocabulary** — flashcards, spaced repetition, self-testing on grammar and vocabulary. (3) **Lane 3: Listening and input** — podcasts, videos, dictations, comprehension exercises with French audio. (4) **Lane 4: Output and correction** — speaking practice, writing exercises, getting feedback and corrections from a teacher or tutor.\n- Step 2: Each lane targets a different skill: Lane 1 = structured knowledge acquisition. Lane 2 = retention and retrieval speed. Lane 3 = comprehension and ear training. Lane 4 = productive ability and accuracy. No single lane covers all four skills.\n- Step 3: Running all four simultaneously creates a virtuous cycle: what you learn in class (Lane 1) gets reinforced by flashcards (Lane 2), enriched by listening (Lane 3), and solidified by output (Lane 4). Gaps in any lane become visible in the others — if you can't say it (Lane 4), you don't really know it, even if you recognise it (Lane 3).\n\n+ The most common mistake: relying only on Lane 1 (classes) and Lane 3 (passive listening) while skipping Lane 2 (active recall) and Lane 4 (output). This produces learners who can understand but not produce French — the classic \"I can read but I can't speak\" problem.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": true}, {"question": "In the restaurant dialogue, the host says \"À quelle heure?\" and the client responds \"À 19h30 (sept heures et demie).\" How does French time-telling work for this kind of half-hour time? (2 steps)", "answer": "- Step 1: In French, the 24-hour clock is standard for schedules, reservations, and formal contexts. 19h30 = 19:30 (7:30 PM). The \"h\" stands for \"heures\" — you say \"dix-neuf heures trente\" (nineteen hours thirty).\n- Step 2: In the 12-hour equivalent, you say \"sept heures et demie\" = seven hours and a half = 7:30. The pattern: [hour] + heures + et demie = half past [hour]. \"Et demie\" means \"and half.\" Note: it's \"demie\" (feminine, agreeing with \"heures\" which is feminine), not *demi*.\n\n+ Other half-hour expressions: \"midi et demi\" = 12:30 PM (demi, masculine, agreeing with midi which is masculine). \"Minuit et demi\" = 12:30 AM.\n+ For quarter hours: \"sept heures et quart\" = 7:15, \"sept heures moins le quart\" = 6:45.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "When the server asks \"Est-ce que vous les voulez en même temps?\", what does this mean and in what context would you hear it? (2 steps)", "answer": "- Step 1: This means \"Would you like them at the same time?\" — $$en\\;même\\;temps$$ = at the same time. The server is asking whether you want all your dishes brought out together, or if you prefer courses sequentially (starter first, then main, etc.).\n- Step 2: You would hear this when ordering multiple courses (starter + main, or main + dessert) and the server wants to pace the kitchen. A typical response: \"Oui, en même temps s'il vous plaît\" (Yes, together please) or \"Non, l'entrée d'abord s'il vous plaît\" (No, the starter first please).\n\n+ \"Les\" in \"les voulez\" refers to the dishes — it's a plural direct object pronoun meaning \"them.\"", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "Convert \"Vous avez des frères et sœurs?\" (intonation form) into the est-ce que and inversion forms. (2 steps)", "answer": "- Step 1: The **est-ce que** form: add \"Est-ce que\" to the front of the statement: $$Est-ce\\;que\\;vous\\;avez\\;des\\;frères\\;et\\;sœurs?$$ The word order stays the same — \"est-ce que\" is just a question marker.\n- Step 2: The **inversion** form: invert \"avez\" and \"vous\": $$Avez-vous\\;des\\;frères\\;et\\;sœurs?$$ The verb comes first, then the subject pronoun with a hyphen. This is the formal/written version.\n\n+ Note: \"des frères et sœurs\" = brothers and sisters (siblings). The \"des\" is the plural indefinite article. If negating: \"Je n'ai pas **de** frères et sœurs\" (I don't have siblings) — the article changes to \"de\" after negation.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "Convert \"Est-ce que tu fais du sport?\" into the intonation and inversion forms. (2 steps)", "answer": "- Step 1: The **intonation** form: remove \"Est-ce que\" and use rising voice on the statement: $$Tu\\;fais\\;du\\;sport?$$ Same words, just a question mark and upward intonation.\n- Step 2: The **inversion** form: invert \"fais\" and \"tu\": $$Fais-tu\\;du\\;sport?$$ Verb first, hyphenated subject pronoun. Note: no \"t\" insertion needed because \"tu\" starts with a consonant.\n\n+ \"Faire du sport\" = to do sport / to exercise. \"Du\" is the partitive article (masculine uncountable) — sport as an activity is uncountable in this expression.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "Convert \"Prends-tu le bus pour aller au travail?\" (inversion form) into the intonation and est-ce que forms. (2 steps)", "answer": "- Step 1: The **intonation** form: undo the inversion (put subject before verb) and use rising voice: $$Tu\\;prends\\;le\\;bus\\;pour\\;aller\\;au\\;travail?$$\n- Step 2: The **est-ce que** form: keep the normal subject-verb order and add \"Est-ce que\" at the start: $$Est-ce\\;que\\;tu\\;prends\\;le\\;bus\\;pour\\;aller\\;au\\;travail?$$\n\n+ \"Pour aller au travail\" = to go to work. \"Au\" = à + le (contraction before masculine noun \"travail\").", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "In the self-introduction dialogue, \"J'habite à Paris\" uses \"à\" before a city name. What preposition would you use before a country name, and why? (2 steps)", "answer": "- Step 1: Before **cities**, French uses $$à$$: \"J'habite à Paris,\" \"J'habite à Lyon.\" This is simple — always \"à\" for cities, regardless of gender.\n- Step 2: Before **countries**, the preposition depends on the country's grammatical gender: feminine countries take $$en$$ (en France, en Espagne, en Italie), masculine countries starting with a consonant take $$au$$ (au Japon, au Canada, au Vietnam), and masculine countries starting with a vowel take $$en$$ (en Iran, en Irak). Plural countries take $$aux$$ (aux États-Unis, aux Pays-Bas).\n\n+ Vietnam is masculine (le Vietnam), so: \"J'habite au Vietnam\" (not *en Vietnam*). But \"Je suis vietnamien\" (nationality, no article needed).\n+ France is feminine (la France), so: \"J'habite en France\" (not *à la France*).", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": true}, {"question": "A common A1 exercise: \"Tu travailles le samedi?\" — what does \"le samedi\" mean here, and why is there an article before the day? (2 steps)", "answer": "- Step 1: \"Le samedi\" with the definite article means \"on Saturdays\" or \"every Saturday\" — it indicates a habitual, recurring action. \"Tu travailles le samedi?\" = Do you work on Saturdays? (i.e., as a regular schedule).\n- Step 2: Without the article, \"samedi\" alone means \"this Saturday\" or \"on Saturday\" (a specific instance). \"Tu travailles samedi?\" = Are you working this Saturday? The article \"le\" + day of the week = habitual/recurring; no article = specific/one-time.\n\n+ This pattern applies to all days: \"le lundi\" = on Mondays (every Monday), \"lundi\" = on Monday (this coming Monday). The article is the signal for habit.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": false}, {"question": "Conceptual synthesis: You walk into a French restaurant without a reservation, get seated, order a steak, and ask for the bill. Compose a mini-dialogue using at least 5 different grammar/vocabulary points from this chapter. (5 steps)", "answer": "- Step 1: **Arriving and seating**: Server: \"Bonsoir! Vous avez une réservation?\" You: \"Non, je n'ai pas de réservation.\" Server: \"À l'intérieur ou en terrasse?\" You: \"Je préfère en terrasse, s'il vous plaît.\" Server: \"Suivez-moi, installez-vous.\" (Grammar: negation + de rule, preference expression, formal please)\n- Step 2: **Ordering drinks**: Server: \"Que désirez-vous boire?\" You: \"Je voudrais une carafe d'eau, s'il vous plaît.\" (Grammar: je voudrais for polite ordering, countable container \"une carafe\" + d'eau)\n- Step 3: **Ordering food**: Server: \"Avez-vous choisi?\" You: \"Oui, je vais prendre l'entrecôte saignante, s'il vous plaît.\" Server: \"Quelle cuisson pour la viande?\" You: \"Saignante.\" (Grammar: je vais prendre for ordering, meat cooking level vocabulary)\n- Step 4: **During the meal**: Server: \"Est-ce que tout va bien?\" You: \"Oui, merci. Qu'est-ce que c'est que ce sauce?\" Server: \"C'est une sauce au poivre.\" (Grammar: qu'est-ce que c'est for asking about something, est-ce que question form)\n- Step 5: **Asking for the bill**: You: \"Je pourrais avoir l'addition, s'il vous plaît?\" Server: \"Voilà, la note.\" You: \"Merci beaucoup, au revoir!\" Server: \"À bientôt!\" (Grammar: je pourrais avoir for polite request, l'addition/la note vocabulary, goodbye expressions)\n\nThis single scenario touches: AVOIR (negative + de rule), definite/indefinite/partitive articles, three question forms, polite ordering expressions, restaurant vocabulary, cooking levels, and farewell expressions — all from this chapter.", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "Misconception probe: A learner writes \"Je n'ai pas une réservation\" instead of \"Je n'ai pas de réservation.\" Why is this wrong, and what rule is being violated? (2 steps)", "answer": "- Step 1: After negation (ne … pas), the indefinite articles un/une/des and partitive articles du/de la all reduce to **de** (or d' before a vowel). \"J'ai une réservation\" → \"Je n'ai pas **de** réservation.\" Writing \"pas une\" violates this rule.\n- Step 2: The conceptual reason: \"une réservation\" specifies exactly one reservation — but negation (\"I don't have\") removes that specificity. When you say you don't have something, you're saying you have zero — and zero erases the need for gender and number marking. \"De\" becomes the universal \"any\" — \"I don't have any reservation.\" The only exception is emphatic contrast: \"Je n'ai pas une réservation, j'en ai deux!\" (I don't have one reservation, I have two!) — but this is rare and rhetorical.\n\n+ This same error would produce: *Je n'ai pas des chocolats* (wrong) → Je n'ai pas de chocolats (correct). *Il n'y a pas du café* (wrong) → Il n'y a pas de café (correct).", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": true}, {"question": "Misconception probe: A learner writes \"Quatre-vingts-et-un\" for 81. Identify the two errors in this spelling. (2 steps)", "answer": "- Step 1: Error 1: The \"et\" conjunction should NOT be present. 81 = $$quatre-vingt-un$$, not *quatre-vingt-et-un*. The \"et-un\" pattern only applies to simple tens words (vingt-et-un, trente-et-un, etc.). \"Quatre-vingts\" is a multiplicative compound (4×20), not a simple tens word, so it doesn't take \"et.\"\n- Step 2: Error 2: The \"s\" on \"vingts\" should be dropped. When \"vingts\" is followed by another number, it loses its plural s because it's no longer a standalone round number — it becomes part of a compound. So: quatre-vingt-un (81), quatre-vingt-deux (82), etc. The s only appears when 80 stands alone: quatre-vingts.\n\n+ Same rule for \"cent\": deux cents (200) but deux cent un (201). The s drops before another number.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": false}, {"question": "Edge case: Why is 71 \"soixante-et-onze\" (with \"et\") but 72 is \"soixante-douze\" (with a hyphen, no \"et\")? What determines whether \"et\" appears? (2 steps)", "answer": "- Step 1: The \"et\" in \"soixante-et-onze\" is there because French treats 71 as \"sixty AND eleven\" — the \"et\" connects 60 to 11. This is a special case: 71 is the only number in the 70s that uses \"et,\" and it's because 11 (onze) starts the sequence of \"teens\" being added to 60.\n- Step 2: From 72 onward, the connection is purely additive and uses hyphens: soixante-douze (60-12), soixante-treize (60-13), etc. The \"et\" only appears when connecting a round tens number to \"un\" (vingt-et-un, trente-et-un) or in the unique case of soixante-et-onze. It never appears with 2-9 or 12-19.\n\n+ Pattern: \"et\" appears with exactly \"1\" (un) after simple tens, and with \"11\" (onze) after soixante. That's it. Every other compound number uses a hyphen.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": true}, {"question": "Simple exercise: You want to say \"I have some coffee\" (referring to the substance, not one cup). Which article do you use and why? (2 steps)", "answer": "- Step 1: Coffee as a substance is uncountable, so you use the partitive article. Since \"café\" is masculine, the partitive article is $$du$$: \"J'ai du café.\"\n- Step 2: If you meant \"I have one coffee\" (one cup/order), you would use the indefinite article: \"J'ai un café.\" The difference is entirely about countability: substance (uncountable → du) vs. serving (countable → un).\n\n+ Feminine uncountable would use \"de la\": \"J'ai de la crème brûlée\" (some crème brûlée). Before a vowel, both contract to \"de l'\": \"J'ai de l'eau\" (some water).", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": false}, {"question": "Simple exercise: How would you say \"We would like\" in French using the informal \"on\" pronoun? Give the form and explain the conjugation. (2 steps)", "answer": "- Step 1: \"We would like\" using \"on\" = $$on\\;aimerait$$. The verb \"aimer\" in the conditional present, third person singular (because \"on\" takes il/elle conjugation) = aimerait.\n- Step 2: You could also say \"on voudrait\" (we would want). Both are used in restaurant contexts: \"On aimerait deux cafés\" = We'd like two coffees. \"On voudrait la note\" = We'd like the bill.\n\n+ Compare with the formal \"nous\" form: \"nous aimerions\" / \"nous voudrions\" — different conjugation (first person plural conditional). The \"on\" form is shorter and more natural in speech.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": false}, {"question": "Simple exercise: A friend asks you \"Tu as quel âge?\" and you are 25. How do you respond, and what verb do you use? (1 step only — single fact)", "answer": "You respond: $$J'ai\\;25\\;ans$$ (or \"J'ai vingt-cinq ans\"). You use the verb AVOIR (to have), NOT être. In French, you \"have\" your age — you possess 25 years. This is different from English where you \"are\" 25. The question itself uses avoir: \"Tu as quel âge?\" = \"You have what age?\"", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": false}, {"question": "Simple exercise: What is 100 in French, and how would you say 200 and 201? (2 steps)", "answer": "- Step 1: 100 = $$cent$$. Unlike 70, 80, and 90, French does have a unique word for 100 — no arithmetic required.\n- Step 2: 200 = $$deux\\;cents$$ (the s appears on cents because it's a round number with no following digit). 201 = $$deux\\;cent\\;un$$ (the s drops because a number follows — same rule as quatre-vingts/quatre-vingt-un).\n\n+ 300 = trois cents. 302 = trois cent deux. The pattern: [multiplier] + cent(s) + [unit, if any]. The s on cent follows the same rule as the s on vingt.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": false}], "count": 61}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "Why do French speakers use the verb *avoir* (to have) rather than *être* (to be) to express age? If someone is 25, what is the literal translation of the French phrase, and what does this reveal about how French conceptualizes age? (3 steps)", "answer": "- Step 1: In English, age is seen as an identity state: \"I *am* 25.\" We use the verb *être* (to be). But in French, age is seen as something you possess: \"I *have* 25 years.\" They use the verb *avoir* (to have).\n- Step 2: The literal translation of \"J'ai 25 ans\" is \"I have 25 years.\" The word *ans* (years) is the direct object that you \"have.\"\n- Step 3: This reveals that French conceptualizes age as an accumulated asset or possession, rather than an intrinsic property of the self. You collect years like you collect books.\n+ Misconception: Never say \"Je suis 25\" or \"Je suis 25 ans\" in French—this sounds like you are claiming to literally be the number 25 or the concept of 25 years.\n\nTakeaway: Always use *avoir* for age; never *être*.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": true}, {"question": "In French, negation is formed with two words wrapping the verb. If the affirmative is \"J'ai un café,\" what is the negative form, and how does the negative structure physically sit around the conjugated verb? (2 steps)", "answer": "- Step 1: French negation is a \"sandwich.\" It uses two elements: *ne* (before the verb) and *pas* (after the verb). For \"J'ai un café,\" the conjugated verb is *ai*. *Ne* goes before *ai*, and *pas* goes after *ai*.\n- Step 2: This creates \"Je n'ai pas un café.\" (Note: in standard negation, the article *un* will actually change to *de*, making it \"Je n'ai pas de café,\" but the verb-wrapping structure is *ne ... pas*). In spoken casual French, the *ne* is often dropped entirely (\"J'ai pas de café\"), but in A1 writing and formal speech, both halves are mandatory.\n+ If the subject starts with a vowel, *je ne* contracts to *je n'* to avoid the vowel clash.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "When negating a sentence with an article like *un* or *des*, the article itself changes. Why does \"J'ai des chocolats\" become \"Je n'ai pas **de** chocolats\" in the negative, instead of \"Je n'ai pas des chocolats\"? What is the conceptual logic behind this shift? (3 steps)", "answer": "- Step 1: In the affirmative, \"J'ai des chocolats\" uses *des* (some, plural indefinite) because the quantity is positive but unspecified—you have an existing number of chocolates.\n- Step 2: In the negative, the concept of \"some\" is entirely wiped out. If you don't have *any* chocolates, the quantity is zero. French uses *de* (or *d'* before a vowel) to represent this zero/absence quantity.\n- Step 3: Saying \"Je n'ai pas des chocolats\" would logically imply you don't have *some specific* chocolates, but might have others—which contradicts the absolute void of negation. Therefore, *un, une, des* all collapse into *de/d'* in the negative to express \"not any.\"\n+ Exception: If you are negating a specific, contrasted item (\"I don't want *this* book, I want *that* book\"), you can keep *ce/ces*, but for general indefinite articles, it's always *de*.\n\nTakeaway: Affirmative = *un/une/des*. Negative = always *de/d'*.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "If you say \"J'ai un saumon grillé\" versus \"J'ai du saumon grillé,\" what is the conceptual difference in what you possess? How does the partitive article (*du*) function differently from the indefinite (*un*) when dealing with food? (3 steps)", "answer": "- Step 1: \"J'ai un saumon grillé\" uses *un* (an indefinite article). This means you have one discrete, countable, whole item: one entire grilled salmon fish.\n- Step 2: \"J'ai du saumon grillé\" uses *du* (a partitive article, contraction of *de + le*). This means you have an unspecified quantity of an uncountable mass: some portion of grilled salmon (e.g., a slice or a piece on your plate).\n- Step 3: The partitive article (*du, de la, de l', des*) exists specifically because in French, you cannot just say \"J'ai saumon\"—nouns demand articles. Since you can't count salmon as \"one\" or \"two\" when it's a mass, you use the partitive to say \"some of that mass.\"\n+ Edge case: \"J'ai des chocolats\" (countable plural) vs \"J'ai du chocolat\" (uncountable mass chocolate). Both mean \"some,\" but *des* is for countable plural items, while *du* is for uncountable masses.\n\nTakeaway: *Un/une* = countable whole items. *Du/de la* = uncountable portions/masses.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "When ordering in a French restaurant, you rarely say \"I want\" (*Je veux*). Instead, you use conditional or future-based phrases. Why is \"Je voudrais\" (I would like) or \"Je vais prendre\" (I am going to take) culturally preferred, and what does this reveal about French politeness norms? (3 steps)", "answer": "- Step 1: \"Je veux\" (I want) is grammatically correct but socially blunt. It sounds like a demand or a child's request, which is considered rude in a French service context.\n- Step 2: \"Je voudrais\" (I would like) uses the conditional mood, which softens the desire into a polite hypothesis. \"Je vais prendre\" (I am going to take) uses the near future, phrasing the choice as a gentle intention rather than a direct command.\n- Step 3: French politeness relies on attenuating direct assertions. By framing your desire as a preference (*j'aimerais*) or a future action (*prendre*), you respect the server's agency and maintain a civilized distance.\n+ \"Je pourrais avoir\" (Could I have) is another conditional form that maximizes politeness by asking for possibility rather than demanding fulfillment.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "What is the structural and social difference between \"s'il vous plaît\" and \"s'il te plaît\"? If speaking to a waiter vs a close friend, which do you use, and why does the pronoun inside the phrase change? (2 steps)", "answer": "- Step 1: Both phrases literally translate to \"if it pleases you.\" The difference lies entirely in the pronoun: *vous* vs *te* (the object form of *tu*).\n- Step 2: *S'il vous plaît* uses the formal/plural *vous*. You use this with strangers, elders, or service workers (like a waiter) to maintain respectful distance. *S'il te plaît* uses the informal *te*. You use this with friends, family, or close peers.\n+ Misconception: Using *s'il te plaît* with a waiter would be overly familiar and awkward. Even if you are young and the waiter is young, the service context demands *s'il vous plaît*.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "If you see a dish on a menu and don't know what it is, you ask \"Qu'est-ce que c'est la salade niçoise?\" What is the literal, word-by-word translation of \"Qu'est-ce que c'est,\" and why does it use *ce* instead of a specific noun? (2 steps)", "answer": "- Step 1: \"Qu'est-ce que c'est\" breaks down as: *Qu'* (What) + *est* (is) + *ce* (this/that/it) + *que* (that) + *c'est* (it is). A clunky literal translation is \"What is it that it is?\"\n- Step 2: The phrase uses *ce* (a neutral demonstrative pronoun) because you are asking about the identity of an unknown thing. By using *ce*, you don't assign a gender to the unknown object. Once you learn what it is (\"C'est la salade niçoise\"), the noun's gender (feminine *la*) is revealed, but the question itself remains neutral.\n+ Pronunciation: \"Qu'est-ce que c'est\" is heavily contracted in speech, sounding like \"kes-ké sè\" or simply \"keske c'est\".", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "French has four specific terms for meat doneness that don't perfectly map to English. If you want your steak cooked just right—neither too red nor too dry—which French term do you use, and what is the literal meaning of that term that hints at \"perfect readiness\"? (2 steps)", "answer": "- Step 1: The four levels are *Bleu* (very rare, barely touched by heat), *Saignant* (rare, still bleeding/red inside), *À point* (medium rare, cooked \"to the point\" of perfection), and *Bien cuit* (well cooked, no pink left).\n- Step 2: If you want your steak cooked just right, you ask for *à point*. The literal meaning of *à point* is \"at the point\" or \"at the exact right moment,\" implying the meat has reached its ideal state of readiness.\n+ Edge case: *À point* in France usually maps to what English speakers call \"medium rare,\" not \"medium.\" French cooking culture strongly favors meat more on the red side than American standards. If you ask for \"medium\" expecting a warm pink center, *à point* is your best bet, but it will still be quite juicy.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": true}, {"question": "When asking for the bill, you can say \"L'addition\" or \"La note.\" What is the subtle conceptual difference between an \"addition\" and a \"note\" in the context of a restaurant, and why might one be more common? (2 steps)", "answer": "- Step 1: *L'addition* literally means \"the addition\" (the mathematical sum). It emphasizes the act of adding up the prices of all the items you consumed to reach a total.\n- Step 2: *La note* literally means \"the note\" (a written record). In a restaurant, it's the written invoice of what you owe, similar to a \"bill.\" Both are completely acceptable, but *l'addition* is slightly more common in spoken restaurant contexts because it directly asks the waiter to \"do the math\" and bring the total.\n+ To ask for it politely: \"Je pourrais avoir l'addition s'il vous plaît?\" (Could I have the bill please?)", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "When making a reservation, the restaurant might ask \"A l'intérieur ou en terrasse?\" What does \"en terrasse\" imply about French dining culture, and why is it often preferred over dining inside even when the weather isn't perfect? (2 steps)", "answer": "- Step 1: *A l'intérieur* means \"inside\" (in the interior). *En terrasse* means \"on the terrace\" or outdoor patio seating.\n- Step 2: French dining culture, especially in urban areas, strongly values eating *en terrasse* because it allows people to watch the street, enjoy the sun, and participate in the public life of the city. Even if the weather is slightly cool, many Parisians will choose the terrace (often with outdoor heating) over the interior, which is seen as more private and less vibrant.\n+ If you prefer inside, you respond: \"Je préfère à l'intérieur.\"", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "French numbers from 0 to 16 each have their own unique, independent word (*zéro* to *seize*). What happens structurally at 17, and why is 16 considered the \"breakpoint\" where French shifts from unique vocabulary to a combinatorial system? (2 steps)", "answer": "- Step 1: At 17, the system breaks into combinatorial logic: *dix-sept* (ten-seven). From here on, numbers are constructed by concatenating smaller units ($$10+7$$, $$10+8$$, $$10+9$$, $$20+1$$, etc.).\n- Step 2: This breakpoint exists because early French (and its Latin/Gallic roots) only needed unique words for the most frequently used small numbers. Beyond 16, counting became an additive mental exercise rather than a memorized vocabulary list, so the language stopped inventing new words and just combined the existing ones.\n+ Contrast: English does this at 13 (thirteen = ten+three), but French holds out until 17.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": true}, {"question": "Instead of having unique words for 70, 80, and 90, French uses arithmetic combinations: $$60+10$$, $$4 \\times 20$$, and $$4 \\times 20 + 10$$. What historical system does this reflect, and why does the \"s\" on *quatre-vingts* disappear when you say 81 (*quatre-vingt-un*)? (3 steps)", "answer": "- Step 1: This reflects a vigesimal (base-20) counting system, a historical Norman/Gallic tradition where 20 was a key milestone (possibly related to counting on fingers and toes). Instead of inventing new words for 70-90, French recycled the 60 and 20 blocks.\n- Step 2: 70 is *soixante-dix* ($$60+10$$), 80 is *quatre-vingts* ($$4 \\times 20$$), and 90 is *quatre-vingts-dix* ($$4 \\times 20 + 10$$).\n- Step 3: For 81 (*quatre-vingt-un*), the \"s\" on *vingts* drops because *quatre-vingts* acts as a multiplier block ($$4 \\times 20$$). When another number is appended to it, it becomes a compound base, and French grammar dictates that such compound bases drop the plural \"s\" to signal it's a continuous count, not a plural group of twenties.\n+ Edge case: This \"s\" dropping rule applies to *quatre-vingt-un* through *quatre-vingt-dix-neuf*, but returns if you say \"des quatre-vingts\" (some 80s, pluralizing the number itself).", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "For numbers like 21, 31, 41, 51, and 61, French inserts the word *et* (and): *vingt-et-un*. But for 81, it is *quatre-vingt-un* without *et*. Why does the conjunction *et* appear in some decades but vanish in the 80s? (2 steps)", "answer": "- Step 1: For decades 20 through 60, the number 1 is attached with the conjunction *et* (and): *vingt-et-un*, *trente-et-un*, etc. This *et* acts as a linguistic bridge, treating \"1\" as a special addition to the decade block rather than a simple hyphenated compound like 22 (*vingt-deux*).\n- Step 2: In the 80s (*quatre-vingt-un*), the *et* vanishes because *quatre-vingts* is already a compound arithmetic expression ($$4 \\times 20$$), not a simple decade word like *vingt*. Adding *et* to an already complex multiplication block would be grammatically redundant, so French relies on pure hyphenation for all numbers above 80.\n+ Note: Swiss and Belgian French avoid this entirely by using *septante* (70), *octante/huitante* (80), and *nonante* (90), keeping a clean decimal system.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "While *avoir* means \"to have,\" *être* means \"to be.\" If you want to say \"We are late\" (Nous sommes en retard) versus \"We have a reservation\" (Nous avons une réservation), how do you conceptually decide which verb to use, and what categories of meaning does each verb govern? (2 steps)", "answer": "- Step 1: *Avoir* (to have) governs possession, age, and states that are \"acquired\" or \"held.\" You *have* a reservation, you *have* 25 years, you *have* a problem.\n- Step 2: *Être* (to be) governs identity, intrinsic nature, location, and states of being. You *are* late, you *are* an engineer, you *are* Vietnamese, you *are* in Paris.\n+ To decide: ask \"Is this something I possess/hold (avoir), or is this who/what/where I am (être)?\"", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "Your notes state: \"après c'est, l'adjectif est toujours masculin.\" If you are pointing at a beautiful painting (*la peinture*, a feminine noun) and say \"It's beautiful,\" why do you use the masculine form \"C'est beau\" instead of the feminine \"C'est belle\"? What is *c'est* doing grammatically that forces this? (3 steps)", "answer": "- Step 1: The rule means that after *c'est*, even if the noun referred to is feminine, the adjective takes the masculine default form (*C'est beau*, not *C'est belle*).\n- Step 2: This happens because *c'est* uses *ce*, a neutral, impersonal pronoun. It doesn't directly modify the noun; it points to an abstract concept or an entire situation. Since *ce* has no gender, the adjective defaults to the masculine, which is French's unmarked, neutral gender.\n- Step 3: Contrast this with directly modifying the noun: \"La peinture est belle.\" Here, *la peinture* is the subject, so the adjective *belle* must match its feminine gender. But if you say \"C'est beau\" (pointing to the situation of the painting), it becomes masculine.\n+ Misconception: People assume *c'est* always matches the noun it refers to. It doesn't—*c'est* creates a neutral wrapper around the idea.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "In English, we capitalize days of the week and months. In French, *lundi* and *janvier* are lowercase. Why does French not capitalize these words, and what does this reveal about how French classifies them grammatically? (2 steps)", "answer": "- Step 1: In French, days of the week (*lundi, mardi...*) and months (*janvier, février...*) are always written in lowercase, unlike English (*Monday, January*).\n- Step 2: French grammar categorizes days and months as common nouns, not proper nouns. A *lundi* is just any Monday, not a unique, named entity like a person or a country. They do not get the honor of capitalization.\n+ Exception: If the day/month is part of a specific named event or holiday (e.g., *le Nouvel An* - New Year's Day), it might be capitalized, but on a standard calendar or in a sentence, they remain lowercase.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "The seasons in French are *l'hiver, le printemps, l'été, l'automne*. Notice they all take definite articles (le/la/l'). If you want to say \"In winter,\" why do you say \"en hiver\" (dropping the article) instead of \"à l'hiver\" or \"dans l'hiver\"? (2 steps)", "answer": "- Step 1: The seasons take definite articles when standing alone (*l'hiver*) because they are specific, recurring annual periods. But when expressing \"in [season],\" French uses the preposition *en* to mean \"during.\"\n- Step 2: *En* absorbs the article entirely—you say *en hiver*, *en été*, *en automne*. You cannot say *à l'hiver* because *à* + *le* = *au*, and *au hiver* sounds clunky and violates the idiom. *En* is used for feminine seasons starting with a vowel (*en automne*, *en été*) and for *hiver* (masculine but vowel-starting) as a special phonetic exception.\n+ Edge case: For *le printemps* (masculine, consonant-starting), you use *au printemps* (*à* + *le*), because *en* cannot smoothly precede a consonant-starting masculine word here.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "French has three ways to ask \"Do you live in Spain?\": 1) Tu habites en Espagne?, 2) Est-ce que tu habites en Espagne?, 3) Habites-tu en Espagne? Rank these from most informal to most formal, and explain what grammatical signal distinguishes the inversion form from the others. (3 steps)", "answer": "- Step 1: 1) Intonation (*Tu ha
