<script>
const DATA={"selected": [{"question": "Why does French use $$on$$ in the conjugation slot alongside $$il/elle$$, and what does $$on$$ mean in practice?", "answer": "$$on$$ is an indefinite pronoun that takes the same verb conjugation as $$il/elle$$ (third-person singular). In formal/written French, it means \"one\" or \"people in general\" (e.g., $$on\\ parle\\ français\\ ici$$ = \"French is spoken here\"). In modern spoken French, it has largely replaced $$nous$$ to mean \"we\" — so $$on\\ va$$ is more natural than $$nous\\ allons$$ in casual speech. This is why textbooks group it with $$il/elle$$: grammatically singular even when the meaning is plural (\"we\"). Adjectives, however, agree with the *implied* subject — so $$on\\ est\\ contents$$ (we're happy, masc. plural) is possible even though $$on$$ is grammatically singular.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "Why does \"quatre-vingts\" have an \"s\" on \"vingts\" but \"quatre-vingt-un\" does not? Explain the rule governing the plural of \"vingt\" in numbers. (3 steps)", "answer": "- Step 1: $$Vingt$$ and $$cent$$ both follow the same plural rule: they take an \"s\" when they are multiplied by a number and NOT followed by another number. So \"quatre-vingts\" = 4 × 20 = 80, and since nothing follows, \"vingts\" gets the plural \"s.\"\n- Step 2: But when another number follows (as in 81 = quatre-vingt-un), \"vingt\" is no longer the final element — it's followed by \"un.\" In this case, the \"s\" is dropped: \"quatre-vingt-un,\" not \"quatre-vingts-un.\"\n- Step 3: The same logic applies to $$cent$$: \"deux cents\" (200) but \"deux cent un\" (201). The rule: multiply and nothing follows → plural \"s.\" Multiply but something follows → no \"s.\" This is a standard French number-orthography rule.\n\nQuick check: \"trois cents\" (300) ✓ | \"trois cent cinquante\" (350) ✓ | \"quatre-vingts\" (80) ✓ | \"quatre-vingt-deux\" (82) ✓", "source": "GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "You see three sentences: \"J'ai un chocolat,\" \"J'ai des chocolats,\" and \"J'ai du chocolat.\" What is the conceptual difference between these three, and why does French need three different article types where English just says \"I have chocolate\" or \"I have chocolates\"? (4 steps)", "answer": "- Step 1: \"J'ai un chocolat\" uses the indefinite article $$un$$ — it means \"I have one chocolate\" (a single, countable individual chocolate, like a chocolate bar or a chocolate candy). Masculine singular countable.\n- Step 2: \"J'ai des chocolats\" uses the indefinite plural article $$des$$ — it means \"I have chocolates\" (multiple countable individual chocolates). Plural countable.\n- Step 3: \"J'ai du chocolat\" uses the partitive article $$du$$ — it means \"I have (some) chocolate\" (uncountable mass — think of chocolate as a substance, like a block of chocolate or chocolate flavor). You're not counting units; you're referring to an undetermined quantity of a mass noun.\n- Step 4: English often drops the article for mass nouns (\"I have chocolate\"), but French grammatically requires an article before virtually every noun. For uncountable/mass nouns, French uses the partitive: $$du$$ (masculine), $$de\\ la$$ (feminine), $$de\\ l'$$ (before vowel). This signals \"some unspecified amount of\" the substance.\n\nKey insight: French never lets a bare noun sit without an article — every noun must wear its \"hat\" (indefinite, definite, or partitive).", "source": "GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "When making a reservation, the restaurant might ask \"A l'intérieur ou en terrasse?\" What does \"en terrasse\" imply about French dining culture, and why is it often preferred over dining inside even when the weather isn't perfect? (2 steps)", "answer": "- Step 1: *A l'intérieur* means \"inside\" (in the interior). *En terrasse* means \"on the terrace\" or outdoor patio seating.\n- Step 2: French dining culture, especially in urban areas, strongly values eating *en terrasse* because it allows people to watch the street, enjoy the sun, and participate in the public life of the city. Even if the weather is slightly cool, many Parisians will choose the terrace (often with outdoor heating) over the interior, which is seen as more private and less vibrant.\n+ If you prefer inside, you respond: \"Je préfère à l'intérieur.\"", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "Misconception probe: A learner writes \"Je n'ai pas une réservation\" instead of \"Je n'ai pas de réservation.\" Why is this wrong, and what rule is being violated? (2 steps)", "answer": "- Step 1: After negation (ne … pas), the indefinite articles un/une/des and partitive articles du/de la all reduce to **de** (or d' before a vowel). \"J'ai une réservation\" → \"Je n'ai pas **de** réservation.\" Writing \"pas une\" violates this rule.\n- Step 2: The conceptual reason: \"une réservation\" specifies exactly one reservation — but negation (\"I don't have\") removes that specificity. When you say you don't have something, you're saying you have zero — and zero erases the need for gender and number marking. \"De\" becomes the universal \"any\" — \"I don't have any reservation.\" The only exception is emphatic contrast: \"Je n'ai pas une réservation, j'en ai deux!\" (I don't have one reservation, I have two!) — but this is rare and rhetorical.\n\n+ This same error would produce: *Je n'ai pas des chocolats* (wrong) → Je n'ai pas de chocolats (correct). *Il n'y a pas du café* (wrong) → Il n'y a pas de café (correct).", "source": "GLM 5.1 ②", "_id": "glm_2_54"}, {"question": "What is the CEFR, who defines it, and why does it use \"can-do\" descriptors instead of fixed hour requirements? (3 steps)", "answer": "- Step 1: CEFR = Common European Framework of Reference for Languages. It's defined by the **Council of Europe** and standardizes language ability across A1 (beginner) to C2 (mastery).\n- Step 2: It uses **can-do descriptors** — statements like \"can introduce oneself,\" \"can defend an opinion\" — instead of grammar checklists or hour quotas. This is because real language competence varies by learner background, native language, motivation, and study quality.\n- Step 3: Why this matters practically: there's no \"official\" answer to \"how many hours to reach B2.\" Schools estimate hours, but the actual gate is whether you can perform the can-do tasks reliably. Time-to-level depends on input quality, not just clock time.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "What are the three ways to form a yes/no question in French, and when is each used? (3 steps)", "answer": "- Step 1: **Intonation** — keep the statement, raise voice at the end. *Tu habites en Espagne?* This is the most casual, used in everyday speech.\n- Step 2: **Est-ce que** — add *est-ce que* at the start. *Est-ce que tu habites en Espagne?* Neutral register, works in both speech and writing. Very common.\n- Step 3: **Inversion** — swap verb and pronoun, joined by a hyphen. *Habites-tu en Espagne?* This is formal, mostly written, or used in polished speech. In professional or written contexts, inversion signals respect/care.\n\nMental model: intonation = casual, *est-ce que* = neutral, inversion = formal.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "What CEFR level is required for French naturalization/citizenship, and what level for a carte de séjour pluriannuelle? Why does the roadmap emphasize B2 as the key target? (3 steps)", "answer": "- Step 1: For French naturalization/nationality, Service-Public states the required level is B2 CEFR, both oral and written. This is a high bar — you must be able to argue, defend opinions, and understand complex content. For a carte de séjour pluriannuelle (multi-year residence permit), only A2 is required.\n- Step 2: The full admin ladder: A2 for pluriannuelle residence permit, B1 for carte de résident (long-term resident card), B2 for naturalization. Each step up requires substantially more hours of study.\n- Step 3: B2 is emphasized as the key target because it unlocks both naturalization AND higher education. Campus France states B2 is the minimum for most French universities, with C1 strongly recommended for humanities/social sciences. B2 is where French becomes genuinely useful for professional and civic life — it's the threshold of \"independent user\" becoming \"competent user.\"\n\nA2 = survival residence permit. B1 = long-term residence. B2 = citizenship + university. B2 is the practical target for serious learners.", "source": "GLM 5.1 ①", "_id": "glm_1_41"}, {"question": "In the reservation dialogue, the client says the time \"à 19h30\" and then clarifies \"à sept heures et demi.\" Explain the French time-telling system: what does \"19h30\" mean, and why is \"et demi\" used? Also, what's the pattern for half-past the hour? (3 steps)", "answer": "- Step 1: \"19h30\" is the 24-hour format, standard in France for written/scheduled times. It means 19:30, i.e., 7:30 PM. In France, schedules, train times, and restaurant reservations use the 24-hour clock.\n- Step 2: \"Sept heures et demi\" is the spoken version — 7 hours and a half. $$Et\\ demi$$ = \"and a half\" (from $$demi$$ = half). So any half-past time is: [hour] + heures + et demi. \"Trois heures et demi\" = 3:30, \"neuf heures et demi\" = 9:30.\n- Step 3: Note: \"demi\" agrees in gender when it's an adjective before a noun (\"une demi-heure\" = a half hour), but after \"heures\" in time-telling, it stays as the invariable \"et demi.\" Also, for noon/midnight: \"midi et demi\" (12:30 PM), \"minuit et demi\" (12:30 AM) — no \"heures\" needed.\n\n24-hour for writing/schedules, 12-hour for casual speech, \"et demi\" for all half-past times.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "You see \"une carafe d'eau\" in the lesson. Is \"carafe\" masculine or feminine, and why is it \"d'eau\" rather than \"de l'eau\"? How does this connect to the quantity + de rule? (3 steps)", "answer": "- Step 1: \"Carafe\" is feminine — \"une carafe.\" It means \"carafe\" or \"jug\" (a glass container for serving water/wine at the table).\n- Step 2: It's \"d'eau\" (de + eau, elided because eau starts with a vowel) rather than \"de l'eau\" because of the quantity rule: after a quantity/measurement noun, you use \"de\" without the definite article. \"Une carafe d'eau\" = \"a carafe of water\" — the carafe is the quantity measure, and \"de\" connects it to the substance.\n- Step 3: Compare: \"de l'eau\" alone = \"some water\" (partitive article, no quantity noun). But \"une carafe d'eau\" = \"a carafe of water\" (quantity noun + de + substance). The difference is whether a quantity/measurement noun precedes the substance. \"Un verre d'eau\" (a glass of water), \"une bouteille d'eau\" (a bottle of water), \"une carafe d'eau\" — all follow the same pattern.\n\nQuantity noun + de + substance (no article). Partitive alone = de l'/du/de la + substance. Different structures, different rules.", "source": "GLM 5.1 ①", "_id": "glm_1_45"}, {"question": "When doing inversion with a verb ending in a vowel and a subject pronoun starting with a vowel (e.g., *Aime-il?*), French inserts a \"t\" to break the clash: *Aime-t-il*. Why is this phonetic \"t\" necessary, and what does it reveal about French pronunciation priorities? (2 steps)", "answer": "- Step 1: If the verb ends in a vowel (*aime*) and the subject pronoun starts with a vowel (*il*), you get a phonetic clash: *aime-il* would sound like a stuttering, blurred mess of vowels running together.\n- Step 2: French pronunciation demands smooth transitions and hates consecutive vowels (hiatus). To break the collision, a phonetic \"t\" is artificially inserted between the verb and the pronoun: *Aime-t-il*. This \"t\" has no grammatical meaning—it is purely a phonetic lubricant to make the sentence flow smoothly.\n+ This most commonly appears with -er verbs (whose forms end in 'e') and verbs like *a* (A-t-il?) or *est* (Est-il? uses the existing 't' in 'est').", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "While *avoir* means \"to have,\" *être* means \"to be.\" If you want to say \"We are late\" (Nous sommes en retard) versus \"We have a reservation\" (Nous avons une réservation), how do you conceptually decide which verb to use, and what categories of meaning does each verb govern? (2 steps)", "answer": "- Step 1: *Avoir* (to have) governs possession, age, and states that are \"acquired\" or \"held.\" You *have* a reservation, you *have* 25 years, you *have* a problem.\n- Step 2: *Être* (to be) governs identity, intrinsic nature, location, and states of being. You *are* late, you *are* an engineer, you *are* Vietnamese, you *are* in Paris.\n+ To decide: ask \"Is this something I possess/hold (avoir), or is this who/what/where I am (être)?\"", "source": "GLM 5.1 ③", "_id": "glm_3_13"}, {"question": "Among the seven scenarios in the roadmap (S1–S7), why is S3 recommended as the \"best balanced\" path for A1→B2 within ~2 years?", "answer": "S3 combines 2 lessons/week (the standard school load) + 1 hour of post-lesson review + 20 minutes of daily practice. This stacks three independent reinforcement mechanisms: the lessons provide new input, the review consolidates what was just taught, and daily practice (vocab/listening) maintains and extends retention. The total effective weekly hours reach a threshold where progress is sustainable without burnout. S3 reaches B2 in ~1.9 years — much faster than school-only (4.6 years) but not as demanding as S7 (1.4 years with 3 lessons/week). It balances time investment against life constraints, making it the sustainable sweet spot.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Conjugate *être* (to be) in the present tense, positive and negative.", "answer": "- Step 1: Positive forms:\n+ *je suis, tu es, il/elle/on est, nous sommes, vous êtes, ils/elles sont*\n- Step 2: Negative forms (wrap each with *ne ... pas*):\n+ *je ne suis pas, tu n'es pas, il/elle/on n'est pas, nous ne sommes pas, vous n'êtes pas, ils/elles ne sont pas*\n- Step 3: Notice *ne* elides to *n'* before vowels (*n'es, n'est, n'êtes, n'ont*) — French avoids vowel-vowel collisions across words for fluency.\n\n*Être* is irregular and the most-used verb in French — memorize all six forms cold.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "Instead of having unique words for 70, 80, and 90, French uses arithmetic combinations: $$60+10$$, $$4 \\times 20$$, and $$4 \\times 20 + 10$$. What historical system does this reflect, and why does the \"s\" on *quatre-vingts* disappear when you say 81 (*quatre-vingt-un*)? (3 steps)", "answer": "- Step 1: This reflects a vigesimal (base-20) counting system, a historical Norman/Gallic tradition where 20 was a key milestone (possibly related to counting on fingers and toes). Instead of inventing new words for 70-90, French recycled the 60 and 20 blocks.\n- Step 2: 70 is *soixante-dix* ($$60+10$$), 80 is *quatre-vingts* ($$4 \\times 20$$), and 90 is *quatre-vingts-dix* ($$4 \\times 20 + 10$$).\n- Step 3: For 81 (*quatre-vingt-un*), the \"s\" on *vingts* drops because *quatre-vingts* acts as a multiplier block ($$4 \\times 20$$). When another number is appended to it, it becomes a compound base, and French grammar dictates that such compound bases drop the plural \"s\" to signal it's a continuous count, not a plural group of twenties.\n+ Edge case: This \"s\" dropping rule applies to *quatre-vingt-un* through *quatre-vingt-dix-neuf*, but returns if you say \"des quatre-vingts\" (some 80s, pluralizing the number itself).", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "You are ordering at a restaurant. You want \"some water\" (uncountable) and \"a croque-monsieur\" (countable, one item). Which articles do you use for each: *un/une/des* or *du/de la/de l'/des*? (2 steps)", "answer": "- Step 1: For \"some water\": *eau* is feminine and starts with a vowel. Since water is an uncountable mass, you need the partitive article. *De la* becomes *de l'* before a vowel, so you say *de l'eau*.\n- Step 2: For \"a croque-monsieur\": *croque-monsieur* is a countable, discrete item. You want exactly one. Since it's masculine, you use the indefinite article *un*, so you say *un croque-monsieur*.\n+ If you wanted \"some croque-monsieurs\" (plural, countable), you would use *des croque-monsieurs*. If you wanted \"some coffee\" (uncountable, masculine), you would use *du café*.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "When ordering in a French restaurant, you rarely say \"I want\" (*Je veux*). Instead, you use conditional or future-based phrases. Why is \"Je voudrais\" (I would like) or \"Je vais prendre\" (I am going to take) culturally preferred, and what does this reveal about French politeness norms? (3 steps)", "answer": "- Step 1: \"Je veux\" (I want) is grammatically correct but socially blunt. It sounds like a demand or a child's request, which is considered rude in a French service context.\n- Step 2: \"Je voudrais\" (I would like) uses the conditional mood, which softens the desire into a polite hypothesis. \"Je vais prendre\" (I am going to take) uses the near future, phrasing the choice as a gentle intention rather than a direct command.\n- Step 3: French politeness relies on attenuating direct assertions. By framing your desire as a preference (*j'aimerais*) or a future action (*prendre*), you respect the server's agency and maintain a civilized distance.\n+ \"Je pourrais avoir\" (Could I have) is another conditional form that maximizes politeness by asking for possibility rather than demanding fulfillment.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "Conjugate the verb $$avoir$$ (\"to have\") in the present tense for all six persons, and identify any spelling quirks. (2 steps)", "answer": "- Step 1: The forms are: $$j'ai,\\ tu\\ as,\\ il/elle/on\\ a,\\ nous\\ avons,\\ vous\\ avez,\\ ils/elles\\ ont$$.\n- Step 2: Note the irregularities:\n+ $$je$$ becomes $$j'$$ before the vowel in $$ai$$ (elision).\n+ The third-person plural $$ont$$ looks unlike the singular $$a$$ — this is a hallmark of irregular verbs.\n+ Pronunciation: $$ils\\ ont$$ liaisons as \"il-z-on\", distinguishing it from $$ils\\ sont$$ (\"they are\").\n\nTakeaway: $$avoir$$ is one of the most irregular and frequent French verbs — memorise it as a unit, not by pattern.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "A waiter says $$Avez-vous fait votre choix?$$ — what does this literally mean, and what's $$avoir$$ doing here grammatically?", "answer": "Literally: \"Have you made your choice?\" — equivalent to \"Are you ready to order?\" Grammatically, this is the **passé composé** (compound past), formed with auxiliary $$avoir$$ (\"to have\") + past participle ($$fait$$ from $$faire$$, \"to do/make\"). This is the same structure as English \"I have eaten\" — but French uses it much more broadly to express any completed past action. The inversion $$avez-vous$$ marks it as a formal question. Note: the auxiliary $$avoir$$ vs $$être$$ choice is one of the trickiest parts of past tense for A1→A2 learners; most verbs use $$avoir$$, but movement/state-change verbs (and all reflexives) use $$être$$.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "The question word \"Est-ce que\" is added to the front of a statement to turn it into a question. What is the literal, historical meaning of \"Est-ce que,\" and why does it act as an unchanging \"question flag\" regardless of the subject or verb that follows? (2 steps)", "answer": "- Step 1: *Est-ce que* literally breaks down to \"Is it that...\" (*Est* = is, *ce* = it, *que* = that). Historically, asking a question meant asking \"Is it true that [statement]?\" So \"Est-ce que tu habites en Espagne?\" literally means \"Is it that you live in Spain?\"\n- Step 2: Over time, *est-ce que* fossilized into an unchanging grammatical unit. You never conjugate the *est* to match the main verb. It always stays *est-ce que* (or *est-ce qu'* before a vowel), acting purely as a question-triggering prefix that leaves the original sentence completely intact.\n+ It is the most versatile question form because it requires no complex grammar (no inversion) and works for any subject or verb.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "The roadmap distinguishes \"guided hours\" from \"passive background exposure.\" Why is watching a French Netflix show not counted the same as a structured 90-minute lesson, and what must you actively do during listening for it to count as guided learning? (2 steps)", "answer": "- Step 1: Passive exposure (watching Netflix, listening to music) builds familiarity and intuition, but it doesn't force your brain to retrieve structures or produce output. You can understand a show without being able to speak a word of French yourself.\n- Step 2: Guided hours require active cognitive engagement: deliberate recall, error correction, structured output (writing/speaking), and comprehension exercises with feedback. For passive listening to count towards guided learning, you must actively do something with it—shadowing (repeating aloud), noting vocabulary, answering comprehension questions, or pausing to parse grammar.\n+ Casual scrolling is a bonus, not a core hour. It helps immersion but does not build reliable output skill on its own.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "Why is the CEFR framework defined by \"can-do\" descriptors rather than fixed hour quotas? (3 steps)", "answer": "- Step 1: The Council of Europe designed the CEFR (Common European Framework of Reference) to be *outcome-based*: levels A1, A2, B1, B2, C1, C2 describe what a learner CAN DO with the language, not how long they studied.\n- Step 2: This is intentional because learning speed varies massively across individuals:\n+ Prior language exposure (e.g., a Spanish speaker learns French faster than a Vietnamese speaker).\n+ Learning environment (immersion vs. classroom).\n+ Quality of teaching, practice intensity, motivation.\n- Step 3: As a result, hour estimates exist only as planning heuristics from schools (like Campus Langues: A1→A2 ≈ 100–120h) — not official CEFR rules. Two learners can both be \"B1\" with vastly different total hours invested.\n\nTakeaway: CEFR measures competence, not time spent — hours are planning estimates, never definitions.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "Scenario S3 (2 lessons/week + review + 20 min/day) takes ~1.9 years to reach B2, while school-only (2 lessons/week) takes ~4.6 years. Conceptually, why does a small daily habit (20 min) slash the total timeline by more than half, and what cognitive mechanism does daily practice leverage? (3 steps)", "answer": "- Step 1: School-only (3h/week) takes ~4.6 years because the spacing between lessons is too wide. The brain forgets a large portion of what was learned before the next lesson, creating a constant re-learning loop.\n- Step 2: Scenario S3 adds just 20 minutes of daily practice. Daily practice leverages the \"spacing effect\" and \"retrieval practice\"—forcing the brain to recall newly learned items right at the edge of forgetting, which is the optimal moment for memory consolidation.\n- Step 3: By preventing the decay that happens between weekly lessons, 20 minutes/day slashes the total time by over half. You spend less total time re-learning forgotten material and more time advancing to new material.\n+ This proves that frequency of exposure beats duration of exposure. Small, daily doses are far more efficient than large, weekly blocks.", "source": "GLM 5.1 ③", "_id": "glm_3_23"}, {"question": "In the CEFR roadmap, what is the \"exam-ready\" hour estimate for each transition (A1→A2, A2→B1, B1→B2), and why is a 20% buffer added on top of the core estimates? (3 steps)", "answer": "- Step 1: The exam-ready estimates are: A1→A2 = 132 hours, A2→B1 = 228 hours, B1→B2 = 270 hours, totaling 630 hours for A1→B2. These are derived from Campus Langues FLE estimates (100-120h, 180-200h, 200-250h respectively), taking the midpoint and adding 20%.\n- Step 2: The 20% buffer exists because \"finishing a course unit\" ≠ \"being exam-ready.\" Course completion means you've been exposed to the material. Exam readiness means you can reliably perform under test conditions across all four skills (reading, writing, listening, speaking). The gap between passive recognition and active, reliable output is significant — especially at B2, where you must defend opinions and argue with fluency.\n- Step 3: The calculation: A1→A2 midpoint = 110h, + 20% = 132h. A2→B1 midpoint = 190h, + 20% = 228h. B1→B2 midpoint = 225h, + 20% = 270h. This buffer accounts for revision, weak-skill remediation, exam technique practice, and the reality that most learners don't retain 100% of what they study.\n\nExposure ≠ mastery. The 20% buffer bridges the gap between \"I covered this in class\" and \"I can reliably demonstrate this on a DELF exam.\"", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "In the restaurant dialogue, the server asks \"A l'intérieur ou en terrasse?\" What do \"à l'intérieur\" and \"en terrasse\" mean, and why does one use \"à\" and the other \"en\"? (3 steps)", "answer": "- Step 1: \"À l'intérieur\" = inside (literally \"at the interior\"). \"En terrasse\" = on the terrace/outside seating (literally \"in terrace\"). The server is asking: \"Inside or on the terrace?\"\n- Step 2: \"À l'intérieur\" uses $$à$$ + definite article (à + le = au, à + la = à la, à + l' = à l') — this is the standard preposition for physical location \"at/in.\" \"L'intérieur\" is a masculine noun starting with a vowel, so \"à l'intérieur.\"\n- Step 3: \"En terrasse\" uses $$en$$ — a preposition meaning \"in\" that's used with feminine nouns without an article when expressing a state or location. \"En terrasse\" is almost a fixed expression. You could also say \"sur la terrasse\" (on the terrace), but \"en terrasse\" is the idiomatic restaurant phrase. \"En\" often appears in set phrases: \"en ville\" (in town), \"en vacances\" (on holiday), \"en réunion\" (in a meeting).\n\n\"En terrasse\" = the standard restaurant phrase for outdoor seating. \"Sur la terrasse\" = also correct but less idiomatic in this context.", "source": "GLM 5.1 ①", "_id": "glm_1_29"}, {"question": "In French, numbers 21, 31, 41, 51, and 61 all use the conjunction \"et\" (and) between the tens word and \"un.\" But 71 does NOT follow this pattern. What is 71, and why is it different? (3 steps)", "answer": "- Step 1: The \"et-un\" pattern: $$vingt-et-un$$ (21), $$trente-et-un$$ (31), $$quarante-et-un$$ (41), $$cinquante-et-un$$ (51), $$soixante-et-un$$ (61). The \"et\" (and) links the tens word to \"un\" — it's the only compound unit that uses \"et\" instead of a hyphen.\n- Step 2: For 71, French does not say *soixante-dix-et-un*. Instead, 71 = $$soixante-et-onze$$ (sixty-and-eleven). The logic: since 70 = soixante-dix (sixty-ten), 71 is calculated as 60 + 11, not 70 + 1. So the \"unit\" added to soixante is onze, not un.\n- Step 3: The \"et\" in \"soixante-et-onze\" connects 60 and 11 — it is NOT the same \"et-un\" pattern. It's a unique exception. From 72 onward, it's hyphenated composition: soixante-douze (60+12), soixante-treize (60+13), etc.\n\n+ Why no \"et-un\" for 71? Because the base is 60, not 70. You're adding eleven to sixty, not one to seventy. The \"et-un\" pattern only applies when you're adding exactly 1 to a round tens number (20, 30, 40, 50, 60).\n+ Similarly: 81 = quatre-vingt-un (no \"et\"), 91 = quatre-vingt-onze (not quatre-vingt-dix-un).", "source": "GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "Your notes state: \"après c'est, l'adjectif est toujours masculin.\" If you are pointing at a beautiful painting (*la peinture*, a feminine noun) and say \"It's beautiful,\" why do you use the masculine form \"C'est beau\" instead of the feminine \"C'est belle\"? What is *c'est* doing grammatically that forces this? (3 steps)", "answer": "- Step 1: The rule means that after *c'est*, even if the noun referred to is feminine, the adjective takes the masculine default form (*C'est beau*, not *C'est belle*).\n- Step 2: This happens because *c'est* uses *ce*, a neutral, impersonal pronoun. It doesn't directly modify the noun; it points to an abstract concept or an entire situation. Since *ce* has no gender, the adjective defaults to the masculine, which is French's unmarked, neutral gender.\n- Step 3: Contrast this with directly modifying the noun: \"La peinture est belle.\" Here, *la peinture* is the subject, so the adjective *belle* must match its feminine gender. But if you say \"C'est beau\" (pointing to the situation of the painting), it becomes masculine.\n+ Misconception: People assume *c'est* always matches the noun it refers to. It doesn't—*c'est* creates a neutral wrapper around the idea.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "The notes list \"Qu'est-ce qu'il y a dans…\" as a way to ask \"What is there in…\" What's the structure of \"il y a,\" and why does \"que\" become \"qu'\" before \"il\"? (3 steps)", "answer": "- Step 1: \"Il y a\" = \"there is / there are\" — a fixed expression from il (impersonal) + y (there) + a (has, from AVOIR). \"Qu'est-ce qu'il y a dans [X]?\" = \"What is there in [X]?\" — asking about the contents of something.\n- Step 2: The \"qu'\" in \"qu'il\" is an elision of \"que.\" When \"que\" is followed by a word beginning with a vowel or silent h, it contracts to \"qu'.\" Since \"il\" starts with a vowel, \"que il\" → \"qu'il.\" This is the same elision rule as \"je ai\" → \"j'ai\" and \"ne ai\" → \"n'ai.\"\n- Step 3: The full breakdown: \"Qu'est-ce qu'il y a dans la salade niçoise?\" = \"What is it that there is in the salade niçoise?\" = \"What's in the salade niçoise?\" The structure nests \"est-ce que\" inside \"que…,\" creating a double-question marker that's standard in French but feels redundant in English translation.\n\n\"Que\" + vowel → \"qu'.\" This elision rule is universal in French: whenever a short function word ending in \"e\" meets a vowel-starting word, the \"e\" drops and an apostrophe replaces it.", "source": "GLM 5.1 ①", "_id": "glm_1_59"}, {"question": "When does the indefinite article $$un/une$$ become $$de$$ after $$il\\ y\\ a$$ in negation? Apply to \"There is no problem.\" (2 steps)", "answer": "- Step 1: The same rule as with $$avoir$$ applies to $$il\\ y\\ a$$: after negation, indefinite/partitive articles collapse to $$de$$.\n- Step 2: $$Il\\ y\\ a\\ un\\ problème$$ → $$Il\\ n'y\\ a\\ pas\\ de\\ problème$$ (\"There is no problem\").\n+ Notice $$n'$$ before $$y$$ (elision of $$ne$$ before the vowel sound of $$y$$).\n+ $$un$$ → $$de$$ because the negation zeroes the quantity.\n\nTakeaway: The negation-article rule is general — wherever a count/partitive article appears under negation, it collapses to $$de$$.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "What is the Qualité FLE label, and why does the roadmap recommend preferring schools that have it? (2 steps)", "answer": "- Step 1: The $$Qualité\\;FLE$$ label is an official quality guarantee initiated by three French ministries (Education, Higher Education, Foreign Affairs) to identify and promote French language centres whose teaching and services meet quality standards. It is the closest thing to an official accreditation for French language schools in France.\n- Step 2: The roadmap recommends it because paying for a school without quality assurance is risky — unregulated schools may lack CEFR alignment, placement testing, teacher feedback, attendance structure, or qualified instructors. Apps and casual tutors can supplement, but they should not replace a structured school if the target is B2 evidence (like a DELF diploma).\n\n+ Practical rule from the roadmap: when choosing a school, look for CEFR-aligned programme, placement testing, teacher feedback, attendance structure, and ideally Qualité FLE recognition. Ask before enrolling.", "source": "GLM 5.1 ②", "_id": "glm_2_41"}, {"question": "French numbers 0-16 each have a unique single word, but 17-19 are compound. Where does the pattern shift, and why? Also, what's the pattern from 17-19? (3 steps)", "answer": "- Step 1: The unique words are: zéro (0), un (1), deux (2), trois (3), quatre (4), cinq (5), six (6), sept (7), huit (8), neuf (9), dix (10), onze (11), douze (12), treize (13), quatorze (14), quinze (15), seize (16). That's 17 unique words for 0-16.\n- Step 2: Starting at 17, the pattern becomes compound: 17 = dix-sept (ten-seven), 18 = dix-huit (ten-eight), 19 = dix-neuf (ten-nine). These are literally \"ten + [7/8/9]\" — a transparent compound. The shift happens because Old French had unique words only up to 16, inherited from Latin, and then switched to the compound system.\n- Step 3: This pattern recurs at 70+ (soixante-dix = sixty-ten for 70) and 90+ (quatre-vingt-dix = four-twenty-ten for 90). French consistently uses additive compounds when it runs out of unique base words. The 17-19 pattern is the simplest example of this principle.\n\n0-16 = unique words. 17-19 = dix + unit. The same compounding logic extends throughout the number system.", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "In the notes, it says \"après c'est, l'adjectif est toujours masculin: c'est beau.\" Why does the adjective after \"c'est\" always stay masculine, even when referring to something feminine? (2 steps)", "answer": "- Step 1: The construction **c'est + adjective** is an **impersonal** structure. The \"ce\" in \"c'est\" is a neutral demonstrative pronoun — it doesn't carry gender. It means \"it/that\" in a general, abstract sense. Because the pronoun \"ce\" is grammatically neuter/masculine by default, the adjective that follows does not agree with any specific feminine noun. So you say $$c'est\\;beau$$ (it's beautiful) regardless of whether you're looking at a painting (masculine) or a sculpture (feminine).\n- Step 2: Contrast this with **subject + être + adjective**, where the adjective MUST agree with the subject: \"La réunion est urgente\" (feminine), \"Le projet est urgent\" (masculine). The difference is structural: \"c'est\" is an impersonal dummy subject, while \"la réunion est\" has a specific gendered subject.\n\n+ If you want to specify and agree, you use the noun: \"C'est une belle sculpture\" (beautiful sculpture — belle agrees with sculpture). But \"C'est beau\" as a standalone reaction stays masculine.\n+ Edge case: \"C'est facile,\" \"C'est bon,\" \"C'est vrai\" — all masculine default, all the time after c'est.", "source": "GLM 5.1 ②", "_id": "glm_2_6"}, {"question": "What does \"Qu'est-ce que c'est…?\" mean, and why does it look so complex? Break it down component by component. (3 steps)", "answer": "- Step 1: \"Qu'est-ce que c'est?\" = \"What is this/that?\" or \"What is it?\" It's the standard way to ask \"what is\" something in French.\n- Step 2: Component breakdown: $$Que$$ (what) + $$est$$ (is) + $$ce$$ (it/that) + $$que$$ (that) + $$c'$$ (it) + $$est$$ (is). Literally: \"What is it that it is?\" — a double embedding that feels redundant in English but is perfectly natural in French.\n- Step 3: The pronunciation collapses this long string: \"Qu'est-ce que c'est\" → /kɛs kə sɛ/ — often further reduced to \"keske sè\" in rapid speech. This is why learners hear a short blur and don't realize it's a six-word construction. For asking about a specific noun: \"Qu'est-ce que c'est, la salade niçoise?\" = \"What is the salade niçoise?\"\n\nIn casual speech, you might hear just \"C'est quoi?\" (It's what?) — much simpler but less formal. \"Qu'est-ce que c'est\" is the standard version.", "source": "GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "A common A1 confusion: when should you use \"c'est\" vs. \"il/elle est\" to describe something? Given the rule from Phuc's homework, explain the difference with examples. (3 steps)", "answer": "- Step 1: $$C'est$$ + [adjective alone] or [noun with article] = \"It's/That's…\" Used for identifying, pointing out, or emphasizing. After \"c'est,\" adjectives are ALWAYS masculine: \"C'est beau\" (It's beautiful), \"C'est bon\" (It's good) — regardless of the gender of the thing being described.\n- Step 2: $$Il/elle\\ est$$ + [adjective] = \"He/she/it is…\" Used when the subject is a specific noun with known gender. The adjective agrees: \"La ville est belle\" (The city is beautiful — feminine), \"Le film est bon\" (The film is good — masculine).\n- Step 3: The key test: can you replace the subject with a pronoun? If you're pointing something out (\"It's beautiful!\"), use \"c'est.\" If you're describing a previously mentioned noun (\"The city? It's beautiful.\"), use \"elle est belle.\" + \"C'est une belle ville\" = \"It's a beautiful city\" (c'est + noun phrase, adjective agrees with \"ville\"). + \"Elle est belle, cette ville\" = \"It's beautiful, this city\" (elle = la ville, adjective agrees).\n\n\"C'est + adjective alone\" → always masculine. \"Il/elle est + adjective\" → agrees with subject gender. When in doubt, \"c'est\" for identification, \"il/elle est\" for description of a known subject.", "source": "GLM 5.1 ①", "_id": "glm_1_66"}, {"question": "What's the conceptual difference between $$des$$ (plural indefinite) and $$des$$ (plural partitive)? Why does French use the same form for both? (2 steps)", "answer": "- Step 1: Plural indefinite $$des$$ = \"some [countable items]\" — e.g., $$des\\ chocolats$$ = some chocolates (multiple discrete units).\n- Step 2: Plural partitive $$des$$ = \"some of [an uncountable thing in plural form]\" — but in practice these merge because in plural, the distinction between \"a few units\" and \"some portion\" dissolves.\n+ This is why textbooks often just list $$un/une/des$$ as indefinite and $$du/de\\ la/des$$ as partitive — $$des$$ appears in both lists with the same form.\n\nTakeaway: $$des$$ is the universal \"some\" plural marker — French doesn't bother splitting it further.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "The notes show \"une entrecôte saignante\" but also \"le saumon grillé.\" Why is \"grillé\" not \"grillée\" even though \"saumon\" is the thing being described? What gender is \"saumon\"? (3 steps)", "answer": "- Step 1: \"Saumon\" (salmon) is a masculine noun — \"le saumon.\" Therefore, the adjective \"grillé\" is in its masculine form. If the noun were feminine, the adjective would be \"grillée\": \"une truite grillée\" (a grilled trout, since \"truite\" is feminine).\n- Step 2: The adjective \"grillé\" (grilled) comes from the past participle of GRILLER (to grill). When used as an adjective, it agrees in gender and number with the noun it modifies: \"un steak grillé\" (masc. sing.), \"une entrecôte grillée\" (fem. sing.), \"des légumes grillés\" (plural).\n- Step 3: Compare with \"saignante\" from \"une entrecôte saignante\" — \"entrecôte\" is feminine, so the adjective is feminine (\"saignante\" not \"saignant\"). The gender of the FOOD doesn't determine the adjective — the grammatical gender of the NOUN does. \"Saumon\" is masculine even though it's the same type of food as the feminine \"entrecôte.\"\n\nGrammatical gender ≠ biological category. \"Saumon\" (masc.) and \"entrecôte\" (fem.) are both meat/fish, but their grammatical genders differ, and adjectives must follow the grammar.", "source": "GLM 5.1 ①", "_id": "glm_1_72"}, {"question": "In the self-introduction dialogue, \"J'habite à Paris\" uses \"à\" before a city name. What preposition would you use before a country name, and why? (2 steps)", "answer": "- Step 1: Before **cities**, French uses $$à$$: \"J'habite à Paris,\" \"J'habite à Lyon.\" This is simple — always \"à\" for cities, regardless of gender.\n- Step 2: Before **countries**, the preposition depends on the country's grammatical gender: feminine countries take $$en$$ (en France, en Espagne, en Italie), masculine countries starting with a consonant take $$au$$ (au Japon, au Canada, au Vietnam), and masculine countries starting with a vowel take $$en$$ (en Iran, en Irak). Plural countries take $$aux$$ (aux États-Unis, aux Pays-Bas).\n\n+ Vietnam is masculine (le Vietnam), so: \"J'habite au Vietnam\" (not *en Vietnam*). But \"Je suis vietnamien\" (nationality, no article needed).\n+ France is feminine (la France), so: \"J'habite en France\" (not *à la France*).", "source": "GLM 5.1 ②", "_id": "glm_2_51"}, {"question": "At a French restaurant, the server asks \"Quelle cuisson pour la viande, Monsieur?\" What are the four levels of meat cooking, and what does each actually mean in terms of how the meat is cooked? (2 steps)", "answer": "- Step 1: The four levels, from least to most cooked: $$bleu$$ (very rare — seared on the outside, almost raw inside, red and cool in the centre), $$saignant$$ (rare — red and warm in the centre, more seared than bleu), $$à\\;point$$ (medium rare — pink in the centre, the French standard \"perfect\" cook), $$bien\\;cuit$$ (well done — no pink, fully cooked through, considered overcooked by French steak standards).\n- Step 2: Important cultural note: there is no exact French equivalent for the American \"medium\" or \"medium well.\" \"À point\" is the closest to medium-rare and is the default expectation in France. Ordering \"bien cuit\" may get you a slightly disappointed look from the server, as French culinary culture values juiciness. Also note: \"saignant\" literally means \"bleeding\" — the name tells you what the meat looks like.\n\n+ Misconception: \"à point\" does NOT mean \"well done\" — it means \"to the point\" (i.e., just right). If you want well done, you must say \"bien cuit.\"", "source": "GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "The lesson shows \"Souhaitez-vous une bouteille d'eau gazeuse ou d'eau plate?\" Why is it \"d'eau\" both times (not \"de l'eau\"), and what does the \"ou\" do? (3 steps)", "answer": "- Step 1: \"D'eau\" appears after \"bouteille de\" — the quantity noun rule. \"Une bouteille d'eau gazeuse\" = a bottle of sparkling water. \"D'eau\" = de + eau (elided), following the pattern: quantity noun + de + substance. Since \"bouteille\" is the quantity measure, \"de\" (not the partitive \"de l'\") is used.\n- Step 2: The \"ou\" = \"or\" — presenting a choice between two alternatives. \"Eau gazeuse ou eau plate?\" = \"Sparkling water or still water?\" The server is offering a choice between the two types.\n- Step 3: Notice: \"d'eau gazeuse ou d'eau plate\" — the \"d'\" is repeated before each type. This is because each \"d'eau\" connects back to \"une bouteille de\": \"une bouteille d'eau gazeuse ou [une bouteille d']eau plate.\" The second \"bouteille de\" is elided but implied. Both types are options for the same bottle.\n\nQuantity noun + de + substance. \"Ou\" = or. The \"d'eau\" repetition is because each option independently follows the \"bouteille de\" structure.", "source": "GLM 5.1 ①", "_id": "glm_1_76"}, {"question": "If you say \"J'ai un saumon grillé\" versus \"J'ai du saumon grillé,\" what is the conceptual difference in what you possess? How does the partitive article (*du*) function differently from the indefinite (*un*) when dealing with food? (3 steps)", "answer": "- Step 1: \"J'ai un saumon grillé\" uses *un* (an indefinite article). This means you have one discrete, countable, whole item: one entire grilled salmon fish.\n- Step 2: \"J'ai du saumon grillé\" uses *du* (a partitive article, contraction of *de + le*). This means you have an unspecified quantity of an uncountable mass: some portion of grilled salmon (e.g., a slice or a piece on your plate).\n- Step 3: The partitive article (*du, de la, de l', des*) exists specifically because in French, you cannot just say \"J'ai saumon\"—nouns demand articles. Since you can't count salmon as \"one\" or \"two\" when it's a mass, you use the partitive to say \"some of that mass.\"\n+ Edge case: \"J'ai des chocolats\" (countable plural) vs \"J'ai du chocolat\" (uncountable mass chocolate). Both mean \"some,\" but *des* is for countable plural items, while *du* is for uncountable masses.\n\nTakeaway: *Un/une* = countable whole items. *Du/de la* = uncountable portions/masses.", "source": "GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "French numbers 70, 80, and 90 look strange compared to other languages. What are they, and what counting logic do they follow? Why is 71 \"soixante-et-onze\" and not \"soixante-dix-et-un\"? (4 steps)", "answer": "- Step 1: French uses a vigesimal (base-20) influence for 70-99, inherited from medieval Celtic/Gaulish counting systems. The numbers are: $$70 = soixante\\text{-}dix$$ (sixty-ten), $$80 = quatre\\text{-}vingts$$ (four-twenties), $$90 = quatre\\text{-}vingt\\text{-}dix$$ (four-twenty-ten).\n- Step 2: For 70-79, you count on top of 60: 70 = soixante-dix, 71 = soixante-et-onze (sixty-and-eleven), 72 = soixante-douze (sixty-twelve), up to 79 = soixante-dix-neuf (sixty-nineteen). You're essentially saying \"60 + [11-19].\"\n- Step 3: The \"et\" connector only appears in \"soixante-et-onze\" (71). For 72-79, no \"et\" — it's directly \"soixante-douze,\" \"soixante-treize,\" etc. This mirrors the pattern where \"et\" only appears in 21 (vingt-et-un), 31 (trente-et-un), 41, 51, 61 — only when the units digit is 1 and you're not in the compound 70s/80s range.\n- Step 4: For 80-99: 80 = quatre-vingts (4 × 20), 81 = quatre-vingt-un (no \"et,\" no \"s\" on vingt), 90 = quatre-vingt-dix (4 × 20 + 10), 91 = quatre-vingt-onze (four-twenty-eleven). The \"quatre-vingts\" loses its \"s\" when followed by another number.\n\nThe \"et\" rule: only for 21, 31, 41, 51, 61, and 71 — and nowhere else in the tens.", "source": "GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "A server asks you \"Quelle cuisson pour la viande?\" What are the four cooking levels in French, from least cooked to most cooked, and what does each literally mean or evoke? (4 steps)", "answer": "- Step 1: $$Bleu$$ — the most rare. Literally \"blue.\" The meat is barely seared on the outside; the inside is essentially raw and cool. The name evokes the blue-purple color of nearly raw meat.\n- Step 2: $$Saignant$$ — rare. Literally \"bleeding.\" The meat is seared and warm inside but still very red and juicy — it \"bleeds\" when cut.\n- Step 3: $$À\\ point$$ — medium rare (the French standard). Literally \"to the point\" or \"just right.\" The meat is pink in the center, warm throughout. This is the default in France if you don't specify.\n- Step 4: $$Bien\\ cuit$$ — well done. Literally \"well cooked.\" No pink remaining; fully cooked through. In France, ordering this for a steak can be seen as a culinary faux pas, but it's your right.\n\nNote: French \"à point\" is closer to what English speakers call \"medium rare,\" not \"medium.\" The scale doesn't map perfectly — French cooking culture prefers meat less done.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "When giving a phone number in France, digits are grouped in pairs and each pair is read as a number from 0 to 99. Why does this create a complication specifically for numbers 70-99? (3 steps)", "answer": "- Step 1: French does not have single unique words for 70, 80, or 90. Instead: 70 = $$soixante-dix$$ (sixty-ten), 80 = $$quatre-vingts$$ (four-twenties), 90 = $$quatre-vingt-dix$$ (four-twenty-ten). This means that any pair containing a digit 7, 8, or 9 in the tens place requires mental arithmetic.\n- Step 2: When reading phone number 78, you say \"soixante-dix-huit\" (60+18 = 78). For 87, you say \"quatre-vingt-sept\" (4×20+7 = 87). For 91, you say \"quatre-vingt-onze\" (4×20+11 = 91). You are constantly doing addition in your head.\n- Step 3: This is why French phone numbers are read in pairs — each pair is a two-digit number from 00 to 99, and French numbers above 69 already encode two-digit arithmetic. Reading 06 78 65 67 87 means: zéro-six, soixante-dix-huit, soixante-cinq, soixante-sept, quatre-vingt-sept.\n\n+ This is a vestige of a vigesimal (base-20) counting system that was once common in medieval French. Belgian and Swiss French use simpler forms: septante (70), octante/huitante (80), nonante (90) — but metropolitan/standard French uses the arithmetic forms.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "French has three ways to ask \"Do you live in Spain?\": 1) Tu habites en Espagne?, 2) Est-ce que tu habites en Espagne?, 3) Habites-tu en Espagne? Rank these from most informal to most formal, and explain what grammatical signal distinguishes the inversion form from the others. (3 steps)", "answer": "- Step 1: 1) Intonation (*Tu habites en Espagne?*) is the most informal. You keep the exact statement structure but raise your voice at the end. It's strictly oral and casual.\n- Step 2: 2) *Est-ce que* (*Est-ce que tu habites en Espagne?*) is the middle ground. It's a universal \"question flag\" that works in both oral and written French without changing the rest of the sentence.\n- Step 3: 3) Inversion (*Habites-tu en Espagne?*) is the most formal. You physically flip the verb and subject pronoun, connecting them with a hyphen. This is common in writing, formal speeches, and literature, but sounds stiff in casual conversation.\n+ The hyphen in inversion is the visual grammatical signal that the sentence is a question, even without a question mark.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "The self-introduction includes \"Quels sont tes loisirs?\" Why is \"quels\" used instead of \"quelle\" or \"quel\"? What does this reveal about the word \"loisirs\"? (3 steps)", "answer": "- Step 1: $$Quels$$ is the masculine plural form of the interrogative adjective \"quel\" (which/what). It's used here because \"loisirs\" (hobbies/leisure activities) is a masculine plural noun: \"les loisirs.\"\n- Step 2: \"Quel\" agrees in gender and number with the noun it modifies: $$quel$$ (masc. sing.), $$quelle$$ (fem. sing.), $$quels$$ (masc. pl.), $$quelles$$ (fem. pl.). Since \"loisirs\" is masculine plural, the correct form is \"quels.\"\n- Step 3: The structure \"Quels sont tes loisirs?\" = \"What are your hobbies?\" literally \"Which are your leisure activities?\" The verb \"sont\" (from ÊTRE) is plural to match the plural subject \"tes loisirs.\" Compare: \"Quel est ton loisir?\" (singular, if asking about one hobby).\n\n\"Quel/quelle/quels/quelles\" must agree with the noun that follows — it's an adjective, not an invariable question word like \"que\" or \"quoi.\"", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "What's the difference between $$au\\ revoir$$, $$à\\ bientôt$$, and $$à\\ très\\ vite$$? When would you use each? (2 steps)", "answer": "- Step 1: All three are farewells but signal different expectations of reunion:\n+ $$au\\ revoir$$ = \"goodbye\" — neutral, no specific time horizon. Default for ending any interaction.\n+ $$à\\ bientôt$$ = \"see you soon\" — implies you'll meet again relatively soon but no specific date.\n+ $$à\\ très\\ vite$$ = \"see you very soon\" — more urgent/affectionate, often used with friends or in casual texts.\n- Step 2: The pattern $$à\\ +$$ [time] is the French formula for \"see you [time]\": $$à\\ demain$$ (tomorrow), $$à\\ lundi$$ (Monday), $$à\\ ce\\ soir$$ (tonight), $$à\\ plus\\ tard$$ (later).\n\nTakeaway: $$au\\ revoir$$ is neutral; $$à\\ +$$ time expressions convey warmth and specificity.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "In French, there are three ways to say goodbye depending on how soon you expect to see the person again. What are they? (2 steps)", "answer": "- Step 1: The three expressions: (1) $$Au\\;revoir$$ = Goodbye (neutral, general — no assumption about seeing again). (2) $$À\\;bientôt$$ = See you soon (implies you expect to see the person again in the near future). (3) $$À\\;très\\;vite$$ = See you very soon (even stronger expectation of a quick reunion, more enthusiastic).\n- Step 2: All three start with \"à\" which means \"until\" or \"to\" in temporal expressions. \"Au revoir\" literally means \"to the seeing-again\" (au = à + le). \"À bientôt\" = until soon. \"À très vite\" = until very quickly. The pattern: à + time expression = see you [at that time]. Other examples: \"À demain\" = see you tomorrow, \"À lundi\" = see you on Monday.", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "What does CEFR B1 unlock compared to B2? Why is B2 considered the \"key official target\"? (3 steps)", "answer": "- Step 1: **B1** = independent daily life. You can handle travel and life problems, explain opinions with reasons, recount experiences, understand main points of news, and express agreement/disagreement. You can function independently in most daily situations but with limitations in nuance and complexity.\n- Step 2: **B2** = serious independent French. You can defend an opinion with arguments and examples, discuss advantages and disadvantages, express cause and consequence, reformulate ideas, and understand complex current-affairs documents. You can participate with fluency and spontaneity in discussion with native speakers.\n- Step 3: B2 is the key official target because: (1) it is required for French naturalisation (Service-Public); (2) it is the usual minimum for French higher education (Campus France); (3) it represents the threshold where you can truly function in French society as an independent, contributing participant — not just survive or get by. B1 lets you cope; B2 lets you engage.\n\n+ Campus France adds that C1 is \"strongly recommended for humanities/social sciences\" — meaning B2 is the floor, not the ceiling, for academic French.", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "How do you introduce yourself in French (se présenter)? Give the key question-answer pairs for: greeting, name, age, where you live, nationality, job, and hobbies. (3 steps)", "answer": "- Step 1: **Greeting and name**: Question: \"Comment tu t'appelles?\" (What's your name?) → Answer: \"Je m'appelle Phuc.\" The verb \"s'appeler\" means \"to call oneself\" — je m'appelle = I call myself. For greeting: \"Bonjour! Ça va?\" = Hello! How are you?\n- Step 2: **Age, location, nationality, job**: Question: \"Tu as quel âge?\" (How old are you?) → Answer: \"J'ai 25 ans\" (I am 25 years old — note: use \"avoir\" not \"être\" for age). Question: \"Tu habites où?\" or implied → \"J'habite à Paris\" (I live in Paris). \"Je suis vietnamien\" (I am Vietnamese — nationality uses être). \"Tu travailles dans quoi?\" (What do you work in?) → \"Je suis ingénieur dans l'intelligence artificielle\" (I am an engineer in AI).\n- Step 3: **Hobbies**: Question: \"Quels sont tes loisirs?\" (What are your hobbies?) → Answer: \"J'adore le sport, les films et la musique\" (I love sports, films, and music). Follow-up: \"Tu fais quoi comme sports?\" (What sports do you do?) → \"Je vais à la gym\" (I go to the gym). \"Combien de fois par semaine?\" (How many times per week?) → \"Quatre fois par semaine\" (Four times a week).\n\n+ Critical pattern: Age uses AVOIR (j'ai 25 ans), NOT être. This is different from English \"I am 25 years old.\" In French, you \"have\" 25 years.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "The number 80 in French is \"quatre-vingts\" (four-twenties). When you form 81, two changes happen to this word. What are they, and why? (2 steps)", "answer": "- Step 1: 81 = $$quatre-vingt-un$$ (not *quatre-vingts-un*). Two changes: (1) The \"et\" conjunction does NOT appear — it's quatre-vingt-un, not *quatre-vingt-et-un*. This is because \"quatre-vingts\" is a multiplicative compound (4×20), not a simple tens word like vingt or trente. The \"et-un\" pattern only applies to simple tens words. (2) The \"s\" on \"vingts\" disappears — it becomes \"vingt\" without the s. This is because when \"vingts\" is followed by another number, it is no longer plural (it's part of a compound), so the plural s drops.\n- Step 2: This s-dropping rule applies generally: quatre-vingt-un (81), quatre-vingt-deux (82), etc. — no s on vingt. But when 80 stands alone or is the last word, the s stays: \"quatre-vingts\" = 80, \"quatre-vingts pages\" = 80 pages (before a noun, the s stays because it's a round number, though this has nuances).\n\n+ Same logic for \"cent\": deux cents (200, standalone) but deux cent un (201, s drops before another number).", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "The CEFR defines levels by \"can-do\" descriptors, not by fixed hour quotas. However, schools estimate A1→A2 takes ~100-120 guided hours. Why is \"finishing a course unit\" not the same as being \"exam-ready,\" and why does the roadmap add a 20% buffer to the core hours? (2 steps)", "answer": "- Step 1: The CEFR defines levels by what you can *actually do* in the language, not by checking off a textbook syllabus. Finishing an A2 course unit means you saw the material; it doesn't mean you can reliably produce A2 output under exam pressure.\n- Step 2: A 20% buffer is added to the core guided hours (e.g., 110h becomes 132h) because exam readiness requires comfortable, spontaneous recall, not just familiar recognition. You need extra hours to move from \"I understand this when I see it\" to \"I can use this correctly when speaking or writing.\"\n+ B2 in particular requires you to argue and defend opinions. You can't pass a B2 test just by \"knowing the grammar rules\"—you need output fluency, which demands extra practice hours.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "Why does Cambridge English suggest ~200 guided hours per CEFR level transition, while Campus Langues gives lower estimates for A1→A2 (100–120h)? (3 steps)", "answer": "- Step 1: Cambridge's estimate (~200h/level) is for English learners, averaging across the whole CEFR ladder. Lower levels (A1→A2) typically need fewer hours than higher transitions (B1→B2) because early grammar/vocabulary is more contained.\n- Step 2: Campus Langues' French-specific ladder reflects this pattern:\n+ A1→A2: 100–120h (basic survival, limited grammar scope).\n+ A2→B1: 180–200h (significant jump — past tenses, more grammar, more vocabulary).\n+ B1→B2: 200–250h (longest transition — argumentation, complex texts, fluent output).\n- Step 3: So both sources roughly agree on the *total* A1→B2 (~500–600h raw) but distribute hours differently across transitions. Higher levels require disproportionately more time because language complexity scales nonlinearly.\n\nTakeaway: Hours per level grow with level — B2 is the steepest climb because it requires productive fluency, not just recognition.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "How do you say \"7:30 PM\" in spoken French, and what's unusual about French time conventions? (2 steps)", "answer": "- Step 1: *19h30* is written; spoken, it's *dix-neuf heures trente* (19:30) in formal/official contexts, or *sept heures et demie* (half past seven) in casual conversation.\n- Step 2: Two notable conventions:\n+ Written French uses **24-hour time** with an *h* separator (*19h30, 14h00*) — never a colon.\n+ Spoken French often uses 12-hour informally with *du matin / de l'après-midi / du soir* if ambiguity matters. *Et demie* = half past; *et quart* = quarter past; *moins le quart* = quarter to.\n\nFor restaurants and trains, expect 24-hour format. *Sept heures et demie du soir* = 7:30 PM clearly.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "The seasons in French are *l'hiver, le printemps, l'été, l'automne*. Notice they all take definite articles (le/la/l'). If you want to say \"In winter,\" why do you say \"en hiver\" (dropping the article) instead of \"à l'hiver\" or \"dans l'hiver\"? (2 steps)", "answer": "- Step 1: The seasons take definite articles when standing alone (*l'hiver*) because they are specific, recurring annual periods. But when expressing \"in [season],\" French uses the preposition *en* to mean \"during.\"\n- Step 2: *En* absorbs the article entirely—you say *en hiver*, *en été*, *en automne*. You cannot say *à l'hiver* because *à* + *le* = *au*, and *au hiver* sounds clunky and violates the idiom. *En* is used for feminine seasons starting with a vowel (*en automne*, *en été*) and for *hiver* (masculine but vowel-starting) as a special phonetic exception.\n+ Edge case: For *le printemps* (masculine, consonant-starting), you use *au printemps* (*à* + *le*), because *en* cannot smoothly precede a consonant-starting masculine word here.", "source": "GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "What is the \"Qualité FLE\" label, and why should you check for it when choosing a French school? (2 steps)", "answer": "- Step 1: **Qualité FLE** is an official quality label initiated by three French government ministries to certify French-as-a-foreign-language teaching centres. It guarantees teaching standards, teacher qualifications, and student services.\n- Step 2: Why it matters: many \"language schools\" are unregulated. A Qualité FLE label means the school has been audited for CEFR alignment, placement testing, teacher feedback quality, and attendance structure. **Campus France** (the official French study-abroad agency) explicitly recommends Qualité FLE centres.\n\nApps and informal tutors can supplement, but for serious B2 certification, a labeled school is the safest bet.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "What's the difference between using *tu* and *vous* when addressing one person? (3 steps)", "answer": "- Step 1: *Tu* is informal/singular — used with friends, family, children, peers, and people your age in casual settings.\n- Step 2: *Vous* is formal singular OR plural (any number of people). Use it with:\n+ Strangers, especially older or in positions of authority\n+ Waiters, shopkeepers, professionals you don't know\n+ Any group of people\n- Step 3: Why the formality split? French preserved a Roman-era distinction between intimate and respectful address. Using *tu* with a stranger can feel rude; using *vous* with a close friend can feel cold. Default to *vous* until invited to use *tu* (\"*on peut se tutoyer*\").", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "How do you ask \"What is this?\" in French when you see something on a menu you don't recognise? Give the expression and show how you'd ask about a specific dish. (2 steps)", "answer": "- Step 1: The expression is $$Qu'est-ce\\;que\\;c'est$$ (pronounced \"kes-kuh say\" in rapid speech). Literally: \"What is it that it is?\" This is the standard way to ask \"What is this/that?\"\n- Step 2: To ask about a specific dish, you can say: \"Qu'est-ce que c'est la salade niçoise?\" = What is the salade niçoise? You can also use \"Qu'est-ce qu'il y a dans…\" = What is there in…? (asking about ingredients). Example: \"Qu'est-ce qu'il y a dans le croque-monsieur?\" = What's in the croque-monsieur?\n\n+ Pronunciation note: \"Qu'est-ce que\" is almost always pronounced \"kesk(ə)\" in connected speech — the full pronunciation is very formal/unusual.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "Build the sentence \"I'm 25 years old\" in French. What's the conceptual catch compared to English? (3 steps)", "answer": "- Step 1: French expresses age with the verb $$avoir$$ (\"to have\"), not $$être$$ (\"to be\"). The structure is \"to have X years.\"\n- Step 2: $$J'ai\\ 25\\ ans$$ = literally \"I have 25 years.\" The word $$ans$$ (years) is *obligatory* — you cannot drop it as English drops \"years old.\"\n- Step 3: The conceptual contrast: English treats age as a state of being (\"I *am* 25\"); French treats it as a possession (\"I *have* 25 years\"). The same logic applies to hunger ($$j'ai\\ faim$$ — \"I have hunger\"), thirst ($$j'ai\\ soif$$), and being cold ($$j'ai\\ froid$$).\n\nTakeaway: Many physical/sensory states use $$avoir$$ in French, not $$être$$.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "What are the French numbers from 70 to 99? (3 steps)", "answer": "- Step 1: **70–79** = *soixante-dix* (60+10) to *soixante-dix-neuf* (60+19).  \n- Step 2: **80–89** = *quatre-vingts* (4×20) to *quatre-vingt-neuf* (4×20+9).  \n- Step 3: **90–99** = *quatre-vingt-dix* (4×20+10) to *quatre-vingt-dix-neuf* (4×20+19).  \n\n**Takeaway:** French uses a vigesimal (base-20) system for 70–99, unlike English.", "source": "Qwen 3 ①", "_id": "qwen_1_7"}, {"question": "In the CEFR roadmap, why is the B1→B2 transition described as requiring more hours (270 exam-ready) than A1→A2 (132 hours)? What makes higher levels harder to progress through? (3 steps)", "answer": "- Step 1: The hour ladder increases because each level demands qualitatively more complex abilities. A1→A2 is about adding vocabulary and basic structures to existing survival skills. B1→B2 requires developing argumentation, nuance, implicit comprehension, and fluent spontaneous production — skills that don't come from memorization alone.\n- Step 2: At lower levels, progress is visible and quick — you learn \"bonjour\" and immediately use it. At higher levels, progress is incremental and harder to feel. Moving from \"I can have a simple conversation\" (B1) to \"I can defend an opinion with arguments and examples\" (B2) requires deep restructuring of your linguistic system, not just adding more words.\n- Step 3: The diminishing returns principle: early gains are easy because you're filling obvious gaps (you don't know ANY past tenses → learn one → huge improvement). Later gains require refining what you already know: eliminating persistent errors, developing idiomatic expression, understanding cultural connotation, and handling ambiguity. This takes more hours per unit of noticeable improvement.\n\nLower levels = filling gaps (fast, visible progress). Higher levels = refining and deepening (slow, incremental progress). This is why the hour ladder steepens.", "source": "GLM 5.1 ①", "_id": "glm_1_62"}, {"question": "French has four specific terms for meat doneness that don't perfectly map to English. If you want your steak cooked just right—neither too red nor too dry—which French term do you use, and what is the literal meaning of that term that hints at \"perfect readiness\"? (2 steps)", "answer": "- Step 1: The four levels are *Bleu* (very rare, barely touched by heat), *Saignant* (rare, still bleeding/red inside), *À point* (medium rare, cooked \"to the point\" of perfection), and *Bien cuit* (well cooked, no pink left).\n- Step 2: If you want your steak cooked just right, you ask for *à point*. The literal meaning of *à point* is \"at the point\" or \"at the exact right moment,\" implying the meat has reached its ideal state of readiness.\n+ Edge case: *À point* in France usually maps to what English speakers call \"medium rare,\" not \"medium.\" French cooking culture strongly favors meat more on the red side than American standards. If you ask for \"medium\" expecting a warm pink center, *à point* is your best bet, but it will still be quite juicy.", "source": "GLM 5.1 ③", "_id": "glm_3_7"}, {"question": "If you see a dish on a menu and don't know what it is, you ask \"Qu'est-ce que c'est la salade niçoise?\" What is the literal, word-by-word translation of \"Qu'est-ce que c'est,\" and why does it use *ce* instead of a specific noun? (2 steps)", "answer": "- Step 1: \"Qu'est-ce que c'est\" breaks down as: *Qu'* (What) + *est* (is) + *ce* (this/that/it) + *que* (that) + *c'est* (it is). A clunky literal translation is \"What is it that it is?\"\n- Step 2: The phrase uses *ce* (a neutral demonstrative pronoun) because you are asking about the identity of an unknown thing. By using *ce*, you don't assign a gender to the unknown object. Once you learn what it is (\"C'est la salade niçoise\"), the noun's gender (feminine *la*) is revealed, but the question itself remains neutral.\n+ Pronunciation: \"Qu'est-ce que c'est\" is heavily contracted in speech, sounding like \"kes-ké sè\" or simply \"keske c'est\".", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "A friend asks you \"Tu fais quoi comme sports?\" and you want to say you go to the gym. Construct your answer and explain why \"faire du sport\" uses the partitive article while \"aller à la gym\" uses \"à la.\" (3 steps)", "answer": "- Step 1: The answer: \"Je vais à la gym\" (I go to the gym) or \"Je fais du sport à la gym\" (I do sport at the gym). Both are natural. \"Je vais à la gym quatre fois par semaine\" adds the frequency.\n- Step 2: \"Faire du sport\" uses the partitive article $$du$$ because \"sport\" (masculine singular) is being treated as an uncountable activity — you're doing some sport, not one specific sport. The partitive indicates an unspecified amount of the activity. Compare: \"Je fais du foot\" (I play soccer) — here \"du\" indicates the activity category.\n- Step 3: \"Aller à la gym\" uses $$à\\ la$$ because \"gym\" is a specific feminine place — you're going TO the gym (destination). The preposition \"à\" + definite article \"la\" indicates direction toward a particular location. The two structures answer different questions: \"faire du sport\" answers \"what activity?\", \"aller à la gym\" answers \"where?\"\n\nActivity (uncountable) → partitive (du/de la). Destination (specific place) → à + definite article (à la/au/aux).", "source": "GLM 5.1 ①", "_id": "glm_1_60"}, {"question": "What is the conjugation of ÊTRE (to be) in the present tense, and how does its negative form work? What is one critical difference between ÊTRE and AVOIR in how they behave? (3 steps)", "answer": "- Step 1: ÊTRE present tense: $$Je\\;suis$$, $$tu\\;es$$, $$il/elle/on\\;est$$, $$nous\\;sommes$$, $$vous\\;êtes$$, $$ils/elles\\;sont$$. Like AVOIR, this verb is entirely irregular and must be memorised.\n- Step 2: The negative follows the same ne … pas sandwich: $$Je\\;ne\\;suis\\;pas$$, $$tu\\;n'es\\;pas$$, $$il/elle/on\\;n'est\\;pas$$, $$nous\\;ne\\;sommes\\;pas$$, $$vous\\;n'êtes\\;pas$$, $$ils/elles\\;ne\\;sont\\;pas$$. Note: \"tu n'es pas\" and \"il n'est pas\" both elide ne → n' before a vowel.\n- Step 3: The critical functional difference: ÊTRE is a **linking verb** — it connects the subject to an adjective or noun that describes it, and that adjective **agrees in gender and number** with the subject. AVOIR is a **transitive verb** — it takes a direct object, and the object does NOT agree with the subject. This is why \"La réunion est urgente\" (the meeting is urgent — adjective agrees with feminine noun \"réunion\") but \"J'ai un rendez-vous\" (I have an appointment — the object stands independently).\n\n+ Misconception trap: \"La réunion est finie\" — \"finie\" is feminine singular because \"réunion\" is feminine singular. If it were masculine (e.g., \"Le projet\"), you'd say \"Le projet est fini.\" AVOIR never triggers this agreement on the object.", "source": "GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "In the reservation dialogue, the server asks \"Pour combien de personnes?\" and the client answers \"Pour 2 personnes.\" Break down the phrase \"combien de\" — what does it mean, and why is \"de\" required between \"combien\" and the noun? (3 steps)", "answer": "- Step 1: $$Combien$$ = \"how much / how many.\" When followed directly by a noun, French requires the preposition $$de$$ between them: \"combien de + noun.\"\n- Step 2: So \"combien de personnes\" = \"how many people.\" You cannot say \"combien personnes\" — the \"de\" is mandatory. This is similar to how \"beaucoup de\" (a lot of), \"peu de\" (few/little), and other quantity expressions all require \"de\" before the noun.\n- Step 3: Note: if \"combien\" stands alone as a pronoun (not followed by a noun), no \"de\" is needed. \"Combien?\" = \"How much/How many?\" (standalone). But \"Combien de…?\" = \"How much/how many of…?\" (followed by noun). This \"de\" rule applies broadly to quantity words in French.\n\nPattern: quantity word + de + noun (no article in between) — \"combien de,\" \"beaucoup de,\" \"peu de,\" \"assez de.\"", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "You're at a restaurant and the server says \"Que désirez-vous boire?\" What does this mean, and why is this question structured with inversion instead of \"Tu désires quoi boire?\" (3 steps)", "answer": "- Step 1: \"Que désirez-vous boire?\" = \"What would you like to drink?\" $$Que$$ = what (formal question word), $$désirez\\text{-}vous$$ = you desire/wish (inversion of vous désirez), $$boire$$ = to drink.\n- Step 2: The server uses inversion (verb-subject hyphenated) because this is formal, professional register — standard in service contexts. \"Tu désires quoi boire?\" would use intonation + informal \"tu,\" which is inappropriate for a server addressing a customer.\n- Step 3: The server could also say \"Est-ce que vous désirez boire quelque chose?\" (Do you want to drink something?) or \"Souhaitez-vous une bouteille d'eau gazeuse ou d'eau plate?\" (Would you like a bottle of sparkling or still water?) — all formal. The key: in service, always formal register (vous + inversion or est-ce que).\n\nService French = vous + formal question forms. Never \"tu\" with a customer.", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "When negating a sentence like $$J'ai\\ un\\ chocolat$$, what happens to the article $$un$$ in the negative form? (3 steps)", "answer": "- Step 1: In French, indefinite and partitive articles ($$un, une, des, du, de\\ la$$) generally transform into $$de$$ (or $$d'$$ before a vowel) after a negation.\n- Step 2: So $$J'ai\\ un\\ chocolat$$ becomes $$Je\\ n'ai\\ pas\\ de\\ chocolat$$, not $$Je\\ n'ai\\ pas\\ un\\ chocolat$$.\n- Step 3: The intuition: negation says \"zero quantity,\" so the language collapses all the quantity-marking articles into a single neutral $$de$$ that means \"any.\"\n+ Exception: this rule does *not* apply after $$être$$ — $$Ce\\ n'est\\ pas\\ un\\ chocolat$$ keeps $$un$$.\n\nTakeaway: \"No quantity\" gets its own special article: $$de$$.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "When introducing yourself in French (name, age, location, profession), in what order do these typically come and what verbs power each? (3 steps)", "answer": "- Step 1: A natural opening sequence:\n+ Name: $$Je\\ m'appelle\\ Phuc$$ ($$s'appeler$$ — reflexive verb, literally \"I call myself\").\n+ Age: $$J'ai\\ 25\\ ans$$ ($$avoir$$ — \"to have\" + years).\n- Step 2: Location: $$J'habite\\ à\\ Paris$$ ($$habiter$$ — \"to live/reside\" + $$à$$ for cities).\n+ For countries with feminine names: $$en France$$; masculine: $$au Japon$$; plural: $$aux États-Unis$$.\n- Step 3: Nationality/profession:\n+ $$Je\\ suis\\ vietnamien$$ ($$être$$ + adjective; agrees in gender — $$vietnamienne$$ for feminine).\n+ $$Je\\ suis\\ ingénieur$$ ($$être$$ + profession; NO article in French unlike English \"I am an engineer\").\n\nTakeaway: French uses $$avoir$$ for age, $$être$$ for nationality/profession (no article), and reflexive $$s'appeler$$ for name — each piece has its own verb logic.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "Roughly how many guided hours does it take to go from A1 to B2 in French, and what's the rationale for adding a buffer to raw estimates? (3 steps)", "answer": "- Step 1: Raw transition estimates from Campus Langues: A1→A2 ≈ 100–120h, A2→B1 ≈ 180–200h, B1→B2 ≈ 200–250h. Sum of midpoints ≈ 525h.\n- Step 2: A 20% \"exam-readiness\" buffer is added because finishing course content ≠ being able to pass a four-skill exam (DELF/TCF). The buffer accounts for:\n+ Building reliable output (speaking, writing) beyond passive recognition.\n+ Timed-exam practice and stress management.\n+ Consolidating fluency, not just knowledge.\n- Step 3: Buffered total: A1→B2 ≈ 630 guided hours.\n+ Then add a *calendar* buffer (~15%) for missed weeks, holidays, exam stress — gives realistic month/year projections.\n\nTakeaway: Plan with 630 guided hours for A1→B2, then convert to time using your weekly load.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "In French, when do you use *un/une* versus *du/de la/des*? Give a way to remember it without memorizing every case. (3 steps)", "answer": "- Step 1: *Un/une* (and plural *des* as \"some countable items\") refer to countable, whole items — \"a chocolate,\" \"a coffee cup.\" You can point at it and count it.\n- Step 2: *Du/de la/des* are partitive articles meaning \"some of\" an uncountable substance or an unspecified portion — \"some chocolate (mass),\" \"some coffee (liquid),\" \"some water.\"\n+ *Du* before masculine nouns: *du café, du saumon*\n+ *De la* before feminine nouns: *de la crème brûlée, de la salade*\n+ *Des* before plural nouns: *des chocolats*\n- Step 3: The mental test: can you eat/drink/use just a piece of it without it being \"one whole unit\"? If yes, partitive. *J'ai un chocolat* = one chocolate bar. *J'ai du chocolat* = some chocolate (a portion, possibly melted, smeared, etc.).\n\nTakeaway: countable whole → un/une/des; portion of a mass → du/de la/des (partitive).", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "Why does French say $$il\\ y\\ a$$ for \"there is/there are,\" and how does the construction work morphologically? (3 steps)", "answer": "- Step 1: $$il\\ y\\ a$$ literally = \"it there has\" — using the impersonal $$il$$ (like English \"it\" in \"it rains\") + the locative pronoun $$y$$ (\"there\") + $$a$$ (third-person of $$avoir$$).\n- Step 2: French uses $$avoir$$ (\"to have\") to express existence, unlike English which uses \"to be.\" So \"there is bread\" = $$il\\ y\\ a\\ du\\ pain$$ — literally \"it has there some bread.\"\n- Step 3: It's invariable — singular or plural, present or fixed:\n+ \"There is a cat\" = $$il\\ y\\ a\\ un\\ chat$$\n+ \"There are three cats\" = $$il\\ y\\ a\\ trois\\ chats$$ (same verb form, no plural change)\n\nTakeaway: $$il\\ y\\ a$$ is a fixed expression — do
