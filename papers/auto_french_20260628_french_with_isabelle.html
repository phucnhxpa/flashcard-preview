 months of the year in French? (1 step)", "answer": "- **Janvier** (January)\n- **Février** (February)\n- **Mars** (March)\n- **Avril** (April)\n- **Mai** (May)\n- **Juin** (June)\n- **Juillet** (July)\n- **Août** (August)\n- **Septembre** (September)\n- **Octobre** (October)\n- **Novembre** (November)\n- **Décembre** (December)\n\nLike days, months are not capitalized in French.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "What are the four seasons in French? (1 step)", "answer": "- **L'hiver** (winter) — note the article \"l'\" because it starts with a vowel\n- **Le printemps** (spring)\n- **L'été** (summer) — also takes \"l'\"\n- **L'automne** (autumn/fall) — also takes \"l'\"\n\nRemember: In French, seasons are masculine nouns and often take the definite article: \"en été\" (in summer), \"en hiver\" (in winter), but \"au printemps\" (in spring).", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "How do you say the following numbers in French: 21, 31, 41, 51, 61, 71, 81, 91? (2 steps)", "answer": "- Step 1: 21 = vingt-et-un, 31 = trente-et-un, 41 = quarante-et-un, 51 = cinquante-et-un\n- Step 2: 61 = soixante-et-un, 71 = soixante-et-onze, 81 = quatre-vingt-un, 91 = quatre-vingt-onze\n\nKey pattern: French uses \"et\" (and) for numbers ending in 1, except for 81 and 91. Notice that 70 and 71 are \"soixante-dix\" and \"soixante-et-onze\" — French counts 70-79 as \"sixty-ten\" to \"sixty-nineteen,\" and 80-99 as \"four-twenty\" to \"four-twenty-nineteen.\"", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "How do you say \"80\" and \"100\" in French? What is notable about 80? (2 steps)", "answer": "- Step 1: \"80\" = quatre-vingts (four twenties), and \"100\" = cent.\n- Step 2: When \"quatre-vingts\" has nothing after it, it takes an \"s\" (quatre-vingts). But when followed by another number, the \"s\" drops: \"quatre-vingt-un\" (81), \"quatre-vingt-deux\" (82).\n\nThis is a unique French counting system inherited from older French — no other major European language counts this way.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "What phrases would you use to make a restaurant reservation in French? (3 steps)", "answer": "- Step 1: **Opening the call:** \"Le restaurant [name], bonsoir. C'est pour une réservation?\"\n- Step 2: **Giving details:**\n  + Time: \"À 19h30, s'il vous plaît\" (at 7:30 PM)\n  + Number of people: \"Pour deux personnes, s'il vous plaît\"\n  + Phone number for confirmation: \"Oui, c'est le 06 XX XX XX XX\"\n- Step 3: **Closing:** \"C'est noté, Monsieur/Madame. À ce soir!\" / \"Merci beaucoup, au revoir!\"\n\nThe waiter typically confirms by repeating all details back to you.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "When the waiter asks \"Avez-vous fait votre choix?\" what are five ways to respond to order food? (2 steps)", "answer": "- Step 1: Here are five ways to order, from most formal to casual:\n  + \"Je voudrais le hamburger s'il vous plaît\" (I would like)\n  + \"Je pourrais avoir le hamburger?\" (Could I have?)\n  + \"J'aimerais le hamburger\" (I would like)\n  + \"Je vais prendre le hamburger\" (I'll take)\n  + \"On va prendre le hamburger\" (We're going to take — informal \"on\" = \"we\")\n- Step 2: All of these are acceptable. The choice depends on formality and personal preference. \"Je voudrais\" is the safest polite choice.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "What is the French for \"please\" in a restaurant context? How does the waiter ask about your drink order? (2 steps)", "answer": "- Step 1: The French for \"please\" is **\"s'il vous plaît\"** (formal) or **\"s'il te plaît\"** (informal).\n- Step 2: The waiter might ask: **\"Que désirez-vous boire?\"** (What would you like to drink?) or **\"Souhaiteriez-vous une bouteille d'eau gazeuse ou d'eau plate?\"** (Would you like a bottle of sparkling or still water?)\n\n\"Que désirez-vous?\" is more formal than \"Qu'est-ce que vous voulez?\"", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "How do you introduce yourself in French at a basic level? Give a complete example. (3 steps)", "answer": "- Step 1: **Greeting:** \"Bonjour! Ça va?\" (Hello! How are you?)\n- Step 2: **Basic info:** \"Je m'appelle [name], j'ai [age] ans. J'habite à [city] et je suis [nationality/job].\"\n  + Example: \"Je m'appelle Phuc, j'ai 25 ans. J'habite à Paris et je suis vietnamien.\"\n- Step 3: **Common follow-up questions:** \"Tu travailles dans quoi?\" (What do you work in?) / \"Quels sont tes loisirs?\" (What are your hobbies?)\n\nThis is the standard self-introduction formula at A1 level.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "What does \"Je vais à la gym quatre fois par semaine\" mean? Break down the sentence. (2 steps)", "answer": "- Step 1: The sentence means \"I go to the gym four times per week.\"\n- Step 2: Breakdown:\n  + \"Je vais\" = I go (aller = to go)\n  + \"à la gym\" = to the gym (gym is feminine)\n  + \"quatre fois\" = four times\n  + \"par semaine\" = per week\n\nNote: \"Quatre fois par semaine\" is the standard way to express frequency. \"Par\" means \"per\" or \"by.\"", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "What is the negative of \"Je suis ingénieur\"? (1 step)", "answer": "The negative form is **\"Je ne suis pas ingénieur.\"**\n\nIn French, to negate \"to be\" (être), you place \"ne\" before the verb and \"pas\" after it: subject + ne + verb + pas. In spoken French, \"ne\" is often dropped, so you'd hear \"Je suis pas ingénieur\" informally.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "In French, how do you ask someone's name and age? (1 step)", "answer": "- \"Comment tu t'appelles?\" = What's your name? (informal)\n- \"Tu as quel âge?\" = How old are you? (informal)\n\nFor formal situations, you would use \"vous\" instead: \"Comment vous appelez-vous?\" and \"Vous avez quel âge?\"", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "Translate: \"Non, je n'ai pas de réservation\" and \"Oui, j'ai une réservation pour deux personnes.\" (1 step)", "answer": "- \"Non, je n'ai pas de réservation\" = No, I don't have a reservation\n- \"Oui, j'ai une réservation pour deux personnes\" = Yes, I have a reservation for two people\n\nKey point: After a negative with \"pas,\" you use \"de\" (not \"des\" or \"un\") before the noun: \"pas de réservation\" (not \"pas une réservation\").", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "What is the difference between \"à bientôt\" and \"au revoir\"? (1 step)", "answer": "- **\"Au revoir\"** = goodbye (literally \"to the seeing again\" — implies farewell)\n- **\"À bientôt\"** = see you soon / see you again\n- **\"À très vite\"** = see you very soon (more casual)\n\nAll are farewells, but \"à bientôt\" implies you expect to see the person again relatively soon, while \"au revoir\" is a general goodbye.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "When a waiter asks \"Est-ce que vous les voulez en même temps?\", what does it mean? (1 step)", "answer": "It means \"Would you like them at the same time?\" — asking if you want your dishes served together.\n\n\"Les\" refers to multiple items (like appetizers and main courses). \"En même temps\" = at the same time. This is a common question when you order multiple courses.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "What does \"Qu'est-ce que c'est?\" mean, and how would you use it to ask about a dish? (2 steps)", "answer": "- Step 1: \"Qu'est-ce que c'est?\" = \"What is this?\" or \"What is it?\"\n- Step 2: You can use it to ask about menu items: \"Qu'est-ce que c'est, la salade niçoise?\" (What is the niçoise salad?)\n\nThis is very useful in restaurants when you don't recognize a dish. \"Qu'est-ce qu'il y a dans...\" means \"what is there in...\" and asks about ingredients.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "What are five ways to say \"I would like\" when ordering in a French restaurant? (2 steps)", "answer": "- Step 1: All of these are polite ways to order:\n  + \"Je voudrais...\"\n  + \"Je pourrais avoir...\"\n  + \"J'aimerais avoir...\"\n  + \"Je vais prendre...\"\n  + \"On va prendre...\" (informal \"we\")\n- Step 2: The most common and safest is \"Je voudrais\" — it's polite without being overly formal.\n\nYou can combine these: \"Je voudrais le hamburger s'il vous plaît\"", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "What is the French for \"inside\" vs \"terrace\" when a waiter asks where you want to sit? (1 step)", "answer": "- **\"À l'intérieur\"** = inside\n- **\"En terrasse\"** = outside on the terrace\n\nWhen the waiter asks \"À l'intérieur ou en terrasse?\", you can respond: \"Je préfère en terrasse\" (I prefer outside) or \"Je préfère à l'intérieur\" (I prefer inside).", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "What does \"Je reviens tout de suite\" mean, and when would you hear this in a restaurant? (1 step)", "answer": "\"Je reviens tout de suite\" = \"I'm coming right back\" or \"I'll be right back.\"\n\nYou would hear this from the waiter when they bring something and need to get something else, or when they step away briefly. It's a polite way to reassure you they haven't forgotten you.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "If the restaurant asks \"Vous avez une réservation?\", what are two possible answers? (1 step)", "answer": "- **Positive:** \"Oui, j'ai une réservation pour deux personnes\" (Yes, I have a reservation for two people)\n- **Negative:** \"Non, je n'ai pas de réservation\" (No, I don't have a reservation)\n\nBoth responses are common. The receptionist will then guide you to a table or ask how many in your party.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "What is the French verb \"faire\" used for in \"Je fais du sport\"? (1 step)", "answer": "\"Faire\" in \"je fais du sport\" means \"to do\" or \"to play\" — it's used for activities and sports.\n\n+ \"Faire du sport\" = to do/play sports\n+ \"Faire du vélo\" = to ride a bike\n+ \"Faire la cuisine\" = to cook (literally \"to do cooking\")\n\nUnlike English, French uses \"faire\" + sport/activity rather than \"play\" or \"do.\"", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "In French, what is the difference between \"je\" and \"on\" when talking about yourself? (2 steps)", "answer": "- Step 1: **\"Je\"** = I (formal/standard first person singular)\n- Step 2: **\"On\"** literally means \"one\" but in casual spoken French, it's very commonly used to mean \"we\" or even \"I.\"\n\n+ Example: \"On va prendre le burger\" = \"We're going to take the burger\" (or sometimes \"I'm going to take...\" in very casual speech)\n\nIn everyday French conversation, \"on\" is extremely common and sounds more natural than \"nous\" (we) in many contexts.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "What do \"est-ce que\" and \"qu'est-ce que\" look similar but mean differently? (2 steps)", "answer": "- Step 1: **\"Est-ce que\"** (is it that) = used to form questions: \"Est-ce que tu pars?\" = \"Are you leaving?\"\n- Step 2: **\"Qu'est-ce que\"** (what is it that) = used to ask \"what?\": \"Qu'est-ce que c'est?\" = \"What is it?\"\n\nThe key difference: \"Est-ce que\" is a question marker; \"Qu'est-ce que\" is a question word asking for a definition or explanation.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "How do you say \"AI\" (Artificial Intelligence) in French? What is the pattern? (1 step)", "answer": "In French, \"Artificial Intelligence\" is **\"l'intelligence artificielle\"** (IA).\n\nThe pattern follows the English term but is translated: \"intelligence\" = intelligence, \"artificielle\" = artificial. This is a technical term used in professional contexts, like \"Je suis ingénieur dans l'intelligence artificielle\" (I work in AI).", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "What is the rule for using \"de la\" vs \"du\" in French? (2 steps)", "answer": "- Step 1: **\"Du\"** = de + le (some, used with masculine singular nouns)\n  + Example: \"du café\" (some coffee), \"du pain\" (some bread)\n- Step 2: **\"De la\"** = de + la (some, used with feminine singular nouns)\n  + Example: \"de la crème\" (some cream), \"de l'eau\" (some water — \"de l'\" before vowel)\n\nThese are partitive articles used with uncountable things.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "Why might a French speaker say \"j'habite à Paris\" but \"j'habite en France\"? What's the rule? (2 steps)", "answer": "- Step 1: **\"À\"** is used with cities: \"j'habite à Paris,\" \"j'habite à Lyon,\" \"j'habite à Tokyo\"\n- Step 2: **\"En\"** is used with countries (feminine) and continents: \"j'habite en France,\" \"j'habite en Angleterre,\" \"j'habite en Europe\"\n\nThe preposition depends on whether you're talking about a city (à) vs a country/region (en). Some masculine countries use \"au\" (au Japon, au Canada).", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "What does \"Quel âge as-tu?\" mean, and how would you respond with your age? (1 step)", "answer": "\"Quel âge as-tu?\" = \"How old are you?\" (informal)\n\nYou would respond: \"J'ai [number] ans.\" (I am [number] years old.)\n\n+ Example: \"J'ai vingt-cinq ans.\" (I am 25 years old.)\n\nNote: In French, you say \"j'ai\" (I have) + age + \"ans\" (years), not \"I am [age] years.\"", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "What is the negative of \"J'ai un chocolat\" in French? (1 step)", "answer": "The negative is **\"Je n'ai pas de chocolat.\"**\n\nKey rule: When negating with \"pas,\" you change \"un\" to \"de\" (or \"des\" to \"de\"). This is called \"de la partie négative\" — the partitive article becomes \"de\" in negative sentences.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "How do you ask \"What are your hobbies?\" in French? (1 step)", "answer": "The phrase is **\"Quels sont tes loisirs?\"** (informal) or **\"Quels sont vos loisirs?\"** (formal)\n\nYou could also ask: \"Tu fais quoi comme sports?\" (What sports do you do?) or \"Tu as quels loisirs?\" (What hobbies do you have?)", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "What does \"Je suis ingénieur dans l'intelligence artificielle\" mean, and why is it structured this way? (2 steps)", "answer": "- Step 1: It means \"I am an engineer in artificial intelligence\" — essentially \"I work in AI engineering.\"\n- Step 2: The structure \"dans + [field]\" describes your professional field or domain. Other examples:\n  + \"Je travaille dans la finance\" (I work in finance)\n  + \"Je travaille dans l'éducation\" (I work in education)\n\nIn French, you often say \"dans + field\" to describe what domain you work in.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "What is the French for \"breakfast,\" \"lunch,\" and \"dinner\"? (1 step)", "answer": "- **Breakfast** = le petit-déjeuner (or le déjeuner in some regions)\n- **Lunch** = le déjeuner\n- **Dinner** = le dîner\n\nNote: In French, \"déjeuner\" often means lunch (the main midday meal), while \"petit-déjeuner\" is specifically breakfast. \"Dîner\" is the evening meal.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "If someone says \"Je n'ai pas de réservation,\" what question might the restaurant ask next? (1 step)", "answer": "They might ask: **\"Pour combien de personnes?\"** (For how many people?)\n\nThis is the natural follow-up when someone without a reservation arrives — they need to know the party size to find a table.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "What is the difference between \"le serveur\" and \"la serveuse\"? (1 step)", "answer": "- **\"Le serveur\"** = the waiter (masculine)\n- **\"La serveuse\"** = the waitress (feminine)\n\nIn French, many professions have separate masculine and feminine forms. The article (\"le\" or \"la\") tells you the gender of the person.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "How do you ask \"Is everything okay?\" in a French restaurant? (1 step)", "answer": "**\"Est-ce que tout va bien?\"** or simply **\"Tout va bien?\"**\n\nYou might hear this from the waiter mid-meal to check if your food is good and if you need anything. A positive response: \"Oui, tout va bien, merci!\" (Yes, everything's fine, thanks!)", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "What does \"OU\" mean in French, and when would you see it on a menu? (1 step)", "answer": "**\"OU\"** = \"or\" in French.\n\nOn a menu, you might see choices like \"avec frites OU riz\" (with fries OR rice), or \"eau gazeuse OU eau plate\" (sparkling water OR still water). This helps you make a selection.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "What is the phrase \"Le restaurant la Tour Eiffel\" in the reservation dialogue, and why is \"la\" used? (1 step)", "answer": "It's \"The Tour Eiffel restaurant\" — the name of the restaurant.\n\nThe article \"la\" is used because \"Tour Eiffel\" is treated as feminine (the Eiffel Tower is \"la Tour Eiffel\"). So the restaurant named after it also takes \"la.\" If the restaurant name starts with a masculine noun, you'd use \"le.\"", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "In the reservation dialogue, what does \"c'est noté\" mean? (1 step)", "answer": "**\"C'est noté\"** = \"It's noted\" or \"I've written it down.\"\n\nThe restaurant staff says this to confirm they've recorded your reservation details. It's a polite way of saying \"I've got it.\"", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "What is the difference between \"j'aime\" and \"j'adore\" in French? (1 step)", "answer": "- **\"J'aime\"** = I like (neutral)\n- **\"J'adore\"** = I love (stronger, more enthusiastic)\n\n\"J'adore\" expresses a stronger preference. \"J'aime bien\" is a softer \"I quite like.\" The intensity gradient: je n'aime pas < j'aime bien < j'aime < j'adore", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "How do you say \"I don't understand\" in French? (1 step)", "answer": "**\"Je ne comprends pas\"** \n\nIn negative sentences, remember the \"ne...pas\" structure around the verb: je + ne + comprends + pas.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "What is the vocabulary word for \"bill/check\" in a French restaurant, and what are two ways to ask for it? (1 step)", "answer": "- **\"L'addition\"** (the bill/check) — most common in France\n- **\"La note\"** (the bill) — also understood\n\nWays to ask:\n+ \"L'addition s'il vous plaît\"\n+ \"Je pourrais avoir l'addition?\"\n+ \"La note, s'il vous plaît\"", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "What is the French phrase for \"follow me, please\" that a waiter might use? (1 step)", "answer": "**\"Suivez-moi, s'il vous plaît\"**\n\n- \"Suivez-moi\" = follow me (imperative, formal \"vous\" form)\n- \"s'il vous plaît\" = please\n\nThis is what the waiter says when showing you to your table.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "What does \"Installez-vous\" mean in a restaurant context? (1 step)", "answer": "**\"Installez-vous\"** = \"Get seated\" or \"Make yourself comfortable.\"\n\nThis is an invitation/instruction from the waiter after showing you to your table. It's the formal \"vous\" imperative form of \"s'installer\" (to sit down/get comfortable).", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "In French, what is the difference between \"je mange\" (I eat) and \"je mangez\" (you eat - formal)? (1 step)", "answer": "- **\"Je mange\"** = I eat (subject \"je\")\n- **\"Vous mangez\"** = you eat (subject \"vous\" — formal/plural \"you\")\n\nNote: The ending \"-ez\" is the \"vous\" form of regular -er verbs, not \"je.\" \"Je\" always takes \"-e\" for -er verbs: je mange, tu manges, il/elle mange, nous mangeons, vous mangez, ils/elles mangent.", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": false}, {"question": "What are the three ways to express \"some\" in French with uncountable nouns? (1 step)", "answer": "- **\"Du\"** (masculine singular): du café, du pain\n- **\"De la\"** (feminine singular): de la crème, de l'eau\n- **\"Des\"** (plural): des légumes, des fruits\n\nThese are called **partitive articles** — they express \"some\" of something uncountable or indefinite.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": false}, {"question": "What does \"être en retard\" mean in French? (1 step)", "answer": "**\"Être en retard\"** = \"to be late\"\n\nFor example: \"Oui, je suis en retard\" = \"Yes, I'm late.\"\n\nThis is a common expression — \"en retard\" means \"late\" (not on time). The opposite is \"à l'heure\" = on time.", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": false}, {"question": "In the homework correction \"après c'est, l'adjectif est toujours masculin,\" what does this mean? (1 step)", "answer": "This means: \"After 'c'est,' the adjective is always masculine.\"\n\nWhen you use \"c'est\" (it's/this is), you don't match the adjective to the noun's gender — you always use the masculine form: \"C'est beau\" (It's beautiful), \"C'est petite\" would be WRONG — it must be \"C'est petit\" even if describing a feminine noun.", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "What is the phrase \"il n'y a pas de problème\" in English? (1 step)", "answer": "**\"Il n'y a pas de problème\"** = \"There's no problem\" or \"No problem.\"\n\nThis is a common, polite response when someone apologizes or asks for something — similar to \"no worries\" in English.", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "What does the phrase \"avez != avons\" in the homework correction mean? (1 step)", "answer": "This is a correction marker: \"avez\" (formal \"you have\") ≠ \"avons\" (we have).\n\nThe student likely confused \"vous avez\" (you have) with \"nous avons\" (we have). They are different subjects — this highlights that verb forms must match the subject.", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "What is the French phrase \"J'adore le sport, les films et la musique\" describing? (1 step)", "answer": "It describes **hobbies/interests**: \"I love sports, movies, and music.\"\n\nThis is a typical response to \"Quels sont tes loisirs?\" (What are your hobbies?) — listing things you enjoy doing in your free time.", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": false}, {"question": "If someone asks \"Tu fais quoi comme sports?\", how might you respond? (1 step)", "answer": "You could respond:\n- \"Je vais à la gym\" (I go to the gym)\n- \"Je fais du football\" (I play football)\n- \"Je cours\" (I run)\n- \"Je fais du tennis\" (I play tennis)\n\n\"Faire du sport\" = to do sports. The verb \"faire\" is used with most sports activities.", "source": "MiniMax ②", "_id": "minimax_2_58", "judge_pick": false}], "count": 59}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "In French, when expressing \"I have some chocolate\" (uncountable) vs \"I have a chocolate\" (one) vs \"I have chocolates\" (plural countable), which articles are used and why does the language make this distinction? (3 steps)", "answer": "- Step 1: French distinguishes between countable and uncountable quantities using different articles. For one specific countable item, use the indefinite singular: $$un$$ (masculine) or $$une$$ (feminine). So \"I have a chocolate\" = $$J'ai\\ un\\ chocolat$$.\n- Step 2: For multiple countable items, use the plural indefinite $$des$$. So \"I have chocolates\" = $$J'ai\\ des\\ chocolats$$.\n- Step 3: For an unspecified amount of an uncountable substance (\"some\"), use the partitive: $$du$$ (masculine), $$de\\ la$$ (feminine), $$des$$ (plural). So \"I have some chocolate\" = $$J'ai\\ du\\ chocolat$$.\n+ The partitive captures the idea that you're taking *a portion of* the substance, not a whole unit of it. English often drops \"some\" but French requires this article.\n\nTakeaway: French forces you to mark whether you're counting units or scooping a portion — there is no \"bare noun\" like in English.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "Conjugate the verb $$avoir$$ (\"to have\") in the present tense for all six persons, and identify any spelling quirks. (2 steps)", "answer": "- Step 1: The forms are: $$j'ai,\\ tu\\ as,\\ il/elle/on\\ a,\\ nous\\ avons,\\ vous\\ avez,\\ ils/elles\\ ont$$.\n- Step 2: Note the irregularities:\n+ $$je$$ becomes $$j'$$ before the vowel in $$ai$$ (elision).\n+ The third-person plural $$ont$$ looks unlike the singular $$a$$ — this is a hallmark of irregular verbs.\n+ Pronunciation: $$ils\\ ont$$ liaisons as \"il-z-on\", distinguishing it from $$ils\\ sont$$ (\"they are\").\n\nTakeaway: $$avoir$$ is one of the most irregular and frequent French verbs — memorise it as a unit, not by pattern.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "How do you turn an $$avoir$$ sentence negative in French, and what is the structural pattern? (3 steps)", "answer": "- Step 1: French negation uses a *two-part* structure: $$ne\\ ...\\ pas$$ wrapping the verb. The $$ne$$ goes before the verb, $$pas$$ goes after.\n- Step 2: Apply to $$avoir$$: $$je\\ n'ai\\ pas,\\ tu\\ n'as\\ pas,\\ il\\ n'a\\ pas,\\ nous\\ n'avons\\ pas,\\ vous\\ n'avez\\ pas,\\ ils\\ n'ont\\ pas$$.\n- Step 3: Note the elision: $$ne$$ becomes $$n'$$ before a vowel sound (every form of $$avoir$$ starts with a vowel), so you always see $$n'$$ here, never $$ne$$.\n\nTakeaway: Negation sandwiches the verb — unlike English where \"not\" comes after the auxiliary.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "When negating a sentence like $$J'ai\\ un\\ chocolat$$, what happens to the article $$un$$ in the negative form? (3 steps)", "answer": "- Step 1: In French, indefinite and partitive articles ($$un, une, des, du, de\\ la$$) generally transform into $$de$$ (or $$d'$$ before a vowel) after a negation.\n- Step 2: So $$J'ai\\ un\\ chocolat$$ becomes $$Je\\ n'ai\\ pas\\ de\\ chocolat$$, not $$Je\\ n'ai\\ pas\\ un\\ chocolat$$.\n- Step 3: The intuition: negation says \"zero quantity,\" so the language collapses all the quantity-marking articles into a single neutral $$de$$ that means \"any.\"\n+ Exception: this rule does *not* apply after $$être$$ — $$Ce\\ n'est\\ pas\\ un\\ chocolat$$ keeps $$un$$.\n\nTakeaway: \"No quantity\" gets its own special article: $$de$$.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "What's the conceptual difference between $$des$$ (plural indefinite) and $$des$$ (plural partitive)? Why does French use the same form for both? (2 steps)", "answer": "- Step 1: Plural indefinite $$des$$ = \"some [countable items]\" — e.g., $$des\\ chocolats$$ = some chocolates (multiple discrete units).\n- Step 2: Plural partitive $$des$$ = \"some of [an uncountable thing in plural form]\" — but in practice these merge because in plural, the distinction between \"a few units\" and \"some portion\" dissolves.\n+ This is why textbooks often just list $$un/une/des$$ as indefinite and $$du/de\\ la/des$$ as partitive — $$des$$ appears in both lists with the same form.\n\nTakeaway: $$des$$ is the universal \"some\" plural marker — French doesn't bother splitting it further.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "A waiter asks $$Quelle\\ cuisson\\ pour\\ la\\ viande?$$ — what is being asked, and what are the four standard answer levels from least to most cooked?", "answer": "The waiter is asking how you want your meat cooked. The four levels, from rarest to most done, are: $$bleu$$ (very rare — barely seared), $$saignant$$ (rare — literally \"bleeding\"), $$à\\ point$$ (medium rare — \"on point\"), $$bien\\ cuit$$ (well done — \"well cooked\"). Note the cultural anchor: $$saignant$$ literally evokes blood, and French rare is typically rarer than American rare. $$À\\ point$$ is the French restaurant default and corresponds to medium/medium-rare in English-speaking countries, not \"medium\" — calibrate accordingly.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "In French, what are the three polite ways to say \"I would like\" when ordering, and what is the nuance between them? (3 steps)", "answer": "- Step 1: The three common forms are: $$je\\ voudrais$$, $$je\\ pourrais\\ avoir$$, $$j'aimerais\\ avoir$$.\n- Step 2: Translations and nuance:\n+ $$je\\ voudrais$$ = \"I would like\" — the standard polite request (conditional of $$vouloir$$).\n+ $$je\\ pourrais\\ avoir$$ = \"could I have\" — slightly more tentative, asking permission (conditional of $$pouvoir$$).\n+ $$j'aimerais$$ = \"I would love/like\" — softer, expressing preference (conditional of $$aimer$$).\n- Step 3: All three are conditional tense — French uses the conditional, not the present, for polite requests. Saying $$je\\ veux$$ (\"I want\") would sound rude/demanding in a restaurant.\n\nTakeaway: Politeness in French = conditional mood. Never use present-tense \"want\" with a server.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "What is the difference between $$s'il\\ vous\\ plaît$$ and $$s'il\\ te\\ plaît$$, and what underlying grammar choice drives it?", "answer": "Both mean \"please,\" but they reflect the formality of the addressee. $$s'il\\ vous\\ plaît$$ uses $$vous$$ — the formal/polite or plural \"you\" — and is the default for waiters, strangers, elders, professional contexts. $$s'il\\ te\\ plaît$$ uses $$te$$ — the informal singular \"you\" — and is for friends, family, children, peers. Literally, both mean \"if it pleases you.\" This choice cascades through the entire conversation: once you pick $$tu$$ or $$vous$$, all pronouns, verb conjugations, and possessives must match. In a restaurant, always default to $$vous$$ unless you know the server personally.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "Build the sentence \"I'm 25 years old\" in French. What's the conceptual catch compared to English? (3 steps)", "answer": "- Step 1: French expresses age with the verb $$avoir$$ (\"to have\"), not $$être$$ (\"to be\"). The structure is \"to have X years.\"\n- Step 2: $$J'ai\\ 25\\ ans$$ = literally \"I have 25 years.\" The word $$ans$$ (years) is *obligatory* — you cannot drop it as English drops \"years old.\"\n- Step 3: The conceptual contrast: English treats age as a state of being (\"I *am* 25\"); French treats it as a possession (\"I *have* 25 years\"). The same logic applies to hunger ($$j'ai\\ faim$$ — \"I have hunger\"), thirst ($$j'ai\\ soif$$), and being cold ($$j'ai\\ froid$$).\n\nTakeaway: Many physical/sensory states use $$avoir$$ in French, not $$être$$.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "Conjugate $$être$$ (\"to be\") in the present tense across all six persons, both affirmative and negative. (2 steps)", "answer": "- Step 1: Affirmative: $$je\\ suis,\\ tu\\ es,\\ il/elle/on\\ est,\\ nous\\ sommes,\\ vous\\ êtes,\\ ils/elles\\ sont$$.\n- Step 2: Negative (wrap each verb with $$ne\\ ...\\ pas$$, eliding to $$n'$$ before vowels):\n+ $$je\\ ne\\ suis\\ pas$$\n+ $$tu\\ n'es\\ pas$$ (elision because $$es$$ starts with vowel)\n+ $$il\\ n'est\\ pas$$\n+ $$nous\\ ne\\ sommes\\ pas$$\n+ $$vous\\ n'êtes\\ pas$$ (elision)\n+ $$ils\\ ne\\ sont\\ pas$$\n\nTakeaway: $$être$$ is highly irregular — note especially $$sommes,\\ êtes,\\ sont$$ which look nothing like the singular forms.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Why does French use $$on$$ in the conjugation slot alongside $$il/elle$$, and what does $$on$$ mean in practice?", "answer": "$$on$$ is an indefinite pronoun that takes the same verb conjugation as $$il/elle$$ (third-person singular). In formal/written French, it means \"one\" or \"people in general\" (e.g., $$on\\ parle\\ français\\ ici$$ = \"French is spoken here\"). In modern spoken French, it has largely replaced $$nous$$ to mean \"we\" — so $$on\\ va$$ is more natural than $$nous\\ allons$$ in casual speech. This is why textbooks group it with $$il/elle$$: grammatically singular even when the meaning is plural (\"we\"). Adjectives, however, agree with the *implied* subject — so $$on\\ est\\ contents$$ (we're happy, masc. plural) is possible even though $$on$$ is grammatically singular.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "Construct the question \"What are your hobbies?\" in French and explain why $$tes$$ is used instead of $$ton$$ or $$ta$$. (2 steps)", "answer": "- Step 1: $$Quels\\ sont\\ tes\\ loisirs?$$ — note: $$quels$$ (masculine plural to agree with $$loisirs$$), $$sont$$ (third-person plural of $$être$$), $$tes$$ (informal possessive \"your\" + plural).\n- Step 2: Why $$tes$$ specifically?\n+ Possessive adjectives in French agree with the *thing possessed*, not the possessor.\n+ $$ton$$ = your (masc. sing.), $$ta$$ = your (fem. sing.), $$tes$$ = your (plural, any gender).\n+ Since $$loisirs$$ is plural, we need $$tes$$.\n\nTakeaway: Possessives agree with what's owned, not who owns it — opposite of English intuition.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "What are the three ways to form a yes/no question in French, ranked from most informal to most formal? (3 steps)", "answer": "- Step 1: **Intonation** (most informal, spoken): Keep the statement word order, raise pitch at the end. $$Tu\\ parles\\ français?$$\n- Step 2: **Est-ce que** (neutral, very common in both speech and writing): Add $$est-ce\\ que$$ to the front of the statement. $$Est-ce\\ que\\ tu\\ parles\\ français?$$ — literally \"is it that you speak French?\"\n- Step 3: **Inversion** (most formal, mostly written): Swap verb and subject pronoun, joined by a hyphen. $$Parles-tu\\ français?$$\n+ A1 learners default to intonation orally and $$est-ce\\ que$$ in writing. Inversion is recognised first, produced later.\n\nTakeaway: Same meaning, three registers — pick based on context, not preference.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Transform the question $$Tu\\ habites\\ en\\ Espagne?$$ into its $$est-ce\\ que$$ form and its inversion form. (2 steps)", "answer": "- Step 1: $$est-ce\\ que$$ form: simply prepend it — $$Est-ce\\ que\\ tu\\ habites\\ en\\ Espagne?$$ Nothing else changes.\n- Step 2: Inversion form: swap verb and pronoun with a hyphen — $$Habites-tu\\ en\\ Espagne?$$\n+ The final $$-s$$ of $$habites$$ stays; pronunciation links to $$tu$$ smoothly.\n+ Note: inversion with $$je$$ is rare and reserved for very formal phrases like $$puis-je$$.\n\nTakeaway: Three forms of the same question — each carries a different formality signature.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Numbers 1–10 in French: list them and identify the silent/tricky pronunciations. (2 steps)", "answer": "- Step 1: $$un, deux, trois, quatre, cinq, six, sept, huit, neuf, dix$$ (1 through 10).\n- Step 2: Tricky pronunciations:\n+ $$six$$ is pronounced \"siss\" when isolated, but the final $$x$$ goes silent before a consonant ($$six\\ pommes$$ = \"si pommes\") and links as \"z\" before a vowel ($$six\\ ans$$ = \"si-z-ans\").\n+ $$dix$$ follows the same pattern: \"diss\" alone, silent before consonant, \"z\" before vowel.\n+ $$sept$$ is pronounced \"set\" — the $$p$$ is silent.\n+ $$huit$$ has a silent $$t$$ before a consonant but pronounced before a vowel.\n\nTakeaway: French number pronunciation depends on what follows — it's contextual, not fixed.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "How does French construct the numbers 70, 80, and 90, and what's the underlying logic that makes it different from English? (3 steps)", "answer": "- Step 1: $$70 = soixante-dix$$ (literally \"sixty-ten\"), $$80 = quatre-vingts$$ (\"four-twenties\"), $$90 = quatre-vingt-dix$$ (\"four-twenty-ten\").\n- Step 2: This is a *vigesimal* (base-20) remnant. Old French and Celtic substrates counted in twenties — so 80 = 4 × 20 — rather than the base-10 logic English uses.\n+ Compare: Belgian/Swiss French often uses the simpler $$septante$$ (70) and $$nonante$$ (90), preserving the base-10 system.\n- Step 3: This propagates: $$71 = soixante\\ et\\ onze$$ (\"sixty and eleven\"), $$91 = quatre-vingt-onze$$ (\"four-twenty-eleven\"). You add to the previous tens marker, not start a new one.\n\nTakeaway: French numbers above 69 require arithmetic — you're literally computing $$60+10$$, $$4\\times20$$, etc.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Why does French write $$vingt-et-un$$ (21) with $$et$$ but $$vingt-deux$$ (22) without it? (2 steps)", "answer": "- Step 1: The pattern: $$et$$ (\"and\") appears only between a tens word and the number $$un$$ (1) — for $$21, 31, 41, 51, 61, 71$$.\n- Step 2: For $$22, 32$$, etc., no $$et$$ — just hyphenate: $$vingt-deux,\\ trente-trois$$.\n+ Exception: $$81$$ is $$quatre-vingt-un$$ (no $$et$$) because $$quatre-vingts$$ is itself a multiplication, not a base tens word.\n+ Exception: $$91$$ is $$quatre-vingt-onze$$ (no $$et$$) — same reason.\n\nTakeaway: $$et$$ is a leftover marker of \"twenty AND one\" linking style, preserved only for $$+1$$ on the standard tens.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Translate \"I would like the hamburger please\" into French in a restaurant context. What polite verb choices avoid sounding rude? (2 steps)", "answer": "- Step 1: Standard form: $$Je\\ voudrais\\ le\\ hamburger,\\ s'il\\ vous\\ plaît$$.\n- Step 2: Why this works:\n+ $$voudrais$$ is the conditional of $$vouloir$$, signalling politeness — never use $$je\\ veux$$ (\"I want\") in a restaurant.\n+ The definite article $$le$$ is used because you're pointing to a specific dish on the menu, not asking for \"a hamburger\" generally.\n+ $$s'il\\ vous\\ plaît$$ uses formal $$vous$$ — never use $$tu$$ with a server.\n\nTakeaway: Restaurant ordering = conditional verb + definite article + $$vous$$ form of politeness.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "What does $$Qu'est-ce\\ que\\ c'est?$$ literally mean, and when do you use it vs. $$Qu'est-ce\\ qu'il\\ y\\ a\\ dans...?$$ (3 steps)", "answer": "- Step 1: $$Qu'est-ce\\ que\\ c'est?$$ literally = \"what is it that it is?\" — i.e., \"what is this?\" Used to ask what a thing IS (its identity/name).\n- Step 2: $$Qu'est-ce\\ qu'il\\ y\\ a\\ dans...?$$ literally = \"what is it that there is in...?\" — i.e., \"what's in...?\" Used to ask about the *contents/ingredients* of something.\n- Step 3: Restaurant examples:\n+ Pointing at an unfamiliar dish: $$Qu'est-ce\\ que\\ c'est,\\ la\\ salade\\ niçoise?$$ → asking for an identification.\n+ Asking about ingredients: $$Qu'est-ce\\ qu'il\\ y\\ a\\ dans\\ la\\ salade\\ niçoise?$$ → asking what's in it.\n\nTakeaway: Use $$c'est$$ to identify, $$il\\ y\\ a\\ dans$$ to inventory contents.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "Why does French say $$il\\ y\\ a$$ for \"there is/there are,\" and how does the construction work morphologically? (3 steps)", "answer": "- Step 1: $$il\\ y\\ a$$ literally = \"it there has\" — using the impersonal $$il$$ (like English \"it\" in \"it rains\") + the locative pronoun $$y$$ (\"there\") + $$a$$ (third-person of $$avoir$$).\n- Step 2: French uses $$avoir$$ (\"to have\") to express existence, unlike English which uses \"to be.\" So \"there is bread\" = $$il\\ y\\ a\\ du\\ pain$$ — literally \"it has there some bread.\"\n- Step 3: It's invariable — singular or plural, present or fixed:\n+ \"There is a cat\" = $$il\\ y\\ a\\ un\\ chat$$\n+ \"There are three cats\" = $$il\\ y\\ a\\ trois\\ chats$$ (same verb form, no plural change)\n\nTakeaway: $$il\\ y\\ a$$ is a fixed expression — don't try to conjugate it for number.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "In a restaurant, how would you politely ask for the bill in French? Give two phrasings and identify which is more deferential. (2 steps)", "answer": "- Step 1: Common phrasings:\n+ $$L'addition,\\ s'il\\ vous\\ plaît$$ — \"the bill, please\" (short, direct, polite).\n+ $$Je\\ pourrais\\ avoir\\ l'addition,\\ s'il\\ vous\\ plaît?$$ — \"could I have the bill, please?\" (more deferential — explicit request).\n+ $$Pourrais-je\\ avoir\\ l'addition?$$ — most formal, uses inversion.\n- Step 2: Ranking from most casual to most formal:\n+ $$L'addition$$ alone = blunt.\n+ $$L'addition,\\ s'il\\ vous\\ plaît$$ = standard polite.\n+ $$Je\\ pourrais\\ avoir...$$ = softer, conditional softens further.\n+ $$Pourrais-je\\ avoir...?$$ = formal inversion, maximally polite.\n\nTakeaway: Adding a conditional verb + inversion compounds politeness.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "When making a restaurant reservation, what are the standard pieces of information the server will ask for, and how do you state a time like \"7:30 PM\" in French? (3 steps)", "answer": "- Step 1: Typical questions:\n+ $$C'est\\ pour\\ une\\ réservation?$$ — Is it for a reservation?\n+ $$À\\ quelle\\ heure?$$ — At what time?\n+ $$Pour\\ combien\\ de\\ personnes?$$ — For how many people?\n+ $$Votre\\ numéro\\ de\\ téléphone?$$ — Your phone number?\n- Step 2: To say 7:30 PM, French uses the 24-hour clock for formal contexts: $$dix-neuf\\ heures\\ trente$$ ($$19h30$$). In casual speech: $$sept\\ heures\\ et\\ demie$$ (\"seven and a half hours\") — though this is ambiguous between AM/PM unless context disambiguates.\n- Step 3: Note: $$demie$$ agrees with $$heure$$ (feminine), so it gets the $$e$$. For \"quarter past\" use $$et\\ quart$$; \"quarter to\" use $$moins\\ le\\ quart$$.\n\nTakeaway: French restaurants default to 24-hour time; conversational time uses fractions of hours.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "What's the difference between $$au\\ revoir$$, $$à\\ bientôt$$, and $$à\\ très\\ vite$$? When would you use each? (2 steps)", "answer": "- Step 1: All three are farewells but signal different expectations of reunion:\n+ $$au\\ revoir$$ = \"goodbye\" — neutral, no specific time horizon. Default for ending any interaction.\n+ $$à\\ bientôt$$ = \"see you soon\" — implies you'll meet again relatively soon but no specific date.\n+ $$à\\ très\\ vite$$ = \"see you very soon\" — more urgent/affectionate, often used with friends or in casual texts.\n- Step 2: The pattern $$à\\ +$$ [time] is the French formula for \"see you [time]\": $$à\\ demain$$ (tomorrow), $$à\\ lundi$$ (Monday), $$à\\ ce\\ soir$$ (tonight), $$à\\ plus\\ tard$$ (later).\n\nTakeaway: $$au\\ revoir$$ is neutral; $$à\\ +$$ time expressions convey warmth and specificity.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "When does the indefinite article $$un/une$$ become $$de$$ after $$il\\ y\\ a$$ in negation? Apply to \"There is no problem.\" (2 steps)", "answer": "- Step 1: The same rule as with $$avoir$$ applies to $$il\\ y\\ a$$: after negation, indefinite/partitive articles collapse to $$de$$.\n- Step 2: $$Il\\ y\\ a\\ un\\ problème$$ → $$Il\\ n'y\\ a\\ pas\\ de\\ problème$$ (\"There is no problem\").\n+ Notice $$n'$$ before $$y$$ (elision of $$ne$$ before the vowel sound of $$y$$).\n+ $$un$$ → $$de$$ because the negation zeroes the quantity.\n\nTakeaway: The negation-article rule is general — wherever a count/partitive article appears under negation, it collapses to $$de$$.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "After the verb $$c'est$$, why must the adjective be in the masculine singular form, even when describing a feminine noun? (3 steps)", "answer": "- Step 1: When you say $$c'est\\ beau$$ (\"it's beautiful\"), the subject $$ce$$ is grammatically a neutral demonstrative — it refers to a situation, idea, or thing in general, not a specific gendered noun.\n- Step 2: French has no neuter gender, so by default this neutral $$ce$$ triggers masculine singular adjective agreement.\n+ Example: pointing at a flower (feminine $$la\\ fleur$$), you still say $$c'est\\ beau$$, not $$c'est\\ belle$$.\n- Step 3: Contrast with $$elle\\ est$$ + adjective, which DOES agree with the feminine noun: $$la\\ fleur\\ est\\ belle$$ (\"the flower is beautiful\").\n+ So $$c'est\\ +$$ adjective = general/abstract = always masculine singular.\n+ $$il/elle\\ est\\ +$$ adjective = specific noun = agrees with that noun.\n\nTakeaway: $$c'est$$ acts as the closest French has to a neuter, defaulting to masculine singular.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "Days of the week and months in French — list them and note any capitalisation differences from English. (3 steps)", "answer": "- Step 1: Days: $$lundi,\\ mardi,\\ mercredi,\\ jeudi,\\ vendredi,\\ samedi,\\ dimanche$$.\n- Step 2: Months: $$janvier, février, mars, avril, mai, juin, juillet, août, septembre, octobre, novembre, décembre$$.\n- Step 3: Capitalisation rule:\n+ Unlike English, French does NOT capitalise days or months when they appear mid-sentence.\n+ Only at the start of a sentence do they get capitalised.\n+ Same rule applies to languages and nationalities used as adjectives ($$je\\ suis\\ vietnamien$$ — lowercase).\n\nTakeaway: French is much stingier with capital letters than English — days, months, languages, nationalities all stay lowercase.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "Translate \"I go to the gym four times a week\" into French. What construction expresses frequency? (2 steps)", "answer": "- Step 1: $$Je\\ vais\\ à\\ la\\ gym\\ quatre\\ fois\\ par\\ semaine$$.\n- Step 2: Breakdown:\n+ $$je\\ vais$$ = \"I go\" (first-person of irregular $$aller$$).\n+ $$à\\ la\\ gym$$ = \"to the gym\" — $$à\\ la$$ because $$gym$$ is feminine.\n+ $$quatre\\ fois\\ par\\ semaine$$ = \"four times per week\" — $$fois$$ means \"times/occurrences,\" and $$par$$ here means \"per.\"\n\nTakeaway: Frequency = [number] $$fois\\ par\\ +$$ [time unit]: $$par\\ jour,\\ par\\ semaine,\\ par\\ mois,\\ par\\ an$$.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "Why is the CEFR framework defined by \"can-do\" descriptors rather than fixed hour quotas? (3 steps)", "answer": "- Step 1: The Council of Europe designed the CEFR (Common European Framework of Reference) to be *outcome-based*: levels A1, A2, B1, B2, C1, C2 describe what a learner CAN DO with the language, not how long they studied.\n- Step 2: This is intentional because learning speed varies massively across individuals:\n+ Prior language exposure (e.g., a Spanish speaker learns French faster than a Vietnamese speaker).\n+ Learning environment (immersion vs. classroom).\n+ Quality of teaching, practice intensity, motivation.\n- Step 3: As a result, hour estimates exist only as planning heuristics from schools (like Campus Langues: A1→A2 ≈ 100–120h) — not official CEFR rules. Two learners can both be \"B1\" with vastly different total hours invested.\n\nTakeaway: CEFR measures competence, not time spent — hours are planning estimates, never definitions.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "Roughly how many guided hours does it take to go from A1 to B2 in French, and what's the rationale for adding a buffer to raw estimates? (3 steps)", "answer": "- Step 1: Raw transition estimates from Campus Langues: A1→A2 ≈ 100–120h, A2→B1 ≈ 180–200h, B1→B2 ≈ 200–250h. Sum of midpoints ≈ 525h.\n- Step 2: A 20% \"exam-readiness\" buffer is added because finishing course content ≠ being able to pass a four-skill exam (DELF/TCF). The buffer accounts for:\n+ Building reliable output (speaking, writing) beyond passive recognition.\n+ Timed-exam practice and stress management.\n+ Consolidating fluency, not just knowledge.\n- Step 3: Buffered total: A1→B2 ≈ 630 guided hours.\n+ Then add a *calendar* buffer (~15%) for missed weeks, holidays, exam stress — gives realistic month/year projections.\n\nTakeaway: Plan with 630 guided hours for A1→B2, then convert to time using your weekly load.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "Why is school-only attendance (2 lessons per week) insufficient to reach B2 in a reasonable timeframe? (3 steps)", "answer": "- Step 1: 2 lessons × 90 min = 3 hours of class per week. With ~50 productive weeks/year, that's ~150 guided hours/year.\n- Step 2: To reach B2 (≈630h), at 150h/year, you need **~4+ years** of pure class attendance — and that's without missing any weeks.\n- Step 3: Why this fails:\n+ Language acquisition requires consolidation between lessons — passive class time alone doesn't build active recall, vocabulary depth, or speaking fluency.\n+ Without after-lesson review and daily practice, much of class is re-learning forgotten material.\n+ Adding even 20 min/day of self-study + 30 min review per lesson roughly *doubles* the effective hours, halving the timeline.\n\nTakeaway: Lessons alone are inputs; mastery requires repeated retrieval — which happens outside class.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "What official French-administration level is required for naturalisation/French nationality, and what level for higher education in France? (2 steps)", "answer": "- Step 1: **Naturalisation/French nationality**: B2 in both oral and written French (per Service-Public, the French government portal).\n- Step 2: **French higher education**: B2 is the typical minimum; C1 is strongly recommended for humanities, social sciences, and demanding programmes (per Campus France).\n+ Lower admin thresholds: A2 for the multi-year residence card ($$carte\\ de\\ séjour\\ pluriannuelle$$); B1 for the long-term resident card ($$carte\\ de\\ résident$$).\n\nTakeaway: B2 is the gateway level for both citizenship and university — it's the practical end-target for serious learners.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "What is the DELF, who issues it, and what's special about its validity? (2 steps)", "answer": "- Step 1: DELF (Diplôme d'études en langue française) is the official French language diploma, issued by France Education International on behalf of the French Ministry of National Education. It has separate independent diplomas for A1, A2, B1, B2 — each a freestanding certificate.\n- Step 2: Special features:\n+ Internationally recognised across academic and professional contexts.\n+ **Valid for life** — unlike many language certifications (TOEFL/IELTS expire in 2 years), DELF never expires.\n+ Tests all four skills: listening, reading, writing, speaking.\n\nTakeaway: DELF is the gold-standard French qualification — permanent and globally recognised.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "Why does the partitive article take three forms ($$du, de\\ la, des$$), and what determines which to use? (3 steps)", "answer": "- Step 1: The partitive expresses \"some/a portion of\" an uncountable noun. Its form depends on the gender and number of the noun:\n+ $$du$$ = partitive for masculine singular nouns ($$du\\ pain,\\ du\\ café$$).\n+ $$de\\ la$$ = partitive for feminine singular nouns ($$de\\ la\\ crème,\\ de\\ la\\ viande$$).\n+ $$des$$ = partitive for plural nouns ($$des\\ épinards$$).\n- Step 2: Before a vowel sound, $$de\\ la$$ becomes $$de\\ l'$$ ($$de\\ l'eau$$ — \"some water\") — elision rule.\n- Step 3: Origin: these are contractions of $$de\\ +$$ definite article. $$de\\ +\\ le = du$$; $$de\\ +\\ les = des$$; $$de\\ la$$ stays as-is because $$la$$ doesn't contract.\n+ Conceptually: \"some bread\" = \"of the bread\" — you're taking *a part of* the whole.\n\nTakeaway: Partitive = $$de\\ +$$ definite article, agreeing with the noun's gender and number.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Compare $$Je\\ vais\\ prendre\\ le\\ hamburger$$ with $$Je\\ prends\\ le\\ hamburger$$. What's the nuance? (2 steps)", "answer": "- Step 1: $$Je\\ prends$$ = \"I take/am taking\" — present tense, immediate.\n- Step 2: $$Je\\ vais\\ prendre$$ = \"I'm going to take\" — *futur proche* (near future), formed with present of $$aller$$ + infinitive.\n+ In restaurant ordering, both are acceptable, but $$je\\ vais\\ prendre$$ is slightly more polite — it signals \"I'm about to commit\" rather than \"I take this now.\"\n+ Functionally equivalent to English \"I'll have the hamburger\" vs. \"I'm taking the hamburger.\"\n\nTakeaway: $$aller +$$ infinitive = near future, very common for stated intentions.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "What does $$Est-ce que vous les voulez en même temps?$$ mean, and what's $$en même temps$$ doing structurally?", "answer": "It means \"Would you like them at the same time?\" — a server asking whether dishes should arrive together. Breakdown: $$est-ce que$$ = question marker; $$vous\\ les\\ voulez$$ = \"you want them\" ($$les$$ is the object pronoun \"them,\" placed BEFORE the verb in French, not after as in English); $$en\\ même\\ temps$$ is a fixed adverbial phrase meaning \"at the same time\" — literally \"in same time.\" Note the word order: French object pronouns precede the verb, which is one of the biggest structural differences from English (\"I see them\" = $$je\\ les\\ vois$$, not $$je\\ vois\\ les$$).", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Give a simple mental exercise: convert the statement $$Vous regardez la télévision le soir$$ into all three question forms. (3 steps)", "answer": "- Step 1: **Intonation**: keep word order, raise pitch → $$Vous\\ regardez\\ la\\ télévision\\ le\\ soir?$$\n- Step 2: **Est-ce que**: prepend → $$Est-ce\\ que\\ vous\\ regardez\\ la\\ télévision\\ le\\ soir?$$\n- Step 3: **Inversion**: swap subject and verb with hyphen → $$Regardez-vous\\ la\\ télévision\\ le\\ soir?$$\n+ All three mean \"Do you watch TV in the evening?\" — only register differs.\n\nTakeaway: One statement → three question forms by mechanical transformation, no meaning change.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "When introducing yourself in French (name, age, location, profession), in what order do these typically come and what verbs power each? (3 steps)", "answer": "- Step 1: A natural opening sequence:\n+ Name: $$Je\\ m'appelle\\ Phuc$$ ($$s'appeler$$ — reflexive verb, literally \"I call myself\").\n+ Age: $$J'ai\\ 25\\ ans$$ ($$avoir$$ — \"to have\" + years).\n- Step 2: Location: $$J'habite\\ à\\ Paris$$ ($$habiter$$ — \"to live/reside\" + $$à$$ for cities).\n+ For countries with feminine names: $$en France$$; masculine: $$au Japon$$; plural: $$aux États-Unis$$.\n- Step 3: Nationality/profession:\n+ $$Je\\ suis\\ vietnamien$$ ($$être$$ + adjective; agrees in gender — $$vietnamienne$$ for feminine).\n+ $$Je\\ suis\\ ingénieur$$ ($$être$$ + profession; NO article in French unlike English \"I am an engineer\").\n\nTakeaway: French uses $$avoir$$ for age, $$être$$ for nationality/profession (no article), and reflexive $$s'appeler$$ for name — each piece has its own verb logic.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "Why does French say $$Je\\ suis\\ ingénieur$$ without an article, even though English requires \"I am AN engineer\"?", "answer": "When stating a profession, nationality, or religion with $$être$$, French treats the noun as describing a state/category rather than identifying a specific instance — so no article is needed. This contrasts with English, which always requires \"a/an\" before a singular countable noun. However, the article reappears if you modify the noun with an adjective: $$Je\\ suis\\ un\\ bon\\ ingénieur$$ (\"I am a good engineer\") — the qualifier turns it back into a \"specific instance\" requiring the indefinite article. Same rule: $$Elle\\ est\\ médecin$$ vs $$Elle\\ est\\ un\\ médecin\\ célèbre$$.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "What are the four seasons in French, and which preposition do you use to say \"in [season]\"? (2 steps)", "answer": "- Step 1: $$le\\ printemps$$ (spring), $$l'été$$ (summer), $$l'automne$$ (autumn), $$l'hiver$$ (winter). All four are masculine.\n- Step 2: Preposition for \"in [season]\":\n+ $$au\\ printemps$$ (spring uses $$au$$ — contraction of $$à\\ +\\ le$$).\n+ $$en\\ été,\\ en\\ automne,\\ en\\ hiver$$ (the other three use $$en$$ because they start with a vowel sound).\n\nTakeaway: Spring is the oddball — it takes $$au$$ while the others take $$en$$, an exception worth memorising.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": false}, {"question": "A waiter says $$Avez-vous fait votre choix?$$ — what does this literally mean, and what's $$avoir$$ doing here grammatically?", "answer": "Literally: \"Have you made your choice?\" — equivalent to \"Are you ready to order?\" Grammatically, this is the **passé composé** (compound past), formed with auxiliary $$avoir$$ (\"to have\") + past participle ($$fait$$ from $$faire$$, \"to do/make\"). This is the same structure as English \"I have eaten\" — but French uses it much more broadly to express any completed past action. The inversion $$avez-vous$$ marks it as a formal question. Note: the auxiliary $$avoir$$ vs $$être$$ choice is one of the trickiest parts of past tense for A1→A2 learners; most verbs use $$avoir$$, but movement/state-change verbs (and all reflexives) use $$être$$.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "What's the difference between $$à l'intérieur$$ and $$en terrasse$$ in a restaurant context, and what do these reveal about French preposition logic? (2 steps)", "answer": "- Step 1: $$à\\ l'intérieur$$ = \"inside\" (literally \"at the interior\"), used for being inside a building. $$en\\ terrasse$$ = \"on the terrace\" (outdoor seating).\n- Step 2: French preposition logic:\n+ $$à$$ + definite article = a specific location (\"at the X\").\n+ $$en$$ + noun (no article) = a more general location/mode, often abstract or institutional (e.g., $$en\\ France,\\ en\\ classe,\\ en\\ vacances$$).\n+ $$en\\ terrasse$$ uses $$en$$ because it's treated almost as a \"mode\" of dining, not a specific physical terrace.\n\nTakeaway: Same idea (\"location\"), but $$à$$ pins to a specific place, while $$en$$ describes a general state/mode.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Identify the gender of these nouns and explain how you'd predict gender for unfamiliar nouns: $$plat, carafe, addition, saumon, crème, salade$$. (3 steps)", "answer": "- Step 1: Genders:\n+ Masculine: $$le\\ plat,\\ le\\ saumon$$.\n+ Feminine: $$la\\ carafe,\\ l'addition,\\ la\\ crème,\\ la\\ salade$$.\n- Step 2: Heuristics (not absolute rules):\n+ Nouns ending in $$-tion,\\ -sion$$ are almost always feminine ($$addition,\\ réservation,\\ télévision$$).\n+ Nouns ending in $$-e$$ are often feminine ($$carafe,\\ crème,\\ salade$$) — but plenty of exceptions ($$le\\ verre,\\ le\\ problème$$).\n+ Nouns ending in consonants are often masculine ($$plat,\\ saumon,\\ chocolat$$) — also with exceptions.\n- Step 3: Rule of thumb: **always learn the article with the noun** ($$le\\ plat$$, not just $$plat$$). Gender is unpredictable enough that memorisation beats guessing.\n\nTakeaway: Gender suffixes give you a 70-80% guess, but article-with-noun memorisation is the only reliable strategy.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "What does $$Je\\ reviens\\ tout\\ de\\ suite$$ mean, and what's the structural logic of $$tout\\ de\\ suite$$?", "answer": "It means \"I'll be right back\" or \"I'm coming back right away,\" typically said by a server. $$Je\\ reviens$$ = present tense of $$revenir$$ (\"to come back\"), used here with future meaning (French often uses present for imminent future). $$Tout\\ de\\ suite$$ literally = \"all of following\" → \"immediately/right away.\" It's a fixed idiomatic phrase; don't try to parse it word-by-word in meaning. Compare to $$tout\\ à\\ l'heure$$ (\"a little while ago\" or \"in a little while\" depending on tense context). French has many such time adverbs that work as memorised units.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "Mental exercise: you want to make a reservation for 2 people tonight at 8 PM. Construct the full request to the host. (3 steps)", "answer": "- Step 1: Open with a greeting: $$Bonsoir$$ (evening greeting; use $$bonjour$$ during the day).\n- Step 2: State the request: $$J'aimerais\\ faire\\ une\\ réservation\\ pour\\ ce\\ soir$$ (\"I'd like to make a reservation for tonight\"). Note conditional $$j'aimerais$$ for politeness.\n- Step 3: Specify time and number:\n+ Time: $$à\\ 20h$$ ($$à\\ vingt\\ heures$$ — formal 24h clock) or $$à\\ huit\\ heures$$ (informal).\n+ People: $$pour\\ deux\\ personnes,\\ s'il\\ vous\\ plaît$$.\n+ Full request: $$Bonsoir,\\ j'aimerais\\ faire\\ une\\ réservation\\ pour\\ ce\\ soir\\ à\\ 20h\\ pour\\ deux\\ personnes,\\ s'il\\ vous\\ plaît$$.\n\nTakeaway: Greeting → polite intent verb → time → number of people → politeness marker.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "What's the underlying reason a phrase like $$Quatre-vingts$$ has an $$-s$$ but $$Quatre-vingt-un$$ drops it? (2 steps)", "answer": "- Step 1: $$Vingt$$ (twenty) and $$cent$$ (hundred) take a plural $$-s$$ when they are *multiplied* and NOT followed by another number.\n+ $$quatre-vingts$$ = 4 × 20 (no number after) → keeps the $$s$$.\n+ $$quatre-vingt-un$$ = 4 × 20 + 1 (number after) → drops the $$s$$.\n- Step 2: Same rule for $$cent$$:\n+ $$deux\\ cents$$ (200) keeps the $$s$$.\n+ $$deux\\ cent\\ un$$ (201) drops it.\n\nTakeaway: French marks plurals on multiplied tens/hundreds only when \"final\" — adding a unit afterwards consumes the $$s$$.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "What does the term \"guided hours\" mean in language-learning roadmaps, and what does NOT count as a guided hour? (3 steps)", "answer": "- Step 1: **Guided hours** include any *structured, deliberate* learning activity:\n+ School lesson time.\n+ Teacher-assigned platform or workbook exercises.\n+ Active after-lesson review (rewriting notes, redoing exercises).\n+ Corrected writing or speaking practice.\n+ Timed exam practice.\n- Step 2: Active listening with comprehension exercises also counts — but only when you're actively engaged (taking notes, answering questions, shadowing).\n- Step 3: What does NOT count as a guided hour:\n+ Passive background music in French.\n+ Casual scrolling through French social media without engagement.\n+ Watching Netflix in French without active comprehension work.\n+ These are valuable as *exposure* but should be treated as bonuses, not as primary study hours.\n\nTakeaway: Guided = deliberate + structured + corrective feedback loop. Passive exposure is supplement, not core.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "Among the seven scenarios in the roadmap (S1–S7), why is S3 recommended as the \"best balanced\" path for A1→B2 within ~2 years?", "answer": "S3 combines 2 lessons/week (the standard school load) + 1 hour of post-lesson review + 20 minutes of daily practice. This stacks three independent reinforcement mechanisms: the lessons provide new input, the review consolidates what was just taught, and daily practice (vocab/listening) maintains and extends retention. The total effective weekly hours reach a threshold where progress is sustainable without burnout. S3 reaches B2 in ~1.9 years — much faster than school-only (4.6 years) but not as demanding as S7 (1.4 years with 3 lessons/week). It balances time investment against life constraints, making it the sustainable sweet spot.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Quick mental exercise: if you study at the S3 pace (~6h/week) and need 630 guided hours for A1→B2, roughly how many calendar months will you need (before adding any buffer)? (2 steps)", "answer": "- Step 1: $$\\frac{630\\ \\text{hours}}{6\\ \\text{hours/week}} = 105\\ \\text{weeks}$$.\n- Step 2: Convert weeks to months: $$\\frac{105}{4.3\\ \\text{weeks/month}} \\approx 24\\ \\text{months} = 2\\ \\text{years}$$.\n+ Then add a ~15% real-life buffer (missed weeks, holidays, exams): ~28 months ≈ 2.3 years.\n+ The roadmap table's ~1.9 years for S3 is slightly faster because the productive weekly hours are slightly higher than 6 in practice.\n\nTakeaway: Mental shortcut: hours ÷ weekly load = weeks; ÷ 4.3 = months; × 1.15 buffer for reality.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "Why does Cambridge English suggest ~200 guided hours per CEFR level transition, while Campus Langues gives lower estimates for A1→A2 (100–120h)? (3 steps)", "answer": "- Step 1: Cambridge's estimate (~200h/level) is for English learners, averaging across the whole CEFR ladder. Lower levels (A1→A2) typically need fewer hours than higher transitions (B1→B2) because early grammar/vocabulary is more contained.\n- Step 2: Campus Langues' French-specific ladder reflects this pattern:\n+ A1→A2: 100–120h (basic survival, limited grammar scope).\n+ A2→B1: 180–200h (significant jump — past tenses, more grammar, more vocabulary).\n+ B1→B2: 200–250h (longest transition — argumentation, complex texts, fluent output).\n- Step 3: So both sources roughly agree on the *total* A1→B2 (~500–600h raw) but distribute hours differently across transitions. Higher levels require disproportionately more time because language complexity scales nonlinearly.\n\nTakeaway: Hours per level grow with level — B2 is the steepest climb because it requires productive fluency, not just recognition.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "What is the Qualité FLE label, and why does Campus France recommend choosing schools with this certification? (2 steps)", "answer": "- Step 1: **Qualité FLE** is an official quality label initiated by three French ministries to identify and promote French-as-a-foreign-language (FLE) centres whose teaching and services meet recognised quality standards.\n- Step 2: Why it matters:\n+ Guarantees CEFR-aligned curriculum, qualified teachers, placement testing, structured progression.\n+ Signals the school is taken seriously by French institutions — which matters if you'll later present DELF/TCF results for naturalisation or university.\n+ Apps and casual tutors (Duolingo, Preply) can supplement, but Qualité FLE schools offer the structured backbone needed for B2-level documentation.\n\nTakeaway: For serious learners targeting B2 for official purposes, choose Qualité FLE schools as your structured backbone.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}], "count": 50}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "In French, when do you use *un/une* versus *du/de la/des*? Give a way to remember it without memorizing every case. (3 steps)", "answer": "- Step 1: *Un/une* (and plural *des* as \"some countable items\") refer to countable, whole items — \"a chocolate,\" \"a coffee cup.\" You can point at it and count it.\n- Step 2: *Du/de la/des* are partitive articles meaning \"some of\" an uncountable substance or an unspecified portion — \"some chocolate (mass),\" \"some coffee (liquid),\" \"some water.\"\n+ *Du* before masculine nouns: *du café, du saumon*\n+ *De la* before feminine nouns: *de la crème brûlée, de la salade*\n+ *Des* before plural nouns: *des chocolats*\n- Step 3: The mental test: can you eat/drink/use just a piece of it without it being \"one whole unit\"? If yes, partitive. *J'ai un chocolat* = one chocolate bar. *J'ai du chocolat* = some chocolate (a portion, possibly melted, smeared, etc.).\n\nTakeaway: countable whole → un/une/des; portion of a mass → du/de la/des (partitive).", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "Conjugate *avoir* (to have) in the present tense for all six persons, and explain what makes this verb irregular.", "answer": "- Step 1: The forms are:\n+ *j'ai* (I have)\n+ *tu as* (you have, informal)\n+ *il/elle/on a* (he/she/one has)\n+ *nous avons* (we have)\n+ *vous avez* (you have, formal/plural)\n+ *ils/elles ont* (they have)\n- Step 2: It's irregular because the stem changes dramatically across persons — *ai, as, a, av-, av-, ont*. There is no clean \"avoir + ending\" pattern like regular *-er* verbs.\n- Step 3: This irregularity matters because *avoir* is also the main auxiliary for the passé composé (past tense), so you'll use these forms constantly to build past sentences like *j'ai mangé*.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "How do you form the negative of *avoir*? Apply it to \"we don't have a reservation.\" (2 steps)", "answer": "- Step 1: The negative wraps the verb in *ne ... pas*. So *nous avons* → *nous n'avons pas* (the *ne* elides to *n'* before a vowel).\n- Step 2: \"We don't have a reservation\" = *Nous n'avons pas de réservation*. Note: after a negative, *une/un/du/de la/des* become **de** — so it's *pas de réservation*, not *pas une réservation*.\n\nThe \"de\" rule after negation is a key A1 trap — the article collapses to *de* because you're negating the existence entirely.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "Why does *un/une/des* become *de* after a negation in French? (2 steps)", "answer": "- Step 1: Logically, when you say \"I don't have any X,\" you're not specifying a quantity — you're denying the whole thing. French marks this by collapsing all indefinite/partitive articles into a single neutral *de*.\n+ *J'ai un chocolat* → *Je n'ai pas **de** chocolat*\n+ *J'ai du café* → *Je n'ai pas **de** café*\n+ *J'ai des amis* → *Je n'ai pas **d'**amis*\n- Step 2: Exception: this does NOT apply with *être*. *C'est un problème* → *Ce n'est pas **un** problème* (article kept). The \"de\" rule is tied to verbs of possession/existence like *avoir, il y a*.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "What's the difference between *je voudrais*, *je pourrais*, and *j'aimerais* when ordering food? (3 steps)", "answer": "- Step 1: All three are polite conditional forms meaning roughly \"I would like / I could have.\" They're interchangeable in a restaurant context.\n+ *Je voudrais* = \"I would like\" (from *vouloir*, to want)\n+ *J'aimerais* = \"I would like\" (from *aimer*, to love/like)\n+ *Je pourrais avoir* = \"Could I have\" (from *pouvoir*, to be able)\n- Step 2: Why use them instead of *je veux* (I want)? *Je veux* sounds blunt, even rude, in a service context. The conditional softens the request — it's the French equivalent of \"I'd like\" vs. \"I want.\"\n- Step 3: *Je vais prendre* (\"I'm going to take\") is even more casual and direct, but acceptable. *Je voudrais* is the safest formal default.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "A French waiter asks *\"Quelle cuisson pour la viande?\"* — what are they asking, and what are the four standard responses? (2 steps)", "answer": "- Step 1: They're asking \"What cooking [doneness] for the meat?\" — i.e., how would you like it cooked?\n- Step 2: The four standard answers from rarest to most cooked:\n+ *Bleu* — very rare (literally \"blue,\" barely cooked inside)\n+ *Saignant* — rare (literally \"bleeding\")\n+ *À point* — medium rare (the French default, \"to the point\")\n+ *Bien cuit* — well done\n\nCultural note: *à point* is the French standard; asking for *bien cuit* is often seen as wasting good meat.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "How do you ask for the bill in French, formally? Give two equivalent ways.", "answer": "Both are polite conditional requests:\n+ *L'addition / la note, s'il vous plaît* — \"The bill, please\" (most common, very polite by tone)\n+ *Je pourrais avoir l'addition, s'il vous plaît?* — \"Could I have the bill, please?\" (full sentence form)\n+ *Pourrais-je avoir l'addition?* — same meaning, with inversion, slightly more formal.\n\nThe key politeness markers: conditional verb (*pourrais*) + *s'il vous plaît* (formal \"please\"). Use *s'il te plaît* only with friends/family.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "When introducing yourself in French, how do you say your age and why is the verb choice surprising for English speakers? (2 steps)", "answer": "- Step 1: You say *J'ai 25 ans* — literally \"I **have** 25 years.\" French uses *avoir* (to have), not *être* (to be), for age.\n- Step 2: This trips up English speakers who say *Je suis 25* (literally \"I am 25\"), which is wrong. French treats age as something you possess (a count of years), not something you are. Same logic for hunger (*j'ai faim* = \"I have hunger\") and thirst (*j'ai soif*).\n\nPattern to remember: states that you *accumulate over time* (age, hunger, thirst, fear) use *avoir* in French.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "What are the three ways to form a yes/no question in French, and when is each used? (3 steps)", "answer": "- Step 1: **Intonation** — keep the statement, raise voice at the end. *Tu habites en Espagne?* This is the most casual, used in everyday speech.\n- Step 2: **Est-ce que** — add *est-ce que* at the start. *Est-ce que tu habites en Espagne?* Neutral register, works in both speech and writing. Very common.\n- Step 3: **Inversion** — swap verb and pronoun, joined by a hyphen. *Habites-tu en Espagne?* This is formal, mostly written, or used in polished speech. In professional or written contexts, inversion signals respect/care.\n\nMental model: intonation = casual, *est-ce que* = neutral, inversion = formal.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "Why does French add a hyphen and sometimes a \"-t-\" in inverted questions like *A-t-il un livre?* (2 steps)", "answer": "- Step 1: When you invert a verb ending in a vowel with a pronoun starting with a vowel (*il, elle, on*), the two vowels would clash phonetically — *a il* sounds awkward. French inserts a euphonic *-t-* purely for pronunciation: *a-t-il*.\n- Step 2: The hyphen marks the inversion structurally — it tells the reader \"this is a question, not a statement.\" So *il a* (statement) becomes *a-t-il?* (question), with the *-t-* as a phonetic bridge.\n\nYou won't see the *-t-* with verbs already ending in -t or -d: *prend-il?* (no extra t needed).", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "What does *Qu'est-ce que c'est?* literally break down into, and why does French need such a long phrase for \"What is it?\" (2 steps)", "answer": "- Step 1: Word by word: *Que* (what) + *est-ce que* (is it that) + *c'est* (it is) = \"What is it that it is?\" — French stacks question machinery for emphasis and clarity.\n- Step 2: Why so long? Historically, French question words felt incomplete on their own, so the language grew the *est-ce que* scaffold to mark \"this is a question.\" Modern speakers say it as one chunk — pronounced roughly *keske-sé* — and treat it like a single word meaning \"what is.\"\n\nYou can also say *C'est quoi?* in casual speech — same meaning, much shorter, but informal.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Conjugate *être* (to be) in the present tense, positive and negative.", "answer": "- Step 1: Positive forms:\n+ *je suis, tu es, il/elle/on est, nous sommes, vous êtes, ils/elles sont*\n- Step 2: Negative forms (wrap each with *ne ... pas*):\n+ *je ne suis pas, tu n'es pas, il/elle/on n'est pas, nous ne sommes pas, vous n'êtes pas, ils/elles ne sont pas*\n- Step 3: Notice *ne* elides to *n'* before vowels (*n'es, n'est, n'êtes, n'ont*) — French avoids vowel-vowel collisions across words for fluency.\n\n*Être* is irregular and the most-used verb in French — memorize all six forms cold.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "Why does French say *avez-vous une réservation?* and not *vous avez une réservation?* in a formal restaurant context?", "answer": "Both are grammatically correct, but the inverted form *avez-vous* signals formality and politeness. In customer service, a professional waiter uses inversion to show respect — it mirrors the tone of \"Have you got a reservation, sir?\" in English. The intonation version *vous avez une réservation?* is more casual and might be heard between friends managing a booking. Inversion = professional register.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "In the numbers 70, 80, 90 in standard French, what unusual arithmetic appears, and why? (3 steps)", "answer": "- Step 1: French doesn't have single words for 70, 80, 90. Instead:\n+ 70 = *soixante-dix* (sixty-ten, i.e. 60+10)\n+ 80 = *quatre-vingts* (four-twenties, i.e. 4×20)\n+ 90 = *quatre-vingt-dix* (four-twenty-ten, i.e. 4×20+10)\n- Step 2: This is a remnant of an old Celtic/Gaulish vigesimal (base-20) counting system that survived in French but was replaced in most Romance languages. Spanish and Italian have clean words (*setenta, ochenta, noventa*).\n- Step 3: Consequence for counting: 71 = *soixante-et-onze* (60+11), 91 = *quatre-vingt-onze* (80+11). You keep adding *onze, douze, treize...* to reach 79 and 99. Belgian and Swiss French use the cleaner *septante* (70) and *nonante* (90).", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "How would you say \"21,\" \"31,\" and \"81\" in French, and what pattern (and exception) appears? (2 steps)", "answer": "- Step 1: For 21, 31, 41, 51, 61, 71: French inserts *-et-* before *un* or *onze*:\n+ 21 = *vingt-et-un*\n+ 31 = *trente-et-un*\n+ 71 = *soixante-et-onze*\n- Step 2: Exception: 81 and 91 do NOT use *et*:\n+ 81 = *quatre-vingt-un* (no *et*)\n+ 91 = *quatre-vingt-onze* (no *et*)\n\nThe *et* is a leftover from older French that survived in most \"-1\" numbers but was dropped in the *quatre-vingt-* family. Just memorize: *et* exists for 21-71, vanishes at 81 and 91.", "source": "Opus 4.7 ②", "_id": "op
