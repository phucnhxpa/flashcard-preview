us_2_14", "judge_pick": false}, {"question": "A waiter says *\"Souhaiteriez-vous une bouteille d'eau gazeuse ou d'eau plate?\"* — translate and explain the two water options. (2 steps)", "answer": "- Step 1: \"Would you like a bottle of sparkling water or still water?\" *Souhaiteriez* is the conditional of *souhaiter* (to wish) — the most formal version of \"would you like.\"\n- Step 2: The two options:\n+ *Eau gazeuse* — sparkling/carbonated water (literally \"gassy water\")\n+ *Eau plate* — still water (literally \"flat water\")\n\nBonus: if you just want tap water for free, ask for *une carafe d'eau* — French restaurants are legally required to provide it.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "Why does French say *c'est beau* (not *c'est belle*) even when describing a feminine noun like *la robe*? (2 steps)", "answer": "- Step 1: When the adjective comes right after *c'est* (it is) without a noun attached, French defaults to the **masculine singular** form. *C'est beau* = \"It's beautiful\" as a general exclamation.\n- Step 2: But if the adjective directly modifies a feminine noun, it agrees: *la robe est belle* (the dress is beautiful). The rule: *c'est + adj* → masculine default; *noun + est + adj* → agrees with the noun.\n\nMental model: *c'est* refers to the abstract situation/idea, which has no gender, so French picks the unmarked masculine form.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": true}, {"question": "What is the difference between *au revoir*, *à bientôt*, and *à très vite*?", "answer": "All three are farewells but carry different time expectations:\n+ *Au revoir* — \"goodbye\" (literally \"to the re-seeing\"). Neutral, used any time you leave, even if you'll never see the person again. Default polite goodbye.\n+ *À bientôt* — \"see you soon.\" Implies you'll see them within days or a week.\n+ *À très vite* — \"see you very soon\" (literally \"to very fast\"). Even more immediate or affectionate — used between friends expecting to meet again shortly.\n\nMental model: *au revoir* = transactional, *à bientôt/à très vite* = warmer, with a future meeting implied.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "What's the difference between using *tu* and *vous* when addressing one person? (3 steps)", "answer": "- Step 1: *Tu* is informal/singular — used with friends, family, children, peers, and people your age in casual settings.\n- Step 2: *Vous* is formal singular OR plural (any number of people). Use it with:\n+ Strangers, especially older or in positions of authority\n+ Waiters, shopkeepers, professionals you don't know\n+ Any group of people\n- Step 3: Why the formality split? French preserved a Roman-era distinction between intimate and respectful address. Using *tu* with a stranger can feel rude; using *vous* with a close friend can feel cold. Default to *vous* until invited to use *tu* (\"*on peut se tutoyer*\").", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "Translate and explain the structure of *\"Tu travailles dans quoi?\"* (2 steps)", "answer": "- Step 1: Literally: \"You work in what?\" — meaning \"What do you do for work?\" / \"What field are you in?\"\n- Step 2: Structurally, this is the **casual intonation question** with *quoi* (the informal \"what\") placed at the end. The formal equivalent would be *Dans quoi travailles-tu?* or *Dans quel domaine travaillez-vous?* The end-placed *quoi* is a hallmark of spoken French.\n\nUseful answer pattern: *Je suis [profession] dans [field]* — e.g., *Je suis ingénieur dans l'intelligence artificielle*.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "List the seven days of the week in French and explain why none of them are capitalized. (2 steps)", "answer": "- Step 1: *lundi, mardi, mercredi, jeudi, vendredi, samedi, dimanche* (Monday through Sunday). Note the week starts on Monday in French convention.\n- Step 2: Unlike English, French does NOT capitalize days, months, or nationalities (as adjectives). *Je suis vietnamien* (lowercase). Capitalization in French is reserved for proper nouns and sentence beginnings — days/months are seen as common nouns.\n\nThe names come from Roman gods/planets: *lundi* (Luna/moon), *mardi* (Mars), *mercredi* (Mercury), *jeudi* (Jupiter), *vendredi* (Venus), *samedi* (Saturn/Sabbath), *dimanche* (Lord's day).", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "List the four seasons in French and identify the one that \"doesn't fit\" the pattern. (2 steps)", "answer": "- Step 1: The four seasons:\n+ *le printemps* — spring\n+ *l'été* — summer\n+ *l'automne* — autumn/fall\n+ *l'hiver* — winter\n- Step 2: *Le printemps* is the odd one out — three of the four start with a vowel (*été, automne, hiver*) so the article elides to *l'*, but *printemps* starts with a consonant (*p*) so it keeps the full *le*. Also, \"in spring\" uses a different preposition: *au printemps* vs. *en été, en automne, en hiver*.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "What's the difference between *J'habite à Paris* and *Je suis à Paris*? (2 steps)", "answer": "- Step 1: *J'habite à Paris* uses the verb *habiter* (to live/reside) — it means \"I live in Paris\" as a permanent residence.\n- Step 2: *Je suis à Paris* uses *être* (to be) — it means \"I am in Paris\" right now, which could be temporary (visiting, on a trip).\n\nThe verb choice carries the duration: *habiter* = home base; *être* + location = current whereabouts.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "When ordering food, what's the subtle difference between *Je vais prendre le hamburger* and *Je voudrais le hamburger*? (2 steps)", "answer": "- Step 1: *Je vais prendre* literally \"I'm going to take\" — direct, decisive, slightly more casual. It announces your choice as already made.\n- Step 2: *Je voudrais* literally \"I would like\" — uses the conditional mood, which is the politeness softener in French. It frames the order as a polite request rather than a declaration.\n\nBoth are completely acceptable in restaurants. *Je voudrais* is slightly safer in formal settings; *Je vais prendre* is fine in cafés or with friendly waiters.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "How do you say \"four times a week\" in French, and what's the structure for expressing frequency? (2 steps)", "answer": "- Step 1: *Quatre fois par semaine* — literally \"four times per week.\" The structure is **[number] + fois + par + [time unit]**.\n- Step 2: Examples:\n+ *Une fois par jour* — once a day\n+ *Deux fois par mois* — twice a month\n+ *Trois fois par an* — three times a year\n\n*Par* here means \"per/by\" — it's the distributor word. The noun after *par* stays in the singular (*par semaine*, not *par semaines*).", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "A French speaker asks *\"À l'intérieur ou en terrasse?\"* — what are they asking, and why are the prepositions different? (2 steps)", "answer": "- Step 1: \"Inside or on the terrace?\" — they're asking where you want to sit at the restaurant.\n- Step 2: The prepositions differ because:\n+ *À l'intérieur* uses *à* + definite article *l'* — \"at the inside,\" because *intérieur* is a noun referring to a defined space.\n+ *En terrasse* uses *en* — a preposition often used for general locations or \"modes\" of being (*en ville, en France, en voiture*). It treats *terrasse* as a state/mode of dining rather than a specific spot.\n\nYou'd hear similar pairs: *à la maison* (at home, specific) vs. *en vacances* (on vacation, mode).", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "Practice mini-exercise: Convert this casual question to *est-ce que* form and then to inversion form: *\"Tu parles français?\"* (2 steps)", "answer": "- Step 1: *Est-ce que* form: prefix *est-ce que* to the statement. → *Est-ce que tu parles français?*\n- Step 2: Inversion form: swap subject pronoun and verb with a hyphen. → *Parles-tu français?*\n\nAll three versions (\"Tu parles français?\", \"Est-ce que tu parles français?\", \"Parles-tu français?\") have identical meaning — only the register changes: casual → neutral → formal.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Practice mini-exercise: Negate this sentence: *\"Il a un problème.\"* What two things change? (2 steps)", "answer": "- Step 1: Wrap the verb with *ne ... pas*: *Il **n'**a **pas** un problème*.\n- Step 2: Apply the \"de\" rule — after negation, the indefinite article *un* becomes *de*: *Il n'a pas **de** problème*.\n\nFinal answer: *Il n'a pas de problème*. Two changes: (1) *ne ... pas* around the verb, (2) *un → de* because of negation after *avoir*.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "What is the CEFR, who defines it, and why does it use \"can-do\" descriptors instead of fixed hour requirements? (3 steps)", "answer": "- Step 1: CEFR = Common European Framework of Reference for Languages. It's defined by the **Council of Europe** and standardizes language ability across A1 (beginner) to C2 (mastery).\n- Step 2: It uses **can-do descriptors** — statements like \"can introduce oneself,\" \"can defend an opinion\" — instead of grammar checklists or hour quotas. This is because real language competence varies by learner background, native language, motivation, and study quality.\n- Step 3: Why this matters practically: there's no \"official\" answer to \"how many hours to reach B2.\" Schools estimate hours, but the actual gate is whether you can perform the can-do tasks reliably. Time-to-level depends on input quality, not just clock time.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "What does each CEFR level — A1, A2, B1, B2 — practically unlock for a learner? (4 steps)", "answer": "- Step 1: **A1** — Basic survival: introduce yourself, fill simple forms, buy/pay for things, ask basic questions. You can navigate transactions but not conversations.\n- Step 2: **A2** — Everyday routines: shopping, transport, simple past-tense conversations, describing daily life, writing short personal letters.\n- Step 3: **B1** — Independent daily life: handle travel problems, explain opinions with reasons, recount experiences, understand main points of news. This is the \"I can live in France\" threshold.\n- Step 4: **B2** — Serious independent French: defend arguments, understand complex content, participate in fluent conversation. This is the **official gate for French naturalization** and the **minimum for most French higher education**.\n\nMental ladder: A1=survive, A2=routine, B1=independent, B2=serious participant.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "Why is B2 — not C1 or C2 — the practical \"target level\" for most adult French learners aiming to live or study in France? (3 steps)", "answer": "- Step 1: **Service-Public** (the official French government portal) states that French nationality/naturalisation requires at least **B2** oral and written. Below B2, you can't naturalize.\n- Step 2: **Campus France** says B2 is the **minimum** for most French higher-education institutions. C1 is \"strongly recommended\" for humanities/social sciences but B2 opens the door.\n- Step 3: Lower admin thresholds use lower levels: *carte de séjour pluriannuelle* needs only A2, *carte de résident* needs B1. B2 is the highest official gate for ordinary integration goals — past B2, you're optimizing for academic/professional polish, not legal access.\n\nPractical rule: B2 is the \"stop point\" where you've unlocked France; C1/C2 is bonus.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "Roughly how many guided study hours separate A1 from B2, and why does the estimate include a 20% buffer? (3 steps)", "answer": "- Step 1: The exam-ready guided-hour estimates are approximately:\n+ A1 → A2: ~132 hours\n+ A2 → B1: ~228 hours\n+ B1 → B2: ~270 hours\n+ Total A1 → B2: ~630 hours\n- Step 2: The base estimates (from Campus Langues FLE school) are 100-120 / 180-200 / 200-250. The 20% buffer is added on top because **finishing a course unit is not the same as passing a four-skill exam**.\n- Step 3: B2 in particular requires reliable **speaking and writing output** — not just recognizing grammar in a textbook. The buffer accounts for the extra practice needed to produce, not just understand. Without the buffer, learners often \"complete B2 material\" but fail the DELF B2 exam.\n\nTakeaway: budget ~630 guided hours from A1 to B2 if your goal is certification.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Why is \"school-only\" (2 lessons/week with no review) a poor strategy for reaching B2 in a reasonable timeframe? (3 steps)", "answer": "- Step 1: 2 lessons × 90 min = 3 hours/week of class. With ~630 hours needed for A1→B2, that's 210 weeks ≈ **4.6 years** in calendar time.\n- Step 2: Without review, retention is poor — spaced repetition research shows most material is forgotten within days unless actively recalled. Lessons become re-learning sessions instead of building on prior knowledge.\n- Step 3: Adding even modest self-study compounds dramatically:\n+ 2 lessons + 30 min review/lesson → ~3.5 years\n+ 2 lessons + 1 hr review + 20 min/day → ~1.9 years (over 2× faster)\n\nConclusion: lesson time is the catalyst; self-study is the fuel. Without both, progress crawls.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "What is DELF, who issues it, and why does it remain valid for life? (3 steps)", "answer": "- Step 1: **DELF** (Diplôme d'études en langue française) is the official French language diploma for non-native speakers, issued by the **French Ministry of National Education** via *France Éducation International* (FEI).\n- Step 2: There are **separate, independent diplomas** for A1, A2, B1, B2 — you take a four-skill test (listening, reading, writing, speaking) for each level. Passing one doesn't expire or require the next.\n- Step 3: Validity is **for life** because DELF certifies a demonstrated ability at the time of testing — unlike TCF/TEF which are \"snapshot\" tests valid only 2 years. This makes DELF the best long-term proof for naturalization, residency, or university applications.\n\nPractical rule: take DELF if you want permanent proof; take TCF/TEF if you need a fast, recent score for a specific application.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "The U.S. State Department classifies French as a \"Category I\" language needing ~30 weeks of intensive training. What does this tell us about realistic French timelines for adults? (2 steps)", "answer": "- Step 1: The U.S. State Department reports 552-690 class hours over 30 weeks (with ~23 hours/week of class + 17 hours/week self-study, totaling ~40 hr/week) to reach ILR 3 (≈ B2-C1) for French. That's full-time intensive study.\n- Step 2: The lesson: **fast outcomes come from high total weekly hours, not magic**. Part-time learners doing 2-4 hours/week need years to match what intensive learners achieve in months. Time-to-level scales roughly with weekly hours; halving the weekly load roughly doubles the calendar time.\n\nPractical implication: if you can't go intensive, accept multi-year timelines and optimize for consistency rather than speed.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "What is the \"Qualité FLE\" label, and why should you check for it when choosing a French school? (2 steps)", "answer": "- Step 1: **Qualité FLE** is an official quality label initiated by three French government ministries to certify French-as-a-foreign-language teaching centres. It guarantees teaching standards, teacher qualifications, and student services.\n- Step 2: Why it matters: many \"language schools\" are unregulated. A Qualité FLE label means the school has been audited for CEFR alignment, placement testing, teacher feedback quality, and attendance structure. **Campus France** (the official French study-abroad agency) explicitly recommends Qualité FLE centres.\n\nApps and informal tutors can supplement, but for serious B2 certification, a labeled school is the safest bet.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "What's the conceptual difference between \"guided hours\" and passive exposure (e.g., Netflix in French)? (2 steps)", "answer": "- Step 1: **Guided hours** = structured, deliberate learning with feedback or active engagement: school lessons, corrected writing, shadowing exercises, timed exam practice, teacher-assigned platform work. Each hour produces measurable progress.\n- Step 2: **Passive exposure** = background input without active recall: French music while cooking, Netflix without subtitles study, scrolling social media. It builds familiarity and ear-training but doesn't reliably move CEFR levels.\n\nPractical rule: count passive exposure as **bonus**, not as core hours. The ~630-hour estimate assumes guided hours. If you only do passive, multiply timelines significantly.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Why does going from B1 to B2 (250-270 hours) take longer than going from A1 to A2 (110-132 hours), even though both are \"one level\"? (3 steps)", "answer": "- Step 1: At lower levels, gains are concrete and high-frequency: basic vocabulary, present tense, common phrases. Each hour of study covers a lot of usable ground.\n- Step 2: At higher levels, gains become abstract and lower-frequency: nuanced grammar (subjunctive, conditional), idiomatic expressions, register awareness, complex argumentation. The same hour produces less visible progress.\n- Step 3: Also, **output quality** (speaking/writing fluently and accurately) requires far more practice than **input recognition**. B2 demands reliable production, not just comprehension — and production is where hours stack up.\n\nMental model: language acquisition is **non-linear** — each level requires roughly double the effort of the previous one in terms of fine-grained mastery.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "A French restaurant phone reservation typically follows a fixed dialogue pattern. List the questions a French staff member will ask in order, and what info you need ready. (3 steps)", "answer": "- Step 1: Opening: *\"Le restaurant [Name], bonsoir.\"* — you respond *\"Bonsoir Madame/Monsieur.\"*\n- Step 2: They ask in this order:\n+ *\"C'est pour une réservation?\"* — confirm yes/no\n+ *\"Pour quand / à quelle heure?\"* — date and time\n+ *\"Pour combien de personnes?\"* — number of guests\n+ *\"Votre numéro de téléphone pour confirmer?\"* — your phone number\n- Step 3: They close with *\"C'est noté, [Monsieur/Madame]. À ce soir!\"* — you respond *\"Merci beaucoup, au revoir!\"*\n\nPrep before calling: have the date, time (in 24-hour format like *19h30*), party size, and phone number ready in French.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "How do you say \"7:30 PM\" in spoken French, and what's unusual about French time conventions? (2 steps)", "answer": "- Step 1: *19h30* is written; spoken, it's *dix-neuf heures trente* (19:30) in formal/official contexts, or *sept heures et demie* (half past seven) in casual conversation.\n- Step 2: Two notable conventions:\n+ Written French uses **24-hour time** with an *h* separator (*19h30, 14h00*) — never a colon.\n+ Spoken French often uses 12-hour informally with *du matin / de l'après-midi / du soir* if ambiguity matters. *Et demie* = half past; *et quart* = quarter past; *moins le quart* = quarter to.\n\nFor restaurants and trains, expect 24-hour format. *Sept heures et demie du soir* = 7:30 PM clearly.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "Practice exercise: How would you order \"a medium-rare steak with sparkling water, please\" in French, politely? (2 steps)", "answer": "- Step 1: Choose a polite opener: *Je voudrais* or *Je vais prendre*. Combine with the steak: *une entrecôte à point*.\n- Step 2: Combine with the drink: *et une bouteille d'eau gazeuse, s'il vous plaît*.\n\nFull answer: *Je voudrais une entrecôte à point et une bouteille d'eau gazeuse, s'il vous plaît.*\n\nKey choices: conditional verb for politeness, correct doneness term (*à point*), correct water term (*gazeuse*), and *s'il vous plaît* (formal \"please\").", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "Practice exercise: Translate to French — \"I don't have any brothers or sisters.\" What's the tricky part? (2 steps)", "answer": "- Step 1: Base sentence: *J'ai des frères et sœurs* (I have brothers and sisters).\n- Step 2: Apply negation: *ne ... pas* around the verb, and *des → de* after negation. Result: *Je n'ai pas **de** frères et sœurs* — or more naturally *Je n'ai pas de frères ni de sœurs* (using *ni* to coordinate negatives).\n\nThe trickiest part: remembering the *des → de* collapse after negation. English keeps \"any\"; French collapses to a bare *de*.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}], "count": 42}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 9625, "out_tokens": 28534, "reasoning_chars": 3296, "cost_eur": 0.1012, "elapsed_s": 1047, "content_chars": 102549}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 9625, "out_tokens": 23779, "reasoning_chars": 12518, "cost_eur": 0.0859, "elapsed_s": 658, "content_chars": 71152}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 9625, "out_tokens": 18372, "reasoning_chars": 32521, "cost_eur": 0.0685, "elapsed_s": 364, "content_chars": 35015}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 9365, "out_tokens": 13542, "reasoning_chars": 2336, "cost_eur": 0.0154, "elapsed_s": 162, "content_chars": 47717}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 9365, "out_tokens": 8463, "reasoning_chars": 1397, "cost_eur": 0.0103, "elapsed_s": 97, "content_chars": 28440}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 13569, "out_tokens": 21451, "reasoning_chars": 0, "cost_eur": 1.6674, "elapsed_s": 291, "content_chars": 48070}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 13569, "out_tokens": 15483, "reasoning_chars": 0, "cost_eur": 1.2556, "elapsed_s": 221, "content_chars": 37579}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 9950, "out_tokens": 4615, "reasoning_chars": 4021, "cost_eur": 0.0069, "elapsed_s": 71, "content_chars": 11113}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 9950, "out_tokens": 2950, "reasoning_chars": 4114, "cost_eur": 0.0051, "elapsed_s": 50, "content_chars": 6926}}};
const SK='auto_french_20260628_french_with_isabelle';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
