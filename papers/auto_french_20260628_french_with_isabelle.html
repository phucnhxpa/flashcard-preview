d 1 — Intonation: simply say the statement with rising pitch at the end. \"Tu parles français?\" (You speak French?) This is the easiest and most common in casual spoken French. No structural change needed.\n- Step 2: Method 2 — Est-ce que: add \"Est-ce que\" at the beginning. \"Est-ce que tu parles français?\" (Is it that you speak French?) This works in both speech and writing. It's simple and widely used — the \"go-to\" for learners because it's polite without being overly formal.\n- Step 3: Method 3 — Inversion: swap the verb and subject pronoun, connected by a hyphen. \"Parles-tu français?\" (Speak-you French?) This is more formal, more common in writing, and expected in formal/academic contexts. With je, inversion is rare and awkward (\"parlé-je\" is almost never used).\n- Step 4: Usage hierarchy: intonation = casual speech (most common orally), est-ce que = versatile (works everywhere), inversion = formal/written. For A1 learners, master est-ce que first (it's safe in all contexts), then intonation for casual speech, then inversion for writing.\n\nKey: all three ask the same question — the difference is register and medium, not meaning.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "Transform \"Vous avez des frères et sœurs?\" (intonation question) into the other two question forms. Explain what happens to the word order in each. (3 steps)", "answer": "- Step 1: With \"Est-ce que\": \"Est-ce que vous avez des frères et sœurs?\" — you simply prepend \"Est-ce que\" to the statement. Word order stays the same as the affirmative: subject + verb + object. \"Est-ce que\" is just a question marker that doesn't change the sentence structure.\n- Step 2: With inversion: \"Avez-vous des frères et sœurs?\" — the verb \"avez\" and subject \"vous\" swap positions and are joined by a hyphen. The object \"des frères et sœurs\" stays in place after the inverted verb-subject pair. Only the subject pronoun and verb invert; everything else remains.\n- Step 3: Note: inversion only works cleanly with subject pronouns (je, tu, il, elle, on, nous, vous, ils, elles). With a noun subject like \"Marie,\" you'd say \"Marie a-t-elle des frères?\" (keeping the noun and adding a pronoun for inversion). This is beyond A1 but worth knowing exists.\n\nFor this sentence: intonation (easiest) → est-ce que (versatile) → inversion (most formal). Same meaning, different register.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "The question \"Prends-tu le bus pour aller au travail?\" uses inversion. Identify the verb, the subject, and explain the hyphen. Also, why is there a \"-s-\" on \"prends\" when the verb is PRENDRE? (3 steps)", "answer": "- Step 1: The verb is $$prends$$ (from PRENDRE, 2nd person singular = tu prends), and the subject is $$tu$$. In inversion, they swap: \"Prends-tu.\" The hyphen is mandatory in French inversion — it visually connects the inverted verb and subject pronoun.\n- Step 2: The \"-s-\" on \"prends\" is the standard tu form ending for verbs like PRENDRE (3rd group verb) and -re verbs. In the affirmative, \"tu prends\" — the \"s\" is silent. In inversion \"prends-tu,\" the \"s\" is still there because it's part of the conjugation, but it remains silent (no liaison with \"tu\" since \"tu\" starts with a consonant).\n- Step 3: Contrast with -er verbs: \"tu parles\" → \"parles-tu?\" (the -s is also silent). With verbs ending in a vowel in the tu form (like pouvoir: \"tu peux\" → \"peux-tu?\"), the pattern is the same. The hyphenated inversion always keeps the full conjugated verb form.\n\nThe hyphen in inversion is not optional — it's a punctuation rule. \"Prends tu\" (no hyphen) is incorrect.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "What does \"Qu'est-ce que c'est…?\" mean, and why does it look so complex? Break it down component by component. (3 steps)", "answer": "- Step 1: \"Qu'est-ce que c'est?\" = \"What is this/that?\" or \"What is it?\" It's the standard way to ask \"what is\" something in French.\n- Step 2: Component breakdown: $$Que$$ (what) + $$est$$ (is) + $$ce$$ (it/that) + $$que$$ (that) + $$c'$$ (it) + $$est$$ (is). Literally: \"What is it that it is?\" — a double embedding that feels redundant in English but is perfectly natural in French.\n- Step 3: The pronunciation collapses this long string: \"Qu'est-ce que c'est\" → /kɛs kə sɛ/ — often further reduced to \"keske sè\" in rapid speech. This is why learners hear a short blur and don't realize it's a six-word construction. For asking about a specific noun: \"Qu'est-ce que c'est, la salade niçoise?\" = \"What is the salade niçoise?\"\n\nIn casual speech, you might hear just \"C'est quoi?\" (It's what?) — much simpler but less formal. \"Qu'est-ce que c'est\" is the standard version.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "In the self-introduction, Phuc says \"J'habite à Paris.\" Why is \"à\" used here, and how would it change for a country? What's the rule for \"à\" vs. \"en\" for locations? (3 steps)", "answer": "- Step 1: $$À$$ means \"in/at/to\" and is used before the names of cities: \"J'habite à Paris,\" \"Je suis à Londres,\" \"Il travaille à Tokyo.\" This is the standard preposition for cities regardless of gender.\n- Step 2: For countries, the preposition depends on the country's grammatical gender. Feminine countries (most ending in -e) use $$en$$: \"J'habite en France,\" \"Je suis en Italie.\" Masculine countries use $$au$$: \"J'habite au Japon,\" \"Je suis au Canada.\" Plural countries (like les États-Unis) use $$aux$$: \"J'habite aux États-Unis.\"\n- Step 3: Exception: masculine countries starting with a vowel also use \"en\" (because \"au\" + vowel country would be awkward): \"J'habite en Iran\" (not \"au Iran\"). And \"Je suis vietnamien\" — nationalities are adjectives in French, so they agree with your gender: vietnamien (masc.), vietnamienne (fem.).\n\nCity → à. Feminine country → en. Masculine country → au. Plural country → aux. Vowel-starting masculine country → en.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "In Phuc's introduction, he says \"Je suis ingénieur dans l'intelligence artificielle.\" Why is there no article before \"ingénieur\"? In English we say \"I am AN engineer\" — what's different in French? (3 steps)", "answer": "- Step 1: In French, when stating one's profession, nationality, or religion with \"être\" (to be), the indefinite article (un/une) is typically omitted. \"Je suis ingénieur\" = \"I am an engineer.\" You do NOT say \"Je suis un ingénieur\" in standard identification contexts.\n- Step 2: The logic: \"être + profession\" functions as an adjective-like description, not a noun phrase. You're describing what you ARE, not counting yourself as one unit of a category. Adding \"un/une\" can sound like you're emphasizing \"one among many\" or being slightly boastful in some contexts.\n- Step 3: However, if you add an adjective, the article returns: \"Je suis un bon ingénieur\" (I am a good engineer). The adjective makes it a full noun phrase rather than a bare identification. Also, \"C'est un ingénieur\" (He's an engineer) uses the article with \"c'est\" because \"c'est\" always takes an article before a profession noun.\n\nBare profession after \"je suis\" = no article. Add an adjective or use \"c'est\" = article returns.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "In the restaurant dialogue, the server asks \"A l'intérieur ou en terrasse?\" What do \"à l'intérieur\" and \"en terrasse\" mean, and why does one use \"à\" and the other \"en\"? (3 steps)", "answer": "- Step 1: \"À l'intérieur\" = inside (literally \"at the interior\"). \"En terrasse\" = on the terrace/outside seating (literally \"in terrace\"). The server is asking: \"Inside or on the terrace?\"\n- Step 2: \"À l'intérieur\" uses $$à$$ + definite article (à + le = au, à + la = à la, à + l' = à l') — this is the standard preposition for physical location \"at/in.\" \"L'intérieur\" is a masculine noun starting with a vowel, so \"à l'intérieur.\"\n- Step 3: \"En terrasse\" uses $$en$$ — a preposition meaning \"in\" that's used with feminine nouns without an article when expressing a state or location. \"En terrasse\" is almost a fixed expression. You could also say \"sur la terrasse\" (on the terrace), but \"en terrasse\" is the idiomatic restaurant phrase. \"En\" often appears in set phrases: \"en ville\" (in town), \"en vacances\" (on holiday), \"en réunion\" (in a meeting).\n\n\"En terrasse\" = the standard restaurant phrase for outdoor seating. \"Sur la terrasse\" = also correct but less idiomatic in this context.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": true}, {"question": "The server says \"Je reviens tout de suite.\" Break down this sentence — what does each word contribute, and what's the common pronunciation shortcut? (3 steps)", "answer": "- Step 1: $$Je$$ = I, $$reviens$$ = come back (from REVENIR, 1st person singular), $$tout\\ de\\ suite$$ = immediately/right away. Full meaning: \"I'll be right back\" or \"I'm coming right back.\"\n- Step 2: \"Tout de suite\" is a fixed adverbial expression. Literally: \"all of following\" — but it's learned as a unit meaning \"immediately.\" It's extremely common in service contexts and everyday speech.\n- Step 3: Pronunciation: \"tout de suite\" is pronounced /tu d(ə) suit/ — the \"de\" is often very reduced or nearly silent in rapid speech, sounding like \"toot-sweet.\" This is one of those expressions where the written form looks longer than what you actually hear.\n\n\"Je reviens tout de suite\" = the server's standard \"I'll be right back.\" Memorize it as a chunk.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "In the reservation dialogue, the server says \"C'est noté, Monsieur.\" What does \"c'est noté\" mean literally and pragmatically, and why is \"Monsieur\" used here without an article? (3 steps)", "answer": "- Step 1: \"C'est noté\" = literally \"it is noted\" — meaning \"got it,\" \"noted,\" \"I've made a note of it.\" The server is confirming that the reservation details have been recorded. It's a professional acknowledgment.\n- Step 2: \"Monsieur\" (sir) is used as a form of direct address, like \"Sir\" in English. In French, titles of direct address (Monsieur, Madame, Mademoiselle) are used WITHOUT an article. You say \"Bonjour, Monsieur\" not \"Bonjour, le Monsieur.\" \"Le monsieur\" would mean \"the gentleman\" (third person, not direct address).\n- Step 3: \"C'est noté, Monsieur. À ce soir!\" = \"Noted, sir. See you tonight!\" $$À\\ ce\\ soir$$ = see you tonight (literally \"until this evening\"). \"À\" + time expression = \"see you at/until\" that time: \"à demain\" (see you tomorrow), \"à bientôt\" (see you soon), \"à plus tard\" (see you later).\n\nDirect address titles: no article. \"Monsieur\" ≠ \"le monsieur.\" \"À + time\" = see you at that time.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "In the lesson, two farewell expressions appear: \"au revoir\" and \"à bientôt.\" What's the difference in meaning and usage between them? (2 steps)", "answer": "- Step 1: $$Au\\ revoir$$ = \"goodbye\" (literally \"to the seeing again\" — from \"revoir\" = to see again). This is the standard, neutral goodbye. Use it when you don't know if/when you'll see the person again. It works in all registers.\n- Step 2: $$À\\ bientôt$$ = \"see you soon\" (literally \"until soon\"). This implies you expect to see the person again in the near future. It's warmer and more forward-looking than \"au revoir.\" Similarly, \"à très vite\" = \"see you very soon\" (even more imminent). Use \"à bientôt\" when there's a plan or expectation of meeting again.\n\n\"Au revoir\" = general goodbye. \"À bientôt\" = see you soon (implies near-future reunion). \"À très vite\" = see you very soon.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "The notes show that \"Je voudrais le hamburger s'il vous plaît\" is translated as \"I'm going to take the hamburger please.\" But \"je voudrais\" is conditional, not future. Is this translation accurate, and what's actually happening? (3 steps)", "answer": "- Step 1: The translation in the notes is slightly misleading. \"Je voudrais\" is the conditional of vouloir = \"I would like.\" The accurate translation is \"I would like the hamburger, please.\" The note seems to conflate it with \"Je vais prendre\" = \"I'm going to take,\" which is a different ordering phrase.\n- Step 2: In restaurant French, there are multiple ways to order, and they're functionally equivalent even if grammatically different: \"Je voudrais le hamburger\" (I would like the hamburger — conditional, polite), \"Je vais prendre le hamburger\" (I'm going to take the hamburger — near future, direct), \"J'aimerais le hamburger\" (I would like the hamburger — conditional of aimer, warm).\n- Step 3: The key point: all three are polite and standard for ordering. The conditional forms (voudrais, aimerais) are softer and more deferential. \"Je vais prendre\" is slightly more decisive — you're stating your action. In practice, French speakers use all of these interchangeably in restaurants.\n\n\"Je voudrais\" = \"I would like\" (conditional). \"Je vais prendre\" = \"I'm going to take\" (futur proche). Both are correct for ordering.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "In the restaurant dialogue, the server asks \"Avez-vous choisi?\" and also \"Avez-vous fait votre choix?\" What's the difference between these two questions? (3 steps)", "answer": "- Step 1: \"Avez-vous choisi?\" = \"Have you chosen?\" — using the passé composé (past tense) of CHOISIR (to choose). It's asking whether the decision has been made. Inversion makes it formal (appropriate for a server).\n- Step 2: \"Avez-vous fait votre choix?\" = \"Have you made your choice?\" — using FAIRE (to make/do) + \"votre choix\" (your choice). This is slightly more elaborate and formal-sounding. Both mean essentially the same thing: \"Are you ready to order?\"\n- Step 3: The nuance: \"Avez-vous choisi?\" is more direct (have you chosen?), while \"Avez-vous fait votre choix?\" is a bit more polished (have you made your selection?). In practice, servers use both, and the response is the same either way: \"Oui, je vais prendre…\" or \"Non, encore un moment\" (No, a moment more).\n\nBoth are formal (inversion + vous). Both mean \"are you ready to order?\" — just different phrasing.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "When ordering for a group, the notes show \"On va prendre\" and \"On aimerait.\" What does \"on\" mean here, and why would you use \"on\" instead of \"nous\"? (3 steps)", "answer": "- Step 1: $$On$$ is a subject pronoun that literally means \"one\" (impersonal) but in spoken French is overwhelmingly used to mean \"we\" — replacing $$nous$$ in everyday speech. \"On va prendre\" = \"We're going to have,\" \"On aimerait\" = \"We would like.\"\n- Step 2: Why use \"on\" instead of \"nous\"? In casual and standard spoken French, \"on\" has almost completely replaced \"nous\" as the 1st person plural pronoun. \"Nous\" sounds formal and is more common in writing or formal speech. \"On va prendre\" sounds natural; \"Nous allons prendre\" sounds like a textbook.\n- Step 3: Grammatically, \"on\" takes 3rd person singular conjugation (even though it means \"we\"). So \"on va\" (not \"on allons\"), \"on aimerait\" (not \"on aimerions\"). This is the one exception where meaning (\"we\") and grammar (3rd person singular) don't match.\n\n\"On\" = \"we\" in speech (3rd person singular verb). \"Nous\" = \"we\" in writing/formal speech (1st person plural verb). Both are correct; \"on\" is more natural orally.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": true}, {"question": "The word \"une entrecôte saignante\" appears in the lesson. Why does \"saignante\" end in \"-e\" — shouldn't adjectives agree with \"entrecôte\"? What gender is \"entrecôte\"? (3 steps)", "answer": "- Step 1: \"Entrecôte\" is a feminine noun (une entrecôte). It refers to a rib steak cut from between the ribs (entre = between, côte = rib). Since it's feminine, the adjective \"saignante\" is in its feminine form.\n- Step 2: The masculine form is \"saignant\" (rare/bleeding). Adding \"-e\" makes it feminine: \"saignante.\" This is the regular adjective agreement pattern: masculine form + e = feminine form. Both forms are pronounced the same (/sɛɲɑ̃/ vs /sɛɲɑ̃t/ — though in careful speech, the feminine may have a faint final \"t\" sound).\n- Step 3: This applies to all the cooking levels when modifying a feminine noun: \"une entrecôte bleue\" (not bleu), \"une entrecôte saignante\" (not saignant), \"une entrecôte à point\" (invariable expression), \"une entrecôte bien cuite\" (not cuit). The adjective always agrees with the noun it modifies.\n\nAdjective agreement is non-negotiable: the adjective's gender and number must match the noun it describes.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "The self-introduction includes \"Quels sont tes loisirs?\" Why is \"quels\" used instead of \"quelle\" or \"quel\"? What does this reveal about the word \"loisirs\"? (3 steps)", "answer": "- Step 1: $$Quels$$ is the masculine plural form of the interrogative adjective \"quel\" (which/what). It's used here because \"loisirs\" (hobbies/leisure activities) is a masculine plural noun: \"les loisirs.\"\n- Step 2: \"Quel\" agrees in gender and number with the noun it modifies: $$quel$$ (masc. sing.), $$quelle$$ (fem. sing.), $$quels$$ (masc. pl.), $$quelles$$ (fem. pl.). Since \"loisirs\" is masculine plural, the correct form is \"quels.\"\n- Step 3: The structure \"Quels sont tes loisirs?\" = \"What are your hobbies?\" literally \"Which are your leisure activities?\" The verb \"sont\" (from ÊTRE) is plural to match the plural subject \"tes loisirs.\" Compare: \"Quel est ton loisir?\" (singular, if asking about one hobby).\n\n\"Quel/quelle/quels/quelles\" must agree with the noun that follows — it's an adjective, not an invariable question word like \"que\" or \"quoi.\"", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "In the introduction, Phuc says \"J'adore le sport, les films et la musique.\" Why are there three different articles (le, les, la) in this sentence? What rule governs the choice? (3 steps)", "answer": "- Step 1: Each article matches the gender and number of its noun: $$le\\ sport$$ (masculine singular), $$les\\ films$$ (masculine plural), $$la\\ musique$$ (feminine singular). French definite articles must agree with the noun they precede.\n- Step 2: Why use definite articles at all? In English, we say \"I love sport, films, and music\" with no article. But in French, when expressing general preferences or talking about categories/abstractions, the definite article is required. \"J'adore le sport\" = \"I love sport\" (sport in general). This is the generalization rule.\n- Step 3: If you said \"J'adore du sport,\" that would mean \"I love some sport\" (partitive — some unspecified amount), which sounds odd as a general statement. The definite article signals you're talking about the entire category. This is a major difference from English: French requires articles before abstract/general nouns that English would leave bare.\n\nGeneral/categorical statements → definite article (le, la, les). Specific/quantity → partitive (du, de la) or indefinite (un, une, des).", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "In the CEFR roadmap, what is the \"exam-ready\" hour estimate for each transition (A1→A2, A2→B1, B1→B2), and why is a 20% buffer added on top of the core estimates? (3 steps)", "answer": "- Step 1: The exam-ready estimates are: A1→A2 = 132 hours, A2→B1 = 228 hours, B1→B2 = 270 hours, totaling 630 hours for A1→B2. These are derived from Campus Langues FLE estimates (100-120h, 180-200h, 200-250h respectively), taking the midpoint and adding 20%.\n- Step 2: The 20% buffer exists because \"finishing a course unit\" ≠ \"being exam-ready.\" Course completion means you've been exposed to the material. Exam readiness means you can reliably perform under test conditions across all four skills (reading, writing, listening, speaking). The gap between passive recognition and active, reliable output is significant — especially at B2, where you must defend opinions and argue with fluency.\n- Step 3: The calculation: A1→A2 midpoint = 110h, + 20% = 132h. A2→B1 midpoint = 190h, + 20% = 228h. B1→B2 midpoint = 225h, + 20% = 270h. This buffer accounts for revision, weak-skill remediation, exam technique practice, and the reality that most learners don't retain 100% of what they study.\n\nExposure ≠ mastery. The 20% buffer bridges the gap between \"I covered this in class\" and \"I can reliably demonstrate this on a DELF exam.\"", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}, {"question": "In the roadmap, Scenario S3 (2 lessons/week + 1h review + 20min/day) yields ~1.9 years from A1 to B2, while school-only S1 (2 lessons/week) yields ~4.6 years. Why does adding self-study make such a dramatic difference? (3 steps)", "answer": "- Step 1: The math: S1 provides only 3 hours/week of guided learning (2 × 90min lessons). Over a year, that's ~156 hours. To accumulate 630 exam-ready hours at that rate takes over 4 years. S3 adds 1h structured review + ~2.3h daily practice (20min × 7 days), totaling ~7.3 hours/week or ~380 hours/year — more than double S1's weekly load.\n- Step 2: The compounding effect: self-study doesn't just add hours — it changes the quality of class time. When you review before/after class, you arrive prepared and leave with consolidated knowledge. Without review, each lesson partially re-covers previous material, and the effective forward progress is much slower.\n- Step 3: The principle: total weekly guided hours is the single biggest predictor of progress speed. The U.S. State Department data confirms this: their 30-week program achieves high proficiency through 23h/week class + 17h/week self-study = 40h/week total. High intensity beats long duration. Even 20 minutes/day of active practice adds ~2.3 hours/week, which compounds dramatically over months.\n\nDoubling your weekly hours more than halves your timeline, because review makes class time more efficient.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "What CEFR level is required for French naturalization/citizenship, and what level for a carte de séjour pluriannuelle? Why does the roadmap emphasize B2 as the key target? (3 steps)", "answer": "- Step 1: For French naturalization/nationality, Service-Public states the required level is B2 CEFR, both oral and written. This is a high bar — you must be able to argue, defend opinions, and understand complex content. For a carte de séjour pluriannuelle (multi-year residence permit), only A2 is required.\n- Step 2: The full admin ladder: A2 for pluriannuelle residence permit, B1 for carte de résident (long-term resident card), B2 for naturalization. Each step up requires substantially more hours of study.\n- Step 3: B2 is emphasized as the key target because it unlocks both naturalization AND higher education. Campus France states B2 is the minimum for most French universities, with C1 strongly recommended for humanities/social sciences. B2 is where French becomes genuinely useful for professional and civic life — it's the threshold of \"independent user\" becoming \"competent user.\"\n\nA2 = survival residence permit. B1 = long-term residence. B2 = citizenship + university. B2 is the practical target for serious learners.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": true}, {"question": "The roadmap distinguishes between \"guided hours\" and \"passive exposure.\" Why doesn't watching French Netflix count the same as a lesson hour? What counts as guided? (3 steps)", "answer": "- Step 1: Guided hours are structured learning activities with feedback, correction, or deliberate practice: school lessons, teacher-assigned platform work, active listening with exercises, corrected writing/speaking, and timed exam practice. These involve conscious effort, attention to errors, and progressive difficulty.\n- Step 2: Passive exposure — French music in the background, Netflix with English subtitles, casual social media scrolling — provides input but lacks the key ingredients of learning: focused attention, error correction, output production, and deliberate challenge. Your brain may pick up occasional words, but without active engagement, the acquisition rate is far lower.\n- Step 3: The nuance: passive exposure CAN count if you make it active. Watching Netflix with French subtitles and noting unknown words, shadowing dialogue, or pausing to repeat phrases transforms passive input into guided learning. The distinction isn't about the medium — it's about what you DO with it. The roadmap counts only guided hours because they're the reliable predictor of progress.\n\nPassive = bonus. Active = counted. The difference is whether you're producing, correcting, or deliberately practicing — not just absorbing.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": true}, {"question": "What does the \"Qualité FLE\" label signify, and why does the roadmap recommend choosing schools with this label? (2 steps)", "answer": "- Step 1: The $$Qualité\\ FLE$$ label is an official French government quality assurance mark, initiated by three French ministries (Education, Higher Education, Foreign Affairs). It identifies and promotes French language centers whose teaching, facilities, and services meet quality standards. It's essentially a vetted seal of approval for French language schools.\n- Step 2: The roadmap recommends Qualité FLE schools because, when you're paying for structured learning, you need assurance that the school delivers: CEFR-aligned curricula, qualified teachers, placement testing, attendance tracking, and progress feedback. Schools without this label may still be good, but you have no independent verification. Apps and casual tutors can supplement, but shouldn't replace a Qualité FLE school if your goal is documented B2 evidence.\n\nQualité FLE = government-verified quality. Without it, you're trusting the school's marketing rather than an independent audit.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": false}, {"question": "The notes show \"Je n'ai pas de réservation\" (I don't have a reservation). Why is it \"de réservation\" and not \"une réservation\" in the negative? Connect this to the broader negation rule. (3 steps)", "answer": "- Step 1: This is the same negation-article rule seen in \"il n'y a pas de problème.\" In the affirmative, you'd say \"J'ai une réservation\" (I have a reservation). In the negative, the indefinite article \"une\" changes to \"de\": \"Je n'ai pas de réservation.\"\n- Step 2: The rule: after $$ne…pas$$ (and other negative structures like ne…plus, ne…jamais), the articles $$un$$, $$une$$, and $$des$$ all become $$de$$ (or $$d'$$ before a vowel). This applies universally — not just with AVOIR or \"il y a.\" \"J'ai des amis\" → \"Je n'ai pas d'amis.\" \"Il y a un problème\" → \"Il n'y a pas de problème.\"\n- Step 3: The logic: negation nullifies the quantity. \"Une réservation\" asserts the existence of one reservation. \"Pas de réservation\" denies the existence of any reservation — the quantity is zero, so the specific article is replaced by the generic \"de.\" Note: definite articles (le, la, les) do NOT change in negation: \"Je n'aime pas le café\" (not \"Je n'aime pas de café\") — because you're negating a specific, known thing, not a quantity.\n\nun/une/des → de/d' after ne…pas. This is one of the most important A1 grammar rules.", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": true}, {"question": "You see \"une carafe d'eau\" in the lesson. Is \"carafe\" masculine or feminine, and why is it \"d'eau\" rather than \"de l'eau\"? How does this connect to the quantity + de rule? (3 steps)", "answer": "- Step 1: \"Carafe\" is feminine — \"une carafe.\" It means \"carafe\" or \"jug\" (a glass container for serving water/wine at the table).\n- Step 2: It's \"d'eau\" (de + eau, elided because eau starts with a vowel) rather than \"de l'eau\" because of the quantity rule: after a quantity/measurement noun, you use \"de\" without the definite article. \"Une carafe d'eau\" = \"a carafe of water\" — the carafe is the quantity measure, and \"de\" connects it to the substance.\n- Step 3: Compare: \"de l'eau\" alone = \"some water\" (partitive article, no quantity noun). But \"une carafe d'eau\" = \"a carafe of water\" (quantity noun + de + substance). The difference is whether a quantity/measurement noun precedes the substance. \"Un verre d'eau\" (a glass of water), \"une bouteille d'eau\" (a bottle of water), \"une carafe d'eau\" — all follow the same pattern.\n\nQuantity noun + de + substance (no article). Partitive alone = de l'/du/de la + substance. Different structures, different rules.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": true}, {"question": "A server says \"Suivez-moi, s'il vous plaît\" and then \"Installez-vous.\" What grammatical form are these (tense/mood), and why is the pronoun attached with a hyphen in the first but not the second? (3 steps)", "answer": "- Step 1: Both are imperative (command form) — the server is giving polite instructions. \"Suivez-moi\" = \"Follow me\" (imperative of SUIVRE, vous form). \"Installez-vous\" = \"Settle in / Take a seat\" (imperative of S'INSTALLER, vous form, reflexive).\n- Step 2: In the imperative, object pronouns are attached to the verb with a hyphen — but only for direct/indirect object pronouns and reflexive pronouns that follow the verb. \"Suivez-moi\" — \"moi\" is the direct object pronoun (me), placed after the verb with a hyphen. \"Installez-vous\" — \"vous\" is the reflexive pronoun, also placed after the verb with a hyphen.\n- Step 3: Wait — in the affirmative imperative, reflexive pronouns go AFTER the verb (attached with hyphen): \"installez-vous.\" But in the negative imperative, they return to before the verb: \"Ne vous installez pas.\" This is a special rule for the imperative mood only. In all other tenses, reflexive pronouns precede the verb: \"Vous vous installez.\"\n\nImperative affirmative: pronoun after verb + hyphen. Imperative negative: pronoun before verb (normal position). This flip is unique to the imperative.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": false}, {"question": "The lesson notes mention \"OU\" = \"or.\" How is this different from \"où\" (with accent), and why is the accent grammatically significant? (2 steps)", "answer": "- Step 1: $$Ou$$ (no accent) = \"or\" — a conjunction linking alternatives. \"Tea or coffee?\" = \"Thé ou café?\" It connects two options. $$Où$$ (with accent grave) = \"where\" — an adverb/question word indicating location. \"Où habites-tu?\" = \"Where do you live?\"\n- Step 2: The accent distinguishes two completely different words that would otherwise be homographs. This is a case where French orthography uses accents to disambiguate meaning, not just to indicate pronunciation. In speech, they sound identical (/u/), so the accent is purely a written distinction. Mixing them up changes the meaning entirely: \"Thé où café?\" would mean \"Tea where coffee?\" — nonsense.\n\n\"Ou\" = or (conjunction). \"Où\" = where (location). The accent is not optional — it's a different word.", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "In the lesson, Phuc says \"Je vais à la gym quatre fois par semaine.\" What does \"fois\" mean, how is it different from \"temps,\" and why is \"par\" used instead of \"de\"? (3 steps)", "answer": "- Step 1: $$Fois$$ = \"time\" in the sense of \"occurrence/instance.\" \"Quatre fois\" = four times (four occurrences). This is the word you use for counting how many times something happens. $$Temps$$ = \"time\" in the sense of \"duration/era/weather\" — a completely different word for a different concept.\n- Step 2: \"Fois\" vs. \"temps\" confusion: English uses \"time\" for both, but French splits them. \"Three times\" = \"trois fois\" (NOT \"trois temps\"). \"I don't have time\" = \"Je n'ai pas le temps\" (NOT \"Je n'ai pas la fois\"). They are not interchangeable.\n- Step 3: \"Par semaine\" = \"per week\" or \"a week.\" \"Par\" = per/through/by. You could also say \"quatre fois par semaine\" or \"quatre fois par jour\" (four times per day). \"Par\" indicates the time period over which the frequency is measured. You don't use \"de\" here because \"par\" is the standard preposition for rates/frequencies.\n\n\"Combien de fois par semaine?\" = \"How many times per week?\" Fois = occurrences. Temps = duration. Never swap them.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "The notes show \"Tu as quel âge?\" for \"How old are you?\" but the textbook form is \"Quel âge as-tu?\" Explain why these two versions exist and what register each belongs to. (3 steps)", "answer": "- Step 1: \"Tu as quel âge?\" uses intonation — the question word \"quel âge\" is placed at the end, and the voice rises. This is casual spoken French, the most common way to ask this in everyday conversation. Subject + verb + question word.\n- Step 2: \"Quel âge as-tu?\" uses inversion — the verb \"as\" and subject \"tu\" are inverted after the question word. This is formal/written French. Question word + inverted verb-subject. It sounds stiff in casual conversation but is correct in formal contexts.\n- Step 3: A third option exists: \"Est-ce que tu as quel âge?\" — but this is unusual because \"est-ce que\" is typically used with yes/no questions, not with question words like \"quel.\" With question words, the two main options are: question word at the end (intonation, casual) or question word at the beginning with inversion (formal). \"Quel âge as-tu?\" = formal. \"Tu as quel âge?\" = casual.\n\nIn real life, French speakers overwhelmingly use intonation for informal questions. Save inversion for writing and formal situations.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "French numbers 0-16 each have a unique single word, but 17-19 are compound. Where does the pattern shift, and why? Also, what's the pattern from 17-19? (3 steps)", "answer": "- Step 1: The unique words are: zéro (0), un (1), deux (2), trois (3), quatre (4), cinq (5), six (6), sept (7), huit (8), neuf (9), dix (10), onze (11), douze (12), treize (13), quatorze (14), quinze (15), seize (16). That's 17 unique words for 0-16.\n- Step 2: Starting at 17, the pattern becomes compound: 17 = dix-sept (ten-seven), 18 = dix-huit (ten-eight), 19 = dix-neuf (ten-nine). These are literally \"ten + [7/8/9]\" — a transparent compound. The shift happens because Old French had unique words only up to 16, inherited from Latin, and then switched to the compound system.\n- Step 3: This pattern recurs at 70+ (soixante-dix = sixty-ten for 70) and 90+ (quatre-vingt-dix = four-twenty-ten for 90). French consistently uses additive compounds when it runs out of unique base words. The 17-19 pattern is the simplest example of this principle.\n\n0-16 = unique words. 17-19 = dix + unit. The same compounding logic extends throughout the number system.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": true}, {"question": "You want to say \"I have a reservation for two people\" in French. Construct the sentence and explain why \"pour\" is used rather than \"avec\" or \"de.\" (2 steps)", "answer": "- Step 1: The sentence is: \"J'ai une réservation pour deux personnes.\" $$Pour$$ = for (indicating purpose, destination, or intended recipient). The reservation is FOR two people — it's intended to serve/cover two people.\n- Step 2: Why not \"avec\" (with)? \"Avec deux personnes\" would mean \"with two people\" — as if you're accompanied by two others (total of three). \"Pour deux personnes\" correctly means \"intended for two people\" (total of two). Why not \"de\"? \"De\" would indicate possession or origin, not purpose. \"Pour\" is the standard preposition for \"for [number of people]\" in reservations and orders.\n\n\"Pour [number]\" = for [number of people]. This applies to reservations, orders, bookings — any context where you're specifying how many the arrangement is intended for.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "The server asks \"Votre numéro de téléphone pour confirmer la réservation?\" Why is there no verb in this sentence, and what does this reveal about spoken French in service contexts? (2 steps)", "answer": "- Step 1: This is an elliptical question — the verb is implied but omitted. The full version would be \"Quel est votre numéro de téléphone pour confirmer la réservation?\" or \"Pouvez-vous me donner votre numéro de téléphone?\" The server drops the verb for brevity, which is extremely common in spoken service French.\n- Step 2: Spoken French frequently drops elements that are recoverable from context. The server doesn't need a full grammatical sentence because the context (making a reservation by phone) makes the intent obvious. Other examples: \"Pour combien?\" (For how many?) instead of \"C'est pour combien de personnes?\", \"À quelle heure?\" (At what time?) instead of \"À quelle heure souhaitez-vous venir?\"\n\nEllipsis = normal in spoken French, especially in service. Don't expect every sentence to have a full subject-verb structure.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": true}, {"question": "In the CEFR roadmap, what is the recommended \"best weekly routine\" for the A1→A2 transition under Scenario S3? What does each component contribute? (4 steps)", "answer": "- Step 1: Scenario S3 recommends: 2 school lessons (90 min each = 3h/week) + 1 hour structured after-lesson review + 20 minutes daily practice. Total: ~7.3 guided hours/week.\n- Step 2: The 2 school lessons provide the core structured learning: new grammar, vocabulary, teacher correction, and guided practice. This is where you get the \"scaffolding\" — expert guidance through new material with immediate feedback.\n- Step 3: The 1-hour after-lesson review consolidates what was just taught: reviewing notes, doing homework, practicing weak points, and preparing for the next lesson. This prevents the common pattern where students forget 60-70% of new material within 24 hours without review.\n- Step 4: The 20 minutes daily practice builds the habit of continuous engagement: vocabulary drills, short listening exercises, flashcard review, or simple writing. This daily touch prevents the \"decay\" that happens between weekly lessons and keeps French active in your working memory.\n\nThe three components work synergistically: lessons (input + correction), review (consolidation), daily practice (retention + habit). Remove any one, and progress slows significantly.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}, {"question": "The roadmap mentions an \"exit test\" for each CEFR level transition. Conceptually, what should an exit test for A1→A2 verify, and why can't course completion alone serve as proof? (3 steps)", "answer": "- Step 1: An A1→A2 exit test should verify that the learner can handle everyday routines: simple conversations about daily life, describing past events, asking for directions, shopping/transport interactions, and writing simple personal letters — the A2 \"can-do\" descriptors from the CEFR.\n- Step 2: Course completion alone isn't proof because completing a course unit means you attended and were exposed to the material — not that you can reliably perform the skills. Many students \"finish\" A2 courses but still can't hold a simple conversation or write a coherent paragraph. The exit test measures active ability, not passive exposure.\n- Step 3: This is why the roadmap adds the 20% exam-readiness buffer and recommends DELF exams as the gold standard. The DELF A2 is an official, externally validated test covering all four skills (listening, reading, writing, speaking). Passing it proves you can DO A2-level tasks, not just that you sat through A2-level lessons.\n\nCourse completion = you were taught. Exit test/DELF pass = you can perform. The gap between these is why the 20% buffer exists.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": false}, {"question": "Convert the question \"Est-ce que vous regardez la télévision le soir?\" into the other two question forms (intonation and inversion). Explain what changes in each transformation. (3 steps)", "answer": "- Step 1: Intonation form: \"Vous regardez la télévision le soir?\" — simply remove \"Est-ce que\" and keep the statement word order with rising intonation. The sentence structure is unchanged; only the question marker is removed and replaced by vocal pitch.\n- Step 2: Inversion form: \"Regardez-vous la télévision le soir?\" — the verb \"regardez\" and subject \"vous\" are inverted and joined with a hyphen. The rest of the sentence (\"la télévision le soir\") stays in the same position after the inverted verb-subject unit.\n- Step 3: Key observation: in all three forms, the core content (verb, object, time expression) remains the same. Only the question mechanism changes: est-ce que (added marker), intonation (no marker, just pitch), inversion (verb-subject swap). The meaning is identical; the register differs.\n\nAll three ask \"Do you watch television in the evening?\" — same meaning, different formality levels.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": false}, {"question": "The notes show \"Je vais à la gym\" for \"I go to the gym.\" Why is it \"à la\" and not \"en\" or \"dans\"? Explain the preposition rule for going to places. (3 steps)", "answer": "- Step 1: $$À\\ la$$ = \"to the\" (feminine singular). \"La gym\" is feminine (short for \"la gymnastique\" or \"la salle de gym\"), so \"à la gym\" = \"to the gym.\" The preposition $$à$$ + definite article indicates destination/direction toward a specific place.\n- Step 2: Why not \"en\"? \"En\" is used for feminine countries/regions and certain fixed expressions (\"en ville,\" \"en terrasse\"), but NOT for specific buildings or rooms. \"En gym\" would sound wrong — \"gym\" as a specific place takes \"à la.\" Why not \"dans\"? \"Dans la gym\" = \"inside the gym\" (emphasis on being physically within it), not \"going to the gym.\" \"Dans\" emphasizes interior location; \"à\" emphasizes the destination/activity.\n- Step 3: The pattern for places: cities → à (à Paris), feminine specific places → à la (à la gym, à la banque), masculine specific places → au (au restaurant, au cinéma), plural places → aux (aux États-Unis). Countries have their own rules (en/au/aux).\n\n\"À la\" for feminine places, \"au\" for masculine places, \"aux\" for plural places. \"En\" is for countries and fixed expressions, not specific local venues.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": false}, {"question": "The notes show \"Je suis ingénieur dans l'intelligence artificielle.\" Why is \"dans\" used here instead of \"de\" or \"en\"? What does \"dans\" contribute that the others don't? (2 steps)", "answer": "- Step 1: \"Dans l'intelligence artificielle\" = \"in artificial intelligence.\" $$Dans$$ = in/inside, indicating the field or domain in which the person works. It conveys being immersed in or operating within a particular area. \"Je travaille dans l'informatique,\" \"Il est médecin dans l'armée\" — \"dans\" sets the professional context/domain.\n- Step 2: Why not \"de\"? \"De\" would indicate origin or possession: \"ingénieur de l'intelligence artificielle\" would sound like \"engineer OF artificial intelligence\" (as if AI created the engineer). Why not \"en\"? \"En intelligence artificielle\" could work but sounds more academic/abstract (\"in the field of AI\" as a discipline). \"Dans l'IA\" sounds more natural for describing your professional context — you're working IN the AI industry/sector.\n\n\"Dans\" = immersed in a professional domain. It's the natural choice for describing what sector or field you work in.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": false}, {"question": "The roadmap describes a \"4-lane study architecture.\" What are the four lanes, and what is the purpose of having multiple lanes instead of just one approach? (4 steps)", "answer": "- Step 1: Lane 1: Structured school progression — formal lessons with a teacher, following a curriculum. This provides the backbone: grammar explanations, correction, guided practice, and progression through CEFR levels.\n- Step 2: Lane 2: Active recall and vocabulary — flashcards, spaced repetition, vocabulary drills, and self-testing. This builds the raw material (words, conjugations, structures) that you need before you can use them in context. Without Lane 2, you forget what Lane 1 teaches.\n- Step 3: Lane 3: Listening and input — podcasts, videos, music, and graded readers. This develops comprehension and \"feeling\" for the language. Your brain needs massive input to internalize patterns, rhythm, and natural expression that textbooks can't fully teach.\n- Step 4: Lane 4: Output and correction — speaking practice, writing exercises, language exchange, and getting feedback. This is where passive knowledge becomes active skill. You can recognize thousands of words but still struggle to form sentences if you never practice producing them.\n\nThe four lanes are complementary: Lane 1 (structure) + Lane 2 (retention) + Lane 3 (comprehension) + Lane 4 (production). Remove any lane, and you have a gap in your ability.", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": true}, {"question": "The notes list \"Qu'est-ce qu'il y a dans…\" as a way to ask \"What is there in…\" What's the structure of \"il y a,\" and why does \"que\" become \"qu'\" before \"il\"? (3 steps)", "answer": "- Step 1: \"Il y a\" = \"there is / there are\" — a fixed expression from il (impersonal) + y (there) + a (has, from AVOIR). \"Qu'est-ce qu'il y a dans [X]?\" = \"What is there in [X]?\" — asking about the contents of something.\n- Step 2: The \"qu'\" in \"qu'il\" is an elision of \"que.\" When \"que\" is followed by a word beginning with a vowel or silent h, it contracts to \"qu'.\" Since \"il\" starts with a vowel, \"que il\" → \"qu'il.\" This is the same elision rule as \"je ai\" → \"j'ai\" and \"ne ai\" → \"n'ai.\"\n- Step 3: The full breakdown: \"Qu'est-ce qu'il y a dans la salade niçoise?\" = \"What is it that there is in the salade niçoise?\" = \"What's in the salade niçoise?\" The structure nests \"est-ce que\" inside \"que…,\" creating a double-question marker that's standard in French but feels redundant in English translation.\n\n\"Que\" + vowel → \"qu'.\" This elision rule is universal in French: whenever a short function word ending in \"e\" meets a vowel-starting word, the \"e\" drops and an apostrophe replaces it.", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": true}, {"question": "A friend asks you \"Tu fais quoi comme sports?\" and you want to say you go to the gym. Construct your answer and explain why \"faire du sport\" uses the partitive article while \"aller à la gym\" uses \"à la.\" (3 steps)", "answer": "- Step 1: The answer: \"Je vais à la gym\" (I go to the gym) or \"Je fais du sport à la gym\" (I do sport at the gym). Both are natural. \"Je vais à la gym quatre fois par semaine\" adds the frequency.\n- Step 2: \"Faire du sport\" uses the partitive article $$du$$ because \"sport\" (masculine singular) is being treated as an uncountable activity — you're doing some sport, not one specific sport. The partitive indicates an unspecified amount of the activity. Compare: \"Je fais du foot\" (I play soccer) — here \"du\" indicates the activity category.\n- Step 3: \"Aller à la gym\" uses $$à\\ la$$ because \"gym\" is a specific feminine place — you're going TO the gym (destination). The preposition \"à\" + definite article \"la\" indicates direction toward a particular location. The two structures answer different questions: \"faire du sport\" answers \"what activity?\", \"aller à la gym\" answers \"where?\"\n\nActivity (uncountable) → partitive (du/de la). Destination (specific place) → à + definite article (à la/au/aux).", "source": "GLM 5.1 ①", "_id": "glm_1_60", "judge_pick": true}, {"question": "You're at a restaurant and everything is fine. The server asks \"Est-ce que tout va bien?\" How do you respond, and what does \"tout\" mean in this context? (2 steps)", "answer": "- Step 1: \"Est-ce que tout va bien?\" = \"Is everything going well?\" / \"Is everything okay?\" $$Tout$$ = everything/all (masculine singular as a pronoun here). The server is checking that your meal and experience are satisfactory.\n- Step 2: To respond positively: \"Oui, tout va bien, merci\" (Yes, everything is fine, thank you) or simply \"Oui, c'est très bon, merci\" (Yes, it's very good, thank you). To signal a problem: \"Non, en fait…\" (No, actually…) and explain the issue. The question is a standard mid-meal check that French servers perform.\n\n\"Est-ce que tout va bien?\" = the French server's equivalent of \"How is everything?\" — a standard courtesy check during the meal.", "source": "GLM 5.1 ①", "_id": "glm_1_61", "judge_pick": false}, {"question": "In the CEFR roadmap, why is the B1→B2 transition described as requiring more hours (270 exam-ready) than A1→A2 (132 hours)? What makes higher levels harder to progress through? (3 steps)", "answer": "- Step 1: The hour ladder increases because each level demands qualitatively more complex abilities. A1→A2 is about adding vocabulary and basic structures to existing survival skills. B1→B2 requires developing argumentation, nuance, implicit comprehension, and fluent spontaneous production — skills that don't come from memorization alone.\n- Step 2: At lower levels, progress is visible and quick — you learn \"bonjour\" and immediately use it. At higher levels, progress is incremental and harder to feel. Moving from \"I can have a simple conversation\" (B1) to \"I can defend an opinion with arguments and examples\" (B2) requires deep restructuring of your linguistic system, not just adding more words.\n- Step 3: The diminishing returns principle: early gains are easy because you're filling obvious gaps (you don't know ANY past tenses → learn one → huge improvement). Later gains require refining what you already know: eliminating persistent errors, developing idiomatic expression, understanding cultural connotation, and handling ambiguity. This takes more hours per unit of noticeable improvement.\n\nLower levels = filling gaps (fast, visible progress). Higher levels = refining and deepening (slow, incremental progress). This is why the hour ladder steepens.", "source": "GLM 5.1 ①", "_id": "glm_1_62", "judge_pick": true}, {"question": "A learner says \"Je n'ai pas une réservation\" instead of \"Je n'ai pas de réservation.\" Explain why this is incorrect and what rule is being violated. (3 steps)", "answer": "- Step 1: The correct form is \"Je n'ai pas de réservation.\" The learner's version \"Je n'ai pas une réservation\" is incorrect because it violates the negation-article rule: after ne…pas, the indefinite articles un/une/des must change to de/d'.\n- Step 2: The logic: \"une réservation\" asserts the existence of one specific reservation. \"Pas une réservation\" would literally mean \"not one reservation\" — which could imply \"not one, but maybe two\" (emphasizing the number rather than denying existence). \"Pas de réservation\" means \"no reservation at all\" — a complete denial of existence, which is the intended meaning.\n- Step 3: Exception: you CAN say \"pas un/une\" for emphatic contrast. \"Ce n'est pas un chat, c'est un chien\" (It's not a cat, it's a dog) — here \"pas un\" works because you're contrasting specific categories. But for simple negation of possession/existence, always use \"pas de\": \"Je n'ai pas de réservation,\" \"Il n'y a pas de problème,\" \"Je n'ai pas d'argent.\"\n\nSimple negation → pas de/d'. Emphatic contrast → pas un/une (rare, specific context). When in doubt, use \"pas de.\"", "source": "GLM 5.1 ①", "_id": "glm_1_63", "judge_pick": true}, {"question": "You want to say \"I would like a sparkling water\" in French. Construct the full sentence and explain each article choice. (3 steps)", "answer": "- Step 1: The sentence: \"Je voudrais une eau gazeuse, s'il vous plaît.\" Breaking it down: \"Je voudrais\" (I would like — conditional of vouloir), \"une\" (a — feminine singular indefinite article), \"eau gazeuse\" (sparkling water), \"s'il vous plaît\" (please).\n- Step 2: Why \"une\" and not \"de la\"? Because you're ordering one serving of sparkling water — it's a countable unit (one glass/bottle). \"Une eau gazeuse\" = a sparkling water (one order). If you said \"de l'eau gazeuse\" (partitive), it would mean \"some sparkling water\" — which is also possible but less specific about quantity.\n- Step 3: Why \"de l'\" and not \"du\" before \"eau\"? Because \"eau\" is feminine and starts with a vowel, so the partitive is \"de l'eau\" (de + l'). The definite article would be \"l'eau\" (l'). But in this sentence, we're using the indefinite \"une\" because it's one serving — so the partitive/definite rules don't apply here.\n\n\"Une eau gazeuse\" = one sparkling water (countable serving). \"De l'eau gazeuse\" = some sparkling water (uncountable quantity). Context determines which is more natural.", "source": "GLM 5.1 ①", "_id": "glm_1_64", "judge_pick": false}, {"question": "The notes show \"On va prendre\" for \"we'll have/take.\" What tense is \"va prendre,\" and why is this structure (aller + infinitive) used instead of a simple future tense? (3 steps)", "answer": "- Step 1: \"Va prendre\" is the futur proche (near future) — formed with the present tense of ALLER (to go) + an infinitive verb. \"On va prendre\" = literally \"we are going to take\" = \"we will take.\" This is the most common way to express future actions in spoken French.\n- Step 2: Why use futur proche instead of the futur simple? The futur simple (\"on prendra\") is more formal and used in writing or for distant/uncertain futures. The futur proche is preferred in speech for immediate or planned actions — it feels more natural and direct. In a restaurant, you're describing what you're about to do right now, so futur proche is perfect.\n- Step 3: The structure works with any subject pronoun: \"Je vais prendre\" (I'm going to take), \"Tu vas choisir\" (You're going to choose), \"Nous allons manger\" (We're going to eat), \"Ils vont commander\" (They're going to order). ALLER conjugates in present + main verb stays in infinitive.\n\nFutur proche = ALLER (present) + infinitive. It's the default future in spoken French — use it for any action about to happen or planned.", "source": "GLM 5.1 ①", "_id": "glm_1_65", "judge_pick": false}, {"question": "A common A1 confusion: when should you use \"c'est\" vs. \"il/elle est\" to describe something? Given the rule from Phuc's homework, explain the difference with examples. (3 steps)", "answer": "- Step 1: $$C'est$$ + [adjective alone] or [noun with article] = \"It's/That's…\" Used for identifying, pointing out, or emphasizing. After \"c'est,\" adjectives are ALWAYS masculine: \"C'est beau\" (It's beautiful), \"C'est bon\" (It's good) — regardless of the gender of the thing being described.\n- Step 2: $$Il/elle\\ est$$ + [adjective] = \"He/she/it is…\" Used when the subject is a specific noun with known gender. The adjective agrees: \"La ville est belle\" (The city is beautiful — feminine), \"Le film est bon\" (The film is good — masculine).\n- Step 3: The key test: can you replace the subject with a pronoun? If you're pointing something out (\"It's beautiful!\"), use \"c'est.\" If you're describing a previously mentioned noun (\"The city? It's beautiful.\"), use \"elle est belle.\" + \"C'est une belle ville\" = \"It's a beautiful city\" (c'est + noun phrase, adjective agrees with \"ville\"). + \"Elle est belle, cette ville\" = \"It's beautiful, this city\" (elle = la ville, adjective agrees).\n\n\"C'est + adjective alone\" → always masculine. \"Il/elle est + adjective\" → agrees with subject gender. When in doubt, \"c'est\" for identification, \"il/elle est\" for description of a known subject.", "source": "GLM 5.1 ①", "_id": "glm_1_66", "judge_pick": true}, {"question": "The lesson shows \"Comment tu t'appelles?\" for \"What's your name?\" Break down the reflexive structure: what does \"tu t'appelles\" literally mean, and why is the reflexive pronoun \"te\" used? (3 steps)", "answer": "- Step 1: \"Tu t'appelles\" comes from the reflexive verb S'APPELER (to call oneself). The structure: $$tu$$ (you) + $$t'$$ (yourself — reflexive pronoun, elided before a vowel) + $$appelles$$ (call — conjugated form of APPELER). Literally: \"You yourself call\" = \"You call yourself [Phuc].\"\n- Step 2: The reflexive pronoun \"te\" (t' before vowel) indicates that the subject is both doing the action and receiving it — you call YOURSELF. This is why French uses a reflexive verb for names: in French logic, you don't \"have\" a name, you \"call yourself\" a name. \"Je m'appelle Phuc\" = \"I call myself Phuc.\"\n- Step 3: The full paradigm: je m'appelle, tu t'appelles, il/elle s'appelle, nous nous appelons, vous vous appelez, ils/elles s'appellent. Each reflexive pronoun matches the subject: me/m', te/t', se/s', nous, vous, se/s'. The verb APPELER also has a spelling quirk: it doubles the \"l\" in most forms (appelle, appelles, s'appellent) but not in \"appelons\" — a conjugation irregularity to memorize.\n\n\"Comment tu t'appelles?\" = \"How do you call yourself?\" = \"What's your name?\" The reflexive structure is the standard way to state names in French.", "source": "GLM 5.1 ①", "_id": "glm_1_67", "judge_pick": false}, {"question": "You're doing the homework exercise: convert \"Tu travailles le samedi?\" into the other two question forms. Show both transformations and explain the changes. (3 steps)", "answer": "- Step 1: The given form uses intonation: \"Tu travailles le samedi?\" (You work on Saturdays?) — statement word order with rising intonation. The question is about habitual action (\"le samedi\" = on Saturdays, habitual).\n- Step 2: With \"Est-ce que\": \"Est-ce que tu travailles le samedi?\" — simply add \"Est-ce que\" at the beginning. No word order change. This works in both speech and writing, formal and informal.\n- Step 3: With inversion: \"Travailles-tu le samedi?\" — invert verb and subject pronoun with a hyphen. \"Le samedi\" stays in place at the end. This is the most formal version, appropriate for writing or formal speech. Note: \"le samedi\" (with the article) means \"every Saturday\" (habitual), while \"samedi\" (without article) could mean \"this Saturday.\"\n\nAll three ask the same question. The register shifts from casual (intonation) to versatile (est-ce que) to formal (inversion).", "source": "GLM 5.1 ①", "_id": "glm_1_68", "judge_pick": false}, {"question": "The roadmap recommends a 30-minute after-lesson block. What should you do in those 30 minutes, and why is it more effective than doing a longer review session once a week? (3 steps)", "answer": "- Step 1: The 30-minute after-lesson block should include: (1) review your lesson notes while they're fresh (5-10 min), (2) do the assigned homework or practice exercises (15 min), (3) note any questions or weak points for the next lesson (5 min). The key is doing it the same day as the lesson.\n- Step 2: Why same-day? The Ebbinghaus forgetting curve shows that you forget ~60% of new information within 24 hours without review. Reviewing within hours of the lesson dramatically reduces this decay. A 30-minute session right after class is worth more than a 2-hour session three days later, because you're consolidating before the memory fades.\n- Step 3: Why not one long weekly session? Massed practice (cramming) produces weaker long-term retention than distributed practice (spaced sessions). Short, frequent reviews build stronger neural pathways than occasional marathons. This is the same principle behind spaced repetition flashcards — the roadmap's after-lesson block is the structured version of that principle for class content.\n\n30 minutes same-day > 2 hours three days later. Timeliness beats duration for memory consolidation.", "source": "GLM 5.1 ①", "_id": "glm_1_69", "judge_pick": false}, {"question": "The notes show phone numbers spoken as \"06 78 65 67 87\" with \"soixante-dix-huit\" for 78 and \"quatre-vingts-sept\" for 87. Why are French phone numbers typically given in pairs, and what makes spelling out numbers in French phone numbers tricky? (3 steps)", "answer": "- Step 1: French phone numbers are 10 digits, typically given in pairs: 06 78 65 67 87. Each pair is read as a two-digit number: \"zéro six, soixante-dix-huit, soixante-cinq, soixante-sept, quatre-vingts-sept.\"\n- Step 2: The trickiness comes from French's vigesimal counting system. 78 = soixante-dix-huit (sixty-ten-eight = 60+18), 87 = quatre-vingts-sept (four-twenties-seven = 80+7). These compound numbers are longer to say than their English equivalents and require mental arithmetic. A simple number like 97 = \"quatre-vingt-dix-sept\" (four-twenty-ten-seven) — five words for two digits.\n- Step 3: This is why learning French numbers thoroughly is critical for practical life. You can't function in France (phone numbers, prices, times, dates) without being able to instantly decode these compounds. The best practice: have someone read phone numbers to you and write them down in real time. Start slow, build speed.\n\nFrench phone numbers = 5 pairs of 2-digit numbers. The vigesimal system makes each pair a mini-computation. Practice until it's automatic.", "source": "GLM 5.1 ①", "_id": "glm_1_70", "judge_pick": false}, {"question": "The lesson shows \"Je préfère en terrasse.\" What verb is \"préfère\" from, and why does it have an accent? Also, what does \"en terrasse\" convey vs. \"sur la terrasse\"? (3 steps)", "answer": "- Step 1: \"Préfère\" is from the verb PRÉFÉRER (to prefer), 1st person singular present. The accent grave on the first \"è\" is a spelling change that occurs in conjugated forms where the stress shifts to that syllable. The infinitive has two acute accents (é-é), but conjugation changes the first to grave (è) in most forms.\n- Step 2: \"Je préfère en terrasse\" = \"I prefer [to sit] on the terrace.\" The \"en terrasse\" is a fixed expression meaning \"on the terrace\" or \"outside\" in a restaurant context. It's the standard way to express this preference.\n- Step 3: \"En terrasse\" vs. \"sur la terrasse\": both are grammatically correct, but \"en terrasse\" is the idiomatic restaurant expression — it implies the experience of dining outside. \"Sur la terrasse\" is more literal (physically on the terrace surface) and less commonly used in this context. French often uses \"en\" for states/conditions: \"en vacances\" (on holiday), \"en terrasse\" (in outdoor dining mode).\n\n\"En terrasse\" = the natural restaurant phrase. \"Préfère\" has an accent grave due to conjugation stress patterns in PRÉFÉRER.", "source": "GLM 5.1 ①", "_id": "glm_1_71", "judge_pick": false}, {"question": "The notes show \"une entrecôte saignante\" but also \"le saumon grillé.\" Why is \"grillé\" not \"grillée\" even though \"saumon\" is the thing being described? What gender is \"saumon\"? (3 steps)", "answer": "- Step 1: \"Saumon\" (salmon) is a masculine noun — \"le saumon.\" Therefore, the adjective \"grillé\" is in its masculine form. If the noun were feminine, the adjective would be \"grillée\": \"une truite grillée\" (a grilled trout, since \"truite\" is feminine).\n- Step 2: The adjective \"grillé\" (grilled) comes from the past participle of GRILLER (to grill). When used as an adjective, it agrees in gender and number with the noun it modifies: \"un steak grillé\" (masc. sing.), \"une entrecôte grillée\" (fem. sing.), \"des légumes grillés\" (plural).\n- Step 3: Compare with \"saignante\" from \"une entrecôte saignante\" — \"entrecôte\" is feminine, so the adjective is feminine (\"saignante\" not \"saignant\"). The gender of the FOOD doesn't determine the adjective — the grammatical gender of the NOUN does. \"Saumon\" is masculine even though it's the same type of food as the feminine \"entrecôte.\"\n\nGrammatical gender ≠ biological category. \"Saumon\" (masc.) and \"entrecôte\" (fem.) are both meat/fish, but their grammatical genders differ, and adjectives must follow the grammar.", "source": "GLM 5.1 ①", "_id": "glm_1_72", "judge_pick": true}, {"question": "In the roadmap, what is the difference between \"guided hours\" and the 15% \"real-life calendar buffer\"? Why does the buffer exist, and what does it account for? (3 steps)", "answer": "- Step 1: Guided hours are the actual hours of structured learning needed to reach exam-ready proficiency at each level (132h for A1→A2, 228h for A2→B1, 270h for B1→B2). These are the \"pure study\" hours — what you'd need in an ideal world with perfect consistency.\n- Step 2: The 15% calendar buffer accounts for real-life interruptions: missed weeks due to illness, holidays, exam periods, travel, work crunches, motivation dips, and imperfect attendance. Nobody studies with 100% consistency over months and years. The buffer converts \"ideal study time\" into \"real calendar time.\"\n- Step 3: The calculation: if you need 132 guided hours and study 7.3 hours/week (S3), that's 18.1 weeks of pure study time. With the 15% buffer: 18.1 × 1.15 = 20.8 weeks ≈ 4.8 months. Without the buffer, you'd plan for 4.2 months and almost certainly miss the target. The buffer makes the timeline realistic, not optimistic.\n\nGuided hours = what you need to learn. Calendar buffer = what life takes away. Plan with the buffer, or you'll always feel behind.", "source": "GLM 5.1 ①", "_id": "glm_1_73", "judge_pick": false}, {"question": "The roadmap says \"school-only is too slow\" (2 lessons/week = ~4.6 years A1→B2). But what if someone has no time for self-study — is school-only still worth doing? What's the minimum viable self-study? (3 steps)", "answer": "- Step 1: School-only is still worth doing — it's far better than nothing. You'll still make progress, just slowly. The 4.6-year timeline for A1→B2 with school-only is long but not infinite. If your goal has no deadline, school-only works.\n- Step 2: The minimum viable self-study is 20 minutes/day of active practice (flashcards, vocabulary, short listening). This alone adds ~2.3 hours/week, which transforms the timeline: S3 (2 lessons + review + 20min/day) drops A1→B2 from 4.6 years to 1.9 years. That's a 59% reduction for just 20 minutes a day.\n- Step 3: The reason 20 minutes/day is so impactful: it prevents the \"weekend decay\" between lessons. Without daily touch, you spend the first 15 minutes of each lesson re-learning what you forgot since the last one. With daily practice, you arrive at each lesson ready to move forward. The ROI on 20 minutes/day is disproportionately high because of the spacing effect.\n\n20 minutes/day = the single highest-ROI study habit. It's the difference between reaching B2 in 2 years vs. 5 years.", "source": "GLM 5.1 ①", "_id": "glm_1_74", "judge_pick": false}, {"question": "You're at a restaurant and want to ask \"What is the dish of the day?\" using the structure from the lesson. Construct the question in French. (2 steps)", "answer": "- Step 1: Using \"Qu'est-ce que c'est\" from the lesson: \"Qu'est-ce que c'est, le plat du jour?\" = \"What is the dish of the day?\" This is the direct, standard way to ask.\n- Step 2: Alternative forms: by intonation, \"Le plat du jour, c'est quoi?\" (casual), or more formally, \"Quel est le plat du jour?\" (What is the dish of the day? — using \"quel est\" which is slightly beyond A1 but very common). The server would respond by describing the dish.\n\n\"Qu'est-ce que c'est, le plat du jour?\" is the most natural A1-level way to ask. \"Quel est le plat du jour?\" is a slightly more elegant alternative.", "source": "GLM 5.1 ①", "_id": "glm_1_75", "judge_pick": false}, {"question": "The lesson shows \"Souhaitez-vous une bouteille d'eau gazeuse ou d'eau plate?\" Why is it \"d'eau\" both times (not \"de l'eau\"), and what does the \"ou\" do? (3 steps)", "answer": "- Step 1: \"D'eau\" appears after \"bouteille de\" — the quantity noun rule. \"Une bouteille d'eau gazeuse\" = a bottle of sparkling water. \"D'eau\" = de + eau (elided), following the pattern: quantity noun + de + substance. Since \"bouteille\" is the quantity measure, \"de\" (not the partitive \"de l'\") is used.\n- Step 2: The \"ou\" = \"or\" — presenting a choice between two alternatives. \"Eau gazeuse ou eau plate?\" = \"Sparkling water or still water?\" The server is offering a choice between the two types.\n- Step 3: Notice: \"d'eau gazeuse ou d'eau plate\" — the \"d'\" is repeated before each type. This is because each \"d'eau\" connects back to \"une bouteille de\": \"une bouteille d'eau gazeuse ou [une bouteille d']eau plate.\" The second \"bouteille de\" is elided but implied. Both types are options for the same bottle.\n\nQuantity noun + de + substance. \"Ou\" = or. The \"d'eau\" repetition is because each option independently follows the \"bouteille de\" structure.", "source": "GLM 5.1 ①", "_id": "glm_1_76", "judge_pick": true}, {"question": "The lesson shows \"Je pourrais avoir l'addition\" and \"Pourrais-je avoir l'addition.\" Both use the conditional of POUVOIR. What's the difference between these two structures, and which is more formal? (3 steps)", "answer": "- Step 1: \"Je pourrais avoir l'addition\" uses the standard subject-verb-object word order with the conditional. \"Pourrais-je avoir l'addition\" uses subject-verb inversion with the conditional. Both mean \"Could I have the bill?\" — but the inversion form is more formal.\n- Step 2: The inversion \"Pourrais-je\" = \"Could I\" — the verb \"pourrais\" comes before the subject \"je,\" connected by a hyphen. This is the most formal way to ask a question with \"je\" in French. It sounds elegant and deferential, appropriate for formal contexts.\n- Step 3: In everyday restaurant situations, \"Je pourrais avoir l'addition, s'il vous plaît?\" is perfectly polite and sufficient. \"Pourrais-je avoir l'addition\" is slightly more formal than necessary for a restaurant — but it's never wrong to be extra polite. The key difference is purely register, not meaning.\n\n\"Je pourrais\" = standard polite. \"Pourrais-je\" = extra formal. Both are conditional = both are polite. Choose based on how formal you want to sound.", "source": "GLM 5.1 ①", "_id": "glm_1_77", "judge_pick": false}, {"question": "In the A1→A2 roadmap, the \"what to master\" section would include the content from this lesson. Synthesize: what are the key A1 competencies that the lesson material covers, and what connects them as a coherent skill set? (4 steps)", "answer": "- Step 1: Self-introduction: name, age, residence, nationality, profession, hobbies — using AVOIR (age), ÊTRE (profession/nationality), and reflexive verbs (s'appeler). This is the A1 \"can introduce yourself\" competency.\n- Step 2: Restaurant interaction: ordering (je voudrais/je vais prendre), specifying preferences (cuisson, drink type), requesting (l'addition), and making a reservation (phone dialogue). This covers the A1 \"can handle simple transactions\" competency.\n- Step 3: Grammar foundations: noun gender and articles (un/une/des, du/de la/des), negation (ne…pas with article change to de), question formation (3 types), and the two core verbs (AVOIR and ÊTRE). These are the structural building blocks that make all communication possible.\n- Step 4: The connecting thread: all of these competencies serve the A1 goal of \"basic survival French.\" You can introduce yourself, get a table, order food and drink, specify how you want things, ask about unfamiliar items, pay, and leave. The grammar (articles, negation, questions, core verbs) is the skeleton that holds these practical scenarios together. Without the grammar, the phrases are memorized chunks; with the grammar, they become generative tools.\n\nA1 = survival French. The lesson teaches both the phrases AND the grammar that lets you create new phrases beyond the memorized ones.", "source": "GLM 5.1 ①", "_id": "glm_1_78", "judge_pick": false}], "count": 79}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "In French, the verb AVOIR means \"to have.\" What is the full present-tense conjugation of AVOIR, and what is the key pattern that makes it an irregular verb (unlike a regular -er verb)? (3 steps)", "answer": "- Step 1: AVOIR is highly irregular — it does not follow the standard -er verb conjugation pattern (where you'd expect something like *avois, avois, avoit*). Instead, each form must be memorised individually. The full paradigm is: $$J'ai$$, $$tu\\;as$$, $$il/elle/on\\;a$$, $$nous\\;avons$$, $$vous\\;avez$$, $$ils/elles\\;ont$$.\n- Step 2: The irregularity is most visible in three places: (1) the je form contracts to j'ai rather than something like *je avois*; (2) the il/elle/on form is just a single letter \"a\"; (3) the ils/elles form is \"ont\" — completely unrelated to the stem \"av-\". These three forms are the ones most likely to cause mistakes.\n- Step 3: A useful memory hook: the nous and vous forms are the most \"regular-looking\" (avons, avez — you can see the stem \"av-\"), while the singular forms and the ils/elles form are the wild ones. When in doubt, anchor on nous avons / vous avez and work outward.\n\nThe verb AVOIR is also one of the two most important auxiliary verbs in French (alongside ÊTRE) — it is used to form the passé composé for most verbs. Getting this conjugation automatic is non-negotiable.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": true}, {"question": "How do you form the negative of AVOIR in French? Give the full negative paradigm and explain the structural rule that applies to ALL verbs in French negation. (2 steps)", "answer": "- Step 1: French negation wraps the conjugated verb in a two-part structure: **ne + [verb] + pas**. For AVOIR, this produces: $$Je\\;n'ai\\;pas$$, $$tu\\;n'as\\;pas$$, $$il/elle/on\\;n'a\\;pas$$, $$nous\\;n'avons\\;pas$$, $$vous\\;n'avez\\;pas$$, $$ils/elles\\;n'ont\\;pas$$.\n- Step 2: Notice the elision: whenever \"ne\" sits before a vowel or mute h, it contracts to n'. This happens in je n'ai (not *je ne ai*), tu n'as, il n'a, and ils n'ont. The nous and vous forms keep \"ne\" full because avons and avez start with consonants. This elision rule is universal across French — it applies to ne + any vowel-initial word.\n\nKey takeaway: **ne … pas** is a sandwich. The verb is the filling. Never put \"pas\" before the verb, and never drop \"ne\" in formal/written French (though spoken French often drops it).", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "In French, articles change depending on whether a noun is countable or uncountable (mass noun). What is the difference between \"J'ai des chocolats\" and \"J'ai du chocolat\"? Explain the article system for both categories. (3 steps)", "answer": "- Step 1: For **countable nouns** (things you can count individually), French uses the indefinite articles: $$un$$ (masculine singular), $$une$$ (feminine singular), $$des$$ (plural, both genders). So \"J'ai un chocolat\" = I have one chocolate; \"J'ai des chocolats\" = I have (some) chocolates — individual, countable items.\n- Step 2: For **uncountable/mass nouns** (substances you cannot count individually — like water, coffee, chocolate as a substance), French uses the **partitive articles**: $$du$$ (masculine), $$de\\;la$$ (feminine), $$de\\;l'$$ (before vowel). So \"J'ai du chocolat\" = I have (some) chocolate — an undefined quantity of the substance. You cannot say *J'ai un chocolat* to mean \"some chocolate substance\" — that would mean \"one chocolate candy.\"\n- Step 3: The plural form $$des$$ serves double duty — it is both the plural indefinite article (for countable plurals) AND the plural partitive article (for uncountable nouns that happen to be plural in form). Context disambiguates.\n\n+ Example: \"J'ai du café\" (some coffee — substance, masculine uncountable) vs \"J'ai un café\" (one coffee — meaning one cup/order).\n+ Example: \"J'ai de la crème brûlée\" (some crème brûlée — feminine uncountable substance) vs \"J'ai une crème brûlée\" (one crème brûlée — one serving/order).\n\nMental model: if you can put a number in front of it (1, 2, 3…), use un/une/des. If you can only talk about \"some amount\" of it, use du/de la.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "Why does \"J'ai une carafe d'eau\" use the indefinite article \"une\" instead of the partitive \"de l'eau\"? What is the conceptual distinction being made? (2 steps)", "answer": "- Step 1: The word \"carafe\" (carafe/carafe) is a **countable container** — you can have one carafe, two carafes, three carafes. Therefore it takes the indefinite article: $$une\\;carafe$$ = one carafe. The word \"d'eau\" (of water) specifies what is inside the container, but grammatically the article agrees with \"carafe,\" not with \"eau.\"\n- Step 2: If you said \"J'ai de l'eau\" (I have some water), you would be talking about water as an uncountable substance with no container specified. But \"J'ai une carafe d'eau\" = I have one carafe of water — you are counting the container, not the water. The partitive article is for the substance alone; the indefinite article is for countable units (even if they contain something uncountable).\n\n+ Same logic: \"un café\" = one coffee (countable order/cup) vs \"du café\" = some coffee (uncountable substance).\n+ Same logic: \"une assiette\" = one plate (countable) — you'd never say *de l'assiette* because a plate is always countable.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "When AVOIR is used in the negative, articles change. \"J'ai un chocolat\" becomes \"Je n'ai pas de chocolat\" — not *\"Je n'ai pas un chocolat.\"* What is the rule, and why does French do this? (2 steps)", "answer": "- Step 1: The rule: **after a negation (ne … pas), the indefinite articles un/une/des and the partitive articles du/de la/des all reduce to $$de$$** (or d' before a vowel). So: J'ai un chocolat → Je n'ai pas **de** chocolat. J'ai des chocolats → Je n'ai pas **de** chocolats. J'ai du café → Je n'ai pas **de** café. J'ai de la crème → Je n'ai pas **de** crème.\n- Step 2: The conceptual reason: negation removes the specificity. \"Un\" and \"une\" mean \"one specific item\" — but when you're saying you don't have something, the quantity zero erases the need for gender and number distinction. \"De\" becomes a universal \"any\" — \"I don't have any chocolate.\" This is why the article collapses to the neutral form.\n\n+ Important exception: when you want to emphasise \"not even one\" or contrast specifically, you CAN keep un/une: \"Je n'ai pas un euro sur moi\" (I don't have a single euro on me — emphatic). But for standard negation, use de.\n+ In the notes: \"Non, je n'ai pas de réservation\" — correctly uses de, not *une*.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "What is the conjugation of ÊTRE (to be) in the present tense, and how does its negative form work? What is one critical difference between ÊTRE and AVOIR
