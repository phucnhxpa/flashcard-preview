n't try to conjugate it for number.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "A waiter says *\"Souhaiteriez-vous une bouteille d'eau gazeuse ou d'eau plate?\"* — translate and explain the two water options. (2 steps)", "answer": "- Step 1: \"Would you like a bottle of sparkling water or still water?\" *Souhaiteriez* is the conditional of *souhaiter* (to wish) — the most formal version of \"would you like.\"\n- Step 2: The two options:\n+ *Eau gazeuse* — sparkling/carbonated water (literally \"gassy water\")\n+ *Eau plate* — still water (literally \"flat water\")\n\nBonus: if you just want tap water for free, ask for *une carafe d'eau* — French restaurants are legally required to provide it.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "In English, we capitalize days of the week and months. In French, *lundi* and *janvier* are lowercase. Why does French not capitalize these words, and what does this reveal about how French classifies them grammatically? (2 steps)", "answer": "- Step 1: In French, days of the week (*lundi, mardi...*) and months (*janvier, février...*) are always written in lowercase, unlike English (*Monday, January*).\n- Step 2: French grammar categorizes days and months as common nouns, not proper nouns. A *lundi* is just any Monday, not a unique, named entity like a person or a country. They do not get the honor of capitalization.\n+ Exception: If the day/month is part of a specific named event or holiday (e.g., *le Nouvel An* - New Year's Day), it might be capitalized, but on a standard calendar or in a sentence, they remain lowercase.", "source": "GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "The roadmap distinguishes between \"guided hours\" and \"passive exposure.\" Why doesn't watching French Netflix count the same as a lesson hour? What counts as guided? (3 steps)", "answer": "- Step 1: Guided hours are structured learning activities with feedback, correction, or deliberate practice: school lessons, teacher-assigned platform work, active listening with exercises, corrected writing/speaking, and timed exam practice. These involve conscious effort, attention to errors, and progressive difficulty.\n- Step 2: Passive exposure — French music in the background, Netflix with English subtitles, casual social media scrolling — provides input but lacks the key ingredients of learning: focused attention, error correction, output production, and deliberate challenge. Your brain may pick up occasional words, but without active engagement, the acquisition rate is far lower.\n- Step 3: The nuance: passive exposure CAN count if you make it active. Watching Netflix with French subtitles and noting unknown words, shadowing dialogue, or pausing to repeat phrases transforms passive input into guided learning. The distinction isn't about the medium — it's about what you DO with it. The roadmap counts only guided hours because they're the reliable predictor of progress.\n\nPassive = bonus. Active = counted. The difference is whether you're producing, correcting, or deliberately practicing — not just absorbing.", "source": "GLM 5.1 ①", "_id": "glm_1_42"}, {"question": "Why does going from B1 to B2 (250-270 hours) take longer than going from A1 to A2 (110-132 hours), even though both are \"one level\"? (3 steps)", "answer": "- Step 1: At lower levels, gains are concrete and high-frequency: basic vocabulary, present tense, common phrases. Each hour of study covers a lot of usable ground.\n- Step 2: At higher levels, gains become abstract and lower-frequency: nuanced grammar (subjunctive, conditional), idiomatic expressions, register awareness, complex argumentation. The same hour produces less visible progress.\n- Step 3: Also, **output quality** (speaking/writing fluently and accurately) requires far more practice than **input recognition**. B2 demands reliable production, not just comprehension — and production is where hours stack up.\n\nMental model: language acquisition is **non-linear** — each level requires roughly double the effort of the previous one in terms of fine-grained mastery.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "What does CEFR A1 practically unlock, and how does it compare to A2? Give concrete \"can-do\" examples for each. (2 steps)", "answer": "- Step 1: **A1** = basic survival. You can introduce yourself, fill in forms, buy things and pay, ask simple questions, and understand simple oral instructions and short texts. Example: you can walk into a bakery and order a baguette, give your name and address, and understand a simple schedule.\n- Step 2: **A2** = everyday routines. You can handle shops and transport, have simple conversations about daily life, describe past events, give and understand directions, and write simple personal letters. Example: you can have a basic conversation about your weekend, explain a simple problem to a pharmacist, or write a short email to a friend about your holiday.\n\n+ The jump from A1 to A2 is significant: A1 is \"survival mode\" (memorised phrases), while A2 is \"daily life mode\" (you can create your own sentences about familiar topics). A2 requires about 100-120 additional guided hours beyond A1.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "The roadmap describes four \"study lanes.\" What are they, and why does it recommend running all four simultaneously rather than focusing on just one? (3 steps)", "answer": "- Step 1: The four lanes: (1) **Lane 1: Structured school progression** — following a CEFR-aligned course with a teacher and curriculum. (2) **Lane 2: Active recall and vocabulary** — flashcards, spaced repetition, self-testing on grammar and vocabulary. (3) **Lane 3: Listening and input** — podcasts, videos, dictations, comprehension exercises with French audio. (4) **Lane 4: Output and correction** — speaking practice, writing exercises, getting feedback and corrections from a teacher or tutor.\n- Step 2: Each lane targets a different skill: Lane 1 = structured knowledge acquisition. Lane 2 = retention and retrieval speed. Lane 3 = comprehension and ear training. Lane 4 = productive ability and accuracy. No single lane covers all four skills.\n- Step 3: Running all four simultaneously creates a virtuous cycle: what you learn in class (Lane 1) gets reinforced by flashcards (Lane 2), enriched by listening (Lane 3), and solidified by output (Lane 4). Gaps in any lane become visible in the others — if you can't say it (Lane 4), you don't really know it, even if you recognise it (Lane 3).\n\n+ The most common mistake: relying only on Lane 1 (classes) and Lane 3 (passive listening) while skipping Lane 2 (active recall) and Lane 4 (output). This produces learners who can understand but not produce French — the classic \"I can read but I can't speak\" problem.", "source": "GLM 5.1 ②", "_id": "glm_2_45"}, {"question": "What is the structural and social difference between \"s'il vous plaît\" and \"s'il te plaît\"? If speaking to a waiter vs a close friend, which do you use, and why does the pronoun inside the phrase change? (2 steps)", "answer": "- Step 1: Both phrases literally translate to \"if it pleases you.\" The difference lies entirely in the pronoun: *vous* vs *te* (the object form of *tu*).\n- Step 2: *S'il vous plaît* uses the formal/plural *vous*. You use this with strangers, elders, or service workers (like a waiter) to maintain respectful distance. *S'il te plaît* uses the informal *te*. You use this with friends, family, or close peers.\n+ Misconception: Using *s'il te plaît* with a waiter would be overly familiar and awkward. Even if you are young and the waiter is young, the service context demands *s'il vous plaît*.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "In Phuc's homework, the note says \"après c'est, l'adjectif est toujours masculin.\" What does this rule mean, and why doesn't the gender of the thing being described change the adjective? Give an example. (3 steps)", "answer": "- Step 1: The rule: after $$c'est$$ (it is / this is), any adjective that follows is always in the masculine form, regardless of the gender of the noun being referred to. \"C'est beau\" = \"It's beautiful\" (masculine adjective), even if you're describing a feminine noun like \"la ville\" (the city).\n- Step 2: This happens because $$c'est$$ uses the impersonal pronoun $$ce$$, which is grammatically neuter/masculine by default. The structure \"c'est + adjective\" presents the quality as a general statement: \"It's beautiful\" — the \"it\" doesn't carry gender. So you say \"C'est beau\" for a beautiful painting (masc.), a beautiful song (fem.), a beautiful city (fem.) — the adjective stays masculine.\n- Step 3: Contrast with \"La ville est belle\" — here the subject is the feminine noun \"la ville,\" so the adjective agrees: \"belle\" (feminine). The switch happens because the subject changed from impersonal $$ce$$ to a gendered noun. + \"C'est une belle ville\" = \"It's a beautiful city\" — here \"belle\" is feminine because it directly modifies \"ville\" (the adjective is between the article and the noun, not after \"c'est\" alone).\n\nKey distinction: \"c'est + [adjective alone]\" → always masculine. \"c'est + [article + adjective + noun]\" → adjective agrees with the noun.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "Take the statement \"Vous regardez la télévision le soir.\" Convert it into the *est-ce que* question format and the *inversion* question format. (2 steps)", "answer": "- Step 1: For the *est-ce que* form, simply prefix the statement with the unchanging question flag. The original sentence remains untouched: \"Est-ce que vous regardez la télévision le soir?\"\n- Step 2: For the inversion form, flip the conjugated verb (*regardez*) and the subject pronoun (*vous*), linking them with a hyphen. The rest of the sentence stays the same: \"Regardez-vous la télévision le soir?\"\n+ Notice that *la télévision le soir* (the object and time context) never moves in either format. Only the subject-verb relationship changes.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "Why does French say *c'est beau* (not *c'est belle*) even when describing a feminine noun like *la robe*? (2 steps)", "answer": "- Step 1: When the adjective comes right after *c'est* (it is) without a noun attached, French defaults to the **masculine singular** form. *C'est beau* = \"It's beautiful\" as a general exclamation.\n- Step 2: But if the adjective directly modifies a feminine noun, it agrees: *la robe est belle* (the dress is beautiful). The rule: *c'est + adj* → masculine default; *noun + est + adj* → agrees with the noun.\n\nMental model: *c'est* refers to the abstract situation/idea, which has no gender, so French picks the unmarked masculine form.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "For numbers like 21, 31, 41, 51, and 61, French inserts the word *et* (and): *vingt-et-un*. But for 81, it is *quatre-vingt-un* without *et*. Why does the conjunction *et* appear in some decades but vanish in the 80s? (2 steps)", "answer": "- Step 1: For decades 20 through 60, the number 1 is attached with the conjunction *et* (and): *vingt-et-un*, *trente-et-un*, etc. This *et* acts as a linguistic bridge, treating \"1\" as a special addition to the decade block rather than a simple hyphenated compound like 22 (*vingt-deux*).\n- Step 2: In the 80s (*quatre-vingt-un*), the *et* vanishes because *quatre-vingts* is already a compound arithmetic expression ($$4 \\times 20$$), not a simple decade word like *vingt*. Adding *et* to an already complex multiplication block would be grammatically redundant, so French relies on pure hyphenation for all numbers above 80.\n+ Note: Swiss and Belgian French avoid this entirely by using *septante* (70), *octante/huitante* (80), and *nonante* (90), keeping a clean decimal system.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "Why is B2 — not C1 or C2 — the practical \"target level\" for most adult French learners aiming to live or study in France? (3 steps)", "answer": "- Step 1: **Service-Public** (the official French government portal) states that French nationality/naturalisation requires at least **B2** oral and written. Below B2, you can't naturalize.\n- Step 2: **Campus France** says B2 is the **minimum** for most French higher-education institutions. C1 is \"strongly recommended\" for humanities/social sciences but B2 opens the door.\n- Step 3: Lower admin thresholds use lower levels: *carte de séjour pluriannuelle* needs only A2, *carte de résident* needs B1. B2 is the highest official gate for ordinary integration goals — past B2, you're optimizing for academic/professional polish, not legal access.\n\nPractical rule: B2 is the \"stop point\" where you've unlocked France; C1/C2 is bonus.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "What is DELF, who issues it, and why does it remain valid for life? (3 steps)", "answer": "- Step 1: **DELF** (Diplôme d'études en langue française) is the official French language diploma for non-native speakers, issued by the **French Ministry of National Education** via *France Éducation International* (FEI).\n- Step 2: There are **separate, independent diplomas** for A1, A2, B1, B2 — you take a four-skill test (listening, reading, writing, speaking) for each level. Passing one doesn't expire or require the next.\n- Step 3: Validity is **for life** because DELF certifies a demonstrated ability at the time of testing — unlike TCF/TEF which are \"snapshot\" tests valid only 2 years. This makes DELF the best long-term proof for naturalization, residency, or university applications.\n\nPractical rule: take DELF if you want permanent proof; take TCF/TEF if you need a fast, recent score for a specific application.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "Why does French say $$Je\\ suis\\ ingénieur$$ without an article, even though English requires \"I am AN engineer\"?", "answer": "When stating a profession, nationality, or religion with $$être$$, French treats the noun as describing a state/category rather than identifying a specific instance — so no article is needed. This contrasts with English, which always requires \"a/an\" before a singular countable noun. However, the article reappears if you modify the noun with an adjective: $$Je\\ suis\\ un\\ bon\\ ingénieur$$ (\"I am a good engineer\") — the qualifier turns it back into a \"specific instance\" requiring the indefinite article. Same rule: $$Elle\\ est\\ médecin$$ vs $$Elle\\ est\\ un\\ médecin\\ célèbre$$.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "The roadmap describes a \"4-lane study architecture.\" What are the four lanes, and what is the purpose of having multiple lanes instead of just one approach? (4 steps)", "answer": "- Step 1: Lane 1: Structured school progression — formal lessons with a teacher, following a curriculum. This provides the backbone: grammar explanations, correction, guided practice, and progression through CEFR levels.\n- Step 2: Lane 2: Active recall and vocabulary — flashcards, spaced repetition, vocabulary drills, and self-testing. This builds the raw material (words, conjugations, structures) that you need before you can use them in context. Without Lane 2, you forget what Lane 1 teaches.\n- Step 3: Lane 3: Listening and input — podcasts, videos, music, and graded readers. This develops comprehension and \"feeling\" for the language. Your brain needs massive input to internalize patterns, rhythm, and natural expression that textbooks can't fully teach.\n- Step 4: Lane 4: Output and correction — speaking practice, writing exercises, language exchange, and getting feedback. This is where passive knowledge becomes active skill. You can recognize thousands of words but still struggle to form sentences if you never practice producing them.\n\nThe four lanes are complementary: Lane 1 (structure) + Lane 2 (retention) + Lane 3 (comprehension) + Lane 4 (production). Remove any lane, and you have a gap in your ability.", "source": "GLM 5.1 ①", "_id": "glm_1_58"}, {"question": "Why does French use \"être\" for self-introduction but \"avoir\" for age? Contrast their grammatical logic. (3 steps)", "answer": "- Step 1: **Être** establishes identity:\n+ \"Je suis Phuc\" = existential state of \"being\"\n- Step 2: **Avoir** counts life years:\n+ \"J’ai 25 ans\" = \"I possess 25 years\"\n- Step 3: Cross-linguistic comparison:\n+ English: \"I am 25\" (state) vs. French: \"I have 25 years\"\n+ Similar to Spanish: \"Tengo 25 años\"\n\n**Takeaway:** Verbs match semantic roles: \"être\" for identity, \"avoir\" for measurement.", "source": "Qwen 3 ②", "_id": "qwen_2_7"}, {"question": "A French waiter asks *\"Quelle cuisson pour la viande?\"* — what are they asking, and what are the four standard responses? (2 steps)", "answer": "- Step 1: They're asking \"What cooking [doneness] for the meat?\" — i.e., how would you like it cooked?\n- Step 2: The four standard answers from rarest to most cooked:\n+ *Bleu* — very rare (literally \"blue,\" barely cooked inside)\n+ *Saignant* — rare (literally \"bleeding\")\n+ *À point* — medium rare (the French default, \"to the point\")\n+ *Bien cuit* — well done\n\nCultural note: *à point* is the French standard; asking for *bien cuit* is often seen as wasting good meat.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "What is the DELF, who issues it, and what's special about its validity? (2 steps)", "answer": "- Step 1: DELF (Diplôme d'études en langue française) is the official French language diploma, issued by France Education International on behalf of the French Ministry of National Education. It has separate independent diplomas for A1, A2, B1, B2 — each a freestanding certificate.\n- Step 2: Special features:\n+ Internationally recognised across academic and professional contexts.\n+ **Valid for life** — unlike many language certifications (TOEFL/IELTS expire in 2 years), DELF never expires.\n+ Tests all four skills: listening, reading, writing, speaking.\n\nTakeaway: DELF is the gold-standard French qualification — permanent and globally recognised.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Explain why French numbers 70-99 are unusual. How would you say 78 and 99? (1 step)", "answer": "- French uses a vigesimal (base-20) system for numbers 70-99, inherited from older French counting.\n- **78** = **soixante-dix-huit** (60 + 10 + 8 = 78) — literally \"sixty-ten-eight\"\n- **99** = **quatre-vingts-dix-neuf** (80 + 10 + 9 = 99) — literally \"four-twenty-ten-nine\"\n\nThis system exists because Old French used base-20 (vigesimal) counting. In some French-speaking regions (Belgium, Switzerland), they use **septante** (70), **octante** (80), and **nonante** (90), but standard French uses the base-20 system.", "source": "MiniMax ①", "_id": "minimax_1_23"}, {"question": "What is the difference between *au revoir*, *à bientôt*, and *à très vite*?", "answer": "All three are farewells but carry different time expectations:\n+ *Au revoir* — \"goodbye\" (literally \"to the re-seeing\"). Neutral, used any time you leave, even if you'll never see the person again. Default polite goodbye.\n+ *À bientôt* — \"see you soon.\" Implies you'll see them within days or a week.\n+ *À très vite* — \"see you very soon\" (literally \"to very fast\"). Even more immediate or affectionate — used between friends expecting to meet again shortly.\n\nMental model: *au revoir* = transactional, *à bientôt/à très vite* = warmer, with a future meeting implied.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "The U.S. State Department classifies French as a \"Category I\" language needing ~30 weeks of intensive training. What does this tell us about realistic French timelines for adults? (2 steps)", "answer": "- Step 1: The U.S. State Department reports 552-690 class hours over 30 weeks (with ~23 hours/week of class + 17 hours/week self-study, totaling ~40 hr/week) to reach ILR 3 (≈ B2-C1) for French. That's full-time intensive study.\n- Step 2: The lesson: **fast outcomes come from high total weekly hours, not magic**. Part-time learners doing 2-4 hours/week need years to match what intensive learners achieve in months. Time-to-level scales roughly with weekly hours; halving the weekly load roughly doubles the calendar time.\n\nPractical implication: if you can't go intensive, accept multi-year timelines and optimize for consistency rather than speed.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "A French speaker asks *\"À l'intérieur ou en terrasse?\"* — what are they asking, and why are the prepositions different? (2 steps)", "answer": "- Step 1: \"Inside or on the terrace?\" — they're asking where you want to sit at the restaurant.\n- Step 2: The prepositions differ because:\n+ *À l'intérieur* uses *à* + definite article *l'* — \"at the inside,\" because *intérieur* is a noun referring to a defined space.\n+ *En terrasse* uses *en* — a preposition often used for general locations or \"modes\" of being (*en ville, en France, en voiture*). It treats *terrasse* as a state/mode of dining rather than a specific spot.\n\nYou'd hear similar pairs: *à la maison* (at home, specific) vs. *en vacances* (on vacation, mode).", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "In Phuc's introduction, he says \"Je suis ingénieur dans l'intelligence artificielle.\" Why is there no article before \"ingénieur\"? In English we say \"I am AN engineer\" — what's different in French? (3 steps)", "answer": "- Step 1: In French, when stating one's profession, nationality, or religion with \"être\" (to be), the indefinite article (un/une) is typically omitted. \"Je suis ingénieur\" = \"I am an engineer.\" You do NOT say \"Je suis un ingénieur\" in standard identification contexts.\n- Step 2: The logic: \"être + profession\" functions as an adjective-like description, not a noun phrase. You're describing what you ARE, not counting yourself as one unit of a category. Adding \"un/une\" can sound like you're emphasizing \"one among many\" or being slightly boastful in some contexts.\n- Step 3: However, if you add an adjective, the article returns: \"Je suis un bon ingénieur\" (I am a good engineer). The adjective makes it a full noun phrase rather than a bare identification. Also, \"C'est un ingénieur\" (He's an engineer) uses the article with \"c'est\" because \"c'est\" always takes an article before a profession noun.\n\nBare profession after \"je suis\" = no article. Add an adjective or use \"c'est\" = article returns.", "source": "GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "What does *Qu'est-ce que c'est?* literally break down into, and why does French need such a long phrase for \"What is it?\" (2 steps)", "answer": "- Step 1: Word by word: *Que* (what) + *est-ce que* (is it that) + *c'est* (it is) = \"What is it that it is?\" — French stacks question machinery for emphasis and clarity.\n- Step 2: Why so long? Historically, French question words felt incomplete on their own, so the language grew the *est-ce que* scaffold to mark \"this is a question.\" Modern speakers say it as one chunk — pronounced roughly *keske-sé* — and treat it like a single word meaning \"what is.\"\n\nYou can also say *C'est quoi?* in casual speech — same meaning, much shorter, but informal.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "What is the difference between \"s'il vous plaît\" and \"s'il te plaît\"? When would you use each, and what is the underlying social rule? (2 steps)", "answer": "- Step 1: Both mean \"please,\" but they differ in register based on the pronoun inside: $$s'il\\;vous\\;plaît$$ uses **vous** (formal/plural \"you\"), while $$s'il\\;te\\;plaît$$ uses **te** (informal singular \"you\"). Use \"s'il vous plaît\" with strangers, servers, colleagues you don't know well, elders, and anytime you'd use \"vous.\" Use \"s'il te plaît\" with friends, family, and people you'd call \"tu.\"\n- Step 2: In a restaurant, you would always say \"s'il vous plaît\" to the server — even if you're a regular. The server is in a professional role; \"vous\" is the default. Using \"s'il te plaît\" with a server would sound inappropriately intimate or condescending. The underlying rule: French distinguishes **vouvoiement** (using vous = respect/distance) from **tutoiement** (using tu = familiarity/closeness), and \"please\" inherits this distinction.\n\n+ Lit: \"s'il vous/te plaît\" = \"if it pleases you\" — the verb \"plaît\" agrees with the pronoun (vous vs te).", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "When AVOIR is used in the negative, articles change. \"J'ai un chocolat\" becomes \"Je n'ai pas de chocolat\" — not *\"Je n'ai pas un chocolat.\"* What is the rule, and why does French do this? (2 steps)", "answer": "- Step 1: The rule: **after a negation (ne … pas), the indefinite articles un/une/des and the partitive articles du/de la/des all reduce to $$de$$** (or d' before a vowel). So: J'ai un chocolat → Je n'ai pas **de** chocolat. J'ai des chocolats → Je n'ai pas **de** chocolats. J'ai du café → Je n'ai pas **de** café. J'ai de la crème → Je n'ai pas **de** crème.\n- Step 2: The conceptual reason: negation removes the specificity. \"Un\" and \"une\" mean \"one specific item\" — but when you're saying you don't have something, the quantity zero erases the need for gender and number distinction. \"De\" becomes a universal \"any\" — \"I don't have any chocolate.\" This is why the article collapses to the neutral form.\n\n+ Important exception: when you want to emphasise \"not even one\" or contrast specifically, you CAN keep un/une: \"Je n'ai pas un euro sur moi\" (I don't have a single euro on me — emphatic). But for standard negation, use de.\n+ In the notes: \"Non, je n'ai pas de réservation\" — correctly uses de, not *une*.", "source": "GLM 5.1 ②", "_id": "glm_2_4"}, {"question": "In French, when expressing \"I have some chocolate\" (uncountable) vs \"I have a chocolate\" (one) vs \"I have chocolates\" (plural countable), which articles are used and why does the language make this distinction? (3 steps)", "answer": "- Step 1: French distinguishes between countable and uncountable quantities using different articles. For one specific countable item, use the indefinite singular: $$un$$ (masculine) or $$une$$ (feminine). So \"I have a chocolate\" = $$J'ai\\ un\\ chocolat$$.\n- Step 2: For multiple countable items, use the plural indefinite $$des$$. So \"I have chocolates\" = $$J'ai\\ des\\ chocolats$$.\n- Step 3: For an unspecified amount of an uncountable substance (\"some\"), use the partitive: $$du$$ (masculine), $$de\\ la$$ (feminine), $$des$$ (plural). So \"I have some chocolate\" = $$J'ai\\ du\\ chocolat$$.\n+ The partitive captures the idea that you're taking *a portion of* the substance, not a whole unit of it. English often drops \"some\" but French requires this article.\n\nTakeaway: French forces you to mark whether you're counting units or scooping a portion — there is no \"bare noun\" like in English.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "Conjugate *avoir* (to have) in the present tense for all six persons, and explain what makes this verb irregular.", "answer": "- Step 1: The forms are:\n+ *j'ai* (I have)\n+ *tu as* (you have, informal)\n+ *il/elle/on a* (he/she/one has)\n+ *nous avons* (we have)\n+ *vous avez* (you have, formal/plural)\n+ *ils/elles ont* (they have)\n- Step 2: It's irregular because the stem changes dramatically across persons — *ai, as, a, av-, av-, ont*. There is no clean \"avoir + ending\" pattern like regular *-er* verbs.\n- Step 3: This irregularity matters because *avoir* is also the main auxiliary for the passé composé (past tense), so you'll use these forms constantly to build past sentences like *j'ai mangé*.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "When asking for the bill, you can say \"L'addition\" or \"La note.\" What is the subtle conceptual difference between an \"addition\" and a \"note\" in the context of a restaurant, and why might one be more common? (2 steps)", "answer": "- Step 1: *L'addition* literally means \"the addition\" (the mathematical sum). It emphasizes the act of adding up the prices of all the items you consumed to reach a total.\n- Step 2: *La note* literally means \"the note\" (a written record). In a restaurant, it's the written invoice of what you owe, similar to a \"bill.\" Both are completely acceptable, but *l'addition* is slightly more common in spoken restaurant contexts because it directly asks the waiter to \"do the math\" and bring the total.\n+ To ask for it politely: \"Je pourrais avoir l'addition s'il vous plaît?\" (Could I have the bill please?)", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "When ordering for a group, the notes show \"On va prendre\" and \"On aimerait.\" What does \"on\" mean here, and why would you use \"on\" instead of \"nous\"? (3 steps)", "answer": "- Step 1: $$On$$ is a subject pronoun that literally means \"one\" (impersonal) but in spoken French is overwhelmingly used to mean \"we\" — replacing $$nous$$ in everyday speech. \"On va prendre\" = \"We're going to have,\" \"On aimerait\" = \"We would like.\"\n- Step 2: Why use \"on\" instead of \"nous\"? In casual and standard spoken French, \"on\" has almost completely replaced \"nous\" as the 1st person plural pronoun. \"Nous\" sounds formal and is more common in writing or formal speech. \"On va prendre\" sounds natural; \"Nous allons prendre\" sounds like a textbook.\n- Step 3: Grammatically, \"on\" takes 3rd person singular conjugation (even though it means \"we\"). So \"on va\" (not \"on allons\"), \"on aimerait\" (not \"on aimerions\"). This is the one exception where meaning (\"we\") and grammar (3rd person singular) don't match.\n\n\"On\" = \"we\" in speech (3rd person singular verb). \"Nous\" = \"we\" in writing/formal speech (1st person plural verb). Both are correct; \"on\" is more natural orally.", "source": "GLM 5.1 ①", "_id": "glm_1_35"}, {"question": "French numbers from 0 to 16 each have their own unique, independent word (*zéro* to *seize*). What happens structurally at 17, and why is 16 considered the \"breakpoint\" where French shifts from unique vocabulary to a combinatorial system? (2 steps)", "answer": "- Step 1: At 17, the system breaks into combinatorial logic: *dix-sept* (ten-seven). From here on, numbers are constructed by concatenating smaller units ($$10+7$$, $$10+8$$, $$10+9$$, $$20+1$$, etc.).\n- Step 2: This breakpoint exists because early French (and its Latin/Gallic roots) only needed unique words for the most frequently used small numbers. Beyond 16, counting became an additive mental exercise rather than a memorized vocabulary list, so the language stopped inventing new words and just combined the existing ones.\n+ Contrast: English does this at 13 (thirteen = ten+three), but French holds out until 17.", "source": "GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "A learner says \"Je n'ai pas une réservation\" instead of \"Je n'ai pas de réservation.\" Explain why this is incorrect and what rule is being violated. (3 steps)", "answer": "- Step 1: The correct form is \"Je n'ai pas de réservation.\" The learner's version \"Je n'ai pas une réservation\" is incorrect because it violates the negation-article rule: after ne…pas, the indefinite articles un/une/des must change to de/d'.\n- Step 2: The logic: \"une réservation\" asserts the existence of one specific reservation. \"Pas une réservation\" would literally mean \"not one reservation\" — which could imply \"not one, but maybe two\" (emphasizing the number rather than denying existence). \"Pas de réservation\" means \"no reservation at all\" — a complete denial of existence, which is the intended meaning.\n- Step 3: Exception: you CAN say \"pas un/une\" for emphatic contrast. \"Ce n'est pas un chat, c'est un chien\" (It's not a cat, it's a dog) — here \"pas un\" works because you're contrasting specific categories. But for simple negation of possession/existence, always use \"pas de\": \"Je n'ai pas de réservation,\" \"Il n'y a pas de problème,\" \"Je n'ai pas d'argent.\"\n\nSimple negation → pas de/d'. Emphatic contrast → pas un/une (rare, specific context). When in doubt, use \"pas de.\"", "source": "GLM 5.1 ①", "_id": "glm_1_63"}, {"question": "Edge case: Why is 71 \"soixante-et-onze\" (with \"et\") but 72 is \"soixante-douze\" (with a hyphen, no \"et\")? What determines whether \"et\" appears? (2 steps)", "answer": "- Step 1: The \"et\" in \"soixante-et-onze\" is there because French treats 71 as \"sixty AND eleven\" — the \"et\" connects 60 to 11. This is a special case: 71 is the only number in the 70s that uses \"et,\" and it's because 11 (onze) starts the sequence of \"teens\" being added to 60.\n- Step 2: From 72 onward, the connection is purely additive and uses hyphens: soixante-douze (60-12), soixante-treize (60-13), etc. The \"et\" only appears when connecting a round tens number to \"un\" (vingt-et-un, trente-et-un) or in the unique case of soixante-et-onze. It never appears with 2-9 or 12-19.\n\n+ Pattern: \"et\" appears with exactly \"1\" (un) after simple tens, and with \"11\" (onze) after soixante. That's it. Every other compound number uses a hyphen.", "source": "GLM 5.1 ②", "_id": "glm_2_56"}, {"question": "In French, the pronoun \"on\" can mean \"we\" in informal speech. How does this work in restaurant ordering, and what conjugation does \"on\" take? (2 steps)", "answer": "- Step 1: In informal spoken French, \"on\" commonly replaces \"nous\" to mean \"we.\" The verb after \"on\" is conjugated in the **third person singular** (same as il/elle). So: \"On va prendre\" = We'll have (literally \"one is going to take\"), \"On aimerait\" = We would like, \"On pourrait avoir\" = We could have / Can we have.\n- Step 2: In the restaurant context, when ordering for a group, you'd say: \"On va prendre la salade niçoise\" (We'll have the salade niçoise) rather than \"Nous allons prendre…\" The \"on\" form is shorter and more natural in speech. \"Nous\" is not wrong — it's just more formal and less common in casual spoken French.\n\n+ \"Est-ce qu'on pourrait avoir l'addition?\" = Can we have the bill? (informal group request)\n+ Important: \"on\" conjugates like il/elle, NOT like nous. \"On a\" (not *on avons*), \"On est\" (not *on sommes*).", "source": "GLM 5.1 ②", "_id": "glm_2_31"}, {"question": "In French, the verb AVOIR means \"to have.\" What is the full present-tense conjugation of AVOIR, and what is the key pattern that makes it an irregular verb (unlike a regular -er verb)? (3 steps)", "answer": "- Step 1: AVOIR is highly irregular — it does not follow the standard -er verb conjugation pattern (where you'd expect something like *avois, avois, avoit*). Instead, each form must be memorised individually. The full paradigm is: $$J'ai$$, $$tu\\;as$$, $$il/elle/on\\;a$$, $$nous\\;avons$$, $$vous\\;avez$$, $$ils/elles\\;ont$$.\n- Step 2: The irregularity is most visible in three places: (1) the je form contracts to j'ai rather than something like *je avois*; (2) the il/elle/on form is just a single letter \"a\"; (3) the ils/elles form is \"ont\" — completely unrelated to the stem \"av-\". These three forms are the ones most likely to cause mistakes.\n- Step 3: A useful memory hook: the nous and vous forms are the most \"regular-looking\" (avons, avez — you can see the stem \"av-\"), while the singular forms and the ils/elles form are the wild ones. When in doubt, anchor on nous avons / vous avez and work outward.\n\nThe verb AVOIR is also one of the two most important auxiliary verbs in French (alongside ÊTRE) — it is used to form the passé composé for most verbs. Getting this conjugation automatic is non-negotiable.", "source": "GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "When introducing yourself in French, how do you say your age and why is the verb choice surprising for English speakers? (2 steps)", "answer": "- Step 1: You say *J'ai 25 ans* — literally \"I **have** 25 years.\" French uses *avoir* (to have), not *être* (to be), for age.\n- Step 2: This trips up English speakers who say *Je suis 25* (literally \"I am 25\"), which is wrong. French treats age as something you possess (a count of years), not something you are. Same logic for hunger (*j'ai faim* = \"I have hunger\") and thirst (*j'ai soif*).\n\nPattern to remember: states that you *accumulate over time* (age, hunger, thirst, fear) use *avoir* in French.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "In French, articles change depending on whether a noun is countable or uncountable (mass noun). What is the difference between \"J'ai des chocolats\" and \"J'ai du chocolat\"? Explain the article system for both categories. (3 steps)", "answer": "- Step 1: For **countable nouns** (things you can count individually), French uses the indefinite articles: $$un$$ (masculine singular), $$une$$ (feminine singular), $$des$$ (plural, both genders). So \"J'ai un chocolat\" = I have one chocolate; \"J'ai des chocolats\" = I have (some) chocolates — individual, countable items.\n- Step 2: For **uncountable/mass nouns** (substances you cannot count individually — like water, coffee, chocolate as a substance), French uses the **partitive articles**: $$du$$ (masculine), $$de\\;la$$ (feminine), $$de\\;l'$$ (before vowel). So \"J'ai du chocolat\" = I have (some) chocolate — an undefined quantity of the substance. You cannot say *J'ai un chocolat* to mean \"some chocolate substance\" — that would mean \"one chocolate candy.\"\n- Step 3: The plural form $$des$$ serves double duty — it is both the plural indefinite article (for countable plurals) AND the plural partitive article (for uncountable nouns that happen to be plural in form). Context disambiguates.\n\n+ Example: \"J'ai du café\" (some coffee — substance, masculine uncountable) vs \"J'ai un café\" (one coffee — meaning one cup/order).\n+ Example: \"J'ai de la crème brûlée\" (some crème brûlée — feminine uncountable substance) vs \"J'ai une crème brûlée\" (one crème brûlée — one serving/order).\n\nMental model: if you can put a number in front of it (1, 2, 3…), use un/une/des. If you can only talk about \"some amount\" of it, use du/de la.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "Why is it \"J'ai du saumon grillé\" but \"Elle a un saumon grillé\"? Both involve salmon — what determines whether you use the partitive (du) vs. the indefinite article (un)? (3 steps)", "answer": "- Step 1: It depends on whether you're thinking of the salmon as a mass/substance or as a countable individual item. \"Du saumon\" = some salmon (the food substance, a portion of it — uncountable). \"Un saumon\" = one salmon (a whole individual fish, countable).\n- Step 2: In a restaurant context, \"J'ai du saumon grillé\" means \"I have (some) grilled salmon\" — a serving/portion of the substance. \"Elle a un saumon grillé\" would mean \"she has a grilled salmon\" — implying one entire fish, which is possible but less common in restaurant ordering.\n- Step 3: The same noun can be countable or uncountable depending on perspective. \"Un café\" = a coffee (a cup/order), \"du café\" = coffee (the beverage substance). \"Une crème brûlée\" = a crème brûlée (one serving), \"de la crème brûlée\" = some crème brûlée (the dessert as substance). Context and intended meaning determine the article.\n\nThe noun itself doesn't rigidly lock to one article — your perspective on it (countable unit vs. mass substance) does.", "source": "GLM 5.1 ①", "_id": "glm_1_3"}, {"question": "When negating a sentence with an article like *un* or *des*, the article itself changes. Why does \"J'ai des chocolats\" become \"Je n'ai pas **de** chocolats\" in the negative, instead of \"Je n'ai pas des chocolats\"? What is the conceptual logic behind this shift? (3 steps)", "answer": "- Step 1: In the affirmative, \"J'ai des chocolats\" uses *des* (some, plural indefinite) because the quantity is positive but unspecified—you have an existing number of chocolates.\n- Step 2: In the negative, the concept of \"some\" is entirely wiped out. If you don't have *any* chocolates, the quantity is zero. French uses *de* (or *d'* before a vowel) to represent this zero/absence quantity.\n- Step 3: Saying \"Je n'ai pas des chocolats\" would logically imply you don't have *some specific* chocolates, but might have others—which contradicts the absolute void of negation. Therefore, *un, une, des* all collapse into *de/d'* in the negative to express \"not any.\"\n+ Exception: If you are negating a specific, contrasted item (\"I don't want *this* book, I want *that* book\"), you can keep *ce/ces*, but for general indefinite articles, it's always *de*.\n\nTakeaway: Affirmative = *un/une/des*. Negative = always *de/d'*.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "What is the difference between $$s'il\\ vous\\ plaît$$ and $$s'il\\ te\\ plaît$$, and what underlying grammar choice drives it?", "answer": "Both mean \"please,\" but they reflect the formality of the addressee. $$s'il\\ vous\\ plaît$$ uses $$vous$$ — the formal/polite or plural \"you\" — and is the default for waiters, strangers, elders, professional contexts. $$s'il\\ te\\ plaît$$ uses $$te$$ — the informal singular \"you\" — and is for friends, family, children, peers. Literally, both mean \"if it pleases you.\" This choice cascades through the entire conversation: once you pick $$tu$$ or $$vous$$, all pronouns, verb conjugations, and possessives must match. In a restaurant, always default to $$vous$$ unless you know the server personally.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Why does French use AVOIR (to have) for age instead of ÊTRE (to be), unlike English? What is the conceptual difference? (2 steps)", "answer": "- Step 1: In French, you say $$J'ai\\;25\\;ans$$ — literally \"I have 25 years.\" The conceptual model is that years are something you possess or accumulate, like objects in a collection. You \"have\" them. English says \"I am 25\" — using \"to be,\" where age is an identity/state.\n- Step 2: This AVOIR-for-age pattern extends to other states that English expresses with \"to be\": \"J'ai faim\" (I have hunger = I am hungry), \"J'ai soif\" (I have thirst = I am thirsty), \"J'ai froid\" (I have cold = I am cold), \"J'ai peur\" (I have fear = I am afraid). The French mental model: these are temporary conditions you \"have,\" not permanent identities you \"are.\"\n\n+ This is why the question is \"Tu as quel âge?\" (You have what age?) not *Tu es quel âge?* (You are what age?).", "source": "GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "Conjugate the verb ÊTRE (to be) in the present tense, both affirmative and negative. What makes ÊTRE even more irregular than AVOIR? (3 steps)", "answer": "- Step 1: Affirmative: $$je\\ suis$$, $$tu\\ es$$, $$il/elle/on\\ est$$, $$nous\\ sommes$$, $$vous\\ êtes$$, $$ils/elles\\ sont$$. Negative: $$je\\ ne\\ suis\\ pas$$, $$tu\\ n'es\\ pas$$, $$il/elle/on\\ n'est\\ pas$$, $$nous\\ ne\\ sommes\\ pas$$, $$vous\\ n'êtes\\ pas$$, $$ils/elles\\ ne\\ sont\\ pas$$.\n- Step 2: ÊTRE is even more irregular than AVOIR because it has at least five distinct stem forms across six persons: \"suis,\" \"es,\" \"est,\" \"sommes,\" \"êtes,\" \"sont.\" There is no single identifiable stem — each form must be memorized independently. AVOIR at least keeps \"av-\" in nous/vous forms.\n- Step 3: Etymology: ÊTRE derives from two different Latin verbs — $$esse$$ (to be) and $$stare$$ (to stand), which merged in Old French. This is why the forms look so heterogeneous — they come from different roots. English has a parallel: \"am,\" \"is,\" \"are\" also come from different Indo-European roots.\n\nÊTRE and AVOIR are the two most important French verbs — they serve as auxiliaries for all compound tenses.", "source": "GLM 5.1 ①", "_id": "glm_1_13"}, {"question": "Why does the roadmap say \"school-only is too slow\" for reaching B2? What is the approximate timeline with 2 lessons per week and no additional study? (2 steps)", "answer": "- Step 1: With only 2 lessons per week (3 hours/week of class) and no review or daily practice, A1→B2 takes approximately **55.6 months / 4.6 years**. This is because 3 hours/week × 52 weeks = 156 hours/year, and you need 630 exam-ready hours. Even without any breaks, that's over 4 years of pure class time.\n- Step 2: The problem is compounded by the **forgetting curve** — without review between lessons, you lose a significant portion of each lesson before the next one. The 15% buffer for real-life interruptions (holidays, exams, illness, travel) makes it even longer. School-only is the slowest path because you're relying entirely on input time with no structured reinforcement.\n\n+ The roadmap's conclusion: if B2 is the goal (for naturalisation, university, or professional reasons), school-only is not a credible strategy within a reasonable timeframe. You need the multiplier effect of self-study and daily practice.", "source": "GLM 5.1 ②", "_id": "glm_2_40"}, {"question": "In the homework, the sentence \"Non, il n'y a pas de problème\" appears. Break down \"il n'y a pas de\" — what is each component, and why is it \"de problème\" rather than \"un problème\" or \"des problèmes\"? (4 steps)", "answer": "- Step 1: \"Il y a\" is a fixed expression meaning \"there is / there are.\" It comes from \"il\" (impersonal \"it\") + \"y\" (there) + \"a\" (has, from AVOIR). Literally: \"it there has\" = \"there is/are.\"\n- Step 2: In the negative, \"il y a\" becomes \"il n'y a pas\" — the standard ne…pas wraps around \"a\": ne → n' (elision before y), then \"y,\" then \"a,\" then \"pas.\"\n- Step 3: After a negative like \"il n'y a pas,\" the article changes to $$de$$. This is a key French rule: in negation, \"un/une/des\" before a noun becomes \"de\" (or \"d'\" before a vowel). \"Il y a un problème\" → \"Il n'y a pas de problème.\" \"Il y a des problèmes\" → \"Il n'y a pas de problèmes.\"\n- Step 4: The logic: negation removes the specificity. \"Un problème\" specifies one problem; \"des problèmes\" specifies some problems. But \"pas de problème\" says \"not ANY problem\" — the quantity is zero, so the article reduces to the generic \"de.\" This rule (negation → de instead of un/une/des) is one of the most important A1 grammar rules.\n\nPattern: affirmative with un/une/des → negative with de/d'. This applies broadly, not just to \"il y a.\"", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "The notes show \"Je n'ai pas de réservation\" (I don't have a reservation). Why is it \"de réservation\" and not \"une réservation\" in the negative? Connect this to the broader negation rule. (3 steps)", "answer": "- Step 1: This is the same negation-article rule seen in \"il n'y a pas de problème.\" In the affirmative, you'd say \"J'ai une réservation\" (I have a reservation). In the negative, the indefinite article \"une\" changes to \"de\": \"Je n'ai pas de réservation.\"\n- Step 2: The rule: after $$ne…pas$$ (and other negative structures like ne…plus, ne…jamais), the articles $$un$$, $$une$$, and $$des$$ all become $$de$$ (or $$d'$$ before a vowel). This applies universally — not just with AVOIR or \"il y a.\" \"J'ai des amis\" → \"Je n'ai pas d'amis.\" \"Il y a un problème\" → \"Il n'y a pas de problème.\"\n- Step 3: The logic: negation nullifies the quantity. \"Une réservation\" asserts the existence of one reservation. \"Pas de réservation\" denies the existence of any reservation — the quantity is zero, so the specific article is replaced by the generic \"de.\" Note: definite articles (le, la, les) do NOT change in negation: \"Je n'aime pas le café\" (not \"Je n'aime pas de café\") — because you're negating a specific, known thing, not a quantity.\n\nun/une/des → de/d' after ne…pas. This is one of the most important A1 grammar rules.", "source": "GLM 5.1 ①", "_id": "glm_1_44"}, {"question": "The server asks \"Votre numéro de téléphone pour confirmer la réservation?\" Why is there no verb in this sentence, and what does this reveal about spoken French in service contexts? (2 steps)", "answer": "- Step 1: This is an elliptical question — the verb is implied but omitted. The full version would be \"Quel est votre numéro de téléphone pour confirmer la réservation?\" or \"Pouvez-vous me donner votre numéro de téléphone?\" The server drops the verb for brevity, which is extremely common in spoken service French.\n- Step 2: Spoken French frequently drops elements that are recoverable from context. The server doesn't need a full grammatical sentence because the context (making a reservation by phone) makes the intent obvious. Other examples: \"Pour combien?\" (For how many?) instead of \"C'est pour combien de personnes?\", \"À quelle heure?\" (At what time?) instead of \"À quelle heure souhaitez-vous venir?\"\n\nEllipsis = normal in spoken French, especially in service. Don't expect every sentence to have a full subject-verb structure.", "source": "GLM 5.1 ①", "_id": "glm_1_52"}, {"question": "Why do French speakers use the verb *avoir* (to have) rather than *être* (to be) to express age? If someone is 25, what is the literal translation of the French phrase, and what does this reveal about how French conceptualizes age? (3 steps)", "answer": "- Step 1: In English, age is seen as an identity state: \"I *am* 25.\" We use the verb *être* (to be). But in French, age is seen as something you possess: \"I *have* 25 years.\" They use the verb *avoir* (to have).\n- Step 2: The literal translation of \"J'ai 25 ans\" is \"I have 25 years.\" The word *ans* (years) is the direct object that you \"have.\"\n- Step 3: This reveals that French conceptualizes age as an accumulated asset or possession, rather than an intrinsic property of the self. You collect years like you collect books.\n+ Misconception: Never say \"Je suis 25\" or \"Je suis 25 ans\" in French—this sounds like you are claiming to literally be the number 25 or the concept of 25 years.\n\nTakeaway: Always use *avoir* for age; never *être*.", "source": "GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "What's the difference between *je voudrais*, *je pourrais*, and *j'aimerais* when ordering food? (3 steps)", "answer": "- Step 1: All three are polite conditional forms meaning roughly \"I would like / I could have.\" They're interchangeable in a restaurant context.\n+ *Je voudrais* = \"I would like\" (from *vouloir*, to want)\n+ *J'aimerais* = \"I would like\" (from *aimer*, to love/like)\n+ *Je pourrais avoir* = \"Could I have\" (from *pouvoir*, to be able)\n- Step 2: Why use them instead of *je veux* (I want)? *Je veux* sounds blunt, even rude, in a service context. The conditional softens the request — it's the French equivalent of \"I'd like\" vs. \"I want.\"\n- Step 3: *Je vais prendre* (\"I'm going to take\") is even more casual and direct, but acceptable. *Je voudrais* is the safest formal default.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "In French, the verb AVOIR means \"to have.\" What are all six present-tense forms, and why does the conjugation look irregular compared to a typical -er verb? (3 steps)", "answer": "- Step 1: The six forms are: $$J'ai$$, $$tu\\ as$$, $$il/elle/on\\ a$$, $$nous\\ avons$$, $$vous\\ avez$$, $$ils/elles\\ ont$$. Notice the stem shifts — it's not a clean \"av-\" across the board. The je form drops the subject pronoun's consonant and contracts: \"je ai\" becomes \"j'ai.\"\n- Step 2: AVOIR is a high-frequency irregular verb (like ÊTRE). Its forms derive from Latin $$habere$$, and centuries of spoken French eroded and reshaped the endings. This is why you see three different stems: \"ai-\" (j'ai, tu as, il a), \"av-\" (nous avons, vous avez), and \"on-\" (ils ont).\n- Step 3: The practical takeaway: you must memorize these six forms — there is no regular pattern to derive them from. A useful anchor is that the nous/vous forms keep the recognizable \"av-\" stem, while the ils/elles form \"ont\" looks nothing like the others but is the same root as the English word \"own\" (cognate hint).\n\nMemorize the six forms cold — they appear in nearly every conversation.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "How do you form the negative of AVOIR in French? Give the full conjugation and explain the structural rule that applies to ALL verbs in the negative. (3 steps)", "answer": "- Step 1: French negation wraps the verb in two parts: $$ne$$ before the verb and $$pas$$ after it. The structure is: Subject + $$ne$$ + verb + $$pas$$.\n- Step 2: Applied to AVOIR: $$je\\ n'ai\\ pas$$, $$tu\\ n'as\\ pas$$, $$il/elle/on\\ n'a\\ pas$$, $$nous\\ n'avons\\ pas$$, $$vous\\ n'avez\\ pas$$, $$ils/elles\\ n'ont\\ pas$$.\n- Step 3: Critical detail — when the verb begins with a vowel or silent h, $$ne$$ elides to $$n'$$. This is why it's \"je n'ai pas\" not \"je ne ai pas,\" and \"il n'a pas\" not \"il ne a pas.\" But with nous/vous/ils, the verb starts with a consonant, so $$ne$$ stays whole: \"nous ne avons pas\" is wrong; it's \"nous n'avons pas\" — wait, actually \"avons\" starts with a vowel, so it IS \"nous n'avons pas.\" Check every form: if the verb form starts with a vowel, elide.\n\nThe ne…pas sandwich is universal for all verbs — not just AVOIR.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "You see three sentences: \"J'ai un chocolat,\" \"J'ai des chocolats,\" and \"J'ai du chocolat.\" What is the conceptual difference between these three, and why does French need three different article types where English just says \"I have chocolate\" or \"I have chocolates\"? (4 steps)", "answer": "- Step 1: \"J'ai un chocolat\" uses the indefinite article $$un$$ — it means \"I have one chocolate\" (a single, countable individual chocolate, like a chocolate bar or a chocolate candy). Masculine singular countable.\n- Step 2: \"J'ai des chocolats\" uses the indefinite plural article $$des$$ — it means \"I have chocolates\" (multiple countable individual chocolates). Plural countable.\n- Step 3: \"J'ai du chocolat\" uses the partitive article $$du$$ — it means \"I have (some) chocolate\" (uncountable mass — think of chocolate as a substance, like a block of chocolate or chocolate flavor). You're not counting units; you're referring to an undetermined quantity of a mass noun.\n- Step 4: English often drops the article for mass nouns (\"I have chocolate\"), but French grammatically requires an article before virtually every noun. For uncountable/mass nouns, French uses the partitive: $$du$$ (masculine), $$de\\ la$$ (feminine), $$de\\ l'$$ (before vowel). This signals \"some unspecified amount of\" the substance.\n\nKey insight: French never lets a bare noun sit without an article — every noun must wear its \"hat\" (indefinite, definite, or partitive).", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "Why is it \"J'ai du saumon grillé\" but \"Elle a un saumon grillé\"? Both involve salmon — what determines whether you use the partitive (du) vs. the indefinite article (un)? (3 steps)", "answer": "- Step 1: It depends on whether you're thinking of the salmon as a mass/substance or as a countable individual item. \"Du saumon\" = some salmon (the food substance, a portion of it — uncountable). \"Un saumon\" = one salmon (a whole individual fish, countable).\n- Step 2: In a restaurant context, \"J'ai du saumon grillé\" means \"I have (some) grilled salmon\" — a serving/portion of the substance. \"Elle a un saumon grillé\" would mean \"she has a grilled salmon\" — implying one entire fish, which is possible but less common in restaurant ordering.\n- Step 3: The same noun can be countable or uncountable depending on perspective. \"Un café\" = a coffee (a cup/order), \"du café\" = coffee (the beverage substance). \"Une crème brûlée\" = a crème brûlée (one serving), \"de la crème brûlée\" = some crème brûlée (the dessert as substance). Context and intended meaning determine the article.\n\nThe noun itself doesn't rigidly lock to one article — your perspective on it (countable unit vs. mass substance) does.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "You want to say \"I would like\" in French at a restaurant. Your notes list three options: \"Je voudrais,\" \"Je pourrais,\" and \"J'aimerais.\" What is the literal meaning of each, and how do they differ in nuance? Which is the most standard polite ordering phrase? (3 steps)", "answer": "- Step 1: $$Je\\ voudrais$$ = \"I would want\" (conditional of vouloir). This is the most standard, universally polite way to order. It's direct but softened by the conditional mood.\n- Step 2: $$Je\\ pourrais$$ = \"I could\" (conditional of pouvoir). This is more indirect — literally \"Could I…\" — and thus even more polite/deferential. Often followed by \"avoir\" (have): \"Je pourrais avoir l'addition?\" = \"Could I have the bill?\"\n- Step 3: $$J'aimerais$$ = \"I would like\" (conditional of aimer). Slightly warmer and more personal than \"voudrais\" — it expresses a wish. \"J'aimerais avoir\" = \"I would like to have.\" All three are polite and acceptable; \"je voudrais\" is the default go-to for ordering.\n\nIn practice: \"Je voudrais\" for ordering, \"Je pourrais avoir\" for requesting things (bill, assistance), \"J'aimerais\" for expressing preferences more warmly.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "What's the difference between \"s'il vous plaît\" and \"s'il te plaît\"? When would you use each, and what does the \"vous\" vs. \"te\" signal? (2 steps)", "answer": "- Step 1: Both mean \"please,\" but they differ by register. $$S'il\\ vous\\ plaît$$ uses $$vous$$ (formal/plural \"you\") — use it with strangers, servers, elders, professionals, anyone you'd address formally. $$S'il\\ te\\ plaît$$ uses $$te$$ (informal \"you\") — use it with friends, family, close peers.\n- Step 2: In a restaurant, you always say \"s'il vous plaît\" to the server — the formal register is expected. Using \"s'il te plaît\" with a server would sound inappropriately familiar. The \"vous/te\" in \"s'il vous/te plaît\" is actually the indirect object pronoun from the fuller expression \"s'il vous/te plaît\" = \"if it pleases you.\"\n\nRule of thumb: when in doubt, default to \"s'il vous plaît\" — over-polite is always safer than under-polite in French culture.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "A server asks you \"Quelle cuisson pour la viande?\" What are the four cooking levels in French, from least cooked to most cooked, and what does each literally mean or evoke? (4 steps)", "answer": "- Step 1: $$Bleu$$ — the most rare. Literally \"blue.\" The meat is barely seared on the outside; the inside is essentially raw and cool. The name evokes the blue-purple color of nearly raw meat.\n- Step 2: $$Saignant$$ — rare. Literally \"bleeding.\" The meat is seared and warm inside but still very red and juicy — it \"bleeds\" when cut.\n- Step 3: $$À\\ point$$ — medium rare (the French standard). Literally \"to the point\" or \"just right.\" The meat is pink in the center, warm throughout. This is the default in France if you don't specify.\n- Step 4: $$Bien\\ cuit$$ — well done. Literally \"well cooked.\" No pink remaining; fully cooked through. In France, ordering this for a steak can be seen as a culinary faux pas, but it's your right.\n\nNote: French \"à point\" is closer to what English speakers call \"medium rare,\" not \"medium.\" The scale doesn't map perfectly — French cooking culture prefers meat less done.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "How do you ask for the bill in French? Give two common phrases and explain the difference between \"l'addition\" and \"la note.\" (2 steps)", "answer": "- Step 1: Two common phrases: \"Je pourrais avoir l'addition, s'il vous plaît?\" (Could I have the bill, please?) and \"Pourrais-je avoir l'addition, s'il vous plaît?\" (Might I have the bill, please?). The second uses subject-verb inversion (\"Pourrais-je\") which is more formal.\n- Step 2: $$L'addition$$ and $$la\\ note$$ both mean \"the bill/check\" in a restaurant. \"L'addition\" is more common and specifically refers to the restaurant bill. \"La note\" is slightly broader — it can mean \"the bill\" but also \"the note/score/grade.\" You can say either \"L'addition, s'il vous plaît\" or \"La note, s'il vous plaît\" — both are understood; \"l'addition\" is the more standard restaurant term.\n\nSimplest and most common: just catch the server's eye and say \"L'addition, s'il vous plaît.\"", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "In the reservation dialogue, the server asks \"Pour combien de personnes?\" and the client answers \"Pour 2 personnes.\" Break down the phrase \"combien de\" — what does it mean, and why is \"de\" required between \"combien\" and the noun? (3 steps)", "answer": "- Step 1: $$Combien$$ = \"how much / how many.\" When followed directly by a noun, French requires the preposition $$de$$ between them: \"combien de + noun.\"\n- Step 2: So \"combien de personnes\" = \"how many people.\" You cannot say \"combien personnes\" — the \"de\" is mandatory. This is similar to how \"beaucoup de\" (a lot of), \"peu de\" (few/little), and other quantity expressions all require \"de\" before the noun.\n- Step 3: Note: if \"combien\" stands alone as a pronoun (not followed by a noun), no \"de\" is needed. \"Combien?\" = \"How much/How many?\" (standalone). But \"Combien de…?\" = \"How much/how many of…?\" (followed by noun). This \"de\" rule applies broadly to quantity words in French.\n\nPattern: quantity word + de + noun (no article in between) — \"combien de,\" \"beaucoup de,\" \"peu de,\" \"assez de.\"", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "In the reservation dialogue, the client says the time \"à 19h30\" and then clarifies \"à sept heures et demi.\" Explain the French time-telling system: what does \"19h30\" mean, and why is \"et demi\" used? Also, what's the pattern for half-past the hour? (3 steps)", "answer": "- Step 1: \"19h30\" is the 24-hour format, standard in France for written/scheduled times. It means 19:30, i.e., 7:30 PM. In France, schedules, train times, and restaurant reservations use the 24-hour clock.\n- Step 2: \"Sept heures et demi\" is the spoken version — 7 hours and a half. $$Et\\ demi$$ = \"and a half\" (from $$demi$$ = half). So any half-past time is: [hour] + heures + et demi. \"Trois heures et demi\" = 3:30, \"neuf heures et demi\" = 9:30.\n- Step 3: Note: \"demi\" agrees in gender when it's an adjective before a noun (\"une demi-heure\" = a half hour), but after \"heures\" in time-telling, it stays as the invariable \"et demi.\" Also, for noon/midnight: \"midi et demi\" (12:30 PM), \"minuit et demi\" (12:30 AM) — no \"heures\" needed.\n\n24-hour for writing/schedules, 12-hour for casual speech, \"et demi\" for all half-past times.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "French numbers 70, 80, and 90 look strange compared to other languages. What are they, and what counting logic do they follow? Why is 71 \"soixante-et-onze\" and not \"soixante-dix-et-un\"? (4 steps)", "answer": "- Step 1: French uses a vigesimal (base-20) influence for 70-99, inherited from medieval Celtic/Gaulish counting systems. The numbers are: $$70 = soixante\\text{-}dix$$ (sixty-ten), $$80 = quatre\\text{-}vingts$$ (four-twenties), $$90 = quatre\\text{-}vingt\\text{-}dix$$ (four-twenty-ten).\n- Step 2: For 70-79, you count on top of 60: 70 = soixante-dix, 71 = soixante-et-onze (sixty-and-eleven), 72 = soixante-douze (sixty-twelve), up to 79 = soixante-dix-neuf (sixty-nineteen). You're essentially saying \"60 + [11-19].\"\n- Step 3: The \"et\" connector only appears in \"soixante-et-onze\" (71). For 72-79, no \"et\" — it's directly \"soixante-douze,\" \"soixante-treize,\" etc. This mirrors the pattern where \"et\" only appears in 21 (vingt-et-un), 31 (trente-et-un), 41, 51, 61 — only when the units digit is 1 and you're not in the compound 70s/80s range.\n- Step 4: For 80-99: 80 = quatre-vingts (4 × 20), 81 = quatre-vingt-un (no \"et,\" no \"s\" on vingt), 90 = quatre-vingt-dix (4 × 20 + 10), 91 = quatre-vingt-onze (four-twenty-eleven). The \"quatre-vingts\" loses its \"s\" when followed by another number.\n\nThe \"et\" rule: only for 21, 31, 41, 51, 61, and 71 — and nowhere else in the tens.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": true}, {"question": "Why does \"quatre-vingts\" have an \"s\" on \"vingts\" but \"quatre-vingt-un\" does not? Explain the rule governing the plural of \"vingt\" in numbers. (3 steps)", "answer": "- Step 1: $$Vingt$$ and $$cent$$ both follow the same plural rule: they take an \"s\" when they are multiplied by a number and NOT followed by another number. So \"quatre-vingts\" = 4 × 20 = 80, and since nothing follows, \"vingts\" gets the plural \"s.\"\n- Step 2: But when another number follows (as in 81 = quatre-vingt-un), \"vingt\" is no longer the final element — it's followed by \"un.\" In this case, the \"s\" is dropped: \"quatre-vingt-un,\" not \"quatre-vingts-un.\"\n- Step 3: The same logic applies to $$cent$$: \"deux cents\" (200) but \"deux cent un\" (201). The rule: multiply and nothing follows → plural \"s.\" Multiply but something follows → no \"s.\" This is a standard French number-orthography rule.\n\nQuick check: \"trois cents\" (300) ✓ | \"trois cent cinquante\" (350) ✓ | \"quatre-vingts\" (80) ✓ | \"quatre-vingt-deux\" (82) ✓", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "The numbers 21, 31, 41, 51, 61 all use \"et-un\" (vingt-et-un, trente-et-un, etc.) but 22, 32, 42 use a hyphen (vingt-deux, trente-deux). Why does French insert \"et\" only for the \"1\" case? (3 steps)", "answer": "- Step 1: The conjunction $$et$$ (\"and\") is used only when the units digit is 1 and you're forming a compound number with the tens: vingt-et-un (21), trente-et-un (31), quarante-et-un (41), cinquante-et-un (51), soixante-et-un (61).\n- Step 2: For all other units digits (2-9), a hyphen connects the tens and units directly: vingt-deux (22), trente-trois (33), quarante-quatre (44). No \"et\" — just a hyphenated compound.\n- Step 3: The historical reason: \"un/une\" was seen as more of a separate entity (like saying \"twenty AND one\" rather than \"twenty-one\"), while other digits were felt as a tighter compound. This is an archaic pattern preserved in modern French orthography. Note: 71 is \"soixante-et-onze\" (the only \"et\" in the 70s, because it's 60+11 with the unit being \"onze\" which contains \"un\").\n\nPractical rule: if the final component starts with \"un\" (un, une, onze) → use \"et.\" Everything else → hyphen.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Conjugate the verb ÊTRE (to be) in the present tense, both affirmative and negative. What makes ÊTRE even more irregular than AVOIR? (3 steps)", "answer": "- Step 1: Affirmative: $$je\\ suis$$, $$tu\\ es$$, $$il/elle/on\\ est$$, $$nous\\ sommes$$, $$vous\\ êtes$$, $$ils/elles\\ sont$$. Negative: $$je\\ ne\\ suis\\ pas$$, $$tu\\ n'es\\ pas$$, $$il/elle/on\\ n'est\\ pas$$, $$nous\\ ne\\ sommes\\ pas$$, $$vous\\ n'êtes\\ pas$$, $$ils/elles\\ ne\\ sont\\ pas$$.\n- Step 2: ÊTRE is even more irregular than AVOIR because it has at least five distinct stem forms across six persons: \"suis,\" \"es,\" \"est,\" \"sommes,\" \"êtes,\" \"sont.\" There is no single identifiable stem — each form must be memorized independently. AVOIR at least keeps \"av-\" in nous/vous forms.\n- Step 3: Etymology: ÊTRE derives from two different Latin verbs — $$esse$$ (to be) and $$stare$$ (to stand), which merged in Old French. This is why the forms look so heterogeneous — they come from different roots. English has a parallel: \"am,\" \"is,\" \"are\" also come from different Indo-European roots.\n\nÊTRE and AVOIR are the two most important French verbs — they serve as auxiliaries for all compound tenses.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": true}, {"question": "In Phuc's homework, the note says \"après c'est, l'adjectif est toujours masculin.\" What does this rule mean, and why doesn't the gender of the thing being described change the adjective? Give an example. (3 steps)", "answer": "- Step 1: The rule: after $$c'est$$ (it is / this is), any adjective that follows is always in the masculine form, regardless of the gender of the noun being referred to. \"C'est beau\" = \"It's beautiful\" (masculine adjective), even if you're describing a feminine noun like \"la ville\" (the city).\n- Step 2: This happens because $$c'est$$ uses the impersonal pronoun $$ce$$, which is grammatically neuter/masculine by default. The structure \"c'est + adjective\" presents the quality as a general statement: \"It's beautiful\" — the \"it\" doesn't carry gender. So you say \"C'est beau\" for a beautiful painting (masc.), a beautiful song (fem.), a beautiful city (fem.) — the adjective stays masculine.\n- Step 3: Contrast with \"La ville est belle\" — here the subject is the feminine noun \"la ville,\" so the adjective agrees: \"belle\" (feminine). The switch happens because the subject changed from impersonal $$ce$$ to a gendered noun. + \"C'est une belle ville\" = \"It's a beautiful city\" — here \"belle\" is feminine because it directly modifies \"ville\" (the adjective is between the article and the noun, not after \"c'est\" alone).\n\nKey distinction: \"c'est + [adjective alone]\" → always masculine. \"c'est + [article + adjective + noun]\" → adjective agrees with the noun.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "A common mistake is confusing \"avez\" and \"avons.\" When would you use each, and what is the conceptual reason they cannot be swapped? (2 steps)", "answer": "- Step 1: $$Avez$$ is the vous form (2nd person plural / formal singular), and $$avons$$ is the nous form (1st person plural). \"Vous avez\" = \"you have\" (addressing someone formally or a group), \"Nous avons\" = \"we have\" (including yourself and others). They cannot be swapped because they refer to entirely different subjects.\n- Step 2: The confusion likely comes from both being plural forms and both containing \"av-\" + a nasal ending. But the subject pronoun determines the verb form: \"vous\" always pairs with \"avez,\" \"nous\" always pairs with \"avons.\" Saying \"nous avez\" or \"vous avons\" is as wrong as saying \"we has\" or \"you have\" with the wrong English subject-verb pairing.\n\nAnchor: vous → avez, nous → avons. The \"z\" in \"avez\" matches the \"z\" sound at the end of \"vous.\" The \"ns\" in \"avons\" matches the \"ns\" in \"nous.\"", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "In the homework, the sentence \"Non, il n'y a pas de problème\" appears. Break down \"il n'y a pas de\" — what is each component, and why is it \"de problème\" rather than \"un problème\" or \"des problèmes\"? (4 steps)", "answer": "- Step 1: \"Il y a\" is a fixed expression meaning \"there is / there are.\" It comes from \"il\" (impersonal \"it\") + \"y\" (there) + \"a\" (has, from AVOIR). Literally: \"it there has\" = \"there is/are.\"\n- Step 2: In the negative, \"il y a\" becomes \"il n'y a pas\" — the standard ne…pas wraps around \"a\": ne → n' (elision before y), then \"y,\" then \"a,\" then \"pas.\"\n- Step 3: After a negative like \"il n'y a pas,\" the article changes to $$de$$. This is a key French rule: in negation, \"un/une/des\" before a noun becomes \"de\" (or \"d'\" before a vowel). \"Il y a un problème\" → \"Il n'y a pas de problème.\" \"Il y a des problèmes\" → \"Il n'y a pas de problèmes.\"\n- Step 4: The logic: negation removes the specificity. \"Un problème\" specifies one problem; \"des problèmes\" specifies some problems. But \"pas de problème\" says \"not ANY problem\" — the quantity is zero, so the article reduces to the generic \"de.\" This rule (negation → de instead of un/une/des) is one of the most important A1 grammar rules.\n\nPattern: affirmative with un/une/des → negative with de/d'. This applies broadly, not just to \"il y a.\"", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "A server says \"Est-ce que vous les voulez en même temps?\" Break down this sentence — what does each part mean, and why is \"les\" placed before the verb? (3 steps)", "answer": "- Step 1: \"Est-ce que\" = question marker (\"is it that…\"). \"Vous\" = you (subject). \"Les\" = them (direct object pronoun, plural). \"Voulez\" = want (from VOULOIR). \"En même temps\" = at the same time. Full meaning: \"Do you want them at the same time?\" (asking if both dishes should come out together).\n- Step 2: In French, object pronouns (me, te, le, la, les, nous, vous) are placed BEFORE the conjugated verb — unlike English where \"them\" comes after \"want.\" This is a fundamental word-order difference: English \"you want them\" → French \"vous les voulez.\"\n- Step 3: \"En même temps\" is a fixed adverbial phrase meaning \"at the same time.\" The server is asking whether both people's dishes should be served simultaneously, or if one can come before the other.\n\nFrench object pronouns always go before the verb (in simple tenses) — this is non-negotiable and one of the biggest adjustments for English speakers.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "You're at a restaurant and the server says \"Que désirez-vous boire?\" What does this mean, and why is this question structured with inversion instead of \"Tu désires quoi boire?\" (3 steps)", "answer": "- Step 1: \"Que désirez-vous boire?\" = \"What would you like to drink?\" $$Que$$ = what (formal question word), $$désirez\\text{-}vous$$ = you desire/wish (inversion of vous désirez), $$boire$$ = to drink.\n- Step 2: The server uses inversion (verb-subject hyphenated) because this is formal, professional register — standard in service contexts. \"Tu désires quoi boire?\" would use intonation + informal \"tu,\" which is inappropriate for a server addressing a customer.\n- Step 3: The server could also say \"Est-ce que vous désirez boire quelque chose?\" (Do you want to drink something?) or \"Souhaitez-vous une bouteille d'eau gazeuse ou d'eau plate?\" (Would you like a bottle of sparkling or still water?) — all formal. The key: in service, always formal register (vous + inversion or est-ce que).\n\nService French = vous + formal question forms. Never \"tu\" with a customer.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "What is the difference between \"eau gazeuse\" and \"eau plate\"? And what does \"une bouteille d'eau\" reveal about the article rule with \"de\" after a quantity noun? (3 steps)", "answer": "- Step 1: $$Eau\\ gazeuse$$ = sparkling/carbonated water (gazeuse = fizzy, from gaz). $$Eau\\ plate$$ = still/flat water (plate = flat, from the idea that the surface is flat without bubbles). Both are feminine because \"eau\" is feminine.\n- Step 2: \"Une bouteille d'eau\" = \"a bottle of water.\" Notice it's \"d'eau\" (de + eau, elided), not \"de l'eau\" or \"une eau.\" This is because after a quantity/measurement noun like \"bouteille\" (bottle), \"tasse\" (cup), \"verre\" (glass), the noun that follows is connected by \"de\" without an article.\n- Step 3: This is the same \"de\" rule as after quantity expressions: \"beaucoup d'eau\" (a lot of water), \"une bouteille d'eau\" (a bottle of water), \"un kilo de pommes\" (a kilo of apples). The quantity noun replaces the article — you don't say \"une bouteille de l'eau\" or \"un kilo des pommes.\"\n\nPattern: [quantity/measure] + de + noun (no article). \"Un verre de vin,\" \"une tasse de café,\" \"un plat du jour.\"", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "What does \"plat du jour\" literally mean, and why is it \"du\" and not \"de le\"? Also, why would you say \"des plats du jour\" for the plural? (3 steps)", "answer": "- Step 1: \"Plat du jour\" = \"dish of the day\" — the special that the restaurant is offering today. $$Plat$$ = dish, $$du$$ = of the (contraction of de + le), $$jour$$ = day.\n- Step 2: \"Du\" is the mandatory contraction of \"de le.\" You can NEVER write or say \"de le\" in French — it always contracts to \"du.\" This is a firm rule: de + le → du, de + les → des, de + la → de la, de + l' → de l'.\n- Step 3: In the plural, \"des plats du jour\" — the \"du\" stays as \"du\" because \"du\" modifies \"jour\" (singular masculine), not \"plats.\" The plural only affects \"plat\" → \"plats.\" The \"du jour\" part is a fixed modifier meaning \"of the day,\" and the day is still singular.\n\n\"Du jour\" is a fixed expression = \"of the day.\" It doesn't change to \"des jours\" just because the noun it modifies is plural.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "Name the days of the week in French. What key differences are there compared to English days — specifically regarding capitalization and the origin of the names? (3 steps)", "answer": "- Step 1: The days are: $$lundi$$ (Monday), $$mardi$$ (Tuesday), $$mercredi$$ (Wednesday), $$jeudi$$ (Thursday), $$vendredi$$ (Friday), $$samedi$$ (Saturday), $$dimanche$$ (Sunday).\n- Step 2: Capitalization: In French, days of the week are NOT capitalized unless they start a sentence. \"Lundi, je vais au gym\" (if starting a sentence) vs. \"Je vais au gym lundi\" (not capitalized). This differs from English where days are always capitalized.\n- Step 3: The names come from Latin planetary/gods names, like English, but using the Roman gods instead of Norse: lundi = Luna (Moon, like Monday), mardi = Mars (like Tuesday/Tiw), mercredi = Mercury (like Wednesday/Woden), jeudi = Jupiter (like Thursday/Thor), vendredi = Venus (like Friday/Frigg). Samedi comes from Sabbatum (Sabbath) and dimanche from Dominica (Lord's day).\n\nFrench days = lowercase unless sentence-initial. All are masculine: \"le lundi,\" \"le mardi.\"", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "Name the months and seasons in French. What grammatical gender are they, and how do you say \"in summer\" vs. \"in winter\"? (3 steps)", "answer": "- Step 1: Months: $$janvier$$ (January), $$février$$ (February), $$mars$$ (March), $$avril$$ (April), $$mai$$ (May), $$juin$$ (June), $$juillet$$ (July), $$août$$ (August), $$septembre$$ (September), $$octobre$$ (October), $$novembre$$ (November), $$décembre$$ (December). Like days, months are not capitalized in French.\n- Step 2: Seasons: $$l'hiver$$ (winter), $$le\\ printemps$$ (spring), $$l'été$$ (summer), $$l'automne$$ (autumn). All seasons are masculine. Note: the notes list \"l'hiver\" twice but miss \"le printemps\" — the four seasons are hiver, printemps, été, automne.\n- Step 3: To say \"in [season]\": use $$en$$ + season (no article). \"En été\" = in summer, \"en hiver\" = in winter, \"en automne\" = in autumn. Exception: \"au printemps\" = in spring (the only season that takes \"au\" instead of \"en,\" because \"printemps\" starts with a consonant and uses the article).\n\nMonths are also all masculine. \"En janvier,\" \"en février,\" etc. (use \"en\" for months too, no article).", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "French has three ways to form a question. What are they, and for each, transform the statement \"Tu parles français\" into a question. Which is most common in speech and why? (4 steps)", "answer": "- Step 1: Metho
