al working. \"Calculate\" = show full method, exact answer. Read the command word carefully.", "source": "GLM 5.1 ②", "_id": "glm_2_92", "judge_pick": false}, {"question": "In a geometric series problem, you find $$r = \\frac{2}{5}$$. Verify that $$|r| < 1$$ and explain why this matters for the sum to infinity. (2 steps)", "answer": "- Step 1: $$|r| = \\left|\\frac{2}{5}\\right| = \\frac{2}{5} = 0.4 < 1$$. ✓ The condition for convergence is satisfied.\n- Step 2: This matters because $$S_\\infty = \\frac{a}{1-r}$$ only exists (is finite) when $$|r| < 1$$. If $$|r| \\geq 1$$, the series diverges and the formula gives a meaningless number. Before using $$S_\\infty$$, you should always verify the convergence condition. In this problem, the given $$S_\\infty = 75$$ already implies $$|r| < 1$$ (since $$S_\\infty$$ is stated to exist), but verifying it explicitly shows good mathematical practice.\n\nTakeaway: Always verify $$|r| < 1$$ before using $$S_\\infty$$. It's a necessary condition, not optional.", "source": "GLM 5.1 ②", "_id": "glm_2_93", "judge_pick": false}, {"question": "A student expands $$(2k+1)^3$$ and writes $$8k^3 + 12k^2 + 6k + 1$$. Then they write \"this is odd because it ends in 1.\" Why is this reasoning insufficient, even though the conclusion is correct? (2 steps)", "answer": "- Step 1: \"Ends in 1\" refers to the *decimal* representation ending in the digit 1, which only works for specific values of $$k$$. For example, if $$k = 7$$, then $$(2k+1)^3 = 15^3 = 3375$$, which ends in 5, not 1. The \"ends in 1\" argument confuses the algebraic form with the decimal representation.\n- Step 2: The correct reasoning is *algebraic*: the expression equals $$2(4k^3 + 6k^2 + 3k) + 1$$, which has the form $$2m + 1$$ where $$m$$ is an integer. This is the *definition* of an odd integer, and it holds for ALL integer values of $$k$$. Algebraic proofs must use algebraic structure, not numerical observations.\n\nTakeaway: Prove oddness algebraically ($$= 2m + 1$$), not by looking at decimal digits. Algebraic form > numerical observation.", "source": "GLM 5.1 ②", "_id": "glm_2_94", "judge_pick": false}, {"question": "In the session, the student had a copy error: writing the exponent as 2 instead of 8. This lost 2 marks (one for the term, one for the final accuracy). What does this reveal about how mark schemes work? (2 steps)", "answer": "- Step 1: Mark schemes award marks for specific \"milestones\" in the working. The first term (with the correct exponent) earned a method mark. Getting it wrong means you lose that method mark *and* any downstream marks that depend on it (like the final accuracy mark).\n- Step 2: This shows that a single early error can cascade — it's not just \"one mistake, one mark lost.\" The error propagated through the entire solution. This is why accuracy in the early steps is so important: check each line before moving on, especially powers, signs, and coefficients. A 10-second verification after each line can prevent cascading mark loss.\n\nTakeaway: Early errors cascade. One copy error → multiple lost marks. Verify each line as you write it.", "source": "GLM 5.1 ②", "_id": "glm_2_95", "judge_pick": true}, {"question": "A student is given a point on a circle and the centre. They need to find the radius. Another student suggests using the equation of the circle and substituting the point. Is this circular reasoning? Explain. (2 steps)", "answer": "- Step 1: Yes, it would be circular if you already have the circle equation — you'd be using the equation to verify a point that you already know is on the circle. But in the session's problem, the student *doesn't yet have* the circle equation. They have the centre and a point on the circle, and they need the radius *to write* the equation.\n- Step 2: The correct approach: use the distance formula directly. Radius = distance from centre to the known point on the circle. This is not circular — it's using the geometric definition of a circle (all points at distance $$r$$ from the centre) to find $$r$$, then writing the equation. Only *after* finding $$r$$ can you write the circle equation.\n\nTakeaway: Centre + point on circle → distance formula → radius → circle equation. Don't confuse finding the radius with using the circle equation.", "source": "GLM 5.1 ②", "_id": "glm_2_96", "judge_pick": false}, {"question": "A student claims that since $$\\sqrt{2} \\times \\sqrt{3} = \\sqrt{6}$$ and $$\\sqrt{6}$$ is irrational, this disproves the statement \"the product of two different irrational numbers is irrational.\" Is the student's reasoning correct? (2 steps)", "answer": "- Step 1: No, the student's reasoning is flawed. The statement claims the product is *always* irrational. Showing it's irrational in *one* case doesn't disprove \"always irrational\" — it *supports* it. To *disprove* a universal statement, you need a counterexample where the hypothesis is true but the conclusion is *false* (i.e., the product is *rational*).\n- Step 2: The correct counterexample would be something like $$\\sqrt{2} \\times 3\\sqrt{2} = 6$$, where both numbers are irrational and different, but the product is rational. Showing the product is irrational in some cases doesn't address the claim — the claim says it's *always* irrational, so you need to find a case where it *isn't*.\n\nTakeaway: To disprove \"always P,\" find a case where \"not P.\" Showing \"sometimes P\" doesn't disprove \"always P.\"", "source": "GLM 5.1 ②", "_id": "glm_2_97", "judge_pick": false}, {"question": "When solving the equation $$75(1 - r^3) = 70.2$$, a student writes $$1 - r^3 = \\frac{70.2}{75}$$ and then converts to $$r^3 = 1 - \\frac{117}{125}$$. Why is converting the decimal to a fraction useful here, even though a calculator could handle the decimal? (2 steps)", "answer": "- Step 1: Converting to a fraction lets you compute $$1 - \\frac{117}{125} = \\frac{125 - 117}{125} = \\frac{8}{125}$$ exactly. The fraction $$\\frac{8}{125}$$ is immediately recognisable as $$\\left(\\frac{2}{5}\\right)^3$$, making the cube root obvious.\n- Step 2: With decimals: $$1 - 0.936 = 0.064$$, and the cube root of 0.064 is harder to recognise mentally. You'd need to know or compute that $$0.4^3 = 0.064$$. While possible, fractions make the perfect-cube structure transparent. In an exam, fraction arithmetic is faster and more reliable for recognising patterns.\n\nTakeaway: Convert to fractions when solving for roots. Fractions reveal perfect-power patterns; decimals hide them.", "source": "GLM 5.1 ②", "_id": "glm_2_98", "judge_pick": true}, {"question": "The session covered multiple topics in one sitting: probability, bearings, geometric series, factor/remainder theorem, circles, logarithms, and irrational numbers. What is the risk of covering so many topics in one session, and what is the benefit? (2 steps)", "answer": "- Step 1: The risk is *cognitive overload* — switching between vastly different topics (probability → geometry → algebra → number theory) taxes working memory and can lead to the kind of transcription errors the student made. Each topic has its own notation, conventions, and problem-solving patterns, and switching costs mental energy.\n- Step 2: The benefit is *interleaving* — research shows that mixing topics during study improves long-term retention compared to blocking one topic at a time. Interleaving forces the brain to *retrieve* and *discriminate* between different strategies, which strengthens memory. The key is balance: interleave for retention, but don't switch so rapidly that you can't get into a flow state for any one topic.\n\nTakeaway: Interleaving improves retention but increases cognitive load. Mix topics, but give each enough time to engage deeply.", "source": "GLM 5.1 ②", "_id": "glm_2_99", "judge_pick": false}, {"question": "A student is asked to fully factorise $$3x^3 - x^2 - 10x + 8$$ given that $$(3x - 4)$$ is a factor. After polynomial division, they get $$(3x - 4)(x^2 + x - 2)$$. They stop here. What must they do to \"fully\" factorise? (2 steps)", "answer": "- Step 1: Check whether the quadratic $$x^2 + x - 2$$ can be factorised further. Find two numbers that multiply to $$-2$$ and add to $$1$$: those numbers are $$2$$ and $$-1$$.\n- Step 2: Factorise: $$x^2 + x - 2 = (x + 2)(x - 1)$$. So the full factorisation is $$(3x - 4)(x + 2)(x - 1)$$. \"Fully\" means no factor can be broken down further into linear factors with integer (or rational) coefficients. Stopping at the quadratic is incomplete — it costs the final accuracy mark.\n\nTakeaway: \"Fully factorise\" = keep going until all factors are linear. Always check if quadratics factorise further.", "source": "GLM 5.1 ②", "_id": "glm_2_100", "judge_pick": false}, {"question": "When performing polynomial division of $$3x^3 - x^2 - 10x + 8$$ by $$(3x - 4)$$, the first step is to determine what to multiply $$3x$$ by to get $$3x^3$$. A student writes $$3x^2$$. What is wrong? (2 steps)", "answer": "- Step 1: We need $$(3x) \\times (\\text{something}) = 3x^3$$. If we multiply $$3x$$ by $$3x^2$$, we get $$9x^3$$, not $$3x^3$$. The correct multiplier is $$x^2$$, since $$(3x)(x^2) = 3x^3$$.\n- Step 2: The student's error comes from treating the division like dividing by $$(x - \\frac{4}{3})$$, where the leading term of the divisor is just $$x$$. But the divisor is $$(3x - 4)$$, with leading coefficient 3. You must account for this coefficient when determining each term of the quotient. A quick check: multiply back $$(3x - 4)(x^2) = 3x^3 - 4x^2$$ ✓, but $$(3x - 4)(3x^2) = 9x^3 - 12x^2$$ ✗.\n\nTakeaway: In polynomial division, the leading coefficient of the divisor matters. $$(3x) \\times x^2 = 3x^3$$, not $$3x \\times 3x^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_101", "judge_pick": false}, {"question": "A student writes $$\\log_{10}(5 - a) + \\log_{10}(a + 25)$$ and combines using the product law to get $$\\log_{10}((5-a)(a+25))$$. Is this valid for all values of $$a$$? Explain. (2 steps)", "answer": "- Step 1: The product law $$\\log_b(X) + \\log_b(Y) = \\log_b(XY)$$ is valid *only when both* $$X > 0$$ *and* $$Y > 0$$. If either argument is negative or zero, the original expression is undefined, and combining the logs would create a defined expression from undefined components — which is mathematically invalid.\n- Step 2: For this expression, we need $$5 - a > 0$$ (i.e., $$a < 5$$) AND $$a + 25 > 0$$ (i.e., $$a > -25$$). Outside this domain, the original sum of logs doesn't exist, so combining them is meaningless. For example, at $$a = 10$$: $$\\log_{10}(-5)$$ is undefined, even though $$\\log_{10}((5-10)(10+25)) = \\log_{10}(-175)$$ is also undefined — but at some boundary cases, the product could be positive while individual terms are undefined. Always respect the domain of the *original* expression.\n\nTakeaway: The product law for logs requires both arguments to be positive. Combining logs can *hide* domain violations — always check first.", "source": "GLM 5.1 ②", "_id": "glm_2_102", "judge_pick": true}, {"question": "In the ESAT, time per question is approximately 1–2 minutes. Harry gave 3 minutes in practice. If a student can solve a problem correctly in 3 minutes but not in 1.5 minutes, what specific skill are they missing, and how do they develop it? (2 steps)", "answer": "- Step 1: The missing skill is **fluency** — the ability to execute known procedures quickly and accurately without conscious deliberation. The student *understands* the method (they get it right given time) but hasn't practised it enough for the steps to be automatic. Each step requires conscious thought, which is slow.\n- Step 2: Fluency develops through *deliberate, repeated practice* of the same problem types. The strategy: solve the same type of problem 5–10 times until the pattern recognition is instant. Once you see \"two dice, one unfair\" and immediately write \"$$p$$ for each face, $$1-5p$$ for face 6, multiply for both six,\" you've achieved fluency. Speed comes from pattern recognition, not from thinking faster.\n\nTakeaway: Fluency = automatic pattern recognition. Develop it through repeated practice of the same problem types until the steps are reflexive.", "source": "GLM 5.1 ②", "_id": "glm_2_103", "judge_pick": true}, {"question": "A student needs to solve the ESAT bearing problem involving a regular pentagon. They know the exterior angle is $$72°$$ and the interior angle is $$108°$$. The bearing of B from A involves measuring clockwise from north at A to the direction AB. Conceptually, what information is still needed to find this bearing? (2 steps)", "answer": "- Step 1: You need to know the *orientation* of the pentagon relative to north. The interior/exterior angles tell you how much the direction *changes* at each vertex, but you need a *starting direction* (the bearing of the first side) to compute subsequent bearings.\n- Step 2: Typically, the question provides the bearing of one side (e.g., \"the bearing of B from A is $$\\theta$$\") and you use the exterior angle to find the bearing of the next side: bearing of C from B = bearing of B from A + (or −) exterior angle, depending on the direction of turn. Without knowing the initial bearing, the polygon geometry alone is insufficient — you'd be computing relative angles, not absolute bearings.\n\nTakeaway: Polygon angles give *relative* direction changes. You need one *absolute* bearing (from north) to anchor the calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_104", "judge_pick": true}, {"question": "A student is solving a problem and gets $$r^3 = \\frac{8}{125}$$. They write $$r = \\frac{8}{125}$$ (forgetting the cube root). What is the conceptual error, and how can you avoid it? (2 steps)", "answer": "- Step 1: The student has solved for $$r^3$$, not for $$r$$. The equation $$r^3 = \\frac{8}{125}$$ means $$r$$ is the number whose *cube* is $$\\frac{8}{125}$$. To find $$r$$, you must take the cube root: $$r = \\sqrt[3]{\\frac{8}{125}} = \\frac{2}{5}$$.\n- Step 2: This is a common error when students get excited about reaching a \"nice\" fraction and forget the final step. To avoid it: after solving for any power of the unknown, always ask \"have I isolated the variable itself, or a power of it?\" If you have $$r^n = \\text{something}$$, you need one more step: $$r = \\sqrt[n]{\\text{something}}$$.\n\nTakeaway: $$r^3 = \\frac{8}{125}$$ → $$r = \\frac{2}{5}$$, not $$r = \\frac{8}{125}$$. Always isolate the variable, not its power.", "source": "GLM 5.1 ②", "_id": "glm_2_105", "judge_pick": false}, {"question": "A student is about to start a geometric series problem. What two key pieces of information should they identify before choosing a formula? (2 steps)", "answer": "- Step 1: Identify whether the question is about a **single term** or a **sum of terms**. This determines whether to use $$a_n = ar^{n-1}$$ (for a term) or $$S_n = \\frac{a(1-r^n)}{1-r}$$ (for a sum). Misidentifying this is the most common error.\n- Step 2: Check if the sum to infinity is mentioned. If $$S_\\infty$$ is given or relevant, you have the powerful equation $$S_\\infty = \\frac{a}{1-r}$$, which can be used as a substitution in the $$S_n$$ formula. Also verify $$|r| < 1$$ before using $$S_\\infty$$. These two checks — term vs sum, and $$S_\\infty$$ availability — set up the entire problem-solving strategy.\n\nTakeaway: Before reaching for a formula, ask: (1) term or sum? (2) Is $$S_\\infty$$ involved? These determine your approach.", "source": "GLM 5.1 ②", "_id": "glm_2_106", "judge_pick": true}, {"question": "A student asks \"what is an irrational number?\" and gets the reply \"a number whose decimal goes on forever.\" Give a more precise definition and explain why the informal one is dangerous. (2 steps)", "answer": "- Step 1: The precise definition: an irrational number is a real number that **cannot be expressed as a fraction of two integers** $$\\frac{p}{q}$$ where $$p, q \\in \\mathbb{Z}$$ and $$q \\neq 0$$. Equivalently, it's a number not in the set $$\\mathbb{Q}$$ of rationals.\n- Step 2: The informal definition \"decimal goes on forever\" is dangerous because: (a) $$\\frac{1}{3} = 0.\\overline{3}$$ goes on forever but is rational; (b) it doesn't distinguish recurring (rational) from non-recurring (irrational) decimals; (c) it doesn't capture the *algebraic* distinction (fraction vs non-fraction) which is what matters in proofs. The precise definition is the one that's useful in mathematical arguments.\n\nTakeaway: Irrational = not expressible as $$\\frac{p}{q}$$ with $$p, q \\in \\mathbb{Z}$$. The decimal definition is incomplete and misleading.", "source": "GLM 5.1 ②", "_id": "glm_2_107", "judge_pick": true}, {"question": "When proving a statement about odd numbers, why is it important that the parameter $$k$$ in $$n = 2k + 1$$ is an *integer*, not just any real number? Give a specific example showing the proof would fail without this condition. (2 steps)", "answer": "- Step 1: The definition of an odd *integer* requires the form $$2k + 1$$ where $$k$$ is an *integer*. If $$k$$ could be any real number, then $$2(0.5) + 1 = 2$$, which is even — so the form wouldn't consistently produce odd numbers. The integer constraint is what makes the definition work.\n- Step 2: In a proof, suppose you show $$(2k+1)^3 = 2m + 1$$ where $$m = 4k^3 + 6k^2 + 3k$$. You conclude \"this is odd.\" But if $$k = 0.5$$, then $$m = 4(0.125) + 6(0.25) + 3(0.5) = 0.5 + 1.5 + 1.5 = 3.5$$, and $$2(3.5) + 1 = 8$$, which is even. The proof only works because $$m$$ is an integer when $$k$$ is an integer. Omitting \"$$k \\in \\mathbb{Z}$$\" makes the proof invalid.\n\nTakeaway: \"$$k \\in \\mathbb{Z}$$\" is not optional — it's what makes the odd-number definition and all proofs based on it valid.", "source": "GLM 5.1 ②", "_id": "glm_2_108", "judge_pick": true}, {"question": "A student sees \"given that $$3x - 4$$ is a factor of $$f(x) = 3x^3 + ax^2 - 10x + b$$\" and writes $$f(-4) = 0$$. What is the error? (2 steps)", "answer": "- Step 1: The student has substituted $$x = -4$$, which would be correct if the factor were $$(x + 4)$$, i.e., $$(x - (-4))$$. But the factor is $$(3x - 4)$$, so we set $$3x - 4 = 0$$, giving $$x = \\frac{4}{3}$$.\n- Step 2: The correct substitution is $$f\\!\\left(\\frac{4}{3}\\right) = 0$$. The error comes from ignoring the coefficient of $$x$$ in the factor. For a factor $$(mx - c)$$, the root is $$x = \\frac{c}{m}$$, not $$x = c$$ or $$x = -c$$. Always set the *entire* factor equal to zero and solve.\n\nTakeaway: Factor $$(3x - 4)$$ → root $$x = \\frac{4}{3}$$. Don't just read off the constant term — solve for $$x$$.", "source": "GLM 5.1 ②", "_id": "glm_2_109", "judge_pick": false}, {"question": "A student computes the distance from $$(7, -2)$$ to $$(11, 6)$$ as $$\\sqrt{(7-11)^2 + (-2-6)^2}$$ instead of $$\\sqrt{(11-7)^2 + (6-(-2))^2}$$. Are these equivalent? Why or why not? (2 steps)", "answer": "- Step 1: Yes, they are equivalent! The distance formula uses *squared* differences, and squaring eliminates the sign: $$(7-11)^2 = (-4)^2 = 16 = (4)^2 = (11-7)^2$$. Similarly, $$(-2-6)^2 = (-8)^2 = 64 = (8)^2 = (6-(-2))^2$$.\n- Step 2: The distance formula is *order-independent* for this reason: $$\\sqrt{(x_2 - x_1)^2 + (y_2 - y_1)^2} = \\sqrt{(x_1 - x_2)^2 + (y_1 - y_2)^2}$$. It doesn't matter which point you call \"point 1\" and which you call \"point 2.\" However, for *avoiding sign errors*, it's often easier to subtract the smaller from the larger (so differences are positive before squaring).\n\nTakeaway: Distance formula is order-independent due to squaring. But for clarity, subtract consistently and watch signs carefully.", "source": "GLM 5.1 ②", "_id": "glm_2_110", "judge_pick": false}, {"question": "In the session, Harry emphasised that for circle geometry, you should \"try to think visually, using the diagrams.\" Give a specific example from the session where visual thinking unlocked the problem. (2 steps)", "answer": "- Step 1: When finding the radius, the student was stuck until they *drew the radius on the diagram* — connecting the centre $$(7, -2)$$ to the point $$(11, 6)$$ on the circle. Once they saw this line segment, they immediately recognised it as the radius and knew to use the distance formula.\n- Step 2: Without the visual, the student was trying to work purely algebraically and couldn't see the connection between the given point and the radius. The diagram made the geometric relationship (centre → point on circle = radius) obvious. This is why Harry insists on annotating diagrams: visual cues trigger algebraic methods that pure text might not.\n\nTakeaway: Draw the radius. See the distance. Use the formula. Visual → algebraic is the natural problem-solving flow in geometry.", "source": "GLM 5.1 ②", "_id": "glm_2_111", "judge_pick": false}, {"question": "A student is told that a point $$(7, k)$$ is the centre of a circle and lies on a line $$y = -3x + 19$$. They substitute and find $$k = -2$$. They then write the centre as $$(7, 2)$$. What happened? (2 steps)", "answer": "- Step 1: The student dropped the negative sign. The calculation gives $$k = -3(7) + 19 = -21 + 19 = -2$$, so the centre is $$(7, -2)$$. Writing $$(7, 2)$$ means the $$y$$-coordinate is positive 2, not negative 2.\n- Step 2: This is a sign error — one of the most common mistakes in coordinate geometry. The fix: write the calculation clearly ($$k = -21 + 19 = -2$$), then write the centre explicitly as $$(7, -2)$$, and annotate the diagram with the correct coordinates. Double-check signs when coordinates are negative.\n\nTakeaway: $$k = -2$$, not $$k = 2$$. Negative coordinates must keep their signs. Write clearly, annotate the diagram.", "source": "GLM 5.1 ②", "_id": "glm_2_112", "judge_pick": false}, {"question": "A student is asked to write a log equation answer in the form $$\\log_{10} K$$. Their answer is $$\\frac{1}{2}\\log_{10}(25)$$. How do they convert this? (2 steps)", "answer": "- Step 1: Use the power law: $$\\frac{1}{2}\\log_{10}(25) = \\log_{10}(25^{1/2}) = \\log_{10}(5)$$. The coefficient $$\\frac{1}{2}$$ becomes an exponent inside the log.\n- Step 2: So $$K = 5$$. The answer is now in the required form $$\\log_{10}(K)$$ with no coefficient outside. The key: when the question specifies a form, you must use log laws to transform your answer into that exact form. Leaving a coefficient outside doesn't match.\n\nTakeaway: $$\\frac{1}{2}\\log_{10}(25) = \\log_{10}(5)$$. Power law: $$c \\cdot \\log_b(A) = \\log_b(A^c)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_113", "judge_pick": false}, {"question": "A student claims that the sum of the first $$n$$ terms of a geometric series is always larger than the $$n$$th term. Is this always true? Give a counterexample. (2 steps)", "answer": "- Step 1: For a geometric series with positive terms and $$r > 0$$, the sum $$S_n = a + ar + ar^2 + \\ldots + ar^{n-1}$$ is indeed larger than the $$n$$th term $$a_n = ar^{n-1}$$, because the sum includes all previous (positive) terms plus the $$n$$th term.\n- Step 2: However, if the common ratio is negative (e.g., $$r = -1$$), terms alternate in sign: $$a, -a, a, -a, \\ldots$$ For $$n = 2$$: $$S_2 = a + (-a) = 0$$, but $$a_2 = -a$$. If $$a > 0$$, then $$S_2 = 0 > -a = a_2$$... actually this still holds. But consider $$r = -2, a = 1$$: $$S_2 = 1 + (-2) = -1$$, while $$a_2 = -2$$. So $$S_2 = -1 > -2 = a_2$$. Hmm, let me reconsider. For a series where $$0 < r < 1$$ with positive $$a$$, yes. But what about when terms are negative? Take $$a = -1, r = \\frac{1}{2}$$: $$S_2 = -1 + (-0.5) = -1.5$$, and $$a_2 = -0.5$$. Here $$S_2 = -1.5 < -0.5 = a_2$$. The sum is *smaller* than the $$n$$th term. This is a counterexample.\n\nTakeaway: \"Sum > nth term\" is not always true. It fails for negative-term series. Always consider the sign of terms.", "source": "GLM 5.1 ②", "_id": "glm_2_114", "judge_pick": false}, {"question": "When Harry said \"I treat the remainder theorem and the factor theorem as the same thing really,\" what did he mean, and why is this a useful perspective? (2 steps)", "answer": "- Step 1: Both theorems come from the same principle: when you divide $$f(x)$$ by $$(x - k)$$, the remainder is $$f(k)$$. The factor theorem is just the special case where $$f(k) = 0$$ (remainder is zero, so it's a factor). The remainder theorem is the general case (remainder is whatever $$f(k)$$ equals, possibly nonzero).\n- Step 2: This unified perspective is useful because you don't need to remember two separate procedures. The algorithm is always the same: substitute the value, see what you get. If it's zero → factor. If it's nonzero → remainder. Treating them as one concept reduces cognitive load and prevents the confusion of \"which theorem do I use here?\"\n\nTakeaway: One principle, two names. Substitute → if zero, factor; if nonzero, remainder. No need for two separate mental procedures.", "source": "GLM 5.1 ②", "_id": "glm_2_115", "judge_pick": true}, {"question": "A student writes the circle equation as $$(x - 7)^2 + (y - (-2))^2 = 80$$ and then simplifies to $$(x - 7)^2 + (y + 2)^2 = 80$$. Explain why both forms are correct and when you might prefer each. (2 steps)", "answer": "- Step 1: Both forms are algebraically equivalent: $$(y - (-2)) = (y + 2)$$. The first form makes the centre explicit (you can read off $$b = -2$$ directly from the $$(y - b)$$ structure). The second form is simplified and more conventional for final answers.\n- Step 2: Prefer the first form when *finding* the centre from an equation (it reveals $$b = -2$$ clearly). Prefer the second form when *writing* the final answer (it's cleaner and standard). In working, you might use the first form for clarity; in the answer box, use the second for convention.\n\nTakeaway: $$(y - (-2))^2 = (y + 2)^2$$. Both correct. Use the first for finding the centre; the second for writing the answer.", "source": "GLM 5.1 ②", "_id": "glm_2_116", "judge_pick": false}, {"question": "In a proof question, a student is asked to prove that the product of two rational numbers is rational. They give an example: $$\\frac{1}{2} \\times \\frac{3}{4} = \\frac{3}{8}$$. Is this a valid proof? Why or why not? (2 steps)", "answer": "- Step 1: No, this is not a valid proof. An example proves an *existence* claim (\"there exists a case where...\") but cannot prove a *universal* claim (\"for all rational numbers, the product is rational\"). The example only shows it works for $$\\frac{1}{2}$$ and $$\\frac{3}{4}$$, not for all rational numbers.\n- Step 2: A valid proof would use the general form: let the two rational numbers be $$\\frac{p}{q}$$ and $$\\frac{r}{s}$$ where $$p, q, r, s \\in \\mathbb{Z}$$ and $$q, s \\neq 0$$. Then their product is $$\\frac{pr}{qs}$$. Since integers are closed under multiplication, $$pr \\in \\mathbb{Z}$$ and $$qs \\in \\mathbb{Z}$$ with $$qs \\neq 0$$. Therefore $$\\frac{pr}{qs}$$ is rational. This proves it for *all* rational numbers.\n\nTakeaway: Examples ≠ proofs (for universal claims). Use general variables and show the property holds for *all* cases.", "source": "GLM 5.1 ②", "_id": "glm_2_117", "judge_pick": false}, {"question": "A student solves a log equation and finds $$a = 20$$ and $$a = -5$$. They reject $$a = -5$$ because \"log can't be negative.\" Is this reasoning precise enough? What should they actually check? (2 steps)", "answer": "- Step 1: The reasoning is imprecise. It's not that \"log can't be negative\" — logarithms *can* be negative (e.g., $$\\log_{10}(0.1) = -1$$). What can't happen is the *argument* of the log being negative or zero. The student should check whether each log *argument* is positive, not whether the log value is positive.\n- Step 2: For $$a = 20$$: $$5 - a = -15 < 0$$, so $$\\log_{10}(-15)$$ is undefined. Reject $$a = 20$$ because the *argument* $$5 - a$$ is negative, not because \"the log is negative.\" For $$a = -5$$: $$5 - (-5) = 10 > 0$$ ✓ and $$-5 + 25 = 20 > 0$$ ✓, so both arguments are positive and $$a = -5$$ is valid.\n\nTakeaway: Check that log *arguments* are positive, not that log *values* are positive. $$\\log_{10}(0.1) = -1$$ is valid; $$\\log_{10}(-5)$$ is not.", "source": "GLM 5.1 ②", "_id": "glm_2_118", "judge_pick": true}, {"question": "When solving for the first term $$a$$ of a geometric series, a student uses the equation $$S_3 = \\frac{a(1-r^3)}{1-r}$$ with $$r = \\frac{2}{5}$$ already known. They substitute and solve for $$a$$. Compare this to using $$a = S_\\infty(1 - r)$$. Which is easier and why? (2 steps)", "answer": "- Step 1: Using $$S_3$$: $$70.2 = \\frac{a(1 - (2/5)^3)}{1 - 2/5} = \\frac{a \\cdot (1 - 8/125)}{3/5} = \\frac{a \\cdot 117/125}{3/5} = a \\cdot \\frac{117}{125} \\cdot \\frac{5}{3} = a \\cdot \\frac{117}{75}$$. Then $$a = 70.2 \\times \\frac{75}{117}$$. This works but involves messy fraction arithmetic.\n- Step 2: Using $$S_\\infty$$: $$a = 75(1 - \\frac{2}{5}) = 75 \\times \\frac{3}{5} = 45$$. One simple multiplication. The $$S_\\infty$$ route is dramatically easier because the formula $$a = S_\\infty(1-r)$$ is linear in $$a$$, while the $$S_n$$ formula involves a fraction with $$r^n$$ in the numerator. Always choose the simplest equation that connects your knowns and unknowns.\n\nTakeaway: $$a = S_\\infty(1-r)$$ is the fastest route to find $$a$$ when $$S_\\infty$$ is known. Choose the simplest equation.", "source": "GLM 5.1 ②", "_id": "glm_2_119", "judge_pick": true}], "count": 120}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "An unfair six-sided die has faces 1–5 each with equal probability, and face 6 with a different probability. If you call the probability of each face 1–5 equal to $$p$$, what is the probability of rolling a 6, and why must it be written as $$1 - 5p$$ rather than $$\\frac{p}{5}$$? (3 steps)", "answer": "- Step 1: The six outcomes on the die must cover every possibility, so their probabilities must sum to 1. Faces 1, 2, 3, 4, 5 each have probability $$p$$, so their combined contribution is $$5p$$.\n- Step 2: Whatever probability is \"left over\" from the total of 1 must go to face 6. So $$P(6) = 1 - 5p$$.\n- Step 3: A common mistake is to write $$P(6) = \\frac{p}{5}$$, which would mean face 6 has *one-fifth* the probability of each other face. But that makes no sense — face 6 is *special* (unfair), and the sum $$5p + \\frac{p}{5}$$ does not equal 1 in general. The correct reasoning is about the *total sum* equalling 1, not about splitting one face's probability into fifths.\n\nThe key insight: \"the probabilities must sum to 1\" is your constraint, and you solve for the unknown from that constraint.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "Two independent events A and B occur. The probability of both happening is found using which operation on $$P(A)$$ and $$P(B)$$, and why is \"AND = add\" a common misconception? (2 steps)", "answer": "- Step 1: For independent events, $$P(A \\text{ and } B) = P(A) \\times P(B)$$. The word \"and\" signals the *intersection* — both must happen simultaneously — and for independent events, the joint probability is the product of individual probabilities.\n- Step 2: The misconception \"AND = add\" confuses intersection with union. Addition gives $$P(A \\text{ or } B)$$ for mutually exclusive events (the probability of *either* happening). Adding probabilities when events are independent overcounts because it ignores the overlap; multiplication correctly captures the \"both must happen\" requirement by scaling one probability by the other.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "A fair six-sided die and an unfair six-sided die (where faces 1–5 each have probability $$p$$ and face 6 has probability $$1-5p$$) are both rolled. What is the probability that both dice show a 6, expressed in terms of $$p$$? (2 steps)", "answer": "- Step 1: The fair die has $$P(\\text{six}) = \\frac{1}{6}$$. The unfair die has $$P(\\text{six}) = 1 - 5p$$.\n- Step 2: Since the two dice are independent, we multiply: $$P(\\text{both six}) = \\frac{1}{6} \\times (1 - 5p) = \\frac{1 - 5p}{6}$$.\n\nThis is a direct application of \"independent AND = multiply.\" The result depends on the unknown $$p$$, which you'd need additional information to determine.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "A bearing is always measured in a specific direction from a specific reference line. What are the direction and reference, and what range of values can a bearing take? (2 steps)", "answer": "- Step 1: A bearing is always measured **clockwise** from **North** (the vertical upward direction). You first draw in the North line, then measure the angle going clockwise from it.\n- Step 2: Because it's a full clockwise rotation, bearings range from $$0°$$ (due North) to $$360°$$ (also due North, completing a full turn). A bearing is never negative and never exceeds $$360°$$.\n\nA bearing of $$0°$$ means pointing directly North — it does *not* mean \"no angle\" in a general sense.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "Why does the sum of all exterior angles of *any* convex polygon always equal $$360°$$, regardless of the number of sides? Explain using the \"ant walking\" intuition. (3 steps)", "answer": "- Step 1: Imagine you are an ant standing at one vertex of the polygon, facing along the first side. You walk to the next vertex and must *turn* to face along the next side. The angle you turn through is exactly the exterior angle at that vertex.\n- Step 2: As you continue walking around the entire polygon — vertex by vertex, side by side — you turn through each exterior angle in sequence.\n- Step 3: By the time you return to your starting point and starting direction, you have completed exactly one full rotation: $$360°$$. Therefore, the sum of all exterior angles (one per vertex) is always $$360°$$, whether the polygon has 3 sides or 100 sides.\n\nThis works for *any* convex polygon — it's a topological fact about completing a loop, not a geometric coincidence.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "For a regular pentagon, what is the exterior angle and what is the interior angle? Walk through the logic connecting the two. (3 steps)", "answer": "- Step 1: A regular pentagon has 5 equal exterior angles summing to $$360°$$, so each exterior angle is $$\\frac{360°}{5} = 72°$$.\n- Step 2: At each vertex, the exterior angle and the interior angle sit on a straight line — they are supplementary. So interior angle $$= 180° - 72° = 108°$$.\n- Step 3: Mental maths shortcut for $$360 \\div 5$$: first compute $$360 \\div 10 = 36$$, then double it to get $$72$$. This works because dividing by 5 is the same as dividing by 10 then multiplying by 2.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "A common mistake is to say \"the sum of interior angles of a regular pentagon is $$360°$$.\" Why is this wrong, and what is the correct sum? (2 steps)", "answer": "- Step 1: $$360°$$ is the sum of the *exterior* angles, not the interior angles. Each interior angle is $$108°$$, so the sum of interior angles is $$5 \\times 108° = 540°$$. Alternatively, the general formula for the sum of interior angles of an $$n$$-sided polygon is $$(n-2) \\times 180°$$, giving $$(5-2) \\times 180° = 540°$$.\n- Step 2: The confusion arises because students hear \"360 divided by n\" and apply it to interior angles. The exterior angles sum to $$360°$$ precisely because of the \"full turn\" argument; the interior angles sum to a larger number because they measure the \"inside space\" of the polygon, which grows with more sides.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "State the formula for the sum of the first $$n$$ terms of a geometric series, and explain what each symbol represents. Why is there a separate formula for the sum to infinity? (2 steps)", "answer": "- Step 1: $$S_n = \\frac{a(1 - r^n)}{1 - r}$$ where $$a$$ is the first term, $$r$$ is the common ratio, and $$n$$ is the number of terms. This formula works for any geometric series where $$r \\neq 1$$.\n- Step 2: When $$|r| < 1$$, the term $$r^n$$ shrinks toward 0 as $$n \\to \\infty$$, so the formula simplifies to $$S_\\infty = \\frac{a}{1 - r}$$. This is the sum to infinity — it exists *only* when $$|r| < 1$$ because only then does the infinite series converge. If $$|r| \\geq 1$$, the terms don't shrink and the sum diverges.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "Factorize $$1 - r^3$$ using the difference of two cubes identity. Walk through the identity itself and then apply it. (3 steps)", "answer": "- Step 1: The difference of two cubes identity is $$a^3 - b^3 = (a - b)(a^2 + ab + b^2)$$. To derive this: set $$a^3 - b^3 = 0$$, so $$a = b$$, meaning $$(a - b)$$ is a factor. Then expand $$(a - b)(a^2 + ab + b^2)$$ to verify: $$a^3 + a^2b + ab^2 - a^2b - ab^2 - b^3 = a^3 - b^3$$.\n- Step 2: For $$1 - r^3$$, identify $$a = 1$$ and $$b = r$$ (since $$1 - r^3 = 1^3 - r^3$$).\n- Step 3: Substitute into the identity: $$1 - r^3 = (1 - r)(1^2 + 1 \\cdot r + r^2) = (1 - r)(1 + r + r^2)$$.\n\nThis factorization is powerful because when $$1 - r^3$$ appears in the numerator and $$(1 - r)$$ in the denominator of the geometric sum formula, they cancel, simplifying the algebra dramatically.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "You are given that $$S_3 = 70.2$$ and $$S_\\infty = 75$$ for a geometric series. Describe the strategic shortcut that avoids using the difference of two cubes factorization to find $$r$$. (3 steps)", "answer": "- Step 1: Write out both equations: $$S_3 = \\frac{a(1-r^3)}{1-r} = 70.2$$ and $$S_\\infty = \\frac{a}{1-r} = 75$$.\n- Step 2: Notice that $$\\frac{a}{1-r}$$ appears explicitly in the second equation and is *embedded* in the first equation as a factor. So substitute $$\\frac{a}{1-r} = 75$$ directly into the first equation: $$75(1 - r^3) = 70.2$$.\n- Step 3: Now solve: $$1 - r^3 = \\frac{70.2}{75} = \\frac{117}{125}$$, so $$r^3 = 1 - \\frac{117}{125} = \\frac{8}{125}$$, giving $$r = \\frac{2}{5}$$.\n\nThe insight: spotting that one expression is a *sub-component* of another lets you substitute and eliminate a variable, bypassing lengthy algebra. This is faster than factoring the difference of cubes and cancelling $$(1-r)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "After finding $$r = \\frac{2}{5}$$ for a geometric series where $$S_\\infty = 75$$, why is it easier to find $$a$$ using the sum-to-infinity formula rather than the $$S_n$$ formula? (2 steps)", "answer": "- Step 1: The sum-to-infinity formula $$S_\\infty = \\frac{a}{1-r}$$ is linear in $$a$$: once you know $$r$$, you simply rearrange to get $$a = S_\\infty(1-r) = 75 \\times (1 - \\frac{2}{5}) = 75 \\times \\frac{3}{5} = 45$$.\n- Step 2: Using the $$S_3$$ formula instead would require substituting both $$a$$ and $$r$$ into $$\\frac{a(1-r^3)}{1-r} = 70.2$$, which involves more computation and more places to make errors. The simpler equation is always preferable when it gives you what you need.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "State the Factor Theorem and explain how the phrasing of an exam question (\"3x − 4 is a factor of f(x)\") tells you exactly what to do. (2 steps)", "answer": "- Step 1: The Factor Theorem states: if $$(ax - b)$$ is a factor of $$f(x)$$, then $$f\\!\\left(\\frac{b}{a}\\right) = 0$$. Conversely, if $$f\\!\\left(\\frac{b}{a}\\right) = 0$$, then $$(ax - b)$$ is a factor.\n- Step 2: When the question says \"$$3x - 4$$ is a factor,\" set $$3x - 4 = 0$$ to get $$x = \\frac{4}{3}$$, then evaluate $$f\\!\\left(\\frac{4}{3}\\right) = 0$$. The word \"factor\" is your trigger — it guarantees a root, and the root is found by setting the factor equal to zero.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "State the Remainder Theorem. How does it relate to the Factor Theorem — are they the same idea or fundamentally different? (3 steps)", "answer": "- Step 1: The Remainder Theorem states: when $$f(x)$$ is divided by $$(x - c)$$, the remainder is $$f(c)$$. You find the remainder simply by substituting $$x = c$$ into the polynomial.\n- Step 2: The Factor Theorem is a *special case* of the Remainder Theorem. If the remainder is zero (i.e., $$f(c) = 0$$), then $$(x - c)$$ divides exactly — it's a factor. If the remainder is nonzero (i.e., $$f(c) = b$$), then $$(x - c)$$ is not a factor, and $$b$$ is what's left over.\n- Step 3: So they are the *same underlying idea* — evaluate the polynomial at a specific value. The only difference is whether the result is zero (factor) or nonzero (remainder). Think of the Factor Theorem as \"Remainder Theorem with remainder = 0.\"", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "When dividing a cubic $$f(x)$$ by the linear factor $$(3x - 4)$$, what degree must the quotient have, and why must you multiply the quotient's leading term by $$3x$$ (not just $$x$$) to recover the original leading term? (2 steps)", "answer": "- Step 1: Dividing a degree-3 polynomial by a degree-1 polynomial always yields a degree-2 quotient (plus possibly a remainder). So the quotient is a quadratic.\n- Step 2: To recover the leading term $$3x^3$$ of the original polynomial, you must multiply the leading term of the quotient by the leading term of the divisor $$(3x - 4)$$. Since the divisor's leading term is $$3x$$, the quotient's leading term must be $$x^2$$ (because $$3x \\times x^2 = 3x^3$$), not $$3x^2$$ (which would give $$9x^3$$). This is algebraic long division — you match the highest-degree term at each step.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": true}, {"question": "After partially factorizing a cubic as $$(3x-4)(x^2 + x - 2)$$, how do you know to check whether the quadratic factor can be broken down further, and what do you look for? (2 steps)", "answer": "- Step 1: The question says \"fully factorize,\" so you must check every factor to see if it can be broken down further. A quadratic $$x^2 + x - 2$$ can potentially be written as two linear factors if it factors nicely over the integers.\n- Step 2: Look for two numbers that multiply to give the constant term ($$-2$$) and add to give the coefficient of $$x$$ ($$+1$$). Those numbers are $$+2$$ and $$-1$$: $$(2)(-1) = -2$$ and $$2 + (-1) = 1$$. So $$x^2 + x - 2 = (x + 2)(x - 1)$$, and the full factorization is $$(3x - 4)(x + 2)(x - 1)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "What is the general equation of a circle with centre $$(a, b)$$ and radius $$r$$, and why is it written with $$r^2$$ rather than $$r$$? (2 steps)", "answer": "- Step 1: The equation is $$(x - a)^2 + (y - b)^2 = r^2$$, where $$(a, b)$$ is the centre and $$r$$ is the radius.\n- Step 2: It uses $$r^2$$ (not $$r$$) because the equation comes directly from the distance formula: a point $$(x, y)$$ lies on the circle if its distance from the centre $$(a, b)$$ equals $$r$$. By Pythagoras, that distance squared is $$(x-a)^2 + (y-b)^2$$, and setting it equal to $$r^2$$ avoids writing a square root. This is cleaner algebraically and avoids irrational numbers on the right side.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "You know the centre of a circle is $$(7, -2)$$ and a point on the circle is $$(11, 6)$$. Conceptually, how do you find the radius, and why does this work? (2 steps)", "answer": "- Step 1: The radius is the distance from the centre to any point on the circle. Use the distance formula: $$r = \\sqrt{(11 - 7)^2 + (6 - (-2))^2} = \\sqrt{4^2 + 8^2} = \\sqrt{16 + 64} = \\sqrt{80}$$.\n- Step 2: This works because *every* point on a circle is equidistant from the centre — that's the definition of a circle. So any point on the circle gives the same radius. You could use any point on the circle and get the same answer.\n\nIn the final equation, write $$(x-7)^2 + (y+2)^2 = 80$$ — keep it as $$r^2 = 80$$ rather than computing a decimal for $$r$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "When writing the circle equation $$(x - 7)^2 + (y + 2)^2 = 80$$, why is the $$y$$-term written as $$(y + 2)^2$$ rather than $$(y - (-2))^2$$, and what sign error do students commonly make? (2 steps)", "answer": "- Step 1: The centre is $$(7, -2)$$, so $$b = -2$$. The formula uses $$(y - b)^2$$, giving $$(y - (-2))^2 = (y + 2)^2$$. The double negative creates a positive sign inside the bracket.\n- Step 2: The common error is to see the centre coordinate $$-2$$ and write $$(y - 2)^2$$, forgetting that the formula subtracts the centre value. The rule: the signs in the brackets are always *opposite* to the signs of the centre coordinates. Centre $$(7, -2)$$ → brackets $$(x - 7)$$ and $$(y + 2)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "You have a logarithmic expression $$\\frac{1}{2}\\log_{10}(N)$$ but the answer must be written as $$\\log_{10}(k)$$ for some value $$k$$. How do you convert, and what is the relationship between $$N$$ and $$k$$? (2 steps)", "answer": "- Step 1: Use the power law of logarithms: $$c \\cdot \\log_{10}(N) = \\log_{10}(N^c)$$. So $$\\frac{1}{2}\\log_{10}(N) = \\log_{10}(N^{1/2}) = \\log_{10}(\\sqrt{N})$$.\n- Step 2: Therefore $$k = \\sqrt{N}$$. The coefficient $$\\frac{1}{2}$$ in front of the log becomes an exponent of $$\\frac{1}{2}$$ (i.e., a square root) *inside* the log. The key skill is recognizing that moving a coefficient inside a log converts it to a power.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "When solving logarithmic equations, why must you check the *natural domain* of the original equation before accepting solutions? Give a concrete scenario. (3 steps)", "answer": "- Step 1: The argument of any logarithm must be strictly positive — $$\\log_{10}(A)$$ requires $$A > 0$$. This constraint defines the natural domain: the set of allowable inputs.\n- Step 2: Example: solving $$\\log_{10}(5 - a) + \\log_{10}(a + 20) = 2$$ yields candidates $$a = -25$$ or $$a = 20$$ after factorising. But we need both $$5 - a > 0$$ (so $$a < 5$$) and $$a + 20 > 0$$ (so $$a > -20$$). The domain is $$-20 < a < 5$$.\n- Step 3: The solution $$a = 20$$ falls outside this domain (since $$5 - 20 = -15 < 0$$), so it must be **rejected** — you'd be taking the log of a negative number, which is undefined. Only $$a = -25$$ would also be rejected since $$-25 < -20$$. Wait — in the session example, the valid solution is $$a = -25$$? No: $$a + 20 = -25 + 20 = -5 < 0$$, so $$a = -25$$ is also rejected. The only valid solution is whichever falls inside $$-20 < a < 5$$.\n\nAlways state the rejection with a reason, e.g., \"Reject $$a = 20$$ as we need $$a < 5$$.\"", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "What is the definition of a rational number, and why is \"a number whose decimal goes on forever\" an *insufficient* definition? (2 steps)", "answer": "- Step 1: A rational number is any number that can be written as $$\\frac{p}{q}$$ where $$p$$ and $$q$$ are integers and $$q \\neq 0$$. This includes all whole numbers (e.g., $$9 = \\frac{9}{1}$$), terminating decimals, and recurring decimals.\n- Step 2: \"Decimal goes on forever\" is insufficient because $$0.\\overline{3} = 0.333...$$ goes on forever but equals $$\\frac{1}{3}$$, which is rational. The correct distinction is: rational numbers have decimals that either terminate *or* eventually repeat; irrational numbers have decimals that go on forever *and never repeat*. The fraction-of-integers definition is precise and avoids decimal-based confusion.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "Why is $$\\sqrt{4}$$ rational but $$\\sqrt{2}$$ irrational? Both are square roots of integers — what's the decisive difference? (2 steps)", "answer": "- Step 1: $$\\sqrt{4} = 2$$, which is an integer and can be written as $$\\frac{2}{1}$$ — a fraction of two integers. So it's rational.\n- Step 2: $$\\sqrt{2}$$ cannot be written as $$\\frac{p}{q}$$ for any integers $$p, q$$. This was proven by the ancient Greeks (by contradiction: assume $$\\sqrt{2} = \\frac{p}{q}$$ in lowest terms, square both sides, and derive that both $$p$$ and $$q$$ must be even — contradicting \"lowest terms\"). The decisive factor is whether the number under the square root is a *perfect square* of an integer.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "A student claims: \"If $$x$$ and $$y$$ are irrational numbers where $$x \\neq y$$, then $$x \\times y$$ is also irrational.\" Provide a counterexample and explain why it disproves the claim. (3 steps)", "answer": "- Step 1: A counterexample must satisfy all the premises of the claim but produce a conclusion that contradicts it. The premises are: $$x$$ is irrational, $$y$$ is irrational, and $$x \\neq y$$.\n- Step 2: Choose $$x = \\sqrt{2}$$ and $$y = \\sqrt{8}$$. Both are irrational (neither can be written as a fraction of integers), and they are not equal.\n- Step 3: Compute: $$x \\times y = \\sqrt{2} \\times \\sqrt{8} = \\sqrt{16} = 4$$, which is rational (it's $$\\frac{4}{1}$$). Since the premises are all satisfied but the conclusion is false, the claim is disproved.\n\nAlternative: $$x = \\sqrt{2}$$, $$y = 3\\sqrt{2}$$ gives $$xy = 6$$, also rational. The trick is choosing irrationals whose product eliminates the surd.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "Why does the counterexample $$x = \\sqrt{2}, y = \\sqrt{2}$$ (giving $$xy = 2$$, which is rational) NOT work against the specific claim \"if $$x$$ and $$y$$ are irrational AND $$x \\neq y$$\"? (2 steps)", "answer": "- Step 1: The claim includes the condition $$x \\neq y$$. Using $$x = \\sqrt{2}$$ and $$y = \\sqrt{2}$$ violates this condition because they are equal.\n- Step 2: A counterexample must satisfy *every* premise of the claim. Since this example fails the $$x \\neq y$$ requirement, it doesn't refute the claim — it only refutes a *weaker* version without the inequality constraint. You need distinct irrationals, like $$\\sqrt{2}$$ and $$3\\sqrt{2}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "When writing a general odd number for a proof, why must you use a *different* letter (e.g., $$2k + 1$$) rather than $$2n + 1$$ if the proof already uses $$n$$ elsewhere? (2 steps)", "answer": "- Step 1: If you write \"let an odd number be $$2n + 1$$\" but $$n$$ is already defined as something specific in the problem (e.g., \"for all positive integers $$n$$\"), you've created a naming conflict — is $$n$$ the specific integer from the problem, or the arbitrary integer defining your odd number?\n- Step 2: Using $$2k + 1$$ where $$k$$ is an integer makes it clear that $$k$$ is a *new*, independent variable. You must also state \"$$k$$ is an integer\" explicitly — without this, $$2k + 1$$ could be any real number, not necessarily an odd integer.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "Prove that the cube of an odd number is always odd. Set up the proof correctly using proper notation, and identify the key step. (3 steps)", "answer": "- Step 1: Let any odd number be written as $$2k + 1$$, where $$k$$ is an integer. We want to show $$(2k + 1)^3$$ is odd.\n- Step 2: Expand: $$(2k+1)^3 = (2k+1)^2(2k+1) = (4k^2 + 4k + 1)(2k + 1)$$. Multiplying out: $$8k^3 + 4k^2 + 8k^2 + 4k + 2k + 1 = 8k^3 + 12k^2 + 6k + 1$$. Factor out 2 from the first three terms: $$2(4k^3 + 6k^2 + 3k) + 1$$.\n- Step 3: Since $$k$$ is an integer, $$4k^3 + 6k^2 + 3k$$ is an integer, so $$2(4k^3 + 6k^2 + 3k)$$ is even. Adding 1 makes the whole expression odd. Therefore $$(2k+1)^3$$ is always odd.\n\nThe critical move is factoring out the 2 to reveal the \"even + 1 = odd\" structure.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "A student writes \"let an odd number be $$n = 2n + 1$$\" in a proof. What is logically wrong with this statement, and how should it be corrected? (2 steps)", "answer": "- Step 1: The equation $$n = 2n + 1$$ simplifies to $$n = -1$$, which is a single specific value, not a general representation of all odd numbers. Using the same letter on both sides makes it look like an equation to solve rather than a definition.\n- Step 2: Correct it to: \"Let an odd number be of the form $$2k + 1$$, where $$k$$ is an integer.\" Now $$k$$ is clearly a free variable that can take any integer value, generating all odd numbers. The form $$2k + 1$$ is a *template*, not an equation to solve.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "In a coordinate geometry problem, you find the equation of a line and the centre of a circle. The question asks for the circle's equation but doesn't directly give the radius. What visual strategy does the tutor recommend to unlock the problem? (2 steps)", "answer": "- Step 1: **Annotate the diagram.** Write the line equation, the centre coordinates, and any other known information directly on the diagram. This makes relationships visually obvious.\n- Step 2: Look for a radius on the diagram — a line from the centre to any point on the circle. If a point on the circle is given (e.g., where the circle intersects a line or axis), the distance from the centre to that point *is* the radius. Use the distance formula to compute it. The key insight: any point on the circle gives you the radius via Pythagoras.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "When factoring quadratics like $$x^2 + x - 2$$, the \"two numbers\" method looks for numbers that multiply to the constant term and add to the coefficient of $$x$$. Why does this method work, and what is its limitation? (2 steps)", "answer": "- Step 1: If $$(x + p)(x + q) = x^2 + (p+q)x + pq$$, then the coefficient of $$x$$ is $$p + q$$ and the constant is $$pq$$. So finding two numbers with the right product and sum directly gives you $$p$$ and $$q$$.\n- Step 2: The limitation: this only works when the quadratic factors nicely over the integers (i.e., $$p$$ and $$q$$ are integers). If no such integers exist (e.g., $$x^2 + x - 3$$), you need the quadratic formula instead. Also, for non-monic quadratics like $$3x^2 + 5x - 2$$, the method needs adjustment (you look for numbers that multiply to $$3 \\times (-2) = -6$$ and add to 5).", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "A geometric series has $$r = \\frac{2}{5}$$ and $$S_\\infty = 75$$. Mentally estimate $$a$$ without a calculator. (2 steps)", "answer": "- Step 1: Use $$a = S_\\infty(1 - r) = 75 \\times \\left(1 - \\frac{2}{5}\\right) = 75 \\times \\frac{3}{5}$$.\n- Step 2: $$75 \\div 5 = 15$$, and $$15 \\times 3 = 45$$. So $$a = 45$$.\n\nThis mental calculation works because the numbers are chosen to be clean fractions. The key insight is recognizing that $$1 - r$$ is a simple fraction when $$r$$ is rational.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "Why is $$0.\\overline{3}$$ (which equals $$\\frac{1}{3}$$) classified as rational, even though its decimal representation never terminates? (2 steps)", "answer": "- Step 1: Rationality is defined by whether a number can be expressed as $$\\frac{p}{q}$$ with $$p, q$$ integers. Since $$0.\\overline{3} = \\frac{1}{3}$$, and both 1 and 3 are integers, it is rational by definition.\n- Step 2: The decimal going on forever is irrelevant — what matters is the *pattern*. All recurring decimals (where a block of digits repeats forever) are rational because there is an algorithm to convert any recurring decimal into a fraction of integers. Only non-terminating, *non-repeating* decimals are irrational.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "You need to prove that a statement is false. Explain the logical structure of a counterexample — what must it satisfy, and what must it demonstrate? (3 steps)", "answer": "- Step 1: A counterexample must satisfy every premise (hypothesis) of the claim. If the claim says \"for all $$x$$ and $$y$$ such that [conditions],\" your example must meet all those conditions.\n- Step 2: The counterexample must then produce an outcome that violates the conclusion of the claim. If the claim says \"then [result],\" your example must show the result is false.\n- Step 3: Together, this shows the implication \"if premises, then conclusion\" is not universally true. One valid counterexample is sufficient to disprove a universal claim — you don't need to find every exception, just one.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "In the geometric series problem, the tutor mentions that using the difference of two cubes factorization *works* but is not the most efficient approach. What general problem-solving principle does this illustrate? (2 steps)", "answer": "- Step 1: The principle is **substitution over expansion**. When one equation contains a recognizable sub-expression that appears as a whole in another equation, substituting the whole value is faster than expanding and simplifying.\n- Step 2: In this case, $$\\frac{a}{1-r}$$ appears inside $$\\frac{a(1-r^3)}{1-r}$$. Rather than expanding $$1 - r^3 = (1-r)(1+r+r^2)$$ and cancelling $$(1-r)$$, you simply replace $$\\frac{a}{1-r}$$ with 75. Both approaches are mathematically valid, but substitution reduces the number of algebraic steps and the chance of errors.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "When a question says \"given further that when $$f(x)$$ is divided by $$(x - 2)$$, the remainder is $$b$$,\" what theorem are you using and what is your very first step? (2 steps)", "answer": "- Step 1: This is the **Remainder Theorem**. The keyword \"remainder\" (not \"factor\") signals this.\n- Step 2: Your first step: set the divisor equal to zero to find what to substitute. $$x - 2 = 0$$ gives $$x = 2$$, so compute $$f(2) = b$$. This directly gives you a numerical equation involving the unknown coefficients of $$f(x)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "A student claims $$\\frac{4.5}{9.3}$$ is a rational number because it's a fraction. Why is this reasoning flawed? (2 steps)", "answer": "- Step 1: The definition of a rational number requires it to be a fraction of *integers* (whole numbers). Both numerator and denominator must be integers. Here, $$4.5$$ and $$9.3$$ are not integers.\n- Step 2: However, $$\\frac{4.5}{9.3}$$ *happens* to be rational in this case because it equals $$\\frac{45}{93} = \\frac{15}{31}$$, which is a fraction of integers. But the reasoning \"it's already a fraction\" is wrong — you must verify the numerator and denominator are integers. For example, $$\\frac{\\pi}{1}$$ is a \"fraction\" but $$\\pi$$ is not an integer, so it's irrational.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "When solving a log equation that produces two candidate solutions, you find that one solution violates the domain. How should you present this on an exam paper to ensure you get full marks? (2 steps)", "answer": "- Step 1: Next to the invalid solution, write **\"Reject\"** clearly, then give a specific reason such as \"since we require $$a < 5$$\" or \"as $$\\log_{10}(\\text{negative})$$ is undefined.\"\n- Step 2: Do not just cross it out or put an ✗ — examiners may not understand your reasoning. Writing the word \"Reject\" and a brief justification makes it unambiguous that you identified the domain violation and intentionally excluded it. This is often the difference between losing and keeping the final accuracy mark.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "The interior angle of a regular polygon is $$108°$$. How many sides does it have? Walk through the reverse reasoning from the session's approach. (3 steps)", "answer": "- Step 1: Interior angle = $$108°$$ means exterior angle = $$180° - 108° = 72°$$.\n- Step 2: The sum of all exterior angles is $$360°$$, and each exterior angle equals $$72°$$. So the number of sides is $$\\frac{360°}{72°} = 5$$.\n- Step 3: This is a regular pentagon. The approach works in reverse: given either interior or exterior angle, you can recover the number of sides because $$n = \\frac{360}{\\text{exterior angle}}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": true}, {"question": "When performing algebraic long division to divide a cubic by $$(3x - 4)$$, you get a remainder of 0. Why is it essential to write the brackets around the negative terms during subtraction, and what goes wrong if you don't? (2 steps)", "answer": "- Step 1: At each step of long division, you subtract the product of the divisor and your current quotient term from the current remainder. Writing brackets, e.g., $$-(-x^2 - (-4x^2))$$, forces you to distribute the negative sign correctly.\n- Step 2: Without brackets, students often write $$-x^2 - 4x^2$$ when they should write $$-x^2 + 4x^2 = 3x^2$$. The missing bracket and sign distribution leads to an incorrect intermediate polynomial, which cascades into a wrong final answer. Brackets are a low-cost safety mechanism.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "A geometric series with $$|r| < 1$$ has $$S_\\infty = 75$$ and $$S_3 = 70.2$$. Without doing any calculation, is the common ratio likely closer to 0 or closer to 1, and why? (2 steps)", "answer": "- Step 1: The sum to infinity is 75, and after just 3 terms you've already accumulated 70.2 — that's $$\\frac{70.2}{75} = 93.6\\%$$ of the total sum.\n- Step 2: This means the series converges quickly; the terms after the 3rd are very small. A small $$|r|$$ causes rapid decay (terms shrink fast), while $$|r|$$ close to 1 causes slow decay. Since convergence is fast here, $$r$$ is likely modest — indeed $$r = \\frac{2}{5} = 0.4$$ is well away from 1.\n\nDirectional/qualitative reasoning: if $$S_3$$ were, say, only 30% of $$S_\\infty$$, that would indicate $$|r|$$ closer to 1 (slow convergence).", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "Explain why the sum of exterior angles of a convex polygon is $$360°$$ but the sum of interior angles grows with the number of sides. What is the formula for the sum of interior angles of an $$n$$-sided polygon? (3 steps)", "answer": "- Step 1: The exterior angles always sum to $$360°$$ because they represent one complete turn around the shape (the \"ant walk\" argument). This is independent of $$n$$.\n- Step 2: Each interior angle is $$180° -$$ (exterior angle). So the sum of interior angles is $$n \\times 180° - 360° = (n-2) \\times 180°$$. As $$n$$ increases, you have more interior angles, each close to $$180°$$, so the total grows.\n- Step 3: For a triangle ($$n = 3$$): $$(3-2) \\times 180° = 180°$$. For a pentagon ($$n = 5$$): $$(5-2) \\times 180° = 540°$$. The interior sum increases by $$180°$$ for each additional side because adding a side adds one more triangle's worth of interior angle.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": true}, {"question": "You have $$r^3 = \\frac{8}{125}$$. Mentally find $$r$$ by recognizing the structure of the fraction. (2 steps)", "answer": "- Step 1: Recognize that both 8 and 125 are perfect cubes: $$8 = 2^3$$ and $$125 = 5^3$$.\n- Step 2: So $$r^3 = \\frac{2^3}{5^3} = \\left(\\frac{2}{5}\\right)^3$$, which means $$r = \\frac{2}{5}$$.\n\nThis is why exam questions typically use \"nice\" numbers — the cube root of a fraction of perfect cubes is just the fraction of the cube roots. If the fraction weren't of perfect cubes, you'd need a calculator.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "Why can't you write $$\\pi$$ as a rational number using the fraction $$\\frac{\\pi}{1}$$? Both numerator and denominator seem to be present. (2 steps)", "answer": "- Step 1: The definition of a rational number requires the fraction $$\\frac{p}{q}$$ where both $$p$$ *and* $$q$$ are *integers* (whole numbers like ...-2, -1, 0, 1, 2...).\n- Step 2: $$\\pi$$ is not an integer — it's a transcendental number approximately equal to 3.14159... Writing $$\\frac{\\pi}{1}$$ doesn't help because the numerator fails the integer requirement. The denominator being an integer (1) is necessary but not sufficient; *both* must be integers.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "In the ESAT probability question with two dice, the student wrote the unfair die's face-6 probability as \"$$\\frac{p}{5}$$\" instead of \"$$1 - 5p$$\". Beyond being mathematically wrong, what *practical* problem does $$\\frac{p}{5}$$ cause when you try to use it later in the problem? (2 steps)", "answer": "- Step 1: If each face 1–5 has probability $$p$$, then writing face 6 as $$\\frac{p}{5}$$ introduces fractions into the algebra unnecessarily, making subsequent calculations (like multiplying probabilities) more cumbersome and error-prone.\n- Step 2: More critically, with $$\\frac{p}{5}$$, the sum of all probabilities becomes $$5p + \\frac{p}{5} = \\frac{26p}{5}$$, which must equal 1, giving $$p = \\frac{5}{26}$$. This is correct *if the formula were right*, but the formula itself is wrong — face 6 doesn't have one-fifth the probability of each other face. The notation $$\\frac{p}{5}$$ encodes a false assumption about the relationship between the probabilities.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": true}, {"question": "When a question says \"hence, fully factorise $$f(x)$$,\" what two pieces of information do you combine, and what does \"hence\" signal? (2 steps)", "answer": "- Step 1: \"Hence\" signals that you must use results from earlier parts of the question. You combine: (1) the known linear factor (e.g., $$3x - 4$$) from the question stem, and (2) the values of any unknown coefficients (e.g., $$a$$ and $$b$$) found in earlier parts.\n- Step 2: Substitute the known coefficients into $$f(x)$$, then divide by the known factor using algebraic long division (or inspection). Finally, check whether the resulting quadratic can be factorized further into linear factors. \"Fully\" means no factor can be broken down any more.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "A line has equation $$y = -3x + 19$$ and passes through the centre of a circle at point $$P(7, k)$$. Find $$k$$ by substituting, and explain why this works geometrically. (2 steps)", "answer": "- Step 1: Since the centre $$P$$ lies on the line, substitute $$x = 7$$: $$k = -3(7) + 19 = -21 + 19 = -2$$.\n- Step 2: Geometrically, the centre is a point on the line, so its coordinates must satisfy the line's equation. This is the fundamental principle of coordinate geometry: if a point lies on a curve (or line), substituting its coordinates into the equation gives a true statement.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "You compute a radius as $$\\sqrt{80}$$. In the circle equation, should you write $$r^2 = 80$$ or simplify to $$r^2 = 16 \\times 5$$? What is the exam convention? (2 steps)", "answer": "- Step 1: The circle equation uses $$r^2$$, so you write $$(x - a)^2 + (y - b)^2 = 80$$. Since $$80 = 16 \\times 5$$, you *could* write $$r = 4\\sqrt{5}$$, but in the equation, you need $$r^2$$, which is just 80.\n- Step 2: The exam convention is to leave $$r^2$$ as an integer (80) rather than computing a decimal approximation. Do not write $$r^2 = 79.9...$$ or similar. Integer form is exact and preferred. If asked to state the radius, you could give $$\\sqrt{80}$$ or $$4\\sqrt{5}$$, but for the equation itself, use the integer 80.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": false}, {"question": "The difference of two cubes identity is $$a^3 - b^3 = (a - b)(a^2 + ab + b^2)$$. How was this identity *derived* in the session using a \"root-finding\" approach? (3 steps)", "answer": "- Step 1: Set $$a^3 - b^3 = 0$$. This gives $$a^3 = b^3$$, so $$a = b$$, meaning $$a - b = 0$$. Therefore $$(a - b)$$ must be a factor of the expression $$a^3 - b^3$$.\n- Step 2: Since the original is degree 3 and $$(a - b)$$ is degree 1, the other factor must be degree 2. Write $$a^3 - b^3 = (a - b)(?a^2 + ?ab + ?b^2)$$. To get $$a^3$$, the first term of the quadratic must be $$a^2$$ (since $$a \\times a^2 = a^3$$). This gives $$-a^2b$$ from the cross-term, which we must cancel with $$+a^2b$$.\n- Step 3: Continue: to get $$+a^2b$$, the middle term of the quadratic must be $$+ab$$ (since $$a \\times ab = a^2b$$). This creates $$-ab^2$$, cancelled by $$+ab^2$$, requiring the last term to be $$+b^2$$. So the full factorization is $$(a - b)(a^2 + ab + b^2)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": true}, {"question": "Why is it important to annotate diagrams in coordinate geometry problems, and what specific information should you write on them? (2 steps)", "answer": "- Step 1: Annotating diagrams makes hidden relationships visually obvious. When you write the equation of a line, the centre of a circle, or the coordinates of intersection points directly on the diagram, you can *see* that a radius connects the centre to a point on the circle, or that a line passes through a specific point.\n- Step 2: Write on the diagram: the line equation, the centre coordinates (once found), any known points, and distances you've computed. This turns the diagram from a passive illustration into an active workspace, helping you spot that the distance from centre to a point on the circle *is* the radius.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": false}, {"question": "A student solving a geometric series problem writes $$S_3 = 70.2$$ and the formula $$S_3 = a(1 - r^3)/(1 - r)$$, but then tries to use the formula for the $$n$$th term $$ar^{n-1}$$ instead. What conceptual confusion does this reveal? (2 steps)", "answer": "- Step 1: The confusion is between the **sum of the first $$n$$ terms** ($$S_n$$) and the **$$n$$th term itself** ($$u_n = ar^{n-1}$$). The problem states \"the sum of the first three terms is 70.2,\" which means $$S_3 = 70.2$$, not $$u_3 = 70.2$$.\n- Step 2: $$S_3 = a + ar + ar^2$$ (the total of terms 1, 2, and 3), while $$u_3 = ar^2$$ (just the third term alone). These are very different quantities. Using the wrong formula leads to incorrect equations and an unsolvable system. Always check: does the problem say \"sum\" or \"term\"?", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": false}, {"question": "In a proof that the cube of an odd number is odd, a student writes $$(2k+1)^3$$ but then only squares instead of cubing when expanding. What is the resulting expression, and why does the proof fail? (2 steps)", "answer": "- Step 1: If the student computes $$(2k+1)^2$$ instead of $$(2k+1)^3$$, they get $$4k^2 + 4k + 1 = 2(2k^2 + 2k) + 1$$, which is odd — but this proves the square is odd, not the cube.\n- Step 2: The proof fails because it doesn't address what was asked. The square being odd doesn't imply the cube is odd (though both happen to be true). A valid proof must work with $$(2k+1)^3$$ and show the result is of the form $$2m + 1$$. The cubing step is essential — skipping it means the proof is incomplete and would lose marks.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}], "count": 50}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why must the probabilities of all outcomes in a fair six-sided die sum to 1? How does this principle apply to an unfair die where probabilities differ? (3 steps)", "answer": "- Step 1: **Total Probability Axiom**  \n  Probability theory states that the total probability of all possible outcomes in a sample space must equal 1. For a fair die, this ensures certainty that one outcome will occur.  \n\n- Step 2: **Unfair Die Adjustment**  \n  For an unfair die, individual probabilities are assigned such that their sum still equals 1. For example, if the probability of rolling a 6 is $ P $, and outcomes 1–5 have equal probability $ Q $, then $ 5Q + P = 1 $.  \n\n+ Example: If $ P = 0.5 $, then $ Q = \\frac{1 - 0.5}{5} = 0.1 $.  \n\n- Step 3: **Practical Implication**  \n  This ensures the die remains a valid probability model. Violating the sum-to-1 rule would make the probabilities mathematically inconsistent.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "In the unfair die described, why is the probability of rolling a 6 calculated as $ 1 - 5P $ if each outcome 1–5 has probability $ P $? (3 steps)", "answer": "- Step 1: **Define Variables**  \n  Let $ P $ be the probability for each of outcomes 1–5. Since there are 5 such outcomes, their total probability is $ 5P $.  \n\n- Step 2: **Apply Total Probability**  \n  The probability of rolling a 6 must satisfy $ 5P + P_6 = 1 $, where $ P_6 $ is the probability of rolling a 6.  \n\n- Step 3: **Solve for $ P_6 $**  \n  Rearranging gives $ P_6 = 1 - 5P $. This ensures the total probabilities sum to 1.  \n\n+ Example: If $ P = 0.1 $, then $ P_6 = 1 - 0.5 = 0.5 $.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why is the probability of rolling a 6 on both a fair and unfair die calculated as $ \\frac{1}{6} \\times (1 - 5P) $, not $ \\frac{1}{6} + (1 - 5P) $? (2 steps)", "answer": "- Step 1: **Independent Events**  \n  The probability of two independent events (rolling a 6 on the fair die AND the unfair die) is the product of their individual probabilities.  \n\n+ Example: If the fair die has $ P = \\frac{1}{6} $ and the unfair die has $ P_6 = 0.5 $, the combined probability is $ \\frac{1}{6} \\times 0.5 = \\frac{1}{12} $.  \n\n- Step 2: **Misconception Clarification**  \n  Addition is used for OR scenarios (e.g., rolling a 6 on the fair OR unfair die), not AND. Using addition here would incorrectly assume exclusivity.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "How does the exterior angle of a regular pentagon relate to its interior angle? Derive the interior angle using the exterior angle concept. (3 steps)", "answer": "- Step 1: **Sum of Exterior Angles**  \n  Any polygon’s exterior angles sum to $ 360^\\circ $. For a regular pentagon, each exterior angle is $ \\frac{360^\\circ}{5} = 72^\\circ $.  \n\n- Step 2: **Interior-Exterior Relationship**  \n  Interior and exterior angles at each vertex are supplementary: $ \\text{Interior Angle} = 180^\\circ - \\text{Exterior Angle} $.  \n\n- Step 3: **Calculate Interior Angle**  \n  Substituting, $ 180^\\circ - 72^\\circ = 108^\\circ $. This defines the interior angle of a regular pentagon.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why can’t a bearing be $ 0^\\circ $ if measured from north clockwise toward a line segment in a polygon? (2 steps)", "answer": "- Step 1: **Bearing Definition**  \n  Bearings are measured clockwise from north. A $ 0^\\circ $ bearing would align exactly with north, but the line segment in the problem is directed toward a different compass direction (e.g., northeast).  \n\n- Step 2: **Geometric Context**  \n  In the pentagon example, the angle between north and the side is $ 72^\\circ $, not $ 0^\\circ $. A $ 0^\\circ $ bearing would imply no rotation from north, which is geometrically inconsistent here.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Derive the formula for the sum of a geometric series $ S_n = a \\frac{1 - r^n}{1 - r} $ using the difference of two cubes factorization. (4 steps)", "answer": "- Step 1: **Start with Finite Sum**  \n  $ S_n = a + ar + ar^2 + \\dots + ar^{n-1} $. Multiply both sides by $ r $: $ rS_n = ar + ar^2 + \\dots + ar^n $.  \n\n- Step 2: **Subtract Equations**  \n  $ S_n - rS_n = a - ar^n $, simplifying to $ S_n(1 - r) = a(1 - r^n) $.  \n\n- Step 3: **Solve for $ S_n $**  \n  $ S_n = a \\frac{1 - r^n}{1 - r} $. This works when $ r \\neq 1 $.  \n\n- Step 4: **Connect to Difference of Cubes**  \n  For $ n = 3 $, $ 1 - r^3 = (1 - r)(1 + r + r^2) $, showing the denominator cancels with the numerator in $ S_3 $.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": true}, {"question": "How does the factor theorem link to the remainder theorem? Explain with an example where $ f(4/3) = 0 $. (3 steps)", "answer": "- Step 1: **Factor Theorem**  \n  If $ f(c) = 0 $, then $ (x - c) $ is a factor of $ f(x) $. For $ f\\left(\\frac{4}{3}\\right) = 0 $, $ (3x - 4) $ is a factor.  \n\n- Step 2: **Remainder Theorem**  \n  The remainder when $ f(x) $ is divided by $ (x - c) $ is $ f(c) $. If $ f(c) = 0 $, the remainder is zero, confirming the factor theorem.  \n\n- Step 3: **Practical Example**  \n  Let $ f(x) = 3x^3 - x^2 - 10x + 8 $. Substituting $ x = \\frac{4}{3} $ yields zero, so $ (3x - 4) $ is a factor.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Given a circle with center $ (7, -2) $ and passing through $ (11, 6) $, why is the radius calculated as $ \\sqrt{(11-7)^2 + (6 - (-2))^2} $? (3 steps)", "answer": "- Step 1: **Distance Formula**  \n  The radius is the distance between the center $ (x_1, y_1) $ and a point on the circle $ (x_2, y_2) $:  \n  $ r = \\sqrt{(x_2 - x_1)^2 + (y_2 - y_1)^2} $.  \n\n- Step 2: **Substitute Coordinates**  \n  For $ (7, -2) $ and $ (11, 6) $:  \n  $ \\Delta x = 11 - 7 = 4 $, $ \\Delta y = 6 - (-2) = 8 $.  \n\n- Step 3: **Calculate Radius**  \n  $ r = \\sqrt{4^2 + 8^2} = \\sqrt{16 + 64} = \\sqrt{80} = 4\\sqrt{5} $. This is the circle’s radius.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why does the trapezium rule overestimate or underestimate the true area under a curve? Provide an example using a concave-up function. (2 steps)", "answer": "- Step 1: **Trapezium Rule Mechanics**  \n  The rule approximates the area with trapezoids. For a concave-up curve, trapezoids lie **above** the curve, overestimating the area.  \n\n- Step 2: **Example**  \n  Consider $ f(x) = x^2 $ from $ x=0 $ to $ x=2 $. The trapezium rule with 2 intervals gives:  \n  $ \\frac{2 - 0}{2} [f(0) + 2f(1) + f(2)] = 1[0 + 2(1) + 4] = 6 $.  \n  The exact integral $ \\int_0^2 x^2 dx = \\frac{8}{3} \\approx 2.67 $, so the trapezium result (6) is an overestimate.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": true}, {"question": "Why is $ \\log_{10}(K) = \\frac{1}{2}\\log_{10}(100) $ equivalent to $ K = \\sqrt{100} $? Explain using logarithm laws. (3 steps)", "answer": "- Step 1: **Power Rule**  \n  $ \\frac{1}{2}\\log_{10}(100) = \\log_{10}(100^{1/2}) = \\log_{10}(\\sqrt{100}) $.  \n\n- Step 2: **Equating Logarithms**  \n  If $ \\log_{10}(K) = \\log_{10}(\\sqrt{100}) $, then $ K = \\sqrt{100} $ because logarithmic functions are one-to-one.  \n\n- Step 3: **Simplify**  \n  $ \\sqrt{100} = 10 $, so $ K = 10 $.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Provide a counterexample to disprove the statement: \"The product of two distinct irrational numbers is irrational.\" (2 steps)", "answer": "- Step 1: **Choose Irrational Numbers**  \n  Let $ x = \\sqrt{2} $ and $ y = \\frac{1}{\\sqrt{2}} $. Both are irrational.  \n\n- Step 2: **Multiply**  \n  $ x \\times y = \\sqrt{2} \\times \\frac{1}{\\sqrt{2}} = 1 $, which is rational. This disproves the statement.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}], "count": 11}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "In a probability problem with one fair six-sided die and one biased die, the biased die has equal probabilities for faces 1-5 and a different probability for face 6. If the probability of rolling a 6 on *both* dice is 1/18, how would you set up equations to find
