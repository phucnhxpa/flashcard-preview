ce are independent, the combined probability of rolling 6s on **both** is the product: $ \\frac{1}{6} \\cdot (1 - 5p) = \\frac{1}{18} $.  \n- **Step 3:** Solve the equation $ \\frac{1 - 5p}{6} = \\frac{1}{18} $:  \n  - Multiply both sides by 6: $ 1 - 5p = \\frac{1}{3} $.  \n  - Rearranged: $ 5p = \\frac{2}{3} \\Rightarrow p = \\frac{2}{15} $.  \n  - Final probability of rolling 6 on the biased die: $ 1 - 5 \\cdot \\frac{2}{15} = \\frac{1}{3} $.  \n\n**Key takeaway:** Define variables for unknown probabilities, use independence for combined events, and solve algebraically.", "source": "Qwen 3 ②", "_id": "qwen_2_0"}, {"question": "For a regular polygon with $$n$$ sides, why does the sum of all exterior angles always equal $$360°$$, regardless of $$n$$? (3 steps)", "answer": "- Step 1: Imagine walking along the perimeter of the polygon as an ant. At each vertex, you turn through the exterior angle to face along the next side.\n- Step 2: By the time you've walked all the way around and returned to your starting point facing the same direction, you've completed exactly one full rotation — that is, $$360°$$ of turning.\n- Step 3: Since each turn equals one exterior angle, the sum of all exterior angles must be $$360°$$. Crucially, this depends only on returning to your starting orientation, not on $$n$$.\n\nSo for a regular polygon, each exterior angle is $$360°/n$$, and each interior angle is $$180° - 360°/n$$ (since interior and exterior are supplementary on a straight line).", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "What is the **Remainder Theorem**, and why is it essentially the same idea as the Factor Theorem? (3 steps)", "answer": "- Step 1: The Remainder Theorem says: when $$f(x)$$ is divided by $$(x - c)$$, the remainder equals $$f(c)$$. More generally, dividing by $$(ax - b)$$ gives remainder $$f(b/a)$$.\n- Step 2: The Factor Theorem is just the special case where the remainder happens to be zero: $$f(c) = 0 \\iff (x-c)$$ divides $$f(x)$$ exactly.\n- Step 3: Intuition: writing $$f(x) = (x-c)Q(x) + R$$, plugging in $$x = c$$ kills the $$(x-c)Q(x)$$ term entirely, leaving $$f(c) = R$$.\n\nSo in practice: to find the remainder when dividing by $$(x-2)$$, just compute $$f(2)$$. No long division needed.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "The difference of two cubes identity is $$a^3 - b^3 = (a - b)(a^2 + ab + b^2)$$. How was this identity *derived* in the session using a \"root-finding\" approach? (3 steps)", "answer": "- Step 1: Set $$a^3 - b^3 = 0$$. This gives $$a^3 = b^3$$, so $$a = b$$, meaning $$a - b = 0$$. Therefore $$(a - b)$$ must be a factor of the expression $$a^3 - b^3$$.\n- Step 2: Since the original is degree 3 and $$(a - b)$$ is degree 1, the other factor must be degree 2. Write $$a^3 - b^3 = (a - b)(?a^2 + ?ab + ?b^2)$$. To get $$a^3$$, the first term of the quadratic must be $$a^2$$ (since $$a \\times a^2 = a^3$$). This gives $$-a^2b$$ from the cross-term, which we must cancel with $$+a^2b$$.\n- Step 3: Continue: to get $$+a^2b$$, the middle term of the quadratic must be $$+ab$$ (since $$a \\times ab = a^2b$$). This creates $$-ab^2$$, cancelled by $$+ab^2$$, requiring the last term to be $$+b^2$$. So the full factorization is $$(a - b)(a^2 + ab + b^2)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_46"}, {"question": "Write down the general equation of a circle in $$(a, b, r)$$ form, and explain why this form is preferred over the expanded form. (2 steps)", "answer": "- Step 1: $$(x - a)^2 + (y - b)^2 = r^2$$, where $$(a, b)$$ is the centre and $$r$$ the radius.\n- Step 2: This form reveals centre and radius *by inspection*. The expanded form $$x^2 + y^2 + Dx + Ey + F = 0$$ hides them; you'd have to complete the square to recover the geometry.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "Why does the counterexample $$x = \\sqrt{2}, y = \\sqrt{2}$$ (same number) NOT work against the statement \"if $$x \\neq y$$ are irrational, then $$xy$$ is irrational\"? (2 steps)", "answer": "- Step 1: The statement includes the condition $$x \\neq y$$. If we use $$x = y = \\sqrt{2}$$, then $$x = y$$, so the hypothesis \"$$x \\neq y$$\" is violated. The statement only makes a claim about pairs of *different* irrational numbers.\n- Step 2: A counterexample must satisfy *all* the hypotheses of the statement but produce a conclusion that contradicts it. Since $$x = y = \\sqrt{2}$$ fails the \"$$x \\neq y$$\" condition, it's not a valid counterexample — the original statement never claimed anything about the case where $$x = y$$.\n\nTakeaway: A counterexample must satisfy every condition in the hypothesis. If it violates a condition, it doesn't count.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "When an answer must be written as $$\\log_{10}(K)$$ (no coefficient in front), and your working has produced $$\\tfrac{1}{2}\\log_{10}(N)$$, how do you finalise it? (2 steps)", "answer": "- Step 1: Use the power law in reverse: $$\\tfrac{1}{2}\\log_{10}(N) = \\log_{10}(N^{1/2}) = \\log_{10}(\\sqrt{N})$$.\n- Step 2: So $$K = \\sqrt{N}$$. The coefficient $$1/2$$ has been absorbed inside as a square root, leaving the expression in the demanded form.\n\nThis is a common mark-loss: the working is right, but the final form isn't matched to what the question demands. Always finish by reshaping to the requested form.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "You have $$r^3 = \\frac{8}{125}$$. Without a calculator, how do you recognise that $$r = \\frac{2}{5}$$? (2 steps)", "answer": "- Step 1: Recognise perfect cubes: $$2^3 = 8$$ and $$5^3 = 125$$. So $$\\frac{8}{125} = \\left(\\frac{2}{5}\\right)^3$$.\n- Step 2: Taking the cube root: $$r = \\sqrt[3]{\\frac{8}{125}} = \\frac{\\sqrt[3]{8}}{\\sqrt[3]{125}} = \\frac{2}{5}$$. The cube root distributes over the fraction. Recognising small perfect cubes ($$1, 8, 27, 64, 125$$) is essential for mental math in exams.\n\nTakeaway: Memorise small perfect cubes: $$1^3=1$$, $$2^3=8$$, $$3^3=27$$, $$4^3=64$$, $$5^3=125$$. They appear frequently in geometric series problems.", "source": "GLM 5.1 ②", "_id": "glm_2_55"}, {"question": "A common ESAT/P2 timing trap: you've spent 4 minutes on a 2-mark question and still don't see the path. What's the strategic move? (3 steps)", "answer": "- Step 1: Skip and flag — circle the question number, move on. The opportunity cost of staying is the marks you could earn elsewhere.\n- Step 2: Triage by mark-to-time ratio: 5-mark questions you partially see beat 2-mark questions you fully don't.\n- Step 3: Return only if time permits. A blank later beats a half-done easier question forgotten entirely.\n\nTakeaway: in time-pressured exams, the bottleneck is *minutes*, not *intelligence* — manage minutes.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "Why is it crucial to underline keywords like \"first four terms ascending,\" \"simplest form,\" \"exact value\" when reading an A-level question? (2 steps)", "answer": "- Step 1: Exam markschemes assign accuracy/method marks based on these specific requirements. Missing \"simplest form\" can cost the final A-mark even if your numerical work is right.\n- Step 2: For example, in a binomial expansion question that says \"state the value of $$x$$\" rather than \"compute the value of the expression,\" over-answering wastes time and may introduce errors. Reading carefully tells you exactly what's needed and nothing more.\n\nHabit: on a first read, underline the verbs (find/show/prove/state) and the constraints (form, range, precision). This anchors your answer to what's actually being marked.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "In the ESAT, time per question is approximately 1–2 minutes. Harry gave 3 minutes in practice. If a student can solve a problem correctly in 3 minutes but not in 1.5 minutes, what specific skill are they missing, and how do they develop it? (2 steps)", "answer": "- Step 1: The missing skill is **fluency** — the ability to execute known procedures quickly and accurately without conscious deliberation. The student *understands* the method (they get it right given time) but hasn't practised it enough for the steps to be automatic. Each step requires conscious thought, which is slow.\n- Step 2: Fluency develops through *deliberate, repeated practice* of the same problem types. The strategy: solve the same type of problem 5–10 times until the pattern recognition is instant. Once you see \"two dice, one unfair\" and immediately write \"$$p$$ for each face, $$1-5p$$ for face 6, multiply for both six,\" you've achieved fluency. Speed comes from pattern recognition, not from thinking faster.\n\nTakeaway: Fluency = automatic pattern recognition. Develop it through repeated practice of the same problem types until the steps are reflexive.", "source": "GLM 5.1 ②", "_id": "glm_2_103"}, {"question": "Why is $$\\sqrt[3]{\\tfrac{8}{125}} = \\tfrac{2}{5}$$ a great mental-maths check, and what general lesson does this teach about exam design?", "answer": "$$8 = 2^3$$ and $$125 = 5^3$$, so the cube root distributes: $$\\sqrt[3]{\\tfrac{8}{125}} = \\tfrac{2}{5}$$. Exam questions are designed so that the messy intermediate quantity ($$\\tfrac{8}{125}$$) cube-roots to a clean fraction — this is the examiner's way of saying \"you're on the right track.\" If your cube root, square root, or simplification produces an ugly decimal, you've probably made an arithmetic error upstream.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Why does the substitution $$u = \\tfrac{a}{1-r}$$ make $$S_3 = u(1 - r^3)$$ a *one-line* equation, and what's the general principle?", "answer": "- Step 1: The geometric sum formula is $$S_n = \\tfrac{a}{1-r}(1 - r^n)$$. The first factor $$\\tfrac{a}{1-r}$$ is exactly $$S_\\infty$$ (when $$|r|<1$$).\n- Step 2: So *every* finite sum can be rewritten as $$S_n = S_\\infty (1 - r^n)$$ — an elegant relationship.\n\nGeneral principle: when a problem gives you $$S_\\infty$$ as a known quantity, *don't recompute it*; substitute it directly into the structure of $$S_n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "Conceptually, why does the sum-to-infinity $$S_\\infty = \\frac{a}{1-r}$$ only exist when $$|r| < 1$$? What happens geometrically as you add more and more terms when $$|r| \\geq 1$$? (2 steps)", "answer": "- Step 1: When $$|r| < 1$$, each successive term is a fraction of the previous one, so terms get smaller and smaller, converging toward zero. The partial sums approach a finite limit — the infinite sum \"settles down\" to a definite value. This is convergence.\n- Step 2: When $$|r| \\geq 1$$, terms don't shrink — they stay the same size or grow. The partial sums keep increasing (or oscillating with growing amplitude) without bound. There's no finite limit, so $$S_\\infty$$ doesn't exist (it \"diverges\"). The formula $$\\frac{a}{1-r}$$ would give a finite number, but that number is meaningless — the formula only applies under the convergence condition.\n\nTakeaway: $$S_\\infty$$ exists ⟺ $$|r| < 1$$. The formula without the condition is invalid — always state/verify $$|r| < 1$$ first.", "source": "GLM 5.1 ②", "_id": "glm_2_53"}, {"question": "For the expression $$\\log_{10}(5 - a) + \\log_{10}(a + 25)$$, the first log requires $$a < 5$$ and the second requires $$a > -25$$. Why is the natural domain the intersection (overlap) of these ranges rather than their union? (2 steps)", "answer": "- Step 1: The expression contains", "source": "GLM 5.1 ①", "_id": "glm_1_24"}, {"question": "In a coordinate geometry problem involving a circle and a line, you've found the equation of the line and the centre of the circle. The question asks for the value of a parameter $$k$$ in the centre's coordinates. What key insight connects the centre to the line? (2 steps)", "answer": "- Step 1: The centre of the circle *lies on the line*. This is usually stated or implied in the problem. Since the centre must satisfy the line's equation, you substitute the centre's coordinates (with the unknown $$k$$) into the line equation.\n- Step 2: For example, if the centre is $$(7, k)$$ and the line is $$y = -3x + 19$$, then $$k = -3(7) + 19 = -21 + 19 = -2$$. The key insight: points that lie on a line must satisfy its equation — this is the fundamental bridge between geometry (the diagram) and algebra (the equation).\n\nTakeaway: \"Point lies on line\" → substitute coordinates into the line's equation.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "Mental trick: how do you compute $$360 \\div 5$$ quickly in your head without long division? (2 steps)", "answer": "- Step 1: Dividing by 5 is awkward, but dividing by 10 is trivial: $$360 \\div 10 = 36$$.\n- Step 2: But $$10 = 5 \\times 2$$, so dividing by 10 divides by one factor too many. Compensate by multiplying back by 2: $$36 \\times 2 = 72$$.\n\nGeneral principle: $$x \\div 5 = (x \\div 10) \\times 2$$. This is a useful shortcut whenever you see division by 5.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "For an arithmetic sequence, why is the $$n$$-th term formula $$u_n = a + (n-1)d$$ and not $$u_n = a + nd$$? (3 steps)", "answer": "- Step 1: The first term is $$u_1 = a$$. The second adds one common difference: $$u_2 = a + d$$. The third adds two: $$u_3 = a + 2d$$.\n- Step 2: The pattern: the $$n$$-th term has $$(n-1)$$ common differences added on, because you've taken $$(n-1)$$ steps from term 1 to term $$n$$.\n- Step 3: Using $$nd$$ would shift the whole sequence: $$u_1$$ would be $$a + d$$ instead of $$a$$. The $$(n-1)$$ adjustment ensures the formula correctly outputs the first term when $$n=1$$.\n\nThis off-by-one is a classic exam trap. Always test your formula by plugging in $$n = 1$$ to confirm it gives $$a$$.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "Why do we always state \"where $$k \\in \\mathbb{Z}$$\" (or equivalent) when introducing a variable in a proof, rather than just saying \"let $$n = 2k + 1$$\"?", "answer": "The form $$2k+1$$ only guarantees an *odd integer* if $$k$$ itself is an integer. If $$k$$ were any real number — say $$k = 0.5$$ — then $$2k+1 = 2$$, which is even, breaking the whole argument. Declaring \"$$k \\in \\mathbb{Z}$$\" pins down exactly what set $$k$$ is drawn from, making the proof watertight. In formal proof, an undeclared variable is an unstated assumption — and unstated assumptions lose marks.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Why must a circle's tangent line be perpendicular to the radius at the point of contact? (3 steps)", "answer": "- Step 1: The radius at the contact point is the shortest distance from the centre to any point on the circle. If a line touches the circle at one point only (the definition of a tangent), it can't go any closer to the centre.\n- Step 2: Any line through the contact point that isn't perpendicular to the radius would have a component pointing \"towards the centre,\" so it would enter the circle and intersect at a second point — making it a chord, not a tangent.\n- Step 3: Only the line perpendicular to the radius has no such \"inward\" component, so it just grazes the circle at exactly one point.\n\nConsequence in geometry problems: if you have a tangent and the contact point, you instantly have a right angle with the radius — a free 90° to exploit.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Two dice are rolled: one fair six-sided die, and one biased six-sided die where faces 1–5 are equally likely each with probability $$p$$, and face 6 has a different probability. How do you express the probability of rolling a 6 on the biased die in terms of $$p$$? (3 steps)", "answer": "- Step 1: Recognise the constraint — all probabilities on a die must sum to 1, because some outcome must occur. This is the axiom of total probability.\n- Step 2: Faces 1 through 5 each have probability $$p$$, so their total contribution is $$5p$$ (not $$p/5$$ — a common slip when people try to \"share\" the probability).\n- Step 3: The remaining probability for face 6 must be $$1 - 5p$$, so that all six face-probabilities sum to 1.\n\nKey takeaway: choose the cleanest parameterisation (calling each equal face $$p$$ avoids fractions like $$p/5$$ that complicate algebra later).", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "What's wrong with writing \"let $$n = 2n + 1$$\" when representing an odd integer in a proof?", "answer": "You can't use the same letter on both sides — it's circular and produces a contradiction ($$0 = 1$$). The correct phrasing is: \"Let $$n = 2k + 1$$, where $$k \\in \\mathbb{Z}$$.\" Using a fresh letter ($$k$$) and explicitly stating it's an integer makes the algebraic manipulation valid and the proof rigorous.", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "A bearing is always measured in a specific direction from a specific reference line. What are the direction and reference, and why can a bearing never be negative? (2 steps)", "answer": "- Step 1: A bearing is always measured **clockwise from north**. You first draw a north line (pointing straight up), then measure the angle going clockwise from that north line to the direction of interest.\n- Step 2: Because you always measure clockwise from north, the angle is always between $$0°$$ and $$360°$$. A bearing of $$0°$$ means \"due north,\" $$90°$$ means \"due east,\" $$180°$$ means \"due south,\" and $$270°$$ means \"due west.\" There is never a need for a negative bearing — the convention ensures every direction has a unique, positive three-digit representation.\n\nTakeaway: Bearing = clockwise angle from north, always $$000°$$ to $$360°$$, always three digits.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "If $$(3x - 4)$$ is a factor of $$f(x)$$, what value should you substitute into $$f$$ to test this, and why isn't it $$x = -\\tfrac{4}{3}$$? (2 steps)", "answer": "- Step 1: Set $$3x - 4 = 0 \\Rightarrow x = \\tfrac{4}{3}$$. This is the root associated with the linear factor.\n- Step 2: Therefore the factor theorem demands $$f\\!\\left(\\tfrac{4}{3}\\right) = 0$$, not $$f\\!\\left(-\\tfrac{4}{3}\\right)$$. The sign of $$x$$ comes from isolating $$x$$, not from copying the constant.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "State the three key laws of logarithms and the change-of-base formula. (4 steps)", "answer": "- Step 1: **Product:** $$\\log_b(xy) = \\log_b(x) + \\log_b(y)$$ — turning multiplication into addition.\n- Step 2: **Quotient:** $$\\log_b(x/y) = \\log_b(x) - \\log_b(y)$$ — division becomes subtraction.\n- Step 3: **Power:** $$\\log_b(x^n) = n \\log_b(x)$$ — exponents become coefficients (and conversely, coefficients can become exponents inside the log).\n- Step 4: **Change of base:** $$\\log_b(x) = \\dfrac{\\log_c(x)}{\\log_c(b)}$$, useful when your calculator only has $$\\log_{10}$$ or $$\\ln$$.\n\nWhy these are useful: they let you turn complicated multiplicative expressions into linear ones — which is exactly what makes logs the natural inverse of exponentials.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "State the formulas for the sum of the first $$n$$ terms and the sum to infinity of a geometric series, and explain when the infinite sum exists. (3 steps)", "answer": "- Step 1: Sum of first $$n$$ terms: $$S_n = \\dfrac{a(1 - r^n)}{1 - r}$$ where $$a$$ is the first term and $$r$$ is the common ratio.\n- Step 2: Sum to infinity: $$S_\\infty = \\dfrac{a}{1 - r}$$, but **only** when $$|r| < 1$$.\n- Step 3: Why the restriction? If $$|r| \\geq 1$$, the terms don't shrink to zero, so the partial sums grow without bound (or oscillate), and no finite limit exists. When $$|r| < 1$$, $$r^n \\to 0$$ as $$n \\to \\infty$$, making $$S_n \\to a/(1-r)$$.\n\nCommon confusion: $$S_3$$ is NOT the third term. $$S_3 = a + ar + ar^2$$, the sum of three terms.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "The interior angle of a regular polygon is $$108°$$. How many sides does it have? Walk through the reverse reasoning from the session's approach. (3 steps)", "answer": "- Step 1: Interior angle = $$108°$$ means exterior angle = $$180° - 108° = 72°$$.\n- Step 2: The sum of all exterior angles is $$360°$$, and each exterior angle equals $$72°$$. So the number of sides is $$\\frac{360°}{72°} = 5$$.\n- Step 3: This is a regular pentagon. The approach works in reverse: given either interior or exterior angle, you can recover the number of sides because $$n = \\frac{360}{\\text{exterior angle}}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_36"}, {"question": "For a proof that the cube of an odd number is odd, after expanding $$(2k+1)^3 = 8k^3 + 12k^2 + 6k + 1$$, what is the crucial algebraic step that proves the result? (2 steps)", "answer": "- Step 1: Factor out 2 from all terms except the last: $$8k^3 + 12k^2 + 6k + 1 = 2(4k^3 + 6k^2 + 3k) + 1$$.\n- Step 2: Since $$k$$ is an integer, the expression $$4k^3 + 6k^2 + 3k$$ is also an integer (call it $$m$$). So the result is $$2m + 1$$, which by definition is odd. The crucial step is *extracting the factor of 2* to reveal the \"odd number\" structure. Without this step, you just have a polynomial — the proof requires showing it fits the form $$2 \\times (\\text{integer}) + 1$$.\n\nTakeaway: Proving \"odd\" = showing the expression equals $$2m + 1$$ for some integer $$m$$. Factor out the 2.", "source": "GLM 5.1 ②", "_id": "glm_2_58"}, {"question": "When solving a logarithmic equation, you obtain two candidate solutions: $$a = 20$$ and $$a = -25$$. The equation contains $$\\log(5 - a)$$ and $$\\log(a + 25)$$. Determine the natural domain and which solutions survive. (4 steps)", "answer": "- Step 1: For $$\\log(5 - a)$$ to be defined: $$5 - a > 0 \\Rightarrow a < 5$$.\n- Step 2: For $$\\log(a + 25)$$ to be defined: $$a + 25 > 0 \\Rightarrow a > -25$$.\n- Step 3: Intersect: natural domain is $$-25 < a < 5$$.\n- Step 4: Check candidates: $$a = 20$$ violates $$a < 5$$ → reject. $$a = -25$$ violates $$a > -25$$ (strict) → also reject if both logs are involved, but if only one constraint, may survive. Either way, $$a = 20$$ is definitively rejected because it would force $$\\log(-15)$$.\n\nTakeaway: always state the natural domain *before* solving, so rejecting extraneous roots becomes mechanical, not improvised.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "When solving $$\\log(5-a) + \\log(a+25) = c$$ leads to a quadratic giving $$a = 5$$ or $$a = -20$$, which solution(s) are valid, and how would you justify your rejection in an exam? (3 steps)", "answer": "- Step 1: Find the natural domain: need $$5 - a > 0$$ (so $$a < 5$$) and $$a + 25 > 0$$ (so $$a > -25$$). Combined: $$-25 < a < 5$$.\n- Step 2: Check each root: $$a = 5$$ gives $$5 - a = 0$$, which makes $$\\log(0)$$ undefined → reject. $$a = -20$$ satisfies $$-25 < -20 < 5$$ → accept.\n- Step 3: In the exam, explicitly write \"Reject $$a = 5$$ as we need $$5 - a > 0$$\" with an arrow to the rejected value. Don't just cross it out — examiners reward explicit reasoning.\n\nThe lesson: solving algebraically gives candidate roots; the domain filters genuine solutions.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "When solving a logarithmic equation, you find two algebraic solutions: $$a = 20$$ and $$a = -25$$. Your domain analysis shows that $$a$$ must satisfy $$-25 < a < 5$$. Why must you reject $$a = 20$$, and what specific written reason should you give in an exam? (2 steps)", "answer": "- Step 1: $$a = 20$$ falls outside the natural domain because $$5 - 20 = -15 < 0$$, meaning $$\\log_{10}(-15)$$ is undefined. Even though $$a = 20$$ satisfies the algebraic equation after log manipulation, the original equation didn't exist for this value. You must reject it.\n- Step 2: In an exam, don't just cross out the answer — write \"Reject\" with a clear reason, such as \"Reject: requires $$a < 5$$\" or \"Reject: $$\\log_{10}(5 - 20)$$ is undefined since argument is negative.\" This makes it unambiguous to the marker that you understand why the solution fails. The common mistake: treating log equations like polynomial equations and accepting all algebraic solutions without checking the domain.", "source": "GLM 5.1 ①", "_id": "glm_1_23"}, {"question": "What is the difference between a **rational** and an **irrational** number? Why is \"the decimal goes on forever\" not a sufficient definition of irrational? (3 steps)", "answer": "- Step 1: A **rational** number is one that can be written as $$\\frac{p}{q}$$ where $$p$$ and $$q$$ are integers and $$q \\neq 0$$. Examples: $$3/7$$, $$9 = 9/1$$, $$-4$$, $$0.5 = 1/2$$.\n- Step 2: An **irrational** number is one that **cannot** be written as a ratio of two integers. Examples: $$\\sqrt{2}$$, $$\\sqrt{3}$$, $$\\pi$$, $$e$$.\n- Step 3: \"Decimal goes on forever\" fails as a definition because numbers like $$1/3 = 0.3333\\ldots$$ and $$3/7 = 0.\\overline{428571}$$ have infinite decimals but **repeat** in a pattern, and any repeating decimal can be converted back to a fraction. The true distinguishing feature of an irrational decimal is that it goes on forever **without ever repeating**.\n\nKey takeaway: rational ⇔ can be written as integer/integer ⇔ decimal terminates or repeats.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "When fully factorising a cubic, you know one factor is $$(3x - 4)$$ and the leading term is $$3x^3$$. When setting up polynomial division (or inspection), the first term of the quadratic quotient must be what, and why? (2 steps)", "answer": "- Step 1: The cubic $$3x^3$$ must equal $$(3x - 4)$$ times the leading term of the quotient. Since $$(3x) \\times (\\text{something}) = 3x^3$$, that something must be $$x^2$$.\n- Step 2: So the quotient has the form $$x^2 + \\ldots$$, and the full factorisation starts as $$(3x - 4)(x^2 + \\ldots)$$. Getting this leading term right is crucial — it anchors the entire division/inspection process. A common mistake is to write the leading term of the quotient as $$3x^2$$, which would give $$9x^3$$ when multiplied, not $$3x^3$$.\n\nTakeaway: Always check: the product of the leading terms of the two brackets must give the leading term of the original polynomial.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "You need to prove that a statement is false. Explain the logical structure of a counterexample — what must it satisfy, and what must it demonstrate? (3 steps)", "answer": "- Step 1: A counterexample must satisfy every premise (hypothesis) of the claim. If the claim says \"for all $$x$$ and $$y$$ such that [conditions],\" your example must meet all those conditions.\n- Step 2: The counterexample must then produce an outcome that violates the conclusion of the claim. If the claim says \"then [result],\" your example must show the result is false.\n- Step 3: Together, this shows the implication \"if premises, then conclusion\" is not universally true. One valid counterexample is sufficient to disprove a universal claim — you don't need to find every exception, just one.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "A geometric series with $$|r| < 1$$ has $$S_\\infty = 75$$ and $$S_3 = 70.2$$. Without doing any calculation, is the common ratio likely closer to 0 or closer to 1, and why? (2 steps)", "answer": "- Step 1: The sum to infinity is 75, and after just 3 terms you've already accumulated 70.2 — that's $$\\frac{70.2}{75} = 93.6\\%$$ of the total sum.\n- Step 2: This means the series converges quickly; the terms after the 3rd are very small. A small $$|r|$$ causes rapid decay (terms shrink fast), while $$|r|$$ close to 1 causes slow decay. Since convergence is fast here, $$r$$ is likely modest — indeed $$r = \\frac{2}{5} = 0.4$$ is well away from 1.\n\nDirectional/qualitative reasoning: if $$S_3$$ were, say, only 30% of $$S_\\infty$$, that would indicate $$|r|$$ closer to 1 (slow convergence).", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "Why is $$\\tfrac{3}{7}$$ rational despite having an unfamiliar decimal expansion, and why is $$\\pi$$ irrational despite \"$$\\pi = \\tfrac{\\pi}{1}$$\"?", "answer": "$$\\tfrac{3}{7} = 0.\\overline{428571}$$ — a six-digit block that repeats forever. Any number whose decimal eventually settles into a repeating block can be written as a ratio of integers (there's a standard algebraic trick to recover the fraction). For $$\\pi$$: writing $$\\pi = \\tfrac{\\pi}{1}$$ doesn't satisfy the definition because the *numerator must be an integer*. $$\\pi$$ is not an integer, so this fails. The definition requires **both** numerator and denominator to be integers.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "Why is \"spotting that $$S_\\infty$$ is a sub-expression of $$S_n$$\" easier than using the difference-of-cubes factorisation here, even though both work?", "answer": "The difference-of-cubes route forces you to factorise, cancel, and then handle a quadratic-in-$$r$$ inside the bracket. The substitution route uses a single replacement ($$\\tfrac{a}{1-r} \\to S_\\infty$$) and reduces the equation immediately to a linear equation in $$r^3$$. Same answer, but one line vs. five. The lesson: before launching into machinery, scan whether a *given quantity* appears as a structural piece of another expression.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "When asked to prove that the cube of an odd number is odd, what's the cubic-vs-square trap, and how do you set up the proof? (3 steps)", "answer": "- Step 1: Let odd $$= 2k+1$$ where $$k \\in \\mathbb{Z}$$.\n- Step 2: Cube it (not square it!): $$(2k+1)^3 = 8k^3 + 12k^2 + 6k + 1 = 2(4k^3 + 6k^2 + 3k) + 1$$.\n- Step 3: Since $$4k^3 + 6k^2 + 3k$$ is an integer, the result is of the form $$2m + 1$$ — i.e. odd. ∎\n\nTrap: students sometimes square instead of cube when the question asks about cubes — read the verb carefully.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "A student writes $$\\frac{a}{1-r}$$ and then replaces it with 75. This is a *substitution*. Conceptually, why is substitution a powerful problem-solving technique, and what makes a good substitution? (2 steps)", "answer": "- Step 1: Substitution replaces a complex sub-expression with a single known value, reducing the number of variables and the algebraic complexity of the equation. It's the algebraic equivalent of \"I already know this piece of the puzzle — let me slot it in and move on.\"\n- Step 2: A good substitution targets a sub-expression that: (a) you already know the value of, (b) appears in a structurally important place (like a factor or common term), and (c) simplifies the equation when replaced. Here, $$\\frac{a}{1-r}$$ appears as a multiplicative block in $$S_3$$ and equals 75 — replacing it collapses a two-variable equation into a one-variable equation instantly.\n\nTakeaway: Before expanding or factorising, scan for sub-expressions whose values you already know. Substitution is often the shortest path.", "source": "GLM 5.1 ②", "_id": "glm_2_56"}, {"question": "For a geometric series with $$S_3 = 70.2$$ and $$S_\\infty = 75$$, sketch the conceptual route to find $$r$$ without heavy algebra. (4 steps)", "answer": "- Step 1: $$S_3 = \\dfrac{a(1 - r^3)}{1 - r} = 70.2$$ and $$S_\\infty = \\dfrac{a}{1-r} = 75$$.\n- Step 2: Notice the first expression contains $$\\dfrac{a}{1-r}$$ as a hidden factor: $$\\dfrac{a(1-r^3)}{1-r} = \\dfrac{a}{1-r} \\cdot (1 - r^3) = 75(1 - r^3)$$.\n- Step 3: So $$75(1 - r^3) = 70.2$$, giving $$1 - r^3 = 70.2/75$$. Subtract from 1 to isolate $$r^3$$, then cube-root to get $$r$$.\n- Step 4: Once $$r$$ is known, substitute back into $$S_\\infty = a/(1-r) = 75$$ to find $$a$$.\n\nKey insight: spotting that one equation **already contains** part of the other is the elegance — it avoids cross-multiplying and dealing with a cubic.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "Why does the perpendicular from the centre of a circle bisect any chord? (3 steps)", "answer": "- Step 1: Drop a perpendicular from the centre $$O$$ to the chord $$AB$$, meeting it at point $$M$$. We want to show $$AM = MB$$.\n- Step 2: Consider triangles $$OMA$$ and $$OMB$$. Both share side $$OM$$, both have right angles at $$M$$ (by construction), and $$OA = OB$$ (both radii).\n- Step 3: By RHS (right-angle, hypotenuse, side) congruence, the triangles are congruent. So $$AM = MB$$ — the foot of the perpendicular is the midpoint of the chord.\n\nUse in problems: to find a chord's midpoint or to set up a circle's centre when given two chords, drop perpendicular bisectors and they meet at the centre.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "A student is solving a geometric series problem and writes $$S_3 = a + ar + ar^2 = 70.2$$, then attempts to solve for both $$a$$ and $$r$$ simultaneously from this single equation. Why is this impossible, and what do they need? (2 steps)", "answer": "- Step 1: A single equation in two unknowns ($$a$$ and $$r$$) has infinitely many solutions — it's underdetermined. You can't uniquely determine both variables from one equation alone. For any choice of $$r$$, there exists a corresponding $$a$$ that satisfies the equation.\n- Step 2: You need a *second, independent* equation relating $$a$$ and $$r$$. In the session, this came from $$S_\\infty = \\frac{a}{1-r} = 75$$. Two independent equations in two unknowns → a unique solution. The general principle: you need as many independent equations as unknowns to solve a system uniquely.\n\nTakeaway: One equation, two unknowns → infinite solutions. Add a second independent equation → unique solution.", "source": "GLM 5.1 ②", "_id": "glm_2_86"}, {"question": "If a question tells you that $$(3x - 4)$$ is a factor of $$f(x)$$, what exact value of $$x$$ do you substitute into $$f$$ to apply the factor theorem, and why is it not $$x = 4$$? (2 steps)", "answer": "- Step 1: Set the factor equal to zero: $$3x - 4 = 0$$, giving $$3x = 4$$, so $$x = \\frac{4}{3}$$. This is the value that makes the factor vanish, and therefore makes $$f(x) = 0$$.\n- Step 2: Substituting $$x = 4$$ would be wrong — it makes $$3(4) - 4 = 8$$, not zero, so the factor isn't zeroed out. The factor theorem requires you to find the root of the factor (the $$x$$-value that makes it zero), not just grab the constant term. For a factor $$(bx - c)$$, the root is always $$x = \\frac{c}{b}$$, not $$x = c$$. This is one of the most common errors: confusing the constant in the factor with the value to substitute.", "source": "GLM 5.1 ①", "_id": "glm_1_15"}, {"question": "You know that $$(3x - 4)$$ is a factor of the cubic $$f(x) = 3x^3 - x^2 - 10x + 8$$. When performing polynomial long division by $$(3x - 4)$$, why must the first term of the quotient be $$x^2$$ and not $$3x^2$$? (2 steps)", "answer": "- Step 1: In polynomial long division, you ask: \"what do I multiply the divisor's leading term by to get the dividend's leading term?\" The divisor's leading term is $$3x$$, and the dividend's leading term is $$3x^3$$. So you need $$3x \\times x^2 = 3x^3$$ — the multiplier is $$x^2$$.\n- Step 2: If you tried $$3x^2$$, you'd get $$3x \\times 3x^2 = 9x^3$$, which overshoots the $$3x^3$$ we need. The quotient's leading term is determined by dividing the leading coefficient of the dividend by the leading coefficient of the divisor and reducing the power by 1 (since we're dividing by a linear term): $$\\frac{3x^3}{3x} = x^2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_16"}, {"question": "In a \"two unknowns, two equations\" geometric series problem, why is it almost always more efficient to solve for $$r$$ first, then $$a$$?", "answer": "- Step 1: The non-linear unknown is $$r$$ (it appears as $$r^n$$). Once $$r$$ is pinned down, every formula becomes linear in $$a$$.\n- Step 2: Solving for $$a$$ first would still leave you with a non-linear equation in $$r$$, with no real savings.\n+ Strategy: isolate the variable that appears non-linearly first, because that's where the \"interesting\" algebra lives. Once it's known, the rest is plug-and-chug.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "When writing a proof, why must you specify \"where $$k$$ is an integer\" after writing $$n = 2k + 1$$? What goes wrong if you omit this? (2 steps)", "answer": "- Step 1: Without the constraint \"$$k \\in \\mathbb{Z}$$,\" the expression $$2k + 1$$ could produce *any* real number — not just odd integers. For example, $$k = 0.5$$ gives $$n = 2$$, which is even; $$k = \\pi$$ gives $$n = 2\\pi + 1$$, which isn't even an integer. The definition of \"odd\" specifically requires an integer of the form $$2k + 1$$.\n- Step 2: In a proof, the conclusion that a number is odd relies on the fact that $$2k + 1$$ is an odd *integer* — which is only guaranteed when $$k$$ is an integer. Omitting \"where $$k$$ is an integer\" leaves the proof incomplete and potentially invalid, as the reader cannot verify the logic without knowing the type of $$k$$.\n\nTakeaway: Always specify the type of your parameter. \"$$n = 2k + 1$$, where $$k \\in \\mathbb{Z}$$\" is the complete definition of an odd integer.", "source": "GLM 5.1 ②", "_id": "glm_2_46"}, {"question": "A student factorises $$(2k+1)^3$$ and gets $$8k^3 + 12k^2 + 6k + 1$$. To prove the cube of an odd number is odd, they now need to show this equals $$2m + 1$$. What is $$m$$, and why must $$m$$ be an integer? (2 steps)", "answer": "- Step 1: Factor out 2: $$8k^3 + 12k^2 + 6k + 1 = 2(4k^3 + 6k^2 + 3k) + 1$$. So $$m = 4k^3 + 6k^2 + 3k$$.\n- Step 2: Since $$k$$ is an integer (this must be stated!), each term $$4k^3$$, $$6k^2$$, and $$3k$$ is an integer (integers are closed under addition and multiplication). Therefore their sum $$m = 4k^3 + 6k^2 + 3k$$ is an integer. This is why the proof works: the expression has the form $$2 \\times (\\text{integer}) + 1$$, which is the definition of an odd integer.\n\nTakeaway: $$m = 4k^3 + 6k^2 + 3k$$. It's an integer because integers are closed under $$+$$ and $$\\times$$. State $$k \\in \\mathbb{Z}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_89"}, {"question": "When Harry said \"I treat the remainder theorem and the factor theorem as the same thing really,\" what did he mean, and why is this a useful perspective? (2 steps)", "answer": "- Step 1: Both theorems come from the same principle: when you divide $$f(x)$$ by $$(x - k)$$, the remainder is $$f(k)$$. The factor theorem is just the special case where $$f(k) = 0$$ (remainder is zero, so it's a factor). The remainder theorem is the general case (remainder is whatever $$f(k)$$ equals, possibly nonzero).\n- Step 2: This unified perspective is useful because you don't need to remember two separate procedures. The algorithm is always the same: substitute the value, see what you get. If it's zero → factor. If it's nonzero → remainder. Treating them as one concept reduces cognitive load and prevents the confusion of \"which theorem do I use here?\"\n\nTakeaway: One principle, two names. Substitute → if zero, factor; if nonzero, remainder. No need for two separate mental procedures.", "source": "GLM 5.1 ②", "_id": "glm_2_115"}, {"question": "Apply the difference of two cubes to factorise $$1 - r^3$$. What does this let you do to $$\\dfrac{a(1-r^3)}{1-r}$$?", "answer": "- Step 1: With $$a = 1$$, $$b = r$$: $$1 - r^3 = (1-r)(1 + r + r^2)$$.\n- Step 2: Substitute into $$\\dfrac{a(1-r^3)}{1-r} = \\dfrac{a(1-r)(1+r+r^2)}{1-r} = a(1+r+r^2)$$.\n\nThis is the key simplification: the geometric series sum formula's denominator cancels cleanly when $$n = 3$$.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "A cubic $$f(x) = 3x^3 + ax^2 - 10x + b$$ has $$(3x - 4)$$ as a factor, and when divided by $$(x - 2)$$ leaves remainder $$B$$. What two equations does this give you in $$a$$ and $$b$$? (3 steps)", "answer": "- Step 1: From the Factor Theorem applied to $$(3x-4)$$: substitute $$x = 4/3$$ into $$f$$ and set the result equal to 0. This gives one equation linking $$a$$ and $$b$$.\n- Step 2: From the Remainder Theorem applied to $$(x-2)$$: $$f(2) = B$$. So $$3(8) + a(4) - 10(2) + b = B$$, i.e. $$24 + 4a - 20 + b = B$$, giving $$4a + b + 4 = B$$.\n- Step 3: You now have two linear equations in $$a$$ and $$b$$ (treating $$B$$ as given), which you solve simultaneously.\n\nKey insight: each theorem reduces a polynomial condition to a single number-equation. Stack them, solve.", "source": "Opus 4.7 ①", "_id": "opus_1_12"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "For any probability distribution over all possible outcomes of an experiment, what must the total sum of all probabilities equal, and why does this make sense conceptually?", "answer": "The sum of all probabilities across every possible outcome must equal exactly 1. This is because something must happen — when you run the experiment, one of the outcomes will definitely occur. If the probabilities summed to less than 1, there would be a \"gap\" where nothing happens, which is impossible. If they summed to more than 1, outcomes would be \"overcounted,\" violating the definition of probability as a proportion between 0 and 1. This constraint is your most powerful tool for finding unknown probabilities: once you know all but one, the last one is forced by $$\\sum P_i = 1$$.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A six-sided die is unfair. Five of its faces (1 through 5) each have equal probability, but face 6 has a different probability. If you call the probability of each of faces 1–5 by the variable $$P$$, what is the probability of rolling a 6, and why can't you write it as $$1 - P$$? (2 steps)", "answer": "- Step 1: Since faces 1 through 5 each have probability $$P$$, their total contribution to the probability distribution is $$5P$$ (five faces, each with probability $$P$$). The remaining probability for face 6 must be $$1 - 5P$$, because all probabilities must sum to 1.\n- Step 2: You cannot write the probability of face 6 as $$1 - P$$ because that would only account for removing one face's probability, not all five. The expression $$1 - P$$ would leave the other four faces' probabilities unaccounted for, and the total would exceed 1. The correct check: $$P + P + P + P + P + (1 - 5P) = 5P + 1 - 5P = 1$$ ✓.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "When two independent events occur — say, rolling a 6 on a fair die AND rolling a 6 on a separate unfair die — why do we multiply their individual probabilities to find the probability of both happening, rather than adding them? (2 steps)", "answer": "- Step 1: Independence means the outcome of one event has no effect on the other. The probability of both happening is the fraction of all possible outcome-pairs where both occur simultaneously. If event A has probability $$p_A$$ and event B has probability $$p_B$$, then out of all trials, a proportion $$p_A$$ have A happening, and among those, a proportion $$p_B$$ also have B happening (because B doesn't care about A). So the combined proportion is $$p_A \\times p_B$$.\n- Step 2: Adding would give $$p_A + p_B$$, which counts the probability of \"at least one happening\" (and overcounts cases where both happen). For small probabilities, adding can even exceed 1, which is impossible. Multiplication correctly captures the intersection (both must happen); addition captures the union (at least one happens). The keyword \"and\" with independent events → multiply; \"or\" → add (with care about overlap).", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "In an unfair dice problem where five faces have equal probability, a student writes each face's probability as $$P/5$$ instead of $$P$$. Why does this choice make the subsequent algebra harder, even though it's not technically wrong? (2 steps)", "answer": "- Step 1: Writing each probability as $$P/5$$ is not incorrect — if you define $$P$$ as the total probability of all five equal-faces combined, then each individual face gets $$P/5$$, and the special face's probability would be $$1 - P$$, which looks simpler at first glance.\n- Step 2: However, when you need to use these individual probabilities in further calculations (like computing \"AND\" probabilities with another die), you end up working with fractions like $$P/5$$ everywhere, introducing more denominators and more fraction arithmetic. Calling each individual probability simply $$P$$ keeps the working cleaner — the special face becomes $$1 - 5P$$, a single expression without nested fractions. The lesson: choose variable definitions that minimize algebraic complexity for the calculations you'll actually perform.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "How is a bearing defined in terms of direction and angle measurement, and why can a bearing of 000° only occur in one very specific situation? (2 steps)", "answer": "- Step 1: A bearing is an angle measured clockwise from the north direction (the upward vertical line on a diagram). Bearings are always given as three-digit numbers from 000° to 360°. North itself is 000°, East is 090°, South is 180°, and West is 270°.\n- Step 2: A bearing of 000° means the direction of travel is exactly along the north line with zero clockwise rotation — the destination is due north of the starting point. In most geometry problems involving polygons or angled paths, the clockwise angle from north will be some positive value, not zero, unless the two points are aligned vertically with the destination directly above. The key trap: students sometimes confuse bearings with angles measured from other reference lines (like the y-axis or a side of a polygon).", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "Why does the sum of all exterior angles of any polygon (regular or irregular) always equal 360°, regardless of the number of sides? Explain using the \"ant walking\" intuition. (2 steps)", "answer": "- Step 1: Imagine you are an ant standing at one vertex of a polygon, facing along one side. You walk to the next vertex. To continue along the next side, you must turn through the exterior angle at that vertex. You keep walking and turning at each vertex until you return to your starting point, facing the same direction you started.\n- Step 2: By the time you've completed one full lap around the polygon, you have turned through every exterior angle once. Since you end up facing the same direction you started, you have made exactly one full rotation — 360°. Therefore, the sum of all exterior angles must be 360°, no matter how many sides the polygon has or whether it's regular. For a regular polygon with $$n$$ sides, each exterior angle is simply $$360°/n$$ because they're all equal.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "At each vertex of a convex polygon, the interior angle and the exterior angle always sum to a specific value. What is that value, and why must this relationship hold? (2 steps)", "answer": "- Step 1: At each vertex, interior angle + exterior angle = 180°. They are supplementary angles.\n- Step 2: This holds because the interior angle and the exterior angle sit on a straight line together. When you extend one side of the polygon beyond the vertex, the exterior angle is formed between this extension and the next side. The interior angle fills the rest of that 180° straight line on the other side. For a regular pentagon: exterior angle = 72°, so interior angle = 180° - 72° = 108°. This relationship is universal for convex polygons — it's a straight-line angle fact, not a polygon-specific property.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "The formula for the sum of the first $$n$$ terms of a geometric series is $$S_n = \\frac{a(1-r^n)}{1-r}$$. What does each symbol represent, and why is the denominator $$1-r$$ rather than just $$r$$? (2 steps)", "answer": "- Step 1: Here, $$a$$ is the first term of the series, $$r$$ is the common ratio (each term is the previous term multiplied by $$r$$), and $$n$$ is the number of terms being summed. The formula adds up $$a + ar + ar^2 + \\cdots + ar^{n-1}$$.\n- Step 2: The denominator $$1-r$$ comes from the derivation. Write $$S_n = a + ar + ar^2 + \\cdots + ar^{n-1}$$, then multiply both sides by $$r$$ to get $$rS_n = ar + ar^2 + \\cdots + ar^n$$. Subtracting the second equation from the first cancels all overlapping middle terms (telescoping), leaving $$S_n - rS_n = a - ar^n$$, which factors to $$S_n(1-r) = a(1-r^n)$$, giving the formula. The $$1-r$$ denominator is the algebraic consequence of this shift-and-subtract trick — it's not arbitrary.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "The sum to infinity of a geometric series is $$S_\\infty = \\frac{a}{1-r}$$, but this formula only works under a specific condition on $$r$$. What is that condition, and what happens to the series if the condition is violated? (2 steps)", "answer": "- Step 1: The condition is $$|r| < 1$$, meaning the common ratio must be strictly between -1 and 1. When $$|r| < 1$$, the terms $$ar^{n-1}$$ shrink toward zero as $$n$$ increases, so the \"tail\" of the series contributes negligibly and the total converges to a finite value.\n- Step 2: If $$|r| \\geq 1$$, the terms either stay constant ($$r = 1$$) or grow in magnitude ($$|r| > 1$$). In these cases, $$r^n$$ does not approach zero, so $$S_n$$ grows without bound and no finite sum to infinity exists. The formula $$\\frac{a}{1-r}$$ would give a meaningless or nonsensical result — it simply doesn't apply. Always check $$|r| < 1$$ before using $$S_\\infty$$.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "How do you derive the factorization $$a^3 - b^3 = (a-b)(a^2 + ab + b^2)$$, starting from the observation that $$a - b$$ must be one of the factors? (3 steps)", "answer": "- Step 1: Set $$a^3 - b^3 = 0$$ to find roots. This gives $$a^3 = b^3$$, so $$a = b$$, meaning $$a - b = 0$$ is a root. Therefore $$(a - b)$$ must be a factor, so write $$a^3 - b^3 = (a - b)(\\text{quadratic})$$.\n- Step 2: Build the quadratic term-by-term. To get $$a^3$$ as the leading term, the quadratic must start with $$a^2$$ (since $$a \\times a^2 = a^3$$). So far: $$(a-b)(a^2 + \\cdots)$$.\n+ Multiplying out: $$a \\cdot a^2 = a^3$$ ✓, but $$-b \\cdot a^2 = -a^2b$$ appears, which isn't in $$a^3 - b^3$$. Cancel it by adding $$+ab$$ to the quadratic (since $$a \\times ab = a^2b$$).\n+ Now: $$(a-b)(a^2 + ab + \\cdots)$$ produces an unwanted $$-ab^2$$ (from $$-b \\times ab$$). Cancel it by adding $$+b^2$$ (since $$a \\times b^2 = ab^2$$).\n- Step 3: The complete factorization: $$(a-b)(a^2 + ab + b^2) = a^3 + a^2b + ab^2 - a^2b - ab^2 - b^3 = a^3 - b^3$$ ✓. All intermediate terms cancel perfectly through this \"fill-in-and-cancel\" method.\n\nThis technique — find a known factor from a root, then build the remaining factor term-by-term — generalizes to difference of two squares and higher-order differences.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "Using the difference of two cubes formula, how do you factorize $$1 - r^3$$, and why does this factorization create a cancellation opportunity when $$1 - r^3$$ appears over a denominator of $$1 - r$$? (2 steps)", "answer": "- Step 1: In the formula $$a^3 - b^3 = (a - b)(a^2 + ab + b^2)$$, identify $$a = 1$$ and $$b = r$$ (since $$1 - r^3 = 1^3 - r^3$$). This gives: $$1 - r^3 = (1 - r)(1 + r + r^2)$$.\n- Step 2: When this appears as $$\\frac{1 - r^3}{1 - r}$$ (as in the geometric series formula $$S_n = \\frac{a(1-r^n)}{1-r}$$ with $$n = 3$$), the factor $$(1 - r)$$ in the numerator cancels with the denominator, leaving simply $$1 + r + r^2$$. This is why $$S_3 = a(1 + r + r^2)$$ — a much cleaner expression. The cancellation is the algebraic reason why the sum of three geometric terms can be written so neatly without fractions.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "When solving a geometric series problem where you know both $$S_3$$ (sum of first 3 terms) and $$S_\\infty$$ (sum to infinity), why is it often smarter to substitute $$\\frac{a}{1-r}$$ directly into the $$S_n$$ formula rather than factorizing $$1 - r^3$$? (2 steps)", "answer": "- Step 1: You have two equations: $$S_3 = \\frac{a(1-r^3)}{1-r}$$ and $$S_\\infty = \\frac{a}{1-r}$$. The key insight is that $$\\frac{a}{1-r}$$ already appears inside the $$S_3$$ formula — it's literally the known $$S_\\infty$$ value. So you can replace $$\\frac{a}{1-r}$$ with the numerical value of $$S_\\infty$$.\n- Step 2: This transforms $$S_3 = \\frac{a(1-r^3)}{1-r}$$ into $$S_3 = S_\\infty \\cdot (1 - r^3)$$, a single equation in one unknown ($$r$$). You avoid factorizing $$1 - r^3$$, dealing with two simultaneous equations in $$a$$ and $$r$$, or extra algebra. Once you solve for $$r$$, finding $$a$$ is straightforward from $$a = S_\\infty(1 - r)$$.\n\nGeneral principle: always look for shared sub-expressions between equations — substitution beats elimination when it reduces unknowns directly.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": true}, {"question": "Given that the sum of the first 3 terms of a geometric series is 70.2 and the sum to infinity is 75, outline the conceptual steps to find both the first term $$a$$ and common ratio $$r$$ without doing the full calculation. (3 steps)", "answer": "- Step 1: Write the two equations: $$S_3 = \\frac{a(1-r^3)}{1-r} = 70.2$$ and $$S_\\infty = \\frac{a}{1-r} = 75$$. Recognize that $$\\frac{a}{1-r}$$ in the first equation equals 75, so substitute to get $$70.2 = 75(1 - r^3)$$.\n- Step 2: Solve for $$r^3$$: divide both sides by 75 to get $$\\frac{70.2}{75} = 1 - r^3$$, then rearrange to $$r^3 = 1 - \\frac{70.2}{75} = \\frac{4.8}{75} = \\frac{8}{125}$$ (simplifying the fraction). Taking the cube root gives $$r = \\frac{2}{5}$$ (since $$2^3 = 8$$ and $$5^3 = 125$$).\n- Step 3: Find $$a$$ using the simpler equation: $$a = S_\\infty(1 - r) = 75 \\times (1 - \\frac{2}{5}) = 75 \\times \\frac{3}{5} = 45$$.\n\nStrategy pattern: (1) identify shared sub-expressions, (2) substitute to eliminate one variable, (3) solve, then back-substitute for the other.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "The factor theorem states that if $$(bx - c)$$ is a factor of a polynomial $$f(x)$$, then $$f\\left(\\frac{c}{b}\\right) = 0$$. Why does setting the factor equal to zero and solving for $$x$$ give you the value to substitute into $$f$$? (2 steps)", "answer": "- Step 1: If $$(bx - c)$$ is a factor of $$f(x)$$, then we can write $$f(x) = (bx - c) \\cdot g(x)$$ for some other polynomial $$g(x)$$. This means whenever $$(bx - c) = 0$$, the entire product $$f(x) = 0 \\cdot g(x) = 0$$.\n- Step 2: Setting the factor equal to zero: $$bx - c = 0$$ gives $$bx = c$$, so $$x = \\frac{c}{b}$$. This is the value of $$x$$ that makes the factor vanish, and therefore makes $$f(x)$$ vanish. So $$f\\left(\\frac{c}{b}\\right) = 0$$ is guaranteed. The factor theorem is simply the logical consequence of \"if something is a multiplicative factor, zeroing it out zeros the whole product.\"", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "When a polynomial $$f(x)$$ is divided by $$(x - c)$$, the remainder theorem says the remainder equals $$f(c)$. How is this conceptually the same as the factor theorem, and what's the key difference? (2 steps)", "answer": "- Step 1: Both theorems come from the same algebraic fact: when you divide $$f(x)$$ by $$(x - c)$$, you get $$f(x) = (x - c) \\cdot g(x) + R$$, where $$R$$ is a constant remainder. Substituting $$x = c$$: $$f(c) = (c - c) \\cdot g(c) + R = 0 + R = R$$.\n- Step 2: The factor theorem is the special case where the remainder is zero: if $$f(c) = 0$$, then $$R = 0$$, meaning $$(x - c)$$ divides perfectly (it's a factor). The remainder theorem handles the general case where $$R$$ might be nonzero. So the factor theorem = remainder theorem + the condition $$R = 0$$. They are not two separate ideas — one is a subset of the other. Treat them as the same concept: evaluate $$f$$ at the root of the divisor; if you get zero it's a factor, if you get something else that's the remainder.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "If a question tells you that $$(3x - 4)$$ is a factor of $$f(x)$$, what exact value of $$x$$ do you substitute into $$f$$ to apply the factor theorem, and why is it not $$x = 4$$? (2 steps)", "answer": "- Step 1: Set the factor equal to zero: $$3x - 4 = 0$$, giving $$3x = 4$$, so $$x = \\frac{4}{3}$$. This is the value that makes the factor vanish, and therefore makes $$f(x) = 0$$.\n- Step 2: Substituting $$x = 4$$ would be wrong — it makes $$3(4) - 4 = 8$$, not zero, so the factor isn't zeroed out. The factor theorem requires you to find the root of the factor (the $$x$$-value that makes it zero), not just grab the constant term. For a factor $$(bx - c)$$, the root is always $$x = \\frac{c}{b}$$, not $$x = c$$. This is one of the most common errors: confusing the constant in the factor with the value to substitute.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": true}, {"question": "You know that $$(3x - 4)$$ is a factor of the cubic $$f(x) = 3x^3 - x^2 - 10x + 8$$. When performing polynomial long division by $$(3x - 4)$$, why must the first term of the quotient be $$x^2$$ and not $$3x^2$$? (2 steps)", "answer": "- Step 1: In polynomial long division, you ask: \"what do I multiply the divisor's leading term by to get the dividend's leading term?\" The divisor's leading term is $$3x$$, and the dividend's leading term is $$3x^3$$. So you need $$3x \\times x^2 = 3x^3$$ — the multiplier is $$x^2$$.\n- Step 2: If you tried $$3x^2$$, you'd get $$3x \\times 3x^2 = 9x^3$$, which overshoots the $$3x^3$$ we need. The quotient's leading term is determined by dividing the leading coefficient of the dividend by the leading coefficient of the divisor and reducing the power by 1 (since we're dividing by a linear term): $$\\frac{3x^3}{3x} = x^2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": true}, {"question": "After dividing the cubic $$3x^3 - x^2 - 10x + 8$$ by $$(3x - 4)$$, you get the quotient $$x^2 + x - 2$$. What final step completes the \"fully factorize\" instruction, and why is leaving it as $$(3x-4)(x^2+x-2)$$ not sufficient? (2 steps)", "answer": "- Step 1: The quadratic $$x^2 + x - 2$$ can be further factorized. Find two numbers that multiply to -2 and add to +1: those numbers are +2 and -1. So $$x^2 + x - 2 = (x + 2)(x - 1)$$.\n- Step 2: \"Fully factorize\" means breaking down into irreducible factors over the integers — no further factorization possible. Leaving a quadratic that can be split into linear factors is incomplete. The full factorization is $$f(x) = (3x - 4)(x + 2)(x - 1)$$, three linear factors. Exam marks specifically require this complete form; stopping at a quadratic factor loses the final accuracy mark.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "What is the standard form of the equation of a circle with center $$(a, b)$$ and radius $$r$$, and why does this form naturally arise from the geometric definition of a circle? (2 steps)", "answer": "- Step 1: The standard form is $$(x - a)^2 + (y - b)^2 = r^2$$, where $$(a, b)$$ is the center and $$r$$ is the radius.\n- Step 2: This comes directly from the definition: a circle is the set of all points $$(x, y)$$ at distance $$r$$ from the center $$(a, b)$$. By the Pythagorean distance formula, the distance from $$(x, y)$$ to $$(a, b)$$ is $$\\sqrt{(x-a)^2 + (y-b)^2}$$. Setting this equal to $$r$$ and squaring both sides gives exactly $$(x-a)^2 + (y-b)^2 = r^2$$. The equation is just \"distance = radius\" written algebraically.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "If you know the center of a circle is at $$(7, -2)$$ and a point $$(11, 6)$$ lies on the circle, how do you find the radius conceptually, and why do you often only need $$r^2$$ rather than $$r$$ itself? (2 steps)", "answer": "- Step 1: The radius is the distance from the center to any point on the circle. Use the distance formula: $$r = \\sqrt{(11-7)^2 + (6-(-2))^2} = \\sqrt{4^2 + 8^2} = \\sqrt{16 + 64} = \\sqrt{80}$$.\n- Step 2: In the circle equation $$(x-a)^2 + (y-b)^2 = r^2$$, you need $$r^2$$, not $$r$$. Since $$r = \\sqrt{80}$$, we have $$r^2 = 80$$ directly — no need to simplify $$\\sqrt{80}$$ further or compute a decimal. The circle equation becomes $$(x-7)^2 + (y+2)^2 = 80$$. Squaring the distance formula eliminates the square root, making the algebra cleaner. Always compute $$r^2$$ first and check if it's a nice number before bothering with $$r$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "If a line has slope $$m$$, what is the slope of a line perpendicular to it, and why is this the rule rather than simply $$-m$$? (2 steps)", "answer": "- Step 1: The slope of a perpendicular line is $$-\\frac{1}{m}$$ (the negative reciprocal). This is not simply $$-m$$ — that would give a line reflected across the horizontal axis, not one at 90°.\n- Step 2: Two lines are perpendicular when the product of their slopes equals $$-1$$: $$m_1 \\times m_2 = -1$$, so $$m_2 = -\\frac{1}{m_1}$$. This condition ensures the angle between the lines is 90°. For example, slope 3 and slope $$-\\frac{1}{3}$$ are perpendicular ($$3 \\times -\\frac{1}{3} = -1$$ ✓), while slope 3 and slope -3 are not ($$3 \\times -3 = -9$$ ✗). The negative reciprocal flips the ratio and reverses the direction — that's what 90° rotation demands.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "If you have an expression like $$\\frac{1}{2}\\log_{10}(x)$$ and need to rewrite it as a single logarithm $$\\log_{10}(K)$$, what rule allows you to move the $$\\frac{1}{2}$$ inside the log, and what does $$K$$ become? (2 steps)", "answer": "- Step 1: The power rule of logarithms states that $$n \\cdot \\log_b(x) = \\log_b(x^n)$$. A coefficient multiplying the outside of a logarithm can be brought inside as an exponent on the argument.\n- Step 2: Applying this: $$\\frac{1}{2}\\log_{10}(x) = \\log_{10}(x^{1/2}) = \\log_{10}(\\sqrt{x})$$. So $$K = \\sqrt{x}$$ (or equivalently $$K = x^{1/2}$$). The half outside becomes a square root inside — raising to the power $$\\frac{1}{2}$$ is the same as taking the square root. This rule is essential for simplifying log expressions into the single-log form that exam questions often request.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "For a logarithmic expression like $$\\log_{10}(5 - a) + \\log_{10}(a + 25)$$, what condition must the arguments satisfy for the expression to be defined, and why can't you take the log of zero? (2 steps)", "answer": "- Step 1: The logarithm $$\\log_b(x)$$ is only defined when $$x > 0$$ (strictly positive). You cannot take the log of zero or a negative number. This is because the equation $$b^y = x$$ has no real solution when $$x \\leq 0$$ and $$b > 0$$ — no power of a positive base can produce zero or a negative result.\n- Step 2: For the expression to be valid, both arguments must be positive simultaneously: $$5 - a > 0$$ (so $$a < 5$$) AND $$a + 25 > 0$$ (so $$a > -25$$). The natural domain is the intersection of these constraints: $$-25 < a < 5$$. Any value of $$a$$ outside this range makes at least one log undefined, so the entire expression fails.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "When solving a logarithmic equation, you find two algebraic solutions: $$a = 20$$ and $$a = -25$$. Your domain analysis shows that $$a$$ must satisfy $$-25 < a < 5$$. Why must you reject $$a = 20$$, and what specific written reason should you give in an exam? (2 steps)", "answer": "- Step 1: $$a = 20$$ falls outside the natural domain because $$5 - 20 = -15 < 0$$, meaning $$\\log_{10}(-15)$$ is undefined. Even though $$a = 20$$ satisfies the algebraic equation after log manipulation, the original equation didn't exist for this value. You must reject it.\n- Step 2: In an exam, don't just cross out the answer — write \"Reject\" with a clear reason, such as \"Reject: requires $$a < 5$$\" or \"Reject: $$\\log_{10}(5 - 20)$$ is undefined since argument is negative.\" This makes it unambiguous to the marker that you understand why the solution fails. The common mistake: treating log equations like polynomial equations and accepting all algebraic solutions without checking the domain.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}, {"question": "For the expression $$\\log_{10}(5 - a) + \\log_{10}(a + 25)$$, the first log requires $$a < 5$$ and the second requires $$a > -25$$. Why is the natural domain the intersection (overlap) of these ranges rather than their union? (2 steps)", "answer": "- Step 1: The expression contains", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}], "count": 25}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "You have a six-sided die where faces 1–5 each have the same probability, but face 6 has a different probability. If you call the probability of each of faces 1–5 equal to $$p$$, what is the probability of rolling a 6, and why must it be written as $$1 - 5p$$ rather than $$1 - p$$? (2 steps)", "answer": "- Step 1: The total probability across all six faces must sum to 1 (certainty — something must happen). Faces 1 through 5 each have probability $$p$$, so together they contribute $$5p$$. The remaining probability for face 6 is whatever is left: $$1 - 5p$$.\n- Step 2: A common mistake is to write the probability of face 6 as $$1 - p$$, confusing \"subtract one lot of $$p$$\" with \"subtract all five lots of $$p$$.\" Writing $$\\frac{p}{5}$$ for each face and then $$1 - p$$ for face 6 is also wrong — it incorrectly assumes the five equal probabilities add to just $$p$$, when they actually add to $$5p$$. The key insight: you must subtract the *sum* of the known probabilities, not just one of them.\n\nTakeaway: When modelling an unfair die, always subtract the *total* probability accounted for, not a single share.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": true}, {"question": "Two independent events A and B occur. A student writes $$P(A \\text{ and } B) = P(A) + P(B)$$. What is wrong with this, and what should the correct operation be? (2 steps)", "answer": "- Step 1: Addition is for *mutually exclusive* events (events that cannot happen at the same time). If A and B are independent, they *can* both happen simultaneously, so adding their probabilities double-counts the overlap and overestimates the joint probability.\n- Step 2: For *independent* events, the correct rule is multiplication: $$P(A \\text{ and } B) = P(A) \\times P(B)$$. Intuitively, independence means the occurrence of A has no effect on the likelihood of B, so you simply multiply the two chances together — like flipping a coin and rolling a die: the coin doesn't affect the die.\n\nTakeaway: \"And\" for independent events → multiply. \"Or\" for mutually exclusive events → add.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": true}, {"question": "One fair die (probability of six = $$\\frac{1}{6}$$) and one unfair die (probability of six = $$1 - 5p$$) are both rolled. Write an expression for the probability that *both* dice show a six. (1 step)", "answer": "Since the two dice are independent (rolling one doesn't affect the other), we multiply: $$P(\\text{both six}) = \\frac{1}{6} \\times (1 - 5p)$$. The fair die contributes the fixed factor $$\\frac{1}{6}$$, and the unfair die contributes the variable factor $$1 - 5p$$. No addition is involved — \"both\" signals independence and multiplication.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "A bearing is always measured in a specific direction from a specific reference line. What are the direction and reference, and why can a bearing never be negative? (2 steps)", "answer": "- Step 1: A bearing is always measured **clockwise from north**. You first draw a north line (pointing straight up), then measure the angle going clockwise from that north line to the direction of interest.\n- Step 2: Because you always measure clockwise from north, the angle is always between $$0°$$ and $$360°$$. A bearing of $$0°$$ means \"due north,\" $$90°$$ means \"due east,\" $$180°$$ means \"due south,\" and $$270°$$ means \"due west.\" There is never a need for a negative bearing — the convention ensures every direction has a unique, positive three-digit representation.\n\nTakeaway: Bearing = clockwise angle from north, always $$000°$$ to $$360°$$, always three digits.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "In a regular pentagon, explain why the sum of the exterior angles is $$360°$$, and use this to find the size of one exterior angle. Why is it *wrong* to say the sum of the interior angles is $$360°$$? (3 steps)", "answer": "- Step 1: Imagine you are an ant walking around the perimeter of the pentagon. At each vertex, you turn through the exterior angle. After completing one full circuit, you have turned a total of $$360°$$ — one full revolution. This is true for *any* polygon, regular or not. Therefore the sum of all exterior angles = $$360°$$.\n- Step 2: For a regular pentagon (5 equal sides, 5 equal angles), each exterior angle = $$\\frac{360°}{5} = 72°$$. A quick mental-math trick: divide by 10 first to get 36, then multiply by 2 to get 72.\n- Step 3: The interior angle sum is *not* $$360°$$ — that's the *exterior* angle sum. The interior angle at each vertex is the supplement: $$180° - 72° = 108°$$, and the total interior sum is $$5 \\times 108° = 540°$$. Confusing interior and exterior sums is a common error.\n\nTakeaway: Exterior angles always sum to $$360°$$ (any polygon). Interior angles sum to $$(n-2) \\times 180°$$.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": true}, {"question": "Given a regular pentagon with exterior angle $$72°$$ and interior angle $$108°$$, if you stand at one vertex and look along a side toward the next vertex, the bearing to that next vertex is measured clockwise from north. Explain conceptually how the interior/exterior angle of the pentagon relates to finding that bearing. (2 steps)", "answer": "- Step 1: At any vertex, the direction you arrived from and the direction you leave toward the next vertex differ by the exterior angle ($$72°$$). If you know the bearing of the incoming direction, you add (or subtract) the exterior angle to get the bearing of the outgoing direction, depending on whether the polygon turns clockwise or anticlockwise.\n- Step 2: The interior angle ($$108°$$) tells you the angle *inside* the shape between two adjacent sides. The bearing, however, is measured outside the shape relative to north. So you use the geometry of the polygon (exterior angle = turn angle) to relate successive bearings, not the interior angle directly. Drawing the north line at each vertex and marking the clockwise angle to the next side is the essential visual step.\n\nTakeaway: The exterior angle is the \"turn angle\" between successive sides — that's what connects polygon geometry to bearings.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": true}, {"question": "A geometric series has first term $$a$$, common ratio $$r$$, and sum of the first 3 terms equal to 70.2. A student sets up $$a_3 = 70.2$$ (the third term). What is the conceptual error, and what should they have written instead? (2 steps)", "answer": "- Step 1: The student confused the **$$n$$th term** ($$a_n = ar^{n-1}$$) with the **sum of the first $$n$$ terms** ($$S_n = \\frac{a(1-r^n)}{1-r}$$). The problem says \"the sum of the first three terms is 70.2,\" meaning $$S_3 = 70.2$$, not $$a_3 = 70.2$$.\n- Step 2: The correct equation is $$S_3 = \\frac{a(1 - r^3)}{1 - r} = 70.2$$. The sum includes all three terms: $$a + ar + ar^2$$, whereas the third term alone is just $$ar^2$$. These are very different quantities — the sum will always be larger than (or equal to) any single term in a positive series.\n\nTakeaway: \"Sum of the first $$n$$ terms\" → use the $$S_n$$ formula. \"The $$n$$th term\" → use $$ar^{n-1}$$. Read the question carefully.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "You have two equations from a geometric series problem: $$S_3 = \\frac{a(1 - r^3)}{1 - r} = 70.2$$ and $$S_\\infty = \\frac{a}{1-r} = 75$$. Without expanding the cubic, explain the clever substitution that makes solving for $$r$$ much easier. (3 steps)", "answer": "- Step 1: Look at the structure of the sum formula: $$S_3 = \\frac{a(1 - r^3)}{1 - r}$$. Notice that the factor $$\\frac{a}{1-r}$$ appears explicitly in this expression — it sits right there in the numerator over the denominator.\n- Step 2: But $$\\frac{a}{1-r}$$ is exactly $$S_\\infty = 75$$! So we can replace the entire block $$\\frac{a}{1-r}$$ with 75, giving: $$75(1 - r^3) = 70.2$$.\n- Step 3: Now solve: $$1 - r^3 = \\frac{70.2}{75} = \\frac{117}{125}$$, so $$r^3 = 1 - \\frac{117}{125} = \\frac{8}{125}$$, giving $$r = \\frac{2}{5}$$. This avoids expanding the cubic entirely — the substitution collapses the two-variable problem into a single-variable one.\n\nTakeaway: When you have both $$S_n$$ and $$S_\\infty$$, look for $$\\frac{a}{1-r}$$ hiding inside $$S_n$$ and substitute directly.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "Derive the difference-of-two-cubes identity $$a^3 - b^3 = (a-b)(a^2 + ab + b^2)$$ by reasoning about the factor $$(a-b)$$ and building up the second bracket. (4 steps)", "answer": "- Step 1: Set $$a^3 - b^3 = 0$$. Then $$a^3 = b^3$$, so $$a = b$$, meaning $$(a - b) = 0$$. This tells us $$(a - b)$$ must be one of the factors of $$a^3 - b^3$$.\n- Step 2: Now determine the second bracket. To get the leading term $$a^3$$, we multiply $$a$$ (from the first bracket) by $$a^2$$ (in the second bracket). So far: $$(a-b)(a^2 + \\ldots) = a^3 - a^2 b + \\ldots$$\n- Step 3: We got $$-a^2b$$ from the cross-term, but there's no $$-a^2b$$ in $$a^3 - b^3$$. We must cancel it by adding $$+a^2b$$, which means adding $$+ab$$ to the second bracket (since $$(-b)(-ab) = +a^2b$$). Now: $$(a-b)(a^2 + ab + \\ldots) = a^3 - a^2b + a^2b - ab^2 + \\ldots = a^3 - ab^2 + \\ldots$$\n- Step 4: We have $$-ab^2$$ which isn't in the target. Cancel by adding $$+ab^2$$, so add $$+b^2$$ to the second bracket (since $$(-b)(-b^2) = +b^2$$, and $$(a)(b^2) = ab^2$$). Final: $$(a-b)(a^2 + ab + b^2) = a^3 - b^3$$. ✓\n\nTakeaway: The second bracket in the difference of cubes always follows the pattern: square, product, square — $$a^2 + ab + b^2$$.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "Apply the difference-of-two-cubes identity to factorise $$1 - r^3$$. What are the two factors? (2 steps)", "answer": "- Step 1: Match to the identity $$a^3 - b^3 = (a-b)(a^2 + ab + b^2)$$. Here $$a = 1$$ and $$b = r$$, so: $$1^3 - r^3 = (1 - r)(1^2 + 1 \\cdot r + r^2)$$.\n- Step 2: Simplify: $$1 - r^3 = (1 - r)(1 + r + r^2)$$. Notice that the $$(1-r)$$ factor in the denominator of $$S_n = \\frac{a(1-r^3)}{1-r}$$ will cancel with this factor in the numerator — that's why this factorisation is useful in geometric series problems.\n\nTakeaway: $$1 - r^3 = (1 - r)(1 + r + r^2)$$. The $$(1-r)$$ cancellation is the key insight for simplifying sum-of-terms equations.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": true}, {"question": "After finding the common ratio $$r = \\frac{2}{5}$$ of a geometric series with $$S_\\infty = 75$$, how do you find the first term $$a$$, and which equation makes this easiest? (2 steps)", "answer": "- Step 1: Use the sum-to-infinity formula $$S_\\infty = \\frac{a}{1-r}$$, which rearranges to $$a = S_\\infty(1-r)$$. This is the simplest route because it involves only one substitution.\n- Step 2: Substitute: $$a = 75\\left(1 - \\frac{2}{5}\\right) = 75 \\times \\frac{3}{5} = 45$$. You *could* also substitute into the $$S_3$$ equation, but that requires more algebra. The $$S_\\infty$$ equation is the cleanest path.\n\nTakeaway: Once you have $$r$$, always go back to the simplest equation linking $$a$$ and $$r$$ to find $$a$$.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "The factor theorem says: if $$(x - k)$$ is a factor of $$f(x)$$, then $$f(k) =$$ what? And conversely, if $$f(k) = 0$$, what can you conclude? (2 steps)", "answer": "- Step 1: If $$(x - k)$$ is a factor of $$f(x)$$, then $$f(k) = 0$$. Intuitively, $$x = k$$ is a root of the polynomial — plugging it in makes the whole expression vanish because one of its multiplicative factors is zero.\n- Step 2: Conversely, if $$f(k) = 0$$, then $$(x - k)$$ is a factor of $$f(x)$$. This is the factor theorem in reverse — it lets you *discover* factors by testing values. The factor theorem and remainder theorem are really the same idea: the remainder when dividing by $$(x-k)$$ is $$f(k)$$. If that remainder is zero, you have a factor; if it's nonzero, you just have a remainder.\n\nTakeaway: Factor theorem = remainder theorem with remainder = 0. Both come from the same principle: the remainder on division by $$(x-k)$$ equals $$f(k)$$.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "A polynomial $$f(x)$$ has the factor $$(3x - 4)$$. What value do you substitute into $$f$$ to apply the factor theorem, and why? (2 steps)", "answer": "- Step 1: Set the factor equal to zero: $$3x - 4 = 0$$, giving $$x = \\frac{4}{3}$$. The factor theorem says: if $$(3x - 4)$$ is a factor, then $$f\\!\\left(\\frac{4}{3}\\right) = 0$$.\n- Step 2: A common mistake is to substitute $$x = 4$$ (ignoring the coefficient of 3). The factor is $$(3x - 4)$$, not $$(x - 4)$$. The root of the linear factor is always found by setting that entire factor to zero and solving, regardless of the leading coefficient.\n\nTakeaway: For a factor $$(mx - c)$$, substitute $$x = \\frac{c}{m}$$, not $$x = c$$.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "The remainder theorem: when $$f(x)$$ is divided by $$(x - k)$$, the remainder equals $$f(k)$$. If a question says \"when $$f(x)$$ is divided by $$(x - 2)$$, the remainder is $$b$$,\" what equation does this give you? (1 step)", "answer": "It gives $$f(2) = b$$. The remainder theorem directly translates the English statement into an equation: substitute $$x = 2$$ into the polynomial and set it equal to the given remainder $$b$$. This is the same principle as the factor theorem — the only difference is that the remainder is nonzero (so $$(x-2)$$ is *not* a factor).", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "You have a cubic $$f(x) = 3x^3 + ax^2 - 10x + b$$ and you know $$f\\!\\left(\\frac{4}{3}\\right) = 0$$ and $$f(2) = b$$. Conceptually, how does solving these two equations let you find both unknowns $$a$$ and $$b$$? (2 steps)", "answer": "- Step 1: Each substitution gives one equation in two unknowns ($$a$$ and $$b$$). From the factor theorem: $$f\\!\\left(\\frac{4}{3}\\right) = 0$$ gives one linear equation. From the remainder theorem: $$f(2) = b$$ gives another linear equation. Neither alone determines both unknowns.\n- Step 2: But together they form a *system* of two equations in two unknowns, which can be solved simultaneously. Solve one equation for one variable (say, solve the remainder theorem equation for $$b$$), then substitute into the other to find $$a$$, and back-substitute for $$b$$. The key insight: you need as many independent equations as unknowns.\n\nTakeaway: Two pieces of information (a factor + a remainder) → two equations → solve for
