terexample? (3 steps)", "answer": "- Step 1: To disprove a universal statement, you only need to find **one** counterexample — a single pair $$(x, y)$$ that satisfies all the hypotheses but breaks the conclusion.\n- Step 2: Try $$x = \\sqrt{2}$$ and $$y = 3\\sqrt{2}$$. Both are irrational. They are different (since one is 3 times the other). Hypotheses satisfied.\n- Step 3: Compute $$xy = \\sqrt{2} \\cdot 3\\sqrt{2} = 3 \\cdot 2 = 6$$, which is a rational integer. So the conclusion fails.\n\nWhy $$\\sqrt{2}$$ and $$\\sqrt{5}$$ wouldn't work: $$\\sqrt{2} \\cdot \\sqrt{5} = \\sqrt{10}$$, which is still irrational. The trick is to pick two irrationals whose product algebraically simplifies to a rational — typically by sharing a common surd that gets squared.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "When writing a proof about odd numbers, why is it problematic to write \"let $$n = 2n + 1$$\" to represent an arbitrary odd number? (2 steps)", "answer": "- Step 1: The letter $$n$$ appears on both sides of the equation, which makes the statement self-referential and effectively meaningless — solving gives $$n = -1$$ specifically, not \"any odd number.\"\n- Step 2: The fix is to use a **different letter** for the integer parameter: write \"let the odd number be $$2k + 1$$ where $$k$$ is an integer.\" Now $$k$$ ranges over all integers, and $$2k+1$$ ranges over all odd numbers.\n\nAlways introduce fresh variable names for new quantities, and explicitly state the domain (e.g. \"where $$k \\in \\mathbb{Z}$$\").", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "What is the **Factor Theorem**, and how do you use the linear factor $$(ax - b)$$ to set up the equation it gives you? (3 steps)", "answer": "- Step 1: The Factor Theorem states: $$(ax - b)$$ is a factor of polynomial $$f(x)$$ **if and only if** $$f(b/a) = 0$$.\n- Step 2: Why? Because the linear factor $$(ax - b)$$ equals zero precisely when $$x = b/a$$. If this is a factor, then plugging $$x = b/a$$ into $$f(x)$$ must make the whole product (and hence $$f$$) zero.\n- Step 3: Procedure: set $$ax - b = 0$$, solve to get $$x = b/a$$, then compute $$f(b/a)$$. If it equals zero, $$(ax-b)$$ is a factor; if not, it isn't.\n\nExample: if $$(3x - 4)$$ is claimed to be a factor of $$f(x)$$, you evaluate $$f(4/3) = 0$$ to confirm or to find an unknown coefficient.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "What is the **Remainder Theorem**, and why is it essentially the same idea as the Factor Theorem? (3 steps)", "answer": "- Step 1: The Remainder Theorem says: when $$f(x)$$ is divided by $$(x - c)$$, the remainder equals $$f(c)$$. More generally, dividing by $$(ax - b)$$ gives remainder $$f(b/a)$$.\n- Step 2: The Factor Theorem is just the special case where the remainder happens to be zero: $$f(c) = 0 \\iff (x-c)$$ divides $$f(x)$$ exactly.\n- Step 3: Intuition: writing $$f(x) = (x-c)Q(x) + R$$, plugging in $$x = c$$ kills the $$(x-c)Q(x)$$ term entirely, leaving $$f(c) = R$$.\n\nSo in practice: to find the remainder when dividing by $$(x-2)$$, just compute $$f(2)$$. No long division needed.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "A cubic $$f(x) = 3x^3 + ax^2 - 10x + b$$ has $$(3x - 4)$$ as a factor, and when divided by $$(x - 2)$$ leaves remainder $$B$$. What two equations does this give you in $$a$$ and $$b$$? (3 steps)", "answer": "- Step 1: From the Factor Theorem applied to $$(3x-4)$$: substitute $$x = 4/3$$ into $$f$$ and set the result equal to 0. This gives one equation linking $$a$$ and $$b$$.\n- Step 2: From the Remainder Theorem applied to $$(x-2)$$: $$f(2) = B$$. So $$3(8) + a(4) - 10(2) + b = B$$, i.e. $$24 + 4a - 20 + b = B$$, giving $$4a + b + 4 = B$$.\n- Step 3: You now have two linear equations in $$a$$ and $$b$$ (treating $$B$$ as given), which you solve simultaneously.\n\nKey insight: each theorem reduces a polynomial condition to a single number-equation. Stack them, solve.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": true}, {"question": "Once you've found a cubic $$f(x)$$ and know that $$(3x-4)$$ is a factor, how do you fully factorise $$f(x)$$? (3 steps)", "answer": "- Step 1: Divide $$f(x)$$ by $$(3x - 4)$$ using polynomial long division (or compare coefficients). The result is a quadratic factor.\n- Step 2: The leading coefficient of the quadratic equals (leading coeff of $$f$$) ÷ (leading coeff of $$3x - 4$$) = $$3/3 = 1$$. So the quadratic starts with $$x^2$$.\n- Step 3: Once you have the quadratic $$x^2 + px + q$$, try to factor it further by finding two numbers that multiply to $$q$$ and add to $$p$$. If successful, you get $$(3x - 4)(x - \\alpha)(x - \\beta)$$ — fully factorised.\n\n\"Fully factorised\" means: as many linear factors as the polynomial allows over the reals/integers.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Derive the factorisation of the difference of two cubes $$a^3 - b^3$$ by reasoning about its roots. (4 steps)", "answer": "- Step 1: Set $$a^3 - b^3 = 0$$, so $$a^3 = b^3$$, hence $$a = b$$ (over reals), i.e. $$a - b = 0$$. This tells us $$(a - b)$$ must be a factor.\n- Step 2: Write $$a^3 - b^3 = (a - b)(\\text{quadratic in } a, b)$$. To match the leading $$a^3$$, the quadratic must start with $$a^2$$, since $$a \\cdot a^2 = a^3$$.\n- Step 3: With $$a^2$$, expanding $$(a-b)(a^2 + \\ldots)$$ gives $$a^3 - a^2 b + \\ldots$$. We need to cancel the $$-a^2 b$$ since it's not in $$a^3 - b^3$$, so add $$+ab$$ to the second bracket: $$(a-b)(a^2 + ab + \\ldots)$$ now expands to $$a^3 - a^2 b + a^2 b - ab^2 + \\ldots = a^3 - ab^2 + \\ldots$$. We need to cancel the $$-ab^2$$ too.\n- Step 4: Add $$+b^2$$: $$(a-b)(a^2 + ab + b^2) = a^3 + a^2 b + ab^2 - a^2 b - ab^2 - b^3 = a^3 - b^3$$. ✓\n\nFinal formula: $$a^3 - b^3 = (a-b)(a^2 + ab + b^2)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "How does the difference-of-cubes factorisation simplify $$\\dfrac{1 - r^3}{1 - r}$$, and what is this quantity in the context of geometric series? (3 steps)", "answer": "- Step 1: Apply $$a^3 - b^3 = (a-b)(a^2 + ab + b^2)$$ with $$a = 1$$, $$b = r$$: $$1 - r^3 = (1 - r)(1 + r + r^2)$$.\n- Step 2: Therefore $$\\dfrac{1 - r^3}{1 - r} = 1 + r + r^2$$ (provided $$r \\neq 1$$).\n- Step 3: In context, this equals $$S_3 / a$$ for a geometric series, since $$S_n = a \\cdot \\dfrac{1 - r^n}{1 - r}$$. So $$S_3 = a(1 + r + r^2)$$, which is also just the explicit sum $$a + ar + ar^2$$ — confirming the formula.\n\nThe takeaway: $$\\dfrac{1 - r^n}{1-r}$$ is always $$1 + r + r^2 + \\cdots + r^{n-1}$$, a \"geometric finite sum identity.\"", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "State the formulas for the sum of the first $$n$$ terms and the sum to infinity of a geometric series, and explain when the infinite sum exists. (3 steps)", "answer": "- Step 1: Sum of first $$n$$ terms: $$S_n = \\dfrac{a(1 - r^n)}{1 - r}$$ where $$a$$ is the first term and $$r$$ is the common ratio.\n- Step 2: Sum to infinity: $$S_\\infty = \\dfrac{a}{1 - r}$$, but **only** when $$|r| < 1$$.\n- Step 3: Why the restriction? If $$|r| \\geq 1$$, the terms don't shrink to zero, so the partial sums grow without bound (or oscillate), and no finite limit exists. When $$|r| < 1$$, $$r^n \\to 0$$ as $$n \\to \\infty$$, making $$S_n \\to a/(1-r)$$.\n\nCommon confusion: $$S_3$$ is NOT the third term. $$S_3 = a + ar + ar^2$$, the sum of three terms.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "For a geometric series with $$S_3 = 70.2$$ and $$S_\\infty = 75$$, sketch the conceptual route to find $$r$$ without heavy algebra. (4 steps)", "answer": "- Step 1: $$S_3 = \\dfrac{a(1 - r^3)}{1 - r} = 70.2$$ and $$S_\\infty = \\dfrac{a}{1-r} = 75$$.\n- Step 2: Notice the first expression contains $$\\dfrac{a}{1-r}$$ as a hidden factor: $$\\dfrac{a(1-r^3)}{1-r} = \\dfrac{a}{1-r} \\cdot (1 - r^3) = 75(1 - r^3)$$.\n- Step 3: So $$75(1 - r^3) = 70.2$$, giving $$1 - r^3 = 70.2/75$$. Subtract from 1 to isolate $$r^3$$, then cube-root to get $$r$$.\n- Step 4: Once $$r$$ is known, substitute back into $$S_\\infty = a/(1-r) = 75$$ to find $$a$$.\n\nKey insight: spotting that one equation **already contains** part of the other is the elegance — it avoids cross-multiplying and dealing with a cubic.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "Why is it crucial to underline keywords like \"first four terms ascending,\" \"simplest form,\" \"exact value\" when reading an A-level question? (2 steps)", "answer": "- Step 1: Exam markschemes assign accuracy/method marks based on these specific requirements. Missing \"simplest form\" can cost the final A-mark even if your numerical work is right.\n- Step 2: For example, in a binomial expansion question that says \"state the value of $$x$$\" rather than \"compute the value of the expression,\" over-answering wastes time and may introduce errors. Reading carefully tells you exactly what's needed and nothing more.\n\nHabit: on a first read, underline the verbs (find/show/prove/state) and the constraints (form, range, precision). This anchors your answer to what's actually being marked.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "What is the general equation of a circle with centre $$(a, b)$$ and radius $$r$$, and where does it come from geometrically? (3 steps)", "answer": "- Step 1: The equation is $$(x - a)^2 + (y - b)^2 = r^2$$.\n- Step 2: Derivation: a point $$(x, y)$$ lies on the circle iff its distance from the centre $$(a, b)$$ equals $$r$$. By the Pythagorean distance formula, $$\\sqrt{(x-a)^2 + (y-b)^2} = r$$.\n- Step 3: Squaring both sides removes the square root: $$(x-a)^2 + (y-b)^2 = r^2$$. So the circle equation is literally Pythagoras applied to \"every point exactly $$r$$ from the centre.\"\n\nThis is why the squared form is universal — it's the squared distance equal to the squared radius.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "Given the centre of a circle is at $$(7, -2)$$ and a point $$(11, 6)$$ lies on the circle, how do you find $$r^2$$ without taking a square root? (2 steps)", "answer": "- Step 1: The radius is the distance from centre to any point on the circle. Squared distance: $$r^2 = (11 - 7)^2 + (6 - (-2))^2 = 4^2 + 8^2 = 16 + 64 = 80$$.\n- Step 2: Since the equation of the circle uses $$r^2$$ directly, leave it as $$r^2 = 80$$ — no need to compute $$r = \\sqrt{80}$$. The circle equation is $$(x-7)^2 + (y+2)^2 = 80$$.\n\nKey efficiency tip: never square-root then re-square. Carry $$r^2$$ throughout.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "If a circle's centre lies on the line $$y = -3x + 19$$ and the centre has $$x$$-coordinate 7, find the $$y$$-coordinate. (2 steps)", "answer": "- Step 1: Substitute $$x = 7$$ into the line equation: $$y = -3(7) + 19 = -21 + 19$$.\n- Step 2: $$y = -2$$, so the centre is $$(7, -2)$$.\n\nConceptual point: \"lies on the line\" means the point satisfies the line's equation. This is the bridge between geometric description and algebraic computation.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "In a logarithmic equation, why must you check that any solution makes the argument of every log strictly positive? (3 steps)", "answer": "- Step 1: $$\\log_b(x)$$ is only defined for $$x > 0$$ (over the reals). The logarithm of zero is undefined (it tends to $$-\\infty$$) and the log of a negative number is not a real number.\n- Step 2: When you solve an equation involving $$\\log(5 - a)$$ and $$\\log(a + 25)$$, both arguments must be positive: $$5 - a > 0$$ AND $$a + 25 > 0$$.\n- Step 3: These give the **natural domain** $$-25 < a < 5$$. Any candidate solution outside this domain must be **rejected**, even if it satisfies the algebraic equation post-manipulation (because manipulations like exponentiating may introduce spurious roots).\n\nAlways state explicitly: \"Reject $$a = 20$$ since we require $$a < 5$$.\"", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "When solving $$\\log(5-a) + \\log(a+25) = c$$ leads to a quadratic giving $$a = 5$$ or $$a = -20$$, which solution(s) are valid, and how would you justify your rejection in an exam? (3 steps)", "answer": "- Step 1: Find the natural domain: need $$5 - a > 0$$ (so $$a < 5$$) and $$a + 25 > 0$$ (so $$a > -25$$). Combined: $$-25 < a < 5$$.\n- Step 2: Check each root: $$a = 5$$ gives $$5 - a = 0$$, which makes $$\\log(0)$$ undefined → reject. $$a = -20$$ satisfies $$-25 < -20 < 5$$ → accept.\n- Step 3: In the exam, explicitly write \"Reject $$a = 5$$ as we need $$5 - a > 0$$\" with an arrow to the rejected value. Don't just cross it out — examiners reward explicit reasoning.\n\nThe lesson: solving algebraically gives candidate roots; the domain filters genuine solutions.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "State the three key laws of logarithms and the change-of-base formula. (4 steps)", "answer": "- Step 1: **Product:** $$\\log_b(xy) = \\log_b(x) + \\log_b(y)$$ — turning multiplication into addition.\n- Step 2: **Quotient:** $$\\log_b(x/y) = \\log_b(x) - \\log_b(y)$$ — division becomes subtraction.\n- Step 3: **Power:** $$\\log_b(x^n) = n \\log_b(x)$$ — exponents become coefficients (and conversely, coefficients can become exponents inside the log).\n- Step 4: **Change of base:** $$\\log_b(x) = \\dfrac{\\log_c(x)}{\\log_c(b)}$$, useful when your calculator only has $$\\log_{10}$$ or $$\\ln$$.\n\nWhy these are useful: they let you turn complicated multiplicative expressions into linear ones — which is exactly what makes logs the natural inverse of exponentials.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "When an answer must be written as $$\\log_{10}(K)$$ (no coefficient in front), and your working has produced $$\\tfrac{1}{2}\\log_{10}(N)$$, how do you finalise it? (2 steps)", "answer": "- Step 1: Use the power law in reverse: $$\\tfrac{1}{2}\\log_{10}(N) = \\log_{10}(N^{1/2}) = \\log_{10}(\\sqrt{N})$$.\n- Step 2: So $$K = \\sqrt{N}$$. The coefficient $$1/2$$ has been absorbed inside as a square root, leaving the expression in the demanded form.\n\nThis is a common mark-loss: the working is right, but the final form isn't matched to what the question demands. Always finish by reshaping to the requested form.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "What is the trapezium rule, and what is the geometric intuition behind why it approximates the area under a curve? (3 steps)", "answer": "- Step 1: The rule: $$\\int_a^b f(x)\\,dx \\approx \\tfrac{h}{2}\\bigl[y_0 + y_n + 2(y_1 + y_2 + \\cdots + y_{n-1})\\bigr]$$, where $$h = (b-a)/n$$ is the strip width and $$y_i = f(a + ih)$$.\n- Step 2: Geometric idea: split the area under the curve into $$n$$ vertical strips. Approximate each strip not by a rectangle (which would be the Riemann sum) but by a **trapezium** with parallel sides $$y_i$$ and $$y_{i+1}$$ and width $$h$$. Area of one trapezium = $$\\tfrac{h}{2}(y_i + y_{i+1})$$.\n- Step 3: Summing all trapezia, each internal $$y_i$$ (for $$0 < i < n$$) appears in two adjacent trapezia and so is counted twice, while the endpoints $$y_0, y_n$$ appear once. This gives the \"1, 2, 2, …, 2, 1\" coefficient pattern.\n\nThe trapezium rule overestimates concave-up regions and underestimates concave-down regions — because trapezia overshoot a curve bending one way and undercut a curve bending the other.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "When solving a polynomial equation by factorising a quadratic $$x^2 + x - 20 = 0$$, what mental procedure finds the factors instantly? (2 steps)", "answer": "- Step 1: Find two numbers that **multiply** to give the constant term ($$-20$$) and **add** to give the $$x$$-coefficient ($$+1$$). The candidates: $$5$$ and $$-4$$ give $$5 \\times (-4) = -20$$ ✓ and $$5 + (-4) = 1$$ ✓.\n- Step 2: Write $$(x + 5)(x - 4) = 0$$, giving $$x = -5$$ or $$x = 4$$.\n\nThe skill is reading off the structure: sign of product (constant term) tells you whether factors have same or opposite signs; size of sum (middle coefficient) narrows the candidates.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "What's the conceptual distinction between \"sum of first $$n$$ terms\" $$S_n$$ and \"the $$n$$-th term\" $$a_n$$ (or $$u_n$$)? Why do students often confuse them? (3 steps)", "answer": "- Step 1: $$a_n$$ (or $$u_n$$) is a **single number** — the value at position $$n$$ in the sequence. For geometric: $$a_n = a r^{n-1}$$.\n- Step 2: $$S_n$$ is the **running total** — the sum of all terms from position 1 up to position $$n$$. For geometric: $$S_n = a(1-r^n)/(1-r)$$.\n- Step 3: Confusion arises because both depend on $$n$$ and look similar in formula. A question saying \"the sum of the first three terms is 70.2\" is $$S_3 = 70.2$$, NOT $$a_3 = 70.2$$. Misreading this leads to using the wrong formula entirely.\n\nMnemonic: $$S$$ for sum, $$a$$ for \"a single term.\"", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "Why is annotating the diagram (writing equations, lengths, and labelled coordinates onto it as you work) so much more effective than working purely algebraically in coordinate geometry questions? (3 steps)", "answer": "- Step 1: Geometric problems often hide their solution in a relationship that's visually obvious (e.g. \"this radius equals that distance\") but algebraically nonobvious.\n- Step 2: Writing intermediate results onto the diagram externalises your working memory, so you don't have to mentally track multiple unknowns. Once you see the centre $$(7, -2)$$ and a point $$(11, 6)$$ both labelled, the radius idea pops out.\n- Step 3: It also catches errors: if you write a wrong gradient on the diagram and the geometry looks off (e.g. lines that should be perpendicular aren't), the visual mismatch flags the algebraic slip.\n\nIn exam conditions, annotate aggressively. Diagrams are tools, not just illustrations.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "What does it mean for a function to be **increasing** on an interval, and how is this characterised using the derivative? (3 steps)", "answer": "- Step 1: A function $$f$$ is increasing on an interval if, for any two points $$x_1 < x_2$$ in the interval, $$f(x_1) < f(x_2)$$. Larger input gives larger output.\n- Step 2: Equivalently (for differentiable $$f$$), $$f'(x) > 0$$ for all $$x$$ in the interval. The gradient is positive everywhere, so the graph climbs.\n- Step 3: To find intervals of increase: solve $$f'(x) > 0$$. The boundary points where $$f'(x) = 0$$ are candidate stationary points — they separate intervals of increase from intervals of decrease.\n\nSubtle: \"strictly increasing\" needs $$f'(x) > 0$$; \"non-decreasing\" allows $$f'(x) \\geq 0$$ (i.e. flat spots permitted).", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "At a stationary point, $$f'(x) = 0$$. How do you classify it as a local maximum, local minimum, or point of inflection using the second derivative? (3 steps)", "answer": "- Step 1: Compute $$f''(x)$$ at the stationary point.\n- Step 2: If $$f''(x) > 0$$: curve is concave up (like a U) → **local minimum**. If $$f''(x) < 0$$: curve is concave down (like a ∩) → **local maximum**.\n- Step 3: If $$f''(x) = 0$$: the test is inconclusive. It could be a point of inflection or a degenerate min/max. Switch to the first-derivative sign test: check signs of $$f'$$ just before and after the stationary point.\n\nIntuition: $$f''$$ measures how the gradient is changing. Gradient going from negative to positive (min) means $$f''$$ positive, and vice versa.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "What does the **definite integral** $$\\int_a^b f(x)\\,dx$$ represent geometrically, and what subtle sign convention must you watch out for? (3 steps)", "answer": "- Step 1: It represents the **signed area** between the curve $$y = f(x)$$ and the $$x$$-axis, from $$x = a$$ to $$x = b$$.\n- Step 2: \"Signed\" means regions where $$f(x) > 0$$ (above the axis) contribute positive area, and regions where $$f(x) < 0$$ (below the axis) contribute negative area.\n- Step 3: If a question asks for the **actual geometric area** (always positive) and the curve crosses the $$x$$-axis in the interval, you must split the integral at the crossing points and take absolute values of the negative parts. Otherwise positive and negative regions cancel and you'll get the wrong answer.\n\nSo $$\\int_{-1}^1 x\\,dx = 0$$, but the actual area enclosed is $$2 \\times \\tfrac{1}{2} = 1$$.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "To find the area between two curves $$y = f(x)$$ and $$y = g(x)$$ where $$f \\geq g$$ on $$[a,b]$$, what integral do you compute, and why? (3 steps)", "answer": "- Step 1: Compute $$\\int_a^b [f(x) - g(x)]\\,dx$$.\n- Step 2: Why \"top minus bottom\"? At each $$x$$, the vertical strip between the curves has height $$f(x) - g(x) \\geq 0$$ and infinitesimal width $$dx$$, giving area element $$(f-g)\\,dx$$. Summing (integrating) gives the total enclosed area.\n- Step 3: The endpoints $$a, b$$ are the $$x$$-coordinates of the curves' intersections, found by solving $$f(x) = g(x)$$. If the curves cross within the interval, split the integral so that $$f - g$$ is non-negative on each subinterval.\n\nConceptually: subtracting the lower curve \"cancels out\" the area below the lower curve, leaving only the region between them.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "What is **proof by exhaustion**, and when is it appropriate to use? (3 steps)", "answer": "- Step 1: Proof by exhaustion verifies a statement by checking every possible case individually. You divide the domain into finitely many cases, then verify the claim holds in each.\n- Step 2: Appropriate when the domain is **finite and small enough** to enumerate. E.g. \"for $$n \\in \\{1, 2, 3, 4, 5\\}$$, $$n^2 \\leq 25$$\" — just check all five values.\n- Step 3: Inappropriate when the domain is infinite (e.g. \"for all integers $$n$$\"). You can't check infinitely many cases, so you need a structural proof (deduction, induction, contradiction).\n\nPitfall: it must be truly exhaustive. Missing one case invalidates the proof. Always declare upfront: \"the only cases are…\".", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "What is **proof by deduction**, and how does it structurally differ from disproof by counterexample? (3 steps)", "answer": "- Step 1: Proof by deduction starts from accepted axioms or definitions, and chains logical implications to arrive at the desired conclusion. Every step must follow rigorously from the previous.\n- Step 2: It establishes a universal claim (\"for all $$n$$, $$P(n)$$\"). It must work for **every** element of the domain via general reasoning, not specific examples.\n- Step 3: Disproof by counterexample is the opposite: to refute a universal claim, just exhibit **one** instance where it fails. No general argument needed — one specific failing case suffices.\n\nAsymmetry: proving \"for all\" needs general argument; disproving \"for all\" needs only one specific case. Conversely, proving \"there exists\" needs one example; disproving \"there exists\" needs general argument that no such element exists.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": true}, {"question": "In a binomial expansion $$(a + bx)^n$$, what does the question \"find the first four terms in ascending powers of $$x$$\" mean, and what formula do you use? (3 steps)", "answer": "- Step 1: \"Ascending powers of $$x$$\" means terms ordered as $$x^0, x^1, x^2, x^3$$ (i.e. constant first, then increasing). This is the natural order when expanding $$(a+bx)^n$$ with the constant $$a$$ dominating.\n- Step 2: Use the binomial theorem: $$(a+bx)^n = \\binom{n}{0}a^n + \\binom{n}{1}a^{n-1}(bx) + \\binom{n}{2}a^{n-2}(bx)^2 + \\binom{n}{3}a^{n-3}(bx)^3 + \\cdots$$\n- Step 3: The first four terms are $$a^n,\\ n a^{n-1} b x,\\ \\binom{n}{2} a^{n-2} b^2 x^2,\\ \\binom{n}{3} a^{n-3} b^3 x^3$$. Carefully apply the power to both $$b$$ and $$x$$ each time — a common slip is forgetting to raise $$b$$ to the matching power.\n\nAlways double-check the power on the small term: e.g. $$(2-5x)^8$$ first term is $$2^8 = 256$$, NOT $$2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Once you have a binomial expansion of $$(2 - 5x)^8$$ and the question says \"use $$x = $$ ? to estimate $$(2.05)^8$$,\" how do you find the correct $$x$$ value? (3 steps)", "answer": "- Step 1: Match the expression to the form $$(2 - 5x)^8 = (2.05)^8$$. So $$2 - 5x = 2.05$$.\n- Step 2: Solve: $$-5x = 0.05$$, giving $$x = -0.01$$.\n- Step 3: This $$x$$ value is small (good — the expansion converges fast), and you substitute it into your earlier expansion to get a numerical estimate of $$(2.05)^8$$.\n\nWhy this works: the binomial expansion is most accurate (with few terms) when $$|bx/a|$$ is small. Choosing $$x$$ near zero ensures fast convergence.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "For an arithmetic sequence, why is the $$n$$-th term formula $$u_n = a + (n-1)d$$ and not $$u_n = a + nd$$? (3 steps)", "answer": "- Step 1: The first term is $$u_1 = a$$. The second adds one common difference: $$u_2 = a + d$$. The third adds two: $$u_3 = a + 2d$$.\n- Step 2: The pattern: the $$n$$-th term has $$(n-1)$$ common differences added on, because you've taken $$(n-1)$$ steps from term 1 to term $$n$$.\n- Step 3: Using $$nd$$ would shift the whole sequence: $$u_1$$ would be $$a + d$$ instead of $$a$$. The $$(n-1)$$ adjustment ensures the formula correctly outputs the first term when $$n=1$$.\n\nThis off-by-one is a classic exam trap. Always test your formula by plugging in $$n = 1$$ to confirm it gives $$a$$.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "What is the formula for the sum of the first $$n$$ terms of an arithmetic series, and where does it come from intuitively? (3 steps)", "answer": "- Step 1: Formula: $$S_n = \\tfrac{n}{2}(2a + (n-1)d) = \\tfrac{n}{2}(u_1 + u_n)$$.\n- Step 2: Intuition (Gauss's trick): write the sum forwards and backwards: $$S_n = u_1 + u_2 + \\cdots + u_n$$ and $$S_n = u_n + u_{n-1} + \\cdots + u_1$$. Add term by term: each pair sums to $$u_1 + u_n$$, and there are $$n$$ pairs.\n- Step 3: So $$2 S_n = n(u_1 + u_n)$$, giving $$S_n = \\tfrac{n}{2}(u_1 + u_n)$$. Substituting $$u_n = a + (n-1)d$$ gives the alternative form $$\\tfrac{n}{2}(2a + (n-1)d)$$.\n\nMnemonic: \"average term times number of terms,\" since $$(u_1 + u_n)/2$$ is the average of first and last, valid because arithmetic sequences are linearly evenly spaced.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Simple mental example: an arithmetic sequence starts with 3 and has common difference 2. What is the sum of the first 5 terms? (2 steps)", "answer": "- Step 1: First term $$a = 3$$, last term $$u_5 = 3 + 4(2) = 11$$. Average of first and last is $$(3 + 11)/2 = 7$$.\n- Step 2: Number of terms is 5, so $$S_5 = 5 \\times 7 = 35$$. Sanity check: terms are 3, 5, 7, 9, 11 — sum $$= 35$$. ✓\n\nThis is the \"average times count\" intuition in action. Fast mental computation for any arithmetic sum.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "What does $$\\sum_{k=1}^{n} u_k$$ (sigma notation) mean operationally, and what are common forms it takes for standard sequences? (3 steps)", "answer": "- Step 1: $$\\sum_{k=1}^{n} u_k$$ means: substitute $$k = 1, 2, \\ldots, n$$ into $$u_k$$, then add all the results. The variable $$k$$ is the index of summation.\n- Step 2: Standard results: $$\\sum_{k=1}^n k = \\tfrac{n(n+1)}{2}$$ (sum of integers), $$\\sum_{k=1}^n k^2 = \\tfrac{n(n+1)(2n+1)}{6}$$ (sum of squares).\n- Step 3: Linearity: $$\\sum (a u_k + b v_k) = a \\sum u_k + b \\sum v_k$$. This lets you split complicated sums into standard pieces.\n\nThe bounds matter: $$\\sum_{k=0}^n$$ has $$n+1$$ terms, not $$n$$.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "What is a **recurrence relation**, and how does it differ from a closed-form formula for a sequence? (3 steps)", "answer": "- Step 1: A recurrence relation defines each term in terms of previous terms, e.g. $$u_{n+1} = 2 u_n + 3$$ with $$u_1 = 1$$. To find $$u_5$$ you must compute $$u_2, u_3, u_4$$ first.\n- Step 2: A closed-form formula gives $$u_n$$ directly in terms of $$n$$, e.g. $$u_n = 4 \\cdot 2^{n-1} - 3$$ (which happens to satisfy the recurrence above). No previous terms needed.\n- Step 3: Recurrences are powerful for definition (often more natural), but computationally slower for large $$n$$. Closed forms are fast but harder to derive. Some sequences (like Fibonacci) have closed forms; many don't.\n\nIn A-level, you typically use recurrences for one-step calculations and closed forms when the question explicitly asks for \"the $$n$$-th term.\"", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "Sketch the qualitative behaviour of an exponential function $$y = b^x$$ for $$b > 1$$ vs. $$0 < b < 1$$. What's invariant, and what differs? (3 steps)", "answer": "- Step 1: Both pass through $$(0, 1)$$ (since $$b^0 = 1$$) and stay strictly positive everywhere. Both have horizontal asymptote $$y = 0$$.\n- Step 2: If $$b > 1$$: function is **increasing**, grows without bound as $$x \\to \\infty$$, decays to 0 as $$x \\to -\\infty$$. Classic \"exponential growth\" curve.\n- Step 3: If $$0 < b < 1$$: function is **decreasing**, decays to 0 as $$x \\to \\infty$$, grows without bound as $$x \\to -\\infty$$. Mirror image (reflection in $$y$$-axis) of the $$b > 1$$ case.\n\nThe case $$b = 1$$ gives the constant function $$y = 1$$, and $$b \\leq 0$$ is excluded because $$b^x$$ isn't well-defined for all real $$x$$ when the base is non-positive.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "What does the logarithm function $$y = \\log_b(x)$$ look like geometrically, and how is it related to $$y = b^x$$? (3 steps)", "answer": "- Step 1: $$y = \\log_b(x)$$ is the **inverse function** of $$y = b^x$$. Its graph is the reflection of $$y = b^x$$ in the line $$y = x$$.\n- Step 2: Domain: $$x > 0$$ only (log of zero or negative undefined). Range: all real numbers. Vertical asymptote at $$x = 0$$ (log tends to $$-\\infty$$). Passes through $$(1, 0)$$ since $$\\log_b(1) = 0$$.\n- Step 3: For $$b > 1$$: increases, but very slowly for large $$x$$ (log grows slower than any positive power of $$x$$). For $$0 < b < 1$$: decreasing version. Crosses through $$(b, 1)$$ since $$\\log_b(b) = 1$$.\n\nIntuition: while exponentials explode, their inverses (logs) compress aggressively — a tool for shrinking large-range data.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "Solve $$3^x = 7$$ using logarithms. What is the conceptual move? (3 steps)", "answer": "- Step 1: Take logarithm of both sides (any base — let's use $$\\log_{10}$$ or $$\\ln$$): $$\\log(3^x) = \\log(7)$$.\n- Step 2: Apply the power law $$\\log(3^x) = x \\log(3)$$: this brings the unknown exponent down as a coefficient. Now $$x \\log(3) = \\log(7)$$.\n- Step 3: Solve linearly: $$x = \\dfrac{\\log 7}{\\log 3}$$. This is also exactly $$\\log_3(7)$$ by change of base.\n\nThe deep idea: the log's job in exponential equations is to \"bring exponents down\" so we can isolate the unknown linearly.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "What is the strategic difference between a \"linear trig equation\" like $$\\sin(x) = 0.5$$ and a \"quadratic trig equation\" like $$2\\sin^2 x - 3\\sin x + 1 = 0$$? (3 steps)", "answer": "- Step 1: Linear trig: one trig function, solve directly. $$\\sin x = 0.5$$ gives $$x = \\arcsin(0.5) = 30°$$ as principal solution, then use symmetry/periodicity to find all solutions in the given range.\n- Step 2: Quadratic trig: substitute $$u = \\sin x$$ (or $$\\cos x$$ etc.) to convert to a familiar quadratic $$2u^2 - 3u + 1 = 0$$. Factorise: $$(2u-1)(u-1) = 0$$, so $$u = 1/2$$ or $$u = 1$$.\n- Step 3: Then solve each linear trig equation: $$\\sin x = 1/2$$ and $$\\sin x = 1$$ separately, collecting all solutions in the range.\n\nKey strategy: see the quadratic structure first, substitute, solve algebraically, then return to the trig equation. Don't expand prematurely.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "When solving $$\\sin(2x) = 0.5$$ for $$0 \\leq x < 360°$$, why must you find solutions for $$2x$$ in a wider range than $$x$$? (3 steps)", "answer": "- Step 1: If $$0 \\leq x < 360°$$, then $$0 \\leq 2x < 720°$$. So when solving for the \"inner\" angle $$2x$$, you need solutions in $$[0, 720°)$$ — twice the original range.\n- Step 2: $$\\sin\\theta = 0.5$$ has solutions $$\\theta = 30°, 150°$$ in $$[0, 360°)$$. Extend by period $$360°$$ to get $$\\theta = 390°, 510°$$ in $$[360°, 720°)$$. Total: 4 values.\n- Step 3: Divide each by 2 to get $$x$$: $$x = 15°, 75°, 195°, 255°$$. Four solutions, all within the original range.\n\nCommon mistake: only finding 2 solutions because you stopped at $$360°$$ for $$2x$$. Always scale the working range by the coefficient on $$x$$.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "State the fundamental Pythagorean identity in trigonometry, and explain why it's true geometrically. (3 steps)", "answer": "- Step 1: The identity: $$\\sin^2\\theta + \\cos^2\\theta = 1$$ for all real $$\\theta$$.\n- Step 2: Geometric reason: on the unit circle, a point at angle $$\\theta$$ from the positive $$x$$-axis has coordinates $$(\\cos\\theta, \\sin\\theta)$$. Since the point is on a circle of radius 1, by Pythagoras' theorem $$\\cos^2\\theta + \\sin^2\\theta = 1^2 = 1$$.\n- Step 3: This makes it the trig version of Pythagoras itself — that's literally why it's called the Pythagorean identity. Useful corollary: $$\\tan^2\\theta + 1 = \\sec^2\\theta$$ (divide through by $$\\cos^2\\theta$$).\n\nThis identity is the workhorse of trig — used constantly to convert between $$\\sin$$ and $$\\cos$$ in equations.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "Why must a circle's tangent line be perpendicular to the radius at the point of contact? (3 steps)", "answer": "- Step 1: The radius at the contact point is the shortest distance from the centre to any point on the circle. If a line touches the circle at one point only (the definition of a tangent), it can't go any closer to the centre.\n- Step 2: Any line through the contact point that isn't perpendicular to the radius would have a component pointing \"towards the centre,\" so it would enter the circle and intersect at a second point — making it a chord, not a tangent.\n- Step 3: Only the line perpendicular to the radius has no such \"inward\" component, so it just grazes the circle at exactly one point.\n\nConsequence in geometry problems: if you have a tangent and the contact point, you instantly have a right angle with the radius — a free 90° to exploit.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "What is the **angle in a semicircle theorem**, and why is it true? (3 steps)", "answer": "- Step 1: Theorem: any triangle inscribed in a semicircle with one side being the diameter has a right angle at the vertex opposite the diameter.\n- Step 2: Proof sketch: let the diameter be $$AB$$, centre $$O$$, and $$C$$ a point on the circle. Then $$OA = OB = OC = r$$ (all radii). Triangles $$OAC$$ and $$OBC$$ are isoceles, so their base angles are equal. Let $$\\angle OAC = \\alpha$$ and $$\\angle OBC = \\beta$$.\n- Step 3: Then $$\\angle ACB = \\alpha + \\beta$$ (split by $$OC$$). And the angles of $$\\triangle ABC$$ sum to $$180°$$: $$\\alpha + \\beta + (\\alpha + \\beta) = 180°$$, so $$2(\\alpha + \\beta) = 180°$$, giving $$\\angle ACB = 90°$$.\n\nThis is a special case of the inscribed angle theorem (angle at centre is twice angle at circumference).", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "Why does the perpendicular from the centre of a circle bisect any chord? (3 steps)", "answer": "- Step 1: Drop a perpendicular from the centre $$O$$ to the chord $$AB$$, meeting it at point $$M$$. We want to show $$AM = MB$$.\n- Step 2: Consider triangles $$OMA$$ and $$OMB$$. Both share side $$OM$$, both have right angles at $$M$$ (by construction), and $$OA = OB$$ (both radii).\n- Step 3: By RHS (right-angle, hypotenuse, side) congruence, the triangles are congruent. So $$AM = MB$$ — the foot of the perpendicular is the midpoint of the chord.\n\nUse in problems: to find a chord's midpoint or to set up a circle's centre when given two chords, drop perpendicular bisectors and they meet at the centre.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "When asked to optimise a quantity (maximise volume, minimise cost, etc.) using differentiation, what's the standard workflow? (4 steps)", "answer": "- Step 1: **Set up the objective**: express the quantity to optimise (call it $$Q$$) in terms of variables. There will usually be a constraint linking the variables.\n- Step 2: **Reduce to one variable**: use the constraint to eliminate one variable, getting $$Q$$ as a function of a single variable, say $$x$$.\n- Step 3: **Differentiate and find stationary points**: solve $$dQ/dx = 0$$ for $$x$$.\n- Step 4: **Classify and verify**: use the second derivative test (or sign of $$dQ/dx$$ either side) to confirm it's a max or min as required. Substitute back to find the optimal value of $$Q$$.\n\nCommon pitfall: forgetting the constraint, or forgetting to verify it's the right type of stationary point. Also check domain — the optimum might be at a boundary, not a stationary point.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": false}, {"question": "What does it mean to \"sketch the gradient function\" $$y = f'(x)$$ given a graph of $$y = f(x)$$? Walk through the key reading points. (4 steps)", "answer": "- Step 1: At each $$x$$, the value of $$f'(x)$$ equals the gradient (slope) of the tangent to $$f$$ at that point. So you're reading off slopes and plotting them as $$y$$-values.\n- Step 2: **Stationary points of $$f$$** ($$f' = 0$$): these become $$x$$-intercepts of $$f'$$. Local maxima/minima of $$f$$ are where $$f'$$ crosses zero.\n- Step 3: **Where $$f$$ is increasing**, $$f' > 0$$ (gradient function above $$x$$-axis). **Where $$f$$ is decreasing**, $$f' < 0$$ (below axis).\n- Step 4: **Inflection points of $$f$$** become stationary points (max/min) of $$f'$$. The steepest slopes of $$f$$ become peaks/troughs of $$f'$$.\n\nConceptually: each feature of $$f$$ has a corresponding feature in $$f'$$, and learning the dictionary speeds up sketching enormously.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "Why is it generally a strategic error to attempt every question in an exam in linear order, rather than scanning and prioritising? (3 steps)", "answer": "- Step 1: Exam mark allocation isn't proportional to question position. Question 3 might be 8 marks and conceptually easy for you, while Question 1 might be 4 marks and slow. Time spent on hard early questions could earn fewer marks than easy later questions.\n- Step 2: Scanning first lets you spot questions you can answer quickly and confidently — securing easy marks early builds momentum and reduces stress.\n- Step 3: You also calibrate your remaining time better. If you know there's a long Q8 ahead, you might not over-invest in Q2.\n\nStrategy: read all questions in the first 2 minutes, mentally tag them (easy/medium/hard/skip-for-now), then execute in optimal order. Never leave easy marks on the table because you got stuck on a hard one.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": false}, {"question": "Mental geometric series example: a series has first term $$a = 4$$ and common ratio $$r = 1/2$$. What is its sum to infinity, and why does it converge? (2 steps)", "answer": "- Step 1: Since $$|r| = 1/2 < 1$$, the series converges. Use $$S_\\infty = \\dfrac{a}{1-r} = \\dfrac{4}{1 - 1/2} = \\dfrac{4}{1/2} = 8$$.\n- Step 2: Sanity check: terms are $$4, 2, 1, 0.5, 0.25, \\ldots$$. Each is half the previous, so we're adding ever-smaller amounts. $$4 + 2 + 1 + 0.5 + 0.25 + \\cdots$$ approaches $$8$$, never exceeding it.\n\nGeometric series with $$|r| < 1$$ converge because the terms shrink geometrically — the \"tail\" of unsummed terms goes to zero exponentially fast.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}], "count": 56}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "A standard fair six-sided die and a biased six-sided die are rolled. On the biased die, faces 1–5 are equally likely with probability $$p$$ each. Why must the probability of rolling a 6 on the biased die be $$1-5p$$ and not $$1 - p$$? (2 steps)", "answer": "- Step 1: The total probability across all six outcomes on any single die must sum to exactly $$1$$, because some face must come up. So $$P(1) + P(2) + \\dots + P(6) = 1$$.\n- Step 2: Since faces 1–5 each have probability $$p$$, their combined probability is $$5p$$, not $$p$$.\n+ A common mistake is to write $$P(6) = 1 - p$$, treating the five equal probabilities as a single event.\n+ The correct leftover is $$P(6) = 1 - 5p$$, which forces $$p \\le \\tfrac{1}{5}$$ for a valid distribution.\n\nTakeaway: when \"each of $$k$$ outcomes has probability $$p$$\", their total contribution is $$kp$$, not $$p$$.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "When parameterising a biased die where five faces are equally likely, why is it cleaner to call that common probability $$p$$ rather than $$\\tfrac{p}{5}$$?", "answer": "Calling each individual face's probability $$p$$ keeps the algebra integer-friendly. If instead you label the common probability as $$\\tfrac{p}{5}$$, then $$p$$ ends up representing the *combined* probability of the five faces, and every subsequent line introduces fractions you must constantly clear. Picking the right variable at the start prevents avoidable fraction-juggling later — a strategic move, not just notational taste.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": true}, {"question": "Two events $$A$$ and $$B$$ are independent. You want the probability that *both* happen. Why is this a multiplication, not an addition? (3 steps)", "answer": "- Step 1: \"Or\" (mutually exclusive events) corresponds to addition: $$P(A \\cup B) = P(A) + P(B)$$ because the sample spaces don't overlap.\n- Step 2: \"And\" with independence corresponds to multiplication: $$P(A \\cap B) = P(A) \\cdot P(B)$$.\n+ Intuition: $$P(A)$$ is the fraction of outcomes where $$A$$ happens; among those, $$P(B)$$ is the fraction where $$B$$ *also* happens; you're taking a fraction of a fraction.\n- Step 3: Adding probabilities of \"and\" double-counts and can even produce numbers greater than 1, which is nonsense.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "What does a bearing measure, and why is a bearing of $$0°$$ essentially never the answer for a leg of a polygon-walk problem?", "answer": "A bearing is the angle measured **clockwise from north**, always quoted as a 3-digit number between $$000°$$ and $$360°$$. A bearing of $$000°$$ means you are pointing due north. So unless the path you're describing actually goes due north, the bearing cannot be $$0°$$. The student's error here was confusing \"the direction is parallel to a previous side\" with \"the bearing is zero\" — bearings care about the absolute compass direction, not relative orientation.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "For a regular polygon with $$n$$ sides, why is the **exterior** angle $$\\tfrac{360°}{n}$$ and not the interior angle? (3 steps)", "answer": "- Step 1: Imagine walking around the perimeter of the polygon and returning to your start. You make one complete turn — exactly $$360°$$.\n- Step 2: At each vertex, the amount you turn through is the *exterior* angle (the supplement of the interior angle).\n- Step 3: With $$n$$ identical vertices, each turn must be $$\\tfrac{360°}{n}$$, so exterior $$= \\tfrac{360°}{n}$$ and interior $$= 180° - \\tfrac{360°}{n}$$.\n\nTakeaway: $$360°$$ is the **exterior** sum (always, for any convex polygon), not the interior sum.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Mental-maths trick: how do you compute $$\\tfrac{360}{5}$$ in your head without long division?", "answer": "Dividing by 5 is the same as dividing by 10 and multiplying by 2 (because $$5 = \\tfrac{10}{2}$$). So $$\\tfrac{360}{5} = \\tfrac{360}{10} \\times 2 = 36 \\times 2 = 72$$. This trick generalises: any \"divide by 5\" can be done as \"halve, then move the decimal\" or \"divide by 10, then double\".", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "For a regular pentagon, what are the exterior and interior angles, and how do they relate?", "answer": "- Step 1: Exterior angle $$= \\tfrac{360°}{5} = 72°$$.\n- Step 2: Interior + exterior $$= 180°$$ because they lie on a straight line (the extended side).\n- Step 3: Interior $$= 180° - 72° = 108°$$.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "What is the **factorisation identity for a difference of two cubes**, and how can you derive the second bracket from scratch if you forget it? (4 steps)", "answer": "- Step 1: Setting $$a^3 - b^3 = 0$$ gives $$a = b$$, i.e. $$a - b = 0$$, so $$(a - b)$$ must be one factor.\n- Step 2: The other factor must be degree 2 (so the product is degree 3). Build it term by term: to get $$a^3$$, the leading term must be $$a^2$$. So far: $$(a-b)(a^2 + \\dots)$$ gives $$a^3 - a^2 b$$, but we need no $$-a^2 b$$ term in $$a^3 - b^3$$.\n- Step 3: To cancel $$-a^2 b$$, add $$+ab$$ to the second bracket — multiplying out gives $$+a^2 b - ab^2$$. Now we have a stray $$-ab^2$$.\n- Step 4: To cancel $$-ab^2$$, add $$+b^2$$. This gives $$+ab^2 - b^3$$, which produces the desired $$-b^3$$ and cleans up everything else.\n\nResult: $$a^3 - b^3 = (a-b)(a^2 + ab + b^2)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "Apply the difference of two cubes to factorise $$1 - r^3$$. What does this let you do to $$\\dfrac{a(1-r^3)}{1-r}$$?", "answer": "- Step 1: With $$a = 1$$, $$b = r$$: $$1 - r^3 = (1-r)(1 + r + r^2)$$.\n- Step 2: Substitute into $$\\dfrac{a(1-r^3)}{1-r} = \\dfrac{a(1-r)(1+r+r^2)}{1-r} = a(1+r+r^2)$$.\n\nThis is the key simplification: the geometric series sum formula's denominator cancels cleanly when $$n = 3$$.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "In a geometric series problem, you're told $$S_3 = 70.2$$ and $$S_\\infty = 75$$. Without grinding through algebra, what's the *clever* way to combine these to find $$r$$? (3 steps)", "answer": "- Step 1: $$S_3 = \\dfrac{a(1-r^3)}{1-r}$$ and $$S_\\infty = \\dfrac{a}{1-r}$$. Notice $$S_\\infty$$ is literally hiding inside $$S_3$$.\n- Step 2: Rewrite $$S_3 = \\dfrac{a}{1-r} \\cdot (1 - r^3) = S_\\infty \\cdot (1 - r^3)$$. So $$70.2 = 75(1 - r^3)$$.\n- Step 3: Solve: $$1 - r^3 = \\tfrac{70.2}{75} = \\tfrac{117}{125}$$, so $$r^3 = \\tfrac{8}{125}$$, giving $$r = \\tfrac{2}{5}$$.\n\nTakeaway: always look for whether one quantity is *embedded* inside another — substitution beats brute algebra.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "Why is \"spotting that $$S_\\infty$$ is a sub-expression of $$S_n$$\" easier than using the difference-of-cubes factorisation here, even though both work?", "answer": "The difference-of-cubes route forces you to factorise, cancel, and then handle a quadratic-in-$$r$$ inside the bracket. The substitution route uses a single replacement ($$\\tfrac{a}{1-r} \\to S_\\infty$$) and reduces the equation immediately to a linear equation in $$r^3$$. Same answer, but one line vs. five. The lesson: before launching into machinery, scan whether a *given quantity* appears as a structural piece of another expression.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "A geometric series has first term $$a$$, common ratio $$r$$ with $$|r| < 1$$. Why does $$S_\\infty = \\dfrac{a}{1-r}$$ work, and what breaks if $$|r| \\ge 1$$? (3 steps)", "answer": "- Step 1: $$S_n = \\dfrac{a(1-r^n)}{1-r}$$ for finite $$n$$.\n- Step 2: As $$n \\to \\infty$$, if $$|r| < 1$$, then $$r^n \\to 0$$, so $$S_n \\to \\dfrac{a(1-0)}{1-r} = \\dfrac{a}{1-r}$$.\n- Step 3: If $$|r| \\ge 1$$, then $$r^n$$ does *not* shrink — it stays the same size or grows — so the partial sums never settle, and $$S_\\infty$$ diverges.\n\nTakeaway: convergence depends entirely on whether successive terms shrink fast enough.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "State the **factor theorem** and explain *why* it's true. (3 steps)", "answer": "- Step 1: Statement: $$(x - c)$$ is a factor of polynomial $$f(x)$$ if and only if $$f(c) = 0$$.\n- Step 2: Why? Polynomial division gives $$f(x) = (x-c) q(x) + R$$ for some constant remainder $$R$$.\n- Step 3: Substituting $$x = c$$ kills the $$(x-c)$$ term, leaving $$f(c) = R$$. So \"(x-c) is a factor\" $$\\iff R = 0$$ $$\\iff f(c) = 0$$.\n\nTakeaway: the factor theorem is just the remainder theorem with $$R = 0$$.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "If $$(3x - 4)$$ is a factor of $$f(x)$$, what value should you substitute into $$f$$ to test this, and why isn't it $$x = -\\tfrac{4}{3}$$? (2 steps)", "answer": "- Step 1: Set $$3x - 4 = 0 \\Rightarrow x = \\tfrac{4}{3}$$. This is the root associated with the linear factor.\n- Step 2: Therefore the factor theorem demands $$f\\!\\left(\\tfrac{4}{3}\\right) = 0$$, not $$f\\!\\left(-\\tfrac{4}{3}\\right)$$. The sign of $$x$$ comes from isolating $$x$$, not from copying the constant.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "State the **remainder theorem** and explain how it relates to the factor theorem. (3 steps)", "answer": "- Step 1: When $$f(x)$$ is divided by $$(x - c)$$, the remainder equals $$f(c)$$.\n- Step 2: Derivation: $$f(x) = (x-c)q(x) + R$$, and $$x = c$$ gives $$f(c) = R$$.\n- Step 3: The factor theorem is the special case $$R = 0$$. They aren't separate ideas — they're the same statement, with \"factor\" being the \"remainder = 0\" case.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "You're told $$f(x) \\div (x - 2)$$ leaves remainder $$b$$. Write down the equation this gives you, and explain what it lets you do.", "answer": "- Step 1: By the remainder theorem, $$f(2) = b$$.\n- Step 2: This gives a single equation relating the unknown coefficients of $$f$$ to $$b$$.\n+ If you also have another fact (e.g. another factor or another remainder), you get a second equation and can solve simultaneously for the unknowns.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "When polynomial-dividing a cubic $$3x^3 - x^2 - 10x + 8$$ by a known factor $$(3x - 4)$$, what kind of object will the quotient be, and how do you determine its leading term? (2 steps)", "answer": "- Step 1: Degree count: cubic ÷ linear = quadratic. So the quotient is of the form $$ax^2 + bx + c$$.\n- Step 2: Leading-term match: to get $$3x^3$$ from $$(3x-4) \\cdot (\\text{leading term})$$, the leading term of the quotient must be $$x^2$$. The rest is filled in by matching coefficients or by long division.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Fully factorise $$3x^3 - x^2 - 10x + 8$$, given that $$(3x - 4)$$ is a factor. (3 steps)", "answer": "- Step 1: Divide: $$3x^3 - x^2 - 10x + 8 = (3x-4)(x^2 + ax + b)$$. Matching coefficients (or polynomial division) gives the quotient $$x^2 + x - 2$$.\n- Step 2: Factorise the quadratic: need two numbers multiplying to $$-2$$ and adding to $$+1$$. These are $$+2$$ and $$-1$$, giving $$(x+2)(x-1)$$.\n- Step 3: Combine: $$f(x) = (3x-4)(x+2)(x-1)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "When you write the perpendicular line equation as $$y - y_1 = m(x - x_1)$$, a common transcription slip is to drop or alter $$y_1$$. Why does an error of \"1\" in $$y_1$$ shift the final $$y$$-intercept by exactly that amount?", "answer": "- Step 1: Expanding $$y - y_1 = m(x - x_1)$$ gives $$y = mx - mx_1 + y_1$$. The $$y_1$$ appears additively in the $$y$$-intercept.\n- Step 2: Changing $$y_1$$ by $$+1$$ shifts the entire intercept by $$+1$$, hence the answer drifts (e.g. from $$+19$$ to $$+20$$).\n+ Lesson: a single copy error propagates linearly into the final intercept — annotate diagrams and double-check the point you substitute.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Write down the general equation of a circle in $$(a, b, r)$$ form, and explain why this form is preferred over the expanded form. (2 steps)", "answer": "- Step 1: $$(x - a)^2 + (y - b)^2 = r^2$$, where $$(a, b)$$ is the centre and $$r$$ the radius.\n- Step 2: This form reveals centre and radius *by inspection*. The expanded form $$x^2 + y^2 + Dx + Ey + F = 0$$ hides them; you'd have to complete the square to recover the geometry.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "A circle has centre $$(7, -2)$$ and passes through the point $$(11, 6)$$. Find the radius (conceptually — no big numbers). (3 steps)", "answer": "- Step 1: Radius = distance from centre to any point on the circle.\n- Step 2: Use the distance formula: $$r = \\sqrt{(11-7)^2 + (6-(-2))^2} = \\sqrt{4^2 + 8^2} = \\sqrt{16 + 64} = \\sqrt{80}$$.\n- Step 3: The equation of the circle is $$(x-7)^2 + (y+2)^2 = 80$$ (note: write $$80$$, not $$(\\sqrt{80})^2$$ — simplify).\n\nTakeaway: $$r^2 = 80$$ directly; you never need to compute $$r$$ as a decimal.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "When given a diagram with a circle, a line, and a labelled centre, what habit makes geometry questions dramatically easier?", "answer": "Annotate the diagram as you go: write the line's equation directly on it, fill in coordinates as you compute them, sketch in radii, and mark any right angles (e.g. radius–tangent). Geometry questions become much more visual once the diagram carries all the information — you stop juggling values mentally and instead \"read\" the answer off the picture.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Trapezium rule problem ends with the form $$\\dfrac{1}{2}\\log_{10} N = \\log_{10} K$$. Why must you \"absorb\" the $$\\tfrac{1}{2}$$, and how? (2 steps)", "answer": "- Step 1: The required form has no coefficient in front of $$\\log_{10} K$$. So $$\\tfrac{1}{2} \\log_{10} N$$ must be rewritten as $$\\log_{10}(\\text{something})$$ with no leading factor.\n- Step 2: Use the log power law in reverse: $$\\tfrac{1}{2} \\log_{10} N = \\log_{10} N^{1/2} = \\log_{10} \\sqrt{N}$$. Therefore $$K = \\sqrt{N}$$.\n\nTakeaway: a coefficient in front of a log isn't a coefficient — it's an exponent waiting to climb inside.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "State the three core log laws and the *one* sign rule that catches students out. (4 steps)", "answer": "- Step 1: Product: $$\\log_b(xy) = \\log_b x + \\log_b y$$.\n- Step 2: Quotient: $$\\log_b(x/y) = \\log_b x - \\log_b y$$.\n- Step 3: Power: $$\\log_b(x^k) = k \\log_b x$$.\n- Step 4: Domain rule: you can only take $$\\log$$ of a *strictly positive* argument. Any solution that forces a $$\\log$$ of zero or a negative number must be rejected.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "When solving a logarithmic equation, you obtain two candidate solutions: $$a = 20$$ and $$a = -25$$. The equation contains $$\\log(5 - a)$$ and $$\\log(a + 25)$$. Determine the natural domain and which solutions survive. (4 steps)", "answer": "- Step 1: For $$\\log(5 - a)$$ to be defined: $$5 - a > 0 \\Rightarrow a < 5$$.\n- Step 2: For $$\\log(a + 25)$$ to be defined: $$a + 25 > 0 \\Rightarrow a > -25$$.\n- Step 3: Intersect: natural domain is $$-25 < a < 5$$.\n- Step 4: Check candidates: $$a = 20$$ violates $$a < 5$$ → reject. $$a = -25$$ violates $$a > -25$$ (strict) → also reject if both logs are involved, but if only one constraint, may survive. Either way, $$a = 20$$ is definitively rejected because it would force $$\\log(-15)$$.\n\nTakeaway: always state the natural domain *before* solving, so rejecting extraneous roots becomes mechanical, not improvised.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "What is the difference between a **rational** and an **irrational** number, and why is \"decimal goes on forever\" *not* a sufficient definition? (3 steps)", "answer": "- Step 1: A rational number is one expressible as $$\\tfrac{p}{q}$$ where $$p, q$$ are integers and $$q \\ne 0$$.\n- Step 2: An irrational number cannot be so expressed.\n- Step 3: \"Decimal goes on forever\" is misleading because $$\\tfrac{1}{3} = 0.333\\dots$$ has an infinite decimal but is rational. The defining feature of an irrational's decimal is that it is infinite **and non-repeating** (no eventual repeating block).\n\nTakeaway: rationality is about *expressibility as an integer ratio*, not decimal length.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "Why is $$\\tfrac{3}{7}$$ rational despite having an unfamiliar decimal expansion, and why is $$\\pi$$ irrational despite \"$$\\pi = \\tfrac{\\pi}{1}$$\"?", "answer": "$$\\tfrac{3}{7} = 0.\\overline{428571}$$ — a six-digit block that repeats forever. Any number whose decimal eventually settles into a repeating block can be written as a ratio of integers (there's a standard algebraic trick to recover the fraction). For $$\\pi$$: writing $$\\pi = \\tfrac{\\pi}{1}$$ doesn't satisfy the definition because the *numerator must be an integer*. $$\\pi$$ is not an integer, so this fails. The definition requires **both** numerator and denominator to be integers.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "Disprove by counterexample: \"If $$x$$ and $$y$$ are irrational with $$x \\ne y$$, then $$xy$$ is irrational.\" (3 steps)", "answer": "- Step 1: To disprove, find *one* pair $$(x, y)$$ where both are irrational, distinct, and $$xy$$ is rational.\n- Step 2: A bad attempt: $$x = \\sqrt{2}, y = \\sqrt{5}$$. Then $$xy = \\sqrt{10}$$, still irrational. Doesn't work.\n- Step 3: A working choice: $$x = \\sqrt{2}, y = 3\\sqrt{2}$$. Both irrational, distinct, and $$xy = 3 \\cdot 2 = 6$$, which is rational. ✓\n\nTakeaway: for a counterexample, you only need *one* witness — but you must verify all hypotheses (irrational, distinct) AND that the conclusion fails.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "What's wrong with writing \"let $$n = 2n + 1$$\" when representing an odd integer in a proof?", "answer": "You can't use the same letter on both sides — it's circular and produces a contradiction ($$0 = 1$$). The correct phrasing is: \"Let $$n = 2k + 1$$, where $$k \\in \\mathbb{Z}$$.\" Using a fresh letter ($$k$$) and explicitly stating it's an integer makes the algebraic manipulation valid and the proof rigorous.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "When asked to prove that the cube of an odd number is odd, what's the cubic-vs-square trap, and how do you set up the proof? (3 steps)", "answer": "- Step 1: Let odd $$= 2k+1$$ where $$k \\in \\mathbb{Z}$$.\n- Step 2: Cube it (not square it!): $$(2k+1)^3 = 8k^3 + 12k^2 + 6k + 1 = 2(4k^3 + 6k^2 + 3k) + 1$$.\n- Step 3: Since $$4k^3 + 6k^2 + 3k$$ is an integer, the result is of the form $$2m + 1$$ — i.e. odd. ∎\n\nTrap: students sometimes square instead of cube when the question asks about cubes — read the verb carefully.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "When you see the phrase \"$$(2x - 3)$$ is a factor of $$f(x)$$\", what mental algorithm should fire immediately?", "answer": "- Step 1: Recognise: keyword \"factor\" → factor theorem.\n- Step 2: Set the linear factor to zero: $$2x - 3 = 0 \\Rightarrow x = \\tfrac{3}{2}$$.\n- Step 3: Conclude: $$f\\!\\left(\\tfrac{3}{2}\\right) = 0$$ — this gives you an equation in the unknown coefficients of $$f$$.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "When you see the phrase \"the remainder when $$f(x)$$ is divided by $$(x - c)$$ is $$R$$\", what's the parallel algorithm?", "answer": "- Step 1: Keyword \"remainder\" → remainder theorem.\n- Step 2: $$f(c) = R$$ directly.\n- Step 3: This gives a second equation in the unknowns. Together with a factor-theorem equation, you can usually solve simultaneously.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Why is the geometric series sum $$\\dfrac{a(1-r^n)}{1-r}$$ derived using the trick \"$$S - rS$$\", and what does it reveal? (3 steps)", "answer": "- Step 1: Write $$S_n = a + ar + ar^2 + \\dots + ar^{n-1}$$.\n- Step 2: Multiply by $$r$$: $$rS_n = ar + ar^2 + \\dots + ar^n$$. Subtract: $$S_n - rS_n = a - ar^n$$ (all middle terms cancel).\n- Step 3: Factor: $$S_n(1-r) = a(1-r^n) \\Rightarrow S_n = \\dfrac{a(1-r^n)}{1-r}$$.\n\nTakeaway: the cancellation works because each term in $$rS_n$$ is \"shifted by one position\" relative to $$S_n$$ — a telescoping move.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Why does the substitution $$u = \\tfrac{a}{1-r}$$ make $$S_3 = u(1 - r^3)$$ a *one-line* equation, and what's the general principle?", "answer": "- Step 1: The geometric sum formula is $$S_n = \\tfrac{a}{1-r}(1 - r^n)$$. The first factor $$\\tfrac{a}{1-r}$$ is exactly $$S_\\infty$$ (when $$|r|<1$$).\n- Step 2: So *every* finite sum can be rewritten as $$S_n = S_\\infty (1 - r^n)$$ — an elegant relationship.\n\nGeneral principle: when a problem gives you $$S_\\infty$$ as a known quantity, *don't recompute it*; substitute it directly into the structure of $$S_n$$.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "For ESAT-style problems, why is the strategy \"underline keywords in the question\" worth the time it costs?", "answer": "ESAT questions are densely worded and tend to hide critical conditions in throwaway phrases like \"first four terms ascending\", \"simplest form\", \"exact value\", or \"state the value\". Missing one keyword often costs the final-answer accuracy mark even when all the algebra is correct. Underlining forces you to slow down precisely where students rush — at the *reading* stage — and ensures the final form of your answer matches what's being asked. It's a 5-second investment that protects multiple marks.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "Mental-maths trick for $$\\tfrac{70.2}{75}$$: how can you sanity-check it equals $$\\tfrac{117}{125}$$ without a calculator? (2 steps)", "answer": "- Step 1: Multiply numerator and denominator by appropriate factor. $$\\tfrac{70.2}{75} = \\tfrac{702}{750}$$ (×10/10).\n- Step 2: Simplify: divide by 6 → $$\\tfrac{117}{125}$$. Check: $$125 \\times 6 = 750$$ ✓ and $$117 \\times 6 = 702$$ ✓.\n\nUseful because $$\\tfrac{117}{125}$$ rearranges cleanly to $$1 - \\tfrac{8}{125} = 1 - \\left(\\tfrac{2}{5}\\right)^3$$ — a signal the problem wants $$r = \\tfrac{2}{5}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Why is $$\\sqrt[3]{\\tfrac{8}{125}} = \\tfrac{2}{5}$$ a great mental-maths check, and what general lesson does this teach about exam design?", "answer": "$$8 = 2^3$$ and $$125 = 5^3$$, so the cube root distributes: $$\\sqrt[3]{\\tfrac{8}{125}} = \\tfrac{2}{5}$$. Exam questions are designed so that the messy intermediate quantity ($$\\tfrac{8}{125}$$) cube-roots to a clean fraction — this is the examiner's way of saying \"you're on the right track.\" If your cube root, square root, or simplification produces an ugly decimal, you've probably made an arithmetic error upstream.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Why do we always state \"where $$k \\in \\mathbb{Z}$$\" (or equivalent) when introducing a variable in a proof, rather than just saying \"let $$n = 2k + 1$$\"?", "answer": "The form $$2k+1$$ only guarantees an *odd integer* if $$k$$ itself is an integer. If $$k$$ were any real number — say $$k = 0.5$$ — then $$2k+1 = 2$$, which is even, breaking the whole argument. Declaring \"$$k \\in \\mathbb{Z}$$\" pins down exactly what set $$k$$ is drawn from, making the proof watertight. In formal proof, an undeclared variable is an unstated assumption — and unstated assumptions lose marks.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "A simple geometric series check: $$a = 4$$, $$r = \\tfrac{1}{2}$$. What's $$S_\\infty$$, and what's $$S_3$$? Use the embedding trick.", "answer": "- Step 1: $$S_\\infty = \\tfrac{a}{1-r} = \\tfrac{4}{1/2} = 8$$.\n- Step 2: $$r^3 = \\tfrac{1}{8}$$, so $$1 - r^3 = \\tfrac{7}{8}$$.\n- Step 3: $$S_3 = S_\\infty (1 - r^3) = 8 \\cdot \\tfrac{7}{8} = 7$$.\n\nVerify directly: $$4 + 2 + 1 = 7$$ ✓. The embedding trick gives the same answer with no division — pure mental maths.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Probability sanity check: a biased die has faces 1–5 each with probability $$p = 0.15$$. What's $$P(\\text{6})$$, and is this distribution valid? (2 steps)", "answer": "- Step 1: $$P(6) = 1 - 5p = 1 - 0.75 = 0.25$$.\n- Step 2: All six probabilities are non-negative and sum to $$1$$ — valid distribution. Note that face 6 is more likely than any other single face, which is the \"biased\" part.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "Why is verifying $$|r| < 1$$ *before* applying $$S_\\infty = \\tfrac{a}{1-r}$$ not optional?", "answer": "The formula is only valid when the series converges, which requires $$|r| < 1$$. Plugging $$r = 2$$ into the formula gives $$S_\\infty = -a$$ — a finite-looking number that is completely meaningless, because the actual series $$a + 2a + 4a + \\dots$$ diverges. The formula is happy to spit out numbers in regimes where it shouldn't apply, so you must check the convergence condition yourself. This is the classic example of a formula being a *necessary* identity (when applicable) but not a *self-checking* one.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "In a \"two unknowns, two equations\" geometric series problem, why is it almost always more efficient to solve for $$r$$ first, then $$a$$?", "answer": "- Step 1: The non-linear unknown is $$r$$ (it appears as $$r^n$$). Once $$r$$ is pinned down, every formula becomes linear in $$a$$.\n- Step 2: Solving for $$a$$ first would still leave you with a non-linear equation in $$r$$, const SK='auto_maths_20260630_esat_p2_with_harry';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
