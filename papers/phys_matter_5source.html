Convert back to gauge by subtracting atmospheric: $$p_{2,\\text{gauge}} = p_{2,\\text{abs}} - 1.0\\times 10^5$$. The new gauge pressure is larger than the original gauge pressure by *more* than 10% (because the atmospheric subtraction removes a constant).\n\nTakeaway: always work with **absolute** pressures in gas laws.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_40"}, {"question": "What is upthrust? A wooden block of density 600 kg/mآ³ and volume 0.002 mآ³ is placed in water (دپ = 1000 kg/mآ³). Will it float or sink? Calculate the upthrust if it floats. (3 steps)", "answer": "- **Upthrust (buoyancy):** The upward force equal to the weight of fluid displaced: F_up = دپ_fluid أ— V_displaced أ— g\n- **Determine float/sink:**\n+ Compare densities: block (600 kg/mآ³) < water (1000 kg/mآ³)\n+ It will **float**, partially submerged.\n- **Calculate upthrust (when floating, upthrust = weight of block):**\n+ Mass = دپ أ— V = 600 أ— 0.002 = 1.2 kg\n+ Weight = mg = 1.2 أ— 9.81 = **11.8 N**\n+ Alternatively: upthrust = دپ_water أ— V_submerged أ— g. Since floating, upthrust equals weight.\n\n**Takeaway:** Objects float if دپ_object < دپ_fluid; sink if دپ_object > دپ_fluid. Floating objects displace their weight of fluid, not their volume.", "source": "MiniMax â‘،", "_id": "minimax_2_36"}, {"question": "On a heating curve, the regions between plateaus have positive slope (temperature rising), while the plateaus have zero slope. If you were given a heating curve for an unknown substance and asked to identify which regions involve phase changes, what feature would you look for? (2 steps)", "answer": "- Step 1: Look for **horizontal (flat) regions** where temperature is constant despite energy being supplied. These are the phase-change plateaus â€” the substance is transitioning between states, and all energy goes into PE (breaking bonds), not KE (raising temperature).\n- Step 2: The sloped regions (temperature rising) correspond to **single-phase heating** â€” the substance is entirely in one state (all solid, all liquid, or all gas) and energy goes into KE. The transitions between sloped and flat regions mark the start and end of each phase change. A longer flat region indicates a larger latent heat (more energy needed for that transition).", "source": "GLM 5.1 â‘،", "_id": "glm_2_45"}, {"question": "A sample of ideal gas at $$300\\,\\text{K}$$ has rms speed $$500\\,\\text{m/s}$$. If the temperature is raised to $$1200\\,\\text{K}$$, what is the new rms speed? No calculator needed. (2 steps)", "answer": "- Step 1: Since $$c_{\\text{rms}} \\propto \\sqrt{T}$$, the ratio of rms speeds is $$c_2/c_1 = \\sqrt{T_2/T_1} = \\sqrt{1200/300} = \\sqrt{4} = 2$$.\n- Step 2: The new rms speed is $$2 \\times 500 = 1000\\,\\text{m/s}$$. Note: the temperature quadrupled, but the speed only doubled. If you had mistakenly assumed $$c_{\\text{rms}} \\propto T$$, you would have gotten $$2000\\,\\text{m/s}$$â€”which is wrong. KE would quadruple, which is correct since $$\\bar{E}_k \\propto T$$.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_50"}, {"question": "Why does the specific heat capacity formula $$\\Delta E = mc\\Delta\\theta$$ give a nonsensical answer (zero) during a phase change, and what formula must you use instead? (2 steps)", "answer": "- Step 1: During a phase change (e.g., melting at $$0آ°C$$ or boiling at $$100آ°C$$), the temperature does not change â€” $$\\Delta\\theta = 0$$. Substituting into $$\\Delta E = mc\\Delta\\theta$$ gives $$\\Delta E = 0$$, which is clearly wrong because energy IS being supplied to break bonds.\n- Step 2: Instead, use $$\\Delta E = L\\Delta m$$, where $$L$$ is the specific latent heat (fusion for melting, vaporisation for boiling) and $$\\Delta m$$ is the mass changing phase. This formula has no temperature-change term because the energy goes into potential energy (bond breaking), not kinetic energy (temperature rise).\n\nThis is Trap 8 â€” the most common formula confusion in this topic.", "source": "GLM 5.1 â‘،", "_id": "glm_2_32"}, {"question": "Why is the boiling plateau on a heating curve much wider (more energy needed) than the melting plateau, in terms of intermolecular forces? (3 steps)", "answer": "- Step 1: At melting, you only need to loosen the lattice enough for molecules to slide past each other. Most of the intermolecular forces are still acting â€” the molecules remain close.\n- Step 2: At boiling, the molecules must be **fully separated** from one another, escaping intermolecular forces almost entirely.\n- Step 3: For water, this gives $$L_v \\approx 2.26\\,\\text{MJ/kg}$$ vs. $$L_f \\approx 334\\,\\text{kJ/kg}$$ â€” a ratio of about 7, reflecting how much more bond-energy work is needed for vaporisation.\n\nTakeaway: melting loosens; boiling liberates.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_7"}, {"question": "Starting from the kinetic theory result pV = (1/3)Nmج„cآ², derive the relationship between average molecular kinetic energy and temperature. Show all steps. (3 steps)", "answer": "- Step 1: We have two expressions for pV:\n+ From kinetic theory: pV = (1/3)Nmج„cآ²\n+ From ideal gas: pV = NkT\n\n- Step 2: Set equal and cancel N:\n+ (1/3)Nmج„cآ² = NkT â†’ (1/3)mج„cآ² = kT\n\n- Step 3: Multiply both sides by 3/2:\n+ (1/2)mج„cآ² = (3/2)kT\n\n**The left-hand side (آ½mج„cآ²) is the average translational kinetic energy of one molecule.**\nSo: **E_k = (3/2)kT**\n\n- This shows that **average molecular KE is directly proportional to absolute temperature**, regardless of the gas's molecular mass.\n\n**Takeaway:** This is the key link between the microscopic world (molecular motion) and macroscopic measurement (temperature). Doubling T in K doubles the average KE.", "source": "MiniMax â‘،", "_id": "minimax_2_18"}, {"question": "Edge case: at very high temperature, can we still apply $$pV = nRT$$ to a real gas? Why or why not?", "answer": "- Step 1: High temperature is generally *good* for ideal gas behaviour â€” molecules have so much KE that any intermolecular PE is negligible by comparison.\n- Step 2: However, at extreme temperatures, molecules may dissociate into atoms or even ionise into plasma. In that case, $$N$$ changes (you no longer have the same number of \"particles\" you started with), so simple $$pV = NkT$$ with the original $$N$$ fails.\n- Step 3: So \"high $$T$$\" helps ideality up to a point, but at extreme $$T$$ chemistry/dissociation kicks in. The ideal gas law works best in a moderate window: hot enough to ignore PE, cold enough to avoid dissociation.", "source": "Opus 4.7 â‘،", "_id": "opus_2_52"}, {"question": "The molar mass $$M$$ of a gas appears in the formula $$c_{\\text{rms}} = \\sqrt{3RT/M}$$. If gas A has molar mass $$4\\text{ g.mol}^{-1}$$ (helium) and gas B has molar mass $$32\\text{ g.mol}^{-1}$$ (oxygen), compare their rms speeds at the same temperature qualitatively. (2 steps)", "answer": "- Step 1: From $$c_{\\text{rms}} = \\sqrt{3RT/M}$$, rms speed is **inversely proportional to the square root of molar mass**: $$c_{\\text{rms}} \\propto 1/\\sqrt{M}$$. Heavier molecules move slower at the same temperature.\n- Step 2: The ratio of speeds: $$c_{\\text{rms,He}}/c_{\\text{rms,O}_2} = \\sqrt{M_{\\text{O}_2}/M_{\\text{He}}} = \\sqrt{32/4} = \\sqrt{8} \\approx 2.83$$. Helium molecules are about **3 times faster** than oxygen molecules at the same temperature, despite having the same average KE. This is why lighter gases diffuse faster and effuse faster (Graham's law).", "source": "GLM 5.1 â‘ ", "_id": "glm_1_65"}, {"question": "A gas at room temperature has rms speed around 500 m/s (for typical air). Quick reasonableness check: how does this compare to the speed of sound, and why? (3 steps)", "answer": "- Step 1: Speed of sound in air at room temperature is about 340 m/s â€” same order of magnitude as the rms speed, slightly slower.\n- Step 2: This makes physical sense: sound propagates as a pressure wave through molecular collisions. The signal can't propagate faster than the molecules themselves carry it.\n- Step 3: Sound is slightly slower because not every molecule's motion contributes directly to wave propagation â€” there's some averaging and directionality. But the ratio is small ($$\\sim 2/3$$), confirming the kinetic-theory picture.\n\nTakeaway: molecular speeds set the upper bound for sound speed in a gas.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_66"}, {"question": "A gas is at $$300\\text{ K}$$ and $$1.0 \\times 10^5\\text{ Pa}$$ in a volume of $$0.025\\text{ m}^3$$. It is heated to $$450\\text{ K}$$ while pressure is increased to $$1.5 \\times 10^5\\text{ Pa}$$. Without doing a full calculation, determine whether the new volume is larger, smaller, or the same as the original, and explain the reasoning. (2 steps)", "answer": "- Step 1: Use the combined gas law: $$V_2 = V_1 \\times (p_1/p_2) \\times (T_2/T_1)$. The pressure ratio is $$1.0/1.5 = 2/3$$ (pressure increased â†’ volume tends to decrease). The temperature ratio is $$450/300 = 3/2$$ (temperature increased â†’ volume tends to increase).\n- Step 2: The two ratios exactly cancel: $$V_2 = V_1 \\times (2/3) \\times (3/2) = V_1 \\times 1 = V_1$$. The volume stays the **same** â€” the pressure increase and temperature increase have opposing effects that perfectly compensate. This illustrates how the three variables are interlinked: changing two can leave the third unchanged.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_29"}, {"question": "Evaporation and boiling both produce gas from liquid, but they are fundamentally different processes. Contrast them in terms of (a) where they happen, (b) at what temperature, and (c) which molecules escape. (3 steps)", "answer": "- Step 1: **Where**: Boiling happens throughout the **bulk** of the liquid â€” bubbles of vapour form inside the liquid and rise to the surface. Evaporation happens only at the **surface** â€” molecules escape from the top layer into the air above.\n- Step 2: **Temperature**: Boiling occurs at a specific temperature (the boiling point), when the vapour pressure of the liquid equals atmospheric pressure. Evaporation occurs at **any temperature** â€” even cold water slowly evaporates, just more slowly than hot water.\n- Step 3: **Which molecules**: In evaporation, only the **highest-energy molecules** in the tail of the Maxwellâ€“Boltzmann speed distribution have enough KE to escape the surface attraction. In boiling, the average KE is high enough that vapour pressure matches atmospheric pressure, and molecules throughout the liquid can enter the gas phase.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_9"}, {"question": "Why is the assumption that molecular collisions are \"elastic\" essential to ideal gas behaviour? (3 steps)", "answer": "- Step 1: If collisions were inelastic, every wall collision would steal some KE from the gas, transferring it to thermal vibrations of the wall.\n- Step 2: That would mean the gas would gradually cool down even in a thermally isolated container, contradicting the pressure law $$p \\propto T$$ being stable.\n- Step 3: Elastic collisions ensure the total KE of the gas is conserved between collisions with the surroundings, allowing a stable equilibrium with well-defined $$T$$ and $$p$$.\n\nIn reality, gas-wall collisions are statistically elastic at equilibrium because the wall and gas have the same temperature â€” there's no net energy flow.", "source": "Opus 4.7 â‘،", "_id": "opus_2_51"}, {"question": "During the melting plateau of a heating curve, is the internal energy of the substance increasing, decreasing, or staying constant? Explain which component changes and which doesn't. (2 steps)", "answer": "- Step 1: Internal energy **U is increasing** â€” energy is being continuously supplied to the substance. The KE component stays constant (temperature is unchanged, so average molecular KE is unchanged). The PE component is increasing (bonds are being broken, molecules are gaining separation and configurational freedom).\n- Step 2: This is the key distinction that trips students up: temperature constant â‰  internal energy constant. Temperature only tracks KE. During a phase change, the \"missing\" energy goes into PE. The total U = KE + PE rises even though the KE part is flat.", "source": "GLM 5.1 â‘،", "_id": "glm_2_12"}, {"question": "A storage cylinder contains an ideal gas at known $$p$$, $$V$$, $$T$$. Without doing the arithmetic, describe how you would find the number of molecules. (3 steps)", "answer": "- Step 1: Use $$pV = NkT$$, where $$N$$ is the number of molecules and $$k = 1.38\\times 10^{-23}\\,\\text{J K}^{-1}$$.\n- Step 2: Convert any non-SI units: pressure to Pa, volume to $$\\text{m}^3$$, temperature to K (add 273 to Celsius).\n- Step 3: Rearrange: $$N = pV/(kT)$$. For a typical cylinder at high pressure, expect $$N$$ on the order of $$10^{25}$$ molecules â€” Avogadro-scale.\n\nTakeaway: $$N = pV/kT$$, all in SI.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_39"}, {"question": "Misconception probe: A student says \"internal energy and temperature are basically the same thing.\" Give two counterexamples showing they can change independently. (2 steps)", "answer": "- Step 1: **Counterexample 1**: Ice melting at $$0آ°C$$ â€” internal energy increases (energy is being added) but temperature stays constant at $$0آ°C$$. U changes, T doesn't.\n- Step 2: **Counterexample 2**: Two samples of water at $$50آ°C$$ â€” one has $$1\\text{kg}$$, the other has $$10\\text{kg}$$. Same temperature (same average KE per molecule), but the $$10\\text{kg}$$ sample has 10أ— more internal energy (10أ— more molecules, each with the same average KE). Same T, different U. Temperature measures average KE per molecule; internal energy is the total KE + PE of all molecules. They're related but distinct.", "source": "GLM 5.1 â‘،", "_id": "glm_2_82"}, {"question": "How is temperature related to the kinetic energy of particles in a substance?", "answer": "Temperature is a measure of the average kinetic energy of the molecules in a substance. It does not depend on the potential energy of the system.", "source": "Qwen 3 â‘ ", "_id": "qwen_1_2"}, {"question": "Why does a balloon filled with helium rise in air? Use concepts of upthrust and density.", "answer": "- A balloon rises because the **upthrust (weight of displaced air) is greater than the weight of the helium inside**.\n- Upthrust = دپ_air أ— V أ— g\n- Balloon weight = دپ_He أ— V أ— g (helium density + balloon material)\n- Since دپ_air > دپ_He, upthrust > weight, giving a net upward force.\n- As the balloon rises, air density decreases (at higher altitude), eventually balancing â€” this determines the maximum altitude.\n\n**Takeaway:** For any object in a fluid (including gas), it rises if دپ_object < دپ_fluid. This is fundamentally Archimedes' principle applied to gases.", "source": "MiniMax â‘،", "_id": "minimax_2_37"}, {"question": "Why does boiling water require dramatically more energy than melting the same mass of ice, even though both happen at constant temperature?", "answer": "- Step 1: **Melting** only loosens the lattice so molecules can slide past each other â€” intermolecular forces are still largely present in the liquid.\n- Step 2: **Boiling** requires the molecules to be completely separated from one another â€” virtually all intermolecular forces must be overcome.\n- Step 3: For water, $$L_v \\approx 2.26\\,\\text{MJ/kg}$$ and $$L_f \\approx 334\\,\\text{kJ/kg}$$, so $$L_v / L_f \\approx 7$$. Boiling needs ~7أ— more energy per kg.\n\nThis is why boiling a kettle takes much longer than warming the water to the boil.", "source": "Opus 4.7 â‘،", "_id": "opus_2_12"}, {"question": "The combined gas law $$p_1 V_1 / T_1 = p_2 V_2 / T_2$$ is used when all three variables change simultaneously. Derive it by combining the three individual gas laws, showing which two you apply first and which third. (3 steps)", "answer": "- Step 1: Start with state 1 ($$p_1, V_1, T_1$$) and change temperature to $$T_2$$ at constant pressure (Charles's law): $$V' = V_1 \\times T_2/T_1$$. This gives an intermediate state ($$p_1, V', T_2$$).\n- Step 2: Now change pressure from $$p_1$$ to $$p_2$$ at constant temperature $$T_2$$ (Boyle's law): $$p_1 V' = p_2 V_2$$, so $$V_2 = V' \\times p_1/p_2 = V_1 \\times (T_2/T_1) \\times (p_1/p_2)$$.\n- Step 3: Rearranging: $$p_1 V_1 / T_1 = p_2 V_2 / T_2$$. The constant $$pV/T$$ is the same for any state of the same gas sample, which is exactly $$nR$$ (or $$Nk$$) from the ideal gas equation. The combined law is just $$pV = nRT$$ applied to two different states of the same gas sample.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_58"}, {"question": "During a phase change (e.g., melting), energy is being supplied to the substance. Does the internal energy increase, decrease, or stay constant? And does the temperature increase, decrease, or stay constant? Explain the apparent contradiction. (3 steps)", "answer": "- Step 1: **Internal energy increases**. Energy is being added to the system (via heating), so $$U$$ must rise. There is no contradiction â€” $$U$$ genuinely goes up.\n- Step 2: **Temperature stays constant**. The supplied energy goes into breaking intermolecular bonds, which increases the **potential energy** of the molecules. The kinetic energy (and hence temperature) does not change during the transition.\n- Step 3: The apparent contradiction arises from confusing $$U$$ with $$T$$. Temperature only reflects the KE component. During a phase change, the PE component rises while KE stays fixed, so $$U$$ rises but $$T$$ plateaus. This is exactly what the flat sections of a heating curve show.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_5"}, {"question": "In a Boyle's law experiment, you plot $$p$$ vs. $$V$$ and get a curve. To verify Boyle's law more clearly, you could plot $$p$$ vs. $$1/V$$ instead. What should this graph look like if Boyle's law holds, and why? (2 steps)", "answer": "- Step 1: If $$pV = \\text{constant}$$, then $$p = \\text{constant}/V = \\text{constant} \\times (1/V)$$. This is the equation of a **straight line through the origin** with slope equal to the constant $$pV$$.\n- Step 2: Plotting $$p$$ vs. $$1/V$$ linearises the relationship: instead of a hyperbola (hard to judge by eye), you get a straight line (easy to verify). If the data points fall on a straight line through the origin, Boyle's law is confirmed. Any deviation from the line indicates experimental error or non-ideal behaviour. This linearisation technique is standard for verifying inverse proportionality.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_56"}, {"question": "If you double the absolute temperature of a gas (e.g., from $$300\\text{ K}$$ to $$600\\text{ K}$$), what happens to (a) average molecular KE, and (b) rms speed? Explain why the two answers are different. (3 steps)", "answer": "- Step 1: (a) Average KE **doubles**: $$\\langle E_k \\rangle = \\frac{3}{2}kT$$, so doubling $$T$$ doubles $$\\langle E_k \\rangle$$. This is a direct proportionality.\n- Step 2: (b) RMS speed increases by a factor of $$\\sqrt{2} \\approx 1.41$$, **not by a factor of 2**: $$c_{\\text{rms}} = \\sqrt{3kT/m}$$, so $$c_{\\text{rms}} \\propto \\sqrt{T}$$. Doubling $$T$$ gives $$c_{\\text{rms,2}} = c_{\\text{rms,1}} \\times \\sqrt{T_2/T_1} = c_{\\text{rms,1}} \\times \\sqrt{2}$$.\n- Step 3: The answers differ because KE depends on $$\\langle c^2 \\rangle$$ (the **square** of speed), not on speed directly. If $$c_{\\text{rms}}$$ increases by $$\\sqrt{2}$$, then $$\\langle c^2 \\rangle$$ increases by $$2$$ (since $$\\langle c^2 \\rangle = c_{\\text{rms}}^2$$), and KE increases by 2. The square-root relationship means speed responds more slowly to temperature changes than energy does. **Common trap: don't say \"doubling T doubles the speed.\"**", "source": "GLM 5.1 â‘ ", "_id": "glm_1_24"}, {"question": "If you double the absolute temperature of an ideal gas, how does the rms speed change, and why is the answer not \"doubles\"? (3 steps)", "answer": "- Step 1: From $$c_{rms} = \\sqrt{3kT/m}$$, the rms speed depends on $$\\sqrt{T}$$, not on $$T$$ directly.\n- Step 2: Doubling $$T$$ multiplies $$c_{rms}$$ by $$\\sqrt{2} \\approx 1.41$$, not by 2.\n- Step 3: What *does* double is the average kinetic energy ($$\\langle E_k\\rangle = \\tfrac{3}{2}kT \\propto T$$). The KE is linear in T; the speed is the square root of KE per molecule, hence square root of T.\n\nTakeaway: KE scales with T; speed scales with âˆڑT.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_26"}, {"question": "A student says \"phase change is a chemical reaction because the substance changes.\" Why is this wrong, and what is the correct classification? (2 steps)", "answer": "- Step 1: Phase change is a **physical change**, not a chemical one. The molecules/atoms are identical before and after â€” Hâ‚‚O molecules in ice are the same Hâ‚‚O molecules in steam. No chemical bonds within the molecules are broken; only the *intermolecular* arrangement and forces change.\n- Step 2: In a chemical reaction, the molecular identity changes (e.g., Hâ‚‚ + Oâ‚‚ â†’ Hâ‚‚O â€” new substance formed). In a phase change, the substance is the same; only its energy state and particle arrangement differ. The simulation in the lesson showed this clearly â€” heating neon just made the same neon atoms move faster and spread out, not transform into a different element.", "source": "GLM 5.1 â‘،", "_id": "glm_2_64"}, {"question": "In the kinetic theory derivation, we assumed the container is a cube. Does the result $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$ depend on the container shape? Why or why not? (2 steps)", "answer": "- Step 1: The result does **not** depend on the container shape. Although we derived it for a cube (using side length $$L$$ and area $$L^2$$), the final expression $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$ contains only $$V$$ (volume) â€” no shape-dependent terms remain.\n- Step 2: The isotropy argument ($$\\langle v_x^2\\rangle = \\frac{1}{3}\\langle c^2\\rangle$$) holds for any shape â€” molecules move equally in all directions regardless of container geometry. For a non-cubic container, the derivation is more complex (different wall areas, different distances), but averaging over all walls and all directions always yields the same result. Pressure is isotropic, so the shape doesn't matter.", "source": "GLM 5.1 â‘،", "_id": "glm_2_56"}, {"question": "Why does evaporation cause cooling of the remaining liquid? (2 steps)", "answer": "- Step 1: In any liquid at a given temperature, molecules have a range of speeds (the Maxwellâ€“Boltzmann distribution). Only the fastest moleculesâ€”those in the high-energy tailâ€”have enough KE to overcome intermolecular attractions at the surface and escape into the gas phase.\n- Step 2: When these high-energy molecules leave, the average KE of the remaining molecules decreases (you've removed the fastest ones). Since temperature is a measure of average KE, the temperature of the remaining liquid drops. This is why sweating cools you: the fastest water molecules evaporate, taking energy away from your skin.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_60"}, {"question": "During a phase change (e.g., melting or boiling), why does temperature stay constant even when energy is being supplied? (3 steps)", "answer": "- Step 1: When a substance changes phase, the **energy supplied is used to break (or form) intermolecular bonds**, not to increase the kinetic energy of the molecules.\n- Step 2: Since temperature is a measure of **average kinetic energy only**, and kinetic energy is not changing during the phase change, the **temperature remains constant**.\n+ This appears as a **flat plateau** on a heating curve â€” the energy goes into **potential energy** (increasing separation), not kinetic energy.\n- Step 3: This is why boiling requires much more energy than melting (for water, L_v â‰ˆ 2.26 MJ/kg vs L_f â‰ˆ 334 kJ/kg â€” about 7أ— more).", "source": "MiniMax â‘ ", "_id": "minimax_1_5"}, {"question": "State Archimedes' principle, and explain the difference between what happens to upthrust when an object floats vs when it sinks. (3 steps)", "answer": "- Step 1: **Archimedes' principle**: The upward buoyant force (upthrust) on an object immersed in a fluid equals the **weight of the fluid displaced**: $$F_b = \\rho_{fluid} \\cdot V_{displaced} \\cdot g$$.\n- Step 2: **Floating**: The object displaces exactly enough fluid so that upthrust equals the object's weight. The object sits partially submerged â€” it rises until $$F_b = mg$$. **Sinking**: The object displaces its own volume of fluid, but that fluid's weight is less than the object's weight. Upthrust < weight, so there's a net downward force and the object sinks to the bottom.\n- Step 3: The critical distinction: upthrust depends on the **fluid's** density and the **displaced volume**, NOT on the object's mass or density. A heavy steel ship floats because its shape displaces a huge volume of water (making $$F_b$$ large), while a small steel ball sinks because it displaces very little water relative to its weight.", "source": "GLM 5.1 â‘،", "_id": "glm_2_38"}, {"question": "Sketch a heating curve for water from âˆ’20آ°C to 120آ°C, showing temperature vs. energy supplied. Label all five regions and explain what is happening at each plateau. (3 steps)", "answer": "- Step 1: Regions on the curve:\n1. **Heating solid ice:** Temperature rises from âˆ’20آ°C to 0آ°C (KE increasing)\n2. **Melting plateau (0آ°C):** Flat â€” solid turning to liquid, temperature constant\n3. **Heating liquid water:** Temperature rises from 0آ°C to 100آ°C (KE increasing)\n4. **Boiling plateau (100آ°C):** Flat â€” liquid turning to gas, temperature constant\n5. **Heating steam:** Temperature rises from 100آ°C to 120آ°C (KE increasing)\n\n- Step 2: What happens at plateaus:\n+ At 0آ°C (melting): Energy breaks lattice bonds partially â€” molecules gain PE but not KE â†’ T constant\n+ At 100آ°C (boiling): Energy completely overcomes intermolecular forces â€” full separation â†’ PE increases, KE constant â†’ T constant\n\n- Step 3: The boiling plateau is much longer than melting because L_v â‰ˆ 2.26 MJ/kg is about 7أ— larger than L_f â‰ˆ 334 kJ/kg â€” more energy needed to fully separate molecules.\n\n**Takeaway:** The heating curve visualizes the distinction between heating (KE increases) and phase changes (PE increases at constant T).", "source": "MiniMax â‘،", "_id": "minimax_2_39"}, {"question": "Define root-mean-square (rms) speed. Why do we use rms speed rather than average speed or average velocity for gas molecules?", "answer": "- **Definition:** c_rms = âˆڑ(cآ²) â€” the square root of the mean of the squared speeds. It's the speed of a molecule having the \"typical\" kinetic energy.\n- **Why not average velocity?** The **average velocity is zero** â€” molecules move equally in all directions, so the vector sum cancels out.\n- **Why not average speed?** Average speed (cج„) is useful, but **rms speed** directly connects to kinetic energy: E_k = (1/2)m(c_rms)آ². The rms accounts for the spread â€” faster molecules contribute disproportionately to the squared term, giving a more accurate measure of typical energy.\n- The rms speed is always greater than or equal to the mean speed (they're equal only if all molecules have identical speeds).\n\n**Takeaway:** Use rms speed because it links directly to kinetic energy and temperature via E_k = (1/2)m(c_rms)آ² = (3/2)kT.", "source": "MiniMax â‘،", "_id": "minimax_2_20"}, {"question": "Roughly how much more energy does it take to boil away a mass of water than to warm that mass from 0 to 100 آ°C, and what does this tell you intuitively? (3 steps)", "answer": "- Step 1: Warming from 0 to 100 $$^\\circ\\text{C}$$: $$\\Delta E_1 = m c \\Delta\\theta = m \\cdot 4200 \\cdot 100 \\approx 4.2 \\times 10^5\\,m$$ J.\n- Step 2: Boiling at 100 $$^\\circ\\text{C}$$: $$\\Delta E_2 = m L_v \\approx 2.26 \\times 10^6\\,m$$ J.\n- Step 3: Ratio $$\\approx 5\\!:\\!1$$ â€” boiling away takes about five times more energy than heating from freezing to boiling.\n\nTakeaway: this is why a kettle takes seconds to get hot but minutes to actually boil dry â€” the boiling step dominates.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_15"}, {"question": "A substance has specific heat capacity $$c = 2000\\text{Jآ·kg}^{-1}\\text{آ·K}^{-1}$$ and specific latent heat of fusion $$L_f = 300\\text{kJآ·kg}^{-1}$$. To heat $$1\\text{kg}$$ of this solid from $$-10آ°C$$ to just above $$0آ°C$$ (its melting point), roughly how much energy is needed for each stage? Which stage requires more? (2 steps)", "answer": "- Step 1: Heating the solid from $$-10آ°C$$ to $$0آ°C$$: $$\\Delta E_1 = mc\\Delta\\theta = 1 \\times 2000 \\times 10 = 20{,}000\\text{J} = 20\\text{kJ}$$.\n- Step 2: Melting at $$0آ°C$$: $$\\Delta E_2 = L_f \\times \\Delta m = 300 \\times 1 = 300\\text{kJ}$$. The melting step requires **15 times more energy** than the heating step â€” $$300\\text{kJ}$$ vs $$20\\text{kJ}$$. This is typical: latent heats are usually much larger than the sensible heat needed for a few degrees of temperature change, which is why phase changes dominate energy budgets.", "source": "GLM 5.1 â‘،", "_id": "glm_2_68"}, {"question": "Why is the average velocity of gas molecules zero, but the average speed and root-mean-square speed are not?", "answer": "- Step 1: The average velocity is zero because molecules move in all directions equally, canceling out.\n- Step 2: The average speed is the mean of the magnitudes of velocities, which is always positive.\n- Step 3: The root-mean-square speed accounts for both the magnitude and the distribution of speeds, making it a better measure of the typical molecular speed.\n\n[Optional: one-sentence takeaway: The directional nature of velocity leads to a zero average, while speed and rms speed provide meaningful measures of molecular motion.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_19"}, {"question": "Why is the Kelvin scale anchored at absolute zero? (3 steps)", "answer": "- Step 1: **Zero KE**  \n  Absolute zero ($ 0 \\, \\text{K} $) corresponds to minimum molecular KE.  \n\n- Step 2: **No Negative Temperatures**  \n  Avoids nonsensical negative values in gas laws (e.g., $ pV = nRT $).  \n\n- Step 3: **Proportional Scaling**  \n  Doubling $ T $ in Kelvin doubles average KE, ensuring validity of $ T \\propto \\langle E_k \\rangle $.", "source": "Qwen 3 â‘،", "_id": "qwen_2_13"}, {"question": "When ice melts at $$0آ°C$$, the internal energy increases but the temperature doesn't change. When water is heated from $$0آ°C$$ to $$100آ°C$$, both internal energy and temperature increase. Explain the difference in terms of which energy component changes in each case. (2 steps)", "answer": "- Step 1: **During melting**: KE is constant (temperature unchanged), PE increases (bonds breaking â†’ molecules gain separation freedom). So U increases via the PE component only.\n- Step 2: **During heating liquid water**: PE is roughly constant (the substance stays liquid â€” bonds are continuously breaking and reforming at about the same rate), while KE increases (molecules speed up â†’ temperature rises). So U increases via the KE component. The different behaviour explains why the heating curve has plateaus (PE-only changes) and slopes (KE-only changes).", "source": "GLM 5.1 â‘،", "_id": "glm_2_66"}, {"question": "Define internal energy and state what two components contribute to it. (2 steps)", "answer": "- Step 1: **Internal energy (U)** is defined as the **sum of the kinetic and potential energies of all the molecules within a given mass of a substance**.\n- Step 2: It has two contributions:\n  + **Kinetic energy (KE)** â€” due to the motion of molecules (translation, rotation, vibration)\n  + **Potential energy (PE)** â€” due to intermolecular forces and molecular separation", "source": "MiniMax â‘ ", "_id": "minimax_1_1"}, {"question": "Synthesis question: explain why, at room temperature, helium atoms move at hundreds of m/s yet helium remains gaseous, while iron atoms move at zero translational speed yet iron remains solid. (3 steps)", "answer": "- Step 1: At a given temperature, all molecules have the same average KE: $$\\tfrac{3}{2}kT$$. But the *speed* depends on mass: lighter atoms move faster.\n- Step 2: Helium atoms are light AND have very weak intermolecular forces. Their KE far exceeds the intermolecular PE barrier, so they fly apart â†’ gas.\n- Step 3: Iron atoms are heavy AND have very strong metallic bonds. Their thermal KE (still $$\\tfrac{3}{2}kT$$, but small motion of heavy atoms) is far less than the bond energies, so atoms vibrate in place â†’ solid.\n\nSo \"state of matter\" is set by the **ratio of thermal KE to bond energy**, not by KE alone.", "source": "Opus 4.7 â‘،", "_id": "opus_2_49"}, {"question": "Walk through the derivation of $$pV = \\tfrac{1}{3} N m \\langle c^2 \\rangle$$ from the motion of a single molecule colliding elastically with the wall of a cubic box. (5 steps)", "answer": "- Step 1: Consider $$N$$ molecules of mass $$m$$ in a cube of side $$L$$ (volume $$V = L^3$$). A molecule with velocity component $$v_x$$ hits a wall perpendicular to $$x$$; elastic collision reverses it. Momentum change per hit: $$\\Delta p = 2 m v_x$$.\n- Step 2: Time between successive hits on the same wall: the molecule must travel $$2L$$ (across and back), so $$\\Delta t = 2L / v_x$$.\n- Step 3: Force from one molecule: $$F_1 = \\Delta p / \\Delta t = (2 m v_x)/(2L/v_x) = m v_x^2 / L$$. Summing over $$N$$ molecules and averaging: $$F = N m \\langle v_x^2\\rangle / L$$.\n- Step 4: Pressure on the wall: $$p = F/L^2 = N m \\langle v_x^2\\rangle / L^3 = N m \\langle v_x^2\\rangle / V$$.\n- Step 5: By isotropy (motion equally distributed across 3 directions), $$\\langle v_x^2\\rangle = \\tfrac{1}{3}\\langle c^2\\rangle$$, giving $$pV = \\tfrac{1}{3} N m \\langle c^2 \\rangle$$.\n\nTakeaway: pressure is just momentum transfer rate per area, averaged over many molecules.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_21"}, {"question": "The average velocity $$\\langle v \\rangle$$ of gas molecules is zero, but the root-mean-square speed $$c_{\\text{rms}}$$ is nonzero. Why is $$\\langle v \\rangle = 0$$, and why do we need rms speed instead? (2 steps)", "answer": "- Step 1: $$\\langle v \\rangle = 0$$ because velocity is a **vector** â€” it includes direction. In a gas at equilibrium, molecules move in all directions equally (isotropy). For every molecule moving right, there's one moving left; their velocities cancel. The vector average is zero regardless of how fast they're moving.\n- Step 2: We need $$c_{\\text{rms}} = \\sqrt{\\langle c^2 \\rangle}$$ because **speed** (the magnitude, always positive) doesn't cancel. Squaring each speed before averaging eliminates the sign problem (negative velocities become positive squares), and then taking the square root gives a meaningful typical speed. $$c_{\\text{rms}}$$ is the quantity that appears in kinetic theory and is proportional to $$\\sqrt{T}$$.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_23"}, {"question": "Why is the average velocity of gas molecules zero, but the average speed and rms speed are non-zero? (3 steps)", "answer": "- Step 1: **Vector vs. Scalar**  \n  Average velocity $ \\langle v \\rangle $ is a vector sum, canceling directions.  \n\n- Step 2: **Speed and RMS**  \n  Average speed $ \\langle c \\rangle $ and $ c_{\\text{rms}} $ are scalar magnitudes, unaffected by direction.  \n\n- Step 3: **Kinetic Theory Use**  \n  $ c_{\\text{rms}} $ is used in $ pV = \\frac{1}{3}Nm\\overline{c^2} $ because it incorporates squared speeds for pressure calculations.", "source": "Qwen 3 â‘،", "_id": "qwen_2_18"}, {"question": "An ideal gas has negligible intermolecular forces. What consequence does this have for the potential energy of its molecules, and how does this simplify the expression for internal energy of an ideal gas? (2 steps)", "answer": "- Step 1: If intermolecular forces are negligible (except during brief collisions), the molecules don't attract or repel each other at any significant distance. There are no bonds to stretch or compress, so the **potential energy between molecules is effectively zero** at all times (outside the instant of collision).\n- Step 2: Since $$U = \\sum(KE_i + PE_i)$$ and $$PE \\approx 0$$ for an ideal gas, the internal energy simplifies to $$U = \\sum KE_i = N \\times \\frac{3}{2}kT = \\frac{3}{2}NkT$$. For an ideal gas, **internal energy is purely kinetic** and depends only on temperature. This is why, for an ideal gas, changing temperature always changes $$U$$, and there are no phase changes (no bonds to break).", "source": "GLM 5.1 â‘ ", "_id": "glm_1_40"}, {"question": "On a heating curve for water, the boiling plateau is much longer (wider) than the melting plateau. Explain this in terms of what is happening at the molecular level. (2 steps)", "answer": "- Step 1: At the **melting plateau**, energy goes into partially breaking the latticeâ€”loosening the structure so molecules can slide past each other. The intermolecular forces are weakened but not eliminated; molecules in the liquid still attract each other strongly.\n- Step 2: At the **boiling plateau**, energy goes into completely separating molecules from each otherâ€”overcoming all remaining intermolecular attractions so molecules can move independently. This requires far more energy per molecule (roughly 7أ— for water), so more total energy must be supplied at the boiling plateau, making it wider on the energy axis.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_61"}, {"question": "Describe the particle arrangement, intermolecular bonds, and motion for a solid. (3 steps)", "answer": "- Step 1: Arrangement â€” particles in a solid are **close together** in a **regular/ordered pattern** (lattice structure).\n- Step 2: Bonds â€” **strong** intermolecular forces hold particles in position; these are strong enough to maintain the fixed shape.\n+ For most substances, particles get closer together when solidifying (water is the exception â€” ice is less dense than liquid water).\n- Step 3: Motion â€” particles **vibrate about fixed positions**; they do not translate or flow. Even at room temperature, solid particles are always vibrating â€” only at absolute zero (0 K) would vibration theoretically stop.\n\n**Takeaway:** Solids have definite shape and volume because particles are locked in place by strong bonds, only able to vibrate in position.", "source": "MiniMax â‘،", "_id": "minimax_2_0"}, {"question": "At the same temperature, helium atoms and oxygen molecules have the same average kinetic energy. Yet helium atoms move much faster. Explain why, using the relationship between mass, KE, and speed. (2 steps)", "answer": "- Step 1: From $$\\langle E_k \\rangle = \\frac{1}{2}m\\langle c^2 \\rangle = \\frac{3}{2}kT$$, at the same $$T$$, both species have the same $$\\langle E_k \\rangle$$. But $$\\langle c^2 \\rangle = 3kT/m$$, so the mean-square speed is **inversely proportional to molecular mass**.\n- Step 2: Helium has $$m \\approx 4$$ atomic mass units while oxygen has $$m \\approx 32$$ â€” oxygen is about 8 times heavier. For the same KE, the lighter molecule must move faster: $$\\langle c^2 \\rangle_{\\text{He}} / \\langle c^2 \\rangle_{\\text{O}_2} = m_{\\text{O}_2}/m_{\\text{He}} \\approx 8$$. So $$c_{\\text{rms,He}} \\approx \\sqrt{8} \\approx 2.83$$ times faster than $$c_{\\text{rms,O}_2}$$ at the same temperature. Same energy, different speeds â€” lighter molecules are faster.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_22"}, {"question": "What is the relationship between internal energy and phase for the same substance? Rank solid, liquid, and gas by internal energy and explain why. (3 steps)", "answer": "- Step 1: Ranking: **gas > liquid > solid** (for the same mass of the same substance at temperatures consistent with each phase existing). A gas has the highest internal energy, a solid the lowest.\n- Step 2: In a gas, molecules are far apart with high PE (bonds essentially fully broken) and high KE (fast motion). In a liquid, molecules are close with moderate PE (bonds partially present) and moderate KE. In a solid, molecules are locked in place with low PE (bonds fully formed, negative PE) and low KE (only vibration).\n- Step 3: Going from solid â†’ liquid â†’ gas, both KE and PE increase. KE increases because temperature rises (if we're heating through the sequence), and PE increases because intermolecular bonds are progressively broken. The total U = KE + PE increases at every step, which is why you must continuously supply energy to move up the phase ladder.", "source": "GLM 5.1 â‘،", "_id": "glm_2_65"}, {"question": "The rms speed of nitrogen molecules at $$300\\text{ K}$$ is about $$517\\text{ m.s}^{-1}$$, which is faster than the speed of sound in air ($$\\approx 340\\text{ m.s}^{-1}$$). Why is this expected from kinetic theory? (2 steps)", "answer": "- Step 1: Sound propagates through air by molecular collisions â€” one molecule bumps the next, transmitting a pressure wave. The speed of this propagation cannot exceed the speed of the molecules carrying it, since the signal must travel via molecular motion.\n- Step 2: However, sound is slower than $$c_{\\text{rms}}$$ because propagation isn't a single molecule flying across the container. It's a **chain of collisions** with random directions â€” the effective forward progress of the wave is slower than the individual molecular speeds. The speed of sound is typically about $$0.7 \\times c_{\\text{rms}}$$, which matches: $$0.7 \\times 517 \\approx 360\\text{ m.s}^{-1} \\approx 340\\text{ m.s}^{-1}$$. The order-of-magnitude agreement is a strong validation of kinetic theory.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_49"}, {"question": "Misconception probe: a student says \"during a phase change, the internal energy stays constant because the temperature stays constant.\" What's wrong with this?", "answer": "- Step 1: Temperature reflects only the **kinetic** part of internal energy (average molecular KE). Constant $$T$$ means constant average KE.\n- Step 2: But internal energy $$U$$ = KE + PE. During a phase change, energy supplied goes entirely into **potential energy** (breaking bonds), so $$U$$ rises substantially even though $$T$$ is unchanged.\n- Step 3: Conclusion: phase changes have $$\\Delta U > 0$$ but $$\\Delta T = 0$$ â€” a striking demonstration that $$U$$ and $$T$$ are distinct concepts.", "source": "Opus 4.7 â‘،", "_id": "opus_2_46"}, {"question": "The kinetic theory equation $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$ was derived from Newton's laws. The ideal gas equation $$pV = NkT$$ was established empirically. Equating them gave $$\\langle E_k\\rangle = \\frac{3}{2}kT$$. Why is this result considered a profound connection in physics? (2 steps)", "answer": "- Step 1: The result bridges **two completely independent lines of reasoning**: mechanics (Newton's laws applied to molecular collisions â†’ $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$) and thermodynamics (empirical gas laws â†’ $$pV = NkT$$). That they produce the *same* $$pV$$ and thus yield $$\\langle E_k\\rangle = \\frac{3}{2}kT$$ when equated is a deep consistency check â€” the microscopic mechanical model correctly predicts the macroscopic thermodynamic behaviour.\n- Step 2: The equation $$\\langle E_k\\rangle = \\frac{3}{2}kT$$ is the **fundamental link between temperature and molecular motion**. It tells us that temperature â€” a macroscopic, measurable quantity â€” is nothing more than average molecular KE scaled by $$k$$. This unifies the two realms: thermodynamics (macroscopic) and kinetic theory (microscopic) are not separate theories; they're the same physics at different scales, and this equation is the proof.", "source": "GLM 5.1 â‘،", "_id": "glm_2_93"}, {"question": "Why is the Kelvin scale necessary for gas-law calculations, rather than just using Celsius? Give a concrete example of what goes wrong if you plug Celsius into $$pV = nRT$$. (3 steps)", "answer": "- Step 1: On the Celsius scale, zero is arbitrarily set at the freezing point of water. Negative temperatures are common (e.g., $$-10آ°\\text{C}$$), and \"twice as cold\" has no consistent meaning: is $$-2آ°\\text{C}$$ twice as cold as $$-1آ°\\text{C}$$? What about $$0آ°\\text{C}$$ â€” twice as cold as $$0.5آ°\\text{C}$$? The scale isn't anchored to a physical zero.\n- Step 2: The Kelvin scale anchors zero at **absolute zero** â€” the temperature where molecular KE is zero. This makes all gas-law relationships genuinely proportional: doubling $$T$$ in K truly doubles the average KE, doubles $$p$$ at constant $$V$$, and doubles $$V$$ at constant $$p$$.\n- Step 3: If you plug $$T = 20آ°\\text{C}$$ (instead of $$293\\text{ K}$$) into $$pV = nRT$$, you get a result off by a factor of about $$293/20 \\approx 15$$. If you plug a sub-zero Celsius temperature, you'd get a negative $$T$$, producing nonsense (negative pressure or volume). **Always convert to Kelvin first: $$T/\\text{K} = خ¸/آ°\\text{C} + 273$$**.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_6"}, {"question": "A common pitfall: a student uses $$\\Delta E = mc\\Delta\\theta$$ to compute the energy needed to boil water at $$100\\,^\\circ\\text{C}$$. Why does this give zero, and what should they have used?", "answer": "During boiling, $$\\Delta\\theta = 0$$ because the temperature is fixed at the boiling point. So $$mc\\Delta\\theta$$ gives zero â€” clearly wrong, since boiling demonstrably requires energy. The correct formula is $$\\Delta E = L_v \\Delta m$$, because the energy is being used to break intermolecular bonds (raise PE), not to raise temperature (KE). The rule of thumb: **$$mc\\Delta\\theta$$ for sloped regions of the heating curve; $$L\\Delta m$$ for flat regions.**", "source": "Opus 4.7 â‘ ", "_id": "opus_1_13"}, {"question": "Helium atoms have $$c_{\\text{rms}} = 720\\,\\text{m/s}$$ at $$45\\,آ°\\text{C}$$. If the temperature rises to $$80\\,آ°\\text{C}$$, does the rms speed increase by a large amount or a tiny amount? Explain using the relationship between $$c_{\\text{rms}}$$ and $$T$$. (2 steps)", "answer": "- Step 1: Since $$c_{\\text{rms}} \\propto \\sqrt{T}$$, the ratio of speeds is $$c_2/c_1 = \\sqrt{T_2/T_1}$$. In Kelvin: $$T_1 = 45 + 273 = 318\\,\\text{K}$$; $$T_2 = 80 + 273 = 353\\,\\text{K}$$. The ratio is $$\\sqrt{353/318} \\approx \\sqrt{1.11} \\approx 1.054$$.\n- Step 2: The rms speed increases by only about 5.4%â€”from 720 to about 759 m/s. This is a small change because the Kelvin temperature only increased by about 11% (from 318 to 353 K), and the square root of 1.11 is only 1.05. The rms speed is **insensitive** to moderate temperature changes because of the square-root relationship.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_64"}, {"question": "When a kettle boils water at $$100\\,آ°\\text{C}$$, why does it take much longer to boil away the water than to heat it from room temperature to $$100\\,آ°\\text{C}$$, even though the temperature change is larger? (3 steps)", "answer": "- Step 1: Heating water from (say) $$20\\,آ°\\text{C}$$ to $$100\\,آ°\\text{C}$$ requires $$\\Delta E = mc\\Delta\\theta$$. For 1 kg: $$1 \\times 4200 \\times 80 = 336\\,000\\,\\text{J} \\approx 336\\,\\text{kJ}$$.\n- Step 2: Boiling away 1 kg at $$100\\,آ°\\text{C}$$ requires $$\\Delta E = L_v \\Delta m = 2.26 \\times 10^6 \\times 1 = 2\\,260\\,000\\,\\text{J} = 2260\\,\\text{kJ}$$.\n- Step 3: The latent heat of vaporisation ($$2260\\,\\text{kJ}$$) is about 6â€“7 times larger than the sensible heat ($$336\\,\\text{kJ}$$). This is because boiling must completely overcome all intermolecular forces, while heating within the liquid phase only increases molecular vibration and translation. The boiling step dominates the energy budget.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_49"}, {"question": "Why is the average velocity $$\\langle v\\rangle$$ of gas molecules useless (equal to zero), and what quantity do we use instead to characterise the typical molecular speed? (2 steps)", "answer": "- Step 1: In a gas at equilibrium, molecules move in all directions equally (isotropy). For every molecule moving right, there's statistically one moving left with equal speed. The velocity vectors cancel: $$\\langle v\\rangle = 0$$. This tells us nothing about how fast molecules are actually moving â€” it's a vector average that vanishes by symmetry.\n- Step 2: Instead, we use the **root-mean-square speed** $$c_{rms} = \\sqrt{\\langle c^2\\rangle}$$, which squares the speeds first (eliminating direction signs), takes the mean, then takes the square root (returning to speed units). This gives a meaningful, non-zero measure of typical molecular speed. The exam expects \"root-mean-square speed\" or \"mean-square speed\" â€” never \"average speed\" without qualification.", "source": "GLM 5.1 â‘،", "_id": "glm_2_25"}, {"question": "Synthesis question: Why does boiling a kettle of water take significantly longer than just heating that same water from room temperature to boiling temperature? Use the concepts of specific heat capacity and latent heat to explain. (2 steps)", "answer": "- Step 1: Heating water from $$20آ°C$$ to $$100آ°C$$ requires $$\\Delta E = mc\\Delta\\theta = 1 \\times 4200 \\times 80 = 336\\text{kJ}$$ per kg. This is the \"sensible heat\" â€” raising KE, raising temperature.\n- Step 2: Boiling that water away at $$100آ°C$$ requires $$\\Delta E = L_v \\times m = 2260\\text{kJ}$$ per kg â€” about **6.7 times more energy** than the heating step. The latent heat of vaporisation is enormous because every molecule must be fully separated from all its neighbours (overcoming all remaining hydrogen bonds). This is why the kettle switches off quickly once water reaches $$100آ°C$$ if you're just heating it, but boiling it *dry* would take many minutes longer.", "source": "GLM 5.1 â‘،", "_id": "glm_2_72"}, {"question": "Why is water's behaviour unusual when it freezes? How does this differ from almost every other substance? (2 steps)", "answer": "- Step 1: Water **expands** when it freezesâ€”its solid form (ice) is less dense than its liquid form. Almost every other substance **contracts** upon freezing, making the solid denser than the liquid.\n- Step 2: This occurs because of water's hydrogen-bonded lattice structure: as ice forms, the molecules arrange into an open hexagonal lattice with more empty space than the liquid. This is why ice floats on water (and why pipes burst when they freeze). In the particle-arrangement table, water is the notable exception where the solid is slightly more spread out than the liquid.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_76"}], "models": {"glm_1": {"label": "GLM 5.1 â‘ ", "cards": [{"question": "In a solid, particles are described as \"close and regular\" in arrangement. What does \"regular\" mean here, and why can't liquid particles be described the same way? (2 steps)", "answer": "- Step 1: \"Regular\" means the particles sit in a repeating, ordered pattern â€” a lattice â€” like soldiers in formation. Each particle has a well-defined position relative to its neighbours. This is possible because the strong intermolecular bonds in a solid lock particles into place.\n- Step 2: In a liquid, the bonds are weaker (medium strength), so particles can slide past one another. They remain close together (touching), but the pattern constantly shifts â€” there is no fixed lattice. Hence we say \"close, irregular\" for a liquid. The irregularity is a direct consequence of the weaker bonding allowing rearrangement.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_0", "judge_pick": false}, {"question": "A common misconception is that solid particles are \"stationary.\" What is the correct description of solid particle motion, and what is the only temperature at which they truly stop? (2 steps)", "answer": "- Step 1: Solid particles **vibrate about fixed positions**. They oscillate back and forth around a lattice site but never translate (move from one site to another). The vibration amplitude depends on temperature â€” hotter solids vibrate more vigorously.\n- Step 2: The only temperature where vibration ceases entirely is **absolute zero**, $$0\\text{ K} = -273.15آ°\\text{C}$$. At every temperature above this, solid particles are vibrating. Saying \"stationary\" is wrong because it implies zero motion, which only occurs at $$0\\text{ K}$$.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_1", "judge_pick": false}, {"question": "Gas particles are described as moving \"fast and random\" with \"straight-line motion between collisions.\" Why must the motion be random rather than organised, and what causes the straight-line paths to end? (2 steps)", "answer": "- Step 1: \"Random\" means there is no preferred direction â€” at any instant, molecules fly in all directions equally. This is called **isotropy**. If motion were organised (e.g., all moving right), there would be net momentum and the gas would drift as a bulk flow, not exert isotropic pressure on all walls.\n- Step 2: The straight-line paths end because molecules **collide** with each other and with the container walls. Each collision (assumed elastic for an ideal gas) redirects the molecule randomly. The combination of straight-line free flight and randomising collisions produces the chaotic, isotropic motion we observe.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_2", "judge_pick": false}, {"question": "Solids and liquids both have particles that are \"close together,\" yet their densities are typically comparable. Gases are far less dense â€” roughly by what factor at atmospheric pressure, and why? (2 steps)", "answer": "- Step 1: Gases are typically about **$$10^3$$ times less dense** than solids or liquids at atmospheric pressure. For example, water has $$\\rho \\approx 1000\\text{ kg.m}^{-3}$$ while steam at $$1\\text{ atm}$$ has $$\\rho \\approx 0.6\\text{ kg.m}^{-3}$$ â€” a factor of roughly 1600.\n- Step 2: The reason is the arrangement column: in solids and liquids, particles are touching (close), so most of the volume is occupied by the particles themselves. In a gas, particles are far apart with vast empty space between them, so the same number of molecules occupies a much larger volume, making $$\\rho = m/V$$ much smaller.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_3", "judge_pick": false}, {"question": "Internal energy $$U$$ is defined as the sum of two contributions over all molecules. What are these two contributions, and which one is linked to the temperature we measure? (2 steps)", "answer": "- Step 1: The two contributions are **kinetic energy** (KE â€” from translational, rotational, and vibrational motion of molecules) and **potential energy** (PE â€” stored in intermolecular forces, depending on molecular separation and bond configuration). The formula is $$U = \\sum_i (KE_i + PE_i)$$.\n- Step 2: **Temperature is a measure of the average kinetic energy of the molecules** â€” specifically, $$T \\propto \\langle KE \\rangle$$. Potential energy does not directly affect temperature. This is why during a phase change, even though PE is changing (bonds breaking), the temperature stays constant because KE isn't changing.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_4", "judge_pick": true}, {"question": "During a phase change (e.g., melting), energy is being supplied to the substance. Does the internal energy increase, decrease, or stay constant? And does the temperature increase, decrease, or stay constant? Explain the apparent contradiction. (3 steps)", "answer": "- Step 1: **Internal energy increases**. Energy is being added to the system (via heating), so $$U$$ must rise. There is no contradiction â€” $$U$$ genuinely goes up.\n- Step 2: **Temperature stays constant**. The supplied energy goes into breaking intermolecular bonds, which increases the **potential energy** of the molecules. The kinetic energy (and hence temperature) does not change during the transition.\n- Step 3: The apparent contradiction arises from confusing $$U$$ with $$T$$. Temperature only reflects the KE component. During a phase change, the PE component rises while KE stays fixed, so $$U$$ rises but $$T$$ plateaus. This is exactly what the flat sections of a heating curve show.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_5", "judge_pick": true}, {"question": "Why is the Kelvin scale necessary for gas-law calculations, rather than just using Celsius? Give a concrete example of what goes wrong if you plug Celsius into $$pV = nRT$$. (3 steps)", "answer": "- Step 1: On the Celsius scale, zero is arbitrarily set at the freezing point of water. Negative temperatures are common (e.g., $$-10آ°\\text{C}$$), and \"twice as cold\" has no consistent meaning: is $$-2آ°\\text{C}$$ twice as cold as $$-1آ°\\text{C}$$? What about $$0آ°\\text{C}$$ â€” twice as cold as $$0.5آ°\\text{C}$$? The scale isn't anchored to a physical zero.\n- Step 2: The Kelvin scale anchors zero at **absolute zero** â€” the temperature where molecular KE is zero. This makes all gas-law relationships genuinely proportional: doubling $$T$$ in K truly doubles the average KE, doubles $$p$$ at constant $$V$$, and doubles $$V$$ at constant $$p$$.\n- Step 3: If you plug $$T = 20آ°\\text{C}$$ (instead of $$293\\text{ K}$$) into $$pV = nRT$$, you get a result off by a factor of about $$293/20 \\approx 15$$. If you plug a sub-zero Celsius temperature, you'd get a negative $$T$$, producing nonsense (negative pressure or volume). **Always convert to Kelvin first: $$T/\\text{K} = خ¸/آ°\\text{C} + 273$$**.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_6", "judge_pick": true}, {"question": "Absolute zero is defined two ways. State both equivalent definitions, and explain why we say molecules have \"minimum\" (not \"zero\") kinetic energy in some formulations. (2 steps)", "answer": "- Step 1: The two equivalent examinable definitions are: (1) **The lowest possible temperature**, $$0\\text{ K} = -273.15آ°\\text{C}$$; and (2) **The temperature at which molecules have zero kinetic energy** â€” all translational, rotational, and vibrational motion ceases.\n- Step 2: Some formulations say \"minimum\" rather than \"zero\" because quantum mechanics dictates that even at absolute zero, there remains a tiny residual vibrational energy (the zero-point energy). However, for A-level physics, the exam definition uses \"zero kinetic energy\" â€” the classical limit where all motion stops. The key point: no energy can be extracted below this temperature; it is the absolute floor.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_7", "judge_pick": true}, {"question": "On a heating curve for water (constant heating rate), there are two flat plateaus â€” one at $$0آ°\\text{C}$$ and one at $$100آ°\\text{C}$$. The plateau at $$100آ°\\text{C}$$ is much longer than the one at $$0آ°\\text{C}$$. Why is the boiling plateau so much longer? (3 steps)", "answer": "- Step 1: The length of a plateau on the heating curve represents the **total energy** needed for that phase change (at a constant heating rate, more energy = more time). For water, $$L_f \\approx 334\\text{ kJ.kg}^{-1}$$ while $$L_v \\approx 2260\\text{ kJ.kg}^{-1}$$ â€” vaporisation requires about **7 times more energy per kilogram** than fusion.\n- Step 2: Melting only **loosens** the lattice enough for molecules to slide past each other. The intermolecular forces are still substantially present â€” molecules in liquid water are still touching and attracted to neighbours. Only the rigid lattice structure is broken.\n- Step 3: Boiling requires molecules to be **completely separated** from one another. The intermolecular forces must be overcome essentially in full â€” every molecule goes from being surrounded by neighbours (in the liquid) to being isolated in the gas. This full separation demands far more energy, producing the much longer plateau.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_8", "judge_pick": true}, {"question": "Evaporation and boiling both produce gas from liquid, but they are fundamentally different processes. Contrast them in terms of (a) where they happen, (b) at what temperature, and (c) which molecules escape. (3 steps)", "answer": "- Step 1: **Where**: Boiling happens throughout the **bulk** of the liquid â€” bubbles of vapour form inside the liquid and rise to the surface. Evaporation happens only at the **surface** â€” molecules escape from the top layer into the air above.\n- Step 2: **Temperature**: Boiling occurs at a specific temperature (the boiling point), when the vapour pressure of the liquid equals atmospheric pressure. Evaporation occurs at **any temperature** â€” even cold water slowly evaporates, just more slowly than hot water.\n- Step 3: **Which molecules**: In evaporation, only the **highest-energy molecules** in the tail of the Maxwellâ€“Boltzmann speed distribution have enough KE to escape the surface attraction. In boiling, the average KE is high enough that vapour pressure matches atmospheric pressure, and molecules throughout the liquid can enter the gas phase.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_9", "judge_pick": true}, {"question": "Name the six common phase transitions and their reverse processes, including the one that goes directly from solid to gas. (2 steps)", "answer": "- Step 1: The four standard transitions are:\n+ Solid â†’ Liquid: **melting** (fusion); reverse: **freezing** (solidification)\n+ Liquid â†’ Gas: **boiling** (vaporisation); reverse: **condensation**\n+ Liquid â†’ Gas (below b.p.): **evaporation** (no single reverse name)\n+ Solid â†’ Gas: **sublimation**; reverse: **deposition**\n- Step 2: Note that evaporation is a subset of vaporisation â€” it's the surface-only, any-temperature version. Sublimation is rare at everyday conditions but common for substances like dry ice (solid $$CO_2$$). The reverse of sublimation is deposition (gas â†’ solid directly, skipping the liquid phase).", "source": "GLM 5.1 â‘ ", "_id": "glm_1_10", "judge_pick": false}, {"question": "Specific heat capacity $$c$$ is defined as \"the energy required to raise the temperature of one kilogram of a substance by one kelvin.\" Why does water have an unusually high $$c$$ ($$\\approx 4200\\text{ J.kg}^{-1}\\text{.K}^{-1}$$), and what practical consequences does this have? (2 steps)", "answer": "- Step 1: Water's high $$c$$ is due to **hydrogen bonding** between molecules. Much of the energy supplied goes into stretching and rearranging these strong intermolecular bonds (increasing PE) before the molecules speed up (increasing KE/temperature). Effectively, water has many \"energy sinks\" beyond just translational KE.\n- Step 2: Practical consequences:\n+ Water is an excellent **coolant** â€” it absorbs large amounts of energy without its temperature rising much (used in car engines, industrial cooling).\n+ Water is good for **heat storage** â€” radiators and hot-water systems stay warm for a long time because water releases energy slowly as it cools.\n+ Coastal climates are milder â€” oceans absorb and release huge amounts of thermal energy, moderating temperature swings.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_11", "judge_pick": true}, {"question": "The formula $$\\Delta E = mc\\Delta\\theta$$ applies when there is no phase change. The formula $$\\Delta E = L\\Delta m$$ applies during a phase change. What happens if you mistakenly use $$\\Delta E = mc\\Delta\\theta$$ during a melting plateau â€” what result do you get, and why is it wrong? (2 steps)", "answer": "- Step 1: During a phase change, the temperature does not change, so $$\\Delta\\theta = 0$$. Substituting into $$\\Delta E = mc\\Delta\\theta$$ gives $$\\Delta E = 0$$ â€” suggesting no energy is needed. This is clearly wrong: melting ice requires $$334\\text{ kJ}$$ per kilogram.\n- Step 2: The error comes from using the wrong formula. $$\\Delta E = mc\\Delta\\theta$$ only accounts for KE changes (temperature changes). During a phase change, energy goes into PE (breaking bonds) at constant temperature. The correct formula is $$\\Delta E = L\\Delta m$$, which has no $$\\Delta\\theta$$ term because temperature is constant. **Rule: temperature change â†’ use SHC; phase change â†’ use SLH.**", "source": "GLM 5.1 â‘ ", "_id": "glm_1_12", "judge_pick": true}, {"question": "A substance goes from $$-10آ°\\text{C}$$ (solid) to $$110آ°\\text{C}$$ (gas). How many distinct energy-calculation stages are needed, and which formula applies to each stage? (3 steps)", "answer": "- Step 1: There are **five stages** (not three or four â€” the phase changes are separate stages):\n+ Stage 1: Heat solid from $$-10آ°\\text{C}$$ to $$0آ°\\text{C}$$ â†’ use $$\\Delta E = mc_{\\text{ice}}\\Delta\\theta$$\n+ Stage 2: Melt at $$0آ°\\text{C}$$ â†’ use $$\\Delta E = L_f \\Delta m$$\n+ Stage 3: Heat liquid from $$0آ°\\text{C}$$ to $$100آ°\\text{C}$$ â†’ use $$\\Delta E = mc_{\\text{water}}\\Delta\\theta$$\n+ Stage 4: Boil at $$100آ°\\text{C}$$ â†’ use $$\\Delta E = L_v \\Delta m$$\n+ Stage 5: Heat gas from $$100آ°\\text{C}$$ to $$110آ°\\text{C}$$ â†’ use $$\\Delta E = mc_{\\text{steam}}\\Delta\\theta$$\n- Step 2: Each stage uses a different formula or different value of $$c$$. The substance has different specific heat capacities in each phase (e.g., $$c_{\\text{ice}} \\approx 2100$$, $$c_{\\text{water}} \\approx 4200$$, $$c_{\\text{steam}} \\approx 2000\\text{ J.kg}^{-1}\\text{.K}^{-1}$$). You cannot use one formula for the whole journey.\n- Step 3: The total energy is the **sum** of all five stages: $$E_{\\text{total}} = E_1 + E_2 + E_3 + E_4 + E_5$$. For water, stage 4 (boiling) typically dominates because $$L_v$$ is so large â€” this is why boiling a kettle takes much longer than heating the water to the boil.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_13", "judge_pick": true}, {"question": "State the six assumptions of the kinetic theory of an ideal gas. For each one, explain what would go wrong in the derivation of $$pV = \\frac{1}{3}Nm\\langle c^2 \\rangle$$ if that assumption were violated. (3 steps)", "answer": "- Step 1: The six assumptions are:\n+ Molecules occupy **negligible volume** compared to the container\n+ Intermolecular forces are **negligible** except during brief collisions\n+ Collisions are **perfectly elastic** (no KE lost)\n+ Collision duration is **negligible** compared to time between collisions\n+ Motion is **random** and obeys Newton's laws\n+ There are **very many molecules** (statistical approach valid)\n- Step 2: What goes wrong if violated:\n+ If volume isn't negligible â†’ the available space for motion is less than $$V$$, so $$pV$$ overestimates the true kinetic contribution\n+ If forces aren't negligible â†’ molecules accelerate between collisions (not free flight), breaking the straight-line assumption and the $$\\Delta t = 2L/v_x$$ calculation\n+ If collisions aren't elastic â†’ KE is gradually lost, so $$\\langle c^2 \\rangle$$ decreases over time and pressure drops\n+ If collision time isn't negligible â†’ molecules spend significant time \"stuck\" in contact, reducing the effective collision rate\n+ If motion isn't random/isotropic â†’ $$\\langle v_x^2 \\rangle = \\frac{1}{3}\\langle c^2 \\rangle$$ fails; pressure would differ on different walls\n+ If there aren't many molecules â†’ statistical averages (like $$\\langle c^2 \\rangle$$) fluctuate wildly and aren't meaningful\n- Step 3: Real gases deviate from these assumptions most at **high pressure** (molecules forced close â†’ volume and forces matter) and **low temperature** (molecules slow â†’ forces and inelastic effects matter). This is why real gases approximate ideal behaviour best at **low pressure and high temperature**.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_14", "judge_pick": false}, {"question": "Boyle's law states $$p_1 V_1 = p_2 V_2$$ at constant temperature and fixed mass. If you halve the volume of a gas at constant $$T$$, what happens to pressure, and explain the molecular-level reason. (2 steps)", "answer": "- Step 1: Halving the volume **doubles the pressure**: $$p_2 = p_1 \\times V_1/V_2 = p_1 \\times 2 = 2p_1$$. This is the inverse proportionality of Boyle's law.\n- Step 2: Molecular reason: the same number of molecules, moving at the same average speed (constant $$T$$), are now confined to half the space. They hit the walls **twice as frequently** because the distance to any wall is halved. Each collision delivers the same momentum as before (same speed), but twice as often â†’ twice the force per unit area â†’ twice the pressure.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_15", "judge_pick": false}, {"question": "Charles's law states $$V_1/T_1 = V_2/T_2$$ at constant pressure and fixed mass. If you double the absolute temperature of a gas at constant $$p$$, what happens to volume, and why must $$T$$ be in Kelvin? (2 steps)", "answer": "- Step 1: Doubling $$T$$ in Kelvin **doubles the volume**: $$V_2 = V_1 \\times T_2/T_1 = V_1 \\times 2 = 2V_1$$. The gas expands proportionally.\n- Step 2: $$T$$ must be in Kelvin because only the Kelvin scale is anchored at absolute zero (zero molecular KE). If you used Celsius, doubling from $$20آ°\\text{C}$$ to $$40آ°\\text{C}$$ would suggest doubling volume, but the true temperature ratio is $$313/293 \\approx 1.07$$ â€” only a 7% increase, not 100%. The gas laws are proportional relationships that only work on an absolute scale.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_16", "judge_pick": false}, {"question": "The pressure law states $$p_1/T_1 = p_2/T_2$$ at constant volume and fixed mass. Explain why pressure increases with temperature using the \"three Fs\" â€” what are the three effects that each start with F? (3 steps)", "answer": "- Step 1: **Faster** â€” heating the gas increases molecular KE, so molecules move faster ($$\\langle c^2 \\rangle \\propto T$$). Each molecule carries more kinetic energy.\n- Step 2: **More frequently** â€” faster molecules cover the distance to the wall and back in less time. The collision rate with each wall increases proportionally to speed.\n- Step 3: **More force** â€” each collision transfers more momentum to the wall because the molecule arrives with higher speed ($$\\Delta p = 2mv_x$$, and $$v_x$$ is larger). More momentum transfer per collision means more force per impact.\n+ Combined effect: more force per impact, applied more often, over the same area â†’ **pressure rises proportionally to $$T$$**.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_17", "judge_pick": false}, {"question": "The ideal gas equation can be written two ways: $$pV = nRT$$ and $$pV = NkT$$. What is the relationship between $$R$$, $$k$$, and $$N_A$$, and why do we need two versions? (2 steps)", "answer": "- Step 1: The relationship is $$k = R/N_A$$, where $$R = 8.31\\text{ J.mol}^{-1}\\text{.K}^{-1}$$ is the molar gas constant, $$k = 1.38 \\times 10^{-23}\\text{ J.K}^{-1}$$ is Boltzmann's constant, and $$N_A = 6.02 \\times 10^{23}\\text{ mol}^{-1}$$ is Avogadro's number. Since $$N = nN_A$$ (number of molecules = moles أ— molecules per mole), substituting gives $$pV = nN_A kT = nRT$$.\n- Step 2: We need two versions because sometimes we know the **number of moles** $$n$$ (e.g., \"2 mol of gas\") â€” use $$pV = nRT$$ with $$R$$. Other times we know the **number of molecules** $$N$$ (e.g., from microscopic calculations) â€” use $$pV = NkT$$ with $$k$$. They are physically identical; the choice depends on which quantity is given or more convenient.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_18", "judge_pick": false}, {"question": "In the kinetic theory derivation, a single molecule of mass $$m$$ with velocity component $$v_x$$ bounces off a wall perpendicular to the $$x$$-axis. What is the change in momentum per collision, and why is it $$2mv_x$$ rather than just $$mv_x$$? (2 steps)", "answer": "- Step 1: Before collision, the molecule approaches the wall with $$x$$-component $$+v_x$$. After an **elastic collision**, the $$x$$-component reverses to $$-v_x$$ (the wall doesn't absorb energy; the molecule bounces back at the same speed in the opposite direction). The $$y$$ and $$z$$ components are unchanged.\n- Step 2: The change in momentum is $$\\Delta p = p_{\\text{after}} - p_{\\text{before}} = (-mv_x) - (mv_x) = -2mv_x$$. The magnitude is $$2mv_x$$ because the molecule doesn't just **stop** (which would give $$\\Delta p = mv_x$$) â€” it **reverses**, so the momentum swings from $$+mv_x$$ to $$-mv_x$$, a total swing of $$2mv_x$$. This doubled momentum transfer is what makes the wall feel a force.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_19", "judge_pick": true}, {"question": "After establishing that one molecule exerts force $$F_1 = m\\langle v_x^2 \\rangle / L$$ on a wall, we sum over all $$N$$ molecules to get $$p = Nm\\langle v_x^2 \\rangle / V$$. The next step replaces $$\\langle v_x^2 \\rangle$$ with $$\\frac{1}{3}\\langle c^2 \\rangle$$. What principle justifies this replacement, and what does it assume about the gas? (2 steps)", "answer": "- Step 1: The replacement uses **isotropy** â€” the principle that molecular motion is equally distributed in all three spatial directions. Since $$\\langle c^2 \\rangle = \\langle v_x^2 \\rangle + \\langle v_y^2 \\rangle + \\langle v_z^2 \\rangle$$ and there is no preferred direction, each component contributes equally: $$\\langle v_x^2 \\rangle = \\langle v_y^2 \\rangle = \\langle v_z^2 \\rangle = \\frac{1}{3}\\langle c^2 \\rangle$$.\n- Step 2: This assumes the gas is in **equilibrium** with no bulk flow (no wind, no convection current). If all molecules were drifting in one direction, $$\\langle v_x^2 \\rangle$$ would be larger than $$\\langle v_y^2 \\rangle$$, and pressure would differ on different walls. Isotropy is a direct consequence of the \"random motion\" assumption in the kinetic theory.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_20", "judge_pick": false}, {"question": "Starting from $$pV = \\frac{1}{3}Nm\\langle c^2 \\rangle$$ and $$pV = NkT$$, derive the formula for average molecular kinetic energy. Show each algebraic step. (3 steps)", "answer": "- Step 1: Both equations have $$pV$$ on the left, so their right-hand sides are equal: $$\\frac{1}{3}Nm\\langle c^2 \\rangle = NkT$$.\n- Step 2: Cancel $$N$$ from both sides (it appears on both): $$\\frac{1}{3}m\\langle c^2 \\rangle = kT$$. Multiply both sides by $$\\frac{3}{2}$$: $$\\frac{1}{2}m\\langle c^2 \\rangle = \\frac{3}{2}kT$$.\n- Step 3: The left side $$\\frac{1}{2}m\\langle c^2 \\rangle$$ is precisely the **average translational kinetic energy** of one molecule, $$\\langle E_k \\rangle$$. Therefore: $$\\langle E_k \\rangle = \\frac{1}{2}m\\langle c^2 \\rangle = \\frac{3}{2}kT$$. This tells us average KE depends only on temperature, not on the type of gas.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_21", "judge_pick": false}, {"question": "At the same temperature, helium atoms and oxygen molecules have the same average kinetic energy. Yet helium atoms move much faster. Explain why, using the relationship between mass, KE, and speed. (2 steps)", "answer": "- Step 1: From $$\\langle E_k \\rangle = \\frac{1}{2}m\\langle c^2 \\rangle = \\frac{3}{2}kT$$, at the same $$T$$, both species have the same $$\\langle E_k \\rangle$$. But $$\\langle c^2 \\rangle = 3kT/m$$, so the mean-square speed is **inversely proportional to molecular mass**.\n- Step 2: Helium has $$m \\approx 4$$ atomic mass units while oxygen has $$m \\approx 32$$ â€” oxygen is about 8 times heavier. For the same KE, the lighter molecule must move faster: $$\\langle c^2 \\rangle_{\\text{He}} / \\langle c^2 \\rangle_{\\text{O}_2} = m_{\\text{O}_2}/m_{\\text{He}} \\approx 8$$. So $$c_{\\text{rms,He}} \\approx \\sqrt{8} \\approx 2.83$$ times faster than $$c_{\\text{rms,O}_2}$$ at the same temperature. Same energy, different speeds â€” lighter molecules are faster.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_22", "judge_pick": true}, {"question": "The average velocity $$\\langle v \\rangle$$ of gas molecules is zero, but the root-mean-square speed $$c_{\\text{rms}}$$ is nonzero. Why is $$\\langle v \\rangle = 0$$, and why do we need rms speed instead? (2 steps)", "answer": "- Step 1: $$\\langle v \\rangle = 0$$ because velocity is a **vector** â€” it includes direction. In a gas at equilibrium, molecules move in all directions equally (isotropy). For every molecule moving right, there's one moving left; their velocities cancel. The vector average is zero regardless of how fast they're moving.\n- Step 2: We need $$c_{\\text{rms}} = \\sqrt{\\langle c^2 \\rangle}$$ because **speed** (the magnitude, always positive) doesn't cancel. Squaring each speed before averaging eliminates the sign problem (negative velocities become positive squares), and then taking the square root gives a meaningful typical speed. $$c_{\\text{rms}}$$ is the quantity that appears in kinetic theory and is proportional to $$\\sqrt{T}$$.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_23", "judge_pick": true}, {"question": "If you double the absolute temperature of a gas (e.g., from $$300\\text{ K}$$ to $$600\\text{ K}$$), what happens to (a) average molecular KE, and (b) rms speed? Explain why the two answers are different. (3 steps)", "answer": "- Step 1: (a) Average KE **doubles**: $$\\langle E_k \\rangle = \\frac{3}{2}kT$$, so doubling $$T$$ doubles $$\\langle E_k \\rangle$$. This is a direct proportionality.\n- Step 2: (b) RMS speed increases by a factor of $$\\sqrt{2} \\approx 1.41$$, **not by a factor of 2**: $$c_{\\text{rms}} = \\sqrt{3kT/m}$$, so $$c_{\\text{rms}} \\propto \\sqrt{T}$$. Doubling $$T$$ gives $$c_{\\text{rms,2}} = c_{\\text{rms,1}} \\times \\sqrt{T_2/T_1} = c_{\\text{rms,1}} \\times \\sqrt{2}$$.\n- Step 3: The answers differ because KE depends on $$\\langle c^2 \\rangle$$ (the **square** of speed), not on speed directly. If $$c_{\\text{rms}}$$ increases by $$\\sqrt{2}$$, then $$\\langle c^2 \\rangle$$ increases by $$2$$ (since $$\\langle c^2 \\rangle = c_{\\text{rms}}^2$$), and KE increases by 2. The square-root relationship means speed responds more slowly to temperature changes than energy does. **Common trap: don't say \"doubling T doubles the speed.\"**", "source": "GLM 5.1 â‘ ", "_id": "glm_1_24", "judge_pick": true}, {"question": "A sealed syringe contains $$40\\text{ cm}^3$$ of air at atmospheric pressure ($$\\approx 101\\text{ kPa}$$). The plunger is pushed in until the volume is $$25\\text{ cm}^3$$ at the same temperature. Qualitatively, does pressure increase or decrease, and by roughly what factor? (2 steps)", "answer": "- Step 1: Pressure **increases** because the same number of molecules, at the same temperature, are squeezed into a smaller space. They hit the walls more frequently, raising pressure. This is Boyle's law: $$p \\propto 1/V$$ at constant $$T$$.\n- Step 2: The factor is $$V_1/V_2 = 40/25 = 1.6$$. So the new pressure is roughly $$1.6 \\times 101 \\approx 162\\text{ kPa}$$ â€” about 60% higher. Notice that we don't need to convert $$\\text{cm}^3$$ to $$\\text{m}^3$$ because the volume units cancel in the ratio $$p_2 = p_1(V_1/V_2)$$, provided both volumes use the same unit.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_25", "judge_pick": false}, {"question": "In the Boyle's law experiment (Core Practical 14), you add masses to a syringe and read the volume. Why must you wait several seconds after each mass change before reading the volume? (2 steps)", "answer": "- Step 1: Adding a mass compresses the gas, doing **work** on it. This work momentarily increases the internal energy of the gas, raising its temperature slightly above the room temperature. Boyle's law requires **constant temperature**, so a reading taken immediately would be at a higher $$T$$ than intended.\n- Step 2: Waiting allows the gas to **re-equilibrate thermally** with the surroundings â€” the extra heat dissipates to the room, and the gas returns to the original temperature. Only then is the condition \"constant $$T$$\" satisfied, and the $$pV$$ reading is valid for Boyle's law. Skipping this wait introduces a systematic error: $$pV$$ would appear slightly higher than expected because $$T$$ drift
