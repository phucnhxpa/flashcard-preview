ant), the volume reading corresponds to a true isothermal compression, and Boyle's law ($$p_1V_1 = p_2V_2$$) applies correctly.\n\nThis is Trap from the self-test Q13.", "source": "GLM 5.1 â‘،", "_id": "glm_2_28", "judge_pick": false}, {"question": "In the Boyle's law experiment, how is the pressure calculated from the masses added to the syringe? What role does atmospheric pressure play? (3 steps)", "answer": "- Step 1: The total pressure on the gas is **not just** from the masses â€” it's atmospheric pressure plus (or minus) the extra pressure from the weights. The masses push down on the plunger with force $$F = mg$$, spread over the syringe cross-section area $$A$$, giving additional pressure $$\\Delta p = mg/A$$.\n- Step 2: If the masses push the plunger *in* (compressing the gas), the total gas pressure is $$p = p_{atm} + mg/A$$ (atmospheric pressure pushing down on the plunger, plus the weight force). If the apparatus pulls the plunger *out* (expanding the gas), the total gas pressure is $$p = p_{atm} - mg/A$$ (the weight reduces the effective pressure).\n- Step 3: Atmospheric pressure ($$p_{atm} \\approx 1.01 \\times 10^5\\text{Pa}$$) is always present and significant â€” it's about 1 atmosphere, while typical lab masses add perhaps 10â€“20% more. You cannot ignore it. The key insight: $$p$$ in Boyle's law is the **absolute** pressure inside the gas, not the gauge pressure from the masses alone.", "source": "GLM 5.1 â‘،", "_id": "glm_2_29", "judge_pick": true}, {"question": "A car tyre has a gauge pressure of $$2.5 \\times 10^5\\text{Pa}$$ above atmospheric pressure ($$1.0 \\times 10^5\\text{Pa}$$) at $$15آ°C$$. After driving, the tyre heats to $$45آ°C$$ with unchanged volume. What is the new gauge pressure, and why must you use absolute (not gauge) pressure in the calculation? (3 steps)", "answer": "- Step 1: **Why absolute pressure**: The pressure law $$p_1/T_1 = p_2/T_2$$ relates the *total* pressure the gas exerts on the tyre walls â€” that's absolute pressure (gauge + atmospheric). Gauge pressure alone doesn't account for the ~1 atmosphere that's always there.\n- Step 2: Convert to Kelvin and use absolute pressures: $$T_1 = 15 + 273 = 288\\text{K}$$, $$T_2 = 45 + 273 = 318\\text{K}$$, $$p_1 = 2.5 \\times 10^5 + 1.0 \\times 10^5 = 3.5 \\times 10^5\\text{Pa}$$.\n- Step 3: Apply pressure law: $$p_2 = p_1 \\times T_2/T_1 = 3.5 \\times 10^5 \\times 318/288 \\approx 3.86 \\times 10^5\\text{Pa}$$ (absolute). New gauge pressure = $$3.86 \\times 10^5 - 1.0 \\times 10^5 \\approx 2.86 \\times 10^5\\text{Pa}$$, about $$2.9 \\times 10^5\\text{Pa}$$.\n\nKey lesson: always convert gauge â†’ absolute before gas-law calculations, then convert back at the end.", "source": "GLM 5.1 â‘،", "_id": "glm_2_30", "judge_pick": true}, {"question": "What is the relationship between the three gas laws and the ideal gas equation $$pV = nRT$$? If you know any two of the three variables ($$p, V, T$$) at one state and one variable at a second state, can you always find the other two? (2 steps)", "answer": "- Step 1: Each gas law is a **special case** of $$pV = nRT$$ with one variable held constant: Boyle ($$T$$ constant â†’ $$pV = nRT = \\text{const}$$), Charles ($$p$$ constant â†’ $$V/T = nR/p = \\text{const}$$), Pressure law ($$V$$ constant â†’ $$p/T = nR/V = \\text{const}$$). The combined form $$p_1V_1/T_1 = p_2V_2/T_2$$ handles cases where **all three variables change simultaneously**.\n- Step 2: Yes â€” if you know $$p_1, V_1, T_1$$ and any one of $$p_2, V_2, T_2$$, you can find the other two from $$p_1V_1/T_1 = p_2V_2/T_2$$ (provided $$n$$ is constant). For example: know $$p_1, V_1, T_1$$ and $$T_2$$ â†’ rearrange for $$V_2 = V_1(p_1/p_2)(T_2/T_1)$$ if you also know $$p_2$$, or use two equations if you only know one new variable and need two.", "source": "GLM 5.1 â‘،", "_id": "glm_2_31", "judge_pick": false}, {"question": "Why does the specific heat capacity formula $$\\Delta E = mc\\Delta\\theta$$ give a nonsensical answer (zero) during a phase change, and what formula must you use instead? (2 steps)", "answer": "- Step 1: During a phase change (e.g., melting at $$0آ°C$$ or boiling at $$100آ°C$$), the temperature does not change â€” $$\\Delta\\theta = 0$$. Substituting into $$\\Delta E = mc\\Delta\\theta$$ gives $$\\Delta E = 0$$, which is clearly wrong because energy IS being supplied to break bonds.\n- Step 2: Instead, use $$\\Delta E = L\\Delta m$$, where $$L$$ is the specific latent heat (fusion for melting, vaporisation for boiling) and $$\\Delta m$$ is the mass changing phase. This formula has no temperature-change term because the energy goes into potential energy (bond breaking), not kinetic energy (temperature rise).\n\nThis is Trap 8 â€” the most common formula confusion in this topic.", "source": "GLM 5.1 â‘،", "_id": "glm_2_32", "judge_pick": true}, {"question": "For water, $$L_v \\approx 2260\\text{kJآ·kg}^{-1}$$ and $$L_f \\approx 334\\text{kJآ·kg}^{-1}$$. Explain physically why $$L_v$$ is about 7 times larger than $$L_f$$, using what happens to intermolecular bonds in each transition. (3 steps)", "answer": "- Step 1: **Melting (fusion)**: The lattice loosens enough for molecules to slide past each other, but intermolecular forces are still substantially present in the liquid. Molecules in liquid water are still quite close and still hydrogen-bonded â€” they've just gained enough freedom to flow. The bonds are *partially* overcome, not fully destroyed.\n- Step 2: **Boiling (vaporisation)**: Molecules must be *completely separated* from each other. In the gas phase, intermolecular distances are enormous and forces are negligible. Every hydrogen bond must be fully broken â€” molecules gain enough energy to escape the liquid entirely and exist independently.\n- Step 3: Since boiling requires near-total bond destruction while melting requires only partial loosening, it's physically logical that $$L_v \\gg L_f$$. The factor of ~7 for water reflects the fact that most of the binding energy remains in the liquid state â€” only a fraction is overcome to reach the liquid, but nearly all must be overcome to reach the gas.", "source": "GLM 5.1 â‘،", "_id": "glm_2_33", "judge_pick": true}, {"question": "A common exam question asks you to \"explain why the pressure of a gas increases when it is heated at constant volume.\" What keywords earn marks, and what is the minimum chain of reasoning expected? (3 steps)", "answer": "- Step 1: The expected chain: heating â†’ molecules gain kinetic energy â†’ move faster â†’ hit the walls **more frequently** AND with **more force** (greater momentum change per collision) â†’ greater total force on walls â†’ same area â†’ **pressure increases**.\n- Step 2: Keywords that earn marks:\n+ \"molecules move faster\" or \"kinetic energy increases\"\n+ \"more frequent collisions\" or \"collide more often with the walls\"\n+ \"greater momentum change\" or \"greater force per collision\" or \"more force\"\n+ \"force per unit area increases\" or \"pressure = force/area\"\n- Step 3: The minimum acceptable chain connects **cause** (heating â†’ faster molecules) to **effect** (more force, more often â†’ higher pressure) through **mechanism** (collisions with walls). Just saying \"pressure increases because temperature increases\" is circular and earns no marks â€” you must explain the microscopic mechanism.", "source": "GLM 5.1 â‘،", "_id": "glm_2_34", "judge_pick": false}, {"question": "On a $$p$$â€“$$V$$ graph (Boyle's law isotherm), what shape does the curve have, and how does the curve shift when temperature increases? Explain why. (2 steps)", "answer": "- Step 1: Each isotherm (constant-$$T$$ curve) is a **rectangular hyperbola**: $$pV = nRT = \\text{constant}$$, so $$p = \\text{const}/V$$, which is the equation of a hyperbola. As $$V$$ increases, $$p$$ decreases inversely.\n- Step 2: A higher-temperature isotherm sits **further from the origin** (higher $$pV$$ product). At higher $$T$$, $$nRT$$ is larger, so for any given $$V$$, $$p$$ is higher (molecules hit walls harder and more often). The entire curve shifts upward and to the right. Isotherms never cross â€” each temperature has its own distinct hyperbola.", "source": "GLM 5.1 â‘،", "_id": "glm_2_35", "judge_pick": true}, {"question": "If you plot pressure vs temperature in آ°C for a fixed-volume gas, the line extrapolates to an x-intercept. What is that intercept, and what fundamental physical quantity does it reveal? (2 steps)", "answer": "- Step 1: The x-intercept is at $$-273.15آ°C$$, where pressure would reach zero (molecules have stopped moving). This is **absolute zero** â€” the temperature at which molecular kinetic energy reaches its minimum and gas pressure would vanish.\n- Step 2: This experimental method was historically used to **determine absolute zero** before it was known theoretically. By measuring $$p$$ at several temperatures, plotting $$p$$ vs $$T$$ in آ°C, and extrapolating the straight line to $$p = 0$$, the x-intercept reveals where the Kelvin scale's origin should be. The simulation in the lesson demonstrated this: cooling the gas until pressure reached zero gave $$0\\text{K} = -273آ°C$$.", "source": "GLM 5.1 â‘،", "_id": "glm_2_36", "judge_pick": false}, {"question": "Density is defined as $$\\rho = m/V$$. Why must you convert all dimensions to metres before computing volume, and what is a common error when dimensions are given in mm or cm? (2 steps)", "answer": "- Step 1: The SI unit of density is $$\\text{kgآ·m}^{-3}$$, which requires volume in $$\\text{m}^3$$ and mass in kg. If dimensions are in mm or cm, the volume calculation is off by factors of $$10^6$$ or $$10^3$$ respectively (since volume scales as lengthآ³: $$1\\text{cm}^3 = (0.01\\text{m})^3 = 10^{-6}\\text{m}^3$$).\n- Step 2: A common error: computing volume as (e.g.) $$40 \\times 500 \\times 850$$ and calling it $$\\text{cm}^3$$ when the dimensions are in mm. The correct approach: convert each dimension first ($$40\\text{mm} = 0.040\\text{m}$$, etc.), then multiply to get $$\\text{m}^3$$ directly. The examiner tip: multiply going largerâ†’smaller unit, divide going smallerâ†’larger.", "source": "GLM 5.1 â‘،", "_id": "glm_2_37", "judge_pick": false}, {"question": "State Archimedes' principle, and explain the difference between what happens to upthrust when an object floats vs when it sinks. (3 steps)", "answer": "- Step 1: **Archimedes' principle**: The upward buoyant force (upthrust) on an object immersed in a fluid equals the **weight of the fluid displaced**: $$F_b = \\rho_{fluid} \\cdot V_{displaced} \\cdot g$$.\n- Step 2: **Floating**: The object displaces exactly enough fluid so that upthrust equals the object's weight. The object sits partially submerged â€” it rises until $$F_b = mg$$. **Sinking**: The object displaces its own volume of fluid, but that fluid's weight is less than the object's weight. Upthrust < weight, so there's a net downward force and the object sinks to the bottom.\n- Step 3: The critical distinction: upthrust depends on the **fluid's** density and the **displaced volume**, NOT on the object's mass or density. A heavy steel ship floats because its shape displaces a huge volume of water (making $$F_b$$ large), while a small steel ball sinks because it displaces very little water relative to its weight.", "source": "GLM 5.1 â‘،", "_id": "glm_2_38", "judge_pick": true}, {"question": "Stokes' law gives the viscous drag force on a sphere as $$F = 6\\pi\\eta rv$$. Under what conditions does this formula apply, and what happens when those conditions are violated? (2 steps)", "answer": "- Step 1: Stokes' law applies only to **small spheres moving at low speeds through a viscous fluid** â€” specifically, when the flow around the sphere is **laminar** (smooth, layered, no turbulence). The formula assumes drag is proportional to velocity ($$F \\propto v$$).\n- Step 2: At higher speeds, flow becomes **turbent** â€” chaotic swirling eddies form around the object. In turbulent flow, drag is proportional to $$v^2$$ (not $$v$$), and Stokes' law breaks down completely. The boundary between laminar and turbulent is characterised by the Reynolds number â€” below a critical value, Stokes applies; above it, it doesn't.", "source": "GLM 5.1 â‘،", "_id": "glm_2_39", "judge_pick": false}, {"question": "At terminal velocity, a sphere falling through a fluid has three forces acting on it. What are they, and what is the condition that defines terminal velocity? (3 steps)", "answer": "- Step 1: The three forces: **Weight** downward ($$mg$$), **Upthrust** upward ($$\\rho_f V_{obj} g$$, from Archimedes' principle), and **Viscous drag** upward ($$6\\pi\\eta rv$$, opposing motion).\n- Step 2: Initially, the sphere accelerates downward because weight exceeds upthrust + drag. As speed increases, drag increases (Stokes: $$F_{drag} \\propto v$$). The net downward force shrinks.\n- Step 3: **Terminal velocity condition**: net force = 0. $$mg - \\rho_f V_{obj} g - 6\\pi\\eta rv_{term} = 0$$. At this point, acceleration ceases and the sphere falls at constant speed. Rearranging: $$v_{term} = \\frac{mg - \\rho_f V_{obj} g}{6\\pi\\eta r}$$, showing that terminal velocity depends on the balance of weight minus upthrust divided by the drag coefficient.", "source": "GLM 5.1 â‘،", "_id": "glm_2_40", "judge_pick": true}, {"question": "A proton is composed of quarks with specific charges. Show how the quark composition uud gives the proton a total charge of $$+1e$$, and do the same for the neutron (udd) giving charge $$0$$. (2 steps)", "answer": "- Step 1: **Proton (uud)**: An up quark has charge $$+\\frac{2}{3}e$$, a down quark has charge $$-\\frac{1}{3}e$$. Sum: $$+\\frac{2}{3} + \\frac{2}{3} - \\frac{1}{3} = \\frac{3}{3} = +1e$$. âœ“\n- Step 2: **Neutron (udd)**: $$+\\frac{2}{3} - \\frac{1}{3} - \\frac{1}{3} = \\frac{0}{3} = 0e$$. âœ“ The neutron is electrically neutral because its quark charges sum to exactly zero. This quark charge arithmetic is the core ESAT-testable fact on the Standard Model at this level.", "source": "GLM 5.1 â‘،", "_id": "glm_2_41", "judge_pick": false}, {"question": "What are the four categories of fundamental particles in the Standard Model, and what force does each category mediate (if applicable)? (2 steps)", "answer": "- Step 1: The four categories: **Quarks** (6 types, constituents of protons/neutrons/meson), **Leptons** (electrons, neutrinos â€” not made of quarks), **Gauge bosons** (force carriers), and the theoretical **Higgs boson** (gives mass). At A-level, the key three are quarks, leptons, and gauge bosons.\n- Step 2: Gauge bosons mediate forces:\n+ **Gluons** â†’ strong force (holds quarks in nuclei)\n+ **Photons** â†’ electromagnetic force\n+ **W and Z bosons** â†’ weak force (responsible for beta decay)\n+ **Gravitons** â†’ gravity (theoretical, not yet observed)\nESAT only requires conceptual depth, not quantum field theory.", "source": "GLM 5.1 â‘،", "_id": "glm_2_42", "judge_pick": false}, {"question": "A gas has molecules with different masses. At the same temperature, which has a higher rms speed: the lighter molecule or the heavier one? Explain using the average KE formula. (2 steps)", "answer": "- Step 1: From $$\\langle E_k\\rangle = \\frac{3}{2}kT$$, at the same temperature, all molecules have the **same average KE** regardless of mass. This is a profound result â€” temperature equalises average KE.\n- Step 2: Since $$\\langle E_k\\rangle = \\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$, rearranging gives $$c_{rms} = \\sqrt{3kT/m}$$. For the same $$T$$, $$c_{rms} \\propto 1/\\sqrt{m}$$ â€” lighter molecules move faster. Helium (light) has much higher rms speed than oxygen (heavy) at the same temperature, even though their average KE is identical.", "source": "GLM 5.1 â‘،", "_id": "glm_2_43", "judge_pick": true}, {"question": "The rms speed of nitrogen molecules at $$300\\text{K}$$ is about $$517\\text{mآ·s}^{-1}$$, which is faster than the speed of sound in air. Explain why this is physically expected, not surprising. (2 steps)", "answer": "- Step 1: Sound propagates through air by **molecular collisions** â€” one molecule bumps the next, transmitting a pressure wave. The speed of this transmission cannot exceed the speed of the molecules carrying it. So sound speed must be slower than (or at most comparable to) molecular rms speed.\n- Step 2: Sound speed is slower than rms speed because not all molecular motion contributes to the organised, directional propagation of a sound wave â€” most molecular motion is random and doesn't efficiently transmit the wave. The ratio $$c_{sound}/c_{rms}$$ is about 0.7 for air, consistent with kinetic theory predictions. This connection between microscopic molecular speed and macroscopic sound speed is a beautiful validation of the kinetic model.", "source": "GLM 5.1 â‘،", "_id": "glm_2_44", "judge_pick": false}, {"question": "On a heating curve, the regions between plateaus have positive slope (temperature rising), while the plateaus have zero slope. If you were given a heating curve for an unknown substance and asked to identify which regions involve phase changes, what feature would you look for? (2 steps)", "answer": "- Step 1: Look for **horizontal (flat) regions** where temperature is constant despite energy being supplied. These are the phase-change plateaus â€” the substance is transitioning between states, and all energy goes into PE (breaking bonds), not KE (raising temperature).\n- Step 2: The sloped regions (temperature rising) correspond to **single-phase heating** â€” the substance is entirely in one state (all solid, all liquid, or all gas) and energy goes into KE. The transitions between sloped and flat regions mark the start and end of each phase change. A longer flat region indicates a larger latent heat (more energy needed for that transition).", "source": "GLM 5.1 â‘،", "_id": "glm_2_45", "judge_pick": true}, {"question": "What is the difference between \"mean-square speed\" $$\\langle c^2\\rangle$$ and \"root-mean-square speed\" $$c_{rms}$$? Why does the exam care about which one you quote? (2 steps)", "answer": "- Step 1: **Mean-square speed** $$\\langle c^2\\rangle$$ is the average of the *squares* of molecular speeds â€” it has units of $$\\text{m}^2\\text{آ·s}^{-2}$$ (speedآ²). **Root-mean-square speed** $$c_{rms} = \\sqrt{\\langle c^2\\rangle}$$ is the square root of that average â€” it has units of $$\\text{mآ·s}^{-1}$$ (actual speed units).\n- Step 2: The exam cares because they appear in different contexts. $$\\langle c^2\\rangle$$ appears in the kinetic theory equation $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$ and the KE formula $$\\langle E_k\\rangle = \\frac{1}{2}m\\langle c^2\\rangle$$. $$c_{rms}$$ appears when asked for a \"typical speed.\" Quoting $$\\langle c^2\\rangle$$ when asked for $$c_{rms}$$ (or vice versa) is a common error â€” they differ by a square root factor and have different units. (Trap from watch-list: examiners want \"root-mean-square speed\" or \"mean-square speed\" as appropriate, never just \"average speed.\")", "source": "GLM 5.1 â‘،", "_id": "glm_2_46", "judge_pick": false}, {"question": "The ideal gas equation uses $$N$$ (number of molecules) or $$n$$ (number of moles). Given that $$1\\text{mol}$$ contains $$6.02 \\times 10^{23}$$ molecules, which form would you use if the problem gives you the number of molecules, and which if it gives you mass and molar mass? (2 steps)", "answer": "- Step 1: If the problem gives **number of molecules** $$N$$ directly, use $$pV = NkT$$ â€” it's the most direct route. If the problem gives **mass** and **molar mass**, compute $$n = m/M_{molar}$$ (moles = mass / molar mass in $$\\text{kgآ·mol}^{-1}$$) and use $$pV = nRT$$.\n- Step 2: Both forms give the same $$pV$$ value â€” they're equivalent via $$N = nN_A$$ and $$k = R/N_A$$. The choice is purely about convenience. In exam questions, if they ask for \"number of molecules,\" they expect you to use $$NkT$$; if they ask for \"number of moles,\" they expect $$nRT$$.", "source": "GLM 5.1 â‘،", "_id": "glm_2_47", "judge_pick": false}, {"question": "A student uses $$pV = nRT$$ with $$V$$ in $$\\text{cm}^3$$ and $$T$$ in آ°C. Identify two separate errors and state the correct conversions. (2 steps)", "answer": "- Step 1: **Error 1**: Temperature must be in Kelvin, not Celsius. Using آ°C gives values that are off by a factor of ~4â€“5 at room temperature (e.g., $$20آ°C$$ vs $$293\\text{K}$$). Correct: $$T/\\text{K} = خ¸/آ°\\text{C} + 273$$.\n- Step 2: **Error 2**: Volume must be in $$\\text{m}^3$$, not $$\\text{cm}^3$$. Using $$\\text{cm}^3$$ without conversion gives a volume that's off by a factor of $$10^6$$ (since $$1\\text{cm}^3 = 10^{-6}\\text{m}^3$$). Correct conversions: $$1\\text{cm}^3 = 10^{-6}\\text{m}^3$$, $$1\\text{dm}^3 = 1\\text{L} = 10^{-3}\\text{m}^3$$. Always convert to SI before substituting into $$pV = nRT$$.\n\nThese are Traps 4 and 5 â€” the most common numerical errors.", "source": "GLM 5.1 â‘،", "_id": "glm_2_48", "judge_pick": false}, {"question": "Why can you use any consistent volume unit (cmآ³, dmآ³, mآ³) in Boyle's law $$p_1V_1 = p_2V_2$$, but NOT in $$pV = nRT$$? (2 steps)", "answer": "- Step 1: In Boyle's law, the equation is $$p_1V_1 = p_2V_2$$ â€” a proportionality between two states of the *same* gas. The volume units cancel out as long as both $$V_1$$ and $$V_2$$ are in the same unit. You can use $$\\text{cm}^3$$ for both, and the ratio works fine.\n- Step 2: In $$pV = nRT$$, the equation equates $$pV$$ to a specific numerical value $$nRT$$ using SI constants ($$R = 8.31\\text{Jآ·mol}^{-1}\\text{آ·K}^{-1}$$). The units must be SI (Pa, mآ³, K) for the product $$pV$$ to have the correct value in Joules. If $$V$$ is in $$\\text{cm}^3$$, $$pV$$ would be off by $$10^6$$, giving a wildly wrong $$nRT$$.", "source": "GLM 5.1 â‘،", "_id": "glm_2_49", "judge_pick": false}, {"question": "A sealed syringe contains $$60\\text{cm}^3$$ of air at atmospheric pressure ($$100\\text{kPa}$$). The plunger is pushed in until the volume becomes $$30\\text{cm}^3$$ at constant temperature. Without doing a full calculation, what is the new pressure qualitatively, and why? (2 steps)", "answer": "- Step 1: Boyle's law: $$p_1V_1 = p_2V_2$$. The volume halved ($$60 \\rightarrow 30$$), so the pressure must **double** to keep the product constant: $$p_2 = p_1 \\times V_1/V_2 = 100 \\times 60/30 = 200\\text{kPa}$$.\n- Step 2: Qualitatively: halving the volume means the same number of molecules are crammed into half the space. They hit the walls twice as often (same speed, but half the distance to travel), and the wall area is also reduced, so collisions are concentrated on a smaller surface. Both effects double the pressure.", "source": "GLM 5.1 â‘،", "_id": "glm_2_50", "judge_pick": false}, {"question": "A fixed mass of gas at $$300\\text{K}$$ occupies $$0.025\\text{m}^3$$ at $$1.0 \\times 10^5\\text{Pa}$$. It's then heated to $$450\\text{K}$$ while pressure increases to $$1.5 \\times 10^5\\text{Pa}$. Qualitatively, does the volume increase, decrease, or stay the same? Explain using the combined gas law. (2 steps)", "answer": "- Step 1: The combined gas law: $$V_2 = V_1 \\times (p_1/p_2) \\times (T_2/T_1) = 0.025 \\times (1.0/1.5) \\times (450/300) = 0.025 \\times (2/3) \\times (3/2) = 0.025\\text{m}^3$$.\n- Step 2: The pressure increase (factor 1.5) would compress the gas, but the temperature increase (factor 1.5) would expand it. These two effects **exactly cancel** in this case: $$p_1/p_2 = 2/3$$ and $$T_2/T_1 = 3/2$$, product = 1. The volume stays the same. This illustrates how competing effects can balance â€” higher pressure pushes volume down, higher temperature pushes it up.", "source": "GLM 5.1 â‘،", "_id": "glm_2_51", "judge_pick": false}, {"question": "Why is water's specific heat capacity ($$4200\\text{Jآ·kg}^{-1}\\text{آ·K}^{-1}$$) much higher than ice's ($$2100\\text{Jآ·kg}^{-1}\\text{آ·K}^{-1}$$)? Relate this to the molecular structure. (2 steps)", "answer": "- Step 1: In liquid water, hydrogen bonds are still present but constantly breaking and reforming as molecules slide past each other. Much supplied energy goes into disrupting and re-establishing these bonds rather than into pure translational KE â€” so more energy is needed per degree of temperature rise.\n- Step 2: In ice, the rigid lattice means hydrogen bonds are already locked in place and don't need to be continuously disrupted. Energy goes more directly into vibrational KE, so less energy is needed per degree. The liquid's additional energy sink (dynamic bond restructuring) makes its $$c$$ roughly double that of ice.", "source": "GLM 5.1 â‘،", "_id": "glm_2_52", "judge_pick": false}, {"question": "Sketch (describe) the cooling curve for water starting as steam at $$120آ°C$$ and ending as ice at $$-20آ°C$$. What would be different compared to the heating curve? (2 steps)", "answer": "- Step 1: The cooling curve is a **mirror image** of the heating curve: temperature falls from $$120آ°C$$, plateaus at $$100آ°C$$ (condensation â€” gas â†’ liquid), falls through the liquid range, plateaus at $$0آ°C$$ (freezing â€” liquid â†’ solid), then falls through the solid range to $$-20آ°C$$.\n- Step 2: The plateau temperatures are the same ($$0آ°C$$ and $$100آ°C$$) but the direction is reversed: energy is *released* (not absorbed). During condensation, molecules lose PE as bonds reform; during freezing, the lattice locks in place and more PE is released. The plateaus are the same length as on the heating curve (same latent heats, just released instead of absorbed).", "source": "GLM 5.1 â‘،", "_id": "glm_2_53", "judge_pick": false}, {"question": "What is the Boltzmann constant $$k$$, both in value and in physical meaning? Why is it described as \"bridging microscopic and macroscopic\"? (2 steps)", "answer": "- Step 1: $$k = R/N_A = 1.38 \\times 10^{-23}\\text{Jآ·K}^{-1}$$. It is the **gas constant per molecule** â€” the energy (in joules) associated with a one-kelvin temperature change for a single molecule.\n- Step 2: $$R$$ is macroscopic (per mole, ~$$10^{23}$$ molecules), while $$k$$ is microscopic (per molecule). The equation $$\\langle E_k\\rangle = \\frac{3}{2}kT$$ connects a single molecule's energy (microscopic) to the bulk temperature (macroscopic). $$k$$ is the conversion factor that lets us translate between these two scales â€” it's the fundamental link between statistical mechanics and thermodynamics.", "source": "GLM 5.1 â‘،", "_id": "glm_2_54", "judge_pick": false}, {"question": "A student claims \"at the same temperature, oxygen molecules move at the same speed as helium atoms.\" Is this correct? If not, what is actually equal, and what differs? (2 steps)", "answer": "- Step 1: This is **incorrect**. At the same temperature, what's equal is the **average kinetic energy** ($$\\langle E_k\\rangle = \\frac{3}{2}kT$$ for both). But the **rms speeds differ** because $$c_{rms} = \\sqrt{3kT/m}$$ â€” oxygen molecules ($$m \\approx 5.3 \\times 10^{-26}\\text{kg}$$) are ~4أ— heavier than helium atoms ($$m \\approx 6.6 \\times 10^{-27}\\text{kg}$$), so helium moves about $$\\sqrt{4} \\approx 2$$ times faster.\n- Step 2: The lighter gas compensates for its smaller mass with higher speed, so that $$\\frac{1}{2}m\\langle c^2\\rangle$$ ends up the same. Same KE, different speeds â€” this is a direct consequence of $$\\langle E_k\\rangle$$ depending only on $$T$$, not on the gas identity.", "source": "GLM 5.1 â‘،", "_id": "glm_2_55", "judge_pick": false}, {"question": "In the kinetic theory derivation, we assumed the container is a cube. Does the result $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$ depend on the container shape? Why or why not? (2 steps)", "answer": "- Step 1: The result does **not** depend on the container shape. Although we derived it for a cube (using side length $$L$$ and area $$L^2$$), the final expression $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$ contains only $$V$$ (volume) â€” no shape-dependent terms remain.\n- Step 2: The isotropy argument ($$\\langle v_x^2\\rangle = \\frac{1}{3}\\langle c^2\\rangle$$) holds for any shape â€” molecules move equally in all directions regardless of container geometry. For a non-cubic container, the derivation is more complex (different wall areas, different distances), but averaging over all walls and all directions always yields the same result. Pressure is isotropic, so the shape doesn't matter.", "source": "GLM 5.1 â‘،", "_id": "glm_2_56", "judge_pick": true}, {"question": "Explain why the ideal gas model breaks down at high pressure and low temperature, referencing at least two specific assumptions that are violated. (3 steps)", "answer": "- Step 1: At **high pressure**, molecules are forced close together. The assumption that \"molecules occupy negligible volume compared to the container\" is violated â€” the molecules themselves take up a significant fraction of the space, so the effective volume available for motion is less than $$V$$.\n- Step 2: At **low temperature**, molecules move slowly and spend more time near each other. The assumption that \"intermolecular forces are negligible except during collisions\" is violated â€” weak attractions between molecules become significant over longer timescales, pulling molecules slightly together and reducing the effective pressure below what $$pV = nRT$$ predicts.\n- Step 3: Both effects cause real gases to **deviate from ideal behaviour**: at high pressure, measured $$pV$$ is typically *higher* than predicted (volume exclusion effect); at low temperature, measured $$pV$$ is typically *lower* than predicted (attraction effect). Near the condensation point, deviations are extreme â€” the gas liquefies, which the ideal model cannot describe at all.", "source": "GLM 5.1 â‘،", "_id": "glm_2_57", "judge_pick": false}, {"question": "The heating curve shows temperature plateaus during phase changes. What would happen if you tried to heat a substance through its melting point *without* a plateau â€” i.e., if temperature continued to rise? What does this tell us about the nature of phase transitions? (2 steps)", "answer": "- Step 1: If temperature rose continuously through the melting point, it would mean energy is going into KE (raising temperature) rather than PE (breaking bonds). This would imply the substance is NOT undergoing a phase change â€” it's just getting hotter within the same state.\n- Step 2: A true phase transition **requires** a plateau because bond-breaking is an energy-absorbing process that must be completed before the substance can exist in the new state. You can't have \"partially melted\" material at a higher temperature than the melting point â€” the remaining solid portion is still at the melting temperature, holding the whole system at that temperature until all bonds are broken. The plateau is a necessary signature of genuine state change.", "source": "GLM 5.1 â‘،", "_id": "glm_2_58", "judge_pick": false}, {"question": "If you heat $$0.2\\text{kg}$$ of ice at $$0آ°C$$ until it completely melts, the temperature stays at $$0آ°C$$ throughout. How much energy is required (using $$L_f = 334\\text{kJآ·kg}^{-1}$$), and why doesn't the temperature change? (2 steps)", "answer": "- Step 1: $$\\Delta E = L_f \\times \\Delta m = 334\\text{kJآ·kg}^{-1} \\times 0.2\\text{kg} = 66.8\\text{kJ}$$ (about $$67\\text{kJ}$$). This energy goes entirely into breaking the lattice bonds (increasing PE), not into increasing molecular KE.\n- Step 2: Temperature doesn't change because temperature measures average KE, and KE is unchanged during the phase transition. The $$67\\text{kJ}$$ is stored as potential energy â€” the molecules are now free to slide (liquid) instead of locked in place (solid), but they're moving at the same average speed, so the thermometer reads the same temperature.", "source": "GLM 5.1 â‘،", "_id": "glm_2_59", "judge_pick": false}, {"question": "A kettle supplies $$2.4\\text{kW}$$ to $$1.5\\text{kg}$$ of water already at $$100آ°C$$. How long does it take to boil away $$0.30\\text{kg}$$ of the water? (Qualitative reasoning: is this seconds, minutes, or hours?) (2 steps)", "answer": "- Step 1: Energy needed: $$\\Delta E = L_v \\times \\Delta m = 2260\\text{kJآ·kg}^{-1} \\times 0.30\\text{kg} \\approx 678\\text{kJ}$$ (order of magnitude: hundreds of kJ). Power = $$2.4\\text{kW} = 2.4\\text{kJآ·s}^{-1}$$.\n- Step 2: Time = energy/power = $$678/2.4 \\approx 280\\text{s}$$, which is about **4â€“5 minutes**. This is consistent with everyday experience â€” boiling away a portion of water in a kettle takes a few minutes, much longer than just heating water to $$100آ°C$$ (which takes about a minute). The large $$L_v$$ makes boiling the slow step.", "source": "GLM 5.1 â‘،", "_id": "glm_2_60", "judge_pick": false}, {"question": "Convert $$-40آ°C$$ to Kelvin, and explain why the same numerical value appears on both Celsius and Fahrenheit scales at this temperature (a fun fact that illustrates the arbitrariness of the Celsius zero point). (2 steps)", "answer": "- Step 1: $$T/\\text{K} = -40 + 273 = 233\\text{K}$$. This is well above absolute zero â€” molecules still have significant KE (about $$\\frac{3}{2}k \\times 233 \\approx 4.8 \\times 10^{-21}\\text{J}$$ per molecule).\n- Step 2: The fact that $$-40آ°C = -40آ°F$$ is a mathematical coincidence from the linear conversion between the two scales (they intersect at exactly $$-40$$). It illustrates that the Celsius and Fahrenheit zero points are arbitrary choices with no physical significance â€” only the Kelvin zero point (absolute zero) corresponds to a real physical state (minimum molecular KE).", "source": "GLM 5.1 â‘،", "_id": "glm_2_61", "judge_pick": false}, {"question": "Two gases, A and B, are at the same temperature. Gas A has molecules that are 4 times heavier than Gas B. Compare their average molecular KE and their rms speeds qualitatively. (2 steps)", "answer": "- Step 1: **Average KE**: Identical for both gases. $$\\langle E_k\\rangle = \\frac{3}{2}kT$$ depends only on temperature, not on molecular mass. Same $$T$$ â†’ same $$\\langle E_k\\rangle$$.\n- Step 2: **RMS speed**: Gas B (lighter) is **twice** as fast. From $$c_{rms} = \\sqrt{3kT/m}$$, if $$m_A = 4m_B$$, then $$c_{rms,A} = \\sqrt{3kT/4m_B} = \\frac{1}{2}\\sqrt{3kT/m_B} = \\frac{1}{2}c_{rms,B}$$. The lighter gas moves faster to achieve the same KE with less mass.", "source": "GLM 5.1 â‘،", "_id": "glm_2_62", "judge_pick": false}, {"question": "The molar gas constant $$R$$ has units $$\\text{Jآ·mol}^{-1}\\text{آ·K}^{-1}$$ and value $$8.31$$. What does \"8.31 joules per mole per kelvin\" physically mean? (2 steps)", "answer": "- Step 1: It means that for **one mole** of ideal gas, raising the temperature by **one kelvin** increases the total internal energy by approximately **8.31 joules** (more precisely, the translational KE contribution is $$\\frac{3}{2}R \\approx 12.5\\text{J}$$ per mole per kelvin, since each molecule has 3 translational degrees of freedom).\n- Step 2: $$R$$ is the macroscopic energy scale â€” it tells you how much energy a mole-sized collection of molecules gains per degree. $$k = R/N_A$$ is the microscopic equivalent: how much energy a *single molecule* gains per degree. They encode the same physics at different scales: $$8.31\\text{J}$$ per mole per K = $$1.38 \\times 10^{-23}\\text{J}$$ per molecule per K.", "source": "GLM 5.1 â‘،", "_id": "glm_2_63", "judge_pick": false}, {"question": "A student says \"phase change is a chemical reaction because the substance changes.\" Why is this wrong, and what is the correct classification? (2 steps)", "answer": "- Step 1: Phase change is a **physical change**, not a chemical one. The molecules/atoms are identical before and after â€” Hâ‚‚O molecules in ice are the same Hâ‚‚O molecules in steam. No chemical bonds within the molecules are broken; only the *intermolecular* arrangement and forces change.\n- Step 2: In a chemical reaction, the molecular identity changes (e.g., Hâ‚‚ + Oâ‚‚ â†’ Hâ‚‚O â€” new substance formed). In a phase change, the substance is the same; only its energy state and particle arrangement differ. The simulation in the lesson showed this clearly â€” heating neon just made the same neon atoms move faster and spread out, not transform into a different element.", "source": "GLM 5.1 â‘،", "_id": "glm_2_64", "judge_pick": true}, {"question": "What is the relationship between internal energy and phase for the same substance? Rank solid, liquid, and gas by internal energy and explain why. (3 steps)", "answer": "- Step 1: Ranking: **gas > liquid > solid** (for the same mass of the same substance at temperatures consistent with each phase existing). A gas has the highest internal energy, a solid the lowest.\n- Step 2: In a gas, molecules are far apart with high PE (bonds essentially fully broken) and high KE (fast motion). In a liquid, molecules are close with moderate PE (bonds partially present) and moderate KE. In a solid, molecules are locked in place with low PE (bonds fully formed, negative PE) and low KE (only vibration).\n- Step 3: Going from solid â†’ liquid â†’ gas, both KE and PE increase. KE increases because temperature rises (if we're heating through the sequence), and PE increases because intermolecular bonds are progressively broken. The total U = KE + PE increases at every step, which is why you must continuously supply energy to move up the phase ladder.", "source": "GLM 5.1 â‘،", "_id": "glm_2_65", "judge_pick": true}, {"question": "When ice melts at $$0آ°C$$, the internal energy increases but the temperature doesn't change. When water is heated from $$0آ°C$$ to $$100آ°C$$, both internal energy and temperature increase. Explain the difference in terms of which energy component changes in each case. (2 steps)", "answer": "- Step 1: **During melting**: KE is constant (temperature unchanged), PE increases (bonds breaking â†’ molecules gain separation freedom). So U increases via the PE component only.\n- Step 2: **During heating liquid water**: PE is roughly constant (the substance stays liquid â€” bonds are continuously breaking and reforming at about the same rate), while KE increases (molecules speed up â†’ temperature rises). So U increases via the KE component. The different behaviour explains why the heating curve has plateaus (PE-only changes) and slopes (KE-only changes).", "source": "GLM 5.1 â‘،", "_id": "glm_2_66", "judge_pick": true}, {"question": "What is Avogadro's number $$N_A$$, and why is it needed to convert between the mole-version and molecule-version of the ideal gas equation? (2 steps)", "answer": "- Step 1: $$N_A = 6.02 \\times 10^{23}\\text{mol}^{-1}$$ â€” the number of molecules in one mole of any substance. It's the bridge between the macroscopic counting unit (moles) and the microscopic counting unit (individual molecules).\n- Step 2: $$N = nN_A$$ converts moles to molecules. Substituting into $$pV = nRT$$: $$pV = (N/N_A)RT = N(R/N_A)T = NkT$$, where $$k = R/N_A$$. Without $$N_A$$, we couldn't relate the per-mole constant $$R$$ to the per-molecule constant $$k$$, and we'd have two disconnected equations instead of one unified framework.", "source": "GLM 5.1 â‘،", "_id": "glm_2_67", "judge_pick": false}, {"question": "A substance has specific heat capacity $$c = 2000\\text{Jآ·kg}^{-1}\\text{آ·K}^{-1}$$ and specific latent heat of fusion $$L_f = 300\\text{kJآ·kg}^{-1}$$. To heat $$1\\text{kg}$$ of this solid from $$-10آ°C$$ to just above $$0آ°C$$ (its melting point), roughly how much energy is needed for each stage? Which stage requires more? (2 steps)", "answer": "- Step 1: Heating the solid from $$-10آ°C$$ to $$0آ°C$$: $$\\Delta E_1 = mc\\Delta\\theta = 1 \\times 2000 \\times 10 = 20{,}000\\text{J} = 20\\text{kJ}$$.\n- Step 2: Melting at $$0آ°C$$: $$\\Delta E_2 = L_f \\times \\Delta m = 300 \\times 1 = 300\\text{kJ}$$. The melting step requires **15 times more energy** than the heating step â€” $$300\\text{kJ}$$ vs $$20\\text{kJ}$$. This is typical: latent heats are usually much larger than the sensible heat needed for a few degrees of temperature change, which is why phase changes dominate energy budgets.", "source": "GLM 5.1 â‘،", "_id": "glm_2_68", "judge_pick": true}, {"question": "In the Boyle's law experiment, a graph of $$p$$ vs $$1/V$$ should give a straight line through the origin. Why is this graph preferred over a graph of $$p$$ vs $$V$$, and what does a non-zero intercept indicate? (2 steps)", "answer": "- Step 1: A $$p$$ vs $$V$$ graph gives a hyperbola â€” hard to visually verify proportionality and hard to identify systematic errors. A $$p$$ vs $$1/V$$ graph gives a **straight line** (since $$p = \\text{const}/V$$ becomes $$p = \\text{const} \\times (1/V)$$), which makes it easy to confirm the relationship and spot deviations.\n- Step 2: A non-zero intercept on the $$p$$ vs $$1/V$$ graph indicates a systematic error â€” most commonly, a **zero error in the pressure gauge** or failure to account for atmospheric pressure correctly. If the line doesn't pass through the origin, the constant in $$pV = \\text{const}$$ is offset, suggesting the measured pressure includes a constant background error that needs to be subtracted.", "source": "GLM 5.1 â‘،", "_id": "glm_2_69", "judge_pick": false}, {"question": "Synthesis question: A sealed container of ideal gas is heated from $$200\\text{K}$$ to $$400\\text{K}$. Without doing calculations, state what happens to: (a) average molecular KE, (b) rms speed, (c) pressure, (d) the ratio $$c_{rms}/c_{sound}$$ in the gas. Explain each with the relevant formula. (4 steps)", "answer": "- Step 1: **(a) Average molecular KE doubles**. $$\\langle E_k\\rangle = \\frac{3}{2}kT$$ â€” directly proportional to $$T$$. $$400/200 = 2$$, so KE doubles.\n- Step 2: **(b) RMS speed increases by $$\\sqrt{2} \\approx 1.41$$**. $$c_{rms} = \\sqrt{3kT/m} \\propto \\sqrt{T}$$. $$\\sqrt{400/200} = \\sqrt{2}$$, not 2.\n- Step 3: **(c) Pressure doubles**. Pressure law: $$p \\propto T$$ at constant $$V$$ and $$N$$. $$400/200 = 2$$, so $$p$$ doubles. Alternatively from kinetic theory: faster molecules + more frequent + more forceful collisions â†’ double pressure.\n- Step 4: **(d) The ratio $$c_{rms}/c_{sound}$$ stays roughly constant**. Both $$c_{rms}$$ and $$c_{sound}$$ depend on $$\\sqrt{T}$$ (sound speed in an ideal gas is $$\\sqrt{\\gamma kT/m}$$), so they scale identically with temperature. Their ratio depends on $$\\gamma$$ (a property of the gas), not on $$T$$.", "source": "GLM 5.1 â‘،", "_id": "glm_2_70", "judge_pick": true}, {"question": "Synthesis question: Explain the complete chain from \"you heat a gas in a fixed container\" to \"pressure increases,\" linking macroscopic observation â†’ microscopic mechanism â†’ mathematical prediction. (3 steps)", "answer": "- Step 1: **Macroscopic observation**: You supply thermal energy to a gas in a rigid container. The gas temperature rises (thermometer confirms). You observe higher pressure on a gauge.\n- Step 2: **Microscopic mechanism**: Energy enters as heat â†’ molecules absorb KE â†’ they move faster ($$c_{rms} \\propto \\sqrt{T}$$). Faster molecules reach the walls more quickly (more frequent collisions) and carry more momentum per collision ($$\\Delta p = 2mv_x$$ with larger $$v_x$$). More momentum transferred, more often, to the same wall area â†’ more force per area â†’ higher pressure.\n- Step 3: **Mathematical prediction**: From $$\\langle E_k\\rangle = \\frac{3}{2}kT$$, doubling $$T$$ doubles $$\\langle E_k\\rangle$$ and from $$pV = NkT$$ (constant $$V$$, $$N$$), doubling $$T$$ doubles $$p$$. The pressure law $$p \\propto T$$ is the macroscopic summary of the microscopic three-Fs chain. Theory and observation converge.", "source": "GLM 5.1 â‘،", "_id": "glm_2_71", "judge_pick": true}, {"question": "Synthesis question: Why does boiling a kettle of water take significantly longer than just heating that same water from room temperature to boiling temperature? Use the concepts of specific heat capacity and latent heat to explain. (2 steps)", "answer": "- Step 1: Heating water from $$20آ°C$$ to $$100آ°C$$ requires $$\\Delta E = mc\\Delta\\theta = 1 \\times 4200 \\times 80 = 336\\text{kJ}$$ per kg. This is the \"sensible heat\" â€” raising KE, raising temperature.\n- Step 2: Boiling that water away at $$100آ°C$$ requires $$\\Delta E = L_v \\times m = 2260\\text{kJ}$$ per kg â€” about **6.7 times more energy** than the heating step. The latent heat of vaporisation is enormous because every molecule must be fully separated from all its neighbours (overcoming all remaining hydrogen bonds). This is why the kettle switches off quickly once water reaches $$100آ°C$$ if you're just heating it, but boiling it *dry* would take many minutes longer.", "source": "GLM 5.1 â‘،", "_id": "glm_2_72", "judge_pick": true}, {"question": "Simple exercise: A $$2\\text{kg}$$ block of a material with $$c = 1000\\text{Jآ·kg}^{-1}\\text{آ·K}^{-1}$$ is heated by $$5\\text{K}$$ (no phase change). How much energy is transferred? (1 step)", "answer": "- Step 1: $$\\Delta E = mc\\Delta\\theta = 2 \\times 1000 \\times 5 = 10{,}000\\text{J} = 10\\text{kJ}$$. Mental math: $$2 \\times 1000 = 2000$$, then $$2000 \\times 5 = 10{,}000$$. The key insight: SHC calculations are just multiplication of three numbers â€” mass, capacity, and temperature change â€” and the result tells you how much energy the substance absorbed as KE (since no phase change).", "source": "GLM 5.1 â‘،", "_id": "glm_2_73", "judge_pick": false}, {"question": "Simple exercise: $$0.1\\text{kg}$$ of a substance with latent heat of vaporisation $$L_v = 2000\\text{kJآ·kg}^{-1}$$ is completely vaporised at its boiling point. How much energy is needed? (1 step)", "answer": "- Step 1: $$\\Delta E = L_v \\times \\Delta m = 2000\\text{kJآ·kg}^{-1} \\times 0.1\\text{kg} = 200\\text{kJ}$$. Mental math: $$2000 \\times 0.1 = 200$$. Note: no temperature change occurs â€” all this energy goes into PE (breaking intermolecular bonds completely). The temperature stays at the boiling point throughout.", "source": "GLM 5.1 â‘،", "_id": "glm_2_74", "judge_pick": false}, {"question": "Simple exercise: A gas at $$300\\text{K}$$ has rms speed $$600\\text{mآ·s}^{-1}$. What is the approximate rms speed at $$1200\\text{K}$$ (same gas)? (1 step)", "answer": "- Step 1: $$c_{rms} \\propto \\sqrt{T}$$, so $$c_{rms,2} = c_{rms,1} \\times \\sqrt{T_2/T_1} = 600 \\times \\sqrt{1200/300} = 600 \\times \\sqrt{4} = 600 \\times 2 = 1200\\text{mآ·s}^{-1}$$. Temperature quadrupled â†’ rms speed doubled (not quadrupled!). The $$\\sqrt{T}$$ dependence means speed scales with the square root of temperature, not linearly.", "source": "GLM 5.1 â‘،", "_id": "glm_2_75", "judge_pick": false}, {"question": "Simple exercise: A fixed mass of gas at $$200\\text{kPa}$$ occupies $$50\\text{cm}^3$$. At the same temperature, the volume is changed to $$100\\text{cm}^3$$. What is the new pressure? (1 step)", "answer": "- Step 1: Boyle's law: $$p_1V_1 = p_2V_2$$, so $$p_2 = p_1 \\times V_1/V_2 = 200 \\times 50/100 = 200 \\times 0.5 = 100\\text{kPa}$$. Volume doubled â†’ pressure halved. The inverse proportionality is intuitive: same molecules in twice the space â†’ each wall receives half the hits per second â†’ half the pressure.", "source": "GLM 5.1 â‘،", "_id": "glm_2_76", "judge_pick": false}, {"question": "Simple exercise: Convert $$27آ°C$$ and $$-173آ°C$$ to Kelvin. Which one is closer to absolute zero, and by what factor is the Kelvin temperature smaller? (2 steps)", "answer": "- Step 1: $$27آ°C = 27 + 273 = 300\\text{K}$$, $$-173آ°C = -173 + 273 = 100\\text{K}$$.\n- Step 2: $$100\\text{K}$$ is closer to absolute zero ($$0\\text{K}$$). The factor: $$100/300 = 1/3$$ â€” the colder gas has one-third the Kelvin temperature, meaning one-third the average molecular KE. This illustrates why Celsius is misleading: $$-173آ°C$$ sounds like it's \"173 below zero,\" but in Kelvin it's simply 100 â€” still well above absolute zero, with substantial molecular motion.", "source": "GLM 5.1 â‘،", "_id": "glm_2_77", "judge_pick": false}, {"question": "Simple exercise: A gas at pressure $$p$$ and temperature $$T$$ in a fixed volume has $$N$$ molecules. If the number of molecules is doubled (same $$T$$, same $$V$$), what happens to the pressure? Explain using both $$pV = NkT$$ and the microscopic picture. (2 steps)", "answer": "- Step 1: From $$pV = NkT$$, doubling $$N$$ at constant $$V$$ and $$T$$ doubles $$p$$: $$p' = (2N)kT/V = 2p$$. Mathematically clear.\n- Step 2: Microscopically: twice as many molecules in the same space means twice as many collisions with the walls per second. Each molecule has the same average speed (same $$T$$), so each collision transfers the same momentum. Double the collision rate â†’ double the force on the walls â†’ double the pressure. The two explanations are consistent: more molecules = more collisions = more pressure.", "source": "GLM 5.1 â‘،", "_id": "glm_2_78", "judge_pick": false}, {"question": "Edge case: What happens to the ideal gas equation as pressure approaches zero? Does the gas behave more or less ideally, and why? (2 steps)", "answer": "- Step 1: As pressure approaches zero, the gas behaves **more ideally**. At extremely low pressure, molecules are very far apart â€” their volume is truly negligible compared to the container, and intermolecular forces are vanishingly small because distances are huge. All ideal gas assumptions become increasingly accurate.\n- Step 2: In the limit $$p \\rightarrow 0$$, any real gas obeys $$pV = nRT$$ essentially perfectly. This is why the gas constant $$R$$ was originally determined from measurements at low pressure â€” it's the regime where real gases most closely match the ideal model. Deviations only appear as pressure increases and molecules start crowding together.", "source": "GLM 5.1 â‘،", "_id": "glm_2_79", "judge_pick": false}, {"question": "Counterexample: Water expands when it freezes (ice is less dense than liquid water). How does this violate the general pattern \"solid is roughly as dense as liquid,\" and what causes it? (2 steps)", "answer": "- Step 1: Most substances contract when freezing (solid is denser than liquid). Water is the **exception** â€” ice is about 9% less dense than liquid water, which is why ice floats. This violates the general \"solid â‰ˆ liquid density\" pattern.\n- Step 2: The cause is water's unique **hydrogen-bonded crystal structure**. When water freezes, the H-bonds force molecules into an open hexagonal lattice with large gaps, making the solid structure more spacious than the disordered liquid. Most other substances form tighter-packed solids, but water's lattice is deliberately \"wasteful\" of space due to the geometry of H-bond angles. This anomaly is life-saving â€” if ice sank, lakes would freeze solid from the bottom up.", "source": "GLM 5.1 â‘،", "_id": "glm_2_80", "judge_pick": false}, {"question": "Misconception probe: A student says \"if you add heat to something, its temperature must increase.\" Give a specific counterexample and explain why the statement is false. (2 steps)", "answer": "- Step 1: **Counterexample**: Adding heat to ice at $$0آ°C$$ â€” the temperature stays at exactly $$0آ°C$$ until all the ice has melted. You're continuously supplying energy, but the thermometer reading doesn't change.\n- Step 2: The statement is false because it ignores phase changes. During a phase change, added heat goes into PE (breaking intermolecular bonds), not KE (raising temperature). The correct statement: \"adding heat increases internal energy, but temperature only increases if no phase change is occurring.\" This was Trap 3 â€” Phuc made this exact error in the lesson.", "source": "GLM 5.1 â‘،", "_id": "glm_2_81", "judge_pick": true}, {"question": "Misconception probe: A student says \"internal energy and temperature are basically the same thing.\" Give two counterexamples showing they can change independently. (2 steps)", "answer": "- Step 1: **Counterexample 1**: Ice melting at $$0آ°C$$ â€” internal energy increases (energy is being added) but temperature stays constant at $$0آ°C$$. U changes, T doesn't.\n- Step 2: **Counterexample 2**: Two samples of water at $$50آ°C$$ â€” one has $$1\\text{kg}$$, the other has $$10\\text{kg}$$. Same temperature (same average KE per molecule), but the $$10\\text{kg}$$ sample has 10أ— more internal energy (10أ— more molecules, each with the same average KE). Same T, different U. Temperature measures average KE per molecule; internal energy is the total KE + PE of all molecules. They're related but distinct.", "source": "GLM 5.1 â‘،", "_id": "glm_2_82", "judge_pick": true}, {"question": "Misconception probe: Why can't we say \"the molecules of a gas at $$0آ°C$$ have no kinetic energy\"? What is the actual KE at $$0آ°C$$, and what temperature would actually correspond to zero KE? (2 steps)", "answer": "- Step 1: $$0آ°C = 273\\text{K}$$ â€” well above absolute zero. The average KE at $$0آ°C$$ is $$\\langle E_k\\rangle = \\frac{3}{2}kT = \\frac{3}{2} \\times 1.38 \\times 10^{-23} \\times 273 \\approx 5.65 \\times 10^{-21}\\text{J}$$ per molecule. This is substantial â€” molecules are actively moving.\n- Step 2: Zero KE corresponds to **absolute zero** $$0\\text{K} = -273آ°C$$, not $$0آ°C$$. The Celsius zero point is arbitrary (freezing point of water) and has no physical significance for molecular energy. Only the Kelvin zero corresponds to the physical state of minimum molecular KE. This is why \"twice as cold as $$0آ°C$$\" is meaningless â€” you'd need to convert to Kelvin first to discuss relative KE.", "source": "GLM 5.1 â‘،", "_id": "glm_2_83", "judge_pick": false}, {"question": "A pressureâ€“volume graph shows two isotherms for the same gas at temperatures $$T_1$$ and $$T_2$$, with $$T_2 > T_1$$. At any given volume $$V$$, which isotherm has higher pressure, and why? (2 steps)", "answer": "- Step 1: The **higher-temperature isotherm** ($$T_2$$) has higher pressure at every volume. From $$pV = nRT$$, at fixed $$V$$ and $$n$$: $$p = nRT/V$$, so $$p \\propto T$$. Higher $$T$$ â†’ higher $$p$$.\n- Step 2: Microscopically: at higher temperature, molecules move faster, hit walls more frequently and with more force, producing higher pressure regardless of what volume the container has. The $$T_2$$ curve sits further from the origin on the $$p$$â€“$$V$$ diagram because the $$pV$$ product ($$= nRT_2$$) is larger at every point.", "source": "GLM 5.1 â‘،", "_id": "glm_2_84", "judge_pick": true}, {"question": "The kinetic theory derivation assumes collisions are elastic. What would happen to the gas pressure over time if collisions were inelastic (some KE lost each collision), and why is this assumption essential? (2 steps)", "answer": "- Step 1: If collisions were inelastic, each collision would convert some molecular KE into other forms (heat, deformation). Molecules would gradually slow down, reducing $$c_{rms}$$, reducing $$\\langle E_k\\rangle$$, and reducing temperature. Pressure would **decrease over time** as the gas lost energy internally, eventually approaching zero â€” the gas would spontaneously cool to absolute zero without any external cooling.\n- Step 2: The elastic collision assumption is essential because it ensures **energy conservation within the gas**. Molecular KE is shuffled between molecules during collisions but the total is preserved. This maintains a stable, time-independent average KE (and thus stable temperature and pressure). Without it, the gas couldn't maintain equilibrium â€” it would be a dying system, not a steady state.", "source": "GLM 5.1 â‘،", "_id": "glm_2_85", "judge_pick": true}, {"question": "In the kinetic theory derivation, we replaced $$\\langle v_x^2\\rangle$$ with $$\\frac{1}{3}\\langle c^2\\rangle$$ using isotropy. What physical principle guarantees isotropy, and what would happen if it were violated (e.g., if all molecules moved only in the x-direction)? (2 steps)", "answer": "- Step 1: Isotropy is guaranteed by the **random motion assumption** â€” in a gas at equilibrium with no external fields or directed flows, there's no preferred direction. Molecules move equally in all directions over time, so statistically $$\\langle v_x^2\\rangle = \\langle v_y^2\\rangle = \\langle v_z^2\\rangle$$, each contributing one-third of the total.\n- Step 2: If all molecules moved only in the x-direction (extreme anisotropy), only the two walls perpendicular to x would experience collisions and pressure. The other four walls would feel zero pressure. The formula would become $$pV = Nm\\langle c^2\\rangle$$ (not $$\\frac{1}{3}Nm\\langle c^2\\rangle$$) on the x-walls, and $$p = 0$$ on the y- and z-walls. This isn't a gas in equilibrium â€” it's a directed beam. Isotropy is what makes pressure uniform on all walls, which is what we observe in real equilibrium gases.", "source": "GLM 5.1 â‘،", "_id": "glm_2_86", "judge_pick": false}, {"question": "Exam command word distinction: \"State\" vs \"Explain\" vs \"Describe\" â€” what does each require, and give an example for \"why pressure increases when a gas is heated at constant volume.\" (3 steps)", "answer": "- Step 1: **State**: A single fact, no working, no reasoning. Example: \"Pressure increases.\" (Just the answer, nothing more.)\n- Step 2: **Describe**: A sequential account of what happens, no causal reasoning required. Example: \"The pressure increases as the temperature increases.\" (What happens, in order, but no \"because.\")\n- Step 3: **Explain**: The *why* â€” cause to effect using physics principles. Example: \"Heating increases molecular kinetic energy, so molecules move faster, collide with walls more frequently and with greater force per collision, resulting in greater force per unit area and hence higher pressure.\" (Full causal chain with mechanism.) The examiner awards marks for the \"because\" in an explain question.", "source": "GLM 5.1 â‘،", "_id": "glm_2_87", "judge_pick": false}, {"question": "When discussing phase changes in an exam, what four keyword phrases earn marks? Quote them and explain what each one captures physically. (2 steps)", "answer": "- Step 1: The four mark-earning phrases:\n+ \"energy goes into breaking bonds / overcoming intermolecular forces\" â€” captures that PE is increasing\n+ \"potential energy increases, kinetic energy stays the same\" â€” the precise energy bookkeeping\n+ \"temperature remains constant during a change of state\" â€” the macroscopic observation\n+ \"boiling requires more energy than melting because the molecules must be completely separated\" â€” the comparison of latent heats\n- Step 2: Each phrase captures a different layer: the molecular mechanism (bond-breaking), the energy decomposition (PE vs KE), the macroscopic consequence (constant T), and the quantitative comparison (L_v >> L_f). Together, they form a complete explanation. Using any one alone may earn partial marks; using all four earns full marks.", "source": "GLM 5.1 â‘،", "_id": "glm_2_88", "judge_pick": true}, {"question": "What is the difference between \"gauge pressure\" and \"absolute pressure,\" and why is this distinction critical for gas-law calculations? (2 steps)", "answer": "- Step 1: **Gauge pressure** is the pressure *above atmospheric* â€” what a tyre pressure gauge reads (e.g., $$2.5 \\times 10^5\\text{Pa}$$ above atmospheric). **Absolute pressure** is the *total* pressure the gas actually exerts = gauge + atmospheric (e.g., $$2.5 \\times 10^5 + 1.0 \\times 10^5 = 3.5 \\times 10^5\\text{Pa}$$).\n- Step 2: Gas laws use **absolute pressure** because they relate the total force per area the gas exerts on its container walls. Atmospheric pressure ($$~10^5\\text{Pa}$$) is always present and significant â€” ignoring it would give ~30% error at typical tyre pressures. Always convert gauge â†’ absolute before substituting into $$pV = nRT$$ or any gas law, then convert back to gauge at the end if the question asks for it.", "source": "GLM 5.1 â‘،", "_id": "glm_2_89", "judge_pick": false}, {"question": "The lesson simulation cooled a gas until pressure reached zero, arriving at approximately $$-273آ°C$$. What two things does this experiment demonstrate simultaneously? (2 steps)", "answer": "- Step 1: It demonstrates **absolute zero** (the temperature where molecular motion ceases and pressure vanishes) and validates the **pressure law** (the linear $$p$$â€“$$T$$ relationship that extrapolates to zero pressure at zero Kelvin).\n- Step 2: The extrapolation method is historically significant: by measuring $$p$$ at several known temperatures, plotting $$p$$ vs $$T$$ in آ°C, and extending the line to $$p = 0$$, the x-intercept reveals $$-273آ°C$$ â€” an experimental determination of absolute zero without needing to actually reach it. This is how the Kelvin scale's origin was originally established.", "source": "GLM 5.1 â‘،", "_id": "glm_2_90", "judge_pick": false}, {"question": "What does \"phase\" mean in physics, and how is it different from \"state\"? Can a single substance have multiple phases within the same state? (2 steps)", "answer": "- Step 1: In everyday physics at A-level, \"phase\" and \"state\" are used interchangeably (solid, liquid, gas are both \"states of matter\" and \"phases of matter\"). A phase is a region of a substance where the physical properties (density, arrangement, bond strength) are uniform and distinct from other regions.\n- Step 2: In more advanced physics, a single state can have multiple phases â€” e.g., different crystal structures of iron (ferrite vs austenite) are different solid *phases* of the same substance. Carbon can exist as diamond or graphite â€” both solid, but different phases with radically different properties. At A-level, we simplify: each state (solid/liquid/gas) is treated as one phase, but the deeper truth is that phase is about uniformity of properties, not just solid/liquid/gas classification.", "source": "GLM 5.1 â‘،", "_id": "glm_2_91", "judge_pick": false}, {"question": "A student calculates the energy to melt $$0.5\\text{kg}$$ of ice using $$\\Delta E = mc\\Delta\\theta$$ with $$\\Delta\\theta = 0آ°C$$ and gets zero. What went wrong, and what should they have used? (2 steps)", "answer": "- Step 1: The student applied the **specific heat capacity formula** ($$\\Delta E = mc\\Delta\\theta$$) during a phase change, where $$\\Delta\\theta = 0$$ (temperature doesn't change during melting). This gives $$\\Delta E = 0$$, which is wrong â€” melting clearly requires energy.\n- Step 2: They should have used the **latent heat formula**: $$\\Delta E = L_f \\times \\Delta m = 334\\text{kJآ·kg}^{-1} \\times 0.5\\text{kg} = 167\\text{kJ}$$ (about $$170\\text{kJ}$$). The rule: $$mc\\Delta\\theta$$ for heating within a state (temperature changes), $$L\\Delta m$$ for changing state (temperature constant). This is Trap 8 â€” the most common formula error.", "source": "GLM 5.1 â‘،", "_id": "glm_2_92", "judge_pick": false}, {"question": "The kinetic theory equation $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$ was derived from Newton's laws. The ideal gas equation $$pV = NkT$$ was established empirically. Equating them gave $$\\langle E_k\\rangle = \\frac{3}{2}kT$$. Why is this result considered a profound connection in physics? (2 steps)", "answer": "- Step 1: The result bridges **two completely independent lines of reasoning**: mechanics (Newton's laws applied to molecular collisions â†’ $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$) and thermodynamics (empirical gas laws â†’ $$pV = NkT$$). That they produce the *same* $$pV$$ and thus yield $$\\langle E_k\\rangle = \\frac{3}{2}kT$$ when equated is a deep consistency check â€” the microscopic mechanical model correctly predicts the macroscopic thermodynamic behaviour.\n- Step 2: The equation $$\\langle E_k\\rangle = \\frac{3}{2}kT$$ is the **fundamental link between temperature and molecular motion**. It tells us that temperature â€” a macroscopic, measurable quantity â€” is nothing more than average molecular KE scaled by $$k$$. This unifies the two realms: thermodynamics (macroscopic) and kinetic theory (microscopic) are not separate theories; they're the same physics at different scales, and this equation is the proof.", "source": "GLM 5.1 â‘،", "_id": "glm_2_93", "judge_pick": true}, {"question": "Simple exercise: Gas A has molecules of mass $$m$$, and Gas B has molecules of mass $$4m$$, both at the same temperature. If $$c_{rms}$$ of Gas A is $$800\\text{mآ·s}^{-1}$$, what is $$c_{rms}$$ of Gas B? (1 step)", "answer": "- Step 1: $$c_{rms} = \\sqrt{3kT/m}$$, so $$c_{rms,B} = \\sqrt{3kT/4m} = \\sqrt{1/4} \\times \\sqrt{3kT/m} = \\frac{1}{2} \\times c_{rms,A} = \\frac{1}{2} \\times 800 = 400\\text{mآ·s}^{-1}$$. Quadruple the mass â†’ halve the rms speed (square root relationship). Both gases have the same average KE; the heavier one compensates by moving slower.", "source": "GLM 5.1 â‘،", "_id": "glm_2_94", "judge_pick": false}, {"question": "The lesson mentioned that \"plasma\" is a state where electrons are separated from atoms. Why is plasma not covered in A-level gas-law calculations, and what assumption of the ideal gas would plasma violate? (2 steps)", "answer": "- Step 1: Plasma is not covered because the ideal gas model assumes **neutral molecules** with negligible intermolecular forces. In a plasma, particles are **charged** (free electrons and positive ions), and Coulomb forces between charges are long-range and extremely strong â€” not \"negligible except during collisions.\"\n- Step 2: The ideal gas assumptions of \"negligible intermolecular forces\" and \"short-duration collisions\" both fail for plasma. Charged particles interact over long distances via electromagnetic fields, and the \"collisions\" are complex electromagnetic interactions, not simple elastic bounces. Plasma physics requires entirely different models (e.g., magnetohydrodynamics), far beyond A-level scope.", "source": "GLM 5.1 â‘،", "_id": "glm_2_95", "judge_pick": false}, {"question": "If you double the number of molecules in a fixed-volume container at fixed temperature, what happens to: (a) average KE per molecule, (b) total internal energy, (c) pressure? Explain each. (3 steps)", "answer": "- Step 1: **(a) Average KE per molecule: unchanged**. $$\\langle E_k\\rangle = \\frac{3}{2}kT$$ depends only on temperature, not on how many molecules there are. Same $$T$$ â†’ same average KE per molecule.\n- Step 2: **(b) Total internal energy: doubles**. $$U = N\\langle E_k\\rangle$$ (for ideal gas, PE â‰ˆ 0). Double $$N$$ with same $$\\langle E_k\\rangle$$ â†’ double $$U$$. More molecules each carrying the same average KE means more total energy.\n- Step 3: **(c) Pressure: doubles**. From $$pV = NkT$$, double $$N$$ at constant $$V$$ and $$T$$ â†’ double $$p$$. Microscopically: twice as many molecules in the same space â†’ twice as many wall collisions per second â†’ twice the pressure. Same speed, same force per collision, but twice the collision rate.", "source": "GLM 5.1 â‘،", "_id": "glm_2_96", "judge_pick": false}, {"question": "A heating curve for an unknown substance shows three sloped regions and two flat plateaus. The first plateau is at $$80آ°C$$ and the second at $$220آ°C$$. Identify what is happening in each of the five regions, going from left (low energy) to right (high energy). (3 steps)", "answer": "- Step 1: The five regions, left to right:\n+ **Region 1 (sloped, below $$80آ°C$$)**: Heating the solid â€” temperature rises as KE increases\n+ **Region 2 (flat at $$80آ°C$$)**: Melting â€” solid â†’ liquid, PE increases, KE constant\n+ **Region 3 (sloped, $$80آ°C$$ to $$220آ°C$$)**: Heating the liquid â€” temperature rises\n+ **Region 4 (flat at $$220آ°C$$)**: Boiling â€” liquid â†’ gas, PE increases, KE constant\n+ **Region 5 (sloped, above $$220آ°C$$)**: Heating the gas â€” temperature rises\n- Step 2: The melting point is $$80آ°C$$ and the boiling point is $$220آ°C$$ for this substance. These plateaus identify the transition temperatures â€” they're intrinsic properties of the material.\n- Step 3: The second plateau is likely longer than the first (if $$L_v > L_f$$, which is typical), because more energy is needed to fully separate molecules than to merely loosen the lattice. The relative lengths of the plateaus directly reflect the ratio $$L_v/L_f$$.", "source": "GLM 5.1 â‘،", "_id": "glm_2_97", "judge_pick": false}, {"question": "Why is it important to specify \"translational\" kinetic energy in $$\\langle E_k\\rangle = \\frac{3}{2}kT$$? What other types of KE do molecules have, and why don't they appear in this formula? (2 steps)", "answer": "- Step 1: The formula $$\\langle E_k\\rangle = \\frac{3}{2}kT$$ refers specifically to **translational KE** â€” the energy of motion through space (movement in x, y, z directions). Molecules also have **rotational KE** (spinning) and **vibrational KE** (oscillating internally), but these are not included in $$\\frac{3}{2}kT$$.\n- Step 2: The factor $$\\frac{3}{2}$$ comes from the three translational degrees of freedom (x, y, z), each contributing $$\\frac{1}{2}kT$$ by the equipartition theorem. Rotational and vibrational modes contribute additional energy at higher temperatures, increasing the *total* internal energy beyond $$\\frac{3}{2}NkT$$ and affecting the specific heat capacity. This is why $$c$$ varies between materials â€” molecules with more internal degrees of freedom can store more energy per degree of temperature rise. At A-level, we focus on translational KE only.", "source": "GLM 5.1 â‘،", "_id": "glm_2_98", "judge_pick": false}, {"question": "Simple exercise: A gas cylinder has volume $$0.01\\text{m}^3$$ at pressure $$2 \\times 10^5\\text{Pa}$$ and temperature $$300\\text{K}$$. Roughly how many moles of gas are inside? (Use $$R \\approx 8.3\\text{Jآ·mol}^{-1}\\text{آ·K}^{-1}$$) (1 step)", "answer": "- Step 1: From $$pV = nRT$$: $$n = pV/(RT) = (2 \\times 10^5 \\times 0.01)/(8.3 \\times 300) = 2000/2490 \\approx 0.8\\text{mol}$$ (roughly 0.8 moles). Mental math: $$2 \\times 10^5 \\times 0.01 = 2000$$, $$8.3 \\times 300 \\approx 2500$$, $$2000/2500 = 0.8$$. The key skill: rearrange $$pV = nRT$$ to isolate the unknown, convert all units to SI, and substitute.", "source": "GLM 5.1 â‘،", "_id": "glm_2_99", "judge_pick": false}, {"question": "What is the physical significance of the factor $$\\frac{1}{3}$$ in $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$? Why isn't it $$\\frac{1}{2}$$ or $$1$$? (2 steps)", "answer": "- Step 1: The $$\\frac{1}{3}$$ comes from **isotropy** â€” the three-dimensional nature of molecular motion. Each molecule's total speed squared $$c^2 = v_x^2 + v_y^2 + v_z^2$$ is split equally among three perpendicular directions: $$\\langle v_x^2\\rangle = \\frac{1}{3}\\langle c^2\\rangle$$. Only the x-component contributes to pressure on the x-wall, so we take one-third of the total.\n- Step 2: If space were 2-dimensional, the factor would be $$\\frac{1}{2}$$ (two directions). If molecules moved only in one direction, it would be 1. The factor $$\\frac{1}{3}$$ is a direct signature of our 3D world â€” it tells us that molecular kinetic energy is equally partitioned among three spatial dimensions. This is the equipartition theorem in action: each degree of freedom gets $$\\frac{1}{2}kT$$, and there are 3 translational degrees, giving $$\\frac{3}{2}kT$$ total.", "source": "GLM 5.1 â‘،", "_id": "glm_2_100", "judge_pick": true}, {"question": "A student measures $$p$$ and $$V$$ for a gas at constant $$T$$ and plots $$p$$ vs $$V$$, getting a curve. How should they replot the data to verify Boyle's law as a straight line, and what should the slope of this line equal? (2 steps)", "answer": "- Step 1: Replot as **$$p$$ vs $$1/V$$**. Since $$p = \\text{constant}/V$$, this becomes $$p = \\text{constant} \\times (1/V)$$ â€” a straight line through the origin with slope equal to the constant $$nRT$$.\n- Step 2: The slope of the $$p$$ vs $$1/V$$ line equals $$nRT$$ (the Boyle's law constant for that temperature and mole count). If the line is straight and passes through the origin, Boyle's law is confirmed. A curved line or non-zero intercept indicates experimental error (e.g., temperature drift, pressure gauge zero error, or gas leakage).", "source": "GLM 5.1 â‘،", "_id": "glm_2_101", "judge_pick": true}, {"question": "Why do the gas laws only apply to a \"fixed mass\" of gas? What happens to each law if molecules are added or removed during the process? (2 steps)", "answer": "- Step 1: Each gas law (Boyle, Charles, Pressure) assumes $$N$$ (or $$n$$) is constant. Boyle: $$pV = NkT$$, at constant $$T$$ and $$N$$ â†’ $$pV = \\text{const}$$. If you add molecules mid-experiment, $$N$$ increases, so the \"constant\" in $$pV = \\text{const}$$ actually increases â€” your data would show an apparent violation of Boyle's law that's really just a change in $$N$$.\n- Step 2: In a real experiment (like the syringe with masses), the gas is sealed â€” no molecules enter or leave. This ensures $$N$$ is fixed. If the seal leaks, $$N$$ decreases over time, and the $$pV$$ product falls, making the data unreliable. The full ideal gas equation $$pV = NkT$$ handles changing $$N$$, but the three individual gas laws cannot â€” they're restricted to fixed mass.", "source": "GLM 5.1 â‘،", "_id": "glm_2_102", "judge_pick": false}, {"question": "At $$300\\text{K}$$, the average translational KE per molecule is about $$6.2 \\times 10^{-21}\\text{J}$$. Is this a large or small amount of energy per molecule? Compare it to a typical chemical bond energy (~$$10^{-19}\\text{J}$$) to explain why thermal motion alone doesn't break molecules apart. (2 steps)", "answer": "- Step 1: $$6.2 \\times 10^{-21}\\text{J}$$ is about **60 times smaller** than a typical covalent bond energy (~$$3 \\times 10^{-19}\\text{J}$$ to $$6 \\times 10^{-19}\\text{J}$$). Individual molecular KE at room temperature is far too weak to break intramolecular (within-molecule) bonds.\n- Step 2: This explains why heating something doesn't cause **chemical decomposition** at moderate temperatures â€” thermal KE breaks *intermolecular* bonds (between molecules, which are weaker, ~$$10^{-20}$$ to $$10^{-21}\\text{J}$$ per bond) causing phase changes, but not *intramolecular* bonds (within molecules, which are much stronger). To break molecules apart chemically, you need much higher temperatures where individual molecules occasionally have enough KE (from the tail of the Maxwell-Boltzmann distribution) to break internal bonds â€” this is why chemical reactions accelerate at high temperature.", "source": "GLM 5.1 â‘،", "_id": "glm_2_103", "judge_pick": false}], "count": 104}, "glm_3": {"label": "GLM 5.1 â‘¢", "cards": [{"question": "In a solid, particles are \"close and regular\" in arrangement. What does \"regular\" mean here, and why can't the particles simply sit still? (2 steps)", "answer": "- Step 1: \"Regular\" means the particles occupy a fixed, repeating patternâ€”a lattice. Each particle has a defined position relative to its neighbours, like seats in a cinema. This contrasts with a liquid's \"irregular\" arrangement, where particles are close but have no fixed positional relationship.\n- Step 2: The particles cannot sit still because they always possess thermal energy. At any temperature above absolute zero ($$0\\,\\text{K}$$), particles vibrate about their fixed equilibrium positions. Only at $$0\\,\\text{K}$$ does vibration cease entirely. A common exam trap is saying \"solid particles are stationary\"â€”they vibrate, they just don't translate.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_0", "judge_pick": false}, {"question": "Compare the arrangement, bond strength, and characteristic motion of particles in a liquid versus a gas. (3 steps)", "answer": "- Step 1: **Arrangement** â€” Liquid particles are close together in an irregular pattern (no lattice). Gas particles are far apart and randomly distributed.\n- Step 2: **Bonds** â€” In a liquid, intermolecular forces are medium-strength: particles are attracted to neighbours but can slide past each other. In a gas, intermolecular forces are negligible (very weak) because the particles are too far apart for significant attraction.\n- Step 3: **Motion** â€” Liquid particles slide over one another and flow, taking the shape of their container. Gas particles move in fast, random, straight-line paths between collisions, filling the entire volume available.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_1", "judge_pick": false}, {"question": "A student says: \"Gas particles are weakly bonded to each other.\" Refine this statement so it is exam-accurate. (2 steps)", "answer": "- Step 1: The word \"bonded\" implies a persistent attractive connection, which is misleading for a gas. In the ideal-gas model, intermolecular forces are **negligible** (essentially zero) except during the very brief instant of a collision.\n- Step 2: A better phrasing: \"In a gas, intermolecular forces are negligible because the particles are too far apart for the forces to be significant.\" The particles interact only through momentary, elastic collisionsâ€”there is no sustained bond between gas molecules.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_2", "judge_pick": false}, {"question": "Why are gases typically about $$10^3$$ times less dense than the same substance in its liquid or solid phase? (2 steps)", "answer": "- Step 1: Density is $$\\rho = m/V$$. In a solid or liquid, particles are packed close together, so a given mass occupies a small volume. In a gas, the particles are far apartâ€”most of the container volume is empty space.\n- Step 2: Because the particle separation in a gas is roughly 10 times larger than in the condensed phases, and volume scales as the cube of separation, the volume per particle (and hence the volume for a given mass) is roughly $$10^3$$ times larger. With the same mass in $$10^3$$ times the volume, the density is about $$10^{-3}$$ times as large.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_3", "judge_pick": false}, {"question": "Can iron exist as a gas? What does this tell you about the relationship between substance identity and phase? (2 steps)", "answer": "- Step 1: Yesâ€”any substance can become a gas if enough energy is supplied. You can have iron gas; it just requires extremely high temperatures to break all the metallic bonds and separate the atoms.\n- Step 2: This illustrates that a phase change is a **physical** change, not a chemical one. The substance itself (iron atoms) is unchanged; only the energy of the particles and their arrangement differ. The same iron atoms that form a solid lattice at room temperature fly freely as a gas at sufficiently high temperatures.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_4", "judge_pick": false}, {"question": "Define \"internal energy\" precisely, as required by the Edexcel specification. (1 step)", "answer": "Internal energy ($$U$$) is the sum of the kinetic and potential energies of all the molecules within a given mass of a substance. Two key points: (1) it includes **both** KE and PE contributions, and (2) it sums over **every** molecule, not just one. The units are joules ($$\\text{J}$$).", "source": "GLM 5.1 â‘¢", "_id": "glm_3_5", "judge_pick": false}, {"question": "What two types of molecular energy contribute to internal energy, and what determines each one? (2 steps)", "answer": "- Step 1: **Kinetic energy** â€” due to the motion of molecules (translation, rotation, vibration). This is what we sense macroscopically as temperature. Faster molecules â†’ higher average KE â†’ higher temperature.\n- Step 2: **Potential energy** â€” stored in the intermolecular forces. It depends on how far apart the molecules are and on the configuration of bonds between them. When bonds are being broken (e.g., during melting or boiling), PE increases even though KE (and temperature) stays the same.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_6", "judge_pick": false}, {"question": "A student writes: \"Temperature is the int
