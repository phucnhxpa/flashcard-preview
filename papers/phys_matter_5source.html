C}$$, with energy supplied at constant rate. (5 steps)", "answer": "- Step 1: **Heating solid ice:** temperature rises linearly from $$-20$$ to $$0آ°\\text{C}$$ â€” energy goes into KE of vibrating lattice.\n- Step 2: **Melting plateau at $$0آ°\\text{C}$$:** temperature flat â€” energy goes into PE (breaking lattice bonds).\n- Step 3: **Heating liquid water:** temperature rises linearly from $$0$$ to $$100آ°\\text{C}$$ â€” energy raises molecular KE.\n- Step 4: **Boiling plateau at $$100آ°\\text{C}$$:** much longer flat region â€” energy completely separates molecules (large PE increase).\n- Step 5: **Heating steam:** temperature rises again above $$100آ°\\text{C}$$.\n\nPlateaus are where the substance changes state; the slope of the rising segments depends on the specific heat capacity of each phase.", "source": "Opus 4.7 â‘،", "_id": "opus_2_10", "judge_pick": false}, {"question": "During the melting or boiling plateau on a heating curve, energy is still being supplied â€” so why doesn't the temperature rise?", "answer": "- Step 1: All energy supplied during the plateau goes into **potential energy** of the molecules â€” specifically, into breaking the intermolecular bonds that hold them in their current phase.\n- Step 2: No energy goes into kinetic energy, so the average molecular KE â€” and therefore the temperature â€” does not change.\n- Step 3: Once the phase change completes (all bonds broken/formed), further energy can again raise KE, and temperature resumes rising.\n\nThis is a direct consequence of temperature measuring KE only, not total $$U$$.", "source": "Opus 4.7 â‘،", "_id": "opus_2_11", "judge_pick": false}, {"question": "Why does boiling water require dramatically more energy than melting the same mass of ice, even though both happen at constant temperature?", "answer": "- Step 1: **Melting** only loosens the lattice so molecules can slide past each other â€” intermolecular forces are still largely present in the liquid.\n- Step 2: **Boiling** requires the molecules to be completely separated from one another â€” virtually all intermolecular forces must be overcome.\n- Step 3: For water, $$L_v \\approx 2.26\\,\\text{MJ/kg}$$ and $$L_f \\approx 334\\,\\text{kJ/kg}$$, so $$L_v / L_f \\approx 7$$. Boiling needs ~7أ— more energy per kg.\n\nThis is why boiling a kettle takes much longer than warming the water to the boil.", "source": "Opus 4.7 â‘،", "_id": "opus_2_12", "judge_pick": true}, {"question": "What is the difference between boiling and evaporation, even though both produce gas from liquid? (3 steps)", "answer": "- Step 1: **Boiling** happens throughout the bulk of the liquid at a specific temperature (the boiling point), when vapour pressure equals atmospheric pressure.\n- Step 2: **Evaporation** happens only at the liquid surface, at any temperature below the boiling point.\n- Step 3: Evaporation occurs because in any liquid there's a distribution of molecular speeds â€” the most energetic molecules in the high-speed tail can escape the surface. This also explains why evaporation cools the remaining liquid (it loses its most energetic molecules).", "source": "Opus 4.7 â‘،", "_id": "opus_2_13", "judge_pick": false}, {"question": "Name the forward and reverse phase transitions for: solidâ†”liquid, liquidâ†”gas, and solidâ†”gas.", "answer": "- Step 1: **Solid â†’ Liquid:** melting (or fusion). Reverse: **freezing** (or solidification).\n- Step 2: **Liquid â†’ Gas:** boiling/vaporisation (at boiling point) or **evaporation** (below boiling point). Reverse: **condensation**.\n- Step 3: **Solid â†’ Gas:** sublimation. Reverse: **deposition**.\n\nWatch the trap: \"cooling\" is not a phase-change name â€” the change from gas to liquid is **condensation**, even though cooling causes it.", "source": "Opus 4.7 â‘،", "_id": "opus_2_14", "judge_pick": false}, {"question": "State the equation linking heat energy supplied to a temperature change, defining every symbol with units.", "answer": "- Step 1: $$\\Delta E = mc\\Delta\\theta$$ where $$\\Delta E$$ is energy in $$\\text{J}$$, $$m$$ is mass in $$\\text{kg}$$, $$c$$ is specific heat capacity in $$\\text{J kg}^{-1}\\text{K}^{-1}$$, and $$\\Delta\\theta$$ is temperature change.\n- Step 2: Crucially, $$\\Delta\\theta$$ can be in either $$آ°\\text{C}$$ or $$\\text{K}$$ because a temperature *change* of 1 K equals a change of $$1آ°\\text{C}$$ â€” only absolute temperatures must be in K.\n- Step 3: This equation applies ONLY when there is no phase change occurring. Use $$\\Delta E = L\\Delta m$$ during a phase change.", "source": "Opus 4.7 â‘،", "_id": "opus_2_15", "judge_pick": true}, {"question": "Define specific heat capacity precisely.", "answer": "Specific heat capacity $$c$$ is the energy required to raise the temperature of **one kilogram** of a substance by **one kelvin** (or equivalently $$1آ°\\text{C}$$). Units: $$\\text{J kg}^{-1}\\text{K}^{-1}$$. The \"per kilogram per kelvin\" structure is what makes it *specific* â€” it's a property of the material independent of how much you have.", "source": "Opus 4.7 â‘،", "_id": "opus_2_16", "judge_pick": false}, {"question": "Water has an unusually high specific heat capacity ($$4200\\,\\text{J kg}^{-1}\\text{K}^{-1}$$). Conceptually, why, and what practical consequences follow? (3 steps)", "answer": "- Step 1: $$c$$ depends on how many degrees of freedom (translational, rotational, vibrational) the molecules can store energy in, and on the strength of intermolecular interactions.\n- Step 2: Water has hydrogen bonds â€” strong intermolecular forces that require lots of energy to disrupt even slightly. So a lot of energy is \"absorbed\" before any rise in molecular KE (temperature) is detected.\n- Step 3: Consequences:\n+ Water stays hot a long time â†’ useful in radiators.\n+ Water absorbs lots of heat without much temperature change â†’ ideal coolant.\n+ Oceans moderate climate â€” they buffer temperature swings.", "source": "Opus 4.7 â‘،", "_id": "opus_2_17", "judge_pick": false}, {"question": "State the equation for energy required during a phase change, defining symbols, and explain why no temperature term appears. (3 steps)", "answer": "- Step 1: $$\\Delta E = L\\Delta m$$, where $$L$$ is specific latent heat in $$\\text{J kg}^{-1}$$ and $$\\Delta m$$ is the mass undergoing phase change.\n- Step 2: There's no $$\\Delta\\theta$$ because **temperature is constant during a phase change** â€” all energy goes into PE (breaking bonds), not KE.\n- Step 3: $$L_f$$ (fusion) is for solidâ†”liquid; $$L_v$$ (vaporisation) is for liquidâ†”gas. Picking the wrong one introduces order-of-magnitude errors.", "source": "Opus 4.7 â‘،", "_id": "opus_2_18", "judge_pick": false}, {"question": "Define specific latent heat of fusion and specific latent heat of vaporisation.", "answer": "- Step 1: **Specific latent heat of fusion** ($$L_f$$): the thermal energy required to convert one kilogram of solid to liquid with no change in temperature.\n- Step 2: **Specific latent heat of vaporisation** ($$L_v$$): the thermal energy required to convert one kilogram of liquid to gas with no change in temperature.\n- Step 3: Both have units $$\\text{J kg}^{-1}$$. The \"no change in temperature\" clause is essential â€” it's what makes them *latent* (hidden, not detectable as a temperature change).", "source": "Opus 4.7 â‘،", "_id": "opus_2_19", "judge_pick": false}, {"question": "List the assumptions of an ideal gas (a minimum of three are needed for a typical exam question).", "answer": "- Step 1: **Negligible molecular volume** compared to the container volume.\n- Step 2: **Negligible intermolecular forces** except during the very brief instant of collision.\n- Step 3: **Elastic collisions** (molecule-molecule and molecule-wall) â€” no KE lost.\n- Step 4: **Collision time is negligible** compared to the time between collisions.\n- Step 5: **Random motion** â€” directions and speeds are distributed; molecules obey Newton's laws.\n- Step 6: **Very many molecules** so statistical averaging is valid.\n\nReal gases approximate this best at low pressure and high temperature, where molecules are far apart and rarely interact strongly.", "source": "Opus 4.7 â‘،", "_id": "opus_2_20", "judge_pick": false}, {"question": "Why do real gases deviate from ideal behaviour at high pressure and/or low temperature?", "answer": "- Step 1: At **high pressure**, molecules are forced close together, so their volume is no longer negligible compared to the container, and intermolecular forces between neighbours become significant.\n- Step 2: At **low temperature**, molecules move slowly so they spend more time within range of intermolecular forces â€” attractions between them affect motion and reduce the pressure they exert.\n- Step 3: Conversely, ideal behaviour is best at **low pressure** (gas is dilute) and **high temperature** (KE dominates over any PE from interactions).\n\nThis is why $$pV = nRT$$ works best for \"thin, hot\" gases â€” the assumptions of negligible volume and negligible forces actually hold.", "source": "Opus 4.7 â‘،", "_id": "opus_2_21", "judge_pick": true}, {"question": "State Boyle's law in words and as an equation, including the conditions under which it holds.", "answer": "- Step 1: **Words:** The pressure of a fixed mass of gas at constant temperature is inversely proportional to its volume.\n- Step 2: **Equation:** $$pV = \\text{const}$$, or equivalently $$p_1V_1 = p_2V_2$$.\n- Step 3: **Conditions:** Temperature $$T$$ constant; amount of gas ($$N$$ or $$n$$) fixed.\n\nA graph of $$p$$ vs $$V$$ at constant $$T$$ is a rectangular hyperbola (an isotherm). Higher temperatures give isotherms further from the origin.", "source": "Opus 4.7 â‘،", "_id": "opus_2_22", "judge_pick": false}, {"question": "State Charles's law and the Pressure law in words, and explain why their graphs (when plotted against Kelvin temperature) extrapolate to the origin.", "answer": "- Step 1: **Charles's law:** at constant $$p$$ and $$N$$, $$V \\propto T$$ (Kelvin), so $$V_1/T_1 = V_2/T_2$$.\n- Step 2: **Pressure law:** at constant $$V$$ and $$N$$, $$p \\propto T$$ (Kelvin), so $$p_1/T_1 = p_2/T_2$$.\n- Step 3: Both are direct proportionalities, so the graphs pass through the origin $$(0,0)$$ in Kelvin. Plotted against $$\\theta$$ in $$آ°\\text{C}$$, the line has the same slope but x-intercept at $$-273.15آ°\\text{C}$$ â€” this gives an experimental route to absolute zero.", "source": "Opus 4.7 â‘،", "_id": "opus_2_23", "judge_pick": false}, {"question": "Write the ideal gas equation in both its molar and molecular forms, and explain the relationship between the constants. (3 steps)", "answer": "- Step 1: **Molar form:** $$pV = nRT$$, where $$n$$ is moles and $$R = 8.31\\,\\text{J mol}^{-1}\\text{K}^{-1}$$ (molar gas constant).\n- Step 2: **Molecular form:** $$pV = NkT$$, where $$N$$ is number of molecules and $$k = 1.38 \\times 10^{-23}\\,\\text{J K}^{-1}$$ (Boltzmann constant).\n- Step 3: The constants are related by $$k = R/N_A$$, where $$N_A = 6.02 \\times 10^{23}\\,\\text{mol}^{-1}$$. This connects the macroscopic ($$n$$, $$R$$) and microscopic ($$N$$, $$k$$) viewpoints.", "source": "Opus 4.7 â‘،", "_id": "opus_2_24", "judge_pick": false}, {"question": "Derive the kinetic theory expression $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$ from first principles, considering one molecule colliding elastically with a wall. (5 steps)", "answer": "- Step 1: Consider one molecule of mass $$m$$ moving with velocity components $$(v_x, v_y, v_z)$$ in a cubical box of side $$L$$. On striking the wall perpendicular to $$x$$, elastic collision reverses $$v_x$$, so momentum change $$\\Delta p = 2mv_x$$.\n- Step 2: Time between successive hits on that wall: the molecule must travel $$2L$$ in the $$x$$-direction, so $$\\Delta t = 2L/v_x$$.\n- Step 3: Force on the wall from this one molecule: $$F_1 = \\Delta p/\\Delta t = 2mv_x \\div (2L/v_x) = mv_x^2/L$$.\n- Step 4: Summing over $$N$$ molecules and averaging: $$F = Nm\\langle v_x^2\\rangle / L$$. Pressure $$p = F/L^2 = Nm\\langle v_x^2\\rangle/V$$.\n- Step 5: By isotropy (motion equally distributed in all directions), $$\\langle v_x^2\\rangle = \\tfrac{1}{3}\\langle c^2\\rangle$$ where $$\\langle c^2\\rangle = \\langle v_x^2 + v_y^2 + v_z^2\\rangle$$. Hence $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$.\n\nThe derivation shows pressure is a *statistical* consequence of countless individual elastic collisions.", "source": "Opus 4.7 â‘،", "_id": "opus_2_25", "judge_pick": false}, {"question": "Starting from $$pV = NkT$$ and $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$, derive the expression for the average translational kinetic energy of one molecule. (3 steps)", "answer": "- Step 1: The two expressions both equal $$pV$$, so their right-hand sides are equal: $$\\tfrac{1}{3}Nm\\langle c^2\\rangle = NkT$$.\n- Step 2: Cancel $$N$$ and multiply both sides by $$\\tfrac{3}{2}$$: $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$.\n- Step 3: The left-hand side is exactly the average translational KE of one molecule. So:\n$$\\langle E_k\\rangle = \\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$.\n\nThis is the bridge between the microscopic (molecular motion) and macroscopic (temperature) descriptions.", "source": "Opus 4.7 â‘،", "_id": "opus_2_26", "judge_pick": true}, {"question": "What two key conceptual consequences follow from $$\\langle E_k\\rangle = \\tfrac{3}{2}kT$$?", "answer": "- Step 1: **Average molecular KE is directly proportional to absolute temperature** â€” doubling $$T$$ (in Kelvin) exactly doubles the average translational KE.\n- Step 2: **It does not depend on the identity of the gas.** At the same $$T$$, helium and oxygen molecules have the same average KE.\n+ But helium molecules are much lighter, so they move much faster (different $$c_{rms}$$).\n+ This is why lighter gases diffuse and escape more quickly.\n- Step 3: Temperature is essentially a measure of \"energy per molecule in the chaotic motion\" â€” universal across substances.", "source": "Opus 4.7 â‘،", "_id": "opus_2_27", "judge_pick": false}, {"question": "Why do we use the root-mean-square speed $$c_{rms}$$ rather than the average velocity to describe gas molecules?", "answer": "- Step 1: The average velocity $$\\langle\\vec{v}\\rangle$$ of gas molecules is zero by symmetry â€” for every molecule moving right, another moves left. So $$\\langle\\vec{v}\\rangle$$ is useless as a measure of typical motion.\n- Step 2: Squaring the velocities removes the sign â€” all $$v^2$$ values are positive â€” so $$\\langle c^2\\rangle$$ is a genuine measure of \"typical motion squared.\"\n- Step 3: Taking the square root, $$c_{rms} = \\sqrt{\\langle c^2\\rangle}$$, gives a representative speed with the correct units of $$\\text{m/s}$$.\n\nIt's a mathematical workaround to extract a meaningful speed from a symmetric velocity distribution.", "source": "Opus 4.7 â‘،", "_id": "opus_2_28", "judge_pick": false}, {"question": "Write the expression for $$c_{rms}$$ in terms of temperature, and explain why doubling $$T$$ does NOT double the rms speed. (3 steps)", "answer": "- Step 1: From $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$, we get $$c_{rms} = \\sqrt{3kT/m} = \\sqrt{3RT/M}$$, where $$M$$ is molar mass.\n- Step 2: Notice $$c_{rms} \\propto \\sqrt{T}$$, not $$T$$ itself.\n- Step 3: So doubling $$T$$ (in Kelvin) multiplies $$c_{rms}$$ by $$\\sqrt{2} \\approx 1.41$$, not by 2. But the average KE *does* exactly double, because $$\\langle E_k\\rangle \\propto T$$.\n\nA classic exam trap is confusing the two relationships.", "source": "Opus 4.7 â‘،", "_id": "opus_2_29", "judge_pick": false}, {"question": "Using kinetic theory, give the \"three Fs\" explanation of why the pressure of a fixed-volume gas increases when it's heated. (3 steps)", "answer": "- Step 1: **Faster:** higher $$T$$ means higher average KE (since $$\\langle E_k\\rangle = \\tfrac{3}{2}kT$$), so molecules move faster on average.\n- Step 2: **More Frequent collisions:** faster molecules cover the distance to the wall and back more quickly, so each one hits the wall more often per second.\n- Step 3: **More Force per impact:** faster molecules have more momentum, so each collision transfers more momentum to the wall ($$\\Delta p = 2mv_x$$).\n+ More force, applied more often, on the same area â†’ higher pressure.\n+ This recovers the pressure law $$p \\propto T$$ at constant $$V$$.", "source": "Opus 4.7 â‘،", "_id": "opus_2_30", "judge_pick": false}, {"question": "Conceptually, why is Boyle's law ($$p \\propto 1/V$$) true at constant temperature?", "answer": "- Step 1: Constant temperature means average molecular KE â€” and so molecular speeds â€” are unchanged.\n- Step 2: If you halve the volume (push the walls in), molecules have to travel less distance between collisions with the walls, so they hit them roughly twice as often.\n- Step 3: Twice as many collisions per second on the same wall area, with each impact delivering the same momentum, means pressure roughly doubles.\n\nSo $$pV$$ stays constant â€” pressure scales inversely with volume because frequency of impacts scales inversely with volume.", "source": "Opus 4.7 â‘،", "_id": "opus_2_31", "judge_pick": false}, {"question": "A sealed syringe holds gas at room temperature. The plunger is slowly pushed in to halve the volume. Conceptually, what happens to pressure and to molecular speed?", "answer": "- Step 1: If compression is slow enough that the gas stays at room temperature (isothermal), Boyle's law applies: $$p_1V_1 = p_2V_2$$. Halving $$V$$ doubles $$p$$.\n- Step 2: Molecular speeds do NOT change â€” temperature is unchanged, so $$\\langle E_k\\rangle$$ and hence $$c_{rms}$$ are unchanged.\n- Step 3: The pressure rise comes purely from more frequent wall collisions (smaller box, same speeds), not from faster molecules.\n\nIf you push the plunger fast (adiabatic), the gas heats â€” but that's a different scenario.", "source": "Opus 4.7 â‘،", "_id": "opus_2_32", "judge_pick": true}, {"question": "A fixed mass of ideal gas is at 300 K. If you halve its volume and simultaneously double its absolute temperature, what happens to the pressure (qualitatively)?", "answer": "- Step 1: Combined gas law: $$\\frac{p_1V_1}{T_1} = \\frac{p_2V_2}{T_2}$$, so $$p_2 = p_1 \\cdot \\frac{V_1}{V_2} \\cdot \\frac{T_2}{T_1}$$.\n- Step 2: Substituting: $$p_2 = p_1 \\times 2 \\times 2 = 4p_1$$.\n- Step 3: Pressure quadruples. Intuition: halving volume doubles pressure (Boyle), and doubling temperature doubles it again (pressure law) â€” the two effects multiply.", "source": "Opus 4.7 â‘،", "_id": "opus_2_33", "judge_pick": false}, {"question": "When a car tyre warms up during driving (volume essentially fixed), why does the pressure increase, and roughly by what factor if $$T$$ goes from 288 K to 318 K?", "answer": "- Step 1: At constant $$V$$ and fixed amount of gas, the pressure law gives $$p \\propto T$$ (Kelvin), so $$p_2/p_1 = T_2/T_1$$.\n- Step 2: $$T_2/T_1 = 318/288 \\approx 1.1$$, so absolute pressure rises by about 10%.\n- Step 3: **Important nuance:** the *gauge* pressure (reading above atmospheric) rises by *more* than 10% in fractional terms, because the absolute pressure includes atmospheric.\n+ Example: if absolute $$p_1 = 3.5\\times 10^5\\,\\text{Pa}$$ (gauge $$2.5\\times 10^5$$), then $$p_2 \\approx 3.86\\times 10^5\\,\\text{Pa}$$, gauge $$\\approx 2.86\\times 10^5$$ â€” a 14% rise in gauge reading.\n\nLesson: always work with absolute pressures in gas-law calculations.", "source": "Opus 4.7 â‘،", "_id": "opus_2_34", "judge_pick": false}, {"question": "In a problem combining heating ice through to steam, why does the boiling step dominate the total energy required? (3 steps)", "answer": "- Step 1: For water, $$L_v \\approx 2.26\\,\\text{MJ/kg}$$, about 7أ— larger than $$L_f \\approx 334\\,\\text{kJ/kg}$$, and much larger per-kg than $$c\\Delta\\theta$$ over any reasonable temperature range (e.g., $$c\\Delta\\theta_{100K} = 420\\,\\text{kJ/kg}$$).\n- Step 2: So if you sum: heating ice + melting + heating water + boiling, the boiling step is typically ~5â€“10أ— the others combined.\n- Step 3: Intuition: boiling requires completely separating all molecules (overcoming all intermolecular forces), whereas heating just speeds them up modestly, and melting just disrupts the lattice partially.\n\nThis is why a kettle takes much longer to boil dry than to reach 100آ°C.", "source": "Opus 4.7 â‘،", "_id": "opus_2_35", "judge_pick": true}, {"question": "A small mass of ice at 0آ°C is added to a cup of warm water. Energy is removed from the warm water to melt the ice. How does the temperature of the warm water change, and what's the role of latent heat? (3 steps)", "answer": "- Step 1: The ice absorbs energy via latent heat of fusion ($$L_f\\Delta m$$) while staying at 0آ°C â€” this energy comes from the warm water, which cools.\n- Step 2: Only AFTER the ice has fully melted does the resulting cold water then absorb further energy by $$mc\\Delta\\theta$$, mixing with the warm water and lowering the overall temperature further.\n- Step 3: Key insight: a small mass of ice cools a drink much more than the same mass of water at 0آ°C, because of the additional $$L_f\\Delta m$$ \"buffer\" that must be paid before the meltwater starts warming.", "source": "Opus 4.7 â‘،", "_id": "opus_2_36", "judge_pick": true}, {"question": "Estimate, qualitatively, how much faster the rms speed of helium atoms is compared to nitrogen molecules at the same temperature. (3 steps)", "answer": "- Step 1: At the same $$T$$, both have the same average KE: $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$.\n- Step 2: So $$c_{rms} \\propto 1/\\sqrt{m}$$. Helium has molar mass ~4 g/mol; nitrogen ($$N_2$$) ~28 g/mol â€” ratio of about 7.\n- Step 3: So helium's $$c_{rms}$$ is faster by $$\\sqrt{7} \\approx 2.6$$ times.\n\nThis is why helium balloons deflate quickly (helium leaks out fast) and why lighter gases diffuse more rapidly.", "source": "Opus 4.7 â‘،", "_id": "opus_2_37", "judge_pick": false}, {"question": "Briefly outline the apparatus and method of Core Practical 14 (Boyle's law).", "answer": "- Step 1: **Apparatus:** a sealed gas syringe (or trapped column of gas), a pressure gauge, and a way to apply varying force/pressure (e.g., adding masses to a plunger).\n- Step 2: **Method:** record volume $$V$$ from the syringe scale and corresponding pressure $$p$$ from the gauge. Add masses in steps; for each, record both readings. Pressure can be calculated as atmospheric pressure $$+$$ $$mg/A$$, with $$A$$ the syringe cross-section.\n- Step 3: **Analysis:** plot $$p$$ against $$1/V$$ â€” a straight line through the origin confirms $$p \\propto 1/V$$ (Boyle's law). Alternatively, plot $$pV$$ against $$p$$ â€” a horizontal line shows $$pV$$ is constant.", "source": "Opus 4.7 â‘،", "_id": "opus_2_38", "judge_pick": false}, {"question": "Why must you wait several seconds between adding each mass in the Boyle's law experiment before reading the volume? (3 steps)", "answer": "- Step 1: When the gas is compressed, work is done on it, momentarily increasing its internal energy and temperature.\n- Step 2: Boyle's law assumes constant temperature, so taking a reading immediately would record a $$V$$ that doesn't correspond to thermal equilibrium with surroundings.\n- Step 3: Waiting allows heat to leak from the gas to the room, returning the gas to ambient temperature. Now the $$(p, V)$$ reading is genuinely isothermal and Boyle's law applies.\n\nFailing to wait is a classic systematic error that breaks the assumption $$T$$ constant.", "source": "Opus 4.7 â‘،", "_id": "opus_2_39", "judge_pick": false}, {"question": "A heating curve has plateaus at $$0آ°\\text{C}$$ and at $$100آ°\\text{C}$$ for water. Which plateau is longer (assuming constant heating power), and why?", "answer": "- Step 1: Plateau length on a heating curve at constant power is proportional to the energy needed to complete the phase change, which is $$L\\Delta m$$.\n- Step 2: For water, $$L_v \\approx 7 L_f$$, so the boiling plateau (at 100آ°C) is about 7أ— longer than the melting plateau (at 0آ°C).\n- Step 3: Conceptually, this reflects the fact that boiling requires completely separating molecules (huge PE increase), while melting only disrupts the lattice partially.", "source": "Opus 4.7 â‘،", "_id": "opus_2_40", "judge_pick": false}, {"question": "Why is internal energy NOT simply $$U = \\tfrac{3}{2}NkT$$ for a real substance, even though this formula works for an ideal gas? (3 steps)", "answer": "- Step 1: The ideal gas model assumes negligible intermolecular forces, so molecular PE is taken as zero. Then $$U$$ is entirely KE: $$U = N\\langle E_k\\rangle = \\tfrac{3}{2}NkT$$.\n- Step 2: For real substances (solids, liquids, dense gases), intermolecular forces store significant PE. $$U$$ includes both KE and PE contributions.\n- Step 3: This is especially obvious during a phase change: $$T$$ (hence KE) is constant, but $$U$$ rises substantially via PE. The ideal-gas formula would predict $$U$$ constant, which is wrong.\n\nThe formula $$U = \\tfrac{3}{2}NkT$$ is a model-specific result â€” don't apply it outside the ideal gas regime.", "source": "Opus 4.7 â‘،", "_id": "opus_2_41", "judge_pick": true}, {"question": "Mental-math exercise: an ideal gas at 300 K has rms speed $$\\sim 500\\,\\text{m/s}$$. Roughly what is $$c_{rms}$$ at 1200 K?", "answer": "- Step 1: $$c_{rms} \\propto \\sqrt{T}$$.\n- Step 2: $$T$$ increases by a factor of 4 (300 â†’ 1200), so $$c_{rms}$$ increases by $$\\sqrt{4} = 2$$.\n- Step 3: New $$c_{rms} \\approx 1000\\,\\text{m/s}$$.\n\nQuick check: the average KE goes up by 4أ—, which is consistent with speed doubling (since KE $$\\propto v^2$$).", "source": "Opus 4.7 â‘،", "_id": "opus_2_42", "judge_pick": false}, {"question": "Mental-math exercise: a fixed mass of ideal gas at 1 atm and 300 K is heated to 600 K at constant volume. What is the new pressure?", "answer": "- Step 1: At constant $$V$$ and $$N$$, pressure law: $$p \\propto T$$ (Kelvin).\n- Step 2: $$T$$ doubles (300 â†’ 600 K), so pressure doubles.\n- Step 3: New pressure â‰ˆ 2 atm.\n\nConceptually: molecules are faster, hit the wall more often, and each impact delivers more momentum â€” but the \"three Fs\" combine in just the right way to give exactly $$p \\propto T$$.", "source": "Opus 4.7 â‘،", "_id": "opus_2_43", "judge_pick": false}, {"question": "Mental-math exercise: 0.1 kg of water at 20آ°C is heated to 30آ°C. Roughly how much energy is needed? ($$c_w \\approx 4200\\,\\text{J kg}^{-1}\\text{K}^{-1}$$).", "answer": "- Step 1: $$\\Delta E = mc\\Delta\\theta$$.\n- Step 2: $$\\Delta E = 0.1 \\times 4200 \\times 10$$.\n- Step 3: $$\\Delta E = 4200\\,\\text{J} \\approx 4.2\\,\\text{kJ}$$.\n\nConceptual check: to raise 1 kg by 1 K needs ~4 kJ â€” this scales linearly with both mass and temperature change.", "source": "Opus 4.7 â‘،", "_id": "opus_2_44", "judge_pick": false}, {"question": "Mental-math exercise: a gas occupies 2 L at 1 atm. It's compressed isothermally to 0.5 L. What's the new pressure?", "answer": "- Step 1: Boyle's law: $$p_1V_1 = p_2V_2$$.\n- Step 2: Volume reduced by factor of 4 (2 L â†’ 0.5 L), so pressure increases by factor of 4.\n- Step 3: New pressure = 4 atm.\n\nThe units of volume don't need to be converted to mآ³ as long as both volumes use the same unit.", "source": "Opus 4.7 â‘،", "_id": "opus_2_45", "judge_pick": false}, {"question": "Misconception probe: a student says \"during a phase change, the internal energy stays constant because the temperature stays constant.\" What's wrong with this?", "answer": "- Step 1: Temperature reflects only the **kinetic** part of internal energy (average molecular KE). Constant $$T$$ means constant average KE.\n- Step 2: But internal energy $$U$$ = KE + PE. During a phase change, energy supplied goes entirely into **potential energy** (breaking bonds), so $$U$$ rises substantially even though $$T$$ is unchanged.\n- Step 3: Conclusion: phase changes have $$\\Delta U > 0$$ but $$\\Delta T = 0$$ â€” a striking demonstration that $$U$$ and $$T$$ are distinct concepts.", "source": "Opus 4.7 â‘،", "_id": "opus_2_46", "judge_pick": true}, {"question": "Misconception probe: why is it wrong to call $$\\langle c\\rangle$$ \"the average velocity\" and use it to characterise molecular speeds?", "answer": "- Step 1: $$\\langle\\vec{v}\\rangle$$ (the average *velocity vector*) is zero by symmetry â€” gases have no preferred direction.\n- Step 2: $$\\langle c\\rangle$$ (the average *speed*, scalar) is not zero but is also rarely the quantity we use.\n- Step 3: In kinetic theory we use $$\\langle c^2\\rangle$$ (mean-square speed) and its square root $$c_{rms} = \\sqrt{\\langle c^2\\rangle}$$, because these arise naturally in $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$ and $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$.\n\nExaminers want \"root-mean-square speed\" or \"mean-square speed\" â€” not \"average velocity\" or \"average speed.\"", "source": "Opus 4.7 â‘،", "_id": "opus_2_47", "judge_pick": true}, {"question": "Why-not question: why can't you use the equation $$\\Delta E = mc\\Delta\\theta$$ to find the energy needed to convert ice at 0آ°C to water at 0آ°C?", "answer": "- Step 1: $$\\Delta\\theta = 0$$ during a phase change, so the equation would yield $$\\Delta E = 0$$ â€” clearly wrong; melting ice clearly requires energy.\n- Step 2: The error is conceptual: $$mc\\Delta\\theta$$ measures only the energy needed to raise KE (temperature). It doesn't account for energy going into PE (breaking bonds).\n- Step 3: Use $$\\Delta E = L_f\\Delta m$$ instead. Two formulas, two different physical processes.", "source": "Opus 4.7 â‘،", "_id": "opus_2_48", "judge_pick": false}, {"question": "Synthesis question: explain why, at room temperature, helium atoms move at hundreds of m/s yet helium remains gaseous, while iron atoms move at zero translational speed yet iron remains solid. (3 steps)", "answer": "- Step 1: At a given temperature, all molecules have the same average KE: $$\\tfrac{3}{2}kT$$. But the *speed* depends on mass: lighter atoms move faster.\n- Step 2: Helium atoms are light AND have very weak intermolecular forces. Their KE far exceeds the intermolecular PE barrier, so they fly apart â†’ gas.\n- Step 3: Iron atoms are heavy AND have very strong metallic bonds. Their thermal KE (still $$\\tfrac{3}{2}kT$$, but small motion of heavy atoms) is far less than the bond energies, so atoms vibrate in place â†’ solid.\n\nSo \"state of matter\" is set by the **ratio of thermal KE to bond energy**, not by KE alone.", "source": "Opus 4.7 â‘،", "_id": "opus_2_49", "judge_pick": true}, {"question": "Synthesis question: why does extrapolating a $$p$$-vs-$$\\theta$$ graph for a fixed-volume gas to $$p = 0$$ give an experimental route to absolute zero? (3 steps)", "answer": "- Step 1: At constant $$V$$ and $$N$$, pressure law gives $$p \\propto T$$ (in Kelvin), so a graph of $$p$$ vs $$T$$ (Kelvin) is a straight line through the origin.\n- Step 2: The same data plotted against $$\\theta$$ in $$آ°\\text{C}$$ gives a straight line with the same slope but shifted â€” the x-intercept is at $$\\theta = -273.15آ°\\text{C}$$.\n- Step 3: Physically, $$p = 0$$ corresponds to molecules with zero KE â€” by definition, absolute zero. So the extrapolation locates absolute zero on the Celsius scale.\n\nThis is exactly how absolute zero was first determined experimentally, long before quantum mechanics gave it a theoretical justification.", "source": "Opus 4.7 â‘،", "_id": "opus_2_50", "judge_pick": false}, {"question": "Why is the assumption that molecular collisions are \"elastic\" essential to ideal gas behaviour? (3 steps)", "answer": "- Step 1: If collisions were inelastic, every wall collision would steal some KE from the gas, transferring it to thermal vibrations of the wall.\n- Step 2: That would mean the gas would gradually cool down even in a thermally isolated container, contradicting the pressure law $$p \\propto T$$ being stable.\n- Step 3: Elastic collisions ensure the total KE of the gas is conserved between collisions with the surroundings, allowing a stable equilibrium with well-defined $$T$$ and $$p$$.\n\nIn reality, gas-wall collisions are statistically elastic at equilibrium because the wall and gas have the same temperature â€” there's no net energy flow.", "source": "Opus 4.7 â‘،", "_id": "opus_2_51", "judge_pick": true}, {"question": "Edge case: at very high temperature, can we still apply $$pV = nRT$$ to a real gas? Why or why not?", "answer": "- Step 1: High temperature is generally *good* for ideal gas behaviour â€” molecules have so much KE that any intermolecular PE is negligible by comparison.\n- Step 2: However, at extreme temperatures, molecules may dissociate into atoms or even ionise into plasma. In that case, $$N$$ changes (you no longer have the same number of \"particles\" you started with), so simple $$pV = NkT$$ with the original $$N$$ fails.\n- Step 3: So \"high $$T$$\" helps ideality up to a point, but at extreme $$T$$ chemistry/dissociation kicks in. The ideal gas law works best in a moderate window: hot enough to ignore PE, cold enough to avoid dissociation.", "source": "Opus 4.7 â‘،", "_id": "opus_2_52", "judge_pick": true}, {"question": "Why is the boiling point of a liquid pressure-dependent (e.g., water boils below 100آ°C at altitude)? (3 steps)", "answer": "- Step 1: Boiling occurs when the vapour pressure of the liquid (the pressure of molecules escaping at the surface) equals the external (atmospheric) pressure.\n- Step 2: At higher altitude, atmospheric pressure is lower, so vapour pressure can match it at a lower temperature â€” boiling happens sooner.\n- Step 3: Conversely, in a pressure cooker, the trapped steam raises pressure above atmospheric, requiring higher temperature to boil. This is why food cooks faster.\n\nThis is a subtle but important point â€” te const SK='phys_matter_5source';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">â€¢ ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">â€¢ ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'â€”'}
function fC(n){return n!=null?'â‚¬'+n.toFixed(4):'â€”'}
function fT(s){if(!s)return'â€”';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">ًں“Œ My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">âœ¨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'â€”'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'â€”'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'â€”'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">ًں“‹</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('ًں“‹ '+myCards.length+' cards copied â€” paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('â€”')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error â†’ clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
