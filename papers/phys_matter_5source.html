ed up.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_26", "judge_pick": false}, {"question": "In the Boyle's law experiment, pressure isn't just read from a gauge â€” it must be calculated. If atmospheric pressure is $$p_0$$ and you add a mass $$m$$ on a plunger of cross-sectional area $$A$$, what is the total pressure of the trapped gas? (2 steps)", "answer": "- Step 1: The gas experiences two contributions: **atmospheric pressure** $$p_0$$ pushing down on the plunger from above, and the **extra pressure** from the weight of the added mass, $$mg/A$$ (force = weight, divided by area).\n- Step 2: Total pressure: $$p = p_0 + mg/A$$. If masses are stacked, sum all weights: $$p = p_0 + (\\sum m_i)g/A$$. The gauge on the apparatus may read this directly, but if not, you must calculate it. Units: $$p_0$$ in Pa, $$m$$ in kg, $$g = 9.81\\text{ m.s}^{-2}$$, $$A$$ in $$\\text{m}^2$$ â†’ result in Pa.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_27", "judge_pick": false}, {"question": "A car tyre has gauge pressure $$2.5 \\times 10^5\\text{ Pa}$$ (above atmospheric $$1.0 \\times 10^5\\text{ Pa}$$) at $$15آ°\\text{C}$$, and after driving the tyre heats to $$45آ°\\text{C}$$ with unchanged volume. Qualitatively, does gauge pressure increase or decrease, and why must you use **absolute** pressure (not gauge) in the gas-law calculation? (3 steps)", "answer": "- Step 1: Gauge pressure **increases**. Heating the gas at constant volume raises the absolute pressure (pressure law: $$p \\propto T$$). Since atmospheric pressure stays the same, the difference (gauge pressure) also increases.\n- Step 2: You must use **absolute pressure** because the gas laws relate the true total pressure inside the tyre to temperature. Gauge pressure is the difference $$p_{\\text{abs}} - p_{\\text{atm}}$$, and the gas inside doesn't \"know\" about atmospheric pressure â€” it responds to the total compression. Using gauge pressure directly in $$p/T = \\text{const}$$ would give wrong results.\n- Step 3: Initial absolute pressure: $$p_1 = 2.5 \\times 10^5 + 1.0 \\times 10^5 = 3.5 \\times 10^5\\text{ Pa}$$, $$T_1 = 288\\text{ K}$$, $$T_2 = 318\\text{ K}$$. New absolute: $$p_2 = 3.5 \\times 10^5 \\times 318/288 \\approx 3.86 \\times 10^5\\text{ Pa}$$. New gauge: $$\\approx 2.86 \\times 10^5\\text{ Pa}$$ â€” about a 15% increase.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_28", "judge_pick": false}, {"question": "A gas is at $$300\\text{ K}$$ and $$1.0 \\times 10^5\\text{ Pa}$$ in a volume of $$0.025\\text{ m}^3$$. It is heated to $$450\\text{ K}$$ while pressure is increased to $$1.5 \\times 10^5\\text{ Pa}$$. Without doing a full calculation, determine whether the new volume is larger, smaller, or the same as the original, and explain the reasoning. (2 steps)", "answer": "- Step 1: Use the combined gas law: $$V_2 = V_1 \\times (p_1/p_2) \\times (T_2/T_1)$. The pressure ratio is $$1.0/1.5 = 2/3$$ (pressure increased â†’ volume tends to decrease). The temperature ratio is $$450/300 = 3/2$$ (temperature increased â†’ volume tends to increase).\n- Step 2: The two ratios exactly cancel: $$V_2 = V_1 \\times (2/3) \\times (3/2) = V_1 \\times 1 = V_1$$. The volume stays the **same** â€” the pressure increase and temperature increase have opposing effects that perfectly compensate. This illustrates how the three variables are interlinked: changing two can leave the third unchanged.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_29", "judge_pick": true}, {"question": "Density is defined as $$\\rho = m/V$$. An irregular-shaped object is submerged in water, displacing $$0.015\\text{ m}^3$$. If the object's mass is $$60\\text{ kg}$$, is its density greater or less than water's ($$\\rho_{\\text{water}} = 1000\\text{ kg.m}^{-3}$$), and will it float or sink? (2 steps)", "answer": "- Step 1: The object's density is $$\\rho = m/V = 60/0.015 = 4000\\text{ kg.m}^{-3}$$. This is **4 times** water's density ($$1000\\text{ kg.m}^{-3}$$), so $$\\rho_{\\text{object}} > \\rho_{\\text{water}}$$.\n- Step 2: An object sinks when its density exceeds the fluid's density (its weight exceeds the maximum possible upthrust, which is the weight of fluid equal to the object's full volume). Since $$4000 > 1000$$, this object **sinks**. For floating, we'd need $$\\rho_{\\text{object}} < \\rho_{\\text{fluid}}$$ â€” then only a fraction of the volume needs to be submerged for upthrust to balance weight.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_30", "judge_pick": false}, {"question": "Archimedes' principle states that upthrust equals the weight of fluid displaced. For a floating object, upthrust equals the object's weight. Combine these two facts to explain why a floating object is only partially submerged. (2 steps)", "answer": "- Step 1: For a floating object: upthrust = weight of object. By Archimedes: upthrust = weight of displaced fluid. Therefore: **weight of object = weight of displaced fluid**, i.e., $$m_{\\text{obj}} g = \\rho_f V_{\\text{disp}} g$$, which simplifies to $$m_{\\text{obj}} = \\rho_f V_{\\text{disp}}$$.\n- Step 2: Since $$\\rho_{\\text{obj}} < \\rho_f$$ (otherwise it would sink), the displaced volume $$V_{\\text{disp}}$$ is less than the object's total volume $$V_{\\text{obj}}$$. Specifically, $$V_{\\text{disp}}/V_{\\text{obj}} = \\rho_{\\text{obj}}/\\rho_f$$. For wood ($$\\rho \\approx 600$$) floating in water ($$\\rho = 1000$$), only 60% of the volume is submerged. The object is **partially** submerged because it doesn't need to displace its full volume of water to balance its weight.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_31", "judge_pick": true}, {"question": "Stokes' law gives the viscous drag on a sphere as $$F = 6\\pi\\eta r v$$. What are the two conditions under which this formula is valid, and what happens when either condition is violated? (2 steps)", "answer": "- Step 1: The two conditions are: (1) the object must be a **small sphere** (the formula is derived for spherical geometry), and (2) the speed must be **low** (laminar flow regime, where fluid layers slide smoothly past each other without turbulence).\n- Step 2: If the object isn't spherical, the drag formula changes (different shape factor). If the speed is too high, flow becomes **turbent** â€” eddies and vortices form behind the object, and drag becomes proportional to $$v^2$$ rather than $$v$$. The $$6\\pi\\eta r v$$ linear relationship only holds in the laminar regime; at higher speeds, the true drag is much larger than Stokes' law predicts.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_32", "judge_pick": false}, {"question": "A sphere falling through a fluid reaches terminal velocity. What does \"terminal velocity\" mean, and which three forces must be balanced at that point? (2 steps)", "answer": "- Step 1: Terminal velocity is the **constant maximum speed** reached when the net force on the falling object is zero â€” it no longer accelerates. The object falls at a steady rate.\n- Step 2: The three forces in balance are:\n+ **Weight** $$mg$$ (downward) â€” gravitational pull on the sphere\n+ **Upthrust** $$\\rho_f V_{\\text{obj}} g$$ (upward) â€” Archimedes' buoyant force from displaced fluid\n+ **Viscous drag** $$6\\pi\\eta r v_{\\text{term}}$$ (upward) â€” resistive force from the fluid\n+ At terminal velocity: $$mg - \\rho_f V_{\\text{obj}} g - 6\\pi\\eta r v_{\\text{term}} = 0$$, so $$v_{\\text{term}} = (mg - \\rho_f V_{\\text{obj}} g)/(6\\pi\\eta r)$$.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_33", "judge_pick": false}, {"question": "A proton is composed of quarks with configuration uud (up-up-down). The up quark has charge $$+\\frac{2}{3}e$$ and the down quark has charge $$-\\frac{1}{3}e$$. Verify that this gives the proton's total charge of $$+1e$$, and state the quark configuration for a neutron. (2 steps)", "answer": "- Step 1: Proton (uud): $$+\\frac{2}{3}e + \\frac{2}{3}e - \\frac{1}{3}e = \\frac{4}{3}e - \\frac{1}{3}e = \\frac{3}{3}e = +1e$$. âœ“ This confirms the proton has charge $$+1$$ in units of the elementary charge $$e$$.\n- Step 2: Neutron (udd): $$+\\frac{2}{3}e - \\frac{1}{3}e - \\frac{1}{3}e = \\frac{2}{3}e - \\frac{2}{3}e = 0$$. âœ“ The neutron is electrically neutral. The only difference from the proton is swapping one up quark for one down quark â€” a tiny change in internal composition that eliminates all net charge.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_34", "judge_pick": true}, {"question": "The Standard Model classifies fundamental particles into three families. Name the three families and give one example particle from each, along with the force it mediates (if applicable). (2 steps)", "answer": "- Step 1: The three families are:\n+ **Quarks** â€” fundamental constituents of protons/neutrons; experience the strong force (mediated by gluons). Example: up quark, down quark.\n+ **Leptons** â€” fundamental, do not experience the strong force. Example: electron (experiences EM and weak forces), neutrino (weak force only).\n+ **Gauge bosons** â€” force-mediating particles. Example: photon (mediates EM force), gluon (strong force), W/Z bosons (weak force).\n- Step 2: Gravity is theorised to be mediated by gravitons, but these are not experimentally confirmed and are not part of the established Standard Model. For A-level, you need to know quarks, leptons, and bosons as the three categories, plus the quark charge arithmetic for protons and neutrons.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_35", "judge_pick": false}, {"question": "The specific latent heat of fusion $$L_f$$ and the specific latent heat of vaporisation $$L_v$$ are both measured in $$\\text{J.kg}^{-1}$$, but their numerical values are very different for the same substance. For water, $$L_f \\approx 334\\text{ kJ.kg}^{-1}$$ and $$L_v \\approx 2260\\text{ kJ.kg}^{-1}$$. Why is $$L_v$$ roughly 7 times larger than $$L_f$$? (2 steps)", "answer": "- Step 1: Fusion (melting) only needs to **loosen** the lattice so molecules can slide past each other. The intermolecular bonds are partially broken â€” molecules in a liquid are still close together and still attracted to their neighbours, just not locked in place. This requires moderate energy.\n- Step 2: Vaporisation (boiling) needs to **completely separate** molecules from each other. Every molecule must break free of all neighbouring attractions and move far apart into the gas phase. Overcoming intermolecular forces essentially in full requires far more energy than merely loosening them. That's why $$L_v \\gg L_f$$ â€” for water, by a factor of about 7.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_36", "judge_pick": false}, {"question": "The formula $$\\Delta E = mc\\Delta\\theta$$ involves $$\\Delta\\theta$$, a temperature *change*. A change of $$1\\text{ K}$$ equals a change of $$1آ°\\text{C}$$, so $$\\Delta\\theta$$ can use either unit. However, absolute temperatures in gas laws must be in Kelvin. Explain why temperature *differences* are unit-independent across K and آ°C, but absolute temperatures are not. (2 steps)", "answer": "- Step 1: The Kelvin and Celsius scales have the **same increment size** â€” they differ only in their zero point. Celsius sets zero at the freezing point of water; Kelvin sets zero at absolute zero. The offset is $$273.15$$. Since the scales are parallel (same slope), any **difference** $$\\Delta\\theta = \\theta_2 - \\theta_1$$ is the same whether you compute it in K or آ°C: $$(T_2 - T_1) = (خ¸_2 + 273) - (خ¸_1 + 273) = خ¸_2 - خ¸_1$$.\n- Step 2: **Absolute** temperatures are different because of the offset. $$20آ°\\text{C} = 293\\text{ K}$$, not $$20\\text{ K}$$. In gas laws like $$p \\propto T$$, the proportionality only holds if $$T = 0$$ corresponds to zero molecular KE. On the Celsius scale, $$0آ°\\text{C}$$ does not correspond to zero KE (molecules still move at $$0آ°\\text{C}$$!), so $$p \\propto خ¸_\\text{آ°C}$$ is false. **Rule: differences â†’ either unit; absolute values â†’ always Kelvin.**", "source": "GLM 5.1 â‘ ", "_id": "glm_1_37", "judge_pick": true}, {"question": "Volume unit conversions are a common source of error. What is the conversion factor from (a) $$\\text{cm}^3$$ to $$\\text{m}^3$$, and (b) $$\\text{dm}^3$$ (litres) to $$\\text{m}^3$$? Explain why these factors are not $$10^{-1}$$ and $$10^{-1}$$ respectively. (2 steps)", "answer": "- Step 1: (a) $$1\\text{ cm}^3 = 10^{-6}\\text{ m}^3$$, because $$1\\text{ cm} = 10^{-2}\\text{ m}$$, and volume scales as the **cube** of length: $$(10^{-2})^3 = 10^{-6}$$. It's not $$10^{-1}$$ because we're converting a 3D quantity, not a 1D length.\n+ (b) $$1\\text{ dm}^3 = 1\\text{ L} = 10^{-3}\\text{ m}^3$$, because $$1\\text{ dm} = 10^{-1}\\text{ m}$$, and $$(10^{-1})^3 = 10^{-3}$$.\n- Step 2: The trap is treating volume like length: students often write $$1\\text{ cm}^3 = 10^{-2}\\text{ m}^3$$ or $$1\\text{ dm}^3 = 10^{-1}\\text{ m}^3$$, which are off by factors of 100 and 10 respectively. Always remember: **volume conversions cube the length conversion factor**. Before using $$pV = nRT$$, convert all volumes to $$\\text{m}^3$$.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_38", "judge_pick": true}, {"question": "When plotting pressure vs. temperature for a gas at constant volume, the graph is a straight line through the origin if $$T$$ is in Kelvin. If the same data is plotted against Celsius, what changes about the line, and how does this allow experimental determination of absolute zero? (2 steps)", "answer": "- Step 1: On the Kelvin plot, $$p \\propto T$$ gives a straight line through the origin ($$p = 0$$ at $$T = 0\\text{ K}$$). On the Celsius plot, the same data gives a **parallel line shifted left** â€” same slope, but the $$x$$-intercept is at $$خ¸ = -273.15آ°\\text{C}$$ instead of at the origin.\n- Step 2: The $$x$$-intercept on the Celsius plot (where $$p = 0$$) gives the Celsius value of absolute zero. This is how absolute zero was originally determined experimentally: measure $$p$$ at several temperatures, plot $$p$$ vs. $$خ¸_\\text{آ°C}$$, extrapolate the line to $$p = 0$$, and read off the intercept. The result: $$خ¸ \\approx -273آ°\\text{C}$$, confirming the Kelvin scale's zero point.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_39", "judge_pick": false}, {"question": "An ideal gas has negligible intermolecular forces. What consequence does this have for the potential energy of its molecules, and how does this simplify the expression for internal energy of an ideal gas? (2 steps)", "answer": "- Step 1: If intermolecular forces are negligible (except during brief collisions), the molecules don't attract or repel each other at any significant distance. There are no bonds to stretch or compress, so the **potential energy between molecules is effectively zero** at all times (outside the instant of collision).\n- Step 2: Since $$U = \\sum(KE_i + PE_i)$$ and $$PE \\approx 0$$ for an ideal gas, the internal energy simplifies to $$U = \\sum KE_i = N \\times \\frac{3}{2}kT = \\frac{3}{2}NkT$$. For an ideal gas, **internal energy is purely kinetic** and depends only on temperature. This is why, for an ideal gas, changing temperature always changes $$U$$, and there are no phase changes (no bonds to break).", "source": "GLM 5.1 â‘ ", "_id": "glm_1_40", "judge_pick": true}, {"question": "For an ideal gas, $$U = \\frac{3}{2}NkT$$ (purely kinetic). For a real substance undergoing a phase change, internal energy changes even though temperature is constant. Explain why the ideal-gas formula would give a wrong answer during a real phase change. (2 steps)", "answer": "- Step 1: The ideal-gas formula $$U = \\frac{3}{2}NkT$$ says internal energy depends **only on temperature**. If $$T$$ is constant, this formula predicts $$U$$ is constant â€” no change in internal energy. But during a real phase change (e.g., melting ice at $$0آ°\\text{C}$$), $$T$$ is constant while $$U$$ genuinely increases because PE rises as bonds break.\n- Step 2: The discrepancy arises because real substances have **significant intermolecular forces** and hence significant PE. The ideal gas ignores PE entirely. During a phase change, the PE contribution changes dramatically (bonds breaking or forming), which the ideal-gas model cannot capture. **For real substances, you must account for both KE and PE; the ideal-gas formula only works when PE is negligible.**", "source": "GLM 5.1 â‘ ", "_id": "glm_1_41", "judge_pick": false}, {"question": "A gas cylinder has volume $$8.3 \\times 10^3\\text{ cm}^3$$, pressure $$4.5 \\times 10^7\\text{ Pa}$$, and temperature $$15آ°\\text{C}$$. Before calculating the number of molecules using $$N = pV/kT$$, what two conversions must you perform on the raw data? (2 steps)", "answer": "- Step 1: **Volume conversion**: $$8.3 \\times 10^3\\text{ cm}^3 = 8.3 \\times 10^3 \\times 10^{-6}\\text{ m}^3 = 8.3 \\times 10^{-3}\\text{ m}^3$$. Every $$\\text{cm}^3$$ is $$10^{-6}\\text{ m}^3$$, so multiply by $$10^{-6}$$.\n- Step 2: **Temperature conversion**: $$15آ°\\text{C} + 273 = 288\\text{ K}$$ (use $$+273$$ for routine work, $$+273.15$$ for precision). Never plug Celsius into $$pV = NkT$$ â€” the result would be off by a huge factor. After these two conversions, you can substitute into $$N = pV/(kT)$$ with all quantities in SI units.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_42", "judge_pick": false}, {"question": "The Boltzmann constant $$k = 1.38 \\times 10^{-23}\\text{ J.K}^{-1}$$ is extremely small. What does this smallness tell you about the energy scale of individual molecular motion, and why do macroscopic energies seem so much larger? (2 steps)", "answer": "- Step 1: At room temperature ($$300\\text{ K}$$), one molecule's average KE is $$\\frac{3}{2}kT \\approx 6.2 \\times 10^{-21}\\text{ J}$$ â€” an incredibly tiny energy. The smallness of $$k$$ reflects the fact that **individual molecular energies are minuscule** on any human scale.\n- Step 2: Macroscopic energies seem large because they are the **sum over enormous numbers of molecules**. One mole has $$N_A = 6 \\times 10^{23}$$ molecules, so the total KE of 1 mol at $$300\\text{ K}$$ is $$\\frac{3}{2}RT \\approx 3700\\text{ J}$$ â€” a sensible macroscopic energy. The gap between molecular and macroscopic energies is bridged by Avogadro's number: $$R = kN_A$$ scales the per-molecule energy up by $$6 \\times 10^{23}$$.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_43", "judge_pick": false}, {"question": "On a heating curve, the slope of the rising (non-plateau) sections is related to specific heat capacity. A steeper slope means a smaller $$c$$, and a gentler slope means a larger $$c$$. Explain this inverse relationship. (2 steps)", "answer": "- Step 1: The slope of the heating curve is $$\\Delta T/\\Delta E$$ (temperature rise per unit energy supplied). From $$\\Delta E = mc\\Delta T$$, we get $$\\Delta T/\\Delta E = 1/(mc)$$. For a fixed mass, the slope is **inversely proportional to $$c$$**.\n- Step 2: A large $$c$$ means each joule of energy produces only a small temperature rise (the substance is \"hard to heat\") â†’ gentle slope. A small $$c$$ means each joule produces a large temperature rise (the substance heats easily) â†’ steep slope. Water's gentle slope on a heating curve reflects its high $$c$$ ($$4200\\text{ J.kg}^{-1}\\text{.K}^{-1}$$); metals heat quickly because their $$c$$ values are much lower (e.g., copper $$\\approx 390$$).", "source": "GLM 5.1 â‘ ", "_id": "glm_1_44", "judge_pick": true}, {"question": "You have $$0.20\\text{ kg}$$ of ice at $$-10آ°\\text{C}$$ and want to turn it all into steam at $$100آ°\\text{C}$$. Without doing the full calculation, which stage dominates the total energy required, and roughly what fraction of the total does it account for? (2 steps)", "answer": "- Step 1: The **boiling stage** dominates. The energy for boiling is $$\\Delta E_4 = mL_v = 0.20 \\times 2.26 \\times 10^6 \\approx 452\\text{ kJ}$$, while the other three stages combined give roughly $$155\\text{ kJ}$$ (heating ice: $$\\sim4\\text{ kJ}$$, melting: $$\\sim67\\text{ kJ}$$, heating water: $$\\sim84\\text{ kJ}$$).\n- Step 2: The total is about $$607\\text{ kJ}$$, and boiling alone is $$452\\text{ kJ}$$ â€” about **74%** of the total. This is the practical reason boiling a kettle takes much longer than just heating water to $$100آ°\\text{C}$$: most of the energy goes into the phase change itself, not the temperature rise.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_45", "judge_pick": true}, {"question": "A real gas deviates from ideal behaviour at high pressure and low temperature. At low pressure and high temperature, it approximates ideal behaviour well. Explain both cases in terms of the ideal-gas assumptions. (3 steps)", "answer": "- Step 1: At **low pressure**, molecules are far apart (large $$V$$ relative to molecular volume). The assumption \"molecules occupy negligible volume\" is well-satisfied because the empty space between molecules dominates. Also, molecules rarely encounter each other, so intermolecular forces are rarely felt â€” \"negligible forces\" is also well-satisfied.\n- Step 2: At **high temperature**, molecules move very fast. Two effects: (1) they spend very little time near each other during encounters, so forces act for negligible duration; (2) their high KE overwhelms any weak attractive forces, making the \"negligible intermolecular forces\" assumption more valid.\n- Step 3: At **high pressure / low temperature**, the reverse: molecules are crammed together (volume fraction is significant â†’ \"negligible volume\" fails), and they move slowly enough that attractive forces pull them together between collisions (\"negligible forces\" fails). These deviations cause real gases to have slightly **lower pressure** than ideal-gas predictions at moderate pressures (attractions reduce wall impacts) and **higher pressure** at very high pressures (volume exclusion increases collision frequency).", "source": "GLM 5.1 â‘ ", "_id": "glm_1_46", "judge_pick": false}, {"question": "The kinetic theory derivation considers a cubical container of side $$L$$ and tracks one molecule's $$x$$-component of velocity. Derive the time between successive collisions with the same wall, and explain why it is $$2L/v_x$$ rather than $$L/v_x$$. (2 steps)", "answer": "- Step 1: After hitting the wall at $$x = L$$, the molecule rebounds with velocity $$-v_x$$ and travels back across the full width $$L$$ of the container to the opposite wall at $$x = 0$$. It then rebounds again with velocity $$+v_x$$ and travels forward across the width $$L$$ back to the original wall. The total round-trip distance is $$2L$$.\n- Step 2: The time for this round trip is $$\\Delta t = \\text{distance}/\\text{speed} = 2L/v_x$$. It is **not** $$L/v_x$$ because the molecule must travel **both directions** (away and back) before it can hit the same wall again. Just reaching the opposite wall ($$L/v_x$$) isn't enough â€” it then has to return. This is why the factor of 2 appears in both $$\\Delta p = 2mv_x$$ and $$\\Delta t = 2L/v_x$$.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_47", "judge_pick": false}, {"question": "Estimate the average translational KE of a gas molecule at $$300\\text{ K}$$ (room temperature). Is this energy per molecule or per mole, and how would you convert it to a per-mole value? (2 steps)", "answer": "- Step 1: $$\\langle E_k \\rangle = \\frac{3}{2}kT = 1.5 \\times 1.38 \\times 10^{-23} \\times 300 \\approx 6.2 \\times 10^{-21}\\text{ J}$$ per molecule. This is the **per-molecule** value â€” an incredibly tiny number, consistent with the microscopic scale.\n- Step 2: To convert to per-mole, multiply by $$N_A$$: $$E_{\\text{per mol}} = N_A \\times \\frac{3}{2}kT = \\frac{3}{2}RT = 1.5 \\times 8.31 \\times 300 \\approx 3740\\text{ J.mol}^{-1}$$ â€” about $$3.7\\text{ kJ}$$ per mole, a sensible macroscopic energy. The conversion uses $$R = kN_A$$, bridging molecular and molar scales.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_48", "judge_pick": false}, {"question": "The rms speed of nitrogen molecules at $$300\\text{ K}$$ is about $$517\\text{ m.s}^{-1}$$, which is faster than the speed of sound in air ($$\\approx 340\\text{ m.s}^{-1}$$). Why is this expected from kinetic theory? (2 steps)", "answer": "- Step 1: Sound propagates through air by molecular collisions â€” one molecule bumps the next, transmitting a pressure wave. The speed of this propagation cannot exceed the speed of the molecules carrying it, since the signal must travel via molecular motion.\n- Step 2: However, sound is slower than $$c_{\\text{rms}}$$ because propagation isn't a single molecule flying across the container. It's a **chain of collisions** with random directions â€” the effective forward progress of the wave is slower than the individual molecular speeds. The speed of sound is typically about $$0.7 \\times c_{\\text{rms}}$$, which matches: $$0.7 \\times 517 \\approx 360\\text{ m.s}^{-1} \\approx 340\\text{ m.s}^{-1}$$. The order-of-magnitude agreement is a strong validation of kinetic theory.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_49", "judge_pick": true}, {"question": "A sample of helium gas has $$c_{\\text{rms}} = 720\\text{ m.s}^{-1}$$ at $$45آ°\\text{C}$$ ($$318\\text{ K}$$). If the temperature rises to $$80آ°\\text{C}$$ ($$353\\text{ K}$$), does $$c_{\\text{rms}}$ increase by a large or small factor, and qualitatively why? (2 steps)", "answer": "- Step 1: The factor is $$\\sqrt{T_2/T_1} = \\sqrt{353/318} = \\sqrt{1.11} \\approx 1.05$$. The rms speed increases by only about **5%**, despite a 35 K temperature rise. This is because $$c_{\\text{rms}} \\propto \\sqrt{T}$$, not $$\\propto T$$ â€” speed responds sluggishly to temperature changes.\n- Step 2: The reason is that KE $$\\propto T$$, but KE $$\\propto c_{\\text{rms}}^2$$. So $$c_{\\text{rms}}^2 \\propto T$$, meaning $$c_{\\text{rms}} \\propto \\sqrt{T}$. The square root dampens the response: a 11% increase in $$T$$ gives only a 5% increase in speed. To double $$c_{\\text{rms}}$$, you'd need to **quadruple** $$T$$ (since $$\\sqrt{4} = 2$$).", "source": "GLM 5.1 â‘ ", "_id": "glm_1_50", "judge_pick": false}, {"question": "Water is unusual: it expands when it freezes (ice is less dense than liquid water). How does this relate to the \"close and regular\" description of solids, and what is the exception for water's solid arrangement? (2 steps)", "answer": "- Step 1: For most substances, the solid's \"regular\" lattice packs molecules **more tightly** than the liquid's irregular arrangement, making the solid denser. This is the general rule: solid > liquid > gas in density.\n- Step 2: Water is the exception because its crystal lattice (hexagonal ice structure) has **large open spaces** due to hydrogen bonding forcing molecules into a specific arrangement with gaps. The regular pattern in ice is actually more **spread out** than the irregular liquid packing. So ice is less dense than water â€” this is why ice floats. The \"regular\" arrangement doesn't always mean \"more dense\"; it depends on the geometry of the specific lattice.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_51", "judge_pick": false}, {"question": "A kettle supplies $$2.4\\text{ kW}$$ to $$1.5\\text{ kg}$$ of water already at $$100آ°\\text{C}$$ (boiling point). How long does it take to boil away $$0.30\\text{ kg}$$ of water? Set up the logic without crunching every number. (3 steps)", "answer": "- Step 1: The water is already at the boiling point, so no temperature change is needed. All energy goes into the phase change (vaporisation). Use $$\\Delta E = L_v \\Delta m$$, where $$L_v \\approx 2.26\\text{ MJ.kg}^{-1}$$ and $$\\Delta m = 0.30\\text{ kg}$$.\n- Step 2: Energy needed: $$\\Delta E = 2.26 \\times 10^6 \\times 0.30 \\approx 6.78 \\times 10^5\\text{ J} = 678\\text{ kJ}$$.\n- Step 3: Time = Energy / Power = $$678000 / 2400 \\approx 283\\text{ s} \\approx 4.7\\text{ minutes}$$. This feels right intuitively â€” boiling away a significant amount of water takes several minutes because $$L_v$$ is so large. Note: if the water started cold, you'd first need energy to heat it to $$100آ°\\text{C}$$ (using $$mc\\Delta\\theta$$), then add the boiling energy on top.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_52", "judge_pick": false}, {"question": "Define \"specific latent heat of fusion\" and \"specific latent heat of vaporisation\" verbatim, highlighting the key phrase that distinguishes them from specific heat capacity. (2 steps)", "answer": "- Step 1: **Specific latent heat of fusion**: the thermal energy required to convert **one kilogram of solid to liquid** with **no change in temperature**. **Specific latent heat of vaporisation**: the thermal energy required to convert **one kilogram of liquid to gas** with **no change in temperature**.\n- Step 2: The crucial distinguishing phrase is **\"with no change in temperature\"** â€” this is what separates latent heat from specific heat capacity (which involves a temperature change). Also, \"convert\" (change of state) vs \"raise the temperature\" (no change of state). Both latent heats are measured in $$\\text{J.kg}^{-1}$$ (energy per unit mass, not per unit temperature â€” there is no $$\\Delta\\theta$$ term).", "source": "GLM 5.1 â‘ ", "_id": "glm_1_53", "judge_pick": false}, {"question": "A student writes: \"Temperature is the kinetic energy of the molecules.\" This is wrong in two ways. Identify both errors and give the correct definition. (2 steps)", "answer": "- Step 1: Error 1: Temperature is not kinetic energy itself â€” it is a **measure** (or indicator) of average KE. KE has units of joules; temperature has units of kelvin. They are proportional ($$T \\propto \\langle E_k \\rangle$$) but not identical. Error 2: It's the **average** kinetic energy, not the total or the kinetic energy of any specific molecule. Different molecules have different speeds; temperature reflects the statistical mean.\n- Step 2: The correct verbatim definition: **\"Temperature is a measure of the average kinetic energy of the molecules.\"** The words \"a measure of\" and \"average\" are both essential. Dropping either loses marks.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_54", "judge_pick": false}, {"question": "Explain why the pressure law ($$p \\propto T$$ at constant $$V$$) can be derived directly from the \"three Fs\" argument without any algebra. Walk through the causal chain. (3 steps)", "answer": "- Step 1: Heating the gas increases molecular KE â†’ molecules move **faster** (since $$\\langle E_k \\rangle \\propto T$$ and $$\\langle E_k \\rangle = \\frac{1}{2}m\\langle c^2 \\rangle$$, so $$c_{\\text{rms}} \\propto \\sqrt{T}$$). Faster molecules hit walls harder.\n- Step 2: Faster molecules also cover the distance to walls more quickly â†’ they hit walls **more frequently**. The collision rate is proportional to speed, so frequency $$\\propto \\sqrt{T}$$.\n- Step 3: Each hit delivers more momentum ($$\\Delta p = 2mv_x$$, and $$v_x \\propto \\sqrt{T}$$) â†’ **more force** per collision, proportional to $$\\sqrt{T}$$. Combined: force per collision $$\\propto \\sqrt{T}$$, collision frequency $$\\propto \\sqrt{T}$$, so total force $$\\propto \\sqrt{T} \\times \\sqrt{T} = T$$. Pressure = force/area, area is constant â†’ $$p \\propto T$$. The two $$\\sqrt{T}$$ factors multiply to give exactly $$T$$.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_55", "judge_pick": true}, {"question": "In a Boyle's law experiment, you plot $$p$$ vs. $$V$$ and get a curve. To verify Boyle's law more clearly, you could plot $$p$$ vs. $$1/V$$ instead. What should this graph look like if Boyle's law holds, and why? (2 steps)", "answer": "- Step 1: If $$pV = \\text{constant}$$, then $$p = \\text{constant}/V = \\text{constant} \\times (1/V)$$. This is the equation of a **straight line through the origin** with slope equal to the constant $$pV$$.\n- Step 2: Plotting $$p$$ vs. $$1/V$$ linearises the relationship: instead of a hyperbola (hard to judge by eye), you get a straight line (easy to verify). If the data points fall on a straight line through the origin, Boyle's law is confirmed. Any deviation from the line indicates experimental error or non-ideal behaviour. This linearisation technique is standard for verifying inverse proportionality.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_56", "judge_pick": true}, {"question": "A common exam question asks you to \"show that\" a value is approximately some number. What is the key rule for \"show that\" questions, and why can't you use the stated value in your own calculation? (2 steps)", "answer": "- Step 1: In a \"show that\" question, you must **derive the stated value from first principles** with full working visible. You start from known formulas and given data, and work through to reach the target number. The examiner wants to see your reasoning chain, not just the answer.\n- Step 2: You **cannot use the stated value to derive itself** â€” this would be circular reasoning. For example, if the question says \"show that the energy is approximately 1400 J,\" you can't write \"$$E = 1400\\text{ J}$$, therefore $$E \\approx 1400\\text{ J}$$.\" You must compute $$E = mc\\Delta\\theta$$ from the given $$m$$, $$c$$, $$\\Delta\\theta$$, and arrive at a value near 1400 independently. The \"show that\" value is a check â€” your independently calculated result should be close to it.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_57", "judge_pick": false}, {"question": "The combined gas law $$p_1 V_1 / T_1 = p_2 V_2 / T_2$$ is used when all three variables change simultaneously. Derive it by combining the three individual gas laws, showing which two you apply first and which third. (3 steps)", "answer": "- Step 1: Start with state 1 ($$p_1, V_1, T_1$$) and change temperature to $$T_2$$ at constant pressure (Charles's law): $$V' = V_1 \\times T_2/T_1$$. This gives an intermediate state ($$p_1, V', T_2$$).\n- Step 2: Now change pressure from $$p_1$$ to $$p_2$$ at constant temperature $$T_2$$ (Boyle's law): $$p_1 V' = p_2 V_2$$, so $$V_2 = V' \\times p_1/p_2 = V_1 \\times (T_2/T_1) \\times (p_1/p_2)$$.\n- Step 3: Rearranging: $$p_1 V_1 / T_1 = p_2 V_2 / T_2$$. The constant $$pV/T$$ is the same for any state of the same gas sample, which is exactly $$nR$$ (or $$Nk$$) from the ideal gas equation. The combined law is just $$pV = nRT$$ applied to two different states of the same gas sample.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_58", "judge_pick": true}, {"question": "When using $$pV = nRT$$, you must ensure all quantities are in SI units. List the correct SI units for $$p$$, $$V$$, $$n$$, $$R$$, and $$T$$, and identify the two most common student errors. (2 steps)", "answer": "- Step 1: The SI units are: $$p$$ in **Pa** ($$\\text{N.m}^{-2}$$), $$V$$ in **$$\\text{m}^3$$**, $$n$$ in **mol**, $$R$$ in **$$\\text{J.mol}^{-1}\\text{.K}^{-1}$$**, $$T$$ in **K**. These are the only acceptable units for direct substitution.\n- Step 2: The two most common errors are:\n+ **Volume**: students substitute $$V$$ in $$\\text{cm}^3$$ or $$\\text{dm}^3$$ instead of $$\\text{m}^3$$ â€” off by factors of $$10^6$$ or $$10^3$$. Must convert: $$1\\text{ cm}^3 = 10^{-6}\\text{ m}^3$$, $$1\\text{ dm}^3 = 10^{-3}\\text{ m}^3$$.\n+ **Temperature**: students substitute $$T$$ in آ°C instead of K â€” off by a factor of ~4â€“5 at room temperature and potentially giving negative values. Must convert: $$T/\\text{K} = خ¸/آ°\\text{C} + 273$$.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_59", "judge_pick": false}, {"question": "Pressure at depth in a fluid is given by $$P = \\rho g h$$. Explain what each variable represents, and why pressure increases with depth even though the fluid itself doesn't move. (2 steps)", "answer": "- Step 1: $$\\rho$$ is the fluid density ($$\\text{kg.m}^{-3}$$), $$g$$ is gravitational acceleration ($$\\text{m.s}^{-2}$$), $$h$$ is the depth below the surface ($$\\text{m}$$). The formula gives the **extra** pressure due to the weight of the fluid column above that depth, on top of any atmospheric pressure at the surface.\n- Step 2: Pressure increases with depth because the fluid at any point must **support the weight of all the fluid above it**. At depth $$h$$, a column of fluid of height $$h$$ and cross-section $$A$$ has mass $$\\rho A h$$ and weight $$\\rho A h g$$. This weight distributed over area $$A$$ gives additional pressure $$\\rho g h$$. The fluid doesn't need to move â€” it's a static equilibrium where each layer bears the load above it.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_60", "judge_pick": false}, {"question": "The molar gas constant $$R = 8.31\\text{ J.mol}^{-1}\\text{.K}^{-1}$$ appears in $$pV = nRT$$. If you have 2 mol of ideal gas at $$300\\text{ K}$$ in a $$0.025\\text{ m}^3$$ container, set up the expression for pressure without calculating the final number. (2 steps)", "answer": "- Step 1: Using $$pV = nRT$$, substitute: $$p \\times 0.025 = 2 \\times 8.31 \\times 300$$. The right side evaluates to $$4986\\text{ J}$$ (since $$nRT$$ has units of $$\\text{J}$$).\n- Step 2: Rearrange: $$p = 4986/0.025 \\approx 200\\text{ kPa}$$ â€” about twice atmospheric pressure, which makes sense: 2 mol at room temperature in a small volume should give roughly double the pressure of 1 mol at standard conditions. The key setup is always $$p = nRT/V$$ with all SI units.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_61", "judge_pick": false}, {"question": "Why is it incorrect to say \"gas molecules have negligible volume\" and simultaneously say \"gas molecules collide with each other\"? Resolve this apparent contradiction. (2 steps)", "answer": "- Step 1: The assumption states that molecular volume is **negligible compared to the container volume** â€” the space the molecules themselves occupy is tiny relative to the total volume $$V$$ of the container. This doesn't mean molecules have zero size; it means their total volume is so small that $$V$$ is effectively all empty space available for motion.\n- Step 2: Collisions still happen because molecules, though tiny, do have a finite cross-section. Two molecules approaching each other on nearly the same trajectory will eventually meet and bounce. The key is that collisions are **brief and infrequent** â€” most of a molecule's time is in free flight between collisions. The \"negligible volume\" assumption means the space taken up by molecules doesn't significantly reduce the room available for motion, not that molecules are mathematical points.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_62", "judge_pick": false}, {"question": "Phase changes are described as \"physical changes, not chemical ones.\" What is the difference, and why is melting ice not a chemical reaction? (2 steps)", "answer": "- Step 1: A **physical change** alters the arrangement and energy of particles without changing the identity of the substance. The molecules before and after are the same â€” $$H_2O$$ molecules in ice are the same $$H_2O$$ molecules in liquid water. A **chemical change** would involve breaking and forming chemical bonds to create new substances (e.g., burning hydrogen to make water).\n- Step 2: Melting ice only breaks **intermolecular** bonds (the attractions between molecules that hold the lattice together), not **intramolecular** bonds (the covalent bonds within each $$H_2O$$ molecule). The molecule itself is unchanged; it's just freer to move. This is why you can freeze and melt water repeatedly without it becoming a different substance â€” it's purely a physical rearrangement driven by energy changes.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_63", "judge_pick": false}, {"question": "At absolute zero ($$0\\text{ K}$$), a substance has zero molecular kinetic energy. Does it also have zero internal energy? Explain why or why not. (2 steps)", "answer": "- Step 1: **Not necessarily**. Internal energy $$U = \\sum(KE_i + PE_i)$$. At absolute zero, KE = 0, but PE may still be nonzero. The potential energy depends on the configuration of intermolecular bonds, which exists even when molecules aren't moving.\n- Step 2: For an **ideal gas** (negligible intermolecular forces, so PE â‰ˆ 0), $$U = 0$$ at absolute zero. But for a **real substance** like ice at $$0\\text{ K}$$, the molecules are held in a lattice with strong intermolecular bonds â€” there is significant negative PE (bound systems have PE < 0 relative to free particles). So $$U < 0$$ at absolute zero for real substances. Absolute zero means minimum KE, not necessarily minimum $$U$$.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_64", "judge_pick": false}, {"question": "The molar mass $$M$$ of a gas appears in the formula $$c_{\\text{rms}} = \\sqrt{3RT/M}$$. If gas A has molar mass $$4\\text{ g.mol}^{-1}$$ (helium) and gas B has molar mass $$32\\text{ g.mol}^{-1}$$ (oxygen), compare their rms speeds at the same temperature qualitatively. (2 steps)", "answer": "- Step 1: From $$c_{\\text{rms}} = \\sqrt{3RT/M}$$, rms speed is **inversely proportional to the square root of molar mass**: $$c_{\\text{rms}} \\propto 1/\\sqrt{M}$$. Heavier molecules move slower at the same temperature.\n- Step 2: The ratio of speeds: $$c_{\\text{rms,He}}/c_{\\text{rms,O}_2} = \\sqrt{M_{\\text{O}_2}/M_{\\text{He}}} = \\sqrt{32/4} = \\sqrt{8} \\approx 2.83$$. Helium molecules are about **3 times faster** than oxygen molecules at the same temperature, despite having the same average KE. This is why lighter gases diffuse faster and effuse faster (Graham's law).", "source": "GLM 5.1 â‘ ", "_id": "glm_1_65", "judge_pick": true}, {"question": "In the kinetic theory derivation, we go from force per molecule $$F_1 = m\\langle v_x^2 \\rangle/L$$ to total pressure $$p = Nm\\langle v_x^2 \\rangle/V$$. Explain the two steps: summing over molecules, and converting force to pressure. (3 steps)", "answer": "- Step 1: **Summing over molecules**: One molecule contributes force $$F_1 = m\\langle v_x^2 \\rangle/L$$ on the wall. With $$N$$ molecules all behaving similarly (same mass, random directions), the total force is $$F = N \\times F_1 = Nm\\langle v_x^2 \\rangle/L$$.\n- Step 2: **Converting force to pressure**: Pressure is force per unit area. The wall has area $$A = L^2$$ (it's one face of a cube of side $$L$$). So $$p = F/A = Nm\\langle v_x^2 \\rangle/(L \\times L^2) = Nm\\langle v_x^2 \\rangle/L^3$$.\n- Step 3: Since $$V = L^3$$ (volume of the cube), we get $$p = Nm\\langle v_x^2 \\rangle/V$$, or $$pV = Nm\\langle v_x^2 \\rangle$$. Then applying isotropy ($$\\langle v_x^2 \\rangle = \\frac{1}{3}\\langle c^2 \\rangle$$) gives the final result: $$pV = \\frac{1}{3}Nm\\langle c^2 \\rangle$$.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_66", "judge_pick": false}, {"question": "A student calculates the energy to melt $$0.5\\text{ kg}$$ of ice using $$\\Delta E = mc\\Delta\\theta$$ with $$c = 2100$$ and $$\\Delta\\theta = 0$$, getting zero. Identify the conceptual error and state the correct approach. (2 steps)", "answer": "- Step 1: The error is using the **specific heat capacity formula** during a **phase change**. The formula $$\\Delta E = mc\\Delta\\theta$$ applies only when temperature is changing. During melting, $$\\Delta\\theta = 0$$ (temperature stays at $$0آ°\\text{C}$$), so this formula correctly returns zero â€” but that's the wrong formula for this situation. The energy isn't zero; it goes into breaking bonds, not raising temperature.\n- Step 2: The correct formula is $$\\Delta E = L_f \\Delta m = 334\\text{ kJ.kg}^{-1} \\times 0.5\\text{ kg} = 167\\text{ kJ}$. **Rule: if there's a temperature change â†’ SHC formula; if there's a phase change (no temperature change) â†’ SLH formula.** Mixing them up is one of the most common exam errors.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_67", "judge_pick": false}, {"question": "Sublimation is the transition solid â†’ gas with no liquid intermediate. Give a common everyday example, and explain why it happens instead of melting for certain substances at certain conditions. (2 steps)", "answer": "- Step 1: The classic example is **dry ice** (solid $$CO_2$$). At atmospheric pressure, solid $$CO_2$$ doesn't pass through a liquid phase â€” it sublimates directly to gas. You see it \"smoking\" as white vapour at room temperature, with no puddle of liquid $$CO_2$$ forming.\n- Step 2: Sublimation occurs when the substance's **vapour pressure at the solid phase exceeds atmospheric pressure before the melting point is reached**. For $$CO_2$$, at 1 atm, the solid turns to gas at $$-78.5آ°\\text{C}$$ â€” well below any possible melting temperature at that pressure. To get liquid $$CO_2$$, you'd need to raise the pressure above about 5.1 atm. At normal pressure, the solid simply can't exist as a liquid; it jumps straight to gas.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_68", "judge_pick": true}, {"question": "The lesson transcript shows a simulation where gas pressure drops to zero at approximately $$-273آ°\\text{C}$$. Explain the connection between \"zero pressure\" and \"zero molecular KE,\" and why this experiment defines the Kelvin scale. (2 steps)", "answer": "- Step 1: Pressure arises from molecular collisions with walls. If molecules have zero KE (not moving), they don't collide with anything, and no momentum is transferred to the walls. **Zero KE â†’ zero collisions â†’ zero force â†’ zero pressure**. The three are causally linked: pressure is a macroscopic manifestation of molecular KE.\n- Step 2: This experiment defines the Kelvin scale because it identifies the **physical zero point** of the pressureâ€“temperature relationship. By extrapolating $$p$$ vs. $$T$$ data to $$p = 0$$, you find the temperature where molecular motion ceases â€” absolute zero. Setting this as $$0\\text{ K}$$ creates a temperature scale where zero corresponds to a real physical condition (no molecular motion), unlike Celsius where zero is arbitrary. Every Kelvin unit then represents a genuine increment in molecular KE.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_69", "judge_pick": true}], "count": 70}, "glm_2": {"label": "GLM 5.1 â‘،", "cards": [{"question": "In thermal physics, what three properties characterize each state of matter, and why does this trio matter for predicting behaviour like density and compressibility? (3 steps)", "answer": "- Step 1: The three properties are **arrangement** (how particles are spatially organised), **bonds** (the strength of intermolecular forces holding them together), and **motion** (how the particles move). These three together fully determine the macroscopic behaviour of a substance in that state.\n- Step 2: Arrangement directly controls density â€” close-packed states (solid, liquid) are roughly 1000أ— denser than far-apart states (gas). Bond strength controls rigidity and compressibility â€” strong bonds resist deformation; negligible bonds let gas compress easily. Motion controls fluidity â€” vibrating-in-place gives rigidity; sliding gives flow; fast-random gives expansion.\n+ Example: A gas is compressible because its particles are far apart (arrangement) with negligible bonds, so pushing them closer is easy. A solid resists compression because particles are already close with strong bonds.\n- Step 3: The trio is not independent â€” bonds cause arrangement (strong bonds pull particles into regular lattices), and arrangement constrains motion (fixed positions mean only vibration is possible). Understanding the causal chain bonds â†’ arrangement â†’ motion lets you predict any state's behaviour from first principles.", "source": "GLM 5.1 â‘،", "_id": "glm_2_0", "judge_pick": false}, {"question": "A student says \"solid particles don't move â€” they're stationary.\" What is physically wrong with this statement, and what should they say instead? (2 steps)", "answer": "- Step 1: Above absolute zero ($$0\\text{K}$$), solid particles **always vibrate** about fixed positions. They do not translate (move from place to place), but they oscillate constantly. The vibration amplitude increases with temperature and only ceases at absolute zero, which is unattainable in practice.\n- Step 2: The correct exam phrasing is \"vibrate about fixed positions.\" The word \"stationary\" is misleading because it implies zero motion. The key distinction is: solids lack *translational* motion (particles stay in their lattice sites), but they always possess *vibrational* motion. This vibration is itself a form of kinetic energy and contributes to the substance's internal energy.\n\nThis is Trap 1 from the lesson â€” Phuc said \"stationary\" and was corrected.", "source": "GLM 5.1 â‘،", "_id": "glm_2_1", "judge_pick": false}, {"question": "Describe the particle arrangement, bond strength, and characteristic motion for a **solid**, and explain why these three features are causally linked rather than independent. (3 steps)", "answer": "- Step 1: **Arrangement**: close and regular (lattice pattern). **Bonds**: strong intermolecular forces. **Motion**: vibrate about fixed positions â€” no translational movement.\n- Step 2: The causal chain: strong intermolecular forces pull particles into a regular, close-packed lattice (bonds â†’ arrangement). Because particles are locked into fixed lattice sites by these strong bonds, they cannot slide past each other or translate â€” the only motion available is oscillation about their equilibrium position (arrangement + bonds â†’ motion).\n- Step 3: If you tried to change one property independently, the others would follow. Heat a solid â†’ vibration amplitude increases â†’ eventually bonds can't hold the lattice â†’ arrangement becomes irregular â†’ you've melted into a liquid. The three properties are a package deal dictated by energy.", "source": "GLM 5.1 â‘،", "_id": "glm_2_2", "judge_pick": false}, {"question": "Describe the particle arrangement, bond strength, and characteristic motion for a **liquid**, and contrast it with both solid and gas in each category. (3 steps)", "answer": "- Step 1: **Arrangement**: close but irregular (no lattice). **Bonds**: medium strength â€” intermolecular forces are still present but not strong enough to maintain a rigid lattice. **Motion**: particles can slide over one another; the substance flows and takes the shape (not the volume) of its container.\n- Step 2: Contrast with solid: same closeness of arrangement, but irregular vs regular; weaker bonds; motion upgrades from vibration-only to sliding. Contrast with gas: similar closeness, but gas is far apart; stronger bonds than gas (which has negligible bonds); slower motion than gas's fast random straight-line paths.\n- Step 3: The \"medium\" bond strength is the key intermediate feature. It's strong enough to keep particles close (hence liquid density â‰ˆ solid density) but weak enough to let them rearrange (hence liquid flows). This is why liquids are incompressible like solids but fluid like gases â€” a hybrid of both extremes.", "source": "GLM 5.1 â‘،", "_id": "glm_2_3", "judge_pick": false}, {"question": "Describe the particle arrangement, bond strength, and characteristic motion for a **gas**, and explain why \"negligible\" bonds is a more accurate term than \"no bonds.\" (3 steps)", "answer": "- Step 1: **Arrangement**: far apart and random â€” no ordering at all. **Bonds**: negligible (very weak) intermolecular forces. **Motion**: fast, random, straight-line motion between collisions.\n- Step 2: Particles travel in straight lines (Newton's first law â€” no force means constant velocity) until they collide with another particle or the container wall. Collisions change direction randomly, producing the chaotic \"random motion\" we observe. The vast separation means collisions are rare compared to the time spent in free flight.\n- Step 3: \"Negligible\" is more accurate than \"no bonds\" because intermolecular forces do still exist between gas molecules â€” they're just so weak at typical separations that they have no observable effect on macroscopic behaviour. During the very brief instant of collision, forces act (that's what causes the deflection). The ideal gas model takes \"negligible\" to its extreme (zero except during collisions), but real gases have tiny residual attractions that cause deviations at high pressure/low temperature.", "source": "GLM 5.1 â‘،", "_id": "glm_2_4", "judge_pick": false}, {"question": "Can iron exist as a gas? What does this tell us about the relationship between a substance's identity and its state? (2 steps)", "answer": "- Step 1: Yes â€” any substance can exist as a gas if you supply enough energy to completely separate its particles. Iron gas would require extremely high temperatures, but the substance itself (iron atoms) is unchanged; only their energy and arrangement differ.\n- Step 2: This demonstrates that a **phase change is a physical change, not a chemical one**. The atoms/molecules are the same regardless of state â€” what changes is how much kinetic and potential energy they have, which determines their arrangement, bonds, and motion. Going from solid iron to gaseous iron doesn't alter the iron; it just gives the same atoms enough energy to fly apart.", "source": "GLM 5.1 â‘،", "_id": "glm_2_5", "judge_pick": false}, {"question": "Internal energy $$U$$ is defined as the sum of two types of molecular energy. What are they, and what macroscopic property does each one correspond to? (2 steps)", "answer": "- Step 1: $$U = \\sum_i (KE_i + PE_i)$$ over all molecules. The two components are: **kinetic energy** (from molecular motion â€” translation, rotation, vibration) and **potential energy** (from intermolecular forces â€” depends on particle separation and bond configuration).\n- Step 2: Kinetic energy corresponds macroscopically to **temperature** â€” higher average KE means higher temperature. Potential energy corresponds macroscopically to **state/phase** â€” a gas has higher PE than a liquid because molecules are further apart with bonds essentially broken. During a phase change, PE changes while KE (and thus temperature) stays constant.", "source": "GLM 5.1 â‘،", "_id": "glm_2_6", "judge_pick": false}, {"question": "A student writes \"internal energy is the kinetic energy of all the molecules.\" What is missing, and when does this omission matter most? (3 steps)", "answer": "- Step 1: The definition is missing the **potential energy** component. The correct verbatim definition is: \"the sum of the kinetic and potential energies of all the molecules within a given mass of a substance.\" Both contributions must be included.\n- Step 2: For an **ideal gas**, the omission barely matters because ideal gas assumptions explicitly state that intermolecular forces (and thus PE) are negligible â€” so $$U \\approx \\frac{3}{2}NkT$$ (all KE). But this is a special case, not the general definition.\n- Step 3: The omission matters most during **phase changes**. When ice melts at $$0آ°C$$, energy is being added (U increases) but temperature doesn't change (KE stays the same). All the added energy goes into PE (breaking lattice bonds). If you ignore PE, you'd wrongly conclude that adding heat at constant temperature means no change in internal energy â€” exactly backwards.\n\nThis is Trap 9 from the watch-list.", "source": "GLM 5.1 â‘،", "_id": "glm_2_7", "judge_pick": true}, {"question": "Temperature is defined as \"a measure of the average kinetic energy of the molecules.\" Why must we say *average* and not just \"the kinetic energy\"? (2 steps)", "answer": "- Step 1: In any substance, individual molecules have different speeds and thus different kinetic energies â€” there's a wide distribution (the Maxwell-Boltzmann distribution). Some molecules are slow, some are fast. Temperature doesn't track any single molecule's KE; it reflects the *statistical average* across all molecules.\n- Step 2: Saying \"temperature is the kinetic energy\" (without \"average\") would imply all molecules have the same KE, which is false. It would also confuse internal energy with temperature â€” a large mass of cold water has more total KE than a small mass of hot water, but the hot water has a higher *average* KE and thus higher temperature. The word \"average\" is essential for exam marks.", "source": "GLM 5.1 â‘،", "_id": "glm_2_8", "judge_pick": false}, {"question": "Define absolute zero in two equivalent ways, and explain why it is a theoretical limit that cannot actually be reached. (3 steps)", "answer": "- Step 1: Two equivalent examinable definitions: (1) **The lowest possible temperature**, $$0\\text{K} = -273.15آ°C$$. (2) **The temperature at which molecules have zero (minimum) kinetic energy** â€” all molecular motion ceases.\n- Step 2: It's a theoretical limit because quantum mechanics dictates that even at absolute zero, particles retain a minimum \"zero-point energy\" from quantum uncertainty (they can't be perfectly stationary and perfectly located simultaneously). So the second definition is more precisely \"minimum kinetic energy,\" not strictly zero. At A-level, we use the simpler \"zero KE\" version.\n- Step 3: Practically, we can approach but never reach $$0\\text{K}$$ â€” cooling requires transferring energy to something colder, and there's nothing colder than absolute zero to receive that energy. Laboratory records reach fractions of a nanokelvin above, but the limit itself is unattainable.", "source": "GLM 5.1 â‘،", "_id": "glm_2_9", "judge_pick": false}, {"question": "Why must we use the Kelvin scale (not Celsius) in all gas-law calculations? Give two distinct reasons. (3 steps)", "answer": "- Step 1: **Reason 1 â€” proportionality breaks on Celsius.** The gas laws are proportional relationships: $$p \\propto T$$, $$V \\propto T$$. On the Celsius scale, $$0آ°C$$ is not the zero of molecular KE, so doubling from $$10آ°C$$ to $$20آ°C$$ does NOT double the average KE (the true zero is at $$-273آ°C$$). On Kelvin, doubling from $$10\\text{K}$$ to $$20\\text{K}$$ genuinely doubles average KE and thus pressure/volume.\n- Step 2: **Reason 2 â€” negative temperatures are nonsensical.** Plugging $$-20آ°C$$ into $$pV = nRT$$ gives a negative $$T$$, which would predict negative pressure or volume â€” physically impossible. Kelvin eliminates negative temperatures because absolute zero is the scale's origin.\n- Step 3: The Kelvin scale is anchored at the physical zero of molecular KE, making all gas-law relationships clean proportionalities. The conversion is $$T/\\text{K} = خ¸/آ°\\text{C} + 273.15$$ (use $$+273$$ for routine exam work). Always convert before substituting.\n\nThis is Trap 4 from the watch-list.", "source": "GLM 5.1 â‘،", "_id": "glm_2_10", "judge_pick": false}, {"question": "On a heating curve for water (constant heating rate), why are there flat horizontal plateaus at $$0آ°C$$ and $$100آ°C$$, and why is the boiling plateau much longer than the melting plateau? (3 steps)", "answer": "- Step 1: The plateaus occur because during a phase change, **all supplied energy goes into breaking intermolecular bonds** (increasing molecular potential energy), not into increasing kinetic energy. Since temperature measures average KE, and KE isn't changing, the temperature stays constant.\n- Step 2: The melting plateau ($$0آ°C$$) is shorter because melting only needs to *loosen* the lattice enough for molecules to slide past each other â€” intermolecular forces are still substantially present in the liquid. The boiling plateau ($$100آ°C$$) is much longer because boiling requires *completely separating* molecules from each other â€” the intermolecular forces must be overcome essentially in full.\n- Step 3: Numerically, for water: $$L_f \\approx 334\\text{kJآ·kg}^{-1}$$ vs $$L_v \\approx 2260\\text{kJآ·kg}^{-1}$$ â€” boiling requires about **7 times** more energy per kilogram than melting. At a constant heating rate, this means the boiling plateau is about 7 times longer. This is why a kettle takes much longer to boil water away than to heat it up to boiling temperature.", "source": "GLM 5.1 â‘،", "_id": "glm_2_11", "judge_pick": false}, {"question": "During the melting plateau of a heating curve, is the internal energy of the substance increasing, decreasing, or staying constant? Explain which component changes and which doesn't. (2 steps)", "answer": "- Step 1: Internal energy **U is increasing** â€” energy is being continuously supplied to the substance. The KE component stays constant (temperature is unchanged, so average molecular KE is unchanged). The PE component is increasing (bonds are being broken, molecules are gaining separation and configurational freedom).\n- Step 2: This is the key distinction that trips students up: temperature constant â‰  internal energy constant. Temperature only tracks KE. During a phase change, the \"missing\" energy goes into PE. The total U = KE + PE rises even though the KE part is flat.", "source": "GLM 5.1 â‘،", "_id": "glm_2_12", "judge_pick": true}, {"question": "Name all six common phase transitions (forward and reverse), and explain the key difference between evaporation and boiling. (3 steps)", "answer": "- Step 1: The six transitions:\n+ Solid â†’ liquid: melting/fusion; reverse: freezing/solidification\n+ Liquid â†’ gas: boiling/vaporisation; reverse: condensation\n+ Liquid â†’ gas (below boiling point): evaporation (no standard reverse name at A-level)\n+ Solid â†’ gas: sublimation; reverse: deposition\n- Step 2: **Evaporation vs boiling**: Both produce gas from liquid, but they differ fundamentally. Boiling happens throughout the bulk of the liquid at a *specific temperature* (the boiling point) when vapour pressure equals atmospheric pressure. Evaporation happens only at the *liquid surface* at *any temperature* â€” individual high-energy molecules in the tail of the speed distribution escape.\n- Step 3: Evaporation is why a puddle dries up at room temperature (well below $$100آ°C$$) â€” occasional fast molecules at the surface escape. Boiling is why water bubbles vigorously throughout at $$100آ°C$$ â€” the entire liquid has enough average energy for vapour pressure to match atmospheric pressure, and gas forms inside the bulk, not just at the surface.\n\nNote: \"condensing\" is the correct term for gas â†’ liquid, not \"cooling\" (Trap 2).", "source": "GLM 5.1 â‘،", "_id": "glm_2_13", "judge_pick": false}, {"question": "Define specific heat capacity precisely (including the \"per unit\" phrasing), and explain why water's unusually high value is physically useful. (3 steps)", "answer": "- Step 1: Specific heat capacity $$c$$ is defined as: **the energy required to raise the temperature of one kilogram of a substance by one kelvin.** The \"per kilogram\" and \"per kelvin\" phrasing is essential â€” it makes $$c$$ an intensive property (independent of sample size), with units $$\\text{Jآ·kg}^{-1}\\text{آ·K}^{-1}$$.\n- Step 2: The formula is $$\\Delta E = mc\\Delta\\theta$$, where $$\\Delta\\theta$$ can be in K or آ°C (a change of 1K = a change of 1آ°C â€” differences are unit-agnostic across the two scales). This formula applies **only when there is no phase change** â€” it describes heating/cooling within a single state.\n- Step 3: Water's $$c = 4200\\text{Jآ·kg}^{-1}\\text{آ·K}^{-1}$$ is unusually high because of hydrogen bonding â€” much energy is absorbed by the bonds before temperature rises. This makes water an excellent **coolant** (absorbs large amounts of energy with modest temperature rise) and **heat store** (radiators stay hot for a long time because water releases energy slowly as it cools).", "source": "GLM 5.1 â‘،", "_id": "glm_2_14", "judge_pick": false}, {"question": "Define specific latent heat of fusion and specific latent heat of vaporisation, and explain why the latent heat formula has no $$\\Delta\\theta$$ term. (3 steps)", "answer": "- Step 1: **Specific latent heat of fusion** $$L_f$$: the thermal energy required to convert one kilogram of solid to liquid with **no change in temperature**. **Specific latent heat of vaporisation** $$L_v$$: the thermal energy required to convert one kilogram of liquid to gas with **no change in temperature**.\n- Step 2: The formula is $$\\Delta E = L\\Delta m$$, where $$L$$ is in $$\\text{Jآ·kg}^{-1}$$ and $$\\Delta m$$ is the mass that changes phase. There is no $$\\Delta\\theta$$ term because **the temperature does not change during a phase change** â€” all energy goes into PE (breaking/forming bonds), not KE.\n- Step 3: If you mistakenly used $$\\Delta E = mc\\Delta\\theta$$ during a phase change, you'd get $$\\Delta E = 0$$ because $$\\Delta\\theta = 0$$ â€” clearly wrong since energy IS being supplied. This is Trap 8: use $$mc\\Delta\\theta$$ for heating within a state, use $$L\\Delta m$$ for changing between states.", "source": "GLM 5.1 â‘،", "_id": "glm_2_15", "judge_pick": false}, {"question": "A student needs to calculate the total energy to convert ice at $$-10آ°C$$ to steam at $$100آ°C$$. How many distinct stages must be calculated, and why can't they use a single formula? (3 steps)", "answer": "- Step 1: There are **four stages**, each requiring a different formula:\n+ Stage 1: Heat ice from $$-10آ°C$$ to $$0آ°C$$ â†’ use $$\\Delta E = mc_{ice}\\Delta\\theta$$\n+ Stage 2: Melt ice at $$0آ°C$$ â†’ use $$\\Delta E = L_f\\Delta m$$ (no $$\\Delta\\theta$$)\n+ Stage 3: Heat water from $$0آ°C$$ to $$100آ°C$$ â†’ use $$\\Delta E = mc_{water}\\Delta\\theta$$\n+ Stage 4: Boil water at $$100آ°C$$ â†’ use $$\\Delta E = L_v\\Delta m$$ (no $$\\Delta\\theta$$)\n- Step 2: You cannot use a single formula because the process alternates between \"heating within a state\" (where $$\\Delta\\theta \\neq 0$$ and $$mc\\Delta\\theta$$ applies) and \"changing state\" (where $$\\Delta\\theta = 0$$ and $$L\\Delta m$$ applies). The specific heat capacity also changes between states ($$c_{ice} \\neq c_{water}$$).\n- Step 3: The total energy is $$E_{total} = E_1 + E_2 + E_3 + E_4$$. For water, the boiling stage (Stage 4) typically dominates the total â€” $$L_v$$ is about 7أ— larger than $$L_f$$, and the heating-from-0-to-100 stage is also significant. This matches the everyday intuition that boiling a kettle takes much longer than just heating water to the boil.", "source": "GLM 5.1 â‘،", "_id": "glm_2_16", "judge_pick": true}, {"question": "State at least three assumptions of the kinetic theory of an ideal gas, and explain why real gases approximate these best at low pressure and high temperature. (3 steps)", "answer": "- Step 1: The six key assumptions (any three earn full marks):\n+ Molecules occupy negligible volume compared to the container\n+ Intermolecular forces are negligible except during the brief instant of collision\n+ All collisions (moleculeâ€“molecule and moleculeâ€“wall) are perfectly elastic\n+ The duration of a collision is negligible compared to the time between collisions\n+ Molecular motion is random and obeys Newton's laws\n+ There are very many molecules (statistical treatment is valid)\n- Step 2: At **low pressure**, molecules are far apart â†’ their actual volume is a tiny fraction of the container volume (assumption 1 is nearly true) and they rarely interact (assumption 2 is nearly true). At **high temperature**, molecules move fast â†’ collision durations are extremely brief (assumption 4) and kinetic energy dominates over weak intermolecular attractions (assumption 2).\n- Step 3: At **high pressure / low temperature**, the opposite occurs: molecules are crammed together (volume is no longer negligible), forces between them are significant (they attract and deviate from straight-line paths), and the ideal gas model breaks down. This is when real gases deviate most from $$pV = nRT$$.", "source": "GLM 5.1 â‘،", "_id": "glm_2_17", "judge_pick": false}, {"question": "State Boyle's law in words and as an equation, and identify what must be held constant. (2 steps)", "answer": "- Step 1: **In words**: The pressure of a fixed mass of gas at constant temperature is inversely proportional to its volume. **As equations**: $$p \\propto 1/V$$, equivalently $$pV = \\text{constant}$$, or $$p_1V_1 = p_2V_2$$.\n- Step 2: Two things must be held constant: **temperature** $$T$$ (the gas must be in thermal equilibrium) and **number of molecules** $$N$$ (or moles $$n$$ â€” fixed mass means fixed particle count). If either changes, Boyle's law alone cannot predict the new state â€” you need the full ideal gas equation.", "source": "GLM 5.1 â‘،", "_id": "glm_2_18", "judge_pick": false}, {"question": "State Charles's law in words and as an equation, and identify what must be held constant. What happens to the volume if the temperature in Kelvin doubles? (2 steps)", "answer": "- Step 1: **In words**: The volume of a fixed mass of gas at constant pressure is proportional to its absolute temperature. **As equations**: $$V \\propto T$$, equivalently $$V/T = \\text{constant}$$, or $$V_1/T_1 = V_2/T_2$$.\n- Step 2: **Constant pressure** $$p$$ and **fixed mass** ($$N$$) must hold. If $$T$$ doubles (in Kelvin, not Celsius!), then $$V$$ doubles â€” the gas expands to maintain constant pressure. Note: if you double Celsius temperature (e.g., $$20آ°C$$ to $$40آ°C$$), the volume does NOT double because the Kelvin temperatures are $$293\\text{K}$$ and $$313\\text{K}$$, a ratio of about 1.07, not 2.", "source": "GLM 5.1 â‘،", "_id": "glm_2_19", "judge_pick": false}, {"question": "State the pressure law in words and as an equation, and identify what must be held constant. If a gas in a sealed rigid container is heated from $$300\\text{K}$$ to $$600\\text{K}$$, what happens to the pressure? (2 steps)", "answer": "- Step 1: **In words**: The pressure of a fixed mass of gas at constant volume is proportional to its absolute temperature. **As equations**: $$p \\propto T$$, equivalently $$p/T = \\text{constant}$$, or $$p_1/T_1 = p_2/T_2$$.\n- Step 2: **Constant volume** $$V$$ and **fixed mass** ($$N$$) must hold. Heating from $$300\\text{K}$$ to $$600\\text{K}$$ doubles the temperature in Kelvin, so the pressure **doubles** â€” $$p_2 = p_1 \\times 600/300 = 2p_1$$. The molecules move faster, hit the walls more frequently and with more force, over the same area, producing twice the pressure.", "source": "GLM 5.1 â‘،", "_id": "glm_2_20", "judge_pick": false}, {"question": "Write the ideal gas equation in both its mole form and molecule form, and explain how the Boltzmann constant $$k$$ bridges the two. (3 steps)", "answer": "- Step 1: **Mole form**: $$pV = nRT$$, where $$n$$ is number of moles and $$R = 8.31\\text{Jآ·mol}^{-1}\\text{آ·K}^{-1}$$ is the molar gas constant. **Molecule form**: $$pV = NkT$$, where $$N$$ is number of molecules and $$k = 1.38 \\times 10^{-23}\\text{Jآ·K}^{-1}$$ is the Boltzmann constant.\n- Step 2: The bridge: $$N = nN_A$$ (number of molecules = number of moles أ— Avogadro's number). Substituting: $$pV = nRT = (N/N_A)RT = N(R/N_A)T = NkT$$, where $$k = R/N_A = 8.31/(6.02 \\times 10^{23}) \\approx 1.38 \\times 10^{-23}\\text{Jآ·K}^{-1}$$.\n- Step 3: $$R$$ is per-mole (macroscopic scale), $$k$$ is per-molecule (microscopic scale). They encode the same physics at different granularities. Use $$nRT$$ when you know moles; use $$NkT$$ when you know molecule count. Both give identical $$pV$$.", "source": "GLM 5.1 â‘،", "_id": "glm_2_21", "judge_pick": false}, {"question": "In the kinetic theory derivation, a single molecule of mass $$m$$ with velocity component $$v_x$$ bounces elastically off a wall perpendicular to the x-axis in a cube of side $$L$$. Derive the change in momentum per collision and the time between successive collisions with that same wall. (3 steps)", "answer": "- Step 1: **Change in momentum per collision**: Before hitting the wall, the molecule has momentum $$+mv_x$$ in the x-direction. After an elastic collision, the x-component reverses: $$v_x \\rightarrow -v_x$$, so momentum becomes $$-mv_x$$. The change is $$\\Delta p = (-mv_x) - (+mv_x) = -2mv_x$$ (for the molecule). The magnitude of momentum transferred to the wall is $$2mv_x$$.\n- Step 2: **Time between successive collisions with the same wall**: After bouncing off the wall, the molecule travels to the opposite wall (distance $$L$$) and back (another $$L$$) before returning. Total round-trip distance = $$2L$$, at speed $$v_x$$, so $$\\Delta t = 2L/v_x$$.\n- Step 3: These two results are the foundation of the derivation. The momentum transfer per hit ($$2mv_x$$) divided by the time between hits ($$2L/v_x$$) gives the average force from one molecule on the wall â€” which is the next step in the chain leading to $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$.", "source": "GLM 5.1 â‘،", "_id": "glm_2_22", "judge_pick": true}, {"question": "From the kinetic theory derivation, starting with the force on one wall from one molecule $$F_1 = mv_x^2/L$$ in a cube of side $$L$$, show how to arrive at the pressure expression $$p = Nm\\langle v_x^2\\rangle/V$$, and then explain the isotropy step that converts this to $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$. (3 steps)", "answer": "- Step 1: Summing over all $$N$$ molecules and averaging: total force on the wall is $$F = Nm\\langle v_x^2\\rangle/L$$ (each molecule contributes its own $$v_x^2$$, and we take the mean). Pressure is force per area: $$p = F/L^2 = Nm\\langle v_x^2\\rangle/(L \\cdot L^2) = Nm\\langle v_x^2\\rangle/L^3 = Nm\\langle v_x^2\\rangle/V$$, since $$V = L^3$$.\n- Step 2: **Isotropy**: Molecular motion is equally distributed in all three directions â€” there's no preferred direction in a gas at equilibrium. Therefore $$\\langle v_x^2\\rangle = \\langle v_y^2\\rangle = \\langle v_z^2\\rangle$$, and each equals one-third of the total mean-square speed: $$\\langle v_x^2\\rangle = \\frac{1}{3}\\langle c^2\\rangle$$, where $$\\langle c^2\\rangle = \\langle v_x^2 + v_y^2 + v_z^2\\rangle$$.\n- Step 3: Substituting the isotropy result: $$p = Nm\\langle v_x^2\\rangle/V = Nm \\cdot \\frac{1}{3}\\langle c^2\\rangle/V$$, rearranging: $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$. This is the **kinetic theory equation** â€” derived entirely from Newton's laws and statistical averaging, with no empirical input.", "source": "GLM 5.1 â‘،", "_id": "glm_2_23", "judge_pick": false}, {"question": "By equating the two expressions for $$pV$$ (ideal gas equation and kinetic theory equation), derive the result for average translational kinetic energy of one molecule. What two crucial consequences follow? (3 steps)", "answer": "- Step 1: Both equations have $$pV$$ on the left, so their right-hand sides are equal: $$\\frac{1}{3}Nm\\langle c^2\\rangle = NkT$$. Cancel $$N$$ (it appears on both sides): $$\\frac{1}{3}m\\langle c^2\\rangle = kT$$. Multiply both sides by $$\\frac{3}{2}$$: $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$.\n- Step 2: The left side $$\\frac{1}{2}m\\langle c^2\\rangle$$ is exactly the **average translational kinetic energy** of one molecule. So: $$\\langle E_k\\rangle = \\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$.\n- Step 3: Two crucial consequences:\n+ **Consequence 1**: Average molecular KE is directly proportional to absolute temperature. Doubling $$T$$ (in Kelvin) doubles $$\\langle E_k\\rangle$$.\n+ **Consequence 2**: Average KE does **not** depend on the gas identity. At the same temperature, helium atoms and oxygen molecules have the same average KE â€” the lighter helium just moves faster to compensate ($$\\langle E_k\\rangle = \\frac{1}{2}m\\langle c^2\\rangle$$, so smaller $$m$$ means larger $$\\langle c^2\\rangle$$ for the same $$\\langle E_k\\rangle$$).", "source": "GLM 5.1 â‘،", "_id": "glm_2_24", "judge_pick": true}, {"question": "Why is the average velocity $$\\langle v\\rangle$$ of gas molecules useless (equal to zero), and what quantity do we use instead to characterise the typical molecular speed? (2 steps)", "answer": "- Step 1: In a gas at equilibrium, molecules move in all directions equally (isotropy). For every molecule moving right, there's statistically one moving left with equal speed. The velocity vectors cancel: $$\\langle v\\rangle = 0$$. This tells us nothing about how fast molecules are actually moving â€” it's a vector average that vanishes by symmetry.\n- Step 2: Instead, we use the **root-mean-square speed** $$c_{rms} = \\sqrt{\\langle c^2\\rangle}$$, which squares the speeds first (eliminating direction signs), takes the mean, then takes the square root (returning to speed units). This gives a meaningful, non-zero measure of typical molecular speed. The exam expects \"root-mean-square speed\" or \"mean-square speed\" â€” never \"average speed\" without qualification.", "source": "GLM 5.1 â‘،", "_id": "glm_2_25", "judge_pick": true}, {"question": "If the absolute temperature of a gas doubles (say from $$300\\text{K}$$ to $$600\\text{K}$$), what happens to the average molecular kinetic energy, and what happens to the rms speed? Why are these two answers different? (3 steps)", "answer": "- Step 1: **Average KE doubles**. From $$\\langle E_k\\rangle = \\frac{3}{2}kT$$, doubling $$T$$ directly doubles $$\\langle E_k\\rangle$$. At $$300\\text{K}$$, $$\\langle E_k\\rangle \\approx 6.2 \\times 10^{-21}\\text{J}$$; at $$600\\text{K}$$, it's about $$1.24 \\times 10^{-20}\\text{J}$$.\n- Step 2: **RMS speed increases by a factor of $$\\sqrt{2} \\approx 1.41$$**, NOT by a factor of 2. From $$\\langle E_k\\rangle = \\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$, we get $$\\langle c^2\\rangle \\propto T$$, so doubling $$T$$ doubles $$\\langle c^2\\rangle$$. But $$c_{rms} = \\sqrt{\\langle c^2\\rangle}$$, so $$c_{rms} \\propto \\sqrt{T}$$ â€” the square root means the speed increases by $$\\sqrt{2}$$, not 2.\n- Step 3: The difference arises because KE depends on speed **squared** ($$E_k = \\frac{1}{2}mv^2$$). To double the KE, you need to double $$v^2$$, which only requires multiplying $$v$$ by $$\\sqrt{2}$$, not by 2. If speed actually doubled, KE would quadruple (since $$2^2 = 4$$), which would correspond to quadrupling the temperature, not doubling it.\n\nThis is Trap 6 from the watch-list.", "source": "GLM 5.1 â‘،", "_id": "glm_2_26", "judge_pick": true}, {"question": "When a fixed volume of gas is heated, pressure increases. Explain this using the \"three Fs\" â€” what three things change at the wall, and how do they each contribute to higher pressure? (3 steps)", "answer": "- Step 1: The three Fs stand for **Faster**, **more Frequently**, and **more Force** per impact. When you heat a gas at constant volume:\n+ **Faster**: Molecules gain KE, so $$c_{rms}$$ increases ($$\\langle E_k\\rangle \\propto T$$, $$c_{rms} \\propto \\sqrt{T}$$).\n+ **More frequently**: Faster molecules cover the distance to the wall in less time, so they hit the wall more often per second.\n+ **More force per impact**: Each collision transfers more momentum to the wall because the molecule arrives with higher speed ($$\\Delta p = 2mv_x$$, and $$v_x$$ is larger).\n- Step 2: Pressure = force/area. More force per collision أ— more collisions per second = greater total force on the wall. The wall area hasn't changed. So $$p = F/A$$ increases.\n- Step 3: This is the microscopic explanation of the **pressure law** ($$p \\propto T$$ at constant $$V$$). The three Fs are not independent â€” they all stem from the single cause of higher molecular speed. \"Faster\" directly causes \"more frequently\" (same distance, higher speed) and \"more force\" (higher momentum transfer). One root cause, three reinforcing effects.", "source": "GLM 5.1 â‘،", "_id": "glm_2_27", "judge_pick": false}, {"question": "In Core Practical 14 (Boyle's law experiment), a sealed syringe of gas is loaded with masses. Why must you wait several seconds after each mass change before reading the volume? (2 steps)", "answer": "- Step 1: When you add a mass to the plunger, you do **work on the gas** as it compresses. This momentarily increases the gas's internal energy, raising its temperature slightly above the surroundings. Boyle's law requires **constant temperature**, so the reading would be invalid if taken immediately â€” the gas is not yet in thermal equilibrium.\n- Step 2: Waiting several seconds allows the gas to **re-equilibrate thermally** with the room â€” the temporary temperature excess dissipates as heat flows to the surroundings. Once temperature is back to ambient (const
