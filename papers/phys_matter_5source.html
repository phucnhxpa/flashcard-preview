<script>
const DATA={"selected": [{"question": "If the absolute temperature of a gas doubles (say from $$300\\text{K}$$ to $$600\\text{K}$$), what happens to the average molecular kinetic energy, and what happens to the rms speed? Why are these two answers different? (3 steps)", "answer": "- Step 1: **Average KE doubles**. From $$\\langle E_k\\rangle = \\frac{3}{2}kT$$, doubling $$T$$ directly doubles $$\\langle E_k\\rangle$$. At $$300\\text{K}$$, $$\\langle E_k\\rangle \\approx 6.2 \\times 10^{-21}\\text{J}$$; at $$600\\text{K}$$, it's about $$1.24 \\times 10^{-20}\\text{J}$$.\n- Step 2: **RMS speed increases by a factor of $$\\sqrt{2} \\approx 1.41$$**, NOT by a factor of 2. From $$\\langle E_k\\rangle = \\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$, we get $$\\langle c^2\\rangle \\propto T$$, so doubling $$T$$ doubles $$\\langle c^2\\rangle$$. But $$c_{rms} = \\sqrt{\\langle c^2\\rangle}$$, so $$c_{rms} \\propto \\sqrt{T}$$ â€” the square root means the speed increases by $$\\sqrt{2}$$, not 2.\n- Step 3: The difference arises because KE depends on speed **squared** ($$E_k = \\frac{1}{2}mv^2$$). To double the KE, you need to double $$v^2$$, which only requires multiplying $$v$$ by $$\\sqrt{2}$$, not by 2. If speed actually doubled, KE would quadruple (since $$2^2 = 4$$), which would correspond to quadrupling the temperature, not doubling it.\n\nThis is Trap 6 from the watch-list.", "source": "GLM 5.1 â‘،", "_id": "glm_2_26"}, {"question": "Why does temperature stay constant during a phase change even though energy is continuously supplied? (3 steps)", "answer": "- Step 1: Temperature measures *average kinetic energy* of molecules. For temperature to rise, KE must rise.\n- Step 2: During a phase change, all the incoming heat is used to do work against intermolecular forces â€” pulling molecules apart against their bonds. This raises **potential energy**, not kinetic.\n- Step 3: Since KE is not increasing, temperature does not rise â€” it plateaus. Once the phase change is complete, further heating goes back into KE and the temperature climbs again.\n\nTakeaway: phase-change energy is bond-breaking energy, invisible to a thermometer.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_5"}, {"question": "Why is the internal energy of an ideal gas a function of temperature only â€” and why does this *not* hold for real substances? (3 steps)", "answer": "- Step 1: For an ideal gas, intermolecular forces are assumed negligible, so the potential energy contribution to $$U$$ is zero (or constant, ignorable).\n- Step 2: All the internal energy is kinetic, and average KE per molecule is $$\\tfrac{3}{2}kT$$. So $$U = \\tfrac{3}{2}NkT$$ â€” depends only on $$T$$.\n- Step 3: For real substances (especially liquids and solids), intermolecular forces are significant. Changing the spacing (e.g. expansion, compression, phase change) changes PE without changing temperature. So $$U$$ depends on volume/state too, not just $$T$$.\n\nTakeaway: ideal gas U = KE only; real matter U = KE + PE.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_36"}, {"question": "A gas is in a container at pressure $$p$$ and volume $$V$$. If the number of molecules is doubled while keeping temperature and volume constant, what happens to the pressure, and why? (2 steps)", "answer": "- Step 1: From $$pV = NkT$$, if $$N$$ doubles while $$V$$ and $$T$$ stay constant, then $$p$$ must double. There are twice as many molecules colliding with the walls, so twice the force per unit area.\n- Step 2: Microscopically, each molecule still has the same average KE (same $$T$$), so each collision transfers the same momentum. But there are twice as many molecules, so twice as many collisions per unit time, giving twice the pressure. This is why the gas laws specify \"fixed mass\"â€”changing $$N$$ changes the proportionality constant.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_70"}, {"question": "On a heating curve for a fixed mass of water starting below $$0\\,^\\circ\\text{C}$$, describe the five distinct regions and what is happening physically in each. (5 steps)", "answer": "- Step 1: **Solid heating** (below $$0\\,^\\circ\\text{C}$$): sloped line. Energy raises KE of vibrating ice molecules â†’ temperature rises.\n- Step 2: **Melting plateau** (at $$0\\,^\\circ\\text{C}$$): flat line. Energy breaks the lattice bonds (PE rises). Temperature constant.\n- Step 3: **Liquid heating** (0 to 100 $$^\\circ\\text{C}$$): sloped line. Energy raises KE of liquid molecules â†’ temperature rises.\n- Step 4: **Boiling plateau** (at $$100\\,^\\circ\\text{C}$$): much longer flat line. Energy fully separates molecules. Temperature constant.\n- Step 5: **Gas heating** (above $$100\\,^\\circ\\text{C}$$): sloped line. Further KE increase.\n\nTakeaway: sloped = KE rising; flat = PE rising (bond-breaking).", "source": "Opus 4.7 â‘ ", "_id": "opus_1_6"}, {"question": "A pressureâ€“volume graph shows two isotherms for the same gas at temperatures $$T_1$$ and $$T_2$$, with $$T_2 > T_1$$. At any given volume $$V$$, which isotherm has higher pressure, and why? (2 steps)", "answer": "- Step 1: The **higher-temperature isotherm** ($$T_2$$) has higher pressure at every volume. From $$pV = nRT$$, at fixed $$V$$ and $$n$$: $$p = nRT/V$$, so $$p \\propto T$$. Higher $$T$$ â†’ higher $$p$$.\n- Step 2: Microscopically: at higher temperature, molecules move faster, hit walls more frequently and with more force, producing higher pressure regardless of what volume the container has. The $$T_2$$ curve sits further from the origin on the $$p$$â€“$$V$$ diagram because the $$pV$$ product ($$= nRT_2$$) is larger at every point.", "source": "GLM 5.1 â‘،", "_id": "glm_2_84"}, {"question": "On a $$p$$â€“$$V$$ graph (Boyle's law isotherm), what shape does the curve have, and how does the curve shift when temperature increases? Explain why. (2 steps)", "answer": "- Step 1: Each isotherm (constant-$$T$$ curve) is a **rectangular hyperbola**: $$pV = nRT = \\text{constant}$$, so $$p = \\text{const}/V$$, which is the equation of a hyperbola. As $$V$$ increases, $$p$$ decreases inversely.\n- Step 2: A higher-temperature isotherm sits **further from the origin** (higher $$pV$$ product). At higher $$T$$, $$nRT$$ is larger, so for any given $$V$$, $$p$$ is higher (molecules hit walls harder and more often). The entire curve shifts upward and to the right. Isotherms never cross â€” each temperature has its own distinct hyperbola.", "source": "GLM 5.1 â‘،", "_id": "glm_2_35"}, {"question": "A common slip in a heating curve question: a student says \"energy is supplied during the plateau, so it must be heating something up.\" Why is this reasoning wrong? (2 steps)", "answer": "- Step 1: \"Heating something up\" colloquially means \"raising temperature.\" But energy supply can either (a) raise KE (and thus T), or (b) raise PE (breaking bonds, no T change).\n- Step 2: On the plateau, all incoming energy goes to (b) â€” increasing PE by breaking intermolecular bonds. Even though energy is flowing in, temperature does not rise because KE is unchanged.\n\nTakeaway: \"heating\" can mean \"supplying energy\" without \"raising temperature.\"", "source": "Opus 4.7 â‘ ", "_id": "opus_1_58"}, {"question": "A fixed mass of ideal gas is compressed to half its original volume at constant temperature. Without calculation, what happens to the pressure, and what happens to the average KE per molecule? (2 steps)", "answer": "- Step 1: By Boyle's law ($$pV = \\text{const}$$), halving $$V$$ **doubles** $$p$$. This is because molecules now have less distance to travel between wall hits, so hit frequency doubles.\n- Step 2: Average KE per molecule depends only on temperature ($$\\langle E_k\\rangle = \\tfrac{3}{2}kT$$). Temperature is held constant, so **KE per molecule is unchanged**. Molecules are equally fast; they just hit the walls more often.\n\nTakeaway: in isothermal compression, speeds stay the same; only collision frequency changes.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_31"}, {"question": "Distinguish between evaporation and boiling in terms of where the phase change occurs and the temperature dependence. (2 steps)", "answer": "- Step 1: **Boiling** occurs throughout the bulk of the liquid at a **fixed temperature** (the boiling point) when the vapour pressure equals atmospheric pressure.\n- Step 2: **Evaporation** occurs **only at the liquid surface** at **any temperature**. High-energy molecules in the tail of the speed distribution escape.", "source": "MiniMax â‘ ", "_id": "minimax_1_6"}, {"question": "The kinetic theory derivation assumes collisions are elastic. What would happen to the gas pressure over time if collisions were inelastic (some KE lost each collision), and why is this assumption essential? (2 steps)", "answer": "- Step 1: If collisions were inelastic, each collision would convert some molecular KE into other forms (heat, deformation). Molecules would gradually slow down, reducing $$c_{rms}$$, reducing $$\\langle E_k\\rangle$$, and reducing temperature. Pressure would **decrease over time** as the gas lost energy internally, eventually approaching zero â€” the gas would spontaneously cool to absolute zero without any external cooling.\n- Step 2: The elastic collision assumption is essential because it ensures **energy conservation within the gas**. Molecular KE is shuffled between molecules during collisions but the total is preserved. This maintains a stable, time-independent average KE (and thus stable temperature and pressure). Without it, the gas couldn't maintain equilibrium â€” it would be a dying system, not a steady state.", "source": "GLM 5.1 â‘،", "_id": "glm_2_85"}, {"question": "On a heating curve for water (constant heating rate), there are two flat plateaus â€” one at $$0آ°\\text{C}$$ and one at $$100آ°\\text{C}$$. The plateau at $$100آ°\\text{C}$$ is much longer than the one at $$0آ°\\text{C}$$. Why is the boiling plateau so much longer? (3 steps)", "answer": "- Step 1: The length of a plateau on the heating curve represents the **total energy** needed for that phase change (at a constant heating rate, more energy = more time). For water, $$L_f \\approx 334\\text{ kJ.kg}^{-1}$$ while $$L_v \\approx 2260\\text{ kJ.kg}^{-1}$$ â€” vaporisation requires about **7 times more energy per kilogram** than fusion.\n- Step 2: Melting only **loosens** the lattice enough for molecules to slide past each other. The intermolecular forces are still substantially present â€” molecules in liquid water are still touching and attracted to neighbours. Only the rigid lattice structure is broken.\n- Step 3: Boiling requires molecules to be **completely separated** from one another. The intermolecular forces must be overcome essentially in full â€” every molecule goes from being surrounded by neighbours (in the liquid) to being isolated in the gas. This full separation demands far more energy, producing the much longer plateau.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_8"}, {"question": "Starting from $$pV = NkT$$ and $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$, derive the expression for the average translational kinetic energy of one molecule. (3 steps)", "answer": "- Step 1: The two expressions both equal $$pV$$, so their right-hand sides are equal: $$\\tfrac{1}{3}Nm\\langle c^2\\rangle = NkT$$.\n- Step 2: Cancel $$N$$ and multiply both sides by $$\\tfrac{3}{2}$$: $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$.\n- Step 3: The left-hand side is exactly the average translational KE of one molecule. So:\n$$\\langle E_k\\rangle = \\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$.\n\nThis is the bridge between the microscopic (molecular motion) and macroscopic (temperature) descriptions.", "source": "Opus 4.7 â‘،", "_id": "opus_2_26"}, {"question": "Explain why the specific latent heat of vaporisation is always greater than the specific latent heat of fusion for the same substance, in terms of molecular structure. (2 steps)", "answer": "- Step 1: In the **liquid state**, molecules are still attracted to each other by significant intermolecular forces â€” they are close but can move past one another.\n- Step 2: To vaporise, molecules must be **completely separated**, requiring essentially **all intermolecular forces to be overcome**. To melt, molecules only need enough energy to break free from their fixed positions â€” less energy is needed. Hence L_v > L_f.", "source": "MiniMax â‘ ", "_id": "minimax_1_47"}, {"question": "The formula $$\\Delta E = mc\\Delta\\theta$$ involves $$\\Delta\\theta$$, a temperature *change*. A change of $$1\\text{ K}$$ equals a change of $$1آ°\\text{C}$$, so $$\\Delta\\theta$$ can use either unit. However, absolute temperatures in gas laws must be in Kelvin. Explain why temperature *differences* are unit-independent across K and آ°C, but absolute temperatures are not. (2 steps)", "answer": "- Step 1: The Kelvin and Celsius scales have the **same increment size** â€” they differ only in their zero point. Celsius sets zero at the freezing point of water; Kelvin sets zero at absolute zero. The offset is $$273.15$$. Since the scales are parallel (same slope), any **difference** $$\\Delta\\theta = \\theta_2 - \\theta_1$$ is the same whether you compute it in K or آ°C: $$(T_2 - T_1) = (خ¸_2 + 273) - (خ¸_1 + 273) = خ¸_2 - خ¸_1$$.\n- Step 2: **Absolute** temperatures are different because of the offset. $$20آ°\\text{C} = 293\\text{ K}$$, not $$20\\text{ K}$$. In gas laws like $$p \\propto T$$, the proportionality only holds if $$T = 0$$ corresponds to zero molecular KE. On the Celsius scale, $$0آ°\\text{C}$$ does not correspond to zero KE (molecules still move at $$0آ°\\text{C}$$!), so $$p \\propto خ¸_\\text{آ°C}$$ is false. **Rule: differences â†’ either unit; absolute values â†’ always Kelvin.**", "source": "GLM 5.1 â‘ ", "_id": "glm_1_37"}, {"question": "A car tyre has a gauge pressure of $$2.5 \\times 10^5\\text{Pa}$$ above atmospheric pressure ($$1.0 \\times 10^5\\text{Pa}$$) at $$15آ°C$$. After driving, the tyre heats to $$45آ°C$$ with unchanged volume. What is the new gauge pressure, and why must you use absolute (not gauge) pressure in the calculation? (3 steps)", "answer": "- Step 1: **Why absolute pressure**: The pressure law $$p_1/T_1 = p_2/T_2$$ relates the *total* pressure the gas exerts on the tyre walls â€” that's absolute pressure (gauge + atmospheric). Gauge pressure alone doesn't account for the ~1 atmosphere that's always there.\n- Step 2: Convert to Kelvin and use absolute pressures: $$T_1 = 15 + 273 = 288\\text{K}$$, $$T_2 = 45 + 273 = 318\\text{K}$$, $$p_1 = 2.5 \\times 10^5 + 1.0 \\times 10^5 = 3.5 \\times 10^5\\text{Pa}$$.\n- Step 3: Apply pressure law: $$p_2 = p_1 \\times T_2/T_1 = 3.5 \\times 10^5 \\times 318/288 \\approx 3.86 \\times 10^5\\text{Pa}$$ (absolute). New gauge pressure = $$3.86 \\times 10^5 - 1.0 \\times 10^5 \\approx 2.86 \\times 10^5\\text{Pa}$$, about $$2.9 \\times 10^5\\text{Pa}$$.\n\nKey lesson: always convert gauge â†’ absolute before gas-law calculations, then convert back at the end.", "source": "GLM 5.1 â‘،", "_id": "glm_2_30"}, {"question": "Misconception probe: A student says \"if you add heat to something, its temperature must increase.\" Give a specific counterexample and explain why the statement is false. (2 steps)", "answer": "- Step 1: **Counterexample**: Adding heat to ice at $$0آ°C$$ â€” the temperature stays at exactly $$0آ°C$$ until all the ice has melted. You're continuously supplying energy, but the thermometer reading doesn't change.\n- Step 2: The statement is false because it ignores phase changes. During a phase change, added heat goes into PE (breaking intermolecular bonds), not KE (raising temperature). The correct statement: \"adding heat increases internal energy, but temperature only increases if no phase change is occurring.\" This was Trap 3 â€” Phuc made this exact error in the lesson.", "source": "GLM 5.1 â‘،", "_id": "glm_2_81"}, {"question": "A small mass of ice at 0آ°C is added to a cup of warm water. Energy is removed from the warm water to melt the ice. How does the temperature of the warm water change, and what's the role of latent heat? (3 steps)", "answer": "- Step 1: The ice absorbs energy via latent heat of fusion ($$L_f\\Delta m$$) while staying at 0آ°C â€” this energy comes from the warm water, which cools.\n- Step 2: Only AFTER the ice has fully melted does the resulting cold water then absorb further energy by $$mc\\Delta\\theta$$, mixing with the warm water and lowering the overall temperature further.\n- Step 3: Key insight: a small mass of ice cools a drink much more than the same mass of water at 0آ°C, because of the additional $$L_f\\Delta m$$ \"buffer\" that must be paid before the meltwater starts warming.", "source": "Opus 4.7 â‘،", "_id": "opus_2_36"}, {"question": "A student needs to calculate the total energy to convert ice at $$-10آ°C$$ to steam at $$100آ°C$$. How many distinct stages must be calculated, and why can't they use a single formula? (3 steps)", "answer": "- Step 1: There are **four stages**, each requiring a different formula:\n+ Stage 1: Heat ice from $$-10آ°C$$ to $$0آ°C$$ â†’ use $$\\Delta E = mc_{ice}\\Delta\\theta$$\n+ Stage 2: Melt ice at $$0آ°C$$ â†’ use $$\\Delta E = L_f\\Delta m$$ (no $$\\Delta\\theta$$)\n+ Stage 3: Heat water from $$0آ°C$$ to $$100آ°C$$ â†’ use $$\\Delta E = mc_{water}\\Delta\\theta$$\n+ Stage 4: Boil water at $$100آ°C$$ â†’ use $$\\Delta E = L_v\\Delta m$$ (no $$\\Delta\\theta$$)\n- Step 2: You cannot use a single formula because the process alternates between \"heating within a state\" (where $$\\Delta\\theta \\neq 0$$ and $$mc\\Delta\\theta$$ applies) and \"changing state\" (where $$\\Delta\\theta = 0$$ and $$L\\Delta m$$ applies). The specific heat capacity also changes between states ($$c_{ice} \\neq c_{water}$$).\n- Step 3: The total energy is $$E_{total} = E_1 + E_2 + E_3 + E_4$$. For water, the boiling stage (Stage 4) typically dominates the total â€” $$L_v$$ is about 7أ— larger than $$L_f$$, and the heating-from-0-to-100 stage is also significant. This matches the everyday intuition that boiling a kettle takes much longer than just heating water to the boil.", "source": "GLM 5.1 â‘،", "_id": "glm_2_16"}, {"question": "At terminal velocity, a sphere falling through a fluid has three forces acting on it. What are they, and what is the condition that defines terminal velocity? (3 steps)", "answer": "- Step 1: The three forces: **Weight** downward ($$mg$$), **Upthrust** upward ($$\\rho_f V_{obj} g$$, from Archimedes' principle), and **Viscous drag** upward ($$6\\pi\\eta rv$$, opposing motion).\n- Step 2: Initially, the sphere accelerates downward because weight exceeds upthrust + drag. As speed increases, drag increases (Stokes: $$F_{drag} \\propto v$$). The net downward force shrinks.\n- Step 3: **Terminal velocity condition**: net force = 0. $$mg - \\rho_f V_{obj} g - 6\\pi\\eta rv_{term} = 0$$. At this point, acceleration ceases and the sphere falls at constant speed. Rearranging: $$v_{term} = \\frac{mg - \\rho_f V_{obj} g}{6\\pi\\eta r}$$, showing that terminal velocity depends on the balance of weight minus upthrust divided by the drag coefficient.", "source": "GLM 5.1 â‘،", "_id": "glm_2_40"}, {"question": "Sublimation is the transition solid â†’ gas with no liquid intermediate. Give a common everyday example, and explain why it happens instead of melting for certain substances at certain conditions. (2 steps)", "answer": "- Step 1: The classic example is **dry ice** (solid $$CO_2$$). At atmospheric pressure, solid $$CO_2$$ doesn't pass through a liquid phase â€” it sublimates directly to gas. You see it \"smoking\" as white vapour at room temperature, with no puddle of liquid $$CO_2$$ forming.\n- Step 2: Sublimation occurs when the substance's **vapour pressure at the solid phase exceeds atmospheric pressure before the melting point is reached**. For $$CO_2$$, at 1 atm, the solid turns to gas at $$-78.5آ°\\text{C}$$ â€” well below any possible melting temperature at that pressure. To get liquid $$CO_2$$, you'd need to raise the pressure above about 5.1 atm. At normal pressure, the solid simply can't exist as a liquid; it jumps straight to gas.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_68"}, {"question": "A gas has molecules with different masses. At the same temperature, which has a higher rms speed: the lighter molecule or the heavier one? Explain using the average KE formula. (2 steps)", "answer": "- Step 1: From $$\\langle E_k\\rangle = \\frac{3}{2}kT$$, at the same temperature, all molecules have the **same average KE** regardless of mass. This is a profound result â€” temperature equalises average KE.\n- Step 2: Since $$\\langle E_k\\rangle = \\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$, rearranging gives $$c_{rms} = \\sqrt{3kT/m}$$. For the same $$T$$, $$c_{rms} \\propto 1/\\sqrt{m}$$ â€” lighter molecules move faster. Helium (light) has much higher rms speed than oxygen (heavy) at the same temperature, even though their average KE is identical.", "source": "GLM 5.1 â‘،", "_id": "glm_2_43"}, {"question": "On a heating curve, the slope of the rising (non-plateau) sections is related to specific heat capacity. A steeper slope means a smaller $$c$$, and a gentler slope means a larger $$c$$. Explain this inverse relationship. (2 steps)", "answer": "- Step 1: The slope of the heating curve is $$\\Delta T/\\Delta E$$ (temperature rise per unit energy supplied). From $$\\Delta E = mc\\Delta T$$, we get $$\\Delta T/\\Delta E = 1/(mc)$$. For a fixed mass, the slope is **inversely proportional to $$c$$**.\n- Step 2: A large $$c$$ means each joule of energy produces only a small temperature rise (the substance is \"hard to heat\") â†’ gentle slope. A small $$c$$ means each joule produces a large temperature rise (the substance heats easily) â†’ steep slope. Water's gentle slope on a heating curve reflects its high $$c$$ ($$4200\\text{ J.kg}^{-1}\\text{.K}^{-1}$$); metals heat quickly because their $$c$$ values are much lower (e.g., copper $$\\approx 390$$).", "source": "GLM 5.1 â‘ ", "_id": "glm_1_44"}, {"question": "A student claims \"doubling the temperature (in Kelvin) doubles the rms speed of gas molecules.\" Is this correct? If not, what is the correct relationship?", "answer": "- **Incorrect.** The correct relationship is: **c_rms âˆ‌ âˆڑT** (rms speed proportional to the square root of absolute temperature).\n- From E_k = (1/2)m(c_rms)آ² = (3/2)kT, we get c_rms = âˆڑ(3kT/m). So c_rmsآ² âˆ‌ T, not c_rms âˆ‌ T.\n- If you double T (in K), then c_rms increases by factor of âˆڑ2 â‰ˆ 1.41, not 2.\n- The confusion arises because doubling T **does** double the average KE, but KE is proportional to speed squared, not speed itself.\n\n**Takeaway:** Remember: c_rms âˆ‌ âˆڑT. The key phrase to recall: \"Doubling T multiplies c_rms by âˆڑ2, not by 2.\"", "source": "MiniMax â‘،", "_id": "minimax_2_28"}, {"question": "A student says \"The molecules of an ideal gas are point particles with no size.\" Is this exactly right, or does it need refinement? (2 steps)", "answer": "- Step 1: The precise assumption is that molecules occupy **negligible volume compared to the volume of the container**. They are not literally zero-sized \"point particles\"â€”they have some diameter, but that diameter is so small relative to the container dimensions that it can be ignored.\n- Step 2: If molecules were truly zero-sized, they could never collide with each other (zero cross-section). The assumption is really about the **total molecular volume** being negligible compared to $$V$$, not about individual molecules having exactly zero size. At very high pressures, molecular volume becomes significant and the ideal-gas model breaks down.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_66"}, {"question": "In the kinetic theory derivation, a single molecule of mass $$m$$ with velocity component $$v_x$$ bounces elastically off a wall perpendicular to the x-axis in a cube of side $$L$$. Derive the change in momentum per collision and the time between successive collisions with that same wall. (3 steps)", "answer": "- Step 1: **Change in momentum per collision**: Before hitting the wall, the molecule has momentum $$+mv_x$$ in the x-direction. After an elastic collision, the x-component reverses: $$v_x \\rightarrow -v_x$$, so momentum becomes $$-mv_x$$. The change is $$\\Delta p = (-mv_x) - (+mv_x) = -2mv_x$$ (for the molecule). The magnitude of momentum transferred to the wall is $$2mv_x$$.\n- Step 2: **Time between successive collisions with the same wall**: After bouncing off the wall, the molecule travels to the opposite wall (distance $$L$$) and back (another $$L$$) before returning. Total round-trip distance = $$2L$$, at speed $$v_x$$, so $$\\Delta t = 2L/v_x$$.\n- Step 3: These two results are the foundation of the derivation. The momentum transfer per hit ($$2mv_x$$) divided by the time between hits ($$2L/v_x$$) gives the average force from one molecule on the wall â€” which is the next step in the chain leading to $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$.", "source": "GLM 5.1 â‘،", "_id": "glm_2_22"}, {"question": "State the equation linking heat energy supplied to a temperature change, defining every symbol with units.", "answer": "- Step 1: $$\\Delta E = mc\\Delta\\theta$$ where $$\\Delta E$$ is energy in $$\\text{J}$$, $$m$$ is mass in $$\\text{kg}$$, $$c$$ is specific heat capacity in $$\\text{J kg}^{-1}\\text{K}^{-1}$$, and $$\\Delta\\theta$$ is temperature change.\n- Step 2: Crucially, $$\\Delta\\theta$$ can be in either $$آ°\\text{C}$$ or $$\\text{K}$$ because a temperature *change* of 1 K equals a change of $$1آ°\\text{C}$$ â€” only absolute temperatures must be in K.\n- Step 3: This equation applies ONLY when there is no phase change occurring. Use $$\\Delta E = L\\Delta m$$ during a phase change.", "source": "Opus 4.7 â‘،", "_id": "opus_2_15"}, {"question": "A student says \"solid particles are stationary.\" What's wrong with this statement, and how would you correct it?", "answer": "- The statement is **partially correct but misleading**. Solid particles are **not stationary** â€” they constantly vibrate about their fixed positions.\n- The correct description: particles in a solid **vibrate about fixed positions**. They stay in the same location relative to their neighbors (no translation), but they are never completely still except at absolute zero (0 K).\n- This misconception arises because we can't see the vibration with the naked eye â€” it appears stationary macroscopically.\n\n**Takeaway:** Use \"vibrate about fixed positions\" rather than \"stationary\" to describe solid particle motion.", "source": "MiniMax â‘،", "_id": "minimax_2_2"}, {"question": "Misconception probe: \"If you heat a substance, its temperature must rise.\" When is this false, and why? (3 steps)", "answer": "- Step 1: This is **false during a phase change**. Energy supplied is used to break intermolecular bonds (PE increases), not to increase molecular speeds (KE).\n- Step 2: Temperature reflects only KE, so $$T$$ stays constant while $$U$$ rises.\n- Step 3: Example: an ice-water mixture stays at 0آ°C as long as both phases coexist, even if you keep heating it. Only once all ice has melted does $$T$$ start rising again.\n\nThis is why ice baths are such effective temperature reservoirs.", "source": "Opus 4.7 â‘،", "_id": "opus_2_54"}, {"question": "A student writes \"the internal energy of an ideal gas is just the total kinetic energy of all molecules.\" Is this correct? Explain.", "answer": "- **For an ideal gas: YES** â€” this is correct, with an important caveat.\n- In an ideal gas, we assume **negligible intermolecular forces**, which means **potential energy is zero** (or negligible). Therefore, internal energy U = total kinetic energy = N أ— (3/2)kT = (3/2)nRT.\n- **For real substances (especially during phase changes): NO** â€” potential energy cannot be ignored. During melting or boiling, PE increases significantly while KE (and thus T) stays constant.\n- The student's statement is only strictly true for ideal gases. For real gases, liquids, and solids, internal energy includes both KE and PE.\n\n**Takeaway:** Ideal gas assumption â†’ U = total KE. Real substances â†’ U includes significant PE from intermolecular forces, especially during phase changes.", "source": "MiniMax â‘،", "_id": "minimax_2_38"}, {"question": "You have $$0.20\\text{ kg}$$ of ice at $$-10آ°\\text{C}$$ and want to turn it all into steam at $$100آ°\\text{C}$$. Without doing the full calculation, which stage dominates the total energy required, and roughly what fraction of the total does it account for? (2 steps)", "answer": "- Step 1: The **boiling stage** dominates. The energy for boiling is $$\\Delta E_4 = mL_v = 0.20 \\times 2.26 \\times 10^6 \\approx 452\\text{ kJ}$$, while the other three stages combined give roughly $$155\\text{ kJ}$$ (heating ice: $$\\sim4\\text{ kJ}$$, melting: $$\\sim67\\text{ kJ}$$, heating water: $$\\sim84\\text{ kJ}$$).\n- Step 2: The total is about $$607\\text{ kJ}$$, and boiling alone is $$452\\text{ kJ}$$ â€” about **74%** of the total. This is the practical reason boiling a kettle takes much longer than just heating water to $$100آ°\\text{C}$$: most of the energy goes into the phase change itself, not the temperature rise.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_45"}, {"question": "What is the physical significance of the factor $$\\frac{1}{3}$$ in $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$? Why isn't it $$\\frac{1}{2}$$ or $$1$$? (2 steps)", "answer": "- Step 1: The $$\\frac{1}{3}$$ comes from **isotropy** â€” the three-dimensional nature of molecular motion. Each molecule's total speed squared $$c^2 = v_x^2 + v_y^2 + v_z^2$$ is split equally among three perpendicular directions: $$\\langle v_x^2\\rangle = \\frac{1}{3}\\langle c^2\\rangle$$. Only the x-component contributes to pressure on the x-wall, so we take one-third of the total.\n- Step 2: If space were 2-dimensional, the factor would be $$\\frac{1}{2}$$ (two directions). If molecules moved only in one direction, it would be 1. The factor $$\\frac{1}{3}$$ is a direct signature of our 3D world â€” it tells us that molecular kinetic energy is equally partitioned among three spatial dimensions. This is the equipartition theorem in action: each degree of freedom gets $$\\frac{1}{2}kT$$, and there are 3 translational degrees, giving $$\\frac{3}{2}kT$$ total.", "source": "GLM 5.1 â‘،", "_id": "glm_2_100"}, {"question": "Internal energy $$U$$ is defined as the sum of two contributions over all molecules. What are these two contributions, and which one is linked to the temperature we measure? (2 steps)", "answer": "- Step 1: The two contributions are **kinetic energy** (KE â€” from translational, rotational, and vibrational motion of molecules) and **potential energy** (PE â€” stored in intermolecular forces, depending on molecular separation and bond configuration). The formula is $$U = \\sum_i (KE_i + PE_i)$$.\n- Step 2: **Temperature is a measure of the average kinetic energy of the molecules** â€” specifically, $$T \\propto \\langle KE \\rangle$$. Potential energy does not directly affect temperature. This is why during a phase change, even though PE is changing (bonds breaking), the temperature stays constant because KE isn't changing.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_4"}, {"question": "Synthesis question: A sealed container of ideal gas is heated from $$200\\text{K}$$ to $$400\\text{K}$. Without doing calculations, state what happens to: (a) average molecular KE, (b) rms speed, (c) pressure, (d) the ratio $$c_{rms}/c_{sound}$$ in the gas. Explain each with the relevant formula. (4 steps)", "answer": "- Step 1: **(a) Average molecular KE doubles**. $$\\langle E_k\\rangle = \\frac{3}{2}kT$$ â€” directly proportional to $$T$$. $$400/200 = 2$$, so KE doubles.\n- Step 2: **(b) RMS speed increases by $$\\sqrt{2} \\approx 1.41$$**. $$c_{rms} = \\sqrt{3kT/m} \\propto \\sqrt{T}$$. $$\\sqrt{400/200} = \\sqrt{2}$$, not 2.\n- Step 3: **(c) Pressure doubles**. Pressure law: $$p \\propto T$$ at constant $$V$$ and $$N$$. $$400/200 = 2$$, so $$p$$ doubles. Alternatively from kinetic theory: faster molecules + more frequent + more forceful collisions â†’ double pressure.\n- Step 4: **(d) The ratio $$c_{rms}/c_{sound}$$ stays roughly constant**. Both $$c_{rms}$$ and $$c_{sound}$$ depend on $$\\sqrt{T}$$ (sound speed in an ideal gas is $$\\sqrt{\\gamma kT/m}$$), so they scale identically with temperature. Their ratio depends on $$\\gamma$$ (a property of the gas), not on $$T$$.", "source": "GLM 5.1 â‘،", "_id": "glm_2_70"}, {"question": "In the kinetic theory derivation, a single molecule of mass $$m$$ with velocity component $$v_x$$ bounces off a wall perpendicular to the $$x$$-axis. What is the change in momentum per collision, and why is it $$2mv_x$$ rather than just $$mv_x$$? (2 steps)", "answer": "- Step 1: Before collision, the molecule approaches the wall with $$x$$-component $$+v_x$$. After an **elastic collision**, the $$x$$-component reverses to $$-v_x$$ (the wall doesn't absorb energy; the molecule bounces back at the same speed in the opposite direction). The $$y$$ and $$z$$ components are unchanged.\n- Step 2: The change in momentum is $$\\Delta p = p_{\\text{after}} - p_{\\text{before}} = (-mv_x) - (mv_x) = -2mv_x$$. The magnitude is $$2mv_x$$ because the molecule doesn't just **stop** (which would give $$\\Delta p = mv_x$$) â€” it **reverses**, so the momentum swings from $$+mv_x$$ to $$-mv_x$$, a total swing of $$2mv_x$$. This doubled momentum transfer is what makes the wall feel a force.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_19"}, {"question": "In the Boyle's law experiment (Core Practical 14), why must you wait several seconds after adding each mass before recording the volume?", "answer": "- Adding a mass to the syringe does **work on the gas** (compressing it), which momentarily increases the gas's internal energy and raises its temperature.\n- **Boyle's law requires constant temperature** (isothermal conditions). If you measure immediately, the gas is hotter than room temperature, so the volume reading is for a higher-temperature state, not the same-temperature comparison.\n- Waiting allows the gas to **return to thermal equilibrium** with the surroundings (heat transfer to/from the environment), restoring the original temperature before recording.\n\n**Takeaway:** The experiment relies on the ideal gas assumptions â€” specifically, constant temperature. Without waiting, your pV data won't follow Boyle's law.", "source": "MiniMax â‘،", "_id": "minimax_2_23"}, {"question": "Show how equating the macroscopic and microscopic expressions for $$pV$$ leads to the result $$\\langle E_k\\rangle = \\tfrac{3}{2}kT$$. (3 steps)", "answer": "- Step 1: From kinetic theory: $$pV = \\tfrac{1}{3} N m \\langle c^2 \\rangle$$. From the ideal gas law: $$pV = NkT$$.\n- Step 2: Setting the right-hand sides equal: $$\\tfrac{1}{3} N m \\langle c^2 \\rangle = NkT$$. Cancel $$N$$ and multiply both sides by $$\\tfrac{3}{2}$$.\n- Step 3: $$\\tfrac{1}{2} m \\langle c^2 \\rangle = \\tfrac{3}{2} k T$$. The left side is the average translational kinetic energy per molecule, so $$\\langle E_k\\rangle = \\tfrac{3}{2}kT$$.\n\nTakeaway: this is the bridge between macroscopic temperature and microscopic motion.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_22"}, {"question": "In a problem combining heating ice through to steam, why does the boiling step dominate the total energy required? (3 steps)", "answer": "- Step 1: For water, $$L_v \\approx 2.26\\,\\text{MJ/kg}$$, about 7أ— larger than $$L_f \\approx 334\\,\\text{kJ/kg}$$, and much larger per-kg than $$c\\Delta\\theta$$ over any reasonable temperature range (e.g., $$c\\Delta\\theta_{100K} = 420\\,\\text{kJ/kg}$$).\n- Step 2: So if you sum: heating ice + melting + heating water + boiling, the boiling step is typically ~5â€“10أ— the others combined.\n- Step 3: Intuition: boiling requires completely separating all molecules (overcoming all intermolecular forces), whereas heating just speeds them up modestly, and melting just disrupts the lattice partially.\n\nThis is why a kettle takes much longer to boil dry than to reach 100آ°C.", "source": "Opus 4.7 â‘،", "_id": "opus_2_35"}, {"question": "When answering an exam question that says \"Explain why the temperature remains constant during melting,\" what three key phrases should you include to secure full marks? (3 steps)", "answer": "- Step 1: \"Energy goes into **breaking bonds / overcoming intermolecular forces**\" â€” this identifies where the energy goes.\n- Step 2: \"**Potential energy** increases, **kinetic energy** stays the same\" â€” this specifies which component of internal energy changes.\n- Step 3: \"**Temperature remains constant** during a change of state\" â€” this links back to the question. Temperature measures average KE, and since KE is unchanged, temperature is unchanged. All three points are commonly credited by examiners.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_71"}, {"question": "Specific heat capacity $$c$$ is defined as \"the energy required to raise the temperature of one kilogram of a substance by one kelvin.\" Why does water have an unusually high $$c$$ ($$\\approx 4200\\text{ J.kg}^{-1}\\text{.K}^{-1}$$), and what practical consequences does this have? (2 steps)", "answer": "- Step 1: Water's high $$c$$ is due to **hydrogen bonding** between molecules. Much of the energy supplied goes into stretching and rearranging these strong intermolecular bonds (increasing PE) before the molecules speed up (increasing KE/temperature). Effectively, water has many \"energy sinks\" beyond just translational KE.\n- Step 2: Practical consequences:\n+ Water is an excellent **coolant** â€” it absorbs large amounts of energy without its temperature rising much (used in car engines, industrial cooling).\n+ Water is good for **heat storage** â€” radiators and hot-water systems stay warm for a long time because water releases energy slowly as it cools.\n+ Coastal climates are milder â€” oceans absorb and release huge amounts of thermal energy, moderating temperature swings.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_11"}, {"question": "Explain why water has a much higher specific latent heat of vaporisation (L_v) than its specific latent heat of fusion (L_f). What do these values tell us about the intermolecular forces in each phase?", "answer": "- **Values:** L_f â‰ˆ 334 kJ/kg; L_v â‰ˆ 2.26 MJ/kg â€” L_v is about **7 times larger** than L_f.\n- **Why the difference:**\n+ **Melting (fusion)** only loosens the lattice enough for molecules to slide past each other. Intermolecular forces are still substantially present.\n+ **Boiling (vaporisation)** requires molecules to be completely separated from each other â€” the intermolecular forces must be overcome essentially in full.\n- **What this tells us:** The latent heat values reflect bond strength. The huge ratio shows that liquid-to-gas requires nearly complete bond breaking, while solid-to-liquid only partially weakens them.\n\n**Takeaway:** L_v >> L_f because vaporisation completely separates molecules (all bonds broken), while fusion only partially loosens them (some bonds remain).", "source": "MiniMax â‘،", "_id": "minimax_2_29"}, {"question": "A substance goes from $$-10آ°\\text{C}$$ (solid) to $$110آ°\\text{C}$$ (gas). How many distinct energy-calculation stages are needed, and which formula applies to each stage? (3 steps)", "answer": "- Step 1: There are **five stages** (not three or four â€” the phase changes are separate stages):\n+ Stage 1: Heat solid from $$-10آ°\\text{C}$$ to $$0آ°\\text{C}$$ â†’ use $$\\Delta E = mc_{\\text{ice}}\\Delta\\theta$$\n+ Stage 2: Melt at $$0آ°\\text{C}$$ â†’ use $$\\Delta E = L_f \\Delta m$$\n+ Stage 3: Heat liquid from $$0آ°\\text{C}$$ to $$100آ°\\text{C}$$ â†’ use $$\\Delta E = mc_{\\text{water}}\\Delta\\theta$$\n+ Stage 4: Boil at $$100آ°\\text{C}$$ â†’ use $$\\Delta E = L_v \\Delta m$$\n+ Stage 5: Heat gas from $$100آ°\\text{C}$$ to $$110آ°\\text{C}$$ â†’ use $$\\Delta E = mc_{\\text{steam}}\\Delta\\theta$$\n- Step 2: Each stage uses a different formula or different value of $$c$$. The substance has different specific heat capacities in each phase (e.g., $$c_{\\text{ice}} \\approx 2100$$, $$c_{\\text{water}} \\approx 4200$$, $$c_{\\text{steam}} \\approx 2000\\text{ J.kg}^{-1}\\text{.K}^{-1}$$). You cannot use one formula for the whole journey.\n- Step 3: The total energy is the **sum** of all five stages: $$E_{\\text{total}} = E_1 + E_2 + E_3 + E_4 + E_5$$. For water, stage 4 (boiling) typically dominates because $$L_v$$ is so large â€” this is why boiling a kettle takes much longer than heating the water to the boil.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_13"}, {"question": "A sealed syringe holds gas at room temperature. The plunger is slowly pushed in to halve the volume. Conceptually, what happens to pressure and to molecular speed?", "answer": "- Step 1: If compression is slow enough that the gas stays at room temperature (isothermal), Boyle's law applies: $$p_1V_1 = p_2V_2$$. Halving $$V$$ doubles $$p$$.\n- Step 2: Molecular speeds do NOT change â€” temperature is unchanged, so $$\\langle E_k\\rangle$$ and hence $$c_{rms}$$ are unchanged.\n- Step 3: The pressure rise comes purely from more frequent wall collisions (smaller box, same speeds), not from faster molecules.\n\nIf you push the plunger fast (adiabatic), the gas heats â€” but that's a different scenario.", "source": "Opus 4.7 â‘،", "_id": "opus_2_32"}, {"question": "The lesson transcript shows a simulation where gas pressure drops to zero at approximately $$-273آ°\\text{C}$$. Explain the connection between \"zero pressure\" and \"zero molecular KE,\" and why this experiment defines the Kelvin scale. (2 steps)", "answer": "- Step 1: Pressure arises from molecular collisions with walls. If molecules have zero KE (not moving), they don't collide with anything, and no momentum is transferred to the walls. **Zero KE â†’ zero collisions â†’ zero force â†’ zero pressure**. The three are causally linked: pressure is a macroscopic manifestation of molecular KE.\n- Step 2: This experiment defines the Kelvin scale because it identifies the **physical zero point** of the pressureâ€“temperature relationship. By extrapolating $$p$$ vs. $$T$$ data to $$p = 0$$, you find the temperature where molecular motion ceases â€” absolute zero. Setting this as $$0\\text{ K}$$ creates a temperature scale where zero corresponds to a real physical condition (no molecular motion), unlike Celsius where zero is arbitrary. Every Kelvin unit then represents a genuine increment in molecular KE.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_69"}, {"question": "Why is $$U = \\tfrac{3}{2}NkT$$ valid for an ideal *monatomic* gas, but not the full story for diatomic gases like nitrogen or oxygen? (3 steps)", "answer": "- Step 1: The $$\\tfrac{3}{2}kT$$ per molecule counts only **translational** kinetic energy â€” the 3 degrees of freedom for motion in $$x$$, $$y$$, $$z$$.\n- Step 2: Diatomic molecules can also **rotate** about two axes (and vibrate at high T). Each additional active degree of freedom adds $$\\tfrac{1}{2}kT$$ per molecule to the internal energy (equipartition theorem).\n- Step 3: So a diatomic gas at moderate temperatures has $$U = \\tfrac{5}{2}NkT$$ (3 translational + 2 rotational), not $$\\tfrac{3}{2}NkT$$. But $$\\tfrac{3}{2}kT$$ is still the *translational* KE per molecule â€” which is what enters $$pV = NkT$$.\n\nTakeaway: pressure only sees translational KE; total internal energy can be more.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_48"}, {"question": "Define *internal energy* and explain why temperature alone does not determine it. (2 steps)", "answer": "- Step 1: **Definition**  \n  Internal energy $ U $ is the sum of all molecules' kinetic energy (KE) and potential energy (PE).  \n\n- Step 2: **Role of Phase**  \n  Temperature reflects only **average KE**. During phase changes (e.g., melting), KE remains constant (temperature plateaus), but PE increases (breaking bonds), so $ U $ rises.", "source": "Qwen 3 â‘،", "_id": "qwen_2_2"}, {"question": "Synthesis question: Explain the complete chain from \"you heat a gas in a fixed container\" to \"pressure increases,\" linking macroscopic observation â†’ microscopic mechanism â†’ mathematical prediction. (3 steps)", "answer": "- Step 1: **Macroscopic observation**: You supply thermal energy to a gas in a rigid container. The gas temperature rises (thermometer confirms). You observe higher pressure on a gauge.\n- Step 2: **Microscopic mechanism**: Energy enters as heat â†’ molecules absorb KE â†’ they move faster ($$c_{rms} \\propto \\sqrt{T}$$). Faster molecules reach the walls more quickly (more frequent collisions) and carry more momentum per collision ($$\\Delta p = 2mv_x$$ with larger $$v_x$$). More momentum transferred, more often, to the same wall area â†’ more force per area â†’ higher pressure.\n- Step 3: **Mathematical prediction**: From $$\\langle E_k\\rangle = \\frac{3}{2}kT$$, doubling $$T$$ doubles $$\\langle E_k\\rangle$$ and from $$pV = NkT$$ (constant $$V$$, $$N$$), doubling $$T$$ doubles $$p$$. The pressure law $$p \\propto T$$ is the macroscopic summary of the microscopic three-Fs chain. Theory and observation converge.", "source": "GLM 5.1 â‘،", "_id": "glm_2_71"}, {"question": "A student writes \"internal energy is the kinetic energy of all the molecules.\" What is missing, and when does this omission matter most? (3 steps)", "answer": "- Step 1: The definition is missing the **potential energy** component. The correct verbatim definition is: \"the sum of the kinetic and potential energies of all the molecules within a given mass of a substance.\" Both contributions must be included.\n- Step 2: For an **ideal gas**, the omission barely matters because ideal gas assumptions explicitly state that intermolecular forces (and thus PE) are negligible â€” so $$U \\approx \\frac{3}{2}NkT$$ (all KE). But this is a special case, not the general definition.\n- Step 3: The omission matters most during **phase changes**. When ice melts at $$0آ°C$$, energy is being added (U increases) but temperature doesn't change (KE stays the same). All the added energy goes into PE (breaking lattice bonds). If you ignore PE, you'd wrongly conclude that adding heat at constant temperature means no change in internal energy â€” exactly backwards.\n\nThis is Trap 9 from the watch-list.", "source": "GLM 5.1 â‘،", "_id": "glm_2_7"}, {"question": "By equating the two expressions for $$pV$$ (ideal gas equation and kinetic theory equation), derive the result for average translational kinetic energy of one molecule. What two crucial consequences follow? (3 steps)", "answer": "- Step 1: Both equations have $$pV$$ on the left, so their right-hand sides are equal: $$\\frac{1}{3}Nm\\langle c^2\\rangle = NkT$$. Cancel $$N$$ (it appears on both sides): $$\\frac{1}{3}m\\langle c^2\\rangle = kT$$. Multiply both sides by $$\\frac{3}{2}$$: $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$.\n- Step 2: The left side $$\\frac{1}{2}m\\langle c^2\\rangle$$ is exactly the **average translational kinetic energy** of one molecule. So: $$\\langle E_k\\rangle = \\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$.\n- Step 3: Two crucial consequences:\n+ **Consequence 1**: Average molecular KE is directly proportional to absolute temperature. Doubling $$T$$ (in Kelvin) doubles $$\\langle E_k\\rangle$$.\n+ **Consequence 2**: Average KE does **not** depend on the gas identity. At the same temperature, helium atoms and oxygen molecules have the same average KE â€” the lighter helium just moves faster to compensate ($$\\langle E_k\\rangle = \\frac{1}{2}m\\langle c^2\\rangle$$, so smaller $$m$$ means larger $$\\langle c^2\\rangle$$ for the same $$\\langle E_k\\rangle$$).", "source": "GLM 5.1 â‘،", "_id": "glm_2_24"}, {"question": "Misconception probe: why is it wrong to call $$\\langle c\\rangle$$ \"the average velocity\" and use it to characterise molecular speeds?", "answer": "- Step 1: $$\\langle\\vec{v}\\rangle$$ (the average *velocity vector*) is zero by symmetry â€” gases have no preferred direction.\n- Step 2: $$\\langle c\\rangle$$ (the average *speed*, scalar) is not zero but is also rarely the quantity we use.\n- Step 3: In kinetic theory we use $$\\langle c^2\\rangle$$ (mean-square speed) and its square root $$c_{rms} = \\sqrt{\\langle c^2\\rangle}$$, because these arise naturally in $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$ and $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$.\n\nExaminers want \"root-mean-square speed\" or \"mean-square speed\" â€” not \"average velocity\" or \"average speed.\"", "source": "Opus 4.7 â‘،", "_id": "opus_2_47"}, {"question": "The rms speed of helium atoms is 720 m/s at 45آ°C. Calculate the rms speed at 80آ°C. (3 steps)", "answer": "- Step 1: Convert to Kelvin:\n+ Tâ‚پ = 45 + 273 = 318 K\n+ Tâ‚‚ = 80 + 273 = 353 K\n\n- Step 2: From E_k âˆ‌ T, we have (1/2)m(cآ²) âˆ‌ T, so cآ² âˆ‌ T. Therefore:\n+ (c_rms,2 / c_rms,1)آ² = Tâ‚‚/Tâ‚پ\n+ c_rms,2 = c_rms,1 أ— âˆڑ(Tâ‚‚/Tâ‚پ)\n\n- Step 3: Calculate:\n+ c_rms,2 = 720 أ— âˆڑ(353/318) = 720 أ— âˆڑ1.110 = 720 أ— 1.054 â‰ˆ **759 m/s**\n\n**Key insight:** Doubling T in K would only multiply c_rms by âˆڑ2 â‰ˆ 1.41, not by 2. Many students mistakenly think \"double T = double speed\" â€” it's actually the square root that matters.\n\n**Takeaway:** c_rms âˆ‌ âˆڑT, not T. The relationship is through the square root because KE âˆ‌ T and KE âˆ‌ cآ².", "source": "MiniMax â‘،", "_id": "minimax_2_21"}, {"question": "A graph of pressure vs Celsius temperature for a fixed mass of gas at constant volume is a straight line, but it does *not* pass through the origin. Where does it cross the temperature axis, and why is this useful? (3 steps)", "answer": "- Step 1: The pressure law says $$p \\propto T$$ in Kelvin â€” a straight line through the origin of a $$p$$-vs-$$T_{\\text{K}}$$ plot.\n- Step 2: Since $$T(\\text{K}) = \\theta + 273.15$$, plotting $$p$$ vs $$\\theta$$ (Celsius) gives a parallel line but shifted, crossing the $$\\theta$$-axis at $$\\theta = -273.15\\,^\\circ\\text{C}$$ (where pressure extrapolates to zero).\n- Step 3: This gives an **experimental determination of absolute zero**: extrapolate the line back to $$p = 0$$ and read off the temperature. Useful pedagogically and historically.\n\nTakeaway: absolute zero is hiding in plain sight in any $$p$$-vs-$$\\theta$$ plot.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_35"}, {"question": "Calculate the energy required to convert 0.20 kg of ice at -10آ°C to steam at 100آ°C. Use $ c_{\\text{ice}} = 2100 \\, \\text{Jآ·kg}^{-1}آ·\\text{K}^{-1} $, $ c_{\\text{water}} = 4200 \\, \\text{Jآ·kg}^{-1}آ·\\text{K}^{-1} $, $ L_f = 334 \\, \\text{kJآ·kg}^{-1} $, and $ L_v = 2.26 \\, \\text{MJآ·kg}^{-1} $. (4 steps)", "answer": "- Step 1: Heat ice from -10آ°C to 0آ°C: $ E_1 = 0.20 \\times 2100 \\times 10 = 4200 \\, \\text{J} $\n- Step 2: Melt the ice: $ E_2 = 0.20 \\times 334000 = 66800 \\, \\text{J} $\n- Step 3: Heat water from 0آ°C to 100آ°C: $ E_3 = 0.20 \\times 4200 \\times 100 = 84000 \\, \\text{J} $\n- Step 4: Boil the water: $ E_4 = 0.20 \\times 2260000 = 452000 \\, \\text{J} $\nTotal energy: $ E_{\\text{total}} = 607000 \\, \\text{J} â‰ˆ 607 \\, \\text{kJ} $\n\n[Optional: one-sentence takeaway: The energy required for phase changes (especially boiling) dwarfs the energy needed for heating.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_14"}, {"question": "A misconception probe: \"Specific latent heat of fusion and vaporisation are about the same magnitude.\" Why is this wrong for most substances, water in particular? (3 steps)", "answer": "- Step 1: $$L_f$$ measures the energy to break the *partial* lattice structure when transitioning solid â†’ liquid. Molecules remain close, intermolecular forces still largely act.\n- Step 2: $$L_v$$ measures the energy to *fully separate* molecules when transitioning liquid â†’ gas, working against all intermolecular forces.\n- Step 3: For water: $$L_f \\approx 334$$ kJ/kg, $$L_v \\approx 2260$$ kJ/kg â€” a factor of about 7 difference. Mixing them up gives an order-of-magnitude error on the answer.\n\nTakeaway: $$L_v \\gg L_f$$ for most substances; learn both values.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_50"}, {"question": "A student measures $$p$$ and $$V$$ for a gas at constant $$T$$ and plots $$p$$ vs $$V$$, getting a curve. How should they replot the data to verify Boyle's law as a straight line, and what should the slope of this line equal? (2 steps)", "answer": "- Step 1: Replot as **$$p$$ vs $$1/V$$**. Since $$p = \\text{constant}/V$$, this becomes $$p = \\text{constant} \\times (1/V)$$ â€” a straight line through the origin with slope equal to the constant $$nRT$$.\n- Step 2: The slope of the $$p$$ vs $$1/V$$ line equals $$nRT$$ (the Boyle's law constant for that temperature and mole count). If the line is straight and passes through the origin, Boyle's law is confirmed. A curved line or non-zero intercept indicates experimental error (e.g., temperature drift, pressure gauge zero error, or gas leakage).", "source": "GLM 5.1 â‘،", "_id": "glm_2_101"}, {"question": "On a $$p$$â€“$$V$$ diagram for Boyle's law, what shape is the curve at constant temperature, and how does a higher-temperature isotherm differ from a lower one? (2 steps)", "answer": "- Step 1: Each isotherm (constant-temperature curve) on a $$p$$â€“$$V$$ diagram is a **rectangular hyperbola**, since $$pV = \\text{constant}$$ means $$p \\propto 1/V$$. It approaches infinite pressure as $$V \\to 0$$ and zero pressure as $$V \\to \\infty$$.\n- Step 2: A higher-temperature isotherm lies **further from the origin**. At any given volume, a hotter gas exerts more pressure (molecules are faster), so the $$p$$-value is larger at the same $$V$$. The constant $$pV$$ is larger for higher $$T$$.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_43"}, {"question": "When discussing phase changes in an exam, what four keyword phrases earn marks? Quote them and explain what each one captures physically. (2 steps)", "answer": "- Step 1: The four mark-earning phrases:\n+ \"energy goes into breaking bonds / overcoming intermolecular forces\" â€” captures that PE is increasing\n+ \"potential energy increases, kinetic energy stays the same\" â€” the precise energy bookkeeping\n+ \"temperature remains constant during a change of state\" â€” the macroscopic observation\n+ \"boiling requires more energy than melting because the molecules must be completely separated\" â€” the comparison of latent heats\n- Step 2: Each phrase captures a different layer: the molecular mechanism (bond-breaking), the energy decomposition (PE vs KE), the macroscopic consequence (constant T), and the quantitative comparison (L_v >> L_f). Together, they form a complete explanation. Using any one alone may earn partial marks; using all four earns full marks.", "source": "GLM 5.1 â‘،", "_id": "glm_2_88"}, {"question": "For water, $$L_v \\approx 2260\\text{kJآ·kg}^{-1}$$ and $$L_f \\approx 334\\text{kJآ·kg}^{-1}$$. Explain physically why $$L_v$$ is about 7 times larger than $$L_f$$, using what happens to intermolecular bonds in each transition. (3 steps)", "answer": "- Step 1: **Melting (fusion)**: The lattice loosens enough for molecules to slide past each other, but intermolecular forces are still substantially present in the liquid. Molecules in liquid water are still quite close and still hydrogen-bonded â€” they've just gained enough freedom to flow. The bonds are *partially* overcome, not fully destroyed.\n- Step 2: **Boiling (vaporisation)**: Molecules must be *completely separated* from each other. In the gas phase, intermolecular distances are enormous and forces are negligible. Every hydrogen bond must be fully broken â€” molecules gain enough energy to escape the liquid entirely and exist independently.\n- Step 3: Since boiling requires near-total bond destruction while melting requires only partial loosening, it's physically logical that $$L_v \\gg L_f$$. The factor of ~7 for water reflects the fact that most of the binding energy remains in the liquid state â€” only a fraction is overcome to reach the liquid, but nearly all must be overcome to reach the gas.", "source": "GLM 5.1 â‘،", "_id": "glm_2_33"}, {"question": "A kettle heats a small mass of water and the temperature rises by a few kelvin. Conceptually, how does the energy supplied depend on the mass, the temperature change, and the substance, without doing the arithmetic? (3 steps)", "answer": "- Step 1: From $$\\Delta E = mc\\Delta\\theta$$, energy scales **linearly with mass** â€” double the water, double the energy needed.\n- Step 2: It also scales **linearly with temperature change** â€” heating from 20 to 30 needs twice as much energy as 20 to 25.\n- Step 3: It scales **linearly with $$c$$** â€” for the same temperature rise, water (high $$c$$) needs about twice the energy of oil ($$c \\sim 2000$$), which needs more than a metal like copper.\n\nTakeaway: the three factors all scale linearly and independently.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_14"}, {"question": "When melting an ice cube at 0 آ°C, why is the ice â†’ water transition irreversible in practice even though thermodynamically the temperature is the same? (3 steps)", "answer": "- Step 1: In an idealised reversible scenario, you could add energy slowly to melt ice and remove the same energy to refreeze, returning exactly to the start.\n- Step 2: In practice, energy transfers involve a temperature gradient: heat flows from a warm surroundings into colder ice. This is a one-way process at the molecular level â€” disorder (entropy) increases.\n- Step 3: To re-freeze, you'd need to extract heat into a colder environment, which itself takes work. The total entropy of universe rises, marking the process as practically irreversible â€” even though the substance returns to its original state.\n\nTakeaway: thermodynamic state is reversible; the process to get there usually isn't.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_67"}, {"question": "If we drop a gas's pressure to zero, what does the ideal gas law predict happens to either volume or temperature, and what's the physical meaning? (3 steps)", "answer": "- Step 1: From $$pV = NkT$$, if $$p = 0$$ at finite $$N$$ and $$V$$, then $$T = 0$$ â€” absolute zero.\n- Step 2: Physically: zero pressure means no momentum transfer to the walls. Since pressure comes from molecular collisions, no pressure means no motion â€” i.e. zero KE per molecule.\n- Step 3: This is exactly the extrapolation used in the experimental Boyle's-law / pressure-law determination of absolute zero. Of course, real gases condense before reaching this limit, so it's an idealised extrapolation.\n\nTakeaway: $$p \\to 0$$ implies $$T \\to 0$$ in the ideal-gas world.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_64"}, {"question": "The formula $$\\Delta E = mc\\Delta\\theta$$ applies when there is no phase change. The formula $$\\Delta E = L\\Delta m$$ applies during a phase change. What happens if you mistakenly use $$\\Delta E = mc\\Delta\\theta$$ during a melting plateau â€” what result do you get, and why is it wrong? (2 steps)", "answer": "- Step 1: During a phase change, the temperature does not change, so $$\\Delta\\theta = 0$$. Substituting into $$\\Delta E = mc\\Delta\\theta$$ gives $$\\Delta E = 0$$ â€” suggesting no energy is needed. This is clearly wrong: melting ice requires $$334\\text{ kJ}$$ per kilogram.\n- Step 2: The error comes from using the wrong formula. $$\\Delta E = mc\\Delta\\theta$$ only accounts for KE changes (temperature changes). During a phase change, energy goes into PE (breaking bonds) at constant temperature. The correct formula is $$\\Delta E = L\\Delta m$$, which has no $$\\Delta\\theta$$ term because temperature is constant. **Rule: temperature change â†’ use SHC; phase change â†’ use SLH.**", "source": "GLM 5.1 â‘ ", "_id": "glm_1_12"}, {"question": "A student writes \"The average speed of the molecules is $$\\sqrt{3kT/m}$$.\" Why might an examiner deduct marks for this phrasing? (2 steps)", "answer": "- Step 1: The quantity $$\\sqrt{3kT/m}$$ is the **root-mean-square speed** $$c_{\\text{rms}}$$, not the average speed $$\\langle c \\rangle$$. These are different quantities: $$c_{\\text{rms}} = \\sqrt{\\langle c^2 \\rangle}$$, while the mean speed is $$\\langle c \\rangle = \\frac{1}{N}\\sum c_i$$.\n- Step 2: For a Maxwellâ€“Boltzmann distribution, $$c_{\\text{rms}} > \\langle c \\rangle$$. Using \"average speed\" when you mean \"rms speed\" is imprecise. Examiners want you to say \"root-mean-square speed\" or \"rms speed.\" Similarly, saying \"mean speed\" when you mean \"mean-square speed\" $$\\langle c^2 \\rangle$$ would also lose marks.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_72"}, {"question": "For water, $$L_v \\approx 2.26\\,\\text{MJ kg}^{-1}$$ while $$L_f \\approx 334\\,\\text{kJ kg}^{-1}$$. Why is the latent heat of vaporisation roughly seven times the latent heat of fusion? (2 steps)", "answer": "- Step 1: **Melting (fusion)** only needs to loosen the lattice enough for molecules to slide past each other. Intermolecular forces are still substantially presentâ€”neighbouring molecules remain attracted to each other in the liquid.\n- Step 2: **Boiling (vaporisation)** requires completely separating the molecules so that intermolecular forces are essentially overcome in full. The molecules must be ripped away from all their neighbours. Because far more bonds (or rather, far more of each bond's energy) must be overcome, the energy per kilogram is much largerâ€”about seven times for water.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_14"}, {"question": "A misconception probe: a student says \"ice and water at 0 آ°C have the same internal energy.\" Why is this wrong? (3 steps)", "answer": "- Step 1: They have the same **temperature**, so the same **average kinetic energy per molecule**.\n- Step 2: But internal energy includes both KE and PE. Water has higher PE than ice because some of the lattice bonds have been broken (molecules are more separated/disordered on average).\n- Step 3: Specifically, $$U_{\\text{water}} - U_{\\text{ice}} = m L_f$$ â€” the latent heat of fusion accounts for exactly this PE difference. So at 0 آ°C, water has more internal energy than ice of the same mass.\n\nTakeaway: same T, different state â‡’ different U.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_61"}, {"question": "Why do real gases deviate from ideal behaviour at high pressure and/or low temperature?", "answer": "- Step 1: At **high pressure**, molecules are forced close together, so their volume is no longer negligible compared to the container, and intermolecular forces between neighbours become significant.\n- Step 2: At **low temperature**, molecules move slowly so they spend more time within range of intermolecular forces â€” attractions between them affect motion and reduce the pressure they exert.\n- Step 3: Conversely, ideal behaviour is best at **low pressure** (gas is dilute) and **high temperature** (KE dominates over any PE from interactions).\n\nThis is why $$pV = nRT$$ works best for \"thin, hot\" gases â€” the assumptions of negligible volume and negligible forces actually hold.", "source": "Opus 4.7 â‘،", "_id": "opus_2_21"}, {"question": "Why is internal energy NOT simply $$U = \\tfrac{3}{2}NkT$$ for a real substance, even though this formula works for an ideal gas? (3 steps)", "answer": "- Step 1: The ideal gas model assumes negligible intermolecular forces, so molecular PE is taken as zero. Then $$U$$ is entirely KE: $$U = N\\langle E_k\\rangle = \\tfrac{3}{2}NkT$$.\n- Step 2: For real substances (solids, liquids, dense gases), intermolecular forces store significant PE. $$U$$ includes both KE and PE contributions.\n- Step 3: This is especially obvious during a phase change: $$T$$ (hence KE) is constant, but $$U$$ rises substantially via PE. The ideal-gas formula would predict $$U$$ constant, which is wrong.\n\nThe formula $$U = \\tfrac{3}{2}NkT$$ is a model-specific result â€” don't apply it outside the ideal gas regime.", "source": "Opus 4.7 â‘،", "_id": "opus_2_41"}, {"question": "Why doesn't doubling the temperature in Celsius double the pressure of a fixed-volume gas, but doubling it in Kelvin does? (3 steps)", "answer": "- Step 1: The pressure law says $$p \\propto T_{\\text{absolute}}$$, i.e. $$p \\propto T$$ in Kelvin. Doubling T in K genuinely doubles the average molecular KE and hence the pressure.\n- Step 2: Doubling Celsius does not double the absolute temperature. For example, going from $$10\\,^\\circ\\text{C}$$ (283 K) to $$20\\,^\\circ\\text{C}$$ (293 K) only increases absolute T by ~3.5%, so pressure rises by ~3.5%, not 100%.\n- Step 3: The Celsius scale's zero is arbitrary, not physical â€” that's why ratios of Celsius temperatures don't correspond to physical ratios.\n\nTakeaway: ratios only work in Kelvin; differences work in either.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_63"}, {"question": "In the Boyle's law experiment, how is the pressure calculated from the masses added to the syringe? What role does atmospheric pressure play? (3 steps)", "answer": "- Step 1: The total pressure on the gas is **not just** from the masses â€” it's atmospheric pressure plus (or minus) the extra pressure from the weights. The masses push down on the plunger with force $$F = mg$$, spread over the syringe cross-section area $$A$$, giving additional pressure $$\\Delta p = mg/A$$.\n- Step 2: If the masses push the plunger *in* (compressing the gas), the total gas pressure is $$p = p_{atm} + mg/A$$ (atmospheric pressure pushing down on the plunger, plus the weight force). If the apparatus pulls the plunger *out* (expanding the gas), the total gas pressure is $$p = p_{atm} - mg/A$$ (the weight reduces the effective pressure).\n- Step 3: Atmospheric pressure ($$p_{atm} \\approx 1.01 \\times 10^5\\text{Pa}$$) is always present and significant â€” it's about 1 atmosphere, while typical lab masses add perhaps 10â€“20% more. You cannot ignore it. The key insight: $$p$$ in Boyle's law is the **absolute** pressure inside the gas, not the gauge pressure from the masses alone.", "source": "GLM 5.1 â‘،", "_id": "glm_2_29"}, {"question": "Describe the arrangement, bonds, and motion of particles in a gas.", "answer": "- Step 1: **Arrangement** â€” far apart, randomly distributed.\n- Step 2: **Bonds** â€” very weak (essentially negligible) intermolecular forces.\n- Step 3: **Motion** â€” fast, random straight-line motion until they collide elastically with each other or the container walls. They fill the volume of any container.", "source": "Opus 4.7 â‘،", "_id": "opus_2_3"}, {"question": "Synthesise: explain why the *same* macroscopic ideal gas law $$pV = NkT$$ is consistent with both Boyle's law and the microscopic kinetic theory result $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$. (4 steps)", "answer": "- Step 1: The ideal gas law is an empirical/macroscopic statement that has been verified experimentally over many conditions.\n- Step 2: Kinetic theory derives $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$ purely from Newtonian mechanics applied to many randomly-moving point particles colliding elastically.\n- Step 3: Setting the two equal forces a microscopic interpretation: $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$, defining what \"temperature\" means in terms of molecular KE.\n- Step 4: Boyle's law (constant $$T$$ means constant $$\\langle c^2\\rangle$$) emerges directly from this: $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$ becomes a constant when both $$N$$ and $$\\langle c^2\\rangle$$ are fixed.\n\nTakeaway: macroscopic gas laws and microscopic kinetic theory are two views of the same reality, linked by the definition of temperature.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_69"}, {"question": "Absolute zero is defined two ways. State both equivalent definitions, and explain why we say molecules have \"minimum\" (not \"zero\") kinetic energy in some formulations. (2 steps)", "answer": "- Step 1: The two equivalent examinable definitions are: (1) **The lowest possible temperature**, $$0\\text{ K} = -273.15آ°\\text{C}$$; and (2) **The temperature at which molecules have zero kinetic energy** â€” all translational, rotational, and vibrational motion ceases.\n- Step 2: Some formulations say \"minimum\" rather than \"zero\" because quantum mechanics dictates that even at absolute zero, there remains a tiny residual vibrational energy (the zero-point energy). However, for A-level physics, the exam definition uses \"zero kinetic energy\" â€” the classical limit where all motion stops. The key point: no energy can be extracted below this temperature; it is the absolute floor.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_7"}, {"question": "Volume unit conversions are a common source of error. What is the conversion factor from (a) $$\\text{cm}^3$$ to $$\\text{m}^3$$, and (b) $$\\text{dm}^3$$ (litres) to $$\\text{m}^3$$? Explain why these factors are not $$10^{-1}$$ and $$10^{-1}$$ respectively. (2 steps)", "answer": "- Step 1: (a) $$1\\text{ cm}^3 = 10^{-6}\\text{ m}^3$$, because $$1\\text{ cm} = 10^{-2}\\text{ m}$$, and volume scales as the **cube** of length: $$(10^{-2})^3 = 10^{-6}$$. It's not $$10^{-1}$$ because we're converting a 3D quantity, not a 1D length.\n+ (b) $$1\\text{ dm}^3 = 1\\text{ L} = 10^{-3}\\text{ m}^3$$, because $$1\\text{ dm} = 10^{-1}\\text{ m}$$, and $$(10^{-1})^3 = 10^{-3}$$.\n- Step 2: The trap is treating volume like length: students often write $$1\\text{ cm}^3 = 10^{-2}\\text{ m}^3$$ or $$1\\text{ dm}^3 = 10^{-1}\\text{ m}^3$$, which are off by factors of 100 and 10 respectively. Always remember: **volume conversions cube the length conversion factor**. Before using $$pV = nRT$$, convert all volumes to $$\\text{m}^3$$.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_38"}, {"question": "Two different gases at the same temperature have different molecular speeds. One is helium (mass ~4 u), the other is oxygen (mass ~32 u). Which has higher rms speed, and why? (2 steps)", "answer": "- Step 1: From c_rms = âˆڑ(3kT/m), for the same temperature T, c_rms âˆ‌ 1/âˆڑm.\n- Step 2: Helium (lighter, m â‰ˆ 4 u) has much higher rms speed than oxygen (heavier, m â‰ˆ 32 u):\n+ c_rms,He / c_rms,Oâ‚‚ = âˆڑ(m_Oâ‚‚ / m_He) = âˆڑ(32/4) = âˆڑ8 â‰ˆ 2.83\n+ Helium atoms move about 2.8 times faster than oxygen molecules at the same temperature.\n\n**Key point:** At the same temperature, **all gases have the same average kinetic energy** (E_k = 3/2 kT), but **different speeds** because KE = 1/2mvآ². Lighter molecules must move faster to have the same KE.\n\n**Takeaway:** Same T â†’ same KE â†’ lighter molecules move faster. This is why helium escapes from balloons faster than air, and why lighter gases diffuse more quickly.", "source": "MiniMax â‘،", "_id": "minimax_2_42"}, {"question": "A student mixes up $$L_f$$ and $$L_v$$ when calculating the energy to boil water. If they use $$L_f = 334\\,\\text{kJ/kg}$$ instead of $$L_v = 2260\\,\\text{kJ/kg}$$, by roughly what factor is their answer wrong? (2 steps)", "answer": "- Step 1: The correct energy to vaporise mass $$\\Delta m$$ is $$\\Delta E = L_v \\Delta m = 2260\\,\\text{kJ/kg} \\times \\Delta m$$. The student uses $$\\Delta E = L_f \\Delta m = 334\\,\\text{kJ/kg} \\times \\Delta m$$.\n- Step 2: The ratio is $$2260/334 \\approx 6.8$$. The student's answer is about 7 times too small. An examiner would immediately spot this because the latent heat of vaporisation for water is roughly 7 times the latent heat of fusion. $$L_f$$ is for melting/freezing; $$L_v$$ is for boiling/condensingâ€”using the wrong one is a severe error.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_55"}, {"question": "Explain why the pressure law ($$p \\propto T$$ at constant $$V$$) can be derived directly from the \"three Fs\" argument without any algebra. Walk through the causal chain. (3 steps)", "answer": "- Step 1: Heating the gas increases molecular KE â†’ molecules move **faster** (since $$\\langle E_k \\rangle \\propto T$$ and $$\\langle E_k \\rangle = \\frac{1}{2}m\\langle c^2 \\rangle$$, so $$c_{\\text{rms}} \\propto \\sqrt{T}$$). Faster molecules hit walls harder.\n- Step 2: Faster molecules also cover the distance to walls more quickly â†’ they hit walls **more frequently**. The collision rate is proportional to speed, so frequency $$\\propto \\sqrt{T}$$.\n- Step 3: Each hit delivers more momentum ($$\\Delta p = 2mv_x$$, and $$v_x \\propto \\sqrt{T}$$) â†’ **more force** per collision, proportional to $$\\sqrt{T}$$. Combined: force per collision $$\\propto \\sqrt{T}$$, collision frequency $$\\propto \\sqrt{T}$$, so total force $$\\propto \\sqrt{T} \\times \\sqrt{T} = T$$. Pressure = force/area, area is constant â†’ $$p \\propto T$$. The two $$\\sqrt{T}$$ factors multiply to give exactly $$T$$.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_55"}, {"question": "Archimedes' principle states that upthrust equals the weight of fluid displaced. For a floating object, upthrust equals the object's weight. Combine these two facts to explain why a floating object is only partially submerged. (2 steps)", "answer": "- Step 1: For a floating object: upthrust = weight of object. By Archimedes: upthrust = weight of displaced fluid. Therefore: **weight of object = weight of displaced fluid**, i.e., $$m_{\\text{obj}} g = \\rho_f V_{\\text{disp}} g$$, which simplifies to $$m_{\\text{obj}} = \\rho_f V_{\\text{disp}}$$.\n- Step 2: Since $$\\rho_{\\text{obj}} < \\rho_f$$ (otherwise it would sink), the displaced volume $$V_{\\text{disp}}$$ is less than the object's total volume $$V_{\\text{obj}}$$. Specifically, $$V_{\\text{disp}}/V_{\\text{obj}} = \\rho_{\\text{obj}}/\\rho_f$$. For wood ($$\\rho \\approx 600$$) floating in water ($$\\rho = 1000$$), only 60% of the volume is submerged. The object is **partially** submerged because it doesn't need to displace its full volume of water to balance its weight.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_31"}, {"question": "A kettle supplies 2.4 kW of power to 1.5 kg of boiling water. How long does it take to boil away 0.30 kg of water? (L_v = 2.26 MJ/kg) (2 steps)", "answer": "- Step 1: Calculate energy required: E = mL_v = 0.30 أ— 2.26 أ— 10âپ¶ = **6.78 أ— 10âپµ J**\n- Step 2: Time = Energy / Power: t = E / P = 6.78 أ— 10âپµ J / 2400 W = **283 s â‰ˆ 4.7 minutes**\n\n**Takeaway:** Notice how the boiling step dominates the energy requirement â€” heating water from 20آ°C to 100آ°C uses far less energy than boiling it away (latent heat is huge compared to specific heat term).", "source": "MiniMax â‘،", "_id": "minimax_2_12"}, {"question": "A balloon is taken from a warm room (300 K) outside to a cold day (240 K) at constant atmospheric pressure. Without numbers, what happens to its volume, and why? (3 steps)", "answer": "- Step 1: Pressure outside equals pressure inside (the rubber adjusts), and both equal atmospheric â€” so this is a constant-pressure process. Charles's law applies.\n- Step 2: $$V/T = \\text{const}$$, so volume scales linearly with $$T$$. Going from 300 K to 240 K reduces $$T$$ by 20%, so volume drops by **20%**.\n- Step 3: Microscopically: cold molecules are slower, so the balloon doesn't need to be as big to maintain the same number of wall hits per second per area to balance atmospheric pressure.\n\nTakeaway: cold balloons shrink in direct proportion to the absolute temperature.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_47"}, {"question": "Explain the physical meaning of each side of the equation $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$. What does it connect? (2 steps)", "answer": "- Step 1: The left-hand side, $$\\frac{1}{2}m\\langle c^2\\rangle$$, is the **average translational kinetic energy of one molecule**â€”a purely microscopic quantity derived from molecular speeds.\n- Step 2: The right-hand side, $$\\frac{3}{2}kT$$, is expressed in terms of the **macroscopic** temperature $$T$$ and the universal constant $$k$$. This equation is the bridge between microscopic molecular motion and macroscopic thermodynamics. It tells us that temperature is fundamentally a measure of molecular kinetic energy, and that this relationship is universalâ€”it applies to any ideal gas regardless of molecular identity.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_68"}, {"question": "A proton is composed of quarks with configuration uud (up-up-down). The up quark has charge $$+\\frac{2}{3}e$$ and the down quark has charge $$-\\frac{1}{3}e$$. Verify that this gives the proton's total charge of $$+1e$$, and state the quark configuration for a neutron. (2 steps)", "answer": "- Step 1: Proton (uud): $$+\\frac{2}{3}e + \\frac{2}{3}e - \\frac{1}{3}e = \\frac{4}{3}e - \\frac{1}{3}e = \\frac{3}{3}e = +1e$$. âœ“ This confirms the proton has charge $$+1$$ in units of the elementary charge $$e$$.\n- Step 2: Neutron (udd): $$+\\frac{2}{3}e - \\frac{1}{3}e - \\frac{1}{3}e = \\frac{2}{3}e - \\frac{2}{3}e = 0$$. âœ“ The neutron is electrically neutral. The only difference from the proton is swapping one up quark for one down quark â€” a tiny change in internal composition that eliminates all net charge.", "source": "GLM 5.1 â‘ ", "_id": "glm_1_34"}, {"question": "A car tyre has a *gauge* pressure of 2.5 أ— 10âپµ Pa at 15 آ°C and reaches 45 آ°C after driving (volume unchanged). Conceptually, how do you find the new gauge pressure? (4 steps)", "answer": "- Step 1: Convert gauge to absolute pressure by adding atmospheric: $$p_{1,\\text{abs}} = 2.5\\times 10^5 + 1.0\\times 10^5 = 3.5\\times 10^5\\,\\text{Pa}$$. The pressure law works with absolute pressures.\n- Step 2: Convert temperatures: $$T_1 = 288\\,\\text{K}$$, $$T_2 = 318\\,\\text{K}$$.\n- Step 3: Apply pressure law: $$p_2 = p_1 (T_2/T_1)$$. The ratio $$318/288 \\approx 1.10$$, so absolute pressure rises by ~10%.\n- Step 4:
