ernal energy of the molecules.\" Correct this statement and explain why it is wrong. (2 steps)", "answer": "- Step 1: The correct definition is: **temperature is a measure of the average kinetic energy of the molecules**. It reflects only the KE component, not the total internal energy.\n- Step 2: The original statement is wrong because internal energy $$U = \\sum(\\text{KE} + \\text{PE})$$ includes potential energy too. During a phase change, internal energy increases (PE rises as bonds break) while temperature remains constant (KE unchanged). If temperature *were* internal energy, this would be a contradiction. Temperature â†” average KE only.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_7", "judge_pick": false}, {"question": "Name the two ways to increase the internal energy of a system. (1 step)", "answer": "The two ways are: (1) **Heat the system** â€” transfer thermal energy from a hotter surroundings into the system. (2) **Do work on the system** â€” e.g., compress a gas (the piston does work on the gas molecules, increasing their KE). Both methods add energy to the molecules, increasing $$U$$. The reverse processes (losing heat, the system doing work on surroundings) decrease $$U$$.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_8", "judge_pick": false}, {"question": "Define \"absolute zero\" with both a conceptual and a numerical statement. (2 steps)", "answer": "- Step 1: Conceptually, absolute zero is the temperature at which the molecules in a substance have zero (minimum) kinetic energy. It is the lowest possible temperatureâ€”no more energy can be removed from the molecules.\n- Step 2: Numerically, absolute zero is $$0\\,\\text{K} = -273.15\\,آ°\\text{C}$$. In routine exam work, $$-273\\,آ°\\text{C}$$ is acceptable. At this temperature, all molecular motion (translation, rotation, vibration) ceases.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_9", "judge_pick": false}, {"question": "Why must you always convert to Kelvin before substituting into gas-law equations like $$pV = nRT$$? (2 steps)", "answer": "- Step 1: The Kelvin scale is anchored at absolute zero ($$0\\,\\text{K}$$ = zero molecular KE), so the gas laws become **proportional relationships**. On the Kelvin scale, doubling $$T$$ genuinely doubles the average molecular KE and, for an ideal gas at constant volume, doubles the pressure. On the Celsius scale, \"doubling the temperature\" is meaningless (what is \"twice $$10\\,آ°\\text{C}$$\"? $$20\\,آ°\\text{C}$$? That's not twice the KE).\n- Step 2: If you plug Celsius temperatures into $$pV = nRT$$, you can get negative values for $$T$$, leading to nonsensical negative pressures or volumes. At room temperature ($$\\sim 20\\,آ°\\text{C} \\approx 293\\,\\text{K}$$), using Celsius instead of Kelvin would make your answer wrong by a factor of roughly $$293/20 \\approx 15$$.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_10", "judge_pick": false}, {"question": "Convert $$-40\\,آ°\\text{C}$$ to Kelvin. (1 step)", "answer": "$$T(\\text{K}) = \\theta(آ°\\text{C}) + 273.15 = -40 + 273.15 = 233.15\\,\\text{K}$$. Using the exam shorthand of $$+273$$ gives $$233\\,\\text{K}$$. Note: a temperature **change** of $$1\\,آ°\\text{C}$$ equals a change of $$1\\,\\text{K}$$, so $$\\Delta\\theta$$ values are the same in either unitâ€”but absolute temperatures must always be in Kelvin for gas laws.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_11", "judge_pick": false}, {"question": "On a heating curve, what do the flat (horizontal) plateaus represent, and why is the temperature constant there even though energy is still being supplied? (3 steps)", "answer": "- Step 1: Each plateau represents a **phase change**â€”the first at the melting point (solid â†’ liquid) and the second at the boiling point (liquid â†’ gas). The substance is in the process of transitioning between states.\n- Step 2: The energy being supplied goes into **breaking intermolecular bonds**, which increases the **potential energy** of the molecules. It does not increase their kinetic energy.\n- Step 3: Since temperature is a measure of average **kinetic** energy, and KE is not changing, the temperature stays constant throughout the plateau. The energy is stored as PE, not manifested as a temperature rise.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_12", "judge_pick": false}, {"question": "On a heating curve, what do the sloped (rising) sections represent in terms of molecular energy? (2 steps)", "answer": "- Step 1: The sloped sections represent **heating within a single phase** (e.g., warming solid ice from $$-20\\,آ°\\text{C}$$ to $$0\\,آ°\\text{C}$$, or warming liquid water from $$0\\,آ°\\text{C}$$ to $$100\\,آ°\\text{C}$$). No phase change is occurring.\n- Step 2: During these sections, the energy supplied increases the **kinetic energy** of the moleculesâ€”they vibrate faster (solid), move faster (liquid), or fly faster (gas). Since KE is rising, the temperature rises linearly, governed by $$\\Delta E = mc\\Delta\\theta$$.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_13", "judge_pick": false}, {"question": "For water, $$L_v \\approx 2.26\\,\\text{MJ kg}^{-1}$$ while $$L_f \\approx 334\\,\\text{kJ kg}^{-1}$$. Why is the latent heat of vaporisation roughly seven times the latent heat of fusion? (2 steps)", "answer": "- Step 1: **Melting (fusion)** only needs to loosen the lattice enough for molecules to slide past each other. Intermolecular forces are still substantially presentâ€”neighbouring molecules remain attracted to each other in the liquid.\n- Step 2: **Boiling (vaporisation)** requires completely separating the molecules so that intermolecular forces are essentially overcome in full. The molecules must be ripped away from all their neighbours. Because far more bonds (or rather, far more of each bond's energy) must be overcome, the energy per kilogram is much largerâ€”about seven times for water.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_14", "judge_pick": true}, {"question": "Name the phase transition for each direction: solidâ†’liquid, liquidâ†’gas (at boiling point), liquidâ†’gas (below boiling point), solidâ†’gas, and their reverses. (2 steps)", "answer": "- Step 1: Forward (energy in):\n+ Solid â†’ liquid: **melting / fusion**\n+ Liquid â†’ gas (at boiling point): **boiling / vaporisation**\n+ Liquid â†’ gas (below boiling point): **evaporation**\n+ Solid â†’ gas: **sublimation**\n- Step 2: Reverse (energy out):\n+ Liquid â†’ solid: **freezing / solidification**\n+ Gas â†’ liquid: **condensation**\n+ Gas â†’ solid: **deposition**", "source": "GLM 5.1 â‘¢", "_id": "glm_3_15", "judge_pick": false}, {"question": "How does evaporation differ from boiling? Give at least two distinctions. (3 steps)", "answer": "- Step 1: **Where it happens** â€” Boiling occurs throughout the bulk of the liquid (bubbles form within the liquid and rise). Evaporation happens only at the liquid's surface, where individual high-energy molecules escape.\n- Step 2: **When it happens** â€” Boiling occurs at a specific temperature (the boiling point, when vapour pressure equals atmospheric pressure). Evaporation can occur at any temperature, because even below the boiling point, some molecules in the high-speed tail of the Maxwellâ€“Boltzmann distribution have enough energy to escape.\n- Step 3: **Energy source** â€” In boiling, external heat continuously supplies energy. In evaporation, the fastest surface molecules leave, reducing the average KE of the remaining liquidâ€”so evaporation causes cooling (which is why sweating cools you).", "source": "GLM 5.1 â‘¢", "_id": "glm_3_16", "judge_pick": false}, {"question": "Define \"specific heat capacity\" with the precise wording the exam expects. (1 step)", "answer": "Specific heat capacity ($$c$$) is **the energy required to raise the temperature of one kilogram of a substance by one kelvin**. Units: $$\\text{J kg}^{-1}\\text{K}^{-1}$$. The \"per unit mass\" phrasing is criticalâ€”without it, you'd be defining heat capacity (which depends on mass), not *specific* heat capacity.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_17", "judge_pick": false}, {"question": "Write the formula for calculating the energy needed to change the temperature of a substance (no phase change), and identify each variable with its SI unit. (2 steps)", "answer": "- Step 1: $$\\Delta E = m\\,c\\,\\Delta\\theta$$\n- Step 2: $$\\Delta E$$ = energy transferred ($$\\text{J}$$); $$m$$ = mass ($$\\text{kg}$$); $$c$$ = specific heat capacity ($$\\text{J kg}^{-1}\\text{K}^{-1}$$); $$\\Delta\\theta$$ = temperature change ($$\\text{K}$$ or $$آ°\\text{C}$$â€”since a change of $$1\\,\\text{K}$$ = a change of $$1\\,آ°\\text{C}$$, the numerical value of $$\\Delta\\theta$$ is the same in either unit).", "source": "GLM 5.1 â‘¢", "_id": "glm_3_18", "judge_pick": false}, {"question": "Why does water have an unusually high specific heat capacity ($$\\sim 4200\\,\\text{J kg}^{-1}\\text{K}^{-1}$$) compared to most other substances? (2 steps)", "answer": "- Step 1: Water molecules form extensive **hydrogen bonds** with each other. These are strong intermolecular attractions that require significant energy to stretch and overcome before the molecules can speed up.\n- Step 2: When you heat water, much of the energy goes into partially disrupting these hydrogen bonds rather than directly increasing molecular KE. As a result, a lot of energy is needed per kelvin of temperature riseâ€”giving water its high $$c$$. This is why water is excellent as a coolant (absorbs large amounts of energy) and in heating systems (stores lots of thermal energy per kelvin).", "source": "GLM 5.1 â‘¢", "_id": "glm_3_19", "judge_pick": false}, {"question": "A student tries to use $$\\Delta E = mc\\Delta\\theta$$ during a phase change and gets $$\\Delta E = 0$$. What went wrong? (2 steps)", "answer": "- Step 1: During a phase change, the temperature does not change ($$\\Delta\\theta = 0$$), so $$mc\\Delta\\theta$$ correctly gives zero for the energy going into KEâ€”but this is **not** the total energy supplied. The student has used the wrong formula.\n- Step 2: The correct formula during a phase change is $$\\Delta E = L\\Delta m$$, where $$L$$ is the specific latent heat and $$\\Delta m$$ is the mass changing phase. The energy goes into molecular potential energy (breaking bonds), not kinetic energy. Use $$\\Delta E = mc\\Delta\\theta$$ for heating/cooling within a phase; use $$\\Delta E = L\\Delta m$$ for phase changes.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_20", "judge_pick": false}, {"question": "Define \"specific latent heat of fusion\" and \"specific latent heat of vaporisation\" with exam-precise wording. (2 steps)", "answer": "- Step 1: **Specific latent heat of fusion** ($$L_f$$): the thermal energy required to convert one kilogram of solid to liquid with no change in temperature. Units: $$\\text{J kg}^{-1}$$.\n- Step 2: **Specific latent heat of vaporisation** ($$L_v$$): the thermal energy required to convert one kilogram of liquid to gas with no change in temperature. Units: $$\\text{J kg}^{-1}$$. The \"no change in temperature\" clause is essentialâ€”without it, the definition is incomplete.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_21", "judge_pick": false}, {"question": "Write the latent heat formula and explain why there is no $$\\Delta\\theta$$ term. (2 steps)", "answer": "- Step 1: $$\\Delta E = L\\,\\Delta m$$, where $$L$$ is specific latent heat ($$\\text{J kg}^{-1}$$) and $$\\Delta m$$ is the mass undergoing the phase change ($$\\text{kg}$$).\n- Step 2: There is no $$\\Delta\\theta$$ term because **the temperature does not change during a phase change**. All the energy supplied goes into breaking (or forming) intermolecular bondsâ€”altering the potential energy of the molecules, not their kinetic energy. Since temperature measures average KE, and KE is constant, $$\\Delta\\theta = 0$$ throughout the transition.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_22", "judge_pick": false}, {"question": "State at least four assumptions of the kinetic theory of an ideal gas. (2 steps)", "answer": "- Step 1: The assumptions are:\n+ Molecules occupy negligible volume compared to the container.\n+ Intermolecular forces are negligible except during the very brief instant of collision.\n+ Collisions (moleculeâ€“molecule and moleculeâ€“wall) are perfectly elasticâ€”no KE is lost.\n+ The duration of a collision is negligible compared to the time between collisions.\n- Step 2: Additional assumptions:\n+ The motion of molecules is random (in direction and speed) and obeys Newton's laws.\n+ There are very many molecules (so statistical averages are meaningful).\n\nFor a 3-mark exam question, you need at least three distinct assumptions. \"Negligible volume,\" \"negligible intermolecular forces,\" and \"elastic collisions\" are the most commonly credited.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_23", "judge_pick": false}, {"question": "Under what conditions does a real gas deviate most from ideal-gas behaviour, and why? (2 steps)", "answer": "- Step 1: Real gases deviate most from ideal behaviour at **high pressure** and **low temperature**. Under these conditions, the molecules are forced close together.\n- Step 2: When molecules are close together: (a) their own volume is no longer negligible compared to the container volume, and (b) intermolecular forces become significant (attractive forces slow approaching molecules and reduce pressure compared to the ideal prediction). At low pressure and high temperature, molecules are far apart and fast-moving, so these effects are negligible and the gas behaves nearly ideally.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_24", "judge_pick": false}, {"question": "State Boyle's law in words and as an equation. (1 step)", "answer": "**Words:** The pressure of a fixed mass of gas at constant temperature is inversely proportional to its volume. **Equation:** $$pV = \\text{constant}$$, or equivalently $$p_1 V_1 = p_2 V_2$$ (for constant $$T$$ and constant $$N$$). The condition \"fixed mass\" (fixed number of molecules) and \"constant temperature\" are both essentialâ€”Boyle's law does not apply if either is violated.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_25", "judge_pick": false}, {"question": "State Charles's law in words and as an equation. (1 step)", "answer": "**Words:** The volume of a fixed mass of gas at constant pressure is proportional to its absolute temperature. **Equation:** $$V/T = \\text{constant}$$, or $$V_1/T_1 = V_2/T_2$$ (for constant $$p$$ and $$N$$). Crucially, $$T$$ must be in Kelvin. If you use Celsius, the proportionality fails (e.g., $$0\\,آ°\\text{C}$$ would give zero volume, which is absurd).", "source": "GLM 5.1 â‘¢", "_id": "glm_3_26", "judge_pick": false}, {"question": "State the pressure law in words and as an equation. (1 step)", "answer": "**Words:** The pressure of a fixed mass of gas at constant volume is proportional to its absolute temperature. **Equation:** $$p/T = \\text{constant}$$, or $$p_1/T_1 = p_2/T_2$$ (for constant $$V$$ and $$N$$). Again, $$T$$ must be in Kelvin. This law follows directly from the kinetic-theory argument that hotter molecules hit walls faster, more often, and with more force.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_27", "judge_pick": false}, {"question": "Write the ideal gas equation in two forms and explain the relationship between the two constants $$R$$ and $$k$$. (3 steps)", "answer": "- Step 1: The two forms are $$pV = nRT$$ (using moles) and $$pV = NkT$$ (using molecules), where $$n$$ = number of moles, $$N$$ = number of molecules.\n- Step 2: The relationship between the constants is $$k = R/N_A$$, where $$N_A = 6.02 \\times 10^{23}\\,\\text{mol}^{-1}$$ is Avogadro's number. This connects the per-molecule scale ($$k$$) to the per-mole scale ($$R$$).\n- Step 3: Numerically: $$R = 8.31\\,\\text{J mol}^{-1}\\text{K}^{-1}$$ and $$k = 1.38 \\times 10^{-23}\\,\\text{J K}^{-1}$$. Check: $$R/N_A = 8.31 / 6.02 \\times 10^{23} \\approx 1.38 \\times 10^{-23}$$. The two forms are equivalent because $$N = n \\times N_A$$.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_28", "judge_pick": false}, {"question": "In the ideal gas equation $$pV = NkT$$, identify the SI unit for each variable. Why is getting the units right so critical? (2 steps)", "answer": "- Step 1: $$p$$ in pascals ($$\\text{Pa} = \\text{N m}^{-2}$$), $$V$$ in cubic metres ($$\\text{m}^3$$), $$N$$ is dimensionless (a count), $$k$$ in $$\\text{J K}^{-1}$$, $$T$$ in kelvin ($$\\text{K}$$).\n- Step 2: Common exam traps: volume given in $$\\text{cm}^3$$ or $$\\text{dm}^3$$ must be converted ($$1\\,\\text{cm}^3 = 10^{-6}\\,\\text{m}^3$$; $$1\\,\\text{dm}^3 = 1\\,\\text{L} = 10^{-3}\\,\\text{m}^3$$); temperature must be in Kelvin (add 273); pressure in $$\\text{kPa}$$ or $$\\text{MPa}$$ must be converted to $$\\text{Pa}$$. A single unit error can make the answer off by $$10^3$$, $$10^6$$, or more.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_29", "judge_pick": false}, {"question": "Derive the expression for the change in momentum of a single molecule when it collides elastically with a container wall perpendicular to the x-axis. (3 steps)", "answer": "- Step 1: Before the collision, the molecule has velocity component $$+v_x$$ towards the wall. The collision is elastic, so the magnitude of the velocity component is unchanged but the direction reverses: after the collision, the x-component is $$-v_x$$.\n- Step 2: The momentum before is $$p_{\\text{before}} = m v_x$$ and the momentum after is $$p_{\\text{after}} = m(-v_x) = -m v_x$$.\n- Step 3: The change in momentum is $$\\Delta p = p_{\\text{after}} - p_{\\text{before}} = -mv_x - mv_x = -2mv_x$$. The magnitude is $$|\\Delta p| = 2mv_x$$. By Newton's third law, the wall experiences an equal and opposite change in momentum, i.e., a force directed outward from the wall.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_30", "judge_pick": false}, {"question": "A molecule with x-velocity $$v_x$$ bounces between two parallel walls separated by distance $$L$$. Derive the time between successive collisions with the same wall. (2 steps)", "answer": "- Step 1: After hitting one wall, the molecule travels distance $$L$$ to reach the opposite wall, then another distance $$L$$ to returnâ€”so the round-trip distance is $$2L$$.\n- Step 2: The time for this round trip is $$\\Delta t = 2L / v_x$$. This is the time between successive collisions with the original wall. (We assume $$v_x$$ is constant between collisions, which holds because there are no intermolecular forces in the ideal-gas model.)", "source": "GLM 5.1 â‘¢", "_id": "glm_3_31", "judge_pick": false}, {"question": "Using the momentum change $$\\Delta p = 2mv_x$$ and the time between collisions $$\\Delta t = 2L/v_x$$, derive the average force exerted on the wall by one molecule. (2 steps)", "answer": "- Step 1: Force is rate of change of momentum: $$F_1 = \\Delta p / \\Delta t = 2mv_x \\div (2L/v_x) = 2mv_x \\times v_x / 2L = mv_x^2 / L$$.\n- Step 2: This is the time-averaged force from one molecule. It depends on the square of the velocity componentâ€”faster molecules exert disproportionately more force because they hit both harder (more momentum per hit) and more often (shorter time between hits).", "source": "GLM 5.1 â‘¢", "_id": "glm_3_32", "judge_pick": false}, {"question": "Starting from the force $$F = Nm\\langle v_x^2\\rangle / L$$ on a wall of a cubical container of side $$L$$, derive the kinetic-theory equation $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$. (3 steps)", "answer": "- Step 1: Pressure is force per area. The wall area is $$L^2$$, so $$p = F / L^2 = Nm\\langle v_x^2\\rangle / (L \\cdot L^2) = Nm\\langle v_x^2\\rangle / L^3 = Nm\\langle v_x^2\\rangle / V$$, where $$V = L^3$$.\n- Step 2: By **isotropy** (random motion means the x, y, and z directions are equivalent), $$\\langle v_x^2\\rangle = \\langle v_y^2\\rangle = \\langle v_z^2\\rangle$$. Since $$\\langle c^2\\rangle = \\langle v_x^2\\rangle + \\langle v_y^2\\rangle + \\langle v_z^2\\rangle = 3\\langle v_x^2\\rangle$$, we get $$\\langle v_x^2\\rangle = \\frac{1}{3}\\langle c^2\\rangle$$.\n- Step 3: Substituting: $$p = Nm \\cdot \\frac{1}{3}\\langle c^2\\rangle / V$$, which rearranges to $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$. This is the fundamental kinetic-theory result.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_33", "judge_pick": false}, {"question": "What does \"isotropy\" mean in the context of kinetic theory, and why is it essential for deriving $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$? (2 steps)", "answer": "- Step 1: Isotropy means that molecular motion is equally distributed across all directionsâ€”there is no preferred direction. On average, $$\\langle v_x^2\\rangle = \\langle v_y^2\\rangle = \\langle v_z^2\\rangle$$. This is a consequence of the \"random motion\" assumption.\n- Step 2: Without isotropy, we could not relate the one-dimensional quantity $$\\langle v_x^2\\rangle$$ (which appears in the wall-force calculation) to the three-dimensional mean-square speed $$\\langle c^2\\rangle$$. The key substitution $$\\langle v_x^2\\rangle = \\frac{1}{3}\\langle c^2\\rangle$$ depends entirely on the three directions being statistically equivalent.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_34", "judge_pick": false}, {"question": "By equating the two expressions for $$pV$$, derive the formula for the average translational kinetic energy of one gas molecule. (3 steps)", "answer": "- Step 1: The ideal gas equation gives $$pV = NkT$$. The kinetic-theory equation gives $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$. Since both equal $$pV$$, their right-hand sides are equal: $$\\frac{1}{3}Nm\\langle c^2\\rangle = NkT$$.\n- Step 2: Cancel the common factor $$N$$: $$\\frac{1}{3}m\\langle c^2\\rangle = kT$$. Multiply both sides by $$\\frac{3}{2}$$: $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$.\n- Step 3: The left-hand side, $$\\frac{1}{2}m\\langle c^2\\rangle$$, is exactly the average translational kinetic energy of one molecule. Therefore: $$\\bar{E}_k = \\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$. This is one of the most important results in thermal physics.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_35", "judge_pick": false}, {"question": "At the same temperature, do helium atoms and oxygen molecules have the same average kinetic energy? Do they have the same rms speed? Explain. (3 steps)", "answer": "- Step 1: **Same average KE?** Yes. $$\\bar{E}_k = \\frac{3}{2}kT$$ depends only on temperature, not on the identity or mass of the gas. At the same $$T$$, all gas molecules have the same average translational KE.\n- Step 2: **Same rms speed?** No. Since $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$, a heavier molecule must have a smaller $$\\langle c^2\\rangle$$ (and hence a smaller $$c_{\\text{rms}}$$) to keep the product $$m\\langle c^2\\rangle$$ constant at the same $$T$$.\n- Step 3: Concretely, oxygen ($$M \\approx 32\\,\\text{g mol}^{-1}$$) is about 8 times heavier than helium ($$M \\approx 4\\,\\text{g mol}^{-1}$$), so oxygen's rms speed is roughly $$\\sqrt{8} \\approx 2.8$$ times slower than helium's at the same temperature. Same KE, different speeds.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_36", "judge_pick": false}, {"question": "Why is the average velocity $$\\langle \\vec{v} \\rangle$$ of gas molecules zero, and what quantity do we use instead to characterise their typical speed? (2 steps)", "answer": "- Step 1: Molecules move in all directions with equal probability (isotropy). For every molecule moving in the $$+x$$ direction, on average there is one moving in the $$-x$$ direction. When you average the velocity **vectors**, they cancel: $$\\langle \\vec{v} \\rangle = 0$$. This makes average velocity useless as a measure of molecular speed.\n- Step 2: Instead, we use the **root-mean-square speed** $$c_{\\text{rms}} = \\sqrt{\\langle c^2 \\rangle}$$. By squaring first, we eliminate the sign problem (all squared speeds are positive), then we take the mean, then the square root to get back to speed units. This gives a meaningful, positive measure of the typical molecular speed.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_37", "judge_pick": false}, {"question": "Write the two equivalent expressions for the root-mean-square speed of a gas molecule, and explain each term. (2 steps)", "answer": "- Step 1: $$c_{\\text{rms}} = \\sqrt{\\frac{3kT}{m}} = \\sqrt{\\frac{3RT}{M}}$$\n- Step 2: In the first form, $$k$$ is Boltzmann's constant and $$m$$ is the mass of one molecule ($$\\text{kg}$$). In the second form, $$R$$ is the molar gas constant and $$M$$ is the molar mass in $$\\text{kg mol}^{-1}$$. They are equivalent because $$R = kN_A$$ and $$M = mN_A$$, so $$3RT/M = 3kN_A T / (mN_A) = 3kT/m$$. Always use the first form when you know the molecular mass; use the second when you know the molar mass.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_38", "judge_pick": false}, {"question": "If the absolute temperature of a gas doubles, what happens to (a) the average molecular KE, and (b) the rms speed? (3 steps)", "answer": "- Step 1: (a) Average KE: $$\\bar{E}_k = \\frac{3}{2}kT$$. Since $$\\bar{E}_k \\propto T$$, doubling $$T$$ doubles the average molecular KE.\n- Step 2: (b) RMS speed: $$c_{\\text{rms}} = \\sqrt{3kT/m} \\propto \\sqrt{T}$$. Doubling $$T$$ multiplies $$c_{\\text{rms}}$$ by $$\\sqrt{2} \\approx 1.41$$, **not** by 2.\n- Step 3: This is a very common exam trap. Students often write \"doubling the temperature doubles the speed.\" It doesn'tâ€”it increases the speed by a factor of about 1.4. The KE doubles because KE depends on $$c^2$$, and $$c^2$$ does double when $$T$$ doubles.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_39", "judge_pick": false}, {"question": "Explain, using the \"three F's\" reasoning, why a fixed volume of gas exerts more pressure when heated. (3 steps)", "answer": "- Step 1: **Faster** â€” Heating increases the average KE of the molecules, so they move faster ($$c_{\\text{rms}} \\propto \\sqrt{T}$$).\n- Step 2: **More Frequently** â€” Faster molecules traverse the distance to the wall and back in less time, so they hit the wall more often per unit time.\n- Step 3: **More Force per impact** â€” Each collision transfers more momentum to the wall ($$\\Delta p = 2mv_x$$, and $$v_x$$ is larger). More force per hit, applied more often, over the same area, means greater pressure. Hence $$p \\propto T$$ at constant $$V$$ (the pressure law).", "source": "GLM 5.1 â‘¢", "_id": "glm_3_40", "judge_pick": false}, {"question": "In the Boyle's law experiment (Core Practical 14), how is the pressure determined from the masses placed on the plunger? (3 steps)", "answer": "- Step 1: The total pressure on the trapped gas is the sum of atmospheric pressure and the extra pressure from the masses: $$p = p_{\\text{atm}} + mg/A$$, where $$m$$ is the total mass on the plunger, $$g$$ is gravitational acceleration, and $$A$$ is the cross-sectional area of the syringe.\n- Step 2: The force from the masses is their weight $$mg$$, distributed over the syringe area $$A$$. The area is found from the syringe diameter: $$A = \\pi(d/2)^2$$.\n- Step 3: If masses are removed (or the plunger is pulled), the pressure can be *below* atmospheric: $$p = p_{\\text{atm}} - mg/A$$. In all cases, the volume is read directly from the syringe scale, and the product $$pV$$ should remain approximately constant if the temperature is truly held constant.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_41", "judge_pick": false}, {"question": "In the Boyle's law experiment, why must you wait several seconds after adding or removing a mass before reading the volume? (2 steps)", "answer": "- Step 1: Adding a mass compresses the gas, doing work on it. This momentarily increases the internal energy of the gas, raising its temperature slightly above room temperature. Boyle's law requires **constant temperature**, so the reading taken immediately would be at a higher $$T$$ than intended.\n- Step 2: Waiting allows the gas to re-equilibrate thermally with its surroundings (the room). Once the temperature returns to ambient, the volume reading is valid for an isothermal (constant-$$T$$) condition. Without waiting, you introduce a systematic error that makes $$pV$$ appear to not be constant.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_42", "judge_pick": false}, {"question": "On a $$p$$â€“$$V$$ diagram for Boyle's law, what shape is the curve at constant temperature, and how does a higher-temperature isotherm differ from a lower one? (2 steps)", "answer": "- Step 1: Each isotherm (constant-temperature curve) on a $$p$$â€“$$V$$ diagram is a **rectangular hyperbola**, since $$pV = \\text{constant}$$ means $$p \\propto 1/V$$. It approaches infinite pressure as $$V \\to 0$$ and zero pressure as $$V \\to \\infty$$.\n- Step 2: A higher-temperature isotherm lies **further from the origin**. At any given volume, a hotter gas exerts more pressure (molecules are faster), so the $$p$$-value is larger at the same $$V$$. The constant $$pV$$ is larger for higher $$T$$.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_43", "judge_pick": true}, {"question": "When plotting pressure vs. temperature for a fixed volume of gas, why does the line pass through the origin when $$T$$ is in Kelvin, but cross the $$T$$-axis at $$-273.15\\,آ°\\text{C}$$ when $$T$$ is in Celsius? (2 steps)", "answer": "- Step 1: The pressure law states $$p \\propto T$$ (in Kelvin). Since $$p = 0$$ when $$T = 0\\,\\text{K}$$ (zero molecular KE, zero collisions, zero pressure), the straight line through the data extrapolates to the origin on a $$p$$ vs. $$T(\\text{K})$$ plot.\n- Step 2: The Celsius scale is simply shifted by 273.15 from the Kelvin scale. On a $$p$$ vs. $$\\theta(آ°\\text{C})$$ plot, the same straight line is shifted so that it crosses the temperature axis at $$\\theta = -273.15\\,آ°\\text{C}$$, which corresponds to $$T = 0\\,\\text{K}$$. This extrapolation is historically how absolute zero was determined experimentally.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_44", "judge_pick": false}, {"question": "A student claims: \"During melting, the internal energy doesn't change because the temperature stays constant.\" Is this correct? Explain. (2 steps)", "answer": "- Step 1: This is **incorrect**. While the temperature (and thus average KE) stays constant during melting, the **potential energy** of the molecules increases as intermolecular bonds are broken.\n- Step 2: Since internal energy $$U = \\sum(\\text{KE} + \\text{PE})$$, and PE is rising while KE stays the same, $$U$$ **increases** during melting. The energy supplied goes into PE, not KE. The student's confusion comes from equating \"constant temperature\" with \"constant internal energy\"â€”they are not the same during a phase change.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_45", "judge_pick": false}, {"question": "For an ideal gas only, why can we say that internal energy depends solely on temperature? (2 steps)", "answer": "- Step 1: For an ideal gas, the assumptions include **negligible intermolecular forces** (except during collisions). With no forces between molecules, there is no molecular potential energyâ€”PE is zero.\n- Step 2: Therefore, for an ideal gas, $$U = \\sum \\text{KE} = N \\times \\frac{3}{2}kT = \\frac{3}{2}NkT$$. Internal energy depends only on $$T$$ (and $$N$$). This is **not** true for real substances, where PE changes during phase transitions or compression.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_46", "judge_pick": false}, {"question": "A car tyre has gauge pressure $$2.5 \\times 10^5\\,\\text{Pa}$$ at $$15\\,آ°\\text{C}$$. After driving, the tyre is at $$45\\,آ°\\text{C}$$ with unchanged volume. Conceptually, does the gauge pressure increase or decrease, and roughly by what factor? (2 steps)", "answer": "- Step 1: Using the pressure law $$p \\propto T$$ (Kelvin), the absolute pressure scales as the ratio of absolute temperatures: $$T_1 = 15 + 273 = 288\\,\\text{K}$$; $$T_2 = 45 + 273 = 318\\,\\text{K}$$. The ratio is $$318/288 \\approx 1.10$$, so absolute pressure increases by about 10%.\n- Step 2: Gauge pressure = absolute pressure âˆ’ atmospheric pressure. Since absolute pressure increases by ~10% but atmospheric pressure stays the same, the gauge pressure increases by somewhat more than 10% (because the fixed subtraction of atmospheric pressure becomes a smaller fraction of the total). The key insight: always work with **absolute** pressure in gas-law calculations, then subtract atmospheric pressure at the end if you need gauge pressure.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_47", "judge_pick": false}, {"question": "You need to convert $$8.3 \\times 10^3\\,\\text{cm}^3$$ to $$\\text{m}^3$$ for use in $$pV = NkT$$. What is the conversion factor, and why does getting this wrong cause such large errors? (2 steps)", "answer": "- Step 1: $$1\\,\\text{cm}^3 = 10^{-6}\\,\\text{m}^3$$, so $$8.3 \\times 10^3\\,\\text{cm}^3 = 8.3 \\times 10^3 \\times 10^{-6}\\,\\text{m}^3 = 8.3 \\times 10^{-3}\\,\\text{m}^3$$. Also note: $$1\\,\\text{dm}^3 = 1\\,\\text{L} = 10^{-3}\\,\\text{m}^3$$.\n- Step 2: A volume error of a factor of $$10^6$$ (forgetting the $$\\text{cm}^3 \\to \\text{m}^3$$ conversion) propagates directly into the calculation of $$N$$ (number of molecules), making the answer off by $$10^6$$. Since $$N$$ is typically on the order of $$10^{23}$$â€“$$10^{25}$$, getting $$10^{29}$$ or $$10^{17}$$ is a clear sign of a unit error.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_48", "judge_pick": false}, {"question": "When a kettle boils water at $$100\\,آ°\\text{C}$$, why does it take much longer to boil away the water than to heat it from room temperature to $$100\\,آ°\\text{C}$$, even though the temperature change is larger? (3 steps)", "answer": "- Step 1: Heating water from (say) $$20\\,آ°\\text{C}$$ to $$100\\,آ°\\text{C}$$ requires $$\\Delta E = mc\\Delta\\theta$$. For 1 kg: $$1 \\times 4200 \\times 80 = 336\\,000\\,\\text{J} \\approx 336\\,\\text{kJ}$$.\n- Step 2: Boiling away 1 kg at $$100\\,آ°\\text{C}$$ requires $$\\Delta E = L_v \\Delta m = 2.26 \\times 10^6 \\times 1 = 2\\,260\\,000\\,\\text{J} = 2260\\,\\text{kJ}$$.\n- Step 3: The latent heat of vaporisation ($$2260\\,\\text{kJ}$$) is about 6â€“7 times larger than the sensible heat ($$336\\,\\text{kJ}$$). This is because boiling must completely overcome all intermolecular forces, while heating within the liquid phase only increases molecular vibration and translation. The boiling step dominates the energy budget.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_49", "judge_pick": true}, {"question": "A sample of ideal gas at $$300\\,\\text{K}$$ has rms speed $$500\\,\\text{m/s}$$. If the temperature is raised to $$1200\\,\\text{K}$$, what is the new rms speed? No calculator needed. (2 steps)", "answer": "- Step 1: Since $$c_{\\text{rms}} \\propto \\sqrt{T}$$, the ratio of rms speeds is $$c_2/c_1 = \\sqrt{T_2/T_1} = \\sqrt{1200/300} = \\sqrt{4} = 2$$.\n- Step 2: The new rms speed is $$2 \\times 500 = 1000\\,\\text{m/s}$$. Note: the temperature quadrupled, but the speed only doubled. If you had mistakenly assumed $$c_{\\text{rms}} \\propto T$$, you would have gotten $$2000\\,\\text{m/s}$$â€”which is wrong. KE would quadruple, which is correct since $$\\bar{E}_k \\propto T$$.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_50", "judge_pick": true}, {"question": "A syringe contains $$40\\,\\text{cm}^3$$ of air at atmospheric pressure ($$101\\,\\text{kPa}$$). The plunger is pushed in until the volume is $$25\\,\\text{cm}^3$$ at constant temperature. Without detailed calculation, determine whether the new pressure is above or below $$160\\,\\text{kPa}$$, and explain your reasoning. (2 steps)", "answer": "- Step 1: By Boyle's law, $$p_1 V_1 = p_2 V_2$$, so $$p_2 = p_1 V_1 / V_2 = 101 \\times 40/25$$. The ratio $$40/25 = 8/5 = 1.6$$, so $$p_2 = 101 \\times 1.6$$.\n- Step 2: Since $$101 \\times 1.6 = 161.6\\,\\text{kPa}$$, the new pressure is slightly above $$160\\,\\text{kPa}$$. Note that the volume units ($$\\text{cm}^3$$) cancel in the ratio, so you don't need to convert to $$\\text{m}^3$$â€”as long as both volumes are in the same unit.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_51", "judge_pick": false}, {"question": "You have $$0.20\\,\\text{kg}$$ of ice at $$-10\\,آ°\\text{C}$$. List the four distinct energy-calculation stages needed to convert it all to steam at $$100\\,آ°\\text{C}$$. (2 steps)", "answer": "- Step 1: The four stages are:\n+ **Stage 1:** Heat the ice from $$-10\\,آ°\\text{C}$$ to $$0\\,آ°\\text{C}$$ using $$\\Delta E = mc_{\\text{ice}}\\Delta\\theta$$.\n+ **Stage 2:** Melt the ice at $$0\\,آ°\\text{C}$$ using $$\\Delta E = L_f \\Delta m$$ (no temperature change).\n+ **Stage 3:** Heat the water from $$0\\,آ°\\text{C}$$ to $$100\\,آ°\\text{C}$$ using $$\\Delta E = mc_{\\text{water}}\\Delta\\theta$$.\n+ **Stage 4:** Boil the water at $$100\\,آ°\\text{C}$$ using $$\\Delta E = L_v \\Delta m$$ (no temperature change).\n- Step 2: The total energy is the sum of all four stages. A common mistake is to forget either Stage 2 or Stage 4 (the latent-heat steps), which would severely underestimate the total energy. Each stage uses a different formula and different constants.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_52", "judge_pick": false}, {"question": "Why is it physically impossible to cool a gas below absolute zero? (2 steps)", "answer": "- Step 1: Absolute zero is the temperature at which molecules have zero (minimum) kinetic energy. You cannot remove kinetic energy that isn't thereâ€”once all molecular motion has stopped, there is no more energy to extract.\n- Step 2: More formally, the average molecular KE is $$\\frac{3}{2}kT$$. At $$T = 0\\,\\text{K}$$, $$\\bar{E}_k = 0$$. Negative $$T$$ would imply negative KE, which is physically meaningless for translational kinetic energy ($$\\frac{1}{2}m\\langle c^2\\rangle \\geq 0$$ always). Hence, $$0\\,\\text{K}$$ is the absolute lower bound of the temperature scale.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_53", "judge_pick": false}, {"question": "In the kinetic theory derivation, why must we use the mean-square speed $$\\langle c^2 \\rangle$$ rather than the square of the mean speed $$\\langle c \\rangle^2$$? (2 steps)", "answer": "- Step 1: The force on the wall depends on $$v_x^2$$ (from $$F = mv_x^2/L$$), so when we average over all molecules, we need the **mean of the squares**: $$\\langle v_x^2 \\rangle$$. This is what appears naturally in the derivation.\n- Step 2: By Jensen's inequality, $$\\langle c^2 \\rangle \\geq \\langle c \\rangle^2$$â€”the mean of the squares is always greater than or equal to the square of the mean (with equality only if all speeds are identical). Using $$\\langle c \\rangle^2$$ would systematically underestimate the pressure. The rms speed $$c_{\\text{rms}} = \\sqrt{\\langle c^2 \\rangle}$$ is the correct measure for kinetic theory.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_54", "judge_pick": false}, {"question": "A student mixes up $$L_f$$ and $$L_v$$ when calculating the energy to boil water. If they use $$L_f = 334\\,\\text{kJ/kg}$$ instead of $$L_v = 2260\\,\\text{kJ/kg}$$, by roughly what factor is their answer wrong? (2 steps)", "answer": "- Step 1: The correct energy to vaporise mass $$\\Delta m$$ is $$\\Delta E = L_v \\Delta m = 2260\\,\\text{kJ/kg} \\times \\Delta m$$. The student uses $$\\Delta E = L_f \\Delta m = 334\\,\\text{kJ/kg} \\times \\Delta m$$.\n- Step 2: The ratio is $$2260/334 \\approx 6.8$$. The student's answer is about 7 times too small. An examiner would immediately spot this because the latent heat of vaporisation for water is roughly 7 times the latent heat of fusion. $$L_f$$ is for melting/freezing; $$L_v$$ is for boiling/condensingâ€”using the wrong one is a severe error.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_55", "judge_pick": true}, {"question": "Explain why the ideal-gas equation $$pV = nRT$$ can be derived from combining the three individual gas laws. (3 steps)", "answer": "- Step 1: Boyle's law: at constant $$T$$, $$p \\propto 1/V$$, i.e., $$pV = \\text{const}$$. Charles's law: at constant $$p$$, $$V \\propto T$$. Pressure law: at constant $$V$$, $$p \\propto T$$.\n- Step 2: Combining: $$p \\propto T/V$$ (from pressure law and Boyle's law), and also $$V \\propto T$$ at constant $$p$$ (Charles's law). The combined relationship is $$pV \\propto T$$ for a fixed mass of gas.\n- Step 3: Introducing the proportionality constant for $$n$$ moles of gas gives $$pV = nRT$$, where $$R$$ is the molar gas constant. For a fixed number of molecules $$N$$, we write $$pV = NkT$$. The three individual laws are special cases of this combined equation.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_56", "judge_pick": false}, {"question": "A fixed mass of ideal gas initially occupies $$0.025\\,\\text{m}^3$$ at $$300\\,\\text{K}$$ and $$1.0 \\times 10^5\\,\\text{Pa}$$. It is heated to $$450\\,\\text{K}$$ while the pressure is increased to $$1.5 \\times 10^5\\,\\text{Pa}$$. Without detailed calculation, does the volume increase, decrease, or stay the same? (2 steps)", "answer": "- Step 1: From the combined gas law, $$V_2 = V_1 \\times (p_1/p_2) \\times (T_2/T_1)$$. The temperature ratio is $$450/300 = 1.5$$, which would tend to increase volume. The pressure ratio is $$1.0/1.5 = 2/3$$, which would tend to decrease volume.\n- Step 2: The product of the ratios is $$1.5 \\times (2/3) = 1$$. The two effects exactly cancel, so the volume stays the same at $$0.025\\,\\text{m}^3$$. The pressure and temperature changes compensate perfectlyâ€”this is a neat conceptual check.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_57", "judge_pick": false}, {"question": "What is the relationship between the Boltzmann constant $$k$$, the molar gas constant $$R$$, and Avogadro's number $$N_A$$? Why do we need two different constants? (2 steps)", "answer": "- Step 1: $$k = R / N_A$$. Numerically: $$k = 8.31 / 6.02 \\times 10^{23} \\approx 1.38 \\times 10^{-23}\\,\\text{J K}^{-1}$$. The two constants describe the same physics at different scales: $$R$$ is per mole, $$k$$ is per molecule.\n- Step 2: We need both because sometimes we count gas by moles (using $$n$$ and $$R$$ in $$pV = nRT$$) and sometimes by individual molecules (using $$N$$ and $$k$$ in $$pV = NkT$$). The molecular version is essential in kinetic theory, where we reason about individual molecules. The molar version is convenient in chemistry and macroscopic problems.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_58", "judge_pick": false}, {"question": "Estimate the average translational KE of a gas molecule at room temperature ($$300\\,\\text{K}$$). Give the order of magnitude. (2 steps)", "answer": "- Step 1: $$\\bar{E}_k = \\frac{3}{2}kT = 1.5 \\times 1.38 \\times 10^{-23} \\times 300 \\approx 6.2 \\times 10^{-21}\\,\\text{J}$$.\n- Step 2: The order of magnitude is $$10^{-21}\\,\\text{J}$$ per molecule. This is an incredibly tiny energy on a human scale, but it is the typical KE of a single molecule. For context, the rms speed of a nitrogen molecule at $$300\\,\\text{K}$$ is about $$500\\,\\text{m/s}$$â€”faster than the speed of sound, which makes sense since sound propagates through molecular collisions.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_59", "judge_pick": false}, {"question": "Why does evaporation cause cooling of the remaining liquid? (2 steps)", "answer": "- Step 1: In any liquid at a given temperature, molecules have a range of speeds (the Maxwellâ€“Boltzmann distribution). Only the fastest moleculesâ€”those in the high-energy tailâ€”have enough KE to overcome intermolecular attractions at the surface and escape into the gas phase.\n- Step 2: When these high-energy molecules leave, the average KE of the remaining molecules decreases (you've removed the fastest ones). Since temperature is a measure of average KE, the temperature of the remaining liquid drops. This is why sweating cools you: the fastest water molecules evaporate, taking energy away from your skin.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_60", "judge_pick": true}, {"question": "On a heating curve for water, the boiling plateau is much longer (wider) than the melting plateau. Explain this in terms of what is happening at the molecular level. (2 steps)", "answer": "- Step 1: At the **melting plateau**, energy goes into partially breaking the latticeâ€”loosening the structure so molecules can slide past each other. The intermolecular forces are weakened but not eliminated; molecules in the liquid still attract each other strongly.\n- Step 2: At the **boiling plateau**, energy goes into completely separating molecules from each otherâ€”overcoming all remaining intermolecular attractions so molecules can move independently. This requires far more energy per molecule (roughly 7أ— for water), so more total energy must be supplied at the boiling plateau, making it wider on the energy axis.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_61", "judge_pick": true}, {"question": "What does a $$p$$â€“$$V$$ graph for a real gas look like compared to an ideal gas at high pressures, and why? (2 steps)", "answer": "- Step 1: At low pressures, the real-gas $$pV$$ product is close to the ideal value $$nRT$$, and the $$p$$â€“$$V$$ curve is nearly hyperbolic. At **high pressures**, the real-gas curve deviates from the ideal hyperbola.\n- Step 2: Two effects cause deviation: (a) At high pressure, molecules are forced close together, and **attractive intermolecular forces** pull molecules away from the walls, reducing the pressure compared to idealâ€”so the real-gas curve sits slightly **below** the ideal curve. (b) At very high pressures, the **finite volume of molecules** becomes significant, reducing the available space and increasing pressure above the ideal predictionâ€”so the curve eventually sits **above** the ideal curve. The dominant effect depends on the pressure regime.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_62", "judge_pick": false}, {"question": "A kettle supplies $$2.4\\,\\text{kW}$$ of power to $$1.5\\,\\text{kg}$$ of water already at $$100\\,آ°\\text{C}$$. Conceptually, to boil away $$0.30\\,\\text{kg}$$ of the water, what formula do you use, and roughly how many seconds should it take? (3 steps)", "answer": "- Step 1: The water is already at the boiling point, so we only need the latent heat of vaporisation. Use $$\\Delta E = L_v \\Delta m = 2.26 \\times 10^6 \\times 0.30 = 678\\,000\\,\\text{J}$$.\n- Step 2: Power $$P = \\Delta E / t$$, so $$t = \\Delta E / P = 678\\,000 / 2400 \\approx 283\\,\\text{s}$$.\n- Step 3: This is about 4.7 minutes. Notice: we did **not** use $$\\Delta E = mc\\Delta\\theta$$ because there is no temperature change during boiling. The energy goes entirely into breaking bonds (PE), not into KE.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_63", "judge_pick": false}, {"question": "Helium atoms have $$c_{\\text{rms}} = 720\\,\\text{m/s}$$ at $$45\\,آ°\\text{C}$$. If the temperature rises to $$80\\,آ°\\text{C}$$, does the rms speed increase by a large amount or a tiny amount? Explain using the relationship between $$c_{\\text{rms}}$$ and $$T$$. (2 steps)", "answer": "- Step 1: Since $$c_{\\text{rms}} \\propto \\sqrt{T}$$, the ratio of speeds is $$c_2/c_1 = \\sqrt{T_2/T_1}$$. In Kelvin: $$T_1 = 45 + 273 = 318\\,\\text{K}$$; $$T_2 = 80 + 273 = 353\\,\\text{K}$$. The ratio is $$\\sqrt{353/318} \\approx \\sqrt{1.11} \\approx 1.054$$.\n- Step 2: The rms speed increases by only about 5.4%â€”from 720 to about 759 m/s. This is a small change because the Kelvin temperature only increased by about 11% (from 318 to 353 K), and the square root of 1.11 is only 1.05. The rms speed is **insensitive** to moderate temperature changes because of the square-root relationship.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_64", "judge_pick": true}, {"question": "Why is it important that the Boyle's law experiment uses a **sealed** system (pinch clip on the syringe tube)? (2 steps)", "answer": "- Step 1: Boyle's law applies to a **fixed mass** of gas. If the system weren't sealed, gas could escape or enter when the plunger moves, changing the number of molecules $$N$$. The law $$pV = \\text{constant}$$ would no longer hold because the constant depends on $$N$$.\n- Step 2: With the pinch clip sealing the system, the number of molecules is fixed. When you push the plunger in, you reduce $$V$$ and increase $$p$$, but $$N$$ stays the same. This ensures that any change in $$p$$ is due solely to the change in $$V$$, not to a change in the amount of gasâ€”allowing you to verify Boyle's law.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_65", "judge_pick": false}, {"question": "A student says \"The molecules of an ideal gas are point particles with no size.\" Is this exactly right, or does it need refinement? (2 steps)", "answer": "- Step 1: The precise assumption is that molecules occupy **negligible volume compared to the volume of the container**. They are not literally zero-sized \"point particles\"â€”they have some diameter, but that diameter is so small relative to the container dimensions that it can be ignored.\n- Step 2: If molecules were truly zero-sized, they could never collide with each other (zero cross-section). The assumption is really about the **total molecular volume** being negligible compared to $$V$$, not about individual molecules having exactly zero size. At very high pressures, molecular volume becomes significant and the ideal-gas model breaks down.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_66", "judge_pick": true}, {"question": "During the cooling of a substance (e.g., water vapour cooling to ice), describe the shape of the cooling curve and what the plateaus represent. (2 steps)", "answer": "- Step 1: The cooling curve is a **mirror image** of the heating curve. Temperature falls as the gas cools, then plateaus at the condensation point (gas â†’ liquid), falls again as the liquid cools, then plateaus at the freezing point (liquid â†’ solid), and finally falls as the solid continues cooling.\n- Step 2: At each plateau, the substance is changing state. Energy is being **released** (not absorbed): bonds are forming, so PE decreases. The temperature stays constant because the released PE does not change the KE of the molecules. Condensation releases $$L_v$$ per kg; freezing releases $$L_f$$ per kg.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_67", "judge_pick": false}, {"question": "Explain the physical meaning of each side of the equation $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$. What does it connect? (2 steps)", "answer": "- Step 1: The left-hand side, $$\\frac{1}{2}m\\langle c^2\\rangle$$, is the **average translational kinetic energy of one molecule**â€”a purely microscopic quantity derived from molecular speeds.\n- Step 2: The right-hand side, $$\\frac{3}{2}kT$$, is expressed in terms of the **macroscopic** temperature $$T$$ and the universal constant $$k$$. This equation is the bridge between microscopic molecular motion and macroscopic thermodynamics. It tells us that temperature is fundamentally a measure of molecular kinetic energy, and that this relationship is universalâ€”it applies to any ideal gas regardless of molecular identity.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_68", "judge_pick": true}, {"question": "If you plot a pressure vs. temperature graph for a gas and extrapolate the line to find where $$p = 0$$, what have you experimentally determined? (2 steps)", "answer": "- Step 1: Since $$p \\propto T$$ (in Kelvin) for a fixed volume of gas, extrapolating the straight line to $$p = 0$$ gives the temperature at which molecular motion ceasesâ€”this is **absolute zero**.\n- Step 2: On a Celsius axis, this intercept falls at approximately $$-273\\,آ°\\text{C}$$. On a Kelvin axis, it falls at $$0\\,\\text{K}$$. This experimental method was historically used to determine the value of absolute zero before it was known theoretically. It works because zero pressure means zero molecular collisions with the walls, which means zero molecular KE.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_69", "judge_pick": false}, {"question": "A gas is in a container at pressure $$p$$ and volume $$V$$. If the number of molecules is doubled while keeping temperature and volume constant, what happens to the pressure, and why? (2 steps)", "answer": "- Step 1: From $$pV = NkT$$, if $$N$$ doubles while $$V$$ and $$T$$ stay constant, then $$p$$ must double. There are twice as many molecules colliding with the walls, so twice the force per unit area.\n- Step 2: Microscopically, each molecule still has the same average KE (same $$T$$), so each collision transfers the same momentum. But there are twice as many molecules, so twice as many collisions per unit time, giving twice the pressure. This is why the gas laws specify \"fixed mass\"â€”changing $$N$$ changes the proportionality constant.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_70", "judge_pick": true}, {"question": "When answering an exam question that says \"Explain why the temperature remains constant during melting,\" what three key phrases should you include to secure full marks? (3 steps)", "answer": "- Step 1: \"Energy goes into **breaking bonds / overcoming intermolecular forces**\" â€” this identifies where the energy goes.\n- Step 2: \"**Potential energy** increases, **kinetic energy** stays the same\" â€” this specifies which component of internal energy changes.\n- Step 3: \"**Temperature remains constant** during a change of state\" â€” this links back to the question. Temperature measures average KE, and since KE is unchanged, temperature is unchanged. All three points are commonly credited by examiners.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_71", "judge_pick": true}, {"question": "A student writes \"The average speed of the molecules is $$\\sqrt{3kT/m}$$.\" Why might an examiner deduct marks for this phrasing? (2 steps)", "answer": "- Step 1: The quantity $$\\sqrt{3kT/m}$$ is the **root-mean-square speed** $$c_{\\text{rms}}$$, not the average speed $$\\langle c \\rangle$$. These are different quantities: $$c_{\\text{rms}} = \\sqrt{\\langle c^2 \\rangle}$$, while the mean speed is $$\\langle c \\rangle = \\frac{1}{N}\\sum c_i$$.\n- Step 2: For a Maxwellâ€“Boltzmann distribution, $$c_{\\text{rms}} > \\langle c \\rangle$$. Using \"average speed\" when you mean \"rms speed\" is imprecise. Examiners want you to say \"root-mean-square speed\" or \"rms speed.\" Similarly, saying \"mean speed\" when you mean \"mean-square speed\" $$\\langle c^2 \\rangle$$ would also lose marks.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_72", "judge_pick": true}, {"question": "Quick conceptual exercise: A $$2\\,\\text{kg}$$ block of a mystery material requires $$8000\\,\\text{J}$$ to warm from $$20\\,آ°\\text{C}$$ to $$30\\,آ°\\text{C}$$. What is its specific heat capacity? (2 steps)", "answer": "- Step 1: Use $$\\Delta E = mc\\Delta\\theta$$. Rearrange: $$c = \\Delta E / (m\\Delta\\theta) = 8000 / (2 \\times 10) = 8000/20 = 400\\,\\text{J kg}^{-1}\\text{K}^{-1}$$.\n- Step 2: This is much less than water's $$4200\\,\\text{J kg}^{-1}\\text{K}^{-1}$$, meaning the mystery material heats up much more easily than waterâ€”less energy is needed per kg per kelvin. Materials with low $$c$$ (like metals, typically a few hundred) are good conductors that change temperature quickly.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_73", "judge_pick": false}, {"question": "Quick conceptual exercise: Melting $$0.5\\,\\text{kg}$$ of ice at $$0\\,آ°\\text{C}$$ requires $$167\\,\\text{kJ}$$. What is the specific latent heat of fusion? (2 steps)", "answer": "- Step 1: Use $$\\Delta E = L_f \\Delta m$$. Rearrange: $$L_f = \\Delta E / \\Delta m = 167\\,000 / 0.5 = 334\\,000\\,\\text{J kg}^{-1} = 334\\,\\text{kJ kg}^{-1}$$.\n- Step 2: Note that the temperature stays at $$0\\,آ°\\text{C}$$ throughout. All the energy goes into breaking the lattice bonds (increasing PE), not into raising KE. If you had mistakenly used $$\\Delta E = mc\\Delta\\theta$$, you'd get $$\\Delta E = 0$$ since $$\\Delta\\theta = 0$$, which contradicts the $$167\\,\\text{kJ}$$ supplied.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_74", "judge_pick": false}, {"question": "Quick conceptual exercise: Gas A has molar mass $$4\\,\\text{g/mol}$$ and gas B has molar mass $$64\\,\\text{g/mol}$$. At the same temperature, which has the higher rms speed, and by roughly what factor? (2 steps)", "answer": "- Step 1: Since $$c_{\\text{rms}} = \\sqrt{3RT/M}$$, the rms speed is inversely proportional to the square root of the molar mass: $$c_{\\text{rms}} \\propto 1/\\sqrt{M}$$. Gas B is 16 times heavier than gas A ($$64/4 = 16$$).\n- Step 2: The ratio of rms speeds is $$c_A/c_B = \\sqrt{M_B/M_A} = \\sqrt{64/4} = \\sqrt{16} = 4$$. Gas A (lighter) has 4 times the rms speed of gas B. Both have the same average KE (same temperature), but the lighter molecules must move faster to have the same KE: $$\\frac{1}{2}m_A c_A^2 = \\frac{1}{2}m_B c_B^2$$.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_75", "judge_pick": false}, {"question": "Why is water's behaviour unusual when it freezes? How does this differ from almost every other substance? (2 steps)", "answer": "- Step 1: Water **expands** when it freezesâ€”its solid form (ice) is less dense than its liquid form. Almost every other substance **contracts** upon freezing, making the solid denser than the liquid.\n- Step 2: This occurs because of water's hydrogen-bonded lattice structure: as ice forms, the molecules arrange into an open hexagonal lattice with more empty space than the liquid. This is why ice floats on water (and why pipes burst when they freeze). In the particle-arrangement table, water is the notable exception where the solid is slightly more spread out than the liquid.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_76", "judge_pick": true}, {"question": "Explain the conceptual difference between \"heat\" and \"internal energy.\" (2 steps)", "answer": "- Step 1: **Internal energy** ($$U$$) is a property of the systemâ€”it is the total KE + PE of all molecules at a given instant. It is a state variable: its value depends only on the current state, not how the system got there.\n- Step 2: **Heat** is energy in transitâ€”it is the energy transferred between a system and its surroundings due to a temperature difference. You cannot say \"a system contains heat\"; you say \"heat flows into the system.\" Adding heat increases $$U$$; doing work also increases $$U$$. The first law of thermodynamics captures this: $$\\Delta U = Q - W$$, where $$Q$$ is heat added and $$W$$ is work done by the system.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_77", "judge_pick": false}, {"question": "A student argues: \"If I compress a gas quickly so no heat escapes, the temperature should stay the same because no heat was added.\" Is this correct? Explain using the first law of thermodynamics concept. (2 steps)", "answer": "- Step 1: This is **incorrect**. Compressing the gas means **doing work on the gas** (the piston pushes the molecules, giving them more KE). Even though no heat ($$Q$$) is exchanged, the work done on the gas increases its internal energy.\n- Step 2: From the first law $$\\Delta U = Q - W$$: with $$Q = 0$$ (no heat exchange) and negative $$W$$ (work done **on** the gas, not by it), $$\\Delta U > 0$$. The internal energy increases, so the temperature rises. This is an adiabatic compressionâ€”temperature increases even without heat transfer, because the work done on the gas converts to KE.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_78", "judge_pick": false}, {"question": "Summarise the entire topic in one logical chain: from molecular motion â†’ pressure â†’ temperature â†’ gas laws â†’ kinetic theory. (4 steps)", "answer": "- Step 1: Molecules in a gas move randomly at high speed. When they collide with a container wall, each collision transfers momentum $$2mv_x$$ to the wall, producing a force. Summed over all molecules, this gives pressure $$p = \\frac{1}{3}Nm\\langle c^2\\rangle / V$$.\n- Step 2: The average KE of a molecule is $$\\frac{1}{2}m\\langle c^2\\rangle$$, which we define as proportional to temperature: $$\\bar{E}_k = \\frac{3}{2}kT$$. Temperature is the macroscopic manifestation of microscopic molecular KE.\n- Step 3: Since $$\\bar{E}_k \\propto T$$, faster molecules mean higher $$T$$. Faster molecules also hit walls more often and harder, giving higher $$p$$. This yields the pressure law $$p \\propto T$$ (at constant $$V$$). Similar reasoning gives Boyle's law and Charles's law.\n- Step 4: Combining the three gas laws gives $$pV = NkT$$. Equating this with the kinetic-theory result $$pV = \\frac{1}{3}Nm\\langle c^2\\rangle$$ yields $$\\frac{1}{2}m\\langle c^2\\rangle = \\frac{3}{2}kT$$â€”the fundamental link between microscopic motion and macroscopic temperature. The entire edifice is self-consistent.", "source": "GLM 5.1 â‘¢", "_id": "glm_3_79", "judge_pick": false}], "count": 80}, "qwen_1": {"label": "Qwen 3 â‘ ", "cards": [{"question": "Compare solids, liquids, and gases in terms of particle arrangement, intermolecular bonds, and motion. (3 steps)", "answer": "- Step 1: **Arrangement** - Solids have close, regular patterns; liquids have close, irregular patterns; gases have particles far apart.\n- Step 2: **Bonds** - Solids have strong intermolecular bonds; liquids have medium bonds; gases have very weak bonds.\n- Step 3: **Motion** - Solid particles vibrate about fixed positions; liquid particles slide over one another; gas particles move fast in random motion.\n\n[Optional: one-sentence takeaway: The differences in particle arrangement and motion explain the distinct properties of the three states of matter.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_0", "judge_pick": false}, {"question": "What is internal energy, and what factors contribute to it? (3 steps)", "answer": "- Step 1: **Definition** - Internal energy (U) is the sum of the kinetic and potential energies of all the molecules in a substance.\n- Step 2: **Kinetic energy contribution** - This comes from the motion of particles (translation, rotation, vibration).\n- Step 3: **Potential energy contribution** - This comes from the intermolecular forces between particles.\n\n[Optional: one-sentence takeaway: Internal energy is a measure of all the energy stored in a system at the molecular level.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How is temperature related to the kinetic energy of particles in a substance?", "answer": "Temperature is a measure of the average kinetic energy of the molecules in a substance. It does not depend on the potential energy of the system.", "source": "Qwen 3 â‘ ", "_id": "qwen_1_2", "judge_pick": true}, {"question": "Why does the temperature remain constant during a phase change?", "answer": "- Step 1: During a phase change, energy supplied or removed is used to break or form intermolecular bonds.\n- Step 2: This energy goes into changing the potential energy of the system, not the kinetic energy.\n- Step 3: Since temperature is a measure of average kinetic energy, it remains constant during the phase change.\n\n[Optional: one-sentence takeaway: The constant temperature during phase changes reflects that the energy is changing the potential, not kinetic, energy component of internal energy.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_3", "judge_pick": false}, {"question": "What is specific heat capacity, and how is it used to calculate energy changes?", "answer": "Specific heat capacity is the energy required to raise the temperature of 1 kg of a substance by 1 K. It's used in the formula:\n$$ خ”E = mcخ”خ¸ $$\nwhere $ m $ is mass, $ c $ is specific heat capacity, and $ خ”خ¸ $ is the temperature change.", "source": "Qwen 3 â‘ ", "_id": "qwen_1_4", "judge_pick": false}, {"question": "What is specific latent heat, and how does it differ for fusion and vaporization?", "answer": "- Step 1: Specific latent heat is the energy required to change the state of 1 kg of a substance without changing its temperature.\n- Step 2: Specific latent heat of fusion is for solid-liquid transitions (melting/freezing).\n- Step 3: Specific latent heat of vaporization is for liquid-gas transitions (boiling/condensing), and it's typically much larger because more energy is needed to completely separate molecules.\n\n[Optional: one-sentence takeaway: Latent heat is \"hidden\" heat that changes the potential energy of molecules during phase changes.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What are the three gas laws and their mathematical expressions?", "answer": "- Step 1: **Boyle's Law** - $ p_1V_1 = p_2V_2 $ (constant temperature and amount of gas)\n- Step 2: **Charles's Law** - $ V_1/T_1 = V_2/T_2 $ (constant pressure and amount of gas)\n- Step 3: **Pressure Law** - $ p_1/T_1 = p_2/T_2 $ (constant volume and amount of gas)\n\n[Optional: one-sentence takeaway: These laws describe how pressure, volume, and temperature are interrelated for an ideal gas.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_6", "judge_pick": false}, {"question": "What is the ideal gas equation, and what do the symbols represent?", "answer": "The ideal gas equation is:\n$$ pV = nRT = NkT $$\nwhere:\n- $ p $ = pressure in pascals (Pa)\n- $ V $ = volume in cubic meters (mآ³)\n- $ n $ = number of moles\n- $ R $ = molar gas constant (8.31 Jآ·molâپ»آ¹آ·Kâپ»آ¹)\n- $ T $ = absolute temperature in kelvin (K)\n- $ N $ = number of molecules\n- $ k $ = Boltzmann constant (1.38 أ— 10âپ»آ²آ³ Jآ·Kâپ»آ¹)", "source": "Qwen 3 â‘ ", "_id": "qwen_1_7", "judge_pick": false}, {"question": "What are the key assumptions of the kinetic theory of gases?", "answer": "- Step 1: Molecules occupy negligible volume compared to the container.\n- Step 2: Intermolecular forces are negligible except during collisions.\n- Step 3: Collisions are perfectly elastic, and molecular motion is random.\n- Step 4: There are a very large number of molecules, and the duration of collisions is negligible.\n\n[Optional: one-sentence takeaway: These assumptions allow us to model gas behavior mathematically, though real gases deviate at high pressures and low temperatures.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Derive the kinetic theory equation $ pV = \\frac{1}{3}Nm\\overline{c^2} $ (3 steps)", "answer": "- Step 1: Consider one molecule with mass $ m $ and velocity $ v_x $ in a cube of side $ L $. On collision with a wall, its momentum change is $ 2mv_x $.\n- Step 2: The time between collisions with the same wall is $ 2L/v_x $, so the force on the wall is $ mv_x^2/L $. For $ N $ molecules, we average over all $ v_x $.\n- Step 3: Using isotropy ($ \\overline{v_x^2} = \\frac{1}{3}\\overline{c^2} $), we get $ p = \\frac{1}{3}Nm\\overline{c^2}/V $, or $ pV = \\frac{1}{3}Nm\\overline{c^2} $.\n\n[Optional: one-sentence takeaway: This derivation connects macroscopic pressure to microscopic molecular motion.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Show that the average molecular kinetic energy is $ \\frac{3}{2}kT $ (3 steps)", "answer": "- Step 1: Set the kinetic theory equation $ pV = \\frac{1}{3}Nm\\overline{c^2} $ equal to the ideal gas equation $ pV = NkT $.\n- Step 2: Cancel $ N $ to get $ \\frac{1}{3}m\\overline{c^2} = kT $, then multiply both sides by $ \\frac{3}{2} $.\n- Step 3: The left side becomes the average translational kinetic energy: $ \\frac{1}{2}m\\overline{c^2} = \\frac{3}{2}kT $.\n\n[Optional: one-sentence takeaway: This shows the direct proportionality between molecular kinetic energy and absolute temperature.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_10", "judge_pick": false}, {"question": "What is root-mean-square (rms) speed, and how is it calculated?", "answer": "Root-mean-square speed is the square root of the mean square speed:\n$$ c_{\\text{rms}} = \\sqrt{\\overline{c^2}} = \\sqrt{\\frac{3kT}{m}} = \\sqrt{\\frac{3RT}{M}} $$\nwhere $ m $ is the mass of one molecule and $ M $ is the molar mass.\n\n[Optional: one-sentence takeaway: The rms speed gives a measure of the typical speed of gas molecules, which increases with square root of temperature.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Why is the Kelvin scale preferred over Celsius in gas law calculations?", "answer": "- Step 1: The Kelvin scale is anchored at absolute zero, the lowest possible temperature where molecules have minimum kinetic energy.\n- Step 2: This makes it a proportional scale where doubling the temperature in Kelvin actually doubles the average molecular kinetic energy.\n- Step 3: Using Celsius could lead to negative temperatures and nonsensical predictions in gas laws.\n\n[Optional: one-sentence takeaway: The Kelvin scale is essential for gas law calculations because it's directly proportional to molecular kinetic energy.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_12", "judge_pick": false}, {"question": "Describe a heating curve for water, including what happens at the melting and boiling points. (3 steps)", "answer": "- Step 1: Heating ice below 0آ°C raises the temperature linearly as kinetic energy increases.\n- Step 2: At 0آ°C, the temperature plateaus as energy goes into breaking bonds (melting), increasing potential energy.\n- Step 3: At 100آ°C, another plateau occurs as energy is used to completely separate molecules (boiling), again increasing potential energy.\n\n[Optional: one-sentence takeaway: The plateaus on a heating curve represent phase changes where energy goes into changing potential, not kinetic, energy.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Calculate the energy required to convert 0.20 kg of ice at -10آ°C to steam at 100آ°C. Use $ c_{\\text{ice}} = 2100 \\, \\text{Jآ·kg}^{-1}آ·\\text{K}^{-1} $, $ c_{\\text{water}} = 4200 \\, \\text{Jآ·kg}^{-1}آ·\\text{K}^{-1} $, $ L_f = 334 \\, \\text{kJآ·kg}^{-1} $, and $ L_v = 2.26 \\, \\text{MJآ·kg}^{-1} $. (4 steps)", "answer": "- Step 1: Heat ice from -10آ°C to 0آ°C: $ E_1 = 0.20 \\times 2100 \\times 10 = 4200 \\, \\text{J} $\n- Step 2: Melt the ice: $ E_2 = 0.20 \\times 334000 = 66800 \\, \\text{J} $\n- Step 3: Heat water from 0آ°C to 100آ°C: $ E_3 = 0.20 \\times 4200 \\times 100 = 84000 \\, \\text{J} $\n- Step 4: Boil the water: $ E_4 = 0.20 \\times 2260000 = 452000 \\, \\text{J} $\nTotal energy: $ E_{\\text{total}} = 607000 \\, \\text{J} â‰ˆ 607 \\, \\text{kJ} $\n\n[Optional: one-sentence takeaway: The energy required for phase changes (especially boiling) dwarfs the energy needed for heating.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_14", "judge_pick": true}, {"question": "What are the key differences between evaporation and boiling? (2 steps)", "answer": "- Step 1: **Location** - Evaporation occurs at the surface of a liquid at any temperature, while boiling occurs throughout the liquid at a fixed temperature (boiling point).\n- Step 2: **Energy requirement** - Evaporation can occur at any temperature as high-energy molecules escape, while boiling requires reaching the vapor pressure equal to atmospheric pressure.\n\n[Optional: one-sentence takeaway: Evaporation is a surface phenomenon that can occur at any temperature, while boiling is a bulk phenomenon at a specific temperature.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_15", "judge_pick": false}, {"question": "Explain why real gases deviate from ideal gas behavior at high pressures and low temperatures.", "answer": "- Step 1: At high pressures, molecules are close together, so their volume is no longer negligible compared to the container volume.\n- Step 2: At low temperatures, molecular speeds decrease, making intermolecular forces more significant.\n- Step 3: These conditions violate key assumptions of the kinetic theory, causing deviations from ideal behavior.\n\n[Optional: one-sentence takeaway: Real gases approach ideal behavior at low pressures and high temperatures where molecules are far apart and move fast.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_16", "judge_pick": false}, {"question": "What are the key misconceptions about states of matter that students often have? (3 steps)", "answer": "- Step 1: **Misconception**: Solid particles are stationary.\n- Step 2: **Misconception**: Gas â†’ liquid is called \"cooling\" rather than condensation.\n- Step 3: **Misconception**: Temperature must rise when heat is supplied, which is not true during phase changes.\n\n[Optional: one-sentence takeaway: Understanding the motion of particles in different states and during phase changes is crucial for mastering this topic.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_17", "judge_pick": false}, {"question": "Explain the three \"F's\" of why pressure increases when a fixed volume of gas is heated. (3 steps)", "answer": "- Step 1: **Faster** - Molecules move faster as temperature increases, increasing their kinetic energy.\n- Step 2: **More frequently** - Faster molecules hit the container walls more frequently.\n- Step 3: **More force** - Each collision transfers more momentum to the wall, increasing the force per impact.\n\n[Optional: one-sentence takeaway: The combination of faster molecules, more frequent collisions, and more forceful impacts explains the pressure increase with temperature.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_18", "judge_pick": false}, {"question": "Why is the average velocity of gas molecules zero, but the average speed and root-mean-square speed are not?", "answer": "- Step 1: The average velocity is zero because molecules move in all directions equally, canceling out.\n- Step 2: The average speed is the mean of the magnitudes of velocities, which is always positive.\n- Step 3: The root-mean-square speed accounts for both the magnitude and the distribution of speeds, making it a better measure of the typical molecular speed.\n\n[Optional: one-sentence takeaway: The directional nature of velocity leads to a zero average, while speed and rms speed provide meaningful measures of molecular motion.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_19", "judge_pick": true}, {"question": "What are the common unit conversions needed for this topic? (4 steps)", "answer": "- Step 1: $ 1 \\, \\text{cm}^3 = 1 \\times 10^{-6} \\, \\text{m}^3 $\n- Step 2: $ 1 \\, \\text{dm}^3 = 1 \\, \\text{L} = 1 \\times 10^{-3} \\, \\text{m}^3 $\n- Step 3: $ 1 \\, \\text{kPa} = 1 \\times 10^3 \\, \\text{Pa} $, $ 1 \\, \\text{MPa} = 1 \\times 10^6 \\, \\text{Pa} $\n- Step 4: $ 1 \\, \\text{kJ} = 1 \\times 10^3 \\, \\text{J} $, $ 1 \\, \\text{MJ} = 1 \\times 10^6 \\, \\text{J} $\n\n[Optional: one-sentence takeaway: Proper unit conversion is essential for accurate calculations in thermal physics.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_20", "judge_pick": false}, {"question": "Describe the experimental setup for Boyle's law (Core Practical 14) and what data is collected.", "answer": "- Step 1: A sealed syringe contains trapped gas, with a plunger loaded with successive masses.\n- Step 2: Volume (V) is read from the syringe scale as pressure is changed.\n- Step 3: Pressure (p) is calculated from atmospheric pressure plus (or minus) $ mg/A $ from the masses, with A the syringe cross-section.\n- Step 4: The experiment is done slowly to ensure constant temperature (isothermal).\n\n[Optional: one-sentence takeaway: Boyle's law experiment demonstrates the inverse relationship between pressure and volume for a fixed mass of gas at constant temperature.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_21", "judge_pick": false}, {"question": "What are the significant figures and unit rules to follow in this topic?", "answer": "- Step 1: Default to 2-3 significant figures unless specified otherwise.\n- Step 2: Carry one extra figure through intermediate working and round at the end.\n- Step 3: Always quote units (J, Pa, mآ³, K) on the final answer.\n- Step 4: Copy constants like R, k, and NA from the data booklet to the precision given.\n\n[Optional: one-sentence takeaway: Attention to significant figures and units is crucial for accuracy and clarity in thermal physics calculations.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_22", "judge_pick": false}, {"question": "What are the key exam command words and what do they expect? (3 steps)", "answer": "- Step 1: **State** - A single fact without working or reasoning.\n- Step 2: **Define** - A precise statement of a quantity, often including per unit phrasing.\n- Step 3: **Explain, Calculate, Show** - Require working, reasoning, and application of formulas and concepts.\n\n[Optional: one-sentence takeaway: Understanding exam command words is essential for knowing exactly what is expected in the response.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_23", "judge_pick": false}, {"question": "What are the key definitions to memorize verbatim for this topic?", "answer": "- Step 1: **Internal energy**: The sum of the kinetic and potential energies of all the molecules in a given mass of a substance.\n- Step 2: **Temperature**: A measure of the average kinetic energy of the molecules.\n- Step 3: **Absolute zero**: The lowest possible temperature (0K or -273.15آ°C), where molecules have minimum kinetic energy.\n- Step 4: **Specific heat capacity**: The energy required to raise the temperature of 1 kg of a substance by 1 K.\n- Step 5: **Specific latent heat of fusion**: The thermal energy required to convert 1 kg of solid to liquid at constant temperature.\n- Step 6: **Specific latent heat of vaporization**: The thermal energy required to convert 1 kg of liquid to gas at constant temperature.\n\n[Optional: one-sentence takeaway: These precise definitions are crucial for scoring full marks in exam questions.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_24", "judge_pick": false}, {"question": "Why is the heating curve for water an important concept in this topic?", "answer": "- Step 1: The heating curve shows how temperature changes (or remains constant) as energy is added.\n- Step 2: Plateaus represent phase changes where energy goes into breaking (or forming) intermolecular bonds.\n- Step 3: The curve provides a visual representation of the concepts of specific heat capacity and latent heat.\n\n[Optional: one-sentence takeaway: The heating curve integrates multiple concepts including energy transfer, phase changes, and the distinction between kinetic and potential energy changes.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_25", "judge_pick": false}, {"question": "What are the key factors that affect specific heat capacity?", "answer": "- Step 1: **Molecular structure** - The number of degrees of freedom (translational, rotational, vibrational) affects energy storage.\n- Step 2: **Intermolecular forces** - Stronger forces, like hydrogen bonding in water, require more energy to raise temperature.\n- Step 3: **Molecular mass** - Lighter molecules can move faster at the same temperature, affecting heat capacity.\n\n[Optional: one-sentence takeaway: Specific heat capacity is determined by how molecules store energy and interact, which varies between substances.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_26", "judge_pick": false}, {"question": "How does the kinetic theory explain the pressure exerted by a gas?", "answer": "- Step 1: Gas molecules are in constant random motion, colliding with each other and the container walls.\n- Step 2: These collisions are perfectly elastic, transferring momentum to the walls.\n- Step 3: The force exerted by these collisions over the area of the container creates pressure, as described by $ pV = \\frac{1}{3}Nm\\overline{c^2} $.\n\n[Optional: one-sentence takeaway: The kinetic theory connects the microscopic behavior of gas molecules to the macroscopic property of pressure.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_27", "judge_pick": false}, {"question": "Why is the Kelvin scale absolute, while the Celsius scale is not?", "answer": "- Step 1: The Kelvin scale is absolute because it starts at absolute zero, the theoretical lowest possible temperature.\n- Step 2: The Celsius scale has arbitrary reference points (0آ°C for ice melting, 100آ°C for boiling water).\n- Step 3: Do
