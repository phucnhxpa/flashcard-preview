kes' law:** For a sphere falling at low (laminar) speeds, viscous drag = 6د€خ·rv, where خ· is the fluid viscosity.\n- **At terminal velocity:** Net force = 0, so:\n+ Weight âˆ’ Upthrust âˆ’ Viscous drag = 0\n+ mg âˆ’ دپ_fluidVg âˆ’ 6د€خ·rv_term = 0\n- **Terminal velocity is determined by:** the balance between driving force (weight minus upthrust) and the viscous drag force. Larger/heavier objects reach higher terminal velocities; higher viscosity fluids produce lower terminal velocities.\n\n**Takeaway:** Stokes' law only applies at low speeds where flow is laminar (not turbulent). At high speeds, drag becomes proportional to vآ² instead.", "source": "MiniMax â‘،", "_id": "minimax_2_26", "judge_pick": false}, {"question": "A student says \"the temperature must rise when you supply heat.\" Explain why this is not always true, using the concept of phase changes.", "answer": "- This statement is **false** during a phase change.\n- When heating a substance undergoing a phase change (e.g., melting ice at 0آ°C or boiling water at 100آ°C), the **temperature stays constant** even though energy is being supplied continuously.\n- The reason: Energy supplied goes into **breaking intermolecular bonds** (increasing potential energy), not into increasing molecular kinetic energy. Since temperature measures only average KE, it doesn't change.\n- This is why the heating curve has flat plateaus at the melting and boiling points â€” constant temperature despite energy input.\n\n**Takeaway:** Temperature only rises when energy increases kinetic energy. During phase changes, energy increases potential energy instead.", "source": "MiniMax â‘،", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A student claims \"doubling the temperature (in Kelvin) doubles the rms speed of gas molecules.\" Is this correct? If not, what is the correct relationship?", "answer": "- **Incorrect.** The correct relationship is: **c_rms âˆ‌ âˆڑT** (rms speed proportional to the square root of absolute temperature).\n- From E_k = (1/2)m(c_rms)آ² = (3/2)kT, we get c_rms = âˆڑ(3kT/m). So c_rmsآ² âˆ‌ T, not c_rms âˆ‌ T.\n- If you double T (in K), then c_rms increases by factor of âˆڑ2 â‰ˆ 1.41, not 2.\n- The confusion arises because doubling T **does** double the average KE, but KE is proportional to speed squared, not speed itself.\n\n**Takeaway:** Remember: c_rms âˆ‌ âˆڑT. The key phrase to recall: \"Doubling T multiplies c_rms by âˆڑ2, not by 2.\"", "source": "MiniMax â‘،", "_id": "minimax_2_28", "judge_pick": true}, {"question": "Explain why water has a much higher specific latent heat of vaporisation (L_v) than its specific latent heat of fusion (L_f). What do these values tell us about the intermolecular forces in each phase?", "answer": "- **Values:** L_f â‰ˆ 334 kJ/kg; L_v â‰ˆ 2.26 MJ/kg â€” L_v is about **7 times larger** than L_f.\n- **Why the difference:**\n+ **Melting (fusion)** only loosens the lattice enough for molecules to slide past each other. Intermolecular forces are still substantially present.\n+ **Boiling (vaporisation)** requires molecules to be completely separated from each other â€” the intermolecular forces must be overcome essentially in full.\n- **What this tells us:** The latent heat values reflect bond strength. The huge ratio shows that liquid-to-gas requires nearly complete bond breaking, while solid-to-liquid only partially weakens them.\n\n**Takeaway:** L_v >> L_f because vaporisation completely separates molecules (all bonds broken), while fusion only partially loosens them (some bonds remain).", "source": "MiniMax â‘،", "_id": "minimax_2_29", "judge_pick": true}, {"question": "A fixed mass of ideal gas occupies 0.025 mآ³ at 300 K and 1.0 أ— 10âپµ Pa. The gas is heated to 450 K while pressure increases to 1.5 أ— 10âپµ Pa. Find the new volume. (3 steps)", "answer": "- Step 1: Use the combined gas law: pâ‚پVâ‚پ/Tâ‚پ = pâ‚‚Vâ‚‚/Tâ‚‚\n- Step 2: Rearrange for Vâ‚‚: Vâ‚‚ = Vâ‚پ أ— (pâ‚پ/pâ‚‚) أ— (Tâ‚‚/Tâ‚پ)\n- Step 3: Calculate:\n+ Vâ‚‚ = 0.025 أ— (1.0 أ— 10âپµ / 1.5 أ— 10âپµ) أ— (450/300)\n+ Vâ‚‚ = 0.025 أ— (2/3) أ— (3/2)\n+ Vâ‚‚ = 0.025 أ— 1 = **0.025 mآ³**\n\n**Insight:** The pressure increase and temperature increase \"compensate\" exactly â€” the volume stays the same. This illustrates how pV/T = constant for a fixed mass.", "source": "MiniMax â‘،", "_id": "minimax_2_30", "judge_pick": false}, {"question": "What is the difference between evaporation and boiling? Which one happens at the surface only, and which happens throughout the liquid?", "answer": "- **Evaporation:** Occurs at the **surface** of a liquid at **any temperature**. High-energy molecules in the tail of the Maxwell-Boltzmann distribution escape through the surface.\n- **Boiling:** Occurs **throughout the bulk** of the liquid at a **fixed temperature** (the boiling point) when vapor pressure equals atmospheric pressure.\n- Evaporation is a surface phenomenon; boiling is a bulk phenomenon throughout the liquid.\n\n**Takeaway:** Remember: evaporation = surface only, any temperature; boiling = bulk, fixed temperature.", "source": "MiniMax â‘،", "_id": "minimax_2_31", "judge_pick": false}, {"question": "Explain, using kinetic theory, why the pressure of a fixed volume of gas increases when the gas is heated. (3 steps)", "answer": "- Step 1: When temperature increases at constant V, the average kinetic energy of molecules increases (E_k âˆ‌ T).\n- Step 2: Three consequences for the wall collisions:\n+ (i) Molecules move **faster** (higher speed).\n+ (ii) They hit the walls **more frequently** (less time between collisions).\n+ (iii) Each collision transfers **more momentum** (larger خ”p = 2mv_x).\n- Step 3: Pressure = force/area = (total momentum transfer per second)/area. Since all three factors increase with T, pressure increases proportionally. This is the pressure law: p âˆ‌ T at constant V.\n\n**Takeaway:** Faster, more frequent, harder hits = higher pressure. The \"three F's\" connect temperature to pressure directly.", "source": "MiniMax â‘،", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Calculate the rms speed of helium atoms at 273 K. (Helium atomic mass â‰ˆ 6.6 أ— 10âپ»آ²âپ· kg) (2 steps)", "answer": "- Step 1: Use c_rms = âˆڑ(3kT/m)\n+ k = 1.38 أ— 10âپ»آ²آ³ Jآ·Kâپ»آ¹\n+ T = 273 K\n+ m = 6.6 أ— 10âپ»آ²âپ· kg\n\n- Step 2: Calculate:\n+ c_rms = âˆڑ[(3 أ— 1.38 أ— 10âپ»آ²آ³ أ— 273) / (6.6 أ— 10âپ»آ²âپ·)]\n+ Numerator: 3 أ— 1.38 أ— 10âپ»آ²آ³ أ— 273 = 1.131 أ— 10âپ»آ²âپ°\n+ Denominator: 6.6 أ— 10âپ»آ²âپ·\n+ Ratio: 1.131 أ— 10âپ»آ²âپ° / 6.6 أ— 10âپ»آ²âپ· = 1.714 أ— 10âپ¶\n+ c_rms = âˆڑ(1.714 أ— 10âپ¶) â‰ˆ **1310 m/s**\n\n**Takeaway:** This is faster than the speed of sound in air (~340 m/s), which makes sense since sound propagates via molecular collisions.", "source": "MiniMax â‘،", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A syringe contains 40 cmآ³ of air at atmospheric pressure (101 kPa). The plunger is pushed to 25 cmآ³ while temperature stays constant. Find the new pressure. (2 steps)", "answer": "- Step 1: Apply Boyle's law: pâ‚پVâ‚پ = pâ‚‚Vâ‚‚\n- Step 2: Solve for pâ‚‚:\n+ pâ‚‚ = pâ‚پ أ— (Vâ‚پ/Vâ‚‚) = 101 kPa أ— (40/25)\n+ pâ‚‚ = 101 أ— 1.6 = **161.6 kPa â‰ˆ 162 kPa** (3 s.f.)\n\n**Note:** Units of volume cancel, so we don't need to convert to mآ³ â€” but both must be in the same unit.\n\n**Takeaway:** Boyle's law is straightforward â€” pressure increases inversely as volume decreases.", "source": "MiniMax â‘،", "_id": "minimax_2_34", "judge_pick": false}, {"question": "Why do real gases deviate from ideal gas behavior at high pressures and low temperatures? Which assumptions fail first in each case?", "answer": "- **At high pressure:** Molecules are forced close together, so:\n+ The assumption of **negligible molecular volume** fails â€” molecular volume becomes significant compared to container volume.\n+ Intermolecular forces become significant (molecules spend less time in free flight).\n- **At low temperature:** Molecules move slower, so:\n+ The assumption of **negligible intermolecular forces** fails â€” forces have more time to act between collisions.\n+ At low T, molecules are closer on average and intermolecular attractions become important.\n\n**Takeaway:** Real gases approximate ideal behavior best at high temperature (fast moving, weak interactions) and low pressure (far apart). Deviations occur when assumptions break down.", "source": "MiniMax â‘،", "_id": "minimax_2_35", "judge_pick": false}, {"question": "What is upthrust? A wooden block of density 600 kg/mآ³ and volume 0.002 mآ³ is placed in water (دپ = 1000 kg/mآ³). Will it float or sink? Calculate the upthrust if it floats. (3 steps)", "answer": "- **Upthrust (buoyancy):** The upward force equal to the weight of fluid displaced: F_up = دپ_fluid أ— V_displaced أ— g\n- **Determine float/sink:**\n+ Compare densities: block (600 kg/mآ³) < water (1000 kg/mآ³)\n+ It will **float**, partially submerged.\n- **Calculate upthrust (when floating, upthrust = weight of block):**\n+ Mass = دپ أ— V = 600 أ— 0.002 = 1.2 kg\n+ Weight = mg = 1.2 أ— 9.81 = **11.8 N**\n+ Alternatively: upthrust = دپ_water أ— V_submerged أ— g. Since floating, upthrust equals weight.\n\n**Takeaway:** Objects float if دپ_object < دپ_fluid; sink if دپ_object > دپ_fluid. Floating objects displace their weight of fluid, not their volume.", "source": "MiniMax â‘،", "_id": "minimax_2_36", "judge_pick": true}, {"question": "Why does a balloon filled with helium rise in air? Use concepts of upthrust and density.", "answer": "- A balloon rises because the **upthrust (weight of displaced air) is greater than the weight of the helium inside**.\n- Upthrust = دپ_air أ— V أ— g\n- Balloon weight = دپ_He أ— V أ— g (helium density + balloon material)\n- Since دپ_air > دپ_He, upthrust > weight, giving a net upward force.\n- As the balloon rises, air density decreases (at higher altitude), eventually balancing â€” this determines the maximum altitude.\n\n**Takeaway:** For any object in a fluid (including gas), it rises if دپ_object < دپ_fluid. This is fundamentally Archimedes' principle applied to gases.", "source": "MiniMax â‘،", "_id": "minimax_2_37", "judge_pick": true}, {"question": "A student writes \"the internal energy of an ideal gas is just the total kinetic energy of all molecules.\" Is this correct? Explain.", "answer": "- **For an ideal gas: YES** â€” this is correct, with an important caveat.\n- In an ideal gas, we assume **negligible intermolecular forces**, which means **potential energy is zero** (or negligible). Therefore, internal energy U = total kinetic energy = N أ— (3/2)kT = (3/2)nRT.\n- **For real substances (especially during phase changes): NO** â€” potential energy cannot be ignored. During melting or boiling, PE increases significantly while KE (and thus T) stays constant.\n- The student's statement is only strictly true for ideal gases. For real gases, liquids, and solids, internal energy includes both KE and PE.\n\n**Takeaway:** Ideal gas assumption â†’ U = total KE. Real substances â†’ U includes significant PE from intermolecular forces, especially during phase changes.", "source": "MiniMax â‘،", "_id": "minimax_2_38", "judge_pick": true}, {"question": "Sketch a heating curve for water from âˆ’20آ°C to 120آ°C, showing temperature vs. energy supplied. Label all five regions and explain what is happening at each plateau. (3 steps)", "answer": "- Step 1: Regions on the curve:\n1. **Heating solid ice:** Temperature rises from âˆ’20آ°C to 0آ°C (KE increasing)\n2. **Melting plateau (0آ°C):** Flat â€” solid turning to liquid, temperature constant\n3. **Heating liquid water:** Temperature rises from 0آ°C to 100آ°C (KE increasing)\n4. **Boiling plateau (100آ°C):** Flat â€” liquid turning to gas, temperature constant\n5. **Heating steam:** Temperature rises from 100آ°C to 120آ°C (KE increasing)\n\n- Step 2: What happens at plateaus:\n+ At 0آ°C (melting): Energy breaks lattice bonds partially â€” molecules gain PE but not KE â†’ T constant\n+ At 100آ°C (boiling): Energy completely overcomes intermolecular forces â€” full separation â†’ PE increases, KE constant â†’ T constant\n\n- Step 3: The boiling plateau is much longer than melting because L_v â‰ˆ 2.26 MJ/kg is about 7أ— larger than L_f â‰ˆ 334 kJ/kg â€” more energy needed to fully separate molecules.\n\n**Takeaway:** The heating curve visualizes the distinction between heating (KE increases) and phase changes (PE increases at constant T).", "source": "MiniMax â‘،", "_id": "minimax_2_39", "judge_pick": true}, {"question": "What is the difference between specific heat capacity and specific latent heat? When is each used?", "answer": "- **Specific heat capacity (c):** Energy to change temperature of 1 kg by 1 K **without phase change**.\n+ Formula: خ”E = mcخ”خ¸\n+ Units: Jآ·kgâپ»آ¹آ·Kâپ»آ¹\n+ Used when: raising/lowing temperature of a substance (solid, liquid, or gas) in a single phase.\n\n- **Specific latent heat (L):** Energy to change phase of 1 kg **without temperature change**.\n+ Formula: خ”E = mL (where L = L_f or L_v)\n+ Units: Jآ·kgâپ»آ¹\n+ Used when: substance is melting, freezing, boiling, or condensing (phase change at constant temperature).\n\n**Takeaway:** Use c when temperature changes; use L when temperature stays constant during phase change.", "source": "MiniMax â‘،", "_id": "minimax_2_40", "judge_pick": false}, {"question": "Why is the Kelvin scale preferred over Celsius for gas law calculations? What would go wrong if you used Celsius directly?", "answer": "- The Kelvin scale is an **absolute scale** â€” 0 K means zero molecular kinetic energy (no motion).\n- The Celsius scale is **arbitrary** â€” 0آ°C is the freezing point of water, not a fundamental physical limit. It can go negative.\n- Using Celsius in gas laws would cause serious problems:\n+ At room temperature (~20آ°C = 293 K), substituting Celsius would give vastly wrong results (off by ~270 in the denominator).\n+ At temperatures below 0آ°C, you could get negative volumes or pressures in calculations â€” physically meaningless.\n+ Proportional relationships (p âˆ‌ T, V âˆ‌ T) only work if T is measured from absolute zero.\n\n**Takeaway:** Always add 273 (or 273.15) to Celsius before using in any gas law formula. The gas laws are fundamentally tied to absolute temperature.", "source": "MiniMax â‘،", "_id": "minimax_2_41", "judge_pick": false}, {"question": "Two different gases at the same temperature have different molecular speeds. One is helium (mass ~4 u), the other is oxygen (mass ~32 u). Which has higher rms speed, and why? (2 steps)", "answer": "- Step 1: From c_rms = âˆڑ(3kT/m), for the same temperature T, c_rms âˆ‌ 1/âˆڑm.\n- Step 2: Helium (lighter, m â‰ˆ 4 u) has much higher rms speed than oxygen (heavier, m â‰ˆ 32 u):\n+ c_rms,He / c_rms,Oâ‚‚ = âˆڑ(m_Oâ‚‚ / m_He) = âˆڑ(32/4) = âˆڑ8 â‰ˆ 2.83\n+ Helium atoms move about 2.8 times faster than oxygen molecules at the same temperature.\n\n**Key point:** At the same temperature, **all gases have the same average kinetic energy** (E_k = 3/2 kT), but **different speeds** because KE = 1/2mvآ². Lighter molecules must move faster to have the same KE.\n\n**Takeaway:** Same T â†’ same KE â†’ lighter molecules move faster. This is why helium escapes from balloons faster than air, and why lighter gases diffuse more quickly.", "source": "MiniMax â‘،", "_id": "minimax_2_42", "judge_pick": true}], "count": 43}, "opus_1": {"label": "Opus 4.7 â‘ ", "cards": [{"question": "Why does the conventional Celsius scale fail to give meaningful statements like \"twice as cold\" when comparing temperatures, and how does the Kelvin scale fix this? (3 steps)", "answer": "- Step 1: On the Celsius scale, zero is set arbitrarily at the freezing point of water â€” it does not correspond to any physical minimum. So \"twice as cold as $$-1\\,^\\circ\\text{C}$$\" is undefined: is it $$-2$$? And what would \"twice as cold as $$-6$$\" mean? The ratio statements collapse because negative values are allowed.\n- Step 2: Temperature, fundamentally, is a measure of average molecular kinetic energy. A scale meant to express \"twice as much\" energy must be anchored at the state of zero kinetic energy.\n- Step 3: The Kelvin scale puts its zero exactly there â€” at absolute zero, the temperature at which molecules have minimum (zero) kinetic energy. So doubling $$T$$ in K genuinely doubles average molecular KE, and ratios become physically meaningful.\n\nTakeaway: Kelvin works because its zero is *physical*, not arbitrary.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_0", "judge_pick": false}, {"question": "What are the three defining features used to characterise any state of matter, and why are these the right three to focus on? (3 steps)", "answer": "- Step 1: The three features are **arrangement** (how the particles are spatially organised), **bonds / intermolecular forces** (how strongly they hold each other), and **motion** (how they move).\n- Step 2: These three are not independent â€” they couple together. Strong bonds restrict motion to vibration only and force a regular arrangement. Weak bonds allow random translational motion and a disordered, spread-out arrangement.\n- Step 3: Together these three describe every macroscopic property we care about (density, fluidity, compressibility), so they are sufficient to distinguish solid, liquid, and gas without invoking chemistry.\n\nTakeaway: arrangement-bonds-motion is the universal triplet.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_1", "judge_pick": false}, {"question": "Contrast solid, liquid, and gas in terms of arrangement, bonds, and motion. (3 steps)", "answer": "- Step 1: **Solid** â€” particles are close together in a regular pattern, held by strong bonds; they vibrate about fixed positions but do not translate.\n- Step 2: **Liquid** â€” particles are still close together but in an irregular pattern; bonds are medium strength; particles can slide over one another (hence flow).\n- Step 3: **Gas** â€” particles are far apart with random arrangement; intermolecular forces are very weak (essentially negligible); motion is fast, random, and in straight lines until collisions.\n\nTakeaway: as you go S â†’ L â†’ G, arrangement loosens, bonds weaken, motion increases.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_2", "judge_pick": false}, {"question": "A common misconception: \"particles in a solid are stationary.\" Why is this wrong, and what is the only condition under which it would be true?", "answer": "Particles in a solid are *not* stationary â€” they constantly **vibrate about fixed positions**. They do not translate (their average position is fixed), but they oscillate continuously. The only temperature at which all molecular motion ceases is **absolute zero ($$0\\,\\text{K} = -273.15\\,^\\circ\\text{C}$$)**, which is a theoretical limit that cannot be reached. At any real temperature above this, even ice has vibrating molecules â€” which is why all matter above $$0\\,\\text{K}$$ emits some infrared radiation.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_3", "judge_pick": false}, {"question": "Define internal energy of a substance, and explain the two distinct contributions it sums over. (3 steps)", "answer": "- Step 1: Internal energy $$U$$ is **the sum of the kinetic and potential energies of all the molecules within a given mass of a substance** (units: J).\n- Step 2: The **kinetic** part comes from molecular motion â€” translation, rotation, vibration. This is what temperature measures (specifically, the average translational KE per molecule).\n- Step 3: The **potential** part comes from intermolecular forces â€” how far apart the molecules are and how they are configured. Breaking bonds (e.g. melting or boiling) increases PE without increasing KE.\n\nTakeaway: $$U$$ has two reservoirs; temperature only sees one of them.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_4", "judge_pick": false}, {"question": "Why does temperature stay constant during a phase change even though energy is continuously supplied? (3 steps)", "answer": "- Step 1: Temperature measures *average kinetic energy* of molecules. For temperature to rise, KE must rise.\n- Step 2: During a phase change, all the incoming heat is used to do work against intermolecular forces â€” pulling molecules apart against their bonds. This raises **potential energy**, not kinetic.\n- Step 3: Since KE is not increasing, temperature does not rise â€” it plateaus. Once the phase change is complete, further heating goes back into KE and the temperature climbs again.\n\nTakeaway: phase-change energy is bond-breaking energy, invisible to a thermometer.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_5", "judge_pick": true}, {"question": "On a heating curve for a fixed mass of water starting below $$0\\,^\\circ\\text{C}$$, describe the five distinct regions and what is happening physically in each. (5 steps)", "answer": "- Step 1: **Solid heating** (below $$0\\,^\\circ\\text{C}$$): sloped line. Energy raises KE of vibrating ice molecules â†’ temperature rises.\n- Step 2: **Melting plateau** (at $$0\\,^\\circ\\text{C}$$): flat line. Energy breaks the lattice bonds (PE rises). Temperature constant.\n- Step 3: **Liquid heating** (0 to 100 $$^\\circ\\text{C}$$): sloped line. Energy raises KE of liquid molecules â†’ temperature rises.\n- Step 4: **Boiling plateau** (at $$100\\,^\\circ\\text{C}$$): much longer flat line. Energy fully separates molecules. Temperature constant.\n- Step 5: **Gas heating** (above $$100\\,^\\circ\\text{C}$$): sloped line. Further KE increase.\n\nTakeaway: sloped = KE rising; flat = PE rising (bond-breaking).", "source": "Opus 4.7 â‘ ", "_id": "opus_1_6", "judge_pick": true}, {"question": "Why is the boiling plateau on a heating curve much wider (more energy needed) than the melting plateau, in terms of intermolecular forces? (3 steps)", "answer": "- Step 1: At melting, you only need to loosen the lattice enough for molecules to slide past each other. Most of the intermolecular forces are still acting â€” the molecules remain close.\n- Step 2: At boiling, the molecules must be **fully separated** from one another, escaping intermolecular forces almost entirely.\n- Step 3: For water, this gives $$L_v \\approx 2.26\\,\\text{MJ/kg}$$ vs. $$L_f \\approx 334\\,\\text{kJ/kg}$$ â€” a ratio of about 7, reflecting how much more bond-energy work is needed for vaporisation.\n\nTakeaway: melting loosens; boiling liberates.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_7", "judge_pick": true}, {"question": "Distinguish boiling from evaporation in terms of where, when, and how each occurs. (3 steps)", "answer": "- Step 1: **Where** â€” boiling happens throughout the bulk of the liquid; evaporation happens only at the surface.\n- Step 2: **When** â€” boiling occurs at one specific temperature (the boiling point, where vapour pressure equals atmospheric pressure); evaporation occurs at any temperature.\n- Step 3: **How** â€” boiling involves bubble formation and a fixed thermodynamic transition; evaporation involves individual high-energy molecules in the tail of the speed distribution escaping the surface.\n\nTakeaway: boiling is a bulk transition at one temperature; evaporation is a continuous surface process at all temperatures.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_8", "judge_pick": false}, {"question": "Name the six phase transitions between solid, liquid, and gas (forward and reverse).", "answer": "- Step 1: Solid â†” liquid: forward = **melting (fusion)**, reverse = **freezing (solidification)**.\n- Step 2: Liquid â†” gas (at boiling point): forward = **boiling (vaporisation)**, reverse = **condensation**.\n- Step 3: Solid â†” gas (skipping liquid): forward = **sublimation**, reverse = **deposition**.\n+ Also relevant: liquid â†’ gas below boiling point = **evaporation** (no named reverse â€” it just shades into condensation).", "source": "Opus 4.7 â‘ ", "_id": "opus_1_9", "judge_pick": false}, {"question": "What is the formula relating heat input to temperature change for a substance not undergoing a phase change, and what does each symbol mean? (3 steps)", "answer": "- Step 1: $$\\Delta E = m\\,c\\,\\Delta\\theta$$.\n- Step 2: $$m$$ is mass (kg); $$c$$ is **specific heat capacity** in $$\\text{J kg}^{-1}\\text{K}^{-1}$$ â€” the energy needed to raise 1 kg by 1 K; $$\\Delta\\theta$$ is the temperature change.\n- Step 3: Importantly, $$\\Delta\\theta$$ can be in either $$^\\circ\\text{C}$$ or K because a *change* of 1 K equals a *change* of 1 $$^\\circ\\text{C}$$. But absolute temperatures (in gas laws) must be in K.\n\nTakeaway: this formula applies *only* when there is no phase change.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_10", "judge_pick": false}, {"question": "Why does water have an unusually high specific heat capacity ($$\\approx 4200\\,\\text{J kg}^{-1}\\text{K}^{-1}$$), and what practical consequences follow? (3 steps)", "answer": "- Step 1: Water molecules form strong **hydrogen bonds** with each other. A lot of incoming energy goes into momentarily distorting these bonds (storing energy in molecular vibration and rotation modes) before the average translational KE rises.\n- Step 2: That extra \"energy buffer\" means more joules must be supplied per kelvin of temperature rise â€” hence the high $$c$$.\n- Step 3: Practical consequences: water is excellent for radiators (holds heat well) and for cooling (absorbs lots of energy with little temperature rise); oceans moderate Earth's climate; this is also why water takes forever to boil in a kettle.\n\nTakeaway: hydrogen bonds give water its energy-absorbing reputation.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_11", "judge_pick": false}, {"question": "What is the formula for the heat needed to change phase, and why does it have no $$\\Delta\\theta$$ term? (3 steps)", "answer": "- Step 1: $$\\Delta E = L\\,\\Delta m$$, where $$L$$ is the **specific latent heat** in $$\\text{J kg}^{-1}$$.\n- Step 2: $$L_f$$ (fusion) is for solidâ†”liquid; $$L_v$$ (vaporisation) is for liquidâ†”gas.\n- Step 3: There is no $$\\Delta\\theta$$ term because **temperature does not change during a phase change** â€” the energy is going entirely into molecular potential energy (breaking/forming bonds), not into kinetic energy.\n\nTakeaway: latent = \"hidden\" heat that doesn't show up on a thermometer.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_12", "judge_pick": false}, {"question": "A common pitfall: a student uses $$\\Delta E = mc\\Delta\\theta$$ to compute the energy needed to boil water at $$100\\,^\\circ\\text{C}$$. Why does this give zero, and what should they have used?", "answer": "During boiling, $$\\Delta\\theta = 0$$ because the temperature is fixed at the boiling point. So $$mc\\Delta\\theta$$ gives zero â€” clearly wrong, since boiling demonstrably requires energy. The correct formula is $$\\Delta E = L_v \\Delta m$$, because the energy is being used to break intermolecular bonds (raise PE), not to raise temperature (KE). The rule of thumb: **$$mc\\Delta\\theta$$ for sloped regions of the heating curve; $$L\\Delta m$$ for flat regions.**", "source": "Opus 4.7 â‘ ", "_id": "opus_1_13", "judge_pick": true}, {"question": "A kettle heats a small mass of water and the temperature rises by a few kelvin. Conceptually, how does the energy supplied depend on the mass, the temperature change, and the substance, without doing the arithmetic? (3 steps)", "answer": "- Step 1: From $$\\Delta E = mc\\Delta\\theta$$, energy scales **linearly with mass** â€” double the water, double the energy needed.\n- Step 2: It also scales **linearly with temperature change** â€” heating from 20 to 30 needs twice as much energy as 20 to 25.\n- Step 3: It scales **linearly with $$c$$** â€” for the same temperature rise, water (high $$c$$) needs about twice the energy of oil ($$c \\sim 2000$$), which needs more than a metal like copper.\n\nTakeaway: the three factors all scale linearly and independently.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_14", "judge_pick": true}, {"question": "Roughly how much more energy does it take to boil away a mass of water than to warm that mass from 0 to 100 آ°C, and what does this tell you intuitively? (3 steps)", "answer": "- Step 1: Warming from 0 to 100 $$^\\circ\\text{C}$$: $$\\Delta E_1 = m c \\Delta\\theta = m \\cdot 4200 \\cdot 100 \\approx 4.2 \\times 10^5\\,m$$ J.\n- Step 2: Boiling at 100 $$^\\circ\\text{C}$$: $$\\Delta E_2 = m L_v \\approx 2.26 \\times 10^6\\,m$$ J.\n- Step 3: Ratio $$\\approx 5\\!:\\!1$$ â€” boiling away takes about five times more energy than heating from freezing to boiling.\n\nTakeaway: this is why a kettle takes seconds to get hot but minutes to actually boil dry â€” the boiling step dominates.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_15", "judge_pick": true}, {"question": "State all the assumptions of an ideal gas. (6 steps)", "answer": "- Step 1: Molecules occupy **negligible volume** compared to the container volume.\n- Step 2: **Intermolecular forces are negligible**, except during the brief instant of collision.\n- Step 3: **Collisions are perfectly elastic** â€” no kinetic energy is lost.\n- Step 4: The **duration of a collision is negligible** compared to the time between collisions.\n- Step 5: Motion is **random** (in direction and speed) and obeys Newton's laws.\n- Step 6: There are a **very large number of molecules** (so statistics work).\n\nTakeaway: examiners typically award marks for any 3â€“4 of these; learn at least four.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_16", "judge_pick": false}, {"question": "Under what conditions does a real gas best approximate an ideal gas, and why? (3 steps)", "answer": "- Step 1: **Low pressure** â€” molecules are far apart, so their own volume is genuinely negligible relative to the container, and intermolecular forces have nothing to act on.\n- Step 2: **High temperature** â€” molecules move so fast that the brief tug of intermolecular forces during near-misses barely changes their trajectory, so collisions remain effectively elastic.\n- Step 3: Deviations grow at high pressure (molecules crowded, forces matter) and low temperature (slow molecules linger near each other, forces dominate), eventually leading to condensation, which an ideal gas cannot do.\n\nTakeaway: ideal gas = dilute + hot.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_17", "judge_pick": false}, {"question": "State the three gas laws (Boyle, Charles, pressure law) in words and equations, noting what is held constant for each. (3 steps)", "answer": "- Step 1: **Boyle's law** (constant $$T$$, $$N$$): pressure is inversely proportional to volume. $$pV = \\text{const}$$, or $$p_1 V_1 = p_2 V_2$$.\n- Step 2: **Charles's law** (constant $$p$$, $$N$$): volume is proportional to absolute temperature. $$V_1/T_1 = V_2/T_2$$.\n- Step 3: **Pressure law** (constant $$V$$, $$N$$): pressure is proportional to absolute temperature. $$p_1/T_1 = p_2/T_2$$.\n\nTakeaway: each law fixes two of $$\\{p, V, T, N\\}$$ and relates the other two.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_18", "judge_pick": false}, {"question": "Write the ideal gas equation in both its mole form and molecule form, and explain the link between the two constants. (3 steps)", "answer": "- Step 1: Mole form: $$pV = nRT$$ where $$n$$ is moles, $$R = 8.31\\,\\text{J mol}^{-1}\\text{K}^{-1}$$.\n- Step 2: Molecule form: $$pV = NkT$$ where $$N$$ is number of molecules, $$k = 1.38\\times 10^{-23}\\,\\text{J K}^{-1}$$ (Boltzmann constant).\n- Step 3: They are connected by Avogadro's number: $$N = n N_A$$ and $$k = R/N_A$$. Choose mole form when given moles, molecule form when given/seeking number of molecules.\n\nTakeaway: same physics, two convenient bookkeeping choices.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_19", "judge_pick": false}, {"question": "Why must temperature be in Kelvin when using $$pV = nRT$$ or the gas laws, but $$\\Delta\\theta$$ in $$\\Delta E = mc\\Delta\\theta$$ can be in either Celsius or Kelvin?", "answer": "The gas laws involve absolute temperatures â€” they say $$p \\propto T$$, $$V \\propto T$$. If $$T$$ were in Celsius, then at $$0\\,^\\circ\\text{C}$$ the law would predict zero pressure or zero volume, which is wrong. Negative Celsius temperatures would predict negative quantities, which is nonsense. Kelvin is anchored at absolute zero, so proportionality works. In contrast, $$\\Delta\\theta$$ is a *difference*; a change of 1 K equals a change of 1 $$^\\circ\\text{C}$$, so the difference is unit-independent.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_20", "judge_pick": false}, {"question": "Walk through the derivation of $$pV = \\tfrac{1}{3} N m \\langle c^2 \\rangle$$ from the motion of a single molecule colliding elastically with the wall of a cubic box. (5 steps)", "answer": "- Step 1: Consider $$N$$ molecules of mass $$m$$ in a cube of side $$L$$ (volume $$V = L^3$$). A molecule with velocity component $$v_x$$ hits a wall perpendicular to $$x$$; elastic collision reverses it. Momentum change per hit: $$\\Delta p = 2 m v_x$$.\n- Step 2: Time between successive hits on the same wall: the molecule must travel $$2L$$ (across and back), so $$\\Delta t = 2L / v_x$$.\n- Step 3: Force from one molecule: $$F_1 = \\Delta p / \\Delta t = (2 m v_x)/(2L/v_x) = m v_x^2 / L$$. Summing over $$N$$ molecules and averaging: $$F = N m \\langle v_x^2\\rangle / L$$.\n- Step 4: Pressure on the wall: $$p = F/L^2 = N m \\langle v_x^2\\rangle / L^3 = N m \\langle v_x^2\\rangle / V$$.\n- Step 5: By isotropy (motion equally distributed across 3 directions), $$\\langle v_x^2\\rangle = \\tfrac{1}{3}\\langle c^2\\rangle$$, giving $$pV = \\tfrac{1}{3} N m \\langle c^2 \\rangle$$.\n\nTakeaway: pressure is just momentum transfer rate per area, averaged over many molecules.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_21", "judge_pick": true}, {"question": "Show how equating the macroscopic and microscopic expressions for $$pV$$ leads to the result $$\\langle E_k\\rangle = \\tfrac{3}{2}kT$$. (3 steps)", "answer": "- Step 1: From kinetic theory: $$pV = \\tfrac{1}{3} N m \\langle c^2 \\rangle$$. From the ideal gas law: $$pV = NkT$$.\n- Step 2: Setting the right-hand sides equal: $$\\tfrac{1}{3} N m \\langle c^2 \\rangle = NkT$$. Cancel $$N$$ and multiply both sides by $$\\tfrac{3}{2}$$.\n- Step 3: $$\\tfrac{1}{2} m \\langle c^2 \\rangle = \\tfrac{3}{2} k T$$. The left side is the average translational kinetic energy per molecule, so $$\\langle E_k\\rangle = \\tfrac{3}{2}kT$$.\n\nTakeaway: this is the bridge between macroscopic temperature and microscopic motion.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_22", "judge_pick": true}, {"question": "Two profound consequences follow from $$\\langle E_k \\rangle = \\tfrac{3}{2}kT$$. What are they?", "answer": "- Step 1: **Temperature is literally proportional to molecular KE.** Doubling $$T$$ (in K) doubles the average translational KE per molecule. This justifies calling $$T$$ \"a measure of average molecular KE.\"\n- Step 2: **The average KE per molecule does not depend on the identity of the gas.** At the same temperature, helium atoms and oxygen molecules have the *same* average KE. They have very different *speeds* (because of mass differences) but the same KE.\n\nTakeaway: temperature equalises KE, not speed.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_23", "judge_pick": false}, {"question": "Why do we use the root-mean-square speed $$c_{rms}$$ instead of the average velocity $$\\langle v \\rangle$$ when characterising molecular speeds in a gas? (3 steps)", "answer": "- Step 1: Molecules move in all directions equally (isotropy), so positive and negative velocity components cancel: $$\\langle v \\rangle = 0$$. Useless.\n- Step 2: To get a non-zero measure, square the speeds first (always positive), average them, then take the square root. This is the root-mean-square: $$c_{rms} = \\sqrt{\\langle c^2\\rangle}$$.\n- Step 3: This connects naturally to kinetic energy ($$\\propto v^2$$), so $$c_{rms}$$ appears directly in $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$.\n\nTakeaway: rms is the speed that \"counts\" energetically.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_24", "judge_pick": false}, {"question": "Derive the formula for $$c_{rms}$$ in terms of temperature and either molecular mass or molar mass. (3 steps)", "answer": "- Step 1: Start from $$\\tfrac{1}{2} m \\langle c^2 \\rangle = \\tfrac{3}{2} k T$$. Solve for $$\\langle c^2 \\rangle$$: $$\\langle c^2\\rangle = 3kT/m$$.\n- Step 2: Take the square root: $$c_{rms} = \\sqrt{3kT/m}$$ where $$m$$ is the mass of one molecule.\n- Step 3: Multiply top and bottom by Avogadro's number: $$c_{rms} = \\sqrt{3RT/M}$$ where $$M = m N_A$$ is molar mass in $$\\text{kg/mol}$$.\n\nTakeaway: $$c_{rms} \\propto \\sqrt{T}$$, and *lighter* molecules move *faster* at the same temperature.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_25", "judge_pick": false}, {"question": "If you double the absolute temperature of an ideal gas, how does the rms speed change, and why is the answer not \"doubles\"? (3 steps)", "answer": "- Step 1: From $$c_{rms} = \\sqrt{3kT/m}$$, the rms speed depends on $$\\sqrt{T}$$, not on $$T$$ directly.\n- Step 2: Doubling $$T$$ multiplies $$c_{rms}$$ by $$\\sqrt{2} \\approx 1.41$$, not by 2.\n- Step 3: What *does* double is the average kinetic energy ($$\\langle E_k\\rangle = \\tfrac{3}{2}kT \\propto T$$). The KE is linear in T; the speed is the square root of KE per molecule, hence square root of T.\n\nTakeaway: KE scales with T; speed scales with âˆڑT.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_26", "judge_pick": true}, {"question": "Two gases (helium and nitrogen) are at the same temperature. Which has the larger average KE per molecule, and which has the larger rms speed? (3 steps)", "answer": "- Step 1: Average KE per molecule depends only on $$T$$ ($$\\langle E_k\\rangle = \\tfrac{3}{2}kT$$). At the same $$T$$, both gases have the **same average KE**.\n- Step 2: But $$c_{rms} = \\sqrt{3kT/m}$$, so the lighter molecule moves faster. Helium ($$m \\approx 4u$$) is much lighter than nitrogen ($$N_2 \\approx 28u$$).\n- Step 3: So helium has a **larger rms speed** by a factor $$\\sqrt{28/4} = \\sqrt{7} \\approx 2.6$$.\n\nTakeaway: same KE doesn't mean same speed â€” mass matters.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_27", "judge_pick": false}, {"question": "Using the \"three F's\" reasoning from kinetic theory, explain why the pressure of a fixed-volume gas rises when you heat it. (3 steps)", "answer": "- Step 1: **Faster** â€” molecules gain KE so they move faster ($$c_{rms} \\propto \\sqrt{T}$$).\n- Step 2: **More frequently** â€” faster molecules cover the distance to the wall in less time, so they hit the wall more often per second.\n- Step 3: **More forcefully** â€” each impact involves more momentum change ($$\\Delta p = 2mv_x$$), so each collision transfers more force to the wall.\n\nMore force, applied more often, over the same area = higher pressure. Hence $$p \\propto T$$ at constant $$V$$.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_28", "judge_pick": false}, {"question": "Conceptually, why does Boyle's law ($$pV = \\text{const}$$ at constant $$T$$) hold? (3 steps)", "answer": "- Step 1: At constant temperature, the average molecular KE is fixed â€” molecules have the same average speeds before and after.\n- Step 2: If you halve the volume, molecules travel half as far between wall hits, so they hit each wall twice as often. With each impact unchanged in momentum, the rate of momentum transfer per area doubles.\n- Step 3: Therefore pressure doubles when volume halves â€” $$p \\propto 1/V$$.\n\nTakeaway: Boyle's law is just \"smaller box = more wall hits per second.\"", "source": "Opus 4.7 â‘ ", "_id": "opus_1_29", "judge_pick": false}, {"question": "Conceptually, why does Charles's law ($$V \\propto T$$ at constant pressure) hold? (3 steps)", "answer": "- Step 1: Heating raises molecular KE and speeds â€” each impact is harder and impacts are more frequent. Pressure would rise.\n- Step 2: But pressure is being held constant. So the volume must expand to compensate â€” a larger container means longer travel between hits, reducing impact frequency back to where it balances the harder impacts.\n- Step 3: The required expansion to exactly cancel the temperature effect makes $$V \\propto T$$.\n\nTakeaway: at constant $$p$$, the gas expands to \"spread out\" its extra energy.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_30", "judge_pick": false}, {"question": "A fixed mass of ideal gas is compressed to half its original volume at constant temperature. Without calculation, what happens to the pressure, and what happens to the average KE per molecule? (2 steps)", "answer": "- Step 1: By Boyle's law ($$pV = \\text{const}$$), halving $$V$$ **doubles** $$p$$. This is because molecules now have less distance to travel between wall hits, so hit frequency doubles.\n- Step 2: Average KE per molecule depends only on temperature ($$\\langle E_k\\rangle = \\tfrac{3}{2}kT$$). Temperature is held constant, so **KE per molecule is unchanged**. Molecules are equally fast; they just hit the walls more often.\n\nTakeaway: in isothermal compression, speeds stay the same; only collision frequency changes.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_31", "judge_pick": true}, {"question": "A gas in a sealed rigid container is heated from 300 K to 600 K. Without computing exact numbers, how do (a) pressure, (b) average KE per molecule, and (c) rms speed change? (3 steps)", "answer": "- Step 1: **Pressure**: $$V$$ is fixed (rigid), so by the pressure law $$p \\propto T$$. Doubling $$T$$ doubles $$p$$.\n- Step 2: **Average KE per molecule**: $$\\langle E_k \\rangle = \\tfrac{3}{2}kT$$, linear in $$T$$, so it **doubles**.\n- Step 3: **RMS speed**: $$c_{rms} \\propto \\sqrt{T}$$, so it multiplies by $$\\sqrt{2} \\approx 1.41$$ â€” **not** by 2.\n\nTakeaway: linear T â†’ linear in pressure and KE, square-root in speed.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_32", "judge_pick": false}, {"question": "In a Boyle's law experiment with a syringe loaded with masses, what is the pressure of the trapped gas as a function of the added mass, and why? (3 steps)", "answer": "- Step 1: Without any mass, the gas is at atmospheric pressure $$p_0$$ (assuming the plunger is massless or already balanced).\n- Step 2: Adding a mass $$m$$ on top of the plunger adds an extra downward force $$mg$$ over the syringe cross-sectional area $$A$$, contributing an extra pressure $$mg/A$$.\n- Step 3: Total pressure on the trapped gas: $$p = p_0 + mg/A$$ (or minus if the mass is below pulling down). This is the pressure to plot against the measured volume.\n\nTakeaway: pressure isn't just from the masses â€” atmosphere matters too.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_33", "judge_pick": false}, {"question": "In the Boyle's law experiment, why must you wait a few seconds after each mass is added before reading the volume? (3 steps)", "answer": "- Step 1: When the gas is compressed by the added mass, work is done on the gas. By the first law, internal energy rises momentarily, raising the temperature slightly above the surroundings.\n- Step 2: Boyle's law requires constant temperature (isothermal conditions). A warmer gas at the moment of compression would give an artificially high pressure reading.\n- Step 3: Waiting lets the gas equilibrate thermally with the surroundings, returning to the ambient temperature, so that the measurement is truly isothermal.\n\nTakeaway: Boyle's law is isothermal â€” give the gas time to cool back down.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_34", "judge_pick": false}, {"question": "A graph of pressure vs Celsius temperature for a fixed mass of gas at constant volume is a straight line, but it does *not* pass through the origin. Where does it cross the temperature axis, and why is this useful? (3 steps)", "answer": "- Step 1: The pressure law says $$p \\propto T$$ in Kelvin â€” a straight line through the origin of a $$p$$-vs-$$T_{\\text{K}}$$ plot.\n- Step 2: Since $$T(\\text{K}) = \\theta + 273.15$$, plotting $$p$$ vs $$\\theta$$ (Celsius) gives a parallel line but shifted, crossing the $$\\theta$$-axis at $$\\theta = -273.15\\,^\\circ\\text{C}$$ (where pressure extrapolates to zero).\n- Step 3: This gives an **experimental determination of absolute zero**: extrapolate the line back to $$p = 0$$ and read off the temperature. Useful pedagogically and historically.\n\nTakeaway: absolute zero is hiding in plain sight in any $$p$$-vs-$$\\theta$$ plot.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_35", "judge_pick": true}, {"question": "Why is the internal energy of an ideal gas a function of temperature only â€” and why does this *not* hold for real substances? (3 steps)", "answer": "- Step 1: For an ideal gas, intermolecular forces are assumed negligible, so the potential energy contribution to $$U$$ is zero (or constant, ignorable).\n- Step 2: All the internal energy is kinetic, and average KE per molecule is $$\\tfrac{3}{2}kT$$. So $$U = \\tfrac{3}{2}NkT$$ â€” depends only on $$T$$.\n- Step 3: For real substances (especially liquids and solids), intermolecular forces are significant. Changing the spacing (e.g. expansion, compression, phase change) changes PE without changing temperature. So $$U$$ depends on volume/state too, not just $$T$$.\n\nTakeaway: ideal gas U = KE only; real matter U = KE + PE.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_36", "judge_pick": true}, {"question": "A fixed mass of ice at $$-10\\,^\\circ\\text{C}$$ is heated steadily through to steam at $$100\\,^\\circ\\text{C}$$. Conceptually, which of the four stages dominates the total energy required, and why? (3 steps)", "answer": "- Step 1: The four stages are: (i) warming ice from $$-10$$ to 0, (ii) melting at 0, (iii) warming water from 0 to 100, (iv) boiling at 100.\n- Step 2: Stage (i) needs $$mc_{ice}\\Delta\\theta$$ ~ small. Stage (ii) needs $$mL_f \\approx 334\\,m$$ kJ. Stage (iii) needs $$mc_{water}\\cdot 100 \\approx 420\\,m$$ kJ. Stage (iv) needs $$mL_v \\approx 2260\\,m$$ kJ.\n- Step 3: Stage (iv) â€” **boiling** â€” dominates by roughly a factor of 5 over any other stage, because the latent heat of vaporisation is huge.\n\nTakeaway: when going ice â†’ steam, almost all the energy goes into the final boil-off.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_37", "judge_pick": false}, {"question": "Why must you always convert volumes to $$\\text{m}^3$$ when using $$pV = nRT$$? (3 steps)", "answer": "- Step 1: The gas constant $$R = 8.31\\,\\text{J mol}^{-1}\\text{K}^{-1}$$ is in SI units. The \"J\" hides a $$\\text{Pa}\\cdot\\text{m}^3$$ (since $$pV$$ has units of energy).\n- Step 2: If you use $$V$$ in cmآ³ or dmآ³ while keeping $$p$$ in Pa, the units don't cancel and you get an answer wrong by factors of $$10^3$$ or $$10^6$$.\n- Step 3: Useful conversions: $$1\\,\\text{cm}^3 = 10^{-6}\\,\\text{m}^3$$; $$1\\,\\text{dm}^3 = 1\\,\\text{L} = 10^{-3}\\,\\text{m}^3$$.\n\nTakeaway: unit consistency is non-negotiable â€” SI everywhere.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_38", "judge_pick": false}, {"question": "A storage cylinder contains an ideal gas at known $$p$$, $$V$$, $$T$$. Without doing the arithmetic, describe how you would find the number of molecules. (3 steps)", "answer": "- Step 1: Use $$pV = NkT$$, where $$N$$ is the number of molecules and $$k = 1.38\\times 10^{-23}\\,\\text{J K}^{-1}$$.\n- Step 2: Convert any non-SI units: pressure to Pa, volume to $$\\text{m}^3$$, temperature to K (add 273 to Celsius).\n- Step 3: Rearrange: $$N = pV/(kT)$$. For a typical cylinder at high pressure, expect $$N$$ on the order of $$10^{25}$$ molecules â€” Avogadro-scale.\n\nTakeaway: $$N = pV/kT$$, all in SI.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_39", "judge_pick": true}, {"question": "A car tyre has a *gauge* pressure of 2.5 أ— 10âپµ Pa at 15 آ°C and reaches 45 آ°C after driving (volume unchanged). Conceptually, how do you find the new gauge pressure? (4 steps)", "answer": "- Step 1: Convert gauge to absolute pressure by adding atmospheric: $$p_{1,\\text{abs}} = 2.5\\times 10^5 + 1.0\\times 10^5 = 3.5\\times 10^5\\,\\text{Pa}$$. The pressure law works with absolute pressures.\n- Step 2: Convert temperatures: $$T_1 = 288\\,\\text{K}$$, $$T_2 = 318\\,\\text{K}$$.\n- Step 3: Apply pressure law: $$p_2 = p_1 (T_2/T_1)$$. The ratio $$318/288 \\approx 1.10$$, so absolute pressure rises by ~10%.\n- Step 4: Convert back to gauge by subtracting atmospheric: $$p_{2,\\text{gauge}} = p_{2,\\text{abs}} - 1.0\\times 10^5$$. The new gauge pressure is larger than the original gauge pressure by *more* than 10% (because the atmospheric subtraction removes a constant).\n\nTakeaway: always work with **absolute** pressures in gas laws.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_40", "judge_pick": true}, {"question": "A common student error: \"temperature is the kinetic energy of the molecules.\" Why is this wrong? (2 steps)", "answer": "- Step 1: Temperature is the **average** kinetic energy per molecule, not the total or individual KE. Individual molecules have a wide spread of speeds (Maxwell-Boltzmann distribution); temperature captures only the mean.\n- Step 2: Also, temperature is a *measure* (proportional to, in Kelvin) â€” not equal to â€” the average translational KE. The precise relation is $$\\langle E_k \\rangle = \\tfrac{3}{2}kT$$, where the factor $$\\tfrac{3}{2}k$$ matters.\n\nTakeaway: temperature âˆ‌ *average* KE per molecule, with a specific proportionality.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_41", "judge_pick": false}, {"question": "During a phase change, what happens to (a) internal energy, (b) temperature, (c) kinetic energy of molecules, (d) potential energy of molecules? (4 steps)", "answer": "- Step 1: **Internal energy**: increases (going Sâ†’Lâ†’G) â€” energy is being supplied and absorbed.\n- Step 2: **Temperature**: stays constant â€” the defining feature of a phase change plateau.\n- Step 3: **Kinetic energy** per molecule: stays constant (since T is constant).\n- Step 4: **Potential energy** per molecule: increases â€” this is where all the supplied energy goes, into doing work against intermolecular forces (breaking bonds).\n\nTakeaway: phase change is a pure PE-up, KE-flat process.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_42", "judge_pick": false}, {"question": "Conceptually, why is the average speed of molecules $$\\langle v \\rangle = 0$$ but the average speed magnitude $$\\langle |v| \\rangle$$ is not, in an ideal gas?", "answer": "Average velocity is a vector average. In an ideal gas, motion is isotropic â€” for every molecule moving in one direction at some speed, on average there is another moving the opposite way at the same speed. So velocity components cancel and $$\\langle \\vec{v}\\rangle = 0$$. The average *speed* $$\\langle |v|\\rangle$$ (or $$\\langle c \\rangle$$) is a scalar: speeds are all positive, they cannot cancel, and the mean is nonzero. For energy purposes we use $$c_{rms} = \\sqrt{\\langle c^2\\rangle}$$ instead because it links naturally to KE.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_43", "judge_pick": false}, {"question": "Phase change is sometimes described as a \"physical\" change rather than a \"chemical\" one. What does this mean and why does it matter? (2 steps)", "answer": "- Step 1: A physical change means the **identity** of the substance is unchanged â€” water vapour is still Hâ‚‚O, iron gas is still iron. Only the arrangement and energy of the particles changes.\n- Step 2: This matters because the same intermolecular forces and the same molecular masses are at play before and after. We don't need to involve chemistry to predict $$L_f$$, $$L_v$$, or how the gas laws behave â€” it's purely a story of particle physics and thermodynamics.\n\nTakeaway: the substance is unchanged; only its state is.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_44", "judge_pick": false}, {"question": "Suppose you compare two identical containers of ideal gas, A at 300 K and B at 600 K. They have the same volume and number of molecules. Compare their pressures, internal energies, and rms speeds qualitatively. (3 steps)", "answer": "- Step 1: **Pressure**: from $$p = NkT/V$$, B has **double** the pressure of A.\n- Step 2: **Internal energy** (for ideal gas): $$U = \\tfrac{3}{2}NkT$$, so B has **double** the internal energy of A.\n- Step 3: **RMS speed**: $$c_{rms} \\propto \\sqrt{T}$$, so B's rms speed is $$\\sqrt{2} \\approx 1.41 \\times$$ A's rms speed.\n\nTakeaway: $$p$$ and $$U$$ are linear in T; speed is square-root.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_45", "judge_pick": false}, {"question": "A real gas at high pressure deviates from ideal behaviour. List two specific assumptions that break down and explain why.", "answer": "- Step 1: **Negligible molecular volume**: at high pressure, the gas is dense, and the actual volume of the molecules themselves is no longer negligible compared to the container volume. So the available \"free\" volume is less than $$V$$ and the predicted pressure is too low.\n- Step 2: **Negligible intermolecular forces**: at high pressure, molecules are close enough on average that attractive intermolecular forces (van der Waals) act for non-negligible fractions of the time, slowing molecules near the walls and reducing the measured pressure below the ideal-gas prediction.\n\nTakeaway: density (closeness) is what makes ideal-gas assumptions fail.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_46", "judge_pick": false}, {"question": "A balloon is taken from a warm room (300 K) outside to a cold day (240 K) at constant atmospheric pressure. Without numbers, what happens to its volume, and why? (3 steps)", "answer": "- Step 1: Pressure outside equals pressure inside (the rubber adjusts), and both equal atmospheric â€” so this is a constant-pressure process. Charles's law applies.\n- Step 2: $$V/T = \\text{const}$$, so volume scales linearly with $$T$$. Going from 300 K to 240 K reduces $$T$$ by 20%, so volume drops by **20%**.\n- Step 3: Microscopically: cold molecules are slower, so the balloon doesn't need to be as big to maintain the same number of wall hits per second per area to balance atmospheric pressure.\n\nTakeaway: cold balloons shrink in direct proportion to the absolute temperature.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_47", "judge_pick": true}, {"question": "Why is $$U = \\tfrac{3}{2}NkT$$ valid for an ideal *monatomic* gas, but not the full story for diatomic gases like nitrogen or oxygen? (3 steps)", "answer": "- Step 1: The $$\\tfrac{3}{2}kT$$ per molecule counts only **translational** kinetic energy â€” the 3 degrees of freedom for motion in $$x$$, $$y$$, $$z$$.\n- Step 2: Diatomic molecules can also **rotate** about two axes (and vibrate at high T). Each additional active degree of freedom adds $$\\tfrac{1}{2}kT$$ per molecule to the internal energy (equipartition theorem).\n- Step 3: So a diatomic gas at moderate temperatures has $$U = \\tfrac{5}{2}NkT$$ (3 translational + 2 rotational), not $$\\tfrac{3}{2}NkT$$. But $$\\tfrac{3}{2}kT$$ is still the *translational* KE per molecule â€” which is what enters $$pV = NkT$$.\n\nTakeaway: pressure only sees translational KE; total internal energy can be more.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_48", "judge_pick": true}, {"question": "State the four key definitions (verbatim) that examiners expect for internal energy, temperature, specific heat capacity, and specific latent heat of vaporisation. (4 steps)", "answer": "- Step 1: **Internal energy**: the sum of the kinetic and potential energies of all the molecules within a given mass of a substance.\n- Step 2: **Temperature**: a measure of the average kinetic energy of the molecules.\n- Step 3: **Specific heat capacity**: the energy required to raise the temperature of one kilogram of a substance by one kelvin.\n- Step 4: **Specific latent heat of vaporisation**: the thermal energy required to convert one kilogram of liquid to gas with no change in temperature.\n\nTakeaway: examiners look for the exact \"per kilogram\" / \"per kelvin\" / \"no change in temperature\" phrasing.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_49", "judge_pick": false}, {"question": "A misconception probe: \"Specific latent heat of fusion and vaporisation are about the same magnitude.\" Why is this wrong for most substances, water in particular? (3 steps)", "answer": "- Step 1: $$L_f$$ measures the energy to break the *partial* lattice structure when transitioning solid â†’ liquid. Molecules remain close, intermolecular forces still largely act.\n- Step 2: $$L_v$$ measures the energy to *fully separate* molecules when transitioning liquid â†’ gas, working against all intermolecular forces.\n- Step 3: For water: $$L_f \\approx 334$$ kJ/kg, $$L_v \\approx 2260$$ kJ/kg â€” a factor of about 7 difference. Mixing them up gives an order-of-magnitude error on the answer.\n\nTakeaway: $$L_v \\gg L_f$$ for most substances; learn both values.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_50", "judge_pick": true}, {"question": "Why does plasma require very high temperatures, and how does it relate to the states of matter discussed in A-level? (3 steps)", "answer": "- Step 1: Plasma is a state in which electrons have been stripped from atoms, leaving free nuclei (or ions) and free electrons. This requires energy comparable to the ionisation energy of atoms.\n- Step 2: At ordinary temperatures, thermal energy is tiny compared to ionisation energies (electron volts), so atoms keep their electrons. Only at extreme temperatures (thousands of K and up) is there enough energy to strip them.\n- Step 3: Plasma sits \"above\" gas on the energy ladder: solid â†’ liquid â†’ gas â†’ plasma. It's not on the A-level syllabus, but conceptually fits the pattern of energy unlocking new freedom (lattice â†’ flow â†’ free motion â†’ ionisation).\n\nTakeaway: plasma = gas with the electrons stripped off, only possible at very high temperatures.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_51", "judge_pick": false}, {"question": "Combine all three gas laws to derive the combined gas equation $$\\frac{p_1 V_1}{T_1} = \\frac{p_2 V_2}{T_2}$$. (3 steps)", "answer": "- Step 1: From the ideal gas equation $$pV = nRT$$, the quantity $$pV/T = nR$$ is a constant for a fixed mass of gas (fixed $$n$$).\n- Step 2: So between any two states of a fixed mass of gas: $$\\frac{p_1 V_1}{T_1} = \\frac{p_2 V_2}{T_2}$$.\n- Step 3: This combined form contains Boyle (set $$T_1 = T_2$$), Charles (set $$p_1 = p_2$$), and the pressure law (set $$V_1 = V_2$$) as special cases.\n\nTakeaway: $$pV/T = $$ const is the master equation for a fixed gas sample.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_52", "judge_pick": false}, {"question": "A fixed mass of ideal gas occupies $$0.025\\,\\text{m}^3$$ at 300 K and $$1.0\\times 10^5\\,\\text{Pa}$$. It is heated to 450 K while pressure is raised to $$1.5\\times 10^5\\,\\text{Pa}$$. Without computing exact arithmetic, what happens to the volume and why? (3 steps)", "answer": "- Step 1: Combined gas law: $$V_2 = V_1 \\cdot (p_1/p_2) \\cdot (T_2/T_1)$$.\n- Step 2: $$p_1/p_2 = 1/1.5 = 2/3$$ â€” higher pressure squeezes the gas; volume drops by factor 2/3.\n- Step 3: $$T_2/T_1 = 450/300 = 3/2$$ â€” higher temperature expands the gas; volume rises by factor 3/2. The two factors exactly cancel: $$V_2 = V_1$$ â€” volume unchanged.\n\nTakeaway: when $$p$$ and $$T$$ scale by the same factor, $$V$$ is unaffected.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_53", "judge_pick": false}, {"question": "When you increase the volume of a gas isothermally, $$p$$ decreases. But molecules still have the same average KE, so why don't they keep delivering the same total force on the walls? (3 steps)", "answer": "- Step 1: Each individual collision still delivers the same momentum (same molecular speeds, same masses) â€” that hasn't changed.\n- Step 2: But molecules now have to travel further between wall hits in a bigger container, so the frequency of impacts on any one wall decreases.\n- Step 3: Pressure = force per area; reduced impact rate per area means reduced pressure. The total energy budget of the gas is the same; it's just spread out over more space.\n\nTakeaway: pressure tracks collision rate, not just individual collision strength.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_54", "judge_pick": false}, {"question": "A simple worked example: 1 mole of ideal gas at 300 K in a 0.025 mآ³ container. Conceptually estimate the pressure, without precise arithmetic.", "answer": "- Step 1: Use $$p = nRT/V$$.\n- Step 2: $$nRT \\approx 1 \\cdot 8 \\cdot 300 = 2400$$ J (roughly).\n- Step 3: Divide by 0.025 mآ³: $$p \\approx 2400 / 0.025 \\approx 100{,}000$$ Pa = **1 atm**. So 1 mole of any ideal gas at room temperature in ~25 L is approximately atmospheric. This is a useful sanity check (and confirms the \"molar volume at STP â‰ˆ 24 L\" rule of thumb).\n\nTakeaway: 1 mol, room T, ~24 L â‰ˆ 1 atm â€” memorise as a feel.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_55", "judge_pick": false}, {"question": "What is the difference between mean-square speed $$\\langle c^2 \\rangle$$ and root-mean-square speed $$c_{rms}$$, and where does each appear?", "answer": "- Step 1: $$\\langle c^2 \\rangle$$ is the **mean of the squares of the speeds**: take each molecule's speed, square it, average those squares. Units: $$\\text{m}^2\\,\\text{s}^{-2}$$.\n- Step 2: $$c_{rms} = \\sqrt{\\langle c^2\\rangle}$$ is the **square root of that mean**. Units: $$\\text{m s}^{-1}$$. It is a representative single \"speed\" for the gas.\n- Step 3: $$\\langle c^2\\rangle$$ appears directly in the kinetic theory formula $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$ and in $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$. $$c_{rms}$$ is what you report when asked for \"the speed of molecules\" since it has the right units.\n\nTakeaway: $$\\langle c^2\\rangle$$ appears in derivations; $$c_{rms}$$ is the answer to report.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_56", "judge_pick": false}, {"question": "An idealised cooling curve for stearic acid (or any substance) shows a horizontal plateau partway down. What is happening at that plateau, and what value does it lie at? (3 steps)", "answer": "- Step 1: The plateau is at the **freezing/melting temperature** of the substance â€” for stearic acid that's around 70 $$^\\circ\\text{C}$$; for water it's 0 $$^\\circ\\text{C}$$.\n- Step 2: During this plateau, the substance is **freezing** (going from liquid to solid). Energy is being released (to surroundings) as bonds form, but the temperature does not drop because that energy is coming out of the *potential* energy reservoir (PE decreases), not the kinetic.\n- Step 3: The plateau ends once everything has solidified, after which cooling resumes (slope decreases again).\n\nTakeaway: cooling curve plateaus are PE-releasing transitions, mirror of heating curve plateaus.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_57", "judge_pick": false}, {"question": "A common slip in a heating curve question: a student says \"energy is supplied during the plateau, so it must be heating something up.\" Why is this reasoning wrong? (2 steps)", "answer": "- Step 1: \"Heating something up\" colloquially means \"raising temperature.\" But energy supply can either (a) raise KE (and thus T), or (b) raise PE (breaking bonds, no T change).\n- Step 2: On the plateau, all incoming energy goes to (b) â€” increasing PE by breaking intermolecular bonds. Even though energy is flowing in, temperature does not rise because KE is unchanged.\n\nTakeaway: \"heating\" can mean \"supplying energy\" without \"raising temperature.\"", "source": "Opus 4.7 â‘ ", "_id": "opus_1_58", "judge_pick": true}, {"question": "Helium has rms speed 720 m/s at 45 آ°C. Without doing a full calculation, roughly what happens to the rms speed if you heat to 80 آ°C? (3 steps)", "answer": "- Step 1: Convert to Kelvin: 45 آ°C = 318 K; 80 آ°C = 353 K. The temperature ratio is $$353/318 \\approx 1.11$$.\n- Step 2: Since $$c_{rms} \\propto \\sqrt{T}$$, the speed ratio is $$\\sqrt{1.11} \\approx 1.054$$ â€” about a 5% increase.\n- Step 3: So the new rms speed is roughly $$720 \\times 1.054 \\approx 760$$ m/s â€” a modest increase, not anything dramatic.\n\nTakeaway: small Kelvin temperature increases give even smaller speed increases (because of the square root).", "source": "Opus 4.7 â‘ ", "_id": "opus_1_59", "judge_pick": false}, {"question": "Two equivalent statements of absolute zero â€” what are they, and why are they equivalent? (3 steps)", "answer": "- Step 1: **Statement 1**: Absolute zero is the lowest temperature possible. **Statement 2**: It is the temperature at which molecules have zero (minimum) kinetic energy.\n- Step 2: They are equivalent because temperature is a measure of average molecular kinetic energy. Once KE has been reduced to zero (its absolute minimum, since KE cannot be negative), there is no more energy to remove and no lower temperature is possible.\n- Step 3: Numerically: $$0\\,\\text{K} = -273.15\\,^\\circ\\text{C}$$. This is unreachable in practice (third law of thermodynamics), but mathematically well-defined.\n\nTakeaway: KE floor = temperature floor.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_60", "judge_pick": false}, {"question": "A misconception probe: a student says \"ice and water at 0 آ°C have the same internal energy.\" Why is this wrong? (3 steps)", "answer": "- Step 1: They have the same **temperature**, so the same **average kinetic energy per molecule**.\n- Step 2: But internal energy includes both KE and PE. Water has higher PE than ice because some of the lattice bonds have been broken (molecules are more separated/disordered on average).\n- Step 3: Specifically, $$U_{\\text{water}} - U_{\\text{ice}} = m L_f$$ â€” the latent heat of fusion accounts for exactly this PE difference. So at 0 آ°C, water has more internal energy than ice of the same mass.\n\nTakeaway: same T, different state â‡’ different U.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_61", "judge_pick": true}, {"question": "Why does each gas law assume \"a fixed mass\" of gas, and what would happen if mass weren't fixed? (3 steps)", "answer": "- Step 1: All three simple gas laws relate two of $$\\{p, V, T\\}$$ assuming the others are fixed. They are derived from $$pV = nRT$$ by holding $$n$$ (and one of the three variables) constant.\n- Step 2: If you add or remove gas, $$n$$ (or $$N$$) changes, so $$pV/T$$ is no longer constant. For instance, adding more gas to a sealed rigid container raises pressure even at constant temperature â€” violating \"Boyle's law\" if you incorrectly applied it.\n- Step 3: The combined ideal gas equation $$pV = nRT$$ handles any change including changing amounts, but the three simple gas laws each require a fixed mass.\n\nTakeaway: gas laws are about how the *same* gas behaves under different conditions, not about *different amounts* of gas.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_62", "judge_pick": false}, {"question": "Why doesn't doubling the temperature in Celsius double the pressure of a fixed-volume gas, but doubling it in Kelvin does? (3 steps)", "answer": "- Step 1: The pressure law says $$p \\propto T_{\\text{absolute}}$$, i.e. $$p \\propto T$$ in Kelvin. Doubling T in K genuinely doubles the average molecular KE and hence the pressure.\n- Step 2: Doubling Celsius does not double the absolute temperature. For example, going from $$10\\,^\\circ\\text{C}$$ (283 K) to $$20\\,^\\circ\\text{C}$$ (293 K) only increases absolute T by ~3.5%, so pressure rises by ~3.5%, not 100%.\n- Step 3: The Celsius scale's zero is arbitrary, not physical â€” that's why ratios of Celsius temperatures don't correspond to physical ratios.\n\nTakeaway: ratios only work in Kelvin; differences work in either.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_63", "judge_pick": true}, {"question": "If we drop a gas's pressure to zero, what does the ideal gas law predict happens to either volume or temperature, and what's the physical meaning? (3 steps)", "answer": "- Step 1: From $$pV = NkT$$, if $$p = 0$$ at finite $$N$$ and $$V$$, then $$T = 0$$ â€” absolute zero.\n- Step 2: Physically: zero pressure means no momentum transfer to the walls. Since pressure comes from molecular collisions, no pressure means no motion â€” i.e. zero KE per molecule.\n- Step 3: This is exactly the extrapolation used in the experimental Boyle's-law / pressure-law determination of absolute zero. Of course, real gases condense before reaching this limit, so it's an idealised extrapolation.\n\nTakeaway: $$p \\to 0$$ implies $$T \\to 0$$ in the ideal-gas world.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_64", "judge_pick": true}, {"question": "Why is the Kelvin scale not in $$^\\circ\\text{K}$$ (with a degree symbol), unlike Celsius and Fahrenheit?", "answer": "Kelvin is an SI unit of *absolute* temperature, not a scale of differences from an arbitrary reference point. By convention, no degree symbol is used â€” we write \"300 K\" not \"300 آ°K.\" Celsius and Fahrenheit use the degree symbol because they measure temperatures relative to arbitrary reference points (water's freezing point, brine's freezing point, etc.). This is a notational reminder of the philosophical difference: Kelvin is a fundamental unit, Celsius is a convenience scale.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_65", "judge_pick": false}, {"question": "A gas at room temperature has rms speed around 500 m/s (for typical air). Quick reasonableness check: how does this compare to the speed of sound, and why? (3 steps)", "answer": "- Step 1: Speed of sound in air at room temperature is about 340 m/s â€” same order of magnitude as the rms speed, slightly slower.\n- Step 2: This makes physical sense: sound propagates as a pressure wave through molecular collisions. The signal can't propagate faster than the molecules themselves carry it.\n- Step 3: Sound is slightly slower because not every molecule's motion contributes directly to wave propagation â€” there's some averaging and directionality. But the ratio is small ($$\\sim 2/3$$), confirming the kinetic-theory picture.\n\nTakeaway: molecular speeds set the upper bound for sound speed in a gas.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_66", "judge_pick": true}, {"question": "When melting an ice cube at 0 آ°C, why is the ice â†’ water transition irreversible in practice even though thermodynamically the temperature is the same? (3 steps)", "answer": "- Step 1: In an idealised reversible scenario, you could add energy slowly to melt ice and remove the same energy to refreeze, returning exactly to the start.\n- Step 2: In practice, energy transfers involve a temperature gradient: heat flows from a warm surroundings into colder ice. This is a one-way process at the molecular level â€” disorder (entropy) increases.\n- Step 3: To re-freeze, you'd need to extract heat into a colder environment, which itself takes work. The total entropy of universe rises, marking the process as practically irreversible â€” even though the substance returns to its original state.\n\nTakeaway: thermodynamic state is reversible; the process to get there usually isn't.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_67", "judge_pick": true}, {"question": "In the Boyle's law setup, why is loading masses in 100 g increments better than in one big jump? (3 steps)", "answer": "- Step 1: More data points let you plot $$p$$ vs $$1/V$$ (or $$p$$ vs $$V$$) and check that the relationship is genuinely linear (or hyperbolic), confirming Boyle's law rather than just measuring two endpoints.\n- Step 2: Multiple points let you do a best-fit line, averaging out random measurement errors in $$V$$ and $$p$$.\n- Step 3: Small increments also help ensure each step is closer to isothermal â€” a big jump compresses the gas a lot and heats it more, taking longer to equilibrate.\n\nTakeaway: multiple data points = better fit, less drift, isothermal stays valid.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_68", "judge_pick": false}, {"question": "Synthesise: explain why the *same* macroscopic ideal gas law $$pV = NkT$$ is consistent with both Boyle's law and the microscopic kinetic theory result $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$. (4 steps)", "answer": "- Step 1: The ideal gas law is an empirical/macroscopic statement that has been verified experimentally over many conditions.\n- Step 2: Kinetic theory derives $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$ purely from Newtonian mechanics applied to many randomly-moving point particles colliding elastically.\n- Step 3: Setting the two equal forces a microscopic interpretation: $$\\tfrac{1}{2}m\\langle c^2\\rangle = \\tfrac{3}{2}kT$$, defining what \"temperature\" means in terms of molecular KE.\n- Step 4: Boyle's law (constant $$T$$ means constant $$\\langle c^2\\rangle$$) emerges directly from this: $$pV = \\tfrac{1}{3}Nm\\langle c^2\\rangle$$ becomes a constant when both $$N$$ and $$\\langle c^2\\rangle$$ are fixed.\n\nTakeaway: macroscopic gas laws and microscopic kinetic theory are two views of the same reality, linked by the definition of temperature.", "source": "Opus 4.7 â‘ ", "_id": "opus_1_69", "judge_pick": true}], "count": 70}, "opus_2": {"label": "Opus 4.7 â‘،", "cards": [{"question": "What three characteristics do we use to distinguish the solid, liquid, and gas states of matter at the molecular level?", "answer": "- Step 1: We characterise each state by three properties: **arrangement** of particles (how they sit relative to each other), **bonds** (intermolecular force strength), and **motion** (how the particles move).\n- Step 2: These three properties together explain all macroscopic behaviour â€” density, ability to flow, compressibility â€” without needing to know the chemistry.\n- Step 3: Any exam question asking you to \"describe\" a state of matter wants all three: arrangement, bonds, motion.\n\nThis trio is the lens through which kinetic theory views matter.", "source": "Opus 4.7 â‘،", "_id": "opus_2_0", "judge_pick": false}, {"question": "Describe the arrangement, bonds, and motion of particles in a solid.", "answer": "- Step 1: **Arrangement** â€” close together in a regular, repeating pattern (a lattice).\n- Step 2: **Bonds** â€” strong intermolecular forces hold particles in place.\n- Step 3: **Motion** â€” particles vibrate about fixed positions; they do not translate past one another, but they are never truly stationary (except at absolute zero).\n\nThe common mistake is saying solid particles are \"stationary\" â€” they vibrate at all temperatures above 0 K.", "source": "Opus 4.7 â‘،", "_id": "opus_2_1", "judge_pick": false}, {"question": "Describe the arrangement, bonds, and motion of particles in a liquid.", "answer": "- Step 1: **Arrangement** â€” close together but irregular, no fixed lattice pattern.\n- Step 2: **Bonds** â€” medium-strength intermolecular forces, weaker than solids but still significant.\n- Step 3: **Motion** â€” particles can slide past one another, which is why liquids flow and take the shape (but not the size) of their container.", "source": "Opus 4.7 â‘،", "_id": "opus_2_2", "judge_pick": false}, {"question": "Describe the arrangement, bonds, and motion of particles in a gas.", "answer": "- Step 1: **Arrangement** â€” far apart, randomly distributed.\n- Step 2: **Bonds** â€” very weak (essentially negligible) intermolecular forces.\n- Step 3: **Motion** â€” fast, random straight-line motion until they collide elastically with each other or the container walls. They fill the volume of any container.", "source": "Opus 4.7 â‘،", "_id": "opus_2_3", "judge_pick": true}, {"question": "Why does even a solid have molecular motion at any temperature above absolute zero, and what is the only condition under which motion stops? (2 steps)", "answer": "- Step 1: Temperature is a measure of average molecular kinetic energy. Any positive temperature means molecules have some kinetic energy, which in a solid manifests as vibration about lattice positions.\n- Step 2: Only at $$0\\,\\text{K}$$ (absolute zero) does molecular kinetic energy reach its minimum â€” this is the only temperature where motion ceases.\n\nCalling solid particles \"stationary\" at room temperature is wrong; they are vibrating constantly.", "source": "Opus 4.7 â‘،", "_id": "opus_2_4", "judge_pick": false}, {"question": "Define internal energy and explain why it has two contributions.", "answer": "- Step 1: **Internal energy** $$U$$ is the sum of the kinetic and potential energies of all the molecules in a given mass of substance.\n- Step 2: **Kinetic** contribution comes from molecular motion (translation, rotation, vibration) â€” this part determines temperature.\n- Step 3: **Potential** contribution comes from intermolecular forces and depends on how far apart the molecules are and the configuration of their bonds.\n\nBoth contributions matter because changing phase (changing separation) changes PE without changing KE.", "source": "Opus 4.7 â‘،", "_id": "opus_2_5", "judge_pick": false}, {"question": "Why is temperature a measure of average kinetic energy specifically, not of total internal energy?", "answer": "- Step 1: Temperature reflects how vigorously molecules are moving â€” i.e., their kinetic energy per molecule on average.\n- Step 2: It does NOT include potential energy. During a phase change, you add energy that goes entirely into PE (breaking bonds), and temperature stays constant even though $$U$$ rises.\n- Step 3: So two systems at the same $$T$$ can have very different internal energies (e.g., ice at $$0آ°\\text{C}$$ vs. water at $$0آ°\\text{C}$$ â€” the water has much more internal energy because of additional PE from broken lattice bonds).\n\nThis is why \"temperature â‰  heat content\" â€” a crucial conceptual distinction.", "source": "Opus 4.7 â‘،", "_id": "opus_2_6", "judge_pick": false}, {"question": "What are the two ways to increase the internal energy of a system, and the two ways to decrease it?", "answer": "- Step 1: **Increase** $$U$$: heat the system (add thermal energy) OR do work on it (e.g., compress a gas).\n- Step 2: **Decrease** $$U$$: let it lose heat to surroundings OR have it do work on surroundings (e.g., gas expanding against a piston).\n- Step 3: This is the essence of the first law of thermodynamics â€” internal energy is a state function changeable by heat transfer or work.", "source": "Opus 4.7 â‘،", "_id": "opus_2_7", "judge_pick": false}, {"question": "Define absolute zero in two equivalent ways.", "answer": "- Step 1: **Definition 1 (thermodynamic):** the lowest temperature theoretically possible.\n- Step 2: **Definition 2 (microscopic):** the temperature at which molecules in a substance have zero (minimum) kinetic energy.\n- Step 3: Numerically, $$0\\,\\text{K} = -273.15آ°\\text{C}$$.\n\nBoth definitions earn marks; examiners prefer you to know both.", "source": "Opus 4.7 â‘،", "_id": "opus_2_8", "judge_pick": false}, {"question": "Why is the Kelvin scale required for gas-law calculations rather than Celsius? (3 steps)", "answer": "- Step 1: The Celsius scale is anchored arbitrarily at the freezing point of water, so negative values are possible. Plugging a negative $$T$$ into $$pV = nRT$$ gives nonsensical (negative) pressure or volume.\n- Step 2: Phrases like \"twice as cold as $$-1آ°\\text{C}$$\" are meaningless on Celsius â€” is it $$-2آ°\\text{C}$$? The ratio isn't well-defined.\n- Step 3: The Kelvin scale anchors zero at the minimum possible kinetic energy, so doubling $$T$$ in K genuinely doubles the average molecular KE. Proportionality relationships ($$V \\propto T$$, $$p \\propto T$$) only work on this scale.\n\nAlways convert: $$T/\\text{K} = \\theta/آ°\\text{C} + 273.15$$.", "source": "Opus 4.7 â‘،", "_id": "opus_2_9", "judge_pick": false}, {"question": "Sketch and describe the shape of a heating curve from solid ice at $$-20آ°\\text{C}$$ to steam at $$120آ°\\text{
