ubling Kelvin temperature correctly doubles the average molecular kinetic energy, which is not true for Celsius.\n\n[Optional: one-sentence takeaway: The Kelvin scale is an absolute scale because it's based on the fundamental physical limit of zero molecular motion.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_28", "judge_pick": false}, {"question": "What are the key differences between internal energy and temperature?", "answer": "- Step 1: **Definition** - Internal energy is the total (kinetic + potential) energy of all molecules, while temperature is a measure of average kinetic energy.\n- Step 2: **Phase changes** - Internal energy changes during phase changes (due to potential energy), but temperature remains constant.\n- Step 3: **Scales** - Temperature can be measured in Celsius or Kelvin, but internal energy is always in joules.\n\n[Optional: one-sentence takeaway: Temperature is a measure of one component of internal energy (kinetic), while internal energy includes both kinetic and potential energy.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_29", "judge_pick": false}, {"question": "What is the significance of the term \"ideal\" in \"ideal gas\"?", "answer": "- Step 1: \"Ideal\" means the gas follows the ideal gas law exactly under all conditions.\n- Step 2: The assumptions include negligible molecular volume, no intermolecular forces (except during collisions), and perfectly elastic collisions.\n- Step 3: Real gases approach ideal behavior at low pressure and high temperature where molecules are far apart and move fast.\n\n[Optional: one-sentence takeaway: The ideal gas is a theoretical model that simplifies real gas behavior, particularly useful for calculations.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_30", "judge_pick": false}, {"question": "What are the key visual representations that help understand this topic?", "answer": "- Step 1: **Particle arrangement diagrams** - Show how molecules are arranged in solids, liquids, and gases.\n- Step 2: **Heating curves** - Illustrate temperature changes and plateaus during phase changes.\n- Step 3: **Pressure-volume isotherms** - Demonstrate Boyle's law and the behavior of gases at different temperatures.\n\n[Optional: one-sentence takeaway: Visual representations like particle diagrams and heating curves are powerful tools for understanding the concepts of thermal physics.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_31", "judge_pick": false}, {"question": "What are the key factors that affect specific latent heat?", "answer": "- Step 1: **Type of phase change** - Latent heat of vaporization is much larger than latent heat of fusion because more energy is needed to completely separate molecules.\n- Step 2: **Intermolecular forces** - Stronger forces require more energy to overcome, leading to higher latent heats.\n- Step 3: **Molecular mass** - Heavier molecules generally have different latent heat values than lighter ones.\n\n[Optional: one-sentence takeaway: Specific latent heat depends on the type of phase change and the strength of intermolecular forces.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_32", "judge_pick": false}, {"question": "Why is the ideal gas equation useful in practical applications?", "answer": "- Step 1: The ideal gas equation ($ pV = nRT $) relates the four variables of a gas (pressure, volume, amount, temperature) in a single formula.\n- Step 2: It allows prediction of gas behavior under different conditions without needing to remember multiple laws separately.\n- Step 3: Despite being an approximation, it's highly accurate for many gases under common conditions and is widely used in engineering and physics.\n\n[Optional: one-sentence takeaway: The ideal gas equation is a powerful tool for understanding and predicting gas behavior in both theoretical and practical contexts.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_33", "judge_pick": false}, {"question": "What are the key misconceptions about temperature that students often have?", "answer": "- Step 1: **Misconception**: Temperature is the same as internal energy.\n- Step 2: **Misconception**: Temperature measures total kinetic energy rather than average kinetic energy.\n- Step 3: **Misconception**: Temperature must change when energy is added to a system.\n\n[Optional: one-sentence takeaway: Temperature is a measure of the average kinetic energy of molecules, not the total energy or internal energy.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_34", "judge_pick": false}, {"question": "How does the density of a substance change as it goes from solid to liquid to gas?", "answer": "- Step 1: **Solid** - Molecules are close together, so solids are usually most dense.\n- Step 2: **Liquid** - Molecules are still close but can flow, so densities are similar to solids but slightly less.\n- Step 3: **Gas** - Molecules are far apart, so gases are much less dense than solids or liquids.\n\n[Optional: one-sentence takeaway: The density generally decreases as a substance transitions from solid to liquid to gas due to increasing molecular spacing.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_35", "judge_pick": false}, {"question": "What is the significance of the term \"root-mean-square\" in the context of gas molecules?", "answer": "- Step 1: \"Root-mean-square\" (RMS) means taking the square root after squaring all speeds and taking the average.\n- Step 2: This avoids the problem of average velocity being zero while still capturing the typical speed of molecules.\n- Step 3: The RMS speed is directly related to the average kinetic energy and is the most useful measure of molecular speed in gas calculations.\n\n[Optional: one-sentence takeaway: RMS speed provides a meaningful measure of molecular speed that connects directly to the kinetic theory of gases.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_36", "judge_pick": false}, {"question": "How does the kinetic theory of gases explain the pressure law?", "answer": "- Step 1: When a fixed volume of gas is heated, molecules gain kinetic energy and move faster.\n- Step 2: Faster molecules hit the container walls more frequently and with more force.\n- Step 3: This increase in frequency and force of collisions results in increased pressure, explaining the direct proportionality between pressure and temperature at constant volume.\n\n[Optional: one-sentence takeaway: The pressure law (p âˆ‌ T at constant V) is a direct consequence of increased molecular motion with temperature.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_37", "judge_pick": false}, {"question": "What are the key practical applications of the principles covered in this topic?", "answer": "- Step 1: **Engineering** - Design of pressure vessels, heating systems, and refrigeration.\n- Step 2: **Meteorology** - Understanding phase changes of water in the atmosphere.\n- Step 3: **Material science** - Controlling phase changes in manufacturing processes like casting and distillation.\n\n[Optional: one-sentence takeaway: The principles of thermal physics have widespread applications across science and engineering.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_38", "judge_pick": false}, {"question": "How does the kinetic theory explain the pressure exerted by a gas?", "answer": "- Step 1: Gas molecules are in constant random motion, colliding with each other and the container walls.\n- Step 2: Each collision transfers momentum to the wall, creating a force.\n- Step 3: The pressure is the force per unit area, as defined by $ pV = \\frac{1}{3}Nm\\overline{c^2} $.\n\n[Optional: one-sentence takeaway: Gas pressure arises from the continuous collisions of molecules with the container walls, as described by the kinetic theory.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_39", "judge_pick": false}, {"question": "What are the key factors that affect the accuracy of the ideal gas law for real gases?", "answer": "- Step 1: **Pressure** - At high pressures, molecular volume becomes significant compared to the container volume.\n- Step 2: **Temperature** - At low temperatures, molecular speeds decrease and intermolecular forces become more significant.\n- Step 3: **Molecular size and forces** - Larger molecules and those with stronger intermolecular forces deviate more from ideal behavior.\n\n[Optional: one-sentence takeaway: Real gases approach ideal behavior at low pressures and high temperatures where molecular volume and forces are negligible.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_40", "judge_pick": false}, {"question": "What are the key safety considerations in the Boyle's law experiment?", "answer": "- Step 1: **Gradual loading** - Masses should be added gradually to avoid rapid pressure changes.\n- Step 2: **Thermal equilibrium** - The container should be allowed to reach thermal equilibrium between each mass addition to ensure constant temperature.\n- Step 3: **Equipment limits** - The syringe should not be compressed beyond its safe limits to prevent damage or injury.\n\n[Optional: one-sentence takeaway: Safety and proper procedure are essential in the Boyle's law experiment to ensure accurate data and prevent accidents.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_41", "judge_pick": false}, {"question": "How does the kinetic theory explain the behavior of a gas during a free expansion?", "answer": "- Step 1: In a free expansion, a gas expands into a vacuum without doing work or exchanging heat.\n- Step 2: Molecules spread out to fill the new volume but maintain their kinetic energy.\n- Step 3: For an ideal gas, the temperature remains constant because the average kinetic energy doesn't change.\n\n[Optional: one-sentence takeaway: Kinetic theory predicts that temperature remains constant during a free expansion of an ideal gas because molecular kinetic energy doesn't change.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_42", "judge_pick": false}, {"question": "How does the kinetic theory explain the behavior of a gas when it's compressed adiabatically (without heat exchange)?", "answer": "- Step 1: When a gas is compressed adiabatically, work is done on the gas.\n- Step 2: This work increases the internal energy of the gas, primarily the kinetic energy.\n- Step 3: As a result, the temperature of the gas increases during adiabatic compression.\n\n[Optional: one-sentence takeaway: Adiabatic compression increases gas temperature because the work done on the gas increases molecular kinetic energy.]", "source": "Qwen 3 â‘ ", "_id": "qwen_1_43", "judge_pick": false}], "count": 44}, "qwen_2": {"label": "Qwen 3 â‘،", "cards": [{"question": "Compare the three common states of matter (solid, liquid, gas) in terms of arrangement, intermolecular bonds, and molecular motion. (3 steps)", "answer": "- Step 1: **Arrangement**  \n  - Solid: Close-packed, regular pattern.  \n  - Liquid: Close-packed, irregular pattern.  \n  - Gas: Far apart, random distribution.  \n\n- Step 2: **Bonds**  \n  - Solid: Strong intermolecular forces.  \n  - Liquid: Medium intermolecular forces.  \n  - Gas: Very weak/negligible intermolecular forces.  \n\n- Step 3: **Motion**  \n  - Solid: Molecules vibrate about fixed positions.  \n  - Liquid: Molecules slide past one another (flow).  \n  - Gas: Molecules move fast in random, straight-line motion until collisions.", "source": "Qwen 3 â‘،", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why are solids and liquids denser than gases? (3 steps)", "answer": "- Step 1: **Density Definition**  \n  Density $ \\rho = \\frac{m}{V} $, where mass $ m $ is concentrated in a smaller volume $ V $.  \n\n- Step 2: **Molecular Arrangement**  \n  Solids/liquids have close-packed molecules (small $ V $), while gases have molecules far apart (large $ V $).  \n\n- Step 3: **Bond Strength**  \n  Stronger intermolecular forces in solids/liquids keep molecules closer, increasing density.", "source": "Qwen 3 â‘،", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Define *internal energy* and explain why temperature alone does not determine it. (2 steps)", "answer": "- Step 1: **Definition**  \n  Internal energy $ U $ is the sum of all molecules' kinetic energy (KE) and potential energy (PE).  \n\n- Step 2: **Role of Phase**  \n  Temperature reflects only **average KE**. During phase changes (e.g., melting), KE remains constant (temperature plateaus), but PE increases (breaking bonds), so $ U $ rises.", "source": "Qwen 3 â‘،", "_id": "qwen_2_2", "judge_pick": true}, {"question": "Why does the temperature remain constant during a phase change? (4 steps)", "answer": "- Step 1: **Energy Use**  \n  Energy supplied during phase change (e.g., melting/boiling) is used to break intermolecular bonds (increase PE).  \n\n- Step 2: **No KE Change**  \n  Average kinetic energy (KE) remains constant because temperature is tied to KE.  \n\n- Step 3: **Plateau on Heating Curve**  \n  The energy input bypasses raising KE, instead increasing molecular separation (PE).  \n\n- Step 4: **Example**  \n  For water at 0آ°C (melting): Energy breaks lattice bonds; at 100آ°C (boiling): Energy fully separates molecules.", "source": "Qwen 3 â‘،", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Distinguish between *specific heat capacity* $ c $ and *specific latent heat* $ L $. (3 steps)", "answer": "- Step 1: **Specific Heat Capacity $ c $**  \n  Energy required to raise **temperature** of 1 kg of substance by 1 K (formula: $ \\Delta E = mc\\Delta\\theta $).  \n\n- Step 2: **Specific Latent Heat $ L $**  \n  Energy required to change **phase** of 1 kg of substance at constant temperature (formula: $ \\Delta E = L\\Delta m $).  \n\n- Step 3: **Key Difference**  \n  $ c $ involves temperature change; $ L $ involves phase change with no temperature change.", "source": "Qwen 3 â‘،", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why does boiling require significantly more energy than melting? (3 steps)", "answer": "- Step 1: **Bond Breaking**  \n  Melting loosens lattice bonds (medium energy input, $ L_f $). Boiling fully separates molecules (much higher energy, $ L_v $).  \n\n- Step 2: **Energy Values**  \n  For water: $ L_f \\approx 334 \\, \\text{kJ/kg} $, $ L_v \\approx 2.26 \\, \\text{MJ/kg} $ ($ L_v \\gg L_f $).  \n\n- Step 3: **Consequence**  \n  Boiling requires ~7أ— more energy than melting because all intermolecular forces must be overcome.", "source": "Qwen 3 â‘،", "_id": "qwen_2_5", "judge_pick": false}, {"question": "State the **three gas laws** and their assumptions. (3 steps)", "answer": "- Step 1: **Boyleâ€™s Law**  \n  $ pV = \\text{constant} $ at constant $ T $, $ n $.  \n  **Assumption**: Constant temperature and mass.  \n\n- Step 2: **Charlesâ€™s Law**  \n  $ \\frac{V}{T} = \\text{constant} $ at constant $ p $, $ n $.  \n  **Assumption**: Constant pressure and mass.  \n\n- Step 3: **Pressure Law**  \n  $ \\frac{p}{T} = \\text{constant} $ at constant $ V $, $ n $.  \n  **Assumption**: Constant volume and mass.  \n\n**All require Kelvin scale** for $ T $ (absolute temperature).", "source": "Qwen 3 â‘،", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Explain why the Kelvin scale is essential for gas laws. (3 steps)", "answer": "- Step 1: **Absolute Zero**  \n  At $ 0 \\, \\text{K} $, molecular kinetic energy (KE) is zero.  \n\n- Step 2: **Proportional Relationships**  \n  Gas laws depend on $ T \\propto \\text{KE} $. Using Celsius could yield negative temperatures (invalid for $ p $, $ V $, or $ n $).  \n\n- Step 3: **Example**  \n  Doubling $ T $ in Kelvin doubles average KE, but doubling Celsius (e.g., -10آ°C to -20آ°C) distorts physical meaning.", "source": "Qwen 3 â‘،", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Derive the kinetic theory equation $ pV = \\frac{1}{3}Nm\\overline{c^2} $. (4 steps)", "answer": "- Step 1: **Single Molecule Collision**  \n  A molecule in a cubic container has velocity component $ v_x $ and reflects off a wall: $ \\Delta p = 2mv_x $.  \n\n- Step 2: **Force on Wall**  \n  Time between collisions: $ \\Delta t = \\frac{2L}{v_x} $. Force: $ F = \\frac{\\Delta p}{\\Delta t} = \\frac{mv_x^2}{L} $.  \n\n- Step 3: **Total Force**  \n  For $ N $ molecules, average $ v_x^2 = \\frac{1}{3}\\overline{c^2} $ (isotropic motion). Total force: $ F = \\frac{Nmv_x^2}{L} $.  \n\n- Step 4: **Pressure**  \n  Pressure $ p = \\frac{F}{A} = \\frac{Nmv_x^2}{L^3} = \\frac{1}{3}\\frac{Nmv^2}{V} $. Final form:  \n  $$\n  pV = \\frac{1}{3}Nm\\overline{c^2}\n  $$", "source": "Qwen 3 â‘،", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How does the kinetic theory link temperature to molecular KE? (3 steps)", "answer": "- Step 1: **Ideal Gas Equation**  \n  Combine $ pV = NkT $ and $ pV = \\frac{1}{3}Nm\\overline{c^2} $.  \n\n- Step 2: **Equate RHS**  \n  $ \\frac{1}{3}Nm\\overline{c^2} = NkT \\Rightarrow \\frac{1}{2}m\\overline{c^2} = \\frac{3}{2}kT $.  \n\n- Step 3: **Conclusion**  \n  Average translational KE per molecule:  \n  $$\n  \\langle E_k \\rangle = \\frac{3}{2}kT\n  $$  \n  **Temperature is a direct measure of average molecular KE.**", "source": "Qwen 3 â‘،", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Why does the root-mean-square (rms) speed $ c_{\\text{rms}} $ use $ \\sqrt{\\overline{c^2}} $ instead of average speed? (2 steps)", "answer": "- Step 1: **Directional Cancellation**  \n  Average velocity $ \\langle v \\rangle = 0 $ (molecules move in all directions equally).  \n\n- Step 2: **RMS Advantages**  \n  $ c_{\\text{rms}} = \\sqrt{\\overline{c^2}} $ accounts for speed magnitude, avoiding cancellation, and appears in kinetic theory formulas (e.g., $ \\langle E_k \\rangle = \\frac{1}{2}m c_{\\text{rms}}^2 $).", "source": "Qwen 3 â‘،", "_id": "qwen_2_10", "judge_pick": false}, {"question": "What happens to gas pressure when temperature increases, and why? Use the \"three Fs\" concept. (4 steps)", "answer": "- Step 1: **Faster**  \n  Molecules gain KE, moving faster ($ c_{\\text{rms}} \\propto \\sqrt{T} $).  \n\n- Step 2: **Frequent Collisions**  \n  Faster molecules hit walls more frequently.  \n\n- Step 3: **Forceful Impacts**  \n  Higher momentum transfer per collision ($ \\Delta p = 2mv_x $).  \n\n- Step 4: **Pressure Increase**  \n  More force over the same area increases pressure ($ p = \\frac{F}{A} $).", "source": "Qwen 3 â‘،", "_id": "qwen_2_11", "judge_pick": false}, {"question": "List the **assumptions of an ideal gas** and explain why real gases deviate. (3 steps)", "answer": "- Step 1: **Ideal Assumptions**  \n  - Negligible molecular volume.  \n  - No intermolecular forces (except during collisions).  \n  - Elastic collisions.  \n  - Random motion.  \n  - Large number of molecules.  \n\n- Step 2: **Real Gas Deviations**  \n  At high pressure: molecules occupy significant volume.  \n  At low temperature: intermolecular forces become significant.  \n\n- Step 3: **Effect**  \n  Real gases condense into liquids at high pressure/low temperature, violating ideal assumptions.", "source": "Qwen 3 â‘،", "_id": "qwen_2_12", "judge_pick": false}, {"question": "Why is the Kelvin scale anchored at absolute zero? (3 steps)", "answer": "- Step 1: **Zero KE**  \n  Absolute zero ($ 0 \\, \\text{K} $) corresponds to minimum molecular KE.  \n\n- Step 2: **No Negative Temperatures**  \n  Avoids nonsensical negative values in gas laws (e.g., $ pV = nRT $).  \n\n- Step 3: **Proportional Scaling**  \n  Doubling $ T $ in Kelvin doubles average KE, ensuring validity of $ T \\propto \\langle E_k \\rangle $.", "source": "Qwen 3 â‘،", "_id": "qwen_2_13", "judge_pick": true}, {"question": "Explain the difference between **evaporation** and **boiling**. (3 steps)", "answer": "- Step 1: **Evaporation**  \n  Occurs only at the liquid surface at any temperature. High-energy molecules escape.  \n\n- Step 2: **Boiling**  \n  Occurs throughout the liquid at the boiling point. Vapor pressure equals atmospheric pressure.  \n\n- Step 3: **Energy Requirement**  \n  Boiling requires more energy (fully separates molecules); evaporation is a cooling process.", "source": "Qwen 3 â‘،", "_id": "qwen_2_14", "judge_pick": false}, {"question": "Why must you wait for thermal equilibrium in Boyleâ€™s law experiment? (2 steps)", "answer": "- Step 1: **Temperature Constant**  \n  Boyleâ€™s law assumes constant $ T $. Compressing gas generates heat, temporarily increasing $ T $.  \n\n- Step 2: **Equilibrium Ensures Accuracy**  \n  Waiting allows heat dissipation, restoring $ T $ for valid $ pV = \\text{constant} $ measurements.", "source": "Qwen 3 â‘،", "_id": "qwen_2_15", "judge_pick": false}, {"question": "How does the rms speed of gas molecules depend on molar mass and temperature? (3 steps)", "answer": "- Step 1: **Formula**  \n  $$\n  c_{\\text{rms}} = \\sqrt{\\frac{3kT}{m}} = \\sqrt{\\frac{3RT}{M}}\n  $$  \n  where $ M $ is molar mass.  \n\n- Step 2: **Temperature Dependence**  \n  $ c_{\\text{rms}} \\propto \\sqrt{T} $. Doubling $ T $ increases $ c_{\\text{rms}} $ by $ \\sqrt{2} \\approx 1.41 $.  \n\n- Step 3: **Mass Dependence**  \n  Lighter molecules (e.g., helium) have higher $ c_{\\text{rms}} $ than heavier ones (e.g., oxygen) at the same $ T $.", "source": "Qwen 3 â‘،", "_id": "qwen_2_16", "judge_pick": false}, {"question": "Describe the shape of an **isotherm** on a $ p-V $ graph for a gas. (2 steps)", "answer": "- Step 1: **Rectangular Hyperbola**  \n  Boyleâ€™s law ($ pV = \\text{constant} $) plots as a hyperbola. Higher isotherms (higher $ T $) lie further from the origin.  \n\n- Step 2: **Inverse Relationship**  \n  $ p \\propto \\frac{1}{V} $ at constant $ T $, so compressing the gas increases pressure non-linearly.", "source": "Qwen 3 â‘،", "_id": "qwen_2_17", "judge_pick": false}, {"question": "Why is the average velocity of gas molecules zero, but the average speed and rms speed are non-zero? (3 steps)", "answer": "- Step 1: **Vector vs. Scalar**  \n  Average velocity $ \\langle v \\rangle $ is a vector sum, canceling directions.  \n\n- Step 2: **Speed and RMS**  \n  Average speed $ \\langle c \\rangle $ and $ c_{\\text{rms}} $ are scalar magnitudes, unaffected by direction.  \n\n- Step 3: **Kinetic Theory Use**  \n  $ c_{\\text{rms}} $ is used in $ pV = \\frac{1}{3}Nm\\overline{c^2} $ because it incorporates squared speeds for pressure calculations.", "source": "Qwen 3 â‘،", "_id": "qwen_2_18", "judge_pick": true}, {"question": "What is the physical meaning of **absolute zero**? (3 steps)", "answer": "- Step 1: **Lowest Temperature**  \n  Theoretical lower limit where molecular KE is minimized (zero in classical theory).  \n\n- Step 2: **No Heat Transfer**  \n  At $ 0 \\, \\text{K} $, substances cannot lose further thermal energy.  \n\n- Step 3: **Experimental Access**  \n  Approachable via extrapolation of gas law data (e.g., $ V \\rightarrow 0 $ at $ 0 \\, \\text{K} $), though unattainable in practice.", "source": "Qwen 3 â‘،", "_id": "qwen_2_19", "judge_pick": false}, {"question": "Why is waterâ€™s specific heat capacity unusually high? (3 steps)", "answer": "- Step 1: **Hydrogen Bonding**  \n  Extensive hydrogen bonds require more energy to raise temperature.  \n\n- Step 2: **Energy Absorption**  \n  Energy is used to break/reform bonds rather than increase KE.  \n\n- Step 3: **Applications**  \n  Makes water effective for cooling (absorbs heat) or storing thermal energy (slow temperature change).", "source": "Qwen 3 â‘،", "_id": "qwen_2_20", "judge_pick": false}, {"question": "Explain the **heating curve** of water. Why do plateaus occur? (4 steps)", "answer": "- Step 1: **Heating Stages**  \n  Ice (-20آ°C) â†’ Melting (0آ°C plateau) â†’ Liquid (0آ°C to 100آ°C) â†’ Boiling (100آ°C plateau) â†’ Steam (100آ°C+).  \n\n- Step 2: **Melting Plateau**  \n  Energy breaks lattice bonds (PE increases, KE constant).  \n\n- Step 3: **Boiling Plateau**  \n  Energy fully separates molecules (PE rises, KE constant).  \n\n- Step 4: **Graph Plateaus**  \n  Temperature remains constant during phase changes (horizontal lines on graph).", "source": "Qwen 3 â‘،", "_id": "qwen_2_21", "judge_pick": false}, {"question": "How does the kinetic theory explain the **pressure law** ($ p \\propto T $ at constant $ V $)? (3 steps)", "answer": "- Step 1: **Temperature Increase**  \n  Molecules gain KE, moving faster.  \n\n- Step 2: **Collision Frequency/Force**  \n  Faster molecules hit walls more frequently and with greater force.  \n\n- Step 3: **Pressure Rise**  \n  Increased force per unit area leads to higher pressure ($ p = \\frac{F}{A} $).", "source": "Qwen 3 â‘،", "_id": "qwen_2_22", "judge_pick": false}, {"question": "Why is the molar gas constant $ R $ defined as $ R = kN_A $? (2 steps)", "answer": "- Step 1: **Boltzmann Constant**  \n  $ k $ is per-molecule energy (J/K/molecule).  \n\n- Step 2: **Avogadroâ€™s Number**  \n  $ N_A $ scales $ k $ to moles: $ R = kN_A \\approx 8.31 \\, \\text{J/molآ·K} $.", "source": "Qwen 3 â‘،", "_id": "qwen_2_23", "judge_pick": false}, {"question": "What is the significance of the **ideal gas equation** $ pV = nRT $? (3 steps)", "answer": "- Step 1: **Combines Gas Laws**  \n  Unifies Boyle, Charles, and Pressure Law into one equation.  \n\n- Step 2: **State Variable Relationship**  \n  Links pressure ($ p $), volume ($ V $), temperature ($ T $), and moles ($ n $) for a gas.  \n\n- Step 3: **Universal Applicability**  \n  Requires Kelvin for $ T $. Real gases approximate it at low pressure/high temperature.", "source": "Qwen 3 â‘،", "_id": "qwen_2_24", "judge_pick": false}, {"question": "How does the **average molecular KE** depend on molecular mass? (3 steps)", "answer": "- Step 1: **KE Formula**  \n  $ \\langle E_k \\rangle = \\frac{3}{2}kT $, independent of molecular mass.  \n\n- Step 2: **RMS Speed Mass Dependence**  \n  $ c_{\\text{rms}} \\propto \\sqrt{\\frac{1}{m}} $. Lighter molecules (e.g., Hâ‚‚) have higher $ c_{\\text{rms}} $ than heavy (e.g., Oâ‚‚) at same $ T $.  \n\n- Step 3: **Conclusion**  \n  All gases at same $ T $ have equal average KE, but different rms speeds.", "source": "Qwen 3 â‘،", "_id": "qwen_2_25", "judge_pick": false}], "count": 26}, "minimax_1": {"label": "MiniMax â‘ ", "cards": [{"question": "Why is it incorrect to say \"solid particles are stationary\"? (2 steps)", "answer": "- Step 1: Solid particles are **not stationary** â€” they constantly **vibrate about fixed positions** in the lattice.\n- Step 2: They are fixed in location (they don't translate), but they oscillate around their equilibrium positions. Only at absolute zero (0 K) would vibrational motion theoretically cease.", "source": "MiniMax â‘ ", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Define internal energy and state what two components contribute to it. (2 steps)", "answer": "- Step 1: **Internal energy (U)** is defined as the **sum of the kinetic and potential energies of all the molecules within a given mass of a substance**.\n- Step 2: It has two contributions:\n  + **Kinetic energy (KE)** â€” due to the motion of molecules (translation, rotation, vibration)\n  + **Potential energy (PE)** â€” due to intermolecular forces and molecular separation", "source": "MiniMax â‘ ", "_id": "minimax_1_1", "judge_pick": true}, {"question": "Temperature is a measure of what property of molecules? Why is this important for understanding thermal physics? (2 steps)", "answer": "- Step 1: Temperature is a **measure of the average kinetic energy of the molecules** in a substance.\n- Step 2: This is crucial because it links the **macroscopic property (temperature)** to the **microscopic motion of particles**. When you heat a gas at constant volume, the molecules gain kinetic energy (move faster), and the temperature rises proportionally.", "source": "MiniMax â‘ ", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What is absolute zero? State two equivalent definitions. (2 steps)", "answer": "- Step 1: **Absolute zero** is the **lowest possible temperature**, equal to **0 K** or **âˆ’273.15آ°C**.\n- Step 2: Two equivalent definitions:\n  + The temperature at which molecules have **zero (minimum) kinetic energy**\n  + The temperature at which, theoretically, all molecular motion would cease", "source": "MiniMax â‘ ", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Why must we use Kelvin (not Celsius) in gas law calculations such as pV = nRT? (2 steps)", "answer": "- Step 1: The Kelvin scale is **anchored at absolute zero** (0 K = minimum possible kinetic energy), whereas Celsius can be negative, which would give nonsensical predictions in gas equations.\n- Step 2: Using Kelvin ensures that **doubling the temperature truly doubles the average molecular kinetic energy** (since E_k âˆ‌ T). The gas laws are proportional relationships that require an absolute temperature scale.\n\nThe conversion: $$T/K = خ¸/آ°C + 273.15$$ (use +273 for routine work)", "source": "MiniMax â‘ ", "_id": "minimax_1_4", "judge_pick": false}, {"question": "During a phase change (e.g., melting or boiling), why does temperature stay constant even when energy is being supplied? (3 steps)", "answer": "- Step 1: When a substance changes phase, the **energy supplied is used to break (or form) intermolecular bonds**, not to increase the kinetic energy of the molecules.\n- Step 2: Since temperature is a measure of **average kinetic energy only**, and kinetic energy is not changing during the phase change, the **temperature remains constant**.\n+ This appears as a **flat plateau** on a heating curve â€” the energy goes into **potential energy** (increasing separation), not kinetic energy.\n- Step 3: This is why boiling requires much more energy than melting (for water, L_v â‰ˆ 2.26 MJ/kg vs L_f â‰ˆ 334 kJ/kg â€” about 7أ— more).", "source": "MiniMax â‘ ", "_id": "minimax_1_5", "judge_pick": true}, {"question": "Distinguish between evaporation and boiling in terms of where the phase change occurs and the temperature dependence. (2 steps)", "answer": "- Step 1: **Boiling** occurs throughout the bulk of the liquid at a **fixed temperature** (the boiling point) when the vapour pressure equals atmospheric pressure.\n- Step 2: **Evaporation** occurs **only at the liquid surface** at **any temperature**. High-energy molecules in the tail of the speed distribution escape.", "source": "MiniMax â‘ ", "_id": "minimax_1_6", "judge_pick": true}, {"question": "Write the formula for heat energy causing a temperature change, and state what each symbol represents. (2 steps)", "answer": "- Step 1: $$\\Delta E = m c \\Delta \\theta$$\n- Step 2: Where:\n  + $\\Delta E$ = thermal energy transferred (J)\n  + $m$ = mass (kg)\n  + $c$ = specific heat capacity (Jآ·kgâپ»آ¹آ·Kâپ»آ¹)\n  + $\\Delta \\theta$ = temperature change (K or آ°C â€” same magnitude)", "source": "MiniMax â‘ ", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Write the formula for heat energy during a phase change, and state what each symbol represents. (2 steps)", "answer": "- Step 1: $$\\Delta E = L \\Delta m$$\n- Step 2: Where:\n  + $\\Delta E$ = thermal energy transferred (J)\n  + $L$ = specific latent heat (Jآ·kgâپ»آ¹)\n  + $\\Delta m$ = mass changed (kg)\n\nNote: There is **no temperature change term** (خ”خ¸ = 0) because temperature stays constant during phase change.", "source": "MiniMax â‘ ", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Why does water have an unusually high specific heat capacity (â‰ˆ 4200 Jآ·kgâپ»آ¹آ·Kâپ»آ¹)? (2 steps)", "answer": "- Step 1: Water's high specific heat capacity is due to **hydrogen bonding** between Hâ‚‚O molecules.\n- Step 2: A lot of energy is required to break these hydrogen bonds before the kinetic energy (and thus temperature) can increase. This makes water an excellent coolant and heat storage medium.", "source": "MiniMax â‘ ", "_id": "minimax_1_9", "judge_pick": false}, {"question": "List the assumptions made in the kinetic theory model of an ideal gas. Give at least five. (2 steps)", "answer": "- Step 1: The assumptions of an ideal gas are:\n  + The molecules occupy **negligible volume** compared to the container volume\n  + **Intermolecular forces are negligible** except during the very brief instant of collision\n  + **Collisions are perfectly elastic** â€” no kinetic energy is lost\n  + The **duration of each collision is negligible** compared to the time between collisions\n  + Molecular motion is **random** in direction and speed, obeying Newton's laws\n  + There are a **very large number of molecules** so that statistics can be applied", "source": "MiniMax â‘ ", "_id": "minimax_1_10", "judge_pick": false}, {"question": "State Boyle's law in words and as an equation, including the conditions under which it applies. (2 steps)", "answer": "- Step 1: **Boyle's Law**: For a fixed mass of gas at **constant temperature**, the **pressure is inversely proportional to volume**.\n- Step 2: $$p_1 V_1 = p_2 V_2$$ or $$pV = \\text{constant}$$\n  + Conditions: **constant temperature (T)** and **fixed number of molecules (N)**", "source": "MiniMax â‘ ", "_id": "minimax_1_11", "judge_pick": false}, {"question": "State Charles's law in words and as an equation, including the conditions. (2 steps)", "answer": "- Step 1: **Charles's Law**: For a fixed mass of gas at **constant pressure**, the **volume is proportional to absolute temperature**.\n- Step 2: $$\\frac{V_1}{T_1} = \\frac{V_2}{T_2}$$ or $$V \\propto T$$\n  + Conditions: **constant pressure (p)** and **fixed number of molecules (N)**", "source": "MiniMax â‘ ", "_id": "minimax_1_12", "judge_pick": false}, {"question": "State the pressure law in words and as an equation, including the conditions. (2 steps)", "answer": "- Step 1: **Pressure Law**: For a fixed mass of gas at **constant volume**, the **pressure is proportional to absolute temperature**.\n- Step 2: $$\\frac{p_1}{T_1} = \\frac{p_2}{T_2}$$ or $$p \\propto T$$\n  + Conditions: **constant volume (V)** and **fixed number of molecules (N)**", "source": "MiniMax â‘ ", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Write the ideal gas equation in both the molar form and the molecular form, defining all symbols. (2 steps)", "answer": "- Step 1: **Molar form**: $$pV = nRT$$\n  + $p$ = pressure (Pa)\n  + $V$ = volume (mآ³)\n  + $n$ = number of moles\n  + $R$ = molar gas constant = 8.31 Jآ·molâپ»آ¹آ·Kâپ»آ¹\n  + $T$ = absolute temperature (K)\n\n- Step 2: **Molecular form**: $$pV = NkT$$\n  + $N$ = number of molecules\n  + $k$ = Boltzmann's constant = 1.38 أ— 10âپ»آ²آ³ Jآ·Kâپ»آ¹\n  + Note: $k = R/N_A$ where $N_A$ = 6.02 أ— 10آ²آ³ molâپ»آ¹", "source": "MiniMax â‘ ", "_id": "minimax_1_14", "judge_pick": false}, {"question": "Using kinetic theory, derive the equation pV = â…“Nmâں¨cآ²âں©. Explain each step briefly. (3 steps)", "answer": "- Step 1: Consider a molecule colliding elastically with a wall perpendicular to the x-axis. The change in momentum per collision is $\\Delta p = 2mv_x$. The time between collisions with that wall is $\\Delta t = 2L/v_x$.\n- Step 2: The average force from one molecule is $F_1 = \\Delta p/\\Delta t = mv_x^2/L$. Summing over N molecules and using isotropy (motion equally distributed in three directions, so âں¨v_xآ²âں© = â…“âں¨cآ²âں©), the total force is $F = Nmâں¨v_xآ²âں©/L$.\n- Step 3: Pressure $p = F/A = F/L^2 = Nmâں¨v_xآ²âں©/L^3 = Nmâں¨v_xآ²âں©/V = \\frac{1}{3}\\frac{Nm\\langle c^2 \\rangle}{V}$, hence $$pV = \\frac{1}{3}Nm\\langle c^2 \\rangle$$", "source": "MiniMax â‘ ", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Starting from pV = NkT and pV = â…“Nmâں¨cآ²âں©, derive the expression for average molecular kinetic energy in terms of temperature. (3 steps)", "answer": "- Step 1: Equate the right-hand sides of the two equations: $$\\frac{1}{3}Nm\\langle c^2 \\rangle = NkT$$\n- Step 2: Cancel N and multiply both sides by 3/2: $$\\frac{1}{2}m\\langle c^2 \\rangle = \\frac{3}{2}kT$$\n- Step 3: The left-hand side is the **average translational kinetic energy** of one molecule. Therefore: $$\\boxed{E_k = \\frac{1}{2}m\\langle c^2 \\rangle = \\frac{3}{2}kT}$$\n  + This shows that **average molecular KE is directly proportional to absolute temperature** (in K).", "source": "MiniMax â‘ ", "_id": "minimax_1_16", "judge_pick": false}, {"question": "If you double the temperature (in Kelvin) of an ideal gas, by what factor does the average kinetic energy of its molecules change? By what factor does the rms speed change? (2 steps)", "answer": "- Step 1: **Average KE doubles** (since E_k âˆ‌ T). If T â†’ 2T, then E_k â†’ 2E_k.\n- Step 2: **rms speed increases by âˆڑ2** (since c_rms âˆ‌ âˆڑT). If T â†’ 2T, then c_rms â†’ âˆڑ2 أ— c_rms â‰ˆ 1.41 أ— original speed.\n  + This is a common misconception: doubling T does **not** double the speed.", "source": "MiniMax â‘ ", "_id": "minimax_1_17", "judge_pick": false}, {"question": "Write the expression for root-mean-square (rms) speed of gas molecules in two forms, and explain what \"rms\" means. (2 steps)", "answer": "- Step 1: $$c_{rms} = \\sqrt{\\langle c^2 \\rangle} = \\sqrt{\\frac{3kT}{m}} = \\sqrt{\\frac{3RT}{M}}$$\n  + $M$ = molar mass in kgآ·molâپ»آ¹\n  + $m$ = mass of one molecule in kg\n\n- Step 2: **rms** stands for **root-mean-square**: you square the speeds, find the mean, then take the square root. The **average velocity is zero** (random motion in all directions cancels), so we use rms to get a meaningful measure of typical speed.", "source": "MiniMax â‘ ", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Explain qualitatively, using kinetic theory, why the pressure of a fixed volume of gas increases when the gas is heated. Use the \"three Fs\" reasoning. (3 steps)", "answer": "- Step 1: **Faster** â€” molecules gain kinetic energy and move faster (E_k âˆ‌ T).\n- Step 2: **More frequently** â€” because they move faster, molecules hit the container walls more often per second.\n- Step 3: **More force per hit** â€” each collision transfers more momentum to the wall (خ”p = 2mv increases with v).\n+ More force applied more often over the same area = greater pressure. This gives the pressure law: at constant V, p âˆ‌ T.", "source": "MiniMax â‘ ", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A sample of an ideal gas is heated at constant volume. What happens to: (i) the average kinetic energy of molecules, (ii) the rms speed, (iii) the pressure? (3 steps)", "answer": "- Step 1: **(i) Average KE** â€” **increases** proportionally to T (E_k = آ³âپ„â‚‚kT).\n- Step 2: **(ii) rms speed** â€” **increases** proportionally to âˆڑT (c_rms = âˆڑ(3kT/m)).\n- Step 3: **(iii) Pressure** â€” **increases** proportionally to T (Pressure Law: p/T = constant at constant V).", "source": "MiniMax â‘ ", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Two different gases at the same temperature have molecules of different masses. Compare their (i) average kinetic energies, (ii) rms speeds. (2 steps)", "answer": "- Step 1: **(i) Average KE** â€” **Identical** for both gases at the same temperature. Since E_k = آ³âپ„â‚‚kT depends only on T, not on molecular mass.\n- Step 2: **(ii) rms speed** â€” **Different**. Since c_rms = âˆڑ(3kT/m), lighter molecules move faster. For the same KE, v âˆ‌ 1/âˆڑm.", "source": "MiniMax â‘ ", "_id": "minimax_1_21", "judge_pick": false}, {"question": "In the Boyle's law experiment (Core Practical 14), why must you wait several seconds after each mass is added before taking a volume reading? (2 steps)", "answer": "- Step 1: Adding a mass (or changing pressure) does **work on the gas** as it compresses/expands, which changes its **internal energy** momentarily.\n- Step 2: This causes a **slight temperature change**. Boyle's law requires **constant temperature** (isothermal conditions), so you must wait for the gas to **return to thermal equilibrium with the surroundings** before reading V.", "source": "MiniMax â‘ ", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Define specific heat capacity and give its units. Why does it differ between materials? (2 steps)", "answer": "- Step 1: **Specific heat capacity (c)** is defined as the **energy required to raise the temperature of one kilogram of a substance by one kelvin**.\n  + Units: **Jآ·kgâپ»آ¹آ·Kâپ»آ¹**\n\n- Step 2: It varies between materials because it depends on **molecular structure** â€” specifically, on how many **degrees of freedom** (translational, rotational, vibrational) the molecules can store energy in, and on how strongly they interact.", "source": "MiniMax â‘ ", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Define specific latent heat of fusion and of vaporisation. (2 steps)", "answer": "- Step 1: **Specific latent heat of fusion (L_f)**: the thermal energy required to **convert one kilogram of solid to liquid** with **no change in temperature**.\n- Step 2: **Specific latent heat of vaporisation (L_v)**: the thermal energy required to **convert one kilogram of liquid to gas** with **no change in temperature**.", "source": "MiniMax â‘ ", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Why is the latent heat of vaporisation much larger than the latent heat of fusion for the same substance? (2 steps)", "answer": "- Step 1: **Melting (fusion)** only loosens the lattice enough for molecules to flow past each other â€” the intermolecular forces are still substantially present.\n- Step 2: **Boiling (vaporisation)** requires molecules to be **completely separated** from one another â€” essentially all intermolecular forces must be overcome. For water, L_v â‰ˆ 2.26 MJ/kg is about **7 times** L_f â‰ˆ 334 kJ/kg.", "source": "MiniMax â‘ ", "_id": "minimax_1_25", "judge_pick": false}, {"question": "A kettle supplies power P to a mass m of water at its boiling point. Derive an expression for the time taken to completely boil away the water. (2 steps)", "answer": "- Step 1: Energy required: $E = m L_v$ (latent heat of vaporisation)\n- Step 2: Power $P = E/t$, so time $t = E/P = \\dfrac{m L_v}{P}$\n  + Note: This assumes all water is already at 100آ°C (boiling point); the heating phase to reach boiling is separate.", "source": "MiniMax â‘ ", "_id": "minimax_1_26", "judge_pick": false}, {"question": "What is meant by an \"ideal gas\"? How does a real gas differ from an ideal gas, and under what conditions does a real gas behave most like an ideal gas? (2 steps)", "answer": "- Step 1: An **ideal gas** is a theoretical gas that **obeys pV = nRT exactly** at all pressures and temperatures, assuming **negligible molecular volume** and **negligible intermolecular forces** (except during elastic collisions).\n- Step 2: Real gases deviate from ideal behaviour. They behave **most like an ideal gas at low pressure and high temperature**, where molecules are far apart, fast, and interact very little. At high pressure/low temperature, intermolecular forces become significant.", "source": "MiniMax â‘ ", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In the heating curve of water from -20آ°C to 120آ°C at constant heating rate, label the five distinct regions and state what is happening in each. (3 steps)", "answer": "- Step 1: **(1) Heating solid ice** (â€“20آ°C to 0آ°C): Energy increases KE of vibrating particles; temperature rises.\n- Step 2: **(2) Melting/flat plateau** (at 0آ°C): Energy breaks intermolecular bonds (PE increases); temperature constant.\n  + **(3) Heating liquid water** (0آ°C to 100آ°C): Energy increases KE; temperature rises.\n- Step 3: **(4) Boiling/flat plateau** (at 100آ°C): Energy completely separates molecules (PE increases greatly); temperature constant.\n  + **(5) Heating steam** (100آ°C to 120آ°C): Energy increases KE; temperature rises.", "source": "MiniMax â‘ ", "_id": "minimax_1_28", "judge_pick": false}, {"question": "A car tyre has gauge pressure p_gauge at temperature Tâ‚پ. After heating to Tâ‚‚ (volume unchanged), the gauge pressure increases. Show that the new gauge pressure is p_gauge' = p_gauge أ— (Tâ‚‚/Tâ‚پ). (3 steps)", "answer": "- Step 1: Initial absolute pressure: $p_{abs,1} = p_{atm} + p_{gauge,1}$\n- Step 2: Using pressure law at constant V: $\\dfrac{p_{abs,1}}{T_1} = \\dfrac{p_{abs,2}}{T_2}$, so $p_{abs,2} = p_{abs,1} \\times \\dfrac{T_2}{T_1}$\n- Step 3: New gauge pressure: $p_{gauge,2} = p_{abs,2} - p_{atm} = (p_{atm} + p_{gauge,1})\\dfrac{T_2}{T_1} - p_{atm}$\n  + For small p_gauge relative to p_atm, this approximates to $p_{gauge,2} \\approx p_{gauge,1} \\times \\dfrac{T_2}{T_1}$", "source": "MiniMax â‘ ", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Explain what is meant by \"root-mean-square speed\" and why we use it instead of average speed for gas molecules. (2 steps)", "answer": "- Step 1: **rms speed** is defined as $c_{rms} = \\sqrt{\\langle c^2 \\rangle}$ â€” square the speeds, find the mean, take the square root.\n- Step 2: We cannot use **average velocity** because it is **zero** (molecules move randomly in all directions, cancelling out). Even the **arithmetic mean speed** $\\langle c \\rangle$ is less commonly used because rms arises naturally from the kinetic theory derivation linking to temperature.", "source": "MiniMax â‘ ", "_id": "minimax_1_30", "judge_pick": false}, {"question": "A fixed mass of ideal gas is compressed isothermally to half its original volume. What happens to the pressure? What if the compression is adiabatic (no heat exchange)? (2 steps)", "answer": "- Step 1: **Isothermal compression** (T constant): By Boyle's law, $p_2 = p_1 \\times (V_1/V_2) = 2p_1$. Pressure doubles.\n- Step 2: **Adiabatic compression** (no heat transfer, Q = 0): Work is done on the gas, increasing its internal energy. Temperature rises, so pressure increases by more than the isothermal case. The relationship is $pV^\\gamma = \\text{constant}$ where $\\gamma = C_p/C_v$.", "source": "MiniMax â‘ ", "_id": "minimax_1_31", "judge_pick": false}, {"question": "A weather balloon rises through the atmosphere. As it rises, the external pressure decreases. If the balloon is flexible and the temperature is roughly constant, what happens to its volume? (2 steps)", "answer": "- Step 1: As the balloon rises, external pressure drops. The gas inside expands (doing work against the surroundings).\n- Step 2: At **roughly constant temperature** (isothermal), Boyle's law applies: $pV = \\text{constant}$. As $p$ decreases, $V$ increases proportionally. The balloon expands until internal pressure equals external pressure.", "source": "MiniMax â‘ ", "_id": "minimax_1_32", "judge_pick": false}, {"question": "At absolute zero (0 K), what would theoretically happen to the pressure of an ideal gas in a fixed volume? What about a real gas? (2 steps)", "answer": "- Step 1: For an **ideal gas**, at 0 K, molecular kinetic energy is zero, so there are no collisions with the walls â€” pressure would be **zero** (p âˆ‌ T).\n- Step 2: For a **real gas**, intermolecular forces become significant at very low temperatures. Before reaching 0 K, the gas would **liquefy or solidify**, and the ideal gas law no longer applies. Pressure would not be zero in the same way.", "source": "MiniMax â‘ ", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Explain why a helium-filled balloon rises in air, using the concept of upthrust. (2 steps)", "answer": "- Step 1: The balloon experiences an **upthrust (buoyant force)** equal to the **weight of the displaced fluid** (Archimedes' principle): $F_{up} = \\rho_{air} V_{displaced} g$\n- Step 2: For the balloon to rise, upthrust must exceed the weight of the balloon plus helium. Since helium has much **lower density** than air, the upthrust (which depends on displaced air, not helium) exceeds the total weight, creating a net upward force.", "source": "MiniMax â‘ ", "_id": "minimax_1_34", "judge_pick": false}, {"question": "State Stokes' law for a sphere falling through a fluid, defining all symbols. When does this law apply? (2 steps)", "answer": "- Step 1: **Stokes' law**: $$F = 6\\pi\\eta r v$$\n  + $\\eta$ = dynamic viscosity of the fluid (Paآ·s)\n  + $r$ = radius of the sphere (m)\n  + $v$ = velocity of the sphere relative to the fluid (m/s)\n\n- Step 2: This law applies only to **small spheres at low (laminar) speeds** where flow remains streamlined. At high speeds, flow becomes turbulent and drag is proportional to $v^2$.", "source": "MiniMax â‘ ", "_id": "minimax_1_35", "judge_pick": false}, {"question": "What is terminal velocity? Under what conditions does a falling sphere in a fluid reach terminal velocity? (2 steps)", "answer": "- Step 1: **Terminal velocity** is the constant maximum velocity reached when the **net force on a moving object is zero**.\n- Step 2: For a sphere falling through a fluid: when **weight âˆ’ upthrust âˆ’ viscous drag = 0**, i.e., when the downward driving force (weight minus upthrust) is exactly balanced by the upward drag force.", "source": "MiniMax â‘ ", "_id": "minimax_1_36", "judge_pick": false}, {"question": "A solid object is placed in a fluid. State the conditions for the object to (i) float, (ii) sink, (iii) remain suspended. (2 steps)", "answer": "- Step 1: **(i) Float**: Upthrust > Weight â†’ $\\rho_{fluid} > \\rho_{object}$\n- Step 2: **(ii) Sink**: Upthrust < Weight â†’ $\\rho_{fluid} < \\rho_{object}$\n  + **(iii) Suspended** (neutral buoyancy): Upthrust = Weight â†’ $\\rho_{fluid} = \\rho_{object}$", "source": "MiniMax â‘ ", "_id": "minimax_1_37", "judge_pick": false}, {"question": "The density of a substance is دپ. A sample has mass m. Write the expression for its volume V. If the sample is a cube of side length a, write V in terms of a. (2 steps)", "answer": "- Step 1: $$\\rho = \\frac{m}{V}$$ so $$V = \\frac{m}{\\rho}$$\n- Step 2: For a cube of side $a$, volume $V = a^3$ (where $a$ must be in metres for SI consistency)", "source": "MiniMax â‘ ", "_id": "minimax_1_38", "judge_pick": false}, {"question": "When converting between different units in gas calculations, what are the key conversions to remember for (i) volume, (ii) pressure, (iii) temperature? (2 steps)", "answer": "- Step 1: **(i) Volume**: $1 \\, \\text{cm}^3 = 10^{-6} \\, \\text{m}^3$; $1 \\, \\text{L} = 1 \\, \\text{dm}^3 = 10^{-3} \\, \\text{m}^3$\n- Step 2: **(ii) Pressure**: $1 \\, \\text{kPa} = 10^3 \\, \\text{Pa}$; $1 \\, \\text{MPa} = 10^6 \\, \\text{Pa}$; atmospheric pressure â‰ˆ $1.01 \\times 10^5$ Pa\n  + **(iii) Temperature**: Always convert Celsius to Kelvin: $T(K) = \\theta(آ°C) + 273.15$ (use +273 for routine work)", "source": "MiniMax â‘ ", "_id": "minimax_1_39", "judge_pick": false}, {"question": "During a phase change from liquid to gas at constant temperature, does the internal energy of the substance change? Explain your answer. (2 steps)", "answer": "- Step 1: **Yes**, internal energy **increases** during a phase change at constant temperature.\n- Step 2: Although kinetic energy (and thus temperature) stays constant, the energy supplied goes into **breaking intermolecular bonds**, which increases the **potential energy** component of internal energy. Since $U = KE + PE$, and PE increases, U increases.", "source": "MiniMax â‘ ", "_id": "minimax_1_40", "judge_pick": false}, {"question": "A real gas is cooled at high pressure. Explain why it may deviate significantly from ideal gas behaviour, and describe what phase it might become. (2 steps)", "answer": "- Step 1: At **high pressure**, gas molecules are close together, so **intermolecular forces are significant** (not negligible). At **low temperature**, molecular speeds are low, so forces have longer to act.\n- Step 2: Under these conditions, the **ideal gas assumptions break down** â€” the gas may **liquefy or solidify**. Real gases deviate most from ideal behaviour at high pressure and low temperature.", "source": "MiniMax â‘ ", "_id": "minimax_1_41", "judge_pick": false}, {"question": "Sketch a pressure-volume (p-V) diagram for an ideal gas at two different temperatures, Tâ‚پ and Tâ‚‚ where Tâ‚‚ > Tâ‚پ. Label the axes and the curves. (2 steps)", "answer": "- Step 1: The diagram shows **rectangular hyperbolas** (pV = constant). Each curve is an **isotherm** (constant temperature).\n- Step 2: The **higher-temperature isotherm (Tâ‚‚)** lies **further from the origin** than the lower-temperature isotherm (Tâ‚پ), because at the same volume, higher temperature gives higher pressure.\n  + Axes: x-axis = Volume V (mآ³), y-axis = Pressure p (Pa)", "source": "MiniMax â‘ ", "_id": "minimax_1_42", "judge_pick": false}, {"question": "In the context of gas pressure, what is meant by an elastic collision? Why is this assumption important for kinetic theory? (2 steps)", "answer": "- Step 1: An **elastic collision** is one in which **no kinetic energy is lost** â€” total kinetic energy before = total kinetic energy after the collision.\n- Step 2: This assumption is crucial because it ensures that the **total energy of the gas remains constant** (no energy losses to heat), allowing us to derive the relationships between pressure, volume, temperature, and molecular motion without accounting for energy dissipation.", "source": "MiniMax â‘ ", "_id": "minimax_1_43", "judge_pick": false}, {"question": "Why does the rms speed of gas molecules depend on the molar mass of the gas? Explain using the formula. (2 steps)", "answer": "- Step 1: From $c_{rms} = \\sqrt{3RT/M}$, we see $c_{rms} \\propto \\sqrt{1/M}$.\n- Step 2: Lighter molecules (smaller M) have **higher rms speeds** at the same temperature because, for a given temperature, all gases have the **same average kinetic energy** (E_k = آ³âپ„â‚‚kT). Since $E_k = \\frac{1}{2}mc_{rms}^2$, lighter mass m must be compensated by higher speed.", "source": "MiniMax â‘ ", "_id": "minimax_1_44", "judge_pick": false}, {"question": "What would happen to the pressure in a sealed container if the number of gas molecules (N) is doubled, while volume and temperature remain constant? (2 steps)", "answer": "- Step 1: From the ideal gas equation $pV = NkT$, at constant V and T: $p \\propto N$.\n- Step 2: Therefore, doubling the number of molecules **doubles the pressure** (p â†’ 2p). More molecules mean more collisions per second with the walls.", "source": "MiniMax â‘ ", "_id": "minimax_1_45", "judge_pick": false}, {"question": "A fixed mass of ideal gas undergoes the following changes: first heated at constant volume, then compressed at constant temperature. Describe the p-V relationship in each stage. (2 steps)", "answer": "- Step 1: **Stage 1** (heated at constant V): Pressure increases linearly with temperature (Pressure Law: p âˆ‌ T). On a p-V diagram, this is a vertical line upward.\n- Step 2: **Stage 2** (compressed at constant T): Pressure increases inversely with volume (Boyle's Law: p âˆ‌ 1/V). On a p-V diagram, this follows a rectangular hyperbola (isotherm) moving to lower volumes.", "source": "MiniMax â‘ ", "_id": "minimax_1_46", "judge_pick": false}, {"question": "Explain why the specific latent heat of vaporisation is always greater than the specific latent heat of fusion for the same substance, in terms of molecular structure. (2 steps)", "answer": "- Step 1: In the **liquid state**, molecules are still attracted to each other by significant intermolecular forces â€” they are close but can move past one another.\n- Step 2: To vaporise, molecules must be **completely separated**, requiring essentially **all intermolecular forces to be overcome**. To melt, molecules only need enough energy to break free from their fixed positions â€” less energy is needed. Hence L_v > L_f.", "source": "MiniMax â‘ ", "_id": "minimax_1_47", "judge_pick": true}, {"question": "A student says: \"Since temperature is a measure of kinetic energy, internal energy must equal temperature.\" Explain why this statement is incorrect. (2 steps)", "answer": "- Step 1: **Temperature is a measure of average kinetic energy**, not total internal energy.\n- Step 2: Internal energy = KE + PE. During a phase change, PE changes while KE (and thus temperature) stays constant â€” internal energy changes but temperature does not. Also, at the same temperature, a larger mass has more internal energy (more molecules).", "source": "MiniMax â‘ ", "_id": "minimax_1_48", "judge_pick": false}], "count": 49}, "minimax_2": {"label": "MiniMax â‘،", "cards": [{"question": "Describe the particle arrangement, intermolecular bonds, and motion for a solid. (3 steps)", "answer": "- Step 1: Arrangement â€” particles in a solid are **close together** in a **regular/ordered pattern** (lattice structure).\n- Step 2: Bonds â€” **strong** intermolecular forces hold particles in position; these are strong enough to maintain the fixed shape.\n+ For most substances, particles get closer together when solidifying (water is the exception â€” ice is less dense than liquid water).\n- Step 3: Motion â€” particles **vibrate about fixed positions**; they do not translate or flow. Even at room temperature, solid particles are always vibrating â€” only at absolute zero (0 K) would vibration theoretically stop.\n\n**Takeaway:** Solids have definite shape and volume because particles are locked in place by strong bonds, only able to vibrate in position.", "source": "MiniMax â‘،", "_id": "minimax_2_0", "judge_pick": true}, {"question": "How do the particle arrangement and motion of a liquid differ from a gas? (2 steps)", "answer": "- Step 1: Arrangement â€” liquid particles are **close together** (like solids), but in an **irregular/random pattern** rather than a regular lattice.\n+ Gas particles are **far apart**, with large empty spaces between them.\n- Step 2: Motion â€” liquid particles **slide over one another** and can flow (translation), but remain constrained by moderate intermolecular forces. Gas particles move in **fast, random, straight-line paths** until they collide with other particles or the container walls.\n\n**Takeaway:** The key difference is that liquids have definite volume but take the shape of their container, while gases have neither definite volume nor shape.", "source": "MiniMax â‘،", "_id": "minimax_2_1", "judge_pick": false}, {"question": "A student says \"solid particles are stationary.\" What's wrong with this statement, and how would you correct it?", "answer": "- The statement is **partially correct but misleading**. Solid particles are **not stationary** â€” they constantly vibrate about their fixed positions.\n- The correct description: particles in a solid **vibrate about fixed positions**. They stay in the same location relative to their neighbors (no translation), but they are never completely still except at absolute zero (0 K).\n- This misconception arises because we can't see the vibration with the naked eye â€” it appears stationary macroscopically.\n\n**Takeaway:** Use \"vibrate about fixed positions\" rather than \"stationary\" to describe solid particle motion.", "source": "MiniMax â‘،", "_id": "minimax_2_2", "judge_pick": true}, {"question": "Define internal energy and explain what it consists of. (2 steps)", "answer": "- Step 1: Definition â€” **Internal energy (U)** is the sum of the kinetic and potential energies of all the molecules within a given mass of a substance.\n- Step 2: Components:\n+ **Kinetic energy (KE)** â€” from the motion of molecules (translation, rotation, vibration); this is what we measure as temperature.\n+ **Potential energy (PE)** â€” stored in intermolecular forces/bonds between molecules; depends on molecular separation and bond configuration.\n\n**Takeaway:** Internal energy is NOT just kinetic energy â€” it includes both KE and PE contributions. During a phase change, internal energy changes even though temperature stays constant.", "source": "MiniMax â‘،", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A sealed container of gas is heated. Does the internal energy increase, and if so, why? What about during a phase change like boiling?", "answer": "- When heating a gas (or any substance) without phase change: **internal energy increases** because temperature rises, meaning average molecular kinetic energy increases.\n- During a phase change (e.g., boiling at 100آ°C): **internal energy still increases**, but temperature remains constant. The added energy goes into **breaking intermolecular bonds** â€” increasing the **potential energy** component, not kinetic energy.\n+ This is why the heating curve has flat plateaus at melting and boiling points â€” energy is being used to change phase (PE), not to raise temperature (KE).\n\n**Takeaway:** Temperature measures average KE only. During phase changes, internal energy rises via PE while KE (and thus temperature) stays constant.", "source": "MiniMax â‘،", "_id": "minimax_2_4", "judge_pick": false}, {"question": "Why is temperature a measure of average kinetic energy, not total internal energy?", "answer": "- Temperature is defined as a **measure of the average kinetic energy of the molecules** in a substance.\n- It ignores the potential energy component entirely. Two substances at the same temperature have the same average molecular KE, but could have very different PE (e.g., 100آ°C steam vs. 100آ°C boiling water â€” same temperature, very different PE).\n- This is why we use Kelvin for gas laws â€” the Kelvin scale is anchored at absolute zero (zero average KE), making the relationship between T and KE linear and proportional.\n\n**Takeaway:** Temperature directly probes the kinetic energy part of internal energy, not the total. PE is related to phase and intermolecular forces, not temperature.", "source": "MiniMax â‘،", "_id": "minimax_2_5", "judge_pick": false}, {"question": "What is absolute zero? Give both a definition and its value in Kelvin and Celsius.", "answer": "- **Definition:** The temperature at which molecules in a substance have **zero kinetic energy** (the minimum possible kinetic energy). It is the **lowest temperature possible** theoretically.\n- **Value:** 0 K = **âˆ’273.15آ°C** (or simply âˆ’273آ°C for routine calculations).\n- Absolute zero is the x-intercept when extrapolating a pressure-temperature or volume-temperature graph for an ideal gas back to zero pressure/volume.\n\n**Takeaway:** At absolute zero, all molecular motion would theoretically cease. It's the foundation of the Kelvin scale used in all gas law calculations.", "source": "MiniMax â‘،", "_id": "minimax_2_6", "judge_pick": false}, {"question": "Convert 27آ°C to Kelvin. Why must we convert to Kelvin before using the ideal gas equation?", "answer": "- Step 1: Conversion: T(K) = خ¸(آ°C) + 273.15 = 27 + 273.15 = **300 K** (or 300 K using +273 for routine work).\n- Step 2: Why Kelvin is essential for gas laws:\n+ The gas laws (Boyle's, Charles's, pressure law, pV = nRT) are **proportional relationships** â€” they require a scale where zero represents truly zero (no molecular motion).\n+ Celsius has arbitrary zero points and can be negative, which would give nonsensical results (e.g., negative volume or pressure predictions).\n+ Kelvin's absolute zero anchors the scale so that **doubling T in Kelvin truly doubles the average molecular KE**.\n\n**Takeaway:** Always use Kelvin (not Celsius) in any gas law calculation. Add 273 (or 273.15) before substituting.", "source": "MiniMax â‘،", "_id": "minimax_2_7", "judge_pick": false}, {"question": "On a heating curve for water (starting at âˆ’20آ°C, ending as steam at 120آ°C), label the five distinct regions and explain why the temperature stays constant during phase changes. (3 steps)", "answer": "- Step 1: The five regions are: (1) Heating solid ice, (2) melting (solid â†’ liquid at 0آ°C), (3) heating liquid water, (4) boiling (liquid â†’ gas at 100آ°C), (5) heating gas (steam).\n- Step 2: Why temperature plateaus during phase changes â€” at the melting point (0آ°C) and boiling point (100آ°C), the energy supplied is used to **break intermolecular bonds** rather than increase molecular kinetic energy.\n+ The energy goes into **increasing potential energy** (particles moving further apart), not kinetic energy.\n+ Since temperature reflects only KE, it stays constant while PE changes.\n- Step 3: The boiling plateau is much longer than the melting plateau because **L_v (latent heat of vaporisation) â‰ˆ 2.26 MJ/kg** is about **7 times larger** than L_f (latent heat of fusion â‰ˆ 334 kJ/kg). Separating molecules completely requires much more energy than just allowing them to slide past each other.\n\n**Takeaway:** The flat regions on a heating curve are where phase change occurs â€” energy goes into PE (breaking bonds), not KE, so temperature is constant.", "source": "MiniMax â‘،", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Distinguish between evaporation and boiling. In what ways are they the same, and how do they differ?", "answer": "- **Similarity:** Both are liquid â†’ gas phase changes (vaporisation) that require latent heat.\n- **Differences:**\n+ **Boiling** occurs throughout the bulk of the liquid at a **fixed temperature** (the boiling point) when vapor pressure equals atmospheric pressure. Bubbles form throughout.\n+ **Evaporation** occurs **only at the surface** at **any temperature**. It involves high-energy molecules in the tail of the speed distribution escaping from the surface.\n+ Evaporation is a cooling process (energy carried away by escaping molecules); boiling requires continuous heat input to maintain.\n\n**Takeaway:** Boiling is bulk transformation at fixed temperature; evaporation is surface-level at any temperature.", "source": "MiniMax â‘،", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Write down the equation for heat energy causing a temperature change and identify what each symbol means. When do you use this vs. latent heat formulas?", "answer": "- **Equation:** خ”E = mcخ”خ¸\n+ خ”E = energy transfer (J)\n+ m = mass (kg)\n+ c = specific heat capacity (Jآ·kgâپ»آ¹آ·Kâپ»آ¹)\n+ خ”خ¸ = temperature change (K or آ°C â€” both have the same size step)\n- **When to use:** Use this formula when there is a **temperature change but no phase change**.\n- **When NOT to use:** During phase changes (melting, boiling), temperature is constant, so this formula would give خ”E = 0 incorrectly. Instead, use خ”E = mL.\n\n**Takeaway:** The key distinction: if temperature is changing â†’ use mcخ”خ¸; if temperature is constant during phase change â†’ use mL.", "source": "MiniMax â‘،", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Define specific heat capacity and specific latent heat. Why does water have an unusually high specific heat capacity?", "answer": "- **Specific heat capacity (c):** The energy required to raise the temperature of **one kilogram** of a substance by **one kelvin** (or one degree Celsius). Units: Jآ·kgâپ»آ¹آ·Kâپ»آ¹.\n- **Specific latent heat (L):** The energy required to change the phase of **one kilogram** of a substance **without a change in temperature**. L_f = fusion (solidâ†’liquid); L_v = vaporisation (liquidâ†’gas). Units: Jآ·kgâپ»آ¹.\n- **Why water's c is unusually high:** Water has a specific heat capacity of **4200 Jآ·kgâپ»آ¹آ·Kâپ»آ¹** (compared to ~2000 for ice, ~840 for aluminum). This is due to **hydrogen bonding** â€” water molecules form strong hydrogen bonds that require substantial energy to overcome before kinetic energy (temperature) can increase.\n+ This is why water is effective as a coolant (absorbs lots of heat with small temperature rise) and why coastal climates are milder.\n\n**Takeaway:** High c means the substance stores lots of energy with little temperature change â€” water's hydrogen bonding makes it exceptionally good at this.", "source": "MiniMax â‘،", "_id": "minimax_2_11", "judge_pick": false}, {"question": "A kettle supplies 2.4 kW of power to 1.5 kg of boiling water. How long does it take to boil away 0.30 kg of water? (L_v = 2.26 MJ/kg) (2 steps)", "answer": "- Step 1: Calculate energy required: E = mL_v = 0.30 أ— 2.26 أ— 10âپ¶ = **6.78 أ— 10âپµ J**\n- Step 2: Time = Energy / Power: t = E / P = 6.78 أ— 10âپµ J / 2400 W = **283 s â‰ˆ 4.7 minutes**\n\n**Takeaway:** Notice how the boiling step dominates the energy requirement â€” heating water from 20آ°C to 100آ°C uses far less energy than boiling it away (latent heat is huge compared to specific heat term).", "source": "MiniMax â‘،", "_id": "minimax_2_12", "judge_pick": true}, {"question": "State the five (or more) assumptions of an ideal gas model. For each assumption, explain why it's necessary or what would happen without it. (3 steps)", "answer": "- Step 1: The ideal gas assumptions:\n+ (1) **Molecules occupy negligible volume** compared to container volume â€” ensures we're measuring empty space, not molecular volume.\n+ (2) **Intermolecular forces are negligible** except during collisions â€” prevents potential energy contributions; simplifies to only kinetic energy.\n+ (3) **Collisions are perfectly elastic** â€” no kinetic energy lost or gained in collisions; total energy conserved.\n+ (4) **Collision time is negligible** compared to time between collisions â€” ensures constant, predictable motion.\n+ (5) **Motion is random and obeys Newton's laws** â€” gives isotropic (equal in all directions) distribution.\n+ (6) **Very large number of molecules** â€” allows statistical treatment and smooth averages.\n\n- Step 2: Without these, the gas would deviate from pV = nRT. Real gases deviate most at **high pressure** (molecular volume significant) and **low temperature** (intermolecular forces significant).\n\n**Takeaway:** Real gases approximate ideal gases best at low pressure and high temperature, where molecules are far apart and fast-moving.", "source": "MiniMax â‘،", "_id": "minimax_2_13", "judge_pick": false}, {"question": "State Boyle's law in words and as an equation. Under what conditions does it apply?", "answer": "- **In words:** For a **fixed mass of gas at constant temperature**, the pressure is **inversely proportional** to its volume. Halving the volume doubles the pressure.\n- **Equation:** pV = constant, or pâ‚پVâ‚پ = pâ‚‚Vâ‚‚\n- **Conditions:** Fixed mass of gas (fixed N), **constant temperature** (isothermal), no phase change.\n\n**Takeaway:** Boyle's law describes the trade-off between pressure and volume â€” squeeze a gas to half the volume at constant temperature, and pressure doubles.", "source": "MiniMax â‘،", "_id": "minimax_2_14", "judge_pick": false}, {"question": "State Charles's law and the pressure law. What conditions must be constant for each?", "answer": "- **Charles's law:** Volume of a fixed mass of gas is **proportional to absolute temperature** at constant pressure. Vâ‚پ/Tâ‚پ = Vâ‚‚/Tâ‚‚ or V/T = constant.\n+ **Constant:** pressure (p), mass (N)\n- **Pressure law:** Pressure of a fixed mass of gas is **proportional to absolute temperature** at constant volume. pâ‚پ/Tâ‚پ = pâ‚‚/Tâ‚‚ or p/T = constant.\n+ **Constant:** volume (V), mass (N)\n\n**Takeaway:** Both Charles's law and the pressure law are direct proportionalities with Kelvin temperature â€” double the temperature (in K), double the volume (at constant p) or double the pressure (at constant V).", "source": "MiniMax â‘،", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Write the ideal gas equation in both forms (molar and molecular versions) and identify all the symbols. (2 steps)", "answer": "- Step 1: **Molar form:** pV = nRT\n+ p = pressure (Pa)\n+ V = volume (mآ³)\n+ n = number of moles\n+ R = molar gas constant = 8.31 Jآ·molâپ»آ¹آ·Kâپ»آ¹\n+ T = absolute temperature (K)\n\n- Step 2: **Molecular form:** pV = NkT\n+ N = number of molecules\n+ k = Boltzmann's constant = 1.38 أ— 10âپ»آ²آ³ Jآ·Kâپ»آ¹\n+ (and n = N/N_A, so R = N_A أ— k)\n\n**Takeaway:** Both forms are equivalent â€” choose whichever is convenient. The molecular version directly links macroscopic pressure to microscopic molecular behavior.", "source": "MiniMax â‘،", "_id": "minimax_2_16", "judge_pick": false}, {"question": "A cylinder contains ideal gas at 15آ°C and a pressure of 4.5 أ— 10âپ· Pa. The volume is 8.3 أ— 10آ³ cmآ³. Calculate the number of molecules in the cylinder. (3 steps)", "answer": "- Step 1: Convert to SI units:\n+ Volume: 8.3 أ— 10آ³ cmآ³ = 8.3 أ— 10آ³ أ— 10âپ»âپ¶ mآ³ = **8.3 أ— 10âپ»آ³ mآ³**\n+ Temperature: 15 + 273 = **288 K**\n\n- Step 2: Use pV = NkT and solve for N:\n+ N = pV / (kT) = (4.5 أ— 10âپ· Pa)(8.3 أ— 10âپ»آ³ mآ³) / (1.38 أ— 10âپ»آ²آ³ Jآ·Kâپ»آ¹)(288 K)\n\n- Step 3: Calculate:\n+ Numerator: 4.5 أ— 10âپ· أ— 8.3 أ— 10âپ»آ³ = 3.735 أ— 10âپµ\n+ Denominator: 1.38 أ— 10âپ»آ²آ³ أ— 288 = 3.9744 أ— 10âپ»آ²آ¹\n+ N = 3.735 أ— 10âپµ / 3.9744 أ— 10âپ»آ²آ¹ â‰ˆ **9.4 أ— 10آ²âپµ molecules**\n\n**Takeaway:** Always convert volume to mآ³ and temperature to K before using pV = nRT or pV = NkT.", "source": "MiniMax â‘،", "_id": "minimax_2_17", "judge_pick": false}, {"question": "Starting from the kinetic theory result pV = (1/3)Nmج„cآ², derive the relationship between average molecular kinetic energy and temperature. Show all steps. (3 steps)", "answer": "- Step 1: We have two expressions for pV:\n+ From kinetic theory: pV = (1/3)Nmج„cآ²\n+ From ideal gas: pV = NkT\n\n- Step 2: Set equal and cancel N:\n+ (1/3)Nmج„cآ² = NkT â†’ (1/3)mج„cآ² = kT\n\n- Step 3: Multiply both sides by 3/2:\n+ (1/2)mج„cآ² = (3/2)kT\n\n**The left-hand side (آ½mج„cآ²) is the average translational kinetic energy of one molecule.**\nSo: **E_k = (3/2)kT**\n\n- This shows that **average molecular KE is directly proportional to absolute temperature**, regardless of the gas's molecular mass.\n\n**Takeaway:** This is the key link between the microscopic world (molecular motion) and macroscopic measurement (temperature). Doubling T in K doubles the average KE.", "source": "MiniMax â‘،", "_id": "minimax_2_18", "judge_pick": true}, {"question": "Why does a hotter gas exert higher pressure at constant volume? Explain using the \"three F's\" framework. (2 steps)", "answer": "- Step 1: When a fixed volume of gas is heated (at constant V and N), three things happen at the molecular level:\n+ **(1) Faster:** Molecules move faster â€” average kinetic energy increases (E_k âˆ‌ T).\n+ **(2) More frequently:** Because they're moving faster, they reach the walls more often between collisions.\n+ **(3) More force per impact:** Each collision transfers more momentum to the wall (خ”p = 2mv_x, and since v is higher, خ”p is larger).\n\n- Step 2: Since pressure = force/area = (momentum change per collision) أ— (collisions per second) / area, all three factors increase pressure. This is why **p âˆ‌ T at constant V** (the pressure law).\n\n**Takeaway:** More frequent, faster, harder hits = higher pressure. The \"three F's\" â€” Faster, More frequently, More force â€” explain why heating a gas in a rigid container raises pressure.", "source": "MiniMax â‘،", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Define root-mean-square (rms) speed. Why do we use rms speed rather than average speed or average velocity for gas molecules?", "answer": "- **Definition:** c_rms = âˆڑ(cآ²) â€” the square root of the mean of the squared speeds. It's the speed of a molecule having the \"typical\" kinetic energy.\n- **Why not average velocity?** The **average velocity is zero** â€” molecules move equally in all directions, so the vector sum cancels out.\n- **Why not average speed?** Average speed (cج„) is useful, but **rms speed** directly connects to kinetic energy: E_k = (1/2)m(c_rms)آ². The rms accounts for the spread â€” faster molecules contribute disproportionately to the squared term, giving a more accurate measure of typical energy.\n- The rms speed is always greater than or equal to the mean speed (they're equal only if all molecules have identical speeds).\n\n**Takeaway:** Use rms speed because it links directly to kinetic energy and temperature via E_k = (1/2)m(c_rms)آ² = (3/2)kT.", "source": "MiniMax â‘،", "_id": "minimax_2_20", "judge_pick": true}, {"question": "The rms speed of helium atoms is 720 m/s at 45آ°C. Calculate the rms speed at 80آ°C. (3 steps)", "answer": "- Step 1: Convert to Kelvin:\n+ Tâ‚پ = 45 + 273 = 318 K\n+ Tâ‚‚ = 80 + 273 = 353 K\n\n- Step 2: From E_k âˆ‌ T, we have (1/2)m(cآ²) âˆ‌ T, so cآ² âˆ‌ T. Therefore:\n+ (c_rms,2 / c_rms,1)آ² = Tâ‚‚/Tâ‚پ\n+ c_rms,2 = c_rms,1 أ— âˆڑ(Tâ‚‚/Tâ‚پ)\n\n- Step 3: Calculate:\n+ c_rms,2 = 720 أ— âˆڑ(353/318) = 720 أ— âˆڑ1.110 = 720 أ— 1.054 â‰ˆ **759 m/s**\n\n**Key insight:** Doubling T in K would only multiply c_rms by âˆڑ2 â‰ˆ 1.41, not by 2. Many students mistakenly think \"double T = double speed\" â€” it's actually the square root that matters.\n\n**Takeaway:** c_rms âˆ‌ âˆڑT, not T. The relationship is through the square root because KE âˆ‌ T and KE âˆ‌ cآ².", "source": "MiniMax â‘،", "_id": "minimax_2_21", "judge_pick": true}, {"question": "A car tyre has a gauge pressure of 2.5 أ— 10âپµ Pa above atmospheric (1.0 أ— 10âپµ Pa) at 15آ°C. After a long drive, the tyre is at 45آ°C. Assuming volume is unchanged, find the new gauge pressure. (3 steps)", "answer": "- Step 1: Find initial absolute pressure:\n+ pâ‚پ = atmospheric + gauge = 1.0 أ— 10âپµ + 2.5 أ— 10âپµ = **3.5 أ— 10âپµ Pa**\n+ Tâ‚پ = 15 + 273 = 288 K\n+ Tâ‚‚ = 45 + 273 = 318 K\n\n- Step 2: Use pressure law (constant V, fixed mass): pâ‚پ/Tâ‚پ = pâ‚‚/Tâ‚‚\n+ pâ‚‚ = pâ‚پ أ— (Tâ‚‚/Tâ‚پ) = 3.5 أ— 10âپµ أ— (318/288)\n\n- Step 3: Calculate and convert back to gauge:\n+ pâ‚‚ = 3.5 أ— 10âپµ أ— 1.104 â‰ˆ 3.86 أ— 10âپµ Pa (absolute)\n+ Gauge pressure = pâ‚‚ âˆ’ atmospheric = 3.86 أ— 10âپµ âˆ’ 1.0 أ— 10âپµ = **2.86 أ— 10âپµ Pa â‰ˆ 2.9 أ— 10âپµ Pa**\n\n**Takeaway:** Even a modest temperature rise (15آ°C â†’ 45آ°C) causes a significant pressure increase. This is why tyre pressure should be checked when tyres are cold.", "source": "MiniMax â‘،", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In the Boyle's law experiment (Core Practical 14), why must you wait several seconds after adding each mass before recording the volume?", "answer": "- Adding a mass to the syringe does **work on the gas** (compressing it), which momentarily increases the gas's internal energy and raises its temperature.\n- **Boyle's law requires constant temperature** (isothermal conditions). If you measure immediately, the gas is hotter than room temperature, so the volume reading is for a higher-temperature state, not the same-temperature comparison.\n- Waiting allows the gas to **return to thermal equilibrium** with the surroundings (heat transfer to/from the environment), restoring the original temperature before recording.\n\n**Takeaway:** The experiment relies on the ideal gas assumptions â€” specifically, constant temperature. Without waiting, your pV data won't follow Boyle's law.", "source": "MiniMax â‘،", "_id": "minimax_2_23", "judge_pick": true}, {"question": "What is density? A paving slab has mass 73 kg and dimensions 40 mm أ— 500 mm أ— 850 mm. Calculate its density in kg/mآ³. (2 steps)", "answer": "- **Definition:** Density (دپ) is mass per unit volume: دپ = m/V, units kg/mآ³.\n- **Calculation:**\n+ Convert dimensions to metres: 0.040 m أ— 0.500 m أ— 0.850 m = **0.017 mآ³**\n+ دپ = 73 kg / 0.017 mآ³ â‰ˆ **4294 kg/mآ³**\n\n**Takeaway:** Always convert all lengths to metres before calculating volume. Common errors: 1 cmآ³ = 10âپ»âپ¶ mآ³; 1 L (1 dmآ³) = 10âپ»آ³ mآ³.", "source": "MiniMax â‘،", "_id": "minimax_2_24", "judge_pick": false}, {"question": "State Archimedes' principle. An object displaces 0.015 mآ³ of water (دپ = 1000 kg/mآ³). Calculate the upthrust on the object. (2 steps)", "answer": "- **Archimedes' principle:** The upthrust (buoyant force) on an object immersed in a fluid is equal to the **weight of fluid displaced**.\n- **Equation:** Upthrust = دپ_fluid أ— V_displaced أ— g\n- **Calculation:** Upthrust = 1000 أ— 0.015 أ— 9.81 = **147 N** (to 3 s.f.)\n\n**Takeaway:** Upthrust depends on the volume of fluid displaced, not the weight or density of the object itself. A floating object displaces exactly its weight of fluid; a sinking object displaces less.", "source": "MiniMax â‘،", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A steel ball of radius r falls through a viscous fluid. Write Stokes' law and explain what determines terminal velocity.", "answer": "- **Sto
