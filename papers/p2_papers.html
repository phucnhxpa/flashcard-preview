<title>P2 Past Papers</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:#f5f5f7;color:#1d1d1f;-webkit-font-smoothing:antialiased}
.ctr{max-width:1120px;margin:0 auto;padding:24px 20px 80px}
.hdr{text-align:center;padding:36px 0 22px}
.hdr h1{font-size:30px;font-weight:700;letter-spacing:-.4px}
.hdr .sub{font-size:13.5px;color:#86868b;margin-top:4px}
.bdg-row{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 11px;border-radius:20px;font-size:11.5px;font-weight:600;background:#e8e8ed;color:#424245}
.bdg.sol{background:#0071e3;color:#fff}
.bdg.date{background:#ff9f0a;color:#fff}
.tabs{display:flex;gap:3px;overflow-x:auto;padding:4px;background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin:0 0 14px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:7px 13px;border-radius:10px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:#86868b;transition:all .18s;white-space:nowrap;font-family:inherit}
.tb:hover{color:#1d1d1f;background:#f5f5f7}
.tb.act{background:#0071e3;color:#fff}
.session{display:none}
.session.act{display:block}
.q-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:14px;margin-top:14px}
.q-card{background:#fff;border-radius:13px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);transition:box-shadow .18s;border:1.5px solid transparent}
.q-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.09)}
.q-card.rep{border-color:#0071e3}
.q-head{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:#fafafa;border-bottom:1px solid #f0f0f5}
.q-label{font-size:13px;font-weight:700}
.rep-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:#0071e3;color:#fff}
.q-img img{width:100%;height:auto;display:block}
.q-img .no-img{padding:18px;text-align:center;color:#aaa;font-size:12px;background:#fafafa}
.q-foot{padding:9px 13px}
.sol-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;background:#0071e3;color:#fff;border-radius:8px;text-decoration:none;font-size:12px;font-weight:600;transition:background .15s}
.sol-btn:hover{background:#0060c7}
</style></head>

const sessions=Object.keys(DATA);
const tabsEl=document.getElementById('tabs');
const sessionsEl=document.getElementById('sessions');
sessions.forEach((sess,i)=>{
  const btn=document.createElement('button');
  btn.className='tb'+(i===0?' act':'');
  btn.textContent=DATA[sess].label;
  btn.dataset.sess=sess;
  btn.onclick=()=>switchTab(sess);
  tabsEl.appendChild(btn);
  const div=document.createElement('div');
  div.className='session'+(i===0?' act':'');
  div.id='sess_'+sess;
  const grid=document.createElement('div');
  grid.className='q-grid';
  DATA[sess].questions.forEach(q=>{
    const card=document.createElement('div');
    card.className='q-card'+(q.rep?' rep':'');
    let h=`<div class="q-head"><span class="q-label">Q${q.q}</span>${q.rep?'<span class="rep-badge">✦ SOLUTION</span>':''}</div>`;
    h+=q.img?`<div class="q-img"><img src="${q.img}" loading="lazy"></div>`:'<div class="q-img"><div class="no-img">image not available</div></div>';
    if(q.drill) h+=`<div class="q-foot"><a href="${q.drill}" class="sol-btn" target="_blank">▶ Full Solution</a></div>`;
    card.innerHTML=h;
    grid.appendChild(card);
  });
  div.appendChild(grid);
  sessionsEl.appendChild(div);
});
function switchTab(sess){
  document.querySelectorAll('.session').forEach(e=>e.classList.remove('act'));
  document.querySelectorAll('.tb').forEach(e=>e.classList.remove('act'));
  document.getElementById('sess_'+sess).classList.add('act');
  document.querySelector('[data-sess="'+sess+'"]').classList.add('act');
}
