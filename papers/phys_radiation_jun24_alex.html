o a proton. The electron (beta particle) is a *by-product of this nuclear transformation*, not a pre-existing orbital electron.\n- Step 3: Additional evidence: the beta particle's energy spectrum is continuous (it shares energy with the antineutrino), which is inconsistent with a simple ejection process. Also, beta particles can have energies far exceeding the binding energy of orbital electrons, confirming they come from the much more energetic nuclear process.\n\nThe beta particle is *born in the nucleus* during neutron→proton conversion, not stolen from the electron cloud.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "Individual nuclear decay is described as \"random.\" What exactly does this mean, and how does the predictability of half-life emerge from this randomness? (3 steps)", "answer": "- Step 1: \"Random\" means that for any *single* unstable nucleus, it is fundamentally impossible to predict *when* it will decay. It might decay in the next second, or it might survive for thousands of years. There is no \"countdown timer\" or internal clock — the process is governed by quantum probability.\n- Step 2: However, when you have a *very large number* of nuclei (e.g., $$10^{20}$$ atoms in a sample), the *statistics* of large numbers take over. Each atom has a fixed probability of decaying per unit time, and with enough atoms, the *fraction* that decay in any given time interval becomes highly predictable.\n- Step 3: This predictable statistical pattern is the **half-life**: the time for *half* the atoms in a large sample to decay. It emerges not because individual atoms are predictable, but because averaging over enormous numbers smooths out the randomness — like flipping a coin millions of times and getting very close to 50% heads.\n\nOne atom = pure chance. Billions of atoms = statistical certainty. Half-life is the bridge between the two.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "A sample of radioactive isotope X has a half-life of 10 minutes. After 30 minutes, roughly what fraction of the original sample remains? Walk through the logic without a calculator. (3 steps)", "answer": "- Step 1: Each half-life cuts the remaining quantity in half. After 1 half-life (10 min), you have $$\\frac{1}{2}$$ remaining. After 2 half-lives (20 min), you have $$\\frac{1}{2} \\times \\frac{1}{2} = \\frac{1}{4}$$. After 3 half-lives (30 min), you have $$\\frac{1}{4} \\times \\frac{1}{2} = \\frac{1}{8}$$.\n- Step 2: The general pattern: after $$n$$ half-lives, the fraction remaining is $$\\left(\\frac{1}{2}\\right)^n$$. Here, $$n = \\frac{30}{10} = 3$$, so fraction = $$\\left(\\frac{1}{2}\\right)^3 = \\frac{1}{8}$$.\n- Step 3: So after 30 minutes, roughly 12.5% (one-eighth) of the original sample remains. This works regardless of the starting amount — half-life is about *proportions*, not absolute numbers.\n\nEach half-life = halve what's left. Three half-lives = $$\\frac{1}{2} \\times \\frac{1}{2} \\times \\frac{1}{2} = \\frac{1}{8}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "In a decay chain, some steps take thousands of years while others take fractions of a second. What determines how long a particular isotope \"waits\" before decaying? (2 steps)", "answer": "- Step 1: The time an isotope waits is determined by its **half-life**, which is a fixed property of that particular isotope. Different isotopes have vastly different half-lives because of differences in their nuclear structure — specifically, how far they are from a stable configuration and the energy barrier they must overcome to decay.\n- Step 2: Isotopes close to stability have very long half-lives (they are \"reluctant\" to decay because the energy gain is small). Isotopes far from stability have very short half-lives (they are \"eager\" to decay because the energy release is large). This is why, in a chain, some steps are glacially slow and others are nearly instantaneous.\n\nHalf-life reflects nuclear \"eagerness\" — the further from stability, the faster the decay.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "Fill in the missing particle: $$^{226}_{88}\\text{Ra} \\rightarrow ^{222}_{86}\\text{Rn} + \\text{?}$$. Identify the decay type and verify conservation. (3 steps)", "answer": "- Step 1: Compare parent and daughter. Mass number: $$226 \\rightarrow 222$$, a decrease of 4. Atomic number: $$88 \\rightarrow 86$$, a decrease of 2.\n- Step 2: A decrease of 4 in A and 2 in Z is the signature of **alpha decay**. The missing particle must be an alpha particle: $$^4_2\\text{He}$$.\n- Step 3: Verify: LHS mass = 226, RHS mass = 222 + 4 = 226 ✓. LHS atomic = 88, RHS atomic = 86 + 2 = 88 ✓. The equation is $$^{226}_{88}\\text{Ra} \\rightarrow ^{222}_{86}\\text{Rn} + ^4_2\\text{He}$$.\n\nΔA = -4, ΔZ = -2 → alpha decay. The missing piece is always $$^4_2\\text{He}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "Fill in the daughter nucleus: $$^{14}_{6}\\text{C} \\rightarrow \\text{?} + ^0_{-1}\\text{e}$$. Identify the decay type, determine the daughter's A and Z, and name the element (Z=7 is nitrogen). (3 steps)", "answer": "- Step 1: This is **beta-minus decay** (an electron $$^0_{-1}\\text{e}$$ is emitted). In beta decay, mass number stays the same and atomic number increases by 1.\n- Step 2: Daughter's A = 14 (same as parent). Daughter's Z = 6 + 1 = 7 (increased by 1). The daughter is $$^{14}_{7}\\text{N}$$ (nitrogen).\n- Step 3: Verify: LHS A = 14, RHS A = 14 + 0 = 14 ✓. LHS Z = 6, RHS Z = 7 + (-1) = 6 ✓. The complete equation is $$^{14}_{6}\\text{C} \\rightarrow ^{14}_{7}\\text{N} + ^0_{-1}\\text{e}$$.\n\nBeta decay: A unchanged, Z increases by 1. Carbon-14 becomes nitrogen-14 — this is the basis of carbon dating.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "A student says: \"Alpha particles are more dangerous than gamma rays because they have higher ionizing power.\" A doctor says: \"Gamma rays are more dangerous because they penetrate deeper.\" Who is right, and why is context crucial? (3 steps)", "answer": "- Step 1: Both are right — but in *different contexts*. Danger depends on whether the radiation source is *inside* or *outside* the body.\n- Step 2: If the source is **outside the body**, alpha particles are stopped by the dead layer of skin and never reach living tissue. Gamma rays penetrate deep into organs. In this context, gamma is more dangerous — the doctor is right.\n- Step 3: If the source is **inside the body** (e.g., inhaled radon or ingested polonium), alpha particles are now in direct contact with living tissue. Their high ionizing power causes massive local damage to cells and DNA. In this context, alpha is far more dangerous per unit energy — the student is right.\n\n+ Outside body: alpha = harmless (blocked by skin), gamma = dangerous.\n+ Inside body: alpha = devastating (all energy dumped locally), gamma = less damaging (most energy passes through).\n\nContext is everything: the same physical property (high ionisation) makes alpha either harmless or devastating depending on where the source is.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "Marie Curie distilled uranium salts down to radium. Why was radium *more* radioactive than the original uranium ore, and what does this tell us about the relationship between element type and radioactivity? (2 steps)", "answer": "- Step 1: Radium is more radioactive than uranium because radium has a *much shorter half-life* (~1600 years for Ra-226 vs. ~4.5 billion years for U-238). A shorter half-life means more decays per second per gram — i.e., higher *activity*.\n- Step 2: This tells us that radioactivity is not a uniform property of \"radioactive stuff\" — it varies enormously between elements and isotopes. The intensity of radiation depends on the specific isotope's nuclear instability, which is quantified by its half-life. A highly unstable isotope (short half-life) is intensely radioactive; a barely unstable one (long half-life) is only weakly radioactive.\n\nMore radioactive ≠ \"more radiation in general.\" It means *more decays per second per atom*, which depends on the specific isotope's half-life.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "Rutherford used radiation to discover the nucleus. Conceptually, how does firing alpha particles at thin gold foil reveal that the nucleus exists and is incredibly small? (3 steps)", "answer": "- Step 1: Rutherford fired alpha particles at a thin gold foil. If the atom's positive charge were spread uniformly throughout (the \"plum pudding\" model), alpha particles would experience only mild deflections — like a ball rolling through a diffuse cloud.\n- Step 2: Instead, a *tiny fraction* of alpha particles bounced back at large angles, even nearly reversing direction. This could only happen if they hit something very small, very dense, and very positively charged — a concentrated nucleus.\n- Step 3: The fact that *most* alpha particles went straight through (undeflected) showed that the nucleus occupies an extremely tiny fraction of the atom's volume. The few that bounced back confirmed the nucleus is concentrated and massive. This is how the nuclear model was born.\n\nMost alphas pass through (atom is mostly empty); a few bounce back hard (tiny dense nucleus exists). The statistics of deflection reveal the nucleus's size and concentration.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "You have a sample of 800 radioactive atoms with a half-life of 1 hour. After 2 hours, approximately how many atoms have *decayed*? (3 steps)", "answer": "- Step 1: After 1 half-life (1 hour), half remain: $$800 \\times \\frac{1}{2} = 400$$ remain, so 400 have decayed. After 2 half-lives (2 hours), half of the remaining decay: $$400 \\times \\frac{1}{2} = 200$$ remain.\n- Step 2: So after 2 hours, 200 atoms remain undecayed. The number that have *decayed* = original - remaining = $$800 - 200 = 600$$.\n- Step 3: Quick check: after n half-lives, fraction remaining = $$(1/2)^n$$. Here $$n=2$$, fraction remaining = 1/4, so fraction decayed = 3/4. $$800 \\times \\frac{3}{4} = 600$$ ✓.\n\nDecayed = original × (1 − fraction remaining). After 2 half-lives, $$\\frac{3}{4}$$ have decayed.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "Why is it that *no* amount of lead can *guarantee* 100% stopping of gamma rays, whereas paper *completely* stops alpha particles? (3 steps)", "answer": "- Step 1: Alpha particles are charged and interact with *every* atom they pass via the Coulomb force. Each interaction transfers energy. After a *fixed, short distance*, all the alpha's kinetic energy is depleted and it stops. There is a well-defined range.\n- Step 2: Gamma rays are uncharged photons. Their interactions with matter are *probabilistic* — each photon has a certain probability of being absorbed per unit thickness of material. This follows an exponential attenuation law: $$I = I_0 e^{-\\mu x}$$, where $$\\mu$$ is the absorption coefficient and $$x$$ is thickness.\n- Step 3: Because the attenuation is exponential, it never quite reaches zero. You can make the intensity *negligibly small* with enough lead, but you can never make it *exactly zero*. There is always a non-zero probability that some photons will pass through, regardless of thickness.\n\nAlpha has a hard stopping point (deterministic energy loss); gamma has an exponential fade (probabilistic attenuation). That's why \"stopping\" gamma is really just \"reducing to acceptable levels.\"", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": true}, {"question": "In nuclear notation, the beta particle is written as $$^0_{-1}\\text{e}$$. Why is the \"atomic number\" written as -1 for a particle that isn't even an atom? (2 steps)", "answer": "- Step 1: The bottom-left number in nuclear notation represents *charge* (in units of the proton charge, +e). An electron has a charge of -1e, so it is written with -1. It's not an \"atomic number\" in the traditional sense — it's a *charge number* that happens to equal the atomic number for nuclei.\n- Step 2: This convention is essential for *balancing decay equations*. The total charge number (bottom) must be conserved, just like the total mass number (top). Writing the beta particle as $$^0_{-1}\\text{e}$$ ensures that when you add up the bottom numbers on both sides of the equation, they balance: $$Z = (Z+1) + (-1)$$.\n\nThe bottom number is really a *charge conservation label*. For the beta particle, it's -1 because that's its charge — and this makes the nuclear accounting work out.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": true}, {"question": "Carbon-14 ($$^{14}_{6}\\text{C}$$) and Nitrogen-14 ($$^{14}_{7}\\text{N}$$) both have the same mass number. Are they isotopes? Explain precisely. (2 steps)", "answer": "- Step 1: No, they are **not isotopes**. Isotopes are atoms of the *same element* — meaning they must have the *same atomic number Z*. Carbon-14 has Z=6; nitrogen-14 has Z=7. These are different elements.\n- Step 2: They are **isobars** — nuclei with the same mass number (A=14) but different atomic numbers. Isotopes share Z but differ in A; isobars share A but differ in Z. This distinction matters because isotopes have identical chemistry, while isobars have completely different chemistry.\n\nSame A, different Z = isobars, not isotopes. Isotopes = \"same place on periodic table\" (same Z).", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "In a uranium-238 decay chain, one step takes the nucleus from thorium (Z=90) back to protactinium (Z=91). What type of decay must have occurred, and why? (2 steps)", "answer": "- Step 1: The atomic number *increased* from 90 to 91. This is the signature of **beta-minus decay**, where a neutron converts to a proton, increasing Z by 1 while A stays the same.\n- Step 2: Alpha decay would have *decreased* Z by 2, and gamma decay would have left Z unchanged. Only beta-minus decay increases Z by 1, moving one place to the right on the periodic table. So the step from Th (Z=90) to Pa (Z=91) must be beta decay.\n\nZ increases by 1 → beta decay. Z decreases by 2 → alpha decay. Z unchanged → gamma decay (or no decay).", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "A student argues: \"If I wait long enough, every single radioactive atom in my sample will have decayed.\" Is this strictly true for a finite sample? Consider the random nature of decay. (3 steps)", "answer": "- Step 1: In the *mathematical* model (infinite sample), the number remaining after infinite time approaches zero asymptotically: $$N(t) = N_0 \\left(\\frac{1}{2}\\right)^{t/t_{1/2}} \\rightarrow 0$$ as $$t \\rightarrow \\infty$$. So mathematically, yes, the fraction remaining tends to zero.\n- Step 2: However, for a *finite* sample (say $$10^{20}$$ atoms), once you get down to the last few atoms, the statistical \"half-life\" prediction breaks down. Each remaining atom has a 50/50 chance of decaying in the next half-life — it's pure chance. The last atom might decay in the next second, or it might last for millions of half-lives.\n- Step 3: So in practice, yes — for any reasonable sample, given enough time, all atoms will eventually decay. But there's no *guaranteed deadline*. The last atom's decay time is fundamentally unpredictable; it's a random variable with an exponential distribution.\n\nMathematically: all decay eventually. Practically: the last few atoms are on their own schedule — randomness dominates when numbers get small.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "Rank alpha, beta, and gamma radiation in order of: (a) ionizing power, (b) penetrating power. Explain why the rankings are opposite. (3 steps)", "answer": "- Step 1: **Ionizing power** (high to low): Alpha > Beta > Gamma. Alpha is large, slow, and +2 charged — it interacts with nearly every atom it passes. Beta is lighter and -1 charged — moderate interactions. Gamma is uncharged — rare interactions.\n- Step 2: **Penetrating power** (high to low): Gamma > Beta > Alpha. Gamma travels the farthest through matter (hundreds of km in air, stopped by cm of lead). Beta travels ~1 m in air (stopped by mm of aluminium). Alpha travels ~5 cm in air (stopped by paper).\n- Step 3: The rankings are opposite because ionizing and penetrating are *two sides of the same coin*. High ionization means the radiation dumps its energy quickly (short range = low penetration). Low ionization means the radiation conserves its energy (long range = high penetration). You can't have both high ionization and high penetration — the physics forbids it.\n\nHigh ionizer = energy spender = short range. Low ionizer = energy saver = long range. The two properties are inversely linked by energy deposition rate.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "A radioactive source emits both alpha and gamma radiation. You place a sheet of paper between the source and a Geiger counter, and the count rate drops significantly but doesn't reach the background level. Explain what each part of the reading represents. (3 steps)", "answer": "- Step 1: Before the paper, the Geiger counter detects *all* radiation reaching it: alpha particles, gamma rays, and background radiation. The total count is high.\n- Step 2: The paper completely stops the alpha particles (they have low penetrating power). But gamma rays pass through paper almost unimpeded (paper is far too thin to attenuate gamma significantly). So after the paper, the counter detects gamma rays + background.\n- Step 3: The count rate drops significantly (because the alpha contribution is removed) but doesn't reach background level (because the gamma contribution is still present). To isolate background only, you'd need to also add lead shielding to stop the gamma, or remove the source entirely.\n\nPaper eliminates alpha; gamma sails through. The residual count above background = gamma contribution.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "Why is it physically impossible for a *pure* gamma decay to change the element or isotope of the nucleus? What would need to change for the nucleus to become a different isotope? (2 steps)", "answer": "- Step 1: Gamma decay only releases energy — the nucleus transitions from an excited state to a lower-energy state. No protons or neutrons are created, destroyed, or ejected. Since the element is defined by Z (proton count) and the isotope by A (total nucleon count), and neither changes, the identity is preserved.\n- Step 2: For the nucleus to become a different *isotope*, A must change (gain or lose nucleons). For it to become a different *element*, Z must change. This requires alpha decay (losing nucleons) or beta decay (converting a neutron to/from a proton). Gamma decay can do neither — it only sheds energy.\n\nGamma is the nucleus \"breathing out\" energy — it changes its internal state, not its identity.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": false}, {"question": "You detect 300 counts per minute from a source. The background radiation in the same room is 50 counts per minute. What is the *corrected* count rate due to the source alone, and why must you always perform this subtraction? (2 steps)", "answer": "- Step 1: The corrected count rate = total count rate − background count rate = $$300 - 50 = 250$$ counts per minute. This is the radiation attributable to the source itself.\n- Step 2: You must always subtract because background radiation is *always present* — from cosmic rays, radon, potassium-40 in the environment, etc. If you don't subtract, you'd be overestimating the source's activity, attributing natural radiation to your sample. Background is the \"noise floor\" that must be removed to see the \"signal.\"\n\nAlways measure background (source removed), then subtract. The source's true activity = measured − background.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "The standard model of particle physics goes down to scales of ~$$10^{-34}$$ m, but alpha/beta/gamma radiation operates at the nuclear scale (~$$10^{-15}$$ m). Why don't we need to consider sub-nuclear structure (quarks, etc.) when analysing alpha, beta, or gamma decay? (2 steps)", "answer": "- Step 1: Alpha, beta, and gamma decay are *nuclear-scale phenomena* — they involve the rearrangement or emission of nucleons (protons and neutrons) and energy from the nucleus. At this scale, protons and neutrons behave as *whole particles*; their internal quark structure is irrelevant to the energy balance.\n- Step 2: The energy scales are vastly different. Nuclear processes involve MeV (millions of eV). Sub-nuclear processes (quark interactions, gluon exchange) involve GeV or higher. At nuclear energies, quarks are \"confined\" inside nucleons and don't participate as free particles. You don't need to \"open the box\" of quark structure to understand what the nucleus does — the nucleon-level description is sufficient.\n\nAt nuclear energies, nucleons are the smallest relevant \"building blocks.\" Quarks are locked inside — you'd need far higher energies to probe them.", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}], "count": 40}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "When we say \"radiation\" in a nuclear physics context, how does this fundamentally differ from the \"radiation\" a hot stove gives off? (2 steps)", "answer": "- Step 1: The word \"radiation\" broadly means \"to give something off\" or \"to emit energy.\" In the context of a hot stove, thermal radiation is the emission of electromagnetic waves (infrared) due to the thermal motion of atoms and molecules. It is a surface/atomic-level phenomenon driven by heat.\n- Step 2: Nuclear/atomic radiation, however, originates from the unstable **nucleus** of an atom itself. Instead of just emitting low-energy photons, the nucleus ejects high-energy particles (like alpha or beta) or high-energy photons (gamma). The energy scales are vastly different, as nuclear radiation stems from the strong nuclear force holding the nucleus together, rather than electron transitions or thermal vibrations.\n\nThe key difference is the origin: electron/thermal vibrations vs. the nucleus itself.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "If you scaled an atom up to the size of a massive sports stadium, roughly how big would the nucleus at the center be, and what are the approximate orders of magnitude for the atom and nucleus in meters? (3 steps)", "answer": "- Step 1: The size of a typical atom is on the order of $$10^{-10}$$ meters (a tenth of a nanometer), which is the scale of the electron cloud.\n- Step 2: The size of the nucleus is on the order of $$10^{-15}$$ meters (a femtometer). This means the nucleus is about 100,000 times smaller than the atom.\n- Step 3: Using the stadium analogy, if the atom's electron cloud is the stadium (roughly 100 meters across), the nucleus would be about the size of a pea or a marble (1 millimeter) sitting at the center of the field. This highlights that matter is overwhelmingly empty space, and radiation operates at this tiny, dense $$10^{-15}$$ m core.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "What is an alpha particle in terms of its fundamental composition, and what are its charge and relative mass? (2 steps)", "answer": "- Step 1: An alpha particle ($$\\alpha$$) is fundamentally identical to a helium nucleus. It consists of 2 protons and 2 neutrons bound tightly together.\n- Step 2: Because it contains 2 protons, it has a charge of +2. Because it contains 2 protons and 2 neutrons, its relative mass is 4 (compared to the atomic mass unit standard). It is a heavy, highly charged, and relatively slow-moving chunk of nuclear matter.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "A common misconception is that beta particles are electrons orbiting the nucleus that get knocked out. Where does a beta particle actually come from, and what nuclear process creates it? (3 steps)", "answer": "- Step 1: A beta particle ($$\\beta$$) is indeed a fast-moving electron, but it does **not** come from the electron cloud surrounding the atom.\n- Step 2: It originates from **inside the nucleus**. In a nucleus with an excess of neutrons, a neutron spontaneously transforms into a proton and an electron.\n- Step 3: The newly created proton stays in the nucleus, while the electron is ejected at high speed. This ejected electron is the beta particle. (Note: An antineutrino is also emitted to conserve energy and momentum, though at this level we focus on the electron).\n\nThe counterintuitive fact is that an electron is *born* inside the nucleus from a decaying neutron.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": true}, {"question": "What fundamentally is a gamma ray, and why does it have a mass and charge of zero? (2 steps)", "answer": "- Step 1: A gamma ray ($$\\gamma$$) is a high-frequency electromagnetic wave, which means it is a photon—a packet of pure energy.\n- Step 2: Because it is a wave/energy packet and not a piece of matter, it has no rest mass and carries no electric charge. It is simply a way for an excited nucleus to dump excess energy and return to a more stable, lower-energy state.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "Alpha radiation is highly ionizing but poorly penetrating, while gamma radiation is poorly ionizing but highly penetrating. Explain the physical reason for this inverse relationship. (3 steps)", "answer": "- Step 1: Ionizing power is the ability to knock electrons off atoms. Penetrating power is how far the radiation can travel through matter before losing its energy and stopping.\n- Step 2: Alpha particles are large, heavy, and carry a +2 charge. Because of this, they interact very strongly with the electron clouds of atoms they pass, ripping electrons away (high ionization). However, this constant interaction drains their kinetic energy incredibly fast, so they stop after a few cm of air or a sheet of paper (low penetration).\n- Step 3: Gamma rays have no mass and no charge. They interact very weakly with matter, slipping through electron clouds without hitting much (low ionization). Because they rarely interact, they lose energy very slowly and can travel through thick concrete or lead before being absorbed (high penetration).\n\nHigh interaction = high ionization but fast energy loss; low interaction = low ionization but slow energy loss.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": true}, {"question": "If you need to shield against alpha, beta, and gamma radiation, what materials are typically required for each, and why doesn't a thick sheet of paper stop beta or gamma? (3 steps)", "answer": "- Step 1: **Alpha** is stopped by **paper or skin**. Its high ionizing power means it deposits all its energy into the dense network of cellulose fibers in paper almost instantly.\n- Step 2: **Beta** requires **a few millimetres of aluminium**. Beta particles are small, light, and fast, so they slip through the gaps in paper. They need the higher electron density of a metal to ensure enough collisions to drain their energy.\n- Step 3: **Gamma** requires **centimetres of lead or metres of concrete**. Because gamma rays interact weakly, paper and thin aluminium are virtually invisible to them. You need a massive thickness of very dense material to statistically guarantee enough interactions to absorb the photon.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "In nuclear notation $$^{A}_{Z}X$$, what do the numbers A and Z represent, and which one determines the chemical identity (element) of the atom? (2 steps)", "answer": "- Step 1: **A** (the top number) is the **mass number**, representing the total count of protons and neutrons in the nucleus. **Z** (the bottom number) is the **atomic number** (or proton number), representing just the number of protons.\n- Step 2: The atomic number **Z** determines the chemical identity of the element. This is because the number of protons dictates the number of electrons in a neutral atom, and the electron configuration governs all chemical behavior. If Z changes, the element changes; if A changes but Z stays the same, it is just a heavier isotope of the same element.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "What is an isotope? Explain using the concepts of protons and neutrons. (2 steps)", "answer": "- Step 1: Isotopes are atoms of the **same element** that have the **same number of protons** (same Z) but a **different number of neutrons** (different A).\n- Step 2: Because they have the same number of protons and electrons, isotopes behave identically chemically. However, the different neutron count changes the nuclear stability. An isotope with too many or too few neutrons may be unstable (radioactive), while another isotope of the same element might be perfectly stable.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "During alpha decay, how do the mass number (A) and atomic number (Z) of the parent nucleus change, and why? (3 steps)", "answer": "- Step 1: An alpha particle is fundamentally a helium nucleus, which has a mass number of 4 and an atomic number of 2 ($$^{4}_{2}\\alpha$$).\n- Step 2: Because the parent nucleus physically ejects this cluster of 2 protons and 2 neutrons, the total mass number **A** of the parent must decrease by 4.\n- Step 3: Similarly, since 2 protons are lost, the atomic number **Z** decreases by 2. This means the atom transmutates into a completely different element, located two spaces to the left on the periodic table.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "During beta decay, the mass number (A) stays the same while the atomic number (Z) increases by 1. Explain why this happens at the sub-nuclear level. (3 steps)", "answer": "- Step 1: Beta decay occurs when a neutron inside the nucleus transforms into a proton and an electron. The electron is ejected as the beta particle.\n- Step 2: The mass number **A** stays the same because a neutron (counted as 1 in the mass number) simply changes into a proton (also counted as 1 in the mass number). The total number of heavy nucleons remains constant.\n- Step 3: The atomic number **Z** increases by 1 because the nucleus has *gained* a proton (which defines Z). The ejected electron has negligible mass (counts as 0 for A) and a charge of -1, which is why in decay equations it is written as $$^{0}_{-1}e$$ to balance the charge.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "When a nucleus undergoes gamma decay, why is there no change to the mass number (A) or atomic number (Z)? (2 steps)", "answer": "- Step 1: Gamma decay is simply the nucleus releasing excess energy in the form of a high-energy photon (electromagnetic wave). It does not eject any physical particles (no protons, no neutrons).\n- Step 2: Because no matter leaves the nucleus, the count of protons (Z) and the count of protons+neutrons (A) remain entirely unchanged. The atom remains the exact same element, just in a lower, more stable energy state. (Gamma decay almost always accompanies alpha or beta decay as the new nucleus settles down).", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "What does it mean for radiation to \"ionize\" an atom, and why is this process the root cause of why radiation is dangerous to living tissue? (3 steps)", "answer": "- Step 1: Ionization occurs when radiation collides with or passes closely enough to an atom to rip away one of its electrons, turning the neutral atom into a charged ion.\n- Step 2: In living tissue, atoms are arranged in delicate molecules like DNA and proteins. Ionizing an atom in these molecules breaks chemical bonds, causing the molecule to fragment or mutate.\n- Step 3: If a DNA molecule is ionized and the damage is severe or improperly repaired, it can lead to cell death or cancerous mutations. Therefore, the danger of radiation is entirely due to its ability to disrupt the chemistry of life at the atomic level.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "Even if you take a Geiger counter into a basement with no radioactive samples present, it still registers a small count. What is this called, and what are two natural sources of it? (2 steps)", "answer": "- Step 1: This ever-present radiation is called **background radiation**. It is the baseline level of environmental radiation we are constantly exposed to.\n- Step 2: Natural sources include:\n+ **Cosmic rays** from the Sun and deep space, which bombard the Earth's atmosphere.\n+ **Radon gas** emitted by uranium-bearing rocks (like granite) in the Earth's crust, which can seep into basements.\n+ **Carbon-14** in the air and **Potassium-40** in foods like bananas, which are naturally radioactive isotopes incorporated into our bodies.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Why does background radiation vary by location, and how does this affect how a physicist measures a radioactive sample in a lab? (2 steps)", "answer": "- Step 1: Background radiation varies because geology and altitude differ. For example, areas with granite bedrock emit more radon gas (higher background), and higher altitudes have less atmosphere to shield against cosmic rays (higher background).\n- Step 2: Because of this variable baseline, a physicist must always measure the background radiation first (without the sample), then measure the sample, and finally **subtract** the background count from the sample count to find the true activity of the sample itself.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "A radioactive decay chain continues for many steps, emitting alpha and beta particles, until it finally stops at Lead (Pb). Why does the chain stop at Lead? (2 steps)", "answer": "- Step 1: The chain stops because Lead (specifically Lead-206 in the U-238 chain) is a **stable isotope**. Its ratio of protons to neutrons is perfectly balanced, meaning the strong nuclear force can permanently overcome the electrostatic repulsion between protons.\n- Step 2: Because the nucleus is stable, it no longer needs to eject particles to achieve a lower energy state. Therefore, no more transmutation occurs, and the decay chain terminates.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "In the Uranium-238 decay chain, one step transforms Thorium (Z=90) into Protactinium (Z=91). What type of decay must have occurred, and how do you know? (3 steps)", "answer": "- Step 1: We must look at how the atomic number (Z) changes. The atomic number increases from 90 to 91.\n- Step 2: In alpha decay, Z decreases by 2. In gamma decay, Z stays the same. In beta decay, a neutron turns into a proton, causing Z to increase by 1.\n- Step 3: Since Z increased by exactly 1, **beta decay** must have occurred. The mass number would remain unchanged, while the proton count increased, shifting the element one place up the periodic table.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "We cannot predict exactly when a single specific atom will decay, yet we can reliably state the \"half-life\" of a sample of those atoms. How do we reconcile the random nature of individual decay with the predictability of half-life? (3 steps)", "answer": "- Step 1: Individual nuclear decay is a spontaneous, random quantum event. There is no internal \"clock\" or external trigger; it is purely a matter of probability for any single nucleus.\n- Step 2: However, when you have a macroscopic sample, you are dealing with billions of billions of atoms. While one atom might decay immediately and another after a million years, the *probability* of decay per unit time is constant for that isotope.\n- Step 3: Due to the law of large numbers, these individual random probabilities average out into highly predictable statistical behavior. The \"half-life\" is the time it takes for *half* the atoms in a massive sample to decay, a statistical certainty that emerges from individual randomness.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "[Exercise] Uranium-238 ($$^{238}_{92}U$$) undergoes alpha decay. Write out the changes to the mass and atomic numbers, and determine the atomic number of the daughter nucleus. (3 steps)", "answer": "- Step 1: Alpha decay means the nucleus ejects an alpha particle, which has a mass number of 4 and an atomic number of 2 ($$^{4}_{2}\\alpha$$).\n- Step 2: We subtract the alpha particle's numbers from the parent: the new mass number is $$238 - 4 = 234$$. The new atomic number is $$92 - 2 = 90$$.\n- Step 3: The daughter nucleus has an atomic number of **90**. (Looking at the periodic table, element 90 is Thorium, so the equation is $$^{238}_{92}U \\rightarrow ^{234}_{90}Th + ^{4}_{2}\\alpha$$).", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "[Exercise] Carbon-14 ($$^{14}_{6}C$$) undergoes beta decay. Determine the mass number and atomic number of the daughter nucleus, and identify if it is still Carbon. (3 steps)", "answer": "- Step 1: Beta decay means a neutron turns into a proton, and an electron ($$^{0}_{-1}\\beta$$) is ejected.\n- Step 2: The mass number remains unchanged because a heavy nucleon just changed flavor: $$14 - 0 = 14$$. The atomic number increases by 1 because a proton was gained: $$6 - (-1) = 7$$.\n- Step 3: The daughter nucleus has a mass number of 14 and an atomic number of 7. Because the atomic number changed from 6 to 7, it is **no longer Carbon**; it is Nitrogen-14 ($$^{14}_{7}N$$).", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "[Exercise] A sample contains 800 radioactive atoms. If the half-life is 2 years, how many undecayed atoms remain after 6 years? (3 steps)", "answer": "- Step 1: Determine the number of half-lives that have passed. 6 years divided by a 2-year half-life equals 3 half-lives.\n- Step 2: Apply the halving process three times:\n+ After 1 half-life (2 yr): $$800 / 2 = 400$$\n+ After 2 half-lives (4 yr): $$400 / 2 = 200$$\n+ After 3 half-lives (6 yr): $$200 / 2 = 100$$\n- Step 3: After 6 years, **100** undecayed atoms remain. (Notice we don't need a complex formula, just a simple iterative halving for small numbers of half-lives).", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}], "count": 21}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What is the fundamental difference between nuclear radiation and thermal radiation? (3 steps)", "answer": "- Step 1: **Nuclear radiation** involves emission of particles (alpha/beta) or electromagnetic waves (gamma) from atomic nuclei during radioactive decay.  \n- Step 2: **Thermal radiation** is electromagnetic radiation (infrared to visible light) emitted by objects due to their temperature, unrelated to nuclear processes.  \n+ Example: A hot stove emits thermal radiation (infrared), while uranium ore emits alpha particles (nuclear radiation).  \n- Step 3: The key distinction lies in **origin**: nuclear radiation stems from instability in atomic nuclei, whereas thermal radiation arises from thermal motion of charged particles in matter.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How did Becquerel and Rutherford contribute to our understanding of radiation? (2 steps)", "answer": "- Step 1: **Becquerel** discovered natural radioactivity by observing that uranium salts fogged photographic plates without light exposure, proving radiation was emitted spontaneously.  \n- Step 2: **Rutherford** identified alpha/beta radiation through his gold foil experiment (which also revealed the atomic nucleus) and later classified gamma radiation. He demonstrated how radiation could alter elements.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why is the nucleus ~10^-15 m in size, while atoms are ~10^-10 m? (3 steps)", "answer": "- Step 1: Atoms are mostly empty space: electrons occupy orbitals far from the nucleus (quantum mechanics explains their probabilistic spread).  \n- Step 2: The nucleus contains protons/neutrons packed tightly via the **strong nuclear force**, which overcomes electrostatic repulsion between protons.  \n+ Example: If an atom were a football stadium, the nucleus would be a pea at the center.  \n- Step 3: The vast size difference reflects the balance between **electric repulsion** (long-range) and **strong force** (short-range, acts only at ~10^-15 m).", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why does alpha radiation have high ionizing power but low penetrating power? (4 steps)", "answer": "- Step 1: **High ionizing power**: Alpha particles (mass 4, +2 charge) have strong electrostatic interactions, stripping electrons from many atoms as they pass through matter.  \n+ Example: Ionizes ~10,000 atoms per cm in air.  \n- Step 2: **Low penetrating power**: Their large mass and charge cause rapid energy loss—stopped by paper or skin.  \n- Step 3: Energy loss follows the **Bethe formula**, which shows ionization increases with particle charge and decreases with velocity.  \n+ Counterintuitive: A fast alpha particle still loses energy faster than a slow beta particle.  \n- Step 4: Trade-off: High damage per interaction vs. inability to travel far.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why is a beta particle emitted from the nucleus despite being an electron? (3 steps)", "answer": "- Step 1: In beta decay, a **neutron converts to a proton** (via the weak nuclear force), emitting an electron (beta particle) and an antineutrino.  \n- Step 2: The electron is not pre-existing in the nucleus—its creation occurs during the decay process: $ n → p + e⁻ + \\bar{ν}_e $.  \n+ Misconception: Beta particles originate from electrons orbiting the nucleus—this is false; they are created during decay.  \n- Step 3: This explains why beta decay increases the atomic number by 1 (more protons) but keeps the mass number the same (neutron → proton).", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How do you balance a nuclear decay equation for alpha decay? (3 steps)", "answer": "- Step 1: Subtract 4 from the parent's mass number (helium nucleus has mass 4) and 2 from the atomic number (helium has 2 protons).  \n- Step 2: Write the daughter nucleus with these adjusted numbers.  \n+ Example: $ ^{238}_{92}\\text{U} → ^{234}_{90}\\text{Th} + ^{4}_{2}\\text{He} $.  \n- Step 3: Verify conservation of both mass and charge: total mass/atomic numbers before = after decay.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why does gamma radiation have no ionizing power compared to alpha/beta? (3 steps)", "answer": "- Step 1: Gamma rays are **high-energy photons** (no charge/mass), so they don’t directly ionize atoms via electrostatic interactions.  \n- Step 2: Ionization occurs indirectly via the **photoelectric effect** (gamma ejects electrons from atoms), but this is rare compared to charged particles.  \n+ Example: A gamma ray might pass through a human body without interacting, while alpha particles ionize every atom they pass.  \n- Step 3: Thus, gamma has **low ionizing power** but **high penetrating power**—requires thick lead/concrete to absorb.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "What defines isotopes, and why are they chemically identical? (3 steps)", "answer": "- Step 1: **Isotopes** are atoms of the same element (same proton number Z) but different neutron counts (hence different mass numbers A).  \n- Step 2: Chemical properties depend on **electron configuration**, which is determined by proton number Z.  \n+ Example: Carbon-12 and carbon-14 both have 6 protons, so they bond identically in chemical reactions.  \n- Step 3: Physical properties (e.g., stability) differ due to neutron count—extra neutrons can destabilize the nucleus.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why does a decay chain end at lead? (3 steps)", "answer": "- Step 1: Decay chains occur because daughter nuclei are often unstable (e.g., after alpha/beta decay, the nucleus may still have excess energy).  \n- Step 2: Successive decays continue until a **stable isotope** is formed—typically lead (Pb), which has a \"magic number\" of protons (82) for enhanced stability.  \n+ Example: Uranium-238 (92 protons) decays via 14 steps to lead-206 (82 protons).  \n- Step 3: Stability arises from the **optimal neutron-to-proton ratio** and closed nuclear shells in lead isotopes.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why is the half-life concept only reliable for large samples? (3 steps)", "answer": "- Step 1: Nuclear decay is **random**—individual atoms have no \"schedule\" for decay.  \n- Step 2: With **large numbers**, statistical fluctuations average out, allowing predictable half-life behavior (law of large numbers).  \n+ Example: A sample with 1 million atoms has a smooth exponential decay curve, while 10 atoms decay unpredictably.  \n- Step 3: Half-life is a **macroscopic measurement**; it cannot predict individual atom behavior but works for bulk material.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Why can gamma radiation penetrate hundreds of kilometers of air, while alpha radiation is stopped by paper? (4 steps)", "answer": "- Step 1: Gamma rays are electromagnetic waves with no charge/mass, so they interact weakly with matter.  \n- Step 2: Alpha particles are massive (+2 charge) and interact strongly via ionization, losing energy rapidly.  \n- Step 3: Penetration depends on **interaction cross-section**:  \n+ Gamma: Low cross-section (rare interactions)  \n+ Alpha: High cross-section (frequent interactions)  \n- Step 4: Air’s density matters:  \n+ Gamma: Can traverse low-density air over vast distances (hundreds of km)  \n+ Alpha: Stops after 3-10 cm due to frequent collisions", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "How does carbon-14 contribute to background radiation? (3 steps)", "answer": "- Step 1: **Carbon-14** is a beta emitter (half-life 5730 years) produced in the atmosphere by cosmic rays striking nitrogen-14.  \n- Step 2: It integrates into the carbon cycle, entering plants (via CO₂) and animals, making **all organic matter slightly radioactive**.  \n+ Example: A banana contains ~15 Bq of potassium-40, but carbon-14 adds to background radiation exposure.  \n- Step 3: Total contribution is small (~1 μSv/year globally), but it’s a natural component of background radiation.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Why does a Geiger counter detect radiation even without a nearby source? (2 steps)", "answer": "- Step 1: **Background radiation** is always present—cosmic rays, radon gas, radioactive isotopes in soil/rocks contribute to a baseline count.  \n- Step 2: The Geiger counter is sensitive enough to detect these low levels, demonstrating that radiation is ubiquitous in the environment.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "How does beta decay change the atomic number but not the mass number? (3 steps)", "answer": "- Step 1: In beta decay, a **neutron converts to a proton** (via $ n → p + e⁻ + \\bar{ν}_e $), increasing the atomic number Z by 1.  \n- Step 2: The mass number A (p + n) remains unchanged because a neutron is replaced by a proton.  \n+ Example: Carbon-14 (Z=6, A=14) becomes nitrogen-14 (Z=7, A=14).  \n- Step 3: This explains why beta decay shifts the element on the periodic table but keeps the isotope mass constant.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Why is lead used to block gamma radiation instead of aluminum? (3 steps)", "answer": "- Step 1: Gamma rays interact with matter via the **photoelectric effect**, Compton scattering, or pair production.  \n- Step 2: **High-density materials** with high atomic numbers (like lead, Z=82) have more electrons per volume to increase interaction probability.  \n+ Example: 1 cm of lead blocks ~99% of gamma rays, while 1 m of air or 1 cm of aluminum would not.  \n- Step 3: Practicality: Lead’s density (11.3 g/cm³) vs. aluminum (2.7 g/cm³)—lead provides more \"electron targets\" per unit volume.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}], "count": 15}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What are the three key differences between nuclear radiation and thermal radiation?", "answer": "- Step 1: **Origin** — Nuclear radiation originates from the nucleus during radioactive decay, while thermal radiation is emitted by all objects due to their temperature (vibrational/rotational motion of atoms).  \n- Step 2: **Nature** — Nuclear radiation includes particles (α, β) and electromagnetic waves (γ), whereas thermal radiation is exclusively electromagnetic waves (infrared).  \n- Step 3: **Purpose** — Nuclear radiation involves energy release to stabilize the nucleus, while thermal radiation is a cooling mechanism for objects.  \n+ Example: A person emits thermal radiation (body heat), while uranium emits nuclear radiation (α particles).", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How did Marie Curie, Becquerel, and Rutherford contribute to the discovery of radiation? (3 steps)", "answer": "- Step 1: **Becquerel** — Discovered spontaneous radiation from uranium salts by observing fogged photographic plates without exposure to light.  \n- Step 2: **Marie Curie** — Identified radioactivity as an atomic property and isolated radioactive elements (radium and polonium).  \n- Step 3: **Rutherford** — Classified radiation into α, β, and γ rays and linked radiation to atomic structure studies (gold foil experiment).", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why do alpha particles have high ionizing power but low penetrating power?", "answer": "- Step 1: **Composition** — Alpha particles are large (2 protons + 2 neutrons) with a +2 charge.  \n- Step 2: **Ionization** — Strong electric field strongly interacts with atoms, stripping electrons (ionizing).  \n- Step 3: **Penetration** — Energy loss happens rapidly due to frequent collisions, so they cannot travel far (stopped by paper).  \n+ Example: Alpha particles are dangerous if ingested but harmless on skin.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Explain the origin of a beta particle during beta decay. (3 steps)", "answer": "- Step 1: **Nuclear process** — A neutron decays into a proton, emitting a beta particle (electron) and an antineutrino.  \n- Step 2: **Equation** — $ n \\rightarrow p^+ + e^- + \\bar{\\nu} $.  \n- Step 3: **Why from the nucleus?** — Despite being electrons, beta particles originate in the nucleus because neutrons/protons are nuclear particles.  \n+ Misconception: Beta particles are not orbital electrons but originate in the nucleus.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Balance this alpha decay equation: $$^{226}_{88}Ra \\rightarrow ? + ^4_2He$$", "answer": "- Step 1: **Mass number** — Subtract 4 (alpha particle): $ 226 - 4 = 222 $.  \n- Step 2: **Atomic number** — Subtract 2: $ 88 - 2 = 86 $.  \n- Step 3: **Element** — Atomic number 86 is radon (Rn).  \n+ Final equation: $ ^{226}_{88}Ra \\rightarrow ^{222}_{86}Rn + ^4_2He $.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Why does gamma radiation not change the element in a decay equation?", "answer": "- Step 1: **Nature of gamma** — Gamma rays are electromagnetic waves with no mass or charge.  \n- Step 2: **Effect on nucleus** — Only excess energy is emitted; protons and neutrons remain unchanged.  \n- Step 3: **Conclusion** — No change in atomic number or mass number, so the element stays the same.  \n+ Example: $ ^{60}_{27}Co \\rightarrow ^{60}_{27}Co + \\gamma $.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Rank alpha, beta, and gamma radiation by:  \na) Ionizing power (high → low)  \nb) Penetrating power (low → high)", "answer": "- Step 1: **Ionizing power** — Alpha > Beta > Gamma (size and charge determine interaction strength).  \n- Step 2: **Penetrating power** — Alpha < Beta < Gamma (opposite to ionizing power).  \n- Step 3: **Explanation** — High ionizing power means energy is lost quickly (low penetration), while low ionizing power means energy is retained (high penetration).", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "What is the random nature of radioactive decay, and how does half-life emerge from this?", "answer": "- Step 1: **Randomness** — Individual decay timing is unpredictable; no external factors influence it.  \n- Step 2: **Statistical certainty** — With large samples, the probability of decay becomes predictable (e.g., 50% decay after one half-life).  \n- Step 3: **Half-life definition** — Time required for half the undecayed nuclei to disintegrate, a statistical measure.  \n+ Example: Even if one atom remains, its decay time is still random.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Why do isotopes of an element have the same chemical properties but different stabilities?", "answer": "- Step 1: **Same element** — Isotopes have the same number of protons and electrons, governing chemical behavior.  \n- Step 2: **Different neutrons** — Neutron count affects nuclear stability (strong nuclear force vs. electrostatic repulsion).  \n- Step 3: **Decay tendency** — Unstable isotopes (radioisotopes) undergo decay to reach a stable neutron-proton ratio.  \n+ Example: Carbon-12 (stable) vs. Carbon-14 (radioactive).", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How does a Geiger counter detect radiation, and what does it measure?", "answer": "- Step 1: **Principle** — Radiation ionizes gas inside the tube, creating a detectable electric current pulse.  \n- Step 2: **Measurement** — Counts the number of ionizing particles (clicks) but cannot distinguish radiation types.  \n- Step 3: **Background** — Always shows low counts due to ambient radiation (e.g., radon, cosmic rays).  \n+ Application: Used to monitor exposure in nuclear facilities.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Why does the uranium-238 decay chain end at lead-206?", "answer": "- Step 1: **Stable nucleus** — Lead-206 has a balanced neutron-proton ratio, minimizing nuclear forces.  \n- Step 2: **Decay steps** — Series of α and β decays reduce mass and stabilize the nucleus.  \n- Step 3: **Alpha role** — Emission reduces mass number significantly, while β decays adjust atomic number.  \n+ Example: 8 α decays remove 32 mass units (238 → 206).", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "List four natural sources of background radiation and explain two human-based factors affecting its level.", "answer": "- Step 1: **Natural sources** — Cosmic rays (space), radon gas (rocks), potassium-40 (bananas), carbon-14 (atmosphere).  \n- Step 2: **Human factors** — Medical X-rays (exposure) and nuclear power (accidents or waste).  \n- Step 3: **Location effect** — Radon concentration in basements (geology) and altitude (cosmic rays).  \n+ Example: Higher radiation at high altitudes due to thin atmosphere.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}], "count": 12}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "Marie Curie discovered radiation by distilling uranium salts. Why was this method significant, and what did she actually discover? (2 steps)", "answer": "- Step 1: Distilling uranium salts separated out a highly radioactive element — radium — which emitted far more radiation than uranium itself. This showed radiation wasn't a property of uranium atoms but of specific *isotopes* with unstable nuclei.\n- Step 2: Curie realized the radiation came from the *nuclear* breakdown of elements, not chemical reactions. This was the first evidence that atoms had unstable nuclei that could spontaneously emit particles — founding the field of nuclear physics.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "The nucleus of an atom is about 10^-15 m in size, while the atom is about 10^-10 m. If you scaled the atom up to the size of a football stadium, how big would the nucleus be in comparison? (2 steps)", "answer": "- Step 1: The ratio is 10^-15 / 10^-10 = 10^-5, or one hundred-thousandth. This is the same as saying the nucleus is 1/100,000 of the atom's size.\n- Step 2: If an atom were a football stadium (say, 100 meters across), the nucleus would be about 1 millimeter across — roughly the size of a pinhead. This shows how incredibly small and dense the nucleus is, and why radiation experiments revealed its existence: alpha particles could be deflected by this tiny, dense core.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": true}, {"question": "An alpha particle has a charge of +2 and a relative mass of 4. A beta particle has a charge of -1 and relative mass ~0. A gamma ray has charge 0 and mass 0. Explain why these properties determine their ionizing power. (3 steps)", "answer": "- Step 1: Ionizing power depends on how effectively the radiation removes electrons from atoms — it needs to collide with atoms and transfer enough energy to knock electrons loose.\n- Step 2: Alpha particles are heavy (+2 charge), so they plow through matter slowly, colliding frequently with atoms. Each collision can ionize an atom, giving alpha the HIGHEST ionizing power. Beta particles are lighter (-1 charge), move faster, and collide less often → MEDIUM ionizing power. Gamma rays have no charge or mass, so they pass through matter with little interaction → LOW ionizing power.\n+ Think of it like a bowling ball (alpha) vs. a tennis ball (beta) vs. a ghost walking through (gamma)\n- Step 3: The same factors (charge and mass) that make alpha great at ionizing also make it poor at penetration — it loses energy quickly in those collisions and stops after just a few centimeters of air.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "A physics student claims, \"Gamma radiation is the most dangerous because it has the highest ionizing power.\" Explain why this is wrong and which radiation is actually most dangerous to living tissue, and why. (3 steps)", "answer": "- Step 1: The statement gets it backwards: gamma has the LOWEST ionizing power, not highest. Gamma rays pass through matter with minimal interaction because they have no charge.\n- Step 2: Alpha is actually most dangerous *per particle* because each alpha particle causes massive ionization damage along its short path. However, alpha can't penetrate skin — so external exposure to alpha sources is safe. The danger comes when alpha-emitting substances (like radon gas or plutonium) are inhaled or ingested, where the high ionization directly damages internal tissue.\n- Step 3: The actual danger ranking depends on exposure route:\n+ External: gamma (penetrates) > beta > alpha (blocked by skin)\n+ Internal (ingested/inhaled): alpha (high ionization damage) > beta > gamma", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "You have three radiation sources and three shielding materials: paper, aluminum, and lead. Without looking at a table, how would you match each radiation type to its appropriate shield? Explain your reasoning using the physical properties of each radiation. (3 steps)", "answer": "- Step 1: Alpha is massive (+2 charge) — it can't get through thin barriers. Paper is enough because alpha barely penetrates anything. So paper → alpha.\n- Step 2: Beta is an electron (lighter, -1 charge) — it penetrates further than alpha but is stopped by a few mm of metal. Aluminum fits this. So aluminum → beta.\n- Step 3: Gamma is EM radiation with no mass/charge — it penetrates deeply and requires dense material to stop it. Lead is the densest common metal, so it makes sense for gamma. So lead → gamma.\n+ The logic: match the shielding density to the penetration ability, which itself comes from charge and mass", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "In beta decay, a neutron in the nucleus turns into a proton and emits an electron. But electrons exist outside the nucleus normally — so where does the beta particle actually come from? Explain this seeming paradox. (3 steps)", "answer": "- Step 1: In normal atoms, electrons orbit the nucleus in specific energy levels. But in beta decay, the emitted electron is NOT one of these orbiting electrons — it's created *inside* the nucleus during the transformation.\n- Step 2: A neutron (which is actually made of up quark + down quark + down quark) transforms: one down quark changes to an up quark, turning the neutron into a proton. This transformation simultaneously creates an electron (the beta particle) and an antineutrino to conserve energy and momentum.\n+ This is a fundamental weak nuclear force process — the neutron doesn't \"contain\" an electron; it *becomes* a proton while ejecting a newly-created electron\n- Step 3: The key insight: the electron is created at the moment of decay via the weak force, not pre-existing inside the nucleus. That's why beta particles come from the nucleus itself, not the electron shells.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": true}, {"question": "Write the nuclear notation for Uranium-238, explaining what each number means and how they relate to the atom's structure. (2 steps)", "answer": "- Step 1: The notation is ²³⁸₉₂U, where:\n+ 238 = mass number (A) = total protons + neutrons in the nucleus\n+ 92 = atomic/proton number (Z) = number of protons, which defines what element it is\n- Step 2: This tells us Uranium-238 has 92 protons. Since the mass number is 238, it must have 238 - 92 = 146 neutrons. The element is determined solely by the proton number — any atom with 92 protons is uranium, regardless of how many neutrons it has.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "In alpha decay, the parent nucleus emits an alpha particle (⁴₂He). If Radium-226 (²²⁶₈₈Ra) undergoes alpha decay, what is the daughter nucleus? Write the complete decay equation and explain how you determined it. (3 steps)", "answer": "- Step 1: Alpha decay decreases the mass number by 4 (losing 2 protons + 2 neutrons in the alpha particle) and decreases the atomic number by 2 (losing 2 protons).\n- Step 2: Starting with ²²⁶₈₈Ra:\n+ New mass number: 226 - 4 = 222\n+ New atomic number: 88 - 2 = 86\n+ Element with 86 protons is radon (Rn)\n- Step 3: The complete decay equation: ²²⁶₈₈Ra → ²²₂₈₆Rn + ⁴₂He\n+ Check: 226 = 222 + 4 ✓, 88 = 86 + 2 ✓", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Carbon-14 (¹⁴₆C) undergoes beta decay to become Nitrogen-14. Write the complete decay equation, explaining what happens to the neutron-to-proton ratio and why this type of decay occurs in neutron-rich nuclei. (3 steps)", "answer": "- Step 1: In beta decay, a neutron converts to a proton + electron (the beta particle). The mass number stays the same (neutron and proton both count as 1 in mass number), but the atomic number increases by 1.\n- Step 2: ¹⁴₆C → ¹⁴₇N + ⁰₋₁e\n+ Mass numbers: 14 = 14 + 0 ✓\n+ Atomic numbers: 6 = 7 + (-1) ✓\n- Step 3: This happens in neutron-rich nuclei — too many neutrons relative to protons makes the nucleus unstable. By converting a neutron to a proton, the nucleus moves toward a more stable neutron-to-proton ratio. Carbon-14 has 6 protons and 8 neutrons (ratio 1.33); after decay, nitrogen-14 has 7 protons and 7 neutrons (ratio 1.0, more stable).", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "A nucleus undergoes gamma decay: ⁶⁰₂₇Co → ⁶⁰₂₇Co + γ. No particles are emitted — only energy. Explain what actually changed in the nucleus and why gamma decay often accompanies alpha or beta decay. (3 steps)", "answer": "- Step 1: The mass number and atomic number don't change because gamma decay doesn't involve a particle — it's a high-energy photon (electromagnetic wave) being emitted from an excited nucleus.\n- Step 2: After alpha or beta decay, the daughter nucleus is often left in an *excited state* (with excess energy, like a compressed spring). This excited state is unstable, so the nucleus releases the excess energy as a gamma ray to return to its ground (stable) state.\n+ Think of gamma as the \"settling down\" energy release after the main structural change\n- Step 3: Gamma decay is the nucleus shedding energy while keeping its proton/neutron count the same — it's analogous to how an excited electron in an atom emits a photon to drop to a lower energy level, except here it's the nucleus doing the same thing.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Two samples of radioactive material are being discussed. Sample A has high penetrating power but low ionizing power. Sample B has high ionizing power but low penetrating power. Identify which is alpha, beta, and gamma, and explain the inverse relationship between these two properties. (2 steps)", "answer": "- Step 1: Sample A = gamma (high penetration, low ionization). Sample B = alpha (high ionization, low penetration). Beta falls in between for both properties.\n- Step 2: This inverse relationship occurs because the same properties that cause ionization also cause the radiation to lose energy and stop:\n+ Alpha: heavy, highly charged → creates many ionizations → loses energy quickly → can't go far = low penetration\n+ Gamma: no charge, no mass → creates few ionizations → loses energy slowly → goes far = high penetration\n+ The more \"aggressive\" the radiation is at ionizing (knocking electrons loose), the faster it expends its energy and the shorter its range.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "A Geiger counter in your lab reads 15 counts per minute even when no radioactive sources are present. Explain what this reading represents and identify at least three natural sources of this \"background radiation.\" (3 steps)", "answer": "- Step 1: This is background radiation — ionizing radiation present everywhere from natural sources. The Geiger counter is detecting it constantly, not \"zero\" because radiation is literally everywhere.\n- Step 2: Major natural sources include:\n+ Cosmic rays: high-energy particles from the Sun and distant stars\n+ Radon gas: radioactive gas released from rocks (especially granite) in the ground, can accumulate in buildings\n+ Potassium-40 (⁴⁰₁₉K): naturally occurring radioactive isotope in bananas, potatoes, and your own body\n+ Carbon-14 (¹⁴₆C): created in the atmosphere by cosmic rays, present in all living things\n- Step 3: Background radiation varies by location — areas with more granite rock have higher radon levels; living at high altitude (more atmosphere to shield) exposes you to more cosmic rays. It's why radiation experiments always subtract the background count.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "The decay chain of Uranium-238 goes through multiple steps: U-238 → Th-234 → Pa-234 → U-234 → ... → Pb-206 (stable). Explain why this chain exists and why it involves different types of decay at different steps. (3 steps)", "answer": "- Step 1: A single alpha or beta decay often doesn't reach a stable nucleus — it creates a new nucleus that's still unstable. So it decays again, and again, forming a chain until reaching a stable element (lead in this case).\n- Step 2: Different steps use different decay types because each decay changes the proton-to-neutron ratio differently:\n+ Alpha reduces protons by 2 and neutrons by 2 — shifts ratio toward \"too few protons\"\n+ Beta increases protons by 1 (converting neutron to proton) — shifts ratio toward \"more protons\"\n+ The chain alternates decay types to gradually adjust the ratio toward stability\n- Step 3: Some steps in the chain take thousands of years (U-238 half-life = 4.5 billion years), while others take fractions of a second — the time depends on how unstable each intermediate nucleus is.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "Two students are arguing about radioactive decay. Student A says, \"If I has a radioactive atom, I can predict exactly when it will decay.\" Student B says, \"But if I have a billion atoms, I can predict exactly how many will decay in one hour.\" Who is correct? Explain why. (3 steps)", "answer": "- Step 1: Student A is wrong — individual decay is completely random. Each atom has a probability of decaying in a given time, but no individual atom has a \"schedule.\" You cannot predict when any specific atom will decay.\n- Step 2: Student B is partially correct — with a large number of atoms, the statistical behavior becomes predictable. The decay rate follows an exponential pattern: given the half-life, you can calculate the expected number of decays with very high precision.\n+ But even with a billion atoms, you can't predict the *exact* number — only the expected value and the probability distribution\n- Step 3: This is the key concept: randomness at the individual level → predictability at the population level. It's like flipping a coin — you can't predict one flip, but with 10,000 flips you know it'll be very close to 50% heads.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": true}, {"question": "The half-life of Carbon-14 is about 5,730 years. If you have a sample that currently contains 1000 Carbon-14 atoms, approximately how many will remain after 17,190 years (three half-lives)? Explain your reasoning. (2 steps)", "answer": "- Step 1: Each half-life reduces the number by half:\n+ After 1 half-life (5,730 years): 1000 → 500\n+ After 2 half-lives (11,460 years): 500 → 250\n+ After 3 half-lives (17,190 years): 250 → 125\n- Step 2: Approximately 125 Carbon-14 atoms would remain. The key insight is that half-life is a statistical average — with large numbers the decay is predictable, but with only 1000 atoms, statistical fluctuations would be significant. For archaeological dating (with billions of atoms), the calculation is much more accurate.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "What is an isotope? Explain why different isotopes of the same element can have vastly different nuclear stability and radiation properties. (2 steps)", "answer": "- Step 1: Isotopes are atoms of the same element (same number of protons) but with different numbers of neutrons. For example, Carbon-12 (6 protons, 6 neutrons) and Carbon-14 (6 protons, 8 neutrons) are isotopes of carbon.\n- Step 2: The stability of a nucleus depends on the balance between protons (repelling each other) and the strong nuclear force (attracting all nucleons). Adding neutrons increases the strong force without adding repulsion — but too many or too few neutrons makes the nucleus unstable. So isotopes with the \"right\" number of neutrons are stable; others are radioactive with different decay modes and half-lives.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "Why is radon gas considered a particularly dangerous source of background radiation in homes, and how does it differ from other background radiation sources like bananas or cosmic rays? (3 steps)", "answer": "- Step 1: Radon (²²²₈₆Rn) is a radioactive gas released from uranium in granite rocks underground. It can seep into homes through foundations and accumulate in basements and lower floors. Being a gas, it's inhaled directly into the lungs.\n- Step 2: Unlike banana potassium-40 or carbon-14 (which are inside your body but at very low levels), radon is an *inhaled* alpha emitter. The alpha particles are emitted directly inside lung tissue, causing high localized damage.\n+ Other sources: cosmic rays hit you from above (external), potassium-40 is distributed throughout your body at low levels, radon concentrates in enclosed spaces\n- Step 3: Radon is the largest single source of background radiation exposure for most people in many regions — which is why homes are tested for radon levels, especially in areas with granite bedrock.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "In the Uranium-238 decay chain, one step is: ²³⁴₉₁Pa → ²³⁴₉₂U + β⁻. Verify that this equation is balanced and explain what type of decay this represents. (3 steps)", "answer": "- Step 1: Check mass numbers: 234 = 234 + 0 ✓ (beta particle has mass number 0)\n- Step 2: Check atomic numbers: 91 = 92 + (-1) ✓ (beta particle has atomic number -1)\n- Step 3: This is beta-minus decay. The daughter nucleus has one more proton (and one less neutron) than the parent. The neutron-to-proton ratio decreased — this happens when the nucleus has too many neutrons and needs to move toward stability by converting a neutron to a proton.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "A radioactive source is labeled as emitting \"beta radiation.\" A student wants to stop it using a magnet, reasoning that since beta is an electron, a magnetic field should deflect it. Will this work? Explain why or why not. (3 steps)", "answer": "- Step 1: Yes, a magnet will deflect beta particles. Moving charged particles experience a force in a magnetic field (F = qvB), causing them to curve. Since beta particles are electrons (charge -1), they'll curve perpendicular to both their velocity and the magnetic field direction.\n- Step 2: However, whether this \"stops\" the radiation depends on the setup. The deflection changes the path but doesn't remove the particles — they still exist and can still cause ionization elsewhere. For practical shielding, you'd still use aluminum or plastic.\n- Step 3: This is actually used in physics experiments to separate different types of radiation — alpha (positive charge) curves one way, beta (negative) curves the opposite direction, and gamma (no charge) goes straight. This property helped scientists identify and distinguish the radiation types historically.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Explain why gamma rays can travel hundreds of kilometers through air, while alpha particles are stopped within a few centimeters. Use the concept of interaction probability in your explanation. (2 steps)", "answer": "- Step 1: Gamma rays are electromagnetic radiation with no charge and no mass. They interact with matter only rarely — most gamma photons pass right through without colliding with anything. Even in air (which is mostly empty space at the atomic scale), gamma has a very low probability of hitting and ionizing an atom, so it travels great distances before being absorbed.\n- Step 2: Alpha particles are massive (+2 charge) and interact strongly with matter. They constantly collide with air molecules, ionizing many atoms along their short path. Each collision drains their energy quickly. After just a few centimeters, they've lost all their kinetic energy and stop. The interaction probability for alpha in air is extremely high compared to gamma.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "You discover a new element with atomic number 92 but mass numbers of 235 and 238. One is used in nuclear reactors, the other is not. Explain what this means and why one isotope is \"fissile\" while the other isn't. (2 steps)", "answer": "- Step 1: These are uranium isotopes: ²³⁵₉₂U (Uranium-235) and ²³⁸₉₂U (Uranium-238). Both have 92 protons (so both are uranium), but U-235 has 143 neutrons while U-238 has 146 neutrons.\n- Step 2: Only U-235 is fissile (can sustain a nuclear chain reaction). When a slow neutron hits U-235, the nucleus splits (fission). U-238, when hit by a slow neutron, simply absorbs it but doesn't fission readily — it needs fast neutrons. This is why nuclear fuel must be enriched (increased proportion of U-235) — natural uranium is mostly U-238 which can't sustain the chain reaction.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "Why do scientists use \"relative mass\" of 4 for alpha particles and \"~0\" for beta particles, rather than actual mass values? What does this tell us about the nature of these particles? (2 steps)", "answer": "- Step 1: Alpha particles (helium nuclei) have mass approximately 4 atomic mass units because they're made of 2 protons + 2 neutrons. Beta particles (electrons) have mass of 1/1836 of a proton — so small relative to protons/neutrons that it's treated as zero in many contexts.\n- Step 2: This convention emphasizes that alpha is a *heavy, slow-moving* particle that packs a punch per collision, while beta is a *light, fast* particle that zip through matter. The \"relative mass\" framing highlights the dramatic difference in their behavior: alpha plows through matter; beta darts through it. At the A-level perspective, treating beta mass as zero is a useful simplification that reflects its negligible mass compared to nucleons.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "A sample of a radioactive isotope has a half-life of 1 hour. If you start with 100% of the atoms, after how many hours will the sample be 12.5% radioactive? Explain the pattern and why it matters. (2 steps)", "answer": "- Step 1: Each half-life reduces the amount by half:\n+ 100% → 50% (1 hour)\n+ 50% → 25% (2 hours)\n+ 25% → 12.5% (3 hours)\n- Step 2: After 3 hours (three half-lives), 12.5% remains. The pattern is exponential decay: after n half-lives, percentage remaining = (1/2)^n × 100%. This matters because radioactive waste or archaeological dating both rely on knowing how much original material remains — the exponential pattern lets us calculate ages or remaining activity far into the future or past.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Explain why we can sometimes \"see\" radiation effects on photographic film, using the historical discovery by Becquerel as context. How does this connect to how Geiger counters work? (2 steps)", "answer": "- Step 1: Becquerel placed uranium salts on a photographic plate wrapped in black paper, and after development, the plate showed an impression — even though light was blocked. The radiation (alpha, beta, gamma) exposed the photographic emulsion, just like light would.\n- Step 2: This works because ionizing radiation knocks electrons loose in the photographic material, causing chemical changes that become visible when developed. Geiger counters work on a related principle: radiation ionizes gas atoms in the detector, creating a tiny electrical pulse that can be counted. Both methods detect ionization — the fundamental property of nuclear radiation.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": f
