iger counter always clicks — so when measuring a specific source, you must *subtract* the background reading.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "Why does background radiation level vary substantially by location? (3 steps)", "answer": "- Step 1: Geology matters — areas built on granite (e.g. Cornwall, parts of Aberdeen) have more uranium/thorium, hence more radon seepage and higher background.\n- Step 2: Altitude matters — at higher elevations there's less atmosphere shielding cosmic rays, so airline pilots and mountain dwellers receive more cosmic dose.\n- Step 3: Building materials and ventilation matter indoors — radon can accumulate in poorly-ventilated basements, raising local dose substantially.\n\nTakeaway: background isn't a universal constant; it's a local average that depends on what's under you, above you, and around you.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Why is the decay of a single nucleus described as \"random,\" and how can we still make accurate predictions about radioactive samples? (3 steps)", "answer": "- Step 1: At the quantum level, decay is genuinely probabilistic — no measurement or calculation can tell you *when* a particular nucleus will decay. It has a fixed probability per unit time, but the actual moment is unpredictable.\n- Step 2: This is analogous to a fair die: you can't predict any single roll, but you can predict that out of a million rolls about 1/6 will be sixes.\n- Step 3: With $$N \\sim 10^{20}$$ atoms in a typical sample, statistical fluctuations average out, and the *fraction* decaying per second is extremely well-defined. From this emerges the concept of half-life — the time for half of a large sample to decay.\n\nTakeaway: randomness at the individual level + huge numbers = deterministic behaviour at the bulk level.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "What is meant by \"half-life,\" and why is it a useful single number to describe a random process? (3 steps)", "answer": "- Step 1: Half-life is the time required for half the atoms in a sample to decay. After one half-life, 50% remain; after two, 25%; after three, 12.5%; and so on.\n- Step 2: Because the probability of any one atom decaying per second is constant, the *fraction* lost per unit time is constant. This means the decay is exponential, and the half-life is a fixed property of the isotope, independent of how much you started with.\n- Step 3: It's useful because it neatly summarises the entire decay curve in one number, and lets you compare isotopes (uranium-238 ~$$4.5 \\times 10^9$$ years vs polonium-214 ~$$10^{-4}$$ s — twenty orders of magnitude!).", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "What is a decay chain, and why do unstable nuclei often need multiple decays to reach stability? (3 steps)", "answer": "- Step 1: A decay chain is a sequence of decays in which the daughter is itself unstable and decays further, continuing until a stable nucleus is reached.\n- Step 2: A single alpha or beta decay typically nudges the nucleus toward but not all the way to the \"valley of stability\" (the optimal ratio of neutrons to protons). Heavy nuclei often need many steps to reduce both their size and adjust their n:p ratio.\n- Step 3: Example: $$^{238}\\text{U}$$ undergoes a chain of α and β decays through Th, Pa, Ra, Rn, Po, etc., terminating at stable $$^{206}\\text{Pb}$$. Steps range from microseconds to billions of years.\n\nTakeaway: stability is a destination; decay chains are the path.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Within the $$^{238}\\text{U}$$ decay chain, two consecutive daughters can be the *same element*. How does this happen?", "answer": "When a beta decay raises $$Z$$ by 1 to give element X, and then another beta decay raises $$Z$$ by 1 again to give element Y, you might pass back through X if a subsequent alpha decay drops $$Z$$ by 2. For example, the chain visits uranium twice ($$^{238}\\text{U}$$ initially, then later $$^{234}\\text{U}$$ after $$\\beta$$, $$\\beta$$ from thorium) — same element, different mass number, i.e. isotopes. Likewise the chain passes through thorium twice. So the chain weaves back and forth across the periodic table as α steps left and β steps right.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "What is an isotope, and why do isotopes of the same element have nearly identical chemistry but very different nuclear behaviour? (3 steps)", "answer": "- Step 1: Isotopes are atoms with the same number of protons (same Z, same element) but different numbers of neutrons (different A).\n- Step 2: Chemistry is governed by electrons, and electrons \"see\" only the proton count (which determines the nuclear charge). Since Z is identical for isotopes, they bond and react virtually the same way.\n- Step 3: Nuclear properties depend on the n:p ratio and total nucleon count, which differ. So one isotope might be stable for billions of years while another decays in microseconds — even though they're chemically interchangeable.\n\nExample: $$^{12}\\text{C}$$ (stable) and $$^{14}\\text{C}$$ (radioactive) behave identically in CO₂ but only the latter decays.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "Suppose you measure 50 counts per second from a sample, but the background reading is 20 counts per second. Conceptually, what does the *true* activity of the sample tell you, and what would you do? (3 steps)", "answer": "- Step 1: The Geiger counter measures all radiation it detects, including background. So the raw 50 cps mixes sample + background.\n- Step 2: Subtract: true sample activity $$\\approx 50 - 20 = 30$$ cps. This is the activity actually coming from the sample.\n- Step 3: This matters when comparing weak sources to background — if your raw reading is only slightly above background, the sample is barely radioactive and the difference may be statistical noise, not a real signal.\n\nTakeaway: always background-subtract before drawing conclusions.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "A radioactive source in a lab cupboard reads 0 cps on the Geiger counter through a closed steel door. What type of radiation is *least* likely to be the only emission, and why? (3 steps)", "answer": "- Step 1: Alpha can't get through paper, let alone steel — totally blocked. Beta can be blocked by a few mm of aluminium, so it would also be blocked by a steel door.\n- Step 2: Gamma travels through air for hundreds of metres and is only significantly attenuated by lead or thick concrete — a steel door would let plenty through.\n- Step 3: So if the reading is truly 0 above background, the source likely emits only α or β (not γ). A γ-emitter would still register through the door.\n\nTakeaway: penetration testing is how you identify what type of radiation a source emits.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Why is a beta particle written as $$^{\\,0}_{-1}e$$ in decay equations, and how does this notation maintain conservation laws? (3 steps)", "answer": "- Step 1: The superscript (mass number) is 0 because the electron's mass is negligible compared to a nucleon (~1/2000), so it doesn't carry away a nucleon.\n- Step 2: The subscript is $$-1$$ because the electron's charge is $$-1$$ in units of the elementary charge — and in decay equations the bottom number conserves *charge*, not just proton count.\n- Step 3: Check: in $$^{14}_{6}\\text{C} \\to {}^{14}_{7}\\text{N} + {}^{\\,0}_{-1}e$$, the top numbers give $$14 = 14 + 0$$ ✓ and the bottom give $$6 = 7 + (-1)$$ ✓. The $$-1$$ ensures total charge is conserved when a neutral neutron becomes a positive proton + negative electron.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "Why can a Geiger counter detect alpha, beta, and gamma even though they have very different ionising powers? (3 steps)", "answer": "- Step 1: A Geiger-Müller tube contains low-pressure gas at high voltage. When radiation enters and ionises even one gas atom, the freed electron is accelerated by the strong field, hits more atoms, ionises them, and triggers an avalanche → detectable pulse.\n- Step 2: Because amplification is huge, even weak ionisers like gamma can trigger a click — provided the gamma actually interacts with a gas atom (which is unlikely per photon, but still happens often enough).\n- Step 3: Alpha gives the strongest signal per particle but is often stopped by the tube's window unless a special thin window is used. So practical detectors are tuned to which radiation they want to detect — but in principle the tube responds to all three.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "Imagine you're handed a sealed metal box that's radioactive and want to determine what kind of radiation it emits. Describe a conceptual procedure using nothing but absorbers and a Geiger counter. (3 steps)", "answer": "- Step 1: First measure raw count with no absorber, then subtract background. Call this $$R_0$$.\n- Step 2: Place a sheet of paper between source and counter. If the count drops noticeably, alpha is present. If unchanged, no alpha (or alpha was already absorbed by the box).\n- Step 3: Replace paper with a few mm of aluminium. Any further drop ⇒ beta. Finally, add a thick lead block. If counts still significantly exceed background, gamma is present; if counts drop to background, no gamma.\n\nTakeaway: layered absorption is a fingerprinting technique for radiation types.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Why is the existence of a *decay chain* (rather than a single decay) evidence that the universe contains long-lived radioactive elements at all today? (3 steps)", "answer": "- Step 1: Most unstable isotopes decay quickly relative to the age of Earth (~4.5 billion years). If everything decayed fast, none of it would still be around.\n- Step 2: $$^{238}\\text{U}$$ has a half-life of ~4.5 billion years — comparable to Earth's age — so significant amounts remain from the original supply formed in supernovae.\n- Step 3: As $$^{238}\\text{U}$$ slowly decays, it continuously produces short-lived daughters (Ra, Rn, Po, etc.) which would have vanished long ago if not continuously replenished. So the *chain* explains why we see radon today — it's \"fed\" by the slow trickle from uranium upstream.\n\nTakeaway: long half-life at the top keeps the rest of the chain supplied.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "What's the conceptual difference between \"penetrating power\" and \"range,\" and which depends on the medium more strongly? (3 steps)", "answer": "- Step 1: Range is the actual distance the radiation travels before being stopped, which depends on the medium (air, water, lead). Penetrating power is a more abstract ranking of how easily radiation passes through matter in general.\n- Step 2: Both depend on the medium. Alpha has a range of a few cm in air but only micrometres in tissue; gamma has a range of km in air but only metres in concrete.\n- Step 3: Range strongly depends on the density and electron content of the medium; penetrating power as a ranking is medium-independent in the sense that γ beats β beats α regardless of what you try to shield with.\n\nTakeaway: \"penetrating power\" is a relative property of the radiation; \"range\" is the concrete distance in a specific material.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Why does ionisation cause biological damage even though only a tiny fraction of the body's atoms get ionised by typical radiation exposure? (3 steps)", "answer": "- Step 1: Cells rely on specific molecules — particularly DNA — to function. DNA is essentially a single molecular blueprint per cell.\n- Step 2: Ionisation can break chemical bonds in DNA, mutating it. Even a small number of breaks in the wrong place can cause a cell to malfunction, die, or become cancerous.\n- Step 3: So damage isn't about the *number* of atoms ionised but about *which* atoms. Ionising a water molecule in a cell is mostly harmless; ionising a DNA base can be catastrophic. Alpha is especially dangerous internally because it deposits very dense ionisation in a small volume — multiple hits on one DNA strand at once.\n\nTakeaway: biology is fragile to targeted damage, not aggregate damage.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "A common misconception: \"Gamma radiation must be the most dangerous because it's the most penetrating.\" Why is this not the whole story? (3 steps)", "answer": "- Step 1: Penetrating ≠ damaging. Damage comes from ionisation deposited in tissue. Gamma penetrates easily because it interacts weakly — so much of it passes straight through without doing harm.\n- Step 2: Alpha deposits all its energy in a tiny volume if inside the body — making it dose-for-dose far more biologically damaging than gamma.\n- Step 3: The right ranking depends on context: external exposure ⇒ gamma is the main concern (alpha can't penetrate skin); internal exposure (ingested/inhaled) ⇒ alpha is the worst by far. Beta sits in between in both cases.\n\nTakeaway: \"penetrating\" and \"biologically damaging\" measure different things.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "A nucleus emits a beta and then a gamma in quick succession. What does this tell you about the state of the daughter nucleus immediately after beta decay? (3 steps)", "answer": "- Step 1: Beta decay alone doesn't always leave the daughter in its ground state — the conversion $$n \\to p$$ can leave the new nucleus with excess internal energy.\n- Step 2: This excited daughter then de-excites by emitting a gamma photon, just like an excited atom releases light.\n- Step 3: So the sequence (β then γ) is evidence that nuclei have discrete energy levels analogous to electronic levels in atoms, and that decays sometimes don't go directly to the ground state.\n\nTakeaway: gamma often \"cleans up\" the energy left over after α or β decay.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Why does Z determine the chemistry of an atom, not A? (3 steps)", "answer": "- Step 1: Chemistry depends on how atoms share, transfer, or arrange their electrons.\n- Step 2: In a neutral atom, the number of electrons equals Z (the proton number), since the nucleus must balance the electron charge.\n- Step 3: Neutrons are uncharged and inside the nucleus, so they don't influence the electron arrangement (apart from tiny mass-related effects). Hence two isotopes (same Z, different A) have identical electron configurations and indistinguishable chemistry, while two different elements (different Z) bond and react differently.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "Bananas are sometimes joked about as being \"radioactive.\" Why is this literally true, and why is it harmless? (3 steps)", "answer": "- Step 1: Bananas contain potassium, and a small fraction (~0.012%) of natural potassium is the radioactive isotope $$^{40}\\text{K}$$, which undergoes beta and (occasionally) gamma decay.\n- Step 2: So yes — every banana emits a tiny amount of radiation continuously. This contributes to background dose.\n- Step 3: But the dose is minuscule and the body excretes excess potassium, so it never builds up to dangerous levels. The \"banana equivalent dose\" is sometimes used informally to compare radiation risks: a single banana is ~0.1 µSv, vastly below any harmful level.\n\nTakeaway: low-level radioactivity is everywhere; \"any radiation = dangerous\" is a misconception.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "If alpha and beta both come from the nucleus, why does only beta change which element the atom is, while alpha changes it by *two* places? (3 steps)", "answer": "- Step 1: Both decays change Z, so both change the element. But alpha removes 2 protons (Z → Z−2) while beta converts 1 neutron to 1 proton (Z → Z+1).\n- Step 2: So alpha shifts the daughter two places left on the periodic table; beta shifts it one place right.\n- Step 3: The reason: alpha is a chunk of nucleus leaving, taking protons with it; beta is an internal rearrangement (n becoming p) with only the small electron leaving. Different mechanisms ⇒ different jumps in Z.\n\nTakeaway: alpha is \"ejection,\" beta is \"conversion.\"", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}], "count": 40}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 3163, "out_tokens": 13467, "reasoning_chars": 5026, "cost_eur": 0.0464, "elapsed_s": 106, "content_chars": 48977}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 3162, "out_tokens": 8501, "reasoning_chars": 14909, "cost_eur": 0.0304, "elapsed_s": 171, "content_chars": 19486}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 3122, "out_tokens": 7578, "reasoning_chars": 2301, "cost_eur": 0.0082, "elapsed_s": 73, "content_chars": 30471}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 3122, "out_tokens": 7262, "reasoning_chars": 1980, "cost_eur": 0.0079, "elapsed_s": 65, "content_chars": 29310}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 4938, "out_tokens": 13767, "reasoning_chars": 0, "cost_eur": 1.0181, "elapsed_s": 191, "content_chars": 34247}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 4938, "out_tokens": 13091, "reasoning_chars": 0, "cost_eur": 0.9714, "elapsed_s": 183, "content_chars": 33856}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 3185, "out_tokens": 3702, "reasoning_chars": 3633, "cost_eur": 0.0047, "elapsed_s": 57, "content_chars": 11896}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 3185, "out_tokens": 3089, "reasoning_chars": 4849, "cost_eur": 0.004, "elapsed_s": 47, "content_chars": 7906}}};
const SK='phys_radiation_jun24_alex';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}
