\\bar{w} = 10(2.08) + 20 = 40.8$.\n- Step 2: Common mistake: mixing up the direction and trying to transform $\\sum y$ directly without dividing by $n$ first, or writing $\\bar{w} = (\\sum y - 20)/10$ which is nonsense. The rule is: **the mean transforms with the same linear coefficients as the individual values**.\n\nIf $w = ay + b$, then $\\bar{w} = a\\bar{y} + b$. Always.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "S1 May 2024 Q3(d) — When finding the standard deviation of $w$ given $w = 10y + 20$ and summary statistics for $y$, what happens to the constant 20, and why? (2 steps)", "answer": "- Step 1: The constant $+20$ **drops out** of the variance (and hence the standard deviation). Adding a constant shifts all values equally — it doesn't change how spread out they are. So $\\operatorname{Var}(w) = 10^2 \\operatorname{Var}(y) = 100 \\operatorname{Var}(y)$.\n- Step 2: Only the scaling factor 10 matters, and it enters as $10^2 = 100$ for variance (or 10 for SD): $\\sigma_w = 10 \\sigma_y$.\n\nCommon mistake: writing $\\sigma_w = 10\\sigma_y + 20$ (adding the constant to the SD). Constants affect location, not spread.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "S1 May 2024 Q3(d) — The formula $\\sigma^2 = \\frac{\\sum x^2}{n} - \\bar{x}^2$ is NOT in the IAL formula booklet. How would you use it with coded data $\\sum y = 104$, $\\sum y^2 = 233.54$, $n = 50$? (2 steps)", "answer": "- Step 1: Compute $S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n} = 233.54 - \\frac{104^2}{50} = 233.54 - 216.32 = 17.22$. Then $\\operatorname{Var}(y) = S_{yy}/n = 17.22/50 = 0.3444$.\n- Step 2: Alternatively, $\\sigma_y^2 = \\frac{\\sum y^2}{n} - \\bar{y}^2 = \\frac{233.54}{50} - 2.08^2 = 4.6708 - 4.3264 = 0.3444$. Same result, same formula — just written differently.\n\nBoth forms are equivalent. The key is: this formula is NOT in the booklet, so you must memorise it.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "S1 May 2024 Q3(e) — A new data value equal to the current mean is added to the dataset. What happens to the mean, and why? (2 steps)", "answer": "- Step 1: The mean **does not change**. If the current mean is $\\bar{x}$ and you add a value $x_{n+1} = \\bar{x}$, the new mean is $\\frac{n\\bar{x} + \\bar{x}}{n+1} = \\frac{(n+1)\\bar{x}}{n+1} = \\bar{x}$.\n- Step 2: Intuitively, adding a value at the centre of gravity doesn't shift the balance point. The new value \"pulls\" exactly as hard as the average — so the average stays put.\n\nThis is a quick reasoning question: no calculation needed, just the argument that the added value equals the mean.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "S1 May 2024 Q3(e) — A new data value equal to the current mean is added. What happens to the standard deviation, and why? (2 steps)", "answer": "- Step 1: The standard deviation **decreases**. The new value contributes $(\\bar{x} - \\bar{x})^2 = 0$ to the sum of squared deviations (numerator stays the same), but the denominator increases from $n$ to $n+1$.\n- Step 2: Since $\\sigma^2 = \\frac{\\text{sum of squared deviations}}{n}$, a constant numerator with a growing denominator makes the variance (and hence SD) smaller. The new value is \"exactly average\" — it adds nothing to the spread but dilutes it.\n\nCommon mistake: saying \"no change\" for SD because the mean didn't change. The mean and SD respond differently to the same added value.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "S1 May 2024 Q4(a) — When calculating $S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$, what is the common arithmetic pitfall, and how do you avoid it? (2 steps)", "answer": "- Step 1: The pitfall is computing $\\frac{\\sum x \\times \\sum y}{n^2}$ (dividing by $n^2$) or computing $\\sum x \\times \\frac{\\sum y}{n}$ (dividing only one sum by $n$). The correct operation: **multiply the two sums first, then divide by $n$**.\n- Step 2: For example, $\\frac{1456.8 \\times 713.2}{8}$: first compute $1456.8 \\times 713.2 = 1{,}038{,}989.76$, then divide by 8 to get $129{,}873.72$. Keeping all decimals matters because the question asks for **exact** values.\n\nThe formula IS in the booklet. The execution error is in the order of operations.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "S1 May 2024 Q4(b) — After computing the PMCC $r$, what sanity check must you perform before writing your answer? (2 steps)", "answer": "- Step 1: Check that $-1 \\le r \\le 1$. If your calculated $r$ falls outside this range, you have made an error (likely forgot the square root in the denominator, or used $S_{xx} \\times S_{yy}$ instead of $\\sqrt{S_{xx} \\times S_{yy}}$).\n- Step 2: Check the **sign** matches your expectation. Here, $S_{dg} > 0$ (positive), so $r$ should be positive. A negative $r$ would indicate a sign error somewhere.\n\nThe formula $r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$ is in the booklet. The denominator must have a square root.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "S1 May 2024 Q4(c) — When computing the regression line of $g$ on $d$, what is the gradient formula, and what is the most common denominator mistake? (2 steps)", "answer": "- Step 1: The gradient is $b = \\frac{S_{dg}}{S_{dd}}$. You divide by $S_{dd}$ (the sum of squares of the **explanatory/independent** variable $d$).\n- Step 2: The common mistake is dividing by $S_{gg}$ instead. The rule: for the regression line of **$y$ on $x$**, the gradient is $\\frac{S_{xy}}{S_{xx}}$ — always divide by the sum of squares of the variable on the **horizontal** axis.\n\nMnemonic: \"y on x → divide by x-x\" ($S_{xx}$). If you computed the line of $d$ on $g$ by mistake, you'd get a completely different equation.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": true}, {"question": "S1 May 2024 Q4(c) — Why must you use the **unrounded** value of the gradient $b$ when computing the intercept $a = \\bar{y} - b\\bar{x}$? (2 steps)", "answer": "- Step 1: Rounding $b$ to 3 s.f. (0.722) before computing $a$ introduces a **compounding error**. The true $b = 0.72184...$, and the difference $0.72184 \\times 182.1 = 131.448$ vs $0.722 \\times 182.1 = 131.476$ — a difference of 0.028, which can change the 3rd significant figure of $a$.\n- Step 2: Store $b$ in your calculator at full precision and compute $a = 89.15 - b \\times 182.1$ directly. Only round $a$ and $b$ at the **final answer** stage.\n\nThis is a general exam principle: round only at the end, never at intermediate steps.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "S1 May 2024 Q4(d) — When asked to \"interpret the gradient of the regression line in context,\" what three elements must your answer contain? (2 steps)", "answer": "- Step 1: Your answer must include: (1) the specific increment (\"for each 1 cm increase in length\"), (2) the effect on the other variable (\"girth increases by approximately 0.722 cm\"), and (3) the qualifier \"on average\" or \"approximately\" (since the regression line is a model, not an exact law).\n- Step 2: You must use the **context** (bears, length, girth) — not just \"$x$ and $y$.\" You must state **units** for both variables. Omitting units or context loses the mark.\n\nWeak answer: \"The line slopes up.\" Good answer: \"For each 1 cm increase in the length of a bear, the girth increases by approximately 0.722 cm on average.\"", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}, {"question": "S1 May 2024 Q4(e)(ii) — Why is a regression estimate unreliable when the $x$-value is far outside the observed data range? What is the key vocabulary word? (2 steps)", "answer": "- Step 1: The estimate is unreliable because it involves **extrapolation** — extending the linear model beyond the range of the observed data. The relationship may not remain linear outside this range.\n- Step 2: For a bear with length 50 cm (when the observed mean is 182.1 cm), the model predicts a negative girth ($-42.3 + 0.722 \\times 50 = -6.2$ cm), which is physically impossible. This demonstrates that extrapolation can produce absurd results.\n\nThe key vocabulary: \"extrapolation\" and \"outside the observed range of data.\" Vague answers like \"the data isn't accurate\" earn no marks.", "source": "GLM 5.1 ①", "_id": "glm_1_35", "judge_pick": false}, {"question": "S1 May 2024 Q4(e)(i) — The regression equation uses $d$ in cm, but the question gives a bear length in metres (2.5 m). What must you do before substituting? (2 steps)", "answer": "- Step 1: **Convert units first.** The equation $g = -42.3 + 0.722d$ has $d$ in cm. So $d = 2.5$ m $= 250$ cm.\n- Step 2: Substitute $d = 250$: $g = -42.3 + 0.722(250) = 138.2$ cm. If you substituted $d = 2.5$, you'd get $g = -40.5$ — a wildly wrong answer.\n\nUnit conversion before substitution is a zero-tolerance step. Always check the units of the equation variables against the units of the given value.", "source": "GLM 5.1 ①", "_id": "glm_1_36", "judge_pick": false}, {"question": "S1 May 2024 Q4(f) — The question says \"for each $x$ cm increase in length, there will be a 17.3 cm increase in girth.\" A student solves $-42.3 + 0.722x = 17.3$. Why is this wrong, and what should they solve? (2 steps)", "answer": "- Step 1: The 17.3 cm is an **increment** in girth, not a girth value. The equation $-42.3 + 0.722x = 17.3$ treats 17.3 as the total girth when the length is $x$ cm — that's a category error.\n- Step 2: For increments, only the **gradient** matters. A change of $x$ in $d$ produces a change of $0.722x$ in $g$. Set $0.722x = 17.3$ and solve: $x = 17.3/0.722 \\approx 24.0$ cm.\n\nThe intercept is irrelevant for changes. The regression line's slope tells you the rate of change; the intercept tells you the baseline.", "source": "GLM 5.1 ①", "_id": "glm_1_37", "judge_pick": true}, {"question": "S1 May 2024 Q5(a) — When standardising a normal variable $X \\sim N(\\mu, \\sigma^2)$, what formula do you write down, and what is the common division error? (2 steps)", "answer": "- Step 1: Write $Z = \\frac{X - \\mu}{\\sigma}$. For $X \\sim N(15, 2^2)$: $P(X < 18) = P\\left(Z < \\frac{18-15}{2}\\right) = P(Z < 1.5)$.\n- Step 2: The common error is dividing by $\\sigma^2$ instead of $\\sigma$: writing $\\frac{18-15}{4} = 0.75$. The standard deviation is $\\sigma = 2$, not $\\sigma^2 = 4$. Always divide by the **standard deviation** (the square root of the second parameter).\n\nThe notation $N(15, 2^2)$ means $\\mu = 15$, $\\sigma = 2$. The second parameter is already the SD, not the variance — but always double-check the convention used in your specification.", "source": "GLM 5.1 ①", "_id": "glm_1_38", "judge_pick": false}, {"question": "S1 May 2024 Q5(b) — \"Only the fastest 60% of adults take part in round two.\" What does \"fastest\" mean in terms of the distribution tail, and what is the critical trap? (2 steps)", "answer": "- Step 1: \"Fastest\" means **shortest time** — the adults who complete the round most quickly. On the normal curve, short times are on the **left** (lower tail). So you need $P(X < t) = 0.60$.\n- Step 2: The critical trap is interpreting \"fastest 60%\" as the upper 60% (setting $P(X < t) = 0.40$), which gives $t = 14.49$ — wrong. The Loom analysis confirms both Phuc and the tutor made this error. **Sketch the curve, shade the lower tail, label \"fast = left.\"**\n\nMnemonic: \"Fast = few minutes = left tail.\" \"Slow = many minutes = right tail.\"", "source": "GLM 5.1 ①", "_id": "glm_1_39", "judge_pick": true}, {"question": "S1 May 2024 Q5(b) — You need the value $z$ such that $P(Z < z) = 0.60$. What value do you look up, and what sign should $z$ have? (2 steps)", "answer": "- Step 1: Look up $\\Phi^{-1}(0.60) = 0.2533$ from the inverse normal table. Since 0.60 > 0.50, the value is **positive** (above the mean).\n- Step 2: Common mistake: using $z = -0.2533$ because \"it's a lower tail.\" But the lower tail at $z = -0.2533$ contains only 0.40, not 0.60. The 60th percentile is above the mean, so $z > 0$.\n\nThen solve: $\\frac{t - 15}{2} = 0.2533 \\Rightarrow t = 15.507 \\approx 15.5$ minutes.", "source": "GLM 5.1 ①", "_id": "glm_1_40", "judge_pick": false}, {"question": "S1 May 2024 Q5(c) — Given $P(\\mu - 10 < T < \\mu + 10) = 0.95$, how do you find $\\sigma$? Walk through the symmetry argument. (3 steps)", "answer": "- Step 1: By symmetry of the normal distribution, the 5% outside the interval splits equally: $P(T < \\mu - 10) = 0.025$ and $P(T > \\mu + 10) = 0.025$.\n- Step 2: Standardise the lower boundary: $P\\left(Z < \\frac{(\\mu - 10) - \\mu}{\\sigma}\\right) = P\\left(Z < \\frac{-10}{\\sigma}\\right) = 0.025$.\n- Step 3: From tables, $P(Z < -1.96) = 0.025$, so $\\frac{-10}{\\sigma} = -1.96$, giving $\\sigma = \\frac{10}{1.96} = 5.102$.\n\nKey: the $\\mu$ cancels in the numerator, so you don't need to know $\\mu$ to find $\\sigma$.", "source": "GLM 5.1 ①", "_id": "glm_1_41", "judge_pick": false}, {"question": "S1 May 2024 Q5(c) — The calculation $\\sigma = 10/1.96$ gives approximately 5.10. Phuc wrote 0.510. What sanity check catches this decimal slip? (2 steps)", "answer": "- Step 1: Compare $\\sigma$ to the interval half-width. The interval is $\\mu \\pm 10$, so the half-width is 10. For a 95% interval, $\\sigma$ should be roughly half-width ÷ 2 ≈ 5. A value of 0.51 would mean the 95% interval spans $\\pm 20\\sigma$, which is far too wide for a normal distribution (95% falls within $\\pm 2\\sigma$).\n- Step 2: The rule of thumb: for a 95% symmetric interval of half-width $h$, $\\sigma \\approx h/2$. Here $10/2 = 5$, confirming $\\sigma \\approx 5.10$, not 0.51.\n\nThis sanity check takes 5 seconds and catches a factor-of-10 error that cost marks.", "source": "GLM 5.1 ①", "_id": "glm_1_42", "judge_pick": true}, {"question": "S1 May 2024 Q5(c) — When computing $P(T > \\mu - 5 \\mid T > \\mu - 10)$, how does the subset relationship simplify the conditional probability formula? (2 steps)", "answer": "- Step 1: Notice that $\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$. Any value above $\\mu - 5$ is automatically above $\\mu - 10$. So $P(T > \\mu - 5 \\text{ and } T > \\mu - 10) = P(T > \\mu - 5)$.\n- Step 2: Therefore $P(T > \\mu - 5 \\mid T > \\mu - 10) = \\frac{P(T > \\mu - 5)}{P(T > \\mu - 10)}$. The numerator is $P(Z > -5/\\sigma) = P(Z < 5/\\sigma) = \\Phi(0.98) = 0.8365$, and the denominator is $1 - 0.025 = 0.975$.\n\nWithout recognising the subset, you might try to compute $P(\\mu - 10 < T < \\mu - 5)$ for the intersection — which is the complement of what you want.", "source": "GLM 5.1 ①", "_id": "glm_1_43", "judge_pick": true}, {"question": "S1 May 2024 Q5(c) — In the conditional probability $P(T > \\mu - 5 \\mid T > \\mu - 10)$, a student uses 0.95 as the denominator. Why is this wrong? (2 steps)", "answer": "- Step 1: The denominator is $P(T > \\mu - 10)$, which equals $1 - P(T < \\mu - 10) = 1 - 0.025 = 0.975$. The value 0.95 is $P(\\mu - 10 < T < \\mu + 10)$, which is a **different event** — it's bounded on both sides.\n- Step 2: $P(T > \\mu - 10)$ includes all values above $\\mu - 10$ (extending to infinity), not just those up to $\\mu + 10$. So 0.975 ≠ 0.95.\n\nAlways distinguish between one-tailed probabilities ($P(T > a)$) and two-tailed/interval probabilities ($P(a < T < b)$).", "source": "GLM 5.1 ①", "_id": "glm_1_44", "judge_pick": true}, {"question": "S1 May 2024 Q6(a) — \"Find the probability that a teenager plays Chess but does not play Go.\" In a three-circle Venn diagram, how do you identify the correct regions? (2 steps)", "answer": "- Step 1: \"Plays Chess\" = all regions inside circle $C$. \"Does not play Go\" = all regions **outside** circle $G$. The intersection is: regions inside $C$ but outside $G$.\n- Step 2: These are: $C$ only (0.04) and $C \\cap S$ only, not $G$ (0.12). Add them: $0.04 + 0.12 = 0.16$. Do NOT include $C \\cap G$ only ($p$) or $C \\cap S \\cap G$ (0.15), because those are inside $G$.\n\nShade the Venn diagram: highlight $C$, cross out $G$, and sum what remains highlighted.", "source": "GLM 5.1 ①", "_id": "glm_1_45", "judge_pick": false}, {"question": "S1 May 2024 Q6(b) — When using the independence condition $P(C \\cap S) = P(C) \\times P(S)$ in a three-circle Venn diagram, what is the critical mistake in computing $P(C \\cap S)$? (2 steps)", "answer": "- Step 1: $P(C \\cap S)$ must include **all** regions inside both $C$ and $S$ simultaneously. This means **both** the triple-overlap $C \\cap S \\cap G$ (0.15) AND the $C \\cap S$ only region (0.12). So $P(C \\cap S) = 0.15 + 0.12 = 0.27$.\n- Step 2: The critical mistake is using only one of these: writing $P(C \\cap S) = 0.12$ (missing the triple overlap) or $P(C \\cap S) = 0.15$ (missing the pairwise-only region). The intersection of two sets in a three-set Venn diagram consists of **two** regions.\n\nAlways list all subregions of an intersection before substituting into the independence equation.", "source": "GLM 5.1 ①", "_id": "glm_1_46", "judge_pick": true}, {"question": "S1 May 2024 Q6(b) — Given $P(C) = 0.31 + p$, $P(S) = 0.60$, and $P(C \\cap S) = 0.27$, set up and solve the independence equation for $p$. (2 steps)", "answer": "- Step 1: Independence requires $P(C \\cap S) = P(C) \\times P(S)$, so $0.27 = (0.31 + p)(0.60)$.\n- Step 2: Solve: $0.31 + p = 0.27/0.60 = 0.45$, so $p = 0.45 - 0.31 = 0.14$.\n\nThe equation is linear in $p$ — no quadratics needed. The key was getting $P(C \\cap S)$ correct (0.27, not 0.12).", "source": "GLM 5.1 ①", "_id": "glm_1_47", "judge_pick": false}, {"question": "S1 May 2024 Q6(c) — When finding $q$ (the outside region in a Venn diagram), what equation do you set up, and what is the common omission? (2 steps)", "answer": "- Step 1: All 8 regions must sum to 1: $0.04 + 0 + 0.15 + p + 0.12 + 0.10 + 0.23 + q = 1$. Simplify: $0.64 + p + q = 1$, so $q = 0.36 - p = 0.36 - 0.14 = 0.22$.\n- Step 2: Common omissions: forgetting the **outside region** $q$ itself in the sum, or forgetting the $G$-only region even though its value is 0. Every region must appear in the sum, including zero-valued ones and the outside.\n\nThe equation \"all probabilities sum to 1\" is your safety net — it must include every single region.", "source": "GLM 5.1 ①", "_id": "glm_1_48", "judge_pick": false}, {"question": "S1 May 2024 Q6(d)(ii) — To compute $P(C \\mid S \\cap G)$, you need $P(S \\cap G)$ in the denominator. In a three-circle Venn diagram, what two regions make up $P(S \\cap G)$? (2 steps)", "answer": "- Step 1: $S \\cap G$ consists of all regions inside both $S$ and $G$. These are: the triple-overlap $C \\cap S \\cap G$ (0.15) and the $S \\cap G$ only region (0.10).\n- Step 2: So $P(S \\cap G) = 0.15 + 0.10 = 0.25$. Then $P(C \\mid S \\cap G) = \\frac{P(C \\cap S \\cap G)}{P(S \\cap G)} = \\frac{0.15}{0.25} = 0.6$.\n\nSame pattern as Q6(b): the intersection of two sets in a three-set diagram has two subregions. Missing the triple-overlap is the standard error.", "source": "GLM 5.1 ①", "_id": "glm_1_49", "judge_pick": false}, {"question": "S1 May 2024 Q6(e) — Phuc computed $P(S') = 0.04 + 0.14 = 0.18$ (only Chess-region pieces) and got 47 teenagers not playing Scrabble. What did he miss, and what is the reliable shortcut? (3 steps)", "answer": "- Step 1: $P(S')$ means the probability of being **outside** circle $S$ entirely. This includes: $C$ only (0.04), $G$ only (0), $C \\cap G$ only ($p = 0.14$), **and the outside region** $q = 0.22$. Phuc missed $q$ and the $G$-only region.\n- Step 2: The reliable shortcut: $P(S') = 1 - P(S) = 1 - 0.60 = 0.40$. This is guaranteed to include every region outside $S$, including the outside-the-circles region, because you're subtracting the total inside $S$ from 1.\n- Step 3: Correct calculation: total teenagers = $76 / P(C \\cap G) = 76 / 0.29 = 262.07$. Number not playing Scrabble = $262.07 \\times 0.40 = 104.83 \\approx 105$.\n\n**Always use $P(A') = 1 - P(A)$ for complements in Venn diagrams.** Adding up regions manually is error-prone because you might forget the outside region.", "source": "GLM 5.1 ①", "_id": "glm_1_50", "judge_pick": true}, {"question": "S1 May 2024 Q6(e) — To estimate the total number of teenagers in the youth club, you use the fact that 76 play Chess and Go. What probability do you divide 76 by, and what two regions must you include? (2 steps)", "answer": "- Step 1: $P(C \\cap G) = P(C \\cap G \\text{ only}) + P(C \\cap S \\cap G) = p + 0.15 = 0.14 + 0.15 = 0.29$.\n- Step 2: Total = $76 / 0.29 = 262.07 \\approx 262$. Common mistake: using $P(C \\cap G) = 0.15$ only (missing the $C \\cap G$ only region where $p = 0.14$). The intersection of $C$ and $G$ includes both the triple overlap and the pairwise-only region.\n\nThe logic: if 29% of teenagers play both Chess and Go, and 76 teenagers play both, then the total population is $76/0.29$.", "source": "GLM 5.1 ①", "_id": "glm_1_51", "judge_pick": false}, {"question": "S1 May 2024 — General strategy: When a question says \"show that\" (e.g., \"show that $\\operatorname{Var}(X) = 4.14$\"), what must you do differently from a regular calculation? (2 steps)", "answer": "- Step 1: You must **show all working** — each line of computation — because the answer is given and marks are for the **derivation**, not the final number. If you just write \"4.14\" with no working, you earn zero marks.\n- Step 2: Write each term separately (e.g., $2^2(0.25) + 4^2(0.3) + \\ldots$), show the accumulation, and then subtract $[E(X)]^2$. Box the final answer to confirm it matches.\n\n\"Show that\" questions are gift marks if you show working — and zero marks if you skip steps.", "source": "GLM 5.1 ①", "_id": "glm_1_52", "judge_pick": false}, {"question": "S1 May 2024 — General strategy: When should you round your answers, and what is the danger of rounding too early? Give a concrete example from Q4(c). (2 steps)", "answer": "- Step 1: Round **only at the final answer**. Store intermediate values in your calculator at full precision.\n- Step 2: In Q4(c), the gradient $b = 0.72184...$. If you round to $b = 0.722$ before computing the intercept: $a = 89.15 - 0.722 \\times 182.1 = 89.15 - 131.48 = -42.33$ (wrong at 3 s.f.). Using the unrounded $b$: $a = 89.15 - 0.72184 \\times 182.1 = -42.3$ (correct at 3 s.f.).\n\nThe difference is 0.03 — enough to change the 3rd significant figure. One early rounding can cascade through the entire calculation.", "source": "GLM 5.1 ①", "_id": "glm_1_53", "judge_pick": false}, {"question": "S1 May 2024 — What is the formula for frequency density in a histogram, and why is it needed instead of using frequency directly as the bar height? (2 steps)", "answer": "- Step 1: Frequency density = frequency ÷ class width. This is NOT in the formula booklet — memorise it.\n- Step 2: In a histogram, **area** represents frequency (not height). If classes have different widths, using frequency as height would give wider classes disproportionately large areas. FD corrects for this: a class with width 2 and frequency 16 has FD = 8, while a class with width 4 and frequency 20 has FD = 5 — the wider class gets a shorter bar but the same area-per-observation.\n\nIf all classes had equal width, FD would be proportional to frequency and you could use either. But in general, you must use FD.", "source": "GLM 5.1 ①", "_id": "glm_1_54", "judge_pick": true}, {"question": "S1 May 2024 — Conceptual: Why does $\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$, and why doesn't $b$ appear? Give an intuitive explanation. (2 steps)", "answer": "- Step 1: Variance measures **spread** — how far values are from their mean. Multiplying by $a$ stretches (or compresses) all deviations by a factor of $a$, so squared deviations scale by $a^2$. If everyone's height doubles, the spread doubles too (and variance quadruples).\n- Step 2: Adding $b$ **shifts** every value by the same amount — it moves the entire distribution without changing how spread out it is. If everyone gets a £1000 bonus, the mean salary increases by £1000 but the variance in salaries doesn't change.\n\nThink of it as: scaling changes the \"ruler,\" shifting changes the \"origin.\" Only the ruler affects spread.", "source": "GLM 5.1 ①", "_id": "glm_1_55", "judge_pick": true}, {"question": "S1 May 2024 — Conceptual: In a three-circle Venn diagram with events $A$, $B$, $C$, the intersection $A \\cap B$ consists of two regions. Name them and explain why both must be included. (2 steps)", "answer": "- Step 1: $A \\cap B$ consists of: (1) the triple-overlap $A \\cap B \\cap C$, and (2) the $A \\cap B$ only region (inside both $A$ and $B$ but outside $C$).\n- Step 2: Both must be included because $A \\cap B$ means \"in $A$ AND in $B$\" — it says nothing about $C$. An element in the triple overlap is certainly in both $A$ and $B$, and so is an element in the pairwise-only region. The condition doesn't exclude either.\n\nThis is the root cause of errors in Q6(b) and Q6(d)(ii): students see \"A and B\" and only think of one region instead of both.", "source": "GLM 5.1 ①", "_id": "glm_1_56", "judge_pick": true}, {"question": "S1 May 2024 — Conceptual: What is the difference between the regression line of $y$ on $x$ and the regression line of $x$ on $y$? When do you use each? (2 steps)", "answer": "- Step 1: The line of $y$ on $x$ minimises the **vertical** distances (residuals in the $y$-direction) and has gradient $b = S_{xy}/S_{xx}$. The line of $x$ on $y$ minimises the **horizontal** distances and has gradient $b' = S_{xy}/S_{yy}$.\n- Step 2: Use the line of $y$ on $x$ when you want to **predict $y$ from a known $x$**. Use the line of $x$ on $y$ when you want to predict $x$ from a known $y$. The two lines are different unless $r = 1$ (perfect correlation).\n\nIn Q4, you're predicting girth from length, so you use $g$ on $d$: gradient = $S_{dg}/S_{dd}$.", "source": "GLM 5.1 ①", "_id": "glm_1_57", "judge_pick": false}, {"question": "S1 May 2024 — Tactical: The weakness analysis identifies \"translation errors\" between English and statistics as the main source of lost marks. List the three key translation traps from this paper and the one-sentence fix for each. (3 steps)", "answer": "- Step 1: **\"Fastest 60%\"** → translates to the **lower** tail ($P(X < t) = 0.60$), not the upper tail. Fix: sketch the curve, shade the short-time end, label \"fast = left.\"\n- Step 2: **\"No change to the box plot\"** → translates to **five separate constraints** (min, $Q_1$, median, $Q_3$, max), not just the ordering constraint. Fix: list all five and check each.\n- Step 3: **\"Does not play Scrabble\"** → translates to the **entire complement** $P(S') = 1 - P(S)$, including the outside region. Fix: always use $1 - P(A)$ for complements, never add up regions manually.\n\nEvery \"redo\" flag in this paper traces back to a translation slip, not a computation error.", "source": "GLM 5.1 ①", "_id": "glm_1_58", "judge_pick": true}, {"question": "S1 May 2024 — Tactical: What is the \"subset trick\" for conditional probability, and when can you use it? Give the general principle. (2 steps)", "answer": "- Step 1: If event $A$ is a **subset** of event $B$ (i.e., whenever $A$ happens, $B$ also happens), then $P(A \\cap B) = P(A)$, so $P(A \\mid B) = P(A)/P(B)$.\n- Step 2: Use this whenever one condition is stricter than another. In Q5(c), $\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$ because any value above $\\mu - 5$ is automatically above $\\mu - 10$. This simplifies the numerator from $P(A \\cap B)$ to just $P(A)$.\n\nWithout this recognition, you might try to compute $P(\\mu - 10 < T < \\mu - 5)$ or expand both tails unnecessarily.", "source": "GLM 5.1 ①", "_id": "glm_1_59", "judge_pick": true}, {"question": "S1 May 2024 — Quick drill: A back-to-back stem-and-leaf has key \"3 | 7 | 1 means 37 for Team A and 71 for Team B.\" On the Team A side, the stem-5 row reads (right-to-left): 8 6 3. List the actual data values. (2 steps)", "answer": "- Step 1: The key tells us the stem is the **tens digit** and the leaf is the **units digit**. For Team A (left side), the leaves are read **right-to-left** (outward from stem).\n- Step 2: Reading right-to-left: 8, 6, 3 → the values are 58, 56, 53. In ascending order (as they should appear): 53, 56, 58.\n\nIf you read left-to-right, you'd get 38, 36, 33 — completely wrong. The key and direction rule are essential.", "source": "GLM 5.1 ①", "_id": "glm_1_60", "judge_pick": false}, {"question": "S1 May 2024 — Quick drill: A normal variable has $P(\\mu - 6 < X < \\mu + 6) = 0.90$. Find $\\sigma$ to 2 decimal places. (2 steps)", "answer": "- Step 1: By symmetry, $P(X < \\mu - 6) = 0.05$. Standardise: $P\\left(Z < \\frac{-6}{\\sigma}\\right) = 0.05$, so $\\frac{-6}{\\sigma} = -1.6449$ (from tables, $\\Phi^{-1}(0.05) = -1.6449$).\n- Step 2: $\\sigma = 6/1.6449 = 3.65$ (2 d.p.). Sanity check: $\\sigma \\approx 6/2 = 3$, and 3.65 is close to this — plausible.\n\nNotice: for 90% the $z$-value is 1.6449 (one-tailed), not 1.96 (which is for 95%).", "source": "GLM 5.1 ①", "_id": "glm_1_61", "judge_pick": false}, {"question": "S1 May 2024 — Quick drill: $Y = 3X + 7$, $\\operatorname{Var}(X) = 5$. Find $\\operatorname{Var}(Y)$. (1 step)", "answer": "- Step 1: $\\operatorname{Var}(Y) = 3^2 \\times \\operatorname{Var}(X) = 9 \\times 5 = 45$. The constant $+7$ has no effect on variance.", "source": "GLM 5.1 ①", "_id": "glm_1_62", "judge_pick": true}, {"question": "S1 May 2024 — Quick drill: In a Venn diagram, $P(A) = 0.4$, $P(B) = 0.3$, and $P(A \\cap B) = 0.12$. Are $A$ and $B$ independent? (2 steps)", "answer": "- Step 1: Check: $P(A) \\times P(B) = 0.4 \\times 0.3 = 0.12$.\n- Step 2: Since $P(A \\cap B) = 0.12 = P(A) \\times P(B)$, yes, $A$ and $B$ are independent.", "source": "GLM 5.1 ①", "_id": "glm_1_63", "judge_pick": false}, {"question": "S1 May 2024 — Quick drill: A dataset has $Q_1 = 20$, $Q_3 = 44$. Is the value 75 an outlier? (2 steps)", "answer": "- Step 1: IQR = $44 - 20 = 24$. Upper fence = $44 + 1.5 \\times 24 = 44 + 36 = 80$. Lower fence = $20 - 36 = -16$.\n- Step 2: 75 < 80, so 75 is **not** an outlier. It's within the fences.", "source": "GLM 5.1 ①", "_id": "glm_1_64", "judge_pick": false}, {"question": "S1 May 2024 — Quick drill: You add a data value equal to the current median to a dataset of 50 values. What happens to the median? (2 steps)", "answer": "- Step 1: The median **may change** — it depends on where the new value falls in the ordered list and how the positional rules shift. With $n = 50$, the median is the average of positions 25 and 26. With $n = 51$, the median is position 26.\n- Step 2: Unlike the mean (where adding the mean preserves it), adding the median does NOT guarantee the median stays the same, because the median depends on **positional ordering**, not on the sum.\n\nThis is a key difference between mean and median: the mean is a \"balance\" property, the median is a \"positional\" property.", "source": "GLM 5.1 ①", "_id": "glm_1_65", "judge_pick": true}, {"question": "S1 May 2024 — For $n = 36$, find the positions of $Q_1$, the median, and $Q_3$ using the Edexcel rules. (2 steps)", "answer": "- Step 1: $n/4 = 9$ (integer) → $Q_1$ = average of positions 9 and 10. $n/2 = 18$ (integer) → median = average of positions 18 and 19. $3n/4 = 27$ (integer) → $Q_3$ = average of positions 27 and 28.\n- Step 2: All three quartile positions use the **average rule** because $n = 36$ is divisible by 4. This is why adding 4 values to $n = 32$ changes the rule from \"round up\" to \"average.\"", "source": "GLM 5.1 ①", "_id": "glm_1_66", "judge_pick": true}, {"question": "S1 May 2024 — Edge case: In a Venn diagram, one region has probability 0 (e.g., $G$ only = 0). Does this mean the event $G$ is impossible? Why or why not? (2 steps)", "answer": "- Step 1: No. $P(G \\text{ only}) = 0$ means no teenager plays **only** Go (without also playing Chess or Scrabble). But $P(G) = P(C \\cap G) + P(S \\cap G) + P(G \\text{ only}) - P(C \\cap S \\cap G)$... actually, $P(G) = p + 0.15 + 0.10 + 0 = 0.14 + 0.15 + 0.10 = 0.39$.\n- Step 2: So $G$ has probability 0.39 — quite likely! The zero in the \"G only\" region just means every Go player also plays at least one of the other games. The event $G$ is not impossible; it's just that $G$ never occurs alone.\n\nZero in a Venn region ≠ impossible event. It means that particular combination is empty.", "source": "GLM 5.1 ①", "_id": "glm_1_67", "judge_pick": true}, {"question": "S1 May 2024 — Misconception probe: A student says \"If $P(A \\mid B) = 0.6$, then $P(B \\mid A)$ must also be 0.6.\" Is this correct? Explain with a simple example. (2 steps)", "answer": "- Step 1: No, this is incorrect. $P(A \\mid B) = P(A \\cap B)/P(B)$ while $P(B \\mid A) = P(A \\cap B)/P(A)$. These are equal only if $P(A) = P(B)$.\n- Step 2: From Q6(d)(ii): $P(C \\mid S \\cap G) = 0.15/0.25 = 0.6$. But $P(S \\cap G \\mid C) = 0.15/P(C) = 0.15/0.45 = 0.333...$. The two conditional probabilities are different because $P(C) \\ne P(S \\cap G)$.\n\nConditional probability is not symmetric — the condition and the event cannot be swapped without changing the value.", "source": "GLM 5.1 ①", "_id": "glm_1_68", "judge_pick": true}, {"question": "S1 May 2024 — Synthesis: A question asks you to estimate a value using a regression line, then asks whether the estimate is reliable. What two things must you check? (2 steps)", "answer": "- Step 1: Check whether the $x$-value falls **within the observed range of data** (interpolation = reliable, extrapolation = unreliable). Compare the given $x$ to the minimum and maximum observed $x$ values (or to the mean as a reference).\n- Step 2: Check whether the **units match** the regression equation. If the equation uses cm and the question gives metres, convert first. An unconverted value might accidentally fall inside or outside the range, giving a wrong reliability judgment.\n\nBoth checks are quick but commonly skipped under exam pressure.", "source": "GLM 5.1 ①", "_id": "glm_1_69", "judge_pick": false}, {"question": "S1 May 2024 — Synthesis: You're given a normal distribution question with a conditional probability. Outline the four-step approach that avoids the common traps. (4 steps)", "answer": "- Step 1: **Sketch the curve** and shade the relevant regions. Label the mean and the boundaries mentioned.\n- Step 2: **Find $\\sigma$** (if not given) using any symmetric interval information, and **sanity-check** the magnitude ($\\sigma$ should be same order as interval half-width, not 10× smaller).\n- Step 3: **Identify subset relationships** between the events. If $A \\subset B$, use $P(A \\mid B) = P(A)/P(B)$ directly.\n- Step 4: **Compute each probability separately** using standardisation, then divide. Don't use interval probabilities (like 0.95) where one-tailed probabilities (like 0.975) are needed.\n\nThe three traps are: decimal slip on $\\sigma$, wrong denominator, and missing the subset simplification.", "source": "GLM 5.1 ①", "_id": "glm_1_70", "judge_pick": true}], "count": 71}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "S1 May 2024 Q1(a) — When reading a back-to-back stem-and-leaf diagram, what is the critical direction rule for the leaves on the left side of the stem, and why? (2 steps)", "answer": "- Step 1: The leaves on the left side of the stem must be read **right-to-left** (outwards from the stem), not left-to-right.\n- Step 2: This is because the stem is the \"center,\" and moving away from the stem increases the digit's place value. Reading left-to-right would reverse the ascending order of the data within that row, causing you to transcribe the wrong values for calculations.\n\nReading the key first (e.g., \"5 | 6 | 3 means 65 for Birch and 63 for Maple\") confirms which side corresponds to which dataset and the order of magnitude.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "S1 May 2024 Q1(a) — When you see a letter (like $k$) representing a missing value inside a stem-and-leaf row, what is the letter actually representing, and what constraint must it satisfy? (2 steps)", "answer": "- Step 1: The letter $k$ represents a **single leaf digit**, not a frequency count and not a sum of leaves. The actual data value is $10 \\times \\text{stem} + k$.\n- Step 2: Because leaves in a stem-and-leaf diagram must be in ascending order, $k$ must be greater than or equal to the leaf immediately before it, and less than or equal to the leaf immediately after it.\n\nTreating $k$ as a frequency or a sum of multiple values is a common pitfall that breaks the ordered structure of the diagram.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "S1 May 2024 Q1(a) — What is the positional rule for finding the median of a dataset with an even number of values $N$? (2 steps)", "answer": "- Step 1: Locate the two middle positions: the $$\\frac{N}{2}$$th value and the $$\\left(\\frac{N}{2} + 1\\right)$$th value.\n- Step 2: The median is the **average (mean)** of these two values.\n\nDo not just pick one of the two middle values; the median must sit exactly halfway between them for even $N$.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "S1 May 2024 Q1(b) — What is the Edexcel S1 rule for finding the lower quartile position when $n/4$ is NOT an integer? (2 steps)", "answer": "- Step 1: Calculate $n/4$. If the result is not an integer (e.g., $35/4 = 8.75$), do not round to the nearest integer or truncate.\n- Step 2: Round **up** to the next whole number (e.g., round 8.75 up to the 9th value).\n\nThis is different from the GCSE/M-stats rule of using $(n+1)/4$. For Edexcel S1, if $n/4$ is not an integer, you always round up to find the position.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "S1 May 2024 Q1(b) — What is the Edexcel S1 rule for finding the lower quartile position when $n/4$ IS an integer? (2 steps)", "answer": "- Step 1: Calculate $n/4$. If the result is a whole number (e.g., $32/4 = 8$), do not just take the 8th value.\n- Step 2: Take the **average** of the $(n/4)$th value and the $(n/4 + 1)$th value (e.g., the average of the 8th and 9th values).\n\nThis mirrors the even-$N$ median rule and ensures the quartile sits exactly on the boundary between the two halves of the lower data.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "S1 May 2024 Q1(c) — When calculating outlier fences, what intermediate step must you show to guarantee method marks, and why? (2 steps)", "answer": "- Step 1: Calculate the Interquartile Range (IQR = $$Q_3 - Q_1$$) and explicitly calculate $$1.5 \\times \\text{IQR}$$ on its own line.\n- Step 2: Write out the full fence expressions: $$Q_1 - 1.5 \\times \\text{IQR}$$ and $$Q_3 + 1.5 \\times \\text{IQR}$$.\n\nShowing the $$1.5 \\times \\text{IQR}$$ separately proves you applied the correct multiplier and didn't just guess the fence values. Omitting this can cost you the method mark even if your final fences are correct.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "S1 May 2024 Q1(d) — When drawing a box plot that contains outliers, where must the whisker end, and why? (2 steps)", "answer": "- Step 1: The whisker must end at the **most extreme non-outlier** data value within the fence, not at the outlier itself.\n- Step 2: The outlier is plotted as a separate point (cross/asterisk) beyond the whisker. The whisker represents the spread of the \"typical\" data, and including the outlier in the whisker would visually misrepresent the central spread.\n\nDrawing the whisker all the way to the maximum value (including the outlier) is a common pitfall.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "S1 May 2024 Q1(e) — When asked to \"comment on any difference in the distributions,\" what two components must your answer include to get the mark? (2 steps)", "answer": "- Step 1: You must compare a **specific statistic** (e.g., median or IQR) using directional language (e.g., \"greater than,\" \"less than\").\n- Step 2: You must **state the numerical values** of the statistics you are comparing from both distributions.\n\nSaying \"Birch trees grow taller\" is insufficient. You must say \"The median Birch growth (48 cm) is greater than the median Maple growth (45 cm).\"", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "S1 May 2024 Q1(f) — When told that adding new data causes \"no change to the box plot,\" how should you set up the problem? (2 steps)", "answer": "- Step 1: Recognize that a box plot is defined by **five** summary statistics: Minimum, $$Q_1$$, Median, $$Q_3$$, and Maximum.\n- Step 2: Set up **five separate constraints**—one for each statistic—ensuring the new data does not alter any of them.\n\nSolving only for the ordering constraint (e.g., $27 \\le a \\le 48$) is insufficient; you must check all five box-plot constraints.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "S1 May 2024 Q1(f) — Why does the \"Maximum\" constraint often provide the strictest upper bound for a new variable like $a$ when preserving a box plot? (2 steps)", "answer": "- Step 1: Identify the current maximum of the dataset (e.g., 80).\n- Step 2: If the new data includes a term that scales with $a$ (like $2a$), require that $$2a \\le \\text{Current Max}$$. This gives a much stricter bound than the simple ordering constraint (e.g., $$2a \\le 80 \\Rightarrow a \\le 40$$, whereas ordering might only give $$a \\le 48$$).\n\nForgetting that $2a$ must not exceed the maximum value is a critical pitfall in this question type.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "S1 May 2024 Q1(f) — How does adding a small value (like 27) affect the $$Q_1$$ constraint when preserving a box plot? (3 steps)", "answer": "- Step 1: Adding a low value shifts all subsequent data points one position forward in the ordered list.\n- Step 2: Recalculate the new $$Q_1$$ position using the new $N$ (e.g., $N=36$ means $$Q_1$$ is the average of the 9th and 10th values).\n- Step 3: Ensure the new variable $a$ does not fall in a position that displaces the original values at the 9th and 10th spots. If $a$ is less than the original 9th value, it will shift the data and change $$Q_1$$, violating the constraint.\n\nIf the new $$Q_1$$ must remain the same, the added data must not insert itself before the new quartile positions.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "S1 May 2024 Q2(a) — When finding $P(2X-3 > 5)$ for a discrete random variable, what must you do before summing probabilities? (2 steps)", "answer": "- Step 1: Rearrange the linear inequality algebraically to isolate $X$. Here, $$2X - 3 > 5 \\Rightarrow 2X > 8 \\Rightarrow X > 4$$.\n- Step 2: Apply the **strict** inequality. $X > 4$ means you sum the probabilities for $X = 5, 7, 8$—you must exclude $X = 4$.\n\nA common pitfall is including the boundary value $X=4$ by treating the inequality as $\\ge$.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "S1 May 2024 Q2(b) — When calculating $E(X^2)$ for a discrete random variable, what is the most common arithmetic pitfall? (2 steps)", "answer": "- Step 1: The correct formula is $$E(X^2) = \\sum x^2 P(X=x)$$.\n- Step 2: You must square the **outcome $x$**, not the probability. A common pitfall is calculating $$\\sum x \\cdot P(X=x)^2$$ or $$\\sum (xP(X=x))^2$$.\n\nSquaring the probability is a fatal error because probabilities are less than 1, so their squares are even smaller, leading to a drastically underestimated variance.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "S1 May 2024 Q2(c) — When given $E(Y)$ and $\\operatorname{Var}(Y)$ for $Y = aX - b$, what is the strategic reason for solving for $a$ using the Variance equation first? (2 steps)", "answer": "- Step 1: The variance coding rule is $$\\operatorname{Var}(aX - b) = a^2 \\operatorname{Var}(X)$$. The constant $b$ completely disappears from this equation.\n- Step 2: Solving for $a$ first eliminates $b$ from your working, giving you a clean equation ($$a^2 = \\operatorname{Var}(Y) / \\operatorname{Var}(X)$$) and avoiding a two-variable system.\n\nIf you started with Expectation, you'd have to juggle both $a$ and $b$ simultaneously.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "S1 May 2024 Q2(c) — When applying the variance coding rule $\\operatorname{Var}(aX - b) = a^2 \\operatorname{Var}(X)$, what two pitfalls regarding the constant and the sign must you avoid? (2 steps)", "answer": "- Step 1: Do not apply the constant $b$ to the variance. Variance measures spread, and adding/subtracting a constant only shifts the data, not the spread. So, $$-b$$ drops out, not $$(-b)^2$$.\n- Step 2: Do not forget to square $a$. The rule is $$a^2 \\operatorname{Var}(X)$$, not $$a \\cdot \\operatorname{Var}(X)$$. Also, since $a$ is a positive constant, take only the positive square root of $$a^2$$.\n\nWriting $$\\operatorname{Var}(Y) = a \\operatorname{Var}(X)$$ or including $$b^2$$ will lead to incorrect values.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "S1 May 2024 Q2(d) — In a game where Sam spins $X_1$ and Alex spins $X_2$ (from the same distribution), why must you treat their scores as independent, and how does this affect the probability calculation? (2 steps)", "answer": "- Step 1: They are independent because they are **two separate spins**; the outcome of one spin does not affect the other.\n- Step 2: Independence means you can multiply their probabilities: $$P(S=s \\text{ and } R=r) = P(S=s) \\times P(R=r)$$.\n\nA common pitfall is assuming the scores come from the same single spin, leading to only 5 possible joint outcomes instead of the required 25.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "S1 May 2024 Q3(a) — In a histogram, what does the area of a bar represent, and how does this dictate the height? (2 steps)", "answer": "- Step 1: The **area** of a bar is proportional to the **frequency** of the class.\n- Step 2: Because Area = Width $\\times$ Height, the Height must be proportional to **Frequency Density** (Frequency $\\div$ Class Width), not the raw frequency.\n\nSetting height equal to raw frequency is a major pitfall; it only works if all class widths are equal.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "S1 May 2024 Q3(a) — When given the physical dimensions of one histogram bar (a reference bar), what two scale constants must you derive before finding the dimensions of any other bar? (3 steps)", "answer": "- Step 1: Derive the **width scale**: (Reference bar physical width) $\\div$ (Reference class width). This gives cm per mm of class width.\n- Step 2: Derive the **height scale**: (Reference bar physical height) $\\div$ (Reference FD). This gives cm per unit of frequency density.\n- Step 3: Apply these constants to the new class: New physical width = New class width $\\times$ width scale; New physical height = New FD $\\times$ height scale.\n\nDo not just multiply the reference bar's width by the ratio of frequencies; you must scale width and height separately based on their respective properties.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "S1 May 2024 Q3(b) — For grouped continuous data, what position do you use to find the median, and how does this differ from discrete data? (2 steps)", "answer": "- Step 1: For grouped continuous data, the median position is **$N/2$**.\n- Step 2: This differs from discrete data, where you might use $$(N+1)/2$$. Grouped data assumes continuous values within intervals, so the $+1$ adjustment for discrete endpoints is not used.\n\nUsing $(N+1)/2$ for grouped data will place you in the wrong class or the wrong fractional position within the class.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "S1 May 2024 Q3(b) — When using linear interpolation to find the median, what is the formula, and what does each term represent? (3 steps)", "answer": "- Step 1: The formula is $$\\text{Median} = L + \\frac{N/2 - F_b}{f_m} \\times c$$.\n- Step 2: $L$ is the **lower class boundary** of the median class (not the lower bound written in the table if it says \"32\", but the actual boundary). $F_b$ is the **cumulative frequency** of the classes *before* the median class.\n- Step 3: $f_m$ is the **frequency** of the median class itself, and $c$ is the **class width**.\n\nA common pitfall is using the midpoint of the class instead of $L$, or using the cumulative frequency *including* the median class instead of $F_b$.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "S1 May 2024 Q3(c) — If data is coded using $10y = w - 20$, how do you find the mean of $w$ ($\\bar{w}$) from the mean of $y$ ($\\bar{y}$)? (2 steps)", "answer": "- Step 1: Rearrange the coding equation to express the original variable in terms of the coded variable: $$w = 10y + 20$$.\n- Step 2: Apply the linear transformation to the mean: $$\\bar{w} = 10\\bar{y} + 20$$. The mean transforms using the same equation as the individual data points.\n\nDo not invert the equation to solve for $\\bar{y}$ and then try to transform; compute $\\bar{y}$ directly from $\\sum y / n$, then apply the forward equation.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "S1 May 2024 Q3(d) — What is the formula for variance from raw sums ($\\sigma^2$), and why is it essential to memorize it for Edexcel IAL? (2 steps)", "answer": "- Step 1: The formula is $$\\sigma^2 = \\frac{\\sum x^2}{n} - \\bar{x}^2$$ (or $$\\frac{\\sum y^2}{n} - \\bar{y}^2$$ for coded data).\n- Step 2: This specific \"raw sums\" form is **NOT in the IAL formula booklet**, unlike the $E(X^2) - [E(X)]^2$ form for discrete random variables. You must memorize it.\n\nWithout this, you cannot easily compute variance when given summary statistics like $\\sum y$ and $\\sum y^2$.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "S1 May 2024 Q3(d) — When calculating the standard deviation of $w$ from the standard deviation of $y$ (where $w = 10y + 20$), what happens to the constant and the scaling factor? (2 steps)", "answer": "- Step 1: The constant $+20$ drops out completely. Standard deviation measures spread, and adding a constant does not change spread.\n- Step 2: The scaling factor 10 must be applied directly to the standard deviation (not squared). $$\\sigma_w = 10 \\sigma_y$$.\n\nA common pitfall is applying the variance rule ($$a^2$$) to the standard deviation, resulting in $\\sigma_w = 100 \\sigma_y$, or erroneously adding 20 to the SD.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "S1 May 2024 Q3(e)(i) — If a new data value exactly equal to the current mean is added to a dataset, what happens to the mean, and why? (2 steps)", "answer": "- Step 1: The mean **does not change**.\n- Step 2: The new mean is $$\\frac{n\\bar{x} + \\bar{x}}{n+1} = \\frac{(n+1)\\bar{x}}{n+1} = \\bar{x}$$. The new value perfectly balances the existing average.\n\nConceptually, you are adding a weight exactly at the center of gravity, so the center of gravity doesn't shift.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "S1 May 2024 Q3(e)(ii) — If a new data value exactly equal to the current mean is added to a dataset, what happens to the standard deviation, and why? (2 steps)", "answer": "- Step 1: The standard deviation **decreases**.\n- Step 2: The new value contributes 0 to the sum of squared deviations (since $$x_{\\text{new}} - \\bar{x} = 0$$), but the denominator $n$ increases from $n$ to $n+1$. Dividing the same (or slightly less) total deviation by a larger number results in a smaller variance/SD.\n\nA common pitfall is saying \"no change\" because the deviation of the new point is zero. While the numerator doesn't increase, the growing denominator dilutes the variance.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "S1 May 2024 Q4(a) — What is the formula for $S_{xy}$ using raw sums, and what is the critical order of operations to avoid rounding errors? (2 steps)", "answer": "- Step 1: The formula is $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$.\n- Step 2: Compute the product $$(\\sum x)(\\sum y)$$ fully before dividing by $n$. Do not divide $\\sum x$ by $n$ and $\\sum y$ by $n$ separately first, as this can introduce rounding errors.\n\nAlso, remember that $S_{xy}$ can be negative, unlike $S_{xx}$ or $S_{yy}$.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "S1 May 2024 Q4(b) — After calculating the Product Moment Correlation Coefficient (PMCC), what is the essential sanity check you must perform? (2 steps)", "answer": "- Step 1: Verify that the value of $r$ lies within the range $$[-1, 1]$$.\n- Step 2: If $r$ falls outside this range (e.g., $r = 1.05$), you immediately know there is an arithmetic error, likely in the square root of the denominator $$\\sqrt{S_{xx}S_{yy}}$$.\n\nThis check prevents you from losing multiple marks downstream for a single calculation error.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "S1 May 2024 Q4(c) — When calculating the intercept $a$ for the regression line $y = a + bx$, what is the crucial rule regarding the gradient $b$? (2 steps)", "answer": "- Step 1: You must use the **unrounded** value of $b$ when computing $$a = \\bar{y} - b\\bar{x}$$.\n- Step 2: Rounding $b$ too early (e.g., to 3 s.f.) and then using it to find $a$ will cause $a$ to be incorrect at the 3rd significant figure due to error propagation.\n\nAlways store the full calculator value of $b$ in your calculator's memory before subtracting.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "S1 May 2024 Q4(d) — When asked to interpret the gradient of a regression line in context, what three elements must your answer include? (2 steps)", "answer": "- Step 1: State the direction of change (\"increases\" or \"decreases\") and the specific increment (\"for every 1 unit increase in $x$...\").\n- Step 2: Include the exact numerical value of the gradient and the **units of both variables** in context.\n\nSaying \"the line slopes up\" or \"girth increases with length\" is too vague. You must say: \"For every 1 cm increase in length, girth increases by approximately 0.722 cm.\"", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "S1 May 2024 Q4(e)(ii) — Why is using a regression line to estimate a value well outside the observed data range unreliable? (2 steps)", "answer": "- Step 1: This is called **extrapolation**. The linear relationship observed within the data range may not hold outside of it (the relationship could curve or flatten).\n- Step 2: Therefore, the estimate is unreliable because the model is untested in that region.\n\nDo not say \"the data isn't accurate\" or \"it's too small\"; the core issue is the assumption of linearity failing outside the observed range.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}, {"question": "S1 May 2024 Q4(f) — When a question asks for the increase in $x$ required to cause a specific increase in $y$ using a regression line, what part of the equation do you use, and why? (2 steps)", "answer": "- Step 1: Use only the **gradient** $b$. The relationship for increments is $$\\Delta y = b \\cdot \\Delta x$$.\n- Step 2: The intercept $a$ is a baseline constant that cancels out when you subtract two $y$ values ($$y_2 - y_1 = (a + bx_2) - (a + bx_1) = b(x_2 - x_1)$$).\n\nA common pitfall is setting the entire regression equation equal to the increment (e.g., $$-42.3 + 0.722x = 17.3$$), which treats the increment as an absolute $y$-value rather than a change in $y$.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}, {"question": "S1 May 2024 Q5(a) — What is the standardisation formula used to convert a normal variable $X$ to the standard normal variable $Z$? (2 steps)", "answer": "- Step 1: The formula is $$Z = \\frac{X - \\mu}{\\sigma}$$.\n- Step 2: This shifts the mean to 0 (by subtracting $\\mu$) and scales the standard deviation to 1 (by dividing by $\\sigma$), allowing you to use the standard normal tables.\n\nA common pitfall is dividing by $\\sigma^2$ (the variance) instead of $\\sigma$.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "S1 May 2024 Q5(b) — When a normal distribution question mentions the \"fastest $p\\%$\" of times, which tail of the distribution does this correspond to, and why is this a critical translation step? (2 steps)", "answer": "- Step 1: \"Fastest\" means the **shortest** times, which corresponds to the **lower tail** (left side) of the distribution.\n- Step 2: This is a critical translation because \"fastest\" intuitively feels like \"best\" or \"top,\" which students often misinterpret as the upper tail. Setting $$P(X < t) = 0.60$$ (for fastest 60%) is correct; setting $$P(X > t) = 0.60$$ is the most common critical error.\n\nAlways sketch the curve and shade the lower tail for \"fastest/shortest\" and the upper tail for \"slowest/longest.\"", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "S1 May 2024 Q5(c) — If you are given $P(\\mu - c < X < \\mu + c) = p$ for a normal distribution, how do you find $\\sigma$? (3 steps)", "answer": "- Step 1: Exploit the symmetry of the normal distribution. The probability in the lower tail is $$\\frac{1 - p}{2}$$.\n- Step 2: Find the $z$-value corresponding to the lower boundary: $$P(Z < z) = \\frac{1-p}{2}$$. This $z$-value will be negative.\n- Step 3: Set up the standardisation equation for the lower boundary: $$\\frac{\\mu - c - \\mu}{\\sigma} = z$$, which simplifies to $$\\sigma = \\frac{-c}{z}$$. Since $z$ is negative, $\\sigma$ will be positive.\n\nDo not try to find $\\sigma$ from the center probability directly; work from one of the tails where you have a clear inequality.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "S1 May 2024 Q5(c) — After calculating $\\sigma = 10 / 1.96$, what sanity check should you perform to catch decimal placement errors? (2 steps)", "answer": "- Step 1: Compare the magnitude of $\\sigma$ to the interval half-width $c$. Here, $\\sigma = 10 / 1.96 \\approx 5.1$.\n- Step 2: Verify that $\\sigma$ is of the same order of magnitude as $c$. If you get $\\sigma = 0.51$, you have misplaced the decimal by a factor of 10. A standard deviation of 0.51 for an interval spanning 20 units (from $\\mu-10$ to $\\mu+10$) would be impossibly narrow.\n\nThis specific sanity check prevents the critical error of writing 0.510 instead of 5.10.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "S1 May 2024 Q5(c) — When calculating conditional probability $P(A \\mid B)$, how does recognizing that $A \\subset B$ simplify the numerator? (2 steps)", "answer": "- Step 1: The conditional probability formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$.\n- Step 2: If $A$ is a subset of $B$ (meaning whenever $A$ happens, $B$ definitely happens), then $$A \\cap B = A$$. The numerator simplifies to just $$P(A)$$.\n\nFor example, if $T > \\mu - 5$, then $T$ is automatically $> \\mu - 10$. So $$P(T > \\mu - 5 \\mid T > \\mu - 10) = \\frac{P(T > \\mu - 5)}{P(T > \\mu - 10)}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "S1 May 2024 Q6(a) — When a Venn diagram question asks for the probability of an event like \"plays Chess but does not play Go\" ($P(C \\cap G')$), how do you identify the correct regions? (2 steps)", "answer": "- Step 1: Locate all regions inside the circle for the first event ($C$) that are **outside** the circle for the second event ($G$).\n- Step 2: Sum the probabilities of these specific regions. Do not use the independence formula $$P(C)P(G')$$ unless independence is explicitly stated.\n\nFor $P(C \\cap G')$, this includes the \"C only\" region and the \"C and S but not G\" region.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "S1 May 2024 Q6(b) — When setting up the independence equation $P(A \\cap B) = P(A)P(B)$ for a 3-circle Venn diagram, what is the critical pitfall regarding $P(A \\cap B)$? (2 steps)", "answer": "- Step 1: $P(A \\cap B)$ must include **all** subregions within the intersection of A and B.\n- Step 2: This means you must include both the \"A and B only\" region AND the \"A and B and C\" (triple overlap) region.\n\nA common pitfall is to use only the double-overlap region (e.g., 0.12) and forget the triple-overlap region (e.g., 0.15), leading to an incorrect calculation of $p$.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "S1 May 2024 Q6(e) — When estimating the total population size from a known count (e.g., \"76 teenagers play Chess and Go\"), what is the formula? (2 steps)", "answer": "- Step 1: Identify the probability of the known event (e.g., $$P(C \\cap G) = p + 0.15$$).\n- Step 2: Use the relationship $$\\text{Total} = \\frac{\\text{Count}}{\\text{Probability}}$$. Here, $$\\text{Total} = \\frac{76}{P(C \\cap G)}$$.\n\nEnsure you use the full probability of the event, including all subregions (both the $C \\cap G$ only region and the $C \\cap G \\cap S$ region).", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "S1 May 2024 Q6(e) — When asked to find the number of people who do NOT do something (e.g., \"do not play Scrabble\"), what is the safest shortcut to avoid missing regions? (2 steps)", "answer": "- Step 1: Calculate the probability of the event happening (e.g., $$P(S) = 0.60$$).\n- Step 2: Use the complement: $$P(S') = 1 - P(S)$$. Multiply this by the total population.\n\nThe common pitfall is trying to manually sum the \"not S\" regions from the Venn diagram and forgetting the outside region ($q$) or the \"G only\" region. The complement rule guarantees you include everything outside the circle.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": true}], "count": 40}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "In a back-to-back stem-and-leaf diagram, the left-side leaves represent one group and the right-side leaves represent another. What is the critical reading-direction rule for the left-side leaves, and why? (2 steps)", "answer": "- Step 1: The left-side leaves must be read **right-to-left** (outward from the stem). This is because the smallest values are closest to the stem, and the leaves fan outward in ascending order — just like the right side fans outward left-to-right.\n- Step 2: If you read left-to-left (i.e., treating the leftmost digit as the smallest), you reverse the ordering and every value you transcribe from that side will be wrong, cascading errors into medians, quartiles, and outliers.\n\nThe stem is the spine; both sides grow outward from it.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "Before you read any values from a stem-and-leaf diagram, what is the very first thing you must check, and what does it tell you about how to interpret each data point?", "answer": "You must read the **key**. The key tells you how to combine the stem and leaf digits into an actual data value. For example, \"5 | 6 | 3 means 65 cm for a Birch tree and 63 cm for a Maple tree\" tells you that stem-5, leaf-6 on the Birch side is 65 (not 56 or 5.6). Without checking the key, you could misinterpret every single value by an order of magnitude or digit order.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "In a stem-and-leaf diagram, a leaf position is occupied by the letter $k$ (e.g., the leaves in a row read $1, 1, 1, k, 7, 8$). What is $k$, and what constraint must it satisfy based on the structure of the diagram? (2 steps)", "answer": "- Step 1: $k$ is a **single digit** (0–9) representing one leaf in that row. It is NOT a frequency, NOT a count, and NOT a sum. The value it represents is $\\text{stem} \\times 10 + k$ (or whatever the key specifies).\n- Step 2: Because leaves must be listed in ascending order, $k$ must satisfy: the leaf before it $\\le k \\le$ the leaf after it. Here, $1 \\le k \\le 7$, so $k \\in \\{1, 2, 3, 4, 5, 6, 7\\}$.\n\nTreating $k$ as a sum (e.g., \"$k+7$\") or a frequency is the classic misinterpretation.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "For a dataset with $N = 32$ (even), what is the rule for finding the median, and which two ordered positions do you use? (2 steps)", "answer": "- Step 1: When $N$ is even, the median is the **mean (average)** of the $\\frac{N}{2}$th and the $(\\frac{N}{2}+1)$th ordered values.\n- Step 2: For $N = 32$: median $= \\frac{1}{2}(x_{16} + x_{17})$. You must locate both the 16th and 17th values using cumulative frequencies, then average them.\n\nDo NOT use $(N+1)/2 = 16.5$ and interpolate — that's the rule for a different exam board or context. Edexcel S1 discrete data: even $N$ → average the two middle values.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "What is the Edexcel S1 rule for finding the lower quartile position $Q_1$ from $n$ data values? Give both cases and state which common alternative rule you must NOT use. (3 steps)", "answer": "- Step 1: Compute $n/4$.\n- Step 2: If $n/4$ is **not an integer**, round **up** to the next integer position. Example: $n=35$, $n/4 = 8.75$ → $Q_1$ is the 9th value.\n+ If $n/4$ **is an integer**, take the **average** of the $(n/4)$th and $(n/4+1)$th values. Example: $n=32$, $n/4 = 8$ → $Q_1 = \\frac{1}{2}(x_8 + x_9)$.\n- Step 3: Do NOT use $(n+1)/4$ — that is the GCSE / M-stats rule, not Edexcel S1. It gives different positions (e.g., for $n=35$, $(n+1)/4 = 9$th by coincidence, but for $n=36$, $(n+1)/4 = 9.25$ would suggest interpolation, whereas $n/4 = 9$ → average of 9th and 10th).\n\nThe same logic applies to $Q_3$ using $3n/4$.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "For $N = 35$, the lower quartile position is the 9th value. A student mistakenly used the 6th value and got $Q_1 = 35$. What specific error in applying the Edexcel quartile rule caused this? (2 steps)", "answer": "- Step 1: The correct calculation is $n/4 = 35/4 = 8.75$. Since 8.75 is not an integer, you round **up** to position 9. The 9th value in the sorted Birch data is 39.\n- Step 2: The student likely used a different rounding (rounding 8.75 **down** to 8, or used $(n+1)/4 = 9$ but then miscounted, or simply counted wrong). The most plausible error: they computed $35/4 \\approx 8.75$ and then either rounded to the nearest integer (9) but miscounted the data, or used some other positional formula entirely and landed on position 6 (value 35).\n\nThe takeaway: always write \"$n/4 = 8.75$, round up → position 9\" explicitly, then count carefully using cumulative stem totals.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "What is the outlier fence formula, and why should you write $1.5 \\times \\text{IQR}$ as a separate line in your working? (2 steps)", "answer": "- Step 1: An outlier is any value $x$ where $x < Q_1 - 1.5 \\times \\text{IQR}$ or $x > Q_3 + 1.5 \\times \\text{IQR}$, where $\\text{IQR} = Q_3 - Q_1$.\n- Step 2: Write $1.5 \\times \\text{IQR}$ as a separate line because the mark scheme awards a **method mark** for this intermediate calculation. If you jump straight from IQR to the fence values and make an arithmetic error, you lose both the method and accuracy marks. Showing the intermediate step protects you.\n\nAlso: always compute and state BOTH fences (lower and upper), even if no outliers exist on one side — the marker needs to see you checked.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": true}, {"question": "When drawing a box plot and the dataset has an outlier, where does the whisker end, and how is the outlier represented? (2 steps)", "answer": "- Step 1: The whisker extends to the **most extreme non-outlier** value in that direction. For example, if the maximum is 85 but 85 is an outlier and the next value down is 76, the upper whisker ends at 76 — NOT at 85.\n- Step 2: The outlier is plotted as a **separate point** (cross × or asterisk *) at its actual value, beyond the whisker.\n\nDrawing the whisker all the way to 85 would incorrectly show the full spread including the outlier, defeating the purpose of flagging it.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "A question asks you to \"comment on any difference in the distributions\" of two datasets. What must your answer include to score the mark? (2 steps)", "answer": "- Step 1: You must **compare a specific statistic** (e.g., median, IQR, mean) and **state both numerical values**. For example: \"The median Birch growth (48 cm) is greater than the median Maple growth (45 cm).\"\n- Step 2: A qualitative statement without values (e.g., \"Birch trees grow more\") scores zero. You must embed the numbers. One sentence comparing one statistic with both values is sufficient for 1 mark.\n\nAvoid the word \"average\" alone — specify which average (median, mean) you're referencing.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "A question says \"there is no change to the box plot\" after adding new data points. How many statistical constraints does this impose, and what are they? (2 steps)", "answer": "- Step 1: It imposes **five** constraints — one for each of the five numbers that define a box plot: minimum, $Q_1$, median, $Q_3$, and maximum must all remain the same.\n- Step 2: Each constraint may yield an inequality or equation on the new data. For example, \"max stays 80\" means $2a \\le 80$ (if $2a$ is the largest new value), and \"$Q_1$ stays 36\" means the new data must not displace the 9th/10th ordered values away from 36.\n\nThe common pitfall: checking only the ordering constraint ($27 \\le a \\le 48$) and stopping. You must check ALL five constraints — the binding ones may be $Q_1$ and the maximum.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "When adding 4 new data values to a dataset of 32, the new $N = 36$. For $N = 36$, the quartile positions change. What are the new positions for $Q_1$, median, and $Q_3$ under the Edexcel rule? (2 steps)", "answer": "- Step 1: Since $N = 36$ is divisible by 4 ($36/4 = 9$, an integer), the Edexcel rule says: $Q_1$ = average of 9th and 10th values. Median = average of 18th and 19th values. $Q_3$ = average of 27th and 28th values.\n- Step 2: This is the \"integer → average\" case. If you incorrectly used the \"round up\" rule (which applies only when $n/4$ is NOT an integer), you'd take just the 9th value for $Q_1$, which would give a different (wrong) answer.\n\nThe rule switches depending on divisibility by 4 — always recompute positions for the new $N$.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "In Q1(f), the constraint \"$Q_1$ must stay at 36\" leads to $a \\ge 36$. Intuitively, why must $a$ be at least 36? What would go wrong if $a = 30$? (3 steps)", "answer": "- Step 1: With $a = 30$, the new sorted list inserts 27 and 30 before the original data. The original 8th and 9th values (both 36) shift to positions 10 and 11.\n- Step 2: Now the 9th and 10th values (the ones averaged for $Q_1$ when $N=36$) are no longer both 36 — the 9th value has become something smaller (one of the original values that was at position 7, now shifted).\n- Step 3: The average of the new 9th and 10th values would be less than 36, so $Q_1$ would decrease. To prevent this, $a$ must be $\\ge 36$ so that the two 36s remain in positions 9 and 10 (or are not displaced).\n\nThe key insight: inserting small values below $Q_1$ pushes the quartile positions to lower data points.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": true}, {"question": "In Q1(f), the ordering constraint gives $27 \\le a \\le 48$, but the final answer is $36 \\le a \\le 40$. Which two additional constraints tighten the range, and why? (2 steps)", "answer": "- Step 1: The **$Q_1$ constraint** tightens the lower bound: $a \\ge 36$, because if $a < 36$, the new 9th/10th values shift away from 36 and $Q_1$ changes.\n- Step 2: The **maximum constraint** tightens the upper bound: $2a \\le 80 \\Rightarrow a \\le 40$, because if $2a > 80$, the new maximum exceeds 80 and the box plot changes. The ordering constraint only says $2a \\ge 48$ (i.e., $a \\ge 24$), which is weaker — it doesn't account for the box plot's max staying at 80.\n\nCombining: $36 \\le a \\le 40$.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": true}, {"question": "For the inequality $P(2X - 3 > 5)$ with a discrete random variable $X$, what is the first algebraic step, and why does the strict inequality matter? (2 steps)", "answer": "- Step 1: Rearrange the inequality first: $2X - 3 > 5 \\Rightarrow 2X > 8 \\Rightarrow X > 4$. Now sum the probabilities $P(X = x)$ for all $x > 4$.\n- Step 2: The strict \"$>$\" means $X = 4$ is **excluded**. You sum only $P(X=5) + P(X=7) + P(X=8)$, NOT including $P(X=4)$. If the inequality were $\\ge$, you would include $X = 4$.\n\nAlways rearrange first, then check whether the boundary value is included or excluded.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "When computing $E(X^2)$ for a discrete random variable, what is the formula, and what is the most common mistake in applying it? (2 steps)", "answer": "- Step 1: $E(X^2) = \\sum x^2 \\cdot P(X = x)$. You square each $x$-value and multiply by its probability, then sum all terms.\n- Step 2: The most common mistake is **squaring the probability** instead of the $x$-value — i.e., writing $x \\cdot [P(X=x)]^2$ instead of $x^2 \\cdot P(X=x)$. Another mistake: computing $[E(X)]^2$ instead of $E(X^2)$ — these are not the same (that's literally why $\\text{Var}(X) = E(X^2) - [E(X)]^2 \\ne 0$ in general).\n\nThink: \"square the outcome, weight by probability.\"", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "Given $Y = aX - b$ with $E(Y)$ and $\\text{Var}(Y)$ known, and $E(X)$ and $\\text{Var}(X)$ known, what is the strategic reason to solve for $a$ using variance BEFORE using expectation? (2 steps)", "answer": "- Step 1: $\\text{Var}(Y) = a^2 \\text{Var}(X)$. This equation involves only $a$ — the constant $b$ disappears because adding/subtracting a constant does not change spread. So you can isolate $a$ immediately.\n- Step 2: $E(Y) = aE(X) - b$ involves both $a$ and $b$. If you start here, you have one equation with two unknowns. But if you find $a$ from variance first, you substitute it into the expectation equation and solve for $b$ in one step.\n\nStarting with variance eliminates $b$ cleanly; starting with expectation leaves you stuck with two unknowns.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "For $Y = aX - b$ where $a$ and $b$ are positive constants, you find $a^2 = 16$ from the variance equation. Why must $a = 4$ and not $a = -4$? (2 steps)", "answer": "- Step 1: Mathematically, $a^2 = 16$ gives $a = \\pm 4$. However, the question explicitly states \"$a$ and $b$ are positive constants.\"\n- Step 2: Therefore $a = 4$. Choosing $a = -4$ would violate the given constraint and produce an incorrect $b$ value when substituted into $E(Y) = aE(X) - b$.\n\nAlways check whether the question constrains the sign of constants before selecting the root.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "A common error is writing $\\text{Var}(aX + b) = a \\cdot \\text{Var}(X)$. What is the correct formula, and intuitively, why is the square there? (2 steps)", "answer": "- Step 1: The correct formula is $\\text{Var}(aX + b) = a^2 \\text{Var}(X)$.\n- Step 2: Intuition: if you multiply all values by $a$, distances from the mean also multiply by $a$. Since variance is the average of **squared** distances, the factor becomes $a^2$. The constant $b$ shifts everything equally, so it doesn't affect spread at all — it drops out.\n\nThink of it this way: if data spread from 10 to 20 (range 10), and you multiply by 3, they spread from 30 to 60 (range 30 = 3×). The variance scales by $3^2 = 9$.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": true}, {"question": "In a game, Sam spins once (score $S = X_1$) and Alex spins once (score $R = 2X_2 - 3$). Why are $S$ and $R$ independent, and what does this mean for computing $P(S > R)$? (2 steps)", "answer": "- Step 1: $S$ and $R$ are based on **two separate spins** ($X_1$ and $X_2$). Since each spin is independent, the random variables $S$ and $R$ are independent. This means $P(S = s \\text{ and } R = r) = P(S = s) \\times P(R = r)$.\n- Step 2: To compute $P(S > R)$: for each value of $S$, find $P(R < S)$ by summing probabilities of all $R$-values below $S$, then multiply by $P(S = s)$ and sum over all $s$.\n\nThe common mistake: treating $S$ and $R$ as if they come from the same spin (making them dependent). They don't — two spins, two independent outcomes.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "When computing $P(\\text{Sam wins})$ where Sam wins if $S > R$, why must you tabulate the $R$ distribution first (from $R = 2X_2 - 3$) before doing any probability calculations? (2 steps)", "answer": "- Step 1: You need to know what values $R$ can take and their probabilities. $R = 2X_2 - 3$ transforms each $X_2$ value: $X_2 = 2 \\Rightarrow R = 1$, $X_2 = 4 \\Rightarrow R = 5$, etc. The probabilities carry over: $P(R = 1) = P(X_2 = 2) = 0.25$.\n- Step 2: Without this table, you can't determine which $R$-values are less than each $S$-value. For example, when $S = 7$, you need to know that $R$ can be 1 or 5 (both $< 7$), so $P(R < 7) = 0.25 + 0.30 = 0.55$.\n\nBuild the $R$-table first; then for each $S$, sum the qualifying $P(R)$ values.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": true}, {"question": "In a histogram, what does the **area** of each bar represent, and what are the two scale constants you must derive from a reference bar? (2 steps)", "answer": "- Step 1: The **area** of each bar is proportional to the **frequency** of that class. Since area = width × height, and width ∝ class width, it follows that height ∝ frequency density (FD = frequency ÷ class width).\n- Step 2: From a reference bar, derive: (1) the **width scale** — cm per mm of class width = (reference bar width in cm) / (reference class width in mm); (2) the **height scale** — cm per unit FD = (reference bar height in cm) / (reference FD). Apply each scale separately to the target class.\n\nCommon mistake: using frequency directly as height (it must be FD), or multiplying class width by the reference bar width directly instead of computing the per-mm scale first.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "A student multiplied the target class width (2 mm) by the reference bar width (2.5 cm) to get 5 cm for the new bar width. Why is this wrong, and what should they have done? (2 steps)", "answer": "- Step 1: This treats the bar width as directly proportional to class width with scale factor = reference bar width (2.5 cm). But the scale factor is 2.5 cm per 4 mm of class width = 0.625 cm/mm. You must divide the reference bar width by the reference class width first.\n- Step 2: Correct: new bar width = 2 mm × 0.625 cm/mm = 1.25 cm. The student's answer of 5 cm would be correct only if the reference class width we
