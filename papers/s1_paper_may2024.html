a Tukey convention. Using 1 would be too aggressive (flagging too many points); using 3 would only flag \"far outliers\". 1.5 is the standard middle-ground that flags genuinely unusual values without overflagging.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "For Birch trees with $$Q_1=39$$ and $$Q_3=57$$, sketch the procedure for checking outliers. (3 steps)", "answer": "- Step 1: Compute $$\\text{IQR} = 57 - 39 = 18$$ and $$1.5\\,\\text{IQR} = 27$$ (write this as a separate line for method marks).\n- Step 2: Lower fence $$= 39 - 27 = 12$$; upper fence $$= 57 + 27 = 84$$. Quote **both** fences even if one tail has no outliers.\n- Step 3: Scan the dataset: smallest value 28 > 12 (no low outliers); only 85 > 84 (one high outlier). State the outlier value explicitly: 85 cm.\n\nCommon error: comparing only max/min without listing both fences — loses method marks.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "On a box plot, where exactly should the whiskers end when outliers are present? (2 steps)", "answer": "- Step 1: A whisker ends at the **most extreme non-outlier** in that direction — i.e., the largest value still ≤ upper fence, and the smallest value still ≥ lower fence.\n- Step 2: Outliers themselves are plotted as **separate marks** (crosses or asterisks) beyond the whisker tips.\n\nCommon mistake: extending the whisker to the outlier itself, which visually treats the outlier as part of the normal spread.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "When a \"compare distributions\" question is worth only 1 mark, what two ingredients must your one-sentence answer contain? (2 steps)", "answer": "- Step 1: A comparison of a **specific named statistic** — e.g. \"the median Birch growth is greater than the median Maple growth\" (not just \"Birch grow taller\").\n- Step 2: The **actual numerical values** being compared — e.g. \"48 cm vs 45 cm\". Without numbers, no mark.\n\nAvoid vague words like \"average\" alone — say \"median\" or \"mean\". One precise sentence beats a paragraph.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "A box plot stays unchanged after adding $$k$$ new data points. What does \"unchanged\" really constrain? (2 steps)", "answer": "- Step 1: A box plot is fully determined by **five statistics**: minimum, $$Q_1$$, median, $$Q_3$$, maximum. \"Unchanged\" means **all five** must be the same after the addition.\n- Step 2: Each of the five becomes a **separate constraint** on the new data. You need to check each one with the **new** $$N$$ (old + $$k$$) and possibly new quartile-position rule.\n\nCommon slip: stopping after the ordering constraint or after just one statistic. List all five before computing.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Adding 4 values to an $$N=32$$ dataset gives $$N=36$$. Why does the quartile rule **change**, and what does it become? (2 steps)", "answer": "- Step 1: 36 is divisible by 4 (whereas 32 was, but 35 was not). For $$Q_1$$ we now compute $$36/4=9$$ — an integer, so we apply the **average rule**.\n- Step 2: New positions:\n+ $$Q_1$$ = average of 9th and 10th sorted values.\n+ Median = average of 18th and 19th.\n+ $$Q_3$$ = average of 27th and 28th.\n\nFailing to switch to the average rule when $$N$$ flips between integer/non-integer regimes is a common slip in \"added data\" problems.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "Four data points $$27, a, 48, 2a$$ (in ascending order) are added to a Maple dataset. What ordering constraints alone tell you about $$a$$? (2 steps)", "answer": "- Step 1: Ascending order requires $$27 \\le a$$ (so $$a \\ge 27$$) and $$a \\le 48$$ (so $$a \\le 48$$).\n- Step 2: It also requires $$48 \\le 2a$$, giving $$a \\ge 24$$ — weaker than $$a \\ge 27$$. So the **ordering** alone gives $$27 \\le a \\le 48$$.\n\nBut this is **not the final answer** — box-plot-preservation constraints will tighten the range further.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "In a \"no change to box plot\" problem, the maximum must stay 80 and the new data include a value $$2a$$. What constraint does this impose, and why is it often overlooked? (2 steps)", "answer": "- Step 1: $$2a$$ must not exceed the existing maximum, so $$2a \\le 80 \\Rightarrow a \\le 40$$. This is **tighter** than the ordering constraint $$a \\le 48$$.\n- Step 2: It's overlooked because students fixate on the ordering ($$a \\le 48$$) and forget that $$2a$$ — not $$a$$ — is the value entering the dataset at the top end. Always check each new value against each fixed box-plot statistic separately.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "Why does the lower-end constraint $$a \\ge 36$$ arise in the Maple \"no change\" problem? (3 steps)", "answer": "- Step 1: After adding two values below $$Q_1$$ (27 and a possible small $$a$$), the original 9th and 10th values shift to positions 11 and 12 in the new list. We need the **new** 9th and 10th to still average 36.\n- Step 2: The original 8th and 9th values are both 36. If $$a < 36$$, then $$a$$ slots in before these, pushing them out of positions 9 and 10, so the new $$Q_1$$ would no longer be 36.\n- Step 3: For the new 9th and 10th to both still equal 36, $$a$$ must be at least 36 (so it doesn't displace them). Hence $$a \\ge 36$$.\n\nTakeaway: every quartile constraint translates to a positional argument about where each new value lands in the sorted list.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "What does a histogram \"represent\" geometrically that distinguishes it from a bar chart? (2 steps)", "answer": "- Step 1: In a histogram, the **area** of each bar is proportional to the frequency of that class. This is essential for unequal class widths — a wider class with the same frequency must have a shorter bar so the area matches.\n- Step 2: This forces the y-axis to be **frequency density** (FD = frequency ÷ class width), not frequency. Bars then have width = class width and height = FD.\n\nA bar chart uses height alone for frequency (no area meaning).", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "When a histogram problem gives you the dimensions of one reference bar in cm and asks for another bar's dimensions in cm, what's the systematic approach? (3 steps)", "answer": "- Step 1: Compute the **frequency density** of the reference class: FD = frequency / class width.\n- Step 2: Derive **two scale factors** from the reference bar:\n+ cm per unit of class width = (bar width in cm) / (class width in real units).\n+ cm per unit of FD = (bar height in cm) / (FD).\n- Step 3: Apply each scale factor to the target class: target bar width = (target class width) × (cm per width unit); target bar height = (target FD) × (cm per FD unit).\n\nDon't directly multiply the reference bar width by the target class width — derive the **per-unit** scale first.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "For grouped continuous data, the median by linear interpolation uses what formula and what position rule? (2 steps)", "answer": "- Step 1: Position rule: use $$N/2$$ (not $$(N+1)/2$$ — that's a discrete-data rule).\n- Step 2: Formula:\n$$\\text{Median} = L + \\frac{N/2 - F_b}{f_m} \\times c$$\nwhere $$L$$ = lower class **boundary** of the median class, $$F_b$$ = cumulative frequency **before** the median class, $$f_m$$ = frequency of the median class, $$c$$ = class width.\n\nNot in the formula booklet — memorize. Use the lower **boundary** (e.g. 32 if the class is $$32 \\le x < 36$$, not 31.5).", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "What is the intuition behind the linear-interpolation median formula? (3 steps)", "answer": "- Step 1: We know the median lies in a specific class but not exactly where. We assume the data are **uniformly distributed within that class** — a reasonable approximation for continuous data.\n- Step 2: We've already accumulated $$F_b$$ observations below the class. We need $$N/2 - F_b$$ more to reach the median position, out of $$f_m$$ in that class.\n- Step 3: That fraction $$\\frac{N/2 - F_b}{f_m}$$ tells us how far across the class width $$c$$ to step from the lower boundary $$L$$. Adding $$L$$ gives the interpolated median.\n\nIt's literally a linear blend across the class — hence \"linear interpolation\".", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "Coding by $$10y = w - 20$$ means data $$w$$ has been transformed. How do you recover the mean and standard deviation of the original $$w$$ from those of $$y$$? (3 steps)", "answer": "- Step 1: Rearrange: $$w = 10y + 20$$, so $$w$$ is a linear function of $$y$$ with slope 10 and offset 20.\n- Step 2: Mean transforms with the full linear rule: $$\\bar{w} = 10\\bar{y} + 20$$.\n- Step 3: Standard deviation is **scale-only** (offset doesn't affect spread):\n+ Variance: $$\\operatorname{Var}(w) = 10^2 \\operatorname{Var}(y) = 100\\,\\operatorname{Var}(y)$$.\n+ SD: $$\\sigma_w = 10\\,\\sigma_y$$.\n\nCommon slip: multiplying SD by 100 instead of 10 (over-applying the squared factor), or applying the +20 to SD.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "Why does the constant in $$w = 10y + 20$$ disappear from the standard deviation but affect the mean? (2 steps)", "answer": "- Step 1: The mean measures **location** — shifting every data point up by 20 shifts the centre up by 20.\n- Step 2: The standard deviation measures **spread** — distances between data points are unchanged when you add the same constant to every point. So $$\\sigma$$ is invariant under shifts, only sensitive to scaling.\n\nThis is the conceptual heart of $$\\operatorname{Var}(aX+b) = a^2 \\operatorname{Var}(X)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "From the summary $$\\sum y$$ and $$\\sum y^2$$ for $$n$$ values, how do you compute $$\\operatorname{Var}(y)$$? (2 steps)", "answer": "- Step 1: Use the \"raw-sums\" form of variance (not in the IAL booklet — memorize):\n$$\\operatorname{Var}(y) = \\frac{\\sum y^2}{n} - \\left(\\frac{\\sum y}{n}\\right)^2 = \\frac{\\sum y^2}{n} - \\bar{y}^2.$$\n- Step 2: Equivalently, compute $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$, then $$\\operatorname{Var}(y) = S_{yy}/n$$.\n\nTake the square root **last** to get $$\\sigma$$ — apply $$\\sqrt{\\cdot}$$ to the variance, not to intermediate sums.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "A pebble of weight exactly equal to the current mean is added to a dataset of $$n=50$$. What happens to (i) the mean and (ii) the standard deviation? (3 steps)", "answer": "- Step 1: Mean: adding a value equal to $$\\bar{w}$$ doesn't shift the centre. New mean $$= \\frac{50\\bar{w} + \\bar{w}}{51} = \\bar{w}$$. **No change.**\n- Step 2: Standard deviation: variance is $$\\frac{1}{n}\\sum (w_i - \\bar{w})^2$$. The new value contributes $$(\\bar{w}-\\bar{w})^2 = 0$$ to the numerator, but $$n$$ grows from 50 to 51.\n- Step 3: So the numerator is unchanged but the denominator increases → variance **decreases** → SD **decreases**.\n\nJustification matters: state that the added value equals the mean → zero deviation → dilution.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "What is the discrete random variable formula for $$\\operatorname{Var}(X)$$ from a probability table, and what's the most common slip? (2 steps)", "answer": "- Step 1: $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$, where $$E(X^2) = \\sum x^2 P(X=x)$$ — square the $$x$$ values, not the probabilities.\n- Step 2: Common slip: subtracting $$E(X)$$ instead of $$E(X)^2$$. Always square the mean before subtracting.\n\nA second slip: squaring the probability $$p$$ along with $$x$$ — only $$x$$ gets squared.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "If $$Y = aX - b$$ with $$a,b$$ positive constants, and you're given $$E(Y)$$ and $$\\operatorname{Var}(Y)$$, what's the cleanest order to solve for $$a$$ and $$b$$? (3 steps)", "answer": "- Step 1: Start with **variance**: $$\\operatorname{Var}(Y) = a^2\\operatorname{Var}(X)$$. The constant $$b$$ drops out, so this isolates $$a^2$$ directly.\n- Step 2: Take the **positive** root for $$a$$ (since \"positive constants\" is stated).\n- Step 3: Substitute $$a$$ back into $$E(Y) = aE(X) - b$$ and solve for $$b$$.\n\nThe reverse order (expectation first) leaves you with a single equation in two unknowns — gets stuck.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "Two players each spin the same spinner once. Sam scores $$S = X_1$$; Alex scores $$R = 2X_2 - 3$$. Are $$S$$ and $$R$$ independent or dependent? (2 steps)", "answer": "- Step 1: $$S$$ depends on $$X_1$$ and $$R$$ depends on $$X_2$$, which are **two different spins**. Different spins yield independent outcomes by assumption.\n- Step 2: Therefore $$P(S=s, R=r) = P(S=s) \\cdot P(R=r)$$ — we multiply marginal probabilities.\n\nCommon confusion: if $$R$$ were defined as $$2X_1 - 3$$ (same spin), then $$S$$ and $$R$$ would be a deterministic function of each other — completely dependent. Read carefully which spinner each variable comes from.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "To find $$P(\\text{Sam wins})$$ when Sam's score is $$S$$ and Alex's is $$R$$ (independent), what's the most reliable strategy? (3 steps)", "answer": "- Step 1: First build the **distribution of $$R$$** explicitly by transforming each $$x$$ value: e.g., $$R = 2X_2 - 3$$ gives $$R$$-values $$\\{1, 5, 7, 11, 13\\}$$ with the same probabilities as $$X_2$$.\n- Step 2: Condition on each value of $$S$$. For each $$s$$, compute $$P(R < s)$$ by summing $$R$$-probabilities for which $$R$$-values fall below $$s$$.\n- Step 3: $$P(\\text{Sam wins}) = P(S > R) = \\sum_s P(S=s)\\cdot P(R<s)$$.\n\nUse **strict** \"$$<$$\" because ties are draws, not wins. Sanity check: $$P(\\text{Sam wins}) + P(\\text{Alex wins}) + P(\\text{draw}) = 1$$.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "Why must you use $$P(R < S)$$ rather than $$P(R \\le S)$$ when computing the probability that Sam wins a game where higher score wins and ties are draws?", "answer": "Because \"Sam wins\" means strictly higher: $$S > R$$, equivalently $$R < S$$. Using $$R \\le S$$ would count tie cases (where $$S = R$$) as Sam winning, but the problem defines those as draws. The inequality boundary is what separates wins from draws — a single misplaced \"=\" inflates the probability by the entire draw probability.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "\"Find the proportion of adults that take less than 18 minutes\" where $$X \\sim N(15, 2^2)$$. What is the standardisation step and why? (3 steps)", "answer": "- Step 1: To use standard normal tables (which give $$\\Phi(z)$$ for $$Z \\sim N(0,1)$$), we transform $$X$$ to $$Z = (X - \\mu)/\\sigma$$. This subtracts the mean to centre at 0 and divides by **$$\\sigma$$** (not $$\\sigma^2$$) to rescale to unit variance.\n- Step 2: For \"$$X < 18$$\": $$Z = (18 - 15)/2 = 1.5$$. So $$P(X < 18) = P(Z < 1.5)$$.\n- Step 3: Look up $$\\Phi(1.5) = 0.9332$$ from tables.\n\nCommon slip: dividing by 4 ($$\\sigma^2$$) — gives $$z=0.75$$, wrong tail value.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "\"Only the fastest 60% of adults take part in round two.\" How does this translate into a probability statement on times $$X$$? (3 steps)", "answer": "- Step 1: \"Fastest\" = shortest time = **lower** values of $$X$$. Sketch a normal curve and shade the **left** tail.\n- Step 2: The fastest 60% are those whose times fall below some cutoff $$t$$: $$P(X < t) = 0.60$$.\n- Step 3: To find $$t$$, look up $$\\Phi^{-1}(0.60) = 0.2533$$, then de-standardise: $$t = \\mu + 0.2533\\sigma$$.\n\n**Critical mistake to avoid**: treating \"fastest 60%\" as upper tail (using $$P(X < t) = 0.40$$), which gives a smaller $$t$$ — the answer would be 14.49 instead of 15.5.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "Why is sketching the normal curve essential for \"fastest $$p\\%$$\" / \"slowest $$p\\%$$\" questions? (3 steps)", "answer": "- Step 1: The words \"fast\" and \"slow\" describe behaviour, but the question secretly maps them to **tails of the distribution**. Sketching forces you to confront this mapping explicitly.\n- Step 2: Once you label the axes with what they measure (e.g. time → \"high $$x$$ = slow\"), shading the \"fastest\" portion lands on the **left** of the cutoff.\n- Step 3: This visual reasoning prevents the most expensive single-mistake error: getting the tail direction wrong, which gives a numerically plausible but completely incorrect answer.\n\nAlways: read words → draw curve → shade → write inequality → only then standardise.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "Given $$T \\sim N(\\mu, \\sigma^2)$$ and $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$, how do you find $$\\sigma$$? (3 steps)", "answer": "- Step 1: The interval $$(\\mu - 10, \\mu + 10)$$ is symmetric about $$\\mu$$ with 95% probability inside, so each tail carries $$(1-0.95)/2 = 0.025$$.\n- Step 2: Standardise the right endpoint: $$\\frac{\\mu+10-\\mu}{\\sigma} = \\frac{10}{\\sigma}$$. The $$z$$-value satisfying $$\\Phi(z) = 0.975$$ is $$z = 1.96$$.\n- Step 3: So $$\\frac{10}{\\sigma} = 1.96 \\Rightarrow \\sigma = \\frac{10}{1.96} \\approx 5.10$$.\n\n**Critical sanity check**: $$\\sigma$$ should be of the same order of magnitude as the half-width 10. $$\\sigma \\approx 5$$ is reasonable; $$\\sigma = 0.51$$ is a decimal slip — three orders of magnitude wrong relative to the interval.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "When computing a conditional probability $$P(A \\mid B)$$, and you notice $$A \\subset B$$, how does this simplify the calculation? (2 steps)", "answer": "- Step 1: By definition, $$P(A \\mid B) = P(A \\cap B)/P(B)$$. If $$A \\subset B$$, then $$A \\cap B = A$$, so $$P(A \\cap B) = P(A)$$.\n- Step 2: The conditional becomes $$P(A \\mid B) = P(A)/P(B)$$ — much simpler, no overlap to compute.\n\nExample: for $$T \\sim N(\\mu, \\sigma^2)$$, $$\\{T > \\mu-5\\} \\subset \\{T > \\mu-10\\}$$, so $$P(T>\\mu-5 \\mid T>\\mu-10) = P(T>\\mu-5)/P(T>\\mu-10)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Compute $$P(T > \\mu - 5 \\mid T > \\mu - 10)$$ for $$T \\sim N(\\mu, \\sigma^2)$$ with $$\\sigma \\approx 5.10$$, conceptually. (4 steps)", "answer": "- Step 1: Recognise the subset structure: $$\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$$, so the conditional = $$\\frac{P(T > \\mu-5)}{P(T > \\mu-10)}$$.\n- Step 2: Numerator: standardise $$T > \\mu - 5$$ → $$Z > -5/5.10 \\approx -0.98$$. By symmetry, $$P(Z > -0.98) = \\Phi(0.98) \\approx 0.8365$$.\n- Step 3: Denominator: from the given interval probability, $$P(T > \\mu - 10) = 1 - 0.025 = 0.975$$ (not 0.95 — that was the central interval).\n- Step 4: Ratio: $$0.8365 / 0.975 \\approx 0.858$$.\n\nThe traps: using $$0.95$$ in the denominator instead of $$0.975$$; computing $$P(\\mu-5 < T < \\mu-10)$$ which is the empty set.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "For two events $$A$$ and $$B$$, what does **independence** mean formally, and how is it distinct from \"mutually exclusive\"? (3 steps)", "answer": "- Step 1: $$A$$ and $$B$$ are **independent** iff $$P(A \\cap B) = P(A) \\cdot P(B)$$. Knowing $$B$$ tells you nothing about $$A$$.\n- Step 2: $$A$$ and $$B$$ are **mutually exclusive** iff $$P(A \\cap B) = 0$$. They cannot both happen.\n- Step 3: These are **opposite** concepts (except in degenerate cases). Two non-zero-probability mutually exclusive events are highly **dependent** — knowing $$B$$ happened tells you $$A$$ definitely didn't.\n\nCommon confusion: students conflate \"independent\" with \"disjoint\". They're nearly antonyms.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "In a 3-circle Venn diagram with events $$C, S, G$$, what regions contribute to $$P(C \\cap S)$$? (2 steps)", "answer": "- Step 1: $$C \\cap S$$ is the entire overlap of circles $$C$$ and $$S$$. It includes **both** subregions inside that overlap:\n+ The \"$$C \\cap S$$ only\" region (inside $$C$$ and $$S$$ but outside $$G$$).\n+ The triple-overlap $$C \\cap S \\cap G$$.\n- Step 2: So $$P(C \\cap S) = P(C \\cap S \\text{ only}) + P(C \\cap S \\cap G)$$.\n\nCommon slip: using only one of the two subregions. Always include the triple-overlap when computing **any** pairwise intersection.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": false}, {"question": "Why must you include the triple-overlap region when computing a pairwise intersection in a 3-set Venn diagram? (2 steps)", "answer": "- Step 1: $$C \\cap S$$ is defined as \"in $$C$$ AND in $$S$$\". Anyone in $$C \\cap S \\cap G$$ satisfies this — they're in $$C$$ and in $$S$$ (and additionally in $$G$$, but that's a bonus, not a disqualification).\n- Step 2: Geometrically, the triple-overlap is a **subset** of the pairwise overlap. Forgetting it amounts to subtracting people who genuinely belong to $$C \\cap S$$ just because they also belong to $$G$$.\n\nThis is the most common Venn-diagram-with-independence slip.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "A Venn diagram has 8 regions for 3 sets. What are they, and how do they sum? (2 steps)", "answer": "- Step 1: The 8 regions (mutually exclusive, exhaustive):\n+ Triple overlap $$C \\cap S \\cap G$$.\n+ Three \"pairwise-only\" regions: $$C \\cap S \\cap G'$$, $$C \\cap G \\cap S'$$, $$S \\cap G \\cap C'$$.\n+ Three \"single-only\" regions: $$C$$ only, $$S$$ only, $$G$$ only.\n+ Outside all three: $$C' \\cap S' \\cap G'$$.\n- Step 2: Probabilities of all 8 regions must sum to 1 (they partition the sample space). This is the equation used to solve for any \"outside\" probability.\n\nAlways include the outside region even when its value seems trivial.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "A Venn problem asks for $$P(\\text{not Scrabble})$$. What's the safest computation method, and why? (2 steps)", "answer": "- Step 1: Use the **complement shortcut**: $$P(S') = 1 - P(S)$$.\n- Step 2: Why safest: it automatically includes **every region** outside circle $$S$$ — the $$C$$-only region, the $$G$$-only region, the $$C \\cap G$$ only region, AND the outside-the-three-circles region. Computing $$P(S')$$ by adding Venn pieces individually risks forgetting one.\n\nThe \"$$47$$ vs $$105$$\" mistake came from adding only some not-$$S$$ pieces (missing $$q$$ outside the circles).", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "A Venn problem states: \"76 teenagers play Chess and Go.\" How do you estimate the total club size? (3 steps)", "answer": "- Step 1: \"Play Chess and Go\" = $$C \\cap G$$, including the triple-overlap. So $$P(C \\cap G) = P(C \\cap G \\text{ only}) + P(C \\cap S \\cap G)$$ — include both subregions.\n- Step 2: 76 is the observed count for this event. If $$P(C \\cap G) = q^*$$, then total $$\\approx 76 / q^*$$ (using probability as long-run proportion).\n- Step 3: This total can be non-integer (e.g. 262.07); only round at the **end** when reporting a head count.\n\nCommon slip: using only the triple-overlap, or only the \"pairwise-only\" region, for $$P(C \\cap G)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "What is the formula $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$, and what does it conceptually represent? (3 steps)", "answer": "- Step 1: $$S_{xy}$$ is the \"centred sum of products\" — $$\\sum (x_i - \\bar{x})(y_i - \\bar{y})$$ — but rewritten in terms of raw sums to avoid recomputing means for every data point.\n- Step 2: It measures **how $$x$$ and $$y$$ vary together**. Positive $$S_{xy}$$ → when $$x$$ is above its mean, $$y$$ tends to be above its mean (positive association).\n- Step 3: It's the numerator of both the correlation coefficient $$r = S_{xy}/\\sqrt{S_{xx}S_{yy}}$$ and the regression slope $$b = S_{xy}/S_{xx}$$.\n\nIt's in the formula booklet — but understand its meaning, not just its form.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "Why does the PMCC $$r$$ always lie in $$[-1, 1]$$, and what's a quick sanity check on your computation? (2 steps)", "answer": "- Step 1: By the Cauchy–Schwarz inequality, $$|S_{xy}|^2 \\le S_{xx} S_{yy}$$, so $$|r| = |S_{xy}|/\\sqrt{S_{xx}S_{yy}} \\le 1$$.\n- Step 2: Sanity check: after computing $$r$$, verify $$-1 \\le r \\le 1$$. If you get $$r = 1.3$$, you've either confused $$S_{xy}$$ with $$\\sum xy$$, forgotten the square root in the denominator, or used the wrong $$S$$ value.\n\nThe sign of $$r$$ should match the sign of $$S_{xy}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "What does the regression line \"$$y$$ on $$x$$\" minimise, and why does that give $$b = S_{xy}/S_{xx}$$? (3 steps)", "answer": "- Step 1: The line $$y = a + bx$$ is chosen to minimise the **sum of squared vertical residuals**: $$\\sum (y_i - a - bx_i)^2$$.\n- Step 2: Taking partial derivatives w.r.t. $$a$$ and $$b$$ and setting to zero gives the normal equations. Solving yields $$b = S_{xy}/S_{xx}$$ (slope) and $$a = \\bar{y} - b\\bar{x}$$ (intercept, forcing the line through $$(\\bar{x}, \\bar{y})$$).\n- Step 3: Note: \"$$y$$ on $$x$$\" treats $$x$$ as predictor and minimises **vertical** distances. \"$$x$$ on $$y$$\" would minimise **horizontal** distances and give a different line ($$S_{xy}/S_{yy}$$).\n\nUse the predictor variable as the denominator — easy to mix up.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": true}, {"question": "A regression line is $$g = -42.3 + 0.722d$$, where $$g$$ is girth (cm) and $$d$$ is length (cm). How do you interpret the gradient **in context**? (2 steps)", "answer": "- Step 1: The gradient 0.722 has units (cm of girth) per (cm of length). It says: for every 1 cm increase in a bear's length, the bear's girth increases by approximately 0.722 cm **on average**.\n- Step 2: Two interpretation features matter for marks:\n+ Use **variables in context** (\"girth of a bear\", \"length of a bear\") — not \"$$x$$\" and \"$$y$$\".\n+ Include \"on average\" — the line is a fit, not an exact relationship.\n\nAvoid \"slopes up\" — that's geometry, not interpretation.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "Why is using a regression line to predict $$y$$ at an $$x$$-value far outside the data range called \"unreliable\"? (2 steps)", "answer": "- Step 1: The regression line is fitted only on observed data, where we have evidence the linear relationship holds. Outside this range, we have **no evidence** the relationship continues — it could curve, plateau, or reverse.\n- Step 2: Even small fitting errors can compound dramatically over long extrapolation distances. The further from the observed range, the more uncertain the prediction.\n\nUse the words \"outside the observed range\" and \"extrapolation\" — vague answers like \"the data isn't accurate\" lose the mark.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "Using a regression line $$g = a + bd$$, if you want to know how much $$g$$ changes when $$d$$ changes by $$x$$, what equation do you use? (2 steps)", "answer": "- Step 1: For an **increment** $$\\Delta d = x$$, the corresponding change in $$g$$ is $$\\Delta g = b \\cdot x$$ — the intercept $$a$$ **cancels out** because both endpoints have it.\n- Step 2: So if you're told $$\\Delta g = 17.3$$ for some $$\\Delta d = x$$, solve $$b \\cdot x = 17.3 \\Rightarrow x = 17.3/b$$.\n\nCommon slip: setting $$a + bx = 17.3$$ (treating 17.3 as a $$g$$-value rather than an increment). Read carefully: \"for each $$x$$ cm increase\" = increment.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "What's the difference between the position rule for the median of grouped continuous data ($$N/2$$) versus discrete data ($$(N+1)/2$$)? (2 steps)", "answer": "- Step 1: Discrete data: each value is a specific point. The median is the middle observation. For $$N$$ odd, it's at position $$(N+1)/2$$; for $$N$$ even, average of $$N/2$$ and $$N/2 + 1$$.\n- Step 2: Grouped continuous data: values fill intervals. The median is defined as the point with 50% of probability mass below it — a position of $$N/2$$, regardless of parity. We use linear interpolation across the median class to find this point.\n\nUsing $$(N+1)/2$$ for grouped continuous data is a common error — it shifts the median slightly, especially for small $$N$$.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "In a \"show that\" question where the target answer is given, why is it still essential to show all working? (2 steps)", "answer": "- Step 1: \"Show that\" awards marks for the **derivation**, not the final number. The number is already in the question — writing it without working earns zero.\n- Step 2: Show every intermediate step:\n+ For variance: each $$x^2 \\cdot p$$ term explicitly listed, then summed, then $$- E(X)^2$$.\n+ For median: cumulative frequencies, position computed, formula substituted.\n+ For regression: $$S_{xy}, S_{xx}$$ values, $$b$$ computed, $$a$$ computed.\n\nMarkers want to see the method — even if your arithmetic differs slightly, method marks are recoverable.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "When should you round intermediate values in a multi-step calculation, and when should you carry full precision? (2 steps)", "answer": "- Step 1: Carry **full precision** (or at least many extra significant figures) through all intermediate steps. Rounding too early causes 3rd-significant-figure errors in the final answer.\n- Step 2: Round **only at the very end**, to the precision requested (typically 3 s.f. in S1). For example, when computing a regression intercept $$a = \\bar{y} - b\\bar{x}$$, use the unrounded $$b$$ (e.g. 0.72184) — not 0.722 — to get an accurate $$a$$.\n\nThis is especially critical for conditional probabilities involving table lookups and for regression coefficients.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "A spinner question gives $$P(2X - 3 > 5)$$. What's the first move, and what's the key inequality care? (2 steps)", "answer": "- Step 1: Solve the inequality for $$X$$ first: $$2X - 3 > 5 \\iff X > 4$$. This translates the event into a simple comparison with the table values.\n- Step 2: Sum point probabilities for $$X$$ values **strictly greater** than 4 (not $$\\ge$$). $$X = 4$$ is **excluded** because the inequality is strict.\n\nCommon slip: including $$X = 4$$ — gives 0.75 instead of 0.45. Always re-read for strict vs. non-strict inequality.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": false}, {"question": "A discrete random variable has $$P(X=x)$$ given in a table. What's $$E(X^2)$$, and what's the most common error? (2 steps)", "answer": "- Step 1: $$E(X^2) = \\sum x^2 \\cdot P(X=x)$$ — multiply the **square of each $$x$$** by its probability, then sum.\n- Step 2: Common error: squaring the probability instead of the $$x$$. The formula squares the **value**, not the weight. Probabilities are not squared anywhere in computing expectation or variance from a probability table.\n\nA second error: computing $$E(X)^2 = (\\sum x P(X=x))^2$$ and confusing it with $$E(X^2)$$ — these are different quantities related by $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Why does the variance formula $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$ work, derivationally? (3 steps)", "answer": "- Step 1: Start from the definition: $$\\operatorname{Var}(X) = E[(X - \\mu)^2]$$ where $$\\mu = E(X)$$.\n- Step 2: Expand the square: $$(X-\\mu)^2 = X^2 - 2\\mu X + \\mu^2$$.\n- Step 3: Take expectation (linear operator): $$E[X^2] - 2\\mu E[X] + \\mu^2 = E[X^2] - 2\\mu^2 + \\mu^2 = E[X^2] - \\mu^2$$.\n\nSo $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$. This form is computationally easier because it uses raw moments instead of centred deviations.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "Why does $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$? Derive it. (3 steps)", "answer": "- Step 1: Let $$Y = aX + b$$. Then $$E(Y) = aE(X) + b$$ (linearity of expectation).\n- Step 2: Compute deviations: $$Y - E(Y) = aX + b - aE(X) - b = a(X - E(X))$$. The constant $$b$$ vanishes from the deviation.\n- Step 3: Square and take expectation: $$E[(Y-E(Y))^2] = E[a^2(X-E(X))^2] = a^2 \\operatorname{Var}(X)$$.\n\nIntuition: scaling stretches the distribution by $$a$$, so spread (in squared units) scales by $$a^2$$. Shifting (the $$b$$) doesn't change spread at all.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "For a box plot with $$Q_1, Q_2, Q_3$$ and whiskers to non-outlier extremes, what does each piece visually communicate? (3 steps)", "answer": "- Step 1: The **box** ($$Q_1$$ to $$Q_3$$) shows the **middle 50%** of data — the \"interquartile range\" — i.e. the typical, central spread.\n- Step 2: The **median line** ($$Q_2$$) inside the box shows the centre of the data; its position relative to the box edges hints at skewness (closer to $$Q_1$$ → right skew; closer to $$Q_3$$ → left skew).\n- Step 3: The **whiskers** extend to the most extreme non-outlier values, showing the full range of \"typical\" data. **Outliers** appear as separate marks beyond, highlighting values that deviate from the bulk.\n\nBox plots compactly encode location, spread, and tail behaviour in one picture.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": false}, {"question": "A back-to-back stem-and-leaf compares two distributions. What's the practical advantage over two separate box plots? (2 steps)", "answer": "- Step 1: A back-to-back diagram preserves **every individual data point** — you can see exact values, recompute any statistic, and spot multimodal patterns.\n- Step 2: Two box plots compress data to 5 summary statistics, losing information about clusters, gaps, and individual values. Box plots are easier to compare *at a glance*; stem-and-leaf is richer but takes longer to interpret.\n\nBoth are useful — stem-and-leaf for forensic detail, box plots for headline comparisons.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "Why is $$P(C \\cup S \\cup G) + P((C \\cup S \\cup G)') = 1$$, and how is this used in Venn problems? (2 steps)", "answer": "- Step 1: An event and its complement partition the sample space. The complement $$(C \\cup S \\cup G)'$$ is the \"outside all three circles\" region, often labelled $$q$$ in Venn diagrams.\n- Step 2: This identity gives a master equation: sum of all 8 Venn region probabilities = 1. It's the standard way to solve for the unknown outside-region probability $$q$$ once all interior regions are known.\n\nThe outside region is easy to forget — but it's required for the sum to total 1.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "What's the difference between \"and\" (intersection) and \"or\" (union) in probability, and how does inclusion-exclusion link them? (2 steps)", "answer": "- Step 1: $$P(A \\cap B)$$ = both events happen; $$P(A \\cup B)$$ = at least one of the events happens.\n- Step 2: Inclusion-exclusion: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$. The $$-P(A\\cap B)$$ correction prevents double-counting the overlap. For three sets:\n$$P(A \\cup B \\cup C) = P(A) + P(B) + P(C) - P(A\\cap B) - P(A\\cap C) - P(B\\cap C) + P(A\\cap B\\cap C).$$\n\nThe triple-intersection term is added back because it was subtracted three times then subtracted again.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "When a problem says \"show that $$Q_3 + 1.5\\,\\text{IQR}$$ gives only one outlier\", how should you structure your written answer? (3 steps)", "answer": "- Step 1: Write the IQR as a separate line: $$\\text{IQR} = Q_3 - Q_1 = 18$$. Then $$1.5\\,\\text{IQR} = 27$$.\n- Step 2: Compute and **state both fences** as separate lines: lower fence $$= Q_1 - 1.5\\,\\text{IQR} = 12$$; upper fence $$= Q_3 + 1.5\\,\\text{IQR} = 84$$.\n- Step 3: Compare to data: smallest value 28 > 12 (so no low outliers); only one value (85) exceeds 84 (so one high outlier). State: \"Therefore there is exactly one outlier: 85 cm.\"\n\nMarker-friendly structure: definitions/formulas → fences → comparison → conclusion.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "A normal-distribution problem mentions both \"$$P(\\mu - 10 < T < \\mu + 10) = 0.95$$\" and asks about $$P(T > \\mu - 10)$$. Why is $$P(T > \\mu - 10) = 0.975$$ (not 0.95)? (3 steps)", "answer": "- Step 1: $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$ describes the **central** interval. The two outside tails together have probability $$1 - 0.95 = 0.05$$.\n- Step 2: By symmetry of the normal about $$\\mu$$, each tail has probability $$0.05/2 = 0.025$$. So $$P(T < \\mu - 10) = 0.025$$.\n- Step 3: Therefore $$P(T > \\mu - 10) = 1 - P(T \\le \\mu - 10) = 1 - 0.025 = 0.975$$ — i.e., the central interval plus the **upper** tail.\n\nCommon slip: writing $$P(T > \\mu - 10) = 0.95$$ — confusing \"the interval\" with \"the right of the left endpoint\".", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": true}, {"question": "Why does $$(a, b, c)$$-coding ($$y = (w - 20)/10$$) make hand-calculation of mean and variance easier? (2 steps)", "answer": "- Step 1: The transformation $$y = (w - 20)/10$$ shifts data toward 0 and shrinks it by a factor of 10. The transformed values are smaller, simpler integers/decimals, making $$\\sum y$$ and $$\\sum y^2$$ much faster to compute by hand or list.\n- Step 2: Once you have $$\\bar{y}$$ and $$\\operatorname{Var}(y)$$, recover the originals using linearity: $$\\bar{w} = 10\\bar{y} + 20$$ and $$\\operatorname{Var}(w) = 100\\operatorname{Var}(y)$$. No data point needs to be transformed individually.\n\nCoding is the manual-computation analogue of standardisation — same algebraic principle.", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": true}, {"question": "What's the conceptual purpose of frequency density on a histogram, vs raw frequency? (3 steps)", "answer": "- Step 1: With unequal class widths, drawing bar heights as raw frequency would make wide classes look disproportionately tall, even when they hold the same number of observations as narrow classes.\n- Step 2: Frequency density (FD = frequency / class width) corrects this by making **area** (width × height) proportional to frequency.\n- Step 3: This way, the total area under the histogram equals the total frequency, and visual comparison between bars accurately reflects relative frequencies — regardless of how wide each class is.\n\nFor equal class widths, FD and frequency look the same up to a scale factor; for unequal widths, FD is essential.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": true}, {"question": "Compute $$E(X^2)$$ for a simple spinner with $$X \\in \\{1, 2, 3\\}$$, each with probability 1/3, as a mental exercise. (2 steps)", "answer": "- Step 1: Square each $$x$$: 1, 4, 9. Weight each by 1/3: $$\\frac{1}{3}(1 + 4 + 9) = \\frac{14}{3}$$.\n- Step 2: So $$E(X^2) = 14/3 \\approx 4.67$$. For comparison, $$E(X) = 2$$, so $$[E(X)]^2 = 4$$, giving $$\\operatorname{Var}(X) = 14/3 - 4 = 2/3$$.\n\nThe point: square the $$x$$, not the probability, and don't confuse $$E(X^2)$$ with $$[E(X)]^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": false}, {"question": "A normal distribution has $$\\mu = 50$$, $$\\sigma = 10$$. Roughly what proportion of data falls within $$\\mu \\pm \\sigma$$, $$\\mu \\pm 2\\sigma$$, and $$\\mu \\pm 3\\sigma$$? (3 steps)", "answer": "- Step 1: $$\\mu \\pm \\sigma$$: about **68%** of data.\n- Step 2: $$\\mu \\pm 2\\sigma$$: about **95%** (more precisely, 1.96σ gives exactly 95%).\n- Step 3: $$\\mu \\pm 3\\sigma$$: about **99.7%**.\n\nThis is the \"empirical rule\". It's the source of the 1.96 in the 95% calculation — knowing it gives quick sanity checks and intuition for tail probabilities without table lookups.", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": false}, {"question": "Why is the gradient of a regression line \"$$y$$ on $$x$$\" different from the gradient of \"$$x$$ on $$y$$\"? (3 steps)", "answer": "- Step 1: \"$$y$$ on $$x$$\" minimises **vertical** residuals (errors in $$y$$ at given $$x$$). Its slope is $$b_{y|x} = S_{xy}/S_{xx}$$.\n- Step 2: \"$$x$$ on $$y$$\" minimises **horizontal** residuals (errors in $$x$$ at given $$y$$). Its slope (rewritten as $$y$$ vs $$x$$) is $$1/b_{x|y}$$ where $$b_{x|y} = S_{xy}/S_{yy}$$.\n- Step 3: These coincide only when $$r = \\pm 1$$ (perfect fit). Otherwise they differ: $$b_{y|x} \\cdot b_{x|y} = r^2 < 1$$.\n\nIn exam questions, always check which variable is the predictor — \"$$y$$ on $$x$$\" divides by $$S_{xx}$$ (the predictor's spread).", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": true}, {"question": "A 3-circle Venn diagram with all 8 regions has its probabilities summing to 1. If 7 region probabilities are given and one ($$q$$, the outside) is unknown, why is finding $$q$$ a 1-line problem? (2 steps)", "answer": "- Step 1: The regions are **mutually exclusive** (disjoint) and **exhaustive** (cover the sample space). So $$P(\\text{region}_1) + P(\\text{region}_2) + \\dots + P(\\text{region}_8) = 1$$.\n- Step 2: Substitute the 7 known values and solve: $$q = 1 - (\\text{sum of 7 known})$$. The structure of disjoint regions makes this addition reliable — no overlap corrections needed.\n\nThis contrasts with computing $$P(A \\cup B \\cup C)$$ from $$P(A), P(B), P(C)$$ alone, where inclusion-exclusion would be required.", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": true}, {"question": "Why is the formula $$\\sigma^2 = \\frac{\\sum x^2}{n} - \\bar{x}^2$$ **not** in the IAL formula booklet, and why is this notable? (2 steps)", "answer": "- Step 1: Edexcel's IAL formula booklet only provides $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$ (the discrete probability form). The raw-sum form for ungrouped data is omitted, even though it's the workhorse for $$\\sum x, \\sum x^2$$-style computations.\n- Step 2: It's notable because students must memorize this form independently — relying on the booklet during the exam leaves them unable to compute standard deviation from raw sums (e.g. Q3(d) of this paper). A common variant of the formula uses $$\\bar{x}$$ explicitly: $$\\sigma^2 = \\frac{\\sum x^2}{n} - \\bar{x}^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": true}, {"question": "\"Average\" and \"median\" sound similar in English, but in a 1-mark \"comment on the distribution\" question, why is precision important? (2 steps)", "answer": "- Step 1: \"Average\" is ambiguous — it could refer to the mean, median, or mode. A 1-mark comment requires a **specific** statistic.\n- Step 2: Box plots provide **medians**, not means (means aren't read directly from a box plot). So your comment should reference \"the median\" explicitly, with the numerical value: \"the median Birch growth (48 cm) is greater than the median Maple growth (45 cm)\".\n\nVague language costs marks. Use the precise statistical term.", "source": "Opus 4.7 ①", "_id": "opus_1_68", "judge_pick": false}, {"question": "What's the structural similarity between \"find the cutoff time for the fastest 60%\" (Q5b) and \"find the value of $$k$$ given the median\" (Q1a)? (2 steps)", "answer": "- Step 1: Both are **inverse** problems: you're given a probability (or position) and must recover a value. Q5b: $$P(X < t) = 0.60$$ — find $$t$$. Q1a: median = 45 — find $$k$$ such that the dataset's median equals 45.\n- Step 2: The approach in both: identify what equation the unknown must satisfy (using the definition of percentile/median), then solve algebraically. Q5b uses inverse normal tables; Q1a uses the structure of the stem-and-leaf and median position rule.\n\nPattern: forward = given parameters, find probability; inverse = given probability, find parameters.", "source": "Opus 4.7 ①", "_id": "opus_1_69", "judge_pick": false}, {"question": "When adding new data to preserve a quartile, why must you reason about **positions** in the sorted list rather than just values? (3 steps)", "answer": "- Step 1: A quartile is defined by its **position** in the sorted list (e.g. $$Q_1$$ at position 9 for $$N=35$$). Adding data changes the total count and shifts existing positions.\n- Step 2: A new value's effect depends on **where it inserts** in the sorted order — values below $$Q_1$$ push existing quartile-position values one slot later, etc.\n- Step 3: To preserve a quartile, you need to track:\n+ How many new values land below it (determines how positions shift).\n+ Whether the value at the new quartile position is still the same as the old one.\n\nReasoning by value alone misses the positional dependency.", "source": "Opus 4.7 ①", "_id": "opus_1_70", "judge_pick": true}, {"question": "In Q1(f), with new data $$27, a, 48, 2a$$ and $$N$$ changing from 32 to 36, why does the median constraint give the **smallest** restriction on $$a$$? (3 steps)", "answer": "- Step 1: For $$N=36$$, the new median is the average of the 18th and 19th values. The original 16th and 17th values are 43 and 47 (averaging to 45).\n- Step 2: Two of the four new values (27 and $$a$$, assuming $$a < 45$$) are below 45, so they push the original 16th-17th up to positions 18-19. The original median is preserved by construction.\n- Step 3: This works as long as **both** 27 and $$a$$ stay below the original 16th-17th values (43, 47), which requires only $$a \\le 43$$ — looser than the $$Q_1$$ constraint ($$a \\ge 36$$) and the max constraint ($$a \\le 40$$).\n\nThe binding constraints are on $$Q_1$$ and max — median is automatically satisfied within $$36 \\le a \\le 40$$.", "source": "Opus 4.7 ①", "_id": "opus_1_71", "judge_pick": true}, {"question": "Why might a \"fastest 60%\" question have an answer slightly above the mean even though \"60%\" is more than half? (2 steps)", "answer": "- Step 1: 60% > 50%, so the cutoff lies above the median (which for a normal equals the mean). The cutoff captures the slowest of the fast — slightly above the mean.\n- Step 2: For $$X \\sim N(15, 4)$$, the 60th percentile is at $$z = 0.2533$$, i.e. $$X = 15 + 0.2533 \\times 2 \\approx 15.5$$ — just above the mean of 15.\n\nSanity check: if your cutoff is **below** the mean for \"fastest $$p\\%$$\" with $$p > 50$$, you've flipped the tail.", "source": "Opus 4.7 ①", "_id": "opus_1_72", "judge_pick": false}, {"question": "In a Venn problem with independence of two events, why is the equation $$P(A \\cap B) = P(A) \\cdot P(B)$$ a constraint rather than a definition you can apply automatically? (2 steps)", "answer": "- Step 1: Independence is a **given assumption** about the events — not a property that's automatically true. The problem states \"C and S are independent\", which gives you the equation as a constraint that determines an unknown ($$p$$).\n- Step 2: Without the independence assumption, you can't multiply marginals to get the intersection. The equation acts as a relationship between $$P(C)$$, $$P(S)$$, $$P(C\\cap S)$$ that **must** hold — used to solve for missing region probabilities.\n\nAlways check the problem **states** independence before applying the multiplication rule.", "source": "Opus 4.7 ①", "_id": "opus_1_73", "judge_pick": true}, {"question": "What's the bigger lesson from the headline mistakes in this paper (Q5b tail direction, Q5c decimal slip, Q6e missing complement region)? (3 steps)", "answer": "- Step 1: All three are **translation errors** — converting English to mathematics — not arithmetic errors. The mechanics (look up table, divide) were known.\n- Step 2: \"Fastest\" → wrong tail; \"$$\\sigma$$ from 10/1.96\" → wrong decimal place; \"not Scrabble\" → wrong complement region. Each fails at the moment of mapping a word/concept into a precise mathematical statement.\n- Step 3: The drill is **slow down** at translation boundaries: sketch a diagram for tail questions; sanity-check $$\\sigma$$ against the interval scale; use $$P(A') = 1 - P(A)$$ as the safest complement shortcut.\n\nMechanics is reliable; translation is where marks are lost.", "source": "Opus 4.7 ①", "_id": "opus_1_74", "judge_pick": true}], "count": 75}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "On a back-to-back stem-and-leaf diagram, in which direction are the left-hand side leaves read, and why does this matter for transcribing values?", "answer": "The left-hand leaves are read **outwards from the stem (right-to-left)**. This is because the stem sits in the middle, and both sides build outward away from it. So for a row \"$$9\\ 8\\ |\\ 2\\ |\\ 5\\ 7\\ 7\\ 8\\ 9$$\" with key \"$$5|6|3$$ means 65 (left) and 63 (right)\", the left-side values in ascending order are $$28, 29$$ — not $$98, 89$$. Misreading this direction flips every value on the left and destroys all subsequent quartile, median, and outlier work.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "What does the symbol $$k$$ represent when it appears among the leaves of a stem-and-leaf diagram (e.g., in a row like $$1,1,1,k,7,8$$)?", "answer": "$$k$$ is a **single digit leaf**, not a count, not a sum, and not a frequency. It represents one observed value: in this case, the digit $$k$$ paired with the stem 4 gives the value $$40+k$$. The leaves are kept in ascending order, so $$k$$ must satisfy $$1 \\le k \\le 7$$ here (constrained by the neighbouring leaves).", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "For a dataset with even $$N$$ (e.g., $$N=32$$), how is the median located, and which positions does it average? (2 steps)", "answer": "- Step 1: For even $$N$$, the median is the mean of the $$\\frac{N}{2}$$-th and $$\\frac{N}{2}+1$$-th ordered values, i.e. $$\\text{Median} = \\tfrac{1}{2}\\left(x_{N/2} + x_{N/2+1}\\right)$$.\n- Step 2: For $$N=32$$, this is the average of the 16th and 17th values. Use cumulative frequencies of each stem row to locate which row those positions fall in, then read off the specific leaves.\n\nThe key insight: there is no single \"middle\" element when $$N$$ is even — you must average two adjacent ordered values.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "In Q1(a) the Maple stem-4 leaves are $$1,1,1,k,7,8$$ and the median is stated as 45 cm. Walk through how to set up and solve for $$k$$. (3 steps)", "answer": "- Step 1: Identify the median position. $$N=32$$ (even), so median averages positions 16 and 17. Cumulative frequencies show both fall in the stem-4 row.\n- Step 2: Identify the leaves at those positions. In the stem-4 row ordered $$1,1,1,k,7,8$$, position 16 = $$40+k$$ (the 4th leaf in the row) and position 17 = 47.\n- Step 3: Set the average equal to 45: $$\\frac{(40+k)+47}{2} = 45 \\Rightarrow 87+k = 90 \\Rightarrow k=3$$.\n\nSanity check: $$k=3$$ keeps the leaves in ascending order ($$1 \\le 3 \\le 7$$). ✓", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "State the Edexcel S1 rule for locating quartiles in **discrete** ungrouped data, distinguishing the two sub-cases. (2 steps)", "answer": "- Step 1: Compute $$n/4$$ for $$Q_1$$ (or $$3n/4$$ for $$Q_3$$).\n- Step 2: Apply one of two sub-rules:\n+ If $$n/4$$ is **not an integer**, round **up** to the next position. E.g. $$n=35 \\Rightarrow n/4 = 8.75 \\Rightarrow$$ take the 9th value.\n+ If $$n/4$$ **is an integer**, take the **average** of the $$(n/4)$$-th and $$(n/4+1)$$-th values. E.g. $$n=32 \\Rightarrow n/4 = 8 \\Rightarrow$$ average of 8th and 9th values.\n\nThis is **different** from the GCSE/M-stats rule $$(n+1)/4$$ — don't confuse them.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Why does the Edexcel rule split into \"round-up\" vs \"average\" depending on whether $$n/4$$ is an integer? What's the intuition?", "answer": "When $$n/4$$ is an integer, the data splits **exactly** into quarters, and the quartile sits at a \"boundary\" between two ordered values — averaging them is the natural symmetric choice. When $$n/4$$ is non-integer, no boundary aligns cleanly, so the rule rounds up to the next ordered value to ensure roughly 25% of data lies at or below $$Q_1$$. Both conventions aim to place $$Q_1$$ where the cumulative proportion is approximately 0.25.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "State the outlier definition used in this paper (not in formula booklet). When is an observation $$x$$ flagged as an outlier?", "answer": "$$x$$ is an outlier if $$x < Q_1 - 1.5(Q_3 - Q_1)$$ or $$x > Q_3 + 1.5(Q_3 - Q_1)$$. The quantities $$Q_1 - 1.5\\,\\text{IQR}$$ and $$Q_3 + 1.5\\,\\text{IQR}$$ are called the **lower and upper fences**. Always quote both fences explicitly even if outliers only exist on one side — markers award method marks for showing the structure.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Conceptually, why use $$1.5 \\times \\text{IQR}$$ as the multiplier for outlier fences rather than some other constant?", "answer": "The $$1.5$$ multiplier is a Tukey convention designed so that for a roughly normal distribution, only about $$0.7\\%$$ of data lies beyond the fences — flagging genuine extreme values while not falsely labelling typical points. A larger multiplier (e.g. 3) would be more conservative; a smaller one (e.g. 1) would over-flag. The exact value isn't derived from theory but balances sensitivity vs specificity.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "When drawing a box plot for data that contains outliers, where does the **whisker** end? Why?", "answer": "The whisker ends at the **most extreme non-outlier value**, not at the actual minimum/maximum. Outliers are plotted separately as crosses or asterisks beyond the whisker. The reason: a whisker represents the \"typical\" extent of the data, and including an outlier inside the whisker would visually misrepresent the spread of the bulk of the data.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "For Q1(d), the Birch dataset has $$Q_1=39$$, $$Q_3=57$$, with one outlier at 85. Conceptually walk through which values you need before drawing the box plot. (3 steps)", "answer": "- Step 1: Identify the five-number summary: Min (smallest non-outlier), $$Q_1$$, Median, $$Q_3$$, Max (largest non-outlier).\n- Step 2: Compute fences with IQR = 18: lower 12, upper 84. The value 85 exceeds 84 → outlier. The next highest value (76) becomes the upper whisker endpoint.\n- Step 3: Plot:\n+ Box from 39 to 57 with median line inside.\n+ Lower whisker from 28 to 39.\n+ Upper whisker from 57 to 76 (not to 85).\n+ Cross/asterisk at 85 for the outlier.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "When asked to \"comment on the difference in distributions\" for 1 mark, what must your answer contain?", "answer": "Two essentials: (i) a comparison of a **specific statistic** (e.g., median, IQR, range), and (ii) the **numerical values** of that statistic for both groups. For example: \"The median Birch growth (48 cm) is greater than the median Maple growth (45 cm), so on average Birch trees grow more.\" Vague statements like \"Birch are taller\" without numbers earn zero. Avoid the word \"average\" alone — say \"median\" or \"mean\".", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "In Q1(f), the box plot for Maple must remain unchanged when four new values $$27, a, 48, 2a$$ are added. How many constraints does \"no change to box plot\" impose, and what are they? (2 steps)", "answer": "- Step 1: A box plot is determined by exactly **five statistics**: Min, $$Q_1$$, Median, $$Q_3$$, Max. So \"no change\" pins down all five.\n- Step 2: Each statistic gives a constraint on the new dataset:\n+ Min must remain 25 → $$27 > 25$$ automatic ✓.\n+ Max must remain 80 → $$2a \\le 80 \\Rightarrow a \\le 40$$.\n+ $$Q_1$$ must remain 36 → forces $$a \\ge 36$$ (else $$a$$ displaces the 9th/10th values).\n+ Median must remain 45 → automatic within $$[36,40]$$.\n+ $$Q_3$$ must remain 54 → automatic.\n\nCombine the binding constraints: $$36 \\le a \\le 40$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "A common error on Q1(f) was concluding $$27 \\le a \\le 48$$. Why is this wrong, and what is the lesson?", "answer": "That range uses **only** the ordering constraint (since the four values are listed as $$27, a, 48, 2a$$ with $$a$$ between 27 and 48). It ignores: (i) $$2a \\le 80$$ from the Max constraint (tightens upper bound to 40), and (ii) the $$Q_1$$ constraint that the new 9th/10th values must still average to 36 (forces $$a \\ge 36$$). Lesson: **list all box-plot statistics as separate constraints** before solving — don't stop at the obvious ordering.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "For a discrete random variable $$X$$ with given probability table, how do you compute $$P(2X-3 > 5)$$?", "answer": "Rearrange the inequality first: $$2X - 3 > 5 \\Leftrightarrow X > 4$$. Then sum the probabilities for **all** values of $$X$$ strictly greater than 4. The strictness matters: $$X = 4$$ is **excluded**. So for the spinner with values $$\\{2,4,5,7,8\\}$$, you sum $$P(X=5) + P(X=7) + P(X=8)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "State $$\\operatorname{Var}(X)$$ in terms of $$E(X)$$ and $$E(X^2)$$, and explain how to compute $$E(X^2)$$ for a discrete RV.", "answer": "$$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$. To compute $$E(X^2)$$ for a discrete RV with values $$x_i$$ and probabilities $$p_i$$: $$E(X^2) = \\sum x_i^2 \\, p_i$$ — that is, square each **$$x$$ value** (not the probability), multiply by its probability, then sum. The common slip is squaring the probability instead of the $$x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "Why does subtracting $$[E(X)]^2$$ (rather than $$E(X)$$) yield the variance?", "answer": "Variance is defined as $$E[(X - \\mu)^2]$$ where $$\\mu = E(X)$$. Expanding: $$E[(X-\\mu)^2] = E[X^2 - 2\\mu X + \\mu^2] = E(X^2) - 2\\mu E(X) + \\mu^2 = E(X^2) - 2\\mu^2 + \\mu^2 = E(X^2) - \\mu^2$$. So the subtracted term is $$\\mu^2 = [E(X)]^2$$, not $$E(X)$$ itself. The variance is \"average of the squares minus the square of the average\".", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "For a linear transformation $$Y = aX + b$$, state how the mean and variance of $$Y$$ relate to those of $$X$$, and explain why.", "answer": "$$E(Y) = aE(X) + b$$ and $$\\operatorname{Var}(Y) = a^2 \\operatorname{Var}(X)$$. The mean shifts and scales linearly because expectation is linear: averaging respects both scaling and shifting. The variance scales by $$a^2$$ because variance is a squared-deviation measure — scaling $$X$$ by $$a$$ scales each deviation by $$a$$, hence squared deviations by $$a^2$$. The constant $$b$$ shifts every value identically, so deviations from the new mean are unchanged — $$b$$ drops out of variance entirely.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Given $$Y = aX - b$$ with $$E(Y) = 13.4$$ and $$\\operatorname{Var}(Y) = 66.24$$, and known $$E(X) = 4.6$$, $$\\operatorname{Var}(X) = 4.14$$, what is the **strategic order** to find $$a$$ then $$b$$, and why? (3 steps)", "answer": "- Step 1: Use the variance equation **first**. $$\\operatorname{Var}(Y) = a^2 \\operatorname{Var}(X)$$ contains only $$a$$ (the constant $$b$$ has dropped out), so it isolates $$a$$ cleanly: $$a^2 = 66.24/4.14 = 16 \\Rightarrow a = 4$$ (positive root, as stated).\n- Step 2: Substitute $$a$$ into the mean equation: $$E(Y) = aE(X) - b \\Rightarrow 13.4 = 4(4.6) - b = 18.4 - b$$.\n- Step 3: Solve: $$b = 5$$.\n\nStrategy: variance eliminates the additive constant, so it gives the multiplicative constant first — then mean cleans up the additive one.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "When solving $$a^2 = 16$$ for the constant in a linear transform $$Y = aX - b$$, why pick $$a = 4$$ over $$a = -4$$?", "answer": "The question typically specifies that $$a$$ and $$b$$ are **positive constants** (read carefully). Even without that specification, a negative $$a$$ would reverse the ordering of values, which often contradicts the context (e.g., scores, lengths). Always check the sign convention stated and pick the matching root.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "In Q2(d), Sam's score $$S = X_1$$ and Alex's score $$R = 2X_2 - 3$$. Why are $$S$$ and $$R$$ independent, and what does this imply for computing $$P(S > R)$$? (2 steps)", "answer": "- Step 1: $$X_1$$ and $$X_2$$ come from **two separate spins** of the spinner, so they are independent random variables. $$R$$ is a function of $$X_2$$ only, so $$R$$ and $$S$$ remain independent.\n- Step 2: Independence allows $$P(S = s, R = r) = P(S=s) \\cdot P(R=r)$$. So $$P(S > R) = \\sum_s P(S = s) \\cdot P(R < s)$$ — condition on each value of $$S$$ and multiply by the probability that $$R$$ is strictly below it.\n\nKey trap: a different setup (like Y = aX - b from part c) would tie the two scores to the **same** $$X$$, making them dependent.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "When computing $$P(\\text{Sam wins})$$ in a \"higher score wins, ties = draw\" game, should the comparison use $$>$$ or $$\\ge$$? Why?", "answer": "Use **strict** $$>$$. The phrase \"ties are a draw, not a win\" means $$P(\\text{Sam wins})$$ counts only outcomes where $$S > R$$ strictly. Using $$\\ge$$ would incorrectly include ties. Sanity check: $$P(\\text{Sam wins}) + P(\\text{Alex wins}) + P(\\text{draw}) = 1$$.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "In a histogram, what quantity is proportional to **area** of each bar, and how is the height (frequency density) defined?", "answer": "**Area** of each bar is proportional to the **frequency** of that class. This is essential because class widths may differ — using height alone would distort comparisons. Frequency density is defined as $$\\text{FD} = \\frac{\\text{frequency}}{\\text{class width}}$$. So bar height represents FD, bar width represents class width, and bar area (= height × width) recovers the frequency.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Q3(a) gives a reference bar (class $$32 \\le x < 36$$) that is 2.5 cm wide and 7.5 cm tall, with frequency 20. How do you derive the two scale constants needed for the histogram? (3 steps)", "answer": "- Step 1: Compute the reference frequency density: class width = 4 mm, frequency = 20, so $$\\text{FD} = 20/4 = 5$$.\n- Step 2: Width scale: 2.5 cm on the page corresponds to 4 mm of class width, so $$\\text{cm per mm} = 2.5/4 = 0.625$$.\n- Step 3: Height scale: 7.5 cm on the page corresponds to FD = 5, so $$\\text{cm per FD unit} = 7.5/5 = 1.5$$.\n\nNow any other bar: convert its class width to cm using the first scale, and its FD to cm using the second scale.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "A common error on Q3(a) was multiplying the new class width (2 mm) by the reference bar width (2.5 cm) directly to get 5 cm. Why is this wrong?", "answer": "This treats the reference bar width as if it scaled linearly with class width without going through frequency density. But the correct procedure is to derive a **per-unit** scale constant (cm per mm of class width), then apply it. Multiplying widths directly mixes units (cm × mm) and lacks dimensional sense. The correct width is $$2 \\times 0.625 = 1.25$$ cm.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "State the linear interpolation formula for the median of grouped continuous data, defining each symbol.", "answer": "$$\\text{Median} = L + \\frac{N/2 - F_b}{f_m} \\times c$$ where:\n- $$L$$ = lower class boundary of the median class\n- $$N$$ = total frequency\n- $$F_b$$ = cumulative frequency **before** the median class\n- $$f_m$$ = frequency of the median class\n- $$c$$ = width of the median class\n\nConceptually: locate the median **class** via cumulative frequency, then interpolate linearly within that class assuming uniform spread.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "Why do we use $$N/2$$ (not $$(N+1)/2$$) for the median position in **grouped continuous** data?", "answer": "For continuous data treated as a smooth distribution, the median is the value below which 50% of the area lies, so the position is at the proportion $$N/2$$ along the cumulative frequency. The $$(N+1)/2$$ rule applies to **discrete** ungrouped data where each value occupies a distinct position. Conflating the two leads to slightly wrong interpolations.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "When the coding rule is $$10y = w - 20$$, express $$w$$ in terms of $$y$$, and explain how $$\\bar{w}$$ relates to $$\\bar{y}$$.", "answer": "Rearranging: $$w = 10y + 20$$. Since this is a linear transform, $$\\bar{w} = 10\\bar{y} + 20$$ — the linear transform passes through the mean. Compute $$\\bar{y} = \\sum y / n$$ first, then apply the transform to the **mean of y** (not to each $$y_i$$ individually). E.g., $$\\bar{y} = 104/50 = 2.08 \\Rightarrow \\bar{w} = 10(2.08) + 20 = 40.8$$.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "Why does coding (linear scaling/shifting of data) make summary statistics easier to compute, and which statistics are affected by the **shift** vs the **scale**?", "answer": "Coding replaces awkward raw values with simpler small numbers, reducing arithmetic errors when computing $$\\sum y$$ and $$\\sum y^2$$.\n- The **mean** is affected by both shift and scale: $$\\bar{w} = a\\bar{y} + b$$.\n- The **variance** and **standard deviation** are affected by scale only, not shift: $$\\operatorname{Var}(w) = a^2 \\operatorname{Var}(y)$$, $$\\sigma_w = |a|\\sigma_y$$. The shift $$+b$$ moves all data identically, so spreads about the mean are unchanged.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "State the raw-data formula for sample variance from $$\\sum x$$, $$\\sum x^2$$, and $$n$$. Is this in the IAL formula booklet?", "answer": "$$\\sigma^2 = \\frac{\\sum x^2}{n} - \\bar{x}^2 = \\frac{\\sum x^2}{n} - \\left(\\frac{\\sum x}{n}\\right)^2$$. This form is **not** in the IAL formula booklet — it must be memorised. The booklet has the equivalent $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$ for probability distributions, but the raw-data version with $$n$$ in the denominator is a separate formula.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Given coded data with $$\\sum y = 104$$, $$\\sum y^2 = 233.54$$, $$n = 50$$, and coding $$w = 10y + 20$$, walk through computing $$\\sigma_w$$. (4 steps)", "answer": "- Step 1: Compute $$S_{yy} = \\sum y^2 - (\\sum y)^2/n = 233.54 - 104^2/50 = 233.54 - 216.32 = 17.22$$.\n- Step 2: Compute variance of $$y$$: $$\\operatorname{Var}(y) = S_{yy}/n = 17.22/50 = 0.3444$$.\n- Step 3: Scale to variance of $$w$$: $$\\operatorname{Var}(w) = 10^2 \\times 0.3444 = 34.44$$ (constant $$+20$$ drops out).\n- Step 4: $$\\sigma_w = \\sqrt{34.44} \\approx 5.87$$ grams (3 s.f.).\n\nOrder matters: square root **last**, after applying $$a^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": false}, {"question": "If a new value equal to the **current mean** is added to a dataset, what happens to (i) the mean, (ii) the standard deviation, and why?", "answer": "(i) **Mean: unchanged.** The new value $$\\bar{x}$$ contributes $$\\bar{x}$$ to the numerator and 1 to the denominator, so new mean = $$\\frac{n\\bar{x} + \\bar{x}}{n+1} = \\bar{x}$$.\n(ii) **Standard deviation: decreases.** The new value contributes $$(x - \\bar{x})^2 = 0$$ to the sum of squared deviations (numerator stays the same), but the denominator $$n$$ grows to $$n+1$$. So variance, and hence SD, decreases. Conceptually: adding an \"average\" point dilutes the spread.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "State the formulas for $$S_{xy}$$ and $$S_{xx}$$ used in regression and PMCC calculations.", "answer": "$$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$ and $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$ (and analogous $$S_{yy}$$). These are \"corrected sums of products / squares\" — they remove the contribution of the means, leaving the variation about the mean. Both formulas **are** in the IAL formula booklet.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "State the PMCC formula and its possible range. What does the sign and magnitude tell you?", "answer": "$$r = \\frac{S_{xy}}{\\sqrt{S_{xx}\\,S_{yy}}}$$, with $$-1 \\le r \\le 1$$.\n- Sign: positive $$r$$ means $$x$$ and $$y$$ tend to increase together; negative means they move oppositely.\n- Magnitude: $$|r|$$ close to 1 indicates a strong linear relationship; close to 0 indicates weak/no linear relationship. Values outside $$[-1,1]$$ signal arithmetic error.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "For the regression line of $$y$$ on $$x$$ (written $$y = a + bx$$), state the formulas for the gradient $$b$$ and intercept $$a$$. How do you avoid the \"$$g$$ on $$d$$\" vs \"$$d$$ on $$g$$\" trap?", "answer": "Gradient: $$b = \\frac{S_{xy}}{S_{xx}}$$. Intercept: $$a = \\bar{y} - b\\bar{x}$$. The mnemonic is \"**$$y$$ on $$x$$** → divide $$S_{xy}$$ by $$S_{xx}$$\" (the explanatory variable goes in the denominator). For \"regression of $$g$$ on $$d$$\": $$b = S_{dg}/S_{dd}$$, treating $$d$$ as explanatory. Dividing by $$S_{gg}$$ would be regression of $$d$$ on $$g$$ — a different line.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Why must we use the **unrounded** gradient $$b$$ when computing the intercept $$a = \\bar{y} - b\\bar{x}$$?", "answer": "Because $$a$$ depends on the product $$b\\bar{x}$$, and $$\\bar{x}$$ is typically a large number. A small rounding error in $$b$$ (e.g., 0.722 vs 0.72184) gets amplified by $$\\bar{x}$$ in the multiplication, shifting $$a$$ at the 3rd significant figure. Rule: **round only at the final answer**, carry full precision through intermediate steps.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "How do you interpret the gradient of a regression line in context (e.g., $$g = -42.3 + 0.722d$$ where $$g$$ is bear girth in cm and $$d$$ is bear length in cm)?", "answer": "\"For every 1 cm increase in the length of a bear, the girth increases by approximately 0.722 cm on average.\" Two essentials: (i) state a **specific unit increment** (1 cm), and (ii) use the **context names** (length/girth of a bear) with units, not just \"$$x$$\" and \"$$y$$\". Avoid vague phrases like \"the line slopes up\".", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Why is using a regression equation to predict a $$y$$-value for an $$x$$ far outside the observed range (extrapolation) unreliable?", "answer": "The regression line was fitted only on the data range observed; outside that range, the linear relationship may not hold — the underlying mechanism might be non-linear, saturate, or change entirely. E.g., a bear length of 50 cm is far below the data range (mean ~182 cm); predicting girth there assumes the linear pattern continues, but young or cub bears might have a very different length–girth relationship. The phrase to use: \"**outside the observed range of data**\".", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Using the regression line $$g = -42.3 + 0.722d$$, if the question asks \"for each $$x$$ cm increase in length, girth increases by 17.3 cm — find $$x$$\", do you use the full equation or just the gradient? Why?", "answer": "Use **only the gradient**. The intercept controls the absolute value of $$g$$ at $$d=0$$, but for an **increment** (a change in $$g$$ from a change in $$d$$), only the gradient matters: $$\\Delta g = b \\cdot \\Delta x$$. So $$0.722 \\cdot x = 17.3 \\Rightarrow x \\approx 24.0$$. Setting up \"$$-42.3 + 0.722x = 17.3$$\" wrongly treats 17.3 as an absolute girth value, not an increment.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": false}, {"question": "For a normal distribution $$X \\sim N(\\mu, \\sigma^2)$$, state the standardisation transform and explain its purpose.", "answer": "$$Z = \\frac{X - \\mu}{\\sigma}$$, where $$Z \\sim N(0, 1)$$ is the standard normal. Purpose: any normal probability $$P(X < x)$$ becomes $$P(Z < (x-\\mu)/\\sigma)$$, which can be looked up in standard normal tables. The transform centres the distribution at 0 (subtracting $$\\mu$$) and rescales to unit standard deviation (dividing by $$\\sigma$$).", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "Why divide by $$\\sigma$$ (not $$\\sigma^2$$) when standardising?", "answer": "Because $$X - \\mu$$ has units of $$X$$ and standard deviation $$\\sigma$$. Dividing by $$\\sigma$$ gives a dimensionless quantity with SD = 1, which is what the standard normal table expects. Dividing by $$\\sigma^2$$ would over-shrink the variable, giving a quantity with SD $$= 1/\\sigma$$ — not standard normal. Sanity check: $$Z$$ should be order-1, not order-$$1/\\sigma$$.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "The phrase \"the fastest 60% of adults\" in a time-based normal problem corresponds to which tail of the distribution, and what probability equation should you set up?", "answer": "\"Fastest\" = shortest time = **lower tail (left)**. So if $$t$$ is the cutoff time for advancing, $$P(X < t) = 0.60$$. This is the single critical translation: fast → small times → left tail. Setting up $$P(X < t) = 0.40$$ (treating \"fastest 60%\" as upper tail) gives the wrong cutoff — a frequent and costly slip.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "\"Fastest\" vs \"slowest\" vs \"top $$p\\%$$\" vs \"bottom $$p\\%$$\" in a normal problem — how do you map each to the correct tail?", "answer": "Sketch the curve and shade:\n- \"Fastest $$p\\%$$\" (shortest times) → **lower** tail, $$P(X < t) = p/100$$.\n- \"Slowest $$p\\%$$\" (longest times) → **upper** tail, $$P(X > t) = p/100$$.\n- \"Top $$p\\%$$ scores\" (high values) → **upper** tail.\n- \"Bottom $$p\\%$$\" → **lower** tail.\n\nThe trap: \"fastest\" sounds like \"top performers\" which feels like upper tail — but the underlying variable is time, not performance score. Always identify what the random variable measures.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "Given $$X \\sim N(15, 4)$$ and $$P(X < t) = 0.60$$, walk through finding $$t$$. (3 steps)", "answer": "- Step 1: Use the inverse standard normal: $$\\Phi^{-1}(0.60) = 0.2533$$ (from tables).\n- Step 2: Apply standardisation: $$\\frac{t - 15}{2} = 0.2533$$.\n- Step 3: Solve: $$t = 15 + 2(0.2533) = 15.5$$ minutes (3 s.f.).\n\nNote the sign of $$z$$: positive 0.2533 because $$0.60 > 0.5$$, putting $$t$$ above the mean. If we had $$P(X<t) = 0.40$$, we'd use $$z = -0.2533$$.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "For $$T \\sim N(\\mu, \\sigma^2)$$ with $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$, how do you extract $$\\sigma$$? (3 steps)", "answer": "- Step 1: By symmetry of the normal, the tail probabilities are equal: $$P(T < \\mu - 10) = P(T > \\mu + 10) = (1 - 0.95)/2 = 0.025$$.\n- Step 2: Standardise the lower bound: $$\\frac{(\\mu - 10) - \\mu}{\\sigma} = \\Phi^{-1}(0.025) = -1.96$$.\n- Step 3: Solve: $$\\sigma = 10/1.96 \\approx 5.10$$.\n\nSanity check: $$\\sigma$$ should be the same order of magnitude as the half-interval (10), so $$\\sigma \\approx 5$$ is sensible. $$\\sigma = 0.51$$ would be a decimal slip (factor of 10 off).", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "Why is the sanity check \"$$\\sigma$$ should be same order of magnitude as the interval half-width\" useful, and what slip does it catch?", "answer": "It catches **decimal placement errors**. For $$\\sigma = 10/1.96$$, the correct answer is ~5.10, but a misplaced decimal gives 0.510 — a factor of 10 too small. This makes $$z$$-values for subsequent calculations enormous (e.g., $$z = 5/0.51 \\approx 9.8$$, way off table) and produces absurd probabilities. A quick mental check: \"interval $$\\pm 10$$, so SD is around 5\" prevents the catastrophic propagation of the error.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "State the definition of conditional probability $$P(A \\mid B)$$, and the subset trick for when $$A \\subset B$$.", "answer": "$$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. **Subset trick:** If $$A \\subset B$$ (every outcome in $$A$$ is also in $$B$$), then $$A \\cap B = A$$, so $$P(A \\mid B) = P(A)/P(B)$$. This simplifies computation dramatically — no need to compute an intersection separately.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "In Q5(c), why is $$\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$$? Use this to simplify $$P(T > \\mu - 5 \\mid T > \\mu - 10)$$. (2 steps)", "answer": "- Step 1: $$\\mu - 5 > \\mu - 10$$, so any $$T$$ exceeding $$\\mu - 5$$ automatically exceeds $$\\mu - 10$$. Hence the event \"$$T > \\mu - 5$$\" is a **subset** of \"$$T > \\mu - 10$$\".\n- Step 2: By the subset trick, $$\\{T > \\mu - 5\\} \\cap \\{T > \\mu - 10\\} = \\{T > \\mu - 5\\}$$. So $$P(T > \\mu - 5 \\mid T > \\mu - 10) = \\frac{P(T > \\mu - 5)}{P(T > \\mu - 10)}$$.\n\nThe denominator is $$1 - 0.025 = 0.975$$ (not 0.95 — that was the symmetric interval probability), and the numerator uses $$z = -5/\\sigma \\approx -0.98$$ to look up $$\\Phi(0.98) = 0.8365$$.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "Conceptually, what does $$P(A \\mid B)$$ mean in plain English, and how is it different from $$P(A \\cap B)$$?", "answer": "$$P(A \\mid B)$$ is \"the probability of $$A$$ **given that** $$B$$ has occurred\" — it restricts attention to the subset of the sample space where $$B$$ is true, and asks what fraction of that subset also has $$A$$. $$P(A \\cap B)$$ is \"the probability that **both** $$A$$ and $$B$$ occur\" — measured against the **entire** sample space. The two are linked by $$P(A \\mid B) = P(A \\cap B)/P(B)$$: dividing by $$P(B)$$ renormalises to the smaller subset.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "
