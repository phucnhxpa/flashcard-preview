judge_pick": false}, {"question": "For two events $$A$$ and $$B$$, state the condition for **independence**, and explain how it differs from being **mutually exclusive**.", "answer": "**Independent:** $$P(A \\cap B) = P(A)P(B)$$. Knowing one event has occurred gives no information about the other. **Mutually exclusive:** $$P(A \\cap B) = 0$$. The two events cannot occur together. These are **opposite** in flavour: mutually exclusive events are highly dependent (if $$A$$ occurs, $$B$$ definitely did not), whereas independent events with nonzero probabilities cannot be mutually exclusive.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "In a Venn diagram with three sets $$C, S, G$$, when computing $$P(C \\cap S)$$, which regions of the diagram contribute? Why is this a common error source?", "answer": "$$P(C \\cap S)$$ includes **all** outcomes in both $$C$$ and $$S$$ — this means **both** the \"$$C \\cap S$$ only\" region (in $$C$$ and $$S$$ but **not** $$G$$) **and** the triple-overlap \"$$C \\cap S \\cap G$$\". So if \"$$C \\cap S$$ only\" = 0.12 and \"$$C \\cap S \\cap G$$\" = 0.15, then $$P(C \\cap S) = 0.27$$. The common slip is using only the labelled \"$$C \\cap S$$ only\" piece (0.12), forgetting the triple-overlap is also inside $$C \\cap S$$.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}, {"question": "In Q6(b), $$C$$ and $$S$$ are stated to be independent. Walk through finding the unknown probability $$p = P(C \\cap G \\text{ only})$$. (4 steps)", "answer": "- Step 1: Express $$P(C)$$ in terms of $$p$$ by summing all four regions of $$C$$: $$P(C) = 0.04 + p + 0.15 + 0.12 = 0.31 + p$$.\n- Step 2: Compute $$P(S)$$ by summing all four regions of $$S$$: $$P(S) = 0.12 + 0.15 + 0.10 + 0.23 = 0.60$$.\n- Step 3: Compute $$P(C \\cap S)$$ by summing both intersection subregions: $$P(C \\cap S) = 0.12 + 0.15 = 0.27$$.\n- Step 4: Apply independence $$P(C \\cap S) = P(C)P(S)$$: $$0.27 = (0.31 + p)(0.60) \\Rightarrow 0.31 + p = 0.45 \\Rightarrow p = 0.14$$.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "After finding $$p$$ in a Venn problem, how do you find $$q$$ = the probability outside all three sets?", "answer": "All probabilities (the eight regions of a three-set Venn diagram) must sum to 1. Sum all known regions and the unknowns $$p, q$$, then solve. E.g., $$0.04 + 0 + p + 0.15 + 0.12 + 0.10 + 0.23 + q = 1 \\Rightarrow p + q = 0.36 \\Rightarrow q = 0.36 - 0.14 = 0.22$$. Don't forget the \"outside\" region — even when zero is in one region, it must still be included in the sum.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "In a three-set Venn diagram, how do you compute $$P((C \\cup S) \\cap G')$$? Describe the relevant regions.", "answer": "$$(C \\cup S) \\cap G'$$ is \"in $$C$$ or $$S$$ (or both), **but not** in $$G$$\". The contributing regions are:\n- $$C$$ only (not $$S$$, not $$G$$)\n- $$S$$ only (not $$C$$, not $$G$$)\n- $$C \\cap S$$ only (in both $$C$$ and $$S$$, not in $$G$$)\n\nSum these three. **Exclude** any region inside $$G$$ (i.e., the triple-overlap, $$C \\cap G$$ only, $$S \\cap G$$ only, $$G$$ only).", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "In Q6(d)(ii), find $$P(C \\mid S \\cap G)$$. Walk through the computation, paying attention to which regions appear in numerator vs denominator. (3 steps)", "answer": "- Step 1: Apply the conditional formula: $$P(C \\mid S \\cap G) = \\frac{P(C \\cap S \\cap G)}{P(S \\cap G)}$$.\n- Step 2: Numerator = the triple-overlap region only = 0.15.\n- Step 3: Denominator $$P(S \\cap G)$$ = sum of **both** subregions inside the $$S \\cap G$$ overlap: \"$$S \\cap G$$ only\" (0.10) plus \"$$C \\cap S \\cap G$$\" (0.15) = 0.25. So $$P(C \\mid S \\cap G) = 0.15/0.25 = 0.6$$.\n\nKey lesson: $$P(S \\cap G)$$ in the denominator must include the triple-overlap, just like $$P(C \\cap S)$$ did.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": false}, {"question": "Q6(e) asks: given 76 teenagers play Chess and Go, estimate how many do not play Scrabble. Walk through the structure of the answer. (4 steps)", "answer": "- Step 1: Compute $$P(C \\cap G)$$ from the Venn diagram. This includes **both** \"$$C \\cap G$$ only\" ($$p = 0.14$$) and the triple-overlap (0.15). So $$P(C \\cap G) = 0.29$$.\n- Step 2: Estimate total club size: $$76 / 0.29 \\approx 262$$ teenagers.\n- Step 3: Compute $$P(S')$$ using the shortcut $$1 - P(S) = 1 - 0.60 = 0.40$$.\n- Step 4: Number not playing Scrabble $$\\approx 262 \\times 0.40 \\approx 105$$.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": false}, {"question": "Why is the shortcut $$P(S') = 1 - P(S)$$ much safer than summing the not-Scrabble regions individually?", "answer": "Summing manually risks **forgetting regions** that aren't visually prominent — especially the \"outside all three sets\" region $$q$$ and any \"single-set only with frequency 0\" regions ($$G$$ only = 0 here). The Q6(e) mistake (47 instead of 105) came from summing only the Chess-side not-Scrabble pieces ($$0.04 + 0.14 = 0.18$$), missing $$q = 0.22$$ and the $$G$$-only sliver. The complement shortcut $$1 - P(S)$$ guarantees inclusion of every region outside $$S$$.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "When estimating total population size from \"76 teenagers play Chess and Go\", which probability do you divide by, and what assumption are you making?", "answer": "Divide by $$P(C \\cap G)$$, the probability that a randomly chosen teenager plays both. The assumption: the youth club is a **representative large sample** of the population the Venn diagram describes, so observed counts $$\\approx$$ population × probability. So total $$\\approx \\frac{\\text{count}}{P(C \\cap G)} = 76/0.29 \\approx 262$$. The phrase \"consists of a large number of teenagers\" in the question signals this large-sample interpretation.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": true}, {"question": "A teenager population estimate gives 262.07 from $$76/0.29$$. Should you round before or after computing \"number not playing Scrabble\"? Why?", "answer": "Carry the unrounded 262.07 through, then round at the **final** answer. So $$262.07 \\times 0.40 = 104.83 \\approx 105$$. Rounding 262.07 to 262 first gives $$262 \\times 0.4 = 104.8 \\approx 105$$ — same answer here, but in general rounding intermediate quantities can shift the final answer. Always carry full precision until the final rounding.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "A \"show that\" question gives the answer (e.g., \"show $$\\operatorname{Var}(X) = 4.14$$\"). What should your written solution include to earn full marks?", "answer": "Even though the target is given, marks are awarded for the **method**, not just the final number. Show:\n- All intermediate steps (e.g., each $$x^2 \\cdot p$$ term in computing $$E(X^2)$$).\n- The formula being used, written symbolically before substituting.\n- Final algebra that lands cleanly on the stated target.\n\nA \"show that\" with just the answer scribbled gets zero. Treat it as a fully justified derivation.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": false}, {"question": "Across the May 2024 paper, the dominant error pattern is described as \"translation slips at the English-to-probability boundary\". Name three examples and the translation that fixes each.", "answer": "+ **\"Fastest 60%\"** (Q5b): English \"fastest\" → maths \"lower tail\", so $$P(X<t) = 0.60$$ — not 0.40.\n+ **\"No change to box plot\"** (Q1f): English vague phrase → maths five separate constraints (Min, $$Q_1$$, Median, $$Q_3$$, Max stay fixed). Each gives an inequality on the new data.\n+ **\"Does not play Scrabble\"** (Q6e): English \"not Scrabble\" → maths complement $$S'$$, which includes the **outside-all-three-circles** region. Use the shortcut $$P(S') = 1 - P(S)$$.\n\nGeneral fix: slow down on key words, sketch a diagram, list constraints **before** computing.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": true}, {"question": "Quick mental example: a discrete RV $$X$$ takes values $$1, 2, 3$$ with probabilities $$0.5, 0.3, 0.2$$. What is $$E(X)$$ and $$E(X^2)$$?", "answer": "$$E(X) = 1(0.5) + 2(0.3) + 3(0.2) = 0.5 + 0.6 + 0.6 = 1.7$$. $$E(X^2) = 1^2(0.5) + 2^2(0.3) + 3^2(0.2) = 0.5 + 1.2 + 1.8 = 3.5$$. Then $$\\operatorname{Var}(X) = 3.5 - 1.7^2 = 3.5 - 2.89 = 0.61$$. Notice $$E(X^2) \\ne [E(X)]^2$$ in general (here $$3.5 \\ne 2.89$$) — that's exactly why variance is non-negative.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": false}, {"question": "Quick mental example: if $$X$$ has $$E(X) = 5, \\operatorname{Var}(X) = 3$$, and $$Y = 2X + 7$$, find $$E(Y)$$ and $$\\operatorname{Var}(Y)$$.", "answer": "$$E(Y) = 2(5) + 7 = 17$$. $$\\operatorname{Var}(Y) = 2^2 \\cdot 3 = 12$$. The \"+7\" shifts the mean by 7 but leaves the variance unchanged; the \"×2\" doubles the mean and **quadruples** the variance.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": false}, {"question": "Quick mental example: for $$X \\sim N(50, 25)$$, find $$P(X > 60)$$ without computing the full table value, just the standardised $$z$$ and direction.", "answer": "$$\\sigma = \\sqrt{25} = 5$$. Standardise: $$z = (60 - 50)/5 = 2$$. So $$P(X > 60) = P(Z > 2)$$, which is the upper tail beyond $$z = 2$$ — a small probability, around 2.3% (standard table gives 0.0228). The point: convert to $$z$$, identify the tail, then look up.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": false}, {"question": "Sanity check: a regression line $$y = -42.3 + 0.722x$$ is given. The data range for $$x$$ is roughly 150–220 cm. Why is predicting $$y$$ at $$x = 50$$ unreliable but $$x = 250$$ borderline acceptable?", "answer": "$$x = 50$$ is **far below** the observed range (150–220), so the linear relationship has not been tested there — extrapolation can fail badly if the true relationship is non-linear at small $$x$$. $$x = 250$$ is only slightly above the upper end of the observed range, so the linear pattern may still approximately hold (modest extrapolation). The rule: **inside data range = interpolation = reliable; far outside = extrapolation = unreliable**.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": false}, {"question": "Two events $$A$$ and $$B$$ both have probability 0.5 and are independent. Compute $$P(A \\cup B)$$.", "answer": "Use $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$. By independence, $$P(A \\cap B) = P(A)P(B) = 0.25$$. So $$P(A \\cup B) = 0.5 + 0.5 - 0.25 = 0.75$$. Sanity check: it should be larger than each individual probability and at most 1.", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": false}], "count": 65}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 17434, "out_tokens": 16228, "reasoning_chars": 27212, "cost_eur": 0.0691, "elapsed_s": 232, "content_chars": 26516}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 17434, "out_tokens": 14192, "reasoning_chars": 8207, "cost_eur": 0.0625, "elapsed_s": 271, "content_chars": 37480}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 17434, "out_tokens": 20519, "reasoning_chars": 37625, "cost_eur": 0.0829, "elapsed_s": 389, "content_chars": 30080}, "kimi_1": {"run": 1, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.7, "in_tokens": 17067, "out_tokens": 27431, "reasoning_chars": 51987, "cost_eur": 0.1292, "elapsed_s": 1461, "content_chars": 43036}, "kimi_2": {"run": 2, "provider": "kimi", "model": "moonshotai/kimi-k2.6", "display": "Kimi K2.6", "temperature": 0.8, "in_tokens": 17067, "out_tokens": 33332, "reasoning_chars": 61 const SK='s1_paper_may2024';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://hermes-flashcards.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
