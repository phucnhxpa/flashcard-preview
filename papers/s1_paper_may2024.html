Q5(b) — for the \"fastest 60%\" cutoff with mean 15, why is the z-value $$+0.2533$$ (not $$-0.2533$$), even though \"fastest\" intuitively suggests lower tail? (2 steps)", "answer": "- Step 1: \"Fastest 60%\" = the 60% with the **shortest** times = the lower 60% of the distribution. So we need the cutoff $$t$$ such that $$P(X < t) = 0.60$$. This is a **lower-tail cumulative** of 0.60.\n- Step 2: From inverse-normal tables, $$\\Phi^{-1}(0.60) = +0.2533$$ — positive because the 60th percentile is to the **right** of the mean (since 60% > 50%). Even though we're looking at \"fastest\" times (a low-tail concept), the cutoff $$t$$ is still above the mean — only 50% of times are below $$\\mu$$, so to capture 60% we extend slightly above $$\\mu$$.\n\nWhy $$-0.2533$$ is wrong: that's $$\\Phi^{-1}(0.40)$$, which would correspond to \"fastest 40%\" — a cutoff below the mean.\n\nThe trap: people associate \"fastest\" with \"left of mean\" and reflexively reach for a negative $$z$$. The correct mental move: identify the cumulative probability ($$P(X<t) = 0.60$$), then look up that value directly — the sign falls out automatically.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "S1 May 2024 Q2(c) — after solving for $$a$$ and $$b$$ in $$Y = aX - b$$ given $$E(Y)$$ and $$\\operatorname{Var}(Y)$$, what feature of the answer should trigger a recheck of your arithmetic?", "answer": "Both $$a$$ and $$b$$ should come out as **tidy integers** (or at worst clean small decimals like $$0.5$$). If you get something like $$a^2 = 8.857$$ or $$b = 3.27$$, immediately suspect:\n- You used $$\\operatorname{Var}(Y) = a\\operatorname{Var}(X)$$ instead of $$a^2\\operatorname{Var}(X)$$.\n- You transcribed a number from the question incorrectly (the Loom showed the tutor working with $$\\operatorname{Var}(Y)=69.44$$ when the paper had $$66.24$$ — leading to $$a^2 \\approx 8.857$$).\n- You substituted $$a$$ wrong sign into $$E(Y) = aE(X) - b$$.\n\nExam-question design philosophy: Edexcel S1 chooses numbers so that linear-transform constants are integers. Decimal $$a^2$$ is essentially always a flag of a setup error, not \"messy mathematics\".", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_12"}, {"question": "S1 May 2024 Q4(a) — After computing $$S_{dg} = 12105.12$$, what physical-context sign check immediately validates the answer is plausible? (1 step)", "answer": "- Step 1: In the context of bears, longer length ($$d$$) should be associated with larger girth ($$g$$) — a bear that is longer is typically also thicker around. This means we expect **positive correlation** between $$d$$ and $$g$$, which requires $$S_{dg} > 0$$. Since $$S_{dg} = 12105.12 > 0$$, the sign is consistent with the physical expectation. If you had computed a negative $$S_{dg}$$, it would immediately signal an arithmetic error (likely a sign mistake in the $$\\sum dg$$ or the product term). This is a zero-cost sanity check: just ask \"does the sign match common sense?\"\n\nTakeaway: $$S_{dg}$$ should be positive when longer bears have larger girths. A negative sign = recheck immediately.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "S1 May 2024 Q1(a) — When a letter like $$k$$ appears among the leaves of a stem-and-leaf diagram, recall Fuat's three-part verbal rule: what is $$k$$ NOT, and what IS it? (1 step)", "answer": "- Step 1: Fuat's rule: \"$$k$$ is a **digit**. Not a count, not a sum.\" This means $$k$$ is a single leaf value occupying one position in the ordered row — the data value it represents is $$\\text{stem} \\times 10 + k$$ (e.g. stem 4, $$k=3$$ → value 43). The two common misreadings are (a) treating $$k$$ as a frequency (how many observations have that stem) and (b) treating it as a sum to be added to adjacent leaves. Both are wrong; $$k$$ is simply the ones-digit of one observation.\n\nTakeaway: A letter in the leaf column is a digit, not a frequency and not a sum.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "S1 May 2024 Q1(b) — When locating the 9th or 27th value in a 35-item stem-and-leaf dataset, what pre-computation reduces the search from counting every leaf to an O(1) lookup? (1 step)", "answer": "- Step 1: List the **cumulative stem totals** before you need any positional value. For Birch: stem 2 cumulates to 2, stem 3 to 10, stem 4 to 19, stem 5 to 28, stem 6 to 31, stem 7 to 34, stem 8 to 35. Now the 9th value is instantly identifiable as the 2nd leaf in the stem-3 row (since stem 2 ends at position 2, so positions 3–10 are in stem 3). The 27th value is the 8th leaf in the stem-5 row (stem 4 ends at 19, so positions 20–28 are in stem 5). Without cumulative totals, you must recount from the beginning every time — slow and error-prone under exam pressure.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "S1 May 2024 Q1(d) — For Birch with $$N=35$$, the median is the 18th value. In which stem row does it fall, and why is 47 a common wrong answer? (2 steps)", "answer": "- Step 1: The cumulative stem totals for Birch are $$2, 10, 19, 28, \\ldots$$. The 18th value falls in the stem-4 row because cumulative total 19 (stem-4) first exceeds 17, and the previous cumulative total is 10 (stem-3). So the 18th value is the $$18-10=8$$th leaf in stem-4. Reading the Birch stem-4 leaves right-to-left: 9, 8, 8, 7, 6, 3, 1, 1, 1 — the 8th leaf is 8, giving a median of 48.\n- Step 2: The wrong answer 47 arises from miscounting — either (a) reading the leaves left-to-right (wrong direction for the Birch side of a back-to-back diagram) and landing on the 8th leaf from the wrong end, or (b) thinking the 18th value falls in stem-3 (positions 3–10) and picking the 8th leaf there, or (c) simply confusing the 18th value with the 17th (which would be 47 if the 9th leaf in stem-4 is 7, but position 18 is the 8th leaf). The key defence: use cumulative totals to locate the row, then count within that row carefully.\n\nTakeaway: Cumulative totals → identify the row → count within the row. Don't eyeball it.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "Given the coding equation $$10y = w - 20$$, what is the most common wrong inversion that produces a nonsense value for $$\\bar{w}$$, and how do you avoid it? (2 steps)", "answer": "- Step 1: The wrong inversion is to read the coding backwards as $$w = \\frac{y - 20}{10}$$ or $$\\bar{w} = \\frac{\\bar{y} - 20}{10}$$, which might arise from mechanically “dividing by 10” and “adding 20” in the wrong order. This yields values like $$(104 - 20)/10 \\times 50$$, an obvious nonsense order of magnitude.\n- Step 2: To avoid it, rearrange the equation algebraically to isolate $$w$$ before you touch any numbers: $$10y = w - 20 \\Rightarrow w = 10y + 20$$. Then apply the linearity of the mean: $$\\bar{w} = 10\\bar{y} + 20$$. Writing the transformed variable on the left-hand side and checking that the coefficients (10 and +20) match the structural form $$w = ay + b$$ immunises you against directional slips.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_15"}, {"question": "S1 May 2024 Q1(d) — when drawing a box plot in the presence of potential outliers, what is the strict order of operations and why must you NOT draw the whisker first? (2 steps)", "answer": "- Step 1: Compute the IQR fences and **finalise the outlier list first**. Until you know which values are outliers, you cannot know where the whisker terminates. For Birch: fences are 12 and 84, the only outlier is 85.\n- Step 2: Now set the whisker end to the most extreme **non-outlier** value. For Birch the whisker ends at 76 (the next value below 85), not at 85. The outlier 85 is then plotted separately as a cross/asterisk.\n\nWhy this order matters: if you draw the whisker first based on the raw max (85), you've implicitly treated the outlier as part of the spread — visually misleading and mathematically wrong. The whisker represents the \"natural range\" of the bulk of the data; outliers are excluded by definition.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "Which z-value should you immediately recall when you see $$P(\\mu - k < X < \\mu + k) = 0.95$$, and what tail probability does it correspond to?", "answer": "$$z = 1.96$$, corresponding to $$\\Phi(1.96) = 0.975$$ (cumulative probability) or equivalently $$P(Z > 1.96) = 0.025$$ (upper tail).\n\nThe derivation: by symmetry, $$P(X > \\mu + k) = (1 - 0.95)/2 = 0.025$$, so standardising gives $$P(Z > k/\\sigma) = 0.025$$, hence $$k/\\sigma = 1.96$$.\n\nThis is one of the highest-payoff memory items in S1 because it appears in:\n+ 95% symmetric confidence intervals.\n+ \"Two-tail at 5% significance\" hypothesis tests.\n+ Symmetric probability statements like the one above.\n\nThe other partner to memorise: $$\\Phi^{-1}(0.95) = 1.645$$ (for one-tailed 5% problems). Don't confuse them.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "S1 May 2024 Q5(b) — for \"fastest 60% take part in round 2\" with mean 15 and SD 2, why is the $$z$$-value $$+0.2533$$ (not $$-0.2533$$), even though \"fastest\" intuitively suggests the lower tail? (2 steps)", "answer": "- Step 1: \"Fastest 60%\" means the 60% with the **shortest** times — these are the bottom 60% of the distribution, sitting in the **lower** tail. The cutoff time $$t$$ is the value such that $$P(X < t) = 0.60$$.\n- Step 2: $$P(X<t) = 0.60$$ means $$t$$ is to the **right** of the mean (since exactly 50% lies below the mean, and 60% > 50%). So $$z = (t - 15)/2 > 0$$, giving $$z = \\Phi^{-1}(0.60) = +0.2533$$. The negative value $$-0.2533$$ would be the cutoff for the **slowest** 60% (= P(X < t) = 0.40, where $$t$$ is to the left of the mean).\n\nThe polarity rule: the sign of $$z$$ comes from \"which side of the mean is $$t$$ on\", NOT from \"which side of the distribution the tail label suggests\". \"Fastest\" sounds left-tail but the cutoff for \"fastest 60%\" is right of the median because more than half are below.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "S1 May 2024 Q2(c) — after solving for $$a$$ and $$b$$ in $$Y = aX - b$$ given $$E(Y)$$ and $$\\text{Var}(Y)$$, what feature of the answer should trigger an immediate recheck of your arithmetic?", "answer": "Both $$a$$ and $$b$$ should come out as **tidy integers** (here $$a=4$$, $$b=5$$). Exam-paper writers design these questions so the coefficients are small whole numbers — if you get $$a^2 = 8.857$$ or $$b = 4.73$$, almost certainly you've made an arithmetic slip (e.g. mis-typed Var(X), or used $$E(Y)=aE(X)+b$$ when the problem says $$Y=aX-b$$). Decimals here are a red flag, not a normal output. (The Loom analysis caught this exact symptom: a misprinted Var(Y) = 69.44 instead of 66.24 gave $$a^2 \\approx 8.857$$, signalling the data error.)", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "Name three cross-question \"See also\" links flagged in the May 2024 paper and what each contrast teaches. (3 steps)", "answer": "- Step 1: **Q1(d) ↔ Q1(c):** The box plot whisker in Q1(d) depends on the outlier list from Q1(c). If you misidentify outliers (wrong fences), you draw the whisker to the wrong endpoint. The lesson: **outlier identification and box-plot construction are a chained process — errors propagate forward.**\n- Step 2: **Q3(b) ↔ Q1(b):** Grouped continuous data (Q3(b)) uses $$N/2$$ for the median position and linear interpolation, while discrete stem-and-leaf data (Q1(b)) uses the Edexcel round-up/average rule on integer positions. The lesson: **the quartile positional rule depends on data type — don't carry the discrete rule into grouped-data questions.**\n- Step 3: **Q5(c) ↔ Q2(d):** Q5(c) uses conditional probability with a subset relation ($$A \\subset B$$), while Q2(d) uses independence (multiply). The lesson: **\"two events\" does not automatically mean \"multiply\" — you must verify independence or identify the subset structure before choosing the tool.**", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "S1 May 2024 Q1(c) — in a \"show only one outlier\" question, why is it important to compute and quote BOTH the lower AND upper fences in your working, even when no low outliers exist?", "answer": "The Edexcel mark scheme awards a **method mark** for stating the outlier rule applied at both ends — quoting $$Q_1 - 1.5\\,\\text{IQR}$$ AND $$Q_3 + 1.5\\,\\text{IQR}$$ as two separate lines. If you only compute the upper fence (because intuitively the outlier is at the top), you've shown the method only halfway, and the marker can't award the \"applies outlier rule\" mark in full. Even though the low fence is \"wasted\" arithmetic (no values fall below it), writing it down is the cheap insurance that secures the method mark.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "S1 May 2024 Q3(d) — When computing $$\\text{SD}(w)$$ from coded $$\\text{SD}(y)$$ with $$w = 10y + 20$$, why must the square root be the LAST operation, and what's the mechanically wrong sequence? (2 steps)", "answer": "- Step 1: The correct order: (1) compute $$\\text{Var}(y)$$, (2) scale by $$10^2=100$$ to get $$\\text{Var}(w)$$, (3) take the square root to get $$\\text{SD}(w) = 10\\,\\text{SD}(y)$$. The square root must come last because variance scales by $$a^2$$, and you need the full variance before taking its root.\n- Step 2: The wrong sequence: compute $$\\text{SD}(y)$$ first (taking the square root too early), then multiply by 10 to get $$\\text{SD}(w)$$. This actually gives the correct answer ($$10 \\times \\text{SD}(y)$$) if done properly, but the common slip is to multiply by 10 **instead of** 100 when working with variance — i.e., computing $$\\text{Var}(y)$$, then taking $$\\sqrt{\\text{Var}(y)} \\times 10$$ (correct) vs. computing $$\\text{Var}(y) \\times 10$$ then square-rooting (wrong — this gives $$\\sqrt{10} \\times \\text{SD}(y)$$, missing a factor of $$\\sqrt{10}$$). The safest procedure: always work in variance until the very last step, then take one square root.\n\nTakeaway: Variance world → scale by $$a^2$$ → one square root at the end. Never mix SD and variance scaling.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_17"}, {"question": "S1 May 2024 Q5(b) — For a \"fastest 60%\" time cutoff with mean 15 minutes, the z-value is $$+0.2533$$, not $$-0.2533$$. Why is the z-value positive even though \"fastest\" corresponds to the lower (left) tail? (2 steps)", "answer": "- Step 1: \"Fastest 60%\" means the 60% with the **shortest** times, which is the lower tail of the distribution. So we need $$P(X < t) = 0.60$$, where $$t$$ is the cutoff time. The z-value corresponding to this is $$\\Phi^{-1}(0.60) = +0.2533$$.\n- Step 2: The apparent paradox — \"lower tail but positive z\" — resolves when you realise that 0.60 > 0.5, so the cutoff is **above** the mean. The 60th percentile of any distribution is greater than the median. Since the mean is 15 and we're looking for the value below which 60% of data falls, that value must be above 15, hence the z-value is positive. The common error is thinking \"fastest = left = negative z,\" but that only applies when the tail probability is less than 0.5. Sketch the curve: shade the left 60% — the boundary is to the right of the mean.\n\nTakeaway: \"Fastest 60%\" → $$P(X < t) = 0.60$$ → $$z = +0.2533$$ because 60% > 50% means the cutoff is above the mean.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "S1 May 2024 Q4(d) — Which two-word qualifier MUST appear in a regression-gradient interpretation, and why is its absence an overclaim? (1 step)", "answer": "- Step 1: The qualifier is \"**on average**\" (or \"approximately\"). The correct interpretation: \"For each 1 cm increase in the length of a bear, the girth increases by 0.722 cm **on average**.\" Without this qualifier, the sentence claims a deterministic relationship — that every bear with 1 cm more length will exactly have 0.722 cm more girth. But regression describes the **expected** (average) relationship across the population; individual bears deviate from the line. Omitting \"on average\" overclaims the precision of the model and loses the interpretation mark.\n\nTakeaway: Regression describes average trends. Always include \"on average\" — without it, you're claiming determinism from a statistical model.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "S1 May 2024 Q2(d) — Recall Fuat's mental-model trigger for treating $$S = X_1$$ and $$R = 2X_2 - 3$$ as independent: how many spinners do you visualise, and what operation does that trigger? (1 step)", "answer": "- Step 1: Fuat's trigger: \"**Sam spins, Alex spins. Two different spinners, two different outcomes. Multiply.**\" You visualise **two** separate physical spinners — one for Sam (landing on $$X_1$$) and one for Alex (landing on $$X_2$$, then transformed to $$R$$). Because they are two independent spins, $$P(S=s, R=r) = P(S=s) \\times P(R=r)$$. The pitfall is treating both scores as coming from the same spin (which would make them dependent), leading to an enumeration of $$P(X=x \\text{ and } Y=y)$$ as if $$Y$$ were a function of the same $$X$$.\n\nTakeaway: Two people, two spinners, two outcomes → multiply the probabilities. Never collapse to one spinner.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "S1 May 2024 Q1(d) — For Birch with $$N = 35$$, the median is the 18th value and equals 48. In which stem-row does position 18 fall, and why is 47 a common wrong answer? (2 steps)", "answer": "- Step 1: Using the cumulative totals (stems 2 and 3 contain positions 1–10; stem 4 contains positions 11–19), position 18 falls in **stem-4**, specifically the 8th leaf of that row. The stem-4 leaves (read right-to-left for Birch) are 1, 1, 1, 3, 6, 7, 8, 8, 9 — the 8th is 8, giving $$40 + 8 = 48$$.\n- Step 2: The wrong answer 47 arises from mistakenly landing on position 17 (the 7th leaf = 7, giving 47) or from miscounting the leaves in the stem-4 row. The pitfall is that positions 11–19 are all in stem 4, and with 9 leaves in that row, it's easy to be off by one when counting. The defence: always use cumulative totals to confirm which stem-row contains your target position, then count within that row.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "S1 May 2024 Q5(c) — Which z-value should you immediately recall when you see $$P(\\mu - k < X < \\mu + k) = 0.95$$, and what tail probability does it correspond to? (1 step)", "answer": "- Step 1: $$\\Phi^{-1}(0.975) = 1.96$$. The reasoning: a symmetric 95% interval leaves 2.5% in each tail, so the upper boundary corresponds to a cumulative probability of $$0.95 + 0.025 = 0.975$$. This value (1.96) is one of the most frequently used z-values in all of statistics and should be memorised as a recall trigger: \"symmetric 95% interval → 1.96.\" Whenever you see $$P(\\mu - k < X < \\mu + k) = 0.95$$, write down $$\\frac{k}{\\sigma} = 1.96$$ immediately — this is the entry point to the entire solution.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "Beyond regression intercepts, name two other computations on the May 2024 paper where rounding intermediates early changes the final answer at 3 s.f. (2 steps)", "answer": "- Step 1: **Q5(c) standard deviation: $$\\sigma = 10/1.96 = 5.102\\ldots$$** If rounded prematurely to $$5.10$$, then $$P(Z > -5/5.10) = P(Z > -0.9804)$$ vs the unrounded $$P(Z > -0.9800)$$ — the look-up table values differ in the 3rd s.f., and the final conditional probability shifts from 0.858 to 0.857 or 0.859. Carrying 5.102 throughout preserves accuracy.\n- Step 2: **Q4 PMCC and regression chain.** The gradient $$b = S_{dg}/S_{dd} = 0.72184\\ldots$$ is used both to compute the intercept $$a = \\bar{g} - b\\bar{d}$$ and to estimate girth values. If you round $$b$$ to 0.722 before computing $$a$$, you get $$a \\approx -42.32$$ instead of $$-42.30$$ — borderline for 3 s.f. accuracy. Carrying 0.72184 throughout the chain is essential.\n\nThe general rule: **round only at the final answer, not at intermediate computations**. Hold at least 4–5 s.f. throughout, then round the very last numerical result to the question's specified precision.\n\nThe deeper reason: rounding errors compound multiplicatively. A 0.1% rounding error in $$b$$, when multiplied by $$\\bar{d} \\approx 182$$, produces an absolute error in $$a$$ of about $$0.18$$ — easily flipping the 3-s.f. answer.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "In Q1(f) once $$36 \\le a \\le 40$$ is established, why does the median constraint hold automatically? Show the positional shift. (2 steps)", "answer": "- Step 1: For $$N=36$$, the median is the average of the 18th and 19th values. In the original Maple data ($$N=32$$), the 16th and 17th values are 43 and 47 respectively (so original median $$= 45$$).\n- Step 2: When we add 27 and $$a$$ (with $$a \\in [36,40]$$), both new values are inserted **below** 43 and 47. This pushes the original 16th value (43) forward by 2 slots to position 18, and the original 17th value (47) forward by 2 slots to position 19.\n\nTherefore the new 18th and 19th values are 43 and 47, giving new median $$= (43+47)/2 = 45$$ ✓ — automatically satisfied. The other two added values (48 and $$2a \\le 80$$) sit above this region and don't affect the central positions.\n\nThe takeaway: when $$a \\in [36,40]$$, exactly two values land below the original median region, so positions shift by exactly 2 — the median region rides forward unchanged.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "S1 May 2024 Q5(c) — why is $$P(\\mu - 5 < T < \\mu - 10)$$ automatically zero, and how does this trap arise in conditional probability problems?", "answer": "Because $$\\mu - 5 > \\mu - 10$$ (since $$-5 > -10$$), the interval $$(\\mu-5, \\mu-10)$$ reads \"lower bound is bigger than upper bound\" — an **empty set**. No value of $$T$$ can simultaneously exceed $$\\mu - 5$$ AND be less than $$\\mu - 10$$.\n\nHow the trap arises: when expanding $$P(T > \\mu - 5 \\mid T > \\mu - 10)$$ using the conditional formula, a careless student writes the intersection as \"$$T > \\mu - 5$$ AND $$T > \\mu - 10$$\" and then tries to express it as a \"between\" interval, accidentally reversing the bounds.\n\nThe correct insight: $$\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$$ (since $$\\mu - 5 > \\mu - 10$$, requiring $$T$$ to exceed the larger threshold is the stricter condition). So the intersection equals the smaller event: $$\\{T > \\mu - 5\\} \\cap \\{T > \\mu - 10\\} = \\{T > \\mu - 5\\}$$. The numerator simplifies to $$P(T > \\mu - 5)$$ — no empty intervals.\n\nSubset trick mantra: \"intersection of nested events = the inner event.\"", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "After computing $$P(\\text{Sam wins}) = 0.355$$ in a two-player game, what three-way partition sanity check confirms the answer is plausible? (1 step)", "answer": "- Step 1: Verify that $$P(\\text{Sam wins}) + P(\\text{Alex wins}) + P(\\text{draw}) = 1$$. Compute all three probabilities independently (Sam wins: $$S > R$$; Alex wins: $$R > S$$; draw: $$S = R$$) and sum them. If the total is not 1 (or very close, allowing for rounding), you have a sign error, an inequality-direction error ($$\\ge$$ vs $$>$$), or a missing case. This check catches the common mistake of counting draws as wins for one player.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_13"}, {"question": "Which z-value should you immediately recall when you see $$P(\\mu - k < X < \\mu + k) = 0.95$$, and what tail probability does it correspond to? (1 step)", "answer": "- Step 1: $$\\Phi^{-1}(0.975) = 1.96$$. The symmetric 95% interval leaves 2.5% in each tail, so the upper boundary sits at the 97.5th percentile. This is the single most important z-value to memorise for S1 because it appears in confidence intervals, hypothesis tests, and \"find $$\\sigma$$ from a symmetric probability\" questions. When you see 0.95 symmetrically centred, write down $$z = 1.96$$ before doing anything else.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "When computing $$SD(w)$$ from a coded variable $$y$$ where $$w = 10y + 20$$, why must the square root be the LAST operation, and what's the mechanically wrong sequence? (2 steps)", "answer": "- Step 1: The correct sequence: (1) compute $$\\text{Var}(y)$$, (2) scale by $$10^2 = 100$$ to get $$\\text{Var}(w) = 100 \\cdot \\text{Var}(y)$$, (3) take square root: $$SD(w) = \\sqrt{\\text{Var}(w)} = 10 \\cdot SD(y)$$. The square root is last because variance scales by $$a^2$$, and you must apply that scaling **inside** the radical before extracting it.\n- Step 2: The wrong sequence: compute $$SD(y)$$ first (taking the square root early), then multiply by 10 to get $$SD(w) = 10 \\cdot SD(y)$$. This actually gives the correct numerical answer here (since $$\\sqrt{a^2 \\cdot \\text{Var}(y)} = a \\cdot SD(y)$$), but the **truly wrong** version is: compute $$SD(y)$$, then multiply by $$10^2 = 100$$ (forgetting that the square root \"eats\" one factor of the $$a^2$$). This gives $$SD(w) = 100 \\times 0.587 = 58.7$$, which is 10× too large. The rule: scale variance by $$a^2$$, then take the square root once.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "S1 May 2024 Q1(a) — what is the first arithmetic check you do on any stem-and-leaf diagram BEFORE extracting values, and why does it catch transcription errors?", "answer": "Sum the row totals in each margin and confirm they match the stated $$N$$ given in the question stem. Here: Birch row totals must sum to $$35$$ ($$2+8+9+9+3+3+1$$), Maple row totals must sum to $$32$$ ($$5+7+6+7+3+2+2$$).\n\nThis one-second check catches:\n+ A miscounted leaf in any row (e.g. you read 7 leaves where there are 8).\n+ A misread of the back-to-back direction (you'd count the same leaves twice or miss a digit).\n+ A misallocation of the unknown $$k$$ (treating it as something other than a single leaf).\n\nThe motivation: every downstream computation (median, quartiles, outliers, box plot) depends on the positional structure of the data. A single mis-transcription propagates through every part of the question.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "S1 May 2024 Q1(a) — Before extracting any values from a stem-and-leaf diagram, what arithmetic sanity check should you perform first, and what transcription error does it catch? (1 step)", "answer": "- Step 1: Sum the row totals shown on the diagram and confirm they equal the stated $$N$$ (e.g. Birch rows: $$2+8+9+9+3+3+1=35$$; Maple rows: $$5+7+6+7+3+2+2=32$$). This catches leaf-transcription errors or miscounted rows — if the totals don't match $$N$$, at least one leaf is missing or duplicated, and every downstream calculation (median, quartiles, outliers) would be built on corrupted data.\n\nTakeaway: Always verify $$\\sum \\text{row totals} = N$$ before trusting any number from the diagram.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "S1 May 2024 Q4(c) — Why does the question specify the regression equation in the form \"$$g = -42.3 + 0.722d$$\" (intercept first), and what happens if you write \"$$0.722d - 42.3$$\" instead? (1 step)", "answer": "- Step 1: The question explicitly asks you to \"show that the equation… can be written as $$g = -42.3 + 0.722d$$.\" This is the standard $$y = a + bx$$ form (intercept, then gradient-times-variable). Writing $$0.722d - 42.3$$ is mathematically equivalent but does not match the **requested format**, and on Edexcel mark schemes, a presentation mark can be lost for not matching the specified form. The meta-rule: when a question states \"can be written as [specific form],\" your final line must reproduce that exact form character-for-character. Rearranging to a different but equivalent expression risks losing a format mark.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "S1 May 2024 Q1(a) — recall Fuat's three-part verbal rule about what a letter (like $$k$$) occupying a leaf position in a stem-and-leaf diagram IS and what it is NOT.", "answer": "\"$$k$$ is a digit. Not a count, not a sum.\" It represents a single leaf digit, so its numerical value is stem-concatenated-with-$$k$$ (e.g. stem 4, leaf $$k$$ means the data value is $$40+k$$). The mnemonic blocks two common misreadings: treating $$k$$ as a frequency (count of leaves) or as $$k+7$$ (a sum of nearby leaves).", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "S1 May 2024 Q2(c) — After solving for $$a$$ and $$b$$ in $$Y = aX - b$$ given $$E(Y)$$ and $$\\operatorname{Var}(Y)$$, what feature of the answer should immediately trigger a recheck of your arithmetic? (1 step)", "answer": "- Step 1: Both $$a$$ and $$b$$ should be **tidy integers**. Here $$a = 4$$ and $$b = 5$$. The variance equation $$a^2 \\cdot \\operatorname{Var}(X) = \\operatorname{Var}(Y)$$ gives $$a^2 = 66.24 / 4.14 = 16$$, so $$a = 4$$. The expectation equation then gives $$b = 18.4 - 13.4 = 5$$. If you get non-integer values (e.g. $$a = 2.98$$ or $$b = 5.07$$), something went wrong in the arithmetic — most likely a transcription error in $$\\operatorname{Var}(Y)$$ or a calculation slip in the division. Edexcel examiners design these problems so the answers are clean. Decimals are a red flag.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "When a letter (like $$k$$) appears among the leaves of a stem-and-leaf diagram, what is Fuat's three-part verbal rule for what it represents?", "answer": "\"$$k$$ is a digit. Not a count, not a sum.\"\n\nUnpacking:\n- It IS a single-digit leaf occupying one leaf position in its row.\n- It is NOT a frequency (count of leaves) — the totals column already captures that.\n- It is NOT a sum of leaves — leaves are individual data digits, never aggregates.\n\nSo if $$k$$ appears as the 4th leaf in the stem-4 row of a Maple diagram, the data value it represents is $$40+k$$ where $$k \\in \\{0,1,\\ldots,9\\}$$, further constrained by ascending order of the surrounding leaves (here $$1 \\le k \\le 7$$).\n\nThe trigger to use this rule: whenever an algebraic letter is sitting in a leaf slot, immediately label it as \"single digit data value\", not \"count\" or \"expression\".", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "After deriving $$36 \\le a \\le 40$$ in Q1(f), what concrete numeric verification should you do, and why?", "answer": "Pick a candidate value in the middle of the range (e.g. $$a=38$$, giving four added values $$27, 38, 48, 76$$) and:\n- Re-sort the full augmented dataset of 36 values.\n- Recompute the five box-plot statistics (min, $$Q_1$$, median, $$Q_3$$, max).\n- Confirm all five match the original Maple box plot (25, 36, 45, 54, 80).\n\nWhy this is valuable: the derivation involved several positional-shift arguments, each with sign/direction traps. A concrete numerical check catches off-by-one errors in the shift counting, and verifies you haven't accidentally violated a constraint you forgot to list (e.g. forgetting that $$2a$$ must not exceed the max).\n\nIt also catches the boundary cases: try $$a=36$$ and $$a=40$$ to make sure the endpoints are valid (closed interval, not open).", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "S1 May 2024 Q4(c) — why does the question specifically state \"$$g = -42.3 + 0.722d$$\" rather than letting you write \"$$0.722d - 42.3$$\", and what happens if you ignore the requested form?", "answer": "Edexcel mark schemes often allocate a **presentation/communication mark** to writing the regression line in the exact form $$y = a + bx$$ (intercept first, then gradient $$\\times$$ variable). Writing $$0.722d - 42.3$$ is algebraically identical but doesn't match the requested layout, and a strict marker may dock the presentation mark. The motivation behind the convention: putting the intercept first matches the formula $$y = a + bx$$ in the booklet and makes it visually obvious which coefficient is the intercept ($$a$$) and which is the gradient ($$b$$).", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "S1 May 2024 Q4(a) — after computing $$S_{dg} = 12105.12$$ for bear length and girth, what physical-context sign check immediately validates the answer?", "answer": "Bears that are longer in body length are intuitively expected to have larger girth (heavier, fuller bodies) — so the correlation should be **positive**, meaning $$S_{dg} > 0$$.\n\nSince the computed $$S_{dg} = +12105.12$$ is positive, this matches expectation. If you'd computed a negative $$S_{dg}$$, you'd immediately suspect:\n- A subtraction-order error in $$S_{dg} = \\sum dg - (\\sum d)(\\sum g)/n$$.\n- A transcription mistake on one of the raw sums.\n\nThe general principle: every bivariate computation should be sanity-checked against the **physical/biological expected direction** of the relationship. Sign of $$S_{xy}$$ = sign of correlation = sign of regression gradient. All three must agree with intuition.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "What is Fuat's one-sentence rule about what you square and what you don't when computing $$E(X^2)$$ from a probability table?", "answer": "\"Square the $$x$$, not the probability.\"\n\nThe formula is $$E(X^2) = \\sum x^2 \\cdot P(X=x)$$, so each row contributes $$x^2$$ (the squared data value) **multiplied by** the original probability — the probability is **not** squared.\n\nCommon slip the mnemonic prevents: writing $$\\sum x \\cdot [P(X=x)]^2$$ (squaring probabilities, getting a much smaller number) or $$\\sum [x \\cdot P(X=x)]^2$$ (squaring the whole product, also wrong).\n\nTrigger to deploy: whenever you see \"find $$\\operatorname{Var}(X)$$\" or \"$$E(X^2)$$\" in a discrete table question, write the formula header $$E(X^2) = \\sum x^2 P(x)$$ explicitly **before** plugging numbers — this physically forces the correct squaring location.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "S1 May 2024 (exam tactics) — Beyond regression intercept, name two other computations on this paper where rounding early changes the final answer at 3 s.f., and state the safe working rule. (2 steps)", "answer": "- Step 1: (i) In Q5(c), $$\\sigma = 10/1.96 = 5.102\\ldots$$ must be carried unrounded; using 5.10 or 5.1 too early shifts the subsequent $$z$$-score $$-5/\\sigma$$ and the final conditional probability. (ii) In Q4(c), the gradient $$b = 0.72184\\ldots$$ must be carried unrounded into the intercept calculation $$a = \\bar{g} - b\\bar{d}$$; rounding $$b$$ to 0.722 before subtracting from 89.15 changes the third significant figure of $$a$$.\n- Step 2: The safe rule is to store full calculator precision for all intermediates and apply rounding only to the final stated answer.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_27"}, {"question": "Recall Fuat's one-sentence rule about what you square and what you don't when computing $$E(X^2)$$ from a probability table. (1 step)", "answer": "- Step 1: **\"Square the $$x$$, not the probability.\"** The formula is $$E(X^2) = \\sum x^2 \\cdot P(X=x)$$ — each data value gets squared, then multiplied by its (unsquared) probability. The common mistake is to square the probability instead (producing tiny numbers like $$0.25^2 = 0.0625$$) or to square the entire product $$(x \\cdot p)^2$$. Neither is correct. The mental hook: the $$x$$ lives in the \"data world\" (gets squared for the second moment), the $$p$$ lives in the \"weight world\" (stays as-is, it's just a multiplier).", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "S1 May 2024 Q4(d) — which two-word qualifier MUST appear in a regression-gradient interpretation, and why is its absence an overclaim?", "answer": "\"**On average**\" (or equivalently \"**approximately**\" or \"**predicted**\").\n\nRequired phrasing: \"For each 1 cm increase in length, the girth increases by 0.722 cm **on average**.\"\n\nWhy this is non-negotiable: the regression line gives the **mean** value of $$g$$ conditional on $$d$$. Individual bears scatter around this line. Saying \"girth increases by 0.722 cm\" without the qualifier asserts that this holds for every individual bear, which is false — it's an average trend, not a deterministic law.\n\nThe mark scheme penalty: without the qualifier, the statement is technically overclaiming, and the interpretation mark is withheld. The presence of \"on average\" signals you understand the statistical (not deterministic) nature of regression.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "In Q3(a), what specific seductive numerical shortcut produces the wrong bar width of 5 cm, and what is the diagnostic that exposes it as incorrect before you commit pen to paper? (2 steps)", "answer": "- Step 1: The wrong shortcut is to multiply the target class width (2 mm) directly by the reference bar width on the page (2.5 cm), giving $$2 \\times 2.5 = 5$$ cm. This implicitly assumes that bar width is proportional to class width with a scale factor of 1, ignoring the fact that the reference bar itself represents a 4 mm class width, so the scale factor is actually $$2.5 / 4 = 0.625$$ cm per mm, not 1.\n- Step 2: The diagnostic is dimensional consistency: the reference class is 4 mm wide and is drawn as 2.5 cm, so the width scale is already fixed at 0.625 cm/mm. If your shortcut gives 5 cm for a class half as wide as the reference but your height scale would then produce a bar of nonsensical area, you know you have conflated “bar width on page” with “class width in data.” Always derive the scale factor from the reference bar first.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_14"}, {"question": "In Q1(f), the original Maple data has two 36s occupying positions 8 and 9. When the new value 27 and the unknown $$a$$ are inserted below them, explain mechanically — using positional displacement — why any $$a < 36$$ would force the lower quartile to change from 36. (3 steps)", "answer": "- Step 1: Before insertion, the two 36s sit at positions 8 and 9. For the augmented list of $$N=36$$, the lower-quartile rule for divisible-by-4 data says $$Q_1$$ is the average of the new 9th and 10th positions. Because 27 is smaller than 36, it slots in before both 36s and pushes every original value from position 8 onward two places higher.\n- Step 2: If $$a$$ is also smaller than 36, it too inserts before the original 36s, so the original 36s are pushed from positions 8–9 to positions 10–11. The two values now occupying positions 9 and 10 would therefore be something other than 36 (depending on where $$a$$ lands), and their average would no longer be 36.\n- Step 3: Conversely, if $$a \\ge 36$$, both 27 and $$a$$ insert at or after the original 36s, so the 36s remain at positions 9 and 10 (or one of them does, with the other at position 10). Thus $$Q_1$$ stays fixed at 36 if and only if $$a$$ does not displace the two 36s downward, i.e., iff $$a \\ge 36$$.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_6"}, {"question": "S1 May 2024 Q3(a) — what specific numerical shortcut produces the wrong width 5 cm in the histogram bar question, and what is the diagnostic that catches it? (2 steps)", "answer": "- Step 1: The seductive wrong method is: \"target class width is 2 mm, reference bar width on the page is 2.5 cm, so target bar width $$= 2 \\times 2.5 = 5$$ cm.\" This treats the page-cm-per-mm-of-class as if it were equal to the page-cm value itself, conflating two different ratios.\n- Step 2: The diagnostic: ask \"what is 1 mm of class width worth in page-cm?\" From the reference bar: $$2.5 \\text{ cm} / 4 \\text{ mm} = 0.625$$ cm per mm. Then target width $$= 2 \\times 0.625 = 1.25$$ cm.\n\nThe fix is to always derive a **per-unit scale** from the reference bar (cm-per-mm-of-class-width, separately cm-per-unit-of-frequency-density) before scaling the target bar. The wrong method skips the per-unit step.\n\nThe 5 cm answer fails the eyeball test too: a class half the width of the reference (2 mm vs 4 mm) cannot produce a bar twice as wide on the page.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_15"}, {"question": "S1 May 2024 Q4(d) — which two-word qualifier MUST appear in a regression-gradient interpretation sentence, and why is its absence considered an overclaim?", "answer": "\"**On average**\" (or equivalent phrasing like \"approximately\"). The regression line describes the **expected** value of $$y$$ given $$x$$, not the actual value — individual bears with the same length will have different girths, scattered around the line. Writing \"for each 1 cm increase in length, the girth increases by 0.722 cm\" with no qualifier overclaims a deterministic relationship; \"for each 1 cm increase in length, the girth increases by 0.722 cm **on average**\" correctly states it's a mean trend. Markers withhold the interpretation mark if the qualifier is missing.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "S1 May 2024 Q3(d) — When computing $$\\sigma_w$$ from coded data where $$w = 10y + 20$$, why must the square root be the LAST operation, and what's the mechanically wrong sequence? (2 steps)", "answer": "- Step 1: The correct order is: (1) compute $$\\operatorname{Var}(y)$$, (2) scale by $$10^2 = 100$$ to get $$\\operatorname{Var}(w)$$, (3) take the square root to get $$\\sigma_w$$. The constant 20 drops out of variance entirely. This gives $$\\sigma_w = \\sqrt{100 \\times \\operatorname{Var}(y)} = 10 \\times \\sigma_y$$.\n- Step 2: The wrong sequence is: compute $$\\sigma_y$$ first (taking the square root), then multiply by 10 to get $$\\sigma_w$$. This actually produces the correct answer ($$10 \\times \\sigma_y$$) IF you remember to multiply by 10 (not 100). But the more dangerous wrong sequence is: compute $$\\sigma_y$$, then scale by $$10^2 = 100$$ (forgetting the square root was already taken), giving $$\\sigma_w = 100 \\times \\sigma_y$$ — a factor-of-10 error. The safe discipline: always work in variance space (where scaling is by $$a^2$$), and only take the square root at the very end.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "S1 May 2024 Q1(e) — why is the bare word \"average\" a marker-bait term in a \"compare distributions\" answer, and what should you say instead?", "answer": "\"Average\" is ambiguous — it could mean mean, median, or mode. Mark schemes typically require you to identify **which specific statistic** you are comparing, and to quote its numerical value in both groups.\n\nReplacement: explicitly say \"**median**\" (since for this question that's what was computed: 48 for Birch, 45 for Maple) or \"**mean**\" if that's what you calculated. Then quote both numerical values.\n\nSample acceptable phrasing: \"The median Birch height (48 cm) is greater than the median Maple height (45 cm), so on average Birch trees grow more.\"\n\nWhy markers penalise \"average\": the sentence \"Birch trees grow more on average than Maple trees\" looks fine in English but doesn't demonstrate that the candidate knows which measure they used. The specificity is the skill being tested.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "After computing $$P(\\text{Sam wins}) = 0.355$$ in a two-spinner game, what three-way partition sanity check confirms the answer?", "answer": "The three mutually exclusive, exhaustive outcomes are:\n- Sam wins (Sam's score $$>$$ Alex's score)\n- Alex wins (Sam's score $$<$$ Alex's score)\n- Draw (equal scores)\n\nThese must satisfy $$P(\\text{Sam}) + P(\\text{Alex}) + P(\\text{draw}) = 1$$.\n\nCompute $$P(\\text{draw})$$ separately by summing $$P(S=R)$$ over matching pairs of values, and $$P(\\text{Alex wins})$$ analogously to $$P(\\text{Sam wins})$$. If the three don't sum to 1, you've made a sign or inequality error (likely confusing $$>$$ with $$\\ge$$ and double-counting draws).\n\nThis check catches: using $$\\ge$$ instead of $$>$$ (which would put draws into both \"Sam wins\" and \"Alex wins\" buckets, summing to more than 1) or omitting a row in the conditional table.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "For Birch with $$N=35$$, the median is at position 18. In which stem-row does this position fall, and why is 47 a common wrong answer? (2 steps)", "answer": "- Step 1: The cumulative stem totals for Birch are 2 (stem 2), 10 (stem 3), 19 (stem 4). Position 18 falls in the stem-4 row (positions 11–19). The 8th leaf in that row (reading right-to-left) is 8, so the median is **48**.\n- Step 2: The wrong answer **47** arises from miscounting: the learner counts 7 leaves in the stem-4 row and picks the 7th one (7), or mistakenly thinks position 18 is the last value in stem-3 (which only goes to position 10). The key insight is that positions 11 through 19 all live in stem-4, so you must count within that row, not assume position 18 \"wraps back\" to an earlier stem.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_5"}, {"question": "For the Birch data with $$N=35$$, what is the exact position of the median, in which stem row does that position fall, and why is 47 a dangerously common wrong answer? (2 steps)", "answer": "- Step 1: With $$N=35$$, the median is the $$\\frac{N+1}{2} = 18$$th ordered value. The cumulative stem totals show that positions 1–2 are in stem 2, positions 3–10 in stem 3, and positions 11–19 in stem 4. Therefore the 18th value falls inside the stem-4 row.\n- Step 2: The stem-4 leaves are $$1,\\ 1,\\ 1,\\ 3,\\ 6,\\ 7,\\ 8,\\ 8,\\ 9$$. Position 11 is the first 41, so position 18 is the eighth leaf in that row, which is 48. The answer 47 comes from stopping at the seventh leaf or from miscounting the cumulative boundary between stem 3 and stem 4; it ignores that the median lands in the stem-4 row, not stem 3.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_4"}, {"question": "S1 May 2024 Q6(c) — when summing all Venn regions to find an unknown probability, why must you include regions whose stated value is 0, and what error does omitting them cause?", "answer": "Because **every distinct region of the diagram is a separate event partition**, and the partition must cover the entire sample space — meaning all 8 regions of a 3-set Venn (including any that happen to have probability 0) appear in the sum $$\\sum P(\\text{regions}) = 1$$.\n\nOmitting a zero region (e.g. \"$$G$$ only $$= 0$$\") is usually harmless arithmetically — adding zero doesn't change the sum. BUT the danger is that **omitting it from your written list signals a partition error** to the marker, and worse, when you re-use that incomplete partition in a later part (like computing $$P(S')$$ in Q6(e) by summing pieces), you forget that the \"$$G$$ only\" region is also part of \"not Scrabble\" — and your answer is wrong.\n\nThe discipline: list all 8 regions in every Venn computation, writing \"0\" explicitly where applicable. This makes downstream sums (especially complements like $$P(S')$$) safe.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "Why is $$P(\\mu - 5 < T < \\mu - 10)$$ automatically zero, and how does this trap arise in conditional probability problems? (2 steps)", "answer": "- Step 1: The interval $$\\mu - 5 < T < \\mu - 10$$ requires $$T$$ to be simultaneously greater than $$\\mu - 5$$ AND less than $$\\mu - 10$$. But $$\\mu - 5 > \\mu - 10$$, so no real number satisfies both inequalities. The set is **empty** and its probability is zero.\n- Step 2: The trap arises when a student mechanically computes $$P(A \\cap B) = P(A) \\times P(B)$$ or applies the conditional formula $$P(A \\mid B) = P(A \\cap B)/P(B)$$ without first checking whether $$A \\subseteq B$$ (or whether $$A \\cap B$$ is empty). In Q5(c), the student might accidentally try to compute $$P(\\mu - 5 < T < \\mu - 10)$$ as the numerator, not realising the correct subset relation is $$\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$$, so the intersection simplifies to $$\\{T > \\mu - 5\\}$$. Always verify the direction of the subset relation before simplifying.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_23"}, {"question": "S1 May 2024 Q5(c) — Why is $$P(\\mu - 5 < T < \\mu - 10)$$ automatically zero, and how does this trap arise in conditional probability problems? (2 steps)", "answer": "- Step 1: The interval $$\\mu - 5 < T < \\mu - 10$$ is **empty** because $$\\mu - 5 > \\mu - 10$$ (subtracting a smaller number gives a larger result). The inequality requires $$T$$ to be simultaneously greater than $$\\mu - 5$$ and less than $$\\mu - 10$$, which is impossible. No value of $$T$$ can satisfy both conditions, so the probability is zero.\n- Step 2: This trap arises in conditional probability problems when you're computing $$P(A \\mid B) = P(A \\cap B)/P(B)$$ and mistakenly set up the numerator as $$P(\\mu - 5 < T < \\mu - 10)$$ instead of the correct $$P(\\mu - 10 < T < \\mu - 5)$$. The numbers 5 and 10 come from different parts of the problem (one from the conditional event, one from the intersection), and it's easy to subtract them in the wrong order. The defence: always check that the lower bound of your interval is actually less than the upper bound. If not, you've reversed the subtraction.\n\nTakeaway: Before computing any interval probability, verify lower bound < upper bound. If not, you've made a sign/order error.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_23"}, {"question": "In Q1(f), adding the value 27 to the Maple data shifts all original positions from index 3 onwards up by one. Explain mechanically, using positional displacement, why inserting a value $$a < 36$$ would change $$Q_1$$. Walk through what positions 9 and 10 hold before and after. (3 steps)", "answer": "- Step 1: **Before adding $$a$$**: the augmented list already contains 27 (inserted at position 3). The original 8th value (the first 36) is now at position 9, and the original 9th value (the second 36) is now at position 10. With $$N=36$$, $$Q_1$$ = average of positions 9 and 10 = $$\\frac{36+36}{2} = 36$$. ✓\n- Step 2: **Now insert $$a$$ where $$a < 36$$**: this value slots in somewhere before the two 36s, pushing them each forward one more position — to positions 10 and 11. Position 9 is now occupied by $$a$$.\n- Step 3: The new $$Q_1$$ = average of positions 9 and 10 = $$\\frac{a + 36}{2}$$, which is strictly less than 36. The box plot would change. So to preserve $$Q_1 = 36$$, we need $$a \\geq 36$$ — the value must not displace either of the 36s from positions 9 and 10.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_7"}, {"question": "S1 May 2024 Q4(a) — after computing $$S_{dg} = 12105.12$$ for bears' length vs girth, what physical-context sign check immediately validates the answer is plausible?", "answer": "Bigger bears (longer) should also be wider (larger girth) — that's a positive physical relationship. So $$S_{dg}$$ (which has the same sign as the correlation) MUST be positive. If you computed a negative $$S_{dg}$$, you've likely subtracted in the wrong order or mis-typed a sum — re-check before trusting downstream quantities like $$r$$ and the regression gradient. This sign-from-context check costs no time and catches gross errors.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "S1 May 2024 Q6(e) — Fuat verbalised an incorrect partial-sum approach for \"not Scrabble\". What was the approach, why was it wrong, and what is the meta-lesson? (2 steps)", "answer": "- Step 1: Fuat said: \"So I add up the not-Scrabble pieces in the Chess region… 0.04 plus 0.14…\" — totalling $$0.04 + 0.14 = 0.18$$. This only summed two regions ($$C$$-only and $$C \\cap G$$-only) inside the Chess circle that lie outside Scrabble. He forgot the \"$$G$$-only\" region (value 0) and the **outside-all-three-circles** region ($$q = 0.22$$).\n- Step 2: The correct $$P(S') = 0.04 + 0 + 0.14 + 0.22 = 0.40$$, which immediately matches the shortcut $$P(S') = 1 - P(S) = 1 - 0.60 = 0.40$$.\n\nMeta-lesson: **for any \"not $$A$$\" complement question, use $$P(A') = 1 - P(A)$$ as the default route, not piece-by-piece Venn summation.** The shortcut is automatic — it cannot miss the outside-the-circles region because $$1 - P(A)$$ encompasses the entire universe by construction. Venn piece-summation is error-prone precisely because the \"outside\" region is visually peripheral and easy to forget.\n\nEven an experienced tutor (Fuat) made this slip on tape — strong evidence that the shortcut is the safer default for everyone.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "For the \"fastest 60%\" time cutoff with mean 15 minutes, the correct z-value is $$+0.2533$$ (not $$-0.2533$$). Why is the z-value positive, even though \"fastest\" means the lower tail? (2 steps)", "answer": "- Step 1: \"Fastest 60%\" means the shortest 60% of times — the cutoff $$t$$ satisfies $$P(X < t) = 0.60$$. This is a **lower-tail** probability of 0.60, which is greater than 0.5, so the cutoff must be **above** the mean. Hence the z-value is positive.\n- Step 2: The trap is reasoning: \"fastest = lower tail = negative z\". But the sign of $$z$$ depends on whether the tail probability exceeds 0.5, not on which tail you're in. A lower-tail probability of 0.60 gives $$z = +0.2533$$; a lower-tail probability of 0.40 gives $$z = -0.2533$$. Always compute $$P(X < t)$$ and look up $$\\Phi^{-1}$$ of that number — the sign takes care of itself.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "S1 May 2024 Q6(e) — Fuat verbalised an incorrect partial-sum approach for \"not Scrabble.\" What was the approach, why was it wrong, and what's the meta-lesson? (2 steps)", "answer": "- Step 1: Fuat said: \"So I add up the not-Scrabble pieces in the Chess region… 0.04 plus 0.14…\" — this approach manually enumerates the regions outside $$S$$ by scanning the Venn diagram piece by piece. The error: he missed the $$G$$-only region (value 0, but still a region) and the outside region $$q = 0.22$$. His partial sum of $$0.04 + 0.14 = 0.18$$ gave $$P(S') = 0.18$$, leading to $$262 \\times 0.18 \\approx 47$$ (the wrong answer) instead of the correct $$262 \\times 0.40 = 105$$.\n- Step 2: The meta-lesson: **use the complement shortcut** $$P(S') = 1 - P(S)$$ whenever \"not A\" includes regions outside all circles. Since $$P(S) = 0.60$$, we get $$P(S') = 0.40$$ instantly — guaranteed to include every region outside $$S$$, including the outside-the-circles region that manual enumeration tends to miss. Fuat's approach is explicitly flagged as an anti-pattern: do not copy it. The general rule is: if the complement is easy to compute, compute the complement rather than summing pieces.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "S1 May 2024 Q6(c) — when summing all 8 Venn regions to find an unknown probability, why must you include regions whose stated value is 0, and what specific error does omitting them cause?", "answer": "Even when a region (like \"G only\" = 0) contributes 0 to the sum, it is still a **region of the diagram** that exists structurally. The sanity check \"all regions sum to 1\" requires enumerating all 8 regions (3 single-only, 3 pair-only, 1 triple, 1 outside) — if you mentally skip the 0-valued region, you might also forget that it's a separate region from the \"outside all three\" region $$q$$, leading you to misallocate $$q$$'s value or double-count. The motivation: keeping the diagram's full structure in your head protects against later questions like Q6(e), where \"not Scrabble\" must include both $$q$$ AND the G-only region — even though G-only is 0, it's part of the inventory.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "In Q1(f), why does the upper quartile $$Q_3 = 54$$ remain valid for every permissible $$a$$, and what specific feature of the original Maple data makes this robust against the insertion of four new values? (2 steps)", "answer": "- Step 1: For the augmented $$N=36$$ list, $$Q_3$$ is the average of the 27th and 28th ordered values. The original Maple data contained three consecutive 54s clustered together. After inserting 27 and $$a$$ (both $$\\le 40$$) below them, and 48 and $$2a$$ (both $$\\le 80$$) in various places, the three 54s are pushed from their original positions into a block that still spans positions 26, 27, and 28 in the new ordering.\n- Step 2: Because the three 54s form an uninterrupted run of length three, and only four new values are inserted — none of which can land strictly between these three identical 54s — at least two of them remain at positions 27 and 28. Their average is therefore inevitably 54, making the $$Q_3$$ constraint automatically satisfied for any $$a$$ that does not introduce a value between 54 and 54 (impossible). This clustering is the structural reason the constraint is robust.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_8"}, {"question": "S1 May 2024 Q2(d) — After computing $$P(\\text{Sam wins}) = 0.355$$, what three-way partition sanity check confirms the answer is plausible? (1 step)", "answer": "- Step 1: The sample space partitions into three mutually exclusive outcomes: Sam wins, Alex wins, or draw. Verify that $$P(\\text{Sam wins}) + P(\\text{Alex wins}) + P(\\text{draw}) = 1$$. By symmetry of the computation (Alex wins when $$R > S$$, draw when $$R = S$$), you can compute the other two probabilities and check the sum. If the total is not 1 (or very close, allowing for rounding), you've made a sign error, an inequality-direction error (using $$\\geq$$ instead of $$>$$), or missed a case. This catches the common mistake of including draws as wins.\n\nTakeaway: Wins + Losses + Draws = 1. If it doesn't, find the missing or double-counted probability.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_13"}, {"question": "S1 May 2024 Q3(c) — Given the coding equation $$10y = w - 20$$, what wrong inversion produces a nonsense mean, and how do you avoid it? (2 steps)", "answer": "- Step 1: The wrong inversion: treating the equation as if $$w = (y - 20)/10$$, then substituting $$\\sum y = 104$$ to get $$\\bar{w} = (104 - 20)/(10 \\times 50) = 0.168$$, which is nonsensical for pebble weights. This error comes from rearranging incorrectly — subtracting 20 from $$y$$ instead of adding 20 to $$10y$$, and dividing when you should multiply.\n- Step 2: The correct inversion: $$10y = w - 20 \\Rightarrow w = 10y + 20$$. Then $$\\bar{w} = 10\\bar{y} + 20 = 10(104/50) + 20 = 10(2.08) + 20 = 40.8$$. The defence: always rearrange to express the **original variable** ($$w$$) in terms of the **coded variable** ($$y$$), not the other way around. Write \"$$w = \\ldots$$\" explicitly before substituting any numbers.\n\nTakeaway: Rearrange to \"$$w = \\text{something in } y$$\" first. Then compute $$\\bar{y}$$, then transform. Never substitute $$\\sum y$$ directly into a half-rearranged equation.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_16"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "S1 May 2024 Q1(a) — When you see a back-to-back stem-and-leaf diagram for the first time in an exam, what is the very first thing you must do before reading any values, and why? (2 steps)", "answer": "- Step 1: Read the **key**. For example, \"5 | 6 | 3 means 65 cm for Birch and 63 cm for Maple\" tells you the stem represents tens and the leaves represent units. Without this, you might misread 2|8 as 2.8 or 280.\n- Step 2: Confirm the reading direction — the **left-hand leaves are read right-to-left** (outward from the stem). This is the single most common source of transcription error on back-to-back diagrams. If you read left-to-left, every value on the Birch side will be listed in the wrong order.\n\nThe key anchors your interpretation; the direction rule prevents a cascading error that would corrupt every downstream calculation (quartiles, outliers, box plot).", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "S1 May 2024 Q1(a) — In a stem-and-leaf diagram, a leaf position is labelled \"$k$\". A student writes the value as \"$k + 7$\" (adding the next leaf). What is the correct interpretation of $k$, and why does this matter? (2 steps)", "answer": "- Step 1: $k$ is a **single digit** — it occupies one leaf position and represents a value of the form (stem × 10) + $k$. For stem 4, the value is $40 + k$, not $k + 7$ or any other combination.\n- Step 2: The leaves in each row must remain in **ascending order**. If the leaves in stem 4 are $1, 1, 1, k, 7, 8$, then $k$ must satisfy $1 \\le k \\le 7$ (actually $1 \\le k \\le 6$ since 7 is the next distinct leaf, but the key point is $k$ is bounded by its neighbours).\n\nTreating $k$ as a frequency or a sum is a category error — it's a placeholder for one specific data value, constrained by the ordering of the row.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "S1 May 2024 Q1(a) — For a dataset with $N = 32$ (even), how do you locate the median, and what is the common pitfall? (2 steps)", "answer": "- Step 1: For even $N$, the median is the **mean of the $\\frac{N}{2}$th and $(\\frac{N}{2}+1)$th** ordered values. Here, that's the 16th and 17th values.\n- Step 2: You must use **cumulative frequency** to find which stem row contains these positions. For Maple, the cumulative frequencies are 5, 12, 18, 25, 28, 30, 32 — so positions 16 and 17 both fall in the stem-4 row (which holds positions 13–18).\n\nCommon pitfall: using only position 16 or only position 17, or forgetting to average them. For even $N$, the median is never a single position — it's always the midpoint of two.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "S1 May 2024 Q1(b) — What is the Edexcel S1 rule for finding the lower quartile position $Q_1$ when $n/4$ is **not** an integer? Give the rule and explain why the GCSE formula fails here. (2 steps)", "answer": "- Step 1: If $n/4$ is **not** an integer, **round up** to the next whole number and take that ordered value. For $n = 35$: $35/4 = 8.75$, so round up to position 9.\n- Step 2: The GCSE/M-stats formula uses $(n+1)/4$, which for $n=35$ gives position 9 — the same answer here, but the method is different and can diverge for other values. Edexcel S1 requires the \"round up\" rule explicitly. Using $(n+1)/4$ is technically the wrong method even when it accidentally gives the right number.\n\nThe two rules are philosophically different: Edexcel says \"if the position falls between two data points, move to the next one up\" rather than interpolating.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": true}, {"question": "S1 May 2024 Q1(b) — What is the Edexcel S1 rule for finding the quartile position when $n/4$ **is** an integer? Give an example with $n = 32$. (2 steps)", "answer": "- Step 1: If $n/4$ **is** an integer, take the **average** of the $(n/4)$th and $(n/4 + 1)$th values. For $n = 32$: $32/4 = 8$, so $Q_1$ = average of the 8th and 9th ordered values.\n- Step 2: The same logic applies to $Q_3$: $3n/4 = 24$, so $Q_3$ = average of the 24th and 25th values.\n\nThis is the complement of the \"round up\" rule. When the position lands exactly between two data points, Edexcel interpolates (averages), rather than rounding either way.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "S1 May 2024 Q1(b) — A student calculates $Q_1$ for Birch ($n=35$) as the 6th value (35 cm). What went wrong in their positional calculation? (2 steps)", "answer": "- Step 1: The student likely computed $35/4 = 8.75$ and then **truncated** to a nearby position, or used an entirely wrong formula. Position 6 gives the value 35, but the correct position is 9 (round 8.75 up), which gives 39.\n- Step 2: The error propagates: wrong $Q_1$ → wrong IQR → wrong outlier fences → wrong box plot. A single positional mistake costs marks across parts (b), (c), and (d).\n\nAlways write \"$n/4 = 8.75$, round up → position 9\" as a visible line so the examiner (and you) can verify the logic.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "S1 May 2024 Q1(c) — When showing that a dataset has \"only one outlier,\" what two fences must you calculate, and why must you quote both even if one has no outliers beyond it? (2 steps)", "answer": "- Step 1: Calculate both the **lower fence** $Q_1 - 1.5 \\times \\text{IQR}$ and the **upper fence** $Q_3 + 1.5 \\times \\text{IQR}$. For Birch: lower = $39 - 27 = 12$, upper = $57 + 27 = 84$.\n- Step 2: You must quote both because the question asks you to **show** there is only one outlier. If you only check the upper fence, you haven't demonstrated that no values fall below the lower fence. The marker needs to see both comparisons: smallest value 28 > 12 (no low outlier) and only 85 > 84 (one high outlier).\n\nWriting $1.5 \\times \\text{IQR}$ as a separate line also earns the method mark, even if your quartile values were wrong.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "S1 May 2024 Q1(c) — What is the outlier definition used in Edexcel S1, and what is the common mistake with the multiplier? (2 steps)", "answer": "- Step 1: An outlier is any value $x$ such that $x < Q_1 - 1.5(Q_3 - Q_1)$ or $x > Q_3 + 1.5(Q_3 - Q_1)$. The multiplier is always **1.5**, not 1.0 or 2.0.\n- Step 2: Common mistake: forgetting the 1.5 and computing $Q_1 - \\text{IQR}$ and $Q_3 + \\text{IQR}$ instead. This would give fences of 21 and 75 (instead of 12 and 84), falsely identifying several values as outliers.\n\nThis formula is **NOT** in the formula booklet — you must memorise it. The 1.5 multiplier comes from the Tukey convention for \"mild\" outliers.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "S1 May 2024 Q1(d) — When drawing a box plot that has an outlier, where does the upper whisker end, and what happens to the outlier? (2 steps)", "answer": "- Step 1: The upper whisker ends at the **most extreme non-outlier value** in the data. For Birch, the max is 85 (an outlier), so the whisker stops at **76** (the next largest value that is not an outlier).\n- Step 2: The outlier (85) is plotted as a **separate point** — typically a cross (×) or asterisk (*) — beyond the whisker. Do NOT draw the whisker through to 85.\n\nCommon mistake: drawing the whisker to the maximum value including the outlier. This defeats the purpose of the box plot, which is to show the spread of the \"typical\" data while flagging extreme values separately.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "S1 May 2024 Q1(e) — When asked to \"comment on any difference in the distributions,\" what must your answer include to earn the mark? (2 steps)", "answer": "- Step 1: You must **compare a specific statistic** (median, IQR, etc.) and **state both numerical values**. For example: \"The median Birch growth (48 cm) is greater than the median Maple growth (45 cm).\"\n- Step 2: Avoid vague statements like \"Birch are taller\" with no numbers, or using the word \"average\" without specifying which measure (mean vs median). The mark is for the right comparison with the right values.\n\nA one-sentence answer is sufficient — but it must pair a statistic name with two numbers.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "S1 May 2024 Q1(f) — When told \"there is no change to the box plot\" after adding new data, how many statistical constraints does this create, and what are they? (2 steps)", "answer": "- Step 1: It creates **five** constraints — one for each of the box plot's summary statistics: **min, $Q_1$, median, $Q_3$, max** must all remain unchanged.\n- Step 2: Each constraint gives an inequality or equation on the new data values. For example, \"max stays 80\" means $2a \\le 80$ (so $a \\le 40$), and \"$Q_1$ stays 36\" means $a \\ge 36$ (so the 9th and 10th values in the new sorted list remain 36).\n\nCommon mistake: using only the ordering constraint ($27 \\le a \\le 48$) and stopping there. This misses the stricter bounds from $Q_1$ and the max.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "S1 May 2024 Q1(f) — When adding 4 new values to a dataset of 32 (new $N = 36$), and $N$ is now divisible by 4, how does the quartile rule change compared to $N = 32$? (2 steps)", "answer": "- Step 1: For $N = 36$, $N/4 = 9$ (an integer), so $Q_1$ is now the **average of the 9th and 10th** ordered values (not just the 9th value alone).\n- Step 2: This is crucial for the \"no change\" constraint: both the 9th and 10th values must remain 36 for $Q_1 = 36$ to hold. If $a < 36$, it would insert itself between positions 9 and 10, displacing one of the 36s and changing $Q_1$.\n\nThe switch from \"round up\" ($N=32$, non-integer position) to \"average\" ($N=36$, integer position) is exactly the kind of rule-change that creates exam traps.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "S1 May 2024 Q1(f) — A student concludes $27 \\le a \\le 48$ for the range of $a$. They used the ordering constraint only. What two stricter constraints did they miss? (3 steps)", "answer": "- Step 1: **The max constraint**: $2a \\le 80$ (the new maximum must not exceed the box plot's max of 80). This gives $a \\le 40$, which is stricter than $a \\le 48$.\n- Step 2: **The $Q_1$ constraint**: $a \\ge 36$. If $a < 36$, the new 9th and 10th values would no longer both be 36, so $Q_1$ would change.\n- Step 3: Combining: $36 \\le a \\le 40$. The ordering constraint ($27 \\le a \\le 48$) is necessary but not sufficient — it's a weaker bound that the box-plot constraints tighten.\n\nThe tutor in the Loom made this exact error ($27 \\le a \\le 54$), ignoring both the $Q_1$ and max constraints.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": true}, {"question": "S1 May 2024 Q2(a) — When asked to find $P(2X - 3 > 5)$ for a discrete random variable, what must you do before summing any probabilities? (2 steps)", "answer": "- Step 1: **Rearrange the inequality first** to isolate $X$: $2X - 3 > 5 \\Rightarrow X > 4$. Only then can you identify which values of $X$ satisfy the condition.\n- Step 2: Sum the probabilities for **all** valid $x$ values: $P(X=5) + P(X=7) + P(X=8) = 0.2 + 0.1 + 0.15 = 0.45$.\n\nCommon pitfall: including $X = 4$ because \"$4$ is close to the boundary.\" The inequality is strict ($>$), so $X = 4$ is excluded.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "S1 May 2024 Q2(b) — When computing $E(X^2)$ from a probability table, what is the formula, and what is the most common arithmetic mistake? (2 steps)", "answer": "- Step 1: $E(X^2) = \\sum x^2 \\cdot P(X = x)$. You square the **$x$-value**, then multiply by its probability. For example, for $x = 2$ with $p = 0.25$: the term is $2^2 \\times 0.25 = 1.0$.\n- Step 2: The most common mistake is **squaring the probability** instead of $x$: writing $2 \\times 0.25^2 = 0.125$ instead of $4 \\times 0.25 = 1$. The squaring applies to the outcome, not the likelihood.\n\nAnother pitfall: accumulating five terms and making an arithmetic slip. Write each term on a separate line.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "S1 May 2024 Q2(b) — What is the formula for $\\operatorname{Var}(X)$ in terms of $E(X)$ and $E(X^2)$, and why do you subtract $[E(X)]^2$ rather than $E(X)$? (2 steps)", "answer": "- Step 1: $\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$. This is the \"computational\" or \"shortcut\" formula for variance.\n- Step 2: You subtract $[E(X)]^2$ (the square of the mean) because variance measures the average squared **deviation** from the mean: $E[(X - \\mu)^2] = E(X^2) - 2\\mu E(X) + \\mu^2 = E(X^2) - \\mu^2$. Subtracting just $E(X)$ would be dimensionally wrong (mixing $x^2$ units with $x$ units).\n\nThis formula IS in the IAL booklet, but the equivalent $\\frac{\\sum x^2}{n} - \\bar{x}^2$ for raw data is NOT — you must memorise that one separately.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "S1 May 2024 Q2(c) — Given $Y = aX - b$ with $E(Y)$ and $\\operatorname{Var}(Y)$ known, why should you solve for $a$ using the **variance** equation first, rather than starting with expectation? (2 steps)", "answer": "- Step 1: The variance equation $\\operatorname{Var}(Y) = a^2 \\operatorname{Var}(X)$ involves only **one** unknown ($a$), because the constant $b$ disappears (adding a constant doesn't change spread). This gives $a^2 = \\operatorname{Var}(Y)/\\operatorname{Var}(X) = 66.24/4.14 = 16$, so $a = 4$.\n- Step 2: Starting with $E(Y) = aE(X) - b$ gives an equation in **two** unknowns ($a$ and $b$), which you can't solve alone. By finding $a$ from variance first, you reduce the expectation equation to one unknown: $13.4 = 4(4.6) - b \\Rightarrow b = 5$.\n\nStrategy: always eliminate the constant first using variance, then recover it from expectation.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "S1 May 2024 Q2(c) — When solving $a^2 = 16$ from the variance equation, why must you choose $a = 4$ and not $a = -4$? (2 steps)", "answer": "- Step 1: The question states that $a$ and $b$ are **positive constants**. So $a = -4$ is rejected by the problem's constraints.\n- Step 2: Even without this constraint, $a = -4$ would give $E(Y) = -4(4.6) - b = -18.4 - b$, requiring $b$ to be large and negative to match $E(Y) = 13.4$. The question specifies positive $b$ too, so this is doubly impossible.\n\nAlways re-read the question for sign restrictions before choosing the root.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "S1 May 2024 Q2(c) — A student writes $\\operatorname{Var}(aX - b) = a \\operatorname{Var}(X)$. What is wrong, and what is the correct formula? (2 steps)", "answer": "- Step 1: The correct formula is $\\operatorname{Var}(aX - b) = a^2 \\operatorname{Var}(X)$. The **square** on $a$ is essential because variance measures squared deviations — scaling by $a$ scales deviations by $a$, so squared deviations scale by $a^2$.\n- Step 2: The constant $-b$ has **no effect** on variance. Shifting the distribution left or right doesn't change its spread. So $\\operatorname{Var}(aX - b) = \\operatorname{Var}(aX) = a^2 \\operatorname{Var}(X)$.\n\nThis formula IS in the booklet — but students still forget the square under exam pressure. A sanity check: if $a = 10$, variance should scale by 100, not 10.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "S1 May 2024 Q2(d) — Sam spins once (score $S = X_1$) and Alex spins once (score $R = 2X_2 - 3$). Why are $S$ and $R$ independent, and how does this affect the probability calculation? (2 steps)", "answer": "- Step 1: $S$ and $R$ come from **two separate spins** of the spinner. The outcome of Sam's spin has no influence on Alex's spin, so $P(S = s, R = r) = P(S = s) \\times P(R = r)$.\n- Step 2: This means for each value of $S$, you can compute $P(R < S)$ separately and then multiply: $P(S > R) = \\sum_s P(S = s) \\times P(R < s)$.\n\nCommon pitfall: treating $S$ and $R$ as if they depend on the **same** spin (i.e., computing $P(X_1 > 2X_1 - 3)$). The subscripts $X_1$ and $X_2$ indicate different trials.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "S1 May 2024 Q2(d) — What is the systematic approach to find $P(\\text{Sam wins})$ when Sam and Alex use different scoring functions? (3 steps)", "answer": "- Step 1: **Build the $R$ distribution first.** Transform each $X_2$ value through $R = 2X_2 - 3$: $X_2 = 2 \\to R = 1$, $X_2 = 4 \\to R = 5$, etc. Tabulate $R$ values with their probabilities.\n- Step 2: **Condition on $S$.** For each possible $S$ value, find $P(R < S)$ by summing the probabilities of all $R$ values strictly less than $S$. For example, if $S = 7$, then $R < 7$ means $R \\in \\{1, 5\\}$, so $P(R < 7) = 0.25 + 0.3 = 0.55$.\n- Step 3: **Multiply and sum.** $P(S > R) = \\sum_s P(S = s) \\times P(R < s)$. Each term is a product because of independence.\n\n\"Higher score wins\" means strict inequality ($>$). Ties are draws, not wins.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": true}, {"question": "S1 May 2024 Q3(a) — In a histogram, what quantity is proportional to frequency, and how does this determine the two scale factors you need? (3 steps)", "answer": "- Step 1: In a histogram, **area** is proportional to frequency. Since area = width × height, width ∝ class width and height ∝ frequency density (FD = frequency ÷ class width).\n- Step 2: From the reference bar, derive the **width scale**: if a bar is 2.5 cm wide representing a class width of 4 mm, the scale is $2.5/4 = 0.625$ cm per mm.\n- Step 3: Derive the **height scale**: if the bar is 7.5 cm tall representing FD = 5, the scale is $7.5/5 = 1.5$ cm per unit of FD.\n\nCommon mistake: using frequency directly as height (must use FD), or multiplying the reference bar's width by the new class width directly instead of computing the per-mm scale.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "S1 May 2024 Q3(a) — A student computes the new bar width as $2 \\times 2.5 = 5$ cm (doubling the reference width because the class width ratio is 2:4). Why is this correct in this case, but what's the safer method? (2 steps)", "answer": "- Step 1: The logic \"class width 2 mm is half of 4 mm, so bar width is half of 2.5 cm = 1.25 cm\" is correct — but the student wrote $2 \\times 2.5 = 5$, which is **wrong** (they multiplied instead of halved). The correct answer is $2 \\times 0.625 = 1.25$ cm.\n- Step 2: The safer method: always compute the **per-unit scale** first (0.625 cm/mm), then multiply by the target class width. This works regardless of whether the new class is wider or narrower than the reference, and avoids ratio-direction errors.\n\nDeriving the scale constant is a one-time calculation that protects you from ratio confusion.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "S1 May 2024 Q3(b) — For estimating the median of grouped continuous data using linear interpolation, what position do you use, and how does this differ from discrete data? (2 steps)", "answer": "- Step 1: For grouped continuous data, use **$N/2$** as the median position. For $N = 50$, the median is at position 25. This is the Edexcel convention for grouped data.\n- Step 2: For discrete data, you would use $(N+1)/2$. The difference arises because grouped data treats values as continuously distributed within each class, so there's no \"gap\" between the $N/2$th and $(N/2+1)$th observations.\n\nUsing $(N+1)/2 = 25.5$ for grouped data is a common pitfall that leads to a slightly different (and wrong) interpolated value.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}, {"question": "S1 May 2024 Q3(b) — What is the linear interpolation formula for the median of grouped data, and what does each symbol represent? (2 steps)", "answer": "- Step 1: $$\\text{Median} = L + \\frac{N/2 - F_b}{f_m} \\times c$$ where $L$ = lower class boundary of the median class, $F_b$ = cumulative frequency before the median class, $f_m$ = frequency of the median class, $c$ = class width of the median class.\n- Step 2: The intuition: you've already passed $F_b$ observations, and you need to go $\\frac{N/2 - F_b}{f_m}$ of the way through the median class (a fraction between 0 and 1), then multiply by the class width $c$ to convert from \"fraction of observations\" to \"actual units.\"\n\nThis formula is NOT in the booklet — memorise it. Key detail: use the **lower class boundary** $L$ (e.g., 32, not 31.5 or the midpoint).", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": true}, {"question": "S1 May 2024 Q3(c) — Given the coding $10y = w - 20$, how do you find $\\bar{w}$ from $\\sum y$, and what is the common mistake in the transformation direction? (2 steps)", "answer": "- Step 1: Rearrange to express $w$ in terms of $y$: $w = 10y + 20$. Then $\\bar{w} = 10\\bar{y} + 20$. Compute $\\bar{y} = \\sum y / n = 104/50 = 2.08$, so $
