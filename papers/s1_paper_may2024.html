he scores are the **same** it is a draw.\" → use $$P(S > R)$$, strict.\n- Step 2: Sanity check: $$P(\\text{Sam wins}) + P(\\text{Alex wins}) + P(\\text{draw}) = 1$$. If you used $$\\ge$$ instead of $$>$$, you'd double-count the draws.\n\nPitfall: using $$\\ge$$ would conflate the draw event with Sam winning.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "In a histogram, what is \"frequency density\" and what mathematical relationship does it enforce?", "answer": "- Step 1: $$\\text{FD} = \\text{frequency} \\div \\text{class width}$$.\n- Step 2: This enforces that the **AREA** of each bar is proportional to its frequency (width × FD = frequency).\n- Step 3: Therefore the bar HEIGHT on the page must be proportional to FD, not to raw frequency — otherwise wider classes would dominate visually.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "S1 May 2024 Q3(a) — given a reference bar of known cm-width and cm-height, how do you compute the dimensions of another bar on the same histogram? (3 steps)", "answer": "- Step 1: From the reference bar, compute its class width (mm) and its frequency density (= freq ÷ class width).\n- Step 2: Derive TWO scale factors:\n+ Width scale: cm-width per mm-of-class-width\n+ Height scale: cm-height per unit-of-FD\n- Step 3: For the target bar, compute its class width (mm) and FD; multiply by the two scale factors.\n\nPitfall: directly multiplying the target's class width by the reference bar's cm-width — that's not how scales work.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "What's the linear interpolation formula for the median of grouped data, and which value of \"position\" do you use? (2 steps)", "answer": "- Step 1: $$\\text{Median} = L + \\dfrac{N/2 - F_b}{f_m} \\times c$$\n+ $$L$$ = lower class boundary of the median class\n+ $$F_b$$ = cumulative frequency BEFORE the median class\n+ $$f_m$$ = frequency of the median class\n+ $$c$$ = width of the median class\n- Step 2: For grouped CONTINUOUS data, use $$N/2$$ (not $$(N+1)/2$$). The $$(N+1)/2$$ rule is for ungrouped discrete data.\n\nNot in the formula booklet — memorise it.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "When applying linear interpolation, what value do you use for $$L$$ if the class is \"$$30 \\le x < 32$$\"? Why?", "answer": "Use $$L = 30$$ exactly — the **lower class boundary** as stated. Do NOT use $$29.5$$ (the lower-bound trick from \"to the nearest\" data) and do NOT use $$31$$ (the midpoint).\n\nThe class is defined on a continuous scale from 30 to 32; interpolation assumes uniform distribution **within** this interval, so the lower endpoint is 30.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Given a coding $$10y = w-20$$, what's the inverse transform from $$y$$ to $$w$$, and how does the mean transform?", "answer": "- Step 1: Rearrange: $$w = 10y + 20$$.\n- Step 2: Linear coding rule for the mean: $$\\bar{w} = 10\\bar{y} + 20$$. The same coefficients pass through expectations.\n- Step 3: Compute $$\\bar{y}$$ from $$\\sum y / n$$ first, then apply the transform — do NOT individually transform each $$y$$ value.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Under the coding $$w = 10y + 20$$, how do the standard deviation and variance of $$w$$ relate to those of $$y$$?", "answer": "- Step 1: $$\\operatorname{Var}(w) = 10^2 \\operatorname{Var}(y) = 100 \\operatorname{Var}(y)$$. The constant +20 drops out.\n- Step 2: $$\\sigma_w = 10 \\sigma_y$$ — the multiplicative coefficient passes through SD without squaring (since SD = $$\\sqrt{\\text{Var}}$$).\n- Step 3: Slip: scaling variance by 10 instead of 100. Always remember variance carries $$a^2$$, SD carries $$|a|$$.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "When computing SD via variance scaling, in what order should you take the square root vs apply the coding factor, and why?", "answer": "- Step 1: Order: compute $$\\operatorname{Var}(y)$$, then scale to $$\\operatorname{Var}(w) = 100 \\operatorname{Var}(y)$$, THEN square root to get $$\\sigma_w$$.\n- Step 2: Equivalently: compute $$\\sigma_y = \\sqrt{\\operatorname{Var}(y)}$$, then $$\\sigma_w = 10 \\sigma_y$$.\n- Step 3: Both work, but the trap is taking $$\\sqrt{}$$ at the wrong moment and forgetting the $$10^2$$ factor.\n\nAlways square root LAST if you're working in variance.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": false}, {"question": "If a new data value equal to the current mean is added to a sample, what happens to the mean and the standard deviation? (3 steps)", "answer": "- Step 1: **Mean**: unchanged. Adding a value equal to $$\\bar{x}$$ gives new mean $$\\tfrac{n\\bar{x} + \\bar{x}}{n+1} = \\tfrac{(n+1)\\bar{x}}{n+1} = \\bar{x}$$.\n- Step 2: **SD**: decreases. The added value contributes $$(\\bar{x}-\\bar{x})^2 = 0$$ to the sum of squared deviations, but the denominator grows from $$n$$ to $$n+1$$.\n- Step 3: So variance = (same numerator)/(larger denominator) → variance decreases → SD decreases.\n\nPitfall: saying \"SD unchanged\" — only the mean is unchanged.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "For a \"state the effect and give a reason\" question about adding a data point, what does the marker need from you?", "answer": "Two things, both required:\n- The **effect** (e.g. \"no change\" / \"decreases\" / \"increases\").\n- A **reason** referencing the structure (e.g. \"because the added value equals the mean, contributing 0 to the squared-deviation sum while $$n$$ grows\").\n\nWithout the reason, you lose the justification mark even if the effect is right.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "What are the formulas for $$S_{xy}$$ and $$S_{xx}$$ used in regression and correlation? (2 steps)", "answer": "- Step 1: $$S_{xy} = \\sum xy - \\dfrac{(\\sum x)(\\sum y)}{n}$$\n- Step 2: $$S_{xx} = \\sum x^2 - \\dfrac{(\\sum x)^2}{n}$$. Analogous for $$S_{yy}$$.\n\nThese ARE in the IAL booklet. Key trap: dividing by $$n^2$$ instead of $$n$$, or forgetting to take $$(\\sum x)^2$$ before dividing.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "What's the formula for the product moment correlation coefficient $$r$$, and what's the sanity-check range?", "answer": "- Step 1: $$r = \\dfrac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$.\n- Step 2: Sanity check: $$-1 \\le r \\le 1$$. If you compute $$|r|>1$$, you've made an arithmetic error or forgotten the square root in the denominator.\n- Step 3: Sign of $$r$$ matches sign of $$S_{xy}$$ (the only signed quantity — $$S_{xx}$$ and $$S_{yy}$$ are always non-negative).", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": false}, {"question": "For the regression line \"$$y$$ on $$x$$\" of the form $$y = a + bx$$, what are the formulas for the gradient and intercept, and what's the directional pitfall? (2 steps)", "answer": "- Step 1: Gradient $$b = \\dfrac{S_{xy}}{S_{xx}}$$; intercept $$a = \\bar{y} - b\\bar{x}$$.\n- Step 2: Directional pitfall: \"$$y$$ on $$x$$\" means you're predicting $$y$$ FROM $$x$$, so divide $$S_{xy}$$ by $$S_{xx}$$. For \"$$x$$ on $$y$$\" you'd divide by $$S_{yy}$$ instead — a different line.\n\nMnemonic: \"$$y$$ on $$x$$ → divide by $$S_{xx}$$\" (denominator matches the predictor).", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "When computing a regression intercept $$a = \\bar{y} - b\\bar{x}$$, should you use the rounded or unrounded gradient $$b$$, and why?", "answer": "Use the **unrounded** $$b$$. Rounding $$b$$ to 3 s.f. before computing $$a$$ can shift $$a$$ by enough to change its 3rd significant figure.\n\nCarry full calculator precision through the intermediate step; round only at the FINAL answer to 3 s.f. This is a general principle in \"show that\" questions where the target answer is given to 3 s.f.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "How do you interpret the gradient of a regression line of $$g$$ on $$d$$ (girth on length) in context, for a 1-mark interpretation question?", "answer": "\"For every 1 cm increase in the **length** of a bear, the **girth** increases by approximately $$b$$ cm on average.\"\n\nThree required ingredients:\n- A specific increment (\"for every 1 cm increase\").\n- Named variables in context (not just \"$$x$$\" and \"$$y$$\").\n- Units stated explicitly.\n\nPitfall: \"the line slopes up\" or \"they're positively correlated\" — too vague, no mark.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "For a regression prediction at a new $$x$$-value, what's the criterion that decides whether the estimate is reliable?", "answer": "- Step 1: Reliable IF the $$x$$-value lies WITHIN the observed range of $$x$$-data (interpolation).\n- Step 2: Unreliable IF outside the observed range (extrapolation) — the linear relationship may not hold there.\n- Step 3: Justification phrasing: \"outside the observed range of bear lengths, so the linear model may not extend that far.\"\n\nPitfall: vague answers like \"the data isn't accurate\" — must name extrapolation / outside-range.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "S1 May 2024 Q4(f) — \"for every $$x$$ cm increase in length there is a 17.3 cm increase in girth, find $$x$$\" — what's the trick that distinguishes this from \"find $$d$$ when $$g = 17.3$$\"?", "answer": "- Step 1: 17.3 is an **increment** in $$g$$, not a value of $$g$$. Increments propagate through the gradient only — the intercept does not enter.\n- Step 2: Equation: $$0.722 x = 17.3$$, NOT $$-42.3 + 0.722 x = 17.3$$.\n- Step 3: Solve $$x = 17.3 / 0.722 \\approx 24.0$$.\n\nTrigger phrase: \"increase of $$\\Delta y$$\" → use $$\\Delta y = b \\Delta x$$ only.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": true}, {"question": "For a normal distribution problem $$X \\sim N(\\mu, \\sigma^2)$$, what does \"standardisation\" mean and what's the formula? (2 steps)", "answer": "- Step 1: Standardisation converts $$X$$ to the standard normal $$Z \\sim N(0,1)$$ via $$Z = \\dfrac{X-\\mu}{\\sigma}$$.\n- Step 2: After standardising, look up probabilities from the standard normal tables.\n\nPitfall: dividing by $$\\sigma^2$$ instead of $$\\sigma$$ — the parameter in $$N(\\mu, \\sigma^2)$$ is the variance, but standardisation uses the SD.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "S1 May 2024 Q5(b) — when a problem says \"the fastest 60% of adults\", which tail of the normal curve do you use, and what's the equation you set up?", "answer": "- Step 1: \"Fastest\" = **shortest times** = **lower** tail (left side of the curve).\n- Step 2: Equation: $$P(X < t) = 0.60$$, where $$t$$ is the cutoff time.\n- Step 3: Inverse normal: $$z = \\Phi^{-1}(0.60) = 0.2533$$ (positive, since 0.60 > 0.5).\n\nCritical trap (the headline mistake on this paper): treating \"fastest\" as upper tail and setting $$P(X<t) = 0.40$$ — gives the WRONG cutoff.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "What's the strategy for handling \"fastest $$p\\%$$\" vs \"slowest $$p\\%$$\" in any normal distribution context-question?", "answer": "- Step 1: SKETCH the normal curve before doing any algebra.\n- Step 2: Translate the English:\n+ \"Fastest $$p\\%$$\" → shortest times → LOWER tail → $$P(X<t) = p/100$$\n+ \"Slowest $$p\\%$$\" → longest times → UPPER tail → $$P(X>t) = p/100$$\n- Step 3: Shade the relevant region on your sketch and label it $$p/100$$.\n\nThis explicit sketch step is the antidote to flipping the tail direction under exam pressure.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "S1 May 2024 Q5(c) — given $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$ for $$T \\sim N(\\mu, \\sigma^2)$$, what's the strategy to extract $$\\sigma$$? (3 steps)", "answer": "- Step 1: The interval is **symmetric** about $$\\mu$$, so $$P(T < \\mu-10) = (1 - 0.95)/2 = 0.025$$.\n- Step 2: Standardise the lower endpoint: $$\\dfrac{(\\mu-10) - \\mu}{\\sigma} = -1.96$$ (since $$\\Phi^{-1}(0.025) = -1.96$$).\n- Step 3: Solve: $$\\sigma = \\dfrac{10}{1.96} \\approx 5.10$$.\n\nSanity check: $$\\sigma$$ should be of similar order to the interval half-width. 10/1.96 ≈ 5, NOT 0.5.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "What's the sanity check for $$\\sigma$$ when you compute it from a symmetric interval like $$P(\\mu - k < T < \\mu + k) = 0.95$$, and why does this matter?", "answer": "- Step 1: $$\\sigma = k/1.96$$. Since 1.96 ≈ 2, the answer should be roughly $$k/2$$ — same order of magnitude as $$k$$.\n- Step 2: If $$k=10$$, $$\\sigma$$ should be about 5, NOT 0.5 or 50. A decimal slip here (writing 0.510 instead of 5.10) is a critical exam-killer.\n- Step 3: This was THE headline error on this paper — confirmed even the tutor made the slip on tape. Always sanity-check magnitude before continuing.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "What's the trigger phrase that forces conditional probability, and what's the first formula you write down BEFORE substituting numbers?", "answer": "- Step 1: Trigger: any phrase like \"given that B\", or notation $$P(A|B)$$.\n- Step 2: First write down: $$P(A | B) = \\dfrac{P(A \\cap B)}{P(B)}$$.\n- Step 3: ONLY then start substituting probabilities. This guarantees you don't accidentally compute $$P(A \\cap B)$$ instead, or use the wrong denominator.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "For a conditional probability $$P(A | B)$$ where $$A \\subset B$$ (A is a subset of B), what simplification occurs in the numerator?", "answer": "- Step 1: If $$A \\subset B$$, then $$A \\cap B = A$$ — every outcome in $$A$$ is automatically in $$B$$.\n- Step 2: So $$P(A | B) = \\dfrac{P(A)}{P(B)}$$ — the intersection collapses.\n- Step 3: Example: $$\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$$ because the first interval lies inside the second. So $$P(T > \\mu-5 | T > \\mu-10) = \\dfrac{P(T > \\mu-5)}{P(T > \\mu - 10)}$$.\n\nRecognising subsets saves a step and avoids confusion.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": false}, {"question": "S1 May 2024 Q5(c) — when computing the denominator $$P(T > \\mu - 10)$$, why is the answer 0.975 (not 0.95)?", "answer": "- Step 1: 0.95 is $$P(\\mu - 10 < T < \\mu + 10)$$ — the SYMMETRIC interval.\n- Step 2: $$P(T > \\mu - 10) = P(\\mu - 10 < T < \\infty)$$ = 0.95 + 0.025 = 0.975. It includes BOTH the central 0.95 region AND the upper tail (0.025).\n- Step 3: Equivalently, $$P(T > \\mu - 10) = 1 - P(T < \\mu - 10) = 1 - 0.025 = 0.975$$.\n\nCommon slip: using 0.95 as the denominator — drops the upper tail.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "When converting a Venn diagram intersection $$P(C \\cap S)$$ from a 3-set diagram, which regions do you include? (2 steps)", "answer": "- Step 1: $$P(C \\cap S)$$ includes ALL subregions where both $$C$$ and $$S$$ are present — this means BOTH the \"C∩S only\" region AND the triple-overlap $$C \\cap S \\cap G$$.\n- Step 2: So $$P(C \\cap S) = P(C \\cap S \\cap G') + P(C \\cap S \\cap G)$$.\n\nPitfall: using only the \"$$C \\cap S$$ only\" region (excluding the triple-overlap) — gives wrong $$P(C \\cap S)$$ and wrong independence equation.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "S1 May 2024 Q6(b) — what's the trigger condition for using $$P(C \\cap S) = P(C) P(S)$$, and what equation does it produce when one region is unknown?", "answer": "- Step 1: Trigger: \"$$C$$ and $$S$$ are independent.\"\n- Step 2: Compute $$P(C) = $$ sum of all C-regions (4 of them in a 3-set Venn including triple-overlap); $$P(S) = $$ sum of all S-regions; $$P(C \\cap S) = $$ sum of TWO overlap regions including the triple.\n- Step 3: Set $$P(C \\cap S) = P(C) P(S)$$ and solve the resulting linear equation for the unknown region.\n\nTrap: forgetting one of the overlap subregions when summing.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "In a 3-set Venn diagram, how do you set up an equation to find an unknown probability $$q$$ in the \"outside all three\" region?", "answer": "- Step 1: All 8 regions of a 3-set Venn (including \"outside\") must sum to 1.\n- Step 2: Sum the 7 known regions plus $$q$$, set equal to 1, solve for $$q$$.\n- Step 3: Don't forget regions whose value is 0 (e.g. \"G only = 0\" still counts as a region in the sum).", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "S1 May 2024 Q6(e) — what's the fast and safe way to compute \"$$P$$(does NOT play Scrabble)\" from a Venn diagram, and what's the pitfall of the alternative? (3 steps)", "answer": "- Step 1: Fast route: $$P(S') = 1 - P(S)$$. Compute $$P(S)$$ once (sum all S-regions), subtract from 1.\n- Step 2: Alternative route: sum the regions of the Venn that are OUTSIDE $$S$$. There are FOUR such regions: C-only, G-only, C∩G-only, AND the outside-the-three-circles region $$q$$.\n- Step 3: Pitfall: when summing \"outside S\" pieces, learners often forget $$q$$ (the outside region) and/or the G-only region. This causes Phuc's 47 vs correct 105 error.\n\nThe shortcut $$1 - P(S)$$ is **automatically** correct because it counts the entire complement.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "S1 May 2024 Q6(e) — given 76 teenagers play both Chess AND Go, how do you estimate the total number of teenagers in the youth club? (2 steps)", "answer": "- Step 1: $$P(C \\cap G) = $$ sum of BOTH regions inside the C-G overlap = \"C∩G only\" + \"C∩G∩S\" (the triple-overlap). NOT just one of these.\n- Step 2: Total $$= \\dfrac{\\text{count}}{P(C \\cap G)} = \\dfrac{76}{P(C \\cap G)}$$.\n\nTrap: using only $$P(C \\cap G \\cap S) = 0.15$$ as the denominator — drops the \"$$C \\cap G$$ only\" piece $$p$$.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "For Q6(e)-style \"estimate how many teenagers\" questions, why use $$P(S') = 1 - P(S)$$ instead of summing pieces of the Venn diagram?", "answer": "- Step 1: $$1 - P(S)$$ is structural — it automatically captures the entire complement, including the outside-the-three-circles region and any zero-valued sub-regions.\n- Step 2: Summing Venn pieces requires you to enumerate ALL regions outside $$S$$ correctly, including small or zero regions — easy to miss one.\n- Step 3: Strategy: always prefer the complement shortcut when \"not $$A$$\" means the full universe outside $$A$$.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "For Venn diagram probability questions, what does \"the probability that a teenager plays Chess but does NOT play Go\" $$P(C \\cap G')$$ translate to in Venn pieces?", "answer": "- Step 1: $$P(C \\cap G')$$ = all regions of $$C$$ that lie OUTSIDE $$G$$.\n- Step 2: In a 3-set Venn, this is: \"C only\" + \"C∩S only (not G)\". Exclude any region containing $$G$$ (i.e. the \"C∩G only\" region $$p$$ AND the triple-overlap).\n- Step 3: Do NOT use $$P(C) \\cdot P(G')$$ — that's the independence formula, only valid if $$C$$ and $$G$$ are independent (not stated in part (a)).", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "What's the difference between $$P(A \\cap B') $$ and $$P(A) - P(A \\cap B)$$? Are they equal?", "answer": "- Step 1: They are EQUAL. Both compute \"the probability of $$A$$ excluding the part inside $$B$$\".\n- Step 2: $$P(A \\cap B') = P(A) - P(A \\cap B)$$ because $$A$$ splits cleanly into two disjoint pieces: $$A \\cap B$$ and $$A \\cap B'$$.\n- Step 3: This identity is useful when you know $$P(A)$$ and $$P(A \\cap B)$$ but the Venn pieces are not given directly.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": false}, {"question": "When computing $$P(C | S \\cap G)$$ from a Venn diagram, what goes in the numerator vs the denominator? (2 steps)", "answer": "- Step 1: Numerator: $$P(C \\cap S \\cap G)$$ — just the triple-overlap.\n- Step 2: Denominator: $$P(S \\cap G)$$ — the sum of ALL regions inside the $$S$$-$$G$$ overlap, which INCLUDES the triple-overlap.\n\nTrap: forgetting that $$P(S \\cap G)$$ includes $$P(C \\cap S \\cap G)$$, so it must be larger than the numerator.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "What's the general structure of the \"two events sum to a known interval\" trick in normal distribution problems (Q5c-style)?", "answer": "- Step 1: Given $$P(\\mu - k < T < \\mu + k) = p$$, symmetry gives $$P(T < \\mu - k) = P(T > \\mu + k) = (1-p)/2$$.\n- Step 2: Standardise the boundary: $$\\dfrac{\\pm k}{\\sigma} = \\pm \\Phi^{-1}(\\text{tail prob})$$, giving $$\\sigma$$.\n- Step 3: Once $$\\sigma$$ is known, any further probability about $$T$$ standardises in the usual way.\n\nKey insight: the symmetric interval gives you ONE piece of information ($$\\sigma$$), even though it looks like a two-sided constraint.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Why must you \"show all working\" in a \"show that\" question even though the answer is given?", "answer": "- Step 1: The marks in a \"show that\" question are entirely for the **derivation**, not the answer (since the answer is given).\n- Step 2: Each line of working corresponds to a method mark. Skipping algebraic steps risks losing M-marks.\n- Step 3: For a variance \"show that\": write all 5 terms of $$E(X^2) = \\sum x^2 P$$, show $$E(X)^2$$, subtract — each on its own line.\n\nTreat \"show that\" as the chance to earn easy method marks by being verbose.", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": false}, {"question": "What's the dimensional sanity check for the gradient $$b$$ of a regression line where the units of $$x$$ and $$y$$ are both cm?", "answer": "- Step 1: $$b$$ has units of $$y$$-units per $$x$$-unit, i.e. cm per cm = dimensionless ratio.\n- Step 2: A value like $$b = 0.722$$ means: per 1 cm of $$x$$, $$y$$ changes by 0.722 cm. Plausible for a positive linear relationship.\n- Step 3: If you'd gotten $$b = 72.2$$, sanity check: that would mean girth increases by 72 cm per 1 cm of length — implausible.", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "Why is \"$$y$$ on $$x$$\" regression different from \"$$x$$ on $$y$$\" regression, and when does this distinction matter?", "answer": "- Step 1: \"$$y$$ on $$x$$\" minimises **vertical** residuals (errors in $$y$$), giving gradient $$S_{xy}/S_{xx}$$.\n- Step 2: \"$$x$$ on $$y$$\" minimises **horizontal** residuals (errors in $$x$$), giving gradient $$S_{xy}/S_{yy}$$ — a DIFFERENT line in general.\n- Step 3: The two lines coincide only when $$r = \\pm 1$$ (perfect correlation). Otherwise, they intersect at $$(\\bar{x}, \\bar{y})$$ but have different slopes.\n\nChoose the regression direction based on what you're predicting.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": true}, {"question": "What is the IQR, and what's the standard formula relating it to outlier fences?", "answer": "- Step 1: IQR (interquartile range) $$= Q_3 - Q_1$$ — the spread of the middle 50% of the data.\n- Step 2: Outlier fences: lower fence $$= Q_1 - 1.5 \\times \\text{IQR}$$; upper fence $$= Q_3 + 1.5 \\times \\text{IQR}$$.\n- Step 3: The factor 1.5 is the Edexcel/Tukey convention. Any value outside the fences is flagged as an outlier.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "When a question gives you exact summary statistics ($$\\sum x$$, $$\\sum x^2$$, etc.) and asks for the **exact** value of $$S_{xy}$$, what does \"exact\" mean and what's the implication?", "answer": "- Step 1: \"Exact\" means: do NOT round in the answer. Keep all decimals.\n- Step 2: This is a signal that the summary statistics are designed to give a clean number when combined — slight arithmetic carelessness will produce a \"messy\" answer that's wrong.\n- Step 3: Compute the product $$(\\sum x)(\\sum y)$$ in full, divide by $$n$$, then subtract — keep all digits at each step.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": false}, {"question": "What's the \"no-change-to-box-plot when new data added\" strategy for finding the constraint $$a \\le 40$$ from the maximum? (2 steps)", "answer": "- Step 1: Identify which new value could potentially exceed the old max. If new data are $$27, a, 48, 2a$$ and old max is 80, the candidate is $$2a$$ (since $$a \\le 48$$, $$a$$ itself can't exceed 80).\n- Step 2: Require $$2a \\le 80 \\implies a \\le 40$$. This is STRICTER than the ordering constraint $$a \\le 48$$, so it's the binding constraint.\n\nPitfall: keeping only the ordering constraint ($$a \\le 48$$) and missing the box-plot's max constraint.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "In an \"add 4 values, keep $$Q_1$$ fixed\" problem with new $$N=36$$ (divisible by 4), how do you reason about which of the new values can shift $$Q_1$$? (3 steps)", "answer": "- Step 1: With $$N=36$$: $$Q_1$$ = average of 9th and 10th values. So the 9th and 10th values must equal the same pair that gave the old $$Q_1$$.\n- Step 2: Each new value below position 10 in the new sorted list shifts existing values UP by one. Count how many of the 4 new values fall before position 10.\n- Step 3: For the original 9th-10th pair (the old $$Q_1$$-determining values) to STILL occupy positions 9-10 in the new list, exactly TWO of the new values must lie at or below them in order. This pins down a lower bound for $$a$$.\n\nStrategy: think of adding values as \"inserting\" into the sorted list and tracking position shifts.", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": false}, {"question": "Why is sketching a normal distribution curve before computation a high-value habit in S1 exams?", "answer": "- Step 1: Translation from English (\"fastest\", \"slowest\", \"more than\", \"between\") to tail direction is the highest-stakes source of errors.\n- Step 2: A sketch forces you to physically place the cutoff on the correct side, shade the right region, and label probabilities.\n- Step 3: It costs 10 seconds and prevents the \"wrong-tail\" error that wrecks the entire question (worth several marks).\n\nThis is why Q5(b) is a critical example: the headline error here was a translation mistake correctable by a sketch.", "source": "Opus 4.7 ①", "_id": "opus_1_60", "judge_pick": false}, {"question": "What is \"extrapolation\" in regression and why is it unreliable?", "answer": "- Step 1: Extrapolation = using the regression line to predict $$y$$ for $$x$$-values OUTSIDE the observed range.\n- Step 2: It's unreliable because the linear relationship is only EVIDENCED within the observed data; outside this range, the underlying relationship may bend, change slope, or break entirely.\n- Step 3: Standard exam phrasing: \"outside the observed range of [variable], so the linear model may not apply.\"", "source": "Opus 4.7 ①", "_id": "opus_1_61", "judge_pick": false}, {"question": "When you're given $$E(Y) = aE(X) - b$$ and you know $$a$$ but not $$b$$ (and you know $$E(X)$$, $$E(Y)$$), what's the slip risk on the sign of $$b$$?", "answer": "- Step 1: $$Y = aX - b$$ (note the MINUS), so $$E(Y) = aE(X) - b$$.\n- Step 2: Rearrange: $$b = aE(X) - E(Y)$$. With $$a=4$$, $$E(X)=4.6$$, $$E(Y)=13.4$$: $$b = 18.4 - 13.4 = 5$$.\n- Step 3: Slip: writing $$b = E(Y) - aE(X) = 13.4 - 18.4 = -5$$ (wrong sign). Be careful which side you subtract from.\n\nSanity: question says \"$$b$$ is a positive constant\", so $$b=5$$, not $$-5$$.", "source": "Opus 4.7 ①", "_id": "opus_1_62", "judge_pick": false}, {"question": "What's the layout strategy for a Q2(d)-style \"Sam wins\" problem where you condition on $$S$$?", "answer": "- Step 1: TABULATE both distributions ($$S$$ and $$R$$) side-by-side, including all values and probabilities.\n- Step 2: For each value of $$S$$, identify all $$R$$-values strictly less than $$S$$, sum $$P(R < S)$$, multiply by $$P(S)$$.\n- Step 3: Sum the 5 row-products to get $$P(S > R)$$.\n\nWhy a table: it makes systematic errors (missing an $$R$$-value, double-counting) visible.", "source": "Opus 4.7 ①", "_id": "opus_1_63", "judge_pick": true}, {"question": "For the regression \"show that $$g = -42.3 + 0.722d$$\" problem, what arithmetic strategy minimises rounding error?", "answer": "- Step 1: Compute $$b = S_{dg}/S_{dd}$$ with full calculator precision — DO NOT round to 0.722 yet.\n- Step 2: Use the unrounded $$b$$ when computing $$a = \\bar{g} - b\\bar{d}$$.\n- Step 3: Round BOTH $$a$$ and $$b$$ at the very end to 3 s.f., and present in the form $$g = a + bd$$ as requested.\n\nIf you round $$b$$ to 0.722 first, then $$a$$ becomes $$\\approx -42.3$$ but the 3rd s.f. could flip — risky in \"show that\".", "source": "Opus 4.7 ①", "_id": "opus_1_64", "judge_pick": false}, {"question": "What's the mnemonic for \"fastest = lower tail\" so you don't flip the direction under exam pressure?", "answer": "- Step 1: \"Fast\" = \"short time\" = \"small number\" = LOWER tail (left of curve).\n- Step 2: \"Slow\" = \"long time\" = \"large number\" = UPPER tail (right of curve).\n- Step 3: Always sketch and shade BEFORE writing the probability equation. The shaded region's area = the percentage given.\n\nThis is the single highest-yield habit to drill from this paper.", "source": "Opus 4.7 ①", "_id": "opus_1_65", "judge_pick": true}, {"question": "For a \"(a) state effect; (b) give reason\" question on summary statistics, what's the marking pattern?", "answer": "- Step 1: 1 mark for stating the effect (e.g. \"no change\" / \"decreases\").\n- Step 2: 1 mark for justification — the reason must reference the structure (e.g. \"because the new value equals the mean\").\n- Step 3: For two-part questions (mean AND SD), each part has its own state-and-reason pair.\n\nPitfall: stating only the effect with no reason — loses half the marks.", "source": "Opus 4.7 ①", "_id": "opus_1_66", "judge_pick": false}, {"question": "What's the general translation pattern that explains MOST of the errors on the WST01/01 May 2024 paper?", "answer": "- Step 1: The errors cluster at the **interpretation boundary** between English and probability — not at computation.\n- Step 2: Examples: \"fastest\" → wrong tail (Q5b); \"no change to box plot\" → only ordering constraints used (Q1f); \"does not play Scrabble\" → outside region forgotten (Q6e); \"$$\\sigma = 10/1.96$$\" → decimal slip (Q5c).\n- Step 3: Drill: slow down on natural-language phrases, sketch diagrams, list constraints explicitly, sanity-check magnitudes.\n\nPattern: mechanical execution is fine; translation is the bottleneck.", "source": "Opus 4.7 ①", "_id": "opus_1_67", "judge_pick": true}], "count": 68}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "S1 May 2024 Q1 — On a back-to-back stem-and-leaf diagram, in which direction are the leaves on the LEFT side read, and why does this matter for the very first step?", "answer": "- Step 1: Left-side leaves are read **outwards from the stem** — i.e. right-to-left. The stem is in the middle, so the digit closest to the stem is the smallest, and digits get larger as you move away.\n- Step 2: This matters because if you read left-to-right by reflex, every value you extract from the left dataset is wrong, and every downstream calculation (quartiles, median, outliers, box plot) is corrupted.\n- Step 3: Trigger habit: before transcribing ANY value, point at the key (e.g. \"5 | 6 | 3 means 65 for Birch, 63 for Maple\") and verify the direction.\n\nThe single mis-read of direction destroys all subsequent marks — read the key first.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "When a stem-and-leaf row reads \"1 1 1 k 7 8\" and the question asks for $$k$$, what is $$k$$ conceptually — a count, a sum, or something else?", "answer": "- Step 1: $$k$$ is a **single leaf digit** sitting in its sorted position within the row. It is not a frequency, not a count, and not a sum.\n- Step 2: Because leaves must be in ascending order, $$k$$ is constrained by its neighbours — here $$1 \\le k \\le 7$$.\n- Step 3: The value $$k$$ represents on that stem-4 row is $$40 + k$$, since the stem contributes the tens digit.\n\nThe recurring trap: treating $$k$$ as \"the number of times that leaf appears\" — it's just a digit.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "S1 May 2024 Q1(a) — What's the trigger phrase that tells you to set up a median equation for the 16th and 17th values, rather than just the 16th or the 17th alone? (2 steps)", "answer": "- Step 1: The trigger is \"$$N$$ is even\". For Maple, $$N = 32$$ (check by summing row totals), so the median is the **mean** of the $$N/2 = 16$$th and $$N/2 + 1 = 17$$th ordered values.\n- Step 2: Set the formula $$\\frac{x_{16} + x_{17}}{2} = \\text{given median}$$ BEFORE substituting — this exposes $$k$$ cleanly as one of the two terms.\n\nIf $$N$$ were odd you'd take the single middle value $$x_{(N+1)/2}$$; the even/odd check is the first decision.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "S1 May 2024 Q1(a) — Before you can locate which row contains the 16th/17th value, what intermediate quantity must you compute first?", "answer": "- Step 1: Compute **cumulative frequencies** by stem, going down the diagram.\n- Step 2: For Maple: $$5, 12, 18, 25, 28, 30, 32$$. The 16th and 17th values both fall in the row where cumulative frequency first reaches or exceeds 16 — the stem-4 row (positions 13 through 18).\n- Step 3: Then within that row, count leaves in ascending order to find which position 16 and 17 occupy.\n\nThe cumulative-frequency list is the indexing tool — without it you'd recount the whole diagram each time.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "What's the Edexcel S1 rule for finding the position of $$Q_1$$ when $$n$$ is NOT divisible by 4 (e.g. $$n=35$$), and why is this different from the GCSE rule? (3 steps)", "answer": "- Step 1: Compute $$n/4$$. For $$n=35$$: $$35/4 = 8.75$$ — non-integer.\n- Step 2: **Round up** to the next position. So $$Q_1$$ is the 9th value (not the 8th, not interpolated).\n- Step 3: This differs from the GCSE / M-stats rule $$(n+1)/4$$, which would also give 9 here by coincidence but in general gives different answers. The Edexcel S1 rule is \"$$n/4$$ round-up if non-integer\".\n\nCommon slip: using $$(n+1)/4$$ from habit, or interpolating between the 8th and 9th values.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "What's the Edexcel S1 rule for $$Q_1$$ when $$n$$ IS divisible by 4 (e.g. $$n=32$$), and how does it differ from the non-integer case? (2 steps)", "answer": "- Step 1: Compute $$n/4$$. For $$n=32$$: $$n/4 = 8$$ — integer.\n- Step 2: Take the **average** of the $$(n/4)$$th and $$(n/4+1)$$th values: $$Q_1 = \\frac{x_8 + x_9}{2}$$.\n\nSame logic applies to $$Q_3$$ using $$3n/4$$. Mnemonic: \"integer → average two; not integer → round up to one.\"", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "S1 May 2024 Q1(b) — A common error was writing $$Q_1 = 35$$ when the correct answer was 39. What was the underlying mistake and how do you avoid it?", "answer": "- Step 1: The mistake was counting to the **6th** value (35) instead of the **9th** (39). This means using position $$n/4 = 8.75$$ and rounding **down** instead of up, or miscounting leaves on the back-to-back side.\n- Step 2: Defence: write the position explicitly (\"Q1 is the 9th value\") on its own line BEFORE scanning the diagram. Then count leaves slowly, using the cumulative frequencies to jump near the target row.\n- Step 3: Cross-check by counting from BOTH ends — the 9th from the bottom should match the $$(35-9+1) = 27$$th from the top.\n\nAlways verbalise the position before counting leaves.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "Write down the outlier-detection formula used in Edexcel S1 (assuming it's the standard \"1.5×IQR\" rule). Is this formula in the formula booklet?", "answer": "- Step 1: A value $$x$$ is an outlier iff $$x < Q_1 - 1.5(Q_3 - Q_1)$$ OR $$x > Q_3 + 1.5(Q_3 - Q_1)$$.\n- Step 2: The quantity $$1.5 \\times \\text{IQR}$$ is called the \"fence distance\". The two fences are $$Q_1 - 1.5\\,\\text{IQR}$$ (lower) and $$Q_3 + 1.5\\,\\text{IQR}$$ (upper).\n- Step 3: This formula is **NOT in the IAL formula booklet** — memorise it. Also, the question often gives a custom outlier definition; always read it.\n\nThe \"1.5\" is the universal default but the question may override — always check.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "When showing the outlier calculation for \"show that there is only one outlier\", what specific working must appear on the page to secure method marks? (3 steps)", "answer": "- Step 1: Write IQR explicitly: $$\\text{IQR} = Q_3 - Q_1$$ with the numerical subtraction shown.\n- Step 2: Write $$1.5 \\times \\text{IQR}$$ as a separate line — markers award a method mark for this intermediate.\n- Step 3: Write BOTH fences (lower and upper) even if no low outliers exist, then scan the dataset and explicitly state which values exceed each fence.\n\nDon't just write \"85 is an outlier\" — show the fence values 12 and 84, then say \"only 85 > 84\".", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "S1 May 2024 Q1(d) — When drawing a box plot for data containing an outlier, where does the whisker end?", "answer": "- Step 1: The whisker ends at the **most extreme non-outlier** value, NOT at the outlier itself.\n- Step 2: So if Birch's max is 85 (an outlier) and the next-highest value is 76, the right whisker stops at 76.\n- Step 3: The outlier 85 is drawn as a separate cross (×) or asterisk beyond the whisker.\n\nIf you drew the whisker through to 85, you'd be treating the outlier as part of the normal spread — which contradicts having flagged it as an outlier in part (c).", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": false}, {"question": "What's the structural difference between (a) the median of a discrete back-to-back stem-and-leaf and (b) the median by linear interpolation on grouped data? Why use different rules?", "answer": "- Step 1: For raw/discrete data (Q1), each value is known individually, so the median is a specific data point (or the average of two): for $$N=35$$ the 18th value; for $$N=32$$ the average of the 16th and 17th.\n- Step 2: For grouped continuous data (Q3), individual values are unknown — only class frequencies. So you assume values are uniformly spread within the median class and interpolate using $$N/2$$ position (not $$(N+1)/2$$ — the data are continuous, no +1 adjustment).\n- Step 3: The intuition: $$(N+1)/2$$ is a discrete-data fudge to land between values; with continuous data and interpolation we treat the cumulative frequency as a continuous step from 0 to $$N$$ and locate where it hits $$N/2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "State the linear-interpolation formula for the median of grouped data and identify each symbol.", "answer": "- Step 1: $$\\text{Median} = L + \\frac{N/2 - F_b}{f_m} \\times c$$.\n- Step 2: $$L$$ = lower class **boundary** of the median class (the actual class lower limit, not the midpoint — e.g. 32, not 31.5 unless rounding pulls it).\n- Step 3: $$F_b$$ = cumulative frequency **before** the median class; $$f_m$$ = frequency OF the median class; $$c$$ = class **width**.\n- Step 4: This formula is NOT in the IAL booklet — memorise.\n\nIntuition: you've climbed $$F_b$$ up the staircase; you need $$N/2 - F_b$$ more; the median class contributes $$f_m$$ over width $$c$$, so each unit of frequency = $$c/f_m$$ of $$x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "S1 May 2024 Q1(f) — When the question says \"no change to the box plot\" after adding new data, how many constraints does this impose, and what are they?", "answer": "- Step 1: **Five** constraints — one per box-plot statistic: min, $$Q_1$$, median, $$Q_3$$, max must each remain at their original values.\n- Step 2: Approach: list these five values first, then for each, write a constraint on the new variable(s) that must hold.\n- Step 3: Don't stop after the obvious ordering constraints (e.g. $$27 \\le a \\le 48$$ from the given ordering) — the box-plot constraints are usually stricter.\n\nThe killer mistake was concluding $$27 \\le a \\le 54$$ using only ordering; the correct $$36 \\le a \\le 40$$ required ALL five constraints.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "In a \"no change to box plot, find range of $$a$$\" question, the answer's strictest endpoints often come from which TWO constraints, not from the ordering?", "answer": "- Step 1: The **max** constraint: any new value (e.g. $$2a$$) must not exceed the current max, otherwise the max would shift. This pinned $$2a \\le 80 \\Rightarrow a \\le 40$$.\n- Step 2: The **$$Q_1$$ constraint**: when new values are inserted into the sorted list, they shift positions. The new $$Q_1$$ position (based on new $$N$$) must still land on values that average to the original $$Q_1$$. This pinned $$a \\ge 36$$.\n- Step 3: The median and $$Q_3$$ constraints are often automatically satisfied within the window the other two define — but always verify.\n\nLesson: check the EXTREMES (min, max) and the $$Q_1$$ position — these usually bite first.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "When you add $$k$$ new values to a dataset of size $$N$$, what becomes the new $$N$$ for re-deriving quartile positions, and why does this re-checking matter?", "answer": "- Step 1: New $$N' = N + k$$. For Maple: $$N = 32, k = 4 \\Rightarrow N' = 36$$.\n- Step 2: Re-apply the Edexcel quartile rule to $$N'$$, not $$N$$. $$N' = 36$$ is divisible by 4, so $$Q_1$$ = average of 9th and 10th, median = average of 18th and 19th, $$Q_3$$ = average of 27th and 28th.\n- Step 3: This matters because the OLD positions may now refer to different ordered values — and the rule (integer vs non-integer) may flip from \"round up\" to \"average\".\n\nAlways recompute positions after sample-size changes.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "For a \"compare distributions\" 1-mark comment, what TWO ingredients must appear in the sentence to earn the mark? (2 steps)", "answer": "- Step 1: A specific **named statistic** (e.g. \"median\", \"IQR\") — not the vague word \"average\".\n- Step 2: The two numerical **values** of that statistic for the two groups, plus a directional comparison (which is bigger).\n\nExample: \"The median Birch growth (48 cm) is greater than the median Maple growth (45 cm), so on average Birch trees grow more in one year.\" Naming + numbers + direction.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "For a discrete RV question, what's the first thing you should do when you see an inequality like $$P(2X - 3 > 5)$$? (2 steps)", "answer": "- Step 1: **Rearrange the linear inequality** in terms of $$X$$ alone. $$2X - 3 > 5 \\Leftrightarrow X > 4$$.\n- Step 2: THEN sum the point probabilities for the qualifying values of $$X$$ from the distribution table.\n\nTrying to compute the distribution of $$2X-3$$ explicitly is unnecessary work — just transform the inequality.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "When summing point probabilities for $$P(X > c)$$, what's the most common slip and how do you avoid it?", "answer": "- Step 1: The slip: including $$X = c$$ in the sum. The inequality is strict ($$>$$), so $$X = c$$ is excluded.\n- Step 2: Defence: rewrite the qualifying set explicitly on paper — e.g. \"$$X > 4$$ means $$X \\in \\{5, 7, 8\\}$$\" — before summing.\n- Step 3: For $$\\ge$$ you'd include $$X = c$$; for $$>$$ you don't. Read the sign carefully.\n\nThe trigger: any inequality on a discrete RV — pause, list the qualifying values, then sum.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "State the two formulas for $$E(X^2)$$ from a discrete distribution table, and identify which is the common arithmetic trap.", "answer": "- Step 1: $$E(X^2) = \\sum x_i^2 \\cdot P(X = x_i)$$ — **square the $$x$$ value, then multiply by its probability**.\n- Step 2: The trap: squaring the probability (i.e. $$x_i \\cdot P(X=x_i)^2$$) — wrong. Probabilities are not squared.\n- Step 3: Mnemonic: \"$$E$$ of squared-thing equals sum of squared-thing times probability.\"", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "Write the standard formula for $$\\operatorname{Var}(X)$$ in terms of $$E(X^2)$$ and $$E(X)$$, and explain why you subtract $$E(X)^2$$ rather than $$E(X)$$.", "answer": "- Step 1: $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$.\n- Step 2: Intuition: variance is the expected **squared deviation** from the mean: $$E[(X - \\mu)^2]$$. Expanding: $$E[X^2 - 2X\\mu + \\mu^2] = E(X^2) - 2\\mu E(X) + \\mu^2 = E(X^2) - \\mu^2$$.\n- Step 3: Subtracting $$E(X)$$ instead of $$[E(X)]^2$$ has the wrong units — variance is in units of $$x^2$$, so subtraction must be of an $$x^2$$ quantity.\n\nUnits sanity-check: $$E(X^2)$$ and $$\\mu^2$$ both have units $$x^2$$; $$\\mu$$ alone doesn't.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": true}, {"question": "S1 May 2024 Q2(c) — Given $$Y = aX - b$$ with $$E(Y)$$ and $$\\operatorname{Var}(Y)$$ known, which equation should you solve FIRST — the expectation or the variance — and why?", "answer": "- Step 1: Solve the **variance** equation first.\n- Step 2: Reason: $$\\operatorname{Var}(Y) = a^2 \\operatorname{Var}(X)$$ — the constant $$b$$ drops out entirely. So this equation involves only $$a$$, giving you $$a$$ directly.\n- Step 3: THEN substitute $$a$$ into $$E(Y) = aE(X) - b$$ to solve for $$b$$.\n\nIf you tried expectation first, you'd have one equation in two unknowns. Variance-first is the elimination trick.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "When solving $$a^2 = 16$$ for $$a$$ in a coding problem, which root do you take, and how do you decide?", "answer": "- Step 1: Read the question for sign restrictions — typically \"$$a$$ and $$b$$ are positive constants\" appears.\n- Step 2: Take the positive root: $$a = +4$$, not $$-4$$.\n- Step 3: If no sign restriction is given, both roots are technically valid and you'd report both — but in exam contexts there's almost always a positivity constraint stated.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "State the linear-coding rules for expectation and variance, and explain WHY the constant disappears from variance.", "answer": "- Step 1: $$E(aX + b) = aE(X) + b$$; $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$.\n- Step 2: Variance measures spread around the mean — adding a constant $$b$$ shifts every value AND the mean by the same amount, so deviations $$X - \\mu$$ are unchanged. Hence $$+b$$ contributes nothing to spread.\n- Step 3: Multiplying by $$a$$ scales every deviation by $$a$$, hence squared deviations by $$a^2$$ — variance scales by $$a^2$$, not $$a$$.\n\nCommon slip: writing $$\\operatorname{Var}(aX+b) = a\\operatorname{Var}(X) + b$$ — wrong on BOTH counts (missing the square and including b).", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "S1 May 2024 Q2(d) — Sam scores $$S = X_1$$ and Alex scores $$R = 2X_2 - 3$$ from separate spins. What's the trigger that tells you to treat $$S$$ and $$R$$ as INDEPENDENT, and why does this matter for the calculation?", "answer": "- Step 1: Trigger: \"Sam spins, Alex spins\" — two **separate** spins of the spinner produce two **independent** outcomes $$X_1, X_2$$.\n- Step 2: Independence means $$P(S=s, R=r) = P(S=s) \\cdot P(R=r)$$ — multiply marginals, no conditioning.\n- Step 3: If you mistakenly treat them as a single spin (so $$X_1 = X_2$$), you'd enumerate diagonal pairs only — completely wrong distribution.\n\nThe give-away phrase is \"each spin the spinner once\" — two physical events, two independent random variables.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "When computing $$P(\\text{Sam wins}) = P(S > R)$$ where $$S$$ and $$R$$ are independent, what's the cleanest tabulation strategy? (3 steps)", "answer": "- Step 1: Build the distribution of $$R$$ explicitly — compute $$R = 2X_2 - 3$$ for each $$X_2$$ value and copy the probabilities.\n- Step 2: **Condition on $$S$$**: for each value $$s$$, compute $$P(R < s)$$ from the $$R$$ distribution.\n- Step 3: Sum over $$s$$: $$P(S > R) = \\sum_s P(S = s) \\cdot P(R < s)$$.\n\nWhy conditioning on $$S$$ works: $$S$$ has only 5 values, so it's a small sum. Each term reduces to a marginal calculation.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "In \"the higher score wins; if equal it's a draw\", what inequality do you use for \"Sam wins\", and what's the typical slip?", "answer": "- Step 1: Use **strict** $$S > R$$ for Sam wins.\n- Step 2: Slip: using $$S \\ge R$$ — this would count ties as wins, but ties are draws by the question's definition.\n- Step 3: Sanity check: $$P(\\text{Sam wins}) + P(\\text{Alex wins}) + P(\\text{draw}) = 1$$. If you used $$\\ge$$ for both players, you'd double-count draws.\n\nRead \"higher\" not \"at least as high\".", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "S1 May 2024 Q3(a) — On a histogram, what is \"frequency density\" and why is it the correct quantity for the bar height (not frequency itself)?", "answer": "- Step 1: $$\\text{FD} = \\frac{\\text{frequency}}{\\text{class width}}$$.\n- Step 2: In a histogram, **area** is proportional to frequency. Since area = width × height, if width represents class width, then height must represent frequency-per-unit-width = frequency density.\n- Step 3: If you used raw frequency as height, classes with wider widths would be visually under-represented for their frequency (e.g. a class of width 5 with frequency 10 would look the same as a class of width 2 with frequency 10, despite the densities being very different).\n\nThe area-proportionality is what makes the histogram comparable across unequal classes.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "S1 May 2024 Q3(a) — Given a reference bar with stated cm dimensions and a known class, how do you find the dimensions of a different bar? (3 steps)", "answer": "- Step 1: Compute the reference bar's FD = frequency ÷ class width. Then derive TWO scale constants:\n+ Width scale: cm per mm of class width = (cm width of bar) ÷ (mm width of class).\n+ Height scale: cm per unit FD = (cm height of bar) ÷ (FD value).\n- Step 2: For the target class, compute its FD (frequency ÷ class width).\n- Step 3: Apply each scale: new width = (class width in mm) × width-scale; new height = (FD) × height-scale.\n\nThe trap: multiplying class widths directly together (e.g. $$2 \\times 2.5 = 5$$) — you must convert via the scale constants.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "Why is it wrong to compute the median of grouped data using $$(N+1)/2$$, even though that's the rule for discrete data?", "answer": "- Step 1: For discrete data, the $$+1$$ adjustment positions the median between two specific values (the \"halfway through the integer-counted data\" intuition).\n- Step 2: For grouped continuous data, we're interpolating along a continuous cumulative frequency staircase that climbs from 0 to $$N$$. The midway point of this staircase is at height $$N/2$$, not $$(N+1)/2$$.\n- Step 3: The cumulative frequency at the median should be exactly $$N/2$$ by definition — half the data below, half above — so the equation $$\\text{cum freq}(\\text{median}) = N/2$$ is correct.\n\nUse $$N/2$$ for grouped/continuous, $$(N+1)/2$$ only for raw discrete (and even then Edexcel S1 prefers position-based rules).", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "In the linear-interpolation median formula, why is it crucial to use the lower class BOUNDARY rather than the lower limit (e.g. 32 not 31.5)?", "answer": "- Step 1: The boundary is where the class actually starts on the continuous $$x$$-axis. For a class written as $$32 \\le x < 36$$, the boundary is 32 (the inequality is non-strict at 32).\n- Step 2: For classes given to the nearest cm like \"30–32\" you may need to use the rounded-out boundary 29.5 to 32.5; check the question's notation carefully.\n- Step 3: Using the wrong boundary shifts the interpolated value by 0.5 or more — small but enough to lose accuracy marks.\n\nAlways look at the inequality sign in the class definition.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "S1 May 2024 Q3(c) — Given a coding $$10y = w - 20$$ and $$\\bar{y}$$ from $$\\sum y$$, how do you find $$\\bar{w}$$?", "answer": "- Step 1: Rearrange the coding: $$w = 10y + 20$$. This expresses $$w$$ as a linear function of $$y$$.\n- Step 2: Compute $$\\bar{y} = \\sum y / n$$.\n- Step 3: Apply the linearity-of-expectation rule: $$\\bar{w} = 10 \\bar{y} + 20$$ (the same coefficients pass through means).\n\nDO NOT transform individual $$y_i$$ values back to $$w_i$$ and re-average — that's correct but wasteful. Use the linear rule.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "When coding $$w = ay + b$$, how does the standard deviation of $$w$$ relate to the standard deviation of $$y$$, and why does $$b$$ disappear?", "answer": "- Step 1: $$\\sigma_w = |a| \\sigma_y$$. Variance scales by $$a^2$$, so SD scales by $$|a|$$.\n- Step 2: $$b$$ is a constant shift — it moves every value by the same amount, leaving deviations $$(y_i - \\bar{y})$$ unchanged. Spread is invariant under translation.\n- Step 3: Common slip: scaling by $$a$$ instead of $$a^2$$ in variance, OR including $$b$$ in the SD formula.\n\nIf $$w = 10y + 20$$, then $$\\sigma_w = 10 \\sigma_y$$ but $$\\operatorname{Var}(w) = 100 \\operatorname{Var}(y)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "State the \"raw-sums\" formula for variance and note whether it's in the IAL formula booklet.", "answer": "- Step 1: $$\\sigma^2 = \\frac{\\sum x^2}{n} - \\bar{x}^2$$ (equivalently $$\\frac{S_{xx}}{n}$$).\n- Step 2: This is **NOT in the IAL booklet** — must be memorised.\n- Step 3: The booklet form $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$ IS available, and is structurally the same (replace summation with expectation).\n\nBoth forms have the structure \"second moment minus squared first moment\".", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "When asked to find the SD (not variance), at which point in the calculation do you take the square root, and why does the order matter?", "answer": "- Step 1: Compute $$\\operatorname{Var}(y)$$ first, then **scale to $$\\operatorname{Var}(w)$$** if coded, then take $$\\sqrt{\\cdot}$$ LAST.\n- Step 2: If you square-root early (e.g. take $$\\sigma_y$$ then try to scale to $$\\sigma_w$$ by multiplying by 10), you can still get the right answer — but mistakes creep in around the coefficient (10 vs 100).\n- Step 3: Safer route: stay in variance-space until the final step, then $$\\sigma_w = \\sqrt{\\operatorname{Var}(w)}$$.\n\nThe variance scales by $$a^2$$; the SD scales by $$|a|$$. Pick one space and stay in it.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "S1 May 2024 Q3(e) — When a new data value EQUAL TO the current mean is added to a sample, what happens to (i) the mean and (ii) the SD, and why? (2 steps)", "answer": "- Step 1: (i) Mean: **no change**. New mean = $$\\frac{n\\bar{x} + \\bar{x}}{n+1} = \\frac{(n+1)\\bar{x}}{n+1} = \\bar{x}$$. The added value pulls the mean toward itself by zero.\n- Step 2: (ii) SD: **decreases**. The new value contributes $$(\\bar{x} - \\bar{x})^2 = 0$$ to the sum of squared deviations, but $$n$$ grows to $$n+1$$. So $$\\operatorname{Var} = \\frac{S_{xx}}{n+1}$$ with $$S_{xx}$$ unchanged — variance shrinks, hence SD shrinks.\n\nFor full marks state both the **direction** AND the **reason** (value equals mean → zero deviation).", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "State the formulas for $$S_{xy}$$ and $$S_{xx}$$ in terms of raw sums. Are these in the formula booklet?", "answer": "- Step 1: $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$.\n- Step 2: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$; analogous for $$S_{yy}$$.\n- Step 3: Both **ARE in the IAL booklet**, so don't waste exam time deriving them. But know that $$\\frac{\\sum x}{n} = \\bar{x}$$ etc.\n\nThe numerator $$\\sum xy$$ uses each pair; the second term divides BY $$n$$, not by $$n^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "State the PMCC formula and the range of values $$r$$ can take. What's the geometric/statistical meaning of $$r$$ being close to 1?", "answer": "- Step 1: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. Range: $$-1 \\le r \\le 1$$.\n- Step 2: $$r \\approx 1$$: points lie close to a line with positive gradient (strong positive linear relationship).\n- Step 3: $$r \\approx -1$$: close to a line with negative gradient. $$r \\approx 0$$: no linear relationship (but possibly a non-linear one).\n\nSanity check ANY computed $$r$$: it must be in $$[-1, 1]$$. If you get 1.05, you've made an arithmetic slip.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "For the regression line of $$y$$ on $$x$$, what are the gradient and intercept formulas, and why is the choice of denominator ($$S_{xx}$$ not $$S_{yy}$$) crucial?", "answer": "- Step 1: Gradient $$b = S_{xy}/S_{xx}$$; intercept $$a = \\bar{y} - b\\bar{x}$$.\n- Step 2: \"$$y$$ on $$x$$\" means we're predicting $$y$$ from $$x$$, treating $$x$$ as the explanatory variable. The formula minimises squared residuals in $$y$$, leading to the denominator $$S_{xx}$$.\n- Step 3: If you used $$S_{yy}$$ instead, you'd compute the line of $$x$$ on $$y$$ — a different line with different gradient (unless $$r = \\pm 1$$).\n\nMnemonic: \"$$y$$ on $$x$$ — divide by $$xx$$.\"", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "When computing the regression intercept $$a = \\bar{y} - b\\bar{x}$$, what's the precision trap and how do you avoid it?", "answer": "- Step 1: If you round $$b$$ to 3 s.f. BEFORE substituting (e.g. use $$b = 0.722$$ instead of $$0.72184\\ldots$$), the intercept can be wrong at the 3rd s.f. due to error amplification by $$\\bar{x}$$ (often a large number).\n- Step 2: Defence: carry the **unrounded** $$b$$ through to the intercept calculation, then round both at the final step.\n- Step 3: Example: $$b = 0.72184$$, $$\\bar{x} = 182.1$$, $$\\bar{y} = 89.15$$. Using unrounded $$b$$: $$a = 89.15 - 0.72184(182.1) \\approx -42.30$$. Using rounded $$b = 0.722$$: $$a = 89.15 - 0.722(182.1) \\approx -42.32$$ — close but at the rounding edge.\n\nAlways carry full precision, round at the end.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "S1 May 2024 Q4(d) — How do you correctly interpret the gradient of a regression line \"in context\"? What are the required ingredients in the sentence? (3 steps)", "answer": "- Step 1: Specify the **unit** of the explanatory variable and the increment (\"for every 1 cm increase in the length of a bear\").\n- Step 2: State the **magnitude AND unit** of the response change (\"the girth increases by approximately 0.722 cm\").\n- Step 3: Use the words \"on average\" or \"is predicted to\" — regression gives a prediction, not a deterministic statement.\n\nAvoid: \"the line slopes up\" (no quantification), \"x increases\" (no context, no units).", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "S1 May 2024 Q4(e)(ii) — What technical word should appear in the answer when an estimate from a regression line is unreliable because the predictor value is outside the observed data range?", "answer": "- Step 1: The word is **extrapolation**.\n- Step 2: Full answer template: \"The value $$x = c$$ is outside the range of observed data, so the relationship may not hold there — extrapolation is unreliable.\"\n- Step 3: Contrast: **interpolation** (within the data range) is reliable.\n\nVague phrasings like \"the data isn't accurate\" miss the mark — name the issue.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "S1 May 2024 Q4(f) — When the question asks for $$x$$ such that an $$x$$-cm increase in length gives a 17.3-cm increase in girth, why is the intercept irrelevant?", "answer": "- Step 1: For **increments** (changes), only the gradient matters: $$\\Delta g = b \\cdot \\Delta d$$.\n- Step 2: The intercept $$a$$ cancels because both endpoints of the change lie on the same line: $$g_2 - g_1 = (a + bd_2) - (a + bd_1) = b(d_2 - d_1)$$.\n- Step 3: So: $$0.722 \\cdot x = 17.3 \\Rightarrow x = 23.96 \\approx 24.0$$.\n\nTrap: solving $$-42.3 + 0.722x = 17.3$$ — this treats 17.3 as a $$g$$-value, not as a change in $$g$$.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "S1 May 2024 Q5(a) — What's the standard 3-step routine for \"find $$P(X < c)$$\" when $$X \\sim N(\\mu, \\sigma^2)$$? (3 steps)", "answer": "- Step 1: Standardise: $$Z = \\frac{X - \\mu}{\\sigma}$$. So $$P(X < c) = P\\!\\left(Z < \\frac{c-\\mu}{\\sigma}\\right)$$.\n- Step 2: Show the standardisation line on the page — markers award method marks for it.\n- Step 3: Look up the standardised value in the $$\\Phi$$ table (or use the calculator).\n\nThe standardisation line is non-negotiable for \"use standardisation\" questions.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "S1 May 2024 Q5(b) — A question says \"Only the fastest 60% of adults take part in round two.\" What is the trigger for translating \"fastest\" into a probability statement, and what's the most expensive mistake?", "answer": "- Step 1: \"Fastest\" = \"shortest time\" = **lower tail** of the time distribution.\n- Step 2: Set $$P(X < t) = 0.60$$ — the fastest 60% are those below the cutoff $$t$$.\n- Step 3: The expensive mistake: writing $$P(X < t) = 0.40$$ (treating fastest as upper tail). This was THE killer error in the May 2024 paper — even the tutor on tape got it wrong.\n\nDefence: ALWAYS sketch the normal curve and shade the \"fast\" (left) region before doing algebra.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": false}, {"question": "For an inverse-normal lookup like $$P(Z < z) = 0.60$$, what's the sign of $$z$$ and why?", "answer": "- Step 1: Since $$0.60 > 0.50$$, the cutoff is above the mean, so $$z > 0$$ — specifically $$z \\approx 0.2533$$.\n- Step 2: General rule: if $$\\Phi(z) > 0.5$$, then $$z > 0$$; if $$\\Phi(z) < 0.5$$, then $$z < 0$$.\n- Step 3: Mnemonic: \"more than half the area below\" ⟺ \"above the mean\".\n\nSlip: writing $$z = -0.2533$$ from sign confusion. Always check: does my $$z$$ sit on the side of the mean that matches the probability?", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": false}, {"question": "S1 May 2024 Q5(c) — Given $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$ with $$T \\sim N(\\mu, \\sigma^2)$$, what's the first quantity to find and how?", "answer": "- Step 1: Find $$\\sigma$$ first. By symmetry of the normal around $$\\mu$$, each tail has probability $$(1 - 0.95)/2 = 0.025$$.\n- Step 2: So $$P(T < \\mu - 10) = 0.025$$. Standardise: $$\\frac{(\\mu - 10) - \\mu}{\\sigma} = -1.96$$, giving $$\\sigma = \\frac{10}{1.96} \\approx 5.102$$.\n- Step 3: Sanity check: $$\\sigma$$ should be of comparable order to the interval half-width (10). $$\\sigma \\approx 5.10$$ is reasonable. $$\\sigma \\approx 0.51$$ is NOT — decimal slip warning.\n\nThe recurring critical error: writing $$\\sigma = 0.510$$ — a factor-of-10 slip.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "Why is $$\\Phi^{-1}(0.975) = 1.96$$ a \"must-memorise\" value, and what's its companion for 0.95 confidence?", "answer": "- Step 1: A 95% symmetric interval has 2.5% in each tail, so the cutoff is $$\\Phi^{-1}(0.975) = 1.96$$.\n- Step 2: For 90% (5% in each tail): $$\\Phi^{-1}(0.95) = 1.6449$$.\n- Step 3: For 99%: $$\\Phi^{-1}(0.995) = 2.5758$$.\n\nThe 1.96 value appears in almost every \"symmetric interval\" question. Memorise it.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "When the question says \"find $$P(A | B)$$\", what is the FIRST formula you write down BEFORE substituting any numbers?", "answer": "- Step 1: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$.\n- Step 2: Write this verbatim, then identify $$A$$, $$B$$, $$A \\cap B$$ from the question.\n- Step 3: This guards against confusing $$P(A|B)$$ with $$P(B|A)$$ or $$P(A \\cap B)$$.\n\nThe trigger \"given that\" or the vertical bar | is your cue.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "S1 May 2024 Q5(c) — When asked for $$P(T > \\mu - 5 \\mid T > \\mu - 10)$$, what subset relationship lets you simplify the numerator?", "answer": "- Step 1: $$\\mu - 5 > \\mu - 10$$, so \"$$T > \\mu - 5$$\" is a STRICTER condition than \"$$T > \\mu - 10$$\". Hence $$\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$$.\n- Step 2: Therefore $$\\{T > \\mu - 5\\} \\cap \\{T > \\mu - 10\\} = \\{T > \\mu - 5\\}$$ — the intersection collapses to the smaller (more restrictive) set.\n- Step 3: So $$P(T > \\mu - 5 \\mid T > \\mu - 10) = \\frac{P(T > \\mu - 5)}{P(T > \\mu - 10)}$$ — no intersection computation needed.\n\nSubset-trick: if one event implies the other, the intersection equals the subset event.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "What's the denominator in $$P(T > \\mu - 5 \\mid T > \\mu - 10)$$ when $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$, and what's the common slip?", "answer": "- Step 1: $$P(T > \\mu - 10) = 1 - P(T \\le \\mu - 10) = 1 - 0.025 = 0.975$$.\n- Step 2: The lower-tail probability is 0.025 (half of $$1 - 0.95$$), not 0.05.\n- Step 3: Common slip: using 0.95 as the denominator (that's $$P(\\mu - 10 < T < \\mu + 10)$$, NOT $$P(T > \\mu - 10)$$).\n\nRead the inequality carefully: $$>$$ goes all the way to $$+\\infty$$, not just to $$\\mu + 10$$.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "S1 May 2024 Q6(a) — On a Venn diagram with three sets, how do you compute $$P(C \\cap G')$$? Which regions count?", "answer": "- Step 1: $$C \\cap G'$$ means \"in $$C$$ AND outside $$G$$\". From the 8 regions of a 3-set Venn, identify all regions inside $$C$$'s circle but outside $$G$$'s.\n- Step 2: These are \"$$C$$ only\" and \"$$C \\cap S$$ only (not $$G$$)\" — two regions.\n- Step 3: $$P(C \\cap G') = 0.04 + 0.12 = 0.16$$.\n\nExcluded: both $$G$$-containing regions of $$C$$ (the triple $$C \\cap S \\cap G$$ and the $$C \\cap G$$-only region).", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": false}, {"question": "When computing $$P(C \\cap S)$$ from a 3-set Venn diagram, which regions must you include — and what's the recurring error?", "answer": "- Step 1: $$P(C \\cap S)$$ = ALL regions inside BOTH $$C$$ and $$S$$, regardless of whether they're also in $$G$$.\n- Step 2: This means TWO subregions: $$C \\cap S$$ only (not $$G$$) AND $$C \\cap S \\cap G$$ (the triple overlap).\n- Step 3: Recurring error: using only one of these — typically just the \"$$C \\cap S$$ only\" region, forgetting the triple overlap.\n\nThe triple overlap belongs to every pairwise intersection. Always check.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": true}, {"question": "State the independence condition for two events $$A$$ and $$B$$, and explain how it lets you find an unknown Venn probability.", "answer": "- Step 1: $$A$$ and $$B$$ independent $$\\Leftrightarrow$$ $$P(A \\cap B) = P(A) \\cdot P(B)$$.\n- Step 2: To use this: express $$P(A)$$, $$P(B)$$, $$P(A \\cap B)$$ as sums of Venn regions — at least one of them will contain the unknown $$p$$.\n- Step 3: Solve the resulting equation for $$p$$.\n\nWatch which sums include $$p$$: typically $$P(C)$$ does, because $$p$$ sits in the $$C \\cap G$$-only region (which is inside $$C$$).", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": true}, {"question": "In a 3-set Venn diagram with an \"outside-all-three\" region $$q$$, what equation lets you find $$q$$?", "answer": "- Step 1: All 8 regions of the Venn (including $$q$$) must sum to 1, because the diagram exhausts the sample space.\n- Step 2: Write: (sum of 7 named regions) + $$q$$ = 1, then solve for $$q$$.\n- Step 3: Don't forget regions whose value is 0 (e.g. \"G only = 0\") — they still occupy a region, just contribute 0 to the sum.\n\nThe outside region $$q$$ is easy to forget — it's the \"neither/nor/nor\" region.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}, {"question": "S1 May 2024 Q6(e) — A youth club has 76 teenagers who play Chess and Go. How do you estimate the total number of teenagers, and what's the formula? (3 steps)", "answer": "- Step 1: Compute $$P(C \\cap G)$$ from the Venn diagram. INCLUDE both subregions: \"$$C \\cap G$$ only\" ($$= p$$) AND the triple overlap ($$= 0.15$$).\n- Step 2: $$P(C \\cap G) = p + 0.15$$. After finding $$p = 0.14$$ from independence: $$P(C \\cap G) = 0.29$$.\n- Step 3: Total = $$\\frac{\\text{observed count}}{\\text{probability}} = \\frac{76}{0.29} \\approx 262$$.\n\nIf you use only the triple overlap (0.15) or only the \"$$C \\cap G$$ only\" region ($$p$$), you'll get the wrong total.", "source": "Opus 4.7 ②", "_id": "opus_2_54", "judge_pick": true}, {"question": "S1 May 2024 Q6(e) — When computing \"number of teenagers who do NOT play Scrabble\", what's the shortcut formula and why does it save you from a major error?", "answer": "- Step 1: Use $$P(S') = 1 - P(S)$$ — the universal complement rule.\n- Step 2: This is GUARANTEED to include the \"outside all three\" region $$q$$, plus any \"$$G$$ only\" or \"$$C$$ only\" or \"$$C \\cap G$$ only\" pieces that are outside $$S$$.\n- Step 3: If you instead try to sum Venn regions piece-by-piece, it's easy to miss $$q$$ — Phuc's exact error giving 47 instead of 105.\n\nWhen \"not $$A$$\" includes the outside-the-circles region, ALWAYS use $$1 - P(A)$$. It's the safer path.", "source": "Opus 4.7 ②", "_id": "opus_2_55", "judge_pick": true}, {"question": "Why is $$P(S')$$ in a 3-set Venn problem often miscalculated as too small, and what's the diagnostic?", "answer": "- Step 1: Students typically sum only \"non-$$S$$\" regions inside the circles (e.g. $$C$$ only, $$G$$ only, $$C \\cap G$$ only) and forget the outside-everything region $$q$$.\n- Step 2: Diagnostic: if your $$P(S')$$ comes out much less than $$1 - P(S)$$, you've missed regions.\n- Step 3: Counter-example from the paper: piece-by-piece gave $$0.04 + 0 + 0.14 = 0.18$$ (missing $$q = 0.22$$), giving 47 teenagers. The correct $$1 - 0.60 = 0.40$$ gave 105.\n\nIf the cross-check fails, find the missing region — usually $$q$$.", "source": "Opus 4.7 ②", "_id": "opus_2_56", "judge_pick": true}, {"question": "What's the conditional-probability calculation for $$P(C \\mid S \\cap G)$$ on a Venn diagram?", "answer": "- Step 1: $$P(C \\mid S \\cap G) = \\frac{P(C \\cap S \\cap G)}{P(S \\cap G)}$$.\n- Step 2: Numerator: just the triple overlap region.\n- Step 3: Denominator: BOTH subregions of $$S \\cap G$$ — the triple overlap AND the \"$$S \\cap G$$ only\" region.\n\nSame trap as before: $$P(S \\cap G)$$ includes the triple, don't omit it.", "source": "Opus 4.7 ②", "_id": "opus_2_57", "judge_pick": false}, {"question": "Quick orientation check — given a question with $$N=35$$, what positions are $$Q_1$$ and $$Q_3$$, and what's the median position?", "answer": "- Step 1: $$Q_1$$: $$35/4 = 8.75$$, non-integer → round up to **9th** value.\n- Step 2: $$Q_3$$: $$3 \\times 35/4 = 26.25$$, non-integer → round up to **27th** value.\n- Step 3: Median: $$(35+1)/2 = 18$$ for discrete (or alternatively $$N/2 = 17.5$$ → round up to 18) → **18th** value.\n\nCross-check from the other end: position 18 from top = position $$35 - 18 + 1 = 18$$ from bottom. Symmetric — correct.", "source": "Opus 4.7 ②", "_id": "opus_2_58", "judge_pick": false}, {"question": "Quick orientation check — given a question with $$N=32$$, what positions are $$Q_1, Q_3$$ and how are they computed?", "answer": "- Step 1: $$Q_1$$: $$32/4 = 8$$, integer → average of **8th and 9th** values.\n- Step 2: $$Q_3$$: $$3 \\times 32/4 = 24$$, integer → average of **24th and 25th** values.\n- Step 3: Median: $$N/2 = 16$$, integer → average of **16th and 17th** values.\n\nThe \"average two values\" rule kicks in whenever $$n/4$$ is an integer. For non-integer, you round up to a single position.", "source": "Opus 4.7 ②", "_id": "opus_2_59", "judge_pick": false}, {"question": "Strategic question — when scanning a \"show that\" question, what should you write down BEFORE doing any arithmetic, to maximise method marks even if your final number is wrong?", "answer": "- Step 1: Write the **formula** you're using (e.g. $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$).\n- Step 2: Write each **intermediate step** as a labelled line — don't combine multiple operations into one.\n- Step 3: For variance: show all five $$x^2 \\cdot p$$ terms on their own line, then sum.\n\nIf the final number doesn't match the \"show that\" target, you still earn method marks for each correct intermediate. Conversely, jumping straight to a wrong final value earns nothing.", "source": "Opus 4.7 ②", "_id": "opus_2_60", "judge_pick": false}, {"question": "What's the sanity-check intuition for $$\\sigma$$ from a symmetric interval like \"$$P(\\mu - k < T < \\mu + k) = 0.95$$\"?", "answer": "- Step 1: 95% of normal data lies within roughly $$\\pm 2\\sigma$$ (more precisely $$\\pm 1.96\\sigma$$) of the mean.\n- Step 2: So $$k \\approx 2\\sigma$$, meaning $$\\sigma \\approx k/2$$.\n- Step 3: For $$k = 10$$: $$\\sigma \\approx 5$$ — your computed $$\\sigma = 10/1.96 = 5.102$$ should pass this check; $$\\sigma = 0.51$$ should fail loudly.\n\nQuick mental order-of-magnitude check saves you from decimal slips.", "source": "Opus 4.7 ②", "_id": "opus_2_61", "judge_pick": true}, {"question": "Why does adding a value larger than the current mean SHIFT the mean, while adding a value equal to the mean does NOT shift it?", "answer": "- Step 1: New mean = $$\\frac{n\\bar{x} + x_{\\text{new}}}{n+1}$$.\n- Step 2: If $$x_{\\text{new}} = \\bar{x}$$: numerator = $$n\\bar{x} + \\bar{x} = (n+1)\\bar{x}$$, so new mean = $$\\bar{x}$$ (no change).\n- Step 3: If $$x_{\\text{new}} > \\bar{x}$$: numerator $$> (n+1)\\bar{x}$$, so new mean $$> \\bar{x}$$ (shifts upward). Magnitude of shift: $$\\frac{x_{\\text{new}} - \\bar{x}}{n+1}$$.\n\nThe shift size decreases as $$n$$ grows — large samples are robust.", "source": "Opus 4.7 ②", "_id": "opus_2_62", "judge_pick": true}, {"question": "What's the intuition for \"variance decreases when a value at the mean is added\", expressed in plain English?", "answer": "- Step 1: Variance is the **average squared deviation** from the mean. A value at the mean has zero deviation.\n- Step 2: Adding a zero to the sum of squared deviations doesn't change the numerator, but the denominator $$n$$ grows.\n- Step 3: $$\\text{new variance} = \\frac{\\text{old }S_{xx}}{n+1} < \\frac{\\text{old }S_{xx}}{n} = \\text{old variance}$$.\n\nSo a perfectly-average observation **dilutes** the spread — the same total variability spread over more data points.", "source": "Opus 4.7 ②", "_id": "opus_2_63", "judge_pick": true}, {"question": "In a regression problem, why must you convert units (e.g. metres to cm) BEFORE substituting into the regression equation?", "answer": "- Step 1: The regression equation was fitted using the original units (e.g. cm) of both variables.\n- Step 2: The gradient $$b$$ has units of \"$$y$$-units per $$x$$-unit\" — here, cm of girth per cm of length. Substituting metres without conversion gives an answer scaled by 100.\n- Step 3: Defence: always check units of the input value against the units used during fitting. Convert if mismatched, BEFORE substitution.\n\nThe phrase \"a bear with length 2.5 metres\" is a translation trap — convert to 250 cm first.", "source": "Opus 4.7 ②", "_id": "opus_2_64", "judge_pick": true}, {"question": "In a back-to-back stem-and-leaf, what does the row total mean and why is it the first sanity check?", "answer": "- Step 1: The row total = the number of leaves in that row on ONE side (Birch or Maple separately). Sum of row totals = sample size $$N$$ for that group.\n- Step 2: Use this to verify: Birch totals should sum to 35; Maple totals should sum to 32 (the question's stated sample sizes).\n- Step 3: If the sums don't match, you've miscounted leaves — fix before computing anything else.\n\nThe row total is your safety net against transcription errors.", "source": "Opus 4.7 ②", "_id": "opus_2_65", "judge_pick": false}, {"question": "What's the visual rule for \"negative skew\" vs \"positive skew\" on a box plot, and what statistic comparison confirms it?", "answer": "- Step 1: Positive skew: the upper whisker is LONGER than the lower whisker; tail extends to the right. Median is closer to $$Q_1$$ than $$Q_3$$. Mean $$>$$ median.\n- Step 2: Negative skew: lower whisker longer; tail extends to the left. Median closer to $$Q_3$$. Mean $$<$$ median.\n- Step 3: Symmetric: median equidistant from $$Q_1$$ and $$Q_3$$; whiskers similar length. Mean $$\\approx$$ median.\n\nA quick visual: which whisker is longer points to the tail direction = the skew direction.", "source": "Opus 4.7 ②", "_id": "opus_2_66", "judge_pick": true}, {"question": "When using independence $$P(C \\cap S) = P(C) \\cdot P(S)$$ to find an unknown Venn probability, why must you list $$P(C), P(S), P(C \\cap S)$$ as separate explicit sums BEFORE substituting?", "answer": "- Step 1: Writing them as sums forces you to look at EVERY region in each set, reducing the chance of omitting a subregion (especially the triple overlap).\n- Step 2: It also makes the algebra transparent: you can see exactly which region $$p$$ sits in.\n- Step 3: Example: $$P(C) = 0.04 + p + 0.15 + 0.12 = 0.31 + p$$ shows the dependence on $$p$$; collapsing this to one symbol $$P(C)$$ hides the structure.\n\nThe discipline of listing prevents the silent omission of a Venn subregion.", "source": "Opus 4.7 ②", "_id": "opus_2_67", "judge_pick": true}, {"question": "Why is computing the regression \"line of $$g$$ on $$d$$\" different from computing \"line of $$d$$ on $$g$$\", and which one does the question ask for in Q4(c)?", "answer": "- Step 1: \"Line of $$y$$ on $$x$$\" predicts $$y$$ from $$x$$, minimising vertical (y-direction) residuals — gradient is $$S_{xy}/S_{xx}$$.\n- Step 2: \"Line of $$x$$ on $$y$$\" predicts $$x$$ from $$y$$, minimising horizontal residuals — gradient is $$S_{xy}/S_{yy}$$ (when expressed in form $$x = a' + b'y$$).\n- Step 3: Q4(c) says \"line of $$g$$ on $$d$$\" — divide $$S_{dg}$$ by $$S_{dd}$$. Using $$S_{gg}$$ gives the wrong line.\n
