e mistake is using only 0.15 (the triple overlap) and forgetting the C∩G only region $p$.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "What is the trigger phrase that tells you to use the lower tail for a \"fastest p%\" normal distribution question? (Q5b S1 May 2024)", "answer": "- The trigger phrase is **\"fastest\"** or **\"shortest\"** — these refer to the smallest values, which lie in the **lower (left) tail**.\n- Contrast with \"slowest\" or \"longest\" — these refer to the largest values, which lie in the upper (right) tail.\n- Always sketch the normal curve and **shade the region** before computing.\n- The single most expensive mistake in this paper was confusing \"fastest 60%\" with the upper tail.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In a box plot question, if you are told \"no change to the box plot\" after adding data, what five statistics must you check? (Q1f S1 May 2024)", "answer": "- You must check all five box plot statistics remain unchanged:\n  1. Minimum value\n  2. Lower quartile ($Q_1$)\n  3. Median\n  4. Upper quartile ($Q_3$)\n  5. Maximum value\n- Each gives a constraint on the new data values. The ordering constraint alone ($27 \\le a \\le 48$) is not enough — you need all five.\n- The mistake is checking only the ordering and ignoring the box plot constraints.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "In regression, what is the difference between the line of $g$ on $d$ and the line of $d$ on $g$? (Q4c S1 May 2024)", "answer": "- For $g$ on $d$ (predicting g from d): gradient $= S_{dg} / S_{dd}$, intercept $= \\bar{g} - b\\bar{d}$.\n- For $d$ on $g$ (predicting d from g): gradient $= S_{dg} / S_{gg}$, intercept $= \\bar{d} - b\\bar{g}$.\n- The denominator is always the sum of squares of the **independent/predictor** variable ($x$).\n- The mistake is swapping $S_{dd}$ and $S_{gg}$ — use $S_{dd}$ for $g$ on $d$.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "What is the key insight when adding a value equal to the mean to a dataset — its effect on mean and standard deviation? (Q3e S1 May 2024)", "answer": "- Mean: Adding a value exactly equal to the current mean **does not change** the mean — the new mean stays the same.\n- Standard deviation: The added value contributes zero squared deviation $(x - \\bar{x})^2 = 0$, while the denominator $n$ increases. This **decreases** the variance (and hence SD).\n- The intuition: you're adding a \"perfectly average\" observation that dilutes the spread without affecting the center.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "When calculating $P(C \\mid S \\cap G)$ in Q6(d)(ii), what is the correct numerator and denominator? (Q6d S1 May 2024)", "answer": "- Step 1: $P(C \\mid S \\cap G) = \\frac{P(C \\cap S \\cap G)}{P(S \\cap G)}$\n- Step 2: The numerator is the triple intersection: $P(C \\cap S \\cap G) = 0.15$ (the center region).\n- Step 3: The denominator is the union of all regions in the S∩G overlap: this includes both the triple overlap (0.15) and S∩G only (0.10).\n- Step 4: So $P(S \\cap G) = 0.15 + 0.10 = 0.25$.\n- Answer: $0.15/0.25 = 0.6$.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "What is the empirical rule for mapping \"fastest p%\" and \"slowest p%\" to probability statements in normal distribution questions? (Q5b S1 May 2024)", "answer": "- **Fastest p%** → shortest times → **lower tail** → $P(X < t) = p/100$\n- **Slowest p%** → longest times → **upper tail** → $P(X > t) = p/100$\n- **Fastest 60%** means the 60% with the smallest times, so $P(X < t) = 0.60$.\n- **Top 20%** means the upper 20%, so $P(X > t) = 0.20$ or $P(X < t) = 0.80$.\n- Always identify whether you're looking for the left or right tail before standardising.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "In Q4(f), why do you not include the intercept when finding the change in g for a given change in d? (Q4f S1 May 2024)", "answer": "- Step 1: The regression line is $g = -42.3 + 0.722d$.\n- Step 2: For a change in $d$ of $x$ cm, the change in $g$ is $0.722 \\times x$.\n- Step 3: The intercept $-42.3$ is a constant — it cancels out when you take the difference: $(g_2 - g_1) = [a + bd_2] - [a + bd_1] = b(d_2 - d_1)$.\n- Step 4: Solve $0.722x = 17.3$ gives $x = 17.3/0.722 = 24.0$ cm.\n- Including the intercept would give the wrong equation $-42.3 + 0.722x = 17.3$.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "What is the difference between interpolation and extrapolation when using regression lines, and which is reliable? (Q4e S1 May 2024)", "answer": "- **Interpolation** means estimating within the observed data range (between min and max $x$ values). This is **reliable** because the linear relationship is observed there.\n- **Extrapolation** means estimating outside the observed data range. This is **unreliable** because we have no data to confirm the linear relationship holds beyond the range.\n- For the bear data, $d = 250$ cm (2.5 m) is interpolation (reliable), while $d = 50$ cm is extrapolation (unreliable).", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "When constructing a histogram, why is frequency density (FD) used on the vertical axis rather than frequency? (Q3a S1 May 2024)", "answer": "- In a histogram, **area** (not height) is proportional to frequency.\n- Formula: $\\text{Frequency} = \\text{Area} = \\text{width} \\times \\text{height}$.\n- Therefore: $\\text{height} = \\text{Frequency} / \\text{width} = \\text{Frequency Density}$.\n- This ensures that a class with twice the frequency but twice the width still has the same height, correctly representing equal frequencies by equal areas.\n- Using frequency on the vertical axis would misrepresent frequencies for classes of different widths.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "In the discrete random variable question, what is the correct way to interpret \"Sam wins\" when scores could be equal? (Q2d S1 May 2024)", "answer": "- \"The person with the higher score wins. If the scores are the same it is a draw.\"\n- Therefore: Sam wins **only if** $S > R$ (strict inequality).\n- The probability of Sam winning does **not** include draws ($S = R$).\n- The calculation sums $P(R < S)$, not $P(R \\le S)$.\n- This matters because including ties would overcount Sam's wins.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "What is the correct way to calculate $S_{dg}$ and $S_{gg}$ using the provided summary statistics? (Q4a S1 May 2024)", "answer": "- Given: $\\sum d = 1456.8$, $\\sum g = 713.2$, $\\sum dg = 141,978.84$, $\\sum g^2 = 72,675.98$, $n = 8$.\n- For $S_{dg}$: $\\sum dg - \\frac{(\\sum d)(\\sum g)}{n} = 141,978.84 - \\frac{1456.8 \\times 713.2}{8}$.\n- For $S_{gg}$: $\\sum g^2 - \\frac{(\\sum g)^2}{n} = 72,675.98 - \\frac{713.2^2}{8}$.\n- Key: multiply $\\sum d$ and $\\sum g$ first, **then** divide by $n$, then subtract from the sum of products/squares.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "What does it mean if $r$, the PMCC, is close to 1 or -1? (Q4b S1 May 2024)", "answer": "- $r = 1$: perfect **positive** linear relationship — as $x$ increases, $y$ increases proportionally with no scatter.\n- $r = -1$: perfect **negative** linear relationship — as $x$ increases, $y$ decreases proportionally.\n- $r = 0$: no linear correlation (but there could be a non-linear relationship).\n- $r = 0.980$ (from Q4) indicates **very strong positive** linear correlation — the points lie very close to a straight line.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "In Q6(d)(i), what is $P((C \\cup S) \\cap G')$ and how do you identify the regions? (Q6d S1 May 2024)", "answer": "- $(C \\cup S) \\cap G'$ means: in C or S (or both), but **not** in G.\n- Step 1: Identify all regions in C or S: C only, C∩S only, S only, C∩G, S∩G, C∩S∩G.\n- Step 2: Exclude any region that touches G: this removes C∩G, S∩G, and C∩S∩G.\n- Step 3: Remaining: C only (0.04) + C∩S only (0.12) + S only (0.23) = 0.39.\n- The answer is 0.39.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "What is the key step to avoid the decimal slip in Q5(c) when calculating $\\sigma = 10/1.96$? (Q5c S1 May 2024)", "answer": "- The calculation is $\\sigma = \\frac{10}{1.96} \\approx 5.102$.\n- **Sanity check:** The interval given is $\\mu \\pm 10$, so the standard deviation should be roughly on the order of 10 (not 0.1 or 0.01).\n- The common slip is writing $0.510$ instead of $5.10$ — moving the decimal one place too far.\n- Always do a quick sanity check: if your $\\sigma$ is much smaller than the interval half-width, you've likely mis-placed a decimal.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "For the Birch quartile calculation in Q1(b), what is the cumulative frequency method to quickly locate the 9th and 27th values? (Q1b S1 May 2024)", "answer": "- From the stem-and-leaf totals: stem-2 has 2, stem-3 has 8 (total 10), stem-4 has 9 (total 19), stem-5 has 9 (total 28).\n- Q1 position = 9: this falls in the stem-3 row (cumulative reaches 10 at stem-3). The 9th value is the last leaf in stem-3: 39.\n- Q3 position = 27: this falls in the stem-5 row (cumulative reaches 28 at stem-5). The 27th value is the 8th leaf in stem-5: 57.\n- This cumulative method avoids listing all 35 values.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "In Q1(c), after calculating the outlier fences as 12 and 84, how do you efficiently check all Birch values for outliers? (Q1c S1 May 2024)", "answer": "- Lower fence = 12: The smallest Birch value is 28, which is > 12, so **no low outliers**.\n- Upper fence = 84: Scan the largest values: 76, 75, 74, 67, 66, 65... all < 84.\n- The next value is 85, which is > 84, so **85 is an outlier**.\n- Only one value (85 cm) exceeds the upper fence — this matches \"only one outlier.\"\n- No need to check every value — just check the extremes against each fence.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "What is the formula for $S_{xx}$ and $S_{yy}$ and how do they differ from $\\sum x^2$ and $\\sum y^2$? (Q4a S1 May 2024)", "answer": "- $\\sum x^2$ is the sum of squared $x$ values (raw).\n- $S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$ is the **corrected sum of squares** (subtracting the squared mean contribution).\n- Similarly: $S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$.\n- In the regression and correlation formulas, you **must** use $S_{xx}$ and $S_{yy}$, not the raw sums of squares.\n- The term $\\frac{(\\sum x)^2}{n}$ corrects for the artificial inflation from the mean.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "In Q2(d), why do you build a table for $R = 2X_2 - 3$ before calculating probabilities? (Q2d S1 May 2024)", "answer": "- Step 1: $X_2$ takes values 2, 4, 5, 7, 8 with probabilities 0.25, 0.3, 0.2, 0.1, 0.15.\n- Step 2: Transform each: $R = 2X - 3$ gives: $2(2)-3=1$, $2(4)-3=5$, $2(5)-3=7$, $2(7)-3=11$, $2(8)-3=13$.\n- Step 3: The probabilities stay the same (the transformation is on the value, not the probability distribution shape).\n- Step 4: This table lets you quickly look up $P(R < S)$ for each $S$ value when calculating Sam's win probability.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "In Q3(d), why is the constant term (+20) dropped when calculating the standard deviation? (Q3d S1 May 2024)", "answer": "- For any linear transformation $w = aY + b$:\n- Variance: $\\operatorname{Var}(w) = a^2 \\operatorname{Var}(Y)$ — the constant $b$ drops out because variance measures spread, not location.\n- Standard deviation: $\\sigma_w = |a| \\sigma_y$ — again, $b$ has no effect.\n- Intuition: adding a constant shifts all data but doesn't change how spread out they are. Only the coefficient $a$ stretches or compresses the spread.\n- So for $w = 10y + 20$, the 20 is ignored when computing SD.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "When a question says \"show that\" the variance equals a given value (like Q2b), what should your answer look like? (Q2b S1 May 2024)", "answer": "- Step 1: Write down the formula you are using: $\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$.\n- Step 2: Calculate $E(X^2)$ explicitly, showing all five terms: $2^2(0.25) + 4^2(0.3) + 5^2(0.2) + 7^2(0.1) + 8^2(0.15) = 25.3$.\n- Step 3: Write $[E(X)]^2 = 4.6^2 = 21.16$.\n- Step 4: Subtract: $25.3 - 21.16 = 4.14$.\n- Box the final result to match the question's \"show that\" — the answer is given, but you must derive it showing every step.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "In Q1(f), why must $a \\ge 36$ for $Q_1$ to remain unchanged? (Q1f S1 May 2024)", "answer": "- Step 1: For $N = 36$ (old 32 + 4 new), $Q_1$ is the average of positions 9 and 10.\n- Step 2: In the original sorted data, positions 8 and 9 were both 36. After adding 27 and $a$, these shift to positions 9 and 10.\n- Step 3: For their average to still be 36, neither can be displaced by a new value.\n- Step 4: If $a < 36$, then $a$ would become either the 9th or 10th value, changing $Q_1$.\n- Therefore $a \\ge 36$ is required to preserve $Q_1 = 36$.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "What is the key error to avoid when reading the left-hand side of a back-to-back stem-and-leaf diagram? (Q1 S1 May 2024)", "answer": "- The left-hand leaves (e.g., for Birch) are read **right-to-left**, not left-to-right.\n- Example from the key: \"5 | 6 | 3\" means 65 for Birch (left side) and 63 for Maple (right side).\n- Reading left-to-right would give you 56 instead of 65 — completely wrong values.\n- Always check the key first, then read the specified direction for each side.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "In the Venn diagram question, what is the total probability rule used in part (c) to find $q$? (Q6c S1 May 2024)", "answer": "- All probabilities in the Venn diagram must sum to 1.\n- Sum all eight regions: C only (0.04) + G only (0) + C∩G only (p) + C∩S only (0.12) + S∩G only (0.10) + S only (0.23) + C∩S∩G (0.15) + outside (q) = 1.\n- This gives $0.64 + p + q = 1$, so $p + q = 0.36$.\n- With $p = 0.14$ from part (b), we get $q = 0.22$.\n- The outside region $q$ must be included — forgetting it is a common error.", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "In Q5(c), what is the denominator in the conditional probability calculation and why is it 0.975? (Q5c S1 May 2024)", "answer": "- We want $P(T > \\mu - 5 \\mid T > \\mu - 10)$.\n- The denominator is $P(T > \\mu - 10)$.\n- From Step 1, we found $P(T < \\mu - 10) = 0.025$ (the lower 2.5% tail by symmetry).\n- Therefore $P(T > \\mu - 10) = 1 - 0.025 = 0.975$.\n- The denominator is NOT 0.95 — that's the total probability of being within the interval, not the probability of exceeding the lower bound.", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": false}, {"question": "What is the interpretation of the gradient 0.722 in the regression line $g = -42.3 + 0.722d$? (Q4d S1 May 2024)", "answer": "- For every **1 cm increase** in the length of a bear, the girth increases by approximately **0.722 cm** on average.\n- Key elements to include: (1) the unit of the change (cm), (2) the context (bear length and girth), (3) \"on average\" (since it's a regression, not exact).\n- A common mistake is omitting units or saying \"girth increases by 0.722\" without specifying per what unit of length.", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "In Q4(e)(i), why must you convert 2.5 metres to centimetres before using the regression equation? (Q4e S1 May 2024)", "answer": "- The regression equation was derived from data in **centimetres** (the summary statistics give $\\sum d = 1456.8$ cm for 8 bears).\n- The equation $g = -42.3 + 0.722d$ expects $d$ in cm.\n- 2.5 m = 250 cm — substituting $d = 2.5$ would give a nonsense answer.\n- Substitution: $g = -42.3 + 0.722(250) = -42.3 + 180.5 = 138.2$ cm.", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "What is the difference between $E(X^2)$ and $[E(X)]^2$ in variance calculations? (Q2b S1 May 2024)", "answer": "- $E(X^2)$ is the **expectation of the squared values**: sum of $(x^2 \\times P(X=x))$.\n- $[E(X)]^2$ is the **square of the expectation**: first find $E(X)$, then square it.\n- These are different: $E(X^2) \\neq [E(X)]^2$ in general.\n- The variance formula is $\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$.\n- A common mistake is confusing the two or writing $E(X^2) - E(X)$ (forgetting to square the mean).", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": true}, {"question": "In Q1(e), how do you compare the spreads of two distributions using box plot statistics? (Q1e S1 May 2024)", "answer": "- Compare the **interquartile range (IQR)** for both distributions: $IQR = Q_3 - Q_1$.\n- For Birch: $IQR = 57 - 39 = 18$ cm.\n- For Maple: $IQR = 54 - 36 = 18$ cm.\n- Since the IQRs are equal, the **central spread** is similar.\n- You could also note that Birch has an outlier (85 cm) while Maple has none, so Birch has a heavier upper tail.", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "For grouped data quartiles in Edexcel S1, what formula do you use and what are the key components? (Q3b S1 May 2024)", "answer": "- Use linear interpolation: $Q_r = L + \\frac{rN/4 - F_b}{f} \\times c$\n- Where: $L$ = lower class boundary, $F_b$ = cumulative frequency before the quartile class, $f$ = frequency in quartile class, $c$ = class width.\n- For $Q_1$ (r=1): find position $N/4$, locate the class, then interpolate within that class.\n- Key difference from discrete data: use $N/4$, not $(N+1)/4$, and use the **lower boundary** $L$, not the midpoint.", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "What is the trigger phrase in Q5(b) that should make you draw a sketch before calculating? (Q5b S1 May 2024)", "answer": "- The trigger phrase is **\"fastest 60%\"** (or any \"fastest/slowest p%\" phrasing).\n- This phrase indicates you need to determine whether you're looking at the lower or upper tail of the normal distribution.\n- The exam strategy: **always sketch and shade** the normal curve before standardising.\n- Mark the mean, the cutoff point, and shade the relevant region — this prevents the costly error of using the wrong tail.", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": false}, {"question": "In Q2(c), why must $a$ be positive, and what would happen if you chose the negative root? (Q2c S1 May 2024)", "answer": "- The question states \"where $a$ and $b$ are **positive constants**.\"\n- From variance: $a^2 = 16$, so $a = \\pm 4$. The negative root violates the \"positive constants\" condition.\n- If you chose $a = -4$, then $E(Y) = aE(X) - b = -4(4.6) - b = -18.4 - b = 13.4$, giving $b = -31.8$ — also negative, violating the condition.\n- Always check any sign constraints given in the question.", "source": "MiniMax ①", "_id": "minimax_1_59", "judge_pick": false}, {"question": "In Q6(b), how do you find $P(C)$ and $P(S)$ from the Venn diagram regions? (Q6b S1 May 2024)", "answer": "- $P(C)$ includes ALL regions in the C circle: C only + C∩G only + C∩S only + C∩S∩G\n- $P(C) = 0.04 + p + 0.12 + 0.15 = 0.31 + p$\n- $P(S)$ includes ALL regions in the S circle: S only + C∩S only + S∩G only + C∩S∩G\n- $P(S) = 0.23 + 0.12 + 0.10 + 0.15 = 0.60$\n- The key is: don't miss any sub-region when adding up each circle's total.", "source": "MiniMax ①", "_id": "minimax_1_60", "judge_pick": false}, {"question": "What is the correct formula for standard deviation from coded data when the transformation is $w = ay + b$? (Q3d S1 May 2024)", "answer": "- Step 1: Find the standard deviation of the coded variable $y$: $\\sigma_y = \\sqrt{\\operatorname{Var}(y)}$.\n- Step 2: Apply the scaling formula: $\\sigma_w = |a| \\times \\sigma_y$.\n- For $w = 10y + 20$: $\\sigma_w = 10 \\times \\sigma_y$ (the +20 drops out).\n- A common mistake is to add $b$ somewhere or to scale by $a$ instead of $a^2$ (confusing with variance).\n- Remember: variance scales by $a^2$, standard deviation scales by $|a|$.", "source": "MiniMax ①", "_id": "minimax_1_61", "judge_pick": false}, {"question": "In Q5(c), how do you find $P(Z > -0.98)$ using standard normal tables? (Q5c S1 May 2024)", "answer": "- Step 1: The standard normal tables give $\\Phi(z) = P(Z \\le z)$.\n- Step 2: Use the symmetry property: $P(Z > -0.98) = P(Z < 0.98)$ (the area to the right of -0.98 equals the area to the left of 0.98).\n- Step 3: Look up $\\Phi(0.98)$ in tables: $\\Phi(0.98) = 0.8365$.\n- Step 4: Therefore $P(Z > -0.98) = 0.8365$.\n- The negative $z$-value trick is: convert to positive and use the complement.", "source": "MiniMax ①", "_id": "minimax_1_62", "judge_pick": false}, {"question": "When answering \"find the range of possible values\" questions like Q1(f), what systematic approach ensures you don't miss constraints? (Q1f S1 May 2024)", "answer": "- Step 1: Identify what **must stay unchanged** (here, the five box plot statistics).\n- Step 2: Write each as an inequality constraint on the unknown(s).\n- Step 3: Solve each constraint separately.\n- Step 4: Combine all constraints — the final range is the **intersection** (the most restrictive).\n- For Q1(f): max constraint gives $a \\le 40$, $Q_1$ constraint gives $a \\ge 36$, ordering gives $a \\le 48$. Intersection: $36 \\le a \\le 40$.\n- Listing constraints prevents missing any.", "source": "MiniMax ①", "_id": "minimax_1_63", "judge_pick": false}, {"question": "In Q4(c), what are the correct formulas for the regression line of $g$ on $d$? (Q4c S1 May 2024)", "answer": "- Gradient: $b = \\frac{S_{dg}}{S_{dd}} = \\frac{12,105.12}{16,769.78} = 0.72184...$\n- Means: $\\bar{d} = 1456.8/8 = 182.1$, $\\bar{g} = 713.2/8 = 89.15$\n- Intercept: $a = \\bar{g} - b\\bar{d} = 89.15 - 0.72184(182.1) = -42.298...$\n- Final equation: $g = -42.3 + 0.722d$ (both to 3 s.f.)\n- The key: use the **unrounded** gradient when calculating the intercept.", "source": "MiniMax ①", "_id": "minimax_1_64", "judge_pick": false}, {"question": "What is the difference between the notation $S_{dd}$ and $\\sum d^2$? (Q4a S1 May 2024)", "answer": "- $\\sum d^2$ is the **raw sum of squares**: just square each $d$ value and add them up.\n- $S_{dd}$ is the **corrected sum of squares** for regression: $S_{dd} = \\sum d^2 - \\frac{(\\sum d)^2}{n}$.\n- In regression and correlation formulas, you **must** use the corrected version $S_{dd}$, not the raw $\\sum d^2$.\n- The term $\\frac{(\\sum d)^2}{n}$ removes the contribution of the mean — without this correction, you'd get an inflated (biased) estimate.", "source": "MiniMax ①", "_id": "minimax_1_65", "judge_pick": true}, {"question": "In Q6(e), if you didn't use the shortcut $P(S') = 1 - P(S)$, what regions would you need to sum for $P(S')$? (Q6e S1 May 2024)", "answer": "- $S'$ means \"not in S\" — everything outside the S circle.\n- Regions to sum: C only (0.04) + G only (0) + C∩G only (p = 0.14) + outside region (q = 0.22).\n- Total: $0.04 + 0 + 0.14 + 0.22 = 0.40$.\n- The shortcut $1 - P(S) = 1 - 0.60 = 0.40$ gives the same answer with less chance of forgetting regions.\n- Phuc's error was summing only C-only + C∩G-only = 0.04 + 0.14 = 0.18, missing q.", "source": "MiniMax ①", "_id": "minimax_1_66", "judge_pick": false}, {"question": "In Q3(a), what would be wrong with using frequency (20) directly as the bar height instead of frequency density? (Q3a S1 May 2024)", "answer": "- Using frequency directly as height would **misrepresent** the data because classes have different widths.\n- Example: Class $32 \\le x < 36$ has width 4 and frequency 20. Class $30 \\le x < 32$ has width 2 and frequency 16.\n- If you used frequency as height, the narrower class would appear to have less frequency (16 vs 20), even though when you account for width, the density is actually higher (8 vs 5).\n- Frequency density correctly standardizes by width, so area (not height) represents frequency.", "source": "MiniMax ①", "_id": "minimax_1_67", "judge_pick": true}, {"question": "In Q2(d), what is the final cross-check you should perform after calculating the probability Sam wins? (Q2d S1 May 2024)", "answer": "- Verify that $P(\\text{Sam wins}) + P(\\text{Alex wins}) + P(\\text{draw}) = 1$.\n- From the table: $P(\\text{Sam wins}) = 0.355$.\n- By symmetry (or calculation), Alex's win probability would be different.\n- The draw probability is $P(S = R)$.\n- This cross-check catches errors in summing probabilities — if the total isn't 1, you've made a mistake.", "source": "MiniMax ①", "_id": "minimax_1_68", "judge_pick": false}, {"question": "What does it mean if the product moment correlation coefficient $r$ is exactly +1 or -1? (Q4b S1 May 2024)", "answer": "- $r = +1$ means there is a **perfect positive linear relationship** — all data points lie exactly on a straight line with positive slope.\n- $r = -1$ means there is a **perfect negative linear relationship** — all data points lie exactly on a straight line with negative slope.\n- In practice, $r$ is rarely exactly ±1 with real data. A value like 0.980 indicates the points are very close to a straight line but with some scatter.", "source": "MiniMax ①", "_id": "minimax_1_69", "judge_pick": false}, {"question": "In Q1(b), what is the most efficient way to locate the 9th and 27th values in the Birch data without listing all 35? (Q1b S1 May 2024)", "answer": "- Use the stem-and-leaf row totals (given in the question): stem-2: 2, stem-3: 8, stem-4: 9, stem-5: 9, stem-6: 3, stem-7: 3, stem-8: 1.\n- Cumulative: 2, 10, 19, 28, 31, 34, 35.\n- 9th value: cumulative reaches 9 in stem-3 → Q1 = 39 (last value in stem-3 row).\n- 27th value: cumulative reaches 27 in stem-5 → Q3 = 57 (8th value in stem-5 row).\n- This cumulative method is much faster than writing out all values.", "source": "MiniMax ①", "_id": "minimax_1_70", "judge_pick": false}, {"question": "What is the key insight about subset relationships that simplifies conditional probability calculations like Q5(c)? (Q5c S1 May 2024)", "answer": "- If $A \\subset B$, then $P(A \\cap B) = P(A)$.\n- Therefore $P(A \\mid B) = \\frac{P(A)}{P(B)}$ — no need to compute the intersection separately.\n- In Q5(c): $\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$, so numerator simplifies to $P(T > \\mu - 5)$.\n- This is much simpler than computing $P(T > \\mu - 5 \\cap T > \\mu - 10)$ directly.\n- Always check if one event is a subset of the other before expanding both.", "source": "MiniMax ①", "_id": "minimax_1_71", "judge_pick": false}, {"question": "In Q3(e)(ii), if the pebble weight of 40.8g was NOT equal to the mean, what would be the direction of change for the standard deviation? (Q3e S1 May 2024)", "answer": "- Adding any value that is **not equal to the mean** increases the sum of squared deviations.\n- Whether the SD increases or decreases depends on whether the increase in the numerator ($SS$) is greater or less than the increase in the denominator ($n$).\n- In general: adding a value **far from the mean** increases SD; adding a value **close to the mean** may decrease SD.\n- The special case of adding exactly the mean gives a guaranteed decrease because numerator stays same while denominator increases.", "source": "MiniMax ①", "_id": "minimax_1_72", "judge_pick": false}, {"question": "What is the trigger phrase in Q1(f) that tells you to list five separate constraints? (Q1f S1 May 2024)", "answer": "- The trigger phrase is **\"no change to the box plot\"** — this means all five box plot statistics must remain exactly the same.\n- The five statistics are: minimum, $Q_1$, median, $Q_3$, maximum.\n- Each becomes a constraint on the new data values.\n- The mistake is assuming only the ordering constraint matters — you must check all five.", "source": "MiniMax ①", "_id": "minimax_1_73", "judge_pick": false}, {"question": "In Q4(f), why is the calculation $x = 17.3 / 0.722$ and not $x = 17.3 + 0.722$? (Q4f S1 May 2024)", "answer": "- The question states: \"for each $x$ cm increase in the length of a bear there will be a 17.3 cm increase in the girth.\"\n- This describes a **change** in girth ($\\Delta g$) for a given change in length ($\\Delta d$).\n- From the regression: $g = a + bd$, so $\\Delta g = b \\times \\Delta d$.\n- Setting $\\Delta g = 17.3$: $0.722 \\times x = 17.3$, so $x = 17.3/0.722$.\n- Adding 0.722 would give a tiny change, not a 17.3 cm change.", "source": "MiniMax ①", "_id": "minimax_1_74", "judge_pick": false}, {"question": "What is the key to answering \"comment on any difference\" questions in distribution comparisons? (Q1e S1 May 2024)", "answer": "- Step 1: Identify a **specific statistic** to compare (median, IQR, presence of outliers, skewness).\n- Step 2: State **both values** of that statistic for each distribution.\n- Step 3: Explain what the difference means in context.\n- Example: \"The median Birch growth (48 cm) is greater than the median Maple growth (45 cm)\" — specific statistic + both values + interpretation.\n- Avoid vague statements like \"Birch grows more\" without numbers.", "source": "MiniMax ①", "_id": "minimax_1_75", "judge_pick": false}, {"question": "In Q2(c), why does solving the variance equation first eliminate $b$ from the calculation? (Q2c S1 May 2024)", "answer": "- The formula is $\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$.\n- Notice: there is **no $b$ term** — adding a constant $b$ does not affect variance.\n- Therefore $\\operatorname{Var}(Y) = a^2 \\operatorname{Var}(X)$ gives an equation with only $a$.\n- This is why you solve for $a$ first: $a^2 = 66.24 / 4.14 = 16$, so $a = 4$.\n- Only after finding $a$ do you use the expectation equation (which does involve $b$) to find $b$.", "source": "MiniMax ①", "_id": "minimax_1_76", "judge_pick": false}, {"question": "In Q6(d)(ii), what is the correct interpretation of $P(C \\mid S \\cap G)$? (Q6d S1 May 2024)", "answer": "- This is the probability that a teenager plays Chess, **given that** they play both Scrabble and Go.\n- The condition is playing **both** Scrabble and Go — not just one.\n- The sample space is restricted to the $S \\cap G$ region (both S and G).\n- Among those who play both S and G (probability 0.25), the proportion who also play C is 0.15/0.25 = 0.6.\n- So 60% of S∧G players also play C.", "source": "MiniMax ①", "_id": "minimax_1_77", "judge_pick": false}, {"question": "In the box plot for Birch (Q1d), what is the correct position of the median line within the box? (Q1d S1 May 2024)", "answer": "- With 35 data points, the median is the 18th value.\n- Using cumulative frequencies: stem-2 (2), stem-3 (10), stem-4 (19) — the 18th falls in stem-4.\n- Within stem-4 (leaves 0,1,1,1,3,5,7,8,9), counting from the left (Birch reads right-to-left), the 18th value is 48.\n- So the median line within the box should be drawn at 48, not 47.\n- Position matters for accurate box plot representation.", "source": "MiniMax ①", "_id": "minimax_1_78", "judge_pick": false}, {"question": "What is the key formula for $S_{xy}$ and what does each term represent? (Q4a S1 May 2024)", "answer": "- Formula: $S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$\n- $\\sum xy$ is the sum of products of paired data.\n- $\\frac{(\\sum x)(\\sum y)}{n}$ is the correction term that removes the mean's contribution.\n- This formula gives the **corrected sum of products** needed for regression and correlation.\n- Without the correction, you'd over-estimate the relationship between variables.", "source": "MiniMax ①", "_id": "minimax_1_79", "judge_pick": false}, {"question": "In Q5(b), if you mistakenly used the upper tail, what would be the cutoff time? (Q5b S1 May 2024)", "answer": "- If you incorrectly used $P(X > t) = 0.60$ (upper tail):\n- Then $P(X < t) = 0.40$, so $z = \\Phi^{-1}(0.40) = -0.2533$.\n- Then $t = 15 + (-0.2533)(2) = 15 - 0.5066 = 14.49$ minutes.\n- The correct answer using the lower tail is 15.5 minutes.\n- The difference is about 1 minute — significant in context.\n- The key: \"fastest\" means shortest time = lower tail.", "source": "MiniMax ①", "_id": "minimax_1_80", "judge_pick": false}, {"question": "In Q3(b), why do you use $N/2$ (not $(N+1)/2$) for the median position with grouped data? (Q3b S1 May 2024)", "answer": "- For **discrete** data, some texts use $(N+1)/2$ — but Edexcel S1 uses $N/2$ for grouped continuous data.\n- For grouped data, we assume data is spread uniformly within each class, so the median is at position $N/2$.\n- With $N = 50$, median position is $50/2 = 25$, not 25.5.\n- This is a key difference from discrete data quartile rules — always use $N/2$ for grouped interpolation.", "source": "MiniMax ①", "_id": "minimax_1_81", "judge_pick": false}, {"question": "What is the visual intuition behind frequency density in histograms? (Q3a S1 May 2024)", "answer": "- In a histogram, **area** (not height) represents frequency.\n- Formula: $\\text{Frequency} = \\text{width} \\times \\text{height}$.\n- Therefore: $\\text{height} = \\text{Frequency} / \\text{width} = \\text{Frequency Density}$.\n- This means if two classes have equal frequency but different widths, they will have equal **area** but different **heights** — correctly reflecting equal frequencies.\n- Without FD, narrow classes would appear to have less frequency than wide classes, even if the density is the same.", "source": "MiniMax ①", "_id": "minimax_1_82", "judge_pick": false}, {"question": "In Q2(d), how do you handle the case when $S$ and $R$ could be equal (a draw)? (Q2d S1 May 2024)", "answer": "- The question explicitly states: \"If the scores are the same it is a draw.\"\n- Therefore: Sam wins if $S > R$ (strictly greater).\n- Alex wins if $R > S$ (strictly greater).\n- Draws are neither win — they are counted separately.\n- In the calculation, we sum $P(R < S)$ for Sam's wins, explicitly excluding $R = S$.\n- Using $\\ge$ would overcount Sam's wins.", "source": "MiniMax ①", "_id": "minimax_1_83", "judge_pick": false}, {"question": "What is the key error when calculating $S_{gg}$ in Q4(a) using the wrong denominator? (Q4a S1 May 2024)", "answer": "- A common error is dividing by $n^2$ instead of $n$: $\\sum g^2 - \\frac{(\\sum g)^2}{n^2}$ — this is wrong.\n- Another error is using $S_{dd}$ instead of $S_{gg}$ when calculating $S_{gg}$.\n- The correct formula is $S_{gg} = \\sum g^2 - \\frac{(\\sum g)^2}{n}$, where $n = 8$.\n- The calculation: $72,675.98 - (713.2^2)/8 = 72,675.98 - 63,581.78 = 9,094.20$.", "source": "MiniMax ①", "_id": "minimax_1_84", "judge_pick": false}, {"question": "In Q5(c), how do you find $\\Phi(0.98)$ from the standard normal table? (Q5c S1 May 2024)", "answer": "- Standard normal tables typically give $\\Phi(z) = P(Z \\le z)$ for $z$ to 2 decimal places.\n- Look up $z = 0.98$ in the table.\n- The row is 0.9, the column is 0.08, giving $\\Phi(0.98) = 0.8365$.\n- For $P(Z > -0.98)$, use symmetry: $P(Z > -0.98) = P(Z < 0.98) = 0.8365$.\n- This is the numerator in the conditional probability calculation.", "source": "MiniMax ①", "_id": "minimax_1_85", "judge_pick": false}, {"question": "What is the relationship between variance and standard deviation, and why do we use both? (Q3d S1 May 2024)", "answer": "- Standard deviation $\\sigma = \\sqrt{\\text{variance}}$.\n- Variance is in squared units (e.g., cm²), while standard deviation is in original units (e.g., cm).\n- For interpretation and practical use, standard deviation is more intuitive (same units as the data).\n- For theoretical calculations (like combining transformations), variance is easier to work with ($a^2\\operatorname{Var}(X)$ vs. $|a|\\sigma_X$).\n- Both are provided in exams — use standard deviation for interpretation, variance for transformations.", "source": "MiniMax ①", "_id": "minimax_1_86", "judge_pick": false}, {"question": "In Q1(f), why is $a \\le 48$ not the final answer even though it comes from $a \\le 2a$? (Q1f S1 May 2024)", "answer": "- The constraint $a \\le 2a$ comes from ordering: since the data is $27, a, 48, 2a$ in ascending order, we need $a \\ge 27$ and $2a \\ge 48$.\n- This gives $a \\ge 27$ and $a \\le 48$ — but these are just **ordering** constraints.\n- However, \"no change to the box plot\" imposes **stronger** constraints:\n  - Maximum: $2a \\le 80 \\Rightarrow a \\le 40$\n  - $Q_1$: $a \\ge 36$\n- The final range $36 \\le a \\le 40$ is the intersection of all constraints — the box plot constraints are tighter than the ordering constraints.", "source": "MiniMax ①", "_id": "minimax_1_87", "judge_pick": false}, {"question": "What is the key insight about linearity of expectation that makes coding transformations straightforward? (Q3c S1 May 2024)", "answer": "- For any linear transformation $Y = aX + b$:\n- $E(Y) = aE(X) + b$ — the expectation transforms exactly like the variable.\n- This works because expectation is a linear operator: $E(aX + b) = aE(X) + b$.\n- There is no need to transform each data point individually — just transform the mean.\n- This is why for $w = 10y + 20$, we can write $\\bar{w} = 10\\bar{y} + 20$ directly.", "source": "MiniMax ①", "_id": "minimax_1_88", "judge_pick": false}, {"question": "In Q6, what does it mean for events C and S to be independent, and how do you use this in part (b)? (Q6b S1 May 2024)", "answer": "- Two events are independent if $P(C \\cap S) = P(C) \\times P(S)$.\n- In part (b), we are given that C and S are independent.\n- We compute: $P(C \\cap S) = 0.12 + 0.15 = 0.27$ (from the Venn regions).\n- We compute: $P(S) = 0.60$ (all regions in S circle).\n- We compute: $P(C) = 0.31 + p$ (all regions in C circle).\n- Setting $0.27 = (0.31 + p)(0.60)$ gives $p = 0.14$.", "source": "MiniMax ①", "_id": "minimax_1_89", "judge_pick": false}, {"question": "In Q4(c), why does using rounded gradient 0.722 instead of 0.72184 affect the intercept? (Q4c S1 May 2024)", "answer": "- If you use $b = 0.722$ (rounded to 3 s.f.) to calculate the intercept:\n- $a = \\bar{g} - b\\bar{d} = 89.15 - 0.722(182.1) = 89.15 - 131.45 = -42.30$\n- If you use the exact $b = 0.72184$: $a = 89.15 - 0.72184(182.1) = 89.15 - 131.45 = -42.30$\n- At 3 s.f. precision, the difference may be small. But at higher precision or when the gradient is closer to a boundary, rounding can shift the intercept.\n- The safe approach: use the full calculator value for $b$ when computing $a$, then round only the final answer.", "source": "MiniMax ①", "_id": "minimax_1_90", "judge_pick": false}, {"question": "What is the difference between $P(C \\cap G')$ and $P(C) - P(C \\cap G)$? (Q6a S1 May 2024)", "answer": "- These expressions are equivalent: $P(C \\cap G') = P(C) - P(C \\cap G)$.\n- Why: $P(C) = P(C \\cap G) + P(C \\cap G')$, so rearranging gives the formula.\n- In the Venn diagram: $P(C) = 0.04 + p + 0.12 + 0.15 = 0.31 + p$.\n- $P(C \\cap G) = p + 0.15$.\n- So $P(C) - P(C \\cap G) = (0.31 + p) - (p + 0.15) = 0.16$, matching the direct sum of regions.", "source": "MiniMax ①", "_id": "minimax_1_91", "judge_pick": false}, {"question": "In Q1(d), what is the correct way to draw the whisker when there is an outlier? (Q1d S1 May 2024)", "answer": "- Step 1: Identify the outlier(s) using the fence rule — here, 85 cm is an outlier.\n- Step 2: Draw the whisker from $Q_1$ to the **most extreme non-outlier value** — for Birch, this is 76 cm.\n- Step 3: Draw the outlier as a separate cross (×) or asterisk at 85 cm.\n- Step 4: Do NOT extend the whisker all the way to the outlier — that is a common mistake.\n- The whisker represents the range of non-outlier data.", "source": "MiniMax ①", "_id": "minimax_1_92", "judge_pick": false}, {"question": "In Q3(c), what is the transformation between $y$ and $w$, and why is it important to rearrange correctly? (Q3c S1 May 2024)", "answer": "- Given: $10y = w - 20$.\n- Rearrange to express $w$ in terms of $y$: $w = 10y + 20$.\n- This is crucial because the mean transforms as $\\bar{w} = 10\\bar{y} + 20$.\n- A common mistake is rearranging as $y = (w-20)/10$ and then trying to find $\\bar{w}$ incorrectly.\n- The key: decide which variable is the \"original\" and which is \"coded,\" then apply the linear transformation to the mean.", "source": "MiniMax ①", "_id": "minimax_1_93", "judge_pick": false}, {"question": "What is the sanity check for the PMCC value $r$ in Q4(b)? (Q4b S1 May 2024)", "answer": "- $r$ must always satisfy $-1 \\le r \\le 1$.\n- In Q4(b), we calculate $r = 12,105.12 / 12,349.4 = 0.980$, which is within the valid range.\n- If you get $|r| > 1$, there's definitely an error (likely missing the square root in the denominator).\n- Additionally, the positive value matches the scatter plot intuition — as length increases, girth increases.\n- A negative $r$ would indicate a negative relationship.", "source": "MiniMax ①", "_id": "minimax_1_94", "judge_pick": false}, {"question": "In Q2(b), what is the step-by-step calculation of $E(X^2)$? (Q2b S1 May 2024)", "answer": "- $E(X^2) = \\sum x^2 \\cdot P(X = x)$\n- Calculate each term:\n  - $2^2 \\times 0.25 = 4 \\times 0.25 = 1.0$\n  - $4^2 \\times 0.30 = 16 \\times 0.30 = 4.8$\n  - $5^2 \\times 0.20 = 25 \\times 0.20 = 5.0$\n  - $7^2 \\times 0.10 = 49 \\times 0.10 = 4.9$\n  - $8^2 \\times 0.15 = 64 \\times 0.15 = 9.6$\n- Sum: $1 + 4.8 + 5 + 4.9 + 9.6 = 25.3$\n- Then $\\operatorname{Var}(X) = 25.3 - 4.6^2 = 25.3 - 21.16 = 4.14$.", "source": "MiniMax ①", "_id": "minimax_1_95", "judge_pick": false}, {"question": "In Q1(f), what is the constraint from the median remaining unchanged? (Q1f S1 May 2024)", "answer": "- Original median of Maple = 45 (given).\n- With $N = 36$, median = average of 18th and 19th values.\n- The original 16th and 17th values were 43 and 47 (shifted by +2 after adding 27 and $a$).\n- Their average is $(43 + 47)/2 = 45$ — unchanged.\n- This works as long as $a$ doesn't displace either the 18th or 19th position.\n- For $a$ in the range [36, 40], this condition holds automatically.", "source": "MiniMax ①", "_id": "minimax_1_96", "judge_pick": false}, {"question": "In Q5(c), what is the final calculation step to get the conditional probability? (Q5c S1 May 2024)", "answer": "- We have: numerator = $P(T > \\mu - 5) = P(Z > -5/5.102) = P(Z > -0.98) = 0.8365$.\n- Denominator = $P(T > \\mu - 10) = 0.975$.\n- Step 3: Divide: $0.8365 / 0.975 = 0.8580...$\n- Step 4: Round to 3 s.f.: $\\boxed{0.858}$.\n- This is the probability that, given a bear is in the upper 97.5% of round two times, it is also in the upper 83.65%.", "source": "MiniMax ①", "_id": "minimax_1_97", "judge_pick": false}], "count": 98}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "When you see a letter like k used in a stem-and-leaf diagram (e.g., in the stem-4 row for Maple), what should you recognize about k before solving? (1 step)", "answer": "- Recognise that k is a **single leaf digit** representing a data value, not a count or frequency. The value it represents is $40 + k$ cm. This means $k$ must keep the leaves in ascending order (constrained between the leaf before it and the leaf after it).", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "For Maple with N=32 (even), the median height is given as 45 cm. How do you find k using the position of the 16th and 17th values? (3 steps)", "answer": "- Step 1: For even N, median = average of the N/2 and (N/2 + 1)th values = average of 16th and 17th.\n- Step 2: These both fall in the stem-4 row. The 16th value = 40 + k, the 17th value = 47 (since leaves are 1, 1, 1, k, 7, 8 in order).\n- Step 3: Set (40 + k + 47)/2 = 45 → 87 + k = 90 → k = 3.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "For 35 Birch values, what are the correct positions for Q₁ and Q₃ using the Edexcel S1 rule? (1 step)", "answer": "- Calculate n/4 = 35/4 = 8.75 (not integer) → round UP to position 9 for Q₁.\n- Calculate 3n/4 = 105/4 = 26.25 (not integer) → round UP to position 27 for Q₃.\n- Common mistake: using (n+1)/4 = 9 for Q₁ (would give position 8.75 → 9) — actually same here, but the principle differs for other n values.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "What is the Edexcel S1 quartile rule when n/4 is NOT an integer? (1 step)", "answer": "- When n/4 is not an integer, round UP to the next whole number position. For n = 35: n/4 = 8.75 → round up to 9 → Q₁ is the 9th value. Same rule applies to 3n/4 for Q₃.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "What is the Edexcel S1 quartile rule when n/4 IS an integer? (1 step)", "answer": "- When n/4 is an integer, take the average of that position and the next position. For n = 32: n/4 = 8 → Q₁ is the average of the 8th and 9th values.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "After finding Q₁ = 39 cm and Q₃ = 57 cm for Birch, what are the outlier fences and which value is the outlier? (3 steps)", "answer": "- Step 1: IQR = Q₃ - Q₁ = 57 - 39 = 18.\n- Step 2: Lower fence = Q₁ - 1.5 × IQR = 39 - 27 = 12. Upper fence = Q₃ + 1.5 × IQR = 57 + 27 = 84.\n- Step 3: Smallest Birch value is 28 (> 12, no low outlier). Largest is 85 (> 84), so only 85 cm is an outlier.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "When drawing a box plot for Birch with one outlier at 85 cm, where does the right whisker end? (1 step)", "answer": "- The whisker ends at the **most extreme non-outlier value**, which is 76 cm (not 85). The outlier at 85 is plotted as a separate cross/asterisk beyond the whisker.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "For the \"no change to the box plot\" constraint in Q1(f), what five statistics must remain unchanged when adding four new data values? (1 step)", "answer": "- The five box plot statistics that must stay fixed are: Minimum, Q₁ (lower quartile), Median, Q₃ (upper quartile), and Maximum. Each gives a constraint on the new values.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Given the new Maple data includes 2a cm as the maximum value and the box plot's max stays at 80, what inequality constraint does this place on a? (2 steps)", "answer": "- Step 1: The maximum value must not exceed 80 (the unchanged box plot maximum).\n- Step 2: So 2a ≤ 80 → a ≤ 40. Combined with the ordering constraint a ≥ 48 (from 48 being the third new value), this gives 36 ≤ a ≤ 40.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "What constraint on Q₁ does the value a need to satisfy in Q1(f), and why? (2 steps)", "answer": "- Step 1: For N=36, Q₁ is the average of the 9th and 10th values. The original 8th and 9th values (both 36) slide to positions 9 and 10 after adding 27 and a.\n- Step 2: For their average to remain 36, a must be ≥ 36 so it doesn't push either 36 out of positions 9-10.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "In part (a) of Q2, the inequality 2X - 3 > 5 is given. What is the first step before substituting probabilities? (1 step)", "answer": "- Rearrange the inequality first: 2X - 3 > 5 → 2X > 8 → X > 4. Then sum probabilities for all x > 4: P(5) + P(7) + P(8) = 0.2 + 0.1 + 0.15 = 0.45.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "For the variance calculation in Q2(b), what formula must you use and what is the common mistake? (2 steps)", "answer": "- Step 1: Use Var(X) = E(X²) - [E(X)]². Calculate E(X²) by squaring each x-value (not the probability), multiplying by its probability, and summing.\n- Step 2: Common mistake: squaring the probability instead of x, or forgetting to subtract [E(X)]² at the end.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "In Q2(c), given E(Y) = 13.4 and Var(Y) = 66.24 with Y = aX - b, why do you solve using variance FIRST? (1 step)", "answer": "- Because Var(Y) = a² Var(X) eliminates the constant b, allowing you to find a first. Using E(Y) involves both a and b, so you'd have two unknowns. Solving Var first gives a² = 66.24/4.14 = 16 → a = 4 (positive).", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "For the game in Q2(d), why are Sam's score S and Alex's score R independent, and what does this allow you to do? (2 steps)", "answer": "- Step 1: Sam and Alex each spin the spinner once separately, so their outcomes don't affect each other.\n- Step 2: This means P(S = s and R = r) = P(S = s) × P(R = r). You can multiply probabilities for joint events.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "In Q2(d), before calculating P(Sam wins), what table must you construct first, and why? (1 step)", "answer": "- Build the R-distribution table showing R = 2X₂ - 3 for each possible X₂ value. This transforms the probability distribution so you can compare S and R directly. For X₂ = 2,4,5,7,8, the R-values are 1,5,7,11,13.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "In Q3(a), given the reference bar (32 ≤ x < 36) is 2.5 cm wide and 7.5 cm tall, what TWO scale constants must you derive before solving? (2 steps)", "answer": "- Step 1: Width scale: 2.5 cm corresponds to class width 4 mm → 0.625 cm per mm of class width.\n- Step 2: Height scale: 7.5 cm corresponds to FD = frequency/class width = 20/4 = 5 → 1.5 cm per unit of FD.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "For the class 30 ≤ x < 32 in Q3(a), what are the class width and frequency density, and what are the resulting bar dimensions? (3 steps)", "answer": "- Step 1: Class width = 32 - 30 = 2 mm. Frequency = 16. So FD = 16/2 = 8.\n- Step 2: Bar width = 2 mm × 0.625 cm/mm = 1.25 cm.\n- Step 3: Bar height = 8 × 1.5 cm = 12 cm.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "For grouped data in Q3(b), what formula do you use for the median position, and what is the common error? (1 step)", "answer": "- Use N/2 for the median position (not (N+1)/2). For N=50, median position = 25. The (N+1)/2 rule is for discrete data, not grouped continuous data.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "In Q3(b) using linear interpolation, why do you use 32 (the lower class boundary) not 31.5 as the starting point? (1 step)", "answer": "- The class boundaries are given: 32 ≤ x < 36. The lower boundary is exactly 32, not 31.5. Use L = 32 (the lower limit of the median class), not the midpoint.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "In Q3(c), given 10y = w - 20, how do you find the mean of w? (2 steps)", "answer": "- Step 1: Rearrange: w = 10y + 20. The mean transforms the same way: w̄ = 10ȳ + 20.\n- Step 2: Calculate ȳ = Σy/n = 104/50 = 2.08. Then w̄ = 10(2.08) + 20 = 40.8 grams.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "In Q3(d), what is the formula for standard deviation using raw sums, and what is the common mistake with coding? (2 steps)", "answer": "- Step 1: σ² = (Σy²)/n - ȳ². Calculate Σy² = 233.54, ȳ = 2.08, so σ² = 233.54/50 - 2.08² = 4.6708 - 4.3264 = 0.3444.\n- Step 2: For w = 10y + 20, Var(w) = 10² × Var(y) = 100 × 0.3444 = 34.44. Then σ(w) = √34.44 = 5.87. Common mistake: scaling by 10 instead of 100 for variance.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "In Q3(e), a pebble of weight 40.8g (equal to the mean) is added. What is the effect on the mean and standard deviation? (2 steps)", "answer": "- Step 1: Mean: No change. Adding a value exactly equal to the mean doesn't change the average: (50 × 40.8 + 40.8)/51 = 40.8.\n- Step 2: SD decreases. The new value contributes zero to the sum of squared deviations while n increases from 50 to 51, so variance (and hence SD) decreases.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "In Q4(a), what are the formulas for Sdg and Sgg? (1 step)", "answer": "- Sdg = Σdg - (Σd × Σg)/n. Sgg = Σg² - (Σg)²/n. Both follow the pattern Sxy = Σxy - (Σx)(Σy)/n.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In Q4(b), what is the formula for the product moment correlation coefficient r? (1 step)", "answer": "- r = Sdg / √(Sdd × Sgg). Make sure to take the square root of the product in the denominator.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "For the regression line of g on d in Q4(c), what do you divide by to find the gradient, Sdd or Sgg? (1 step)", "answer": "- For regression of g on d (g is the dependent y-variable, d is the independent x-variable), gradient b = Sdg/Sdd. A common mistake is using Sgg instead, which would give the wrong regression line.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "In Q4(d), what is the interpretation of the gradient 0.722 in context? (1 step)", "answer": "- For every 1 cm increase in the length of a bear, the girth increases by approximately 0.722 cm on average. Must state both variables with units.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "In Q4(e)(ii), why is the estimate for a bear with length 0.5 metres unreliable? (1 step)", "answer": "- 0.5 metres = 50 cm is well outside the observed data range (mean length was 182.1 cm). Using linear regression for extrapolation beyond the data range is unreliable because the linear relationship may not hold.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "In Q4(f), the biologist estimates a 17.3 cm increase in girth for each x cm increase in length. How do you find x? (1 step)", "answer": "- Use the gradient: 0.722 × x = 17.3 → x = 17.3/0.722 ≈ 24.0 cm. Don't add the intercept - for increments, only the gradient matters.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "In Q5(a), what is the standardisation formula for P(X < 18) where X ~ N(15, 2²)? (1 step)", "answer": "- P(X < 18) = P(Z < (18 - 15)/2) = P(Z < 1.5). Convert to standard normal by subtracting the mean and dividing by the standard deviation (not variance).", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "In Q5(b), \"only the fastest 60% of adults from round one take part in round two.\" What tail does this correspond to and what equation do you set up? (2 steps)", "answer": "- Step 1: \"Fastest\" means shortest time, which corresponds to the **lower tail** (left side of the distribution).\n- Step 2: Set P(X < t) = 0.60, not 0.40. Common mistake: using the upper tail (fastest = right side) gives the wrong answer.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "In Q5(c), given P(μ - 10 < T < μ + 10) = 0.95, how do you find the standard deviation σ? (3 steps)", "answer": "- Step 1: By symmetry, P(T < μ - 10) = (1 - 0.95)/2 = 0.025.\n- Step 2: Standardise: (μ - 10 - μ)/σ = -1.96 → -10/σ = -1.96.\n- Step 3: σ = 10/1.96 ≈ 5.10. Common mistake: decimal slip giving 0.510 instead of 5.10.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "In Q5(c), since {T > μ - 5} is a subset of {T > μ - 10}, what simplification can you make to the conditional probability formula? (2 steps)", "answer": "- Step 1: When A ⊂ B, A ∩ B = A, so P(A|B) = P(A)/P(B).\n- Step 2: Here, P(T > μ - 5 | T > μ - 10) = P(T > μ - 5) / P(T > μ - 10). The numerator uses the condition's threshold, not both thresholds.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In Q6(a), what is P(Chess but not Go)? How do you identify which Venn regions to sum? (2 steps)", "answer": "- Step 1: Chess but not Go means in region C, outside G: C only + (C ∩ S only, not G).\n- Step 2: These are regions 0.04 + 0.12 = 0.16. Don't include the regions that involve G (p and 0.15).", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "In Q6(b), given C and S are independent, what equation do you set up? What regions must you include in P(C ∩ S)? (2 steps)", "answer": "- Step 1: Independence: P(C ∩ S) = P(C) × P(S).\n- Step 2: P(C ∩ S) must include BOTH the C∩S-only region (0.12) AND the triple overlap (0.15), total = 0.27. Using only one region is a common mistake.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "In Q6(e), how do you find P(S') efficiently? What is the shortcut? (1 step)", "answer": "- Use the complement shortcut: P(S') = 1 - P(S). This automatically includes all regions outside S, including the outside-the-three-circles region q. Don't try to sum individual Venn regions - you'll likely miss q.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "In Q6(e), to estimate the total number of teenagers from the 76 who play Chess and Go, what probability do you need for P(C ∩ G)? (2 steps)", "answer": "- Step 1: P(C ∩ G) = P(C ∩ G only) + P(C ∩ G ∩ S) = p + 0.15 = 0.14 + 0.15 = 0.29.\n- Step 2: Common mistake: using only 0.15 (the triple overlap). Must include both p and 0.15.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "What is the key insight for Q1(f) - why is the range 36 ≤ a ≤ 40 and not 27 ≤ a ≤ 54? (2 steps)", "answer": "- Step 1: The ordering constraint (27, a, 48, 2a in ascending order) gives 27 ≤ a ≤ 48, but this is NOT sufficient.\n- Step 2: The box plot constraints (no change to min, Q₁, median, Q₃, max) give STRICTER bounds: a ≥ 36 (to keep Q₁ = 36) and a ≤ 40 (to keep max = 80 from 2a ≤ 80).", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "In histogram questions, why must you use frequency density (FD) rather than frequency for the bar height? (1 step)", "answer": "- In a histogram, **area** is proportional to frequency, not height. Height = frequency density = frequency ÷ class width. This ensures that a class twice as wide with the same density has twice the area (twice the frequency).", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "What sanity check can you apply to catch the decimal slip in Q5(c) where σ was incorrectly written as 0.510? (1 step)", "answer": "- The interval was μ ± 10, and 95% of a normal distribution lies within approximately ±2σ. So σ should be roughly 10/2 = 5, not 0.5. Always check: σ should be of the same order of magnitude as half the interval width.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": true}, {"question": "In Q2(d), when calculating P(Sam wins), why can't you use P(X₁ > 2X₂ - 3) with a single distribution? (1 step)", "answer": "- Sam and Alex spin separately (two independent spins), so you need the joint distribution. S and R come from different spins - you cannot treat this as one random variable. Build the R-table first, then use independence to multiply.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "For the \"comment on any difference in distributions\" in Q1(e), what two things must you include to get the mark? (1 step)", "answer": "- You must (i) compare a specific statistic (e.g., medians 48 and 45) and (ii) state both values. Simply saying \"Birch grows more\" without numbers won't earn the mark.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "In regression, what's the difference between interpolation and extrapolation, and which is reliable? (1 step)", "answer": "- Interpolation means estimating within the observed data range (between min and max x-values). Extrapolation means estimating outside this range. Only interpolation is reliable; extrapolation assumes the linear relationship holds beyond the data.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "In Q6(d)(ii), what is P(C | S ∩ G) and what regions go in the numerator and denominator? (2 steps)", "answer": "- Step 1: P(C | S ∩ G) = P(C ∩ S ∩ G) / P(S ∩ G).\n- Step 2: Numerator = 0.15 (the triple overlap). Denominator = P(S ∩ G) = P(triple overlap) + P(S ∩ G only) = 0.15 + 0.10 = 0.25.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "In Q4(c), why must you use the unrounded gradient when calculating the intercept? (1 step)", "answer": "- Using b = 0.722 (rounded) gives a different intercept than using b = 0.72184 (unrounded). The question asks to show the equation equals g = -42.3 + 0.722d, so carry full precision through and round only the final answer.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "In Q3(e)(ii), the added value equals the mean. What is the mathematical reason the standard deviation decreases? (2 steps)", "answer": "- Step 1: Variance = Σ(xi - x̄)² / n. The new value contributes (40.8 - 40.8)² = 0 to the numerator.\n- Step 2: The denominator increases from 50 to 51, so the variance (and hence SD) decreases. The zero-deviation value \"tightens\" the distribution.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "In Q5(b), if you sketched the normal curve and shaded \"fastest 60%\", what would the shading look like? (1 step)", "answer": "- Shade the **left 60%** of the curve (from the left tail up to the cutoff time t). \"Fastest\" means shortest time, which corresponds to the lower tail. The common error is shading the right 60%.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "For the discrete random variable in Q2, what does the phrase \"positive constants\" in Y = aX - b tell you about the sign of a? (1 step)", "answer": "- \"a and b are positive constants\" means a > 0 and b > 0. When solving a² = 16, you must choose the positive root a = 4 (not a = -4).", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "In Q4(a), why is it important to compute Sdg exactly (not rounded)? (1 step)", "answer": "- The question asks for exact values. Small rounding errors in Sdg will propagate through the PMCC calculation and regression line coefficients, causing the final answers to differ from the expected values.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "What is the difference between Var(aX + b) and Var(aX - b)? Does the sign of b matter? (1 step)", "answer": "- The sign of b does NOT affect variance: Var(aX + b) = a² Var(X) and Var(aX - b) = a² Var(X). The constant b cancels out in variance (it affects expectation but not spread). Only the coefficient a is squared.", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "In Q1(b), for Birch with N=35, why is Q₁ at position 9 and not position 8 or 9? (1 step)", "answer": "- n/4 = 35/4 = 8.75, which is not an integer. The Edexcel S1 rule says: if n/4 is NOT an integer, round UP to the next whole number. So round 8.75 up to 9. Position 9 is correct.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "For the box plot comparison in Q1(e), if you wanted to also comment on skewness, how would you determine the direction? (1 step)", "answer": "- Compare the mean to the median. For Birch: median = 48. For Maple: median = 45. If mean < median, data is negatively skewed (long tail on lower side). If mean > median, positively skewed. The IQRs are equal (18), so spread is similar.", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "In Q3(b), what is the linear interpolation formula for the median of grouped data? (1 step)", "answer": "- Median = L + ((N/2 - Fb) / fm) × c, where L = lower boundary of median class, N/2 = median position, Fb = cumulative frequency before median class, fm = frequency in median class, c = class width.", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": false}, {"question": "In Q2(b), when showing Var(X) = 4.14, what explicit terms must you write to get method marks? (1 step)", "answer": "- Write out all five x²·P(X=x) terms: 2²(0.25) + 4²(0.3) + 5²(0.2) + 7²(0.1) + 8²(0.15) = 1 + 4.8 + 5 + 4.9 + 9.6 = 25.3. Then show E(X)² = 4.6² = 21.16, and subtract.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": false}, {"question": "In Q6(c), after finding p = 0.14, how do you find q using the probability sum rule? (1 step)", "answer": "- Sum all eight regions equals 1: 0.04 + 0 + 0.15 + 0.14 + 0.12 + 0.10 + 0.23 + q = 1. This gives 0.64 + q = 1, so q = 0.36 - 0.14 = 0.22.", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": false}, {"question": "What does the empirical rule \"fastest p%\" translate to in probability notation, and why do students get this wrong? (1 step)", "answer": "- \"Fastest p%\" means the p% with shortest times → P(X < t) = p/100 (lower tail). Students get it wrong because they associate \"fastest\" with the right side of the distribution (largest values), when it actually means the left side (smallest values).", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "In Q1(f), why can't you just use the ordering constraint 27 ≤ a ≤ 48 from the data being in ascending order? (1 step)", "answer": "- The ordering constraint alone would give a wide range. But the box plot statistics must remain unchanged - this gives STRICTER constraints: Q₁ = 36 requires a ≥ 36, and Max = 80 requires 2a ≤ 80 → a ≤ 40. The box plot constraints are tighter.", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "For the Venn diagram in Q6, what is the region outside all three circles and how do you label it? (1 step)", "answer": "- It's the region q, representing teenagers who play none of the three games. This region must be included when calculating total probabilities (sum = 1) and when finding \"not playing Scrabble\" using the complement.", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "In Q5(c), after finding σ ≈ 5.10, how do you calculate P(T > μ - 5)? (2 steps)", "answer": "- Step 1: Standardise: P(T > μ - 5) = P(Z > (μ - 5 - μ)/5.10) = P(Z > -0.98).\n- Step 2: P(Z > -0.98) = P(Z < 0.98) = 0.8365 (by symmetry). Look up Φ(0.98) in the normal table.", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": false}, {"question": "In Q3(a), if you only computed frequency density but didn't derive the two scale constants, what would you likely get wrong? (1 step)", "answer": "- You might multiply class width by the reference bar's width directly (e.g., 2 × 2.5 = 5 cm), which is wrong. You need the scale factor 0.625 cm per mm, then multiply: 2 mm × 0.625 = 1.25 cm.", "source": "MiniMax ②", "_id": "minimax_2_58", "judge_pick": false}], "count": 59}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "S1 May 2024 Q1 — when reading a back-to-back stem-and-leaf diagram, in which direction do you read the leaves on the LEFT side of the stem, and why does this matter?", "answer": "- Step 1: The LEFT-side leaves must be read **outwards from the stem**, i.e. **right-to-left**. The leaf closest to the stem is the smallest digit.\n- Step 2: This matters because if you read left-to-right (the natural reading direction), you reverse the order of every value, so values that should be small look large.\n- Step 3: Before transcribing any values, also read the **key** — it tells you e.g. that \"5 | 6 | 3\" means 65 cm for the LEFT (Birch) tree and 63 cm for the RIGHT (Maple).\n\nTakeaway: leaves grow OUTWARD from the stem on both sides.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "In a back-to-back stem-and-leaf diagram where one row reads \"1 1 1 k 7 8\", what does the symbol $$k$$ represent, and what constrains its value?", "answer": "- Step 1: $$k$$ is a **single digit** representing one leaf — NOT a count, NOT a frequency, NOT a sum.\n- Step 2: Because the row represents one stem (say stem 4), the actual value $$k$$ represents is $$40+k$$.\n- Step 3: $$k$$ is constrained by the **ascending order** of leaves: it must lie between the leaf before it (1) and the leaf after it (7), so $$1 \\le k \\le 7$$.\n\nCommon pitfall: writing \"$$k+7$$\" treating $$k$$ as a leaf count instead of a single digit.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "For a back-to-back stem-and-leaf where you know the median of one side equals a given value, what's the strategy to set up an equation for the unknown leaf $$k$$? (3 steps)", "answer": "- Step 1: Find $$N$$ for that side and identify the median position — if $$N$$ even, median = $$\\tfrac{1}{2}(x_{N/2} + x_{N/2+1})$$.\n- Step 2: Use **cumulative frequencies** of the stems to locate which two ordered values are the median pair. Write each as a stem-value-plus-leaf expression (e.g. $$40+k$$ and $$47$$).\n- Step 3: Set $$\\tfrac{(40+k)+47}{2} = \\text{given median}$$ and solve.\n\nInsight: cumulative frequencies are the fast way to \"jump\" to the $$N/2$$-th value without counting leaves one by one.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "What is the Edexcel IAL S1 rule for finding the quartile position $$Q_1$$ from $$n$$ data values, and how does it differ from the GCSE / M-stats rule? (2 steps)", "answer": "- Step 1: Compute $$n/4$$.\n+ If $$n/4$$ is **NOT** an integer → round **up** to the next integer position.\n+ If $$n/4$$ **IS** an integer → take the **average** of the $$(n/4)$$th and $$(n/4+1)$$th values.\n- Step 2: This differs from GCSE / M-stats where the position is $$(n+1)/4$$. Edexcel S1 uses $$n/4$$, NOT $$(n+1)/4$$. The same rule applies to $$Q_3$$ using $$3n/4$$.\n\nPitfall: Using $$(n+1)/4$$ — that's the wrong syllabus.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "For $$n=35$$ data values, what positions are $$Q_1$$ and $$Q_3$$ in the ordered list under the Edexcel S1 rule?", "answer": "- Step 1: $$n/4 = 35/4 = 8.75$$ — not an integer, so round up → $$Q_1$$ is the **9th** value.\n- Step 2: $$3n/4 = 26.25$$ — not an integer, so round up → $$Q_3$$ is the **27th** value.\n\nCommon slip: counting to position 6 or 8 instead of 9 — this happens when you miscount cumulative leaves on a stem-and-leaf diagram.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "For $$n=32$$ data values, what positions are used for $$Q_1$$ and the median under the Edexcel S1 rule, and what's different from the $$n=35$$ case?", "answer": "- Step 1: $$n/4 = 8$$ — integer, so $$Q_1$$ is the **average** of the 8th and 9th values.\n- Step 2: $$n/2 = 16$$ — integer, so the median is the **average** of the 16th and 17th values.\n- Step 3: The key difference vs $$n=35$$: when the position is an integer, you AVERAGE; when not, you round UP. Always check which case applies before locating values.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "S1 May 2024 Q1(c) — what's the formula for an outlier under the \"$$1.5 \\times \\text{IQR}$$\" rule, and is it in the formula booklet?", "answer": "- Step 1: An outlier is any $$x$$ such that $$x < Q_1 - 1.5(Q_3-Q_1)$$ or $$x > Q_3 + 1.5(Q_3-Q_1)$$.\n- Step 2: This is **NOT** in the IAL booklet — you must memorise it. The factor 1.5 must be applied to the IQR, not to $$Q_1$$ or $$Q_3$$ individually.\n- Step 3: Always write \"$$1.5 \\times \\text{IQR} = \\ldots$$\" as a separate line in your working so the examiner awards method marks even if a fence is wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "When checking for outliers, why should you state BOTH the lower fence and upper fence in your working, even if no low outliers exist?", "answer": "The marker awards method marks for showing the full outlier test, not just for spotting the one outlier. If you only quote the upper fence (because you noticed the max looks suspicious), you lose method marks for the lower-fence check. Also, stating both fences is the only way to **show** the lower side is clear — without writing the lower fence, the reader cannot tell whether you forgot it or merely concluded no low outliers exist.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "When drawing a box plot for a dataset that contains an outlier, where does the whisker end?", "answer": "- Step 1: The whisker ends at the **most extreme non-outlier** value — NOT at the outlier itself.\n- Step 2: Outliers are plotted separately as a cross or asterisk, outside the whisker.\n- Step 3: Example: if max is 85 (outlier) and the next-largest value is 76, the whisker stops at 76, and 85 is drawn as a separate ×.\n\nPitfall: extending the whisker to the outlier — this treats the outlier as part of the normal spread.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": false}, {"question": "What is the minimum content for a 1-mark \"compare two distributions\" comment in S1?", "answer": "- Step 1: Compare ONE specific named statistic (median, mean, IQR, range) — not vague terms like \"average\".\n- Step 2: State BOTH numerical values explicitly (e.g. \"median Birch = 48 cm, median Maple = 45 cm\").\n- Step 3: One short sentence linking them suffices (e.g. \"Birch grow more on average\").\n\nPitfall: \"Birch are taller\" with no values — zero marks. The mark is for the comparison **with numbers**.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "S1 May 2024 Q1(f) — when a problem says \"the box plot is unchanged\" after new data are added, how many constraints does this give you, and what are they? (3 steps)", "answer": "- Step 1: It gives FIVE constraints — one for each of the box-plot statistics: min, $$Q_1$$, median, $$Q_3$$, max. ALL five must be preserved.\n- Step 2: For each constraint, determine which new value (or pair of new values) could violate it, and convert into an inequality on the unknown.\n- Step 3: The solution is the **intersection** of all five constraints (the strictest pair binds).\n\nPitfall: stopping after using only the ordering constraint on the new data — you'll miss the constraint coming from the max (e.g. $$2a$$ must not exceed the old max).", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "When new data are added and you must re-derive quartile positions, what value of $$N$$ do you use, and what's the trap?", "answer": "- Step 1: Use $$N = \\text{old } n + \\text{number of new values}$$. E.g. old $$n=32$$ plus 4 new values → $$N=36$$.\n- Step 2: Re-apply the Edexcel rule with the NEW $$N$$. With $$N=36$$: $$N/4 = 9$$ is integer → $$Q_1$$ = average of 9th and 10th values; $$N/2 = 18$$ integer → median = average of 18th and 19th.\n- Step 3: Trap: the rule (integer vs non-integer) can FLIP when $$N$$ changes. $$N=32$$ used averaging; if $$N=35$$ you would round up instead.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "S1 May 2024 Q2(a) — when a question asks for $$P(2X-3 > 5)$$ for a discrete random variable, what's the first move? (2 steps)", "answer": "- Step 1: Rearrange the inequality on $$X$$ FIRST: $$2X-3>5 \\iff X>4$$. Don't try to compute $$2X-3$$ for each $$x$$.\n- Step 2: Then sum point probabilities of $$X$$ for all valid values: $$P(X>4) = P(X=5)+P(X=7)+P(X=8)$$. Note the inequality is **strict**, so exclude $$X=4$$.\n\nInsight: the discrete distribution of $$X$$ is given — work on $$X$$'s scale, not on a transformed scale.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "For a discrete random variable $$X$$, what is the formula for $$E(X^2)$$, and what's the most common slip when computing it?", "answer": "- Step 1: $$E(X^2) = \\sum x^2 \\cdot P(X=x)$$ — you **square the $$x$$**, not the probability.\n- Step 2: Most common slip: squaring the probability (writing $$x \\cdot p^2$$). The probability is a weight, not a value to square.\n- Step 3: Layout each term explicitly: $$2^2(0.25) + 4^2(0.3) + \\ldots$$ — five terms shown, then sum. Showing terms wins method marks even if arithmetic slips.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "What's the difference between $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$ and the raw-data form $$\\sigma^2 = \\tfrac{\\sum x^2}{n} - \\bar{x}^2$$, and which is in the IAL formula booklet?", "answer": "- Step 1: $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$ is the **discrete random variable** form — IS in the IAL booklet.\n- Step 2: $$\\sigma^2 = \\tfrac{\\sum x^2}{n} - \\bar{x}^2$$ is the **raw data** form — NOT in the IAL booklet. You must memorise it.\n- Step 3: Both have the same structure (\"mean of squares minus square of mean\") but operate on different objects: probabilities vs. raw observations.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "S1 May 2024 Q2(c) — given $$Y = aX-b$$ with $$E(Y)$$ and $$\\operatorname{Var}(Y)$$ both stated, what's the strategic order to solve for $$a$$ and $$b$$, and why?", "answer": "- Step 1: Use the **variance equation first**: $$\\operatorname{Var}(Y) = a^2 \\operatorname{Var}(X)$$. The constant $$-b$$ drops out, isolating $$a^2$$ in one step.\n- Step 2: Take the positive root (or whichever sign the question specifies — here \"positive constants\").\n- Step 3: THEN substitute $$a$$ into $$E(Y) = aE(X) - b$$ to solve for $$b$$.\n\nWhy this order: doing $$E(Y)$$ first gives one equation in two unknowns. Variance gives one equation in one unknown — much cleaner.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "For $$Y = aX+b$$, what's the formula for $$\\operatorname{Var}(Y)$$, and what's the classic sign-related slip?", "answer": "- Step 1: $$\\operatorname{Var}(aX+b) = a^2\\operatorname{Var}(X)$$. The constant $$b$$ has NO effect on variance (shifting doesn't change spread).\n- Step 2: Classic slip: writing $$\\operatorname{Var}(Y) = a\\operatorname{Var}(X)$$ — forgetting the SQUARE on $$a$$.\n- Step 3: Also, when $$a$$ is negative, $$a^2$$ is still positive — variance can never be negative, so sign of $$a$$ doesn't matter for variance.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "If two random variables $$S$$ and $$R$$ come from two SEPARATE spins of the same spinner, how do you compute $$P(S>R)$$, and why is this different from a transformed version of a single spin? (3 steps)", "answer": "- Step 1: Two separate spins → $$S$$ and $$R$$ are **independent**. So $$P(S=s, R=r) = P(S=s)P(R=r)$$.\n- Step 2: Condition on $$S$$ and sum: $$P(S>R) = \\sum_s P(S=s) \\cdot P(R<s)$$. For each value of $$S$$, find all $$R$$-values strictly below it.\n- Step 3: This is fundamentally different from $$Y = 2X - 3$$ (a deterministic transform of ONE outcome), where $$X$$ and $$Y$$ are perfectly dependent.\n\nTrap: enumerating $$P(X=x \\text{ and } Y=y)$$ as if they came from the same spin — gives the wrong answer.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "In a \"Sam wins\" game where Sam's score must be strictly higher than Alex's, why is the inequality strict, and what's the sanity check?", "answer": "- Step 1: \"The person with the **higher** score wins. If t
