$\\lceil n/4 \\rceil$$ (round up) for $$Q_1$$ when $$n/4$$ is non-integer. For grouped continuous data, you use $$N/2$$ for the median and analogous fractional positions for quartiles, followed by **linear interpolation** within the class.\n- Step 2: **Reference point:** Discrete data uses the **ordered data value** directly. Grouped data uses the **lower class boundary** $$L$$ as the starting point for interpolation.\n- Step 3: **Formula:** Discrete requires no interpolation formula; grouped requires\n$$L + \\frac{\\text{position} - F_b}{f_m} \\times c.$$\nThe two methods must never be mixed.", "source": "Kimi K2.6 ①", "_id": "kimi_1_57"}, {"question": "Write the standard formula for $$\\operatorname{Var}(X)$$ in terms of $$E(X^2)$$ and $$E(X)$$, and explain why you subtract $$E(X)^2$$ rather than $$E(X)$$.", "answer": "- Step 1: $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$.\n- Step 2: Intuition: variance is the expected **squared deviation** from the mean: $$E[(X - \\mu)^2]$$. Expanding: $$E[X^2 - 2X\\mu + \\mu^2] = E(X^2) - 2\\mu E(X) + \\mu^2 = E(X^2) - \\mu^2$$.\n- Step 3: Subtracting $$E(X)$$ instead of $$[E(X)]^2$$ has the wrong units — variance is in units of $$x^2$$, so subtraction must be of an $$x^2$$ quantity.\n\nUnits sanity-check: $$E(X^2)$$ and $$\\mu^2$$ both have units $$x^2$$; $$\\mu$$ alone doesn't.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "What's the sanity check for $$\\sigma$$ when you compute it from a symmetric interval like $$P(\\mu - k < T < \\mu + k) = 0.95$$, and why does this matter?", "answer": "- Step 1: $$\\sigma = k/1.96$$. Since 1.96 ≈ 2, the answer should be roughly $$k/2$$ — same order of magnitude as $$k$$.\n- Step 2: If $$k=10$$, $$\\sigma$$ should be about 5, NOT 0.5 or 50. A decimal slip here (writing 0.510 instead of 5.10) is a critical exam-killer.\n- Step 3: This was THE headline error on this paper — confirmed even the tutor made the slip on tape. Always sanity-check magnitude before continuing.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "What's the strategy for handling \"fastest $$p\\%$$\" vs \"slowest $$p\\%$$\" in any normal distribution context-question?", "answer": "- Step 1: SKETCH the normal curve before doing any algebra.\n- Step 2: Translate the English:\n+ \"Fastest $$p\\%$$\" → shortest times → LOWER tail → $$P(X<t) = p/100$$\n+ \"Slowest $$p\\%$$\" → longest times → UPPER tail → $$P(X>t) = p/100$$\n- Step 3: Shade the relevant region on your sketch and label it $$p/100$$.\n\nThis explicit sketch step is the antidote to flipping the tail direction under exam pressure.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "S1 May 2024 Q1(c) — Why does the outlier detection use **1.5 × IQR** as the multiplier? (2 steps)", "answer": "- Step 1: The multiplier defines the **fences** as $Q_1 - 1.5 \\times \\text{IQR}$ and $Q_3 + 1.5 \\times \\text{IQR}$.  \n- Step 2: This creates a **buffer zone** where values beyond are considered extreme. The 1.5 factor balances sensitivity and robustness — smaller would flag too many \"outliers\", larger would miss actual extremes.  \n+ **Example:** For $\\text{IQR} = 18$, upper fence $= 57 + 27 = 84$. Only 85 exceeds this, making it the sole outlier.", "source": "Qwen 3 ③", "_id": "qwen_3_1"}, {"question": "S1 May 2024 — Conceptual: Why does $\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$, and why doesn't $b$ appear? Give an intuitive explanation. (2 steps)", "answer": "- Step 1: Variance measures **spread** — how far values are from their mean. Multiplying by $a$ stretches (or compresses) all deviations by a factor of $a$, so squared deviations scale by $a^2$. If everyone's height doubles, the spread doubles too (and variance quadruples).\n- Step 2: Adding $b$ **shifts** every value by the same amount — it moves the entire distribution without changing how spread out it is. If everyone gets a £1000 bonus, the mean salary increases by £1000 but the variance in salaries doesn't change.\n\nThink of it as: scaling changes the \"ruler,\" shifting changes the \"origin.\" Only the ruler affects spread.", "source": "GLM 5.1 ①", "_id": "glm_1_55"}, {"question": "S1 May 2024 Q6(e) — Phuc computed $P(S') = 0.04 + 0.14 = 0.18$ (only Chess-region pieces) and got 47 teenagers not playing Scrabble. What did he miss, and what is the reliable shortcut? (3 steps)", "answer": "- Step 1: $P(S')$ means the probability of being **outside** circle $S$ entirely. This includes: $C$ only (0.04), $G$ only (0), $C \\cap G$ only ($p = 0.14$), **and the outside region** $q = 0.22$. Phuc missed $q$ and the $G$-only region.\n- Step 2: The reliable shortcut: $P(S') = 1 - P(S) = 1 - 0.60 = 0.40$. This is guaranteed to include every region outside $S$, including the outside-the-circles region, because you're subtracting the total inside $S$ from 1.\n- Step 3: Correct calculation: total teenagers = $76 / P(C \\cap G) = 76 / 0.29 = 262.07$. Number not playing Scrabble = $262.07 \\times 0.40 = 104.83 \\approx 105$.\n\n**Always use $P(A') = 1 - P(A)$ for complements in Venn diagrams.** Adding up regions manually is error-prone because you might forget the outside region.", "source": "GLM 5.1 ①", "_id": "glm_1_50"}, {"question": "For a \"compare distributions\" 1-mark comment, what TWO ingredients must appear in the sentence to earn the mark? (2 steps)", "answer": "- Step 1: A specific **named statistic** (e.g. \"median\", \"IQR\") — not the vague word \"average\".\n- Step 2: The two numerical **values** of that statistic for the two groups, plus a directional comparison (which is bigger).\n\nExample: \"The median Birch growth (48 cm) is greater than the median Maple growth (45 cm), so on average Birch trees grow more in one year.\" Naming + numbers + direction.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "When computing $$P(\\text{Sam wins}) = P(S > R)$$ where $$S$$ and $$R$$ are independent, what's the cleanest tabulation strategy? (3 steps)", "answer": "- Step 1: Build the distribution of $$R$$ explicitly — compute $$R = 2X_2 - 3$$ for each $$X_2$$ value and copy the probabilities.\n- Step 2: **Condition on $$S$$**: for each value $$s$$, compute $$P(R < s)$$ from the $$R$$ distribution.\n- Step 3: Sum over $$s$$: $$P(S > R) = \\sum_s P(S = s) \\cdot P(R < s)$$.\n\nWhy conditioning on $$S$$ works: $$S$$ has only 5 values, so it's a small sum. Each term reduces to a marginal calculation.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "S1 May 2024 Q2(b) — In a \"show that\" variance question, what is the exact formula you must quote first, and what arithmetic structure should you show to secure all three marks? (3 steps)", "answer": "- Step 1: Quote the definitional formula (in the IAL booklet):\n$$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2.$$\n- Step 2: Show the explicit calculation of $$E(X^2)$$ as the sum of each $$x^2 \\cdot P(X=x)$$ across all five values. Write each term separately:\n$$E(X^2) = 2^2(0.25) + 4^2(0.3) + 5^2(0.2) + 7^2(0.1) + 8^2(0.15).$$\n- Step 3: Subtract $$[E(X)]^2 = 4.6^2$$ from the computed $$E(X^2)$$ and present the exact result $$4.14$$. Do not square the probabilities; square the $$x$$ values.", "source": "Kimi K2.6 ①", "_id": "kimi_1_16"}, {"question": "How do you interpret the gradient of a regression line of $$g$$ on $$d$$ (girth on length) in context, for a 1-mark interpretation question?", "answer": "\"For every 1 cm increase in the **length** of a bear, the **girth** increases by approximately $$b$$ cm on average.\"\n\nThree required ingredients:\n- A specific increment (\"for every 1 cm increase\").\n- Named variables in context (not just \"$$x$$\" and \"$$y$$\").\n- Units stated explicitly.\n\nPitfall: \"the line slopes up\" or \"they're positively correlated\" — too vague, no mark.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "S1 May 2024 Q1(f) — How does increasing the sample size from $$N=32$$ to $$N=36$$ change the method for calculating $$Q_1$$, and why does this create a lower bound on $$a$$? (3 steps)", "answer": "- Step 1: For $$N=36$$ (divisible by 4), $$Q_1$$ is the **average of the 9th and 10th** ordered values, rather than a single value at position 8 or 9.\n- Step 2: The original Maple data had two values of 36 in positions 8 and 9. Adding the new value 27 shifts these two 36s to positions 9 and 10. For their average to remain 36, no new value smaller than 36 (specifically $$a$$) can insert itself between them.\n- Step 3: Therefore $$a \\ge 36$$. If $$a$$ were less than 36, it would displace one of the 36s from the 9th or 10th position, changing the average and destroying $$Q_1$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_12"}, {"question": "S1 May 2024 Q3(d) — When finding the standard deviation of $$w$$ from coded data $$y$$, what is the correct order of operations, and why must you take the square root before scaling by 10? (3 steps)", "answer": "- Step 1: Compute the **variance of $$y$$** first, using either $$\\operatorname{Var}(y) = \\frac{\\sum y^2}{n} - \\bar{y}^2$$ or $$\\frac{S_{yy}}{n}$$.\n- Step 2: Take the **square root** to obtain $$\\sigma_y$$. Only after obtaining the standard deviation of the coded data do you scale by the absolute value of the coding multiplier.\n- Step 3: Scale $$\\sigma_w = 10 \\times \\sigma_y$$. You cannot scale the variance by 10 and then square-root, because variance scales by $$10^2$$, not 10. The constant $$+20$$ does not affect spread at all.", "source": "Kimi K2.6 ①", "_id": "kimi_1_27"}, {"question": "S1 May 2024 Q5(c) — given $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$ for $$T \\sim N(\\mu, \\sigma^2)$$, what's the strategy to extract $$\\sigma$$? (3 steps)", "answer": "- Step 1: The interval is **symmetric** about $$\\mu$$, so $$P(T < \\mu-10) = (1 - 0.95)/2 = 0.025$$.\n- Step 2: Standardise the lower endpoint: $$\\dfrac{(\\mu-10) - \\mu}{\\sigma} = -1.96$$ (since $$\\Phi^{-1}(0.025) = -1.96$$).\n- Step 3: Solve: $$\\sigma = \\dfrac{10}{1.96} \\approx 5.10$$.\n\nSanity check: $$\\sigma$$ should be of similar order to the interval half-width. 10/1.96 ≈ 5, NOT 0.5.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "Q5(b) May 2024 is a critical pitfall. The question asks for the longest time for the \"fastest 60%\" of adults. Which tail of the normal distribution does this correspond to, and what is the correct probability statement? (2 steps)", "answer": "- Step 1: \"Fastest\" means **shortest times**, which corresponds to the **lower tail** (left side) of the distribution. Sketch the curve and shade the left 60%.\n- Step 2: The correct probability statement is $$P(X < t) = 0.60$$. The common fatal error is writing $$P(X < t) = 0.40$$ or $$P(X > t) = 0.60$$, which treats \"fastest\" as the upper tail and gives $$t \\approx 14.5$$ instead of the correct $$t \\approx 15.5$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_35"}, {"question": "What's the sanity-check intuition for $$\\sigma$$ from a symmetric interval like \"$$P(\\mu - k < T < \\mu + k) = 0.95$$\"?", "answer": "- Step 1: 95% of normal data lies within roughly $$\\pm 2\\sigma$$ (more precisely $$\\pm 1.96\\sigma$$) of the mean.\n- Step 2: So $$k \\approx 2\\sigma$$, meaning $$\\sigma \\approx k/2$$.\n- Step 3: For $$k = 10$$: $$\\sigma \\approx 5$$ — your computed $$\\sigma = 10/1.96 = 5.102$$ should pass this check; $$\\sigma = 0.51$$ should fail loudly.\n\nQuick mental order-of-magnitude check saves you from decimal slips.", "source": "Opus 4.7 ②", "_id": "opus_2_61"}, {"question": "What does it mean physically for two random variables $$S = X_1$$ and $$R = 2X_2 - 3$$ to be independent, even though they share the SAME spinner?", "answer": "- Step 1: The spinner is a physical device, but each SPIN is a separate trial with no memory.\n- Step 2: $$X_1$$ (Sam's spin) and $$X_2$$ (Alex's spin) are different random variables — they happen to have the same distribution because the spinner is the same.\n- Step 3: Independence of $$X_1, X_2$$ implies independence of any functions of them, including $$S = X_1$$ and $$R = 2X_2 - 3$$.\n\nSame distribution ≠ same outcome. Two different spins, two independent observations.", "source": "Opus 4.7 ②", "_id": "opus_2_69"}, {"question": "The regression line of $g$ on $d$ is $g = -42.3 + 0.722d$. The intercept is negative (-42.3 cm). Does this mean a bear with zero length has negative girth? Why is this not a problem? (2 steps)", "answer": "- Step 1: The intercept is the predicted $g$-value when $d = 0$, but $d = 0$ cm is far outside the observed range of bear lengths (mean ≈ 182 cm). The regression line is only valid within the data range.\n- Step 2: The negative intercept is a mathematical consequence of fitting a straight line to data that are far from the origin. It doesn't imply anything about reality at $d = 0$ — it's simply the line that best fits the observed data. This is why extrapolation (e.g., to $d = 50$ cm) is unreliable: the model's predictions outside the data range may be nonsensical.", "source": "GLM 5.1 ③", "_id": "glm_3_62"}, {"question": "What's the \"no-change-to-box-plot when new data added\" strategy for finding the constraint $$a \\le 40$$ from the maximum? (2 steps)", "answer": "- Step 1: Identify which new value could potentially exceed the old max. If new data are $$27, a, 48, 2a$$ and old max is 80, the candidate is $$2a$$ (since $$a \\le 48$$, $$a$$ itself can't exceed 80).\n- Step 2: Require $$2a \\le 80 \\implies a \\le 40$$. This is STRICTER than the ordering constraint $$a \\le 48$$, so it's the binding constraint.\n\nPitfall: keeping only the ordering constraint ($$a \\le 48$$) and missing the box-plot's max constraint.", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "S1 May 2024 Q4(f) — When the question asks for the increase in $$d$$ that produces a given increase in $$g$$, why do you use only the gradient and ignore the intercept? (2 steps)", "answer": "- Step 1: The intercept $$a$$ represents the value of $$g$$ when $$d=0$$. For **changes** (increments) $$\\Delta g$$ and $$\\Delta d$$, the intercept cancels out:\n$$\\Delta g = [a + b(d+\\Delta d)] - [a + bd] = b\\,\\Delta d.$$\n- Step 2: Therefore set $$\\Delta g = b \\cdot x$$ and solve $$x = \\Delta g / b$$. Using the full equation $$-42.3 + 0.722x = 17.3$$ incorrectly treats 17.3 as an absolute $$g$$-value rather than an increment.", "source": "Kimi K2.6 ①", "_id": "kimi_1_37"}, {"question": "Why is $$P(S')$$ in a 3-set Venn problem often miscalculated as too small, and what's the diagnostic?", "answer": "- Step 1: Students typically sum only \"non-$$S$$\" regions inside the circles (e.g. $$C$$ only, $$G$$ only, $$C \\cap G$$ only) and forget the outside-everything region $$q$$.\n- Step 2: Diagnostic: if your $$P(S')$$ comes out much less than $$1 - P(S)$$, you've missed regions.\n- Step 3: Counter-example from the paper: piece-by-piece gave $$0.04 + 0 + 0.14 = 0.18$$ (missing $$q = 0.22$$), giving 47 teenagers. The correct $$1 - 0.60 = 0.40$$ gave 105.\n\nIf the cross-check fails, find the missing region — usually $$q$$.", "source": "Opus 4.7 ②", "_id": "opus_2_56"}, {"question": "What is the difference between the notation $S_{dd}$ and $\\sum d^2$? (Q4a S1 May 2024)", "answer": "- $\\sum d^2$ is the **raw sum of squares**: just square each $d$ value and add them up.\n- $S_{dd}$ is the **corrected sum of squares** for regression: $S_{dd} = \\sum d^2 - \\frac{(\\sum d)^2}{n}$.\n- In regression and correlation formulas, you **must** use the corrected version $S_{dd}$, not the raw $\\sum d^2$.\n- The term $\\frac{(\\sum d)^2}{n}$ removes the contribution of the mean — without this correction, you'd get an inflated (biased) estimate.", "source": "MiniMax ①", "_id": "minimax_1_65"}, {"question": "For the regression line of $$y$$ on $$x$$, what are the gradient and intercept formulas, and why is the choice of denominator ($$S_{xx}$$ not $$S_{yy}$$) crucial?", "answer": "- Step 1: Gradient $$b = S_{xy}/S_{xx}$$; intercept $$a = \\bar{y} - b\\bar{x}$$.\n- Step 2: \"$$y$$ on $$x$$\" means we're predicting $$y$$ from $$x$$, treating $$x$$ as the explanatory variable. The formula minimises squared residuals in $$y$$, leading to the denominator $$S_{xx}$$.\n- Step 3: If you used $$S_{yy}$$ instead, you'd compute the line of $$x$$ on $$y$$ — a different line with different gradient (unless $$r = \\pm 1$$).\n\nMnemonic: \"$$y$$ on $$x$$ — divide by $$xx$$.\"", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "S1 May 2024 — Across the paper, what is the tactical reason for sketching a normal curve before solving \"fastest $$p\\%$$\" problems, and what should you label on the sketch? (2 steps)", "answer": "- Step 1: Sketching forces you to decide whether the relevant tail is **left** (fastest/shortest times) or **right** (slowest/longest times) before any algebra. This prevents the critical tail-direction error seen in Q5(b).\n- Step 2: Draw the bell curve, mark the mean in the centre, shade the appropriate tail, and label the shaded area with its probability (e.g. 0.60). Only then write the corresponding $$P(X < t)$$ or $$P(X > t)$$ statement.", "source": "Kimi K2.6 ①", "_id": "kimi_1_53"}, {"question": "S1 May 2024 Q5(c) — When computing $P(T > \\mu - 5 \\mid T > \\mu - 10)$, how does the subset relationship simplify the conditional probability formula? (2 steps)", "answer": "- Step 1: Notice that $\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$. Any value above $\\mu - 5$ is automatically above $\\mu - 10$. So $P(T > \\mu - 5 \\text{ and } T > \\mu - 10) = P(T > \\mu - 5)$.\n- Step 2: Therefore $P(T > \\mu - 5 \\mid T > \\mu - 10) = \\frac{P(T > \\mu - 5)}{P(T > \\mu - 10)}$. The numerator is $P(Z > -5/\\sigma) = P(Z < 5/\\sigma) = \\Phi(0.98) = 0.8365$, and the denominator is $1 - 0.025 = 0.975$.\n\nWithout recognising the subset, you might try to compute $P(\\mu - 10 < T < \\mu - 5)$ for the intersection — which is the complement of what you want.", "source": "GLM 5.1 ①", "_id": "glm_1_43"}, {"question": "In Q1(f), the ordering constraint gives $27 \\le a \\le 48$, but the final answer is $36 \\le a \\le 40$. Which two additional constraints tighten the range, and why? (2 steps)", "answer": "- Step 1: The **$Q_1$ constraint** tightens the lower bound: $a \\ge 36$, because if $a < 36$, the new 9th/10th values shift away from 36 and $Q_1$ changes.\n- Step 2: The **maximum constraint** tightens the upper bound: $2a \\le 80 \\Rightarrow a \\le 40$, because if $2a > 80$, the new maximum exceeds 80 and the box plot changes. The ordering constraint only says $2a \\ge 48$ (i.e., $a \\ge 24$), which is weaker — it doesn't account for the box plot's max staying at 80.\n\nCombining: $36 \\le a \\le 40$.", "source": "GLM 5.1 ③", "_id": "glm_3_12"}, {"question": "S1 May 2024 — Tactical: What is the \"subset trick\" for conditional probability, and when can you use it? Give the general principle. (2 steps)", "answer": "- Step 1: If event $A$ is a **subset** of event $B$ (i.e., whenever $A$ happens, $B$ also happens), then $P(A \\cap B) = P(A)$, so $P(A \\mid B) = P(A)/P(B)$.\n- Step 2: Use this whenever one condition is stricter than another. In Q5(c), $\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$ because any value above $\\mu - 5$ is automatically above $\\mu - 10$. This simplifies the numerator from $P(A \\cap B)$ to just $P(A)$.\n\nWithout this recognition, you might try to compute $P(\\mu - 10 < T < \\mu - 5)$ or expand both tails unnecessarily.", "source": "GLM 5.1 ①", "_id": "glm_1_59"}, {"question": "What's the visual rule for \"negative skew\" vs \"positive skew\" on a box plot, and what statistic comparison confirms it?", "answer": "- Step 1: Positive skew: the upper whisker is LONGER than the lower whisker; tail extends to the right. Median is closer to $$Q_1$$ than $$Q_3$$. Mean $$>$$ median.\n- Step 2: Negative skew: lower whisker longer; tail extends to the left. Median closer to $$Q_3$$. Mean $$<$$ median.\n- Step 3: Symmetric: median equidistant from $$Q_1$$ and $$Q_3$$; whiskers similar length. Mean $$\\approx$$ median.\n\nA quick visual: which whisker is longer points to the tail direction = the skew direction.", "source": "Opus 4.7 ②", "_id": "opus_2_66"}, {"question": "For the conditional probability in Q5(c), the numerator involves $P(Z > -0.98)$. Walk through the complete standardisation from $P(T > \\mu - 5)$ to this $Z$-value. (3 steps)", "answer": "- Step 1: $P(T > \\mu - 5) = P\\left(Z > \\frac{(\\mu - 5) - \\mu}{\\sigma}\\right) = P\\left(Z > \\frac{-5}{\\sigma}\\right)$.\n- Step 2: With $\\sigma = 10/1.96 \\approx 5.102$: $\\frac{-5}{5.102} \\approx -0.980$. So $P(Z > -0.980)$.\n- Step 3: By symmetry, $P(Z > -0.98) = P(Z < 0.98) = \\Phi(0.98) = 0.8365$.\n\nThe key manoeuvres: standardise (subtract $\\mu$, divide by $\\sigma$), then flip the negative using symmetry to avoid looking up a negative $z$-value.", "source": "GLM 5.1 ③", "_id": "glm_3_54"}, {"question": "For Q1(b) May 2024, Birch has $$N = 35$$ discrete values. What is the Edexcel S1 rule for finding quartile positions when $$n/4$$ is *not* an integer, and why does this differ from the alternative $$(n+1)/4$$ rule? (3 steps)", "answer": "- Step 1: In Edexcel S1, if $$n/4$$ is **not** an integer, you **round up** to the next whole number to find the position. For $$Q_1$$ with $$n = 35$$: $$35/4 = 8.75$$, so you take the **9th** value. For $$Q_3$$: $$3 \\times 35/4 = 26.25$$, so you take the **27th** value.\n- Step 2: This differs from the $$(n+1)/4$$ rule (used in some other syllabi and at GCSE) because Edexcel defines quartile positions directly from $$n/4$$, rounding up when necessary, rather than centering the rank on $$(n+1)/4$$.\n- Step 3: The headline pitfall is using the wrong position. In this paper, counting to the 6th value gave 35, but the correct $$Q_1$$ is the 9th value (39). Always calculate $$n/4$$ and $$3n/4$$ explicitly before counting leaves.", "source": "Kimi K2.6 ②", "_id": "kimi_2_2"}, {"question": "S1 May 2024 Q1(b) — What is the Edexcel S1 rule for finding the lower quartile position $Q_1$ when $n/4$ is **not** an integer? Give the rule and explain why the GCSE formula fails here. (2 steps)", "answer": "- Step 1: If $n/4$ is **not** an integer, **round up** to the next whole number and take that ordered value. For $n = 35$: $35/4 = 8.75$, so round up to position 9.\n- Step 2: The GCSE/M-stats formula uses $(n+1)/4$, which for $n=35$ gives position 9 — the same answer here, but the method is different and can diverge for other values. Edexcel S1 requires the \"round up\" rule explicitly. Using $(n+1)/4$ is technically the wrong method even when it accidentally gives the right number.\n\nThe two rules are philosophically different: Edexcel says \"if the position falls between two data points, move to the next one up\" rather than interpolating.", "source": "GLM 5.1 ①", "_id": "glm_1_3"}, {"question": "What is the \"translation boundary\" pattern identified in the May 2024 paper, and why is it the main source of lost marks rather than computational errors? (2 steps)", "answer": "- Step 1: The \"translation boundary\" refers to the step of converting English-language descriptions into the correct mathematical formulation: \"fastest 60%\" → lower tail, \"no change to box plot\" → five constraints, \"does not play Scrabble\" → full complement including outside region.\n- Step 2: These translation steps don't require heavy computation — they require careful reading and interpretation. The pattern across this paper is that every major error traces back to a translation slip (wrong tail, missing constraint, forgotten region), not to an arithmetic mistake. The remedy: slow down on words like \"fastest\", \"no change\", and \"does not play\"; sketch a diagram; list constraints before computing.", "source": "GLM 5.1 ③", "_id": "glm_3_50"}, {"question": "S1 May 2024 Q6(a) — From a Venn diagram, how do you find the probability that a teenager plays Chess but does **not** play Go, and which regions must you exclude? (2 steps)", "answer": "- Step 1: Identify **all regions inside $$C$$** (Chess) and then **exclude any region that also lies inside $$G$$** (Go). This leaves only the $$C$$-only region and the $$C \\cap S$$-only region (the part of the $$C$$-$$S$$ overlap not involving $$G$$).\n- Step 2: Sum the probabilities of the remaining regions. Do **not** use an independence assumption or multiply probabilities; simply add the raw Venn region values.", "source": "Kimi K2.6 ①", "_id": "kimi_1_45"}, {"question": "What is the outlier fence formula, and why should you write $1.5 \\times \\text{IQR}$ as a separate line in your working? (2 steps)", "answer": "- Step 1: An outlier is any value $x$ where $x < Q_1 - 1.5 \\times \\text{IQR}$ or $x > Q_3 + 1.5 \\times \\text{IQR}$, where $\\text{IQR} = Q_3 - Q_1$.\n- Step 2: Write $1.5 \\times \\text{IQR}$ as a separate line because the mark scheme awards a **method mark** for this intermediate calculation. If you jump straight from IQR to the fence values and make an arithmetic error, you lose both the method and accuracy marks. Showing the intermediate step protects you.\n\nAlso: always compute and state BOTH fences (lower and upper), even if no outliers exist on one side — the marker needs to see you checked.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "When the question says \"use linear interpolation, estimate the median\", what TWO assumptions are baked into this method?", "answer": "- Step 1: Values within each class are **uniformly distributed** across the class width.\n- Step 2: The cumulative frequency rises **linearly** within each class — that's the \"linear\" in \"linear interpolation\".\n- Step 3: Consequence: linear interpolation is an APPROXIMATION; the true median (if raw data were known) could differ.\n\nThis is why we say \"estimate\" not \"find\" — the method assumes uniformity that may not hold.", "source": "Opus 4.7 ②", "_id": "opus_2_71"}, {"question": "S1 May 2024 — Quick drill: You add a data value equal to the current median to a dataset of 50 values. What happens to the median? (2 steps)", "answer": "- Step 1: The median **may change** — it depends on where the new value falls in the ordered list and how the positional rules shift. With $n = 50$, the median is the average of positions 25 and 26. With $n = 51$, the median is position 26.\n- Step 2: Unlike the mean (where adding the mean preserves it), adding the median does NOT guarantee the median stays the same, because the median depends on **positional ordering**, not on the sum.\n\nThis is a key difference between mean and median: the mean is a \"balance\" property, the median is a \"positional\" property.", "source": "GLM 5.1 ①", "_id": "glm_1_65"}, {"question": "What is the common pitfall in Q3(a) when finding the width of the new bar, and why does simply multiplying the reference bar's width by the new class width fail? (1 step)", "answer": "- Step 1: The common pitfall is treating the reference bar's width (2.5 cm) as a direct multiplier for the new class width (e.g., $$2 \\times 2.5 = 5$$ cm). This fails because the reference bar's width corresponds to its **own** class width (4 mm), not 1 mm. You must first find the scale factor $$\\frac{2.5 \\text{ cm}}{4 \\text{ mm}} = 0.625$$ cm/mm, then multiply by the new class width (2 mm) to get 1.25 cm.", "source": "Kimi K2.6 ②", "_id": "kimi_2_19"}, {"question": "When using the independence condition $P(C \\cap S) = P(C) \\cdot P(S)$ with a Venn diagram, what is the most common mistake in identifying $P(C \\cap S)$? (2 steps)", "answer": "- Step 1: $P(C \\cap S)$ must include **all** regions in the overlap of circles $C$ and $S$ — that's both the triple-overlap $P(C \\cap S \\cap G)$ AND the $C \\cap S$ only region (not $G$).\n- Step 2: The common mistake is using only one of these subregions (e.g., just the $C \\cap S$ only value of 0.12, or just the triple-overlap of 0.15). The correct $P(C \\cap S) = 0.12 + 0.15 = 0.27$.\n\nWhenever you compute the probability of an intersection from a Venn diagram, scan ALL subregions within that intersection — there may be multiple (split by the third set).", "source": "GLM 5.1 ③", "_id": "glm_3_45"}, {"question": "State the formulas for $$S_{xy}$$ and $$S_{xx}$$ in terms of raw sums. Are these in the formula booklet?", "answer": "- Step 1: $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$.\n- Step 2: $$S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$$; analogous for $$S_{yy}$$.\n- Step 3: Both **ARE in the IAL booklet**, so don't waste exam time deriving them. But know that $$\\frac{\\sum x}{n} = \\bar{x}$$ etc.\n\nThe numerator $$\\sum xy$$ uses each pair; the second term divides BY $$n$$, not by $$n^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "When computing $$P(C \\cap S)$$ from a 3-set Venn diagram, which regions must you include — and what's the recurring error?", "answer": "- Step 1: $$P(C \\cap S)$$ = ALL regions inside BOTH $$C$$ and $$S$$, regardless of whether they're also in $$G$$.\n- Step 2: This means TWO subregions: $$C \\cap S$$ only (not $$G$$) AND $$C \\cap S \\cap G$$ (the triple overlap).\n- Step 3: Recurring error: using only one of these — typically just the \"$$C \\cap S$$ only\" region, forgetting the triple overlap.\n\nThe triple overlap belongs to every pairwise intersection. Always check.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "For the regression line of $g$ on $d$, the gradient is $b = S_{dg}/S_{dd}$. A student uses $S_{gg}$ in the denominator instead. Why is this wrong, and how do you remember which to use? (2 steps)", "answer": "- Step 1: The regression line of $y$ on $x$ has gradient $b = S_{xy}/S_{xx}$. The denominator is always the $S_{xx}$ of the **explanatory** (horizontal axis) variable. Since $g$ is being predicted from $d$, $d$ is the explanatory variable, so the denominator is $S_{dd}$.\n- Step 2: Mnemonic: \"the denominator matches the bottom axis.\" If you're predicting $y$ from $x$, divide by $S_{xx}$. If you were predicting $x$ from $y$ (line of $x$ on $y$), you'd divide by $S_{yy}$. Using $S_{gg}$ would give the gradient of the wrong regression line.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "The regression line predicts that for each $x$ cm increase in length, girth increases by 17.3 cm. To find $x$, a student writes $-42.3 + 0.722x = 17.3$. Why is this wrong? (2 steps)", "answer": "- Step 1: The 17.3 cm is an **increment** in girth (a change in $g$), not a girth value itself. The correct equation uses only the gradient: $0.722 \\times x = 17.3$, because the gradient tells you the change in $g$ per unit change in $d$.\n- Step 2: The student's equation treats 17.3 as a final $g$-value, which would include the intercept. But the intercept is the girth when $d = 0$ — irrelevant when we're talking about a change. For increments, only the gradient matters: change in $g$ = gradient × change in $d$.\n\nSolve: $x = 17.3 / 0.722 \\approx 24.0$ cm.", "source": "GLM 5.1 ③", "_id": "glm_3_35"}, {"question": "What's the general translation pattern that explains MOST of the errors on the WST01/01 May 2024 paper?", "answer": "- Step 1: The errors cluster at the **interpretation boundary** between English and probability — not at computation.\n- Step 2: Examples: \"fastest\" → wrong tail (Q5b); \"no change to box plot\" → only ordering constraints used (Q1f); \"does not play Scrabble\" → outside region forgotten (Q6e); \"$$\\sigma = 10/1.96$$\" → decimal slip (Q5c).\n- Step 3: Drill: slow down on natural-language phrases, sketch diagrams, list constraints explicitly, sanity-check magnitudes.\n\nPattern: mechanical execution is fine; translation is the bottleneck.", "source": "Opus 4.7 ①", "_id": "opus_1_67"}, {"question": "S1 May 2024 — Edge case: In a Venn diagram, one region has probability 0 (e.g., $G$ only = 0). Does this mean the event $G$ is impossible? Why or why not? (2 steps)", "answer": "- Step 1: No. $P(G \\text{ only}) = 0$ means no teenager plays **only** Go (without also playing Chess or Scrabble). But $P(G) = P(C \\cap G) + P(S \\cap G) + P(G \\text{ only}) - P(C \\cap S \\cap G)$... actually, $P(G) = p + 0.15 + 0.10 + 0 = 0.14 + 0.15 + 0.10 = 0.39$.\n- Step 2: So $G$ has probability 0.39 — quite likely! The zero in the \"G only\" region just means every Go player also plays at least one of the other games. The event $G$ is not impossible; it's just that $G$ never occurs alone.\n\nZero in a Venn region ≠ impossible event. It means that particular combination is empty.", "source": "GLM 5.1 ①", "_id": "glm_1_67"}, {"question": "Q5(c) May 2024 involves finding $$\\sigma$$ from $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$. What is the decimal-placement sanity check that prevents the \"0.510\" error? (1 step)", "answer": "- Step 1: From the symmetry of the 95% interval, the tail area is 0.025, giving $$z = \\pm 1.96$$. Solving $$\\frac{-10}{\\sigma} = -1.96$$ yields $$\\sigma = \\frac{10}{1.96} \\approx 5.1$$. The sanity check is: $$\\sigma$$ should be the same order of magnitude as the interval half-width (10), not ten times smaller. If you obtain 0.51, you have misplaced a decimal point.", "source": "Kimi K2.6 ②", "_id": "kimi_2_36"}, {"question": "S1 May 2024 Q3(b) — In linear interpolation, why must $$L$$ be the **lower class boundary** rather than the lower limit stated in the table? (2 steps)", "answer": "- Step 1: For continuous data, the classes are contiguous intervals. The lower boundary of a class like $$32 \\le x < 36$$ is exactly $$32$$. Because the data are continuous and the intervals abut, the boundary is unambiguous.\n- Step 2: Using a value other than the boundary (e.g. the midpoint or a value adjusted for discreteness) would misplace the starting point of the interpolation line and produce an incorrect estimate.", "source": "Kimi K2.6 ①", "_id": "kimi_1_25"}, {"question": "In Q6(e), 76 teenagers play both Chess and Go. How do you estimate the total number of teenagers in the youth club, and what probability must you divide by? (1 step)", "answer": "- Step 1: Use the formula $$\\text{Total} = \\frac{\\text{Number in subpopulation}}{\\text{Probability of subpopulation}}$$. Here, $$\\text{Total} = \\frac{76}{P(C \\cap G)}$$. Crucially, $$P(C \\cap G)$$ includes **both** the $$C \\cap G$$-only region ($$p = 0.14$$) and the triple overlap (0.15), giving $$0.29$$. Using only the triple overlap (0.15) would overestimate the total.", "source": "Kimi K2.6 ②", "_id": "kimi_2_44"}, {"question": "In Q6(e), the student computed $P(S') = 0.04 + 0.14 = 0.18$ by adding only the non-$S$ regions inside the $C$-circle. What regions were missed, and how does $1 - P(S)$ fix this? (2 steps)", "answer": "- Step 1: The missed regions are: $G$ only (= 0, but still a region that should be checked) and the outside region $q = 0.22$. So $P(S') = 0.04 + 0 + 0.14 + 0.22 = 0.40$, not 0.18.\n- Step 2: $1 - P(S) = 1 - 0.60 = 0.40$ automatically captures everything outside $S$, including the outside region. The manual approach is error-prone because it's easy to forget the outside region or the empty regions — the complement shortcut is both faster and more reliable.\n\nThe lesson: in three-set Venn problems with an outside region, always use $P(A') = 1 - P(A)$ for complements.", "source": "GLM 5.1 ③", "_id": "glm_3_64"}, {"question": "S1 May 2024 Q1(a) — What is the positional rule for finding the median of a dataset with an even number of values $N$? (2 steps)", "answer": "- Step 1: Locate the two middle positions: the $$\\frac{N}{2}$$th value and the $$\\left(\\frac{N}{2} + 1\\right)$$th value.\n- Step 2: The median is the **average (mean)** of these two values.\n\nDo not just pick one of the two middle values; the median must sit exactly halfway between them for even $N$.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "S1 May 2024 Q6(b) — When using the independence condition $P(C \\cap S) = P(C) \\times P(S)$ in a three-circle Venn diagram, what is the critical mistake in computing $P(C \\cap S)$? (2 steps)", "answer": "- Step 1: $P(C \\cap S)$ must include **all** regions inside both $C$ and $S$ simultaneously. This means **both** the triple-overlap $C \\cap S \\cap G$ (0.15) AND the $C \\cap S$ only region (0.12). So $P(C \\cap S) = 0.15 + 0.12 = 0.27$.\n- Step 2: The critical mistake is using only one of these: writing $P(C \\cap S) = 0.12$ (missing the triple overlap) or $P(C \\cap S) = 0.15$ (missing the pairwise-only region). The intersection of two sets in a three-set Venn diagram consists of **two** regions.\n\nAlways list all subregions of an intersection before substituting into the independence equation.", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "What is the difference between $E(X^2)$ and $[E(X)]^2$ in variance calculations? (Q2b S1 May 2024)", "answer": "- $E(X^2)$ is the **expectation of the squared values**: sum of $(x^2 \\times P(X=x))$.\n- $[E(X)]^2$ is the **square of the expectation**: first find $E(X)$, then square it.\n- These are different: $E(X^2) \\neq [E(X)]^2$ in general.\n- The variance formula is $\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$.\n- A common mistake is confusing the two or writing $E(X^2) - E(X)$ (forgetting to square the mean).", "source": "MiniMax ①", "_id": "minimax_1_55"}, {"question": "S1 May 2024 Q1 — On a back-to-back stem-and-leaf diagram, in which direction are the leaves on the LEFT side read, and why does this matter for the very first step?", "answer": "- Step 1: Left-side leaves are read **outwards from the stem** — i.e. right-to-left. The stem is in the middle, so the digit closest to the stem is the smallest, and digits get larger as you move away.\n- Step 2: This matters because if you read left-to-right by reflex, every value you extract from the left dataset is wrong, and every downstream calculation (quartiles, median, outliers, box plot) is corrupted.\n- Step 3: Trigger habit: before transcribing ANY value, point at the key (e.g. \"5 | 6 | 3 means 65 for Birch, 63 for Maple\") and verify the direction.\n\nThe single mis-read of direction destroys all subsequent marks — read the key first.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "S1 May 2024 Q5(c) — In the conditional probability $P(T > \\mu - 5 \\mid T > \\mu - 10)$, a student uses 0.95 as the denominator. Why is this wrong? (2 steps)", "answer": "- Step 1: The denominator is $P(T > \\mu - 10)$, which equals $1 - P(T < \\mu - 10) = 1 - 0.025 = 0.975$. The value 0.95 is $P(\\mu - 10 < T < \\mu + 10)$, which is a **different event** — it's bounded on both sides.\n- Step 2: $P(T > \\mu - 10)$ includes all values above $\\mu - 10$ (extending to infinity), not just those up to $\\mu + 10$. So 0.975 ≠ 0.95.\n\nAlways distinguish between one-tailed probabilities ($P(T > a)$) and two-tailed/interval probabilities ($P(a < T < b)$).", "source": "GLM 5.1 ①", "_id": "glm_1_44"}, {"question": "When computing $P(C \\mid S \\cap G)$ from a Venn diagram, what is the formula, and what does $P(S \\cap G)$ include? (2 steps)", "answer": "- Step 1: $$P(C \\mid S \\cap G) = \\frac{P(C \\cap S \\cap G)}{P(S \\cap G)}$$ The numerator is the triple-overlap region only.\n- Step 2: $P(S \\cap G)$ includes ALL regions in the $S$-$G$ overlap: both $P(C \\cap S \\cap G) = 0.15$ and $P(S \\cap G\\text{ only}) = 0.10$. So $P(S \\cap G) = 0.15 + 0.10 = 0.25$, giving $P(C \\mid S \\cap G) = 0.15/0.25 = 0.6$.\n\nAgain: the denominator intersection includes the triple-overlap. Don't use just $P(S) \\cdot P(G)$ unless independent.", "source": "GLM 5.1 ③", "_id": "glm_3_48"}, {"question": "In Q5(c), you need $$P(T > \\mu - 5 \\mid T > \\mu - 10)$$. Why can you simplify the numerator to just $$P(T > \\mu - 5)$$, and what is the mathematical justification? (2 steps)", "answer": "- Step 1: The event $$\\{T > \\mu - 5\\}$$ is a **subset** of the event $$\\{T > \\mu - 10\\}$$. If $$T$$ is greater than $$\\mu - 5$$, it is automatically greater than $$\\mu - 10$$.\n- Step 2: Therefore, the intersection is just the smaller event: $$\\{T > \\mu - 5\\} \\cap \\{T > \\mu - 10\\} = \\{T > \\mu - 5\\}$$. The numerator simplifies from $$P(\\text{intersection})$$ to $$P(T > \\mu - 5)$$. The pitfall is computing $$P(\\mu - 10 < T < \\mu - 5)$$ as the numerator, which is actually zero because the inequalities are in the wrong order.", "source": "Kimi K2.6 ②", "_id": "kimi_2_37"}, {"question": "S1 May 2024 — In histogram problems, why is the area of a bar proportional to frequency rather than the height alone, and what does this imply when class widths vary? (2 steps)", "answer": "- Step 1: If class widths differ, a class with twice the width but the same frequency would need half the height to maintain the same area. If height represented frequency directly, wide classes would visually overstate or understate their true frequency relative to narrow classes.\n- Step 2: Therefore **frequency density** (frequency per unit width) is plotted on the vertical axis, making\n$$\\text{area} = \\text{class width} \\times \\text{frequency density} = \\text{frequency}.$$\nThis standardises the visual comparison across unequal class widths.", "source": "Kimi K2.6 ①", "_id": "kimi_1_58"}, {"question": "S1 May 2024 Q3(e) — A new value exactly equal to the current mean is added to the sample. State, with reasoning, the effect on (i) the mean and (ii) the standard deviation. (3 steps)", "answer": "- Step 1: **Mean:** No change. The new value's deviation from the old mean is zero, so the new sum of values becomes $$(n\\bar{x} + \\bar{x}) = (n+1)\\bar{x}$$, giving a new mean of $$\\bar{x}$$.\n- Step 2: **Standard deviation:** Decreases. The numerator of the variance formula gains $$(\\bar{x} - \\bar{x})^2 = 0$$, while the denominator increases from $$n$$ to $$n+1$$.\n- Step 3: Because the same total squared deviation is now divided by a larger $$n$$, the variance (and hence standard deviation) becomes smaller. The new point pulls the distribution inward by diluting the existing spread.", "source": "Kimi K2.6 ①", "_id": "kimi_1_29"}, {"question": "S1 May 2024 Q4(c) — When computing the regression line of $g$ on $d$, what is the gradient formula, and what is the most common denominator mistake? (2 steps)", "answer": "- Step 1: The gradient is $b = \\frac{S_{dg}}{S_{dd}}$. You divide by $S_{dd}$ (the sum of squares of the **explanatory/independent** variable $d$).\n- Step 2: The common mistake is dividing by $S_{gg}$ instead. The rule: for the regression line of **$y$ on $x$**, the gradient is $\\frac{S_{xy}}{S_{xx}}$ — always divide by the sum of squares of the variable on the **horizontal** axis.\n\nMnemonic: \"y on x → divide by x-x\" ($S_{xx}$). If you computed the line of $d$ on $g$ by mistake, you'd get a completely different equation.", "source": "GLM 5.1 ①", "_id": "glm_1_32"}, {"question": "S1 May 2024 Q5(c) — If you are given $P(\\mu - c < X < \\mu + c) = p$ for a normal distribution, how do you find $\\sigma$? (3 steps)", "answer": "- Step 1: Exploit the symmetry of the normal distribution. The probability in the lower tail is $$\\frac{1 - p}{2}$$.\n- Step 2: Find the $z$-value corresponding to the lower boundary: $$P(Z < z) = \\frac{1-p}{2}$$. This $z$-value will be negative.\n- Step 3: Set up the standardisation equation for the lower boundary: $$\\frac{\\mu - c - \\mu}{\\sigma} = z$$, which simplifies to $$\\sigma = \\frac{-c}{z}$$. Since $z$ is negative, $\\sigma$ will be positive.\n\nDo not try to find $\\sigma$ from the center probability directly; work from one of the tails where you have a clear inequality.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "When computing the intercept $a = \\bar{y} - b\\bar{x}$ for a regression line, why must you use the **unrounded** value of $b$? (2 steps)", "answer": "- Step 1: Rounding $b$ early (e.g., using 0.722 instead of 0.72184...) introduces a compounding error when multiplied by $\\bar{x}$. For $\\bar{x} = 182.1$: $0.722 \\times 182.1 = 131.48$, but $0.72184 \\times 182.1 = 131.45$. The difference of 0.03 propagates into the intercept.\n- Step 2: Since the intercept must be given to 3 s.f. ($-42.3$), an error of 0.03 in the product could push the intercept to $-42.27$ vs $-42.30$ — potentially different at 3 s.f. Always carry full precision through intermediate steps and round only the final answer.\n\nStore $b$ in your calculator's memory and recall it when computing $a$.", "source": "GLM 5.1 ③", "_id": "glm_3_31"}, {"question": "S1 May 2024 Q1(e) — why is the bare word \"average\" a marker-bait term in a \"compare distributions\" answer, and what should you say instead?", "answer": "\"Average\" is ambiguous — it could mean the mean, the median, or the mode, and Edexcel markers won't award the comparison mark if it's unclear which statistic you're quoting. You must explicitly name the statistic you actually computed: say \"the **median** Birch growth (48 cm) is greater than the **median** Maple growth (45 cm)\" — never \"the average is higher\". The mark is for (i) naming a specific statistic and (ii) giving both numerical values; saying \"average\" forfeits (i).", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "S1 May 2024 cross-question — Name three cross-question \"See also\" links in this paper and what each contrast teaches. (3 steps)", "answer": "- Step 1: **Q1(d) depends on Q1(c) outliers.** The box plot whisker endpoint (76, not 85) is determined by the outlier test in Q1(c). If you get the fences wrong in (c), the whisker in (d) will also be wrong. Lesson: carry results forward carefully and re-verify upstream answers before using them.\n- Step 2: **Q3(b) discrete vs Q1(b) grouped quartile rules differ.** Q1(b) uses the Edexcel discrete rule ($$n/4$$ integer → average; non-integer → round up), while Q3(b) uses linear interpolation for grouped continuous data with $$N/2$$ as the median position. Lesson: the \"quartile\" concept has different computational methods depending on data type — always identify whether the data are discrete (stem-and-leaf) or grouped continuous (histogram) before choosing a method.\n- Step 3: **Q5(c) subset trick contrasts with Q2(d) independence multiplication.** In Q5(c), $$\\{T > \\mu-5\\} \\subset \\{T > \\mu-10\\}$$, so $$P(A \\cap B) = P(A)$$ and the conditional simplifies to $$P(A)/P(B)$$. In Q2(d), $$S$$ and $$R$$ are independent, so $$P(A \\cap B) = P(A) \\times P(B)$$. Lesson: \"two events\" can relate by inclusion (subset) or by independence (multiplication) — identify which before choosing the tool.\n\nTakeaway: Cross-question contrasts reveal where the same concept (quartiles, two-event probability) splits into different methods. Internalise the splits.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_26"}, {"question": "S1 May 2024 Q6(e) — Fuat verbalised an incorrect partial-sum approach for \"not Scrabble.\" What was the approach, why was it wrong, and what's the meta-lesson? (2 steps)", "answer": "- Step 1: Fuat's incorrect approach: \"Add up the not-Scrabble pieces in the Chess region… 0.04 plus 0.14…\" This computes $$P(S' \\cap C) = 0.04 + 0.14 = 0.18$$, which is only the part of \"not Scrabble\" that overlaps with Chess. It misses the $$G$$-only region (value 0, but still a region) and crucially the **outside region** $$q = 0.22$$. The correct $$P(S') = 0.04 + 0 + 0.14 + 0.22 = 0.40$$, or much more simply, $$P(S') = 1 - P(S) = 1 - 0.60 = 0.40$$.\n- Step 2: The meta-lesson: when computing the complement of an event in a Venn diagram, **always use the shortcut $$P(A') = 1 - P(A)$$** rather than summing individual regions. The shortcut is guaranteed to include every region outside $$A$$, including the outside-the-circles region (which is the most commonly forgotten piece). Partial-sum approaches are error-prone because they require you to identify every disjoint region outside the event — easy to miss one, especially under exam pressure.\n\nTakeaway: $$P(A') = 1 - P(A)$$. Always. Never piece together the complement from Venn regions when a simple subtraction works.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "S1 May 2024 Q3(c) — Given the coding equation $$10y = w - 20$$, what wrong inversion produces a nonsense mean, and how do you avoid it? (2 steps)", "answer": "- Step 1: The wrong inversion reads the equation as if solving for $$w$$ in the wrong direction: computing $$\\bar{w} = \\frac{(\\sum y - 20)}{10} \\times n$$ or similar nonsense, mixing up which variable is coded and which is raw. The specific error from the guide: computing $$\\bar{w} = \\frac{(104 - 20)}{10} \\times 50$$ — this scrambles the algebra by treating $$\\sum y$$ as if it were a single $$w$$-value and multiplying by $$n$$ afterward.\n- Step 2: The correct procedure: first rearrange to express the **raw** variable in terms of the **coded** variable: $$w = 10y + 20$$. Then apply the linear coding rule to the mean: $$\\bar{w} = 10\\bar{y} + 20 = 10 \\times (104/50) + 20 = 20.8 + 20 = 40.8$$. The defence: always write \"$$w = \\ldots$$\" (raw = function of coded) before touching any numbers. This makes the direction of substitution unambiguous.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_16"}, {"question": "S1 May 2024 Q1(f) — After deriving $$36 \\le a \\le 40$$, what concrete numeric verification should you perform as a final cross-check, and why? (1 step)", "answer": "- Step 1: Pick a candidate value within the range (e.g. $$a = 38$$) and actually re-sort the augmented list of 36 values, then recompute the five box-plot statistics (min, $$Q_1$$, median, $$Q_3$$, max) from scratch. For $$a = 38$$ and $$2a = 76$$: the new sorted list includes 27, 38, 48, 76; positions 9–10 are both 36 (✓ $$Q_1$$), positions 18–19 are 43 and 47 (✓ median = 45), positions 27–28 are both 54 (✓ $$Q_3$$), max is 80 (✓). This catches errors in the positional-shift logic — if you'd miscounted any offset, the re-sort would reveal it. Always verify at least one interior value, not just the boundary values.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_10"}, {"question": "S1 May 2024 (cross-question) — Name three cross-question “See also” links in this paper and explain what each contrast teaches as a meta-skill. (3 steps)", "answer": "- Step 1: Q1(d) depends on Q1(c) outliers — the box-plot whisker cannot be drawn until the outlier list is finalised, teaching that downstream presentation relies on upstream classification.\n- Step 2: Q3(b) grouped-data quartiles use $$N/2$$ with linear interpolation, whereas Q1(b) discrete-data quartiles use the round-up/average rule; the contrast teaches that the same statistic name (quartile) invokes different algorithms depending on data type.\n- Step 3: Q5(c) uses a subset trick where one conditional event is contained in the other ($$\\{T>\\mu-5\\} \\subset \\{T>\\mu-10\\}$$), while Q2(d) uses independence multiplication for two separate spins; the contrast teaches that you must diagnose the set relationship (subset vs. independent) before choosing between simplifying the numerator or multiplying probabilities.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_26"}, {"question": "S1 May 2024 Q4(c) — The question states \"the equation of the regression line… can be written as $$g = -42.3 + 0.722d$$.\" Why does the question specify this exact form, and what happens if you write $$0.722d - 42.3$$ instead? (1 step)", "answer": "- Step 1: The form \"$$g = a + bd$$\" (intercept first, then gradient term) is the **standard convention** for regression equations in Edexcel mark schemes. Writing \"$$g = 0.722d - 42.3$$\" is algebraically equivalent, but some mark schemes award a presentation mark specifically for the \"$$y = a + bx$$\" format with the intercept stated first. More importantly, writing the intercept first mirrors the formula $$a = \\bar{y} - b\\bar{x}$$, which computes $$a$$ before $$b$$ in the natural workflow. Writing the gradient term first can also lead to sign errors (writing \"$$+ -42.3$$\" or dropping the negative). Match the requested format exactly.\n\nTakeaway: Write the regression equation in the form the question specifies. \"$$g = a + bd$$\" not \"$$g = bd + a$$.\"", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "S1 May 2024 Q1(f) — After deriving $$36 \\leq a \\leq 40$$, what concrete numeric verification should you perform, and why? (1 step)", "answer": "- Step 1: Pick a candidate value in the range (e.g. $$a=38$$), construct the full augmented sorted list of 36 values by inserting 27, 38, 48, and 76 ($$=2 \\times 38$$) into the original Maple data, and recompute all five box-plot statistics (min, $$Q_1$$, median, $$Q_3$$, max) from scratch. This catches errors in the positional-shift reasoning — if any statistic differs from the original box plot, the range $$[36, 40]$$ is wrong or incomplete. It's a cheap cross-check that takes 2 minutes but can save all 3 marks.\n\nTakeaway: Always verify a sample value by re-sorting and recomputing. Trust the algebra, but check the arithmetic.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_10"}, {"question": "What is Fuat's mental-model trigger for treating $$S = X_1$$ and $$R = f(X_2)$$ as independent, and how many spinners does it visualise?", "answer": "\"Sam spins, Alex spins. Two different spinners, two different outcomes. Multiply.\"\n\nVisualise **two physically separate spinner objects** being spun independently. Even though $$X_1$$ and $$X_2$$ have the same probability distribution, the random variables themselves are independent — outcomes of distinct physical events.\n\nThe implication: $$P(S=s \\text{ AND } R=r) = P(X_1 = s) \\cdot P(X_2 = \\text{value giving } R = r)$$, a simple product.\n\nThe trap this prevents: trying to enumerate $$P(X=x, Y=y)$$ as if $$Y$$ depended on the same spin as $$X$$. That would only apply if the question said \"spin once, compute both $$S$$ and $$R$$ from the same outcome\" — but here the two players spin independently.\n\nTrigger phrase in the question: \"**each** spin the spinner once\" — the word \"each\" signals two independent events.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "S1 May 2024 Q1(c) — in a \"show only one outlier\" question, why do you compute and quote BOTH fences (lower and upper) even when only the upper fence catches an outlier?", "answer": "Because the Edexcel mark scheme awards method marks for the **process** of computing both fences, not just for the final identified outlier.\n\nThe structure:\n- Stating the lower fence $$Q_1 - 1.5\\,\\text{IQR} = 12$$ and noting \"smallest value $$28 > 12$$, no low outliers\" earns a method mark for systematically checking the lower tail.\n- Stating the upper fence $$Q_3 + 1.5\\,\\text{IQR} = 84$$ and noting \"only 85 exceeds this\" earns the second method/accuracy mark.\n\nIf you skip the lower fence and just write \"85 is the only outlier\", you can lose a mark even though the answer is correct — the marker cannot see that you systematically excluded the lower tail. \"Show that only one\" requires evidence for both directions.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "S1 May 2024 Q1(f) — once you have $$36 \\leq a \\leq 40$$, why does the median constraint (45) hold automatically? Show the positional shift. (2 steps)", "answer": "- Step 1: With $$N=36$$, the median is the average of the 18th and 19th values. The original Maple median (45) was the average of the 16th and 17th values, which were 43 and 47.\n- Step 2: Inserting two values below the median range (27 and $$a \\in [36, 40]$$) shifts the original 16th and 17th values forward by exactly two slots — they become the new 18th and 19th. So the new median is still $$(43+47)/2 = 45$$. The other two added values (48 and $$2a \\leq 80$$) sit above the median range and don't affect positions 18-19.\n\nThe key insight: once the $$Q_1$$ constraint pins $$a \\geq 36$$ and the max constraint pins $$2a \\leq 80$$, the two added values straddle the median symmetrically (two below, two above), so the median's positional center is preserved automatically.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "Why does $$Q_3 = 54$$ hold automatically for Q1(f) regardless of the value of $$a$$, and what structural feature of the original Maple data makes this robust? (2 steps)", "answer": "- Step 1: For $$N=36$$, $$Q_3$$ is the average of positions 27 and 28. In the original Maple data, there are three consecutive 54s clustered together (occupying positions 24, 25, 26 in the original list of 32). After inserting 27 and $$a$$ (both well below position 24), these three 54s shift to positions 26, 27, 28 in the augmented list.\n- Step 2: Positions 27 and 28 are both 54, so $$Q_3 = \\frac{54+54}{2} = 54$$. The clustering of three identical values creates a \"buffer\" — even small positional shifts cannot dislodge the quartile from landing on 54. This is a structural feature the examiners exploited: a repeated value at the quartile position makes the statistic robust to insertions elsewhere.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_9"}, {"question": "S1 May 2024 Q4(c) — why does the question state the regression equation in the specific form \"$$g = -42.3 + 0.722d$$\" (intercept first), and what happens if you write $$0.722d - 42.3$$ instead?", "answer": "The question's exact form \"$$g = -42.3 + 0.722d$$\" places the **intercept first**, matching the convention $$y = a + bx$$ used in the formula booklet (where $$a$$ is the intercept and $$b$$ the gradient).\n\nIf you write $$g = 0.722d - 42.3$$, the value is mathematically identical but the presentation form differs. Edexcel mark schemes for \"show that the equation can be written as ...\" typically require the candidate's answer to match the stated form — a presentation/accuracy mark can be lost for re-ordering, even when the numbers are correct.\n\nThe defensive habit: when a question gives a target form, copy that form exactly and substitute your computed values into the matching slots. Don't algebraically rearrange.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "In Q1(f), once you have established that $$a$$ lies in the interval $$[36, 40]$$, why does the median constraint — that the median must remain 45 — hold automatically without further restriction? Show the positional shift that guarantees this. (2 steps)", "answer": "- Step 1: With $$a \\in [36, 40]$$, the four new values in ascending order are $$27,\\ a,\\ 48,\\ 2a$$. Both 27 and $$a$$ are less than or equal to 40, so they slide into the lower half of the data set. The original Maple data had 32 values; after insertion, $$N=36$$ and the median is the average of the 18th and 19th ordered values.\n- Step 2: Because two new values (27 and $$a$$) have been inserted below the original position 16, every original value from position 16 onward shifts forward by exactly two places. The original 16th value was 43 and the original 17th was 47; they become the new 18th and 19th values. Therefore the median is automatically $$\\frac{43+47}{2}=45$$, regardless of the exact value of $$a$$ within $$[36,40]$$, provided only that $$a$$ does not displace 43 or 47 themselves.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_7"}, {"question": "S1 May 2024 Q5(b) — For \"fastest 60%\" with mean 15, why is the z-value $$+0.2533$$ (not $$-0.2533$$), even though \"fastest\" corresponds to the lower tail? (2 steps)", "answer": "- Step 1: \"Fastest\" means shortest time, which is indeed the lower tail. We need the cutoff $$t$$ such that $$P(X < t) = 0.60$$. Looking up $$\\Phi^{-1}(0.60)$$ in the table gives $$z = +0.2533$$ because the standard normal table gives the z-value corresponding to a **cumulative** probability of 0.60 — and a cumulative probability greater than 0.5 corresponds to a positive z-value.\n- Step 2: The confusion arises from mixing up the tail direction with the sign of z. \"Lower tail\" does NOT mean \"negative z.\" The sign of z depends on whether the cumulative probability is less than or greater than 0.5. Here $$P(X < t) = 0.60 > 0.5$$, so $$t > \\mu$$, and $$z = +0.2533$$. The pitfall: reaching for $$-0.2533$$ because \"fastest = lower = negative.\" The defence: always translate to the cumulative statement $$P(X < t) = p$$ first, then look up $$\\Phi^{-1}(p)$$. If $$p > 0.5$$, z is positive regardless of what English word described the tail.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "S1 May 2024 Q1(d) — For Birch ($$N=35$$), what is the exact position of the median, in which stem-row does it fall, and why is 47 a common wrong answer? (2 steps)", "answer": "- Step 1: The median is the $$\\lceil 35/2 \\rceil = 18$$th ordered value. Using cumulative totals ($$2,\\ 10,\\ 19,\\ \\dots$$), the 18th value falls in the stem-4 row (which covers positions 11–19), specifically the eighth leaf in that row, giving 48.\n- Step 2: The value 47 is a common trap because it is the 17th value in the original list; candidates miscount by forgetting that the 18th position lies one step deeper into the stem-4 row after accounting for the cumulative shift from all previous stems.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_5"}, {"question": "S1 May 2024 Q5(c) — why is $$P(\\mu - 5 < T < \\mu - 10)$$ automatically zero, and how does this trap arise in conditional probability problems?", "answer": "The set $$\\{t : \\mu - 5 < t < \\mu - 10\\}$$ is **empty** because $$\\mu - 5 > \\mu - 10$$ — the interval is reversed. There's no value of $$t$$ that is simultaneously greater than $$\\mu - 5$$ and less than $$\\mu - 10$$. The trap arises when computing $$P(T > \\mu - 5 \\mid T > \\mu - 10)$$: a careless student writes the numerator as $$P(\\mu - 5 < T < \\mu - 10) \\cdot \\text{something}$$ instead of recognising the subset structure $$\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$$, which gives numerator $$= P(T > \\mu - 5)$$ directly. The fix: whenever computing $$P(A \\cap B)$$ where $$A \\subset B$$, simplify to $$P(A \\cap B) = P(A)$$ before substituting numbers — and check no interval is reversed.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "S1 May 2024 — beyond the regression intercept, name two other computations on this paper where rounding early changes the final answer at 3 s.f. (2 steps)", "answer": "- Step 1: **Q5(c) — $$\\sigma = 10/1.96$$:** if you write $$\\sigma = 5.10$$ and then standardise $$T > \\mu - 5$$ using 5.10, you get $$z = -5/5.10 = -0.9804$$, whereas the unrounded $$\\sigma = 5.10204\\ldots$$ gives $$z = -0.98000$$. At 3 s.f. the answers might agree here, but in chained conditional-probability calculations, multiple roundings compound and the final 0.858 can shift to 0.857 or 0.859.\n- Step 2: **Q4(c) — gradient $$b = S_{dg}/S_{dd}$$:** carrying $$b = 0.72184$$ (unrounded) into the intercept calculation $$a = \\bar{g} - b\\bar{d}$$ gives $$a = -42.298 \\to -42.3$$. If you round $$b$$ to 0.722 first, then $$b\\bar{d} = 0.722 \\times 182.1 = 131.476$$ instead of 131.448, and $$a = -42.326 \\to -42.3$$ still — but in tighter problems, this 0.03 difference would flip the rounded intercept. Same pattern applies to Q4(b) PMCC ($$r$$ rounded after numerator/denominator are both rounded would drift).\n\nThe rule: carry full calculator precision through every intermediate, round ONLY at the reported final answer. The discipline is universal, not specific to one question type.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "S1 May 2024 Q1(e) — Why is the bare word \"average\" a marker-bait term in a \"compare distributions\" answer, and what should you say instead? (1 step)", "answer": "- Step 1: \"Average\" is ambiguous — it could mean mean, median, or mode. In S1, you have computed a specific statistic (here the median), and the mark is awarded for comparing that specific statistic with its name and value. Writing \"Birch trees have a higher average\" fails to specify which average, and the marker cannot award the comparison mark. Instead, write **\"The median Birch growth (48 cm) is greater than the median Maple growth (45 cm)\"** — naming the statistic, quoting both values, and stating the direction of the comparison. The word \"average\" alone is a guaranteed way to lose the mark.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "S1 May 2024 Q2(b) — When computing $$E(X^2)$$ from a probability table, recall Fuat's one-sentence rule: what do you square, and what do you NOT square? (1 step)", "answer": "- Step 1: Fuat's rule: \"**Square the $$x$$, not the probability.**\" The formula is $$E(X^2) = \\sum x^2 \\cdot P(X=x)$$ — each $$x$$-value is squared, then multiplied by its (unsquared) probability. The common error is writing $$\\sum [P(X=x)]^2$$ or $$[\\sum x \\cdot P(X=x)]^2$$, both of which are wrong. The intuition: $$E(X^2)$$ is the expected value of the random variable $$X^2$$, so you're averaging the squared outcomes weighted by their likelihoods — the weights themselves stay as probabilities.\n\nTakeaway: Square the outcome, keep the probability straight. $$E(X^2) = \\sum x^2 p$$, not $$\\sum x p^2$$ and not $$[E(X)]^2$$.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "S1 May 2024 Q2(d) — Recall Fuat's mental-model trigger for treating $$S = X_1$$ and $$R = 2X_2 - 3$$ as independent. How many spinners do you visualise? (1 step)", "answer": "- Step 1: **Two spinners.** \"Sam spins, Alex spins. Two different spinners, two different outcomes. Multiply.\" The key insight is that $$S$$ comes from spin 1 and $$R$$ comes from spin 2 — they are physically separate random experiments, so $$P(S = s \\text{ and } R = r) = P(S = s) \\times P(R = r)$$. The pitfall is treating them as if they share the same spin (which would make $$R$$ a deterministic function of $$S$$, not an independent variable). Visualising two distinct spinners locks in the independence assumption and tells you to multiply, not substitute.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "S1 May 2024 Q1(f) — Why does $$Q_3 = 54$$ hold automatically for Q1(f) regardless of the value of $$a$$, and what feature of the original Maple data makes this robust? (2 steps)", "answer": "- Step 1: For the augmented $$N=36$$, $$Q_3$$ is the average of the 27th and 28th values. The two insertions (27 and $$a \\leq 40$$) both fall well below positions 27–28 in the sorted list, so the 27th and 28th values of the augmented list are the original 25th and 26th values shifted forward by 2.\n- Step 2: The original Maple data has a **cluster of three consecutive 54s** at positions 25, 26, and 27 (visible in the stem-5 row: leaves 4, 4, 4). After the shift, the augmented positions 27 and 28 both land on 54, so $$Q_3 = (54+54)/2 = 54$$. The cluster acts as a buffer — even if the positional shift moved slightly, the value 54 would still occupy both quartile positions. This is what makes $$Q_3$$ robust to the insertion.\n\nTakeaway: A cluster of identical values around the quartile position makes that quartile insensitive to small insertions elsewhere.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "S1 May 2024 Q1(d) — when drawing a box plot with potential outliers, what is the strict ORDER of operations, and why must you NOT draw any whisker before completing one of the earlier steps? (2 steps)", "answer": "- Step 1: Identify the outliers FIRST by computing the fences and scanning the data. Only after the outlier list is finalised do you know what counts as a \"non-outlier\" value.\n- Step 2: Set the whisker end to the most extreme **non-outlier** (for Birch, 76 — NOT 85, because 85 is the outlier). Plot outliers as separate crosses beyond the whisker.\n\nIf you draw the whisker first, the natural instinct is to extend it to the data max (85), which absorbs the outlier into the spread and loses the whole point of the box plot. The whisker end depends on the outlier list, so the outlier list must come first.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "When drawing a box plot with potential outliers, what is the strict order of operations and why must you not draw the whisker first? (2 steps)", "answer": "- Step 1: Identify outliers FIRST by computing fences.  \n- Step 2: Set the whisker end to the most extreme non-outlier (76, not 85). Drawing the whisker first risks incorrectly including outliers in the spread.", "source": "GAP-Qwen 3 ③", "_id": "qwen_3_4"}, {"question": "In a histogram bar-width question like Q3(a), what specific numerical shortcut produces the wrong answer of 5 cm, and what diagnostic catches it? (2 steps)", "answer": "- Step 1: The seductive shortcut: multiply the target class width in mm (2 mm) directly by the reference bar width on the page (2.5 cm per 4 mm → $$2 \\times 2.5 = 5$$ cm). This feels like a simple proportion but **conflates data-units with page-units** — you're treating \"mm of class width\" as if it were \"cm of bar width\" without converting through the scale factor.\n- Step 2: The diagnostic: compute the **scale factor** explicitly. Reference: 4 mm of class width → 2.5 cm on page, so scale = $$2.5/4 = 0.625$$ cm per mm. Target: 2 mm → $$2 \\times 0.625 = 1.25$$ cm. The shortcut gave 5 cm, which is 4× too large. Always derive the per-unit scale factor; never multiply raw numbers from different unit systems.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "S1 May 2024 Q1(f) — The original Maple data has two 36s at positions 8 and 9. After inserting the value 27, they shift to positions 9 and 10. Explain mechanically why inserting a value $$a < 36$$ would change $$Q_1$$, using positional displacement. (3 steps)", "answer": "- Step 1: Before any insertion, the original Maple data ($$N=32$$) has positions 8 and 9 both occupied by 36. For $$N=32$$, $$Q_1$$ uses positions 8 and 9 (since $$32/4=8$$, integer rule → average of 8th and 9th), so $$Q_1 = (36+36)/2 = 36$$.\n- Step 2: After inserting 27 (which goes before both 36s), the two 36s shift to positions 9 and 10. If we also insert $$a < 36$$, then $$a$$ also goes before the 36s, shifting them further to positions 10 and 11. Now for the augmented $$N=36$$, $$Q_1$$ is the average of positions 9 and 10 — but positions 9 and 10 are no longer both 36. Position 9 might be $$a$$ and position 10 is the first 36, giving $$Q_1 = (a+36)/2 \\neq 36$$.\n- Step 3: If instead $$a \\geq 36$$, then $$a$$ goes at or after the 36s in the sorted order. The two 36s remain at positions 9 and 10 (displaced only by the single value 27), and $$a$$ occupies position 11 or later. So positions 9 and 10 are still both 36, and $$Q_1 = 36$$ is preserved. The critical threshold is exactly $$a = 36$$.\n\nTakeaway: $$a < 36$$ displaces the two 36s out of the $$Q_1$$ positions; $$a \\geq 36$$ leaves them in place.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_7"}, {"question": "S1 May 2024 cross-question links — name three \"See also\" connections in the paper and what each contrast teaches. (3 steps)", "answer": "- Step 1: **Q1(d) ↔ Q1(c) — whisker depends on outliers.** The box plot whisker in Q1(d) ends at 76, not 85, because Q1(c) already established 85 as an outlier. Lesson: outlier identification (a separate part) modifies the visual representation; never draw a box plot before completing the outlier check.\n- Step 2: **Q3(b) ↔ Q1(b) — grouped vs discrete quartile rules differ.** Q1(b) uses Edexcel's discrete rule (round up $$n/4$$, or average if integer) on a stem-and-leaf dataset. Q3(b) uses linear interpolation on grouped data with $$N/2$$ directly. Lesson: the SAME word (\"median\" or \"quartile\") triggers different formulas depending on whether data is raw/discrete or grouped/continuous — read the data type first.\n- Step 3: **Q5(c) ↔ Q2(d) — conditional probability vs independence.** Q5(c) uses the conditional formula with a subset structure ($$\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$$); Q2(d) uses independence with multiplication of marginal probabilities. Lesson: \"two events\" can be **conditional** (the subset trick) or **independent** (multiply) — choose based on whether the events come from related/nested conditions or from physically separate trials.\n\nInternalising these contrasts is a meta-skill: under exam pressure, the wrong \"default\" method gets deployed because the surface keyword (e.g. \"median\", \"two events\") doesn't disambiguate. Reading the data structure or event structure first is the discriminator.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "S1 May 2024 Q6(c) — When summing all Venn regions to find an unknown probability, why must you include regions whose stated value is 0, and what error does omitting them cause? (1 step)", "answer": "- Step 1: A region with probability 0 is still a distinct subset of the sample space; omitting it from the sum breaks the partition axiom that the total probability over all disjoint regions must equal 1. If you skip the $$G$$-only region (0) or the outside region ($$q$$), your equation will be missing terms and yield an incorrect value for the unknown.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_24"}, {"question": "S1 May 2024 Q1(e) — Why is the bare word \"average\" a marker-bait term in a \"compare distributions\" answer, and what should you write instead? (1 step)", "answer": "- Step 1: \"Average\" is ambiguous — it could mean mean, median, or mode, and these are different statistics with different values. In Q1(e), the median was computed (48 vs 45), not the mean. Writing \"Birch trees grow more on average\" fails to specify which average, so the marker cannot confirm you're comparing the correct statistic. You must write \"the **median** Birch growth (48 cm) is greater than the **median** Maple growth (45 cm)\" — naming the exact statistic and quoting both values.\n\nTakeaway: Never say \"average\" alone. Name the statistic (median/mean) and quote both numbers.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "S1 May 2024 Q1(c) — In a \"show there is only one outlier\" question where no low outliers exist, why must you compute and explicitly quote BOTH fence values (lower and upper) in your working? (1 step)", "answer": "- Step 1: Method marks are awarded for demonstrating the full outlier-check procedure, which by definition requires both $$Q_1 - 1.5 \\times \\text{IQR}$$ and $$Q_3 + 1.5 \\times \\text{IQR}$$. Quoting only the upper fence (because that's where the outlier is) makes it look like you skipped half the method — the marker cannot tell whether you (a) checked the lower fence and found no outliers there, or (b) simply forgot to check. Writing both fences with a brief \"smallest value = 28 > 12, so no low outlier\" earns the method mark and shows complete reasoning. Skipping the lower fence is a presentation error that can cost a mark even when your final answer is correct.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "Beyond regression intercept, name two other computations on the May 2024 paper where rounding an intermediate value early changes the final answer at 3 significant figures. (2 steps)", "answer": "- Step 1: **Q5(c) — standard deviation from a symmetric interval:** Computing $$\\sigma = 10/1.96$$ gives 5.10204… If you round this to 5.10 early, then compute $$z = -5/5.10 = -0.9804$$ instead of $$-0.9800$$, the downstream probability shifts at the 3rd decimal place, potentially changing the 3-s.f. answer. Carry 5.102 throughout.\n- Step 2: **Q2(d) — probability of Sam winning:** The five products $$P(S=s) \\times P(R < s)$$ each involve multiplying probabilities. If you round any $$P(R < s)$$ value (e.g. 0.55 → 0.6) before multiplying, the cumulative sum drifts enough to change the final 0.355 at the 3rd s.f. The rule is universal: **store full-precision values in your calculator and round only the final displayed answer.**", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_27"}, {"question": "S1 May 2024 Q6(c) — When summing all Venn diagram regions to find an unknown probability, why must you include regions whose stated value is 0, and what error does omitting them cause? (1 step)", "answer": "- Step 1: Every region of the Venn diagram is a term in the equation $$\\sum \\text{all 8 regions} = 1$$. Even when a region has value 0 (like the $$G$$-only region in Q6), it still occupies a slot in the sum. Omitting it means you're summing only 7 regions instead of 8, and the equation becomes $$0.64 + p + q = 1$$ (missing the 0) instead of $$0.64 + 0 + p + q = 1$$. In this specific case, the 0 doesn't change the arithmetic, but in general, forgetting a zero-valued region can cause you to miscount the number of terms and make algebraic errors (e.g., thinking there are only 7 regions and missing one that should contain an unknown). The discipline: always list all 8 regions explicitly, write 0 where appropriate, then sum.\n\nTakeaway: Zero-valued regions are still regions. Write them in the sum — they cost nothing and prevent miscounting.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_24"}, {"question": "S1 May 2024 Q1(f) — explain mechanically (using positional displacement) why $$a < 36$$ would change $$Q_1$$ of Maple. Walk through what positions 9 and 10 hold before and after insertion. (3 steps)", "answer": "- Step 1: In the augmented dataset $$N = 36$$ (divisible by 4), so $$Q_1$$ is the average of the 9th and 10th values. Required: $$Q_1 = 36$$ unchanged, so positions 9 and 10 must both equal 36.\n- Step 2: In the original sorted Maple data, the two 36s sit at positions 8 and 9. After adding 27 (below 36), they shift forward by one slot to positions 9 and 10 — perfect, $$Q_1 = 36$$ still works, **provided $$a$$ does not also slide below 36**.\n- Step 3: If $$a < 36$$, then $$a$$ inserts below the 36s as well, pushing them further forward to positions 10 and 11. Now position 9 holds $$a$$ (or some smaller value) and position 10 holds 36, giving $$Q_1 = (a + 36)/2 \\ne 36$$. Therefore we need $$a \\ge 36$$.\n\nThe mechanism in one sentence: each value inserted below the 36s shifts them up by one position; we can afford exactly two such shifts (the values 27 and $$a$$ if $$a \\ge 36$$ — no wait, $$a$$ doesn't go below them in that case), so $$a$$ must sit at or above 36 to leave the two 36s exactly at positions 9 and 10.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "S1 May 2024 Q1(b) — when locating the 9th or 27th value in a stem-and-leaf data set, what pre-computation makes the search effectively $$O(1)$$ instead of $$O(n)$$?", "answer": "Compute and write down the **cumulative stem totals** before counting any individual leaves. For Birch (N=35): $$2,\\ 10,\\ 19,\\ 28,\\ 31,\\ 34,\\ 35$$.\n\nNow to find the 9th value: $$9 \\le 10$$ but $$9 > 2$$, so it sits in the second stem row at position $$9-2=7$$ within that row. Read off the 7th leaf.\n\nFor the 27th value: $$27 \\le 28$$ but $$27 > 19$$, so it's in the fourth row at position $$27-19=8$$.\n\nWithout this pre-computation you'd recount every leaf from the top each time you locate a quartile or median — error-prone and slow. With it, each lookup is a single subtraction.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "S1 May 2024 Q1(d) — When drawing a box plot with potential outliers, what is the strict order of operations, and why must you not draw the whisker before finalising the outlier list? (2 steps)", "answer": "- Step 1: **Identify outliers first** using the fence rule. List every data point beyond the fences. Only after this list is finalised do you know where the whisker ends.\n- Step 2: **Set each whisker end to the most extreme non-outlier value** in that direction. For Birch, the maximum non-outlier is 76 (not 85, which is the outlier). If you draw the whisker to 85 first and then notice 85 is an outlier, you've already committed to a wrong whisker — crossing it out looks messy and risks losing the accuracy mark. The procedural order is: fences → outlier list → whisker endpoints → draw box plot.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "S1 May 2024
