cted sum of squares for $$g$$, measuring the total spread of $$g$$ around its mean.\n- Step 2: Raw sums like $$\\sum dg$$ or $$\\sum g^2$$ are inflated by the overall level of the variables. Subtracting $$\\frac{(\\sum d)(\\sum g)}{n}$$ removes this “centring” effect so that the statistic reflects only covariation, not the absolute magnitudes of $$d$$ and $$g$$.\n- Step 3: Without this correction, the resulting regression slope and correlation would depend on where the origin is placed, which is undesirable — the relationship between the variables should be invariant to adding a constant to either variable.", "source": "Kimi K2.6 ①", "_id": "kimi_1_20"}, {"question": "In a \"show that\" question where the target answer is given, why is it still essential to show all working? (2 steps)", "answer": "- Step 1: \"Show that\" awards marks for the **derivation**, not the final number. The number is already in the question — writing it without working earns zero.\n- Step 2: Show every intermediate step:\n+ For variance: each $$x^2 \\cdot p$$ term explicitly listed, then summed, then $$- E(X)^2$$.\n+ For median: cumulative frequencies, position computed, formula substituted.\n+ For regression: $$S_{xy}, S_{xx}$$ values, $$b$$ computed, $$a$$ computed.\n\nMarkers want to see the method — even if your arithmetic differs slightly, method marks are recoverable.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Contrast the positional rule for quartiles in a discrete ordered list (Q1) with the formula for the median of grouped continuous data (Q3), explaining why the former uses rounding/averaging of positions while the latter uses linear interpolation. (3 steps)", "answer": "- Step 1: For discrete individual values (e.g., stem-and-leaf), the data are exact points. The Edexcel rule selects actual data values by rounding positions up or averaging neighbouring positions when $$n/4$$ is integer. No intermediate values exist between data points.\n- Step 2: For grouped continuous data, the underlying variable is assumed spread uniformly across each class interval. The exact median could lie anywhere inside the interval, so linear interpolation estimates its location proportionally based on how far the cumulative frequency is into the class.\n- Step 3: Using interpolation on discrete data would invent non-existent values; using the discrete positional rule on grouped data would ignore the continuous nature of the interval and lose the within-class information.", "source": "Kimi K2.6 ②", "_id": "kimi_2_45"}, {"question": "Why divide by $$\\sigma$$ (not $$\\sigma^2$$) when standardising?", "answer": "Because $$X - \\mu$$ has units of $$X$$ and standard deviation $$\\sigma$$. Dividing by $$\\sigma$$ gives a dimensionless quantity with SD = 1, which is what the standard normal table expects. Dividing by $$\\sigma^2$$ would over-shrink the variable, giving a quantity with SD $$= 1/\\sigma$$ — not standard normal. Sanity check: $$Z$$ should be order-1, not order-$$1/\\sigma$$.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "In Q2(d), Sam's score $$S = X_1$$ and Alex's score $$R = 2X_2 - 3$$. Why are $$S$$ and $$R$$ independent, and what does this imply for computing $$P(S > R)$$? (2 steps)", "answer": "- Step 1: $$X_1$$ and $$X_2$$ come from **two separate spins** of the spinner, so they are independent random variables. $$R$$ is a function of $$X_2$$ only, so $$R$$ and $$S$$ remain independent.\n- Step 2: Independence allows $$P(S = s, R = r) = P(S=s) \\cdot P(R=r)$$. So $$P(S > R) = \\sum_s P(S = s) \\cdot P(R < s)$$ — condition on each value of $$S$$ and multiply by the probability that $$R$$ is strictly below it.\n\nKey trap: a different setup (like Y = aX - b from part c) would tie the two scores to the **same** $$X$$, making them dependent.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "On a back-to-back stem-and-leaf diagram, in which direction are the left-hand side leaves read, and why does this matter for transcribing values?", "answer": "The left-hand leaves are read **outwards from the stem (right-to-left)**. This is because the stem sits in the middle, and both sides build outward away from it. So for a row \"$$9\\ 8\\ |\\ 2\\ |\\ 5\\ 7\\ 7\\ 8\\ 9$$\" with key \"$$5|6|3$$ means 65 (left) and 63 (right)\", the left-side values in ascending order are $$28, 29$$ — not $$98, 89$$. Misreading this direction flips every value on the left and destroys all subsequent quartile, median, and outlier work.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "In a back-to-back stem-and-leaf diagram, how do you read the leaves on the left-hand side of the stem, and what must you always check before reading any values? (3 steps)", "answer": "- Step 1: The left-hand leaves must be read **right-to-left** (outwards from the stem). Reading them left-to-right is a common error that reverses the order of the data.\n+ For example, if the left side shows `9 8 | 2 |`, the values are 28, 29 (not 29, 28).\n- Step 2: Always check the **Key** first. The key tells you the place value (e.g., `5 | 6 | 3` means 65 for Birch and 63 for Maple). Without it, you might misinterpret `2 | 5` as 25 instead of 250 or 2.5.\n- Step 3: Confirm the row totals add up to the stated total $$N$$. This ensures no data points were missed or double-counted during transcription.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "In a stem-and-leaf with $$N=32$$ values, the median is given as 45. The 16th and 17th values fall in a row with stem 4, and the leaves are 1, 1, 1, $$k$$, 7, 8. How do you find $$k$$? (3 steps)", "answer": "- Step 1: For even $$N$$, the median is the mean of the $$\\frac{N}{2}$$th and $$\\frac{N}{2}+1$$th values. Here, that's the 16th and 17th values.\n- Step 2: Locate these positions. The 16th value is the 4th leaf in the stem-4 row, which equals $$40 + k$$. The 17th value is the 5th leaf, which equals $$40 + 7 = 47$$.\n- Step 3: Set up the equation and solve: $$\\frac{(40+k) + 47}{2} = 45 \\implies 87 + k = 90 \\implies k = 3$$.\n+ Misconception alert: $$k$$ is a single digit leaf, not a frequency or a sum. It must also keep the leaves in ascending order (so $$1 \\le k \\le 7$$).", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "What is the Edexcel S1 rule for finding the position of the lower quartile $$Q_1$$ for a dataset of size $$n$$, and how does it differ depending on whether $$n/4$$ is an integer? (2 steps)", "answer": "- Step 1: Calculate $$n/4$$. This gives the position for $$Q_1$$ (similarly, $$3n/4$$ for $$Q_3$$).\n- Step 2: Apply the rule based on the result:\n+ If $$n/4$$ is **not** an integer: round **up** to the next whole number. (e.g., for $$n=35$$, $$35/4 = 8.75$$, so round up to the 9th value).\n+ If $$n/4$$ **is** an integer: take the **average** of the $$(n/4)$$th and $$(n/4+1)$$th values. (e.g., for $$n=32$$, $$32/4 = 8$$, so average the 8th and 9th values).\n+ Edge case: Do NOT use the $$(n+1)/4$$ rule (GCSE/other board rule) in Edexcel S1.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "How do you determine outlier fences using the IQR, and where do the whiskers of a box plot end? (2 steps)", "answer": "- Step 1: Calculate the Inner Quartile Range $$\\text{IQR} = Q_3 - Q_1$$. An outlier is any value $$x$$ such that $$x < Q_1 - 1.5 \\times \\text{IQR}$$ or $$x > Q_3 + 1.5 \\times \\text{IQR}$$. These boundaries are the \"fences\".\n- Step 2: The whiskers of a box plot extend to the **most extreme non-outlier** data values, NOT to the fences themselves. Outliers are plotted as separate crosses/asterisks beyond the whiskers.\n+ Misconception: Drawing the whisker all the way to the maximum/minimum value even if it's an outlier. The whisker stops at the last data point inside the fence.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "When asked to \"comment on any difference in the distributions\" of two datasets using box plots, what two elements must your answer contain to secure the mark? (2 steps)", "answer": "- Step 1: You must compare a **specific statistic** (e.g., median or IQR) and state both numerical values.\n+ Bad: \"Birch trees are taller.\" (No values)\n+ Good: \"The median Birch growth (48 cm) is greater than the median Maple growth (45 cm).\"\n- Step 2: Compare the spread (usually IQR) and note any differences in outliers or tails.\n+ Good: \"The IQR is the same (18 cm) for both, but Birch has an outlier at 85 cm, indicating a heavier upper tail.\"\n+ Misconception: Avoid saying \"average\" alone—specify whether you mean median or mean.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "If 4 new data points are added to a dataset and the box plot (Min, $$Q_1$$, Median, $$Q_3$$, Max) must remain **unchanged**, what is the systematic approach to finding the constraints on the new values? (3 steps)", "answer": "- Step 1: List all 5 box plot statistics that must be preserved. Each one acts as a separate constraint on where the new data can fall.\n- Step 2: Re-calculate the positions of the quartiles and median using the **new** total $$N$$ (old $$N$$ + 4). Determine which old data values occupy those new positions.\n- Step 3: Ensure the new data points do not displace the values at these critical positions, and do not exceed the Min or Max.\n+ Example: If the new Max must stay 80, and a new value is $$2a$$, then $$2a \\le 80 \\implies a \\le 40$$.\n+ Misconception: Only using the ordering constraint (e.g., $$27 \\le a \\le 48$$) without checking if $$a$$ shifts the quartile positions or violates the Max constraint.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "To find $$P(2X - 3 > 5)$$ for a discrete random variable $$X$$, what must you do first, and what is a common pitfall with the inequality sign? (2 steps)", "answer": "- Step 1: Rearrange the linear inequality to isolate $$X$$. Here, $$2X - 3 > 5 \\implies 2X > 8 \\implies X > 4$$.\n- Step 2: Sum the probabilities for all valid $$x$$ values that satisfy the inequality. Since $$X > 4$$ is strict, you include $$X = 5, 7, 8$$ but **exclude** $$X = 4$$.\n+ Misconception: Including the boundary value $$X = 4$$ when the inequality is strict ($$>$$). If it were $$X \\ge 4$$, you would include it.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "Why is the variance of $$X$$ calculated as $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$, and what is a common error when computing $$E(X^2)$$? (2 steps)", "answer": "- Step 1: Intuition: Variance measures the average squared deviation from the mean. $$E(X^2)$$ is the average of the squares, and $$[E(X)]^2$$ is the square of the average. The difference gives the \"average squared distance from the average.\"\n- Step 2: To compute $$E(X^2)$$, you square the $$x$$-values, NOT the probabilities. The formula is $$\\sum x^2 \\cdot P(X=x)$$.\n+ Misconception: Squaring the probability instead of the $$x$$-value (i.e., calculating $$\\sum x \\cdot [P(X=x)]^2$$).\n+ Note: This formula ($$\\sigma^2 = \\frac{\\sum x^2}{n} - \\bar{x}^2$$ for raw data) is NOT in the IAL formula booklet, so you must memorize it.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "Given $$E(Y)$$ and $$\\text{Var}(Y)$$ for $$Y = aX - b$$ (where $$a, b > 0$$), why is it strategically better to use the variance equation first to find $$a$$? (3 steps)", "answer": "- Step 1: The variance coding rule is $$\\text{Var}(Y) = a^2 \\text{Var}(X)$$. The constant $$-b$$ disappears because shifting data does not change its spread.\n- Step 2: Solving this first eliminates $$b$$ entirely, giving you a clean equation for $$a$$: $$a = \\sqrt{\\text{Var}(Y) / \\text{Var}(X)}$$. Since $$a$$ is positive, take the positive root.\n- Step 3: Once you have $$a$$, substitute it into the expectation rule $$E(Y) = aE(X) - b$$ to solve for $$b$$.\n+ Misconception: Forgetting to square $$a$$ in the variance rule (writing $$\\text{Var}(Y) = a\\text{Var}(X)$$), or choosing the negative root for $$a$$ when the question states \"positive constants\".", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "Sam spins spinner 1 (score $$S$$) and Alex spins spinner 2 (score $$R$$). To find $$P(\\text{Sam wins}) = P(S > R)$$, how do you use the fact that the spins are independent? (2 steps)", "answer": "- Step 1: Since the spins are separate, $$S$$ and $$R$$ are **independent**. Do NOT treat them as coming from the same spin. Build the probability distribution for $$R$$ separately.\n- Step 2: Condition on $$S$$. For each possible value of $$S$$, find $$P(R < S)$$ by summing the probabilities of all $$R$$ values strictly less than $$S$$. Then multiply by $$P(S)$$ and sum over all $$S$$: $$P(S > R) = \\sum_{s} P(S=s) \\cdot P(R < s)$$.\n+ Misconception: Treating $$S$$ and $$R$$ as dependent (e.g., using the same $$X$$ for both). They are from two different spins, so you multiply probabilities.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "In a histogram, what does the **area** of a bar represent, and how do you derive the width and height of a new bar given a reference bar? (3 steps)", "answer": "- Step 1: Area is proportional to **frequency**. Since Area = Width × Height, the bar width is proportional to the **class width**, and the bar height is proportional to the **frequency density** (FD = Frequency ÷ Class Width).\n- Step 2: Use the reference bar to find the two scale constants:\n+ cm per mm of class width = (Reference bar width in cm) ÷ (Reference class width in mm)\n+ cm per unit FD = (Reference bar height in cm) ÷ (Reference FD)\n- Step 3: Apply these constants to the target class to find its bar dimensions.\n+ Misconception: Using frequency directly as the bar height. In a histogram, height is frequency density, especially when class widths are unequal.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "How does linear interpolation estimate the median for grouped continuous data, and what is the formula? (2 steps)", "answer": "- Step 1: Locate the median class using cumulative frequency. The median position is $$N/2$$ (not $$(N+1)/2$$, since continuous data is treated as a continuous scale, not discrete points).\n- Step 2: Assume the data is evenly distributed within the median class. The formula is: $$\\text{Median} = L + \\frac{N/2 - F_b}{f_m} \\times c$$ where $$L$$ is the lower class boundary, $$F_b$$ is the cumulative frequency before the median class, $$f_m$$ is the frequency of the median class, and $$c$$ is the class width.\n+ Misconception: Using $$(N+1)/2$$ (which is for discrete data) or using the midpoint of the class instead of the lower boundary $$L$$.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "If data is coded using $$w = 10y + 20$$, how do the mean and standard deviation of $$w$$ relate to the mean and standard deviation of $$y$$? (2 steps)", "answer": "- Step 1: The mean transforms with the same linear coding: $$\\bar{w} = 10\\bar{y} + 20$$. The $$+20$$ shifts the center, and the $$\\times 10$$ stretches it.\n- Step 2: The standard deviation only scales by the absolute multiplier: $$\\sigma_w = 10\\sigma_y$$. Adding a constant ($$+20$$) does not change the spread, so it drops out of the SD (and variance).\n+ Misconception: Applying the $$+20$$ to the standard deviation. SD measures spread, which is unaffected by shifting the data along the number line.\n+ Note: Variance scales by the square of the multiplier: $$\\text{Var}(w) = 10^2 \\text{Var}(y) = 100 \\text{Var}(y)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "If a new data value exactly equal to the current mean is added to a dataset, what happens to the mean and the standard deviation? (2 steps)", "answer": "- Step 1: The mean **does not change**. The new sum becomes $$n\\bar{x} + \\bar{x} = (n+1)\\bar{x}$$, and dividing by the new count $$n+1$$ still gives $$\\bar{x}$$.\n- Step 2: The standard deviation **decreases**. The new value contributes 0 to the sum of squared deviations (since it equals the mean), but the denominator $$n$$ increases to $$n+1$$. Dividing a slightly larger (or same) total deviation by a larger $$n$$ dilutes the variance.\n+ Misconception: Saying the SD \"does not change\" just because the mean didn't change. The denominator effect causes the variance/SD to shrink slightly.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "What do the summary statistics $$S_{xy}$$ and $$S_{yy}$$ represent, and what are their formulas? (2 steps)", "answer": "- Step 1: They represent the **sums of squares and cross-products** adjusted for the mean. They measure the spread of $$y$$ and the co-variation of $$x$$ and $$y$$.\n- Step 2: The formulas are:\n+ $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$\n+ $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$\n+ Misconception: Dividing by $$n^2$$ instead of $$n$$, or using $$\\sum x^2$$ when you need $$\\sum y^2$$. Always check which variable's sum of squares is required.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "What does the Product Moment Correlation Coefficient ($$r$$) measure, and what are its bounds? (2 steps)", "answer": "- Step 1: PMCC measures the **strength and direction of linear correlation** between two variables. It tells you how well the data clusters around a straight line.\n- Step 2: Its value is always between $$-1$$ and $$1$$ ($$-1 \\le r \\le 1$$).\n+ $$r \\approx 1$$: strong positive linear correlation.\n+ $$r \\approx -1$$: strong negative linear correlation.\n+ $$r \\approx 0$$: no linear correlation (but could have non-linear relationship!).\n+ Misconception: Reporting an $$r$$ value outside $$[-1, 1]$$. If you do, you've made a calculation error.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "When calculating the equation of the regression line of $$y$$ on $$x$$ ($$y = a + bx$$), how do you find the gradient $$b$$ and intercept $$a$$, and what is a critical accuracy rule? (3 steps)", "answer": "- Step 1: The gradient is $$b = \\frac{S_{xy}}{S_{xx}}$$. Note: for $$y$$ on $$x$$, the denominator is $$S_{xx}$$, NOT $$S_{yy}$$.\n- Step 2: The intercept is $$a = \\bar{y} - b\\bar{x}$$.\n- Step 3: **Accuracy rule**: Use the **unrounded** value of $$b$$ when calculating $$a$$. Rounding $$b$$ too early will cause $$a$$ to be incorrect at the required significant figures.\n+ Misconception: Calculating the line of $$x$$ on $$y$$ by mistake (which would use $$S_{yy}$$ in the denominator). Also, writing the equation as $$bx + a$$ instead of $$a + bx$$.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "In the regression line $$g = -42.3 + 0.722d$$, what does the gradient (0.722) mean in context, and how do you find the length increase needed for a 17.3 cm girth increase? (2 steps)", "answer": "- Step 1: Interpretation: For every 1 cm increase in length ($$d$$), the girth ($$g$$) increases by approximately 0.722 cm **on average**. You must state units and context.\n- Step 2: For an increment, only the gradient matters. If girth increases by 17.3 cm, set $$0.722 \\times \\text{increase in } d = 17.3$$, so $$\\text{increase in } d = 17.3 / 0.722$$.\n+ Misconception: Setting $$-42.3 + 0.722x = 17.3$$, which treats 17.3 as an absolute girth value rather than an increment (change in $$g$$).", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "Why is using a regression line to estimate a value outside the observed data range (extrapolation) unreliable? (2 steps)", "answer": "- Step 1: The regression line models a linear relationship based only on the observed data range. We have no evidence that the relationship remains linear outside this range.\n- Step 2: In real-world contexts, relationships often curve or level off at extreme values (e.g., bear girth can't increase linearly forever). Extrapolating assumes the linear trend continues, which may be false.\n+ Misconception: Giving a vague answer like \"the data isn't accurate\" or \"it's too small\". You must explicitly state it is **outside the observed range** (extrapolation).", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": true}, {"question": "In a normal distribution of times, why does \"fastest $$p\\%$$\" correspond to the **lower** tail, and how do you find the cutoff time? (3 steps)", "answer": "- Step 1: \"Fastest\" means shortest time. Shorter times are on the left (lower tail) of the normal distribution. \"Slowest\" would be the upper tail.\n- Step 2: Set up the probability: $$P(X < t) = p/100$$. Find the z-score corresponding to this probability using inverse normal tables.\n- Step 3: De-standardise using $$z = \\frac{t - \\mu}{\\sigma}$$ to find the cutoff time $$t$$.\n+ Misconception: Setting $$P(X > t) = p/100$$ (using the upper tail) because \"fastest\" sounds like \"top performers\". Always sketch the curve and shade the left tail for shortest times.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "Given $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$ for a normal distribution, how do you find the standard deviation $$\\sigma$$? (3 steps)", "answer": "- Step 1: By symmetry, the tails outside this interval are equal. The lower tail is $$P(T < \\mu - 10) = (1 - 0.95)/2 = 0.025$$.\n- Step 2: Standardise the lower boundary: $$P\\left(Z < \\frac{(\\mu - 10) - \\mu}{\\sigma}\\right) = 0.025 \\implies P(Z < -10/\\sigma) = 0.025$$.\n- Step 3: From tables, $$P(Z < -1.96) = 0.025$$. So, $$-10/\\sigma = -1.96 \\implies \\sigma = 10/1.96 \\approx 5.10$$.\n+ Sanity check: $$\\sigma$$ should be roughly half the interval width divided by 2. $$10/2 = 5$$, so 5.10 makes sense. 0.510 would be a critical decimal slip.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "If event $$A$$ is a subset of event $$B$$ ($$A \\subset B$$), how does this simplify the conditional probability $$P(A \\mid B)$$? (2 steps)", "answer": "- Step 1: The conditional probability formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$.\n- Step 2: If $$A$$ is entirely within $$B$$, then the intersection $$A \\cap B$$ is just $$A$$ itself. So the formula simplifies to $$P(A \\mid B) = \\frac{P(A)}{P(B)}$$.\n+ Example: If $$T > \\mu - 5$$, then automatically $$T > \\mu - 10$$. So $$\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$$, and $$P(T > \\mu - 5 \\mid T > \\mu - 10) = \\frac{P(T > \\mu - 5)}{P(T > \\mu - 10)}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "When using $$P(C \\cap S) = P(C)P(S)$$ to test independence in a 3-set Venn diagram, what must you remember about $$P(C \\cap S)$$? (2 steps)", "answer": "- Step 1: The intersection $$C \\cap S$$ includes **all** regions where both $$C$$ and $$S$$ occur. In a 3-set Venn, this is the sum of the \"C and S only\" region AND the \"C, S, and G\" triple-overlap region.\n- Step 2: Do not use just one region (e.g., only the triple overlap) for $$P(C \\cap S)$$. You must add all subregions that are inside both circles.\n+ Misconception: Using only the C∩S-only region (0.12) and forgetting the C∩S∩G region (0.15). The true intersection is $$0.12 + 0.15 = 0.27$$.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "When finding the probability of \"not $$S$$\" ($$P(S')$$) from a Venn diagram, what is the safest method, and why? (2 steps)", "answer": "- Step 1: The safest method is the complement rule: $$P(S') = 1 - P(S)$$. This guarantees you include everything outside the $$S$$ circle.\n- Step 2: If you add up the regions outside $$S$$ manually, it is very easy to forget the **outside region** (the area outside all three circles, often labeled $$q$$) or the \"G only\" region.\n+ Misconception: Adding only the \"C only\" and \"C∩G only\" regions to find \"not S\", which misses the outside region and the \"G only\" region. This led to the error of 47 instead of 105 in the exam.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "If a Venn diagram gives probabilities and you know 76 teenagers play both Chess and Go, how do you estimate the total number of teenagers and those who don't play Scrabble? (3 steps)", "answer": "- Step 1: Find the total probability $$P(C \\cap G)$$. Remember this includes both the \"C∩G only\" region and the \"C∩S∩G\" region.\n- Step 2: Set up the proportion: $$\\text{Total} = \\frac{\\text{Count}}{\\text{Probability}} = \\frac{76}{P(C \\cap G)}$$.\n- Step 3: To find the number who don't play Scrabble, use $$\\text{Total} \\times P(S')$$. Use the shortcut $$P(S') = 1 - P(S)$$ to avoid missing regions.\n+ Misconception: Using only part of the intersection probability (e.g., just the triple overlap) for $$P(C \\cap G)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "A dataset has $$n = 15$$ values. Using the Edexcel S1 rule, which positioned value do you use to find the lower quartile $$Q_1$$?", "answer": "- Step 1: Calculate $$n/4 = 15/4 = 3.75$$.\n- Step 2: Since 3.75 is **not** an integer, the Edexcel rule says to round **up** to the next whole number.\n- Step 3: Rounding 3.75 up gives position 4. So, $$Q_1$$ is the 4th value (no averaging needed).\n+ Contrast: If $$n = 16$$, then $$16/4 = 4$$ (an integer), so you would average the 4th and 5th values.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "If $$\\text{Var}(y) = 4$$ and the coding is $$w = 5y - 3$$, what is $$\\text{Var}(w)$$?", "answer": "- Step 1: The variance coding rule is $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$. The constant $$-3$$ drops out.\n- Step 2: Here, $$a = 5$$, so $$a^2 = 25$$.\n- Step 3: $$\\text{Var}(w) = 25 \\times 4 = 100$$.\n+ Misconception: Applying the $$-3$$ to the variance, or just multiplying by 5 instead of $$5^2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "The fastest 20% of runners qualify for the final. If times are normally distributed, do you need $$P(X < t) = 0.2$$ or $$P(X > t) = 0.2$$ to find the cutoff time $$t$$?", "answer": "- Step 1: \"Fastest\" means the runners with the **shortest** times.\n- Step 2: Shorter times are on the left (lower tail) of the normal distribution.\n- Step 3: Therefore, you need the lower tail: $$P(X < t) = 0.2$$.\n+ Misconception: Using the upper tail $$P(X > t) = 0.2$$ because \"fastest\" sounds like being at the top. Always translate \"fastest\" to \"shortest time\" to \"lower tail\".", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "In a Venn diagram, $$P(A \\cap B \\cap C) = 0.1$$ and $$P(B \\cap C) = 0.3$$ (which includes the triple overlap). What is $$P(A \\mid B \\cap C)$$?", "answer": "- Step 1: The formula is $$P(A \\mid B \\cap C) = \\frac{P(A \\cap B \\cap C)}{P(B \\cap C)}$$.\n- Step 2: The numerator is the triple overlap: 0.1. The denominator is the entire B∩C region: 0.3.\n- Step 3: $$P(A \\mid B \\cap C) = 0.1 / 0.3 = 1/3 \\approx 0.333$$.\n+ Misconception: Using $$P(A \\cap B)$$ in the numerator. The condition is \"given B and C\", so we only want the part of A that is also in B and C (the triple overlap).", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "A dataset has mean 50 and SD 10. A new value of 50 is added. Without calculation, does the new SD increase, decrease, or stay the same?", "answer": "- Step 1: The new value (50) is exactly at the mean, so its squared deviation from the mean is 0.\n- Step 2: The sum of squared deviations stays the same (adding 0), but the denominator $$n$$ increases to $$n+1$$.\n- Step 3: Dividing the same total by a larger number makes the variance smaller, so the SD **decreases**.\n+ Misconception: Saying it stays the same because the mean didn't change. The denominator effect dilutes the variance.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}], "count": 30}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "In a back-to-back stem-and-leaf diagram, how do you read the leaves on the left side of the stem, and what must you always verify before interpreting any values? (2 steps)", "answer": "- Step 1: The leaves on the left side of the stem must be read **right-to-left** (outwards from the stem). This is because the leaves closest to the stem represent the smallest units digit for that stem row, maintaining ascending order as you move away from the stem.\n- Step 2: Before reading any values, you must always check the **Key**. The key defines the scale and context (e.g., whether $$5 \\mid 6 \\mid 3$$ means 65 for the left side and 63 for the right side, or vice versa). Finally, confirm the row totals add up to the stated $$N$$.\n\nTakeaway: Left leaves read right-to-left; always verify the key and totals first.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "When a stem-and-leaf diagram contains a variable like $$k$$ as one of the leaves, what does $$k$$ represent, and what constraint must it satisfy within its row? (2 steps)", "answer": "- Step 1: The variable $$k$$ represents a **single digit** (a leaf), not a frequency, count, or sum. The actual data value it represents is formed by combining the stem with $$k$$ (e.g., if the stem is 4, the value is $$40 + k$$).\n- Step 2: The constraint is that the leaves in any row must remain in **ascending order**. Therefore, $$k$$ must be greater than or equal to the leaf immediately before it, and less than or equal to the leaf immediately after it.\n+ Example: If the leaves are $$1, 1, 1, k, 7, 8$$, then $$k$$ must satisfy $$1 \\le k \\le 7$$.\n\nTakeaway: $$k$$ is a digit that must preserve the ascending order of the leaves in its row.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "How do you find the median of an even number of observations ($$N$$ even) from an ordered stem-and-leaf diagram? (2 steps)", "answer": "- Step 1: Identify the two middle positions. For $$N$$ even, these are the $$\\frac{N}{2}$$th and the $$\\left(\\frac{N}{2} + 1\\right)$$th values.\n- Step 2: Calculate the median by taking the **mean (average)** of these two values.\n+ Example: For $$N=32$$, the median is the mean of the 16th and 17th values. If the 16th value is 43 and the 17th is 47, the median is $$\\frac{43+47}{2} = 45$$.\n\nTakeaway: Even $$N$$ means averaging the two middle ordered values.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "For the Edexcel S1 syllabus, what is the rule for finding the lower quartile ($$Q_1$$) position when $$n/4$$ is not an integer, and what is the rule when $$n/4$$ is an integer? (2 steps)", "answer": "- Step 1: If $$n/4$$ is **not an integer**, round **up** to the next integer. The $$Q_1$$ value is the single data point at that rounded-up position.\n- Step 2: If $$n/4$$ **is an integer**, take the **average** of the $$(n/4)$$th value and the $$(n/4 + 1)$$th value.\n+ Example (Non-integer): For $$n=35$$, $$35/4 = 8.75$$. Round up to the 9th value.\n+ Example (Integer): For $$n=32$$, $$32/4 = 8$$. Average the 8th and 9th values.\n\nTakeaway: Non-integer → round up; Integer → average with next value.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "A dataset has $$N=35$$ values. Using the Edexcel quartile rule, what are the positional indices for $$Q_1$$ and $$Q_3$$? (2 steps)", "answer": "- Step 1: Calculate $$n/4 = 35/4 = 8.75$$. Since 8.75 is not an integer, round up to position **9**. So, $$Q_1$$ is the 9th value.\n- Step 2: Calculate $$3n/4 = 105/4 = 26.25$$. Since 26.25 is not an integer, round up to position **27**. So, $$Q_3$$ is the 27th value.\n\nTakeaway: For $$N=35$$, positions are 9 and 27 — a common exam trap is using 8.75 directly or rounding incorrectly.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "What is the standard definition of an outlier using the Interquartile Range (IQR), and how do you apply it to find upper and lower outlier boundaries? (3 steps)", "answer": "- Step 1: Calculate the Interquartile Range: $$\\text{IQR} = Q_3 - Q_1$$.\n- Step 2: Define the **lower fence**: $$Q_1 - 1.5 \\times \\text{IQR}$$. Any value strictly less than this is an outlier.\n- Step 3: Define the **upper fence**: $$Q_3 + 1.5 \\times \\text{IQR}$$. Any value strictly greater than this is an outlier.\n+ Example: If $$Q_1 = 39$$ and $$Q_3 = 57$$, $$\\text{IQR} = 18$$. Lower fence $$= 39 - 1.5(18) = 12$$. Upper fence $$= 57 + 1.5(18) = 84$$.\n\nTakeaway: Outliers fall outside the $$1.5 \\times \\text{IQR}$$ fences; always calculate both fences even if outliers only exist on one side.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "When drawing a box plot for a dataset that contains outliers, where do the whiskers end? (2 steps)", "answer": "- Step 1: Identify all outliers using the $$1.5 \\times \\text{IQR}$$ rule.\n- Step 2: The whiskers extend to the **most extreme non-outlier** values in the dataset. Outliers are plotted individually as separate crosses ($$\\times$$) or asterisks ($$*$$) beyond the whiskers.\n+ Example: If the max value is 85 but 84 is the upper fence, the upper whisker ends at the largest data point $$\\le 84$$, and 85 is marked as a cross.\n\nTakeaway: Whiskers stop at the highest/lowest non-outlier; outliers are detached points.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "When asked to \"comment on differences between two distributions\" using box plots, what must your answer include to secure the mark? (2 steps)", "answer": "- Step 1: You must compare a **specific statistic** (e.g., median, IQR, range) and state the numerical values for both distributions.\n- Step 2: You must make a contextual interpretation of that comparison (e.g., \"Distribution A has a higher median, suggesting it generally grows more\").\n+ Bad answer: \"Birch trees are taller.\"\n+ Good answer: \"The median Birch growth (48 cm) is greater than the median Maple growth (45 cm), so Birch trees generally grow more.\"\n\nTakeaway: No values = no marks. Always pair a statistical comparison with a contextual interpretation.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "If adding new data points to a dataset must result in \"no change to the box plot\", what five statistical constraints must the new data satisfy? (2 steps)", "answer": "- Step 1: The new data must not alter the five key summary statistics that define the box plot: **Minimum, $$Q_1$$, Median, $$Q_3$$, and Maximum**.\n- Step 2: Each of these five statistics imposes an inequality or equality constraint on the new values. For example, to keep the Maximum the same, no new value can exceed it; to keep $$Q_1$$ the same, new values must not shift the positional average of the lower quartile.\n\nTakeaway: \"No change to box plot\" = 5 simultaneous constraints (Min, Q1, Med, Q3, Max).", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "A dataset of 32 values (Max = 80, $$Q_1 = 36$$) has 4 new values added: 27, $$a$$, 48, $$2a$$. If the box plot must not change, explain why the constraint $$a \\le 40$$ exists, and why the constraint $$a \\ge 36$$ exists. (2 steps)", "answer": "- Step 1: **Max constraint ($$a \\le 40$$)**: The maximum must stay at 80. The largest new value is $$2a$$. Therefore, $$2a \\le 80 \\implies a \\le 40$$.\n- Step 2: **$$Q_1$$ constraint ($$a \\ge 36$$)**: The new $$N=36$$, so $$Q_1$$ is the average of the 9th and 10th values. Adding 27 pushes original values forward. To keep $$Q_1 = 36$$ (which were the original 8th and 9th values, now 9th and 10th), the value $$a$$ must not displace them by inserting between them. Thus $$a$$ must be $$\\ge 36$$.\n\nTakeaway: Adding data requires checking positional shifts for quartiles and boundaries for min/max.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "If a probability question asks for $$P(2X - 3 > 5)$$ where $$X$$ is a discrete random variable, what is the first algebraic step you must take? (2 steps)", "answer": "- Step 1: Rearrange the linear inequality to isolate $$X$$. Add 3 to both sides: $$2X > 8$$, then divide by 2: $$X > 4$$.\n- Step 2: Because $$X$$ is discrete, identify all valid outcomes strictly greater than 4 and sum their individual probabilities.\n+ Example: If possible values are 2, 4, 5, 7, 8, then $$X > 4$$ means $$X \\in \\{5, 7, 8\\}$$. Do not include 4 because the inequality is strict.\n\nTakeaway: Always rearrange the inequality first; respect strict vs. non-strict boundaries for discrete variables.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "To calculate the variance of a discrete random variable $$X$$ using $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$, how do you compute $$E(X^2)$$ from a probability table, and what is a common mistake? (2 steps)", "answer": "- Step 1: Compute $$E(X^2)$$ by taking each outcome $$x$$, squaring it to get $$x^2$$, multiplying by its probability $$P(X=x)$$, and summing the results: $$E(X^2) = \\sum x^2 \\cdot P(X=x)$$.\n- Step 2: Subtract the square of the expected value: $$[E(X)]^2$$.\n+ Common mistake: Squaring the probability instead of the outcome (calculating $$\\sum x \\cdot [P(X=x)]^2$$). \"Square the $$x$$, not the probability.\"\n\nTakeaway: $$E(X^2) = \\sum x^2 p$$; you square the outcome, not the probability.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "Given $$Y = aX - b$$ where $$a$$ and $$b$$ are positive constants, state the expectation and variance of $$Y$$ in terms of $$E(X)$$ and $$\\text{Var}(X)$$. (2 steps)", "answer": "- Step 1: Expectation is linear: $$E(Y) = aE(X) - b$$. Both the multiplier $$a$$ and the constant $$-b$$ pass through directly.\n- Step 2: Variance is affected by the multiplier squared but is unaffected by adding/subtracting a constant: $$\\text{Var}(Y) = a^2\\text{Var}(X)$$. The constant $$b$$ drops out entirely.\n\nTakeaway: Constants shift the mean but don't affect spread; multipliers scale spread by their square.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "If you are given $$E(Y)$$ and $$\\text{Var}(Y)$$ for $$Y = aX - b$$ and need to find $$a$$ and $$b$$, which equation should you solve first and why? (2 steps)", "answer": "- Step 1: Solve the **variance** equation first: $$\\text{Var}(Y) = a^2\\text{Var}(X)$$. This eliminates $$b$$ entirely, allowing you to solve directly for $$a$$.\n- Step 2: Once you have $$a$$, substitute it into the **expectation** equation: $$E(Y) = aE(X) - b$$, and solve for $$b$$.\n+ Example: If $$\\text{Var}(Y) = 66.24$$ and $$\\text{Var}(X) = 4.14$$, then $$a^2 = 66.24/4.14 = 16 \\implies a = 4$$ (since $$a$$ is positive).\n\nTakeaway: Always use variance to find the multiplier first; it neatly bypasses the constant.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Two players spin a spinner independently, landing on values $$X_1$$ and $$X_2$$. Player 1 scores $$S = X_1$$, Player 2 scores $$R = 2X_2 - 3$$. Why must you use $$P(S > R) = \\sum P(S=s) \\cdot P(R < s)$$, rather than just looking at a single spin? (2 steps)", "answer": "- Step 1: $$S$$ and $$R$$ come from **two separate, independent spins**. They are independent random variables, so their joint probability factors: $$P(S=s \\text{ and } R < s) = P(S=s) \\times P(R < s)$$.\n- Step 2: You must condition on each possible value of $$S$$, find the probability that $$R$$ is strictly less than that value, multiply, and sum over all $$s$$. Treating them as the same spin is the common pitfall.\n+ Example: If $$S=2$$, you need $$P(R < 2)$$, which depends on the separate distribution of $$X_2$$.\n\nTakeaway: Two spins = independence; condition on one variable and multiply by the other's CDF.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "In a histogram, what does the **area** of a bar represent, and what does the **height** of a bar represent? (2 steps)", "answer": "- Step 1: The **area** of a bar is proportional to the **frequency** of that class.\n- Step 2: The **height** of a bar represents the **frequency density** (FD), calculated as $$\\text{FD} = \\text{Frequency} \\div \\text{Class Width}$$. Since Area = Width $$\\times$$ Height, and Area $$\\propto$$ Frequency, Height must be FD.\n\nTakeaway: Area = Frequency; Height = Frequency Density.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}, {"question": "A histogram reference bar has width 2.5 cm, height 7.5 cm, class width 4 mm, and FD = 5. How do you calculate the width and height of a new bar with class width 2 mm and FD = 8? (3 steps)", "answer": "- Step 1: Derive the two scale constants from the reference bar. Width scale: $$2.5 \\text{ cm} / 4 \\text{ mm} = 0.625 \\text{ cm per mm}$$. Height scale: $$7.5 \\text{ cm} / 5 \\text{ FD} = 1.5 \\text{ cm per unit FD}$$.\n- Step 2: Calculate the new bar's width: $$2 \\text{ mm} \\times 0.625 \\text{ cm/mm} = 1.25 \\text{ cm}$$.\n- Step 3: Calculate the new bar's height: $$8 \\text{ FD} \\times 1.5 \\text{ cm/FD} = 12 \\text{ cm}$$.\n\nTakeaway: Never assume height = frequency; always derive the cm-per-mm and cm-per-FD scales from the reference bar.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "What is the formula for estimating the median of grouped continuous data using linear interpolation? Define each term. (2 steps)", "answer": "- Step 1: The formula is $$\\text{Median} = L + \\frac{N/2 - F_b}{f_m} \\times c$$.\n- Step 2: Define terms: $$L$$ = lower boundary of the median class; $$N$$ = total frequency; $$F_b$$ = cumulative frequency before the median class; $$f_m$$ = frequency of the median class; $$c$$ = class width of the median class.\n\nTakeaway: For grouped data, use $$N/2$$ for position and interpolate from the lower class boundary.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "When estimating the median of grouped data, should you use $$N/2$$ or $$(N+1)/2$$ for the positional index? What boundary should you start from? (2 steps)", "answer": "- Step 1: For grouped continuous data, use $$N/2$$. The $$(N+1)/2$$ rule is for discrete data.\n- Step 2: Always start from the **lower class boundary** $$L$$, not the midpoint or the upper boundary of the previous class.\n\nTakeaway: Grouped data median uses $$N/2$$ and starts from the exact lower boundary.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "Data is coded using $$10y = w - 20$$. How do you express the mean of the original variable $$\\bar{w}$$ in terms of the mean of the coded variable $$\\bar{y}$$? (2 steps)", "answer": "- Step 1: Rearrange the coding equation to make the original variable the subject: $$w = 10y + 20$$.\n- Step 2: Apply the linear coding rule for expectation: $$\\bar{w} = 10\\bar{y} + 20$$. The same coefficients pass directly through to the means.\n+ Example: If $$\\sum y = 104$$ and $$n=50$$, then $$\\bar{y} = 2.08$$. Thus $$\\bar{w} = 10(2.08) + 20 = 40.8$$.\n\nTakeaway: Rearrange to $$w = ay + b$$, then $$\\bar{w} = a\\bar{y} + b$$.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "Data is coded using $$w = 10y + 20$$. How does the standard deviation of $$w$$ relate to the standard deviation of $$y$$? (2 steps)", "answer": "- Step 1: Variance scales by the square of the multiplier: $$\\text{Var}(w) = 10^2 \\text{Var}(y) = 100 \\text{Var}(y)$$. The constant $$+20$$ has no effect on variance.\n- Step 2: Standard deviation is the square root of variance: $$\\sigma_w = \\sqrt{100 \\text{Var}(y)} = 10 \\sigma_y$$.\n+ Common mistake: Scaling SD by 10 instead of variance by 100, or adding 20 to the SD.\n\nTakeaway: SD scales by $$|a|$$; variance scales by $$a^2$$. Constants vanish from spread measures.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "If a new data point exactly equal to the current mean is added to a dataset, what happens to the mean and the standard deviation? (3 steps)", "answer": "- Step 1: **Mean**: No change. The new mean is $$\\frac{n\\bar{x} + \\bar{x}}{n+1} = \\frac{(n+1)\\bar{x}}{n+1} = \\bar{x}$$.\n- Step 2: **Standard deviation**: Decreases. The new point contributes $$(\\bar{x} - \\bar{x})^2 = 0$$ to the sum of squared deviations (numerator), but the denominator $$n$$ increases to $$n+1$$.\n- Step 3: Dividing a similar sum of squares by a larger $$n$$ results in a smaller variance, hence a smaller standard deviation.\n\nTakeaway: Adding a value at the mean anchors the center and dilutes the spread.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "Given summary statistics $$\\sum x$$, $$\\sum y$$, and $$\\sum xy$$, what is the formula for $$S_{xy}$$? (2 steps)", "answer": "- Step 1: The formula is $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$.\n- Step 2: This measures the co-variation of $$x$$ and $$y$$ from their means. It is the numerator of the covariance calculation.\n+ Common mistake: Dividing by $$n^2$$ instead of $$n$$, or computing $$\\sum x^2$$ when $$\\sum xy$$ is needed.\n\nTakeaway: $$S_{xy}$$ corrects the raw sum of products by subtracting the product of the means times $$n$$.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "What is the formula for the Product Moment Correlation Coefficient (PMCC), $$r$$, in terms of $$S$$-values, and what are its bounds? (2 steps)", "answer": "- Step 1: The formula is $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$.\n- Step 2: The value of $$r$$ must always lie in the interval $$[-1, 1]$$. If your calculation yields a value outside this, you have made an error.\n+ Example: $$r = 0.98$$ indicates a strong positive linear correlation.\n\nTakeaway: PMCC normalizes $$S_{xy}$$ by the geometric mean of the individual variances; sanity check $$|r| \\le 1$$.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "For the regression line of $$y$$ on $$x$$, what are the formulas for the gradient ($$b$$) and the intercept ($$a$$)? (2 steps)", "answer": "- Step 1: The gradient is $$b = \\frac{S_{xy}}{S_{xx}}$$. Note that the denominator is $$S_{xx}$$, not $$S_{yy}$$.\n- Step 2: The intercept is $$a = \\bar{y} - b\\bar{x}$$. You must use the **unrounded** value of $$b$$ when calculating $$a$$ to avoid accuracy loss.\n\nTakeaway: Regression of $$y$$ on $$x$$ divides by $$S_{xx}$$; always carry full precision for the intercept calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "How do you interpret the gradient of a regression line in context? (2 steps)", "answer": "- Step 1: State the interpretation as: \"For every 1 unit increase in the [explanatory variable], the [response variable] changes by approximately [gradient] units on average.\"\n- Step 2: Ensure you use the **units** of both variables and phrase it in the context of the problem (not just \"x\" and \"y\").\n+ Example: \"For every 1 cm increase in the length of a bear, the girth increases by approximately 0.722 cm on average.\"\n\nTakeaway: Context + Units + \"On average\" = full marks interpretation.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "Why is using a regression line to estimate a value far outside the observed data range unreliable? (2 steps)", "answer": "- Step 1: The linear relationship observed within the data range may not hold outside of it. The true relationship could be curved, thresholded, or otherwise non-linear.\n- Step 2: This is called **extrapolation**. Estimates are only reliable for **interpolation** (within the observed range of the explanatory variable).\n+ Example: Estimating girth for a bear of 50 cm length when the sample mean is 182 cm is unreliable because 50 cm is far outside the observed range.\n\nTakeaway: Interpolation is safe; extrapolation is unreliable because the linear model may not extend.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "If the regression line of $$g$$ on $$d$$ is $$g = -42.3 + 0.722d$$, and you are told that an increase of $$x$$ cm in $$d$$ causes a 17.3 cm increase in $$g$$, how do you find $$x$$? (2 steps)", "answer": "- Step 1: Recognize that for **increments**, only the gradient matters. The intercept is a baseline and does not affect changes. A change $$\\Delta d$$ causes a change $$\\Delta g = b \\cdot \\Delta d$$.\n- Step 2: Set up the equation $$0.722x = 17.3$$ and solve for $$x$$: $$x = 17.3 / 0.722 \\approx 24.0$$.\n+ Common mistake: Solving $$-42.3 + 0.722x = 17.3$$. This treats 17.3 as an absolute value of $$g$$, not an increment.\n\nTakeaway: For changes/increments, use gradient $$\\times$$ change in $$x$$. Ignore the intercept.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "When standardising a normal variable $$X \\sim N(\\mu, \\sigma^2)$$, what is the formula for the standard normal variable $$Z$$? (1 step)", "answer": "- Step 1: The standardisation formula is $$Z = \\frac{X - \\mu}{\\sigma}$$. You subtract the mean and divide by the standard deviation (not the variance).\n+ Common mistake: Dividing by $$\\sigma^2$$ instead of $$\\sigma$$.\n\nTakeaway: Standardise by centering (subtract mean) and scaling (divide by SD).", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": false}, {"question": "In a normal distribution context, does \"the fastest 60% of adults\" correspond to the upper tail or the lower tail of the distribution of times? Why? (2 steps)", "answer": "- Step 1: \"Fastest\" means the shortest times. In a time distribution, smaller values correspond to faster performances.\n- Step 2: Smaller values are on the **left** side of the distribution, which is the **lower tail**. Therefore, you want the cutoff $$t$$ such that $$P(X < t) = 0.60$$.\n+ Common mistake: Assuming \"fastest\" = \"highest performing\" = upper tail. This leads to using $$P(X > t) = 0.60$$, which is incorrect.\n\nTakeaway: Sketch the curve! \"Fastest\" = shortest time = lower tail.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "A normal distribution of times has \"the fastest 60%\" taking part in round 2. To find the cutoff time $$t$$, you look up $$\\Phi^{-1}(0.60) = 0.2533$$. How do you set up the standardisation equation to find $$t$$? (2 steps)", "answer": "- Step 1: Since fastest 60% is the lower tail, set up $$P(X < t) = 0.60$$.\n- Step 2: Standardise to get $$P(Z < \\frac{t-\\mu}{\\sigma}) = 0.60$$. This means $$\\frac{t-\\mu}{\\sigma} = 0.2533$$, so $$t = \\mu + 0.2533\\sigma$$.\n+ Example: If $$\\mu=15, \\sigma=2$$, then $$t = 15 + 0.2533(2) = 15.5066$$.\n\nTakeaway: Match the Z-value to the correct tail; for fastest/lower tail, $$Z$$ is positive if $$p > 0.5$$.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": false}, {"question": "If $$T \\sim N(\\mu, \\sigma^2)$$ and you are given $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$, how do you find $$\\sigma$$? (3 steps)", "answer": "- Step 1: By symmetry of the normal distribution, the remaining 0.05 probability is split equally into two tails. So, $$P(T < \\mu - 10) = 0.025$$.\n- Step 2: Standardise the lower boundary: $$P(Z < \\frac{(\\mu-10)-\\mu}{\\sigma}) = 0.025$$, which simplifies to $$P(Z < \\frac{-10}{\\sigma}) = 0.025$$.\n- Step 3: From tables, $$P(Z < -1.96) = 0.025$$. So, $$\\frac{-10}{\\sigma} = -1.96$$, meaning $$\\sigma = \\frac{10}{1.96} \\approx 5.10$$.\n+ Critical check: $$\\sigma$$ should be of the same order of magnitude as the interval half-width. A common slip is writing 0.510 instead of 5.10.\n\nTakeaway: Symmetric interval → split tails → find Z → solve for $$\\sigma$$. Sanity check the decimal!", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "When calculating conditional probability $$P(A \\mid B)$$, if event $$A$$ is a **subset** of event $$B$$ (i.e., $$A \\subset B$$), how does the numerator $$P(A \\cap B)$$ simplify? (2 steps)", "answer": "- Step 1: If $$A$$ is entirely contained within $$B$$, then whenever $$A$$ happens, $$B$$ has also happened.\n- Step 2: Therefore, the intersection $$A \\cap B$$ is simply $$A$$. The conditional probability simplifies to $$P(A \\mid B) = \\frac{P(A)}{P(B)}$$.\n+ Example: If $$A = \\{T > \\mu - 5\\}$$ and $$B = \\{T > \\mu - 10\\}$$, then $$A \\subset B$$. So $$P(T > \\mu - 5 \\mid T > \\mu - 10) = \\frac{P(T > \\mu - 5)}{P(T > \\mu - 10)}$$.\n\nTakeaway: If $$A \\subset B$$, then $$A \\cap B = A$$; the intersection simplifies to the smaller event.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "Calculate $$P(T > \\mu - 5 \\mid T > \\mu - 10)$$ for $$T \\sim N(\\mu, 5.10^2)$$. (3 steps)", "answer": "- Step 1: Identify that $$\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$$, so the conditional probability is $$\\frac{P(T > \\mu - 5)}{P(T > \\mu - 10)}$$.\n- Step 2: Find the numerator: $$P(T > \\mu - 5) = P(Z > \\frac{-5}{5.10}) = P(Z > -0.98) = P(Z < 0.98) = 0.8365$$.\n- Step 3: Find the denominator: $$P(T > \\mu - 10) = 1 - P(T < \\mu - 10) = 1 - 0.025 = 0.975$$. Result: $$0.8365 / 0.975 \\approx 0.858$$.\n+ Common mistake: Using 0.95 as the denominator. The denominator is $$P(T > \\mu - 10)$$, not the probability of the central interval.\n\nTakeaway: Be precise with the denominator in conditional probability; don't assume it's the given probability from a previous part.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": false}, {"question": "In a Venn diagram with events $$C$$ and $$G$$, how do you find $$P(C \\cap G')$$ (i.e., C but not G)? (2 steps)", "answer": "- Step 1: Identify all regions of the Venn diagram that are inside circle $$C$$ but **outside** circle $$G$$.\n- Step 2: Sum the probabilities of these specific regions.\n+ Example: If the regions are \"C only\" = 0.04, and \"C and S only (not G)\" = 0.12, then $$P(C \\cap G') = 0.04 + 0.12 = 0.16$$.\n+ Common mistake: Multiplying $$P(C) \\times P(G')$$, which is only valid if $$C$$ and $$G$$ are independent (not assumed here).\n\nTakeaway: $$P(C \\cap G')$$ is the sum of C-regions that don't overlap G; don't assume independence.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "In a 3-event Venn diagram ($$C, S, G$$), if $$C$$ and $$S$$ are independent, what equation must hold, and how do you calculate $$P(C \\cap S)$$ correctly? (2 steps)", "answer": "- Step 1: The independence equation is $$P(C \\cap S) = P(C) \\times P(S)$$.\n- Step 2: $$P(C \\cap S)$$ must include **all** subregions inside the overlap of $$C$$ and $$S$$. This means adding both the triple-overlap ($$C \\cap S \\cap G$$) and the C∩S-only region.\n+ Example: If C∩S-only = 0.12 and C∩S∩G = 0.15, then $$P(C \\cap S) = 0.12 + 0.15 = 0.27$$.\n+ Common mistake: Using only the C∩S-only region and forgetting the triple-overlap piece.\n\nTakeaway: The intersection $$P(C \\cap S)$$ includes the whole lens shape, which encompasses the triple overlap.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "In a Venn diagram problem, what is the most reliable shortcut to find $$P(A')$$ (the probability of not A), and why? (2 steps)", "answer": "- Step 1: The shortcut is $$P(A') = 1 - P(A)$$.\n- Step 2: This is reliable because $$P(A)$$ includes everything inside circle A. Subtracting from 1 automatically accounts for all other circles AND the outside region ($$q$$). Manually summing \"not A\" regions often leads to forgetting the outside region.\n+ Example: If $$P(S) = 0.60$$, then $$P(S') = 1 - 0.60 = 0.40$$. This is much safer than adding \"C only\" + \"G only\" + \"outside\", where missing \"outside\" gives 0.18 (a known common error).\n\nTakeaway: Use $$1 - P(A)$$ for complements to avoid missing the outside region.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "In a 3-event Venn diagram, how do you calculate a conditional probability like $$P(C \\mid S \\cap G)$$? (2 steps)", "answer": "- Step 1: Apply the definition: $$P(C \\mid S \\cap G) = \\frac{P(C \\cap S \\cap G)}{P(S \\cap G)}$$.\n- Step 2: The denominator $$P(S \\cap G)$$ includes **all** subregions in the S-G overlap: both the triple-overlap ($$C \\cap S \\cap G$$) and the S∩G-only region.\n+ Example: If $$C \\cap S \\cap G = 0.15$$ and S∩G-only = 0.10, then $$P(S \\cap G) = 0.25$$. So $$P(C \\mid S \\cap G) = 0.15 / 0.25 = 0.6$$.\n\nTakeaway: The denominator of a Venn conditional must include all parts of the given event's overlap.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "A youth club has a large number of teenagers. 76 teenagers play Chess and Go. The Venn diagram gives $$P(C \\cap G) = 0.29$$. How do you estimate the total number of teenagers and the number who do NOT play Scrabble? (3 steps)", "answer": "- Step 1: Calculate the total number of teenagers using the known frequency and probability: $$\\text{Total} = \\frac{\\text{Frequency}}{\\text{Probability}} = \\frac{76}{0.29} \\approx 262$$.\n- Step 2: Find $$P(S')$$ using the complement shortcut: $$P(S') = 1 - P(S) = 1 - 0.60 = 0.40$$.\n- Step 3: Estimate the number not playing Scrabble: $$\\text{Total} \\times P(S') = 262.07 \\times 0.40 \\approx 105$$.\n+ Critical error to avoid: Forgetting the \"outside\" region when computing $$P(S')$$ manually. Using $$1 - P(S)$$ guarantees it is correct.\n\nTakeaway: Scale up by total = known_freq / known_prob, then scale back down using the complement shortcut.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "Which variance formula is NOT in the IAL formula booklet but is essential for computing variance from raw sums: $$\\sigma^2 = \\frac{\\sum x^2}{n} - \\bar{x}^2$$? How does it differ from $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$? (2 steps)", "answer": "- Step 1: The formula $$\\sigma^2 = \\frac{\\sum x^2}{n} - \\bar{x}^2$$ is for **raw data** (dividing sums by $$n$$). You must memorize it as it is NOT in the IAL booklet.\n- Step 2: The formula $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$ is for **probability distributions** (multiplying by probabilities $$p$$). This IS in the booklet. They are conceptually identical (expectation is the probability-weighted average), but differ in computation.\n\nTakeaway: For raw data, divide sums by $$n$$; for DRV, multiply by $$p$$. The raw data version must be memorized.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "What is the Edexcel S1 outlier definition using quartiles? (1 step)", "answer": "- Step 1: An outlier is defined as any value strictly less than $$Q_1 - 1.5 \\times \\text{IQR}$$ or strictly greater than $$Q_3 + 1.5 \\times \\text{IQR}$$. This is NOT in the formula booklet and must be memorized.\n\nTakeaway: $$1.5 \\times \\text{IQR}$$ fence rule — memorize it.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "What is the definition of frequency density used for histogram construction? (1 step)", "answer": "- Step 1: Frequency Density (FD) = Frequency $$\\div$$ Class Width. This is NOT in the formula booklet. It ensures that the area of the bar (Width $$\\times$$ FD) equals the frequency.\n\nTakeaway: FD = Freq / Width; area represents frequency.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "What is the empirical mapping for \"fastest $$p\\%$$\" and \"slowest $$p\\%$$\" in a normal distribution of times? (2 steps)", "answer": "- Step 1: \"Fastest $$p\\%$$\" means the shortest times, which correspond to the **lower tail**. Set up $$P(X < t) = p/100$$.\n- Step 2: \"Slowest $$p\\%$$\" means the longest times, which correspond to the **upper tail**. Set up $$P(X > t) = p/100$$.\n\nTakeaway: Fastest = Lower tail; Slowest = Upper tail. Always sketch the curve.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "Simple Exercise: A dataset has $$N=7$$ values. Using the Edexcel rule, what is the position of $$Q_1$$? (2 steps)", "answer": "- Step 1: Calculate $$n/4 = 7/4 = 1.75$$.\n- Step 2: Since 1.75 is not an integer, round up to position **2**. So $$Q_1$$ is the 2nd value in the ordered dataset.\n\nTakeaway: Non-integer $$n/4$$ always rounds up to the next integer position.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "Simple Exercise: If $$\\text{Var}(X) = 5$$, find $$\\text{Var}(2X + 3)$$. (2 steps)", "answer": "- Step 1: Use the linear coding rule for variance: $$\\text{Var}(aX + b) = a^2\\text{Var}(X)$$.\n- Step 2: Substitute $$a=2$$ and $$\\text{Var}(X)=5$$: $$\\text{Var}(2X + 3) = 2^2 \\times 5 = 4 \\times 5 = 20$$. The constant $$+3$$ vanishes.\n\nTakeaway: Multipliers are squared; constants vanish.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "Simple Exercise: In a Venn diagram, $$P(A) = 0.7$$. What is $$P(A')$$? Why is this safer than adding up the \"not A\" regions? (2 steps)", "answer": "- Step 1: $$P(A') = 1 - P(A) = 1 - 0.7 = 0.3$$.\n- Step 2: This is safer because manually adding \"not A\" regions requires finding all pieces outside circle A, including the region outside all circles. It is easy to forget that outside region.\n\nTakeaway: The complement rule $$1 - P(A)$$ is foolproof for Venn diagram complements.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "Simple Exercise: A regression line is $$y = 5 + 2x$$. If $$x$$ increases by 3, how much does $$y$$ increase by? (2 steps)", "answer": "- Step 1: For increments, only the gradient matters. The change in $$y$$ is $$\\Delta y = b \\cdot \\Delta x$$.\n- Step 2: Substitute gradient $$b=2$$ and $$\\Delta x = 3$$: $$\\Delta y = 2 \\times 3 = 6$$. The intercept 5 is irrelevant for changes.\n\nTakeaway: Changes depend only on the gradient; ignore the intercept.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "Simple Exercise: A histogram reference bar is 4 cm tall and represents FD = 2. What is the height of a bar with FD = 5? (2 steps)", "answer": "- Step 1: Find the height scale: $$4 \\text{ cm} / 2 \\text{ FD} = 2 \\text{ cm per unit FD}$$.\n- Step 2: Apply to the new FD: Height $$= 5 \\times 2 = 10 \\text{ cm}$$.\n\nTakeaway: Derive the scale constant from the reference bar first, then apply it.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "Simple Exercise: $$P(\\mu - 20 < X < \\mu + 20) = 0.95$$ for a normal distribution. What is $$\\sigma$$? (2 steps)", "answer": "- Step 1: The interval is symmetric, so the lower tail is 0.025. Standardise the lower boundary: $$\\frac{-20}{\\sigma} = -1.96$$.\n- Step 2: Solve for $$\\sigma$$: $$\\sigma = \\frac{20}{1.96} \\approx 10.2$$. (Sanity check: $$\\sigma \\approx$$ half-width / 2 is the right order of magnitude).\n\nTakeaway: $$\\sigma = \\text{half-width} / 1.96$$ for a 95% symmetric interval.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}], "count": 49}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "How do you read the leaves on the left side (e.g., Birch) of a back-to-back stem-and-leaf diagram? (2 steps)", "answer": "- Step 1: Identify that the left side represents one dataset and the right side represents another, sharing a common stem in the middle.\n- Step 2: The leaves on the left side are read **right-to-left**, moving outwards from the stem. For example, if the stem is 6 and the left leaves are 7, 5, 3, the values are 67, 65, 63.\n+ Common Pitfall: Reading left-to-right like normal text will reverse the order of the digits and give incorrect values (e.g., 63, 65, 67).\n+ Always check the key first: \"5 | 6 | 3 means 65 for Birch and 63 for Maple\" confirms the reading direction.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "Before extracting any values from a stem-and-leaf diagram, what must you always check, and why is it critical for back-to-back diagrams? (2 steps)", "answer": "- Step 1: Always read the **key** first. The key tells you how to combine the stem and leaf digits to form the actual data value.\n- Step 2: It confirms the reading direction for back-to-back diagrams and the scale (e.g., whether 2 | 5 means 25 or 2.5).\n+ Misreading or ignoring the key can invalidate every downstream calculation, as a single misread digit alters the ordered list.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "For a dataset with $$N=32$$, which ordered positions are used to find the median, and why? (2 steps)", "answer": "- Step 1: Since $$N=32$$ is even, there is no single middle value. The median is the average of the two middle values.\n- Step 2: The positions are $$N/2 = 16$$ and $$(N/2) + 1 = 17$$.\n+ Locate the 16th and 17th values in the ordered list (using cumulative frequencies from the stem-and-leaf) and average them.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "A stem-and-leaf row for a dataset has leaves $$1, 1, 1, k, 7, 8$$ in ascending order. The median of 32 values is 45, and the 16th and 17th values both fall in this row (stem 4). How do you find the unknown digit $$k$$? (3 steps)", "answer": "- Step 1: Identify the 16th and 17th values in terms of $$k$$. Because the leaves are in ascending order, the 16th value is $$40+k$$ and the 17th value is $$47$$.\n- Step 2: Set up the median equation: $$\\frac{(40+k) + 47}{2} = 45$$.\n- Step 3: Solve for $$k$$: $$87 + k = 90 \\implies k = 3$$.\n+ Constraint: $$k$$ must be a single digit that maintains ascending order (so $$1 \\le k \\le 7$$). Here, 3 satisfies this.\n+ Misconception: Do not treat $$k$$ as a frequency or a sum; it is a single leaf digit representing a units value.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "What is the Edexcel S1 rule for finding the lower quartile $$Q_1$$ position when $$n/4$$ is NOT an integer? (2 steps)", "answer": "- Step 1: Calculate $$n/4$$.\n- Step 2: If the result is not an integer, round **up** to the next integer to find the position. The value at that position is $$Q_1$$.\n+ Example: If $$n=35$$, $$n/4 = 8.75$$. Since 8.75 is not an integer, round up to position 9. The 9th value is $$Q_1$$.\n+ Misconception: Do NOT use the GCSE/M-stats rule of $$(n+1)/4$$. Do NOT round down to 8, and do NOT take an average of the 8th and 9th values.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "What is the Edexcel S1 rule for finding the lower quartile $$Q_1$$ position when $$n/4$$ IS an integer? (2 steps)", "answer": "- Step 1: Calculate $$n/4$$.\n- Step 2: If the result is an integer, take the **average** of the value at position $$n/4$$ and the value at position $$(n/4) + 1$$.\n+ Example: If $$n=36$$, $$n/4 = 9$$. The lower quartile is the average of the 9th and 10th values.\n+ The exact same logic applies for the upper quartile $$Q_3$$ using $$3n/4$$.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "How do you determine if a value is an outlier using the Interquartile Range (IQR)? (3 steps)", "answer": "- Step 1: Calculate the Interquartile Range: $$\\text{IQR} = Q_3 - Q_1$$.\n- Step 2: Calculate the lower fence: $$Q_1 - 1.5 \\times \\text{IQR}$$.\n- Step 3: Calculate the upper fence: $$Q_3 + 1.5 \\times \\text{IQR}$$.\n+ A value is an outlier if it is strictly less than the lower fence OR strictly greater than the upper fence.\n+ Exam tip: Always write $$1.5 \\times \\text{IQR}$$ as a separate line in your working to secure the method mark, even if you make an arithmetic error later.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "Where do the whiskers of a box plot end when the dataset contains outliers? (2 steps)", "answer": "- Step 1: Identify all outliers in the dataset using the $$1.5 \\times \\text{IQR}$$ rule.\n- Step 2: The whiskers extend to the **most extreme non-outlier** values in the dataset. Outliers are plotted as isolated points (crosses or asterisks) beyond the whiskers.\n+ Misconception: The whisker does NOT extend to the maximum/minimum of the entire dataset if those values are outliers. It stops at the last data point that falls within the fences.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "When an exam question asks you to \"comment on any difference in the distributions\" of two datasets, what must your answer include to guarantee the mark? (2 steps)", "answer": "- Step 1: Compare a specific statistic (e.g., median or mean) and explicitly state **both numerical values** from the datasets.\n- Step 2: Make a contextual interpretation based on those values (e.g., \"The median Birch growth (48 cm) is greater than the median Maple growth (45 cm), so Birch trees grow more on average\").\n+ Misconception: Saying \"Birch are taller\" without quoting the values gets 0 marks. You must state the values of the statistics used. Avoid the vague word \"average\" alone—specify \"median\" or \"mean\".", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "A box plot has Min=25, $$Q_1=36$$, Med=45, $$Q_3=54$$, Max=80. If four new data values are added and the box plot is unchanged, what does this imply? (2 steps)", "answer": "- Step 1: \"No change to the box plot\" means the five-number summary must remain exactly the same.\n- Step 2: The new dataset of $$N+4$$ values must still have Min=25, $$Q_1=36$$, Med=45, $$Q_3=54$$, Max=80. Each of these five statistics imposes a separate constraint on the values that can be added.\n+ For example, the new maximum cannot exceed 80, and the new values must not shift the quartile positions enough to change their values.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "A dataset ($$N=32$$) has Max=80. Four values are added: 27, $$a$$, 48, $$2a$$. The box plot is unchanged, so the maximum remains 80. What is the constraint on $$a$$ from the maximum value alone? (3 steps)", "answer": "- Step 1: The maximum of the new dataset must remain 80.\n- Step 2: The largest new value being added is $$2a$$. For the overall maximum to not exceed 80, we need $$2a \\le 80$$.\n- Step 3: This gives the constraint $$a \\le 40$$.\n+ Note: The simple ordering constraint from the data ($$a \\le 48$$) is weaker than the box plot constraint. The box plot constraint is stricter and overrides it.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "In the same dataset, $$N$$ becomes 36 (divisible by 4). The original $$Q_1$$ was the 9th value (36). After adding 27 and $$a$$, the original 9th value shifts to the 10th or 11th position. For $$Q_1$$ (average of 9th and 10th) to remain 36, what must be true about $$a$$? (3 steps)", "answer": "- Step 1: For $$N=36$$, $$Q_1$$ is the average of the 9th and 10th values.\n- Step 2: To keep $$Q_1 = 36$$, both the 9th and 10th values must be 36.\n- Step 3: The value 27 will take an early position. The value $$a$$ must not displace the two 36s from the 9th and 10th positions. Therefore, $$a$$ must be greater than or equal to 36.\n+ If $$a < 36$$, it would insert itself before the 36s, pushing them to later positions, and the average of the 9th and 10th would no longer be 36.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "To find $$P(2X - 3 > 5)$$ for a discrete random variable $$X$$, what is the first algebraic step, and what is a common pitfall? (2 steps)", "answer": "- Step 1: Rearrange the inequality to isolate $$X$$: $$2X - 3 > 5 \\implies 2X > 8 \\implies X > 4$$.\n- Step 2: Sum the probabilities for all valid $$x$$ values strictly greater than 4: $$P(X=5) + P(X=7) + \\dots$$\n+ Misconception: Because the inequality is strict ($$>$$), do NOT include $$P(X=4)$$. If it were $$\\ge$$, you would include it.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "How do you calculate $$E(X^2)$$ from a probability distribution table? (3 steps)", "answer": "- Step 1: Square each possible value of the random variable $$x$$ to get $$x^2$$.\n- Step 2: Multiply each $$x^2$$ by its corresponding probability $$P(X=x)$$.\n- Step 3: Sum all these products: $$E(X^2) = \\sum x^2 \\cdot P(X=x)$$.\n+ Misconception: Do NOT square the probabilities. You are finding the expected value of the squared outcome, not the probability squared.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "What is the formula for the variance of a random variable $$X$$ in terms of $$E(X)$$ and $$E(X^2)$$? (2 steps)", "answer": "- Step 1: The variance is the expected value of the squared deviations from the mean.\n- Step 2: This simplifies to the formula: $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$.\n+ Calculate $$E(X^2)$$ first, then subtract the square of the mean. Do not subtract the mean first and then square.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "What is the formula for calculating the variance of a dataset from raw sums, and why must you memorize it for IAL? (2 steps)", "answer": "- Step 1: The formula is $$\\sigma^2 = \\frac{\\sum x^2}{n} - \\bar{x}^2$$, which can also be written as $$\\frac{\\sum x^2}{n} - \\left(\\frac{\\sum x}{n}\\right)^2$$.\n- Step 2: This formula is NOT in the IAL formula booklet, so you must commit it to memory.\n+ An alternative form using $$S_{xx}$$ is $$\\sigma^2 = \\frac{S_{xx}}{n} = \\frac{1}{n}\\left(\\sum x^2 - \\frac{(\\sum x)^2}{n}\\right)$$. Be careful with the powers of $$n$$ in the second term.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "If $$Y = aX - b$$ where $$a$$ and $$b$$ are constants, how do $$E(Y)$$ and $$\\operatorname{Var}(Y)$$ relate to $$E(X)$$ and $$\\operatorname{Var}(X)$$? (3 steps)", "answer": "- Step 1: For expectation, both scaling and shifting apply: $$E(Y) = aE(X) - b$$.\n- Step 2: For variance, only scaling affects the spread; shifting does not: $$\\operatorname{Var}(Y) = a^2\\operatorname{Var}(X)$$.\n- Step 3: The constant $$b$$ disappears from the variance because variance measures spread around the mean, and shifting all data by $$b$$ doesn't change the spread.\n+ Misconception: Do NOT write $$\\operatorname{Var}(Y) = a\\operatorname{Var}(X) - b$$. The scaling factor is squared, and the shift is completely removed.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "Given $$Y = aX - b$$ with known $$E(Y)$$ and $$\\operatorname{Var}(Y)$$, what is the strategic order for finding $$a$$ and $$b$$, and why? (3 steps)", "answer": "- Step 1: Start with the **variance** equation: $$\\operatorname{Var}(Y) = a^2\\operatorname{Var}(X)$$.\n- Step 2: Solve for $$a$$. This eliminates the constant $$b$$ entirely, giving a clean equation for $$a$$.\n- Step 3: Substitute the found value of $$a$$ into the **expectation** equation $$E(Y) = aE(X) - b$$ to solve for $$b$$.\n+ If you start with expectation, you'll have an equation with both $$a$$ and $$b$$, requiring substitution and creating more chances for arithmetic errors.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "Sam spins a spinner to get score $$S = X_1$$, and Alex spins the same spinner to get score $$R = 2X_2 - 3$$. Are $$S$$ and $$R$$ independent, and how does this affect calculating $$P(S > R)$$? (3 steps)", "answer": "- Step 1: Yes, $$S$$ and $$R$$ are independent because they come from **two separate spins** of the spinner.\n- Step 2: Independence means the joint probability is the product: $$P(S=s, R=r) = P(S=s) \\times P(R=r)$$.\n- Step 3: To find $$P(S > R)$$, condition on $$S$$: for each possible value of $$S$$, find $$P(R < S)$$, multiply by $$P(S)$$, and sum the results.\n+ Misconception: Do not assume $$S$$ and $$R$$ are from the same spin. If they were the same spin, $$S$$ and $$R$$ would be perfectly dependent.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "In a histogram, what does the **area** of a bar represent, and how does this define the height? (3 steps)", "answer": "- Step 1: The area of a bar represents the **frequency** of that class.\n- Step 2: Since Area = Width × Height, the height must be Area / Width = Frequency / Class Width.\n- Step 3: The height is therefore the **frequency density**, not the frequency itself.\n+ Misconception: The height of the bar does NOT represent the frequency unless all class widths are equal to 1 unit.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "A histogram reference bar has physical width 2.5 cm and height 7.5 cm, representing a class of width 4 mm and frequency 20. How do you find the physical dimensions of another bar? (3 steps)", "answer": "- Step 1: Derive the two scale constants from the reference bar.\n- Step 2: Width scale: $$2.5 \\text{ cm} / 4 \\text{ mm} = 0.625 \\text{ cm per mm}$$ of class width.\n- Step 3: Height scale: The frequency density is $$20/4 = 5$$. So $$7.5 \\text{ cm} / 5 = 1.5 \\text{ cm per unit FD}$$.\n+ Apply these constants to the new class: multiply its class width by 0.625 for the bar width, and its FD by 1.5 for the bar height.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": false}, {"question": "What is the linear interpolation formula for estimating the median of grouped continuous data? (2 steps)", "answer": "- Step 1: Locate the median class using cumulative frequency (position $$N/2$$).\n- Step 2: Apply the formula: $$\\text{Median} = L + \\frac{N/2 - F_b}{f_m} \\times c$$, where $$L$$ is the lower class boundary of the median class, $$F_b$$ is the cumulative frequency before the median class, $$f_m$$ is the frequency of the median class, and $$c$$ is the class width.\n+ Misconception: Do NOT use $$(N+1)/2$$ for grouped continuous data; use $$N/2$$. Also, do NOT use the midpoint of the class.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": false}, {"question": "If weight $$w$$ is coded using $$10y = w - 20$$, how do you find the mean of $$w$$, $$\\bar{w}$$, from the mean of $$y$$, $$\\bar{y}$$? (2 steps)", "answer": "- Step 1: Rearrange the coding equation to express $$w$$ in terms of $$y$$: $$w = 10y + 20$$.\n- Step 2: Apply the linear coding rule for expectations: $$\\bar{w} = 10\\bar{y} + 20$$. Calculate $$\\bar{y} = \\frac{\\sum y}{n}$$, then substitute.\n+ Misconception: Do not try to transform individual $$y$$ values and then average; transform the mean directly using the linear relationship.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "If weight $$w$$ is coded as $$10y = w - 20$$, how does the standard deviation of $$w$$ relate to the standard deviation of $$y$$? (3 steps)", "answer": "- Step 1: Rearrange to $$w = 10y + 20$$.\n- Step 2: The standard deviation scales by the absolute value of the coefficient of $$y$$: $$\\sigma_w = |10| \\sigma_y = 10\\sigma_y$$.\n- Step 3: The constant $$+20$$ has no effect on the standard deviation because adding a constant shifts all data equally and doesn't change the spread.\n+ Misconception: Do NOT add 20 to the standard deviation. Do NOT scale variance by 10 (variance scales by $$10^2=100$$, SD scales by 10).", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "A value exactly equal to the current mean is added to a dataset. What happens to the mean and the standard deviation? (3 steps)", "answer": "- Step 1: **Mean**: No change. The new mean is $$\\frac{n\\bar{x} + \\bar{x}}{n+1} = \\frac{(n+1)\\bar{x}}{n+1} = \\bar{x}$$.\n- Step 2: **Standard deviation**: Decreases. The new value contributes 0 to the sum of squared de
