<script>
const DATA={"selected": [{"question": "In a regression problem, why must you convert units (e.g. metres to cm) BEFORE substituting into the regression equation?", "answer": "- Step 1: The regression equation was fitted using the original units (e.g. cm) of both variables.\n- Step 2: The gradient $$b$$ has units of \"$$y$$-units per $$x$$-unit\" — here, cm of girth per cm of length. Substituting metres without conversion gives an answer scaled by 100.\n- Step 3: Defence: always check units of the input value against the units used during fitting. Convert if mismatched, BEFORE substitution.\n\nThe phrase \"a bear with length 2.5 metres\" is a translation trap — convert to 250 cm first.", "source": "Opus 4.7 ②", "_id": "opus_2_64"}, {"question": "S1 May 2024 Q3(b) — For estimating the median of grouped continuous data using linear interpolation, what position do you use, and how does this differ from discrete data? (2 steps)", "answer": "- Step 1: For grouped continuous data, use **$N/2$** as the median position. For $N = 50$, the median is at position 25. This is the Edexcel convention for grouped data.\n- Step 2: For discrete data, you would use $(N+1)/2$. The difference arises because grouped data treats values as continuously distributed within each class, so there's no \"gap\" between the $N/2$th and $(N/2+1)$th observations.\n\nUsing $(N+1)/2 = 25.5$ for grouped data is a common pitfall that leads to a slightly different (and wrong) interpolated value.", "source": "GLM 5.1 ①", "_id": "glm_1_23"}, {"question": "State the linear-interpolation formula for the median of grouped data and identify each symbol.", "answer": "- Step 1: $$\\text{Median} = L + \\frac{N/2 - F_b}{f_m} \\times c$$.\n- Step 2: $$L$$ = lower class **boundary** of the median class (the actual class lower limit, not the midpoint — e.g. 32, not 31.5 unless rounding pulls it).\n- Step 3: $$F_b$$ = cumulative frequency **before** the median class; $$f_m$$ = frequency OF the median class; $$c$$ = class **width**.\n- Step 4: This formula is NOT in the IAL booklet — memorise.\n\nIntuition: you've climbed $$F_b$$ up the staircase; you need $$N/2 - F_b$$ more; the median class contributes $$f_m$$ over width $$c$$, so each unit of frequency = $$c/f_m$$ of $$x$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "S1 May 2024 Q4(e)(ii) — Why is using a regression line to estimate a value well outside the observed data range unreliable? (2 steps)", "answer": "- Step 1: This is called **extrapolation**. The linear relationship observed within the data range may not hold outside of it (the relationship could curve or flatten).\n- Step 2: Therefore, the estimate is unreliable because the model is untested in that region.\n\nDo not say \"the data isn't accurate\" or \"it's too small\"; the core issue is the assumption of linearity failing outside the observed range.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "S1 May 2024 Q6(e) — When computing \"number of teenagers who do NOT play Scrabble\", what's the shortcut formula and why does it save you from a major error?", "answer": "- Step 1: Use $$P(S') = 1 - P(S)$$ — the universal complement rule.\n- Step 2: This is GUARANTEED to include the \"outside all three\" region $$q$$, plus any \"$$G$$ only\" or \"$$C$$ only\" or \"$$C \\cap G$$ only\" pieces that are outside $$S$$.\n- Step 3: If you instead try to sum Venn regions piece-by-piece, it's easy to miss $$q$$ — Phuc's exact error giving 47 instead of 105.\n\nWhen \"not $$A$$\" includes the outside-the-circles region, ALWAYS use $$1 - P(A)$$. It's the safer path.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "In a back-to-back stem-and-leaf diagram where one row reads \"1 1 1 k 7 8\", what does the symbol $$k$$ represent, and what constrains its value?", "answer": "- Step 1: $$k$$ is a **single digit** representing one leaf — NOT a count, NOT a frequency, NOT a sum.\n- Step 2: Because the row represents one stem (say stem 4), the actual value $$k$$ represents is $$40+k$$.\n- Step 3: $$k$$ is constrained by the **ascending order** of leaves: it must lie between the leaf before it (1) and the leaf after it (7), so $$1 \\le k \\le 7$$.\n\nCommon pitfall: writing \"$$k+7$$\" treating $$k$$ as a leaf count instead of a single digit.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "S1 May 2024 Q1(f) — A student concludes $27 \\le a \\le 48$ for the range of $a$. They used the ordering constraint only. What two stricter constraints did they miss? (3 steps)", "answer": "- Step 1: **The max constraint**: $2a \\le 80$ (the new maximum must not exceed the box plot's max of 80). This gives $a \\le 40$, which is stricter than $a \\le 48$.\n- Step 2: **The $Q_1$ constraint**: $a \\ge 36$. If $a < 36$, the new 9th and 10th values would no longer both be 36, so $Q_1$ would change.\n- Step 3: Combining: $36 \\le a \\le 40$. The ordering constraint ($27 \\le a \\le 48$) is necessary but not sufficient — it's a weaker bound that the box-plot constraints tighten.\n\nThe tutor in the Loom made this exact error ($27 \\le a \\le 54$), ignoring both the $Q_1$ and max constraints.", "source": "GLM 5.1 ①", "_id": "glm_1_12"}, {"question": "In Q3(a), what would be wrong with using frequency (20) directly as the bar height instead of frequency density? (Q3a S1 May 2024)", "answer": "- Using frequency directly as height would **misrepresent** the data because classes have different widths.\n- Example: Class $32 \\le x < 36$ has width 4 and frequency 20. Class $30 \\le x < 32$ has width 2 and frequency 16.\n- If you used frequency as height, the narrower class would appear to have less frequency (16 vs 20), even though when you account for width, the density is actually higher (8 vs 5).\n- Frequency density correctly standardizes by width, so area (not height) represents frequency.", "source": "MiniMax ①", "_id": "minimax_1_67"}, {"question": "Why is it wrong to compute the median of grouped data using $$(N+1)/2$$, even though that's the rule for discrete data?", "answer": "- Step 1: For discrete data, the $$+1$$ adjustment positions the median between two specific values (the \"halfway through the integer-counted data\" intuition).\n- Step 2: For grouped continuous data, we're interpolating along a continuous cumulative frequency staircase that climbs from 0 to $$N$$. The midway point of this staircase is at height $$N/2$$, not $$(N+1)/2$$.\n- Step 3: The cumulative frequency at the median should be exactly $$N/2$$ by definition — half the data below, half above — so the equation $$\\text{cum freq}(\\text{median}) = N/2$$ is correct.\n\nUse $$N/2$$ for grouped/continuous, $$(N+1)/2$$ only for raw discrete (and even then Edexcel S1 prefers position-based rules).", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "State the linear-coding rules for expectation and variance, and explain WHY the constant disappears from variance.", "answer": "- Step 1: $$E(aX + b) = aE(X) + b$$; $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$.\n- Step 2: Variance measures spread around the mean — adding a constant $$b$$ shifts every value AND the mean by the same amount, so deviations $$X - \\mu$$ are unchanged. Hence $$+b$$ contributes nothing to spread.\n- Step 3: Multiplying by $$a$$ scales every deviation by $$a$$, hence squared deviations by $$a^2$$ — variance scales by $$a^2$$, not $$a$$.\n\nCommon slip: writing $$\\operatorname{Var}(aX+b) = a\\operatorname{Var}(X) + b$$ — wrong on BOTH counts (missing the square and including b).", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "Why is \"$$y$$ on $$x$$\" regression different from \"$$x$$ on $$y$$\" regression, and when does this distinction matter?", "answer": "- Step 1: \"$$y$$ on $$x$$\" minimises **vertical** residuals (errors in $$y$$), giving gradient $$S_{xy}/S_{xx}$$.\n- Step 2: \"$$x$$ on $$y$$\" minimises **horizontal** residuals (errors in $$x$$), giving gradient $$S_{xy}/S_{yy}$$ — a DIFFERENT line in general.\n- Step 3: The two lines coincide only when $$r = \\pm 1$$ (perfect correlation). Otherwise, they intersect at $$(\\bar{x}, \\bar{y})$$ but have different slopes.\n\nChoose the regression direction based on what you're predicting.", "source": "Opus 4.7 ①", "_id": "opus_1_55"}, {"question": "In a histogram, what does the **area** of each bar represent, and what are the two scale constants you must derive from a reference bar? (2 steps)", "answer": "- Step 1: The **area** of each bar is proportional to the **frequency** of that class. Since area = width × height, and width ∝ class width, it follows that height ∝ frequency density (FD = frequency ÷ class width).\n- Step 2: From a reference bar, derive: (1) the **width scale** — cm per mm of class width = (reference bar width in cm) / (reference class width in mm); (2) the **height scale** — cm per unit FD = (reference bar height in cm) / (reference FD). Apply each scale separately to the target class.\n\nCommon mistake: using frequency directly as height (it must be FD), or multiplying class width by the reference bar width directly instead of computing the per-mm scale first.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "In Q1(f), four values are added to the Maple data, changing $$N$$ from 32 to 36. How does this change the method for locating $$Q_1$$, and why does this matter for finding $$a$$? (2 steps)", "answer": "- Step 1: With $$N = 36$$ (divisible by 4), $$Q_1$$ becomes the **average of the 9th and 10th** values, not a single position. The median becomes the average of the 18th and 19th, and $$Q_3$$ the average of the 27th and 28th.\n- Step 2: This matters because the two new values ($$27$$ and $$a$$) shift original rankings. For $$Q_1$$ to stay at 36, both the 9th and 10th values in the new sorted list must still average to 36. If $$a < 36$$, it would displace one of the original 36s and break that average.", "source": "Kimi K2.6 ②", "_id": "kimi_2_9"}, {"question": "A new data value equal to the current mean is added to the dataset. What happens to (i) the mean and (ii) the standard deviation, and why? (3 steps)", "answer": "- Step 1: (i) The mean is **unchanged**. New mean $= \\frac{n\\bar{x} + \\bar{x}}{n+1} = \\frac{(n+1)\\bar{x}}{n+1} = \\bar{x}$. Adding a value at the mean doesn't shift the balance point.\n- Step 2: (ii) The SD **decreases**. The new value contributes $(\\bar{x} - \\bar{x})^2 = 0$ to the sum of squared deviations, but the denominator $n$ increases to $n+1$. So the average squared deviation (variance) decreases.\n- Step 3: Intuitively: you've added a value right at the center, which makes the data slightly more concentrated. The spread measure shrinks because the \"dilution\" effect of the larger denominator isn't offset by any new deviation.\n\nSaying \"no change\" for SD is wrong — the decrease is small but real.", "source": "GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "When comparing two distributions using medians and IQRs, why is it critical to quote numerical values in your answer?", "answer": "- Step 1: Quoting specific values (e.g., medians 48 and 45) demonstrates precise statistical comparison.\n- Step 2: Without numerical support, the answer becomes vague and fails to meet exam marking criteria.  \n**Key Insight:** A \"1-mark comment\" in exams often requires both a comparison statement and numerical evidence.", "source": "Qwen 3 ②", "_id": "qwen_2_4"}, {"question": "S1 May 2024 — Quick drill: $Y = 3X + 7$, $\\operatorname{Var}(X) = 5$. Find $\\operatorname{Var}(Y)$. (1 step)", "answer": "- Step 1: $\\operatorname{Var}(Y) = 3^2 \\times \\operatorname{Var}(X) = 9 \\times 5 = 45$. The constant $+7$ has no effect on variance.", "source": "GLM 5.1 ①", "_id": "glm_1_62"}, {"question": "S1 May 2024 Q5(c) — Given $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$ with $$T \\sim N(\\mu, \\sigma^2)$$, what's the first quantity to find and how?", "answer": "- Step 1: Find $$\\sigma$$ first. By symmetry of the normal around $$\\mu$$, each tail has probability $$(1 - 0.95)/2 = 0.025$$.\n- Step 2: So $$P(T < \\mu - 10) = 0.025$$. Standardise: $$\\frac{(\\mu - 10) - \\mu}{\\sigma} = -1.96$$, giving $$\\sigma = \\frac{10}{1.96} \\approx 5.102$$.\n- Step 3: Sanity check: $$\\sigma$$ should be of comparable order to the interval half-width (10). $$\\sigma \\approx 5.10$$ is reasonable. $$\\sigma \\approx 0.51$$ is NOT — decimal slip warning.\n\nThe recurring critical error: writing $$\\sigma = 0.510$$ — a factor-of-10 slip.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "S1 May 2024 — Synthesis: You're given a normal distribution question with a conditional probability. Outline the four-step approach that avoids the common traps. (4 steps)", "answer": "- Step 1: **Sketch the curve** and shade the relevant regions. Label the mean and the boundaries mentioned.\n- Step 2: **Find $\\sigma$** (if not given) using any symmetric interval information, and **sanity-check** the magnitude ($\\sigma$ should be same order as interval half-width, not 10× smaller).\n- Step 3: **Identify subset relationships** between the events. If $A \\subset B$, use $P(A \\mid B) = P(A)/P(B)$ directly.\n- Step 4: **Compute each probability separately** using standardisation, then divide. Don't use interval probabilities (like 0.95) where one-tailed probabilities (like 0.975) are needed.\n\nThe three traps are: decimal slip on $\\sigma$, wrong denominator, and missing the subset simplification.", "source": "GLM 5.1 ①", "_id": "glm_1_70"}, {"question": "State the independence condition for two events $$A$$ and $$B$$, and explain how it lets you find an unknown Venn probability.", "answer": "- Step 1: $$A$$ and $$B$$ independent $$\\Leftrightarrow$$ $$P(A \\cap B) = P(A) \\cdot P(B)$$.\n- Step 2: To use this: express $$P(A)$$, $$P(B)$$, $$P(A \\cap B)$$ as sums of Venn regions — at least one of them will contain the unknown $$p$$.\n- Step 3: Solve the resulting equation for $$p$$.\n\nWatch which sums include $$p$$: typically $$P(C)$$ does, because $$p$$ sits in the $$C \\cap G$$-only region (which is inside $$C$$).", "source": "Opus 4.7 ②", "_id": "opus_2_52"}, {"question": "S1 May 2024 Q4(d) — How do you correctly interpret the gradient of a regression line \"in context\"? What are the required ingredients in the sentence? (3 steps)", "answer": "- Step 1: Specify the **unit** of the explanatory variable and the increment (\"for every 1 cm increase in the length of a bear\").\n- Step 2: State the **magnitude AND unit** of the response change (\"the girth increases by approximately 0.722 cm\").\n- Step 3: Use the words \"on average\" or \"is predicted to\" — regression gives a prediction, not a deterministic statement.\n\nAvoid: \"the line slopes up\" (no quantification), \"x increases\" (no context, no units).", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Strategic principle: in the May 2024 paper, the four most expensive errors all involved \"translation slips\" between English phrasing and probability/statistics. Name the four and the translation issue for each.", "answer": "- Step 1: **\"Fastest 60%\"** (Q5b): English → \"lower tail probability 0.60\", not 0.40.\n- Step 2: **\"No change to box plot\"** (Q1f): English → FIVE statistical constraints, not just an ordering constraint.\n- Step 3: **\"Does not play Scrabble\"** (Q6e): English → universal complement $$1 - P(S)$$, including outside-the-circles region.\n- Step 4: **\"$$\\sigma = 10/1.96$$\"** (Q5c): arithmetic → 5.10, not 0.510 (decimal slip).\n\nPattern: slow down on English-to-math translation; sketch a diagram; list constraints explicitly.", "source": "Opus 4.7 ②", "_id": "opus_2_74"}, {"question": "S1 May 2024 Q3(a) — On a histogram, what is \"frequency density\" and why is it the correct quantity for the bar height (not frequency itself)?", "answer": "- Step 1: $$\\text{FD} = \\frac{\\text{frequency}}{\\text{class width}}$$.\n- Step 2: In a histogram, **area** is proportional to frequency. Since area = width × height, if width represents class width, then height must represent frequency-per-unit-width = frequency density.\n- Step 3: If you used raw frequency as height, classes with wider widths would be visually under-represented for their frequency (e.g. a class of width 5 with frequency 10 would look the same as a class of width 2 with frequency 10, despite the densities being very different).\n\nThe area-proportionality is what makes the histogram comparable across unequal classes.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "The computation $\\sigma = 10/1.96$ gives approximately 5.10. A recurring error produced 0.510 instead. What kind of mistake causes this, and how do you guard against it? (2 steps)", "answer": "- Step 1: The error is a **decimal placement slip** — likely dividing by 19.6 instead of 1.96, or misplacing the decimal when computing $10/1.96$. This shifts the answer by one order of magnitude.\n- Step 2: Guard with a **sanity check**: $\\sigma$ should be of the same order of magnitude as the interval half-width. The interval is $\\mu \\pm 10$, so $\\sigma$ should be roughly 5 (since 1.96σ ≈ 10). Getting 0.5 would mean 1.96 × 0.5 ≈ 1, not 10 — clearly wrong. Getting 51 would mean 1.96 × 51 ≈ 100, also wrong.\n\nAlways ask: \"does my $\\sigma$ make the interval $[\\mu - 1.96\\sigma, \\mu + 1.96\\sigma]$ approximately match the given 95% interval?\"", "source": "GLM 5.1 ③", "_id": "glm_3_39"}, {"question": "Given $P(\\mu - 10 < T < \\mu + 10) = 0.95$ for $T \\sim N(\\mu, \\sigma^2)$, how do you find $\\sigma$? Walk through the logic. (3 steps)", "answer": "- Step 1: By symmetry of the normal distribution, the 5% outside the interval splits equally: $P(T < \\mu - 10) = 0.025$ and $P(T > \\mu + 10) = 0.025$.\n- Step 2: Standardise the lower boundary: $P\\left(Z < \\frac{(\\mu - 10) - \\mu}{\\sigma}\\right) = P\\left(Z < \\frac{-10}{\\sigma}\\right) = 0.025$. So $\\frac{-10}{\\sigma} = -1.96$ (from tables: $\\Phi^{-1}(0.025) = -1.96$).\n- Step 3: Solve: $\\sigma = 10/1.96 \\approx 5.102$. **Sanity check**: $\\sigma \\approx 5$ is the same order of magnitude as the half-width 10, which makes sense. If you get $\\sigma \\approx 0.5$, you've made a decimal slip.", "source": "GLM 5.1 ③", "_id": "glm_3_38"}, {"question": "When computing the regression intercept $$a = \\bar{y} - b\\bar{x}$$, what's the precision trap and how do you avoid it?", "answer": "- Step 1: If you round $$b$$ to 3 s.f. BEFORE substituting (e.g. use $$b = 0.722$$ instead of $$0.72184\\ldots$$), the intercept can be wrong at the 3rd s.f. due to error amplification by $$\\bar{x}$$ (often a large number).\n- Step 2: Defence: carry the **unrounded** $$b$$ through to the intercept calculation, then round both at the final step.\n- Step 3: Example: $$b = 0.72184$$, $$\\bar{x} = 182.1$$, $$\\bar{y} = 89.15$$. Using unrounded $$b$$: $$a = 89.15 - 0.72184(182.1) \\approx -42.30$$. Using rounded $$b = 0.722$$: $$a = 89.15 - 0.722(182.1) \\approx -42.32$$ — close but at the rounding edge.\n\nAlways carry full precision, round at the end.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "Why is computing the regression \"line of $$g$$ on $$d$$\" different from computing \"line of $$d$$ on $$g$$\", and which one does the question ask for in Q4(c)?", "answer": "- Step 1: \"Line of $$y$$ on $$x$$\" predicts $$y$$ from $$x$$, minimising vertical (y-direction) residuals — gradient is $$S_{xy}/S_{xx}$$.\n- Step 2: \"Line of $$x$$ on $$y$$\" predicts $$x$$ from $$y$$, minimising horizontal residuals — gradient is $$S_{xy}/S_{yy}$$ (when expressed in form $$x = a' + b'y$$).\n- Step 3: Q4(c) says \"line of $$g$$ on $$d$$\" — divide $$S_{dg}$$ by $$S_{dd}$$. Using $$S_{gg}$$ gives the wrong line.\n\nThe first variable named is the response (predicted) variable; the second is the explanatory variable.", "source": "Opus 4.7 ②", "_id": "opus_2_68"}, {"question": "What is the formula for variance from raw sums that is NOT in the IAL formula booklet, and how do you use it with coded data? (2 steps)", "answer": "- Step 1: $$\\sigma^2 = \\frac{\\sum x^2}{n} - \\bar{x}^2$$ This is equivalent to $\\text{Var}(X) = E(X^2) - [E(X)]^2$ for probability distributions. Compute $\\sum y^2 / n$ and subtract $\\bar{y}^2$ to get $\\text{Var}(y)$.\n- Step 2: For coded data $w = 10y + 20$: $\\text{Var}(w) = 10^2 \\cdot \\text{Var}(y) = 100 \\cdot \\text{Var}(y)$. Then $\\sigma_w = 10 \\cdot \\sigma_y$. The $+20$ has no effect on variance or SD.\n\nCommon error: scaling variance by 10 instead of 100, or adding 20 to the SD.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "Before extracting any numerical values from a stem-and-leaf diagram, what single element should you read first, and what does it tell you about the place value of each leaf? (1 step)", "answer": "Read the **key** first. The key explicitly states what a typical entry represents (e.g. `5 | 6 | 3 means 65 cm for Birch and 63 cm for Maple`), confirming that each leaf is a **single digit** in the units place and clarifying which side corresponds to which data set.", "source": "Kimi K2.6 ①", "_id": "kimi_1_0"}, {"question": "When solving for $a$ and $b$ in a linear transformation $Y = aX - b$ given $E(Y)$ and $\\operatorname{Var}(Y)$, why should you start with the variance equation?", "answer": "- Step 1: The variance equation eliminates $b$ (since $\\operatorname{Var}(aX - b) = a^2\\operatorname{Var}(X)$).\n- Step 2: Solving for $a$ first simplifies finding $b$ using the expectation equation.  \n**Key Insight:** Variance is unaffected by the constant term in linear transformations, making it the logical starting point.", "source": "Qwen 3 ②", "_id": "qwen_2_8"}, {"question": "When using independence $$P(C \\cap S) = P(C) \\cdot P(S)$$ to find an unknown Venn probability, why must you list $$P(C), P(S), P(C \\cap S)$$ as separate explicit sums BEFORE substituting?", "answer": "- Step 1: Writing them as sums forces you to look at EVERY region in each set, reducing the chance of omitting a subregion (especially the triple overlap).\n- Step 2: It also makes the algebra transparent: you can see exactly which region $$p$$ sits in.\n- Step 3: Example: $$P(C) = 0.04 + p + 0.15 + 0.12 = 0.31 + p$$ shows the dependence on $$p$$; collapsing this to one symbol $$P(C)$$ hides the structure.\n\nThe discipline of listing prevents the silent omission of a Venn subregion.", "source": "Opus 4.7 ②", "_id": "opus_2_67"}, {"question": "S1 May 2024 Q3(b) — What is the linear interpolation formula for the median of grouped data, and what does each symbol represent? (2 steps)", "answer": "- Step 1: $$\\text{Median} = L + \\frac{N/2 - F_b}{f_m} \\times c$$ where $L$ = lower class boundary of the median class, $F_b$ = cumulative frequency before the median class, $f_m$ = frequency of the median class, $c$ = class width of the median class.\n- Step 2: The intuition: you've already passed $F_b$ observations, and you need to go $\\frac{N/2 - F_b}{f_m}$ of the way through the median class (a fraction between 0 and 1), then multiply by the class width $c$ to convert from \"fraction of observations\" to \"actual units.\"\n\nThis formula is NOT in the booklet — memorise it. Key detail: use the **lower class boundary** $L$ (e.g., 32, not 31.5 or the midpoint).", "source": "GLM 5.1 ①", "_id": "glm_1_24"}, {"question": "Mini-exercise: if $$Y = 3X + 5$$ and $$\\operatorname{Var}(X) = 4$$, what is $$\\operatorname{Var}(Y)$$? What's the most common slip?", "answer": "- Step 1: $$\\operatorname{Var}(Y) = 3^2 \\operatorname{Var}(X) = 9 \\cdot 4 = 36$$.\n- Step 2: Common slip 1: writing $$\\operatorname{Var}(Y) = 3 \\cdot 4 = 12$$ (forgot to square the coefficient).\n- Step 3: Common slip 2: including the $$+5$$: $$3 \\cdot 4 + 5 = 17$$ or $$9 \\cdot 4 + 5 = 41$$ (constants don't affect variance).\n\nJust $$a^2 \\operatorname{Var}(X)$$ — square the multiplier, ignore the additive constant.", "source": "Opus 4.7 ②", "_id": "opus_2_73"}, {"question": "A student multiplied the target class width (2 mm) by the reference bar width (2.5 cm) to get 5 cm for the new bar width. Why is this wrong, and what should they have done? (2 steps)", "answer": "- Step 1: This treats the bar width as directly proportional to class width with scale factor = reference bar width (2.5 cm). But the scale factor is 2.5 cm per 4 mm of class width = 0.625 cm/mm. You must divide the reference bar width by the reference class width first.\n- Step 2: Correct: new bar width = 2 mm × 0.625 cm/mm = 1.25 cm. The student's answer of 5 cm would be correct only if the reference class width were 1 mm (which it isn't — it's 4 mm).\n\nAlways compute the per-unit scale constant first, then multiply.", "source": "GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "In a \"Sam wins\" game where Sam's score must be strictly higher than Alex's, why is the inequality strict, and what's the sanity check?", "answer": "- Step 1: \"The person with the **higher** score wins. If the scores are the **same** it is a draw.\" → use $$P(S > R)$$, strict.\n- Step 2: Sanity check: $$P(\\text{Sam wins}) + P(\\text{Alex wins}) + P(\\text{draw}) = 1$$. If you used $$\\ge$$ instead of $$>$$, you'd double-count the draws.\n\nPitfall: using $$\\ge$$ would conflate the draw event with Sam winning.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "S1 May 2024 Q4(e)(ii) — What technical word should appear in the answer when an estimate from a regression line is unreliable because the predictor value is outside the observed data range?", "answer": "- Step 1: The word is **extrapolation**.\n- Step 2: Full answer template: \"The value $$x = c$$ is outside the range of observed data, so the relationship may not hold there — extrapolation is unreliable.\"\n- Step 3: Contrast: **interpolation** (within the data range) is reliable.\n\nVague phrasings like \"the data isn't accurate\" miss the mark — name the issue.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "What's the dimensional sanity check for the gradient $$b$$ of a regression line where the units of $$x$$ and $$y$$ are both cm?", "answer": "- Step 1: $$b$$ has units of $$y$$-units per $$x$$-unit, i.e. cm per cm = dimensionless ratio.\n- Step 2: A value like $$b = 0.722$$ means: per 1 cm of $$x$$, $$y$$ changes by 0.722 cm. Plausible for a positive linear relationship.\n- Step 3: If you'd gotten $$b = 72.2$$, sanity check: that would mean girth increases by 72 cm per 1 cm of length — implausible.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "If two random variables $$S$$ and $$R$$ come from two SEPARATE spins of the same spinner, how do you compute $$P(S>R)$$, and why is this different from a transformed version of a single spin? (3 steps)", "answer": "- Step 1: Two separate spins → $$S$$ and $$R$$ are **independent**. So $$P(S=s, R=r) = P(S=s)P(R=r)$$.\n- Step 2: Condition on $$S$$ and sum: $$P(S>R) = \\sum_s P(S=s) \\cdot P(R<s)$$. For each value of $$S$$, find all $$R$$-values strictly below it.\n- Step 3: This is fundamentally different from $$Y = 2X - 3$$ (a deterministic transform of ONE outcome), where $$X$$ and $$Y$$ are perfectly dependent.\n\nTrap: enumerating $$P(X=x \\text{ and } Y=y)$$ as if they came from the same spin — gives the wrong answer.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "S1 May 2024 Q6(d)(i) — What does the event $$(C \\cup S) \\cap G'$$ represent in words, and which Venn regions does it contain? (2 steps)", "answer": "- Step 1: In words: \"plays Chess **or** Scrabble, but **not** Go\". This is the part of the union of $$C$$ and $$S$$ that lies outside circle $$G$$.\n- Step 2: The regions are: $$C$$-only, $$S$$-only, and $$C \\cap S$$-only (the overlap of $$C$$ and $$S$$ excluding $$G$$). Sum their probabilities: $$0.04 + 0.23 + 0.12 = 0.39$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_48"}, {"question": "Why should you sketch a normal curve and shade the relevant region before doing any algebra in a normal distribution question? Give the specific example from Q5(b). (2 steps)", "answer": "- Step 1: Sketching forces you to decide which tail you're dealing with before you commit to an equation. Without a sketch, it's easy to autopilot into $P(X > t) = 0.60$ when you actually need $P(X < t) = 0.60$.\n- Step 2: In Q5(b), \"fastest 60%\" means the shortest 60% of times. On the sketch, this is the shaded area on the LEFT (lower tail). Without sketching, both the student and the tutor set up $P(X < t) = 0.40$ (upper tail), getting $t = 14.49$ instead of the correct 15.5.\n\nThe sketch is a 10-second investment that prevents the single most expensive error type on this paper.", "source": "GLM 5.1 ③", "_id": "glm_3_51"}, {"question": "S1 May 2024 Q5(c) — The calculation $\\sigma = 10/1.96$ gives approximately 5.10. Phuc wrote 0.510. What sanity check catches this decimal slip? (2 steps)", "answer": "- Step 1: Compare $\\sigma$ to the interval half-width. The interval is $\\mu \\pm 10$, so the half-width is 10. For a 95% interval, $\\sigma$ should be roughly half-width ÷ 2 ≈ 5. A value of 0.51 would mean the 95% interval spans $\\pm 20\\sigma$, which is far too wide for a normal distribution (95% falls within $\\pm 2\\sigma$).\n- Step 2: The rule of thumb: for a 95% symmetric interval of half-width $h$, $\\sigma \\approx h/2$. Here $10/2 = 5$, confirming $\\sigma \\approx 5.10$, not 0.51.\n\nThis sanity check takes 5 seconds and catches a factor-of-10 error that cost marks.", "source": "GLM 5.1 ①", "_id": "glm_1_42"}, {"question": "When summing point probabilities for $$P(X > c)$$, what's the most common slip and how do you avoid it?", "answer": "- Step 1: The slip: including $$X = c$$ in the sum. The inequality is strict ($$>$$), so $$X = c$$ is excluded.\n- Step 2: Defence: rewrite the qualifying set explicitly on paper — e.g. \"$$X > 4$$ means $$X \\in \\{5, 7, 8\\}$$\" — before summing.\n- Step 3: For $$\\ge$$ you'd include $$X = c$$; for $$>$$ you don't. Read the sign carefully.\n\nThe trigger: any inequality on a discrete RV — pause, list the qualifying values, then sum.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "What's the layout strategy for a Q2(d)-style \"Sam wins\" problem where you condition on $$S$$?", "answer": "- Step 1: TABULATE both distributions ($$S$$ and $$R$$) side-by-side, including all values and probabilities.\n- Step 2: For each value of $$S$$, identify all $$R$$-values strictly less than $$S$$, sum $$P(R < S)$$, multiply by $$P(S)$$.\n- Step 3: Sum the 5 row-products to get $$P(S > R)$$.\n\nWhy a table: it makes systematic errors (missing an $$R$$-value, double-counting) visible.", "source": "Opus 4.7 ①", "_id": "opus_1_63"}, {"question": "S1 May 2024 Q4(f) — When a question asks for the increase in $x$ required to cause a specific increase in $y$ using a regression line, what part of the equation do you use, and why? (2 steps)", "answer": "- Step 1: Use only the **gradient** $b$. The relationship for increments is $$\\Delta y = b \\cdot \\Delta x$$.\n- Step 2: The intercept $a$ is a baseline constant that cancels out when you subtract two $y$ values ($$y_2 - y_1 = (a + bx_2) - (a + bx_1) = b(x_2 - x_1)$$).\n\nA common pitfall is setting the entire regression equation equal to the increment (e.g., $$-42.3 + 0.722x = 17.3$$), which treats the increment as an absolute $y$-value rather than a change in $y$.", "source": "GLM 5.1 ②", "_id": "glm_2_30"}, {"question": "S1 May 2024 Q2(d) — In a game where Sam spins $X_1$ and Alex spins $X_2$ (from the same distribution), why must you treat their scores as independent, and how does this affect the probability calculation? (2 steps)", "answer": "- Step 1: They are independent because they are **two separate spins**; the outcome of one spin does not affect the other.\n- Step 2: Independence means you can multiply their probabilities: $$P(S=s \\text{ and } R=r) = P(S=s) \\times P(R=r)$$.\n\nA common pitfall is assuming the scores come from the same single spin, leading to only 5 possible joint outcomes instead of the required 25.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "In a stem-and-leaf diagram, a leaf position is occupied by the letter $k$ (e.g., the leaves in a row read $1, 1, 1, k, 7, 8$). What is $k$, and what constraint must it satisfy based on the structure of the diagram? (2 steps)", "answer": "- Step 1: $k$ is a **single digit** (0–9) representing one leaf in that row. It is NOT a frequency, NOT a count, and NOT a sum. The value it represents is $\\text{stem} \\times 10 + k$ (or whatever the key specifies).\n- Step 2: Because leaves must be listed in ascending order, $k$ must satisfy: the leaf before it $\\le k \\le$ the leaf after it. Here, $1 \\le k \\le 7$, so $k \\in \\{1, 2, 3, 4, 5, 6, 7\\}$.\n\nTreating $k$ as a sum (e.g., \"$k+7$\") or a frequency is the classic misinterpretation.", "source": "GLM 5.1 ③", "_id": "glm_3_2"}, {"question": "In a 3-set Venn diagram, how do you set up an equation to find an unknown probability $$q$$ in the \"outside all three\" region?", "answer": "- Step 1: All 8 regions of a 3-set Venn (including \"outside\") must sum to 1.\n- Step 2: Sum the 7 known regions plus $$q$$, set equal to 1, solve for $$q$$.\n- Step 3: Don't forget regions whose value is 0 (e.g. \"G only = 0\" still counts as a region in the sum).", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "S1 May 2024 Q5(c) — After identifying the subset relationship, what are the exact numerator and denominator probabilities you need, and how do you obtain the denominator without further standardisation? (3 steps)", "answer": "- Step 1: **Numerator:** $$P(T > \\mu - 5)$$. Standardise:\n$$P\\!\\left(Z > \\frac{-5}{5.102}\\right) = P(Z > -0.98) = P(Z < 0.98) = 0.8365.$$\n- Step 2: **Denominator:** $$P(T > \\mu - 10)$$. From the given information, we already know $$P(T < \\mu - 10) = 0.025$$, so\n$$P(T > \\mu - 10) = 1 - 0.025 = 0.975.$$\n- Step 3: The ratio is $$0.8365 / 0.975$$. The common error is using $$0.95$$ as the denominator, which is the full central probability, not the lower-tail complement.", "source": "Kimi K2.6 ①", "_id": "kimi_1_44"}, {"question": "Q4(d) asks for an interpretation of the gradient. What is the precise sentence structure required, and why is \"the line slopes up\" insufficient? (1 step)", "answer": "- Step 1: The required structure is: \"For every **1 cm increase** in the length of a bear, the girth increases by approximately **0.722 cm** on average.\" You must state the **units** of both variables and the **incremental change** (1 unit of $$x$$). \"The line slopes up\" is insufficient because it contains no numerical rate, no units, and no context.", "source": "Kimi K2.6 ②", "_id": "kimi_2_30"}, {"question": "S1 May 2024 Q5(b) — The question asks for the longest time taken by the \"fastest 60%\" of adults. Which tail of the normal distribution does this correspond to, and why is sketching the curve essential? (3 steps)", "answer": "- Step 1: \"Fastest\" means **shortest time**. The fastest 60% occupy the **lower (left) tail** of the distribution, so you require $$P(X < t) = 0.60$$.\n- Step 2: Sketch the bell curve, mark the mean, and shade the leftmost 60%. This visual check prevents the common error of using the upper tail ($$P(X > t) = 0.60$$), which would represent the slowest 40%.\n- Step 3: Only after shading do you look up the inverse normal value $$\\Phi^{-1}(0.60) = 0.2533$$ and solve for $$t$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_39"}, {"question": "Why does adding a value larger than the current mean SHIFT the mean, while adding a value equal to the mean does NOT shift it?", "answer": "- Step 1: New mean = $$\\frac{n\\bar{x} + x_{\\text{new}}}{n+1}$$.\n- Step 2: If $$x_{\\text{new}} = \\bar{x}$$: numerator = $$n\\bar{x} + \\bar{x} = (n+1)\\bar{x}$$, so new mean = $$\\bar{x}$$ (no change).\n- Step 3: If $$x_{\\text{new}} > \\bar{x}$$: numerator $$> (n+1)\\bar{x}$$, so new mean $$> \\bar{x}$$ (shifts upward). Magnitude of shift: $$\\frac{x_{\\text{new}} - \\bar{x}}{n+1}$$.\n\nThe shift size decreases as $$n$$ grows — large samples are robust.", "source": "Opus 4.7 ②", "_id": "opus_2_62"}, {"question": "For a back-to-back stem-and-leaf where you know the median of one side equals a given value, what's the strategy to set up an equation for the unknown leaf $$k$$? (3 steps)", "answer": "- Step 1: Find $$N$$ for that side and identify the median position — if $$N$$ even, median = $$\\tfrac{1}{2}(x_{N/2} + x_{N/2+1})$$.\n- Step 2: Use **cumulative frequencies** of the stems to locate which two ordered values are the median pair. Write each as a stem-value-plus-leaf expression (e.g. $$40+k$$ and $$47$$).\n- Step 3: Set $$\\tfrac{(40+k)+47}{2} = \\text{given median}$$ and solve.\n\nInsight: cumulative frequencies are the fast way to \"jump\" to the $$N/2$$-th value without counting leaves one by one.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "In a game, Sam spins once (score $S = X_1$) and Alex spins once (score $R = 2X_2 - 3$). Why are $S$ and $R$ independent, and what does this mean for computing $P(S > R)$? (2 steps)", "answer": "- Step 1: $S$ and $R$ are based on **two separate spins** ($X_1$ and $X_2$). Since each spin is independent, the random variables $S$ and $R$ are independent. This means $P(S = s \\text{ and } R = r) = P(S = s) \\times P(R = r)$.\n- Step 2: To compute $P(S > R)$: for each value of $S$, find $P(R < S)$ by summing probabilities of all $R$-values below $S$, then multiply by $P(S = s)$ and sum over all $s$.\n\nThe common mistake: treating $S$ and $R$ as if they come from the same spin (making them dependent). They don't — two spins, two independent outcomes.", "source": "GLM 5.1 ③", "_id": "glm_3_18"}, {"question": "When reading cumulative frequencies from a stem-and-leaf diagram to locate the $k$-th value, what is the efficient method? (2 steps)", "answer": "- Step 1: Compute cumulative frequencies for each stem row by adding the number of leaves in that row to the running total. For Maple: stem 2 has 5 leaves (cum = 5), stem 3 has 7 leaves (cum = 12), stem 4 has 6 leaves (cum = 18), etc.\n- Step 2: To find the $k$-th value, identify which stem row contains position $k$ (e.g., position 16 and 17 both fall in stem 4, which covers positions 13–18). Then count within that row's leaves to find the exact value.\n\nThis avoids listing all 32 or 35 values individually — use cumulative stem totals to jump to the right row quickly.", "source": "GLM 5.1 ③", "_id": "glm_3_72"}, {"question": "S1 May 2024 Q6(e) — When asked to find the number of people who do NOT do something (e.g., \"do not play Scrabble\"), what is the safest shortcut to avoid missing regions? (2 steps)", "answer": "- Step 1: Calculate the probability of the event happening (e.g., $$P(S) = 0.60$$).\n- Step 2: Use the complement: $$P(S') = 1 - P(S)$$. Multiply this by the total population.\n\nThe common pitfall is trying to manually sum the \"not S\" regions from the Venn diagram and forgetting the outside region ($q$) or the \"G only\" region. The complement rule guarantees you include everything outside the circle.", "source": "GLM 5.1 ②", "_id": "glm_2_39"}, {"question": "S1 May 2024 Q6(e) — A youth club has 76 teenagers who play Chess and Go. How do you estimate the total number of teenagers, and what's the formula? (3 steps)", "answer": "- Step 1: Compute $$P(C \\cap G)$$ from the Venn diagram. INCLUDE both subregions: \"$$C \\cap G$$ only\" ($$= p$$) AND the triple overlap ($$= 0.15$$).\n- Step 2: $$P(C \\cap G) = p + 0.15$$. After finding $$p = 0.14$$ from independence: $$P(C \\cap G) = 0.29$$.\n- Step 3: Total = $$\\frac{\\text{observed count}}{\\text{probability}} = \\frac{76}{0.29} \\approx 262$$.\n\nIf you use only the triple overlap (0.15) or only the \"$$C \\cap G$$ only\" region ($$p$$), you'll get the wrong total.", "source": "Opus 4.7 ②", "_id": "opus_2_54"}, {"question": "When deriving $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$ from first principles, what's the algebraic step? (3 steps)", "answer": "- Step 1: Start with the definition: $$\\operatorname{Var}(X) = E[(X - \\mu)^2]$$ where $$\\mu = E(X)$$.\n- Step 2: Expand the square inside: $$(X - \\mu)^2 = X^2 - 2\\mu X + \\mu^2$$.\n- Step 3: Apply linearity of $$E$$: $$E[X^2] - 2\\mu E[X] + \\mu^2 = E[X^2] - 2\\mu^2 + \\mu^2 = E[X^2] - \\mu^2$$.\n\nThis is why \"$$E$$ of the square minus the square of $$E$$\" works — it's just $$E$$-linearity applied to a perfect square.", "source": "Opus 4.7 ②", "_id": "opus_2_70"}, {"question": "In a normal distribution question, \"the fastest 60% of adults\" are selected for round two. Does \"fastest\" correspond to the upper tail or the lower tail of the time distribution? Why? (2 steps)", "answer": "- Step 1: \"Fastest\" means **shortest time**. People who complete the task quickly have low times. So the fastest 60% are the 60% with the smallest $X$-values — this is the **lower tail**.\n- Step 2: Therefore $P(X < t) = 0.60$, and you look up $\\Phi^{-1}(0.60) = 0.2533$ (positive). The common error is interpreting \"fastest\" as \"best\" and mistakenly using the upper tail $P(X > t) = 0.60$, which gives $t \\approx 14.5$ instead of the correct $t \\approx 15.5$.\n\n**Always sketch the normal curve and shade the relevant region before computing.** Label \"fast = short time = lower tail.\"", "source": "GLM 5.1 ③", "_id": "glm_3_36"}, {"question": "What's the linear interpolation formula for the median of grouped data, and which value of \"position\" do you use? (2 steps)", "answer": "- Step 1: $$\\text{Median} = L + \\dfrac{N/2 - F_b}{f_m} \\times c$$\n+ $$L$$ = lower class boundary of the median class\n+ $$F_b$$ = cumulative frequency BEFORE the median class\n+ $$f_m$$ = frequency of the median class\n+ $$c$$ = width of the median class\n- Step 2: For grouped CONTINUOUS data, use $$N/2$$ (not $$(N+1)/2$$). The $$(N+1)/2$$ rule is for ungrouped discrete data.\n\nNot in the formula booklet — memorise it.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "To find $P(C \\cap G')$ from a Venn diagram, which regions do you sum, and what is the key principle? (2 steps)", "answer": "- Step 1: $C \\cap G'$ means \"in $C$ but NOT in $G$.\" You sum all regions inside circle $C$ that lie **outside** circle $G$: $P(C\\text{ only}) + P(C \\cap S\\text{ only, not }G)$.\n- Step 2: Key principle: do NOT include any region that touches $G$. The regions $C \\cap G$ only and $C \\cap S \\cap G$ are inside $G$, so they are excluded. Only the $C$-pieces outside $G$ count.\n\nDo NOT use $P(C) \\times P(G')$ unless $C$ and $G$ are independent — which may not be given.", "source": "GLM 5.1 ③", "_id": "glm_3_44"}, {"question": "S1 May 2024 Q3(a) — When given the physical dimensions of one histogram bar (a reference bar), what two scale constants must you derive before finding the dimensions of any other bar? (3 steps)", "answer": "- Step 1: Derive the **width scale**: (Reference bar physical width) $\\div$ (Reference class width). This gives cm per mm of class width.\n- Step 2: Derive the **height scale**: (Reference bar physical height) $\\div$ (Reference FD). This gives cm per unit of frequency density.\n- Step 3: Apply these constants to the new class: New physical width = New class width $\\times$ width scale; New physical height = New FD $\\times$ height scale.\n\nDo not just multiply the reference bar's width by the ratio of frequencies; you must scale width and height separately based on their respective properties.", "source": "GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "What's the general structure of the \"two events sum to a known interval\" trick in normal distribution problems (Q5c-style)?", "answer": "- Step 1: Given $$P(\\mu - k < T < \\mu + k) = p$$, symmetry gives $$P(T < \\mu - k) = P(T > \\mu + k) = (1-p)/2$$.\n- Step 2: Standardise the boundary: $$\\dfrac{\\pm k}{\\sigma} = \\pm \\Phi^{-1}(\\text{tail prob})$$, giving $$\\sigma$$.\n- Step 3: Once $$\\sigma$$ is known, any further probability about $$T$$ standardises in the usual way.\n\nKey insight: the symmetric interval gives you ONE piece of information ($$\\sigma$$), even though it looks like a two-sided constraint.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "In the conditional probability $P(T > \\mu - 5 \\mid T > \\mu - 10)$, the denominator is $P(T > \\mu - 10)$. A student uses 0.95 (from the given interval). Why is 0.975 correct instead? (2 steps)", "answer": "- Step 1: $P(\\mu - 10 < T < \\mu + 10) = 0.95$. This is the probability of being **inside** the interval. But $P(T > \\mu - 10)$ includes everything above $\\mu - 10$ — both the 95% inside the interval AND the 2.5% in the upper tail.\n- Step 2: $P(T > \\mu - 10) = 0.95 + 0.025 = 0.975$. Alternatively, $P(T > \\mu - 10) = 1 - P(T < \\mu - 10) = 1 - 0.025 = 0.975$.\n\nUsing 0.95 as the denominator would give a larger final answer — wrong because it omits the upper-tail probability.", "source": "GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "When standardising to find $P(X < 18)$ for $X \\sim N(15, 4)$, what is the correct standardisation formula, and what is a common error? (2 steps)", "answer": "- Step 1: $$Z = \\frac{X - \\mu}{\\sigma} = \\frac{18 - 15}{2} = 1.5$$ Then $P(X < 18) = P(Z < 1.5) = \\Phi(1.5) = 0.9332$.\n- Step 2: Common error: dividing by $\\sigma^2$ instead of $\\sigma$ (i.e., computing $(18-15)/4 = 0.75$). Another: using the wrong tail — computing $P(Z > 1.5) = 0.0668$ when you need $P(Z < 1.5)$.\n\nThe formula divides by $\\sigma$ (the SD), not $\\sigma^2$ (the variance). If given $N(\\mu, \\sigma^2)$, extract $\\sigma$ first.", "source": "GLM 5.1 ③", "_id": "glm_3_37"}, {"question": "In the linear-interpolation median formula, why is it crucial to use the lower class BOUNDARY rather than the lower limit (e.g. 32 not 31.5)?", "answer": "- Step 1: The boundary is where the class actually starts on the continuous $$x$$-axis. For a class written as $$32 \\le x < 36$$, the boundary is 32 (the inequality is non-strict at 32).\n- Step 2: For classes given to the nearest cm like \"30–32\" you may need to use the rounded-out boundary 29.5 to 32.5; check the question's notation carefully.\n- Step 3: Using the wrong boundary shifts the interpolated value by 0.5 or more — small but enough to lose accuracy marks.\n\nAlways look at the inequality sign in the class definition.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "Why does adding a constant $b$ (as in $w = ay + b$) have no effect on the standard deviation? Give both a formula reason and an intuitive reason. (2 steps)", "answer": "- Step 1: Formula: $\\text{Var}(aX + b) = a^2\\text{Var}(X)$. The $b$ doesn't appear because $\\text{Var}(X + b) = E[(X+b)^2] - [E(X+b)]^2 = E[X^2 + 2bX + b^2] - [E(X) + b]^2 = E(X^2) + 2bE(X) + b^2 - [E(X)]^2 - 2bE(X) - b^2 = \\text{Var}(X)$.\n- Step 2: Intuition: adding a constant shifts every data point by the same amount. Since SD measures **spread** (distances between values), and shifting doesn't change any distances, SD is unchanged. Only multiplying by $a$ stretches/compresses the spread.\n\nThink: if everyone gets a 20-gram bonus, the pebbles' weight spread is unchanged.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "When computing $P(\\text{Sam wins})$ where Sam wins if $S > R$, why must you tabulate the $R$ distribution first (from $R = 2X_2 - 3$) before doing any probability calculations? (2 steps)", "answer": "- Step 1: You need to know what values $R$ can take and their probabilities. $R = 2X_2 - 3$ transforms each $X_2$ value: $X_2 = 2 \\Rightarrow R = 1$, $X_2 = 4 \\Rightarrow R = 5$, etc. The probabilities carry over: $P(R = 1) = P(X_2 = 2) = 0.25$.\n- Step 2: Without this table, you can't determine which $R$-values are less than each $S$-value. For example, when $S = 7$, you need to know that $R$ can be 1 or 5 (both $< 7$), so $P(R < 7) = 0.25 + 0.30 = 0.55$.\n\nBuild the $R$-table first; then for each $S$, sum the qualifying $P(R)$ values.", "source": "GLM 5.1 ③", "_id": "glm_3_19"}, {"question": "In a histogram question, you're given the dimensions of one reference bar and asked for the dimensions of another. What is the two-constant method, and why is it safer than direct proportion? (3 steps)", "answer": "- Step 1: Compute the **width scale constant**: cm per mm of class width $= \\frac{\\text{reference bar width (cm)}}{\\text{reference class width (mm)}}$. For the given data: $2.5/4 = 0.625$ cm/mm.\n- Step 2: Compute the **height scale constant**: cm per unit of frequency density $= \\frac{\\text{reference bar height (cm)}}{\\text{reference FD}}$. For the given data: $7.5/5 = 1.5$ cm per unit FD.\n- Step 3: Apply each constant to the target class separately. This is safer than \"direct proportion\" because the two dimensions scale differently — width depends on class width, height depends on FD. Trying to scale both at once leads to errors like multiplying class width by the reference bar width.\n\nTwo constants, two independent calculations, two correct answers.", "source": "GLM 5.1 ③", "_id": "glm_3_53"}, {"question": "When showing the outlier calculation for \"show that there is only one outlier\", what specific working must appear on the page to secure method marks? (3 steps)", "answer": "- Step 1: Write IQR explicitly: $$\\text{IQR} = Q_3 - Q_1$$ with the numerical subtraction shown.\n- Step 2: Write $$1.5 \\times \\text{IQR}$$ as a separate line — markers award a method mark for this intermediate.\n- Step 3: Write BOTH fences (lower and upper) even if no low outliers exist, then scan the dataset and explicitly state which values exceed each fence.\n\nDon't just write \"85 is an outlier\" — show the fence values 12 and 84, then say \"only 85 > 84\".", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "Under the coding $$w = 10y + 20$$, how do the standard deviation and variance of $$w$$ relate to those of $$y$$?", "answer": "- Step 1: $$\\operatorname{Var}(w) = 10^2 \\operatorname{Var}(y) = 100 \\operatorname{Var}(y)$$. The constant +20 drops out.\n- Step 2: $$\\sigma_w = 10 \\sigma_y$$ — the multiplicative coefficient passes through SD without squaring (since SD = $$\\sqrt{\\text{Var}}$$).\n- Step 3: Slip: scaling variance by 10 instead of 100. Always remember variance carries $$a^2$$, SD carries $$|a|$$.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "S1 May 2024 Q2(d) — Since Sam and Alex use **different independent spins**, how do you combine probabilities when conditioning on Sam's score $$S=s$$? (2 steps)", "answer": "- Step 1: Exploit **independence**: for a fixed $$S=s$$, the probability that Sam wins with that score is $$P(S=s) \\times P(R < s)$$, because the outcome of Alex's spin is unaffected by Sam's.\n- Step 2: Sum these products over all possible values of $$s$$:\n$$P(\\text{Sam wins}) = \\sum_{s} P(S=s)\\,P(R < s).$$\nDo not attempt to construct a joint distribution from a single spin; the two spins are separate random variables.", "source": "Kimi K2.6 ①", "_id": "kimi_1_21"}, {"question": "S1 May 2024 — Tactical: The weakness analysis identifies \"translation errors\" between English and statistics as the main source of lost marks. List the three key translation traps from this paper and the one-sentence fix for each. (3 steps)", "answer": "- Step 1: **\"Fastest 60%\"** → translates to the **lower** tail ($P(X < t) = 0.60$), not the upper tail. Fix: sketch the curve, shade the short-time end, label \"fast = left.\"\n- Step 2: **\"No change to the box plot\"** → translates to **five separate constraints** (min, $Q_1$, median, $Q_3$, max), not just the ordering constraint. Fix: list all five and check each.\n- Step 3: **\"Does not play Scrabble\"** → translates to the **entire complement** $P(S') = 1 - P(S)$, including the outside region. Fix: always use $1 - P(A)$ for complements, never add up regions manually.\n\nEvery \"redo\" flag in this paper traces back to a translation slip, not a computation error.", "source": "GLM 5.1 ①", "_id": "glm_1_58"}, {"question": "For Venn diagram probability questions, what does \"the probability that a teenager plays Chess but does NOT play Go\" $$P(C \\cap G')$$ translate to in Venn pieces?", "answer": "- Step 1: $$P(C \\cap G')$$ = all regions of $$C$$ that lie OUTSIDE $$G$$.\n- Step 2: In a 3-set Venn, this is: \"C only\" + \"C∩S only (not G)\". Exclude any region containing $$G$$ (i.e. the \"C∩G only\" region $$p$$ AND the triple-overlap).\n- Step 3: Do NOT use $$P(C) \\cdot P(G')$$ — that's the independence formula, only valid if $$C$$ and $$G$$ are independent (not stated in part (a)).", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "S1 May 2024 — Conceptual: In a three-circle Venn diagram with events $A$, $B$, $C$, the intersection $A \\cap B$ consists of two regions. Name them and explain why both must be included. (2 steps)", "answer": "- Step 1: $A \\cap B$ consists of: (1) the triple-overlap $A \\cap B \\cap C$, and (2) the $A \\cap B$ only region (inside both $A$ and $B$ but outside $C$).\n- Step 2: Both must be included because $A \\cap B$ means \"in $A$ AND in $B$\" — it says nothing about $C$. An element in the triple overlap is certainly in both $A$ and $B$, and so is an element in the pairwise-only region. The condition doesn't exclude either.\n\nThis is the root cause of errors in Q6(b) and Q6(d)(ii): students see \"A and B\" and only think of one region instead of both.", "source": "GLM 5.1 ①", "_id": "glm_1_56"}, {"question": "For $$Y = aX+b$$, what's the formula for $$\\operatorname{Var}(Y)$$, and what's the classic sign-related slip?", "answer": "- Step 1: $$\\operatorname{Var}(aX+b) = a^2\\operatorname{Var}(X)$$. The constant $$b$$ has NO effect on variance (shifting doesn't change spread).\n- Step 2: Classic slip: writing $$\\operatorname{Var}(Y) = a\\operatorname{Var}(X)$$ — forgetting the SQUARE on $$a$$.\n- Step 3: Also, when $$a$$ is negative, $$a^2$$ is still positive — variance can never be negative, so sign of $$a$$ doesn't matter for variance.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "State the PMCC formula and the range of values $$r$$ can take. What's the geometric/statistical meaning of $$r$$ being close to 1?", "answer": "- Step 1: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$$. Range: $$-1 \\le r \\le 1$$.\n- Step 2: $$r \\approx 1$$: points lie close to a line with positive gradient (strong positive linear relationship).\n- Step 3: $$r \\approx -1$$: close to a line with negative gradient. $$r \\approx 0$$: no linear relationship (but possibly a non-linear one).\n\nSanity check ANY computed $$r$$: it must be in $$[-1, 1]$$. If you get 1.05, you've made an arithmetic slip.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "S1 May 2024 Q4(f) — \"for every $$x$$ cm increase in length there is a 17.3 cm increase in girth, find $$x$$\" — what's the trick that distinguishes this from \"find $$d$$ when $$g = 17.3$$\"?", "answer": "- Step 1: 17.3 is an **increment** in $$g$$, not a value of $$g$$. Increments propagate through the gradient only — the intercept does not enter.\n- Step 2: Equation: $$0.722 x = 17.3$$, NOT $$-42.3 + 0.722 x = 17.3$$.\n- Step 3: Solve $$x = 17.3 / 0.722 \\approx 24.0$$.\n\nTrigger phrase: \"increase of $$\\Delta y$$\" → use $$\\Delta y = b \\Delta x$$ only.", "source": "Opus 4.7 ①", "_id": "opus_1_34"}, {"question": "S1 May 2024 Q2(d) — Sam scores $$S = X_1$$ and Alex scores $$R = 2X_2 - 3$$ from separate spins. What's the trigger that tells you to treat $$S$$ and $$R$$ as INDEPENDENT, and why does this matter for the calculation?", "answer": "- Step 1: Trigger: \"Sam spins, Alex spins\" — two **separate** spins of the spinner produce two **independent** outcomes $$X_1, X_2$$.\n- Step 2: Independence means $$P(S=s, R=r) = P(S=s) \\cdot P(R=r)$$ — multiply marginals, no conditioning.\n- Step 3: If you mistakenly treat them as a single spin (so $$X_1 = X_2$$), you'd enumerate diagonal pairs only — completely wrong distribution.\n\nThe give-away phrase is \"each spin the spinner once\" — two physical events, two independent random variables.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "In a \"no change to box plot, find range of $$a$$\" question, the answer's strictest endpoints often come from which TWO constraints, not from the ordering?", "answer": "- Step 1: The **max** constraint: any new value (e.g. $$2a$$) must not exceed the current max, otherwise the max would shift. This pinned $$2a \\le 80 \\Rightarrow a \\le 40$$.\n- Step 2: The **$$Q_1$$ constraint**: when new values are inserted into the sorted list, they shift positions. The new $$Q_1$$ position (based on new $$N$$) must still land on values that average to the original $$Q_1$$. This pinned $$a \\ge 36$$.\n- Step 3: The median and $$Q_3$$ constraints are often automatically satisfied within the window the other two define — but always verify.\n\nLesson: check the EXTREMES (min, max) and the $$Q_1$$ position — these usually bite first.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "S1 May 2024 Q5(b) — \"Only the fastest 60% of adults take part in round two.\" What does \"fastest\" mean in terms of the distribution tail, and what is the critical trap? (2 steps)", "answer": "- Step 1: \"Fastest\" means **shortest time** — the adults who complete the round most quickly. On the normal curve, short times are on the **left** (lower tail). So you need $P(X < t) = 0.60$.\n- Step 2: The critical trap is interpreting \"fastest 60%\" as the upper 60% (setting $P(X < t) = 0.40$), which gives $t = 14.49$ — wrong. The Loom analysis confirms both Phuc and the tutor made this error. **Sketch the curve, shade the lower tail, label \"fast = left.\"**\n\nMnemonic: \"Fast = few minutes = left tail.\" \"Slow = many minutes = right tail.\"", "source": "GLM 5.1 ①", "_id": "glm_1_39"}, {"question": "To estimate the total population size from a Venn diagram, you know that 76 teenagers play both Chess and Go, and $P(C \\cap G) = 0.29$. What is the formula, and what must $P(C \\cap G)$ include? (2 steps)", "answer": "- Step 1: Total $= \\frac{\\text{observed count}}{\\text{probability}} = \\frac{76}{0.29} \\approx 262$. The logic: if 29% of the population falls in category $C \\cap G$, and you observe 76 in that category, the total is $76 / 0.29$.\n- Step 2: $P(C \\cap G)$ must include ALL regions in the $C$-$G$ overlap: both $P(C \\cap G\\text{ only}) = p = 0.14$ and $P(C \\cap S \\cap G) = 0.15$. Using only 0.15 (missing $p$) would give $76/0.15 \\approx 507$ — wrong.\n\nSame principle as Q46: an intersection in a three-set Venn may have multiple subregions.", "source": "GLM 5.1 ③", "_id": "glm_3_47"}, {"question": "Summarise the three most critical errors from the May 2024 paper and the one-sentence defence against each. (3 steps)", "answer": "- Step 1: **\"Fastest 60%\" → wrong tail.** Defence: sketch the normal curve and shade before writing any equation; \"fastest = shortest = lower tail.\"\n- Step 2: **$\\sigma = 10/1.96$ decimal slip (0.510 vs 5.10).** Defence: sanity-check that $\\sigma$ is the same order of magnitude as the interval half-width; $1.96 \\times 5 \\approx 10$ ✓, $1.96 \\times 0.5 \\approx 1$ ✗.\n- Step 3: **$P(S')$ missing the outside region $q$ (47 vs 105).** Defence: use the shortcut $P(A') = 1 - P(A)$ instead of manually summing non-$A$ regions — it automatically includes the outside region.\n\nEach defence is a 5-second check that saves 3–5 marks.", "source": "GLM 5.1 ③", "_id": "glm_3_63"}, {"question": "In a 3-set Venn diagram with an \"outside-all-three\" region $$q$$, what equation lets you find $$q$$?", "answer": "- Step 1: All 8 regions of the Venn (including $$q$$) must sum to 1, because the diagram exhausts the sample space.\n- Step 2: Write: (sum of 7 named regions) + $$q$$ = 1, then solve for $$q$$.\n- Step 3: Don't forget regions whose value is 0 (e.g. \"G only = 0\") — they still occupy a region, just contribute 0 to the sum.\n\nThe outside region $$q$$ is easy to forget — it's the \"neither/nor/nor\" region.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "S1 May 2024 — What is the general rule for determining whether a new data value will change the median in grouped or discrete data, and why is it different for quartiles when $$N$$ changes? (2 steps)", "answer": "- Step 1: A new value changes the median only if it is inserted **at or before** the current median position, shifting the central value(s). For discrete data, track the ordered position; for grouped data, the median class may shift if the cumulative frequency crosses the $$N/2$$ boundary differently.\n- Step 2: When $$N$$ increases, the quartile **positions** themselves change (e.g. from position 8 for $$N=32$$ to positions 9 and 10 for $$N=36$$), so even values near the old quartile can alter the new quartile because the averaging window moves.", "source": "Kimi K2.6 ①", "_id": "kimi_1_55"}, {"question": "A student needs to find $P(S')$ (\"does not play Scrabble\") from a three-set Venn diagram with an outside region $q$. They add up the non-$S$ regions inside the circles but get the wrong answer. What did they forget, and what's the reliable shortcut? (2 steps)", "answer": "- Step 1: They forgot the **outside region** $q$ (and possibly the $G$-only region if it's 0). $P(S')$ is the probability of being anywhere outside circle $S$ — including outside all three circles.\n- Step 2: The reliable shortcut: $P(S') = 1 - P(S)$. Since $P(S)$ includes all regions inside circle $S$, subtracting from 1 automatically captures everything outside $S$, including the outside region. This is faster and less error-prone than manually summing non-$S$ regions.\n\nIn this paper, manually summing gave 0.18 (missing $q = 0.22$ and $G$-only $= 0$); the shortcut correctly gives $1 - 0.60 = 0.40$.", "source": "GLM 5.1 ③", "_id": "glm_3_46"}, {"question": "In \"the higher score wins; if equal it's a draw\", what inequality do you use for \"Sam wins\", and what's the typical slip?", "answer": "- Step 1: Use **strict** $$S > R$$ for Sam wins.\n- Step 2: Slip: using $$S \\ge R$$ — this would count ties as wins, but ties are draws by the question's definition.\n- Step 3: Sanity check: $$P(\\text{Sam wins}) + P(\\text{Alex wins}) + P(\\text{draw}) = 1$$. If you used $$\\ge$$ for both players, you'd double-count draws.\n\nRead \"higher\" not \"at least as high\".", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "Given a coding $$10y = w-20$$, what's the inverse transform from $$y$$ to $$w$$, and how does the mean transform?", "answer": "- Step 1: Rearrange: $$w = 10y + 20$$.\n- Step 2: Linear coding rule for the mean: $$\\bar{w} = 10\\bar{y} + 20$$. The same coefficients pass through expectations.\n- Step 3: Compute $$\\bar{y}$$ from $$\\sum y / n$$ first, then apply the transform — do NOT individually transform each $$y$$ value.", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "S1 May 2024 — For $n = 36$, find the positions of $Q_1$, the median, and $Q_3$ using the Edexcel rules. (2 steps)", "answer": "- Step 1: $n/4 = 9$ (integer) → $Q_1$ = average of positions 9 and 10. $n/2 = 18$ (integer) → median = average of positions 18 and 19. $3n/4 = 27$ (integer) → $Q_3$ = average of positions 27 and 28.\n- Step 2: All three quartile positions use the **average rule** because $n = 36$ is divisible by 4. This is why adding 4 values to $n = 32$ changes the rule from \"round up\" to \"average.\"", "source": "GLM 5.1 ①", "_id": "glm_1_66"}, {"question": "A common error is writing $\\text{Var}(aX + b) = a \\cdot \\text{Var}(X)$. What is the correct formula, and intuitively, why is the square there? (2 steps)", "answer": "- Step 1: The correct formula is $\\text{Var}(aX + b) = a^2 \\text{Var}(X)$.\n- Step 2: Intuition: if you multiply all values by $a$, distances from the mean also multiply by $a$. Since variance is the average of **squared** distances, the factor becomes $a^2$. The constant $b$ shifts everything equally, so it doesn't affect spread at all — it drops out.\n\nThink of it this way: if data spread from 10 to 20 (range 10), and you multiply by 3, they spread from 30 to 60 (range 30 = 3×). The variance scales by $3^2 = 9$.", "source": "GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "S1 May 2024 Q5(c) — Given $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$ for a normal variable, how do you extract the standard deviation $$\\sigma$$, and what is the critical $$z$$-value? (3 steps)", "answer": "- Step 1: By symmetry, the two tails outside the interval share the remaining probability equally:\n$$P(T < \\mu - 10) = \\frac{1 - 0.95}{2} = 0.025.$$\n- Step 2: The corresponding lower-tail $$z$$-value is $$-1.96$$ (since $$\\Phi(-1.96) = 0.025$$). Standardise:\n$$\\frac{(\\mu - 10) - \\mu}{\\sigma} = -1.96 \\;\\Longrightarrow\\; \\frac{-10}{\\sigma} = -1.96.$$\n- Step 3: Solve to get $$\\sigma = \\frac{10}{1.96} = 5.102\\ldots$$. The negative signs cancel, leaving a positive $$\\sigma$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_41"}, {"question": "S1 May 2024 Q5(c) — When computing $$P(T > \\mu - 5 \\mid T > \\mu - 10)$$, why can you immediately identify that $$\\{T > \\mu - 5\\}$$ is a subset of $$\\{T > \\mu - 10\\}$$? (2 steps)", "answer": "- Step 1: On the number line, $$\\mu - 5$$ lies to the **right** of $$\\mu - 10$$. Any value greater than $$\\mu - 5$$ is automatically greater than $$\\mu - 10$$.\n- Step 2: Therefore the intersection $$(T > \\mu - 5) \\cap (T > \\mu - 10)$$ is simply $$(T > \\mu - 5)$$. This collapses the conditional formula to\n$$P(A\\mid B) = \\frac{P(A)}{P(B)},$$\navoiding the need to compute an intersection separately.", "source": "Kimi K2.6 ①", "_id": "kimi_1_43"}, {"question": "For a regression prediction at a new $$x$$-value, what's the criterion that decides whether the estimate is reliable?", "answer": "- Step 1: Reliable IF the $$x$$-value lies WITHIN the observed range of $$x$$-data (interpolation).\n- Step 2: Unreliable IF outside the observed range (extrapolation) — the linear relationship may not hold there.\n- Step 3: Justification phrasing: \"outside the observed range of bear lengths, so the linear model may not extend that far.\"\n\nPitfall: vague answers like \"the data isn't accurate\" — must name extrapolation / outside-range.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "S1 May 2024 — What is the formula for frequency density in a histogram, and why is it needed instead of using frequency directly as the bar height? (2 steps)", "answer": "- Step 1: Frequency density = frequency ÷ class width. This is NOT in the formula booklet — memorise it.\n- Step 2: In a histogram, **area** represents frequency (not height). If classes have different widths, using frequency as height would give wider classes disproportionately large areas. FD corrects for this: a class with width 2 and frequency 16 has FD = 8, while a class with width 4 and frequency 20 has FD = 5 — the wider class gets a shorter bar but the same area-per-observation.\n\nIf all classes had equal width, FD would be proportional to frequency and you could use either. But in general, you must use FD.", "source": "GLM 5.1 ①", "_id": "glm_1_54"}, {"question": "S1 May 2024 — Misconception probe: A student says \"If $P(A \\mid B) = 0.6$, then $P(B \\mid A)$ must also be 0.6.\" Is this correct? Explain with a simple example. (2 steps)", "answer": "- Step 1: No, this is incorrect. $P(A \\mid B) = P(A \\cap B)/P(B)$ while $P(B \\mid A) = P(A \\cap B)/P(A)$. These are equal only if $P(A) = P(B)$.\n- Step 2: From Q6(d)(ii): $P(C \\mid S \\cap G) = 0.15/0.25 = 0.6$. But $P(S \\cap G \\mid C) = 0.15/P(C) = 0.15/0.45 = 0.333...$. The two conditional probabilities are different because $P(C) \\ne P(S \\cap G)$.\n\nConditional probability is not symmetric — the condition and the event cannot be swapped without changing the value.", "source": "GLM 5.1 ①", "_id": "glm_1_68"}, {"question": "Why is using a regression line to estimate the girth of a bear with length 0.5 metres unreliable, even if the arithmetic gives a number? (2 steps)", "answer": "- Step 1: A length of 0.5 m = 50 cm is well **outside the observed range** of the data (the mean length is 182.1 cm, so the data likely range from roughly 140–220 cm). This is **extrapolation**.\n- Step 2: The linear relationship observed within the data range may not hold outside it. The true relationship could be curved, or the biological constraints could change for very small bears. The estimate is unreliable because we have no data to verify the model in that region.\n\nUse the words \"outside the observed range\" or \"extrapolation\" in your answer — vague statements like \"the data isn't accurate\" score zero.", "source": "GLM 5.1 ③", "_id": "glm_3_34"}, {"question": "When computing $$P(C | S \\cap G)$$ from a Venn diagram, what goes in the numerator vs the denominator? (2 steps)", "answer": "- Step 1: Numerator: $$P(C \\cap S \\cap G)$$ — just the triple-overlap.\n- Step 2: Denominator: $$P(S \\cap G)$$ — the sum of ALL regions inside the $$S$$-$$G$$ overlap, which INCLUDES the triple-overlap.\n\nTrap: forgetting that $$P(S \\cap G)$$ includes $$P(C \\cap S \\cap G)$$, so it must be larger than the numerator.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "What sanity check can you apply to catch the decimal slip in Q5(c) where σ was incorrectly written as 0.510? (1 step)", "answer": "- The interval was μ ± 10, and 95% of a normal distribution lies within approximately ±2σ. So σ should be roughly 10/2 = 5, not 0.5. Always check: σ should be of the same order of magnitude as half the interval width.", "source": "MiniMax ②", "_id": "minimax_2_38"}, {"question": "What's the difference between $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$ and the raw-data form $$\\sigma^2 = \\tfrac{\\sum x^2}{n} - \\bar{x}^2$$, and which is in the IAL formula booklet?", "answer": "- Step 1: $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$ is the **discrete random variable** form — IS in the IAL booklet.\n- Step 2: $$\\sigma^2 = \\tfrac{\\sum x^2}{n} - \\bar{x}^2$$ is the **raw data** form — NOT in the IAL booklet. You must memorise it.\n- Step 3: Both have the same structure (\"mean of squares minus square of mean\") but operate on different objects: probabilities vs. raw observations.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "S1 May 2024 Q4(f) — The question says \"for each $x$ cm increase in length, there will be a 17.3 cm increase in girth.\" A student solves $-42.3 + 0.722x = 17.3$. Why is this wrong, and what should they solve? (2 steps)", "answer": "- Step 1: The 17.3 cm is an **increment** in girth, not a girth value. The equation $-42.3 + 0.722x = 17.3$ treats 17.3 as the total girth when the length is $x$ cm — that's a category error.\n- Step 2: For increments, only the **gradient** matters. A change of $x$ in $d$ produces a change of $0.722x$ in $g$. Set $0.722x = 17.3$ and solve: $x = 17.3/0.722 \\approx 24.0$ cm.\n\nThe intercept is irrelevant for changes. The regression line's slope tells you the rate of change; the intercept tells you the baseline.", "source": "GLM 5.1 ①", "_id": "glm_1_37"}, {"question": "When computing $P(Z > -0.98)$, you can look up $\\Phi(0.98) = 0.8365$ directly. Why does this work? (2 steps)", "answer": "- Step 1: By the symmetry of the standard normal distribution: $P(Z > -a) = P(Z < a) = \\Phi(a)$ for any positive $a$. The area to the right of $-a$ equals the area to the left of $a$.\n- Step 2: So $P(Z > -0.98) = \\Phi(0.98) = 0.8365$. You look up the positive value in the table directly. Without this symmetry trick, you'd need to compute $1 - \\Phi(-0.98)$, but most tables don't list negative $z$-values.\n\nThis is a standard manoeuvre: flip the sign using symmetry to avoid negative-$z$ lookups.", "source": "GLM 5.1 ③", "_id": "glm_3_42"}, {"question": "In Q1(f), the constraint \"$Q_1$ must stay at 36\" leads to $a \\ge 36$. Intuitively, why must $a$ be at least 36? What would go wrong if $a = 30$? (3 steps)", "answer": "- Step 1: With $a = 30$, the new sorted list inserts 27 and 30 before the original data. The original 8th and 9th values (both 36) shift to positions 10 and 11.\n- Step 2: Now the 9th and 10th values (the ones averaged for $Q_1$ when $N=36$) are no longer both 36 — the 9th value has become something smaller (one of the original values that was at position 7, now shifted).\n- Step 3: The average of the new 9th and 10th values would be less than 36, so $Q_1$ would decrease. To prevent this, $a$ must be $\\ge 36$ so that the two 36s remain in positions 9 and 10 (or are not displaced).\n\nThe key insight: inserting small values below $Q_1$ pushes the quartile positions to lower data points.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "What's the intuition for \"variance decreases when a value at the mean is added\", expressed in plain English?", "answer": "- Step 1: Variance is the **average squared deviation** from the mean. A value at the mean has zero deviation.\n- Step 2: Adding a zero to the sum of squared deviations doesn't change the numerator, but the denominator $$n$$ grows.\n- Step 3: $$\\text{new variance} = \\frac{\\text{old }S_{xx}}{n+1} < \\frac{\\text{old }S_{xx}}{n} = \\text{old variance}$$.\n\nSo a perfectly-average observation **dilutes** the spread — the same total variability spread over more data points.", "source": "Opus 4.7 ②", "_id": "opus_2_63"}, {"question": "S1 May 2024 — For normal conditional probability where one event is a subset of another, what algebraic simplification does the subset relationship provide, and why is it easy to miss? (2 steps)", "answer": "- Step 1: If $$A \\subset B$$, then $$A \\cap B = A$$, so\n$$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)} = \\frac{P(A)}{P(B)}.$$\nThis avoids computing a complicated intersection.\n- Step 2: It is easy to miss because students often default to the full formula $$P(A \\cap B)/P(B)$$ without checking whether $$A$$ is already contained in $$B$$. Always compare the two inequalities on a number line first.", "source": "Kimi K2.6 ①", "_id": "kimi_1_62"}, {"question": "S1 May 2024 Q2(d) — What is the systematic approach to find $P(\\text{Sam wins})$ when Sam and Alex use different scoring functions? (3 steps)", "answer": "- Step 1: **Build the $R$ distribution first.** Transform each $X_2$ value through $R = 2X_2 - 3$: $X_2 = 2 \\to R = 1$, $X_2 = 4 \\to R = 5$, etc. Tabulate $R$ values with their probabilities.\n- Step 2: **Condition on $S$.** For each possible $S$ value, find $P(R < S)$ by summing the probabilities of all $R$ values strictly less than $S$. For example, if $S = 7$, then $R < 7$ means $R \\in \\{1, 5\\}$, so $P(R < 7) = 0.25 + 0.3 = 0.55$.\n- Step 3: **Multiply and sum.** $P(S > R) = \\sum_s P(S = s) \\times P(R < s)$. Each term is a product because of independence.\n\n\"Higher score wins\" means strict inequality ($>$). Ties are draws, not wins.", "source": "GLM 5.1 ①", "_id": "glm_1_20"}, {"question": "What's the mnemonic for \"fastest = lower tail\" so you don't flip the direction under exam pressure?", "answer": "- Step 1: \"Fast\" = \"short time\" = \"small number\" = LOWER tail (left of curve).\n- Step 2: \"Slow\" = \"long time\" = \"large number\" = UPPER tail (right of curve).\n- Step 3: Always sketch and shade BEFORE writing the probability equation. The shaded region's area = the percentage given.\n\nThis is the single highest-yield habit to drill from this paper.", "source": "Opus 4.7 ①", "_id": "opus_1_65"}, {"question": "For Q6(e)-style \"estimate how many teenagers\" questions, why use $$P(S') = 1 - P(S)$$ instead of summing pieces of the Venn diagram?", "answer": "- Step 1: $$1 - P(S)$$ is structural — it automatically captures the entire complement, including the outside-the-three-circles region and any zero-valued sub-regions.\n- Step 2: Summing Venn pieces requires you to enumerate ALL regions outside $$S$$ correctly, including small or zero regions — easy to miss one.\n- Step 3: Strategy: always prefer the complement shortcut when \"not $$A$$\" means the full universe outside $$A$$.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "When coding $$w = ay + b$$, how does the standard deviation of $$w$$ relate to the standard deviation of $$y$$, and why does $$b$$ disappear?", "answer": "- Step 1: $$\\sigma_w = |a| \\sigma_y$$. Variance scales by $$a^2$$, so SD scales by $$|a|$$.\n- Step 2: $$b$$ is a constant shift — it moves every value by the same amount, leaving deviations $$(y_i - \\bar{y})$$ unchanged. Spread is invariant under translation.\n- Step 3: Common slip: scaling by $$a$$ instead of $$a^2$$ in variance, OR including $$b$$ in the SD formula.\n\nIf $$w = 10y + 20$$, then $$\\sigma_w = 10 \\sigma_y$$ but $$\\operatorname{Var}(w) = 100 \\operatorname{Var}(y)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "S1 May 2024 — When estimating a population count from a Venn probability, what two-step proportion do you set up, and why must the probability in the denominator match the given count exactly? (2 steps)", "answer": "- Step 1: Set up the proportion\n$$\\frac{\\text{count in region}}{\\text{total population}} = P(\\text{region}),$$\nso $$\\text{Total} = \\frac{\\text{count}}{P(\\text{region})}.$$\n- Step 2: The denominator probability must match the **exact event** described by the count. For example, if 76 teenagers play **Chess and Go**, you must use $$P(C \\cap G)$$, which includes both the $$C\\cap G$$-only region and the triple overlap. Using only one subregion gives the wrong total.", "source": "Kimi K2.6 ①", "_id": "kimi_1_66"}, {"question": "S1 May 2024 — Contrast the Edexcel S1 quartile rule for **discrete ungrouped** data (Q1b, $$n=35$$) with the rule for **grouped continuous** data (Q3b). What are the two key differences? (3 steps)", "answer": "- Step 1: **Position rule:** For discrete ungrouped data, Edexcel uses $
