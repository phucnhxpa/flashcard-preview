viations (since it equals the mean), but the denominator $$n$$ increases to $$n+1$$.\n- Step 3: Dividing the same (or slightly larger, depending on formula) sum of squared deviations by a larger $$n$$ results in a smaller variance and thus a smaller SD.\n+ Misconception: Saying \"no change\" to the standard deviation is wrong. Adding a value at the center \"dilutes\" the spread.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "How do you calculate $$S_{xy}$$ and $$S_{yy}$$ from summary statistics $$\\sum xy$$, $$\\sum x$$, $$\\sum y$$, $$\\sum y^2$$, and $$n$$? (2 steps)", "answer": "- Step 1: Use the formulas that convert raw sums into corrected sums of squares/products.\n- Step 2: $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$ and $$S_{yy} = \\sum y^2 - \\frac{(\\sum y)^2}{n}$$.\n+ Always compute the product $$(\\sum x)(\\sum y)$$ before dividing by $$n$$. Keep all decimals for \"exact value\" questions.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "What is the formula for the Product Moment Correlation Coefficient (PMCC), $$r$$, and what is its valid range? (2 steps)", "answer": "- Step 1: The PMCC measures the linear correlation between two variables: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$.\n- Step 2: The value of $$r$$ must always lie between $$-1$$ and $$1$$. Use this as a sanity check for your calculation.\n+ Misconception: Do not forget the square root in the denominator. Without it, you are not calculating $$r$$.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "What are the formulas for the gradient and intercept of the regression line of $$y$$ on $$x$$, and what is a critical pitfall when calculating the intercept? (3 steps)", "answer": "- Step 1: The regression line of $$y$$ on $$x$$ is written as $$y = a + bx$$.\n- Step 2: The gradient is $$b = \\frac{S_{xy}}{S_{xx}}$$ and the intercept is $$a = \\bar{y} - b\\bar{x}$$.\n- Step 3: Critical pitfall: For the regression line of $$y$$ on $$x$$, the denominator of the gradient is $$S_{xx}$$, NOT $$S_{yy}$$. Also, use the **unrounded** value of $$b$$ when calculating $$a$$ to avoid rounding errors.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}, {"question": "How do you interpret the gradient of a regression line in context? (2 steps)", "answer": "- Step 1: State the change in the dependent variable ($$y$$) for a 1-unit increase in the independent variable ($$x$$).\n- Step 2: Include the units of both variables and phrase it in context (e.g., \"For every 1 cm increase in length, the girth increases by approximately 0.722 cm on average\").\n+ Misconception: Do not just say \"the line slopes up\" or give a number without units or context.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "Why is using a regression line to estimate a value outside the observed data range unreliable? (2 steps)", "answer": "- Step 1: The regression line models a linear relationship based only on the observed data range.\n- Step 2: Outside this range, the relationship may no longer be linear (it could curve, flatten, or reverse). This is called **extrapolation**, and it is unreliable because we have no data to support the linear trend continuing.\n+ Always use the word \"extrapolation\" or \"outside the observed range\" in your explanation.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "If the regression line is $$g = -42.3 + 0.722d$$, how do you find the length increase $$x$$ that corresponds to a 17.3 cm girth increase? (2 steps)", "answer": "- Step 1: Recognize that an increment in girth depends ONLY on the gradient and the increment in length.\n- Step 2: Set up the equation: $$0.722 \\times x = 17.3$$, and solve for $$x = 17.3 / 0.722$$.\n+ Misconception: Do NOT set $$-42.3 + 0.722x = 17.3$$. The 17.3 is an *increment* in $$g$$, not a total value of $$g$$. The intercept is irrelevant for increments.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "How do you standardise a normal variable $$X \\sim N(\\mu, \\sigma^2)$$ to find a probability, and what is a common error? (2 steps)", "answer": "- Step 1: Apply the formula $$Z = \\frac{X - \\mu}{\\sigma}$$ to convert the boundary value(s) to $$Z$$-scores.\n- Step 2: Use the standard normal table to find the probability corresponding to the $$Z$$-score.\n+ Misconception: Do not divide by $$\\sigma^2$$. The denominator is the standard deviation, not the variance.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "In a normal distribution of times, what does \"the fastest 60%\" refer to, and how does it translate to a probability statement? (3 steps)", "answer": "- Step 1: 'Fastest' means taking the **shortest** time.\n- Step 2: Shortest times correspond to the **lower** (left) tail of the normal distribution.\n- Step 3: Therefore, 'fastest 60%' means $$P(X < t) = 0.60$$.\n+ Critical Misconception: Do NOT interpret 'fastest 60%' as the upper tail (longest times). If you use the upper tail, you are finding the slowest 60%. Always sketch the curve and shade the lower tail for \"fastest\".", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "How do you find a cutoff value $$t$$ such that $$P(X < t) = p$$ for a normal distribution? (3 steps)", "answer": "- Step 1: Use the inverse normal function or table to find the $$Z$$-score corresponding to the probability $$p$$. That is, find $$z$$ such that $$\\Phi(z) = p$$.\n- Step 2: Set up the standardisation equation: $$\\frac{t - \\mu}{\\sigma} = z$$.\n- Step 3: Solve for $$t$$: $$t = \\mu + z\\sigma$$.\n+ Example: For $$P(X < t) = 0.60$$, $$z = 0.2533$$. Then $$t = \\mu + 0.2533\\sigma$$.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "Given $$T \\sim N(\\mu, \\sigma^2)$$ and $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$, how do you find $$\\sigma$$? (3 steps)", "answer": "- Step 1: By symmetry, $$P(T < \\mu - 10) = (1 - 0.95)/2 = 0.025$$.\n- Step 2: Standardise the lower boundary: $$\\frac{\\mu - 10 - \\mu}{\\sigma} = \\frac{-10}{\\sigma}$$. From tables, $$P(Z < -1.96) = 0.025$$.\n- Step 3: Set $$\\frac{-10}{\\sigma} = -1.96$$ and solve: $$\\sigma = 10 / 1.96 \\approx 5.10$$.\n+ Sanity Check: $$\\sigma$$ should be of a similar magnitude to the interval half-width (10). A result like 0.510 is a common decimal slip (forgetting to divide 10 by 1.96 properly).", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "How do you calculate $$P(A \\mid B)$$ when event $$A$$ is a subset of event $$B$$ (i.e., if $$A$$ happens, $$B$$ must have happened)? (3 steps)", "answer": "- Step 1: Use the conditional probability formula: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$.\n- Step 2: Since $$A \\subset B$$, the intersection $$A \\cap B$$ is simply $$A$$.\n- Step 3: The formula simplifies to $$P(A \\mid B) = \\frac{P(A)}{P(B)}$$.\n+ Example: $$P(T > \\mu-5 \\mid T > \\mu-10)$$. Since $$T > \\mu-5$$ implies $$T > \\mu-10$$, the first event is a subset of the second. So the probability is $$\\frac{P(T > \\mu-5)}{P(T > \\mu-10)}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "In a 3-set Venn diagram, how do you find the probability of an event defined by multiple disjoint regions, like 'plays Chess but does not play Go'? (2 steps)", "answer": "- Step 1: Identify all regions in the Venn diagram that satisfy the condition. For 'Chess but not Go', this includes the 'Chess only' region and the 'Chess and Scrabble only' region (the part of Chess outside Go).\n- Step 2: Add the probabilities of these disjoint regions together.\n+ Do NOT multiply probabilities unless independence is explicitly stated or can be proven.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": false}, {"question": "What is the mathematical condition for two events $$A$$ and $$B$$ to be independent, and how is it applied in a Venn diagram? (3 steps)", "answer": "- Step 1: $$A$$ and $$B$$ are independent if and only if $$P(A \\cap B) = P(A) \\times P(B)$$.\n- Step 2: Calculate $$P(A)$$, $$P(B)$$, and $$P(A \\cap B)$$ from the Venn diagram regions.\n- Step 3: Set up the equation and solve for the unknown.\n+ Misconception: $$P(A \\cap B)$$ must include ALL sub-regions within the intersection of $$A$$ and $$B$$. For example, in a 3-set Venn with events $$C$$ and $$S$$, $$P(C \\cap S)$$ includes both the $$C \\cap S \\cap G'$$ region AND the $$C \\cap S \\cap G$$ region.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": false}, {"question": "When calculating $$P(A \\cap B)$$ in a 3-set Venn diagram with events $$A$$, $$B$$, and $$C$$, what regions must you include? (2 steps)", "answer": "- Step 1: The intersection of $$A$$ and $$B$$ includes all parts where both $$A$$ and $$B$$ overlap.\n- Step 2: This consists of two regions: the part that is only $$A$$ and $$B$$ ($$A \\cap B \\cap C'$$), AND the triple overlap ($$A \\cap B \\cap C$$). So, $$P(A \\cap B) = P(A \\cap B \\cap C') + P(A \\cap B \\cap C)$$.\n+ Misconception: Do not use only one of the regions. The intersection encompasses the entire overlapping lens shape between the two circles.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "How do you calculate conditional probability $$P(A \\mid B \\cap C)$$ from a Venn diagram? (3 steps)", "answer": "- Step 1: Identify the denominator: $$P(B \\cap C)$$. This includes the triple overlap $$A \\cap B \\cap C$$ and the region $$A' \\cap B \\cap C$$.\n- Step 2: Identify the numerator: $$P(A \\cap B \\cap C)$$ (the part of $$B \\cap C$$ that is also in $$A$$).\n- Step 3: Divide the numerator by the denominator: $$P(A \\mid B \\cap C) = \\frac{P(A \\cap B \\cap C)}{P(B \\cap C)}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "A youth club has a large number of teenagers. 76 teenagers play Chess and Go. How do you estimate the total number of teenagers in the club using the Venn diagram? (3 steps)", "answer": "- Step 1: Find the probability of a teenager playing both Chess and Go from the Venn diagram: $$P(C \\cap G) = P(C \\cap G \\cap S') + P(C \\cap G \\cap S)$$.\n- Step 2: Set up the proportion: $$\\text{Total} \\times P(C \\cap G) = 76$$.\n- Step 3: Solve for the Total: $$\\text{Total} = \\frac{76}{P(C \\cap G)}$$.\n+ Misconception: Do not forget to include the triple overlap ($$C \\cap G \\cap S$$) when calculating $$P(C \\cap G)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "What is the safest and most efficient way to calculate the probability of the complement, $$P(A')$$, in a Venn diagram, and why? (3 steps)", "answer": "- Step 1: The complement of $$A$$ is everything outside the $$A$$ circle.\n- Step 2: Instead of adding up all the individual regions outside $$A$$ (which risks missing the 'outside all circles' region), use the shortcut: $$P(A') = 1 - P(A)$$.\n- Step 3: This guarantees you include the entire universe outside of $$A$$, including the region outside all three circles.\n+ Critical Misconception: Forgetting the outside region ($$q$$) is a common error. Using $$1 - P(A)$$ completely avoids this trap.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}], "count": 42}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "How do you determine the value of $ k $ in the stem-and-leaf diagram when the median height for Maple trees is 45 cm? (3 steps)", "answer": "- Step 1: Recognize that the median for $ N=32 $ Maple trees is the average of the 16th and 17th values.  \n- Step 2: Locate the 16th and 17th values in the stem-4 row. The leaves are $ 1, 1, 1, k, 7, 8 $, so the 16th value is $ 40 + k $ and the 17th is 47.  \n- Step 3: Set up the equation $ \\frac{(40 + k) + 47}{2} = 45 $. Solve to get $ k = 3 $. Ensure $ k $ maintains ascending order (1 ≤ $ k $ ≤ 7).  \n\n**Common misconception:** Assuming $ k $ is a frequency or sum instead of a single digit.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "Why is the lower quartile (Q₁) for Birch trees the 9th value when there are 35 data points? (2 steps)", "answer": "- Step 1: Use the Edexcel rule: If $ n/4 $ is not an integer, round up. For $ n=35 $, $ 35/4 = 8.75 $, so round up to 9.  \n- Step 2: Verify the 9th value in the ordered Birch data is 39 cm.  \n\n**Edge case:** If $ n/4 $ were an integer (e.g., $ n=36 $), average the $ n/4 $-th and $ (n/4 + 1) $-th values.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "How do you identify the only outlier in Birch trees using quartiles? (3 steps)", "answer": "- Step 1: Calculate IQR = $ Q_3 - Q_1 = 57 - 39 = 18 $.  \n- Step 2: Compute fences: Lower = $ 39 - 1.5 \\times 18 = 12 $, Upper = $ 57 + 1.5 \\times 18 = 84 $.  \n- Step 3: Check data: The smallest value (28) > 12, and only 85 exceeds 84.  \n\n**Misconception probe:** Why isn’t 28 an outlier? Because it’s above the lower fence.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "What are the five steps to construct a box plot for Birch trees, including outliers?", "answer": "- Step 1: Min = 28 (lowest non-outlier).  \n- Step 2: Q₁ = 39, Median = 48, Q₃ = 57.  \n- Step 3: Max non-outlier = 76 (next value below 85).  \n- Step 4: Outlier = 85 (marked as a cross).  \n- Step 5: Ensure whiskers end at 28 and 76.  \n\n**Visual intuition:** Outliers extend beyond 1.5×IQR from the box.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How do the distributions of Birch and Maple trees differ based on median and IQR?", "answer": "- Step 1: Birch median = 48 cm, Maple = 45 cm → Birch trees grow taller on average.  \n- Step 2: Both have IQR = 18 cm → similar central spread.  \n- Step 3: Birch has an outlier (85 cm), while Maple does not → Birch has a heavier upper tail.  \n\n**Synthesis question:** Why might the outlier be included in the Birch distribution?", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why must $ a $ be between 36 and 40 for the Maple box plot to remain unchanged? (3 steps)", "answer": "- Step 1: New $ N = 36 $, so Q₁ is the average of the 9th and 10th values.  \n- Step 2: Ensure $ 2a \\le 80 $ → $ a \\le 40 $.  \n- Step 3: $ a \\ge 36 $ to keep the 9th/10th values at 36.  \n\n**Edge case:** If $ a < 36 $, Q₁ would shift to a lower value.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "How do you calculate $ P(2X - 3 > 5) $ for the discrete random variable $ X $? (2 steps)", "answer": "- Step 1: Solve $ 2X - 3 > 5 $ → $ X > 4 $.  \n- Step 2: Sum $ P(X=5) + P(X=7) + P(X=8) = 0.2 + 0.1 + 0.15 = 0.45 $.  \n\n**Misconception probe:** Why isn’t $ X=4 $ included? The inequality is strict.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "How do you show $ \\text{Var}(X) = 4.14 $ using $ E(X) = 4.6 $? (3 steps)", "answer": "- Step 1: Compute $ E(X^2) = 2^2(0.25) + 4^2(0.3) + 5^2(0.2) + 7^2(0.1) + 8^2(0.15) = 25.3 $.  \n- Step 2: Use $ \\text{Var}(X) = E(X^2) - [E(X)]^2 = 25.3 - 4.6^2 = 4.14 $.  \n- Step 3: Verify arithmetic (e.g., $ 4.6^2 = 21.16 $).  \n\n**Common error:** Forgetting to square $ E(X) $.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How do you find $ a $ and $ b $ for $ Y = aX - b $ given $ \\text{Var}(Y) = 66.24 $? (3 steps)", "answer": "- Step 1: Use $ \\text{Var}(Y) = a^2 \\text{Var}(X) $ → $ 66.24 = a^2(4.14) $ → $ a = 4 $.  \n- Step 2: Use $ E(Y) = aE(X) - b $ → $ 13.4 = 4(4.6) - b $ → $ b = 5 $.  \n- Step 3: Confirm positivity of $ a $ and $ b $.  \n\n**Edge case:** If $ a $ were negative, would $ \\text{Var}(Y) $ still be 66.24?", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "How do you calculate the probability Sam wins when $ S > R $? (4 steps)", "answer": "- Step 1: Find $ R = 2X_2 - 3 $ values and probabilities.  \n- Step 2: For each $ S $, sum $ P(R < S) $.  \n- Step 3: Multiply $ P(S) \\times P(R < S) $ for each $ S $.  \n- Step 4: Total $ P(S > R) = 0.355 $.  \n\n**Synthesis question:** Why is $ S $ and $ R $ independence critical?", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "How do you calculate the width and height of the $ 30 \\le x < 32 $ histogram bar? (3 steps)", "answer": "- Step 1: Compute FD for reference class $ 32 \\le x < 36 $: $ 20/4 = 5 $.  \n- Step 2: Derive scale factors: width = $ 0.625 \\, \\text{cm/mm} $, height = $ 1.5 \\, \\text{cm/FD} $.  \n- Step 3: For $ 30 \\le x < 32 $: width = $ 2 \\times 0.625 = 1.25 \\, \\text{cm} $, height = $ 8 \\times 1.5 = 12 \\, \\text{cm} $.  \n\n**Misconception probe:** Why isn’t frequency used directly for height?", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "How do you estimate the median using linear interpolation for grouped data? (2 steps)", "answer": "- Step 1: Locate the median class (32 ≤ x < 36) and cumulative frequencies up to that class.  \n- Step 2: Apply formula: $ \\text{Median} = 32 + \\frac{25 - 18}{20} \\times 4 = 33.4 \\, \\text{mm} $.  \n\n**Edge case:** What if the median class is the first or last group?", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "Why does adding a data point equal to the current mean not change the mean?", "answer": "- Step 1: New mean = $ \\frac{(n \\times \\bar{x}) + \\bar{x}}{n + 1} = \\bar{x} $.  \n- Step 2: The added value contributes zero to the numerator while increasing $ n $.  \n\n**Synthesis question:** How does this affect the standard deviation?", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "How do you show the regression line gradient is 0.722? (3 steps)", "answer": "- Step 1: Compute $ S_{dg} = 12,105.12 $ and $ S_{dd} = 16,769.78 $.  \n- Step 2: Gradient $ b = \\frac{S_{dg}}{S_{dd}} = 0.72184 \\approx 0.722 $.  \n- Step 3: Verify calculation accuracy (e.g., $ 1456.8 \\times 713.2/8 = 129,873.72 $).  \n\n**Common error:** Using $ S_{gg} $ instead of $ S_{dd} $.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Why is extrapolation unreliable in regression?", "answer": "- Step 1: Regression models describe relationships within the observed data range.  \n- Step 2: Beyond this range, the relationship may not hold (e.g., non-linear trends).  \n\n**Example:** Estimating bear girth for 0.5 meters (outside observed range) is unreliable.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}], "count": 15}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "How do you determine the direction for reading leaves on the Birch and Maple sides of a back-to-back stem-and-leaf diagram? (3 steps)", "answer": "- Step 1: **Birch side (left stem)** leaves are read **right-to-left** (e.g., 9 8 under 2 | represents 28, 29).  \n- Step 2: **Maple side (right stem)** leaves are read **left-to-right** (e.g., 5 7 7 8 9 under | 2 represents 25, 27, 27, 28, 29).  \n- Step 3: Confirm using the **key** (e.g., 5 | 6 | 3 = 65 cm for Birch, 63 cm for Maple).  \n\n+ Always check the **key** first to avoid directional errors.  \n+ Total row counts must match given N (e.g., Birch: 35; Maple: 32).", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "For quartile positions in Edexcel S1, how do you handle N = 35 (odd) vs. N = 32 (even)? (3 steps)", "answer": "- Step 1: **N = 35 (Birch):**  \n  - $Q_1$ = $\\lceil 35/4 \\rceil = 9$th value  \n  - $Q_3$ = $\\lceil 3 \\times 35/4 \\rceil = 27$th value  \n- Step 2: **N = 32 (Maple):**  \n  - Median = $(16\\text{th} + 17\\text{th}) / 2$  \n  - For quartiles, use $N/4$ and $3N/4$ as exact positions (no rounding).  \n- Step 3: **Always list cumulative totals** to locate values quickly (e.g., Maple stem 4 has leaves 1,1,1,3,7,8 → 6 values).  \n\n+ Misconception: Using $(N+1)/4$ (GCSE rule) instead of Edexcel’s round-up rule.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How do outlier fences $Q_1 - 1.5 \\times \\text{IQR}$ and $Q_3 + 1.5 \\times \\text{IQR}$ work for detecting extreme values? (3 steps)", "answer": "- Step 1: Calculate **IQR** = $Q_3 - Q_1 = 57 - 39 = 18$.  \n- Step 2: Compute fences:  \n  - Lower fence = $39 - 27 = 12$  \n  - Upper fence = $57 + 27 = 84$  \n- Step 3: Compare data points:  \n  - Smallest Birch = 28 (>12) → no low outliers  \n  - Only 85 > 84 → one outlier.  \n\n+ Edge case: If IQR = 0, fences collapse to $Q_1$ and $Q_3$, flagging all outside as outliers.  \n+ Contrast: Using 3.0 × IQR would exclude 85 (84 + 18 = 102).", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "What defines a \"no change to the box plot\" constraint when adding new data to Maple trees? (4 steps)", "answer": "- Step 1: Fix **five statistics**: Min = 25, $Q_1 = 36$, Median = 45, $Q_3 = 54$, Max = 80.  \n- Step 2: For new $N = 36$, recompute quartile positions:  \n  - $Q_1$ = average of 9th and 10th values  \n  - Median = average of 18th and 19th  \n  - $Q_3$ = average of 27th and 28th  \n- Step 3: Constraints:  \n  - Max ≤ 80 → $2a \\leq 80 \\Rightarrow a \\leq 40$  \n  - $Q_1 = 36$ → $a \\geq 36$ (to avoid displacing 9th/10th values)  \n- Step 4: Combine: $36 \\le a \\le 40$.  \n\n+ Misconception: Forgetting that $Q_1$ depends on the 9th/10th values after adding data.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "For $P(2X - 3 > 5)$ with discrete $X$, why do you sum probabilities for $X > 4$? (2 steps)", "answer": "- Step 1: Rearrange inequality:  \n  $2X - 3 > 5 \\Rightarrow X > 4$  \n- Step 2: Sum probabilities for valid $X$ values:  \n  $P(X=5) + P(X=7) + P(X=8) = 0.2 + 0.1 + 0.15 = 0.45$  \n\n+ Contrast: If $X$ were continuous, you’d integrate over $X > 4$.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How does coding $w = 10y + 20$ affect the mean and standard deviation of $w$? (3 steps)", "answer": "- Step 1: **Mean**:  \n  $\\bar{w} = 10\\bar{y} + 20 = 10 \\times \\frac{104}{50} + 20 = 40.8$  \n- Step 2: **Variance**:  \n  $\\text{Var}(w) = 10^2 \\times \\text{Var}(y)$  \n- Step 3: **Standard deviation**:  \n  $\\sigma_w = 10\\sigma_y = 10 \\times \\sqrt{0.3444} = 5.87$  \n\n+ Misconception: Adding 20 affects mean but not spread. Scaling by 10 affects both.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why does adding a value equal to the current mean leave the standard deviation unchanged? (3 steps)", "answer": "- Step 1: **Mean remains**:  \n  $\\bar{w}_{\\text{new}} = \\frac{50 \\times 40.8 + 40.8}{51} = 40.8$  \n- Step 2: **Variance decreases**:  \n  Sum of squared deviations increases by $(40.8 - 40.8)^2 = 0$, but denominator increases to 51.  \n- Step 3: **SD decreases** since variance = $\\frac{\\text{unchanged numerator}}{51}$.  \n\n+ Edge case: If added value ≠ mean, both mean and SD change.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "How does independence $P(C \\cap S) = P(C)P(S)$ affect solving for unknown $p$ in Venn diagrams? (3 steps)", "answer": "- Step 1: Express $P(C)$ and $P(S)$ in terms of $p$:  \n  $P(C) = 0.31 + p$, $P(S) = 0.60$  \n- Step 2: Set $P(C \\cap S) = 0.27 = (0.31 + p)(0.60)$  \n- Step 3: Solve for $p$:  \n  $0.31 + p = 0.45 \\Rightarrow p = 0.14$  \n\n+ Misconception: Forgetting triple-overlap (0.15) in $P(C \\cap S)$.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "For a normal distribution with $P(\\mu - 10 < T < \\mu + 10) = 0.95$, why is $\\sigma = 10/1.96$? (3 steps)", "answer": "- Step 1: Symmetry implies $P(T < \\mu - 10) = 0.025$.  \n- Step 2: Standardize:  \n  $Z = \\frac{\\mu - 10 - \\mu}{\\sigma} = -1.96$  \n- Step 3: Solve for $\\sigma$:  \n  $\\sigma = \\frac{10}{1.96} \\approx 5.10$  \n\n+ Misconception: Dividing by 1.645 (90% CI) instead of 1.96 (95% CI).", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "How does \"fastest 60%\" map to the lower tail in normal distribution cutoff calculations? (2 steps)", "answer": "- Step 1: \"Fastest\" = shortest time → lower tail.  \n- Step 2: Find $t$ where $P(X < t) = 0.60$ (not 0.40).  \n  $Z = 0.2533 \\Rightarrow t = 15 + 2 \\times 0.2533 = 15.5$.  \n\n+ Edge case: \"Fastest 10%\" would use $P(X < t) = 0.10$ (Z = -1.2816).", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "For a dataset with n = 35 values, what position does Edexcel S1 use for calculating Q₁, and why does this differ from the position used when n = 32? (2 steps)", "answer": "- Step 1: For n = 35, n/4 = 8.75 (not an integer). The Edexcel S1 rule says: if n/4 is NOT an integer, round UP to the next position. So Q₁ is at position ⌈35/4⌉ = 9.\n- Step 2: For n = 32, n/4 = 8 (an integer). The rule says: if n/4 IS an integer, take the average of positions 8 and 9. This is why the quartile position depends on whether n is divisible by 4.\n\n**Takeaway:** The Edexcel rule is different from the \"position = (n+1)/4\" rule used at GCSE. Memorise: integer → average; non-integer → round up.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A student calculates Q₁ = 35 and Q₃ = 57 for the Birch trees (n = 35), giving IQR = 22. They then calculate outlier fences as Q₁ - 1.5×IQR = 35 - 33 = 2 and Q₃ + 1.5×IQR = 57 + 33 = 90. They claim there are no outliers. Explain why this answer is wrong and what the correct fences should be. (2 steps)", "answer": "- Step 1: The student's error is using Q₁ = 35 instead of the correct Q₁ = 39. For n = 35, Q₁ is the 9th ordered value (39 cm), not the 6th value (35 cm). This misplacement propagates to all downstream calculations.\n- Step 2: With correct Q₁ = 39 and Q₃ = 57, the IQR = 18. The correct fences are: lower = 39 - 1.5×18 = 39 - 27 = 12; upper = 57 + 27 = 84. Since the maximum Birch value is 85 cm, this creates one outlier (85 > 84).\n\n**Takeaway:** Always verify quartile positions BEFORE calculating IQR. A single error at the position-finding stage invalidates all subsequent outlier判断.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "When drawing a box plot for the Birch trees that has an outlier at 85 cm, explain where the upper whisker should end and why. (1 step)", "answer": "- Step 1: The whisker ends at the **most extreme non-outlier value**, not at the outlier itself. Since 85 cm is identified as an outlier (> 84 cm), the upper whisker ends at the next highest value below the upper fence, which is 76 cm. The outlier is plotted as a separate cross or asterisk beyond the whisker.\n\n**Takeaway:** Whiskers show the range of non-outlier data. Outliers must be plotted individually — not connected to the box.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "The median height for Maple trees is given as 45 cm, and there are 32 Maple trees. Using the stem-and-leaf diagram where the stem-4 row contains leaves (1, 1, 1, k, 7, 8), explain why k must equal 3, and why k cannot be 2 or 4. (3 steps)", "answer": "- Step 1: With n = 32 (even), the median is the average of the 16th and 17th ordered values. Cumulative Maple frequencies show positions 16-17 both fall in the stem-4 row.\n- Step 2: The 16th value equals 40 + k, and the 17th value equals 47 (the leaf \"7\" in that row). Setting median = 45: (40 + k + 47)/2 = 45 gives k = 3.\n- Step 3: k cannot be 2 because leaves must be in ascending order within each row — the leaves after k are 7 and 8, so k must be less than 7. k cannot be 4 because it must be greater than the leaves before it (1, 1, 1). Therefore k = 3 is the only valid digit.\n\n**Takeaway:** When finding an unknown leaf digit from a median/quartile condition, always check that the resulting ordering remains valid.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "For the Birch trees, the median is 48 cm, Q₁ = 39 cm, Q₃ = 57 cm, and there is one outlier at 85 cm. For Maple trees, the median is 45 cm, Q₁ = 36 cm, Q₃ = 54 cm, with no outliers. State one similarity and one difference between these distributions, using specific numerical values. (1 step)", "answer": "- Step 1: Similarity: The interquartile range (IQR) is the same for both — Birch: 57 - 39 = 18 cm; Maple: 54 - 36 = 18 cm. This means the central spread of the data is similar. Difference: The median for Birch (48 cm) is higher than for Maple (45 cm), indicating that Birch trees tend to grow more in one year. Additionally, Birch has an upper outlier (85 cm) while Maple has none.\n\n**Takeaway:** When comparing distributions, always quote specific statistics — \"medians are 48 cm and 45 cm\" rather than \"Birch is taller.\"", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "Four additional Maple tree heights are added: 27 cm, a cm, 48 cm, and 2a cm. The box plot (min = 25, Q₁ = 36, median = 45, Q₃ = 54, max = 80) must remain unchanged. If a = 35, explain why this value would change the box plot. (2 steps)", "answer": "- Step 1: With n = 36 (old 32 + 4 new), Q₁ is the average of the 9th and 10th values. In the original data (n = 32), the 8th and 9th values were both 36. After adding 27 and a = 35, the original 8th value (36) shifts to position 9, and the original 9th value (36) shifts to position 10.\n- Step 2: For Q₁ to remain 36, the average of positions 9 and 10 must still be 36. With a = 35, the sorted list becomes ...27, 35, 36, 36... so positions 9 and 10 are both 36 → average = 36. However, we also need 2a ≤ 80 (to keep max = 80), which gives a ≤ 40. And to keep Q₁ = 36, we need a ≥ 36 (otherwise a would displace one of the 36s). So a = 35 fails the max constraint (2×35 = 70 ≤ 80 ✓) but actually works for Q₁. Wait — let me recalculate: with a = 35, the 9th and 10th values are 36 and 36 → Q₁ = 36. So a = 35 DOES work! Let me reconsider: with a = 35, 2a = 70 ≤ 80 ✓. Actually a = 35 would work for all constraints. The range is 36 ≤ a ≤ 40.\n\n**Takeaway:** When adding data that must preserve a box plot, each statistic (min, Q₁, median, Q₃, max) gives a constraint. Solve all of them together.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Given the probability distribution P(X=2)=0.25, P(X=4)=0.3, P(X=5)=0.2, P(X=7)=0.1, P(X=8)=0.15, calculate P(2X - 3 > 5). Explain the key mistake students make with this type of question. (2 steps)", "answer": "- Step 1: First rearrange the inequality: 2X - 3 > 5 → 2X > 8 → X > 4.\n- Step 2: Now sum probabilities for X = 5, 7, 8: P(X > 4) = 0.2 + 0.1 + 0.15 = 0.45.\n+ Common mistake: Students often include X = 4 because they forget the inequality is strict (\"> 4\", not \"≥ 4\"). Always rearrange the inequality BEFORE summing probabilities.\n+ Another mistake: Trying to work with the transformed variable Y = 2X - 3 directly instead of finding which original X values satisfy the condition.\n\n**Takeaway:** The transformation happens to the X values, not to the probability distribution. Work backwards from the inequality to find which x-values count.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "A student calculates E(X²) for the spinner as 2² × 0.25 + 4² × 0.3 + 5² × 0.2 + 7² × 0.1 + 8² × 0.15 = 25.3, then calculates Var(X) = 25.3 - 4.6 = 20.7. Explain why this is wrong and what the correct calculation should be. (2 steps)", "answer": "- Step 1: The formula Var(X) = E(X²) - [E(X)]² requires subtracting the SQUARE of the expectation, not the expectation itself. The student subtracted 4.6 instead of 4.6² = 21.16.\n- Step 2: Correct calculation: Var(X) = 25.3 - (4.6)² = 25.3 - 21.16 = 4.14.\n+ Key insight: E(X) is 4.6 (a number around 5), but we subtract its square (around 21), not the original expectation. This is a very common slip.\n\n**Takeaway:** Write the formula explicitly: Var(X) = E(X²) - [E(X)]². The second term is E(X) squared, not E(X) itself.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "For Y = aX - b where a and b are positive, given E(Y) = 13.4 and Var(Y) = 66.24, and knowing Var(X) = 4.14 and E(X) = 4.6, explain why you should start with the variance equation rather than the expectation equation to find a and b. (2 steps)", "answer": "- Step 1: The variance formula Var(Y) = a² Var(X) does NOT involve b — the constant term cancels out entirely. This gives a² = 66.24/4.14 = 16, so a = 4 directly.\n- Step 2: The expectation formula E(Y) = aE(X) - b DOES involve both a and b. If we tried this first, we'd have one equation with two unknowns. Starting with variance eliminates b, giving a unique solution for a first.\n+ Insight: The constant b shifts the distribution up/down but doesn't affect its spread, so variance reveals the scaling factor a first.\n\n**Takeaway:** In linear transforms Y = aX ± b, always solve for a using variance first — b is \"hidden\" in expectation but not in variance.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "In the game, Sam's score is S = X₁ (from one spin) and Alex's score is R = 2X₂ - 3 (from a separate spin). A student calculates P(Sam wins) by considering only one spin, treating S and R as dependent. Explain why this is wrong. (2 steps)", "answer": "- Step 1: Sam and Alex each spin the spinner ONCE — these are two independent spins. The outcome of Sam's spin does not affect Alex's spin.\n- Step 2: Because they're independent, P(S = s AND R = r) = P(S = s) × P(R = r). The student incorrectly tried to use a single probability distribution as if it applied to both players simultaneously. We must first build the distribution for R = 2X - 3, then use the multiplication rule for independent events.\n+ Common error: Confusing \"transform of X\" (same spin used twice) with \"transform of a different, independent X\" (different spins).\n\n**Takeaway:** Always identify whether the random variables come from the same trial (dependent) or different trials (independent) before calculating probabilities.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Using the table method for P(Sam wins), complete the calculation and verify the total probability sums to 1 (accounting for Alex wins and draws). (2 steps)", "answer": "- Step 1: We calculated P(Sam wins) = 0.355. Now compute P(Alex wins): Alex wins when R > S. By symmetry or direct calculation: P(R > S) = 0.25×0.75 + 0.3×0.55 + 0.2×0.45 + 0.1×0.25 + 0.15×0 = 0.1875 + 0.165 + 0.09 + 0.025 + 0 = 0.4675.\n- Step 2: P(draw) = P(S = R). From the table: when S = 4, R can be 5; when S = 5, R can be 5 or 7; etc. Actually easier: P(S wins) + P(A wins) + P(draw) = 1 → P(draw) = 1 - 0.355 - 0.4675 = 0.1775. Check: 0.355 + 0.4675 + 0.1775 = 1 ✓\n\n**Takeaway:** Always sanity-check that your probabilities sum to 1. If not, you've missed something or double-counted.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "In a histogram, the bar for class 32 ≤ x < 36 has width 2.5 cm and height 7.5 cm. The class has frequency 20 and width 4 mm. Explain why you cannot simply use the height of 7.5 cm as the frequency density for this class when calculating other bar dimensions. (2 steps)", "answer": "- Step 1: In a histogram, AREA (not height) is proportional to frequency. The displayed height on the page is proportional to frequency density (FD), but it's scaled by an arbitrary constant determined by the drawing.\n- Step 2: From the reference bar: FD = frequency ÷ class width = 20 ÷ 4 = 5. The page shows height 7.5 cm for FD = 5, giving a scale of 1.5 cm per unit FD. Similarly, class width 4 mm corresponds to 2.5 cm on the page, giving 0.625 cm per mm. These are the TWO scale factors you must derive and use for other classes.\n+ Key insight: The height on the page is NOT the frequency density value itself — it's scaled by an arbitrary constant.\n\n**Takeaway:** Derive TWO scale factors from the reference bar: cm per mm of class width, and cm per unit of frequency density.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "For grouped data with N = 50, a student calculates the median position as (N+1)/2 = 25.5 and uses this in the interpolation formula. Explain why this gives an incorrect median estimate. (1 step)", "answer": "- Step 1: For grouped continuous data, the median position is N/2 = 25, NOT (N+1)/2 = 25.5. The (N+1)/2 rule is for discrete data or when finding individual order statistics. For grouped data (histograms, frequency tables), use N/2 because we're estimating the value at the midpoint of the cumulative distribution.\n+ Misconception: The \"+1\" adjustment is for finding exact positions in small discrete samples, not for continuous grouped data where interpolation already accounts for the \"halfway\" position.\n\n**Takeaway:** Memorise: Grouped continuous data → median position = N/2. Discrete data or raw lists → (N+1)/2.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "The coding relationship is given as 10y = w - 20. A student calculates the mean of w as: w̄ = (Σw)/n = (Σ(10y+20))/n = 10(Σy)/n + 20 = 10(2.08) + 20 = 20.8 + 20 = 40.8. Explain why this works and what property of linear coding makes it valid. (2 steps)", "answer": "- Step 1: The key property is: if w = aY + b (linear transform), then Ē = aĒ(Y) + b. This is because expectation is a linear operator: E(aY + b) = aE(Y) + b.\n- Step 2: We computed ȳ = 104/50 = 2.08, then w̄ = 10(2.08) + 20 = 40.8. We never needed to convert individual w values — we transformed the mean of y, not the sum of w.\n+ Intuition: The coding just shifts and scales the entire distribution. The mean transforms the same way individual values do.\n\n**Takeaway:** Linear coding transforms the mean directly: w̄ = aȳ + b. No need to \"decode\" individual values first.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": true}, {"question": "A student calculates variance for w as: Var(w) = 10² × Var(y) + 20². Explain why this is wrong and what the correct calculation should be. (2 steps)", "answer": "- Step 1: The formula Var(aX + b) = a²Var(X) + b is INCORRECT. The correct formula is Var(aX + b) = a²Var(X). The constant b does NOT contribute to variance.\n- Step 2: The correct calculation: Var(y) = S_yy/n = 17.22/50 = 0.3444. Then σ_w = 10 × √0.3444 = 10 × 0.5868 = 5.87 grams. The \"+20\" term drops out entirely.\n+ Intuition: Variance measures spread around the mean. Adding a constant (20) shifts all values equally — the spread doesn't change. Only the coefficient a scales the spread.\n\n**Takeaway:** Var(aX + b) = a²Var(X). The constant b disappears completely from variance calculations.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "A pebble weighing exactly 40.8 grams (the mean) is added to the sample. Explain why this decreases the standard deviation but does not change the mean. (2 steps)", "answer": "- Step 1: The mean doesn't change because adding a value equal to the current mean simply recalculates: (n × mean + mean)/(n+1) = (n+1) × mean/(n+1) = mean. The new value contributes exactly what the old mean \"expected.\"\n- Step 2: The standard deviation decreases because variance = (Σ(xi - x̄)²)/n. The new value has deviation (40.8 - 40.8) = 0, contributing 0 to the numerator while n increases from 50 to 51 in the denominator. The average squared deviation shrinks.\n+ Intuition: Adding a data point at the mean \"dilutes\" the existing spread without adding any new spread.\n\n**Takeaway:** Adding a value at the mean: mean unchanged, variance (and hence SD) decreases.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": true}, {"question": "Given Σd = 1456.8, Σg = 713.2, n = 8, and S_dd = 16769.78, a student calculates S_dg as Σdg - (Σd)(Σg)/n = 141978.84 - (1456.8 × 713.2)/8 = 141978.84 - 129873.72 = 12105.12. However, they then use S_gg = Σg² - (Σg)²/n = 72675.98 - 713.2²/8, getting a different answer. Explain why this matters. (2 steps)", "answer": "- Step 1: The student has a typo: Σg² should be 72675.98, not 72675.98. The actual S_gg calculation is: S_gg = 72675.98 - (713.2)²/8 = 72675.98 - 508654.24/8 = 72675.98 - 63581.78 = 9094.20.\n- Step 2: This value is needed for the correlation coefficient r = S_dg/√(S_dd × S_gg). Using the correct S_gg gives r = 12105.12/√(16769.78 × 9094.20) ≈ 0.980.\n+ Key: S_dg and S_gg serve different purposes — one is for covariance (relationship between variables), the other is for variance of g alone.\n\n**Takeaway:** S_xy is the covariance term; S_xx is the variance of x. They're not interchangeable.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "A student calculates the regression line as g = -42.3 + 0.722d, but when they substitute d = 250 cm (2.5 m), they get g = -42.3 + 0.722(250) = 138.2 cm. They then state \"this bear has a girth of 138.2 cm.\" Explain the units issue and why this calculation is actually correct. (1 step)", "answer": "- Step 1: The calculation IS correct — but only because d was converted to cm first. The regression was calculated from data in cm, so we must input d in cm. The answer g = 138.2 cm is valid.\n+ Potential trap: If someone input d = 2.5 (in metres), they'd get g = -42.3 + 0.722(2.5) = -42.3 + 1.805 = -40.5 cm, which is nonsensical. Always check units match the original data.\n\n**Takeaway:** Regression equations are only valid within the unit system of the original data. Convert units BEFORE substituting.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "The regression line is g = -42.3 + 0.722d. A student uses this to estimate girth for a bear with length 0.5 metres (50 cm) and gets g = -42.3 + 0.722(50) = -6.2 cm. They claim this is a valid estimate. Explain why this estimate is unreliable. (1 step)", "answer": "- Step 1: This is extrapolation — the value d = 50 cm is far outside the observed data range. The mean length in the sample was 182.1 cm, with a minimum around 25 cm. 50 cm is in the lower tail where the linear relationship may not hold.\n+ Key principle: Linear regression should only be used for interpolation within the range of observed x-values. Extrapolation assumes the relationship continues beyond the data, which is often false.\n\n**Takeaway:** Regression predictions outside the data range are unreliable unless there's strong theoretical justification.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "The regression line gives g = -42.3 + 0.722d. If the biologist claims \"for each x cm increase in length, girth increases by 17.3 cm,\" find x. A student solves: -42.3 + 0.722x = 17.3, giving x = 82.6 cm. Explain why this is wrong. (2 steps)", "answer": "- Step 1: The student confused an absolute girth value (17.3 cm) with an incremental change. The equation g = -42.3 + 0.722d gives the absolute girth for a given d, not the change in girth.\n- Step 2: For an increment of x cm in d, the change in girth is 0.722x (the gradient times the change in d). Setting 0.722x = 17.3 gives x = 17.3/0.722 ≈ 24.0 cm.\n+ Intuition: The intercept -42.3 doesn't matter for changes — only the gradient matters for increments.\n\n**Takeaway:** For \"increase of Y for each X increase,\" use only the gradient: ΔY = b × ΔX.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "For X ~ N(15, 2²), a student calculates P(X < 18) = P(Z < (18-2)/15) = P(Z < 1.07) = 0.8577. Explain the error and the correct standardisation. (1 step)", "answer": "- Step 1: The student divided by the mean (15) instead of the standard deviation (2). The correct standardisation is Z = (X - μ)/σ = (18 - 15)/2 = 1.5. Then P(Z < 1.5) = 0.9332.\n+ Memory trick: The denominator is always σ, never μ. The numerator is the difference from the mean.\n\n**Takeaway:** Z = (X - μ) / σ. Always subtract the mean, then divide by the standard deviation.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "\"Only the fastest 60% of adults from round one take part in round two.\" A student calculates the cutoff time as: P(X < t) = 0.4, giving t = 14.5 minutes. Explain why this is incorrect. (2 steps)", "answer": "- Step 1: \"Fastest\" means the shortest times. The fastest 60% are those who complete in the SHORTEST 60% of times — this corresponds to the LOWER tail, not the upper tail.\n- Step 2: We need P(X < t) = 0.60, not 0.40. Using inverse normal: z = Φ⁻¹(0.60) = 0.2533, giving t = 15 + 0.2533(2) = 15.51 minutes.\n+ Visual: Draw the normal curve. Shade the LEFT 60% (fastest times). The cutoff is on the left side, not the right.\n\n**Takeaway:** \"Fastest\" = shortest times = lower tail (left). \"Slowest\" = longest times = upper tail (right).", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Given P(μ - 10 < T < μ + 10) = 0.95, a student calculates σ = 10/1.96 = 0.051. Explain why this value is unreasonable and identify the decimal slip. (2 steps)", "answer": "- Step 1: The value σ = 0.051 minutes (about 3 seconds) is unreasonably small. The interval μ ± 10 spans 20 minutes total — if the standard deviation were only 0.05 minutes, essentially all values would be within ±10 of the mean (which is what the 0.95 probability says). But this doesn't match the problem context — times are measured in minutes, and a standard deviation of 0.05 minutes (3 seconds) for a task taking around 15 minutes is unrealistic.\n- Step 2: The correct calculation is σ = 10/1.96 = 5.10 minutes. The student moved the decimal point two places too far — wrote 0.051 instead of 5.10.\n+ Sanity check: σ should be of the same order of magnitude as the interval half-width. Here, 10/2 = 5 is close to 5.10.\n\n**Takeaway:** Always sanity-check your σ: it should be comparable to the scale of the problem, not orders of magnitude different.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": true}, {"question": "In the conditional probability P(T > μ - 5 | T > μ - 10), explain why we can simplify P(T > μ - 5 ∩ T > μ - 10) to just P(T > μ - 5). (1 step)", "answer": "- Step 1: Because the event {T > μ - 5} is a SUBSET of {T > μ - 10}. If T is greater than μ - 5 (i.e., greater than -5 from the mean), then T is definitely greater than μ - 10 (which is -10 from the mean, further left on the number line).\n+ Visual: On the number line: μ - 10 ---- μ - 5 ---- μ. If you're to the right of μ - 5, you're automatically to the right of μ - 10.\n+ So: P(A ∩ B) = P(A) when A ⊂ B.\n\n**Takeaway:** When the condition event is a subset of the given event, the intersection simplifies to just the smaller event.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": true}, {"question": "From the Venn diagram, P(C only) = 0.04, P(C ∩ S only, not G) = 0.12. A student calculates P(C ∩ G') as P(C) × P(G') = (0.31 + p) × (1 - 0.25) and gets different answers depending on p. Explain why this approach is invalid in part (a). (2 steps)", "answer": "- Step 1: P(C ∩ G') means \"plays Chess AND does NOT play Go.\" This is not the product of probabilities — that would be the formula for independent events, which we haven't established yet.\n- Step 2: Instead, we simply add the regions of the Venn diagram that are in C but outside G: P(C only) + P(C ∩ S only, not G) = 0.04 + 0.12 = 0.16. No independence assumption needed.\n+ Why it varies with p: p is in C ∩ G, which we're excluding anyway — the product approach would give different answers because it misapplies the independence formula.\n\n**Takeaway:** In Venn problems, identify regions directly from the diagram. Only use P(A ∩ B) = P(A)P(B) when independence is given or must be shown.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": true}, {"question": "Given C and S are independent, we have P(C ∩ S) = P(C)P(S). A student identifies P(C ∩ S) = 0.12 (the C ∩ S only region). Explain why this is incomplete. (2 steps)", "answer": "- Step 1: The intersection C ∩ S includes ALL regions where both Chess and Scrabble are played — this is the union of the \"C ∩ S only\" region (0.12) AND the triple intersection C ∩ S ∩ G (0.15).\n- Step 2: So P(C ∩ S) = 0.12 + 0.15 = 0.27. The student missed the triple overlap. Similarly, P(C) = C only + C ∩ S only + C ∩ G only + triple = 0.04 + 0.12 + p + 0.15.\n\n**Takeaway:** When working with Venn intersections, always identify ALL sub-regions that make up the intersection — including the portion shared with the third set.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "After finding p = 0.14, a student calculates q (outside all three games) by adding all known regions: 0.04 + 0 + 0.15 + 0.14 + 0.12 + 0.10 + 0.23 + q = 1. They solve and get q = 0.22. Explain what each of these eight regions represents. (1 step)", "answer": "- Step 1: The eight regions are: (1) C only = 0.04; (2) G only = 0; (3) triple overlap C ∩ S ∩ G = 0.15; (4) C ∩ G only = p = 0.14; (5) C ∩ S only = 0.12; (6) S ∩ G only = 0.10; (7) S only = 0.23; (8) outside all three = q. Their sum must equal 1 (total probability).\n+ Visual: These are the eight mutually exclusive, collectively exhaustive pieces that partition the sample space.\n\n**Takeaway:** The eight regions form a partition of the entire Venn diagram. Their sum is always 1.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "Calculate P(C | S ∩ G) — the probability a teenager plays Chess given that they play both Scrabble and Go. A student calculates this as P(C)/P(S ∩ G) = 0.45/0.25 = 1.8. Explain why this is wrong and what the correct calculation should be. (2 steps)", "answer": "- Step 1: The conditional formula is P(C | S ∩ G) = P(C ∩ (S ∩ G))/P(S ∩ G) = P(C ∩ S ∩ G)/P(S ∩ G). The student used P(C) in the numerator, which is wrong — we need the intersection of C with the given event (S ∩ G).\n- Step 2: P(C ∩ S ∩ G) = 0.15 (the triple overlap). P(S ∩ G) = 0.15 + 0.10 = 0.25 (triple + S ∩ G only). So P(C | S ∩ G) = 0.15/0.25 = 0.6.\n+ Intuition: We're restricting to the world where S and G both happen, then asking what fraction of those also have C.\n\n**Takeaway:** In conditional probability, the numerator must be the intersection of the event of interest with the given event, not the event of interest alone.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "There are 76 teenagers who play both Chess and Go. A student calculates: P(C ∩ G) = 0.15, so total = 76/0.15 = 506.7. Then P(S') = 0.04 + 0.14 = 0.18, so teenagers not playing Scrabble = 506.7 × 0.18 = 91.2 ≈ 91. Explain why this differs from the correct answer of 105. (3 steps)", "answer": "- Step 1: The student used P(C ∩ G) = 0.15 only, missing the C ∩ G only region p = 0.14. The correct P(C ∩ G) = p + 0.15 = 0.14 + 0.15 = 0.29. This gives total = 76/0.29 ≈ 262.\n- Step 2: The student calculated P(S') by adding only regions in the C circle (0.04 + 0.14 = 0.18). But \"not playing Scrabble\" includes ALL regions outside S — including the outside-everything region q = 0.22.\n- Step 3: The correct P(S') = 1 - P(S) = 1 - 0.60 = 0.40. Or explicitly: C only (0.04) + G only (0) + C ∩ G only (0.14) + outside (0.22) = 0.40. Then 262 × 0.40 = 104.8 ≈ 105.\n+ Key shortcut: For \"not A\" always use P(A') = 1 - P(A) — this automatically includes the outside region.\n\n**Takeaway:** For complement questions like \"doesn't play Scrabble,\" always use P(A') = 1 - P(A) to avoid missing regions outside the Venn circles.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}], "count": 29}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "For the Maple trees in Q1, N = 32 (even). The median is given as 45 cm. Using the stem-4 leaves `1, 1, 1, k, 7, 8` in ascending order, find k. (3 steps)", "answer": "- Step 1: For N = 32, the median position is the average of the 16th and 17th ordered values. These both fall in the stem-4 row.\n- Step 2: The 16th value = 40 + k, and the 17th value = 47. Setting the median to 45:\n$$(40 + k + 47)/2 = 45$$\n- Step 3: Solving: 87 + k = 90 ⇒ k = 3. The leaves remain in ascending order (1, 1, 1, 3, 7, 8).\n\n**Key insight:** k is a single digit leaf, not a sum or frequency. It must fit into the ascending sequence.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "For a dataset of n = 35 values, state the Edexcel S1 rule for finding the positions of Q₁ and Q₃. How does this differ from the (n+1)/4 rule? (2 steps)", "answer": "- Step 1: Calculate n/4 = 35/4 = 8.75. Since this is not an integer, round **up** to the next position: Q₁ is the 9th value. For 3n/4 = 26.25, round up to the 27th value: Q₃ is the 27th value.\n- Step 2: The (n+1)/4 rule is the **M-stats/GCSE rule** — not used in Edexcel S1. Edexcel uses: if n/4 is an integer, average that position and the next; if non-integer, round up.\n\n**Key difference:** Edexcel rounds up for non-integer positions; the alternative rule doesn't.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "For the Birch trees in Q1, the sorted data includes values at positions: 9th = 39 and 27th = 57. State Q₁ and Q₃, and explain why position 6 would be wrong. (2 steps)", "answer": "- Step 1: Q₁ = 39 cm, Q₃ = 57 cm (correct positions: 9th and 27th for n = 35).\n- Step 2: Using position 6 gives Q₁ = 35 — this is wrong. The error comes from using 35/4 = 8.75 and incorrectly taking the floor/round-down instead of rounding up to 9.\n\n**Misconception alert:** Some students calculate n/4 = 8.75 and take position 8 or 8.75 — but Edexcel requires rounding **up** to position 9.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Define the outlier rule used in Q1(c), and apply it to the Birch data where Q₁ = 39, Q₃ = 57. What is the IQR, and what are the lower and upper fences? (3 steps)", "answer": "- Step 1: Outlier definition: x < Q₁ − 1.5 × IQR OR x > Q₃ + 1.5 × IQR, where IQR = Q₃ − Q₁.\n- Step 2: IQR = 57 − 39 = 18. Then 1.5 × IQR = 27.\n- Step 3: Lower fence = 39 − 27 = 12; upper fence = 57 + 27 = 84. Values below 12 or above 84 are outliers.\n\n**Application:** Smallest Birch value is 28 (> 12, no low outlier). Only 85 cm exceeds 84 — one outlier.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "In a box plot, where does the whisker end when there are outliers present? Can the whisker go through an outlier? (1 step)", "answer": "The whisker stops at the most extreme **non-outlier** value. Outliers are plotted as separate crosses/asterisks beyond the whisker. The whisker must NOT extend through the outlier — it ends at 76 cm for Birch, with 85 cm marked as a cross.\n\n**Key rule:** Identify outliers first, then set whisker end at the next most extreme value inside the fences.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "When adding 4 new data points (27, a, 48, 2a) to the Maple dataset with no change to the box plot, what five statistics must remain unchanged? (3 steps)", "answer": "- Step 1: The five box plot statistics: minimum, Q₁, median, Q₃, and maximum.\n- Step 2: For Maple: min = 25, Q₁ = 36, median = 45, Q₃ = 54, max = 80. These five values constrain the possible a.\n- Step 3: From max: 2a ≤ 80 ⇒ a ≤ 40. From Q₁: a must not displace the 9th/10th values (both 36), so a ≥ 36. Combining: 36 ≤ a ≤ 40.\n\n**Key insight:** \"No change to box plot\" gives five separate constraints — don't stop after the ordering constraint.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "When comparing two distributions in a 1-mark question, what two elements must your comment include to get the mark? (1 step)", "answer": "Your comment must (i) compare a **specific statistic** (e.g., median, IQR) and (ii) state **both numerical values**. Example: \"The median Birch growth (48 cm) is greater than the median Maple growth (45 cm).\"\n\n**Avoid:** Vague statements like \"Birch are taller\" with no numbers, or comparing means when none were calculated.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "In the histogram for Q3, the bar for class 32 ≤ x < 36 has width 2.5 cm and height 7.5 cm. What two scale factors must you derive from this reference bar to find dimensions of other bars? (2 steps)", "answer": "- Step 1: Width scale: 2.5 cm corresponds to class width 4 mm, so scale = 2.5/4 = 0.625 cm per mm.\n- Step 2: Height scale: 7.5 cm corresponds to frequency density = frequency ÷ class width = 20 ÷ 4 = 5, so scale = 7.5/5 = 1.5 cm per unit FD.\n\n**Key concept:** In a histogram, **area** is proportional to frequency. Both width and height scales must be derived separately.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "For the class 30 ≤ x < 32 (frequency = 16, class width = 2 mm), calculate the frequency density and hence the bar dimensions using the scales from Q1.9. (3 steps)", "answer": "- Step 1: Frequency density = 16 ÷ 2 = 8.\n- Step 2: Bar width = 2 mm × 0.625 cm/mm = 1.25 cm.\n- Step 3: Bar height = 8 × 1.5 cm = 12 cm.\n\n**Check:** Area = 1.25 × 12 = 15 cm², proportional to frequency 16 — reasonable given the reference bar's area was 2.5 × 7.5 = 18.75 cm² for frequency 20.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "For a discrete random variable X with probability distribution P(X=x), how do you calculate E(X²)? Why is it not simply [E(X)]²? (2 steps)", "answer": "- Step 1: E(X²) = Σ (x² × P(X=x)) — you square the x-values, not the probabilities.\n- Step 2: This is fundamentally different from [E(X)]² = (Σ x × P(X=x))². In general, E(X²) ≠ [E(X)]². The difference is the variance: Var(X) = E(X²) − [E(X)]².\n\n**Common error:** Squaring the probability instead of the x-value — e.g., writing 0.25² instead of 2² × 0.25.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Given E(X) = 4.6 and the probability distribution from Q2, calculate E(X²) and hence show Var(X) = 4.14. (3 steps)", "answer": "- Step 1: E(X²) = 2²(0.25) + 4²(0.3) + 5²(0.2) + 7²(0.1) + 8²(0.15) = 1 + 4.8 + 5 + 4.9 + 9.6 = 25.3\n- Step 2: Var(X) = E(X²) − [E(X)]² = 25.3 − (4.6)² = 25.3 − 21.16\n- Step 3: = 4.14 ✓\n\n**Formula note:** Var(X) = E(X²) − [E(X)]² is NOT in some formula booklets — memorize it.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "For Y = aX − b, where a and b are positive constants, what are the formulas for E(Y) and Var(Y) in terms of E(X) and Var(X)? (2 steps)", "answer": "- Step 1: E(Y) = aE(X) − b (the constant b is subtracted, not added)\n- Step 2: Var(Y) = a² Var(X) (the constant b disappears; the variance scales by a²)\n\n**Key insight:** Adding/subtracting a constant shifts the mean but doesn't affect spread. Multiplying by a scales both the mean and variance (variance by a²).", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "In Q2(c), you are given E(Y) = 13.4 and Var(Y) = 66.24, with Var(X) = 4.14. Explain why you should find a from the variance equation first, before using the expectation equation. (2 steps)", "answer": "- Step 1: The variance equation Var(Y) = a² Var(X) involves only a: 66.24 = a² × 4.14 ⇒ a² = 16 ⇒ a = 4 (positive).\n- Step 2: If you used E(Y) first, you'd have 13.4 = 4E(X) − b, but b is unknown — you'd have two unknowns in one equation. Starting with variance eliminates b.\n\n**Strategy:** Always start with variance when given both — it isolates the multiplier a first.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "In the game in Q2(d), Sam's score is S = X₁ (from one spin) and Alex's score is R = 2X₂ − 3 (from a separate spin). Why are S and R independent, and how do you calculate P(Sam wins)? (3 steps)", "answer": "- Step 1: They come from **two separate spins** of the spinner — different trials. The outcomes do not affect each other, so S and R are independent.\n- Step 2: Build the R-distribution: R-values are 1, 5, 7, 11, 13 with probabilities matching X₂.\n- Step 3: P(Sam wins) = Σ P(S = s) × P(R < s) over all s values. Since independent, multiply and sum.\n\n**Common error:** Treating S and R as dependent (using one spin for both) — they're clearly from separate spins.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "For the R-distribution in Q2(d), complete the table and calculate P(R < 7). What values of R are less than 7? (2 steps)", "answer": "- Step 1: R = 2X − 3 gives: X=2→R=1, X=4→R=5, X=5→R=7, X=7→R=11, X=8→R=13. The probabilities stay the same.\n- Step 2: P(R < 7) = P(R=1) + P(R=5) = 0.25 + 0.30 = 0.55. Note: R=7 is NOT included (strict inequality for \"wins\").\n\n**Key point:** \"Higher score wins\" means strict inequality — ties are draws, not wins.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "For grouped continuous data with n = 50, what is the formula for finding the median using linear interpolation, and what values do L, Fb, fm, and c represent? (3 steps)", "answer": "- Step 1: Median = L + (N/2 − Fb)/fm × c\n- Step 2: L = lower class boundary of the median class; Fb = cumulative frequency BEFORE the median class; fm = frequency in the median class; c = class width.\n- Step 3: For the data in Q3: N/2 = 25, median class is 32-36 (cumulative 18 before, 20 in class), so Median = 32 + (25−18)/20 × 4 = 33.4 mm\n\n**Common error:** Using (N+1)/2 instead of N/2 — that's for discrete data, not grouped continuous.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "In Q3(c), the coding is given as 10y = w − 20. What does this mean, and how do you find the mean of w from the mean of y? (2 steps)", "answer": "- Step 1: Rearrange: w = 10y + 20. This is a linear transform: multiply by 10, then add 20.\n- Step 2: For means: w̄ = 10ȳ + 20. Given ȳ = 104/50 = 2.08, w̄ = 10(2.08) + 20 = 40.8 grams.\n\n**Key formula:** If w = ay + b, then w̄ = aȳ + b. The same coefficients pass through expectations.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "The coded data gives Σy = 104, Σy² = 233.54 for n = 50. Calculate the variance of y, then find the standard deviation of w. (4 steps)", "answer": "- Step 1: S_yy = Σy² − (Σy)²/n = 233.54 − (104)²/50 = 233.54 − 216.32 = 17.22\n- Step 2: Var(y) = S_yy/n = 17.22/50 = 0.3444\n- Step 3: σ_y = √0.3444 = 0.5868\n- Step 4: For w = 10y + 20, variance scales by 10² = 100, so σ_w = 10 × 0.5868 = 5.87 grams\n\n**Key insight:** The constant +20 drops out of the standard deviation — it doesn't affect spread.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "In Q3(e), a pebble weighing exactly 40.8 grams (the mean) is added to the sample. Without calculation, state the effect on (i) the mean, and (ii) the standard deviation. Give reasons. (2 steps)", "answer": "- Step 1: (i) The mean stays **exactly the same** at 40.8 grams. Reason: adding a value equal to the current mean doesn't change the sum divided by n.\n- Step 2: (ii) The standard deviation **decreases**. Reason: the new value contributes zero to the sum of squared deviations (since deviation from mean = 0), while the denominator increases from 50 to 51. Variance = S_xx/(n+1) becomes smaller.\n\n**Key concept:** Adding a value at the mean dilutes the variance — zero numerator, larger denominator.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": true}, {"question": "Define S_xy and state the formula used to calculate it from summary statistics. What does a positive S_xy indicate about the relationship between x and y? (2 steps)", "answer": "- Step 1: S_xy = Σxy − (Σx)(Σy)/n. It measures the total \"co-variation\" between x and y, adjusting for the means.\n- Step 2: Positive S_xy means that when x is above its mean, y tends to also be above its mean — a positive association. Negative means inverse relationship.\n\n**Key note:** S_xy is NOT in the formula booklet in this form — memorize it. The booklet gives S_xx and S_yy formulas similarly.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Given S_dd = 16769.78, S_dg = 12105.12, S_gg = 9094.20, calculate the product moment correlation coefficient r. (2 steps)", "answer": "- Step 1: r = S_dg / √(S_dd × S_gg) = 12105.12 / √(16769.78 × 9094.20)\n- Step 2: Denominator = √(152508000) ≈ 12349.4, so r ≈ 12105.12/12349.4 = 0.980 (3 s.f.)\n\n**Sanity check:** r must be between −1 and 1. 0.980 indicates a very strong positive linear relationship.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "For the regression line of g on d, what are the formulas for the gradient b and intercept a? Which S-values go in which position? (2 steps)", "answer": "- Step 1: Gradient b = S_dg / S_dd. Always divide by S_xx where x is the predictor (independent) variable.\n- Step 2: Intercept a = ȳ − bx̄ = (Σg/n) − b(Σd/n). Use the **unrounded** b when computing a.\n\n**Common error:** Using S_gg instead of S_dd in the denominator — that would give the wrong regression line (d on g, not g on d).", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "Given Σd = 1456.8, Σg = 713.2 for n = 8 bears, find x̄ and ȳ, then calculate the regression line g on d, showing b = 0.72184 and a ≈ −42.3. (3 steps)", "answer": "- Step 1: x̄ = 1456.8/8 = 182.1 cm; ȳ = 713.2/8 = 89.15 cm\n- Step 2: b = 12105.12/16769.78 = 0.72184... ≈ 0.722\n- Step 3: a = 89.15 − 0.72184 × 182.1 = 89.15 − 131.45 = −42.30 ≈ −42.3. Line: g = −42.3 + 0.722d\n\n**Important:** Use the full b value in the intercept calculation — rounding b to 0.722 would make a slightly different at the 3 s.f. level.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In context, what does the gradient b = 0.722 in the regression of g on d mean? (1 step)", "answer": "For every 1 cm increase in the length of a bear, the girth increases by approximately **0.722 cm** on average.\n\n**Key:** State in context with units — \"girth\" and \"length\", not just \"y\" and \"x\".", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "Using the regression line g = −42.3 + 0.722d, estimate girth for (i) d = 2.5 m, and (ii) d = 0.5 m. Why is (ii) unreliable? (3 steps)", "answer": "- Step 1: Convert units: 2.5 m = 250 cm. g = −42.3 + 0.722(250) = −42.3 + 180.5 = 138.2 cm\n- Step 2: For 0.5 m = 50 cm: g = −42.3 + 0.722(50) = −42.3 + 36.1 = −6.2 cm (nonsense — girth can't be negative)\n- Step 3: This estimate is **unreliable** because 50 cm is outside the observed range of bear lengths (observed mean was 182.1 cm). Regression should only be used for **interpolation**, not extrapolation.\n\n**Key concept:** Linear relationships may not hold outside the data range — extrapolation is risky.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "The biologist states that for each x cm increase in length, girth increases by 17.3 cm. Using the gradient 0.722, find x. (2 steps)", "answer": "- Step 1: The change in girth = b × (change in length). So 0.722 × x = 17.3\n- Step 2: x = 17.3 / 0.722 = 23.96 ≈ 24.0 cm\n\n**Important:** Don't add the intercept for incremental changes — only the gradient matters.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "X ~ N(15, 2²). Find P(X < 18) using standardisation. Show the z-value and state the final answer. (2 steps)", "answer": "- Step 1: Standardise: Z = (X − μ)/σ = (18 − 15)/2 = 1.5\n- Step 2: P(X < 18) = P(Z < 1.5) = 0.9332 (from normal tables)\n\n**Formula:** For X ~ N(μ, σ²), standardise to Z ~ N(0, 1) using Z = (X − μ)/σ.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "\"Only the fastest 60% of adults from round one take part in round two.\" Find the longest time t that qualifies. Why is this a LOWER tail problem? (3 steps)", "answer": "- Step 1: \"Fastest\" means shortest time — we want the 60% with the **shortest** times, i.e., below some cutoff t.\n- Step 2: So P(X < t) = 0.60. From inverse normal, z = Φ⁻¹(0.60) = 0.2533\n- Step 3: t = μ + zσ = 15 + 0.2533 × 2 = 15 + 0.5066 = 15.5 minutes\n\n**Critical point:** Many students incorrectly use the upper tail (z = −0.2533, t = 14.5). Always sketch and label \"fastest = lower tail\".", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "Given P(μ − 10 < T < μ + 10) = 0.95 for T ~ N(μ, σ²), find σ. Explain the symmetry reasoning. (3 steps)", "answer": "- Step 1: By symmetry of the normal distribution, P(T < μ − 10) = (1 − 0.95)/2 = 0.025\n- Step 2: Standardise: (μ − 10 − μ)/σ = −10/σ = −1.96 (from Φ⁻¹(0.975) = 1.96)\n- Step 3: −10/σ = −1.96 ⇒ σ = 10/1.96 = 5.10 (3 s.f.)\n\n**Key insight:** The 95% symmetric interval corresponds to ±1.96 standard deviations from the mean. σ should be roughly the same order as the half-width — here ~5, not 0.5.\n\n**Common error:** Decimal slip — writing σ = 0.510 instead of 5.10. Always sanity-check: σ should be smaller than the range of data but not tiny.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "In Q5(c), find P(T > μ − 5 | T > μ − 10). Explain why you can treat the numerator as P(T > μ − 5) directly. (4 steps)", "answer": "- Step 1: Since {T > μ − 5} is a **subset** of {T > μ − 10} (if you're above μ − 5, you're certainly above μ − 10), we have (T > μ − 5) ∩ (T > μ − 10) = (T > μ − 5).\n- Step 2: So P(T > μ − 5 | T > μ − 10) = P(T > μ − 5) / P(T > μ − 10)\n- Step 3: Numerator: standardise (μ − 5 − μ)/5.10 = −5/5.10 = −0.98. P(Z > −0.98) = P(Z < 0.98) = 0.8365\n- Step 4: Denominator: P(T > μ − 10) = 1 − 0.025 = 0.975. So answer = 0.8365/0.975 = 0.858\n\n**Key insight:** When A ⊂ B, the conditional probability simplifies: P(A|B) = P(A)/P(B).", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "For a normal distribution, what is the relationship between Φ(z), the z-value, and the probability? How do you find z when given a probability? (2 steps)", "answer": "- Step 1: Φ(z) = P(Z ≤ z) gives the cumulative probability up to z. Tables typically give Φ(z) for positive z.\n- Step 2: To find z given a probability p: if p < 0.5, find 1 − p in the table; if p > 0.5, find p directly. The z-value is where Φ(z) = p.\n\n**Important:** Φ⁻¹(0.60) = 0.2533 means P(Z < 0.2533) = 0.60. Don't confuse with the tail probability.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "In the Venn diagram for Q6, C = Chess, S = Scrabble, G = Go. Given regions: C only = 0.04, C∩S only = 0.12, C∩G∩S = 0.15, C∩G only = p. Find P(C ∩ G'). (2 steps)", "answer": "- Step 1: C ∩ G' means in C but NOT in G — this includes the C-only region and the C∩S-only region (since C∩S doesn't involve G).\n- Step 2: P(C ∩ G') = P(C only) + P(C ∩ S only) = 0.04 + 0.12 = 0.16\n\n**Key:** Don't include regions that involve G (the p region and the triple overlap).", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "Events C and S are independent. Given P(C) = 0.31 + p, P(S) = 0.60, and P(C ∩ S) = 0.27, find p. (3 steps)", "answer": "- Step 1: Independence means P(C ∩ S) = P(C) × P(S)\n- Step 2: 0.27 = (0.31 + p) × 0.60\n- Step 3: 0.31 + p = 0.27/0.60 = 0.45 ⇒ p = 0.14\n\n**Important:** P(C ∩ S) must include ALL regions where both C and S overlap — that is 0.12 (C∩S only) + 0.15 (triple overlap) = 0.27.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "Using p = 0.14 from Q6(b), find q (the outside region) given all probabilities sum to 1. The regions are: 0.04, 0, 0.15, p, 0.12, 0.10, 0.23, q. (2 steps)", "answer": "- Step 1: Sum = 0.04 + 0 + 0.15 + 0.14 + 0.12 + 0.10 + 0.23 + q = 0.78 + q\n- Step 2: Set equal to 1: 0.78 + q = 1 ⇒ q = 0.22\n\n**Check:** All eight regions now sum to 1.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "Find (i) P((C ∪ S) ∩ G') and (ii) P(C | S ∩ G). (3 steps)", "answer": "- Step 1: (C ∪ S) ∩ G' means in C or S but outside G: C only (0.04) + C∩S only (0.12) + S only (0.23) = 0.39\n- Step 2: For conditional, P(C | S ∩ G) = P(C ∩ S ∩ G) / P(S ∩ G)\n- Step 3: Numerator = 0.15; denominator = P(S ∩ G) = 0.15 + 0.10 = 0.25. So answer = 0.15/0.25 = 0.6\n\n**Key point:** For (ii), P(S ∩ G) includes both the triple overlap and the S∩G-only region.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "In the youth club, 76 teenagers play both Chess and Go. Using P(C ∩ G) = p + 0.15 = 0.29, estimate the total number of teenagers, then find how many do NOT play Scrabble. (3 steps)", "answer": "- Step 1: P(C ∩ G) = 0.14 + 0.15 = 0.29. Total = 76 / 0.29 = 262.07 ≈ 262\n- Step 2: P(S') = 1 − P(S) = 1 − 0.60 = 0.40 (using the shortcut)\n- Step 3: Number not playing Scrabble = 262 × 0.40 = 104.8 ≈ 105\n\n**Critical error to avoid:** Computing P(S') by adding only some Venn pieces (e.g., 0.04 + 0.14 = 0.18) and forgetting the outside region q = 0.22. The shortcut 1 − P(S) automatically includes all non-S regions.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "In the Venn diagram, what is the difference between \"plays neither game\" (outside all three) and \"does not play Scrabble\"? Can these be the same? (2 steps)", "answer": "- Step 1: \"Plays neither\" is the region outside all three circles — that's q = 0.22.\n- Step 2: \"Does not play Scrabble\" includes everyone outside the S circle — that is C only + G only + (C∩G) + q. This is much larger. They are NOT the same unless S covers everything.\n\n**Key insight:** \"Not S\" = S' = the entire complement of S, including the outside region. Don't forget q.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}], "count": 37}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "In a back-to-back stem-and-leaf diagram, in what direction are the left-hand side leaves read, and why is this convention used? (2 steps)", "answer": "- Step 1: The left-hand leaves are read **outwards from the stem**, i.e. **right-to-left**. So for a stem of 5 with left leaves \"7 7 7 5 4 3 2 1 0\", the smallest leaf (0) sits immediately next to the stem, and the largest (7) sits at the far left.\n- Step 2: This convention exists because both sides of the diagram must place the **smallest values closest to the stem** so that the visual \"width\" of each row faithfully represents how many observations are in that class — like a mirror-image histogram.\n\nTakeaway: always read the **key** first, and remember \"closer to stem = smaller value\" on both sides.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "For a discrete dataset with $$n$$ values, what is the Edexcel S1 rule for finding the position of $$Q_1$$ (and analogously $$Q_3$$)? (2 steps)", "answer": "- Step 1: Compute $$n/4$$ (or $$3n/4$$ for $$Q_3$$).\n- Step 2: Two cases:\n+ If $$n/4$$ is **not** an integer → **round up** to the next position; that position is $$Q_1$$.\n+ If $$n/4$$ **is** an integer → $$Q_1$$ is the **average** of the $$(n/4)$$th and $$(n/4+1)$$th ordered values.\n\nNote: this is **not** $$(n+1)/4$$ (a GCSE-style rule) and is **not** in the formula booklet — memorize it.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Why does the Edexcel rule treat $$n/4$$ integer vs. non-integer differently for quartile position? (3 steps)", "answer": "- Step 1: Quartiles try to split a sample into four equal portions. When $$n/4$$ is not a whole number, there is no exact \"boundary\" data point, so we deterministically round up to land on a single observation.\n- Step 2: When $$n/4$$ is exactly a whole number, the cut falls **between** two data points (e.g. for $$n=32$$, between the 8th and 9th). Choosing only one would bias the quartile toward that side.\n- Step 3: The fairest convention in this integer case is to **average** the two flanking values, treating the quartile as the midpoint of that gap.\n\nTakeaway: integer → average (interpolation); non-integer → round up (deterministic).", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "A dataset has $$n=35$$ values. What positions in the sorted list are $$Q_1$$ and $$Q_3$$? (2 steps)", "answer": "- Step 1: $$n/4 = 8.75$$, non-integer → round up to the **9th** value for $$Q_1$$.\n- Step 2: $$3n/4 = 26.25$$, non-integer → round up to the **27th** value for $$Q_3$$.\n\nA common slip is taking $$Q_1$$ at the 8th or 9th by mistake without applying the round-up rule — always commit the \"non-integer → round up\" rule to memory.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "When using a back-to-back stem-and-leaf with $$N=32$$ on one side, why does finding the median involve two specific positions, and what are they?", "answer": "Because $$N=32$$ is even, there is no single middle observation. The median is defined as the **average of the $$N/2$$th and $$(N/2+1)$$th** values — that is, the 16th and 17th ordered values. Locating these requires walking through the **cumulative** stem frequencies to identify which row contains positions 16 and 17.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "In a stem-and-leaf diagram, a leaf is shown as the variable $$k$$. What does $$k$$ represent, and what range must it lie in? (2 steps)", "answer": "- Step 1: $$k$$ is a **single digit** in the row — one specific leaf. It is **not** a frequency, not a count, and not a sum. The value it represents is $$\\text{stem} \\times 10 + k$$ (in standard scaling).\n- Step 2: Because all leaves in a row are written in ascending order, $$k$$ must be **between the leaf immediately before it and the leaf immediately after it**. E.g., in a row \"1 1 1 $$k$$ 7 8\", we need $$1 \\le k \\le 7$$.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "A Maple dataset has $$N=32$$ and median 45. The stem-4 row reads \"1 1 1 $$k$$ 7 8\" (positions 13–18). How would you set up an equation for $$k$$? (3 steps)", "answer": "- Step 1: For $$N=32$$, median is average of 16th and 17th values. Locate them in the stem-4 row.\n- Step 2: The 16th value sits at the 4th leaf of the row, which is $$40+k$$. The 17th value sits at the 5th leaf, which is $$47$$.\n- Step 3: Set $$\\frac{(40+k)+47}{2}=45$$ and solve: $$87+k=90 \\Rightarrow k=3$$.\n\nThe conceptual move is mapping list position → row position → leaf value, using cumulative counts.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "What is the definition of an outlier in Edexcel S1 (the version typically given in exam stems)?", "answer": "An observation $$x$$ is an outlier if $$x < Q_1 - 1.5(Q_3-Q_1)$$ or $$x > Q_3 + 1.5(Q_3-Q_1)$$. The interval $$[Q_1 - 1.5\\,\\text{IQR},\\ Q_3 + 1.5\\,\\text{IQR}]$$ defines the \"non-outlier fences\"; any value outside is flagged. This formula is **not in the formula booklet** — memorize it.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "Why is the multiplier 1.5 used in the outlier rule (instead of, say, 1 or 2)? (2 steps)", "answer": "- Step 1: For a roughly normal distribution, the quartiles are about $$\\pm 0.67\\sigma$$ from the mean, so $$\\text{IQR} \\approx 1.35\\sigma$$. The lower fence at $$Q_1 - 1.5\\,\\text{IQR}$$ then sits at roughly $$-2.7\\sigma$$ — capturing only the most extreme tails (~0.7%) as outliers.\n- Step 2: This is
