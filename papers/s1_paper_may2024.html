<script>
const DATA={"selected": [{"question": "Why is the shortcut $$P(S') = 1 - P(S)$$ much safer than summing the not-Scrabble regions individually?", "answer": "Summing manually risks **forgetting regions** that aren't visually prominent — especially the \"outside all three sets\" region $$q$$ and any \"single-set only with frequency 0\" regions ($$G$$ only = 0 here). The Q6(e) mistake (47 instead of 105) came from summing only the Chess-side not-Scrabble pieces ($$0.04 + 0.14 = 0.18$$), missing $$q = 0.22$$ and the $$G$$-only sliver. The complement shortcut $$1 - P(S)$$ guarantees inclusion of every region outside $$S$$.", "source": "Opus 4.7 ②", "_id": "opus_2_55"}, {"question": "What's the difference between \"and\" (intersection) and \"or\" (union) in probability, and how does inclusion-exclusion link them? (2 steps)", "answer": "- Step 1: $$P(A \\cap B)$$ = both events happen; $$P(A \\cup B)$$ = at least one of the events happens.\n- Step 2: Inclusion-exclusion: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$. The $$-P(A\\cap B)$$ correction prevents double-counting the overlap. For three sets:\n$$P(A \\cup B \\cup C) = P(A) + P(B) + P(C) - P(A\\cap B) - P(A\\cap C) - P(B\\cap C) + P(A\\cap B\\cap C).$$\n\nThe triple-intersection term is added back because it was subtracted three times then subtracted again.", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "In the conditional probability P(T > μ - 5 | T > μ - 10), explain why we can simplify P(T > μ - 5 ∩ T > μ - 10) to just P(T > μ - 5). (1 step)", "answer": "- Step 1: Because the event {T > μ - 5} is a SUBSET of {T > μ - 10}. If T is greater than μ - 5 (i.e., greater than -5 from the mean), then T is definitely greater than μ - 10 (which is -10 from the mean, further left on the number line).\n+ Visual: On the number line: μ - 10 ---- μ - 5 ---- μ. If you're to the right of μ - 5, you're automatically to the right of μ - 10.\n+ So: P(A ∩ B) = P(A) when A ⊂ B.\n\n**Takeaway:** When the condition event is a subset of the given event, the intersection simplifies to just the smaller event.", "source": "MiniMax ①", "_id": "minimax_1_23"}, {"question": "A new pebble weighing exactly $$40.8$$ grams (the current mean) is added to the sample. Explain the effect on the mean and standard deviation, referencing the algebraic structure of their formulas. (3 steps)", "answer": "- Step 1: The new mean is $$\\frac{50\\bar{w} + 40.8}{51} = \\frac{50(40.8)+40.8}{51} = \\frac{51 \\times 40.8}{51} = 40.8$$. Because the added value equals the existing mean, the weighted average is unchanged.\n- Step 2: For variance, the numerator is the sum of squared deviations $$\\sum (x_i - \\bar{x})^2$$. The new value contributes $$(40.8-40.8)^2=0$$ to this sum.\n- Step 3: The denominator increases from $$50$$ to $$51$$. With a fixed numerator and a larger denominator, the variance decreases, so the standard deviation also decreases. The new data point sits exactly at the centre, tightening the overall spread.", "source": "Kimi K2.6 ②", "_id": "kimi_2_22"}, {"question": "When events $$C$$ and $$S$$ are independent, the equation is $$P(C \\cap S) = P(C)P(S)$$. Explain which regions in the Venn diagram constitute $$P(C \\cap S)$$ and why omitting the triple overlap $$0.15$$ would lead to an incorrect value of $$p$$. (2 steps)", "answer": "- Step 1: $$P(C \\cap S)$$ is the **entire** lens-shaped intersection of circles $$C$$ and $$S$$. It comprises two regions: the \"$$C \\cap S$$ only\" region ($$0.12$$) and the triple overlap $$C \\cap S \\cap G$$ ($$0.15$$). Together they sum to $$0.27$$.\n- Step 2: If you mistakenly used only $$0.12$$ for $$P(C \\cap S)$$, the independence equation would read $$0.12 = (0.31+p)(0.60)$$, giving $$p = -0.11$$, which is impossible for a probability. The inconsistency flags the error; the correct total intersection $$0.27$$ yields $$p=0.14$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_38"}, {"question": "From the Venn diagram, P(C only) = 0.04, P(C ∩ S only, not G) = 0.12. A student calculates P(C ∩ G') as P(C) × P(G') = (0.31 + p) × (1 - 0.25) and gets different answers depending on p. Explain why this approach is invalid in part (a). (2 steps)", "answer": "- Step 1: P(C ∩ G') means \"plays Chess AND does NOT play Go.\" This is not the product of probabilities — that would be the formula for independent events, which we haven't established yet.\n- Step 2: Instead, we simply add the regions of the Venn diagram that are in C but outside G: P(C only) + P(C ∩ S only, not G) = 0.04 + 0.12 = 0.16. No independence assumption needed.\n+ Why it varies with p: p is in C ∩ G, which we're excluding anyway — the product approach would give different answers because it misapplies the independence formula.\n\n**Takeaway:** In Venn problems, identify regions directly from the diagram. Only use P(A ∩ B) = P(A)P(B) when independence is given or must be shown.", "source": "MiniMax ①", "_id": "minimax_1_24"}, {"question": "Why is the formula $$\\sigma^2 = \\frac{\\sum x^2}{n} - \\bar{x}^2$$ **not** in the IAL formula booklet, and why is this notable? (2 steps)", "answer": "- Step 1: Edexcel's IAL formula booklet only provides $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$ (the discrete probability form). The raw-sum form for ungrouped data is omitted, even though it's the workhorse for $$\\sum x, \\sum x^2$$-style computations.\n- Step 2: It's notable because students must memorize this form independently — relying on the booklet during the exam leaves them unable to compute standard deviation from raw sums (e.g. Q3(d) of this paper). A common variant of the formula uses $$\\bar{x}$$ explicitly: $$\\sigma^2 = \\frac{\\sum x^2}{n} - \\bar{x}^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_67"}, {"question": "What's the bigger lesson from the headline mistakes in this paper (Q5b tail direction, Q5c decimal slip, Q6e missing complement region)? (3 steps)", "answer": "- Step 1: All three are **translation errors** — converting English to mathematics — not arithmetic errors. The mechanics (look up table, divide) were known.\n- Step 2: \"Fastest\" → wrong tail; \"$$\\sigma$$ from 10/1.96\" → wrong decimal place; \"not Scrabble\" → wrong complement region. Each fails at the moment of mapping a word/concept into a precise mathematical statement.\n- Step 3: The drill is **slow down** at translation boundaries: sketch a diagram for tail questions; sanity-check $$\\sigma$$ against the interval scale; use $$P(A') = 1 - P(A)$$ as the safest complement shortcut.\n\nMechanics is reliable; translation is where marks are lost.", "source": "Opus 4.7 ①", "_id": "opus_1_74"}, {"question": "Once $$Q_1 = 39$$ and $$Q_3 = 57$$ are found for the Birch trees, walk through the conceptual steps to show there is only one outlier, and identify the most common pitfall when checking the upper fence. (3 steps)", "answer": "- Step 1: Compute the interquartile range: $$\\text{IQR} = Q_3 - Q_1 = 57 - 39 = 18$$. The outlier fences are $$Q_1 - 1.5 \\times \\text{IQR} = 39 - 27 = 12$$ and $$Q_3 + 1.5 \\times \\text{IQR} = 57 + 27 = 84$$.\n- Step 2: Check the smallest Birch value: the minimum is 28, which is greater than 12, so there are no low outliers. Check the largest values: only 85 exceeds 84, so there is exactly one high outlier.\n- Step 3: The common pitfall is stopping at the maximum value (85) without checking whether the next-largest value (76) lies inside the fence. The whisker must stop at 76, the most extreme non-outlier, but the outlier count itself still comes from comparing every value to the fences.", "source": "Kimi K2.6 ①", "_id": "kimi_1_5"}, {"question": "If event $$A$$ is a subset of event $$B$$ ($$A \\subset B$$), how does this simplify the conditional probability $$P(A \\mid B)$$? (2 steps)", "answer": "- Step 1: The conditional probability formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$.\n- Step 2: If $$A$$ is entirely within $$B$$, then the intersection $$A \\cap B$$ is just $$A$$ itself. So the formula simplifies to $$P(A \\mid B) = \\frac{P(A)}{P(B)}$$.\n+ Example: If $$T > \\mu - 5$$, then automatically $$T > \\mu - 10$$. So $$\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$$, and $$P(T > \\mu - 5 \\mid T > \\mu - 10) = \\frac{P(T > \\mu - 5)}{P(T > \\mu - 10)}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "Why does Var(aX±b) = a²Var(X) but E(aX±b) = aE(X)±b? (3 steps)", "answer": "- Step 1: Variance measures spread — adding b shifts data but doesn't change spread.\n- Step 2: Multiplying by a scales spread by a² (since variance is squared deviations).\n- Step 3: Expectation is linear — both scaling (a) and shifting (b) affect the mean.\n\n> **Edge case:** If a=0, Var(0X±b)=0 (all values constant).", "source": "Qwen 3 ③", "_id": "qwen_3_8"}, {"question": "In Q1(f), four new Maple values (27, $$a$$, 48, $$2a$$) are added to $$N = 32$$, giving $$N = 36$$. Explain conceptually why “no change to the box plot” imposes constraints on the minimum, maximum, and quartiles, and why $$N = 36$$ changes the quartile calculation rule. (3 steps)", "answer": "- Step 1: A box plot displays five statistics: minimum, $$Q_1$$, median, $$Q_3$$, and maximum. “No change” means each of these five must equal their original Maple values: 25, 36, 45, 54, 80 respectively.\n- Step 2: Because $$N = 36$$ is divisible by 4, $$Q_1$$ becomes the average of the 9th and 10th values, the median becomes the average of the 18th and 19th, and $$Q_3$$ becomes the average of the 27th and 28th — different from the original $$N = 32$$ positions.\n- Step 3: Therefore the new values must be positioned so that these averaged pairs still yield 36, 45, and 54, while the new maximum $$2a$$ must not exceed 80 and the new value $$a$$ must not displace the 9th/10th values from 36.", "source": "Kimi K2.6 ①", "_id": "kimi_1_8"}, {"question": "Synthesising: In Q3(d), the standard deviation of $$w$$ is found by coding to $$y$$ and scaling back. Explain conceptually why this coding method is numerically safer than working directly with $$w$$ if the raw $$w$$ values were large and numerous. (2 steps)", "answer": "- Step 1: Large raw values can produce enormous sums of squares, increasing rounding error during subtraction. Coding shifts and scales the data to smaller, more manageable numbers (here $$\\bar{y} = 2.08$$ instead of $$\\bar{w} = 40.8$$).\n- Step 2: Because linear coding preserves the structure of spread — scaling variance by $$a^2$$ and leaving shift unchanged — you can perform the sensitive variance calculation on the smaller coded values and then scale back once at the end.", "source": "Kimi K2.6 ①", "_id": "kimi_1_46"}, {"question": "The coding relationship is given as 10y = w - 20. A student calculates the mean of w as: w̄ = (Σw)/n = (Σ(10y+20))/n = 10(Σy)/n + 20 = 10(2.08) + 20 = 20.8 + 20 = 40.8. Explain why this works and what property of linear coding makes it valid. (2 steps)", "answer": "- Step 1: The key property is: if w = aY + b (linear transform), then Ē = aĒ(Y) + b. This is because expectation is a linear operator: E(aY + b) = aE(Y) + b.\n- Step 2: We computed ȳ = 104/50 = 2.08, then w̄ = 10(2.08) + 20 = 40.8. We never needed to convert individual w values — we transformed the mean of y, not the sum of w.\n+ Intuition: The coding just shifts and scales the entire distribution. The mean transforms the same way individual values do.\n\n**Takeaway:** Linear coding transforms the mean directly: w̄ = aȳ + b. No need to \"decode\" individual values first.", "source": "MiniMax ①", "_id": "minimax_1_13"}, {"question": "What is the safest and most efficient way to calculate the probability of the complement, $$P(A')$$, in a Venn diagram, and why? (3 steps)", "answer": "- Step 1: The complement of $$A$$ is everything outside the $$A$$ circle.\n- Step 2: Instead of adding up all the individual regions outside $$A$$ (which risks missing the 'outside all circles' region), use the shortcut: $$P(A') = 1 - P(A)$$.\n- Step 3: This guarantees you include the entire universe outside of $$A$$, including the region outside all three circles.\n+ Critical Misconception: Forgetting the outside region ($$q$$) is a common error. Using $$1 - P(A)$$ completely avoids this trap.", "source": "GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "If the regression line is $$g = -42.3 + 0.722d$$, how do you find the length increase $$x$$ that corresponds to a 17.3 cm girth increase? (2 steps)", "answer": "- Step 1: Recognize that an increment in girth depends ONLY on the gradient and the increment in length.\n- Step 2: Set up the equation: $$0.722 \\times x = 17.3$$, and solve for $$x = 17.3 / 0.722$$.\n+ Misconception: Do NOT set $$-42.3 + 0.722x = 17.3$$. The 17.3 is an *increment* in $$g$$, not a total value of $$g$$. The intercept is irrelevant for increments.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "Why does P(μ-10 < T < μ+10) = 0.95 imply σ = 10/1.96 for normal distribution? (3 steps)", "answer": "- Step 1: Standardize:\n$$\nP\\left(\\frac{-10}{\\sigma} < Z < \\frac{10}{\\sigma}\\right) = 0.95\n$$\n- Step 2: For 95% central interval, z = 1.96.\n- Step 3: Solve 10/σ = 1.96 → σ = 10/1.96 ≈ 5.10.\n\n> **Why 1.96?** From standard normal tables, Φ(1.96) = 0.975 (upper 2.5%).", "source": "Qwen 3 ③", "_id": "qwen_3_14"}, {"question": "In Q3(e), a pebble weighing exactly 40.8 grams (the mean) is added to the sample. Without calculation, state the effect on (i) the mean, and (ii) the standard deviation. Give reasons. (2 steps)", "answer": "- Step 1: (i) The mean stays **exactly the same** at 40.8 grams. Reason: adding a value equal to the current mean doesn't change the sum divided by n.\n- Step 2: (ii) The standard deviation **decreases**. Reason: the new value contributes zero to the sum of squared deviations (since deviation from mean = 0), while the denominator increases from 50 to 51. Variance = S_xx/(n+1) becomes smaller.\n\n**Key concept:** Adding a value at the mean dilutes the variance — zero numerator, larger denominator.", "source": "MiniMax ②", "_id": "minimax_2_18"}, {"question": "In probability, if event $$A$$ is a subset of event $$B$$, explain why $$P(A \\mid B)$$ simplifies to $$P(A)/P(B)$$, and identify which event is the subset in the conditional probability $$P(T > \\mu-5 \\mid T > \\mu-10)$$. (2 steps)", "answer": "- Step 1: By definition, $$P(A \\mid B) = P(A \\cap B)/P(B)$$. If $$A \\subset B$$, then whenever $$A$$ occurs, $$B$$ also occurs, so $$A \\cap B = A$$. The numerator simplifies to $$P(A)$$.\n- Step 2: In the given conditional, let $$A = \\{T > \\mu-5\\}$$ and $$B = \\{T > \\mu-10\\}$$. Since $$\\mu-5 > \\mu-10$$, any value exceeding $$\\mu-5$$ automatically exceeds $$\\mu-10$$. Hence $$A \\subset B$$, and the conditional simplifies to $$P(T > \\mu-5)/P(T > \\mu-10)$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_35"}, {"question": "When constructing a histogram, why is frequency density used on the vertical axis instead of frequency, and what does this imply about the relationship between bar area and frequency? (2 steps)", "answer": "- Step 1: Classes often have different widths. If raw frequency were used for height, a wider class would misleadingly appear more important simply because it spans more of the horizontal axis. Frequency density — defined as $$\\text{frequency density} = \\text{frequency} \\div \\text{class width}$$ — standardises for width.\n- Step 2: Consequently, the area of each bar (width $$\\times$$ height) is proportional to the class frequency. Equal areas represent equal counts, regardless of how wide or narrow the class intervals are.", "source": "Kimi K2.6 ①", "_id": "kimi_1_14"}, {"question": "A reference histogram bar for class width 4 mm has width 2.5 cm and height 7.5 cm. Explain conceptually how two scale factors are extracted and why multiplying a new class width by 2.5 directly is wrong. (3 steps)", "answer": "- Step 1: Extract a **horizontal scale factor**: $$\\frac{2.5 \\text{ cm}}{4 \\text{ mm}} = 0.625$$ cm per mm of class width. This converts any class width in millimetres to bar width in centimetres.\n- Step 2: Extract a **vertical scale factor** via frequency density. The reference FD is $$20/4 = 5$$, so the vertical scale is $$\\frac{7.5 \\text{ cm}}{5} = 1.5$$ cm per unit of frequency density.\n- Step 3: Multiplying a new class width (e.g. 2 mm) by 2.5 directly ignores that 2.5 cm corresponds to 4 mm, not to 1 mm. You must use the per-mm scale to preserve the area-proportionality rule across different class widths.", "source": "Kimi K2.6 ①", "_id": "kimi_1_15"}, {"question": "Why is sketching the normal curve essential for \"fastest $$p\\%$$\" / \"slowest $$p\\%$$\" questions? (3 steps)", "answer": "- Step 1: The words \"fast\" and \"slow\" describe behaviour, but the question secretly maps them to **tails of the distribution**. Sketching forces you to confront this mapping explicitly.\n- Step 2: Once you label the axes with what they measure (e.g. time → \"high $$x$$ = slow\"), shading the \"fastest\" portion lands on the **left** of the cutoff.\n- Step 3: This visual reasoning prevents the most expensive single-mistake error: getting the tail direction wrong, which gives a numerically plausible but completely incorrect answer.\n\nAlways: read words → draw curve → shade → write inequality → only then standardise.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "Given $$Y = aX - b$$ with $$E(Y) = 13.4$$ and $$\\operatorname{Var}(Y) = 66.24$$, and known $$E(X) = 4.6$$, $$\\operatorname{Var}(X) = 4.14$$, what is the **strategic order** to find $$a$$ then $$b$$, and why? (3 steps)", "answer": "- Step 1: Use the variance equation **first**. $$\\operatorname{Var}(Y) = a^2 \\operatorname{Var}(X)$$ contains only $$a$$ (the constant $$b$$ has dropped out), so it isolates $$a$$ cleanly: $$a^2 = 66.24/4.14 = 16 \\Rightarrow a = 4$$ (positive root, as stated).\n- Step 2: Substitute $$a$$ into the mean equation: $$E(Y) = aE(X) - b \\Rightarrow 13.4 = 4(4.6) - b = 18.4 - b$$.\n- Step 3: Solve: $$b = 5$$.\n\nStrategy: variance eliminates the additive constant, so it gives the multiplicative constant first — then mean cleans up the additive one.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "What is the formula $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$, and what does it conceptually represent? (3 steps)", "answer": "- Step 1: $$S_{xy}$$ is the \"centred sum of products\" — $$\\sum (x_i - \\bar{x})(y_i - \\bar{y})$$ — but rewritten in terms of raw sums to avoid recomputing means for every data point.\n- Step 2: It measures **how $$x$$ and $$y$$ vary together**. Positive $$S_{xy}$$ → when $$x$$ is above its mean, $$y$$ tends to be above its mean (positive association).\n- Step 3: It's the numerator of both the correlation coefficient $$r = S_{xy}/\\sqrt{S_{xx}S_{yy}}$$ and the regression slope $$b = S_{xy}/S_{xx}$$.\n\nIt's in the formula booklet — but understand its meaning, not just its form.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "Derive or recall why the gradient of the regression line of $$g$$ on $$d$$ is $$b = S_{dg}/S_{dd}$$, and explain what would go wrong if you accidentally divided by $$S_{gg}$$ instead. (2 steps)", "answer": "- Step 1: The regression line minimises the sum of squared vertical distances (in $$g$$) from the points to the line. Solving the normal equations yields $$b = S_{dg}/S_{dd}$$. This scales the joint variation $$S_{dg}$$ by the spread of the explanatory variable $$d$$, converting covariance into the change in $$g$$ per unit change in $$d$$.\n- Step 2: Dividing by $$S_{gg}$$ would give the gradient of the regression of $$d$$ on $$g$$ (with the roles swapped). Since $$g$$ is the response and $$d$$ the predictor here, using $$S_{gg}$$ produces the wrong line—the one that minimises horizontal distances, not vertical ones.", "source": "Kimi K2.6 ②", "_id": "kimi_2_25"}, {"question": "When adding new data to preserve a quartile, why must you reason about **positions** in the sorted list rather than just values? (3 steps)", "answer": "- Step 1: A quartile is defined by its **position** in the sorted list (e.g. $$Q_1$$ at position 9 for $$N=35$$). Adding data changes the total count and shifts existing positions.\n- Step 2: A new value's effect depends on **where it inserts** in the sorted order — values below $$Q_1$$ push existing quartile-position values one slot later, etc.\n- Step 3: To preserve a quartile, you need to track:\n+ How many new values land below it (determines how positions shift).\n+ Whether the value at the new quartile position is still the same as the old one.\n\nReasoning by value alone misses the positional dependency.", "source": "Opus 4.7 ①", "_id": "opus_1_70"}, {"question": "A normal-distribution problem mentions both \"$$P(\\mu - 10 < T < \\mu + 10) = 0.95$$\" and asks about $$P(T > \\mu - 10)$$. Why is $$P(T > \\mu - 10) = 0.975$$ (not 0.95)? (3 steps)", "answer": "- Step 1: $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$ describes the **central** interval. The two outside tails together have probability $$1 - 0.95 = 0.05$$.\n- Step 2: By symmetry of the normal about $$\\mu$$, each tail has probability $$0.05/2 = 0.025$$. So $$P(T < \\mu - 10) = 0.025$$.\n- Step 3: Therefore $$P(T > \\mu - 10) = 1 - P(T \\le \\mu - 10) = 1 - 0.025 = 0.975$$ — i.e., the central interval plus the **upper** tail.\n\nCommon slip: writing $$P(T > \\mu - 10) = 0.95$$ — confusing \"the interval\" with \"the right of the left endpoint\".", "source": "Opus 4.7 ①", "_id": "opus_1_60"}, {"question": "Synthesising: The May 2024 paper repeatedly tests the boundary between English description and statistical translation. List three specific phrases from the paper that are easily mistranslated and their correct statistical meanings.", "answer": "- “Fastest 60%” → lower tail, $$P(X < t) = 0.60$$. - “No change to the box plot” → all five statistics (min, $$Q_1$$, median, $$Q_3$$, max) are invariant. - “Does not play Scrabble” → full complement $$P(S') = 1 - P(S)$$, including the outside region, not merely the visible non-S scribbles inside other circles.", "source": "Kimi K2.6 ①", "_id": "kimi_1_44"}, {"question": "Calculate $$P(T > \\mu-5 \\mid T > \\mu-10)$$ given $$\\sigma \\approx 5.102$$, showing the standardisation of the numerator and the origin of the denominator $$0.975$$. (4 steps)", "answer": "- Step 1: Using the subset simplification, the probability equals $$\\dfrac{P(T > \\mu-5)}{P(T > \\mu-10)}$$.\n- Step 2: For the numerator, standardise: $$\\dfrac{(\\mu-5)-\\mu}{5.102} = \\dfrac{-5}{5.102} \\approx -0.98$$. Thus $$P(T > \\mu-5) = P(Z > -0.98) = P(Z < 0.98) = 0.8365$$.\n- Step 3: For the denominator, note that $$P(T > \\mu-10) = 1 - P(T < \\mu-10) = 1 - 0.025 = 0.975$$. This comes directly from the symmetry argument used to find $$\\sigma$$.\n- Step 4: Divide: $$0.8365 / 0.975 \\approx 0.858$$ to $$3$$ significant figures.", "source": "Kimi K2.6 ②", "_id": "kimi_2_36"}, {"question": "For two events $$A$$ and $$B$$, what does **independence** mean formally, and how is it distinct from \"mutually exclusive\"? (3 steps)", "answer": "- Step 1: $$A$$ and $$B$$ are **independent** iff $$P(A \\cap B) = P(A) \\cdot P(B)$$. Knowing $$B$$ tells you nothing about $$A$$.\n- Step 2: $$A$$ and $$B$$ are **mutually exclusive** iff $$P(A \\cap B) = 0$$. They cannot both happen.\n- Step 3: These are **opposite** concepts (except in degenerate cases). Two non-zero-probability mutually exclusive events are highly **dependent** — knowing $$B$$ happened tells you $$A$$ definitely didn't.\n\nCommon confusion: students conflate \"independent\" with \"disjoint\". They're nearly antonyms.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "Estimate how many teenagers do **not** play Scrabble, explaining why the shortcut $$P(S') = 1 - P(S)$$ is safer than manually summing non-Scrabble regions. (3 steps)", "answer": "- Step 1: From the diagram, $$P(S) = 0.12 + 0.15 + 0.10 + 0.23 = 0.60$$. Therefore $$P(S') = 1 - 0.60 = 0.40$$.\n- Step 2: Multiplying by the estimated total $$N \\approx 262.07$$ gives $$262.07 \\times 0.40 \\approx 104.83$$, which rounds to **105** teenagers.\n- Step 3: Manually summing visible non-Scrabble regions risks omitting the outside region $$q=0.22$$ or the $$G$$-only region ($$0$$). The shortcut $$1-P(S)$$ automatically captures every part of the sample space outside $$S$$, including the \"none of the three\" area, preventing the common error of obtaining $$47$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_44"}, {"question": "In Q1(f), with new data $$27, a, 48, 2a$$ and $$N$$ changing from 32 to 36, why does the median constraint give the **smallest** restriction on $$a$$? (3 steps)", "answer": "- Step 1: For $$N=36$$, the new median is the average of the 18th and 19th values. The original 16th and 17th values are 43 and 47 (averaging to 45).\n- Step 2: Two of the four new values (27 and $$a$$, assuming $$a < 45$$) are below 45, so they push the original 16th-17th up to positions 18-19. The original median is preserved by construction.\n- Step 3: This works as long as **both** 27 and $$a$$ stay below the original 16th-17th values (43, 47), which requires only $$a \\le 43$$ — looser than the $$Q_1$$ constraint ($$a \\ge 36$$) and the max constraint ($$a \\le 40$$).\n\nThe binding constraints are on $$Q_1$$ and max — median is automatically satisfied within $$36 \\le a \\le 40$$.", "source": "Opus 4.7 ①", "_id": "opus_1_71"}, {"question": "What does the regression line \"$$y$$ on $$x$$\" minimise, and why does that give $$b = S_{xy}/S_{xx}$$? (3 steps)", "answer": "- Step 1: The line $$y = a + bx$$ is chosen to minimise the **sum of squared vertical residuals**: $$\\sum (y_i - a - bx_i)^2$$.\n- Step 2: Taking partial derivatives w.r.t. $$a$$ and $$b$$ and setting to zero gives the normal equations. Solving yields $$b = S_{xy}/S_{xx}$$ (slope) and $$a = \\bar{y} - b\\bar{x}$$ (intercept, forcing the line through $$(\\bar{x}, \\bar{y})$$).\n- Step 3: Note: \"$$y$$ on $$x$$\" treats $$x$$ as predictor and minimises **vertical** distances. \"$$x$$ on $$y$$\" would minimise **horizontal** distances and give a different line ($$S_{xy}/S_{yy}$$).\n\nUse the predictor variable as the denominator — easy to mix up.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "Why is using a regression line to estimate a value outside the observed data range (extrapolation) unreliable? (2 steps)", "answer": "- Step 1: The regression line models a linear relationship based only on the observed data range. We have no evidence that the relationship remains linear outside this range.\n- Step 2: In real-world contexts, relationships often curve or level off at extreme values (e.g., bear girth can't increase linearly forever). Extrapolating assumes the linear trend continues, which may be false.\n+ Misconception: Giving a vague answer like \"the data isn't accurate\" or \"it's too small\". You must explicitly state it is **outside the observed range** (extrapolation).", "source": "GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "After finding $$p$$ in a Venn problem, how do you find $$q$$ = the probability outside all three sets?", "answer": "All probabilities (the eight regions of a three-set Venn diagram) must sum to 1. Sum all known regions and the unknowns $$p, q$$, then solve. E.g., $$0.04 + 0 + p + 0.15 + 0.12 + 0.10 + 0.23 + q = 1 \\Rightarrow p + q = 0.36 \\Rightarrow q = 0.36 - 0.14 = 0.22$$. Don't forget the \"outside\" region — even when zero is in one region, it must still be included in the sum.", "source": "Opus 4.7 ②", "_id": "opus_2_51"}, {"question": "Why does $$(a, b, c)$$-coding ($$y = (w - 20)/10$$) make hand-calculation of mean and variance easier? (2 steps)", "answer": "- Step 1: The transformation $$y = (w - 20)/10$$ shifts data toward 0 and shrinks it by a factor of 10. The transformed values are smaller, simpler integers/decimals, making $$\\sum y$$ and $$\\sum y^2$$ much faster to compute by hand or list.\n- Step 2: Once you have $$\\bar{y}$$ and $$\\operatorname{Var}(y)$$, recover the originals using linearity: $$\\bar{w} = 10\\bar{y} + 20$$ and $$\\operatorname{Var}(w) = 100\\operatorname{Var}(y)$$. No data point needs to be transformed individually.\n\nCoding is the manual-computation analogue of standardisation — same algebraic principle.", "source": "Opus 4.7 ①", "_id": "opus_1_61"}, {"question": "In the game between Sam ($$S = X_1$$) and Alex ($$R = 2X_2 - 3$$), why must the spins be treated as independent, and how does that change the probability calculation from a single-spin scenario? (3 steps)", "answer": "- Step 1: Sam and Alex each spin a separate physical spinner, so the outcome $$X_1$$ does not influence $$X_2$$. Independence means the joint probability factors: $$P(S=s, R=r) = P(S=s) \\cdot P(R=r)$$.\n- Step 2: If a single spin were used for both scores, there would be only one random variable, and the event $$S > R$$ would reduce to $$X > 2X - 3$$ or $$X < 3$$, giving a completely different probability.\n- Step 3: Under independence, you build the distribution of $$R$$ from $$X_2$$, then for each possible $$S$$ value sum the probabilities of all $$R$$ values strictly smaller than it, weighting by $$P(S=s)$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_13"}, {"question": "Explain why estimating the girth of a bear with length $$0.5$$ metres ($$50$$ cm) using the regression line is unreliable, even though substituting $$d=50$$ into the equation is algebraically simple. (2 steps)", "answer": "- Step 1: The observed bear lengths in the sample have a mean of $$182.1$$ cm and an observed range roughly from $$160$$ cm to $$210$$ cm. A length of $$50$$ cm lies far **outside** this observed range.\n- Step 2: Linear regression assumes the linear relationship holds only approximately within the data cloud. Extrapolating far beyond the observed data risks invoking a pattern that may not exist for cubs or unusually small bears; the true relationship could be curved or different at extreme sizes. This is called **extrapolation**.", "source": "Kimi K2.6 ②", "_id": "kimi_2_28"}, {"question": "Why does the lower-end constraint $$a \\ge 36$$ arise in the Maple \"no change\" problem? (3 steps)", "answer": "- Step 1: After adding two values below $$Q_1$$ (27 and a possible small $$a$$), the original 9th and 10th values shift to positions 11 and 12 in the new list. We need the **new** 9th and 10th to still average 36.\n- Step 2: The original 8th and 9th values are both 36. If $$a < 36$$, then $$a$$ slots in before these, pushing them out of positions 9 and 10, so the new $$Q_1$$ would no longer be 36.\n- Step 3: For the new 9th and 10th to both still equal 36, $$a$$ must be at least 36 (so it doesn't displace them). Hence $$a \\ge 36$$.\n\nTakeaway: every quartile constraint translates to a positional argument about where each new value lands in the sorted list.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "Given P(μ - 10 < T < μ + 10) = 0.95, a student calculates σ = 10/1.96 = 0.051. Explain why this value is unreasonable and identify the decimal slip. (2 steps)", "answer": "- Step 1: The value σ = 0.051 minutes (about 3 seconds) is unreasonably small. The interval μ ± 10 spans 20 minutes total — if the standard deviation were only 0.05 minutes, essentially all values would be within ±10 of the mean (which is what the 0.95 probability says). But this doesn't match the problem context — times are measured in minutes, and a standard deviation of 0.05 minutes (3 seconds) for a task taking around 15 minutes is unrealistic.\n- Step 2: The correct calculation is σ = 10/1.96 = 5.10 minutes. The student moved the decimal point two places too far — wrote 0.051 instead of 5.10.\n+ Sanity check: σ should be of the same order of magnitude as the interval half-width. Here, 10/2 = 5 is close to 5.10.\n\n**Takeaway:** Always sanity-check your σ: it should be comparable to the scale of the problem, not orders of magnitude different.", "source": "MiniMax ①", "_id": "minimax_1_22"}, {"question": "Explain why the PMCC $$r$$ must lie between $$-1$$ and $$1$$, and describe what $$r \\approx 0.98$$ indicates about the relationship between bear length and girth in Q4. (2 steps)", "answer": "- Step 1: The formula $$r = S_{xy}/\\sqrt{S_{xx}S_{yy}}$$ is the geometric mean of the two regression slopes ($$y$$ on $$x$$ and $$x$$ on $$y$$). By the Cauchy-Schwarz inequality, the squared covariance cannot exceed the product of the variances, forcing $$r^2 \\le 1$$.\n- Step 2: A value of $$0.98$$ indicates a very strong positive linear association: longer bears tend to have proportionally larger girths, and the data points cluster tightly around a straight line with positive gradient.", "source": "Kimi K2.6 ①", "_id": "kimi_1_35"}, {"question": "Across the May 2024 paper, the dominant error pattern is described as \"translation slips at the English-to-probability boundary\". Name three examples and the translation that fixes each.", "answer": "+ **\"Fastest 60%\"** (Q5b): English \"fastest\" → maths \"lower tail\", so $$P(X<t) = 0.60$$ — not 0.40.\n+ **\"No change to box plot\"** (Q1f): English vague phrase → maths five separate constraints (Min, $$Q_1$$, Median, $$Q_3$$, Max stay fixed). Each gives an inequality on the new data.\n+ **\"Does not play Scrabble\"** (Q6e): English \"not Scrabble\" → maths complement $$S'$$, which includes the **outside-all-three-circles** region. Use the shortcut $$P(S') = 1 - P(S)$$.\n\nGeneral fix: slow down on key words, sketch a diagram, list constraints **before** computing.", "source": "Opus 4.7 ②", "_id": "opus_2_59"}, {"question": "What does a histogram \"represent\" geometrically that distinguishes it from a bar chart? (2 steps)", "answer": "- Step 1: In a histogram, the **area** of each bar is proportional to the frequency of that class. This is essential for unequal class widths — a wider class with the same frequency must have a shorter bar so the area matches.\n- Step 2: This forces the y-axis to be **frequency density** (FD = frequency ÷ class width), not frequency. Bars then have width = class width and height = FD.\n\nA bar chart uses height alone for frequency (no area meaning).", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "A pebble weighing exactly 40.8 grams (the mean) is added to the sample. Explain why this decreases the standard deviation but does not change the mean. (2 steps)", "answer": "- Step 1: The mean doesn't change because adding a value equal to the current mean simply recalculates: (n × mean + mean)/(n+1) = (n+1) × mean/(n+1) = mean. The new value contributes exactly what the old mean \"expected.\"\n- Step 2: The standard deviation decreases because variance = (Σ(xi - x̄)²)/n. The new value has deviation (40.8 - 40.8) = 0, contributing 0 to the numerator while n increases from 50 to 51 in the denominator. The average squared deviation shrinks.\n+ Intuition: Adding a data point at the mean \"dilutes\" the existing spread without adding any new spread.\n\n**Takeaway:** Adding a value at the mean: mean unchanged, variance (and hence SD) decreases.", "source": "MiniMax ①", "_id": "minimax_1_15"}, {"question": "For a normal distribution $$X \\sim N(15, 2^2)$$, explain conceptually what the standardised value $$Z = (X - \\mu)/\\sigma$$ represents, and why $$P(X < 18)$$ becomes $$P(Z < 1.5)$$. (2 steps)", "answer": "- Step 1: $$Z$$ measures how many standard deviations an observation lies above or below the mean. Here 18 is 3 minutes above the mean, and since $$\\sigma = 2$$, that distance equals 1.5 standard deviations.\n- Step 2: Standardisation converts any normal variable into the standard normal $$Z \\sim N(0,1)$$, whose probabilities are tabulated. The inequality $$X < 18$$ is algebraically equivalent to $$(X-15)/2 < (18-15)/2$$, so the probability is preserved and can be looked up as $$\\Phi(1.5)$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_25"}, {"question": "Conceptually, why use $$1.5 \\times \\text{IQR}$$ as the multiplier for outlier fences rather than some other constant?", "answer": "The $$1.5$$ multiplier is a Tukey convention designed so that for a roughly normal distribution, only about $$0.7\\%$$ of data lies beyond the fences — flagging genuine extreme values while not falsely labelling typical points. A larger multiplier (e.g. 3) would be more conservative; a smaller one (e.g. 1) would over-flag. The exact value isn't derived from theory but balances sensitivity vs specificity.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "Given $$P(\\mu - 10 < T < \\mu + 10) = 0.95$$ for a normal variable, explain conceptually why $$\\sigma = 10/1.96$$ and why the value must be approximately 5 rather than 0.5. (3 steps)", "answer": "- Step 1: By symmetry, the total tail probability outside the interval is $$1 - 0.95 = 0.05$$, so each tail contains 0.025. The lower boundary standardises to $$z = -1.96$$ because $$\\Phi(-1.96) = 0.025$$.\n- Step 2: Standardising the lower bound gives $$\\frac{(\\mu - 10) - \\mu}{\\sigma} = -1.96$$, which simplifies to $$-10/\\sigma = -1.96$$, hence $$\\sigma = 10/1.96$$.\n- Step 3: Since 1.96 is roughly 2, the result is approximately 5. A value of 0.5 would imply the 95% interval width was about 2 units, not 20 — an order-of-magnitude inconsistency that catches the decimal slip.", "source": "Kimi K2.6 ①", "_id": "kimi_1_27"}, {"question": "Why must we use the **unrounded** gradient $$b$$ when computing the intercept $$a = \\bar{y} - b\\bar{x}$$?", "answer": "Because $$a$$ depends on the product $$b\\bar{x}$$, and $$\\bar{x}$$ is typically a large number. A small rounding error in $$b$$ (e.g., 0.722 vs 0.72184) gets amplified by $$\\bar{x}$$ in the multiplication, shifting $$a$$ at the 3rd significant figure. Rule: **round only at the final answer**, carry full precision through intermediate steps.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "Why does the Edexcel rule treat $$n/4$$ integer vs. non-integer differently for quartile position? (3 steps)", "answer": "- Step 1: Quartiles try to split a sample into four equal portions. When $$n/4$$ is not a whole number, there is no exact \"boundary\" data point, so we deterministically round up to land on a single observation.\n- Step 2: When $$n/4$$ is exactly a whole number, the cut falls **between** two data points (e.g. for $$n=32$$, between the 8th and 9th). Choosing only one would bias the quartile toward that side.\n- Step 3: The fairest convention in this integer case is to **average** the two flanking values, treating the quartile as the midpoint of that gap.\n\nTakeaway: integer → average (interpolation); non-integer → round up (deterministic).", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "When estimating total population size from \"76 teenagers play Chess and Go\", which probability do you divide by, and what assumption are you making?", "answer": "Divide by $$P(C \\cap G)$$, the probability that a randomly chosen teenager plays both. The assumption: the youth club is a **representative large sample** of the population the Venn diagram describes, so observed counts $$\\approx$$ population × probability. So total $$\\approx \\frac{\\text{count}}{P(C \\cap G)} = 76/0.29 \\approx 262$$. The phrase \"consists of a large number of teenagers\" in the question signals this large-sample interpretation.", "source": "Opus 4.7 ②", "_id": "opus_2_56"}, {"question": "Why is using a regression equation to predict a $$y$$-value for an $$x$$ far outside the observed range (extrapolation) unreliable?", "answer": "The regression line was fitted only on the data range observed; outside that range, the linear relationship may not hold — the underlying mechanism might be non-linear, saturate, or change entirely. E.g., a bear length of 50 cm is far below the data range (mean ~182 cm); predicting girth there assumes the linear pattern continues, but young or cub bears might have a very different length–girth relationship. The phrase to use: \"**outside the observed range of data**\".", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "In a normal distribution of completion times, explain why \"fastest $$60\\%$$\" corresponds to the lower tail probability $$P(X < t) = 0.60$$ rather than the upper tail. (3 steps)", "answer": "- Step 1: \"Fastest\" means the smallest times. On a number line, smaller times lie to the **left** of larger times. The fastest competitors are those who finished quickest.\n- Step 2: In a distribution, the left-hand side of the curve represents the lower values. Therefore the fastest $$60\\%$$ occupy the leftmost $$60\\%$$ of the area under the curve.\n- Step 3: This translates to $$P(X < t) = 0.60$$, where $$t$$ is the cutoff time. Treating it as the upper tail $$P(X > t) = 0.60$$ would select the slowest $$40\\%$$, inverting the ranking and yielding a time shorter than the median instead of longer.", "source": "Kimi K2.6 ②", "_id": "kimi_2_31"}, {"question": "Explain why the standard deviation of $$w$$ is found by multiplying the standard deviation of $$y$$ by $$10$$, and why the $$+20$$ shift plays no role. (2 steps)", "answer": "- Step 1: Standard deviation measures spread around the mean, which is unchanged by a location shift. Adding $$20$$ grams to every pebble moves the entire distribution horizontally but does not change the distances between data points, so the spread is invariant.\n- Step 2: Scaling by $$10$$ stretches those distances by a factor of $$10$$. Since standard deviation is based on squared deviations, and variance scales by $$10^2$$, the standard deviation scales by the positive square root, which is $$10$$. Thus $$\\sigma_w = 10\\sigma_y$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_21"}, {"question": "In Q5(c), explain why the conditional probability $$P(T > \\mu - 5 \\mid T > \\mu - 10)$$ simplifies to $$P(T > \\mu - 5)/P(T > \\mu - 10)$$ rather than requiring the full intersection formula, and identify which set is a subset of the other. (2 steps)", "answer": "- Step 1: The event $$\\{T > \\mu - 5\\}$$ consists of all values larger than $$\\mu - 5$$. Every such value is also larger than $$\\mu - 10$$, so $$\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$$.\n- Step 2: When $$A \\subset B$$, the intersection $$A \\cap B$$ equals $$A$$ itself. Therefore the conditional formula $$P(A \\mid B) = P(A \\cap B)/P(B)$$ collapses to $$P(A)/P(B)$$, avoiding the need to compute a separate intersection probability.", "source": "Kimi K2.6 ①", "_id": "kimi_1_28"}, {"question": "Why is a value like $$\\sigma \\approx 0.51$$ an obvious decimal error when computed from $$\\sigma = 10/1.96$$, and what physical intuition should flag this mistake? (2 steps)", "answer": "- Step 1: The interval $$\\mu \\pm 10$$ spans $$20$$ units total. For a normal distribution, the range $$\\mu \\pm 3\\sigma$$ contains $$99.7\\%$$ of data. If $$\\sigma$$ were only $$0.51$$, then $$10$$ would be nearly $$20$$ standard deviations wide, which would contain virtually $$100\\%$$ of probability, not $$95\\%$$.\n- Step 2: A $$95\\%$$ interval for a normal distribution is roughly $$\\pm 2\\sigma$$. Therefore $$\\sigma$$ should be about half the half-width: $$10/2 = 5$$. Any result far from order-of-magnitude $$5$$ signals a decimal placement error.", "source": "Kimi K2.6 ②", "_id": "kimi_2_34"}, {"question": "Why is estimating the girth of a bear with length 0.5 metres unreliable, while estimating for 2.5 metres is acceptable, even though both are calculated from the same regression equation? (2 steps)", "answer": "- Step 1: The observed bear lengths cluster around a mean of roughly 182 cm. A length of 250 cm lies within or near the observed range, so the estimate is an interpolation — we are predicting inside the data cloud where the fitted line is supported by evidence.\n- Step 2: A length of 50 cm is far below the observed range. Using the line there is extrapolation: the linear relationship may not hold for juvenile or anomalously small bears, so the estimate lacks empirical support and is therefore unreliable.", "source": "Kimi K2.6 ①", "_id": "kimi_1_23"}, {"question": "Explain conceptually why the variance of a discrete random variable is given by $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$, and why the term $$E(X^2)$$ is not the same as $$[E(X)]^2$$. (3 steps)", "answer": "- Step 1: Variance measures the average squared deviation from the mean: $$E[(X-\\mu)^2]$$. Expanding this expectation gives $$E[X^2 - 2\\mu X + \\mu^2] = E(X^2) - 2\\mu E(X) + \\mu^2$$.\n- Step 2: Since $$\\mu = E(X)$$, the middle term becomes $$-2[E(X)]^2$$ and the last term is $$+[E(X)]^2$$. Combining yields $$E(X^2) - [E(X)]^2$$.\n- Step 3: $$E(X^2)$$ is the weighted average of the **squared** outcomes, while $$[E(X)]^2$$ is the square of the weighted average of the outcomes. By Jensen's inequality for the convex function $$x^2$$, $$E(X^2) \\ge [E(X)]^2$$, with equality only if $$X$$ is constant. Confusing the two would underestimate the spread.", "source": "Kimi K2.6 ②", "_id": "kimi_2_11"}, {"question": "A discrete random variable has $$P(X=x)$$ given in a table. What's $$E(X^2)$$, and what's the most common error? (2 steps)", "answer": "- Step 1: $$E(X^2) = \\sum x^2 \\cdot P(X=x)$$ — multiply the **square of each $$x$$** by its probability, then sum.\n- Step 2: Common error: squaring the probability instead of the $$x$$. The formula squares the **value**, not the weight. Probabilities are not squared anywhere in computing expectation or variance from a probability table.\n\nA second error: computing $$E(X)^2 = (\\sum x P(X=x))^2$$ and confusing it with $$E(X^2)$$ — these are different quantities related by $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "In a Venn diagram with three sets $$C, S, G$$, when computing $$P(C \\cap S)$$, which regions of the diagram contribute? Why is this a common error source?", "answer": "$$P(C \\cap S)$$ includes **all** outcomes in both $$C$$ and $$S$$ — this means **both** the \"$$C \\cap S$$ only\" region (in $$C$$ and $$S$$ but **not** $$G$$) **and** the triple-overlap \"$$C \\cap S \\cap G$$\". So if \"$$C \\cap S$$ only\" = 0.12 and \"$$C \\cap S \\cap G$$\" = 0.15, then $$P(C \\cap S) = 0.27$$. The common slip is using only the labelled \"$$C \\cap S$$ only\" piece (0.12), forgetting the triple-overlap is also inside $$C \\cap S$$.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "Why is the gradient of a regression line \"$$y$$ on $$x$$\" different from the gradient of \"$$x$$ on $$y$$\"? (3 steps)", "answer": "- Step 1: \"$$y$$ on $$x$$\" minimises **vertical** residuals (errors in $$y$$ at given $$x$$). Its slope is $$b_{y|x} = S_{xy}/S_{xx}$$.\n- Step 2: \"$$x$$ on $$y$$\" minimises **horizontal** residuals (errors in $$x$$ at given $$y$$). Its slope (rewritten as $$y$$ vs $$x$$) is $$1/b_{x|y}$$ where $$b_{x|y} = S_{xy}/S_{yy}$$.\n- Step 3: These coincide only when $$r = \\pm 1$$ (perfect fit). Otherwise they differ: $$b_{y|x} \\cdot b_{x|y} = r^2 < 1$$.\n\nIn exam questions, always check which variable is the predictor — \"$$y$$ on $$x$$\" divides by $$S_{xx}$$ (the predictor's spread).", "source": "Opus 4.7 ①", "_id": "opus_1_65"}, {"question": "After finding $$p = 0.14$$, why must the outside region $$q$$ be found by summing all eight Venn regions to 1, and why is using $$q = 1 - P(C \\cup S \\cup G)$$ equivalent? (2 steps)", "answer": "- Step 1: The entire sample space has probability 1. The Venn diagram partitions this space into eight mutually exclusive regions (including the outside region). Summing them and setting equal to 1 gives $$0.64 + p + q = 1$$, so $$q = 0.36 - p = 0.22$$.\n- Step 2: The union $$C \\cup S \\cup G$$ comprises the seven interior regions. Therefore $$P(C \\cup S \\cup G) = 1 - q$$, and rearranging gives the same result. Both methods enforce the total probability axiom.", "source": "Kimi K2.6 ①", "_id": "kimi_1_31"}, {"question": "Given the coding $$10y = w - 20$$ for pebble weights, explain conceptually why the mean of $$w$$ satisfies $$\\bar{w} = 10\\bar{y} + 20$$ without needing to decode every data point. (2 steps)", "answer": "- Step 1: The coding is a linear transformation $$w = 10y + 20$$. The mean is a linear operator: the mean of a sum equals the sum of the means, and scaling every value by $$10$$ scales the mean by $$10$$. Adding $$20$$ to every value shifts the mean by $$20$$.\n- Step 2: Therefore, you can compute the mean of the coded values ($$\\bar{y}=104/50=2.08$$) and then apply the same linear map to that single number: $$10(2.08)+20=40.8$$. This avoids the tedious and error-prone step of converting all $$50$$ values back to grams first.", "source": "Kimi K2.6 ②", "_id": "kimi_2_20"}, {"question": "What's the conceptual purpose of frequency density on a histogram, vs raw frequency? (3 steps)", "answer": "- Step 1: With unequal class widths, drawing bar heights as raw frequency would make wide classes look disproportionately tall, even when they hold the same number of observations as narrow classes.\n- Step 2: Frequency density (FD = frequency / class width) corrects this by making **area** (width × height) proportional to frequency.\n- Step 3: This way, the total area under the histogram equals the total frequency, and visual comparison between bars accurately reflects relative frequencies — regardless of how wide each class is.\n\nFor equal class widths, FD and frequency look the same up to a scale factor; for unequal widths, FD is essential.", "source": "Opus 4.7 ①", "_id": "opus_1_62"}, {"question": "Why is the sanity check \"$$\\sigma$$ should be same order of magnitude as the interval half-width\" useful, and what slip does it catch?", "answer": "It catches **decimal placement errors**. For $$\\sigma = 10/1.96$$, the correct answer is ~5.10, but a misplaced decimal gives 0.510 — a factor of 10 too small. This makes $$z$$-values for subsequent calculations enormous (e.g., $$z = 5/0.51 \\approx 9.8$$, way off table) and produces absurd probabilities. A quick mental check: \"interval $$\\pm 10$$, so SD is around 5\" prevents the catastrophic propagation of the error.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "Given $$Y = aX - b$$ with $$a, b > 0$$, why is it strategically better to solve for $$a$$ using variance before using expectation, and what would happen if you tried expectation first? (3 steps)", "answer": "- Step 1: Variance eliminates the constant $$b$$ because $$\\operatorname{Var}(aX - b) = a^2 \\operatorname{Var}(X)$$. This gives a single equation in one unknown, $$a$$, which can be solved immediately as $$a = \\sqrt{\\operatorname{Var}(Y)/\\operatorname{Var}(X)}$$.\n- Step 2: If you used expectation first, you would have $$E(Y) = aE(X) - b$$, which contains both unknowns $$a$$ and $$b$$. You would be unable to solve for either without a second equation.\n- Step 3: After finding $$a$$ from variance, you substitute it back into the expectation equation to isolate $$b$$ cleanly. This sequential decoupling avoids simultaneous equations.", "source": "Kimi K2.6 ①", "_id": "kimi_1_12"}, {"question": "Why must you use $$P(R < S)$$ rather than $$P(R \\le S)$$ when computing the probability that Sam wins a game where higher score wins and ties are draws?", "answer": "Because \"Sam wins\" means strictly higher: $$S > R$$, equivalently $$R < S$$. Using $$R \\le S$$ would count tie cases (where $$S = R$$) as Sam winning, but the problem defines those as draws. The inequality boundary is what separates wins from draws — a single misplaced \"=\" inflates the probability by the entire draw probability.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "What is the intuition behind the linear-interpolation median formula? (3 steps)", "answer": "- Step 1: We know the median lies in a specific class but not exactly where. We assume the data are **uniformly distributed within that class** — a reasonable approximation for continuous data.\n- Step 2: We've already accumulated $$F_b$$ observations below the class. We need $$N/2 - F_b$$ more to reach the median position, out of $$f_m$$ in that class.\n- Step 3: That fraction $$\\frac{N/2 - F_b}{f_m}$$ tells us how far across the class width $$c$$ to step from the lower boundary $$L$$. Adding $$L$$ gives the interpolated median.\n\nIt's literally a linear blend across the class — hence \"linear interpolation\".", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "In Q4(f), the gradient 0.722 is used to find the length increase $$x$$ that produces a 17.3 cm girth increase. Why is the intercept $$-42.3$$ irrelevant for this calculation? (2 steps)", "answer": "- Step 1: The gradient measures the rate of change of $$g$$ with respect to $$d$$. For any change $$\\Delta d = x$$, the corresponding change in $$g$$ is $$\\Delta g = 0.722 \\times x$$, regardless of where on the line the change starts.\n- Step 2: The intercept determines the absolute level of the line (where it crosses the vertical axis), but a question about an increment asks only about the slope. Using the intercept would incorrectly treat 17.3 cm as an absolute girth value rather than a change.", "source": "Kimi K2.6 ①", "_id": "kimi_1_24"}, {"question": "Why does coding (linear scaling/shifting of data) make summary statistics easier to compute, and which statistics are affected by the **shift** vs the **scale**?", "answer": "Coding replaces awkward raw values with simpler small numbers, reducing arithmetic errors when computing $$\\sum y$$ and $$\\sum y^2$$.\n- The **mean** is affected by both shift and scale: $$\\bar{w} = a\\bar{y} + b$$.\n- The **variance** and **standard deviation** are affected by scale only, not shift: $$\\operatorname{Var}(w) = a^2 \\operatorname{Var}(y)$$, $$\\sigma_w = |a|\\sigma_y$$. The shift $$+b$$ moves all data identically, so spreads about the mean are unchanged.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "Why does $$\\operatorname{Var}(aX + b) = a^2 \\operatorname{Var}(X)$$? Derive it. (3 steps)", "answer": "- Step 1: Let $$Y = aX + b$$. Then $$E(Y) = aE(X) + b$$ (linearity of expectation).\n- Step 2: Compute deviations: $$Y - E(Y) = aX + b - aE(X) - b = a(X - E(X))$$. The constant $$b$$ vanishes from the deviation.\n- Step 3: Square and take expectation: $$E[(Y-E(Y))^2] = E[a^2(X-E(X))^2] = a^2 \\operatorname{Var}(X)$$.\n\nIntuition: scaling stretches the distribution by $$a$$, so spread (in squared units) scales by $$a^2$$. Shifting (the $$b$$) doesn't change spread at all.", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "A pebble of weight exactly equal to the current mean is added to a dataset of $$n=50$$. What happens to (i) the mean and (ii) the standard deviation? (3 steps)", "answer": "- Step 1: Mean: adding a value equal to $$\\bar{w}$$ doesn't shift the centre. New mean $$= \\frac{50\\bar{w} + \\bar{w}}{51} = \\bar{w}$$. **No change.**\n- Step 2: Standard deviation: variance is $$\\frac{1}{n}\\sum (w_i - \\bar{w})^2$$. The new value contributes $$(\\bar{w}-\\bar{w})^2 = 0$$ to the numerator, but $$n$$ grows from 50 to 51.\n- Step 3: So the numerator is unchanged but the denominator increases → variance **decreases** → SD **decreases**.\n\nJustification matters: state that the added value equals the mean → zero deviation → dilution.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "A common error in Q5(b) is to set $$P(X > t) = 0.60$$ for the fastest $$60\\%$$. Explain the visual intuition of a normal curve that proves this must be wrong, and state the correct setup. (2 steps)", "answer": "- Step 1: Draw a bell curve centred at $$\\mu=15$$. Shade the right tail above some cutoff $$t$$. This shaded region represents the **slowest** competitors, because larger times are to the right. If this shaded area were $$60\\%$$, the cutoff would lie to the **left** of the mean, which is absurd for \"fastest\" because the fastest should include the mean and more.\n- Step 2: The correct setup shades the **left** tail, representing the smallest times: $$P(X < t) = 0.60$$. The resulting $$t \\approx 15.5$$ lies just right of the mean, correctly capturing the quickest $$60\\%$$ of adults.", "source": "Kimi K2.6 ②", "_id": "kimi_2_48"}, {"question": "A 3-circle Venn diagram with all 8 regions has its probabilities summing to 1. If 7 region probabilities are given and one ($$q$$, the outside) is unknown, why is finding $$q$$ a 1-line problem? (2 steps)", "answer": "- Step 1: The regions are **mutually exclusive** (disjoint) and **exhaustive** (cover the sample space). So $$P(\\text{region}_1) + P(\\text{region}_2) + \\dots + P(\\text{region}_8) = 1$$.\n- Step 2: Substitute the 7 known values and solve: $$q = 1 - (\\text{sum of 7 known})$$. The structure of disjoint regions makes this addition reliable — no overlap corrections needed.\n\nThis contrasts with computing $$P(A \\cup B \\cup C)$$ from $$P(A), P(B), P(C)$$ alone, where inclusion-exclusion would be required.", "source": "Opus 4.7 ①", "_id": "opus_1_66"}, {"question": "A new pebble weighing exactly 40.8 g is added to a sample whose mean is already 40.8 g. Explain conceptually why the mean stays unchanged but the standard deviation decreases. (3 steps)", "answer": "- Step 1: The new total weight becomes $$50 \\times 40.8 + 40.8 = 51 \\times 40.8$$. Dividing by the new count 51 gives $$40.8$$, so the mean is unchanged because the added value sits exactly at the balance point.\n- Step 2: The squared deviation of the new value from the mean is $$(40.8 - 40.8)^2 = 0$$, so it contributes nothing to the numerator of the variance formula.\n- Step 3: However, the denominator $$n$$ increases from 50 to 51. Since the total sum of squared deviations stays the same while $$n$$ grows, the variance — and therefore the standard deviation — decreases slightly.", "source": "Kimi K2.6 ①", "_id": "kimi_1_19"}, {"question": "The weakness analysis for this paper identifies a recurring \"translation slip\" pattern rather than computation errors. Give three examples of English phrases that were mistranslated into statistical setups and state the correct translation. (3 steps)", "answer": "- Step 1: \"Fastest $$60\\%$$\" was mistranslated as the upper tail $$P(X>t)=0.60$$. The correct translation is the **lower** tail $$P(X<t)=0.60$$, because fastest means smallest time values.\n- Step 2: \"Does not play Scrabble\" was mistranslated as the sum of only the visible non-Scrabble regions inside the circles. The correct translation is the **complement** $$P(S')=1-P(S)$$, which automatically includes the outside region $$q$$.\n- Step 3: \"No change to the box plot\" was mistranslated as merely keeping the new data within the original min–max range. The correct translation is preserving **all five** statistics (min, $$Q_1$$, median, $$Q_3$$, max) by checking how the new sample size redefines each quartile position.", "source": "Kimi K2.6 ②", "_id": "kimi_2_57"}, {"question": "For $$Y=aX-b$$, derive why $$\\operatorname{Var}(Y)=a^2\\operatorname{Var}(X)$$ and explain why the $$-b$$ term disappears while the $$a$$ term is squared. (3 steps)", "answer": "- Step 1: Write variance as the expectation of squared deviations from the mean: $$\\operatorname{Var}(Y)=E[(Y-E(Y))^2]$$. Since $$E(Y)=aE(X)-b$$, the deviation is $$(aX-b)-(aE(X)-b)=a(X-E(X))$$.\n- Step 2: Squaring the deviation gives $$a^2(X-E(X))^2$$. Taking expectations pulls the constant $$a^2$$ outside: $$a^2E[(X-E(X))^2]=a^2\\operatorname{Var}(X)$$.\n- Step 3: The shift $$-b$$ cancels in the deviation, so it vanishes from the variance. The scaling $$a$$ remains inside the squared deviation, hence it emerges squared. This means a stretch by factor $$2$$ quadruples the variance, while a translation leaves it untouched.", "source": "Kimi K2.6 ②", "_id": "kimi_2_14"}, {"question": "Explain why $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$ measures spread, and describe the two sequential calculations needed to evaluate it from a probability table. (3 steps)", "answer": "- Step 1: $$E(X^2)$$ is the mean of the squared values, which captures how far observations are from zero in a squared sense. Subtracting $$[E(X)]^2$$ removes the contribution of the mean itself, leaving only the squared deviations around the mean.\n- Step 2: First compute $$E(X^2) = \\sum x^2 P(X=x)$$, making sure to square each $$x$$ before multiplying by its probability. Then compute $$[E(X)]^2$$, which is the square of the previously given or calculated mean.\n- Step 3: The difference gives the variance. A common error is squaring the probabilities instead of the $$x$$ values, or forgetting to subtract the squared mean entirely.", "source": "Kimi K2.6 ①", "_id": "kimi_1_11"}, {"question": "Why does subtracting $$[E(X)]^2$$ (rather than $$E(X)$$) yield the variance?", "answer": "Variance is defined as $$E[(X - \\mu)^2]$$ where $$\\mu = E(X)$$. Expanding: $$E[(X-\\mu)^2] = E[X^2 - 2\\mu X + \\mu^2] = E(X^2) - 2\\mu E(X) + \\mu^2 = E(X^2) - 2\\mu^2 + \\mu^2 = E(X^2) - \\mu^2$$. So the subtracted term is $$\\mu^2 = [E(X)]^2$$, not $$E(X)$$ itself. The variance is \"average of the squares minus the square of the average\".", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "Why does the variance formula $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$ work, derivationally? (3 steps)", "answer": "- Step 1: Start from the definition: $$\\operatorname{Var}(X) = E[(X - \\mu)^2]$$ where $$\\mu = E(X)$$.\n- Step 2: Expand the square: $$(X-\\mu)^2 = X^2 - 2\\mu X + \\mu^2$$.\n- Step 3: Take expectation (linear operator): $$E[X^2] - 2\\mu E[X] + \\mu^2 = E[X^2] - 2\\mu^2 + \\mu^2 = E[X^2] - \\mu^2$$.\n\nSo $$\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$$. This form is computationally easier because it uses raw moments instead of centred deviations.", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "In Q2(d), Sam's score is $$S=X_1$$ and Alex's score is $$R=2X_2-3$$. Explain why $$S$$ and $$R$$ are independent random variables, and contrast this with the dependence structure in Q2(c) where $$Y=aX-b$$. (2 steps)", "answer": "- Step 1: $$S$$ and $$R$$ are driven by two **separate** spins of the spinner, $$X_1$$ and $$X_2$$. Because the outcome of one spin does not influence the other, their joint probability is the product of their marginal probabilities: $$P(S=s, R=r)=P(S=s)P(R=r)$$.\n- Step 2: In Q2(c), $$Y=aX-b$$ is a deterministic linear **function** of the **same** single spin $$X$$. There is no second random experiment; once $$X$$ is known, $$Y$$ is fixed. This is functional dependence, not probabilistic independence.", "source": "Kimi K2.6 ②", "_id": "kimi_2_15"}, {"question": "In a histogram, explain why the area of each bar—not its height—represents frequency, and what quantity must remain constant when class widths vary. (2 steps)", "answer": "- Step 1: When classes have unequal widths, a bar that is twice as wide would automatically appear twice as big if height equalled frequency, misleading the eye into thinking there are twice as many data points per unit of the variable. To make visual comparison fair, the vertical axis plots **frequency density** (frequency divided by class width).\n- Step 2: The area of each bar is then $$\\text{width} \\times \\text{frequency density} = \\text{class width} \\times (\\text{frequency}/\\text{class width}) = \\text{frequency}$$. Thus area directly encodes frequency, while height encodes density.", "source": "Kimi K2.6 ②", "_id": "kimi_2_17"}, {"question": "Why is the multiplier 1.5 used in the outlier rule (instead of, say, 1 or 2)? (2 steps)", "answer": "- Step 1: For a roughly normal distribution, the quartiles are about $$\\pm 0.67\\sigma$$ from the mean, so $$\\text{IQR} \\approx 1.35\\sigma$$. The lower fence at $$Q_1 - 1.5\\,\\text{IQR}$$ then sits at roughly $$-2.7\\sigma$$ — capturing only the most extreme tails (~0.7%) as outliers.\n- Step 2: This is a Tukey convention. Using 1 would be too aggressive (flagging too many points); using 3 would only flag \"far outliers\". 1.5 is the standard middle-ground that flags genuinely unusual values without overflagging.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "In linear interpolation for grouped data, what is the conceptual meaning of the fraction $$\\frac{N/2 - F_b}{f_m}$$, and why is it multiplied by the class width $$c$$? (2 steps)", "answer": "- Step 1: The numerator $$N/2 - F_b$$ counts how many observations into the median class we must go to reach the halfway point. Dividing by $$f_m$$ converts this count into the fraction of the median class that must be traversed.\n- Step 2: Multiplying by the class width $$c$$ converts that fraction into the actual units of the variable (e.g. mm), so it can be added to the lower boundary $$L$$ to pinpoint the median within the interval.", "source": "Kimi K2.6 ①", "_id": "kimi_1_34"}, {"question": "Compare the conditional probability structure in Q2(d) (independent spins) with Q5(c) (conditional normal), highlighting how the independence assumption simplifies the numerator differently in each case. (3 steps)", "answer": "- Step 1: In Q2(d), spins are independent, so the joint probability factorises: $$P(S=s, R=r)=P(S=s)P(R=r)$$. The numerator of any conditional (if needed) would be a simple product of marginals.\n- Step 2: In Q5(c), there is only one random variable $$T$$. The \"conditioning\" event $$T > \\mu-10$$ and the target event $$T > \\mu-5$$ are subsets of the same sample space. They are not independent; instead, one is nested inside the other.\n- Step 3: The simplification in Q5(c) is geometric (set inclusion: $$A \\subset B$$), whereas in Q2(d) it is probabilistic (multiplication of independent probabilities). Confusing the two structures leads to either double-counting or illegitimate factorisation.", "source": "Kimi K2.6 ②", "_id": "kimi_2_47"}, {"question": "Why must you include the triple-overlap region when computing a pairwise intersection in a 3-set Venn diagram? (2 steps)", "answer": "- Step 1: $$C \\cap S$$ is defined as \"in $$C$$ AND in $$S$$\". Anyone in $$C \\cap S \\cap G$$ satisfies this — they're in $$C$$ and in $$S$$ (and additionally in $$G$$, but that's a bonus, not a disqualification).\n- Step 2: Geometrically, the triple-overlap is a **subset** of the pairwise overlap. Forgetting it amounts to subtracting people who genuinely belong to $$C \\cap S$$ just because they also belong to $$G$$.\n\nThis is the most common Venn-diagram-with-independence slip.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "When calculating the intercept $$a = \\bar{g} - b\\bar{d}$$ for the regression line, explain why using the rounded value $$b \\approx 0.722$$ too early can jeopardise the accuracy of $$a$$ to $$3$$ significant figures. (2 steps)", "answer": "- Step 1: The intercept is a small difference between two large numbers: $$\\bar{g} \\approx 89.15$$ and $$b\\bar{d} \\approx 131.45$$. Their difference is roughly $$-42.3$$. A tiny relative error in $$b$$ gets multiplied by $$\\bar{d} \\approx 182.1$$, creating an absolute error of about $$0.0002 \\times 182 \\approx 0.04$$ in the product.\n- Step 2: Because the intercept is only on the order of tens, an error of $$0.04$$ can shift the third significant figure. Therefore you must carry the unrounded $$b = 0.72184\\ldots$$ through the subtraction and round only the final result.", "source": "Kimi K2.6 ②", "_id": "kimi_2_26"}, {"question": "Why do we use $$N/2$$ (not $$(N+1)/2$$) for the median position in **grouped continuous** data?", "answer": "For continuous data treated as a smooth distribution, the median is the value below which 50% of the area lies, so the position is at the proportion $$N/2$$ along the cumulative frequency. The $$(N+1)/2$$ rule applies to **discrete** ungrouped data where each value occupies a distinct position. Conflating the two leads to slightly wrong interpolations.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "In a \"show that\" question such as Q2(b) where $$\\operatorname{Var}(X)=4.14$$ is given, explain what the examiner expects to see in your working and why merely writing the final line loses marks. (2 steps)", "answer": "- Step 1: The examiner requires evidence that you computed $$E(X^2)$$ from first principles by listing each term $$x^2 P(X=x)$$ and summing them. You must also explicitly state the formula $$\\operatorname{Var}(X)=E(X^2)-[E(X)]^2$$ or show the subtraction of $$4.6^2$$.\n- Step 2: A \"show that\" question awards marks for the **derivation**, not the destination. Skipping straight to $$4.14$$ denies the marker the opportunity to verify your method; even if the final number is correct, intermediate steps are required to secure full credit.", "source": "Kimi K2.6 ②", "_id": "kimi_2_58"}, {"question": "Synthesising: Compare and contrast the methods for finding quartiles in Q1(b) (discrete raw data, $$N = 35$$) and Q3(b) (grouped continuous data, $$N = 50$$), highlighting why one uses position rounding and the other uses linear interpolation. (3 steps)", "answer": "- Step 1: In Q1(b), the data are discrete and listed individually, so the quartile is an actual observed data point. The Edexcel rule selects a position (round up or average) and picks the value at that rank.\n- Step 2: In Q3(b), the data are grouped into intervals; the individual values are unknown. Linear interpolation assumes a uniform distribution within the median class and estimates a value that is not necessarily observed.\n- Step 3: The discrete method preserves the exact data, while the grouped method is an approximation. Using $$(N+1)/2$$ — appropriate for some discrete conventions — would be wrong for the grouped case, and using interpolation for discrete ranked data would invent non-existent values.", "source": "Kimi K2.6 ①", "_id": "kimi_1_47"}, {"question": "For grouped continuous data, why does the median use $$N/2$$ rather than $$(N+1)/2$$, and why must the lower class boundary be used as the starting point $$L$$ in linear interpolation? (3 steps)", "answer": "- Step 1: Grouped data treat the variable as continuous and the frequencies as spread evenly across each class. The median is the value that splits the total area of the histogram in half, so we use the exact area proportion $$N/2$$ rather than the discrete rank $$(N+1)/2$$.\n- Step 2: The lower class boundary $$L$$ is the true left edge of the median class interval. Using the stated lower limit (e.g. 32) is correct only when the boundary coincides with the limit; for continuous data given as inequalities $$32 \\le x < 36$$, the boundary is exactly 32.\n- Step 3: Interpolation assumes the $$N/2 - F_b$$ individuals inside the median class are distributed uniformly from $$L$$ to the upper boundary, so the fraction $$\\frac{N/2 - F_b}{f_m}$$ of the class width is added to $$L$$.", "source": "Kimi K2.6 ①", "_id": "kimi_1_16"}, {"question": "Synthesising: Explain how using the wrong Birch $$Q_1$$ (position 6, value 35) in Q1(b) would cascade into an incorrect outlier count in Q1(c), and why the exam’s “show there is only one outlier” acts as a diagnostic check. (3 steps)", "answer": "- Step 1: With the wrong $$Q_1 = 35$$ and correct $$Q_3 = 57$$, the IQR becomes 22 instead of 18. The upper fence rises to $$57 + 33 = 90$$, and the lower fence drops to $$35 - 33 = 2$$.\n- Step 2: Because the smallest value is 28 and the largest is 85, neither boundary is breached, suggesting zero outliers. Alternatively, if $$Q_3$$ were also wrong, the fence could shift to misclassify values.\n- Step 3: The question’s insistence on “only one outlier” forces you to verify your quartiles: if your calculation yields a different number, you know your $$Q_1$$ or $$Q_3$$ is wrong and you can self-correct before losing all downstream marks.", "source": "Kimi K2.6 ①", "_id": "kimi_1_45"}, {"question": "In Q4(f), a $$x$$ cm increase in length produces a $$17.3$$ cm increase in girth. Explain why you use the gradient $$b$$ directly rather than the full regression equation $$g = a + bd$$ to solve for $$x$$. (2 steps)", "answer": "- Step 1: The regression equation gives the **absolute** predicted girth for a given length. When comparing two predicted girths at two different lengths, the intercepts cancel: $$(a+b(d+x)) - (a+bd) = bx$$.\n- Step 2: Therefore, the **change** in predicted girth depends only on the gradient $$b$$ and the change in length. Setting $$bx = 17.3$$ avoids irrelevant intercept arithmetic and immediately yields $$x = 17.3/b \\approx 24.0$$ cm.", "source": "Kimi K2.6 ②", "_id": "kimi_2_29"}, {"question": "In a Venn problem with independence of two events, why is the equation $$P(A \\cap B) = P(A) \\cdot P(B)$$ a constraint rather than a definition you can apply automatically? (2 steps)", "answer": "- Step 1: Independence is a **given assumption** about the events — not a property that's automatically true. The problem states \"C and S are independent\", which gives you the equation as a constraint that determines an unknown ($$p$$).\n- Step 2: Without the independence assumption, you can't multiply marginals to get the intersection. The equation acts as a relationship between $$P(C)$$, $$P(S)$$, $$P(C\\cap S)$$ that **must** hold — used to solve for missing region probabilities.\n\nAlways check the problem **states** independence before applying the multiplication rule.", "source": "Opus 4.7 ①", "_id": "opus_1_73"}, {"question": "In the Venn diagram for Q6, distinguish between \"$$C$$ only\", \"$$C \\cap S$$ only\", and \"$$C \\cap S \\cap G$$\", and explain why all three must be included when computing $$P(C)$$. (2 steps)", "answer": "- Step 1: \"$$C$$ only\" means the region inside $$C$$ but outside both $$S$$ and $$G$$. \"$$C \\cap S$$ only\" means inside both $$C$$ and $$S$$ but outside $$G$$. \"$$C \\cap S \\cap G$$\" is the triple overlap at the centre.\n- Step 2: The event $$C$$ is the union of every region that involves $$C$$, regardless of what else occurs. Omitting any of these regions would undercount the total probability of playing Chess. Thus $$P(C) = P(C\\text{ only}) + P(C\\cap G\\text{ only}) + P(C\\cap S\\text{ only}) + P(C\\cap S\\cap G)$$.", "source": "Kimi K2.6 ②", "_id": "kimi_2_37"}, {"question": "Why does the PMCC $$r$$ always lie in $$[-1, 1]$$, and what's a quick sanity check on your computation? (2 steps)", "answer": "- Step 1: By the Cauchy–Schwarz inequality, $$|S_{xy}|^2 \\le S_{xx} S_{yy}$$, so $$|r| = |S_{xy}|/\\sqrt{S_{xx}S_{yy}} \\le 1$$.\n- Step 2: Sanity check: after computing $$r$$, verify $$-1 \\le r \\le 1$$. If you get $$r = 1.3$$, you've either confused $$S_{xy}$$ with $$\\sum xy$$, forgotten the square root in the denominator, or used the wrong $$S$$ value.\n\nThe sign of $$r$$ should match the sign of $$S_{xy}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "For Q6(e), explain conceptually why the quickest way to find the number of teenagers not playing Scrabble is to use $$P(S') = 1 - P(S)$$, and describe the error that leads to an answer of 47 instead of 105. (3 steps)", "answer": "- Step 1: “Not Scrabble” includes every region outside circle $$S$$: the $$C$$-only, $$G$$-only, $$C \\cap G$$-only, and outside-all-three ($$q$$) regions. Computing $$1 - P(S)$$ automatically captures all of these in one step because $$P(S)$$ and $$P(S')$$ partition the entire space.\n- Step 2: The incorrect answer 47 arises from summing only the non-Scrabble regions that touch $$C$$ or $$G$$ — for example $$0.04 + 0.14$$ — and omitting the outside region $$q = 0.22$$ and the $$G$$-only region (0).\n- Step 3: After obtaining the total population as $$76 / P(C \\cap G) = 76 / 0.29 \\approx 262$$, multiplying by the full complement $$0.40$$ gives about 105. Using a partial complement underestimates the count by missing the teenagers who play neither Chess nor Go.", "source": "Kimi K2.6 ①", "_id": "kimi_1_32"}, {"question": "Why does the regression line of $$g$$ on $$d$$ use $$b = S_{dg}/S_{dd}$$, and what would be wrong with dividing by $$S_{gg}$$ instead? (2 steps)", "answer": "- Step 1: The phrase “$$g$$ on $$d$$” means we are predicting the response $$g$$ from the explanatory variable $$d$$. The least-squares gradient minimises vertical squared residuals in the $$g$$ direction, and the formula $$S_{xy}/S_{xx}$$ always pairs the covariance of the two variables with the variance of the **predictor** ($$x$$, here $$d$$).\n- Step 2: Dividing by $$S_{gg}$$ would give the gradient of the regression of $$d$$ on $$g$$, which minimises horizontal residuals. That line answers a different question — predicting length from girth — and generally has a different slope.", "source": "Kimi K2.6 ①", "_id": "kimi_1_21"}, {"question": "Define $$S_{dg}$$ and $$S_{dd}$$ in the context of the bear data, and explain what each measures geometrically about the scatter plot. (2 steps)", "answer": "- Step 1: $$S_{dg} = \\sum dg - \\frac{(\\sum d)(\\sum g)}{n}$$ measures the **corrected sum of cross-products**. It captures how much the paired measurements of length $$d$$ and girth $$g$$ vary together around their respective means. If longer bears tend to have larger girths, $$S_{dg}$$ is positive and large.\n- Step 2: $$S_{dd} = \\sum d^2 - \\frac{(\\sum d)^2}{n}$$ is the **corrected sum of squares** for length. It measures the total spread of the length data around its mean. It appears in the denominator of the regression gradient to scale the covariance into a unitless slope.", "source": "Kimi K2.6 ②", "_id": "kimi_2_23"}, {"question": "In bivariate analysis, what do $$S_{dg}$$ and $$S_{gg}$$ measure conceptually, and why must you subtract $$\\frac{(\\sum d)(\\sum g)}{n}$$ rather than simply using $$\\sum dg$$ or $$\\sum g^2$$? (3 steps)", "answer": "- Step 1: $$S_{dg} = \\sum dg - \\frac{(\\sum d)(\\sum g)}{n}$$ is the corrected sum of products. It measures how much $$d$$ and $$g$$ vary together around their respective means. Similarly, $$S_{gg}$$ is the corre
