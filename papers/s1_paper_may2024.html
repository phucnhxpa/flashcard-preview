re 1 mm (which it isn't — it's 4 mm).\n\nAlways compute the per-unit scale constant first, then multiply.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "What is the linear interpolation formula for estimating the median from grouped continuous data, and what does each symbol represent? (2 steps)", "answer": "- Step 1: $$\\text{Median} = L + \\frac{N/2 - F_b}{f_m} \\times c$$ where $L$ = lower class boundary of the median class, $F_b$ = cumulative frequency before the median class, $f_m$ = frequency of the median class, $c$ = class width of the median class.\n- Step 2: The logic: you've passed $F_b$ observations and need $N/2 - F_b$ more within the median class. The fraction $(N/2 - F_b)/f_m$ tells you how far through the class the median falls, and multiplying by $c$ converts that fraction into the data units.\n\nThis is for grouped **continuous** data. Do NOT use $(N+1)/2$ — that's for discrete data.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "When using linear interpolation for the median of grouped data, should you use $N/2$ or $(N+1)/2$ for the median position? Why? (2 steps)", "answer": "- Step 1: Use **$N/2$** for grouped continuous data. The data are treated as continuously spread within each class, so the median is the value that splits the area in half — the $N/2$th observation.\n- Step 2: $(N+1)/2$ is the rule for **discrete** data (individual values). Using it for grouped data gives a slightly different position and is wrong for Edexcel S1. For $N = 50$: $N/2 = 25$ (correct for grouped), $(N+1)/2 = 25.5$ (wrong for grouped).\n\nAlso: use the lower class **boundary** (e.g., 32, not 31.5 or 32.5) as $L$.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "Given the coding $10y = w - 20$, you need to find $\\bar{w}$ from $\\sum y$ and $n$. What is the step-by-step approach? (3 steps)", "answer": "- Step 1: Rearrange to express $w$ in terms of $y$: $w = 10y + 20$.\n- Step 2: Compute $\\bar{y} = \\frac{\\sum y}{n}$.\n- Step 3: Apply the linear coding rule for the mean: $\\bar{w} = 10\\bar{y} + 20$. The same coefficients pass through — you transform the mean using the same $a$ and $b$.\n\nDo NOT try to transform individual $y$-values first and then average — that's unnecessary and error-prone.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "What is the formula for variance from raw sums that is NOT in the IAL formula booklet, and how do you use it with coded data? (2 steps)", "answer": "- Step 1: $$\\sigma^2 = \\frac{\\sum x^2}{n} - \\bar{x}^2$$ This is equivalent to $\\text{Var}(X) = E(X^2) - [E(X)]^2$ for probability distributions. Compute $\\sum y^2 / n$ and subtract $\\bar{y}^2$ to get $\\text{Var}(y)$.\n- Step 2: For coded data $w = 10y + 20$: $\\text{Var}(w) = 10^2 \\cdot \\text{Var}(y) = 100 \\cdot \\text{Var}(y)$. Then $\\sigma_w = 10 \\cdot \\sigma_y$. The $+20$ has no effect on variance or SD.\n\nCommon error: scaling variance by 10 instead of 100, or adding 20 to the SD.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": true}, {"question": "Why does adding a constant $b$ (as in $w = ay + b$) have no effect on the standard deviation? Give both a formula reason and an intuitive reason. (2 steps)", "answer": "- Step 1: Formula: $\\text{Var}(aX + b) = a^2\\text{Var}(X)$. The $b$ doesn't appear because $\\text{Var}(X + b) = E[(X+b)^2] - [E(X+b)]^2 = E[X^2 + 2bX + b^2] - [E(X) + b]^2 = E(X^2) + 2bE(X) + b^2 - [E(X)]^2 - 2bE(X) - b^2 = \\text{Var}(X)$.\n- Step 2: Intuition: adding a constant shifts every data point by the same amount. Since SD measures **spread** (distances between values), and shifting doesn't change any distances, SD is unchanged. Only multiplying by $a$ stretches/compresses the spread.\n\nThink: if everyone gets a 20-gram bonus, the pebbles' weight spread is unchanged.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "A new data value equal to the current mean is added to the dataset. What happens to (i) the mean and (ii) the standard deviation, and why? (3 steps)", "answer": "- Step 1: (i) The mean is **unchanged**. New mean $= \\frac{n\\bar{x} + \\bar{x}}{n+1} = \\frac{(n+1)\\bar{x}}{n+1} = \\bar{x}$. Adding a value at the mean doesn't shift the balance point.\n- Step 2: (ii) The SD **decreases**. The new value contributes $(\\bar{x} - \\bar{x})^2 = 0$ to the sum of squared deviations, but the denominator $n$ increases to $n+1$. So the average squared deviation (variance) decreases.\n- Step 3: Intuitively: you've added a value right at the center, which makes the data slightly more concentrated. The spread measure shrinks because the \"dilution\" effect of the larger denominator isn't offset by any new deviation.\n\nSaying \"no change\" for SD is wrong — the decrease is small but real.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "When computing $S_{xy}$, $S_{xx}$, or $S_{yy}$ from summary statistics, what is the formula, and what is a common arithmetic pitfall? (2 steps)", "answer": "- Step 1: $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$ and analogously $S_{xx} = \\sum x^2 - \\frac{(\\sum x)^2}{n}$. Compute the product of the sums first, then divide by $n$.\n- Step 2: Common pitfall: dividing by $n^2$ instead of $n$ (i.e., computing $\\frac{\\sum x}{n} \\times \\frac{\\sum y}{n}$ and then multiplying by $n$ incorrectly). Another: computing $\\sum x^2$ when you need $\\sum y^2$ for $S_{yy}$ — check which variable's sum of squares you need.\n\nKeep all decimals when the question asks for \"exact\" values.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "For the PMCC $r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}}$, what is the essential sanity check on your answer, and what does it mean if it fails? (2 steps)", "answer": "- Step 1: $r$ must lie in the interval $[-1, 1]$. If your computed $|r| > 1$, something is wrong — likely a missing square root in the denominator, or an arithmetic error in $S_{xy}$, $S_{xx}$, or $S_{yy}$.\n- Step 2: If $r \\approx 0.98$, the correlation is very strong and positive — consistent with $S_{xy} > 0$. If $r$ comes out negative when the context suggests a positive relationship (e.g., length and girth of bears), recheck your $S_{xy}$ sign.\n\nThe sanity check catches missing square roots and sign errors before you move on.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "For the regression line of $g$ on $d$, the gradient is $b = S_{dg}/S_{dd}$. A student uses $S_{gg}$ in the denominator instead. Why is this wrong, and how do you remember which to use? (2 steps)", "answer": "- Step 1: The regression line of $y$ on $x$ has gradient $b = S_{xy}/S_{xx}$. The denominator is always the $S_{xx}$ of the **explanatory** (horizontal axis) variable. Since $g$ is being predicted from $d$, $d$ is the explanatory variable, so the denominator is $S_{dd}$.\n- Step 2: Mnemonic: \"the denominator matches the bottom axis.\" If you're predicting $y$ from $x$, divide by $S_{xx}$. If you were predicting $x$ from $y$ (line of $x$ on $y$), you'd divide by $S_{yy}$. Using $S_{gg}$ would give the gradient of the wrong regression line.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "When computing the intercept $a = \\bar{y} - b\\bar{x}$ for a regression line, why must you use the **unrounded** value of $b$? (2 steps)", "answer": "- Step 1: Rounding $b$ early (e.g., using 0.722 instead of 0.72184...) introduces a compounding error when multiplied by $\\bar{x}$. For $\\bar{x} = 182.1$: $0.722 \\times 182.1 = 131.48$, but $0.72184 \\times 182.1 = 131.45$. The difference of 0.03 propagates into the intercept.\n- Step 2: Since the intercept must be given to 3 s.f. ($-42.3$), an error of 0.03 in the product could push the intercept to $-42.27$ vs $-42.30$ — potentially different at 3 s.f. Always carry full precision through intermediate steps and round only the final answer.\n\nStore $b$ in your calculator's memory and recall it when computing $a$.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": true}, {"question": "When asked to \"give an interpretation, in context, of the gradient of the regression line,\" what three elements must your answer contain? (2 steps)", "answer": "- Step 1: Your answer must contain: (1) the specific increment in the explanatory variable (\"for every 1 cm increase in length\"), (2) the predicted change in the response variable (\"girth increases by approximately 0.722 cm\"), and (3) the qualifier \"on average\" or \"approximately\" (since the regression line is a model, not an exact law).\n- Step 2: You must use the actual variable names and units from the context — not \"$x$\" and \"$y$\". Saying \"the line slopes up\" or \"as one goes up the other goes up\" scores zero because it lacks the numerical gradient, units, and specificity.\n\nTemplate: \"For each 1 [unit of x] increase in [x-variable name], the [y-variable name] increases by approximately [gradient value] [units of y] on average.\"", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": false}, {"question": "A question asks you to estimate the girth of a bear with length 2.5 metres, where the regression equation uses $d$ in cm. What must you do before substituting, and why? (2 steps)", "answer": "- Step 1: **Convert units first**: 2.5 metres = 250 cm. The regression equation $g = -42.3 + 0.722d$ uses $d$ in cm, so you must substitute $d = 250$, not $d = 2.5$.\n- Step 2: If you substitute $d = 2.5$, you get $g = -42.3 + 0.722(2.5) = -42.3 + 1.805 = -40.5$ cm — a nonsensical negative girth. This should immediately signal a unit error.\n\nAlways check the units of the regression equation variables before substituting.", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": false}, {"question": "Why is using a regression line to estimate the girth of a bear with length 0.5 metres unreliable, even if the arithmetic gives a number? (2 steps)", "answer": "- Step 1: A length of 0.5 m = 50 cm is well **outside the observed range** of the data (the mean length is 182.1 cm, so the data likely range from roughly 140–220 cm). This is **extrapolation**.\n- Step 2: The linear relationship observed within the data range may not hold outside it. The true relationship could be curved, or the biological constraints could change for very small bears. The estimate is unreliable because we have no data to verify the model in that region.\n\nUse the words \"outside the observed range\" or \"extrapolation\" in your answer — vague statements like \"the data isn't accurate\" score zero.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": true}, {"question": "The regression line predicts that for each $x$ cm increase in length, girth increases by 17.3 cm. To find $x$, a student writes $-42.3 + 0.722x = 17.3$. Why is this wrong? (2 steps)", "answer": "- Step 1: The 17.3 cm is an **increment** in girth (a change in $g$), not a girth value itself. The correct equation uses only the gradient: $0.722 \\times x = 17.3$, because the gradient tells you the change in $g$ per unit change in $d$.\n- Step 2: The student's equation treats 17.3 as a final $g$-value, which would include the intercept. But the intercept is the girth when $d = 0$ — irrelevant when we're talking about a change. For increments, only the gradient matters: change in $g$ = gradient × change in $d$.\n\nSolve: $x = 17.3 / 0.722 \\approx 24.0$ cm.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": true}, {"question": "In a normal distribution question, \"the fastest 60% of adults\" are selected for round two. Does \"fastest\" correspond to the upper tail or the lower tail of the time distribution? Why? (2 steps)", "answer": "- Step 1: \"Fastest\" means **shortest time**. People who complete the task quickly have low times. So the fastest 60% are the 60% with the smallest $X$-values — this is the **lower tail**.\n- Step 2: Therefore $P(X < t) = 0.60$, and you look up $\\Phi^{-1}(0.60) = 0.2533$ (positive). The common error is interpreting \"fastest\" as \"best\" and mistakenly using the upper tail $P(X > t) = 0.60$, which gives $t \\approx 14.5$ instead of the correct $t \\approx 15.5$.\n\n**Always sketch the normal curve and shade the relevant region before computing.** Label \"fast = short time = lower tail.\"", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": true}, {"question": "When standardising to find $P(X < 18)$ for $X \\sim N(15, 4)$, what is the correct standardisation formula, and what is a common error? (2 steps)", "answer": "- Step 1: $$Z = \\frac{X - \\mu}{\\sigma} = \\frac{18 - 15}{2} = 1.5$$ Then $P(X < 18) = P(Z < 1.5) = \\Phi(1.5) = 0.9332$.\n- Step 2: Common error: dividing by $\\sigma^2$ instead of $\\sigma$ (i.e., computing $(18-15)/4 = 0.75$). Another: using the wrong tail — computing $P(Z > 1.5) = 0.0668$ when you need $P(Z < 1.5)$.\n\nThe formula divides by $\\sigma$ (the SD), not $\\sigma^2$ (the variance). If given $N(\\mu, \\sigma^2)$, extract $\\sigma$ first.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": true}, {"question": "Given $P(\\mu - 10 < T < \\mu + 10) = 0.95$ for $T \\sim N(\\mu, \\sigma^2)$, how do you find $\\sigma$? Walk through the logic. (3 steps)", "answer": "- Step 1: By symmetry of the normal distribution, the 5% outside the interval splits equally: $P(T < \\mu - 10) = 0.025$ and $P(T > \\mu + 10) = 0.025$.\n- Step 2: Standardise the lower boundary: $P\\left(Z < \\frac{(\\mu - 10) - \\mu}{\\sigma}\\right) = P\\left(Z < \\frac{-10}{\\sigma}\\right) = 0.025$. So $\\frac{-10}{\\sigma} = -1.96$ (from tables: $\\Phi^{-1}(0.025) = -1.96$).\n- Step 3: Solve: $\\sigma = 10/1.96 \\approx 5.102$. **Sanity check**: $\\sigma \\approx 5$ is the same order of magnitude as the half-width 10, which makes sense. If you get $\\sigma \\approx 0.5$, you've made a decimal slip.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": true}, {"question": "The computation $\\sigma = 10/1.96$ gives approximately 5.10. A recurring error produced 0.510 instead. What kind of mistake causes this, and how do you guard against it? (2 steps)", "answer": "- Step 1: The error is a **decimal placement slip** — likely dividing by 19.6 instead of 1.96, or misplacing the decimal when computing $10/1.96$. This shifts the answer by one order of magnitude.\n- Step 2: Guard with a **sanity check**: $\\sigma$ should be of the same order of magnitude as the interval half-width. The interval is $\\mu \\pm 10$, so $\\sigma$ should be roughly 5 (since 1.96σ ≈ 10). Getting 0.5 would mean 1.96 × 0.5 ≈ 1, not 10 — clearly wrong. Getting 51 would mean 1.96 × 51 ≈ 100, also wrong.\n\nAlways ask: \"does my $\\sigma$ make the interval $[\\mu - 1.96\\sigma, \\mu + 1.96\\sigma]$ approximately match the given 95% interval?\"", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": true}, {"question": "When computing $P(T > \\mu - 5 \\mid T > \\mu - 10)$, you notice that $\\{T > \\mu - 5\\} \\subset \\{T > \\mu - 10\\}$. How does this subset relationship simplify the conditional probability? (2 steps)", "answer": "- Step 1: By the conditional probability formula: $P(A \\mid B) = P(A \\cap B)/P(B)$. When $A \\subset B$, the intersection $A \\cap B = A$ (since every element of $A$ is already in $B$).\n- Step 2: Therefore $P(T > \\mu - 5 \\mid T > \\mu - 10) = P(T > \\mu - 5) / P(T > \\mu - 10)$. The numerator is just $P(T > \\mu - 5)$ — no need to compute a new intersection.\n\nWithout recognising the subset relationship, you might try to compute $P(\\mu - 10 < T < \\mu - 5)$ for the numerator, which is the wrong approach.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "In the conditional probability $P(T > \\mu - 5 \\mid T > \\mu - 10)$, the denominator is $P(T > \\mu - 10)$. A student uses 0.95 (from the given interval). Why is 0.975 correct instead? (2 steps)", "answer": "- Step 1: $P(\\mu - 10 < T < \\mu + 10) = 0.95$. This is the probability of being **inside** the interval. But $P(T > \\mu - 10)$ includes everything above $\\mu - 10$ — both the 95% inside the interval AND the 2.5% in the upper tail.\n- Step 2: $P(T > \\mu - 10) = 0.95 + 0.025 = 0.975$. Alternatively, $P(T > \\mu - 10) = 1 - P(T < \\mu - 10) = 1 - 0.025 = 0.975$.\n\nUsing 0.95 as the denominator would give a larger final answer — wrong because it omits the upper-tail probability.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": true}, {"question": "When computing $P(Z > -0.98)$, you can look up $\\Phi(0.98) = 0.8365$ directly. Why does this work? (2 steps)", "answer": "- Step 1: By the symmetry of the standard normal distribution: $P(Z > -a) = P(Z < a) = \\Phi(a)$ for any positive $a$. The area to the right of $-a$ equals the area to the left of $a$.\n- Step 2: So $P(Z > -0.98) = \\Phi(0.98) = 0.8365$. You look up the positive value in the table directly. Without this symmetry trick, you'd need to compute $1 - \\Phi(-0.98)$, but most tables don't list negative $z$-values.\n\nThis is a standard manoeuvre: flip the sign using symmetry to avoid negative-$z$ lookups.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": true}, {"question": "For a Venn diagram with three sets $C$, $S$, $G$ and an outside region $q$, how many distinct regions are there, and what equation do they satisfy? (2 steps)", "answer": "- Step 1: There are **8** distinct regions: $C$ only, $S$ only, $G$ only, $C \\cap S$ only, $C \\cap G$ only, $S \\cap G$ only, $C \\cap S \\cap G$, and the outside region (none of the three).\n- Step 2: All 8 probabilities sum to 1: $P(C\\text{ only}) + P(S\\text{ only}) + \\ldots + P(\\text{outside}) = 1$. This is the equation you use to find any unknown region.\n\nCommon mistake: forgetting the outside region exists, or forgetting a region with probability 0 (like $G$ only = 0 in this question — it still occupies a slot in the sum).", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "To find $P(C \\cap G')$ from a Venn diagram, which regions do you sum, and what is the key principle? (2 steps)", "answer": "- Step 1: $C \\cap G'$ means \"in $C$ but NOT in $G$.\" You sum all regions inside circle $C$ that lie **outside** circle $G$: $P(C\\text{ only}) + P(C \\cap S\\text{ only, not }G)$.\n- Step 2: Key principle: do NOT include any region that touches $G$. The regions $C \\cap G$ only and $C \\cap S \\cap G$ are inside $G$, so they are excluded. Only the $C$-pieces outside $G$ count.\n\nDo NOT use $P(C) \\times P(G')$ unless $C$ and $G$ are independent — which may not be given.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": true}, {"question": "When using the independence condition $P(C \\cap S) = P(C) \\cdot P(S)$ with a Venn diagram, what is the most common mistake in identifying $P(C \\cap S)$? (2 steps)", "answer": "- Step 1: $P(C \\cap S)$ must include **all** regions in the overlap of circles $C$ and $S$ — that's both the triple-overlap $P(C \\cap S \\cap G)$ AND the $C \\cap S$ only region (not $G$).\n- Step 2: The common mistake is using only one of these subregions (e.g., just the $C \\cap S$ only value of 0.12, or just the triple-overlap of 0.15). The correct $P(C \\cap S) = 0.12 + 0.15 = 0.27$.\n\nWhenever you compute the probability of an intersection from a Venn diagram, scan ALL subregions within that intersection — there may be multiple (split by the third set).", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": true}, {"question": "A student needs to find $P(S')$ (\"does not play Scrabble\") from a three-set Venn diagram with an outside region $q$. They add up the non-$S$ regions inside the circles but get the wrong answer. What did they forget, and what's the reliable shortcut? (2 steps)", "answer": "- Step 1: They forgot the **outside region** $q$ (and possibly the $G$-only region if it's 0). $P(S')$ is the probability of being anywhere outside circle $S$ — including outside all three circles.\n- Step 2: The reliable shortcut: $P(S') = 1 - P(S)$. Since $P(S)$ includes all regions inside circle $S$, subtracting from 1 automatically captures everything outside $S$, including the outside region. This is faster and less error-prone than manually summing non-$S$ regions.\n\nIn this paper, manually summing gave 0.18 (missing $q = 0.22$ and $G$-only $= 0$); the shortcut correctly gives $1 - 0.60 = 0.40$.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": true}, {"question": "To estimate the total population size from a Venn diagram, you know that 76 teenagers play both Chess and Go, and $P(C \\cap G) = 0.29$. What is the formula, and what must $P(C \\cap G)$ include? (2 steps)", "answer": "- Step 1: Total $= \\frac{\\text{observed count}}{\\text{probability}} = \\frac{76}{0.29} \\approx 262$. The logic: if 29% of the population falls in category $C \\cap G$, and you observe 76 in that category, the total is $76 / 0.29$.\n- Step 2: $P(C \\cap G)$ must include ALL regions in the $C$-$G$ overlap: both $P(C \\cap G\\text{ only}) = p = 0.14$ and $P(C \\cap S \\cap G) = 0.15$. Using only 0.15 (missing $p$) would give $76/0.15 \\approx 507$ — wrong.\n\nSame principle as Q46: an intersection in a three-set Venn may have multiple subregions.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": true}, {"question": "When computing $P(C \\mid S \\cap G)$ from a Venn diagram, what is the formula, and what does $P(S \\cap G)$ include? (2 steps)", "answer": "- Step 1: $$P(C \\mid S \\cap G) = \\frac{P(C \\cap S \\cap G)}{P(S \\cap G)}$$ The numerator is the triple-overlap region only.\n- Step 2: $P(S \\cap G)$ includes ALL regions in the $S$-$G$ overlap: both $P(C \\cap S \\cap G) = 0.15$ and $P(S \\cap G\\text{ only}) = 0.10$. So $P(S \\cap G) = 0.15 + 0.10 = 0.25$, giving $P(C \\mid S \\cap G) = 0.15/0.25 = 0.6$.\n\nAgain: the denominator intersection includes the triple-overlap. Don't use just $P(S) \\cdot P(G)$ unless independent.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": true}, {"question": "For $P((C \\cup S) \\cap G')$ from a Venn diagram, describe which regions you sum and the visual method for identifying them. (2 steps)", "answer": "- Step 1: Visually: shade everything in $C$ or $S$ (the union), then intersect with everything outside $G$. You're looking for regions that are inside $C$ or $S$ AND outside $G$.\n- Step 2: The qualifying regions are: $C$ only (0.04), $C \\cap S$ only not $G$ (0.12), and $S$ only (0.23). Sum: $0.04 + 0.12 + 0.23 = 0.39$. Regions involving $G$ (like $C \\cap G$ only or $S \\cap G$ only or the triple overlap) are excluded.\n\nShade the Venn diagram first — it prevents you from missing or double-counting regions.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "What is the \"translation boundary\" pattern identified in the May 2024 paper, and why is it the main source of lost marks rather than computational errors? (2 steps)", "answer": "- Step 1: The \"translation boundary\" refers to the step of converting English-language descriptions into the correct mathematical formulation: \"fastest 60%\" → lower tail, \"no change to box plot\" → five constraints, \"does not play Scrabble\" → full complement including outside region.\n- Step 2: These translation steps don't require heavy computation — they require careful reading and interpretation. The pattern across this paper is that every major error traces back to a translation slip (wrong tail, missing constraint, forgotten region), not to an arithmetic mistake. The remedy: slow down on words like \"fastest\", \"no change\", and \"does not play\"; sketch a diagram; list constraints before computing.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": true}, {"question": "Why should you sketch a normal curve and shade the relevant region before doing any algebra in a normal distribution question? Give the specific example from Q5(b). (2 steps)", "answer": "- Step 1: Sketching forces you to decide which tail you're dealing with before you commit to an equation. Without a sketch, it's easy to autopilot into $P(X > t) = 0.60$ when you actually need $P(X < t) = 0.60$.\n- Step 2: In Q5(b), \"fastest 60%\" means the shortest 60% of times. On the sketch, this is the shaded area on the LEFT (lower tail). Without sketching, both the student and the tutor set up $P(X < t) = 0.40$ (upper tail), getting $t = 14.49$ instead of the correct 15.5.\n\nThe sketch is a 10-second investment that prevents the single most expensive error type on this paper.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": true}, {"question": "When a question says \"show that $\\text{Var}(X) = 4.14$\", you're given the answer. Why must you still show full working, and what does \"full working\" mean here? (2 steps)", "answer": "- Step 1: \"Show that\" questions award marks for the **method**, not just the answer. You must demonstrate each step of the derivation so the marker can award method marks even if you make a minor arithmetic slip.\n- Step 2: Full working means: write out all five terms of $E(X^2) = \\sum x^2 P(X=x)$ individually ($2^2 \\times 0.25 + 4^2 \\times 0.3 + \\ldots$), compute the sum, then write $\\text{Var}(X) = E(X^2) - [E(X)]^2 = 25.3 - 4.6^2 = 25.3 - 21.16 = 4.14$. Box the final answer.\n\nJumping straight to \"4.14\" with no intermediate steps earns zero marks.", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "In a histogram question, you're given the dimensions of one reference bar and asked for the dimensions of another. What is the two-constant method, and why is it safer than direct proportion? (3 steps)", "answer": "- Step 1: Compute the **width scale constant**: cm per mm of class width $= \\frac{\\text{reference bar width (cm)}}{\\text{reference class width (mm)}}$. For the given data: $2.5/4 = 0.625$ cm/mm.\n- Step 2: Compute the **height scale constant**: cm per unit of frequency density $= \\frac{\\text{reference bar height (cm)}}{\\text{reference FD}}$. For the given data: $7.5/5 = 1.5$ cm per unit FD.\n- Step 3: Apply each constant to the target class separately. This is safer than \"direct proportion\" because the two dimensions scale differently — width depends on class width, height depends on FD. Trying to scale both at once leads to errors like multiplying class width by the reference bar width.\n\nTwo constants, two independent calculations, two correct answers.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": true}, {"question": "For the conditional probability in Q5(c), the numerator involves $P(Z > -0.98)$. Walk through the complete standardisation from $P(T > \\mu - 5)$ to this $Z$-value. (3 steps)", "answer": "- Step 1: $P(T > \\mu - 5) = P\\left(Z > \\frac{(\\mu - 5) - \\mu}{\\sigma}\\right) = P\\left(Z > \\frac{-5}{\\sigma}\\right)$.\n- Step 2: With $\\sigma = 10/1.96 \\approx 5.102$: $\\frac{-5}{5.102} \\approx -0.980$. So $P(Z > -0.980)$.\n- Step 3: By symmetry, $P(Z > -0.98) = P(Z < 0.98) = \\Phi(0.98) = 0.8365$.\n\nThe key manoeuvres: standardise (subtract $\\mu$, divide by $\\sigma$), then flip the negative using symmetry to avoid looking up a negative $z$-value.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": true}, {"question": "In Q1(f), after finding $a \\in [36, 40]$, how would you verify your answer using a sample value? (2 steps)", "answer": "- Step 1: Pick a value in the range, e.g., $a = 38$. Then the four new data are 27, 38, 48, 76. Insert these into the original sorted Maple data and re-sort.\n- Step 2: Check that the five box-plot statistics (min, $Q_1$, median, $Q_3$, max) are unchanged: min still 25, $Q_1$ still 36 (9th and 10th values), median still 45 (18th and 19th), $Q_3$ still 54 (27th and 28th), max still 80. If any statistic changes, your range is wrong.\n\nThis verification step takes 2 minutes and catches errors in constraint analysis.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "When using the inverse normal function to find a cutoff value, you get $z = 0.2533$ for $P(Z < z) = 0.60$. A student writes $z = -0.2533$. Why is this wrong? (2 steps)", "answer": "- Step 1: $\\Phi(0.2533) = 0.60$, meaning the area to the LEFT of $z = 0.2533$ is 60%. Since 60% > 50%, $z$ must be POSITIVE (to the right of the mean).\n- Step 2: $z = -0.2533$ would give $\\Phi(-0.2533) = 1 - \\Phi(0.2533) = 0.40$, i.e., only 40% to the left. The sign error flips the tail. Sanity check: if you're looking for the value below which 60% falls, $z$ must be positive (since 60% > 50%).", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": false}, {"question": "In Q2(d), Sam wins if $S > R$ (strict inequality). If the question said \"Sam wins if $S \\ge R$\", what would change in the calculation? (2 steps)", "answer": "- Step 1: With strict $>$: when $S = R$ (a draw), Sam does NOT win. With $\\ge$: when $S = R$, Sam DOES win. So you'd include $P(R = S)$ in each row's probability.\n- Step 2: For example, when $S = 5$: currently $P(R < 5) = P(R = 1) = 0.25$. With $\\ge$, you'd add $P(R = 5) = 0.30$, giving $P(R \\le 5) = 0.55$. This would significantly increase $P(\\text{Sam wins})$.\n\nThe question explicitly states \"If the scores are the same it is a draw\" — so draws are excluded from wins. Read the win condition carefully.", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "A cross-check for Q2(d): $P(\\text{Sam wins}) + P(\\text{Alex wins}) + P(\\text{draw}) = 1$. If you computed $P(\\text{Sam wins}) = 0.355$, how would you find $P(\\text{draw})$? (2 steps)", "answer": "- Step 1: A draw occurs when $S = R$. Find all $(s, r)$ pairs where $s = r$: $S = 5, R = 5$ (prob $0.20 \\times 0.30 = 0.06$) and $S = 7, R = 7$ (prob $0.10 \\times 0.20 = 0.02$). No other matches exist since $S$ takes values $\\{2,4,5,7,8\\}$ and $R$ takes values $\\{1,5,7,11,13\\}$.\n- Step 2: $P(\\text{draw}) = 0.06 + 0.02 = 0.08$. Then $P(\\text{Alex wins}) = 1 - 0.355 - 0.08 = 0.565$. If these don't sum to 1, there's an error in your calculation.\n\nThis cross-check catches missing terms and inequality-direction errors.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "When a question asks for the standard deviation and gives coded data $10y = w - 20$ with $\\sum y$ and $\\sum y^2$, what is the correct sequence: do you find SD of $y$ first and then scale, or transform the sums first? (2 steps)", "answer": "- Step 1: Find SD of $y$ **first**: compute $\\text{Var}(y) = \\frac{\\sum y^2}{n} - \\bar{y}^2$, then $\\sigma_y = \\sqrt{\\text{Var}(y)}$.\n- Step 2: Then scale: $\\sigma_w = |a| \\cdot \\sigma_y = 10 \\cdot \\sigma_y$. This works because $\\text{Var}(w) = a^2 \\text{Var}(y) = 100 \\cdot \\text{Var}(y)$, and $\\sigma_w = \\sqrt{100 \\cdot \\text{Var}(y)} = 10\\sigma_y$.\n\nDo NOT try to compute $\\sum w^2$ from $\\sum y^2$ first — while possible ($w = 10y + 20$ means $\\sum w^2 = \\sum(10y+20)^2$), it's algebraically messy and error-prone. Work in $y$, then scale at the end.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": false}, {"question": "In Q3(e), adding a pebble of weight 40.8 g (equal to the mean) decreases the SD. Would adding a pebble heavier than the mean increase or decrease the SD, and why? (2 steps)", "answer": "- Step 1: Adding a value **above** the mean increases the mean slightly and adds a positive squared deviation to the numerator, while also increasing $n$ in the denominator.\n- Step 2: The net effect depends on the magnitude, but generally: adding a value far above the mean **increases** the SD (the new squared deviation outweighs the denominator increase). Adding a value only slightly above the mean could decrease the SD (the denominator dilution dominates). The key insight: a value at the mean always decreases SD; a value far from the mean always increases it.\n\nThis is why the question specifies 40.8 exactly — it's the clean case where the deviation is zero.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": false}, {"question": "In Q4(a), the question asks for the \"exact value\" of $S_{dg}$ and $S_{gg}$. What does \"exact\" mean in this context, and what must you NOT do? (2 steps)", "answer": "- Step 1: \"Exact\" means give the full decimal answer without rounding. Compute $S_{dg} = 141978.84 - (1456.8 \\times 713.2)/8 = 12105.12$ — all decimal places, no rounding to 3 s.f.\n- Step 2: Do NOT round intermediate products. Compute $1456.8 \\times 713.2 = 1038989.76$ in full, then divide by 8. Rounding this product before dividing would introduce errors that propagate into $S_{dg}$.\n\n\"Exact\" in Edexcel S1 usually means: keep all decimals from the given data; don't apply 3 s.f. rounding.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": false}, {"question": "The regression line of $g$ on $d$ is $g = -42.3 + 0.722d$. The intercept is negative (-42.3 cm). Does this mean a bear with zero length has negative girth? Why is this not a problem? (2 steps)", "answer": "- Step 1: The intercept is the predicted $g$-value when $d = 0$, but $d = 0$ cm is far outside the observed range of bear lengths (mean ≈ 182 cm). The regression line is only valid within the data range.\n- Step 2: The negative intercept is a mathematical consequence of fitting a straight line to data that are far from the origin. It doesn't imply anything about reality at $d = 0$ — it's simply the line that best fits the observed data. This is why extrapolation (e.g., to $d = 50$ cm) is unreliable: the model's predictions outside the data range may be nonsensical.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": true}, {"question": "Summarise the three most critical errors from the May 2024 paper and the one-sentence defence against each. (3 steps)", "answer": "- Step 1: **\"Fastest 60%\" → wrong tail.** Defence: sketch the normal curve and shade before writing any equation; \"fastest = shortest = lower tail.\"\n- Step 2: **$\\sigma = 10/1.96$ decimal slip (0.510 vs 5.10).** Defence: sanity-check that $\\sigma$ is the same order of magnitude as the interval half-width; $1.96 \\times 5 \\approx 10$ ✓, $1.96 \\times 0.5 \\approx 1$ ✗.\n- Step 3: **$P(S')$ missing the outside region $q$ (47 vs 105).** Defence: use the shortcut $P(A') = 1 - P(A)$ instead of manually summing non-$A$ regions — it automatically includes the outside region.\n\nEach defence is a 5-second check that saves 3–5 marks.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": true}, {"question": "In Q6(e), the student computed $P(S') = 0.04 + 0.14 = 0.18$ by adding only the non-$S$ regions inside the $C$-circle. What regions were missed, and how does $1 - P(S)$ fix this? (2 steps)", "answer": "- Step 1: The missed regions are: $G$ only (= 0, but still a region that should be checked) and the outside region $q = 0.22$. So $P(S') = 0.04 + 0 + 0.14 + 0.22 = 0.40$, not 0.18.\n- Step 2: $1 - P(S) = 1 - 0.60 = 0.40$ automatically captures everything outside $S$, including the outside region. The manual approach is error-prone because it's easy to forget the outside region or the empty regions — the complement shortcut is both faster and more reliable.\n\nThe lesson: in three-set Venn problems with an outside region, always use $P(A') = 1 - P(A)$ for complements.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": true}, {"question": "For Q1(b), the Edexcel quartile rule gives $Q_1$ as the 9th value for $N = 35$. Verify this using the rule: what is $N/4$, is it an integer, and what does the rule say? (2 steps)", "answer": "- Step 1: $N/4 = 35/4 = 8.75$. This is NOT an integer.\n- Step 2: The rule says: when $N/4$ is not an integer, round UP to the next integer position. $\\lceil 8.75 \\rceil = 9$. So $Q_1$ is the 9th ordered value.\n\nFor $Q_3$: $3N/4 = 105/4 = 26.25$, round up → 27th value. This systematic approach prevents the miscounting error (position 6 → value 35) that occurred in the Loom session.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": false}, {"question": "A simple exercise: For $N = 20$, find the $Q_1$ and $Q_3$ positions under the Edexcel S1 rule. (2 steps)", "answer": "- Step 1: $Q_1$: $N/4 = 20/4 = 5$. Since 5 IS an integer, take the average of the 5th and 6th values.\n- Step 2: $Q_3$: $3N/4 = 60/4 = 15$. Since 15 IS an integer, take the average of the 15th and 16th values.\n\nNotice: $N = 20$ is divisible by 4, so both use the \"average\" rule. If $N = 22$, then $N/4 = 5.5$ (not integer → round up to 6th value) and $3N/4 = 16.5$ (round up to 17th value).", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": false}, {"question": "A simple exercise: A histogram bar for class width 10 mm has width 4 cm and height 6 cm, with frequency 30. Find the bar dimensions for a class of width 5 mm with frequency 15. (3 steps)", "answer": "- Step 1: Reference FD $= 30/10 = 3$. Width scale $= 4/10 = 0.4$ cm/mm. Height scale $= 6/3 = 2$ cm per unit FD.\n- Step 2: Target class: FD $= 15/5 = 3$. Bar width $= 5 \\times 0.4 = 2$ cm. Bar height $= 3 \\times 2 = 6$ cm.\n- Step 3: Check: same FD → same height (6 cm). Narrower class → narrower bar (2 cm vs 4 cm). Area ratio: $2 \\times 6 = 12$ vs $4 \\times 6 = 24$, which is $15/30 = 1/2$. ✓", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": false}, {"question": "A simple exercise: For $Y = 3X + 7$ where $\\text{Var}(X) = 5$, find $\\text{Var}(Y)$ and $\\sigma_Y$. (2 steps)", "answer": "- Step 1: $\\text{Var}(Y) = 3^2 \\times \\text{Var}(X) = 9 \\times 5 = 45$. The $+7$ has no effect on variance.\n- Step 2: $\\sigma_Y = \\sqrt{45} = 3\\sqrt{5} \\approx 6.71$. Alternatively, $\\sigma_Y = |3| \\times \\sigma_X = 3\\sqrt{5}$.\n\nNote: if the coding were $Y = 3X - 7$, the answer would be the same — the sign of $b$ doesn't matter for variance or SD.", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": false}, {"question": "A simple exercise: In a three-set Venn diagram, $P(A) = 0.5$, $P(B) = 0.4$, and $A$ and $B$ are independent. Find $P(A \\cap B)$. (2 steps)", "answer": "- Step 1: Independence means $P(A \\cap B) = P(A) \\times P(B)$.\n- Step 2: $P(A \\cap B) = 0.5 \\times 0.4 = 0.20$.\n\nIf you had a Venn diagram and the $A \\cap B$ region were split into two subregions (say $A \\cap B \\cap C$ and $A \\cap B$ only), their sum would need to equal 0.20.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": false}, {"question": "A simple exercise: $X \\sim N(50, 25)$. \"The slowest 10% of runners are eliminated.\" Find the cutoff time. Which tail do you use? (2 steps)", "answer": "- Step 1: \"Slowest\" = longest time = highest $X$-values = **upper tail**. So $P(X > t) = 0.10$, equivalently $P(X < t) = 0.90$.\n- Step 2: $z = \\Phi^{-1}(0.90) = 1.2816$. Then $t = \\mu + z\\sigma = 50 + 1.2816 \\times 5 = 50 + 6.408 = 56.4$ (3 s.f.).\n\nContrast with \"fastest 10%\" → lower tail → $P(X < t) = 0.10$ → $z = -1.2816$ → $t = 50 - 6.408 = 43.6$.", "source": "GLM 5.1 ③", "_id": "glm_3_70", "judge_pick": false}, {"question": "What is the key difference between how you find quartiles for discrete data (Q1b) versus grouped continuous data (Q3b), and why must you not mix the methods? (2 steps)", "answer": "- Step 1: **Discrete data** (stem-and-leaf, raw list): use the Edexcel positional rule — $N/4$ integer → average of two positions; non-integer → round up. Then read the actual value at that position.\n- Step 2: **Grouped continuous data** (histogram, frequency table): use $N/2$ (or $N/4$, $3N/4$) as a position and **linearly interpolate** within the class: $L + \\frac{N/2 - F_b}{f_m} \\times c$. You don't have individual values, so you estimate assuming uniform spread within the class.\n\nMixing them up (e.g., using $(N+1)/2$ for grouped data, or trying to interpolate for discrete data) gives wrong answers.", "source": "GLM 5.1 ③", "_id": "glm_3_71", "judge_pick": false}, {"question": "When reading cumulative frequencies from a stem-and-leaf diagram to locate the $k$-th value, what is the efficient method? (2 steps)", "answer": "- Step 1: Compute cumulative frequencies for each stem row by adding the number of leaves in that row to the running total. For Maple: stem 2 has 5 leaves (cum = 5), stem 3 has 7 leaves (cum = 12), stem 4 has 6 leaves (cum = 18), etc.\n- Step 2: To find the $k$-th value, identify which stem row contains position $k$ (e.g., position 16 and 17 both fall in stem 4, which covers positions 13–18). Then count within that row's leaves to find the exact value.\n\nThis avoids listing all 32 or 35 values individually — use cumulative stem totals to jump to the right row quickly.", "source": "GLM 5.1 ③", "_id": "glm_3_72", "judge_pick": true}, {"question": "Why is it important to confirm that the row totals in a stem-and-leaf diagram add up to the stated $N$? (2 steps)", "answer": "- Step 1: If the totals don't match $N$, there's a transcription error (a leaf was missed or double-counted). Every downstream calculation (median, quartiles, outliers) would be based on wrong data.\n- Step 2: The back-to-back diagram provides \"Totals\" columns for each row. Sum them: Birch $2+8+9+9+3+3+1 = 35$ ✓; Maple $5+7+6+7+3+2+2 = 32$ ✓. If these didn't match, you'd re-count the leaves before proceeding.\n\nThis is a 10-second verification that can save an entire question.", "source": "GLM 5.1 ③", "_id": "glm_3_73", "judge_pick": false}], "count": 74}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What is the first thing you should write down when you see \"find the value of k in a back-to-back stem-and-leaf diagram\"? (3 steps)", "answer": "- Step 1: Identify the median position(s) using the total number of data points (e.g., for N=32, median = average of 16th and 17th values).\n- Step 2: Locate the stem row containing the median and translate the leaves into numerical values (e.g., 40+k for Maple's stem 4).\n- Step 3: Set up an equation using the given median value and solve for k, ensuring leaves remain in ascending order.\n\nThe key trigger phrase is \"median of X\" with a back-to-back stem-and-leaf. The critical insight is that k is a single digit in the leaves, not a frequency or sum.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "What is the trigger phrase that forces you to use Edexcel S1's quartile rule for discrete data? (2 steps)", "answer": "- Step 1: \"Find quartiles for discrete data with N not divisible by 4\" (e.g., N=35 Birch trees).\n- Step 2: Apply the rule: If n/4 is non-integer → round up to next position; if integer → average nth and (n+1)th values.\n\nThis rule applies specifically to discrete data in Edexcel S1. For grouped data, use linear interpolation instead.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "What's the trick for handling outlier fences when the question says \"show there is only one outlier\"? (2 steps)", "answer": "- Step 1: Calculate IQR = Q3 - Q1, then compute fences: Lower = Q1 - 1.5*IQR, Upper = Q3 + 1.5*IQR.\n- Step 2: Scan the full dataset to check which values violate the fences. For Birch trees, only 85 cm exceeds the upper fence (84 cm).\n\nAlways write the fences as separate lines. The key is comparing each data point to the fences, not just the min/max.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why does the whisker in a box plot stop at 76 for Birch trees when the maximum is 85? (1 step)", "answer": "The whisker stops at the most extreme non-outlier value. Since 85 cm is an outlier (exceeds upper fence), the whisker ends at 76 cm, the highest non-outlier. Outliers are marked separately as crosses.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How do you compare two distributions using a box plot? (1 step)", "answer": "Compare both the **median** (measure of central tendency) and **interquartile range** (measure of spread). For example, Birch has a higher median (48 cm vs 45 cm) but same IQR (18 cm), indicating similar spread but higher growth on average.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "What's the trick for handling \"no change to box plot\" constraints in new data? (3 steps)", "answer": "- Step 1: List all 5 box-plot statistics that must stay fixed: min, Q1, median, Q3, max.\n- Step 2: Derive inequalities from these constraints (e.g., 2a ≤ max → a ≤ 40).\n- Step 3: Combine the strictest inequalities (e.g., 36 ≤ a ≤ 40) to find the valid range.\n\nAlways check how new data affects each of the five statistics, not just ordering.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "What's the trigger phrase that forces conditional probability in normal distribution questions? (1 step)", "answer": "The phrase \"given that\" or \"given\" in the question (e.g., \"given that T > μ - 10\"). This requires using the formula $P(A|B) = \\frac{P(A \\cap B)}{P(B)}$, recognizing if one event is a subset of the other.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why is the variance of Y = aX - b equal to $a^2 \\text{Var}(X)$? (1 step)", "answer": "Variance is affected only by scaling (a), not shifting (b). The constant term b disappears because variance measures spread, not location. Multiplication by a scales spread quadratically.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How do you recognize that a sequence of coded weights (e.g., Y = 0.1W - 2) has a fixed mean when adding a new value? (1 step)", "answer": "If the new value equals the current mean, the overall mean remains unchanged because the numerator (sum of values) increases by the mean value, and the denominator (n) increases by 1, preserving the average.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "What's the key formula for linear interpolation in grouped data? (1 step)", "answer": "$\\text{Median} = L + \\frac{N/2 - F_b}{f_m} \\times c$, where L = lower class boundary of the median class, F_b = cumulative frequency before the class, f_m = class frequency, c = class width.\n\nAlways use N/2 (not (N+1)/2) for continuous data.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "Why is the standard deviation of W = 10Y + 20 calculated as $10 \\times \\sigma_Y$? (1 step)", "answer": "Adding 20 shifts the data but doesn't affect spread. Multiplying by 10 scales the standard deviation linearly. Variance would scale by $10^2$, but SD is the square root of variance.", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "What's the trick for interpreting \"fastest 60%\" in normal distribution questions? (1 step)", "answer": "\"Fastest\" corresponds to the **lower tail** (shortest times), so find t such that $P(X < t) = 0.60$. Sketching the curve helps visualize this. For example, z = 0.2533 for 60th percentile.", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "How do you calculate the probability that Sam wins when scores are S = X1 and R = 2X2 - 3? (3 steps)", "answer": "- Step 1: Build the distribution of R from X2 (e.g., R = 2X2 - 3).\n- Step 2: For each S value, sum P(R < S) across all R values less than S.\n- Step 3: Multiply each P(S) by P(R < S) and sum all products (e.g., 0.25*0.25 + 0.3*0.25 + ... = 0.355).\n\nAlways condition on S and use independence to multiply probabilities.", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "What's the formula for the product moment correlation coefficient (PMCC)? (1 step)", "answer": "$r = \\frac{S_{dg}}{\\sqrt{S_{dd} \\cdot S_{gg}}}$. Compute S values first, then plug into the formula. For example, $S_{dg} = 12,105.12$, $S_{dd} = 16,769.78$, $S_{gg} = 9,094.20$ gives r ≈ 0.980.", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": false}, {"question": "Why is the estimate for a bear of length 0.5 m unreliable? (1 step)", "answer": "The data range for bear lengths has a mean of 182.1 cm (182.1/100 = 1.821 m). Estimating for 0.5 m (50 cm) is **extrapolation** outside the observed data range, making it unreliable.", "source": "Qwen 3 ①", "_id": "qwen_1_14", "judge_pick": false}, {"question": "What's the trick for finding x when a change of x in d causes a change of 17.3 in g? (1 step)", "answer": "Use the regression gradient directly: $0.722x = 17.3$ → solve for x ≈ 24.0 cm. The intercept (-42.3) is irrelevant for changes in variables.", "source": "Qwen 3 ①", "_id": "qwen_1_15", "judge_pick": false}, {"question": "How do you calculate $P(C \\mid S \\cap G)$ from a Venn diagram? (2 steps)", "answer": "- Step 1: Find $P(C \\cap S \\cap G)$ from the triple-overlap region (e.g., 0.15).\n- Step 2: Divide by $P(S \\cap G)$, which includes both the triple-overlap and S∩G-only regions (e.g., 0.15 + 0.10 = 0.25). Final answer: $0.15 / 0.25 = 0.6$.", "source": "Qwen 3 ①", "_id": "qwen_1_16", "judge_pick": false}, {"question": "What's the key formula for coding in statistics? (1 step)", "answer": "For coding $y = \\frac{w - 20}{10}$, the mean of w is $10\\bar{y} + 20$. Variance of w is $10^2 \\text{Var}(y)$. The coding equation directly transforms expectations and spreads.", "source": "Qwen 3 ①", "_id": "qwen_1_17", "judge_pick": false}, {"question": "Why is the standard deviation for grouped data calculated as $\\sqrt{\\frac{\\sum y^2}{n} - \\bar{y}^2}$? (1 step)", "answer": "This is the computational formula for variance. First compute $\\bar{y} = \\frac{\\sum y}{n}$, then subtract $\\bar{y}^2$ from $\\frac{\\sum y^2}{n}$ to get variance. Take square root for SD.", "source": "Qwen 3 ①", "_id": "qwen_1_18", "judge_pick": false}, {"question": "What's the trick for finding $P(S')$ in Venn diagram questions? (1 step)", "answer": "Use the shortcut $P(S') = 1 - P(S)$. This ensures you include the outside region (q) and any regions in C or G not overlapping with S.", "source": "Qwen 3 ①", "_id": "qwen_1_19", "judge_pick": false}], "count": 20}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "When solving for $k$ in a back-to-back stem-and-leaf diagram where the median is given, what is the first step after determining the median position? (2 steps)", "answer": "- Step 1: Identify the stem row containing the median positions and note that leaves must be in ascending order, so $k$ must be a single digit between the adjacent leaves.\n- Step 2: Calculate the average of the two median values, set equal to the given median, and solve for $k$.  \n**Key Insight:** The leaves in a stem-and-leaf plot must remain in ascending order, so $k$ cannot disrupt this order.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "What is the Edexcel S1 rule for determining quartile positions when $n/4$ is **not** an integer?", "answer": "- Step 1: For $n$ values, if $n/4$ is **not** an integer, round up to the next whole number. The quartile is the value at that position in the ordered dataset.  \n**Key Insight:** Edexcel S1 uses a different rule for quartiles than GCSE or M-stats. For discrete data, round up if $n/4$ is not an integer.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "When identifying outliers using the $1.5 \\times \\text{IQR}$ rule, why must you explicitly state **both** lower and upper fences even if no low outliers exist?", "answer": "- Step 1: Outliers can exist on both tails, so writing both fences demonstrates understanding of the method.\n- Step 2: The lower fence may still be relevant for future comparisons or data changes.  \n**Key Insight:** The question may award method marks for writing both fences, even if one side has no outliers.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "In a box plot, where should the whisker end if there is an outlier? Why?", "answer": "- Step 1: The whisker ends at the **most extreme non-outlier** value. Outliers are marked separately with a cross or asterisk.\n- Step 2: This preserves the visual representation of the spread without including extreme values that distort the scale.  \n**Key Insight:** The whisker defines the range of non-outlier data, while outliers are visually distinct.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "When comparing two distributions using medians and IQRs, why is it critical to quote numerical values in your answer?", "answer": "- Step 1: Quoting specific values (e.g., medians 48 and 45) demonstrates precise statistical comparison.\n- Step 2: Without numerical support, the answer becomes vague and fails to meet exam marking criteria.  \n**Key Insight:** A \"1-mark comment\" in exams often requires both a comparison statement and numerical evidence.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "When solving for $a$ in a \"no change to box plot\" problem, what is the strictest constraint to check?", "answer": "- Step 1: Ensure the new data does not affect the **quartiles** (e.g., $Q_1$ and $Q_3$) or the **extremes** (min and max).\n- Step 2: The most restrictive constraint typically comes from the quartile positions recalculated with the added data.  \n**Key Insight:** The box plot remains unchanged only if all five statistics (min, $Q_1$, median, $Q_3$, max) stay the same.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "When solving $P(2X - 3 > 5)$ for a discrete random variable, why must you exclude $X = 4$ even if it seems close?", "answer": "- Step 1: The inequality is strict ($>$), so only values where $X > 4$ satisfy the condition.\n- Step 2: Including $X = 4$ would incorrectly add $P(X = 4)$ to the final probability.  \n**Key Insight:** Strict inequalities in probability require exclusion of boundary values.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "Why is the formula $\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$ critical for discrete random variables?", "answer": "- Step 1: This formula allows computation of variance directly from the probability distribution without raw data.\n- Step 2: It emphasizes that variance measures spread around the mean by comparing the expectation of squares to the square of the mean.  \n**Key Insight:** Memorizing this formula is essential for exams where it may not be provided in the booklet.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "When solving for $a$ and $b$ in a linear transformation $Y = aX - b$ given $E(Y)$ and $\\operatorname{Var}(Y)$, why should you start with the variance equation?", "answer": "- Step 1: The variance equation eliminates $b$ (since $\\operatorname{Var}(aX - b) = a^2\\operatorname{Var}(X)$).\n- Step 2: Solving for $a$ first simplifies finding $b$ using the expectation equation.  \n**Key Insight:** Variance is unaffected by the constant term in linear transformations, making it the logical starting point.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": true}, {"question": "Why is it important to tabulate the distribution of $R = 2X_2 - 3$ explicitly when calculating $P(S > R)$ for independent spins?", "answer": "- Step 1: Explicitly listing $R$ values ensures accurate pairing of $S$ and $R$ probabilities.\n- Step 2: Independence allows multiplying individual probabilities, but this requires clear enumeration of possible outcomes.  \n**Key Insight:** Misunderstanding independence can lead to treating $S$ and $R$ as dependent variables.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "When calculating the width of a histogram bar for a class with width 2 mm (reference class 4 mm = 2.5 cm), how do you derive the scale factor?", "answer": "- Step 1: Compute the scale factor (cm per mm) using the reference bar: $ \\text{width per mm} = 2.5 \\, \\text{cm} / 4 \\, \\text{mm} = 0.625 \\, \\text{cm/mm} $.\n- Step 2: Multiply the new class width (2 mm) by the scale factor to get the bar width.  \n**Key Insight:** Histogram scales are derived from reference bars and applied consistently across classes.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Why is linear interpolation used for grouped data quartiles instead of simply taking midpoints?", "answer": "- Step 1: Linear interpolation accounts for the distribution of data within the class, assuming uniformity.\n- Step 2: Midpoints ignore the position of the quartile within the class, leading to less accurate estimates.  \n**Key Insight:** Grouped data lacks individual values, so interpolation provides a reasonable approximation.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "When coding data with $10y = w - 20$, why does the standard deviation of $w$ depend only on the scaling factor $a = 10$ and not the shift $b = 20$?", "answer": "- Step 1: Standard deviation measures spread, which is unaffected by shifts in location (adding/subtracting a constant).\n- Step 2: Scaling (multiplying by $a$) directly affects spread, so $\\sigma_w = |a|\\sigma_y$.  \n**Key Insight:** The constant $b$ in $w = ay + b$ does not influence variability.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": false}, {"question": "When adding a value equal to the current mean to a dataset, why does the mean remain unchanged?", "answer": "- Step 1: The new value contributes $(\\text{mean} - \\text{mean})^2 = 0$ to the sum of squared deviations.\n- Step 2: The denominator $n$ increases, but the numerator remains the same, reducing variance.  \n**Key Insight:** Adding the mean preserves the total sum but dilutes the variance by increasing $n$.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "In a regression line $g = -42.3 + 0.722d$, why is it crucial to use unrounded $b$ when calculating the intercept $a$?", "answer": "- Step 1: Rounding $b$ too early introduces error in the intercept calculation.\n- Step 2: Use the exact value of $b$ (e.g., $0.72184$) to ensure $a$ is accurate to 3 significant figures.  \n**Key Insight:** Precision in intermediate steps prevents loss of accuracy in final answers.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "Why is extrapolation unreliable in regression analysis?", "answer": "- Step 1: Regression models are built on observed data and may not hold outside the data range.\n- Step 2: Relationships can change, and patterns within the observed range may not extend linearly.  \n**Key Insight:** Extrapolation assumes the same relationship continues, which is often unverified.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "When calculating $P(T > \\mu - 5 \\mid T > \\mu - 10)$ for a normal distribution, why is the numerator $P(T > \\mu - 5)$ and not $P(\\mu - 10 < T < \\mu - 5)$?", "answer": "- Step 1: The event $\\{T > \\mu - 5\\}$ is a subset of $\\{T > \\mu - 10\\}$, so $P(T > \\mu - 5 \\cap T > \\mu - 10) = P(T > \\mu - 5)$.\n- Step 2: The conditional probability formula simplifies to $P(T > \\mu - 5)/P(T > \\mu - 10)$.  \n**Key Insight:** Understanding subset relationships is critical for simplifying conditional probabilities.", "source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "Why must you include the outside region (probability $q$) when calculating $P(S')$ in a Venn diagram?", "answer": "- Step 1: $P(S')$ includes all regions not in $S$, including the outside-the-circles region.\n- Step 2: Using $P(S') = 1 - P(S)$ automatically accounts for all non-$S$ regions.  \n**Key Insight:** Focusing only on regions within other sets (e.g., $C$ or $G$) misses the outside region.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "When solving for $p$ in a Venn diagram with independent events $C$ and $S$, why is it critical to include both $C \\cap S$ regions?", "answer": "- Step 1: $P(C \\cap S)$ includes all regions where both $C$ and $S$ overlap, including the triple-overlap region.\n- Step 2: Omitting any subregion leads to an incorrect application of the independence formula.  \n**Key Insight:** Independence requires the total probability of the intersection, not just a subset.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "Why is it crucial to verify the decimal placement when calculating $\\sigma = \\frac{10}{1.96}$ in a normal distribution problem?", "answer": "- Step 1: The standard deviation should be of the same order of magnitude as the interval half-width (e.g., 10).\n- Step 2: A decimal slip (e.g., 0.510 instead of 5.10) leads to nonsensical results in subsequent calculations.  \n**Key Insight:** Sanity-checking intermediate values prevents catastrophic errors in final answers.\n``` \n\nContinue this process for all topics, ensuring each flashcard isolates a specific strategy, approach, or concept. Each question should probe active recall, and answers should explain the reasoning, intuition, and methodological steps.", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}], "count": 20}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "In the back-to-back stem-and-leaf, why is $k$ in the Maple row a single digit, and how does this constrain its value? (Q1a S1 May 2024)", "answer": "- Step 1: The leaf values must remain in **ascending order** within each row. In the stem-4 row, the leaves are $1, 1, 1, k, 7, 8$.\n- Step 2: Since the leaves after $k$ are $7$ and $8$, and the leaves before $k$ are three $1$s, the digit $k$ must satisfy $1 < k < 7$.\n- Step 3: $k$ represents the fourth leaf value, so the 16th data point equals $40 + k$ cm (not a sum or count).", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "For Maple trees with $N=32$ data points, what is the Edexcel S1 rule for finding the median position, and what values do you use? (Q1a S1 May 2024)", "answer": "- Step 1: Since $N = 32$ is even, the median is the **average** of the $N/2$th and $(N/2 + 1)$th values — the 16th and 17th ordered values.\n- Step 2: Do NOT use $(N+1)/2$ — that rule is for GCSE/M-stats, not Edexcel S1.\n- Step 3: The 16th and 17th values both fall in the stem-4 row, so the median formula becomes $\\frac{(40+k) + 47}{2} = 45$.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "For the Birch trees with $N=35$, what are the correct positions for $Q_1$ and $Q_3$ using the Edexcel S1 quartile rule? (Q1b S1 May 2024)", "answer": "- Step 1: Calculate $N/4 = 35/4 = 8.75$. Since this is **not an integer**, the Edexcel S1 rule says: round **up** to the next position.\n- Step 2: $Q_1$ is at position $\\lceil 35/4 \\rceil = 9$ (the 9th value, not the 8th or 6th).\n- Step 3: Calculate $3N/4 = 105/4 = 26.25$, round up to position 27.\n- Step 4: The common mistake is using position 8.75 → average of 8th and 9th, or using position 6 (for $n/4$ without rounding) — both give wrong answers.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "What are the two cases of the Edexcel S1 quartile rule, and how do you decide which to use? (Q1b S1 May 2024)", "answer": "- Case 1: If $n/4$ (or $3n/4$) is an **integer**, take the **average** of that position and the next position (e.g., for $n=32$, $Q_1$ = average of 8th and 9th values).\n- Case 2: If $n/4$ (or $3n/4$) is **not an integer**, round **up** to the next integer and take that single position (e.g., for $n=35$, $Q_1$ = 9th value).\n- The key is: always check whether $n/4$ is integer first — this determines the entire approach.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "How do you calculate outlier fences using the IQR method, and what values do you compare against? (Q1c S1 May 2024)", "answer": "- Step 1: Calculate IQR = $Q_3 - Q_1$.\n- Step 2: Compute the **lower fence**: $Q_1 - 1.5 \\times \\text{IQR}$. Any value below this is a low outlier.\n- Step 3: Compute the **upper fence**: $Q_3 + 1.5 \\times \\text{IQR}$. Any value above this is a high outlier.\n- Step 4: Check **every** data point against these fences — do not just check the min/max.\n- Step 5: For Birch with $Q_1=39, Q_3=57$, the fences are $39 - 27 = 12$ and $57 + 27 = 84$, giving one outlier at 85.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "When drawing a box plot with outliers, where does the whisker end? (Q1d S1 May 2024)", "answer": "- Step 1: Identify all outliers first using the fence rule.\n- Step 2: The whisker (vertical line) extends from $Q_1$ to the **most extreme non-outlier value** — the furthest value that is NOT an outlier.\n- Step 3: Plot the outliers as separate crosses or asterisks beyond the whisker.\n- Step 4: For Birch, since 85 is an outlier but 76 is not, the whisker ends at 76, with a cross at 85.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "For Q1(f), when adding 4 new data points to the Maple dataset without changing the box plot, what five statistics must remain unchanged? (Q1f S1 May 2024)", "answer": "- The five box plot statistics that pin down the constraints are: (1) Minimum, (2) Lower quartile $Q_1$, (3) Median, (4) Upper quartile $Q_3$, (5) Maximum.\n- Each gives a constraint on the new values. For example: $2a \\le 80$ (max constraint), $a \\ge 36$ ($Q_1$ constraint at positions 9-10), and median stays at 45.\n- The mistake is only using the ordering constraint ($27 \\le a \\le 48$) without checking all five box plot statistics.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "In Q1(f), why is $a \\le 40$ rather than $a \\le 48$? (Q1f S1 May 2024)", "answer": "- Step 1: The original maximum was 80 cm. The constraint is that the maximum **does not change** when adding the new data.\n- Step 2: One new data point is $2a$. For the max to stay at 80, we need $2a \\le 80$.\n- Step 3: This gives $a \\le 40$. The ordering constraint $a \\le 48$ from $a \\le 2a$ is looser, but the box plot constraint is tighter.\n- Step 4: Always check each of the five box plot statistics separately — the strictest binding constraint wins.", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "What two numerical values must a 1-mark distribution comparison question include to get the mark? (Q1e S1 May 2024)", "answer": "- To earn the mark, you must: (1) compare a **specific statistic** (e.g., median, IQR, mean), and (2) state **both values** for that statistic.\n- Example: \"The median Birch growth (48 cm) is greater than the median Maple growth (45 cm)\" — this has both the statistic named and both values.\n- Avoid the word \"average\" alone — specify \"median\" or \"mean.\"\n- Simply stating \"Birch grows more\" with no numbers loses the mark.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "For the inequality $2X - 3 > 5$, what is the first step before finding probabilities from the discrete distribution? (Q2a S1 May 2024)", "answer": "- Step 1: Rearrange the inequality to isolate $X$: $2X > 8$, so $X > 4$.\n- Step 2: Identify which $x$ values satisfy $X > 4$ from the table: $x = 5, 7, 8$.\n- Step 3: Sum their probabilities: $P(X=5) + P(X=7) + P(X=8) = 0.2 + 0.1 + 0.15 = 0.45$.\n- The key is: always rearrange first, then read from the table — never substitute into the inequality with each $x$ value.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "What is the formula for variance of a discrete random variable, and what is the common mistake to avoid? (Q2b S1 May 2024)", "answer": "- The formula is $\\operatorname{Var}(X) = E(X^2) - [E(X)]^2$.\n- Step 1: Calculate $E(X^2) = \\sum x^2 \\cdot P(X=x)$, squaring the $x$ values, not the probabilities.\n- Step 2: Calculate $[E(X)]^2$ using the given $E(X) = 4.6$.\n- Step 3: Subtract: $25.3 - 4.6^2 = 25.3 - 21.16 = 4.14$.\n- Common mistake: squaring the probability instead of $x$, or forgetting to square $E(X)$ at the end.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "In part (c) of the discrete random variable question, why do you solve for $a$ using variance before using expectation? (Q2c S1 May 2024)", "answer": "- Step 1: The variance formula is $\\operatorname{Var}(Y) = a^2 \\operatorname{Var}(X)$. This involves only $a$, not $b$.\n- Step 2: The expectation formula is $E(Y) = aE(X) - b$, which involves both $a$ and $b$.\n- Step 3: Solving variance first gives $a^2 = 66.24/4.14 = 16$, so $a = 4$ (positive).\n- Step 4: Then substitute into $E(Y)$: $13.4 = 4(4.6) - b = 18.4 - b$, giving $b = 5$.\n- If you try expectation first, you have two unknowns in one equation and get stuck.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "In part (d), why are Sam's score $S = X_1$ and Alex's score $R = 2X_2 - 3$ independent, and how does this affect the probability calculation? (Q2d S1 May 2024)", "answer": "- Step 1: Sam and Alex each spin the spinner **once separately** — these are two independent spins.\n- Step 2: $X_1$ and $X_2$ are independent random variables, so $P(S = s, R = r) = P(S=s) \\times P(R=r)$.\n- Step 3: Build the $R$ distribution table from $R = 2X_2 - 3$: values are 1, 5, 7, 11, 13 with probabilities 0.25, 0.3, 0.2, 0.1, 0.15.\n- Step 4: For each $S$ value, sum $P(R < S)$ and multiply by $P(S=s)$.\n- The mistake is treating this as if $R$ depends on the same spin as $S$ — they're independent.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "For the histogram in Q3(a), why must you derive two separate scale factors, and how do you do it? (Q3a S1 May 2024)", "answer": "- Step 1: In a histogram, **area** represents frequency. The bar has two dimensions: width (proportional to class width) and height (proportional to frequency density).\n- Step 2: From the reference class $32 \\le x < 36$: width $2.5$ cm corresponds to class width $4$ mm. Scale factor = $2.5/4 = 0.625$ cm per mm.\n- Step 3: Height $7.5$ cm corresponds to frequency density $20/4 = 5$. Scale factor = $7.5/5 = 1.5$ cm per unit FD.\n- Step 4: Apply each to the target class: width $= 2 \\times 0.625 = 1.25$ cm; height $= 8 \\times 1.5 = 12$ cm.\n- The mistake is multiplying width directly or using frequency instead of FD.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "What is the formula for estimating the median from grouped continuous data using linear interpolation? (Q3b S1 May 2024)", "answer": "- The formula is: $\\text{Median} = L + \\frac{N/2 - F_b}{f_m} \\times c$\n- Where: $L$ = lower boundary of median class, $F_b$ = cumulative frequency before median class, $f_m$ = frequency in median class, $c$ = class width.\n- For Q3: median position = $50/2 = 25$, median class is $32 \\le x < 36$ ($L=32, F_b=18, f_m=20, c=4$).\n- Calculation: $32 + \\frac{25-18}{20} \\times 4 = 32 + 1.4 = 33.4$ mm.\n- Common mistake: using $(N+1)/2$ (discrete rule) or using class midpoint instead of $L$.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "For the coding transformation $10y = w - 20$, how do you find the mean of $w$ from the coded data? (Q3c S1 May 2024)", "answer": "- Step 1: Rearrange to express $w$ in terms of $y$: $w = 10y + 20$.\n- Step 2: The mean transforms the same way: $\\bar{w} = 10\\bar{y} + 20$.\n- Step 3: Calculate $\\bar{y} = \\sum y / n = 104/50 = 2.08$.\n- Step 4: Apply: $\\bar{w} = 10(2.08) + 20 = 20.8 + 20 = 40.8$ grams.\n- Key insight: the linear coding coefficients pass directly through the expectation operator.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "For the coding transformation $w = 10y + 20$, how do you find the standard deviation of $w$ from the coded data? (Q3d S1 May 2024)", "answer": "- Step 1: First find variance of $y$: $\\operatorname{Var}(y) = \\frac{\\sum y^2}{n} - \\bar{y}^2 = \\frac{233.54}{50} - (2.08)^2 = 4.6708 - 4.3264 = 0.3444$.\n- Step 2: Take square root for $\\sigma_y = \\sqrt{0.3444} = 0.5868$.\n- Step 3: For $w = 10y + 20$, variance scales by $10^2$: $\\operatorname{Var}(w) = 100 \\times \\operatorname{Var}(y) = 34.44$.\n- Step 4: Standard deviation: $\\sigma_w = \\sqrt{34.44} = 10 \\times 0.5868 = 5.87$ grams.\n- The constant $+20$ drops out of both variance and standard deviation.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "In Q3(e), adding a pebble weighing exactly 40.8 g (the mean) — what happens to the mean and standard deviation? (Q3e S1 May 2024)", "answer": "- (i) Mean: Adding a value exactly equal to the current mean **does not change** the mean. The new mean = $(50 \\times 40.8 + 40.8)/51 = 40.8$.\n- (ii) Standard deviation: The added value contributes $(40.8 - 40.8)^2 = 0$ to the sum of squared deviations, while the denominator increases from 50 to 51. This **decreases** the variance (and hence SD).\n- The key insight: adding a value at the mean dilutes the spread without affecting the central location.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "For Q4(a), what are the exact formulas for $S_{dg}$ and $S_{gg}$? (Q4a S1 May 2024)", "answer": "- Formula: $S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$\n- For $S_{dg}$: $S_{dg} = 141,978.84 - \\frac{1456.8 \\times 713.2}{8} = 141,978.84 - 129,873.72 = 12,105.12$\n- For $S_{gg}$: $S_{gg} = \\sum g^2 - \\frac{(\\sum g)^2}{n} = 72,675.98 - \\frac{713.2^2}{8} = 72,675.98 - 63,581.78 = 9,094.20$\n- Keep all decimal places — the question asks for exact values.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "What is the formula for the product moment correlation coefficient $r$, and what sanity check should you always perform? (Q4b S1 May 2024)", "answer": "- Formula: $r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$\n- Calculation: $r = \\frac{12,105.12}{\\sqrt{16,769.78 \\times 9,094.20}} = \\frac{12,105.12}{12,349.4} = 0.980$\n- **Sanity check:** $r$ must always lie between $-1$ and $1$. If you get $|r| > 1$, there's an error.\n- Also check the sign matches your scatter plot intuition — positive correlation should give positive $r$.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "In Q4(e)(ii), why is the estimate for a bear with length 0.5 metres not reliable? (Q4e S1 May 2024)", "answer": "- Step 1: The observed data range for bear length is from the minimum to maximum in the sample — the mean is 182.1 cm.\n- Step 2: A bear of length 0.5 m = 50 cm is **well outside** the observed range (interpolation vs. extrapolation).\n- Step 3: Linear regression assumes the linear relationship holds within the data range, but may not extend beyond it.\n- The correct phrasing: \"0.5 metres is outside the observed range of bear lengths, so extrapolation is unreliable.\"", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "In Q5(a), what is the standardisation formula and how do you apply it? (Q5a S1 May 2024)", "answer": "- Formula: If $X \\sim N(\\mu, \\sigma^2)$, then $Z = \\frac{X - \\mu}{\\sigma}$ follows $N(0, 1)$.\n- For $X \\sim N(15, 2^2)$, find $P(X < 18)$:\n- Step 1: Standardise: $Z = \\frac{18 - 15}{2} = 1.5$\n- Step 2: $P(X < 18) = P(Z < 1.5) = 0.9332$ (from tables, 4 d.p.)\n- Common mistake: dividing by $\\sigma^2$ instead of $\\sigma$, or using the wrong tail.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "For \"fastest 60%\" in Q5(b), why is this the lower tail and not the upper tail? (Q5b S1 May 2024)", "answer": "- Step 1: \"Fastest\" means **shortest time** — the 60% with the lowest (smallest) times.\n- Step 2: On a normal curve, shortest times are on the **left** (lower tail).\n- Step 3: Therefore, $P(X < t) = 0.60$, not $P(X > t) = 0.60$.\n- Step 4: From inverse normal, $z = \\Phi^{-1}(0.60) = 0.2533$, giving $t = 15 + 0.2533(2) = 15.5$ minutes.\n- The trap: using the upper tail gives $t = 14.49$ minutes — wrong.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "In Q5(c), given $P(\\mu - 10 < T < \\mu + 10) = 0.95$, how do you find $\\sigma$? (Q5c S1 May 2024)", "answer": "- Step 1: By symmetry of the normal, $P(T < \\mu - 10) = (1 - 0.95)/2 = 0.025$.\n- Step 2: Standardise: $\\frac{\\mu - 10 - \\mu}{\\sigma} = \\frac{-10}{\\sigma} = -1.96$\n- Step 3: So $-10/\\sigma = -1.96$, giving $\\sigma = 10/1.96 = 5.102... ≈ 5.10$\n- **Critical check:** $\\sigma$ should be of the same order as the interval half-width (10). A value of 0.51 would be absurd — this is the decimal slip to avoid.\n- The answer is approximately 5.10, not 0.510.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In Q5(c), why can you simplify $P(T > \\mu - 5 \\mid T > \\mu - 10)$ to $\\frac{P(T > \\mu - 5)}{P(T > \\mu - 10)}$? (Q5c S1 May 2024)", "answer": "- Step 1: The event $\\{T > \\mu - 5\\}$ is a **subset** of $\\{T > \\mu - 10\\}$ — if $T$ is greater than -5, it is automatically greater than -10.\n- Step 2: For conditional probability: $P(A \\mid B) = P(A \\cap B) / P(B)$.\n- Step 3: Since $A \\subset B$, we have $A \\cap B = A$, so $P(A \\cap B) = P(A)$.\n- Step 4: Therefore $P(T > \\mu - 5 \\mid T > \\mu - 10) = \\frac{P(T > \\mu - 5)}{P(T > \\mu - 10)}$.\n- This avoids computing the intersection explicitly.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "For the Venn diagram in Q6(a), what regions make up $P(C \\cap G')$ (Chess but not Go)? (Q6a S1 May 2024)", "answer": "- Step 1: $G'$ means \"not in G\" — the complement of the G circle.\n- Step 2: Within C, there are three regions: C only (0.04), C∩G only (p), C∩S∩G (0.15), and C∩S only (0.12).\n- Step 3: Exclude any region that touches G: that removes C∩G only (p) and C∩S∩G (0.15).\n- Step 4: Include only: C only (0.04) + C∩S only (0.12) = 0.16.\n- The mistake is including the regions that involve G.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In Q6(b), when finding $p$ using independence of C and S, what is the correct $P(C \\cap S)$? (Q6b S1 May 2024)", "answer": "- Step 1: $P(C \\cap S)$ means \"in both C and S\" — this includes **all regions** in the overlap of the two circles.\n- Step 2: From the Venn diagram: the C∩S overlap has two sub-regions: C∩S only (0.12) and C∩S∩G (0.15).\n- Step 3: So $P(C \\cap S) = 0.12 + 0.15 = 0.27$, not just 0.12 or just 0.15.\n- Step 4: Using independence: $0.27 = P(C) \\times P(S) = (0.31 + p)(0.60)$, giving $p = 0.14$.\n- The mistake is using only one sub-region of the intersection.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "In Q6(e), why is $P(S') = 1 - P(S)$ the safest way to find \"does not play Scrabble\"? (Q6e S1 May 2024)", "answer": "- Step 1: \"Not playing Scrabble\" means outside the S circle — this includes the triple overlap, C∩S only, S∩G only, S only, AND the outside region $q$.\n- Step 2: Trying to add individual regions is error-prone: you might forget $q$ (the outside region) or the G-only region.\n- Step 3:Shortcut: $P(S') = 1 - P(S) = 1 - 0.60 = 0.40$. This automatically includes ALL regions outside S.\n- Step 4: Then number not playing Scrabble = total × $P(S')$ = $(76/0.29) × 0.40 ≈ 105$.\n- Phuc's error was summing partial regions and missing $q$.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In Q6(e), when estimating the total number of teenagers from the 76 who play Chess and Go, what is the correct $P(C \\cap G)$? (Q6e S1 May 2024)", "answer": "- Step 1: $C \\cap G$ means \"plays both Chess and Go\" — this includes **both** sub-regions in the overlap.\n- Step 2: From the Venn: C∩G only (p = 0.14) and C∩S∩G (0.15).\n- Step 3: So $P(C \\cap G) = 0.14 + 0.15 = 0.29$.\n- Step 4: Total teenagers = $76 / 0.29 = 262.07...$\n- Th
