0.5$$, compute $$1 - p > 0.5$$, look up $$\\Phi^{-1}(1 - p)$$, and negate it. This gives the negative $$z$$-value. For $$p > 0.5$$, look up $$\\Phi^{-1}(p)$$ directly ‚ÄĒ it is positive.\n\nAlways sketch: the 5th percentile is to the left of the mean, so $$z$$ must be negative. If your calculation gives a positive $$z$$ for a left-tail probability below 0.5, you have made an error.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_42", "judge_pick": true}, {"question": "In Q6, the regression line of $$x$$ on $$y$$ is given as $$x = 1.2 + 0.2y$$. Identify which number is the slope $$b_{xy}$$ and explain why it is not 1.2. (2 steps)", "answer": "- Step 1: The regression line of $$x$$ on $$y$$ has the form $$x = a + b_{xy} \\cdot y$$, where $$b_{xy}$$ is the coefficient of $$y$$ ‚ÄĒ the slope when $$x$$ is plotted on the vertical axis against $$y$$ on the horizontal axis. In $$x = 1.2 + 0.2y$$, the slope $$b_{xy} = 0.2$$ and the intercept is 1.2.\n- Step 2: The intercept 1.2 is the value of $$x$$ when $$y = 0$$; it is not the slope. A common confusion arises because the equation is written as \"$$x = \\text{intercept} + \\text{slope} \\times y$$\" and students read the first constant as the slope. The slope is always the coefficient multiplying the independent variable.\n\nSimilarly, in $$y = 1.4x + 1.5$$, the slope $$b_{yx} = 1.4$$ (coefficient of $$x$$), not 1.5.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_43", "judge_pick": false}, {"question": "You are given $$\\sum xy = \\frac{6961}{60}$$ and need $$S_{xy}$$. The formula booklet gives $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$. Show this is equivalent to $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$, and explain when to use each form. (2 steps)", "answer": "- Step 1: Since $$\\bar{x} = \\frac{\\sum x}{n}$$ and $$\\bar{y} = \\frac{\\sum y}{n}$$, we have $$\\frac{\\sum x \\sum y}{n} = \\frac{n\\bar{x} \\cdot n\\bar{y}}{n} = n\\bar{x}\\bar{y}$$. The two forms are algebraically identical.\n- Step 2: Use $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$ when you have raw sums ($$\\sum x$$, $$\\sum y$$, $$\\sum xy$$) from a data table. Use $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$ when you have already computed $$\\bar{x}$$ and $$\\bar{y}$$ (e.g., from the intersection of regression lines). In Q6, the intersection gives $$\\bar{x}$$ and $$\\bar{y}$$ directly, so the second form is more convenient ‚ÄĒ it plugs straight in without computing $$\\sum x$$ and $$\\sum y$$ separately first.\n\nIn the exam, either form earns full marks. Choose the one that requires fewer intermediate computations for the specific problem.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_44", "judge_pick": false}, {"question": "The time budget for a 75-mark, 90-minute S1 paper is 1.2 minutes per mark. If you spend 5 minutes on Q1(d) trying to get the conditional probability right, is this a good use of time? How would you recognise that you're stuck and what should you do? (2 steps)", "answer": "- Step 1: Q1(d) is worth 2 marks, so the target time is about 2.4 minutes. Spending 5 minutes is more than double the target ‚ÄĒ you are stuck. The sign: you've written the formula but the numbers aren't producing a clean answer, or you're re-reading the question multiple times trying to parse the English.\n- Step 2: The move: write $$P(A \\mid B) = P(A \\cap B)/P(B)$$ with $$A$$ and $$B$$ defined explicitly, list the relevant paths, and compute. If after this discipline you still can't identify $$A \\cap B$$, circle the question and move on. Return to it in the final 5 minutes. A blank answer earns 0; a partially correct setup can earn method marks even if the final number is wrong.\n\nThe meta-principle: never spend more than 1.5√ó the allocated time on a single part. The discipline of writing the formula first is both a problem-solving tool and a time-saving tool ‚ÄĒ it forces structured thinking instead of flailing.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_45", "judge_pick": false}, {"question": "Three families of errors appeared repeatedly in this paper. Name each family, give the canonical example from the paper, and state the one-sentence fix for each. (3 steps)", "answer": "- Step 1: **Conditional probability sample-space discipline.** Canonical example: Q1(e), using $$P(\\text{exactly 2 wins})$$ in the numerator instead of $$P(\\text{won 2} \\cap W_1)$$. Fix: always write $$P(A \\mid B) = P(A \\cap B)/P(B)$$ with $$A$$ and $$B$$ defined, and list the surviving paths before summing.\n- Step 2: **Over-eager prose in interpretation parts.** Canonical example: Q2(d), writing five claims about skew/range/outliers instead of the rigid median + IQR + context template. Fix: exactly three sentences ‚ÄĒ median comparison, IQR comparison with \"more consistent\" interpretation, each with units and variable name. Nothing else.\n- Step 3: **Failure to spot structural shortcuts.** Canonical examples: Q5(e), not seeing that two percentiles give a clean 2√ó2 system; Q6(c), not using $$r^2 = b_{yx} b_{xy}$$ and getting stuck needing $$\\sum x^2$$. Fix: when both regression lines are given, immediately compute $$r^2 = b_{yx} b_{xy}$$; when two percentiles are given, set up two standardisation equations and subtract to eliminate $$\\mu$$.\n\nThese three families account for the majority of lost marks. Drilling them ‚ÄĒ formula discipline, template adherence, and identity-spotting ‚ÄĒ targets the highest-yield improvements.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_46", "judge_pick": false}, {"question": "A box plot has $$Q_1 = 45$$, $$Q_3 = 63$$, median = 57, lower outlier at 16, upper outlier at 94, smallest non-outlier at 23, largest non-outlier at 86. Sketch the box plot by describing each component and its position. (3 steps)", "answer": "- Step 1: **The box:** Draw a rectangle from $$Q_1 = 45$$ to $$Q_3 = 63$$. Inside, draw a vertical line at the median = 57. Label the box edges and the median on the horizontal scale.\n- Step 2: **The whiskers:** From the left edge of the box (45), draw a horizontal line (whisker) leftward to the smallest non-outlier = 23. From the right edge (63), draw a whisker rightward to the largest non-outlier = 86. The whiskers do NOT extend to 16 or 94.\n- Step 3: **The outliers:** Mark 16 with a cross (√ó) below the whisker line on the left. Mark 94 with a cross on the right. These are individual points, separate from the whiskers. Label the scale (e.g., 0 to 100 kg) along the bottom.\n\nThe visual: a box from 45 to 63 with a line at 57, whiskers reaching 23 and 86, and two crosses at 16 and 94 sitting alone beyond the whiskers. The crosses flag these values as exceptional ‚ÄĒ far from the quartiles.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_47", "judge_pick": false}, {"question": "For $$P(F \\cap G')$$, two methods are available: (i) $$P(F) - P(F \\cap G)$$ and (ii) $$P(F) \\cdot P(G')$$ using independence. When is each method applicable, and what goes wrong if you use method (ii) without independence? (2 steps)", "answer": "- Step 1: Method (i) $$P(F \\cap G') = P(F) - P(F \\cap G)$$ is *always* valid, regardless of whether $$F$$ and $$G$$ are independent. It follows from the partition $$F = (F \\cap G) \\cup (F \\cap G')$$. Method (ii) $$P(F) \\cdot P(G')$$ is valid *only* when $$F$$ and $$G$$ are independent (which also makes $$F$$ and $$G'$$ independent).\n- Step 2: If $$F$$ and $$G$$ are *not* independent, then $$P(F \\cap G') \\neq P(F) \\cdot P(G')$$. For example, if $$P(F) = 0.5$$, $$P(G) = 0.5$$, $$P(F \\cap G) = 0.3$$ (not independent since $$0.3 \\neq 0.25$$), then $$P(F \\cap G') = 0.5 - 0.3 = 0.2$$, but $$P(F) \\cdot P(G') = 0.5 \\times 0.5 = 0.25 \\neq 0.2$$.\n\nThe safe default: always use method (i). Use method (ii) only when independence is explicitly given or proven, and even then, method (i) serves as a check.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_48", "judge_pick": true}, {"question": "A Venn diagram has regions $$w, x, y, z$$ with values 0.15, 0.55, 0.10, 0.20. Before answering any sub-question, what is the single most important preparatory step? (1 step)", "answer": "- Step 1: Write next to each region label what it represents in words. E.g., \"$$w$$ = in $$O$$ only (not in $$C$$)\", \"$$x$$ = in both $$O$$ and $$C$$\", \"$$y$$ = in $$C$$ only (not in $$O$$)\", \"$$z$$ = in neither\". This prevents the most common error: swapping $$w$$ and $$x$$ because the printed diagram's left-to-right ordering may not match your assumption about which region is the intersection.\n\nThis takes 30 seconds and eliminates the labelling swap that cost marks in Q3(i)(a). Never substitute numbers into region labels without first defining them verbally.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_49", "judge_pick": true}, {"question": "In a normal distribution question, you compute $$P(Z < -0.8)$$ and write $$0.2119$$. The next line of your working should read $$P(-0.8 < Z < 1.2) = \\ldots$$. What arithmetic operation connects these two results? Why? (2 steps)", "answer": "- Step 1: $$P(-0.8 < Z < 1.2) = \\Phi(1.2) - \\Phi(-0.8) = 0.8849 - 0.2119 = 0.6730$$. The operation is *subtraction*: the probability of being in an interval equals the cumulative probability at the upper bound minus the cumulative probability at the lower bound.\n- Step 2: This is the fundamental property of cumulative probabilities: $$P(a < Z < b) = P(Z < b) - P(Z < a)$$. The cumulative function $$\\Phi$$ measures \"everything to the left of $$z$$.\" To get \"everything between $$a$$ and $$b$$,\" subtract \"everything left of $$a$$\" from \"everything left of $$b$$.\" A sketch with two shaded tails confirms which is subtracted from which.\n\nA common error: adding $$\\Phi(1.2) + \\Phi(-0.8)$$ instead of subtracting. The sketch prevents this: the region $$(-0.8, 1.2)$$ is the area under the curve between these points, which is the right-tail area up to 1.2 minus the left-tail area up to ‚ąí0.8.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_50", "judge_pick": false}, {"question": "You have two regression equations and need $$S_{xx}$$ and $$S_{yy}$$, but $$\\sum x^2$$ and $$\\sum y^2$$ are not given. How can you recover $$S_{xx}$$ and $$S_{yy}$$ from the slopes and $$S_{xy}$$? (2 steps)", "answer": "- Step 1: From $$b_{yx} = S_{xy}/S_{xx}$$, rearrange: $$S_{xx} = S_{xy}/b_{yx}$$. From $$b_{xy} = S_{xy}/S_{yy}$$, rearrange: $$S_{yy} = S_{xy}/b_{xy}$$. You only need $$S_{xy}$$ and the two slopes.\n- Step 2: With $$S_{xy} = 5.6$$, $$b_{yx} = 1.4$$, $$b_{xy} = 0.2$$: $$S_{xx} = 5.6/1.4 = 4$$ and $$S_{yy} = 5.6/0.2 = 28$$. These can then be used in the long $$r$$ formula as a verification, or for any other computation requiring $$S_{xx}$$ or $$S_{yy}$$.\n\nThis is the \"reverse\" use of the slope formulas. The slopes are defined as $$S_{xy}/S_{xx}$$ and $$S_{xy}/S_{yy}$$, so knowing any two of the three quantities $$\\{S_{xy}, S_{xx}, S_{yy}\\}$$ plus the slope lets you solve for the third.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_51", "judge_pick": false}, {"question": "Simple exercise: A game has two rounds. $$P(\\text{win round 1}) = 0.6$$. If you win round 1, $$P(\\text{win round 2}) = 0.5$$; if you lose round 1, $$P(\\text{win round 2}) = 0.3$$. Find $$P(\\text{win both rounds})$$. (1 step)", "answer": "- Step 1: $$P(W_1 \\cap W_2) = P(W_1) \\times P(W_2 \\mid W_1) = 0.6 \\times 0.5 = 0.3$$. The \"and\" along a tree path is always a product of the branch probabilities.\n\nThe key: \"win both\" is a single path ($$WW$$), so it multiply along it. \"Win at least one\" would require summing over multiple paths.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_52", "judge_pick": false}, {"question": "Simple exercise: A data set has values 2, 5, 7, 8, 10. Find the median and $$Q_1$$. (2 steps)", "answer": "- Step 1: $$n = 5$$. Median position = $$(5+1)/2 = 3$$rd value. The ordered list is 2, 5, **7**, 8, 10. Median = 7.\n- Step 2: $$Q_1$$ position = $$(5+1)/4 = 1.5$$th value = average of 1st and 2nd = $$(2 + 5)/2 = 3.5$$.\n\nFor $$n = 5$$, the median is a data point (3rd), but $$Q_1$$ falls between data points (1.5th), requiring averaging. The Edexcel $$(n+1)/4$$ rule always tells you exactly where to look.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_53", "judge_pick": false}, {"question": "Simple exercise: $$X$$ takes values 1, 2, 3 with probabilities 0.2, 0.5, 0.3. Find $$E(X)$$ and $$E(X^2)$$, then compute $$\\text{Var}(X)$$. (3 steps)", "answer": "- Step 1: $$E(X) = 1(0.2) + 2(0.5) + 3(0.3) = 0.2 + 1.0 + 0.9 = 2.1$$.\n- Step 2: $$E(X^2) = 1(0.2) + 4(0.5) + 9(0.3) = 0.2 + 2.0 + 2.7 = 4.9$$.\n- Step 3: $$\\text{Var}(X) = E(X^2) - [E(X)]^2 = 4.9 - 4.41 = 0.49$$.\n\nNote: $$\\text{Var}(X)$$ is *not* $$[E(X)]^2 = 4.41$$, nor is it $$E(X)^2 - E(X^2)$$. The formula is always \"mean of squares minus square of mean,\" and the order matters.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_54", "judge_pick": false}, {"question": "Simple exercise: $$Z \\sim N(0,1)$$. Find $$P(Z > 1.5)$$ using the fact that $$\\Phi(1.5) = 0.9332$$. (1 step)", "answer": "- Step 1: $$P(Z > 1.5) = 1 - P(Z < 1.5) = 1 - \\Phi(1.5) = 1 - 0.9332 = 0.0668$$. Right-tail probabilities always require the complement: $$P(Z > z) = 1 - \\Phi(z)$$.\n\nThe table gives cumulative (left-tail) probabilities. For a right-tail question, always take the complement. A sketch confirms: the area to the right of 1.5 is the tiny tail, roughly 6.7%.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_55", "judge_pick": false}, {"question": "Simple exercise: Two regression lines are $$y = 2x + 3$$ and $$x = 0.1y + 1$$. Use the shortcut to find $$r^2$$ and state the sign of $$r$$. (2 steps)", "answer": "- Step 1: $$b_{yx} = 2$$ (coefficient of $$x$$ in the $$y$$-on-$$x$$ equation). $$b_{xy} = 0.1$$ (coefficient of $$y$$ in the $$x$$-on-$$y$$ equation). $$r^2 = 2 \\times 0.1 = 0.2$$.\n- Step 2: Both slopes are positive, so $$r = +\\sqrt{0.2} = +0.447$$. A positive $$r$$ means positive linear association between $$x$$ and $$y$$.\n\nThe shortcut bypasses $$S_{xx}$$, $$S_{yy}$$, and $$S_{xy}$$ entirely. It only requires identifying the two slope coefficients correctly ‚ÄĒ don't confuse the slope with the intercept.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_56", "judge_pick": false}, {"question": "Why is it that $$P(A \\cap B') = P(A) - P(A \\cap B)$$ is always true, even without independence? Derive this from the partition of $$A$$. (2 steps)", "answer": "- Step 1: The event $$A$$ can be partitioned into two disjoint pieces: outcomes in $$A$$ that are also in $$B$$, and outcomes in $$A$$ that are not in $$B$$. Symbolically: $$A = (A \\cap B) \\cup (A \\cap B')$$, and the two pieces are disjoint (an outcome can't be both in $$B$$ and not in $$B$$).\n- Step 2: By the addition rule for disjoint events: $$P(A) = P(A \\cap B) + P(A \\cap B')$$. Rearranging: $$P(A \\cap B') = P(A) - P(A \\cap B)$$. No independence assumption needed ‚ÄĒ this is pure set theory.\n\nThis identity is the workhorse for Venn diagram problems: once you know $$P(A)$$ and $$P(A \\cap B)$$, you immediately get $$P(A \\cap B')$$. It is the probabilistic analogue of \"the part of $$A$$ outside $$B$$ equals all of $$A$$ minus the part inside $$B$$.\"", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_57", "judge_pick": false}, {"question": "Edge case: what happens to $$r^2 = b_{yx} \\cdot b_{xy}$$ when $$r = 1$$ (perfect correlation)? What do the two regression lines look like? (2 steps)", "answer": "- Step 1: If $$r = 1$$, then $$r^2 = 1$$, so $$b_{yx} \\cdot b_{xy} = 1$$. Since $$b_{yx} = r \\sigma_y / \\sigma_x$$ and $$b_{xy} = r \\sigma_x / \\sigma_y$$, when $$r = 1$$ we get $$b_{yx} = \\sigma_y/\\sigma_x$$ and $$b_{xy} = \\sigma_x/\\sigma_y$$, and their product is indeed 1.\n- Step 2: The two regression lines coincide ‚ÄĒ they are the same line. Every data point lies on this line, so predicting $$y$$ from $$x$$ and predicting $$x$$ from $$y$$ give the same line. There is no distinction between the two regressions because there is no scatter around the line.\n\nWhen $$r = 0$$, both slopes are 0 and the regression lines are horizontal/vertical through the means ‚ÄĒ no predictive power in either direction. The product $$b_{yx} \\cdot b_{xy} = 0$$ confirms $$r = 0$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_58", "judge_pick": true}, {"question": "For the normal distribution simultaneous equations problem, what is the danger of rounding $$\\sigma$$ to 2 significant figures before back-substituting to find $$\\mu$$? Illustrate with $$\\sigma \\approx 14.75$$ rounded to 15. (2 steps)", "answer": "- Step 1: If you round $$\\sigma = 14.75$$ to 15 and substitute into $$\\mu = 180 - 0.2533 \\times \\sigma$$: $$\\mu = 180 - 0.2533 \\times 15 = 180 - 3.80 = 176.20$$. The correct value is $$\\mu = 180 - 0.2533 \\times 14.75 = 180 - 3.74 = 176.26$$. The difference is about 0.06, which may seem small.\n- Step 2: But if the mark scheme allows tolerance of ¬Ī0.1 on $$\\mu$$, this rounding error alone consumes 60% of the allowance. Combined with any earlier rounding on $$z$$-values, you can easily be pushed outside the accepted range. The rule: carry full precision (4 d.p. for $$z$$, 2 d.p. for $$\\sigma$$ at most) through all working, and round only the final answers.\n\nMid-calculation rounding is the silent killer in simultaneous equation problems. The $$z$$-values from the table have 4 decimal places of precision ‚ÄĒ use all of them. Rounding $$1.6449$$ to $$1.6$$ loses 2.7% of the value, which propagates into $$\\sigma$$ and then amplifies in $$\\mu$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_59", "judge_pick": true}], "count": 60}, "qwen_1": {"label": "Qwen 3 ‚Ď†", "cards": [{"question": "Define conditional probability $P(A \\mid B)$ and explain how it restricts the sample space. (3 steps)", "answer": "- Step 1: **Definition** ‚ÄĒ Conditional probability is the probability of event $A$ occurring given that $B$ has occurred:  \n$$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}.$$  \n- Step 2: **Sample-space restriction** ‚ÄĒ The denominator $P(B)$ restricts the sample space to outcomes where $B$ occurs. The numerator $P(A \\cap B)$ includes only outcomes that satisfy both $A$ and $B$.  \n- Step 3: **Application to Sally's game** ‚ÄĒ For example, $P(\\text{won 2 games} \\mid W_1)$ excludes paths starting with $L$ (e.g., $LWW$), as $W_1$ defines the restricted sample space.  \n\nExample: In Sally's game, if $B =$ \"won the first game\" ($W_1$), only paths starting with $W$ ($WW$ and $WLW$) are considered for $A =$ \"won exactly 2 games.\"  \n\n**Takeaway:** Always explicitly restrict the numerator and denominator to the given condition's sample space.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How do you calculate quartiles $Q_1, Q_3$ and compare distributions using median and IQR for Edexcel S1? (4 steps)", "answer": "- Step 1: **Quartile positions** ‚ÄĒ For $n$ data points:  \n  - $Q_1$ at $\\frac{n+1}{4}$,  \n  - Median at $\\frac{n+1}{2}$,  \n  - $Q_3$ at $\\frac{3(n+1)}{4}$.  \n- Step 2: **Averaging** ‚ÄĒ If the position is non-integer, average the two nearest values.  \n- Step 3: **Box plot construction** ‚ÄĒ Whiskers extend to the most extreme non-outlier values (not the min/max).  \n- Step 4: **Distribution comparison** ‚ÄĒ Use Mr. Fuat's template:  \n  - **Median**: \"The median of [Dataset A] is higher/lower than [Dataset B].\"  \n  - **IQR**: \"The IQR of [Dataset A] is higher/lower, indicating more/less consistency.\"  \n\n**Misconception probe:** Why not extend whiskers to outliers?  \n**Answer:** Whiskers stop at the most extreme **non-outlier** values to highlight typical data spread, while outliers are plotted separately as √ó marks.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Explain the difference between mutually exclusive and independent events. How do you test for independence using a Venn diagram? (3 steps)", "answer": "- Step 1: **Definitions** ‚ÄĒ  \n  - **Mutually exclusive**: $P(A \\cap B) = 0$ (cannot occur simultaneously).  \n  - **Independent**: $P(A \\cap B) = P(A)P(B)$ (no influence between events).  \n- Step 2: **Venn diagram regions** ‚ÄĒ  \n  - Label regions $w$ (A-only), $x$ (A‚ą©B), $y$ (B-only), $z$ (neither).  \n  - Independence test: Compare $x$ (observed $A \\cap B$) to $P(A)P(B)$ (expected if independent).  \n- Step 3: **Example**: For Bob buying carrots ($C$) and onions ($O$):  \n  - $P(C \\cap O) = 0.55$ vs. $P(C)P(O) = 0.65 \\times 0.7 = 0.455$.  \n  - Since $0.55 \\neq 0.455$, $C$ and $O$ are **not independent**.  \n\n**Edge case:** Can two events be both mutually exclusive and independent?  \n**Answer:** Only if $P(A) = 0$ or $P(B) = 0$. Otherwise, mutual exclusivity implies dependence (since $P(A \\cap B) = 0 \\neq P(A)P(B)$).", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why must you translate $Y = 30/X < 20$ into a condition on $X$ before computing $P(X < 3 \\mid Y < 20)$? (2 steps)", "answer": "- Step 1: **Dependency clarification** ‚ÄĒ $Y$ is a function of $X$, not an independent variable. Ignoring this leads to incorrect joint probability calculations (e.g., multiplying $P(X=x)P(Y=y)$).  \n- Step 2: **Translation process** ‚ÄĒ Solve $Y < 20$:  \n  $$\\frac{30}{X} < 20 \\implies X > 1.5.$$  \n  Thus, $P(X < 3 \\mid Y < 20)$ becomes $P(X \\in \\{2\\}) / P(X \\in \\{2,3,4\\})$.  \n\n**Takeaway:** Always express conditions on functions of $X$ (like $Y = g(X)$) directly in terms of $X$-values before applying conditional probability.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_3", "judge_pick": true}, {"question": "Why is it crucial to subtract simultaneous equations when solving for $\\mu$ and $\\sigma$ in normal distribution problems? (3 steps)", "answer": "- Step 1: **Equation setup** ‚ÄĒ For percentiles $x_1$ and $x_2$, convert to $z$-scores:  \n  $$x_1 - \\mu = z_1 \\sigma, \\quad x_2 - \\mu = z_2 \\sigma.$$  \n- Step 2: **Subtract to eliminate $\\mu$** ‚ÄĒ Subtract the two equations:  \n  $$x_2 - x_1 = (z_2 - z_1)\\sigma \\implies \\sigma = \\frac{x_2 - x_1}{z_2 - z_1}.$$  \n  This avoids rounding errors from premature $\\mu$ calculation.  \n- Step 3: **Example** ‚ÄĒ For $x_1 = 152$, $x_2 = 180$, $z_1 = -1.6449$, $z_2 = 0.2533$:  \n  $$\\sigma = \\frac{180 - 152}{0.2533 - (-1.6449)} = \\frac{28}{1.8982} \\approx 14.75.$$  \n\n**Misconception probe:** What happens if you solve for $\\mu$ first?  \n**Answer:** Errors accumulate due to intermediate rounding (e.g., rounding $z_1$ or $\\sigma$ too early). Subtracting first preserves precision.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How does the shortcut $r^2 = b_{yx} \\cdot b_{xy}$ simplify PMCC calculation when both regression lines are given? (3 steps)", "answer": "- Step 1: **Regression slopes** ‚ÄĒ For $y = a + b_{yx}x$ and $x = c + b_{xy}y$:  \n  - $b_{yx} = \\frac{S_{xy}}{S_{xx}}$,  \n  - $b_{xy} = \\frac{S_{xy}}{S_{yy}}$.  \n- Step 2: **Derive the shortcut** ‚ÄĒ Multiply $b_{yx}$ and $b_{xy}$:  \n  $$b_{yx} \\cdot b_{xy} = \\frac{S_{xy}^2}{S_{xx}S_{yy}} = r^2.$$  \n- Step 3: **Apply to the problem** ‚ÄĒ Given $b_{yx} = 1.4$ and $b_{xy} = 0.2$:  \n  $$r^2 = 1.4 \\times 0.2 = 0.28 \\implies r = \\sqrt{0.28} \\approx 0.529.$$  \n\n**Edge case:** What if regression slopes have opposite signs?  \n**Answer:** $r^2$ remains positive, but $r$ takes the sign of the slopes (since $r = \\pm \\sqrt{r^2}$, matching the common sign of $b_{yx}$ and $b_{xy}$).", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_5", "judge_pick": false}], "count": 6}, "qwen_2": {"label": "Qwen 3 ‚Ď°", "cards": [{"question": "In a tree diagram for Sally's game (Q1), how do you calculate the probability of winning exactly 2 games in a turn? (3 steps)", "answer": "- Step 1: Identify all paths with exactly 2 wins: WW (no 3rd game), WLW, and LWW.\n- Step 2: Multiply probabilities along each path:\n  + WW: 0.7 (1st win) √ó 0.6 (2nd win) = 0.42\n  + WLW: 0.7 (1st win) √ó 0.4 (loss) √ó 0.2 (win) = 0.056\n  + LWW: 0.3 (1st loss) √ó 0.2 (win) √ó 0.6 (win) = 0.036\n- Step 3: Add probabilities: 0.42 + 0.056 + 0.036 = **0.512**\n\nKey insight: The stop-after-2-games rule affects which paths are valid. Always list all qualifying branches explicitly.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why is the box plot's lower whisker at 23 kg and not 16 kg (Q2) despite 16 being the minimum weight? (2 steps)", "answer": "- Step 1: Calculate outlier fences using IQR = 18 kg:\n  + Lower fence = 45 - 1.5√ó18 = 18 kg\n- Step 2: Identify non-outlier min: 16 kg < 18 kg ‚Üí outlier. Next lowest value = 23 kg ‚Üí lower whisker at 23 kg.\n\nMisconception probe: Why not extend whisker to the most extreme value? Whiskers show the **range of non-outlier data**‚ÄĒoutliers are marked separately.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_1", "judge_pick": true}, {"question": "How do you prove events C and O are not independent (Q3i) using Venn regions? (3 steps)", "answer": "- Step 1: Calculate P(C ‚ą© O) = x = 0.55 (from Venn diagram)\n- Step 2: Compute P(C) √ó P(O) = 0.65 √ó 0.7 = 0.455\n- Step 3: Compare values: 0.55 ‚Č† 0.455 ‚Üí not independent\n\nContrast common confusion: Mutual exclusivity (P(C ‚ą© O)=0) is different from independence. Two non-trivial events cannot be both mutually exclusive and independent.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_2", "judge_pick": false}, {"question": "For Y = 30/X (Q4c), why does Var(Y) = 30¬≤ √ó Var(1/X) instead of 30 √ó Var(1/X)?", "answer": "- Step 1: Variance scales with **square** of constants: Var(aX) = a¬≤Var(X)\n- Step 2: Apply to Y = 30√ó(1/X):\n  + a = 30 ‚áí Var(Y) = 900 √ó Var(1/X)\n- Step 3: Confirm with calculation: 900 √ó 29/600 = 43.5 ‚úď\n\nEdge case check: If Y = aX + b, what happens to Var(Y)? Only the constant multiplier (a) affects variance; additive constant (b) disappears.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why is the z-value for P(Y < 180) = 0.60 equal to +0.2533 (Q5e) instead of -0.2533?", "answer": "- Step 1: Locate 0.60 in standard normal table\n- Step 2: z = 0.25 gives 0.5987; z = 0.26 gives 0.6026 ‚Üí interpolate to 0.2533\n- Step 3: Since 0.60 > 0.5, the z-score is **positive** ‚ÄĒ the value lies above the mean\n\nLimiting case: What z corresponds to P(Z < z) = 0.5? z = 0 (mean). What about P(Z < z) = 0.999? z ‚Čą 3.09.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_4", "judge_pick": false}, {"question": "How do you find ‚ąĎx from regression lines y = 1.4x + 1.5 and x = 1.2 + 0.2y (Q6a ii)? (3 steps)", "answer": "- Step 1: Solve equations simultaneously ‚Üí intersection at (25/12, 53/12)\n- Step 2: Recognize this point is (xŐĄ, »≥)\n- Step 3: Calculate ‚ąĎx = n √ó xŐĄ = 12 √ó (25/12) = **25**\n\nVisual intuition: Regression lines always intersect at the mean point (xŐĄ, »≥). This is the \"balance point\" of the data.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_5", "judge_pick": false}, {"question": "When comparing distributions (Q2d), why is only median + IQR comparison required instead of discussing skewness?", "answer": "- Step 1: Edexcel S1 mark scheme prioritizes **location (median)** and **spread (IQR)**\n- Step 2: Skewness interpretation is not a marking point in \"compare\" questions unless explicitly asked\n- Step 3: Contextual statements required:\n  + \"Median weight in December is higher ‚Üí kangaroos heavier in December\"\n  + \"Smaller IQR ‚Üí more consistent weights in December\"\n\nCommon pitfall: Extra information (e.g., outliers) wastes time and risks incorrect statements. Stick to the template.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_6", "judge_pick": false}, {"question": "In Q4d, why can't you compute P(X < 3 ‚ą© Y < 20) as P(X < 3) √ó P(Y < 20)?", "answer": "- Step 1: Y is a deterministic function of X (Y = 30/X)\n- Step 2: No independence between X and Y ‚ÄĒ they're perfectly dependent\n- Step 3: Translate Y < 20 to X > 1.5 ‚áí X ‚ąą {2,3,4}\n  + Intersection with X < 3 ‚áí X = 2\n\nCounterexample: If Y = 2X, what is P(X=1 ‚ą© Y=3)? Impossible ‚Üí P=0 despite P(X=1) and P(Y=3) being non-zero.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_7", "judge_pick": false}, {"question": "How do you calculate E(1/X) in Q4a without using a calculator?", "answer": "- Step 1: Use expectation formula: E(1/X) = ő£(1/x)P(X=x)\n- Step 2: Compute each term:\n  + 1/1 √ó 1/10 = 1/10\n  + 1/2 √ó 1/5 = 1/10\n  + 1/3 √ó 3/10 = 1/10\n  + 1/4 √ó 2/5 = 1/10\n- Step 3: Add them: 4 √ó 1/10 = 2/5 ‚úď\n\nEfficiency trick: Recognize the pattern ‚ÄĒ each term simplifies to 1/10 here, making mental math easier.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_8", "judge_pick": false}, {"question": "Why is the upper fence for outliers in Q2b exactly 90 kg?", "answer": "- Step 1: Calculate IQR = Q3 - Q1 = 63 - 45 = 18\n- Step 2: Compute upper fence = Q3 + 1.5√óIQR = 63 + 27 = 90\n- Step 3: 1.5√óIQR rule is a standard convention for identifying extreme values\n\nLimiting case: What if data contains a value exactly equal to the fence? It's still considered an outlier.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_9", "judge_pick": false}, {"question": "In Q3ii, how do you find P(G) when given P(F ‚ą™ G) = 5/8 and F is independent of G?", "answer": "- Step 1: Use union formula: P(F ‚ą™ G) = P(F) + P(G) - P(F ‚ą© G)\n- Step 2: Substitute independence: P(F ‚ą© G) = P(F)P(G)\n- Step 3: Solve:\n  + 5/8 = 2/7 + P(G) - (2/7)P(G)\n  + Rearranged: (5/7)P(G) = 5/8 - 2/7 = 19/56\n  + P(G) = 19/40 ‚úď\n\nKey takeaway: Always substitute independence condition into probability formulas to eliminate intersections.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Why is the PMCC in Q6c positive despite having r¬≤ = 0.28?", "answer": "- Step 1: Calculate r¬≤ = b_yx √ó b_xy = 1.4 √ó 0.2 = 0.28\n- Step 2: Take square root: r = ¬Ī‚ąö0.28\n- Step 3: Determine sign: Both regression slopes positive ‚Üí r is positive ‚úď\n\nContrast: If b_yx = -1.4 and b_xy = -0.2, what would r be? r = -‚ąö0.28 (same sign as slopes).", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_11", "judge_pick": false}], "count": 12}, "minimax_1": {"label": "MiniMax ‚Ď†", "cards": [{"question": "A student calculates P(exactly 2 wins) = 0.512 and then computes P(won first 2 games | won exactly 2 games) as 0.42/0.512. Explain why this calculation is correct, and state what event is being conditioned on. (2 steps)", "answer": "- Step 1: The conditioning event is \"exactly 2 wins in the turn\" ‚ÄĒ this restricts the sample space to only those paths with exactly 2 wins (WW, WLW, LWW).\n- Step 2: Since \"won the first 2 games\" (WW) is a subset of \"exactly 2 wins\", the intersection P(A ‚ą© B) = P(WW) = 0.42. The formula gives: $$P(WW | \\text{exactly 2 wins}) = \\frac{0.42}{0.512}.$$\n\n**Takeaway:** When A ‚äÜ B, P(A ‚ą© B) = P(A) ‚ÄĒ the intersection collapses to the smaller event.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_0", "judge_pick": false}, {"question": "A student computes P(won 2 games | won first game) as 0.512/0.7 = 0.7314. Why is this wrong? What is the correct numerator? (3 steps)", "answer": "- Step 1: The error is using the marginal probability P(exactly 2 wins) = 0.512, which includes paths like LWW (loss then two wins) that contradict the condition \"won the first game.\"\n- Step 2: The numerator must be the joint event P(won exactly 2 wins AND won the first game) ‚ÄĒ only paths beginning with W.\n- Step 3: Paths with exactly 2 wins beginning with W are: WW (0.42) and WLW (0.056), so numerator = 0.476. The correct answer is 0.476/0.7 = 0.68.\n\n**Takeaway:** The numerator in conditional probability must be the intersection A ‚ą© B, not the marginal probability of A alone.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Write the general formula for conditional probability P(A|B) and explain what each component represents in terms of sample spaces. (2 steps)", "answer": "- Step 1: The formula is $$P(A|B) = \\frac{P(A \\cap B)}{P(B)}$$\n- Step 2: P(B) is the total probability of the conditioning event (restricting the sample space), and P(A ‚ą© B) is the probability of both events occurring together within this restricted space.\n\n**Takeaway:** The \"given\" word always means restricting to a smaller sample space ‚ÄĒ never use marginal probabilities as numerators.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_2", "judge_pick": false}, {"question": "In a turn that stops after 2 games if Sally wins the first 2 or loses the first 2, list all possible paths and their probabilities that result in exactly 2 wins. (2 steps)", "answer": "- Step 1: Paths where the turn stops after 2 games: WW (win-win) = 0.7 √ó 0.6 = 0.42.\n- Step 2: Paths requiring a third game: WLW (win-loss-win) = 0.7 √ó 0.4 √ó 0.2 = 0.056; LWW (loss-win-win) = 0.3 √ó 0.2 √ó 0.6 = 0.036. Total = 0.42 + 0.056 + 0.036 = 0.512.\n\n**Takeaway:** The \"stopping rule\" creates three paths for exactly 2 wins ‚ÄĒ one that stops early (WW) and two that go to a third game.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_3", "judge_pick": false}, {"question": "When constructing a tree diagram for this game, why must the probabilities after a win (0.6/0.4) differ from the probabilities after a loss (0.2/0.8)? (1 step)", "answer": "- Step 1: The game specifies different transition probabilities ‚ÄĒ winning makes the next win more likely (0.6) while losing makes the next win less likely (0.2). These are conditional probabilities that depend on the previous outcome, not constant values.\n\n**Takeaway:** In Markov-type processes, the probability of the next event depends on the current state.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_4", "judge_pick": false}, {"question": "For a dataset of n = 33 observations, find the positions of the median, Q1, and Q3 using the Edexcel S1 quartile convention. (2 steps)", "answer": "- Step 1: Using the formula (n+1)/k where k = 1 for Q1, 2 for median, 3 for Q3:\n- Median position: (33+1)/2 = 17th value\n- Q1 position: (33+1)/4 = 8.5 ‚Üí average of 8th and 9th values\n- Q3 position: 3(33+1)/4 = 25.5 ‚Üí average of 25th and 26th values\n- Step 2: For non-integer positions, average the two flanking values.\n\n**Takeaway:** Edexcel S1 uses the (n+1)/k formula, not the n/k method used in some other specifications.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_5", "judge_pick": false}, {"question": "Given Q1 = 45 kg and Q3 = 63 kg for kangaroo weights, calculate the outlier fences using the 1.5 √ó IQR rule, and identify any outliers from the values 16, 23, 86, and 94 kg. (3 steps)", "answer": "- Step 1: Calculate IQR = Q3 - Q1 = 63 - 45 = 18 kg.\n- Step 2: Compute fences: Lower = Q1 - 1.5 √ó 18 = 45 - 27 = 18 kg; Upper = Q3 + 1.5 √ó 18 = 63 + 27 = 90 kg.\n- Step 3: Compare: 16 kg < 18 kg (outlier); 23 kg > 18 kg (not outlier); 86 kg < 90 kg (not outlier); 94 kg > 90 kg (outlier). Two outliers: 16 kg and 94 kg.\n\n**Takeaway:** Outliers are values beyond the fences, not just the minimum and maximum of the dataset.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_6", "judge_pick": false}, {"question": "When drawing a box plot with outliers, where do the whiskers end? Explain why they don't extend to the minimum and maximum values. (2 steps)", "answer": "- Step 1: The whiskers extend only to the most extreme non-outlier values. For the December data, the lower whisker ends at 23 kg (the smallest value above 18 kg), and the upper whisker ends at 86 kg (the largest value below 90 kg).\n- Step 2: The outliers (16 kg and 94 kg) are plotted separately as crosses (√ó) beyond the whiskers.\n\n**Takeaway:** Box plot whiskers show the range of \"normal\" data ‚ÄĒ outliers are excluded to avoid distorting the visual representation of spread.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_7", "judge_pick": false}, {"question": "According to the Edexcel mark scheme, what three components must be included when comparing two distributions? Why is this template important? (2 steps)", "answer": "- Step 1: The comparison must include exactly: (1) median comparison (which distribution has higher/lower median), (2) IQR comparison (which has greater/less spread), and (3) interpretation in context with units.\n- Step 2: Extra claims about skewness, range, or outliers are ignored or can cancel correct marks if wrong. The template ensures you hit the required comparison points.\n\n**Takeaway:** Always follow the exam's required comparison template ‚ÄĒ more is not better if it risks introducing errors.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_8", "judge_pick": false}, {"question": "In a Venn diagram with events C (carrots) and O (onions), if P(O') = 0.3 and P(O ‚ą© C') = 0.15, find P(O). Then, if P(C) = 0.65, find the intersection P(O ‚ą© C). (3 steps)", "answer": "- Step 1: P(O) = 1 - P(O') = 1 - 0.3 = 0.7.\n- Step 2: The Venn region O only = P(O ‚ą© C') = 0.15. Since P(O) = P(O ‚ą© C') + P(O ‚ą© C), we have 0.7 = 0.15 + P(O ‚ą© C), so P(O ‚ą© C) = 0.55.\n- Step 3: Then P(C only) = P(C) - P(O ‚ą© C) = 0.65 - 0.55 = 0.10, and the outside region z = 1 - (0.15 + 0.55 + 0.10) = 0.20.\n\n**Takeaway:** Venn regions must sum to 1, and use P(O) = 1 - P(O') when the complement is given.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_9", "judge_pick": false}, {"question": "Two events A and B are mutually exclusive. Can they also be independent? Explain with a numerical example. (2 steps)", "answer": "- Step 1: No ‚ÄĒ if A and B are mutually exclusive, P(A ‚ą© B) = 0. For independence, we need P(A ‚ą© B) = P(A)P(B).\n- Step 2: If P(A) = 0.3 and P(B) = 0.4, then P(A)P(B) = 0.12 ‚Č† 0. Since 0 ‚Č† 0.12, they cannot be independent (unless one has probability 0).\n\n**Takeaway:** Non-trivial mutually exclusive events are always dependent ‚ÄĒ knowing one occurred means the other cannot occur.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_10", "judge_pick": false}, {"question": "How do you test whether two events C and O are statistically independent using probabilities? What inequality must hold? (2 steps)", "answer": "- Step 1: Calculate both P(C ‚ą© O) and P(C) √ó P(O) separately.\n- Step 2: If P(C ‚ą© O) = P(C)P(O), they are independent. If not equal, they are dependent. For the vegetable problem: P(C ‚ą© O) = 0.55, but P(C)P(O) = 0.65 √ó 0.7 = 0.455. Since 0.55 ‚Č† 0.455, they are not independent.\n\n**Takeaway:** Independence requires exact equality ‚ÄĒ always compute both sides numerically before concluding.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_11", "judge_pick": false}, {"question": "If P(F) = 2/7, P(H) = 1/4, and F and H are mutually exclusive, find P(F ‚ą™ H). If instead F and G are independent with P(F ‚ą™ G) = 5/8, write the equation relating P(G). (3 steps)", "answer": "- Step 1: For mutually exclusive: P(F ‚ą™ H) = P(F) + P(H) - P(F ‚ą© H) = 2/7 + 1/4 - 0 = 15/28.\n- Step 2: For independent F and G: P(F ‚ą™ G) = P(F) + P(G) - P(F ‚ą© G) = P(F) + P(G) - P(F)P(G).\n- Step 3: Substituting: 5/8 = 2/7 + P(G) - (2/7)P(G) = 2/7 + (5/7)P(G). This is the equation to solve for P(G).\n\n**Takeaway:** Mutually exclusive events use addition only; independent events require subtracting the product term.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_12", "judge_pick": false}, {"question": "For a discrete RV X with distribution P(X=1)=1/10, P(X=2)=1/5, P(X=3)=3/10, P(X=4)=2/5, calculate E(1/X) by showing each term equals 1/10. (2 steps)", "answer": "- Step 1: Compute each term:\n- (1/1)(1/10) = 1/10\n- (1/2)(1/5) = 1/10\n- (1/3)(3/10) = 1/10\n- (1/4)(2/5) = 2/20 = 1/10\n- Step 2: Sum: 1/10 + 1/10 + 1/10 + 1/10 = 4/10 = 2/5.\n\n**Takeaway:** E(g(X)) = ő£g(x)P(X=x) ‚ÄĒ apply the function g(x) to each x-value before multiplying by probability.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_13", "judge_pick": false}, {"question": "Given E(1/X) = 2/5 and E(1/X¬≤) = 5/24, calculate Var(1/X). Show the common denominator method. (3 steps)", "answer": "- Step 1: Use the variance formula: Var = E(X¬≤) - [E(X)]¬≤ = 5/24 - (2/5)¬≤ = 5/24 - 4/25.\n- Step 2: Find common denominator: LCM of 24 and 25 is 600.\n- Step 3: Convert: 5/24 = 125/600, 4/25 = 96/600. Subtract: 125/600 - 96/600 = 29/600.\n\n**Takeaway:** Always use a common denominator when subtracting fractions ‚ÄĒ keep fractions exact rather than converting to decimals.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_14", "judge_pick": false}, {"question": "If Y = 30/X for the discrete RV above, find E(Y) and Var(Y) using the scaling properties. Explain why you square the coefficient for variance. (2 steps)", "answer": "- Step 1: Since Y = 30 √ó (1/X), E(Y) = 30 √ó E(1/X) = 30 √ó 2/5 = 12.\n- Step 2: For variance: Var(aX) = a¬≤Var(X), so Var(Y) = 30¬≤ √ó Var(1/X) = 900 √ó 29/600 = 87/2 = 43.5. The square appears because variance measures spread around the mean ‚ÄĒ doubling the scale quadruples the spread.\n\n**Takeaway:** The coefficient a is squared in variance because variance is measured in squared units of the original variable.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_15", "judge_pick": false}, {"question": "For Y = 30/X, find the condition on X that corresponds to Y < 20. Then find P(Y < 20). (3 steps)", "answer": "- Step 1: Y < 20 means 30/X < 20. Since X > 0 (the domain is {1,2,3,4}), divide both sides: X > 30/20 = 1.5.\n- Step 2: So Y < 20 corresponds to X ‚ąą {2, 3, 4}.\n- Step 3: P(Y < 20) = P(X=2) + P(X=3) + P(X=4) = 1/5 + 3/10 + 2/5 = 2/10 + 3/10 + 4/10 = 9/10.\n\n**Takeaway:** When conditioning on a function of X, always translate to a condition on X first ‚ÄĒ there's no joint distribution to compute.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Find P(X < 3 | Y < 20) for the discrete RV where Y = 30/X. Explain why you cannot treat X and Y as independent. (3 steps)", "answer": "- Step 1: X < 3 means X ‚ąą {1, 2}. Y < 20 means X ‚ąą {2, 3, 4}. The intersection is X = 2 only.\n- Step 2: P(X < 3 | Y < 20) = P(X = 2)/P(Y < 20) = (1/5)/(9/10) = 2/9.\n- Step 3: X and Y are not independent because Y is a deterministic function of X (Y = 30/X). Knowing X completely determines Y.\n\n**Takeaway:** For functions Y = g(X), there's no joint distribution to work with ‚ÄĒ translate the condition first.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_17", "judge_pick": false}, {"question": "For X ~ N(210, 25¬≤), calculate P(X < 240) by standardising. Explain why you standardise. (2 steps)", "answer": "- Step 1: Standardise: Z = (X - őľ)/ŌÉ = (240 - 210)/25 = 30/25 = 1.20. Then P(X < 240) = P(Z < 1.20) = ő¶(1.20) = 0.8849.\n- Step 2: We standardise because the normal distribution table only provides values for the standard normal Z ~ N(0,1).\n\n**Takeaway:** Standardisation transforms any normal distribution to the standard normal, allowing use of the tables.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_18", "judge_pick": false}, {"question": "Find P(190 < X < 240) for X ~ N(210, 25¬≤). Why do you subtract ő¶(-0.8) from ő¶(1.2) rather than using symmetry directly? (3 steps)", "answer": "- Step 1: Standardise both bounds: lower = (190-210)/25 = -0.8, upper = (240-210)/25 = 1.2.\n- Step 2: P(190 < X < 240) = P(-0.8 < Z < 1.2) = ő¶(1.2) - ő¶(-0.8).\n- Step 3: Since ő¶(-a) = 1 - ő¶(a), ő¶(-0.8) = 1 - 0.7881 = 0.2119. So the answer is 0.8849 - 0.2119 = 0.6730. Using symmetry would give the same result, but explicitly using the complement is safer.\n\n**Takeaway:** Always convert negative z-values using ő¶(-a) = 1 - ő¶(a) before subtracting.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_19", "judge_pick": false}, {"question": "Find k such that P(210 - k < X < 210 + k) = 0.95 for X ~ N(210, 25¬≤). Explain why you use 0.975, not 0.95. (3 steps)", "answer": "- Step 1: For a symmetric 95% interval, each tail has probability 0.025. So P(Z < k/25) = 1 - 0.025 = 0.975.\n- Step 2: From the inverse normal table, z = 1.96 gives ő¶(1.96) = 0.975.\n- Step 3: Solve: k/25 = 1.96, so k = 25 √ó 1.96 = 49. We use 0.975 because it represents the cumulative probability up to the upper bound, not the interval probability itself.\n\n**Takeaway:** For symmetric intervals, the central probability determines the tail probabilities ‚ÄĒ 95% central means 2.5% in each tail.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_20", "judge_pick": false}, {"question": "The lightest 15% of fruit are \"small.\" Find the maximum weight for a small fruit when X ~ N(210, 25¬≤). Why is the z-value negative? (3 steps)", "answer": "- Step 1: P(X < w) = 0.15. This is a left-tail probability below the mean, so the z-value is negative.\n- Step 2: Find z where ő¶(z) = 0.15. Since ő¶(-1.0364) ‚Čą 0.15 (or ő¶(1.0364) = 0.85), z = -1.0364.\n- Step 3: Unstandardise: w = őľ + zŌÉ = 210 + (-1.0364)(25) = 210 - 25.91 = 184 g (3 s.f.).\n\n**Takeaway:** Percentiles below the 50th percentile always give negative z-values ‚ÄĒ the standardisation formula preserves the sign.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_21", "judge_pick": false}, {"question": "For a second fruit variety Y ~ N(őľ, ŌÉ¬≤), given P(Y < 152) = 0.05 and P(Y > 180) = 0.40, set up two equations relating őľ and ŌÉ. Explain the conversion for the second condition. (3 steps)", "answer": "- Step 1: From P(Y < 152) = 0.05: (152 - őľ)/ŌÉ = z‚āĀ where ő¶(z‚āĀ) = 0.05, so z‚āĀ = -1.6449. Equation: 152 - őľ = -1.6449ŌÉ.\n- Step 2: From P(Y > 180) = 0.40, convert to left tail: P(Y < 180) = 1 - 0.40 = 0.60. So (180 - őľ)/ŌÉ = z‚āā where ő¶(z‚āā) = 0.60, giving z‚āā = 0.2533.\n- Step 3: Equation: 180 - őľ = 0.2533ŌÉ. This conversion is essential ‚ÄĒ always convert \"greater than\" to cumulative \"less than\" before finding z.\n\n**Takeaway:** Never use right-tail probabilities directly in inverse normal ‚ÄĒ convert to left-tail cumulative probabilities first.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_22", "judge_pick": false}, {"question": "With the equations 152 - őľ = -1.6449ŌÉ and 180 - őľ = 0.2533ŌÉ, solve for őľ and ŌÉ. Explain why you subtract the equations first. (3 steps)", "answer": "- Step 1: Subtract the first from the second to eliminate őľ: (180 - 152) = 0.2533ŌÉ - (-1.6449ŌÉ), giving 28 = 1.8982ŌÉ.\n- Step 2: Solve: ŌÉ = 28/1.8982 = 14.75 ‚Čą 14.8 g. Subtracting eliminates őľ first, which is the efficient approach.\n- Step 3: Back-substitute: 180 - őľ = 0.2533 √ó 14.75, so őľ = 180 - 3.74 = 176.3 g.\n\n**Takeaway:** For simultaneous equations from percentiles, subtract first to solve for ŌÉ directly ‚ÄĒ this avoids messy substitution.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_23", "judge_pick": false}, {"question": "Two regression lines are y = 1.4x + 1.5 and x = 1.2 + 0.2y. Find their point of intersection. Explain why this point is significant. (3 steps)", "answer": "- Step 1: Substitute y = 1.4x + 1.5 into x = 1.2 + 0.2y: x = 1.2 + 0.2(1.4x + 1.5) = 1.2 + 0.28x + 0.3 = 1.5 + 0.28x.\n- Step 2: So x - 0.28x = 1.5, giving 0.72x = 1.5, so x = 25/12. Then y = 1.4(25/12) + 1.5 = 53/12.\n- Step 3: This point (25/12, 53/12) is (xŐĄ, »≥) ‚ÄĒ the intersection of the two regression lines always gives the means.\n\n**Takeaway:** The two regression lines (y on x and x on y) always intersect at the point (xŐĄ, »≥).", "source": "MiniMax ‚Ď†", "_id": "minimax_1_24", "judge_pick": false}, {"question": "Given the intersection point (25/12, 53/12) from 12 observations, find ő£x and ő£y. Explain the \"hence\" instruction. (2 steps)", "answer": "- Step 1: Since xŐĄ = ő£x/n, we have ő£x = n √ó xŐĄ = 12 √ó (25/12) = 25.\n- Step 2: Similarly, ő£y = 12 √ó (53/12) = 53. The \"hence\" means you must use the intersection result, not start fresh.\n\n**Takeaway:** The \"hence\" instruction requires you to use the previous part's result ‚ÄĒ don't recalculate independently.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_25", "judge_pick": false}, {"question": "Given ő£xy = 6961/60, xŐĄ = 25/12, »≥ = 53/12, find S_xy. Show the fraction calculation. (3 steps)", "answer": "- Step 1: S_xy = ő£xy - n √ó xŐĄ √ó »≥ = 6961/60 - 12 √ó (25/12) √ó (53/12).\n- Step 2: Simplify: 12 √ó (25/12) √ó (53/12) = (25 √ó 53)/12 = 1325/12.\n- Step 3: Convert to common denominator 60: 6961/60 - (1325/12) = 6961/60 - 6625/60 = 336/60 = 28/5 = 5.6.\n\n**Takeaway:** Keep fractions exact until the final answer ‚ÄĒ avoid premature decimal conversion.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_26", "judge_pick": false}, {"question": "From the regression lines y = 1.4x + 1.5 and x = 1.2 + 0.2y, find the PMCC r using the shortcut method. Why is this more efficient? (3 steps)", "answer": "- Step 1: The shortcut is r¬≤ = b_yx √ó b_xy, where b_yx = 1.4 (slope of y on x) and b_xy = 0.2 (slope of x on y).\n- Step 2: r¬≤ = 1.4 √ó 0.2 = 0.28, so r = ‚ąö0.28 = 0.529.\n- Step 3: This avoids computing S_xx and S_yy, which would require ő£x¬≤ and ő£y¬≤ (not given).\n\n**Takeaway:** When both regression lines are given, always use r¬≤ = b_yx √ó b_xy ‚ÄĒ it's a one-step calculation.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_27", "judge_pick": false}, {"question": "Verify the PMCC by computing S_xx and S_yy from the regression slopes and S_xy. Confirm r = S_xy/‚ąö(S_xx S_yy). (3 steps)", "answer": "- Step 1: From b_yx = S_xy/S_xx = 1.4, with S_xy = 5.6, we get S_xx = 5.6/1.4 = 4.\n- Step 2: From b_xy = S_xy/S_yy = 0.2, we get S_yy = 5.6/0.2 = 28.\n- Step 3: Verify: r = 5.6/‚ąö(4 √ó 28) = 5.6/‚ąö112 = 5.6/10.583 ‚Čą 0.529. ‚úď\n\n**Takeaway:** The shortcut and long route give identical results ‚ÄĒ useful as a check.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_28", "judge_pick": false}, {"question": "Why is the sign of the PMCC positive in this case? What would indicate a negative correlation? (1 step)", "answer": "- Step 1: Both regression slopes (1.4 and 0.2) are positive, so the correlation must be positive. If either slope were negative, r would be negative.\n\n**Takeaway:** The sign of r matches the sign of both regression slopes when both lines are given.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_29", "judge_pick": false}, {"question": "A student says they can determine independence of two events if they are mutually exclusive. Is this true? Explain the logical relationship. (2 steps)", "answer": "- Step 1: No ‚ÄĒ if two events are mutually exclusive (P(A ‚ą© B) = 0) and both have positive probability, then P(A)P(B) > 0, so P(A ‚ą© B) ‚Č† P(A)P(B). They are dependent.\n- Step 2: The only case where mutually exclusive events could also be independent is if at least one event has probability 0 (a trivial case).\n\n**Takeaway:** Mutually exclusive and independent are opposite concepts for non-trivial events.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_30", "judge_pick": false}, {"question": "For the tree diagram problem, why does the path \"WW\" (winning first two games) stop after two games? How does this affect the probability calculation? (2 steps)", "answer": "- Step 1: The problem states: \"If she wins the first 2 games or loses the first 2 games, then she will not play the 3rd game.\" This is a stopping rule.\n- Step 2: For path WW, after two wins the turn ends ‚ÄĒ there is no third game. So the probability is simply 0.7 √ó 0.6 = 0.42, not multiplied by a third-game probability.\n\n**Takeaway:** Always check for stopping rules in tree diagrams ‚ÄĒ they affect which branches continue and which terminate.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In the box plot comparison question, why is it wrong to mention skewness or range when the mark scheme only rewards median and IQR? (2 steps)", "answer": "- Step 1: The mark scheme explicitly marks only three things: median comparison, IQR comparison, and interpretation in context. Extra statements about skewness or range are ignored at best.\n- Step 2: If you make an incorrect extra claim (e.g., wrong direction of skew), it can cancel a correct claim. The safest approach is to stick exactly to the required template.\n\n**Takeaway:** Exam technique matters ‚ÄĒ know what the mark scheme rewards and don't add unnecessary content.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_32", "judge_pick": false}, {"question": "When solving for őľ and ŌÉ in the normal simultaneous equations, why must you keep z-values to 4 decimal places? What goes wrong if you round to 2? (2 steps)", "answer": "- Step 1: Rounding z-values to 2 d.p. propagates error through the division and back-substitution. For example, z = 0.2533 rounded to 0.25 gives ŌÉ = 28/1.8949 ‚Čą 14.78 vs 14.75 ‚ÄĒ a small but significant difference in an exam.\n- Step 2: The error compounds when back-calculating őľ. Keeping 4 d.p. maintains accuracy within the required significant figures.\n\n**Takeaway:** Carry full precision (4 d.p. for z-values) through all calculations; round only at the final answer.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_33", "judge_pick": false}, {"question": "For the Venn diagram problem, explain why w = P(O ‚ą© C') and x = P(O ‚ą© C). Why does this labeling matter? (2 steps)", "answer": "- Step 1: The labeling depends on how the Venn diagram is drawn. Typically, w is the region in O only (without C), x is the intersection, and y is C only.\n- Step 2: Swapping w and x leads to wrong values ‚ÄĒ in the problem, w = 0.15 (given directly as P(O ‚ą© C')), while x = 0.55 (the intersection, calculated from P(O) - w).\n\n**Takeaway:** Always verify the diagram's labeling before substituting ‚ÄĒ don't assume the order of regions.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_34", "judge_pick": false}, {"question": "Find P(C ‚ą™ O) - that is, the probability Bob buys carrots or onions (either or both). Given w = 0.15, x = 0.55, y = 0.10, z = 0.20. (2 steps)", "answer": "- Step 1: P(C ‚ą™ O) = P(C) + P(O) - P(C ‚ą© O) = 0.65 + 0.70 - 0.55 = 0.80.\n- Step 2: Alternatively, using the Venn regions: 1 - z = 1 - 0.20 = 0.80. Both methods agree.\n\n**Takeaway:** P(A ‚ą™ B) includes both the individual regions and the overlap once ‚ÄĒ the formula corrects for double-counting.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_35", "judge_pick": false}, {"question": "For the discrete RV, find P(F ‚ą© G') where F and G are independent with P(F) = 2/7 and P(G) = 19/40. Show two methods. (2 steps)", "answer": "- Step 1: Method 1 - subtraction: P(F ‚ą© G') = P(F) - P(F ‚ą© G) = 2/7 - (2/7)(19/40) = 2/7 √ó (1 - 19/40) = 2/7 √ó 21/40 = 3/20.\n- Step 2: Method 2 - independence: P(F ‚ą© G') = P(F) √ó P(G') = (2/7) √ó (1 - 19/40) = (2/7) √ó (21/40) = 3/20.\n\n**Takeaway:** For independent events, P(A ‚ą© B') = P(A) √ó P(B').", "source": "MiniMax ‚Ď†", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In a normal distribution problem, a student finds P(X > 180) = 0.40 but uses z = -0.25 in calculations. What's wrong? (2 steps)", "answer": "- Step 1: The student incorrectly used the z-value for the right tail. P(X > 180) = 0.40 means P(X < 180) = 0.60.\n- Step 2: The z-value for 0.60 is positive (z = 0.2533), not negative. The negative sign appears only when the percentile is below 50%.\n\n**Takeaway:** Always convert \"greater than\" to cumulative \"less than\" before looking up z ‚ÄĒ the sign emerges from the formula x = őľ + zŌÉ.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_37", "judge_pick": false}, {"question": "For the regression problem, explain why r¬≤ = b_yx √ó b_xy. What assumptions are needed for this to work? (2 steps)", "answer": "- Step 1: Since b_yx = S_xy/S_xx and b_xy = S_xy/S_yy, multiplying gives (S_xy/S_xx) √ó (S_xy/S_yy) = S_xy¬≤/(S_xx √ó S_yy) = r¬≤ (by the PMCC formula).\n- Step 2: This identity holds when both regression lines are provided. It bypasses the need for S_xx and S_yy entirely.\n\n**Takeaway:** This is a powerful shortcut when both regression equations are given ‚ÄĒ always check if you can use it.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_38", "judge_pick": false}, {"question": "In the quartiles question, why do we average the 8th and 9th values for Q1 when n = 33? What would happen if we just took the 8th value? (2 steps)", "answer": "- Step 1: The position for Q1 is (n+1)/4 = 34/4 = 8.5, which is halfway between positions 8 and 9. We must average to get the true quartile value.\n- Step 2: Taking just the 8th value would be wrong ‚ÄĒ the formula explicitly requires interpolation for non-integer positions. The answer would be too high or too low depending on the data.\n\n**Takeaway:** Edexcel S1 requires interpolation for quartile positions that are not whole numbers.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_39", "judge_pick": false}, {"question": "A student calculates the box plot whisker to include 16 kg (the minimum). Why is this incorrect when 16 kg is an outlier? (2 steps)", "answer": "- Step 1: By definition, whiskers extend only to the most extreme values that are not outliers ‚ÄĒ in this case, 23 kg (lower) and 86 kg (upper).\n- Step 2: Including the outliers in the whiskers defeats the purpose of showing them separately and distorts the visual representation of the data's spread.\n\n**Takeaway:** The box plot's whiskers show the \"typical\" range; outliers are shown as individual points for emphasis.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_40", "judge_pick": false}, {"question": "When computing Var(1/X) = E(1/X¬≤) - [E(1/X)]¬≤, explain why you need E(1/X¬≤), not just E(1/X). (1 step)", "answer": "- Step 1: Variance measures the average squared deviation from the mean. We need E(X¬≤) to compute the \"squared\" part ‚ÄĒ just knowing the mean tells us nothing about spread. E(1/X) alone cannot give variance.\n\n**Takeaway:** Variance always requires the second moment E(X¬≤) in addition to the first moment [E(X)]¬≤.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_41", "judge_pick": false}, {"question": "If P(F) = 2/7, P(H) = 1/4, and F and H are mutually exclusive, find P(F' ‚ą© H'). Explain your reasoning. (2 steps)", "answer": "- Step 1: Since F and H are mutually exclusive, together they cover P(F) + P(H) = 2/7 + 1/4 = 15/28 of the probability space.\n- Step 2: The complement P(F' ‚ą© H') = 1 - P(F ‚ą™ H) = 1 - 15/28 = 13/28. Alternatively, it's the region outside both F and H (neither F nor H).\n\n**Takeaway:** For mutually exclusive events, P(F' ‚ą© H') = 1 - [P(F) + P(H)].", "source": "MiniMax ‚Ď†", "_id": "minimax_1_42", "judge_pick": false}, {"question": "In the stem-and-leaf diagram, how can you verify that your median calculation of 57 kg is correct? (2 steps)", "answer": "- Step 1: With n = 33, the median is the 17th value when sorted. Count the leaves: 1+2+3+7+8+7+2+2+1 = 33 ‚ÄĒ check.\n- Step 2: The cumulative count reaches 17 in the \"5\" stem (the 5 | 7 7 7 8 9 9 row), specifically the third value in that row, which is 57. ‚úď\n\n**Takeaway:** Always verify your position by counting through the ordered data ‚ÄĒ the median is exactly at position (n+1)/2.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_43", "judge_pick": false}, {"question": "Why can't you use the long method (computing S_xx and S_yy) to find the PMCC when only ő£xy is given, without ő£x¬≤ or ő£y¬≤? (1 step)", "answer": "- Step 1: The long method requires r = S_xy/‚ąö(S_xx S_yy), which needs S_xx = ő£x¬≤ - (ő£x)¬≤/n and S_yy = ő£y¬≤ - (ő£y)¬≤/n. Without ő£x¬≤ or ő£y¬≤, you cannot compute these.\n\n**Takeaway:** The shortcut r¬≤ = b_yx √ó b_xy uses only the regression slopes, which are given ‚ÄĒ no additional sums needed.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_44", "judge_pick": false}, {"question": "For the conditional probability P(X < 3 | Y < 20), why can't you compute P(X < 3) √ó P(Y < 20) as the numerator? (2 steps)", "answer": "- Step 1: This would assume X and Y are independent, but Y = 30/X is a deterministic function of X ‚ÄĒ they are perfectly dependent.\n- Step 2: The correct numerator is P(X < 3 AND Y < 20), which is the intersection of the two events, not the product of their marginals.\n\n**Takeaway:** Only use P(A ‚ą© B) = P(A)P(B) when you've confirmed independence.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_45", "judge_pick": false}, {"question": "In the normal distribution, if you need to find k where P(X < 210 + k) = 0.98, what z-value do you use and why? (2 steps)", "answer": "- Step 1: P(Z < z) = 0.98 means we want the 98th percentile. From the inverse normal table, this corresponds to z = 2.0537 (or z = 2.05 to 2 d.p.).\n- Step 2: Since 0.98 > 0.5, z is positive. Then k = zŌÉ = 2.0537 √ó 25 ‚Čą 51.3.\n\n**Takeaway:** Percentiles above 0.5 always give positive z-values; below 0.5 gives negative z-values.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_46", "judge_pick": false}, {"question": "When comparing the February and December kangaroo weight distributions, a student says \"December has a higher median so kangaroos are heavier in winter.\" Why is this interpretation incomplete? (2 steps)", "answer": "- Step 1: The statement is directionally correct but lacks explicit mention of the unit (kg) and the comparison being made.\n- Step 2: A complete answer must say: \"The median weight in December is [higher/lower] than in February (57 kg), indicating that on average December kangaroos are heavier/lighter.\"\n\n**Takeaway:** Always include the variable name and units in context ‚ÄĒ \"weight of red kangaroos in kg.\"", "source": "MiniMax ‚Ď†", "_id": "minimax_1_47", "judge_pick": true}, {"question": "A student attempts P(F ‚ą™ G) = P(F) + P(G) for independent events F and G. What's wrong with this approach? (2 steps)", "answer": "- Step 1: The formula P(A ‚ą™ B) = P(A) + P(B) - P(A ‚ą© B) applies universally, even for independent events.\n- Step 2: For independent events, P(A ‚ą© B) = P(A)P(B), so the correct formula is P(A ‚ą™ B) = P(A) + P(B) - P(A)P(B). The simple addition double-counts the overlap.\n\n**Takeaway:** Always subtract the intersection in the union formula ‚ÄĒ never use simple addition unless the events are mutually exclusive.", "source": "MiniMax ‚Ď†", "_id": "minimax_1_48", "judge_pick": false}], "count": 49}, "minimax_2": {"label": "MiniMax ‚Ď°", "cards": [{"question": "For a dataset of n = 33 observations, what are the positions (not values) of the median, Q‚āĀ, and Q‚āÉ using the Edexcel S1 convention? (1 step)", "answer": "- Median position: (n+1)/2 = 34/2 = 17th value\n- Q‚āĀ position: (n+1)/4 = 34/4 = 8.5th position (average of 8th and 9th)\n- Q‚āÉ position: 3(n+1)/4 = 3√ó34/4 = 25.5th position (average of 25th and 26th)", "source": "MiniMax ‚Ď°", "_id": "minimax_2_0", "judge_pick": false}, {"question": "In a Venn diagram with two events C (carrots) and O (onions), you are given P(C) = 0.65, P(O') = 0.3, and P(O ‚ą© C') = 0.15. Find all four region probabilities w, x, y, z where w = O only, x = O‚ą©C, y = C only, z = neither. (3 steps)", "answer": "- Step 1: P(O) = 1 - P(O') = 1 - 0.3 = 0.7. Given w = P(O ‚ą© C') = 0.15.\n- Step 2: Since O = w + x: x = 0.7 - 0.15 = 0.55\n- Step 3: Since C = x + y: y = 0.65 - 0.55 = 0.10. Total = 1, so z = 1 - (0.15 + 0.55 + 0.10) = 0.20\n\nw = 0.15, x = 0.55, y = 0.10, z = 0.20", "source": "MiniMax ‚Ď°", "_id": "minimax_2_1", "judge_pick": false}, {"question": "For a discrete random variable X with distribution P(X=1) = 1/10, P(X=2) = 1/5, P(X=3) = 3/10, P(X=4) = 2/5, calculate E(1/X). Show it equals 2/5. (3 steps)", "answer": "- Step 1: E(1/X) = ő£ (1/x) √ó P(X=x)\n- Step 2: = (1/1)(1/10) + (1/2)(1/5) + (1/3)(3/10) + (1/4)(2/5)\n- Step 3: = 1/10 + 1/10 + 1/10 + 1/10 = 4/10 = 2/5 ‚úď", "source": "MiniMax ‚Ď°", "_id": "minimax_2_2", "judge_pick": false}, {"question": "If X ~ N(210, 25¬≤), find P(X < 240). Show it equals 0.8849. (2 steps)", "answer": "- Step 1: Standardise: Z = (X - őľ)/ŌÉ = (240 - 210)/25 = 30/25 = 1.20\n- Step 2: P(X < 240) = P(Z < 1.20) = ő¶(1.20) = 0.8849 (from tables)", "source": "MiniMax ‚Ď°", "_id": "minimax_2_3", "judge_pick": false}, {"question": "You are given the two regression equations: y on x: y = 1.4x + 1.5, and x on y: x = 1.2 + 0.2y. Find their point of intersection. (3 steps)", "answer": "- Step 1: Substitute y = 1.4x + 1.5 into x = 1.2 + 0.2y\n- Step 2: x = 1.2 + 0.2(1.4x + 1.5) = 1.2 + 0.28x + 0.3 = 1.5 + 0.28x\n- Step 3: x - 0.28x = 1.5 ‚Üí 0.72x = 1.5 ‚Üí x = 25/12\n  Then y = 1.4(25/12) + 1.5 = 35/12 + 18/12 = 53/12\nIntersection = (25/12, 53/12)", "source": "MiniMax ‚Ď°", "_id": "minimax_2_4", "judge_pick": false}], "count": 5}, "opus_1": {"label": "Opus 4.7 ‚Ď†", "cards": [{"question": "In a conditional probability question on a tree diagram, what is the disciplined first move every time you see the word \"given\"? (3 steps)", "answer": "- Step 1: Write the formula $$P(A\\mid B) = \\frac{P(A\\cap B)}{P(B)}$$ at the top of the working before substituting any numbers ‚ÄĒ this forces you to identify two distinct events, not a single number.\n- Step 2: Identify $$B$$ (the conditioning event) and restrict the sample space to only the paths consistent with $$B$$. The denominator is the total probability of these paths.\n- Step 3: Identify the intersection $$A\\cap B$$ ‚ÄĒ the paths that satisfy BOTH conditions. The numerator is the sum of their probabilities, NOT the marginal $$P(A)$$.\n\nThe classic error: dividing $$P(A)$$ by $$P(B)$$ without checking that the numerator paths are all contained in $$B$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_0", "judge_pick": true}, {"question": "When does the intersection $$P(A\\cap B)$$ in a conditional probability collapse to just $$P(A)$$, and why? (2 steps)", "answer": "- Step 1: If $$A \\subseteq B$$ (event $$A$$ is a subset of event $$B$$), then every outcome in $$A$$ is automatically in $$B$$, so $$A\\cap B = A$$.\n- Step 2: Therefore $$P(A\\mid B) = \\frac{P(A)}{P(B)}$$ directly.\n\nExample: \"won first 2 games\" ($$WW$$) is a subset of \"won exactly 2 games\" ($$WW, WLW, LWW$$), so $$P(WW \\mid \\text{exactly 2 wins}) = \\frac{P(WW)}{P(\\text{exactly 2 wins})}$$ without computing an explicit intersection.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_1", "judge_pick": true}, {"question": "In Sally's game, she wins game 1 with probability 0.7, and after any win/loss her next-game win probabilities are 0.6 and 0.2. The turn stops at $$WW$$ or $$LL$$. Why is enumerating ALL terminal paths upfront the right strategy? (3 steps)", "answer": "- Step 1: Each terminal path corresponds to a mutually exclusive outcome of the turn, so listing them gives you the complete sample space partitioned into disjoint events.\n- Step 2: Every probability question on this tree (joint, marginal, conditional) is then just \"pick which paths qualify and sum their probabilities\" ‚ÄĒ no recomputation needed.\n- Step 3: You can sanity-check by verifying $$\\sum \\text{(path probabilities)} = 1$$, catching arithmetic errors before they propagate.\n\nThe six paths: $$WW=0.42$$, $$WLW=0.056$$, $$WLL=0.224$$, $$LWW=0.036$$, $$LWL=0.024$$, $$LL=0.24$$. Sum = 1. ‚úď", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_2", "judge_pick": false}, {"question": "In Sally's game, why is $$P(\\text{won 2 games}\\mid W_1) \\neq \\frac{0.512}{0.7}$$, even though 0.512 is the probability of exactly 2 wins? (3 steps)", "answer": "- Step 1: The denominator 0.7 = $$P(W_1)$$ is correct ‚ÄĒ we condition on winning the first game.\n- Step 2: But 0.512 includes the path $$LWW$$ (which has a LOSS on game 1). This path contradicts the conditioning event $$W_1$$, so it cannot appear in the numerator.\n- Step 3: The correct numerator is $$P(\\text{won 2} \\cap W_1) = P(WW) + P(WLW) = 0.42 + 0.056 = 0.476$$, giving $$\\frac{0.476}{0.7} = 0.68$$.\n\nKey insight: when conditioning, ALWAYS filter the numerator's events through the conditioning event first ‚ÄĒ don't grab a marginal probability.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_3", "judge_pick": true}, {"question": "For the same tree, find $$P(WW \\mid \\text{exactly 2 wins})$$ conceptually ‚ÄĒ what is the structural shortcut? (2 steps)", "answer": "- Step 1: Recognise $$WW \\subset \\{\\text{exactly 2 wins}\\}$$ ‚ÄĒ winning the first two games IS one way to get exactly 2 wins. So the intersection simplifies: $$WW \\cap \\{\\text{2 wins}\\} = WW$$.\n- Step 2: Therefore $$P(WW\\mid \\text{2 wins}) = \\frac{P(WW)}{P(\\text{2 wins})} = \\frac{0.42}{0.512} \\approx 0.82$$.\n\nThe numerator is just one path; the denominator sums three paths. No need to recompute an intersection.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_4", "judge_pick": false}, {"question": "For ungrouped/discrete data with $$n$$ values on the Edexcel S1 convention, where do the median and quartiles sit? (3 steps)", "answer": "- Step 1: Median is at position $$\\frac{n+1}{2}$$. If non-integer, average the two flanking values.\n- Step 2: $$Q_1$$ at position $$\\frac{n+1}{4}$$; $$Q_3$$ at position $$\\frac{3(n+1)}{4}$$.\n- Step 3: For $$n=33$$: median position 17 (a single value), $$Q_1$$ position 8.5 (average 8th and 9th), $$Q_3$$ position 25.5 (average 25th and 26th).\n\nThis is the Edexcel S1 rule ‚ÄĒ different boards (and IB) use different conventions, so stick to $$(n+1)/4$$ here.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_5", "judge_pick": false}, {"question": "State the outlier rule used in S1 box plots, and explain why fences are placed at exactly 1.5√óIQR. (2 steps)", "answer": "- Step 1: An outlier is any value above $$Q_3 + 1.5\\,\\text{IQR}$$ or below $$Q_1 - 1.5\\,\\text{IQR}$$, where $$\\text{IQR} = Q_3 - Q_1$$.\n- Step 2: The factor 1.5 is a Tukey convention ‚ÄĒ large enough that genuinely \"normal\" data rarely flags points, small enough to catch genuine extremes. For roughly normal data, fewer than 1% of points fall outside these fences.\n\nThe rule may also be given in the question ‚ÄĒ always read it carefully; some papers use 2√óIQR instead.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_6", "judge_pick": true}, {"question": "When drawing the box plot for the kangaroo data ($$Q_1=45$$, median 57, $$Q_3=63$$, IQR 18, outliers at 16 and 94), where do the whiskers terminate and why? (3 steps)", "answer": "- Step 1: Compute fences: upper $$= 63 + 27 = 90$$, lower $$= 45 - 27 = 18$$.\n- Step 2: Whiskers extend ONLY to the most extreme NON-outlier values within the fences. Smallest non-outlier $$= 23$$ (since 16 is below 18); largest non-outlier $$= 86$$ (since 94 is above 90).\n- Step 3: Outliers 16 and 94 are plotted separately as crosses or stars ‚ÄĒ they are NOT connected to the whiskers.\n\nCommon mistake: stretching whiskers all the way to the extreme outliers ‚ÄĒ this defeats the visual purpose of flagging them.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_7", "judge_pick": false}, {"question": "What is the rigid 3-sentence template required when \"comparing distributions in context\" on Edexcel S1? (3 steps)", "answer": "- Step 1: Sentence 1 ‚ÄĒ compare MEDIANS. State which is greater/less, with units, then interpret in context (e.g. \"on average heavier in December\").\n- Step 2: Sentence 2 ‚ÄĒ compare IQRs. State which is greater/less, with units, then interpret as consistency/variability (e.g. \"weights more consistent in December\").\n- Step 3: Stop. Three statements only. Do NOT add skewness, range, outlier count, or other commentary ‚ÄĒ these are not marked and may CANCEL a correct claim if you say something wrong.\n\nMr Fuat's rule: median + IQR + context. Anything else is wasted ink.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_8", "judge_pick": true}, {"question": "Why does mentioning skewness, range, or outliers in a \"compare two distributions\" answer potentially hurt your mark?", "answer": "The mark scheme rewards exactly two structural comparisons (location via median, spread via IQR) each paired with a contextual interpretation. Extra comparisons aren't given credit, but they EAT TIME and ‚ÄĒ crucially ‚ÄĒ if any extra claim is factually wrong (e.g. miscalling the skew), the examiner can cancel an otherwise correct adjacent claim. Discipline beats enthusiasm here: write three sentences and move on.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_9", "judge_pick": true}, {"question": "Distinguish \"mutually exclusive\" from \"independent\" ‚ÄĒ can two events be both? (3 steps)", "answer": "- Step 1: Mutually exclusive means $$P(A\\cap B) = 0$$ ‚ÄĒ the events cannot occur together.\n- Step 2: Independent means $$P(A\\cap B) = P(A)\\,P(B)$$ ‚ÄĒ knowing one occurred doesn't change the probability of the other.\n- Step 3: If $$P(A), P(B) > 0$$, then $$P(A)P(B) > 0$$, so $$P(A\\cap B)$$ cannot simultaneously equal 0 and a positive number. Hence two non-trivial events CANNOT be both mutually exclusive and independent.\n\nIntuition: mutually exclusive is the OPPOSITE of independent ‚ÄĒ knowing $$A$$ happened tells you $$B$$ definitely DIDN'T. That's maximum information transfer, not zero.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_10", "judge_pick": false}, {"question": "Given $$P(C) = 0.65$$, $$P(O') = 0.3$$, $$P(O\\cap C') = 0.15$$, conceptually walk through how to fill all four Venn regions ($$O$$-only, intersection, $$C$$-only, neither). (4 steps)", "answer": "- Step 1: $$O$$-only region = $$P(O\\cap C') = 0.15$$ ‚ÄĒ given directly.\n- Step 2: $$P(O) = 1 - P(O') = 0.7$$. The intersection = $$P(O) - P(O\\cap C') = 0.7 - 0.15 = 0.55$$.\n- Step 3: $$C$$-only region = $$P(C) - P(C\\cap O) = 0.65 - 0.55 = 0.10$$.\n- Step 4: \"Neither\" region = $$1 - (\\text{all three above}) = 1 - 0.80 = 0.20$$. Sanity check: all four regions sum to 1.\n\nConceptual frame: each given probability picks out a UNION of Venn regions; subtract overlaps you've already accounted for.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_11", "judge_pick": false}, {"question": "How do you formally show two events $$C$$ and $$O$$ are NOT independent, given the Venn? (3 steps)", "answer": "- Step 1: Compute $$P(C\\cap O)$$ directly from the intersection region (here 0.55).\n- Step 2: Compute the product $$P(C)\\cdot P(O) = 0.65 \\times 0.7 = 0.455$$.\n- Step 3: State both numerical values explicitly, observe $$0.55 \\neq 0.455$$, and conclude \"not independent\". Don't skip the numerical inequality ‚ÄĒ examiners want both sides shown.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_12", "judge_pick": true}, {"question": "$$F, H$$ mutually exclusive, $$F, G$$ independent, $$P(F)=\\frac{2}{7}$$, $$P(F\\cup G)=\\frac{5}{8}$$. Conceptually, how do you find $$P(G)$$? (4 steps)", "answer": "- Step 1: Write the union formula: $$P(F\\cup G) = P(F) + P(G) - P(F\\cap G)$$.\n- Step 2: Use independence to substitute $$P(F\\cap G) = P(F)\\,P(G) = \\frac{2}{7}P(G)$$. This turns the equation into a single unknown $$P(G)$$.\n- Step 3: Collect: $$P(F\\cup G) = P(F) + P(G)[1 - P(F)] = P(F) + P(G)\\,P(F')$$.\n- Step 4: Solve algebraically; the coefficient of $$P(G)$$ is $$P(F') = \\frac{5}{7}$$.\n\nThe key idea: independence is what lets you EXPRESS $$P(F\\cap G)$$ in terms of the unknown $$P(G)$$ ‚ÄĒ without it, you have one equation in two unknowns.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_13", "judge_pick": false}, {"question": "Why is $$P(F\\cap G') = P(F) - P(F\\cap G)$$, and what's the slick alternative under independence? (2 steps)", "answer": "- Step 1: Event $$F$$ splits cleanly into the disjoint parts \"$$F$$ AND $$G$$\" and \"$$F$$ AND NOT $$G$$\": $$P(F) = P(F\\cap G) + P(F\\cap G')$$. Rearranging gives the identity.\n- Step 2: Under independence of $$F, G$$, we also have independence of $$F, G'$$, so $$P(F\\cap G') = P(F)\\,P(G')$$. This avoids subtracting and can be computed in one line.\n\nBoth routes give the same answer ‚ÄĒ use whichever is faster given the numbers you already have.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_14", "judge_pick": true}, {"question": "For a discrete RV $$X$$ with given pmf, how do you compute $$E(g(X))$$, and why is no calculus required? (2 steps)", "answer": "- Step 1: $$E(g(X)) = \\sum_{x} g(x)\\,P(X=x)$$ ‚ÄĒ sum over every value $$x$$ in the support, weighting $$g(x)$$ by its probability.\n- Step 2: $$X$$ is discrete with finitely many outcomes, so the expectation is a finite weighted sum. The \"transform\" $$g$$ acts on values, not on the probability mass ‚ÄĒ the probabilities stay the same.\n\nExample: $$E(1/X) = \\sum \\frac{1}{x}P(X=x)$$. Just plug in.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_15", "judge_pick": false}, {"question": "Given $$X$$ takes values 1, 2, 3, 4 with probabilities $$\\tfrac{1}{10}, \\tfrac{2}{10}, \\tfrac{3}{10}, \\tfrac{4}{10}$$, why does $$E(1/X)$$ happen to equal $$\\tfrac{2}{5}$$ with clean fractions? (3 steps)", "answer": "- Step 1: Each term $$\\frac{1}{x}\\cdot \\frac{x}{10}$$ simplifies to $$\\frac{1}{10}$$ because the numerator $$\\frac{1}{x}$$ and the probability $$\\frac{x}{10}$$ have $$x$$ cancelling.\n- Step 2: Four equal terms of $$\\frac{1}{10}$$ sum to $$\\frac{4}{10} = \\frac{2}{5}$$.\n- Step 3: This cancellation is a coincidence of the chosen probabilities $$P(X=x) = x/10$$; with any other distribution the arithmetic would be messier.\n\nA nice sanity-check pattern to spot: when $$P(X=x) \\propto x$$, $$E(1/X)$$ becomes a constant divided by $$n$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_16", "judge_pick": false}, {"question": "State the variance identity used to compute $$\\text{Var}(1/X)$$, and the order of operations to avoid sign errors. (3 steps)", "answer": "- Step 1: $$\\text{Var}(Y) = E(Y^2) - [E(Y)]^2$$, where $$Y = 1/X$$. So you need both $$E(1/X)$$ and $$E(1/X^2)$$.\n- Step 2: $$E(1/X^2) = \\sum \\frac{1}{x^2}P(X=x)$$ ‚ÄĒ a fresh sum, NOT obtained by squaring $$E(1/X)$$.\n- Step 3: Subtract $$[E(1/X)]^2$$ at the very end. Keep both quantities as fractions until the final subtraction to avoid rounding errors.\n\nA common slip is to think $$\\text{Var}(1/X) = 1/\\text{Var}(X)$$ ‚ÄĒ completely wrong.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_17", "judge_pick": false}, {"question": "Why is $$\\text{Var}(aX) = a^2\\,\\text{Var}(X)$$, not $$a\\,\\text{Var}(X)$$? Build the intuition. (3 steps)", "answer": "- Step 1: Variance measures squared deviation from the mean: $$\\text{Var}(X) = E[(X-\\mu)^2]$$.\n- Step 2: Multiplying $$X$$ by $$a$$ multiplies every deviation $$X - \\mu$$ by $$a$$. The SQUARED deviation is therefore multiplied by $$a^2$$.\n- Step 3: Hence $$\\text{Var}(aX) = a^2\\text{Var}(X)$$. Adding a constant $$b$$ doesn't change deviations at all, so $$\\text{Var}(aX+b) = a^2\\text{Var}(X)$$.\n\nIntuition check: doubling all values doubles the standard deviation (a linear measure of spread) but quadruples the variance.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_18", "judge_pick": true}, {"question": "For $$Y = 30/X$$, why can you compute $$E(Y)$$ and $$\\text{Var}(Y)$$ instantly from $$E(1/X)$$ and $$\\text{Var}(1/X)$$? (2 steps)", "answer": "- Step 1: $$Y = 30 \\cdot (1/X)$$ is a linear function of the random variable $$1/X$$. Apply the scaling rules: $$E(Y) = 30 E(1/X)$$, $$\\text{Var}(Y) = 30^2 \\text{Var}(1/X) = 900\\,\\text{Var}(1/X)$$.\n- Step 2: With $$E(1/X) = 2/5$$ and $$\\text{Var}(1/X) = 29/600$$: $$E(Y) = 12$$ and $$\\text{Var}(Y) = 900 \\cdot 29/600 = 43.5$$.\n\nLesson: any \"fresh\" variable that's a scalar multiple of one you've already analysed is a one-line problem.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_19", "judge_pick": false}, {"question": "Why is it WRONG to compute $$P(X<3 \\mid Y<20)$$ by treating $$X$$ and $$Y = 30/X$$ as independent? What's the correct mental model? (3 steps)", "answer": "- Step 1: $$Y$$ is a deterministic function of $$X$$, so $$X$$ and $$Y$$ are PERFECTLY dependent. There is no joint distribution beyond what $$X$$ already specifies.\n- Step 2: Translate the condition on $$Y$$ into a condition on $$X$$ directly: $$Y < 20 \\iff 30/X < 20 \\iff X > 1.5 \\iff X \\in \\{2,3,4\\}$$ (since $$X>0$$).\n- Step 3: Now both events $$\\{X<3\\}$$ and $$\\{Y<20\\}$$ are subsets of the support of $$X$$, and the conditional probability is just $$\\frac{P(\\{X<3\\} \\cap \\{X\\in\\{2,3,4\\}\\})}{P(X\\in\\{2,3,4\\})}$$.\n\nGeneral principle: when the conditioning event is a function of another random variable, REWRITE it as a condition on that underlying variable first.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_20", "judge_pick": false}, {"question": "Caution when translating $$30/X < 20$$ into a condition on $$X$$ ‚ÄĒ what's the trap? (2 steps)", "answer": "- Step 1: Dividing both sides by $$X$$ would normally flip the inequality if $$X<0$$. So check: is $$X>0$$ on its suppor
