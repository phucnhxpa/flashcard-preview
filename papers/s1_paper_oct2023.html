n 2} \\cap W_1)$$: only $$WW$$ (0.42) and $$WLW$$ (0.056) qualify ‚ÄĒ NOT $$LWW$$ (0.036). So numerator $$= 0.42 + 0.056 = 0.476$$, and $$P(\\text{won 2} \\mid W_1) = 0.476 / 0.7 = 0.68$$.\n\n+ If $$A \\subseteq B$$, then $$P(A \\cap B) = P(A)$$ and the formula simplifies to $$P(A \\mid B) = P(A)/P(B)$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_4"}, {"question": "To find $$\\text{Var}\\!\\left(\\frac{1}{X}\\right)$$ for a discrete random variable, what two expectations must you calculate, and how do they combine? (3 steps)", "answer": "- Step 1: Compute the first moment of the transformed variable: $$\\mathbb{E}\\!\\left(\\frac{1}{X}\\right) = \\sum \\frac{1}{x}P(X=x)$$.\n- Step 2: Compute the second moment: $$\\mathbb{E}\\!\\left(\\frac{1}{X^2}\\right) = \\sum \\frac{1}{x^2}P(X=x)$$.\n- Step 3: Apply the variance identity: $$\\text{Var}\\!\\left(\\frac{1}{X}\\right) = \\mathbb{E}\\!\\left(\\frac{1}{X^2}\\right) - \\left[\\mathbb{E}\\!\\left(\\frac{1}{X}\\right)\\right]^2$$. The algebraic structure is identical to $$\\text{Var}(X) = \\mathbb{E}(X^2) - [\\mathbb{E}(X)]^2$$; only the input to the expectation changes.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_13"}, {"question": "For $$P(A \\mid B)$$, if $$A \\subseteq B$$ (every outcome in $$A$$ is also in $$B$$), what simplification occurs in the formula, and why? Apply this to: $$P(WW \\mid \\text{exactly 2 wins})$$ where $$WW$$ means \"won the first 2 games.\" (2 steps)", "answer": "- Step 1: If $$A \\subseteq B$$, then $$A \\cap B = A$$ (the intersection of a set with its superset is the smaller set). So $$P(A \\cap B) = P(A)$$, and the formula simplifies to $$P(A \\mid B) = P(A) / P(B)$$.\n- Step 2: Here, $$A = WW$$ and $$B = \\{\\text{exactly 2 wins}\\} = \\{WW, WLW, LWW\\}$$. Since $$WW$$ is one of the paths in \"exactly 2 wins,\" we have $$A \\subseteq B$$. Therefore $$P(WW \\mid \\text{exactly 2 wins}) = P(WW) / P(\\text{exactly 2 wins}) = 0.42 / 0.512 = 105/128 \\approx 0.820$$.\n\nThe subset check is powerful: if the conditioning event already guarantees the numerator event could have occurred, the intersection collapses.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_5"}, {"question": "Why does the Edexcel mark scheme only reward median and IQR comparisons, not range or skewness? (2 steps)", "answer": "- Step 1: The median and IQR are **resistant statistics** ‚ÄĒ they are not affected by outliers or extreme values. The range is not resistant (a single outlier can dramatically change it), and skewness requires a more nuanced judgement that is harder to mark consistently across thousands of scripts.\n- Step 2: The mark scheme rewards comparisons that are both meaningful and unambiguous. \"The IQR of December is less than the IQR of February\" is a clear, checkable statement. \"The December distribution is positively skewed\" requires more analysis and is harder to award partial credit for.\n\n+ If the question specifically asks for a skewness comparison, include it. But for generic \"compare the distributions\" questions, stick to the median + IQR template.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_13"}, {"question": "Why does \"increasing IQR\" translate to \"less consistent\" in a comparison context? (2 steps)", "answer": "- Step 1: IQR measures the spread of the middle 50% of the data. A LARGER IQR means the central values are more spread out.\n- Step 2: \"More spread out\" = \"more variable\" = \"less consistent\" ‚ÄĒ in context, this might mean kangaroo weights vary more between individuals, or test scores are more diverse, etc.\n\nAlways convert numerical comparisons into a CONTEXT sentence that uses the variable name and is meaningful to a reader unfamiliar with statistical jargon.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_45"}, {"question": "In Sally's game, a turn stops early if she wins the first 2 games or loses the first 2 games. Why does this stopping rule mean that some paths have only 2 games while others have 3, and what goes wrong if you draw the tree as if every path always has 3 games? (3 steps)", "answer": "- Step 1: The stopping rule creates *asymmetric* path lengths. After WW (two wins), the turn ends ‚ÄĒ there is no third game. After LL (two losses), the turn also ends. Only after WL or LW does a third game occur. So the complete set of paths is: WW, WLW, WLL, LWW, LWL, LL ‚ÄĒ six paths, not eight.\n- Step 2: If you incorrectly draw the tree as if every path has 3 games, you would add branches WW W and WW L (i.e. a third game after WW). These would carry non-zero probabilities and inflate the total probability beyond 1, violating the axiom that all mutually exclusive, exhaustive outcomes must sum to 1.\n+ For example, if you added a \"WW‚ÜíW\" branch with probability 0.6, that path alone would contribute $$0.42 \\times 0.6 = 0.252$$, which is probability mass that should not exist.\n- Step 3: The verification check is always: sum all final-path probabilities. Here $$0.42 + 0.056 + 0.224 + 0.036 + 0.024 + 0.24 = 1.000$$. If you drew extra branches after WW or LL, the sum would exceed 1, immediately signalling an error.\n\nTakeaway: Stopping rules truncate the tree. After a stopping condition is met, no further branches exist.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_1"}, {"question": "When computing $$\\text{Var}(Y) = 900 \\times \\frac{29}{600}$$, what is the conceptual cancellation strategy, and why is reducing before multiplying preferable to decimal conversion? (2 steps)", "answer": "- Step 1: Factor the numerator and denominator: $$900 = 9 \\times 100$$ and $$600 = 6 \\times 100$$, so the $$100$$s cancel, leaving $$9 \\times 29 / 6 = 3 \\times 29 / 2 = 87/2$$.\n- Step 2: Converting $$29/600$$ to a decimal early yields a truncated value; multiplying by $$900$$ then compounds the truncation error, often giving $$43.499$$ instead of the exact $$43.5$$.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_38"}, {"question": "Explain why the event ‚ÄúBob buys carrots or onions but not both‚ÄĚ corresponds to the symmetric difference $$C \\triangle O$$, and express this probability in terms of the Venn regions $$w$$, $$x$$, $$y$$, and $$z$$. (2 steps)", "answer": "- Step 1: ‚Äú$$C$$ or $$O$$ but not both‚ÄĚ means the outcome lies in exactly one of the two sets, excluding the intersection. In set notation this is $$(C \\cup O) \\setminus (C \\cap O)$$, also written $$C \\triangle O$$.\n- Step 2: In the Venn diagram, region $$w$$ is only $$O$$, region $$y$$ is only $$C$$, and region $$x$$ is both. Therefore the symmetric difference is the disjoint union of $$w$$ and $$y$$, giving\n$$P(C \\triangle O) = w + y.$$", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_36"}, {"question": "For a tree diagram with stopping conditions, what is the two-level consistency check you should perform before trusting any conditional probability answer? (2 steps)", "answer": "- Step 1: At every internal node, verify that the branch probabilities sum to exactly 1; for example, after a win the next win/loss probabilities $$0.6$$ and $$0.4$$ must total 1.\n- Step 2: Globally, add the probabilities of all distinct terminal paths and confirm the total equals 1. If the sum is not 1, a path is missing or a stopping rule has been mishandled.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_3"}, {"question": "In part (d) of Sally's game, the question asks: \"Given that Sally wins 2 games, find the probability she won the first 2.\" Here, \"won the first 2\" means the path WW. Since WW is a subset of \"exactly 2 wins,\" what simplification does this allow in the conditional probability formula? (2 steps)", "answer": "- Step 1: The general formula gives $$P(WW \\mid \\text{exactly 2 wins}) = \\frac{P(WW \\cap \\text{exactly 2 wins})}{P(\\text{exactly 2 wins})}$$. But WW is itself a path with exactly 2 wins ‚ÄĒ if you won the first 2 games and the turn stopped, you necessarily won exactly 2 games. So $$WW \\subseteq \\{\\text{exactly 2 wins}\\}$$.\n- Step 2: When $$A \\subseteq B$$, the intersection $$A \\cap B$$ collapses to just $$A$$. Therefore $$P(WW \\cap \\text{exactly 2 wins}) = P(WW) = 0.42$$, and the answer is $$\\frac{0.42}{0.512} = \\frac{105}{128} \\approx 0.820$$.\n\nTakeaway: If event $$A$$ is a subset of event $$B$$, then $$P(A \\mid B) = P(A)/P(B)$$ ‚ÄĒ no need to compute the intersection separately.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_5"}, {"question": "For $$P(F \\cap G')$$, two methods are available: (i) $$P(F) - P(F \\cap G)$$ and (ii) $$P(F) \\cdot P(G')$$ using independence. When is each method applicable, and what goes wrong if you use method (ii) without independence? (2 steps)", "answer": "- Step 1: Method (i) $$P(F \\cap G') = P(F) - P(F \\cap G)$$ is *always* valid, regardless of whether $$F$$ and $$G$$ are independent. It follows from the partition $$F = (F \\cap G) \\cup (F \\cap G')$$. Method (ii) $$P(F) \\cdot P(G')$$ is valid *only* when $$F$$ and $$G$$ are independent (which also makes $$F$$ and $$G'$$ independent).\n- Step 2: If $$F$$ and $$G$$ are *not* independent, then $$P(F \\cap G') \\neq P(F) \\cdot P(G')$$. For example, if $$P(F) = 0.5$$, $$P(G) = 0.5$$, $$P(F \\cap G) = 0.3$$ (not independent since $$0.3 \\neq 0.25$$), then $$P(F \\cap G') = 0.5 - 0.3 = 0.2$$, but $$P(F) \\cdot P(G') = 0.5 \\times 0.5 = 0.25 \\neq 0.2$$.\n\nThe safe default: always use method (i). Use method (ii) only when independence is explicitly given or proven, and even then, method (i) serves as a check.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_48"}, {"question": "The regression line $$y$$ on $$x$$ is $$y = 1.4x + 1.5$$. Explain how you can recover $$S_{xx}$$ from $$S_{xy}$$ and $$b_{yx}$$ as a verification step, and compute its value given $$S_{xy} = 5.6$$. (2 steps)", "answer": "- Step 1: By definition $$b_{yx} = \\frac{S_{xy}}{S_{xx}}$$. Rearranging gives $$S_{xx} = \\frac{S_{xy}}{b_{yx}}$$. This is useful when you want to check internal consistency after finding $$S_{xy}$$ by another route.\n- Step 2: Substituting the known values:\n$$S_{xx} = \\frac{5.6}{1.4} = 4.$$\nSimilarly, from $$b_{xy} = 0.2$$ you obtain $$S_{yy} = \\frac{5.6}{0.2} = 28$$, which lets you verify $$r$$ via the standard formula if desired.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_39"}, {"question": "In a tree diagram, what must be true about the probabilities on all branches leaving any single node? (2 steps)", "answer": "- Step 1: At every splitting point (node) in a tree diagram, the probabilities on all branches leaving that node must sum to $$1$$. This is because the branches represent mutually exclusive outcomes that exhaust all possibilities at that stage of the experiment.\n- Step 2: This serves as a local check at every node. For example, after a win ($$W$$), if $$P(\\text{next win} \\mid W) = 0.6$$, then $$P(\\text{next loss} \\mid W) = 1 - 0.6 = 0.4$$. If branches at any node fail to sum to $$1$$, you have a branch-probability error that will cascade through all downstream calculations.\n\n+ Global check: the sum of ALL complete-path probabilities must also equal $$1$$. If it doesn't, at least one branch probability or path is wrong.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_0"}, {"question": "In a tree diagram, every splitting point must have branch probabilities summing to 1. If you find that the two branches from a node sum to 0.9, what has gone wrong, and why is this check essential? (2 steps)", "answer": "- Step 1: At any splitting point, the branches represent mutually exclusive and exhaustive outcomes of the next event, conditioned on the path so far. By the axioms of probability, these must sum to 1. A sum of 0.9 means either a branch probability was misread from the question, or a conditional probability was used in the wrong context (e.g., using 0.6 after a loss instead of 0.2).\n- Step 2: This check is essential because it catches errors *locally* at each node, before they propagate through the rest of the tree. If a single branch probability is wrong, every downstream path probability will be wrong, and the final sum of all path probabilities will not equal 1.\n\nTakeaway: Check that branches sum to 1 at every node, and check that all final path probabilities sum to 1. Both are necessary conditions for a correct tree.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_46"}, {"question": "Why must you check the sign of $$X$$ when translating $$Y < c$$ for $$Y = k/X$$?", "answer": "Dividing by a variable flips inequalities when that variable is negative. If $$X > 0$$ always (e.g. takes values $$\\{1,2,3,4\\}$$), then $$k/X < c \\iff X > k/c$$ (for $$k, c > 0$$). But if $$X$$ could be negative, the inequality direction would depend on sign ‚ÄĒ you'd need to split into cases. Always state the sign assumption explicitly.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_19"}, {"question": "Given $$P(C) = 0.65$$, $$P(O') = 0.3$$, and $$P(O \\cap C') = 0.15$$ for two events, explain how to find the intersection probability $$P(C \\cap O)$$ by reasoning about the partition of event $$O$$ into two disjoint regions. (3 steps)", "answer": "- Step 1: First recover $$P(O) = 1 - P(O') = 1 - 0.3 = 0.7$$.\n- Step 2: Event $$O$$ is partitioned into two disjoint pieces: $$O \\cap C'$$ (only $$O$$, value $$0.15$$) and $$O \\cap C$$ (the intersection, region $$x$$). Because they are disjoint,\n$$P(O) = P(O \\cap C') + P(O \\cap C).$$\n- Step 3: Substitute and solve:\n$$0.7 = 0.15 + x \\implies x = 0.55.$$\nThus $$P(C \\cap O) = 0.55$$.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_10"}, {"question": "In Sally's game, why is $$P(\\text{won 2 games}\\mid W_1) \\neq \\frac{0.512}{0.7}$$, even though 0.512 is the probability of exactly 2 wins? (3 steps)", "answer": "- Step 1: The denominator 0.7 = $$P(W_1)$$ is correct ‚ÄĒ we condition on winning the first game.\n- Step 2: But 0.512 includes the path $$LWW$$ (which has a LOSS on game 1). This path contradicts the conditioning event $$W_1$$, so it cannot appear in the numerator.\n- Step 3: The correct numerator is $$P(\\text{won 2} \\cap W_1) = P(WW) + P(WLW) = 0.42 + 0.056 = 0.476$$, giving $$\\frac{0.476}{0.7} = 0.68$$.\n\nKey insight: when conditioning, ALWAYS filter the numerator's events through the conditioning event first ‚ÄĒ don't grab a marginal probability.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_3"}, {"question": "If $$Y = \\frac{30}{X}$$, how do the scaling laws let you obtain $$\\mathbb{E}(Y)$$ and $$\\text{Var}(Y)$$ from $$\\mathbb{E}\\!\\left(\\frac{1}{X}\\right)$$ and $$\\text{Var}\\!\\left(\\frac{1}{X}\\right)$$? Why does variance scale by $$30^2$$ while expectation scales by $$30$$? (3 steps)", "answer": "- Step 1: Expectation is linear, so $$\\mathbb{E}(aZ) = a\\mathbb{E}(Z)$$; thus $$\\mathbb{E}(Y) = 30 \\cdot \\mathbb{E}(1/X)$$.\n- Step 2: Variance measures squared spread. Multiplying a variable by $$30$$ stretches its deviations by $$30$$, so squared deviations grow by $$30^2 = 900$$.\n- Step 3: Therefore $$\\text{Var}(Y) = 30^2 \\cdot \\text{Var}(1/X) = 900 \\cdot \\text{Var}(1/X)$$. A shift $$+b$$ would affect the mean but not the variance, so there is no linear offset inside the variance.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_14"}, {"question": "Define $$S_{xy}$$ in the form $$\\sum xy - n\\bar{x}\\bar{y}$$, and explain why this quantity measures the **co-variation** between $$x$$ and $$y$$. If $$\\sum xy = \\frac{6961}{60}$$, $$n = 12$$, $$\\bar{x} = \\frac{25}{12}$$, and $$\\bar{y} = \\frac{53}{12}$$, outline the arithmetic strategy to keep the calculation exact without premature rounding. (3 steps)", "answer": "- Step 1: $$S_{xy}$$ captures how $$x$$ and $$y$$ vary together by comparing the actual sum of products $$\\sum xy$$ against the product of sums $$n\\bar{x}\\bar{y} = \\frac{(\\sum x)(\\sum y)}{n}$$ that would be expected if $$x$$ and $$y$$ were uncorrelated.\n- Step 2: Compute $$n\\bar{x}\\bar{y}$$ as a single fraction:\n$$12 \\cdot \\frac{25}{12} \\cdot \\frac{53}{12} = \\frac{25 \\cdot 53}{12} = \\frac{1325}{12}.$$\nConvert to the denominator of $$\\sum xy$$, which is $$60$$:\n$$\\frac{1325}{12} = \\frac{6625}{60}.$$\n- Step 3: Subtract:\n$$S_{xy} = \\frac{6961}{60} - \\frac{6625}{60} = \\frac{336}{60} = \\frac{28}{5} = 5.6.$$\nKeeping everything fractional until the final division prevents rounding error propagation.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_23"}, {"question": "Why is $$0 \\leq r^2 \\leq 1$$, and what does this imply for the product $$b_{yx}\\cdot b_{xy}$$? (2 steps)", "answer": "- Step 1: $$r$$ is a correlation between $$-1$$ and $$+1$$, so $$r^2 \\in [0,1]$$.\n- Step 2: Since $$r^2 = b_{yx}\\cdot b_{xy}$$, the product of the two slopes is bounded above by 1. If you ever compute slopes with product $$>1$$ (e.g. $$2 \\times 0.7$$), there's an arithmetic error somewhere.\n\nQuick sanity check: when both regression lines are given, multiply the slopes and confirm the product is in $$[0,1]$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_34"}, {"question": "Sketch the conceptual structure: given $$Y = 30/X$$, why does \"$$P(Y<20)$$\" collapse to a question about $$X$$? (3 steps)", "answer": "- Step 1: $$Y$$ is determined by $$X$$ ‚ÄĒ no extra randomness. So the event \"$$Y<20$$\" is a subset of the sample space of $$X$$, namely the $$x$$-values for which $$30/x < 20$$.\n- Step 2: Solve the inequality: $$30/x < 20 \\iff x > 1.5$$ (for positive $$x$$). So $$\\{Y<20\\} = \\{X\\in\\{2,3,4\\}\\}$$.\n- Step 3: All probabilities about $$Y$$ can now be re-expressed as probabilities about $$X$$, using the original pmf.\n\nMantra: when $$Y = g(X)$$, every probability statement about $$Y$$ is secretly a statement about $$X$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_40"}, {"question": "Edge case: what happens to $$r^2 = b_{yx} \\cdot b_{xy}$$ when $$r = 1$$ (perfect correlation)? What do the two regression lines look like? (2 steps)", "answer": "- Step 1: If $$r = 1$$, then $$r^2 = 1$$, so $$b_{yx} \\cdot b_{xy} = 1$$. Since $$b_{yx} = r \\sigma_y / \\sigma_x$$ and $$b_{xy} = r \\sigma_x / \\sigma_y$$, when $$r = 1$$ we get $$b_{yx} = \\sigma_y/\\sigma_x$$ and $$b_{xy} = \\sigma_x/\\sigma_y$$, and their product is indeed 1.\n- Step 2: The two regression lines coincide ‚ÄĒ they are the same line. Every data point lies on this line, so predicting $$y$$ from $$x$$ and predicting $$x$$ from $$y$$ give the same line. There is no distinction between the two regressions because there is no scatter around the line.\n\nWhen $$r = 0$$, both slopes are 0 and the regression lines are horizontal/vertical through the means ‚ÄĒ no predictive power in either direction. The product $$b_{yx} \\cdot b_{xy} = 0$$ confirms $$r = 0$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_58"}, {"question": "Given $$\\sum xy$$, $$n$$, and the intersection point of the two regression lines, what is the formula for $$S_{xy}$$ and why must you use the exact fractional means rather than decimal approximations? (3 steps)", "answer": "- Step 1: $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$. This form plugs directly from the intersection coordinates found in the previous part.\n- Step 2: Using $$\\bar{x} = \\frac{25}{12}$$ and $$\\bar{y} = \\frac{53}{12}$$ keeps the arithmetic exact; the product $$\\bar{x}\\bar{y} = \\frac{1325}{144}$$.\n- Step 3: Converting to decimals like $$2.083$$ and $$4.417$$ introduces rounding error that can shift $$S_{xy}$$ by tenths, destroying subsequent calculations for $$r$$ that depend on its exact value.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_22"}, {"question": "When an S1 exam asks you to compare two distributions in context, what is the minimum required three-sentence structure, and why should additional claims about skewness or range be omitted? (3 steps)", "answer": "- Step 1: Compare central tendency using the median: state whether one median is greater or less than the other, and interpret in context with units (e.g., \"kangaroos are heavier in December on average\").\n- Step 2: Compare spread using the IQR: state which is larger, and interpret as consistency or variability (e.g., \"December weights are more consistent\").\n- Step 3: Extra commentary on skewness or range is ignored by the mark scheme and risks a wrong claim cancelling a correct one; the median and IQR comparisons alone are sufficient because they are robust and directly interpretable in the S1 template.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_7"}, {"question": "When a question asks for a probability \"given that\" an event $$B$$ occurred, what is the precise formula, and why must the numerator always be $$P(A \\cap B)$$ rather than the marginal $$P(A)$$? (3 steps)", "answer": "- Step 1: The definition is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. This measures what fraction of $$B$$‚Äôs probability mass also lies inside $$A$$.\n- Step 2: Using $$P(A)$$ in the numerator is wrong because $$P(A)$$ includes outcomes that fall outside $$B$$; once we condition on $$B$$, those contradictory outcomes are impossible and must be excluded.\n- Step 3: Therefore the numerator must intersect $$A$$ with $$B$$. Only if $$A \\subseteq B$$ does $$P(A \\cap B)$$ simplify to $$P(A)$$; otherwise the intersection is strictly smaller than $$P(A)$$.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_1"}, {"question": "Starting from the regression equation $$y$$ on $$x$$: $$y = a + bx$$, show why substituting $$x = \\bar{x}$$ must yield $$y = \\bar{y}$$, and what this implies about the least-squares construction. (3 steps)", "answer": "- Step 1: The least-squares derivation minimizes $$\\sum (y_i - a - bx_i)^2$$; taking partial derivatives with respect to $$a$$ and $$b$$ and setting them to zero yields the normal equations.\n- Step 2: One normal equation simplifies to $$\\sum y_i = na + b\\sum x_i$$; dividing by $$n$$ gives $$\\bar{y} = a + b\\bar{x}$$.\n- Step 3: Therefore the point $$(\\bar{x}, \\bar{y})$$ satisfies the fitted line exactly; it is the anchor through which the line of best fit always passes, regardless of the correlation strength.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_34"}, {"question": "When a quartile position is a half-integer (e.g., 8.5th value), what exactly do you compute, and what does the 0.5 signify? (2 steps)", "answer": "- Step 1: A position of 8.5 means the quartile falls halfway between the 8th and 9th data values (when sorted). You compute the average: $$Q_1 = \\dfrac{x_8 + x_9}{2}$$. The 0.5 signifies that the \"true\" quartile lies between two data points, and linear interpolation (averaging) is the Edexcel convention.\n- Step 2: When the flanking values are equal, the average is trivially that value ‚ÄĒ but you must still show the averaging step for method marks. For example, if $$x_8 = 45$$ and $$x_9 = 45$$, then $$Q_1 = (45+45)/2 = 45$$.\n\n+ If the position were 8.25, you'd interpolate: $$Q_1 = x_8 + 0.25(x_9 - x_8)$$. But in S1 exams, positions are almost always integer or half-integer.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_9"}, {"question": "A student finds $$\\text{Var}(3X)$$ by computing $$3 \\times \\text{Var}(X)$$. What's wrong and what should they have done? (2 steps)", "answer": "- Step 1: The correct formula is $$\\text{Var}(aX) = a^2 \\text{Var}(X)$$, not $$a \\cdot \\text{Var}(X)$$. So $$\\text{Var}(3X) = 9 \\cdot \\text{Var}(X)$$, not $$3 \\cdot \\text{Var}(X)$$.\n- Step 2: Why the square? If you triple all values, the deviations from the mean also triple, and squaring them gives 9 times the original squared deviations. Formally: $$\\text{Var}(aX) = E[(aX)^2] - [E(aX)]^2 = a^2 E(X^2) - a^2[E(X)]^2 = a^2[E(X^2) - [E(X)]^2] = a^2 \\text{Var}(X)$$.\n\n+ Note: adding a constant doesn't affect variance: $$\\text{Var}(X + b) = \\text{Var}(X)$$. Shifting doesn't change spread.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_29"}, {"question": "When the question says \"Given that $$5\\%$$ of the fruit weigh less than 152 g,\" you need $$\\Phi^{-1}(0.05)$$. The table gives $$\\Phi(z)$$ for positive $$z$$. How do you find the negative $$z$$-value corresponding to a left-tail probability less than 0.5? (2 steps)", "answer": "- Step 1: For $$P(Z < z) = 0.05$$, we need $$z < 0$$. By symmetry, $$P(Z < z) = 0.05$$ is equivalent to $$P(Z > -z) = 0.05$$, i.e., $$P(Z < -z) = 0.95$$. So look up $$\\Phi^{-1}(0.95) = 1.6449$$, and the desired $$z = -1.6449$$.\n- Step 2: The general rule: for a left-tail probability $$p < 0.5$$, compute $$1 - p > 0.5$$, look up $$\\Phi^{-1}(1 - p)$$, and negate it. This gives the negative $$z$$-value. For $$p > 0.5$$, look up $$\\Phi^{-1}(p)$$ directly ‚ÄĒ it is positive.\n\nAlways sketch: the 5th percentile is to the left of the mean, so $$z$$ must be negative. If your calculation gives a positive $$z$$ for a left-tail probability below 0.5, you have made an error.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_42"}, {"question": "A student computes $$P(A \\mid B)$$ by dividing the marginal $$P(A)$$ by $$P(B)$$. Under what specific condition is this correct, and why is it generally wrong? (2 steps)", "answer": "- Step 1: This is correct only when $$A \\subseteq B$$ (event $$A$$ is a subset of event $$B$$). In that case, $$P(A \\cap B) = P(A)$$, so $$P(A \\mid B) = P(A \\cap B)/P(B) = P(A)/P(B)$$. For example, $$P(WW \\mid \\text{exactly 2 wins}) = P(WW)/P(\\text{exactly 2 wins})$$ because $$WW$$ is one of the ways to get exactly 2 wins.\n- Step 2: In general, $$P(A \\cap B) \\leq P(A)$$, with equality only when $$A \\subseteq B$$. Dividing $$P(A)$$ by $$P(B)$$ overcounts ‚ÄĒ it includes outcomes in $$A$$ that are NOT in $$B$$. For example, $$P(\\text{exactly 2 wins} \\mid W_1) \\neq P(\\text{exactly 2 wins})/P(W_1)$$ because \"exactly 2 wins\" includes $$LWW$$, which is not in $$W_1$$.\n\n+ The error is treating $$P(A)$$ and $$P(A \\cap B)$$ as the same thing. They differ precisely by the outcomes in $$A$$ that lie outside $$B$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_5"}, {"question": "A discrete random variable $$X$$ has support $$\\{1,2,3,4\\}$$ and $$Y = 30/X$$. The condition $$Y < 20$$ is required. Walk through the inequality manipulation carefully, paying attention to the direction of the inequality, and state the qualifying values of $$X$$. (2 steps)", "answer": "- Step 1: Start with $$\\frac{30}{X} < 20$$. Because $$X$$ is strictly positive ($$1,2,3,4$$), multiplying both sides by $$X$$ preserves the inequality direction:\n$$30 < 20X \\implies X > \\frac{30}{20} = 1.5.$$\n- Step 2: Since $$X$$ is discrete and integer-valued, the inequality $$X > 1.5$$ is satisfied precisely by $$X \\in \\{2, 3, 4\\}$$. The value $$X=1$$ is excluded because $$\\frac{30}{1} = 30 \\not< 20$$.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_35"}, {"question": "When finding a weight $$w$$ such that $$P(X < w) = 0.15$$ for a normal distribution, why must the $$z$$-value be negative, and what logical contradiction arises if you use the positive magnitude from the table directly? (2 steps)", "answer": "- Step 1: A cumulative probability of $$0.15$$ is less than $$0.5$$, so $$w$$ lies below the mean $$\\mu$$, requiring a negative $$z$$-score.\n- Step 2: If you used $$z = +1.0364$$ (the positive value for $$\\Phi = 0.85$$), you would place $$w$$ above the mean, calculating a weight heavier than average for the \"lightest $$15\\%$$\" ‚ÄĒ a logical contradiction that loses both method and accuracy marks.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_18"}, {"question": "In Sally's game, the rule states: \"If she wins the first 2 games or loses the first 2 games, then she will not play the 3rd game.\" What does this mean for the structure of the tree diagram ‚ÄĒ which paths simply do not exist? (2 steps)", "answer": "- Step 1: The stopping rule eliminates branches after a decisive outcome. After $$W_1 W_2$$, the turn ends ‚ÄĒ there is no third-game node. Similarly, after $$L_1 L_2$$, the turn ends. These are \"absorbing\" states: the process halts.\n- Step 2: The only paths that reach a third game are $$W_1 L_2$$ and $$L_1 W_2$$. After $$W_1 L_2$$, the last result was a loss, so the next-game probabilities use the \"after a loss\" rates. After $$L_1 W_2$$, the last result was a win, so the next-game probabilities use the \"after a win\" rates. The tree is asymmetric ‚ÄĒ it has 6 terminal paths, not 8.\n\nThe key insight: the conditional probabilities for game 3 depend on the outcome of game 2 specifically, not game 1. Always read which previous game the condition attaches to.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_1"}, {"question": "Final synthesis: list three \"shortcut identities\" specific to S1 that, when recognised, save 5+ minutes per question. (3 steps)", "answer": "- Step 1: **Intersection of two regression lines = $$(\\bar{x}, \\bar{y})$$**. Bypasses needing $$\\sum x$$ or $$\\sum y$$ separately.\n- Step 2: **$$r^2 = b_{yx} \\cdot b_{xy}$$**. Bypasses $$S_{xx}$$ and $$S_{yy}$$ when both regression lines are given.\n- Step 3: **For $$A \\subseteq B$$, $$P(A \\cap B) = P(A)$$**. Simplifies conditional formulas when one event is a subset of another (e.g. \"won first 2\" $$\\subseteq$$ \"exactly 2 wins\").\n\nBonus: **$$z = 1.96$$ for the central 95%** of a normal ‚ÄĒ memorise this so you don't reread tables under time pressure.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_49"}, {"question": "For a discrete random variable $$X$$, the expectation of a function $$g(X)$$ is $$E(g(X)) = \\sum g(x) P(X = x)$$. Why is this the correct formula, and why can you *not* simply substitute $$g(x)$$ into a pre-computed $$E(X)$$? (2 steps)", "answer": "- Step 1: $$g(X)$$ is itself a random variable ‚ÄĒ it takes the value $$g(x)$$ whenever $$X$$ takes the value $$x$$, with the same probability $$P(X = x)$$. The expectation of any discrete RV is \"value √ó probability, summed over all values.\" So $$E(g(X)) = \\sum g(x) \\cdot P(X = x)$$.\n- Step 2: You cannot compute $$g(E(X))$$ instead, because in general $$E(g(X)) \\neq g(E(X))$$. For example, if $$g(x) = 1/x$$ and $$E(X) = 3$$, then $$g(E(X)) = 1/3$$, but $$E(1/X) = \\sum \\frac{1}{x} P(X=x)$$ which involves each individual $$1/x$$ weighted by its probability ‚ÄĒ a completely different calculation. The only exception is when $$g$$ is linear: $$E(aX + b) = aE(X) + b$$.\n\nTakeaway: $$E(g(X))$$ requires computing $$g(x)$$ at *each* value of $$x$$, weighting by $$P(X=x)$$, and summing. Only linear functions commute with expectation.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_23"}, {"question": "In a conditional probability question on a tree diagram, what is the disciplined first move every time you see the word \"given\"? (3 steps)", "answer": "- Step 1: Write the formula $$P(A\\mid B) = \\frac{P(A\\cap B)}{P(B)}$$ at the top of the working before substituting any numbers ‚ÄĒ this forces you to identify two distinct events, not a single number.\n- Step 2: Identify $$B$$ (the conditioning event) and restrict the sample space to only the paths consistent with $$B$$. The denominator is the total probability of these paths.\n- Step 3: Identify the intersection $$A\\cap B$$ ‚ÄĒ the paths that satisfy BOTH conditions. The numerator is the sum of their probabilities, NOT the marginal $$P(A)$$.\n\nThe classic error: dividing $$P(A)$$ by $$P(B)$$ without checking that the numerator paths are all contained in $$B$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_0"}, {"question": "When two percentiles of an unknown normal are given (e.g. \"5% below 152, 40% above 180\"), what is the structural approach? (4 steps)", "answer": "- Step 1: Convert any \"above\" probability to \"below\" before using inverse normal: $$P(Y>180)=0.4 \\Rightarrow P(Y<180)=0.6$$.\n- Step 2: Read off the two $$z$$-values from the standard normal tables: $$z_1 = \\Phi^{-1}(0.05) = -1.6449$$, $$z_2 = \\Phi^{-1}(0.60) = 0.2533$$.\n- Step 3: Write two standardisation equations: $$(152-\\mu)/\\sigma = z_1$$ and $$(180-\\mu)/\\sigma = z_2$$.\n- Step 4: SUBTRACT the equations to eliminate $$\\mu$$ first: $$(180-152)/\\sigma = z_2 - z_1$$, solve for $$\\sigma$$, then back-substitute for $$\\mu$$.\n\nThe subtraction is the key move ‚ÄĒ it isolates $$\\sigma$$ cleanly without messy algebra.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_26"}, {"question": "Write the conditional probability formula $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ and explain why the numerator is the *intersection* $$A \\cap B$$, not just $$A$$. What would go wrong conceptually if you used $$P(A)$$ in the numerator? (3 steps)", "answer": "- Step 1: The notation $$A \\mid B$$ means \"event $$A$$, restricted to the world where $$B$$ has already happened.\" The new sample space is no longer $$\\Omega$$ ‚ÄĒ it is $$B$$. Within this restricted world, the only part of $$A$$ that can occur is the overlap $$A \\cap B$$.\n- Step 2: The denominator $$P(B)$$ rescales probabilities so they sum to 1 within the new sample space. Without this rescaling, the probabilities in world $$B$$ would sum to $$P(B) < 1$$, not 1.\n- Step 3: If you used $$P(A)$$ in the numerator, you would be including outcomes in $$A$$ that are *outside* $$B$$ ‚ÄĒ i.e., outcomes that are impossible once $$B$$ has occurred. For example, if $$A$$ = \"exactly 2 wins\" and $$B$$ = \"won game 1\", then $$A$$ includes the path $$LWW$$, but $$LWW$$ is impossible under $$B$$ because game 1 was a loss. Using $$P(A)$$ would overcount by including forbidden outcomes.\n\nThe numerator must be the intersection because \"given $$B$$\" means we discard everything outside $$B$$ first, then measure how much of $$A$$ survives.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_3"}, {"question": "Given two regression lines on the same data ‚ÄĒ $$y$$ on $$x$$ and $$x$$ on $$y$$ ‚ÄĒ what is the geometric/statistical meaning of their point of intersection?", "answer": "Both regression lines pass through the point $$(\\bar{x}, \\bar{y})$$ ‚ÄĒ the centroid of the data. The $$y$$-on-$$x$$ line minimises vertical residuals; the $$x$$-on-$$y$$ line minimises horizontal residuals. They generally have different slopes but they must both go through the mean point. So **intersecting the two lines recovers the sample means** without ever needing $$\\sum x$$ or $$\\sum y$$ directly. From there, $$\\sum x = n\\bar{x}$$ trivially.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_27"}, {"question": "A random variable $$X \\sim N(210, 25^2)$$. Explain the two-step standardisation process used to find $$P(X < 240)$$, and interpret what the resulting $$z$$-score of $$1.2$$ means geometrically on the standard normal curve. (3 steps)", "answer": "- Step 1: Shift the distribution to centre it at zero by subtracting the mean:\n$$X - 210.$$\nThis removes the location parameter.\n- Step 2: Rescale by dividing by the standard deviation $$25$$ to compress the spread to unit variance:\n$$Z = \\frac{X - 210}{25} \\sim N(0,1).$$\n- Step 3: For $$X = 240$$ we obtain $$Z = \\frac{30}{25} = 1.2$$. Geometrically, this means the value $$240$$ lies $$1.2$$ standard deviations above the mean on the bell curve; the probability $$P(X < 240)$$ equals the area under the standard normal curve to the left of $$z = 1.2$$.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_17"}, {"question": "Why is $$P(F\\cap G') = P(F) - P(F\\cap G)$$, and what's the slick alternative under independence? (2 steps)", "answer": "- Step 1: Event $$F$$ splits cleanly into the disjoint parts \"$$F$$ AND $$G$$\" and \"$$F$$ AND NOT $$G$$\": $$P(F) = P(F\\cap G) + P(F\\cap G')$$. Rearranging gives the identity.\n- Step 2: Under independence of $$F, G$$, we also have independence of $$F, G'$$, so $$P(F\\cap G') = P(F)\\,P(G')$$. This avoids subtracting and can be computed in one line.\n\nBoth routes give the same answer ‚ÄĒ use whichever is faster given the numbers you already have.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_14"}, {"question": "Why is sketching the bell curve and shading the region of interest recommended before any normal calculation, and what specific danger does this prevent in inverse-normal problems? (2 steps)", "answer": "- Step 1: The sketch forces you to visualize whether the region is above or below the mean, immediately signaling whether $$z$$ should be positive or negative.\n- Step 2: Without the sketch, phrases like \"lightest $$15\\%$$\" or \"more than $$40\\%$$\" are easy to confuse with upper-tail probabilities, leading to sign errors that cost all accuracy marks even if the subsequent arithmetic is correct.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_30"}, {"question": "To standardise a normal variable $$X \\sim N(\\mu, \\sigma^2)$$, you compute $$Z = (X - \\mu)/\\sigma$$. What does this transformation do geometrically to the bell curve? (2 steps)", "answer": "- Step 1: Subtracting $$\\mu$$ shifts the curve so the centre (mean) moves to 0. Dividing by $$\\sigma$$ rescales the horizontal axis so that one standard deviation now corresponds to 1 unit on the $$Z$$-scale. The result is the standard normal $$Z \\sim N(0, 1)$$.\n- Step 2: Geometrically, the original bell curve (centred at $$\\mu$$, width governed by $$\\sigma$$) is transformed into the unique standard bell curve (centred at 0, width 1). All normal distributions are the same shape ‚ÄĒ standardisation just re-centres and rescales to a universal reference. This is why a single table of $$\\Phi(z)$$ serves all normal distributions.\n\nEvery \"find probability\" question in S1 reduces to: standardise, look up $$\\Phi(z)$$, apply the appropriate arithmetic (complement, subtraction of two $$\\Phi$$ values, etc.).", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_25"}, {"question": "If $$X$$ and $$Y$$ are perfectly dependent (e.g. $$Y = g(X)$$), why is there no meaningful 2D joint table to set up?", "answer": "A 2D joint table only carries information when $$X$$ and $$Y$$ have some independence/correlation structure that the marginals don't capture. If $$Y = g(X)$$, then knowing $$X$$ determines $$Y$$ exactly ‚ÄĒ the \"joint\" is degenerate: $$P(X=x, Y=y) = P(X=x)$$ if $$y = g(x)$$, else $$0$$. Every \"joint\" probability collapses to a marginal $$P(X=x)$$. Trying to multiply $$P(X=x) \\cdot P(Y=y)$$ as if independent gives wrong answers because they're not independent. The correct move: rewrite all events in terms of $$X$$ alone, then use the 1D PMF of $$X$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_44"}, {"question": "When translating $$Y < c$$ where $$Y = k/X$$ and $$X > 0$$, what happens to the inequality direction, and why? (2 steps)", "answer": "- Step 1: Since $$X > 0$$ and $$k > 0$$, both $$X$$ and $$k$$ are positive. Starting from $$k/X < c$$, dividing by $$k$$ gives $$1/X < c/k$$. Taking reciprocals of both sides (and noting both sides are positive) **flips** the inequality: $$X > k/c$$.\n- Step 2: The inequality flips because the function $$f(t) = 1/t$$ is **decreasing** for $$t > 0$$. If $$a < b$$ (both positive), then $$1/a > 1/b$$. So $$1/X < c/k$$ implies $$X > k/c$$. For $$Y = 30/X$$ and $$Y < 20$$: $$X > 30/20 = 1.5$$.\n\n+ If $$X$$ could be negative, the situation is more complex and you'd need to consider cases. But in S1, $$X$$ is almost always positive (counts, weights, times).", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_32"}, {"question": "Find the value of $$k$$ such that $$P(210 - k < X < 210 + k) = 0.95$$ for $$X \\sim N(210, 25^2)$$. How does symmetry help? (3 steps)", "answer": "- Step 1: The interval is symmetric about the mean 210. By the symmetry of the normal distribution, the 0.95 probability is split equally: 0.475 on each side of the mean, with 0.025 in each tail.\n- Step 2: So $$P(Z < k/25) = 0.975$$ (the central 0.95 plus the left tail of 0.025 gives cumulative 0.975 from the far left). From inverse-normal tables: $$\\Phi^{-1}(0.975) = 1.96$$.\n- Step 3: $$k/25 = 1.96$$, so $$k = 25 \\times 1.96 = 49$$.\n\nThe key insight: a symmetric interval about the mean always gives a two-tail problem. Total probability 0.95 ‚Üí each tail 0.025 ‚Üí cumulative from left = 0.975. The z-value 1.96 is one of the \"standard\" values worth knowing (along with 1.645 for 90% and 2.576 for 99%).", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_27"}, {"question": "If $$Y = a \\cdot g(X)$$ where $$a$$ is a positive constant, state the scaling rules for $$E(Y)$$ and $$\\text{Var}(Y)$$ in terms of $$E(g(X))$$ and $$\\text{Var}(g(X))$$, and explain intuitively why variance scales with $$a^2$$ rather than with $$a$$. (3 steps)", "answer": "- Step 1: The rules are\n$$E(Y) = a\\,E\\!\\bigl(g(X)\\bigr), \\qquad \\text{Var}(Y) = a^2\\,\\text{Var}\\!\\bigl(g(X)\\bigr).$$\n- Step 2: Expectation scales linearly because it is an average; multiplying every outcome by $$a$$ multiplies the average by $$a$$.\n- Step 3: Variance depends on **squared deviations** from the mean, $$(y - \\mu_Y)^2$$. If every deviation is multiplied by $$a$$, the squared deviation is multiplied by $$a^2$$. Therefore the average squared deviation‚ÄĒand hence the variance‚ÄĒinflates by the square of the scale factor.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_16"}, {"question": "The conditional probability formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. In a tree diagram context, explain what the numerator $$P(A \\cap B)$$ and denominator $$P(B)$$ correspond to in terms of path probabilities. (2 steps)", "answer": "- Step 1: The denominator $$P(B)$$ is the total probability of all paths that satisfy condition $$B$$. You scan every complete path in the tree, identify which ones are consistent with $$B$$, and sum their probabilities. This is the \"restricted sample space\" ‚ÄĒ only paths where $$B$$ occurred.\n- Step 2: The numerator $$P(A \\cap B)$$ is the total probability of all paths that satisfy *both* $$A$$ and $$B$$. You further filter the paths from Step 1, keeping only those that also satisfy $$A$$, and sum their probabilities. The conditional probability is then the ratio: of the paths where $$B$$ happened, what fraction also had $$A$$?\n\nTakeaway: \"Given $$B$$\" means you restrict attention to $$B$$-paths only. The numerator must be a *subset* of those $$B$$-paths.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_3"}, {"question": "When finding a symmetric interval $$(\\mu - k, \\mu + k)$$ that captures central probability $$0.95$$ for a normal distribution, why is the corresponding upper-tail area $$0.025$$ rather than $$0.05$$, and how does this determine the critical $$z$$-value? (2 steps)", "answer": "- Step 1: The total probability outside the symmetric interval is $$1 - 0.95 = 0.05$$. Because the normal distribution is symmetric about the mean, this leftover probability splits equally into the two tails: $$0.025$$ in the left tail and $$0.025$$ in the right tail.\n- Step 2: The upper boundary $$\\mu + k$$ corresponds to the cumulative probability $$1 - 0.025 = 0.975$$. Therefore you look up the $$z$$-value satisfying $$\\Phi(z) = 0.975$$, which is $$z = 1.96$$, giving $$k = 1.96\\sigma$$.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_18"}, {"question": "State the outlier rule used in S1 box plots, and explain why fences are placed at exactly 1.5√óIQR. (2 steps)", "answer": "- Step 1: An outlier is any value above $$Q_3 + 1.5\\,\\text{IQR}$$ or below $$Q_1 - 1.5\\,\\text{IQR}$$, where $$\\text{IQR} = Q_3 - Q_1$$.\n- Step 2: The factor 1.5 is a Tukey convention ‚ÄĒ large enough that genuinely \"normal\" data rarely flags points, small enough to catch genuine extremes. For roughly normal data, fewer than 1% of points fall outside these fences.\n\nThe rule may also be given in the question ‚ÄĒ always read it carefully; some papers use 2√óIQR instead.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_6"}, {"question": "Why is the box plot's lower whisker at 23 kg and not 16 kg (Q2) despite 16 being the minimum weight? (2 steps)", "answer": "- Step 1: Calculate outlier fences using IQR = 18 kg:\n  + Lower fence = 45 - 1.5√ó18 = 18 kg\n- Step 2: Identify non-outlier min: 16 kg < 18 kg ‚Üí outlier. Next lowest value = 23 kg ‚Üí lower whisker at 23 kg.\n\nMisconception probe: Why not extend whisker to the most extreme value? Whiskers show the **range of non-outlier data**‚ÄĒoutliers are marked separately.", "source": "Qwen 3 ‚Ď°", "_id": "qwen_2_1"}, {"question": "For $$X \\sim N(\\mu, \\sigma^2)$$, what is the standardisation transformation and why does it work?", "answer": "Define $$Z = (X - \\mu)/\\sigma$$. Then $$Z \\sim N(0,1)$$. The shift by $$\\mu$$ centres the distribution on 0; the scale by $$1/\\sigma$$ rescales spread to 1. Probabilities are preserved under monotonic linear transformations: $$P(X < x) = P(Z < (x-\\mu)/\\sigma)$$. We use this because tables only print $$\\Phi(z)$$ for the standard normal ‚ÄĒ every normal probability question reduces to a $$Z$$-question.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_20"}, {"question": "\"Carrots or onions but not both\" is a common probability question. In terms of Venn diagram regions $$w, x, y, z$$, which regions does this correspond to, and what is the formal name for this set operation? (2 steps)", "answer": "- Step 1: \"Carrots or onions but not both\" means you are in exactly one of the two circles ‚ÄĒ either in $$C$$ only or in $$O$$ only, but not in the intersection. In terms of regions, this is $$w + y$$ (the \"$$O$$ only\" plus \"$$C$$ only\" regions). With the values from the kangaroo/market problem: $$0.15 + 0.10 = 0.25$$.\n- Step 2: The formal name is the **symmetric difference**, denoted $$C \\triangle O = (C \\cup O) \\setminus (C \\cap O)$$. Equivalently, it is $$(C \\cap O') \\cup (C' \\cap O)$$.\n\nTakeaway: \"Or but not both\" = symmetric difference = the two crescent regions of the Venn diagram, excluding the overlap.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_16"}, {"question": "A student tries to compute the PMCC using $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$ but doesn't have $$\\sum x^2$$ or $$\\sum y^2$$. They get stuck. What should they have noticed that would have solved the problem in seconds? (2 steps)", "answer": "- Step 1: They should have noticed that *both* regression equations were given in the question. When both the y-on-x and x-on-y lines are provided, the shortcut $$r^2 = b_{yx} \\cdot b_{xy}$$ is available. Read the slopes directly from the equations ($$b_{yx} = 1.4$$, $$b_{xy} = 0.2$$) and compute $$r = \\sqrt{1.4 \\times 0.2} = \\sqrt{0.28} \\approx 0.529$$.\n- Step 2: The long route ($$r = S_{xy}/\\sqrt{S_{xx}S_{yy}}$$) requires $$S_{xx}$$ and $$S_{yy}$$, which in turn require $$\\sum x^2$$ and $$\\sum y^2$$. These are not given and cannot be computed from the available information alone. The shortcut is not just faster ‚ÄĒ it is the *only* route available with the given data.\n\nTakeaway: When both regression lines are given, the PMCC shortcut is both faster and necessary. Always scan for this structural clue.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_44"}, {"question": "Why must $$z$$-values be kept to at least four decimal places throughout a simultaneous normal calculation, and what happens to the final values of $$\\mu$$ and $$\\sigma$$ if you round $$z$$ to two decimal places midway? (3 steps)", "answer": "- Step 1: $$z$$-values like $$-1.6449$$ and $$0.2533$$ appear close to $$-1.64$$ and $$0.25$$, but the small tail differences correspond to several tenths of a gram in the original scale.\n- Step 2: Rounding early propagates systematic error into the denominator $$(z_2 - z_1)$$ and the numerator $$(x_2 - x_1)$$, distorting $$\\sigma$$.\n- Step 3: Since $$\\sigma$$ is then used to find $$\\mu$$ via back-substitution, the error cascades, often producing $$\\mu$$ and $$\\sigma$$ that fail verification when checked against the original percentiles.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_20"}, {"question": "In a tree-diagram problem with a \"given that\" question, what is the single most important discipline to avoid the classic numerator/denominator mismatch?", "answer": "Before substituting numbers, always write out $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)}$$ at the top of the answer. The numerator must be the **joint event** $$P(A \\cap B)$$, not the marginal $$P(A)$$. The classic trap is to compute \"given $$W_1$$\" by dividing some unconditional probability by $$P(W_1)$$ ‚ÄĒ the unconditional probability often includes paths that contradict $$W_1$$ (e.g. starting with $$L$$), and those paths must be removed from the numerator first.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_0"}, {"question": "Why is it impossible for two mutually exclusive events with positive probability to be independent? A student claims \"they're mutually exclusive so they must be independent ‚ÄĒ they don't affect each other.\" Refute this. (2 steps)", "answer": "- Step 1: If $$A$$ and $$B$$ are mutually exclusive, then $$P(A \\cap B) = 0$$. But if $$P(A) > 0$$ and $$P(B) > 0$$, then $$P(A)P(B) > 0$$. Since $$0 \\neq P(A)P(B)$$, independence fails.\n- Step 2: The student's intuition is backwards. Mutually exclusive events are *maximally dependent* ‚ÄĒ knowing that $$A$$ occurred tells you with certainty that $$B$$ did NOT occur (since they can't co-occur). This is the opposite of independence, where knowing $$A$$ occurred gives no information about $$B$$. \"Don't affect each other\" describes independence; \"can never happen together\" describes mutual exclusivity ‚ÄĒ and these are contradictory for events with positive probability.\n\nTakeaway: Mutual exclusivity ‚Č† independence. In fact, for non-trivial events, they are mutually exclusive *properties*: having one means you can't have the other.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_52"}, {"question": "What is the PMCC shortcut when both regression equations are given, and why does it work? (3 steps)", "answer": "- Step 1: When both regression lines are given, the product moment correlation coefficient satisfies $$r^2 = b_{yx} \\times b_{xy}$$, where $$b_{yx}$$ is the slope of y-on-x and $$b_{xy}$$ is the slope of x-on-y. Then $$r = \\sqrt{b_{yx} \\times b_{xy}}$$, with the sign matching the common sign of both slopes.\n- Step 2: Why it works: $$b_{yx} = S_{xy}/S_{xx}$$ and $$b_{xy} = S_{xy}/S_{yy}$$. Multiplying: $$b_{yx} \\times b_{xy} = S_{xy}^2 / (S_{xx} \\times S_{yy}) = r^2$$ (since $$r = S_{xy}/\\sqrt{S_{xx}S_{yy}}$$).\n- Step 3: For the given lines: $$b_{yx} = 1.4$$ and $$b_{xy} = 0.2$$, so $$r^2 = 1.4 \\times 0.2 = 0.28$$, giving $$r = \\sqrt{0.28} = 0.529$$. Both slopes positive, so $$r$$ is positive.\n\n+ This shortcut bypasses the need to compute $$S_{xx}$$ and $$S_{yy}$$ separately, which would require $$\\sum x^2$$ and $$\\sum y^2$$ (not given in this question). Without this shortcut, you'd be stuck.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_47"}, {"question": "Why might a student be tempted to compute $$S_{xx}$$ and $$S_{yy}$$ from scratch in a \"find PMCC\" question with two regression lines given ‚ÄĒ and why is this a trap?", "answer": "Computing $$S_{xx}$$ requires $$\\sum x^2$$, and $$S_{yy}$$ requires $$\\sum y^2$$. These are typically NOT given when the problem provides both regression lines, because the examiner intends the shortcut $$r^2 = b_{yx} b_{xy}$$. A student who tries to compute $$S_{xx}, S_{yy}$$ will get stuck. Lesson: when both regression lines are given, immediately reach for the shortcut.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_33"}], "models": {"glm_1": {"label": "GLM 5.1 ‚Ď†", "cards": [{"question": "In a tree diagram for a sequential process, the probability written on a second-level branch is a *conditional* probability. What does the branch label \"0.6\" after a first-game win actually represent, and why must it be conditional rather than marginal? (2 steps)", "answer": "- Step 1: The label \"0.6\" on the branch after a first-game win represents $$P(\\text{Win}_2 \\mid \\text{Win}_1) = 0.6$$. It is the probability of winning the second game *given that* the first game was won. It cannot be a marginal probability because the problem states that the probability of winning the next game *depends on* the outcome of the current game ‚ÄĒ after a loss the win probability is 0.2, not 0.6.\n- Step 2: This is precisely why we draw a tree diagram instead of using a single row of marginal probabilities. Each splitting point on the tree represents a different conditioning event, and the branches leaving that point must sum to 1 *for that point only*. The overall probability of any complete path is found by multiplying along branches: $$P(\\text{Win}_1 \\cap \\text{Win}_2) = P(\\text{Win}_1) \\times P(\\text{Win}_2 \\mid \\text{Win}_1) = 0.7 \\times 0.6 = 0.42.$$\n\nTakeaway: Tree branches encode conditional structure ‚ÄĒ the label on a branch is always \"probability of this outcome given everything that happened on the path so far.\"", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_0", "judge_pick": true}, {"question": "In Sally's game, a turn stops early if she wins the first 2 games or loses the first 2 games. Why does this stopping rule mean that some paths have only 2 games while others have 3, and what goes wrong if you draw the tree as if every path always has 3 games? (3 steps)", "answer": "- Step 1: The stopping rule creates *asymmetric* path lengths. After WW (two wins), the turn ends ‚ÄĒ there is no third game. After LL (two losses), the turn also ends. Only after WL or LW does a third game occur. So the complete set of paths is: WW, WLW, WLL, LWW, LWL, LL ‚ÄĒ six paths, not eight.\n- Step 2: If you incorrectly draw the tree as if every path has 3 games, you would add branches WW W and WW L (i.e. a third game after WW). These would carry non-zero probabilities and inflate the total probability beyond 1, violating the axiom that all mutually exclusive, exhaustive outcomes must sum to 1.\n+ For example, if you added a \"WW‚ÜíW\" branch with probability 0.6, that path alone would contribute $$0.42 \\times 0.6 = 0.252$$, which is probability mass that should not exist.\n- Step 3: The verification check is always: sum all final-path probabilities. Here $$0.42 + 0.056 + 0.224 + 0.036 + 0.024 + 0.24 = 1.000$$. If you drew extra branches after WW or LL, the sum would exceed 1, immediately signalling an error.\n\nTakeaway: Stopping rules truncate the tree. After a stopping condition is met, no further branches exist.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_1", "judge_pick": true}, {"question": "After a loss on game 1, the probability of winning game 2 is 0.2. After a win on game 1 followed by a loss on game 2, what is the probability of winning game 3, and how do you determine this from the problem statement? (2 steps)", "answer": "- Step 1: The problem states: \"If Sally loses a game the probability that she wins the next game is 0.2.\" The key is that the conditional probability depends on the *most recent* game's outcome, not the first game. After WL, the most recent game is a loss (game 2 was lost), so the probability of winning game 3 is 0.2.\n- Step 2: Contrast this with the path LW, where the most recent game (game 2) was a win. After LW, the probability of winning game 3 is 0.6 (the \"after a win\" rate). This is why the third-level branches are not all the same ‚ÄĒ they depend on the *second* game's outcome, which varies across paths.\n\nTakeaway: Always identify which game was \"the last one played\" on each path to determine which conditional probability applies to the next branch.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_2", "judge_pick": false}, {"question": "The conditional probability formula is $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. In a tree diagram context, explain what the numerator $$P(A \\cap B)$$ and denominator $$P(B)$$ correspond to in terms of path probabilities. (2 steps)", "answer": "- Step 1: The denominator $$P(B)$$ is the total probability of all paths that satisfy condition $$B$$. You scan every complete path in the tree, identify which ones are consistent with $$B$$, and sum their probabilities. This is the \"restricted sample space\" ‚ÄĒ only paths where $$B$$ occurred.\n- Step 2: The numerator $$P(A \\cap B)$$ is the total probability of all paths that satisfy *both* $$A$$ and $$B$$. You further filter the paths from Step 1, keeping only those that also satisfy $$A$$, and sum their probabilities. The conditional probability is then the ratio: of the paths where $$B$$ happened, what fraction also had $$A$$?\n\nTakeaway: \"Given $$B$$\" means you restrict attention to $$B$$-paths only. The numerator must be a *subset* of those $$B$$-paths.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_3", "judge_pick": true}, {"question": "In Sally's game, $$P(\\text{exactly 2 wins}) = 0.512$$ and $$P(W_1) = 0.7$$. A student computes $$P(\\text{won 2 games} \\mid W_1) = \\frac{0.512}{0.7}$$. Why is this wrong, and which specific path causes the error? (3 steps)", "answer": "- Step 1: The numerator should be $$P(\\text{won 2 games} \\cap W_1)$$, not $$P(\\text{exactly 2 wins})$$. The value 0.512 counts *all* paths with exactly 2 wins: WW (0.42), WLW (0.056), and LWW (0.036). But the condition is $$W_1$$ ‚ÄĒ the first game was won.\n- Step 2: The path LWW has a *loss* on game 1. It contributes 0.036 to \"exactly 2 wins\" but it is *inconsistent* with the condition $$W_1$$. Including LWW in the numerator violates the requirement that the numerator must be a subset of the denominator's restricted sample space.\n- Step 3: The correct numerator is $$P(\\text{won 2 games} \\cap W_1) = P(WW) + P(WLW) = 0.42 + 0.056 = 0.476$$. Then $$P(\\text{won 2} \\mid W_1) = \\frac{0.476}{0.7} = 0.68$$.\n\nTakeaway: When conditioning on $$W_1$$, every path in the numerator must start with W. LWW is excluded because it starts with L.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_4", "judge_pick": true}, {"question": "In part (d) of Sally's game, the question asks: \"Given that Sally wins 2 games, find the probability she won the first 2.\" Here, \"won the first 2\" means the path WW. Since WW is a subset of \"exactly 2 wins,\" what simplification does this allow in the conditional probability formula? (2 steps)", "answer": "- Step 1: The general formula gives $$P(WW \\mid \\text{exactly 2 wins}) = \\frac{P(WW \\cap \\text{exactly 2 wins})}{P(\\text{exactly 2 wins})}$$. But WW is itself a path with exactly 2 wins ‚ÄĒ if you won the first 2 games and the turn stopped, you necessarily won exactly 2 games. So $$WW \\subseteq \\{\\text{exactly 2 wins}\\}$$.\n- Step 2: When $$A \\subseteq B$$, the intersection $$A \\cap B$$ collapses to just $$A$$. Therefore $$P(WW \\cap \\text{exactly 2 wins}) = P(WW) = 0.42$$, and the answer is $$\\frac{0.42}{0.512} = \\frac{105}{128} \\approx 0.820$$.\n\nTakeaway: If event $$A$$ is a subset of event $$B$$, then $$P(A \\mid B) = P(A)/P(B)$$ ‚ÄĒ no need to compute the intersection separately.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_5", "judge_pick": true}, {"question": "When computing conditional probabilities from a tree diagram, what is the \"exam discipline\" step you should always write before substituting any numbers, and why does it prevent the numerator/denominator mismatch error? (2 steps)", "answer": "- Step 1: Before substituting, always write the formula $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ explicitly, then identify which paths belong to the event $$A \\cap B$$ and which belong to $$B$$. List the paths and their probabilities in two separate groups.\n- Step 2: This prevents the error of using a marginal probability (like \"exactly 2 wins\") in the numerator when you should use the joint event (\"exactly 2 wins AND $$W_1$$\"). By explicitly naming the intersection event and listing its constituent paths, you force yourself to check that every path in the numerator is also in the denominator ‚ÄĒ the subset relationship is visually verified.\n\nTakeaway: Write the formula first, enumerate paths second, substitute third. Never skip to substitution.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_6", "judge_pick": false}, {"question": "A game has 3 rounds. You win each round independently with probability $$p$$. If you win the first 2 rounds, you stop. Draw the tree and find $$P(\\text{exactly 2 wins})$$ in terms of $$p$$. Use this to verify: when $$p = 0.5$$, what is $$P(\\text{exactly 2 wins})$$? (3 steps)", "answer": "- Step 1: Enumerate all paths with their probabilities (independence means each game has probability $$p$$ of win, $$1-p$$ of loss):\n+ WW: $$p \\times p = p^2$$ (2 wins, stop)\n+ WLW: $$p(1-p) \\times p = p^2(1-p)$$ (2 wins)\n+ WLL: $$p(1-p)(1-p) = p(1-p)^2$$ (1 win)\n+ LWW: $$(1-p)p \\times p = p^2(1-p)$$ (2 wins)\n+ LWL: $$(1-p)p(1-p) = p(1-p)^2$$ (1 win)\n+ LL: $$(1-p)^2$$ (0 wins, stop)\n- Step 2: Exactly 2 wins = WW + WLW + LWW: $$P(\\text{exactly 2 wins}) = p^2 + p^2(1-p) + p^2(1-p) = p^2 + 2p^2(1-p) = p^2(1 + 2 - 2p) = p^2(3 - 2p)$$.\n- Step 3: When $$p = 0.5$$: $$P = (0.5)^2(3 - 1) = 0.25 \\times 2 = 0.5$$. Check: paths are WW = 0.25, WLW = 0.125, LWW = 0.125. Sum = 0.5. ‚úď\n\nTakeaway: With independent rounds the algebra simplifies, but the stopping rule still truncates the tree.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_7", "judge_pick": false}, {"question": "For ungrouped data with $$n$$ values, the Edexcel S1 quartile positions are $$Q_1 \\to \\frac{n+1}{4}$$, median $$\\to \\frac{n+1}{2}$$, $$Q_3 \\to \\frac{3(n+1)}{4}$$. Why is the formula $$(n+1)/4$$ used instead of $$n/4$$, and what do you do when the position is not an integer? (2 steps)", "answer": "- Step 1: The $$(n+1)$$ formula comes from the convention that for $$n$$ ordered values, the positions 1, 2, ‚Ä¶, n divide the number line into $$n+1$$ gaps (including the two tails). This ensures that the median of 3 values is the 2nd (position $$4/2 = 2$$), not position 1.5. It is the standard Edexcel convention for discrete/ungrouped data.\n- Step 2: When the position is not an integer ‚ÄĒ say position 8.5 ‚ÄĒ you average the 8th and 9th values. For example, if the 8th value is 45 and the 9th is 45, then $$Q_1 = (45+45)/2 = 45$$. If they differed, say 44 and 46, then $$Q_1 = (44+46)/2 = 45$$.\n\nTakeaway: Non-integer position ‚Üí interpolate (average the two flanking values). This is the Edexcel S1 standard.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_8", "judge_pick": true}, {"question": "A data set has $$n = 33$$ values. What are the positions of the median, $$Q_1$$, and $$Q_3$$? If the 17th value is 57, the 8th and 9th values are both 45, and the 25th and 26th values are both 63, state the three quartiles. (2 steps)", "answer": "- Step 1: Compute positions:\n+ Median: $$(33+1)/2 = 17$$th value.\n+ $$Q_1$$: $$(33+1)/4 = 8.5$$ ‚Üí average of 8th and 9th.\n+ $$Q_3$$: $$3(33+1)/4 = 25.5$$ ‚Üí average of 25th and 26th.\n- Step 2: Read off values:\n+ Median = 17th value = 57.\n+ $$Q_1 = (45 + 45)/2 = 45$$.\n+ $$Q_3 = (63 + 63)/2 = 63$$.\n\nTakeaway: For $$n = 33$$, all three positions happen to land on or between identical pairs, giving clean integer quartiles.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_9", "judge_pick": false}, {"question": "The outlier fences are defined as values below $$Q_1 - 1.5 \\times \\text{IQR}$$ or above $$Q_3 + 1.5 \\times \\text{IQR}$$. Given $$Q_1 = 45$$ and $$Q_3 = 63$$, compute the fence values. Then explain: if the data set has a minimum of 16 and a maximum of 94, which values are outliers? (3 steps)", "answer": "- Step 1: $$\\text{IQR} = Q_3 - Q_1 = 63 - 45 = 18$$. Then $$1.5 \\times \\text{IQR} = 1.5 \\times 18 = 27$$.\n- Step 2: Lower fence = $$45 - 27 = 18$$. Upper fence = $$63 + 27 = 90$$. Any value below 18 or above 90 is an outlier.\n- Step 3: The minimum is 16, which is below 18 ‚Üí outlier. The maximum is 94, which is above 90 ‚Üí outlier. The next smallest value (23) is above 18, and the next largest (86) is below 90, so these are not outliers. There are exactly 2 outliers: 16 and 94.\n\nTakeaway: Always check the extremes against the fences, and verify the next-most-extreme values are within the fences.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_10", "judge_pick": false}, {"question": "When drawing a box plot with outliers, where do the whiskers end? A student draws the lower whisker to the minimum value of 16 and the upper whisker to 94. What is wrong? (2 steps)", "answer": "- Step 1: Whiskers extend to the most extreme *non-outlier* values, not to the outliers themselves. Outliers are plotted as individual points (crosses or dots) beyond the whiskers. The lower whisker goes to the smallest data value that is *within* the fences, and the upper whisker goes to the largest data value within the fences.\n- Step 2: In this data set, the lower fence is 18 and the upper fence is 90. The smallest non-outlier is 23 (which is ‚Č• 18), so the lower whisker ends at 23. The largest non-outlier is 86 (which is ‚Č§ 90), so the upper whisker ends at 86. The values 16 and 94 are plotted as crosses (√ó) beyond the whiskers.\n\nTakeaway: Whiskers stop at the fence boundary's nearest data point, not at the outlier. Outliers get their own symbol.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_11", "judge_pick": false}, {"question": "An Edexcel \"compare two distributions\" question is worth 3 marks. What is the exact template that earns full marks, and what happens if you write extra claims about skewness or range? (3 steps)", "answer": "- Step 1: The template is exactly three statements:\n+ **Median comparison** (location): \"The median of [distribution A] is [greater/less] than the median of [distribution B] ([value] [units]). On average, [variable] is [higher/lower] in [A] than in [B].\"\n+ **IQR comparison** (spread): \"The IQR of [distribution A] is [greater/less] than the IQR of [distribution B] ([value] [units]). [Variable] in [A] is more/less consistent (more/less variable) than in [B].\"\n+ Each comparison must include the variable name and units in the interpretation sentence.\n- Step 2: Extra claims (skewness, range, number of outliers) are ignored at best. If any extra claim is *wrong* (e.g. you miscall the skew direction), it can cancel a correct claim and lose the mark for that comparison.\n- Step 3: The mark scheme rewards exactly one location comparison and one spread comparison, each with contextual interpretation. Writing five comparisons does not earn five marks ‚ÄĒ it only earns up to 2 and wastes time. Stick to the rigid template.\n\nTakeaway: Median + IQR + context each. Three sentences. Nothing more.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_12", "judge_pick": false}, {"question": "Distribution A has median 57 kg and IQR 18 kg. Distribution B has median 50 kg and IQR 22 kg. Write the two comparison statements following the Edexcel template, interpreting each in context of kangaroo weights. (2 steps)", "answer": "- Step 1: Median comparison: \"The median weight in December (57 kg) is greater than the median weight in February (50 kg). This suggests that, on average, red kangaroos are heavier in December than in February.\"\n- Step 2: IQR comparison: \"The IQR in December (18 kg) is less than the IQR in February (22 kg). This indicates that kangaroo weights in December are more consistent (less variable) than in February.\"\n\nTakeaway: \"Greater IQR\" ‚Üí \"more variable / less consistent\". \"Lesser IQR\" ‚Üí \"more consistent / less variable\". Always include units and the variable name.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_13", "judge_pick": false}, {"question": "A Venn diagram for two events $$C$$ and $$O$$ has four regions: $$w$$ (in $$O$$ only), $$x$$ (in $$O \\cap C$$), $$y$$ (in $$C$$ only), and $$z$$ (outside both). Given $$P(C) = 0.65$$, $$P(O') = 0.3$$, and $$P(O \\cap C') = 0.15$$, explain step-by-step how to find each region. (4 steps)", "answer": "- Step 1: The region \"$$O$$ only\" is $$O \\cap C'$$, which the problem states equals 0.15. From the diagram labelling, $$w = P(O \\cap C') = 0.15$$.\n- Step 2: Find $$P(O) = 1 - P(O') = 1 - 0.3 = 0.7$$. Since $$P(O) = w + x$$, we get $$x = 0.7 - 0.15 = 0.55$$. This is the intersection region.\n- Step 3: Since $$P(C) = x + y = 0.65$$, we get $$y = 0.65 - 0.55 = 0.10$$. This is the \"$$C$$ only\" region.\n- Step 4: All four regions sum to 1: $$w + x + y + z = 1$$, so $$z = 1 - (0.15 + 0.55 + 0.10) = 0.20$$. This is the \"outside both\" region.\n\nTakeaway: Always start from the given information, identify which region it directly specifies, then use the marginal probabilities and the sum-to-1 constraint to fill in the rest.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_14", "judge_pick": false}, {"question": "A student assigns $$w = 0.55$$ and $$x = 0.15$$ on a Venn diagram where the printed labels read left-to-right as $$w$$ = \"$$O$$ only\", $$x$$ = intersection. What conceptual error did they make, and how can you prevent it? (2 steps)", "answer": "- Step 1: The student matched the *numerical value* (0.55 is the intersection, 0.15 is the \"$$O$$ only\" region) to the wrong *letter label*. They assumed $$w$$ was the intersection because 0.55 is the \"big\" number, but the printed diagram explicitly defines $$w$$ as the \"$$O$$ only\" region. The error is reading the diagram carelessly ‚ÄĒ not matching the label to its region definition.\n- Step 2: Prevention: before substituting any numbers, annotate the printed diagram by writing the *verbal description* next to each letter. Write \"$$w = O \\text{ only}$$\", \"$$x = O \\cap C$$\", \"$$y = C \\text{ only}$$\", \"$$z = \\text{outside}$$\". Then assign numerical values to the descriptions, not to the letters.\n\nTakeaway: The printed diagram's labelling is authoritative. Annotate each region with its verbal meaning before substituting numbers.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_15", "judge_pick": false}, {"question": "\"Carrots or onions but not both\" is a common probability question. In terms of Venn diagram regions $$w, x, y, z$$, which regions does this correspond to, and what is the formal name for this set operation? (2 steps)", "answer": "- Step 1: \"Carrots or onions but not both\" means you are in exactly one of the two circles ‚ÄĒ either in $$C$$ only or in $$O$$ only, but not in the intersection. In terms of regions, this is $$w + y$$ (the \"$$O$$ only\" plus \"$$C$$ only\" regions). With the values from the kangaroo/market problem: $$0.15 + 0.10 = 0.25$$.\n- Step 2: The formal name is the **symmetric difference**, denoted $$C \\triangle O = (C \\cup O) \\setminus (C \\cap O)$$. Equivalently, it is $$(C \\cap O') \\cup (C' \\cap O)$$.\n\nTakeaway: \"Or but not both\" = symmetric difference = the two crescent regions of the Venn diagram, excluding the overlap.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_16", "judge_pick": true}, {"question": "To test whether two events $$C$$ and $$O$$ are statistically independent, you compare $$P(C \\cap O)$$ with $$P(C) \\times P(O)$$. If $$P(C \\cap O) = 0.55$$ and $$P(C) \\times P(O) = 0.455$$, what is the conclusion and how must you state it for full marks? (2 steps)", "answer": "- Step 1: Since $$0.55 \\neq 0.455$$, the events are **not independent**. The independence condition $$P(C \\cap O) = P(C)P(O)$$ fails.\n- Step 2: For full marks, you must state *both* numerical values explicitly before concluding. Write: \"$$P(C \\cap O) = 0.55$$ and $$P(C)P(O) = 0.65 \\times 0.7 = 0.455$$. Since $$0.55 \\neq 0.455$$, $$C$$ and $$O$$ are not independent.\" Simply writing \"not independent\" without showing the comparison earns no method marks.\n\nTakeaway: Always compute and display both sides of the independence equation numerically before stating the conclusion.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_17", "judge_pick": false}, {"question": "Can two events with non-zero probability be both mutually exclusive *and* independent? Prove your answer. (3 steps)", "answer": "- Step 1: Suppose $$A$$ and $$B$$ are mutually exclusive with $$P(A) > 0$$ and $$P(B) > 0$$. Then $$P(A \\cap B) = 0$$ by definition of mutual exclusivity.\n- Step 2: If they were also independent, then $$P(A \\cap B) = P(A) \\times P(B)$$. But $$P(A) > 0$$ and $$P(B) > 0$$ implies $$P(A) \\times P(B) > 0$$.\n- Step 3: This gives $$0 = P(A \\cap B) = P(A)P(B) > 0$$, a contradiction. Therefore two non-trivial events cannot be both mutually exclusive and independent. If events are mutually exclusive and have positive probability, they are *necessarily dependent*.\n\nTakeaway: Mutual exclusivity means \"they never happen together.\" Independence means \"knowing one happened doesn't change the probability of the other.\" These are fundamentally incompatible for events with positive probability.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_18", "judge_pick": true}, {"question": "Events $$F$$ and $$H$$ are mutually exclusive with $$P(F) = \\frac{2}{7}$$ and $$P(H) = \\frac{1}{4}$$. Find $$P(F \\cup H)$$. Why does the formula simplify compared to the general case? (2 steps)", "answer": "- Step 1: The general union formula is $$P(F \\cup H) = P(F) + P(H) - P(F \\cap H)$$. Since $$F$$ and $$H$$ are mutually exclusive, $$P(F \\cap H) = 0$$, so the formula simplifies to $$P(F \\cup H) = P(F) + P(H)$$.\n- Step 2: $$P(F \\cup H) = \\frac{2}{7} + \\frac{1}{4} = \\frac{8}{28} + \\frac{7}{28} = \\frac{15}{28}$$. No subtraction needed ‚ÄĒ the events cannot co-occur, so there is no overlap to remove.\n\nTakeaway: Mutual exclusivity eliminates the intersection term from the union formula.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_19", "judge_pick": false}, {"question": "Events $$F$$ and $$G$$ are independent with $$P(F) = \\frac{2}{7}$$ and $$P(F \\cup G) = \\frac{5}{8}$$. Find $$P(G)$$. Show how independence is used to express the intersection in terms of $$P(G)$$. (3 steps)", "answer": "- Step 1: Write the union formula: $$P(F \\cup G) = P(F) + P(G) - P(F \\cap G)$$. By independence, $$P(F \\cap G) = P(F) \\times P(G) = \\frac{2}{7}P(G)$$.\n- Step 2: Substitute: $$\\frac{5}{8} = \\frac{2}{7} + P(G) - \\frac{2}{7}P(G) = \\frac{2}{7} + P(G)\\left(1 - \\frac{2}{7}\\right) = \\frac{2}{7} + \\frac{5}{7}P(G)$$.\n- Step 3: Solve: $$\\frac{5}{7}P(G) = \\frac{5}{8} - \\frac{2}{7} = \\frac{35 - 16}{56} = \\frac{19}{56}$$, so $$P(G) = \\frac{19}{56} \\times \\frac{7}{5} = \\frac{19}{40} = 0.475$$.\n\nTakeaway: Independence lets you replace $$P(F \\cap G)$$ with $$P(F)P(G)$$, turning the union equation into a linear equation in one unknown $$P(G)$$.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_20", "judge_pick": false}, {"question": "Given $$P(F) = \\frac{2}{7}$$ and $$P(G) = \\frac{19}{40}$$ with $$F$$ and $$G$$ independent, find $$P(F \\cap G')$$ in two different ways and verify they agree. (3 steps)", "answer": "- Step 1: Method 1 ‚ÄĒ using the partition of $$F$$: $$P(F \\cap G') = P(F) - P(F \\cap G)$$. By independence, $$P(F \\cap G) = \\frac{2}{7} \\times \\frac{19}{40} = \\frac{38}{280} = \\frac{19}{140}$$. So $$P(F \\cap G') = \\frac{2}{7} - \\frac{19}{140} = \\frac{40 - 19}{140} = \\frac{21}{140} = \\frac{3}{20}$$.\n- Step 2: Method 2 ‚ÄĒ using independence of $$F$$ and $$G'$$: if $$F$$ and $$G$$ are independent, then $$F$$ and $$G'$$ are also independent. So $$P(F \\cap G') = P(F) \\times P(G') = \\frac{2}{7} \\times \\left(1 - \\frac{19}{40}\\right) = \\frac{2}{7} \\times \\frac{21}{40} = \\frac{42}{280} = \\frac{3}{20}$$.\n- Step 3: Both methods give $$\\frac{3}{20} = 0.15$$. ‚úď\n\nTakeaway: If $$F$$ and $$G$$ are independent, then $$F$$ and $$G'$$ are also independent ‚ÄĒ a useful fact that provides a cross-check.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_21", "judge_pick": false}, {"question": "Why does $$P(F \\cap G') = P(F) - P(F \\cap G)$$ always hold? Give a set-theoretic explanation. (2 steps)", "answer": "- Step 1: The event $$F$$ can be partitioned into two disjoint pieces: the part of $$F$$ inside $$G$$ and the part of $$F$$ outside $$G$$. Formally, $$F = (F \\cap G) \\cup (F \\cap G')$$, and these two subsets are mutually exclusive (they don't overlap).\n- Step 2: By the addition rule for mutually exclusive events: $$P(F) = P(F \\cap G) + P(F \\cap G')$$. Rearranging: $$P(F \\cap G') = P(F) - P(F \\cap G)$$. This is always true ‚ÄĒ it requires no independence assumption.\n\nTakeaway: This identity is a direct consequence of partitioning $$F$$ by whether or not $$G$$ also occurs. It works for any two events.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_22", "judge_pick": false}, {"question": "For a discrete random variable $$X$$, the expectation of a function $$g(X)$$ is $$E(g(X)) = \\sum g(x) P(X = x)$$. Why is this the correct formula, and why can you *not* simply substitute $$g(x)$$ into a pre-computed $$E(X)$$? (2 steps)", "answer": "- Step 1: $$g(X)$$ is itself a random variable ‚ÄĒ it takes the value $$g(x)$$ whenever $$X$$ takes the value $$x$$, with the same probability $$P(X = x)$$. The expectation of any discrete RV is \"value √ó probability, summed over all values.\" So $$E(g(X)) = \\sum g(x) \\cdot P(X = x)$$.\n- Step 2: You cannot compute $$g(E(X))$$ instead, because in general $$E(g(X)) \\neq g(E(X))$$. For example, if $$g(x) = 1/x$$ and $$E(X) = 3$$, then $$g(E(X)) = 1/3$$, but $$E(1/X) = \\sum \\frac{1}{x} P(X=x)$$ which involves each individual $$1/x$$ weighted by its probability ‚ÄĒ a completely different calculation. The only exception is when $$g$$ is linear: $$E(aX + b) = aE(X) + b$$.\n\nTakeaway: $$E(g(X))$$ requires computing $$g(x)$$ at *each* value of $$x$$, weighting by $$P(X=x)$$, and summing. Only linear functions commute with expectation.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_23", "judge_pick": true}, {"question": "For the RV $$X$$ with values 1, 2, 3, 4 and probabilities $$\\frac{1}{10}, \\frac{1}{5}, \\frac{3}{10}, \\frac{2}{5}$$, compute $$E(1/X)$$ step by step. Why does each term contribute the same amount $$\\frac{1}{10}$$? (3 steps)", "answer": "- Step 1: Write out each term of $$E(1/X) = \\sum \\frac{1}{x} P(X=x)$$:\n+ $$x=1$$: $$\\frac{1}{1} \\times \\frac{1}{10} = \\frac{1}{10}$$\n+ $$x=2$$: $$\\frac{1}{2} \\times \\frac{1}{5} = \\frac{1}{10}$$\n+ $$x=3$$: $$\\frac{1}{3} \\times \\frac{3}{10} = \\frac{1}{10}$$\n+ $$x=4$$: $$\\frac{1}{4} \\times \\frac{2}{5} = \\frac{1}{10}$$\n- Step 2: Each term equals $$\\frac{1}{10}$$ because the probabilities are carefully chosen so that $$P(X=x) = \\frac{x}{10}$$, making $$\\frac{1}{x} \\times \\frac{x}{10} = \\frac{1}{10}$$ for every $$x$$. This is a \"show that\" question designed so the arithmetic is elegant.\n- Step 3: Sum: $$E(1/X) = \\frac{4}{10} = \\frac{2}{5} = 0.4$$.\n\nTakeaway: In \"show that\" questions, the distribution is often designed so terms simplify beautifully. Trust the algebra and compute each term individually.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_24", "judge_pick": false}, {"question": "The variance formula is $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$. When computing $$\\text{Var}(1/X)$$, what are the two quantities you need, and why is the common-denominator arithmetic the main source of errors? (2 steps)", "answer": "- Step 1: You need $$E(1/X^2) = \\sum \\frac{1}{x^2} P(X=x)$$ and $$[E(1/X)]^2$$. The first requires computing $$\\frac{1}{1} \\times \\frac{1}{10} + \\frac{1}{4} \\times \\frac{1}{5} + \\frac{1}{9} \\times \\frac{3}{10} + \\frac{1}{16} \\times \\frac{2}{5}$$, which gives fractions with denominators 10, 20, 30, 40. The second is $$(2/5)^2 = 4/25$$.\n- Step 2: The common denominator for the four terms in $$E(1/X^2)$$ is 120 (LCM of 10, 20, 30, 40), giving $$\\frac{12+6+4+3}{120} = \\frac{25}{120} = \\frac{5}{24}$$. Then subtracting $$\\frac{4}{25}$$ requires another common denominator of 600. The error source is doing both LCM steps correctly without arithmetic slips ‚ÄĒ a single wrong numerator cascades through the entire calculation.\n\nTakeaway: Work in fractions throughout. Find the LCM at each addition/subtraction step. Convert to decimals only at the very end.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_25", "judge_pick": false}, {"question": "If $$Y = \\frac{30}{X}$$, then $$Y = 30 \\cdot \\frac{1}{X}$$. Given $$E(1/X) = \\frac{2}{5}$$ and $$\\text{Var}(1/X) = \\frac{29}{600}$$, find $$E(Y)$$ and $$\\text{Var}(Y)$$. Why is $$\\text{Var}(Y) = 30^2 \\cdot \\text{Var}(1/X)$$ and not $$30 \\cdot \\text{Var}(1/X)$$? (3 steps)", "answer": "- Step 1: By the linear scaling rule $$E(aX) = aE(X)$$: $$E(Y) = 30 \\times E(1/X) = 30 \\times \\frac{2}{5} = 12$$.\n- Step 2: By the variance scaling rule $$\\text{Var}(aX) = a^2 \\text{Var}(X)$$: $$\\text{Var}(Y) = 30^2 \\times \\text{Var}(1/X) = 900 \\times \\frac{2
