<script>
const DATA={"selected": [{"question": "State the PMCC shortcut when both regression lines are given, and explain why it works. (3 steps)", "answer": "- Step 1: The slopes are $$b_{yx} = S_{xy}/S_{xx}$$ (from $$y$$-on-$$x$$) and $$b_{xy} = S_{xy}/S_{yy}$$ (from $$x$$-on-$$y$$).\n- Step 2: Multiply: $$b_{yx} \\cdot b_{xy} = \\dfrac{S_{xy}^2}{S_{xx} S_{yy}}$$.\n- Step 3: But the PMCC is $$r = \\dfrac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$, so $$r^2 = \\dfrac{S_{xy}^2}{S_{xx} S_{yy}} = b_{yx} \\cdot b_{xy}$$.\n\nSo $$r = \\pm\\sqrt{b_{yx} b_{xy}}$$, with sign matching the (common) sign of both slopes. This bypasses $$S_{xx}$$ and $$S_{yy}$$ entirely.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_30"}, {"question": "The sign of the PMCC $$r$$ is determined by the signs of the regression slopes. Why must both slopes have the same sign, and what does this mean about the relationship between the variables? (2 steps)", "answer": "- Step 1: Since $$r^2 = b_{yx} \\cdot b_{xy}$$ and $$r^2 \\geq 0$$, the product of the two slopes must be non-negative. This means they have the same sign (both positive or both negative) unless one is zero ($$r = 0$$, no linear relationship).\n- Step 2: If both slopes are positive, $$r > 0$$: as $$x$$ increases, $$y$$ tends to increase (positive association). If both are negative, $$r < 0$$: as $$x$$ increases, $$y$$ tends to decrease (negative association). The sign of $$r$$ matches the common sign of the slopes ‚ÄĒ you never need to guess.\n\nA common error: computing $$r = \\sqrt{0.28}$$ and forgetting to check the sign. Always check: if the slopes are positive, $$r$$ is positive. If the slopes are negative, $$r$$ is negative.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_37"}, {"question": "Why is $$E(1/X) \\neq 1/E(X)$$ in general? Give a quick intuition. (2 steps)", "answer": "- Step 1: Expectation is linear, but reciprocal is NONLINEAR. Linearity only applies to functions of the form $$aX+b$$.\n- Step 2: Jensen's inequality: for a convex function $$\\phi$$, $$E[\\phi(X)] \\geq \\phi(E[X])$$. Reciprocal $$1/x$$ is convex on positive reals, so $$E(1/X) \\geq 1/E(X)$$, with equality only when $$X$$ is constant.\n\nSanity check: $$E(X) = 1(0.1)+2(0.2)+3(0.3)+4(0.4) = 3$$, so $$1/E(X) = 1/3 \\approx 0.333$$, while $$E(1/X) = 0.4$$. Indeed $$0.4 > 0.333$$. ‚úď", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_42"}, {"question": "What's the conceptual difference between $$E(X)^2$$ and $$E(X^2)$$? Illustrate with a simple example. (2 steps)", "answer": "- Step 1: $$E(X)^2 = [E(X)]^2$$ ‚ÄĒ square the mean. $$E(X^2)$$ ‚ÄĒ average of the squares.\n- Step 2: Example: $$X$$ takes values $$1, 3$$ each with probability $$0.5$$. Then $$E(X) = 2$$, so $$E(X)^2 = 4$$. But $$E(X^2) = 0.5(1) + 0.5(9) = 5$$. Different!\n\nThe gap $$E(X^2) - [E(X)]^2 = 5 - 4 = 1$$ is exactly $$\\text{Var}(X)$$. Jensen's inequality: for any non-constant RV, $$E(X^2) > [E(X)]^2$$, hence variance is positive.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_41"}, {"question": "In Sally's game, let $$W_1$$ denote ‚ÄúSally wins the first game‚ÄĚ. When computing $$P(\\text{exactly 2 wins} \\mid W_1)$$, a common error is to divide the marginal $$P(\\text{exactly 2 wins})$$ by $$P(W_1)$$. Why does this overcount, and which path included in the marginal must be removed from the numerator? (2 steps)", "answer": "- Step 1: The marginal $$P(\\text{exactly 2 wins})$$ sums every path with two wins, including $$LWW$$, which begins with a loss. Because we are conditioning on $$W_1$$, any path starting with a loss is impossible in the restricted sample space and must not appear in the numerator.\n- Step 2: The correct numerator is $$P(\\text{exactly 2 wins} \\cap W_1)$$, which includes only $$WW$$ and $$WLW$$; the path $$LWW$$ must be removed. Dividing by $$P(W_1)$$ without this removal inflates the conditional probability.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_4"}, {"question": "Let $$Y = \\frac{30}{X}$$ where $$X$$ is a discrete random variable. A student attempts to find $$P(X < 3 \\mid Y < 20)$$ by multiplying $$P(X=x)$$ and $$P(Y=y)$$ as if $$X$$ and $$Y$$ were independent. Why is this method fundamentally invalid, and what is the correct first step? (2 steps)", "answer": "- Step 1: $$Y$$ is a **deterministic function** of $$X$$; knowing $$X$$ fixes $$Y$$ exactly, so they are perfectly dependent, not independent. Multiplying their marginal probabilities as if they were independent invents a joint distribution that does not exist and will give nonsensical results.\n- Step 2: The correct first step is to translate the condition on $$Y$$ back into an equivalent condition on $$X$$:\n$$Y < 20 \\iff \\frac{30}{X} < 20 \\iff X > 1.5.$$\nSince $$X$$ takes integer values, this means $$X \\in \\{2,3,4\\}$$. The conditional probability then reduces to a simple restriction on the support of $$X$$.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_14"}, {"question": "Can two non-trivial events $$F, H$$ with $$P(F), P(H) > 0$$ be both mutually exclusive AND independent? Why or why not?", "answer": "No. Mutually exclusive means $$P(F \\cap H) = 0$$. Independent means $$P(F \\cap H) = P(F)P(H)$$. If both hold, then $$P(F)P(H) = 0$$, which forces at least one probability to be zero ‚ÄĒ contradiction. So for two non-trivial events, mutual exclusivity and independence are incompatible. They are not synonyms; they are near-opposite concepts about how events relate.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_12"}, {"question": "If $$Y = aX + b$$, state the rules for $$E(Y)$$ and $$\\text{Var}(Y)$$. Explain intuitively why the variance scales by $$a^2$$ rather than $$a$$. (3 steps)", "answer": "- Step 1: $$E(aX + b) = aE(X) + b$$. The constant $$b$$ shifts the mean but doesn't affect spread. The factor $$a$$ scales the mean linearly.\n- Step 2: $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$. The constant $$b$$ disappears because variance measures deviation from the mean, and adding $$b$$ shifts everything (including the mean) by the same amount. The factor $$a$$ appears squared because variance is in *squared units*: if you double all values, the deviations from the mean also double, but the *squared* deviations quadruple.\n- Step 3: Concrete example: if $$X$$ has values 1, 3 (mean 2, deviations ‚ąí1, +1, variance 1) and $$Y = 3X$$, then $$Y$$ has values 3, 9 (mean 6, deviations ‚ąí3, +3, variance 9 = $$3^2 \\times 1$$). The spread tripled, so the variance nine-folded.\n\nFor $$Y = 30/X$$: this is $$Y = 30 \\cdot (1/X) + 0$$, so $$E(Y) = 30 \\cdot \\frac{2}{5} = 12$$ and $$\\text{Var}(Y) = 900 \\cdot \\frac{29}{600} = \\frac{87}{2} = 43.5$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_22"}, {"question": "The two regression lines for variables $$x$$ and $$y$$ are given as $$y = 1.4x + 1.5$$ ($$y$$ on $$x$$) and $$x = 1.2 + 0.2y$$ ($$x$$ on $$y$$). State the key structural property about the point of intersection of these two lines, and prove it by solving the equations simultaneously. (3 steps)", "answer": "- Step 1: The two least-squares regression lines always intersect at the **mean point** $$(\\bar{x}, \\bar{y})$$. This is because both lines are constructed to pass through the centroid of the data.\n- Step 2: Substitute the first equation into the second:\n$$x = 1.2 + 0.2(1.4x + 1.5) = 1.2 + 0.28x + 0.3 = 1.5 + 0.28x.$$\n- Step 3: Solve for $$x$$:\n$$0.72x = 1.5 \\implies x = \\frac{25}{12}.$$\nThen $$y = 1.4 \\cdot \\frac{25}{12} + 1.5 = \\frac{53}{12}$$. The intersection is $$\\left(\\frac{25}{12}, \\frac{53}{12}\\right)$$, which equals $$(\\bar{x}, \\bar{y})$$.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_21"}, {"question": "From the simultaneous equations $$\\frac{152 - \\mu}{\\sigma} = -1.6449$$ and $$\\frac{180 - \\mu}{\\sigma} = 0.2533$$, explain why subtracting equation (1) from equation (2) is the most efficient first step, and solve for $$\\sigma$$. (3 steps)", "answer": "- Step 1: Both equations have the form $$\\frac{\\text{value} - \\mu}{\\sigma} = z$$. Subtracting eliminates $$\\mu$$ because $$\\mu$$ appears in the numerator of both with the same sign. Equation (2) minus (1): $$\\frac{180 - \\mu}{\\sigma} - \\frac{152 - \\mu}{\\sigma} = 0.2533 - (-1.6449)$$.\n- Step 2: The left side simplifies: $$\\frac{180 - \\mu - 152 + \\mu}{\\sigma} = \\frac{28}{\\sigma}$$. The right side: $$0.2533 + 1.6449 = 1.8982$$.\n- Step 3: $$\\sigma = \\frac{28}{1.8982} = 14.75 \\approx 14.8$$ g. Then back-substitute into equation (2): $$\\mu = 180 - 0.2533 \\times 14.75 = 180 - 3.737 = 176.3$$ g.\n\nTakeaway: Subtract to eliminate $$\\mu$$ first (it appears symmetrically in both equations), solve for $$\\sigma$$, then back-substitute.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_37"}, {"question": "In Sally's game, $$P(\\text{exactly 2 wins}) = 0.512$$ and $$P(W_1) = 0.7$$. A student computes $$P(\\text{won 2 games} \\mid W_1) = \\frac{0.512}{0.7}$$. Why is this wrong, and which specific path causes the error? (3 steps)", "answer": "- Step 1: The numerator should be $$P(\\text{won 2 games} \\cap W_1)$$, not $$P(\\text{exactly 2 wins})$$. The value 0.512 counts *all* paths with exactly 2 wins: WW (0.42), WLW (0.056), and LWW (0.036). But the condition is $$W_1$$ ‚ÄĒ the first game was won.\n- Step 2: The path LWW has a *loss* on game 1. It contributes 0.036 to \"exactly 2 wins\" but it is *inconsistent* with the condition $$W_1$$. Including LWW in the numerator violates the requirement that the numerator must be a subset of the denominator's restricted sample space.\n- Step 3: The correct numerator is $$P(\\text{won 2 games} \\cap W_1) = P(WW) + P(WLW) = 0.42 + 0.056 = 0.476$$. Then $$P(\\text{won 2} \\mid W_1) = \\frac{0.476}{0.7} = 0.68$$.\n\nTakeaway: When conditioning on $$W_1$$, every path in the numerator must start with W. LWW is excluded because it starts with L.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_4"}, {"question": "A student writes $$\\text{Var}(5X + 3) = 5\\text{Var}(X) + 3$$. Identify both errors and explain why each is wrong. (2 steps)", "answer": "- Step 1: Error 1 ‚ÄĒ the constant 3 is missing its square. The correct rule is $$\\text{Var}(aX + b) = a^2\\text{Var}(X)$$, not $$a\\text{Var}(X) + b$$. Adding a constant $$b$$ shifts the distribution but does not change its spread, so $$b$$ does not appear in the variance at all. The student added 3 as if it contributed to spread.\n- Step 2: Error 2 ‚ÄĒ the coefficient 5 should be squared. The correct factor is $$5^2 = 25$$, not 5. Variance scales with the *square* of the multiplicative constant because variance is in squared units. If $$X$$ is in kg, then $$5X$$ is in kg but $$(5X)^2$$ is in kg¬≤, and the variance of $$5X$$ is 25 times the variance of $$X$$.\n\nTakeaway: $$\\text{Var}(aX + b) = a^2\\text{Var}(X)$$. No $$b$$ term, and $$a$$ is squared. These are the two most common errors.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_59"}, {"question": "Why is $$\\text{Var}(1/X) = E(1/X^2) - [E(1/X)]^2$$ rather than $$E(X^2) - [E(X)]^2$$ divided by something? (2 steps)", "answer": "- Step 1: The variance formula $$\\text{Var}(Y) = E(Y^2) - [E(Y)]^2$$ is **for the random variable $$Y$$ itself**, whatever $$Y$$ is. If $$Y = 1/X$$, then $$Y^2 = 1/X^2$$.\n- Step 2: So you treat $$1/X$$ as a brand-new RV ‚ÄĒ compute $$E(1/X)$$ and $$E(1/X^2)$$ from the distribution of $$X$$, then plug in.\n\nCritical: $$1/X^2 \\neq 1/(E(X))^2$$, and $$E(1/X) \\neq 1/E(X)$$. Apply $$E$$ to functions of $$X$$ termwise via the PMF.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_16"}, {"question": "In a Venn diagram with two events $$C$$ and $$O$$, the four regions are: $$w$$ (in $$O$$ only), $$x$$ (in the intersection), $$y$$ (in $$C$$ only), and $$z$$ (outside both). Given $$P(C) = 0.65$$, $$P(O') = 0.3$$, and $$P(O \\cap C') = 0.15$$, find $$w$$, $$x$$, $$y$$, $$z$$. What is the most common labelling mistake? (3 steps)", "answer": "- Step 1: $$w = P(O \\cap C') = 0.15$$ (given directly). This is the \"onions only\" region. The common mistake is swapping $$w$$ and $$x$$ ‚ÄĒ reading the diagram left-to-right and assigning the intersection value to $$w$$ instead of to $$x$$. Always re-read the printed diagram labels.\n- Step 2: $$P(O) = 1 - P(O') = 1 - 0.3 = 0.7$$. Since $$P(O) = w + x$$, we get $$x = 0.7 - 0.15 = 0.55$$. Then $$P(C) = x + y = 0.65$$, so $$y = 0.65 - 0.55 = 0.10$$.\n- Step 3: Total probability: $$w + x + y + z = 1$$, so $$z = 1 - (0.15 + 0.55 + 0.10) = 0.20$$.\n\nThe labelling discipline: before substituting any numbers, write next to each region label what it represents in words (e.g., \"$$w$$ = $$O$$ only\"). This prevents the swap error.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_11"}, {"question": "What's the constraint $$|r| \\leq 1$$ tell you about the relationship between $$b_{yx}$$ and $$b_{xy}$$?", "answer": "Since $$r^2 = b_{yx} b_{xy} \\leq 1$$, the two regression slopes satisfy $$b_{yx} \\cdot b_{xy} \\leq 1$$. They can never both be large ‚ÄĒ if one is steep, the other must be shallow (and vice versa). Geometrically: when the data has perfect linear correlation ($$r = \\pm 1$$), the two regression lines coincide, and $$b_{xy} = 1/b_{yx}$$. As correlation weakens, the two lines spread apart, with $$b_{xy} < 1/b_{yx}$$ in product-magnitude.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_32"}, {"question": "Why can't you treat $$X$$ and $$Y = g(X)$$ as independent random variables? (2 steps)", "answer": "- Step 1: Two random variables are independent if knowing the value of one gives no information about the other. But $$Y = g(X)$$ is a deterministic function of $$X$$ ‚ÄĒ knowing $$X$$ tells you $$Y$$ exactly (with certainty). This is the maximum possible dependence, the opposite of independence.\n- Step 2: In probability terms, independence would require $$P(X = x, Y = y) = P(X = x) \\times P(Y = y)$$ for all $$x, y$$. But $$Y$$ can only take the value $$g(x)$$ when $$X = x$$. For any other $$y$$, $$P(X = x, Y = y) = 0 \\neq P(X=x) \\times P(Y = y)$$ (unless one marginal is zero).\n\n+ Example: if $$X = 1$$, then $$Y = 30/1 = 30$$ with certainty. There is no randomness left in $$Y$$ once $$X$$ is known.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_31"}, {"question": "In Q3(ii), the student needs $$P(F \\cap G')$$. They compute $$P(F) \\times P(G') = \\frac{2}{7} \\times \\frac{21}{40} = \\frac{3}{20}$$. Another student computes $$P(F) - P(F \\cap G) = \\frac{2}{7} - \\frac{19}{140} = \\frac{3}{20}$$. Both get the same answer. Are both methods always valid, or only under specific conditions? (2 steps)", "answer": "- Step 1: Method 2 ($$P(F) - P(F \\cap G)$$) is *always* valid ‚ÄĒ it follows from the partition $$F = (F \\cap G) \\cup (F \\cap G')$$, which holds for any two events regardless of independence.\n- Step 2: Method 1 ($$P(F) \\times P(G')$$) is valid *only* when $$F$$ and $$G'$$ are independent. This is true here because $$F$$ and $$G$$ are independent, which implies $$F$$ and $$G'$$ are also independent. But if $$F$$ and $$G$$ were not independent, Method 1 would give the wrong answer while Method 2 would still be correct.\n\nTakeaway: Method 2 (partition) is universal. Method 1 (independence of complement) requires independence of the original events. When in doubt, use Method 2.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_77"}, {"question": "Why does the outlier fence use the multiplier $$1.5 \\times \\text{IQR}$$, and what would happen to the visual information in a box plot if the multiplier were increased to $$5 \\times \\text{IQR}$$? (3 steps)", "answer": "- Step 1: The $$1.5$$ multiplier is a convention that captures the most extreme roughly $$0.7\\%$$ of a normal distribution in each tail while remaining robust to moderate skew; it balances sensitivity with stability.\n- Step 2: If the multiplier were $$5$$, the fences would lie so far from the quartiles that virtually no observation would be flagged as an outlier.\n- Step 3: The whiskers would then extend to the absolute minimum and maximum, causing the box plot to lose its outlier-separation purpose and reducing it to a simple range-and-quartiles diagram.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_5"}, {"question": "Why must you translate $Y = 30/X < 20$ into a condition on $X$ before computing $P(X < 3 \\mid Y < 20)$? (2 steps)", "answer": "- Step 1: **Dependency clarification** ‚ÄĒ $Y$ is a function of $X$, not an independent variable. Ignoring this leads to incorrect joint probability calculations (e.g., multiplying $P(X=x)P(Y=y)$).  \n- Step 2: **Translation process** ‚ÄĒ Solve $Y < 20$:  \n  $$\\frac{30}{X} < 20 \\implies X > 1.5.$$  \n  Thus, $P(X < 3 \\mid Y < 20)$ becomes $P(X \\in \\{2\\}) / P(X \\in \\{2,3,4\\})$.  \n\n**Takeaway:** Always express conditions on functions of $X$ (like $Y = g(X)$) directly in terms of $X$-values before applying conditional probability.", "source": "Qwen 3 ‚Ď†", "_id": "qwen_1_3"}, {"question": "What are the three families of weakness identified in this paper, and what specific discipline addresses each? (3 steps)", "answer": "- Step 1: **Family 1 ‚ÄĒ Conditional probability sample-space discipline.** Every \"given that\" question must start with $$P(A|B) = P(A \\cap B)/P(B)$$ written explicitly. The numerator is the JOINT event (intersection), not the marginal. Enumerate all paths first, then select the correct subset for both numerator and denominator. Affected: Q1(d‚Äďe), Q4(d).\n- Step 2: **Family 2 ‚ÄĒ Template adherence on interpretation parts.** For \"compare two distributions\", use exactly: median comparison + IQR comparison + one context sentence each (with variable name and units). Do not add skewness, range, or outlier comparisons. Affected: Q2(d).\n- Step 3: **Family 3 ‚ÄĒ Identity-spotting on multi-equation parts.** When both regression lines are given, use $$r^2 = b_{yx} \\times b_{xy}$$. When two normal percentiles are given, subtract the $$z$$-equations to eliminate $$\\mu$$ first. When \"hence\" appears, use the previous part's result. Keep $$z$$-values to 4 d.p. Affected: Q5(e), Q6(c).\n\n+ Mastering these three families addresses the majority of marks lost on this paper. The remaining errors are arithmetic (common denominators, squaring constants) and procedural (whisker placement, Venn labelling).", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_65"}, {"question": "When events $$F$$ and $$G$$ are independent, how does the addition law $$P(F \\cup G) = P(F) + P(G) - P(F \\cap G)$$ simplify, and why does this create a solvable single-variable equation for $$P(G)$$? (3 steps)", "answer": "- Step 1: Independence replaces the intersection: $$P(F \\cap G) = P(F)P(G) = \\frac{2}{7}P(G)$$.\n- Step 2: Substituting gives $$P(F \\cup G) = \\frac{2}{7} + P(G) - \\frac{2}{7}P(G) = \\frac{2}{7} + \\frac{5}{7}P(G)$$.\n- Step 3: This is linear in $$P(G)$$; setting it equal to $$\\frac{5}{8}$$ isolates one unknown. Without independence both $$P(G)$$ and $$P(F \\cap G)$$ would be unknown, leaving the equation unsolvable.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_11"}, {"question": "Common error: a student converts \"$$P(Y > 180) = 0.40$$\" directly into a $$z$$-value from the table. Why is this wrong?", "answer": "Standard normal tables print $$\\Phi(z) = P(Z < z)$$ ‚ÄĒ left-tail probabilities. The value $$0.40$$ in the table corresponds to $$P(Z < z) = 0.40$$, NOT $$P(Z > z) = 0.40$$. You must first convert: $$P(Y > 180) = 0.40 \\Rightarrow P(Y < 180) = 0.60$$, then look up $$0.60$$ to get $$z \\approx 0.2533$$. Always restate every probability as a left-tail before consulting tables.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_26"}, {"question": "Summarise the three families of errors that Phuc made across this paper, and for each family, state the one-line corrective discipline. (3 steps)", "answer": "- Step 1: **Conditional probability sample-space discipline** (Q1d, Q1e, Q4d): Phuc used marginal probabilities in the numerator instead of joint events, and treated $$Y = g(X)$$ as independent of $$X$$. Corrective discipline: write $$P(A|B) = P(A \\cap B)/P(B)$$ explicitly before substituting; translate conditions on $$g(X)$$ to conditions on $$X$$ first.\n- Step 2: **Over-eager prose in interpretation parts** (Q2d): Phuc wrote a 5-claim paragraph instead of the rigid median + IQR + context template. Corrective discipline: memorise the three-sentence template ‚ÄĒ one median comparison with context, one IQR comparison with context. Nothing else.\n- Step 3: **Failure to spot structural shortcuts** (Q5e, Q6c): Phuc didn't use the subtraction trick for simultaneous equations, and didn't spot the $$r^2 = b_{yx} \\cdot b_{xy}$$ identity. Corrective discipline: when both regression lines are given, use the PMCC shortcut; when two percentiles are given, subtract to eliminate $$\\mu$$ first. Keep z-values to 4 d.p. throughout.\n\nTakeaway: These three error families account for the majority of lost marks. Drilling the corrective disciplines targets the highest-impact improvements.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_69"}, {"question": "To standardise a normal variable $$X \\sim N(\\mu, \\sigma^2)$$, you compute $$Z = \\frac{X - \\mu}{\\sigma}$$. What does this transformation do geometrically, and why does $$Z \\sim N(0, 1)$$? (2 steps)", "answer": "- Step 1: Geometrically, subtracting $$\\mu$$ shifts the bell curve so its centre is at 0, and dividing by $$\\sigma$$ rescales the horizontal axis so that one unit on the new scale corresponds to one standard deviation on the original scale. The shape of the bell is preserved ‚ÄĒ it is still a normal distribution, just re-centred and re-scaled.\n- Step 2: The resulting $$Z$$-distribution has mean 0 (because $$E(Z) = \\frac{E(X) - \\mu}{\\sigma} = 0$$) and variance 1 (because $$\\text{Var}(Z) = \\frac{\\text{Var}(X)}{\\sigma^2} = 1$$). A normal distribution is fully determined by its mean and variance, so $$Z \\sim N(0,1)$$.\n\nTakeaway: Standardisation is a linear transformation that maps any normal distribution to the standard normal, enabling the use of a single table for all normal calculations.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_31"}, {"question": "For a dataset with $$Q_1 = 45$$ and $$Q_3 = 63$$, derive the upper and lower outlier fences using the $$1.5 \\times \\text{IQR}$$ rule, and explain why the whiskers of a box plot must stop at the most extreme **non-outlier** rather than at the outliers themselves. (3 steps)", "answer": "- Step 1: Compute $$\\text{IQR} = Q_3 - Q_1 = 63 - 45 = 18$$. Then $$1.5 \\times \\text{IQR} = 27$$.\n- Step 2: The fences are\n$$\\text{Lower fence} = Q_1 - 27 = 18, \\qquad \\text{Upper fence} = Q_3 + 27 = 90.$$\nAny data point outside $$[18, 90]$$ is classified as an outlier.\n- Step 3: Whiskers represent the **range of the main body** of the data excluding outliers. If a whisker extended to an outlier, the outlier would no longer appear exceptional, and the visual summary would misleadingly suggest the bulk of the data stretches that far. Instead, whiskers terminate at the most extreme data points still inside the fences, and outliers are plotted individually as crosses.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_7"}, {"question": "In a stem-and-leaf diagram with $$n = 33$$ values, the Edexcel S1 convention gives quartile positions as $$\\frac{n+1}{4}$$, $$\\frac{n+1}{2}$$, $$\\frac{3(n+1)}{4}$$. Compute these positions for $$n = 33$$ and explain what to do when a position is non-integer. (3 steps)", "answer": "- Step 1: $$\\text{Median position} = \\frac{33+1}{2} = 17$$. The median is the 17th value ‚ÄĒ an integer position, so read it directly.\n- Step 2: $$Q_1 \\text{ position} = \\frac{34}{4} = 8.5$$. This is non-integer: the first quartile lies between the 8th and 9th values. Take the average: $$Q_1 = \\frac{x_8 + x_9}{2}$$.\n- Step 3: $$Q_3 \\text{ position} = \\frac{3 \\times 34}{4} = 25.5$$. Again non-integer: $$Q_3 = \\frac{x_{25} + x_{26}}{2}$$.\n\nWhen the position is an integer, read that value directly. When it is a half-integer (e.g., 8.5), average the two flanking values. This is the Edexcel convention; other boards may use different rules (e.g., inclusive vs. exclusive median split), so always use $$(n+1)/4$$ for IAL.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_7"}, {"question": "Explain why the keyword \"Hence\" in a multi-part question is a structural instruction, not just stylistic. (2 steps)", "answer": "- Step 1: \"Hence\" means \"using the previous result you just derived\". The examiner is signposting that the next part builds on, and requires citation of, the previous answer.\n- Step 2: If you start from scratch ignoring \"hence\", you forfeit method marks tied to recognising the structural link, even if you arrive at a numerically correct answer.\n\nAlways reference the prior result explicitly. E.g. \"From (a)(i), the intersection is $$(\\bar{x}, \\bar{y}) = (25/12, 53/12)$$, so $$\\sum x = 12 \\bar{x} = 25$$.\"", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_34"}, {"question": "What's the unifying lesson across Q5(e) and Q6 for \"two-equation\" problems on an S1 paper? (3 steps)", "answer": "- Step 1: Both problems give you two pieces of structural information (two percentiles OR two regression lines) that translate into two equations in two unknowns.\n- Step 2: The fastest approach is to subtract or substitute to eliminate one unknown ‚ÄĒ DON'T try to solve them in parallel or as a matrix.\n- Step 3: After finding one unknown, back-substitute into either original equation for the other.\n\nMeta-skill: recognise the \"two structural facts ‚Üí two equations\" pattern and reach for elimination automatically.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_47"}, {"question": "In a tree diagram where a player stops after two consecutive wins or two consecutive losses, how does this stopping rule structurally change the number of terminal branches compared with a standard three-game tree where all games are always played? (3 steps)", "answer": "- Step 1: In a standard three-game tree, every path reaches depth 3, producing $$2^3 = 8$$ terminal branches because each game generates a win/loss split regardless of history.\n- Step 2: The stopping rule prunes branches after $$WW$$ and $$LL$$, so those two paths terminate at depth 2 instead of expanding into four further sub-branches ($$WWW,\\ WWL,\\ LLW,\\ LLL$$).\n- Step 3: The valid terminal paths are reduced to six: $$WW,\\ WLW,\\ WLL,\\ LWW,\\ LWL,\\ LL$$. The total probability must still sum to 1, but it is concentrated into fewer outcomes, meaning $$P(WW)$$ and $$P(LL)$$ are larger than they would be if the tree were forced to depth 3.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_0"}, {"question": "When a question says \"Given that Sally wins 2 games in a turn, find the probability that she won the first 2 games,\" what is the explicit three-step discipline you should follow before writing any numbers? (3 steps)", "answer": "- Step 1: Write the conditional probability formula in symbols first: $$P(A \\mid B) = P(A \\cap B) / P(B)$$, where you define $$A$$ and $$B$$ in words. Here $$A$$ = \"won first 2 games\" and $$B$$ = \"won 2 games in a turn.\"\n- Step 2: Identify the denominator: list all paths that satisfy $$B$$ and sum their probabilities. This is $$P(B)$$.\n- Step 3: Identify the numerator: list all paths that satisfy *both* $$A$$ and $$B$$ simultaneously. This is $$P(A \\cap B)$$. If $$A \\subseteq B$$, note this and simplify. Only now substitute numbers.\n\nThis discipline prevents the common error of using a marginal probability in the numerator when the intersection is required. The formula on the page forces you to think about what the intersection actually is.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_6"}, {"question": "When does the intersection $$P(A\\cap B)$$ in a conditional probability collapse to just $$P(A)$$, and why? (2 steps)", "answer": "- Step 1: If $$A \\subseteq B$$ (event $$A$$ is a subset of event $$B$$), then every outcome in $$A$$ is automatically in $$B$$, so $$A\\cap B = A$$.\n- Step 2: Therefore $$P(A\\mid B) = \\frac{P(A)}{P(B)}$$ directly.\n\nExample: \"won first 2 games\" ($$WW$$) is a subset of \"won exactly 2 games\" ($$WW, WLW, LWW$$), so $$P(WW \\mid \\text{exactly 2 wins}) = \\frac{P(WW)}{P(\\text{exactly 2 wins})}$$ without computing an explicit intersection.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_1"}, {"question": "For $$P(X < 3 \\mid Y < 20)$$ where $$Y = 30/X$$ and $$X \\in \\{1,2,3,4\\}$$, explain the critical first step of translating the condition on $$Y$$ into a condition on $$X$$. Why is treating $$X$$ and $$Y$$ as independent a fatal error? (3 steps)", "answer": "- Step 1: Translate: $$Y < 20$$ means $$\\frac{30}{X} < 20$$. Since $$X > 0$$, multiply both sides by $$X$$: $$30 < 20X$$, so $$X > 1.5$$. Among the possible values $$\\{1,2,3,4\\}$$, this gives $$X \\in \\{2,3,4\\}$$. So $$\\{Y < 20\\} = \\{X \\in \\{2,3,4\\}\\}$$.\n- Step 2: $$\\{X < 3\\} = \\{X \\in \\{1,2\\}\\}$$. The intersection is $$\\{2,3,4\\} \\cap \\{1,2\\} = \\{2\\}$$. So the numerator is $$P(X = 2) = \\frac{1}{5}$$.\n- Step 3: $$X$$ and $$Y = 30/X$$ are *perfectly* dependent ‚ÄĒ knowing $$X$$ determines $$Y$$ exactly. Treating them as independent and writing $$P(X < 3, Y < 20) = P(X < 3) \\cdot P(Y < 20)$$ is fundamentally wrong. The correct approach always translates the condition on $$Y$$ back to a condition on $$X$$, then works entirely within the $$X$$-distribution.\n\nThe general principle: whenever $$Y = g(X)$$, any event about $$Y$$ can be rewritten as an event about $$X$$. Never introduce a joint distribution ‚ÄĒ there is only one random variable, just expressed in two ways.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_23"}, {"question": "What is the rigid 3-sentence template required when \"comparing distributions in context\" on Edexcel S1? (3 steps)", "answer": "- Step 1: Sentence 1 ‚ÄĒ compare MEDIANS. State which is greater/less, with units, then interpret in context (e.g. \"on average heavier in December\").\n- Step 2: Sentence 2 ‚ÄĒ compare IQRs. State which is greater/less, with units, then interpret as consistency/variability (e.g. \"weights more consistent in December\").\n- Step 3: Stop. Three statements only. Do NOT add skewness, range, outlier count, or other commentary ‚ÄĒ these are not marked and may CANCEL a correct claim if you say something wrong.\n\nMr Fuat's rule: median + IQR + context. Anything else is wasted ink.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_8"}, {"question": "A box plot has $$Q_1 = 45$$, $$Q_3 = 63$$, median = 57, lower whisker at 23, upper whisker at 86, and outliers at 16 and 94. The mean of the data is 55.3. Can you determine the skewness direction from the box plot alone? How? (2 steps)", "answer": "- Step 1: Compare the median to the midpoint of $$Q_1$$ and $$Q_3$$: $$(Q_1 + Q_3)/2 = (45+63)/2 = 54$$. The median (57) is above this midpoint, suggesting positive skew (the upper tail is longer). Also, the upper whisker extends further from $$Q_3$$ (86 - 63 = 23) than the lower whisker extends from $$Q_1$$ (45 - 23 = 22), and there is an upper outlier at 94.\n- Step 2: However, in the \"compare distributions\" question, you should NOT mention skewness. The mark scheme only rewards median and IQR comparisons. Mentioning skew wastes time and risks a wrong claim cancelling a correct one.\n\nTakeaway: You *can* assess skew from a box plot, but for Edexcel \"compare\" questions, don't ‚ÄĒ stick to the median + IQR template.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_66"}, {"question": "A student writes: \"Since $$P(F \\cap H) = 0$$, events $$F$$ and $$H$$ are independent.\" Is this correct? Explain. (2 steps)", "answer": "- Step 1: No, this is incorrect. $$P(F \\cap H) = 0$$ means $$F$$ and $$H$$ are **mutually exclusive**, not independent. These are completely different concepts.\n- Step 2: For independence, you need $$P(F \\cap H) = P(F) \\times P(H)$$. If $$P(F) > 0$$ and $$P(H) > 0$$, then $$P(F) \\times P(H) > 0 \\neq 0 = P(F \\cap H)$$, so mutual exclusivity actually implies NOT independent (for non-trivial events). Knowing $$F$$ occurred means $$H$$ definitely didn't ‚ÄĒ that's strong dependence, not independence.\n\n+ The only case where $$P(F \\cap H) = 0$$ AND independence holds is when at least one event has zero probability ‚ÄĒ a trivial/degenerate case.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_55"}, {"question": "Synthesis question: a normal-distribution simultaneous equations problem and a \"two regression lines\" problem both share a structural feature. What is it? (2 steps)", "answer": "- Step 1: Both reduce to a 2√ó2 linear system once you read the right structural fact: in regression, \"intersection of two lines = $$(\\bar{x}, \\bar{y})$$\"; in normal, \"two percentiles give two $$z$$-equations in $$(\\mu, \\sigma)$$\".\n- Step 2: Both are solved most cleanly by subtraction ‚ÄĒ eliminate one unknown first, then back-substitute.\n\nPattern recognition unlocks both. Always ask: \"is this two equations in two unknowns?\" before grinding through.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_39"}, {"question": "State the PMCC shortcut $$r^2 = b_{yx} \\cdot b_{xy}$$ and explain why it works. When should you use it instead of the long formula $$r = S_{xy} / \\sqrt{S_{xx} S_{yy}}$$? (3 steps)", "answer": "- Step 1: The two regression slopes are $$b_{yx} = S_{xy}/S_{xx}$$ and $$b_{xy} = S_{xy}/S_{yy}$$. Their product is $$b_{yx} \\cdot b_{xy} = \\frac{S_{xy}^2}{S_{xx} S_{yy}} = \\left(\\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}}\\right)^2 = r^2$$.\n- Step 2: The shortcut works because the same quantity $$S_{xy}$$ appears in both slope formulas, and the $$S_{xx}$$ and $$S_{yy}$$ in the denominators combine to give the denominator of $$r$$. It is an algebraic identity, always valid.\n- Step 3: Use the shortcut whenever both regression equations are given. It bypasses the need for $$S_{xx}$$ and $$S_{yy}$$ entirely ‚ÄĒ you just multiply the two slopes and take the square root. The long formula requires $$\\sum x^2$$ and $$\\sum y^2$$, which may not be provided.\n\nWith $$b_{yx} = 1.4$$ and $$b_{xy} = 0.2$$: $$r^2 = 1.4 \\times 0.2 = 0.28$$, so $$r = \\sqrt{0.28} = 0.529$$. Since both slopes are positive, $$r$$ is positive.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_35"}, {"question": "For the discrete random variable $$X$$ taking values $$1,2,3,4$$, a student needs $$E(1/X^2)$$. Explain why the term for $$x=3$$ simplifies neatly to $$\\frac{1}{30}$$, and describe the general principle that allows such simplifications when the probability mass function shares factors with the transformation denominator. (2 steps)", "answer": "- Step 1: The contribution is $$\\frac{1}{3^2} \\cdot P(X=3) = \\frac{1}{9} \\cdot \\frac{3}{10} = \\frac{3}{90} = \\frac{1}{30}$$. The factor of $$3$$ in the numerator of the probability cancels with the $$3^2$$ in the denominator of the transformation.\n- Step 2: The general principle is that when $$g(x)$$ contains a factor that also appears in $$P(X=x)$$, the product $$g(x)P(X=x)$$ may reduce to a simpler fraction before summation, making hand calculation manageable and reducing arithmetic error.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_29"}, {"question": "Sally wins the first game with probability 0.7. If she wins a game, she wins the next with probability 0.6; if she loses, she wins the next with probability 0.2. For the path $$WLW$$ (win, then lose, then win), explain why the probability is $$0.7 \\times 0.4 \\times 0.2$$ and not $$0.7 \\times 0.4 \\times 0.6$$. (2 steps)", "answer": "- Step 1: The first game: $$P(W_1) = 0.7$$. The second game after a win: $$P(L_2 \\mid W_1) = 1 - 0.6 = 0.4$$. So far we have $$0.7 \\times 0.4$$.\n- Step 2: The third game's probability depends on the *immediately preceding* game's outcome. Game 2 was a loss, so $$P(W_3 \\mid L_2) = 0.2$$, not 0.6. The 0.6 rate applies only when the *previous* game was a win. The path ends $$L_2 \\to W_3$$, so the conditional is 0.2.\n\nThe trap: seeing $$W$$ at the start and mentally anchoring on the \"after win\" rate of 0.6 for all subsequent games. The conditional probability \"resets\" each game based on the most recent outcome only.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_2"}, {"question": "For the normal distribution, explain the difference between a \"forward\" problem and an \"inverse\" problem. What is the direction of computation in each case? (2 steps)", "answer": "- Step 1: A **forward** problem gives you a value $$x$$ and asks for a probability. You standardise to get $$z = (x - \\mu)/\\sigma$$, then look up $$\\Phi(z)$$ in the table. The direction is: value ‚Üí $$z$$ ‚Üí probability.\n- Step 2: An **inverse** problem gives you a probability and asks for a value. You look up $$z = \\Phi^{-1}(p)$$ from the percentage-points table (or by reading the main table in reverse), then de-standardise: $$x = \\mu + z\\sigma$$. The direction is: probability ‚Üí $$z$$ ‚Üí value.\n\nIn Q5, parts (a) and (b) are forward; parts (c) and (d) are inverse; part (e) is two inverse problems combined into simultaneous equations. Sketching the curve and shading the relevant region is essential for both types ‚ÄĒ it tells you whether $$z$$ is positive or negative, and whether you need a complement.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_40"}, {"question": "\"The lightest 15% of fruit are classified as small.\" For $$X \\sim N(210, 25^2)$$, find the maximum weight of a small fruit. Why is the $$z$$-value negative? (3 steps)", "answer": "- Step 1: We need $$w$$ such that $$P(X < w) = 0.15$$. Standardise: $$P\\left(Z < \\frac{w - 210}{25}\\right) = 0.15$$. The 0.15 is less than 0.5, so the cutoff is below the mean, and the $$z$$-value is negative.\n- Step 2: From tables, $$\\Phi(1.0364) = 0.85$$, so $$\\Phi(-1.0364) = 0.15$$. Thus $$z = -1.0364$$.\n- Step 3: $$\\frac{w - 210}{25} = -1.0364$$, so $$w = 210 + 25 \\times (-1.0364) = 210 - 25.91 = 184.09 \\approx 184$$ g.\n\nThe $$z$$-value is negative because we are in the left tail ‚ÄĒ below the mean. A common error is using $$z = +1.0364$$, which would give a weight above the mean (corresponding to the 85th percentile, not the 15th). Always sketch the curve: if the shaded region is on the left, $$z$$ is negative.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_28"}, {"question": "When constructing a probability tree for a sequential game where the probability of winning the next game changes based on the previous outcome, what is the fundamental rule that governs the probability written on each branch, and how do you obtain the probability of a complete path? (2 steps)", "answer": "- Step 1: Each branch probability is a **conditional probability** of that outcome given the specific sequence of outcomes already observed on the path from the root to that node; the labels on branches leaving any node must sum to $$1$$.\n- Step 2: The probability of a complete path is obtained by **multiplying** the probabilities along every branch traversed from the start to the terminal node, because each step is conditioned on all previous steps in that path.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_1"}, {"question": "What's the role of \"sketch the bell curve\" in normal-distribution problems? (3 steps)", "answer": "- Step 1: It anchors the geometry: where is the mean? where is the target value relative to the mean?\n- Step 2: It reveals the sign of $$z$$: shaded region to the left of the mean ‚Üí $$z$$ negative; to the right ‚Üí $$z$$ positive.\n- Step 3: It reveals which tail you need: $$P(X > c)$$ shades the right tail; you then convert $$P(X > c) = 1 - P(X < c)$$ before using tables.\n\nA 5-second sketch eliminates 90% of sign and tail-direction errors.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_46"}, {"question": "A Venn diagram has regions $$w, x, y, z$$ with values 0.15, 0.55, 0.10, 0.20. Before answering any sub-question, what is the single most important preparatory step? (1 step)", "answer": "- Step 1: Write next to each region label what it represents in words. E.g., \"$$w$$ = in $$O$$ only (not in $$C$$)\", \"$$x$$ = in both $$O$$ and $$C$$\", \"$$y$$ = in $$C$$ only (not in $$O$$)\", \"$$z$$ = in neither\". This prevents the most common error: swapping $$w$$ and $$x$$ because the printed diagram's left-to-right ordering may not match your assumption about which region is the intersection.\n\nThis takes 30 seconds and eliminates the labelling swap that cost marks in Q3(i)(a). Never substitute numbers into region labels without first defining them verbally.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_49"}, {"question": "For $$n = 33$$, the $$Q_1$$ position is $$8.5$$. Why is the correct procedure to average the 8th and 9th values, and what would go wrong if you simply rounded to the 8th value? (2 steps)", "answer": "- Step 1: The $$8.5$$th position lies exactly halfway between the 8th and 9th ordered observations; averaging gives a quartile value that respects the empirical cumulative distribution at $$25\\%$$.\n- Step 2: Rounding to the 8th would bias the quartile toward the lower tail, potentially shifting the lower fence and changing the outlier count, while rounding to the 9th would bias it upward; the average is the only position-neutral choice.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_29"}, {"question": "For any two events $$A$$ and $$B$$ with $$P(B) > 0$$, state the defining formula for the conditional probability $$P(A \\mid B)$$, and explain in words why the numerator must be the joint probability $$P(A \\cap B)$$ rather than the marginal probability $$P(A)$$. (2 steps)", "answer": "- Step 1: The formula is\n$$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}.$$\n- Step 2: The numerator must be $$P(A \\cap B)$$ because conditioning on $$B$$ restricts the sample space to only those outcomes where $$B$$ occurs; we need the probability that **both** $$A$$ and $$B$$ happen within this restricted world. Using $$P(A)$$ would incorrectly include outcomes where $$B$$ fails, violating the sample-space restriction.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_3"}, {"question": "Three events $$F$$, $$G$$, $$H$$ satisfy: $$F$$ and $$H$$ are mutually exclusive, $$F$$ and $$G$$ are independent, $$P(F) = 2/7$$, $$P(H) = 1/4$$, $$P(F \\cup G) = 5/8$$. A student tries to find $$P(G)$$ without using the independence condition. Why will they fail? (2 steps)", "answer": "- Step 1: The union formula gives $$P(F \\cup G) = P(F) + P(G) - P(F \\cap G) = 5/8$$. This is one equation in two unknowns: $$P(G)$$ and $$P(F \\cap G)$$. Without a second equation, the system is underdetermined.\n- Step 2: Independence provides the second equation: $$P(F \\cap G) = P(F) \\cdot P(G) = \\frac{2}{7}P(G)$$. Substituting this into the union equation converts it into a single equation in one unknown: $$\\frac{5}{8} = \\frac{2}{7} + P(G) - \\frac{2}{7}P(G)$$. Without independence, there is no unique solution for $$P(G)$$.\n\nTakeaway: Independence is not just a property to verify ‚ÄĒ it is a computational tool that reduces the number of unknowns by expressing the intersection in terms of marginals.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_67"}, {"question": "When comparing the February and December kangaroo weight distributions, a student says \"December has a higher median so kangaroos are heavier in winter.\" Why is this interpretation incomplete? (2 steps)", "answer": "- Step 1: The statement is directionally correct but lacks explicit mention of the unit (kg) and the comparison being made.\n- Step 2: A complete answer must say: \"The median weight in December is [higher/lower] than in February (57 kg), indicating that on average December kangaroos are heavier/lighter.\"\n\n**Takeaway:** Always include the variable name and units in context ‚ÄĒ \"weight of red kangaroos in kg.\"", "source": "MiniMax ‚Ď†", "_id": "minimax_1_47"}, {"question": "In a normal distribution problem, you are told $$P(Y > 180) = 0.40$$. Why must you convert this to $$P(Y < 180) = 0.60$$ before using standard normal tables, and what sign error awaits if you look up $$0.40$$ directly? (2 steps)", "answer": "- Step 1: Standard normal tables typically give $$\\Phi(z) = P(Z < z)$$, the cumulative probability from the far left up to $$z$$. A right-tail probability of $$0.40$$ does not correspond directly to any standard table entry for the left tail.\n- Step 2: Converting to the left tail gives $$P(Y < 180) = 1 - 0.40 = 0.60$$, which is a cumulative probability greater than $$0.5$$ and yields a **positive** $$z$$-value. If you mistakenly looked up $$0.40$$ directly, you would obtain a **negative** $$z$$-value, placing $$180$$ below the mean when it is actually above the mean.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_19"}, {"question": "For $$X \\sim N(210, 25^2)$$, why is sketching the curve and shading before reading the table essential? (3 steps)", "answer": "- Step 1: The sketch makes you decide explicitly whether you want the LEFT tail, the RIGHT tail, or the MIDDLE ‚ÄĒ avoiding the common error of computing $$1-\\Phi$$ when you wanted $$\\Phi$$.\n- Step 2: It also reveals the sign of $$z$$. If the value lies BELOW the mean, $$z$$ is negative; ABOVE, positive. Tables only list positive $$z$$, so you need to use $$\\Phi(-z) = 1 - \\Phi(z)$$.\n- Step 3: For symmetric intervals $$\\mu \\pm k$$, the sketch immediately shows that each tail has probability $$(1-P_{\\text{mid}})/2$$.\n\nDiscipline: every probability question gets a tiny bell drawn in the margin first.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_23"}, {"question": "If event $$A$$ is a subset of event $$B$$, how does the conditional probability $$P(A \\mid B)$$ simplify, and what does this imply for calculating $$P(\\text{won first 2 games} \\mid \\text{exactly 2 wins})$$ in a game where winning the first 2 automatically means exactly 2 wins? (2 steps)", "answer": "- Step 1: If $$A \\subseteq B$$, then $$A \\cap B = A$$, so\n$$P(A \\mid B) = \\frac{P(A)}{P(B)}.$$\n- Step 2: In the game, the outcome ‚Äúwon the first 2 games‚ÄĚ ($$WW$$) necessarily implies ‚Äúexactly 2 wins‚ÄĚ because the turn stops immediately. Hence $$WW$$ is a subset of the event ‚Äúexactly 2 wins‚ÄĚ, and the conditional probability collapses to $$P(WW) / P(\\text{exactly 2 wins})$$ without needing to compute an intersection separately.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_5"}, {"question": "In the Sally game with stopping rules, why is it incorrect to compute $$P(\\text{won exactly 2 games} \\mid \\text{won the first game})$$ by dividing the marginal $$P(\\text{exactly 2 wins})$$ by $$P(W_1)$$? (3 steps)", "answer": "- Step 1: The marginal probability $$P(\\text{exactly 2 wins}) = 0.512$$ is the sum of three paths: $$WW$$, $$WLW$$, and $$LWW$$.\n- Step 2: The path $$LWW$$ begins with a loss, which directly contradicts the conditioning event \"won the first game.\" It must be excluded from the numerator.\n- Step 3: The correct numerator is $$P(\\text{exactly 2 wins} \\cap W_1) = P(WW) + P(WLW) = 0.476$$, not $$0.512$$. Dividing $$0.512$$ by $$0.7$$ retains an impossible path and therefore overstates the conditional probability.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_2"}, {"question": "If $$Y = 30/X = 30 \\cdot (1/X)$$ and you've already found $$E(1/X)$$ and $$\\text{Var}(1/X)$$, how do you get $$E(Y)$$ and $$\\text{Var}(Y)$$ instantly? (2 steps)", "answer": "- Step 1: Linearity of $$E$$: $$E(aZ) = a E(Z)$$. So $$E(Y) = 30 \\cdot E(1/X)$$.\n- Step 2: For variance: $$\\text{Var}(aZ) = a^2 \\text{Var}(Z)$$ ‚ÄĒ note the **square**. So $$\\text{Var}(Y) = 30^2 \\cdot \\text{Var}(1/X) = 900 \\cdot \\text{Var}(1/X)$$.\n\nWhy $$a^2$$? Variance is a squared-deviation average; multiplying $$Z$$ by $$a$$ multiplies every deviation by $$a$$, hence every squared deviation by $$a^2$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_17"}, {"question": "What is the most reliable way to ensure you do not swap region labels like $$w$$ and $$x$$ when a Venn diagram is pre-printed on an exam page? (2 steps)", "answer": "- Step 1: Explicitly write down the set-theoretic meaning of each region before assigning numbers: for example, state \"$$w$$ represents $$O \\cap C'$$, the part of $$O$$ that does not overlap with $$C$$.\"\n- Step 2: Only then substitute the given probability into the corresponding equation; never assign a number to a region based on visual guesswork or left-to-right reading without confirming the set notation.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_37"}, {"question": "To find $$P(190 < X < 240)$$ for $$X \\sim N(210, 25^2)$$, why must you standardize both endpoints and subtract their cumulative probabilities, and why is the answer not simply $$\\Phi(1.2) - \\Phi(0.8)$$? (3 steps)", "answer": "- Step 1: Standardize each endpoint: $$z_1 = \\frac{190-210}{25} = -0.8$$ and $$z_2 = \\frac{240-210}{25} = 1.2$$.\n- Step 2: The probability between them equals the area under the standard normal from $$z_1$$ to $$z_2$$, which is $$\\Phi(z_2) - \\Phi(z_1)$$.\n- Step 3: Using $$\\Phi(0.8)$$ instead of $$\\Phi(-0.8)$$ ignores the negative sign; because the normal curve is symmetric, $$\\Phi(-0.8) = 1 - \\Phi(0.8)$$, so the correct subtraction is $$\\Phi(1.2) - (1 - \\Phi(0.8))$$.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_35"}, {"question": "Why is it critical to keep $$z$$-values to 4 decimal places in simultaneous equation problems? (2 steps)", "answer": "- Step 1: The $$z$$-values appear in both the subtraction step and the back-substitution step. If you round $$z_1 = -1.6449$$ to $$-1.64$$ and $$z_2 = 0.2533$$ to $$0.25$$, the difference becomes $$1.89$$ instead of $$1.8982$$. This gives $$\\sigma = 28/1.89 = 14.81$$ instead of $$14.75$$ ‚ÄĒ already off by 0.06.\n- Step 2: The error compounds when you back-substitute. Using $$\\sigma = 14.81$$: $$\\mu = 180 - 0.25 \\times 14.81 = 176.30$$. Using precise $$\\sigma = 14.75$$: $$\\mu = 180 - 0.2533 \\times 14.75 = 176.27$$. The error can be much larger in other problems. Edexcel checks for accuracy to 3 s.f., which requires full-precision working.\n\n+ Rule: carry at least 4 d.p. for $$z$$-values, compute $$\\sigma$$ to at least 3 d.p., then round final answers to 3 s.f.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_40"}, {"question": "\"Hence show that $$\\sum x = 25$$.\" What does the word \"hence\" oblige you to do, and what's the failure mode if ignored? (2 steps)", "answer": "- Step 1: \"Hence\" REQUIRES you to use the result of the immediately preceding part (here, the intersection $$(\\bar{x},\\bar{y}) = (25/12, 53/12)$$) as the starting point.\n- Step 2: If you compute $$\\sum x$$ via some independent route, you risk losing marks for \"not using the previous result\", even if your answer is numerically correct.\n\nAlways reference the prior result explicitly: \"From (a)(i), $$\\bar{x} = 25/12$$, so $$\\sum x = 12\\bar{x} = 25$$.\"", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_35"}, {"question": "Given independent events $$F$$ and $$G$$, what is the quickest way to find $$P(F \\cap G')$$, and why does it equal $$P(F) - P(F \\cap G)$$? (2 steps)", "answer": "- Step 1: The event $$F$$ splits into two disjoint parts: \"$$F$$ and $$G$$\" and \"$$F$$ and not $$G$$\"; therefore $$P(F) = P(F \\cap G) + P(F \\cap G')$$, giving $$P(F \\cap G') = P(F) - P(F \\cap G)$$.\n- Step 2: Using independence, this becomes $$P(F)(1 - P(G)) = P(F)P(G')$$, which is often faster if $$P(G)$$ is already known from the union equation.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_33"}, {"question": "State the four probabilities that must appear on the first two levels of Sally‚Äôs tree diagram (first game, then second game after a win and after a loss), and verify that the branches at each node sum to $$1$$. (2 steps)", "answer": "- Step 1: First game: win $$0.7$$, loss $$0.3$$. After a win: next win $$0.6$$, next loss $$0.4$$. After a loss: next win $$0.2$$, next loss $$0.8$$.\n- Step 2: Verification:\n+ First level: $$0.7 + 0.3 = 1.0$$.\n+ After win: $$0.6 + 0.4 = 1.0$$.\n+ After loss: $$0.2 + 0.8 = 1.0$$.\nThis conservation of probability at every node is essential; if any node failed to sum to $$1$$, the tree would leak probability.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_38"}, {"question": "How do you formally show two events $$C$$ and $$O$$ are NOT independent, given the Venn? (3 steps)", "answer": "- Step 1: Compute $$P(C\\cap O)$$ directly from the intersection region (here 0.55).\n- Step 2: Compute the product $$P(C)\\cdot P(O) = 0.65 \\times 0.7 = 0.455$$.\n- Step 3: State both numerical values explicitly, observe $$0.55 \\neq 0.455$$, and conclude \"not independent\". Don't skip the numerical inequality ‚ÄĒ examiners want both sides shown.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_12"}, {"question": "Given the intersection point $$(\\bar{x}, \\bar{y})$$ from two regression lines and a sample size $$n = 12$$, explain how to deduce $$\\sum x$$ and $$\\sum y$$ without being given the raw data, and identify which word in the question signals that you must use the previous result. (2 steps)", "answer": "- Step 1: Since the intersection is $$(\\bar{x}, \\bar{y})$$, you read off $$\\bar{x} = \\frac{25}{12}$$ and $$\\bar{y} = \\frac{53}{12}$$. Multiply each by $$n$$:\n$$\\sum x = n\\bar{x} = 12 \\cdot \\frac{25}{12} = 25, \\qquad \\sum y = n\\bar{y} = 12 \\cdot \\frac{53}{12} = 53.$$\n- Step 2: The word **‚ÄúHence‚ÄĚ** signals that the calculation must use the result from the previous part; it forbids starting from scratch or using an alternative method that ignores the intersection point.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_22"}, {"question": "Why is $$E(g(X)) \\neq g(E(X))$$ in general? Give a concrete counterexample using the Q4 data. (3 steps)", "answer": "- Step 1: $$E(X)$$ is a weighted average, but applying a nonlinear function $$g$$ to a weighted average is NOT the same as taking the weighted average of $$g$$ applied to each value. This is Jensen's inequality in action.\n- Step 2: Compute $$E(X) = 1 \\cdot 1/10 + 2 \\cdot 2/10 + 3 \\cdot 3/10 + 4 \\cdot 4/10 = (1+4+9+16)/10 = 30/10 = 3$$. Then $$1/E(X) = 1/3 \\approx 0.333$$.\n- Step 3: But $$E(1/X) = 2/5 = 0.4 \\neq 1/3$$. The reciprocal function is convex for positive values, so by Jensen's inequality, $$E(1/X) > 1/E(X)$$.\n\n+ The only case where $$E(g(X)) = g(E(X))$$ is when $$g$$ is linear: $$g(x) = ax + b$$. Then $$E(aX + b) = aE(X) + b = g(E(X))$$.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_25"}, {"question": "A regression question provides both the $$y$$-on-$$x$$ equation and the $$x$$-on-$$y$$ equation. A student attempts to find $$r$$ by first calculating $$S_{xx}$$ and $$S_{yy}$$ from raw sums that are not given. Explain why this is inefficient and identify the single product that immediately gives $$r^2$$. (2 steps)", "answer": "- Step 1: Calculating $$S_{xx}$$ and $$S_{yy}$$ from scratch requires $$\\sum x^2$$ and $$\\sum y^2$$, neither of which is provided in the question. Attempting to derive them consumes time and is unnecessary.\n- Step 2: Because both regression slopes are supplied, the product $$b_{yx} \\cdot b_{xy}$$ equals $$r^2$$. Multiplying $$1.4 \\times 0.2 = 0.28$$ gives $$r^2$$ instantly; taking the positive square root yields $$r$$ directly, bypassing $$S_{xx}$$ and $$S_{yy}$$ entirely.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_31"}, {"question": "Why does the conditional formula $$P(A|B) = P(A \\cap B)/P(B)$$ \"restrict the sample space\"? (2 steps)", "answer": "- Step 1: Conditioning on $$B$$ means we're now only considering outcomes where $$B$$ happened ‚ÄĒ the new universe is $$B$$ itself, with total probability $$1$$ inside this new universe.\n- Step 2: To make probabilities within $$B$$ sum to 1, we **rescale** by dividing by $$P(B)$$. The numerator $$P(A \\cap B)$$ captures the part of $$A$$ that's still inside the restricted universe ‚ÄĒ outcomes in $$A$$ but outside $$B$$ are gone.\n\nSo conditional probability = \"zoom in on $$B$$ and rescale\".", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_43"}, {"question": "A student computes $$E(1/X^2)$$ and then writes $$\\text{Var}(1/X) = E(1/X^2)$$. What's missing? (2 steps)", "answer": "- Step 1: The variance formula is $$\\text{Var}(1/X) = E(1/X^2) - [E(1/X)]^2$$, NOT just $$E(1/X^2)$$. The student forgot to subtract the square of the mean.\n- Step 2: $$E(1/X^2)$$ is the \"mean of the squares\" and $$[E(1/X)]^2$$ is the \"square of the mean.\" The variance is the difference between these two. With $$E(1/X^2) = 5/24$$ and $$E(1/X) = 2/5$$: $$\\text{Var}(1/X) = 5/24 - 4/25 = 29/600$$.\n\n+ Mnemonic: \"mean of the squares minus the square of the mean\" ‚ÄĒ always in that order. If the result is negative, you've made an arithmetic error (variance is always non-negative).", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_27"}, {"question": "For a stem-and-leaf diagram with $$n = 33$$, explain why $$Q_1$$ is located at position $$\\frac{n+1}{4} = 8.5$$ rather than $$\\frac{n}{4} = 8.25$$, and describe the interpolation method Edexcel S1 expects at this half-integer position. (2 steps)", "answer": "- Step 1: Edexcel S1 uses the **$$(n+1)$$-based rule** for quartiles: $$Q_1$$ at $$\\frac{n+1}{4}$$, median at $$\\frac{n+1}{2}$$, and $$Q_3$$ at $$\\frac{3(n+1)}{4}$$. This centres the ordered data symmetrically and avoids bias; for $$n=33$$ it yields the clean half-integer $$8.5$$.\n- Step 2: At position $$8.5$$, the convention is to take the **simple average** (midpoint) of the $$8$$th and $$9$$th ordered values. No further linear interpolation beyond the midpoint is required in S1; the average of the two flanking observations is the exact prescription.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_33"}, {"question": "For the normal distribution simultaneous equations problem, what is the danger of rounding $$\\sigma$$ to 2 significant figures before back-substituting to find $$\\mu$$? Illustrate with $$\\sigma \\approx 14.75$$ rounded to 15. (2 steps)", "answer": "- Step 1: If you round $$\\sigma = 14.75$$ to 15 and substitute into $$\\mu = 180 - 0.2533 \\times \\sigma$$: $$\\mu = 180 - 0.2533 \\times 15 = 180 - 3.80 = 176.20$$. The correct value is $$\\mu = 180 - 0.2533 \\times 14.75 = 180 - 3.74 = 176.26$$. The difference is about 0.06, which may seem small.\n- Step 2: But if the mark scheme allows tolerance of ¬Ī0.1 on $$\\mu$$, this rounding error alone consumes 60% of the allowance. Combined with any earlier rounding on $$z$$-values, you can easily be pushed outside the accepted range. The rule: carry full precision (4 d.p. for $$z$$, 2 d.p. for $$\\sigma$$ at most) through all working, and round only the final answers.\n\nMid-calculation rounding is the silent killer in simultaneous equation problems. The $$z$$-values from the table have 4 decimal places of precision ‚ÄĒ use all of them. Rounding $$1.6449$$ to $$1.6$$ loses 2.7% of the value, which propagates into $$\\sigma$$ and then amplifies in $$\\mu$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_59"}, {"question": "For a discrete random variable $$X$$, why is $$\\mathbb{E}\\!\\left(\\frac{1}{X}\\right)$$ generally not equal to $$\\frac{1}{\\mathbb{E}(X)}$$, and what is the correct computational procedure? (3 steps)", "answer": "- Step 1: Expectation is a weighted average of the transformed values, not a transform of the average. Because $$\\frac{1}{x}$$ is convex for positive $$x$$, Jensen‚Äôs inequality guarantees $$\\mathbb{E}[1/X] \\geq 1/\\mathbb{E}[X]$$, with equality only when $$X$$ is constant.\n- Step 2: The correct formula is $$\\mathbb{E}(g(X)) = \\sum g(x)P(X=x)$$.\n- Step 3: For each $$x$$, evaluate $$\\frac{1}{x}$$, multiply by $$P(X=x)$$, and sum. For example, when $$x=2$$ and $$P(X=2)=\\frac{1}{5}$$, the contribution is $$\\frac{1}{2} \\cdot \\frac{1}{5} = \\frac{1}{10}$$, not $$\\frac{1}{\\text{mean}}$$.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_12"}, {"question": "For an inverse-normal question ‚ÄĒ \"find $$w$$ such that $$P(X < w) = 0.15$$\" ‚ÄĒ how do you decide whether $$z$$ is positive or negative? (2 steps)", "answer": "- Step 1: Sketch the bell and shade the region $$P(X < w) = 0.15$$. Since $$0.15 < 0.5$$, the shaded region is the **left tail**, so $$w$$ lies **below** the mean.\n- Step 2: Hence $$z$$ is negative. Compute $$z$$ by symmetry: find $$z^* > 0$$ with $$\\Phi(z^*) = 0.85$$, then $$z = -z^*$$.\n\nAlways sketch first ‚ÄĒ it's the single best defence against sign errors.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_23"}, {"question": "When a question says \"find the probability that Bob buys carrots or onions but not both,\" a student writes $$P(C \\cup O)$$. Why is this wrong, and what should they write instead? (2 steps)", "answer": "- Step 1: $$P(C \\cup O)$$ is the probability of buying carrots OR onions OR BOTH ‚ÄĒ it includes the intersection. The phrase \"but not both\" explicitly excludes the case where Bob buys both carrots and onions. So $$P(C \\cup O) = w + x + y = 0.15 + 0.55 + 0.10 = 0.80$$, which is too large.\n- Step 2: The correct expression is $$P((C \\cup O) \\setminus (C \\cap O)) = P(C \\cap O') + P(C' \\cap O) = y + w = 0.10 + 0.15 = 0.25$$. This is the symmetric difference, not the union.\n\nTakeaway: \"Or\" in everyday language often means \"exclusive or\" (but not both). In probability notation, $$\\cup$$ is \"inclusive or.\" Read the question carefully for \"but not both.\"", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_60"}, {"question": "For ungrouped data with $$n$$ values, the Edexcel S1 quartile positions are $$Q_1 \\to \\frac{n+1}{4}$$, median $$\\to \\frac{n+1}{2}$$, $$Q_3 \\to \\frac{3(n+1)}{4}$$. Why is the formula $$(n+1)/4$$ used instead of $$n/4$$, and what do you do when the position is not an integer? (2 steps)", "answer": "- Step 1: The $$(n+1)$$ formula comes from the convention that for $$n$$ ordered values, the positions 1, 2, ‚Ä¶, n divide the number line into $$n+1$$ gaps (including the two tails). This ensures that the median of 3 values is the 2nd (position $$4/2 = 2$$), not position 1.5. It is the standard Edexcel convention for discrete/ungrouped data.\n- Step 2: When the position is not an integer ‚ÄĒ say position 8.5 ‚ÄĒ you average the 8th and 9th values. For example, if the 8th value is 45 and the 9th is 45, then $$Q_1 = (45+45)/2 = 45$$. If they differed, say 44 and 46, then $$Q_1 = (44+46)/2 = 45$$.\n\nTakeaway: Non-integer position ‚Üí interpolate (average the two flanking values). This is the Edexcel S1 standard.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_8"}, {"question": "Why is $$\\text{Var}(aX) = a^2\\,\\text{Var}(X)$$, not $$a\\,\\text{Var}(X)$$? Build the intuition. (3 steps)", "answer": "- Step 1: Variance measures squared deviation from the mean: $$\\text{Var}(X) = E[(X-\\mu)^2]$$.\n- Step 2: Multiplying $$X$$ by $$a$$ multiplies every deviation $$X - \\mu$$ by $$a$$. The SQUARED deviation is therefore multiplied by $$a^2$$.\n- Step 3: Hence $$\\text{Var}(aX) = a^2\\text{Var}(X)$$. Adding a constant $$b$$ doesn't change deviations at all, so $$\\text{Var}(aX+b) = a^2\\text{Var}(X)$$.\n\nIntuition check: doubling all values doubles the standard deviation (a linear measure of spread) but quadruples the variance.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_18"}, {"question": "Why must the point of intersection of the $$y$$-on-$$x$$ and $$x$$-on-$$y$$ regression lines always be $$(\\bar{x}, \\bar{y})$$, and how does this let you find $$\\sum x$$ without being given the raw data? (3 steps)", "answer": "- Step 1: Both least-squares regression lines are constructed to pass through the centroid of the data; the $$y$$-on-$$x$$ line minimizes vertical squared deviations through $$(\\bar{x}, \\bar{y})$$, and the $$x$$-on-$$y$$ line minimizes horizontal squared deviations through the same point.\n- Step 2: Therefore solving the two equations simultaneously yields coordinates equal to the sample means.\n- Step 3: Once $$\\bar{x}$$ is known, multiply by $$n$$: $$\\sum x = n\\bar{x}$$. For $$n=12$$ and $$\\bar{x} = \\frac{25}{12}$$, this immediately gives $$\\sum x = 25$$.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_21"}, {"question": "Can two events with non-zero probability be both mutually exclusive *and* independent? Prove your answer. (3 steps)", "answer": "- Step 1: Suppose $$A$$ and $$B$$ are mutually exclusive with $$P(A) > 0$$ and $$P(B) > 0$$. Then $$P(A \\cap B) = 0$$ by definition of mutual exclusivity.\n- Step 2: If they were also independent, then $$P(A \\cap B) = P(A) \\times P(B)$$. But $$P(A) > 0$$ and $$P(B) > 0$$ implies $$P(A) \\times P(B) > 0$$.\n- Step 3: This gives $$0 = P(A \\cap B) = P(A)P(B) > 0$$, a contradiction. Therefore two non-trivial events cannot be both mutually exclusive and independent. If events are mutually exclusive and have positive probability, they are *necessarily dependent*.\n\nTakeaway: Mutual exclusivity means \"they never happen together.\" Independence means \"knowing one happened doesn't change the probability of the other.\" These are fundamentally incompatible for events with positive probability.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_18"}, {"question": "Why does mentioning skewness, range, or outliers in a \"compare two distributions\" answer potentially hurt your mark?", "answer": "The mark scheme rewards exactly two structural comparisons (location via median, spread via IQR) each paired with a contextual interpretation. Extra comparisons aren't given credit, but they EAT TIME and ‚ÄĒ crucially ‚ÄĒ if any extra claim is factually wrong (e.g. miscalling the skew), the examiner can cancel an otherwise correct adjacent claim. Discipline beats enthusiasm here: write three sentences and move on.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_9"}, {"question": "What does the standardized variable $$Z = \\frac{X-\\mu}{\\sigma}$$ represent geometrically on the normal curve, and why does every normal distribution map to the same $$N(0,1)$$? (3 steps)", "answer": "- Step 1: $$Z$$ measures the signed distance from the mean in units of standard deviations; it is a change of units that removes the physical scale (grams, minutes, etc.).\n- Step 2: Subtracting $$\\mu$$ shifts the bell so its center lies at $$0$$; dividing by $$\\sigma$$ rescales the horizontal axis so the inflection points sit at $$\\pm 1$$.\n- Step 3: Because all normal densities share the same symmetric bell shape, this affine transformation makes every family member identical to the standard template, allowing a single cumulative table to serve all possible normal distributions.", "source": "Kimi K2.6 ‚Ď°", "_id": "kimi_2_16"}, {"question": "Why is rounding $$z$$-values too early in a normal simultaneous-equations problem catastrophic? (2 steps)", "answer": "- Step 1: $$\\sigma$$ is found by dividing a known difference (e.g. 28) by $$z_2 - z_1$$. A small absolute error in the $$z$$-values produces a noticeable error in $$\\sigma$$.\n- Step 2: $$\\mu$$ is then back-substituted using $$\\sigma$$ multiplied by another $$z$$-value ‚ÄĒ so the $$\\sigma$$ error compounds into $$\\mu$$. Keep $$z$$ to 4 d.p. throughout, round only the final $$\\mu, \\sigma$$.\n\nRule of thumb: never round a tabulated $$z$$ until the very last line.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_27"}, {"question": "\"Carrots or onions but not both\" ‚ÄĒ what is this event in terms of Venn Venn diagram regions, and what is its formal name? Given $$w = 0.15$$ and $$y = 0.10$$, compute its probability. (2 steps)", "answer": "- Step 1: \"Or but not both\" means the symmetric difference: the union minus the intersection. In region terms, it is $$w + y$$ (the two crescent-shaped regions, excluding the overlap). Formally, this is $$P((C \\cup O) \\setminus (C \\cap O)) = P(C \\cup O) - P(C \\cap O)$$, which equals $$(w + x + y) - x = w + y$$.\n- Step 2: $$w + y = 0.15 + 0.10 = 0.25$$.\n\nThe symmetric difference captures \"exactly one of the two events occurs.\" It excludes the intersection (both) and the outside (neither).", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_12"}, {"question": "Walk through standardisation of a normal RV ‚ÄĒ why does it work and what's the geometric picture? (3 steps)", "answer": "- Step 1: For $$X \\sim N(\\mu, \\sigma^2)$$, define $$Z = (X-\\mu)/\\sigma$$. Subtracting $$\\mu$$ centres the distribution at 0; dividing by $$\\sigma$$ rescales so the spread is 1.\n- Step 2: Linear transforms of a normal are normal, so $$Z \\sim N(0,1)$$, the standard normal whose CDF $$\\Phi(z)$$ is tabulated.\n- Step 3: $$P(X < a) = P\\!\\left(Z < \\frac{a-\\mu}{\\sigma}\\right) = \\Phi\\!\\left(\\frac{a-\\mu}{\\sigma}\\right)$$ ‚ÄĒ the table lookup gives the answer.\n\nGeometric picture: every normal curve is the standard bell, just shifted and stretched. Standardising \"undoes\" the shift and stretch so you can read from a single universal table.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_22"}, {"question": "Conceptually, why does the regression line $$y$$-on-$$x$$ generally NOT coincide with the regression line $$x$$-on-$$y$$, even though both describe the same data? (3 steps)", "answer": "- Step 1: $$y$$-on-$$x$$ minimises VERTICAL distance (errors in $$y$$): it answers \"predict $$y$$ given $$x$$\".\n- Step 2: $$x$$-on-$$y$$ minimises HORIZONTAL distance (errors in $$x$$): it answers \"predict $$x$$ given $$y$$\".\n- Step 3: The two minimisations are different optimisation problems unless the data is perfectly correlated ($$r = \\pm 1$$), in which case both lines collapse to the same line.\n\nThis is also why $$r^2 = b_{yx}\\cdot b_{xy} \\leq 1$$, with equality iff perfect correlation.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_50"}, {"question": "A stem-and-leaf diagram displays $$n = 33$$ ordered observations. Explain why the median position is given by $$\\frac{n+1}{2}$$, and describe precisely what you do when this position is an integer versus a half-integer such as $$8.5$$. (3 steps)", "answer": "- Step 1: The formula $$\\frac{n+1}{2}$$ places the median at the centre of the ordered dataset so that exactly half of the data values lie on each side in terms of rank; for $$n=33$$ this gives the $$17$$th value, which has $$16$$ values below and $$16$$ above.\n- Step 2: When the position is an integer (e.g., $$17$$), the median is simply the data value occupying that exact rank in the ordered list.\n+ Example: the $$17$$th kangaroo weight is $$57$$ kg.\n- Step 3: When the position is a half-integer (e.g., $$8.5$$ for $$Q_1$$), the quartile is the **arithmetic mean** of the two data values whose ranks straddle that position‚ÄĒin this case the $$8$$th and $$9$$th values.\n+ Example: averaging $$45$$ kg and $$45$$ kg yields $$Q_1 = 45$$ kg.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_6"}, {"question": "In a game with a stopping rule, Sally plays up to 3 games but stops immediately if she wins the first 2 or loses the first 2. If the first game is won with probability $$0.7$$, and subsequent win probabilities depend on the previous result, why does the tree diagram have only six complete paths rather than eight? (3 steps)", "answer": "- Step 1: A full binary tree for three games would normally have $$2^3 = 8$$ terminal branches, representing every sequence of win ($$W$$) and loss ($$L$$) over three games.\n- Step 2: However, the stopping rule truncates two branches: after $$WW$$ the turn ends, so there is no third game, and after $$LL$$ the turn ends, so there is no third game.\n- Step 3: This removes the paths $$WWL$$, $$WWW$$, $$LLW$$, and $$LLL$$ from the full tree, leaving exactly six valid paths: $$WW$$, $$WLW$$, $$WLL$$, $$LWW$$, $$LWL$$, and $$LL$$.", "source": "Kimi K2.6 ‚Ď†", "_id": "kimi_1_0"}, {"question": "When translating $$Y < c$$ where $$Y = k/X$$ and $$X > 0$$, the inequality flips: $$Y < c \\iff X > k/c$$. Why does the inequality flip, and what would happen if $$X$$ could be negative? (2 steps)", "answer": "- Step 1: Starting from $$k/X < c$$, multiply both sides by $$X$$. If $$X > 0$$, the inequality direction is preserved: $$k < cX$$, so $$X > k/c$$. The flip occurs because we are taking the reciprocal ‚ÄĒ as $$X$$ increases, $$1/X$$ decreases, so smaller values of $$Y$$ correspond to larger values of $$X$$.\n- Step 2: If $$X$$ could be negative, multiplying by $$X$$ would *reverse* the inequality, and the reciprocal would not be monotone. You would need to split into cases: $$X > 0$$ and $$X < 0$$. In S1, discrete RVs with $$Y = k/X$$ typically have $$X > 0$$, so the simple flip applies ‚ÄĒ but always verify the sign of $$X$$.\n\nTakeaway: For $$X > 0$$: $$k/X < c \\iff X > k/c$$. Always check that $$X$$ is positive before applying this flip.", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_29"}, {"question": "What is the key fact about the intersection point of the two regression lines (y on x and x on y)? (2 steps)", "answer": "- Step 1: The two regression lines $$y = a + b_{yx}x$$ (y on x) and $$x = c + b_{xy}y$$ (x on y) always intersect at the point $$(\\bar{x}, \\bar{y})$$. This is because both lines pass through the centroid of the data, which is the point of means.\n- Step 2: To find $$\\bar{x}$$ and $$\\bar{y}$$, solve the two equations simultaneously. For $$y = 1.4x + 1.5$$ and $$x = 1.2 + 0.2y$$: substituting gives $$x = 1.2 + 0.2(1.4x + 1.5) = 1.5 + 0.28x$$, so $$0.72x = 1.5$$, giving $$x = 25/12$$. Then $$y = 1.4(25/12) + 1.5 = 53/12$$.\n\n+ The centroid property holds because both regression lines minimise residuals in their respective directions, and the point of means has zero residual in both directions by construction.", "source": "GLM 5.1 ‚Ď°", "_id": "glm_2_44"}, {"question": "The Edexcel mark scheme for \"compare two distributions\" rewards a rigid template. What are the exactly three statements required, and what happens if you add extra claims? (3 steps)", "answer": "- Step 1: **Median comparison (location):** State which distribution has the greater/lesser median, with units and the variable name. E.g., \"The median weight in February is less than the median weight in December (57 kg).\"\n- Step 2: **IQR comparison (spread):** State which distribution has the greater/lesser IQR, and interpret: lesser IQR = more consistent / less variable. E.g., \"The IQR in February is greater than the IQR in December (18 kg), so the weights are more consistent in December.\"\n- Step 3: **No extra claims.** The mark scheme allocates marks specifically to median, IQR, and context. Extra claims about skewness, range, or outliers are ignored at best. If an extra claim is *wrong* (e.g., you miscall the skew), it can cancel a correct claim. Three sentences, nothing more.\n\nThe template is: median comparison ‚Üí IQR comparison ‚Üí one context sentence for each. Do not embellish. Do not mention range, skew, or outliers unless explicitly asked.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_10"}, {"question": "For a discrete random variable $$X$$, the expectation of a function $$g(X)$$ is $$E(g(X)) = \\sum g(x) \\cdot P(X = x)$$. Why is it *not* correct to compute $$g(E(X))$$ instead? Give a concrete counterexample. (3 steps)", "answer": "- Step 1: $$E(g(X))$$ applies the function to each value of $$X$$ first, then takes the probability-weighted average. $$g(E(X))$$ computes the average of $$X$$ first, then applies the function. These are different operations because $$g$$ is generally nonlinear.\n- Step 2: Counterexample: let $$X$$ take values 1 and 3 each with probability 0.5. Then $$E(X) = 2$$. Let $$g(X) = 1/X$$. Then $$E(1/X) = \\frac{1}{1}(0.5) + \\frac{1}{3}(0.5) = 0.5 + 0.1667 = 0.6667$$. But $$1/E(X) = 1/2 = 0.5 \\neq 0.6667$$.\n- Step 3: The inequality $$E(g(X)) \\neq g(E(X))$$ for nonlinear $$g$$ is a manifestation of Jensen's inequality. For convex functions, $$E(g(X)) \\geq g(E(X))$$; for concave functions, the reverse. The only exception is linear $$g$$: if $$g(X) = aX + b$$ then $$E(g(X)) = g(E(X))$$.\n\nAlways compute $$E(g(X))$$ by the sum formula, never by plugging $$E(X)$$ into $$g$$.", "source": "GLM 5.1 ‚ĎĘ", "_id": "glm_3_18"}, {"question": "In a tree diagram for a sequential process, the probability written on a second-level branch is a *conditional* probability. What does the branch label \"0.6\" after a first-game win actually represent, and why must it be conditional rather than marginal? (2 steps)", "answer": "- Step 1: The label \"0.6\" on the branch after a first-game win represents $$P(\\text{Win}_2 \\mid \\text{Win}_1) = 0.6$$. It is the probability of winning the second game *given that* the first game was won. It cannot be a marginal probability because the problem states that the probability of winning the next game *depends on* the outcome of the current game ‚ÄĒ after a loss the win probability is 0.2, not 0.6.\n- Step 2: This is precisely why we draw a tree diagram instead of using a single row of marginal probabilities. Each splitting point on the tree represents a different conditioning event, and the branches leaving that point must sum to 1 *for that point only*. The overall probability of any complete path is found by multiplying along branches: $$P(\\text{Win}_1 \\cap \\text{Win}_2) = P(\\text{Win}_1) \\times P(\\text{Win}_2 \\mid \\text{Win}_1) = 0.7 \\times 0.6 = 0.42.$$\n\nTakeaway: Tree branches encode conditional structure ‚ÄĒ the label on a branch is always \"probability of this outcome given everything that happened on the path so far.\"", "source": "GLM 5.1 ‚Ď†", "_id": "glm_1_0"}, {"question": "What is the conditional probability formula, and what is the most common mistake when applying it in tree diagram questions? (3 steps)", "answer": "- Step 1: The formula is $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)}$$. The denominator $$P(B)$$ is the total probability of the conditioning event. The numerator $$P(A \\cap B)$$ is the probability of BOTH events occurring together ‚ÄĒ the **intersection**, not just event $$A$$ alone.\n- Step 2: The most common mistake is putting a **marginal** probability in the numerator instead of the **joint** probability. For example, if asked for $$P(\\text{won 2 games} \\mid W_1)$$, the numerator must be $$P(\\text{won 2 games} \\cap W_1)$$, NOT $$P(\\text{won 2 games})$$. The marginal \"won 2 games\" includes the path $$LWW$$ which contradicts $$W_1$$.\n- Step 3: To get the correct numerator, list all path probabilities, then select only those paths satisfying BOTH conditions. For $$P(\\text{wo
