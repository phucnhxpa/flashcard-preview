e joint probability is NOT the product of marginals.\n- Step 3: The correct approach is to translate both events into conditions on X alone, then take the set intersection. $$\\{Y < 20\\} = \\{X > 1.5\\} = \\{2, 3, 4\\}$$ and $$\\{X < 3\\} = \\{1, 2\\}$$, so the intersection is $$\\{X = 2\\}$$.\n\nThe meta-lesson: whenever one variable is defined as a function of another, they are perfectly dependent. Never apply independence assumptions to functionally related variables.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_37"}, {"question": "S1 Oct 2023 Q1(a) — The printed tree diagram shows blank slots for 3rd-game branches after both WW and LL. What must you DO with those slots, and why? (3 steps)", "answer": "- Step 1: You must leave those slots BLANK — do NOT fill in any probabilities, and do NOT draw any branches extending from WW or LL into a third game. Write \"STOP\" or simply cross them out.\n- Step 2: The reason is that the stem says \"if she wins the first 2 games or loses the first 2 games, she will not play the 3rd game.\" WW and LL are TERMINAL paths — the turn ends after 2 games.\n- Step 3: If you assign 3rd-game probabilities to WW or LL, you invent phantom paths (like WWW or LLL) that don't exist in the experiment. This inflates your total probability above 1 and corrupts every downstream calculation in parts (b)–(e).\n\nThe tree diagram's printed space is a trap — it shows room for branches that the stop-rule forbids.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_0"}, {"question": "S1 Oct 2023 Q2(b) — For the \"show that there are 2 outliers\" mark, what explicit numerical layout must appear in your working beyond simply stating the fence values? (2 steps)", "answer": "- Step 1: You must write both fence calculations explicitly with the IQR substituted: \"Upper fence = Q₃ + 1.5 × IQR = 63 + 27 = 90\" and \"Lower fence = Q₁ − 1.5 × IQR = 45 − 27 = 18\". The mark scheme awards a method mark for this layout.\n- Step 2: After the layout, you must identify the specific data values that violate the fences: \"16 < 18\" and \"94 > 90\". Merely writing \"outliers are 16 and 94\" without showing the inequality check or the fence arithmetic risks losing the demonstration marks.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_29"}, {"question": "S1 Oct 2023 Q5(b) — Compute $$P(-0.8 < Z < 1.2)$$. Why must you NOT look up $$\\Phi(-0.8)$$ directly from the table, and what substitution do you make? (3 steps)", "answer": "- Step 1: The Edexcel normal table only lists $$\\Phi(z)$$ for $$z \\geq 0$$. There is no entry for $$z = -0.8$$. If you try to look it up, you'll either find nothing or mistakenly read the row for $$z = +0.8$$.\n- Step 2: The substitution is $$\\Phi(-z) = 1 - \\Phi(z)$$ for any positive $$z$$. So $$\\Phi(-0.8) = 1 - \\Phi(0.8) = 1 - 0.7881 = 0.2119$$.\n- Step 3: Now compute the probability: $$P(-0.8 < Z < 1.2) = \\Phi(1.2) - \\Phi(-0.8) = 0.8849 - 0.2119 = 0.6730$$.\n\nThe reflex: whenever you see a negative z-value in a probability calculation, immediately rewrite it using $$\\Phi(-z) = 1 - \\Phi(z)$$. Never attempt a direct table lookup for negative z.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_24"}, {"question": "S1 Oct 2023 Q5(c) — For $$P(\\mu - k < X < \\mu + k) = 0.95$$ with $$X \\sim N(210, 25^2)$$, why does the mean $$\\mu = 210$$ NOT appear in the final formula for k, even though the interval is centred on it? (3 steps)", "answer": "- Step 1: Standardise the interval: $$P\\left(\\frac{-k}{\\sigma} < Z < \\frac{k}{\\sigma}\\right) = 0.95$$. The mean cancels because the lower bound is $$\\frac{(\\mu - k) - \\mu}{\\sigma} = \\frac{-k}{\\sigma}$$ and the upper bound is $$\\frac{(\\mu + k) - \\mu}{\\sigma} = \\frac{k}{\\sigma}$$. The $$\\mu$$ subtracts out in both cases.\n- Step 2: This is a general property of symmetric intervals centred on the mean for any normal distribution. The width of the interval (in standard deviations) depends only on the confidence level, not on the mean. So $$k/\\sigma = 1.96$$ gives $$k = 1.96\\sigma = 1.96 \\times 25 = 49$$.\n- Step 3: The mean would only matter if you needed the actual endpoints of the interval ($$\\mu - k$$ and $$\\mu + k$$). But the question asks for $$k$$ (the half-width), which is purely a function of $$\\sigma$$ and the probability level.\n\nThe structural insight: for any $$N(\\mu, \\sigma^2)$$, the half-width of a symmetric central interval depends only on $$\\sigma$$ and the target probability. The mean sets the location, not the width.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "In what fixed order must you draw the 6 components of a box plot with outliers (Q2c), and why does this order prevent errors? (gap_05)", "answer": "- Step 1: Draw in this exact order: (1) Lower-outlier cross (×) at the outlier value, (2) Lower whisker from that outlier to the smallest NON-OUTLIER value, (3) Left side of box at Q₁, (4) Median line inside the box, (5) Right side of box at Q₃, (6) Upper whisker from Q₃ to the largest NON-OUTLIER value, (7) Upper-outlier cross (×) at the outlier.\n- Step 2: This order ensures whiskers always connect from the outlier cross to the box, and the box spans from Q₁ to Q₃ — preventing the common error of extending whiskers to the outliers themselves.\n- Step 3: The fixed order also guarantees the median sits inside the box (between Q₁ and Q₃), which is always true by definition.\n\nDrawing crosses BEFORE whiskers anchors where the whiskers must stop, eliminating the mistake of drawing whiskers to outlier values.", "source": "GAP-MiniMax ②", "_id": "minimax_2_3"}, {"question": "S1 Oct 2023 Q2(c) — When drawing a box plot that includes outliers, what is the fixed six-component order that prevents whiskers from being drawn to the wrong extreme, and why must the outlier crosses be placed before the whiskers in each direction? (3 steps)", "answer": "- Step 1: The fixed order is: (1) lower-outlier cross (×) at the outlier value, (2) lower whisker drawn from that cross to the smallest non-outlier, (3) left edge of the box at Q₁, (4) median line drawn inside the box, (5) right edge of the box at Q₃, (6) upper whisker drawn to the largest non-outlier, then the upper-outlier cross (×) beyond it. The box itself with its median is the central anchor.\n- Step 2: You must place the lower-outlier cross first because it anchors the fact that an outlier exists and must be separated. If you drew the whisker first, your hand would naturally extend the line to the absolute minimum (16 kg), swallowing the outlier into the whisker range. The cross acts as a physical stop sign.\n- Step 3: The same logic applies on the right: the whisker stops at the largest non-outlier (86 kg), and the cross is placed beyond it at 94 kg. This order guarantees that the whisker length represents the range of non-outlier data, while the crosses flag exceptions. Reversing the order collapses the distinction and loses the outlier mark.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_6"}, {"question": "S1 Oct 2023 Q2(d) — The comparison template requires you to state whether the February median is greater or less than the December median. What must you read from Figure 1 before you commit to the \"greater than\" or \"less than\" direction, and why can't you assume February is larger? (2 steps)", "answer": "- Step 1: You must read the actual position of the February median line on its box plot in Figure 1. The question does not tell you whether February kangaroos are heavier or lighter; it only asks you to compare the two distributions shown.\n- Step 2: If you assume a direction without looking at Figure 1, you risk writing the exact opposite of the truth. The mark scheme rewards the correct directional comparison, not a predetermined guess. The safe mechanical step is to locate the February median visually, compare it to December's 57 kg, and then write the inequality that matches what you see.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_37"}, {"question": "S1 Oct 2023 Q2(d) — The mark-scheme phrase \"interpret in context\" requires two specific ingredients in every comparison sentence. What are they, and why does writing \"the median of data 1 is larger than data 2\" forfeit the context mark even if the inequality is correct? (2 steps)", "answer": "- Step 1: The two required ingredients are: (i) explicit naming of the variable, for example \"weight of red kangaroos\" or \"kangaroo weights\", and (ii) the units of measurement, for example \"kg\". Both must appear in the same sentence as the comparison.\n- Step 2: Generic phrasing like \"data 1 is larger than data 2\" treats the distributions as abstract number lists. The mark scheme awards a context mark only when the reader can see that you have translated the statistical result back into the real-world scenario of the question. Without the variable name and units, the sentence could apply to any dataset, so the mark is lost.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_7"}, {"question": "S1 Oct 2023 Q5(e) — after converting $$P(Y > 180) = 0.40$$ to $$P(Y < 180) = 0.60$$, how do you immediately know the sign of $$z$$ is POSITIVE without opening the table?", "answer": "- Step 1: $$P(Y < 180) = 0.60 > 0.50$$, which means 180 lies to the RIGHT of the mean (above the median = mean for a normal).\n- Step 2: Any value to the right of the mean has a POSITIVE standardised z.\n- Step 3: So before opening the table, you know $$z_2 > 0$$ — look up $$\\Phi^{-1}(0.60) = 0.2533$$ and use it as-is.\n- Step 4: The rule: $$p > 0.5 \\Rightarrow z > 0$$; $$p < 0.5 \\Rightarrow z < 0$$.\n\nTakeaway: the 0.5 threshold on the probability determines the sign of z — a one-second sanity check that prevents sign errors in simultaneous equations.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "S1 Oct 2023 Q5(d) — When the question says \"the lightest 15% are classified as small\", what probability statement must you write down BEFORE standardising? (2 steps)", "answer": "- Step 1: \"Lightest 15%\" means the bottom 15% of the distribution by weight. The probability statement is $$P(X < w) = 0.15$$, where $$w$$ is the maximum weight of a small fruit.\n- Step 2: This is a LEFT-tail probability (less than 0.5), so the z-value will be NEGATIVE. Common mistake: treating it as $$P(X > w) = 0.15$$ (which would be the heaviest 15%). The word \"lightest\" is the cue for the lower tail.\n\nThe trigger phrase \"lightest X%\" always means $$P(X < w) = X/100$$, a lower-tail problem. \"Heaviest X%\" means $$P(X > w) = X/100$$, an upper-tail problem. Write the probability statement before touching the table.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_36"}, {"question": "S1 Oct 2023 Q4(d) — When solving the inequality 30/X < 20 to translate the event {Y < 20} into X-values, why does multiplying both sides by X NOT flip the inequality direction? Show the step explicitly. (2 steps)", "answer": "- Step 1: The support of X is {1, 2, 3, 4}, so X is always strictly positive. When you multiply both sides of an inequality by a positive quantity, the direction is preserved. Thus 30/X < 20 becomes 30 < 20X.\n- Step 2: If X could assume negative values, the multiplication would flip the direction and reverse the inequality sign. Because the random variable is defined only on positive integers, you are guaranteed that the algebraic manipulation is valid without case-splitting. The resulting condition is X > 1.5.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_30"}, {"question": "S1 Oct 2023 Q3(ii)(b) — after substituting independence $$P(F \\cap G) = P(F)P(G)$$ into the union formula, what is the clean factoring move that isolates P(G) in one line?", "answer": "- Step 1: Start with $$P(F \\cup G) = P(F) + P(G) - P(F)P(G)$$.\n- Step 2: **Collect P(G) terms** on one side: $$P(F \\cup G) - P(F) = P(G) - P(F)P(G)$$.\n- Step 3: **Factor P(G)**: $$P(F \\cup G) - P(F) = P(G)\\bigl(1 - P(F)\\bigr)$$.\n- Step 4: **Divide**: $$P(G) = \\frac{P(F \\cup G) - P(F)}{1 - P(F)}$$.\n- Step 5: Substitute: $$P(G) = \\frac{5/8 - 2/7}{1 - 2/7} = \\frac{19/56}{5/7} = \\frac{19}{40}$$.\n\nTakeaway: Factor BEFORE substituting numbers — the algebra reveals that $$1 - P(F) = P(F')$$ is the key denominator.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "S1 Oct 2023 Q1(a) — The tree diagram has branches after W and after L, with different conditional probabilities. What is the common mistake when filling in the \"after W\" vs \"after L\" probabilities? (2 steps)", "answer": "- Step 1: The stem states: \"If Sally wins a game the probability that she wins the next game is 0.6\" and \"If Sally loses a game the probability that she wins the next game is 0.2.\" After W: P(next W) = 0.6, P(next L) = 0.4. After L: P(next W) = 0.2, P(next L) = 0.8.\n- Step 2: The common mistake is swapping these — writing 0.2 for the win-after-win branch and 0.6 for the win-after-loss branch. This inverts the conditional structure and makes every path probability wrong. The guardrail: after a W, the win probability is HIGHER (0.6); after an L, the win probability is LOWER (0.2). Check that your branches respect this logic before computing anything.\n\nThe conditional probabilities change depending on the previous outcome. Read the stem twice, label each branch pair, and verify: win-after-win > win-after-loss.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_35"}, {"question": "S1 Oct 2023 Q6(a)(i) — When solving the two regression equations simultaneously, which equation do you substitute into which, and why does that direction keep the arithmetic cleaner than the reverse substitution? (2 steps)", "answer": "- Step 1: Substitute the y-on-x equation (y = 1.4x + 1.5) into the x-on-y equation (x = 1.2 + 0.2y). This means you replace y in the second equation with the expression from the first, leaving an equation in x alone.\n- Step 2: The reverse substitution — putting x = 1.2 + 0.2y into y = 1.4x + 1.5 — would require you to distribute 1.4 over the fractional term 0.2y, yielding 0.28y and a fractional constant 1.68, then rearrange to isolate y. By substituting y-on-x into x-on-y, you avoid fractional coefficients on the variable you are solving for and reach x directly with simpler decimals.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_19"}, {"question": "S1 Oct 2023 Q2(b) — For full marks on 'show that there are 2 outliers', what numerical layout must appear, beyond just stating the fence values? (3 steps)", "answer": "- Step 1: Write BOTH fences explicitly with full labelling: \"Upper fence = $$Q_3 + 1.5 \\times IQR = 63 + 1.5 \\times 18 = 63 + 27 = 90$$\" and \"Lower fence = $$Q_1 - 1.5 \\times IQR = 45 - 27 = 18$$.\" The mark scheme awards marks for the layout — showing the formula, the substitution, and the final value.\n- Step 2: Then explicitly compare: \"16 < 18, so 16 is an outlier. 94 > 90, so 94 is an outlier.\" Don't just say \"there are outliers\" — name the specific values and show the inequality.\n- Step 3: Optionally confirm the boundary: \"23 > 18 and 86 < 90, so no other values are outliers.\" This seals the argument that there are exactly 2.\n\nTakeaway: The mark scheme rewards the chain: formula → substituted numbers → fence value → named outlier with inequality. Write every link; don't skip from IQR to \"2 outliers\" in one leap.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "S1 Oct 2023 Q5(e) — After finding $$\\sigma \\approx 14.751$$, why must you back-substitute the UNROUNDED value into equation (2) to compute $$\\mu$$, rather than using the rounded 14.8? (3 steps)", "answer": "- Step 1: The formula is $$\\mu = 180 - 0.2533\\sigma$$. If you use $$\\sigma = 14.8$$, you get $$\\mu = 180 - 0.2533 \\times 14.8 = 180 - 3.749 = 176.251$$. But using the unrounded $$\\sigma = 14.751$$, you get $$\\mu = 180 - 3.737 = 176.263$$.\n- Step 2: The difference is about 0.012, which seems small — but Edexcel marks to 3 significant figures. If the true answer is 176.3 and your rounded-back-substitution gives 176.2, you've lost the accuracy mark. With larger coefficients or more extreme z-values, the shift can be 0.5 or more.\n- Step 3: The safe procedure: store the unrounded $$\\sigma$$ in your calculator (use the ANS key), then compute $$\\mu = 180 - 0.2533 \\times \\text{ANS}$$. Round only the FINAL answers for $$\\mu$$ and $$\\sigma$$ to the required precision.\n\nThe principle: rounding is a one-time event at the very end. Every intermediate value used in a subsequent calculation must be unrounded. Mid-calculation rounding is the single most common source of accuracy-mark loss in normal-distribution questions.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_15"}, {"question": "Q1(d) conditions on \"exactly 2 wins\" (3 paths) and Q1(e) on W₁ (4 paths). What is the universal 2-step procedure that handles both conditional-probability questions identically? (2 steps)", "answer": "- Step 1: **Identify the conditioning event B** and restrict your sample space to only those paths satisfying B. Enumerate the paths in B and sum their probabilities to get P(B), the denominator.\n+ For Q1(d): B = \"exactly 2 wins\" → paths {WW, WLW, LWW}, P(B) = 0.512.\n+ For Q1(e): B = \"won the first game\" → paths {WW, WLW, WLL}, P(B) = 0.7.\n- Step 2: **Within that restricted space**, enumerate the paths that ALSO satisfy event A (the numerator event). Compute P(A ∩ B) by summing those paths, then divide: P(A|B) = P(A ∩ B)/P(B).\n+ For Q1(d): A = \"won first 2 games\" = WW. Within {WW, WLW, LWW}, only WW qualifies. P(A ∩ B) = 0.42.\n+ For Q1(e): A = \"won exactly 2 games\". Within {WW, WLW, WLL}, paths WW and WLW qualify. P(A ∩ B) = 0.42 + 0.056 = 0.476.\n\nThe key discipline: ALWAYS restrict the sample space first, THEN find the numerator within it. Never use a numerator path that lies outside the conditioning event.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_18"}, {"question": "S1 Oct 2023 Q6(b) — There are two equivalent formula forms for $$S_{xy}$$: $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$ and $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$. Which one do you choose here, and what makes that choice automatic? (3 steps)", "answer": "- Step 1: Choose $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$. This is the preferred form because part (a)(i) just gave you $$\\bar{x} = \\frac{25}{12}$$ and $$\\bar{y} = \\frac{53}{12}$$ as fractions.\n- Step 2: Using the first form, you compute $$n\\bar{x}\\bar{y} = 12 \\times \\frac{25}{12} \\times \\frac{53}{12} = \\frac{25 \\times 53}{12} = \\frac{1325}{12}$$. The 12 in the numerator cancels the 12 from $$n$$, leaving clean fraction arithmetic.\n- Step 3: Using the second form, you'd need $$\\sum x = 25$$ and $$\\sum y = 53$$ (from part (a)(ii)), then compute $$\\frac{25 \\times 53}{12}$$. This is the SAME number, but it requires you to recall or re-derive $$\\sum x$$ and $$\\sum y$$ first — an extra step that introduces a potential error point.\n\nThe choice heuristic: when the question has already handed you the means, plug the means directly. Don't recompute from sums unless the means aren't available.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_17"}, {"question": "S1 Oct 2023 Q5(d) — You sketch the bell curve for a normal distribution and shade the left 15% tail. Before opening the inverse-normal table, how does the shading position alone fix the sign of z, and what would the sign be if you had shaded the right 15% tail instead? (2 steps)", "answer": "- Step 1: The sign of z is determined entirely by whether the shaded region lies to the left or the right of the mean. A left-tail region contains values below the mean, so its boundary z must be negative. A right-tail region contains values above the mean, so its boundary z must be positive.\n- Step 2: In Q5(d), shading the lightest 15% places the cut-off in the left tail, so z is negative. If the question had asked for the heaviest 15%, the shaded region would be on the right and z would be positive. This geometric check prevents the common sign error that occurs when students look up 0.15 directly and forget to negate the resulting z-value.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_17"}, {"question": "S1 Oct 2023 Q2(d) — why is adding an EXTRA wrong claim (e.g. about skew) worse than saying nothing, even if your main median/IQR comparisons are correct?", "answer": "- Step 1: Edexcel mark schemes for \"compare\" can apply a CANCELLATION rule: a contradictory or wrong extra claim can cancel a correct claim made alongside it.\n- Step 2: The marker takes the worse of the pair, not the better — so adding \"the distribution is positively skewed\" when you can't justify it from the figure can wipe out the spread-comparison mark.\n- Step 3: Discipline: stick to the template — median + IQR + context — and stop writing. Extra prose isn't just wasted ink, it's actively risky.\n\nTakeaway: silence beats speculation. The \"compare\" template is exactly 3 statements; anything more is exam-risk, not exam-reward.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "S1 Oct 2023 Q5(c) — In the symmetric interval P(210 − k < X < 210 + k) = 0.95, why does the mean μ = 210 vanish from the final formula for k, even though the interval is explicitly centred on it? (2 steps)", "answer": "- Step 1: Standardising subtracts the mean from both bounds: P(−k/σ < Z < k/σ) = 0.95. The 210 appears in the numerator of both standardised bounds as (210 − k − 210)/σ = −k/σ and (210 + k − 210)/σ = +k/σ. The mean cancels identically.\n- Step 2: Because the interval is symmetric about μ, the standardised bounds are mirror images around zero. The value of μ only sets the centre on the original axis; it does not affect the half-width k. Therefore k depends only on σ and the tail probability, giving k = 1.96σ. Any mean would yield the same k for a given σ and confidence level.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_31"}, {"question": "S1 Oct 2023 Q1(a) — What is the structural reason that WW and LL cannot have a 3rd game, even if the printed diagram looks like they should? (2 steps)", "answer": "- Step 1: The phrase \"she will not play the 3rd game\" is an absolute stop-rule tied to the state of the first two games. It removes those continuations from the sample space entirely, rather than giving them probability zero as an afterthought.\n- Step 2: In a tree diagram, a branch represents a possible future event. If the rules forbid the event, the branch does not exist. Drawing it as a live branch — even with a note — invites you to multiply by its probability later, which violates the stop-rule and corrupts the enumeration.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_0"}, {"question": "S1 Oct 2023 Q3(ii)(b) — After substituting P(F ∩ G) = P(F)P(G) into the union formula, what is the clean algebraic factoring move that isolates P(G) in a single line, and why does collecting terms in P(G) beat solving for P(G) by expanding everything? (2 steps)", "answer": "- Step 1: Starting from P(F ∪ G) = P(F) + P(G) − P(F)P(G), rearrange to group every term containing P(G): P(G) − P(F)P(G) = P(F ∪ G) − P(F). Factor P(G) on the left: P(G)(1 − P(F)) = P(F ∪ G) − P(F).\n- Step 2: This is superior to expanding because it keeps P(G) as a single algebraic atom. Dividing both sides by (1 − P(F)) yields P(G) immediately without intermediate fractions or cross-multiplication. Expanding would scatter denominators and invite arithmetic slips; factoring preserves the linear structure of the equation.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_12"}, {"question": "After enumerating all valid paths in Q1, you sum the probabilities and obtain 1.024. What specific violation of the stop rule does this excess signal, and what should the total be? (2 steps)", "answer": "- Step 1: A total of 1.024 means probability mass has been inflated, almost certainly because third-game probabilities were erroneously multiplied onto the terminal WW or LL paths.\n- Step 2: The sum must equal exactly 1.000; any deviation indicates a miscount of the stop rule or a duplicated path that must be corrected before proceeding to conditional parts.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_2"}, {"question": "In a regression question, after finding x̄ = 25/12 in part (a)(i), the word \"hence\" in part (a)(ii) signals what one-line identity, and what arithmetic cancellation confirms you have the right x̄? (2 steps)", "answer": "- Step 1: \"Hence\" means use the previous result. The identity is $$\\sum x = n \\cdot \\bar{x}$$. With n = 12 and $$\\bar{x} = 25/12$$: $$\\sum x = 12 \\times \\frac{25}{12} = 25$$.\n- Step 2: The arithmetic cancellation — the 12 in the denominator of x̄ cancels exactly with n = 12 — confirms you have the correct x̄. If x̄ had been something like 25/11, the n = 12 wouldn't cancel cleanly, which would be a red flag. The clean cancellation is your sanity check.\n\nThe principle: \"hence\" always means \"use the previous answer directly\". If you find yourself solving a fresh equation, re-read the question — you're missing the link.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "After finding σ ≈ 14.751 in a simultaneous-percentile question, why must you back-substitute the UNROUNDED value to compute μ, not the rounded 14.8? (2 steps)", "answer": "- Step 1: The formula is $$\\mu = 180 - 0.2533 \\times \\sigma$$. If you use $$\\sigma = 14.8$$, you get $$\\mu = 180 - 3.749 = 176.251$$. If you use the unrounded $$\\sigma = 14.751$$, you get $$\\mu = 180 - 3.737 = 176.263$$. The difference is about 0.012 — small but potentially enough to lose the accuracy mark.\n- Step 2: More dramatically, if you had rounded σ to 15 (2 s.f.), the error would be $$0.2533 \\times 0.249 \\approx 0.063$$, which could shift μ by enough to miss the accepted range. The principle: rounding errors propagate and amplify through multiplication. Keep full precision until the final answer.\n\nAlways store the unrounded value in your calculator and use it for back-substitution. Round only the final reported answer.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "S1 Oct 2023 Q2(d) — what is the trigger phrase \"interpret in context\", and what two ingredients must every comparison sentence contain to earn the context mark?", "answer": "- Step 1: \"Interpret in context\" is mark-scheme code: the bare comparison (\"median 1 > median 2\") only earns the comparison mark, not the context mark.\n- Step 2: Each comparison sentence needs:\n+ (i) The variable name explicitly (\"the median weight of kangaroos\" — not just \"the median\").\n+ (ii) The units explicitly (kg).\n- Step 3: Example template: \"The median weight of red kangaroos in December (57 kg) is greater than the median weight in February, suggesting kangaroos are heavier on average in December.\"\n\nTakeaway: a generic \"data 1 is bigger\" loses the context mark even if numerically true — name the variable and quote the unit.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "When enumerating all paths for a tree-diagram question like Q1, what three columns must your table have, and why is the third column the load-bearing one for parts (d) and (e)?", "answer": "The three columns are: **Path** (e.g. WW, WLW, WLL, LWW, LWL, LL), **Probability** (product of branch probabilities along that path), and **Wins** (the count of wins on that path).\n\nThe \"Wins\" column is load-bearing because parts (d) and (e) require you to FILTER the table — part (d) needs \"paths with exactly 2 wins\" (select rows where Wins = 2), and part (e) needs \"paths starting with W₁ that have exactly 2 wins\" (select rows where the path begins with W AND Wins = 2). Without the Wins column pre-computed, you must re-derive which paths qualify every time, which is error-prone and time-consuming.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "S1 Oct 2023 Q5(d) — after sketching the bell for \"lightest 15%\", how does the SHADING position determine the sign of z BEFORE you open the inverse-normal table?", "answer": "- Step 1: The \"lightest 15%\" sits in the **LEFT tail** of the bell — shade the left 15% region.\n- Step 2: The cut-off is to the LEFT of the mean → z must be **negative**.\n- Step 3: Tables only list positive z, so look up $$\\Phi^{-1}(0.85) = 1.0364$$ (the complement).\n- Step 4: Then **negate**: $$z = -1.0364$$.\n- Step 5: Unstandardise: $$w = \\mu + z\\sigma = 210 - 25 \\times 1.0364 \\approx 184$$ g.\n\nTakeaway: The sketch tells you the sign BEFORE the table. Left of mean = negative z, always.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "S1 Oct 2023 Q4(b) — Before computing E(1/X²) and Var(1/X), you should predict two LCMs to manage the denominators. What are they, which raw denominators produce the first LCM, and which denominators produce the second? (2 steps)", "answer": "- Step 1: For E(1/X²), the denominators of the raw terms are 10, 20, 30, and 40. The lowest common multiple of {10, 20, 30, 40} is 120. You predict this LCM before adding the fractions so you can convert each term mentally: 1/10 = 12/120, 1/20 = 6/120, 1/30 = 4/120, 1/40 = 3/120.\n- Step 2: For Var(1/X) = E(1/X²) − [E(1/X)]², the first term has denominator 24 (from 5/24) and the second term has denominator 25 (from (2/5)² = 4/25). The LCM of 24 and 25 is 600. Predicting this second LCM lets you plan the subtraction as 125/600 − 96/600 without hunting for a common denominator mid-calculation.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_13"}, {"question": "Why is adding an extra, incorrect skew claim in Q2(d) worse than omitting skew entirely, even if you also wrote a correct median comparison? (2 steps)", "answer": "- Step 1: Edexcel mark schemes can cancel a correct claim when a contradictory extra claim is added; the examiner takes the worse of the two statements.\n- Step 2: Therefore surplus prose is not merely wasted ink—it is actively risky because a wrong skew assertion can annihilate marks already earned by the correct median or IQR comparison.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_6"}, {"question": "S1 Oct 2023 Q6(a)(ii) — The word 'hence' triggers what one-line identity, and what arithmetic cancellation confirms you have the right $$\\bar{x}$$? (2 steps)", "answer": "- Step 1: \"Hence show that $$\\sum x = 25$$\" means: use the result from part (a)(i). The identity is $$\\sum x = n\\bar{x}$$. From (a)(i), the intersection of the regression lines is $$(\\bar{x}, \\bar{y}) = \\left(\\frac{25}{12}, \\frac{53}{12}\\right)$$, so $$\\bar{x} = \\frac{25}{12}$$.\n- Step 2: Then $$\\sum x = n\\bar{x} = 12 \\times \\frac{25}{12} = 25$$. The 12 cancels exactly — this cancellation is your confirmation that the fraction $$\\frac{25}{12}$$ was correct. If the 12 didn't cancel cleanly, you'd know to re-check part (a)(i).\n\nTakeaway: \"Hence\" = use the previous answer. The identity $$\\sum x = n\\bar{x}$$ converts a mean into a sum in one multiplication. If n cancels the denominator, you're on the right track.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_22"}, {"question": "S1 Oct 2023 Q3(i)(a) — The Venn diagram regions are labelled w, x, y, z in a standard left-to-right layout. What is the four-step dependency order for filling them, and why must you start with w rather than z? (3 steps)", "answer": "- Step 1: Start with w because the question gives the \"only O\" region directly: w = P(O ∩ C') = 0.15. This is the only region that does not depend on any other unknown.\n- Step 2: Derive x next from the total probability of O. Since P(O) = 1 − P(O') = 0.7 and the Venn partition gives P(O) = w + x, you obtain x = 0.7 − 0.15 = 0.55. You cannot compute x without knowing w.\n- Step 3: Derive y from the total probability of C. Since P(C) = 0.65 and P(C) = x + y, you get y = 0.65 − 0.55 = 0.10. Finally, derive z from the sum-to-1 axiom: z = 1 − (w + x + y) = 0.20. Starting with z would be impossible because z is defined as the residual after the other three regions are known.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_10"}, {"question": "S1 Oct 2023 Q6(c) — What exact wording in a regression question triggers the shortcut r² = b_yx · b_xy, and what missing wording would force you to compute S_xy / √(S_xx S_yy) from raw summaries instead? (2 steps)", "answer": "- Step 1: The trigger is the simultaneous statement of both regression equations — y on x and x on y — in the same bivariate dataset. When both slopes b_yx and b_xy are given explicitly, the identity r² = (slope_yx)(slope_xy) is immediately available.\n- Step 2: If the question gives only one regression equation and instead provides raw data or summaries like Σx, Σy, Σx², Σy², Σxy, then you lack the second slope and cannot use the shortcut. You must fall back to the long formula r = S_xy / √(S_xx S_yy). The presence of both equations is the green light; the presence of raw summaries is the red light.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_21"}, {"question": "S1 Oct 2023 Q6(c) — After computing $$r^2 = 1.4 \\times 0.2 = 0.28$$, you need to determine the sign of r. How do you decide, and what's the principle? (2 steps)", "answer": "- Step 1: The sign of r matches the common sign of the two regression slopes. Here, $$b_{yx} = 1.4 > 0$$ and $$b_{xy} = 0.2 > 0$$ — both are positive, so r is positive. Hence $$r = +\\sqrt{0.28} = 0.529$$.\n- Step 2: The principle: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$, and $$b_{yx} = \\frac{S_{xy}}{S_{xx}}$$, $$b_{xy} = \\frac{S_{xy}}{S_{yy}}$$. Since $$S_{xx} > 0$$ and $$S_{yy} > 0$$ always, the sign of each slope is the sign of $$S_{xy}$$, which is also the sign of r. If the slopes had opposite signs, that would be impossible for a valid dataset — it would indicate an arithmetic error.\n\nThe shortcut: both slopes positive → r positive; both negative → r negative (but $$r^2$$ is the same either way). If slopes disagree in sign, you've made a mistake.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_39"}, {"question": "In Q6(c), after computing r = 0.529 from the shortcut r² = b_yx · b_xy, how do you cross-check using the INVERTED slope formulas to back out S_xx and S_yy in two divisions? (3 steps)", "answer": "- Step 1: From $$b_{yx} = S_{xy}/S_{xx} = 1.4$$ and the known $$S_{xy} = 5.6$$, invert: $$S_{xx} = S_{xy}/b_{yx} = 5.6/1.4 = 4$$.\n- Step 2: From $$b_{xy} = S_{xy}/S_{yy} = 0.2$$, invert: $$S_{yy} = S_{xy}/b_{xy} = 5.6/0.2 = 28$$.\n- Step 3: Now verify via the long route: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}} = \\frac{5.6}{\\sqrt{4 \\times 28}} = \\frac{5.6}{\\sqrt{112}} = \\frac{5.6}{10.583} \\approx 0.529$$. This matches the shortcut answer, confirming no sign or arithmetic error.\n\nThis cross-check catches two common errors: (a) getting the wrong sign for r (both slopes positive → r positive), and (b) arithmetic mistakes in the product $$b_{yx} \\cdot b_{xy}$$. If the long route disagrees with the shortcut, re-examine both.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "S1 Oct 2023 Q6(c) — after getting $$r \\approx 0.529$$ via the shortcut, how do you cross-check using INVERTED slope formulas?", "answer": "- Step 1: From $$b_{yx} = \\frac{S_{xy}}{S_{xx}}$$: invert to get $$S_{xx} = \\frac{S_{xy}}{b_{yx}} = \\frac{5.6}{1.4} = 4$$.\n- Step 2: From $$b_{xy} = \\frac{S_{xy}}{S_{yy}}$$: invert to get $$S_{yy} = \\frac{S_{xy}}{b_{xy}} = \\frac{5.6}{0.2} = 28$$.\n- Step 3: Apply the long formula: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}} = \\frac{5.6}{\\sqrt{4 \\times 28}} = \\frac{5.6}{\\sqrt{112}} \\approx 0.529$$.\n- Step 4: Matches the shortcut — confirms no sign or arithmetic error.\n\nTakeaway: the two slope formulas can be inverted to BACK OUT $$S_{xx}$$ and $$S_{yy}$$ once you know $$S_{xy}$$ — useful as a 30-second sanity check, especially if any signs feel ambiguous.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "S1 Oct 2023 Q5(d) — After sketching the bell curve and shading the left 15% tail, how does the shading position determine the sign of z BEFORE you open the inverse-normal table? (3 steps)", "answer": "- Step 1: Sketch the bell with the mean at the centre. The \"lightest 15%\" means shade the LEFT tail — the region below some cutoff point that is clearly to the LEFT of the mean.\n- Step 2: Since the shaded region is left of the mean, the cutoff value is LESS than the mean, so the z-value must be NEGATIVE. This is a geometric fact: left-of-mean → negative z.\n- Step 3: To read the table (which gives $$\\Phi^{-1}(p)$$ for $$p \\geq 0.5$$), convert: $$P(Z < z) = 0.15$$ means $$P(Z > |z|) = 0.15$$, so $$P(Z < |z|) = 0.85$$. Look up $$\\Phi^{-1}(0.85) = 1.0364$$, then NEGATE: $$z = -1.0364$$.\n\nThe sketch-first discipline: the position of the shading (left vs right of mean) tells you the sign of z before any table lookup. If you skip the sketch, you might forget the negative sign.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "S1 Oct 2023 Q6(c) — After obtaining r ≈ 0.529 from the shortcut r² = b_yx · b_xy, how do you cross-check this using the inverted slope formulas to recover S_xx and S_yy in two quick divisions? (2 steps)", "answer": "- Step 1: Use b_yx = S_xy / S_xx = 1.4. Since you already found S_xy = 5.6 in part (b), divide to get S_xx = 5.6 / 1.4 = 4. Similarly, use b_xy = S_xy / S_yy = 0.2 to get S_yy = 5.6 / 0.2 = 28.\n- Step 2: Substitute these recovered values into the long formula r = S_xy / √(S_xx S_yy) = 5.6 / √(4 × 28) = 5.6 / √112 ≈ 0.529. If the shortcut had a sign error or arithmetic slip, this independent route would reveal a mismatch, serving as a verification layer.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_32"}, {"question": "S1 Oct 2023 Q1(d), Q1(e), Q4(d) — These three questions share an identical conditional-probability structure. What is the four-step drill that you should execute every time you see \"Find P(A | B)\" in a discrete setting, and why does writing the formula first prevent the common numerator/denominator mismatch? (3 steps)", "answer": "- Step 1: Step 1 — Write the definition P(A | B) = P(A ∩ B) / P(B) explicitly at the top of your working. This forces you to name two separate events before you substitute any numbers.\n- Step 2: Step 2 — Translate both A and B into the underlying outcome language (paths for Q1, x-values for Q4). Step 3 — Restrict the sample space to B and compute its total probability for the denominator. Step 4 — Within that restricted space, identify the overlap A ∩ B and sum its probability for the numerator.\n- Step 3: Writing the formula first prevents the mismatch because it visually separates the joint event from the marginal event. The common error in Q1(e) was using P(exactly 2 wins) as the numerator, but that is a marginal probability, not a joint one. The formula demands P(won 2 ∩ W₁), which immediately reveals that paths like LWW must be excluded.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_26"}, {"question": "S1 Oct 2023 Q6(b) — There are two formula forms for $$S_{xy}$$: $$\\sum xy - n\\bar{x}\\bar{y}$$ and $$\\sum xy - \\frac{\\sum x \\sum y}{n}$$. Which one do you choose, and what makes that choice automatic given Q6(a)(ii)? (2 steps)", "answer": "- Step 1: Choose $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$. This form plugs directly from part (a): you already have $$\\bar{x} = \\frac{25}{12}$$ and $$\\bar{y} = \\frac{53}{12}$$ from the intersection, and $$n = 12$$ from the stem. The term $$n\\bar{x}\\bar{y} = 12 \\times \\frac{25}{12} \\times \\frac{53}{12} = \\frac{25 \\times 53}{12} = \\frac{1325}{12}$$.\n- Step 2: The alternative form $$\\sum xy - \\frac{\\sum x \\sum y}{n}$$ requires you to compute $$\\sum x = 25$$ and $$\\sum y = 53$$ first, then form $$\\frac{25 \\times 53}{12}$$ — which is the SAME fraction but requires an extra step. When the means are already in your hand as fractions, the $$n\\bar{x}\\bar{y}$$ form is one step shorter and avoids recomputing the sums.\n\nTakeaway: When a previous part gives you $$\\bar{x}$$ and $$\\bar{y}$$ as fractions, use $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$. It's a direct plug-in; the other form makes you re-derive the sums.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "S1 Oct 2023 Q6(b) — there are two algebraic forms for $$S_{xy}$$. Which do you use, and what makes the choice automatic given part (a)?", "answer": "- Step 1: Two equivalent forms: $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$ and $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$.\n- Step 2: Part (a) just handed you $$\\bar{x} = \\frac{25}{12}$$ and $$\\bar{y} = \\frac{53}{12}$$ as clean fractions — so the first form plugs in directly.\n- Step 3: The second form would force you to compute $$\\sum x = 25$$ and $$\\sum y = 53$$ THEN multiply and divide by n — three extra arithmetic steps, three extra slip-risks.\n- Step 4: Computation: $$S_{xy} = \\frac{6961}{60} - 12 \\times \\frac{25}{12} \\times \\frac{53}{12} = \\frac{6961}{60} - \\frac{1325}{12} = \\frac{6961 - 6625}{60} = \\frac{336}{60} = 5.6$$.\n\nTakeaway: pick the formula whose inputs are already on your page; the choice between equivalent forms is about workflow, not correctness.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "S1 Oct 2023 Q6(c) — After computing $$r = 0.529$$ using the shortcut $$r^2 = b_{yx} \\cdot b_{xy}$$, how do you cross-check this result using the inverted slope formulas to back out $$S_{xx}$$ and $$S_{yy}$$? (3 steps)", "answer": "- Step 1: From the slope formulas, $$b_{yx} = \\frac{S_{xy}}{S_{xx}}$$, so $$S_{xx} = \\frac{S_{xy}}{b_{yx}} = \\frac{5.6}{1.4} = 4$$. This is a single division.\n- Step 2: Similarly, $$b_{xy} = \\frac{S_{xy}}{S_{yy}}$$, so $$S_{yy} = \\frac{S_{xy}}{b_{xy}} = \\frac{5.6}{0.2} = 28$$. Another single division.\n- Step 3: Now verify: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} \\cdot S_{yy}}} = \\frac{5.6}{\\sqrt{4 \\times 28}} = \\frac{5.6}{\\sqrt{112}} = \\frac{5.6}{10.583} \\approx 0.529$$. This matches the shortcut result, confirming no sign error or arithmetic slip.\n\nThe cross-check takes two divisions and one square root — about 30 seconds of work. If the two methods disagree, you've made an error in one of them. This is especially valuable for catching sign mistakes (if both slopes are positive, r must be positive).", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "S1 Oct 2023 Q2(c) — in what fixed order should you draw the 6 components of a box plot with outliers, and why does this order matter?", "answer": "- Step 1: Fixed drawing order:\n+ (1) Lower-outlier cross at 16.\n+ (2) Lower whisker from smallest non-outlier (23) toward the box.\n+ (3) Box from $$Q_1 = 45$$ to $$Q_3 = 63$$.\n+ (4) Median line inside the box at 57.\n+ (5) Upper whisker from the box to largest non-outlier (86).\n+ (6) Upper-outlier cross at 94.\n- Step 2: The order prevents the classic error of extending whiskers all the way to the outliers — you draw the crosses FIRST so the whisker endpoints can't accidentally touch them.\n\nTakeaway: outliers as crosses; whiskers stop at the most extreme NON-outlier. Drawing in fixed order makes this automatic.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "S1 Oct 2023 Q1 — after enumerating all paths, you sum the probabilities and get 1.024 instead of 1. What specific mistake does this signal?", "answer": "- Step 1: A sum greater than 1 means you've double-counted: most likely you wrote out a 3-game continuation after WW or LL when those should be terminal.\n- Step 2: For example, if you wrote WWW = $$0.7 \\times 0.6 \\times 0.6 = 0.252$$ in addition to WW = 0.42, you'd add 0.252 illegally.\n- Step 3: A sum less than 1 instead means you've missed a path (e.g. forgot LWL).\n- Step 4: The total = 1 check is non-negotiable; never proceed to parts (c)–(e) until it lands exactly.\n\nTakeaway: the sum-to-1 check is your stop-rule sanity test — use it before harvesting numerator probabilities.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "S1 Oct 2023 Q3(i)(a) — A student assigns $$w = 0.55$$ and $$x = 0.15$$, getting the regions swapped. What specific reading error causes this, and how do you prevent it? (3 steps)", "answer": "- Step 1: The error comes from not reading the Venn diagram's labelling carefully. The diagram labels $$w$$ as the O-only region and $$x$$ as the intersection region. The student saw \"P(O∩C') = 0.15\" and assigned it to $$x$$ (the intersection) instead of $$w$$ (the O-only region, since $$O \\cap C'$$ means \"in O but NOT in C\").\n- Step 2: The prevention: before writing any numbers, translate each region label into words. $$w = P(O \\cap C')$$ = \"O only\" = 0.15. $$x = P(O \\cap C)$$ = \"intersection\". Then verify: $$O \\cap C'$$ means \"in O and not in C\" — that's the crescent, not the overlap.\n- Step 3: A second check: the given $$P(O \\cap C') = 0.15$$ is a SMALLER number than the intersection (0.55). If you assign 0.55 to the O-only region, then $$P(O) = w + x = 0.55 + 0.15 = 0.70$$, which is correct — but the labels are still swapped, and parts (b) and (c) will use the wrong values for the wrong regions.\n\nThe guardrail: always re-draw the Venn diagram and label each region in words before substituting numbers. The printed labels $$w, x, y, z$$ are arbitrary — their definitions come from the diagram's geometry.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_41"}, {"question": "S1 Oct 2023 Q5(a) — When showing that P(X < 240) = 0.8849, what precision must you quote for Φ(1.20), and why is quoting 0.885 or 0.884 insufficient for the \"show that\" mark? (2 steps)", "answer": "- Step 1: You must quote Φ(1.20) = 0.8849 verbatim to four decimal places, exactly as it appears in the standard normal distribution table in the formula booklet. Truncating to 0.884 or rounding to 0.885 deviates from the tabulated value.\n- Step 2: A \"show that\" question requires the examiner to see the precise intermediate value that produces the given result. If you truncate early, the subsequent arithmetic may not hit 0.8849 exactly, causing the verifier to doubt your method. The mark scheme rewards the exact quotation because it demonstrates correct table use.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_16"}, {"question": "S1 Oct 2023 Q6(b) — When computing $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$ with $$\\bar{x} = 25/12$$ and $$\\bar{y} = 53/12$$, what fraction arithmetic trap should you watch for when computing $$n\\bar{x}\\bar{y}$$? (2 steps)", "answer": "- Step 1: The trap is premature decimal conversion. If you compute $$\\bar{x} \\approx 2.0833$$ and $$\\bar{y} \\approx 4.4167$$, then $$n\\bar{x}\\bar{y} \\approx 12 \\times 2.0833 \\times 4.4167 \\approx 110.4$$, which is a rounded version of $$\\frac{1325}{12} \\approx 110.417$$. The rounding error propagates into $$S_{xy}$$.\n- Step 2: The safe approach: compute $$n\\bar{x}\\bar{y} = 12 \\times \\frac{25}{12} \\times \\frac{53}{12} = \\frac{25 \\times 53}{12} = \\frac{1325}{12}$$. The 12 in the numerator cancels one 12 in the denominator, leaving a clean fraction. Then subtract from $$\\frac{6961}{60}$$ using LCM 60: $$\\frac{6961}{60} - \\frac{6625}{60} = \\frac{336}{60} = \\frac{28}{5}$$.\n\nThe rule: when means are fractions, keep everything in fractions until the final answer. The cancellations are exact; decimal approximations are not.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_43"}, {"question": "S1 Oct 2023 Q5(e) — After solving the simultaneous equations to find σ ≈ 14.751 (4 s.f.), why must you back-substitute the unrounded value into equation (2) to compute μ, and what magnitude of error can rounding σ to 14.8 introduce? (2 steps)", "answer": "- Step 1: Because μ = 180 − 0.2533·σ, any error in σ is amplified by the coefficient 0.2533. If you use the rounded value σ = 14.8, the product 0.2533 × 14.8 = 3.7488, whereas the exact product 0.2533 × 14.751 ≈ 3.736. The difference is roughly 0.0128 g, which can shift μ by more than 0.5 g when accumulated.\n- Step 2: Edexcel expects μ to be accurate to at least 3 s.f. at the final stage. Rounding an intermediate variable destroys the precision chain. The correct discipline is to store the full calculator value of σ (14.751...) and use it in the next line, rounding only the final answer for μ.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_18"}, {"question": "S1 Oct 2023 Q5(d) — after sketching the bell with the LEFT 15% tail shaded, how does the shading determine the sign of z BEFORE you open the inverse-normal table?", "answer": "- Step 1: The shaded cut-off lies to the LEFT of the mean (because the lightest 15% are below the mean).\n- Step 2: Any z-value to the left of the mean is NEGATIVE — this is fixed by the sketch alone.\n- Step 3: The table only returns positive z-values for $$p \\geq 0.5$$. So look up $$\\Phi^{-1}(0.85) = 1.0364$$, then NEGATE: $$z = -1.0364$$.\n- Step 4: Substitute: $$w = \\mu + z\\sigma = 210 - 1.0364 \\times 25 \\approx 184$$ g.\n\nTakeaway: sketch first → sign of z follows from geometry → table reading is mechanical. Never try to deduce the sign from the algebra alone.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "S1 Oct 2023 Q1(e) — A student computes $$P(\\text{won 2 games} \\mid W_1) = \\frac{P(\\text{exactly 2 wins})}{P(W_1)} = \\frac{0.512}{0.7}$$. Why is this numerator wrong, and what should it be? (3 steps)", "answer": "- Step 1: The numerator should be $$P(\\text{won 2 games} \\cap W_1)$$, not $$P(\\text{exactly 2 wins})$$. These are different events. \"Exactly 2 wins\" includes the path LWW, which starts with a loss — this path does NOT satisfy the condition $$W_1$$.\n- Step 2: The correct numerator includes only paths with exactly 2 wins that ALSO start with W: these are WW (0.42) and WLW (0.056). So $$P(\\text{won 2} \\cap W_1) = 0.42 + 0.056 = 0.476$$.\n- Step 3: The correct answer is $$\\frac{0.476}{0.7} = 0.68$$, not $$\\frac{0.512}{0.7} = 0.731$$. The difference (0.036) is exactly the probability of the LWW path, which was incorrectly included in the numerator.\n\nThe core principle: in $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$, the numerator is the INTERSECTION, not the marginal $$P(A)$$. The conditioning event B restricts the sample space, and the numerator must respect that restriction.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_42"}, {"question": "When solving two regression lines simultaneously (y = 1.4x + 1.5 and x = 1.2 + 0.2y), which equation should you substitute INTO which, and why? (2 steps)", "answer": "- Step 1: Substitute the y-on-x equation INTO the x-on-y equation. That is, replace y in $$x = 1.2 + 0.2y$$ with $$1.4x + 1.5$$.\n- Step 2: This direction keeps arithmetic cleanest because the x-on-y equation is already EXPLICIT in x (x = ...). Substituting into it gives $$x = 1.2 + 0.2(1.4x + 1.5)$$, which simplifies to $$x = 1.5 + 0.28x$$, and then $$00.72x = 1.5$$. One division yields x = 25/12. Going the other direction (substituting x into the y-on-x equation) would require rearranging x = 1.2 + 0.2y into $$y = 5x - 6$$ first, introducing fractions and extra steps.\n\nThe rule: substitute INTO the equation that is already solved for the target variable.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_15"}, {"question": "S1 Oct 2023 Q4(b) — Before computing Var(1/X), what two LCMs should you predict, and from which denominators? (2 steps)", "answer": "- Step 1: The first LCM comes from computing $$E(1/X^2)$$. The four terms have denominators {10, 20, 30, 40}, so the LCM is **120**. You should predict this before writing any addition — it tells you the common denominator to target.\n- Step 2: The second LCM comes from the variance step: $$\\text{Var}(1/X) = E(1/X^2) - [E(1/X)]^2 = \\frac{5}{24} - \\frac{4}{25}$$. The denominators are 24 and 25, so the LCM is **600**. Planning this ladder (120 → 600) before you start computing prevents mid-calculation scrambling and sign errors.\n\nTakeaway: Scan all denominators before you add. Predict the LCM, write it down, then convert every term to it. Two LCM jumps: 120 for $$E(1/X^2)$$, then 600 for the final variance.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "S1 Oct 2023 Q6(c) — What exact wording in a question stem TRIGGERS use of the shortcut $$r^2 = b_{yx} \\cdot b_{xy}$$, and what wording would force you to the long route instead? (2 steps)", "answer": "- Step 1: The trigger is the stem stating **both** regression equations — a y-on-x line AND an x-on-y line — for the same bivariate dataset. When you see \"the two regression equations are $$y = a + bx$$ and $$x = c + dy$$\", the shortcut applies because both slopes $$b_{yx}$$ and $$b_{xy}$$ are immediately readable.\n- Step 2: If the stem gives only ONE regression equation (e.g. \"the regression line of y on x is $$y = 1.4x + 1.5$$\") and asks for r, you CANNOT use the shortcut — you have only one slope. You must use the long route: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$, computing each S-value from the raw data or summary statistics.\n\nTakeaway: Two regression lines given → shortcut. One regression line given → long route. Count the equations before choosing your method.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_18"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "In S1 tree-diagram questions, what is the very first formula you must write down the moment you see the phrase \"given that\"? (2 steps)", "answer": "- Step 1: Write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ explicitly, before substituting any numbers. This forces you to identify the intersection event and the conditioning event separately.\n- Step 2: Only after writing the formula, enumerate which paths belong to the numerator ($$A \\cap B$$) and which belong to the denominator ($$B$$). The formula is your scaffolding — without it, you risk sliding a marginal probability into the numerator.\n\nThis discipline is the single highest-impact habit for conditional probability: every mark scheme awards M1 for the formula itself.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": true}, {"question": "S1 Oct 2023 Q1(e) — The learner computed $$P(\\text{won 2 games} \\mid W_1) = \\frac{0.512}{0.7}$$. The answer is wrong. What exactly is the conceptual error, and why does 0.512 not belong in the numerator? (3 steps)", "answer": "- Step 1: The numerator must be $$P(\\text{won 2 games} \\cap W_1)$$, not the marginal $$P(\\text{won 2 games}) = 0.512$$. The marginal 0.512 includes the path LWW, which has a Loss on game 1.\n- Step 2: Since we condition on $$W_1$$, every path in the numerator must have $$W_1$$ as its first game. LWW fails this — it starts with L — so it must be excluded from the numerator.\n- Step 3: The correct numerator is $$P(WW) + P(WLW) = 0.42 + 0.056 = 0.476$$, giving $$P = 0.476/0.7 = 0.68$$. The difference (0.512 vs 0.476) is exactly the LWW probability 0.036 that was illegally included.\n\nThe core insight: \"given B\" means *restrict your world to B*. Any outcome incompatible with B must be purged from the numerator.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": true}, {"question": "When a tree-diagram question says \"Sally wins the first 2 games OR loses the first 2 games, then she will not play the 3rd game,\" what structural implication does this have for the tree, and what verification must you perform at the end? (2 steps)", "answer": "- Step 1: The tree has **early-termination branches**: after WW and after LL, no third game is played. This means the tree has exactly 6 complete paths (WW, WLW, WLL, LWW, LWL, LL), not 8. You must not draw third-game branches after WW or LL.\n- Step 2: Verification — sum all 6 path probabilities and confirm they equal 1. Here: $$0.42 + 0.056 + 0.224 + 0.036 + 0.024 + 0.24 = 1.000$$. If the sum is not 1, you have either missed a branch or drawn one that should not exist.\n\nThis check catches the most common tree-diagram error: drawing a full binary tree when the problem's stopping rules prune it.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": true}, {"question": "In a tree diagram where \"the probability of winning the next game depends on whether the previous game was won or lost,\" what must you check before writing the probability on each branch? (2 steps)", "answer": "- Step 1: Identify what the **last outcome was** on the path leading to the current branch point. After a Win, the next-game-win probability is 0.6; after a Loss, it is 0.2. These are different numbers — the tree is not memoryless.\n- Step 2: At the third-game level, the same rule applies: after WL (last was L), the next-win probability is 0.2; after LW (last was W), the next-win probability is 0.6. You must trace the full path, not just look at the first game.\n\nThe pitfall: automatically copying the \"after W\" rate (0.6) onto every branch that follows any win, even when the immediately preceding game was a loss.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "When computing $$P(A \\mid B)$$ and you realise that $$A \\subseteq B$$ (every outcome in A is also in B), what simplification applies to the numerator, and why? (2 steps)", "answer": "- Step 1: If $$A \\subseteq B$$, then $$A \\cap B = A$$. Every element of A is already in B, so intersecting with B changes nothing. Therefore $$P(A \\cap B) = P(A)$$.\n- Step 2: The conditional probability simplifies to $$P(A \\mid B) = \\frac{P(A)}{P(B)}$$. In Q1(d), \"won the first 2 games\" ($$WW$$) is a subset of \"exactly 2 wins,\" so the numerator is just $$P(WW) = 0.42$$, not some harder-to-compute intersection.\n\nThis subset check saves time and avoids the error of double-counting or mis-identifying the intersection.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": true}, {"question": "S1 Oct 2023 Q2 — For discrete/ungrouped data in Edexcel S1, what formula gives the position of the lower quartile $$Q_1$$, and what do you do when the position is non-integer? (2 steps)", "answer": "- Step 1: The quartile position is $$Q_1 \\to \\frac{n+1}{4}$$. For $$n = 33$$, this gives $$\\frac{34}{4} = 8.5$$. Note: this uses $$n+1$$, not $$n$$ — Edexcel S1 convention for discrete data.\n- Step 2: A non-integer position (8.5) means the quartile falls between the 8th and 9th values. Take the average: $$Q_1 = \\frac{\\text{8th value} + \\text{9th value}}{2} = \\frac{45 + 45}{2} = 45$$.\n\nDo NOT round the position to the nearest integer and take that value alone — the averaging step is required and earns a method mark.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "What are the outlier fence formulas, and after computing them, how do you determine which data points are outliers? (2 steps)", "answer": "- Step 1: Compute $$\\text{IQR} = Q_3 - Q_1$$, then the fences: $$\\text{Lower fence} = Q_1 - 1.5 \\times \\text{IQR}$$ and $$\\text{Upper fence} = Q_3 + 1.5 \\times \\text{IQR}$$. Any data point strictly outside these fences is an outlier.\n- Step 2: Scan only the extreme data points — the smallest and largest values. With fences at 18 and 90: the minimum 16 is below 18 (outlier), the maximum 94 is above 90 (outlier), and the next extremes (23 and 86) are inside. You do not need to check every data point, only the tails.\n\nThe common pitfall: checking whether a data point equals the fence value. The definition says \"greater than\" or \"smaller than\" the fence, so a value exactly on the fence is NOT an outlier.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "When drawing a box plot that has outliers, where do the whiskers end, and how are outliers marked? (2 steps)", "answer": "- Step 1: The lower whisker extends to the **smallest data value that is NOT an outlier** (here, 23). The upper whisker extends to the **largest data value that is NOT an outlier** (here, 86). Whiskers do NOT extend to the fence boundaries themselves, nor to the outlier values.\n- Step 2: Each outlier is plotted as an individual cross (×) on the scale at its actual data value (here, × at 16 and × at 94).\n\nThe most common box-plot error: extending whiskers all the way to the minimum and maximum data values (16 and 94), which would hide the outliers and lose both the whisker mark and the outlier mark.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "S1 Oct 2023 Q2(d) — Edexcel asks you to \"compare two distributions, interpreting in context.\" What is the exact rigid template you must follow, and what must you NOT include? (2 steps)", "answer": "- Step 1: Write exactly three sentences: (1) \"The median of [Distribution A] is [greater/less] than the median of [Distribution B],\" (2) \"The IQR of [Distribution A] is [greater/less] than the IQR of [Distribution B],\" and (3) a context sentence interpreting each comparison using the variable name and units — e.g., \"This suggests that, on average, kangaroos are heavier in December\" and \"the smaller IQR indicates that December weights are more consistent.\"\n- Step 2: Do NOT mention skewness, range, standard deviation, outliers, or shape unless the question specifically asks. Extra claims are ignored at best and, if any is wrong, can cancel a correct claim. The mark scheme rewards only median + IQR + context.\n\nMr Fuat's dictum: \"For the IQR, if it is less, this means the data is more consistent.\" That one word — \"consistent\" — is the context interpretation the mark scheme wants.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "Why does Edexcel's mark scheme for \"compare distributions\" only reward median and IQR, and not range or standard deviation? (2 steps)", "answer": "- Step 1: The median and IQR are **resistant statistics** — they are not distorted by outliers. Range and standard deviation are sensitive to extreme values, so comparing them across distributions with different outlier structures can be misleading.\n- Step 2: In a box-plot question, the only reliable summary statistics you have are median, quartiles, and IQR. The mark scheme is designed to test whether you extract the right measures from the box plot, not whether you can free-associate about skewness.\n\nThe practical rule: if the question gives you box plots, compare medians and IQRs. If it gives you means and standard deviations, compare those instead.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "S1 Oct 2023 Q3(i)(a) — The Venn diagram has regions labelled w, x, y, z. The learner swapped w and x. What is the strategy to prevent this? (2 steps)", "answer": "- Step 1: Before writing any numbers, re-read the printed diagram and write down what each label represents in words: w = \"O only,\" x = \"O ∩ C,\" y = \"C only,\" z = \"outside both.\" This verbal labelling is your mapping from geometry to algebra.\n- Step 2: Only then substitute values. Since the question gives $$P(O \\cap C') = 0.15$$, and w is the \"O only\" region, w = 0.15. If you had assumed w = intersection without checking, you would assign 0.55 to w and lose all subsequent marks.\n\nThe pitfall is assuming a left-to-right or inside-out ordering. The exam setter can label regions in any order — always verify against the printed diagram.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "When a Venn diagram question gives you $$P(O') = 0.3$$, what is the immediate first step before you can fill in any region? (2 steps)", "answer": "- Step 1: Convert the complement: $$P(O) = 1 - P(O') = 1 - 0.3 = 0.7$$. You need P(O) because the Venn regions involving O are w + x, and you cannot solve for them from P(O') alone.\n- Step 2: Use $$P(O) = w + x$$ along with whichever of w or x you already know to find the other. Here, w = 0.15, so x = 0.7 − 0.15 = 0.55.\n\nThe principle: whenever the question gives a complement probability, immediately convert it to the direct probability. The Venn diagram operates on direct probabilities.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "What is the \"symmetric difference\" in a Venn diagram context, and how do you compute it from the regions? (2 steps)", "answer": "- Step 1: The symmetric difference is \"in A or in B but not in both\" — the two crescent-shaped regions, excluding the intersection. In region labels: w + y (the \"O only\" plus \"C only\" regions).\n- Step 2: Numerically: $$w + y = 0.15 + 0.10 = 0.25$$. This is also expressible as $$P(A \\cup B) - P(A \\cap B) = (w + x + y) - x = w + y$$, or equivalently as $$P(A) + P(B) - 2P(A \\cap B)$$.\n\nThe key: do NOT just compute $$P(A \\cup B)$$, which includes the intersection. The \"but not both\" clause subtracts it out.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "To show two events C and O are NOT statistically independent, what two numerical values must you compute and compare, and what final statement must you write? (2 steps)", "answer": "- Step 1: Compute both $$P(C \\cap O)$$ and $$P(C) \\times P(O)$$ separately. Here: $$P(C \\cap O) = x = 0.55$$, and $$P(C) \\times P(O) = 0.65 \\times 0.7 = 0.455$$.\n- Step 2: Since $$0.55 \\neq 0.455$$, conclude: \"Since $$P(C \\cap O) \\neq P(C) \\times P(O)$$, events C and O are not statistically independent.\"\n\nYou must show both numerical values — the mark scheme awards one mark for the comparison and one for the conclusion. Writing \"they're not independent because the numbers are different\" without showing both numbers loses the method mark.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Can two non-trivial events (both with positive probability) be simultaneously mutually exclusive AND independent? Why or why not? (2 steps)", "answer": "- Step 1: Mutually exclusive means $$P(A \\cap B) = 0$$. Independent means $$P(A \\cap B) = P(A) \\times P(B)$$. If both hold simultaneously, then $$P(A) \\times P(B) = 0$$.\n- Step 2: But $$P(A) > 0$$ and $$P(B) > 0$$ (non-trivial), so $$P(A) \\times P(B) > 0$$. Contradiction. Therefore, two non-trivial events cannot be both mutually exclusive and independent.\n\nIntuition: mutual exclusivity means the events \"repel\" each other (they never co-occur), while independence means they \"ignore\" each other. Repulsion and ignorance are incompatible unless one event is impossible.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "S1 Oct 2023 Q3(ii)(b) — You need to find $$P(G)$$ given $$P(F) = \\frac{2}{7}$$, $$P(F \\cup G) = \\frac{5}{8}$$, and F, G are independent. What is the critical substitution that unlocks the equation? (2 steps)", "answer": "- Step 1: Write the union formula: $$P(F \\cup G) = P(F) + P(G) - P(F \\cap G)$$. The unknown $$P(F \\cap G)$$ appears, but independence gives you $$P(F \\cap G) = P(F) \\times P(G) = \\frac{2}{7} P(G)$$.\n- Step 2: Substitute: $$\\frac{5}{8} = \\frac{2}{7} + P(G) - \\frac{2}{7}P(G) = \\frac{2}{7} + \\frac{5}{7}P(G)$$. Now $$P(G)$$ is the only unknown, and you solve: $$\\frac{5}{7}P(G) = \\frac{5}{8} - \\frac{2}{7} = \\frac{19}{56}$$, giving $$P(G) = \\frac{19}{40}$$.\n\nThe pitfall: writing the union formula but forgetting to invoke independence, leaving two unknowns ($$P(G)$$ and $$P(F \\cap G)$$) in one equation. Independence is the second equation you need.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "What is the formula for $$P(F \\cap G')$$ in terms of other probabilities, and why does it work? (2 steps)", "answer": "- Step 1: $$P(F \\cap G') = P(F) - P(F \\cap G)$$. The event F splits into two disjoint pieces: \"F and G\" and \"F and not G.\" Since these pieces partition F, their probabilities sum to P(F).\n- Step 2: If F and G are independent, an alternative route is $$P(F \\cap G') = P(F) \\times P(G')$$, because independence of F and G implies independence of F and G'. Both routes give the same answer; use whichever is computationally simpler.\n\nThis formula is essential for Venn diagram \"outside the intersection\" regions and for conditional probability where the complement event is the conditioning event.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "S1 Oct 2023 Q4(b) — When computing $$\\text{Var}(1/X)$$, what two quantities must you find first, and in what order? (2 steps)", "answer": "- Step 1: Compute $$E(1/X)$$ first (given as $$\\frac{2}{5}$$). Then compute $$E(1/X^2)$$ separately using the definition: $$E(1/X^2) = \\sum \\frac{1}{x^2} P(X=x)$$. These are two distinct expected values — you cannot get one from the other.\n- Step 2: Apply $$\\text{Var}(1/X) = E(1/X^2) - [E(1/X)]^2$$. With $$E(1/X^2) = \\frac{5}{24}$$ and $$[E(1/X)]^2 = \\frac{4}{25}$$, the variance is $$\\frac{5}{24} - \\frac{4}{25} = \\frac{29}{600}$$.\n\nThe common pitfall: confusing $$E(1/X^2)$$ with $$[E(1/X)]^2$$. They are not the same — variance requires both, and the difference is always non-negative (it equals the variance).", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": true}, {"question": "When computing $$E(g(X))$$ for a discrete random variable, what is the general formula, and what is the most common arithmetic pitfall? (2 steps)", "answer": "- Step 1: $$E(g(X)) = \\sum g(x) \\cdot P(X = x)$$. For each value of x, evaluate g(x), multiply by the corresponding probability, and sum over all x.\n- Step 2: The most common arithmetic pitfall is mismatched denominators when the g(x) values are fractions. Strategy: compute each product separately as a fraction, find the LCM of all denominators, convert each product to the common denominator, then sum. In Q4(b), the LCM of {10, 20, 30, 40} is 120.\n\nDo not convert to decimals mid-calculation — the rounding errors accumulate and can change the final answer, especially when the variance is a small difference of two larger numbers.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "If $$Y = a \\cdot g(X)$$ where a is a constant, what are $$E(Y)$$ and $$\\text{Var}(Y)$$ in terms of $$E(g(X))$$ and $$\\text{Var}(g(X))$$? What is the classic sign error? (2 steps)", "answer": "- Step 1: $$E(Y) = a \\cdot E(g(X))$$ and $$\\text{Var}(Y) = a^2 \\cdot \\text{Var}(g(X))$$. The expectation scales linearly, but the variance scales with the square of the constant.\n- Step 2: The classic error is writing $$\\text{Var}(aX) = a \\cdot \\text{Var}(X)$$ (forgetting the square). For Q4(c) with $$Y = 30/X$$: $$\\text{Var}(Y) = 30^2 \\times \\text{Var}(1/X) = 900 \\times \\frac{29}{600} = 43.5$$, not $$30 \\times \\frac{29}{600} = 1.45$$.\n\nIntuition: variance measures spread, and scaling by a factor a stretches the distribution in both directions by |a|, so the spread multiplies by a². If a is negative, the distribution flips but the spread is unchanged in magnitude.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "S1 Oct 2023 Q4(d) — You need $$P(X < 3 \\mid Y < 20)$$ where $$Y = 30/X$$. What is the critical first step, and why is treating X and Y as independent catastrophically wrong? (3 steps)", "answer": "- Step 1: Translate the condition \"$$Y < 20$$\" into a condition on X. Since $$Y = 30/X$$ and X > 0: $$30/X < 20 \\iff X > 30/20 = 1.5$$. So $$\\{Y < 20\\} = \\{X \\in \\{2, 3, 4\\}\\}$$.\n- Step 2: Also translate the event: $$\\{X < 3\\} = \\{X \\in \\{1, 2\\}\\}$$. The intersection is $$\\{X = 2\\}$$ (the only x-value in both sets).\n- Step 3: Now apply the conditional formula: $$P(X < 3 \\mid Y < 20) = \\frac{P(X = 2)}{P(X \\in \\{2,3,4\\})} = \\frac{1/5}{9/10} = \\frac{2}{9}$$.\n\nThe catastrophe: if you treat X and Y as independent and write $$P(X < 3) \\times P(Y < 20)$$, you get nonsense — Y is a deterministic function of X, so they are perfectly dependent. Always translate conditions on g(X) back to conditions on X.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "When translating an inequality $$g(X) < c$$ into a condition on X, what must you check about the monotonicity of g? Give a concrete example of what goes wrong. (2 steps)", "answer": "- Step 1: If g is strictly monotonic (always increasing or always decreasing) on the support of X, then $$g(X) < c$$ translates to a single inequality on X. For $$Y = 30/X$$ with X > 0, g is strictly decreasing, so $$Y < c \\iff X > 30/c$$.\n- Step 2: If g is NOT monotonic, the translation may yield a union of intervals. Example: if $$Y = X^2$$ and $$Y < 9$$, then $$X \\in (-3, 3)$$, which is a single interval. But $$Y > 9$$ gives $$X < -3$$ OR $$X > 3$$, which is two disjoint intervals. You must list all x-values in the support that satisfy the condition.\n\nIn S1, the discrete RV problems typically use monotonic g (like 1/X or aX + b), so a single inequality suffices — but always verify.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "S1 Oct 2023 Q5(a) — When asked to \"show that $$P(X < 240) = 0.8849$$\" for $$X \\sim N(210, 25^2)$$, what is the complete sequence of steps to earn both marks? (3 steps)", "answer": "- Step 1: Standardise: $$Z = \\frac{240 - 210}{25} = \\frac{30}{25} = 1.20$$. Write this calculation explicitly — the method mark is for correct standardisation.\n- Step 2: State: $$P(X < 240) = P(Z < 1.20)$$. Then look up $$\\Phi(1.20) = 0.8849$$ from the table, quoting the value to 4 decimal places.\n- Step 3: Conclude: $$P(X < 240) = 0.8849$$ as required. The \"show that\" format means you must display every step; skipping the standardisation or the table lookup loses the method mark even if the final number is correct.\n\nKey discipline: always write the Z-formula before reading the table. This is the normal-distribution equivalent of writing the conditional probability formula first.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "For a normal distribution probability question like $$P(190 < X < 240)$$, what visual step must you perform before any calculation, and how does it prevent sign errors? (2 steps)", "answer": "- Step 1: Sketch the bell curve with the mean marked, then shade the region between 190 and 240. This makes it visually obvious that the region straddles the mean (210), so the probability will be large (here 0.6730).\n- Step 2: The sketch prevents the error of computing $$\\Phi(1.2) - \\Phi(-0.8)$$ as $$0.8849 - 0.7881 = 0.0968$$ (forgetting that $$\\Phi(-0.8) = 1 - \\Phi(0.8) = 1 - 0.7881 = 0.2119$$). The sketch reminds you that the left boundary is below the mean, so its Z-value is negative, and you must use the complement.\n\nThe five-second sketch is the single best error-prevention tool in normal distribution questions.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": true}, {"question": "S1 Oct 2023 Q5(c) — \"Find k such that $$P(210 - k < X < 210 + k) = 0.95$$.\" What property of the normal distribution makes this a symmetric-interval problem, and how do you find k? (2 steps)", "answer": "- Step 1: The interval is centred on the mean (210), and the normal distribution is symmetric about its mean. Therefore the 0.95 probability splits equally: 0.025 in each tail, and 0.475 between the mean and each boundary.\n- Step 2: Find the z-value for cumulative probability $$0.5 + 0.475 = 0.975$$: from tables, $$z = 1.96$$. Then $$k/25 = 1.96$$, so $$k = 25 \\times 1.96 = 49$$.\n\nThe common mistake: looking up z for cumulative 0.95 (giving z ≈ 1.645) instead of 0.975. The 0.95 is the total central probability, not the cumulative probability up to the upper boundary.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "S1 Oct 2023 Q5(d) — \"The lightest 15% are classified as small. Find the maximum weight.\" What is the sign of the z-value, and why? (2 steps)", "answer": "- Step 1: \"Lightest 15%\" means $$P(X < w) = 0.15$$. This is a left-tail probability below the mean, so the z-value is negative. From tables: $$\\Phi(z) = 0.15$$, so $$z = -1.0364$$ (found by looking up $$\\Phi^{-1}(0.85) = 1.0364$$ and negating it).\n- Step 2: Apply $$w = \\mu + z\\sigma = 210 + (-1.0364)(25) = 210 - 25.91 = 184$$ g. The negative sign is essential — dropping it would give $$210 + 25.91 = 235.91$$, which is above the mean and clearly not in the \"lightest\" category.\n\nThe sketch discipline: if you shade the leftmost 15% of the bell, it's visually obvious that w is to the left of the mean, forcing a negative z.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "S1 Oct 2023 Q5(e) — You have two percentile conditions on Y ~ N(μ, σ²). What is the systematic approach to solve for μ and σ, and what is the critical subtraction trick? (3 steps)", "answer": "- Step 1: Convert each percentile to a z-equation. $$P(Y < 152) = 0.05 \\Rightarrow \\frac{152 - \\mu}{\\sigma} = -1.6449$$ (equation 1). $$P(Y > 180) = 0.40 \\Rightarrow P(Y < 180) = 0.60 \\Rightarrow \\frac{180 - \\mu}{\\sigma} = 0.2533$$ (equation 2).\n- Step 2: **Subtract** equation (1) from equation (2) to eliminate μ: $$\\frac{180 - 152}{\\sigma} = 0.2533 - (-1.6449) = 1.8982$$. This gives $$\\sigma = \\frac{28}{1.8982} = 14.75$$.\n- Step 3: Back-substitute into equation (2): $$\\mu = 180 - 0.2533 \\times 14.751 = 176.3$$.\n\nThe subtraction trick is the key: by subtracting, the μ terms cancel cleanly, leaving one equation in σ only. If you try to solve for μ first, you get a messy expression with σ still in it.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": true}, {"question": "In Q5(e), why must you convert \"$$P(Y > 180) = 0.40$$\" to \"$$P(Y < 180) = 0.60$$\" before looking up the z-value? (2 steps)", "answer": "- Step 1: The standard normal table (and your calculator's inverse-normal function) gives $$\\Phi(z) = P(Z < z)$$, which is a left-tail (cumulative) probability. The value 0.40 is a right-tail probability, so the table cannot directly give you the z-value for 0.40.\n- Step 2: Convert: $$P(Y > 180) = 0.40 \\iff P(Y < 180) = 1 - 0.40 = 0.60$$. Now look up $$\\Phi^{-1}(0.60) = 0.2533$$. The positive sign confirms that 180 is above the mean (which makes sense: 60% of values are below it).\n\nThe pitfall: looking up $$\\Phi^{-1}(0.40)$$ directly, which gives $$z = -0.2533$$ — the wrong sign. This would flip the position of 180 relative to the mean and produce an incorrect σ.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "In normal distribution simultaneous equations (Q5e), what precision rule must you follow for z-values, and what goes wrong if you violate it? (2 steps)", "answer": "- Step 1: Keep z-values to **at least 4 decimal places** throughout all working. Use −1.6449 and 0.2533, not −1.6 or 0.25. Round only at the very final answer.\n- Step 2: If you round z₁ = −1.6 and z₂ = 0.25, then the difference is 1.85 instead of 1.8982, giving σ = 28/1.85 = 15.14 instead of 14.75. The error of ~0.4 propagates into μ when you back-substitute: μ = 180 − 0.25 × 15.14 = 176.1 instead of 176.3. At the 3-s.f. level this can flip your answer.\n\nThe principle: in simultaneous equations where you subtract two close numbers, rounding errors amplify. The subtraction $$0.2533 - (−1.6449) = 1.8982$$ is not particularly sensitive, but earlier rounding (0.25 instead of 0.2533) loses 0.0033, which is a 1.7% relative error on the difference.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": true}, {"question": "S1 Oct 2023 Q6(a)(ii) — The question says \"Hence show that $$\\sum x = 25$$.\" What does \"hence\" signal, and what is the structural fact you must cite? (2 steps)", "answer": "- Step 1: \"Hence\" means you must use the result from the previous part — the intersection point $$(\\frac{25}{12}, \\frac{53}{12})$$. You are NOT allowed to compute $$\\sum x$$ from raw data.\n- Step 2: The structural fact: **the intersection of the two regression lines is $$(\\bar{x}, \\bar{y})$$**. Therefore $$\\bar{x} = \\frac{25}{12}$$, and $$\\sum x = n\\bar{x} = 12 \\times \\frac{25}{12} = 25$$.\n\nThe pitfall: treating \"hence show\" as a standalone problem and trying to find $$\\sum x$$ from some other method. The mark scheme awards the method mark specifically for citing the intersection = means principle
