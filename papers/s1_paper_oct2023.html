e (1) is the variance — it measures how much $$X$$ deviates from its mean on average (in a squared sense).", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "A simple mental-math exercise: If $$E(X) = 4$$ and $$\\text{Var}(X) = 9$$, find $$E(3X - 1)$$ and $$\\text{Var}(3X - 1)$$. (2 steps)", "answer": "- Step 1: $$E(3X - 1) = 3E(X) - 1 = 3 \\times 4 - 1 = 11$$. Expectation is linear: scale by 3, then shift by -1.\n- Step 2: $$\\text{Var}(3X - 1) = 3^2 \\times \\text{Var}(X) = 9 \\times 9 = 81$$. Variance scales by the SQUARE of the multiplier. The constant -1 disappears because shifting doesn't change spread.\n\nThe #1 error: writing $$\\text{Var}(3X - 1) = 3 \\times 9 = 27$$. The multiplier must be squared.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": false}, {"question": "A simple mental-math exercise: Two regression lines are $$y = 2x + 1$$ and $$x = 0.5y - 0.5$$. Find $$r^2$$ using the shortcut and determine the sign of $$r$$. (2 steps)", "answer": "- Step 1: Read off the slopes: $$b_{yx} = 2$$ (slope of $$y$$-on-$$x$$) and $$b_{xy} = 0.5$$ (slope of $$x$$-on-$$y$$, i.e. the coefficient of $$y$$). Then $$r^2 = 2 \\times 0.5 = 1$$.\n- Step 2: $$r = \\sqrt{1} = 1$$ (positive, since both slopes are positive). This means perfect positive correlation — all data points lie exactly on the regression line.\n\nWhen $$r^2 = 1$$, the two regression lines are just rearrangements of each other (solve one for $$x$$ and you get the other). This only happens with perfect linear correlation.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": true}, {"question": "Why can't two non-trivial mutually exclusive events be independent? Give a concrete example with $$P(A) = 0.3$$ and $$P(B) = 0.4$$. (3 steps)", "answer": "- Step 1: Mutually exclusive means $$P(A \\cap B) = 0$$. There is no overlap — if $$A$$ happens, $$B$$ cannot happen.\n- Step 2: Independence would require $$P(A \\cap B) = P(A) \\times P(B) = 0.3 \\times 0.4 = 0.12$$. But we already have $$P(A \\cap B) = 0$$.\n- Step 3: $$0 \\neq 0.12$$, so the events are not independent. In fact, mutual exclusivity creates strong negative dependence: knowing $$A$$ occurred tells you $$B$$ definitely did NOT occur (probability dropped from 0.4 to 0).\n\nIndependence means \"knowing $$A$$ doesn't change the probability of $$B$$.\" Mutual exclusivity means \"knowing $$A$$ eliminates the possibility of $$B$$.\" These are opposite behaviours.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": true}, {"question": "When the question gives $$P(O') = 0.3$$, what formula lets you find $$P(O)$$, and what's a common mistake in interpreting the complement notation? (2 steps)", "answer": "- Step 1: Use $$P(O) = 1 - P(O') = 1 - 0.3 = 0.7$$. The complement rule always applies: an event and its complement partition the sample space.\n- Step 2: The common mistake is confusing $$P(O')$$ with $$P(O)$$ — reading \"probability of not-O\" as \"probability of O.\" Always translate the notation: $$O'$$ = \"not O\" = complement. If the question says \"the probability Bob does NOT buy onions is 0.3,\" then $$P(O') = 0.3$$, not $$P(O) = 0.3$$.\n\nWrite the translation explicitly: \"$$P(O') = 0.3$$, so $$P(O) = 0.7$$\" before doing any further work.", "source": "GLM 5.1 ②", "_id": "glm_2_57", "judge_pick": false}, {"question": "S1 Oct 2023 Q5(a) — When a question says \"Show that $$P(X < 240) = 0.8849$$,\" what must you include in your working? (2 steps)", "answer": "- Step 1: Standardise explicitly: $$Z = \\frac{X - 210}{25}$$, so $$P(X < 240) = P(Z < 1.20)$$. Write the $$z$$-value calculation clearly.\n- Step 2: Quote the table value: $$\\Phi(1.20) = 0.8849$$. Do NOT just write the answer — the \"show that\" requires seeing the standardisation step and the table lookup. Quote to 4 d.p. as printed.\n\nThe method marks are for: (1) correct standardisation, (2) correct table lookup. Both must be visible.", "source": "GLM 5.1 ②", "_id": "glm_2_58", "judge_pick": false}, {"question": "What is the relationship $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$, and why is it equivalent to the formula-booklet version $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$? (2 steps)", "answer": "- Step 1: Since $$\\bar{x} = \\frac{\\sum x}{n}$$ and $$\\bar{y} = \\frac{\\sum y}{n}$$, we have $$n\\bar{x}\\bar{y} = n \\cdot \\frac{\\sum x}{n} \\cdot \\frac{\\sum y}{n} = \\frac{\\sum x \\sum y}{n}$$.\n- Step 2: Therefore $$\\sum xy - n\\bar{x}\\bar{y} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$. They are algebraically identical. The first form is more convenient when you've already computed $$\\bar{x}$$ and $$\\bar{y}$$ (as in Q6, where the intersection gives you the means directly).\n\nUse whichever form plugs in more easily from the information you've already computed. In Q6(b), the first form is natural because you just found $$\\bar{x}$$ and $$\\bar{y}$$ in part (a).", "source": "GLM 5.1 ②", "_id": "glm_2_59", "judge_pick": false}, {"question": "What are the three families of errors that Phuc consistently made across this paper, and what's the unifying theme in each? (3 steps)", "answer": "- Step 1: **Conditional probability sample-space discipline** (Q1d, Q1e, Q4d): treating \"given B\" as a casual hint rather than restricting the sample space. The fix: always write $$P(A|B) = P(A \\cap B)/P(B)$$ first, and verify the numerator is truly the intersection.\n- Step 2: **Over-eager prose in interpretation parts** (Q2d): writing extra claims beyond what the mark scheme rewards. The fix: rigid template — median + IQR + context, three sentences only.\n- Step 3: **Failure to spot structural shortcuts** (Q5e, Q6c): not recognising that the problem reduces to a 2×2 system once you read the right structural fact (intersection = means; two percentiles = two equations; two regression slopes → $$r^2 = b_{yx} b_{xy}$$). The fix: memorise the identities and check for them.\n\nThese three families account for the majority of lost marks. Fixing them would push the score from the current level to 65/75+.", "source": "GLM 5.1 ②", "_id": "glm_2_60", "judge_pick": true}, {"question": "In the formula $$\\text{Var}(g(X)) = E([g(X)]^2) - [E(g(X))]^2$$, what is $$E([g(X)]^2)$$, and how does it differ from $$[E(g(X))]^2$$? Use $$g(X) = 1/X$$ with a simple distribution to illustrate. (3 steps)", "answer": "- Step 1: $$E([g(X)]^2)$$ means: first square the function, then take the expectation. For $$g(X) = 1/X$$: $$E(1/X^2) = \\sum \\frac{1}{x^2} P(X=x)$$. This is the \"mean of the squares.\"\n- Step 2: $$[E(g(X))]^2$$ means: first take the expectation, then square the result. For $$g(X) = 1/X$$: $$[E(1/X)]^2 = (2/5)^2 = 4/25$$. This is the \"square of the mean.\"\n- Step 3: With a simple example ($$X = 1$$ or $$2$$, each with probability 0.5): $$E(1/X^2) = 1 \\times 0.5 + 0.25 \\times 0.5 = 0.625$$, while $$[E(1/X)]^2 = (0.75)^2 = 0.5625$$. The variance is $$0.625 - 0.5625 = 0.0625$$.\n\nThe order of operations matters critically. \"Mean of squares\" ≠ \"square of mean\" — the difference is the variance.", "source": "GLM 5.1 ②", "_id": "glm_2_61", "judge_pick": true}], "count": 62}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "S1 Oct 2023 Q1 — When a probability question contains the phrase \"given that\", what formula must you write down BEFORE substituting any numbers? (2 steps)", "answer": "- Step 1: Write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ explicitly at the top of your working. This forces you to identify the numerator as a **joint** probability and the denominator as a **marginal** probability before you touch any numbers.\n- Step 2: Only after the formula is written, identify which paths/events belong to $$A \\cap B$$ (the intersection) and which belong to $$B$$ (the condition), then substitute.\n\nThe discipline of writing the formula first prevents the single most common error: using a marginal probability in the numerator when the condition restricts the sample space.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "S1 Oct 2023 Q1(e) — In a conditional probability question $$P(\\text{won 2 games} \\mid W_1)$$, why is it WRONG to use $$P(\\text{exactly 2 wins}) = 0.512$$ as the numerator? (2 steps)", "answer": "- Step 1: The numerator must be the **joint** event $$P(\\text{won 2 games} \\cap W_1)$$, not the marginal $$P(\\text{exactly 2 wins})$$. The marginal \"exactly 2 wins\" includes the path $$LWW$$, which starts with a Loss — but the condition $$W_1$$ says the first game was a Win. That path contradicts the condition and must be excluded from the numerator.\n- Step 2: The correct numerator only counts paths with exactly 2 wins AND starting with $$W_1$$: these are $$WW$$ and $$WLW$$, giving $$0.42 + 0.056 = 0.476$$. Dividing by $$P(W_1) = 0.7$$ yields $$0.68$$.\n\nThe key insight: when conditioning on $$W_1$$, every path in the numerator must be consistent with $$W_1$$. The marginal \"exactly 2 wins\" folds in paths that violate the condition.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": true}, {"question": "S1 Oct 2023 Q1 — In a tree diagram where \"if she wins the first 2 games or loses the first 2 games, she will not play the 3rd game\", what is the trap about the third-game branches? (2 steps)", "answer": "- Step 1: The turn **stops** after $$WW$$ or $$LL$$ — there is no third-game branch from these outcomes. You must NOT draw third-game branches from the $$WW$$ and $$LL$$ nodes. This is a stopping rule that truncates the tree.\n- Step 2: Only the paths $$WL$$ and $$LW$$ continue to a third game. Crucially, the conditional probabilities on the third game depend on the **previous** outcome: after $$WL$$ (last was Loss), the next Win probability is $$0.2$$; after $$LW$$ (last was Win), the next Win probability is $$0.6$$.\n\nForgetting the stopping rule creates phantom branches; confusing which conditional rate applies to the third game swaps $$0.6$$ and $$0.2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": true}, {"question": "S1 Oct 2023 Q1 — After drawing a full tree diagram with all branches, what is the essential sanity check you must perform before answering any question part? (2 steps)", "answer": "- Step 1: Sum every path probability. The total must equal exactly 1. For this paper: $$0.42 + 0.056 + 0.224 + 0.036 + 0.024 + 0.24 = 1.000$$.\n- Step 2: Also check that at each splitting node, the branch probabilities sum to 1. For example, after a Win: $$P(\\text{next Win}) = 0.6$$ and $$P(\\text{next Loss}) = 0.4$$, summing to 1. After a Loss: $$P(\\text{next Win}) = 0.2$$ and $$P(\\text{next Loss}) = 0.8$$, summing to 1.\n\nIf either check fails, you have a labelling or multiplication error that will cascade through every part.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "S1 Oct 2023 Q1(d) — When computing $$P(A \\mid B)$$ and you realise that event $$A$$ is a subset of event $$B$$ (i.e. $$A \\subseteq B$$), what simplification can you apply to the numerator? (2 steps)", "answer": "- Step 1: If $$A \\subseteq B$$, then $$A \\cap B = A$$. Every outcome in $$A$$ is already in $$B$$, so the intersection collapses to just $$A$$.\n- Step 2: Therefore $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)} = \\frac{P(A)}{P(B)}$$. In Q1(d), \"won the first 2 games\" ($$WW$$) is a subset of \"exactly 2 wins\" (which is $$WW \\cup WLW \\cup LWW$$), so the numerator simplifies to just $$P(WW) = 0.42$$.\n\nThis subset check saves time and prevents the error of adding extra paths to the numerator that are already absorbed.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": true}, {"question": "S1 Oct 2023 Q2 — For Edexcel S1, what formula do you use for the positions of the median, $$Q_1$$, and $$Q_3$$ for **ungrouped/discrete** data? (2 steps)", "answer": "- Step 1: Use the $$(n+1)$$ versions: median at position $$\\frac{n+1}{2}$$, $$Q_1$$ at $$\\frac{n+1}{4}$$, $$Q_3$$ at $$\\frac{3(n+1)}{4}$$. This is the Edexcel convention for individual data points (stem-and-leaf, listed data).\n- Step 2: If the position is non-integer (e.g. $$8.5$$th value), average the two flanking values. For $$n = 33$$: $$Q_1$$ position $$= \\frac{34}{4} = 8.5$$, so $$Q_1 = \\frac{\\text{8th value} + \\text{9th value}}{2}$$.\n\nDo NOT use $$\\frac{n}{4}$$ (that's for grouped/continuous data in some specifications). The Edexcel S1 rule for discrete data is always $$(n+1)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "S1 Oct 2023 Q2(b) — What are the outlier fence formulas, and what must you explicitly show in your working? (2 steps)", "answer": "- Step 1: Lower fence $$= Q_1 - 1.5 \\times \\text{IQR}$$, Upper fence $$= Q_3 + 1.5 \\times \\text{IQR}$$, where $$\\text{IQR} = Q_3 - Q_1$$. For this paper: IQR $$= 63 - 45 = 18$$, so fences are $$45 - 27 = 18$$ and $$63 + 27 = 90$$.\n- Step 2: You must state the numerical fence values explicitly and then scan the data to identify which values fall outside. Here: $$16 < 18$$ (outlier) and $$94 > 90$$ (outlier). Also note the next values inside: $$23 > 18$$ and $$86 < 90$$, confirming exactly 2 outliers.\n\nThe mark scheme requires seeing the fence calculations, not just the conclusion.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "S1 Oct 2023 Q2(c) — On a box plot, where do the whiskers end, and how are outliers marked? (2 steps)", "answer": "- Step 1: Whiskers extend to the most extreme **non-outlier** values, NOT to the outliers themselves. Here: lower whisker goes to $$23$$ (smallest value above the lower fence of 18), upper whisker goes to $$86$$ (largest value below the upper fence of 90).\n- Step 2: Outliers are plotted as individual crosses (×) at their actual values ($$16$$ and $$94$$). The whisker line does NOT connect to them.\n\nThe common pitfall is extending the whisker all the way to $$16$$ or $$94$$ — this is wrong and loses the whisker mark.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "S1 Oct 2023 Q2(d) — When a question says \"compare the distributions\" and \"interpret in context\", what is the rigid template you must follow? (3 steps)", "answer": "- Step 1: Write exactly ONE comparison of **location** (medians): \"The median weight of [Distribution A] is greater/less than the median weight of [Distribution B] ([value] kg).\" Nothing more about location — no mean, no mode.\n- Step 2: Write exactly ONE comparison of **spread** (IQR): \"The IQR of [Distribution A] is greater/less than the IQR of [Distribution B] ([value] kg). If the IQR is less, this means the data are more consistent/less variable.\"\n- Step 3: Each comparison must include the variable name and units in context. That's it — three sentences total. Do NOT mention skewness, range, outliers, or symmetry unless specifically asked.\n\nExtra claims are ignored at best; if any extra claim is wrong (e.g. miscalling the skew), it can cancel a correct claim.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "Why is it dangerous to include extra observations (like skewness or range) in a \"compare two distributions\" answer when only median and IQR are required? (2 steps)", "answer": "- Step 1: The Edexcel mark scheme allocates marks specifically to the median comparison and the IQR comparison (plus context). Any extra statement earns zero marks — it's wasted time.\n- Step 2: More dangerously, if an extra claim is **incorrect** (e.g. you say \"the December data are positively skewed\" but they're actually negatively skewed), the examiner may cancel a correct claim elsewhere. The risk-reward is terrible: no upside, potential downside.\n\nStick to the template: median, IQR, context. Three sentences. Done.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": true}, {"question": "S1 Oct 2023 Q3(i)(a) — When a Venn diagram question gives you $$P(O') = 0.3$$ and asks you to find regions, what's the first conversion you must make? (2 steps)", "answer": "- Step 1: Convert the complement probability: $$P(O) = 1 - P(O') = 1 - 0.3 = 0.7$$. You need $$P(O)$$ directly to set up equations for the regions inside the Venn diagram.\n- Step 2: Use the region equations: $$P(O) = w + x$$ (the two regions inside the $$O$$ circle), and similarly $$P(C) = x + y$$. Since $$w = P(O \\cap C') = 0.15$$ is given, you get $$x = 0.7 - 0.15 = 0.55$$, then $$y = 0.65 - 0.55 = 0.10$$.\n\nThe pitfall is trying to work with $$P(O')$$ directly inside the Venn diagram — it's much cleaner to convert to $$P(O)$$ first.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "S1 Oct 2023 Q3(i)(a) — What labelling mistake did Phuc make, and how do you prevent it? (2 steps)", "answer": "- Step 1: Phuc swapped $$w$$ and $$x$$. He assigned $$w = 0.55$$ (the intersection) when the printed diagram labels $$w$$ as the \"$$O$$ only\" region. The value $$P(O \\cap C') = 0.15$$ corresponds to $$w$$ (onions only, no carrots), not $$x$$ (the overlap).\n- Step 2: Prevention: before substituting any numbers, re-read the printed diagram and write next to each letter what region it represents. $$w = O \\text{ only}$$, $$x = O \\cap C$$, $$y = C \\text{ only}$$, $$z = \\text{neither}$$. Only then start solving.\n\nThe diagram's letter assignments are arbitrary and vary by question — never assume left-to-right ordering.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "S1 Oct 2023 Q3(i)(b) — What does \"carrots or onions but not both\" translate to in terms of Venn diagram regions? (2 steps)", "answer": "- Step 1: \"Carrots or onions\" = the union $$C \\cup O$$, regions $$w + x + y$$. \"But not both\" = exclude the intersection $$C \\cap O$$, region $$x$$. So the desired set is the **symmetric difference** $$(C \\cup O) \\setminus (C \\cap O)$$.\n- Step 2: This equals $$w + y$$, the two \"crescent\" regions. With $$w = 0.15$$ and $$y = 0.10$$, the answer is $$0.25$$.\n\nThe symmetric difference is always the two outer crescents of a two-circle Venn diagram. It's also equal to $$P(C) + P(O) - 2P(C \\cap O)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "S1 Oct 2023 Q3(i)(c) — When asked to \"show that events are NOT statistically independent\", what must you write to secure both marks? (2 steps)", "answer": "- Step 1: Compute both $$P(A \\cap B)$$ and $$P(A) \\times P(B)$$ separately, with their numerical values. Here: $$P(C \\cap O) = x = 0.55$$ and $$P(C) \\times P(O) = 0.65 \\times 0.7 = 0.455$$.\n- Step 2: State the numerical inequality ($$0.55 \\neq 0.455$$) and conclude: \"Since $$P(C \\cap O) \\neq P(C) \\cdot P(O)$$, the events are not independent.\"\n\nYou must show both numerical values. Just writing \"$$P(C \\cap O) \\neq P(C)P(O)$$\" without numbers may lose the method mark.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "Can two non-trivial events (both with positive probability) be both mutually exclusive AND independent? Why or why not? (2 steps)", "answer": "- Step 1: No. If $$A$$ and $$B$$ are mutually exclusive with $$P(A) > 0$$ and $$P(B) > 0$$, then $$P(A \\cap B) = 0$$. But independence requires $$P(A \\cap B) = P(A) \\cdot P(B) > 0$$ (since both probabilities are positive).\n- Step 2: These two requirements contradict each other: $$0 \\neq P(A) \\cdot P(B) > 0$$. So mutually exclusive non-trivial events are always **dependent** — knowing one occurred tells you the other cannot have occurred.\n\nThis is a favourite exam trap: the question gives you $$P(F \\cap H) = 0$$ and asks about independence. The answer is always \"not independent\" when both events have non-zero probability.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "S1 Oct 2023 Q3(ii)(b) — When solving for $$P(G)$$ given that $$F$$ and $$G$$ are independent and $$P(F \\cup G) = \\frac{5}{8}$$, what substitution must you make before solving? (2 steps)", "answer": "- Step 1: Use the independence condition to substitute $$P(F \\cap G) = P(F) \\cdot P(G) = \\frac{2}{7} P(G)$$ into the union formula. The union formula is $$P(F \\cup G) = P(F) + P(G) - P(F \\cap G)$$.\n- Step 2: This gives $$\\frac{5}{8} = \\frac{2}{7} + P(G) - \\frac{2}{7}P(G) = \\frac{2}{7} + \\frac{5}{7}P(G)$$. Now factor out $$P(G)$$: $$\\frac{5}{7}P(G) = \\frac{5}{8} - \\frac{2}{7} = \\frac{19}{56}$$, so $$P(G) = \\frac{19}{56} \\times \\frac{7}{5} = \\frac{19}{40}$$.\n\nThe critical step is replacing $$P(F \\cap G)$$ with $$P(F) \\cdot P(G)$$ using independence — without this, you have one equation in two unknowns and cannot solve.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": true}, {"question": "What is the formula for $$P(A \\cap B')$$ in terms of other probabilities, and when is this useful? (2 steps)", "answer": "- Step 1: $$P(A \\cap B') = P(A) - P(A \\cap B)$$. Intuitively, the set $$A$$ splits into two parts: the part that overlaps with $$B$$, and the part that doesn't. Subtracting the overlap leaves the \"$$A$$ only\" region.\n- Step 2: This is useful when you know $$P(A)$$ and can find $$P(A \\cap B)$$ — especially when $$A$$ and $$B$$ are independent, so $$P(A \\cap B) = P(A)P(B)$$, giving $$P(A \\cap B') = P(A)(1 - P(B)) = P(A)P(B')$$.\n\nIn Q3(ii)(c), this gives $$P(F \\cap G') = \\frac{2}{7} - \\frac{19}{140} = \\frac{3}{20}$$, or equivalently $$\\frac{2}{7} \\times \\frac{21}{40} = \\frac{3}{20}$$.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": true}, {"question": "S1 Oct 2023 Q4(b) — When computing $$\\text{Var}\\!\\left(\\frac{1}{X}\\right)$$ for a discrete RV, what two quantities must you calculate, and what is the common arithmetic pitfall? (3 steps)", "answer": "- Step 1: You need $$E\\!\\left(\\frac{1}{X^2}\\right)$$ and $$\\left[E\\!\\left(\\frac{1}{X}\\right)\\right]^2$$. The variance formula is $$\\text{Var}(g(X)) = E(g(X)^2) - [E(g(X))]^2$$, so for $$g(X) = 1/X$$, you need $$E(1/X^2)$$.\n- Step 2: Compute $$E(1/X^2) = \\sum \\frac{1}{x^2} P(X=x)$$ term by term. The pitfall is messy common-denominator arithmetic: here the terms are $$\\frac{1}{10}, \\frac{1}{20}, \\frac{1}{30}, \\frac{1}{40}$$ with LCM 120.\n- Step 3: Always find the LCM of the denominators once and convert all terms before summing. Then for the final subtraction $$\\frac{5}{24} - \\frac{4}{25}$$, find a new common denominator (600). Convert to decimals only at the very end.\n\nFraction discipline: keep everything as exact fractions throughout. Premature decimal conversion introduces rounding errors that compound.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "S1 Oct 2023 Q4(c) — When $$Y = \\frac{30}{X}$$, what are $$E(Y)$$ and $$\\text{Var}(Y)$$ in terms of the moments of $$1/X$$? What is the common mistake with the variance? (2 steps)", "answer": "- Step 1: Since $$Y = 30 \\cdot \\frac{1}{X}$$, by linearity: $$E(Y) = 30 \\cdot E(1/X) = 30 \\times \\frac{2}{5} = 12$$. This is straightforward — the constant multiplies the expectation.\n- Step 2: $$\\text{Var}(Y) = 30^2 \\cdot \\text{Var}(1/X) = 900 \\times \\frac{29}{600} = 43.5$$. The common mistake is writing $$\\text{Var}(30 \\cdot 1/X) = 30 \\cdot \\text{Var}(1/X)$$ — FORGOTTEN THE SQUARE. The rule is $$\\text{Var}(aX) = a^2\\text{Var}(X)$$, always squared.\n\nMnemonic: variance is in squared units, so scaling by $$a$$ scales variance by $$a^2$$. If you double all values, the spread doubles too, so variance quadruples.", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": true}, {"question": "S1 Oct 2023 Q4(d) — When computing $$P(X < 3 \\mid Y < 20)$$ where $$Y = 30/X$$, what is the critical first step that Phuc missed? (2 steps)", "answer": "- Step 1: **Translate** the condition on $$Y$$ into a condition on $$X$$. Since $$Y = 30/X$$ and $$X > 0$$: $$Y < 20 \\iff \\frac{30}{X} < 20 \\iff X > \\frac{30}{20} = 1.5$$. So $$\\{Y < 20\\} = \\{X \\in \\{2, 3, 4\\}\\}$$.\n- Step 2: Now the conditional probability becomes $$P(X < 3 \\cap X > 1.5) / P(X > 1.5) = P(X = 2) / P(X \\in \\{2,3,4\\}) = \\frac{1/5}{9/10} = \\frac{2}{9}$$.\n\nThe pitfall is treating $$X$$ and $$Y$$ as independent and writing $$P(X = x) \\cdot P(Y = y)$$. They are NOT independent — $$Y$$ is a deterministic function of $$X$$. Always translate conditions on $$g(X)$$ back to conditions on $$X$$.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Why can you NOT treat $$X$$ and $$Y = g(X)$$ as independent random variables? (2 steps)", "answer": "- Step 1: $$Y$$ is completely determined by $$X$$. Knowing $$X$$ tells you $$Y$$ exactly (e.g. if $$X = 2$$ then $$Y = 15$$). There is zero uncertainty left in $$Y$$ once $$X$$ is known — the very opposite of independence.\n- Step 2: Independence requires $$P(X = x \\cap Y = y) = P(X = x) \\cdot P(Y = y)$$ for all $$x, y$$. But $$P(Y = 30/x \\mid X = x) = 1$$ (certainty), while $$P(Y = 30/x)$$ is generally less than 1. So the product rule fails.\n\nWhen $$Y = g(X)$$, you work entirely through $$X$$: translate events about $$Y$$ into events about $$X$$, then use the single distribution of $$X$$.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "S1 Oct 2023 Q4(d) — When translating $$Y < c$$ where $$Y = k/X$$ and $$X > 0$$, what inequality direction does the flip take, and why? (2 steps)", "answer": "- Step 1: $$Y < c \\iff k/X < c \\iff k < cX \\iff X > k/c$$ (dividing by the positive $$c$$ preserves the inequality direction). The inequality **flips** from $$<$$ to $$>$$ because you're taking the reciprocal of a positive quantity.\n- Step 2: If $$X$$ could be negative, the analysis would split into cases. But for a discrete RV with only positive values (here $$X \\in \\{1,2,3,4\\}$$), the translation is straightforward. Always check the sign of $$X$$ before flipping.\n\nThe key: reciprocation of a positive quantity reverses the inequality. $$\\frac{1}{x} < c \\iff x > \\frac{1}{c}$$ when $$x > 0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "S1 Oct 2023 Q5 — Before doing any calculation in a normal distribution question, what should you always draw? (2 steps)", "answer": "- Step 1: Sketch the bell curve with the mean labelled. Mark the boundary value(s) on the horizontal axis and **shade the region** whose probability you need.\n- Step 2: The sketch tells you: (a) whether the $$z$$-value is positive or negative (left of mean → negative), (b) whether to use $$\\Phi(z)$$ directly or compute $$1 - \\Phi(z)$$, (c) whether you're dealing with one tail or two.\n\nWithout the sketch, it's easy to misread \"more than 180\" as a left-tail problem, or forget that a below-mean percentile gives a negative $$z$$.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": false}, {"question": "S1 Oct 2023 Q5(b) — When computing $$P(a < X < b)$$ for a normal RV, what is the standard approach? (2 steps)", "answer": "- Step 1: Standardise both endpoints: $$P(a < X < b) = P\\!\\left(\\frac{a - \\mu}{\\sigma} < Z < \\frac{b - \\mu}{\\sigma}\\right)$$. For this paper: $$P(-0.8 < Z < 1.2)$$.\n- Step 2: Compute as $$\\Phi(z_{\\text{upper}}) - \\Phi(z_{\\text{lower}})$$. Here: $$\\Phi(1.2) - \\Phi(-0.8) = 0.8849 - (1 - 0.7881) = 0.8849 - 0.2119 = 0.6730$$. Use $$\\Phi(-z) = 1 - \\Phi(z)$$ for negative arguments.\n\nNever try to read \"between\" probabilities directly from the table — always express as a difference of two cumulative probabilities.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "S1 Oct 2023 Q5(c) — When asked to find $$k$$ such that $$P(\\mu - k < X < \\mu + k) = 0.95$$, what symmetry insight simplifies the problem? (2 steps)", "answer": "- Step 1: By symmetry of the normal distribution, the interval $$[\\mu - k, \\mu + k]$$ is centred on the mean. Total probability 0.95 means each tail has $$\\frac{1 - 0.95}{2} = 0.025$$.\n- Step 2: So $$P(Z < k/\\sigma) = 0.975$$, giving $$k/\\sigma = 1.96$$ (the 97.5th percentile of $$Z$$). Then $$k = \\sigma \\times 1.96 = 25 \\times 1.96 = 49$$.\n\nThe symmetry trick converts a two-tail problem into a single inverse-normal lookup. You never need to solve two equations — just one tail probability of $$1 - \\alpha/2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": true}, {"question": "S1 Oct 2023 Q5(d) — When finding a percentile below the mean (e.g. \"lightest 15%\"), what sign must the $$z$$-value have, and how do you find it from the tables? (2 steps)", "answer": "- Step 1: Below the mean → negative $$z$$. The tables only give $$\\Phi(z)$$ for positive $$z$$, so you look up the complement: $$P(Z < z) = 0.15$$ means $$P(Z > |z|) = 0.15$$, so $$P(Z < |z|) = 0.85$$.\n- Step 2: Find the $$z$$-value where $$\\Phi(z) = 0.85$$, which is approximately $$1.0364$$. Then your actual $$z = -1.0364$$, and the weight is $$w = \\mu + \\sigma \\cdot z = 210 + 25(-1.0364) = 184$$ g.\n\nThe sign comes from the sketch: if the shaded region is to the left of the mean, $$z$$ must be negative. Don't just take the absolute value from the table and forget the sign.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "S1 Oct 2023 Q5(e) — When given two percentile conditions on a normal distribution with unknown $$\\mu$$ and $$\\sigma$$, what is the solution strategy? (3 steps)", "answer": "- Step 1: Convert each percentile to a standardised equation. \"5% weigh less than 152\" gives $$\\frac{152 - \\mu}{\\sigma} = -1.6449$$. \"40% weigh more than 180\" gives $$P(Y < 180) = 0.60$$, so $$\\frac{180 - \\mu}{\\sigma} = 0.2533$$.\n- Step 2: **Subtract** the two equations to eliminate $$\\mu$$: $$\\frac{180 - 152}{\\sigma} = 0.2533 - (-1.6449) = 1.8982$$, giving $$\\sigma = \\frac{28}{1.8982} \\approx 14.8$$.\n- Step 3: Back-substitute into either equation to find $$\\mu$$. Using equation (2): $$\\mu = 180 - 0.2533 \\times 14.751 \\approx 176.3$$.\n\nSubtracting first is cleaner than substitution because it avoids dividing by expressions involving both $$\\mu$$ and $$\\sigma$$.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": false}, {"question": "S1 Oct 2023 Q5(e) — What precision pitfall did Phuc fall into, and how do you avoid it? (2 steps)", "answer": "- Step 1: Phuc rounded the inverse-normal $$z$$-values too early (e.g. using $$-1.64$$ instead of $$-1.6449$$). This introduces error that compounds when you back-substitute, destroying the accuracy of $$\\mu$$.\n- Step 2: Keep all $$z$$-values to **4 decimal places** throughout your working (as printed in the table: $$-1.6449$$, $$0.2533$$). Round only the final answers to the required precision (3 s.f.).\n\nThe rule: carry maximum precision through intermediate steps; round only at the very end. This is especially critical when subtracting two similar quantities (catastrophic cancellation amplifies rounding errors).", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": true}, {"question": "S1 Oct 2023 Q5(e) — When the question says \"5% weigh less than 152 g and 40% weigh more than 180 g\", what conversion must you make to the second condition before looking up $$z$$-values? (2 steps)", "answer": "- Step 1: \"40% weigh more than 180\" means $$P(Y > 180) = 0.40$$. The tables give cumulative probabilities $$P(Z < z)$$, so convert: $$P(Y < 180) = 1 - 0.40 = 0.60$$.\n- Step 2: Now look up $$\\Phi^{-1}(0.60) = 0.2533$$. If you had tried to look up \"0.40\" directly, you'd get a negative $$z$$-value ($$-0.2533$$), which would be wrong because 180 is above the mean.\n\nThe trigger: any \"more than\" or \"greater than\" probability must be converted to a \"less than\" probability before using the standard normal table.", "source": "GLM 5.1 ③", "_id": "glm_3_28", "judge_pick": false}, {"question": "S1 Oct 2023 Q6(a)(ii) — The question says \"Hence show that $$\\sum x = 25$$\". What does \"hence\" signal, and what fact must you use? (2 steps)", "answer": "- Step 1: \"Hence\" means you MUST use the result from the previous part. You cannot start fresh. The previous part found the intersection point $$\\left(\\frac{25}{12}, \\frac{53}{12}\\right)$$.\n- Step 2: The structural fact is: **the intersection of the two regression lines is $$(\\bar{x}, \\bar{y})$$**. So $$\\bar{x} = \\frac{25}{12}$$, and $$\\sum x = n\\bar{x} = 12 \\times \\frac{25}{12} = 25$$.\n\nIf you find yourself computing $$\\sum x$$ from scratch without referencing the intersection point, you've missed the \"hence\" link and may lose the method mark.", "source": "GLM 5.1 ③", "_id": "glm_3_29", "judge_pick": false}, {"question": "Why does the intersection of the two regression lines equal $$(\\bar{x}, \\bar{y})$$? (2 steps)", "answer": "- Step 1: Both regression lines pass through the point $$(\\bar{x}, \\bar{y})$$. The $$y$$-on-$$x$$ line satisfies $$\\bar{y} = a + b\\bar{x}$$ (by the formula $$a = \\bar{y} - b\\bar{x}$$). Similarly, the $$x$$-on-$$y$$ line satisfies $$\\bar{x} = c + d\\bar{y}$$.\n- Step 2: Since both lines pass through $$(\\bar{x}, \\bar{y})$$, and two non-parallel lines intersect at exactly one point, that intersection must be $$(\\bar{x}, \\bar{y})$$.\n\nThis is a fundamental property: the point of means is the unique point shared by both regression lines. It's the \"pivot\" about which both lines rotate.", "source": "GLM 5.1 ③", "_id": "glm_3_30", "judge_pick": true}, {"question": "S1 Oct 2023 Q6(b) — When computing $$S_{xy}$$ given $$\\sum xy$$, $$\\bar{x}$$, and $$\\bar{y}$$, which form of the formula is most convenient and why? (2 steps)", "answer": "- Step 1: Use $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$. This plugs directly from the quantities you've already found: $$\\sum xy = \\frac{6961}{60}$$, $$n = 12$$, $$\\bar{x} = \\frac{25}{12}$$, $$\\bar{y} = \\frac{53}{12}$$.\n- Step 2: The alternative form $$S_{xy} = \\sum xy - \\frac{\\sum x \\cdot \\sum y}{n}$$ is equivalent but requires computing $$\\sum x = 25$$ and $$\\sum y = 53$$ first. Both work, but the first form flows directly from part (a).\n\nKeep fractions throughout: $$n\\bar{x}\\bar{y} = 12 \\times \\frac{25}{12} \\times \\frac{53}{12} = \\frac{25 \\times 53}{12} = \\frac{1325}{12}$$. Don't convert to decimals mid-calculation.", "source": "GLM 5.1 ③", "_id": "glm_3_31", "judge_pick": false}, {"question": "S1 Oct 2023 Q6(c) — When BOTH regression equations are given, what shortcut identity lets you find the PMCC $$r$$ without computing $$S_{xx}$$ or $$S_{yy}$$? (2 steps)", "answer": "- Step 1: The identity is $$r^2 = b_{yx} \\cdot b_{xy}$$, where $$b_{yx}$$ is the slope of the $$y$$-on-$$x$$ line and $$b_{xy}$$ is the slope of the $$x$$-on-$$y$$ line. Here: $$r^2 = 1.4 \\times 0.2 = 0.28$$.\n- Step 2: Take the square root and determine the sign: $$r = \\sqrt{0.28} \\approx 0.529$$. Since both slopes are positive, $$r$$ is positive (they must have the same sign).\n\nThis shortcut completely bypasses the need for $$S_{xx}$$, $$S_{yy}$$, $$\\sum x^2$$, or $$\\sum y^2$$. Phuc got stuck trying to compute $$S_{xx}$$ from $$\\sum x^2$$ (which wasn't given) — the identity makes all of that unnecessary.", "source": "GLM 5.1 ③", "_id": "glm_3_32", "judge_pick": true}, {"question": "Why does the identity $$r^2 = b_{yx} \\cdot b_{xy}$$ hold? (2 steps)", "answer": "- Step 1: By definition, $$b_{yx} = \\frac{S_{xy}}{S_{xx}}$$ and $$b_{xy} = \\frac{S_{xy}}{S_{yy}}$$. Multiplying: $$b_{yx} \\cdot b_{xy} = \\frac{S_{xy}}{S_{xx}} \\cdot \\frac{S_{xy}}{S_{yy}} = \\frac{S_{xy}^2}{S_{xx} S_{yy}}$$.\n- Step 2: But $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$, so $$r^2 = \\frac{S_{xy}^2}{S_{xx} S_{yy}} = b_{yx} \\cdot b_{xy}$$. The identity follows directly from the definitions of the regression slopes and the PMCC.\n\nThis also explains why $$|r| \\leq 1$$: since the regression lines exist and have finite slopes, the product of the slopes must be non-negative and at most 1 (by the Cauchy-Schwarz inequality underlying the correlation).", "source": "GLM 5.1 ③", "_id": "glm_3_33", "judge_pick": true}, {"question": "S1 Oct 2023 Q6(c) — How do you determine the sign of $$r$$ when using the shortcut $$r^2 = b_{yx} \\cdot b_{xy}$$? (2 steps)", "answer": "- Step 1: The square root gives $$|r|$$, so you need an independent sign check. The rule: **the sign of $$r$$ matches the common sign of both regression slopes**. If both $$b_{yx}$$ and $$b_{xy}$$ are positive, then $$r > 0$$; if both negative, then $$r < 0$$.\n- Step 2: The slopes cannot have opposite signs (that would make $$r^2 < 0$$, impossible). If one slope is positive and the other negative, you've made an error — go back and check.\n\nIntuition: positive correlation means both \"as $$x$$ increases, $$y$$ tends to increase\" ($$b_{yx} > 0$$) and \"as $$y$$ increases, $$x$$ tends to increase\" ($$b_{xy} > 0$$). They must agree.", "source": "GLM 5.1 ③", "_id": "glm_3_34", "judge_pick": false}, {"question": "S1 Oct 2023 Q6(a)(i) — When solving two regression equations simultaneously to find their intersection, what algebraic approach works cleanly? (2 steps)", "answer": "- Step 1: Substitute one equation into the other. Given $$y = 1.4x + 1.5$$ and $$x = 1.2 + 0.2y$$, substitute the first into the second: $$x = 1.2 + 0.2(1.4x + 1.5) = 1.2 + 0.28x + 0.3 = 1.5 + 0.28x$$.\n- Step 2: Collect $$x$$ terms: $$x - 0.28x = 1.5$$, so $$0.72x = 1.5$$, giving $$x = \\frac{1.5}{0.72} = \\frac{150}{72} = \\frac{25}{12}$$. Then back-substitute for $$y$$.\n\nKeep fractions rather than decimals: $$\\frac{1.5}{0.72} = \\frac{3/2}{18/25} = \\frac{25}{12}$$. This avoids rounding and makes the link to $$\\bar{x} = \\frac{25}{12}$$ transparent.", "source": "GLM 5.1 ③", "_id": "glm_3_35", "judge_pick": false}, {"question": "What is the relationship between $$S_{xy}$$, the regression slopes, and the sums of squares $$S_{xx}$$, $$S_{yy}$$? How can you use this to verify your PMCC? (2 steps)", "answer": "- Step 1: $$b_{yx} = \\frac{S_{xy}}{S_{xx}}$$ and $$b_{xy} = \\frac{S_{xy}}{S_{yy}}$$. If you know $$S_{xy}$$ and the slopes, you can recover $$S_{xx} = \\frac{S_{xy}}{b_{yx}} = \\frac{5.6}{1.4} = 4$$ and $$S_{yy} = \\frac{S_{xy}}{b_{xy}} = \\frac{5.6}{0.2} = 28$$.\n- Step 2: Then verify: $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}} = \\frac{5.6}{\\sqrt{4 \\times 28}} = \\frac{5.6}{\\sqrt{112}} \\approx 0.529$$, confirming the shortcut answer.\n\nThis verification route is a good sanity check: compute $$S_{xx}$$ and $$S_{yy}$$ from the slopes, then use the full PMCC formula. If the answers disagree, something is wrong.", "source": "GLM 5.1 ③", "_id": "glm_3_36", "judge_pick": true}, {"question": "S1 exam strategy — What is the time budget rule for a 75-mark, 90-minute paper? (2 steps)", "answer": "- Step 1: 90 min ÷ 75 marks = 1.2 minutes per mark. Leave 5 minutes at the end for checking, so work with 85 minutes: roughly 1.13 min/mark.\n- Step 2: Allocate by question proportional to marks: Q1 (11 marks) → ~13 min, Q2 (13 marks) → ~16 min, Q3 (12 marks) → ~14 min, Q4 (12 marks) → ~14 min, Q5 (15 marks) → ~18 min, Q6 (12 marks) → ~14 min.\n\nIf you're spending more than 2 min/mark on any part, flag it and move on. Come back with remaining time.", "source": "GLM 5.1 ③", "_id": "glm_3_37", "judge_pick": true}, {"question": "S1 exam strategy — For \"show that\" questions, what writing discipline is required? (2 steps)", "answer": "- Step 1: Write out every algebraic step explicitly. Do not skip lines or do mental arithmetic. The method marks reward the chain of reasoning, not just the final answer.\n- Step 2: If you make an arithmetic slip but the method is clear, you may still get method marks. But if you skip steps and the answer is wrong, the examiner cannot award partial credit.\n\n\"Show that\" means the answer is given — your job is to demonstrate a valid path to it, not just to arrive. Every substitution, every simplification should be visible.", "source": "GLM 5.1 ③", "_id": "glm_3_38", "judge_pick": false}, {"question": "What is the verification that all four regions of a two-circle Venn diagram sum to, and why must you check this? (2 steps)", "answer": "- Step 1: The four regions ($$A$$ only, $$B$$ only, $$A \\cap B$$, neither) must sum to 1: $$w + x + y + z = 1$$. For Q3(i): $$0.15 + 0.55 + 0.10 + 0.20 = 1.00$$ ✓.\n- Step 2: If they don't sum to 1, at least one region is wrong, and all subsequent answers (independence test, conditional probabilities) will be incorrect. This check catches the labelling swap error (like Phuc's $$w \\leftrightarrow x$$ mix-up) before it cascades.\n\nAlways compute $$z = 1 - (w + x + y)$$ last and verify it's a valid probability (between 0 and 1).", "source": "GLM 5.1 ③", "_id": "glm_3_39", "judge_pick": false}, {"question": "S1 Oct 2023 Q2(a) — When finding the median of 33 data values, what position do you use, and what value do you get? (2 steps)", "answer": "- Step 1: For $$n = 33$$, the median position is $$\\frac{n+1}{2} = \\frac{34}{2} = 17$$. This is an integer, so the median is the 17th value directly — no averaging needed.\n- Step 2: Count through the stem-and-leaf: the first row (1|6) has 1 value, second row adds 2 (cumulative 3), third row adds 3 (cumulative 6), fourth row adds 7 (cumulative 13), fifth row has 8 values so the 14th–21st values are there. The 17th value falls in the fifth row: median = 57 kg.\n\nFor odd $$n$$, the median is always a single data point. For even $$n$$, you'd average the $$\\frac{n}{2}$$th and $$(\\frac{n}{2}+1)$$th values.", "source": "GLM 5.1 ③", "_id": "glm_3_40", "judge_pick": false}, {"question": "What is the complete list of values that must be plotted on a box plot, and in what order? (3 steps)", "answer": "- Step 1: Compute the five-number summary: minimum non-outlier, $$Q_1$$, median, $$Q_3$$, maximum non-outlier. For this paper: 23, 45, 57, 63, 86.\n- Step 2: Draw the box from $$Q_1 = 45$$ to $$Q_3 = 63$$, with a vertical line at the median = 57. Extend the lower whisker from $$Q_1$$ down to 23, and the upper whisker from $$Q_3$$ up to 86.\n- Step 3: Mark each outlier with a × on the scale: 16 and 94. Do NOT connect the whiskers to the outliers.\n\nThe box plot encodes: centre (median line), spread (box = IQR, whiskers = range of typical data), and shape (position of median within box hints at skew), plus flagged unusual values.", "source": "GLM 5.1 ③", "_id": "glm_3_41", "judge_pick": false}, {"question": "S1 Oct 2023 Q3(ii)(a) — When $$F$$ and $$H$$ are mutually exclusive, what does the union formula simplify to? (2 steps)", "answer": "- Step 1: Mutually exclusive means $$P(F \\cap H) = 0$$. The general union formula $$P(F \\cup H) = P(F) + P(H) - P(F \\cap H)$$ simplifies to $$P(F \\cup H) = P(F) + P(H)$$.\n- Step 2: Substitute: $$P(F \\cup H) = \\frac{2}{7} + \\frac{1}{4} = \\frac{8}{28} + \\frac{7}{28} = \\frac{15}{28}$$.\n\nThe simplification is the whole point of the \"mutually exclusive\" condition — it removes the overlap term. Always state \"$$P(F \\cap H) = 0$$ because $$F$$ and $$H$$ are mutually exclusive\" before simplifying.", "source": "GLM 5.1 ③", "_id": "glm_3_42", "judge_pick": false}, {"question": "What is the general strategy for solving for an unknown probability in a Venn diagram when given conditions like independence or mutual exclusivity? (3 steps)", "answer": "- Step 1: Label every region with a variable (or value). Write equations from the given information: region sums give $$P(A)$$, $$P(B)$$, total = 1.\n- Step 2: Translate any additional conditions into equations. Independence: $$P(A \\cap B) = P(A)P(B)$$. Mutual exclusivity: $$P(A \\cap B) = 0$$. Union given: $$P(A) + P(B) - P(A \\cap B) = \\text{given value}$$.\n- Step 3: Solve the system. If independence is given, substitute $$P(A \\cap B) = P(A)P(B)$$ into the union equation, which gives a linear or quadratic equation in the unknown.\n\nThe key is translating verbal conditions (\"independent\", \"mutually exclusive\") into algebraic equations before trying to solve.", "source": "GLM 5.1 ③", "_id": "glm_3_43", "judge_pick": false}, {"question": "S1 Oct 2023 Q5(a) — When the question says \"Show that $$P(X < 240) = 0.8849$$\", what standardisation working must you show? (2 steps)", "answer": "- Step 1: Write the standardisation: $$Z = \\frac{X - \\mu}{\\sigma} = \\frac{240 - 210}{25} = \\frac{30}{25} = 1.2$$. Then $$P(X < 240) = P(Z < 1.2)$$.\n- Step 2: Read from the table: $$\\Phi(1.20) = 0.8849$$. State this explicitly. Quote the table value to 4 d.p. as printed — do not truncate to 0.885.\n\nFor a \"show that\", the examiner needs to see: (1) the standardisation step, (2) the correct $$z$$-value, (3) the table lookup. Missing any of these can lose method marks.", "source": "GLM 5.1 ③", "_id": "glm_3_44", "judge_pick": false}, {"question": "S1 exam pattern — Three families of errors appeared repeatedly across Q1, Q4, and Q5. What is the common structural theme in the conditional probability errors? (2 steps)", "answer": "- Step 1: The common theme is **sample-space restriction failure**. In Q1(d–e), Phuc used the marginal probability (which includes paths outside the conditioned space) as the numerator. In Q4(d), he treated $$X$$ and $$Y = g(X)$$ as independent instead of translating the condition on $$Y$$ to a condition on $$X$$.\n- Step 2: The fix is the same in both cases: write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ explicitly, and ensure the numerator only includes outcomes consistent with $$B$$. \"Given $$B$$\" means you live in the world where $$B$$ happened — everything outside $$B$$ is deleted.\n\nThis is the single most important habit for conditional probability: always restrict the numerator to the intersection, never use a marginal that might include outcomes violating the condition.", "source": "GLM 5.1 ③", "_id": "glm_3_45", "judge_pick": true}, {"question": "S1 exam pattern — What is the structural similarity between Q5(e) and Q6(a) that makes them both \"2×2 linear system\" problems? (2 steps)", "answer": "- Step 1: In Q5(e), two percentile conditions give two linear equations in $$\\mu$$ and $$\\sigma$$: $$\\frac{152 - \\mu}{\\sigma} = -1.6449$$ and $$\\frac{180 - \\mu}{\\sigma} = 0.2533$$. In Q6(a), two regression equations give two linear equations in $$x$$ and $$y$$.\n- Step 2: Both are solved by the same strategy: substitute or subtract to eliminate one variable, solve for the other, then back-substitute. The structural insight is recognising \"two equations, two unknowns → solve the system\" regardless of whether the context is normal percentiles or regression lines.\n\nSpotting this pattern saves time: you already know the solution technique, you just need to set up the equations correctly.", "source": "GLM 5.1 ③", "_id": "glm_3_46", "judge_pick": true}, {"question": "Simple exercise: A tree diagram has two branches from the start: $$A$$ with $$P(A) = 0.6$$ and $$A'$$ with $$P(A') = 0.4$$. After $$A$$, the next branch gives $$B$$ with $$P(B \\mid A) = 0.5$$. After $$A'$$, the next branch gives $$B$$ with $$P(B \\mid A') = 0.3$$. What is $$P(A \\mid B)$$? Walk through the strategy. (3 steps)", "answer": "- Step 1: Write the formula: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$.\n- Step 2: Compute the numerator: $$P(A \\cap B) = P(A) \\times P(B \\mid A) = 0.6 \\times 0.5 = 0.3$$. Compute the denominator: $$P(B) = P(A \\cap B) + P(A' \\cap B) = 0.3 + 0.4 \\times 0.3 = 0.3 + 0.12 = 0.42$$.\n- Step 3: $$P(A \\mid B) = \\frac{0.3}{0.42} = \\frac{30}{42} = \\frac{5}{7} \\approx 0.714$$.\n\nNotice the numerator is the joint probability along the $$A$$-then-$$B$$ path only — we do NOT use $$P(A) = 0.6$$ as the numerator, because that would include the $$A$$-then-$$B'$$ path which contradicts $$B$$.", "source": "GLM 5.1 ③", "_id": "glm_3_47", "judge_pick": true}, {"question": "Simple exercise: $$X$$ takes values 1, 2, 3 with equal probability $$\\frac{1}{3}$$. $$Y = 2X + 1$$. Find $$E(Y)$$ and $$\\text{Var}(Y)$$ using the scaling rules, not from scratch. (2 steps)", "answer": "- Step 1: First find $$E(X) = \\frac{1+2+3}{3} = 2$$ and $$E(X^2) = \\frac{1+4+9}{3} = \\frac{14}{3}$$, so $$\\text{Var}(X) = \\frac{14}{3} - 4 = \\frac{2}{3}$$. Then $$E(Y) = 2E(X) + 1 = 2(2) + 1 = 5$$.\n- Step 2: $$\\text{Var}(Y) = 2^2 \\cdot \\text{Var}(X) = 4 \\times \\frac{2}{3} = \\frac{8}{3}$$. The constant $$+1$$ does NOT affect variance (shifting doesn't change spread), and the factor of 2 is SQUARED.\n\nThe trap: writing $$\\text{Var}(2X+1) = 2\\text{Var}(X) + 1$$. Neither the 2 is squared nor the 1 is dropped. The correct rule: $$\\text{Var}(aX+b) = a^2\\text{Var}(X)$$.", "source": "GLM 5.1 ③", "_id": "glm_3_48", "judge_pick": true}, {"question": "Simple exercise: Two regression lines are $$y = 3x + 2$$ and $$x = 0.5 + 0.1y$$. Use the PMCC shortcut to find $$r$$. (2 steps)", "answer": "- Step 1: Identify the slopes: $$b_{yx} = 3$$ (slope of $$y$$-on-$$x$$) and $$b_{xy} = 0.1$$ (slope of $$x$$-on-$$y$$). Apply the shortcut: $$r^2 = 3 \\times 0.1 = 0.3$$.\n- Step 2: $$r = \\sqrt{0.3} \\approx 0.548$$. Both slopes are positive, so $$r$$ is positive. No need for $$S_{xx}$$, $$S_{yy}$$, or any sums of squares.\n\nThis is the power of the shortcut: two numbers extracted from the regression equations, one multiplication, one square root. Done.", "source": "GLM 5.1 ③", "_id": "glm_3_49", "judge_pick": false}, {"question": "Simple exercise: A normal variable has $$\\mu = 50$$, $$\\sigma = 10$$. The 30th percentile is below the mean. Set up (don't solve) the equation for the 30th percentile value $$p$$. (2 steps)", "answer": "- Step 1: $$P(X < p) = 0.30$$. Standardise: $$P\\!\\left(Z < \\frac{p - 50}{10}\\right) = 0.30$$. Since 0.30 < 0.5, the $$z$$-value is negative.\n- Step 2: Look up $$\\Phi^{-1}(0.30)$$: since $$\\Phi(-0.5244) = 0.30$$, we get $$\\frac{p - 50}{10} = -0.5244$$, so $$p = 50 - 5.244 = 44.756$$.\n\nThe sketch confirms: the 30th percentile is to the left of the mean, so $$z$$ must be negative. Always decide the sign from the sketch before looking up the table.", "source": "GLM 5.1 ③", "_id": "glm_3_50", "judge_pick": true}, {"question": "S1 Oct 2023 Q3(i)(a) — After finding all four Venn diagram regions, what is the complete list of equations you can write as a system, and in what order should you solve them? (3 steps)", "answer": "- Step 1: Write the given equations: (1) $$w = P(O \\cap C') = 0.15$$ (given directly), (2) $$P(O) = w + x = 0.7$$ (from $$1 - P(O')$$), (3) $$P(C) = x + y = 0.65$$ (given), (4) $$w + x + y + z = 1$$ (total probability).\n- Step 2: Solve in order: from (1) and (2), $$x = 0.7 - 0.15 = 0.55$$. From (3), $$y = 0.65 - 0.55 = 0.10$$. From (4), $$z = 1 - 0.15 - 0.55 - 0.10 = 0.20$$.\n- Step 3: Verify: all four values are between 0 and 1, and they sum to 1. ✓\n\nThe strategy: always solve for the \"given\" region first, then use the circle-sum equations, then the total. This gives a clean cascade where each step uses previously found values.", "source": "GLM 5.1 ③", "_id": "glm_3_51", "judge_pick": false}, {"question": "S1 exam strategy — When you see the word \"hence\" in a question, what two things must you do? (2 steps)", "answer": "- Step 1: \"Hence\" means your solution MUST use the result from the previous part. If you solve the new part from scratch without referencing the previous answer, you will lose method marks even if your final answer is correct.\n- Step 2: Start your working by explicitly citing the previous result. For example: \"From part (a)(i), the intersection point is $$(\\bar{x}, \\bar{y}) = (\\frac{25}{12}, \\frac{53}{12})$$. Therefore $$\\sum x = n\\bar{x} = 12 \\times \\frac{25}{12} = 25$$.\"\n\nIf you find yourself reaching for a fresh approach on a \"hence\" part, stop and ask: \"What did I just find, and how does it connect?\"", "source": "GLM 5.1 ③", "_id": "glm_3_52", "judge_pick": false}, {"question": "S1 exam strategy — What is the discipline for conditional probability that should be applied to every \"given that\" question? (2 steps)", "answer": "- Step 1: At the top of every part containing \"given that\", write the formula $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. This is non-negotiable — it forces you to identify numerator and denominator correctly.\n- Step 2: Enumerate the intersection event $$A \\cap B$$ explicitly. List which paths or which $$x$$-values belong to it. Then enumerate $$B$$. Only then substitute numbers.\n\nThis habit prevents the two most common errors: (1) using a marginal instead of a joint probability in the numerator, and (2) including paths in the numerator that violate the conditioning event.", "source": "GLM 5.1 ③", "_id": "glm_3_53", "judge_pick": false}, {"question": "What is the \"compare distributions\" template, word for word, as prescribed by the mark scheme? (3 steps)", "answer": "- Step 1: **Median comparison**: \"The median [variable] of [Distribution A] is greater/less than the median [variable] of [Distribution B] ([value] [units]).\" This compares location.\n- Step 2: **IQR comparison**: \"The IQR of [Distribution A] is greater/less than the IQR of [Distribution B] ([value] [units]). This means the [variable] in [Distribution with smaller IQR] is more consistent/less variable.\" This compares spread.\n- Step 3: Each sentence must include the **variable name** and **units** in context. No other comparisons (no skew, no range, no outliers) unless explicitly asked.\n\nThree sentences. Median. IQR. Context. Done. Any extra claims risk cancelling correct ones.", "source": "GLM 5.1 ③", "_id": "glm_3_54", "judge_pick": false}, {"question": "When computing $$E(g(X))$$ for a discrete RV, what is the formula, and what is the common mistake in applying it to $$g(X) = 1/X$$? (2 steps)", "answer": "- Step 1: $$E(g(X)) = \\sum g(x) \\cdot P(X = x)$$. For $$g(X) = 1/X$$: $$E(1/X) = \\sum \\frac{1}{x} P(X = x)$$. Each term is $$\\frac{1}{x}$$ times the probability, NOT $$\\frac{1}{x \\cdot P(X=x)}$$.\n- Step 2: For the table in Q4: $$E(1/X) = 1 \\cdot \\frac{1}{10} + \\frac{1}{2} \\cdot \\frac{1}{5} + \\frac{1}{3} \\cdot \\frac{1}{10} \\cdot 3 + \\frac{1}{4} \\cdot \\frac{2}{5}$$. The convenient cancellation gives each term as $$\\frac{1}{10}$$, summing to $$\\frac{2}{5}$$.\n\nThe key: you're taking the expectation of the **transformed** values $$g(x)$$, weighted by the original probabilities. The probabilities don't transform — only the $$x$$-values do.", "source": "GLM 5.1 ③", "_id": "glm_3_55", "judge_pick": false}, {"question": "When a normal distribution question gives you \"the lightest $$p\\%$$\" or \"the shortest $$p\\%$$\", what probability equation are you actually solving? (2 steps)", "answer": "- Step 1: \"The lightest/smallest/shortest $$p\\%$$\" means the bottom $$p\\%$$ of the distribution — the left tail. The equation is $$P(X < x) = \\frac{p}{100}$$. For \"lightest 15%\": $$P(X < w) = 0.15$$.\n- Step 2: Since this is below the mean, the $$z$$-value is negative. Convert: find $$z$$ such that $$\\Phi(z) = 0.15$$, which gives $$z \\approx -1.0364$$, then $$x = \\mu + z\\sigma$$.\n\nSimilarly, \"the heaviest/largest/tallest $$p\\%$$\" means $$P(X > x) = p/100$$, which converts to $$P(X < x) = 1 - p/100$$, and the $$z$$-value is positive (above the mean).", "source": "GLM 5.1 ③", "_id": "glm_3_56", "judge_pick": false}, {"question": "What does it mean when the IQR of one dataset is less than the IQR of another, and how should you phrase this in context? (2 steps)", "answer": "- Step 1: A smaller IQR means the middle 50% of the data is more tightly clustered — less variable, more consistent, less spread out. The data values are closer together.\n- Step 2: In context: \"The IQR of December kangaroo weights (18 kg) is less than the IQR of February kangaroo weights. This indicates that kangaroo weights in December are more consistent / less variable than in February.\"\n\nThe key interpretation word is \"consistent\" or \"less variable\" — NOT \"more accurate\" or \"more precise\" (those refer to measurement, not data spread).", "source": "GLM 5.1 ③", "_id": "glm_3_57", "judge_pick": false}, {"question": "S1 exam strategy — When both regression lines are given in a question, what three things should you immediately look for? (3 steps)", "answer": "- Step 1: **Intersection = $$(\\bar{x}, \\bar{y})$$**: solve the two equations simultaneously. This gives you the means, from which you can compute $$\\sum x = n\\bar{x}$$ and $$\\sum y = n\\bar{y}$$.\n- Step 2: **PMCC shortcut**: $$r^2 = b_{yx} \\cdot b_{xy}$$, where the slopes are read directly from the equations. Sign of $$r$$ = common sign of slopes.\n- Step 3: **Recovering $$S_{xx}$$ and $$S_{yy}$$**: if needed, use $$S_{xx} = S_{xy}/b_{yx}$$ and $$S_{yy} = S_{xy}/b_{xy}$$. You only need $$S_{xy}$$ (from $$\\sum xy - n\\bar{x}\\bar{y}$$) to unlock everything.\n\nThese three facts mean you almost never need $$\\sum x^2$$ or $$\\sum y^2$$ when both lines are given — the slopes encode everything.", "source": "GLM 5.1 ③", "_id": "glm_3_58", "judge_pick": false}, {"question": "Simple exercise: A Venn diagram has events $$A$$ and $$B$$ with $$P(A) = 0.5$$, $$P(B) = 0.4$$, and $$P(A \\cap B) = 0.1$$. Are $$A$$ and $$B$$ independent? Walk through the test. (2 steps)", "answer": "- Step 1: Compute $$P(A) \\times P(B) = 0.5 \\times 0.4 = 0.20$$.\n- Step 2: Compare with $$P(A \\cap B) = 0.10$$. Since $$0.10 \\neq 0.20$$, the events are **not independent**. Also note: $$P(A \\cap B) = 0.10 > 0$$, so they're not mutually exclusive either. They are simply dependent (overlapping but not independent).\n\nThe test is always: compute both sides separately, compare numerically, state the conclusion. Never just assert without numbers.", "source": "GLM 5.1 ③", "_id": "glm_3_59", "judge_pick": false}, {"question": "S1 exam strategy — For a normal distribution question with two unknowns ($$\\mu$$ and $$\\sigma$$) and two percentile conditions, what is the step-by-step approach? (4 steps)", "answer": "- Step 1: Convert each percentile to a standardised equation. Write $$\\frac{x_i - \\mu}{\\sigma} = z_i$$ for each condition, finding $$z_i$$ from the inverse normal table.\n- Step 2: Rearrange each to $$x_i - \\mu = z_i \\sigma$$, i.e. $$\\mu = x_i - z_i \\sigma$$.\n- Step 3: **Subtract** the two equations to eliminate $$\\mu$$: $$x_2 - x_1 = (z_2 - z_1)\\sigma$$, giving $$\\sigma = \\frac{x_2 - x_1}{z_2 - z_1}$$.\n- Step 4: Back-substitute to find $$\\mu$$. Keep all $$z$$-values to 4 d.p. throughout; round only the final answers.\n\nSubtraction is cleaner than substitution because it avoids messy algebra with fractions of $$\\sigma$$. The difference of the two known values divided by the difference of the two $$z$$-values gives $$\\sigma$$ directly.", "source": "GLM 5.1 ③", "_id": "glm_3_60", "judge_pick": true}, {"question": "What is the relationship between $$\\Phi(z)$$ and $$\\Phi(-z)$$, and when do you use it? (2 steps)", "answer": "- Step 1: $$\\Phi(-z) = 1 - \\Phi(z)$$. By the symmetry of the standard normal curve, the area to the left of $$-z$$ equals the area to the right of $$z$$, which is $$1 - \\Phi(z)$$.\n- Step 2: Use this whenever you need a left-tail probability for a negative $$z$$-value. The tables only list positive $$z$$, so for $$P(Z < -0.8)$$: $$\\Phi(-0.8) = 1 - \\Phi(0.8) = 1 - 0.7881 = 0.2119$$.\n\nThis also works in reverse: if you need $$P(Z > 1.2)$$, that's $$1 - \\Phi(1.2) = 1 - 0.8849 = 0.1151$$. Every normal probability question boils down to reading $$\\Phi(z)$$ for positive $$z$$ and adjusting with this identity.", "source": "GLM 5.1 ③", "_id": "glm_3_61", "judge_pick": true}, {"question": "S1 Oct 2023 Q1 — When a tree diagram has conditional probabilities that depend on the previous outcome (not just the first game), what must you be careful about when labelling the third-game branches? (2 steps)", "answer": "- Step 1: The conditional probability for the third game depends on the outcome of the **second** game, not the first. After $$WL$$ (second was Loss), the win probability is $$0.2$$. After $$LW$$ (second was Win), the win probability is $$0.6$$.\n- Step 2: Do NOT use the first-game condition to determine third-game probabilities. The question says \"if Sally wins a game the probability she wins the next game is 0.6\" — \"a game\" means the immediately preceding game, whichever one it was.\n\nThe phrasing \"wins **a** game\" → \"wins the **next** game\" refers to consecutive games, creating a Markov-chain-like dependency where only the most recent outcome matters.", "source": "GLM 5.1 ③", "_id": "glm_3_62", "judge_pick": true}, {"question": "Simple exercise: A discrete RV $$X$$ has $$P(X=1) = 0.4$$, $$P(X=2) = 0.6$$. Let $$Y = 5 - 2X$$. Find $$P(Y < 2 \\mid X > 1)$$ using the translation strategy. (3 steps)", "answer": "- Step 1: Translate $$Y < 2$$: $$5 - 2X < 2 \\iff -2X < -3 \\iff X > 1.5$$. Since $$X \\in \\{1, 2\\}$$, this means $$X = 2$$.\n- Step 2: The condition $$X > 1$$ also gives $$X = 2$$. So $$\\{Y < 2\\} \\cap \\{X > 1\\} = \\{X = 2\\}$$, and $$P(X > 1) = P(X = 2) = 0.6$$.\n- Step 3: $$P(Y < 2 \\mid X > 1) = \\frac{P(X = 2)}{P(X = 2)} = 1$$. Given that $$X > 1$$, we know $$X = 2$$, which automatically makes $$Y = 5 - 4 = 1 < 2$$.\n\nThis illustrates the translation strategy: convert conditions on $$Y$$ to conditions on $$X$$, then work entirely in the $$X$$-world.", "source": "GLM 5.1 ③", "_id": "glm_3_63", "judge_pick": true}, {"question": "S1 exam strategy — When computing $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$, what is the rounding discipline? (2 steps)", "answer": "- Step 1: Keep $$\\bar{x}$$ and $$\\bar{y}$$ as exact fractions throughout. For this paper: $$\\bar{x} = \\frac{25}{12}$$, $$\\bar{y} = \\frac{53}{12}$$, so $$n\\bar{x}\\bar{y} = 12 \\times \\frac{25}{12} \\times \\frac{53}{12} = \\frac{1325}{12}$$.\n- Step 2: Only convert to a decimal at the final subtraction: $$\\frac{6961}{60} - \\frac{6625}{60} = \\frac{336}{60} = 5.6$$. If you had rounded $$\\bar{x} \\approx 2.08$$ and $$\\bar{y} \\approx 4.42$$ mid-calculation, you'd get $$12 \\times 2.08 \\times 4.42 \\approx 110.3$$, and $$\\frac{6961}{60} - 110.3 \\approx 5.7$$, which is already off.\n\nFraction → fraction → fraction → decimal only at the end. This is the same discipline as keeping $$z$$-values to 4 d.p. in normal questions.", "source": "GLM 5.1 ③", "_id": "glm_3_64", "judge_pick": true}, {"question": "What does it mean for two events to be \"mutually exclusive\", and how does this differ from \"independent\"? (2 steps)", "answer": "- Step 1: Mutually exclusive means $$P(A \\cap B) = 0$$ — the events cannot happen together. Knowing $$A$$ occurred tells you $$B$$ did NOT occur (strong negative dependence). Independent means $$P(A \\cap B) = P(A)P(B)$$ — knowing $$A$$ occurred gives no information about $$B$$ (zero dependence).\n- Step 2: They are opposite extremes on the dependence spectrum. Mutually exclusive = maximally negatively dependent. Independent = zero dependent. For non-trivial events, you cannot have both: if $$P(A \\cap B) = 0$$ but $$P(A)P(B) > 0$$, independence fails.\n\nThe confusion arises because both sound like \"separate\" in everyday language. In probability, \"mutually exclusive\" = can't co-occur; \"independent\" = co-occurrence is exactly as likely as chance.", "source": "GLM 5.1 ③", "_id": "glm_3_65", "judge_pick": false}, {"question": "S1 exam strategy — What should you do in the final 5 minutes of the exam? (2 steps)", "answer": "- Step 1: Check that every \"given that\" part has the conditional probability formula written explicitly. Verify that numerators are joint probabilities, not marginals.\n- Step 2: Check that all final answers are given to at least 3 significant figures (or as exact fractions). Verify that \"show that\" answers match the given value. Ensure \"hence\" parts reference previous results.\n\nThese are the highest-yield checks: conditional probability formula discipline and answer precision catch the most common lost marks per minute of checking.", "source": "GLM 5.1 ③", "_id": "glm_3_66", "judge_pick": true}, {"question": "Simple exercise: Two normal variables share the same $$\\sigma = 5$$. Variable A has $$\\mu_A = 100$$ and Variable B has $$\\mu_B = 110$$. Without computing, which has a higher 90th percentile, and by roughly how much? (2 steps)", "answer": "- Step 1: The 90th percentile is $$\\mu + 1.2816\\sigma$$. Since both share the same $$\\sigma = 5$$, the difference in percentiles equals the difference in means.\n- Step 2: Variable B's 90th percentile is higher by exactly $$\\mu_B - \\mu_A = 10$$. The $$z$$-value and $$\\sigma$$ cancel when you subtract: $$(\\mu_B + z\\sigma) - (\\mu_A + z\\sigma) = \\mu_B - \\mu_A$$.\n\nThis illustrates why subtracting two percentile equations eliminates both $$\\sigma$$ and $$z$$, leaving only the difference in means — a key insight for the simultaneous equation method.", "source": "GLM 5.1 ③", "_id": "glm_3_67", "judge_pick": true}, {"question": "S1 Oct 2023 Q4(a) — In the \"show that\" part for $$E(1/X) = 2/5$$, what convenient cancellation occurs, and why? (2 steps)", "answer": "- Step 1: Each term $$\\frac{1}{x} \\cdot P(X=x)$$ simplifies because of how the probabilities are constructed: $$\\frac{1}{1} \\cdot \\frac{1}{10} + \\frac{1}{2} \\cdot \\frac{1}{5} + \\frac{1}{3} \\cdot \\frac{3}{10} + \\frac{1}{4} \\cdot \\frac{2}{5}$$.\n- Step 2: Each product equals $$\\frac{1}{10}$$: $$\\frac{1}{10}$$, $$\\frac{1}{10}$$, $$\\frac{3}{30} = \\frac{1}{10}$$, $$\\frac{2}{20} = \\frac{1}{10}$$. So the sum is $$\\frac{4}{10} = \\frac{2}{5}$$. This is not a coincidence — the probabilities $$\\frac{k}{10}$$ were chosen so that $$\\frac{1}{x} \\cdot \\frac{x}{10} = \\frac{1}{10}$$ for each $$x$$.\n\nThis elegant cancellation is specific to this question, but the general principle is: always compute $$E(g(X))$$ term by term, looking for simplifications before reaching for a common denominator.", "source": "GLM 5.1 ③", "_id": "glm_3_68", "judge_pick": false}, {"question": "S1 exam pattern — What is the \"identity-spotting\" skill, and which two questions in this paper required it? (2 steps)", "answer": "- Step 1: Identity-spotting means recognising a structural relationship that converts a complex computation into a simple one. In Q6(c), spotting $$r^2 = b_{yx} \\cdot b_{xy}$$ bypasses the need for $$S_{xx}$$, $$S_{yy}$$, $$\\sum x^2$$, $$\\sum y^2$$. In Q5(e), recognising that two percentiles give a 2×2 linear system allows subtraction to solve directly.\n- Step 2: The skill is: before diving into computation, scan the given information for structural facts. \"Both regression lines given\" → PMCC shortcut. \"Two percentiles with two unknowns\" → simultaneous equations. \"Intersection of regression lines\" → equals $$(\\bar{x}, \\bar{y})$$.\n\nThese shortcuts save 5+ minutes each and reduce arithmetic errors. The pattern is: pause, identify the structure, then choose the efficient route.", "source": "GLM 5.1 ③", "_id": "glm_3_69", "judge_pick": true}, {"question": "What is the complete formula for $$\\text{Var}(g(X))$$ when $$g(X) = aX + b$$, and why does the $$b$$ disappear? (2 steps)", "answer": "- Step 1: $$\\text{Var}(aX + b) = a^2\\text{Var}(X)$$. The constant $$b$$ vanishes because variance measures spread (deviation from the mean), and adding a constant shifts all values equally without changing their spread.\n- Step 2: Formally: $$\\text{Var}(aX+b) = E[(aX+b)^2] - [E(aX+b)]^2 = E[a^2X^2 + 2abX + b^2] - [aE(X)+b]^2$$. Expanding and simplifying, all terms involving $$b$$ cancel, leaving $$a^2(E(X^2) - [E(X)]^2) = a^2\\text{Var}(X)$$.\n\nThe factor $$a^2$$ appears because spread scales with $$|a|$$ (if you double all values, deviations double), and variance is in squared units so it scales with $$a^2$$.", "source": "GLM 5.1 ③", "_id": "glm_3_70", "judge_pick": true}, {"question": "S1 Oct 2023 Q6 — When the question gives you $$\\sum xy = \\frac{6961}{60}$$ and asks for $$S_{xy}$$, why is it important to keep the fraction form of $$\\sum xy$$ rather than converting to a decimal? (2 steps)", "answer": "- Step 1: Converting $$\\frac{6961}{60} \\approx 116.017$$ introduces a rounding error. When you subtract $$n\\bar{x}\\bar{y} \\approx 110.417$$, you get $$5.600$$, but with accumulated rounding this could be $$5.6$$ or $$5.5$$ or $$5.7$$ — the mark scheme requires exact or 3 s.f.\n- Step 2: Working in fractions: $$\\frac{6961}{60} - \\frac{6625}{60} = \\frac{336}{60} = \\frac{28}{5} = 5.6$$ exactly. No rounding, no ambiguity. The fraction arithmetic is cleaner because the common denominator (60) is already given.\n\nThe principle: when the question gives you a fraction, keep it as a fraction until the final answer. Decimals are for final reporting, not intermediate working.", "source": "GLM 5.1 ③", "_id": "glm_3_71", "judge_pick": true}, {"question": "S1 exam strategy — What is the checklist for a box plot question with outliers? (3 steps)", "answer": "- Step 1: Compute quartiles and IQR. Calculate both fences: $$Q_1 - 1.5 \\times \\text{IQR}$$ and $$Q_3 + 1.5 \\times \\text{IQR}$$. State their numerical values explicitly.\n- Step 2: Identify all outliers by checking which data values fall outside the fences. Then identify the most extreme non-outlier values (for the whiskers).\n- Step 3: Draw: box from $$Q_1$$ to $$Q_3$$, line at median, whiskers to most extreme non-outliers, crosses (×) at outliers. Label the scale. Do NOT extend whiskers to outliers.\n\nThe three most common errors: (1) whiskers reaching outliers, (2) forgetting to compute fences explicitly, (3) not identifying the most extreme non-outlier for whisker endpoints.", "source": "GLM 5.1 ③", "_id": "glm_3_72", "judge_pick": false}, {"question": "S1 Oct 2023 Q3(i)(b) — The phrase \"carrots or onions but not both\" is an example of what set operation? What is its probability formula? (2 steps)", "answer": "- Step 1: This is the **symmetric difference** $$C \\triangle O = (C \\cup O) \\setminus (C \\cap O)$$. In probability terms: $$P(C \\triangle O) = P(C \\cup O) - P(C \\cap O)$$.\n- Step 2: Since $$P(C \\cup O) = P(C) + P(O) - P(C \\cap O)$$, this simplifies to $$P(C \\triangle O) = P(C) + P(O) - 2P(C \\cap O)$$. Equivalently, in Venn diagram regions: $$w + y$$ (the two crescents only).\n\nThe symmetric difference excludes the overlap — it's the probability of being in exactly one of the two sets. \"Or but not both\" is the verbal cue for this operation.", "source": "GLM 5.1 ③", "_id": "glm_3_73", "judge_pick": true}, {"question": "What is the full list of \"Key Formulas NOT in the Formula Booklet\" that you must memorise for S1? How many are there? (1 step recall + self-check)", "answer": "- Step 1: There are 14 formulas to memorise:\n1. $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$\n2. Independence: $$P(A \\cap B) = P(A)P(B)$$\n3. Mutually exclusive: $$P(A \\cap B) = 0$$\n4. $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$\n5. $$P(A \\cap B') = P(A) - P(A \\cap B)$$\n6. $$E(g(X)) = \\sum g(x)P(X=x)$$\n7. $$E(aX+b) = aE(X)+b$$, $$\\text{Var}(aX+b) = a^2\\text{Var}(X)$$\n8. $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$\n9. Standardisation: $$Z = (X-\\mu)/\\sigma$$\n10. Outlier fences: $$Q_1 - 1.5\\,\\text{IQR}$$ and $$Q_3 + 1.5\\,\\text{IQR}$$\n11. Quartile positions: $$\\frac{n+1}{4}$$, $$\\frac{n+1}{2}$$, $$\\frac{3(n+1)}{4}$$\n12. Intersection of regression lines = $$(\\bar{x}, \\bar{y})$$\n13. $$r^2 = b_{yx} \\cdot b_{xy}$$\n14. $$b_{yx} = S_{xy}/S_{xx}$$, $$b_{xy} = S_{xy}/S_{yy}$$\n\nThese are the ones the formula booklet does NOT provide — they must come from memory.", "source": "GLM 5.1 ③", "_id": "glm_3_74", "judge_pick": false}], "count": 75}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What is the first formula to write down when you see the phrase \"given that\" in a probability question? (3 steps)", "answer": "- Step 1: Write the conditional probability formula:  \n  $$\n  P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}.\n  $$  \n- Step 2: Identify the event $B$ (the \"given\" condition) and restrict the sample space to $B$.  \n- Step 3: Ensure the numerator $P(A \\cap B)$ only includes outcomes where both $A$ and $B$ occur.  \n\n**Key:** This formula forces you to explicitly define the restricted sample space and the joint event.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "What are the three required comparisons when asked to \"compare the distribution of two datasets\" in Edexcel S1?", "answer": "- Step 1: **Median**: Compare the central tendency (e.g., \"The median of Dataset A is higher than Dataset B. This suggests...\").  \n- Step 2: **IQR**: Compare spread (e.g., \"The IQR of Dataset A is smaller, indicating the data is more consistent.\").  \n- Step 3: **Context**: Always tie both comparisons to the variable and units (e.g., \"kangaroo weights in December are heavier and less variable than in February.\").  \n\n**Key:** Extra commentary (e.g., skew, range, outliers) wastes time and risks losing marks.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "What is the trigger phrase that forces you to use the formula $P(A \\cap B) = P(A)P(B)$? (2 steps)", "answer": "- Step 1: The phrase **\"statistically independent\"** requires this test.  \n- Step 2: Calculate both $P(A \\cap B)$ (from data) and $P(A)P(B)$ (from marginal probabilities). If unequal, events are not independent.  \n\n**Key:** Never assume independence without verification.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why does $\\text{Var}(aX) = a^2 \\text{Var}(X)$ instead of $a \\text{Var}(X)$?", "answer": "- Step 1: Variance measures squared deviations:  \n  $$\n  \\text{Var}(aX) = E[(aX - E(aX))^2] = E[(aX - aE(X))^2].\n  $$  \n- Step 2: Factor out $a^2$ from the square:  \n  $$\n  = a^2 E[(X - E(X))^2] = a^2 \\text{Var}(X).\n  $$  \n**Key:** Scaling a variable stretches deviations by $a$, but variance squares the scale factor.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How do you determine the sign of $z$ when solving inverse-normal problems for percentiles?", "answer": "- Step 1: Sketch the bell curve and shade the region.  \n  + Left tail (e.g., \"lightest 15%\") → negative $z$.  \n  + Right tail (e.g., \"top 5%\") → positive $z$.  \n- Step 2: Use symmetry:  \n  + $P(X < \\mu - k) = p$ → $z = -z_{1-p}$.  \n  + $P(X > \\mu + k) = p$ → $z = z_{1-p}$.  \n\n**Key:** The sign of $z$ depends on the tail of the distribution.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "What is the shortcut for calculating the product moment correlation coefficient (PMCC) when both regression lines are given?", "answer": "- Step 1: Use the identity  \n  $$\n  r^2 = b_{yx} \\cdot b_{xy},\n  $$  \n  where $b_{yx}$ is the slope of $y$ on $x$ and $b_{xy}$ is the slope of $x$ on $y$.  \n- Step 2: Determine the sign of $r$ from the slopes (both slopes positive → $r$ positive; mixed signs → invalid).  \n\n**Key:** This avoids computing $S_{xx}$, $S_{yy}$, and $S_{xy}$ directly.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "How do you translate the condition $Y < c$ into a condition on $X$ when $Y = g(X)$?", "answer": "- Step 1: Solve the inequality $g(X) < c$ algebraically.  \n- Step 2: Identify the valid $X$-values (e.g., $Y = 30/X < 20 \\iff X > 1.5$).  \n- Step 3: Restrict the sample space to these $X$-values before computing probabilities.  \n\n**Key:** $Y$ is a function of $X$, not an independent variable.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "What are the formulas for outlier fences in Edexcel S1?", "answer": "- Step 1: Compute the interquartile range (IQR):  \n  $$\n  \\text{IQR} = Q_3 - Q_1.\n  $$  \n- Step 2: Calculate the fences:  \n  $$\n  \\text{Lower fence} = Q_1 - 1.5 \\times \\text{IQR}, \\quad \\text{Upper fence} = Q_3 + 1.5 \\times \\text{IQR}.\n  $$  \n**Key:** Outliers are values outside [lower fence, upper fence]. Whiskers on a box plot stop at the most extreme non-outlier.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why is the intersection of the two regression lines $(\\bar{x}, \\bar{y})$?", "answer": "- Step 1: Both regression lines minimize the sum of squared residuals.  \n- Step 2: The point $(\\bar{x}, \\bar{y})$ lies on both lines by construction:  \n  + For $y$ on $x$: $\\bar{y} = b_{yx} \\bar{x} + a_{yx}$.  \n  + For $x$ on $y$: $\\bar{x} = b_{xy} \\bar{y} + a_{xy}$.  \n- Step 3: Solving these equations gives the intersection.  \n\n**Key:** This property links regression to the means of the variables.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "What is the correct method for calculating $E(1/X)$ for a discrete random variable $X$?", "answer": "- Step 1: For each $x$-value, compute $g(x) = 1/x$.  \n- Step 2: Multiply each $g(x)$ by $P(X = x)$:  \n  $$\n  E\\left(\\frac{1}{X}\\right) = \\sum_{x} \\frac{1}{x} \\cdot P(X = x).\n  $$  \n- Step 3: Sum all terms.  \n\n**Key:** Use the definition of expectation directly for functions of $X$.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What is the first formula you must write down when you see the phrase \"given that Sally won 2 games in a turn\" in conditional probability? (2 steps)", "answer": "- Step 1: Write the definition of conditional probability: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}.$$\n- Step 2: Identify A and B from the question. Here, $A = \\text{Sally won the first 2 games}$ and $B = \\text{Sally won 2 games in a turn}$. Since $A \\subseteq B$, the numerator simplifies to $P(A)$.\n\n[Optional: This forces you to restrict the sample space to the given condition.]", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": true}, {"question": "When asked to \"compare the distribution of weights in February and December,\" what three exact elements must you mention to earn full marks? (3 elements)", "answer": "- Step 1: **Median comparison**: \"The median weight in February is [greater/less] than in December.\"\n- Step 2: **IQR comparison**: \"The IQR in February is [greater/less] than in December.\"\n- Step 3: **Context**: \"This suggests kangaroos are [heavier/lighter] in [month] and weights are [more/less] consistent in [month].\"\n\n+ Example: \"The December median (57 kg) is higher than February, indicating heavier kangaroos. The smaller December IQR (18 kg) shows more consistent weights.\"", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How do you test if two events C and O are statistically independent using their probabilities? (2 steps)", "answer": "- Step 1: Compute $P(C \\cap O)$ directly from the Venn diagram or data.\n- Step 2: Compute $P(C) \\cdot P(O)$. If the two values are equal, the events are independent; otherwise, they are not.\n\n+ Example: If $P(C \\cap O) = 0.55$ and $P(C)P(O) = 0.455$, they are not independent because $0.55 \\neq 0.455$.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "Why must you translate the condition $Y < 20$ into a condition on $X$ before calculating conditional probability in Q4(d)? (3 steps)", "answer": "- Step 1: Recognize that $Y = \\frac{30}{X}$ is a function of $X$, not an independent variable.\n- Step 2: Solve $\\frac{30}{X} < 20$ → $X > 1.5$ → $X \\in \\{2,3,4\\}$.\n- Step 3: The condition $X < 3 \\mid Y < 20$ becomes $X \\in \\{2\\}$ because only $X=2$ satisfies both $X < 3$ and $X > 1.5$.\n\n[Optional: This avoids treating $X$ and $Y$ as independent, which is mathematically invalid.]", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why should you keep inverse-normal $z$-values to 4 decimal places when solving simultaneous equations for $\\mu$ and $\\sigma$? (3 steps)", "answer": "- Step 1: Small rounding errors in $z$-values (e.g., using 0.25 instead of 0.2533) amplify when multiplied by $\\sigma$.\n- Step 2: Subtraction of equations to eliminate $\\mu$ requires precision: $\\frac{180 - 152}{\\sigma} = z_2 - z_1$.\n- Step 3: Using 4 d.p. ensu
