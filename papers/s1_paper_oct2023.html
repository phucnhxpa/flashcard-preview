, "answer": "Because $$Y = 30/X$$ is a **deterministic function of $$X$$**, not an independent random variable. They are perfectly dependent: knowing $$X$$ determines $$Y$$ exactly. So there's no \"joint distribution\" to sum over — the correct move is to translate the event $$\\{Y < 20\\}$$ into the equivalent event on $$X$$: $$\\frac{30}{X} < 20 \\iff X > 1.5 \\iff X \\in \\{2,3,4\\}$$. Then it's a one-variable conditional probability.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "S1 Oct 2023 — Three families of errors dominate this paper. Name each family, the questions it affects, and the one-sentence fix. (3 steps)", "answer": "- Step 1: **Conditional probability sample-space discipline** (Q1d, Q1e, Q4d): the fix is to always write $$P(A|B) = P(A \\cap B)/P(B)$$ first, then enumerate the intersection event explicitly before substituting numbers.\n- Step 2: **Over-eager prose in interpretation parts** (Q2d): the fix is to use the rigid median + IQR + context template — three sentences only, no embellishment about skew or range.\n- Step 3: **Failure to spot structural shortcuts** (Q5e, Q6c): the fix is to recognise that two regression lines → intersection = $$(\\bar{x}, \\bar{y})$$ and $$r^2 = b_{yx} b_{xy}$$; two percentiles → subtract simultaneous equations to isolate σ first.\n\nDrilling these three families is the highest-yield preparation strategy for the next S1 paper.", "source": "GLM 5.1 ①", "_id": "glm_1_55"}, {"question": "S1 Oct 2023 Q6(b) — Given $$\\sum xy = \\frac{6961}{60}$$, $$n = 12$$, $$\\bar{x} = \\frac{25}{12}$$, $$\\bar{y} = \\frac{53}{12}$$, what formula do you use for $$S_{xy}$$ and why is this form preferred over the alternative? (2 steps)", "answer": "- Step 1: Use $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$. Plug in: $$S_{xy} = \\frac{6961}{60} - 12 \\times \\frac{25}{12} \\times \\frac{53}{12} = \\frac{6961}{60} - \\frac{1325}{12}$$.\n- Step 2: This form is preferred because it uses the quantities already computed in part (a) — $$\\bar{x}$$ and $$\\bar{y}$$ — rather than requiring $$\\frac{\\sum x \\sum y}{n}$$, which needs separate calculation. The alternative $$S_{xy} = \\sum xy - \\frac{(\\sum x)(\\sum y)}{n}$$ is algebraically equivalent but less convenient here since you already have $$\\bar{x}$$ and $$\\bar{y}$$.\n\nCompute: $$\\frac{6961}{60} - \\frac{6625}{60} = \\frac{336}{60} = \\frac{28}{5} = 5.6$$.", "source": "GLM 5.1 ①", "_id": "glm_1_31"}, {"question": "Before calculating any conditional probability for a multi-stage game like Q1 Oct 2023, why is it essential to list every possible path with its probability and number of wins? (3 steps)", "answer": "- Step 1: Listing every path creates a complete sample-space partition. You can see exactly which paths satisfy the numerator event ($$A \\cap B$$) and which satisfy the denominator event ($$B$$).\n- Step 2: Without this list, it is easy to include paths that contradict the condition. For example, the path $$LWW$$ gives exactly $$2$$ wins but starts with a loss, so it must be excluded from $$P(\\text{won 2} \\cap W_1)$$.\n- Step 3: The list also acts as an arithmetic check: the sum of all path probabilities must equal $$1$$, catching any branch-probability errors early.", "source": "Kimi K2.6 ②", "_id": "kimi_2_1"}, {"question": "A simple mental-math exercise: Two regression lines are $$y = 2x + 1$$ and $$x = 0.5y - 0.5$$. Find $$r^2$$ using the shortcut and determine the sign of $$r$$. (2 steps)", "answer": "- Step 1: Read off the slopes: $$b_{yx} = 2$$ (slope of $$y$$-on-$$x$$) and $$b_{xy} = 0.5$$ (slope of $$x$$-on-$$y$$, i.e. the coefficient of $$y$$). Then $$r^2 = 2 \\times 0.5 = 1$$.\n- Step 2: $$r = \\sqrt{1} = 1$$ (positive, since both slopes are positive). This means perfect positive correlation — all data points lie exactly on the regression line.\n\nWhen $$r^2 = 1$$, the two regression lines are just rearrangements of each other (solve one for $$x$$ and you get the other). This only happens with perfect linear correlation.", "source": "GLM 5.1 ②", "_id": "glm_2_55"}, {"question": "In a normal distribution question with a symmetric interval about the mean, what is the relationship between the tail probability and the total central probability? Use $$P(\\mu - k < X < \\mu + k) = 0.95$$ as an example. (2 steps)", "answer": "- Step 1: The total probability outside the interval is $$1 - 0.95 = 0.05$$. By symmetry, this splits equally: 0.025 in the left tail and 0.025 in the right tail.\n- Step 2: To find k, you need the z-value where the cumulative probability is $$0.5 + 0.475 = 0.975$$ (from the mean to the upper boundary plus the left half). From tables: $$\\Phi^{-1}(0.975) = 1.96$$. Then $$k = z \\times \\sigma = 1.96 \\times 25 = 49$$.\n\nThe common error: looking up $$\\Phi^{-1}(0.95) = 1.6449$$ instead of $$\\Phi^{-1}(0.975) = 1.96$$. The 0.95 is the total central area, not the cumulative area up to the boundary.", "source": "GLM 5.1 ①", "_id": "glm_1_67"}, {"question": "S1 Oct 2023 Q5(e) — when given two percentiles of a normal distribution to find $$\\mu$$ and $$\\sigma$$, what's the strategic move to avoid messy algebra? (4 steps)", "answer": "- Step 1: Convert \"5% weigh less than 152\" into a $$z$$-equation: $$\\frac{152 - \\mu}{\\sigma} = z_1$$ where $$z_1 = \\Phi^{-1}(0.05) = -1.6449$$.\n- Step 2: Convert \"40% weigh more than 180\" — but first flip it to a left-tail statement: $$P(Y < 180) = 0.60$$. So $$\\frac{180 - \\mu}{\\sigma} = z_2 = 0.2533$$.\n- Step 3: **Subtract equation (1) from equation (2) to eliminate $$\\mu$$ first.** This gives $$\\frac{180 - 152}{\\sigma} = z_2 - z_1$$, a single equation in $$\\sigma$$.\n- Step 4: Solve for $$\\sigma$$, then back-substitute into either original equation for $$\\mu$$.\n\n**Takeaway:** Always eliminate one unknown first — never try to solve both simultaneously by substitution.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "In Q3(ii)(c), what are two valid methods to find $$P(F \\cap G')$$, and which one relies on the independence property? (2 steps)", "answer": "- Step 1: Method A (direct subtraction): $$P(F \\cap G') = P(F) - P(F \\cap G)$$. This uses only the definition of complement within $$F$$ and works regardless of independence, provided you already know $$P(F \\cap G)$$.\n- Step 2: Method B (independence shortcut): Since $$F$$ and $$G$$ are independent, $$F$$ and $$G'$$ are also independent. Therefore $$P(F \\cap G') = P(F) \\cdot P(G') = \\frac{2}{7} \\cdot (1 - P(G))$$. This relies on the independence property and is often faster if $$P(G)$$ is already known.", "source": "Kimi K2.6 ①", "_id": "kimi_1_19"}, {"question": "When you have both regression lines and need to find r, why is the shortcut $$r^2 = b_{yx} b_{xy}$$ faster than the long route, and what does the long route require that you may not have? (2 steps)", "answer": "- Step 1: The long route requires $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$, which needs $$S_{xx}$$ and $$S_{yy}$$. Computing these requires $$\\sum x^2$$ and $$\\sum y^2$$, which are often not given in the question.\n- Step 2: The shortcut bypasses $$S_{xx}$$ and $$S_{yy}$$ entirely — it only needs the two slopes, which are read directly from the regression equations. In Q6, you can compute r in one line instead of chasing unavailable sums of squares.\n\nThe trigger: if the question gives you both regression equations, immediately check whether it asks for r — the shortcut is almost certainly the intended route.", "source": "GLM 5.1 ①", "_id": "glm_1_34"}, {"question": "Why is it conceptually wrong to treat $$X$$ and $$Y = 30/X$$ as independent random variables when computing a joint or conditional probability in Q4(d)? (1 step)", "answer": "- Step 1: $$Y$$ is a deterministic function of $$X$$; knowing $$X$$ fixes $$Y$$ exactly. There is no randomness left in $$Y$$ once $$X$$ is known, so their joint distribution is concentrated on the curve $$y = 30/x$$. Treating them as independent would imply $$P(X=x, Y=y) = P(X=x)P(Y=y)$$, which is false because $$Y$$ has no separate probability mass.", "source": "Kimi K2.6 ②", "_id": "kimi_2_24"}, {"question": "Why must you keep $$z$$-values to 4 decimal places throughout normal simultaneous-equation working?", "answer": "Because $$z$$-values get **divided** (to find $$\\sigma$$) and **multiplied** (to find $$\\mu$$), and these operations amplify rounding errors. For example, $$\\sigma = 28/1.8982 = 14.751$$, then $$\\mu = 180 - 0.2533 \\times 14.751$$. If you round $$\\sigma$$ to 14.8 mid-calculation, the final $$\\mu$$ can be off by 0.1–0.5, sometimes crossing the rounding boundary into the wrong final answer. Round only at the very last step.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "Quick mental-check exercise: A tree has two branches at the first node (W with 0.6, L with 0.4). After W, the next win probability is 0.5; after L, the next win probability is 0.3. What is $$P(\\text{win both games})$$? (2 steps)", "answer": "- Step 1: \"Win both games\" means the WW path. Multiply along the branches: $$P(W_1) \\times P(W_2 \\mid W_1) = 0.6 \\times 0.5 = 0.30$$.\n- Step 2: This is the joint probability — the probability of traversing the top-top path. No summing is needed because there is only one path that gives \"win both.\"\n\nThe key insight: \"and\" events (intersection) use multiplication along branches; \"or\" events (union) use addition across paths.", "source": "GLM 5.1 ①", "_id": "glm_1_61"}, {"question": "Why is the intersection of the two regression lines $y = 1.4x + 1.5$ and $x = 1.2 + 0.2y$ equal to $(\\bar{x}, \\bar{y})$ in Q6(a)? (3 steps)", "answer": "- Step 1: Both regression lines pass through the point $(\\bar{x}, \\bar{y})$ by definition.\n- Step 2: Solving the equations simultaneously gives $\\bar{x} = \\frac{25}{12}$ and $\\bar{y} = \\frac{53}{12}$.\n- Step 3: This allows you to compute $\\sum x = n\\bar{x} = 12 \\times \\frac{25}{12} = 25$ directly for Q6(a ii).\n\n[Optional: This structural fact avoids recalculating $\\sum x$ from scratch.]", "source": "Qwen 3 ②", "_id": "qwen_2_8"}, {"question": "Why does Edexcel use $$\\frac{n+1}{4}$$ for $$Q_1$$ on discrete/ungrouped data, but $$\\frac{n}{4}$$ on grouped data?", "answer": "**Discrete/ungrouped**: the data is a list of specific values. The \"$$+1$$\" correction places the quartile at a position that makes sense for indexing into a finite list (the median of $$n=33$$ is the 17th = $$(33+1)/2$$, which uses an actual data point).\n\n**Grouped**: the data is treated as a continuous distribution within intervals, and you interpolate within the quartile class using $$\\frac{n}{4}$$ — the position is conceptual, not a data-point index.\n\nMixing these up costs marks; always check which type of data you have.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "S1 Oct 2023 Q6(c) — When both regression equations are given, what shortcut bypasses the need to compute $$S_{xx}$$ and $$S_{yy}$$? (3 steps)", "answer": "- Step 1: Read off the two regression slopes: $$b_{yx}$$ (slope of $$y$$-on-$$x$$) and $$b_{xy}$$ (slope of $$x$$-on-$$y$$). Here, $$b_{yx} = 1.4$$ and $$b_{xy} = 0.2$$.\n- Step 2: Apply the identity $$r^2 = b_{yx} \\times b_{xy}$$. This works because $$b_{yx} = S_{xy}/S_{xx}$$ and $$b_{xy} = S_{xy}/S_{yy}$$, so their product is $$S_{xy}^2/(S_{xx}S_{yy}) = r^2$$. Here, $$r^2 = 1.4 \\times 0.2 = 0.28$$.\n- Step 3: Take the square root and determine the sign: $$r = \\sqrt{0.28} \\approx 0.529$$. The sign of $$r$$ matches the common sign of the two slopes (both positive here, so $$r > 0$$).\n\nWithout this shortcut, you'd need $$\\sum x^2$$ and $$\\sum y^2$$ to compute $$S_{xx}$$ and $$S_{yy}$$ — which the question doesn't give you. The shortcut turns a 5-minute dead end into a 30-second calculation.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "What's the meaning of \"symmetric difference\" in $$P(\\text{onions or carrots but not both})$$, and how do you compute it from a Venn diagram?", "answer": "The **symmetric difference** $$O \\triangle C$$ is the union minus the intersection: things in exactly one of the two sets. From a four-region Venn diagram with $$w$$ = $$O$$-only, $$x$$ = intersection, $$y$$ = $$C$$-only, $$z$$ = outside, the symmetric difference is $$w + y$$ (the two non-intersecting interior regions). Here $$0.15 + 0.10 = 0.25$$. The phrase \"but not both\" is the trigger.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "Why does adding a constant $$b$$ to $$X$$ leave variance unchanged: $$\\text{Var}(X+b) = \\text{Var}(X)$$?", "answer": "A shift by $$b$$ moves the mean by $$b$$ too — so the deviations $$X - \\mu$$ are unchanged. $$\\text{Var}(X+b) = E[((X+b) - (\\mu+b))^2] = E[(X-\\mu)^2] = \\text{Var}(X)$$. Geometrically: variance measures spread around the mean, and translation doesn't change spread. This is why the formula is $$\\text{Var}(aX+b) = a^2 \\text{Var}(X)$$ — the $$b$$ drops out entirely.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "Quick conceptual exercise: Two regression lines have slopes $$b_{yx} = -0.8$$ and $$b_{xy} = -0.2$$. What is r? (2 steps)", "answer": "- Step 1: $$r^2 = b_{yx} \\times b_{xy} = (-0.8) \\times (-0.2) = 0.16$$. So $$r = \\pm\\sqrt{0.16} = \\pm 0.4$$.\n- Step 2: Both slopes are negative, so r is negative. Therefore $$r = -0.4$$.\n\nThe sign rule: r shares its sign with the slopes. Two negative slopes → negative correlation. The product of the slopes is always positive (it equals $$r^2$$), but r itself carries the sign.", "source": "GLM 5.1 ①", "_id": "glm_1_64"}, {"question": "S1 Oct 2023 Q1(d) — Why does $P(WW \\mid \\text{exactly 2 wins})$ simplify to $P(WW)/P(\\text{exactly 2 wins})$? (2 steps)", "answer": "- Step 1: Recognize that $WW$ is a subset of \"exactly 2 wins\" ⇒ $P(WW \\cap \\text{exactly 2 wins}) = P(WW)$.\n- Step 2: Apply the conditional probability formula:  \n$$P(WW \\mid \\text{exactly 2 wins}) = \\frac{P(WW)}{P(\\text{exactly 2 wins})}.$$\nKey insight: When $A \\subseteq B$, the intersection $A \\cap B$ collapses to $A$.", "source": "Qwen 3 ④", "_id": "qwen_4_7"}, {"question": "Why is it dangerous to add extra commentary about skewness, range, or outliers in a \"compare two distributions\" question like Q2(d), even if your statements are factually true? (1 step)", "answer": "- Step 1: The Edexcel mark scheme for this question type typically only marks the median comparison, the IQR comparison, and their contextual interpretations. Extra claims are ignored at best; at worst, if any extra claim is incorrect or misjudged (for example, misidentifying skew), it can contradict your valid points or simply waste valuable exam time that could be spent checking arithmetic elsewhere.", "source": "Kimi K2.6 ①", "_id": "kimi_1_12"}, {"question": "In the box-plot for Q2, how should outliers be visually marked?", "answer": "As individual **crosses (×)** plotted at their numerical positions on the scale, separate from the whiskers. They are NOT connected to the box by a whisker line. The whisker stops at the most extreme non-outlier (23 lower, 86 upper), and then the outliers (16, 94) are isolated marks beyond. This visual distinction is the entire point of identifying outliers in the first place.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "S1 Oct 2023 Q3(i)(a) — what's the danger when labelling Venn regions $$w, x, y, z$$ from a printed diagram?", "answer": "The labels $$w, x, y, z$$ are positioned in a specific spatial order on the printed diagram (e.g., $$w$$ = \"$$O$$ only\", $$x$$ = intersection, $$y$$ = \"$$C$$ only\", $$z$$ = outside both). If you assume your own labelling without checking the diagram orientation, you may swap $$w$$ and $$x$$ — leading to all subsequent answers being formally wrong even if the numbers add to 1. **Always re-read the diagram and write down each region's verbal meaning before assigning numerical values.**", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Why does Edexcel's mark scheme for \"compare distributions\" only reward median and IQR, and not range or standard deviation? (2 steps)", "answer": "- Step 1: The median and IQR are **resistant statistics** — they are not distorted by outliers. Range and standard deviation are sensitive to extreme values, so comparing them across distributions with different outlier structures can be misleading.\n- Step 2: In a box-plot question, the only reliable summary statistics you have are median, quartiles, and IQR. The mark scheme is designed to test whether you extract the right measures from the box plot, not whether you can free-associate about skewness.\n\nThe practical rule: if the question gives you box plots, compare medians and IQRs. If it gives you means and standard deviations, compare those instead.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "In S1 tree-diagram questions, what is the very first formula you must write down the moment you see the phrase \"given that\"? (2 steps)", "answer": "- Step 1: Write $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$ explicitly, before substituting any numbers. This forces you to identify the intersection event and the conditioning event separately.\n- Step 2: Only after writing the formula, enumerate which paths belong to the numerator ($$A \\cap B$$) and which belong to the denominator ($$B$$). The formula is your scaffolding — without it, you risk sliding a marginal probability into the numerator.\n\nThis discipline is the single highest-impact habit for conditional probability: every mark scheme awards M1 for the formula itself.", "source": "GLM 5.1 ①", "_id": "glm_1_0"}, {"question": "S1 exam strategy — For a normal distribution question with two unknowns ($$\\mu$$ and $$\\sigma$$) and two percentile conditions, what is the step-by-step approach? (4 steps)", "answer": "- Step 1: Convert each percentile to a standardised equation. Write $$\\frac{x_i - \\mu}{\\sigma} = z_i$$ for each condition, finding $$z_i$$ from the inverse normal table.\n- Step 2: Rearrange each to $$x_i - \\mu = z_i \\sigma$$, i.e. $$\\mu = x_i - z_i \\sigma$$.\n- Step 3: **Subtract** the two equations to eliminate $$\\mu$$: $$x_2 - x_1 = (z_2 - z_1)\\sigma$$, giving $$\\sigma = \\frac{x_2 - x_1}{z_2 - z_1}$$.\n- Step 4: Back-substitute to find $$\\mu$$. Keep all $$z$$-values to 4 d.p. throughout; round only the final answers.\n\nSubtraction is cleaner than substitution because it avoids messy algebra with fractions of $$\\sigma$$. The difference of the two known values divided by the difference of the two $$z$$-values gives $$\\sigma$$ directly.", "source": "GLM 5.1 ③", "_id": "glm_3_60"}, {"question": "S1 Oct 2023 Q6(b) — When computing $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$, what arithmetic trap should you avoid? (2 steps)", "answer": "- Step 1: Compute $$n\\bar{x}\\bar{y}$$ using the exact fractional values: $$12 \\times \\frac{25}{12} \\times \\frac{53}{12} = \\frac{25 \\times 53}{12} = \\frac{1325}{12}$$. Do NOT convert $$\\bar{x}$$ and $$\\bar{y}$$ to decimals first — $$25/12 \\approx 2.0833$$ and $$53/12 \\approx 4.4167$$, and multiplying rounded decimals introduces error.\n- Step 2: Find a common denominator to combine with $$\\sum xy = 6961/60$$. Convert $$1325/12 = 6625/60$$. Then $$S_{xy} = 6961/60 - 6625/60 = 336/60 = 28/5 = 5.6$$.\n\nThe trap: computing $$\\bar{x}\\bar{y}$$ as a single decimal early and rounding it, which destroys the precision of the final subtraction.", "source": "GLM 5.1 ②", "_id": "glm_2_32"}, {"question": "S1 Oct 2023 Q4(d) — When translating $$Y < c$$ where $$Y = k/X$$ and $$X > 0$$, what inequality direction does the flip take, and why? (2 steps)", "answer": "- Step 1: $$Y < c \\iff k/X < c \\iff k < cX \\iff X > k/c$$ (dividing by the positive $$c$$ preserves the inequality direction). The inequality **flips** from $$<$$ to $$>$$ because you're taking the reciprocal of a positive quantity.\n- Step 2: If $$X$$ could be negative, the analysis would split into cases. But for a discrete RV with only positive values (here $$X \\in \\{1,2,3,4\\}$$), the translation is straightforward. Always check the sign of $$X$$ before flipping.\n\nThe key: reciprocation of a positive quantity reverses the inequality. $$\\frac{1}{x} < c \\iff x > \\frac{1}{c}$$ when $$x > 0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "When a tree-diagram question asks $$P(\\text{won 2 games} \\mid W_1)$$, why is it WRONG to divide $$\\frac{P(\\text{exactly 2 wins})}{P(W_1)}$$? (2 steps)", "answer": "- Step 1: The numerator of $$P(A \\mid B)$$ must be $$P(A \\cap B)$$, NOT $$P(A)$$ alone. Here $$A = \\text{\"exactly 2 wins\"}$$ and $$B = W_1$$.\n- Step 2: $$P(\\text{exactly 2 wins})$$ includes the path $$LWW$$, which has $$L$$ on the first game and therefore **contradicts** the condition $$W_1$$. You must strip out that path: the numerator is $$P(WW) + P(WLW)$$, the paths starting with $$W$$ that yield 2 wins.\n\nTakeaway: \"Given $$B$$\" restricts the sample space — you must remove every outcome inconsistent with $$B$$ from the numerator.", "source": "Opus 4.7 ②", "_id": "opus_2_1"}, {"question": "S1 Oct 2023 Q6(b) — what's the most efficient formula for $$S_{xy}$$ when you already have $$\\bar{x}, \\bar{y}$$, and why prefer it over the alternative?", "answer": "Use $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$. Why? Because in this question you've just computed $$\\bar{x}$$ and $$\\bar{y}$$ from the regression-line intersection in part (a), so they're already in hand. The alternative form $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$ is algebraically equivalent but requires you to multiply $$\\sum x$$ and $$\\sum y$$ — an extra step. Keep $$\\bar{x}\\bar{y}$$ as a single fraction (e.g. $$\\frac{1325}{144}$$) to avoid rounding.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "S1 Oct 2023 Q1(e) — The learner computed $$P(\\text{won 2 games} \\mid W_1) = \\frac{0.512}{0.7}$$. The answer is wrong. What exactly is the conceptual error, and why does 0.512 not belong in the numerator? (3 steps)", "answer": "- Step 1: The numerator must be $$P(\\text{won 2 games} \\cap W_1)$$, not the marginal $$P(\\text{won 2 games}) = 0.512$$. The marginal 0.512 includes the path LWW, which has a Loss on game 1.\n- Step 2: Since we condition on $$W_1$$, every path in the numerator must have $$W_1$$ as its first game. LWW fails this — it starts with L — so it must be excluded from the numerator.\n- Step 3: The correct numerator is $$P(WW) + P(WLW) = 0.42 + 0.056 = 0.476$$, giving $$P = 0.476/0.7 = 0.68$$. The difference (0.512 vs 0.476) is exactly the LWW probability 0.036 that was illegally included.\n\nThe core insight: \"given B\" means *restrict your world to B*. Any outcome incompatible with B must be purged from the numerator.", "source": "GLM 5.1 ①", "_id": "glm_1_1"}, {"question": "Why is $$E(g(X)) \\neq g(E(X))$$ in general, and what's a quick example from this paper?", "answer": "Expectation does not commute with nonlinear functions. In Q4: $$E(X) = 3$$ (compute: $$1 \\cdot 0.1 + 2 \\cdot 0.2 + 3 \\cdot 0.3 + 4 \\cdot 0.4 = 3$$), so $$1/E(X) = 1/3 \\approx 0.333$$. But $$E(1/X) = 2/5 = 0.4$$. Different. The function $$1/x$$ is convex, so by Jensen's inequality $$E(1/X) \\geq 1/E(X)$$. **Lesson:** always compute $$E(g(X))$$ via the sum $$\\sum g(x) P(X=x)$$ — never substitute $$E(X)$$ into $$g$$.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "S1 Oct 2023 Q5 — convert \"$$P(Y > 180) = 0.40$$\" to the cumulative form needed for tables.", "answer": "$$P(Y > 180) = 0.40 \\implies P(Y < 180) = 1 - 0.40 = 0.60.$$ Tables (and most calculator inverse-normal functions) give $$\\Phi(z) = P(Z < z)$$ — the cumulative left-tail probability. So you MUST flip \"more than\" probabilities first. From $$\\Phi(z) = 0.60$$: $$z = 0.2533$$ (positive, since 0.60 > 0.5). This conversion is mechanical but easy to forget in the panic of \"five marks for one part\".", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "S1 exam strategy — When computing $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$, what is the rounding discipline? (2 steps)", "answer": "- Step 1: Keep $$\\bar{x}$$ and $$\\bar{y}$$ as exact fractions throughout. For this paper: $$\\bar{x} = \\frac{25}{12}$$, $$\\bar{y} = \\frac{53}{12}$$, so $$n\\bar{x}\\bar{y} = 12 \\times \\frac{25}{12} \\times \\frac{53}{12} = \\frac{1325}{12}$$.\n- Step 2: Only convert to a decimal at the final subtraction: $$\\frac{6961}{60} - \\frac{6625}{60} = \\frac{336}{60} = 5.6$$. If you had rounded $$\\bar{x} \\approx 2.08$$ and $$\\bar{y} \\approx 4.42$$ mid-calculation, you'd get $$12 \\times 2.08 \\times 4.42 \\approx 110.3$$, and $$\\frac{6961}{60} - 110.3 \\approx 5.7$$, which is already off.\n\nFraction → fraction → fraction → decimal only at the end. This is the same discipline as keeping $$z$$-values to 4 d.p. in normal questions.", "source": "GLM 5.1 ③", "_id": "glm_3_64"}, {"question": "S1 exam strategy — What should you do in the final 5 minutes of the exam? (2 steps)", "answer": "- Step 1: Check that every \"given that\" part has the conditional probability formula written explicitly. Verify that numerators are joint probabilities, not marginals.\n- Step 2: Check that all final answers are given to at least 3 significant figures (or as exact fractions). Verify that \"show that\" answers match the given value. Ensure \"hence\" parts reference previous results.\n\nThese are the highest-yield checks: conditional probability formula discipline and answer precision catch the most common lost marks per minute of checking.", "source": "GLM 5.1 ③", "_id": "glm_3_66"}, {"question": "What is the first formula you must write down when you see the phrase \"given that Sally won 2 games in a turn\" in conditional probability? (2 steps)", "answer": "- Step 1: Write the definition of conditional probability: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}.$$\n- Step 2: Identify A and B from the question. Here, $A = \\text{Sally won the first 2 games}$ and $B = \\text{Sally won 2 games in a turn}$. Since $A \\subseteq B$, the numerator simplifies to $P(A)$.\n\n[Optional: This forces you to restrict the sample space to the given condition.]", "source": "Qwen 3 ②", "_id": "qwen_2_0"}, {"question": "What is the PMCC shortcut when both regression lines are given (Q6(c) Oct 2023), and what is the mathematical origin of the identity $$r^2 = b_{yx} \\cdot b_{xy}$$? (3 steps)", "answer": "- Step 1: The shortcut is:\n$$r^2 = (\\text{slope of } y\\text{-on-}x) \\times (\\text{slope of } x\\text{-on-}y) = 1.4 \\times 0.2 = 0.28.$$\n- Step 2: The origin comes from the definitions:\n$$b_{yx} = \\frac{S_{xy}}{S_{xx}}, \\qquad b_{xy} = \\frac{S_{xy}}{S_{yy}}.$$\nMultiplying them gives:\n$$b_{yx}b_{xy} = \\frac{S_{xy}^2}{S_{xx}S_{yy}} = r^2,$$\nsince $$r = S_{xy}/\\sqrt{S_{xx}S_{yy}}$$.\n- Step 3: This bypasses computing $$S_{xx}$$ and $$S_{yy}$$ entirely, which is essential here because $$\\sum x^2$$ and $$\\sum y^2$$ are not given.", "source": "Kimi K2.6 ②", "_id": "kimi_2_37"}, {"question": "What's the relationship between $$P(F \\cap H) = 0$$ (mutually exclusive) and $$P(F \\cup H)$$, and what's the formula shortcut?", "answer": "When $$F$$ and $$H$$ are mutually exclusive, the general union formula $$P(F \\cup H) = P(F) + P(H) - P(F \\cap H)$$ simplifies to just $$P(F) + P(H)$$ because the intersection vanishes. In Q3(ii)(a): $$P(F \\cup H) = \\frac{2}{7} + \\frac{1}{4} = \\frac{8 + 7}{28} = \\frac{15}{28}$$. Spot the \"mutually exclusive\" phrase to trigger this simplification.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "S1 Oct 2023 Q3(i)(b) — The phrase \"carrots or onions but not both\" is an example of what set operation? What is its probability formula? (2 steps)", "answer": "- Step 1: This is the **symmetric difference** $$C \\triangle O = (C \\cup O) \\setminus (C \\cap O)$$. In probability terms: $$P(C \\triangle O) = P(C \\cup O) - P(C \\cap O)$$.\n- Step 2: Since $$P(C \\cup O) = P(C) + P(O) - P(C \\cap O)$$, this simplifies to $$P(C \\triangle O) = P(C) + P(O) - 2P(C \\cap O)$$. Equivalently, in Venn diagram regions: $$w + y$$ (the two crescents only).\n\nThe symmetric difference excludes the overlap — it's the probability of being in exactly one of the two sets. \"Or but not both\" is the verbal cue for this operation.", "source": "GLM 5.1 ③", "_id": "glm_3_73"}, {"question": "S1 Oct 2023 Q1(d) — When computing $$P(A \\mid B)$$ and you realise that event $$A$$ is a subset of event $$B$$ (i.e. $$A \\subseteq B$$), what simplification can you apply to the numerator? (2 steps)", "answer": "- Step 1: If $$A \\subseteq B$$, then $$A \\cap B = A$$. Every outcome in $$A$$ is already in $$B$$, so the intersection collapses to just $$A$$.\n- Step 2: Therefore $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)} = \\frac{P(A)}{P(B)}$$. In Q1(d), \"won the first 2 games\" ($$WW$$) is a subset of \"exactly 2 wins\" (which is $$WW \\cup WLW \\cup LWW$$), so the numerator simplifies to just $$P(WW) = 0.42$$.\n\nThis subset check saves time and prevents the error of adding extra paths to the numerator that are already absorbed.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "What’s the structural fact about the intersection of regression lines?", "answer": "The intersection point is $ (\\bar{x}, \\bar{y}) $, the mean of the data. For example, in Q6(a)(i), solving the two regression equations gives $ \\bar{x} = \\frac{25}{12} $, and $ \\sum x = n \\cdot \\bar{x} = 12 \\cdot \\frac{25}{12} = 25 $. This \"hence\" step directly links the intersection to the total sum.", "source": "Qwen 3 ③", "_id": "qwen_3_8"}, {"question": "S1 Oct 2023 Q6 — When the question gives you $$\\sum xy = \\frac{6961}{60}$$ and asks for $$S_{xy}$$, why is it important to keep the fraction form of $$\\sum xy$$ rather than converting to a decimal? (2 steps)", "answer": "- Step 1: Converting $$\\frac{6961}{60} \\approx 116.017$$ introduces a rounding error. When you subtract $$n\\bar{x}\\bar{y} \\approx 110.417$$, you get $$5.600$$, but with accumulated rounding this could be $$5.6$$ or $$5.5$$ or $$5.7$$ — the mark scheme requires exact or 3 s.f.\n- Step 2: Working in fractions: $$\\frac{6961}{60} - \\frac{6625}{60} = \\frac{336}{60} = \\frac{28}{5} = 5.6$$ exactly. No rounding, no ambiguity. The fraction arithmetic is cleaner because the common denominator (60) is already given.\n\nThe principle: when the question gives you a fraction, keep it as a fraction until the final answer. Decimals are for final reporting, not intermediate working.", "source": "GLM 5.1 ③", "_id": "glm_3_71"}, {"question": "What's the geometric meaning of \"intersection of regression lines = $$(\\bar{x}, \\bar{y})$$\" in terms of data scatter?", "answer": "The point $$(\\bar{x}, \\bar{y})$$ is the **centroid** or \"centre of mass\" of the data cloud. Both regression lines pivot around this point — they minimise their respective residuals (vertical or horizontal) while being anchored at the centroid. Imagine the data scatter as a cloud: the centroid is its centre, and the two best-fit lines both pass through it, fanning out at different angles depending on the correlation. As $$|r| \\to 1$$, the angle between the two lines shrinks to zero.", "source": "Opus 4.7 ②", "_id": "opus_2_59"}, {"question": "Why is $$E(g(X)) \\neq g(E(X))$$ in general? Use the example $$X \\in \\{1, 2\\}$$ with $$P(X=1) = 0.5$$, $$P(X=2) = 0.5$$ and $$g(X) = X^2$$ to show the discrepancy. (3 steps)", "answer": "- Step 1: Compute $$E(X) = 1 \\times 0.5 + 2 \\times 0.5 = 1.5$$. Then $$g(E(X)) = (1.5)^2 = 2.25$$.\n- Step 2: Compute $$E(X^2) = 1^2 \\times 0.5 + 2^2 \\times 0.5 = 0.5 + 2.0 = 2.5$$.\n- Step 3: $$E(X^2) = 2.5 \\neq 2.25 = [E(X)]^2$$. The discrepancy arises because squaring is a nonlinear function — the average of squares exceeds the square of the average (by exactly the variance, by the way: $$\\text{Var}(X) = E(X^2) - [E(X)]^2 = 0.25$$).\n\nOnly for linear functions $$g(X) = aX + b$$ does $$E(g(X)) = g(E(X))$$ hold. For any nonlinear $$g$$, you must compute $$E(g(X))$$ directly from the definition.", "source": "GLM 5.1 ②", "_id": "glm_2_39"}, {"question": "Derive the identity $$r^2 = b_{yx} \\cdot b_{xy}$$ from the definitions of the regression slopes. (3 steps)", "answer": "- Step 1: The y-on-x regression slope is $$b_{yx} = \\frac{S_{xy}}{S_{xx}}$$. The x-on-y regression slope is $$b_{xy} = \\frac{S_{xy}}{S_{yy}}$$.\n- Step 2: The PMCC is $$r = \\frac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$. Square it: $$r^2 = \\frac{S_{xy}^2}{S_{xx} S_{yy}}$$.\n- Step 3: Multiply the two slopes: $$b_{yx} \\cdot b_{xy} = \\frac{S_{xy}}{S_{xx}} \\cdot \\frac{S_{xy}}{S_{yy}} = \\frac{S_{xy}^2}{S_{xx} S_{yy}} = r^2$$.\n\nThe cancellation is beautiful: the standard deviations embedded in the slopes cancel when you multiply, leaving only $$r^2$$.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "Why does the intersection of the two regression lines equal $$(\\bar{x}, \\bar{y})$$? (2 steps)", "answer": "- Step 1: Both regression lines pass through the point $$(\\bar{x}, \\bar{y})$$. The $$y$$-on-$$x$$ line satisfies $$\\bar{y} = a + b\\bar{x}$$ (by the formula $$a = \\bar{y} - b\\bar{x}$$). Similarly, the $$x$$-on-$$y$$ line satisfies $$\\bar{x} = c + d\\bar{y}$$.\n- Step 2: Since both lines pass through $$(\\bar{x}, \\bar{y})$$, and two non-parallel lines intersect at exactly one point, that intersection must be $$(\\bar{x}, \\bar{y})$$.\n\nThis is a fundamental property: the point of means is the unique point shared by both regression lines. It's the \"pivot\" about which both lines rotate.", "source": "GLM 5.1 ③", "_id": "glm_3_30"}, {"question": "Why is $$E(1/X) \\neq 1/E(X)$$ in general?", "answer": "Because the function $$f(x) = 1/x$$ is **non-linear** (convex on positive reals). Expectation only \"commutes\" with linear functions: $$E(aX+b) = aE(X) + b$$. For nonlinear $$g$$, $$E(g(X)) \\neq g(E(X))$$ — in fact, for convex $$g$$, Jensen's inequality gives $$E(g(X)) \\geq g(E(X))$$. This is why $$E(1/X)$$ must be computed term-by-term via $$\\sum (1/x) P(X=x)$$.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "In normal distribution simultaneous equations (Q5e), what precision rule must you follow for z-values, and what goes wrong if you violate it? (2 steps)", "answer": "- Step 1: Keep z-values to **at least 4 decimal places** throughout all working. Use −1.6449 and 0.2533, not −1.6 or 0.25. Round only at the very final answer.\n- Step 2: If you round z₁ = −1.6 and z₂ = 0.25, then the difference is 1.85 instead of 1.8982, giving σ = 28/1.85 = 15.14 instead of 14.75. The error of ~0.4 propagates into μ when you back-substitute: μ = 180 − 0.25 × 15.14 = 176.1 instead of 176.3. At the 3-s.f. level this can flip your answer.\n\nThe principle: in simultaneous equations where you subtract two close numbers, rounding errors amplify. The subtraction $$0.2533 - (−1.6449) = 1.8982$$ is not particularly sensitive, but earlier rounding (0.25 instead of 0.2533) loses 0.0033, which is a 1.7% relative error on the difference.", "source": "GLM 5.1 ①", "_id": "glm_1_28"}, {"question": "Why do \"$$y$$-on-$$x$$\" and \"$$x$$-on-$$y$$\" regression lines differ in general?", "answer": "They optimise different residuals:\n+ $$y$$-on-$$x$$ minimises **vertical** distances (errors in $$y$$) — used when $$x$$ is the predictor.\n+ $$x$$-on-$$y$$ minimises **horizontal** distances (errors in $$x$$) — used when $$y$$ is the predictor.\n\nThe two lines only coincide when $$|r| = 1$$ (perfect correlation), because then there's no residual to minimise. Otherwise, $$b_{yx} \\cdot b_{xy} = r^2 < 1$$, so the slopes are different. The intersection $$(\\bar{x}, \\bar{y})$$ is the only shared point.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "What's the difference between $$P(A \\cap B')$$ and $$P(A) - P(A \\cap B)$$ — or is there a difference? (2 steps)", "answer": "- Step 1: There is no difference — they are the same quantity. $$A$$ can be partitioned into two disjoint pieces: $$A \\cap B$$ and $$A \\cap B'$$. So $$P(A) = P(A \\cap B) + P(A \\cap B')$$, which rearranges to $$P(A \\cap B') = P(A) - P(A \\cap B)$$.\n- Step 2: This identity is useful when you know $$P(A)$$ and $$P(A \\cap B)$$ but need the \"A only\" region of a Venn diagram. For Q3(ii)(c): $$P(F \\cap G') = P(F) - P(F \\cap G) = \\frac{2}{7} - \\frac{19}{140} = \\frac{3}{20}$$.\n\nThink of it as: the total area of circle $$A$$ minus the overlap with $$B$$ leaves the crescent-shaped \"$$A$$ only\" region.", "source": "GLM 5.1 ②", "_id": "glm_2_43"}, {"question": "Why can't two non-trivial mutually exclusive events be independent? Give a concrete example with $$P(A) = 0.3$$ and $$P(B) = 0.4$$. (3 steps)", "answer": "- Step 1: Mutually exclusive means $$P(A \\cap B) = 0$$. There is no overlap — if $$A$$ happens, $$B$$ cannot happen.\n- Step 2: Independence would require $$P(A \\cap B) = P(A) \\times P(B) = 0.3 \\times 0.4 = 0.12$$. But we already have $$P(A \\cap B) = 0$$.\n- Step 3: $$0 \\neq 0.12$$, so the events are not independent. In fact, mutual exclusivity creates strong negative dependence: knowing $$A$$ occurred tells you $$B$$ definitely did NOT occur (probability dropped from 0.4 to 0).\n\nIndependence means \"knowing $$A$$ doesn't change the probability of $$B$$.\" Mutual exclusivity means \"knowing $$A$$ eliminates the possibility of $$B$$.\" These are opposite behaviours.", "source": "GLM 5.1 ②", "_id": "glm_2_56"}, {"question": "When calculating $P(X < 3 \\mid Y < 20)$ for $Y = 30/X$, what are the numerator and denominator probabilities in terms of $X$? (Q4d)", "answer": "- Denominator: $P(Y < 20) = P(X > 1.5) = P(X = 2) + P(X = 3) + P(X = 4) = \\frac{2}{10} + \\frac{3}{10} + \\frac{4}{10} = \\frac{9}{10}$\n- Numerator: The intersection $P(X < 3 \\cap Y < 20)$:\n   + $X < 3$ means $X \\in \\{1, 2\\}$\n   + $Y < 20$ means $X > 1.5$, so $X \\in \\{2, 3, 4\\}$\n   + Intersection = $X = 2$ only\n   + So numerator = $P(X = 2) = \\frac{2}{10}$\n- Final: $\\frac{2/10}{9/10} = \\frac{2}{9}$", "source": "MiniMax ①", "_id": "minimax_1_12"}, {"question": "Why does \"smaller IQR\" translate to \"more consistent\" in a distribution-comparison context sentence?", "answer": "The IQR measures the spread of the middle 50% of the data. A smaller IQR means values cluster more tightly around the median, so the data are **less variable / more consistent**. This phrasing — \"more consistent\" or \"less variable\" — is what Edexcel rewards as a context interpretation. Just stating \"smaller IQR\" without interpretation misses the context mark.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "When computing $$P(WW \\mid \\text{exactly 2 wins})$$, why does the intersection $$WW \\cap \\{\\text{exactly 2 wins}\\}$$ simplify?", "answer": "Because $$WW \\subseteq \\{\\text{exactly 2 wins}\\}$$ — winning the first two games is itself a way of winning exactly 2 games (the turn stops at 2-0). So $$WW \\cap \\{\\text{exactly 2 wins}\\} = WW$$, meaning the numerator is just $$P(WW)$$. Whenever $$A \\subseteq B$$, the conditional formula collapses to $$P(A)/P(B)$$ — no need to compute an intersection separately.", "source": "Opus 4.7 ①", "_id": "opus_1_4"}, {"question": "For a discrete random variable $$X$$ with known distribution, how do you compute $$E(g(X))$$ for some function $$g$$? Walk through the method with a dumbed-down example: $$X$$ takes values 1, 2 with $$P(X=1) = 0.4$$, $$P(X=2) = 0.6$$, and $$g(X) = 1/X$$. (3 steps)", "answer": "- Step 1: Evaluate $$g$$ at each value of $$X$$: $$g(1) = 1/1 = 1$$ and $$g(2) = 1/2 = 0.5$$.\n- Step 2: Multiply each $$g(x)$$ by its probability: $$1 \\times 0.4 = 0.4$$ and $$0.5 \\times 0.6 = 0.3$$.\n- Step 3: Sum: $$E(1/X) = 0.4 + 0.3 = 0.7$$.\n\nThe formula is $$E(g(X)) = \\sum g(x) P(X=x)$$. You do NOT substitute $$E(X)$$ into $$g$$ — that is, $$E(1/X) \\neq 1/E(X)$$ in general. The function is applied to each $$x$$-value first, then weighted by probability.", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "Simple exercise: A normal variable has $$\\mu = 50$$, $$\\sigma = 10$$. The 30th percentile is below the mean. Set up (don't solve) the equation for the 30th percentile value $$p$$. (2 steps)", "answer": "- Step 1: $$P(X < p) = 0.30$$. Standardise: $$P\\!\\left(Z < \\frac{p - 50}{10}\\right) = 0.30$$. Since 0.30 < 0.5, the $$z$$-value is negative.\n- Step 2: Look up $$\\Phi^{-1}(0.30)$$: since $$\\Phi(-0.5244) = 0.30$$, we get $$\\frac{p - 50}{10} = -0.5244$$, so $$p = 50 - 5.244 = 44.756$$.\n\nThe sketch confirms: the 30th percentile is to the left of the mean, so $$z$$ must be negative. Always decide the sign from the sketch before looking up the table.", "source": "GLM 5.1 ③", "_id": "glm_3_50"}, {"question": "Simple exercise: A discrete RV $$X$$ has $$P(X=1) = 0.4$$, $$P(X=2) = 0.6$$. Let $$Y = 5 - 2X$$. Find $$P(Y < 2 \\mid X > 1)$$ using the translation strategy. (3 steps)", "answer": "- Step 1: Translate $$Y < 2$$: $$5 - 2X < 2 \\iff -2X < -3 \\iff X > 1.5$$. Since $$X \\in \\{1, 2\\}$$, this means $$X = 2$$.\n- Step 2: The condition $$X > 1$$ also gives $$X = 2$$. So $$\\{Y < 2\\} \\cap \\{X > 1\\} = \\{X = 2\\}$$, and $$P(X > 1) = P(X = 2) = 0.6$$.\n- Step 3: $$P(Y < 2 \\mid X > 1) = \\frac{P(X = 2)}{P(X = 2)} = 1$$. Given that $$X > 1$$, we know $$X = 2$$, which automatically makes $$Y = 5 - 4 = 1 < 2$$.\n\nThis illustrates the translation strategy: convert conditions on $$Y$$ to conditions on $$X$$, then work entirely in the $$X$$-world.", "source": "GLM 5.1 ③", "_id": "glm_3_63"}, {"question": "S1 Oct 2023 Q3(i)(a) — When filling in Venn diagram regions, what's the first step to avoid swapping labels like $$w$$ and $$x$$? (3 steps)", "answer": "- Step 1: Re-read the printed diagram carefully. Identify which region the question labels as $$w$$, $$x$$, $$y$$, $$z$$. Do NOT assume $$w$$ = intersection — the diagram might label $$w$$ as the \"$$O$$ only\" region.\n- Step 2: Define each region explicitly in terms of set notation before substituting: e.g. \"$$w = P(O \\cap C')$$, $$x = P(O \\cap C)$$, $$y = P(C \\cap O')$$, $$z = P((O \\cup C)')$$.\"\n- Step 3: Now match the given information to your definitions. \"Bob buys onions but not carrots\" = $$P(O \\cap C') = w = 0.15$$. If you had assumed $$w$$ = intersection, you'd write 0.55 in the wrong region.\n\nThe error pattern: assuming the first label corresponds to the largest or most \"important\" region. Always verify against the printed diagram.", "source": "GLM 5.1 ②", "_id": "glm_2_12"}, {"question": "In Q4(d), the learner tried to compute $$P(X < 3 \\mid Y < 20)$$ using a \"2D joint distribution\" approach, treating X and Y as independent. Why is this fundamentally impossible? (2 steps)", "answer": "- Step 1: A joint distribution of (X, Y) requires two random variables that can vary independently. But $$Y = 30/X$$ is a deterministic function of X — once X is known, Y is fixed. There is no \"joint\" variability.\n- Step 2: The joint distribution of (X, 30/X) is degenerate: all probability mass lies on the curve $$y = 30/x$$. There is no probability \"off the curve,\" so $$P(X = x, Y = y) = 0$$ unless $$y = 30/x$$. Computing $$P(X < 3) \\times P(Y < 20)$$ as if they were independent gives a meaningless number.\n\nThe correct approach is always: translate the condition on Y to a condition on X, then work entirely in the X-sample-space.", "source": "GLM 5.1 ①", "_id": "glm_1_46"}, {"question": "S1 Oct 2023 Q2(d) — Why is \"smaller IQR\" interpreted as \"more consistent,\" and why should you NOT mention skew in a \"compare\" answer? (2 steps)", "answer": "- Step 1: IQR measures the spread of the middle 50% of data. A smaller IQR means the central data are more tightly clustered, hence \"more consistent\" or \"less variable.\" This is the standard Edexcel interpretation.\n- Step 2: Skew is not part of the mark scheme template for \"compare\" questions. If you mention it and get it wrong (e.g. miscalling the direction of skew), it can cancel a correct median/IQR claim. The safe strategy: median + IQR + context, nothing else.\n\nThe examiner is looking for two specific comparisons. Everything else is noise.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "What does \"hence\" mean in an Edexcel exam instruction, and what does it cost you if you ignore it?", "answer": "\"Hence\" means **use the result from the previous part directly**. In Q6(a)(ii) — \"Hence show $$\\sum x = 25$$\" — you must reference the intersection $$(\\bar{x}, \\bar{y}) = (25/12, 53/12)$$ from part (i) and apply $$\\sum x = n\\bar{x} = 12 \\cdot \\frac{25}{12} = 25$$. If you ignore \"hence\" and try to derive $$\\sum x$$ from scratch, you'll get stuck (no $$\\sum x^2$$ given) and lose method marks even if you somehow get the answer.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "S1 Oct 2023 Q6(a)(i) — When given two regression equations ($$y$$-on-$$x$$ and $$x$$-on-$$y$$), how do you find their intersection? (2 steps)", "answer": "- Step 1: Treat the two equations as a 2×2 linear system. Substitute one into the other. From $$y = 1.4x + 1.5$$ and $$x = 1.2 + 0.2y$$: substitute the first into the second: $$x = 1.2 + 0.2(1.4x + 1.5) = 1.2 + 0.28x + 0.3$$.\n- Step 2: Solve for $$x$$: $$x - 0.28x = 1.5$$, so $$0.72x = 1.5$$, giving $$x = 25/12$$. Then $$y = 1.4(25/12) + 1.5 = 53/12$$. Keep fractions — don't convert to decimals until the end.\n\nThe intersection is a fixed point — it's where both equations are simultaneously satisfied.", "source": "GLM 5.1 ②", "_id": "glm_2_30"}, {"question": "S1 Oct 2023 Q6(c) — When BOTH regression equations are given, what shortcut identity lets you find the PMCC $$r$$ without computing $$S_{xx}$$ or $$S_{yy}$$? (2 steps)", "answer": "- Step 1: The identity is $$r^2 = b_{yx} \\cdot b_{xy}$$, where $$b_{yx}$$ is the slope of the $$y$$-on-$$x$$ line and $$b_{xy}$$ is the slope of the $$x$$-on-$$y$$ line. Here: $$r^2 = 1.4 \\times 0.2 = 0.28$$.\n- Step 2: Take the square root and determine the sign: $$r = \\sqrt{0.28} \\approx 0.529$$. Since both slopes are positive, $$r$$ is positive (they must have the same sign).\n\nThis shortcut completely bypasses the need for $$S_{xx}$$, $$S_{yy}$$, $$\\sum x^2$$, or $$\\sum y^2$$. Phuc got stuck trying to compute $$S_{xx}$$ from $$\\sum x^2$$ (which wasn't given) — the identity makes all of that unnecessary.", "source": "GLM 5.1 ③", "_id": "glm_3_32"}, {"question": "In Q2(d), Mr Fuat's template dictates that you compare exactly two statistical measures. What are they, and what aspect of the distribution does each describe? (1 step)", "answer": "- Step 1: You must compare the median (a measure of location or central tendency) and the interquartile range (a measure of spread or variability). No other measures such as range, skewness, or outlier counts should be mentioned unless the question explicitly asks for them.", "source": "Kimi K2.6 ①", "_id": "kimi_1_10"}, {"question": "When computing $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$ with $$\\bar{x} = 25/12$$, $$\\bar{y} = 53/12$$, why should you keep fractions until the end?", "answer": "Decimal approximations of $$25/12 = 2.0833...$$ and $$53/12 = 4.4167...$$ propagate rounding errors when multiplied and then subtracted from $$\\sum xy = 6961/60$$ (a similarly small-denominator fraction). Keep everything as fractions: $$n\\bar{x}\\bar{y} = 12 \\cdot \\frac{25 \\cdot 53}{144} = \\frac{1325}{12}$$. Then common-denominator with $$6961/60$$ gives an exact $$5.6$$. Decimal mid-working can shift the final answer by 0.01–0.1, costing the accuracy mark.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "What’s the Edexcel S1 definition of an outlier?", "answer": "A value is an outlier if it lies **below $ Q_1 - 1.5 \\times \\text{IQR} $** or **above $ Q_3 + 1.5 \\times \\text{IQR} $**. In Q2(b), $ \\text{IQR} = 18 $, so outliers are $ < 45 - 27 = 18 $ or $ > 63 + 27 = 90 $. The weights 16 and 94 fall outside this range.", "source": "Qwen 3 ③", "_id": "qwen_3_12"}, {"question": "Why is the intersection of the two regression lines always $$(\\bar{x}, \\bar{y})$$? Give the algebraic intuition. (2 steps)", "answer": "- Step 1: The y-on-x regression line passes through $$(\\bar{x}, \\bar{y})$$ because it is the line that minimises vertical (y-direction) squared residuals, and the residual at the mean point is zero by construction: $$\\bar{y} = a + b\\bar{x}$$ is built into the formula $$a = \\bar{y} - b\\bar{x}$$.\n- Step 2: The x-on-y regression line also passes through $$(\\bar{x}, \\bar{y})$$ by the same argument in the x-direction. Since both lines pass through $$(\\bar{x}, \\bar{y})$$, and they are generally not parallel (unless $$r = \\pm 1$$), their unique intersection point is $$(\\bar{x}, \\bar{y})$$.\n\nThis is a universal property of least-squares regression lines: the point of means is always on both lines, hence is always their intersection.", "source": "GLM 5.1 ①", "_id": "glm_1_30"}, {"question": "S1 Oct 2023 Q4(c) — For a linear transformation $$Y = aX + b$$ (or $$Y = a \\cdot g(X)$$), how do $$E(Y)$$ and $$\\text{Var}(Y)$$ relate to $$E(g(X))$$ and $$\\text{Var}(g(X))$$? (2 steps)", "answer": "- Step 1: Expectation is linear: $$E(Y) = E(a \\cdot g(X)) = a \\cdot E(g(X))$$. For this question, $$Y = 30/X$$, so $$E(Y) = 30 \\times E(1/X) = 30 \\times \\frac{2}{5} = 12$$. The constant multiplier passes straight through.\n- Step 2: Variance scales by the SQUARE of the multiplier: $$\\text{Var}(Y) = a^2 \\cdot \\text{Var}(g(X))$$. For this question, $$\\text{Var}(Y) = 30^2 \\times \\text{Var}(1/X) = 900 \\times \\frac{29}{600} = \\frac{87}{2} = 43.5$$. The $$+b$$ term (if present) disappears from variance because shifting doesn't change spread.\n\nThe #1 pitfall: using $$\\text{Var}(aX) = a\\,\\text{Var}(X)$$ instead of $$a^2\\,\\text{Var}(X)$$. Variance involves squared deviations, so the multiplier gets squared.", "source": "GLM 5.1 ②", "_id": "glm_2_20"}, {"question": "S1 Oct 2023 Q6(c) — How can you verify the PMCC shortcut answer using the \"long route,\" and why might you do this as a check? (3 steps)", "answer": "- Step 1: From $$b_{yx} = S_{xy}/S_{xx} = 1.4$$ and $$S_{xy} = 5.6$$, compute $$S_{xx} = 5.6/1.4 = 4$$. From $$b_{xy} = S_{xy}/S_{yy} = 0.2$$, compute $$S_{yy} = 5.6/0.2 = 28$$.\n- Step 2: Apply the full formula: $$r = S_{xy}/\\sqrt{S_{xx}S_{yy}} = 5.6/\\sqrt{4 \\times 28} = 5.6/\\sqrt{112} = 5.6/10.583 \\approx 0.529$$.\n- Step 3: This matches the shortcut answer, confirming correctness. Use this as a sanity check in the exam if time permits — it catches sign errors and arithmetic slips in the slope read-offs.\n\nThe long route doesn't require $$\\sum x^2$$ or $$\\sum y^2$$ either, since you can recover $$S_{xx}$$ and $$S_{yy}$$ from the slopes and $$S_{xy}$$.", "source": "GLM 5.1 ②", "_id": "glm_2_35"}, {"question": "S1 Oct 2023 Q5(c) — Why is $k = 1.96 \\times 25$ for the symmetric 95% interval? (2 steps)", "answer": "- Step 1: For a symmetric 95% interval, 2.5% of the distribution lies in each tail. The corresponding $z$-value is 1.96 (from standard normal tables).\n- Step 2: Multiply by the standard deviation: $k = 1.96 \\times 25 = 49$ kg.  \nWhy 1.96? For 95% confidence, 1.96 captures 97.5% of the data below it (leaving 2.5% in the upper tail).", "source": "Qwen 3 ④", "_id": "qwen_4_9"}, {"question": "For mutually exclusive events $$F$$ and $$H$$, what does $$P(F \\cup H)$$ simplify to, and why? (2 steps)", "answer": "- Step 1: Mutually exclusive means $$P(F \\cap H) = 0$$ — the events cannot occur simultaneously. There is no overlap in the Venn diagram.\n- Step 2: The general union formula $$P(F \\cup H) = P(F) + P(H) - P(F \\cap H)$$ simplifies to $$P(F \\cup H) = P(F) + P(H)$$. For this paper: $$\\frac{2}{7} + \\frac{1}{4} = \\frac{15}{28}$$.\n\nThis is the only situation where probabilities of two events simply add — the subtraction term vanishes.", "source": "GLM 5.1 ②", "_id": "glm_2_45"}, {"question": "What single phrase in the Q1 stem tells you that WW and LL are 2-game paths, and how must this affect your enumeration table? (gap_33)", "answer": "- Step 1: The phrase is: \"If she wins the first 2 games or loses the first 2 games, then she will not play the 3rd game.\"\n- Step 2: This explicitly states the TURN STOPS after two consecutive wins (WW) or two consecutive losses (LL). There is NO third game.\n- Step 3: Your enumeration table must list only 6 paths: WW, WLW, WLL, LWW, LWL, LL — NOT 8 paths. Do NOT include WLW followed by a third game, or any third-game branch after WW or LL.\n\nThe word \"will not play\" is the trigger — it terminates the branch. Your path table must reflect this stopping rule.", "source": "GAP-MiniMax ②", "_id": "minimax_2_31"}, {"question": "For the Venn diagram regions $$w$$, $$x$$, $$y$$, $$z$$ in Q3(i)(a), what is the four-step dependency order that starts from the given region and derives the rest without simultaneous equations? (4 steps)", "answer": "- Step 1: Set $$w = P(O \\cap C') = 0.15$$, which is given directly.\n- Step 2: Derive $$x$$ from the total $$P(O)$$: since $$P(O) = 1 - P(O') = 0.70$$, then $$x = 0.70 - w = 0.55$$.\n- Step 3: Derive $$y$$ from the total $$P(C)$$: since $$P(C) = x + y = 0.65$$, then $$y = 0.65 - 0.55 = 0.10$$.\n- Step 4: Derive $$z$$ from the probability sum: $$z = 1 - (w + x + y) = 1 - 0.80 = 0.20$$.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_7"}, {"question": "After translating Y < 20 and X < 3 each to a subset of X-values in Q4(d), what set operation gives the numerator's x-value(s)? (2 steps)", "answer": "- Step 1: Translate each condition to an X-subset. $$Y < 20$$ means $$30/X < 20$$, i.e. $$X > 1.5$$, so $$\\{Y < 20\\} = \\{X \\in \\{2, 3, 4\\}\\}$$. And $$\\{X < 3\\} = \\{X \\in \\{1, 2\\}\\}$$.\n- Step 2: The numerator of the conditional probability $$P(X < 3 \\cap Y < 20)$$ requires the **set intersection**: $$\\{2, 3, 4\\} \\cap \\{1, 2\\} = \\{2\\}$$. A single x-value answers the numerator: $$P(X = 2) = 1/5$$.\n\nDo NOT multiply probabilities as if X and Y were independent — they are perfectly dependent (Y is a function of X). The intersection of the two conditions is a set intersection on X-values, not a probability product.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_11"}, {"question": "After computing outlier fences (e.g. lower fence = 18, upper fence = 90) for a dataset of 33 values, what is the efficient 4-value scan you perform rather than testing all 33 values against the fences? (2 steps)", "answer": "- Step 1: Sort the data (already done if from a stem-and-leaf). Then check only the two smallest values against the lower fence, and the two largest values against the upper fence.\n- Step 2: In the kangaroo example: smallest two are 16 and 23. $$16 < 18$$ → outlier; $$23 \\geq 18$$ → not an outlier, and since the data are sorted, everything between 23 and the median is also safe. Largest two are 94 and 86. $$94 > 90$$ → outlier; $$86 \\leq 90$$ → not an outlier, and everything between the median and 86 is safe.\n\nYou only need to check the extreme endpoints because the data are sorted — once a non-outlier is found at the boundary, all interior values are guaranteed safe.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_2"}, {"question": "S1 Oct 2023 Q4(c) — The question defines Y = 30/X. What algebraic refactor lets you treat this as a linear scaling of the random variable 1/X, so you can reuse the answers from parts (a) and (b) directly instead of recomputing from scratch? (2 steps)", "answer": "- Step 1: Rewrite Y as Y = 30 × (1/X). This identifies the inner function g(X) = 1/X as the unit random variable whose expectation and variance you already computed, and the constant a = 30 as the linear scale factor applied to it.\n- Step 2: Because E(a·U) = a·E(U) and Var(a·U) = a²·Var(U) for any random variable U and constant a, you immediately write E(Y) = 30·E(1/X) and Var(Y) = 30²·Var(1/X). This avoids rebuilding the probability table, re-summing four terms, and re-finding common denominators.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_14"}, {"question": "S1 Oct 2023 Q1 — After enumerating all valid paths in the stop-rule tree, you sum the path probabilities and obtain 1.024. What specific category of mistake does this excess of 0.024 signal, and which paths are the usual suspects? (2 steps)", "answer": "- Step 1: A total exceeding 1 is impossible for a partition of the sample space. The excess signals that at least one path has been double-counted or that a non-existent path has been assigned probability. In this question, the usual suspect is the phantom 3rd game after WW or LL.\n- Step 2: Specifically, if you attach a 3rd game to WW with probabilities 0.6 and 0.4, you create two extra paths (WWW and WWL) that should not exist. Their probabilities sum to the same mass as WW itself, effectively counting the same initial segment twice. This duplication inflates the total.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_3"}, {"question": "In Q5(e), after obtaining $$\\sigma \\approx 14.751$$, why is it essential to back-substitute the unrounded value into equation (2) to find $$\\mu$$, rather than using $$\\sigma \\approx 14.8$$? (2 steps)", "answer": "- Step 1: Rounding $$\\sigma$$ to 14.8 before back-substitution injects an error of roughly 0.05 into the product $$z \\cdot \\sigma$$, which can shift the calculated $$\\mu$$ by 0.5 g or more.\n- Step 2: The mark scheme requires $$\\mu$$ to be computed from the full-precision intermediate; you round only the final displayed answers for $$\\mu$$ and $$\\sigma$$.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_15"}, {"question": "S1 Oct 2023 Q5(e) — A student solves for $$\\mu$$ first by rearranging equation (1): $$\\mu = 152 + 1.6449\\sigma$$, then substitutes into equation (2). Why is this approach inferior to subtracting the equations? (3 steps)", "answer": "- Step 1: Substituting $$\\mu = 152 + 1.6449\\sigma$$ into equation (2) gives $$\\frac{180 - (152 + 1.6449\\sigma)}{\\sigma} = 0.2533$$, which simplifies to $$\\frac{28 - 1.6449\\sigma}{\\sigma} = 0.2533$$. This requires distributing the negative sign and then dividing by $$\\sigma$$ — two algebraic steps where sign errors can creep in.\n- Step 2: Subtracting the equations directly gives $$\\frac{28}{\\sigma} = 1.8982$$ in ONE line, with no distribution and no sign management. The $$\\mu$$ terms cancel before you touch any arithmetic.\n- Step 3: Additionally, the substitution approach requires you to carry the unrounded $$\\sigma$$ through more arithmetic steps before back-substituting for $$\\mu$$, increasing rounding risk. The subtraction approach isolates $$\\sigma$$ first with minimal arithmetic, then back-substitutes once.\n\nThe general principle for simultaneous equations: eliminate one variable by subtraction (or addition) before substituting. Substitution introduces more algebra and more error opportunities.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_40"}, {"question": "When 'showing that' P(X<240) = 0.8849 in Q5(a), what precision must you quote Phi(1.20) at, and what's the booklet's exact entry? (gap_14)", "answer": "- Step 1: You must quote Phi(1.20) to exactly 4 decimal places as printed in the Edexcel statistical tables booklet: Phi(1.20) = 0.8849.\n- Step 2: Write the complete standardisation and lookup:\n$$P(X < 240) = P\\left(Z < \\frac{240 - 210}{25}\\right) = P(Z < 1.20) = \\Phi(1.20) = 0.8849$$\n- Step 3: Truncating to 3 d.p. (0.885) or paraphrasing (0.88...) loses precision marks. The mark scheme matches the exact 4-d.p. value from the booklet.\n\nThe \"show that\" instruction demands verbatim table-quoting — match the booklet's precision exactly.", "source": "GAP-MiniMax ②", "_id": "minimax_2_12"}, {"question": "Before computing Var(1/X) for a discrete RV where the x-values are {10, 20, 30, 40}, what two LCMs should you predict, and from which denominators? (2 steps)", "answer": "- Step 1: For $$E(1/X^2)$$, the terms have denominators from $$x^2 \\cdot P(X=x)$$. The raw denominators are {10, 20, 30, 40}. The LCM of {10, 20, 30, 40} is **120**. This is your first LCM — use it to sum the $$E(1/X^2)$$ terms.\n- Step 2: For Var itself, you compute $$E(1/X^2) - [E(1/X)]^2$$. The first term has denominator 24 (after simplifying 25/120) and the second has denominator 25 (from $$(2/5)^2$$). The LCM of {24, 25} is **600**. This is your second LCM.\n\nPlan the denominator ladder before computing: 120 first, then 600. This prevents mid-calculation arithmetic tangles.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "S1 Oct 2023 Q1(d), Q1(e), and Q4(d) — These three parts share a conditional-probability skeleton. State the universal two-step procedure that handles all three identically, starting from the phrase \"given that\". (2 steps)", "answer": "- Step 1: Identify the conditioning event B from the phrase \"given that B\". Restrict your attention to the subset of outcomes that satisfy B; this becomes your new denominator. Enumerate or sum the probabilities of all outcomes in this restricted space.\n- Step 2: Within that restricted space, identify the outcomes that also satisfy the event A asked for in the numerator. Sum their probabilities to obtain P(A ∩ B). Then apply the definition P(A | B) = P(A ∩ B) / P(B). This procedure works whether the outcomes are tree paths (Q1), discrete values (Q4), or any other sample space.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_22"}, {"question": "S1 Oct 2023 Q4(c) — Looking at Y = 30/X, what is the algebraic refactor that lets you reuse parts (a) and (b) directly? (3 steps)", "answer": "- Step 1: Rewrite $$Y = \\frac{30}{X} = 30 \\cdot \\frac{1}{X}$$. This expresses Y as a linear function of the random variable $$\\frac{1}{X}$$, with coefficient $$a = 30$$ and constant $$b = 0$$.\n- Step 2: Apply the linear-scaling rules: $$E(Y) = a \\cdot E(1/X) = 30 \\times \\frac{2}{5} = 12$$, and $$\\text{Var}(Y) = a^2 \\cdot \\text{Var}(1/X) = 900 \\times \\frac{29}{600} = \\frac{87}{2} = 43.5$$.\n- Step 3: The key insight is that you never recompute $$E(1/X)$$ or $$\\text{Var}(1/X)$$ from scratch — you already found them in parts (a) and (b). The refactor $$Y = 30 \\cdot (1/X)$$ makes the connection explicit. Without it, you'd be computing $$E(30/X) = \\sum \\frac{30}{x} P(X=x)$$ term by term — five times the work.\n\nTakeaway: When Y = k/X, rewrite as Y = k · (1/X). Then E(Y) = k·E(1/X) and Var(Y) = k²·Var(1/X). Reuse, don't recompute.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "S1 Oct 2023 Q5(b) — To compute P(190 < X < 240) you need Φ(1.2) − Φ(−0.8). Why must you NOT attempt to look up Φ(−0.8) directly from the standard normal table, and what exact substitution do you make instead? (2 steps)", "answer": "- Step 1: The standard normal table in the formula booklet only lists Φ(z) for z ≥ 0. There is no entry for negative z-values, so looking up −0.8 is impossible.\n- Step 2: You use the symmetry identity Φ(−z) = 1 − Φ(z). Therefore Φ(−0.8) = 1 − Φ(0.8) = 1 − 0.7881 = 0.2119. The required probability becomes Φ(1.2) − (1 − Φ(0.8)) = 0.8849 − 0.2119. This substitution converts the problem into a difference of two table entries, both with positive arguments.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_27"}, {"question": "S1 Oct 2023 Q2(c) — in what fixed order must you draw the 6 components of a box plot with outliers, and why does the order prevent errors?", "answer": "- Step 1: **Lower outlier cross** (×) at the outlier value (e.g., 16) — plot first so you don't accidentally extend the whisker here.\n- Step 2: **Lower whisker** from the smallest NON-outlier (23) — never to 16.\n- Step 3: **Box** from $$Q_1$$ (45) to $$Q_3$$ (63).\n- Step 4: **Median line** inside the box at 57.\n- Step 5: **Upper whisker** to the largest non-outlier (86) — never to 94.\n- Step 6: **Upper outlier cross** (×) at 94.\n\nTakeaway: Plotting outliers FIRST as crosses prevents the most common error: extending whiskers all the way to the extreme values.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "S1 Oct 2023 Q3(i)(c) — When showing that events C and O are not statistically independent, what three-line structure does the mark scheme require, and why does skipping the explicit numerical evaluation of P(C)P(O) cost you the comparison mark? (2 steps)", "answer": "- Step 1: The three required lines are: (1) compute P(C ∩ O) numerically from the Venn diagram (for example, x = 0.55), (2) compute P(C)P(O) numerically (for example, 0.65 × 0.70 = 0.455), and (3) state the inequality P(C ∩ O) ≠ P(C)P(O) and conclude \"therefore not independent\".\n- Step 2: If you skip the explicit numerical RHS and merely write \"0.55 ≠ P(C)P(O)\", the examiner cannot see that you evaluated the product. The comparison mark is awarded for demonstrating the numerical mismatch, not for asserting inequality in symbols. You must show both sides as decimals or fractions.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_11"}, {"question": "S1 Oct 2023 Q4(a) — when computing $$E\\left(\\frac{1}{X}\\right)$$, what cancellation makes every term equal $$\\frac{1}{10}$$, and what feature of $$P(X=x)$$ enables it?", "answer": "- Step 1: The probability mass function is $$P(X = x) = \\frac{x}{10}$$ for x = 1, 2, 3, 4 (the row $$\\frac{1}{10}, \\frac{2}{10}, \\frac{3}{10}, \\frac{4}{10}$$).\n- Step 2: Each term in $$E(1/X) = \\sum \\frac{1}{x} \\cdot P(X=x)$$ becomes $$\\frac{1}{x} \\cdot \\frac{x}{10} = \\frac{1}{10}$$ — the x cancels.\n- Step 3: So $$E(1/X) = 4 \\times \\frac{1}{10} = \\frac{2}{5}$$ in one line.\n\nTakeaway: when $$P(X=x)$$ is proportional to $$x$$, the function $$1/x$$ cancels the weight and the expectation collapses to a counting argument.", "source": "GAP-Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "S1 Oct 2023 Q5(e) — After writing the two standardised equations for μ and σ, what is the literal one-line subtraction that eliminates μ and gives σ directly, and why is solving for μ first algebraically messier? (2 steps)", "answer": "- Step 1: Subtract equation (1) from equation (2): (180 − μ)/σ − (152 − μ)/σ = 0.2533 − (−1.6449). The μ terms cancel, leaving 28/σ = 1.8982. One division gives σ = 28 / 1.8982.\n- Step 2: Solving for μ first would require rearranging each equation to μ = 152 + 1.6449σ and μ = 180 − 0.2533σ, then equating them. This introduces extra algebraic steps and risks sign errors when distributing the negative. Subtraction first exploits the identical structure of the left-hand sides and isolates σ in one move.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_28"}, {"question": "S1 Oct 2023 Q6(b) — Two algebraically equivalent formulas for S_xy are available: Σxy − n x̄ ȳ and Σxy − (Σx)(Σy)/n. Given that part (a)(ii) yielded x̄ = 25/12 as a fraction, which form is optimal, and what makes that choice automatic? (2 steps)", "answer": "- Step 1: Choose S_xy = Σxy − n x̄ ȳ. In part (a)(ii) you have already established x̄ = 25/12 and ȳ = 53/12 as exact fractions from the intersection point. Plugging these directly into n x̄ ȳ uses results you have on the page.\n- Step 2: The alternative form Σxy − (Σx)(Σy)/n would force you to recompute Σx and Σy from scratch or recall them from earlier. Since n x̄ = Σx and n ȳ = Σy, the first form is computationally identical but structurally cleaner: it reuses the means you just found, minimising transcription and arithmetic steps.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_20"}, {"question": "S1 Oct 2023 Q1(a) — The printed tree diagram shows space for 3rd-game branches after both WW and LL. What must you DO with those slots, and why? (2 steps)", "answer": "- Step 1: You must leave those slots BLANK — do not draw branches, do not write probabilities. After WW or LL, the turn STOPS. Those are terminal paths with exactly 2 games, not 3.\n- Step 2: The reason is the stem's stop-rule: \"if she wins the first 2 games or loses the first 2 games, she will not play the 3rd game.\" WW and LL each end the turn immediately. Drawing third-game branches would create phantom paths (e.g. WWW, WWL) that don't exist, inflating your total probability above 1.\n\nTakeaway: A stop-rule in the stem overrides the printed tree's geometry. Blank the slots that the rule kills.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_0"}, {"question": "S1 Oct 2023 Q2(d) — In the compare-distributions template, why is it insufficient to state only the direction of the median difference, even if you use the words \"kangaroo weights\" and \"kg\"? (2 steps)", "answer": "- Step 1: The template requires two distinct comparisons: one for location (median) and one for spread (IQR). Merely stating the median comparison satisfies only half of the required structure. You must also compare the IQRs and interpret what that means for consistency or variability in the context.\n- Step 2: Additionally, each comparison must be followed by an interpretive sentence that explains the practical implication — for example, \"this suggests that kangaroo weights in December are more consistent.\" The direction alone is a bald statistic; the interpretation converts it into a conclusion about the population.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_8"}, {"question": "S1 Oct 2023 Q5(e) — after finding σ ≈ 14.751, why must you back-substitute the UNROUNDED value to compute μ, not the rounded 14.8?", "answer": "- Step 1: μ is computed via $$\\mu = 180 - 0.2533 \\times \\sigma$$ — a multiplication, so error in σ amplifies into μ.\n- Step 2: Using σ = 14.751 (unrounded): $$\\mu = 180 - 0.2533 \\times 14.751 \\approx 176.3$$.\n- Step 3: Using σ = 14.8 (rounded): $$\\mu = 180 - 0.2533 \\times 14.8 \\approx 176.25$$ — close but the error compounds.\n- Step 4: For \"find μ and σ\" worth multiple marks, the answer μ ≈ 176.3 is graded against the unrounded chain. Rounding mid-way can shift μ by 0.5 g and lose a mark.\n\nTakeaway: Keep all intermediate values to 4+ d.p. Round ONLY in the final answer line.", "source": "GAP-Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "S1 Oct 2023 Q4(d) — When solving $$\\frac{30}{X} < 20$$ for X, why does multiplying both sides by X NOT flip the inequality direction? Show the step explicitly. (3 steps)", "answer": "- Step 1: The inequality is $$\\frac{30}{X} < 20$$. To clear the fraction, multiply both sides by X. The inequality direction flips only when you multiply by a NEGATIVE number.\n- Step 2: Here, $$X \\in \\{1, 2, 3, 4\\}$$, so X is always POSITIVE. Multiplying by a positive number preserves the inequality direction. So $$30 < 20X$$, giving $$X > \\frac{30}{20} = 1.5$$.\n- Step 3: If X could be negative (e.g. if the support included negative values), you would need to split into cases: X > 0 (direction preserved) and X < 0 (direction flipped). But since the support is explicitly $$\\{1,2,3,4\\}$$, no case split is needed.\n\nThe guardrail: before multiplying an inequality by a variable, check the sign of that variable over its entire support. If it's always positive (or always negative), no case split needed. If it changes sign, split into cases.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_27"}, {"question": "S1 Oct 2023 Q5(e) — Show the literal one-line arithmetic that gives σ after subtracting the standardised equations. What numerator and what z-difference? (2 steps)", "answer": "- Step 1: The two standardised equations are: $$\\frac{152 - \\mu}{\\sigma} = -1.6449$$ ... (1) and $$\\frac{180 - \\mu}{\\sigma} = 0.2533$$ ... (2). Subtract (1) from (2):\n$$\\frac{180 - \\mu}{\\sigma} - \\frac{152 - \\mu}{\\sigma} = 0.2533 - (-1.6449)$$\n$$\\frac{180 - 152}{\\sigma} = 1.8982$$\n- Step 2: The numerator is **28** (the difference of the two x-values: 180 - 152). The z-difference is **1.8982** (0.2533 minus -1.6449). So $$\\sigma = \\frac{28}{1.8982} = 14.751...$$ This eliminates μ entirely in one subtraction — no substitution needed.\n\nTakeaway: When you have two percentile equations, always SUBTRACT to eliminate μ first. The numerator is the difference of the two data values; the denominator is the difference of the two z-scores. σ falls out in one division.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_25"}, {"question": "S1 Oct 2023 Q1 — Why is checking that the sum of all path probabilities equals exactly 1 a diagnostic step that catches both duplicated paths and missing stop-rules? (2 steps)", "answer": "- Step 1: The axiom of total probability requires that the probabilities of all mutually exclusive and exhaustive outcomes sum to 1. If you have respected every stop-rule and listed every path exactly once, the sum must be 1 by construction.\n- Step 2: Therefore, any deviation from 1 is a definitive alarm. A sum less than 1 indicates missing paths (perhaps you stopped drawing too early); a sum greater than 1 indicates overlapping or duplicated paths (perhaps you drew extra branches after terminal states). This check replaces intuition with an objective audit.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_4"}, {"question": "S1 Oct 2023 Q6(a)(i) — When solving the two regression lines simultaneously, which equation should you substitute INTO which, and why does that direction keep arithmetic cleanest? (3 steps)", "answer": "- Step 1: You have $$y = 1.4x + 1.5$$ (y-on-x) and $$x = 1.2 + 0.2y$$ (x-on-y). Substitute the y-on-x equation INTO the x-on-y equation.\n- Step 2: Why? The x-on-y equation is already EXPLICIT in x: $$x = 1.2 + 0.2y$$. Replacing y with $$1.4x + 1.5$$ gives: $$x = 1.2 + 0.2(1.4x + 1.5) = 1.2 + 0.28x + 0.3 = 1.5 + 0.28x$$. This is a simple linear equation in x with no fractions.\n- Step 3: The reverse direction would require substituting $$x = 1.2 + 0.2y$$ into $$y = 1.4x + 1.5$$, giving $$y = 1.4(1.2 + 0.2y) + 1.5 = 1.68 + 0.28y + 1.5 = 3.18 + 0.28y$$. This also works, but the first direction keeps x isolated on the left from the start, which is marginally cleaner and avoids any temptation to rearrange incorrectly.\n\nTakeaway: Substitute into the equation that's already solved for the variable you want to eliminate. Less rearrangement = fewer errors.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_16"}, {"question": "S1 Oct 2023 Q1(d)/(e) and Q4(d) — What is the universal 2-step procedure that handles all conditional probability questions on tree diagrams and discrete RVs? (4 steps)", "answer": "- Step 1: **Write the formula** at the top of your answer: $$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$$. Never skip this — it forces you to identify the numerator and denominator correctly.\n- Step 2: **Identify the conditioning event B** — the phrase after \"given that.\" In Q1(d), B = \"exactly 2 wins.\" In Q1(e), B = $$W_1$$. In Q4(d), B = $$Y < 20$$ (which translates to $$X \\in \\{2,3,4\\}$$).\n- Step 3: **Restrict the sample space to B** — enumerate only the paths (or x-values) satisfying B. This is your denominator. In Q1(d), the 3 paths with exactly 2 wins. In Q1(e), the 4 paths starting with W. In Q4(d), the 3 x-values {2,3,4}.\n- Step 4: **Within that restricted space, enumerate the numerator paths** — those that ALSO satisfy A. In Q1(d), A ∩ B = WW (1 path). In Q1(e), A ∩ B = WW or WLW (2 paths). In Q4(d), A ∩ B = {2} (1 value). Then divide.\n\nTakeaway: Formula → identify B → restrict sample space → count numerator within restriction. This 4-step skeleton works on every conditional-probability question in S1.", "source": "GAP-GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "S1 Oct 2023 Q2(b) — After computing fences at 18 and 90 for a dataset of 33 values, what is the efficient 4-value scan you perform, rather than testing all 33 weights against the fences? (3 steps)", "answer": "- Step 1: The data are already sorted (from the stem-and-leaf). Outliers can only occur at the extremes. So scan only the **two smallest** values and the **two largest** values.\n- Step 2: Check the smallest value (16) against the lower fence (18): $$16 < 18$$, so 16 is an outlier. Check the second-smallest (23) against 18: $$23 > 18$$, so no further lower outliers. Check the largest value (94) against the upper fence (90): $$94 > 90$$, so 94 is an outlier. Check the second-largest (86) against 90: $$86 < 90$$, so no further upper outliers.\n- Step 3: The inner pair (23 and 86) are just a quick eyeball confirm — they are clearly well inside the fences. You never need to test the middle 29 values because they lie between 23 and 86, which are already inside the fences.\n\nThe key insight: in a sorted list, outliers can only live at the tails. Scan the extreme 4, skip the rest.", "source": "GAP-GLM 5.1 ③", "_id": "glm_3_3"}, {"question": "When drawing a box plot with outliers for Q2(c), what is the rigid six-component order, and why does whisker-before-outlier sequencing prevent visual errors? (6 steps)", "answer": "- Step 1: Plot the lower outlier as a cross.\n- Step 2: Draw the lower whisker from the box down to the smallest non-outlier.\n- Step 3: Draw the box edges from $$Q_1$$ to $$Q_3$$.\n- Step 4: Draw the median line inside the box.\n- Step 5: Draw the upper whisker from the box up to the largest non-outlier.\n- Step 6: Plot the upper outlier as a cross.\n+ This order forces you to identify the most extreme non-outliers before committing the whiskers, preventing the common error of extending whiskers all the way to the outliers.", "source": "GAP-Kimi K2.6 ②", "_id": "kimi_2_4"}, {"question": "S1 Oct 2023 Q2(d) — You correctly write that the median weight in February is greater than in December and correctly compare the IQR, but you also add an incorrect claim about positive skewness. Why does this extra wrong claim make your answer worse than if you had stopped after the median and IQR sentences? (2 steps)", "answer": "- Step 1: Edexcel mark schemes operate on a principle where contradictory claims within a single response are penalised at the worse level. If you write both a correct statement and a contradictory incorrect statement, the examiner awards the worse of the two. The incorrect skew claim cancels the credit you would have received for the correct comparison.\n- Step 2: Therefore, extra prose is not merely wasted ink; it is an active risk. Every additional claim introduces a chance of contradiction. The safest strategy is to deliver exactly the median comparison, the IQR comparison, and their context interpretations, then stop. No extra commentary means no extra target for penalty.", "source": "GAP-Kimi K2.6 ①", "_id": "kimi_1_9"}, {"question": "When filling a two-circle Venn diagram with unknowns w, x, y, z (where w = O-only, x = intersection, y = C-only, z = outside both), what four-step dependency order do you use? (4 steps)", "answer": "- Step 1: Fill **w** first — it is usually given directly. Here $$w = P(O \\cap C') = 0.15$$, stated in the question.\n- Step 2: Derive **x** from the total probability of one circle. $$P(O) = w + x$$, and $$P(O) = 1 - P(O') = 1 - 0.3 = 0.7$$, so $$x = 0.7 - 0.15 = 0.55$$.\n- Step 3: Derive **y** from the total probability of the other circle. $$P(C) = x + y = 0.65$$, so $$y = 0.65 - 0.55 = 0.10$$.\n- Step 4: Derive **z** from sum-to-1. $$w + x + y + z = 1$$, so $$z = 1 - 0.80 = 0.20$$.\n\nThe dependency chain is: w → x → y → z. Each step uses only values already found. Never try to fill regions out of order — you'll end up with circular reasoning.", "source": "GAP-GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "S1 Oct 2023 Q4(d) — A common error is treating X and Y = 30/X as independent random variables and computing $$P(X < 3 \\cap Y < 20) = P(X < 3) \\cdot P(Y < 20)$$. Why is this fundamentally wrong? (3 steps)", "answer": "- Step 1: Two random variables are independent only if knowing the value of one gives no information about the other. But $$Y = 30/X$$ is a DETERMINISTIC function of X — if you know X, you know Y exactly.\n- Step 2: Because Y is completely determined by X, the events $$\\{X < 3\\}$$ and $$\\{Y < 20\\}$$ are not independent. In fact, they are highly dependent: if $$X = 1$$, then $$Y = 30$$ (not less than 20); if $$X = 2$$, then $$Y = 15$$ (less than 20). Th
