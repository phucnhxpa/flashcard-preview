t?\n- Step 2: Here $$X \\in \\{1,2,3,4\\}$$, all positive, so the inequality $$30/X < 20$$ multiplies cleanly to $$30 < 20X$$, i.e. $$X > 1.5$$. Hence $$X\\in\\{2,3,4\\}$$.\n\nIf $$X$$ could be negative, the inequality manipulation would be much trickier ‚ÄĒ always check the sign of the divisor.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_21", "judge_pick": false}, {"question": "Walk through standardisation of a normal RV ‚ÄĒ why does it work and what's the geometric picture? (3 steps)", "answer": "- Step 1: For $$X \\sim N(\\mu, \\sigma^2)$$, define $$Z = (X-\\mu)/\\sigma$$. Subtracting $$\\mu$$ centres the distribution at 0; dividing by $$\\sigma$$ rescales so the spread is 1.\n- Step 2: Linear transforms of a normal are normal, so $$Z \\sim N(0,1)$$, the standard normal whose CDF $$\\Phi(z)$$ is tabulated.\n- Step 3: $$P(X < a) = P\\!\\left(Z < \\frac{a-\\mu}{\\sigma}\\right) = \\Phi\\!\\left(\\frac{a-\\mu}{\\sigma}\\right)$$ ‚ÄĒ the table lookup gives the answer.\n\nGeometric picture: every normal curve is the standard bell, just shifted and stretched. Standardising \"undoes\" the shift and stretch so you can read from a single universal table.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_22", "judge_pick": true}, {"question": "For $$X \\sim N(210, 25^2)$$, why is sketching the curve and shading before reading the table essential? (3 steps)", "answer": "- Step 1: The sketch makes you decide explicitly whether you want the LEFT tail, the RIGHT tail, or the MIDDLE ‚ÄĒ avoiding the common error of computing $$1-\\Phi$$ when you wanted $$\\Phi$$.\n- Step 2: It also reveals the sign of $$z$$. If the value lies BELOW the mean, $$z$$ is negative; ABOVE, positive. Tables only list positive $$z$$, so you need to use $$\\Phi(-z) = 1 - \\Phi(z)$$.\n- Step 3: For symmetric intervals $$\\mu \\pm k$$, the sketch immediately shows that each tail has probability $$(1-P_{\\text{mid}})/2$$.\n\nDiscipline: every probability question gets a tiny bell drawn in the margin first.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_23", "judge_pick": true}, {"question": "$$P(210 - k < X < 210 + k) = 0.95$$ for $$X\\sim N(210, 25^2)$$. How do you find $$k$$ conceptually? (3 steps)", "answer": "- Step 1: The interval is symmetric about the mean, so each tail has probability $$(1-0.95)/2 = 0.025$$.\n- Step 2: The upper bound corresponds to the 97.5th percentile of $$Z$$: $$z = \\Phi^{-1}(0.975) = 1.96$$.\n- Step 3: Unstandardise: $$k = z\\sigma = 1.96 \\times 25 = 49$$.\n\nThe 1.96 value is worth memorising as \"95% CI\" ‚ÄĒ it appears constantly.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_24", "judge_pick": false}, {"question": "\"The lightest 15% of fruit are small.\" Conceptually, how do you find the maximum weight of a small fruit? (3 steps)", "answer": "- Step 1: \"Lightest 15%\" = left tail with probability 0.15 ‚Üí find $$w$$ with $$P(X<w) = 0.15$$.\n- Step 2: Since 0.15 < 0.5, $$w$$ is BELOW the mean, so $$z$$ is NEGATIVE. By symmetry, $$z = -\\Phi^{-1}(0.85) \\approx -1.0364$$.\n- Step 3: Unstandardise: $$w = \\mu + z\\sigma = 210 + (-1.0364)(25) \\approx 184$$ g.\n\nTrap: forgetting the negative sign and getting a value above the mean ‚ÄĒ sketch the curve to catch this.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_25", "judge_pick": false}, {"question": "When two percentiles of an unknown normal are given (e.g. \"5% below 152, 40% above 180\"), what is the structural approach? (4 steps)", "answer": "- Step 1: Convert any \"above\" probability to \"below\" before using inverse normal: $$P(Y>180)=0.4 \\Rightarrow P(Y<180)=0.6$$.\n- Step 2: Read off the two $$z$$-values from the standard normal tables: $$z_1 = \\Phi^{-1}(0.05) = -1.6449$$, $$z_2 = \\Phi^{-1}(0.60) = 0.2533$$.\n- Step 3: Write two standardisation equations: $$(152-\\mu)/\\sigma = z_1$$ and $$(180-\\mu)/\\sigma = z_2$$.\n- Step 4: SUBTRACT the equations to eliminate $$\\mu$$ first: $$(180-152)/\\sigma = z_2 - z_1$$, solve for $$\\sigma$$, then back-substitute for $$\\mu$$.\n\nThe subtraction is the key move ‚ÄĒ it isolates $$\\sigma$$ cleanly without messy algebra.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_26", "judge_pick": true}, {"question": "Why is rounding $$z$$-values too early in a normal simultaneous-equations problem catastrophic? (2 steps)", "answer": "- Step 1: $$\\sigma$$ is found by dividing a known difference (e.g. 28) by $$z_2 - z_1$$. A small absolute error in the $$z$$-values produces a noticeable error in $$\\sigma$$.\n- Step 2: $$\\mu$$ is then back-substituted using $$\\sigma$$ multiplied by another $$z$$-value ‚ÄĒ so the $$\\sigma$$ error compounds into $$\\mu$$. Keep $$z$$ to 4 d.p. throughout, round only the final $$\\mu, \\sigma$$.\n\nRule of thumb: never round a tabulated $$z$$ until the very last line.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_27", "judge_pick": true}, {"question": "What is the key structural fact about the intersection of the two regression lines $$y$$-on-$$x$$ and $$x$$-on-$$y$$? (2 steps)", "answer": "- Step 1: Both lines pass through the point of means $$(\\bar{x}, \\bar{y})$$. This is because each regression line by construction is anchored at the sample centroid.\n- Step 2: So solving the two equations simultaneously gives $$(\\bar{x}, \\bar{y})$$ ‚ÄĒ from which $$\\sum x = n\\bar{x}$$ and $$\\sum y = n\\bar{y}$$ follow immediately.\n\nThis is the cornerstone trick of \"find $$\\sum x$$ from two regression lines\" questions.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_28", "judge_pick": false}, {"question": "Given $$y = 1.4x + 1.5$$ and $$x = 1.2 + 0.2y$$ from 12 observations, why does solving them yield $$\\sum x$$ \"for free\"? (3 steps)", "answer": "- Step 1: Substitute one into the other to find the intersection: $$x = 25/12$$, $$y = 53/12$$.\n- Step 2: Interpret: $$\\bar{x} = 25/12$$ because both lines pass through the centroid.\n- Step 3: $$\\sum x = n\\bar{x} = 12 \\times 25/12 = 25$$.\n\nThe word \"hence\" in part (a)(ii) signals: USE this intersection result, don't start over with a different method.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_29", "judge_pick": false}, {"question": "State the formula and intuition for $$S_{xy}$$, and the most efficient form to use when $$\\bar{x}, \\bar{y}$$ are already known. (2 steps)", "answer": "- Step 1: $$S_{xy} = \\sum (x-\\bar{x})(y-\\bar{y}) = \\sum xy - n\\bar{x}\\bar{y}$$ (equivalently $$\\sum xy - (\\sum x)(\\sum y)/n$$).\n- Step 2: If you already know $$\\bar{x}$$ and $$\\bar{y}$$ from a previous part, plug them straight in: $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$. Otherwise use $$\\sum xy - (\\sum x)(\\sum y)/n$$.\n\nIntuition: $$S_{xy}$$ measures the total co-deviation ‚ÄĒ how much $$x$$ and $$y$$ jointly stray from their means.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_30", "judge_pick": false}, {"question": "What is the PMCC shortcut when BOTH regression lines (slopes $$b_{yx}$$ and $$b_{xy}$$) are given? Derive the intuition. (4 steps)", "answer": "- Step 1: $$b_{yx} = S_{xy}/S_{xx}$$ and $$b_{xy} = S_{xy}/S_{yy}$$.\n- Step 2: Multiply: $$b_{yx}\\cdot b_{xy} = \\frac{S_{xy}^2}{S_{xx}S_{yy}}$$.\n- Step 3: But $$r = \\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}}$$, so $$r^2 = \\frac{S_{xy}^2}{S_{xx}S_{yy}} = b_{yx}\\cdot b_{xy}$$.\n- Step 4: Take the square root, with sign matching the (common) sign of the two slopes.\n\nWhy it's powerful: bypasses $$S_{xx}$$ and $$S_{yy}$$ entirely, which would otherwise require $$\\sum x^2, \\sum y^2$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_31", "judge_pick": false}, {"question": "From $$b_{yx} = 1.4$$ and $$b_{xy} = 0.2$$, find $$r$$ conceptually. (3 steps)", "answer": "- Step 1: $$r^2 = b_{yx}\\cdot b_{xy} = 1.4 \\times 0.2 = 0.28$$.\n- Step 2: $$r = \\pm\\sqrt{0.28} \\approx \\pm 0.529$$.\n- Step 3: Both slopes are positive, so $$r$$ is positive: $$r \\approx 0.529$$.\n\nIf the two slopes had opposite signs, the data would be inconsistent (impossible) ‚ÄĒ both regression lines must agree on the sign of the relationship.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_32", "judge_pick": false}, {"question": "Why must the two regression slopes $$b_{yx}$$ and $$b_{xy}$$ always have the same sign? (2 steps)", "answer": "- Step 1: Both slopes are proportional to $$S_{xy}$$: $$b_{yx} = S_{xy}/S_{xx}$$ and $$b_{xy} = S_{xy}/S_{yy}$$. Since $$S_{xx}, S_{yy} > 0$$, both slopes inherit the sign of $$S_{xy}$$.\n- Step 2: $$S_{xy}$$ is also the numerator of $$r$$, so the slope signs match the correlation sign. Positive correlation ‚Üí both slopes positive; negative ‚Üí both negative.\n\nThis gives a quick consistency check: if you compute slopes with opposite signs, you've made an error.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_33", "judge_pick": false}, {"question": "Why is $$0 \\leq r^2 \\leq 1$$, and what does this imply for the product $$b_{yx}\\cdot b_{xy}$$? (2 steps)", "answer": "- Step 1: $$r$$ is a correlation between $$-1$$ and $$+1$$, so $$r^2 \\in [0,1]$$.\n- Step 2: Since $$r^2 = b_{yx}\\cdot b_{xy}$$, the product of the two slopes is bounded above by 1. If you ever compute slopes with product $$>1$$ (e.g. $$2 \\times 0.7$$), there's an arithmetic error somewhere.\n\nQuick sanity check: when both regression lines are given, multiply the slopes and confirm the product is in $$[0,1]$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_34", "judge_pick": true}, {"question": "\"Hence show that $$\\sum x = 25$$.\" What does the word \"hence\" oblige you to do, and what's the failure mode if ignored? (2 steps)", "answer": "- Step 1: \"Hence\" REQUIRES you to use the result of the immediately preceding part (here, the intersection $$(\\bar{x},\\bar{y}) = (25/12, 53/12)$$) as the starting point.\n- Step 2: If you compute $$\\sum x$$ via some independent route, you risk losing marks for \"not using the previous result\", even if your answer is numerically correct.\n\nAlways reference the prior result explicitly: \"From (a)(i), $$\\bar{x} = 25/12$$, so $$\\sum x = 12\\bar{x} = 25$$.\"", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_35", "judge_pick": true}, {"question": "In the kangaroo data, what's the visual indicator of skew on a box plot, and why do exam questions ask about it? (3 steps)", "answer": "- Step 1: Skew is read from the position of the median INSIDE the box and the relative whisker lengths.\n- Step 2: Median closer to $$Q_1$$ + longer upper whisker ‚Üí positive skew (tail to the right). Median closer to $$Q_3$$ + longer lower whisker ‚Üí negative skew.\n- Step 3: Box plots compress a distribution to 5 numbers; skew is one of the few features that survives the compression, so examiners test it as a probe of whether you can read the diagram.\n\nIn a \"compare\" question, however, only mention skew if explicitly asked ‚ÄĒ otherwise stick to median + IQR.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_36", "judge_pick": false}, {"question": "Why does the path probability multiplication along a tree branch work? What's the underlying probability axiom? (2 steps)", "answer": "- Step 1: A branch from one node to a child represents a conditional probability $$P(\\text{child} \\mid \\text{parent})$$.\n- Step 2: The path probability is $$P(A)\\cdot P(B\\mid A)\\cdot P(C\\mid A\\cap B)\\cdots$$ which equals $$P(A\\cap B\\cap C\\cdots)$$ by the multiplication rule (chain rule of probability).\n\nSo multiplying along a branch is just the chain rule applied step by step.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_37", "judge_pick": false}, {"question": "Sally's tree: the turn STOPS at $$WW$$ or $$LL$$. How does this affect the path enumeration, and what's a common error? (3 steps)", "answer": "- Step 1: After $$WW$$ or $$LL$$, no third game is played ‚ÄĒ these are terminal 2-game paths, not 3-game paths.\n- Step 2: Paths with one win and one loss in the first two games ($$WL$$ or $$LW$$) MUST proceed to a third game.\n- Step 3: Common error: writing $$WW$$ as $$WWW$$ + $$WWL$$ and multiplying through with a third probability of 0.6/0.4 ‚ÄĒ but the third game doesn't exist, so the path is just $$WW$$ with probability 0.42.\n\nAlways check the stopping rule before enumerating.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_38", "judge_pick": false}, {"question": "When stating \"events $$C$$ and $$O$$ are not independent\", what FORMAT does the mark scheme expect? (3 steps)", "answer": "- Step 1: State $$P(C\\cap O)$$ numerically.\n- Step 2: State $$P(C)\\cdot P(O)$$ numerically.\n- Step 3: Show the inequality (e.g. $$0.55 \\neq 0.455$$) and conclude \"therefore not independent\".\n\nA bare \"$$P(C\\cap O) \\neq P(C)P(O)$$\" without numbers misses the method marks. Always show both sides explicitly.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_39", "judge_pick": false}, {"question": "Sketch the conceptual structure: given $$Y = 30/X$$, why does \"$$P(Y<20)$$\" collapse to a question about $$X$$? (3 steps)", "answer": "- Step 1: $$Y$$ is determined by $$X$$ ‚ÄĒ no extra randomness. So the event \"$$Y<20$$\" is a subset of the sample space of $$X$$, namely the $$x$$-values for which $$30/x < 20$$.\n- Step 2: Solve the inequality: $$30/x < 20 \\iff x > 1.5$$ (for positive $$x$$). So $$\\{Y<20\\} = \\{X\\in\\{2,3,4\\}\\}$$.\n- Step 3: All probabilities about $$Y$$ can now be re-expressed as probabilities about $$X$$, using the original pmf.\n\nMantra: when $$Y = g(X)$$, every probability statement about $$Y$$ is secretly a statement about $$X$$.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_40", "judge_pick": true}, {"question": "Mental check: in a discrete probability table, what's the first sanity check before any calculation? (2 steps)", "answer": "- Step 1: Verify $$\\sum P(X=x) = 1$$ over the support.\n- Step 2: For $$P(X=x) = x/10, x \\in \\{1,2,3,4\\}$$: sum = $$(1+2+3+4)/10 = 10/10 = 1$$. ‚úď\n\nIf probabilities don't sum to 1, there's either a typo or you've misread the table ‚ÄĒ abort and re-read before computing expectations.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_41", "judge_pick": false}, {"question": "Why is $$E(1/X) \\neq 1/E(X)$$ in general? Give a quick intuition. (2 steps)", "answer": "- Step 1: Expectation is linear, but reciprocal is NONLINEAR. Linearity only applies to functions of the form $$aX+b$$.\n- Step 2: Jensen's inequality: for a convex function $$\\phi$$, $$E[\\phi(X)] \\geq \\phi(E[X])$$. Reciprocal $$1/x$$ is convex on positive reals, so $$E(1/X) \\geq 1/E(X)$$, with equality only when $$X$$ is constant.\n\nSanity check: $$E(X) = 1(0.1)+2(0.2)+3(0.3)+4(0.4) = 3$$, so $$1/E(X) = 1/3 \\approx 0.333$$, while $$E(1/X) = 0.4$$. Indeed $$0.4 > 0.333$$. ‚úď", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_42", "judge_pick": true}, {"question": "What's the conceptual link between \"$$Y<20$$\" being a function-of-$$X$$ condition (Q4d) and \"given $$W_1$$\" being a tree-branch condition (Q1e)? (3 steps)", "answer": "- Step 1: Both are restrictions of the sample space ‚ÄĒ they select a subset of all possible outcomes.\n- Step 2: In the tree, the restriction is \"paths starting with $$W$$\". In the discrete RV, the restriction is \"$$x$$-values where $$30/x < 20$$\".\n- Step 3: Once you've identified the subset, $$P(A\\mid B) = P(A\\cap B)/P(B)$$ where the numerator paths/values must satisfy BOTH the original condition $$A$$ AND the restriction $$B$$.\n\nMantra: every conditional problem is \"identify the restricted sample space, intersect with the desired event, divide\".", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_43", "judge_pick": false}, {"question": "For a stem-and-leaf with stems 1‚Äď9 and a \"Key: 3 | 2 represents 32 kg\", how do you reconstruct the original values? (2 steps)", "answer": "- Step 1: Each row's stem is the tens digit (in the appropriate units), each leaf is a units digit. So $$4 | 2\\ 5\\ 5$$ gives 42, 45, 45.\n- Step 2: Read leaves left-to-right within a row; rows top-to-bottom give the values in ascending order, which makes finding quartiles by position straightforward.\n\nStem-and-leaf is essentially a sorted list with visual binning ‚ÄĒ keep that in mind.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_44", "judge_pick": false}, {"question": "Why does \"increasing IQR\" translate to \"less consistent\" in a comparison context? (2 steps)", "answer": "- Step 1: IQR measures the spread of the middle 50% of the data. A LARGER IQR means the central values are more spread out.\n- Step 2: \"More spread out\" = \"more variable\" = \"less consistent\" ‚ÄĒ in context, this might mean kangaroo weights vary more between individuals, or test scores are more diverse, etc.\n\nAlways convert numerical comparisons into a CONTEXT sentence that uses the variable name and is meaningful to a reader unfamiliar with statistical jargon.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_45", "judge_pick": true}, {"question": "For Edexcel S1 box plots, what's the visual difference between an outlier and the end of a whisker? (2 steps)", "answer": "- Step 1: Outliers are plotted as separate marks (√ó or ‚ėÖ) at their actual values.\n- Step 2: Whiskers are line segments extending from the box edges to the most extreme NON-outlier ‚ÄĒ they end with a small cross-bar, NOT a mark at an outlier value.\n\nIf a whisker visually touches an outlier, the diagram is wrong ‚ÄĒ there should be a gap between the whisker end and the outlier mark.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_46", "judge_pick": false}, {"question": "What's the unifying lesson across Q5(e) and Q6 for \"two-equation\" problems on an S1 paper? (3 steps)", "answer": "- Step 1: Both problems give you two pieces of structural information (two percentiles OR two regression lines) that translate into two equations in two unknowns.\n- Step 2: The fastest approach is to subtract or substitute to eliminate one unknown ‚ÄĒ DON'T try to solve them in parallel or as a matrix.\n- Step 3: After finding one unknown, back-substitute into either original equation for the other.\n\nMeta-skill: recognise the \"two structural facts ‚Üí two equations\" pattern and reach for elimination automatically.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_47", "judge_pick": true}, {"question": "Phuc divides $$P(\\text{exactly 2 wins})$$ by $$P(W_1)$$ to get $$P(\\text{won 2 games}\\mid W_1)$$. Diagnose the misconception in one sentence. (1 step)", "answer": "- Step 1: He confused the marginal probability $$P(A)$$ with the joint probability $$P(A\\cap B)$$ in the numerator of $$P(A\\mid B) = P(A\\cap B)/P(B)$$ ‚ÄĒ the numerator must be restricted to outcomes consistent with the conditioning event $$B$$, but the marginal includes paths that contradict $$B$$.\n\nFix: always WRITE the formula first and identify $$A\\cap B$$ explicitly before computing.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_48", "judge_pick": false}, {"question": "If $$F$$ and $$H$$ are mutually exclusive with $$P(F) = 2/7$$ and $$P(H) = 1/4$$, why is $$P(F\\cup H) = P(F) + P(H)$$ exactly, no subtraction? (2 steps)", "answer": "- Step 1: General rule: $$P(F\\cup H) = P(F) + P(H) - P(F\\cap H)$$.\n- Step 2: Mutually exclusive means $$P(F\\cap H) = 0$$, so the subtraction term vanishes and the formula collapses to $$P(F\\cup H) = P(F) + P(H) = 2/7 + 1/4 = 15/28$$.\n\nThis is the \"easy case\" of the union formula ‚ÄĒ recognise the trigger word \"mutually exclusive\".", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_49", "judge_pick": false}, {"question": "Conceptually, why does the regression line $$y$$-on-$$x$$ generally NOT coincide with the regression line $$x$$-on-$$y$$, even though both describe the same data? (3 steps)", "answer": "- Step 1: $$y$$-on-$$x$$ minimises VERTICAL distance (errors in $$y$$): it answers \"predict $$y$$ given $$x$$\".\n- Step 2: $$x$$-on-$$y$$ minimises HORIZONTAL distance (errors in $$x$$): it answers \"predict $$x$$ given $$y$$\".\n- Step 3: The two minimisations are different optimisation problems unless the data is perfectly correlated ($$r = \\pm 1$$), in which case both lines collapse to the same line.\n\nThis is also why $$r^2 = b_{yx}\\cdot b_{xy} \\leq 1$$, with equality iff perfect correlation.", "source": "Opus 4.7 ‚Ď†", "_id": "opus_1_50", "judge_pick": true}], "count": 51}, "opus_2": {"label": "Opus 4.7 ‚Ď°", "cards": [{"question": "In a tree-diagram problem with a \"given that\" question, what is the single most important discipline to avoid the classic numerator/denominator mismatch?", "answer": "Before substituting numbers, always write out $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)}$$ at the top of the answer. The numerator must be the **joint event** $$P(A \\cap B)$$, not the marginal $$P(A)$$. The classic trap is to compute \"given $$W_1$$\" by dividing some unconditional probability by $$P(W_1)$$ ‚ÄĒ the unconditional probability often includes paths that contradict $$W_1$$ (e.g. starting with $$L$$), and those paths must be removed from the numerator first.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_0", "judge_pick": true}, {"question": "In Sally's game, why does the turn sometimes consist of only 2 games rather than 3, and how does this affect the path enumeration? (2 steps)", "answer": "- Step 1: The rule \"stop if first 2 games are both W or both L\" means paths $$WW$$ and $$LL$$ terminate at length 2. Only mixed first-two-game paths ($$WL$$ or $$LW$$) continue to a 3rd game.\n- Step 2: So the full path list has 6 paths, not 8: $$WW, WLW, WLL, LWW, LWL, LL$$. When summed, their probabilities must equal $$1$$ ‚ÄĒ that's the validity check.\n\nTakeaway: always enumerate paths first, then check the path-probabilities sum to 1 before any further calculation.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_1", "judge_pick": false}, {"question": "For Sally's game with $$P(W_1) = 0.7$$, $$P(W \\mid \\text{prev } W) = 0.6$$, $$P(W \\mid \\text{prev } L) = 0.2$$, find $$P(\\text{exactly 2 wins in a turn})$$. (3 steps)", "answer": "- Step 1: Identify the paths with exactly 2 wins: $$WW$$, $$WLW$$, $$LWW$$.\n- Step 2: Multiply along each branch:\n+ $$WW: 0.7 \\times 0.6 = 0.42$$\n+ $$WLW: 0.7 \\times 0.4 \\times 0.2 = 0.056$$\n+ $$LWW: 0.3 \\times 0.2 \\times 0.6 = 0.036$$\n- Step 3: Sum: $$0.42 + 0.056 + 0.036 = 0.512$$.\n\nThe \"or\" between disjoint paths becomes addition; the sequence within a path becomes multiplication.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_2", "judge_pick": false}, {"question": "Why is $$P(\\text{won first 2 games} \\mid \\text{exactly 2 wins})$$ equal to $$P(WW)/P(\\text{exactly 2 wins})$$ ‚ÄĒ and not something more complicated? (2 steps)", "answer": "- Step 1: \"Won the first 2 games\" = the event $$WW$$ (turn stops there). Notice $$WW$$ is a **subset** of \"exactly 2 wins\" because $$WW$$ has exactly 2 wins.\n- Step 2: When $$A \\subseteq B$$, the intersection collapses: $$A \\cap B = A$$, so $$P(A \\cap B) = P(A)$$. Hence the conditional becomes $$\\frac{P(WW)}{P(\\text{exactly 2 wins})} = \\frac{0.42}{0.512} \\approx 0.820$$.\n\nThis subset-collapse is the cleanest way to spot when a \"joint\" intersection simplifies.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_3", "judge_pick": false}, {"question": "Why is it wrong to compute $$P(\\text{won 2 games} \\mid W_1)$$ as $$\\dfrac{0.512}{0.7}$$ in Sally's game? (3 steps)", "answer": "- Step 1: The denominator $$0.7 = P(W_1)$$ is correct ‚ÄĒ that's the conditioning event.\n- Step 2: But the numerator must be $$P(\\text{won 2 games} \\cap W_1)$$, i.e. only the paths starting with $$W$$ that have exactly 2 wins.\n- Step 3: The figure $$0.512$$ includes the path $$LWW$$, which contradicts $$W_1$$. We must remove it: numerator becomes $$0.42 + 0.056 = 0.476$$, and the answer is $$0.476/0.7 = 0.68$$.\n\nLesson: the numerator of $$P(A|B)$$ is the joint $$P(A \\cap B)$$, never the marginal $$P(A)$$ ‚ÄĒ even when \"$$A$$\" sounds independent of $$B$$ in English.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_4", "judge_pick": false}, {"question": "For ungrouped/discrete data in Edexcel S1 (e.g. a stem-and-leaf with $$n=33$$), what positions do you use for $$Q_1$$, median, $$Q_3$$, and what do you do if the position is non-integer? (2 steps)", "answer": "- Step 1: Positions are $$\\frac{n+1}{4}, \\frac{n+1}{2}, \\frac{3(n+1)}{4}$$. For $$n=33$$: positions are $$8.5, 17, 25.5$$.\n- Step 2: If the position is non-integer, **average** the two flanking values. E.g. position $$8.5$$ ‚Üí average of 8th and 9th values in the ordered list.\n\nImportant: this is the S1 convention (different from \"interpolation\" used in grouped data); know which to apply by the data type.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_5", "judge_pick": false}, {"question": "Conceptually, what is an \"outlier fence\" and how do you use it to identify outliers? (3 steps)", "answer": "- Step 1: The fences are imaginary boundaries at $$Q_1 - 1.5 \\cdot \\text{IQR}$$ and $$Q_3 + 1.5 \\cdot \\text{IQR}$$, where $$\\text{IQR} = Q_3 - Q_1$$.\n- Step 2: Any data value strictly below the lower fence or strictly above the upper fence is flagged as an outlier.\n- Step 3: To verify on an exam: state both fence values numerically, then identify which data points lie outside. E.g. with $$Q_1=45, Q_3=63, \\text{IQR}=18$$: fences are $$45 - 27 = 18$$ and $$63 + 27 = 90$$; the values $$16$$ and $$94$$ lie outside.\n\nThe factor $$1.5$$ is conventional ‚ÄĒ it captures roughly the tails beyond $$\\pm 2.7\\sigma$$ for a normal distribution.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_6", "judge_pick": false}, {"question": "When drawing a box plot, where do the whiskers end if outliers exist? (2 steps)", "answer": "- Step 1: Whiskers end at the **most extreme non-outlier** ‚ÄĒ i.e. the smallest data point that is $$\\geq$$ lower fence, and the largest data point that is $$\\leq$$ upper fence.\n- Step 2: Outliers themselves are plotted as separate crosses (√ó) outside the whiskers, not connected to them.\n\nCommon error: extending whiskers all the way to the outliers ‚ÄĒ this defeats the visual purpose of flagging them.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_7", "judge_pick": false}, {"question": "What is the rigid Edexcel template for \"Compare the distribution of A with the distribution of B in context\"? (3 steps)", "answer": "- Step 1: One sentence comparing **median** (location): \"The median of A is greater/less than the median of B\".\n- Step 2: One sentence comparing **IQR** (spread): \"The IQR of A is greater/less than the IQR of B\".\n- Step 3: One context sentence for each, interpreting in the situation: e.g. \"so A weights are typically heavier\" and \"so A weights are more consistent / less variable\".\n\nThree statements only. Mentioning skew, range, outliers eats time and risks contradicting a correct claim ‚ÄĒ the marks are awarded for median + IQR + context, full stop.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_8", "judge_pick": false}, {"question": "Why does a smaller IQR mean the data is \"more consistent\"?", "answer": "The IQR is the spread of the middle 50% of the data. A smaller IQR means the central half of observations is packed into a narrower range ‚ÄĒ so typical values cluster more tightly around the median. Equivalently, two random middle-50% observations are likely to be closer to each other. \"More consistent\" = \"less variable\" = \"tighter middle bulk\" ‚ÄĒ all describing the same fact that $$Q_3 - Q_1$$ is small.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_9", "judge_pick": false}, {"question": "Set up the Venn diagram for: $$P(C) = 0.65$$, $$P(O') = 0.3$$, $$P(O \\cap C') = 0.15$$. Find each region $$w$$ (O only), $$x$$ (intersection), $$y$$ (C only), $$z$$ (outside). (4 steps)", "answer": "- Step 1: $$w = P(O \\cap C') = 0.15$$ ‚ÄĒ given directly.\n- Step 2: $$P(O) = 1 - P(O') = 0.7$$. Since $$P(O) = w + x$$, we get $$x = 0.7 - 0.15 = 0.55$$.\n- Step 3: $$P(C) = x + y = 0.65$$, so $$y = 0.65 - 0.55 = 0.10$$.\n- Step 4: Regions sum to 1: $$z = 1 - (0.15 + 0.55 + 0.10) = 0.20$$.\n\nAlways re-read the diagram orientation before assigning numbers ‚ÄĒ the printed label for each region is the source of truth.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_10", "judge_pick": false}, {"question": "How do you test whether two events $$C$$ and $$O$$ are statistically independent, given their probabilities? (3 steps)", "answer": "- Step 1: Compute $$P(C \\cap O)$$ directly from the data (here = $$x = 0.55$$).\n- Step 2: Compute $$P(C) \\cdot P(O)$$ (here = $$0.65 \\times 0.7 = 0.455$$).\n- Step 3: Compare. If equal, independent; if not, not independent. Here $$0.55 \\neq 0.455$$, so $$C$$ and $$O$$ are **not independent**.\n\nAlways show both numerical values explicitly ‚ÄĒ \"not independent\" without the inequality is incomplete.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_11", "judge_pick": false}, {"question": "Can two non-trivial events $$F, H$$ with $$P(F), P(H) > 0$$ be both mutually exclusive AND independent? Why or why not?", "answer": "No. Mutually exclusive means $$P(F \\cap H) = 0$$. Independent means $$P(F \\cap H) = P(F)P(H)$$. If both hold, then $$P(F)P(H) = 0$$, which forces at least one probability to be zero ‚ÄĒ contradiction. So for two non-trivial events, mutual exclusivity and independence are incompatible. They are not synonyms; they are near-opposite concepts about how events relate.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_12", "judge_pick": true}, {"question": "Given $$F, G$$ are independent, $$P(F) = \\tfrac{2}{7}$$, $$P(F \\cup G) = \\tfrac{5}{8}$$. Outline how to find $$P(G)$$ without exact arithmetic. (3 steps)", "answer": "- Step 1: Use the union formula: $$P(F \\cup G) = P(F) + P(G) - P(F \\cap G)$$.\n- Step 2: Apply independence: $$P(F \\cap G) = P(F) \\cdot P(G)$$, so substitute to get a linear equation in $$P(G)$$ alone: $$P(F \\cup G) = P(F) + P(G)(1 - P(F))$$.\n- Step 3: Solve: $$P(G) = \\dfrac{P(F \\cup G) - P(F)}{1 - P(F)}$$.\n\nThe key insight is that independence converts a 2-unknown equation into a 1-unknown linear equation ‚ÄĒ factor $$P(G)$$ out cleanly.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_13", "judge_pick": false}, {"question": "How do you compute $$P(F \\cap G')$$ given $$P(F)$$ and $$P(F \\cap G)$$? (2 steps)", "answer": "- Step 1: The events $$F \\cap G$$ and $$F \\cap G'$$ partition $$F$$ (every outcome in $$F$$ is either in $$G$$ or not in $$G$$).\n- Step 2: So $$P(F) = P(F \\cap G) + P(F \\cap G')$$, giving $$P(F \\cap G') = P(F) - P(F \\cap G)$$.\n\nAlternative when $$F, G$$ are independent: $$P(F \\cap G') = P(F) P(G')$$ directly. Both routes give the same answer.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_14", "judge_pick": false}, {"question": "For a discrete RV $$X$$ taking values $$1, 2, 3, 4$$ with probabilities $$\\tfrac{1}{10}, \\tfrac{2}{10}, \\tfrac{3}{10}, \\tfrac{4}{10}$$, how do you compute $$E(1/X)$$? (2 steps)", "answer": "- Step 1: Use $$E(g(X)) = \\sum g(x) P(X=x)$$. Here $$g(x) = 1/x$$.\n- Step 2: Sum $$\\tfrac{1}{1}\\cdot\\tfrac{1}{10} + \\tfrac{1}{2}\\cdot\\tfrac{2}{10} + \\tfrac{1}{3}\\cdot\\tfrac{3}{10} + \\tfrac{1}{4}\\cdot\\tfrac{4}{10}$$. Notice each term simplifies to $$\\tfrac{1}{10}$$, summing to $$\\tfrac{4}{10} = \\tfrac{2}{5}$$.\n\nBeautiful structural cancellation here ‚ÄĒ when $$P(X=x) \\propto x$$, multiplying by $$1/x$$ creates a uniform sum.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_15", "judge_pick": false}, {"question": "Why is $$\\text{Var}(1/X) = E(1/X^2) - [E(1/X)]^2$$ rather than $$E(X^2) - [E(X)]^2$$ divided by something? (2 steps)", "answer": "- Step 1: The variance formula $$\\text{Var}(Y) = E(Y^2) - [E(Y)]^2$$ is **for the random variable $$Y$$ itself**, whatever $$Y$$ is. If $$Y = 1/X$$, then $$Y^2 = 1/X^2$$.\n- Step 2: So you treat $$1/X$$ as a brand-new RV ‚ÄĒ compute $$E(1/X)$$ and $$E(1/X^2)$$ from the distribution of $$X$$, then plug in.\n\nCritical: $$1/X^2 \\neq 1/(E(X))^2$$, and $$E(1/X) \\neq 1/E(X)$$. Apply $$E$$ to functions of $$X$$ termwise via the PMF.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_16", "judge_pick": true}, {"question": "If $$Y = 30/X = 30 \\cdot (1/X)$$ and you've already found $$E(1/X)$$ and $$\\text{Var}(1/X)$$, how do you get $$E(Y)$$ and $$\\text{Var}(Y)$$ instantly? (2 steps)", "answer": "- Step 1: Linearity of $$E$$: $$E(aZ) = a E(Z)$$. So $$E(Y) = 30 \\cdot E(1/X)$$.\n- Step 2: For variance: $$\\text{Var}(aZ) = a^2 \\text{Var}(Z)$$ ‚ÄĒ note the **square**. So $$\\text{Var}(Y) = 30^2 \\cdot \\text{Var}(1/X) = 900 \\cdot \\text{Var}(1/X)$$.\n\nWhy $$a^2$$? Variance is a squared-deviation average; multiplying $$Z$$ by $$a$$ multiplies every deviation by $$a$$, hence every squared deviation by $$a^2$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_17", "judge_pick": true}, {"question": "For a discrete RV $$X$$ and a deterministic function $$Y = g(X)$$, how do you compute $$P(X < a \\mid Y < b)$$? (3 steps)", "answer": "- Step 1: Translate the condition $$Y < b$$ into a condition on $$X$$ directly. E.g. if $$Y = 30/X$$ and $$b = 20$$: $$30/X < 20 \\iff X > 1.5$$ (assuming $$X > 0$$).\n- Step 2: Now both events are sets of $$x$$-values. Find the intersection $$\\{X < a\\} \\cap \\{X > 1.5\\}$$ as a list of qualifying $$x$$-values.\n- Step 3: Apply $$P(A|B) = P(A \\cap B)/P(B)$$, summing PMF values over the relevant $$x$$-sets.\n\n**Critical mistake to avoid**: do NOT treat $$X$$ and $$Y = g(X)$$ as independent ‚ÄĒ they are perfectly dependent. There is no 2D joint distribution to set up.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_18", "judge_pick": false}, {"question": "Why must you check the sign of $$X$$ when translating $$Y < c$$ for $$Y = k/X$$?", "answer": "Dividing by a variable flips inequalities when that variable is negative. If $$X > 0$$ always (e.g. takes values $$\\{1,2,3,4\\}$$), then $$k/X < c \\iff X > k/c$$ (for $$k, c > 0$$). But if $$X$$ could be negative, the inequality direction would depend on sign ‚ÄĒ you'd need to split into cases. Always state the sign assumption explicitly.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_19", "judge_pick": true}, {"question": "For $$X \\sim N(\\mu, \\sigma^2)$$, what is the standardisation transformation and why does it work?", "answer": "Define $$Z = (X - \\mu)/\\sigma$$. Then $$Z \\sim N(0,1)$$. The shift by $$\\mu$$ centres the distribution on 0; the scale by $$1/\\sigma$$ rescales spread to 1. Probabilities are preserved under monotonic linear transformations: $$P(X < x) = P(Z < (x-\\mu)/\\sigma)$$. We use this because tables only print $$\\Phi(z)$$ for the standard normal ‚ÄĒ every normal probability question reduces to a $$Z$$-question.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_20", "judge_pick": true}, {"question": "For $$X \\sim N(210, 25^2)$$, qualitatively explain how to find $$P(190 < X < 240)$$. (3 steps)", "answer": "- Step 1: Standardise both endpoints. $$z_1 = (190-210)/25 = -0.8$$ and $$z_2 = (240-210)/25 = 1.2$$.\n- Step 2: The required probability is $$\\Phi(1.2) - \\Phi(-0.8)$$.\n- Step 3: Use the symmetry $$\\Phi(-0.8) = 1 - \\Phi(0.8)$$ since tables only print positive $$z$$. Result is around $$0.67$$ (since the interval covers from $$\\approx 0.8\\sigma$$ below to $$1.2\\sigma$$ above the mean, roughly the bulk of the bell).\n\nSketch the bell and shade the interval before reading anything ‚ÄĒ visual check prevents sign errors.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_21", "judge_pick": false}, {"question": "To find $$k$$ such that $$P(\\mu - k < X < \\mu + k) = 0.95$$ for $$X \\sim N(\\mu, \\sigma^2)$$, what is the logic? (3 steps)", "answer": "- Step 1: By symmetry, the central $$0.95$$ leaves $$0.025$$ in each tail, so $$P(Z < k/\\sigma) = 0.975$$.\n- Step 2: From inverse-normal tables, $$\\Phi^{-1}(0.975) = 1.96$$. This is the famous \"1.96 for 95%\" fact.\n- Step 3: So $$k/\\sigma = 1.96 \\Rightarrow k = 1.96\\sigma$$.\n\nConceptually: 95% of a normal distribution lies within $$\\pm 1.96$$ standard deviations ‚ÄĒ that's where the $$1.96$$ comes from.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_22", "judge_pick": false}, {"question": "For an inverse-normal question ‚ÄĒ \"find $$w$$ such that $$P(X < w) = 0.15$$\" ‚ÄĒ how do you decide whether $$z$$ is positive or negative? (2 steps)", "answer": "- Step 1: Sketch the bell and shade the region $$P(X < w) = 0.15$$. Since $$0.15 < 0.5$$, the shaded region is the **left tail**, so $$w$$ lies **below** the mean.\n- Step 2: Hence $$z$$ is negative. Compute $$z$$ by symmetry: find $$z^* > 0$$ with $$\\Phi(z^*) = 0.85$$, then $$z = -z^*$$.\n\nAlways sketch first ‚ÄĒ it's the single best defence against sign errors.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_23", "judge_pick": true}, {"question": "You're told $$Y \\sim N(\\mu, \\sigma^2)$$ and given two percentiles: $$P(Y < 152) = 0.05$$ and $$P(Y > 180) = 0.40$$. Outline the strategy for finding $$\\mu$$ and $$\\sigma$$. (4 steps)", "answer": "- Step 1: Convert each percentile to a $$z$$-value. For $$P(Y<152)=0.05$$: $$z_1 \\approx -1.6449$$ (negative, since below median). For $$P(Y>180)=0.40 \\Leftrightarrow P(Y<180)=0.60$$: $$z_2 \\approx 0.2533$$.\n- Step 2: Write two equations: $$(152 - \\mu)/\\sigma = z_1$$ and $$(180 - \\mu)/\\sigma = z_2$$.\n- Step 3: **Subtract** to eliminate $$\\mu$$: $$(180-152)/\\sigma = z_2 - z_1$$, giving $$\\sigma = 28/(z_2 - z_1)$$.\n- Step 4: Back-substitute into either equation to get $$\\mu$$.\n\nKey discipline: keep $$z$$-values to 4 d.p. throughout; round only at the very end.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_24", "judge_pick": false}, {"question": "Why is subtracting the two simultaneous percentile equations (rather than dividing or substituting) the preferred move?", "answer": "Both equations share the same unknown $$\\mu$$ as a single additive constant. Subtraction cancels $$\\mu$$ exactly, leaving one equation in $$\\sigma$$ alone. Substitution forces you to carry both unknowns through more algebra; division creates ratios that are messier with $$z$$-values. Subtraction is the cleanest reduction ‚ÄĒ same technique as Q6's regression-line system.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_25", "judge_pick": false}, {"question": "Common error: a student converts \"$$P(Y > 180) = 0.40$$\" directly into a $$z$$-value from the table. Why is this wrong?", "answer": "Standard normal tables print $$\\Phi(z) = P(Z < z)$$ ‚ÄĒ left-tail probabilities. The value $$0.40$$ in the table corresponds to $$P(Z < z) = 0.40$$, NOT $$P(Z > z) = 0.40$$. You must first convert: $$P(Y > 180) = 0.40 \\Rightarrow P(Y < 180) = 0.60$$, then look up $$0.60$$ to get $$z \\approx 0.2533$$. Always restate every probability as a left-tail before consulting tables.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_26", "judge_pick": true}, {"question": "Given two regression lines on the same data ‚ÄĒ $$y$$ on $$x$$ and $$x$$ on $$y$$ ‚ÄĒ what is the geometric/statistical meaning of their point of intersection?", "answer": "Both regression lines pass through the point $$(\\bar{x}, \\bar{y})$$ ‚ÄĒ the centroid of the data. The $$y$$-on-$$x$$ line minimises vertical residuals; the $$x$$-on-$$y$$ line minimises horizontal residuals. They generally have different slopes but they must both go through the mean point. So **intersecting the two lines recovers the sample means** without ever needing $$\\sum x$$ or $$\\sum y$$ directly. From there, $$\\sum x = n\\bar{x}$$ trivially.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_27", "judge_pick": true}, {"question": "From two regression equations $$y = 1.4x + 1.5$$ and $$x = 1.2 + 0.2y$$ over $$n=12$$ data points, outline how to deduce $$\\sum x$$. (3 steps)", "answer": "- Step 1: Solve the system to find the intersection $$(\\bar{x}, \\bar{y})$$ ‚ÄĒ substitute one into the other, get a linear equation, solve for $$\\bar{x}$$.\n- Step 2: Recognise that this intersection equals $$(\\bar{x}, \\bar{y})$$ because both regression lines pass through the centroid.\n- Step 3: Then $$\\sum x = n \\bar{x} = 12 \\bar{x}$$.\n\nIf $$\\bar{x} = 25/12$$, then $$\\sum x = 25$$. Always cite \"intersection = centroid\" as the structural fact bridging the two parts.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_28", "judge_pick": false}, {"question": "What is the formula $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$, and why is it equivalent to $$\\sum xy - \\tfrac{\\sum x \\sum y}{n}$$? (2 steps)", "answer": "- Step 1: $$\\bar{x} = \\sum x / n$$ and $$\\bar{y} = \\sum y/n$$, so $$n\\bar{x}\\bar{y} = n \\cdot \\tfrac{\\sum x}{n} \\cdot \\tfrac{\\sum y}{n} = \\tfrac{\\sum x \\sum y}{n}$$. Identical quantity.\n- Step 2: The first form $$\\sum xy - n\\bar{x}\\bar{y}$$ is convenient when you already know $$\\bar{x}, \\bar{y}$$ (e.g. from a regression-line intersection); the second form is convenient when you have raw $$\\sum x, \\sum y$$.\n\nPick whichever form matches the information you have ‚ÄĒ don't recompute $$\\sum x, \\sum y$$ if you already have means.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_29", "judge_pick": false}, {"question": "State the PMCC shortcut when both regression lines are given, and explain why it works. (3 steps)", "answer": "- Step 1: The slopes are $$b_{yx} = S_{xy}/S_{xx}$$ (from $$y$$-on-$$x$$) and $$b_{xy} = S_{xy}/S_{yy}$$ (from $$x$$-on-$$y$$).\n- Step 2: Multiply: $$b_{yx} \\cdot b_{xy} = \\dfrac{S_{xy}^2}{S_{xx} S_{yy}}$$.\n- Step 3: But the PMCC is $$r = \\dfrac{S_{xy}}{\\sqrt{S_{xx} S_{yy}}}$$, so $$r^2 = \\dfrac{S_{xy}^2}{S_{xx} S_{yy}} = b_{yx} \\cdot b_{xy}$$.\n\nSo $$r = \\pm\\sqrt{b_{yx} b_{xy}}$$, with sign matching the (common) sign of both slopes. This bypasses $$S_{xx}$$ and $$S_{yy}$$ entirely.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_30", "judge_pick": true}, {"question": "In a regression problem with $$b_{yx} = 1.4$$ and $$b_{xy} = 0.2$$, why is $$r$$ guaranteed to be positive, and roughly what magnitude? (2 steps)", "answer": "- Step 1: Both slopes are positive, so $$y$$ tends to increase with $$x$$ ‚ÄĒ positive correlation. $$r$$ inherits the sign.\n- Step 2: $$r^2 = 1.4 \\times 0.2 = 0.28$$, so $$r = +\\sqrt{0.28} \\approx 0.53$$ ‚ÄĒ moderate positive correlation.\n\nNote: $$r^2 \\leq 1$$ always, so $$b_{yx} \\cdot b_{xy} \\leq 1$$ for any valid regression pair. If you got $$> 1$$, you have an arithmetic slip.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_31", "judge_pick": false}, {"question": "What's the constraint $$|r| \\leq 1$$ tell you about the relationship between $$b_{yx}$$ and $$b_{xy}$$?", "answer": "Since $$r^2 = b_{yx} b_{xy} \\leq 1$$, the two regression slopes satisfy $$b_{yx} \\cdot b_{xy} \\leq 1$$. They can never both be large ‚ÄĒ if one is steep, the other must be shallow (and vice versa). Geometrically: when the data has perfect linear correlation ($$r = \\pm 1$$), the two regression lines coincide, and $$b_{xy} = 1/b_{yx}$$. As correlation weakens, the two lines spread apart, with $$b_{xy} < 1/b_{yx}$$ in product-magnitude.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_32", "judge_pick": true}, {"question": "Why might a student be tempted to compute $$S_{xx}$$ and $$S_{yy}$$ from scratch in a \"find PMCC\" question with two regression lines given ‚ÄĒ and why is this a trap?", "answer": "Computing $$S_{xx}$$ requires $$\\sum x^2$$, and $$S_{yy}$$ requires $$\\sum y^2$$. These are typically NOT given when the problem provides both regression lines, because the examiner intends the shortcut $$r^2 = b_{yx} b_{xy}$$. A student who tries to compute $$S_{xx}, S_{yy}$$ will get stuck. Lesson: when both regression lines are given, immediately reach for the shortcut.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_33", "judge_pick": true}, {"question": "Explain why the keyword \"Hence\" in a multi-part question is a structural instruction, not just stylistic. (2 steps)", "answer": "- Step 1: \"Hence\" means \"using the previous result you just derived\". The examiner is signposting that the next part builds on, and requires citation of, the previous answer.\n- Step 2: If you start from scratch ignoring \"hence\", you forfeit method marks tied to recognising the structural link, even if you arrive at a numerically correct answer.\n\nAlways reference the prior result explicitly. E.g. \"From (a)(i), the intersection is $$(\\bar{x}, \\bar{y}) = (25/12, 53/12)$$, so $$\\sum x = 12 \\bar{x} = 25$$.\"", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_34", "judge_pick": true}, {"question": "Three common \"compare distributions\" interpretation traps to avoid. (3 steps)", "answer": "- Step 1: Mentioning **skewness** when not asked ‚ÄĒ wastes time and risks miscalling the direction.\n- Step 2: Comparing **range** instead of IQR ‚ÄĒ range is sensitive to outliers and is rarely the credited comparison in S1.\n- Step 3: Omitting the **context sentence** ‚ÄĒ saying \"the median is greater\" without translating into the variable's meaning (\"so kangaroos are heavier in December\") misses the interpretation mark.\n\nStick to median + IQR + context. Three statements. Done.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_35", "judge_pick": false}, {"question": "A discrete RV $$X$$ takes values $$1, 2, 3$$ with $$P(X=x) = x/6$$. Without heavy computation, sketch how to find $$E(2X+1)$$. (3 steps)", "answer": "- Step 1: Use linearity: $$E(2X+1) = 2E(X) + 1$$.\n- Step 2: $$E(X) = 1\\cdot\\tfrac{1}{6} + 2\\cdot\\tfrac{2}{6} + 3\\cdot\\tfrac{3}{6} = \\tfrac{1+4+9}{6} = \\tfrac{14}{6} = \\tfrac{7}{3}$$.\n- Step 3: $$E(2X+1) = 2\\cdot\\tfrac{7}{3} + 1 = \\tfrac{17}{3}$$.\n\nThe takeaway: never apply $$E$$ inside the function $$g(X)$$ first ‚ÄĒ linearity only works for $$aX+b$$, not for general $$g$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_36", "judge_pick": false}, {"question": "Suppose $$\\text{Var}(X) = 4$$. What is $$\\text{Var}(3X - 7)$$?", "answer": "Variance ignores additive constants (a shift doesn't change spread) and scales by the square of the multiplier. So $$\\text{Var}(3X - 7) = 3^2 \\cdot \\text{Var}(X) = 9 \\cdot 4 = 36$$. The $$-7$$ contributes nothing. Easy fail mode: writing $$3 \\cdot 4 = 12$$ ‚ÄĒ that would be linearity for $$E$$, not for $$\\text{Var}$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_37", "judge_pick": false}, {"question": "Why does the path-probability sum equal 1 in a finite tree diagram, and why is this a useful check?", "answer": "A tree diagram exhausts all possible sequences of outcomes ‚ÄĒ every leaf is a mutually exclusive complete-history event, and together they form a partition of the sample space. So their probabilities sum to 1 by the axioms of probability. Use this as a sanity check: after computing all path probabilities, sum them. If you don't get $$1$$ (or extremely close), you've made an arithmetic slip or missed a path. In Sally's game: $$0.42 + 0.056 + 0.224 + 0.036 + 0.024 + 0.24 = 1.000$$. ‚úď", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_38", "judge_pick": false}, {"question": "Synthesis question: a normal-distribution simultaneous equations problem and a \"two regression lines\" problem both share a structural feature. What is it? (2 steps)", "answer": "- Step 1: Both reduce to a 2√ó2 linear system once you read the right structural fact: in regression, \"intersection of two lines = $$(\\bar{x}, \\bar{y})$$\"; in normal, \"two percentiles give two $$z$$-equations in $$(\\mu, \\sigma)$$\".\n- Step 2: Both are solved most cleanly by subtraction ‚ÄĒ eliminate one unknown first, then back-substitute.\n\nPattern recognition unlocks both. Always ask: \"is this two equations in two unknowns?\" before grinding through.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_39", "judge_pick": true}, {"question": "When listing the regions of a Venn diagram given a probability problem, why is the FIRST step always \"re-read the printed diagram and label each region\"? (2 steps)", "answer": "- Step 1: The labels $$w, x, y, z$$ in the question are tied to specific spatial positions of the diagram. Confusing \"left circle only\" with \"intersection\" is the single most common error.\n- Step 2: By writing each region's verbal meaning (\"$$w$$ = $$O$$ only\", \"$$x$$ = both\", etc.) before any arithmetic, you anchor the substitution. Then $$P(O \\cap C') = 0.15$$ goes into $$w$$, not $$x$$ ‚ÄĒ unambiguously.\n\nThis is the \"label first, compute second\" discipline.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_40", "judge_pick": false}, {"question": "What's the conceptual difference between $$E(X)^2$$ and $$E(X^2)$$? Illustrate with a simple example. (2 steps)", "answer": "- Step 1: $$E(X)^2 = [E(X)]^2$$ ‚ÄĒ square the mean. $$E(X^2)$$ ‚ÄĒ average of the squares.\n- Step 2: Example: $$X$$ takes values $$1, 3$$ each with probability $$0.5$$. Then $$E(X) = 2$$, so $$E(X)^2 = 4$$. But $$E(X^2) = 0.5(1) + 0.5(9) = 5$$. Different!\n\nThe gap $$E(X^2) - [E(X)]^2 = 5 - 4 = 1$$ is exactly $$\\text{Var}(X)$$. Jensen's inequality: for any non-constant RV, $$E(X^2) > [E(X)]^2$$, hence variance is positive.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_41", "judge_pick": true}, {"question": "A box plot has whiskers ending well inside what the data extremes are. What does this tell you?", "answer": "It signals that outliers exist beyond the whiskers ‚ÄĒ they are marked separately as crosses outside. The whisker endpoints are the most extreme non-outliers (largest value $$\\leq Q_3 + 1.5\\text{IQR}$$ and smallest value $$\\geq Q_1 - 1.5\\text{IQR}$$). If you see whiskers stopping short and crosses beyond, that's the diagnostic for outliers in the data.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_42", "judge_pick": false}, {"question": "Why does the conditional formula $$P(A|B) = P(A \\cap B)/P(B)$$ \"restrict the sample space\"? (2 steps)", "answer": "- Step 1: Conditioning on $$B$$ means we're now only considering outcomes where $$B$$ happened ‚ÄĒ the new universe is $$B$$ itself, with total probability $$1$$ inside this new universe.\n- Step 2: To make probabilities within $$B$$ sum to 1, we **rescale** by dividing by $$P(B)$$. The numerator $$P(A \\cap B)$$ captures the part of $$A$$ that's still inside the restricted universe ‚ÄĒ outcomes in $$A$$ but outside $$B$$ are gone.\n\nSo conditional probability = \"zoom in on $$B$$ and rescale\".", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_43", "judge_pick": true}, {"question": "If $$X$$ and $$Y$$ are perfectly dependent (e.g. $$Y = g(X)$$), why is there no meaningful 2D joint table to set up?", "answer": "A 2D joint table only carries information when $$X$$ and $$Y$$ have some independence/correlation structure that the marginals don't capture. If $$Y = g(X)$$, then knowing $$X$$ determines $$Y$$ exactly ‚ÄĒ the \"joint\" is degenerate: $$P(X=x, Y=y) = P(X=x)$$ if $$y = g(x)$$, else $$0$$. Every \"joint\" probability collapses to a marginal $$P(X=x)$$. Trying to multiply $$P(X=x) \\cdot P(Y=y)$$ as if independent gives wrong answers because they're not independent. The correct move: rewrite all events in terms of $$X$$ alone, then use the 1D PMF of $$X$$.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_44", "judge_pick": true}, {"question": "Quick exercise: $$X$$ takes values $$2, 4, 6$$ with probabilities $$0.5, 0.3, 0.2$$. Find $$P(X < 5 \\mid X > 3)$$. (3 steps)", "answer": "- Step 1: $$\\{X > 3\\} = \\{4, 6\\}$$, with total probability $$0.3 + 0.2 = 0.5$$.\n- Step 2: $$\\{X < 5\\} \\cap \\{X > 3\\} = \\{4\\}$$, with probability $$0.3$$.\n- Step 3: $$P(X < 5 \\mid X > 3) = 0.3/0.5 = 0.6$$.\n\nPattern: identify both events as $$x$$-sets, intersect, ratio.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_45", "judge_pick": false}, {"question": "What's the role of \"sketch the bell curve\" in normal-distribution problems? (3 steps)", "answer": "- Step 1: It anchors the geometry: where is the mean? where is the target value relative to the mean?\n- Step 2: It reveals the sign of $$z$$: shaded region to the left of the mean ‚Üí $$z$$ negative; to the right ‚Üí $$z$$ positive.\n- Step 3: It reveals which tail you need: $$P(X > c)$$ shades the right tail; you then convert $$P(X > c) = 1 - P(X < c)$$ before using tables.\n\nA 5-second sketch eliminates 90% of sign and tail-direction errors.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_46", "judge_pick": true}, {"question": "In a problem like Sally's, what's the practical difference between \"or\" probability (two separate paths) and \"and\" probability (sequential events along one path)?", "answer": "\"Or\" between **mutually exclusive paths** ‚Üí **add** path probabilities. E.g. $$P(\\text{exactly 2 wins}) = P(WW) + P(WLW) + P(LWW)$$. \"And\" along a sequence ‚Üí **multiply** branch probabilities. E.g. $$P(WLW) = P(W_1) \\cdot P(L_2|W_1) \\cdot P(W_3|L_2)$$. Tree diagrams encode this visually: multiplication along a path (top to bottom), addition across paths (combining endpoints).", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_47", "judge_pick": false}, {"question": "When stating \"not independent\" or \"not equal\", what's the marking convention to capture both available marks? (2 steps)", "answer": "- Step 1: State **both numerical values** explicitly. E.g. \"$$P(C \\cap O) = 0.55$$ and $$P(C) \\cdot P(O) = 0.455$$\".\n- Step 2: Then conclude with the inequality and the verbal conclusion: \"$$0.55 \\neq 0.455$$, so $$C$$ and $$O$$ are not statistically independent\".\n\nWithout the numerical comparison, the conclusion is unsupported ‚ÄĒ examiners want to see the test was actually performed.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_48", "judge_pick": false}, {"question": "Final synthesis: list three \"shortcut identities\" specific to S1 that, when recognised, save 5+ minutes per question. (3 steps)", "answer": "- Step 1: **Intersection of two regression lines = $$(\\bar{x}, \\bar{y})$$**. Bypasses needing $$\\sum x$$ or $$\\sum y$$ separately.\n- Step 2: **$$r^2 = b_{yx} \\cdot b_{xy}$$**. Bypasses $$S_{xx}$$ and $$S_{yy}$$ when both regression lines are given.\n- Step 3: **For $$A \\subseteq B$$, $$P(A \\cap B) = P(A)$$**. Simplifies conditional formulas when one event is a subset of another (e.g. \"won first 2\" $$\\subseteq$$ \"exactly 2 wins\").\n\nBonus: **$$z = 1.96$$ for the central 95%** of a normal ‚ÄĒ memorise this so you don't reread tables under time pressure.", "source": "Opus 4.7 ‚Ď°", "_id": "opus_2_49", "judge_pick": true}], "count": 50}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 14380, "out_tokens": 27989, "rea const SK='s1_paper_oct2023';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  if(mySet.size===0)DATA.selected.forEach(c=>mySet.add(c.question));
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">‚ÄĘ ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">‚ÄĘ ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'‚ÄĒ'}
function fC(n){return n!=null?'‚ā¨'+n.toFixed(4):'‚ÄĒ'}
function fT(s){if(!s)return'‚ÄĒ';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">ūüďĆ My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">‚ú® Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'‚ÄĒ'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'‚ÄĒ'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'‚ÄĒ'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">ūüďč</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('ūüďč '+myCards.length+' cards copied ‚ÄĒ paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),3500);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('‚ÄĒ')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error ‚Üí clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
