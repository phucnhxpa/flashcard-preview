res $\\sigma$ and $\\mu$ are accurate to 3 s.f., as required by the mark scheme.\n\n+ Example: Using $z_1 = -1.6449$ and $z_2 = 0.2533$ gives $\\sigma = 14.75$ vs. $\\sigma = 14.8$ when rounded.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "What is the shortcut formula for PMCC when both regression lines $y = 1.4x + 1.5$ and $x = 1.2 + 0.2y$ are given? (2 steps)", "answer": "- Step 1: Recall the identity $r^2 = b_{yx} \\cdot b_{xy}$, where $b_{yx}$ is the slope of $y$ on $x$ (1.4) and $b_{xy}$ is the slope of $x$ on $y$ (0.2).\n- Step 2: Compute $r = \\sqrt{1.4 \\times 0.2} = \\sqrt{0.28} \\approx 0.529$. Since both slopes are positive, $r$ is positive.\n\n[Optional: This bypasses calculating $S_{xx}$, $S_{yy}$, or $\\sum x^2$ which aren't provided.]", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "What is the trigger phrase that forces you to use the formula $P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$ in Q1? (1 trigger phrase)", "answer": "The phrase \"given that\" in a probability question (e.g., \"given that Sally won the first game\"). This indicates a conditional probability and requires explicitly writing the formula before substituting values.\n\n+ Sub-case: In Q1(e), \"given that Sally won the first game\" restricts the sample space to paths starting with W (WW, WLW, WLL), excluding LWW.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "How do you calculate the median position for a dataset of 33 values in Q2(a)? (2 steps)", "answer": "- Step 1: Use Edexcel S1 quartile formula for discrete data: $\\text{Median position} = \\frac{n+1}{2}$.\n- Step 2: For $n=33$, median position is $\\frac{33+1}{2} = 17$th value. If non-integer (e.g., 8.5), average the 8th and 9th values.\n\n+ Comparison: This differs from grouped data where you use $\\frac{n}{2}$ without adding 1.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Why is the intersection of the two regression lines $y = 1.4x + 1.5$ and $x = 1.2 + 0.2y$ equal to $(\\bar{x}, \\bar{y})$ in Q6(a)? (3 steps)", "answer": "- Step 1: Both regression lines pass through the point $(\\bar{x}, \\bar{y})$ by definition.\n- Step 2: Solving the equations simultaneously gives $\\bar{x} = \\frac{25}{12}$ and $\\bar{y} = \\frac{53}{12}$.\n- Step 3: This allows you to compute $\\sum x = n\\bar{x} = 12 \\times \\frac{25}{12} = 25$ directly for Q6(a ii).\n\n[Optional: This structural fact avoids recalculating $\\sum x$ from scratch.]", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": true}, {"question": "What is the trick for handling the variance of a scaled random variable $Y = 30/X$ in Q4(c)? (3 steps)", "answer": "- Step 1: Recognize $Y = 30/X$ is a linear scaling of $1/X$: $Y = 30 \\cdot (1/X)$.\n- Step 2: Use the identity $\\text{Var}(aX) = a^2 \\text{Var}(X)$. Here, $a = 30$, so $\\text{Var}(Y) = 30^2 \\cdot \\text{Var}(1/X)$.\n- Step 3: Carry out the calculation: $900 \\cdot \\frac{29}{600} = 43.5$, ensuring the squared factor is applied.\n\n[Optional: This avoids recalculating expectation from scratch for $Y$.]", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "For a tree diagram where the game stops early (e.g., \"if she wins the first 2 games or loses the first 2 games, she will not play the 3rd game\"), what must you do before calculating any probability? (Q1)", "answer": "- Step 1: List every possible path through the tree, noting that some branches terminate early.\n- Step 2: Calculate each path's probability by multiplying along the branches.\n- Step 3: Verify all path probabilities sum to 1.00.\n+ The key insight: paths like $WW$ (stop after 2 games) and $LL$ (stop after 2 games) have only 2 stages, not 3. Excluded paths like $WLW$ and $LWW$ have 3 stages.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "In part (e) of Q1, the learner divided $P(\\text{exactly 2 wins}) = 0.512$ by $P(W_1) = 0.7$. Why is this wrong, and what is the correct numerator? (Q1e)", "answer": "- Step 1: The question asks for $P(\\text{won 2 games} \\mid W_1)$, meaning we restrict to paths that begin with a win.\n- Step 2: The numerator must be the joint event $P(\\text{won 2 games} \\cap W_1)$, not the marginal \"exactly 2 wins.\"\n- Step 3: Identify paths with exactly 2 wins that also start with $W$: these are $WW$ and $WLW$.\n+ The path $LWW$ has exactly 2 wins but starts with $L$, so it must be excluded from the numerator.\n- Step 4: Calculate: $P(WW \\cap W_1) + P(WLW \\cap W_1) = 0.42 + 0.056 = 0.476$.\n- Step 5: Then $P(\\text{won 2} \\mid W_1) = 0.476/0.7 = 0.68$.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "What is the trigger phrase in probability questions that tells you to use the conditional probability formula $P(A \\mid B) = P(A \\cap B)/P(B)$? (Q1d, Q1e, Q4d)", "answer": "The trigger phrases are:\n- \"Given that ...\"\n- \"Conditional on ...\"\n- \"Find the probability of A, given that B has occurred\"\n+ If A is a subset of B (like \"won the first 2 games\" within \"won exactly 2 games\"), then $P(A \\cap B) = P(A)$, simplifying to $P(A)/P(B)$.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "In Edexcel S1, what formula is used to find the position of quartiles for ungrouped/discrete data? When do you average two values? (Q2a)", "answer": "Use these positions:\n- $Q_1$ position: $\\frac{n+1}{4}$\n- Median position: $\\frac{n+1}{2}$\n- $Q_3$ position: $\\frac{3(n+1)}{4}$\n+ If the position is not an integer (e.g., 8.5), you must average the two flanking values (the 8th and 9th values).\n+ This differs from some other specifications that use $n/4$ directly — Edexcel S1 specifically uses $(n+1)/4$.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "When drawing a box plot with outliers, where do the whiskers end? (Q2c)", "answer": "- Step 1: Calculate the outlier fences: $Q_1 - 1.5 \\times \\text{IQR}$ and $Q_3 + 1.5 \\times \\text{IQR}$.\n- Step 2: Identify all outliers (values outside the fences).\n- Step 3: Draw whiskers from the box to the most extreme values that are NOT outliers (the \"adjacent values\").\n- Step 4: Plot each outlier as a cross (×) beyond the whiskers.\n+ Common mistake: Extending whiskers to the minimum/maximum values, even if they are outliers. This loses marks.", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "For the \"compare the distribution\" question in Q2(d), what is the exact template required to get full marks? (Q2d)", "answer": "Use exactly THREE statements:\n1. **Median comparison (location):** State which median is greater/less, quote the value with units, and interpret in context.\n2. **IQR comparison (spread):** State which IQR is greater/less, and interpret (e.g., \"more consistent\" or \"more variable\").\n3. **No additional claims:** Do NOT mention skew, range, outliers, or any other statistics — the mark scheme ignores them and wrong claims can cancel correct ones.\n+ The template is: median → IQR → context sentence for each.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "In a Venn diagram question where the regions are labeled $w$, $x$, $y$, $z$ (left to right: $O$ only, $O \\cap C$, $C$ only, outside), what is the first step before substituting any given probabilities? (Q3i a)", "answer": "- Step 1: Re-draw the Venn diagram and explicitly label each region with its meaning:\n   - $w = O \\cap C'$ (onions only)\n   - $x = O \\cap C$ (both)\n   - $y = C \\cap O'$ (carrots only)\n   - $z = (O \\cup C)'$ (neither)\n- Step 2: Match each given probability to its correct region using the wording.\n+ The common error is swapping $w$ and $x$ — always define regions first.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "How do you test whether two events $A$ and $B$ are statistically independent? What must you state in your answer? (Q3i c)", "answer": "- Step 1: Calculate $P(A \\cap B)$ from the Venn diagram (the intersection region).\n- Step 2: Calculate $P(A) \\times P(B)$ as the product of marginals.\n- Step 3: State both numerical values explicitly.\n- Step 4: If they are NOT equal, conclude \"therefore A and B are not independent.\"\n+ You must show the numerical inequality: $0.55 \\neq 0.455$, not just say \"not independent.\"", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "For discrete random variables, how do you calculate $E(g(X))$ where $g(X)$ is a function of $X$? (Q4a)", "answer": "Use the law of the unconscious statistician:\n$$E(g(X)) = \\sum_{all x} g(x) \\cdot P(X = x)$$\n- Step 1: Write out each $x$ value, its probability, and compute $g(x)$.\n- Step 2: Multiply $g(x)$ by $P(X=x)$ for each $x$.\n- Step 3: Sum all products.\n+ Example for $g(X) = 1/X$: $E(1/X) = \\frac{1}{1} \\cdot \\frac{1}{10} + \\frac{1}{2} \\cdot \\frac{1}{5} + \\frac{1}{3} \\cdot \\frac{3}{10} + \\frac{1}{4} \\cdot \\frac{2}{5}$", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "What is the formula for $\\text{Var}(g(X))$, and what is the two-step process to calculate it? (Q4b)", "answer": "- Step 1: Calculate $E(g(X))$ — the expected value of the function.\n- Step 2: Calculate $E(g(X)^2)$ — treat $g(X)^2$ as a new function and apply the same summation formula.\n- Step 3: Apply the variance formula: $\\text{Var}(g(X)) = E(g(X)^2) - [E(g(X))]^2$.\n+ Note: You cannot use $\\text{Var}(aX + b) = a^2 \\text{Var}(X)$ unless $g(X)$ is a linear function of $X$. For $g(X) = 1/X$, you must use the general formula.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "For a linear transformation $Y = aX + b$, what are the formulas for $E(Y)$ and $\\text{Var}(Y)$? (Q4c)", "answer": "- $E(Y) = aE(X) + b$\n- $\\text{Var}(Y) = a^2 \\text{Var}(X)$ — note the SQUARE on $a$.\n+ The $b$ term drops out of the variance entirely because adding a constant shifts all values but doesn't change the spread.\n+ For $Y = 30/X$, this is NOT linear, but $Y = 30 \\cdot (1/X)$ means $E(Y) = 30 \\cdot E(1/X)$ and $\\text{Var}(Y) = 30^2 \\cdot \\text{Var}(1/X)$ because the constant factor 30 multiplies the entire function.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "In Q4(d), the learner tried to treat $X$ and $Y = 30/X$ as independent and summed products. Why is this wrong, and what is the correct approach? (Q4d)", "answer": "- Step 1: Recognize that $Y$ is a deterministic function of $X$: $Y = g(X)$.\n- Step 2: There is NO joint distribution — $X$ and $Y$ are perfectly dependent.\n- Step 3: Translate the condition on $Y$ into a condition on $X$:\n   + $Y < 20 \\iff \\frac{30}{X} < 20 \\iff X > \\frac{30}{20} = 1.5$\n   + Since $X$ takes values 1, 2, 3, 4, this means $X \\in \\{2, 3, 4\\}$.\n- Step 4: Then compute the conditional probability using the translated condition on $X$.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "When calculating $P(X < 3 \\mid Y < 20)$ for $Y = 30/X$, what are the numerator and denominator probabilities in terms of $X$? (Q4d)", "answer": "- Denominator: $P(Y < 20) = P(X > 1.5) = P(X = 2) + P(X = 3) + P(X = 4) = \\frac{2}{10} + \\frac{3}{10} + \\frac{4}{10} = \\frac{9}{10}$\n- Numerator: The intersection $P(X < 3 \\cap Y < 20)$:\n   + $X < 3$ means $X \\in \\{1, 2\\}$\n   + $Y < 20$ means $X > 1.5$, so $X \\in \\{2, 3, 4\\}$\n   + Intersection = $X = 2$ only\n   + So numerator = $P(X = 2) = \\frac{2}{10}$\n- Final: $\\frac{2/10}{9/10} = \\frac{2}{9}$", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": true}, {"question": "For a Normal distribution question, what is the standardisation formula, and how do you use it to find probabilities? (Q5a, Q5b)", "answer": "- Step 1: Standardise: $Z = \\frac{X - \\mu}{\\sigma}$\n- Step 2: Substitute the values: $P(X < 240) = P\\left(Z < \\frac{240-210}{25}\\right) = P(Z < 1.2)$\n- Step 3: Look up $\\Phi(1.2)$ in the Normal table: $\\Phi(1.2) = 0.8849$\n+ For a range $P(a < X < b)$, standardise both endpoints and subtract: $P(a < X < b) = \\Phi(z_b) - \\Phi(z_a)$", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "In part (c) of Q5, they ask for $k$ such that $P(210 - k < X < 210 + k) = 0.95$. What $z$-value corresponds to this, and why? (Q5c)", "answer": "- Step 1: The interval is symmetric about the mean, and total probability is 0.95.\n- Step 2: Therefore, each tail has probability $0.5 - 0.95/2 = 0.025$.\n- Step 3: We need $P(Z < z) = 1 - 0.025 = 0.975$.\n- Step 4: From the inverse Normal table, $z = 1.96$ (for 0.975).\n- Step 5: Convert back: $k/25 = 1.96$, so $k = 49$.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "For the \"lightest 15%\" in Q5(d), why is the $z$-value negative, and how do you find it? (Q5d)", "answer": "- Step 1: \"Lightest 15%\" means $P(X < w) = 0.15$, which is in the left tail.\n- Step 2: The $z$-value for the 15th percentile is negative (below the mean).\n- Step 3: Find $z$ where $\\Phi(z) = 0.15$. Since tables give $\\Phi(z)$ for positive $z$, use symmetry:\n   + $\\Phi(-z) = 1 - \\Phi(z)$\n   + Find $z$ where $\\Phi(z) = 0.85$ (the complement), giving $z = 1.0364$\n   + So for 0.15, $z = -1.0364$\n- Step 4: Reverse standardisation: $w = \\mu + z\\sigma = 210 + (-1.0364)(25) = 184$ g", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "In Q5(e), you have two percentile conditions: $P(Y < 152) = 0.05$ and $P(Y > 180) = 0.40$. How do you set up the simultaneous equations correctly? (Q5e)", "answer": "- Step 1: Convert \"more than 180\" to \"less than 180\": $P(Y > 180) = 0.40$ means $P(Y < 180) = 0.60$.\n- Step 2: Find $z$-values: for 0.05 → $z_1 = -1.6449$; for 0.60 → $z_2 = 0.2533$.\n- Step 3: Write equations:\n   + $\\frac{152 - \\mu}{\\sigma} = -1.6449$  (1)\n   + $\\frac{180 - \\mu}{\\sigma} = 0.2533$   (2)\n- Step 4: Subtract (1) from (2) to eliminate $\\mu$: $\\frac{28}{\\sigma} = 1.8982$, giving $\\sigma = 14.8$.\n- Step 5: Back-substitute into either equation to find $\\mu = 176.3$.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "What is the key insight about the intersection point of the two regression lines ($y$ on $x$ and $x$ on $y$)? (Q6a i)", "answer": "The intersection point of the two regression lines is ALWAYS $(\\bar{x}, \\bar{y})$ — the point of means.\n- Step 1: Solve the equations simultaneously:\n   + $y = 1.4x + 1.5$\n   + $x = 1.2 + 0.2y$\n- Step 2: Substitute $y$ into $x$: $x = 1.2 + 0.2(1.4x + 1.5) = 1.5 + 0.28x$\n- Step 3: $x - 0.28x = 1.5$, so $x = 1.5/0.72 = 25/12$\n- Step 4: Then $y = 1.4(25/12) + 1.5 = 53/12$\n- Step 5: This gives $\\bar{x} = 25/12$, so $\\sum x = 12 \\times 25/12 = 25$.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "What is the formula for $S_{xy}$, and what two equivalent forms can you use? (Q6b)", "answer": "$$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$\nThis is equivalent to:\n$$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$\n- Step 1: From part (a), we have $\\sum x = 25$ and $\\sum y = 53$.\n- Step 2: Also $\\bar{x} = 25/12$ and $\\bar{y} = 53/12$.\n- Step 3: Compute: $S_{xy} = \\frac{6961}{60} - 12 \\cdot \\frac{25}{12} \\cdot \\frac{53}{12} = \\frac{6961}{60} - \\frac{1325}{12} = \\frac{336}{60} = \\frac{28}{5} = 5.6$", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "When both regression lines are given (not just one), what is the shortcut to find the PMCC $r$ without calculating $S_{xx}$ and $S_{yy}$? (Q6c)", "answer": "Use the identity:\n$$r^2 = b_{yx} \\cdot b_{xy}$$\n- Step 1: Identify slopes: $b_{yx} = 1.4$ (from $y = 1.4x + 1.5$) and $b_{xy} = 0.2$ (from $x = 1.2 + 0.2y$).\n- Step 2: Multiply: $r^2 = 1.4 \\times 0.2 = 0.28$.\n- Step 3: Take the square root: $r = \\sqrt{0.28} \\approx 0.529$.\n+ The sign is positive because both regression slopes are positive.\n+ This bypasses calculating $S_{xx}$ and $S_{yy}$ entirely.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "If you needed to verify the PMCC from Q6(c) using the long route, how would you find $S_{xx}$ and $S_{yy}$ using the regression slopes and $S_{xy}$? (Q6c)", "answer": "- From $b_{yx} = S_{xy}/S_{xx}$: $S_{xx} = S_{xy}/b_{yx} = 5.6/1.4 = 4$\n- From $b_{xy} = S_{xy}/S_{yy}$: $S_{yy} = S_{xy}/b_{xy} = 5.6/0.2 = 28$\n- Then $r = \\frac{S_{xy}}{\\sqrt{S_{xx}S_{yy}}} = \\frac{5.6}{\\sqrt{4 \\times 28}} = \\frac{5.6}{\\sqrt{112}} \\approx 0.529$\n+ This confirms the shortcut answer.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "What are three common errors when using the Normal distribution tables, and how do you avoid them? (Q5)", "answer": "1. **Wrong tail:** For $P(X > a)$ where $a > \\mu$, use $1 - \\Phi(z)$, not $\\Phi(z)$.\n2. **Sign error:** For percentiles below the mean (like \"lightest 15%\"), the $z$-value is negative.\n3. **Midpoint confusion:** For $P(a < X < b)$, always subtract: $\\Phi(z_b) - \\Phi(z_a)$, not add.\n+ Always sketch the bell curve and shade the region BEFORE looking up the table.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "In the Venn diagram part (ii) of Q3, events $F$ and $H$ are mutually exclusive, and $F$ and $G$ are independent. Given $P(F) = 2/7$, $P(H) = 1/4$, and $P(F \\cup G) = 5/8$, how do you find $P(G)$? (Q3ii b)", "answer": "- Step 1: Since $F$ and $G$ are independent: $P(F \\cap G) = P(F) \\cdot P(G) = \\frac{2}{7} P(G)$.\n- Step 2: Use the union formula: $P(F \\cup G) = P(F) + P(G) - P(F \\cap G)$.\n- Step 3: Substitute: $\\frac{5}{8} = \\frac{2}{7} + P(G) - \\frac{2}{7}P(G) = \\frac{2}{7} + \\frac{5}{7}P(G)$.\n- Step 4: Solve: $\\frac{5}{7}P(G) = \\frac{5}{8} - \\frac{2}{7} = \\frac{19}{56}$, so $P(G) = \\frac{19}{40}$.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Why can two non-trivial events (with probability > 0) never be both mutually exclusive AND independent? (Q3)", "answer": "- If mutually exclusive: $P(A \\cap B) = 0$.\n- If independent: $P(A \\cap B) = P(A) \\cdot P(B) > 0$ (since both > 0).\n- These contradict each other. Therefore, for $P(A), P(B) > 0$:\n  + If $A$ and $B$ are mutually exclusive → they are NOT independent.\n  + If $A$ and $B$ are independent → they are NOT mutually exclusive.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In Q4(b), the variance calculation involves fractions with different denominators. What is the strategy to avoid arithmetic errors? (Q4b)", "answer": "- Step 1: Find a common denominator BEFORE combining terms.\n- Step 2: For $E(1/X^2)$, the terms are: $1/10$, $1/20$, $1/30$, $1/40$. LCM = 120.\n- Step 3: Convert all to 120ths: $12/120 + 6/120 + 4/120 + 3/120 = 25/120 = 5/24$.\n- Step 4: For variance, $E(1/X)^2 = (2/5)^2 = 4/25$. Common denominator 600: $125/600 - 96/600 = 29/600$.\n+ Keep fractions exact throughout; convert to decimals only at the final answer.", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "For a box plot, what constitutes an outlier under the $1.5 \\times \\text{IQR}$ rule, and how do you calculate the fences? (Q2b)", "answer": "- Step 1: Calculate $\\text{IQR} = Q_3 - Q_1$.\n- Step 2: Calculate $1.5 \\times \\text{IQR}$.\n- Step 3: Upper fence = $Q_3 + 1.5 \\times \\text{IQR}$. Any value above this is an outlier.\n- Step 4: Lower fence = $Q_1 - 1.5 \\times \\text{IQR}$. Any value below this is an outlier.\n+ For Q2: $Q_1 = 45$, $Q_3 = 63$, IQR = 18, $1.5 \\times \\text{IQR} = 27$.\n+ Fences: $63 + 27 = 90$ (upper), $45 - 27 = 18$ (lower).\n+ Values 16 and 94 are outliers.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In regression analysis, what is the relationship between the two regression slopes $b_{yx}$ and $b_{xy}$ and the PMCC $r$? (Q6)", "answer": "- $b_{yx} = \\frac{S_{xy}}{S_{xx}}$ and $b_{xy} = \\frac{S_{xy}}{S_{yy}}$\n- Therefore: $b_{yx} \\cdot b_{xy} = \\frac{S_{xy}}{S_{xx}} \\cdot \\frac{S_{xy}}{S_{yy}} = \\frac{S_{xy}^2}{S_{xx} S_{yy}} = r^2$\n+ This gives the shortcut: $r^2 = b_{yx} \\cdot b_{xy}$.\n+ The sign of $r$ matches the common sign of both slopes.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "When a question says \"hence show that $\\sum x = 25$\" (as in Q6a ii), what does \"hence\" imply, and how do you use it? (Q6a ii)", "answer": "- \"Hence\" means you MUST use the result from the previous part.\n- From part (i), the intersection is at $(\\bar{x}, \\bar{y}) = (25/12, 53/12)$.\n- Therefore $\\bar{x} = 25/12$.\n- Then $\\sum x = n \\bar{x} = 12 \\times (25/12) = 25$.\n+ The mistake is treating it as a fresh calculation instead of using the intersection point.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "What is the difference between the event \"Bob buys carrots or onions but not both\" and \"Bob buys carrots or onions\" in a Venn diagram context? (Q3i b)", "answer": "- \"Carrots or onions (inclusive)\" = $C \\cup O$ = all regions except \"neither\" = $w + x + y$.\n- \"Carrots or onions but not both\" = symmetric difference = exactly one of them = $w + y$ (the regions in $C$ only or $O$ only, excluding the intersection).\n+ This is also written as $(C \\cap O') \\cup (C' \\cap O)$.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "In Q3ii (a), given that $F$ and $H$ are mutually exclusive, how do you find $P(F \\cup H)$? (Q3ii a)", "answer": "For mutually exclusive events, $P(A \\cap B) = 0$, so:\n$$P(F \\cup H) = P(F) + P(H) - P(F \\cap H) = P(F) + P(H) - 0$$\n$$= \\frac{2}{7} + \\frac{1}{4} = \\frac{8}{28} + \\frac{7}{28} = \\frac{15}{28}$$\n+ The formula $P(A \\cup B) = P(A) + P(B)$ only works when they're mutually exclusive.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "In Q3ii (c), how do you find $P(F \\cap G')$ when $F$ and $G$ are independent? (Q3ii c)", "answer": "Two methods:\n1. **Direct subtraction:** $P(F \\cap G') = P(F) - P(F \\cap G)$\n   + $= \\frac{2}{7} - \\frac{19}{140} = \\frac{21}{140} = \\frac{3}{20}$\n2. **Using independence:** $P(F \\cap G') = P(F) \\cdot P(G')$ since independent\n   + $P(G') = 1 - P(G) = 1 - \\frac{19}{40} = \\frac{21}{40}$\n   + $= \\frac{2}{7} \\times \\frac{21}{40} = \\frac{3}{20}$", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "For the discrete random variable in Q4, verify that the probabilities sum to 1. Why is this check important? (Q4)", "answer": "- $\\frac{1}{10} + \\frac{1}{5} + \\frac{3}{10} + \\frac{2}{5} = \\frac{1}{10} + \\frac{2}{10} + \\frac{3}{10} + \\frac{4}{10} = \\frac{10}{10} = 1$ ✓\n+ This check is essential because all subsequent calculations (expectation, variance) depend on valid probability distributions. If probabilities don't sum to 1, the entire distribution is invalid.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In Q5(c), why do we use $z = 1.96$ (not 1.645 or 2) for a 95% symmetric interval? (Q5c)", "answer": "- For a symmetric interval with total probability 0.95, each tail has probability 0.025.\n- We need $P(Z < z) = 1 - 0.025 = 0.975$.\n- From the standard Normal table, $\\Phi(1.96) = 0.975$ exactly.\n- This is why 1.96 is the canonical value for 95% confidence intervals.\n+ Using 1.645 would give ~90% total probability; 2 would give ~95.45%.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "What is the key strategy when solving simultaneous equations in Normal distribution questions (Q5e) versus regression questions (Q6a)? (Q5e, Q6a)", "answer": "- **Normal (Q5e):** Always subtract the equations first to eliminate $\\mu$, solve for $\\sigma$, then back-substitute.\n- **Regression (Q6a):** Recognize that the intersection gives $(\\bar{x}, \\bar{y})$, which immediately gives $\\sum x$ and $\\sum y$.\n+ Both reduce to a 2×2 linear system once you spot the structural fact.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "In box plots, what does a larger IQR indicate about the data compared to a smaller IQR? (Q2d)", "answer": "- Larger IQR means the middle 50% of the data is more spread out — the data is more variable/less consistent.\n- Smaller IQR means the middle 50% is clustered together — the data is more consistent/more tightly grouped.\n+ In Q2(d), if February's IQR > December's IQR, then February weights are \"more variable\" or \"less consistent\" than December.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "When translating a condition like $Y < 20$ where $Y = k/X$, what must you check before solving for $X$? (Q4d)", "answer": "- Check the sign of $X$ (or more precisely, the sign of the transformation).\n- Since $k = 30 > 0$ and $X > 0$, the function $Y = 30/X$ is decreasing.\n- Therefore: $Y < 20 \\iff X > 30/20 = 1.5$.\n+ If $k$ were negative, the inequality direction would flip. If $X$ could be negative, you'd need to consider separate cases.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "In a tree diagram with dependent probabilities (where the probability of the next outcome depends on the previous outcome), what is the key to setting up the tree correctly? (Q1)", "answer": "- Step 1: Identify all \"states\" that affect subsequent probabilities.\n- Step 2: The branches after each outcome use the CONDITIONAL probability appropriate to that outcome.\n- Step 3: After a Win, use $P(\\text{win} \\mid \\text{win}) = 0.6$ and $P(\\text{loss} \\mid \\text{win}) = 0.4$.\n- Step 4: After a Loss, use $P(\\text{win} \\mid \\text{loss}) = 0.2$ and $P(\\text{loss} \\mid \\text{loss}) = 0.8$.\n+ Do NOT use the same probabilities after every outcome — they depend on the previous result.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In Q3i(a), given $P(C) = 0.65$, $P(O') = 0.3$, and $P(O \\cap C') = 0.15$, how do you find $P(O)$ first? (Q3i a)", "answer": "- $P(O') = 0.3$ means the probability of NOT buying onions is 0.3.\n- Therefore $P(O) = 1 - P(O') = 1 - 0.3 = 0.7$.\n+ This is a common pattern: when given the complement probability, subtract from 1 to get the original probability.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "For the \"show that\" questions (like Q1a \"show that E(1/X) = 2/5\"), what is the expected level of detail in the answer? (Q4a)", "answer": "- Write out EVERY algebraic step.\n- Do NOT skip intermediate terms.\n- The method marks reward the chain of reasoning even if arithmetic slips occur.\n- For Q4a: show $E(1/X) = \\frac{1}{1}\\cdot\\frac{1}{10} + \\frac{1}{2}\\cdot\\frac{1}{5} + \\frac{1}{3}\\cdot\\frac{3}{10} + \\frac{1}{4}\\cdot\\frac{2}{5}$, then simplify to $4/10 = 2/5$.\n+ The conclusion \"$\\therefore E(1/X) = 2/5$\" alone is insufficient.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}], "count": 39}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "In a tree diagram where Sally stops playing after 2 games if she wins the first 2 OR loses the first 2, how do you ensure you correctly enumerate all possible paths and their probabilities? (Q1)", "answer": "- Step 1: Recognise the stopping condition — the tree has a maximum of 3 games, but branches terminate early at \"WW\" (two wins) or \"LL\" (two losses).\n- Step 2: Draw ALL six paths systematically: WW, WLW, WLL, LWW, LWL, LL. Do NOT include paths like WLWL — they don't exist because the game stops after two consecutive same results.\n- Step 3: Multiply along each branch using the conditional probabilities (0.6 after a win, 0.2 after a loss for winning the next game). Verify all probabilities sum to exactly 1.\n\nThe stopping rule fundamentally changes the probability distribution — ignoring it produces an invalid probability tree that doesn't sum to 1.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "In part (e) of Q1, why is it wrong to calculate P(won 2 games | won first game) as 0.512 ÷ 0.7? What is the correct numerator? (Q1)", "answer": "- Step 1: The denominator P(first game won) = 0.7 is correct.\n- Step 2: The error is using the marginal P(exactly 2 wins) = 0.512 as the numerator. This includes the LWW path, which has L (loss) on the first game — contradicting the condition \"won first game.\"\n- Step 3: The correct numerator is P(won exactly 2 games AND won first game) = only paths beginning with W that have exactly 2 wins: WW (0.42) + WLW (0.056) = 0.476.\n- Step 4: Compute 0.476 ÷ 0.7 = 0.68.\n\nThe key insight: \"given that\" always restricts the sample space — your numerator must be the joint event, not the marginal.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "When calculating P(A | B) where A is a subset of B (like \"won first 2 games\" within \"won exactly 2 games\"), why does the intersection simplify to just P(A)? (Q1d)", "answer": "- Step 1: If A ⊆ B, then A ∩ B = A (every outcome in A is also in B).\n- Step 2: Therefore P(A | B) = P(A ∩ B) / P(B) = P(A) / P(B).\n- Step 3: In Q1(d), \"won first 2 games\" (WW) is a subset of \"won exactly 2 games\" (WW or WLW or LWW), so the intersection is just WW.\n- Step 4: This gives P(WW | exactly 2 wins) = 0.42 / 0.512 = 105/128.\n\nRecognising subset relationships saves time — you don't need to write out the full intersection explicitly when one event is contained within the other.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": true}, {"question": "In Edexcel S1, what formulas are used to find the positions of the median, Q1, and Q3 for ungrouped data? (Q2)", "answer": "- Step 1: For n observations, the positions are:\n  - Median position: (n+1)/2\n  - Q1 position: (n+1)/4\n  - Q3 position: 3(n+1)/4\n- Step 2: If the position is an integer, use that value directly. If it's a decimal (e.g., 8.5), average the two flanking values.\n- Step 3: For n = 33: median at position 17 (integer), Q1 at 8.5 (average 8th and 9th), Q3 at 25.5 (average 25th and 26th).\n\nThis differs from some other syllabi — Edexcel S1 uses (n+1)/4, NOT n/4. Using the wrong formula shifts your quartiles and breaks subsequent outlier/box plot calculations.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "Using the outlier definition Q3 + 1.5×IQR and Q1 - 1.5×IQR, how do you determine which data points are outliers in a box plot? (Q2b)", "answer": "- Step 1: Compute IQR = Q3 - Q1.\n- Step 2: Calculate the upper fence = Q3 + 1.5×IQR and lower fence = Q1 - 1.5×IQR.\n- Step 3: Scan your data: any value above the upper fence OR below the lower fence is an outlier.\n- Step 4: For the kangaroo data: IQR = 18, so 1.5×IQR = 27. Upper fence = 63 + 27 = 90, lower fence = 45 - 27 = 18. Values 16 and 94 are outliers.\n- Step 5: Whisker endpoints in the box plot are the most extreme NON-OUTLIER values (23 and 86), not the absolute minimum/maximum.\n\nThe key trick: outliers are NOT included in the whiskers — they sit outside as individual crosses.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "When asked to \"compare the distribution of weights in February with the distribution in December,\" what exactly should you write to earn full marks? (Q2d)", "answer": "- Step 1: Use exactly THREE statements in your answer:\n  - Statement 1: Compare the medians (location). Say \"The median in [month] is [greater/less] than the median in [other month].\"\n  - Statement 2: Compare the IQRs (spread). Say \"The IQR in [month] is [greater/less] than the IQR in [other month].\"\n  - Statement 3: Interpret one of these in context with units. E.g., \"This means kangaroos are heavier on average in December\" or \"weights are more consistent in December.\"\n- Step 2: Do NOT mention skew, range, outliers, or any other statistic — the mark scheme ignores extra claims and they can even cancel correct ones.\n- Step 3: Include units (kg) and the variable name in your context statement.\n\nThe template is rigid: median + IQR + one context sentence each. Three statements only, no exceptions.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "In a Venn diagram with four regions (O-only, intersection, C-only, outside both), what four equations must you set up to solve for all region probabilities? (Q3i a)", "answer": "- Step 1: Label the four regions: w = O only, x = O ∩ C, y = C only, z = outside.\n- Step 2: Write P(O) = w + x (intersection plus O-only).\n- Step 3: Write P(C) = x + y (intersection plus C-only).\n- Step 4: Write the complement: if P(O') = 0.3, then P(O) = 0.7. Use P(O') = z + y.\n- Step 5: Write the total probability: w + x + y + z = 1.\n- Step 6: Solve the system. From P(O ∩ C') = 0.15, we know w = 0.15. Then x = 0.7 - 0.15 = 0.55, y = 0.65 - 0.55 = 0.10, z = 1 - 0.80 = 0.20.\n\nThe critical trick: re-read the diagram labeling — w is O-only, not the intersection, even though the numbers might tempt you to swap them.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "How do you test whether two events C and O are statistically independent using a Venn diagram? (Q3i c)", "answer": "- Step 1: Compute P(C ∩ O) from the intersection region (x = 0.55).\n- Step 2: Compute P(C) × P(O) = 0.65 × 0.7 = 0.455.\n- Step 3: Compare the two numbers. If P(C ∩ O) = P(C)P(O), they are independent. If not, they are dependent.\n- Step 4: Since 0.55 ≠ 0.455, state clearly: \"Since 0.55 ≠ 0.455, C and O are not independent.\"\n- Step 5: For the converse (\"show not independent\"), always state BOTH values before concluding.\n\nThe common pitfall: concluding \"not independent\" without showing the numerical inequality — you need both sides of the equality written out.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "If two events F and H are mutually exclusive, and also F and G are independent, how do you find P(F ∪ H)? (Q3ii a)", "answer": "- Step 1: Mutually exclusive means P(F ∩ H) = 0 — they cannot occur together.\n- Step 2: Use the addition formula: P(F ∪ H) = P(F) + P(H) - P(F ∩ H).\n- Step 3: Since P(F ∩ H) = 0, simply add: P(F) + P(H) = 2/7 + 1/4 = 8/28 + 7/28 = 15/28.\n- Step 4: Write the answer as a fraction in simplest form.\n\nThis is straightforward — the independence information about F and G is irrelevant to this particular part.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "Given P(F) = 2/7, P(F ∪ G) = 5/8, and that F and G are independent, how do you solve for P(G)? (Q3ii b)", "answer": "- Step 1: Write the union formula: P(F ∪ G) = P(F) + P(G) - P(F ∩ G).\n- Step 2: Use independence: P(F ∩ G) = P(F) × P(G) = (2/7) × P(G).\n- Step 3: Substitute: 5/8 = 2/7 + P(G) - (2/7)P(G).\n- Step 4: Rearrange: 5/8 = 2/7 + (5/7)P(G).\n- Step 5: Solve: (5/7)P(G) = 5/8 - 2/7 = (35 - 16)/56 = 19/56.\n- Step 6: P(G) = (19/56) × (7/5) = 19/40 = 0.475.\n\nThe key is substituting P(F ∩ G) = P(F)P(G) before rearranging — this creates a factorable equation.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "For a discrete RV X with known distribution, how do you compute E(1/X)? What is the formula? (Q4a)", "answer": "- Step 1: Use the law of the unconscious statistician: E(g(X)) = Σ g(x) × P(X = x).\n- Step 2: For g(X) = 1/X, compute g(x) for each x-value: 1/1, 1/2, 1/3, 1/4.\n- Step 3: Multiply each by its probability and sum: (1 × 1/10) + (1/2 × 1/5) + (1/3 × 3/10) + (1/4 × 2/5).\n- Step 4: Simplify: 1/10 + 1/10 + 1/10 + 1/10 = 4/10 = 2/5.\n\nThe result is exactly 2/5, confirming the \"show that\" part.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Given E(1/X) = 2/5, how do you find Var(1/X)? What are the two steps? (Q4b)", "answer": "- Step 1: Compute E((1/X)²). For each x, square the transform: 1/1² = 1, 1/2² = 1/4, 1/3² = 1/9, 1/4² = 1/16.\n- Step 2: Multiply by probabilities and sum: 1 × (1/10) + (1/4) × (1/5) + (1/9) × (3/10) + (1/16) × (2/5) = 12/120 + 6/120 + 4/120 + 3/120 = 25/120 = 5/24.\n- Step 3: Apply the variance formula: Var = E(X²) - [E(X)]² = 5/24 - (2/5)².\n- Step 4: Compute (2/5)² = 4/25. Find common denominator 600: 125/600 - 96/600 = 29/600.\n- Step 5: The answer is 29/600 ≈ 0.0483.\n\nThe trick: don't forget to square the expectation before subtracting — the formula is E(X²) minus [E(X)]², not E(X²) minus E(X).", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "If Y = 30/X and you know Var(1/X) = 29/600, how do you find Var(Y)? (Q4c)", "answer": "- Step 1: Y = 30 × (1/X), so Y is a linear scaling of 1/X: Y = a × g(X) where a = 30.\n- Step 2: Recall the scaling property: Var(a × g(X)) = a² × Var(g(X)).\n- Step 3: Compute a² = 30² = 900.\n- Step 4: Multiply: Var(Y) = 900 × (29/600) = (900/600) × 29 = (3/2) × 29 = 87/2 = 43.5.\n\nThe critical pitfall: many students write Var(30 × (1/X)) = 30 × Var(1/X), forgetting to square the constant. It's a², not a.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "In part (d) of Q4, how do you correctly compute P(X < 3 | Y < 20) where Y = 30/X? (Q4d)", "answer": "- Step 1: Do NOT treat X and Y as independent — Y is a deterministic function of X, so there's no joint distribution to work with.\n- Step 2: Translate the condition Y < 20 into a condition on X: 30/X < 20 ⇒ X > 30/20 = 1.5.\n- Step 3: Since X takes values 1, 2, 3, 4, the condition X > 1.5 means X ∈ {2, 3, 4}. So P(Y < 20) = P(X = 2 or 3 or 4) = 1/5 + 3/10 + 2/5 = 2/10 + 3/10 + 4/10 = 9/10.\n- Step 4: The event X < 3 means X ∈ {1, 2}. The intersection with {X > 1.5} is just X = 2.\n- Step 5: Compute P(X = 2) = 1/5 = 2/10.\n- Step 6: Apply conditional formula: P(X < 3 | Y < 20) = (2/10) / (9/10) = 2/9.\n\nThe key insight: translate first, then find the intersection. Never try to compute P(X < 3 AND Y < 20) by multiplying probabilities.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "In a Normal distribution question, what's the first thing you should do before looking up any table values? (Q5)", "answer": "- Step 1: Draw a sketch of the normal curve.\n- Step 2: Mark the mean μ and the boundary values from the question.\n- Step 3: Shade the relevant region (the area you're asked to find).\n- Step 4: Determine whether you need the left tail, right tail, or between two values.\n- Step 5: Only THEN standardise using Z = (X - μ)/σ and look up the appropriate Φ(z) values.\n\nThis prevents errors like confusing \"more than 180\" with \"less than 180\" — the sketch makes it obvious which tail you need.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "When solving part (e) of Q5 with two simultaneous percentile conditions on a Normal distribution, what's the most efficient method? (Q5e)", "answer": "- Step 1: Convert each percentile to a z-value using inverse normal: for P(Y < 152) = 0.05, z₁ = -1.6449; for P(Y > 180) = 0.40, first convert to P(Y < 180) = 0.60, so z₂ = 0.2533.\n- Step 2: Write two equations: (152 - μ)/σ = -1.6449 and (180 - μ)/σ = 0.2533.\n- Step 3: SUBTRACT the equations to eliminate μ: (180 - 152)/σ = 0.2533 - (-1.6449).\n- Step 4: Solve: 28/σ = 1.8982 ⇒ σ = 28/1.8982 = 14.75 ≈ 14.8.\n- Step 5: Back-substitute into either equation: μ = 180 - 0.2533 × 14.75 = 176.3 g.\n\nThe trick: always subtract first to solve for σ without dealing with μ. Keep z-values to 4 d.p. throughout.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "What does it mean when a question asks you to \"show that\" the intersection of two regression lines equals (x̄, ȳ)? How do you use this result? (Q6a)", "answer": "- Step 1: The two regression equations are y on x: y = a + bx, and x on y: x = c + dy.\n- Step 2: At the intersection point (x*, y*), both equations hold simultaneously: y* = a + bx* and x* = c + dy*.\n- Step 3: Substitute x* into the first: y* = a + b(c + dy*) = a + bc + bdy*.\n- Step 4: Rearrange: y*(1 - bd) = a + bc ⇒ y* = (a + bc)/(1 - bd).\n- Step 5: But regression theory tells us that b = S_xy/S_xx and d = S_xy/S_yy, so bd = r², and (a + bc)/(1 - r²) simplifies to ȳ. Similarly x* = x̄.\n- Step 6: In practice, just solve the two linear equations — the solution IS (x̄, ȳ). Use this to find Σx = n × x̄.\n\nThe practical takeaway: \"hence\" in Q6a(ii) means use the intersection coordinates from part (i) to compute x̄ = 25/12, then Σx = 12 × 25/12 = 25.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "Given both regression equations y = 1.4x + 1.5 and x = 1.2 + 0.2y, how do you find the PMCC without computing S_xx or S_yy? (Q6c)", "answer": "- Step 1: Recognise the shortcut identity: r² = b_yx × b_xy, where b_yx is the slope of y on x, and b_xy is the slope of x on y.\n- Step 2: Identify the slopes: b_yx = 1.4, b_xy = 0.2.\n- Step 3: Multiply: r² = 1.4 × 0.2 = 0.28.\n- Step 4: Take the square root. Both slopes are positive, so r is positive: r = √0.28 = 0.529.\n\nThis bypasses computing S_xx and S_yy entirely — you don't need Σx² or Σy² at all. The sign of r matches the sign of both regression slopes.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "In Q6(b), how do you compute S_xy from Σxy, n, x̄, and ȳ? What formula do you use? (Q6b)", "answer": "- Step 1: Use S_xy = Σxy - n × x̄ × ȳ (NOT the alternative form with divided sums, though they're equivalent).\n- Step 2: From part (a), x̄ = 25/12, ȳ = 53/12. Compute x̄ × ȳ = (25 × 53)/(12 × 12) = 1325/144.\n- Step 3: n × x̄ × ȳ = 12 × 1325/144 = 1325/12.\n- Step 4: S_xy = 6961/60 - 1325/12. Find common denominator 60: = 6961/60 - (1325 × 5)/60 = 6961/60 - 6625/60 = 336/60 = 28/5 = 5.6.\n\nThe key: keep fractions exact throughout — don't round x̄ and ȳ to decimals. Use the exact fractions from the intersection.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "What's the relationship between the slopes of the two regression lines and S_xy, S_xx, S_yy? (Q6)", "answer": "- Step 1: For y on x: b_yx = S_xy / S_xx.\n- Step 2: For x on y: b_xy = S_xy / S_yy.\n- Step 3: Therefore, S_xx = S_xy / b_yx and S_yy = S_xy / b_xy.\n- Step 4: In the verification of Q6: S_xx = 5.6 / 1.4 = 4, S_yy = 5.6 / 0.2 = 28.\n- Step 5: Check: r = S_xy / √(S_xx × S_yy) = 5.6 / √(4 × 28) = 5.6 / √112 = 5.6 / 10.583 ≈ 0.529. ✓\n\nThis relationship lets you verify your S_xy calculation or compute missing sums if needed.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "In box plot construction, what's the correct way to draw whiskers when there are outliers present? (Q2c)", "answer": "- Step 1: Identify the outliers (values outside Q1 - 1.5×IQR and Q3 + 1.5×IQR).\n- Step 2: Plot each outlier as an individual cross (×) on the diagram.\n- Step 3: Draw the lower whisker from the left edge of the box (Q1) down to the most extreme NON-OUTLIER value — in the kangaroo data, this is 23, NOT 16.\n- Step 4: Draw the upper whisker from the right edge of the box (Q3) up to the most extreme non-outlier — in this case, 86, NOT 94.\n- Step 5: The box itself spans from Q1 = 45 to Q3 = 63, with a vertical line at the median = 57.\n\nThe common error: extending whiskers to the absolute minimum and maximum, ignoring the outlier rule. This loses the distinction between outliers and regular points.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "When translating a condition like \"the lightest 15% of fruit\" in a Normal distribution question, how do you find the correct z-value and its sign? (Q5d)", "answer": "- Step 1: The phrase \"lightest 15%\" means P(X < w) = 0.15, so we're looking at the left tail.\n- Step 2: From tables, Φ(z) = 0.15 gives z = -1.0364 (negative because it's below the mean).\n- Step 3: Use the inverse formula: w = μ + zσ = 210 + (-1.0364) × 25 = 210 - 25.91 = 184 g.\n- Step 4: Sketch first: the region is the left tail, below the mean, so z must be negative.\n\nThe pitfall: using a positive z-value because you forgot to check which tail you're in. Always sketch to determine the sign.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "In probability questions with Venn diagrams, what's the difference between \"mutually exclusive\" and \"independent\"? Can two non-trivial events be both? (Q3)", "answer": "- Step 1: Mutually exclusive: P(A ∩ B) = 0 (they cannot happen together).\n- Step 2: Independent: P(A ∩ B) = P(A) × P(B) (knowing about A doesn't change the probability of B).\n- Step 3: Two non-trivial events (both with probability > 0) CANNOT be both mutually exclusive AND independent. If they're mutually exclusive, P(A ∩ B) = 0, but P(A) × P(B) > 0, so they can't satisfy the independence condition.\n- Step 4: In Q3(ii), F and H are mutually exclusive (P(F ∩ H) = 0), while F and G are independent (P(F ∩ G) = P(F)P(G)). These are separate pairs of events.\n\nThe confusion between these concepts is one of the most common errors in probability questions.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In discrete random variable questions, what's the \"law of the unconscious statistician\" and when do you use it? (Q4)", "answer": "- Step 1: The law states: E(g(X)) = Σ g(x) × P(X = x) for any function g.\n- Step 2: You use it when you need the expectation of a transformation of X, not X itself. Examples: E(1/X), E(X²), E(ln X).\n- Step 3: You don't need to find the distribution of g(X) first — just apply g to each x-value, multiply by the probability, and sum.\n- Step 4: For variance, you need E(g(X)²) as well: Var(g(X)) = E(g(X)²) - [E(g(X)]².\n\nThis avoids having to derive the probability mass function of the transformed variable, which can be much more work.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "When a question gives you both regression equations and asks for the PMCC, what's the danger of trying to compute S_xx and S_yy from scratch? (Q6c)", "answer": "- Step 1: To compute S_xx = Σx² - (Σx)²/n, you need Σx².\n- Step 2: To compute S_yy = Σy² - (Σy)²/n, you need Σy².\n- Step 3: These are NOT given in the question — you'd spend minutes trying to extract them from the regression equations or realizing they're unavailable.\n- Step 4: The shortcut r² = b_yx × b_xy uses ONLY the slopes, which are given directly.\n- Step 5: The alternative long route would require computing S_xy first (from part b), then working backwards: S_xx = S_xy / b_yx, S_yy = S_xy / b_xy.\n\nThe exam insight: when both regression lines are given, always try the r² shortcut first — it's much faster.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "In Normal distribution problems involving simultaneous equations (two percentiles given), why should you avoid rounding z-values mid-calculation? (Q5e)", "answer": "- Step 1: If you round z₁ = -1.6449 to -1.64 and z₂ = 0.2533 to 0.25, the difference becomes 1.89 instead of 1.8982.\n- Step 2: This small error propagates: σ = 28/1.89 = 14.81 instead of 14.75 — already a 0.06 g error.\n- Step 3: When you back-substitute to find μ, the error compounds: μ = 180 - 0.25 × 14.81 = 176.30 instead of 176.26.\n- Step 4: With tight mark tolerances, these rounding errors can push you outside the acceptable range.\n- Step 5: Keep at least 4 decimal places throughout all intermediate steps; only round your final answers.\n\nThe trick: use the full z-values from the inverse normal table (4 d.p.) and only round at the very end.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "In stem-and-leaf questions, when finding quartiles for an odd number of data points in Edexcel S1, how do you handle non-integer positions? (Q2a)", "answer": "- Step 1: Calculate the position using (n+1)/4 for Q1, (n+1)/2 for median, 3(n+1)/4 for Q3.\n- Step 2: If the position is not an integer (e.g., 8.5), you must average the two values on either side.\n- Step 3: For n = 33: Q1 position = 8.5, so average the 8th and 9th values: (45 + 45)/2 = 45.\n- Step 4: For Q3 position = 25.5, average the 25th and 26th values: (63 + 63)/2 = 63.\n- Step 5: For the median at position 17 (integer), just take the 17th value directly: 57.\n\nThis differs from some textbooks that use n/4, n/2, 3n/4 — Edexcel specifically uses (n+1)/4.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "In probability tree diagrams with conditional probabilities, what two things must you check before submitting your answer? (Q1)", "answer": "- Step 1: Check that all branch probabilities at each node sum to 1. At the first split: 0.7 + 0.3 = 1. After a W: 0.6 + 0.4 = 1. After an L: 0.2 + 0.8 = 1.\n- Step 2: Check that the sum of all complete path probabilities equals 1. For Q1: 0.42 + 0.056 + 0.224 + 0.036 + 0.024 + 0.24 = 1.000.\n- Step 3: These checks catch missing branches, arithmetic errors, or incorrectly applied conditional probabilities.\n\nThese sanity checks take seconds but can save you from losing marks on an otherwise complete solution.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "In the discrete RV question Q4, if you were asked to find E(Y) where Y = 30/X, why can you just multiply E(1/X) by 30 rather than computing from scratch? (Q4c)", "answer": "- Step 1: Y = 30/X = 30 × (1/X) is a linear transformation of the form a × g(X).\n- Step 2: The linearity property: E(a × g(X)) = a × E(g(X)).\n- Step 3: Therefore E(Y) = 30 × E(1/X) = 30 × (2/5) = 60/5 = 12.\n- Step 4: This is much faster than computing g(x) for each x (30, 15, 10, 7.5), multiplying by probabilities, and summing.\n- Step 5: Similarly, Var(Y) = 30² × Var(1/X) = 900 × (29/600) = 43.5.\n\nThis property of linear transformations is essential for efficiency in transformed random variable questions.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "For two events with P(A) = 0.65, P(B) = 0.7, and P(A ∩ B) = 0.55, how do you find P(A ∪ B)? (Q3)", "answer": "- Step 1: Use the addition formula: P(A ∪ B) = P(A) + P(B) - P(A ∩ B).\n- Step 2: Substitute: P(A ∪ B) = 0.65 + 0.7 - 0.55 = 1.35 - 0.55 = 0.80.\n- Step 3: Alternatively, find the complement: P(A' ∩ B') = 1 - P(A ∪ B) = 0.20.\n- Step 4: In the Venn diagram context, this is the region outside both circles (z = 0.20).\n\nThis is the most fundamental probability formula — always write it out before substituting.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "What is the difference between P(C ∩ O') and P((C ∩ O)')? In Q3, how do you find each? (Q3)", "answer": "- Step 1: P(C ∩ O') means \"buys carrots AND NOT onions\" — this is the region y in the Venn diagram (C only), which equals 0.10.\n- Step 2: P((C ∩ O)') means \"NOT (buys carrots AND buys onions)\" — this is the complement of the intersection, i.e., everything EXCEPT the overlap.\n- Step 3: P((C ∩ O)') = 1 - P(C ∩ O) = 1 - 0.55 = 0.45.\n- Step 4: The key is the placement of the prime — it matters whether it applies to O or to the whole intersection.\n\nThese two are often confused. Read the notation carefully: ∩ O' vs (∩ O)'.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "In Q3ii(c), how do you find P(F ∩ G') given that F and G are independent? (Q3ii c)", "answer": "- Step 1: Use the formula P(F ∩ G') = P(F) - P(F ∩ G).\n- Step 2: We know P(F) = 2/7 and P(F ∩ G) = P(F) × P(G) = (2/7) × (19/40) = 38/280 = 19/140.\n- Step 3: Compute: P(F ∩ G') = 2/7 - 19/140 = 40/140 - 19/140 = 21/140 = 3/20.\n- Step 4: Alternative method using independence: P(F ∩ G') = P(F) × P(G') = (2/7) × (1 - 19/40) = (2/7) × (21/40) = 42/280 = 3/20. ✓\n\nBoth methods work — the first is often faster when you already have P(F ∩ G).", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "In regression analysis, what is the interpretation of the slope b in y = a + bx? (Q6)", "answer": "- Step 1: The slope b = S_xy / S_xx represents the expected change in y for a one-unit increase in x.\n- Step 2: In Q6, b_yx = 1.4 means for every 1-unit increase in x, y increases by 1.4 units on average.\n- Step 3: Similarly, b_xy = 0.2 means for every 1-unit increase in y, x increases by 0.2 units on average.\n- Step 4: These slopes are NOT reciprocals of each other (1.4 and 0.2 are not 1/1.4) — they depend on the relativevariability of x and y through S_xx and S_yy.\n\nThe slope tells you the direction and magnitude of the linear relationship, but not the strength — that's what r measures.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "In a Normal distribution question asking for a symmetric interval around the mean containing 95% of values, how do you find the distance k from the mean? (Q5c)", "answer": "- Step 1: For 95% symmetric about the mean, each tail contains (1 - 0.95)/2 = 0.025.\n- Step 2: This means P(Z < z) = 0.975 for the upper boundary.\n- Step 3: From inverse normal tables, z = 1.96 for 0.975.\n- Step 4: The distance from the mean: k = z × σ = 1.96 × 25 = 49.\n- Step 5: So P(210 - 49 < X < 210 + 49) = P(161 < X < 259) = 0.95.\n\nThe common values to memorise: 90% → z = 1.645, 95% → z = 1.96, 99% → z = 2.576.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "When constructing a box plot, what five key values must you plot? (Q2c)", "answer": "- Step 1: The lower whisker endpoint: smallest non-outlier value (23 kg).\n- Step 2: The left edge of the box: Q1 (45 kg).\n- Step 3: The median line inside the box: median (57 kg).\n- Step 4: The right edge of the box: Q3 (63 kg).\n- Step 5: The upper whisker endpoint: largest non-outlier value (86 kg).\n- Step 6: Plus any outliers as crosses: 16 kg and 94 kg.\n\nThese five points (plus outliers) define the box plot completely and must be drawn to scale on the axis provided.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "In Q5, what's the difference between finding P(X < 240) and P(X ≤ 240) for a continuous Normal distribution? (Q5a)", "answer": "- Step 1: For continuous distributions, P(X ≤ x) = P(X < x) — the probability of equality is zero.\n- Step 2: Therefore it doesn't matter whether you use < or ≤ — both give the same answer.\n- Step 3: For P(X < 240) = P(X ≤ 240) = Φ((240 - 210)/25) = Φ(1.20) = 0.8849.\n- Step 4: This is NOT true for discrete distributions — there, the distinction matters. But S1's Normal is continuous.\n\nThis is a key property of continuous random variables that eliminates ambiguity in inequality direction.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "In the regression context, what does it mean when r = 0? What about r = 1 or r = -1? (Q6)", "answer": "- Step 1: r = 0 means no linear correlation — the data points show no linear relationship (they might be curved).\n- Step 2: r = 1 means perfect positive linear correlation — all points lie exactly on a line with positive slope.\n- Step 3: r = -1 means perfect negative linear correlation — all points lie exactly on a line with negative slope.\n- Step 4: In Q6, r ≈ 0.529 indicates moderate positive correlation — as x increases, y tends to increase, but the relationship is not perfect.\n- Step 5: Note: r² = 0.28 means only 28% of the variation in y is explained by the linear relationship with x.\n\nThe PMCC r measures both the strength and direction of linear association.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "In a tree diagram with variable-length branches (like Q1 where the game can stop after 2 games), how do you ensure you've captured all possible paths? (Q1)", "answer": "- Step 1: Identify the stopping rule: stop after 2 games if WW or LL.\n- Step 2: List paths by length:\n  - Length 2 (stop): WW, LL\n  - Length 3: WLW, WLL, LWW, LWL\n- Step 3: Ensure no path contradicts the stopping rule — e.g., \"WLWW\" is impossible because after WL (one win, one loss, not stopped), the second game was a loss, so we have one win, one loss, then we stop — we don't play a third.\n- Step 4: Check: 2 + 4 = 6 total paths. Verify probabilities sum to 1.\n\nThe key is recognizing when the tree terminates early — don't keep branching after a stopping condition is met.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "In Q2, why does the stem-and-leaf diagram show \"totals\" column? How do you use it to find quartiles? (Q2a)", "answer": "- Step 1: The totals column gives the cumulative count of data points up to that stem.\n- Step 2: For n = 33, median position = (33+1)/2 = 17. Find where the cumulative total first reaches or exceeds 17.\n- Step 3: Cumulative totals: after stem 4: 1+2+3+7 = 13; after stem 5: 13+8 = 21. The 17th value falls in stem 5.\n- Step 4: Within stem 5, the leaves are 3, 4, 7, 7, 7, 8, 9, 9 (8 values). Position 17 - 13 = 4th within this stem: 57.\n- Step 5: The totals column is a quick way to locate which stem-and-leaf contains each percentile position without writing out all 33 numbers.\n\nThis cumulative counting method is faster than listing all values when finding median and quartiles.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}], "count": 39}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "S1 Oct 2023 Q1(e) — what's the trigger phrase that forces you to write down the conditional probability formula before substituting any numbers?", "answer": "The trigger is the word **\"given that\"** (or equivalently \"if … then what is the probability\"). The moment you see it, the very first thing you write — before touching any numbers — is\n\n$$P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}.$$\n\nThis forces you to identify two events explicitly: the conditioning event $$B$$ (which restricts the sample space) and the joint event $$A \\cap B$$ (the numerator). Writing the formula first prevents the most common error: dividing by $$P(B)$$ but using a numerator that contains paths *inconsistent* with $$B$$.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "In Q1(e), why is dividing $$P(\\text{exactly 2 wins}) = 0.512$$ by $$P(W_1) = 0.7$$ conceptually wrong? (3 steps)", "answer": "- Step 1: The numerator of $$P(A \\mid W_1)$$ must be $$P(A \\cap W_1)$$ — that is, paths where event $$A$$ happens AND the first game was won.\n- Step 2: $$P(\\text{exactly 2 wins}) = 0.512$$ is a *marginal* probability that includes the path $$LWW$$ (lose first, then win twice). This path contradicts $$W_1$$.\n- Step 3: Including $$LWW$$ in the numerator while conditioning on $$W_1$$ violates the formula — you must strip $$LWW$$ out, leaving only $$WW + WLW = 0.476$$ as the correct numerator.\n\n**Takeaway:** \"Given $$B$$\" doesn't just rescale the denominator — it also *restricts the numerator* to paths consistent with $$B$$.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "In a tree-diagram conditional probability question, what's the very first strategic move *before* doing any conditional arithmetic? (2 steps)", "answer": "- Step 1: List **every** branch of the tree with its path probability in a single table, and verify the probabilities sum to 1. This catches branching errors early.\n- Step 2: For each conditional probability part, pick which path probabilities go into the numerator (paths in $$A \\cap B$$) and which go into the denominator (paths in $$B$$). Compute by summing from the table — never re-derive.\n\n**Takeaway:** The table is the source of truth; conditional parts are just picking subsets of rows.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "S1 Oct 2023 Q1 — why does the turn sometimes have only 2 games instead of 3, and how does this change the tree?", "answer": "The rule states: if Sally wins the first 2 games (path $$WW$$) OR loses the first 2 games (path $$LL$$), she stops. So those two branches terminate at depth 2 with probabilities $$0.7 \\times 0.6 = 0.42$$ and $$0.3 \\times 0.8 = 0.24$$ respectively. The other four branches ($$WLW, WLL, LWW, LWL$$) continue to depth 3. Forgetting this stopping rule inflates the tree, double-counts paths, and the probabilities won't sum to 1.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": false}, {"question": "When computing $$P(WW \\mid \\text{exactly 2 wins})$$, why does the intersection $$WW \\cap \\{\\text{exactly 2 wins}\\}$$ simplify?", "answer": "Because $$WW \\subseteq \\{\\text{exactly 2 wins}\\}$$ — winning the first two games is itself a way of winning exactly 2 games (the turn stops at 2-0). So $$WW \\cap \\{\\text{exactly 2 wins}\\} = WW$$, meaning the numerator is just $$P(WW)$$. Whenever $$A \\subseteq B$$, the conditional formula collapses to $$P(A)/P(B)$$ — no need to compute an intersection separately.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": true}, {"question": "S1 Oct 2023 Q2(a) — for ungrouped/discrete data in Edexcel S1, what quartile-position formula do you use, and how does it differ from grouped data?", "answer": "For **discrete/ungrouped** data, use $$\\frac{n+1}{4}$$ for $$Q_1$$, $$\\frac{n+1}{2}$$ for the median, and $$\\frac{3(n+1)}{4}$$ for $$Q_3$$. If the position is non-integer, average the two flanking values. For **grouped** data (frequency tables, histograms), use $$\\frac{n}{4}$$ directly. Mixing these up costs accuracy marks — Edexcel specifically distinguishes them in S1.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": false}, {"question": "With $$n = 33$$ values, what are the positions of $$Q_1, \\text{median}, Q_3$$ and how do you handle non-integer positions? (3 steps)", "answer": "- Step 1: $$\\frac{n+1}{2} = 17$$ → median is the 17th value directly.\n- Step 2: $$\\frac{n+1}{4} = 8.5$$ → $$Q_1$$ is the average of the 8th and 9th values.\n- Step 3: $$\\frac{3(n+1)}{4} = 25.5$$ → $$Q_3$$ is the average of the 25th and 26th values.\n\n**Takeaway:** Non-integer positions are averaged; integer positions are read off directly.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": false}, {"question": "What is the outlier-fence definition used in Edexcel S1, and how do you check for outliers systematically?", "answer": "Outlier fences are $$Q_1 - 1.5 \\cdot \\text{IQR}$$ (lower) and $$Q_3 + 1.5 \\cdot \\text{IQR}$$ (upper). To check systematically: compute the IQR, then $$1.5 \\cdot \\text{IQR}$$, then add/subtract from $$Q_3$$ and $$Q_1$$ respectively. Only the extreme values of the dataset need checking — if the smallest value is above the lower fence and the largest is below the upper fence, there are no outliers. Always state the fence values numerically before declaring an outlier.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "S1 Oct 2023 Q2(c) — when drawing the box plot, where do the whiskers stop, and where do outliers go?", "answer": "Whiskers extend to the most extreme **non-outlier** values in the dataset — NOT to the actual minimum/maximum. So if 16 is a lower outlier and 23 is the next-smallest value, the lower whisker stops at 23. Outliers are plotted as crosses (×) beyond the whiskers. Extending the whisker to the outlier itself is a classic error that loses an accuracy mark.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "S1 Oct 2023 Q2(d) — what is the rigid template for comparing two distributions in Edexcel S1, and what should you *not* add? (3 steps)", "answer": "- Step 1: One sentence comparing **medians** (location): \"The median of A is greater/less than the median of B.\" Include numerical values and units.\n- Step 2: One sentence comparing **IQRs** (spread): \"The IQR of A is greater/less than the IQR of B.\" Include numbers.\n- Step 3: Each comparison gets an interpretation in **context** (variable name + meaning): e.g. \"so kangaroos are heavier in December\", or \"weights are more consistent in December\".\n\n**Do NOT add** comments on skew, outliers, range, or symmetry unless explicitly asked — extra wrong claims can cancel correct ones.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Why does \"smaller IQR\" translate to \"more consistent\" in a distribution-comparison context sentence?", "answer": "The IQR measures the spread of the middle 50% of the data. A smaller IQR means values cluster more tightly around the median, so the data are **less variable / more consistent**. This phrasing — \"more consistent\" or \"less variable\" — is what Edexcel rewards as a context interpretation. Just stating \"smaller IQR\" without interpretation misses the context mark.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "S1 Oct 2023 Q3(i)(a) — what's the strategic order for filling in a Venn diagram with four regions when given $$P(C), P(O')$$ and $$P(O \\cap C')$$? (4 steps)", "answer": "- Step 1: Re-read the printed diagram to identify which region is which: $$w$$ = $$O$$-only, $$x$$ = intersection, $$y$$ = $$C$$-only, $$z$$ = outside both. Don't assume the order.\n- Step 2: Place the directly-given value first: $$w = P(O \\cap C') = 0.15$$.\n- Step 3: Use the complement: $$P(O) = 1 - 0.3 = 0.7$$. Then $$x = P(O) - w = 0.55$$. Then $$y = P(C) - x = 0.10$$.\n- Step 4: Use the total: $$z = 1 - (w + x + y) = 0.20$$.\n\n**Takeaway:** Anchor on the given intersection-style value first, then peel off the rest using complements and totals.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": false}, {"question": "How do you test whether two events $$C$$ and $$O$$ are statistically independent, and what must you write to earn full marks? (3 steps)", "answer": "- Step 1: Compute $$P(C \\cap O)$$ from the Venn diagram (here $$= 0.55$$).\n- Step 2: Compute $$P(C) \\cdot P(O)$$ (here $$0.65 \\times 0.7 = 0.455$$).\n- Step 3: State the numerical inequality $$0.55 \\neq 0.455$$ explicitly, then conclude: \"therefore $$C$$ and $$O$$ are not independent.\"\n\n**Takeaway:** \"Not independent\" needs *both* numbers written down, not just a conclusion — Edexcel awards the comparison mark for showing the inequality numerically.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "What's the conceptual difference between mutually exclusive and independent events, and can two non-trivial events be both?", "answer": "**Mutually exclusive** means $$P(A \\cap B) = 0$$ — they cannot happen together. **Independent** means $$P(A \\cap B) = P(A) \\cdot P(B)$$ — knowing one doesn't change the probability of the other. Two non-trivial events (where $$P(A), P(B) > 0$$) cannot be both: if they're mutually exclusive then $$P(A \\cap B) = 0$$, but $$P(A)P(B) > 0$$, so the independence equation fails. Mutually exclusive events with positive probability are *always dependent*.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "S1 Oct 2023 Q3(ii)(b) — when finding $$P(G)$$ from $$P(F \\cup G)$$ given $$F, G$$ independent, what's the substitution trick? (3 steps)", "answer": "- Step 1: Write the union formula: $$P(F \\cup G) = P(F) + P(G) - P(F \\cap G)$$.\n- Step 2: **Use independence to substitute**: $$P(F \\cap G) = P(F) \\cdot P(G)$$. Now the equation has only one unknown.\n- Step 3: Factor $$P(G)$$ out: $$P(F \\cup G) = P(F) + P(G)[1 - P(F)]$$, then solve linearly.\n\n**Takeaway:** Independence is the bridge that turns a 2-unknown equation into a 1-unknown linear equation.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "Given $$F$$ and $$G$$ independent, what's the quickest formula for $$P(F \\cap G')$$?", "answer": "Use $$P(F \\cap G') = P(F) \\cdot P(G')$$, since independence of $$F, G$$ implies independence of $$F, G'$$ (independence transfers to complements). Equivalently, $$P(F \\cap G') = P(F) - P(F \\cap G)$$. Both work; the first is faster if you already have $$P(G')$$.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "S1 Oct 2023 Q4(a) — when asked to show $$E(1/X) = 2/5$$, what's the formula and the structural shortcut to spot?", "answer": "Use $$E(g(X)) = \\sum g(x) P(X=x)$$ with $$g(x) = 1/x$$. The shortcut here: writing the terms $$\\frac{1}{1}\\cdot\\frac{1}{10}, \\frac{1}{2}\\cdot\\frac{2}{10}, \\frac{1}{3}\\cdot\\frac{3}{10}, \\frac{1}{4}\\cdot\\frac{4}{10}$$ shows each term simplifies to $$\\frac{1}{10}$$ — because $$P(X=x) = \\frac{x}{10}$$ exactly cancels the $$\\frac{1}{x}$$. Four terms of $$\\frac{1}{10}$$ gives $$\\frac{4}{10} = \\frac{2}{5}$$. Spotting this saves arithmetic.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "What's the formula for $$\\text{Var}(g(X))$$ for a discrete RV, and what's the most common arithmetic pitfall? (3 steps)", "answer": "- Step 1: Compute $$E(g(X)^2) = \\sum [g(x)]^2 P(X = x)$$.\n- Step 2: Compute $$\\text{Var}(g(X)) = E(g(X)^2) - [E(g(X))]^2$$.\n- Step 3: The pitfall is mixing common denominators carelessly. Best practice: find the LCM of all denominators **once** at the start (e.g. 120 for $$E(1/X^2)$$, then 600 for the final variance), and keep fractions throughout — convert to decimals only at the very end.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": false}, {"question": "If $$Y = aX$$ (or $$Y = aX + b$$), what are $$E(Y)$$ and $$\\text{Var}(Y)$$, and why does the constant disappear from the variance?", "answer": "$$E(aX + b) = aE(X) + b$$ and $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$. The constant $$b$$ disappears from variance because adding a constant **shifts** the whole distribution without changing its spread. The scaling $$a$$ is **squared** because variance is a squared-deviation measure: stretching by factor $$a$$ stretches deviations by $$a$$, and squaring gives $$a^2$$. Forgetting the square on $$a$$ is the canonical error.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "S1 Oct 2023 Q4(d) — when computing $$P(X < 3 \\mid Y < 20)$$ where $$Y = 30/X$$, what's the critical first translation move? (3 steps)", "answer": "- Step 1: Recognise $$Y$$ is a *deterministic function* of $$X$$ — they are perfectly dependent, not independent. Do NOT compute a 2D joint distribution.\n- Step 2: Translate the event $$\\{Y < 20\\}$$ into a condition on $$X$$ directly: $$\\frac{30}{X} < 20 \\iff X > 1.5$$ (since $$X > 0$$, the inequality preserves direction). So $$\\{Y < 20\\} = \\{X \\in \\{2, 3, 4\\}\\}$$.\n- Step 3: Now both events are sets of $$x$$-values. Find their intersection, then apply the conditional probability formula in the $$X$$-world only.\n\n**Takeaway:** Always rewrite $$\\{g(X) < c\\}$$ as a set of $$x$$-values before doing conditional probability.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "When translating $$\\frac{30}{X} < 20$$ into a condition on $$X$$, why must you check the sign of $$X$$ before flipping the inequality?", "answer": "Dividing or multiplying an inequality by a variable only preserves the direction if that variable is **positive**. For $$\\frac{30}{X} < 20$$: if $$X > 0$$, multiplying both sides by $$X$$ gives $$30 < 20X$$, i.e. $$X > 1.5$$. If $$X$$ could be negative, the inequality flips. In this discrete RV, $$X \\in \\{1,2,3,4\\}$$ — all positive — so the translation is safe. Always state this check.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "S1 Oct 2023 Q5(a) — for $$X \\sim N(210, 25^2)$$, what's the standardisation and the table lookup for $$P(X < 240)$$?", "answer": "Standardise: $$Z = \\frac{X - \\mu}{\\sigma} = \\frac{240 - 210}{25} = 1.20$$. Then look up $$\\Phi(1.20) = 0.8849$$ from the standard normal table. Always quote $$\\Phi$$-values to 4 d.p. exactly as the table prints them — truncating to 3 d.p. mid-calculation loses precision in later parts.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "For a symmetric interval $$P(\\mu - k < X < \\mu + k) = 0.95$$ around the mean, what's the strategy to find $$k$$? (3 steps)", "answer": "- Step 1: Symmetry → each tail has probability $$(1 - 0.95)/2 = 0.025$$.\n- Step 2: So $$P(Z < k/\\sigma) = 0.975$$, and from inverse normal $$z = 1.96$$.\n- Step 3: $$k = z \\cdot \\sigma$$. Here $$k = 1.96 \\times 25 = 49$$.\n\n**Takeaway:** \"Symmetric around the mean\" instantly converts the question to a single-tail inverse-normal lookup.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "S1 Oct 2023 Q5(d) — when finding the \"maximum weight of a small fruit\" given the lightest 15%, why is the $$z$$-value negative?", "answer": "\"Lightest 15%\" means the **left tail**: $$P(X < w) = 0.15$$. Since $$0.15 < 0.5$$, the cutoff is **below the mean**, so the standardised $$z$$ is negative. From tables, $$\\Phi(1.0364) = 0.85$$, so the matching left-tail $$z = -1.0364$$. Then $$w = \\mu + z\\sigma = 210 + 25(-1.0364) \\approx 184$$ g. Forgetting the negative sign places the cutoff above the mean — a sign error costs the whole part.\n\n**Takeaway:** Sketch the bell curve and shade — the picture tells you the sign of $$z$$.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "S1 Oct 2023 Q5(e) — when given two percentiles of a normal distribution to find $$\\mu$$ and $$\\sigma$$, what's the strategic move to avoid messy algebra? (4 steps)", "answer": "- Step 1: Convert \"5% weigh less than 152\" into a $$z$$-equation: $$\\frac{152 - \\mu}{\\sigma} = z_1$$ where $$z_1 = \\Phi^{-1}(0.05) = -1.6449$$.\n- Step 2: Convert \"40% weigh more than 180\" — but first flip it to a left-tail statement: $$P(Y < 180) = 0.60$$. So $$\\frac{180 - \\mu}{\\sigma} = z_2 = 0.2533$$.\n- Step 3: **Subtract equation (1) from equation (2) to eliminate $$\\mu$$ first.** This gives $$\\frac{180 - 152}{\\sigma} = z_2 - z_1$$, a single equation in $$\\sigma$$.\n- Step 4: Solve for $$\\sigma$$, then back-substitute into either original equation for $$\\mu$$.\n\n**Takeaway:** Always eliminate one unknown first — never try to solve both simultaneously by substitution.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "In Q5(e), why is it crucial to convert \"$$P(Y > 180) = 0.40$$\" into \"$$P(Y < 180) = 0.60$$\" before reading the inverse-normal table?", "answer": "Standard normal tables (and most calculator inverse-normal functions) return $$z$$ for **left-tail** probabilities $$P(Z < z) = p$$. If you mistakenly look up $$0.40$$ instead of $$0.60$$, you get $$z = -0.2533$$ instead of $$+0.2533$$ — wrong sign, wrong $$\\mu$$ and $$\\sigma$$. Always convert right-tail to left-tail first by subtracting from 1.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Why must you carry inverse-normal $$z$$-values to 4 decimal places (e.g. $$z = -1.6449$$) and not round to 2 d.p. mid-calculation?", "answer": "In the simultaneous equation $$\\sigma = \\frac{x_2 - x_1}{z_2 - z_1}$$, the denominator is a *difference* of two $$z$$-values. Rounding $$z$$ to 2 d.p. (e.g. $$-1.64$$ and $$0.25$$) inflates the relative error in the difference, propagating into $$\\sigma$$, and then through back-substitution into $$\\mu$$. Final answers can drift by 1–2 in the integer part of $$\\mu$$. Keep 4 d.p. throughout; round only at the final reporting step.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "S1 Oct 2023 Q6(a) — what's the key structural fact that lets you immediately deduce $$\\bar{x}$$ and $$\\bar{y}$$ from the two regression equations?", "answer": "**The intersection of the two regression lines ($$y$$ on $$x$$ and $$x$$ on $$y$$) is exactly $$(\\bar{x}, \\bar{y})$$.** This is because both regression lines pass through the centroid $$(\\bar{x}, \\bar{y})$$ of the data. So solving the 2×2 linear system gives the means directly — then $$\\sum x = n\\bar{x}$$ and $$\\sum y = n\\bar{y}$$. Without this fact, you cannot extract $$\\bar{x}$$ from the equations.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": false}, {"question": "What does \"hence\" mean in an Edexcel exam instruction, and what does it cost you if you ignore it?", "answer": "\"Hence\" means **use the result from the previous part directly**. In Q6(a)(ii) — \"Hence show $$\\sum x = 25$$\" — you must reference the intersection $$(\\bar{x}, \\bar{y}) = (25/12, 53/12)$$ from part (i) and apply $$\\sum x = n\\bar{x} = 12 \\cdot \\frac{25}{12} = 25$$. If you ignore \"hence\" and try to derive $$\\sum x$$ from scratch, you'll get stuck (no $$\\sum x^2$$ given) and lose method marks even if you somehow get the answer.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "S1 Oct 2023 Q6(b) — what's the most efficient formula for $$S_{xy}$$ when you already have $$\\bar{x}, \\bar{y}$$, and why prefer it over the alternative?", "answer": "Use $$S_{xy} = \\sum xy - n\\bar{x}\\bar{y}$$. Why? Because in this question you've just computed $$\\bar{x}$$ and $$\\bar{y}$$ from the regression-line intersection in part (a), so they're already in hand. The alternative form $$S_{xy} = \\sum xy - \\frac{\\sum x \\sum y}{n}$$ is algebraically equivalent but requires you to multiply $$\\sum x$$ and $$\\sum y$$ — an extra step. Keep $$\\bar{x}\\bar{y}$$ as a single fraction (e.g. $$\\frac{1325}{144}$$) to avoid rounding.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "S1 Oct 2023 Q6(c) — what's the PMCC shortcut when both regression lines are given, and why does it work? (3 steps)", "answer": "- Step 1: Identify both slopes: $$b_{yx}$$ (slope of $$y$$ on $$x$$, here 1.4) and $$b_{xy}$$ (slope of $$x$$ on $$y$$, here 0.2).\n- Step 2: Apply $$r^2 = b_{yx} \\cdot b_{xy}$$. So $$r^2 = 1.4 \\times 0.2 = 0.28$$, giving $$r = \\sqrt{0.28} \\approx 0.529$$.\n- Step 3: The sign of $$r$$ matches the common sign of the two slopes (both positive → $$r > 0$$).\n\n**Why it works:** $$b_{yx} = S_{xy}/S_{xx}$$ and $$b_{xy} = S_{xy}/S_{yy}$$, so their product is $$S_{xy}^2/(S_{xx} S_{yy}) = r^2$$.\n\n**Takeaway:** Spot this identity to skip computing $$S_{xx}$$ and $$S_{yy}$$ — saves five minutes.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": false}, {"question": "Why does trying to compute $$r$$ from scratch (via $$S_{xx}, S_{yy}, S_{xy}$$) fail in Q6(c) of this paper?", "answer": "Computing $$S_{xx} = \\sum x^2 - n\\bar{x}^2$$ requires $$\\sum x^2$$, and $$S_{yy}$$ requires $$\\sum y^2$$ — **neither is given** in the question. Only $$\\sum xy$$ is given. Without the shortcut $$r^2 = b_{yx} \\cdot b_{xy}$$, you'd be stuck. The question is *designed* to force you into the identity. Always scan for which sums are given — if $$\\sum x^2, \\sum y^2$$ are missing but both regression lines are present, that's the identity-trigger.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": false}, {"question": "How can you sanity-check the PMCC shortcut result using the \"long route\" with $$S_{xy}$$?", "answer": "From $$b_{yx} = S_{xy}/S_{xx} = 1.4$$ and $$S_{xy} = 5.6$$, deduce $$S_{xx} = 5.6/1.4 = 4$$. Similarly $$S_{yy} = S_{xy}/b_{xy} = 5.6/0.2 = 28$$. Then $$r = S_{xy}/\\sqrt{S_{xx} S_{yy}} = 5.6/\\sqrt{112} \\approx 0.529$$. This matches the shortcut, confirming both methods. The cross-check is worth one extra line at the end of (c) if you have time.", "source": "Op
