(5\\times10^{-7})(1.6\\times10^{-19})} \\approx 10^{-4}$$ m/s \u2014 about 0.1 mm/s. Electrons drift slower than a snail. The large current comes from the *enormous number* of carriers, not from fast individual movement.\n\nCurrent is a crowd effect: billions of billions of slow-moving electrons, not a few fast ones.", "source": "GLM 5.1"}, {"q": "In a metal wire, heating increases resistance (positive temperature coefficient). In an NTC thermistor, heating *decreases* resistance (negative temperature coefficient). Using $$I = nAvq$$, explain the microscopic reason for both behaviors. (3 steps)", "a": "- Step 1: **In a metal**: the number density $$n$$ is essentially fixed (all conduction electrons are already free). When temperature rises, the lattice ions vibrate more vigorously, scattering electrons more often. This reduces the drift velocity $$v$$ (electrons can't push forward as efficiently). With $$n$$ constant and $$v$$ decreasing, $$I = nAvq$$ decreases for the same applied voltage \u2192 $$R = V/I$$ increases. This is a positive temperature coefficient.\n- Step 2: **In an NTC thermistor (semiconductor)**: heating does something far more dramatic \u2014 it *liberates more charge carriers*. In a semiconductor at low temperature, most electrons are bound; as temperature rises, thermal energy frees more electrons (and holes), so $$n$$ increases rapidly. Yes, $$v$$ also decreases slightly due to more lattice vibration, but the *increase in $$n$$* dominates.\n- Step 3: In $$I = nAvq$$, the large rise in $$n$$ beats the small drop in $$v$$, so the product $$nv$$ increases overall \u2192 $$I$$ rises for the same voltage \u2192 $$R = V/I$$ *decreases*. This is the negative temperature coefficient. The thermistor's resistance falls because it gains far more carriers than it loses in drift speed.\n\nMetal: $$n$$ fixed, $$v$$ drops \u2192 $$R$$ rises. Semiconductor/NTC: $$n$$ surges, overwhelms $$v$$ drop \u2192 $$R$$ falls. The key variable is *which factor dominates*.", "source": "GLM 5.1"}, {"q": "e.m.f. ($$\\varepsilon$$) is defined as \"the energy converted from other forms into electrical energy per unit charge passing through the source.\" Why must you say \"per unit charge\" (or \"per coulomb\") and NOT \"per charge particle\"? What numerical disaster does \"per particle\" cause? (2 steps)", "a": "- Step 1: \"Per unit charge\" means per coulomb. One coulomb is the charge of approximately $$6.24 \\times 10^{18}$$ electrons. \"Per charge particle\" would mean per single electron, whose charge is only $$e = 1.60 \\times 10^{-19}$$ C \u2014 a factor of ~10\u00b9\u2078 smaller than a coulomb.\n- Step 2: If e.m.f. were \"energy per particle,\" a 12 V battery would be delivering only $$12 \\times 1.6 \\times 10^{-19} = 1.92 \\times 10^{-18}$$ J per electron, and the \"e.m.f. value\" in volts (J/C) would be wrong by a factor of $$6.24 \\times 10^{18}$$ \u2014 you'd be off by ~10\u00b9\u2079. The definition is anchored to the *coulomb* because voltage = J/C. \"Per unit charge\" = \"per coulomb\" is the only wording consistent with the unit volt.\n\n\"Per unit charge\" is the exam-safe wording. \"Per particle\" is catastrophically wrong \u2014 a coulomb is 10\u00b9\u2078 times more charge than one electron.", "source": "GLM 5.1"}, {"q": "A real cell is modelled as a perfect e.m.f. $$\\varepsilon$$ in series with a small internal resistance $$r$$. Write the three equivalent forms of the e.m.f. equation, and explain physically why the terminal p.d. $$V$$ is always less than $$\\varepsilon$$ when current flows. (2 steps)", "a": "- Step 1: The three forms:\n+ $$\\varepsilon = V + Ir$$ \u2014 e.m.f. = terminal p.d. + \"lost volts\" across internal resistance.\n+ $$\\varepsilon = I(R + r)$$ \u2014 e.m.f. drives current through *both* the external load $$R$$ and the internal resistance $$r$$.\n+ $$V = \\varepsilon - Ir$$ \u2014 terminal p.d. = e.m.f. minus the voltage dropped inside the cell.\n- Step 2: Why $$V < \\varepsilon$$ when current flows: some of the e.m.f. is \"consumed\" inside the cell itself. The internal resistance $$r$$ drops a voltage $$Ir$$ (the \"lost volts\"), so only the remainder $$\\varepsilon - Ir$$ appears at the terminals. When no current flows ($$I = 0$$), $$Ir = 0$$ and $$V = \\varepsilon$$ \u2014 the voltmeter reads the full e.m.f. But under load, current costs you voltage inside the cell.\n\nThe cell \"steals\" some of its own voltage to push current through its own internal resistance. More current = more stolen voltage = lower terminal p.d.", "source": "GLM 5.1"}, {"q": "To determine internal resistance graphically, you plot terminal p.d. $$V$$ (y-axis) against current $$I$$ (x-axis) for several different loads. Rearrange $$V = \\varepsilon - Ir$$ into the form $$y = c + mx$$, and state what the y-intercept and gradient give you. Why must you keep the minus sign explicit? (2 steps)", "a": "- Step 1: $$V = \\varepsilon - Ir$$ is already in the form $$y = c + mx$$ with $$y = V$$, $$x = I$$, constant term $$c = \\varepsilon$$, and gradient $$m = -r$$. So:\n+ **y-intercept** = $$\\varepsilon$$ (the e.m.f. \u2014 what $$V$$ reads when $$I = 0$$, i.e., no load).\n+ **gradient** = $$-r$$, so **internal resistance $$r = -\\text{gradient}$$**.\n- Step 2: The line slopes *downward* (negative gradient) because increasing current means more lost volts, so terminal p.d. drops. The gradient $$\\frac{\\Delta V}{\\Delta I}$$ is a negative number. If you write \"$$r = \\text{gradient}$$\" without the minus sign, you'd get a negative resistance \u2014 physically impossible. Writing $$r = -\\text{gradient}$$ ensures $$r$$ comes out positive, since the negative of a negative is positive.\n\nThe line goes downhill: intercept = e.m.f., steepness = internal resistance (flip the sign).", "source": "GLM 5.1"}, {"q": "On an $$I$$\u2013$$V$$ characteristic graph for an ideal diode, the current is zero for all reverse-bias voltages and for small forward-bias voltages (points X and Y on the flat portion), then rises steeply once conducting (point Z). When is the resistance *infinite*, and what is the common misconception about where \"infinite resistance\" occurs? (2 steps)", "a": "- Step 1: Using $$R = \\frac{V}{I}$$: resistance becomes infinite when the denominator $$I \\to 0$$, regardless of what $$V$$ is. At points X and Y, the diode sits on the $$I = 0$$ axis \u2014 current is zero, so $$R = \\frac{V}{0} \\to \\infty$$. At point Z, $$I \\neq 0$$, so $$R$$ is small and finite. Answer: X and Y (option A).\n- Step 2: The common misconception is looking for $$V = 0$$ (the origin) as the place of \"infinite resistance.\" Students think \"no voltage = no flow = infinite resistance.\" But at the origin, both $$V$$ and $$I$$ are zero, and $$R = \\frac{0}{0}$$ is *indeterminate*, not infinite. The correct discriminator is always the **current axis**: wherever $$I = 0$$ (regardless of $$V$$), $$R \\to \\infty$$.\n\nInfinite resistance = zero current, not zero voltage. Look at the horizontal $$I = 0$$ line, not the origin.", "source": "GLM 5.1"}, {"q": "In an MCQ that asks \"which *expression* gives the drift velocity?\" (like Q5 with $$I = nAvq$$), what is the fastest strategy to eliminate wrong options without plugging in numbers? (2 steps)", "a": "- Step 1: Rearrange the defining equation to make the target quantity the subject first: $$v = \\frac{I}{nAq}$$ (or $$v = \\frac{I}{nAe}$$ for electrons). Now you know the *structure* of the correct answer: $$I$$ alone on top; $$n$$, $$A$$, and $$e$$ all multiplied together on the bottom.\n- Step 2: Scan the options for structural mismatches:\n+ Any option with $$A$$ in the numerator \u2192 eliminate (area should be in the denominator).\n+ Any option missing $$e$$ (or $$q$$) \u2192 eliminate (charge per carrier must appear).\n+ Any option with $$n$$ on top \u2192 eliminate (number density should be in the denominator).\n+ The surviving option has $$I$$ on top and $$nAe$$ on the bottom \u2014 match confirmed.\n\nDon't compute four expressions \u2014 rearrange once, then match the structure. Wrong formulas have symbols in the wrong place; spot them by position, not by arithmetic.", "source": "GLM 5.1"}, {"q": "In a circuit with an NTC thermistor and a fixed resistor in series, when the thermistor heats up, the current *always* increases. But whether the voltmeter reading increases or decreases depends on *which component the voltmeter spans*. Explain why, using the chain-reasoning method. (3 steps)", "a": "- Step 1: The chain: thermistor heats \u2192 $$R_T$$ decreases \u2192 total resistance $$R_{total} = R_T + R_F$$ decreases \u2192 current $$I = \\frac{\\varepsilon}{R_{total}}$$ increases (ammeter always goes up, regardless of voltmeter position).\n- Step 2: **Voltmeter across the thermistor** ($$V_T = IR_T$$): $$I$$ increases but $$R_T$$ decreases. Which effect wins? $$R_T$$ falls *faster* than $$I$$ rises (because $$R_T$$ is in both the numerator and the denominator of the current expression \u2014 as $$R_T$$ shrinks, the voltage share shifts *off* the thermistor onto the fixed resistor). So $$V_T = IR_T$$ *decreases*. Answer: voltmeter down, ammeter up.\n- Step 3: **Voltmeter across the fixed resistor** ($$V_F = IR_F$$): $$I$$ increases and $$R_F$$ is *constant*. No competition \u2014 both factors push $$V_F$$ up. So $$V_F$$ *increases*. Answer: voltmeter up, ammeter up. The ammeter behaves the same way in both cases; only the voltmeter's verdict flips depending on what it's measuring.\n\nSame circuit, opposite voltmeter verdict. Always check: is the voltmeter across the *changing* component or the *fixed* one?", "source": "GLM 5.1"}, {"q": "In the lightning-strike question, you calculate resistivity of the air channel as ~0.2 \u03a9 m, but the accepted resistivity of (cold) air is ~10\u00b9\u2076 \u03a9 m \u2014 a factor of ~10\u00b9\u2077 smaller. What physically explains this colossal drop, and how does $$I = nAvq$$ provide the intuition? (2 steps)", "a": "- Step 1: During a lightning strike, the intense electric field *ionises* the air in the channel. Neutral air molecules are ripped apart into free electrons and positive ions \u2014 a plasma. This dramatically increases the number density of charge carriers $$n$$ from nearly zero (in insulating cold air) to a very large value (in the ionised plasma channel).\n- Step 2: In $$I = nAvq$$, a massive increase in $$n$$ means far more charge carriers are available to carry current, so for the same geometry and drift velocity, the current capacity is enormously larger. Equivalently, from $$\\rho = \\frac{RA}{L}$$ with $$R = \\frac{V}{I}$$: much larger $$I$$ for the same $$V$$ \u2192 much smaller $$R$$ \u2192 much smaller $$\\rho$$. The air transforms from an insulator (few carriers, huge $$\\rho$$) to a conductor (many carriers, tiny $$\\rho$$) during ionisation.\n\nIonisation floods the air with free carriers. Insulator \u2192 plasma: $$n$$ surges \u2192 $$\\rho$$ collapses by ~10\u00b9\u2077.", "source": "GLM 5.1"}, {"q": "In the lightning question, you need resistivity $$\\rho = \\frac{RA}{L}$$, but the Edexcel Data Booklet lists $$R = \\frac{\\rho L}{A}$$. Alex advised: always start from the Data Booklet form and rearrange, rather than memorising $$\\rho = \\frac{RA}{L}$$ separately. Why is this safer? (2 steps)", "a": "- Step 1: The Data Booklet gives $$R = \\frac{\\rho L}{A}$$ \u2014 this is the form you can *always* trust in the exam. If you try to recall $$\\rho = \\frac{RA}{L}$$ from memory, you risk an *inversion error* (swapping numerator and denominator), especially under exam pressure. Starting from the booklet form and rearranging step-by-step eliminates this risk.\n- Step 2: To get $$\\rho$$: from $$R = \\frac{\\rho L}{A}$$, multiply both sides by $$A$$: $$RA = \\rho L$$. Then divide by $$L$$: $$\\rho = \\frac{RA}{L}$$. Each algebraic step is transparent and verifiable. If you'd memorised it wrong as $$\\rho = \\frac{RL}{A}$$, you'd never catch the error; but if you *derive* it from the booklet form on paper, the correct arrangement is guaranteed.\n\nAnchor on the Data Booklet form. Rearrange on paper, not from memory \u2014 one wrong flip and your answer is inverted.", "source": "GLM 5.1"}, {"q": "In the lightning question, what quantity serves as the \"length\" $$L$$ in the resistivity formula, and why might a student hesitate about this? (2 steps)", "a": "- Step 1: The length $$L$$ is the *cloud-to-ground distance* of the lightning channel \u2014 400 m in this question. The resistivity formula $$R = \\frac{\\rho L}{A}$$ applies to any conductor of length $$L$$ and cross-section $$A$$, and the lightning channel is a conductor (ionised plasma) stretching from cloud to ground.\n- Step 2: A student might hesitate because lightning isn't a \"wire\" \u2014 there's no physical cable. The instinct is to think \"length of a cable\" rather than \"length of the conducting path through the air.\" But $$L$$ in the formula is simply the distance between the two ends of the conducting path, regardless of whether it's copper wire or ionised air. The lightning channel is a temporary cylindrical conductor of length 400 m.\n\n$$L$$ is the length of the *conducting path*, not the length of a manufactured wire. Lightning creates its own temporary conductor through the air.", "source": "GLM 5.1"}, {"q": "When a question asks you to \"describe how values can be used to determine internal resistance using a graphical method\" (like Q17b), what three key elements must your answer include? (2 steps)", "a": "- Step 1: The three required elements:\n+ **Procedure**: vary the external load (variable resistor), and for each setting record *pairs* of terminal p.d. $$V$$ and current $$I$$ \u2014 several data points, not just one.\n+ **Plot**: draw a graph of $$V$$ (y-axis) against $$I$$ (x-axis); draw the best-fit straight line through the points.\n+ **Extract**: from $$V = \\varepsilon - rI$$ (the line equation), state that the **y-intercept = $$\\varepsilon$$** and the **gradient = $$-r$$**, so $$r = -\\text{gradient}$$.\n- Step 2: Each element scores a mark. Missing the procedure (how you collect data) loses one mark; missing the axes/plot loses another; missing the gradient/intercept interpretation loses the third. The key phrase is \"gradient = $$-r$$\" \u2014 the minus sign is essential because the line slopes downward. Also specify that $$V$$ is on the y-axis and $$I$$ on the x-axis; reversing them gives a different gradient.\n\nThree marks = procedure + graph setup + interpretation. Never forget: gradient is $$-r$$ (with the minus), intercept is $$\\varepsilon$$.", "source": "GLM 5.1"}, {"q": "A voltmeter connected across a *different* component in the same thermistor circuit can give the *opposite* verdict for whether voltage increases or decreases. What does this reveal about the nature of voltage in a series circuit? (2 steps)", "a": "- Step 1: In a series circuit with e.m.f. $$\\varepsilon$$, the total voltage is *fixed*: $$V_1 + V_2 = \\varepsilon$$ (Kirchhoff's voltage law). If one resistor claims a larger share, the other *must* claim a smaller share. The e.m.f. is the pie; the resistors divide it.\n- Step 2: When the thermistor's resistance drops, it claims a *smaller* fraction of $$\\varepsilon$$ (its voltage $$V_T$$ decreases). The fixed resistor then claims a *larger* fraction (its voltage $$V_F$$ increases). They move in *opposite directions* because their sum is conserved at $$\\varepsilon$$. The voltmeter's verdict depends entirely on which slice of the pie it's measuring.\n\nVoltage in series is a zero-sum game: if one component takes more, the other takes less. Which component your voltmeter watches determines whether it sees an increase or a decrease.", "source": "GLM 5.1"}, {"q": "What are the six common traps in electricity identified in this topic, and what is the underlying conceptual error in each? (3 steps)", "a": "- Step 1: **Trap 1 \u2014 Parallel reciprocal**: forgetting the final flip. You compute $$\\frac{1}{R_{total}} = 0.4$$ and write $$R_{total} = 0.4 \\Omega$$ instead of flipping to get 2.5 \u03a9. Underlying error: treating the reciprocal as the answer.\n- Step 2: **Trap 2 \u2014 Resistivity units**: writing \u03a9 m\u207b\u00b9 instead of \u03a9 m. Underlying error: not checking unit derivation from $$\\rho = \\frac{RA}{L}$$; assuming \"per metre\" because length is involved. **Trap 3 \u2014 Infinite resistance**: looking for $$V = 0$$ instead of $$I = 0$$. Underlying error: confusing which variable in $$R = V/I$$ drives the blow-up \u2014 it's the denominator, not the numerator. **Trap 4 \u2014 e.m.f. wording**: saying \"per charge particle\" instead of \"per unit charge / per coulomb.\" Underlying error: not anchoring to the coulomb definition of the volt.\n- Step 3: **Trap 5 \u2014 Gradient sign**: writing $$r = \\text{gradient}$$ instead of $$r = -\\text{gradient}$$ for the $$V$$-$$I$$ graph. Underlying error: ignoring that the line slopes downward, so the raw gradient is negative. **Trap 6 \u2014 NTC thermistor + voltmeter position**: assuming resistance falls \u2192 voltage falls, without checking *which* component the voltmeter spans. Underlying error: not applying $$V = IR$$ to the specific component measured, and forgetting the zero-sum nature of series voltages.\n\nEach trap has a distinct root cause: missing a step (flip), wrong unit logic, wrong variable focus, wrong wording, wrong sign, wrong component identification.", "source": "GLM 5.1"}, {"q": "Alex emphasised five exam-technique principles. What is the *first* principle (\"find the formula that links the quantities, then rearrange\"), and why must you do this *before* looking at the MCQ options? (2 steps)", "a": "- Step 1: The principle: before engaging with any multiple-choice options, identify the *physics relationship* that connects the quantities in the question stem. Write it down. Then rearrange it to make the target quantity the subject. Only then look at the options to match.\n- Step 2: Why this order matters: if you scan options first, you risk being seduced by a structurally plausible but wrong expression (e.g., one with $$A$$ in the numerator when it should be in the denominator). Your pre-computed rearrangement ($$v = \\frac{I}{nAe}$$) becomes a *filter* \u2014 you can immediately eliminate options that don't match the correct structure. The physics decides the form; the options are just a matching exercise.\n\nDecide the physics first, then match. The formula is your filter \u2014 without it, you're guessing by appearance.", "source": "GLM 5.1"}, {"q": "Why does the formula $$P = I^2 R$$ specifically represent \"resistance heating\" (energy dissipated as heat in a resistor), and what would happen to the heat if you doubled the current through the same resistor? (2 steps)", "a": "- Step 1: A resistor converts electrical energy into thermal energy (heating). The rate of this conversion is the power dissipated. Using $$P = VI$$ and substituting $$V = IR$$ gives $$P = I^2 R$$ \u2014 this form explicitly shows that the heating depends on the *square* of the current and the resistance. It's \"caused by current\" as your mind map notes.\n- Step 2: If you double $$I$$ (from $$I$$ to $$2I$$) through the same $$R$$: $$P_{new} = (2I)^2 R = 4I^2 R = 4P_{old}$$. The power quadruples, not doubles. This is why overcurrent is so dangerous for components \u2014 a modest current increase causes a disproportionate heating increase. Fuses exploit this: they melt when $$I^2 R$$ exceeds their thermal capacity.\n\nHeating \u221d $$I^2$$, not $$I$$. Double the current \u2192 four times the heat. This square dependence is what makes current spikes destructive.", "source": "GLM 5.1"}, {"q": "For two resistors $$R_1$$ and $$R_2$$ in series, the voltage ratio $$\\frac{V_1}{V_2}$$ equals the resistance ratio $$\\frac{R_1}{R_2}$$. Prove this from first principles. (2 steps)", "a": "- Step 1: In series, the same current $$I$$ flows through both resistors. By Ohm's law: $$V_1 = IR_1$$ and $$V_2 = IR_2$$.\n- Step 2: Divide: $$\\frac{V_1}{V_2} = \\frac{IR_1}{IR_2} = \\frac{R_1}{R_2}$$. The $$I$$ cancels. Each resistor's voltage share is directly proportional to its resistance \u2014 the bigger resistor claims the bigger voltage slice. This is the principle behind the potential divider.\n\nIn series: voltage is divided in proportion to resistance. Big resistor = big voltage share.", "source": "GLM 5.1"}, {"q": "Potential difference $$V$$ is defined as $$V = \\frac{W}{Q}$$, where $$W$$ is energy transferred/work done and $$Q$$ is charge. How does this definition connect to both e.m.f. and ordinary p.d., and what's the subtle difference between them? (2 steps)", "a": "- Step 1: Both e.m.f. and p.d. have units of volts = J/C = \"energy per charge.\" The formula $$V = \\frac{W}{Q}$$ applies to both \u2014 they both describe energy transfer per unit charge, but the *direction* of energy conversion differs.\n- Step 2: **e.m.f.**: energy is converted *from other forms into electrical* (chemical \u2192 electrical in a battery; mechanical \u2192 electrical in a generator). The source *gives* energy to the charges. **p.d.** across a component: energy is converted *from electrical into other forms* (electrical \u2192 heat in a resistor; electrical \u2192 light in a bulb). The component *takes* energy from the charges. Same unit, opposite energy direction.\n\ne.m.f. = energy *given* to charges per coulomb (source). p.d. = energy *taken* from charges per coulomb (load). Both are J/C, but the arrow of energy flow is reversed.", "source": "GLM 5.1"}, {"q": "If you have a 12 V e.m.f. source with internal resistance $$r = 2 \\Omega$$ driving an external load $$R = 10 \\Omega$$, what is the current, terminal p.d., and power dissipated in the load? (Do this with mental-math-friendly numbers.) (3 steps)", "a": "- Step 1: Current: $$I = \\frac{\\varepsilon}{R + r} = \\frac{12}{10 + 2} = \\frac{12}{12} = 1 \\text{ A}$$.\n- Step 2: Terminal p.d.: $$V = \\varepsilon - Ir = 12 - (1)(2) = 10 \\text{ V}$$ (or equivalently $$V = IR = 1 \\times 10 = 10$$ V). The \"lost volts\" inside the cell are $$Ir = 2$$ V.\n- Step 3: Power in the load: $$P = I^2 R = (1)^2(10) = 10 \\text{ W}$$ (or $$P = VI = 10 \\times 1 = 10$$ W). The power wasted inside the cell: $$I^2 r = (1)^2(2) = 2$$ W. Total power from source: $$\\varepsilon I = 12 \\times 1 = 12$$ W = 10 + 2. \u2713\n\nWith nice numbers: $$I = 1$$ A, $$V = 10$$ V, $$P_{load} = 10$$ W, $$P_{lost} = 2$$ W. The cell wastes 2 W internally.", "source": "GLM 5.1"}, {"q": "Three identical resistors of 6 \u03a9 each are connected in parallel. Without heavy calculation, what is the total resistance, and why? (2 steps)", "a": "- Step 1: For $$N$$ identical resistors of value $$R_0$$ in parallel: $$\\frac{1}{R_{total}} = \\frac{1}{R_0} + \\frac{1}{R_0} + \\cdots = \\frac{N}{R_0}$$, so $$R_{total} = \\frac{R_0}{N}$$.\n- Step 2: With three 6 \u03a9 resistors: $$R_{total} = \\frac{6}{3} = 2 \\Omega$$. Each additional parallel path divides the total resistance further. Three equal paths = one-third of one resistor's value. Quick sanity: 2 \u03a9 < 6 \u03a9 (the smallest individual) \u2014 correct for parallel.\n\n$$N$$ equal resistors in parallel \u2192 $$R_{total} = \\frac{R_0}{N}$$. Three 6 \u03a9 \u2192 2 \u03a9. More paths = lower resistance.", "source": "GLM 5.1"}, {"q": "A wire has resistivity $$\\rho = 1.1 \\times 10^{-6} \\Omega \\text{ m}$$, length $$L = 2 \\text{ m}$$, and cross-sectional area $$A = 5.0 \\times 10^{-7} \\text{ m}^2$$. Using $$R = \\frac{\\rho L}{A}$$, estimate the resistance with simple mental math (order of magnitude check). (2 steps)", "a": "- Step 1: $$R = \\frac{\\rho L}{A} = \\frac{(1.1 \\times 10^{-6})(2)}{5.0 \\times 10^{-7}} = \\frac{2.2 \\times 10^{-6}}{5.0 \\times 10^{-7}}$$.\n- Step 2: Divide the orders of magnitude first: $$\\frac{10^{-6}}{10^{-7}} = 10^{1} = 10$$. Then the coefficients: $$\\frac{2.2}{5.0} \\approx 0.44$$. So $$R \\approx 0.44 \\times 10 = 4.4 \\Omega$$. The exact answer is 4.4 \u03a9. The key insight: $$10^{-6}/10^{-7}$$ shifts the decimal one place right \u2014 easy mental check.\n\nOrder-of-magnitude division: $$10^{-6}/10^{-7} = 10$$, then $$2.2/5 \u2248 0.44$$, so ~4.4 \u03a9. Resistivity questions are just \"coefficient \u00d7 power-of-10 ratio.\"", "source": "GLM 5.1"}, {"q": "A charge of 0.60 C flows past a point in 30 \u03bcs. Estimate the average current using $$I = \\frac{Q}{t}$$, with a focus on order-of-magnitude reasoning. (2 steps)", "a": "- Step 1: $$I = \\frac{Q}{t} = \\frac{0.60}{30 \\times 10^{-6}} = \\frac{0.60}{30} \\times 10^{6}$$.\n- Step 2: $$\\frac{0.60}{30} = 0.02 = 2 \\times 10^{-2}$$, then multiply by $$10^{6}$$: $$I = 2 \\times 10^{-2} \\times 10^{6} = 2 \\times 10^{4} = 20{,}000 \\text{ A}$$. This is a huge current \u2014 consistent with a lightning-like discharge where a large charge moves in a very short time.\n\nSmall charge over tiny time = enormous current. $$0.6 \\text{ C} / 30 \\mu\\text{s} \u2248 2 \\times 10^{4}$$ A \u2014 the microseconds in the denominator inflate the result dramatically.", "source": "GLM 5.1"}, {"q": "If the current through a metal wire is doubled (everything else unchanged), what happens to the drift velocity, and why? What does this tell you about the relationship between macroscopic current and microscopic drift? (2 steps)", "a": "- Step 1: From $$I = nAvq$$, if $$n$$, $$A$$, and $$q$$ are all fixed (same wire, same material, same carrier type), then $$I$$ is directly proportional to $$v$$: $$v = \\frac{I}{nAq}$$.\n- Step 2: Doubling $$I$$ \u2192 doubling $$v$$. The drift velocity scales linearly with current because every additional unit of current corresponds to the same number of carriers moving a bit faster on average. There's no square-law or threshold \u2014 it's a simple proportionality. This also means that if you could measure drift velocity, you could infer current directly.\n\n$$v \\propto I$$ when $$n$$, $$A$$, $$q$$ are fixed. Double the current \u2192 double the drift. Macroscopic and microscopic are linearly linked.", "source": "GLM 5.1"}, {"q": "Why is it important to explicitly state both \"gradient = $$-r$$\" AND \"intercept = $$\\varepsilon$$\" when describing the graphical method for internal resistance, even if the question only asks about $$r$$? (2 steps)", "a": "- Step 1: The equation $$V = \\varepsilon - rI$$ has *two* unknowns ($$\\varepsilon$$ and $$r$$). A straight line on a $$V$$-$$I$$ graph encodes both: the intercept gives $$\\varepsilon$$ and the gradient gives $$-r$. You need both to fully characterise the cell. If you only state the gradient interpretation, you've described how to find $$r$$ but haven't shown that you understand *why* the method works \u2014 the line exists because of the equation linking both quantities.\n- Step 2: Exam marks are often split: one mark for \"intercept = e.m.f.\" and one for \"gradient = $$-r$$\" (or \"$$r = -\\text{gradient}$$\"). Stating only one loses a mark. Moreover, the intercept is your *check* \u2014 it should match the e.m.f. you'd measure with no load. Both statements demonstrate complete understanding of the model.\n\nTwo unknowns, two graphical features. State both: intercept = $$\\varepsilon$$, gradient = $$-r$$. Half the answer loses half the marks.", "source": "GLM 5.1"}, {"q": "When current flows through a cell, the terminal p.d. is $$V = \\varepsilon - Ir$$. What happens to $$V$$ as the external load resistance $$R$$ approaches zero (a near-short-circuit), and what happens as $$R$$ approaches infinity (no load)? Explain the limiting cases. (2 steps)", "a": "- Step 1: As $$R \\to \\infty$$ (open circuit, no load): $$I = \\frac{\\varepsilon}{R+r} \\to 0$$, so $$Ir \\to 0$$, and $$V = \\varepsilon - 0 = \\varepsilon$$. The voltmeter reads the full e.m.f. \u2014 no current means no lost volts inside the cell. This is how you *measure* e.m.f.: connect a voltmeter across the cell with nothing else in the circuit.\n- Step 2: As $$R \\to 0$$ (short circuit): $$I = \\frac{\\varepsilon}{0+r} = \\frac{\\varepsilon}{r}$$ \u2014 this is the *maximum current* the cell can deliver (the short-circuit current). Then $$V = \\varepsilon - Ir = \\varepsilon - \\varepsilon = 0$$. All the e.m.f. is consumed inside the cell; nothing appears at the terminals. This is dangerous: huge current through $$r$$ means massive internal heating ($$P = I^2 r$$), which can destroy the cell.\n\nOpen circuit: $$V = \\varepsilon$$, $$I = 0$$ (safe, full voltage). Short circuit: $$V = 0$$, $$I = \\frac{\\varepsilon}{r}$$ (dangerous, zero useful voltage, maximum current).", "source": "GLM 5.1"}, {"q": "In a potential divider with $$R_1 = 2 \\text{ k}\\Omega$$ and $$R_2 = 8 \\text{ k}\\Omega$$ across $$V_{in} = 10 \\text{ V}$$, what is $$V_{out}$$ (taken across $$R_2$$)? Show how the ratio structure makes this a quick mental calculation. (2 steps)", "a": "- Step 1: The formula: $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2} = 10 \\times \\frac{8}{2+8} = 10 \\times \\frac{8}{10}$$.\n- Step 2: $$\\frac{8}{10} = 0.8$$, so $$V_{out} = 10 \\times 0.8 = 8 \\text{ V}$$. The fraction $$\\frac{R_2}{R_1+R_2}$$ directly tells you the *percentage* of input voltage appearing at the output. Here, $$R_2$$ is 80% of the total resistance, so it claims 80% of the voltage: 8 V out of 10 V.\n\nThe fraction is the key: $$\\frac{R_2}{R_{total}}$$ = voltage fraction. 8 k\u03a9 is 80% of 10 k\u03a9 total \u2192 80% of 10 V = 8 V.", "source": "GLM 5.1"}, {"q": "An LDR is used as $$R_2$$ in a potential divider (output across the LDR). When it gets *darker*, does $$V_{out}$$ increase or decrease? Explain using both the divider formula and physical reasoning. (2 steps)", "a": "- Step 1: When darker: LDR resistance $$R_{LDR}$$ *increases* (fewer photons \u2192 fewer free carriers \u2192 higher resistance). In the divider formula $$V_{out} = V_{in} \\times \\frac{R_{LDR}}{R_1 + R_{LDR}}$$, as $$R_{LDR}$$ increases, the fraction $$\\frac{R_{LDR}}{R_1 + R_{LDR}}$$ increases (the LDR claims a larger share of the total resistance).\n- Step 2: So $$V_{out}$$ *increases* when it gets darker. Physical reasoning: the LDR takes a bigger voltage slice because its resistance is now a larger portion of the total. This is why LDRs in potential dividers are used as *dark sensors* \u2014 the output voltage rises in darkness, which can trigger a circuit (e.g., turning on a street lamp).\n\nLDR in divider (output across LDR): darker \u2192 $$R_{LDR}$$ up \u2192 voltage fraction up \u2192 $$V_{out}$$ up. It's a darkness-triggered sensor.", "source": "GLM 5.1"}, {"q": "An NTC thermistor is used as $$R_1$$ in a potential divider (output across $$R_2$$, the fixed resistor). When temperature increases, does $$V_{out}$$ increase or decrease? Walk through the logic. (2 steps)", "a": "- Step 1: Temperature increases \u2192 NTC thermistor $$R_1$$ *decreases*. The total resistance $$R_1 + R_2$$ decreases (by a small amount, since $$R_2$$ is fixed). The current $$I = \\frac{V_{in}}{R_1+R_2}$$ increases.\n- Step 2: Output across $$R_2$$: $$V_{out} = IR_2$$. Since $$I$$ increases and $$R_2$$ is constant, $$V_{out}$$ *increases*. Equivalently, from the divider formula: $$V_{out} = V_{in} \\times \\frac{R_2}{R_1+R_2}$$ \u2014 as $$R_1$$ shrinks, the denominator shrinks, and the fraction $$\\frac{R_2}{R_1+R_2}$$ grows, so $$V_{out}$$ increases. The fixed resistor claims a larger share because the thermistor claims a smaller one.\n\nNTC thermistor as $$R_1$$, output across fixed $$R_2$$: hotter \u2192 $$R_1$$ down \u2192 $$R_2$$'s share up \u2192 $$V_{out}$$ up. It's a temperature-triggered sensor.", "source": "GLM 5.1"}, {"q": "Alex said: \"You need more practice beyond lesson questions to reach A\u22c6 \u2014 those just check you understand the concepts.\" What is the distinction between *understanding* a concept and *fluency* with it, and why does exam success require both? (2 steps)", "a": "- Step 1: *Understanding* means you can explain the concept and solve a problem when the path is clear \u2014 the lesson questions, with Alex guiding and the context fresh, test this. You know *what* $$R = \\frac{\\rho L}{A}$$ means and can apply it when prompted.\n- Step 2: *Fluency* means you can recognise *when* to use the concept unprompted, combine it with other concepts under time pressure, handle unfamiliar question formats, and avoid the six common traps without external reminders. This only comes from *volume* of varied practice \u2014 past papers, mixed-topic problems, timed drills. Understanding is the foundation; fluency is the performance layer. A\u22c6 requires fluency: fast, accurate, trap-free execution under exam conditions.\n\nUnderstanding = you can do it with help and fresh context. Fluency = you can do it alone, fast, and under pressure. Lesson questions build understanding; past papers build fluency. Both are necessary.", "source": "GLM 5.1"}, {"q": "A cell has e.m.f. $$\\varepsilon = 6 \\text{ V}$$ and internal resistance $$r = 1 \\Omega$$. It drives a load $$R = 5 \\Omega$$. Calculate the current, terminal p.d., power in the load, and power wasted inside the cell \u2014 using mental-math-friendly values. (3 steps)", "a": "- Step 1: Current: $$I = \\frac{\\varepsilon}{R+r} = \\frac{6}{5+1} = \\frac{6}{6} = 1 \\text{ A}$$.\n- Step 2: Terminal p.d.: $$V = \\varepsilon - Ir = 6 - (1)(1) = 5 \\text{ V}$$ (or $$V = IR = 1 \\times 5 = 5$$ V). Lost volts = 1 V.\n- Step 3: Power in load: $$P_{load} = I^2 R = 1^2 \\times 5 = 5 \\text{ W}$$. Power wasted in cell: $$P_{lost} = I^2 r = 1^2 \\times 1 = 1 \\text{ W}$$. Total from source: $$\\varepsilon I = 6 \\times 1 = 6 \\text{ W} = 5 + 1$$. \u2713 The cell delivers 5 W useful power and wastes 1 W internally.\n\nWith nice numbers: $$I = 1$$ A, $$V = 5$$ V, useful power = 5 W, wasted = 1 W, total = 6 W. The internal resistance always \"steals\" some power.", "source": "GLM 5.1"}, {"q": "What is the relationship between the power dissipated in the load ($$P_{load} = I^2 R$$) and the power wasted inside the cell ($$P_{lost} = I^2 r$$) for the same current? What fraction of total power is useful? (2 steps)", "a": "- Step 1: Both powers share the same $$I^2$$ factor: $$P_{load} = I^2 R$$ and $$P_{lost} = I^2 r$$. Their ratio is simply $$\\frac{P_{load}}{P_{lost}} = \\frac{R}{r}$$ \u2014 the ratio of external to internal resistance. The bigger $$R$$ is relative to $$r$$, the more efficiently the cell delivers power to the load.\n- Step 2: The fraction of total power that is useful: $$\\frac{P_{load}}{P_{total}} = \\frac{I^2 R}{I^2(R+r)} = \\frac{R}{R+r}$$. With $$R = 5 \\Omega$$ and $$r = 1 \\Omega$$: efficiency = $$\\frac{5}{6} \u2248 83\\%$$. As $$R \\to \\infty$$, efficiency \u2192 100% (but current \u2192 0, so total power \u2192 0). As $$R \\to 0$$, efficiency \u2192 0% (all power wasted inside the cell). There's a trade-off: high efficiency means low power delivery.\n\nEfficiency = $$\\frac{R}{R+r}$$: depends only on the resistance ratio, not on $$\\varepsilon$$. Big $$R/r$$ \u2192 efficient but low power; small $$R/r$$ \u2192 powerful but wasteful.", "source": "GLM 5.1"}, {"q": "In the Q-pow problem, the load power fell to 86% when internal resistance increased from 0.10 \u03a9 to 0.5 \u03a9. Why didn't it fall to 70%? What physical insight explains why the drop is *less* dramatic than the student expected? (2 steps)", "a": "- Step 1: The current depends on $$R + r$$: $$I = \\frac{\\varepsilon}{R+r}$$, and the load power is $$P = I^2 R = \\frac{\\varepsilon^2 R}{(R+r)^2}$$. When $$r$$ increases from 0.10 \u03a9 to 0.5 \u03a9 (a 5\u00d7 increase in $$r$$), the denominator $$R+r$$ changes from 5.10 \u03a9 to 5.5 \u03a9 \u2014 only an ~8% increase in the denominator, not a 5\u00d7 increase, because the *external* resistance $$R = 5 \\Omega$$ dominates.\n- Step 2: Since $$R$$ is much larger than $$r$$, changes in $$r$$ have a *modest* effect on the total resistance and hence on current and power. The power ratio $$\\frac{P_2}{P_1} = \\frac{(R+r_1)^2}{(R+r_2)^2} = \\frac{5.10^2}{5.5^2} \u2248 0.86$$. If $$R$$ were small (e.g., 0.5 \u03a9), then $$r$$ changing from 0.1 to 0.5 would double the denominator and the power drop would be far more dramatic. The *relative* size of $$R$$ vs $$r$$ controls how sensitive power is to changes in $$r$$.\n\nWhen $$R \\gg r$$, changes in $$r$$ barely affect total resistance \u2192 power is fairly stable. The student overestimated the impact because they didn't account for $$R$$ buffering the denominator.", "source": "GLM 5.1"}, {"q": "Why does the cross-sectional area of a lightning channel need to be calculated from a diameter (using $$A = \\frac{\\pi d^2}{4}$$), and what happens if you mistakenly use $$A = \\pi r^2$$ with $$r$$ in centimetres without converting to metres? (2 steps)", "a": "- Step 1: The channel is circular, so $$A = \\pi r^2$$ where $$r = \\frac{d}{2}$$, giving $$A = \\pi \\left(\\frac{d}{2}\\right)^2 = \\frac{\\pi d^2}{4}$$. Both forms are equivalent; the key is using *metres* for the radius/diameter. The question gives $$d = 5.0 \\text{ cm} = 0.05 \\text{ m}$$, so $$r = 0.025 \\text{ m}$$.\n- Step 2: If you plug $$r = 5$$ (thinking \"5 cm\" but not converting) into $$A = \\pi r^2$$, you'd get $$A \u2248 78.5 \\text{ m}^2$$ \u2014 absurdly large. The correct $$A = \\pi(0.025)^2 \u2248 1.96 \\times 10^{-3} \\text{ m}^2$$ \u2014 about 40,000 times smaller. Every length in resistivity calculations must be in metres; a centimetre-to-metre conversion error shifts the answer by factors of 10\u00b2 or 10\u2074.\n\nAlways convert cm \u2192 m before computing area. A 5 cm diameter \u2192 0.025 m radius \u2192 ~2 \u00d7 10\u207b\u00b3 m\u00b2 area. Forgetting the conversion makes your area 10\u2074 times too big.", "source": "GLM 5.1"}, {"q": "A potential divider has $$V_{in} = 9 \\text{ V}$$, $$R_1 = 3 \\text{ k}\\Omega$$, and $$R_2 = 6 \\text{ k}\\Omega$$, with output across $$R_2$$. If $$R_2$$ is replaced by an NTC thermistor that heats up, does $$V_{out}$$ increase or decrease? (2 steps)", "a": "- Step 1: Output across $$R_2$$ (the thermistor): $$V_{out} = V_{in} \\times \\frac{R_{therm}}{R_1 + R_{therm}}$$. When the thermistor heats, $$R_{therm}$$ decreases (NTC). The fraction $$\\frac{R_{therm}}{R_1 + R_{therm}}$$ decreases \u2014 the thermistor claims a smaller share.\n- Step 2: So $$V_{out}$$ *decreases* when the thermistor heats up (if output is across the thermistor). This is the same logic as Q7 with the voltmeter across the thermistor: the changing component's voltage share shrinks as its resistance shrinks. If the output were across the *fixed* $$R_1$$ instead, $$V_{out}$$ would *increase*.\n\nOutput across the thermistor in a divider: hotter \u2192 $$R_{therm}$$ down \u2192 voltage fraction down \u2192 $$V_{out}$$ down. Same zero-sum logic as the series circuit.", "source": "GLM 5.1"}, {"q": "What is the \"put numbers on it\" method that Alex recommended, and how does it resolve the ambiguity in a question like \"when the thermistor heats up, does the voltmeter reading increase or decrease?\" (2 steps)", "a": "- Step 1: The method: instead of reasoning abstractly with \"increase/decrease\" words, pick *concrete, plausible numerical values* for every quantity. Assign a battery voltage (e.g., 12 V), a fixed resistor value (e.g., 6 \u03a9), and two thermistor values (e.g., 6 \u03a9 cold, 3 \u03a9 hot). Then *calculate* the current and voltage for both scenarios.\n- Step 2: Cold: $$I = 12/(6+6) = 1$$ A, $$V_T = 1 \\times 6 = 6$$ V. Hot: $$I = 12/(6+3) = 1.33$$ A, $$V_T = 1.33 \\times 3 = 4$$ V. The numbers *unambiguously* show $$V_T$$ dropped from 6 V to 4 V. No guessing, no ambiguous \"well, current goes up but resistance goes down...\" \u2014 the calculation decides.\n\nAbstract words create competing-effect ambiguity. Concrete numbers resolve it: compute before and after, compare. The arithmetic always gives a clear verdict.", "source": "GLM 5.1"}, {"q": "Why is the drift velocity of electrons in a copper wire (~0.1 mm/s) so much smaller than the random thermal speed of those same electrons (~10\u2076 m/s), and how does this reconcile with the fact that \"electricity travels almost instantly\" when you switch on a light? (2 steps)", "a": "- Step 1: The random thermal speed (~10\u2076 m/s) is the *zigzag* motion of electrons bouncing off lattice ions \u2014 fast but *random* in direction, producing zero net flow. The drift velocity (~10\u207b\u2074 m/s) is the tiny *net* bias in one direction caused by the electric field. It's like a crowd of people running randomly in all directions at high speed, but slowly inching toward one exit \u2014 the net progress is slow even though individual motion is fast.\n- Step 2: \"Electricity travels instantly\" because the *electric field* propagates at near the speed of light along the wire. When you close a switch, the field establishes almost immediately throughout the circuit, and *all* electrons simultaneously start drifting. You don't wait for electrons to travel from the switch to the bulb \u2014 the signal (the field) arrives almost instantly, and the electrons already present in the bulb begin drifting right away.\n\nDrift is slow; the *field* is fast. The signal is the field, not the electrons. The crowd inches slowly, but the instruction to move reaches everyone almost instantly.", "source": "GLM 5.1"}];
function render() {
  const container = document.getElementById('cards');
  container.innerHTML = cards.map((c, i) => 
    '<div class="card" id="card-' + i + '">' +
    '<div class="card-header">' +
    '<input type="checkbox" class="card-select" data-id="' + i + '" checked onchange="updateCount()">' +
    '<div class="card-q">' + (i+1) + '. ' + escapeHtml(c.q) + '</div>' +
    '<span class="card-source">' + c.source + '</span>' +
    '</div>' +
    '<div class="card-answer" id="ans-' + i + '">' + formatAnswer(c.a) + '</div>' +
    '</div>'
  ).join('');
  updateCount();
}
function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatAnswer(t) {
  t = escapeHtml(t);
  t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + t + '</p>';
}
function toggleAll() { document.querySelectorAll('.card-answer').forEach(el => el.classList.toggle('show')); }
function selectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = true; cb.closest('.card').classList.remove('deselected'); }); updateCount(); }
function deselectAll() { document.querySelectorAll('.card-select').forEach(cb => { cb.checked = false; cb.closest('.card').classList.add('deselected'); }); updateCount(); }
function updateCount() {
  const checked = document.querySelectorAll('.card-select:checked').length;
  document.getElementById('count').textContent = checked + ' selected';
  document.querySelectorAll('.card-select').forEach(cb => { cb.closest('.card').classList.toggle('deselected', !cb.checked); });
}
function exportSelected() {
  const selected = [];
  document.querySelectorAll('.card-select:checked').forEach(cb => {
    const idx = parseInt(cb.dataset.id);
    selected.push('## Q' + (selected.length + 1) + '\n**Q:** ' + cards[idx].q + '\n\n**A:** ' + cards[idx].a);
  });
  document.getElementById('exportText').value = selected.join('\n\n---\n\n');
  document.getElementById('exportArea').style.display = 'block';
}
render();
</script>
</body>
