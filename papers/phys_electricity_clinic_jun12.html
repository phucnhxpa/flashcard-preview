ltiplied together on the bottom.\n- Step 2: Scan the options for structural matches. Any option with $$A$$ in the numerator (instead of the denominator) can be eliminated immediately. Any option missing $$n$$ or $$q$$ can be eliminated.\n- Step 3: Among the remaining options, pick the one that matches your rearrangement exactly. Don't plug in numbers and compute four expressions — that's slow and error-prone. Match the algebra first, compute only if needed for a tiebreak.\n\n+ This is faster and safer because algebraic structure (what's on top, what's on bottom) is easier to verify than numerical calculation with powers of ten.", "source": "GLM 5.1 ②", "_id": "glm_2_38"}, {"question": "During a lightning strike, the channel transfers about $$0.75$$ C of charge in just $$30\\ \\mu\\text{s}$$. How can such a tiny charge cause so much destruction? (3 steps)", "answer": "- Step 1: Charge transferred is modest, but it's delivered *very* fast: $$I = Q/t = 0.75/(30 \\times 10^{-6}) = 25\\,000$$ A — enormous current.\n- Step 2: At a p.d. of $$\\sim 10^9$$ V, power dissipated is $$P = VI \\sim 3 \\times 10^{13}$$ W — tens of terawatts, briefly comparable to thousands of power stations combined.\n- Step 3: Destruction comes from instantaneous *power*, not total charge. The huge current heats the channel to plasma temperatures, causing rapid air expansion (thunder), incandescent light, and structural damage where it strikes.\n\nLightning isn't dangerous because of how much charge it moves, but how *fast* it moves it.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "A wire is stretched to twice its original length while its volume stays constant. What happens to its resistance? (3 steps)", "answer": "- Step 1: Original: $$R = \\frac{\\rho L}{A}$$. Volume $$V = A \\times L$$ is constant, so $$A \\propto \\frac{1}{L}$$.\n- Step 2: When length doubles ($$L' = 2L$$), to keep volume constant, the cross-sectional area must halve ($$A' = A/2$$).\n- Step 3: New resistance: $$R' = \\frac{\\rho (2L)}{A/2} = \\frac{\\rho (2L) \\times 2}{A} = 4 \\frac{\\rho L}{A} = 4R$$. Stretching a wire increases its resistance by a factor of 4.", "source": "MiniMax ①", "_id": "minimax_1_46"}, {"question": "An NTC thermistor is connected as $$R_1$$ (top resistor) in a potential divider, and $$V_{out}$$ is measured across the fixed resistor $$R_2$$ at the bottom. If the temperature increases, what happens to $$V_{out}$$? (3 steps)", "answer": "- Step 1: An NTC thermistor's resistance decreases as temperature increases (Negative Temperature Coefficient).\n- Step 2: As $$R_1$$ (thermistor) decreases, the total resistance $$R_1 + R_2$$ shrinks, but the fraction $$\\frac{R_2}{R_1 + R_2}$$ increases because the denominator shrinks while $$R_2$$ stays constant.\n- Step 3: Since $$V_{out} = V_{in} \\frac{R_2}{R_1 + R_2}$$, the fraction increases, so $$V_{out}$$ increases. The fixed resistor claims a larger share of the voltage because the thermistor is conceding its share.\n\nTakeaway: Thermistor heats up → $$R_1$$ drops → bottom fixed resistor gets more voltage → $$V_{out}$$ rises.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "A cell has $$\\varepsilon = 6$$ V and $$r = 2\\ \\Omega$$. If you short the terminals directly (zero external resistance), what happens? Compare with attaching a 10 Ω load. (3 steps)", "answer": "- Step 1: Short circuit: $$R_{ext} = 0$$, so $$I = \\varepsilon / r = 6/2 = 3$$ A, and terminal voltage $$V = \\varepsilon - Ir = 6 - 6 = 0$$. *All* the e.m.f. is \"lost\" across the internal resistance — the cell heats up dangerously, no useful output.\n- Step 2: With 10 Ω load: $$I = 6/(10+2) = 0.5$$ A, terminal voltage $$V = 6 - 0.5 \\cdot 2 = 5$$ V. Most of the e.m.f. now appears across the load.\n- Step 3: Lesson: $$r$$ sets the maximum current the cell can deliver. Short-circuiting is bad because all energy dissipates *inside* the cell — battery heats up, voltage at terminals collapses to zero.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Lightning carries a current of 25 000 A for 30 μs. Without computing exactly, estimate the total charge transferred and explain why \"tons of current\" can still mean \"tiny charge\". (3 steps)", "answer": "- Step 1: Charge $$Q = I t$$. Plug in qualitatively: $$Q \\sim (2.5 \\times 10^4)(3 \\times 10^{-5}) \\sim 10^0$$ C — order of magnitude is around 1 coulomb (actually 0.75 C).\n- Step 2: One coulomb is the charge that flows past a point in a wire carrying 1 A for 1 second — a perfectly ordinary amount.\n- Step 3: The \"huge\" feel of lightning isn't from total charge, but from the *rate*: cramming ~1 C through in 30 microseconds gives an enormous current, and combined with a billion volts gives enormous *power*. But the cumulative charge is modest.\n\nTakeaway: current is rate, charge is total. Lightning is short and violent, not large in total charge.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "Why does a car's headlights dim slightly when you start the engine, and how is this an illustration of internal resistance? (3 steps)", "answer": "- Step 1: The starter motor draws an enormous current (hundreds of amps) for a moment to crank the engine.\n- Step 2: That huge current $$I$$ causes a large internal voltage drop $$Ir$$ inside the battery, even though $$r$$ is small.\n- Step 3: Terminal p.d. $$V = \\varepsilon - Ir$$ therefore drops temporarily, so the headlights (powered from the same terminals) get less voltage and shine dimmer. Once the engine starts and the starter disengages, $$I$$ drops, $$Ir$$ shrinks, and $$V$$ recovers.\n\nReal-world demonstration: internal resistance becomes visible only when current is large.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "Why does the formula $$P = I^2 R$$ specifically describe \"resistance heating\" (the heating effect of current in a resistor)? (3 steps)", "answer": "- Step 1: Electrical energy enters a resistor at rate $$P = VI$$ (work done by the field on charges flowing through). With $$V = IR$$, this becomes $$P = I^2 R$$.\n- Step 2: Inside a resistor, the moving charges collide with the lattice and transfer kinetic energy to lattice vibrations — heat. There's no other energy outlet (no light, no chemical change in a pure resistor), so 100% of the input electrical power becomes heat.\n- Step 3: The $$I^2$$ dependence is critical: doubling the current quadruples the heating. This is why thick wires are used for high currents (lower $$R$$, less heat) and why fuses work — at excess current, the fuse's wire dissipates so much power it melts.\n\nTakeaway: $$I^2 R$$ losses are why power transmission uses high voltage and low current (to minimise $$I^2 R$$ in the cables).", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "Write all the equivalent forms for electrical power dissipated by a resistor and explain when to use each. (3 steps)", "answer": "- Step 1: Three forms: $$P = VI$$, $$P = I^2 R$$, $$P = V^2/R$$. All follow from $$V = IR$$ — substitute it into $$P = VI$$ to get the other two.\n- Step 2: Use $$P = VI$$ when you know both voltage and current (most general). Use $$P = I^2 R$$ when you know current and resistance — common for resistive heating problems where current is fixed by the rest of the circuit. Use $$P = V^2/R$$ when you know voltage across the resistor and its resistance — common for parallel branches where $$V$$ is the supply voltage.\n- Step 3: Pick the form that uses quantities you already have, so you don't have to compute an intermediate value (and propagate errors).", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "Using the equation I = nAvq, explain why the resistance of an NTC thermistor decreases with increasing temperature. (3 steps)", "answer": "- Step 1: For an NTC thermistor, increasing temperature increases the number density (n) of charge carriers significantly as more electrons gain enough energy to move into the conduction band.\n+ Unlike metals where n is nearly constant, in semiconductors n increases exponentially with temperature.\n\n- Step 2: Although increased temperature might decrease drift velocity (v) due to more frequent collisions, the increase in n dominates.\n+ The exponential increase in n outweighs any linear decrease in v.\n\n- Step 3: Since current I = nAvq increases with temperature and voltage is constant (for a given setup), resistance R = V/I must decrease.\n+ This explains the negative temperature coefficient behavior of these thermistors.", "source": "Qwen 3 ②", "_id": "qwen_2_12"}, {"question": "An LDR (Light-Dependent Resistor) is connected as $$R_2$$ (bottom resistor) in a potential divider. As the room gets darker, what happens to the LDR's resistance, and how does this affect the output voltage $$V_{out}$$ across it? (3 steps)", "answer": "- Step 1: An LDR has a high resistance in the dark and a low resistance in bright light. As the room gets darker, the LDR's resistance increases.\n- Step 2: In the divider formula $$V_{out} = V_{in} \\frac{R_2}{R_1 + R_2}$$, if $$R_2$$ (the LDR) increases while $$R_1$$ remains constant, the numerator grows, and the fraction $$\\frac{R_2}{R_1 + R_2}$$ increases.\n- Step 3: Therefore, $$V_{out}$$ increases. In the dark, the LDR claims a larger share of the total voltage for itself.\n\nTakeaway: Darker room → LDR resistance up → if LDR is the bottom resistor, $$V_{out}$$ goes up.", "source": "GLM 5.1 ③", "_id": "glm_3_21"}, {"question": "The e.m.f. of a source and the potential difference across a resistor both have units of volts. Explain the conceptual difference between them — what different physical processes do they describe? (2 steps)", "answer": "- Step 1: E.m.f. ($$\\varepsilon$$) describes energy being *converted into* electrical form from some other form (chemical, mechanical, solar, etc.) *inside the source*, per unit charge. It is the \"push\" that the source provides — the energy given to each coulomb as it passes through the source.\n- Step 2: Potential difference ($$V$$) across a resistor describes energy being *converted out of* electrical form into some other form (heat, light, motion, etc.) *in the external circuit*, per unit charge. It is the \"drop\" — the energy removed from each coulomb as it passes through the component. Same units (J/C = V), opposite direction of energy conversion.\n\n+ In a complete circuit with a single source and single load: $$\\varepsilon = V + Ir$$. The e.m.f. provides the energy; the terminal p.d. $$V$$ is what's delivered to the load; $$Ir$$ is what's wasted internally. Energy in = energy out, per coulomb.", "source": "GLM 5.1 ②", "_id": "glm_2_54"}, {"question": "Why is the terminal p.d. of a battery always less than its e.m.f. when current flows, but equal to the e.m.f. when no current flows? (3 steps)", "answer": "- Step 1: A real cell is modelled as an ideal e.m.f. source $$\\varepsilon$$ in series with an internal resistance $$r$$. The relation is $$V_{terminal} = \\varepsilon - Ir$$.\n- Step 2: When current flows ($$I > 0$$), some energy per coulomb is dissipated as heat inside the cell across $$r$$ — the \"lost volts\" $$Ir$$. So the voltmeter at the terminals reads less than the full $$\\varepsilon$$.\n- Step 3: When $$I = 0$$ (open circuit — voltmeter alone, no load), the $$Ir$$ term vanishes and the voltmeter reads exactly $$\\varepsilon$$. This is the principle behind measuring e.m.f.: use a very-high-impedance voltmeter so $$I \\approx 0$$.\n\nTakeaway: the battery \"feels weaker\" the more current you draw because more energy is wasted internally.", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "Why does $$P = V^2/R$$ give the power dissipated in a resistor at constant voltage, but $$P = I^2 R$$ is the form to use at constant current? (3 steps)", "answer": "- Step 1: All three forms ($$P = VI$$, $$P = I^2 R$$, $$P = V^2/R$$) are mathematically equivalent — substitute $$V = IR$$ to derive them from each other.\n- Step 2: But practically, you choose the form whose quantities are *fixed* in your problem:\n+ Parallel circuits: each branch has the same $$V$$. Use $$P = V^2/R$$ to see how each branch shares power.\n+ Series circuits: same $$I$$ everywhere. Use $$P = I^2 R$$ to see how each component shares power.\n- Step 3: Counterintuitive consequence: in parallel, the *smaller* resistor dissipates more power ($$P \\propto 1/R$$). In series, the *larger* resistor dissipates more power ($$P \\propto R$$). Same physics, opposite ranking — because what's fixed differs.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "Why does a thermistor (NTC) have decreasing resistance with temperature rise, opposite to normal conductors? Explain via I = nAvq. (3 steps)", "answer": "- Step 1: **In metals** - n (charge carrier density) is constant. Higher T ⇒ more lattice vibrations ⇒ v (drift velocity) decreases ⇒ R increases.\n- Step 2: **In semiconductors (NTC)** - Higher T ⇒ more electrons excited into conduction band ⇒ n increases rapidly.\n+ Example: n might double for every 10°C rise, overwhelming slight v reduction.\n- Step 3: **Net effect** - In I = nAvq, large n increase dominates ⇒ I increases ⇒ R = V/I decreases.", "source": "Qwen 3 ①", "_id": "qwen_1_2"}, {"question": "A wire is stretched to twice its length while its volume stays constant. What happens to its resistance, and why? (4 steps)", "answer": "- Step 1: Volume $$= L \\times A$$ is constant. If $$L$$ doubles, $$A$$ must halve to preserve volume.\n- Step 2: Resistance $$R = \\rho L/A$$. The numerator doubles ($$L \\to 2L$$) and the denominator halves ($$A \\to A/2$$).\n- Step 3: Combined effect: $$R \\to \\rho (2L)/(A/2) = 4 \\rho L/A = 4R$$. Resistance increases by a factor of $$4$$.\n- Step 4: The factor of $$4$$ comes from *both* effects compounding — longer means more obstacle course AND thinner means narrower lanes. Useful for thinking about strain gauges, which exploit this very effect.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "A student says \"resistivity is just another word for resistance.\" Explain the crucial difference, and give a concrete example showing they are not the same thing. (3 steps)", "answer": "- Step 1: Resistance $$R$$ is a property of a *specific object* — it depends on the material *and* the object's geometry (length and cross-sectional area). Resistivity $$\\rho$$ is a property of the *material alone*, independent of shape or size.\n- Step 2: From $$R = \\rho L / A$$: two wires of the same copper ($$\\rho \\approx 1.7 \\times 10^{-8}\\;\\Omega\\text{m}$$) can have wildly different resistances. A short, thick copper busbar might have $$R \\approx 10^{-6}\\;\\Omega$$, while a long, thin copper wire in a transformer coil might have $$R \\approx 100\\;\\Omega$$. Same resistivity, different resistances.\n- Step 3: The physical intuition: resistivity measures \"how stubborn this material is about conducting, per unit geometry.\" A long thin wire has more resistance because the electrons must travel further (more obstacles) through a narrower corridor (fewer parallel paths) — but the *intrinsic* difficulty of moving through the material hasn't changed.\n\n+ Analogy: resistivity is like the \"difficulty of walking through mud per metre.\" Resistance is \"how tired you get walking a specific mud-path of specific width for a specific distance.\" Same mud, different paths, different total effort.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "Why does power dissipated in a resistor scale as $$I^2$$, not just $$I$$? What's the physical reason for the square? (3 steps)", "answer": "- Step 1: Voltage across a resistor is itself proportional to current: $$V = IR$$. So doubling $$I$$ doubles $$V$$.\n- Step 2: Power is energy per second = (energy per coulomb) × (coulombs per second) = $$V \\times I$$. If you double $$I$$, you double *both* the voltage drop *and* the rate of charge flow.\n- Step 3: Hence $$P = VI = (IR)(I) = I^2 R$$ — the square comes from the fact that current independently raises both the \"energy per coulomb\" and the \"coulombs per second\" factors.\n\nThis is why doubling current quadruples heat, and why thick wires (low $$R$$) carry current efficiently.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "Two resistors $$R_1 = 2\\ \\Omega$$ and $$R_2 = 8\\ \\Omega$$ in parallel sit across a 4 V source. Which dissipates more power, and by what factor? (2 steps)", "answer": "- Step 1: Same voltage $$V = 4$$ V across both. Use $$P = V^2/R$$: $$P_1 = 16/2 = 8$$ W; $$P_2 = 16/8 = 2$$ W.\n- Step 2: Now $$R_1$$ (the smaller one) dissipates 4× more power. Intuition: at the same voltage, the smaller resistor draws more current ($$I = V/R$$), and $$P = VI$$ scales with current. Smaller $$R$$ wins.\n\nCompare to Q35: series → big-R wins; parallel → small-R wins. The flip is the whole point.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "Sketch the qualitative I–V graph for an ideal diode and explain where resistance is infinite, where it's zero, and where it's non-trivial. (3 steps)", "answer": "- Step 1: For $$V < V_{forward}$$ (including all reverse bias): current is zero. The graph sits flat on the V-axis. Here $$R = V/I = V/0 \\to \\infty$$. The diode blocks current.\n- Step 2: At $$V = V_{forward}$$: the diode \"turns on\" abruptly. For $$V > V_{forward}$$: the curve rises vertically (idealised). Here $$R = V/I \\to 0$$ as the curve becomes vertical. The diode conducts freely.\n- Step 3: At the turn-on point itself: the curve has a sharp corner. The resistance transitions discontinuously. Real diodes smooth this corner into an exponential, but for \"ideal diode\" MCQs treat it as a step.\n\nMemorise: ideal diode is a switch — infinite $$R$$ when off, zero $$R$$ when on.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "Why must you always check which component a voltmeter is connected across before predicting how its reading will change? Give a specific example where the same circuit change causes opposite voltmeter verdicts. (2 steps)", "answer": "- Step 1: A voltmeter measures the potential difference across the specific component it's connected to. Two components in series share the total voltage, so when one component's voltage goes up, the other's must go down (by conservation: $$V_1 + V_2 = \\varepsilon$$). The voltmeter's verdict depends entirely on which side of this seesaw it's measuring.\n- Step 2: Example from Q7: an NTC thermistor is heated in series with a fixed resistor. The thermistor's resistance falls, so its share of the voltage falls ($$V_T$$ decreases) and the fixed resistor's share rises ($$V_F$$ increases). A voltmeter across the thermistor reads *lower*; a voltmeter across the fixed resistor reads *higher*. Same circuit, same change, opposite voltmeter answers.\n\n+ The current's behaviour (ammeter reading) is the same regardless — only the voltmeter's answer depends on placement.", "source": "GLM 5.1 ②", "_id": "glm_2_52"}, {"question": "A student calculates that the power dissipated in a resistor drops from $$100 \\, W$$ to $$30 \\, W$$ when internal resistance changes. They claim \"the power reduces by 70%\". Explain why \"reduces by 70%\" is mathematically different from \"reduces to 70%\", and what the correct percentage is for a drop from $$100 \\, W$$ to $$30 \\, W$$. (3 steps)", "answer": "- Step 1: \"Reduces to 70%\" means the final value is 70% of the original, so the ratio $$\\frac{P_{new}}{P_{old}} = 0.70$$ (a 30% reduction).\n- Step 2: \"Reduces by 70%\" means 70% of the original value has been subtracted, leaving only 30% of the original. So the ratio $$\\frac{P_{new}}{P_{old}} = 0.30$$.\n- Step 3: For a drop from $$100 \\, W$$ to $$30 \\, W$$, the ratio is $$\\frac{30}{100} = 0.30$$, meaning the power reduces TO 30%, or reduces BY 70%. Examiners penalise mixing these phrases; you must quote the exact comparison number (0.30 or 30%) to justify your conclusion.\n\nTakeaway: \"Reduces by X%\" means you subtract X%; \"reduces to X%\" means you end up at X%.", "source": "GLM 5.1 ③", "_id": "glm_3_26"}, {"question": "Why is it dangerous to reason about \"voltmeter goes up or down\" purely in your head, and what's the safer method Alex recommends? (3 steps)", "answer": "- Step 1: Hand-waving like \"if resistance goes down, voltage goes down\" misses that *both* $$I$$ and $$R$$ are changing — you have to track which one wins in the product $$V = IR$$.\n- Step 2: The safer method: draw the circuit, assign concrete numbers (e.g. $$\\varepsilon = 12$$ V, $$R_F = 2\\ \\Omega$$, $$R_T = 4\\ \\Omega$$ initially, then $$R_T = 1\\ \\Omega$$ after heating).\n+ Compute $$R_{total}$$, then $$I = \\varepsilon/R_{total}$$, then $$V$$ across the specific meter.\n+ Compare before/after numerically.\n- Step 3: Concrete numbers expose the dominant effect and remove ambiguity. It takes 30 seconds and eliminates any chance of fooling yourself with intuition.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "A student claims that in a metal, heating increases resistance because the atoms vibrate more and scatter electrons more frequently. However, in an NTC thermistor (semiconductor), heating decreases resistance. Explain this difference using the drift velocity equation. (3 steps)", "answer": "- Step 1: In a metal, the number density $$n$$ of free electrons is fixed (metal already has many free electrons). Heating increases lattice vibrations, which decreases the drift velocity $$v$$ for the same electric field. Since $$I = nAvq$$, lower $$v$$ means lower $$I$$, so resistance increases (positive temperature coefficient).\n- Step 2: In a semiconductor (NTC thermistor), heating releases many more charge carriers — $$n$$ increases dramatically.\n- Step 3: The large increase in $$n$$ dominates over the small decrease in $$v$$, so overall $$I$$ increases for the same voltage, meaning resistance decreases (negative temperature coefficient).\n\n**Key insight:** Same equation, different dominant factor — in metals $$v$$ changes, in semiconductors $$n$$ changes.", "source": "MiniMax ②", "_id": "minimax_2_11"}, {"question": "Starting from $$I = nAvq$$, derive the expression for drift velocity $$v$$ and explain physically what each symbol represents. (3 steps)", "answer": "- Step 1: $$I = nAvq$$ says: current = (carriers per m³) × (cross-section in m²) × (drift speed in m/s) × (charge per carrier in C). Dimensionally, $$[m^{-3}][m^2][m\\,s^{-1}][C] = C\\,s^{-1} = A$$. ✓\n- Step 2: To isolate $$v$$, divide both sides by $$nAq$$:\n$$v = \\frac{I}{nAq}$$\n- Step 3: Interpretation:\n+ $$n$$ = number density of charge carriers (how *many* are available).\n+ $$A$$ = cross-section (how *wide* the pipe is).\n+ $$q$$ = charge each carrier carries (size of each \"packet\").\n+ The drift velocity is what's left over once we account for how many carriers, how fat the wire is, and how big each charge is — it's the average forward speed of the carriers.\n\nTakeaway: large $$I$$ doesn't require large $$v$$ — copper has so many electrons ($$n \\sim 10^{28}$$) that $$v$$ is tiny (fractions of mm/s).", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "A common intuition is that electrons in a wire \"zoom along\" at close to the speed of light. Using $$I = nAvq$$, explain why the actual drift velocity in a typical copper wire is only about 0.1 mm/s. (3 steps)", "answer": "- Step 1: Rearrange for drift velocity: $$v = I / (nAq)$$. For a typical wire carrying about 1 A, with $$n \\approx 8.4 \\times 10^{28}\\;\\text{m}^{-3}$$, $$A \\approx 5 \\times 10^{-7}\\;\\text{m}^2$$, and $$q = 1.6 \\times 10^{-19}\\;\\text{C}$$.\n- Step 2: The denominator is enormous: $$nAq = (8.4 \\times 10^{28})(5 \\times 10^{-7})(1.6 \\times 10^{-19}) \\approx 6.7 \\times 10^3\\;\\text{C/m}$$. There are *so many* charge carriers per unit volume in a metal that even a tiny drift velocity produces a significant current.\n- Step 3: So $$v \\approx 1 / 6700 \\approx 1.5 \\times 10^{-4}\\;\\text{m/s}$$ — a fraction of a millimetre per second. The electrical signal propagates at near light speed (it's an electromagnetic wave), but the actual charge carriers barely crawl. Analogy: a crowded corridor — the \"push\" travels fast, but each person shuffles slowly.\n\n+ Misconception: \"the light turns on instantly, so electrons must be fast.\" No — the *field* establishes almost instantly; the electrons themselves drift very slowly.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "Why does adding more resistors in parallel reduce total resistance? Explain via the water pipe analogy and the formula derivation. (3 steps)", "answer": "- Step 1: **Water analogy** - Imagine multiple pipes (resistors) in parallel. More pipes provide more pathways for water (current), reducing overall flow resistance.\n- Step 2: **Formula derivation** - For resistors in parallel, 1/R_total = 1/R₁ + 1/R₂ + ... Each resistor adds a conductance pathway (1/R), so total conductance increases ⇒ R_total decreases.\n+ Example: Two 5Ω resistors: 1/R_total = 1/5 + 1/5 = 2/5 ⇒ R_total = 2.5Ω (smaller than smallest individual resistor)\n- Step 3: **Edge case** - If one resistor is zero (wire), all current flows through it ⇒ R_total = 0. Shows why even one low-resistance path drastically reduces R_total.", "source": "Qwen 3 ①", "_id": "qwen_1_0"}, {"question": "Alex's method for any \"does the reading increase or decrease?\" circuit question is: \"draw it and put numbers on it.\" Explain what this means by walking through a concrete example with a 12 V battery, a 4 Ω fixed resistor, and an NTC thermistor that drops from 8 Ω to 2 Ω when heated. The voltmeter is across the thermistor. (3 steps)", "answer": "- Step 1: Before heating: $$R_{\\text{total}} = 4 + 8 = 12\\;\\Omega$$, $$I = 12/12 = 1.0\\;\\text{A}$$, $$V_T = IR_T = 1.0 \\times 8 = 8.0\\;\\text{V}$$. After heating: $$R_{\\text{total}} = 4 + 2 = 6\\;\\Omega$$, $$I = 12/6 = 2.0\\;\\text{A}$$, $$V_T = IR_T = 2.0 \\times 2 = 4.0\\;\\text{V}$$.\n- Step 2: The current doubled (1.0 → 2.0 A), but the thermistor's resistance fell by a factor of 4 (8 → 2 Ω). The product $$V_T = I \\times R_T$$ went from 8 V to 4 V — it halved. The voltage across the fixed resistor went from $$1.0 \\times 4 = 4\\;\\text{V}$$ to $$2.0 \\times 4 = 8\\;\\text{V}$$ — it doubled.\n- Step 3: The numbers make the answer unambiguous and eliminate the \"which effect dominates?\" ambiguity. The total is always conserved: $$V_T + V_F = 8 + 4 = 12 = 4 + 8 = 12\\;\\text{V}$$. ✓\n\n+ This is why concrete numbers beat mental hand-waving: you can *see* the answer and verify conservation of voltage at the same time.", "source": "GLM 5.1 ②", "_id": "glm_2_28"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "What is the relationship between current ($$I$$), charge ($$Q$$), and time ($$t$$), and what does it physically mean? (2 steps)", "answer": "- Step 1: The formula is $$I = \\frac{\\Delta Q}{\\Delta t}$$, which rearranges to $$\\Delta Q = I \\Delta t$$. This means current is the *rate of flow of charge*.\n- Step 2: Physically, 1 Ampere means 1 Coulomb of charge passes a point every second. If you integrate current over time, you get the total charge transferred, which is the basis for calculating charge in scenarios like lightning strikes.\n\nCurrent is the flow rate of charge; integrate it over time to get the total amount.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A constant current of 4 A flows through a wire for 5 seconds. How much charge is transferred? (1 step)", "answer": "- Step 1: Use $$\\Delta Q = I \\Delta t = 4 \\times 5 = 20 \\text{ C}$$. Five seconds at 4 coulombs per second gives 20 coulombs.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "What is the defining equation for resistance, and why does an ideal diode in reverse bias have \"infinite\" resistance? (2 steps)", "answer": "- Step 1: Resistance is defined by $$R = \\frac{V}{I}$$. It is the ratio of potential difference across a component to the current through it.\n- Step 2: For an ideal diode in reverse bias, the voltage $$V$$ is large (non-zero), but the current $$I$$ is exactly 0. Because $$R = \\frac{V}{0}$$, the resistance approaches infinity. Infinite resistance means zero current, not zero voltage.\n\nInfinite resistance is determined by the current axis ($$I=0$$), not the voltage axis.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "Electrical power can be expressed as $$P = IV$$, $$P = I^2R$$, and $$P = V^2/R$$. How do you choose which form to use, and which one represents \"resistance heating\"? (2 steps)", "answer": "- Step 1: Choose the form based on the quantities you already know. If you know $$V$$ and $$I$$, use $$P = IV$$. If you know $$I$$ and $$R$$, use $$P = I^2R$$. If you know $$V$$ and $$R$$, use $$P = V^2/R$$.\n- Step 2: $$P = I^2R$$ is specifically labeled as \"resistance heating\" because it directly shows that the heat dissipated by a resistor depends on the square of the current passing through it and its resistance.\n\nMatch the power formula to the variables you hold constant or already know.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "How do total resistance, current, and voltage distribute across resistors in series? (2 steps)", "answer": "- Step 1: Resistances add directly: $$R_{total} = R_1 + R_2 + R_3 + \\dots$$. Adding a resistor in series always increases total resistance.\n- Step 2: The current $$I$$ is the same through every component. The total voltage is the sum of the individual voltages ($$V_{total} = V_1 + V_2 + \\dots$$), meaning the supply voltage is \"shared\" among the components proportionally to their resistance.\n\nSeries circuits share voltage but maintain the same current throughout.", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "How do total resistance, current, and voltage distribute across resistors in parallel? (2 steps)", "answer": "- Step 1: The reciprocal of the total resistance equals the sum of the reciprocals of individual resistances: $$\\frac{1}{R_{total}} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\dots$$. Adding a resistor in parallel always *decreases* total resistance.\n- Step 2: The voltage $$V$$ is the same across every parallel branch. The total current is the sum of the branch currents ($$I_{total} = I_1 + I_2 + \\dots$$).\n\nParallel circuits share current across branches but maintain the same voltage across each.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "You calculate the parallel resistance of two resistors and get $$\\frac{1}{R_{total}} = 0.4$$. What is the common trap students fall into here, and what is the correct $$R_{total}$$? (2 steps)", "answer": "- Step 1: The common trap is forgetting the final reciprocal flip. Students often write $$R_{total} = 0.4 \\, \\Omega$$, which is wrong.\n- Step 2: The formula gives you $$\\frac{1}{R_{total}}$$, so you must take the reciprocal one more time. $$\\frac{1}{R_{total}} = 0.4$$ means $$R_{total} = \\frac{1}{0.4} = 2.5 \\, \\Omega$$.\n\nAlways perform the final \"1 over\" step in parallel resistance calculations.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "Why is the total resistance of a parallel circuit always smaller than the smallest individual resistor in the combination? (2 steps)", "answer": "- Step 1: Think of a resistor as a narrow pipe restricting water flow. Putting pipes in parallel adds a *new pathway* for the water, regardless of how narrow that new pipe is.\n- Step 2: Even if the new pipe is very narrow (high resistance), it still allows *some* extra current to flow. More total current for the same voltage means lower total resistance ($$R = V/I$$).\n\nAdding any new path increases total flow, reducing total resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "A $$4 \\, \\Omega$$ and a $$6 \\, \\Omega$$ resistor are connected in parallel. What is their total resistance? (2 steps)", "answer": "- Step 1: Write the reciprocal equation: $$\\frac{1}{R_{total}} = \\frac{1}{4} + \\frac{1}{6} = \\frac{3}{12} + \\frac{2}{12} = \\frac{5}{12}$$.\n- Step 2: Take the reciprocal to find $$R_{total}$$: $$R_{total} = \\frac{12}{5} = 2.4 \\, \\Omega$$. Notice it is smaller than the smallest resistor ($$4 \\, \\Omega$$).", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "What is the formula linking resistance, resistivity, length, and cross-sectional area? Also, explain why the unit of resistivity is $$\\Omega \\cdot m$$ and not $$\\Omega \\cdot m^{-1}$$. (3 steps)", "answer": "- Step 1: The formula is $$R = \\frac{\\rho L}{A}$$, which rearranges to $$\\rho = \\frac{RA}{L}$$.\n- Step 2: To find the unit of $$\\rho$$, substitute the units of $$R$$, $$A$$, and $$L$$: $$\\frac{[\\Omega][m^2]}{[m]}$$.\n- Step 3: The metres simplify to $$\\Omega \\cdot m$$. The metre is in the numerator, so $$\\Omega \\cdot m^{-1}$$ is a classic dropped-mark error.\n\nResistivity units have the metre on top because area ($$m^2$$) is divided by length ($$m$$).", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "What is the conceptual difference between resistance and resistivity? (2 steps)", "answer": "- Step 1: Resistance $$R$$ is a property of a specific *object* (a specific wire). It depends on the object's shape: a long, thin wire has higher resistance than a short, fat wire of the same material.\n- Step 2: Resistivity $$\\rho$$ is a property of the *material* itself (e.g., copper), independent of the sample's shape. It tells you how intrinsically difficult it is for current to flow through that substance.\n\nResistance is shape-dependent; resistivity is a material constant.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "In Core Practical 7, you determine the resistivity of a wire by varying its length. How do you process the data graphically, and what specific measurement must you take to find the area? (3 steps)", "answer": "- Step 1: Measure the diameter $$d$$ of the wire at several points using a micrometer (checking for zero error and non-circular cross-section) and average it. Compute area $$A = \\frac{1}{4}\\pi d^2$$.\n- Step 2: Measure resistance $$R = V/I$$ for several different lengths $$L$$ of the wire.\n- Step 3: Plot a graph of $$R$$ (y-axis) against $$L$$ (x-axis). Since $$R = (\\frac{\\rho}{A})L$$, the gradient is $$\\frac{\\rho}{A}$$. Multiply the gradient by $$A$$ to find $$\\rho$$.\n\nGraphing $$R$$ vs $$L$$ linearizes the relationship, making the gradient proportional to resistivity.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "The data booklet gives resistivity as $$R = \\frac{\\rho L}{A}$$. How do you safely rearrange this to find $$\\rho$$, and what is a common inversion mistake? (2 steps)", "answer": "- Step 1: Multiply both sides by $$A$$ to get $$RA = \\rho L$$, then divide by $$L$$ to get $$\\rho = \\frac{RA}{L}$$. Always start from the data booklet form to avoid inverting the fraction.\n- Step 2: The common mistake is recalling from memory as $$\\rho = \\frac{RL}{A}$$, which is upside down. Remember: Resistance increases with Length ($$L$$ on top) and decreases with Area ($$A$$ on bottom).\n\nAnchor to the data booklet formula and rearrange algebraically to avoid inversion errors.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "What is the transport equation relating current to the microscopic properties of a wire? (2 steps)", "answer": "- Step 1: The equation is $$I = nAvq$$, where $$n$$ is the number density of charge carriers (per $$m^3$$), $$A$$ is cross-sectional area ($$m^2$$), $$v$$ is drift velocity ($$m/s$$), and $$q$$ is the charge per carrier (Coulombs).\n- Step 2: To find drift velocity, rearrange to $$v = \\frac{I}{nAq}$$. For electrons, $$q = e = 1.60 \\times 10^{-19}$$ C.\n\nDrift velocity is directly proportional to current and inversely proportional to carrier density, area, and charge.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "A typical drift velocity in a copper wire is a fraction of a millimetre per second. If electrons move so slowly, why does a light bulb turn on instantly when you flip the switch? (2 steps)", "answer": "- Step 1: The switch closes the circuit, and the electric field propagates through the wire at near the speed of light.\n- Step 2: This field causes *all* the free electrons in the wire to start drifting simultaneously. The bulb lights up from the energy delivered by the electrons already near the filament, not from electrons traveling from the power station.\n\nThe signal (electric field) travels fast; the actual charge carriers drift slowly.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "How does the transport equation $$I = nAvq$$ explain the opposite temperature-resistance behaviors of a metal wire vs an NTC thermistor? (3 steps)", "answer": "- Step 1: In a metal, $$n$$ is fixed. Heating makes the lattice vibrate more, impeding electron flow, so drift velocity $$v$$ falls. Since $$I$$ falls for the same $$V$$, resistance increases (positive temperature coefficient).\n- Step 2: In an NTC (Negative Temperature Coefficient) thermistor, which is a semiconductor, heating releases far more charge carriers, so $$n$$ rises rapidly.\n- Step 3: The large increase in $$n$$ beats the small fall in $$v$$, so total current $$I$$ rises for the same $$V$$. Therefore, resistance falls as temperature rises.\n\nMetals: lattice vibrations dominate ($$R$$ goes up). Semiconductors: carrier generation dominates ($$R$$ goes down).", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "Define \"electromotive force (e.m.f.)\" of a source. Why is it wrong to say \"energy per charge particle\"? (2 steps)", "answer": "- Step 1: e.m.f. is the energy converted from other forms into electrical energy *per unit charge* passing through the source. Units are Joules per Coulomb = Volts.\n- Step 2: \"Per charge particle\" implies per electron, which carries only $$1.6 \\times 10^{-19}$$ C. \"Per unit charge\" means per Coulomb ($$\\approx 6.24 \\times 10^{18}$$ electrons). The wording \"per unit charge\" is essential for accuracy.\n\ne.m.f. is per Coulomb, not per electron.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "How is a real cell modelled in a circuit, and what is the equation linking e.m.f., terminal p.d., current, and internal resistance? (2 steps)", "answer": "- Step 1: A real cell is modelled as a perfect e.m.f. $$\\varepsilon$$ in series with a small internal resistance $$r$$.\n- Step 2: The equation is $$\\varepsilon = V + Ir$$ (or $$\\varepsilon = I(R+r)$$ and $$V = \\varepsilon - Ir$$), where $$V$$ is the terminal p.d. When current flows, some voltage is \"lost\" across $$r$$ ($$Ir$$), so $$V$$ is always less than $$\\varepsilon$$.\n\nThe \"lost volts\" ($$Ir$$) explain why terminal p.d. drops under load.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "A cell of e.m.f. $$12.0 \\, V$$ has a terminal p.d. of $$11.8 \\, V$$ when driving a current of $$2.0 \\, A$$. What is the internal resistance of the cell? (2 steps)", "answer": "- Step 1: Use the equation $$\\varepsilon = V + Ir$$. Rearrange to solve for $$r$$: $$r = \\frac{\\varepsilon - V}{I}$$.\n- Step 2: Substitute the values: $$r = \\frac{12.0 - 11.8}{2.0} = \\frac{0.2}{2.0} = 0.1 \\, \\Omega$$. The \"lost volts\" ($$0.2 \\, V$$) are dropped across this internal resistance.\n\nInternal resistance is simply the lost volts divided by the current.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "Describe the graphical method to determine the e.m.f. and internal resistance of a cell. (3 steps)", "answer": "- Step 1: Vary the external load resistance and record several pairs of terminal p.d. $$V$$ and current $$I$$.\n- Step 2: Plot $$V$$ on the y-axis against $$I$$ on the x-axis. The equation $$V = \\varepsilon - Ir$$ takes the form $$y = c + mx$$.\n- Step 3: The y-intercept is the e.m.f. $$\\varepsilon$$. The gradient is $$-r$$, so internal resistance is the negative of the gradient ($$r = -\\frac{\\Delta V}{\\Delta I}$$). Keep the minus sign explicit because the line slopes down.\n\nThe V-I graph translates the circuit equation into a straight line: intercept for e.m.f., negative gradient for internal resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": true}, {"question": "Two resistors $$R_1$$ and $$R_2$$ are in series across an input voltage $$V_{in}$$. Derive the formula for the output voltage $$V_{out}$$ across $$R_2$$. (3 steps)", "answer": "- Step 1: In series, the current is $$I = \\frac{V_{in}}{R_1 + R_2}$$. The voltage divides in proportion to resistance: $$\\frac{V_1}{R_1} = \\frac{V_2}{R_2}$$.\n- Step 2: The output voltage $$V_{out}$$ is the p.d. across $$R_2$$, so by Ohm's law $$V_{out} = I \\times R_2$$.\n- Step 3: Substitute the series current: $$V_{out} = \\left(\\frac{V_{in}}{R_1 + R_2}\\right) R_2 = V_{in} \\frac{R_2}{R_1 + R_2}$$. The output is the fraction of the input determined by $$R_2$$'s share of the total resistance.\n\nA potential divider outputs a fraction of the input voltage based on the ratio of resistances.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "How do the resistances of an LDR and an NTC thermistor change with their respective environmental conditions? (2 steps)", "answer": "- Step 1: LDR (Light-Dependent Resistor): As it gets brighter, resistance decreases (more light energy frees more charge carriers).\n- Step 2: NTC (Negative Temperature Coefficient) thermistor: As temperature increases, resistance decreases. \"Negative\" means the temperature coefficient is negative—temp goes up, resistance goes down.\n\nBoth sensors decrease resistance when their respective environmental intensities increase.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "An NTC thermistor is in series with a fixed resistor and a battery. If the temperature increases, how do the total current and the voltage across the *fixed* resistor change? (3 steps)", "answer": "- Step 1: Temp up $$\\Rightarrow$$ NTC resistance $$R_T$$ down $$\\Rightarrow$$ Total resistance $$R_{total}$$ down.\n- Step 2: By $$I = \\frac{\\varepsilon}{R_{total}}$$, the total current increases (ammeter reading goes up).\n- Step 3: Voltage across the fixed resistor is $$V_F = I \\times R_F$$. Since $$I$$ increases and $$R_F$$ is constant, $$V_F$$ increases.\n\nIf the voltmeter is across the fixed resistor, both current and voltage increase.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "In a series circuit with a battery, a fixed resistor, and an NTC thermistor, why does the voltmeter's reading trend (increasing or decreasing) depend entirely on which component it is placed across? (3 steps)", "answer": "- Step 1: The total current is shared by all components in series. If thermistor resistance drops, total resistance drops, so total current $$I$$ increases for all.\n- Step 2: If the voltmeter is across the fixed resistor, $$V_{fixed} = I \\times R_{fixed}$$. Both $$I$$ and $$R_{fixed}$$ are up/constant, so $$V_{fixed}$$ increases.\n- Step 3: If the voltmeter is across the thermistor, $$V_{therm} = I \\times R_{therm}$$. $$I$$ increases, but $$R_{therm}$$ decreases faster (because the share of e.m.f. shifts to the fixed resistor), so $$V_{therm}$$ decreases.\n\nCurrent behaves the same everywhere, but voltage shifts depending on which component dominates the resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "A student claims the power \"reduces to 70%\" of its original value. Another student claims it \"reduces by 70%\". What is the final power ratio ($$P_{new}/P_{old}$$) in each claim? (2 steps)", "answer": "- Step 1: \"Reduces TO 70%\" means the new value is 70% of the old value, so the ratio $$\\frac{P_{new}}{P_{old}} = 0.70$$.\n- Step 2: \"Reduces BY 70%\" means 70% of the value is lost, leaving only 30%, so the ratio $$\\frac{P_{new}}{P_{old}} = 0.30$$. Exact wording is critical for marks.\n\n\"Reduces to\" sets the final value; \"reduces by\" sets the amount lost.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "The accepted resistivity of cold air is about $$10^{16} \\, \\Omega \\cdot m$$, but during a lightning strike, the calculated resistivity of the air channel is about $$0.2 \\, \\Omega \\cdot m$$. Why is there such a massive difference? (2 steps)", "answer": "- Step 1: During a lightning strike, the intense electric field rips electrons from air molecules, ionising the air into a hot conducting plasma.\n- Step 2: This plasma has vastly more free charge carriers (huge $$n$$ in $$I = nAvq$$) than ordinary insulating air. Because the number of carriers increases by a massive factor, the resistivity collapses by a factor of $$\\sim 10^{17}$$.\n\nIonisation turns insulating air into a highly conductive plasma.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": true}, {"question": "A cell with e.m.f. $$9.0 \\, V$$ and internal resistance $$0.5 \\, \\Omega$$ drives an external resistor of $$5.0 \\, \\Omega$$. What is the power dissipated in the external resistor? (2 steps)", "answer": "- Step 1: Find the current using $$I = \\frac{\\varepsilon}{R + r} = \\frac{9.0}{5.0 + 0.5} = \\frac{9.0}{5.5} \\approx 1.64 \\, A$$.\n- Step 2: Use the resistance heating formula for the load: $$P = I^2 R = (1.64)^2 \\times 5.0 \\approx 13.4 \\, W$$.\n\nTo find power in a specific resistor, you must first find the circuit current.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "What is a potentiometer, and how does it function in a circuit? (2 steps)", "answer": "- Step 1: A potentiometer is a three-terminal variable resistor. It acts as a continuously adjustable potential divider.\n- Step 2: A slider moves along a resistive track, tapping off a fraction of the input voltage. The output voltage depends on the position of the slider between the two ends.\n\nA potentiometer mechanically adjusts the ratio in a potential divider.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "On an I-V characteristic graph, at what point does a component have infinite resistance? (2 steps)", "answer": "- Step 1: Use the definition $$R = \\frac{V}{I}$$. Resistance approaches infinity as the denominator $$I$$ approaches zero.\n- Step 2: Therefore, infinite resistance occurs wherever the curve sits on the horizontal axis ($$I = 0$$). It does NOT occur at the origin where $$V = 0$$ (which gives $$R = 0$$). An ideal diode in reverse bias has $$I=0$$ and thus infinite resistance.\n\nInfinite resistance means zero current, regardless of the voltage applied.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}], "count": 29}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "A current of 2 A flows through a wire for 5 seconds. Without doing any multiplication, explain what physical quantity the product $$I \\times t$$ represents and why. (2 steps)", "answer": "- Step 1: The defining equation for current is $$I = \\frac{\\Delta Q}{\\Delta t}$$, which rearranges to $$\\Delta Q = I \\cdot \\Delta t$$. The product of current and time gives the total charge that has flowed past a point in the circuit.\n- Step 2: Physically, this is because current is the *rate* of flow of charge — coulombs per second — so multiplying by seconds cancels the time unit and leaves coulombs. For the numbers given: $$Q = 2 \\times 5 = 10$$ C. One ampere = one coulomb per second, so two amperes for five seconds delivers ten coulombs.\n\nThe key insight: current is a rate, and multiplying a rate by a time always yields a total amount.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "The definition of resistance is $$R = V / I$$. Using only this definition and the unit of voltage (volt = joule per coulomb), derive the unit of resistance and show it equals $$\\text{V A}^{-1}$$. (2 steps)", "answer": "- Step 1: Substitute the units into $$R = V/I$$. Voltage has units of joules per coulomb ($$\\text{J C}^{-1}$$), and current has units of coulombs per second ($$\\text{C s}^{-1}$$). So: $$[R] = \\frac{\\text{J C}^{-1}}{\\text{C s}^{-1}} = \\frac{\\text{J}}{\\text{C}} \\times \\frac{\\text{s}}{\\text{C}} = \\frac{\\text{J s}}{\\text{C}^2}$$.\n- Step 2: More practically, since 1 V = 1 J/C and 1 A = 1 C/s, we simply write $$[R] = \\frac{\\text{V}}{\\text{A}} = \\text{V A}^{-1}$$, which is given the name \"ohm\" ($$\\Omega$$). One ohm means one volt drives one ampere through the component.\n\nThe ohm is a derived unit — it collapses to $$\\text{kg m}^2 \\text{s}^{-3} \\text{A}^{-2}$$ in base SI, but $$\\text{V A}^{-1}$$ is how you should think of it.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "There are three equivalent formulas for electrical power: $$P = VI$$, $$P = I^2R$$, and $$P = V^2/R$$. Given a circuit where you know the current through a resistor and its resistance (but not the voltage across it), which formula should you use and why? (2 steps)", "answer": "- Step 1: Identify which quantities are known. You have $$I$$ and $$R$$, but not $$V$$. You need a formula that contains only $$I$$ and $$R$$ on the right-hand side.\n- Step 2: $$P = I^2R$$ uses exactly $$I$$ and $$R$$ — no voltage needed. You *could* first calculate $$V = IR$$ and then use $$P = VI$$, but that introduces an extra step and a rounding risk. Go directly with $$P = I^2R$$.\n\n+ If instead you knew $$V$$ and $$R$$ but not $$I$$: use $$P = V^2/R$$.\n+ If you knew $$V$$ and $$I$$ directly: use $$P = VI$$.\n\nThe rule: choose the power formula that uses the two quantities you already have, avoiding unnecessary intermediate calculations.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": true}, {"question": "Alex's mind map labels $$P = I^2R$$ as \"caused by current — resistance heating.\" Why is $$I^2R$$ the natural form for describing how much heat a resistor dissipates, rather than $$V^2/R$$? (2 steps)", "answer": "- Step 1: In a series circuit, the *same current* flows through every component. The heat generated in each resistor depends on how much current is being pushed through it and how much it resists that flow. The formula $$P = I^2R$$ directly shows: double the current → four times the heating (it scales as the *square* of current).\n- Step 2: The form $$V^2/R$$ is mathematically equivalent (via $$V = IR$$), but it foregrounds voltage, which is *different* across each series resistor. When you're thinking \"same current, different resistances, how much heat in each one?\", $$I^2R$$ is the form that matches the physical story — the current is the common cause, and the resistance determines how effectively it converts electrical energy to heat.\n\nThis is why $$I^2R$$ is called \"Joule heating\" or \"ohmic heating\" — the current is the agent doing the heating.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "In a series circuit with three resistors, state two quantities that are the same for all three and one quantity that adds. (2 steps)", "answer": "- Step 1: The same current flows through every component in series: $$I = I_1 = I_2 = I_3$$. There is only one path, so all charge must pass through each resistor in turn.\n- Step 2: The potential differences add: $$V_{\\text{total}} = V_1 + V_2 + V_3$$. Each resistor \"uses up\" some of the voltage, and the total drop equals the supply voltage. The resistances also add: $$R_{\\text{total}} = R_1 + R_2 + R_3$$.\n\n+ What is the same: current $$I$$.\n+ What adds: voltages $$V$$ and resistances $$R$$.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Why does adding a resistor in series *always* increase the total resistance, even if the added resistor has a very small value? (2 steps)", "answer": "- Step 1: The series rule is $$R_{\\text{total}} = R_1 + R_2 + R_3 + \\cdots$$. Every term on the right is positive (resistances are always positive for passive components), so each additional resistor adds a positive quantity to the sum.\n- Step 2: Even a \"very small\" resistor like 0.01 Ω still makes the total larger: if $$R_{\\text{total}}$$ was 5.00 Ω, it becomes 5.01 Ω. The increase may be negligible, but it is never zero or negative. Physically, you're forcing the current through an additional obstacle — no matter how small, it can only make the overall opposition to current flow greater, never less.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "In a parallel circuit with three branches, state two quantities that are the same for all three branches and one quantity that adds. (2 steps)", "answer": "- Step 1: The same potential difference appears across every branch in parallel: $$V = V_1 = V_2 = V_3$$. Each branch is connected directly across the same two nodes of the circuit, so they all share the full supply voltage.\n- Step 2: The currents add: $$I_{\\text{total}} = I_1 + I_2 + I_3$$. The supply current splits at the junction, with each branch carrying a portion. The reciprocals of resistance also add: $$\\frac{1}{R_{\\text{total}}} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\frac{1}{R_3}$$.\n\n+ What is the same: voltage $$V$$.\n+ What adds: currents $$I$$ and reciprocals of resistance $$1/R$$.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "Adding a resistor in parallel *always* decreases the total resistance. Intuitively, why does giving current an *extra path* reduce the overall opposition to flow? (3 steps)", "answer": "- Step 1: Think of each resistor as a narrow pipe restricting water flow. One pipe allows a certain flow rate. Adding a second pipe in parallel gives the water a second route — even if the second pipe is very narrow, the total flow rate can only increase or stay the same, never decrease.\n- Step 2: Electrically, adding a parallel branch increases the total current drawn from the supply (currents add: $$I_{\\text{total}} = I_1 + I_2$$). Since the supply voltage $$V$$ is unchanged and $$R_{\\text{total}} = V / I_{\\text{total}}$$, a larger total current means a smaller total resistance.\n- Step 3: Mathematically, $$\\frac{1}{R_{\\text{total}}} = \\frac{1}{R_1} + \\frac{1}{R_2}$$. Adding the second term makes the right-hand side larger, so $$1/R_{\\text{total}}$$ increases, meaning $$R_{\\text{total}}$$ decreases. The combined resistance is always *smaller* than the smallest individual resistor.\n\n+ Edge case: if the added resistor has infinite resistance (an open circuit), $$1/R_2 = 0$$ and $$R_{\\text{total}}$$ is unchanged — you've added a path that carries no current, so effectively nothing changes.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "Two 10 Ω resistors are connected in parallel. A student computes $$1/R_{\\text{total}} = 1/10 + 1/10 = 2/10 = 0.2$$ and writes \"$$R_{\\text{total}} = 0.2\\;\\Omega$$\". What mistake did they make? (2 steps)", "answer": "- Step 1: The parallel formula gives you $$1/R_{\\text{total}}$$, not $$R_{\\text{total}}$$ itself. The student's value of 0.2 is the *reciprocal* of the resistance, not the resistance. This is the single most common trap in electricity calculations.\n- Step 2: To get the actual resistance, take the reciprocal one more time: $$R_{\\text{total}} = 1 / 0.2 = 5\\;\\Omega$$. A quick sanity check: two identical resistors in parallel always give half the individual value, so $$10/2 = 5\\;\\Omega$$ — consistent.\n\n+ General rule: whenever you use the parallel formula, the *last step* must always be \"flip the final answer.\" Write $$1/R_{\\text{total}} = \\ldots$$, compute the right-hand side, then invert.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": true}, {"question": "Three identical resistors of 6 Ω each are connected in parallel. Without a calculator, determine the total resistance. (2 steps)", "answer": "- Step 1: Write the parallel formula: $$\\frac{1}{R_{\\text{total}}} = \\frac{1}{6} + \\frac{1}{6} + \\frac{1}{6} = \\frac{3}{6} = \\frac{1}{2}$$.\n- Step 2: Take the reciprocal: $$R_{\\text{total}} = 2\\;\\Omega$$. This makes sense: three identical paths each carrying equal current means the total resistance is one-third of one resistor's value. $$6/3 = 2\\;\\Omega$$.\n\n+ Quick rule for $$n$$ identical resistors $$R$$ in parallel: $$R_{\\text{total}} = R/n$$. This is a fast sanity check but only works when all resistors are equal.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "The data booklet gives $$R = \\rho L / A$$. Rearrange this to make $$\\rho$$ the subject, and explain why the metre ends up in the *numerator* of the unit Ω m. (3 steps)", "answer": "- Step 1: Start from $$R = \\frac{\\rho L}{A}$$. Multiply both sides by $$A$$: $$RA = \\rho L$$. Then divide both sides by $$L$$: $$\\rho = \\frac{RA}{L}$$.\n- Step 2: Now check the units. $$R$$ has units Ω, $$A$$ has units m², and $$L$$ has units m. So: $$[\\rho] = \\frac{\\Omega \\cdot \\text{m}^2}{\\text{m}} = \\Omega \\cdot \\text{m}$$.\n- Step 3: The metre is in the numerator because area (m²) is divided by length (m), leaving one metre on top. The classic trap is writing Ω m⁻¹ — this would be the unit of $$R/L$$ (resistance per unit length), not resistivity. Resistivity is how much resistance a *unit cube* (1 m × 1 m × 1 m) of the material has, which naturally has units of Ω m.\n\n+ Alex's tip: always rearrange from the data-booklet form $$R = \\rho L / A$$ rather than trying to recall $$\\rho = RA/L$$ from memory — one inversion error and you get the formula upside down.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "A student says \"resistivity is just another word for resistance.\" Explain the crucial difference, and give a concrete example showing they are not the same thing. (3 steps)", "answer": "- Step 1: Resistance $$R$$ is a property of a *specific object* — it depends on the material *and* the object's geometry (length and cross-sectional area). Resistivity $$\\rho$$ is a property of the *material alone*, independent of shape or size.\n- Step 2: From $$R = \\rho L / A$$: two wires of the same copper ($$\\rho \\approx 1.7 \\times 10^{-8}\\;\\Omega\\text{m}$$) can have wildly different resistances. A short, thick copper busbar might have $$R \\approx 10^{-6}\\;\\Omega$$, while a long, thin copper wire in a transformer coil might have $$R \\approx 100\\;\\Omega$$. Same resistivity, different resistances.\n- Step 3: The physical intuition: resistivity measures \"how stubborn this material is about conducting, per unit geometry.\" A long thin wire has more resistance because the electrons must travel further (more obstacles) through a narrower corridor (fewer parallel paths) — but the *intrinsic* difficulty of moving through the material hasn't changed.\n\n+ Analogy: resistivity is like the \"difficulty of walking through mud per metre.\" Resistance is \"how tired you get walking a specific mud-path of specific width for a specific distance.\" Same mud, different paths, different total effort.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "In Core Practical 7, you determine the resistivity of a wire by plotting a graph of $$R$$ against $$L$$. Explain why the gradient of this graph multiplied by the cross-sectional area $$A$$ gives $$\\rho$$. (3 steps)", "answer": "- Step 1: Start from $$R = \\frac{\\rho L}{A}$$. Rearrange to make $$R$$ the subject in a form resembling $$y = mx + c$$: $$R = \\frac{\\rho}{A} \\cdot L + 0$$.\n- Step 2: Comparing to $$y = mx + c$$: $$y = R$$, $$x = L$$, the gradient $$m = \\rho / A$$, and the intercept is 0 (a wire of zero length has zero resistance).\n- Step 3: Therefore $$\\rho = m \\times A = \\text{gradient} \\times A$$. You measure the gradient from the graph and multiply by the independently measured cross-sectional area to obtain resistivity.\n\n+ Why must the line go through the origin? If $$L = 0$$, there's no wire, so $$R = 0$$. A non-zero intercept would indicate a systematic error (e.g., resistance in the leads or connections).", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "In Core Practical 7, why must you measure the wire's diameter with a micrometer in *two perpendicular directions* and at *several points* along the wire? (2 steps)", "answer": "- Step 1: The cross-sectional area is calculated as $$A = \\frac{1}{4}\\pi d^2$$. Because the area depends on the *square* of the diameter, even a small error in $$d$$ gets squared — a 2% error in diameter becomes roughly a 4% error in area, which propagates directly into $$\\rho$$.\n- Step 2: Measuring in two perpendicular directions checks whether the wire is truly circular (it might be slightly oval from the manufacturing process). Measuring at several points along the wire checks for consistent thickness. If the wire varies, you average the diameters to minimise the impact of local variations. Also, always check the micrometer for zero error before measuring.\n\n+ If the wire were oval with diameters 0.50 mm and 0.54 mm, using only the 0.50 mm reading would underestimate the area and overestimate the resistivity.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "The transport equation is $$I = nAvq$$. For a copper wire carrying a current, identify what each symbol represents and give its SI unit. (5 steps)", "answer": "- Step 1: $$I$$ = current (ampere, A) — the rate of flow of charge through the wire.\n- Step 2: $$n$$ = number density of charge carriers (per cubic metre, m⁻³) — how many free electrons exist per unit volume of the material. For copper, $$n \\approx 8.4 \\times 10^{28}\\;\\text{m}^{-3}$$.\n- Step 3: $$A$$ = cross-sectional area of the conductor (square metres, m²) — the \"corridor width\" through which electrons travel.\n- Step 4: $$v$$ = mean drift velocity of the charge carriers (metres per second, m s⁻¹) — the average speed at which electrons slowly drift along the wire (not the speed of the electrical signal!).\n- Step 5: $$q$$ = charge on each carrier (coulombs, C). For electrons, $$q = e = 1.60 \\times 10^{-19}\\;\\text{C}$$.\n\nThe physical picture: in one second, the charge swept through a cross-section equals (carriers per volume) × (volume swept out = $$A \\times v$$) × (charge per carrier) = $$nAvq$$.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": true}, {"question": "A common intuition is that electrons in a wire \"zoom along\" at close to the speed of light. Using $$I = nAvq$$, explain why the actual drift velocity in a typical copper wire is only about 0.1 mm/s. (3 steps)", "answer": "- Step 1: Rearrange for drift velocity: $$v = I / (nAq)$$. For a typical wire carrying about 1 A, with $$n \\approx 8.4 \\times 10^{28}\\;\\text{m}^{-3}$$, $$A \\approx 5 \\times 10^{-7}\\;\\text{m}^2$$, and $$q = 1.6 \\times 10^{-19}\\;\\text{C}$$.\n- Step 2: The denominator is enormous: $$nAq = (8.4 \\times 10^{28})(5 \\times 10^{-7})(1.6 \\times 10^{-19}) \\approx 6.7 \\times 10^3\\;\\text{C/m}$$. There are *so many* charge carriers per unit volume in a metal that even a tiny drift velocity produces a significant current.\n- Step 3: So $$v \\approx 1 / 6700 \\approx 1.5 \\times 10^{-4}\\;\\text{m/s}$$ — a fraction of a millimetre per second. The electrical signal propagates at near light speed (it's an electromagnetic wave), but the actual charge carriers barely crawl. Analogy: a crowded corridor — the \"push\" travels fast, but each person shuffles slowly.\n\n+ Misconception: \"the light turns on instantly, so electrons must be fast.\" No — the *field* establishes almost instantly; the electrons themselves drift very slowly.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "When a metal wire is heated, its resistance *increases*. When an NTC thermistor is heated, its resistance *decreases*. Using $$I = nAvq$$, explain both behaviours. (3 steps)", "answer": "- Step 1: In a metal, the number density $$n$$ is fixed (there's a set number of free electrons per atom). When heated, the lattice ions vibrate more vigorously, increasing the frequency of collisions with drifting electrons. This reduces the drift velocity $$v$$ for a given electric field. Since $$I = nAvq$$ and $$n$$, $$A$$, $$q$$ are constant, a lower $$v$$ means a lower $$I$$ for the same voltage — i.e., higher resistance. This is a positive temperature coefficient.\n- Step 2: In an NTC (Negative Temperature Coefficient) thermistor, which is made of semiconductor material, heating *releases more charge carriers*. The number density $$n$$ increases dramatically with temperature because thermal energy promotes electrons from the valence band to the conduction band. In $$I = nAvq$$, the large increase in $$n$$ overwhelms the small decrease in $$v$$ from more lattice vibrations.\n- Step 3: The net result for the NTC thermistor: $$n$$ rises fast enough that $$I$$ increases for the same voltage, meaning resistance *decreases* with temperature. \"Negative temperature coefficient\" literally means the coefficient $$dR/dT$$ is negative.\n\n+ This is exactly the correction Alex made: a thermistor's resistance goes *down* with temperature, the opposite of a normal metallic resistor.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Define electromotive force (e.m.f.) using the exact wording required by the Edexcel specification. Why is it incorrect to say \"energy per charge particle\"? (3 steps)", "answer": "- Step 1: The specification definition: the e.m.f. of a source is *the energy converted from other forms into electrical energy per unit charge passing through the source*. Units: J C⁻¹ = V (volts).\n- Step 2: \"Per unit charge\" means per coulomb. One coulomb is the charge of approximately $$6.24 \\times 10^{18}$$ electrons. \"Per charge particle\" would mean per electron, which carries only $$1.6 \\times 10^{-19}\\;\\text{C}$$.\n- Step 3: If e.m.f. were \"energy per electron,\" the numerical value would be larger by a factor of $$6.24 \\times 10^{18}$$. A 12 V car battery delivers 12 joules per coulomb, not 12 joules per electron. Alex's correction: always write \"per unit charge\" or \"per coulomb\" — never \"per particle.\"\n\n+ Key distinction: e.m.f. is about *energy conversion inside the source* (chemical → electrical), whereas p.d. is about energy *dissipation outside the source* (electrical → other forms). Both share the unit volt, but they describe different processes.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": true}, {"question": "A real cell is modelled as a perfect e.m.f. $$\\varepsilon$$ in series with a small internal resistance $$r$$. When no current flows (open circuit), the voltmeter across the terminals reads $$\\varepsilon$$. When current flows, it reads less. Explain why, using $$V = \\varepsilon - Ir$$. (3 steps)", "answer": "- Step 1: When current $$I$$ flows, it must pass through the internal resistance $$r$$ inside the cell. By Ohm's law, a voltage $$Ir$$ is dropped across this internal resistance — this is energy converted to heat *inside the cell*, sometimes called the \"lost volts.\"\n- Step 2: The terminal potential difference is what's left after the lost volts are subtracted: $$V = \\varepsilon - Ir$$. The e.m.f. $$\\varepsilon$$ is the total energy per coulomb the cell provides; $$Ir$$ is the portion \"consumed\" internally; $$V$$ is what actually reaches the external circuit.\n- Step 3: When $$I = 0$$ (open circuit), $$Ir = 0$$, so $$V = \\varepsilon$$ — the voltmeter reads the full e.m.f. As $$I$$ increases, $$Ir$$ grows, and $$V$$ falls. This is why a car battery's terminal voltage drops under heavy load (e.g., starting the engine), even though its e.m.f. hasn't changed.\n\n+ Edge case: if $$r = 0$$ (ideal cell), then $$V = \\varepsilon$$ always — the terminal voltage never drops regardless of current. Real cells always have some internal resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": false}, {"question": "The equation $$V = \\varepsilon - Ir$$ can be rearranged into the form $$y = c + mx$$ for a graph of terminal p.d. $$V$$ (y-axis) against current $$I$$ (x-axis). Identify the y-intercept and the gradient, and explain the sign of the gradient. (3 steps)", "answer": "- Step 1: Rewrite as $$V = (-r) \\cdot I + \\varepsilon$$. Comparing to $$y = mx + c$$: the y-intercept is $$\\varepsilon$$ and the gradient is $$-r$$.\n- Step 2: The y-intercept equals the e.m.f. because when $$I = 0$$ (no external load), the terminal p.d. equals the full e.m.f. — this is the open-circuit voltage.\n- Step 3: The gradient is *negative* because as current increases, the \"lost volts\" $$Ir$$ increase, so the terminal p.d. decreases. The line slopes *downward*. To extract $$r$$: $$r = -\\text{gradient}$$, ensuring a positive value since the gradient itself is negative.\n\n+ Common trap: writing \"gradient = $$r$$\" without the minus sign. The line slopes down, so $$\\Delta V / \\Delta I < 0$$, and you must write $$r = -\\Delta V / \\Delta I$$ to get a positive resistance. Examiners require you to state both \"gradient = $$-r$$\" and \"intercept = $$\\varepsilon$$.\"", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": true}, {"question": "A cell has $$\\varepsilon = 6.0\\;\\text{V}$$ and $$r = 1.0\\;\\Omega$$. It drives a load resistor of $$R = 2.0\\;\\Omega$$. Find the current and the terminal p.d., using mental arithmetic. (3 steps)", "answer": "- Step 1: Use $$\\varepsilon = I(R + r)$$ to find the current: $$I = \\frac{\\varepsilon}{R + r} = \\frac{6.0}{2.0 + 1.0} = \\frac{6.0}{3.0} = 2.0\\;\\text{A}$$.\n- Step 2: Find the terminal p.d. using $$V = \\varepsilon - Ir = 6.0 - (2.0)(1.0) = 6.0 - 2.0 = 4.0\\;\\text{V}$$. Alternatively, $$V = IR = (2.0)(2.0) = 4.0\\;\\text{V}$$ — both methods agree.\n- Step 3: Sanity check: the \"lost volts\" are $$Ir = 2.0 \\times 1.0 = 2.0\\;\\text{V}$$, and $$V + Ir = 4.0 + 2.0 = 6.0 = \\varepsilon$$. ✓\n\n+ Notice: the terminal p.d. (4.0 V) is only 2/3 of the e.m.f. (6.0 V). When the load resistance equals twice the internal resistance, one-third of the voltage is \"lost\" internally.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "A potential divider consists of two resistors $$R_1$$ and $$R_2$$ in series across a supply $$V_{\\text{in}}$$. The output $$V_{\\text{out}}$$ is taken across $$R_2$$. Derive the potential divider formula $$V_{\\text{out}} = V_{\\text{in}} \\times \\frac{R_2}{R_1 + R_2}$$ from first principles. (3 steps)", "answer": "- Step 1: The same current $$I$$ flows through both resistors (they're in series). By Ohm's law, $$V_1 = IR_1$$ and $$V_2 = IR_2$$. The supply voltage splits: $$V_{\\text{in}} = V_1 + V_2 = I(R_1 + R_2)$$, so $$I = V_{\\text{in}} / (R_1 + R_2)$$.\n- Step 2: The output voltage across $$R_2$$ is $$V_{\\text{out}} = V_2 = IR_2 = \\frac{V_{\\text{in}}}{R_1 + R_2} \\times R_2$$.\n- Step 3: Therefore $$V_{\\text{out}} = V_{\\text{in}} \\times \\frac{R_2}{R_1 + R_2}$$. The voltage is shared in proportion to resistance: $$R_2$$ gets the fraction $$R_2 / (R_1 + R_2)$$ of the total.\n\n+ Quick check: if $$R_1 = R_2$$, then $$V_{\\text{out}} = V_{\\text{in}} / 2$$ — equal resistors split the voltage equally. If $$R_2 \\gg R_1$$, then $$V_{\\text{out}} \\approx V_{\\text{in}}$$ — most of the voltage drops across the larger resistor.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": true}, {"question": "An LDR (light-dependent resistor) is connected in a potential divider with a fixed resistor, and the output is taken across the LDR. When the light intensity *increases*, does the output voltage increase or decrease? Explain your reasoning. (3 steps)", "answer": "- Step 1: An LDR's resistance *decreases* when light intensity increases (more light → more photo-generated charge carriers → lower resistance). Let's call the LDR resistance $$R_{\\text{LDR}}$$ and the fixed resistor $$R_{\\text{fixed}}$$.\n- Step 2: The output is across the LDR, so: $$V_{\\text{out}} = V_{\\text{in}} \\times \\frac{R_{\\text{LDR}}}{R_{\\text{fixed}} + R_{\\text{LDR}}}$$.\n- Step 3: When light increases, $$R_{\\text{LDR}}$$ decreases, so the fraction $$R_{\\text{LDR}} / (R_{\\text{fixed}} + R_{\\text{LDR}})$$ decreases, and $$V_{\\text{out}}$$ *decreases*. The LDR \"claims\" a smaller share of the voltage when its resistance drops.\n\n+ If the output were taken across the *fixed* resistor instead: $$V_{\\text{out}} = V_{\\text{in}} \\times \\frac{R_{\\text{fixed}}}{R_{\\text{fixed}} + R_{\\text{LDR}}}$$, and when $$R_{\\text{LDR}}$$ decreases, the denominator decreases while the numerator stays the same, so the fraction increases — $$V_{\\text{out}}$$ would *increase*. Which component the output spans completely reverses the answer.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "An NTC thermistor and a fixed resistor form a potential divider. The output is taken across the *fixed resistor*. When temperature increases, what happens to the output voltage? (3 steps)", "answer": "- Step 1: NTC thermistor: temperature increases → $$R_T$$ decreases (negative temperature coefficient).\n- Step 2: The output across the fixed resistor: $$V_{\\text{out}} = V_{\\text{in}} \\times \\frac{R_{\\text{fixed}}}{R_{\\text{fixed}} + R_T}$$.\n- Step 3: When $$R_T$$ decreases, the denominator $$(R_{\\text{fixed}} + R_T)$$ decreases while the numerator $$R_{\\text{fixed}}$$ stays constant, so the fraction increases. Therefore $$V_{\\text{out}}$$ *increases*.\n\n+ This is the configuration used in many temperature-sensing circuits: a rising output voltage signals a rising temperature. If you wanted the output to *decrease* with temperature, you would take the output across the thermistor instead.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "What is a potentiometer, and why is it described as a \"continuously adjustable potential divider\"? (2 steps)", "answer": "- Step 1: A potentiometer is a three-terminal device: a resistive track with a sliding contact (wiper). The full input voltage is applied across the entire track (end terminals), and the wiper taps off a variable fraction of that voltage at the middle terminal.\n- Step 2: As the slider moves along the track, it effectively changes the ratio of the two \"resistances\" on either side — exactly like changing $$R_1$$ and $$R_2$$ in a potential divider, but continuously. At one extreme, the output equals the full input; at the other extreme, it equals zero. Every position in between gives a proportionally intermediate voltage.\n\n+ Volume knobs on audio equipment are potentiometers: rotating the knob moves the wiper, changing the fraction of the signal voltage passed to the amplifier.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": true}, {"question": "On an $$I$$–$$V$$ characteristic graph (voltage on x-axis, current on y-axis), an ideal diode has zero current for all reverse-bias voltages and small forward-bias voltages (points X and Y on the flat part), then conducts (point Z on the steep part). At which point(s) is the resistance infinite, and why? (3 steps)", "answer": "- Step 1: Resistance is defined as $$R = V / I$$. To find where $$R$$ is infinite, look for where the denominator $$I$$ goes to zero while $$V$$ is non-zero.\n- Step 2: At points X and Y, the curve sits on the horizontal axis — the current $$I = 0$$ while the voltage $$V$$ is non-zero (there is a voltage applied, but no current flows). Therefore $$R = V / 0 \\to \\infty$$.\n- Step 3: At point Z, the diode is conducting — $$I \\neq 0$$ — so $$R = V/I$$ is finite (and small). The answer is X and Y, not Z.\n\n+ Common misconception: students look for $$V = 0$$ (the origin) as \"zero resistance\" and reason backwards. But infinite resistance means *no current flows despite a voltage being applied* — the discriminator is always the current axis, not the voltage axis.", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "An NTC thermistor is in series with a fixed resistor and a battery. A voltmeter is connected across the *thermistor*. The thermistor is heated. A student reasons: \"Current increases, and $$V = IR$$, so the voltage across the thermistor must increase.\" Why is this reasoning incomplete, and what is the correct conclusion? (3 steps)", "answer": "- Step 1: The student correctly identifies that the current increases (heating the NTC thermistor lowers $$R_T$$, which lowers $$R_{\\text{total}}$$, which increases $$I$$). However, $$V_T = I \\times R_T$$ has *two* factors: $$I$$ increases but $$R_T$$ decreases.\n- Step 2: The voltage across the thermistor is $$V_T = I \\cdot R_T$$. To see which effect dominates, use the potential divider: $$V_T = \\varepsilon \\times \\frac{R_T}{R_{\\text{fixed}} + R_T}$$. When $$R_T$$ decreases, the fraction $$R_T / (R_{\\text{fixed}} + R_T)$$ decreases — the thermistor claims a *smaller share* of the e.m.f.\n- Step 3: Therefore $$V_T$$ *decreases*. The fall in $$R_T$$ dominates over the rise in $$I$$. The \"lost\" voltage transfers to the fixed resistor, whose voltage $$V_F = I \\cdot R_{\\text{fixed}}$$ does increase (because $$R_{\\text{fixed}}$$ is constant while $$I$$ rises).\n\n+ This is Alex's key lesson: you cannot reason about $$V = IR$$ for a component by looking at only one of the two factors. Use the potential divider formula or substitute concrete numbers to see which effect wins.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": true}, {"question": "Same circuit as before (NTC thermistor + fixed resistor in series), but now the voltmeter is across the *fixed resistor* instead of the thermistor. When the thermistor is heated, both the ammeter reading and the voltmeter reading increase. Explain why the voltmeter's verdict *flips* depending on which component it spans. (2 steps)", "answer": "- Step 1: The current's behaviour is the same regardless of where the voltmeter is: heating the NTC thermistor → $$R_T$$ decreases → $$R_{\\text{total}}$$ decreases → $$I$$ increases. The ammeter always rises.\n- Step 2: The voltmeter's behaviour depends on which component it measures. Across the thermistor: $$V_T = IR_T$$, where $$I$$ rises but $$R_T$$ falls faster → $$V_T$$ decreases. Across the fixed resistor: $$V_F = IR_{\\text{fixed}}$$, where $$I$$ rises and $$R_{\\text{fixed}}$$ is constant → $$V_F$$ increases. The same current change produces opposite voltage changes because one resistance is falling while the other is fixed.\n\n+ Always read which component the voltmeter spans before deciding \"up\" or \"down.\" This was the central point of Q7.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": true}, {"question": "Alex's method for any \"does the reading increase or decrease?\" circuit question is: \"draw it and put numbers on it.\" Explain what this means by walking through a concrete example with a 12 V battery, a 4 Ω fixed resistor, and an NTC thermistor that drops from 8 Ω to 2 Ω when heated. The voltmeter is across the thermistor. (3 steps)", "answer": "- Step 1: Before heating: $$R_{\\text{total}} = 4 + 8 = 12\\;\\Omega$$, $$I = 12/12 = 1.0\\;\\text{A}$$, $$V_T = IR_T = 1.0 \\times 8 = 8.0\\;\\text{V}$$. After heating: $$R_{\\text{total}} = 4 + 2 = 6\\;\\Omega$$, $$I = 12/6 = 2.0\\;\\text{A}$$, $$V_T = IR_T = 2.0 \\times 2 = 4.0\\;\\text{V}$$.\n- Step 2: The current doubled (1.0 → 2.0 A), but the thermistor's resistance fell by a factor of 4 (8 → 2 Ω). The product $$V_T =
