s 10^{-7}$$. Ratio $$\\sim 4$$ Ω.\n- Step 2: Units check: $$[\\Omega\\,m][m]/[m^2] = \\Omega$$ ✓. Order of magnitude (few ohms) is reasonable for a couple of metres of resistance wire.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": false}, {"question": "Current doubles in a metal wire (everything else fixed). What happens to drift velocity? (2 steps)", "answer": "- Step 1: From $$I = nAvq$$, the only variable that can change with $$I$$ (with $$n$$, $$A$$, $$q$$ all fixed) is $$v$$.\n- Step 2: So $$v \\propto I$$ — doubling $$I$$ doubles $$v$$. Drift velocity is directly proportional to current at constant geometry and carrier density.\n\nCompare to the thermistor case where $$n$$ changes: there, $$v$$ and $$n$$ change together, and the simple proportionality breaks.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": false}, {"question": "A charge of 0.6 C passes a point in 30 μs. Estimate the current and explain why this is a \"lightning-scale\" current. (2 steps)", "answer": "- Step 1: $$I = Q/t = 0.6 / (30 \\times 10^{-6}) = 2 \\times 10^4$$ A — twenty thousand amps.\n- Step 2: This is the same order of magnitude as a real lightning strike (~25 000 A). The point: even less than a coulomb of charge, *if delivered in microseconds*, gives a tens-of-kiloamp current. Lightning is short, not large in charge.", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": false}, {"question": "Why is the \"graphical method\" for finding internal resistance (plot $$V$$ vs $$I$$) preferred to making a single measurement of $$V$$ and $$I$$ and applying $$r = (\\varepsilon - V)/I$$? (3 steps)", "answer": "- Step 1: A single-point calculation depends critically on *one* measurement of each meter, so random measurement errors propagate directly into $$r$$.\n- Step 2: The graphical method uses *many* $$(I, V)$$ pairs across a range of load resistances. The best-fit line averages out random errors in individual readings.\n- Step 3: Bonus: the graph reveals systematic problems (non-linearity = the source isn't behaving as a simple $$\\varepsilon, r$$ model, e.g. the battery heats up and $$\\varepsilon$$ drifts). A single-point calculation hides these issues.\n\nBest practice: graphs > single calculations for any quantity you can vary a parameter to extract.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "When designing an LDR-based automatic streetlight that turns *on* when it gets dark, where should the LDR be placed in the potential divider? (3 steps)", "answer": "- Step 1: An LDR's resistance *rises* in the dark. You want the output voltage that triggers the lamp to *rise* in the dark.\n- Step 2: From the divider rule, $$V_{out}$$ across a component rises when *that component's* resistance rises (it claims a bigger share of $$V_{in}$$).\n- Step 3: So place the LDR such that $$V_{out}$$ is taken *across the LDR itself*. As light fades, $$R_{LDR}$$ rises, $$V_{LDR}$$ rises, the trigger circuit activates the lamp.\n\nIf you instead took $$V_{out}$$ across the fixed resistor, $$V_{out}$$ would *fall* in the dark — opposite of what you want.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Why does the formula $$P = I^2 R$$ specifically describe \"resistance heating\" (the heating effect of current in a resistor)? (3 steps)", "answer": "- Step 1: Electrical energy enters a resistor at rate $$P = VI$$ (work done by the field on charges flowing through). With $$V = IR$$, this becomes $$P = I^2 R$$.\n- Step 2: Inside a resistor, the moving charges collide with the lattice and transfer kinetic energy to lattice vibrations — heat. There's no other energy outlet (no light, no chemical change in a pure resistor), so 100% of the input electrical power becomes heat.\n- Step 3: The $$I^2$$ dependence is critical: doubling the current quadruples the heating. This is why thick wires are used for high currents (lower $$R$$, less heat) and why fuses work — at excess current, d$$ means diameter measurement is the *dominant* error source in resistivity experiments.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "Why does a potentiometer (slider) give a *continuously* variable voltage output, while individual fixed resistors only give discrete divisions? (3 steps)", "answer": "- Step 1: A potentiometer is a single resistive track with a sliding contact. The slider position determines how much of the track is \"above\" the slider ($$R_1$$) and how much \"below\" ($$R_2$$). As the slider moves, $$R_1$$ and $$R_2$$ change continuously, with $$R_1 + R_2$$ always equal to the total track resistance.\n- Step 2: The output voltage is $$V_{out} = V_{in} \\cdot R_2/(R_1 + R_2)$$ — a continuously varying fraction from 0 (slider at one end) to $$V_{in}$$ (slider at the other end).\n- Step 3: This is why potentiometers are used as volume knobs, joysticks, and tuning controls — you get smooth control of $$V_{out}$$ from 0 to $$V_{in}$$ with a single mechanical motion, no switching between discrete resistor values needed.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "Looking at $$\\varepsilon = I(R + r)$$, what does the \"lost volts\" concept tell you about energy conservation in a battery circuit? (3 steps)", "answer": "- Step 1: Multiply both sides by $$I$$: $$\\varepsilon I = I^2 R + I^2 r$$. So the *total power* delivered by the e.m.f. ($$\\varepsilon I$$) equals the power dissipated in the load ($$I^2 R$$) plus the power dissipated internally ($$I^2 r$$).\n- Step 2: Per coulomb, this becomes $$\\varepsilon = V_{load} + V_{lost}$$ where $$V_{lost} = Ir$$. The total energy per coulomb (e.m.f.) splits between useful work (in the load) and wasted heat (inside the cell).\n- Step 3: This is just energy conservation: the chemical energy in the battery becomes electrical energy ($$\\varepsilon$$ per coulomb), which then becomes load-output + internal-heat. No magic — all the e.m.f. is accounted for.\n\nTakeaway: $$\\varepsilon = V + Ir$$ is just energy conservation per unit charge, applied around a loop.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}], "count": 50}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 13544, "out_tokens": 12508, "reasoning_chars": 21595, "cost_eur": 0.0534, "elapsed_s": 88, "content_chars": 23291}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 13543, "out_tokens": 22196, "reasoning_chars": 11963, "cost_eur": 0.0846, "elapsed_s": 408, "content_chars": 66563}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 13543, "out_tokens": 15917, "reasoning_chars": 28709, "cost_eur": 0.0643, "elapsed_s": 226, "content_chars": 28972}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 13020, "out_tokens": 10619, "reasoning_chars": 3087, "cost_eur": 0.0131, "elapsed_s": 91, "content_chars": 36238}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 13020, "out_tokens": 9338, "reasoning_chars": 2502, "cost_eur": 0.0118, "elapsed_s": 78, "content_chars": 30466}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 20228, "out_tokens": 20533, "reasoning_chars": 0, "cost_eur": 1.6959, "elapsed_s": 277, "content_chars": 48189}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 20228, "out_tokens": 20008, "reasoning_chars": 0, "cost_eur": 1.6597, "elapsed_s": 269, "content_chars": 45743}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 13375, "out_tokens": 2861, "reasoning_chars": 2746, "cost_eur": 0.0056, "elapsed_s": 55, "content_chars": 7627}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 13375, "out_tokens": 16470, "reasoning_chars": 31206, "cost_eur": 0.0206, "elapsed_s": 251, "content_chars": 28168}}};
const SK='phys_electricity_clinic_jun12';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
