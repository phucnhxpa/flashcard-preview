I \\times R_T$$ went from 8 V to 4 V — it halved. The voltage across the fixed resistor went from $$1.0 \\times 4 = 4\\;\\text{V}$$ to $$2.0 \\times 4 = 8\\;\\text{V}$$ — it doubled.\n- Step 3: The numbers make the answer unambiguous and eliminate the \"which effect dominates?\" ambiguity. The total is always conserved: $$V_T + V_F = 8 + 4 = 12 = 4 + 8 = 12\\;\\text{V}$$. ✓\n\n+ This is why concrete numbers beat mental hand-waving: you can *see* the answer and verify conservation of voltage at the same time.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": true}, {"question": "A student is asked \"show the resistivity is about 0.2 Ω m\" for a lightning channel. They know $$R$$, $$A$$, and $$L$$. Why should they start from the data-booklet formula $$R = \\rho L / A$$ and rearrange, rather than trying to recall $$\\rho = RA/L$$ from memory? (2 steps)", "answer": "- Step 1: The data-booklet formula $$R = \\rho L / A$$ is guaranteed correct. Rearranging it step by step: multiply by $$A$$ to get $$RA = \\rho L$$, then divide by $$L$$ to get $$\\rho = RA/L$$. Each step is transparent and verifiable.\n- Step 2: If you try to recall $$\\rho = RA/L$$ from memory, you risk inverting it to $$\\rho = RL/A$$ (swapping $$A$$ and $$L$$). This is a common and costly error that gives a numerically different answer and the wrong units. By always starting from the booklet form, you eliminate this inversion risk.\n\n+ Alex's correction during the lesson: Phuc hesitated on the rearrangement. The fix is simple — never trust memory for rearrangements; always derive from the known-correct starting point.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": true}, {"question": "A lightning strike has current $$I = 25{,}000\\;\\text{A}$$, duration $$t = 30\\;\\mu\\text{s}$$, and voltage $$V = 1.2 \\times 10^9\\;\\text{V}$$. The calculated resistivity of the channel is about 0.2 Ω m, but the accepted resistivity of (cold) air is about $$10^{16}\\;\\Omega\\text{m}$$. Explain this discrepancy of ~17 orders of magnitude. (3 steps)", "answer": "- Step 1: During a lightning strike, the intense electric field ionises the air in the channel, stripping electrons from gas molecules and creating a plasma. This plasma has a vastly larger number density of free charge carriers $$n$$ than cold air (which has essentially zero free carriers — that's why it's an insulator).\n- Step 2: From $$I = nAvq$$, a much larger $$n$$ means a much larger current for the same drift velocity, which means much lower resistance and therefore much lower resistivity. The resistivity drops from ~$$10^{16}$$ to ~0.2 Ω m — a factor of ~$$10^{17}$$.\n- Step 3: The key physics: cold air is an excellent insulator (huge resistivity) because its charge carriers are bound. Lightning transforms it into a conductor (tiny resistivity) by ionisation. The material is physically different during the strike — it's not \"air\" anymore, it's a hot plasma.\n\n+ Subsidiary point: the values of $$L$$ (channel length) and $$A$$ (channel diameter) are also hard to measure accurately during a real strike, contributing some uncertainty. But the dominant effect by far is the ionisation changing $$n$$ by many orders of magnitude.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}, {"question": "In the lightning question, the length $$L$$ used in the resistivity calculation is 400 m — the cloud-to-ground distance. A student says \"the length should be the length of the cable, not the distance between cloud and ground.\" Why is the student confused, and what is the correct interpretation? (2 steps)", "answer": "- Step 1: The student is thinking of a laboratory Core Practical, where $$L$$ is indeed the length of a wire sample on the bench. But in the lightning scenario, there is no \"cable\" — the conducting channel *is* the path from cloud to ground, and its length is the cloud-to-ground distance.\n- Step 2: In $$R = \\rho L / A$$, $$L$$ always means the length of the conducting path between the two points where the voltage is applied. For the lightning channel, the voltage is applied between cloud and ground, so $$L = 400\\;\\text{m}$$. Alex's correction: \"the length is the length of the lightning channel, which is the cloud-to-ground distance.\"", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "A student claims that when a cell's internal resistance increases from 0.10 Ω to 0.50 Ω, the power dissipated in the external load \"falls to 70% of its original value.\" What two wording interpretations are possible, and why must you quote an actual number to judge the claim? (3 steps)", "answer": "- Step 1: \"Falls *to* 70%\" means the new power is 70% of the original: $$P_2 / P_1 = 0.70$$. \"Falls *by* 70%\" means the new power is 30% of the original (100% − 70% reduction): $$P_2 / P_1 = 0.30$$. These are very different claims.\n- Step 2: To test either claim, you must actually compute the ratio. For this problem, the calculation gives $$P_2 / P_1 \\approx 0.86$$ (86%). This matches neither interpretation — the power falls *to* 86%, or equivalently falls *by* 14%.\n- Step 3: The student's claim is wrong regardless of interpretation. But to score the marks, you must state the actual computed value (86%) and compare it. Writing only \"the claim is incorrect\" with no supporting number scores zero — examiners need to see your evidence.\n\n+ Alex's rule: always quote the comparison number. \"86%, not 70%\" is a complete answer. \"Wrong\" alone is not.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": true}, {"question": "When calculating power dissipated in an external load resistor $$R$$ driven by a cell with internal resistance $$r$$, why is $$P = I^2R$$ the most convenient form to use? (2 steps)", "answer": "- Step 1: The current through the circuit is $$I = \\varepsilon / (R + r)$$, which you typically calculate first. The load resistance $$R$$ is given. So $$P = I^2 R$$ uses the two quantities you already have.\n- Step 2: Using $$P = V^2 / R$$ would require first calculating the terminal p.d. $$V = IR$$, adding an extra step. Using $$P = VI$$ would also require $$V$$. Since $$I$$ and $$R$$ are the most directly available quantities in these problems, $$P = I^2R$$ minimises steps and rounding errors.\n\n+ Note: $$P = I^2R$$ gives the power in the *load* resistor specifically, not the total power from the cell (which would be $$P_{\\text{total}} = \\varepsilon I = I^2(R + r)$$).", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "A cell with $$\\varepsilon = 9.0\\;\\text{V}$$ and internal resistance $$r$$ drives a load $$R = 5.0\\;\\Omega$$. When $$r = 0.10\\;\\Omega$$, the load power is about 15.5 W. When $$r = 0.50\\;\\Omega$$, it's about 13.4 W. The ratio is 0.86. Without detailed calculation, explain *qualitatively* why increasing $$r$$ reduces the load power. (2 steps)", "answer": "- Step 1: Increasing $$r$$ increases the total circuit resistance $$(R + r)$$, which reduces the current $$I = \\varepsilon / (R + r)$$. Less current flows through the load.\n- Step 2: Since the load power is $$P = I^2R$$ and $$R$$ is fixed, a smaller $$I$$ means a smaller $$I^2$$, so the power decreases. Additionally, a larger $$r$$ means a larger fraction of the total power $$\\varepsilon I$$ is \"wasted\" as heat inside the cell ($$I^2 r$$), leaving less for the load.\n\n+ Directional reasoning: if $$r \\to 0$$, all the power goes to the load (maximum load power for given $$\\varepsilon$$ and $$R$$). As $$r$$ grows, more power is lost internally. The 5× increase in $$r$$ (0.10 → 0.50 Ω) only causes a 14% drop in load power because $$r$$ is still small compared to $$R = 5.0\\;\\Omega$$.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "In the V–I graph for a real cell, explain what physical situation corresponds to each axis intercept. (3 steps)", "answer": "- Step 1: The y-intercept (where $$I = 0$$): no current flows, so there are no \"lost volts\" ($$Ir = 0$$), and the terminal p.d. equals the full e.m.f.: $$V = \\varepsilon$$. This is the open-circuit condition.\n- Step 2: The x-intercept (where $$V = 0$$): the terminal p.d. is zero, meaning all the e.m.f. is dropped across the internal resistance: $$\\varepsilon = Ir_{\\text{max}}$$. This is the short-circuit condition, where the external resistance is zero and the current is $$I_{\\text{max}} = \\varepsilon / r$$.\n- Step 3: Every point between the intercepts represents a different load resistance. As $$R$$ decreases from infinity (open circuit) to zero (short circuit), the operating point slides along the line from the y-intercept to the x-intercept.\n\n+ Warning: a short circuit draws the maximum possible current $$\\varepsilon / r$$, which can be dangerously large if $$r$$ is small (e.g., a car battery with $$r \\approx 0.02\\;\\Omega$$ would deliver ~600 A — enough to melt wires).", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": true}, {"question": "A student is asked to describe the graphical method for determining internal resistance. They write: \"Plot V against I, the gradient gives r, and the intercept gives ε.\" What is missing or incorrect in this statement? (2 steps)", "answer": "- Step 1: The gradient is *negative* (the line slopes downward), so the gradient equals $$-r$$, not $$r$$. The student must write \"gradient = $$-r$$\" or \"r = −gradient\" to be correct. Writing \"gradient gives r\" implies a positive gradient, which is wrong.\n- Step 2: The description also needs to specify *which variable goes on which axis*: terminal p.d. $$V$$ on the y-axis and current $$I$$ on the x-axis. If the axes were swapped, the gradient would be $$-1/r$$ instead. The full correct answer: \"Plot $$V$$ (y-axis) against $$I$$ (x-axis); the y-intercept = $$\\varepsilon$$ and the gradient = $$-r$$, so $$r = -\\text{gradient}$$.\"\n\n+ Examiners want both \"gradient = $$-r$$\" and \"intercept = $$\\varepsilon$$\" stated explicitly. Omitting the minus sign is a common dropped mark.", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": false}, {"question": "For the car battery question (Q17), the battery has six cells in series, each with internal resistance 0.010 Ω. The total internal resistance is calculated from $$r = (\\varepsilon - V)/I$$. Without doing the arithmetic, explain why the six individual internal resistances should add, just like any series combination. (2 steps)", "answer": "- Step 1: Inside the battery, the six cells are connected in series — the current must pass through each cell's internal resistance in turn. There is only one current path through the battery.\n- Step 2: By the series rule, resistances add: $$r_{\\text{total}} = r_1 + r_2 + \\cdots + r_6 = 6 \\times 0.010 = 0.060\\;\\Omega$$. This is consistent with the calculated value of 0.019 Ω only if the cells are not identical or there's additional information — actually, the calculation gives 0.019 Ω from the external measurements, which may differ from the nominal 0.060 Ω because the specification values are approximate.\n\n+ The key principle: internal resistances in series add, just like external resistances. The same current flows through all of them, and their voltage drops sum.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": false}, {"question": "In a multiple-choice question asking for the correct *expression* (not a numerical value) for drift velocity, what strategy does Alex recommend to eliminate options quickly? (3 steps)", "answer": "- Step 1: Start from the known physics relation — in this case $$I = nAvq$$ — and rearrange to make the target quantity the subject: $$v = I / (nAq)$$. This gives you the *structure* of the answer: $$I$$ on top, and $$n$$, $$A$$, and $$q$$ all multiplied together on the bottom.\n- Step 2: Scan the options for structural matches. Any option with $$A$$ in the numerator (instead of the denominator) can be eliminated immediately. Any option missing $$n$$ or $$q$$ can be eliminated.\n- Step 3: Among the remaining options, pick the one that matches your rearrangement exactly. Don't plug in numbers and compute four expressions — that's slow and error-prone. Match the algebra first, compute only if needed for a tiebreak.\n\n+ This is faster and safer because algebraic structure (what's on top, what's on bottom) is easier to verify than numerical calculation with powers of ten.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": true}, {"question": "A charge of 0.60 C flows past a point in a circuit in 30 μs. Estimate the order of magnitude of the current. (2 steps)", "answer": "- Step 1: Use $$I = Q / t = 0.60 / (30 \\times 10^{-6})$$. The numerator is roughly 1 and the denominator is roughly $$3 \\times 10^{-5}$$, so the answer is of order $$10^4$$ A.\n- Step 2: More precisely: $$I = 0.60 / (3.0 \\times 10^{-5}) = 0.20 \\times 10^5 = 2.0 \\times 10^4\\;\\text{A} = 20{,}000\\;\\text{A}$$. This is a huge current — consistent with a lightning strike or a very short, intense discharge. The key insight is that even a modest charge (less than 1 C) can produce an enormous current if the time interval is extremely short.\n\n+ Order-of-magnitude reasoning: ~1 C divided by ~$$10^{-5}$$ s gives ~$$10^5$$ A. The exact value ($$2 \\times 10^4$$) is within one order of magnitude of this estimate.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "A wire has resistivity $$\\rho = 1.1 \\times 10^{-6}\\;\\Omega\\text{m}$$, length 2.0 m, and cross-sectional area $$5.0 \\times 10^{-7}\\;\\text{m}^2$$. Without calculating the exact value, estimate whether the resistance is closer to 1 Ω, 4 Ω, or 40 Ω. (2 steps)", "answer": "- Step 1: Use $$R = \\rho L / A$$. Numerator: $$\\rho L \\approx (10^{-6})(2) = 2 \\times 10^{-6}$$. Denominator: $$A \\approx 5 \\times 10^{-7} = 0.5 \\times 10^{-6}$$.\n- Step 2: $$R \\approx (2 \\times 10^{-6}) / (0.5 \\times 10^{-6}) = 2 / 0.5 = 4\\;\\Omega$$. The $$10^{-6}$$ cancels, leaving a simple ratio. The exact answer is 4.4 Ω, confirming the estimate of ~4 Ω.\n\n+ The trick: when $$\\rho$$ and $$A$$ both have the same power of ten, they cancel, and you only need to divide the mantissas. This makes mental estimation straightforward.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "A student says \"infinite resistance means zero voltage.\" Using the definition $$R = V/I$$, explain why this is backwards. (2 steps)", "answer": "- Step 1: From $$R = V/I$$, infinite resistance occurs when $$I = 0$$ (the denominator goes to zero) while $$V$$ can be any non-zero value. Mathematically: $$R = V/0 \\to \\infty$$.\n- Step 2: Zero voltage ($$V = 0$$) with non-zero current would give $$R = 0$$ (zero resistance), not infinite resistance. The student has confused the conditions for zero and infinite resistance. Infinite resistance = no current flows despite a voltage being applied (like an open switch or a reverse-biased diode). Zero resistance = current flows with no voltage needed (like a superconductor).\n\n+ The discriminator is always the *current*: $$I = 0$$ → infinite resistance; $$V = 0$$ with $$I \\neq 0$$ → zero resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": false}, {"question": "When a cell is short-circuited ($$R = 0$$), the terminal p.d. is zero. Where has all the e.m.f. gone? (2 steps)", "answer": "- Step 1: With $$R = 0$$, the current is $$I = \\varepsilon / (R + r) = \\varepsilon / r$$. The entire e.m.f. is dropped across the internal resistance: $$V_{\\text{internal}} = Ir = (\\varepsilon/r) \\times r = \\varepsilon$$.\n- Step 2: All the energy per coulomb provided by the e.m.f. is dissipated as heat *inside the cell* itself. The terminal p.d. is zero because there's no external resistance to drop voltage across. This is why short-circuiting a battery is dangerous — all the power $$P = \\varepsilon^2 / r$$ is generated as heat within the battery, which can cause it to overheat, leak, or explode.\n\n+ For a car battery ($$\\varepsilon = 12\\;\\text{V}$$, $$r \\approx 0.02\\;\\Omega$$): short-circuit power = $$12^2 / 0.02 = 7200\\;\\text{W}$$ — seven kilowatts of heating inside the battery.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": false}, {"question": "In the equation $$V = \\varepsilon - Ir$$, what happens to the terminal p.d. as the external load resistance $$R$$ approaches infinity? What physical situation does this represent? (2 steps)", "answer": "- Step 1: As $$R \\to \\infty$$, the current $$I = \\varepsilon / (R + r) \\to 0$$. Substituting into $$V = \\varepsilon - Ir$$: $$V \\to \\varepsilon - 0 = \\varepsilon$$. The terminal p.d. approaches the full e.m.f.\n- Step 2: This represents an open circuit — nothing is connected across the terminals (or a voltmeter with infinite resistance is the only connection). With no current flowing, there are no \"lost volts\" inside the cell, so the voltmeter reads the true e.m.f. This is why a voltmeter alone across a cell reads $$\\varepsilon$$: it draws negligible current.\n\n+ This is also the y-intercept of the V–I graph: $$I = 0$$, $$V = \\varepsilon$$.", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "A potential divider has $$V_{\\text{in}} = 9\\;\\text{V}$$, $$R_1 = 3\\;\\Omega$$, and $$R_2 = 6\\;\\Omega$$. The output is taken across $$R_2$$. Calculate $$V_{\\text{out}}$$ using mental arithmetic. (2 steps)", "answer": "- Step 1: Apply the potential divider formula: $$V_{\\text{out}} = V_{\\text{in}} \\times \\frac{R_2}{R_1 + R_2} = 9 \\times \\frac{6}{3 + 6} = 9 \\times \\frac{6}{9} = 9 \\times \\frac{2}{3} = 6\\;\\text{V}$$.\n- Step 2: Sanity check: $$R_2 = 6\\;\\Omega$$ is twice $$R_1 = 3\\;\\Omega$$, so $$R_2$$ gets twice the voltage of $$R_1$$. The total is 9 V, split as $$V_1 = 3\\;\\text{V}$$ and $$V_2 = 6\\;\\text{V}$$ (ratio 1:2). ✓\n\n+ General principle: voltages divide in the same ratio as resistances. If one resistor is twice the other, it gets twice the voltage.", "source": "GLM 5.1 ②", "_id": "glm_2_44", "judge_pick": false}, {"question": "Two resistors $$R_1 = 4\\;\\Omega$$ and $$R_2 = 12\\;\\Omega$$ are connected in parallel across a battery. Without calculating the total resistance, determine what fraction of the total current flows through each resistor. (2 steps)", "answer": "- Step 1: Both resistors have the same voltage across them (parallel rule). By Ohm's law, $$I_1 = V/R_1$$ and $$I_2 = V/R_2$$. The ratio of currents is $$I_1 : I_2 = R_2 : R_1 = 12 : 4 = 3 : 1$$.\n- Step 2: Since the currents are in ratio 3:1, the total is 4 parts. $$R_1$$ (the smaller resistor) carries 3/4 of the total current, and $$R_2$$ (the larger resistor) carries 1/4. The easier path gets more current — current favours the route of least resistance.\n\n+ This is a quick way to reason about parallel circuits: current divides *inversely* proportional to resistance. If one branch has half the resistance, it carries twice the current.", "source": "GLM 5.1 ②", "_id": "glm_2_45", "judge_pick": false}, {"question": "A student calculates the total resistance of two parallel resistors as $$1/R_{\\text{total}} = 1/5 + 1/5 = 2/5$$ and writes $$R_{\\text{total}} = 2.5\\;\\Omega$$. Another student says \"the answer should be 0.4 Ω because 2/5 = 0.4.\" Resolve this dispute. (2 steps)", "answer": "- Step 1: The value 0.4 is $$1/R_{\\text{total}}$$, not $$R_{\\text{total}}$$. The parallel formula gives the *reciprocal* of the total resistance. $$1/R_{\\text{total}} = 0.4\\;\\Omega^{-1}$$.\n- Step 2: To find $$R_{\\text{total}}$$, invert: $$R_{\\text{total}} = 1/0.4 = 2.5\\;\\Omega$$. The first student is correct. The second student forgot the final reciprocal — the most common trap in parallel resistance calculations.\n\n+ Quick check: two 5 Ω resistors in parallel should give less than 5 Ω (parallel always reduces resistance), and 2.5 Ω = 5/2 makes sense (two identical paths halve the resistance). 0.4 Ω would be smaller than either individual resistor by more than a factor of 10, which is impossible for two 5 Ω resistors.", "source": "GLM 5.1 ②", "_id": "glm_2_46", "judge_pick": false}, {"question": "In the lightning question, the power dissipated is calculated as $$P = VI = (1.2 \\times 10^9)(25{,}000) = 3.0 \\times 10^{13}\\;\\text{W}$$. Yet the total charge transferred is only about 0.75 C. Explain how such enormous power can come from such a small charge. (2 steps)", "answer": "- Step 1: Power is energy per second ($$P = E/t$$), not total energy. The total *energy* in the strike is $$E = QV = 0.75 \\times 1.2 \\times 10^9 \\approx 9 \\times 10^8\\;\\text{J}$$ (about 900 MJ) — large but not astronomical. The power is enormous because this energy is delivered in a very short time ($$t \\approx 30\\;\\mu\\text{s}$$).\n- Step 2: $$P = E/t = 9 \\times 10^8 / (3 \\times 10^{-5}) \\approx 3 \\times 10^{13}\\;\\text{W}$$. A modest total energy, when compressed into microseconds, produces terawatt-level power. This is why lightning is destructive — the power density (energy per second) is immense, even though the total charge and energy are relatively modest.\n\n+ Analogy: a firecracker releases less total energy than a candle burning for an hour, but the firecracker's power is far greater because it releases its energy in milliseconds.", "source": "GLM 5.1 ②", "_id": "glm_2_47", "judge_pick": false}, {"question": "In Core Practical 7, a student plots $$R$$ against $$L$$ and gets a straight line that does *not* pass through the origin — it has a small positive y-intercept. What does this indicate, and how should the student handle it when calculating resistivity? (2 steps)", "answer": "- Step 1: A non-zero y-intercept means that when $$L = 0$$, there is still some measured resistance. This is likely due to the resistance of the connecting leads and contacts — even with no wire sample, the circuit has a small residual resistance.\n- Step 2: The gradient of the line still equals $$\\rho / A$$ (the slope is unchanged by a constant offset), so the resistivity calculation $$\\rho = \\text{gradient} \\times A$$ remains valid. However, the student should note the zero error and, if possible, subtract the lead resistance from each measurement before plotting, or acknowledge it as a systematic error in their evaluation.\n\n+ This is analogous to checking a micrometer for zero error before measuring diameter — both are systematic errors that should be identified and corrected.", "source": "GLM 5.1 ②", "_id": "glm_2_48", "judge_pick": false}, {"question": "A cell with internal resistance $$r$$ delivers maximum power to an external load when $$R = r$$ (the load resistance equals the internal resistance). Explain qualitatively why the power is *lower* when $$R \\ll r$$ and when $$R \\gg r$$. (3 steps)", "answer": "- Step 1: When $$R \\ll r$$: the current is large ($$I \\approx \\varepsilon / r$$), but most of the voltage is dropped across $$r$$, not $$R$$. The load power $$P = I^2R$$ has a large $$I^2$$ but a very small $$R$$, and the small $$R$$ dominates — the power is low because the load barely receives any voltage.\n- Step 2: When $$R \\gg r$$: the current is small ($$I \\approx \\varepsilon / R$$), and most of the voltage is across $$R$$. The load power $$P = I^2R$$ has a large $$R$$ but a very small $$I^2$$, and the small current dominates — the power is low because barely any current flows.\n- Step 3: Maximum power occurs at the sweet spot $$R = r$$, where there's a balance: enough current flows and enough voltage reaches the load. This is the \"maximum power transfer theorem.\" Note: this is *not* maximum efficiency (efficiency = 50% at $$R = r$$, since half the power is wasted in $$r$$), but it is maximum power delivered to the load.\n\n+ This is why audio amplifiers are designed with output impedance matching the speaker impedance — to deliver maximum power.", "source": "GLM 5.1 ②", "_id": "glm_2_49", "judge_pick": false}, {"question": "A student is solving a circuit problem and writes $$V = \\varepsilon - Ir$$, then substitutes $$V = 11.81$$, $$\\varepsilon = 12.0$$, and $$I = 9.83$$, giving $$r = (12.0 - 11.81) / 9.83$$. They type into their calculator and get 0.019 Ω. What should they check before writing this answer? (2 steps)", "answer": "- Step 1: Check that the arithmetic is reasonable: $$12.0 - 11.81 = 0.19$$, and $$0.19 / 9.83 \\approx 0.19 / 10 \\approx 0.019$$. The mental estimate confirms the calculator result is in the right ballpark.\n- Step 2: Check significant figures. The data are given to 3–4 significant figures (12.00 V, 11.81 V, 9.83 A), so the answer should be given to 3 significant figures: $$r = 0.0193\\;\\Omega$$. Also check that the unit is correct (Ω) and that the value is physically reasonable for a car battery's internal resistance (it is — car batteries have very low internal resistance to deliver large starting currents).\n\n+ Alex's tip: label every calculation with which scenario it belongs to. In the power comparison question, there were two scenarios with different denominators (5.10 and 5.5) — mixing these up is the most common calculator error.", "source": "GLM 5.1 ②", "_id": "glm_2_50", "judge_pick": false}, {"question": "Summarise the chain of reasoning that Alex insists on for any \"does the meter reading increase or decrease?\" question involving a variable resistor in a series circuit. (4 steps)", "answer": "- Step 1: Identify how the *component's* resistance changes (e.g., NTC thermistor: temperature up → $$R_T$$ down; LDR: darker → $$R_{\\text{LDR}}$$ up).\n- Step 2: Determine the effect on *total* circuit resistance (series: $$R_{\\text{total}}$$ changes in the same direction as the component's resistance; parallel is more complex but the total always decreases when a branch resistance decreases).\n- Step 3: Determine the effect on *current* using $$I = \\varepsilon / R_{\\text{total}}$$. If $$R_{\\text{total}}$$ decreases, $$I$$ increases, and vice versa. The ammeter reading follows the current.\n- Step 4: Determine the effect on the *specific component's voltage* using $$V = IR$$ for that component. Here you must consider both $$I$$ and $$R$$ — if the component's own resistance is changing, you cannot assume $$V$$ moves in the same direction as $$I$$. Use the potential divider formula or substitute concrete numbers.\n\n+ Never skip steps or jump directly to the meter reading. Each step follows inevitably from the previous one, and errors propagate if you skip.", "source": "GLM 5.1 ②", "_id": "glm_2_51", "judge_pick": true}, {"question": "Why must you always check which component a voltmeter is connected across before predicting how its reading will change? Give a specific example where the same circuit change causes opposite voltmeter verdicts. (2 steps)", "answer": "- Step 1: A voltmeter measures the potential difference across the specific component it's connected to. Two components in series share the total voltage, so when one component's voltage goes up, the other's must go down (by conservation: $$V_1 + V_2 = \\varepsilon$$). The voltmeter's verdict depends entirely on which side of this seesaw it's measuring.\n- Step 2: Example from Q7: an NTC thermistor is heated in series with a fixed resistor. The thermistor's resistance falls, so its share of the voltage falls ($$V_T$$ decreases) and the fixed resistor's share rises ($$V_F$$ increases). A voltmeter across the thermistor reads *lower*; a voltmeter across the fixed resistor reads *higher*. Same circuit, same change, opposite voltmeter answers.\n\n+ The current's behaviour (ammeter reading) is the same regardless — only the voltmeter's answer depends on placement.", "source": "GLM 5.1 ②", "_id": "glm_2_52", "judge_pick": true}, {"question": "A wire is stretched to twice its original length while maintaining the same volume (so its cross-sectional area halves). By what factor does its resistance change? Explain using $$R = \\rho L / A$$. (3 steps)", "answer": "- Step 1: Original resistance: $$R_1 = \\rho L / A$$. After stretching: new length $$L_2 = 2L$$, new area $$A_2 = A/2$$ (volume $$= AL$$ is conserved, so if length doubles, area must halve).\n- Step 2: New resistance: $$R_2 = \\rho L_2 / A_2 = \\rho (2L) / (A/2) = \\rho \\times 2L \\times 2/A = 4\\rho L / A$$.\n- Step 3: $$R_2 = 4R_1$$. The resistance increases by a factor of 4. The doubling of length doubles the resistance, and the halving of area doubles it again — the effects compound multiplicatively, not additively.\n\n+ This shows why resistance is so sensitive to geometry: changing dimensions affects both $$L$$ and $$A$$, and both changes push resistance in the same direction (longer and thinner = more resistance).", "source": "GLM 5.1 ②", "_id": "glm_2_53", "judge_pick": false}, {"question": "The e.m.f. of a source and the potential difference across a resistor both have units of volts. Explain the conceptual difference between them — what different physical processes do they describe? (2 steps)", "answer": "- Step 1: E.m.f. ($$\\varepsilon$$) describes energy being *converted into* electrical form from some other form (chemical, mechanical, solar, etc.) *inside the source*, per unit charge. It is the \"push\" that the source provides — the energy given to each coulomb as it passes through the source.\n- Step 2: Potential difference ($$V$$) across a resistor describes energy being *converted out of* electrical form into some other form (heat, light, motion, etc.) *in the external circuit*, per unit charge. It is the \"drop\" — the energy removed from each coulomb as it passes through the component. Same units (J/C = V), opposite direction of energy conversion.\n\n+ In a complete circuit with a single source and single load: $$\\varepsilon = V + Ir$$. The e.m.f. provides the energy; the terminal p.d. $$V$$ is what's delivered to the load; $$Ir$$ is what's wasted internally. Energy in = energy out, per coulomb.", "source": "GLM 5.1 ②", "_id": "glm_2_54", "judge_pick": true}, {"question": "A student measures the diameter of a wire as 0.50 mm and calculates $$A = \\pi d^2 / 4$$. They compute $$A = \\pi (0.50)^2 / 4 = 0.196\\;\\text{mm}^2$$ and use this directly in $$\\rho = RA/L$$. What unit error have they made, and how should they fix it? (2 steps)", "answer": "- Step 1: The formula $$R = \\rho L / A$$ requires SI units, so $$A$$ must be in m². The student computed $$A$$ in mm², which is $$10^{-6}$$ times smaller than the value in m². Using mm² directly would give a resistivity that is $$10^6$$ times too small.\n- Step 2: Convert: $$A = 0.196\\;\\text{mm}^2 = 0.196 \\times 10^{-6}\\;\\text{m}^2 = 1.96 \\times 10^{-7}\\;\\text{m}^2$$. Alternatively, convert the diameter first: $$d = 0.50\\;\\text{mm} = 0.50 \\times 10^{-3}\\;\\text{m}$$, then $$A = \\pi (0.50 \\times 10^{-3})^2 / 4 = 1.96 \\times 10^{-7}\\;\\text{m}^2$$. Always convert to metres before squaring.\n\n+ Common trap: mixing mm and m in area calculations. Since area involves a squared length, a factor of $$10^3$$ in length becomes a factor of $$10^6$$ in area. This is one of the most frequent unit errors in resistivity calculations.", "source": "GLM 5.1 ②", "_id": "glm_2_55", "judge_pick": true}, {"question": "In the context of $$I = nAvq$$, explain why replacing a wire with one of the same material but double the cross-sectional area (same length) halves the resistance, even though the resistivity hasn't changed. (3 steps)", "answer": "- Step 1: Resistivity $$\\rho$$ is a material property and hasn't changed — same material. But resistance depends on geometry: $$R = \\rho L / A$$. With $$A$$ doubled and $$L$$ unchanged, $$R$$ is halved.\n- Step 2: Microscopically, double the area means double the number of charge carriers in any cross-section (since $$n$$ is the same). In $$I = nAvq$$, doubling $$A$$ doubles the current for the same drift velocity and voltage — i.e., the wire conducts twice as much current for the same voltage.\n- Step 3: By $$R = V/I$$, if $$I$$ doubles (for the same $$V$$), then $$R$$ halves. The thicker wire is like having two identical wires in parallel — each carries the same current as the original, so the total current doubles and the effective resistance halves.\n\n+ This is the parallel-resistance intuition applied to a single wire: a thicker wire is effectively more parallel paths for the electrons, so lower resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_56", "judge_pick": true}], "count": 57}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "What is the definition of electric current in terms of charge, and what does the unit 'ampere' represent in base units?", "answer": "Electric current is the rate of flow of charge, defined by the equation $$I = \\frac{\\Delta Q}{\\Delta t}$$, where $$\\Delta Q$$ is the charge passing a point and $$\\Delta t$$ is the time interval. The ampere (A) represents one coulomb of charge passing a given point per second. Therefore, in base units, the ampere is equivalent to coulombs per second ($$C \\, s^{-1}$$). This means if a lightning strike transfers $$0.75 \\, C$$ in $$30 \\, \\mu s$$, the average current is simply charge divided by time.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "Using the definition of resistance, explain why a component has infinite resistance if the current through it is zero, even if there is a large potential difference across it. (2 steps)", "answer": "- Step 1: Resistance is defined by the relation $$R = \\frac{V}{I}$$, where $$V$$ is the potential difference and $$I$$ is the current.\n- Step 2: If $$I \\rightarrow 0$$, the denominator of the fraction approaches zero. For any finite or large $$V$$, dividing by a current approaching zero makes the ratio $$R$$ approach infinity. This is exactly what happens for an ideal diode in reverse bias: a large voltage is applied, but no current flows, so mathematically $$R = \\infty$$.\n\nTakeaway: Infinite resistance is determined by zero current ($$I = 0$$), not zero voltage ($$V = 0$$). Look at the current axis on a graph to find infinite resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "A resistor dissipates electrical energy as heat. There are three equivalent formulas for this power: $$P = IV$$, $$P = I^2 R$$, and $$P = \\frac{V^2}{R}$$. Which form is most convenient to use if you only know the current $$I$$ and the resistance $$R$$, and why? (2 steps)", "answer": "- Step 1: Identify which variables are given. If you know $$I$$ and $$R$$, you want a formula that contains exactly those two variables and doesn't require you to calculate missing ones like $$V$$ first.\n- Step 2: The form $$P = I^2 R$$ contains only $$I$$ and $$R$$. Using $$P = IV$$ would require you to first find $$V = IR$$, which adds an unnecessary calculation step. Using $$P = \\frac{V^2}{R}$$ would require knowing $$V$$ as well. Therefore, $$P = I^2 R$$ is the most direct choice.\n\nTakeaway: Always choose the power formula that directly uses the two quantities you already have.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "A $$10 \\, \\Omega$$ resistor has a potential difference of $$10 \\, V$$ across it. Using the most direct formula, what is the power dissipated? (2 steps)", "answer": "- Step 1: Identify the known quantities: we have $$V = 10 \\, V$$ and $$R = 10 \\, \\Omega$$.\n- Step 2: Use the formula that requires only $$V$$ and $$R$$, which is $$P = \\frac{V^2}{R}$$.\n+ Substitute the values: $$P = \\frac{10^2}{10} = \\frac{100}{10} = 10 \\, W$$.\n\nTakeaway: $$\\frac{V^2}{R}$$ allows direct, simple mental math when $$V$$ and $$R$$ are the given quantities.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "When you add a second resistor in parallel to an existing resistor, does the total resistance increase, decrease, or stay the same? Explain conceptually why this happens without referencing the reciprocal formula. (2 steps)", "answer": "- Step 1: Adding a resistor in parallel provides an additional, separate path for current to flow through, alongside the original path.\n- Step 2: More available paths mean the overall ability of the circuit to conduct current increases (total current $$I$$ goes up for the same voltage $$V$$). Since $$R_{total} = \\frac{V}{I}$$, if the total current increases, the total resistance must decrease. In fact, the combined parallel resistance is always smaller than the smallest individual resistor in the group.\n\nTakeaway: Parallel paths lower total resistance because they give current more routes to bypass resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "Two identical resistors, each of resistance $$R$$, are connected in parallel. Derive why their combined resistance is exactly $$\\frac{R}{2}$$, and explain the common \"reciprocal trap\" students fall into when calculating this. (3 steps)", "answer": "- Step 1: Write down the general parallel combination formula: $$\\frac{1}{R_{total}} = \\frac{1}{R_1} + \\frac{1}{R_2}$$.\n- Step 2: Substitute $$R_1 = R$$ and $$R_2 = R$$ into the formula: $$\\frac{1}{R_{total}} = \\frac{1}{R} + \\frac{1}{R} = \\frac{2}{R}$$.\n- Step 3: The formula gives you the reciprocal of the total resistance, $$\\frac{1}{R_{total}}$$, not $$R_{total}$$ itself. The common trap is forgetting the final reciprocal flip—writing $$R_{total} = \\frac{2}{R}$$ (which yields $$0.4 \\, \\Omega$$ if $$R=5 \\, \\Omega$$) instead of correctly inverting to get $$R_{total} = \\frac{R}{2}$$ (yielding $$2.5 \\, \\Omega$$).\n\nTakeaway: Always perform the final reciprocal flip; the parallel formula yields the inverse of resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "Consider a $$10 \\, \\Omega$$ resistor in parallel with an extremely large resistor (e.g., $$10,000 \\, \\Omega$$). What value does the total resistance approach, and why does the massive resistor barely affect the total? (2 steps)", "answer": "- Step 1: Total resistance in parallel is always smaller than the smallest branch. Thus, $$R_{total}$$ must be less than $$10 \\, \\Omega$$.\n- Step 2: The $$10,000 \\, \\Omega$$ resistor provides a path with almost no conductance ($$\\frac{1}{10000}$$ is negligible compared to $$\\frac{1}{10}$$). The total conductance is $$\\frac{1}{R_{total}} = \\frac{1}{10} + \\frac{1}{10000} \\approx \\frac{1}{10}$$, so $$R_{total} \\approx 10 \\, \\Omega$$. The vast majority of current flows through the $$10 \\, \\Omega$$ path, effectively \"ignoring\" the high-resistance branch.\n\nTakeaway: A massive parallel resistor acts almost like an open circuit and barely lowers the total resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "A circuit contains two $$20 \\, \\Omega$$ resistors. What is the total resistance if they are connected in series, and what is it if they are connected in parallel? (2 steps)", "answer": "- Step 1: For a series connection, resistances simply add together: $$R_{series} = 20 + 20 = 40 \\, \\Omega$$.\n- Step 2: For a parallel connection, use the reciprocal rule: $$\\frac{1}{R_{parallel}} = \\frac{1}{20} + \\frac{1}{20} = \\frac{2}{20} = \\frac{1}{10}$$, so flipping the fraction gives $$R_{parallel} = 10 \\, \\Omega$$.\n\nTakeaway: Series doubles the resistance; parallel halves it.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "What is the fundamental difference between resistance $$R$$ and resistivity $$\\rho$$? Which one is an intrinsic property of the material, and which depends on the physical dimensions of the sample? (2 steps)", "answer": "- Step 1: Resistivity $$\\rho$$ is an intrinsic property of the material itself (e.g., copper has a specific $$\\rho$$ regardless of shape). It tells you how inherently resistant a material is to current flow.\n- Step 2: Resistance $$R$$ is an extrinsic property that depends on the sample's dimensions—its length $$L$$ and cross-sectional area $$A$$—as well as the material's resistivity. A long, thin wire of copper has a higher $$R$$ than a short, thick chunk of the same copper, even though their $$\\rho$$ values are identical.\n\nTakeaway: $$\\rho$$ answers \"what material is it?\"; $$R$$ answers \"what shape and size is this specific sample?\"", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": true}, {"question": "Derive the unit of resistivity $$\\rho$$ from the formula $$\\rho = \\frac{RA}{L}$$, and identify the common trap regarding the metre's position in the unit. (2 steps)", "answer": "- Step 1: Substitute the base units into $$\\rho = \\frac{RA}{L}$$. Resistance $$R$$ is in ohms ($$\\Omega$$), area $$A$$ is in square metres ($$m^2$$), and length $$L$$ is in metres ($$m$$).\n- Step 2: The units combine as $$\\frac{\\Omega \\times m^2}{m} = \\Omega \\, m$$. The common trap is writing it as $$\\Omega \\, m^{-1}$$, mistakenly putting the metre in the denominator because of confusion with the $$L$$ in $$R = \\frac{\\rho L}{A}$$. The metre must end up in the numerator because the area ($$m^2$$) divides by length ($$m$$) leaving one metre on top.\n\nTakeaway: Resistivity is measured in ohm-metres ($$\\Omega \\, m$$), not ohms per metre.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "In Core Practical 7 (determining resistivity of a wire), you vary the length $$L$$ of the wire and measure its resistance $$R$$. How do you plot the graph to find $$\\rho$$, and what exactly does the gradient of the line represent? (2 steps)", "answer": "- Step 1: You plot a graph of resistance $$R$$ on the y-axis against length $$L$$ on the x-axis. The relationship $$R = \\frac{\\rho L}{A}$$ takes the straight-line form $$y = mx + c$$, where $$c \\approx 0$$.\n- Step 2: Comparing $$R = \\frac{\\rho}{A} L$$ to $$y = mx$$, the gradient $$m$$ equals $$\\frac{\\rho}{A}$$, not $$\\rho$$ itself. To find the resistivity, you must multiply the gradient by the cross-sectional area you measured separately: $$\\rho = \\text{gradient} \\times A$$.\n\nTakeaway: The R-L graph gradient is $$\\frac{\\rho}{A}$$; you still need the area measurement to extract $$\\rho$$.", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "A uniform wire is stretched so that its length doubles, but its total volume remains constant. What happens to its cross-sectional area, and how does this combined change affect its resistance? (3 steps)", "answer": "- Step 1: Volume is defined as $$V = A \\times L$$. If length $$L$$ doubles and volume $$V$$ is constant, the cross-sectional area $$A$$ must halve to compensate.\n- Step 2: Resistance is given by $$R = \\frac{\\rho L}{A}$$.\n- Step 3: The length doubles ($$L \\rightarrow 2L$$), which doubles $$R$$. Simultaneously, the area halves ($$A \\rightarrow \\frac{A}{2}$$), which doubles $$R$$ again. Because both changes independently push $$R$$ upward, the overall resistance quadruples ($$R \\rightarrow 4R$$).\n\nTakeaway: Stretching a wire increases $$L$$ and decreases $$A$$; both of these dimensional changes increase the resistance.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "In the transport equation $$I = nAvq$$, what physical quantity does each symbol represent, and what are their SI units?", "answer": "The transport equation links macroscopic current to microscopic charge carrier motion:\n+ $$I$$ = Current, the rate of flow of charge ($$A$$).\n+ $$n$$ = Number density of charge carriers, how many free charges exist per unit volume ($$m^{-3}$$).\n+ $$A$$ = Cross-sectional area of the conductor ($$m^2$$).\n+ $$v$$ = Drift velocity, the average slow net speed at which charges move along the conductor ($$m \\, s^{-1}$$).\n+ $$q$$ = Charge on each carrier; for electrons, this is the elementary charge $$e = 1.60 \\times 10^{-19} \\, C$$.\n\nTakeaway: $$I = nAvq$$ multiplies \"how many carriers\" ($$n$$), \"how much space they flow through\" ($$A$$), \"how fast they drift\" ($$v$$), and \"how much charge each carries\" ($$q$$).", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "When you turn on a light switch, the bulb illuminates almost instantly, yet the drift velocity of electrons in the connecting wires is surprisingly slow (about a fraction of a millimetre per second). Why does the light turn on so fast if the electrons themselves are barely moving? (2 steps)", "answer": "- Step 1: The drift velocity is just the slow net forward movement of electrons due to the electric field. Electrons themselves move randomly at very high speeds, but that random thermal motion doesn't contribute to the net directional current.\n- Step 2: When the switch is closed, the electric field propagates through the circuit at nearly the speed of light. This field pushes all the electrons in the entire circuit to start drifting simultaneously. The bulb lights up because the electrons already present inside it start moving, not because electrons from the power source have slowly traveled all the way to the bulb.\n\nTakeaway: Fast circuit response is due to the fast propagation of the electric field, not fast electron drift.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "When a metal wire is heated, its resistance increases. When an NTC (Negative Temperature Coefficient) thermistor is heated, its resistance decreases. Use the transport equation $$I = nAvq$$ to explain the microscopic reason for this opposite behavior. (3 steps)", "answer": "- Step 1: In a metal, the number density of free electrons $$n$$ is essentially fixed. Heating causes the metal lattice ions to vibrate more, which obstructs the electrons, reducing their drift velocity $$v$$.\n- Step 2: Since $$I = nAvq$$ and $$n, A, q$$ are constant, a lower $$v$$ means a lower $$I$$ for the same voltage. Lower current means higher resistance ($$R = \\frac{V}{I}$$ goes up).\n- Step 3: In a semiconductor (NTC thermistor), heating releases many more charge carriers from their bound states, causing $$n$$ to increase dramatically. The increase in $$n$$ outweighs the small decrease in $$v$$, so overall $$I$$ increases, meaning resistance decreases ($$R = \\frac{V}{I}$$ goes down).\n\nTakeaway: Metals: $$n$$ fixed, $$v$$ drops → $$R$$ rises. NTC thermistor: $$n$$ surges, $$v$$ slightly drops → $$R$$ falls.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": true}, {"question": "A wire carries a current of $$2 \\, A$$ and has a cross-sectional area of $$1 \\times 10^{-6} \\, m^2$$. If the current is doubled to $$4 \\, A$$ using the exact same wire, what happens to the drift velocity $$v$$ of the charge carriers? (2 steps)", "answer": "- Step 1: Rearrange the transport equation $$I = nAvq$$ to find $$v = \\frac{I}{nAq}$$.\n- Step 2: For the same wire, the material properties $$n$$ and $$q$$, and the physical dimension $$A$$, all remain constant. Therefore, $$v$$ is directly proportional to $$I$$ ($$v \\propto I$$). If $$I$$ doubles from $$2 \\, A$$ to $$4 \\, A$$, the drift velocity $$v$$ also exactly doubles.\n\nTakeaway: Drift velocity scales directly with current if the wire's properties and geometry don't change.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}, {"question": "State the exact definition of electromotive force (e.m.f.), and explain why saying \"energy per charge particle\" is incorrect compared to \"energy per unit charge\". (3 steps)", "answer": "- Step 1: The correct definition is: e.m.f. is the energy converted from other forms into electrical energy per unit charge passing through the source.\n- Step 2: \"Per unit charge\" means per coulomb, so the unit is $$J \\, C^{-1}$$, which equals Volts ($$V$$). It defines the \"push\" the source gives to a whole coulomb of charge.\n- Step 3: A \"charge particle\" (a single electron) carries only $$1.60 \\times 10^{-19} \\, C$$, whereas a \"unit charge\" (one coulomb) represents about $$6.24 \\times 10^{18}$$ electrons. Saying \"per particle\" would make the e.m.f. value absurdly small (off by a factor of $$\\sim 10^{19}$$). Examiners strictly require \"per unit charge\" or \"per coulomb\".\n\nTakeaway: e.m.f. is energy per coulomb, NOT per electron.", "source": "GLM 5.1 ③", "_id": "glm_3_16", "judge_pick": false}, {"question": "Why is the terminal potential difference $$V$$ of a real cell always less than its e.m.f. $$\\varepsilon$$ whenever there is a current flowing in the circuit? (2 steps)", "answer": "- Step 1: A real cell is modelled as an ideal e.m.f. $$\\varepsilon$$ in series with a small internal resistance $$r$$.\n- Step 2: When current $$I$$ flows, some of the cell's energy is dissipated as heat inside the cell itself due to its own internal resistance. This \"lost volts\" is given by $$Ir$$. The voltage actually available to the external circuit is the terminal p.d., which is $$V = \\varepsilon - Ir$$. Since $$Ir$$ is always positive when current flows, $$V$$ must be strictly less than $$\\varepsilon$$.\n\nTakeaway: Internal resistance steals voltage from the external circuit whenever current flows.", "source": "GLM 5.1 ③", "_id": "glm_3_17", "judge_pick": false}, {"question": "To determine internal resistance $$r$$ graphically, you plot terminal p.d. $$V$$ on the y-axis against current $$I$$ on the x-axis. Derive what the y-intercept and gradient represent from the equation $$V = \\varepsilon - Ir$$, and identify the common sign trap. (3 steps)", "answer": "- Step 1: Rearrange $$V = \\varepsilon - Ir$$ to match the straight-line equation $$y = c + mx$$, where $$y = V$$ and $$x = I$$.\n- Step 2: The constant term is $$\\varepsilon$$, so the y-intercept (where $$I = 0$$) gives the e.m.f. $$\\varepsilon$$. This makes physical sense: when no current flows, no volts are lost internally, so terminal p.d. equals e.m.f.\n- Step 3: The gradient $$m$$ is the coefficient of $$I$$, which is $$-r$$. The common trap is saying \"gradient = $$r$$\". Because the line slopes downwards (negative gradient), you must explicitly state $$r = -\\text{gradient}$$ to yield a positive resistance value.\n\nTakeaway: Intercept = $$\\varepsilon$$; Gradient = $$-r$$ (never drop the minus sign!).", "source": "GLM 5.1 ③", "_id": "glm_3_18", "judge_pick": false}, {"question": "A battery has an e.m.f. of $$12 \\, V$$ and an internal resistance of $$2 \\, \\Omega$$. It is connected to an external load resistor of $$4 \\, \\Omega$$. Calculate the current $$I$$ in the circuit and the terminal p.d. $$V$$ across the load. (2 steps)", "answer": "- Step 1: Use $$I = \\frac{\\varepsilon}{R + r}$$ to find the current.\n+ Total resistance = external load + internal = $$4 + 2 = 6 \\, \\Omega$$.\n+ $$I = \\frac{12}{6} = 2 \\, A$$.\n- Step 2: Use $$V = \\varepsilon - Ir$$ to find the terminal p.d.\n+ Lost volts inside the battery = $$Ir = 2 \\times 2 = 4 \\, V$$.\n+ Terminal p.d. available for the load = $$12 - 4 = 8 \\, V$$.\n\nTakeaway: Current divides the e.m.f. between internal and external resistances in direct proportion to their values.", "source": "GLM 5.1 ③", "_id": "glm_3_19", "judge_pick": false}, {"question": "Two resistors $$R_1$$ and $$R_2$$ are connected in series across an input voltage $$V_{in}$$, forming a potential divider. Explain conceptually why the output voltage $$V_{out}$$ across $$R_2$$ is proportional to $$R_2$$, and write the formula. (2 steps)", "answer": "- Step 1: In a series circuit, the same current $$I$$ flows through both resistors. The voltage across each is given by $$V = IR$$. Therefore, the voltages are shared in direct proportion to the resistances: the larger resistor claims a larger share of the total voltage.\n- Step 2: Since $$R_2$$ gets a fraction of the total voltage equal to its fraction of the total resistance, $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$. If $$R_2$$ is much larger than $$R_1$$, $$V_{out}$$ approaches $$V_{in}$$.\n\nTakeaway: A potential divider splits voltage in the exact ratio of the resistances.", "source": "GLM 5.1 ③", "_id": "glm_3_20", "judge_pick": true}, {"question": "An LDR (Light-Dependent Resistor) is connected as $$R_2$$ (bottom resistor) in a potential divider. As the room gets darker, what happens to the LDR's resistance, and how does this affect the output voltage $$V_{out}$$ across it? (3 steps)", "answer": "- Step 1: An LDR has a high resistance in the dark and a low resistance in bright light. As the room gets darker, the LDR's resistance increases.\n- Step 2: In the divider formula $$V_{out} = V_{in} \\frac{R_2}{R_1 + R_2}$$, if $$R_2$$ (the LDR) increases while $$R_1$$ remains constant, the numerator grows, and the fraction $$\\frac{R_2}{R_1 + R_2}$$ increases.\n- Step 3: Therefore, $$V_{out}$$ increases. In the dark, the LDR claims a larger share of the total voltage for itself.\n\nTakeaway: Darker room → LDR resistance up → if LDR is the bottom resistor, $$V_{out}$$ goes up.", "source": "GLM 5.1 ③", "_id": "glm_3_21", "judge_pick": true}, {"question": "An NTC thermistor is connected as $$R_1$$ (top resistor) in a potential divider, and $$V_{out}$$ is measured across the fixed resistor $$R_2$$ at the bottom. If the temperature increases, what happens to $$V_{out}$$? (3 steps)", "answer": "- Step 1: An NTC thermistor's resistance decreases as temperature increases (Negative Temperature Coefficient).\n- Step 2: As $$R_1$$ (thermistor) decreases, the total resistance $$R_1 + R_2$$ shrinks, but the fraction $$\\frac{R_2}{R_1 + R_2}$$ increases because the denominator shrinks while $$R_2$$ stays constant.\n- Step 3: Since $$V_{out} = V_{in} \\frac{R_2}{R_1 + R_2}$$, the fraction increases, so $$V_{out}$$ increases. The fixed resistor claims a larger share of the voltage because the thermistor is conceding its share.\n\nTakeaway: Thermistor heats up → $$R_1$$ drops → bottom fixed resistor gets more voltage → $$V_{out}$$ rises.", "source": "GLM 5.1 ③", "_id": "glm_3_22", "judge_pick": true}, {"question": "How does a potentiometer differ from a simple fixed potential divider, and what is the physical mechanism that allows it to continuously adjust the output voltage? (2 steps)", "answer": "- Step 1: A fixed divider uses two separate resistors to give one unchanging ratio of output voltage. A potentiometer is a single strip of resistive material with a sliding contact (wiper) that can move along it.\n- Step 2: The sliding contact effectively divides the single resistive strip into two variable resistors, $$R_1$$ and $$R_2$$. By moving the slider, you continuously change the lengths (and thus resistances) of $$R_1$$ and $$R_2$$, allowing $$V_{out}$$ to be adjusted smoothly from $$0$$ to $$V_{in}$$.\n\nTakeaway: A potentiometer is a continuously adjustable potential divider using a mechanical slider.", "source": "GLM 5.1 ③", "_id": "glm_3_23", "judge_pick": false}, {"question": "On a current-voltage ($$I$$-$$V$$) graph for an ideal diode, the curve lies flat on the horizontal axis for all reverse-bias voltages and small forward-bias voltages. Where on this graph is the resistance infinite, and why? (2 steps)", "answer": "- Step 1: Resistance is calculated as $$R = \\frac{V}{I}$$. Infinite resistance mathematically requires the denominator $$I$$ to be zero (or approach zero).\n- Step 2: Any point where the curve sits exactly on the horizontal axis has $$I = 0$$ but some finite $$V$$. For an ideal diode, all points on the flat section before it conducts have $$I = 0$$, hence $$R = \\infty$$. Once it conducts (the steep vertical section), $$I > 0$$, so resistance is small and finite.\n\nTakeaway: Look for the flat $$I = 0$$ line to find infinite resistance; it is never where $$V = 0$$.", "source": "GLM 5.1 ③", "_id": "glm_3_24", "judge_pick": false}, {"question": "An NTC thermistor is in series with a fixed resistor and a battery. When the thermistor is heated, the total current increases. If a voltmeter is across the thermistor, its reading decreases. If the voltmeter is moved across the fixed resistor, its reading increases. Explain why the voltmeter's verdict flips depending on which component it spans. (3 steps)", "answer": "- Step 1: When the thermistor heats up, its resistance $$R_{thermistor}$$ decreases. Total circuit resistance drops, so total current $$I$$ increases (the ammeter goes up in both scenarios).\n- Step 2: Across the thermistor: $$V_{thermistor} = I \\times R_{thermistor}$$. Although $$I$$ increases, $$R_{thermistor}$$ drops rapidly. The drop in resistance outweighs the rise in current, so the product $$V_{thermistor}$$ decreases.\n- Step 3: Across the fixed resistor: $$V_{fixed} = I \\times R_{fixed}$$. Here, $$I$$ increases, and $$R_{fixed}$$ is constant. Therefore, the product $$V_{fixed}$$ must increase. The thermistor loses its share of the e.m.f., which shifts entirely to the fixed resistor.\n\nTakeaway: Current increases for both, but voltage only increases for the component whose resistance didn't decrease.", "source": "GLM 5.1 ③", "_id": "glm_3_25", "judge_pick": false}, {"question": "A student calculates that the power dissipated in a resistor drops from $$100 \\, W$$ to $$30 \\, W$$ when internal resistance changes. They claim \"the power reduces by 70%\". Explain why \"reduces by 70%\" is mathematically different from \"reduces to 70%\", and what the correct percentage is for a drop from $$100 \\, W$$ to $$30 \\, W$$. (3 steps)", "answer": "- Step 1: \"Reduces to 70%\" means the final value is 70% of the original, so the ratio $$\\frac{P_{new}}{P_{old}} = 0.70$$ (a 30% reduction).\n- Step 2: \"Reduces by 70%\" means 70% of the original value has been subtracted, leaving only 30% of the original. So the ratio $$\\frac{P_{new}}{P_{old}} = 0.30$$.\n- Step 3: For a drop from $$100 \\, W$$ to $$30 \\, W$$, the ratio is $$\\frac{30}{100} = 0.30$$, meaning the power reduces TO 30%, or reduces BY 70%. Examiners penalise mixing these phrases; you must quote the exact comparison number (0.30 or 30%) to justify your conclusion.\n\nTakeaway: \"Reduces by X%\" means you subtract X%; \"reduces to X%\" means you end up at X%.", "source": "GLM 5.1 ③", "_id": "glm_3_26", "judge_pick": true}, {"question": "The resistivity of ordinary cold air is approximately $$10^{16} \\, \\Omega \\, m$$, making it an excellent insulator. During a lightning strike, the resistivity of the air in the channel drops to about $$0.2 \\, \\Omega \\, m$$. Using microscopic physics, explain why this colossal drop occurs. (2 steps)", "answer": "- Step 1: Resistivity depends on how easily charge can flow. In cold air, there are almost no free charge carriers (very low number density $$n$$), so current is effectively zero for any reasonable voltage, giving huge $$\\rho$$.\n- Step 2: During a lightning strike, the immense electric field ionises the air, stripping electrons from molecules and creating a hot plasma. This suddenly creates a vast number of free charge carriers, making $$n$$ astronomically larger. Since $$\\rho$$ is inversely related to carrier density $$n$$, this surge in free carriers causes the resistivity to collapse by a factor of $$\\sim 10^{17}$$.\n\nTakeaway: Ionisation converts insulating air into conducting plasma by flooding it with free charge carriers.", "source": "GLM 5.1 ③", "_id": "glm_3_27", "judge_pick": false}], "count": 28}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Why does adding more resistors in parallel reduce total resistance? Explain via the water pipe analogy and the formula derivation. (3 steps)", "answer": "- Step 1: **Water analogy** - Imagine multiple pipes (resistors) in parallel. More pipes provide more pathways for water (current), reducing overall flow resistance.\n- Step 2: **Formula derivation** - For resistors in parallel, 1/R_total = 1/R₁ + 1/R₂ + ... Each resistor adds a conductance pathway (1/R), so total conductance increases ⇒ R_total decreases.\n+ Example: Two 5Ω resistors: 1/R_total = 1/5 + 1/5 = 2/5 ⇒ R_total = 2.5Ω (smaller than smallest individual resistor)\n- Step 3: **Edge case** - If one resistor is zero (wire), all current flows through it ⇒ R_total = 0. Shows why even one low-resistance path drastically reduces R_total.", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": true}, {"question": "What happens to the terminal voltage of a real battery when the load resistor R decreases? Walk through the chain: R → I → V. (3 steps)", "answer": "- Step 1: **R decreases** - Load resistor R is reduced in a circuit with internal resistance r.\n- Step 2: **Current I increases** - Total resistance R_total = R + r ⇒ I = ε/(R + r). Lower R ⇒ higher I.\n- Step 3: **Terminal voltage V decreases** - V = ε - Ir. Higher I ⇒ greater voltage drop across r ⇒ V drops.", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "Why does a thermistor (NTC) have decreasing resistance with temperature rise, opposite to normal conductors? Explain via I = nAvq. (3 steps)", "answer": "- Step 1: **In metals** - n (charge carrier density) is constant. Higher T ⇒ more lattice vibrations ⇒ v (drift velocity) decreases ⇒ R increases.\n- Step 2: **In semiconductors (NTC)** - Higher T ⇒ more electrons excited into conduction band ⇒ n increases rapidly.\n+ Example: n might double for every 10°C rise, overwhelming slight v reduction.\n- Step 3: **Net effect** - In I = nAvq, large n increase dominates ⇒ I increases ⇒ R = V/I decreases.", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": true}, {"question": "What's the flaw in saying \"internal resistance gradient is ΔV/ΔI\"? Explain with the V-I graph equation. (2 steps)", "answer": "- Step 1: **Equation derivation** - From V = ε - Ir, rearranged as V = (-r)I + ε. This is y = mx + c ⇒ gradient m = -r.\n- Step 2: **Sign importance** - Gradient is negative (line slopes downward). Taking r = |gradient| without the minus sign would be incorrect per examiners' marking schemes.", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "Why is the reciprocal trap a common mistake in parallel resistor calculations? Demonstrate with two 10Ω resistors. (2 steps)", "answer": "- Step 1: **Common error** - Students add conductances (1/10 + 1/10 = 0.2), but forget to invert result ⇒ incorrectly state R_total = 0.2Ω instead of 1/0.2 = 5Ω.\n- Step 2: **Reality check** - Parallel resistors must have R_total < smallest individual resistor (5Ω < 10Ω). Answer 0.2Ω fails this sanity test.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": true}, {"question": "How does doubling a wire's length affect its resistivity ρ and resistance R? Explain with ρ = RA/L. (2 steps)", "answer": "- Step 1: **Resistivity ρ** - Material property independent of size. Doubling length doesn't change ρ (it depends on material composition).\n- Step 2: **Resistance R** - R = ρL/A. Doubling L ⇒ R doubles (direct proportionality). Resistivity remains constant ⇒ R ∝ L.", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "Why is drift velocity v ≈ 10⁻⁴ m/s so slow for electrons in a current-carrying wire? Explain via I = nAvq and charge density. (2 steps)", "answer": "- Step 1: **High n compensates** - Copper has n ≈ 8.4×10²⁸ m⁻³. Even with v=10⁻⁴ m/s, I = nAvq ≈ (8.4×10²⁸)(10⁻⁶)(10⁻⁴)(1.6×10⁻¹⁹) ≈ 1A.\n- Step 2: **Signal vs drift speed** - The electric field propagates at near lightspeed (~10⁸ m/s) but electrons themselves only drift slowly between collisions.", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": true}, {"question": "What's the conceptual difference between e.m.f. (ε) and terminal voltage (V) in a battery? Explain via energy transfer. (2 steps)", "answer": "- Step 1: **e.m.f. definition** - Energy converted from chemical to electrical per coulomb: ε = energy/coulomb (J/C).\n- Step 2: **Terminal voltage** - After internal energy loss (Ir), remaining electrical energy per coulomb is V = ε - Ir ⇒ V < ε when current flows.", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "Why is power P = I²R preferred over P = V²/R for calculating resistance heating? Give two practical reasons. (2 steps)", "answer": "- Step 1: **Current is uniform** - In series circuits, I is same everywhere ⇒ P = I²R directly links power to each resistor's R.\n- Step 2: **V²/R requires V knowledge** - In complex circuits, V across a resistor isn't always known, but total I is often easier to measure/calculate.", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": true}, {"question": "What happens to both meters in Q7 when the thermistor (NTC) is replaced with an LDR and light intensity increases? Explain via R → I → V chain. (3 steps)", "answer": "- Step 1: **R decreases** - LDR's resistance drops with increased light.\n- Step 2: **Total I increases** - With lower R_total = R_LDR + R_fixed ⇒ I = ε/R_total increases.\n- Step 3: **Meter readings** - Ammeter rises (I↑). Voltmeter across LDR: V_LDR = IR_LDR. Both I↑ and R_LDR↓ ⇒ net effect depends on which dominates. Since R_total ↓ ⇒ I↑ more than R_LDR↓ ⇒ V_LDR = IR_LDR likely decreases.", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": true}], "count": 10}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What is resistivity (ρ) and how is it measured in units? (2 steps)", "answer": "- Step 1: Resistivity (ρ) is a material property that quantifies how strongly a material opposes the flow of electric current. It is defined as the resistance of a one-meter cube of the material.\n+ Example: Copper has a low resistivity (~1.7 × 10⁻⁸ Ω·m), indicating it conducts electricity well.\n\n- Step 2: The SI unit of resistivity is ohm-metre (Ω·m), derived from the formula ρ = (R × A) / L, where R is resistance (Ω), A is cross-sectional area (m²), and L is length (m).\n+ Example: A material with 1 Ω resistance, 1 m² area and 1 m length has resistivity of 1 Ω·m.", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Derive the formula for resistivity (ρ) in terms of resistance (R), length (L), and cross-sectional area (A). (3 steps)", "answer": "- Step 1: Start with the physical intuition that resistance increases with length (longer conductor) and decreases with area (fatter conductor): R ∝ L/A\n+ For a fixed material, doubling length doubles resistance; doubling area halves resistance.\n\n- Step 2: Introduce resistivity (ρ) as the constant of proportionality: R = ρ(L/A)\n+ This makes intuitive sense - ρ is a material-specific constant that determines the resistance for standard dimensions.\n\n- Step 3: Rearranging to solve for ρ gives: ρ = (R × A) / L\n+ This is the form typically used in experiments to measure resistivity by determining R, measure L and A.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "How does temperature affect the resistivity of conductors and semiconductors? Explain from a microscopic perspective. (3 steps)", "answer": "- Step 1: In conductors (metals), resistivity increases with temperature because increased lattice vibrations scatter electrons more, reducing their drift velocity.\n+ Example: Copper's resistivity increases by about 0.4% per degree Celsius rise.\n\n- Step 2: In semiconductors, resistivity decreases with temperature because the number of charge carriers (n) increases significantly with thermal energy.\n+ For semiconductors like silicon, n increases exponentially with temperature, overwhelming any decrease in drift velocity.\n\n- Step 3: This contrasting behavior explains why NTC (Negative Temperature Coefficient) thermistors have decreasing resistance with increasing temperature, unlike ordinary conductors.\n+ This property makes thermistors useful in temperature sensing applications.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "In a series circuit, how do current, voltage, and resistance relate? Explain the physical reasoning behind these relationships. (3 steps)", "answer": "- Step 1: In any series circuit, the current is the same at all points because there's only one path for electrons to flow.\n+ Like water flowing through a single pipe, all electrons must pass through each component in sequence.\n\n- Step 2: The total voltage is the sum of the voltage drops across each resistor: V_total = V₁ + V₂ + V₃ + ...\n+ This follows from conservation of energy - the work done on the charges must equal the energy gained from the power source.\n\n- Step 3: Total resistance is the sum of individual resistances: R_total = R₁ + R₂ + R₃ + ...\n+ More resistors in series are like adding more obstacles in the path, making it harder for current to flow overall.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "In a parallel circuit, how do current, voltage, and resistance relate? Explain the physical reasoning behind these relationships. (3 steps)", "answer": "- Step 1: In a parallel circuit, the voltage across each branch is the same because all branches connect the same two points in the circuit.\n+ Think of it like water pressure in a network of pipes branching from the same source.\n\n- Step 2: Total current is the sum of currents in each branch: I_total = I₁ + I₂ + I₃ + ...\n+ This is a direct consequence of conservation of charge - all electrons must go somewhere in the circuit.\n\n- Step 3: The reciprocal of total resistance is the sum of reciprocals of individual resistances: 1/R_total = 1/R₁ + 1/R₂ + 1/R₃ + ...\n+ Adding more parallel paths creates more routes for current, always decreasing the total resistance.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "Describe the procedure for determining the resistivity of a wire in the laboratory, including measurements needed and calculations. (4 steps)", "answer": "- Step 1: Measure the diameter of the wire at several points using a micrometer caliper to determine the average radius (r).\n+ Measure in perpendicular directions to check for circularity.\n\n- Step 2: Calculate the cross-sectional area A = πr² using the average radius.\n+ Ensure units are consistent (e.g., convert mm to meters if necessary).\n\n- Step 3: Set up a circuit with the wire connected in series with a power supply, ammeter and a voltmeter across the wire.\n+ For multiple measurements, use variable length of wire segments.\n\n- Step 4: Measure the resistance R = V/I for different lengths and plot R against length (L).\n+ The slope of R vs L graph gives ρ/A, so resistivity ρ = slope × A.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Derive the equation I = nAvq and explain what each term represents. (3 steps)", "answer": "- Step 1: Consider a conductor with cross-sectional area A and volume V = A × vΔt, where v is drift velocity and Δt is time.\n+ The volume contains mobile charge carriers with number density n (per m³).\n\n- Step 2: Total charge ΔQ in this volume is ΔQ = nAvΔt × q, where q is the charge per carrier.\n+ For electrons, q = -e = -1.6 × 10⁻¹⁹ C.\n\n- Step 3: Current I = ΔQ/Δt = nAvq, showing it's proportional to carrier density, area, drift velocity, and charge.\n+ This explains why good conductors have high n (like 8.4 × 10²⁸ m⁻³ for copper) and why increasing area allows more current.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "What is internal resistance in a power source, and how does it affect terminal voltage? (3 steps)", "answer": "- Step 1: Internal resistance (r) is the resistance within a power source that causes a voltage drop when current flows.\n+ This can be modeled as a perfect voltage source in series with a resistor.\n\n- Step 2: Terminal voltage V = ε - Ir, where ε is the electromotive force (e.m.f.) and I is the current.\n+ As current increases, the voltage \"lost\" in the source (Ir) increases, so terminal voltage must decrease.\n\n- Step 3: The relationship is linear, V = ε - Ir, which can be plotted as a straight line with slope -r and y-intercept ε.\n+ The internal resistance can be determined from the gradient of a V vs I graph.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Explain how a potential divider works and why it is useful. (3 steps)", "answer": "- Step 1: A potential divider consists of two or more resistors in series with a voltage source, dividing the voltage proportionally to the resistances.\n+ The output voltage is taken across one of the resistors.\n\n- Step 2: The voltage across a resistor in a series circuit is proportional to its resistance: V_out = V_in × (R₂/(R₁ + R₂))\n+ If R₂ is twice R₁, then V₂ will be two-thirds of V_in.\n\n- Step 3: Potential dividers are useful for producing a variable voltage from a fixed voltage source, particularly when one resistor is a variable resistor.\n+ This principle is used in sensors like light-dependent resistors (LDRs) and thermistors.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "For light-dependent resistors (LDRs) and thermistors, explain how they work and how they affect a potential divider circuit. (3 steps)", "answer": "- Step 1: In an LDR, resistance decreases with increasing light intensity as more electrons are freed to conduct electricity.\n+ In darkness, resistance can be several MΩ, but under bright light, it drops to a few hundred Ω.\n\n- Step 2: In an NTC (Negative Temperature Coefficient) thermistor, resistance decreases with increasing temperature as more electrons gain energy to conduct.\n+ At room temperature (~25°C), resistance is high, but it decreases exponentially with temperature.\n\n- Step 3: When used in a potential divider, the voltage across the sensor changes with the environmental condition being measured.\n+ In a dark room, an LDR in a potential divider will have a large voltage drop across it; when illuminated, the voltage drop across it decreases.", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "Given two 5 Ω resistors, calculate their total resistance in both series and parallel configurations. Show your work. (3 steps)", "answer": "- Step 1: For series, R_total = R₁ + R₂ = 5 Ω + 5 Ω = 10 Ω\n+ Series resistors add directly because the current must pass through both resistors sequentially.\n\n- Step 2: For parallel, 1/R_total = 1/R₁ + 1/R₂ = 1/5 Ω + 1/5 Ω = 2/5 Ω\n+ Total resistance is the reciprocal of this sum: R_total = 5 Ω / 2 = 2.5 Ω\n\n- Step 3: The parallel resistance is always less than the smallest individual resistor (5 Ω), while the series resistance is the sum of both.\n+ This explains why adding resistors in parallel provides more paths for current, reducing total resistance.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}, {"question": "Explain the three forms of power calculation (P = VI = I²R = V²/R) and when each is most appropriate to use. (3 steps)", "answer": "- Step 1: P = VI is useful when you know both voltage and current in a circuit component.\n+ This is the fundamental definition of power - energy per unit time.\n\n- Step 2: P = I²R is useful when current is known and you want to calculate power loss in a resistor.\n+ This form highlights why high voltage transmission is used in power grids - for a fixed power, higher voltage means lower current and thus lower I²R losses.\n\n- Step 3: P = V²/R is useful when voltage is known and you want to calculate power dissipated by a resistor.\n+ It shows that for a fixed voltage, lower resistance results in higher power dissipation, which is why short circuits (very low resistance paths) can be dangerous.", "source": "Qwen 3 ②", "_id": "qwen_2_11", "judge_pick": false}, {"question": "Using the equation I = nAvq, explain why the resistance of an NTC thermistor decreases with increasing temperature. (3 steps)", "answer": "- Step 1: For an NTC thermistor, increasing temperature increases the number density (n) of charge carriers significantly as more electrons gain enough energy to move into the conduction band.\n+ Unlike metals where n is nearly constant, in semiconductors n increases exponentially with temperature.\n\n- Step 2: Although increased temperature might decrease drift velocity (v) due to more frequent collisions, the increase in n dominates.\n+ The exponential increase in n outweighs any linear decrease in v.\n\n- Step 3: Since current I = nAvq increases with temperature and voltage is constant (for a given setup), resistance R = V/I must decrease.\n+ This explains the negative temperature coefficient behavior of these thermistors.", "source": "Qwen 3 ②", "_id": "qwen_2_12", "judge_pick": true}, {"question": "How can you graphically determine the internal resistance of a cell? Describe the procedure and how to analyze the results. (3 steps)", "answer": "- Step 1: Connect a variable resistor in series with the cell and measure the terminal voltage V and current I for different settings of the variable resistor.\n+ Use a voltmeter directly across the cell terminals and an ammeter in series with the circuit.\n\n- Step 2: Plot a graph of V (on y-axis) against I (on x-axis) for the various measurements.\n+ Theory predicts a linear relationship: V = ε - Ir\n\n- Step 3: The graph should be a straight line with y-intercept equal to the e.m.f. (ε) and a slope (gradient) of -r, where r is the internal resistance.\n+ The internal resistance can be calculated from the magnitude of the slope of this line.", "source": "Qwen 3 ②", "_id": "qwen_2_13", "judge_pick": false}, {"question": "In a potential divider circuit with a fixed 10 kΩ resistor and a variable 10 kΩ resistor, what is the range of output voltages possible? (3 steps)", "answer": "- Step 1: The potential divider formula is V_out = V_in × (R₂/(R₁ + R₂)), where R₂ is the variable resistor.\n+ When R₂ is 0 kΩ (minimum setting), V_out = V_in × (0/(10kΩ + 0)) = 0 V\n\n- Step 2: When R₂ is 10 kΩ (maximum setting), V_out = V_in × (10kΩ/(10kΩ + 10kΩ)) = V_in × 0.5\n+ This means the output voltage can be varied from 0 V to half of the input voltage.\n\n- Step 3: The variable resistor is acting as a potentiometer in this configuration, allowing for adjustment of the output voltage from 0 to V_in/2.\n+ This principle is used in many applications like volume controls and dimmer switches.", "source": "Qwen 3 ②", "_id": "qwen_2_14", "judge_pick": false}, {"question": "What is the difference between resistance and resistivity? Explain with examples of how each changes with physical properties. (3 steps)", "answer": "- Step 1: Resistance is a property of a specific object and depends on its shape and size, increasing with length and decreasing with cross-sectional area.\n+ A long, thin copper wire has higher resistance than a short, thick copper wire of the same material.\n\n- Step 2: Resistivity is an intrinsic property of the material itself, independent of the object's size or shape.\n+ Copper has a resistivity of ~1.7 × 10⁻⁸ Ω·m regardless of whether it's in the form of a thin wire or thick rod.\n\n- Step 3: Resistance changes with the dimensions of the object (R = ρL/A), but resistivity only changes with the material or temperature.\n+ Stretching a copper wire (increasing L and decreasing A) changes its resistance, but not its resistivity.", "source": "Qwen 3 ②", "_id": "qwen_2_15", "judge_pick": false}, {"question": "Calculate the drift velocity of electrons in a copper wire with cross-sectional area 5.0 × 10⁻⁷ m² carrying a current of 0.93 A. Use n = 8.4 × 10²⁸ m⁻³ and e = 1.60 × 10⁻¹⁹ C. (3 steps)", "answer": "- Step 1: Start with the formula: v = I/(nAq) where q = e (electron charge)\n+ v = 0.93 A / (8.4 × 10²⁸ m⁻³ × 5.0 × 10⁻⁷ m² × 1.60 × 10⁻¹⁹ C)\n\n- Step 2: Calculate the denominator: 8.4 × 10²⁸ × 5.0 × 10⁻⁷ × 1.60 × 10⁻¹⁹ = 6.72 × 10⁴\n+ This is the product of electron density, area and electron charge\n\n- Step 3: Divide current by this to get drift velocity: v = 0.93 / 6.72 × 10⁴ ≈ 1.38 × 10⁻⁵ m/s\n+ This is a very slow drift velocity, which explains why electrical signals (which propagate at near light speed) are not limited by the actual movement of electrons.", "
