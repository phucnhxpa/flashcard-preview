<script>
const DATA={"selected": [{"question": "Why does an LDR have the same kind of behaviour as a thermistor (both decrease resistance when \"stimulated\"), and is this just coincidence? (3 steps)", "answer": "- Step 1: Both are semiconductors. In their unstimulated state, most electrons are bound to atoms — few free carriers, high resistance.\n- Step 2: Stimulation (heat for thermistor, light for LDR) supplies energy that liberates bound electrons into conduction states. More free carriers ⇒ larger $$n$$ in $$I = nAvq$$ ⇒ lower resistance.\n- Step 3: Not a coincidence — it's the same physics with different energy sources. Thermal energy ($$\\sim k_B T$$) vs photon energy ($$h\\nu$$). Both promote electrons across the same band gap, and the resistance response is qualitatively identical.\n\nSemiconductor sensors all share this \"more stimulus ⇒ more carriers ⇒ less resistance\" pattern.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "Define resistivity in words, and explain why it is a property of the *material* but resistance is a property of the *sample*. (3 steps)", "answer": "- Step 1: Resistivity $$\\rho$$ is defined by $$R = \\rho L / A$$, with units Ω m. It quantifies how strongly the material itself opposes current flow per unit length per unit cross-section.\n- Step 2: Resistance $$R$$ depends on shape: a long thin wire of copper has much more resistance than a short fat wire of the same copper, but both have the *same resistivity*.\n+ Stretch a wire: $$L$$ goes up, $$A$$ goes down, so $$R$$ rises rapidly — but $$\\rho$$ is unchanged.\n+ Replace copper with aluminium: same geometry, $$R$$ changes — because $$\\rho$$ changed.\n- Step 3: So $$\\rho$$ characterises the *substance*; $$R$$ characterises *this particular piece* of that substance. A material's resistivity is an intrinsic property like density; resistance is extensive like mass.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "Why is the terminal p.d. $$V$$ of a real cell always *less* than its e.m.f. $$\\varepsilon$$ when current flows, and equal to $$\\varepsilon$$ only when no current flows? (3 steps)", "answer": "- Step 1: A real cell is modelled as an ideal e.m.f. source $$\\varepsilon$$ in series with an internal resistance $$r$$. When current $$I$$ flows, a voltage $$Ir$$ is \"lost\" across this internal resistance.\n- Step 2: By Kirchhoff's voltage law: $$\\varepsilon = V + Ir$$, so $$V = \\varepsilon - Ir$$. The terminal p.d. $$V$$ — what the voltmeter across the external terminals reads — is what's left over after the internal drop.\n- Step 3: When $$I = 0$$ (open circuit), there's no internal drop, so $$V = \\varepsilon$$. This is why measuring an \"open-circuit voltage\" with an ideal voltmeter directly gives the e.m.f.\n\nThe internal resistance is invisible until current flows; then it steals voltage.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "For resistors in series, why do voltages add but currents stay the same — and what conservation law is behind each? (3 steps)", "answer": "- Step 1: Current is the same in every series component because charge is conserved: there's nowhere else for the charge to go. Whatever flows into a resistor must flow out and into the next one — like water in a single pipe.\n- Step 2: Voltages add because energy is conserved (Kirchhoff's voltage law). Each resistor demands its own share of energy per coulomb, and the e.m.f. supplied must equal the total energy \"spent\" around the loop: $$V_{\\text{total}} = V_1 + V_2 + V_3$$.\n- Step 3: So in series: same $$I$$, different $$V$$s that add. In parallel it's the mirror image — same $$V$$ across each branch (they're connected to the same two nodes), but currents add as they merge.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "In the context of $$I = nAvq$$, explain why replacing a wire with one of the same material but double the cross-sectional area (same length) halves the resistance, even though the resistivity hasn't changed. (3 steps)", "answer": "- Step 1: Resistivity $$\\rho$$ is a material property and hasn't changed — same material. But resistance depends on geometry: $$R = \\rho L / A$$. With $$A$$ doubled and $$L$$ unchanged, $$R$$ is halved.\n- Step 2: Microscopically, double the area means double the number of charge carriers in any cross-section (since $$n$$ is the same). In $$I = nAvq$$, doubling $$A$$ doubles the current for the same drift velocity and voltage — i.e., the wire conducts twice as much current for the same voltage.\n- Step 3: By $$R = V/I$$, if $$I$$ doubles (for the same $$V$$), then $$R$$ halves. The thicker wire is like having two identical wires in parallel — each carries the same current as the original, so the total current doubles and the effective resistance halves.\n\n+ This is the parallel-resistance intuition applied to a single wire: a thicker wire is effectively more parallel paths for the electrons, so lower resistance.", "source": "GLM 5.1 ②", "_id": "glm_2_56"}, {"question": "Conduction electrons in copper drift at only about $$10^{-4}$$ m/s, yet a lamp lights instantly when you flip a switch. How do you reconcile this? (3 steps)", "answer": "- Step 1: The *individual* electrons drift slowly — they bounce around the lattice, and the net forward drift is tiny because $$n$$ is enormous.\n- Step 2: But the electric field that pushes them propagates at near light speed through the wire. The instant the switch closes, electrons *everywhere* in the circuit start drifting almost simultaneously.\n- Step 3: It's like a pipe already full of water: pushing in a tiny bit at one end causes water to flow out the other end immediately, even though any individual water molecule has barely moved.\n\nTakeaway: signal speed ≠ drift speed. The \"current turns on\" wave is electromagnetic; the carriers themselves crawl.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "Why does a metal wire's resistance *increase* with temperature, but an NTC thermistor's resistance *decrease* with temperature? Use $$I = nAvq$$ to explain. (3 steps)", "answer": "- Step 1: In a metal, the number density $$n$$ is essentially fixed (already one free electron per atom). Heating makes the lattice ions vibrate harder, scattering electrons more often, so the average drift speed $$v$$ falls for a given field. Result: resistance $$\\uparrow$$.\n- Step 2: In an NTC thermistor (semiconductor), heating *liberates* far more charge carriers — $$n$$ rises dramatically (exponentially, in fact). The drift speed $$v$$ still falls a little due to extra scattering, but $$n$$ rises *much faster*.\n- Step 3: In the product $$nAvq$$, the huge jump in $$n$$ dominates the small drop in $$v$$, so $$I$$ rises for a given voltage — meaning resistance falls.\n\nTakeaway: same equation, opposite behaviour, because different effects dominate. In metals $$v$$ wins; in semiconductors $$n$$ wins.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "A negative-temperature-coefficient (NTC) thermistor is in series with a fixed resistor across a battery. The voltmeter is wired across the *thermistor*. Temperature rises — does the voltmeter reading go up or down, and why? (4 steps)", "answer": "- Step 1: NTC thermistor: temperature ↑ ⇒ thermistor resistance $$R_T$$ ↓.\n- Step 2: Total circuit resistance $$R_{total} = R_T + R_F$$ ↓, so by $$I = \\varepsilon / R_{total}$$, the current ↑.\n- Step 3: The voltmeter across the thermistor reads $$V_T = I R_T$$. Here $$I$$ rises but $$R_T$$ falls — which wins?\n+ The thermistor's resistance is dropping faster than the current rises, because $$R_T$$'s fall is what *caused* the current rise in the first place.\n+ Equivalently, the voltage share has shifted *off* the thermistor and *onto* the fixed resistor (total voltage is fixed at $$\\varepsilon$$).\n- Step 4: So $$V_T$$ *decreases*.\n\nTakeaway: the component whose resistance drops \"loses\" its share of the voltage.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "In the lightning question, why is $$L$$ in the resistivity formula taken as 400 m (the cloud-to-ground distance) and not some other length? (2 steps)", "answer": "- Step 1: In $$R = \\rho L/A$$, $$L$$ is the length of the *conducting path* — the path the current actually travels through the resistive medium. For a lightning bolt, the conducting path is the ionised plasma channel itself, which runs from cloud to ground = 400 m.\n- Step 2: There's no \"cable\" — the lightning *is* its own conductor. So $$L$$ is literally the length of the ionised column you're modelling as a resistor.\n\nCommon slip: confusing $$L$$ with some unrelated distance (e.g. the horizontal distance to the strike). Always ask: \"through what length does current actually flow?\"", "source": "Opus 4.7 ②", "_id": "opus_2_28"}, {"question": "The accepted resistivity of cold air is about $$10^{16} \\, \\Omega \\cdot m$$, but during a lightning strike, the calculated resistivity of the air channel is about $$0.2 \\, \\Omega \\cdot m$$. Why is there such a massive difference? (2 steps)", "answer": "- Step 1: During a lightning strike, the intense electric field rips electrons from air molecules, ionising the air into a hot conducting plasma.\n- Step 2: This plasma has vastly more free charge carriers (huge $$n$$ in $$I = nAvq$$) than ordinary insulating air. Because the number of carriers increases by a massive factor, the resistivity collapses by a factor of $$\\sim 10^{17}$$.\n\nIonisation turns insulating air into a highly conductive plasma.", "source": "GLM 5.1 ①", "_id": "glm_1_25"}, {"question": "Same NTC circuit, but now the voltmeter is moved to read across the *fixed* resistor. How does its reading change as temperature rises? (3 steps)", "answer": "- Step 1: Same chain: $$R_T$$ ↓ ⇒ $$R_{total}$$ ↓ ⇒ $$I$$ ↑.\n- Step 2: The voltmeter across the fixed resistor reads $$V_F = I R_F$$. Now $$R_F$$ is *constant* and only $$I$$ changes.\n- Step 3: Since $$I$$ rises and $$R_F$$ is fixed, $$V_F$$ rises.\n\nTakeaway: same physical setup, opposite voltmeter verdict — the voltmeter's behaviour depends entirely on *which* component it spans, while the ammeter (measuring $$I$$) gives the same answer either way.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "What is a potentiometer, and why is it described as a \"continuously adjustable potential divider\"? (2 steps)", "answer": "- Step 1: A potentiometer is a three-terminal device: a resistive track with a sliding contact (wiper). The full input voltage is applied across the entire track (end terminals), and the wiper taps off a variable fraction of that voltage at the middle terminal.\n- Step 2: As the slider moves along the track, it effectively changes the ratio of the two \"resistances\" on either side — exactly like changing $$R_1$$ and $$R_2$$ in a potential divider, but continuously. At one extreme, the output equals the full input; at the other extreme, it equals zero. Every position in between gives a proportionally intermediate voltage.\n\n+ Volume knobs on audio equipment are potentiometers: rotating the knob moves the wiper, changing the fraction of the signal voltage passed to the amplifier.", "source": "GLM 5.1 ②", "_id": "glm_2_24"}, {"question": "Describe the graphical method to determine the e.m.f. and internal resistance of a cell. (3 steps)", "answer": "- Step 1: Vary the external load resistance and record several pairs of terminal p.d. $$V$$ and current $$I$$.\n- Step 2: Plot $$V$$ on the y-axis against $$I$$ on the x-axis. The equation $$V = \\varepsilon - Ir$$ takes the form $$y = c + mx$$.\n- Step 3: The y-intercept is the e.m.f. $$\\varepsilon$$. The gradient is $$-r$$, so internal resistance is the negative of the gradient ($$r = -\\frac{\\Delta V}{\\Delta I}$$). Keep the minus sign explicit because the line slopes down.\n\nThe V-I graph translates the circuit equation into a straight line: intercept for e.m.f., negative gradient for internal resistance.", "source": "GLM 5.1 ①", "_id": "glm_1_19"}, {"question": "Define electromotive force (e.m.f.) and state its unit. Why is it NOT a \"force\"? (2 steps)", "answer": "- Step 1: The e.m.f. ($$ε$$) of a source is the energy converted from other forms (chemical, mechanical, etc.) into electrical energy per unit charge passing through the source. Unit: volt (V) = $$J\\ C^{-1}$$.\n- Step 2: It's called \"electromotive force\" historically but is actually a potential difference (energy per unit charge), not a force. The word \"force\" is misleading — it measures energy transfer, not mechanical force.\n\n**Critical wording:** Always say \"per unit charge\" or \"per coulomb\" — never \"per charge particle\" (that would be wrong by a factor of ~$$10^{19}$$).", "source": "MiniMax ②", "_id": "minimax_2_12"}, {"question": "In a circuit with a battery, resistor, and LED in series, the LED doesn't light up. When you add a second identical battery in series (doubling the e.m.f.), the LED lights. Explain this in terms of the LED's I-V characteristic. (2 steps)", "answer": "- Step 1: An LED has a threshold voltage (turn-on voltage) — below this, current is essentially zero (very high resistance). Once the voltage exceeds the threshold, current increases rapidly with voltage.\n- Step 2: With one battery, the voltage was below the LED's turn-on voltage, so current was negligible (LED appeared \"off\"). Adding the second battery doubled the voltage — now exceeding the threshold, current flows, and the LED lights. The LED's resistance changed from essentially infinite to a low value once the voltage threshold was crossed.", "source": "MiniMax ①", "_id": "minimax_1_39"}, {"question": "A wire has resistance R. If you double its length while keeping the material and cross-sectional area the same, what happens to its resistance? What if you double its diameter instead? (3 steps)", "answer": "- Step 1: From $$\\rho = \\frac{RA}{L}$$, rearrange to $$R = \\frac{\\rho L}{A}$$. Resistance is directly proportional to length — doubling length doubles the resistance.\n- Step 2: For diameter: cross-sectional area $$A = \\pi r^2 = \\pi(d/2)^2 = \\frac{\\pi d^2}{4}$$. Area is proportional to $$d^2$$.\n- Step 3: Doubling diameter increases area by a factor of 4 ($$2^2$$). Since $$R \\propto \\frac{1}{A}$$, the resistance decreases by a factor of 4 — the wire becomes easier to pass current through.", "source": "MiniMax ①", "_id": "minimax_1_6"}, {"question": "Why is power P = I²R preferred over P = V²/R for calculating resistance heating? Give two practical reasons. (2 steps)", "answer": "- Step 1: **Current is uniform** - In series circuits, I is same everywhere ⇒ P = I²R directly links power to each resistor's R.\n- Step 2: **V²/R requires V knowledge** - In complex circuits, V across a resistor isn't always known, but total I is often easier to measure/calculate.", "source": "Qwen 3 ①", "_id": "qwen_1_8"}, {"question": "Why must you be careful with the wording \"reduces to 70%\" versus \"reduces by 70%\" when analyzing power changes? Give an example. (2 steps)", "answer": "- Step 1: \"Reduces to 70%\" means the new value is 70% of the original: $$P_{new} = 0.70 P_{old}$$. \"Reduces by 70%\" means only 30% remains: $$P_{new} = 0.30 P_{old}$$.\n- Step 2: In the power question, we found power falls to 86% (not 70%). If the claim had been \"reduces by 70%\", the correct interpretation would be it falls to 30% — completely different. Always read the exact wording.", "source": "MiniMax ①", "_id": "minimax_1_45"}, {"question": "What is the fundamental difference between resistance $$R$$ and resistivity $$\\rho$$? Which one is an intrinsic property of the material, and which depends on the physical dimensions of the sample? (2 steps)", "answer": "- Step 1: Resistivity $$\\rho$$ is an intrinsic property of the material itself (e.g., copper has a specific $$\\rho$$ regardless of shape). It tells you how inherently resistant a material is to current flow.\n- Step 2: Resistance $$R$$ is an extrinsic property that depends on the sample's dimensions—its length $$L$$ and cross-sectional area $$A$$—as well as the material's resistivity. A long, thin wire of copper has a higher $$R$$ than a short, thick chunk of the same copper, even though their $$\\rho$$ values are identical.\n\nTakeaway: $$\\rho$$ answers \"what material is it?\"; $$R$$ answers \"what shape and size is this specific sample?\"", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "Two 10 Ω resistors are connected in parallel. A student computes $$1/R_{\\text{total}} = 1/10 + 1/10 = 2/10 = 0.2$$ and writes \"$$R_{\\text{total}} = 0.2\\;\\Omega$$\". What mistake did they make? (2 steps)", "answer": "- Step 1: The parallel formula gives you $$1/R_{\\text{total}}$$, not $$R_{\\text{total}}$$ itself. The student's value of 0.2 is the *reciprocal* of the resistance, not the resistance. This is the single most common trap in electricity calculations.\n- Step 2: To get the actual resistance, take the reciprocal one more time: $$R_{\\text{total}} = 1 / 0.2 = 5\\;\\Omega$$. A quick sanity check: two identical resistors in parallel always give half the individual value, so $$10/2 = 5\\;\\Omega$$ — consistent.\n\n+ General rule: whenever you use the parallel formula, the *last step* must always be \"flip the final answer.\" Write $$1/R_{\\text{total}} = \\ldots$$, compute the right-hand side, then invert.", "source": "GLM 5.1 ②", "_id": "glm_2_8"}, {"question": "When you plot $$V$$ vs $$I$$ to find internal resistance, why does the line slope *downward*, and what's the physical meaning of the slope's steepness? (3 steps)", "answer": "- Step 1: From $$V = \\varepsilon - Ir$$, as $$I$$ increases, $$V$$ decreases — so the line goes down to the right.\n- Step 2: Physically: drawing more current means more \"lost volts\" $$Ir$$ inside the cell, so less voltage available at the terminals.\n- Step 3: The steepness $$|{-r}| = r$$ measures how *sensitive* the terminal voltage is to current draw:\n+ A nearly flat line ($$r \\approx 0$$) = ideal cell, terminal voltage barely sags under load.\n+ A steep line = poor (or old) cell, terminal voltage collapses as soon as you draw any current.\n\nTakeaway: low internal resistance = \"stiff\" battery that can deliver heavy currents without sagging.", "source": "Opus 4.7 ②", "_id": "opus_2_21"}, {"question": "Summarise the chain of reasoning that Alex insists on for any \"does the meter reading increase or decrease?\" question involving a variable resistor in a series circuit. (4 steps)", "answer": "- Step 1: Identify how the *component's* resistance changes (e.g., NTC thermistor: temperature up → $$R_T$$ down; LDR: darker → $$R_{\\text{LDR}}$$ up).\n- Step 2: Determine the effect on *total* circuit resistance (series: $$R_{\\text{total}}$$ changes in the same direction as the component's resistance; parallel is more complex but the total always decreases when a branch resistance decreases).\n- Step 3: Determine the effect on *current* using $$I = \\varepsilon / R_{\\text{total}}$$. If $$R_{\\text{total}}$$ decreases, $$I$$ increases, and vice versa. The ammeter reading follows the current.\n- Step 4: Determine the effect on the *specific component's voltage* using $$V = IR$$ for that component. Here you must consider both $$I$$ and $$R$$ — if the component's own resistance is changing, you cannot assume $$V$$ moves in the same direction as $$I$$. Use the potential divider formula or substitute concrete numbers.\n\n+ Never skip steps or jump directly to the meter reading. Each step follows inevitably from the previous one, and errors propagate if you skip.", "source": "GLM 5.1 ②", "_id": "glm_2_51"}, {"question": "A battery with $$\\varepsilon = 12.00$$ V drives a load. The voltmeter reads 11.81 V and the ammeter 9.83 A. Without computing the exact number, sketch the logic to extract internal resistance and estimate its order of magnitude. (3 steps)", "answer": "- Step 1: Use $$\\varepsilon = V + Ir$$, so the \"lost volts\" across $$r$$ are $$\\varepsilon - V = 12.00 - 11.81 = 0.19$$ V.\n- Step 2: Then $$r = (\\varepsilon - V)/I = 0.19 / 9.83$$. Roughly, $$0.19 \\approx 0.2$$ and $$9.83 \\approx 10$$, so $$r \\approx 0.02\\ \\Omega$$.\n- Step 3: Sanity check: this is comparable to the 6 cells × 0.010 = 0.060 Ω expected from the cell specs — same order of magnitude, slightly below. The internal resistance of a car battery is small (tens of milliohms), consistent with its job: delivering huge starter currents without losing too much voltage internally.", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "A lightning channel is 400 m long and 5 cm diameter, carrying 25 000 A under 1.2 GV. Outline how to extract its resistivity, and why the answer comes out much smaller than air's normal resistivity. (4 steps)", "answer": "- Step 1: First get the channel's resistance from Ohm's law: $$R = V/I$$. With $$V \\sim 10^9$$ and $$I \\sim 10^4$$, $$R \\sim 10^5\\ \\Omega$$ (actually ~48 kΩ).\n- Step 2: Compute the cross-section: $$A = \\pi (d/2)^2 = \\pi (0.025)^2 \\approx 2 \\times 10^{-3}$$ m².\n- Step 3: Then $$\\rho = RA/L$$ with $$L = 400$$ m (the channel length, not some \"wire length\"). Order of magnitude: $$(5 \\times 10^4)(2 \\times 10^{-3})/400 \\sim 0.2$$ Ω m.\n- Step 4: Why so small? Ordinary cold air has $$\\rho \\sim 10^{16}$$ Ω m (an excellent insulator). During the strike, the air is *ionised into plasma*, with vastly more free charge carriers (huge $$n$$ in $$I = nAvq$$). High $$n$$ means low resistivity — by ~17 orders of magnitude. The ionisation completely changes the material.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "Define electromotive force (e.m.f.) using the exact wording required by the Edexcel specification. Why is it incorrect to say \"energy per charge particle\"? (3 steps)", "answer": "- Step 1: The specification definition: the e.m.f. of a source is *the energy converted from other forms into electrical energy per unit charge passing through the source*. Units: J C⁻¹ = V (volts).\n- Step 2: \"Per unit charge\" means per coulomb. One coulomb is the charge of approximately $$6.24 \\times 10^{18}$$ electrons. \"Per charge particle\" would mean per electron, which carries only $$1.6 \\times 10^{-19}\\;\\text{C}$$.\n- Step 3: If e.m.f. were \"energy per electron,\" the numerical value would be larger by a factor of $$6.24 \\times 10^{18}$$. A 12 V car battery delivers 12 joules per coulomb, not 12 joules per electron. Alex's correction: always write \"per unit charge\" or \"per coulomb\" — never \"per particle.\"\n\n+ Key distinction: e.m.f. is about *energy conversion inside the source* (chemical → electrical), whereas p.d. is about energy *dissipation outside the source* (electrical → other forms). Both share the unit volt, but they describe different processes.", "source": "GLM 5.1 ②", "_id": "glm_2_17"}, {"question": "Explain why the current is the same at every point in a series circuit, but the voltage is the same across each branch in a parallel circuit. (2 steps)", "answer": "- Step 1 (Series): Charge carriers don't accumulate anywhere — the same number that leaves one end of the series loop must arrive at the other end. Since current is charge flow per second, it's identical at every point.\n- Step 2 (Parallel): Each branch connects directly across the same two points, so the potential difference (work per unit charge) between those points is identical for every branch — they share the same \"electrical push.\"\n\n**Physical picture:** Think of series as a single pipe with multiple constrictions (current same, pressure drops add up); parallel as multiple pipes branching from the same tank (same pressure across each branch, flows add up).", "source": "MiniMax ②", "_id": "minimax_2_32"}, {"question": "A cell with internal resistance $$r$$ delivers maximum power to an external load when $$R = r$$ (matched load). Without deriving this rigorously, give the intuition for why both extremes ($$R \\ll r$$ and $$R \\gg r$$) give low load power. (3 steps)", "answer": "- Step 1: If $$R \\to 0$$ (near short-circuit), current is large but the voltage across $$R$$ is tiny, so $$P = VI$$ across $$R$$ is small — almost all power dissipates in $$r$$ internally, heating the cell.\n- Step 2: If $$R \\to \\infty$$ (near open-circuit), voltage across $$R$$ is large but current is tiny, so again $$P = VI$$ across $$R$$ is small — no charge flows to deliver energy.\n- Step 3: There's a sweet spot in between: $$R = r$$. Then current is moderate, voltage across $$R$$ is half the e.m.f., and the product is maximised. It's a classic matched-load result.\n\nPower delivery is a trade-off between current and voltage; both extremes lose.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "The equation $$V = \\varepsilon - Ir$$ can be rearranged into the form $$y = c + mx$$ for a graph of terminal p.d. $$V$$ (y-axis) against current $$I$$ (x-axis). Identify the y-intercept and the gradient, and explain the sign of the gradient. (3 steps)", "answer": "- Step 1: Rewrite as $$V = (-r) \\cdot I + \\varepsilon$$. Comparing to $$y = mx + c$$: the y-intercept is $$\\varepsilon$$ and the gradient is $$-r$$.\n- Step 2: The y-intercept equals the e.m.f. because when $$I = 0$$ (no external load), the terminal p.d. equals the full e.m.f. — this is the open-circuit voltage.\n- Step 3: The gradient is *negative* because as current increases, the \"lost volts\" $$Ir$$ increase, so the terminal p.d. decreases. The line slopes *downward*. To extract $$r$$: $$r = -\\text{gradient}$$, ensuring a positive value since the gradient itself is negative.\n\n+ Common trap: writing \"gradient = $$r$$\" without the minus sign. The line slopes down, so $$\\Delta V / \\Delta I < 0$$, and you must write $$r = -\\Delta V / \\Delta I$$ to get a positive resistance. Examiners require you to state both \"gradient = $$-r$$\" and \"intercept = $$\\varepsilon$$.\"", "source": "GLM 5.1 ②", "_id": "glm_2_19"}, {"question": "Why is \"draw the circuit out and put numbers on it\" Alex's go-to method for circuits-reasoning questions? (3 steps)", "answer": "- Step 1: Verbal \"increases/decreases\" reasoning loses track of which quantity affects which — students confuse $$V$$ across a component with the e.m.f., or $$I$$ in the whole circuit with current through one branch.\n- Step 2: Assigning concrete numbers (say $$\\varepsilon = 12$$ V, $$R_T = 100\\ \\Omega \\to 50\\ \\Omega$$, $$R_F = 100\\ \\Omega$$) lets you compute each quantity at each stage and *see* which goes up and which goes down.\n- Step 3: It also enforces the correct logical chain: component $$R$$ → total $$R$$ → current $$I$$ → voltage on each specific component. Skipping any link is where errors creep in.\n\nNumbers don't lie; verbal hand-waving does.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "When calculating power dissipated in an external load resistor $$R$$ driven by a cell with internal resistance $$r$$, why is $$P = I^2R$$ the most convenient form to use? (2 steps)", "answer": "- Step 1: The current through the circuit is $$I = \\varepsilon / (R + r)$$, which you typically calculate first. The load resistance $$R$$ is given. So $$P = I^2 R$$ uses the two quantities you already have.\n- Step 2: Using $$P = V^2 / R$$ would require first calculating the terminal p.d. $$V = IR$$, adding an extra step. Using $$P = VI$$ would also require $$V$$. Since $$I$$ and $$R$$ are the most directly available quantities in these problems, $$P = I^2R$$ minimises steps and rounding errors.\n\n+ Note: $$P = I^2R$$ gives the power in the *load* resistor specifically, not the total power from the cell (which would be $$P_{\\text{total}} = \\varepsilon I = I^2(R + r)$$).", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "A student writes: \"the e.m.f. of a cell is the voltage across its terminals\". Why is this wrong, and how should it be corrected? (3 steps)", "answer": "- Step 1: The voltage across the terminals (terminal p.d., $$V$$) and the e.m.f. ($$\\varepsilon$$) are *different* whenever current flows. They're related by $$V = \\varepsilon - Ir$$, so $$V < \\varepsilon$$ during current flow.\n- Step 2: The e.m.f. is the energy per unit charge converted from chemical (or other) energy into electrical energy *by the source itself*. The terminal p.d. is what's left after the internal resistance has taken its share.\n- Step 3: Correct definition: \"the energy converted from other forms into electrical energy per unit charge passing through the source.\" It's a property of the source's internal conversion process, not what a voltmeter reads.\n\nYou only see $$V = \\varepsilon$$ when $$I = 0$$ (open circuit).", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "What happens to both meters in Q7 when the thermistor (NTC) is replaced with an LDR and light intensity increases? Explain via R → I → V chain. (3 steps)", "answer": "- Step 1: **R decreases** - LDR's resistance drops with increased light.\n- Step 2: **Total I increases** - With lower R_total = R_LDR + R_fixed ⇒ I = ε/R_total increases.\n- Step 3: **Meter readings** - Ammeter rises (I↑). Voltmeter across LDR: V_LDR = IR_LDR. Both I↑ and R_LDR↓ ⇒ net effect depends on which dominates. Since R_total ↓ ⇒ I↑ more than R_LDR↓ ⇒ V_LDR = IR_LDR likely decreases.", "source": "Qwen 3 ①", "_id": "qwen_1_9"}, {"question": "Two resistors $$R_1$$ and $$R_2$$ are connected in series across an input voltage $$V_{in}$$, forming a potential divider. Explain conceptually why the output voltage $$V_{out}$$ across $$R_2$$ is proportional to $$R_2$$, and write the formula. (2 steps)", "answer": "- Step 1: In a series circuit, the same current $$I$$ flows through both resistors. The voltage across each is given by $$V = IR$$. Therefore, the voltages are shared in direct proportion to the resistances: the larger resistor claims a larger share of the total voltage.\n- Step 2: Since $$R_2$$ gets a fraction of the total voltage equal to its fraction of the total resistance, $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$. If $$R_2$$ is much larger than $$R_1$$, $$V_{out}$$ approaches $$V_{in}$$.\n\nTakeaway: A potential divider splits voltage in the exact ratio of the resistances.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "A graph of current vs voltage for an ideal diode is shown with three labelled points. At which point(s) is the resistance infinite — and why is the answer NOT simply \"at the origin\"? (3 steps)", "answer": "- Step 1: Resistance is $$R = V/I$$, so $$R \\to \\infty$$ requires the *denominator* to go to zero: $$I \\to 0$$, regardless of $$V$$.\n- Step 2: For an ideal diode in reverse bias (and small forward bias below the threshold), $$I = 0$$ but $$V \\neq 0$$ — so $$R$$ is infinite there. Any point lying on the horizontal $$I = 0$$ line qualifies, even if $$V$$ is large.\n- Step 3: The student trap is to look for $$V = 0$$ (the origin), but $$V = 0$$ with $$I = 0$$ is just $$0/0$$ — indeterminate, not infinite. The discriminator is always: is the current zero?\n\nFor infinite resistance, check the current axis, not the voltage axis.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "Looking at $$\\varepsilon = I(R + r)$$, what does the \"lost volts\" concept tell you about energy conservation in a battery circuit? (3 steps)", "answer": "- Step 1: Multiply both sides by $$I$$: $$\\varepsilon I = I^2 R + I^2 r$$. So the *total power* delivered by the e.m.f. ($$\\varepsilon I$$) equals the power dissipated in the load ($$I^2 R$$) plus the power dissipated internally ($$I^2 r$$).\n- Step 2: Per coulomb, this becomes $$\\varepsilon = V_{load} + V_{lost}$$ where $$V_{lost} = Ir$$. The total energy per coulomb (e.m.f.) splits between useful work (in the load) and wasted heat (inside the cell).\n- Step 3: This is just energy conservation: the chemical energy in the battery becomes electrical energy ($$\\varepsilon$$ per coulomb), which then becomes load-output + internal-heat. No magic — all the e.m.f. is accounted for.\n\nTakeaway: $$\\varepsilon = V + Ir$$ is just energy conservation per unit charge, applied around a loop.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "The transport equation is $$I = nAvq$$. For a copper wire carrying a current, identify what each symbol represents and give its SI unit. (5 steps)", "answer": "- Step 1: $$I$$ = current (ampere, A) — the rate of flow of charge through the wire.\n- Step 2: $$n$$ = number density of charge carriers (per cubic metre, m⁻³) — how many free electrons exist per unit volume of the material. For copper, $$n \\approx 8.4 \\times 10^{28}\\;\\text{m}^{-3}$$.\n- Step 3: $$A$$ = cross-sectional area of the conductor (square metres, m²) — the \"corridor width\" through which electrons travel.\n- Step 4: $$v$$ = mean drift velocity of the charge carriers (metres per second, m s⁻¹) — the average speed at which electrons slowly drift along the wire (not the speed of the electrical signal!).\n- Step 5: $$q$$ = charge on each carrier (coulombs, C). For electrons, $$q = e = 1.60 \\times 10^{-19}\\;\\text{C}$$.\n\nThe physical picture: in one second, the charge swept through a cross-section equals (carriers per volume) × (volume swept out = $$A \\times v$$) × (charge per carrier) = $$nAvq$$.", "source": "GLM 5.1 ②", "_id": "glm_2_14"}, {"question": "When designing an LDR-based automatic streetlight that turns *on* when it gets dark, where should the LDR be placed in the potential divider? (3 steps)", "answer": "- Step 1: An LDR's resistance *rises* in the dark. You want the output voltage that triggers the lamp to *rise* in the dark.\n- Step 2: From the divider rule, $$V_{out}$$ across a component rises when *that component's* resistance rises (it claims a bigger share of $$V_{in}$$).\n- Step 3: So place the LDR such that $$V_{out}$$ is taken *across the LDR itself*. As light fades, $$R_{LDR}$$ rises, $$V_{LDR}$$ rises, the trigger circuit activates the lamp.\n\nIf you instead took $$V_{out}$$ across the fixed resistor, $$V_{out}$$ would *fall* in the dark — opposite of what you want.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "Two identical batteries (each $$\\varepsilon$$, $$r$$) are wired (a) in series, and (b) in parallel. What's the e.m.f. and internal resistance of each combination? (4 steps)", "answer": "- Step 1: Series: e.m.f.s add ($$2\\varepsilon$$), and the internal resistances add as series resistors ($$2r$$). You get more voltage but also more internal resistance.\n- Step 2: Parallel: e.m.f. is still $$\\varepsilon$$ (both cells push at the same voltage), and the two internal resistances combine as parallel resistors: $$r_{\\text{combined}} = r/2$$. You get the same voltage but halved internal resistance — useful for high-current loads.\n- Step 3: Series boosts voltage (good for high-voltage devices), parallel boosts current capacity (good for sustained high currents).\n- Step 4: This is exactly why the car battery in Q17 uses six cells in series: it needs $$12$$ V to start the engine, and putting cells in series is how you stack up to that voltage.", "source": "Opus 4.7 ①", "_id": "opus_1_39"}, {"question": "When measuring a wire's diameter for a resistivity experiment, why do you measure at several points *and* in two perpendicular directions at each point? (2 steps)", "answer": "- Step 1: Several points along the wire: averaging reduces random error from local non-uniformities (the wire isn't perfectly cylindrical end-to-end).\n- Step 2: Two perpendicular directions at each point: checks for ovality / non-circular cross-section. If the two readings differ significantly, the assumption $$A = \\pi d^2 / 4$$ (which assumes a perfect circle) is invalid.\n\nBonus reflex: always check the micrometer for *zero error* before any reading.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "A cell with e.m.f. $$9$$ V drives an external resistor $$R = 5\\ \\Omega$$. The internal resistance changes from $$0.1\\ \\Omega$$ to $$0.5\\ \\Omega$$. Without computing exactly, estimate qualitatively what fraction of the original load power remains. (3 steps)", "answer": "- Step 1: Current is $$I = \\varepsilon/(R+r)$$. Going from $$r = 0.1$$ to $$r = 0.5$$ changes $$R+r$$ from $$5.1$$ to $$5.5$$ — a $$\\sim 8\\%$$ increase in denominator.\n- Step 2: So current drops by roughly $$8\\%$$. Load power $$P = I^2 R$$ depends on $$I^2$$, so power drops by roughly $$2 \\times 8\\% = 16\\%$$, i.e. retains about $$84\\%$$.\n- Step 3: Exact calculation gives $$86\\%$$. The student's claim of \"$$70\\%$$\" (a $$30\\%$$ drop) is far too large — the internal resistance is still tiny compared to the load, so its change has only a modest effect on load power.\n\nWhen $$r \\ll R$$, small changes in $$r$$ produce small changes in load power.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "A lightning strike has current $$I = 25{,}000\\;\\text{A}$$, duration $$t = 30\\;\\mu\\text{s}$$, and voltage $$V = 1.2 \\times 10^9\\;\\text{V}$$. The calculated resistivity of the channel is about 0.2 Ω m, but the accepted resistivity of (cold) air is about $$10^{16}\\;\\Omega\\text{m}$$. Explain this discrepancy of ~17 orders of magnitude. (3 steps)", "answer": "- Step 1: During a lightning strike, the intense electric field ionises the air in the channel, stripping electrons from gas molecules and creating a plasma. This plasma has a vastly larger number density of free charge carriers $$n$$ than cold air (which has essentially zero free carriers — that's why it's an insulator).\n- Step 2: From $$I = nAvq$$, a much larger $$n$$ means a much larger current for the same drift velocity, which means much lower resistance and therefore much lower resistivity. The resistivity drops from ~$$10^{16}$$ to ~0.2 Ω m — a factor of ~$$10^{17}$$.\n- Step 3: The key physics: cold air is an excellent insulator (huge resistivity) because its charge carriers are bound. Lightning transforms it into a conductor (tiny resistivity) by ionisation. The material is physically different during the strike — it's not \"air\" anymore, it's a hot plasma.\n\n+ Subsidiary point: the values of $$L$$ (channel length) and $$A$$ (channel diameter) are also hard to measure accurately during a real strike, contributing some uncertainty. But the dominant effect by far is the ionisation changing $$n$$ by many orders of magnitude.", "source": "GLM 5.1 ②", "_id": "glm_2_30"}, {"question": "A student claims that in any series circuit with a varying component, voltages across the component and the rest always move in *opposite* directions. Is this true, and why? (3 steps)", "answer": "- Step 1: Yes — it follows directly from $$V_1 + V_2 = \\varepsilon$$ (Kirchhoff's voltage law for a single loop with constant e.m.f.).\n- Step 2: Since $$\\varepsilon$$ is constant, $$\\Delta V_1 = -\\Delta V_2$$. Whatever voltage one component gains, the other loses, like a seesaw.\n- Step 3: This is why \"is the voltmeter reading going up or down?\" is determined by *which component it spans*, not by what's physically changing. The two voltmeters move in opposite directions — always.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "An NTC thermistor is in series with a fixed resistor and a battery. A voltmeter is connected across the *thermistor*. The thermistor is heated. A student reasons: \"Current increases, and $$V = IR$$, so the voltage across the thermistor must increase.\" Why is this reasoning incomplete, and what is the correct conclusion? (3 steps)", "answer": "- Step 1: The student correctly identifies that the current increases (heating the NTC thermistor lowers $$R_T$$, which lowers $$R_{\\text{total}}$$, which increases $$I$$). However, $$V_T = I \\times R_T$$ has *two* factors: $$I$$ increases but $$R_T$$ decreases.\n- Step 2: The voltage across the thermistor is $$V_T = I \\cdot R_T$$. To see which effect dominates, use the potential divider: $$V_T = \\varepsilon \\times \\frac{R_T}{R_{\\text{fixed}} + R_T}$$. When $$R_T$$ decreases, the fraction $$R_T / (R_{\\text{fixed}} + R_T)$$ decreases — the thermistor claims a *smaller share* of the e.m.f.\n- Step 3: Therefore $$V_T$$ *decreases*. The fall in $$R_T$$ dominates over the rise in $$I$$. The \"lost\" voltage transfers to the fixed resistor, whose voltage $$V_F = I \\cdot R_{\\text{fixed}}$$ does increase (because $$R_{\\text{fixed}}$$ is constant while $$I$$ rises).\n\n+ This is Alex's key lesson: you cannot reason about $$V = IR$$ for a component by looking at only one of the two factors. Use the potential divider formula or substitute concrete numbers to see which effect wins.", "source": "GLM 5.1 ②", "_id": "glm_2_26"}, {"question": "Why is the reciprocal trap a common mistake in parallel resistor calculations? Demonstrate with two 10Ω resistors. (2 steps)", "answer": "- Step 1: **Common error** - Students add conductances (1/10 + 1/10 = 0.2), but forget to invert result ⇒ incorrectly state R_total = 0.2Ω instead of 1/0.2 = 5Ω.\n- Step 2: **Reality check** - Parallel resistors must have R_total < smallest individual resistor (5Ω < 10Ω). Answer 0.2Ω fails this sanity test.", "source": "Qwen 3 ①", "_id": "qwen_1_4"}, {"question": "When a metal wire is heated, its resistance increases. When an NTC (Negative Temperature Coefficient) thermistor is heated, its resistance decreases. Use the transport equation $$I = nAvq$$ to explain the microscopic reason for this opposite behavior. (3 steps)", "answer": "- Step 1: In a metal, the number density of free electrons $$n$$ is essentially fixed. Heating causes the metal lattice ions to vibrate more, which obstructs the electrons, reducing their drift velocity $$v$$.\n- Step 2: Since $$I = nAvq$$ and $$n, A, q$$ are constant, a lower $$v$$ means a lower $$I$$ for the same voltage. Lower current means higher resistance ($$R = \\frac{V}{I}$$ goes up).\n- Step 3: In a semiconductor (NTC thermistor), heating releases many more charge carriers from their bound states, causing $$n$$ to increase dramatically. The increase in $$n$$ outweighs the small decrease in $$v$$, so overall $$I$$ increases, meaning resistance decreases ($$R = \\frac{V}{I}$$ goes down).\n\nTakeaway: Metals: $$n$$ fixed, $$v$$ drops → $$R$$ rises. NTC thermistor: $$n$$ surges, $$v$$ slightly drops → $$R$$ falls.", "source": "GLM 5.1 ③", "_id": "glm_3_14"}, {"question": "There are three equivalent formulas for electrical power: $$P = VI$$, $$P = I^2R$$, and $$P = V^2/R$$. Given a circuit where you know the current through a resistor and its resistance (but not the voltage across it), which formula should you use and why? (2 steps)", "answer": "- Step 1: Identify which quantities are known. You have $$I$$ and $$R$$, but not $$V$$. You need a formula that contains only $$I$$ and $$R$$ on the right-hand side.\n- Step 2: $$P = I^2R$$ uses exactly $$I$$ and $$R$$ — no voltage needed. You *could* first calculate $$V = IR$$ and then use $$P = VI$$, but that introduces an extra step and a rounding risk. Go directly with $$P = I^2R$$.\n\n+ If instead you knew $$V$$ and $$R$$ but not $$I$$: use $$P = V^2/R$$.\n+ If you knew $$V$$ and $$I$$ directly: use $$P = VI$$.\n\nThe rule: choose the power formula that uses the two quantities you already have, avoiding unnecessary intermediate calculations.", "source": "GLM 5.1 ②", "_id": "glm_2_2"}, {"question": "Why is drift velocity v ≈ 10⁻⁴ m/s so slow for electrons in a current-carrying wire? Explain via I = nAvq and charge density. (2 steps)", "answer": "- Step 1: **High n compensates** - Copper has n ≈ 8.4×10²⁸ m⁻³. Even with v=10⁻⁴ m/s, I = nAvq ≈ (8.4×10²⁸)(10⁻⁶)(10⁻⁴)(1.6×10⁻¹⁹) ≈ 1A.\n- Step 2: **Signal vs drift speed** - The electric field propagates at near lightspeed (~10⁸ m/s) but electrons themselves only drift slowly between collisions.", "source": "Qwen 3 ①", "_id": "qwen_1_6"}, {"question": "Why is the \"graphical method\" for finding internal resistance (plot $$V$$ vs $$I$$) preferred to making a single measurement of $$V$$ and $$I$$ and applying $$r = (\\varepsilon - V)/I$$? (3 steps)", "answer": "- Step 1: A single-point calculation depends critically on *one* measurement of each meter, so random measurement errors propagate directly into $$r$$.\n- Step 2: The graphical method uses *many* $$(I, V)$$ pairs across a range of load resistances. The best-fit line averages out random errors in individual readings.\n- Step 3: Bonus: the graph reveals systematic problems (non-linearity = the source isn't behaving as a simple $$\\varepsilon, r$$ model, e.g. the battery heats up and $$\\varepsilon$$ drifts). A single-point calculation hides these issues.\n\nBest practice: graphs > single calculations for any quantity you can vary a parameter to extract.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "A student measures the diameter of a wire as 0.50 mm and calculates $$A = \\pi d^2 / 4$$. They compute $$A = \\pi (0.50)^2 / 4 = 0.196\\;\\text{mm}^2$$ and use this directly in $$\\rho = RA/L$$. What unit error have they made, and how should they fix it? (2 steps)", "answer": "- Step 1: The formula $$R = \\rho L / A$$ requires SI units, so $$A$$ must be in m². The student computed $$A$$ in mm², which is $$10^{-6}$$ times smaller than the value in m². Using mm² directly would give a resistivity that is $$10^6$$ times too small.\n- Step 2: Convert: $$A = 0.196\\;\\text{mm}^2 = 0.196 \\times 10^{-6}\\;\\text{m}^2 = 1.96 \\times 10^{-7}\\;\\text{m}^2$$. Alternatively, convert the diameter first: $$d = 0.50\\;\\text{mm} = 0.50 \\times 10^{-3}\\;\\text{m}$$, then $$A = \\pi (0.50 \\times 10^{-3})^2 / 4 = 1.96 \\times 10^{-7}\\;\\text{m}^2$$. Always convert to metres before squaring.\n\n+ Common trap: mixing mm and m in area calculations. Since area involves a squared length, a factor of $$10^3$$ in length becomes a factor of $$10^6$$ in area. This is one of the most frequent unit errors in resistivity calculations.", "source": "GLM 5.1 ②", "_id": "glm_2_55"}, {"question": "Why is internal resistance often deliberately kept very small in commercial batteries but sometimes deliberately made significant (e.g. in lab power supplies)? (3 steps)", "answer": "- Step 1: Low $$r$$ means the terminal voltage stays close to $$\\varepsilon$$ even at high currents — vital for a car starter (~200 A) or phone battery (where voltage sag would cause shutdowns).\n- Step 2: But low $$r$$ also means the battery can deliver *enormous* short-circuit currents ($$I_{sc} = \\varepsilon/r$$) — dangerous (fires, exploding cells).\n- Step 3: Lab power supplies often include intentional series resistance (\"current limiting\") to *protect* connected circuits — limits the current if you accidentally short the output. Trade-off: less voltage sag flexibility for safety.\n\nTakeaway: $$r$$ is a knob that trades stiffness for safety.", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "A student is asked \"show the resistivity is about 0.2 Ω m\" for a lightning channel. They know $$R$$, $$A$$, and $$L$$. Why should they start from the data-booklet formula $$R = \\rho L / A$$ and rearrange, rather than trying to recall $$\\rho = RA/L$$ from memory? (2 steps)", "answer": "- Step 1: The data-booklet formula $$R = \\rho L / A$$ is guaranteed correct. Rearranging it step by step: multiply by $$A$$ to get $$RA = \\rho L$$, then divide by $$L$$ to get $$\\rho = RA/L$$. Each step is transparent and verifiable.\n- Step 2: If you try to recall $$\\rho = RA/L$$ from memory, you risk inverting it to $$\\rho = RL/A$$ (swapping $$A$$ and $$L$$). This is a common and costly error that gives a numerically different answer and the wrong units. By always starting from the booklet form, you eliminate this inversion risk.\n\n+ Alex's correction during the lesson: Phuc hesitated on the rearrangement. The fix is simple — never trust memory for rearrangements; always derive from the known-correct starting point.", "source": "GLM 5.1 ②", "_id": "glm_2_29"}, {"question": "Why does a potentiometer (slider) give a *continuously* variable voltage output, while individual fixed resistors only give discrete divisions? (3 steps)", "answer": "- Step 1: A potentiometer is a single resistive track with a sliding contact. The slider position determines how much of the track is \"above\" the slider ($$R_1$$) and how much \"below\" ($$R_2$$). As the slider moves, $$R_1$$ and $$R_2$$ change continuously, with $$R_1 + R_2$$ always equal to the total track resistance.\n- Step 2: The output voltage is $$V_{out} = V_{in} \\cdot R_2/(R_1 + R_2)$$ — a continuously varying fraction from 0 (slider at one end) to $$V_{in}$$ (slider at the other end).\n- Step 3: This is why potentiometers are used as volume knobs, joysticks, and tuning controls — you get smooth control of $$V_{out}$$ from 0 to $$V_{in}$$ with a single mechanical motion, no switching between discrete resistor values needed.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "Why is resistivity $$\\rho$$ measured in $$\\Omega\\ \\text{m}$$ (ohm-metre) and not $$\\Omega\\ \\text{m}^{-1}$$? (3 steps)", "answer": "- Step 1: Start from $$R = \\rho L / A$$. Rearrange: $$\\rho = RA / L$$.\n- Step 2: Unit check: $$[\\rho] = [\\Omega][\\text{m}^2]/[\\text{m}] = \\Omega\\ \\text{m}$$. The metre is in the numerator because area has *two* metre powers and we only divide by one length.\n- Step 3: Intuition: $$\\rho$$ is the resistance of a cube of unit dimensions. If you scale up the cross-section, you provide more parallel paths (resistance falls), and if you scale up length, you make the obstacle course longer (resistance rises). So $$\\rho$$ has to carry one factor of length in its units to give a pure $$\\Omega$$ when multiplied by $$L/A$$.\n\nIf you write $$\\Omega\\ \\text{m}^{-1}$$, examiners will mark it wrong — it's a classic dropped mark.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "Why is resistivity such a useful concept compared to resistance alone, when characterising or comparing materials? (3 steps)", "answer": "- Step 1: Resistance $$R$$ depends on the specific sample's geometry. Two pieces of copper of different shapes have wildly different $$R$$ — useless for comparing copper to silver.\n- Step 2: Resistivity $$\\rho$$ factors out geometry: $$\\rho = RA/L$$. So a tabulated $$\\rho$$ for copper applies to *any* shape of copper.\n- Step 3: This lets engineers and scientists:\n+ Compare materials directly (copper vs aluminium for wiring).\n+ Design wires of any geometry from a single material constant.\n+ Identify materials experimentally — measure $$R$$, $$A$$, $$L$$, compute $$\\rho$$, look it up.\n\nIt's analogous to using density rather than mass when comparing substances.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "What's the conceptual difference between current $$I$$ and drift velocity $$v$$? Can a wire have huge current and tiny drift velocity simultaneously? (3 steps)", "answer": "- Step 1: Current $$I$$ is the *total charge per second* crossing a point. Drift velocity $$v$$ is the *average forward speed* of one charge carrier.\n- Step 2: They're related by $$I = nAvq$$: total flow = (carriers per volume) × (cross-section) × (speed per carrier) × (charge per carrier).\n- Step 3: Yes, huge $$I$$ with tiny $$v$$ happens routinely. In a copper wire carrying 1 A, $$n \\sim 10^{28}$$ m⁻³ is so vast that each individual electron only needs to drift at ~$$10^{-4}$$ m/s for the total flow to add up to 1 A. There are simply *enormously many* slow carriers, not a few fast ones.\n\nAnalogy: a slow but very wide river carries more water than a fast trickle.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "Alex's mind map labels $$P = I^2R$$ as \"caused by current — resistance heating.\" Why is $$I^2R$$ the natural form for describing how much heat a resistor dissipates, rather than $$V^2/R$$? (2 steps)", "answer": "- Step 1: In a series circuit, the *same current* flows through every component. The heat generated in each resistor depends on how much current is being pushed through it and how much it resists that flow. The formula $$P = I^2R$$ directly shows: double the current → four times the heating (it scales as the *square* of current).\n- Step 2: The form $$V^2/R$$ is mathematically equivalent (via $$V = IR$$), but it foregrounds voltage, which is *different* across each series resistor. When you're thinking \"same current, different resistances, how much heat in each one?\", $$I^2R$$ is the form that matches the physical story — the current is the common cause, and the resistance determines how effectively it converts electrical energy to heat.\n\nThis is why $$I^2R$$ is called \"Joule heating\" or \"ohmic heating\" — the current is the agent doing the heating.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "Why is the resistivity of a lightning channel ($$\\sim 0.2\\ \\Omega\\ \\text{m}$$) about $$10^{17}$$ times smaller than that of cold air ($$\\sim 10^{16}\\ \\Omega\\ \\text{m}$$)? (3 steps)", "answer": "- Step 1: Cold air is an excellent insulator because its atoms hold tightly onto their electrons — there are essentially no free charge carriers, so $$n$$ in $$I = nAvq$$ is negligible.\n- Step 2: During a strike, the enormous electric field ionises the air, ripping electrons off molecules and creating a hot plasma channel. The number density $$n$$ of free charge carriers jumps astronomically.\n- Step 3: Since $$\\rho \\propto 1/n$$ (more carriers ⇒ easier conduction ⇒ lower resistivity), $$n$$ rising by $$\\sim 10^{17}$$× makes $$\\rho$$ drop by the same factor. The channel briefly behaves like a good conductor, like a wire of plasma.\n\nIonisation = manufacturing charge carriers on the fly.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "A typical drift velocity in a copper wire is a fraction of a millimetre per second. If electrons move so slowly, why does a light bulb turn on instantly when you flip the switch? (2 steps)", "answer": "- Step 1: The switch closes the circuit, and the electric field propagates through the wire at near the speed of light.\n- Step 2: This field causes *all* the free electrons in the wire to start drifting simultaneously. The bulb lights up from the energy delivered by the electrons already near the filament, not from electrons traveling from the power station.\n\nThe signal (electric field) travels fast; the actual charge carriers drift slowly.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "A student claims that when a cell's internal resistance increases from 0.10 Ω to 0.50 Ω, the power dissipated in the external load \"falls to 70% of its original value.\" What two wording interpretations are possible, and why must you quote an actual number to judge the claim? (3 steps)", "answer": "- Step 1: \"Falls *to* 70%\" means the new power is 70% of the original: $$P_2 / P_1 = 0.70$$. \"Falls *by* 70%\" means the new power is 30% of the original (100% − 70% reduction): $$P_2 / P_1 = 0.30$$. These are very different claims.\n- Step 2: To test either claim, you must actually compute the ratio. For this problem, the calculation gives $$P_2 / P_1 \\approx 0.86$$ (86%). This matches neither interpretation — the power falls *to* 86%, or equivalently falls *by* 14%.\n- Step 3: The student's claim is wrong regardless of interpretation. But to score the marks, you must state the actual computed value (86%) and compare it. Writing only \"the claim is incorrect\" with no supporting number scores zero — examiners need to see your evidence.\n\n+ Alex's rule: always quote the comparison number. \"86%, not 70%\" is a complete answer. \"Wrong\" alone is not.", "source": "GLM 5.1 ②", "_id": "glm_2_32"}, {"question": "A student claims that increasing internal resistance from 0.10 Ω to 0.5 Ω (with $$\\varepsilon = 9.0$$ V, $$R = 5.0$$ Ω) cuts the load power to 70% of its original. How do you judge whether this claim is correct? (3 steps)", "answer": "- Step 1: You can't just say \"wrong\" — you must produce the actual percentage and compare. Compute $$I_1 = \\varepsilon/(R+r_1)$$ and $$I_2 = \\varepsilon/(R+r_2)$$, then $$P_i = I_i^2 R$$.\n- Step 2: The ratio of load powers simplifies because $$R$$ cancels: $$P_2/P_1 = (I_2/I_1)^2 = [(R+r_1)/(R+r_2)]^2 = (5.10/5.50)^2 \\approx 0.86$$.\n- Step 3: The actual ratio is ~86%, not 70%. So the claim is *incorrect* — the load power falls only to about 86% (a 14% reduction), not 70%.\n\nExaminer reflex: always quote the comparison number to justify your verdict.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "In the same heating-thermistor circuit, why does a voltmeter across the *thermistor* read a falling value, while a voltmeter across the *fixed resistor* reads a rising value? (4 steps)", "answer": "- Step 1: Heating makes $$R_T$$ fall and (as shown) $$I$$ rise.\n- Step 2: Voltmeter across the thermistor reads $$V_T = I R_T$$. Here $$I$$ rises but $$R_T$$ falls *faster* than $$I$$ rises (the thermistor change dominates), so the product $$V_T$$ decreases.\n- Step 3: Voltmeter across the fixed resistor reads $$V_F = I R_F$$. Now $$R_F$$ is constant and $$I$$ rises, so $$V_F$$ clearly increases.\n- Step 4: Total voltage is conserved: $$V_T + V_F = \\varepsilon$$, so if $$V_T$$ falls, $$V_F$$ must rise by the same amount. The share of e.m.f. shifts off the thermistor and onto the fixed resistor.\n\nThe voltmeter's verdict depends entirely on which component it spans.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "A potential divider consists of two resistors $$R_1$$ and $$R_2$$ in series across a supply $$V_{\\text{in}}$$. The output $$V_{\\text{out}}$$ is taken across $$R_2$$. Derive the potential divider formula $$V_{\\text{out}} = V_{\\text{in}} \\times \\frac{R_2}{R_1 + R_2}$$ from first principles. (3 steps)", "answer": "- Step 1: The same current $$I$$ flows through both resistors (they're in series). By Ohm's law, $$V_1 = IR_1$$ and $$V_2 = IR_2$$. The supply voltage splits: $$V_{\\text{in}} = V_1 + V_2 = I(R_1 + R_2)$$, so $$I = V_{\\text{in}} / (R_1 + R_2)$$.\n- Step 2: The output voltage across $$R_2$$ is $$V_{\\text{out}} = V_2 = IR_2 = \\frac{V_{\\text{in}}}{R_1 + R_2} \\times R_2$$.\n- Step 3: Therefore $$V_{\\text{out}} = V_{\\text{in}} \\times \\frac{R_2}{R_1 + R_2}$$. The voltage is shared in proportion to resistance: $$R_2$$ gets the fraction $$R_2 / (R_1 + R_2)$$ of the total.\n\n+ Quick check: if $$R_1 = R_2$$, then $$V_{\\text{out}} = V_{\\text{in}} / 2$$ — equal resistors split the voltage equally. If $$R_2 \\gg R_1$$, then $$V_{\\text{out}} \\approx V_{\\text{in}}$$ — most of the voltage drops across the larger resistor.", "source": "GLM 5.1 ②", "_id": "glm_2_21"}, {"question": "Explain why the current must be the same at all points in a series circuit, even if the cross-sectional area of the conductor changes. (3 steps)", "answer": "- Step 1: In a series circuit, the same number of charge carriers must pass through each point in the circuit at any given time.\n+ This is a consequence of conservation of charge - charges can't accumulate or disappear in a steady-state circuit.\n\n- Step 2: If the cross-sectional area changes, the current density (J = I/A) and drift velocity (I = nAvq ⇒ v = I/nAq) must change, but the total current remains constant.\n+ In a narrower part of the conductor, the same current means higher current density and higher drift velocity.\n\n- Step 3: This ensures that the same amount of charge flows through every cross-section of the circuit per unit time, maintaining a steady current.\n+ If this weren't true, charges would accumulate somewhere in the circuit, creating electric fields that would quickly redistribute the charges to restore current continuity.", "source": "Qwen 3 ②", "_id": "qwen_2_31"}, {"question": "Why does adding resistors in series always *increase* total resistance, while adding them in parallel always *decreases* it below the smallest? (3 steps)", "answer": "- Step 1: In series, the same current must traverse every resistor in sequence, and each one demands its own voltage drop. The total voltage cost piles up: $$R_T = R_1 + R_2 + \\cdots$$. Adding more resistors is like adding more obstacles in a single-file queue — the queue gets harder to push through.\n- Step 2: In parallel, each resistor provides an *additional path* for current to flow. Adding another path can only make it easier for charge to flow, never harder, so total resistance must drop.\n- Step 3: Mathematically, $$1/R_T = \\sum 1/R_i$$ means $$R_T$$ is smaller than any individual $$1/R_i$$ inverted, i.e. smaller than the smallest resistor. Two $$5\\ \\Omega$$ in parallel give $$2.5\\ \\Omega$$ — half the smallest, because two equal paths share the current equally.\n\nSeries = stacking obstacles; parallel = opening extra lanes.", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "A diode is in a circuit — when is \"infinite resistance\" the right model and when isn't it? (3 steps)", "answer": "- Step 1: In reverse bias (or forward bias below the threshold voltage), an *ideal* diode has $$I = 0$$ so $$R = V/I \\to \\infty$$. Treat the diode as an open circuit (no current flow).\n- Step 2: In forward bias above threshold, the diode conducts; $$R$$ is very small (effectively zero for an ideal diode). Treat it as a short or a small voltage drop.\n- Step 3: A real diode has a transition region (typically $$0.6$$–$$0.7$$ V for silicon) and a small but nonzero reverse current — but for A-level \"ideal diode\" questions, treat the I-V curve as flat at $$I=0$$ then sharply rising, and the resistance as either $$\\infty$$ or essentially $$0$$ depending on which branch you're on.", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Why is the wording \"reduces *to* $$70\\%$$\" different from \"reduces *by* $$70\\%$$\", and why is this distinction worth a mark? (3 steps)", "answer": "- Step 1: \"Reduces to $$70\\%$$\" means the new value is $$0.70$$ times the old: $$P_2/P_1 = 0.70$$.\n- Step 2: \"Reduces by $$70\\%$$\" means $$70\\%$$ of the original value is lost, so the new value is $$30\\%$$ of the old: $$P_2/P_1 = 0.30$$.\n- Step 3: These differ by more than a factor of $$2$$. Always read the claim precisely; the exam will mark down a student who computes $$0.86$$ and then writes \"the claim is correct because the power did drop\" without noting that $$0.86 \\neq 0.70$$.\n\nTo evaluate a claim, *always quote the comparison number*.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "Two identical resistors of value $$R$$ are placed first in series, then in parallel. What is the ratio of the series total to the parallel total? (3 steps)", "answer": "- Step 1: Series total: $$R_S = R + R = 2R$$.\n- Step 2: Parallel total: $$1/R_P = 1/R + 1/R = 2/R$$, so $$R_P = R/2$$.\n- Step 3: Ratio $$R_S / R_P = 2R / (R/2) = 4$$. The series combination is always $$4$$× the parallel combination for two equal resistors.\n\nThis is a fast sanity check: any MCQ row giving a series/parallel pair *not* in a 4:1 ratio for two equal resistors is wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "Why is the power of a lightning strike enormous (~$$10^{13}$$ W) even though the total energy transferred is moderate? (3 steps)", "answer": "- Step 1: Power $$P = IV$$. Lightning has $$I \\sim 25{,}000$$ A and $$V \\sim 10^9$$ V, so $$P \\sim 3 \\times 10^{13}$$ W — tens of terawatts.\n- Step 2: But power is *energy per unit time*. The strike lasts only ~30 μs, so total energy $$E = Pt \\sim (3 \\times 10^{13})(3 \\times 10^{-5}) \\sim 10^9$$ J — about a gigajoule, comparable to a few hundred kilograms of TNT, not the entire world's electricity supply.\n- Step 3: The destructive power comes from depositing this energy in an extremely short time and a narrow channel — pressure shockwaves, plasma heating, and thermal expansion all happen too fast to dissipate gradually. It's the *concentration in space and time*, not the cumulative energy, that does the damage.", "source": "Opus 4.7 ②", "_id": "opus_2_26"}, {"question": "In the V–I graph for a real cell, explain what physical situation corresponds to each axis intercept. (3 steps)", "answer": "- Step 1: The y-intercept (where $$I = 0$$): no current flows, so there are no \"lost volts\" ($$Ir = 0$$), and the terminal p.d. equals the full e.m.f.: $$V = \\varepsilon$$. This is the open-circuit condition.\n- Step 2: The x-intercept (where $$V = 0$$): the terminal p.d. is zero, meaning all the e.m.f. is dropped across the internal resistance: $$\\varepsilon = Ir_{\\text{max}}$$. This is the short-circuit condition, where the external resistance is zero and the current is $$I_{\\text{max}} = \\varepsilon / r$$.\n- Step 3: Every point between the intercepts represents a different load resistance. As $$R$$ decreases from infinity (open circuit) to zero (short circuit), the operating point slides along the line from the y-intercept to the x-intercept.\n\n+ Warning: a short circuit draws the maximum possible current $$\\varepsilon / r$$, which can be dangerously large if $$r$$ is small (e.g., a car battery with $$r \\approx 0.02\\;\\Omega$$ would deliver ~600 A — enough to melt wires).", "source": "GLM 5.1 ②", "_id": "glm_2_35"}, {"question": "In an MCQ asking for an *expression* (not a number) for drift velocity given $$I$$, $$n$$, $$A$$, what's the fastest elimination technique? (2 steps)", "answer": "- Step 1: Rearrange the governing relation to make the wanted quantity the subject: $$v = I/(nAe)$$. Note which symbols are on top (just $$I$$) and which are on the bottom ($$n$$, $$A$$, $$e$$).\n- Step 2: Scan the options:\n+ Eliminate anything with $$A$$ on top (wrong place).\n+ Eliminate anything missing $$e$$ (electron charge needed since $$q = e$$).\n+ The survivor is the answer — no calculation needed.\n\nThis \"rearrange-then-match\" beats plugging numbers into four expressions.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "Synthesise: a copper wire of $$1$$ m length and $$1\\ \\text{mm}^2$$ cross-section carries $$1$$ A. Given $$\\rho_{\\text{Cu}} \\sim 10^{-8}\\ \\Omega\\ \\text{m}$$ and $$n \\sim 10^{29}\\ \\text{m}^{-3}$$, estimate (a) the wire's resistance, (b) the voltage across it, and (c) the drift velocity — all to within an order of magnitude. (4 steps)", "answer": "- Step 1: Resistance: $$R = \\rho L/A = (10^{-8})(1)/(10^{-6}) = 10^{-2}\\ \\Omega$$. Small, as expected for copper.\n- Step 2: Voltage: $$V = IR = 1 \\times 10^{-2} = 10^{-2}$$ V = $$10$$ mV. Very small voltage to push $$1$$ A through such a wire — copper is a good conductor.\n- Step 3: Drift velocity: $$v = I/(nAq) = 1/[(10^{29})(10^{-6})(1.6 \\times 10^{-19})] = 1/(1.6 \\times 10^{4}) \\approx 6 \\times 10^{-5}$$ m/s — less than a tenth of a millimetre per second. Glacially slow.\n- Step 4: All three numbers fit together: low $$R$$ (good conductor), low $$V$$ needed, and slow drift speed despite the moderate current — because $$n$$ is so large that the carriers don't *need* to move fast to deliver $$1$$ A.\n\nThis is the everyday picture: copper carries current essentially for free, with electrons crawling slowly through a sea of available carriers.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Rearrange $$\\varepsilon = V + Ir$$ into a form suitable for a graph that determines $$r$$ and $$\\varepsilon$$ simultaneously. What goes on each axis, and how do you extract the values? (3 steps)", "answer": "- Step 1: Rearrange: $$V = \\varepsilon - Ir = (-r)I + \\varepsilon$$. This is $$y = mx + c$$ with $$y = V$$, $$x = I$$, slope $$m = -r$$, intercept $$c = \\varepsilon$$.\n- Step 2: So plot terminal p.d. $$V$$ on the y-axis against current $$I$$ on the x-axis. Vary the external load to get several $$(I, V)$$ pairs, then draw a best-fit straight line.\n- Step 3: Read off:\n+ y-intercept = $$\\varepsilon$$ (the e.m.f.).\n+ gradient = $$-r$$, so internal resistance $$r = -(\\text{gradient}) = -\\Delta V / \\Delta I$$ (positive number since the line slopes down).\n\nKeep the minus sign explicit — losing it is a classic mark-dropper.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "Drift velocity in a copper wire is famously tiny — well under a millimetre per second. Yet a light comes on instantly when you flip a switch. How are these two facts reconciled? (3 steps)", "answer": "- Step 1: The drift velocity $$v$$ from $$I = nAvq$$ is the *average* speed at which the cloud of electrons slowly migrates along the wire — often $$\\sim 10^{-4}$$ m/s for everyday currents.\n- Step 2: But what travels at near light speed is the *electric field* (and the signal to start moving). When you close the switch, the field propagates through the wire almost instantly, telling every electron *everywhere along the wire* to start drifting at the same time.\n- Step 3: It's analogous to a long pipe already full of water: pushing on one end makes water gush out the other end *immediately*, even though any individual water molecule moves slowly.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "Why does adding a resistor in parallel always decrease the total resistance, while adding a resistor in series always increases it? (2 steps)", "answer": "- Step 1: In parallel, you create additional current pathways. More paths mean less overall opposition to flow — the total resistance drops below the smallest individual resistor.\n- Step 2: In series, you add resistances end-to-end. Current must pass through every resistor, so the total opposition accumulates: $$R_{total} = R_1 + R_2 + ...$$\n\n**Key pattern:** Think of resistance as \"narrowing\" the pipe — series narrows it more (adds restriction), parallel widens it (adds alternative paths).", "source": "MiniMax ①", "_id": "minimax_1_4"}, {"question": "The data booklet gives $$R = \\rho L / A$$. Rearrange this to make $$\\rho$$ the subject, and explain why the metre ends up in the *numerator* of the unit Ω m. (3 steps)", "answer": "- Step 1: Start from $$R = \\frac{\\rho L}{A}$$. Multiply both sides by $$A$$: $$RA = \\rho L$$. Then divide both sides by $$L$$: $$\\rho = \\frac{RA}{L}$$.\n- Step 2: Now check the units. $$R$$ has units Ω, $$A$$ has units m², and $$L$$ has units m. So: $$[\\rho] = \\frac{\\Omega \\cdot \\text{m}^2}{\\text{m}} = \\Omega \\cdot \\text{m}$$.\n- Step 3: The metre is in the numerator because area (m²) is divided by length (m), leaving one metre on top. The classic trap is writing Ω m⁻¹ — this would be the unit of $$R/L$$ (resistance per unit length), not resistivity. Resistivity is how much resistance a *unit cube* (1 m × 1 m × 1 m) of the material has, which naturally has units of Ω m.\n\n+ Alex's tip: always rearrange from the data-booklet form $$R = \\rho L / A$$ rather than trying to recall $$\\rho = RA/L$$ from memory — one inversion error and you get the formula upside down.", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "Why might you measure a wire's diameter using a micrometer rather than a ruler, and what error analysis is needed? (3 steps)", "answer": "- Step 1: A typical wire diameter is sub-millimeter. A ruler reads to ~1 mm, giving 100% relative error on a 1 mm wire — useless. A micrometer reads to ~0.01 mm (10 μm), giving ~1% relative error — acceptable.\n- Step 2: The diameter enters the area as $$A = \\pi d^2 / 4$$, so *fractional* error in $$A$$ is *twice* the fractional error in $$d$$. A 1% error in $$d$$ becomes 2% in $$A$$, and hence 2% in $$\\rho$$.\n- Step 3: Required checks:\n+ Zero error on the micrometer (subtract or add the offset).\n+ Multiple measurements at different points (random error).\n+ Two perpendicular measurements at each point (check for ovality).\n\nThe squared dependence on $$d$$ means diameter measurement is the *dominant* error source in resistivity experiments.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "What's the conceptual difference between *resistance* $$R$$ and *resistivity* $$\\rho$$, and why does this distinction matter? (3 steps)", "answer": "- Step 1: Resistance $$R$$ is a property of a *specific object* — a particular wire of a particular length and area. Change the dimensions and $$R$$ changes.\n- Step 2: Resistivity $$\\rho$$ is a property of the *material itself*, independent of shape. Copper has the same $$\\rho$$ whether you make it into a thin filament or a thick bar — only its $$R$$ differs.\n- Step 3: This matters because to identify a material, you measure $$R$$ but you report $$\\rho$$. The formula $$\\rho = RA/L$$ strips out the geometry, leaving a number that characterises the substance.\n\nResistance is about the object; resistivity is about the stuff.", "source": "Opus 4.7 ①", "_id": "opus_1_7"}, {"question": "Same circuit as before (NTC thermistor + fixed resistor in series), but now the voltmeter is across the *fixed resistor* instead of the thermistor. When the thermistor is heated, both the ammeter reading and the voltmeter reading increase. Explain why the voltmeter's verdict *flips* depending on which component it spans. (2 steps)", "answer": "- Step 1: The current's behaviour is the same regardless of where the voltmeter is: heating the NTC thermistor → $$R_T$$ decreases → $$R_{\\text{total}}$$ decreases → $$I$$ increases. The ammeter always rises.\n- Step 2: The voltmeter's behaviour depends on which component it measures. Across the thermistor: $$V_T = IR_T$$, where $$I$$ rises but $$R_T$$ falls faster → $$V_T$$ decreases. Across the fixed resistor: $$V_F = IR_{\\text{fixed}}$$, where $$I$$ rises and $$R_{\\text{fixed}}$$ is constant → $$V_F$$ increases. The same current change produces opposite voltage changes because one resistance is falling while the other is fixed.\n\n+ Always read which component the voltmeter spans before deciding \"up\" or \"down.\" This was the central point of Q7.", "source": "GLM 5.1 ②", "_id": "glm_2_27"}, {"question": "Distinguish \"falls to 70%\" from \"falls by 70%\" — why does the wording matter when judging a claim about power loss? (2 steps)", "answer": "- Step 1: \"Falls *to* 70%\" means $$P_{new}/P_{old} = 0.70$$ — the new power is 70% of the old (a 30% reduction).\n- Step 2: \"Falls *by* 70%\" means the *change* is 70% of the original, so $$P_{new}/P_{old} = 0.30$$ — only 30% remains.\n+ These differ by more than a factor of two.\n+ Misreading the preposition turns a correct calculation into a wrong answer.\n\nAlways re-read the claim and underline \"to\" or \"by\" before judging.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}, {"question": "In Core Practical 7 (resistivity of a wire), what do you plot, and how does the gradient give you $$\\rho$$? (4 steps)", "answer": "- Step 1: For several lengths $$L$$ of the wire, measure the current $$I$$ for a fixed voltage (or vice versa) and compute $$R = V/I$$ each time.\n- Step 2: Measure the wire's diameter $$d$$ at several points along its length using a micrometre, average them, and compute $$A = \\tfrac{1}{4}\\pi d^2$$. Always check for a zero error on the micrometre and measure $$d$$ in two perpendicular directions.\n- Step 3: Plot $$R$$ on the y-axis against $$L$$ on the x-axis. From $$R = (\\rho/A) L$$, this is a straight line through the origin with gradient $$\\rho/A$$.\n- Step 4: So $$\\rho = (\\text{gradient}) \\times A$$. Using a gradient (best-fit line) rather than a single data point averages out random errors.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "Define e.m.f. in the exact wording an Edexcel examiner expects, and explain *why* the wording \"per unit charge\" matters. (3 steps)", "answer": "- Step 1: The e.m.f. of a source is the **energy converted from other forms into electrical energy per unit charge** passing through the source. Units: $$\\text{J C}^{-1}$$ = V.\n- Step 2: \"Per unit charge\" means per coulomb of charge. Saying \"per charge particle\" or \"per electron\" would be wrong by a factor of about $$6.24 \\times 10^{18}$$ — that's how many elementary charges are in one coulomb.\n- Step 3: The numerical e.m.f. (e.g. $$1.5$$ V on a battery) only makes sense as joules per coulomb, not joules per electron. A $$1.5$$ V cell delivers $$1.5$$ J for every coulomb, not for every electron (which gets only $$\\sim 2.4 \\times 10^{-19}$$ J).\n\nThe phrase to memorise: \"energy converted... per unit charge.\"", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "For an ideal diode, the resistance is said to be \"infinite\" at certain points on its I–V curve. Conceptually, what makes resistance infinite — is it zero voltage, zero current, or something else? (3 steps)", "answer": "- Step 1: Resistance is defined by $$R = V/I$$. For $$R$$ to blow up to infinity, the denominator $$I$$ must approach zero — the value of $$V$$ in the numerator can be anything (even large).\n- Step 2: This means \"infinite resistance\" corresponds to points lying on the horizontal axis ($$I = 0$$), not the vertical axis ($$V = 0$$).\n+ At the origin both are zero — that's an indeterminate case, not \"infinite\".\n+ In reverse bias an ideal diode has large $$V$$ but $$I = 0$$ — still infinite resistance.\n- Step 3: So for the ideal diode, both the reverse-bias region and the small forward region below the turn-on voltage (where $$I = 0$$) have infinite resistance. Only once it conducts ($$I \\neq 0$$) does the resistance drop sharply.\n\nTakeaway: locate \"no current flowing\" on the graph, not \"no voltage\".", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "In a multiple-choice question asking for the correct *expression* (not a numerical value) for drift velocity, what strategy does Alex recommend to eliminate options quickly? (3 steps)", "answer": "- Step 1: Start from the known physics relation — in this case $$I = nAvq$$ — and rearrange to make the target quantity the subject: $$v = I / (nAq)$$. This gives you the *structure* of the answer: $$I$$ on top, and $$n$$, $$A$$, and $$q$$ all mu
