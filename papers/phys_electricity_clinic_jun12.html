source": "Qwen 3 ②", "_id": "qwen_2_16", "judge_pick": false}, {"question": "For a source with e.m.f. ε = 9.0 V and internal resistance r = 0.5 Ω driving a load R = 5.0 Ω, calculate: (a) the current, (b) the terminal voltage, and (c) the power dissipated in the load. (3 steps)", "answer": "- Step 1: (a) Current I = ε / (R + r) = 9.0 V / (5.0 Ω + 0.5 Ω) = 9.0 V / 5.5 Ω ≈ 1.64 A\n+ This follows from Ohm's law applied to the total resistance in the circuit.\n\n- Step 2: (b) Terminal voltage V = ε - Ir = 9.0 V - (1.64 A × 0.5 Ω) ≈ 9.0 V - 0.82 V = 8.18 V\n+ The voltage drop across the internal resistance reduces the effective voltage available to the load.\n\n- Step 3: (c) Power in the load P = I²R = (1.64 A)² × 5.0 Ω ≈ 2.69 A² × 5.0 Ω ≈ 13.45 W\n+ This is the power actually available for doing work with the load.", "source": "Qwen 3 ②", "_id": "qwen_2_17", "judge_pick": false}, {"question": "A lightning channel has a current of 25,000 A, a voltage of 1.2 × 10⁹ V, and a length of 400 m. The diameter of the channel is 5.0 cm. Calculate the resistivity of the lightning channel. (3 steps)", "answer": "- Step 1: Calculate resistance R = V/I = (1.2 × 10⁹ V) / (25,000 A) = 48,000 Ω\n+ This is the fundamental definition of resistance from Ohm's law.\n\n- Step 2: Calculate cross-sectional area A = πr² = π × (0.025 m)² ≈ 1.963 × 10⁻³ m²\n+ The radius is half the diameter given (5.0 cm = 0.05 m, so r = 0.025 m).\n\n- Step 3: Calculate resistivity ρ = (R × A) / L = (48,000 Ω × 1.963 × 10⁻³ m²) / 400 m ≈ 0.235 Ω·m\n+ This shows the lightning channel has a surprisingly low resistivity, which makes sense because it's a plasma of ionized air.", "source": "Qwen 3 ②", "_id": "qwen_2_18", "judge_pick": false}, {"question": "Compare the power delivered to a 5.0 Ω load when used with a battery having internal resistance of 0.10 Ω versus 0.5 Ω. The battery e.m.f. is 9.0 V in both cases. (3 steps)", "answer": "- Step 1: For r = 0.10 Ω: I = 9.0 V / (5.0 Ω + 0.10 Ω) = 9.0 / 5.10 ≈ 1.765 A\n+ Power P = I²R = (1.765)² × 5.0 ≈ 15.57 W\n\n- Step 2: For r = 0.5 Ω: I = 9.0 V / (5.0 Ω + 0.5 Ω) = 9.0 / 5.5 ≈ 1.636 A\n+ Power P = I²R = (1.636)² × 5.0 ≈ 13.39 W\n\n- Step 3: The power ratio is 13.39 / 15.57 ≈ 0.860 or 86.0%\n+ Even though the internal resistance increases 5-fold, the power delivered to the load only decreases by about 14%, not the claimed 70% reduction.", "source": "Qwen 3 ②", "_id": "qwen_2_19", "judge_pick": false}, {"question": "A 10 Ω resistor is in parallel with a 20 Ω resistor. This combination is in series with a 30 Ω resistor. Calculate the total resistance of this network. (3 steps)", "answer": "- Step 1: First calculate the parallel resistance: 1/R_parallel = 1/10 + 1/20 = 3/20 ⇒ R_parallel = 20/3 ≈ 6.67 Ω\n+ For resistors in parallel, the equivalent resistance is always less than the smallest individual resistor.\n\n- Step 2: Now add this to the 30 Ω resistor in series: R_total = 6.67 Ω + 30 Ω = 36.67 Ω\n+ For resistors in series, the equivalent resistance is simply the sum of the individual resistances.\n\n- Step 3: The total resistance of the network is approximately 36.67 Ω.\n+ The combination of series and parallel resistors is common in complex circuits and can be solved step by step.", "source": "Qwen 3 ②", "_id": "qwen_2_20", "judge_pick": false}, {"question": "A potential divider consists of two 10 kΩ resistors in series across a 12 V supply. What is the output voltage when: (a) no load is connected and (b) a 10 kΩ load is connected across the lower resistor? (3 steps)", "answer": "- Step 1: (a) With no load, the voltage is evenly divided: V_out = 12 V × (10 kΩ / (10 kΩ + 10 kΩ)) = 6 V\n+ Both resistors are equal, so the voltage divides equally.\n\n- Step 2: (b) With a 10 kΩ load, the lower resistor is effectively in parallel with the load: 1/R_parallel = 1/10 kΩ + 1/10 kΩ ⇒ R_parallel = 5 kΩ\n+ This changes the voltage divider ratio.\n\n- Step 3: New output voltage: V_out = 12 V × (5 kΩ / (10 kΩ + 5 kΩ)) = 12 V × (1/3) = 4 V\n+ Connecting a load to a potential divider changes its output because it alters the effective resistance in the circuit.", "source": "Qwen 3 ②", "_id": "qwen_2_21", "judge_pick": false}, {"question": "Given a copper wire with resistance 1.000 Ω at 20°C, and a temperature coefficient of resistance of 0.00404 Ω/Ω/°C, what will be its resistance at 100°C? (3 steps)", "answer": "- Step 1: Start with the formula for resistance change with temperature: R = R₀(1 + αΔT)\n+ Where α is the temperature coefficient and ΔT is the temperature change.\n\n- Step 2: Calculate ΔT = 100°C - 20°C = 80°C\n+ This is the temperature range over which the resistance changes.\n\n- Step 3: Calculate R = 1.000 Ω × (1 + 0.00404 Ω/Ω/°C × 80°C) = 1.000 Ω × 1.3232 = 1.323 Ω\n+ This shows a significant increase in resistance with temperature, which must be considered in precision circuits.", "source": "Qwen 3 ②", "_id": "qwen_2_22", "judge_pick": false}, {"question": "A charge of 0.60 C flows past a point in a circuit in 30 μs. Calculate the average current. (2 steps)", "answer": "- Step 1: Use the definition of current: I = ΔQ / Δt\n+ I = 0.60 C / 30 × 10⁻⁶ s\n\n- Step 2: Calculate: I = 0.60 / 30 × 10⁻⁶ = 2.0 × 10⁴ A = 20,000 A\n+ This is an extremely high current, characteristic of phenomena like lightning strikes.", "source": "Qwen 3 ②", "_id": "qwen_2_23", "judge_pick": false}, {"question": "For the situation in Q18, calculate the power dissipated in the internal resistance and discuss its implications. (3 steps)", "answer": "- Step 1: From Q18, current I = 1.64 A and internal resistance r = 0.5 Ω\n+ Power dissipated in internal resistance P = I²r\n\n- Step 2: Calculate P = (1.64 A)² × 0.5 Ω = 2.69 A² × 0.5 Ω = 1.345 W\n+ This is the power that is \"wasted\" in the source itself.\n\n- Step 3: This power is lost as heat in the source, which reduces the efficiency of the circuit.\n+ It's one reason why batteries can become hot under heavy loads and why power transmission lines are designed for high voltages to minimize I²R losses.", "source": "Qwen 3 ②", "_id": "qwen_2_24", "judge_pick": false}, {"question": "The calculated resistivity of a lightning channel is about 0.2 Ω·m, while the accepted resistivity of air is about 10¹⁶ Ω·m. Why is there such a large difference? (3 steps)", "answer": "- Step 1: The resistivity of a lightning channel is much lower than that of normal air because during a lightning strike, the air is ionized into a plasma.\n+ In normal air, there are very few free charge carriers (n ≈ 0), but in a lightning channel, there are many.\n\n- Step 2: The ionization dramatically increases the number density of charge carriers (n), which according to I = nAvq, increases the current significantly.\n+ This is the main reason for the large decrease in resistivity - the increase in n dominates over any changes in v or A.\n\n- Step 3: The plasma state of air in a lightning channel makes it a good conductor, with resistivity comparable to that of some semiconductors, not insulators.\n+ This transition from an excellent insulator (normal air) to a good conductor (ionized plasma) is what allows lightning to occur.", "source": "Qwen 3 ②", "_id": "qwen_2_25", "judge_pick": false}, {"question": "In a parallel circuit with two branches having resistances of 5 Ω and 10 Ω, and a total current of 3 A entering the junction, calculate the current in each branch. (3 steps)", "answer": "- Step 1: The voltage across each branch is the same, and V = I₁R₁ = I₂R₂\n+ Also, I_total = I₁ + I₂ = 3 A\n\n- Step 2: I₁/I₂ = R₂/R₁ = 10/5 = 2 ⇒ I₁ = 2I₂\n+ This means twice as much current flows through the 5 Ω resistor compared to the 10 Ω resistor.\n\n- Step 3: Substituting: I_total = I₁ + I₂ = 2I₂ + I₂ = 3I₂ = 3 A ⇒ I₂ = 1 A and I₁ = 2I₂ = 2 A\n+ The current divides inversely to the resistances: more current flows through the path of least resistance.", "source": "Qwen 3 ②", "_id": "qwen_2_26", "judge_pick": false}, {"question": "Compare the power dissipated by a 100 W, 240 V light bulb when operated at 120 V. Assume the resistance remains constant. (3 steps)", "answer": "- Step 1: Calculate the bulb's resistance at rated operation: R = V²/P = (240 V)²/100 W = 57600/100 = 576 Ω\n+ This uses the power formula P = V²/R.\n\n- Step 2: Calculate power at 120 V: P = V²/R = (120 V)²/576 Ω = 14400/576 = 25 W\n+ When voltage is halved, power is quartered since power is proportional to voltage squared.\n\n- Step 3: The bulb will produce much less light and will be significantly dimmer.\n+ This illustrates why electrical devices should be operated at their rated voltages for optimal performance.", "source": "Qwen 3 ②", "_id": "qwen_2_27", "judge_pick": false}, {"question": "Define current density and explain how it relates to drift velocity. (3 steps)", "answer": "- Step 1: Current density J is defined as the current per unit area: J = I/A, with units of A/m².\n+ This provides a measure of how much current flows through a given cross-sectional area of a conductor.\n\n- Step 2: From I = nAvq, dividing both sides by A gives J = nvq.\n+ This shows that current density is directly proportional to the drift velocity of the charge carriers.\n\n- Step 3: This relationship highlights that for a given material (fixed n and q), current density is directly proportional to drift velocity.\n+ In a thicker conductor (larger A), the same current will result in lower current density and lower drift velocity.", "source": "Qwen 3 ②", "_id": "qwen_2_28", "judge_pick": false}, {"question": "Explain why maximizing the load resistance compared to internal resistance increases efficiency in power delivery. (3 steps)", "answer": "- Step 1: In a power delivery system, power is lost in the internal resistance as P_loss = I²r.\n+ To maximize efficiency, we want to minimize this loss.\n\n- Step 2: For a given source voltage, a higher load resistance results in a smaller current: I = ε/(R + r).\n+ As R increases compared to r, the current decreases, reducing the power loss in the source.\n\n- Step 3: Efficiency η = P_load / P_total = I²R / I²(R + r) = R / (R + r)\n+ This shows that as R increases relative to r, efficiency approaches 100%, meaning more of the power goes to the load rather than being lost in the source.", "source": "Qwen 3 ②", "_id": "qwen_2_29", "judge_pick": false}, {"question": "Explain how the temperature of a metal object can be determined from its resistance. (3 steps)", "answer": "- Step 1: The resistance of a metal object increases linearly with temperature over moderate ranges, following R = R₀(1 + αΔT)\n+ Where α is the temperature coefficient of resistance and ΔT is the temperature change from a reference (R₀).\n\n- Step 2: By measuring the resistance with a precise ohmmeter and knowing the temperature coefficient, the temperature can be calculated.\n+ This principle is used in resistance temperature detectors (RTDs), particularly platinum RTDs.\n\n- Step 3: The measurement requires calibration at known temperatures to determine R₀ and α for the specific sensor.\n+ RTDs offer high accuracy and stability over a wide temperature range, making them valuable in industrial applications.", "source": "Qwen 3 ②", "_id": "qwen_2_30", "judge_pick": false}, {"question": "Explain why the current must be the same at all points in a series circuit, even if the cross-sectional area of the conductor changes. (3 steps)", "answer": "- Step 1: In a series circuit, the same number of charge carriers must pass through each point in the circuit at any given time.\n+ This is a consequence of conservation of charge - charges can't accumulate or disappear in a steady-state circuit.\n\n- Step 2: If the cross-sectional area changes, the current density (J = I/A) and drift velocity (I = nAvq ⇒ v = I/nAq) must change, but the total current remains constant.\n+ In a narrower part of the conductor, the same current means higher current density and higher drift velocity.\n\n- Step 3: This ensures that the same amount of charge flows through every cross-section of the circuit per unit time, maintaining a steady current.\n+ If this weren't true, charges would accumulate somewhere in the circuit, creating electric fields that would quickly redistribute the charges to restore current continuity.", "source": "Qwen 3 ②", "_id": "qwen_2_31", "judge_pick": true}], "count": 32}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What is electrical resistance? Write the formula that defines the ohm. (2 steps)", "answer": "- Step 1: Resistance is the ratio of potential difference to current — it measures how much a component opposes the flow of electric current.\n- Step 2: $$R = \\frac{V}{I}$$, so one ohm (1 Ω) equals one volt per ampere (1 V A⁻¹). This defines the ohm as the resistance when a potential difference of 1 V causes a current of 1 A.\n\n**Misconception alert:** Students sometimes think \"resistance blocks current completely\" — but resistance just determines how much current flows for a given voltage, except in extreme cases like infinite resistance.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "Write the three equivalent formulas for electrical power and explain when each is most useful. (3 steps)", "answer": "- Step 1: The three forms are $$P = VI = I^2R = \\frac{V^2}{R}$$\n- Step 2: Use $$P = VI$$ when you know voltage and current directly. Use $$P = I^2R$$ when you know current and resistance (this is Alex's \"caused by current\" form — useful for heating in resistors). Use $$P = \\frac{V^2}{R}$$ when you know voltage and resistance.\n- Step 3: They are mathematically equivalent — choose the one that matches the quantities given in the question.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "Two 5 Ω resistors are connected in series. What is the total resistance? Explain why adding resistors in series always increases the total resistance. (2 steps)", "answer": "- Step 1: $$R_{total} = R_1 + R_2 = 5 + 5 = 10 \\Omega$$\n- Step 2: In series, the same current flows through each resistor. The total opposition to current is the sum of individual oppositions — each resistor adds its \"share\" of resistance to the circuit. Mathematically, you always add positive numbers, so the total must increase.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "Two 5 Ω resistors are connected in parallel. Calculate the total resistance and explain why it is smaller than either individual resistor. (3 steps)", "answer": "- Step 1: Start with the parallel formula: $$\\frac{1}{R_{total}} = \\frac{1}{R_1} + \\frac{1}{R_2} = \\frac{1}{5} + \\frac{1}{5} = \\frac{2}{5}$$\n- Step 2: Take the reciprocal: $$R_{total} = \\frac{5}{2} = 2.5 \\Omega$$\n- Step 3: In parallel, each resistor provides an additional pathway for current. With more paths available, the overall opposition to current decreases. The combined resistance is always smaller than the smallest individual resistor.\n\n**Common trap:** Don't forget the final reciprocal! Many students stop at $$\\frac{1}{R_{total}} = \\frac{2}{5}$$ and wrongly answer 0.4 Ω.", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Why does adding a resistor in parallel always decrease the total resistance, while adding a resistor in series always increases it? (2 steps)", "answer": "- Step 1: In parallel, you create additional current pathways. More paths mean less overall opposition to flow — the total resistance drops below the smallest individual resistor.\n- Step 2: In series, you add resistances end-to-end. Current must pass through every resistor, so the total opposition accumulates: $$R_{total} = R_1 + R_2 + ...$$\n\n**Key pattern:** Think of resistance as \"narrowing\" the pipe — series narrows it more (adds restriction), parallel widens it (adds alternative paths).", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": true}, {"question": "Write the formula for resistivity and state its unit. Why is resistivity measured in Ω m, not Ω m⁻¹? (2 steps)", "answer": "- Step 1: $$\\rho = \\frac{RA}{L}$$, where $$\\rho$$ (rho) is resistivity in ohm metres (Ω m), $$R$$ is resistance in ohms, $$A$$ is cross-sectional area in m², and $$L$$ is length in metres.\n- Step 2: The metre is in the numerator because $$\\rho = R \\times \\frac{A}{L}$$ — area (m²) divided by length (m) gives metres. This is a classic exam trap — many students incorrectly write Ω m⁻¹.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "A wire has resistance R. If you double its length while keeping the material and cross-sectional area the same, what happens to its resistance? What if you double its diameter instead? (3 steps)", "answer": "- Step 1: From $$\\rho = \\frac{RA}{L}$$, rearrange to $$R = \\frac{\\rho L}{A}$$. Resistance is directly proportional to length — doubling length doubles the resistance.\n- Step 2: For diameter: cross-sectional area $$A = \\pi r^2 = \\pi(d/2)^2 = \\frac{\\pi d^2}{4}$$. Area is proportional to $$d^2$$.\n- Step 3: Doubling diameter increases area by a factor of 4 ($$2^2$$). Since $$R \\propto \\frac{1}{A}$$, the resistance decreases by a factor of 4 — the wire becomes easier to pass current through.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": true}, {"question": "What is the difference between resistance and resistivity? Which one is a property of the material, and which depends on the dimensions of the sample? (2 steps)", "answer": "- Step 1: Resistivity $$\\rho$$ is a material property — it tells you how much the material itself resists current flow, independent of shape or size. Copper has low resistivity, rubber has high resistivity.\n- Step 2: Resistance $$R$$ depends on both the material AND the dimensions of the specific sample. A long thin wire has more resistance than a short thick wire of the same material.\n\n**Key distinction:** Think: \"resistivity is intrinsic (like density), resistance is extrinsic (like mass).\"", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "Write the drift velocity formula $$I = nAvq$$ and explain what each symbol represents. (3 steps)", "answer": "- Step 1: $$I = nAvq$$ relates macroscopic current to microscopic motion of charge carriers.\n- Step 2: $$I$$ = current (A), $$n$$ = number density of charge carriers per m³ (m⁻³), $$A$$ = cross-sectional area of conductor (m²), $$v$$ = drift velocity (m s⁻¹), $$q$$ = charge per carrier (C).\n- Step 3: For electrons in a metal, $$q = e = 1.60 \\times 10^{-19}$$ C (the electron charge).", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "Why is the drift velocity of electrons in a wire so slow (typically ~10⁻⁴ m/s), even though the signal travels at near light speed? (2 steps)", "answer": "- Step 1: Current is not the speed of electrons moving like bullets — it's the net flow. Electrons have thermal velocities in random directions (~10⁵ m/s), but these cancel out. The small drift velocity is the tiny net movement in one direction when a voltage is applied.\n- Step 2: Think of it like people in a crowded room all shuffling randomly (thermal motion) with a tiny average drift toward the exit when pushed (drift velocity). The \"push\" (electric field) propagates quickly, but individual electrons drift slowly.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "In a metal conductor, what happens to resistance when temperature increases? Explain using the drift velocity model. How is this different in an NTC thermistor? (3 steps)", "answer": "- Step 1: In a metal, the number density $$n$$ of free electrons is fixed. When temperature increases, lattice ions vibrate more violently, increasing collisions with electrons — this reduces the average drift velocity $$v$$ for the same current.\n- Step 2: Since $$I = nAvq$$, if $$v$$ decreases, the resistance (which is $$V/I$$) must increase. This is why metals have a positive temperature coefficient.\n- Step 3: In an NTC thermistor (semiconductor), heating releases many more charge carriers — $$n$$ increases dramatically. The large increase in $$n$$ more than compensates for any decrease in $$v$$, so current increases and resistance decreases. This is \"negative temperature coefficient\" behavior.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "What is the definition of electromotive force (e.m.f.)? Why is it defined \"per unit charge\" rather than \"per charge particle\"? (2 steps)", "answer": "- Step 1: The e.m.f. of a source is the energy converted from other forms into electrical energy per unit charge passing through the source. Units: joules per coulomb = volts (J C⁻¹ = V).\n- Step 2: \"Per unit charge\" means per coulomb — it's a normalized quantity. A single electron carries only $$1.60 \\times 10^{-19}$$ C, so \"per electron\" would be a tiny energy that depends on the particle type. Per coulomb is universal — whether it's electrons, ions, or any other charge carrier.\n\n**Exam wording matters:** Writing \"per charge particle\" loses the mark — use \"per unit charge\" or \"per coulomb.\"", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "A battery has e.m.f. ε and internal resistance r. Write the equation relating e.m.f., terminal potential difference V, current I, and load resistance R. Explain why the terminal p.d. is always less than the e.m.f. when current flows. (3 steps)", "answer": "- Step 1: The fundamental equation is $$\\varepsilon = V + Ir$$ or equivalently $$\\varepsilon = I(R + r)$$\n- Step 2: Terminal p.d. $$V$$ is the voltage across the external load: $$V = \\varepsilon - Ir$$. When current flows ($$I > 0$$), some voltage is \"lost\" across the internal resistance.\n- Step 3: This \"lost\" voltage $$Ir$$ represents energy dissipated inside the battery itself as heat. That's why a real battery heating up is a sign it's working hard — internal resistance is consuming power.", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "In a V-I graph for a real battery, the x-axis is current I and y-axis is terminal p.d. V. What does the y-intercept represent? What does the gradient represent, and what is the sign of this gradient? (3 steps)", "answer": "- Step 1: The equation is $$V = \\varepsilon - Ir$$, which has the form $$y = c + mx$$ where $$y = V$$, $$x = I$$, $$c = \\varepsilon$$, and $$m = -r$$.\n- Step 2: The y-intercept (where $$I = 0$$) equals $$\\varepsilon$$ — the e.m.f. This is the open-circuit voltage when no current flows.\n- Step 3: The gradient equals $$-r$$ (negative). Since $$r$$ is positive resistance, the line slopes downward. To find internal resistance: $$r = -\\text{gradient} = -\\frac{\\Delta V}{\\Delta I}$$", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "An ideal diode has the I-V curve shown: zero current for reverse bias and small negative voltages, then steep upward slope for forward bias. At which points on the curve is the resistance infinite, and why? (2 steps)", "answer": "- Step 1: From $$R = \\frac{V}{I}$$, resistance becomes infinite when $$I \\rightarrow 0$$ (division by zero), regardless of the voltage value.\n- Step 2: On an ideal diode I-V graph, the flat sections where current is zero (reverse bias and small forward bias before \"turn-on\") have infinite resistance. The points on the horizontal axis where the curve sits have $$R \\rightarrow \\infty$$. At the conducting point where current flows, resistance becomes very small.\n\n**Misconception probe:** Students often think infinite resistance means zero voltage (the origin). But it's zero current that matters — a diode in reverse bias can have large voltage yet infinite resistance.", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "An NTC thermistor is connected in series with a fixed resistor and an ammeter. A voltmeter is connected across the thermistor. If temperature increases, what happens to the ammeter reading and the voltmeter reading across the thermistor? (3 steps)", "answer": "- Step 1: For an NTC thermistor: temperature ↑ ⇒ resistance $$R_T$$ ↓ (negative temperature coefficient).\n- Step 2: Total resistance $$R_{total} = R_T + R_F$$ decreases. From $$I = \\frac{\\varepsilon}{R_{total}}$$, current increases → ammeter reading increases.\n- Step 3: Voltmeter across thermistor reads $$V_T = I \\times R_T$$. Here $$I$$ increases BUT $$R_T$$ decreases faster. The product decreases → voltmeter reading decreases. Answer: ammeter up, voltmeter down.\n\n**Key insight:** The voltmeter's behavior depends on WHICH component it's across — same current flows through both, but only the thermistor's resistance is changing.", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": false}, {"question": "If the voltmeter in the previous question were moved to measure the voltage across the fixed resistor instead, what would happen to both meter readings when temperature increases? (2 steps)", "answer": "- Step 1: The ammeter still reads current, which increases (same reasoning as before).\n- Step 2: Voltmeter across fixed resistor: $$V_F = I \\times R_F$$. Here $$I$$ increases and $$R_F$$ is constant, so $$V_F$$ increases. Answer: both readings increase.\n\n**Contrast with previous:** This is why you must identify which component the voltmeter spans before deciding \"up\" or \"down\" — the current always behaves the same way, but voltage behavior flips.", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "Write the potential divider formula. If you have an input voltage of 12 V across two resistors R₁ and R₂ in series, what fraction of the input voltage appears across R₂? (2 steps)", "answer": "- Step 1: $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$\n- Step 2: The voltage is shared in proportion to the resistances. Across R₂, the fraction is $$\\frac{R_2}{R_1 + R_2}$$ — exactly the same as R₂'s share of the total resistance.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "An LDR (light-dependent resistor) is used in a potential divider with a fixed resistor. In bright light, what happens to the output voltage? What about in darkness? (2 steps)", "answer": "- Step 1: In bright light, the LDR resistance decreases (more photons free more charge carriers). The total resistance of the divider changes.\n- Step 2: With lower LDR resistance in the divider, a larger fraction of the input voltage now appears across the fixed resistor, so the output voltage (taken across the LDR) decreases. In darkness, LDR resistance increases → output voltage increases.\n\n**Summary:** LDR: brighter → lower resistance → lower output voltage across LDR.", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "A potentiometer is a three-terminal variable resistor used as an adjustable voltage divider. Explain how it achieves a continuously variable output voltage from a fixed input. (2 steps)", "answer": "- Step 1: The potentiometer has a resistive element with a sliding contact (wiper). The input voltage is applied across the entire element.\n- Step 2: The wiper divides the element into two resistances. Taking output across one portion gives a fraction of the input — as the wiper moves, the ratio changes continuously from 0% to 100% of the input voltage.", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "A car battery has e.m.f. 12.0 V and internal resistance 0.020 Ω. When it delivers 9.8 A to the starter motor, what is the terminal potential difference? How much power is dissipated inside the battery? (3 steps)", "answer": "- Step 1: Terminal p.d. $$V = \\varepsilon - Ir = 12.0 - (9.8)(0.020) = 12.0 - 0.196 = 11.8 V$$\n- Step 2: Power dissipated inside the battery (as heat): $$P_{internal} = I^2 r = (9.8)^2 \\times 0.020 = 96 \\times 0.020 = 1.92 W$$\n- Step 3: Power delivered to load: $$P_{load} = IV = 11.8 \\times 9.8 = 115.6 W$$. Note that most power goes to the load, but some is lost internally.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "A source with ε = 9.0 V drives an external load R = 5.0 Ω. When internal resistance r = 0.10 Ω, the load power is P₁. When r increases to 0.50 Ω, load power becomes P₂. Calculate the ratio P₂/P₁. Is the claim \"power falls to 70%\" correct? (4 steps)", "answer": "- Step 1: For r = 0.10 Ω: $$I_1 = \\frac{9.0}{5.0 + 0.10} = \\frac{9.0}{5.10} = 1.76 A$$\n- Step 2: $$P_1 = I_1^2 R = (1.76)^2 \\times 5.0 = 15.5 W$$\n- Step 3: For r = 0.50 Ω: $$I_2 = \\frac{9.0}{5.0 + 0.50} = \\frac{9.0}{5.5} = 1.64 A$$\n- Step 4: $$P_2 = (1.64)^2 \\times 5.0 = 13.4 W$$. Ratio: $$\\frac{P_2}{P_1} = \\frac{13.4}{15.5} = 0.86 = 86\\%$$\n\n**Conclusion:** The claim is wrong. Power falls to 86%, not 70% (a 14% reduction, not 30%).", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "In a lightning strike, the current is 25,000 A and the duration is 30 μs. Calculate the total charge transferred. Then, given a potential difference of 1.2 × 10⁹ V, calculate the power dissipated. (3 steps)", "answer": "- Step 1: $$Q = It = (25,000)(30 \\times 10^{-6}) = 0.75 C$$. Remarkably small charge despite enormous current — it's the short time that makes this possible.\n- Step 2: Power $$P = VI = (1.2 \\times 10^9)(25,000) = 3.0 \\times 10^{13} W$$ = 30 terawatts.\n- Step 3: This is briefly comparable to thousands of power stations — which is why lightning is so destructive despite transferring less than one coulomb.", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "For the lightning in the previous question, the channel length is 400 m and diameter is 5.0 cm. The resistance calculated from V/I is 48,000 Ω. Calculate the resistivity of the ionized air channel and explain why it is so much smaller than normal air (~10¹⁶ Ω m). (3 steps)", "answer": "- Step 1: First find cross-sectional area: radius $$r = d/2 = 0.025 m$$, so $$A = \\pi r^2 = \\pi(0.025)^2 = 1.96 \\times 10^{-3} m^2$$\n- Step 2: Use $$\\rho = \\frac{RA}{L} = \\frac{(48,000)(1.96 \\times 10^{-3})}{400} = 0.24 \\Omega \\cdot m \\approx 0.2 \\Omega \\cdot m$$\n- Step 3: Normal air is an insulator because it has very few free charge carriers (very low $$n$$). During a lightning strike, the air is ionized into a hot plasma — it has vastly more free electrons and ions. This enormous increase in $$n$$ (from almost zero to huge) causes resistivity to collapse by a factor of ~10¹⁷.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "In a potential divider circuit, the input is 5 V and you want 2 V output. If one resistor is 1 kΩ, what should the other resistor be? (2 steps)", "answer": "- Step 1: Use $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$. We want $$\\frac{2}{5} = 0.4 = \\frac{R_2}{R_1 + R_2}$$\n- Step 2: Let $$R_1 = 1 \\text{ k}\\Omega$$ (the known resistor). Then $$\\frac{R_2}{1000 + R_2} = 0.4$$. Solving: $$R_2 = 0.4(1000 + R_2)$$ → $$R_2 = 400 + 0.4R_2$$ → $$0.6R_2 = 400$$ → $$R_2 = 667 \\Omega$$", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "What happens to the total resistance when you add a second identical resistor in parallel with an existing resistor? What about adding it in series? (2 steps)", "answer": "- Step 1: In parallel: the total drops. For two identical resistors $$R$$, $$\\frac{1}{R_{total}} = \\frac{1}{R} + \\frac{1}{R} = \\frac{2}{R}$$, so $$R_{total} = \\frac{R}{2}$$ — exactly half.\n- Step 2: In series: the total doubles: $$R_{total} = R + R = 2R$$. This is always true for adding an identical resistor.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": false}, {"question": "In a series circuit with three resistors of different values, where is the current the same, and where is the voltage the same? (2 steps)", "answer": "- Step 1: Current is the same everywhere in a series circuit: $$I = I_1 = I_2 = I_3$$ (no branching means same charge flow through each component).\n- Step 2: Voltage is the same across all components connected in parallel. In series, the total voltage is shared: $$V_{total} = V_1 + V_2 + V_3$$\n\n**Remember:** Series → same current, voltages add. Parallel → same voltage, currents add.", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "A wire of resistivity $$1.7 \\times 10^{-8} \\Omega \\cdot m$$ has length 2.0 m and diameter 0.50 mm. Calculate its resistance. (3 steps)", "answer": "- Step 1: Convert diameter to metres: $$d = 0.50 \\text{ mm} = 0.50 \\times 10^{-3} m = 5.0 \\times 10^{-4} m$$. Radius $$r = d/2 = 2.5 \\times 10^{-4} m$$\n- Step 2: Cross-sectional area $$A = \\pi r^2 = \\pi(2.5 \\times 10^{-4})^2 = \\pi(6.25 \\times 10^{-8}) = 1.96 \\times 10^{-7} m^2$$\n- Step 3: Resistance $$R = \\frac{\\rho L}{A} = \\frac{(1.7 \\times 10^{-8})(2.0)}{1.96 \\times 10^{-7}} = 1.7 \\times 10^{-8} \\times \\frac{2.0}{1.96 \\times 10^{-7}} = 0.17 \\Omega$$", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "A copper wire carries a current of 0.93 A. Copper has free electron density $$n = 8.4 \\times 10^{28} m^{-3}$$ and electron charge $$e = 1.60 \\times 10^{-19} C$$. The wire's cross-sectional area is $$5.0 \\times 10^{-7} m^2$$. Which expression correctly gives the drift velocity? (2 steps)", "answer": "- Step 1: Start with $$I = nAvq$$ and rearrange for drift velocity: $$v = \\frac{I}{nAq}$$\n- Step 2: Substituting: $$v = \\frac{0.93}{(8.4 \\times 10^{28})(5.0 \\times 10^{-7})(1.60 \\times 10^{-19})}$$\n\nThe correct expression has current on top and all three quantities $$n$$, $$A$$, and $$e$$ multiplied together in the denominator.\n\n**Exam technique:** Don't compute — just rearrange the formula and match to the options. Options with $$A$$ on top are wrong immediately.", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "In the drift velocity formula $$v = I/(nAq)$$, what happens to the drift velocity if you double the current while keeping everything else the same? What if you double the diameter of the wire? (3 steps)", "answer": "- Step 1: From $$v \\propto I$$ (all else constant), doubling current doubles the drift velocity.\n- Step 2: If you double the diameter, the radius doubles, so cross-sectional area increases by factor of 4 ($$A \\propto r^2$$).\n- Step 3: Since $$v \\propto \\frac{1}{A}$$, increasing area by 4 reduces drift velocity to 1/4 of its original value for the same current. This makes sense — wider pipe, easier flow.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "Explain what \"internal resistance\" actually means in a battery. Why does a real battery warm up when delivering current? (2 steps)", "answer": "- Step 1: A real battery is modeled as an ideal e.m.f. source in series with a small internal resistance $$r$$. This $$r$$ represents the resistance of the electrolyte, electrodes, and internal connections.\n- Step 2: When current flows, power $$P = I^2 r$$ is dissipated as heat inside the battery itself. That's why a battery delivering high current feels warm — energy is being lost internally, reducing the terminal voltage below the e.m.f.", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "When a battery is connected but no current flows (open circuit), what is the terminal potential difference equal to? What equation proves this? (2 steps)", "answer": "- Step 1: When $$I = 0$$, the terminal p.d. $$V$$ equals the e.m.f. $$\\varepsilon$$.\n- Step 2: From $$\\varepsilon = V + Ir$$, if $$I = 0$$ then $$\\varepsilon = V + 0 = V$$. This is why a voltmeter reading an open-circuit battery reads its e.m.f. (approximately — modern digital meters draw tiny current, but the principle holds).", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In Core Practical 7 (measuring resistivity), what measurements are needed and how is resistivity calculated from them? (3 steps)", "answer": "- Step 1: Measure resistance $$R = V/I$$ for several lengths of wire using a voltmeter and ammeter. Measure the diameter $$d$$ at several points with a micrometer and average (check for zero error first).\n- Step 2: Calculate cross-sectional area: $$A = \\pi(d/2)^2 = \\frac{\\pi d^2}{4}$$. Plot a graph of $$R$$ against $$L$$ — this should be a straight line through the origin.\n- Step 3: The gradient of the $$R$$-$$L$$ graph equals $$\\rho/A$$. So $$\\rho = \\text{gradient} \\times A$$. This method reduces error by using the slope rather than relying on individual measurements.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "A student says that because resistivity has units of Ω m, it must decrease when the wire gets longer (since Ω = V/A and m is in the numerator). How would you correct this misconception? (2 steps)", "answer": "- Step 1: Resistivity is a material property, independent of dimensions. The \"m\" in Ω m is there because of how the formula is derived: $$\\rho = \\frac{RA}{L}$$ — the metres in $$A$$ (m²) divided by $$L$$ (m) leave metres in the numerator.\n- Step 2: A longer wire has MORE resistance ($$R \\propto L$$), not less. But the resistivity of the material itself doesn't change with length — it's like saying density decreases because a taller column of water has more mass. The property (ρ) stays the same; the derived quantity (R) changes.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "Why can't you use a voltmeter with infinite resistance to measure the potential difference across a component in a circuit without affecting the circuit? (2 steps)", "answer": "- Step 1: In theory, an ideal voltmeter draws no current (infinite resistance), so it doesn't alter the circuit. In practice, all real voltmeters have very high but finite resistance.\n- Step 2: When measuring high-resistance components (like a voltmeter across a very large resistor in a potential divider), the voltmeter itself provides an additional parallel path. This reduces the effective resistance and changes the voltage distribution. Always use a voltmeter with resistance much larger than the circuit resistances.", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "A circuit has a battery, an ammeter, and two resistors in parallel. The ammeter measures total current. If one resistor is doubled in value, what happens to the ammeter reading and the current through the other resistor? (3 steps)", "answer": "- Step 1: Let original parallel resistance be $$R_P$$ for two resistors $$R$$. Adding a resistor: $$\\frac{1}{R_P} = \\frac{1}{R} + \\frac{1}{R} = \\frac{2}{R}$$, so $$R_P = R/2$$.\n- Step 2: When one resistor doubles (becomes $$2R$$), the new parallel combination: $$\\frac{1}{R'_P} = \\frac{1}{2R} + \\frac{1}{R} = \\frac{3}{2R}$$, so $$R'_P = \\frac{2R}{3}$$.\n- Step 3: Total resistance increases from $$R/2$$ to $$2R/3$$ (by factor of 4/3), so current decreases. The current through the unchanged resistor decreases (same voltage, higher effective resistance). The current redistributes between the two branches.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "Explain why the current in a simple series circuit is the same at every point, but the voltage is different at each component. (2 steps)", "answer": "- Step 1: In a series circuit, there's only one path for charge to flow. The same amount of charge passing any point per second means the current is identical everywhere — charge isn't created or destroyed, and no charge accumulates in the wires.\n- Step 2: Each component converts electrical energy to other forms (light, heat, etc.), so the energy per unit charge (voltage) drops across each one. The total drop equals the battery's e.m.f., distributed among all components.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "What is the purpose of a \"shunt\" resistor used in an ammeter? How does it allow measurement of larger currents? (2 steps)", "answer": "- Step 1: An ammeter is a galvanometer with very low internal resistance. To measure larger currents, a low-value \"shunt\" resistor is placed in parallel with it.\n- Step 2: Most of the current goes through the shunt (low resistance), while only a tiny fraction passes through the meter. The total current is then the sum: $$I_{total} = I_{meter} + I_{shunt}$$. This extends the range without damaging the sensitive galvanometer.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "A student claims: \"The resistance of an ideal wire is zero, so no power is dissipated in it even when current flows.\" What is wrong with this statement? (2 steps)", "answer": "- Step 1: In reality, even a good conductor has some resistance (copper wire, connecting wires in labs). Power dissipated is $$P = I^2 R$$ — if $$R = 0$$, then indeed $$P = 0$$.\n- Step 2: However, in many exam contexts, \"ideal wire\" means we assume it has negligible resistance compared to other circuit elements — we ignore its voltage drop to simplify analysis. The statement is technically correct for an ideal wire, but in real circuits, even small resistances matter, especially with high currents.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "In a circuit with a battery, resistor, and LED in series, the LED doesn't light up. When you add a second identical battery in series (doubling the e.m.f.), the LED lights. Explain this in terms of the LED's I-V characteristic. (2 steps)", "answer": "- Step 1: An LED has a threshold voltage (turn-on voltage) — below this, current is essentially zero (very high resistance). Once the voltage exceeds the threshold, current increases rapidly with voltage.\n- Step 2: With one battery, the voltage was below the LED's turn-on voltage, so current was negligible (LED appeared \"off\"). Adding the second battery doubled the voltage — now exceeding the threshold, current flows, and the LED lights. The LED's resistance changed from essentially infinite to a low value once the voltage threshold was crossed.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": true}, {"question": "What is the difference between a potentiometer and a rheostat? (2 steps)", "answer": "- Step 1: A potentiometer is used as a voltage divider — three terminals: two ends of the resistive element and a movable wiper. It provides an adjustable fraction of the input voltage at the output.\n- Step 2: A rheostat is a variable resistor used to control current — typically two terminals (one end and the wiper), functioning as an adjustable resistance. In exam contexts, \"potentiometer\" usually means the voltage divider function.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "Three resistors of 6 Ω each are connected in parallel. What is the total resistance? Show your working. (2 steps)", "answer": "- Step 1: For three equal resistors in parallel: $$\\frac{1}{R_{total}} = \\frac{1}{6} + \\frac{1}{6} + \\frac{1}{6} = \\frac{3}{6} = \\frac{1}{2}$$\n- Step 2: Therefore $$R_{total} = 2 \\Omega$$. This is smaller than the smallest individual resistor (6 Ω), confirming the parallel result.", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "A charge of 0.60 C flows past a point in 30 μs. What is the average current? Is this a realistic current for a lightning strike? (2 steps)", "answer": "- Step 1: $$I = \\frac{Q}{t} = \\frac{0.60}{30 \\times 10^{-6}} = \\frac{0.60}{3 \\times 10^{-5}} = 2.0 \\times 10^4 A = 20,000 A$$\n- Step 2: Yes, this is in the right ballpark for lightning (typical strikes are 20,000-30,000 A). The very short time (30 μs = 30 millionths of a second) means even a small charge transfer creates an enormous current.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "A cell has e.m.f. 1.5 V and internal resistance 0.50 Ω. It drives a 2.0 Ω load resistor. Find (a) the current and (b) the terminal potential difference. (2 steps)", "answer": "- Step 1: Current $$I = \\frac{\\varepsilon}{R + r} = \\frac{1.5}{2.0 + 0.50} = \\frac{1.5}{2.5} = 0.60 A$$\n- Step 2: Terminal p.d. $$V = \\varepsilon - Ir = 1.5 - (0.60)(0.50) = 1.5 - 0.30 = 1.2 V$$. The 0.3 V is \"lost\" across internal resistance.", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "In the formula $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$, what happens to Vout if you make R₂ much larger than R₁? What if R₂ is much smaller than R₁? (2 steps)", "answer": "- Step 1: If $$R_2 \\gg R_1$$, then $$R_1 + R_2 \\approx R_2$$, so $$V_{out} \\approx V_{in} \\times \\frac{R_2}{R_2} = V_{in}$$ — almost the full input voltage appears at output.\n- Step 2: If $$R_2 \\ll R_1$$, then $$R_1 + R_2 \\approx R_1$$, so $$V_{out} \\approx V_{in} \\times \\frac{R_2}{R_1}$$ — almost zero voltage appears at output (a small fraction).", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "Why must you be careful with the wording \"reduces to 70%\" versus \"reduces by 70%\" when analyzing power changes? Give an example. (2 steps)", "answer": "- Step 1: \"Reduces to 70%\" means the new value is 70% of the original: $$P_{new} = 0.70 P_{old}$$. \"Reduces by 70%\" means only 30% remains: $$P_{new} = 0.30 P_{old}$$.\n- Step 2: In the power question, we found power falls to 86% (not 70%). If the claim had been \"reduces by 70%\", the correct interpretation would be it falls to 30% — completely different. Always read the exact wording.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": true}, {"question": "A wire is stretched to twice its original length while its volume stays constant. What happens to its resistance? (3 steps)", "answer": "- Step 1: Original: $$R = \\frac{\\rho L}{A}$$. Volume $$V = A \\times L$$ is constant, so $$A \\propto \\frac{1}{L}$$.\n- Step 2: When length doubles ($$L' = 2L$$), to keep volume constant, the cross-sectional area must halve ($$A' = A/2$$).\n- Step 3: New resistance: $$R' = \\frac{\\rho (2L)}{A/2} = \\frac{\\rho (2L) \\times 2}{A} = 4 \\frac{\\rho L}{A} = 4R$$. Stretching a wire increases its resistance by a factor of 4.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": true}, {"question": "What is the purpose of the \"internal resistance\" concept in circuit analysis? How does it affect the maximum power deliverable to a load? (2 steps)", "answer": "- Step 1: Internal resistance explains why battery voltage drops under load and why batteries heat up. It models real energy losses within the source itself.\n- Step 2: For a given source with fixed e.m.f. and internal resistance, maximum power to the load occurs when load resistance equals internal resistance ($$R = r$$). At this point, power is split equally between load and internal resistance — each gets $$\\frac{\\varepsilon^2}{4r}$$.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "Explain why connecting batteries in series increases the total e.m.f., but connecting them in parallel (if identical) doesn't increase the e.m.f. but does increase the total available current. (2 steps)", "answer": "- Step 1: In series, the energy per unit charge from each cell adds up — each coulomb gains energy from each cell, so e.m.f. adds: $$\\varepsilon_{total} = \\varepsilon_1 + \\varepsilon_2 + ...$$\n- Step 2: In parallel, each coulomb passes through only one cell, so the energy gain per coulomb is just that of one cell (e.m.f. stays the same). But the total charge available per second (current capacity) increases — more cells can supply charge, so the current rating improves.", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}], "count": 49}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "A wire carries a current of 2.0 A for 30 seconds. How much charge passes through a cross-section of the wire? (1 step)", "answer": "- Step 1: Use the definition of current $$I = \\frac{\\Delta Q}{\\Delta t}$$. Rearranging gives $$\\Delta Q = I \\times \\Delta t$$.\n- Substitute: $$\\Delta Q = 2.0 \\times 30 = 60 \\text{ C}$$.\n\n**Answer: 60 C** — Current is the rate of flow of charge; one ampere equals one coulomb per second.", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Define electrical resistance and state its unit. (1 step)", "answer": "- Step 1: Resistance $$R$$ is defined by $$R = \\frac{V}{I}$$, where $$V$$ is the potential difference across the component and $$I$$ is the current flowing through it.\n- The unit of resistance is the ohm (Ω), where $$1\\ \\Omega = 1\\ \\text{V A}^{-1}$$.\n\n**Answer: $$R = \\frac{V}{I}$$, unit: ohm (Ω)** — This defines how much voltage is needed to push a given current through a component.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Two resistors of 10 Ω and 20 Ω are connected in series. What is the total resistance? What if they are connected in parallel instead? (2 steps)", "answer": "- Step 1 (Series): In series, resistances add directly: $$R_{total} = R_1 + R_2 = 10 + 20 = 30\\ \\Omega$$.\n- Step 2 (Parallel): For parallel, $$\\frac{1}{R_{total}} = \\frac{1}{R_1} + \\frac{1}{R_2} = \\frac{1}{10} + \\frac{1}{20} = \\frac{2}{20} + \\frac{1}{20} = \\frac{3}{20}$$. Therefore $$R_{total} = \\frac{20}{3} \\approx 6.67\\ \\Omega$$.\n\n**Answer: Series = 30 Ω; Parallel ≈ 6.67 Ω** — Adding resistors in series always increases total resistance; adding them in parallel always decreases it (always smaller than the smallest individual resistor).", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "Why does adding a resistor in parallel always decrease the total resistance, even if the added resistor has a very large resistance? (2 steps)", "answer": "- Step 1: In parallel, the voltage across each branch is the same. Adding another branch provides an additional path for current to flow.\n- Step 2: Since total current $$I_{total} = I_1 + I_2 + ...$$ increases (more paths), and $$R = V/I$$, the overall equivalent resistance must decrease. Even a very large resistor in parallel still adds extra current paths, reducing the effective resistance.\n\n**Key insight:** The total resistance in parallel is always less than the smallest individual resistance because you're adding more current paths, not restricting them.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "A student says that three 6 Ω resistors in parallel give a total resistance of 2 Ω. Is the student correct? Show the working. (2 steps)", "answer": "- Step 1: Write the parallel formula: $$\\frac{1}{R_{total}} = \\frac{1}{6} + \\frac{1}{6} + \\frac{1}{6} = \\frac{3}{6} = \\frac{1}{2}$$.\n- Step 2: Take the reciprocal: $$R_{total} = 2\\ \\Omega$$.\n\n**Answer: Yes, the student is correct — 2 Ω** — This demonstrates the common trap: the calculation gives you $$1/R_{total}$$, so you must take the reciprocal one more time at the end.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "What is electrical resistivity? Write the formula and state its unit. Why is it a property of the material, not the shape? (2 steps)", "answer": "- Step 1: Resistivity $$\\rho$$ is a material property that quantifies how strongly a material opposes the flow of electric current. The formula is $$\\rho = \\frac{RA}{L}$$, where $$R$$ is resistance, $$A$$ is cross-sectional area, and $$L$$ is length.\n- Step 2: The unit is $$\\Omega \\cdot m$$ (ohm-metre). Note: it is NOT $$\\Omega m^{-1}$$. The metre is in the numerator.\n\n**Why it's material-dependent:** If you change the shape of a sample (make it longer or thicker), $$R$$ changes but $$\\rho$$ stays the same — it's intrinsic to the material itself, like density or melting point.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "A wire has resistance 5 Ω, length 2.0 m, and cross-sectional area $$1.0 \\times 10^{-7}\\ m^2$$. Calculate its resistivity. (2 steps)", "answer": "- Step 1: Use $$\\rho = \\frac{RA}{L}$$.\n- Step 2: Substitute: $$\\rho = \\frac{5 \\times 1.0 \\times 10^{-7}}{2.0} = \\frac{5 \\times 10^{-7}}{2.0} = 2.5 \\times 10^{-7}\\ \\Omega \\cdot m$$.\n\n**Answer: $$\\rho = 2.5 \\times 10^{-7}\\ \\Omega \\cdot m$$** — Always check units: $$[\\Omega][m^2]/[m] = \\Omega \\cdot m$$.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "In the context of resistivity, what is the key measurement procedure in Core Practical 7, and what graph should be plotted? (2 steps)", "answer": "- Step 1: Measure resistance $$R = V/I$$ for several different lengths $$L$$ of the same wire (using a micrometre to measure diameter $$d$$ at multiple points and calculating $$A = \\pi d^2/4$$).\n- Step 2: Plot $$R$$ (y-axis) against $$L$$ (x-axis). The gradient equals $$\\rho/A$$, so $$\\rho = (\\text{gradient}) \\times A$$.\n\n**Key point:** The linear graph proves the proportionality $$R \\propto L$$ and allows calculation of the material's resistivity independent of shape.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "Explain what each symbol means in the drift velocity equation $$I = nAvq$$. (1 step)", "answer": "- $$I$$ = current (A)\n- $$n$$ = number density of charge carriers ($$m^{-3}$$) — how many free charge carriers per unit volume\n- $$A$$ = cross-sectional area of the conductor ($$m^2$$)\n- $$v$$ = drift velocity ($$m\\ s^{-1}$$) — average velocity of charge carriers\n- $$q$$ = charge on each carrier (C). For electrons, $$q = e = 1.60 \\times 10^{-19}\\ C$$\n\n**Physical meaning:** Current is the total charge passing per second, which equals the number of carriers × their drift speed × the charge each carries × the cross-sectional area they flow through.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "A copper wire has cross-sectional area $$5.0 \\times 10^{-7}\\ m^2$$ and carries current 0.93 A. The number density of conduction electrons in copper is $$8.4 \\times 10^{28}\\ m^{-3}$$. Which expression gives the drift velocity: (A) $$I/nAe$$, (B) $$nAe/I$$, (C) $$AI/nqe$$, (D) $$I/nAq$$? (2 steps)", "answer": "- Step 1: Start from $$I = nAvq$$. Make $$v$$ the subject: $$v = \\frac{I}{nAq}$$.\n- Step 2: For electrons, $$q = e = 1.60 \\times 10^{-19}\\ C$$. The correct expression is therefore $$v = \\frac{I}{nAe}$$, matching option (A).\n\n**Answer: (A) $$I/nAe$$** — The current $$I$$ sits alone on top; the denominator contains all three: $$n$$, $$A$$, and $$e$$. This is an algebra-only MCQ — rearrange first, then match.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "Estimate the order of magnitude of the drift velocity in a typical copper wire carrying a current of 1 A, with $$n \\approx 8.4 \\times 10^{28}\\ m^{-3}$$ and $$A \\approx 1\\ mm^2 = 10^{-6}\\ m^2$$. (2 steps)", "answer": "- Step 1: Use $$v = \\frac{I}{nAq}$$. Substitute: $$v = \\frac{1}{(8.4 \\times 10^{28})(10^{-6})(1.6 \\times 10^{-19})}$$.\n- Step 2: Denominator ≈ $$8.4 \\times 10^{28} \\times 10^{-6} \\times 1.6 \\times 10^{-19} = 8.4 \\times 1.6 \\times 10^{3} \\approx 13.4 \\times 10^3 = 1.34 \\times 10^4$$.\n- So $$v \\approx \\frac{1}{1.34 \\times 10^4} \\approx 7.5 \\times 10^{-5}\\ m/s$$.\n\n**Answer: $$\\approx 10^{-4}\\ m/s$$ (about 0.1 mm per second)** — This \"surprisingly slow drift\" is a key intuition: electrons drift very slowly despite current appearing instantaneous in circuits.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A student claims that in a metal, heating increases resistance because the atoms vibrate more and scatter electrons more frequently. However, in an NTC thermistor (semiconductor), heating decreases resistance. Explain this difference using the drift velocity equation. (3 steps)", "answer": "- Step 1: In a metal, the number density $$n$$ of free electrons is fixed (metal already has many free electrons). Heating increases lattice vibrations, which decreases the drift velocity $$v$$ for the same electric field. Since $$I = nAvq$$, lower $$v$$ means lower $$I$$, so resistance increases (positive temperature coefficient).\n- Step 2: In a semiconductor (NTC thermistor), heating releases many more charge carriers — $$n$$ increases dramatically.\n- Step 3: The large increase in $$n$$ dominates over the small decrease in $$v$$, so overall $$I$$ increases for the same voltage, meaning resistance decreases (negative temperature coefficient).\n\n**Key insight:** Same equation, different dominant factor — in metals $$v$$ changes, in semiconductors $$n$$ changes.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": true}, {"question": "Define electromotive force (e.m.f.) and state its unit. Why is it NOT a \"force\"? (2 steps)", "answer": "- Step 1: The e.m.f. ($$ε$$) of a source is the energy converted from other forms (chemical, mechanical, etc.) into electrical energy per unit charge passing through the source. Unit: volt (V) = $$J\\ C^{-1}$$.\n- Step 2: It's called \"electromotive force\" historically but is actually a potential difference (energy per unit charge), not a force. The word \"force\" is misleading — it measures energy transfer, not mechanical force.\n\n**Critical wording:** Always say \"per unit charge\" or \"per coulomb\" — never \"per charge particle\" (that would be wrong by a factor of ~$$10^{19}$$).", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": true}, {"question": "A battery has e.m.f. 12.0 V and internal resistance 0.02 Ω. When connected to an external load, the terminal potential difference is 11.81 V and current is 9.83 A. Show that the internal resistance is approximately 0.019 Ω. (2 steps)", "answer": "- Step 1: Use $$ε = V + Ir$$. Rearranging: $$r = \\frac{ε - V}{I}$$.\n- Step 2: Substitute: $$r = \\frac{12.00 - 11.81}{9.83} = \\frac{0.19}{9.83} = 0.0193\\ \\Omega$$.\n\n**Answer: $$r \\approx 0.019\\ \\Omega$$ (3 s.f.)** — The terminal pd is always less than the e.m.f. when current flows, because some voltage is \"lost\" across the internal resistance.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "In a circuit with a battery of e.m.f. ε and internal resistance r connected to an external resistor R, write the three equivalent forms of the voltage equation. Which form shows that a V-I graph should have gradient -r and y-intercept ε? (2 steps)", "answer": "- Step 1: The three equivalent forms are:\n$$ε = V + Ir$$\n$$ε = I(R + r)$$\n$$V = ε - Ir$$\n\n- Step 2: Rearrange $$V = ε - Ir$$ into $$y = c + mx$$ form: $$V = (-r)I + ε$$. This shows:\n- Gradient = $$-r$$ (negative, so line slopes downward)\n- y-intercept = $$ε$$ (when $$I = 0$$, $$V = ε$$)\n\n**Answer: $$V = ε - Ir$$ gives gradient = $$-r$$ and intercept = $$ε$$** — This is how you determine e.m.f. and internal resistance graphically in Core Practical 8.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "You have a battery, a variable resistor, an ammeter, and a voltmeter. Describe how you would experimentally determine the internal resistance r and e.m.f. ε of the battery using a graphical method. (3 steps)", "answer": "- Step 1: Connect the circuit: battery in series with variable resistor and ammeter; voltmeter across the variable resistor (terminals).\n- Step 2: Vary the variable resistor and, for each setting, record the voltmeter reading $$V$$ (terminal pd) and ammeter reading $$I$$. Obtain several pairs of $$(I, V)$$ data.\n- Step 3: Plot $$V$$ (y-axis) against $$I$$ (x-axis). Draw the best-fit straight line. The y-intercept = $$ε$$; the gradient = $$-r$$, so $$r = -\\text{gradient} = -\\frac{ΔV}{ΔI}$$.\n\n**Key exam point:** State explicitly that the gradient is negative and that $$r = -\\text{gradient}$$. Both pieces (intercept = ε and gradient = -r) are needed for full marks.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "A potential divider consists of two resistors R1 and R2 in series, with input voltage V_in across both and output voltage V_out taken across R2. Derive the formula $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$. (2 steps)", "answer": "- Step 1: In series, the same current $$I$$ flows through both resistors: $$I = \\frac{V_{in}}{R_1 + R_2}$$.\n- Step 2: The voltage across R2 is $$V_{out} = I \\times R_2 = \\frac{V_{in}}{R_1 + R_2} \\times R_2 = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$.\n\n**Answer: $$V_{out} = V_{in} \\frac{R_2}{R_1 + R_2}$$** — The output voltage is a fraction of the input, determined by the ratio of the output resistor to the total resistance.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "An LDR (light-dependent resistor), a fixed resistor, and a battery are connected in series to form a potential divider. The output is taken across the LDR. As light intensity increases, what happens to the output voltage? Explain using the potential divider formula. (2 steps)", "answer": "- Step 1: In an LDR, resistance decreases as light intensity increases (more photons release more charge carriers).\n- Step 2: Using $$V_{out} = V_{in} \\times \\frac{R_{LDR}}{R_{LDR} + R_{fixed}}$$, as $$R_{LDR}$$ decreases, the numerator decreases while the denominator also decreases. However, the numerator decreases proportionally more, so the fraction decreases.\n\n**Answer: Output voltage decreases** — With brighter light, the LDR's lower resistance takes a smaller share of the total voltage. This is why LDRs are used as light sensors in lighting control circuits.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "A student says that an NTC thermistor's resistance decreases as temperature increases because the atoms vibrate more. Why is this explanation incorrect for a thermistor? (2 steps)", "answer": "- Step 1: That explanation is correct for metals (where resistance increases with temperature due to increased scattering), but NOT for NTC thermistors.\n- Step 2: An NTC thermistor is a semiconductor. As temperature increases, many more charge carriers are released ($$n$$ increases dramatically in $$I = nAvq$$), causing current to increase far more than any decrease in drift velocity. The net effect is lower resistance.\n\n**Misconception trap:** Don't apply metal conductor reasoning to semiconductors — the dominant mechanism is different ($$n$$ changes vs. $$v$$ changes).", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "In a circuit with an NTC thermistor in series with a fixed resistor and an ammeter, the voltmeter is connected across the thermistor. If temperature increases, what happens to the ammeter reading and the voltmeter reading? (3 steps)", "answer": "- Step 1: Temperature ↑ ⇒ thermistor resistance $$R_T$$ ↓.\n- Step 2: Total resistance $$R_{total} = R_T + R_{fixed}$$ ↓, so current $$I = ε/R_{total}$$ ↑ — ammeter reading increases.\n- Step 3: Voltmeter across thermistor: $$V_T = I \\times R_T$$. Here $$I$$ increases but $$R_T$$ decreases. Since $$R_T$$ falls faster than $$I$$ rises, the product $$V_T$$ decreases.\n\n**Answer: Ammeter increases; voltmeter decreases** — This is a classic question. The key is that the voltmeter reading depends on which component it's across — here it's the thermistor, which has decreasing resistance.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "If the voltmeter in the previous question were moved to be across the fixed resistor instead, what would happen to its reading as temperature increases? (2 steps)", "answer": "- Step 1: Current $$I$$ still increases (same reasoning).\n- Step 2: Voltmeter across fixed resistor: $$V_F = I \\times R_{fixed}$$. Since $$I$$ increases and $$R_{fixed}$$ is constant, $$V_F$$ increases.\n\n**Answer: Voltmeter reading increases** — Same circuit, different voltmeter position gives opposite predictions. Always identify which component the voltmeter spans before deciding the direction of change.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "The I-V graph for an ideal diode is shown. At which point(s) on the graph is the resistance of the diode infinite? (1 step)", "answer": "- Step 1: Resistance $$R = V/I$$. Infinite resistance occurs when $$I = 0$$ (the denominator is zero), regardless of the voltage. On an ideal diode graph, the flat portions where current is zero (reverse bias and small forward bias) have infinite resistance.\n\n**Answer: Points where I = 0** — The common misconception is to look for V = 0 (the origin). But R → ∞ when I → 0, not when V → 0.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "A battery with e.m.f. 9.0 V and internal resistance 0.10 Ω is connected to an external load of 5.0 Ω. Calculate the current and the power dissipated in the load. (2 steps)", "answer": "- Step 1: Total resistance = $$R + r = 5.0 + 0.10 = 5.10\\ \\Omega$$. Current $$I = \\frac{ε}{R + r} = \\frac{9.0}{5.10} = 1.76\\ A$$.\n- Step 2: Power in load: $$P = I^2R = (1.76)^2 \\times 5.0 = 15.5\\ W$$ (or equivalently $$P = VI$$ where $$V = IR = 8.82\\ V$$).\n\n**Answer: I = 1.76 A; P = 15.5 W** — Three equivalent power formulas exist: $$P = VI = I^2R = V^2/R$$. Choose based on which quantities you know.", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "If the internal resistance in the previous question is changed to 0.50 Ω, by what percentage does the power in the 5.0 Ω load change? A student claims it falls to 70% of the original. Is the student correct? (3 steps)", "answer": "- Step 1 (Original, r = 0.10 Ω): $$I_1 = \\frac{9.0}{5.0 + 0.10} = \\frac{9.0}{5.10} = 1.76\\ A$$, $$P_1 = I_1^2 \\times 5.0 = 15.5\\ W$$.\n- Step 2 (New, r = 0.50 Ω): $$I_2 = \\frac{9.0}{5.0 + 0.5} = \\frac{9.0}{5.5} = 1.64\\ A$$, $$P_2 = I_2^2 \\times 5.0 = 13.4\\ W$$.\n- Step 3 (Ratio): $$\\frac{P_2}{P_1} = \\frac{13.4}{15.5} = 0.86 = 86\\%$$.\n\n**Answer: Power falls to 86% (not 70%) — student is wrong** — The student claimed it \"falls to 70%\" meaning $$P_2/P_1 = 0.70$$. The actual value is 0.86. Always quote the comparison number to justify your conclusion.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A lightning strike carries a current of 25,000 A for 30 μs between a cloud and the ground. Calculate the total charge transferred. (2 steps)", "answer": "- Step 1: Use $$I = Q/t$$, rearranged to $$Q = I \\times t$$.\n- Step 2: Convert time: $$30\\ \\mu s = 30 \\times 10^{-6}\\ s$$. Then $$Q = 25,000 \\times 30 \\times 10^{-6} = 0.75\\ C$$.\n\n**Answer: Q = 0.75 C** — Despite the enormous current, the very short duration means relatively little charge actually transfers. This is why lightning doesn't \"run out\" of charge easily.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "The lightning strike in the previous question has a potential difference of $$1.2 \\times 10^9\\ V$$. Calculate the power dissipated. (1 step)", "answer": "- Step 1: Use $$P = V \\times I = (1.2 \\times 10^9) \\times (25,000) = 3.0 \\times 10^{13}\\ W$$.\n\n**Answer: $$P = 3.0 \\times 10^{13}\\ W$$ (30 TW)** — This is roughly equivalent to thousands of power stations operating simultaneously, which explains the destructive power of lightning despite the small charge transferred.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "A lightning channel is 400 m long with diameter 5.0 cm. The voltage across it is $$1.2 \\times 10^9\\ V$$ and current is 25,000 A. Show that the resistivity is approximately 0.2 Ω·m. (3 steps)", "answer": "- Step 1: Calculate resistance: $$R = V/I = (1.2 \\times 10^9) / (25,000) = 4.8 \\times 10^4\\ \\Omega$$.\n- Step 2: Calculate cross-sectional area: diameter $$d = 0.05\\ m$$, so radius $$r = 0.025\\ m$$. $$A = \\pi r^2 = \\pi \\times (0.025)^2 = 1.96 \\times 10^{-3}\\ m^2$$.\n- Step 3: Calculate resistivity: $$\\rho = RA/L = (4.8 \\times 10^4 \\times 1.96 \\times 10^{-3}) / 400 = 0.235\\ \\Omega \\cdot m \\approx 0.2\\ \\Omega \\cdot m$$.\n\n**Answer: $$\\rho \\approx 0.2\\ \\Omega \\cdot m$$** — This is dramatically lower than the resistivity of cold air ($$~10^{16}\\ \\Omega \\cdot m$$) because the lightning channel contains ionised plasma with huge numbers of free charge carriers.", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "Why is the calculated resistivity of air during a lightning strike (~0.2 Ω·m) so much smaller than the accepted resistivity of cold air (~10^16 Ω·m)? (2 steps)", "answer": "- Step 1: Cold air is an insulator with very few free charge carriers (extremely low $$n$$ in $$I = nAvq$$), giving it enormous resistivity.\n- Step 2: During a lightning strike, the air is ionised into a hot plasma — the extreme heat strips electrons from air molecules, creating a huge number of free charge carriers ($$n$$ increases enormously). This causes resistivity to collapse by a factor of ~$$10^{17}$$.\n\n**Key insight:** The same material (air) can have vastly different resistivity depending on its state — insulator vs. plasma.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "A potentiometer is a three-terminal variable resistor used as an adjustable voltage divider. Explain how it works. (2 steps)", "answer": "- Step 1: The potentiometer has a fixed resistance element with a sliding contact (wiper) that can be positioned anywhere along the element.\n- Step 2: The wiper divides the total resistance into two parts ($$R_1$$ and $$R_2$$). The output voltage taken between the wiper and one end is a fraction of the input voltage, given by the potential divider formula: $$V_{out} = V_{in} \\times \\frac{R_2}{R_1 + R_2}$$. Moving the wiper changes the ratio and thus $$V_{out}$$.\n\n**Practical use:** Used for volume controls, brightness controls, and any application requiring continuously adjustable voltage.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "In the formula $$P = I^2R$$, state what each variable represents and explain why this form is particularly useful for resistance heating. (1 step)", "answer": "- $$P$$ = power dissipated (W)\n- $$I$$ = current through the resistor (A)\n- $$R$$ = resistance of the component (Ω)\n\nThis form is useful for resistance heating because the heat produced (Joule heating) depends directly on the current flowing through the resistance — the square relationship means even modest current increases cause large power increases.\n\n**Key point:** $$P = I^2R$$ shows that power dissipated in a resistor is proportional to the square of the current — double the current, quadruple the heating power.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "When a battery is connected to a circuit, the terminal potential difference is always less than the e.m.f. when current flows. Explain why this happens and write the equation that describes it. (2 steps)", "answer": "- Step 1: A real battery has internal resistance $$r$$ (the chemical internal structure isn't perfect). When current flows, some electrical energy is \"lost\" as heat inside the battery due to this internal resistance.\n- Step 2: The relationship is $$V = ε - Ir$$, where $$V$$ is the terminal pd, $$ε$$ is the e.m.f., $$I$$ is the current, and $$r$$ is internal resistance. The term $$Ir$$ is the \"lost volts.\"\n\n**Key insight:** The voltage \"lost\" inside the battery ($$Ir$$) is why the terminal pd is always less than the e.m.f. when current flows. With zero current (open circuit), $$V = ε$$.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "A student states that the resistivity of a wire can be measured in Ω m⁻¹. What is wrong with this statement, and what is the correct unit? (1 step)", "answer": "- Step 1: The correct unit of resistivity is $$\\Omega \\cdot m$$ (ohm-metre), with the metre in the numerator.\n- The confusion: $$\\Omega m^{-1}$$ would be the unit of resistance per unit length ($$\\Omega/m$$), not resistivity. Resistivity has units of $$\\Omega \\times m^2 / m = \\Omega \\cdot m$$.\n\n**Memory trick:** Think of the formula $$\\rho = RA/L$$. Units: $$[\\Omega][m^2]/[m] = \\Omega \\cdot m$$.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "Explain why the current is the same at every point in a series circuit, but the voltage is the same across each branch in a parallel circuit. (2 steps)", "answer": "- Step 1 (Series): Charge carriers don't accumulate anywhere — the same number that leaves one end of the series loop must arrive at the other end. Since current is charge flow per second, it's identical at every point.\n- Step 2 (Parallel): Each branch connects directly across the same two points, so the potential difference (work per unit charge) between those points is identical for every branch — they share the same \"electrical push.\"\n\n**Physical picture:** Think of series as a single pipe with multiple constrictions (current same, pressure drops add up); parallel as multiple pipes branching from the same tank (same pressure across each branch, flows add up).", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": true}, {"question": "A circuit has a battery of e.m.f. 6.0 V, internal resistance 0.5 Ω, and an external resistor of 5.5 Ω. Calculate (a) the current, (b) the terminal pd, and (c) the power lost in the internal resistance. (3 steps)", "answer": "- Step 1 (Current): $$I = \\frac{ε}{R+r} = \\frac{6.0}{5.5 + 0.5} = \\frac{6.0}{6.0} = 1.0\\ A$$.\n- Step 2 (Terminal pd): $$V = ε - Ir = 6.0 - (1.0 \\times 0.5) = 5.5\\ V$$ (or $$V = IR = 1.0 \\times 5.5 = 5.5\\ V$$ — same answer).\n- Step 3 (Power lost internally): $$P_{lost} = I^2r = (1.0)^2 \\times 0.5 = 0.5\\ W$$.\n\n**Answer: (a) I = 1.0 A, (b) V = 5.5 V, (c) P = 0.5 W** — Notice that power dissipated in the load ($$I^2R = 5.5\\ W$$) plus power lost internally (0.5 W) equals power supplied by the battery ($$εI = 6.0\\ W$$).", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "What happens to the total resistance of a circuit if you add more resistors (a) in series, (b) in parallel? (1 step)", "answer": "- Step 1 (Series): Adding any resistor in series increases the total resistance ($$R_{total} = R_{existing} + R_{new}$$).\n- Step 2 (Parallel): Adding any resistor in parallel decreases the total resistance (more current paths become available). The total is always less than the smallest individual resistance.\n\n**Quick check:** Two 100 Ω resistors in parallel give 50 Ω; add a 1 MΩ resistor in parallel and the total drops from 50 Ω to just under 50 Ω — still decreases!", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "A wire is stretched to twice its original length while its volume remains constant. How does its resistance change? (The original resistance was R₀.) (2 steps)", "answer": "- Step 1: When length doubles ($$L' = 2L$$) and volume is constant, the cross-sectional area must halve ($$A' = A/2$$), because $$V = A \\times L$$ stays the same.\n- Step 2: New resistance: $$R' = \\rho L'/A' = \\rho (2L)/(A/2) = \\rho (2L) \\times (2/A) = 4 \\rho L/A = 4R_0$$.\n\n**Answer: Resistance increases by a factor of 4** — This illustrates why stretching a wire (making it longer and thinner) dramatically increases its resistance.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "In a material where the drift velocity of electrons is v, what happens to v if the current is doubled but all other factors (n, A, q) remain the same? (1 step)", "answer": "- Step 1: From $$I = nAvq$$, if $$I$$ doubles and $$n$$, $$A$$, $$q$$ stay the same, then $$v$$ must double.\n- Since $$v \\propto I$$ (all else constant), doubling the current doubles the drift velocity.\n\n**Answer: Drift velocity doubles** — This is directly proportional: $$v = I/(nAq)$$, so for fixed $$n$$, $$A$$, and $$q$$, $$v$$ is directly proportional to $$I$$.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "A student says that when they increase the temperature of a metal wire, its resistance decreases because the atoms vibrate more and make it easier for electrons to flow. Explain why this is wrong. (2 steps)", "answer": "- Step 1: Actually, in metals, resistance INCREASES with temperature, not decreases.\n- Step 2: In a metal, heating makes the lattice ions vibrate more strongly. This increases electron scattering, which reduces the drift velocity for the same electric field. Since $$R = V/I$$ and for a fixed voltage, lower drift velocity means lower current, which means higher resistance.\n\n**Correct statement:** In metals, resistance increases with temperature (positive temperature coefficient). The student's confusion likely stems from mixing up metals with semiconductors (NTC thermistors).", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "A 12 V battery powers a 60 W lamp. What is the resistance of the lamp when it's operating at its rated voltage? (2 steps)", "answer": "- Step 1: At rated voltage, power $$P = 60\\ W$$ and voltage $$V = 12\\ V$$. Use $$P = V^2/R$$.\n- Step 2: Rearranging: $$R = V^2/P = (12)^2 / 60 = 144/60 = 2.4\\ \\Omega$$.\n\n**Answer: R = 2.4 Ω** — You could also find current first: $$I = P/V = 60/12 = 5\\ A$$, then $$R = V/I = 12/5 = 2.4\\ \\Omega$$.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "Two identical bulbs are connected in series to a battery. If one bulb blows (becomes an open circuit), what happens to the other bulb? What if they were in parallel? (2 steps)", "answer": "- Step 1 (Series): The circuit is broken — no current flows at all. The other bulb goes out completely.\n- Step 2 (Parallel): Each bulb has its own independent path to the battery. If one blows, the other remains connected and continues to operate normally.\n\n**Answer: Series — both go out; Parallel — the working bulb stays on** — This is why household wiring is in parallel: each appliance operates independently.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}], "count": 40}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What does it mean physically when we say current is $$1$$ ampere, and how does this connect charge to time? (3 steps)", "answer": "- Step 1: Current is defined as the rate of flow of charge: $$I = \\Delta Q / \\Delta t$$. So the ampere is fundamentally a \"coulombs per second\" — it tells you how many coulombs of charge cross a given cross-section every second.\n- Step 2: One ampere therefore means one coulomb of charge passes a point each second. Since a coulomb is about $$6.24 \\times 10^{18}$$ elementary charges, $$1$$ A corresponds to roughly that many electrons drifting past every second.\n- Step 3: The rearranged form $$\\Delta Q = I \\Delta t$$ is what you use when a question gives you a current and a duration and asks for total charge — e.g. the lightning question where a huge current for a tiny time still delivers under a coulomb of charge.\n\nThe ampere is a *flow rate*; charge is the *amount* that has flowed.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": false}, {"question": "Why is the ohm naturally expressed as $$\\text{V A}^{-1}$$, and what does a resistance of \"$$1\\ \\Omega$$\" mean physically?", "answer": "Resistance is defined by $$R = V/I$$, so its unit is volts per
