<script>
const cards = [{"q": "Current is defined as the rate of flow of charge. Write the formula linking current, charge, and time, and explain what each symbol represents and its SI unit. (2 steps)", "a": "- Step 1: The formula is $$I = \\frac{\\Delta Q}{\\Delta t}$$, which can also be rearranged to $$\\Delta Q = I \\Delta t$$ for finding charge transferred. Here $$I$$ is current in amperes (A), $$\\Delta Q$$ is charge in coulombs (C), and $$\\Delta t$$ is time in seconds (s).\n- Step 2: One ampere means one coulomb of charge passes a point in the circuit per second \u2014 $$1\\,\\text{A} = 1\\,\\text{C s}^{-1}$$. This rearranged form $$\\Delta Q = I \\Delta t$$ is exactly what you use when a question gives you a current and a duration and asks for total charge (e.g., the lightning question: $$Q = It$$).\n\nThe ampere is the *flow rate* of charge; the coulomb is the *quantity* of charge. Think of it like water: current is litres per second, charge is total litres.", "source": "GLM 5.1"}, {"q": "Resistance is defined by a single relationship between potential difference and current. What is that formula, and what does the unit \"one ohm\" mean physically? (2 steps)", "a": "- Step 1: The defining equation is $$R = \\frac{V}{I}$$, where $$R$$ is resistance (\u03a9), $$V$$ is potential difference (V), and $$I$$ is current (A). This is the *definition* of the ohm, not a statement that resistance is *caused* by voltage or current \u2014 resistance is a property of the component.\n- Step 2: One ohm ($$1\\,\\Omega$$) means that when a potential difference of $$1\\,\\text{V}$$ is applied across a component, a current of $$1\\,\\text{A}$$ flows through it: $$1\\,\\Omega = 1\\,\\text{V A}^{-1}$$. A higher resistance means more voltage is needed to push the same current through.\n\n$$R = V/I$$ is a *definition*, not a causal law. The resistance exists because of the material's structure; the formula just tells you how to *measure* it.", "source": "GLM 5.1"}, {"q": "Potential difference (p.d.) is defined in terms of energy and charge. State the formula and explain why the unit \"volt\" is equivalent to \"joules per coulomb.\" (2 steps)", "a": "- Step 1: The formula is $$V = \\frac{W}{Q}$$, where $$V$$ is potential difference (V), $$W$$ is energy transferred / work done (J), and $$Q$$ is charge (C). This says: p.d. is the energy transferred per unit charge that passes between two points.\n- Step 2: Since $$V = W/Q$$, the unit is $$\\frac{\\text{J}}{\\text{C}}$$, which is defined as the volt: $$1\\,\\text{V} = 1\\,\\text{J C}^{-1}$$. One volt means each coulomb of charge that moves through that p.d. gains or loses one joule of energy.\n\nBoth p.d. and e.m.f. share the same unit (V = J/C), but they describe *different energy directions*: p.d. is energy *dissipated* by the charge, e.m.f. is energy *supplied* to the charge.", "source": "GLM 5.1"}, {"q": "There are three equivalent formulas for electrical power dissipated in a resistor. List them and explain which one you should choose based on what quantities you already know. (3 steps)", "a": "- Step 1: The three forms are: $$P = VI$$, $$P = I^2 R$$, and $$P = \\frac{V^2}{R}$$, where $$P$$ is power in watts (W), $$V$$ is p.d. across the resistor, $$I$$ is current through it, and $$R$$ is its resistance.\n- Step 2: All three are mathematically equivalent \u2014 just substitute $$V = IR$$ or $$I = V/R$$ into $$P = VI$$ to derive the others. But you choose based on convenience:\n+ If you *know* $$V$$ and $$I$$ \u2192 use $$P = VI$$ (most direct)\n+ If you *know* $$I$$ and $$R$$ but not $$V$$ \u2192 use $$P = I^2 R$$\n+ If you *know* $$V$$ and $$R$$ but not $$I$$ \u2192 use $$P = V^2/R$$\n- Step 3: $$P = I^2 R$$ is specifically labelled \"resistance heating\" because it shows that a resistor dissipates energy as heat at a rate proportional to $$I^2$$ \u2014 doubling the current quadruples the heat produced. This is why overhead power lines carry high voltage and low current: less $$I^2 R$$ loss in the lines.\n\nThe key exam reflex: look at which two quantities the question gives you, then pick the power formula that uses exactly those two.", "source": "GLM 5.1"}, {"q": "Why does $$P = I^2 R$$ specifically represent \"resistance heating,\" and what happens to the power dissipated if you double the current through the same resistor? (2 steps)", "a": "- Step 1: $$P = I^2 R$$ comes from substituting $$V = IR$$ into $$P = VI$$: $$P = (IR)(I) = I^2 R$$. This form isolates the *current's effect* on heating \u2014 the power depends on the *square* of the current, meaning it grows dramatically as current increases.\n- Step 2: If you double the current ($$I \\to 2I$$), the power becomes $$P' = (2I)^2 R = 4I^2 R = 4P$$ \u2014 four times the original power. This quadratic relationship is why even modest increases in current can cause components to overheat and burn out.\n\nThe squared dependence on $$I$$ is the physical reason fuses work: a small overload barely increases heating, but a large short-circuit current causes a massive, rapid temperature rise that melts the fuse wire.", "source": "GLM 5.1"}, {"q": "When resistors are connected in series, what is the rule for total resistance, and why does adding another series resistor *always* increase the total? (2 steps)", "a": "- Step 1: The series rule is $$R_{\\text{total}} = R_1 + R_2 + R_3 + \\cdots$$ \u2014 you simply add them up. In series, the same current flows through every resistor, and the potential differences add: $$V_{\\text{total}} = V_1 + V_2 + V_3$$.\n- Step 2: Adding a resistor in series always increases $$R_{\\text{total}}$$ because you are adding a positive quantity to the sum. Physically, you are forcing the same current to push through *more* obstacles (more length of resistive material), so the total opposition to current flow increases.\n\nThink of series resistors as adding more toll booths on the same road \u2014 every car must pass through all of them, so total delay always increases.", "source": "GLM 5.1"}, {"q": "When resistors are connected in parallel, what is the rule for total resistance, and why is the result *always* smaller than the smallest individual resistor? (3 steps)", "a": "- Step 1: The parallel rule is $$\\frac{1}{R_{\\text{total}}} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\frac{1}{R_3} + \\cdots$$ \u2014 you add the *reciprocals*, then take the reciprocal of the result to find $$R_{\\text{total}}$$.\n- Step 2: In parallel, each resistor has the *same* p.d. across it, but the currents split and add: $$I_{\\text{total}} = I_1 + I_2 + I_3$$. Adding a parallel branch provides an *additional path* for current, so more total current flows for the same voltage \u2014 which means *less* total resistance.\n- Step 3: The combined resistance is always smaller than the smallest individual resistor because adding even a very large resistor in parallel still adds a positive term to $$\\frac{1}{R_{\\text{total}}}$$, making $$\\frac{1}{R_{\\text{total}}}$$ larger, which makes $$R_{\\text{total}}$$ smaller. For two equal resistors $$R$$ in parallel: $$R_{\\text{total}} = R/2$$ \u2014 exactly half.\n\nThink of parallel resistors as adding more lanes to a road \u2014 more lanes means less congestion (less resistance), even if the new lane is narrow (high resistance). Any extra lane helps.", "source": "GLM 5.1"}, {"q": "What is the \"reciprocal trap\" when calculating parallel resistance, and what numerical mistake does it cause? Give a concrete example with two 5 \u03a9 resistors. (2 steps)", "a": "- Step 1: The trap is that the formula $$\\frac{1}{R_{\\text{total}}} = \\frac{1}{R_1} + \\frac{1}{R_2}$$ gives you the *reciprocal* of the total resistance, not $$R_{\\text{total}}$$ itself. Many students stop after computing the sum of reciprocals and write that as their answer \u2014 which is wrong.\n- Step 2: For two 5 \u03a9 resistors in parallel:\n$$\\frac{1}{R_{\\text{total}}} = \\frac{1}{5} + \\frac{1}{5} = \\frac{2}{5} = 0.4$$\nIf you stop here and write $$R_{\\text{total}} = 0.4\\,\\Omega$$, that's the trap. You must take *one more reciprocal*: $$R_{\\text{total}} = \\frac{1}{0.4} = \\frac{5}{2} = 2.5\\,\\Omega$$.\n\nThe discipline: after using the parallel formula, always explicitly write the final flip $$R_{\\text{total}} = \\frac{1}{(\\text{your sum})}$$. The value $$0.4$$ is $$\\frac{1}{R_{\\text{total}}}$$, not $$R_{\\text{total}}$$.", "source": "GLM 5.1"}, {"q": "Resistance and resistivity are related but fundamentally different quantities. Explain the conceptual difference: which one depends on the *shape* of the sample, and which one is a *material property*? (2 steps)", "a": "- Step 1: Resistance $$R$$ depends on *both* the material and the geometry (shape) of the sample. A long thin wire has more resistance than a short fat wire of the same material. Resistivity $$\\rho$$ is a property of the *material alone* \u2014 copper always has the same resistivity regardless of whether the wire is long or short, thick or thin.\n- Step 2: The linking formula is $$R = \\frac{\\rho L}{A}$$ (or equivalently $$\\rho = \\frac{RA}{L}$$). Resistance increases with length $$L$$ (more material to push through) and decreases with cross-sectional area $$A$$ (wider path, more parallel channels for current). Resistivity factors out the geometry so you can compare materials directly.\n\nThink of it like a road: resistance is how hard it is to drive the *specific* route (depends on distance and lane width); resistivity is how bad the road surface is (pothole density) \u2014 a property of the surface material alone, independent of route length or width.", "source": "GLM 5.1"}, {"q": "The unit of resistivity is ohm-metre (\u03a9 m). Explain why the metre is in the *numerator* of the unit, not the denominator, by deriving the unit from the formula $$\\rho = \\frac{RA}{L}$$. (2 steps)", "a": "- Step 1: Starting from $$\\rho = \\frac{RA}{L}$$, substitute the units: $$R$$ is in \u03a9, $$A$$ is in $$\\text{m}^2$$, and $$L$$ is in m. So the unit of $$\\rho$$ is:\n$$\\frac{[\\Omega][\\text{m}^2]}{[\\text{m}]} = \\Omega \\cdot \\text{m}$$\n- Step 2: The metre ends up on *top* because area ($$\\text{m}^2$$) is divided by length (m), giving just m. A common trap is writing $$\\Omega\\,\\text{m}^{-1}$$ \u2014 this is wrong and a classic dropped-mark. The metre is in the numerator: \u03a9 m.\n\nThe intuition: higher resistivity means you need *more* metres of wire to get the same resistance at a given area, or equivalently, each metre of wire contributes more \u03a9. So \u03a9 and m multiply, not divide.", "source": "GLM 5.1"}, {"q": "In Core Practical 7 (determining the resistivity of a wire), you plot resistance $$R$$ against length $$L$$ and use the gradient. Explain why the gradient gives you $$\\rho/A$$, and how you then extract $$\\rho$$. Also, why must you measure the diameter in *two perpendicular directions*? (3 steps)", "a": "- Step 1: From $$R = \\frac{\\rho L}{A}$$, if you vary $$L$$ and measure $$R$$, this is a straight-line equation of the form $$R = \\left(\\frac{\\rho}{A}\\right)L + 0$$ \u2014 comparing to $$y = mx + c$$, the gradient $$m = \\frac{\\rho}{A}$$ and the intercept is zero (a wire of zero length has zero resistance).\n- Step 2: To extract $$\\rho$$, multiply the gradient by the cross-sectional area: $$\\rho = \\text{gradient} \\times A$$. You find $$A$$ by measuring the diameter $$d$$ with a micrometer at several points, averaging, then computing $$A = \\frac{1}{4}\\pi d^2$$.\n- Step 3: Measuring the diameter in two perpendicular directions checks whether the cross-section is truly circular. If the wire is slightly elliptical, the two diameters will differ, and you should average them to get a representative $$d$$ for the area calculation. Also, always check the micrometer for *zero error* before measuring.\n\nPlotting $$R$$ vs $$L$$ is better than computing $$\\rho$$ for each individual measurement because the graph averages out random errors and makes the zero-intercept a visual check on your data.", "source": "GLM 5.1"}, {"q": "The transport equation $$I = nAvq$$ links macroscopic current to microscopic quantities. Explain what each symbol represents, its unit, and why the equation makes physical sense as a \"charge flow rate.\" (3 steps)", "a": "- Step 1: Each symbol:\n+ $$n$$ = number density of charge carriers (number per unit volume, $$\\text{m}^{-3}$$) \u2014 how many mobile charges exist in each cubic metre of the material\n+ $$A$$ = cross-sectional area of the conductor ($$\\text{m}^2$$) \u2014 the \"doorway\" the charges flow through\n+ $$v$$ = drift velocity ($$\\text{m s}^{-1}$$) \u2014 the average speed at which charges move along the conductor\n+ $$q$$ = charge per carrier (C) \u2014 for electrons, $$q = e = 1.60 \\times 10^{-19}\\,\\text{C}$$\n- Step 2: The physical picture: in time $$\\Delta t$$, each charge carrier drifts a distance $$v\\Delta t$$. The volume of conductor swept out is $$A \\times v\\Delta t$$. The number of carriers in that volume is $$n \\times A \\times v\\Delta t$$, and the total charge they carry is $$nAv\\Delta t \\times q$$. Dividing by $$\\Delta t$$ gives the rate of charge flow: $$I = nAvq$$.\n- Step 3: This equation explains why drift velocity is so small. For copper, $$n \\approx 8.4 \\times 10^{28}\\,\\text{m}^{-3}$$ \u2014 an enormous number of free electrons per cubic metre. With so many carriers available, even a tiny drift velocity ($$\\sim 10^{-4}\\,\\text{m/s}$$) produces a measurable current. The charges don't need to move fast; there are just *so many* of them.\n\nThink of a crowded corridor: even if everyone walks slowly, a huge number of people per metre means a large flow rate past any point. Current is about *crowd density \u00d7 doorway width \u00d7 walking speed \u00d7 charge per person*.", "source": "GLM 5.1"}, {"q": "Rearrange $$I = nAvq$$ to make drift velocity $$v$$ the subject. If you double the cross-sectional area of a wire while keeping the current and all other quantities the same, what happens to the drift velocity, and why? (2 steps)", "a": "- Step 1: Rearranging: $$v = \\frac{I}{nAq}$$ \u2014 drift velocity equals current divided by (number density \u00d7 area \u00d7 charge per carrier). This is exactly the rearrangement used in Q5 to identify the correct MCQ expression.\n- Step 2: If $$A$$ doubles (wider wire) and everything else stays the same, then $$v = \\frac{I}{n(2A)q} = \\frac{v_{\\text{original}}}{2}$$ \u2014 drift velocity *halves*. Physically, a wider wire provides more parallel \"lanes\" for electrons, so each electron can move more slowly while the same total current is maintained. More carriers pass through per second because the doorway is wider, not because they move faster.\n\nThis is why thick wires carry current more easily: not because electrons move faster, but because there are more lanes (larger $$A$$) so each electron can drift more slowly, meaning less resistance.", "source": "GLM 5.1"}, {"q": "An NTC thermistor's resistance *decreases* as temperature increases \u2014 the opposite of a normal metal resistor. Using the microscopic picture $$I = nAvq$$, explain why this happens for a semiconductor/thermistor. (3 steps)", "a": "- Step 1: In a *metal*, $$n$$ (number density of free electrons) is essentially fixed \u2014 there are always the same number of conduction electrons regardless of temperature. When temperature rises, lattice ions vibrate more, obstructing the electrons, so drift velocity $$v$$ *falls*. With $$n$$ constant and $$v$$ falling, current decreases \u2192 resistance *increases*. This is positive temperature coefficient behaviour.\n- Step 2: In a *semiconductor/NTC thermistor*, heating does something different: it *liberates more charge carriers* from the atomic lattice. Electrons that were previously bound (not free to move) gain enough thermal energy to break free and become conduction electrons. So $$n$$ *increases dramatically* with temperature.\n- Step 3: Now look at $$I = nAvq$$: $$n$$ rises a lot, while $$v$$ falls only a little (lattice vibrations increase, but the effect is minor compared to the flood of new carriers). The large increase in $$n$$ *dominates* over the small decrease in $$v$$, so $$I$$ increases overall \u2192 resistance *decreases*. This is \"negative temperature coefficient\" (NTC) behaviour.\n\nThe key insight: metals and semiconductors respond to heating in *opposite ways* because the mechanism is different. Metals: same carriers, more obstruction. Semiconductors: far more carriers, slight obstruction. The thermistor wins because quantity ($$n$$) beats quality ($$v$$).", "source": "GLM 5.1"}, {"q": "Define e.m.f. (electromotive force) precisely. Why must you say \"per unit charge\" or \"per coulomb,\" and why is \"per charge particle\" wrong? (2 steps)", "a": "- Step 1: The e.m.f. of a source is the *energy converted from other forms into electrical energy per unit charge passing through the source*. The unit is joules per coulomb = volts ($$1\\,\\text{V} = 1\\,\\text{J C}^{-1}$$). This is the spec wording you must learn.\n- Step 2: \"Per charge particle\" is wrong because one charge particle (one electron) carries only $$1.60 \\times 10^{-19}\\,\\text{C}$$ \u2014 a tiny fraction of a coulomb. One coulomb equals the charge of about $$6.24 \\times 10^{18}$$ electrons. If you said \"per particle,\" you'd be describing the energy per *single electron*, which is a quantity about $$10^{19}$$ times smaller than what e.m.f. actually means. The definition must use the *standard unit of charge* (the coulomb), not a subatomic particle.\n\nE.m.f. and p.d. both have units of volts (J/C), but they describe opposite energy directions: e.m.f. = energy *gained* per coulomb (inside the source), p.d. = energy *lost* per coulomb (across a component).", "source": "GLM 5.1"}, {"q": "A real cell is modelled as an ideal e.m.f. $$\\varepsilon$$ in series with a small internal resistance $$r$. Write the three equivalent forms of the e.m.f. equation and explain what each term in $$\\varepsilon = V + Ir$$ means physically. (3 steps)", "a": "- Step 1: The three forms are:\n+ $$\\varepsilon = V + Ir$$ \u2014 e.m.f. equals terminal p.d. plus \"lost volts\" across internal resistance\n+ $$\\varepsilon = I(R + r)$$ \u2014 e.m.f. equals current times total circuit resistance (external + internal)\n+ $$V = \\varepsilon - Ir$$ \u2014 terminal p.d. equals e.m.f. minus the voltage dropped inside the cell\n- Step 2: In $$\\varepsilon = V + Ir$$:\n+ $$\\varepsilon$$ = total energy per coulomb the cell *provides* (the \"budget\")\n+ $$V$$ = energy per coulomb that actually *reaches the external circuit* (what the voltmeter reads across the terminals)\n+ $$Ir$$ = energy per coulomb *wasted inside the cell* as heat due to internal resistance (the \"tax\")\n- Step 3: The \"lost volts\" $$Ir$$ are why the terminal p.d. is always *less* than the e.m.f. when current flows. Some of the cell's energy budget is spent pushing current through its own internal resistance before it ever reaches the external circuit. Only when no current flows ($$I = 0$$) does $$V = \\varepsilon$$ \u2014 the voltmeter reads the full e.m.f.\n\nThink of e.m.f. as your salary, $$V$$ as what you actually take home, and $$Ir$$ as the tax. Internal resistance is the tax rate \u2014 higher $$r$$ means more tax deducted.", "source": "GLM 5.1"}, {"q": "When current flows through a cell with internal resistance, the terminal p.d. is less than the e.m.f. \u2014 these missing volts are called \"lost volts.\" What happens to the terminal p.d. if you increase the external load resistance $$R$$, and why? (2 steps)", "a": "- Step 1: From $$V = \\varepsilon - Ir$$ and $$I = \\frac{\\varepsilon}{R + r}$$, increasing $$R$$ decreases the current $$I$$ (because the total circuit resistance increases). With less current flowing, the lost volts $$Ir$$ become *smaller*.\n- Step 2: Therefore $$V = \\varepsilon - Ir$$ *increases* \u2014 the terminal p.d. rises toward the e.m.f. as the load resistance increases. In the limiting case where $$R \\to \\infty$$ (open circuit, no current), $$I \\to 0$$, so $$Ir \\to 0$$ and $$V \\to \\varepsilon$$: the voltmeter reads the full e.m.f. Conversely, with a very small $$R$$ (near short circuit), huge current flows, $$Ir$$ is large, and $$V$$ drops dramatically.\n\nHigh load resistance \u2192 low current \u2192 small lost volts \u2192 terminal p.d. nearly equals e.m.f. Low load resistance \u2192 high current \u2192 large lost volts \u2192 terminal p.d. much less than e.m.f.", "source": "GLM 5.1"}, {"q": "To determine internal resistance graphically, you plot terminal p.d. $$V$$ against current $$I$$ and fit a straight line. Starting from $$V = \\varepsilon - Ir$$, show how this becomes the equation of a straight line, and identify what the y-intercept and gradient give you. (3 steps)", "a": "- Step 1: Rearrange $$V = \\varepsilon - Ir$$ into the form $$y = c + mx$$ by matching: $$y$$-axis variable is $$V$$, $$x$$-axis variable is $$I$$. So: $$V = \\varepsilon + (-r)I$$, which is $$y = c + mx$$ with $$c = \\varepsilon$$ and $$m = -r$$.\n- Step 2: Therefore:\n+ y-intercept ($$I = 0$$) = $$\\varepsilon$$ \u2014 the e.m.f. of the cell (the voltage when no current flows)\n+ gradient = $$-r$$ \u2014 so internal resistance $$r = -\\text{gradient}$$ (or equivalently $$r = -\\frac{\\Delta V}{\\Delta I}$$)\n- Step 3: The line slopes *downward* (negative gradient) because as current increases, more voltage is lost inside the cell, so terminal p.d. decreases. Since the gradient is negative, $$r = -(\\text{negative number})$$ comes out positive \u2014 as it should, since resistance is always positive. Keep the minus sign explicit in your working: examiners want to see you state \"gradient = $$-r$$\" and \"intercept = $$\\varepsilon$$.\"\n\nThe graph is a visual budget: the intercept is the full salary ($$\\varepsilon$$), and the downward slope shows how much is taxed away per amp of current drawn ($$r$$).", "source": "GLM 5.1"}, {"q": "On a $$V$$\u2013$$I$$ graph for a cell with internal resistance, the gradient is negative. Explain why $$r = -\\text{gradient}$$ rather than just $$r = \\text{gradient}$$, and what mistake you'd make if you ignored the minus sign. (2 steps)", "a": "- Step 1: The line equation is $$V = \\varepsilon - rI$$, so the gradient $$\\frac{\\Delta V}{\\Delta I} = -r$$ (the slope is $$-r$$, not $$r$$). As $$I$$ increases, $$V$$ decreases, so $$\\Delta V$$ is negative and $$\\Delta I$$ is positive \u2014 the raw gradient $$\\frac{\\Delta V}{\\Delta I}$$ is a negative number.\n- Step 2: If you ignored the minus sign and wrote $$r = \\text{gradient}$$, you'd get a *negative* resistance, which is physically impossible. The correct extraction is $$r = -\\text{gradient} = -\\frac{\\Delta V}{\\Delta I}$$, which flips the negative gradient to a positive resistance value. Always write: \"gradient = $$-r$$, therefore $$r = -\\text{gradient}$$.\"\n\nThe minus sign is not optional decoration \u2014 it's the physics. The line goes downhill because the cell *loses* voltage as it supplies more current. That downhill slope, negated, gives you the internal resistance.", "source": "GLM 5.1"}, {"q": "A potential divider consists of two resistors $$R_1$$ and $$R_2$$ in series across an input voltage $$V_{\\text{in}}$$. Derive the formula for the output voltage $$V_{\\text{out}}$$ taken across $$R_2$$, starting from the series rules. (3 steps)", "a": "- Step 1: In series, the same current $$I$$ flows through both resistors, and the voltages add: $$V_{\\text{in}} = V_1 + V_2$$, where $$V_1 = IR_1$$ and $$V_2 = IR_2$$. The output voltage is $$V_{\\text{out}} = V_2 = IR_2$$.\n- Step 2: Find the current: $$I = \\frac{V_{\\text{in}}}{R_1 + R_2}$$ (total series resistance). Substitute into $$V_{\\text{out}}$$:\n$$V_{\\text{out}} = \\frac{V_{\\text{in}}}{R_1 + R_2} \\times R_2 = V_{\\text{in}} \\times \\frac{R_2}{R_1 + R_2}$$\n- Step 3: The output voltage is a *fraction* of the input: $$\\frac{R_2}{R_1 + R_2}$$ is always between 0 and 1. If $$R_2$$ is much larger than $$R_1$$, the fraction approaches 1 (most voltage across $$R_2$$). If $$R_2$$ is much smaller, the fraction approaches 0. The divider \"shares\" voltage in proportion to resistance.\n\nThe potential divider is a voltage *selector* \u2014 you choose the ratio by choosing the resistance ratio. It's the basis of all sensor circuits: replace $$R_2$$ with a thermistor or LDR, and $$V_{\\text{out}}$$ changes automatically as conditions change.", "source": "GLM 5.1"}, {"q": "An LDR (light-dependent resistor) and an NTC thermistor are both variable resistors used in sensor circuits. Describe how each one's resistance changes with its environmental stimulus, and explain the physical mechanism in each case. (3 steps)", "a": "- Step 1: LDR: resistance *decreases* as light intensity increases (brighter \u2192 lower resistance). Physical mechanism: more light photons hit the semiconductor material, liberating more charge carriers (increasing $$n$$ in $$I = nAvq$$), so more current can flow at the same voltage \u2192 resistance drops. In darkness, fewer carriers are available \u2192 resistance is high.\n- Step 2: NTC thermistor: resistance *decreases* as temperature increases (\"negative temperature coefficient\"). Physical mechanism: higher temperature provides thermal energy that frees more charge carriers from the semiconductor lattice (increasing $$n$$), and this large increase in carrier density overwhelms the slight decrease in drift velocity caused by more lattice vibrations \u2192 net effect: more current, less resistance.\n- Step 3: Both sensors work by the *same fundamental mechanism* \u2014 changing the number density $$n$$ of free charge carriers in a semiconductor. The difference is what triggers the change: photons (light) for the LDR, thermal energy (heat) for the thermistor. This is why both are made from semiconductor materials, not metals \u2014 metals have a fixed $$n$$ and would show *positive* coefficient behaviour (resistance increasing with stimulus).\n\nAlex's correction: a thermistor (NTC) behaves opposite to a normal resistor \u2014 its resistance *falls* when it gets hotter. Don't confuse it with a metal wire, which has *positive* temperature coefficient.", "source": "GLM 5.1"}, {"q": "A potentiometer is described as a \"three-terminal variable resistor\" that acts as a continuously adjustable potential divider. Explain how it works physically \u2014 what does the slider do? (2 steps)", "a": "- Step 1: A potentiometer has a resistive track (a strip of resistive material) with terminals at both ends, plus a *slider* (wiper) that can move along the track \u2014 this is the third terminal. The slider divides the track into two sections: one above the slider (resistance $$R_1$$) and one below (resistance $$R_2$$). As you move the slider, you change the ratio $$R_1 : R_2$$.\n- Step 2: With the input voltage across the two end terminals, the output voltage is taken between the slider and one end. This is exactly the potential divider circuit: $$V_{\\text{out}} = V_{\\text{in}} \\times \\frac{R_2}{R_1 + R_2}$$, where $$R_1 + R_2$$ is the total track resistance (constant). Moving the slider changes the fraction continuously from 0 (slider at the bottom end) to $$V_{\\text{in}}$$ (slider at the top end).\n\nA potentiometer is a \"dial\" \u2014 you physically adjust the voltage fraction by sliding. It's the manual version of what a thermistor or LDR does automatically.", "source": "GLM 5.1"}, {"q": "On an $$I$$\u2013$$V$$ characteristic graph for an ideal diode, there are regions where the current is exactly zero despite a non-zero voltage. What does \"infinite resistance\" mean in terms of the $$R = V/I$$ formula, and which axis on the graph do you look at to find it? (2 steps)", "a": "- Step 1: From $$R = \\frac{V}{I}$$, resistance becomes infinite when the denominator $$I$$ approaches zero. Mathematically, $$\\frac{V}{0} \\to \\infty$$ for any non-zero $$V$$. \"Infinite resistance\" means *no current flows at all*, regardless of the voltage applied \u2014 the component completely blocks current.\n- Step 2: On an $$I$$\u2013$$V$$ graph, you look for points where the curve sits on the *horizontal axis* (the $$I = 0$$ line). For an ideal diode, this is the entire reverse-bias region and the small-forward-bias region before threshold \u2014 points X and Y in Q4. Point Z, where the diode conducts and $$I \\neq 0$$, has small (not infinite) resistance.\n\nThe common misconception is to look for $$V = 0$$ (the origin) as the \"infinite resistance\" point. But $$R = V/I$$ blows up when $$I = 0$$, not when $$V = 0$$. The discriminator is always the *current axis*, not the voltage axis.", "source": "GLM 5.1"}, {"q": "In a series circuit with a thermistor and a fixed resistor, the voltmeter's reading can either increase or decrease when the thermistor heats up \u2014 depending on *which component the voltmeter spans*. Explain why the current always increases, but the voltmeter's behaviour flips. (3 steps)", "a": "- Step 1: When the NTC thermistor heats up, its resistance $$R_T$$ decreases. Total circuit resistance $$R_{\\text{total}} = R_T + R_F$$ decreases, so current $$I = \\frac{\\varepsilon}{R_{\\text{total}}}$$ *always increases* \u2014 this is true regardless of where the voltmeter is placed. The ammeter always reads higher.\n- Step 2: If the voltmeter is across the *thermistor*: $$V_T = I \\times R_T$$. Here $$I$$ increases but $$R_T$$ decreases. The product $$IR_T$$ actually *decreases* because $$R_T$$ falls faster than $$I$$ rises (the thermistor's share of the total voltage shrinks as its resistance shrinks). So $$V_T$$ goes *down*.\n- Step 3: If the voltmeter is across the *fixed resistor*: $$V_F = I \\times R_F$$. Here $$I$$ increases and $$R_F$$ is *constant*. The product $$IR_F$$ definitely *increases* \u2014 the fixed resistor grabs a larger share of the e.m.f. as the thermistor releases its share. So $$V_F$$ goes *up*.\n\nThe voltage redistribution rule: when one resistor in a series pair decreases, it *releases* voltage share, and the other resistor *claims* that released share. The voltmeter tells you which side of this transfer it's watching. Always check: which component does the voltmeter span?", "source": "GLM 5.1"}, {"q": "Alex's method for circuit \"increase/decrease\" questions is: \"draw it and put numbers on it.\" Why is this better than reasoning purely with words like \"the current goes up so the voltage probably goes up\"? (2 steps)", "a": "- Step 1: Pure verbal reasoning about \"increase/decrease\" is unreliable because some quantities *compete* (e.g., $$V_T = IR_T$$ where $$I$$ rises but $$R_T$$ falls). Without concrete numbers, you can't tell which effect dominates. Assigning specific values (e.g., $$\\varepsilon = 12\\,\\text{V}$$, $$R_T = 4\\,\\Omega \\to 2\\,\\Omega$$, $$R_F = 2\\,\\Omega$$) lets you *calculate* the before and after values and see which effect wins.\n- Step 2: The numbered-circuit method also enforces the correct *chain* of reasoning: (1) component resistance changes \u2192 (2) total resistance changes \u2192 (3) current changes via $$I = \\varepsilon/R_{\\text{total}}$$ \u2192 (4) specific voltage changes via $$V = IR$$ for the component the voltmeter spans. You never jump straight to the meter reading \u2014 you follow the causal chain step by step with numbers at each stage.\n\nWords can mislead; numbers cannot. When $$I$$ rises and $$R$$ falls simultaneously, you *must* compute to know the product's direction. The \"put numbers on it\" method is the safety net against intuition failures.", "source": "GLM 5.1"}, {"q": "A student claims that when internal resistance increases from 0.10 \u03a9 to 0.5 \u03a9, the power dissipated in the external resistor \"falls to 70%\" of its original value. Explain the difference between \"falls *to* 70%\" and \"falls *by* 70%\", and why you must quote the actual calculated percentage to judge the claim. (3 steps)", "a": "- Step 1: \"Falls *to* 70%\" means the new value is 70% of the old value: $$\\frac{P_2}{P_1} = 0.70$$, so $$P_2 = 0.70 P_1$$ \u2014 a 30% reduction. \"Falls *by* 70%\" means the new value has been *reduced by* 70% from the old: $$P_2 = P_1 - 0.70 P_1 = 0.30 P_1$$, so $$\\frac{P_2}{P_1} = 0.30$$ \u2014 only 30% remains. These are drastically different claims.\n- Step 2: To judge either claim, you must *compute the actual ratio*. For this problem, the load power ratio comes out to approximately 0.86 (86%). This means the power falls *to* 86% (or falls *by* 14%) \u2014 neither interpretation matches 70%.\n- Step 3: Writing just \"the claim is incorrect\" scores zero marks. You must *quote the comparison number* (86%) and show it doesn't match the claimed 70%. The evidence is the calculation; the conclusion alone is insufficient.\n\nExact wording is an exam technique point: read the claim's phrasing literally, compute the actual figure, and compare. \"Incorrect\" without a number is an unsupported assertion.", "source": "GLM 5.1"}, {"q": "In the lightning-strike question, the calculated resistivity of the air channel is about 0.2 \u03a9 m, but the accepted resistivity of (cold) air is about $$10^{16}$$ \u03a9 m \u2014 a factor of roughly $$10^{17}$$ smaller. Explain the physical reason for this enormous difference. (2 steps)", "a": "- Step 1: During a lightning strike, the intense electric field ionises the air along the channel \u2014 it strips electrons from gas molecules, creating a hot *plasma* of free ions and electrons. This plasma has vastly more free charge carriers (huge $$n$$) than cold, neutral air, which has essentially no mobile charge carriers.\n- Step 2: From $$I = nAvq$$, a massive increase in $$n$$ means current can flow easily for a given drift velocity \u2014 the material becomes highly conductive, so its resistivity *collapses* from $$\\sim 10^{16}\\,\\Omega\\,\\text{m}$$ (insulator) to $$\\sim 0.2\\,\\Omega\\,\\text{m}$$ (conductor). Cold air is an insulator because its $$n$$ is near zero; lightning-channel air is a conductor because ionisation floods it with carriers. The same substance can have completely different electrical properties depending on its state.\n\nThis is the same mechanism as the NTC thermistor, but on an extreme scale: more charge carriers \u2192 lower resistivity. The lightning channel is air that has been *forced* into a conducting state by the enormous voltage.", "source": "GLM 5.1"}, {"q": "In the lightning question, the length used in the resistivity calculation is the cloud-to-ground distance (400 m). Why is this the correct length to use, and what physical quantity does this length represent in the formula $$R = \\frac{\\rho L}{A}$$? (2 steps)", "a": "- Step 1: In $$R = \\frac{\\rho L}{A}$$, $$L$$ is the *length of the conducting path* \u2014 the distance the current must travel through the resistive material. For a lightning strike, the current flows through the ionised air channel from the cloud to the ground, so $$L$$ is the channel length, which is the cloud-to-ground distance of 400 m.\n- Step 2: The common hesitation (which you had in the lesson) is thinking \"this isn't a cable, so what length do I use?\" But the formula doesn't care whether the conductor is a wire or a plasma channel \u2014 it applies to *any* conductor. The lightning channel is effectively a temporary \"wire\" of ionised air stretching 400 m, and its resistance depends on that length just like a copper wire's resistance depends on its length. $$L$$ is always the end-to-end distance the current traverses.\n\nThe formula $$R = \\rho L / A$$ is universal \u2014 it works for wires, rods, plasma channels, any elongated conductor. The \"length\" is always the path length, regardless of what material or geometry that path has.", "source": "GLM 5.1"}, {"q": "You have the data-booklet formula $$R = \\frac{\\rho L}{A}$$ and need to rearrange it to make $$\\rho$$ the subject. Show the rearrangement, and explain why it's safer to start from the booklet form and rearrange than to try recalling $$\\rho = \\frac{RA}{L}$$ from memory. (2 steps)", "a": "- Step 1: Starting from $$R = \\frac{\\rho L}{A}$$, multiply both sides by $$A$$: $$RA = \\rho L$$, then divide both sides by $$L$$: $$\\rho = \\frac{RA}{L}$$. Two clean algebraic steps, no risk of inversion.\n- Step 2: If you try to recall $$\\rho = \\frac{RA}{L}$$ directly from memory, you risk flipping the fraction and writing $$\\rho = \\frac{RL}{A}$$ \u2014 which has the units $$\\Omega\\,\\text{m}^2/\\text{m}^2$$... wait, that would give $$\\Omega$$, not $$\\Omega\\,\\text{m}$$. The wrong rearrangement gives the wrong unit, but under exam pressure you might not notice. Starting from the guaranteed-correct booklet form and rearranging step by step is the safety net.\n\nAlex's advice: memorise $$R = \\rho L / A$$ (it's on the data booklet) and always rearrange from there. Don't store the inverted form in memory \u2014 store the booklet form and derive on demand.", "source": "GLM 5.1"}, {"q": "Two identical resistors of resistance $$R$$ are connected in parallel. Without doing any complex arithmetic, what is the total resistance, and why? (2 steps)", "a": "- Step 1: For two identical resistors $$R$$ in parallel:\n$$\\frac{1}{R_{\\text{total}}} = \\frac{1}{R} + \\frac{1}{R} = \\frac{2}{R}$$\nSo $$R_{\\text{total}} = \\frac{R}{2}$$ \u2014 exactly half of one resistor.\n- Step 2: The intuition: two identical parallel paths each carry half the total current. Each path has resistance $$R$$, but since current splits equally, the combined effect is equivalent to a single path of resistance $$R/2$$ \u2014 the circuit is \"twice as easy\" for current to flow because there are two identical options.\n\nFor two 5 \u03a9 resistors: $$R_{\\text{total}} = 5/2 = 2.5\\,\\Omega$$ \u2014 this is exactly Q3's answer. For $$N$$ identical resistors $$R$$ in parallel: $$R_{\\text{total}} = R/N$$ \u2014 the resistance divides by the number of branches.", "source": "GLM 5.1"}, {"q": "A cell has e.m.f. $$\\varepsilon = 6\\,\\text{V}$$ and internal resistance $$r = 1\\,\\Omega$$, driving an external load of $$R = 5\\,\\Omega$$. Find the current and the terminal p.d. using mental arithmetic. (2 steps)", "a": "- Step 1: Current: $$I = \\frac{\\varepsilon}{R + r} = \\frac{6}{5 + 1} = \\frac{6}{6} = 1\\,\\text{A}$$. The total circuit resistance is 6 \u03a9, and the e.m.f. is 6 V, so exactly 1 A flows.\n- Step 2: Terminal p.d.: $$V = \\varepsilon - Ir = 6 - (1)(1) = 5\\,\\text{V}$$, or equivalently $$V = IR = (1)(5) = 5\\,\\text{V}$$. The \"lost volts\" are $$Ir = 1\\,\\text{V}$$, so the external circuit receives 5 V out of the 6 V budget.\n\nWith these nice numbers, both methods give the same answer: $$V = \\varepsilon - Ir$$ and $$V = IR$$ are equivalent (substitute $$I = \\varepsilon/(R+r)$$ into either). The lost volts (1 V) is exactly the fraction $$r/(R+r) = 1/6$$ of the e.m.f.", "source": "GLM 5.1"}, {"q": "A charge of 2 C flows through a component in 4 seconds. What is the average current, and how much energy is transferred if the p.d. across the component is 3 V? Use mental arithmetic. (2 steps)", "a": "- Step 1: Average current: $$I = \\frac{Q}{t} = \\frac{2}{4} = 0.5\\,\\text{A}$$ \u2014 half a coulomb per second passes through.\n- Step 2: Energy transferred: $$W = VQ = (3)(2) = 6\\,\\text{J}$$ \u2014 each coulomb carries 3 J, and 2 coulombs pass, so 6 J total. Alternatively, $$W = VIt = (3)(0.5)(4) = 6\\,\\text{J}$$ \u2014 same result, confirming consistency.\n\nThe two energy formulas $$W = VQ$$ and $$W = VIt$$ are equivalent because $$Q = It$$. Choose whichever uses the quantities you already have.", "source": "GLM 5.1"}, {"q": "What happens to the terminal p.d. of a cell when the external load resistance approaches zero (a near-short-circuit)? Explain using both the formula and the physical intuition. (2 steps)", "a": "- Step 1: As $$R \\to 0$$, the current becomes $$I = \\frac{\\varepsilon}{R + r} \\to \\frac{\\varepsilon}{r}$$ \u2014 the *maximum* current the cell can deliver (limited only by its own internal resistance). The terminal p.d. becomes $$V = \\varepsilon - Ir = \\varepsilon - \\varepsilon = 0$$ \u2014 all the e.m.f. is dropped inside the cell; nothing reaches the external terminals.\n- Step 2: Physically: in a short circuit, the cell is dumping all its energy into heating its own internal resistance. The \"budget\" ($$\\varepsilon$$) is entirely spent as \"tax\" ($$Ir$$), with nothing left for the \"take-home\" ($$V$$). This is why short circuits are dangerous \u2014 the cell dissipates maximum power internally ($$P = I^2 r$$ with maximum $$I$$), which can cause overheating, melting, or fire.\n\nThe two extremes: open circuit ($$R \\to \\infty$$) \u2192 $$V = \\varepsilon$$, $$I = 0$$ (full voltage, no current). Short circuit ($$R \\to 0$$) \u2192 $$V = 0$$, $$I = \\varepsilon/r$$ (no useful voltage, maximum dangerous current).", "source": "GLM 5.1"}, {"q": "If you double the length of a wire while keeping its material and cross-sectional area the same, what happens to its resistance, and why? What if you double the *area* instead, keeping length the same? (2 steps)", "a": "- Step 1: From $$R = \\frac{\\rho L}{A}$$: doubling the length ($$L \\to 2L$$) gives $$R \\to 2R$$ \u2014 resistance *doubles*. Physically, the current must push through twice as much resistive material (like doubling the length of a congested road \u2014 twice the delay).\n- Step 2: Doubling the area ($$A \\to 2A$$) gives $$R \\to R/2$$ \u2014 resistance *halves*. Physically, a wider wire provides twice as many parallel \"lanes\" for current, so it's twice as easy for charge to flow. More area = more parallel paths = less total resistance, even though the material is the same.\n\nLength and area have *opposite* effects on resistance: length multiplies it (series-like), area divides it (parallel-like). This is why power transmission cables are thick (large $$A$$) to minimise resistance, and why long extension leads have more resistance than short ones.", "source": "GLM 5.1"}, {"q": "In the expression $$v = \\frac{I}{nAq}$$ for drift velocity, which symbols sit in the *denominator*, and how can you use this to quickly eliminate wrong MCQ options for an \"expression\" question? (2 steps)", "a": "- Step 1: In $$v = \\frac{I}{nAq}$$, the denominator contains $$n$$, $$A$$, and $$q$$ (or $$e$$ for electrons). The numerator contains only $$I$$. Any option that places $$A$$ or $$n$$ or $$e$$ in the numerator is immediately wrong \u2014 these quantities should *reduce* drift velocity (more carriers or wider wire \u2192 slower drift per carrier), so they must be in the denominator.\n- Step 2: In Q5, this logic eliminated options B and C (which had $$A$$ on top) immediately. Then between the remaining options, the correct one (D) includes the electron charge $$e$$ in the denominator, while the other (A) omits it. Since each carrier's charge matters \u2014 more charge per carrier means fewer carriers needed for the same current, so each carrier drifts slower \u2014 $$q$$ must be present in the denominator.\n\nThe strategy: rearrange to make the wanted quantity the subject first, then match the structure (what's on top, what's on bottom, what's present, what's absent). Don't plug numbers into four expressions \u2014 match algebraic structure.", "source": "GLM 5.1"}, {"q": "For MCQ tables (like Q3 with series/parallel values), what is the disciplined approach Alex recommends, and why is it better than scanning the rows first? (2 steps)", "a": "- Step 1: The disciplined approach: *compute both values first*, then find the matching row. For Q3, you first calculate $$R_{\\text{series}} = 5 + 5 = 10\\,\\Omega$$ and $$R_{\\text{parallel}} = 2.5\\,\\Omega$$, then look for the row that contains exactly this pair (row D).\n- Step 2: Scanning rows first and trying to \"talk yourself into\" one is dangerous because you might find a row that matches one value but not the other, or you might be influenced by a plausible-looking wrong pair. Computing first gives you two independent numbers that must *both* match \u2014 this is a much stronger constraint that usually eliminates all but one row.\n\nCompute \u2192 match, not scan \u2192 guess. The two computed numbers are your \"key\" \u2014 only one row fits both.", "source": "GLM 5.1"}, {"q": "Alex's exam technique includes a specific *chain* of reasoning for circuit questions. List the four steps in the correct causal order, and explain why you must never jump straight to the meter reading. (3 steps)", "a": "- Step 1: The causal chain is:\n1. Component resistance changes (e.g., thermistor $$R_T$$ decreases)\n2. Total resistance changes ($$R_{\\text{total}} = R_T + R_F$$ decreases)\n3. Current changes ($$I = \\varepsilon / R_{\\text{total}}$$ increases)\n4. Voltage on the *specific component* the voltmeter spans changes ($$V = IR$$ for that component)\n- Step 2: You must never jump straight from step 1 to step 4 because the voltage on a component depends on *both* the current and that component's resistance \u2014 and these can change in *opposite* directions (as with the thermistor: $$I$$ up, $$R_T$$ down). Without tracking the intermediate steps, you can't determine which effect dominates.\n- Step 3: The chain is a *causal* sequence: resistance \u2192 total resistance \u2192 current \u2192 individual voltage. Each step depends on the previous one. Skipping steps means you lose the information needed to determine the direction of change at the final step.\n\nThe chain is: $$R_{\\text{component}} \\to R_{\\text{total}} \\to I \\to V_{\\text{component}}$$. Follow it every time, with numbers at each stage.", "source": "GLM 5.1"}, {"q": "In a potential divider sensor circuit, an NTC thermistor replaces $$R_2$$ (the lower resistor). As temperature increases, describe what happens to $$V_{\\text{out}}$$ across the thermistor, and explain using both the potential divider formula and the voltage redistribution reasoning. (3 steps)", "a": "- Step 1: Temperature increases \u2192 NTC thermistor resistance $$R_2$$ decreases. The potential divider formula gives: $$V_{\\text{out}} = V_{\\text{in}} \\times \\frac{R_2}{R_1 + R_2}$$.\n- Step 2: As $$R_2$$ decreases, the fraction $$\\frac{R_2}{R_1 + R_2}$$ decreases (the numerator shrinks while the denominator also shrinks, but the numerator shrinks *faster* because it's a smaller part of the total). So $$V_{\\text{out}}$$ *decreases* \u2014 the output voltage across the thermistor falls as temperature rises.\n- Step 3: Voltage redistribution view: as $$R_2$$ decreases, it \"releases\" its share of the total voltage. The fixed resistor $$R_1$$ \"claims\" this released share. So $$V_1$$ increases and $$V_2$$ decreases. The thermistor gives up voltage as it heats up. This is exactly the same reasoning as Q7 with the voltmeter across the thermistor.\n\nIf you want $$V_{\\text{out}}$$ to *increase* with temperature, swap the positions: put the thermistor as $$R_1$$ (top resistor) and take $$V_{\\text{out}}$$ across the fixed resistor $$R_2$$. The sensor's output behaviour depends on *where* in the divider you place it and *which* component you measure across.", "source": "GLM 5.1"}, {"q": "What is the \"zero error\" of a micrometer, and why must you check it before measuring the diameter of a wire in Core Practical 7? (2 steps)", "a": "- Step 1: A zero error occurs when the micrometer reads a non-zero value when the jaws are fully closed (should read zero). If the micrometer reads +0.02 mm when closed, every measurement you take will be 0.02 mm too large \u2014 a systematic error that shifts all your diameter values in the same direction.\n- Step 2: You must check for zero error *before* measuring because it affects every single diameter reading, and therefore every calculated area $$A = \\frac{1}{4}\\pi d^2$$ and every final resistivity value. If you find a zero error, you subtract it from each raw reading to correct it. Not checking means your entire experiment could be systematically offset by a fixed amount.\n\nZero error is a *systematic* error (constant bias), not a *random* error (scatter). It can't be fixed by taking more readings and averaging \u2014 it must be measured and subtracted.", "source": "GLM 5.1"}, {"q": "Why do you measure the wire diameter at *several points* along its length in Core Practical 7, rather than just once? What type of error does this address? (2 steps)", "a": "- Step 1: The wire may not have a perfectly uniform diameter \u2014 manufacturing imperfections can make it slightly thicker in some places and thinner in others. Measuring at several points (and averaging) captures the true average diameter, reducing the effect of local variations.\n- Step 2: This addresses *random* error in the diameter measurement. Individual readings scatter around the true mean due to natural variations in the wire and small measurement inconsistencies. Taking multiple readings and averaging reduces random error \u2014 the mean of $$N$$ readings has random error $$\\frac{1}{\\sqrt{N}}$$ times the scatter of a single reading.\n\nMeasuring in two perpendicular directions at each point additionally checks for non-circular cross-section (elliptical wire). Both practices improve the reliability of the area calculation, which directly affects the resistivity result since $$\\rho = \\text{gradient} \\times A$$.", "source": "GLM 5.1"}, {"q": "A student says: \"e.m.f. and terminal p.d. are the same thing \u2014 they're both measured in volts.\" Explain why this is a misconception, and describe a scenario where they give very different numerical values. (2 steps)", "a": "- Step 1: E.m.f. ($$\\varepsilon$$) and terminal p.d. ($$V$$) both have units of volts, but they describe *different physical processes*. E.m.f. is the total energy per coulomb *supplied* by the source; terminal p.d. is the energy per coulomb *available to the external circuit*. They are equal only when no current flows ($$I = 0$$, so $$V = \\varepsilon$$).\n- Step 2: When current flows, $$V = \\varepsilon - Ir$$ \u2014 the terminal p.d. is *less* than the e.m.f. by the \"lost volts.\" For example, a car battery with $$\\varepsilon = 12\\,\\text{V}$$ and $$r = 0.02\\,\\Omega$$ delivering $$I = 100\\,\\text{A}$$ (starter motor) has $$V = 12 - (100)(0.02) = 10\\,\\text{V}$$ \u2014 the terminal p.d. drops to 10 V under heavy load, 2 V less than the e.m.f. The difference is real and significant.\n\nSame unit, different meaning: e.m.f. is the *potential* (what the cell could provide with no load), terminal p.d. is the *actual* (what it delivers under load). Confusing them means misunderstanding what internal resistance does.", "source": "GLM 5.1"}, {"q": "A student calculates parallel resistance as follows: $$\\frac{1}{R_T} = \\frac{1}{6} + \\frac{1}{6} = \\frac{2}{6}$$ and writes $$R_T = \\frac{2}{6} = 0.33\\,\\Omega$$. Identify the exact mistake and give the correct answer. (2 steps)", "a": "- Step 1: The mistake is the reciprocal trap: the student computed $$\\frac{1}{R_T} = \\frac{2}{6} = \\frac{1}{3}$$ correctly, but then wrote $$R_T = \\frac{2}{6}$$ instead of taking the final reciprocal. The value $$\\frac{1}{3}$$ is $$\\frac{1}{R_T}$$, not $$R_T$$ itself.\n- Step 2: The correct final step: $$R_T = \\frac{1}{1/3} = 3\\,\\Omega$$. For two identical 6 \u03a9 resistors in parallel, the total is $$6/2 = 3\\,\\Omega$$ \u2014 half of one resistor, as expected for two identical parallel paths.\n\nThe number 0.33 is $$\\frac{1}{R_T}$$, not $$R_T$$. The discipline: after computing the sum of reciprocals, always explicitly write $$R_T = \\frac{1}{(\\text{sum})}$$ as a separate step.", "source": "GLM 5.1"}, {"q": "A student writes the unit of resistivity as $$\\Omega\\,\\text{m}^{-1}$$ instead of $$\\Omega\\,\\text{m}$$. Explain why this is wrong by showing the unit derivation from $$\\rho = \\frac{RA}{L}$$, and describe what physical absurdity $$\\Omega\\,\\text{m}^{-1}$$ would imply. (2 steps)", "a": "- Step 1: From $$\\rho = \\frac{RA}{L}$$: units are $$\\frac{\\Omega \\times \\text{m}^2}{\\text{m}} = \\Omega \\times \\text{m} = \\Omega\\,\\text{m}$$. The metre from area ($$\\text{m}^2$$) divided by the metre from length (m) leaves one metre in the *numerator*. The correct unit is \u03a9 m.\n- Step 2: If resistivity had units $$\\Omega\\,\\text{m}^{-1}$$ (ohm per metre), it would imply that a *shorter* sample of the same material has *higher* resistance (since $$\\rho$$ per metre would accumulate). But we know from $$R = \\rho L / A$$ that resistance *increases* with length \u2014 a longer wire has more resistance. The correct unit $$\\Omega\\,\\text{m}$$ means each metre of wire *adds* resistance proportional to $$\\rho$$, which matches reality.\n\nThe metre is on *top* because resistivity tells you how many ohms each metre of wire contributes (per unit area). More metres \u2192 more ohms. The metre must multiply the ohm, not divide it.", "source": "GLM 5.1"}, {"q": "When does a voltmeter connected across a cell's terminals read the true e.m.f.? Explain the condition and why it works. (2 steps)", "a": "- Step 1: The voltmeter reads the e.m.f. when *no current flows* through the cell \u2014 i.e., when the external circuit is open (disconnected or switched off). In this condition, $$I = 0$$, so the lost volts $$Ir = 0$$, and $$V = \\varepsilon - 0 = \\varepsilon$$.\n- Step 2: A voltmeter itself draws a tiny current (ideal voltmeters draw zero current). In practice, a high-quality voltmeter has such enormous resistance that the current through the cell is negligible, making $$Ir$$ negligibly small and $$V \\approx \\varepsilon$$. This is why you can measure e.m.f. by connecting a voltmeter directly across an isolated cell \u2014 the voltmeter's own resistance serves as the \"load,\" but it's so large that the current is practically zero.\n\nTo measure e.m.f. accurately: use a high-resistance voltmeter on an open-circuit cell. To measure internal resistance: vary the load, record $$V$$ and $$I$$ pairs, and plot the $$V$$\u2013$$I$$ graph.", "source": "GLM 5.1"}, {"q": "In a potential divider with $$R_1 = 3\\,\\Omega$$ and $$R_2 = 1\\,\\Omega$$, what fraction of the input voltage appears across $$R_2$$? Use mental arithmetic. (2 steps)", "a": "- Step 1: The potential divider formula: $$V_{\\text{out}} = V_{\\text{in}} \\times \\frac{R_2}{R_1 + R_2}$$.\n- Step 2: $$\\frac{R_2}{R_1 + R_2} = \\frac{1}{3 + 1} = \\frac{1}{4} = 0.25$$. So 25% of the input voltage appears across $$R_2$$, and 75% across $$R_1$$. The smaller resistor gets the smaller share \u2014 voltage divides in proportion to resistance, and $$R_2$$ is one-quarter of the total.\n\nIf $$V_{\\text{in}} = 12\\,\\text{V}$$, then $$V_{\\text{out}} = 12 \\times 0.25 = 3\\,\\text{V}$$ across $$R_2$$, and $$9\\,\\text{V}$$ across $$R_1$$. The ratio of voltages equals the ratio of resistances: $$3:9 = 1:3 = R_2:R_1$$.", "source": "GLM 5.1"}, {"q": "A metal wire and an NTC thermistor are both heated. Describe the *opposite* effects on their resistances, and explain the microscopic reason for each direction of change. (3 steps)", "a": "- Step 1: Metal wire: resistance *increases* with temperature (positive temperature coefficient). Microscopic reason: in a metal, the number density of free electrons $$n$$ is fixed (always the same conduction electrons). Heating makes the lattice ions vibrate more vigorously, obstructing the electrons' path, so drift velocity $$v$$ decreases. With $$n$$ constant and $$v$$ falling, current decreases \u2192 resistance increases.\n- Step 2: NTC thermistor: resistance *decreases* with temperature (negative temperature coefficient). Microscopic reason: in a semiconductor, heating liberates more charge carriers from bound states \u2014 $$n$$ increases dramatically. The slight decrease in $$v$$ from lattice vibrations is overwhelmed by the huge increase in $$n$$, so current increases \u2192 resistance decreases.\n- Step 3: The key difference is what *dominates*: in metals, $$v$$ change dominates (obstruction effect); in semiconductors, $$n$$ change dominates (carrier liberation effect). Both materials experience both effects, but the magnitude of each effect differs based on the material's electronic structure.\n\nAlex's correction was explicit: \"a thermistor (NTC) resistance decreases as it gets hotter \u2014 the opposite of a normal resistor.\" This is a high-frequency exam trap \u2014 don't default to \"hotter = more resistance.\"", "source": "GLM 5.1"}, {"q": "A student looking at an $$I$$\u2013$$V$$ diode graph says: \"Infinite resistance must be where the voltage is zero, because $$R = V/I$$ and $$V = 0$$ makes $$R = 0/I = 0$$.\" Identify both conceptual errors in this statement. (3 steps)", "a": "- Step 1: First error: the student is looking for $$V = 0$$ as the condition for infinite resistance. But from $$R = V/I$$, resistance becomes infinite when the *denominator* $$I$$ approaches zero ($$V/0 \\to \\infty$$), not when the numerator $$V$$ is zero ($$0/I = 0$$, which gives *zero* resistance, not infinite).\n- Step 2: Second error: the student's arithmetic is wrong. $$V = 0$$ with non-zero $$I$$ gives $$R = 0/I = 0\\,\\Omega$$ \u2014 this is *zero* resistance (a perfect conductor), not infinite resistance. The student has confused \"zero voltage\" with \"infinite resistance,\" which are opposite extremes.\n- Step 3: For the ideal diode, infinite resistance occurs on the flat $$I = 0$$ portion of the graph (reverse bias and small forward bias \u2014 points X and Y), where there is *non-zero voltage* but *zero current*. The conducting region (point Z) has non-zero $$I$$, so $$R = V/I$$ is finite and small.\n\nThe rule: $$R = V/I \\to \\infty$$ when $$I \\to 0$$ (regardless of $$V$$). $$R = V/I \\to 0$$ when $$V \\to 0$$ (regardless of $$I$$). Infinite resistance = no current; zero resistance = no voltage drop. These are opposite conditions.", "source": "GLM 5.1"}, {"q": "In the power comparison question (Q-pow), the student's claim was about the *external* resistor's power, not the total power. Why does the power in the *external* resistor decrease when internal resistance increases, even though the *total* power $$P = I\\varepsilon$$ also changes? (3 steps)", "a": "- Step 1: The power in the external resistor is $$P_{\\text{ext}} = I^2 R$$, where $$I = \\frac{\\varepsilon}{R + r}$$ and $$R$$ is fixed. When $$r$$ increases, the denominator $$R + r$$ increases, so $$I$$ decreases. With a smaller current through the same external resistance, $$P_{\\text{ext}} = I^2 R$$ decreases.\n- Step 2: The total power delivered by the cell is $$P_{\\text{total}} = I\\varepsilon = \\frac{\\varepsilon^2}{R + r}$$, which also decreases when $$r$$ increases. But the *fraction* of total power that reaches the external resistor is $$\\frac{P_{\\text{ext}}}{P_{\\text{total}}} = \\frac{I^2 R}{I\\varepsilon} = \\frac{IR}{\\varepsilon} = \\frac{R}{R + r}$$ \u2014 this fraction *also* decreases as $$r$$ increases. So the external resistor loses power both because total power drops and because its *share* of the total drops.\n- Step 3: The internal resistance \"steals\" an increasing fraction of the power: $$P_{\\text{internal}} = I^2 r$$, and the fraction going internally is $$\\frac{r}{R + r}$$, which increases with $$r$. Higher internal resistance means the cell wastes more of its energy budget on self-heating and delivers less to the useful load.\n\nThe cell's energy budget is split: fraction $$R/(R+r)$$ goes to the load, fraction $$r/(R+r)$$ is wasted internally. Increasing $$r$$ shifts the split in favour of waste.", "source": "GLM 5.1"}, {"q": "In the $$V$$\u2013$$I$$ graph for a cell, what would happen to the line if you tested a *second* cell with the same e.m.f. but *double* the internal resistance? Describe how the intercept and gradient change. (2 steps)", "a": "- Step 1: The line equation is $$V = \\varepsilon - rI$$. Same e.m.f. means the *y-intercept* stays the same (both lines cross the $$V$$-axis at the same $$\\varepsilon$$ value). Double the internal resistance means the gradient becomes twice as steep in the negative direction: new gradient = $$-2r$$ instead of $$-r$$.\n- Step 2: Visually, the second line starts at the same point on the $$V$$-axis but slopes *downward more steeply*, reaching the $$I$$-axis sooner (at $$I = \\varepsilon/2r$$, half the short-circuit current of the first cell). The steeper drop means terminal p.d. falls faster as current increases \u2014 the cell with higher internal resistance is \"taxed\" more heavily per amp drawn.\n\nSame intercept = same \"salary budget\"; steeper negative slope = higher \"tax rate.\" The cell with more internal resistance can't sustain high terminal p.d. under load.", "source": "GLM 5.1"}, {"q": "What is the maximum power that can be delivered to an external load from a cell with e.m.f. $$\\varepsilon$$ and internal resistance $$r$$, and at what value of external resistance $$R$$ does this occur? (This is the maximum power transfer theorem.) (3 steps)", "a": "- Step 1: The load power is $$P_{\\text{ext}} = I^2 R = \\left(\\frac{\\varepsilon}{R + r}\\right)^2 R = \\frac{\\varepsilon^2 R}{(R + r)^2}$$. To find the maximum, we need to find which $$R$$ makes this expression largest.\n- Step 2: The maximum occurs when $$R = r$$ (external resistance equals internal resistance). At this point, the current is $$I = \\frac{\\varepsilon}{2r}$$ and the load power is $$P_{\\text{max}} = \\frac{\\varepsilon^2}{4r}$$ \u2014 exactly one-quarter of the short-circuit power $$\\frac{\\varepsilon^2}{r}$$, and half the total power (the other half is wasted in $$r$$).\n- Step 3: The intuition: when $$R < r$$, most power is wasted internally (high current, low $$V$$). When $$R > r$$, the current is too low to deliver much power (low current, high $$V$$). The sweet spot is $$R = r$$, where the voltage and current are both moderate and the split is equal \u2014 maximum useful power transfer.\n\nThis is an edge case that sharpens understanding: maximum power transfer doesn't mean maximum efficiency (at $$R = r$$, half the power is wasted). It means the *absolute* power in the load is maximised, which matters for applications like audio amplifiers driving speakers.", "source": "GLM 5.1"}, {"q": "If the number density of charge carriers $$n$$ in a wire suddenly became zero, what would happen to the current, drift velocity, and resistance? What physical situation could cause $$n = 0$$? (2 steps)", "a": "- Step 1: From $$I = nAvq$$: if $$n = 0$$, then $$I = 0$$ regardless of voltage, area, or any other quantity. No charge carriers means no current can flow \u2014 the material is a perfect insulator. The resistance becomes infinite ($$R = V/0 \\to \\infty$$). Drift velocity is undefined (no carriers to drift).\n- Step 2: This is the state of cold, dry air \u2014 the gas molecules are neutral (not ionised), so there are no free charge carriers ($$n \\approx 0$$). Air's resistivity is about $$10^{16}\\,\\Omega\\,\\text{m}$$, making it effectively a perfect insulator under normal conditions. Only when a huge voltage ionises the air (lightning) does $$n$$ become non-zero and current can flow.\n\nThe edge case $$n = 0$$ is the insulator limit. The entire conductivity spectrum \u2014 from insulators to semiconductors to metals \u2014 is essentially a spectrum of $$n$$ values: near-zero (insulator), moderate (semiconductor), enormous (metal).", "source": "GLM 5.1"}, {"q": "Alex says: \"Find the formula that links the quantities, then rearrange.\" Why is this the first step for any physics question, before you look at the given numbers or the multiple-choice options? (2 steps)", "a": "- Step 1: The formula tells you the *physical relationship* between the quantities \u2014 which things are directly proportional, inversely proportional, squared, etc. Without this, you can't reason about how changes propagate (e.g., does doubling $$A$$ double or halve the result?). The formula is the *map*; the numbers are just *coordinates* on that map.\n- Step 2: For MCQs especially, rearranging first lets you match the *structure* of the expression (what's on top, what's on bottom, what's squared) to the options, rather than plugging numbers into four different expressions and comparing numerical results. This is faster, less error-prone, and tests the physics rather than your calculator skills.\n\nDecide the physics relation first (write the formula, rearrange for the wanted quantity), then engage with the numbers or options. Formula \u2192 rearrange \u2192 substitute/match. Never substitute first and hope.", "source": "GLM 5.1"}, {"q": "A wire has resistivity $$\\rho = 2 \\times 10^{-7}\\,\\Omega\\,\\text{m}$$, length $$L = 10\\,\\text{m}$$, and cross-sectional area $$A = 2 \\times 10^{-6}\\,\\text{m}^2$$. Calculate its resistance using mental arithmetic or simple steps. (2 steps)", "a": "- Step 1: Apply $$R = \\frac{\\rho L}{A}$$:\n$$R = \\frac{(2 \\times 10^{-7})(10)}{2 \\times 10^{-6}} = \\frac{2 \\times 10^{-6}}{2 \\times 10^{-6}} = 1\\,\\Omega$$\n- Step 2: The calculation simplifies nicely: $$\\rho L = 2 \\times 10^{-7} \\times 10 = 2 \\times 10^{-6}$$, and dividing by $$A = 2 \\times 10^{-6}$$ gives exactly 1. The resistance is 1 \u03a9 \u2014 the resistivity and geometry happen to cancel perfectly in this example.\n\nThis exercise captures the core skill: substitute into $$R = \\rho L / A$$, handle the powers of 10, and simplify. In real exam questions the numbers won't cancel as neatly, but the method is identical.", "source": "GLM 5.1"}, {"q": "Current is defined as the rate of flow of charge. What is the mathematical definition, and why does this mean that \"one ampere = one coulomb per second\"? (2 steps)", "a": "- Step 1: The defining equation is $$I = \\frac{\\Delta Q}{\\Delta t}$$, where $$I$$ is current (A), $$\\Delta Q$$ is the charge flowing past a point (C), and $$\\Delta t$$ is the time interval (s). This is a *rate* \u2014 it tells you how much charge passes a cross-section per unit time.\n- Step 2: If you set $$I = 1 \\text{ A}$$, then $$1 = \\frac{\\Delta Q}{\\Delta t}$$, meaning exactly 1 coulomb of charge flows past that point every second. So the ampere is literally \"coulombs per second\" \u2014 $$1 \\text{ A} = 1 \\text{ C s}^{-1}$$. This is why, in a lightning question, you can flip the equation to $$Q = I \\cdot t$$: multiply the current by the duration to get total charge transferred.\n\nThe ampere isn't an abstract unit \u2014 it's just \"how many coulombs per second.\"", "source": "GLM 5.1"}, {"q": "Resistance is defined by $$R = \\frac{V}{I}$$. This is a *definition*, not a law that describes how a material behaves. What does this distinction mean, and what does the unit \"ohm\" literally express? (2 steps)", "a": "- Step 1: $$R = \\frac{V}{I}$$ defines what we *mean* by resistance: it is the ratio of potential difference across a component to the current through it. It does not say that $$R$$ is constant \u2014 for a diode or a thermistor, $$R$$ changes as conditions change. Ohm's law (a separate claim) says $$R$$ stays constant for an ohmic conductor; the definition $$R = V/I$$ applies to *everything*, ohmic or not.\n- Step 2: From the ratio, the unit of resistance is $$\\frac{\\text{V}}{\\text{A}} = \\text{V A}^{-1}$$, which we call the ohm ($$\\Omega$$). So $$1 \\Omega$$ means: when 1 V is applied across a component and 1 A flows through it, its resistance is 1 $$\\Omega$$. It's \"volts per amp.\"\n\nThe definition always holds; Ohm's law is the extra claim that $$R$$ is constant.", "source": "GLM 5.1"}, {"q": "There are three equivalent formulas for electrical power dissipated by a resistor: $$P = VI$$, $$P = I^2 R$$, and $$P = \\frac{V^2}{R}$$. Why do all three give the same result, and how do you decide which one to use in a given problem? (3 steps)", "a": "- Step 1: Start from the fundamental definition $$P = VI$$ (power = voltage \u00d7 current). Now substitute $$V = IR$$ into this: $$P = (IR)(I) = I^2 R$$. Alternatively, substitute $$I = \\frac{V}{R}$$: $$P = V \\cdot \\frac{V}{R} = \\frac{V^2}{R}$$. All three are algebraically identical \u2014 they are just $$P = VI$$ rewritten using Ohm's definition $$R = V/I$$.\n- Step 2: The choice depends on *which quantities you already know*:\n+ If you know $$V$$ and $$I$$ directly \u2192 use $$P = VI$$ (simplest, no resistance needed).\n+ If you know $$I$$ and $$R$$ (e.g., a circuit where you've calculated current through a known resistor) \u2192 use $$P = I^2 R$$.\n+ If you know $$V$$ and $$R$$ (e.g., a resistor with a known voltage across it) \u2192 use $$P = \\frac{V^2}{R}$$.\n- Step 3: The form $$P = I^2 R$$ has a special physical meaning: it is *resistance heating*. The power dissipated as heat in a resistor is proportional to $$I^2$$, not just $$I$$ \u2014 doubling the current quadruples the heat. This is why fuses melt when current spikes.\n\nPick the form that uses the quantities you *already have* \u2014 avoid calculating a quantity just to plug it into a less convenient form.", "source": "GLM 5.1"}, {"q": "In a series circuit, what are the three key rules for current, potential difference, and total resistance? Why does adding another resistor in series *always* increase the total resistance? (2 steps)", "a": "- Step 1: The three rules are:\n+ **Current**: same through every component \u2014 $$I = I_1 = I_2 = I_3$$. There is only one path, so all charge must flow through every resistor.\n+ **Potential difference**: adds across components \u2014 $$V_{total} = V_1 + V_2 + V_3$$. Each resistor \"claims\" a share of the total voltage.\n+ **Resistance**: adds \u2014 $$R_{total} = R_1 + R_2 + R_3 + \\cdots$$.\n- Step 2: Why adding a resistor always increases $$R_{total}$$: resistances are *summed*, so every new resistor adds a positive value. Physically, you're making the single path longer/more obstructed \u2014 the same current must now push through more opposition. Even a tiny resistor increases the total (by that tiny amount). There is no way to decrease total resistance by adding more series resistors.\n\nSeries = one path = same current = voltages add = resistances add = total always goes up.", "source": "GLM 5.1"}, {"q": "In a parallel circuit, what are the three key rules for potential difference, current, and total resistance? Why does adding another resistor in parallel *always* decrease the total resistance \u2014 and why is the combined resistance smaller than the *smallest* individual resistor? (3 steps)", "a": "- Step 1: The three rules are:\n+ **Potential difference**: same across every branch \u2014 $$V = V_1 = V_2 = V_3$$. All branches connect between the same two nodes.\n+ **Current**: adds across branches \u2014 $$I_{total} = I_1 + I_2 + I_3$$. More branches = more paths for charge = more total current.\n+ **Resistance**: uses the reciprocal formula \u2014 $$\\frac{1}{R_{total}} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\frac{1}{R_3} + \\cdots$$.\n- Step 2: Why adding a parallel resistor decreases $$R_{total}$$: adding a branch adds another $$\\frac{1}{R_k}$$ term to the left side, making $$\\frac{1}{R_{total}}$$ larger. Since $$R_{total}$$ is the reciprocal of this sum, a larger sum \u2192 a smaller $$R_{total}$$. Physically, you're offering charge an *additional path*, so the overall opposition to flow drops.\n- Step 3: Why the result is smaller than the *smallest* resistor: even if you add a huge resistor in parallel, it still provides some additional path for current. The total current is at least as large as the current through the smallest-resistor branch alone, so $$R_{total} = \\frac{V}{I_{total}} \\leq \\frac{V}{I_{min}} = R_{min}$$. The new branch can only *help* current flow, never hinder it.\n\nParallel = multiple paths = same voltage = currents add = total resistance always drops below the smallest individual.", "source": "GLM 5.1"}, {"q": "The parallel resistance formula gives you $$\\frac{1}{R_{total}}$$, not $$R_{total}$$ itself. What is the \"reciprocal trap,\" and how does it work for two equal resistors (say both 10 \u03a9) in parallel? (2 steps)", "a": "- Step 1: The formula $$\\frac{1}{R_{total}} = \\frac{1}{R_1} + \\frac{1}{R_2}$$ computes the *reciprocal* of the total resistance. The trap is stopping here and writing down this number as your answer \u2014 but it's $$\\frac{1}{R_{total}}$$, not $$R_{total}$$. You must flip it one more time.\n- Step 2: For two 10 \u03a9 resistors: $$\\frac{1}{R_{total}} = \\frac{1}{10} + \\frac{1}{10} = \\frac{2}{10} = 0.2$$. If you stop here, you'd write $$R_{total} = 0.2 \\Omega$$ \u2014 WRONG. That's the reciprocal. Flip it: $$R_{total} = \\frac{1}{0.2} = \\frac{10}{2} = 5 \\Omega$$. Two equal resistors in parallel always give half of one resistor's value.\n\nAlways do the final flip. A quick sanity check: parallel resistance must be *smaller* than the smallest individual resistor. If your answer is larger, you forgot the flip.", "source": "GLM 5.1"}, {"q": "Resistance and resistivity are related but fundamentally different quantities. What is the key distinction, and why does a long thin wire have more resistance than a short fat wire of the *same material*? (2 steps)", "a": "- Step 1: **Resistivity** ($$\\rho$$) is a *property of the material* \u2014 copper has one resistivity, nichrome has another. It doesn't depend on the wire's shape or size. **Resistance** ($$R$$) is a *property of the specific sample* \u2014 it depends on both the material (via $$\\rho$$) and the geometry (length and cross-sectional area). The linking formula is $$R = \\frac{\\rho L}{A}$$.\n- Step 2: For the same material ($$\\rho$$ fixed), $$R \\propto L$$ (longer wire = more resistance) and $$R \\propto \\frac{1}{A}$$ (thinner wire = less area for current = more resistance). So a long thin wire has a large $$L$$ and a small $$A$$, both pushing $$R$$ up. A short fat wire has a small $$L$$ and a large $$A$$, both pushing $$R$$ down. Same $$\\rho$$, vastly different $$R$$.\n\nResistivity = \"how resistive is this material intrinsically?\" Resistance = \"how resistive is this particular piece of it?\"", "source": "GLM 5.1"}, {"q": "The unit of resistivity is \u03a9 m (ohm metre), with the metre in the *numerator*. Students often write \u03a9 m\u207b\u00b9. Why is this wrong, and how do you prove the correct unit from the formula? (2 steps)", "a": "- Step 1: Start from $$\\rho = \\frac{RA}{L}$$. Write each quantity in its base SI unit: $$R$$ is in \u03a9, $$A$$ is in m\u00b2, $$L$$ is in m. So the unit of $$\\rho$$ is $$\\frac{[\\Omega][\\text{m}^2]}{[\\text{m}]} = \\Omega \\cdot \\text{m}$$.\n- Step 2: The metre ends up on *top* because area (m\u00b2) is in the numerator and length (m) is in the denominator \u2014 one power of m survives after cancellation. Writing \u03a9 m\u207b\u00b9 would mean $$\\frac{\\Omega}{\\text{m}}$$, which is the unit of something like \"resistance per metre\" (a different quantity entirely). Resistivity is \"ohm-times-metre,\" not \"ohm-per-metre.\"\n\nThe m\u00b2 in area cancels one m from length, leaving one m on top. It's \u03a9\u00b7m, never \u03a9/m.", "source": "GLM 5.1"}, {"q": "Core Practical 7 determines the resistivity of a wire. You plot a graph of $$R$$ (y-axis) against $$L$$ (x-axis) for several lengths of the same wire. How does the gradient of this line give you $$\\rho$$, and why must you measure the diameter at several points in two perpendicular directions? (2 steps)", "a": "- Step 1: From $$R = \\frac{\\rho L}{A}$$, if $$\\rho$$ and $$A$$ are constant (same material, same wire), this is a straight line $$R = \\left(\\frac{\\rho}{A}\\right) \\cdot L$$ with gradient $$= \\frac{\\rho}{A}$$. So $$\\rho = \\text{gradient} \\times A$$. You measure the diameter $$d$$ with a micrometre, compute $$A = \\frac{\\pi d^2}{4}$$, then multiply by the gradient to get $$\\rho$$.\n- Step 2: Why measure $$d$$ at several points in two perpendicular directions:\n+ **Several points**: the wire may not have uniform thickness along its length; averaging reduces random error.\n+ **Two perpendicular directions**: the cross-section might not be perfectly circular (e.g., slightly oval). Measuring in two directions checks for this and gives a more representative average diameter.\n+ Also: always check the micrometre for **zero error** before measuring \u2014 if it doesn't read zero when closed, all your diameter readings are shifted.\n\nThe graph converts a difficult direct measurement into a gradient extraction; careful diameter measurement ensures $$A$$ is accurate.", "source": "GLM 5.1"}, {"q": "The transport equation $$I = nAvq$$ connects macroscopic current to microscopic charge-carrier motion. What does each symbol represent, and why does rearranging it for drift velocity $$v$$ show that $$v$$ is surprisingly small? (3 steps)", "a": "- Step 1: Each symbol:\n+ $$n$$ = number density of charge carriers (number per m\u00b3, units m\u207b\u00b3). For copper, $$n \\approx 8.4 \\times 10^{28}$$ m\u207b\u00b3 \u2014 staggeringly many free electrons per cubic metre.\n+ $$A$$ = cross-sectional area of the conductor (m\u00b2).\n+ $$v$$ = **drift velocity** (m s\u207b\u00b9) \u2014 the average net velocity of charge carriers along the wire. Not the random thermal speed (~10\u2076 m/s), but the tiny *net* push from the electric field.\n+ $$q$$ = charge per carrier (C). For electrons, $$q = e = 1.60 \\times 10^{-19}$$ C.\n- Step 2: Rearranging: $$v = \\frac{I}{nAq}$$. The current $$I$$ is on top (typically ~1 A), but the denominator contains three *huge* or *tiny* factors multiplied together: $$n$$ is enormous (~10\u00b2\u2078), $$A$$ is small but not extreme (~10\u207b\u2077 m\u00b2 for a typical wire), and $$q$$ is tiny (~10\u207b\u00b9\u2079 C). The product $$nAq$$ in the denominator is very large, so $$v$$ is very small.\n- Step 3: Plugging typical copper wire numbers: $$v \\approx \\frac{1}{(8.4\\times10^{28})
