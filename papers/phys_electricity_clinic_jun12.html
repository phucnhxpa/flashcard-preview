ampere. A resistor of $$1\\ \\Omega$$ is one that requires $$1$$ V of potential difference across it to drive $$1$$ A of current through it. The bigger the resistance, the more \"voltage cost\" per amp — you pay more potential energy per coulomb to push charge through. This single relation is the engine of almost every exam question: whenever you're given a voltage and a current, dividing them gives you the resistance, no matter how exotic the component (diode, lightning channel, anything).", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": false}, {"question": "Why does adding resistors in series always *increase* total resistance, while adding them in parallel always *decreases* it below the smallest? (3 steps)", "answer": "- Step 1: In series, the same current must traverse every resistor in sequence, and each one demands its own voltage drop. The total voltage cost piles up: $$R_T = R_1 + R_2 + \\cdots$$. Adding more resistors is like adding more obstacles in a single-file queue — the queue gets harder to push through.\n- Step 2: In parallel, each resistor provides an *additional path* for current to flow. Adding another path can only make it easier for charge to flow, never harder, so total resistance must drop.\n- Step 3: Mathematically, $$1/R_T = \\sum 1/R_i$$ means $$R_T$$ is smaller than any individual $$1/R_i$$ inverted, i.e. smaller than the smallest resistor. Two $$5\\ \\Omega$$ in parallel give $$2.5\\ \\Omega$$ — half the smallest, because two equal paths share the current equally.\n\nSeries = stacking obstacles; parallel = opening extra lanes.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": true}, {"question": "Two identical resistors of value $$R$$ are placed first in series, then in parallel. What is the ratio of the series total to the parallel total? (3 steps)", "answer": "- Step 1: Series total: $$R_S = R + R = 2R$$.\n- Step 2: Parallel total: $$1/R_P = 1/R + 1/R = 2/R$$, so $$R_P = R/2$$.\n- Step 3: Ratio $$R_S / R_P = 2R / (R/2) = 4$$. The series combination is always $$4$$× the parallel combination for two equal resistors.\n\nThis is a fast sanity check: any MCQ row giving a series/parallel pair *not* in a 4:1 ratio for two equal resistors is wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "When computing the parallel combination of resistors, what is the single most common arithmetic slip, and how do you avoid it? (2 steps)", "answer": "- Step 1: The formula $$1/R_T = 1/R_1 + 1/R_2 + \\cdots$$ gives you the reciprocal of the total, not the total itself. Students compute the sum on the right and write that as $$R_T$$, which would give an answer that's too small by a factor of $$R_T^2$$.\n- Step 2: Always do the *final flip*. E.g. two $$5\\ \\Omega$$ in parallel: $$1/R_T = 2/5$$, so $$R_T = 5/2 = 2.5\\ \\Omega$$ — not $$0.4\\ \\Omega$$.\n\nA quick sanity check: parallel total must be smaller than the smallest individual resistor — if your answer isn't, you forgot to flip.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "For resistors in series, why do voltages add but currents stay the same — and what conservation law is behind each? (3 steps)", "answer": "- Step 1: Current is the same in every series component because charge is conserved: there's nowhere else for the charge to go. Whatever flows into a resistor must flow out and into the next one — like water in a single pipe.\n- Step 2: Voltages add because energy is conserved (Kirchhoff's voltage law). Each resistor demands its own share of energy per coulomb, and the e.m.f. supplied must equal the total energy \"spent\" around the loop: $$V_{\\text{total}} = V_1 + V_2 + V_3$$.\n- Step 3: So in series: same $$I$$, different $$V$$s that add. In parallel it's the mirror image — same $$V$$ across each branch (they're connected to the same two nodes), but currents add as they merge.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "Why is resistivity $$\\rho$$ measured in $$\\Omega\\ \\text{m}$$ (ohm-metre) and not $$\\Omega\\ \\text{m}^{-1}$$? (3 steps)", "answer": "- Step 1: Start from $$R = \\rho L / A$$. Rearrange: $$\\rho = RA / L$$.\n- Step 2: Unit check: $$[\\rho] = [\\Omega][\\text{m}^2]/[\\text{m}] = \\Omega\\ \\text{m}$$. The metre is in the numerator because area has *two* metre powers and we only divide by one length.\n- Step 3: Intuition: $$\\rho$$ is the resistance of a cube of unit dimensions. If you scale up the cross-section, you provide more parallel paths (resistance falls), and if you scale up length, you make the obstacle course longer (resistance rises). So $$\\rho$$ has to carry one factor of length in its units to give a pure $$\\Omega$$ when multiplied by $$L/A$$.\n\nIf you write $$\\Omega\\ \\text{m}^{-1}$$, examiners will mark it wrong — it's a classic dropped mark.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "What's the conceptual difference between *resistance* $$R$$ and *resistivity* $$\\rho$$, and why does this distinction matter? (3 steps)", "answer": "- Step 1: Resistance $$R$$ is a property of a *specific object* — a particular wire of a particular length and area. Change the dimensions and $$R$$ changes.\n- Step 2: Resistivity $$\\rho$$ is a property of the *material itself*, independent of shape. Copper has the same $$\\rho$$ whether you make it into a thin filament or a thick bar — only its $$R$$ differs.\n- Step 3: This matters because to identify a material, you measure $$R$$ but you report $$\\rho$$. The formula $$\\rho = RA/L$$ strips out the geometry, leaving a number that characterises the substance.\n\nResistance is about the object; resistivity is about the stuff.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": true}, {"question": "In Core Practical 7 (resistivity of a wire), what do you plot, and how does the gradient give you $$\\rho$$? (4 steps)", "answer": "- Step 1: For several lengths $$L$$ of the wire, measure the current $$I$$ for a fixed voltage (or vice versa) and compute $$R = V/I$$ each time.\n- Step 2: Measure the wire's diameter $$d$$ at several points along its length using a micrometre, average them, and compute $$A = \\tfrac{1}{4}\\pi d^2$$. Always check for a zero error on the micrometre and measure $$d$$ in two perpendicular directions.\n- Step 3: Plot $$R$$ on the y-axis against $$L$$ on the x-axis. From $$R = (\\rho/A) L$$, this is a straight line through the origin with gradient $$\\rho/A$$.\n- Step 4: So $$\\rho = (\\text{gradient}) \\times A$$. Using a gradient (best-fit line) rather than a single data point averages out random errors.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "Why must you measure the wire's diameter in two perpendicular directions during Core Practical 7? (2 steps)", "answer": "- Step 1: The formula $$A = \\tfrac{1}{4}\\pi d^2$$ assumes the cross-section is a *perfect circle*. Real wires can be slightly oval (from manufacturing or being squashed).\n- Step 2: Measuring $$d$$ in two perpendicular directions lets you check for non-circularity. If the two values disagree significantly, the cross-section isn't truly circular and your computed area (and hence $$\\rho$$) carries a systematic error you should report.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "Starting from the microscopic picture, derive the transport equation $$I = nAvq$$ from first principles. (4 steps)", "answer": "- Step 1: Consider a wire of cross-sectional area $$A$$ with $$n$$ charge carriers per unit volume, each carrying charge $$q$$ and drifting at average speed $$v$$.\n- Step 2: In time $$\\Delta t$$, every carrier moves a distance $$v \\Delta t$$. So all carriers within a cylinder of length $$v \\Delta t$$ and cross-section $$A$$ will cross the chosen plane in that time.\n- Step 3: Volume of that cylinder = $$A v \\Delta t$$. Number of carriers in it = $$n A v \\Delta t$$. Total charge crossing = $$\\Delta Q = nAv\\Delta t \\cdot q$$.\n- Step 4: Current = $$\\Delta Q / \\Delta t = nAvq$$. Done.\n\nThe formula is just \"number density × volume swept per second × charge each\".", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "Drift velocity in a copper wire is famously tiny — well under a millimetre per second. Yet a light comes on instantly when you flip a switch. How are these two facts reconciled? (3 steps)", "answer": "- Step 1: The drift velocity $$v$$ from $$I = nAvq$$ is the *average* speed at which the cloud of electrons slowly migrates along the wire — often $$\\sim 10^{-4}$$ m/s for everyday currents.\n- Step 2: But what travels at near light speed is the *electric field* (and the signal to start moving). When you close the switch, the field propagates through the wire almost instantly, telling every electron *everywhere along the wire* to start drifting at the same time.\n- Step 3: It's analogous to a long pipe already full of water: pushing on one end makes water gush out the other end *immediately*, even though any individual water molecule moves slowly.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "From the transport equation $$I = nAvq$$, explain qualitatively why a thinner wire (smaller $$A$$) feels hotter for the same current. (3 steps)", "answer": "- Step 1: For fixed $$I$$ and material (fixed $$n$$, $$q$$), the relation $$v = I/(nAq)$$ shows that a smaller $$A$$ forces a *larger* drift velocity to maintain the same current.\n- Step 2: Faster-drifting electrons collide more energetically with the lattice ions, dissipating more kinetic energy per unit volume as heat.\n- Step 3: Equivalently, from the macroscopic side: $$R = \\rho L/A$$ means thinner wires have higher $$R$$, so power dissipated $$P = I^2 R$$ is larger. Both pictures agree — that's why fuses and incandescent filaments are intentionally thin.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "Why does the resistance of an NTC thermistor *decrease* with temperature, while a metal's resistance *increases*? Reason using $$I = nAvq$$. (4 steps)", "answer": "- Step 1: In a metal, $$n$$ (the number density of free electrons) is essentially fixed by the atomic structure — heating doesn't add new charge carriers.\n- Step 2: But heating *does* make lattice ions vibrate more vigorously, increasing collision frequency, which reduces the average drift velocity $$v$$. With $$n$$ fixed and $$v$$ falling, $$I$$ falls for given $$V$$, so $$R = V/I$$ rises.\n- Step 3: In a semiconductor / NTC thermistor, electrons are bound to atoms at low temperature. Heating supplies enough thermal energy to *liberate* many more charge carriers — $$n$$ rises rapidly (often exponentially).\n- Step 4: In $$I = nAvq$$, the dramatic increase in $$n$$ overwhelms the modest decrease in $$v$$, so $$I$$ rises (for fixed $$V$$) and $$R$$ falls. That's \"negative temperature coefficient\": more heat ⇒ more carriers ⇒ less resistance.", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "A graph of current vs voltage for an ideal diode is shown with three labelled points. At which point(s) is the resistance infinite — and why is the answer NOT simply \"at the origin\"? (3 steps)", "answer": "- Step 1: Resistance is $$R = V/I$$, so $$R \\to \\infty$$ requires the *denominator* to go to zero: $$I \\to 0$$, regardless of $$V$$.\n- Step 2: For an ideal diode in reverse bias (and small forward bias below the threshold), $$I = 0$$ but $$V \\neq 0$$ — so $$R$$ is infinite there. Any point lying on the horizontal $$I = 0$$ line qualifies, even if $$V$$ is large.\n- Step 3: The student trap is to look for $$V = 0$$ (the origin), but $$V = 0$$ with $$I = 0$$ is just $$0/0$$ — indeterminate, not infinite. The discriminator is always: is the current zero?\n\nFor infinite resistance, check the current axis, not the voltage axis.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "Why is the resistance of an ideal diode in forward bias (above threshold) essentially zero, while in reverse bias it's effectively infinite? (3 steps)", "answer": "- Step 1: A diode is an asymmetric semiconductor junction. In forward bias, the applied field pushes charge carriers across the junction freely — once above the threshold voltage, large currents flow with almost no voltage cost, so $$R = V/I \\approx 0$$.\n- Step 2: In reverse bias, the field pulls carriers *away* from the junction, leaving a depletion region with no free carriers to conduct. So $$I \\approx 0$$ regardless of how big $$V$$ is, giving $$R \\to \\infty$$.\n- Step 3: That's why diodes act as one-way valves — they pass current cheaply in one direction and block it in the other. The \"ideal\" idealisation just sharpens these into perfectly $$0$$ and perfectly $$\\infty$$.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "A copper wire of cross-section $$A$$ carries current $$I$$. If you double the current while keeping $$A$$, $$n$$ and $$q$$ fixed, what happens to the drift velocity? (2 steps)", "answer": "- Step 1: From $$v = I/(nAq)$$, the drift velocity is directly proportional to current when the other three factors are fixed.\n- Step 2: Doubling $$I$$ therefore doubles $$v$$. Physically: to push twice as much charge per second through the same cross-section with the same carrier density, each carrier must move twice as fast on average.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Define e.m.f. in the exact wording an Edexcel examiner expects, and explain *why* the wording \"per unit charge\" matters. (3 steps)", "answer": "- Step 1: The e.m.f. of a source is the **energy converted from other forms into electrical energy per unit charge** passing through the source. Units: $$\\text{J C}^{-1}$$ = V.\n- Step 2: \"Per unit charge\" means per coulomb of charge. Saying \"per charge particle\" or \"per electron\" would be wrong by a factor of about $$6.24 \\times 10^{18}$$ — that's how many elementary charges are in one coulomb.\n- Step 3: The numerical e.m.f. (e.g. $$1.5$$ V on a battery) only makes sense as joules per coulomb, not joules per electron. A $$1.5$$ V cell delivers $$1.5$$ J for every coulomb, not for every electron (which gets only $$\\sim 2.4 \\times 10^{-19}$$ J).\n\nThe phrase to memorise: \"energy converted... per unit charge.\"", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "Why is the terminal p.d. $$V$$ of a real cell always *less* than its e.m.f. $$\\varepsilon$$ when current flows, and equal to $$\\varepsilon$$ only when no current flows? (3 steps)", "answer": "- Step 1: A real cell is modelled as an ideal e.m.f. source $$\\varepsilon$$ in series with an internal resistance $$r$$. When current $$I$$ flows, a voltage $$Ir$$ is \"lost\" across this internal resistance.\n- Step 2: By Kirchhoff's voltage law: $$\\varepsilon = V + Ir$$, so $$V = \\varepsilon - Ir$$. The terminal p.d. $$V$$ — what the voltmeter across the external terminals reads — is what's left over after the internal drop.\n- Step 3: When $$I = 0$$ (open circuit), there's no internal drop, so $$V = \\varepsilon$$. This is why measuring an \"open-circuit voltage\" with an ideal voltmeter directly gives the e.m.f.\n\nThe internal resistance is invisible until current flows; then it steals voltage.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "In an experiment to find internal resistance, you plot terminal p.d. $$V$$ against current $$I$$. What does the gradient mean, what does the y-intercept mean, and why? (4 steps)", "answer": "- Step 1: Start from $$V = \\varepsilon - Ir$$ and rearrange as $$V = (-r)I + \\varepsilon$$.\n- Step 2: Compare with $$y = mx + c$$: the y-variable is $$V$$, the x-variable is $$I$$, the gradient is $$m = -r$$, and the y-intercept is $$c = \\varepsilon$$.\n- Step 3: Therefore, **gradient = $$-r$$**, so the internal resistance $$r = -(\\text{gradient}) = -\\Delta V/\\Delta I$$. The minus sign matters: the line slopes *down* (more current ⇒ less terminal p.d.), so $$\\Delta V/\\Delta I < 0$$, and $$r$$ comes out positive as it must.\n- Step 4: The y-intercept is $$\\varepsilon$$ — the terminal p.d. at zero current, which is exactly the e.m.f.\n\nQuote both: \"gradient = $$-r$$\" AND \"intercept = $$\\varepsilon$$\".", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Why is plotting many points and using the gradient a better experimental method for finding internal resistance than just measuring one $$V$$, $$I$$ pair and computing $$r = (\\varepsilon - V)/I$$? (3 steps)", "answer": "- Step 1: A single-point calculation requires knowing $$\\varepsilon$$ exactly, and any random error in $$V$$ or $$I$$ propagates directly into a single estimate of $$r$$.\n- Step 2: A best-fit line through many $$(V, I)$$ points averages out random measurement noise, giving a more reliable gradient.\n- Step 3: It also gives $$\\varepsilon$$ for free as the y-intercept, so you don't need an independent open-circuit measurement, and any systematic offsets reveal themselves (e.g. if the intercept disagrees with the rated e.m.f.).", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "A potential divider with two resistors $$R_1$$ and $$R_2$$ in series across an input voltage $$V_{\\text{in}}$$ outputs $$V_{\\text{out}}$$ across $$R_2$$. Why does the formula $$V_{\\text{out}} = V_{\\text{in}} R_2/(R_1+R_2)$$ work? (3 steps)", "answer": "- Step 1: The two resistors carry the same current $$I = V_{\\text{in}}/(R_1+R_2)$$ because they're in series.\n- Step 2: The voltage across $$R_2$$ is $$V_{\\text{out}} = I R_2$$ by Ohm's law applied to that resistor alone.\n- Step 3: Substituting: $$V_{\\text{out}} = [V_{\\text{in}}/(R_1+R_2)] \\cdot R_2 = V_{\\text{in}} R_2/(R_1+R_2)$$. The output is the *fraction* of the input determined by $$R_2$$'s share of the total resistance.\n\nIntuition: voltage divides among series resistors in proportion to their resistances.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": false}, {"question": "How does an LDR (light-dependent resistor) behave with light intensity, and how does this differ from a thermistor's response to temperature? (3 steps)", "answer": "- Step 1: An LDR is a semiconductor whose resistance *decreases* as light intensity increases. Photons free additional charge carriers, raising $$n$$ in $$I = nAvq$$, so resistance drops.\n- Step 2: An NTC thermistor's resistance *decreases* as temperature rises — same underlying mechanism (more carriers liberated), but the stimulus is heat rather than light.\n- Step 3: Both are \"negative response\" semiconductors (more stimulus ⇒ less resistance), in contrast to a normal metal resistor whose resistance increases with temperature. Both are useful in potential dividers as sensors.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "What is a potentiometer, and how does it differ from a simple variable resistor (rheostat)? (3 steps)", "answer": "- Step 1: A potentiometer is a three-terminal device — a resistive track between two fixed terminals, plus a sliding contact (wiper) that taps off a chosen point along the track.\n- Step 2: Wired across an input voltage $$V_{\\text{in}}$$, the wiper acts as a continuously adjustable potential divider: it outputs any fraction of $$V_{\\text{in}}$$ from $$0$$ to $$V_{\\text{in}}$$.\n- Step 3: A simple rheostat uses only two terminals (one end + wiper) and varies *current* by varying resistance in series with a load. A potentiometer varies *voltage* directly via the divider geometry.", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "In a circuit with a thermistor and fixed resistor in series, if the temperature rises, why does the ammeter reading always increase regardless of where the voltmeter is connected? (3 steps)", "answer": "- Step 1: Temperature ↑ ⇒ thermistor resistance $$R_T$$ ↓ (it's NTC).\n- Step 2: Total series resistance $$R_{\\text{total}} = R_T + R_F$$ therefore decreases.\n- Step 3: From $$I = \\varepsilon/R_{\\text{total}}$$, lower total resistance means higher current. The ammeter measures this current, so it rises — and this conclusion is independent of where the voltmeter sits, since the voltmeter doesn't change the circuit (ideal voltmeter has infinite resistance).", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": false}, {"question": "In the same heating-thermistor circuit, why does a voltmeter across the *thermistor* read a falling value, while a voltmeter across the *fixed resistor* reads a rising value? (4 steps)", "answer": "- Step 1: Heating makes $$R_T$$ fall and (as shown) $$I$$ rise.\n- Step 2: Voltmeter across the thermistor reads $$V_T = I R_T$$. Here $$I$$ rises but $$R_T$$ falls *faster* than $$I$$ rises (the thermistor change dominates), so the product $$V_T$$ decreases.\n- Step 3: Voltmeter across the fixed resistor reads $$V_F = I R_F$$. Now $$R_F$$ is constant and $$I$$ rises, so $$V_F$$ clearly increases.\n- Step 4: Total voltage is conserved: $$V_T + V_F = \\varepsilon$$, so if $$V_T$$ falls, $$V_F$$ must rise by the same amount. The share of e.m.f. shifts off the thermistor and onto the fixed resistor.\n\nThe voltmeter's verdict depends entirely on which component it spans.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "A student claims that in any series circuit with a varying component, voltages across the component and the rest always move in *opposite* directions. Is this true, and why? (3 steps)", "answer": "- Step 1: Yes — it follows directly from $$V_1 + V_2 = \\varepsilon$$ (Kirchhoff's voltage law for a single loop with constant e.m.f.).\n- Step 2: Since $$\\varepsilon$$ is constant, $$\\Delta V_1 = -\\Delta V_2$$. Whatever voltage one component gains, the other loses, like a seesaw.\n- Step 3: This is why \"is the voltmeter reading going up or down?\" is determined by *which component it spans*, not by what's physically changing. The two voltmeters move in opposite directions — always.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "Why is \"draw the circuit out and put numbers on it\" Alex's go-to method for circuits-reasoning questions? (3 steps)", "answer": "- Step 1: Verbal \"increases/decreases\" reasoning loses track of which quantity affects which — students confuse $$V$$ across a component with the e.m.f., or $$I$$ in the whole circuit with current through one branch.\n- Step 2: Assigning concrete numbers (say $$\\varepsilon = 12$$ V, $$R_T = 100\\ \\Omega \\to 50\\ \\Omega$$, $$R_F = 100\\ \\Omega$$) lets you compute each quantity at each stage and *see* which goes up and which goes down.\n- Step 3: It also enforces the correct logical chain: component $$R$$ → total $$R$$ → current $$I$$ → voltage on each specific component. Skipping any link is where errors creep in.\n\nNumbers don't lie; verbal hand-waving does.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "Write all the equivalent forms for electrical power dissipated by a resistor and explain when to use each. (3 steps)", "answer": "- Step 1: Three forms: $$P = VI$$, $$P = I^2 R$$, $$P = V^2/R$$. All follow from $$V = IR$$ — substitute it into $$P = VI$$ to get the other two.\n- Step 2: Use $$P = VI$$ when you know both voltage and current (most general). Use $$P = I^2 R$$ when you know current and resistance — common for resistive heating problems where current is fixed by the rest of the circuit. Use $$P = V^2/R$$ when you know voltage across the resistor and its resistance — common for parallel branches where $$V$$ is the supply voltage.\n- Step 3: Pick the form that uses quantities you already have, so you don't have to compute an intermediate value (and propagate errors).", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "Why does power dissipated in a resistor scale as $$I^2$$, not just $$I$$? What's the physical reason for the square? (3 steps)", "answer": "- Step 1: Voltage across a resistor is itself proportional to current: $$V = IR$$. So doubling $$I$$ doubles $$V$$.\n- Step 2: Power is energy per second = (energy per coulomb) × (coulombs per second) = $$V \\times I$$. If you double $$I$$, you double *both* the voltage drop *and* the rate of charge flow.\n- Step 3: Hence $$P = VI = (IR)(I) = I^2 R$$ — the square comes from the fact that current independently raises both the \"energy per coulomb\" and the \"coulombs per second\" factors.\n\nThis is why doubling current quadruples heat, and why thick wires (low $$R$$) carry current efficiently.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "A cell with e.m.f. $$9$$ V drives an external resistor $$R = 5\\ \\Omega$$. The internal resistance changes from $$0.1\\ \\Omega$$ to $$0.5\\ \\Omega$$. Without computing exactly, estimate qualitatively what fraction of the original load power remains. (3 steps)", "answer": "- Step 1: Current is $$I = \\varepsilon/(R+r)$$. Going from $$r = 0.1$$ to $$r = 0.5$$ changes $$R+r$$ from $$5.1$$ to $$5.5$$ — a $$\\sim 8\\%$$ increase in denominator.\n- Step 2: So current drops by roughly $$8\\%$$. Load power $$P = I^2 R$$ depends on $$I^2$$, so power drops by roughly $$2 \\times 8\\% = 16\\%$$, i.e. retains about $$84\\%$$.\n- Step 3: Exact calculation gives $$86\\%$$. The student's claim of \"$$70\\%$$\" (a $$30\\%$$ drop) is far too large — the internal resistance is still tiny compared to the load, so its change has only a modest effect on load power.\n\nWhen $$r \\ll R$$, small changes in $$r$$ produce small changes in load power.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "Why is the wording \"reduces *to* $$70\\%$$\" different from \"reduces *by* $$70\\%$$\", and why is this distinction worth a mark? (3 steps)", "answer": "- Step 1: \"Reduces to $$70\\%$$\" means the new value is $$0.70$$ times the old: $$P_2/P_1 = 0.70$$.\n- Step 2: \"Reduces by $$70\\%$$\" means $$70\\%$$ of the original value is lost, so the new value is $$30\\%$$ of the old: $$P_2/P_1 = 0.30$$.\n- Step 3: These differ by more than a factor of $$2$$. Always read the claim precisely; the exam will mark down a student who computes $$0.86$$ and then writes \"the claim is correct because the power did drop\" without noting that $$0.86 \\neq 0.70$$.\n\nTo evaluate a claim, *always quote the comparison number*.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "During a lightning strike, the channel transfers about $$0.75$$ C of charge in just $$30\\ \\mu\\text{s}$$. How can such a tiny charge cause so much destruction? (3 steps)", "answer": "- Step 1: Charge transferred is modest, but it's delivered *very* fast: $$I = Q/t = 0.75/(30 \\times 10^{-6}) = 25\\,000$$ A — enormous current.\n- Step 2: At a p.d. of $$\\sim 10^9$$ V, power dissipated is $$P = VI \\sim 3 \\times 10^{13}$$ W — tens of terawatts, briefly comparable to thousands of power stations combined.\n- Step 3: Destruction comes from instantaneous *power*, not total charge. The huge current heats the channel to plasma temperatures, causing rapid air expansion (thunder), incandescent light, and structural damage where it strikes.\n\nLightning isn't dangerous because of how much charge it moves, but how *fast* it moves it.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "Why is the resistivity of a lightning channel ($$\\sim 0.2\\ \\Omega\\ \\text{m}$$) about $$10^{17}$$ times smaller than that of cold air ($$\\sim 10^{16}\\ \\Omega\\ \\text{m}$$)? (3 steps)", "answer": "- Step 1: Cold air is an excellent insulator because its atoms hold tightly onto their electrons — there are essentially no free charge carriers, so $$n$$ in $$I = nAvq$$ is negligible.\n- Step 2: During a strike, the enormous electric field ionises the air, ripping electrons off molecules and creating a hot plasma channel. The number density $$n$$ of free charge carriers jumps astronomically.\n- Step 3: Since $$\\rho \\propto 1/n$$ (more carriers ⇒ easier conduction ⇒ lower resistivity), $$n$$ rising by $$\\sim 10^{17}$$× makes $$\\rho$$ drop by the same factor. The channel briefly behaves like a good conductor, like a wire of plasma.\n\nIonisation = manufacturing charge carriers on the fly.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "In the lightning resistivity calculation, why is the relevant length $$L$$ the cloud-to-ground distance ($$400$$ m) and not something else? (2 steps)", "answer": "- Step 1: In $$\\rho = RA/L$$, $$L$$ is the length of the *conductor* whose resistance you measured. The conductor here is the lightning channel itself — a plasma column extending from cloud to ground.\n- Step 2: That column's length is the cloud-to-ground distance, $$400$$ m. The cross-sectional area $$A$$ comes from the channel diameter, and resistance $$R = V/I$$ is computed from the strike voltage and current. All three quantities describe the same plasma cylinder.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "Two $$5\\ \\Omega$$ resistors and two $$10\\ \\Omega$$ resistors are available. Without computing exactly, which combination of two of them (in series or parallel) gives the smallest total resistance? (2 steps)", "answer": "- Step 1: Parallel always gives a smaller total than series for the same pair. Among parallel combinations, the smallest total comes from the smallest pair.\n- Step 2: Two $$5\\ \\Omega$$ in parallel give $$2.5\\ \\Omega$$. Any other combination (e.g. $$5$$ and $$10$$ in parallel ≈ $$3.3\\ \\Omega$$, two $$10$$ in parallel = $$5\\ \\Omega$$) is larger. Series combinations are all larger still ($$10$$ or more).\n\nThe rule: parallel beats series for low resistance; smaller resistors beat larger ones.", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "What's the conceptual difference between an ammeter (ideally zero resistance, in series) and a voltmeter (ideally infinite resistance, in parallel)? (3 steps)", "answer": "- Step 1: An ammeter measures the current *through* a part of the circuit, so it must be placed *in series* — the same current you want to measure flows through it. To avoid disturbing the circuit, it should have zero resistance, so it doesn't add to the total $$R$$.\n- Step 2: A voltmeter measures the potential difference *across* two points, so it must be placed *in parallel* across those points. To avoid disturbing the circuit, it must draw essentially no current, hence near-infinite resistance.\n- Step 3: Confusing the placements either short-circuits the component (voltmeter wired in series acting like a near-open) or shorts out the meter (ammeter wired in parallel = tiny resistance shunting the component).\n\nAmmeter: in series, low $$R$$. Voltmeter: in parallel, high $$R$$.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "A wire is stretched to twice its length while its volume stays constant. What happens to its resistance, and why? (4 steps)", "answer": "- Step 1: Volume $$= L \\times A$$ is constant. If $$L$$ doubles, $$A$$ must halve to preserve volume.\n- Step 2: Resistance $$R = \\rho L/A$$. The numerator doubles ($$L \\to 2L$$) and the denominator halves ($$A \\to A/2$$).\n- Step 3: Combined effect: $$R \\to \\rho (2L)/(A/2) = 4 \\rho L/A = 4R$$. Resistance increases by a factor of $$4$$.\n- Step 4: The factor of $$4$$ comes from *both* effects compounding — longer means more obstacle course AND thinner means narrower lanes. Useful for thinking about strain gauges, which exploit this very effect.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "A cell with internal resistance $$r$$ delivers maximum power to an external load when $$R = r$$ (matched load). Without deriving this rigorously, give the intuition for why both extremes ($$R \\ll r$$ and $$R \\gg r$$) give low load power. (3 steps)", "answer": "- Step 1: If $$R \\to 0$$ (near short-circuit), current is large but the voltage across $$R$$ is tiny, so $$P = VI$$ across $$R$$ is small — almost all power dissipates in $$r$$ internally, heating the cell.\n- Step 2: If $$R \\to \\infty$$ (near open-circuit), voltage across $$R$$ is large but current is tiny, so again $$P = VI$$ across $$R$$ is small — no charge flows to deliver energy.\n- Step 3: There's a sweet spot in between: $$R = r$$. Then current is moderate, voltage across $$R$$ is half the e.m.f., and the product is maximised. It's a classic matched-load result.\n\nPower delivery is a trade-off between current and voltage; both extremes lose.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "Two identical batteries (each $$\\varepsilon$$, $$r$$) are wired (a) in series, and (b) in parallel. What's the e.m.f. and internal resistance of each combination? (4 steps)", "answer": "- Step 1: Series: e.m.f.s add ($$2\\varepsilon$$), and the internal resistances add as series resistors ($$2r$$). You get more voltage but also more internal resistance.\n- Step 2: Parallel: e.m.f. is still $$\\varepsilon$$ (both cells push at the same voltage), and the two internal resistances combine as parallel resistors: $$r_{\\text{combined}} = r/2$$. You get the same voltage but halved internal resistance — useful for high-current loads.\n- Step 3: Series boosts voltage (good for high-voltage devices), parallel boosts current capacity (good for sustained high currents).\n- Step 4: This is exactly why the car battery in Q17 uses six cells in series: it needs $$12$$ V to start the engine, and putting cells in series is how you stack up to that voltage.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": true}, {"question": "In the car-battery question, each of $$6$$ cells has internal resistance $$0.010\\ \\Omega$$. What is the combined internal resistance, and is the calculated value $$r \\approx 0.019\\ \\Omega$$ consistent? (3 steps)", "answer": "- Step 1: Six cells in series have a combined internal resistance of $$6 \\times 0.010 = 0.060\\ \\Omega$$ — that's what you'd predict from the \"nominal\" individual values.\n- Step 2: The measured value from $$r = (\\varepsilon - V)/I = (12 - 11.81)/9.83 \\approx 0.019\\ \\Omega$$ is *less* than the nominal $$0.060\\ \\Omega$$.\n- Step 3: The discrepancy isn't unusual — individual cell internal resistances are nominal and can vary with state of charge, temperature, and manufacturing. The experimental measurement is the real value for that operating condition; the \"$$0.010\\ \\Omega$$ per cell\" is just a quoted spec.\n\nThe measurement trumps the nominal; that's why we do experiments.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Why does a car's headlights dim slightly when you start the engine, and how is this an illustration of internal resistance? (3 steps)", "answer": "- Step 1: The starter motor draws an enormous current (hundreds of amps) for a moment to crank the engine.\n- Step 2: That huge current $$I$$ causes a large internal voltage drop $$Ir$$ inside the battery, even though $$r$$ is small.\n- Step 3: Terminal p.d. $$V = \\varepsilon - Ir$$ therefore drops temporarily, so the headlights (powered from the same terminals) get less voltage and shine dimmer. Once the engine starts and the starter disengages, $$I$$ drops, $$Ir$$ shrinks, and $$V$$ recovers.\n\nReal-world demonstration: internal resistance becomes visible only when current is large.", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "A current of $$2$$ A flows for $$30$$ seconds through a resistor. What charge flows, and how do you compute this without a calculator? (2 steps)", "answer": "- Step 1: $$Q = It = 2 \\times 30 = 60$$ C. The arithmetic is trivial — that's the point. Charge is just current × time, and the units work out (A × s = C).\n- Step 2: Conceptually: at $$2$$ A, two coulombs of charge cross every second. Over $$30$$ seconds, that's $$60$$ coulombs total. The formula is just the rate × duration.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": false}, {"question": "A wire has resistivity $$1.0 \\times 10^{-6}\\ \\Omega\\ \\text{m}$$, length $$1$$ m, and area $$1 \\times 10^{-6}\\ \\text{m}^2$$. What's its resistance, and why is this a useful sanity check? (3 steps)", "answer": "- Step 1: $$R = \\rho L/A = (10^{-6})(1)/(10^{-6}) = 1\\ \\Omega$$. Easy mental arithmetic.\n- Step 2: This tells you that a wire of $$1$$ m and $$1\\ \\text{mm}^2$$ cross-section made of a \"typical\" resistive material has about $$1\\ \\Omega$$ of resistance.\n- Step 3: Use it as a benchmark: if your $$\\rho L/A$$ calculation gives a \"wire\" with $$10^6\\ \\Omega$$ of resistance, you've probably confused $$\\rho$$ with $$1/\\rho$$ or scrambled the units. Real metals have $$\\rho \\sim 10^{-8}$$, so a metre of standard copper wire has resistance closer to $$10^{-2}\\ \\Omega$$.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": false}, {"question": "Three $$6\\ \\Omega$$ resistors are connected in parallel. What's the total resistance, and what's the quick mental shortcut for $$n$$ equal resistors in parallel? (3 steps)", "answer": "- Step 1: For $$n$$ equal resistors $$R$$ in parallel: $$1/R_T = n/R$$, so $$R_T = R/n$$.\n- Step 2: Three $$6\\ \\Omega$$ in parallel: $$R_T = 6/3 = 2\\ \\Omega$$. No reciprocal arithmetic needed.\n- Step 3: Sanity check: must be smaller than the smallest individual resistor ($$6$$), and yes, $$2 < 6$$. ✓\n\nThe shortcut \"$$R/n$$\" is one of the most useful mental-arithmetic tricks in circuits.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "A cell with $$\\varepsilon = 1.5$$ V and internal resistance $$r = 0.5\\ \\Omega$$ drives a $$2\\ \\Omega$$ load. What's the current and the terminal p.d.? (3 steps)", "answer": "- Step 1: Current: $$I = \\varepsilon/(R+r) = 1.5/(2+0.5) = 1.5/2.5 = 0.6$$ A.\n- Step 2: Terminal p.d.: $$V = \\varepsilon - Ir = 1.5 - 0.6 \\times 0.5 = 1.5 - 0.3 = 1.2$$ V. Equivalently, $$V = IR = 0.6 \\times 2 = 1.2$$ V (same answer, useful cross-check).\n- Step 3: Sanity: $$V$$ ($$1.2$$ V) is less than $$\\varepsilon$$ ($$1.5$$ V) by exactly the internal voltage drop ($$Ir = 0.3$$ V). ✓", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": false}, {"question": "A diode is in a circuit — when is \"infinite resistance\" the right model and when isn't it? (3 steps)", "answer": "- Step 1: In reverse bias (or forward bias below the threshold voltage), an *ideal* diode has $$I = 0$$ so $$R = V/I \\to \\infty$$. Treat the diode as an open circuit (no current flow).\n- Step 2: In forward bias above threshold, the diode conducts; $$R$$ is very small (effectively zero for an ideal diode). Treat it as a short or a small voltage drop.\n- Step 3: A real diode has a transition region (typically $$0.6$$–$$0.7$$ V for silicon) and a small but nonzero reverse current — but for A-level \"ideal diode\" questions, treat the I-V curve as flat at $$I=0$$ then sharply rising, and the resistance as either $$\\infty$$ or essentially $$0$$ depending on which branch you're on.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Why does plotting $$R$$ vs $$L$$ in the resistivity practical give a straight line through the origin, but plotting $$R$$ vs $$T$$ (temperature) for a thermistor does *not*? (3 steps)", "answer": "- Step 1: $$R = (\\rho/A) L$$ is linear in $$L$$ with zero intercept (a wire of zero length has zero resistance). The gradient is the constant $$\\rho/A$$.\n- Step 2: For a thermistor, $$R$$ depends on temperature through an exponential law (because the number of liberated carriers grows exponentially with thermal energy). Plotting $$R$$ vs $$T$$ gives a curve, not a line.\n- Step 3: Different relationships ⇒ different graph shapes. Linearity is a privilege, not a default — it happens when the underlying physics is genuinely proportional.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": false}, {"question": "In a circuit with multiple parallel branches and one ammeter, what does the ammeter actually measure, and how does its placement matter? (3 steps)", "answer": "- Step 1: An ammeter measures the current flowing *through itself*. If it's in the main line (before branching), it reads the total current. If it's in one branch, it reads only that branch's current.\n- Step 2: In parallel circuits, current splits among branches in inverse proportion to their resistances — the lowest-resistance branch carries the most current.\n- Step 3: So always check: which wire is the ammeter in? Then ask \"what's the current through *that* wire?\". Don't assume it reads the total.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": false}, {"question": "Synthesise: a copper wire of $$1$$ m length and $$1\\ \\text{mm}^2$$ cross-section carries $$1$$ A. Given $$\\rho_{\\text{Cu}} \\sim 10^{-8}\\ \\Omega\\ \\text{m}$$ and $$n \\sim 10^{29}\\ \\text{m}^{-3}$$, estimate (a) the wire's resistance, (b) the voltage across it, and (c) the drift velocity — all to within an order of magnitude. (4 steps)", "answer": "- Step 1: Resistance: $$R = \\rho L/A = (10^{-8})(1)/(10^{-6}) = 10^{-2}\\ \\Omega$$. Small, as expected for copper.\n- Step 2: Voltage: $$V = IR = 1 \\times 10^{-2} = 10^{-2}$$ V = $$10$$ mV. Very small voltage to push $$1$$ A through such a wire — copper is a good conductor.\n- Step 3: Drift velocity: $$v = I/(nAq) = 1/[(10^{29})(10^{-6})(1.6 \\times 10^{-19})] = 1/(1.6 \\times 10^{4}) \\approx 6 \\times 10^{-5}$$ m/s — less than a tenth of a millimetre per second. Glacially slow.\n- Step 4: All three numbers fit together: low $$R$$ (good conductor), low $$V$$ needed, and slow drift speed despite the moderate current — because $$n$$ is so large that the carriers don't *need* to move fast to deliver $$1$$ A.\n\nThis is the everyday picture: copper carries current essentially for free, with electrons crawling slowly through a sea of available carriers.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "Why does an LDR have the same kind of behaviour as a thermistor (both decrease resistance when \"stimulated\"), and is this just coincidence? (3 steps)", "answer": "- Step 1: Both are semiconductors. In their unstimulated state, most electrons are bound to atoms — few free carriers, high resistance.\n- Step 2: Stimulation (heat for thermistor, light for LDR) supplies energy that liberates bound electrons into conduction states. More free carriers ⇒ larger $$n$$ in $$I = nAvq$$ ⇒ lower resistance.\n- Step 3: Not a coincidence — it's the same physics with different energy sources. Thermal energy ($$\\sim k_B T$$) vs photon energy ($$h\\nu$$). Both promote electrons across the same band gap, and the resistance response is qualitatively identical.\n\nSemiconductor sensors all share this \"more stimulus ⇒ more carriers ⇒ less resistance\" pattern.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "A student writes: \"the e.m.f. of a cell is the voltage across its terminals\". Why is this wrong, and how should it be corrected? (3 steps)", "answer": "- Step 1: The voltage across the terminals (terminal p.d., $$V$$) and the e.m.f. ($$\\varepsilon$$) are *different* whenever current flows. They're related by $$V = \\varepsilon - Ir$$, so $$V < \\varepsilon$$ during current flow.\n- Step 2: The e.m.f. is the energy per unit charge converted from chemical (or other) energy into electrical energy *by the source itself*. The terminal p.d. is what's left after the internal resistance has taken its share.\n- Step 3: Correct definition: \"the energy converted from other forms into electrical energy per unit charge passing through the source.\" It's a property of the source's internal conversion process, not what a voltmeter reads.\n\nYou only see $$V = \\varepsilon$$ when $$I = 0$$ (open circuit).", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}], "count": 52}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "Why does adding resistors in parallel always produce a total resistance smaller than the smallest individual resistor? (3 steps)", "answer": "- Step 1: In parallel, every branch sees the same potential difference $$V$$ across it. So each branch independently carries its own current $$I_i = V/R_i$$ — adding a new branch doesn't reduce the current in any existing branch.\n- Step 2: The total current drawn from the source is the sum: $$I_{total} = I_1 + I_2 + \\ldots$$. Since each new branch *adds* current at the same $$V$$, the effective resistance $$R_{total} = V/I_{total}$$ must drop.\n+ Think of it like opening extra checkout lanes at a supermarket: more lanes (branches) means more total flow at the same \"pressure\" (voltage).\n- Step 3: Even adding a huge resistor in parallel slightly increases $$I_{total}$$, so $$R_{total}$$ must be strictly less than the smallest existing branch. The smallest branch alone already carries the most current; adding more can only increase total flow further.\n\nTakeaway: parallel = more pathways = less opposition, always below the smallest branch.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": false}, {"question": "Two identical 5 Ω resistors are combined first in series, then in parallel. Without writing out the parallel formula in full, what's the quick mental shortcut for $$N$$ identical resistors in parallel? (2 steps)", "answer": "- Step 1: For $$N$$ identical resistors of value $$R$$ in parallel, the formula $$\\frac{1}{R_{total}} = N \\cdot \\frac{1}{R}$$ collapses to $$R_{total} = R/N$$.\n- Step 2: So two 5 Ω in parallel = $$5/2 = 2.5\\ \\Omega$$; three 6 Ω in parallel = $$6/3 = 2.0\\ \\Omega$$. In series, identical resistors just multiply: $$N \\cdot R$$, so two 5 Ω = 10 Ω.\n\nThis is the fastest sanity check for any \"identical resistors\" MCQ — no need to write reciprocals.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "A common error after applying the parallel formula gives $$1/R = 2/5$$, and students write $$R = 0.4\\ \\Omega$$. What did they forget, and what's the correct value? (2 steps)", "answer": "- Step 1: The formula $$\\frac{1}{R_{total}} = \\sum \\frac{1}{R_i}$$ gives you the *reciprocal* of the total resistance, not the total itself. The \"0.4\" is $$1/R$$, not $$R$$.\n- Step 2: You must flip it one more time: $$R = 5/2 = 2.5\\ \\Omega$$. Sanity check: parallel resistance must be less than the smallest individual (5 Ω) but not absurdly small — 2.5 Ω fits, 0.4 Ω doesn't.\n\nThe \"final reciprocal\" is the single most-dropped mark in parallel-circuit problems.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "For an ideal diode, the resistance is said to be \"infinite\" at certain points on its I–V curve. Conceptually, what makes resistance infinite — is it zero voltage, zero current, or something else? (3 steps)", "answer": "- Step 1: Resistance is defined by $$R = V/I$$. For $$R$$ to blow up to infinity, the denominator $$I$$ must approach zero — the value of $$V$$ in the numerator can be anything (even large).\n- Step 2: This means \"infinite resistance\" corresponds to points lying on the horizontal axis ($$I = 0$$), not the vertical axis ($$V = 0$$).\n+ At the origin both are zero — that's an indeterminate case, not \"infinite\".\n+ In reverse bias an ideal diode has large $$V$$ but $$I = 0$$ — still infinite resistance.\n- Step 3: So for the ideal diode, both the reverse-bias region and the small forward region below the turn-on voltage (where $$I = 0$$) have infinite resistance. Only once it conducts ($$I \\neq 0$$) does the resistance drop sharply.\n\nTakeaway: locate \"no current flowing\" on the graph, not \"no voltage\".", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": true}, {"question": "A student says \"if $$V = 0$$ then $$R = 0$$, so the resistance is zero at the origin of an I–V graph.\" Why is this reasoning wrong? (3 steps)", "answer": "- Step 1: $$R = V/I$$ is a ratio. At the origin both $$V$$ and $$I$$ are zero, giving $$0/0$$ — mathematically undefined, not zero.\n- Step 2: Physically, \"zero resistance\" means a large current flows for a tiny voltage (a superconductor or short circuit) — the I–V curve would be vertical near the origin.\n- Step 3: Conversely, \"infinite resistance\" means no current flows even for large voltage — the curve sits on the $$V$$-axis. The student is confusing the numerator and denominator: resistance is defined by *current flow per unit voltage*, not voltage alone.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": false}, {"question": "Starting from $$I = nAvq$$, derive the expression for drift velocity $$v$$ and explain physically what each symbol represents. (3 steps)", "answer": "- Step 1: $$I = nAvq$$ says: current = (carriers per m³) × (cross-section in m²) × (drift speed in m/s) × (charge per carrier in C). Dimensionally, $$[m^{-3}][m^2][m\\,s^{-1}][C] = C\\,s^{-1} = A$$. ✓\n- Step 2: To isolate $$v$$, divide both sides by $$nAq$$:\n$$v = \\frac{I}{nAq}$$\n- Step 3: Interpretation:\n+ $$n$$ = number density of charge carriers (how *many* are available).\n+ $$A$$ = cross-section (how *wide* the pipe is).\n+ $$q$$ = charge each carrier carries (size of each \"packet\").\n+ The drift velocity is what's left over once we account for how many carriers, how fat the wire is, and how big each charge is — it's the average forward speed of the carriers.\n\nTakeaway: large $$I$$ doesn't require large $$v$$ — copper has so many electrons ($$n \\sim 10^{28}$$) that $$v$$ is tiny (fractions of mm/s).", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "Conduction electrons in copper drift at only about $$10^{-4}$$ m/s, yet a lamp lights instantly when you flip a switch. How do you reconcile this? (3 steps)", "answer": "- Step 1: The *individual* electrons drift slowly — they bounce around the lattice, and the net forward drift is tiny because $$n$$ is enormous.\n- Step 2: But the electric field that pushes them propagates at near light speed through the wire. The instant the switch closes, electrons *everywhere* in the circuit start drifting almost simultaneously.\n- Step 3: It's like a pipe already full of water: pushing in a tiny bit at one end causes water to flow out the other end immediately, even though any individual water molecule has barely moved.\n\nTakeaway: signal speed ≠ drift speed. The \"current turns on\" wave is electromagnetic; the carriers themselves crawl.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "In an MCQ asking for an *expression* (not a number) for drift velocity given $$I$$, $$n$$, $$A$$, what's the fastest elimination technique? (2 steps)", "answer": "- Step 1: Rearrange the governing relation to make the wanted quantity the subject: $$v = I/(nAe)$$. Note which symbols are on top (just $$I$$) and which are on the bottom ($$n$$, $$A$$, $$e$$).\n- Step 2: Scan the options:\n+ Eliminate anything with $$A$$ on top (wrong place).\n+ Eliminate anything missing $$e$$ (electron charge needed since $$q = e$$).\n+ The survivor is the answer — no calculation needed.\n\nThis \"rearrange-then-match\" beats plugging numbers into four expressions.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "Why does a metal wire's resistance *increase* with temperature, but an NTC thermistor's resistance *decrease* with temperature? Use $$I = nAvq$$ to explain. (3 steps)", "answer": "- Step 1: In a metal, the number density $$n$$ is essentially fixed (already one free electron per atom). Heating makes the lattice ions vibrate harder, scattering electrons more often, so the average drift speed $$v$$ falls for a given field. Result: resistance $$\\uparrow$$.\n- Step 2: In an NTC thermistor (semiconductor), heating *liberates* far more charge carriers — $$n$$ rises dramatically (exponentially, in fact). The drift speed $$v$$ still falls a little due to extra scattering, but $$n$$ rises *much faster*.\n- Step 3: In the product $$nAvq$$, the huge jump in $$n$$ dominates the small drop in $$v$$, so $$I$$ rises for a given voltage — meaning resistance falls.\n\nTakeaway: same equation, opposite behaviour, because different effects dominate. In metals $$v$$ wins; in semiconductors $$n$$ wins.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "A negative-temperature-coefficient (NTC) thermistor is in series with a fixed resistor across a battery. The voltmeter is wired across the *thermistor*. Temperature rises — does the voltmeter reading go up or down, and why? (4 steps)", "answer": "- Step 1: NTC thermistor: temperature ↑ ⇒ thermistor resistance $$R_T$$ ↓.\n- Step 2: Total circuit resistance $$R_{total} = R_T + R_F$$ ↓, so by $$I = \\varepsilon / R_{total}$$, the current ↑.\n- Step 3: The voltmeter across the thermistor reads $$V_T = I R_T$$. Here $$I$$ rises but $$R_T$$ falls — which wins?\n+ The thermistor's resistance is dropping faster than the current rises, because $$R_T$$'s fall is what *caused* the current rise in the first place.\n+ Equivalently, the voltage share has shifted *off* the thermistor and *onto* the fixed resistor (total voltage is fixed at $$\\varepsilon$$).\n- Step 4: So $$V_T$$ *decreases*.\n\nTakeaway: the component whose resistance drops \"loses\" its share of the voltage.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "Same NTC circuit, but now the voltmeter is moved to read across the *fixed* resistor. How does its reading change as temperature rises? (3 steps)", "answer": "- Step 1: Same chain: $$R_T$$ ↓ ⇒ $$R_{total}$$ ↓ ⇒ $$I$$ ↑.\n- Step 2: The voltmeter across the fixed resistor reads $$V_F = I R_F$$. Now $$R_F$$ is *constant* and only $$I$$ changes.\n- Step 3: Since $$I$$ rises and $$R_F$$ is fixed, $$V_F$$ rises.\n\nTakeaway: same physical setup, opposite voltmeter verdict — the voltmeter's behaviour depends entirely on *which* component it spans, while the ammeter (measuring $$I$$) gives the same answer either way.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Why is it dangerous to reason about \"voltmeter goes up or down\" purely in your head, and what's the safer method Alex recommends? (3 steps)", "answer": "- Step 1: Hand-waving like \"if resistance goes down, voltage goes down\" misses that *both* $$I$$ and $$R$$ are changing — you have to track which one wins in the product $$V = IR$$.\n- Step 2: The safer method: draw the circuit, assign concrete numbers (e.g. $$\\varepsilon = 12$$ V, $$R_F = 2\\ \\Omega$$, $$R_T = 4\\ \\Omega$$ initially, then $$R_T = 1\\ \\Omega$$ after heating).\n+ Compute $$R_{total}$$, then $$I = \\varepsilon/R_{total}$$, then $$V$$ across the specific meter.\n+ Compare before/after numerically.\n- Step 3: Concrete numbers expose the dominant effect and remove ambiguity. It takes 30 seconds and eliminates any chance of fooling yourself with intuition.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "Define resistivity in words, and explain why it is a property of the *material* but resistance is a property of the *sample*. (3 steps)", "answer": "- Step 1: Resistivity $$\\rho$$ is defined by $$R = \\rho L / A$$, with units Ω m. It quantifies how strongly the material itself opposes current flow per unit length per unit cross-section.\n- Step 2: Resistance $$R$$ depends on shape: a long thin wire of copper has much more resistance than a short fat wire of the same copper, but both have the *same resistivity*.\n+ Stretch a wire: $$L$$ goes up, $$A$$ goes down, so $$R$$ rises rapidly — but $$\\rho$$ is unchanged.\n+ Replace copper with aluminium: same geometry, $$R$$ changes — because $$\\rho$$ changed.\n- Step 3: So $$\\rho$$ characterises the *substance*; $$R$$ characterises *this particular piece* of that substance. A material's resistivity is an intrinsic property like density; resistance is extensive like mass.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "What are the units of resistivity, and what's the common slip students make? (2 steps)", "answer": "- Step 1: From $$\\rho = RA/L$$, units are $$[\\Omega][m^2]/[m] = \\Omega\\, m$$ — ohm metre, with the metre in the numerator.\n- Step 2: The classic slip is writing Ω m⁻¹ (ohm *per* metre). That's the units of $$R/L$$ — resistance per unit length — a different quantity. Resistivity is Ω m, not Ω/m.\n\nMemory hook: \"ohm-times-metre\", not \"ohm-per-metre\".", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "In Core Practical 7 you determine the resistivity of a wire by plotting $$R$$ against $$L$$. Why this graph, and how do you extract $$\\rho$$? (3 steps)", "answer": "- Step 1: Rearrange $$R = \\rho L / A$$ into linear form $$y = mx + c$$: $$R = (\\rho/A) L + 0$$. So plotting $$R$$ (y-axis) against $$L$$ (x-axis) gives a straight line through the origin with gradient $$\\rho/A$$.\n- Step 2: Measure the diameter $$d$$ at several points along the wire using a micrometer (checking zero error and measuring in two perpendicular directions for non-circularity), then $$A = \\pi d^2 / 4$$.\n- Step 3: Compute $$\\rho = (\\text{gradient}) \\times A$$. Using multiple lengths plus a best-fit line averages out random measurement error — more reliable than a single $$R$$ measurement.", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "When measuring a wire's diameter for a resistivity experiment, why do you measure at several points *and* in two perpendicular directions at each point? (2 steps)", "answer": "- Step 1: Several points along the wire: averaging reduces random error from local non-uniformities (the wire isn't perfectly cylindrical end-to-end).\n- Step 2: Two perpendicular directions at each point: checks for ovality / non-circular cross-section. If the two readings differ significantly, the assumption $$A = \\pi d^2 / 4$$ (which assumes a perfect circle) is invalid.\n\nBonus reflex: always check the micrometer for *zero error* before any reading.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": true}, {"question": "Define e.m.f. precisely. What's the difference between \"per unit charge\" and \"per charge particle\", and why does it matter? (3 steps)", "answer": "- Step 1: The e.m.f. of a source is the energy converted from other forms (chemical, mechanical, etc.) into electrical energy *per unit charge* passing through the source. Units: J C⁻¹ = V.\n- Step 2: \"Per unit charge\" means per coulomb. One coulomb contains about $$6.24 \\times 10^{18}$$ electrons.\n- Step 3: \"Per charge particle\" would be per electron — that's $$1.6 \\times 10^{-19}$$ C, smaller by a factor of $$\\sim 10^{19}$$. So saying \"per particle\" gives a number nineteen orders of magnitude wrong, and examiners will not award the mark.\n\nMemorise the exact phrase: *\"per unit charge\"* or *\"per coulomb\"*.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "Why is the terminal p.d. of a battery always less than its e.m.f. when current flows, but equal to the e.m.f. when no current flows? (3 steps)", "answer": "- Step 1: A real cell is modelled as an ideal e.m.f. source $$\\varepsilon$$ in series with an internal resistance $$r$$. The relation is $$V_{terminal} = \\varepsilon - Ir$$.\n- Step 2: When current flows ($$I > 0$$), some energy per coulomb is dissipated as heat inside the cell across $$r$$ — the \"lost volts\" $$Ir$$. So the voltmeter at the terminals reads less than the full $$\\varepsilon$$.\n- Step 3: When $$I = 0$$ (open circuit — voltmeter alone, no load), the $$Ir$$ term vanishes and the voltmeter reads exactly $$\\varepsilon$$. This is the principle behind measuring e.m.f.: use a very-high-impedance voltmeter so $$I \\approx 0$$.\n\nTakeaway: the battery \"feels weaker\" the more current you draw because more energy is wasted internally.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "Rearrange $$\\varepsilon = V + Ir$$ into a form suitable for a graph that determines $$r$$ and $$\\varepsilon$$ simultaneously. What goes on each axis, and how do you extract the values? (3 steps)", "answer": "- Step 1: Rearrange: $$V = \\varepsilon - Ir = (-r)I + \\varepsilon$$. This is $$y = mx + c$$ with $$y = V$$, $$x = I$$, slope $$m = -r$$, intercept $$c = \\varepsilon$$.\n- Step 2: So plot terminal p.d. $$V$$ on the y-axis against current $$I$$ on the x-axis. Vary the external load to get several $$(I, V)$$ pairs, then draw a best-fit straight line.\n- Step 3: Read off:\n+ y-intercept = $$\\varepsilon$$ (the e.m.f.).\n+ gradient = $$-r$$, so internal resistance $$r = -(\\text{gradient}) = -\\Delta V / \\Delta I$$ (positive number since the line slopes down).\n\nKeep the minus sign explicit — losing it is a classic mark-dropper.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "A car battery is six cells in series, each with internal resistance 0.010 Ω. What is the total internal resistance of the battery, and why does it add this way? (2 steps)", "answer": "- Step 1: The cells are in *series*, so the same current passes through each cell's internal resistance. By the series rule, internal resistances add: $$r_{total} = 6 \\times 0.010 = 0.060\\ \\Omega$$.\n- Step 2: Conceptually, the battery is modelled as one combined ideal source ($$\\varepsilon_{total} = 6 \\times \\varepsilon_{cell}$$) with one combined internal resistance ($$r_{total}$$). The current must flow through every internal resistance on its way around — same as any series chain.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "A battery with $$\\varepsilon = 12.00$$ V drives a load. The voltmeter reads 11.81 V and the ammeter 9.83 A. Without computing the exact number, sketch the logic to extract internal resistance and estimate its order of magnitude. (3 steps)", "answer": "- Step 1: Use $$\\varepsilon = V + Ir$$, so the \"lost volts\" across $$r$$ are $$\\varepsilon - V = 12.00 - 11.81 = 0.19$$ V.\n- Step 2: Then $$r = (\\varepsilon - V)/I = 0.19 / 9.83$$. Roughly, $$0.19 \\approx 0.2$$ and $$9.83 \\approx 10$$, so $$r \\approx 0.02\\ \\Omega$$.\n- Step 3: Sanity check: this is comparable to the 6 cells × 0.010 = 0.060 Ω expected from the cell specs — same order of magnitude, slightly below. The internal resistance of a car battery is small (tens of milliohms), consistent with its job: delivering huge starter currents without losing too much voltage internally.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "When you plot $$V$$ vs $$I$$ to find internal resistance, why does the line slope *downward*, and what's the physical meaning of the slope's steepness? (3 steps)", "answer": "- Step 1: From $$V = \\varepsilon - Ir$$, as $$I$$ increases, $$V$$ decreases — so the line goes down to the right.\n- Step 2: Physically: drawing more current means more \"lost volts\" $$Ir$$ inside the cell, so less voltage available at the terminals.\n- Step 3: The steepness $$|{-r}| = r$$ measures how *sensitive* the terminal voltage is to current draw:\n+ A nearly flat line ($$r \\approx 0$$) = ideal cell, terminal voltage barely sags under load.\n+ A steep line = poor (or old) cell, terminal voltage collapses as soon as you draw any current.\n\nTakeaway: low internal resistance = \"stiff\" battery that can deliver heavy currents without sagging.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": true}, {"question": "A source has $$\\varepsilon = 9.0$$ V driving a 5.0 Ω load. Without computing exactly, predict qualitatively how the *power dissipated in the load* changes when the internal resistance jumps from 0.10 Ω to 0.5 Ω. (3 steps)", "answer": "- Step 1: The current is $$I = \\varepsilon/(R+r)$$. Adding more $$r$$ to the denominator means $$I$$ falls a bit.\n- Step 2: Load power is $$P = I^2 R$$. Since $$R$$ is fixed and $$I$$ falls, $$P$$ falls — but quadratically with $$I$$, not linearly.\n- Step 3: How big is the effect? $$r$$ went from being 2% of $$R$$ (0.10/5.0) to 10% of $$R$$ (0.5/5.0). So $$I$$ drops by roughly the change in denominator ratio: from $$9/5.1$$ to $$9/5.5$$, about 7% drop. $$P$$ drops by about $$(0.93)^2 \\approx 86$$% of original. So power falls *to* ~86%, *by* ~14%.\n\nTakeaway: even a modest increase in $$r$$ noticeably eats load power, but a 5× jump in $$r$$ here still leaves most of the power intact because $$r \\ll R$$.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "A student claims that increasing internal resistance from 0.10 Ω to 0.5 Ω (with $$\\varepsilon = 9.0$$ V, $$R = 5.0$$ Ω) cuts the load power to 70% of its original. How do you judge whether this claim is correct? (3 steps)", "answer": "- Step 1: You can't just say \"wrong\" — you must produce the actual percentage and compare. Compute $$I_1 = \\varepsilon/(R+r_1)$$ and $$I_2 = \\varepsilon/(R+r_2)$$, then $$P_i = I_i^2 R$$.\n- Step 2: The ratio of load powers simplifies because $$R$$ cancels: $$P_2/P_1 = (I_2/I_1)^2 = [(R+r_1)/(R+r_2)]^2 = (5.10/5.50)^2 \\approx 0.86$$.\n- Step 3: The actual ratio is ~86%, not 70%. So the claim is *incorrect* — the load power falls only to about 86% (a 14% reduction), not 70%.\n\nExaminer reflex: always quote the comparison number to justify your verdict.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "Distinguish \"falls to 70%\" from \"falls by 70%\" — why does the wording matter when judging a claim about power loss? (2 steps)", "answer": "- Step 1: \"Falls *to* 70%\" means $$P_{new}/P_{old} = 0.70$$ — the new power is 70% of the old (a 30% reduction).\n- Step 2: \"Falls *by* 70%\" means the *change* is 70% of the original, so $$P_{new}/P_{old} = 0.30$$ — only 30% remains.\n+ These differ by more than a factor of two.\n+ Misreading the preposition turns a correct calculation into a wrong answer.\n\nAlways re-read the claim and underline \"to\" or \"by\" before judging.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Lightning carries a current of 25 000 A for 30 μs. Without computing exactly, estimate the total charge transferred and explain why \"tons of current\" can still mean \"tiny charge\". (3 steps)", "answer": "- Step 1: Charge $$Q = I t$$. Plug in qualitatively: $$Q \\sim (2.5 \\times 10^4)(3 \\times 10^{-5}) \\sim 10^0$$ C — order of magnitude is around 1 coulomb (actually 0.75 C).\n- Step 2: One coulomb is the charge that flows past a point in a wire carrying 1 A for 1 second — a perfectly ordinary amount.\n- Step 3: The \"huge\" feel of lightning isn't from total charge, but from the *rate*: cramming ~1 C through in 30 microseconds gives an enormous current, and combined with a billion volts gives enormous *power*. But the cumulative charge is modest.\n\nTakeaway: current is rate, charge is total. Lightning is short and violent, not large in total charge.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "Why is the power of a lightning strike enormous (~$$10^{13}$$ W) even though the total energy transferred is moderate? (3 steps)", "answer": "- Step 1: Power $$P = IV$$. Lightning has $$I \\sim 25{,}000$$ A and $$V \\sim 10^9$$ V, so $$P \\sim 3 \\times 10^{13}$$ W — tens of terawatts.\n- Step 2: But power is *energy per unit time*. The strike lasts only ~30 μs, so total energy $$E = Pt \\sim (3 \\times 10^{13})(3 \\times 10^{-5}) \\sim 10^9$$ J — about a gigajoule, comparable to a few hundred kilograms of TNT, not the entire world's electricity supply.\n- Step 3: The destructive power comes from depositing this energy in an extremely short time and a narrow channel — pressure shockwaves, plasma heating, and thermal expansion all happen too fast to dissipate gradually. It's the *concentration in space and time*, not the cumulative energy, that does the damage.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": true}, {"question": "A lightning channel is 400 m long and 5 cm diameter, carrying 25 000 A under 1.2 GV. Outline how to extract its resistivity, and why the answer comes out much smaller than air's normal resistivity. (4 steps)", "answer": "- Step 1: First get the channel's resistance from Ohm's law: $$R = V/I$$. With $$V \\sim 10^9$$ and $$I \\sim 10^4$$, $$R \\sim 10^5\\ \\Omega$$ (actually ~48 kΩ).\n- Step 2: Compute the cross-section: $$A = \\pi (d/2)^2 = \\pi (0.025)^2 \\approx 2 \\times 10^{-3}$$ m².\n- Step 3: Then $$\\rho = RA/L$$ with $$L = 400$$ m (the channel length, not some \"wire length\"). Order of magnitude: $$(5 \\times 10^4)(2 \\times 10^{-3})/400 \\sim 0.2$$ Ω m.\n- Step 4: Why so small? Ordinary cold air has $$\\rho \\sim 10^{16}$$ Ω m (an excellent insulator). During the strike, the air is *ionised into plasma*, with vastly more free charge carriers (huge $$n$$ in $$I = nAvq$$). High $$n$$ means low resistivity — by ~17 orders of magnitude. The ionisation completely changes the material.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "In the lightning question, why is $$L$$ in the resistivity formula taken as 400 m (the cloud-to-ground distance) and not some other length? (2 steps)", "answer": "- Step 1: In $$R = \\rho L/A$$, $$L$$ is the length of the *conducting path* — the path the current actually travels through the resistive medium. For a lightning bolt, the conducting path is the ionised plasma channel itself, which runs from cloud to ground = 400 m.\n- Step 2: There's no \"cable\" — the lightning *is* its own conductor. So $$L$$ is literally the length of the ionised column you're modelling as a resistor.\n\nCommon slip: confusing $$L$$ with some unrelated distance (e.g. the horizontal distance to the strike). Always ask: \"through what length does current actually flow?\"", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": true}, {"question": "Why is resistivity such a useful concept compared to resistance alone, when characterising or comparing materials? (3 steps)", "answer": "- Step 1: Resistance $$R$$ depends on the specific sample's geometry. Two pieces of copper of different shapes have wildly different $$R$$ — useless for comparing copper to silver.\n- Step 2: Resistivity $$\\rho$$ factors out geometry: $$\\rho = RA/L$$. So a tabulated $$\\rho$$ for copper applies to *any* shape of copper.\n- Step 3: This lets engineers and scientists:\n+ Compare materials directly (copper vs aluminium for wiring).\n+ Design wires of any geometry from a single material constant.\n+ Identify materials experimentally — measure $$R$$, $$A$$, $$L$$, compute $$\\rho$$, look it up.\n\nIt's analogous to using density rather than mass when comparing substances.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "A potential divider has two resistors $$R_1$$ and $$R_2$$ in series across $$V_{in}$$, with $$V_{out}$$ taken across $$R_2$$. Derive the divider formula and explain why $$V_{out}$$ is *proportional* to $$R_2$$. (3 steps)", "answer": "- Step 1: In series the same current flows through both: $$I = V_{in}/(R_1 + R_2)$$.\n- Step 2: The voltage across $$R_2$$ alone is $$V_{out} = IR_2 = V_{in} \\cdot R_2 / (R_1 + R_2)$$.\n- Step 3: Physically, the fixed input voltage is *shared* between the two resistors in proportion to their resistances — the bigger resistor \"uses up\" more of the voltage, because for a fixed current $$V = IR$$ scales linearly with $$R$$. So $$V_{out}$$ is the *fraction* $$R_2/(R_1+R_2)$$ of $$V_{in}$$.\n\nTakeaway: think of a potential divider as splitting a voltage like a lever splits a force — proportional to \"arm length\" ($$R$$).", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "In a potential divider used as a temperature sensor, an NTC thermistor replaces one of the resistors. If the thermistor is the bottom resistor (and $$V_{out}$$ is across it), what happens to $$V_{out}$$ as temperature rises? (3 steps)", "answer": "- Step 1: As temperature rises, the thermistor resistance $$R_T$$ falls.\n- Step 2: $$V_{out} = V_{in} \\cdot R_T / (R_F + R_T)$$. With $$R_T$$ falling, both the numerator falls and the denominator falls — but the ratio's behaviour is dominated by the numerator's relative drop.\n+ Example: $$R_F = 10$$, $$R_T = 10 \\to 2$$. Ratio: $$10/20 = 0.5 \\to 2/12 \\approx 0.17$$. Big drop.\n- Step 3: So $$V_{out}$$ falls as temperature rises. If instead $$V_{out}$$ were across the fixed resistor, it would *rise* — same logic, flipped.\n\nThe component whose resistance drops \"loses its share\" of $$V_{in}$$.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Compare the behaviour of an LDR, an NTC thermistor, and a potentiometer in terms of what changes their resistance. (3 steps)", "answer": "- Step 1: LDR (light-dependent resistor): resistance changes with *light intensity*. Brighter ⇒ lower resistance. Used in light sensors, automatic lights, camera meters.\n- Step 2: NTC thermistor: resistance changes with *temperature*. Hotter ⇒ lower resistance. Used in thermostats, temperature alarms, fridge controllers.\n- Step 3: Potentiometer: resistance changes with *mechanical position* (slider). Three terminals — the slider taps off a chosen fraction of the voltage. Used as volume controls, joysticks, tunable voltage sources.\n\nAll three feed into potential-divider circuits to convert their varying resistance into a varying output voltage.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Why does $$P = V^2/R$$ give the power dissipated in a resistor at constant voltage, but $$P = I^2 R$$ is the form to use at constant current? (3 steps)", "answer": "- Step 1: All three forms ($$P = VI$$, $$P = I^2 R$$, $$P = V^2/R$$) are mathematically equivalent — substitute $$V = IR$$ to derive them from each other.\n- Step 2: But practically, you choose the form whose quantities are *fixed* in your problem:\n+ Parallel circuits: each branch has the same $$V$$. Use $$P = V^2/R$$ to see how each branch shares power.\n+ Series circuits: same $$I$$ everywhere. Use $$P = I^2 R$$ to see how each component shares power.\n- Step 3: Counterintuitive consequence: in parallel, the *smaller* resistor dissipates more power ($$P \\propto 1/R$$). In series, the *larger* resistor dissipates more power ($$P \\propto R$$). Same physics, opposite ranking — because what's fixed differs.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "Two resistors $$R_1 = 2\\ \\Omega$$ and $$R_2 = 8\\ \\Omega$$ in series carry 1 A. Which dissipates more power, and by what factor? (2 steps)", "answer": "- Step 1: Same current $$I = 1$$ A through both. Use $$P = I^2 R$$: $$P_1 = 1 \\cdot 2 = 2$$ W; $$P_2 = 1 \\cdot 8 = 8$$ W.\n- Step 2: $$R_2$$ dissipates 4× more power than $$R_1$$. Intuition: in series the same current \"pushes through\" both, but a bigger $$R$$ requires a bigger voltage drop ($$V = IR$$), and $$P = VI$$ scales with that voltage. Bigger $$R$$ wins.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Two resistors $$R_1 = 2\\ \\Omega$$ and $$R_2 = 8\\ \\Omega$$ in parallel sit across a 4 V source. Which dissipates more power, and by what factor? (2 steps)", "answer": "- Step 1: Same voltage $$V = 4$$ V across both. Use $$P = V^2/R$$: $$P_1 = 16/2 = 8$$ W; $$P_2 = 16/8 = 2$$ W.\n- Step 2: Now $$R_1$$ (the smaller one) dissipates 4× more power. Intuition: at the same voltage, the smaller resistor draws more current ($$I = V/R$$), and $$P = VI$$ scales with current. Smaller $$R$$ wins.\n\nCompare to Q35: series → big-R wins; parallel → small-R wins. The flip is the whole point.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "Why is internal resistance often deliberately kept very small in commercial batteries but sometimes deliberately made significant (e.g. in lab power supplies)? (3 steps)", "answer": "- Step 1: Low $$r$$ means the terminal voltage stays close to $$\\varepsilon$$ even at high currents — vital for a car starter (~200 A) or phone battery (where voltage sag would cause shutdowns).\n- Step 2: But low $$r$$ also means the battery can deliver *enormous* short-circuit currents ($$I_{sc} = \\varepsilon/r$$) — dangerous (fires, exploding cells).\n- Step 3: Lab power supplies often include intentional series resistance (\"current limiting\") to *protect* connected circuits — limits the current if you accidentally short the output. Trade-off: less voltage sag flexibility for safety.\n\nTakeaway: $$r$$ is a knob that trades stiffness for safety.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "A cell has $$\\varepsilon = 6$$ V and $$r = 2\\ \\Omega$$. If you short the terminals directly (zero external resistance), what happens? Compare with attaching a 10 Ω load. (3 steps)", "answer": "- Step 1: Short circuit: $$R_{ext} = 0$$, so $$I = \\varepsilon / r = 6/2 = 3$$ A, and terminal voltage $$V = \\varepsilon - Ir = 6 - 6 = 0$$. *All* the e.m.f. is \"lost\" across the internal resistance — the cell heats up dangerously, no useful output.\n- Step 2: With 10 Ω load: $$I = 6/(10+2) = 0.5$$ A, terminal voltage $$V = 6 - 0.5 \\cdot 2 = 5$$ V. Most of the e.m.f. now appears across the load.\n- Step 3: Lesson: $$r$$ sets the maximum current the cell can deliver. Short-circuiting is bad because all energy dissipates *inside* the cell — battery heats up, voltage at terminals collapses to zero.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "Sketch the qualitative I–V graph for an ideal diode and explain where resistance is infinite, where it's zero, and where it's non-trivial. (3 steps)", "answer": "- Step 1: For $$V < V_{forward}$$ (including all reverse bias): current is zero. The graph sits flat on the V-axis. Here $$R = V/I = V/0 \\to \\infty$$. The diode blocks current.\n- Step 2: At $$V = V_{forward}$$: the diode \"turns on\" abruptly. For $$V > V_{forward}$$: the curve rises vertically (idealised). Here $$R = V/I \\to 0$$ as the curve becomes vertical. The diode conducts freely.\n- Step 3: At the turn-on point itself: the curve has a sharp corner. The resistance transitions discontinuously. Real diodes smooth this corner into an exponential, but for \"ideal diode\" MCQs treat it as a step.\n\nMemorise: ideal diode is a switch — infinite $$R$$ when off, zero $$R$$ when on.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Three 6 Ω resistors are combined in parallel. Without using the full reciprocal formula, what's the answer, and what's the general shortcut? (2 steps)", "answer": "- Step 1: $$N$$ identical resistors in parallel give $$R_{total} = R/N$$. So three 6 Ω in parallel = $$6/3 = 2$$ Ω.\n- Step 2: Cross-check: parallel total must be less than the smallest individual (6 Ω). 2 Ω is less ✓ and feels physically reasonable — three identical pathways carry three times the current, so the effective resistance is one-third.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": false}, {"question": "A wire of resistivity $$1.1 \\times 10^{-6}\\ \\Omega\\,m$$, length 2 m, area $$5 \\times 10^{-7}\\ m^2$$. Sketch the calculation for its resistance and the sanity check on units. (2 steps)", "answer": "- Step 1: $$R = \\rho L / A = (1.1 \\times 10^{-6})(2)/(5 \\times 10^{-7})$$. Numerator $$\\sim 2 \\times 10^{-6}$$, denominator $$5 \\time
