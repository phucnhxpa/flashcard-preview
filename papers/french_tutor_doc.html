<script>
const DATA={"selected": [{"question": "Why \"la viande\" but \"du bœuf\"? (2 steps)", "answer": "- Step 1: Specificity vs generality  \n\"La viande\" = general meat category  \n\"Du bœuf\" = indefinite quantity of beef (uncountable)  \n- Step 2: Grammatical reasoning  \n+ \"Viande\" is always definite (la viande = meat in general)  \n+ \"Bœuf\" as substance requires partitive \"du\"", "source": "Qwen 3 ④", "_id": "qwen_4_13"}, {"question": "Translate: \"They have an appointment\" and identify the verb and article choices. (3 steps)", "answer": "- Step 1: ***Ils ont un rendez-vous.***\n- Step 2: \"They have\" = *ils ont* (or *elles ont* if all-female group). Watch the *avoir/être* trap: *ils ont* (have), not *ils sont* (are).\n- Step 3: \"An appointment\" → *rendez-vous* is **masculine**, so the article is *un*. *Rendez-vous* is invariable in the plural — same form for one or many.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "Translate: \"No, there's no problem.\" Explain the article behavior. (3 steps)", "answer": "- Step 1: ***Non, il n'y a pas de problème.***\n- Step 2: *Il y a* = \"there is/are\" (a fixed expression). In negation, it becomes *il n'y a pas*.\n- Step 3: The article in *un problème* drops to *de* because of the negation rule (indefinite *un* → *de* in negative). Beginner trap: *il n'y a pas **un** problème* is wrong; it must be *pas **de** problème*.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "What does *Je vais prendre...* mean, and what tense/structure is it grammatically? (2 steps)", "answer": "- Step 1: It means **\"I'm going to take / have...\"** — used very commonly when ordering. *Je vais prendre le hamburger* = \"I'll have the hamburger.\"\n- Step 2: Structurally, this is the **near future** (*futur proche*): conjugated *aller* (to go) + infinitive. The mental model is identical to English \"I'm going to [verb].\" It feels less formal than *je prendrai* (simple future) and is the natural choice in spoken French.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "What is 100 in French, and how would you mentally compute 87 = \"quatre-vingt-sept\"? (3 steps)", "answer": "- Step 1: 100 = $$cent$$.\n- Step 2: For 87, start at 80 = *quatre-vingt* (4 × 20). Then add 7: *quatre-vingt-sept*.\n- Step 3: Note no *et* and no *s* on *vingt* once followed by another number.\n\nTakeaway: mental computation = pick the right base (60 for 60s–70s, 80 for 80s–90s) then add.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "In *Ils ont des plats du jour*, identify the two different uses of \"des\"/\"du\" and explain why each is correct. (3 steps)", "answer": "- Step 1: *des plats* — here *des* is the **plural indefinite** (\"some [several] dishes\"). *Plat* is masculine, *plats* is plural, *des* is the plural form of *un*.\n- Step 2: *du jour* — here *du* is *de + le* (contraction): \"of the day.\" It expresses possession/origin, not partitive. *Plat du jour* = \"dish of the day.\"\n- Step 3: So the same letters *du* play two roles in French: the contraction *de + le*, and the partitive article (\"some\" of a mass noun). Context distinguishes them.\n\nTakeaway: *du* can mean either \"of the\" or \"some\" — read the surrounding noun to decide.", "source": "Opus 4.7 ②", "_id": "opus_2_41"}, {"question": "When ordering at a French restaurant, what are three polite ways to say \"I would like to have ___\"? (3 steps)", "answer": "- Step 1: $$Je\\ voudrais\\ \\dots$$ — \"I would like...\" (most common, from *vouloir* in conditional).\n- Step 2: $$J'aimerais\\ \\dots$$ — \"I would like...\" (from *aimer* in conditional, slightly softer).\n- Step 3: $$Je\\ pourrais\\ avoir\\ \\dots$$ — \"Could I have...\" (from *pouvoir* in conditional, asks permission).\n\nTakeaway: all three use the **conditional** mood, which is the French equivalent of English \"would\" — it's the polite register. Avoid *je veux* (\"I want\"), which sounds blunt in a restaurant.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "Misconception probe: Why is *C'est belle* wrong when describing a beautiful house? (3 steps)", "answer": "- Step 1: After *c'est*, the adjective **must be masculine**, regardless of what's being described. So the correct form is ***C'est beau*** (masculine).\n- Step 2: If you want feminine agreement, you must use a sentence with an explicit feminine subject: *La maison est belle* (the house is beautiful) — here *belle* agrees with feminine *maison*.\n- Step 3: The deep reason: *ce* in *c'est* is a neutral pronoun pointing at a general \"it/this\" — not at a specific gendered noun. French defaults to masculine when there's no specific gendered referent.", "source": "Opus 4.7 ①", "_id": "opus_1_58"}, {"question": "Mini-exercise: Order \"I'd like a steak, medium-rare, and a still water, please.\" (3 steps)", "answer": "- Step 1: \"I'd like\" → *Je voudrais* (or *j'aimerais*).\n- Step 2: \"A steak, medium-rare\" → *une entrecôte à point* (or *un steak à point*). *Entrecôte* is feminine, hence *une*; *à point* is a fixed expression for medium-rare/medium.\n- Step 3: \"And a still water\" → *et une bouteille d'eau plate* (literally \"a bottle of still water\"; *eau plate* is feminine).\n\nFull: ***Je voudrais une entrecôte à point et une bouteille d'eau plate, s'il vous plaît.***", "source": "Opus 4.7 ①", "_id": "opus_1_54"}, {"question": "How does French build numbers from 20 to 69? Give the pattern and one example per decade. (3 steps)", "answer": "- Step 1: The base words for the tens are: ***vingt*** (20), ***trente*** (30), ***quarante*** (40), ***cinquante*** (50), ***soixante*** (60).\n- Step 2: To form X1, X2, ... X9, you say [tens] + [unit], with a hyphen. The special case is **X1**, which uses ***et un*** (without hyphen historically, but now often hyphenated): *vingt-et-un, trente-et-un, quarante-et-un...*\n- Step 3: Examples:\n+ 22 = *vingt-deux*\n+ 35 = *trente-cinq*\n+ 41 = *quarante-et-un*\n+ 67 = *soixante-sept*\n\nThe system is fully regular up to 69.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "Why does the French *réunion* (meeting) take *est urgente* with an *e* on the adjective, but *c'est urgent* drops the *e*? (3 steps)", "answer": "- Step 1: *La réunion* is feminine. When an adjective agrees with it explicitly (*la réunion est urgente*), it takes the feminine *-e*.\n- Step 2: With *c'est*, the subject is the vague \"it/this\" — no specific gendered noun to agree with — so the adjective stays masculine singular: *c'est urgent*.\n- Step 3: Same logic gives: *la réunion est finie* (feminine agreement) but *c'est fini* (masculine default).\n\nTakeaway: explicit noun → agreement; *c'est* → masculine default, always.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}, {"question": "What is the difference between \"je suis\" (I am) and \"j'ai\" (I have) in terms of which verb is used for which type of description? (2 steps)", "answer": "- Step 1: - $$Je\\ suis$$ (ÊTRE) = describes state, identity, location, profession\n  - $$J'ai$$ (AVOIR) = describes possession, age, things you \"have\"\n- Step 2: - $$Je\\ suis\\ français$$ = I am French (identity)\n  - $$J'ai\\ vingt\\ ans$$ = I am 20 years old (age, uses AVOIR in French!)\n  - $$Je\\ suis\\ en\\ retard$$ = I am late (state)\n\nRemember: French uses AVOIR for age, not ÊTRE!", "source": "MiniMax ①", "_id": "minimax_1_58"}, {"question": "How would you ask \"What is this?\" or \"What is in the salade niçoise?\" in French? (3 steps)", "answer": "- Step 1: ***Qu'est-ce que c'est ?*** = \"What is this/that?\" Pronounced roughly \"kess-kuh-say.\" It literally breaks down as *que + est-ce + que + c'est*, but treat it as a fixed phrase.\n- Step 2: For asking about contents: ***Qu'est-ce qu'il y a dans... ?*** = \"What is there in...?\" Example: *Qu'est-ce qu'il y a dans la salade niçoise ?*\n- Step 3: You can also combine: *Qu'est-ce que c'est, la salade niçoise ?* — \"What is the salade niçoise?\" (asking for the description of a dish).", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "Simple exercise: How would you say \"We have a coffee\" in two ways, and which is more natural at a café? (3 steps)", "answer": "- Step 1: ***Nous avons un café*** (formal/written) or ***On a un café*** (spoken/informal). Both mean \"We have a coffee.\"\n- Step 2: At a café, you'd more likely *order* one: ***On va prendre un café*** (\"We'll have a coffee\") or ***Je voudrais un café*** if just for yourself.\n- Step 3: *Un café* refers to one cup/serving — countable. If you said *du café*, you'd mean \"some coffee\" (the substance) — less natural for ordering, more natural for \"Il y a du café dans la cuisine\" (\"There's coffee in the kitchen\").", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "What's the difference between *nous avons* and *vous avez*, and why are they easy to confuse? (3 steps)", "answer": "- Step 1: $$nous\\ avons$$ = \"we have\" — 1st person plural.\n- Step 2: $$vous\\ avez$$ = \"you have\" — 2nd person plural or formal singular.\n- Step 3: Both end in similar nasal vowel + consonant patterns (*-ons* vs *-ez*), and both start with *av-*. The key distinction: *-ons* is \"we,\" *-ez* is \"you.\" This *-ons / -ez* pattern recurs in nearly every French verb's conjugation, so internalize it early.", "source": "Opus 4.7 ②", "_id": "opus_2_45"}, {"question": "What’s the difference between \"Il n’a pas de café\" (ne...pas + de) and \"Il n’a pas de café\" (ne...pas de)? Why is \"de\" used instead of \"du\"?", "answer": "- Step 1: **Negation structure**:  \n+ \"Ne...pas\" negates verbs, but the article inside changes.  \n+ Affirmative: \"Il a **du** café\" → partitive *du* for uncountable masculine.  \n- Step 2: **\"Pas de\" rule**:  \n+ In negatives, partitive articles (du/de la/des) drop their articulation and become **de**.  \n+ \"Il n’a **pas de** café\" = \"He doesn’t have any coffee\".  \n- Step 3: **Exceptions**:  \n+ **\"Pas un/deux/...\"**: Refers to specific countables: \"Il n’a **pas un** chat\" = \"He doesn’t have a single cat\".  \n+ **\"Rien de + noun\"**: \"Je n’ai **rien de** spécial\" = \"I have nothing special\".  \n- Step 4: **Why not \"pas du\"?**  \n+ \"Pas du café\" could imply *not that coffee* (e.g., *pas du café de Paul* = not Paul’s coffee), not a general negation.  \n\nOne-sentence takeaway: \"Pas de\" replaces partitive articles in negation to avoid ambiguity, focusing on absence.", "source": "Qwen 3 ③", "_id": "qwen_3_9"}, {"question": "How would a French speaker say a phone number like \"78 65 67 87\"? Break down each pair. (4 steps)", "answer": "French phone numbers are read in pairs of two digits.\n- Step 1: **78** = *soixante-dix-huit* (60 + 18).\n- Step 2: **65** = *soixante-cinq* (60 + 5).\n- Step 3: **67** = *soixante-sept* (60 + 7).\n- Step 4: **87** = *quatre-vingt-sept* (80 + 7).\n\nSo the whole number is *soixante-dix-huit, soixante-cinq, soixante-sept, quatre-vingt-sept*. The pairwise reading is why mastering the 60s–90s is essential for real-life French.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "Why is the negative-with-*pas de* form logically elegant? Probe the deeper reason. (3 steps)", "answer": "- Step 1: *Un/une/du/de la/des* all express *some positive quantity* (one unit, some portion, several items).\n- Step 2: Negation says: that positive quantity is zero — none. Once quantity is zero, the distinction between \"one unit\" and \"some portion\" becomes meaningless. There's just absence.\n- Step 3: So French collapses all positive-quantity articles into one neutral *de* under negation. It's not arbitrary — it reflects the loss of quantitative information.\n\nTakeaway: *pas de* = \"zero of,\" regardless of how the positive form would have been counted.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "Build the sentence \"Could I have a carafe of water, please?\" from scratch, explaining each piece. (4 steps)", "answer": "- Step 1: Polite \"could I have\" → ***Je pourrais avoir*** (from *pouvoir* in conditional + infinitive *avoir*).\n- Step 2: \"A carafe\" → *une carafe* (feminine).\n- Step 3: \"Of water\" → *d'eau* (after the quantity word *carafe*, you use just *de*, and it elides to *d'* before *eau*).\n- Step 4: \"Please\" → *s'il vous plaît* (formal/polite \"you\").\n\nFinal: ***Je pourrais avoir une carafe d'eau, s'il vous plaît ?*** A perfectly polite, ready-to-use restaurant phrase.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Why does French say *pour combien de personnes* with *de* instead of *des*? (3 steps)", "answer": "- Step 1: After expressions of quantity (*combien, beaucoup, un peu, assez, trop*), French uses *de* (or *d'*) — **never** *du/de la/des*.\n- Step 2: So: *combien **de** personnes* (how many people), *beaucoup **de** vin* (a lot of wine), *un peu **d'**eau* (a little water).\n- Step 3: The logic: quantity words already express \"how much/many,\" so adding the partitive *du/des* would be redundant. *De* alone is enough to link the quantifier to the noun.\n\nTakeaway: quantity word + *de* + noun. No partitive.", "source": "Opus 4.7 ②", "_id": "opus_2_47"}, {"question": "How do you politely ask for the bill at a French restaurant? Give at least two phrasings. (3 steps)", "answer": "- Step 1: Most polite: ***Je pourrais avoir l'addition, s'il vous plaît ?*** (\"Could I have the bill, please?\") or with inversion: ***Pourrais-je avoir l'addition ?***\n- Step 2: Shorter, still polite: ***L'addition, s'il vous plaît.*** (\"The bill, please.\")\n- Step 3: Vocabulary point: ***l'addition*** is the standard word; ***la note*** is also acceptable. Avoid asking for *le bill* — borrow words from English don't work here.", "source": "Opus 4.7 ①", "_id": "opus_1_18"}, {"question": "What is the difference between the indefinite articles *un / une / des* and the partitive articles *du / de la / des* in French? (4 steps)", "answer": "- Step 1: *Un / une / des* mean \"a / an / some\" and are used for **countable** things you can count as discrete units: *un croissant* (one croissant), *une pomme* (one apple), *des pommes* (several apples).\n- Step 2: *Du / de la / des* are **partitive** — they mean \"some\" in the sense of \"an unspecified portion of an uncountable substance\": *du café* (some coffee), *de la crème* (some cream), *des épinards* (some spinach, treated as a mass).\n- Step 3: The choice depends on how you mentally treat the noun. *J'ai un chocolat* = \"I have one chocolate (a piece).\" *J'ai du chocolat* = \"I have some chocolate (a portion of the substance).\" Both are correct French — they describe different physical realities.\n- Step 4: *Du* = *de* + *le* (masculine), *de la* = feminine, *des* = plural (and doubles as plural indefinite — context decides).\n\nTakeaway: countable unit → *un/une*; mass/portion → *du/de la*. Both can be plural *des*.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "Explain why we say *du saumon grillé* and not *un saumon grillé* when ordering at a restaurant — what's the conceptual difference? (3 steps)", "answer": "- Step 1: ***Un saumon grillé*** would imply \"**a** (whole) grilled salmon\" — one entire fish as a unit.\n- Step 2: ***Du saumon grillé*** means \"**some** grilled salmon\" — a portion of the dish, an unspecified quantity of the substance. This is what you usually mean when ordering a serving.\n- Step 3: That said, in restaurant context, both are heard because *un saumon grillé* can also mean \"one serving of the grilled salmon\" (like ordering \"a salmon\" from the menu). The strict grammar distinction is portion (partitive *du*) vs unit (indefinite *un*) — but menu language sometimes blurs them.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Reconstruct the typical phone-reservation script: the restaurant answers the phone, and the customer wants a table for 2 tonight at 19h30. Walk through the key exchanges. (6 steps)", "answer": "- Step 1: Restaurant greets: *\"[Nom du restaurant], bonsoir.\"*\n- Step 2: Asks purpose: *\"C'est pour une réservation ?\"* (\"Is it for a reservation?\")\n- Step 3: Asks time: *\"À quelle heure ?\"* → Customer: *\"À 19h30, s'il vous plaît.\"*\n- Step 4: Asks group size: *\"Pour combien de personnes ?\"* → *\"Pour 2 personnes, s'il vous plaît.\"*\n- Step 5: Asks for phone: *\"Votre numéro de téléphone pour confirmer la réservation ?\"*\n- Step 6: Confirms: *\"C'est noté, Monsieur/Madame. À ce soir !\"* → Customer: *\"Merci beaucoup, au revoir !\"*\n\nThe script is highly formulaic — once you internalise these slots, you can run a real reservation with minimal improvisation.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "What are the partitive articles in French, and what concept do they express that English usually leaves implicit? (3 steps)", "answer": "- Step 1: The partitive articles are **du** (masculine), **de la** (feminine), and **des** (plural). They translate as \"some\" in English, but English often drops the word entirely.\n- Step 2: They express an **unspecified quantity of an uncountable / mass noun** — a portion taken from a larger whole. *Je voudrais du café* = \"I'd like (some) coffee\" — not one cup as a unit, but coffee-as-substance.\n- Step 3: Examples:\n+ *du chocolat* — some chocolate (the substance)\n+ *de la crème brûlée* — some crème brûlée\n+ *des épinards* — some spinach\n\nThe mental picture: partitives slice off a portion from a mass; indefinites count whole units.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "What's the difference between *Je voudrais* and *Je veux*, and why should a beginner almost always use the first? (2 steps)", "answer": "- Step 1: ***Je veux*** = \"I want\" (present indicative, direct). ***Je voudrais*** = \"I would like\" (conditional, polite).\n- Step 2: In French culture, *je veux* in a restaurant or shop sounds **demanding, even rude** — equivalent to a child saying \"I want!\" Always default to *je voudrais* or *j'aimerais* or *je pourrais avoir* when interacting with strangers, servers, or in any service context. *Je veux* is fine with close friends or when expressing strong personal desires in private contexts.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "In ordering, what is the difference between \"je pourrais avoir\" and \"est-ce que je peux avoir\"? Which is more polite? (2 steps)", "answer": "- Step 1: - $$Je\\ pourrais\\ avoir$$ = Could I have... (conditional, very polite)\n  - $$Est-ce\\ que\\ je\\ peux\\ avoir$$ = Can I have... (present tense, direct)\n- Step 2: The conditional \"pourrais\" is more polite/hypothetical; the present \"peux\" is more direct but still polite when framed with \"est-ce que.\"\n\nBoth are acceptable; \"pourrais\" is slightly more formal in restaurants.", "source": "MiniMax ①", "_id": "minimax_1_52"}, {"question": "In French negation, what is the difference between \"ne...pas\" and \"pas de\"? When do you use each? (2 steps)", "answer": "- Step 1: **Ne...pas** negates a verb (the full negation):\n  - $$Je\\ ne\\ mange\\ pas$$ = I don't eat\n  - $$Je\\ n'ai\\ pas$$ = I don't have\n- Step 2: **Pas de** replaces the article after a negated verb when referring to a noun:\n  - $$Je\\ n'ai\\ pas\\ de\\ réservation$$ (NOT \"pas de la réservation\")\n  - $$Je\\ ne\\ veux\\ pas\\ de\\ café$$ = I don't want (any) coffee\n\nThe rule: after pas de, use NO article (no un/une/du/de la/des).", "source": "MiniMax ①", "_id": "minimax_1_15"}, {"question": "In French, every noun has a gender — masculine or feminine. Why does this matter, and what does it affect downstream?", "answer": "Gender is grammatical, not natural — *un livre* (book) is masculine, *une table* (table) is feminine, with no logical reason. It matters because it determines: (1) which article you use (*un/le* vs *une/la*), (2) the form of adjectives that modify the noun (they must agree in gender and number), and (3) the pronoun that replaces the noun later (*il* vs *elle*). Getting gender wrong propagates errors through the whole sentence, so beginners should learn each noun *with* its article (not \"chocolat\" but \"**le** chocolat\").", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "Simple exercise: Translate \"She has a plate\" and then negate it. Walk through both. (3 steps)", "answer": "- Step 1: Positive: ***Elle a une assiette.*** *Elle a* (she has, from *avoir*); *une assiette* (a plate — feminine).\n- Step 2: Negation step 1: insert *ne ... pas* around the verb *a*. Since *a* starts with a vowel, *ne* → *n'*: *Elle n'a pas...*\n- Step 3: Negation step 2: the indefinite *une* must drop to *de* in negation → *Elle n'a pas **d'**assiette* (*de* elides to *d'* before *assiette*'s vowel).\n\nFinal: ***Elle n'a pas d'assiette.***", "source": "Opus 4.7 ①", "_id": "opus_1_46"}, {"question": "Put together the full sentence \"Yes, an entrecôte saignante, please\" in French — and explain why the adjective ends in *-e*. (3 steps)", "answer": "- Step 1: ***Oui, une entrecôte saignante, s'il vous plaît.***\n- Step 2: *Entrecôte* is a **feminine** noun (you use *une*, not *un*). It's a cut of beef (rib steak).\n- Step 3: The adjective *saignant* (rare) must agree with the feminine noun → add *-e* → *saignante*. The pronunciation also changes: masculine *saignant* ends in a nasal vowel (\"sehn-yon\"); feminine *saignante* pronounces the *t* (\"sehn-yant\").\n\nThis is a great example of how gender propagates: noun chooses *une* AND forces *-e* on the adjective.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "A waiter asks *Quelle cuisson pour la viande?* What are they asking, and what are the four standard answers from rarest to most cooked? (4 steps)", "answer": "- Step 1: They are asking **\"How would you like your meat cooked?\"** (literally \"Which cooking for the meat?\").\n- Step 2: ***Bleu*** — very rare (barely seared, cold-red inside).\n- Step 3: ***Saignant*** — rare (literally \"bleeding\").\n- Step 4: ***À point*** — medium-rare to medium (literally \"to the point\" — perfectly done by French standards). Beyond that: ***bien cuit*** — well done.\n\nCultural note: French *à point* is closer to American medium-rare; *bien cuit* is rarer in France and sometimes mildly judged.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "Conceptual probe: in *J'ai des chocolats*, what does *des* communicate that English drops, and what changes in the negative? (3 steps)", "answer": "- Step 1: ***Des*** is the plural indefinite article — \"some\" or \"a few\" chocolates, without specifying how many. English usually says just \"I have chocolates\" with no article, but French **requires** an article.\n- Step 2: This is a fundamental difference: French doesn't tolerate bare plural nouns the way English does. You must use *des* (or *les* for \"the chocolates\" specifically, or *du* for the substance).\n- Step 3: In the negative: *Je n'ai pas **de** chocolats* — *des* collapses to *de*, following the same rule as *un/une/du/de la*.", "source": "Opus 4.7 ①", "_id": "opus_1_52"}, {"question": "(3 steps)  \n**Q:** Why does \"Pourrais-je avoir l’addition s’il vous plaît?\" use the conditional mood (\"pourrais\") instead of \"Je veux\" (I want)? Explain the role of \"s’il vous plaît\".", "answer": "- Step 1: **Conditional mood politeness**:  \n+ \"Pourrais-je\" (Could I) softens the request, showing respect.  \n+ Contrast: \"Je veux l’addition\" is direct and may sound rude.  \n- Step 2: **\"S’il vous plaît\" breakdown**:  \n+ \"Si\" = if  \n+ \"Vous\" = you (formal/plural)  \n+ \"Plaît\" = pleases  \n+ Literal: \"If it pleases you\" → \"Please\"  \n- Step 3: **Formal vs. informal**:  \n+ In restaurants, use \"s’il vous plaît\" with strangers.  \n+ With friends: Use \"tu\" form: \"Pourrais-tu m’apporter l’addition?\"  \n\nOne-sentence takeaway: Conditional + \"s’il vous plaît\" transforms a demand into a polite request, crucial in formal settings.", "source": "Qwen 3 ③", "_id": "qwen_3_6"}, {"question": "What's the difference between *Vous avez une crème brûlée* and *Vous avez de la crème brûlée*? (3 steps)", "answer": "- Step 1: *Une crème brûlée* = \"a crème brûlée\" — one whole dessert as a unit (one ramekin).\n- Step 2: *De la crème brûlée* = \"some crème brûlée\" — a portion of the substance (e.g., a spoonful, or unspecified amount).\n- Step 3: *Crème* is feminine, so the partitive is *de la* (not *du*). The choice mirrors the *un/du* split for masculine nouns.", "source": "Opus 4.7 ②", "_id": "opus_2_40"}, {"question": "Quick mental drill: how would you say 71, 75, and 99 in French? (3 steps)", "answer": "- Step 1: 71 = 60 + 11 = $$soixante$$-$$et$$-$$onze$$. (Unique *et* because *onze* is the \"11\" of the sub-sequence.)\n- Step 2: 75 = 60 + 15 = $$soixante$$-$$quinze$$. (No *et*.)\n- Step 3: 99 = 80 + 19 = $$quatre$$-$$vingt$$-$$dix$$-$$neuf$$. (No *et*, no *s* on *vingt*.)\n\nTakeaway: anchor at the base (60 or 80), add the rest, remember *et* only at *soixante-et-onze* and the X1s of 20–60.", "source": "Opus 4.7 ②", "_id": "opus_2_49"}, {"question": "What is the gender and meaning of these nouns: le café, l'eau, la salade, le burger, la crème?", "answer": "- **Le café** → masculine (coffee)\n- **L'eau** → feminine (water — note l' before vowel)\n- **La salade** → feminine (salad)\n- **Le burger** → masculine (burger)\n- **La crème** → feminine (cream)\n\nRemember: In French, every noun has a gender. There's no foolproof rule — you must learn **le/la** with each noun. Common patterns: nouns ending in -tion, -ité, -ence are usually feminine; many nouns ending in -age, -ment are masculine.", "source": "MiniMax ②", "_id": "minimax_2_37"}, {"question": "Why do we say *J'ai* and not *Je ai*? What's the linguistic principle? (2 steps)", "answer": "- Step 1: French dislikes two vowel sounds in a row across word boundaries — called **hiatus**. To avoid it, the final *-e* of short words like *je, ne, le, la, de, me, te, se, ce, que* drops out before a vowel sound, marked with an apostrophe.\n- Step 2: So: *je* + *ai* → ***j'ai***. Same logic: *ne* + *ai* → *n'ai*; *le* + *avion* → *l'avion*; *de* + *eau* → *d'eau*. This elision is mandatory in writing, not optional.", "source": "Opus 4.7 ①", "_id": "opus_1_55"}, {"question": "Why does the French verb AVOIR require partitive articles (du/de la/des) for uncountable nouns like \"J’ai **du** chocolat\" instead of indefinite articles (un/une/des)?", "answer": "- Step 1: **AVOIR** expresses possession of quantities that aren’t individual items. Uncountable nouns (like liquids, powders, or non-divisible amounts) require partitive articles.  \n+ Example: \"J’ai **du** lait\" (I have milk) uses **du** because milk is a continuous substance.  \n- Step 2: Indefinite articles (un/une/des) imply countable singular/plural items. \"J’ai **des** chocolats\" refers to distinct candies, while \"J’ai **du** chocolat\" refers to a mass quantity (e.g., melted chocolate).  \n+ Counterexample: \"Il a **un** café\" means *a cup of coffee* (countable), while \"Il a **du** café\" means *some coffee* (uncountable liquid).  \n- Step 3: In negatives, partitive articles shift to **de** to avoid ambiguity: \"Je n’ai **pas de** café\" (not \"pas du café\"). This avoids implying there’s *some* coffee elsewhere.  \n\nOne-sentence takeaway: Partitive articles in AVOIR constructions highlight uncountable quantity, distinguishing abstract possession from discrete items.", "source": "Qwen 3 ③", "_id": "qwen_3_0"}, {"question": "Once you're seated, what's the first question the waiter usually asks, and how do you respond if you want a bottle of sparkling water? (3 steps)", "answer": "- Step 1: Typical openers: ***Que désirez-vous boire ?*** (\"What would you like to drink?\") or ***Souhaiteriez-vous une bouteille d'eau gazeuse ou d'eau plate ?*** (\"Would you like a bottle of sparkling or still water?\").\n- Step 2: Key vocabulary: ***eau gazeuse*** = sparkling water, ***eau plate*** = still water, ***une carafe d'eau*** = a (free) jug of tap water.\n- Step 3: Response: *Je voudrais une bouteille d'eau gazeuse, s'il vous plaît* — or for the free tap water option, *Une carafe d'eau, s'il vous plaît*.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "In French, what happens to the article after a negation like *ne...pas*? Give the rule and an example. (3 steps)", "answer": "- Step 1: After a negation, the indefinite/partitive articles *un, une, du, de la, des* all collapse into a single form: $$de$$ (or *d'* before a vowel).\n- Step 2: Example: *J'ai une réservation* (I have a reservation) → *Je n'ai pas **de** réservation* (I don't have a reservation). Not *pas une*.\n- Step 3: Logically: negation cancels the existence of the thing, so French no longer cares about its gender or count — it just says \"none of it.\" That's why one neutral *de* replaces all three articles.\n\nTakeaway: *pas de* is the universal negative-quantity marker.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "Translate: \"Yes, I'm late.\" Walk through the verb and structure. (2 steps)", "answer": "- Step 1: ***Oui, je suis en retard.***\n- Step 2: Grammatical points:\n+ Verb is *être* (to be), not *avoir* — French treats \"being late\" as a state of being, like English.\n+ *en retard* is a fixed prepositional phrase meaning \"late.\" Don't translate \"late\" with a single adjective — use this phrase.\n+ Opposite: *en avance* (\"early\"); *à l'heure* (\"on time\").", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "When you say *J'ai une réservation pour deux personnes*, why is it *deux personnes* (plural) and not *deux personne*? (2 steps)", "answer": "- Step 1: French nouns add *-s* in the plural just like English: *personne → personnes*.\n- Step 2: After any number ≥ 2 (or any plural quantity), the noun is plural. *Deux personnes, trois cafés, des chocolats*. Note the *-s* is usually silent in speech but spelled.", "source": "Opus 4.7 ②", "_id": "opus_2_46"}, {"question": "You hear a French speaker say \"J'ai une problème\" — is this correct? If not, what should they say?", "answer": "- Step 1: **Problème** is masculine in French → **un problème** (not \"une\").\n- Step 2: The correct phrase is **J'ai un problème** or **Je n'ai pas de problème**.\n- Step 3: Watch out: most French nouns ending in \"-ème\" are masculine: le problème, le thème, le système.\n\n+ Correct: \"J'ai un problème\" / \"Je n'ai pas de problème\"\n+ Wrong: \"J'ai une problème\" ✗\n\nThis is a common A0/A1 error — memorizing noun gender is essential.", "source": "MiniMax ②", "_id": "minimax_2_29"}, {"question": "Edge case: How would you say \"I have no friends\" in French, and what's the article rule? (3 steps)", "answer": "- Step 1: Positive: *J'ai des amis* (\"I have some friends\" — *des* required because French doesn't allow bare plurals).\n- Step 2: Negative: ***Je n'ai pas d'amis.*** *Des* collapses to *de* under negation; then *de* elides to *d'* before the vowel of *amis*.\n- Step 3: Note that *amis* keeps its plural *-s* — the article changes, not the noun. Common error: writing *je n'ai pas des amis* (no — must be *d'amis*).", "source": "Opus 4.7 ①", "_id": "opus_1_59"}, {"question": "How would you say \"Yes, I'm late\" in French, and what's the gender consideration? (3 steps)", "answer": "- Step 1: $$Oui,\\ je\\ suis\\ en\\ retard.$$ — \"Yes, I am late.\" Uses *être* + *en retard* (a fixed adverbial phrase).\n- Step 2: *En retard* is invariable — it doesn't change form for gender or number. So a man, woman, or group all say *en retard*.\n- Step 3: Compare with adjectives like *content/contente* which would agree. *En retard* is a phrase, not an adjective, hence no agreement.", "source": "Opus 4.7 ②", "_id": "opus_2_35"}, {"question": "What does *être* mean, and how does it conjugate in the present tense for all six pronouns? (6 steps)", "answer": "*Être* means **\"to be\"**. It is highly irregular — you cannot derive it from a pattern; you must memorise it.\n- Step 1: **je** → *je suis*\n- Step 2: **tu** → *tu es*\n- Step 3: **il / elle / on** → *il est / elle est / on est*\n- Step 4: **nous** → *nous sommes*\n- Step 5: **vous** → *vous êtes* (note the circumflex on *ê*, and the liaison \"vous-zêtes\")\n- Step 6: **ils / elles** → *ils sont / elles sont*\n\nWhy irregular? *Être* is one of the most-used verbs in any language, and high-frequency verbs resist regularisation across centuries of speech.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "After *c'est*, what gender must the following adjective take, and why is this a special rule? (2 steps)", "answer": "- Step 1: After ***c'est***, the adjective is **always masculine** (and singular), regardless of what you're describing. Example: *C'est beau* (It's beautiful) — even if you're pointing at a feminine noun like *la maison*.\n- Step 2: The reason: *ce* is a neutral demonstrative pronoun — it doesn't refer to a specific gendered noun, but to a general \"it/this.\" French has no neuter gender for adjectives, so it defaults to masculine. Contrast: *La maison est belle* (feminine agreement, because *maison* is the explicit subject) vs *C'est beau* (no gendered subject → masculine default).", "source": "Opus 4.7 ①", "_id": "opus_1_13"}, {"question": "What does the waiter mean by *Suivez-moi, s'il vous plaît* and *Installez-vous* when you arrive at a restaurant? (2 steps)", "answer": "- Step 1: ***Suivez-moi, s'il vous plaît*** = \"Follow me, please.\" *Suivez* is the *vous* form of *suivre* (to follow), used as a polite command (imperative).\n- Step 2: ***Installez-vous*** = \"Get settled\" / \"Make yourselves comfortable.\" It's a reflexive imperative — literally \"install yourselves.\" Used as you reach your table.\n\nThese are the two phrases you'll hear within the first 30 seconds of entering a sit-down restaurant.", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "A French speaker hands you the choice \"à l'intérieur OU en terrasse\" — what does *ou* mean, and how is it different from *où*? (2 steps)", "answer": "- Step 1: ***ou*** (no accent) = **\"or\"** — connects two alternatives. *Café ou thé ?* = \"Coffee or tea?\"\n- Step 2: ***où*** (with grave accent) = **\"where\"** — a question word. *Où est le restaurant ?* = \"Where is the restaurant?\" The accent is the only written difference, but they're entirely separate words. Pronunciation is identical.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "Synthesis: Why is *Je n'ai pas de réservation* a perfect tiny showcase of three grammar rules at once? (3 steps)", "answer": "- Step 1: **Rule 1 — Elision**: *Je ne* + *ai* → *je n'ai* (vowel-hiatus avoidance: *ne* drops its *e*).\n- Step 2: **Rule 2 — Negation sandwich**: *ne ... pas* wraps around the conjugated verb *ai*.\n- Step 3: **Rule 3 — Article collapse in negation**: *une réservation* (positive) → *de réservation* (negative); indefinite/partitive articles all become *de* under negation.\n\nOne six-word sentence; three foundational beginner rules. This is why drilling it is so valuable.", "source": "Opus 4.7 ①", "_id": "opus_1_57"}, {"question": "In French, what are the six present-tense forms of the verb *avoir* (to have)? (6 steps)", "answer": "- Step 1: 1st person singular: $$j'ai$$ — \"I have.\" Note the elision: *je* + *ai* → *j'ai*, because two vowels collide.\n- Step 2: 2nd person singular: $$tu\\ as$$ — \"you have\" (informal).\n- Step 3: 3rd person singular: $$il/elle/on\\ a$$ — \"he/she/one has.\" Notice *a* alone (no *s*).\n- Step 4: 1st person plural: $$nous\\ avons$$ — \"we have.\"\n- Step 5: 2nd person plural / formal: $$vous\\ avez$$ — \"you have.\"\n- Step 6: 3rd person plural: $$ils/elles\\ ont$$ — \"they have.\"\n\nTakeaway: *avoir* is highly irregular — none of the forms look like the infinitive, so you must memorize the whole table.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "What does the French verb *avoir* mean, and why is it one of the two \"backbone\" verbs you must master first as a beginner?", "answer": "*Avoir* means **\"to have\"**. It is foundational because it expresses possession (*j'ai un livre* — I have a book), is used in countless idiomatic expressions where English uses \"to be\" (e.g. *j'ai faim* — literally \"I have hunger\"), and serves as an auxiliary verb to form past tenses later on. Mastering it early unlocks huge swaths of everyday French.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "Explain the difference between \"avoir\" (to have) used for possession vs. idiomatic expressions. Give one example from the lesson. (2 steps)", "answer": "- Step 1: AVOIR has two uses:\n  1. Literal possession: $$J'ai\\ un\\ livre$$ = I have a book\n  2. Idiomatic expressions: $$J'ai\\ vingt\\ ans$$ = I am 20 years old\n- Step 2: Other idioms with AVOIR:\n  - $$Avoir\\ faim$$ = to be hungry (literally \"to have hunger\")\n  - $$Avoir\\ soif$$ = to be thirsty\n  - $$Avoir\\ chaud/froid$$ = to be hot/cold\n  - $$Avoir\\ raison/tort$$ = to be right/wrong\n\nThese idioms use AVOIR where English uses \"to be.\"", "source": "MiniMax ①", "_id": "minimax_1_88"}, {"question": "What's the difference between saying *Je vais prendre* and *On va prendre* when ordering for a group? (3 steps)", "answer": "- Step 1: $$Je\\ vais\\ prendre\\ \\dots$$ = \"I'll have ...\" — speaking only for yourself.\n- Step 2: $$On\\ va\\ prendre\\ \\dots$$ = \"We'll have ...\" — *on* is informal \"we\" and is conjugated as 3rd person singular (*on va*, not *on allons*).\n- Step 3: Similarly: *on aimerait* (\"we would like\"), *on pourrait avoir* (\"could we have\"). *On* is extremely common in spoken French — more natural than *nous* in casual settings.", "source": "Opus 4.7 ②", "_id": "opus_2_30"}, {"question": "Why \"de l’eau\" but \"de la crème\"? (2 steps)", "answer": "- Step 1: Elision rule  \nWith feminine nouns starting with vowel, use \"de l’\" instead of \"de la\"  \n+ \"De l’eau\" = \"some water\" (feminine vowel-starting noun)  \n- Step 2: Non-elision case  \n\"De la crème\" = \"some cream\" (no vowel elision needed)", "source": "Qwen 3 ④", "_id": "qwen_4_19"}, {"question": "Why does French use *ne... pas* (two pieces) for negation instead of a single word like English \"not\"? Conceptually, how should you think about it? (3 steps)", "answer": "- Step 1: Historically, *ne* alone was the negation in Old French. *Pas* was added for emphasis (originally *pas* meant \"step,\" as in \"I do not walk a step\"). Over centuries, *pas* became obligatory and *ne* started to weaken.\n- Step 2: In modern spoken French, **the *ne* is often dropped entirely**: *J'sais pas* instead of *Je ne sais pas*. But in writing and formal speech, both pieces are required.\n- Step 3: Conceptually, treat *ne ... pas* as a frame that wraps the conjugated verb. Other \"second pieces\" exist too: *ne... jamais* (never), *ne... rien* (nothing), *ne... personne* (nobody). The structure is the same; only the second word changes.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "In French, what is the difference between \"du\" and \"de la\"? When is each used? (1 step)", "answer": "- Step 1: Both mean \"some\" (partitive article), but:\n  - $$Du$$ = some + masculine noun ($$du\\ café$$ = some coffee)\n  - $$De\\ la$$ = some + feminine noun ($$de\\ la\\ crème$$ = some cream)\n\nThe choice depends on the gender of the noun that follows, NOT on the noun being \"countable\" vs \"uncountable\" — both are used with mass/uncountable nouns.", "source": "MiniMax ①", "_id": "minimax_1_25"}, {"question": "Give the full present-tense conjugation of *avoir* for all six subject pronouns. (6 steps)", "answer": "- Step 1: **je** → *j'ai* (note the elision: *je* + *ai* contracts to *j'ai* because *ai* starts with a vowel)\n- Step 2: **tu** → *tu as*\n- Step 3: **il / elle / on** → *il a / elle a / on a*\n- Step 4: **nous** → *nous avons*\n- Step 5: **vous** → *vous avez*\n- Step 6: **ils / elles** → *ils ont / elles ont* (careful: pronounced \"ils zon\" with liaison; do not confuse with *ils sont* = \"they are\")\n\nThe big trap: *ils ont* (have) vs *ils sont* (are) — same vowel sound, different meaning.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "What is the key difference between *avoir* and *être* in meaning, and why do beginners confuse *ils ont* with *ils sont*? (3 steps)", "answer": "- Step 1: *Avoir* = **to have** (possession), *être* = **to be** (identity, state, location).\n- Step 2: *Ils ont* = \"they have\"; *ils sont* = \"they are\". The vowel sounds are very close in French: \"il-zon\" vs \"il-son\".\n- Step 3: The disambiguating trick: *avoir* forms tend to start with a vowel after the pronoun (*ai, as, a, ont*) → liaison gives a \"z\" sound (*ils-zont*). *Être* forms start with *s-* (*suis, sont, sommes*). When you hear an *s* sound at the start of the verb, it's *être*.", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "Why is *quatre-vingt-un* written without *et*, while *vingt-et-un* and *soixante-et-onze* are written with *et*? (3 steps)", "answer": "- Step 1: The *et* (and) appears in: 21 (*vingt-et-un*), 31 (*trente-et-un*), 41, 51, 61, and 71 (*soixante-et-onze*). It's used when adding \"+1\" or \"+11\" to a clean tens base.\n- Step 2: It is **dropped** for 81 (*quatre-vingt-un*) and 91 (*quatre-vingt-onze*) because 80 isn't a pure \"ten\" — it's 4×20, a multiplicative base, so the \"+1\" doesn't trigger the *et* idiom.\n- Step 3: This is irregular and historical — just memorise: tens 20–70 use *et un / et onze*; 80 and 90 don't.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "A waiter says *C'est noté, Monsieur* at the end of your reservation call. What does this mean and what's the cultural register? (2 steps)", "answer": "- Step 1: ***C'est noté*** literally = \"It's noted.\" Idiomatically = **\"Got it\" / \"It's all set.\"** Confirms the reservation has been recorded.\n- Step 2: Adding *Monsieur* (or *Madame*) is standard polite French — you address strangers by title, not first name. The exchange typically ends *À ce soir !* (\"See you tonight!\") and *Merci, au revoir !* — a tidy, formulaic close.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "Why is 80 in French *quatre-vingts*? And what's odd about the spelling? (3 steps)", "answer": "- Step 1: 80 = 4 × 20 = ***quatre-vingts*** (\"four-twenties\"). This is the vigesimal (base-20) system at its clearest — count by twenties.\n- Step 2: Note the **-s** on *vingts*: it appears only when *quatre-vingts* stands alone or ends the number. When a unit follows, the *-s* disappears: 81 = *quatre-vingt-un* (no *-s*), 85 = *quatre-vingt-cinq*.\n- Step 3: Also note: 81 does **not** use *et un* (unlike 21, 31...). You say *quatre-vingt-un*, not *quatre-vingt-et-un*. This is because *et un* is a special idiom that only applies to \"round tens + 1,\" and 80 isn't a \"round ten\" — it's a 4×20.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "Why is 70 in French *soixante-dix* and not its own word? What's the logic? (3 steps)", "answer": "- Step 1: Old French used a base-20 (vigesimal) system inherited from Celtic/Gaulish influence. Modern standard French preserves this oddity from 70 onward.\n- Step 2: $$soixante$$-$$dix$$ literally means \"sixty-ten\" = 60 + 10 = 70. So you keep counting *up from sixty*: 71 = *soixante-et-onze* (sixty-and-eleven), 72 = *soixante-douze* (sixty-twelve), ..., 79 = *soixante-dix-neuf* (sixty-nineteen).\n- Step 3: Note 71 uniquely re-uses *et* (\"and\") because *onze* (eleven) starts a new sub-sequence — it's the \"X1\" of the soixante-dix block.\n\nTakeaway: 70–79 = \"60 + (10 through 19).\"", "source": "Opus 4.7 ②", "_id": "opus_2_20"}, {"question": "What does the waiter mean by *Est-ce que vous les voulez en même temps ?* (3 steps)", "answer": "- Step 1: Literal: \"Do you want them at the same time?\"\n- Step 2: Context: when you've ordered multiple dishes (e.g., starter + main, or two mains), the waiter checks whether to serve them simultaneously or in sequence.\n- Step 3: *En même temps* = \"at the same time\" — a useful set phrase.", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "Translate: \"No, there's no problem.\" Why does *un* become *de* here? (3 steps)", "answer": "- Step 1: Affirmative: *Il y a un problème* (\"There is a problem\"). Construction: *il y a* = \"there is/are.\"\n- Step 2: Negate: wrap *il y a* with *ne...pas* → *il n'y a pas*. Then the article *un* must collapse to *de* (the negation rule).\n- Step 3: Result: $$Non,\\ il\\ n'y\\ a\\ pas\\ de\\ probl\\grave{e}me.$$\n\nTakeaway: any *un/une/du/de la/des* after negation → *de*.", "source": "Opus 4.7 ②", "_id": "opus_2_34"}, {"question": "What does the phrase \"qu'est-ce qu'il y a dans...\" mean, and how does it differ from \"qu'est-ce que c'est\"? (2 steps)", "answer": "- Step 1: - $$Qu'est-ce\\ que\\ c'est$$? = What is this? (asking for definition/name)\n  - $$Qu'est-ce\\ qu'il\\ y\\ a\\ dans$$...? = What is there in...?(asking for ingredients)\n- Step 2: Example: - $$Qu'est-ce\\ que\\ c'est\\ la\\ salade\\ niçoise$$? = What is niçoise salad? (definition)\n  - $$Qu'est-ce\\ qu'il\\ y\\ a\\ dans\\ la\\ salade$$? = What's in the salad? (ingredients)\n\nUse the second for asking about dish contents.", "source": "MiniMax ①", "_id": "minimax_1_93"}, {"question": "What's the French word for 100, and what tiny spelling rule applies when it's pluralised? (2 steps)", "answer": "- Step 1: 100 = ***cent***. Just one syllable, pronounced \"son\" (nasal).\n- Step 2: Like *vingt*, *cent* takes an **-s** when it's a round multiple (e.g. *deux cents* = 200), but loses the *-s* when followed by another number (*deux cent un* = 201). This is the same logic as *quatre-vingts* → *quatre-vingt-un*.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "What is the meaning of \"faire une réservation\" and why is \"faire\" used instead of \"avoir\"? (2 steps)", "answer": "- Step 1: $$Faire\\ une\\ réservation$$ = to make a reservation\n- Step 2: In French, \"faire\" (to do/make) is used for many actions where English uses other verbs:\n  - $$Faire\\ une\\ réservation$$ = to make a booking\n  - $$Faire\\ un\\ voyage$$ = to take a trip\n  - $$Faire\\ ses\\ devoirs$$ = to do homework\n\nThis is a common verb that doesn't translate literally — it's part of French idiom.", "source": "MiniMax ①", "_id": "minimax_1_80"}, {"question": "Translate: \"They have an appointment.\" What gender is *rendez-vous*? (3 steps)", "answer": "- Step 1: \"They have\" = *ils ont* (or *elles ont* if all-female group).\n- Step 2: *Rendez-vous* is masculine, so \"an appointment\" = *un rendez-vous*. (It's invariable in the plural too: *des rendez-vous*.)\n- Step 3: Full: $$Ils\\ ont\\ un\\ rendez$$-$$vous.$$", "source": "Opus 4.7 ②", "_id": "opus_2_36"}, {"question": "Translate to French: \"I don't have any chocolate.\" Walk through the article transformation. (3 steps)", "answer": "- Step 1: Affirmative form: *J'ai du chocolat* — partitive *du* because chocolate is treated as a mass.\n- Step 2: Apply negation *ne...pas*: *Je n'ai pas du chocolat* — but this is wrong! Negation collapses *du* to *de*.\n- Step 3: Correct: $$Je\\ n'ai\\ pas\\ de\\ chocolat.$$\n\nTakeaway: the negation kills the partitive — there's \"none of\" the substance, so French uses neutral *de*.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "Why is *une carafe d'eau* spelled with *d'* instead of *de*? (2 steps)", "answer": "- Step 1: *De* + a word starting with a vowel triggers elision → *d'*. *Eau* starts with the vowel *e*.\n- Step 2: So *de eau* becomes *d'eau*. The full phrase *une carafe d'eau* = \"a carafe of water\" — the *de* expresses \"of/containing.\"\n\nTakeaway: elision (*de → d'*) before any vowel is automatic and obligatory.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "The numbers 11–16 in French don't follow the \"ten + unit\" pattern — they have unique names. List them and explain the logic shift at 17. (3 steps)", "answer": "- Step 1: 11–16: ***onze, douze, treize, quatorze, quinze, seize*** — six unique words inherited from Latin (*undecim, duodecim*...).\n- Step 2: From **17 onward**, French switches to a compound pattern: ***dix-sept*** (10 + 7), ***dix-huit*** (10 + 8), ***dix-neuf*** (10 + 9).\n- Step 3: Why the switch? It's a historical quirk — Latin had unique forms up to about 16, and French preserved them. After that, the compound system kicks in. This is similar in spirit to English \"eleven, twelve\" then \"thirteen, fourteen...\" but the cutoff is different.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "Compare *J'ai un chocolat* vs *J'ai du chocolat* vs *J'ai des chocolats*. What does each one actually mean? (3 steps)", "answer": "- Step 1: *J'ai **un** chocolat* — \"I have **a** chocolate\" (one whole piece, countable).\n- Step 2: *J'ai **du** chocolat* — \"I have **some** chocolate\" (a quantity of chocolate-as-substance; could be a bar, a smear, an amount).\n- Step 3: *J'ai **des** chocolats* — \"I have **(some) chocolates**\" (multiple individual pieces, countable plural).\n\nThe takeaway: the article tells the listener whether you're counting whole items or referring to a portion of a substance — a distinction English speakers must consciously make.", "source": "Opus 4.7 ①", "_id": "opus_1_9"}, {"question": "Order the events in a typical French restaurant interaction from arrival to departure. (6 steps)", "answer": "- Step 1: Greeting & seating: *Bonsoir. Suivez-moi, s'il vous plaît. Installez-vous.*\n- Step 2: Drinks: *Que désirez-vous boire ?* — order water (still/sparkling) and other drinks.\n- Step 3: Ordering: *Avez-vous fait votre choix ?* — reply *Je vais prendre / Je voudrais ...*\n- Step 4: Clarifying questions: *Quelle cuisson pour la viande ? Est-ce que vous les voulez en même temps ?*\n- Step 5: Mid-meal check-in: *Est-ce que tout va bien ?* and *Je reviens tout de suite* if the waiter steps away.\n- Step 6: Bill: *L'addition, s'il vous plaît.* Then *Merci, au revoir.*", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "Why is 90 in French *quatre-vingt-dix*? Extend the pattern up to 99. (3 steps)", "answer": "- Step 1: $$quatre$$-$$vingt$$-$$dix$$ literally means \"four-twenty-ten\" = (4×20) + 10 = 90. It combines both quirks (base-20 + the \"tens+teens\" trick used for 70).\n- Step 2: 91 = *quatre-vingt-onze* (4×20 + 11), 92 = *quatre-vingt-douze*, ..., 99 = *quatre-vingt-dix-neuf* (4×20 + 19).\n- Step 3: So 90–99 = (80) + (10 through 19). No *et*, even at 91.\n\nTakeaway: French 90s = \"80 + teens.\"", "source": "Opus 4.7 ②", "_id": "opus_2_22"}, {"question": "Why is \"Je reviens tout de suite\" useful in a restaurant? (2 steps)", "answer": "- Step 1: **\"Je reviens\"** = \"I’m coming back\" (temporary absence)  \n- Step 2: **\"Tout de suite\"** = \"Right away\" (reassures customers)  \n+ Example: When a waiter leaves to fetch something", "source": "Qwen 3 ①", "_id": "qwen_1_13"}, {"question": "Why might *un croque-monsieur* always stay masculine, even though it's a food (which can be either gender)? (2 steps)", "answer": "- Step 1: Gender in French is fixed per noun and often unpredictable from meaning. *Croque-monsieur* is masculine because its second element, *monsieur* (\"mister\"), is masculine — the compound inherits the gender of its head.\n- Step 2: This is a general principle: in compound nouns, the gender usually follows the most semantically central element. Hence *un croque-monsieur*, and in plural *des croques-monsieur* (the *monsieur* part is invariable, oddly enough — a quirk of compound spelling).", "source": "Opus 4.7 ①", "_id": "opus_1_53"}, {"question": "Explain why French says \"j'ai vingt ans\" (I have 20 years) instead of \"je suis vingt ans\" (I am 20 years). (1 step)", "answer": "- Step 1: In French, age is expressed using the verb AVOIR (to have), not ÊTRE (to be).\n- $$J'ai\\ vingt\\ ans$$ = I have 20 years (literally)\n- This is a common point of confusion — it's one of the key differences between French and English thinking.", "source": "MiniMax ①", "_id": "minimax_1_64"}, {"question": "What happens to *un*, *une*, *du*, *de la*, *des* when the sentence becomes negative? Give the rule and an example. (3 steps)", "answer": "- Step 1: In negation, **all indefinite and partitive articles collapse to a single form: *de*** (or *d'* before a vowel).\n- Step 2: Examples:\n+ *J'ai **un** chocolat* → *Je n'ai **pas de** chocolat* (not *pas un*)\n+ *J'ai **du** café* → *Je n'ai **pas de** café*\n+ *J'ai **des** amis* → *Je n'ai **pas d'**amis*\n- Step 3: The intuition: in negation, you're denying any amount at all — there's nothing to \"partition\" or \"count,\" so French uses the neutral *de*. Exception: this does **not** apply with *être* (*Ce n'est pas **un** problème* — article stays because *être* is identification, not possession/quantity).", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "Build the sentence \"She has some grilled salmon\" two different ways, and explain the difference. (3 steps)", "answer": "- Step 1: Option A (countable): $$Elle\\ a\\ un\\ saumon\\ grill\\acute{e}.$$ — \"She has a (whole) grilled salmon\" (one fish/portion as a unit).\n- Step 2: Option B (partitive): $$Elle\\ a\\ du\\ saumon\\ grill\\acute{e}.$$ — \"She has some grilled salmon\" (a portion of salmon as food/substance).\n- Step 3: *Saumon* is masculine, so *un* / *du*. *Grillé* agrees as masculine singular (no extra *e*).\n\nTakeaway: same dish, different framing — *un* for a unit, *du* for a portion.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "Why \"du pain\" but \"des baguettes\"? (2 steps)", "answer": "- Step 1: Substance vs countable items  \n\"Du pain\" = \"some bread\" (uncountable mass noun)  \n\"Des baguettes\" = \"some baguettes\" (countable individual items)  \n- Step 2: Grammatical reasoning  \n+ \"Pain\" is non-countable → partitive \"du\"  \n+ \"Baguettes\" countable plural → \"des\"", "source": "Qwen 3 ④", "_id": "qwen_4_9"}, {"question": "What is the correct form: \"un table\" or \"une table\"? (1 step)", "answer": "- Step 1: Feminine noun requirement  \nLa/une table (feminine)  \n+ Despite ending in -e, \"table\" is feminine  \n+ Common feminine ending -e, but not all nouns ending -e are feminine", "source": "Qwen 3 ④", "_id": "qwen_4_17"}, {"question": "When you answer the phone at a French restaurant, you say \"Le restaurant [name], bonsoir.\" What does this format show about French telephone etiquette? (1 step)", "answer": "- Step 1: French phone etiquette requires stating:\n  - Who you are / which establishment\n  - The time of day (bonjour/bonsoir)\n- This is more formal than English \"Hello?\" and is expected in all business contexts.", "source": "MiniMax ①", "_id": "minimax_1_85"}], "models": {"qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "What are the French translations for: \"I would like to have\" (formal), \"I'm going to take\", and \"What is this?\" (3 steps)", "answer": "- Step 1: \"I would like to have\" → **Je voudrais avoir** (formal) or **J'aimerais avoir**  \n- Step 2: \"I'm going to take\" → **Je vais prendre** (common in restaurants)  \n+ Example: \"Je vais prendre le hamburger\"  \n- Step 3: \"What is this?\" → **Qu'est-ce que c'est ?** (literally \"What is that which it is?\")  \n+ Used to ask for definitions, like \"Qu'est-ce que c'est la salade niçoise?\"", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": false}, {"question": "How do you conjugate the verb AVOIR (to have) in the present tense? (6 steps)", "answer": "- Step 1: **J'ai** (I have) → \"J’ai un chocolat\"  \n- Step 2: **Tu as** (You have) → \"Tu as des plats du jour\"  \n- Step 3: **Il/Elle/On a** (He/She/One has) → \"Elle a du saumon grillé\"  \n- Step 4: **Nous avons** (We have) → \"Nous avons une réservation\"  \n- Step 5: **Vous avez** (You have) → \"Vous avez une crème brûlée\"  \n- Step 6: **Ils/Elles ont** (They have) → \"Ils ont un café\"", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": false}, {"question": "When do you use un/une/des vs du/de la/des? Explain with examples. (4 steps)", "answer": "- Step 1: **un/une/des** = Countable nouns (singular/plural)  \n+ Example: \"J’ai un croque-monsieur\" (singular)  \n- Step 2: **du/de la/des** = Uncountable nouns (partitive articles)  \n+ Example: \"Il a du café\" (non-countable liquid)  \n- Step 3: Rule: Use **de la** for feminine uncountable nouns  \n+ Example: \"de la crème brûlée\"  \n- Step 4: In negation, partitive becomes **pas de**  \n+ Example: \"Je n’ai pas de réservation\"", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": false}, {"question": "Why is \"c’est\" followed by a masculine adjective like \"beau\" even for feminine nouns? (2 steps)", "answer": "- Step 1: **\"C’est\" = \"ce + est\"** → \"ce\" is a masculine pronoun (this)  \n+ Example: \"C’est une chaise\" (feminine noun) vs. \"C’est beau\" (masculine)  \n- Step 2: Adjective agrees with **\"ce\"** (masculine), not the noun  \n+ Exception: \"C’est une belle chaise\" (only the noun is described)", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "How do you form negative sentences with AVOIR? Provide examples. (7 steps)", "answer": "- Step 1: Add **ne...pas** around the verb  \n- Step 2: **Je n’ai pas** → \"I don’t have\"  \n+ Example: \"Je n’ai pas de problème\" (no reservation issue)  \n- Step 3: **Tu n’as pas**  \n+ Example: \"Tu n'as pas d'idée\" (You don’t have an idea)  \n- Step 4: **Il/Elle/On n’a pas**  \n+ Example: \"Il n’a pas de café\"  \n- Step 5: **Nous n’avons pas**  \n- Step 6: **Vous n’avez pas**  \n+ Example: \"Vous n’avez pas de réservation\"  \n- Step 7: **Ils/Elles n’ont pas**  \n+ Example: \"Ils n’ont pas de plats du jour\"", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "How do you count from 70–100 in French? Explain the logic. (4 steps)", "answer": "- Step 1: **70 = soixante-dix** (\"60+10\")  \n- Step 2: **80 = quatre-vingts** (\"4×20\")  \n+ Example: 81 = **quatre-vingt-un**  \n- Step 3: **90 = quatre-vingt-dix** (\"4×20+10\")  \n+ Example: 91 = **quatre-vingt-onze**  \n- Step 4: **100 = cent**  \n+ Practice: 75 = **soixante-quinze**, 88 = **quatre-vingt-huit**", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": false}, {"question": "How do you make a restaurant reservation in French? List key phrases. (5 steps)", "answer": "- Step 1: Opening: **\"Je voudrais réserver une table\"** or **\"Est-ce que vous avez des réservations pour ce soir?\"**  \n- Step 2: Confirm time: **\"à quelle heure?\"** → \"At what time?\"  \n- Step 3: Specify guests: **\"pour combien de personnes?\"** → \"For how many people?\"  \n- Step 4: Provide phone number: **\"C’est le 06...\"** (note French number pronunciation: 70=soixante-dix)  \n- Step 5: Closing: **\"Merci beaucoup, au revoir !\"**", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}, {"question": "Why do French waiters ask \"Quelle cuisson pour la viande?\" and what are the options? (4 steps)", "answer": "- Step 1: **\"Quelle cuisson\"** = \"How would you like your meat cooked?\"  \n- Step 2: Options:  \n+ **Bleu** (very rare)  \n+ **Saignant** (rare)  \n+ **À point** (medium rare)  \n+ **Bien cuit** (well done)  \n- Step 3: Cultural context: French diners expect precise meat doneness  \n- Step 4: Customer response: **\"Une entrecôte saignante, s’il vous plaît\"**", "source": "Qwen 3 ①", "_id": "qwen_1_7", "judge_pick": false}, {"question": "How do you order food in a restaurant? List customer and waiter phrases. (6 steps)", "answer": "- Step 1: Customer: **\"Je voudrais...\"** or **\"Est-ce que je peux avoir...\"**  \n- Step 2: Waiter: **\"Que désirez-vous boire?\"** → \"What would you like to drink?\"  \n- Step 3: Waiter: **\"Avez-vous fait votre choix?\"** → \"Have you made your choice?\"  \n- Step 4: Customer: **\"Oui, je vais prendre...\"** (I’ll have...)  \n- Step 5: Waiter: **\"Est-ce que tout va bien?\"** → \"Is everything okay?\"  \n- Step 6: Customer: **\"Oui, merci\"**", "source": "Qwen 3 ①", "_id": "qwen_1_8", "judge_pick": false}, {"question": "Why is \"Vous avez une réservation ?\" correct instead of \"de la réservation\"? (2 steps)", "answer": "- Step 1: **\"Une\" = countable** (a specific reservation exists)  \n+ Example: \"Oui, j'ai une réservation\"  \n- Step 2: **\"De la\" = uncountable** (non-specific quantity)  \n+ Not used here because reservations are specific bookings", "source": "Qwen 3 ①", "_id": "qwen_1_9", "judge_pick": false}, {"question": "How do you distinguish between masculine and feminine nouns in French? Give 3 rules. (4 steps)", "answer": "- Step 1: **Endings**: Feminine nouns often end in -e  \n+ Example: **une serveuse** (female waiter) → **un serveur** (male)  \n- Step 2: **Same word**: Some nouns change gender with the article  \n+ Example: **la victime** (feminine) vs **le victime** (invalid)  \n- Step 3: **Exceptions**: **le problème** (masculine) despite ending in -ème  \n- Step 4: Memorize common patterns: professions often have gendered forms", "source": "Qwen 3 ①", "_id": "qwen_1_10", "judge_pick": false}, {"question": "How do adjectives agree with nouns in French? Use \"c'est\" and \"la réunion\" as examples. (5 steps)", "answer": "- Step 1: **\"C'est\"** → adjective masculine (due to \"ce\" being masculine)  \n+ Example: \"C'est beau\" (even for \"la musique\")  \n- Step 2: **\"La réunion est urgente\"** → feminine adjective (matches \"réunion\")  \n- Step 3: Rule: Adjective matches the noun's gender and number  \n+ Example: \"Les réunions sont urgentes\" (plural)  \n- Step 4: Common mistakes: Forgetting plural -s  \n- Step 5: Exceptions: Adjectives like \"vieux\" change forms based on position", "source": "Qwen 3 ①", "_id": "qwen_1_11", "judge_pick": false}, {"question": "How is \"Est-ce que vous les voulez en même temps?\" used in a restaurant? (3 steps)", "answer": "- Step 1: **\"Vous\"** = plural (polite form)  \n- Step 2: **\"Les\"** = dishes (plural)  \n+ Example: \"Est-ce que vous les voulez ensemble?\" (Would you like them together?)  \n- Step 3: Cultural note: Waiters in France often serve dishes sequentially", "source": "Qwen 3 ①", "_id": "qwen_1_12", "judge_pick": false}, {"question": "Why is \"Je reviens tout de suite\" useful in a restaurant? (2 steps)", "answer": "- Step 1: **\"Je reviens\"** = \"I’m coming back\" (temporary absence)  \n- Step 2: **\"Tout de suite\"** = \"Right away\" (reassures customers)  \n+ Example: When a waiter leaves to fetch something", "source": "Qwen 3 ①", "_id": "qwen_1_13", "judge_pick": true}], "count": 14}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "What are the full present tense conjugations of the verb **avoir** (to have) in French? (6 steps)", "answer": "- Step 1: **J’ai** (I have) – first-person singular.  \n- Step 2: **Tu as** (You have) – second-person singular.  \n- Step 3: **Il/Elle/On a** (He/She/One has) – third-person singular.  \n- Step 4: **Nous avons** (We have) – first-person plural.  \n- Step 5: **Vous avez** (You have) – second-person plural/formal.  \n- Step 6: **Ils/Elles ont** (They have) – third-person plural.  \n+ Example: *J’ai un livre* (I have a book).  \n+ Example: *Ils ont des pommes* (They have apples).", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "How do you form the negative of **avoir** in present tense? (6 steps)", "answer": "- Step 1: **Je n’ai pas** (I don’t have) – negation wraps around the verb.  \n- Step 2: **Tu n’as pas** (You don’t have).  \n- Step 3: **Il/Elle/On n’a pas** (He/She/One doesn’t have).  \n- Step 4: **Nous n’avons pas** (We don’t have).  \n- Step 5: **Vous n’avez pas** (You don’t have).  \n- Step 6: **Ils/Elles n’ont pas** (They don’t have).  \n+ Example: *Je n’ai pas de stylo* (I don’t have a pen → note the shift from *du* to *de*).", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Why does the partitive article change to **de** in negative sentences like *Je n’ai pas de stylo*?", "answer": "- Step 1: In affirmative sentences, **du/de la/des** indicates an unspecified quantity (*J’ai du pain* = I have (some) bread).  \n- Step 2: In negation (*ne...pas*), the partitive becomes **de** to reflect the absence of the item.  \n- Step 3: This avoids implying partial possession.  \n+ Example: *Il a des œufs* (He has eggs) → *Il n’a pas d’œufs* (He doesn’t have eggs).  \n+ Exception: If the noun is specific, **de** replaces all articles (*pas de problème* = no problem).", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "How do you distinguish between **un/une/des** (indefinite) and **du/de la/des** (partitive) in affirmative sentences?", "answer": "- Step 1: **Un/une/des** = countable nouns (singular/plural).  \n+ Example: *un livre* (a book), *des pommes* (some apples).  \n- Step 2: **Du/de la/des** = uncountable/mass nouns (singular only).  \n+ Example: *du pain* (some bread), *de la glace* (some ice cream).  \n- Step 3: Think: Can you count the noun? If yes → indefinite; if no → partitive.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why is **c’est** followed by a masculine adjective in phrases like *C’est beau*, even for feminine nouns?", "answer": "- Step 1: **C’est** is a contraction of *ce + est* (neuter subject *ce*).  \n- Step 2: The adjective agrees with the grammatical gender of *ce* (masculine), not the actual noun.  \n+ Example: *C’est une fille* → *C’est beau* (not *belle*), even though \"girl\" is feminine.  \n- Step 3: This is a fixed rule for **c’est** constructions.  \n+ Contrast: *Elle est belle* (She is beautiful) → standard agreement.", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": false}, {"question": "What are the French numbers for 70, 80, and 90, and why do they follow a different logic? (3 steps)", "answer": "- Step 1: **70 = soixante-dix** (60 + 10) – legacy of base-20 counting in Old French.  \n- Step 2: **80 = quatre-vingts** (four twenties) – again, base-20 influence.  \n- Step 3: **90 = quatre-vingt-dix** (4×20 + 10).  \n+ Example: 81 = *quatre-vingt-un* (hyphenated, no \"s\" on *vingt*).", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "What French phrases correspond to \"I would like to have...\" when ordering in a restaurant? (3 steps)", "answer": "- Step 1: **Je voudrais avoir...** (I would like to have).  \n- Step 2: **J’aimerais avoir...** (I would like to have).  \n- Step 3: **Je pourrais avoir...** (Could I have).  \n+ Example: *Je voudrais une soupe* (I’d like a soup).  \n+ Note: *Je vais prendre...* (I’m going to take) is less formal.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "How do you ask “What is this?” in French and respond using **c’est**?", "answer": "- Step 1: Question: **Qu’est-ce que c’est...?** (What is this?).  \n- Step 2: Answer: **C’est [masculine noun/adjective]**.  \n+ Example: *Qu’est-ce que c’est la salade niçoise?* → *C’est un plat avec des légumes et de l’huile d’olive*.  \n- Step 3: Adjective remains masculine: *C’est beau* (even for feminine nouns).", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Why don’t we say *Il n’y a pas du café* but *Il n’y a pas de café*?", "answer": "- Step 1: In affirmative: *Il y a du café* (There is some coffee).  \n- Step 2: In negation (*ne...pas*), partitive **du** becomes **de**.  \n- Step 3: This avoids implying partial existence.  \n+ Rule: After *ne...pas*, use **de** + noun (no article).  \n+ Example: *Il n’y a pas de problème* (There is no problem).", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "What are the full present tense conjugations of **être** (to be) and their negative forms? (12 steps)", "answer": "**Affirmative:**  \n- Step 1: **Je suis** (I am).  \n- Step 2: **Tu es** (You are).  \n- Step 3: **Il/Elle/On est** (He/She/One is).  \n- Step 4: **Nous sommes** (We are).  \n- Step 5: **Vous êtes** (You are).  \n- Step 6: **Ils/Elles sont** (They are).  \n**Negative:**  \n- Step 7: **Je ne suis pas** (I am not).  \n- Step 8: **Tu n’es pas** (You are not).  \n- Step 9: **Il/Elle/On n’est pas** (He/She/One is not).  \n- Step 10: **Nous ne sommes pas** (We are not).  \n- Step 11: **Vous n’êtes pas** (You are not).  \n- Step 12: **Ils/Elles ne sont pas** (They are not).  \n+ Example: *Je suis étudiant* → *Je ne suis pas étudiant* (I am not a student).", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}, {"question": "How do you ask for the bill in French using two equivalent phrases?", "answer": "- Step 1: **Je pourrais avoir l’addition, s’il vous plaît?** (Could I have the bill, please?).  \n- Step 2: **Pourrais-je avoir la note, s’il vous plaît?** (Could I have the check, please?).  \n+ Note: *L’addition* and *la note* are interchangeable in this context.", "source": "Qwen 3 ②", "_id": "qwen_2_10", "judge_pick": false}], "count": 11}, "minimax_1": {"label": "MiniMax ①", "cards": [{"question": "What is the present tense conjugation of the verb AVOIR (to have) in French? (1 step)", "answer": "- Step 1: The verb AVOIR is irregular. Its present tense conjugation is:\n  - $$J'ai$$ (I have)\n  - $$Tu as$$ (you have)\n  - $$Il/Elle/On a$$ (he/she/we have)\n  - $$Nous avons$$ (we have)\n  - $$Vous avez$$ (you have - formal/plural)\n  - $$Ils/Elles ont$$ (they have)\n\nThis verb is essential because it's used for possession, age, and many idiomatic expressions in French.", "source": "MiniMax ①", "_id": "minimax_1_0", "judge_pick": false}, {"question": "How do you form the negative of AVOIR in French? Give an example with \"I don't have.\" (2 steps)", "answer": "- Step 1: To make AVOIR negative, place **ne** before the verb and **pas** after it.\n- Step 2: Example: $$Je\\ n'ai\\ pas$$ = I don't have\n  - $$Tu\\ n'as\\ pas$$ = you don't have\n  - $$Il/Elle\\ n'a\\ pas$$ = he/she doesn't have\n  - $$Nous\\ n'avons\\ pas$$ = we don't have\n  - $$Vous\\ n'avez\\ pas$$ = you don't have\n  - $$Ils/Elles\\ n'ont\\ pas$$ = they don't have\n\nNote: In negative sentences, the indefinite article (un/une/des) stays the same: \"I have a chocolate\" = $$J'ai\\ un\\ chocolat$$ → \"I don't have a chocolate\" = $$Je\\ n'ai\\ pas\\ un\\ chocolat$$.", "source": "MiniMax ①", "_id": "minimax_1_1", "judge_pick": false}, {"question": "What is the present tense conjugation of the verb ÊTRE (to be) in French? (1 step)", "answer": "- Step 1: The verb ÊTRE is also irregular. Its present tense conjugation is:\n  - $$Je\\ suis$$ (I am)\n  - $$Tu\\ es$$ (you are)\n  - $$Il/Elle/On\\ est$$ (he/she/we are)\n  - $$Nous\\ sommes$$ (we are)\n  - $$Vous\\ êtes$$ (you are - formal/plural)\n  - $$Ils/Elles\\ sont$$ (they are)\n\nThis verb describes identity, location, and characteristics.", "source": "MiniMax ①", "_id": "minimax_1_2", "judge_pick": false}, {"question": "How do you form the negative of ÊTRE in French? Give an example with \"I am not.\" (2 steps)", "answer": "- Step 1: Same as AVOIR: place **ne** before the verb and **pas** after it.\n- Step 2: Example: $$Je\\ ne\\ suis\\ pas$$ = I am not\n  - $$Tu\\ n'es\\ pas$$ = you are not\n  - $$Il/Elle\\ n'est\\ pas$$ = he/she is not\n  - $$Nous\\ ne\\ sommes\\ pas$$ = we are not\n  - $$Vous\\ n'êtes\\ pas$$ = you are not\n  - $$Ils/Elles\\ ne\\ sont\\ pas$$ = they are not", "source": "MiniMax ①", "_id": "minimax_1_3", "judge_pick": false}, {"question": "Explain the difference between the indefinite articles un/une/des and the partitive articles du/de la/des in French. When do you use each? (3 steps)", "answer": "- Step 1: **Un/une/des** are used with **countable** nouns — things you can count as whole units.\n  - $$Un\\ chocolat$$ = a chocolate (one chocolate, countable)\n  - $$Une\\ salade$$ = a salad (one salad)\n  - $$Des\\ plats$$ = some dishes (several dishes)\n- Step 2: **Du/de la/des** are used with **uncountable** (mass) nouns — things you can't count as individual units. They mean \"some\" but are often not translated in English.\n  - $$Du\\ chocolat$$ = (some) chocolate\n  - $$De\\ la\\ crème$$ = (some) cream\n  - $$Des\\ incontourn$$ = (some) water\n- Step 3: This is why the exercise showed: \"J'ai un chocolat\" (one chocolate bar) vs \"J'ai du chocolat\" (some chocolate, like a quantity/cup of hot chocolate).", "source": "MiniMax ①", "_id": "minimax_1_4", "judge_pick": false}, {"question": "In French, how do you say \"I would like to have\" when ordering at a restaurant? Give all three polite forms mentioned in the lesson. (1 step)", "answer": "- Step 1: Three equivalent polite expressions for \"I would like to have\":\n  - $$Je\\ voudrais$$\n  - $$Je\\ pourrais$$\n  - $$J'aimerais\\ avoir$$\n\nAll three express a polite request. $$Je\\ voudrais$$ is the most common in restaurants, while $$J'aimerais$$ is slightly more formal.", "source": "MiniMax ①", "_id": "minimax_1_5", "judge_pick": false}, {"question": "What is the French for \"I'm going to take/choose\" when ordering food? Give the example from the lesson. (1 step)", "answer": "- Step 1: $$Je\\ vais\\ prendre$$ (or $$Je\\ vais\\ choisir$$)\n- Example from the lesson: $$Le\\ hamburger$$ → \"I'm going to take the hamburger\"\n\nThis construction uses the near future tense (aller + infinitive) to express what you will order.", "source": "MiniMax ①", "_id": "minimax_1_6", "judge_pick": false}, {"question": "How do you ask \"What is this?\" in French, particularly for a dish name like \"salade niçoise\"? (1 step)", "answer": "- Step 1: $$Qu'est-ce\\ que\\ c'est$$ ...? (pronounced \"keske\")\n- For a specific dish: $$Qu'est-ce\\ que\\ c'est\\ la\\ salade\\ niçoise$$? = What is niçoise salad?\n\nAlternative: $$Qu'est-ce\\ qu'il\\ y\\ a\\ dans$$... = What is there in... (asking about ingredients)", "source": "MiniMax ①", "_id": "minimax_1_7", "judge_pick": false}, {"question": "What does the waiter/server ask to confirm your meat cooking preference, and what are the four possible responses in French? (2 steps)", "answer": "- Step 1: The waiter asks: $$Quelle\\ cuisson\\ pour\\ la\\ viande$$? = Which cooking for the meat?\n- Step 2: The four responses are:\n  - $$Bleu$$ = very rare\n  - $$Saignant$$ = rare\n  - $$À\\ point$$ = medium rare\n  - $$Bien\\ cuit$$ = well done\n\nThese are essential vocabulary for ordering steak in French.", "source": "MiniMax ①", "_id": "minimax_1_8", "judge_pick": false}, {"question": "How do you ask for the bill in French? Give two polite ways. (1 step)", "answer": "- Step 1: Two polite ways to ask for the bill:\n  - $$Je\\ pourrais\\ avoir\\ l'addition\\ s'il\\ vous\\ plaît$$\n  - $$L'addition\\ (ou\\ la\\ note)\\ s'il\\ vous\\ plaît$$\n\nBoth $$l'addition$$ and $$la\\ note$$ mean \"the bill\" and are interchangeable.", "source": "MiniMax ①", "_id": "minimax_1_9", "judge_pick": false}, {"question": "When making a restaurant reservation, what does the staff ask to confirm seating preference, and how do you respond if you prefer outdoor seating? (2 steps)", "answer": "- Step 1: The question: $$À\\ l'intérieur\\ ou\\ en\\ terrasse$$? = Inside or on the terrace?\n- Step 2: Your response: $$Je\\ préfère\\ en\\ terrasse$$ = I prefer outside (on the terrace)\n\nNote: \"En terrasse\" means outdoor seating, which is common in French restaurants.", "source": "MiniMax ①", "_id": "minimax_1_10", "judge_pick": false}, {"question": "How do you say \"I have a reservation for two people\" in French when responding to \"Avez-vous une réservation?\" (1 step)", "answer": "- Step 1: $$Oui,\\ j'ai\\ une\\ réservation\\ pour\\ deux\\ personnes$$\n- Alternative: $$Oui,\\ c'est\\ pour\\ deux$$ (Yes, it's for two)\n\nNegative response: $$Non,\\ je\\ n'ai\\ pas\\ de\\ réservation$$ (No, I don't have a reservation) — note: after pas de, no article is used.", "source": "MiniMax ①", "_id": "minimax_1_11", "judge_pick": false}, {"question": "In the reservation conversation, the client says his phone number is 0678 65 67 87. How would he say this in French? (2 steps)", "answer": "- Step 1: French phone numbers are read in pairs: 06 78 65 67 87\n- Step 2: He would say: $$Le\\ zéro\\ six\\ soixante-dix-huit,\\ soixante-cinq,\\ soixante-sept,\\ quatre-vingts-sept$$\n- Note: French uses \"zéro\" for the initial 0, and reads 67 as \"soixante-sept\" and 87 as \"quatre-vingts-sept\"", "source": "MiniMax ①", "_id": "minimax_1_12", "judge_pick": false}, {"question": "Explain why French numbers 70, 80, and 90 are different from other numbers, and give examples. (3 steps)", "answer": "- Step 1: French has an unusual system for 70-99 that comes from older French (based on base-20 counting).\n- Step 2: - 70 = $$Soixante-dix$$ (60 + 10)\n  - 71 = $$Soixante-et-onze$$ (60 + 11)\n  - 80 = $$Quatre-vingts$$ (4 × 20)\n  - 81 = $$Quatre-vingt-un$$ (4 × 20 + 1)\n  - 90 = $$Quatre-vingt-dix$$ (4 × 20 + 10)\n  - 91 = $$Quatre-vingt-onze$$ (4 × 20 + 11)\n- Step 3: This is a common source of confusion for English speakers learning French — memorize these as distinct vocabulary, not as regular math.", "source": "MiniMax ①", "_id": "minimax_1_13", "judge_pick": false}, {"question": "What is the rule for using c'est + adjective in French? Why is it always masculine? (2 steps)", "answer": "- Step 1: When using $$c'est$$ (it is / this is) followed by an adjective, the adjective is ALWAYS in the **masculine singular** form.\n- Step 2: Examples from the lesson:\n  - $$C'est\\ beau$$ = It's beautiful\n  - $$C'est\\ urgent$$ = It's urgent\n  - $$C'est\\ fini$$ = It's finished\n\nThis is because $$c'est$$ refers to a concept or thing in general, not a specific noun with gender. Compare: \"La réunion est urgente\" (the meeting — feminine) but \"C'est urgent\" (it — masculine form).", "source": "MiniMax ①", "_id": "minimax_1_14", "judge_pick": false}, {"question": "In French negation, what is the differ
