ench *à point* is closer to American medium-rare; *bien cuit* is rarer in France and sometimes mildly judged.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "How do you politely ask for the bill at a French restaurant? Give at least two phrasings. (3 steps)", "answer": "- Step 1: Most polite: ***Je pourrais avoir l'addition, s'il vous plaît ?*** (\"Could I have the bill, please?\") or with inversion: ***Pourrais-je avoir l'addition ?***\n- Step 2: Shorter, still polite: ***L'addition, s'il vous plaît.*** (\"The bill, please.\")\n- Step 3: Vocabulary point: ***l'addition*** is the standard word; ***la note*** is also acceptable. Avoid asking for *le bill* — borrow words from English don't work here.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": true}, {"question": "How would you ask \"What is this?\" or \"What is in the salade niçoise?\" in French? (3 steps)", "answer": "- Step 1: ***Qu'est-ce que c'est ?*** = \"What is this/that?\" Pronounced roughly \"kess-kuh-say.\" It literally breaks down as *que + est-ce + que + c'est*, but treat it as a fixed phrase.\n- Step 2: For asking about contents: ***Qu'est-ce qu'il y a dans... ?*** = \"What is there in...?\" Example: *Qu'est-ce qu'il y a dans la salade niçoise ?*\n- Step 3: You can also combine: *Qu'est-ce que c'est, la salade niçoise ?* — \"What is the salade niçoise?\" (asking for the description of a dish).", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": true}, {"question": "A waiter says *Est-ce que vous les voulez en même temps ?* What are they asking, and when does this come up? (2 steps)", "answer": "- Step 1: It means **\"Would you like them (the dishes) at the same time?\"** — *en même temps* = \"at the same time.\"\n- Step 2: This typically comes up when you order multiple courses or items — the waiter is checking whether to bring them together or sequentially (e.g. starter first, then main). A natural reply: *Oui, en même temps, s'il vous plaît* or *Non, l'entrée d'abord, s'il vous plaît*.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": false}, {"question": "Reconstruct the typical phone-reservation script: the restaurant answers the phone, and the customer wants a table for 2 tonight at 19h30. Walk through the key exchanges. (6 steps)", "answer": "- Step 1: Restaurant greets: *\"[Nom du restaurant], bonsoir.\"*\n- Step 2: Asks purpose: *\"C'est pour une réservation ?\"* (\"Is it for a reservation?\")\n- Step 3: Asks time: *\"À quelle heure ?\"* → Customer: *\"À 19h30, s'il vous plaît.\"*\n- Step 4: Asks group size: *\"Pour combien de personnes ?\"* → *\"Pour 2 personnes, s'il vous plaît.\"*\n- Step 5: Asks for phone: *\"Votre numéro de téléphone pour confirmer la réservation ?\"*\n- Step 6: Confirms: *\"C'est noté, Monsieur/Madame. À ce soir !\"* → Customer: *\"Merci beaucoup, au revoir !\"*\n\nThe script is highly formulaic — once you internalise these slots, you can run a real reservation with minimal improvisation.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "When the waiter asks *À l'intérieur ou en terrasse ?*, what are they asking, and how do you express a preference? (2 steps)", "answer": "- Step 1: They're asking **\"Inside or on the terrace?\"** — i.e. indoor seating or outdoor.\n- Step 2: To express preference: ***Je préfère en terrasse*** (\"I prefer the terrace\") or ***À l'intérieur, s'il vous plaît***. The verb *préférer* is your go-to for stating preferences politely.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": false}, {"question": "Count from 0 to 10 in French. (3 steps)", "answer": "- Step 1: 0–3: *zéro, un, deux, trois*.\n- Step 2: 4–6: *quatre, cinq, six*.\n- Step 3: 7–10: *sept, huit, neuf, dix*. (Pronunciation: *neuf* sounds like \"nuff\"; *dix* is \"dees\" before a pause, \"dee\" before a consonant, \"deez\" before a vowel.)", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": false}, {"question": "The numbers 11–16 in French don't follow the \"ten + unit\" pattern — they have unique names. List them and explain the logic shift at 17. (3 steps)", "answer": "- Step 1: 11–16: ***onze, douze, treize, quatorze, quinze, seize*** — six unique words inherited from Latin (*undecim, duodecim*...).\n- Step 2: From **17 onward**, French switches to a compound pattern: ***dix-sept*** (10 + 7), ***dix-huit*** (10 + 8), ***dix-neuf*** (10 + 9).\n- Step 3: Why the switch? It's a historical quirk — Latin had unique forms up to about 16, and French preserved them. After that, the compound system kicks in. This is similar in spirit to English \"eleven, twelve\" then \"thirteen, fourteen...\" but the cutoff is different.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "How does French build numbers from 20 to 69? Give the pattern and one example per decade. (3 steps)", "answer": "- Step 1: The base words for the tens are: ***vingt*** (20), ***trente*** (30), ***quarante*** (40), ***cinquante*** (50), ***soixante*** (60).\n- Step 2: To form X1, X2, ... X9, you say [tens] + [unit], with a hyphen. The special case is **X1**, which uses ***et un*** (without hyphen historically, but now often hyphenated): *vingt-et-un, trente-et-un, quarante-et-un...*\n- Step 3: Examples:\n+ 22 = *vingt-deux*\n+ 35 = *trente-cinq*\n+ 41 = *quarante-et-un*\n+ 67 = *soixante-sept*\n\nThe system is fully regular up to 69.", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "Why is 70 in French *soixante-dix* instead of having its own word? Walk through the logic. (3 steps)", "answer": "- Step 1: French (in France) lacks a unique word for 70. Instead, it **counts from 60**: 70 = 60 + 10 = ***soixante-dix***.\n- Step 2: This continues: 71 = *soixante-et-onze* (60 + 11), 72 = *soixante-douze* (60 + 12), ... up to 79 = *soixante-dix-neuf* (60 + 19).\n- Step 3: The reason is historical: Old French used a partial vigesimal (base-20) counting system inherited from Celtic/Gaulish influence. Belgium and Switzerland kept the simpler word *septante* for 70, but France did not.\n\nThe takeaway: when you see *soixante-...*, mentally add to 60.", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": false}, {"question": "Why is 80 in French *quatre-vingts*? And what's odd about the spelling? (3 steps)", "answer": "- Step 1: 80 = 4 × 20 = ***quatre-vingts*** (\"four-twenties\"). This is the vigesimal (base-20) system at its clearest — count by twenties.\n- Step 2: Note the **-s** on *vingts*: it appears only when *quatre-vingts* stands alone or ends the number. When a unit follows, the *-s* disappears: 81 = *quatre-vingt-un* (no *-s*), 85 = *quatre-vingt-cinq*.\n- Step 3: Also note: 81 does **not** use *et un* (unlike 21, 31...). You say *quatre-vingt-un*, not *quatre-vingt-et-un*. This is because *et un* is a special idiom that only applies to \"round tens + 1,\" and 80 isn't a \"round ten\" — it's a 4×20.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "How do you say 90 and 91 in French, and what's the compositional logic? (3 steps)", "answer": "- Step 1: 90 = 4 × 20 + 10 = ***quatre-vingt-dix***. Same vigesimal logic: start at 80, add 10.\n- Step 2: 91 = 80 + 11 = ***quatre-vingt-onze***. 92 = *quatre-vingt-douze*, ... 99 = *quatre-vingt-dix-neuf*.\n- Step 3: Note: no *-s* on *vingt* here either (because it's followed by another number). And no *et*: it's *quatre-vingt-onze*, not *quatre-vingt-et-onze*.\n\nThe whole 70s–90s block is the trickiest part of French numbers — internalise the math: 70 = 60+10, 80 = 4×20, 90 = 4×20+10.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": false}, {"question": "How would a French speaker say a phone number like \"78 65 67 87\"? Break down each pair. (4 steps)", "answer": "French phone numbers are read in pairs of two digits.\n- Step 1: **78** = *soixante-dix-huit* (60 + 18).\n- Step 2: **65** = *soixante-cinq* (60 + 5).\n- Step 3: **67** = *soixante-sept* (60 + 7).\n- Step 4: **87** = *quatre-vingt-sept* (80 + 7).\n\nSo the whole number is *soixante-dix-huit, soixante-cinq, soixante-sept, quatre-vingt-sept*. The pairwise reading is why mastering the 60s–90s is essential for real-life French.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "What's the French word for 100, and what tiny spelling rule applies when it's pluralised? (2 steps)", "answer": "- Step 1: 100 = ***cent***. Just one syllable, pronounced \"son\" (nasal).\n- Step 2: Like *vingt*, *cent* takes an **-s** when it's a round multiple (e.g. *deux cents* = 200), but loses the *-s* when followed by another number (*deux cent un* = 201). This is the same logic as *quatre-vingts* → *quatre-vingt-un*.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "What does the waiter mean by *Suivez-moi, s'il vous plaît* and *Installez-vous* when you arrive at a restaurant? (2 steps)", "answer": "- Step 1: ***Suivez-moi, s'il vous plaît*** = \"Follow me, please.\" *Suivez* is the *vous* form of *suivre* (to follow), used as a polite command (imperative).\n- Step 2: ***Installez-vous*** = \"Get settled\" / \"Make yourselves comfortable.\" It's a reflexive imperative — literally \"install yourselves.\" Used as you reach your table.\n\nThese are the two phrases you'll hear within the first 30 seconds of entering a sit-down restaurant.", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "Once you're seated, what's the first question the waiter usually asks, and how do you respond if you want a bottle of sparkling water? (3 steps)", "answer": "- Step 1: Typical openers: ***Que désirez-vous boire ?*** (\"What would you like to drink?\") or ***Souhaiteriez-vous une bouteille d'eau gazeuse ou d'eau plate ?*** (\"Would you like a bottle of sparkling or still water?\").\n- Step 2: Key vocabulary: ***eau gazeuse*** = sparkling water, ***eau plate*** = still water, ***une carafe d'eau*** = a (free) jug of tap water.\n- Step 3: Response: *Je voudrais une bouteille d'eau gazeuse, s'il vous plaît* — or for the free tap water option, *Une carafe d'eau, s'il vous plaît*.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": true}, {"question": "What two phrases does a waiter use to ask \"Have you decided / made your choice?\" (2 steps)", "answer": "- Step 1: ***Avez-vous fait votre choix ?*** — literally \"Have you made your choice?\" Uses *faire* (to make/do) in the *passé composé* with *avoir*.\n- Step 2: ***Avez-vous choisi ?*** — literally \"Have you chosen?\" Uses *choisir* (to choose) in the *passé composé*.\n\nBoth are interchangeable and very common. The customer's natural responses begin with *Oui, je vais prendre...* or *Oui, j'aimerais...*.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": false}, {"question": "When ordering for a group, how do you switch from \"I\" to \"we\" forms? Give three polite \"we\" orderings. (3 steps)", "answer": "- Step 1: In spoken French, ***on*** is the everyday word for \"we\" (grammatically third-person singular, but means *nous*). So *nous allons prendre* in writing becomes *on va prendre* in speech.\n- Step 2: Three polite \"we\"-orderings:\n+ ***On va prendre...*** (\"We're going to have...\")\n+ ***On aimerait...*** (\"We would like...\")\n+ ***On pourrait avoir... / Est-ce qu'on pourrait avoir...?*** (\"Could we have...?\")\n- Step 3: Notice the conditional endings (*-rait*) on the last two — same politeness logic as *je voudrais*, *je pourrais*.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "A waiter checking in mid-meal asks *Est-ce que tout va bien ?* — what does this mean, and what's a natural reply? (2 steps)", "answer": "- Step 1: It means **\"Is everything okay?\"** Literally *tout* (everything) + *va* (goes) + *bien* (well) — \"Is everything going well?\"\n- Step 2: Natural replies: *Oui, très bien, merci* (\"Yes, very well, thanks\") or *Oui, c'est délicieux* (\"Yes, it's delicious\"). If you need something: *Pourrais-je avoir...?*", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "What does the waiter mean by *Je reviens tout de suite*, and when do you typically hear it? (2 steps)", "answer": "- Step 1: It means **\"I'll be right back.\"** *Tout de suite* = \"right away / immediately.\" *Je reviens* = \"I come back\" (present tense, but used here for near-future).\n- Step 2: You'll hear it when the waiter steps away to fetch your drinks, check on the kitchen, or get something you asked for. No reply needed — just *merci* if anything.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": false}, {"question": "Put together the full sentence \"Yes, an entrecôte saignante, please\" in French — and explain why the adjective ends in *-e*. (3 steps)", "answer": "- Step 1: ***Oui, une entrecôte saignante, s'il vous plaît.***\n- Step 2: *Entrecôte* is a **feminine** noun (you use *une*, not *un*). It's a cut of beef (rib steak).\n- Step 3: The adjective *saignant* (rare) must agree with the feminine noun → add *-e* → *saignante*. The pronunciation also changes: masculine *saignant* ends in a nasal vowel (\"sehn-yon\"); feminine *saignante* pronounces the *t* (\"sehn-yant\").\n\nThis is a great example of how gender propagates: noun chooses *une* AND forces *-e* on the adjective.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Translate: \"No, there's no problem.\" Explain the article behavior. (3 steps)", "answer": "- Step 1: ***Non, il n'y a pas de problème.***\n- Step 2: *Il y a* = \"there is/are\" (a fixed expression). In negation, it becomes *il n'y a pas*.\n- Step 3: The article in *un problème* drops to *de* because of the negation rule (indefinite *un* → *de* in negative). Beginner trap: *il n'y a pas **un** problème* is wrong; it must be *pas **de** problème*.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "Translate: \"We have a reservation number\" — and identify any easy slip-up between *vous avez* and *nous avons*. (3 steps)", "answer": "- Step 1: ***Nous avons un numéro de réservation.***\n- Step 2: *Nous avons* = \"we have\"; *vous avez* = \"you have.\" They look similar but the endings differ: *-ons* (we) vs *-ez* (you).\n- Step 3: Memory trick: *-ons* always means \"we\" across nearly all French verbs (*nous parlons, nous avons, nous sommes*). If you see/hear *-ons*, think \"we.\"", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "Translate: \"They have an appointment\" and identify the verb and article choices. (3 steps)", "answer": "- Step 1: ***Ils ont un rendez-vous.***\n- Step 2: \"They have\" = *ils ont* (or *elles ont* if all-female group). Watch the *avoir/être* trap: *ils ont* (have), not *ils sont* (are).\n- Step 3: \"An appointment\" → *rendez-vous* is **masculine**, so the article is *un*. *Rendez-vous* is invariable in the plural — same form for one or many.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": true}, {"question": "Translate: \"Yes, I'm late.\" Walk through the verb and structure. (2 steps)", "answer": "- Step 1: ***Oui, je suis en retard.***\n- Step 2: Grammatical points:\n+ Verb is *être* (to be), not *avoir* — French treats \"being late\" as a state of being, like English.\n+ *en retard* is a fixed prepositional phrase meaning \"late.\" Don't translate \"late\" with a single adjective — use this phrase.\n+ Opposite: *en avance* (\"early\"); *à l'heure* (\"on time\").", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "A French speaker hands you the choice \"à l'intérieur OU en terrasse\" — what does *ou* mean, and how is it different from *où*? (2 steps)", "answer": "- Step 1: ***ou*** (no accent) = **\"or\"** — connects two alternatives. *Café ou thé ?* = \"Coffee or tea?\"\n- Step 2: ***où*** (with grave accent) = **\"where\"** — a question word. *Où est le restaurant ?* = \"Where is the restaurant?\" The accent is the only written difference, but they're entirely separate words. Pronunciation is identical.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "Explain why we say *du saumon grillé* and not *un saumon grillé* when ordering at a restaurant — what's the conceptual difference? (3 steps)", "answer": "- Step 1: ***Un saumon grillé*** would imply \"**a** (whole) grilled salmon\" — one entire fish as a unit.\n- Step 2: ***Du saumon grillé*** means \"**some** grilled salmon\" — a portion of the dish, an unspecified quantity of the substance. This is what you usually mean when ordering a serving.\n- Step 3: That said, in restaurant context, both are heard because *un saumon grillé* can also mean \"one serving of the grilled salmon\" (like ordering \"a salmon\" from the menu). The strict grammar distinction is portion (partitive *du*) vs unit (indefinite *un*) — but menu language sometimes blurs them.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "A common beginner sentence: *Vous avez une crème brûlée* vs *Vous avez de la crème brûlée*. What's the difference? (3 steps)", "answer": "- Step 1: ***Vous avez une crème brûlée*** = \"You have **a** crème brûlée\" — one serving/portion as a countable item (the dessert).\n- Step 2: ***Vous avez de la crème brûlée*** = \"You have **some** crème brûlée\" — partitive, talking about the dish as a substance (perhaps a portion shared, or some amount left).\n- Step 3: In a restaurant, *une crème brûlée* (one dessert) is far more common. The partitive *de la* would feel odd unless context implies an unspecified amount (e.g. leftovers).\n\nThe lesson: countable units → *un/une*; mass / unspecified portions → *du/de la*.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "Why does French use *ne... pas* (two pieces) for negation instead of a single word like English \"not\"? Conceptually, how should you think about it? (3 steps)", "answer": "- Step 1: Historically, *ne* alone was the negation in Old French. *Pas* was added for emphasis (originally *pas* meant \"step,\" as in \"I do not walk a step\"). Over centuries, *pas* became obligatory and *ne* started to weaken.\n- Step 2: In modern spoken French, **the *ne* is often dropped entirely**: *J'sais pas* instead of *Je ne sais pas*. But in writing and formal speech, both pieces are required.\n- Step 3: Conceptually, treat *ne ... pas* as a frame that wraps the conjugated verb. Other \"second pieces\" exist too: *ne... jamais* (never), *ne... rien* (nothing), *ne... personne* (nobody). The structure is the same; only the second word changes.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "Simple exercise: Translate \"She has a plate\" and then negate it. Walk through both. (3 steps)", "answer": "- Step 1: Positive: ***Elle a une assiette.*** *Elle a* (she has, from *avoir*); *une assiette* (a plate — feminine).\n- Step 2: Negation step 1: insert *ne ... pas* around the verb *a*. Since *a* starts with a vowel, *ne* → *n'*: *Elle n'a pas...*\n- Step 3: Negation step 2: the indefinite *une* must drop to *de* in negation → *Elle n'a pas **d'**assiette* (*de* elides to *d'* before *assiette*'s vowel).\n\nFinal: ***Elle n'a pas d'assiette.***", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": true}, {"question": "Simple exercise: How would you say \"We have a coffee\" in two ways, and which is more natural at a café? (3 steps)", "answer": "- Step 1: ***Nous avons un café*** (formal/written) or ***On a un café*** (spoken/informal). Both mean \"We have a coffee.\"\n- Step 2: At a café, you'd more likely *order* one: ***On va prendre un café*** (\"We'll have a coffee\") or ***Je voudrais un café*** if just for yourself.\n- Step 3: *Un café* refers to one cup/serving — countable. If you said *du café*, you'd mean \"some coffee\" (the substance) — less natural for ordering, more natural for \"Il y a du café dans la cuisine\" (\"There's coffee in the kitchen\").", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "What's the difference between *Je voudrais* and *Je veux*, and why should a beginner almost always use the first? (2 steps)", "answer": "- Step 1: ***Je veux*** = \"I want\" (present indicative, direct). ***Je voudrais*** = \"I would like\" (conditional, polite).\n- Step 2: In French culture, *je veux* in a restaurant or shop sounds **demanding, even rude** — equivalent to a child saying \"I want!\" Always default to *je voudrais* or *j'aimerais* or *je pourrais avoir* when interacting with strangers, servers, or in any service context. *Je veux* is fine with close friends or when expressing strong personal desires in private contexts.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "Build the sentence \"Could I have a carafe of water, please?\" from scratch, explaining each piece. (4 steps)", "answer": "- Step 1: Polite \"could I have\" → ***Je pourrais avoir*** (from *pouvoir* in conditional + infinitive *avoir*).\n- Step 2: \"A carafe\" → *une carafe* (feminine).\n- Step 3: \"Of water\" → *d'eau* (after the quantity word *carafe*, you use just *de*, and it elides to *d'* before *eau*).\n- Step 4: \"Please\" → *s'il vous plaît* (formal/polite \"you\").\n\nFinal: ***Je pourrais avoir une carafe d'eau, s'il vous plaît ?*** A perfectly polite, ready-to-use restaurant phrase.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": true}, {"question": "Why is *quatre-vingt-un* written without *et*, while *vingt-et-un* and *soixante-et-onze* are written with *et*? (3 steps)", "answer": "- Step 1: The *et* (and) appears in: 21 (*vingt-et-un*), 31 (*trente-et-un*), 41, 51, 61, and 71 (*soixante-et-onze*). It's used when adding \"+1\" or \"+11\" to a clean tens base.\n- Step 2: It is **dropped** for 81 (*quatre-vingt-un*) and 91 (*quatre-vingt-onze*) because 80 isn't a pure \"ten\" — it's 4×20, a multiplicative base, so the \"+1\" doesn't trigger the *et* idiom.\n- Step 3: This is irregular and historical — just memorise: tens 20–70 use *et un / et onze*; 80 and 90 don't.", "source": "Opus 4.7 ①", "_id": "opus_1_50", "judge_pick": true}, {"question": "A waiter says *C'est noté, Monsieur* at the end of your reservation call. What does this mean and what's the cultural register? (2 steps)", "answer": "- Step 1: ***C'est noté*** literally = \"It's noted.\" Idiomatically = **\"Got it\" / \"It's all set.\"** Confirms the reservation has been recorded.\n- Step 2: Adding *Monsieur* (or *Madame*) is standard polite French — you address strangers by title, not first name. The exchange typically ends *À ce soir !* (\"See you tonight!\") and *Merci, au revoir !* — a tidy, formulaic close.", "source": "Opus 4.7 ①", "_id": "opus_1_51", "judge_pick": true}, {"question": "Conceptual probe: in *J'ai des chocolats*, what does *des* communicate that English drops, and what changes in the negative? (3 steps)", "answer": "- Step 1: ***Des*** is the plural indefinite article — \"some\" or \"a few\" chocolates, without specifying how many. English usually says just \"I have chocolates\" with no article, but French **requires** an article.\n- Step 2: This is a fundamental difference: French doesn't tolerate bare plural nouns the way English does. You must use *des* (or *les* for \"the chocolates\" specifically, or *du* for the substance).\n- Step 3: In the negative: *Je n'ai pas **de** chocolats* — *des* collapses to *de*, following the same rule as *un/une/du/de la*.", "source": "Opus 4.7 ①", "_id": "opus_1_52", "judge_pick": true}, {"question": "Why might *un croque-monsieur* always stay masculine, even though it's a food (which can be either gender)? (2 steps)", "answer": "- Step 1: Gender in French is fixed per noun and often unpredictable from meaning. *Croque-monsieur* is masculine because its second element, *monsieur* (\"mister\"), is masculine — the compound inherits the gender of its head.\n- Step 2: This is a general principle: in compound nouns, the gender usually follows the most semantically central element. Hence *un croque-monsieur*, and in plural *des croques-monsieur* (the *monsieur* part is invariable, oddly enough — a quirk of compound spelling).", "source": "Opus 4.7 ①", "_id": "opus_1_53", "judge_pick": true}, {"question": "Mini-exercise: Order \"I'd like a steak, medium-rare, and a still water, please.\" (3 steps)", "answer": "- Step 1: \"I'd like\" → *Je voudrais* (or *j'aimerais*).\n- Step 2: \"A steak, medium-rare\" → *une entrecôte à point* (or *un steak à point*). *Entrecôte* is feminine, hence *une*; *à point* is a fixed expression for medium-rare/medium.\n- Step 3: \"And a still water\" → *et une bouteille d'eau plate* (literally \"a bottle of still water\"; *eau plate* is feminine).\n\nFull: ***Je voudrais une entrecôte à point et une bouteille d'eau plate, s'il vous plaît.***", "source": "Opus 4.7 ①", "_id": "opus_1_54", "judge_pick": true}, {"question": "Why do we say *J'ai* and not *Je ai*? What's the linguistic principle? (2 steps)", "answer": "- Step 1: French dislikes two vowel sounds in a row across word boundaries — called **hiatus**. To avoid it, the final *-e* of short words like *je, ne, le, la, de, me, te, se, ce, que* drops out before a vowel sound, marked with an apostrophe.\n- Step 2: So: *je* + *ai* → ***j'ai***. Same logic: *ne* + *ai* → *n'ai*; *le* + *avion* → *l'avion*; *de* + *eau* → *d'eau*. This elision is mandatory in writing, not optional.", "source": "Opus 4.7 ①", "_id": "opus_1_55", "judge_pick": true}, {"question": "Synthesis card: A customer arrives at the restaurant. Reconstruct the entire opening sequence (greet, seat, drink question) — both sides. (5 steps)", "answer": "- Step 1: Waiter greets: *\"Bonsoir / Bonjour.\"* Customer: *\"Bonsoir, Madame / Monsieur.\"*\n- Step 2: Waiter asks about reservation: *\"Vous avez une réservation ?\"* Customer: *\"Oui, j'ai une réservation pour deux personnes\"* or *\"Non, je n'ai pas de réservation.\"*\n- Step 3: Waiter offers to lead: *\"Suivez-moi, s'il vous plaît.\"*\n- Step 4: At the table: *\"Installez-vous.\"*\n- Step 5: Drinks: *\"Que désirez-vous boire ?\"* / *\"Souhaiteriez-vous une bouteille d'eau gazeuse ou plate ?\"* Customer: *\"Une carafe d'eau, s'il vous plaît\"* or *\"Je voudrais une bouteille d'eau gazeuse.\"*\n\nThis whole sequence is highly scripted — once memorised, you can comfortably get to the point of ordering food.", "source": "Opus 4.7 ①", "_id": "opus_1_56", "judge_pick": false}, {"question": "Synthesis: Why is *Je n'ai pas de réservation* a perfect tiny showcase of three grammar rules at once? (3 steps)", "answer": "- Step 1: **Rule 1 — Elision**: *Je ne* + *ai* → *je n'ai* (vowel-hiatus avoidance: *ne* drops its *e*).\n- Step 2: **Rule 2 — Negation sandwich**: *ne ... pas* wraps around the conjugated verb *ai*.\n- Step 3: **Rule 3 — Article collapse in negation**: *une réservation* (positive) → *de réservation* (negative); indefinite/partitive articles all become *de* under negation.\n\nOne six-word sentence; three foundational beginner rules. This is why drilling it is so valuable.", "source": "Opus 4.7 ①", "_id": "opus_1_57", "judge_pick": true}, {"question": "Misconception probe: Why is *C'est belle* wrong when describing a beautiful house? (3 steps)", "answer": "- Step 1: After *c'est*, the adjective **must be masculine**, regardless of what's being described. So the correct form is ***C'est beau*** (masculine).\n- Step 2: If you want feminine agreement, you must use a sentence with an explicit feminine subject: *La maison est belle* (the house is beautiful) — here *belle* agrees with feminine *maison*.\n- Step 3: The deep reason: *ce* in *c'est* is a neutral pronoun pointing at a general \"it/this\" — not at a specific gendered noun. French defaults to masculine when there's no specific gendered referent.", "source": "Opus 4.7 ①", "_id": "opus_1_58", "judge_pick": true}, {"question": "Edge case: How would you say \"I have no friends\" in French, and what's the article rule? (3 steps)", "answer": "- Step 1: Positive: *J'ai des amis* (\"I have some friends\" — *des* required because French doesn't allow bare plurals).\n- Step 2: Negative: ***Je n'ai pas d'amis.*** *Des* collapses to *de* under negation; then *de* elides to *d'* before the vowel of *amis*.\n- Step 3: Note that *amis* keeps its plural *-s* — the article changes, not the noun. Common error: writing *je n'ai pas des amis* (no — must be *d'amis*).", "source": "Opus 4.7 ①", "_id": "opus_1_59", "judge_pick": true}], "count": 60}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "In French, what are the six present-tense forms of the verb *avoir* (to have)? (6 steps)", "answer": "- Step 1: 1st person singular: $$j'ai$$ — \"I have.\" Note the elision: *je* + *ai* → *j'ai*, because two vowels collide.\n- Step 2: 2nd person singular: $$tu\\ as$$ — \"you have\" (informal).\n- Step 3: 3rd person singular: $$il/elle/on\\ a$$ — \"he/she/one has.\" Notice *a* alone (no *s*).\n- Step 4: 1st person plural: $$nous\\ avons$$ — \"we have.\"\n- Step 5: 2nd person plural / formal: $$vous\\ avez$$ — \"you have.\"\n- Step 6: 3rd person plural: $$ils/elles\\ ont$$ — \"they have.\"\n\nTakeaway: *avoir* is highly irregular — none of the forms look like the infinitive, so you must memorize the whole table.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "How do you make each form of *avoir* negative in French, and what is the pattern? (3 steps)", "answer": "- Step 1: French negation wraps the verb with two pieces: $$ne \\dots pas$$. *Ne* goes before the verb, *pas* after.\n- Step 2: When the verb starts with a vowel (which every form of *avoir* does except *nous/vous*), *ne* elides to *n'*: $$je\\ n'ai\\ pas,\\ tu\\ n'as\\ pas,\\ il\\ n'a\\ pas,\\ nous\\ n'avons\\ pas,\\ vous\\ n'avez\\ pas,\\ ils\\ n'ont\\ pas$$.\n- Step 3: So every single form of negative *avoir* uses *n'* (not *ne*), because every form begins with a vowel sound. This is a reliable shortcut.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "What are the six present-tense forms of *être* (to be) in French? (6 steps)", "answer": "- Step 1: $$je\\ suis$$ — \"I am.\"\n- Step 2: $$tu\\ es$$ — \"you are\" (informal).\n- Step 3: $$il/elle/on\\ est$$ — \"he/she/one is.\"\n- Step 4: $$nous\\ sommes$$ — \"we are.\"\n- Step 5: $$vous\\ êtes$$ — \"you are\" (formal/plural). Note the circumflex.\n- Step 6: $$ils/elles\\ sont$$ — \"they are.\"\n\nTakeaway: like *avoir*, *être* is wildly irregular. *Suis, es, est, sommes, êtes, sont* — none resemble the infinitive.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": false}, {"question": "How do you negate *être* in the present tense? Why does only *je* use the apostrophe form? (3 steps)", "answer": "- Step 1: Apply $$ne \\dots pas$$ around the verb: *je ne suis pas, tu n'es pas, il/elle/on n'est pas, nous ne sommes pas, vous n'êtes pas, ils/elles ne sont pas*.\n- Step 2: *Ne* elides to *n'* only when the next word starts with a vowel. *Suis* and *sommes* start with consonants (*s*), so *ne* stays as *ne*.\n- Step 3: *Es, est, êtes, sont* — wait, *sont* also starts with *s*, so it's *ne sont pas*. The vowel-starting forms are *es, est, êtes*, which become *n'es, n'est, n'êtes*.\n\nTakeaway: elision is purely phonetic — vowel-starting verb forms trigger *n'*.", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "What is the difference between the indefinite articles *un / une / des* and the partitive articles *du / de la / des* in French? (4 steps)", "answer": "- Step 1: *Un / une / des* mean \"a / an / some\" and are used for **countable** things you can count as discrete units: *un croissant* (one croissant), *une pomme* (one apple), *des pommes* (several apples).\n- Step 2: *Du / de la / des* are **partitive** — they mean \"some\" in the sense of \"an unspecified portion of an uncountable substance\": *du café* (some coffee), *de la crème* (some cream), *des épinards* (some spinach, treated as a mass).\n- Step 3: The choice depends on how you mentally treat the noun. *J'ai un chocolat* = \"I have one chocolate (a piece).\" *J'ai du chocolat* = \"I have some chocolate (a portion of the substance).\" Both are correct French — they describe different physical realities.\n- Step 4: *Du* = *de* + *le* (masculine), *de la* = feminine, *des* = plural (and doubles as plural indefinite — context decides).\n\nTakeaway: countable unit → *un/une*; mass/portion → *du/de la*. Both can be plural *des*.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "Translate and explain the difference: \"J'ai un chocolat\" vs \"J'ai du chocolat\" vs \"J'ai des chocolats.\" (3 steps)", "answer": "- Step 1: *J'ai un chocolat* = \"I have a chocolate\" — one discrete piece (e.g., one truffle).\n- Step 2: *J'ai du chocolat* = \"I have some chocolate\" — a portion of chocolate as a substance (e.g., a chunk from a bar, or chocolate as food).\n- Step 3: *J'ai des chocolats* = \"I have some chocolates\" — multiple discrete pieces (e.g., a box of truffles).\n\nTakeaway: same noun, three articles, three different mental images — French forces you to commit to countable-vs-mass.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": false}, {"question": "In French, what happens to the article after a negation like *ne...pas*? Give the rule and an example. (3 steps)", "answer": "- Step 1: After a negation, the indefinite/partitive articles *un, une, du, de la, des* all collapse into a single form: $$de$$ (or *d'* before a vowel).\n- Step 2: Example: *J'ai une réservation* (I have a reservation) → *Je n'ai pas **de** réservation* (I don't have a reservation). Not *pas une*.\n- Step 3: Logically: negation cancels the existence of the thing, so French no longer cares about its gender or count — it just says \"none of it.\" That's why one neutral *de* replaces all three articles.\n\nTakeaway: *pas de* is the universal negative-quantity marker.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": true}, {"question": "Why does French say \"C'est beau\" and never \"C'est belle\" when describing something feminine like *la maison*? (3 steps)", "answer": "- Step 1: After *c'est*, the adjective is **always masculine singular** by default, regardless of what's being described.\n- Step 2: This is because *c'est* refers to a vague \"it / this\" — there's no specific grammatical noun to agree with. French treats this neutral subject as masculine by convention.\n- Step 3: So even pointing at a beautiful dress (*une robe*, feminine), you'd say *C'est beau*. If you instead say *Elle est belle* — referring explicitly to *la robe* — then agreement kicks in.\n\nTakeaway: *c'est* + masculine adjective always; *il/elle est* + agreeing adjective.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": false}, {"question": "How do French nouns get their gender, and what's the practical strategy for a beginner? (3 steps)", "answer": "- Step 1: Every French noun is either masculine or feminine — this is grammatical, not biological. *Le livre* (book, m), *la table* (table, f) — there's no \"logic\" to most assignments.\n- Step 2: Some endings hint at gender: *-tion, -té, -ée* tend to be feminine (*la nation, la liberté*); *-age, -ment, -eau* tend to be masculine (*le fromage, le moment, le bateau*). But exceptions exist.\n- Step 3: The practical strategy: **always learn a noun together with its article** (*un croissant*, not just *croissant*). The article encodes the gender, and you build the association automatically.\n\nTakeaway: gender is memorized as part of the word, not deduced from rules.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": false}, {"question": "When ordering at a French restaurant, what are three polite ways to say \"I would like to have ___\"? (3 steps)", "answer": "- Step 1: $$Je\\ voudrais\\ \\dots$$ — \"I would like...\" (most common, from *vouloir* in conditional).\n- Step 2: $$J'aimerais\\ \\dots$$ — \"I would like...\" (from *aimer* in conditional, slightly softer).\n- Step 3: $$Je\\ pourrais\\ avoir\\ \\dots$$ — \"Could I have...\" (from *pouvoir* in conditional, asks permission).\n\nTakeaway: all three use the **conditional** mood, which is the French equivalent of English \"would\" — it's the polite register. Avoid *je veux* (\"I want\"), which sounds blunt in a restaurant.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "What does *Je vais prendre le hamburger* mean, and what grammatical structure does it use? (3 steps)", "answer": "- Step 1: Literal: \"I am going to take the hamburger.\" Idiomatic: \"I'll have the hamburger.\"\n- Step 2: Structure: *aller* (to go) conjugated + infinitive → the **near future** (*futur proche*). Like English \"I'm going to ___.\"\n- Step 3: In restaurants, *prendre* (\"to take\") is the standard verb for ordering — French speakers \"take\" a dish rather than \"have\" it.\n\nTakeaway: *je vais prendre* + dish = the most natural way to order.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": false}, {"question": "Translate and explain *Qu'est-ce que c'est ?* — what is its function and how is it pronounced? (3 steps)", "answer": "- Step 1: Means \"What is it?\" / \"What is this?\" — used to ask about an unfamiliar dish, object, or concept.\n- Step 2: Pronounced roughly *\"keske se\"* — the *qu'est-ce que* part flattens phonetically into \"kess-kuh.\"\n- Step 3: Structurally it's *que* (what) + *est-ce que* (interrogative marker) + *c'est* (it is). Literally: \"what is-it-that it is?\" A redundant-feeling construction, but standard.\n\nExample: *Qu'est-ce que c'est, la salade niçoise ?* = \"What is the salade niçoise?\"", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": false}, {"question": "A waiter asks *Quelle cuisson pour la viande ?* — what are they asking, and what are the four possible answers? (5 steps)", "answer": "- Step 1: They're asking \"What cooking [level] for the meat?\" — i.e., how do you want it cooked?\n- Step 2: $$bleu$$ — \"blue\" — very rare, barely seared.\n- Step 3: $$saignant$$ — literally \"bleeding\" — rare.\n- Step 4: $$\\grave{a}\\ point$$ — \"to the point\" — medium rare (the French default and waiter's recommendation).\n- Step 5: $$bien\\ cuit$$ — \"well cooked\" — well done.\n\nTakeaway: French cuisson scale runs cooler than American — *à point* is closer to American \"medium rare,\" not \"medium.\"", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": false}, {"question": "How do you ask for the bill politely in French? Give at least three variants. (3 steps)", "answer": "- Step 1: $$L'addition,\\ s'il\\ vous\\ pla\\hat{i}t.$$ — \"The bill, please.\" Short and standard.\n- Step 2: $$Je\\ pourrais\\ avoir\\ l'addition,\\ s'il\\ vous\\ pla\\hat{i}t\\ ?$$ — \"Could I have the bill, please?\" More polite, uses the conditional.\n- Step 3: $$Pourrais$$-$$je\\ avoir\\ l'addition\\ ?$$ — Same meaning with inversion (*pourrais-je*), most formal register.\n\nNote: *la note* is a synonym for *l'addition* in restaurant context.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": false}, {"question": "How does a French restaurant typically confirm whether you have a booking, and how do you respond yes/no? (3 steps)", "answer": "- Step 1: The host asks: $$Vous\\ avez\\ une\\ r\\acute{e}servation\\ ?$$ — \"Do you have a reservation?\"\n- Step 2: Yes-answer: $$Oui,\\ j'ai\\ une\\ r\\acute{e}servation\\ pour\\ deux\\ personnes.$$ — \"Yes, I have a reservation for two people.\" Note *une* (feminine, because *réservation* is feminine).\n- Step 3: No-answer: $$Non,\\ je\\ n'ai\\ pas\\ de\\ r\\acute{e}servation.$$ — Note that *une* becomes *de* after negation (the *pas de* rule).", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": false}, {"question": "A French restaurant asks *À l'intérieur ou en terrasse ?* — what does this mean, and how do you express a preference? (2 steps)", "answer": "- Step 1: Means \"Inside or on the terrace?\" — they want to know your seating preference.\n- Step 2: Reply with $$Je\\ pr\\acute{e}f\\grave{e}re\\ en\\ terrasse$$ (\"I prefer the terrace\") or $$Je\\ pr\\acute{e}f\\grave{e}re\\ \\grave{a}\\ l'int\\acute{e}rieur$$ (\"I prefer inside\").", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "Walk through a typical French phone reservation: what does the host ask, in what order? (5 steps)", "answer": "- Step 1: Greeting & purpose: *Bonsoir, [restaurant name]. C'est pour une réservation ?* — \"Good evening, is it for a reservation?\"\n- Step 2: When? *À quelle heure ?* — \"At what time?\" (You answer e.g., *à 19h30*.)\n- Step 3: How many? *Pour combien de personnes ?* — \"For how many people?\"\n- Step 4: Contact: *Votre numéro de téléphone pour confirmer la réservation ?* — \"Your phone number to confirm?\"\n- Step 5: Confirmation & closing: *C'est noté, à ce soir !* — \"Noted, see you tonight!\" You reply *Merci beaucoup, au revoir.*\n\nTakeaway: the sequence is time → party size → phone → confirm.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "What are the French numbers 0 through 10? (3 steps)", "answer": "- Step 1: 0–3: $$z\\acute{e}ro,\\ un,\\ deux,\\ trois$$.\n- Step 2: 4–6: $$quatre,\\ cinq,\\ six$$.\n- Step 3: 7–10: $$sept,\\ huit,\\ neuf,\\ dix$$.", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": false}, {"question": "What are the French numbers 11 through 20, and why is this range tricky? (4 steps)", "answer": "- Step 1: 11–13: $$onze,\\ douze,\\ treize$$ — each is a unique word (not \"ten-one, ten-two\").\n- Step 2: 14–16: $$quatorze,\\ quinze,\\ seize$$ — still unique words. *Quatorze* is pronounced like \"kah-torz.\"\n- Step 3: 17–19: switch to compounds — $$dix$$-$$sept,\\ dix$$-$$huit,\\ dix$$-$$neuf$$ (\"ten-seven,\" etc.).\n- Step 4: 20: $$vingt$$.\n\nTakeaway: French invents fresh words for 11–16, then becomes additive from 17 onward — unlike English which becomes additive at 13.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": false}, {"question": "How does French build the tens 20–60 and form their \"twenty-one\" style? (3 steps)", "answer": "- Step 1: The tens are: $$vingt$$ (20), $$trente$$ (30), $$quarante$$ (40), $$cinquante$$ (50), $$soixante$$ (60).\n- Step 2: For X1 (21, 31, 41, 51, 61) French inserts *et* (\"and\"): $$vingt$$-$$et$$-$$un,\\ trente$$-$$et$$-$$un$$, etc.\n- Step 3: For X2 through X9, just hyphenate: *vingt-deux, vingt-trois, ..., vingt-neuf*. No *et*.\n\nTakeaway: *et* appears only at X1 (and at 71, as we'll see); otherwise hyphens.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "Why is 70 in French *soixante-dix* and not its own word? What's the logic? (3 steps)", "answer": "- Step 1: Old French used a base-20 (vigesimal) system inherited from Celtic/Gaulish influence. Modern standard French preserves this oddity from 70 onward.\n- Step 2: $$soixante$$-$$dix$$ literally means \"sixty-ten\" = 60 + 10 = 70. So you keep counting *up from sixty*: 71 = *soixante-et-onze* (sixty-and-eleven), 72 = *soixante-douze* (sixty-twelve), ..., 79 = *soixante-dix-neuf* (sixty-nineteen).\n- Step 3: Note 71 uniquely re-uses *et* (\"and\") because *onze* (eleven) starts a new sub-sequence — it's the \"X1\" of the soixante-dix block.\n\nTakeaway: 70–79 = \"60 + (10 through 19).\"", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": true}, {"question": "Why is 80 in French *quatre-vingts* — what does it literally mean? (3 steps)", "answer": "- Step 1: $$quatre$$-$$vingts$$ literally means \"four-twenties\" = 4 × 20 = 80. Another fossil of the base-20 system.\n- Step 2: For 81–99 the *s* drops: *quatre-vingt-un, quatre-vingt-deux, ..., quatre-vingt-neuf*. Notice no *et* at 81 — *quatre-vingt-un*, not *quatre-vingt-et-un*.\n- Step 3: This is because *vingts* keeps its *s* only when it's truly the final word; once followed by another number, it loses the *s*.\n\nTakeaway: 80 = 4×20, and the *et* disappears from 81 onward.", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "Why is 90 in French *quatre-vingt-dix*? Extend the pattern up to 99. (3 steps)", "answer": "- Step 1: $$quatre$$-$$vingt$$-$$dix$$ literally means \"four-twenty-ten\" = (4×20) + 10 = 90. It combines both quirks (base-20 + the \"tens+teens\" trick used for 70).\n- Step 2: 91 = *quatre-vingt-onze* (4×20 + 11), 92 = *quatre-vingt-douze*, ..., 99 = *quatre-vingt-dix-neuf* (4×20 + 19).\n- Step 3: So 90–99 = (80) + (10 through 19). No *et*, even at 91.\n\nTakeaway: French 90s = \"80 + teens.\"", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": true}, {"question": "What is 100 in French, and how would you mentally compute 87 = \"quatre-vingt-sept\"? (3 steps)", "answer": "- Step 1: 100 = $$cent$$.\n- Step 2: For 87, start at 80 = *quatre-vingt* (4 × 20). Then add 7: *quatre-vingt-sept*.\n- Step 3: Note no *et* and no *s* on *vingt* once followed by another number.\n\nTakeaway: mental computation = pick the right base (60 for 60s–70s, 80 for 80s–90s) then add.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": true}, {"question": "When reading the phone number \"0678 65 67 87\" aloud in French, how would you say \"78\", \"65\", \"67\", and \"87\"? (4 steps)", "answer": "- Step 1: 78 = $$soixante$$-$$dix$$-$$huit$$ (60 + 18).\n- Step 2: 65 = $$soixante$$-$$cinq$$ (60 + 5).\n- Step 3: 67 = $$soixante$$-$$sept$$ (60 + 7).\n- Step 4: 87 = $$quatre$$-$$vingt$$-$$sept$$ (80 + 7).\n\nTakeaway: French phone numbers are read in pairs of two digits — fluency requires comfort with the 70s/80s/90s logic.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": false}, {"question": "When seating customers in a French restaurant, what do *suivez-moi* and *installez-vous* mean? (2 steps)", "answer": "- Step 1: $$Suivez$$-$$moi,\\ s'il\\ vous\\ pla\\hat{i}t$$ — \"Follow me, please.\" The waiter uses this to lead you to the table.\n- Step 2: $$Installez$$-$$vous$$ — literally \"install yourselves\" — meaning \"get settled / take your seats.\" Both use the formal *vous* imperative.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": false}, {"question": "Once seated, the waiter asks *Que désirez-vous boire ?* — what does this mean, and what's a typical follow-up question about water? (3 steps)", "answer": "- Step 1: $$Que\\ d\\acute{e}sirez$$-$$vous\\ boire\\ ?$$ — \"What would you like to drink?\" Uses *désirer* (to desire), a polite/formal verb.\n- Step 2: Follow-up: $$Souhaiteriez$$-$$vous\\ une\\ bouteille\\ d'eau\\ gazeuse\\ ou\\ d'eau\\ plate\\ ?$$ — \"Would you like a bottle of sparkling water or still water?\"\n- Step 3: *Gazeuse* = sparkling/carbonated; *plate* = still/flat. A standard French restaurant question.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "What are two French ways for the waiter to ask \"Have you chosen?\" / \"Are you ready to order?\" (2 steps)", "answer": "- Step 1: $$Avez$$-$$vous\\ fait\\ votre\\ choix\\ ?$$ — \"Have you made your choice?\" (Literal.)\n- Step 2: $$Avez$$-$$vous\\ choisi\\ ?$$ — \"Have you chosen?\" Shorter, uses the past participle *choisi* from *choisir*.\n\nBoth use the *passé composé* (have + past participle) — a tense you'll learn later, but recognize now as the \"have done\" structure.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": false}, {"question": "What does *Est-ce que tout va bien ?* mean, and when does a French waiter use it? (2 steps)", "answer": "- Step 1: Literally \"Is it that all goes well?\" → \"Is everything okay?\" / \"Is everything alright?\"\n- Step 2: Asked mid-meal to check satisfaction. Reply with *oui, tout va bien, merci* (\"yes, everything's fine, thanks\") or flag an issue.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "What does the waiter mean by *Est-ce que vous les voulez en même temps ?* (3 steps)", "answer": "- Step 1: Literal: \"Do you want them at the same time?\"\n- Step 2: Context: when you've ordered multiple dishes (e.g., starter + main, or two mains), the waiter checks whether to serve them simultaneously or in sequence.\n- Step 3: *En même temps* = \"at the same time\" — a useful set phrase.", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "What's the difference between saying *Je vais prendre* and *On va prendre* when ordering for a group? (3 steps)", "answer": "- Step 1: $$Je\\ vais\\ prendre\\ \\dots$$ = \"I'll have ...\" — speaking only for yourself.\n- Step 2: $$On\\ va\\ prendre\\ \\dots$$ = \"We'll have ...\" — *on* is informal \"we\" and is conjugated as 3rd person singular (*on va*, not *on allons*).\n- Step 3: Similarly: *on aimerait* (\"we would like\"), *on pourrait avoir* (\"could we have\"). *On* is extremely common in spoken French — more natural than *nous* in casual settings.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": true}, {"question": "Translate to French: \"Yes, an entrecôte rare, please.\" (2 steps)", "answer": "- Step 1: \"An entrecôte\" = *une entrecôte* (feminine noun).\n- Step 2: \"Rare\" cooking = *saignante* (agrees in feminine because *entrecôte* is feminine). Full sentence: $$Oui,\\ une\\ entrec\\hat{o}te\\ saignante,\\ s'il\\ vous\\ pla\\hat{i}t.$$\n\nTakeaway: cuisson adjectives agree with the noun's gender — *saignant* (m) vs *saignante* (f).", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": false}, {"question": "Why does the French *réunion* (meeting) take *est urgente* with an *e* on the adjective, but *c'est urgent* drops the *e*? (3 steps)", "answer": "- Step 1: *La réunion* is feminine. When an adjective agrees with it explicitly (*la réunion est urgente*), it takes the feminine *-e*.\n- Step 2: With *c'est*, the subject is the vague \"it/this\" — no specific gendered noun to agree with — so the adjective stays masculine singular: *c'est urgent*.\n- Step 3: Same logic gives: *la réunion est finie* (feminine agreement) but *c'est fini* (masculine default).\n\nTakeaway: explicit noun → agreement; *c'est* → masculine default, always.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": true}, {"question": "Translate to French: \"We have a reservation number.\" (3 steps)", "answer": "- Step 1: \"We\" = *nous* (formal) — conjugate *avoir* → *nous avons*.\n- Step 2: \"A reservation number\" = *un numéro de réservation*. *Numéro* is masculine, so *un* (not *une*).\n- Step 3: Full: $$Nous\\ avons\\ un\\ num\\acute{e}ro\\ de\\ r\\acute{e}servation.$$\n\nCommon error: confusing *avons* (nous) with *avez* (vous). They sound similar but differ by person.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": false}, {"question": "Translate: \"No, there's no problem.\" Why does *un* become *de* here? (3 steps)", "answer": "- Step 1: Affirmative: *Il y a un problème* (\"There is a problem\"). Construction: *il y a* = \"there is/are.\"\n- Step 2: Negate: wrap *il y a* with *ne...pas* → *il n'y a pas*. Then the article *un* must collapse to *de* (the negation rule).\n- Step 3: Result: $$Non,\\ il\\ n'y\\ a\\ pas\\ de\\ probl\\grave{e}me.$$\n\nTakeaway: any *un/une/du/de la/des* after negation → *de*.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": true}, {"question": "How would you say \"Yes, I'm late\" in French, and what's the gender consideration? (3 steps)", "answer": "- Step 1: $$Oui,\\ je\\ suis\\ en\\ retard.$$ — \"Yes, I am late.\" Uses *être* + *en retard* (a fixed adverbial phrase).\n- Step 2: *En retard* is invariable — it doesn't change form for gender or number. So a man, woman, or group all say *en retard*.\n- Step 3: Compare with adjectives like *content/contente* which would agree. *En retard* is a phrase, not an adjective, hence no agreement.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": true}, {"question": "Translate: \"They have an appointment.\" What gender is *rendez-vous*? (3 steps)", "answer": "- Step 1: \"They have\" = *ils ont* (or *elles ont* if all-female group).\n- Step 2: *Rendez-vous* is masculine, so \"an appointment\" = *un rendez-vous*. (It's invariable in the plural too: *des rendez-vous*.)\n- Step 3: Full: $$Ils\\ ont\\ un\\ rendez$$-$$vous.$$", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": true}, {"question": "Build the sentence \"She has some grilled salmon\" two different ways, and explain the difference. (3 steps)", "answer": "- Step 1: Option A (countable): $$Elle\\ a\\ un\\ saumon\\ grill\\acute{e}.$$ — \"She has a (whole) grilled salmon\" (one fish/portion as a unit).\n- Step 2: Option B (partitive): $$Elle\\ a\\ du\\ saumon\\ grill\\acute{e}.$$ — \"She has some grilled salmon\" (a portion of salmon as food/substance).\n- Step 3: *Saumon* is masculine, so *un* / *du*. *Grillé* agrees as masculine singular (no extra *e*).\n\nTakeaway: same dish, different framing — *un* for a unit, *du* for a portion.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "Translate: \"You (formal) have a croque-monsieur.\" What article and why? (3 steps)", "answer": "- Step 1: \"You\" formal = *vous* → conjugate *avoir* → *vous avez*.\n- Step 2: *Croque-monsieur* is masculine (it refers to *un sandwich*), so *un croque-monsieur*.\n- Step 3: $$Vous\\ avez\\ un\\ croque$$-$$monsieur.$$\n\nNote: *croque-monsieur* is invariable in the plural (*des croque-monsieur*).", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": false}, {"question": "Why is *une carafe d'eau* spelled with *d'* instead of *de*? (2 steps)", "answer": "- Step 1: *De* + a word starting with a vowel triggers elision → *d'*. *Eau* starts with the vowel *e*.\n- Step 2: So *de eau* becomes *d'eau*. The full phrase *une carafe d'eau* = \"a carafe of water\" — the *de* expresses \"of/containing.\"\n\nTakeaway: elision (*de → d'*) before any vowel is automatic and obligatory.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}, {"question": "What's the difference between *Vous avez une crème brûlée* and *Vous avez de la crème brûlée*? (3 steps)", "answer": "- Step 1: *Une crème brûlée* = \"a crème brûlée\" — one whole dessert as a unit (one ramekin).\n- Step 2: *De la crème brûlée* = \"some crème brûlée\" — a portion of the substance (e.g., a spoonful, or unspecified amount).\n- Step 3: *Crème* is feminine, so the partitive is *de la* (not *du*). The choice mirrors the *un/du* split for masculine nouns.", "source": "Opus 4.7 ②", "_id": "opus_2_40", "judge_pick": true}, {"question": "In *Ils ont des plats du jour*, identify the two different uses of \"des\"/\"du\" and explain why each is correct. (3 steps)", "answer": "- Step 1: *des plats* — here *des* is the **plural indefinite** (\"some [several] dishes\"). *Plat* is masculine, *plats* is plural, *des* is the plural form of *un*.\n- Step 2: *du jour* — here *du* is *de + le* (contraction): \"of the day.\" It expresses possession/origin, not partitive. *Plat du jour* = \"dish of the day.\"\n- Step 3: So the same letters *du* play two roles in French: the contraction *de + le*, and the partitive article (\"some\" of a mass noun). Context distinguishes them.\n\nTakeaway: *du* can mean either \"of the\" or \"some\" — read the surrounding noun to decide.", "source": "Opus 4.7 ②", "_id": "opus_2_41", "judge_pick": true}, {"question": "Order the events in a typical French restaurant interaction from arrival to departure. (6 steps)", "answer": "- Step 1: Greeting & seating: *Bonsoir. Suivez-moi, s'il vous plaît. Installez-vous.*\n- Step 2: Drinks: *Que désirez-vous boire ?* — order water (still/sparkling) and other drinks.\n- Step 3: Ordering: *Avez-vous fait votre choix ?* — reply *Je vais prendre / Je voudrais ...*\n- Step 4: Clarifying questions: *Quelle cuisson pour la viande ? Est-ce que vous les voulez en même temps ?*\n- Step 5: Mid-meal check-in: *Est-ce que tout va bien ?* and *Je reviens tout de suite* if the waiter steps away.\n- Step 6: Bill: *L'addition, s'il vous plaît.* Then *Merci, au revoir.*", "source": "Opus 4.7 ②", "_id": "opus_2_42", "judge_pick": true}, {"question": "Translate to French: \"I don't have any chocolate.\" Walk through the article transformation. (3 steps)", "answer": "- Step 1: Affirmative form: *J'ai du chocolat* — partitive *du* because chocolate is treated as a mass.\n- Step 2: Apply negation *ne...pas*: *Je n'ai pas du chocolat* — but this is wrong! Negation collapses *du* to *de*.\n- Step 3: Correct: $$Je\\ n'ai\\ pas\\ de\\ chocolat.$$\n\nTakeaway: the negation kills the partitive — there's \"none of\" the substance, so French uses neutral *de*.", "source": "Opus 4.7 ②", "_id": "opus_2_43", "judge_pick": true}, {"question": "Why is the negative-with-*pas de* form logically elegant? Probe the deeper reason. (3 steps)", "answer": "- Step 1: *Un/une/du/de la/des* all express *some positive quantity* (one unit, some portion, several items).\n- Step 2: Negation says: that positive quantity is zero — none. Once quantity is zero, the distinction between \"one unit\" and \"some portion\" becomes meaningless. There's just absence.\n- Step 3: So French collapses all positive-quantity articles into one neutral *de* under negation. It's not arbitrary — it reflects the loss of quantitative information.\n\nTakeaway: *pas de* = \"zero of,\" regardless of how the positive form would have been counted.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "What's the difference between *nous avons* and *vous avez*, and why are they easy to confuse? (3 steps)", "answer": "- Step 1: $$nous\\ avons$$ = \"we have\" — 1st person plural.\n- Step 2: $$vous\\ avez$$ = \"you have\" — 2nd person plural or formal singular.\n- Step 3: Both end in similar nasal vowel + consonant patterns (*-ons* vs *-ez*), and both start with *av-*. The key distinction: *-ons* is \"we,\" *-ez* is \"you.\" This *-ons / -ez* pattern recurs in nearly every French verb's conjugation, so internalize it early.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": true}, {"question": "When you say *J'ai une réservation pour deux personnes*, why is it *deux personnes* (plural) and not *deux personne*? (2 steps)", "answer": "- Step 1: French nouns add *-s* in the plural just like English: *personne → personnes*.\n- Step 2: After any number ≥ 2 (or any plural quantity), the noun is plural. *Deux personnes, trois cafés, des chocolats*. Note the *-s* is usually silent in speech but spelled.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": true}, {"question": "Why does French say *pour combien de personnes* with *de* instead of *des*? (3 steps)", "answer": "- Step 1: After expressions of quantity (*combien, beaucoup, un peu, assez, trop*), French uses *de* (or *d'*) — **never** *du/de la/des*.\n- Step 2: So: *combien **de** personnes* (how many people), *beaucoup **de** vin* (a lot of wine), *un peu **d'**eau* (a little water).\n- Step 3: The logic: quantity words already express \"how much/many,\" so adding the partitive *du/des* would be redundant. *De* alone is enough to link the quantifier to the noun.\n\nTakeaway: quantity word + *de* + noun. No partitive.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": true}, {"question": "Translate the polite full sentence: \"Could we have a carafe of water, please?\" (3 steps)", "answer": "- Step 1: \"We\" informal/spoken = *on* → conjugate *pouvoir* (conditional) → *on pourrait*. Or formal *nous pourrions*.\n- Step 2: \"Have a carafe of water\" = *avoir une carafe d'eau*. (Don't forget the elision *d'*.)\n- Step 3: Full (spoken): $$Est$$-$$ce\\ qu'on\\ pourrait\\ avoir\\ une\\ carafe\\ d'eau,\\ s'il\\ vous\\ pla\\hat{i}t\\ ?$$\n\nTakeaway: *est-ce que* + sentence = the standard polite question marker.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": false}, {"question": "Quick mental drill: how would you say 71, 75, and 99 in French? (3 steps)", "answer": "- Step 1: 71 = 60 + 11 = $$soixante$$-$$et$$-$$onze$$. (Unique *et* because *onze* is the \"11\" of the sub-sequence.)\n- Step 2: 75 = 60 + 15 = $$soixante$$-$$quinze$$. (No *et*.)\n- Step 3: 99 = 80 + 19 = $$quatre$$-$$vingt$$-$$dix$$-$$neuf$$. (No *et*, no *s* on *vingt*.)\n\nTakeaway: anchor at the base (60 or 80), add the rest, remember *et* only at *soixante-et-onze* and the X1s of 20–60.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": true}], "count": 50}}, "meta": {"minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 3560, "out_tokens": 14017, "reasoning_chars": 1932, "cost_eur": 0.0148, "elapsed_s": 123, "content_chars": 45041}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 3560, "out_tokens": 8237, "reasoning_chars": 1521, "cost_eur": 0.009, "elapsed_s": 79, "content_chars": 27390}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 5760, "out_tokens": 19107, "reasoning_chars": 0, "cost_eur": 1.3979, "elapsed_s": 260, "content_chars": 43640}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 5760, "out_tokens": 16106, "reasoning_chars": 0, "cost_eur": 1.1908, "elapsed_s": 218, "content_chars": 34728}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.75, "in_tokens": 3792, "out_tokens": 3646, "reasoning_chars": 4676, "cost_eur": 0.0047, "elapsed_s": 50, "content_chars": 7917}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 3792, "out_tokens": 3592, "reasoning_chars": 5486, "cost_eur": 0.0047, "elapsed_s": 51, "content_chars": 6775}, "qwen_3": {"run": 3, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 3792, "out_tokens": 5383, "reasoning_chars": 5983, "cost_eur": 0.0066, "elapsed_s": 77, "content_chars": 11945}, "qwen_4": {"run": 4, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.85, "in_tokens": 3792, "out_tokens": 4198, "reasoning_chars": 5631, "cost_eur": 0.0053, "elapsed_s": 62, "content_chars": 9037}}};
const SK='french_tutor_doc';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
