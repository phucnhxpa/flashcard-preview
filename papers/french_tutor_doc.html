ence between \"ne...pas\" and \"pas de\"? When do you use each? (2 steps)", "answer": "- Step 1: **Ne...pas** negates a verb (the full negation):\n  - $$Je\\ ne\\ mange\\ pas$$ = I don't eat\n  - $$Je\\ n'ai\\ pas$$ = I don't have\n- Step 2: **Pas de** replaces the article after a negated verb when referring to a noun:\n  - $$Je\\ n'ai\\ pas\\ de\\ réservation$$ (NOT \"pas de la réservation\")\n  - $$Je\\ ne\\ veux\\ pas\\ de\\ café$$ = I don't want (any) coffee\n\nThe rule: after pas de, use NO article (no un/une/du/de la/des).", "source": "MiniMax ①", "_id": "minimax_1_15", "judge_pick": true}, {"question": "Translate to French: \"Do you have a table for two, please?\" (2 steps)", "answer": "- Step 1: This is a common restaurant phrase. Key vocabulary:\n  - \"Do you have\" = $$Avez-vous$$\n  - \"A table\" = $$une\\ table$$\n  - \"For two\" = $$pour\\ deux$$\n  - \"Please\" = $$s'il\\ vous\\ plaît$$\n- Step 2: Full translation: $$Avez-vous\\ une\\ table\\ pour\\ deux\\ s'il\\ vous\\ plaît$$?\n\nAlternative (using AVOIR): $$Est-ce\\ que\\ vous\\ avez\\ une\\ table\\ pour\\ deux$$?", "source": "MiniMax ①", "_id": "minimax_1_16", "judge_pick": false}, {"question": "What does the server say when showing customers to their table? Give two phrases from the lesson. (1 step)", "answer": "- Step 1: - $$Suivez-moi,\\ s'il\\ vous\\ plaît$$ = Follow me, please\n  - $$Installez-vous$$ = Get settled / Make yourselves comfortable\n\nThese are the first phrases customers hear when being seated.", "source": "MiniMax ①", "_id": "minimax_1_17", "judge_pick": false}, {"question": "What does the server ask to know what you want to drink, and how do you respond \"Yes, I'd like...\"? (2 steps)", "answer": "- Step 1: The question: $$Que\\ incontourn$$? = What would you like to drink?\n- Step 2: Possible polite responses:\n  - $$Oui,\\ j'aimerais\\ avoir\\...$$\n  - $$Oui,\\ je\\ vais\\ prendre\\...$$\n  - $$Oui,\\ on\\ aimerait\\...$$ (informal \"we\")\n\nAlso: $$Souhaiteriez\\ une\\ bouteille\\ d'eau\\ gazeuse\\ ou\\ d'eau\\ plate$$? = Would you like a bottle of sparkling or still water?", "source": "MiniMax ①", "_id": "minimax_1_18", "judge_pick": false}, {"question": "How does the server ask \"Have you made your choice?\" in French? (1 step)", "answer": "- Step 1: $$Avez-vous\\ fait\\ votre\\ choix$$?\n- Alternative: $$Avez-vous\\ choisi$$?\n\nResponse: $$Oui,\\ je\\ vais\\ prendre\\...$$ or $$Oui,\\ j'aimerais\\...$$", "source": "MiniMax ①", "_id": "minimax_1_19", "judge_pick": false}, {"question": "What are two ways to say \"Can I have...?\" when ordering, using the conditional or \"est-ce que\"? (1 step)", "answer": "- Step 1: - $$Oui,\\ je\\ pourrais\\ avoir\\...$$\n  - $$Est-ce\\ que\\ je\\ peux\\ avoir\\...$$\n  - $$Est-ce\\ qu'on\\ pourrait\\ avoir\\...$$ (using \"on\" for \"we\")\n\nAll are polite ways to make a request in a restaurant context.", "source": "MiniMax ①", "_id": "minimax_1_20", "judge_pick": false}, {"question": "In a restaurant, how does the server check if everything is okay with your meal, and what is the typical response? (2 steps)", "answer": "- Step 1: Server asks: $$Est-ce\\ que\\ tout\\ va\\ bien$$? = Is everything okay?\n- Step 2: Server's follow-up: $$Je\\ reviens\\ tout\\ de\\ suite$$ = I'm coming back right away (after taking order or delivering food)\n\nThis is standard service language in French restaurants.", "source": "MiniMax ①", "_id": "minimax_1_21", "judge_pick": false}, {"question": "Write the numbers 0-10 in French. (1 step)", "answer": "- Step 1: $$0 = zéro$$\n$$1 = un$$\n$$2 = deux$$\n$$3 = trois$$\n$$4 = quatre$$\n$$5 = cinq$$\n$$6 = six$$\n$$7 = sept$$\n$$8 = huit$$\n$$9 = neuf$$\n$$10 = dix$$", "source": "MiniMax ①", "_id": "minimax_1_22", "judge_pick": false}, {"question": "Write the numbers 11-20 in French. (1 step)", "answer": "- Step 1: $$11 = onze$$\n$$12 = douze$$\n$$13 = treize$$\n$$14 = quatorze$$\n$$15 = quinze$$\n$$16 = seize$$\n$$17 = dix-sept$$\n$$18 = dix-huit$$\n$$19 = dix-neuf$$\n$$20 = vingt$$\n\nNote: 17, 18, 19 literally mean \"ten-seven,\" \"ten-eight,\" \"ten-nine\" — this pattern continues for 70s and 90s.", "source": "MiniMax ①", "_id": "minimax_1_23", "judge_pick": false}, {"question": "How do you form the tens (30, 40, 50, 60) in French, and what is the pattern for numbers 21, 31, 41, etc.? (2 steps)", "answer": "- Step 1: The tens: $$30 = trente$$, $$40 = quarante$$, $$50 = cinquante$$, $$60 = soixante$$\n- Step 2: Adding units: use a hyphen (or \"et\" for 21, 31, 41, 51, 61):\n  - $$21 = vingt-et-un$$\n  - $$31 = trente-et-un$$\n  - $$41 = quarante-et-un$$\n  - $$51 = cinquante-et-un$$\n  - $$61 = soixante-et-un$$\n  - But: $$22 = vingt-deux$$, $$32 = trente-deux$$, etc. (no \"et\")", "source": "MiniMax ①", "_id": "minimax_1_24", "judge_pick": false}, {"question": "In French, what is the difference between \"du\" and \"de la\"? When is each used? (1 step)", "answer": "- Step 1: Both mean \"some\" (partitive article), but:\n  - $$Du$$ = some + masculine noun ($$du\\ café$$ = some coffee)\n  - $$De\\ la$$ = some + feminine noun ($$de\\ la\\ crème$$ = some cream)\n\nThe choice depends on the gender of the noun that follows, NOT on the noun being \"countable\" vs \"uncountable\" — both are used with mass/uncountable nouns.", "source": "MiniMax ①", "_id": "minimax_1_25", "judge_pick": true}, {"question": "The lesson shows \"J'ai une carafe d'eau\" — why is it \"d'eau\" and not \"de l'eau\"? (2 steps)", "answer": "- Step 1: When a feminine noun begins with a vowel sound, \"de la\" contracts to \"de l'\" (elision).\n- Step 2: However, in \"une carafe d'eau,\" the structure is different:\n  - $$Une\\ carafe\\ d'eau$$ = a carafe of water (carafe = container, d'eau describes what's in it)\n  - This uses the preposition \"de\" (d' before vowel) to show contents\n  - Compare: $$Je\\ bois\\ de\\ l'eau$$ = I drink (some) water (partitive)\n\nThe \"d'\" here is de + vowel sound, not partitive \"de la.\"", "source": "MiniMax ①", "_id": "minimax_1_26", "judge_pick": false}, {"question": "What is the French for \"a rendezvous\" and how do you say \"they have an appointment\" in the negative? (2 steps)", "answer": "- Step 1: $$Un\\ rendez-vous$$ (masculine noun — note the hyphen)\n- Step 2: From homework: $$Ils\\ ont\\ un\\ rendez-vous$$ → Negative: $$Ils\\ n'ont\\ pas\\ de\\ rendez-vous$$\n\nNote: In negation, we use \"pas de\" (no article) after the negated verb: $$Je\\ n'ai\\ pas\\ de\\ réservation$$.", "source": "MiniMax ①", "_id": "minimax_1_27", "judge_pick": false}, {"question": "In the restaurant conversation, the client reserves for \"19h30\" (7:30 PM). How is this expressed in French? (1 step)", "answer": "- Step 1: $$À\\ dix-neuf\\ heures\\ trente$$ or simply $$À\\ dix-neuf\\ heures\\ trente$$\n- In French, times use the 24-hour clock in formal contexts: 19h30 = 7:30 PM\n- Often spoken as: $$À\\ dix-neuf\\ heures\\ trente$$ or $$À\\ dix-neuf\\ heures\\ et\\ demie$$", "source": "MiniMax ①", "_id": "minimax_1_28", "judge_pick": false}, {"question": "What is the French for \"the bill please\" using both vocabulary words from the lesson? (1 step)", "answer": "- Step 1: - $$L'addition\\ s'il\\ vous\\ plaît$$\n  - $$La\\ note\\ s'il\\ vous\\ plaît$$\n\nBoth are correct and interchangeable. $$L'addition$$ is slightly more formal/polite in restaurants.", "source": "MiniMax ①", "_id": "minimax_1_29", "judge_pick": false}, {"question": "A customer wants to order an entrecôte that is \"saignante\" (rare). Write the full polite order. (1 step)", "answer": "- Step 1: $$Oui,\\ une\\ entrecôte\\ saignante\\ s'il\\ vous\\ plaît$$\n\nThis combines: affirmative word + item + doneness + polite \"please.\"", "source": "MiniMax ①", "_id": "minimax_1_30", "judge_pick": false}, {"question": "What does the phrase \"ou\" mean in French, and give an example from restaurant vocabulary. (1 step)", "answer": "- Step 1: $$Ou$$ = \"or\" (conjunction)\n- Example from the lesson: $$Eau\\ gazeuse\\ ou\\ eau\\ plate$$? = Sparkling water or still water?\n\nThis is essential for making choices at restaurants when offered options.", "source": "MiniMax ①", "_id": "minimax_1_31", "judge_pick": false}, {"question": "In the lesson, there's a correction: \"avez != avons\" — explain why these are different and when to use each. (2 steps)", "answer": "- Step 1: $$Avez$$ and $$avons$$ are both forms of AVOIR, but:\n  - $$Avez$$ = vous avez (you have) — second person plural OR formal singular\n  - $$Avons$$ = nous avons (we have) — first person plural\n- Step 2: From homework: \"nous avons un numéro de réservation\" (we have a reservation number) uses $$avons$$, not $$avez$$.\n\nThe subject determines the verb ending: vous-avez / nous-avons.", "source": "MiniMax ①", "_id": "minimax_1_32", "judge_pick": false}, {"question": "How do you say \"I am late\" in French, using the verb ÊTRE? (1 step)", "answer": "- Step 1: $$Oui,\\ je\\ suis\\ en\\ retard$$ = Yes, I am late\n- From homework solution: \"Oui je suis en retard\" (with accent on \"suis\")\n\nNote: \"En retard\" means \"late\" (literally \"in delay\"). This uses the verb ÊTRE, not AVOIR.", "source": "MiniMax ①", "_id": "minimax_1_33", "judge_pick": false}, {"question": "What is the negative response to \"Avez-vous une réservation?\" — give both the affirmative and negative answers. (1 step)", "answer": "- Step 1: - Affirmative: $$Oui,\\ j'ai\\ une\\ réservation\\ pour\\ deux\\ personnes$$\n  - Negative: $$Non,\\ je\\ n'ai\\ pas\\ de\\ réservation$$\n\nNotice: \"pas de réservation\" (no article) vs \"une réservation\" (indefinite article).", "source": "MiniMax ①", "_id": "minimax_1_34", "judge_pick": false}, {"question": "Explain the difference between \"je n'ai pas\" and \"je n'ai pas de\" in French negation. When does each occur? (2 steps)", "answer": "- Step 1: $$Je\\ n'ai\\ pas$$ = I don't have (general negation of the verb):\n  - $$Je\\ n'ai\\ pas$$ = I don't have (anything/not having)\n- Step 2: $$Je\\ n'ai\\ pas\\ de$$ + noun = I don't have any... (negating a specific noun):\n  - $$Je\\ n'ai\\ pas\\ de\\ réservation$$ = I don't have a reservation\n  - $$Je\\ n'ai\\ pas\\ de\\ temps$$ = I don't have time\n\nThe \"de\" replaces the article (un/une/du/de la/des) after negation.", "source": "MiniMax ①", "_id": "minimax_1_35", "judge_pick": false}, {"question": "How do you say \"no problem\" in French, using the verb ÊTRE? (1 step)", "answer": "- Step 1: $$Non,\\ il\\ n'y\\ a\\ pas\\ de\\ problème$$\n- From homework solution: \"Non, il n'y a pas de problème\"\n- Note: This uses the expression \"il n'y a pas\" (there is not/are not), NOT the verb AVOIR.", "source": "MiniMax ①", "_id": "minimax_1_36", "judge_pick": false}, {"question": "In restaurant service, what does the server say to confirm if customers want dishes served together or separately? (1 step)", "answer": "- Step 1: $$Est-ce\\ que\\ vous\\ les\\ voulez\\ en\\ même\\ temps$$? = Would you like them (all) together?\n- This is asked when ordering multiple courses — \"en même temps\" = at the same time (together) vs separately.", "source": "MiniMax ①", "_id": "minimax_1_37", "judge_pick": false}, {"question": "What is the French for \"we would like\" when ordering, using the informal \"on\" form? (2 steps)", "answer": "- Step 1: In French, \"on\" often replaces \"nous\" in informal speech, meaning \"we.\"\n- Step 2: - $$On\\ va\\ prendre$$ = We're going to take\n  - $$On\\ aimerait$$ = We would like\n  - $$On\\ pourrait\\ avoir$$ = Could we have?\n\nThese are very common in casual restaurant conversations.", "source": "MiniMax ①", "_id": "minimax_1_38", "judge_pick": false}, {"question": "The lesson shows \"elle a une assiette\" (she has a plate). What article would you use if she had some soup instead of a plate? (1 step)", "answer": "- Step 1: - \"A plate\" (countable): $$Elle\\ a\\ une\\ assiette$$ (une = indefinite article for countable)\n  - \"Some soup\" (uncountable): $$Elle\\ a\\ de\\ la\\ soupe$$ (de la = partitive for uncountable)\n\nThe difference: countable objects take un/une/des; uncountable quantities take du/de la/des.", "source": "MiniMax ①", "_id": "minimax_1_39", "judge_pick": false}, {"question": "What does the phrase \"c'est noté Monsieur\" mean in the reservation context? (1 step)", "answer": "- Step 1: $$C'est\\ noté$$ = It's noted / I've noted it (the reservation)\n- Used by the server to confirm they've recorded your booking. The server adds \"Monsieur/Madame\" as a polite form of address.", "source": "MiniMax ①", "_id": "minimax_1_40", "judge_pick": false}, {"question": "How do you count from 70 to 79 in French? Give the full pattern. (1 step)", "answer": "- Step 1: - 70 = $$Soixante-dix$$ (60 + 10)\n  - 71 = $$Soixante-et-onze$$ (60 + 11)\n  - 72 = $$Soixante-douze$$\n  - 73 = $$Soixante-treize$$\n  - 74 = $$Soixante-quatorze$$\n  - 75 = $$Soixante-quinze$$\n  - 76 = $$Soixante-seize$$\n  - 77 = $$Soixante-dix-sept$$\n  - 78 = $$Soixante-dix-huit$$\n  - 79 = $$Soixante-dix-neuf$$\n\nThis is the \"60+10\" system — unlike English \"seventy.\"", "source": "MiniMax ①", "_id": "minimax_1_41", "judge_pick": false}, {"question": "How do you count from 80 to 89 in French? Explain the \"quatre-vingts\" system. (1 step)", "answer": "- Step 1: - 80 = $$Quatre-vingts$$ (4 × 20)\n  - 81 = $$Quatre-vingt-un$$ (NOT \"quatre-vingts-un\")\n  - 82 = $$Quatre-vingt-deux$$\n  - ... up to 89 = $$Quatre-vingt-neuf$$\n\nKey: When 80 is exactly multiplied (80, 160, etc.), add an \"s\" to \"vingts\": $$quatre-vingts$$. But when followed by another number (81-99), drop the \"s\": $$quatre-vingt-un$$.", "source": "MiniMax ①", "_id": "minimax_1_42", "judge_pick": false}, {"question": "How do you count from 90 to 99 in French? (1 step)", "answer": "- Step 1: - 90 = $$Quatre-vingt-dix$$ (4 × 20 + 10)\n  - 91 = $$Quatre-vingt-onze$$\n  - 92 = $$Quatre-vingt-douze$$\n  - 93 = $$Quatre-vingt-treize$$\n  - 94 = $$Quatre-vingt-quatorze$$\n  - 95 = $$Quatre-vingt-quinze$$\n  - 96 = $$Quatre-vingt-seize$$\n  - 97 = $$Quatre-vingt-dix-sept$$\n  - 98 = $$Quatre-vingt-dix-huit$$\n  - 99 = $$Quatre-vingt-dix-neuf$$", "source": "MiniMax ①", "_id": "minimax_1_43", "judge_pick": false}, {"question": "What is the French for \"follow me please\" and \"get settled\" — two essential phrases when being seated? (1 step)", "answer": "- Step 1: - $$Suivez-moi,\\ s'il\\ vous\\ plaît$$ = Follow me, please\n  - $$Installez-vous$$ = Get settled / Sit down\n\nThese are the first service phrases you'll hear entering a French restaurant.", "source": "MiniMax ①", "_id": "minimax_1_44", "judge_pick": false}, {"question": "In the reservation dialogue, the restaurant asks for a phone number \"pour confirmer la réservation\" (to confirm the reservation). What is the typical response to give your number? (1 step)", "answer": "- Step 1: $$Oui,\\ c'est\\ le\\ [number]$$ = Yes, it's [the number]\n- Example: $$Oui,\\ c'est\\ le\\ zéro\\ six\\ soixante-dix-huit\\ soixante-cinq\\ soixante-sept\\ quatre-vingts-sept$$\n\nFrench phone numbers are typically given in pairs of digits.", "source": "MiniMax ①", "_id": "minimax_1_45", "judge_pick": false}, {"question": "What is the difference between \"je voudrais\" and \"je vais prendre\" when ordering? Which is more about the immediate decision? (2 steps)", "answer": "- Step 1: - $$Je\\ voudrais$$ = I would like (polite, conditional)\n  - $$Je\\ vais\\ prendre$$ = I'm going to take (near future, more decisive)\n- Step 2: \"Je vais prendre\" implies you've made your decision and are about to order — it's more immediate. \"Je voudrais\" is more hypothetical/polite.\n\nBoth are correct; \"vouloir\" expresses desire, \"aller + infinitive\" expresses imminent action.", "source": "MiniMax ①", "_id": "minimax_1_46", "judge_pick": false}, {"question": "In the phrase \"elle a du saumon grillé\" (she has some grilled salmon), why is \"du\" used instead of \"un\"? (1 step)", "answer": "- Step 1: Because \"saumon\" here refers to an **uncountable amount** of salmon (some salmon), not a whole salmon fish.\n- Compare: $$Elle\\ a\\ un\\ saumon\\ grillé$$ = She has a whole grilled salmon (countable)\n- $$Elle\\ a\\ du\\ saumon\\ grillé$$ = She has some grilled salmon (a portion, uncountable)\n\nThis is the core distinction between indefinite (un/une/des) and partitive (du/de la/des) articles.", "source": "MiniMax ①", "_id": "minimax_1_47", "judge_pick": false}, {"question": "Translate to French: \"No, there is no problem.\" (1 step)", "answer": "- Step 1: $$Non,\\ il\\ n'y\\ a\\ pas\\ de\\ problème$$\n- From homework solution: \"Non, il n'y a pas de problème\"\n- Note: Uses \"il n'y a pas\" (there is not), NOT \"je n'ai pas\" (I don't have).", "source": "MiniMax ①", "_id": "minimax_1_48", "judge_pick": false}, {"question": "What does \"à ce soir!\" mean in the reservation context, and how do you respond? (1 step)", "answer": "- Step 1: $$À\\ ce\\ soir$$! = See you this evening!\n- Response: $$Merci\\ beaucoup,\\ au\\ revoir$$ = Thank you very much, goodbye\n\nThis completes the reservation conversation on a polite note.", "source": "MiniMax ①", "_id": "minimax_1_49", "judge_pick": false}, {"question": "Explain why \"c'est toujours masculin\" (c'est is always masculine) even when describing a feminine noun. Give an example. (2 steps)", "answer": "- Step 1: \"C'est\" doesn't agree with the noun's gender because \"ce\" (this/it) refers to the whole idea/situation, not a specific gendered noun.\n- Step 2: - $$La\\ réunion\\ est\\ urgente$$ (the meeting — feminine, adjective agrees)\n  - $$C'est\\ urgent$$ (it's urgent — masculine form, even though \"réunion\" is feminine)\n\nWhen using \"c'est\" + adjective, ALWAYS use the masculine singular form of the adjective.", "source": "MiniMax ①", "_id": "minimax_1_50", "judge_pick": false}, {"question": "What is the French for \"I don't have a reservation\" using proper negation with pas de? (1 step)", "answer": "- Step 1: $$Je\\ n'ai\\ pas\\ de\\ réservation$$\n- Key: After \"pas de,\" NO article is used — not \"pas de la réservation\" or \"pas une réservation.\"", "source": "MiniMax ①", "_id": "minimax_1_51", "judge_pick": false}, {"question": "In ordering, what is the difference between \"je pourrais avoir\" and \"est-ce que je peux avoir\"? Which is more polite? (2 steps)", "answer": "- Step 1: - $$Je\\ pourrais\\ avoir$$ = Could I have... (conditional, very polite)\n  - $$Est-ce\\ que\\ je\\ peux\\ avoir$$ = Can I have... (present tense, direct)\n- Step 2: The conditional \"pourrais\" is more polite/hypothetical; the present \"peux\" is more direct but still polite when framed with \"est-ce que.\"\n\nBoth are acceptable; \"pourrais\" is slightly more formal in restaurants.", "source": "MiniMax ①", "_id": "minimax_1_52", "judge_pick": true}, {"question": "What does \"quelques\" mean, and how does it differ from \"des\" when talking about quantity? (2 steps)", "answer": "- Step 1: - $$Des$$ = some (indefinite article, before countable nouns)\n  - $$Quelques$$ = a few / some (implies a small, specific number)\n- Step 2: - $$J'ai\\ des\\ chocolates$$ = I have (some) chocolates (unspecified amount)\n  - $$J'ai\\ quelques\\ chocolates$$ = I have a few chocolates (small number, more specific)\n\n\"Quelques\" is more precise than \"des\" — it suggests a small quantity.", "source": "MiniMax ①", "_id": "minimax_1_53", "judge_pick": false}, {"question": "The lesson mentions \"un plat du jour\" (dish of the day). What does \"du jour\" mean, and why is \"du\" used here? (2 steps)", "answer": "- Step 1: $$Du\\ jour$$ = of the day (literally \"of the day\")\n- Step 2: \"Du\" here is de + le (contraction), meaning \"of the\":\n  - $$Le\\ plat\\ du\\ jour$$ = the dish of the day\n  - Compare: $$Le\\ serveur\\ du\\ restaurant$$ = the server of the restaurant\n\nThis is different from the partitive \"du\" — it's a prepositional phrase (de + le).", "source": "MiniMax ①", "_id": "minimax_1_54", "judge_pick": false}, {"question": "What is the proper way to answer the phone at a French restaurant when taking a reservation? (1 step)", "answer": "- Step 1: $$Le\\ restaurant\\ la\\ Tour\\ Eiffel,\\ bonsoir$$ = The Tour Eiffel restaurant, good evening\n- This is the standard greeting: name of establishment + time of day (bonjour/bonsoir).", "source": "MiniMax ①", "_id": "minimax_1_55", "judge_pick": false}, {"question": "When the restaurant asks \"pour combien de personnes?\" (for how many people?), how do you respond for a table of two? (1 step)", "answer": "- Step 1: $$Pour\\ deux\\ personnes\\ s'il\\ vous\\ plaît$$ = For two people, please\n- Alternative: $$C'est\\ pour\\ deux$$ = It's for two", "source": "MiniMax ①", "_id": "minimax_1_56", "judge_pick": false}, {"question": "What is the French for \"the end\" or \"finished\" when using c'est + adjective? (1 step)", "answer": "- Step 1: $$C'est\\ fini$$ = It's finished / That's it\n- From homework: $$La\\ réunion\\ est\\ finie$$ (the meeting is finished — feminine agreement) but $$C'est\\ fini$$ (masculine form with c'est).", "source": "MiniMax ①", "_id": "minimax_1_57", "judge_pick": false}, {"question": "What is the difference between \"je suis\" (I am) and \"j'ai\" (I have) in terms of which verb is used for which type of description? (2 steps)", "answer": "- Step 1: - $$Je\\ suis$$ (ÊTRE) = describes state, identity, location, profession\n  - $$J'ai$$ (AVOIR) = describes possession, age, things you \"have\"\n- Step 2: - $$Je\\ suis\\ français$$ = I am French (identity)\n  - $$J'ai\\ vingt\\ ans$$ = I am 20 years old (age, uses AVOIR in French!)\n  - $$Je\\ suis\\ en\\ retard$$ = I am late (state)\n\nRemember: French uses AVOIR for age, not ÊTRE!", "source": "MiniMax ①", "_id": "minimax_1_58", "judge_pick": true}, {"question": "In the restaurant dialogue, the client says \"à 19h30 s'il vous plaît.\" What does \"19h30\" represent and how is this expressed in French time? (1 step)", "answer": "- Step 1: $$Dix-neuf\\ heures\\ trente$$ = 19:30 = 7:30 PM\n- In French formal/official time, use 24-hour format: 19h30 = 7:30 PM.\n- In casual speech, restaurants often just say \"à sept heures et demie du soir\" or simply \"à sept heures et demie.\"", "source": "MiniMax ①", "_id": "minimax_1_59", "judge_pick": false}, {"question": "Translate to French: \"What would you like to drink?\" — this is the first question a server asks after seating you. (1 step)", "answer": "- Step 1: $$Que\\ désirez-vous\\ boire$$?\n- Formal alternative: $$Que\\ souhaitez-vous\\ boire$$?\n- Common in restaurants immediately after \"Suivez-moi, installez-vous.\"", "source": "MiniMax ①", "_id": "minimax_1_60", "judge_pick": false}, {"question": "What is the meaning of \"vous les voulez en même temps?\" and how would you respond \"yes, together\"? (2 steps)", "answer": "- Step 1: $$Vous\\ les\\ voulez\\ en\\ même\\ temps$$? = Do you want them (the dishes) together?\n- Step 2: Response: $$Oui,\\ en\\ même\\ temps$$ (yes, together) or $$Oui,\\ ensemble$$\n- Alternative: $$Non,\\ séparément$$ (no, separately)", "source": "MiniMax ①", "_id": "minimax_1_61", "judge_pick": false}, {"question": "What is the contraction of \"de + le\" in French, and give an example from restaurant vocabulary. (1 step)", "answer": "- Step 1: $$De\\ +\\ le\\ =\\ du$$\n- Example: $$Le\\ plat\\ du\\ jour$$ = the dish of the day\n- Also: $$Le\\ serveur\\ du\\ restaurant$$ = the server of the restaurant\n\nNote: This is different from partitive \"du\" (some) — here it's a preposition meaning \"of.\"", "source": "MiniMax ①", "_id": "minimax_1_62", "judge_pick": false}, {"question": "When ordering a beverage, how do you ask \"Would you like a bottle of sparkling water or still water?\" in French? (1 step)", "answer": "- Step 1: $$Souhaiteriez\\ une\\ bouteille\\ d'eau\\ gazeuse\\ ou\\ d'eau\\ plate$$?\n- Key vocabulary:\n  - $$D'eau\\ gazeuse$$ = of sparkling water (gazeuse = with gas)\n  - $$D'eau\\ plate$$ = of still water (plate = flat/still)\n\nThis is a common question from French servers offering table water.", "source": "MiniMax ①", "_id": "minimax_1_63", "judge_pick": false}, {"question": "Explain why French says \"j'ai vingt ans\" (I have 20 years) instead of \"je suis vingt ans\" (I am 20 years). (1 step)", "answer": "- Step 1: In French, age is expressed using the verb AVOIR (to have), not ÊTRE (to be).\n- $$J'ai\\ vingt\\ ans$$ = I have 20 years (literally)\n- This is a common point of confusion — it's one of the key differences between French and English thinking.", "source": "MiniMax ①", "_id": "minimax_1_64", "judge_pick": true}, {"question": "What is the French for \"very rare\" (meat cooking), the rarest option? (1 step)", "answer": "- Step 1: $$Bleu$$ = very rare / blue-rare\n- The full scale: $$Bleu$$ (very rare) → $$Saignant$$ (rare) → $$À\\ point$$ (medium rare) → $$Bien\\ cuit$$ (well done)", "source": "MiniMax ①", "_id": "minimax_1_65", "judge_pick": false}, {"question": "In the phrase \"je n'ai pas de réservation,\" why is \"pas de\" used instead of \"pas une\"? (1 step)", "answer": "- Step 1: After negation with \"pas,\" when referring to a noun, you use **pas de** (no article) to express \"no\" or \"not any.\"\n- $$Je\\ n'ai\\ pas\\ de\\ réservation$$ = I don't have a reservation (any)\n- $$Je\\ n'ai\\ pas\\ une\\ réservation$$ = I don't have A reservation (incorrect in this context)\n\nThe \"de\" replaces the article entirely — this is a key rule of French negation.", "source": "MiniMax ①", "_id": "minimax_1_66", "judge_pick": false}, {"question": "How do you say \"it's beautiful\" in French using c'est + adjective? (1 step)", "answer": "- Step 1: $$C'est\\ beau$$\n- Remember: with c'est, the adjective is ALWAYS masculine singular, regardless of what is being described.\n- $$Beau$$ is the masculine form (feminine: $$belle$$).", "source": "MiniMax ①", "_id": "minimax_1_67", "judge_pick": false}, {"question": "What is the full conversation starter when a customer enters and the server greets them? Give the exchange. (1 step)", "answer": "- Step 1: Server: $$Bonsoir$$ / nThis ends the reservation on a polite note.", "source": "MiniMax ①", "_id": "minimax_1_72", "judge_pick": false}, {"question": "What is the difference between \"un café\" and \"du café\"? When would you use each? (2 steps)", "answer": "- Step 1: - $$Un\\ café$$ = a coffee (one cup of coffee — countable)\n  - $$Du\\ café$$ = (some) coffee (coffee as a substance/quantity)\n- Step 2: - \"Je voudrais un café\" = I would like a coffee (one cup)\n  - \"Je bois du café\" = I drink coffee (the beverage, uncountable)\n  - \"J'ai du café\" = I have some coffee (some quantity)\n\nThe same distinction as with chocolate: countable vs uncountable.", "source": "MiniMax ①", "_id": "minimax_1_73", "judge_pick": false}, {"question": "How do you form the negative \"I am not\" using the verb ÊTRE? (1 step)", "answer": "- Step 1: $$Je\\ ne\\ suis\\ pas$$\n- Full conjugation:\n  - $$Je\\ ne\\ suis\\ pas$$ = I am not\n  - $$Tu\\ n'es\\ pas$$ = you are not\n  - $$Il/Elle\\ n'est\\ pas$$ = he/she is not\n  - $$Nous\\ ne\\ sommes\\ pas$$ = we are not\n  - $$Vous\\ n'êtes\\ pas$$ = you are not\n  - $$Ils/Elles\\ ne\\ sont\\ pas$$ = they are not", "source": "MiniMax ①", "_id": "minimax_1_74", "judge_pick": false}, {"question": "What is the French for \"we have a reservation number\" in the homework solution? (1 step)", "answer": "- Step 1: $$Nous\\ avons\\ un\\ numéro\\ de\\ réservation$$\n- From homework: \"nous avons un numero de reservation\"\n- Note: \"Numéro\" is masculine, so \"un numéro.\"", "source": "MiniMax ①", "_id": "minimax_1_75", "judge_pick": false}, {"question": "The lesson shows \"ils ont un plat du jour\" (they have a dish of the day). Explain why \"un\" is used here. (1 step)", "answer": "- Step 1: Because \"un plat\" refers to **one dish** (a specific dish of the day as a countable item).\n- If you were referring to some dish (as a type/quantity), you could say \"ils ont du plat du jour,\" but \"un plat\" treats it as one countable item on the menu.", "source": "MiniMax ①", "_id": "minimax_1_76", "judge_pick": false}, {"question": "What is the polite way to say \"please\" in French when ordering? Where does it go in the sentence? (1 step)", "answer": "- Step 1: $$S'il\\ vous\\ plaît$$ = please (formal/polite)\n- Placement: at the END of the request:\n  - $$Je\\ voudrais\\ un\\ café\\ s'il\\ vous\\ plaît$$\n  - $$L'addition\\ s'il\\ vous\\ plaît$$\n\nThis is essential for polite restaurant interaction.", "source": "MiniMax ①", "_id": "minimax_1_77", "judge_pick": false}, {"question": "How do you say \"I would like the bill\" in two different polite ways? (1 step)", "answer": "- Step 1: - $$Je\\ pourrais\\ avoir\\ l'addition\\ s'il\\ vous\\ plaît$$\n  - $$Pourrais-je\\ avoir\\ l'addition\\ s'il\\ vous\\ plaît$$?\n\nBoth are polite; the second inverts the subject and verb for a more formal tone.", "source": "MiniMax ①", "_id": "minimax_1_78", "judge_pick": false}, {"question": "Explain why French uses \"il/elle/on a\" (he/she/we have) rather than \"il/elle/on a\" in the negative. (1 step)", "answer": "- Step 1: In negative, just add \"ne...pas\" around the verb:\n  - $$Il\\ a$$ → $$Il\\ n'a\\ pas$$\n  - $$Elle\\ a$$ → $$Elle\\ n'a\\ pas$$\n  - $$On\\ a$$ → $$On\\ n'a\\ pas$$\n\nThe pronoun doesn't change — only the verb gets the negation markers.", "source": "MiniMax ①", "_id": "minimax_1_79", "judge_pick": false}, {"question": "What is the meaning of \"faire une réservation\" and why is \"faire\" used instead of \"avoir\"? (2 steps)", "answer": "- Step 1: $$Faire\\ une\\ réservation$$ = to make a reservation\n- Step 2: In French, \"faire\" (to do/make) is used for many actions where English uses other verbs:\n  - $$Faire\\ une\\ réservation$$ = to make a booking\n  - $$Faire\\ un\\ voyage$$ = to take a trip\n  - $$Faire\\ ses\\ devoirs$$ = to do homework\n\nThis is a common verb that doesn't translate literally — it's part of French idiom.", "source": "MiniMax ①", "_id": "minimax_1_80", "judge_pick": true}, {"question": "What is the meaning of \"je reviens tout de suite\" in restaurant context, and when would the server say this? (1 step)", "answer": "- Step 1: $$Je\\ reviens\\ tout\\ de\\ suite$$ = I'm coming right back / I'll be right with you\n- The server says this after taking your order or bringing food — it's a promise to return shortly.", "source": "MiniMax ①", "_id": "minimax_1_81", "judge_pick": false}, {"question": "In the number system, why does French use \"quatre-vingts\" (four twenties) for 80? What's the historical reason? (1 step)", "answer": "- Step 1: French number system is partly based on **vigesimal** (base-20) counting, inherited from Old French/Celtic traditions:\n  - 80 = 4 × 20 = $$quatre-vingts$$\n  - This is different from the decimal (base-10) system used in English \"eighty\"\n\nThis is why 70-99 have unusual names in French — they're remnants of an older counting system.", "source": "MiniMax ①", "_id": "minimax_1_82", "judge_pick": false}, {"question": "How do you ask \"Is everything okay?\" in French during restaurant service? (1 step)", "answer": "- Step 1: $$Est-ce\\ que\\ tout\\ va\\ bien$$?\n- Response if good: $$Oui,\\ tout\\ va\\ bien$$ = Yes, everything is fine", "source": "MiniMax ①", "_id": "minimax_1_83", "judge_pick": false}, {"question": "What is the difference between \"et\" (and) and \"ou\" (or) in French? Give an example from restaurant ordering. (1 step)", "answer": "- Step 1: - $$Et$$ = and\n  - $$Ou$$ = or\n- Example: $$Eau\\ gazeuse\\ ou\\ eau\\ plate$$? = Sparkling water or still water?\n- $$Un\\ hamburger\\ et\\ des\\ frites$$ = A hamburger and fries", "source": "MiniMax ①", "_id": "minimax_1_84", "judge_pick": false}, {"question": "When you answer the phone at a French restaurant, you say \"Le restaurant [name], bonsoir.\" What does this format show about French telephone etiquette? (1 step)", "answer": "- Step 1: French phone etiquette requires stating:\n  - Who you are / which establishment\n  - The time of day (bonjour/bonsoir)\n- This is more formal than English \"Hello?\" and is expected in all business contexts.", "source": "MiniMax ①", "_id": "minimax_1_85", "judge_pick": true}, {"question": "What is the meaning of \"je prefers en terrasse\" and why is \"en\" used? (1 step)", "answer": "- Step 1: $$Je\\ préfère\\ en\\ terrasse$$ = I prefer outside/on the terrace\n- \"En\" here means \"on\" or \"outdoors\" — it's used with certain places:\n  - $$En\\ terrasse$$ = outside (on the terrace)\n  - $$En\\ ville$$ = downtown / in town\n  - $$En\\ France$$ = in France\n\nThis is a fixed preposition — you don't say \"sur la terrasse\" in this context.", "source": "MiniMax ①", "_id": "minimax_1_86", "judge_pick": false}, {"question": "What is the proper response to \"Votre numéro de téléphone pour confirmer la réservation\" when giving your phone number? (1 step)", "answer": "- Step 1: $$Oui,\\ c'est\\ le\\ [numéro]$$ = Yes, it's [the number]\n- Example: $$Oui,\\ c'est\\ le\\ zéro\\ six\\ soixante-dix-huit\\ soixante-cinq\\ soixante-sept\\ quatre-vingts-sept$$\n\nThe listener expects the number in pairs of digits.", "source": "MiniMax ①", "_id": "minimax_1_87", "judge_pick": false}, {"question": "Explain the difference between \"avoir\" (to have) used for possession vs. idiomatic expressions. Give one example from the lesson. (2 steps)", "answer": "- Step 1: AVOIR has two uses:\n  1. Literal possession: $$J'ai\\ un\\ livre$$ = I have a book\n  2. Idiomatic expressions: $$J'ai\\ vingt\\ ans$$ = I am 20 years old\n- Step 2: Other idioms with AVOIR:\n  - $$Avoir\\ faim$$ = to be hungry (literally \"to have hunger\")\n  - $$Avoir\\ soif$$ = to be thirsty\n  - $$Avoir\\ chaud/froid$$ = to be hot/cold\n  - $$Avoir\\ raison/tort$$ = to be right/wrong\n\nThese idioms use AVOIR where English uses \"to be.\"", "source": "MiniMax ①", "_id": "minimax_1_88", "judge_pick": true}, {"question": "In negative sentences, what happens to the article after \"pas de\"? Give an example. (1 step)", "answer": "- Step 1: After \"pas de,\" the article **disappears completely**:\n  - $$J'ai\\ un\\ chocolat$$ → $$Je\\ n'ai\\ pas\\ de\\ chocolat$$ (NOT \"pas de un chocolat\")\n  - $$J'ai\\ une\\ réservation$$ → $$Je\\ n'ai\\ pas\\ de\\ réservation$$ (NOT \"pas de une réservation\")\n  - $$J'ai\\ du\\ café$$ → $$Je\\ n'ai\\ pas\\ de\\ café$$ (NOT \"pas de du café\")\n\nThis is a core rule of French negation — \"pas de\" replaces ALL articles.", "source": "MiniMax ①", "_id": "minimax_1_89", "judge_pick": false}, {"question": "How do you form the present tense of AVOIR in the negative for all pronouns? Give the complete table. (1 step)", "answer": "- Step 1: $$Je\\ n'ai\\ pas$$\n$$Tu\\ n'as\\ pas$$\n$$Il/Elle/On\\ n'a\\ pas$$\n$$Nous\\ n'avons\\ pas$$\n$$Vous\\ n'avez\\ pas$$\n$$Ils/Elles\\ n'ont\\ pas$$\n\nRemember: \"ne\" goes before the verb, \"pas\" goes after — always together around the verb.", "source": "MiniMax ①", "_id": "minimax_1_90", "judge_pick": false}, {"question": "What is the French for \"I am French\" and why is the verb ÊTRE used here? (1 step)", "answer": "- Step 1: $$Je\\ suis\\ français$$ (masculine) / $$Je\\ suis\\ française$$ (feminine)\n- ÊTRE is used for:\n  - Identity/nationality: $$Je\\ suis\\ français$$\n  - Location: $$Je\\ suis\\ à\\ Paris$$\n  - Professions: $$Je\\ suis\\ étudiant$$\n  - Characteristics: $$Je\\ suis\\ grand$$", "source": "MiniMax ①", "_id": "minimax_1_91", "judge_pick": false}, {"question": "Explain why the adjective in \"c'est + adjective\" is ALWAYS masculine, using the example \"c'est urgent.\" (1 step)", "answer": "- Step 1: Because \"c'est\" (ce + est) refers to a **concept or general statement**, not a specific noun with gender:\n  - $$C'est\\ urgent$$ = It's urgent (the situation is urgent — no specific noun)\n  - $$La\\ réunion\\ est\\ urgente$$ = The meeting (feminine) is urgent (adjective agrees)\n\nWhen using c'est + adjective, always use the masculine singular form, regardless of what you're describing.", "source": "MiniMax ①", "_id": "minimax_1_92", "judge_pick": false}, {"question": "What does the phrase \"qu'est-ce qu'il y a dans...\" mean, and how does it differ from \"qu'est-ce que c'est\"? (2 steps)", "answer": "- Step 1: - $$Qu'est-ce\\ que\\ c'est$$? = What is this? (asking for definition/name)\n  - $$Qu'est-ce\\ qu'il\\ y\\ a\\ dans$$...? = What is there in...?(asking for ingredients)\n- Step 2: Example: - $$Qu'est-ce\\ que\\ c'est\\ la\\ salade\\ niçoise$$? = What is niçoise salad? (definition)\n  - $$Qu'est-ce\\ qu'il\\ y\\ a\\ dans\\ la\\ salade$$? = What's in the salad? (ingredients)\n\nUse the second for asking about dish contents.", "source": "MiniMax ①", "_id": "minimax_1_93", "judge_pick": true}, {"question": "In the reservation, what does \"c'est noté\" mean, and why is it important in French customer service? (1 step)", "answer": "- Step 1: $$C'est\\ noté$$ = It's noted / I've written it down\n- This phrase reassures the customer that the reservation is recorded. In French customer service, confirming (\"c'est noté,\" \"c'est noté Monsieur/Madame\") is standard politeness.", "source": "MiniMax ①", "_id": "minimax_1_94", "judge_pick": false}, {"question": "What is the full list of meat doneness levels from rarest to most cooked? (1 step)", "answer": "- Step 1: $$Bleu$$ (very rare) → $$Saignant$$ (rare) → $$À\\ point$$ (medium rare) → $$Bien\\ cuit$$ (well done)\n\nThese four terms are essential for ordering steak in any French restaurant.", "source": "MiniMax ①", "_id": "minimax_1_95", "judge_pick": false}, {"question": "How do you say \"we're going to take\" using \"on\" instead of \"nous\"? (1 step)", "answer": "- Step 1: $$On\\ va\\ prendre$$ = We're going to take/order\n- In informal French, \"on\" often replaces \"nous\" (we):\n  - $$On\\ va\\ prendre$$ = nous allons prendre\n  - $$On\\ aimerait$$ = nous aimerions\n\nThis is extremely common in restaurant conversations.", "source": "MiniMax ①", "_id": "minimax_1_96", "judge_pick": false}, {"question": "What is the French for \"the bill\" — give both words from the lesson. (1 step)", "answer": "- Step 1: - $$L'addition$$ (feminine)\n  - $$La\\ note$$ (feminine)\n\nBoth mean \"the bill/check\" and are used interchangeably.", "source": "MiniMax ①", "_id": "minimax_1_97", "judge_pick": false}, {"question": "Why is it important to use \"s'il vous plaît\" (please) when ordering in French? (1 step)", "answer": "- Step 1: In French culture, polite forms like \"s'il vous plaît\" are essential in service interactions. Without it, requests can sound rude.\n- $$Je\\ voudrais\\ un\\ café$$ = I would like a coffee (neutral)\n- $$Je\\ voudrais\\ un\\ café\\ s'il\\ vous\\ plaît$$ = I would like a coffee, please (polite)\n\nAlways add \"s'il vous plaît\" when making requests in restaurants.", "source": "MiniMax ①", "_id": "minimax_1_98", "judge_pick": false}, {"question": "Summarize when to use un/une/des vs. du/de la/des in French, giving one example of each type of noun. (2 steps)", "answer": "- Step 1: **Un/une/des** = countable nouns (things you can count):\n  - $$Un\\ chocolat$$ (one chocolate)\n  - $$Une\\ assiette$$ (one plate)\n  - $$Des\\ reservations$$ (some reservations)\n- Step 2: **Du/de la/des** = uncountable/mass nouns (quantities, substances):\n  - $$Du\\ café$$ (some coffee)\n  - $$De\\ la\\ crème$$ (some cream)\n  - $$De\\ l'eau$$ (some water — with vowel)\n\nThis distinction is fundamental to French article usage.", "source": "MiniMax ①", "_id": "minimax_1_99", "judge_pick": false}], "count": 100}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "What is the present tense conjugation of AVOIR (to have) for all subject pronouns? (6 forms)", "answer": "- **Je'ai** → I have\n- **Tu as** → you have (informal singular)\n- **Il/elle/on a** → he/she/we (on) has\n- **Nous avons** → we have\n- **Vous avez** → you have (formal or plural)\n- **Ils/elles ont** → they have (masculine/feminine)\n\nNote the irregular patterns: no \"-ons\" ending for nous, and the 3rd person singular ends in \"a\" (not \"e\").", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "How do you form the negative of AVOIR in French? Give an example with \"je\" and \"tu\".", "answer": "- Step 1: Place **ne** before the verb and **pas** after it.\n- Step 2: In speech, \"ne\" is often dropped, but in writing it must be included.\n\n+ **J'ai** → Je n'ai **pas** (I don't have)\n+ **Tu as** → Tu n'as **pas** (you don't have)\n+ **Il a** → Il n'a **pas** (he doesn't have)\n\nThe negative works the same for all pronouns: **ne + subject + verb + pas**.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "Translate to French using AVOIR: \"I have a chocolate\" / \"I have some chocolate\" / \"I have chocolates (plural)\"", "answer": "- Step 1: **Un/une/des** = a/an/some (countable items)\n- Step 2: **Du/de la/des** = some (uncountable/bulk items)\n\n+ **J'ai un chocolat** → I have (a) chocolate (countable, singular)\n+ **J'ai du chocolat** → I have some chocolate (uncountable, bulk)\n+ **J'ai des chocolats** → I have chocolates (countable, plural)\n\nThe choice depends on whether the noun is countable or uncountable in French, just like in English.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "What is the present tense conjugation of ÊTRE (to be) for all subject pronouns?", "answer": "- **Je suis** → I am\n- **Tu es** → you are (informal singular)\n- **Il/elle/on est** → he/she/it/we (on) is\n- **Nous sommes** → we are\n- **Vous êtes** → you are (formal or plural)\n- **Ils/elles sont** → they are\n\nKey observation: Both être and avoir are completely irregular — you must memorize them. They are the two most important verbs in French.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "How do you form the negative of ÊTRE? Give an example with \"je\" and \"elle\".", "answer": "- Step 1: Same pattern as AVOIR: **ne...pas** surrounds the verb.\n- Step 2: Contract \"ne\" before a vowel: **n'** + verb + **pas**.\n\n+ **Je suis** → Je **ne suis pas** (I am not)\n+ **Tu es** → Tu **n'es pas** (you are not)\n+ **Elle est** → Elle **n'est pas** (she is not)\n\nUnlike AVOIR, ÊTRE requires the \"n'\" contraction before vowel sounds.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "What are the French articles for \"some\" with uncountable nouns? Explain when to use each form.", "answer": "- **Du** → masculine singular (du pain = some bread)\n- **De la** → feminine singular (de l'eau = some water, note l' before vowel)\n- **Des** → plural (des fruits = some fruits)\n\n+ **J'ai du café** → I have some coffee\n+ **J'ai de la crème brûlée** → I have some crème brûlée\n+ **J'ai des salmon** → I have some salmon (plural)\n\nThese are **partitive articles** — they indicate \"some\" of an uncountable quantity. Compare with un/une/des for countable items.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "What is the rule for using c'est + adjective in French? Why is the adjective always masculine?", "answer": "- Step 1: **C'est** is grammatically **masculine singular** — it's like saying \"it is\" using the masculine form.\n- Step 2: Even when referring to a feminine noun, c'est + adjective stays masculine.\n\n+ **C'est beau** → It's beautiful (masculine)\n+ **C'est urgent** → It's urgent (masculine)\n+ **C'est fini** → It's finished (masculine)\n\nThis is a fixed pattern: c'est + adjective always uses the **masculine singular** form. To describe a feminine noun directly, you'd say \"Elle est + feminine adjective.\"", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "How do you say \"70\" in French? Explain the logic behind French numbers 70-99.", "answer": "- Step 1: French uses a base-20 system for numbers 70-99 (based on \"vingt\" = 20).\n- Step 2: **70 = soixante-dix** (60 + 10)\n- Step 3: **71 = soixante-et-onze** (60 + 11)\n- Step 4: **80 = quatre-vingts** (4 × 20)\n- Step 5: **90 = quatre-vingts-dix** (4 × 20 + 10)\n\n+ Examples:\n  + 72 = soixante-douze (60 + 12)\n  + 80 = quatre-vingts (note the \"s\" when standalone)\n  + 87 = quatre-vingts-sept (4 × 20 + 7)\n  + 91 = quatre-vingts-onze (4 × 20 + 11)\n\nThis system is unique to French (and a few other Romance languages). Swiss French uses \"septante\" and \"nonante\" instead.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "How do you say these numbers in French: 67, 78, 89, 95?", "answer": "- Step 1: Apply the base-20 logic for 70-99.\n\n+ **67** = soixante-sept (60 + 7)\n+ **78** = soixante-dix-huit (60 + 18)\n+ **89** = quatre-vingts-neuf (4 × 20 + 9)\n+ **95** = quatre-vingts-quinze (4 × 20 + 15)\n\nThe pattern: 70-79 = soixante-dix/et-onze, 80-99 = quatre-vingts + the units digit.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "What are three ways to say \"I would like to have...\" when ordering at a restaurant?", "answer": "- **Je voudrais** + noun → I would like (most polite)\n- **Je pourrais avoir** → Could I have...?\n- **J'aimerais avoir** → I would like to have...\n\n+ Example: \"Je voudrais un café\" / \"Je pourrais avoir l'addition?\" / \"J'aimerais avoir de l'eau\"\n\nAll three are polite, but **je voudrais** is the most common in restaurants. **Je pourrais** literally means \"I could\" — it's a polite request form.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "A customer wants to say: \"Yes, I'll take the entrecôte, rare, please.\" How do they say this in French?", "answer": "- Step 1: Use **je vais prendre** (I'm going to take) or **je voudrais**.\n- Step 2: Add the meat doneness: **saignant** = rare, **bleu** = very rare, **à point** = medium rare, **bien cuit** = well done.\n- Step 3: Add **s'il vous plaît** for politeness.\n\n+ **Oui, je vais prendre une entrecôte saignante, s'il vous plaît.**\n\nAlternatively: \"Oui, je voudrais une entrecôte saignante, s'il vous plaît.\"", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "A waiter asks: \"What would you like to drink?\" / \"Have you made your choice?\" — translate to French.", "answer": "- **Que désirez-vous boire?** → What would you like to drink? (formal)\n- **Avez-vous choisi?** → Have you chosen?\n- **Avez-vous fait votre choix?** → Have you made your choice?\n\nThese are polite formal \"vous\" forms — standard in French restaurants.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "How do you ask for the bill at a restaurant in French? Give two polite versions.", "answer": "- **Je pourrais avoir l'addition, s'il vous plaît?** → Could I have the bill, please?\n- **L'addition (ou la note), s'il vous plaît.** → The bill, please.\n- **Pourrais-je avoir l'addition?** → May I have the bill?\n\n+ Note: **L'addition** and **la note** both mean \"the bill\" — they're interchangeable.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "A customer calls to make a reservation. They want: \"Yes, for tonight, at 7:30pm, for 2 people.\" Translate to French.", "answer": "- Step 1: \"Yes\" = **Oui** (or \"Oui, c'est pour...\")\n- Step 2: \"For tonight\" = **pour ce soir**\n- Step 3: Time uses 24-hour format: **19h30** (or \"sept heures trente\")\n- Step 4: \"For 2 people\" = **pour 2 personnes**\n\n+ **Oui, pour ce soir, à 19h30, pour 2 personnes, s'il vous plaît.**\n\nIn the dialogue, they also ask for a phone number to confirm: \"Votre numéro de téléphone pour confirmer la réservation?\"", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "The restaurant asks: \"Indoors or on the terrace?\" and the customer replies: \"I prefer on the terrace.\" Translate both.", "answer": "- **À l'intérieur ou en terrasse?** → Indoors or on the terrace?\n- **Je préfère en terrasse.** → I prefer on the terrace.\n\nNote: **En terrasse** uses \"en\" (on/at), not \"à la terrasse.\" This is a fixed preposition.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "What is the negative form \"pas de\" used for? Give an example with \"I don't have a reservation.\"", "answer": "- Step 1: **Pas de** replaces **du/des/un/une** in negative sentences when referring to the absence of something.\n- Step 2: Compare:\n\n+ **J'ai une réservation** → I have a reservation (affirmative)\n+ **Je n'ai pas de réservation** → I don't have a reservation (negative with \"de\")\n\nThe \"de\" replaces the article. This is different from ne...pas which negates the verb itself.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "Explain the difference between \"Je n'ai pas\" and \"Je n'ai pas de\" in French.", "answer": "- **Je n'ai pas** → I don't have (general negation of the verb)\n- **Je n'ai pas de** → I don't have (no quantity of something specific)\n\n+ Examples:\n  + \"Je n'ai pas mangé\" = I didn't eat (negating the action)\n  + \"Je n'ai pas de faim\" = I don't have hunger / I'm not hungry (no hunger = \"de\")\n\nWhen negating a noun that would normally have an article (un/une/des, du/de la/des), use **pas de** to replace the article.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "The waiter says: \"Est-ce que tout va bien?\" / \"Je reviens tout de suite.\" What do they mean?", "answer": "- **Est-ce que tout va bien?** → Is everything okay? / Is everything going well?\n- **Je reviens tout de suite.** → I'll be right back. / I'm coming back right away.\n\nThese are common service phrases. **Tout va bien** = \"all goes well,\" **tout de suite** = \"right away/immediately.\"", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "What do these restaurant vocabulary words mean in English: serveur/serveuse, plats du jour, carte, menu?", "answer": "- **Le serveur / la serveuse** → the waiter / the waitress\n- **Les plats du jour** → the dishes of the day / today's specials\n- **La carte** → the menu (usually the food/beverage list)\n- **Le menu** → the set menu / fixed price menu (may also mean \"menu\" generally)\n\nIn French restaurants, **la carte** typically refers to the full à la carte menu, while **le menu** often means a fixed-price option.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "What is the difference between \"un,\" \"une,\" and \"des\"? When is each used?", "answer": "- **Un** → masculine singular indefinite article (un café, un burger)\n- **Une** → feminine singular indefinite article (une eau, une salade)\n- **Des** → plural indefinite article (des cafés, des salades)\n\n+ Examples:\n  + \"J'ai **un** chocolat\" → I have a chocolate (masculine singular)\n  + \"J'ai **une** carafe d'eau\" → I have a carafe of water (feminine singular)\n  + \"J'ai **des** plats du jour\" → I have some dishes of the day (plural)\n\nThis corresponds to English \"a/an\" (un/une) and \"some\" (des) for countable nouns.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "Translate to French: \"What is this?\" and \"What is there in...?\"", "answer": "- **Qu'est-ce que c'est?** → What is this? / What is it?\n- **Qu'est-ce qu'il y a dans...?** → What is there in...?\n\n+ Examples:\n  + \"Qu'est-ce que c'est la salade niçoise?\" = What is the niçoise salad?\n  + \"Qu'est-ce qu'il y a dans le burger?\" = What's in the burger?\n\n**Qu'est-ce que** (keske) is a common contracted pronunciation in spoken French.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "The waiter asks: \"Est-ce que vous les voulez en même temps?\" What does this mean?", "answer": "- **Est-ce que vous les voulez en même temps?** → Would you like them at the same time? / together?\n\n**Les** refers to multiple items (courses, drinks). This question asks if the customer wants everything served together or separately. Common in French dining where courses often come separately.", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "How do you say \"following\" in French: \"Suivez-moi, s'il vous plaît\"?", "answer": "- **Suivez-moi** → Follow me (formal \"vous\" form)\n- **Installez-vous** → Get settled / Take a seat\n\n+ These are commands (imperative). The waiter guides you to your table.\n- **Suivez-moi, s'il vous plaît** = Follow me, please\n- **Installez-vous** = Make yourself comfortable / Sit down", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "What do these food items mean in English: saumon grillé, entrecôte, crème brûlée, carafe d'eau, croque-monsieur?", "answer": "- **Le saumon grillé** → grilled salmon\n- **L'entrecôte** → rib steak / entrecote (beef cut)\n- **La crème brûlée** → burnt cream / crème brûlée (dessert)\n- **La carafe d'eau** → carafe of water / water jug\n- **Le croque-monsieur** → grilled ham and cheese sandwich (literally \"mister crunch\")\n\nNote: **Grillé** = grilled, **grillée** (feminine) for feminine nouns.", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "The waiter asks: \"Quelle cuisson pour la viande?\" What are the four possible answers for meat doneness?", "answer": "- **Bleu** → very rare (blue)\n- **Saignant** → rare (bleeding)\n- **À point** → medium rare\n- **Bien cuit** → well done\n\nThese apply to steak and other meats. French people often order meat less cooked than in English-speaking countries.", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "In the homework, Phuc wrote: \"Oui je suis en retard.\" Why is this correct? What does it mean?", "answer": "- **Oui, je suis en retard.** → Yes, I'm late.\n- **En retard** = late (literally \"in late/retardation\")\n\nThis uses **être** (to be), not avoir. \"Être en retard\" is a fixed expression meaning \"to be late.\" Compare: \"Je suis en retard\" (I am late) vs \"Je n'ai pas de temps\" (I don't have time).", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "The homework shows \"nous avons un numero de reservation\" — why is this correct and not \"avez\"?", "answer": "- **Nous avons** → we have (1st person plural)\n- **Vous avez** → you have (2nd person plural/formal)\n\nThe conjugation must match the subject pronoun. **Nous** (we) always takes **avons**, never **avez**. This is a common error to avoid.\n\n+ Correct: \"Nous avons un numéro de réservation\"\n+ Wrong: \"Nous avez un numéro\" ✗", "source": "MiniMax ②", "_id": "minimax_2_26", "judge_pick": false}, {"question": "How do you say numbers 21, 31, 41, 51, 61 in French? What is the pattern?", "answer": "- Step 1: These are **vingt-et-un, trente-et-un, quarante-et-un, cinquante-et-un, soixante-et-un**.\n- Step 2: The pattern: **number + et + un** for these specific numbers.\n- Step 3: From 22 onwards (22, 23, 32, etc.), no \"et\": vingt-deux, trente-deux, etc.\n\n+ **21** = vingt-**et-**un\n+ **31** = trente-**et-**un\n+ **41** = quarante-**et-**un\n+ **51** = cinquante-**et-**un\n+ **61** = soixante-**et-**un\n\nOnly 21, 31, 41, 51, 61 use \"et\" — all other compound numbers use hyphens.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "What does \"c'est noté Monsieur\" mean in the reservation dialogue?", "answer": "- **C'est noté, Monsieur.** → It's noted, Sir. / I'll make a note of it, Sir.\n\nThis is what the restaurant says after taking the reservation details. It's a polite acknowledgment. **Madame/Mademoiselle/Monsieur** are used when addressing customers formally.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "You hear a French speaker say \"J'ai une problème\" — is this correct? If not, what should they say?", "answer": "- Step 1: **Problème** is masculine in French → **un problème** (not \"une\").\n- Step 2: The correct phrase is **J'ai un problème** or **Je n'ai pas de problème**.\n- Step 3: Watch out: most French nouns ending in \"-ème\" are masculine: le problème, le thème, le système.\n\n+ Correct: \"J'ai un problème\" / \"Je n'ai pas de problème\"\n+ Wrong: \"J'ai une problème\" ✗\n\nThis is a common A0/A1 error — memorizing noun gender is essential.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": true}, {"question": "How do you order water: \"A bottle of sparkling water or still water?\"", "answer": "- **Souhaiteriez une bouteille d'eau gazeuse ou d'eau plate?** → Would you like a bottle of sparkling water or still water?\n- **L'eau gazeuse** → sparkling water (literally \"gaseous water\")\n- **L'eau plate** → still/flat water (non-carbonated)\n\n+ Common response: \"Une bouteille d'eau gazeuse, s'il vous plaît\" or \"De l'eau plate, s'il vous plaît.\"\n\nIn France, restaurants often ask this — tap water is rarely served automatically.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "What is the difference between \"je vais prendre\" and \"je voudrais\" when ordering?", "answer": "- **Je vais prendre** → I'm going to take (present/future intention — slightly more casual)\n- **Je voudrais** → I would like (polite, conditional form)\n\nBoth are correct for ordering. **Je voudrais** is slightly more polite/formal. In everyday French, **je vais prendre** is very common and perfectly acceptable.\n\n+ \"Oui, je vais prendre le hamburger\" = Yes, I'll have the hamburger\n+ \"Je voudrais le steak, s'il vous plaît\" = I would like the steak, please", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "The reservation dialogue includes the phone number \"0678 65 67 87\" — how would you read this in French?", "answer": "- Step 1: Read digit by digit or in pairs.\n- Step 2: Using the French number system:\n  + 06 78 65 67 87\n  + Zéro-six, soixante-dix-huit, soixante-cinq, soixante-sept, quatre-vingts-sept\n\n+ More natural reading: \"le零 six, soixante-dix-huit, soixante-cinq, soixante-sept, quatre-vingts-sept\"\n\nIn French phone numbers, groups of two digits are typically read together. Note: 78 = soixante-dix-huit, 87 = quatre-vingts-sept.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "In negative sentences, when do you use \"ne...pas\" vs \"pas de\"?", "answer": "- **Ne...pas** → negates the verb directly (general negation)\n- **Pas de** → replaces the article before a noun (no quantity of something)\n\n+ **Je ne mange pas** → I don't eat (negating the action)\n+ **Je ne mange pas de viande** → I don't eat meat (no meat = \"de\")\n+ **Je n'ai pas de réservation** → I don't have a reservation\n\nRule: If a noun follows, use **pas de** to replace du/des/un/une. If just the verb is negated, use **ne...pas** alone.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A customer says: \"Non, je n'ai pas de réservation.\" What does this mean and why is it constructed this way?", "answer": "- **Non, je n'ai pas de réservation.** → No, I don't have a reservation.\n- **N'ai pas de** = don't have (no reservation)\n\nThis combines two negation rules:\n1. **Ne...pas** negates the verb **avoir**\n2. **De** replaces the article **une** because we're saying \"no reservation\" (zero quantity)\n\nFull breakdown: je + ne + ai + pas + de + réservation", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "How do you say \"the meeting is urgent\" and \"the meeting is finished\" in French using c'est or est?", "answer": "- **La réunion est urgente.** → The meeting is urgent. (elle est + feminine adjective)\n- **La réunion est finie.** → The meeting is finished.\n\nNote: These use **être** (est) with the feminine adjective ending (-e) because **la réunion** is feminine. Compare with c'est + masculine:\n- **C'est urgent.** (c'est = masculine)\n- **C'est fini.** (c'est = masculine)", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "What do these common restaurant phrases mean: \"Que désirez-vous?\" / \"Bon appétit!\" / \"C'est compris?\"", "answer": "- **Que désirez-vous?** → What would you like? (formal)\n- **Bon appétit!** → Enjoy your meal! (said before eating)\n- **C'est compris?** → Is it understood? / Is that clear? (did you understand)\n\n+ Other useful phrases:\n  + **Je voudrais commander** → I would like to order\n  + **L'addition, s'il vous plaît** → The bill, please", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "What is the gender and meaning of these nouns: le café, l'eau, la salade, le burger, la crème?", "answer": "- **Le café** → masculine (coffee)\n- **L'eau** → feminine (water — note l' before vowel)\n- **La salade** → feminine (salad)\n- **Le burger** → masculine (burger)\n- **La crème** → feminine (cream)\n\nRemember: In French, every noun has a gender. There's no foolproof rule — you must learn **le/la** with each noun. Common patterns: nouns ending in -tion, -ité, -ence are usually feminine; many nouns ending in -age, -ment are masculine.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": true}, {"question": "Translate to French: \"Can I have...?\" / \"Is it possible to have...?\" (polite requests)", "answer": "- **Est-ce que je peux avoir...?** → Can I have...?\n- **Est-ce qu'on pourrait avoir...?** → Could we have...? (very polite)\n- **Je pourrais avoir...?** → Could I have...?\n\nThese are polite ways to make requests. **On pourrait** (one could/we could) is softer than **je peux** (I can).\n\n+ \"Est-ce que je peux avoir un verre d'eau?\" = Can I have a glass of water?", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "The dialogue shows \"Au revoir!\" and \"Merci beaucoup!\" — what do they mean and when are they used?", "answer": "- **Au revoir!** → Goodbye! (literally \"until seeing again\")\n- **Merci beaucoup!** → Thank you very much!\n- **Merci, Madame** → Thank you, ma'am\n\nThese are closing/phrasing phrases. In French service, it's polite to say **merci** when finishing an interaction and **au revoir** when leaving.", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "Numbers 0-10 in French: zéro, un, deux, trois, quatre, cinq, six, sept, huit, neuf, dix — what are the next numbers 11-16?", "answer": "- **Onze** → 11\n- **Douze** → 12\n- **Treize** → 13\n- **Quatorze** → 14 (pronounced \"katorz\")\n- **Quinze** → 15\n- **Seize** → 16\n\nThese form the basis for 17-19 (dix-sept, dix-huit, dix-neuf). Notice: French doesn't have unique words for 11-16 like English does — they follow a pattern.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "How do you form the question \"Do you have...\" in French using AVOIR?", "answer": "- Step 1: **Est-ce que vous avez...?** → Do you have...?\n- Step 2: **Avez-vous...?** → Have you...? (inverted form, more formal)\n- Step 3: **Tu as...?** → Do you have...? (informal)\n\n+ Examples:\n  + \"Est-ce que vous avez une réservation?\" = Do you have a reservation?\n  + \"Avez-vous choisi?\" = Have you chosen?\n\nThe **est-ce que** construction is the easiest for beginners to form questions.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "In French, how do you say \"we are going to take\" when ordering as a group?", "answer": "- **On va prendre** → We're going to take/have (literally \"one is going to take\")\n- **On aimerait** → We would like (literally \"one would like\")\n\n+ \"Oui, on va prendre le steak\" = Yes, we'll have the steak\n+ \"Oui, on aimerait commander\" = Yes, we'd like to order\n\n**On** is very commonly used in spoken French to mean \"we\" — it's more casual than \"nous.\"", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "What is the French word for \"choice\" and how do you say \"I made my choice\"?", "answer": "- **Le choix** → the choice\n- **J'ai fait mon choix** → I made my choice\n- **Avez-vous fait votre choix?** → Have you made your choice?\n\nFrom the verb **choisir** (to choose) → **le choix** (the choice). Related phrase: **choisir** = to choose.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "What does \"une assiette\" mean and how do you say \"she has a plate\" in French?", "answer": "- **L'assiette** → feminine noun = the plate\n- **Elle a une assiette.** → She has a plate.\n\nFrom the study material: \"Elle a une assiette\" (She has a plate). Note the adjective matches the noun: **une assiette** (feminine because assiette is feminine).", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "What's the difference between \"je n'ai pas\" (without noun) and \"je n'ai pas de\" (with noun)? Explain with examples.", "answer": "- **Je n'ai pas** → I don't have (negating the action itself)\n- **Je n'ai pas de** → I don't have [something] (negating the quantity)\n\n+ **Je n'ai pas mangé** → I didn't eat (action negated)\n+ **Je n'ai pas de temps** → I don't have time (no time = de)\n+ **Je n'ai pas de réservation** → I don't have a reservation (no reservation = de)\n\nThe key: if you can replace \"a/an/some\" with \"any\" in English, use **pas de** in French.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "In the restaurant reservation dialogue, what information does the customer need to provide?", "answer": "- Step 1: **Date** → \"pour ce soir\" (for tonight)\n- Step 2: **Time** → \"à 19h30\" (at 7:30pm)\n- Step 3: **Number of people** → \"pour 2 personnes\" (for 2 people)\n- Step 4: **Phone number** → \"pour confirmer la réservation\" (to confirm)\n\nEssential reservation details in French: **pour quand? / à quelle heure? / pour combien de personnes? / votre numéro?**", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "What do these food-related verbs mean: commander, souhaiter, désirer, choisir?", "answer": "- **Commander** → to order (in a restaurant)\n- **Souhaiter** → to wish / would like\n- **Désirer** → to want / wish (formal)\n- **Choisir** → to choose\n\n+ Phrases:\n  + \"Je voudrais commander\" = I would like to order\n  + \"Que souhaitez-vous?\" = What would you wish?\n  + \"Avez-vous choisi?\" = Have you chosen?", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "How do you politely accept or decline at a restaurant: \"Yes, I would like...\" and \"No, thank you\"?", "answer": "- **Oui, je voudrais...** → Yes, I would like...\n- **Non, merci.** → No, thank you.\n- **Je prendrai...** → I'll take...\n- **Je n'ai pas envie de...** → I don't want...\n\n+ Examples:\n  + \"Oui, je voudrais le burger, s'il vous plaît\"\n  + \"Non, merci, je n'ai pas de faim\"\n\n**Merci** alone means \"thank you\"; **non, merci** means \"no, thank you\" (declining).", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "What does the phrase \"Le restaurant la Tour Eiffel, bonsoir\" mean in the reservation context?", "answer": "- **Le restaurant la Tour Eiffel, bonsoir.** → The Tour Eiffel restaurant, good evening.\n\nThis is how French restaurants answer the phone: **Name, bonjour/bonsoir**. It's the standard greeting when answering a business call in French.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}], "count": 50}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "What does the French verb *avoir* mean, and why is it one of the two \"backbone\" verbs you must master first as a beginner?", "answer": "*Avoir* means **\"to have\"**. It is foundational because it expresses possession (*j'ai un livre* — I have a book), is used in countless idiomatic expressions where English uses \"to be\" (e.g. *j'ai faim* — literally \"I have hunger\"), and serves as an auxiliary verb to form past tenses later on. Mastering it early unlocks huge swaths of everyday French.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "Give the full present-tense conjugation of *avoir* for all six subject pronouns. (6 steps)", "answer": "- Step 1: **je** → *j'ai* (note the elision: *je* + *ai* contracts to *j'ai* because *ai* starts with a vowel)\n- Step 2: **tu** → *tu as*\n- Step 3: **il / elle / on** → *il a / elle a / on a*\n- Step 4: **nous** → *nous avons*\n- Step 5: **vous** → *vous avez*\n- Step 6: **ils / elles** → *ils ont / elles ont* (careful: pronounced \"ils zon\" with liaison; do not confuse with *ils sont* = \"they are\")\n\nThe big trap: *ils ont* (have) vs *ils sont* (are) — same vowel sound, different meaning.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "How do you make *avoir* negative in the present tense, and what is the general pattern? (3 steps)", "answer": "- Step 1: French negation wraps the verb in two pieces: **ne ... pas**. The *ne* goes before the verb, *pas* after.\n- Step 2: When the verb starts with a vowel (which *avoir* mostly does: *ai, as, a, avons, avez, ont*), *ne* elides to **n'**.\n- Step 3: Full negative conjugation:\n+ *je n'ai pas*\n+ *tu n'as pas*\n+ *il/elle/on n'a pas*\n+ *nous n'avons pas*\n+ *vous n'avez pas*\n+ *ils/elles n'ont pas*\n\nThe conceptual point: *ne* and *pas* are a sandwich around the verb — every conjugated verb in negation follows this pattern.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "What does *être* mean, and how does it conjugate in the present tense for all six pronouns? (6 steps)", "answer": "*Être* means **\"to be\"**. It is highly irregular — you cannot derive it from a pattern; you must memorise it.\n- Step 1: **je** → *je suis*\n- Step 2: **tu** → *tu es*\n- Step 3: **il / elle / on** → *il est / elle est / on est*\n- Step 4: **nous** → *nous sommes*\n- Step 5: **vous** → *vous êtes* (note the circumflex on *ê*, and the liaison \"vous-zêtes\")\n- Step 6: **ils / elles** → *ils sont / elles sont*\n\nWhy irregular? *Être* is one of the most-used verbs in any language, and high-frequency verbs resist regularisation across centuries of speech.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "How do you negate *être*, and why does *ne* sometimes stay as *ne* and sometimes become *n'*? (2 steps)", "answer": "- Step 1: Same sandwich rule: **ne [verb] pas**. *Ne* elides to *n'* only before a vowel sound.\n- Step 2: Forms:\n+ *je ne suis pas* (suis starts with consonant → *ne* stays)\n+ *tu n'es pas* (es starts with vowel → elision)\n+ *il/elle/on n'est pas*\n+ *nous ne sommes pas*\n+ *vous n'êtes pas*\n+ *ils/elles ne sont pas*\n\nThe pattern is purely phonetic — French avoids two vowel sounds clashing.", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "What is the key difference between *avoir* and *être* in meaning, and why do beginners confuse *ils ont* with *ils sont*? (3 steps)", "answer": "- Step 1: *Avoir* = **to have** (possession), *être* = **to be** (identity, state, location).\n- Step 2: *Ils ont* = \"they have\"; *ils sont* = \"they are\". The vowel sounds are very close in French: \"il-zon\" vs \"il-son\".\n- Step 3: The disambiguating trick: *avoir* forms tend to start with a vowel after the pronoun (*ai, as, a, ont*) → liaison gives a \"z\" sound (*ils-zont*). *Être* forms start with *s-* (*suis, sont, sommes*). When you hear an *s* sound at the start of the verb, it's *être*.", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "In French, every noun has a gender — masculine or feminine. Why does this matter, and what does it affect downstream?", "answer": "Gender is grammatical, not natural — *un livre* (book) is masculine, *une table* (table) is feminine, with no logical reason. It matters because it determines: (1) which article you use (*un/le* vs *une/la*), (2) the form of adjectives that modify the noun (they must agree in gender and number), and (3) the pronoun that replaces the noun later (*il* vs *elle*). Getting gender wrong propagates errors through the whole sentence, so beginners should learn each noun *with* its article (not \"chocolat\" but \"**le** chocolat\").", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "What are the three indefinite articles in French, and when do you use each? (3 steps)", "answer": "- Step 1: **un** = \"a/an\" for a singular masculine noun. Example: *un café* (a coffee).\n- Step 2: **une** = \"a/an\" for a singular feminine noun. Example: *une carafe* (a carafe).\n- Step 3: **des** = \"some\" / plural indefinite, used for both genders. Example: *des chocolats* (some chocolates).\n\nConceptually: indefinite articles refer to **countable, whole units** — one coffee, one carafe, several chocolates.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "What are the partitive articles in French, and what concept do they express that English usually leaves implicit? (3 steps)", "answer": "- Step 1: The partitive articles are **du** (masculine), **de la** (feminine), and **des** (plural). They translate as \"some\" in English, but English often drops the word entirely.\n- Step 2: They express an **unspecified quantity of an uncountable / mass noun** — a portion taken from a larger whole. *Je voudrais du café* = \"I'd like (some) coffee\" — not one cup as a unit, but coffee-as-substance.\n- Step 3: Examples:\n+ *du chocolat* — some chocolate (the substance)\n+ *de la crème brûlée* — some crème brûlée\n+ *des épinards* — some spinach\n\nThe mental picture: partitives slice off a portion from a mass; indefinites count whole units.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "Compare *J'ai un chocolat* vs *J'ai du chocolat* vs *J'ai des chocolats*. What does each one actually mean? (3 steps)", "answer": "- Step 1: *J'ai **un** chocolat* — \"I have **a** chocolate\" (one whole piece, countable).\n- Step 2: *J'ai **du** chocolat* — \"I have **some** chocolate\" (a quantity of chocolate-as-substance; could be a bar, a smear, an amount).\n- Step 3: *J'ai **des** chocolats* — \"I have **(some) chocolates**\" (multiple individual pieces, countable plural).\n\nThe takeaway: the article tells the listener whether you're counting whole items or referring to a portion of a substance — a distinction English speakers must consciously make.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": true}, {"question": "Why do we say *une carafe d'eau* and not *une carafe de l'eau* or *une carafe d'une eau*? (2 steps)", "answer": "- Step 1: After expressions of quantity (*une carafe de*, *un verre de*, *beaucoup de*, *un peu de*), French drops the article entirely and uses just **de**.\n- Step 2: So you say *une carafe **d'**eau* (a carafe of water) — the *de* contracts to *d'* before the vowel. The logic: the quantity word (*carafe*) already specifies the portion, so a partitive article would be redundant.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": false}, {"question": "What happens to *un*, *une*, *du*, *de la*, *des* when the sentence becomes negative? Give the rule and an example. (3 steps)", "answer": "- Step 1: In negation, **all indefinite and partitive articles collapse to a single form: *de*** (or *d'* before a vowel).\n- Step 2: Examples:\n+ *J'ai **un** chocolat* → *Je n'ai **pas de** chocolat* (not *pas un*)\n+ *J'ai **du** café* → *Je n'ai **pas de** café*\n+ *J'ai **des** amis* → *Je n'ai **pas d'**amis*\n- Step 3: The intuition: in negation, you're denying any amount at all — there's nothing to \"partition\" or \"count,\" so French uses the neutral *de*. Exception: this does **not** apply with *être* (*Ce n'est pas **un** problème* — article stays because *être* is identification, not possession/quantity).", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "Translate \"I don't have a reservation\" into French, and explain each grammatical choice. (3 steps)", "answer": "- Step 1: Verb: \"have\" → *avoir*, conjugated for *je* → *j'ai*; in negation → *je n'ai pas*.\n- Step 2: \"A reservation\" would normally be *une réservation*, but in negation the *une* must become *de*.\n- Step 3: Result: ***Je n'ai pas de réservation.*** Common beginner error: writing *je n'ai pas une réservation* — this is wrong because the negation rule overrides the indefinite article.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "After *c'est*, what gender must the following adjective take, and why is this a special rule? (2 steps)", "answer": "- Step 1: After ***c'est***, the adjective is **always masculine** (and singular), regardless of what you're describing. Example: *C'est beau* (It's beautiful) — even if you're pointing at a feminine noun like *la maison*.\n- Step 2: The reason: *ce* is a neutral demonstrative pronoun — it doesn't refer to a specific gendered noun, but to a general \"it/this.\" French has no neuter gender for adjectives, so it defaults to masculine. Contrast: *La maison est belle* (feminine agreement, because *maison* is the explicit subject) vs *C'est beau* (no gendered subject → masculine default).", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": true}, {"question": "Translate \"The meeting is urgent\" and \"The meeting is finished\" into French. What changes and what doesn't? (3 steps)", "answer": "- Step 1: *La réunion* = \"the meeting,\" and it is **feminine** (*la*, not *le*).\n- Step 2: Adjectives must agree with the feminine noun:\n+ *urgent* → *urgente* (add silent *-e* for feminine)\n+ *fini* → *finie* (add *-e*)\n- Step 3: Results: ***La réunion est urgente*** and ***La réunion est finie***. Contrast with *c'est urgent* — here we'd use the masculine default because there's no explicit gendered subject.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": false}, {"question": "How do you say \"I would like...\" in three different polite ways in French, and what's the nuance between them? (3 steps)", "answer": "- Step 1: ***Je voudrais...*** — most common, neutral polite request. From *vouloir* (to want) in conditional. Literally \"I would want.\"\n- Step 2: ***J'aimerais...*** — slightly softer/warmer, from *aimer* (to like/love). Literally \"I would like.\"\n- Step 3: ***Je pourrais avoir...*** — even more deferential, from *pouvoir* (to be able). Literally \"Could I have...?\" — asks permission rather than stating desire.\n\nAll three are conditional forms (the *-rais* ending) — French uses the conditional for politeness, just as English uses \"would.\"", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "What does *Je vais prendre...* mean, and what tense/structure is it grammatically? (2 steps)", "answer": "- Step 1: It means **\"I'm going to take / have...\"** — used very commonly when ordering. *Je vais prendre le hamburger* = \"I'll have the hamburger.\"\n- Step 2: Structurally, this is the **near future** (*futur proche*): conjugated *aller* (to go) + infinitive. The mental model is identical to English \"I'm going to [verb].\" It feels less formal than *je prendrai* (simple future) and is the natural choice in spoken French.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": true}, {"question": "A waiter asks *Quelle cuisson pour la viande?* What are they asking, and what are the four standard answers from rarest to most cooked? (4 steps)", "answer": "- Step 1: They are asking **\"How would you like your meat cooked?\"** (literally \"Which cooking for the meat?\").\n- Step 2: ***Bleu*** — very rare (barely seared, cold-red inside).\n- Step 3: ***Saignant*** — rare (literally \"bleeding\").\n- Step 4: ***À point*** — medium-rare to medium (literally \"to the point\" — perfectly done by French standards). Beyond that: ***bien cuit*** — well done.\n\nCultural note: Fr
