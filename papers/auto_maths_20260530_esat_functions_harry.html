<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:#f5f5f7;color:#1d1d1f;line-height:1.6;-webkit-font-smoothing:antialiased}
.ctr{max-width:920px;margin:0 auto;padding:24px 20px 80px}
.hdr{text-align:center;padding:40px 0 28px}
.hdr h1{font-size:34px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,#1d1d1f,#424245);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr .sub{font-size:15px;color:#86868b;margin-top:6px}
.bdg-row{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.bdg{display:inline-flex;align-items:center;gap:5px;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;background:#e8e8ed;color:#424245}
.bdg.pp{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.bdg.gr{background:#34c759;color:#fff}
.ctrl{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:12px 16px;background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:14px;position:sticky;top:8px;z-index:20}

.ctrl button:hover{background:#f5f5f7}
.ctrl .bl{background:#0071e3;color:#fff;border-color:#0071e3}

.sc{font-size:13px;font-weight:700;color:#34c759}
.cc{font-size:13px;color:#86868b;font-weight:600}
.cl{display:flex;flex-direction:column;gap:10px}
.cd{background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:all .2s}
.cd:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.cd.ds{opacity:0.5}
.ct{display:flex;align-items:flex-start;gap:10px}
.cb{flex-shrink:0;width:18px;height:18px;accent-color:#0071e3;cursor:pointer;margin-top:3px}
.qw{flex:1;min-width:0}
.q{font-size:15px;font-weight:600;cursor:pointer;user-select:none;position:relative;padding-right:26px}
.q::after{content:'\25B8';position:absolute;right:0;top:0;font-size:16px;color:#86868b;transition:transform .2s}
.cd.op .q::after{transform:rotate(90deg)}
.a{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f5;font-size:14px;color:#424245;line-height:1.7}
.cd.op .a{display:block}
.cf{display:flex;align-items:center;gap:8px;margin-top:8px}
.sb{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;background:#f0f0f5;color:#86868b}
.cpb{padding:2px 8px;border-radius:8px;border:1px solid #d2d2d7;background:#fff;cursor:pointer;font-size:11px;color:#86868b}
.cpb:hover{background:#f5f5f7;color:#1d1d1f}
.stp{margin:6px 0;padding-left:8px;border-left:2px solid #0071e3}
.sub{margin:3px 0 3px 20px;color:#555}
.tst{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.tst.sh{opacity:1}
.es{text-align:center;padding:60px 20px;color:#86868b;font-size:15px}

<script>
const DATA={"selected":[{"question": "A right-angled triangle has sides $(4+\\sqrt{2})$ cm and $(2-\\sqrt{2})$ cm. What is its area?", "answer": "- Step 1: Write the formula: $$A=\\tfrac12\\times(4+\\sqrt{2})(2-\\sqrt{2})$$\n- Step 2: Expand (FOIL): $$(4+\\sqrt{2})(2-\\sqrt{2})=8-4\\sqrt{2}+2\\sqrt{2}-2=6-2\\sqrt{2}$$\n- Step 3: Multiply by $\\tfrac12$: $$A=\\tfrac12(6-2\\sqrt{2})=3-\\sqrt{2}$$\n**Answer: $3-\\sqrt{2}$ cm\u00b2**", "source": "GLM 5.2", "_id": "gen_0"}, {"question": "Why should you expand the surd brackets **before** multiplying by $\\tfrac12$ in triangle area problems?", "answer": "Expanding first keeps the surd and rational terms visible and separate, preventing sign errors. If you introduce $\\tfrac12$ early, you create mixed fractions and surds where sign slips hide. Harry's rule: **expand fully, then halve**.", "source": "GLM 5.2", "_id": "gen_1"}, {"question": "In $(4+\\sqrt{2})(2-\\sqrt{2})$, do the cross terms $-4\\sqrt{2}+2\\sqrt{2}$ fully cancel?", "answer": "No. They combine to $-2\\sqrt{2}$. This is NOT a difference of two squares because the first terms differ ($4$ vs $2$). Only $(a+b)(a-b)$ patterns cancel fully.", "source": "GLM 5.2", "_id": "gen_2"}, {"question": "Verify: what is the area of a right triangle with sides $(4+\\sqrt{3})$ and $(2-\\sqrt{3})$?", "answer": "- Step 1: $A=\\tfrac12(4+\\sqrt{3})(2-\\sqrt{3})$\n- Step 2: Expand: $8-4\\sqrt{3}+2\\sqrt{3}-3=5-2\\sqrt{3}$\n- Step 3: Halve: $A=\\tfrac{5}{2}-\\sqrt{3}$\n**Answer: $\\frac{5}{2}-\\sqrt{3}$ cm\u00b2**", "source": "GLM 5.2", "_id": "gen_3"}, {"question": "A sphere of radius $r$ fits inside a cylinder with the same diameter and height. What fraction of the cylinder volume does the sphere occupy?", "answer": "- Step 1: Cylinder height = sphere diameter = $2r$\n- Step 2: $V_{\\text{cyl}}=\\pi r^2 h=\\pi r^2(2r)=2\\pi r^3$\n- Step 3: $V_{\\text{sphere}}=\\tfrac{4}{3}\\pi r^3$\n- Step 4: Fraction $=\\frac{\\tfrac{4}{3}\\pi r^3}{2\\pi r^3}=\\frac{4/3}{2}=\\frac{2}{3}$\n**Answer: $\\frac{2}{3}$** (Archimedes' result)", "source": "GLM 5.2", "_id": "gen_4"}, {"question": "Why is the cylinder height $2r$ (not $r$) when a sphere of radius $r$ fits snugly inside?", "answer": "The sphere's **diameter** is $2r$, and the cylinder's internal length equals the sphere's diameter. Using $h=r$ would give $V_{\\text{cyl}}=\\pi r^3$ and the fraction would be $\\frac{4}{3}>1$, which is impossible.", "source": "GLM 5.2", "_id": "gen_5"}, {"question": "What is Archimedes' sphere-in-cylinder result and when does it apply?", "answer": "$$\\frac{V_{\\text{sphere}}}{V_{\\text{cyl}}}=\\frac{2}{3}$$\nApplies when the cylinder exactly contains the sphere: cylinder diameter = sphere diameter = $2r$, and cylinder height = $2r$. **Memorise this.**", "source": "GLM 5.2", "_id": "gen_6"}, {"question": "State the **burger method** for dividing fractions $\\frac{a/b}{c/d}$.", "answer": "$$\\frac{a/b}{c/d}=\\frac{a\\times d}{b\\times c}=\\frac{ad}{bc}$$\nThe 'burger' visual: top-left $a$ connects to bottom-right $d$ (bun top); bottom-left $b$ connects to top-right $c$ (filling).", "source": "GLM 5.2", "_id": "gen_7"}, {"question": "Using the burger method, compute $\\frac{2/3}{5/7}$.", "answer": "$$\\frac{2/3}{5/7}=\\frac{2\\times 7}{3\\times 5}=\\frac{14}{15}$$", "source": "GLM 5.2", "_id": "gen_8"}, {"question": "How do you divide a fraction by a whole number: $\\frac{a}{b}\\div c$?", "answer": "Treat $c$ as $\\frac{c}{1}$, then apply the burger method:\n$$\\frac{a}{b}\\div\\frac{c}{1}=\\frac{a\\times 1}{b\\times c}=\\frac{a}{bc}$$\nExample: $\\frac{3/7}{c}=\\frac{3}{7c}$", "source": "GLM 5.2", "_id": "gen_9"}, {"question": "For $0<x<1$, rank these from smallest to largest: $x^2,\\; x,\\; \\sqrt{x},\\; 1,\\; \\frac{1}{\\sqrt{x}},\\; \\frac{1}{x}$.", "answer": "$$x^2 < x < \\sqrt{x} < 1 < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$\nTest at $x=\\tfrac14$: $\\tfrac{1}{16}<\\tfrac14<\\tfrac12<1<2<4$ \u2713", "source": "GLM 5.2", "_id": "gen_10"}, {"question": "Why is $\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$ for $0<x<1$?", "answer": "Since $0<x<1$: $x<\\sqrt{x}$ (square root of a fraction is larger than the fraction).\nTherefore $\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$ (smaller denominator \u2192 larger fraction).\nConfirm at $x=\\frac14$: $\\frac{1}{x}=4 > \\frac{1}{\\sqrt{x}}=2$.", "source": "GLM 5.2", "_id": "gen_11"}, {"question": "What is the range of $\\frac{1}{1+x}$ for $0<x<1$, and why is it eliminated as the 'largest' function?", "answer": "Range: $(\\tfrac12, 1)$. Since $1+x>1$ for $x>0$, the reciprocal $\\frac{1}{1+x}<1$. All values are below 1, so it's eliminated.", "source": "GLM 5.2", "_id": "gen_12"}, {"question": "Which of $\\frac{1}{x},\\; x^2,\\; \\frac{1}{1+x},\\; \\frac{1}{\\sqrt{x}},\\; \\sqrt{x}$ is largest for $0<x<1$?", "answer": "**$\\frac{1}{x}$** is the largest.\n- $x^2, \\sqrt{x}$: range $(0,1)$ \u2014 below 1\n- $\\frac{1}{1+x}$: range $(\\frac12, 1)$ \u2014 below 1\n- $\\frac{1}{\\sqrt{x}}$: range $(1,\\infty)$ \u2014 candidate\n- $\\frac{1}{x}$: range $(1,\\infty)$ \u2014 candidate, but $\\frac1x > \\frac1{\\sqrt{x}}$ since $x < \\sqrt{x}$", "source": "GLM 5.2", "_id": "gen_13"}, {"question": "At $x=\\frac14$, what are the values of all five functions?", "answer": "| Function | Value |\n|---|---|\n| $x^2$ | $\\frac{1}{16}=0.0625$ |\n| $x$ | $\\frac14=0.25$ |\n| $\\sqrt{x}$ | $\\frac12=0.5$ |\n| $\\frac{1}{1+x}$ | $\\frac45=0.8$ |\n| $\\frac{1}{\\sqrt{x}}$ | $2$ |\n| $\\frac{1}{x}$ | $4$ |", "source": "GLM 5.2", "_id": "gen_14"}, {"question": "How is $y=\\sqrt{x}$ related to $y=x^2$ geometrically?", "answer": "$y=\\sqrt{x}$ is the **reflection** of $y=x^2$ (restricted to $x\\geq 0$) across the line $y=x$.\nIf $(a,b)$ is on $y=x^2$, then $(b,a)$ is on $y=\\sqrt{x}$.", "source": "GLM 5.2", "_id": "gen_15"}, {"question": "Why must $x^2$ be restricted to $x\\geq 0$ to define its inverse?", "answer": "$x^2$ is not one-to-one on all of $\\mathbb{R}$ (both $2$ and $-2$ map to $4$), so the inverse is only defined on the non-negative branch. The principal root $\\sqrt{4}=2$ (not $-2$).", "source": "GLM 5.2", "_id": "gen_16"}, {"question": "Is $\\sqrt{4} = \\pm 2$? Explain.", "answer": "No. $\\sqrt{4} = 2$ only (the **principal** / positive root).\nThe equation $x^2=4$ has solutions $x=\\pm 2$, but the function $\\sqrt{\\phantom{x}}$ always returns the positive root.", "source": "GLM 5.2", "_id": "gen_17"}, {"question": "In triangle ADE with BC\u2225DE, $AB=4$, $BC=x$, $DE=x+3$, $DB=x-4$. Set up the proportion and find DE.", "answer": "- Step 1: $AD=AB+BD=4+(x-4)=x$\n- Step 2: $\\frac{AB}{AD}=\\frac{BC}{DE}\\Rightarrow\\frac{4}{x}=\\frac{x}{x+3}$\n- Step 3: Cross-multiply: $x^2=4(x+3)=4x+12$\n- Step 4: $x^2-4x-12=0\\Rightarrow(x+2)(x-6)=0$\n- Step 5: $x=6$ (reject $x=-2$), so $DE=x+3=9$\n**Answer: $DE=9$ cm**", "source": "GLM 5.2", "_id": "gen_18"}, {"question": "In similar triangle problems, what is a common trap when setting up $AD$?", "answer": "$AD = AB + BD$, not just $AB$. When only $AB$ and $DB$ are given, you must compute $AD=AB+BD$ before using the proportion $\\frac{AB}{AD}=\\frac{BC}{DE}$.", "source": "GLM 5.2", "_id": "gen_19"}, {"question": "After solving $x^2-4x-12=0$ to get $x=-2$ or $x=6$, why do you reject $x=-2$?", "answer": "$x$ represents a **length** (side $BC$). Lengths must be positive. Always check physical validity of solutions.", "source": "GLM 5.2", "_id": "gen_20"}, {"question": "If $P \\propto \\frac{1}{Q^2}$ and $Q$ increases by 40%, find the percentage change in $P$.", "answer": "- Step 1: $P=\\frac{k}{Q^2}$\n- Step 2: $Q_{\\text{new}}=1.4Q=\\frac75 Q$\n- Step 3: $P_{\\text{new}}=\\frac{k}{(\\frac75 Q)^2}=\\frac{k}{\\frac{49}{25}Q^2}=\\frac{25}{49}P_{\\text{old}}$\n- Step 4: $\\%\\Delta=\\left(\\frac{25}{49}-1\\right)\\times100\\%=-\\frac{24}{49}\\times100\\%\\approx-49\\%$\n**Answer: 49% decrease**", "source": "GLM 5.2", "_id": "gen_21"}, {"question": "Why use $\\frac{7}{5}$ instead of $1.4$ in proportionality problems?", "answer": "Using $\\frac75$ (exact) gives $(\\frac75)^2=\\frac{49}{25}$ and $\\frac{25}{49}$ with **no rounding**. Using $1.4$ gives $1.96$, then $1/1.96$ introduces premature rounding. **Always use exact fractions.**", "source": "GLM 5.2", "_id": "gen_22"}, {"question": "If $P \\propto \\frac{1}{Q^2}$ and $Q$ changes by factor $m$, what is $P_{\\text{new}}$ in terms of $P_{\\text{old}}$?", "answer": "$$P_{\\text{new}}=\\frac{1}{m^2}P_{\\text{old}}$$\nPercentage change: $\\left(\\frac{1}{m^2}-1\\right)\\times100\\%$", "source": "GLM 5.2", "_id": "gen_23"}, {"question": "If $Q$ increases by 20% and $P\\propto\\frac{1}{Q^2}$, what is the percentage change in $P$?", "answer": "$Q_{\\text{new}}=\\frac65 Q$, so $P_{\\text{new}}=\\frac{25}{36}P_{\\text{old}}$.\n$\\%\\Delta=\\left(\\frac{25}{36}-1\\right)\\times100\\%\\approx-30.6\\%$\n**About 31% decrease.**", "source": "GLM 5.2", "_id": "gen_24"}, {"question": "Given $a=\\frac{b^2+2}{3b^2-1}$, express $b$ in terms of $a$.", "answer": "- Step 1: Cross-multiply: $a(3b^2-1)=b^2+2$\n- Step 2: Expand: $3ab^2-a=b^2+2$\n- Step 3: Collect $b^2$: $3ab^2-b^2=a+2$\n- Step 4: Factorise: $b^2(3a-1)=a+2$\n- Step 5: $b^2=\\frac{a+2}{3a-1}$\n- Step 6: $b=\\pm\\sqrt{\\frac{a+2}{3a-1}}$\n**Answer: $b=\\pm\\sqrt{\\frac{a+2}{3a-1}}$**", "source": "GLM 5.2", "_id": "gen_25"}, {"question": "After getting $3ab^2-a=b^2+2$, what is the common sign error?", "answer": "Writing $3ab^2-b^2-a+2=0$ (moving $+2$ to the same side incorrectly).\nThe correct path: keep $b^2$ terms left, constants right:\n$$3ab^2-b^2=a+2$$", "source": "GLM 5.2", "_id": "gen_26"}, {"question": "Why must the answer $b=\\pm\\sqrt{\\frac{a+2}{3a-1}}$ include $\\pm$?", "answer": "Because $b$ appears only as $b^2$ in the original equation. Both $b=+\\sqrt{\\cdots}$ and $b=-\\sqrt{\\cdots}$ satisfy $b^2=\\frac{a+2}{3a-1}$. Forgetting $\\pm$ misses the negative root.", "source": "GLM 5.2", "_id": "gen_27"}, {"question": "What is Harry's rule for **cancel early** in ratio problems?", "answer": "Cancel common algebraic factors **before** doing arithmetic. E.g., $\\frac{\\frac43\\pi r^3}{2\\pi r^3}\\to\\frac{4/3}{2}=\\frac23$. This is faster and less error-prone than fully expanding first.", "source": "GLM 5.2", "_id": "gen_28"}, {"question": "For ESAT MCQ, should you use the quadratic formula or manual factoring?", "answer": "**Manual factoring** \u2014 it's typically 10-15 seconds faster and less error-prone for clean integer answers. Write 'product = $c$, sum = $b$' and list factor pairs systematically.", "source": "GLM 5.2", "_id": "gen_29"}, {"question": "When comparing functions over an interval, what strategy resolves ties?", "answer": "**Test one specific value** \u2014 pick a 'nice' fraction like $x=\\frac14$ or $x=\\frac12$ for easy arithmetic. E.g., at $x=\\frac14$: $\\frac1x=4>\\frac1{\\sqrt{x}}=2$, confirming $\\frac1x$ is largest.", "source": "GLM 5.2", "_id": "gen_30"}, {"question": "What should you do before starting algebra on an ESAT rearrangement question?", "answer": "**Scan the answer options first.** In Q6, all options have form $\\pm\\sqrt{(\\ldots)/(\\ldots)}$, telling you: (1) isolate $b^2$, (2) the answer involves a square root, (3) there are two solutions ($\\pm$). Pre-reading saves dead-end algebra.", "source": "GLM 5.2", "_id": "gen_31"}, {"question": "What does $\\sqrt{x}$ represent for $0<x<1$, and how does it compare to $x$?", "answer": "$\\sqrt{x}$ makes the number **larger**: $\\sqrt{x}>x$ for $0<x<1$.\nExample: $\\sqrt{0.25}=0.5>0.25$.\nThis is the opposite of squaring, which makes fractions smaller.", "source": "GLM 5.2", "_id": "gen_32"}],"models":{"gen": {"label": "GLM 5.2", "cards": [{"question": "A right-angled triangle has sides $(4+\\sqrt{2})$ cm and $(2-\\sqrt{2})$ cm. What is its area?", "answer": "- Step 1: Write the formula: $$A=\\tfrac12\\times(4+\\sqrt{2})(2-\\sqrt{2})$$\n- Step 2: Expand (FOIL): $$(4+\\sqrt{2})(2-\\sqrt{2})=8-4\\sqrt{2}+2\\sqrt{2}-2=6-2\\sqrt{2}$$\n- Step 3: Multiply by $\\tfrac12$: $$A=\\tfrac12(6-2\\sqrt{2})=3-\\sqrt{2}$$\n**Answer: $3-\\sqrt{2}$ cm\u00b2**", "source": "GLM 5.2"}, {"question": "Why should you expand the surd brackets **before** multiplying by $\\tfrac12$ in triangle area problems?", "answer": "Expanding first keeps the surd and rational terms visible and separate, preventing sign errors. If you introduce $\\tfrac12$ early, you create mixed fractions and surds where sign slips hide. Harry's rule: **expand fully, then halve**.", "source": "GLM 5.2"}, {"question": "In $(4+\\sqrt{2})(2-\\sqrt{2})$, do the cross terms $-4\\sqrt{2}+2\\sqrt{2}$ fully cancel?", "answer": "No. They combine to $-2\\sqrt{2}$. This is NOT a difference of two squares because the first terms differ ($4$ vs $2$). Only $(a+b)(a-b)$ patterns cancel fully.", "source": "GLM 5.2"}, {"question": "Verify: what is the area of a right triangle with sides $(4+\\sqrt{3})$ and $(2-\\sqrt{3})$?", "answer": "- Step 1: $A=\\tfrac12(4+\\sqrt{3})(2-\\sqrt{3})$\n- Step 2: Expand: $8-4\\sqrt{3}+2\\sqrt{3}-3=5-2\\sqrt{3}$\n- Step 3: Halve: $A=\\tfrac{5}{2}-\\sqrt{3}$\n**Answer: $\\frac{5}{2}-\\sqrt{3}$ cm\u00b2**", "source": "GLM 5.2"}, {"question": "A sphere of radius $r$ fits inside a cylinder with the same diameter and height. What fraction of the cylinder volume does the sphere occupy?", "answer": "- Step 1: Cylinder height = sphere diameter = $2r$\n- Step 2: $V_{\\text{cyl}}=\\pi r^2 h=\\pi r^2(2r)=2\\pi r^3$\n- Step 3: $V_{\\text{sphere}}=\\tfrac{4}{3}\\pi r^3$\n- Step 4: Fraction $=\\frac{\\tfrac{4}{3}\\pi r^3}{2\\pi r^3}=\\frac{4/3}{2}=\\frac{2}{3}$\n**Answer: $\\frac{2}{3}$** (Archimedes' result)", "source": "GLM 5.2"}, {"question": "Why is the cylinder height $2r$ (not $r$) when a sphere of radius $r$ fits snugly inside?", "answer": "The sphere's **diameter** is $2r$, and the cylinder's internal length equals the sphere's diameter. Using $h=r$ would give $V_{\\text{cyl}}=\\pi r^3$ and the fraction would be $\\frac{4}{3}>1$, which is impossible.", "source": "GLM 5.2"}, {"question": "What is Archimedes' sphere-in-cylinder result and when does it apply?", "answer": "$$\\frac{V_{\\text{sphere}}}{V_{\\text{cyl}}}=\\frac{2}{3}$$\nApplies when the cylinder exactly contains the sphere: cylinder diameter = sphere diameter = $2r$, and cylinder height = $2r$. **Memorise this.**", "source": "GLM 5.2"}, {"question": "State the **burger method** for dividing fractions $\\frac{a/b}{c/d}$.", "answer": "$$\\frac{a/b}{c/d}=\\frac{a\\times d}{b\\times c}=\\frac{ad}{bc}$$\nThe 'burger' visual: top-left $a$ connects to bottom-right $d$ (bun top); bottom-left $b$ connects to top-right $c$ (filling).", "source": "GLM 5.2"}, {"question": "Using the burger method, compute $\\frac{2/3}{5/7}$.", "answer": "$$\\frac{2/3}{5/7}=\\frac{2\\times 7}{3\\times 5}=\\frac{14}{15}$$", "source": "GLM 5.2"}, {"question": "How do you divide a fraction by a whole number: $\\frac{a}{b}\\div c$?", "answer": "Treat $c$ as $\\frac{c}{1}$, then apply the burger method:\n$$\\frac{a}{b}\\div\\frac{c}{1}=\\frac{a\\times 1}{b\\times c}=\\frac{a}{bc}$$\nExample: $\\frac{3/7}{c}=\\frac{3}{7c}$", "source": "GLM 5.2"}, {"question": "For $0<x<1$, rank these from smallest to largest: $x^2,\\; x,\\; \\sqrt{x},\\; 1,\\; \\frac{1}{\\sqrt{x}},\\; \\frac{1}{x}$.", "answer": "$$x^2 < x < \\sqrt{x} < 1 < \\frac{1}{\\sqrt{x}} < \\frac{1}{x}$$\nTest at $x=\\tfrac14$: $\\tfrac{1}{16}<\\tfrac14<\\tfrac12<1<2<4$ \u2713", "source": "GLM 5.2"}, {"question": "Why is $\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$ for $0<x<1$?", "answer": "Since $0<x<1$: $x<\\sqrt{x}$ (square root of a fraction is larger than the fraction).\nTherefore $\\frac{1}{x} > \\frac{1}{\\sqrt{x}}$ (smaller denominator \u2192 larger fraction).\nConfirm at $x=\\frac14$: $\\frac{1}{x}=4 > \\frac{1}{\\sqrt{x}}=2$.", "source": "GLM 5.2"}, {"question": "What is the range of $\\frac{1}{1+x}$ for $0<x<1$, and why is it eliminated as the 'largest' function?", "answer": "Range: $(\\tfrac12, 1)$. Since $1+x>1$ for $x>0$, the reciprocal $\\frac{1}{1+x}<1$. All values are below 1, so it's eliminated.", "source": "GLM 5.2"}, {"question": "Which of $\\frac{1}{x},\\; x^2,\\; \\frac{1}{1+x},\\; \\frac{1}{\\sqrt{x}},\\; \\sqrt{x}$ is largest for $0<x<1$?", "answer": "**$\\frac{1}{x}$** is the largest.\n- $x^2, \\sqrt{x}$: range $(0,1)$ \u2014 below 1\n- $\\frac{1}{1+x}$: range $(\\frac12, 1)$ \u2014 below 1\n- $\\frac{1}{\\sqrt{x}}$: range $(1,\\infty)$ \u2014 candidate\n- $\\frac{1}{x}$: range $(1,\\infty)$ \u2014 candidate, but $\\frac1x > \\frac1{\\sqrt{x}}$ since $x < \\sqrt{x}$", "source": "GLM 5.2"}, {"question": "At $x=\\frac14$, what are the values of all five functions?", "answer": "| Function | Value |\n|---|---|\n| $x^2$ | $\\frac{1}{16}=0.0625$ |\n| $x$ | $\\frac14=0.25$ |\n| $\\sqrt{x}$ | $\\frac12=0.5$ |\n| $\\frac{1}{1+x}$ | $\\frac45=0.8$ |\n| $\\frac{1}{\\sqrt{x}}$ | $2$ |\n| $\\frac{1}{x}$ | $4$ |", "source": "GLM 5.2"}, {"question": "How is $y=\\sqrt{x}$ related to $y=x^2$ geometrically?", "answer": "$y=\\sqrt{x}$ is the **reflection** of $y=x^2$ (restricted to $x\\geq 0$) across the line $y=x$.\nIf $(a,b)$ is on $y=x^2$, then $(b,a)$ is on $y=\\sqrt{x}$.", "source": "GLM 5.2"}, {"question": "Why must $x^2$ be restricted to $x\\geq 0$ to define its inverse?", "answer": "$x^2$ is not one-to-one on all of $\\mathbb{R}$ (both $2$ and $-2$ map to $4$), so the inverse is only defined on the non-negative branch. The principal root $\\sqrt{4}=2$ (not $-2$).", "source": "GLM 5.2"}, {"question": "Is $\\sqrt{4} = \\pm 2$? Explain.", "answer": "No. $\\sqrt{4} = 2$ only (the **principal** / positive root).\nThe equation $x^2=4$ has solutions $x=\\pm 2$, but the function $\\sqrt{\\phantom{x}}$ always returns the positive root.", "source": "GLM 5.2"}, {"question": "In triangle ADE with BC\u2225DE, $AB=4$, $BC=x$, $DE=x+3$, $DB=x-4$. Set up the proportion and find DE.", "answer": "- Step 1: $AD=AB+BD=4+(x-4)=x$\n- Step 2: $\\frac{AB}{AD}=\\frac{BC}{DE}\\Rightarrow\\frac{4}{x}=\\frac{x}{x+3}$\n- Step 3: Cross-multiply: $x^2=4(x+3)=4x+12$\n- Step 4: $x^2-4x-12=0\\Rightarrow(x+2)(x-6)=0$\n- Step 5: $x=6$ (reject $x=-2$), so $DE=x+3=9$\n**Answer: $DE=9$ cm**", "source": "GLM 5.2"}, {"question": "In similar triangle problems, what is a common trap when setting up $AD$?", "answer": "$AD = AB + BD$, not just $AB$. When only $AB$ and $DB$ are given, you must compute $AD=AB+BD$ before using the proportion $\\frac{AB}{AD}=\\frac{BC}{DE}$.", "source": "GLM 5.2"}, {"question": "After solving $x^2-4x-12=0$ to get $x=-2$ or $x=6$, why do you reject $x=-2$?", "answer": "$x$ represents a **length** (side $BC$). Lengths must be positive. Always check physical validity of solutions.", "source": "GLM 5.2"}, {"question": "If $P \\propto \\frac{1}{Q^2}$ and $Q$ increases by 40%, find the percentage change in $P$.", "answer": "- Step 1: $P=\\frac{k}{Q^2}$\n- Step 2: $Q_{\\text{new}}=1.4Q=\\frac75 Q$\n- Step 3: $P_{\\text{new}}=\\frac{k}{(\\frac75 Q)^2}=\\frac{k}{\\frac{49}{25}Q^2}=\\frac{25}{49}P_{\\text{old}}$\n- Step 4: $\\%\\Delta=\\left(\\frac{25}{49}-1\\right)\\times100\\%=-\\frac{24}{49}\\times100\\%\\approx-49\\%$\n**Answer: 49% decrease**", "source": "GLM 5.2"}, {"question": "Why use $\\frac{7}{5}$ instead of $1.4$ in proportionality problems?", "answer": "Using $\\frac75$ (exact) gives $(\\frac75)^2=\\frac{49}{25}$ and $\\frac{25}{49}$ with **no rounding**. Using $1.4$ gives $1.96$, then $1/1.96$ introduces premature rounding. **Always use exact fractions.**", "source": "GLM 5.2"}, {"question": "If $P \\propto \\frac{1}{Q^2}$ and $Q$ changes by factor $m$, what is $P_{\\text{new}}$ in terms of $P_{\\text{old}}$?", "answer": "$$P_{\\text{new}}=\\frac{1}{m^2}P_{\\text{old}}$$\nPercentage change: $\\left(\\frac{1}{m^2}-1\\right)\\times100\\%$", "source": "GLM 5.2"}, {"question": "If $Q$ increases by 20% and $P\\propto\\frac{1}{Q^2}$, what is the percentage change in $P$?", "answer": "$Q_{\\text{new}}=\\frac65 Q$, so $P_{\\text{new}}=\\frac{25}{36}P_{\\text{old}}$.\n$\\%\\Delta=\\left(\\frac{25}{36}-1\\right)\\tim
