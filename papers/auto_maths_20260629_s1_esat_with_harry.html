ax_2_26", "judge_pick": false}, {"question": "In regression analysis, if the question asks you to \"estimate the weight of a horse with height 165 cm,\" what should you be careful about before making this prediction? (1 step)", "answer": "You should check whether 165 cm falls within the range of the original data (interpolation) or outside it (extrapolation). If 165 cm is within the heights you used to create the regression line, your estimate is more reliable. If it's outside that range, you should be cautious as the linear relationship may not hold, and you should note this as a limitation.", "source": "MiniMax ②", "_id": "minimax_2_27", "judge_pick": false}, {"question": "The exam instructions state \"exact answers should be given to three significant figures unless otherwise stated.\" A student gives an answer as 0.08. Why might this lose a mark? (1 step)", "answer": "0.08 has only one significant figure. The instruction requires at least three significant figures for decimal answers. The correct answer to three significant figures would be 0.0800 (or simply 0.08 with an implicit understanding, though writing 0.0800 makes the precision clearer). Always check the number of significant figures in your final answer.", "source": "MiniMax ②", "_id": "minimax_2_28", "judge_pick": false}, {"question": "A student correctly calculates E(X) = 1.8 and E(X²) = 4.6 for a discrete random variable. When calculating the variance, they write $$Var(X) = \\frac{4.6 - 1.8^2}{n}$$. What is wrong with this approach? (1 step)", "answer": "The formula $$Var(X) = E(X^2) - [E(X)]^2$$ does not involve dividing by n (the number of data points). The correct calculation is simply: $$Var(X) = 4.6 - (1.8)^2 = 4.6 - 3.24 = 1.36$$. The division by n is a common misconception from the sample variance formula in descriptive statistics, but for the expected value variance formula, no division is needed.", "source": "MiniMax ②", "_id": "minimax_2_29", "judge_pick": false}, {"question": "In a Venn diagram problem with three sets A, B, and C, if you need to find the probability of $$P(A \\cup B)$$, what regions would you add together? (1 step)", "answer": "For the union $$P(A \\cup B)$$, you want the probability that either A occurs or B occurs (or both). On the Venn diagram, this includes: the part that is only in A (not in B or C), the part that is only in B (not in A or C), and the intersection $$A \\cap B$$ (the overlap). You do NOT want to count the intersection twice, so you add the individual regions and the intersection once.", "source": "MiniMax ②", "_id": "minimax_2_30", "judge_pick": false}, {"question": "If you are asked to find the probability of being late given that Paul took the bicycle, how would you write this in probability notation, and what does the vertical bar mean? (1 step)", "answer": "This is written as $$P(\\text{Late} | \\text{Bicycle})$$. The vertical bar means \"given that\" or \"conditioned on\" — it denotes a conditional probability. It reads as \"the probability that Paul is late, given that he traveled by bicycle.\" This is different from the joint probability $$P(\\text{Late} \\cap \\text{Bicycle})$$, which would be the probability of both happening together.", "source": "MiniMax ②", "_id": "minimax_2_31", "judge_pick": false}, {"question": "What is the difference between discrete and continuous random variables? Give an example of each. (1 step)", "answer": "A discrete random variable can only take specific, separated values (often integers), typically countable in number. Examples: number of heads in 5 coin flips, the score on a die. A continuous random variable can take any value within an interval. Examples: height of a person, time taken to complete a task, weight of a horse. You cannot have \"half a head\" but you can have a height of 175.5 cm.", "source": "MiniMax ②", "_id": "minimax_2_32", "judge_pick": false}, {"question": "In a histogram, what does the area of each bar represent, and why is this important? (1 step)", "answer": "In a histogram, it is the AREA (not the height) that represents the frequency for that class interval. This is different from a bar chart where height represents frequency. Because class widths may vary in histograms, the height is adjusted (frequency density = frequency ÷ class width) so that the area correctly represents the frequency. This ensures that larger intervals don't appear underrepresented.", "source": "MiniMax ②", "_id": "minimax_2_33", "judge_pick": false}, {"question": "A question gives you the probability of being late when taking each transport method, and asks you to find the overall probability Paul is late. Why can you not simply average the three late probabilities? (1 step)", "answer": "Because the three transport methods are not equally likely — Paul is more likely to take some methods than others. You must weight each conditional probability by the probability of taking that transport method. The overall probability is a weighted average: $$P(\\text{Late}) = \\sum P(\\text{Method}) \\times P(\\text{Late}|\\text{Method})$$. Simply averaging would assume each method has probability $$\\frac{1}{3}$$.", "source": "MiniMax ②", "_id": "minimax_2_34", "judge_pick": false}, {"question": "In the standard normal distribution, what do we mean by \"standardizing\" a value, and what is the formula used? (1 step)", "answer": "Standardizing (or finding the z-score) transforms any normal distribution to the standard normal distribution with mean 0 and standard deviation 1. The formula is: $$z = \\frac{x - \\mu}{\\sigma}$$, where x is the original value, μ is the mean, and σ is the standard deviation. The z-score tells you how many standard deviations above or below the mean the original value is.", "source": "MiniMax ②", "_id": "minimax_2_35", "judge_pick": false}, {"question": "What does it mean when we say the regression line \"minimizes the sum of squared residuals\"? (1 step)", "answer": "The least squares regression line is the unique line that makes the sum of the squares of the vertical distances (residuals) between the actual data points and the line as small as possible. A residual is the difference $$y_{actual} - y_{predicted}$$. This method ensures the line is the \"best fit\" in a precise mathematical sense — no other straight line would give a smaller sum of squared errors.", "source": "MiniMax ②", "_id": "minimax_2_36", "judge_pick": false}, {"question": "In coding data, if you apply the transformation $$X_{new} = \\frac{X_{old} - a}{b}$$, how do the mean and standard deviation of the new data relate to the old data? (2 steps)", "answer": "- Step 1: The mean transforms as $$\\bar{X}_{new} = \\frac{\\bar{X}_{old} - a}{b}$$ — you apply the same transformation to the mean.\n- Step 2: The standard deviation transforms as $$SD_{new} = \\frac{SD_{old}}{|b|}$$ — the shift by 'a' doesn't affect the spread, but dividing by 'b' scales it. The standard deviation is divided by the absolute value of b.", "source": "MiniMax ②", "_id": "minimax_2_37", "judge_pick": false}, {"question": "A student finds the probability of A AND B by calculating $$P(A) + P(B)$$. Under what condition is this actually correct? (1 step)", "answer": "This is ONLY correct when A and B are mutually exclusive (cannot occur together), which means $$P(A \\cap B) = 0$$. In that case, $$P(A \\cup B) = P(A) + P(B)$$. If A and B can both occur, you must subtract the overlap: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$. Using addition without checking for overlap is a common error.", "source": "MiniMax ②", "_id": "minimax_2_38", "judge_pick": false}, {"question": "When asked to \"state giving a reason\" which of two estimates is more reliable in regression, what specific reason must you give? (1 step)", "answer": "You must specifically mention whether the estimate involves interpolation (within the data range) or extrapolation (outside the data range), and state that interpolation is more reliable while extrapolation can be unreliable. For example: \"The first estimate uses interpolation (within the original data range), which is more reliable; the second uses extrapolation (outside the data range), which can be unreliable.\"", "source": "MiniMax ②", "_id": "minimax_2_39", "judge_pick": false}, {"question": "What is the relationship between the cumulative distribution function F(x) and the probability density function f(x) for a continuous random variable? (1 step)", "answer": "The cumulative distribution function $$F(x) = P(X \\leq x)$$ gives the probability that the variable is less than or equal to x. For continuous distributions, $$F(x)$$ is the area under the probability density curve from negative infinity to x. The two are related by differentiation: $$f(x) = \\frac{dF}{dx}$$, and by integration: $$F(x) = \\int_{-\\infty}^{x} f(t) dt$$.", "source": "MiniMax ②", "_id": "minimax_2_40", "judge_pick": false}, {"question": "In a stem-and-leaf diagram, what does each \"stem\" and each \"leaf\" represent? (1 step)", "answer": "In a stem-and-leaf diagram (or stemplot), the \"stem\" typically represents the leading digit(s) and the \"leaf\" represents the trailing digit(s). For example, with data points 23, 25, 31, you would have stems \"2\" with leaves \"3, 5\" and stem \"3\" with leaf \"1\". This preserves the actual data values while showing the distribution shape. It is effectively a histogram that also shows individual values.", "source": "MiniMax ②", "_id": "minimax_2_41", "judge_pick": false}, {"question": "Why is it important to underline or highlight key words in exam questions like \"hence,\" \"interpret,\" \"given that,\" or \"show that\"? (1 step)", "answer": "These words signal specific instructions: \"hence\" means use previous results; \"interpret\" means explain in context; \"given that\" signals conditional probability; \"show that\" means demonstrate a result (you may need to present working). Missing these words can cause you to miss entire methods or misinterpret what the question is asking, leading to lost marks.", "source": "MiniMax ②", "_id": "minimax_2_42", "judge_pick": false}, {"question": "A probability question states \"given that Paul is late, what is the probability he came by car?\" Write this in probability notation and explain what goes in the denominator. (1 step)", "answer": "This is written as $$P(\\text{Car} | \\text{Late})$$. The denominator $$P(\\text{Late})$$ is the overall probability of being late (which you would have calculated in an earlier part of the question). The numerator is $$P(\\text{Car} \\cap \\text{Late})$$, the joint probability of both coming by car AND being late.", "source": "MiniMax ②", "_id": "minimax_2_43", "judge_pick": false}, {"question": "What is the purpose of a scatter diagram in bivariate data analysis, and what can it reveal immediately that calculations cannot? (1 step)", "answer": "A scatter diagram plots each paired observation as a point (x, y). Immediately, you can see the form (linear, curved, no pattern), direction (positive or negative correlation), and strength (how tightly points follow the pattern) of the relationship. It also reveals outliers visually and shows whether a linear model is appropriate — before doing any calculations, you can see if a straight line makes sense.", "source": "MiniMax ②", "_id": "minimax_2_44", "judge_pick": false}, {"question": "In a discrete probability distribution, what two conditions must be satisfied by all probabilities $$p_i$$? (1 step)", "answer": "First, every probability must be between 0 and 1: $$0 \\leq p_i \\leq 1$$ for all i (probabilities cannot be negative or greater than 1). Second, the probabilities must sum to 1: $$\\sum p_i = 1$$ (one of the possible outcomes must occur — total probability is certainty). These are the two fundamental requirements for any valid probability distribution.", "source": "MiniMax ②", "_id": "minimax_2_45", "judge_pick": false}, {"question": "When calculating the expected value of X² from a probability distribution table, what calculation do you perform? (1 step)", "answer": "You create a new column of $$x^2$$ multiplied by $$P(X = x)$$, then sum them: $$E(X^2) = \\sum x_i^2 \\times p_i$$. Note carefully: you square the x-value FIRST, then multiply by the probability — you do not square the expected value E(X). This is a common error to avoid.", "source": "MiniMax ②", "_id": "minimax_2_46", "judge_pick": false}, {"question": "In a box plot, what do the \"whiskers\" represent, and where do they typically end? (1 step)", "answer": "The whiskers extend from the box to show the range of the data excluding outliers. Typically, they extend to the minimum and maximum values that are not considered outliers (i.e., within $$1.5 \\times IQR$$ of the quartiles). Some box plots extend to the absolute minimum and maximum, while others use a specific endpoint convention — you should be aware of the convention being used in your exam.", "source": "MiniMax ②", "_id": "minimax_2_47", "judge_pick": false}, {"question": "What is the difference between correlation and regression? (1 step)", "answer": "Correlation measures the strength and direction of a LINEAR relationship between two variables (using the correlation coefficient r), but it doesn't predict values. Regression provides an equation (the regression line) that allows you to predict the value of y for a given x. Correlation is symmetric (r for X vs Y equals r for Y vs X), but regression is not (the equation differs depending on which variable is treated as the predictor).", "source": "MiniMax ②", "_id": "minimax_2_48", "judge_pick": false}, {"question": "A question asks for \"the probability that Paul travels by car given that he is not late.\" If you have a tree diagram where the first branches are transport method and second branches are late/not late, how would you find this? (2 steps)", "answer": "- Step 1: This is a conditional probability with \"not late\" as the condition. From your tree diagram, you need $$P(\\text{Car} | \\text{Not Late}) = \\frac{P(\\text{Car} \\cap \\text{Not Late})}{P(\\text{Not Late})}$$.\n- Step 2: Find the numerator by multiplying along the path: car × not late. Find the denominator by adding all paths that lead to \"not late.\" Then divide. This essentially reverses the tree structure — you're now conditioning on the second-stage outcome.", "source": "MiniMax ②", "_id": "minimax_2_49", "judge_pick": false}, {"question": "When working with frequency tables, what is \"coding\" data and why might you do it? (1 step)", "answer": "Coding is applying a linear transformation to data to make calculations easier. For example, if you have large numbers, you might subtract a constant (centering) or divide by a constant (scaling). The formulas are: $$\\bar{X}_{coded} = \\frac{\\bar{X}_{original} - a}{b}$$ and $$SD_{coded} = \\frac{SD_{original}}{b}$$. After working with the coded data, you transform back. This is especially useful when the original numbers are cumbersome to work with.", "source": "MiniMax ②", "_id": "minimax_2_50", "judge_pick": false}, {"question": "What is the difference between the sample variance formula $$s^2 = \\frac{\\sum (x - \\bar{x})^2}{n-1}$$ and the population variance formula? (1 step)", "answer": "The sample variance divides by $$n-1$$ (the degrees of freedom) rather than n. This makes $$s^2$$ an unbiased estimator of the population variance — on average, it equals the true population variance. Dividing by n would give a biased estimate that systematically underestimates the true variance. For probability distributions (where you have the full distribution, not a sample), you use $$E[(X - \\mu)^2]$$ without the $$n-1$$ adjustment.", "source": "MiniMax ②", "_id": "minimax_2_51", "judge_pick": false}, {"question": "In a normal distribution problem, if you are given the mean and standard deviation and asked to find a probability, what is the general approach? (2 steps)", "answer": "- Step 1: Draw a normal distribution curve, shade the relevant region, and identify what you're looking for (e.g., P(X < a), P(X > b), P(a < X < b)).\n- Step 2: Convert the boundary value(s) to z-scores using $$z = \\frac{x - \\mu}{\\sigma}$$, then look up the corresponding probability from the standard normal distribution table (or use calculator functions). For regions between two values, find both z-scores and subtract the probabilities.", "source": "MiniMax ②", "_id": "minimax_2_52", "judge_pick": false}, {"question": "A student writes the answer to a probability question as $$\\frac{2}{15}$$ but the mark scheme shows the answer as 0.1333. What should the student consider about exact vs. decimal answers? (1 step)", "answer": "In mathematics exams, unless the question specifically asks for a decimal or a three-significant-figure approximation, an exact fraction like $$\\frac{2}{15}$$ is usually preferred and will be accepted as correct. The decimal 0.1333 is actually an approximation — the exact value is $$\\frac{2}{15}$$. Always consider whether an exact form is available, especially in non-calculator papers.", "source": "MiniMax ②", "_id": "minimax_2_53", "judge_pick": false}, {"question": "In a probability question with three events A, B, and C in a Venn diagram, the probability of the complement of C is needed. How do you find $$P(C')$$ from the diagram? (1 step)", "answer": "You can find $$P(C')$$ in two ways: either add up all regions that are NOT in C (everything outside the C circle), or use the complement rule: $$P(C') = 1 - P(C)$$. Both methods give the same answer. The complement approach is usually quicker if you know P(C), otherwise you sum all non-C regions.", "source": "MiniMax ②", "_id": "minimax_2_54", "judge_pick": false}, {"question": "What is the effect on the correlation coefficient r if you apply the same linear transformation to both variables in a scatter diagram? (1 step)", "answer": "The correlation coefficient r is unaffected by linear transformations of the form $$X_{new} = a + bX$$ and $$Y_{new} = c + dY$$ (where b and d have the same sign). Specifically, multiplying by a positive constant doesn't change r, and adding a constant doesn't change r. However, if you multiply one variable by a negative number (reversing its direction), the sign of r reverses. The strength (absolute value) remains the same.", "source": "MiniMax ②", "_id": "minimax_2_55", "judge_pick": false}, {"question": "When a question asks you to \"use the formula\" for variance of a discrete random variable, which formula from the formula booklet are they referring to? (1 step)", "answer": "They typically refer to the formula $$Var(X) = E(X^2) - [E(X)]^2$$. This is the standard computational formula. Some formula booklets also show $$Var(X) = \\sum x^2 p(x) - \\left[\\sum x p(x)\\right]^2$$. This is algebraically equivalent to the definition $$Var(X) = E[(X - \\mu)^2]$$ but easier to compute directly from a probability table.", "source": "MiniMax ②", "_id": "minimax_2_56", "judge_pick": false}, {"question": "In a problem with replacement vs. without replacement, how does this affect the probabilities in tree diagrams? (1 step)", "answer": "With replacement means each selection is independent — the probabilities on the second branch remain the same as the first. Without replacement means the probabilities change because the sample space shrinks (e.g., drawing one card and not returning it). In tree diagrams, \"with replacement\" branches multiply normally, while \"without replacement\" requires adjusting the second-set probabilities to account for what has already been taken.", "source": "MiniMax ②", "_id": "minimax_2_57", "judge_pick": false}, {"question": "A student says that because the correlation coefficient is 0.9, the regression line will always give accurate predictions. What is wrong with this thinking? (1 step)", "answer": "A high correlation indicates a strong linear relationship, but accuracy of predictions depends on the context and range of data. Predictions far outside the data range (extrapolation) can be inaccurate even with high r. Additionally, r measures linear association — it doesn't guarantee that predictions will be precise in absolute terms. Always consider whether the linear model is appropriate and whether your prediction is within the data range.", "source": "MiniMax ②", "_id": "minimax_2_58", "judge_pick": false}, {"question": "In a discrete random variable question, if the probability distribution is given in a table and you are asked to find the probability that X is at most 2, what are you actually calculating? (1 step)", "answer": "\"At most 2\" means $$X \\leq 2$$ — you want the cumulative probability up to and including the value 2. So you would add $$P(X = 0) + P(X = 1) + P(X = 2)$$. This is the cumulative distribution function value F(2). Similar phrases: \"at least 3\" means $$X \\geq 3$$, \"less than 4\" means $$X < 4$$.", "source": "MiniMax ②", "_id": "minimax_2_59", "judge_pick": false}, {"question": "When interpreting the y-intercept of a regression line in context, why might the literal interpretation be problematic? (1 step)", "answer": "The y-intercept is the predicted y-value when x = 0. In context, this may be meaningless if x = 0 is outside the data range or physically impossible. For example, if predicting weight from height, the intercept might give a negative weight when height is zero — clearly nonsensical. The intercept is mathematically necessary for the line but shouldn't always be interpreted literally in real-world terms.", "source": "MiniMax ②", "_id": "minimax_2_60", "judge_pick": false}, {"question": "What is the difference between $$P(A \\cap B)$$ and $$P(A | B)$$? Provide an example with probability values. (1 step)", "answer": "$$P(A \\cap B)$$ is the joint probability — the probability of BOTH events happening together. $$P(A | B)$$ is the conditional probability — the probability of A happening GIVEN that B has definitely happened. For example, if $$P(A) = 0.3, P(B) = 0.5, P(A \\cap B) = 0.2$$, then $$P(A | B) = \\frac{0.2}{0.5} = 0.4$$. Notice that $$P(A | B)$$ is larger than $$P(A)$$ because knowing B occurred makes A more likely in this example.", "source": "MiniMax ②", "_id": "minimax_2_61", "judge_pick": false}, {"question": "In a frequency distribution table with class intervals, how do you calculate the estimated mean? (1 step)", "answer": "For each class interval, use the midpoint (class midpoint = lower bound + upper bound, divided by 2) as an approximation for all values in that class. Multiply each midpoint by its frequency, sum these products, then divide by the total frequency: $$\\bar{x} = \\frac{\\sum f \\times x}{\\sum f}$$, where x represents the class midpoints.", "source": "MiniMax ②", "_id": "minimax_2_62", "judge_pick": false}, {"question": "What does it mean if the product moment correlation coefficient (pmcc) equals exactly +1 or -1? (1 step)", "answer": "A pmcc of exactly +1 means there is perfect positive linear correlation — all data points lie exactly on a straight line with positive slope. Similarly, -1 means perfect negative linear correlation. In practice, such exact values rarely occur with real data; if they do, you should check for a data entry error or a constructed problem. Any deviation from ±1 means the points don't all lie perfectly on a line.", "source": "MiniMax ②", "_id": "minimax_2_63", "judge_pick": false}, {"question": "In probability, what is the \"multiplication rule\" for independent events, and how does it differ for dependent events? (1 step)", "answer": "For independent events, the multiplication rule simplifies to $$P(A \\cap B) = P(A) \\times P(B)$$ because the occurrence of one doesn't affect the other. For dependent events, you must use the general rule: $$P(A \\cap B) = P(A) \\times P(B|A)$$ or equivalently $$P(A \\cap B) = P(B) \\times P(A|B)$$ — you need the conditional probability because the probability of one depends on whether the other occurred.", "source": "MiniMax ②", "_id": "minimax_2_64", "judge_pick": false}, {"question": "If you are asked to find the median from a frequency table with grouped data, what is the process? (1 step)", "answer": "First, find the median class — the class interval containing the $$\\frac{n+1}{2}$$th observation (or the position n/2). Then use the formula: $$Median = L + \\frac{(\\frac{n}{2} - c.f.)}{f} \\times w$$, where L is the lower class boundary of the median class, c.f. is the cumulative frequency before the median class, f is the frequency of the median class, and w is the class width. This gives an estimate because we don't know exact values within the class.", "source": "MiniMax ②", "_id": "minimax_2_65", "judge_pick": false}, {"question": "A question gives you $$P(A) = 0.36, P(B) = 0.33$$ from a Venn diagram, and you need to find the value of an unknown region. What approach should you take? (1 step)", "answer": "First, represent what you know on the Venn diagram clearly. Let the unknown region be x. Set up equations using the fact that all region probabilities sum to 1. If A and B are independent, you can also use $$P(A \\cap B) = P(A) \\times P(B)$$ to find the intersection. Then solve the resulting equation(s) for the unknown. Always write out what each region represents in terms of your variables.", "source": "MiniMax ②", "_id": "minimax_2_66", "judge_pick": false}, {"question": "What is the difference between a histogram and a bar chart? (1 step)", "answer": "A histogram displays continuous data with class intervals — there are no gaps between bars because the data is continuous. The area (not height) represents frequency. A bar chart displays categorical or discrete data — bars are separated to show distinct categories, and height represents frequency. In a histogram, you cannot rearrange the bars; in a bar chart, the order of bars is flexible.", "source": "MiniMax ②", "_id": "minimax_2_67", "judge_pick": false}, {"question": "In a regression line $$W = -153.4 + 3.27H$$, if you need to estimate W for H = 150 cm, what calculation do you perform and why should you be cautious? (1 step)", "answer": "You substitute H = 150 into the equation: W = -153.4 + 3.27 × 150 = 337.1 kg. You should be cautious because you need to check whether 150 cm is within the range of heights in your original data. If 150 cm is within the data range, this is interpolation (more reliable). If 150 cm is outside the range, this is extrapolation (less reliable), and the linear relationship may not hold at this extreme.", "source": "MiniMax ②", "_id": "minimax_2_68", "judge_pick": false}, {"question": "When solving probability problems with Venn diagrams, what does it mean if the sum of all regions is not equal to 1? (1 step)", "answer": "This indicates an error in your probability assignments — either you've misread the question, assigned incorrect values, or missed a region. Since all possible outcomes must have total probability 1, if your regions don't sum to 1, something is wrong. Check your diagram carefully and verify that you've accounted for every region (the intersection, the exclusive regions, and the outside region).", "source": "MiniMax ②", "_id": "minimax_2_69", "judge_pick": false}], "count": 70}, "opus_1": {"label": "Opus 4.7 ①", "cards": [{"question": "In an ESAT-style \"proportionality\" problem, you're told two variables are related by an equation, and each variable is scaled by a known factor. What's the general strategy to find the resulting scaling of another variable without plugging in numbers? (4 steps)", "answer": "- Step 1: Write each variable as $$x_{\\text{new}} = k_x \\cdot x_{\\text{old}}$$ where $$k_x$$ is the scaling factor (e.g. $$3/2$$ means a 50% increase).\n- Step 2: Substitute into the governing equation, replacing every variable by (factor × old).\n- Step 3: Factor out the \"old\" version of the equation on the RHS — the leftover product of scaling factors is the net coefficient.\n+ If a term is squared, its scaling factor gets squared too.\n+ If a term is in a denominator, its scaling factor goes to the reciprocal.\n- Step 4: Compare new coefficient to 1: greater than 1 → increase; less than 1 → decrease. The percentage change is $$|k_{\\text{net}} - 1| \\times 100\\%$$.\n\nThe key insight: scaling factors propagate multiplicatively through the equation, so you never need actual numerical values.", "source": "Opus 4.7 ①", "_id": "opus_1_0", "judge_pick": true}, {"question": "Why is it usually more efficient in non-calculator ESAT arithmetic to convert decimals like $$0.8$$ into the fraction $$4/5$$ before manipulating?", "answer": "- Step 1: Fractions expose common factors that decimals hide. For example, $$0.8 = 4/5$$ reveals a factor of 4 that may cancel with another 4 elsewhere.\n- Step 2: Mixing fractions and decimals forces extra conversion steps, increasing the risk of arithmetic error under time pressure.\n- Step 3: Multiplying/dividing fractions is purely about multiplying numerators and denominators — no decimal alignment needed — and cancellation can happen *before* you multiply, keeping numbers small.\n\nRule of thumb: as soon as you spot a \"clean\" decimal, convert it to a fraction; you'll almost always save work.", "source": "Opus 4.7 ①", "_id": "opus_1_1", "judge_pick": true}, {"question": "When dividing the fraction $$\\frac{9}{5}$$ by 2, a common error is to write $$\\frac{9}{5 \\cdot 2} = \\frac{9}{10}$$ but then accidentally treat the 2 as multiplying the numerator. Why does the 2 land in the denominator? (3 steps)", "answer": "- Step 1: Think of 2 as $$\\tfrac{2}{1}$$. Then $$\\tfrac{9}{5} \\div \\tfrac{2}{1} = \\tfrac{9}{5} \\times \\tfrac{1}{2}$$ (flip and multiply, the \"burger\" method).\n- Step 2: Multiplying numerators gives $$9 \\times 1 = 9$$. Multiplying denominators gives $$5 \\times 2 = 10$$.\n- Step 3: So the 2 lands in the denominator because, after flipping, it sits below the 1. Net result: $$\\tfrac{9}{10}$$.\n\nTakeaway: when dividing by a whole number, that number always ends up multiplying the denominator of the result.", "source": "Opus 4.7 ①", "_id": "opus_1_2", "judge_pick": false}, {"question": "What does it mean to \"interpret\" the gradient of a regression line $$w = a + b\\,h$$ in context, and what kind of answer earns full marks? (3 steps)", "answer": "- Step 1: \"Interpret\" means: translate the math into a sentence a non-mathematician would understand, using the actual variables and units from the question.\n- Step 2: The gradient $$b$$ is the predicted change in the response variable $$w$$ per one-unit increase in the explanatory variable $$h$$.\n- Step 3: A full-mark answer has three ingredients:\n+ The phrase \"on average\" or \"for each\" (acknowledging it's a model, not exact).\n+ The numerical value of the gradient *with units*.\n+ The two variables named in context (e.g. \"weight increases by 3.27 kg for each 1 cm increase in height\").\n\nSaying only \"as height increases, weight increases\" is too vague — examiners want the *rate*.", "source": "Opus 4.7 ①", "_id": "opus_1_3", "judge_pick": true}, {"question": "What's the conceptual difference between interpolation and extrapolation when using a regression line, and why is one more reliable than the other?", "answer": "- Step 1: Interpolation = predicting a $$y$$-value for an $$x$$-value that lies *within* the range of the original data used to fit the line.\n- Step 2: Extrapolation = predicting for an $$x$$-value *outside* that range.\n- Step 3: Interpolation is reliable because we have evidence the linear relationship holds in that region — the data supports it.\n- Step 4: Extrapolation is risky because:\n+ The linear trend may break down outside the observed range (curves, plateaus, ceilings).\n+ We have no data to verify the model still applies.\n+ Small errors in the gradient get amplified the further out you go.\n\nSo when a question asks \"which estimate is more reliable?\", the magic words are interpolation (reliable) vs extrapolation (unreliable).", "source": "Opus 4.7 ①", "_id": "opus_1_4", "judge_pick": false}, {"question": "When a question says \"show that there is only one outlier\", what must your final conclusion explicitly state, and why is \"there is a single data point beyond the boundary\" not enough?", "answer": "- Step 1: The mark scheme requires the *exact* word \"outlier\" and the explicit claim of uniqueness — e.g. \"139 is the only outlier.\"\n- Step 2: Examiners look for keywords; paraphrases like \"single data point\" risk ambiguity (the marker might wonder whether you tested all points or stopped early).\n- Step 3: The question is essentially a \"prove\" question — you must (a) compute the outlier boundaries, (b) check every data point, (c) state explicitly that only one falls outside.\n\nLesson: mirror the question's language in your conclusion. If they say \"outlier\", you say \"outlier\".", "source": "Opus 4.7 ①", "_id": "opus_1_5", "judge_pick": true}, {"question": "For a box plot, how do you tell whether the data is positively skewed, negatively skewed, or symmetric, using only the quartiles? (3 steps)", "answer": "- Step 1: Compute the two gaps around the median: $$Q_2 - Q_1$$ (lower half spread) and $$Q_3 - Q_2$$ (upper half spread).\n- Step 2: Compare:\n+ $$Q_3 - Q_2 > Q_2 - Q_1$$ → positive skew (long upper tail; data more spread above the median).\n+ $$Q_3 - Q_2 < Q_2 - Q_1$$ → negative skew (long lower tail).\n+ Equal → symmetric.\n- Step 3: Each quartile gap contains 25% of the data, so a larger gap on one side means that 25% is *more spread out* on that side — the visual \"tail\".\n\nTrap: students sometimes compare $$Q_3$$ vs $$Q_1$$ directly. That's wrong — you must compare the *gaps* relative to the median.", "source": "Opus 4.7 ①", "_id": "opus_1_6", "judge_pick": true}, {"question": "When asked to \"describe and interpret\" the skewness of a distribution of weights in a club, what does \"interpret\" demand on top of just naming the skew?", "answer": "- Step 1: \"Describe\" = state the type of skew (e.g. \"positively skewed\") and the supporting inequality ($$Q_3 - Q_2 > Q_2 - Q_1$$).\n- Step 2: \"Interpret\" = put it into the context of the question: what does the skew tell us about the *actual variable*?\n- Step 3: For positive skew in club weights, the interpretation would be: \"the weights above the median are more spread out (more varied) than those below\" — that is, the heavier half of the club has a wider range than the lighter half.\n\nThe interpret step always re-uses the question's variable and tells a \"real world\" story about it.", "source": "Opus 4.7 ①", "_id": "opus_1_7", "judge_pick": false}, {"question": "What is a discrete uniform distribution, and what's the intuition for its expected value? (3 steps)", "answer": "- Step 1: A discrete uniform distribution over values $$\\{1, 2, \\dots, n\\}$$ assigns equal probability $$1/n$$ to each outcome — like a fair die.\n- Step 2: Because each value is equally likely, the expected value is simply the arithmetic mean of the values: $$E(X) = \\frac{1 + 2 + \\dots + n}{n} = \\frac{n+1}{2}$$.\n- Step 3: Intuitively, with no value preferred, the \"balance point\" of the distribution sits exactly at the middle of the range. This is why a fair 6-sided die has $$E(X) = 3.5$$.\n\nThe variance has a similar clean formula: $$\\text{Var}(X) = \\frac{n^2 - 1}{12}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_8", "judge_pick": true}, {"question": "When asked to \"specify the cumulative distribution function\" of a discrete random variable, what form does the answer typically need to take, and why is just listing values not ideal?", "answer": "- Step 1: The CDF is a *function* $$F(x) = P(X \\le x)$$. For a discrete RV, it's a step function — constant between jump points.\n- Step 2: The expected presentation is a table with two rows: the values of $$x$$ on top and $$F(x)$$ underneath. This makes the step structure visually explicit.\n- Step 3: Just listing numbers in prose works for content but loses marks on presentation: the examiner wants to see you understand $$F$$ as a *function*, not as a sequence of separate calculations.\n\nTrap: also remember $$F$$ accumulates, so values are non-decreasing and end at 1.", "source": "Opus 4.7 ①", "_id": "opus_1_9", "judge_pick": false}, {"question": "For a discrete random variable $$X$$, how do you compute $$E(X^2)$$ from a probability table, and what's the conceptual difference between this and $$[E(X)]^2$$? (3 steps)", "answer": "- Step 1: $$E(X^2) = \\sum x^2 \\cdot P(X = x)$$. You square each value, multiply by its probability, and sum. *No division* by the number of outcomes — the probabilities already encode the weighting.\n- Step 2: $$[E(X)]^2$$ is what you get by first averaging $$X$$ and then squaring. These are different quantities.\n- Step 3: The difference $$E(X^2) - [E(X)]^2$$ is *exactly* the variance — it measures how much $$X$$ deviates from its mean. By Jensen's inequality (because squaring is convex), $$E(X^2) \\ge [E(X)]^2$$, with equality only if $$X$$ is constant.\n\nCommon error: dividing $$\\sum x^2 P(x)$$ by $$n$$. There's no $$n$$ — the probabilities are doing that job.", "source": "Opus 4.7 ①", "_id": "opus_1_10", "judge_pick": true}, {"question": "State and explain the formula $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$. Why is this often easier to compute than the direct definition $$\\text{Var}(X) = E[(X - \\mu)^2]$$?", "answer": "- Step 1: The definition is $$\\text{Var}(X) = E[(X - \\mu)^2] = \\sum (x - \\mu)^2 P(x)$$, where $$\\mu = E(X)$$.\n- Step 2: Expanding: $$E[(X - \\mu)^2] = E[X^2 - 2\\mu X + \\mu^2] = E(X^2) - 2\\mu E(X) + \\mu^2 = E(X^2) - \\mu^2$$.\n- Step 3: The computational advantage:\n+ With the direct formula, you must subtract $$\\mu$$ from every $$x$$, square, then sum — lots of arithmetic.\n+ With $$E(X^2) - [E(X)]^2$$, you just compute $$\\sum x^2 P(x)$$ once and subtract $$\\mu^2$$.\n- Step 4: This formula is in the formula book *for a reason* — it's the standard tool for variance questions, and forgetting it costs easy marks.", "source": "Opus 4.7 ①", "_id": "opus_1_11", "judge_pick": true}, {"question": "If $$\\text{Var}(X) = 1.36$$, what is $$\\text{Var}(5 - 3X)$$ and why does the constant 5 disappear? (3 steps)", "answer": "- Step 1: General rule: $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$. The $$b$$ disappears, and the $$a$$ gets squared.\n- Step 2: Why $$b$$ disappears: adding a constant shifts every value of $$X$$ by the same amount, which shifts the mean equally — the *spread* around the mean is unchanged.\n- Step 3: Why $$a$$ is squared: scaling $$X$$ by $$a$$ scales every deviation $$x - \\mu$$ by $$a$$, but variance involves *squared* deviations, so it scales by $$a^2$$. Note: $$|a|$$ for SD, $$a^2$$ for variance.\n- Step 4: Apply: $$\\text{Var}(5 - 3X) = (-3)^2 \\cdot 1.36 = 9 \\times 1.36 = 12.24$$.\n\nKey intuition: variance ignores location, amplifies scale quadratically.", "source": "Opus 4.7 ①", "_id": "opus_1_12", "judge_pick": false}, {"question": "What is the formal definition of two events $$A$$ and $$B$$ being independent, and what's the intuition for the multiplication rule it gives?", "answer": "- Step 1: $$A$$ and $$B$$ are independent iff $$P(A \\cap B) = P(A) \\cdot P(B)$$.\n- Step 2: Equivalently, $$P(A \\mid B) = P(A)$$ — knowing $$B$$ happened doesn't change your belief about $$A$$.\n- Step 3: Intuition: independence means the two events provide no information about each other. So the probability they both happen is just the product of how likely each is on its own — there's no overlap correction, no conditional adjustment.\n\nTrap: independence is *not* the same as mutually exclusive. In fact, if $$P(A), P(B) > 0$$ and they're mutually exclusive, they *cannot* be independent (since $$P(A \\cap B) = 0 \\ne P(A)P(B)$$).", "source": "Opus 4.7 ①", "_id": "opus_1_13", "judge_pick": false}, {"question": "On a Venn diagram with events $$A$$, $$B$$, $$C$$ where independence of $$A$$ and $$B$$ is given, how do you typically use the independence condition to set up an equation? (3 steps)", "answer": "- Step 1: Read off $$P(A)$$ from the Venn diagram by summing all regions inside the $$A$$ circle (call this expression $$E_A$$).\n- Step 2: Similarly read off $$P(B) = E_B$$ and $$P(A \\cap B) = E_{A \\cap B}$$ (the overlap region of $$A$$ and $$B$$, possibly including the triple intersection with $$C$$).\n- Step 3: Apply independence: $$E_{A \\cap B} = E_A \\cdot E_B$$. This is an equation in the unknown(s). Solve algebraically — and where possible, *divide* both sides by a known factor rather than expanding, because it saves arithmetic.\n\nLesson: independence converts a \"find the unknown\" Venn question into a single algebraic equation.", "source": "Opus 4.7 ①", "_id": "opus_1_14", "judge_pick": true}, {"question": "What is the formula for conditional probability $$P(A \\mid B)$$, and how do you compute it from a Venn diagram with shading? (3 steps)", "answer": "- Step 1: Formula: $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)}$$.\n- Step 2: Geometrically on a Venn diagram:\n+ Numerator = the region(s) inside *both* $$A$$ and $$B$$.\n+ Denominator = the region(s) inside $$B$$ (the \"given\" event becomes the new sample space).\n- Step 3: Intuition: \"given $$B$$\" means restrict your universe to just $$B$$. Then $$P(A \\mid B)$$ is the fraction of $$B$$ that also lies in $$A$$. The denominator $$P(B)$$ renormalizes so probabilities again sum to 1 inside that restricted universe.\n\nTip: use a highlighter — shade the numerator region one colour, the denominator another, then read off the values.", "source": "Opus 4.7 ①", "_id": "opus_1_15", "judge_pick": false}, {"question": "When computing $$P(B \\mid C')$$ from a Venn diagram, what regions do you highlight in the numerator and denominator?", "answer": "- Step 1: $$P(B \\mid C') = \\dfrac{P(B \\cap C')}{P(C')}$$.\n- Step 2: Numerator $$B \\cap C'$$ = parts of $$B$$ that are *outside* $$C$$ — this is $$B$$ with the $$B \\cap C$$ region removed.\n- Step 3: Denominator $$P(C')$$ = everything outside $$C$$, which is $$1 - P(C)$$, or equivalently the sum of all regions not inside the $$C$$ circle (including the \"outside-all-circles\" region).\n- Step 4: Trap: don't accidentally include the $$B \\cap C$$ region in the numerator — that part *is* in $$C$$, so it's excluded by the $$C'$$ condition.\n\nHighlighting both regions visually before computing prevents almost all errors.", "source": "Opus 4.7 ①", "_id": "opus_1_16", "judge_pick": false}, {"question": "Why is it strategically valuable to draw a tree diagram for a multi-step probability question, even when the question doesn't ask for one? (4 steps)", "answer": "- Step 1: Tree diagrams visualize the conditional structure — each branch from a node represents a conditional probability *given* you've arrived at that node.\n- Step 2: They make the multiplication rule along a path automatic: $$P(\\text{path}) = $$ product of probabilities along the branches.\n- Step 3: They expose all the ways an event can occur (sum across paths), which is the law of total probability in action.\n- Step 4: They reveal completeness constraints: each set of branches from a node must sum to 1, giving you a free check on your numbers.\n\nWithout the picture, students often miss a path or double-count. The tree is a small time investment that prevents catastrophic errors.", "source": "Opus 4.7 ①", "_id": "opus_1_17", "judge_pick": true}, {"question": "On a tree diagram, why must the probabilities on the branches leaving any single node sum to exactly 1?", "answer": "- Step 1: A node on a tree diagram represents a state you're currently in (e.g. \"you took the car\").\n- Step 2: The branches from that node enumerate every possible *next outcome* (e.g. \"late\" or \"not late\"). By construction, these outcomes are mutually exclusive and exhaustive.\n- Step 3: Probabilities of mutually exclusive, exhaustive outcomes must sum to 1 — because it is certain that *one* of them will happen given you're at that node.\n\nSo if the \"late\" branch from \"car\" is $$1/5$$, the \"not late\" branch must be $$4/5$$ — no calculation needed, just complementarity.", "source": "Opus 4.7 ①", "_id": "opus_1_18", "judge_pick": false}, {"question": "State the law of total probability for an event $$L$$ partitioned by three modes of travel $$C, B, W$$ (car, bicycle, walk), and explain why it works. (3 steps)", "answer": "- Step 1: Formula: $$P(L) = P(L \\mid C)P(C) + P(L \\mid B)P(B) + P(L \\mid W)P(W)$$.\n- Step 2: Why: the events $$C, B, W$$ partition the sample space (he takes exactly one of these). Every \"late\" outcome must occur via exactly one of these three routes.\n- Step 3: So you sum the probability of each route ($$P(\\text{mode}) \\times P(\\text{late given mode})$$). On a tree diagram, this is just summing the products along all paths that end in \"late\".\n\nKey insight: the conditional probability $$P(L \\mid C)$$ is the branch *after* car, and $$P(C)$$ is the branch *to* car — multiplying gives the full path.", "source": "Opus 4.7 ①", "_id": "opus_1_19", "judge_pick": false}, {"question": "Why does multiplying $$P(C) \\times P(L \\mid C)$$ along a tree diagram give $$P(C \\cap L)$$, and *not* $$P(C) \\times P(L)$$? (3 steps)", "answer": "- Step 1: By definition of conditional probability, $$P(L \\mid C) = \\dfrac{P(C \\cap L)}{P(C)}$$. Rearranging: $$P(C \\cap L) = P(C) \\cdot P(L \\mid C)$$. This is the multiplication rule — always true.\n- Step 2: $$P(C) \\times P(L)$$ would only equal $$P(C \\cap L)$$ if $$C$$ and $$L$$ were independent — but in most tree-diagram problems they're not (the whole point is that being late depends on the mode of transport).\n- Step 3: On the tree, each branch beyond the first level is already a *conditional* probability (given you reached that node), so the multiplication along a path is automatically the joint probability.\n\nTrap: never write $$P(C) \\times P(L)$$ for the path probability — always $$P(C) \\times P(L \\mid C)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_20", "judge_pick": true}, {"question": "Suppose you've drawn a tree diagram with mode of transport first, then late/not-late. To answer \"given he's late, what's the probability he took the bicycle?\", what's the strategy? (4 steps)", "answer": "- Step 1: Recognize this as conditional probability \"backwards\" relative to the tree: you want $$P(B \\mid L)$$ but the tree gives $$P(L \\mid B)$$.\n- Step 2: Apply the formula: $$P(B \\mid L) = \\dfrac{P(B \\cap L)}{P(L)}$$.\n- Step 3: Compute $$P(B \\cap L)$$ from the tree (multiply along the bicycle-then-late path).\n- Step 4: Compute $$P(L)$$ using the law of total probability (sum across all three paths that end in \"late\"). Divide.\n\nThis is essentially Bayes' theorem in disguise — you're flipping the conditioning direction using the joint probability as a bridge.", "source": "Opus 4.7 ①", "_id": "opus_1_21", "judge_pick": true}, {"question": "Why is it good exam practice to write out the conditional probability formula explicitly (e.g. $$P(B \\mid L) = P(B \\cap L) / P(L)$$) before plugging in numbers, even if you \"know\" the answer?", "answer": "- Step 1: Exam mark schemes usually award a *method mark* (M mark) for stating the correct formula, separate from the accuracy mark for the final number.\n- Step 2: If you make an arithmetic slip but the formula is right, you still get the method mark — partial credit insurance.\n- Step 3: Writing the formula forces you to identify what's the numerator (joint event) and what's the denominator (given event) — preventing the common error of dividing the wrong way.\n- Step 4: It also makes your work checkable: an examiner can see your logic instantly.\n\nHabit: every conditional probability question gets the formula written first, every time.", "source": "Opus 4.7 ①", "_id": "opus_1_22", "judge_pick": true}, {"question": "On a Venn diagram with three events $$A, B, C$$, what is the difference between the shaded region for $$A \\cap (B \\cup C)$$ versus $$A \\cup (B \\cap C)$$? (3 steps)", "answer": "- Step 1: Intersection ($$\\cap$$) means \"in both\" — only the *overlap* counts. Union ($$\\cup$$) means \"in at least one\" — the *combined* region.\n- Step 2: $$A \\cap (B \\cup C)$$: first form $$B \\cup C$$ (everything in $$B$$ or $$C$$), then intersect with $$A$$. Result: the parts of $$A$$ that overlap with $$B$$ or $$C$$ (or both).\n- Step 3: $$A \\cup (B \\cap C)$$: first form $$B \\cap C$$ (only the overlap of $$B$$ and $$C$$), then union with $$A$$. Result: all of $$A$$, plus the $$B \\cap C$$ overlap (even outside $$A$$).\n\nThese regions can look very different on a Venn diagram — always use a highlighter and respect operator precedence (compute the inner bracket first).", "source": "Opus 4.7 ①", "_id": "opus_1_23", "judge_pick": true}, {"question": "Underline-the-keywords is a tutoring tip Harry emphasized. What kinds of words in a probability/statistics question are critical to flag, and why?", "answer": "- Step 1: \"Independent\" → triggers the multiplication rule $$P(A \\cap B) = P(A)P(B)$$.\n- Step 2: \"Given that\" → conditional probability; set up the $$P(A \\mid B)$$ formula.\n- Step 3: \"Interpret\" / \"in context\" → demands a sentence using the actual variables and units, not just math.\n- Step 4: \"Show that\" → must show working that arrives at the stated answer; just writing the answer scores 0.\n- Step 5: \"Hence\" → forces you to use a previous part's result; doing the question afresh may lose method marks.\n- Step 6: \"Only one outlier\" / \"more reliable\" / \"describe and interpret\" → these phrasings often have specific keywords the mark scheme requires you to echo in your answer.\n\nWithout underlining, the brain skims and misses these signals, leading to lost marks for content you actually understood.", "source": "Opus 4.7 ①", "_id": "opus_1_24", "judge_pick": true}, {"question": "Conceptually, what is a \"residual\" in linear regression, and why does the least-squares regression line minimize the sum of *squared* residuals rather than just the sum?", "answer": "- Step 1: A residual is the vertical distance from a data point to the regression line: $$e_i = y_i - \\hat{y}_i$$. It's the error the model makes for that point.\n- Step 2: If we just summed residuals, positives and negatives would cancel — a terrible line could have $$\\sum e_i = 0$$.\n- Step 3: Squaring achieves two things:\n+ Removes the sign (all errors contribute positively).\n+ Penalizes large errors more than small ones (an error of 2 contributes 4, but an error of 4 contributes 16) — encouraging the line to avoid big misses.\n- Step 4: Squaring (rather than absolute value) also makes the optimization smooth (differentiable), giving the clean closed-form formulas for the gradient and intercept.\n\nSo least squares = \"average behaviour with extra penalty for outliers\".", "source": "Opus 4.7 ①", "_id": "opus_1_25", "judge_pick": true}, {"question": "What is the product moment correlation coefficient $$r$$, what range does it lie in, and what do extreme values mean? (4 steps)", "answer": "- Step 1: $$r$$ measures the strength and direction of a *linear* relationship between two variables.\n- Step 2: Range: $$-1 \\le r \\le 1$$.\n- Step 3: Interpretation:\n+ $$r = +1$$: perfect positive linear relationship (all points on a line of positive gradient).\n+ $$r = -1$$: perfect negative linear relationship.\n+ $$r = 0$$: no linear relationship (but data could still be related by a curve!).\n- Step 4: The closer $$|r|$$ is to 1, the more tightly the data clusters around a straight line. Crucially, $$r$$ says nothing about gradient steepness — a near-flat line of perfectly aligned points still has $$|r| = 1$$.\n\nTrap: $$r = 0$$ doesn't mean \"independent\". It means \"no *linear* trend\".", "source": "Opus 4.7 ①", "_id": "opus_1_26", "judge_pick": true}, {"question": "When data is coded as $$u = \\dfrac{x - a}{b}$$, how do the mean, variance, and correlation transform — and why? (4 steps)", "answer": "- Step 1: Mean: $$\\bar{u} = \\dfrac{\\bar{x} - a}{b}$$. Coding is linear, so the mean transforms the same way as the data.\n- Step 2: Variance: $$\\text{Var}(u) = \\dfrac{\\text{Var}(x)}{b^2}$$. The shift $$a$$ disappears (variance ignores location); scaling by $$1/b$$ becomes $$1/b^2$$ in variance.\n- Step 3: Standard deviation: $$\\sigma_u = \\dfrac{\\sigma_x}{|b|}$$ — scales linearly with $$1/b$$.\n- Step 4: Correlation $$r$$: *unchanged*. Coding is linear, and $$r$$ is invariant under linear transformations of either variable. This is why coding is safe — it simplifies arithmetic without changing the relationship.\n\nIntuition: coding is just a change of units. The shape of the relationship (correlation, regression structure) is unchanged; only the numerical scale changes.", "source": "Opus 4.7 ①", "_id": "opus_1_27", "judge_pick": true}, {"question": "What is an outlier under the \"1.5 × IQR\" rule, and why is 1.5 the conventional multiplier?", "answer": "- Step 1: A value $$x$$ is an outlier if $$x < Q_1 - 1.5 \\times \\text{IQR}$$ or $$x > Q_3 + 1.5 \\times \\text{IQR}$$, where $$\\text{IQR} = Q_3 - Q_1$$.\n- Step 2: The IQR captures the middle 50% spread, robust to extreme values. Multiplying by 1.5 extends the \"normal range\" a reasonable distance beyond the quartiles.\n- Step 3: For approximately normal data, the 1.5×IQR fences catch roughly the top and bottom 0.35% — so points beyond them are genuinely unusual. The value 1.5 is conventional (Tukey's choice), balancing sensitivity (catching real outliers) and specificity (not over-flagging).\n- Step 4: Alternative rules exist: $$2 \\times \\text{IQR}$$ (more conservative) or $$\\bar{x} \\pm 2\\sigma$$ (mean-based). The exam will usually specify which rule to use.", "source": "Opus 4.7 ①", "_id": "opus_1_28", "judge_pick": true}, {"question": "What is a histogram (in the formal S1 sense), and why is the *area* of each bar — not the height — the meaningful quantity? (3 steps)", "answer": "- Step 1: A histogram displays continuous data grouped into classes. The vertical axis is *frequency density* = frequency ÷ class width.\n- Step 2: Therefore the area of each bar = frequency density × class width = frequency. Area = frequency.\n- Step 3: This is essential when class widths differ. If two classes have the same frequency but different widths, the wider one would look misleadingly tall on a frequency-vs-class plot — using density makes the *area* equal, giving an honest visual.\n\nTrap: never read frequency directly off the height when widths vary — always compute area.", "source": "Opus 4.7 ①", "_id": "opus_1_29", "judge_pick": true}, {"question": "What is the standard normal distribution, and why do we transform any normal $$X \\sim N(\\mu, \\sigma^2)$$ to it before doing probability calculations? (3 steps)", "answer": "- Step 1: The standard normal $$Z \\sim N(0, 1)$$ has mean 0, variance 1. Its CDF $$\\Phi(z)$$ is tabulated/built into calculators.\n- Step 2: For any $$X \\sim N(\\mu, \\sigma^2)$$, the transformation $$Z = \\dfrac{X - \\mu}{\\sigma}$$ produces a standard normal. Subtracting $$\\mu$$ centres the distribution; dividing by $$\\sigma$$ rescales to unit spread.\n- Step 3: Why bother? Before electronic calculators, only one set of normal tables was needed (for $$Z$$), making any normal problem reducible to a standard one. Even now, conceptually it's cleaner: $$z = 2$$ always means \"2 standard deviations above the mean\", regardless of the original units.\n\nIntuition: standardizing measures how *unusual* a value is, in units of $$\\sigma$$.", "source": "Opus 4.7 ①", "_id": "opus_1_30", "judge_pick": true}, {"question": "For a normal distribution, what are the approximate probabilities of being within 1, 2, and 3 standard deviations of the mean, and why are these useful to remember?", "answer": "- Step 1: $$P(\\mu - \\sigma < X < \\mu + \\sigma) \\approx 68\\%$$.\n- Step 2: $$P(\\mu - 2\\sigma < X < \\mu + 2\\sigma) \\approx 95\\%$$.\n- Step 3: $$P(\\mu - 3\\sigma < X < \\mu + 3\\sigma) \\approx 99.7\\%$$.\n- Step 4: Uses:\n+ Sanity check calculator answers (if you compute $$P(\\mu < X < \\mu + \\sigma)$$ and get 0.5, you know it should be ≈0.34).\n+ Spot outliers visually (beyond $$2\\sigma$$ is unusual; beyond $$3\\sigma$$ is very rare).\n+ Quick mental estimates without a calculator.\n\nMnemonic: 68 – 95 – 99.7, the \"empirical rule\".", "source": "Opus 4.7 ①", "_id": "opus_1_31", "judge_pick": true}, {"question": "When asked to find an unknown parameter ($$\\mu$$ or $$\\sigma$$) of a normal distribution given two probability statements, what's the general procedure? (4 steps)", "answer": "- Step 1: Translate each probability statement into a $$z$$-value using the inverse standard normal: e.g. $$P(X < a) = 0.9$$ → look up $$z = \\Phi^{-1}(0.9) \\approx 1.282$$.\n- Step 2: Write the standardization equation: $$z = \\dfrac{a - \\mu}{\\sigma}$$. This gives one linear equation in $$\\mu, \\sigma$$.\n- Step 3: Repeat with the second probability statement to get a second linear equation.\n- Step 4: Solve the simultaneous linear system for $$\\mu$$ and $$\\sigma$$.\n\nKey trick: be careful with which tail — $$P(X < a) = 0.1$$ corresponds to a *negative* $$z$$. Sketching the bell curve and shading helps you avoid sign errors.", "source": "Opus 4.7 ①", "_id": "opus_1_32", "judge_pick": false}, {"question": "Why might you prefer to *divide* both sides of an equation by a number rather than multiply, when solving algebraically under time pressure?", "answer": "- Step 1: Dividing often produces simpler numbers when there's a common factor. E.g. solving $$0.31 \\times 0.75 = (\\text{stuff}) \\times 0.31$$ — dividing both sides by 0.31 instantly eliminates it and leaves $$0.75 = \\text{stuff}$$.\n- Step 2: Multiplying might require carrying through a messy product and then dividing later anyway — extra arithmetic, more error opportunities.\n- Step 3: Strategically, *look for the operation that cancels the most complicated factor in one move*. That's usually division by the awkward number.\n\nLesson: algebra isn't about following one fixed procedure; it's about choosing the operation that minimizes work.", "source": "Opus 4.7 ①", "_id": "opus_1_33", "judge_pick": true}, {"question": "A box plot shows median 25, $$Q_1 = 20$$, $$Q_3 = 35$$. State the skew, give the direction in words, and explain what it tells you about the data.", "answer": "- Step 1: Compute the gaps: $$Q_2 - Q_1 = 25 - 20 = 5$$. $$Q_3 - Q_2 = 35 - 25 = 10$$.\n- Step 2: Since $$Q_3 - Q_2 > Q_2 - Q_1$$, the data is *positively skewed*.\n- Step 3: Interpretation: the upper half of the data is more spread out than the lower half. There's a longer tail toward higher values — most data cluster lower, but some values reach much further above the median than below.\n\nThis kind of skew is common for data like incomes, exam-time-taken, or reaction times — where there's a natural lower bound but no upper one.", "source": "Opus 4.7 ①", "_id": "opus_1_34", "judge_pick": false}, {"question": "For a discrete uniform distribution on $$\\{1, 2, 3, 4, 5\\}$$, compute $$E(X)$$, $$E(X^2)$$, and $$\\text{Var}(X)$$ using mental math.", "answer": "- Step 1: $$E(X) = \\dfrac{1+2+3+4+5}{5} = \\dfrac{15}{5} = 3$$. (Middle value of a symmetric distribution.)\n- Step 2: $$E(X^2) = \\dfrac{1+4+9+16+25}{5} = \\dfrac{55}{5} = 11$$.\n- Step 3: $$\\text{Var}(X) = E(X^2) - [E(X)]^2 = 11 - 9 = 2$$.\n\nCheck with formula: $$\\text{Var} = \\dfrac{n^2 - 1}{12} = \\dfrac{25-1}{12} = 2$$. ✓", "source": "Opus 4.7 ①", "_id": "opus_1_35", "judge_pick": false}, {"question": "Events $$A$$ and $$B$$ have $$P(A) = 0.4$$, $$P(B) = 0.5$$, and are independent. Compute $$P(A \\cap B)$$, $$P(A \\cup B)$$, and $$P(A \\mid B)$$ — and explain each.", "answer": "- Step 1: $$P(A \\cap B) = P(A) \\cdot P(B) = 0.4 \\times 0.5 = 0.2$$ (independence multiplication).\n- Step 2: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B) = 0.4 + 0.5 - 0.2 = 0.7$$ (inclusion-exclusion).\n- Step 3: $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)} = \\dfrac{0.2}{0.5} = 0.4 = P(A)$$. This confirms independence: knowing $$B$$ happened doesn't change the probability of $$A$$.\n\nThe check $$P(A \\mid B) = P(A)$$ is the most intuitive definition of independence.", "source": "Opus 4.7 ①", "_id": "opus_1_36", "judge_pick": true}, {"question": "On a tree diagram with three first-level branches (probabilities $$\\tfrac{1}{2}, \\tfrac{1}{6}, \\tfrac{1}{3}$$) and a second-level conditional probability of being \"late\" on each branch ($$\\tfrac{1}{5}, \\tfrac{1}{10}, \\tfrac{1}{20}$$), find $$P(\\text{late})$$ using the law of total probability — sketch the mental calculation.", "answer": "- Step 1: Three paths to \"late\": $$\\tfrac{1}{2} \\cdot \\tfrac{1}{5} = \\tfrac{1}{10}$$ (via car), $$\\tfrac{1}{6} \\cdot \\tfrac{1}{10} = \\tfrac{1}{60}$$ (via bike), $$\\tfrac{1}{3} \\cdot \\tfrac{1}{20} = \\tfrac{1}{60}$$ (via walk).\n- Step 2: Find common denominator 60: $$\\tfrac{6}{60} + \\tfrac{1}{60} + \\tfrac{1}{60} = \\tfrac{8}{60} = \\tfrac{2}{15}$$.\n- Step 3: So $$P(\\text{late}) = \\tfrac{2}{15}$$.\n\nThe clean answer (small numerator, small denominator) often signals you've done it right — examiners typically engineer problems so the final fraction is tidy.", "source": "Opus 4.7 ①", "_id": "opus_1_37", "judge_pick": true}, {"question": "Continuing the previous: given he's late, what's $$P(\\text{bicycle} \\mid \\text{late})$$, and what does this Bayes-style flip tell you conceptually?", "answer": "- Step 1: $$P(B \\mid L) = \\dfrac{P(B \\cap L)}{P(L)} = \\dfrac{1/60}{2/15}$$.\n- Step 2: Compute: $$\\dfrac{1/60}{2/15} = \\dfrac{1}{60} \\times \\dfrac{15}{2} = \\dfrac{15}{120} = \\dfrac{1}{8}$$.\n- Step 3: Interpretation: even though the bicycle path is *less* likely a priori ($$1/6$$), and bicycle days have a higher chance of being late, conditioning on \"late\" gives a 1-in-8 chance it was the bicycle. The car dominates because it's the most common mode *and* contributes the largest absolute share of late events.\n\nThis is Bayes' theorem at work — flipping the direction of conditioning by using the joint as a bridge.", "source": "Opus 4.7 ①", "_id": "opus_1_38", "judge_pick": true}, {"question": "A common pitfall: when computing $$P(A \\cap B)$$ from a tree diagram, why is it NOT correct to write $$P(A) \\cdot P(B)$$ in general?", "answer": "- Step 1: The multiplication rule on a tree gives $$P(A \\cap B) = P(A) \\cdot P(B \\mid A)$$, not $$P(A) \\cdot P(B)$$.\n- Step 2: The two coincide *only* if $$A$$ and $$B$$ are independent. In most tree problems, the second-level branch probabilities are *conditional* on the first — that's the whole point of using a tree.\n- Step 3: If you write $$P(A) \\cdot P(B)$$, you're implicitly assuming independence — which the question typically doesn't justify. This loses both method and accuracy marks.\n\nHabit: always write conditional probabilities with the bar notation $$P(B \\mid A)$$ to remind yourself of the dependence.", "source": "Opus 4.7 ①", "_id": "opus_1_39", "judge_pick": false}, {"question": "What does it mean to \"show that\" the answer is a specific value (e.g. $$\\tfrac{2}{15}$$) in a probability question, and why is just writing the final number a 0-mark answer?", "answer": "- Step 1: \"Show that\" means: demonstrate the logical steps that lead to the given answer. The answer is given so you can check your work, not so you can copy it.\n- Step 2: Marks are awarded for the *process*: identifying the events, applying the right formula (e.g. law of total probability), executing the arithmetic.\n- Step 3: Writing only the answer earns 0 because there's no evidence of method. Even if the final number is right, the examiner has no way to verify you didn't reverse-engineer it.\n\nStrategy: be slightly *over-explicit* in \"show that\" questions. Write the formula, substitute numbers, show the intermediate sum, state the conclusion.", "source": "Opus 4.7 ①", "_id": "opus_1_40", "judge_pick": false}, {"question": "Why is the formula $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$ worth memorizing for S1 exams, and what's the analogous formula for $$E(aX + b)$$?", "answer": "- Step 1: For expected value (linearity): $$E(aX + b) = aE(X) + b$$. Both shift and scale propagate directly because expectation is linear.\n- Step 2: For variance: $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$. The shift $$b$$ disappears (variance is location-invariant); the scale $$a$$ gets squared (variance is in *squared* units).\n- Step 3: Why memorize: S1 papers almost always include a part where you're asked for $$\\text{Var}(aX + b)$$ after computing $$\\text{Var}(X)$$. It's \"free marks\" if you know the formula, and easy to lose if you forget the squaring.\n- Step 4: Trap: $$\\text{SD}(aX + b) = |a| \\cdot \\text{SD}(X)$$ — note the absolute value (since SD is non-negative).", "source": "Opus 4.7 ①", "_id": "opus_1_41", "judge_pick": true}, {"question": "Why do we use $$\\tfrac{n+1}{2}$$ for the expected value of a discrete uniform on $$\\{1, 2, \\dots, n\\}$$, and what happens if the distribution is on $$\\{a, a+1, \\dots, b\\}$$ instead?", "answer": "- Step 1: For $$\\{1, \\dots, n\\}$$, by symmetry the mean is the midpoint, which is $$\\tfrac{1+n}{2} = \\tfrac{n+1}{2}$$.\n- Step 2: For $$\\{a, a+1, \\dots, b\\}$$, again by symmetry the mean is the midpoint: $$\\tfrac{a+b}{2}$$.\n- Step 3: Intuition: every value is equally likely, so the \"centre of mass\" of the distribution sits at the arithmetic centre of the range.\n- Step 4: For variance, on $$\\{1, \\dots, n\\}$$ it's $$\\dfrac{n^2 - 1}{12}$$; on $$\\{a, \\dots, b\\}$$ (with $$n = b - a + 1$$ values), it's $$\\dfrac{n^2 - 1}{12}$$ — same formula, because variance depends only on spread, not location.\n\nMemorize both — they're high-yield S1 formulas.", "source": "Opus 4.7 ①", "_id": "opus_1_42", "judge_pick": true}, {"question": "What is the conceptual difference between $$P(A \\cup B)$$ being computed as $$P(A) + P(B)$$ vs $$P(A) + P(B) - P(A \\cap B)$$, and when is each correct?", "answer": "- Step 1: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$ is the general inclusion-exclusion formula. The subtraction corrects for the overlap being counted twice when you add $$P(A) + P(B)$$.\n- Step 2: $$P(A \\cup B) = P(A) + P(B)$$ is correct *only* if $$A$$ and $$B$$ are mutually exclusive, i.e. $$P(A \\cap B) = 0$$. Then there's no overlap to correct for.\n- Step 3: Trap: mutually exclusive ≠ independent. In fact, with positive probabilities, mutually exclusive events are *maximally dependent* — if one happens, you know the other didn't.\n\nDefault to inclusion-exclusion; only drop the subtraction term when the question explicitly tells you the events can't both happen.", "source": "Opus 4.7 ①", "_id": "opus_1_43", "judge_pick": true}, {"question": "If $$X \\sim N(50, 100)$$ (so $$\\sigma = 10$$), without a calculator, roughly estimate $$P(X > 70)$$ and $$P(X < 30)$$.", "answer": "- Step 1: Standardize: 70 is $$(70-50)/10 = 2$$ standard deviations above the mean. 30 is 2 SDs below.\n- Step 2: By the empirical rule, $$P(\\mu - 2\\sigma < X < \\mu + 2\\sigma) \\approx 95\\%$$, so the two tails together contain ≈5%.\n- Step 3: By symmetry, each tail has ≈2.5%. So $$P(X > 70) \\approx 0.025$$ and $$P(X < 30) \\approx 0.025$$.\n\nThis kind of mental estimate is invaluable for sanity-checking calculator answers — if your calculator says 0.5, you know something went wrong.", "source": "Opus 4.7 ①", "_id": "opus_1_44", "judge_pick": false}, {"question": "What's the difference between $$E(X^2)$$ and $$\\text{Var}(X)$$ conceptually, and which is always ≥ the other?", "answer": "- Step 1: $$E(X^2)$$ is the average of squared values — it measures the \"size\" of $$X$$ (mixing spread and location).\n- Step 2: $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$ is the average squared *deviation from the mean* — pure spread, location-free.\n- Step 3: Since $$[E(X)]^2 \\ge 0$$, we always have $$\\text{Var}(X) \\le E(X^2)$$. Equality holds only when $$E(X) = 0$$ (the data is centered at zero).\n- Step 4: Intuition: $$E(X^2)$$ measures squared distance from 0; $$\\text{Var}(X)$$ measures squared distance from $$\\mu$$. The latter is smaller because $$\\mu$$ is the optimal \"centre\" — no other point gives a smaller mean squared distance.", "source": "Opus 4.7 ①", "_id": "opus_1_45", "judge_pick": true}, {"question": "A box plot of horse weights shows median 290, $$Q_1 = 250$$, $$Q_3 = 340$$, min = 200, max = 380. Test whether 200 is an outlier using the 1.5 × IQR rule.", "answer": "- Step 1: Compute IQR: $$Q_3 - Q_1 = 340 - 250 = 90$$.\n- Step 2: Lower fence: $$Q_1 - 1.5 \\times \\text{IQR} = 250 - 135 = 115$$.\n- Step 3: Upper fence: $$Q_3 + 1.5 \\times \\text{IQR} = 340 + 135 = 475$$.\n- Step 4: Since $$200 > 115$$, the value 200 is *not* an outlier — it sits inside the fences. (And $$380 < 475$$, so the max isn't either.)\n\nLesson: outlier-ness is relative to the IQR of the *specific* dataset; a value of 200 could be an outlier in one context and ordinary in another.", "source": "Opus 4.7 ①", "_id": "opus_1_46", "judge_pick": false}, {"question": "Why does coding data using $$u = (x - a)/b$$ leave the product-moment correlation coefficient $$r$$ unchanged?", "answer": "- Step 1: $$r$$ is dimensionless and built from standardized deviations: $$r = \\dfrac{\\sum (x_i - \\bar{x})(y_i - \\bar{y})}{\\sqrt{\\sum (x_i - \\bar{x})^2 \\sum (y_i - \\bar{y})^2}}$$.\n- Step 2: Under $$u = (x - a)/b$$: deviations become $$u_i - \\bar{u} = (x_i - \\bar{x})/b$$. The factor $$1/b$$ appears in numerator and denominator the same number of times.\n- Step 3: Specifically, numerator gets a factor $$1/b$$ (from $$u$$), denominator gets $$\\sqrt{(1/b)^2} = 1/b$$. They cancel — $$r$$ unchanged.\n- Step 4: The shift $$a$$ is absorbed into the deviation differences and disappears entirely.\n\nThis is why coding is safe for correlation: it simplifies arithmetic without distorting the relationship.", "source": "Opus 4.7 ①", "_id": "opus_1_47", "judge_pick": true}, {"question": "What is the conceptual purpose of a scatter diagram before doing any regression analysis? (3 steps)", "answer": "- Step 1: A scatter diagram visualizes the joint distribution of two variables — each point is one observation $$(x_i, y_i)$$.\n- Step 2: It answers diagnostic questions *before* fitting a line:\n+ Is the relationship roughly linear? (If not, don't use linear regression.)\n+ Is it positive or negative correlation?\n+ Are there outliers that might dominate the fit?\n+ Is the spread constant across $$x$$ (homoscedasticity)?\n- Step 3: Without this visual check, you might fit a line to data with a clear curve, or be misled by a single outlier — the regression formulas will run regardless, but the result will be meaningless.\n\nAlways plot first. Math second.", "source": "Opus 4.7 ①", "_id": "opus_1_48", "judge_pick": true}, {"question": "In an exam, you're told $$P(X = x) = kx$$ for $$x \\in \\{1, 2, 3, 4\\}$$ is a valid probability distribution. Find $$k$$ and explain what constraint forces it. (3 steps)", "answer": "- Step 1: For a valid probability distribution, all probabilities must sum to 1: $$\\sum_x P(X = x) = 1$$.\n- Step 2: Substitute: $$k(1) + k(2) + k(3) + k(4) = k \\cdot 10 = 1$$.\n- Step 3: Solve: $$k = 1/10$$.\n\nThe \"sums to 1\" axiom is the universal constraint that pins down any unknown constant in a probability distribution — whether discrete or continuous. It encodes the certainty that *something* happens.", "source": "Opus 4.7 ①", "_id": "opus_1_49", "judge_pick": false}], "count": 50}, "opus_2": {"label": "Opus 4.7 ②", "cards": [{"question": "In an ESAT-style problem you are told $$x$$ becomes $$\\tfrac{3}{2}x$$, $$y$$ becomes $$\\tfrac{3}{2}y$$, and an expression involves $$(x+y)^2$$. Why is factorising before substituting a smarter move than expanding? (3 steps)", "answer": "- Step 1: If you expand $$(x+y)^2 = x^2 + 2xy + y^2$$ first, you now have three separate terms, each of which must be scaled individually. Each scaling is a new arithmetic step where you can make a slip.\n- Step 2: If instead you keep $$(x+y)^2$$ intact, then scaling $$x \\to \\tfrac{3}{2}x$$ and $$y \\to \\tfrac{3}{2}y$$ pulls a common factor out: $$(x+y)^2 \\to (\\tfrac{3}{2}(x+y))^2 = \\tfrac{9}{4}(x+y)^2$$. One scaling, one squaring.\n+ The structural fact being used: $$(kx + ky)^2 = k^2(x+y)^2$$.\n+ This works because both variables scale by the **same** factor — that's the special case that lets the factor escape the bracket.\n- Step 3: So factorising exposes the symmetry of the scaling. The lesson generalises: in ESAT-style \"percentage change\" problems, always look for common factors before expanding — it converts a long calculation into a single multiplication.\n\nThe deeper principle: algebraic structure mirrors physical/proportional structure. Don't destroy structure by expanding unless you have to.", "source": "Opus 4.7 ②", "_id": "opus_2_0", "judge_pick": true}, {"question": "In an ESAT percentage-change problem, why is it almost always better to write changes like \"20% decrease\" as the fraction $$\\tfrac{4}{5}$$ rather than the decimal $$0.8$$? (2 steps)", "answer": "- Step 1: Non-calculator arithmetic with mixed fractions and decimals forces extra conversion steps and invites slips. Fractions also reveal cancellation opportunities (common factors between numerator and denominator) that decimals hide completely.\n- Step 2: For example, multiplying $$\\tfrac{9}{4} \\cdot \\tfrac{4}{5} \\cdot \\tfrac{1}{2}$$ instantly shows the $$4$$'s cancel; written as $$2.25 \\cdot 0.8 \\cdot 0.5$$ the same cancellation is invisible and you'd reach for long multiplication.\n\nTakeaway: in non-calculator percentage-change work, fractions are not just \"another notation\" — they are a calculation engine that exposes cancellation.", "source": "Opus 4.7 ②", "_id": "opus_2_1", "judge_pick": false}, {"question": "When dividing a fraction by a whole number in the form $$\\dfrac{a/b}{n}$$, students often \"lose\" the $$n$$. Where does the $$n$$ actually end up, and why? (2 steps)", "answer": "- Step 1: Rewrite $$n$$ as $$\\tfrac{n}{1}$$. Then $$\\dfrac{a/b}{n/1} = \\dfrac{a}{b} \\cdot \\dfrac{1}{n} = \\dfrac{a}{bn}$$.\n- Step 2: So $$n$$ ends up multiplied into the **denominator** of the answer, not the numerator. The common slip is to leave $$n$$ in the numerator (or just drop it). The mental check: dividing makes things smaller, so $$n$$ must go where it shrinks the result — the bottom.\n\nThis is \"the burger method\" Harry referenced: flip-and-multiply, with the divisor always going to the denominator.", "source": "Opus 4.7 ②", "_id": "opus_2_2", "judge_pick": true}, {"question": "What does it mean to \"interpret the gradient of a regression line in context\", and how does this differ from simply stating the gradient is positive or negative? (3 steps)", "answer": "- Step 1: Stating the sign of the gradient is a *mathematical* description (positive correlation, negative correlation). It uses only the symbol, not the story.\n- Step 2: Interpretation forces you to translate the number into the language of the variables in the problem. You must name:\n+ the unit increase in $$x$$ (e.g. \"one centimetre increase in height\"),\n+ the corresponding change in $$y$$ (e.g. \"weight increases by 3.27 kg\"),\n+ the qualifier \"on average\" — because regression describes a mean trend, not a guarantee for any single point.\n- Step 3: So for $$w = a + 3.27h$$ with $$h$$ in cm, $$w$$ in kg, the interpretation is: \"On average, for each 1 cm increase in height, the weight increases by 3.27 kg.\" Notice the gradient becomes a *rate* with units (kg per cm), not a bare number.\n\nTakeaway: \"interpret\" = explain to a non-mathematician, with units and the word \"average\".", "source": "Opus 4.7 ②", "_id": "opus_2_3", "judge_pick": false}, {"question": "Why is the word \"average\" crucial when interpreting a regression gradient, even if the question doesn't explicitly ask for it? (2 steps)", "answer": "- Step 1: A regression line is fitted to scattered data — the points do not lie exactly on the line. Any single horse that is 1 cm taller will not necessarily weigh exactly 3.27 kg more; some will weigh more, some less.\n- Step 2: The gradient describes the *mean* behaviour of the population, the trend. Without the word \"average\", the statement becomes a deterministic claim that the data clearly contradicts.\n\nThis is why mark schemes routinely award the mark only if \"on average\" (or equivalent) appears.", "source": "Opus 4.7 ②", "_id": "opus_2_4", "judge_pick": true}, {"question": "What is the difference between interpolation and extrapolation in regression, and why is one considered more reliable than the other? (3 steps)", "answer": "- Step 1: Interpolation = predicting a $$y$$-value for an $$x$$-value that lies **within** the range of the original observed data. Extrapolation = predicting outside that range.\n- Step 2: The regression line was fitted using only the observed data points. We have no evidence that the same linear relationship continues outside that range. The relationship could curve, plateau, or even reverse.\n+ Example: a height-weight regression for adult horses might predict negative weight for a height of 5 cm — clearly nonsense.\n- Step 3: So interpolation is generally reliable (it lies inside the support of the model), while extrapolation is risky and the predicted value carries no statistical guarantee.\n\nMark-scheme trigger words: the examiner is specifically scanning for \"interpolation\" and \"extrapolation\". Use them explicitly.", "source": "Opus 4.7 ②", "_id": "opus_2_5", "judge_pick": true}, {"question": "When asked to \"show there is only one outlier\", what subtle thing must your conclusion include that is easy to forget? (2 steps)", "answer": "- Step 1: It is not enough to identify the one outlying value (say, 139). You must explicitly state that it is the **only** outlier — using that word, or \"no other points lie outside the boundaries\".\n- Step 2: The reason is the question asked you to demonstrate uniqueness, not merely existence. If you only say \"139 lies outside the range\", a strict examiner can argue you haven't ruled out other outliers and withhold the mark.\n\nThe habit: mirror the wording of the question in your conclusion (\"only one outlier\") to eliminate ambiguity.", "source": "Opus 4.7 ②", "_id": "opus_2_6", "judge_pick": false}, {"question": "A boxplot has $$Q_3 - Q_2 > Q_2 - Q_1$$. What does this tell you about the distribution, and how would you *interpret* it in context for a dataset of weights? (3 steps)", "answer": "- Step 1: $$Q_2 - Q_1$$ measures the spread of the lower 25%–50% of data; $$Q_3 - Q_2$$ measures the spread of the 50%–75%. If the upper gap is larger, the upper half of the data is more spread out than the lower half.\n- Step 2: This is **positive skew** (or \"skewed to the right\"). The right tail is longer / data is more dispersed above the median.\n- Step 3: Interpreting in context: \"The weights above the median are more varied (spread out) than the weights below the median.\" Notice we translate \"$$Q_3 - Q_2$$ vs $$Q_2 - Q_1$$\" into a statement about the actual variable (weight) and its median — that's the *interpret* part.\n\nCommon slip: writing \"$$Q_3 - Q_1 > Q_2 - Q_1$$\" — that's not the skewness test; the test compares the two *halves* of the IQR.", "source": "Opus 4.7 ②", "_id": "opus_2_7", "judge_pick": true}, {"question": "Conceptually, what does $$E(X^2)$$ represent and why is it NOT the same as $$[E(X)]^2$$? (3 steps)", "answer": "- Step 1: $$E(X^2) = \\sum x_i^2 \\, p_i$$ — you square each value first, then take the probability-weighted average.\n- Step 2: $$[E(X)]^2 = (\\sum x_i p_i)^2$$ — you take the probability-weighted average first, then square.\n+ The order matters because squaring is a non
