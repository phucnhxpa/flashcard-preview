<script>
const DATA={"selected": [{"question": "Two events A and B are stated to be **independent**. What equation must immediately come to mind, and why does this equation capture the meaning of independence? (2 steps)", "answer": "- Step 1: The equation is $$P(A \\cap B) = P(A) \\times P(B)$$. This is the defining property of independent events and should be your first thought when you see \"A and B are independent.\"\n- Step 2: This equation captures independence because it says: the probability of both A and B happening together is exactly what you'd get if their probabilities simply multiplied with no interaction. In other words, knowing that A occurred gives you **no additional information** about whether B occurred — the probability of B is the same regardless of A. Formally, $$P(B|A) = P(B)$$, which is equivalent to $$P(A \\cap B) = P(A) \\times P(B)$$.\n\nThis is the key that \"unlocks\" Venn diagram problems: once you know independence, you can set up an equation linking the unknown probabilities and solve for them.", "source": "GLM 5.1 ①", "_id": "glm_1_9"}, {"question": "What's the difference between $$E(X^2)$$ and $$\\text{Var}(X)$$ conceptually, and which is always ≥ the other?", "answer": "- Step 1: $$E(X^2)$$ is the average of squared values — it measures the \"size\" of $$X$$ (mixing spread and location).\n- Step 2: $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$ is the average squared *deviation from the mean* — pure spread, location-free.\n- Step 3: Since $$[E(X)]^2 \\ge 0$$, we always have $$\\text{Var}(X) \\le E(X^2)$$. Equality holds only when $$E(X) = 0$$ (the data is centered at zero).\n- Step 4: Intuition: $$E(X^2)$$ measures squared distance from 0; $$\\text{Var}(X)$$ measures squared distance from $$\\mu$$. The latter is smaller because $$\\mu$$ is the optimal \"centre\" — no other point gives a smaller mean squared distance.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "Conceptually, what does $$E(X^2)$$ represent and why is it NOT the same as $$[E(X)]^2$$? (3 steps)", "answer": "- Step 1: $$E(X^2) = \\sum x_i^2 \\, p_i$$ — you square each value first, then take the probability-weighted average.\n- Step 2: $$[E(X)]^2 = (\\sum x_i p_i)^2$$ — you take the probability-weighted average first, then square.\n+ The order matters because squaring is a non-linear operation: large deviations are amplified more than small ones.\n+ Example: $$X = \\pm 1$$ each with probability $$\\tfrac{1}{2}$$. Then $$E(X) = 0$$, so $$[E(X)]^2 = 0$$. But $$E(X^2) = 1$$. The two differ by exactly the variance.\n- Step 3: The gap between them is precisely the variance: $$\\mathrm{Var}(X) = E(X^2) - [E(X)]^2 \\geq 0$$. The non-negativity of this gap is essentially Jensen's inequality applied to $$x \\mapsto x^2$$.\n\nIntuition: $$E(X^2)$$ \"sees\" spread, $$[E(X)]^2$$ does not.", "source": "Opus 4.7 ②", "_id": "opus_2_8"}, {"question": "Events $$A$$ and $$B$$ have $$P(A) = 0.4$$, $$P(B) = 0.5$$, and are independent. Compute $$P(A \\cap B)$$, $$P(A \\cup B)$$, and $$P(A \\mid B)$$ — and explain each.", "answer": "- Step 1: $$P(A \\cap B) = P(A) \\cdot P(B) = 0.4 \\times 0.5 = 0.2$$ (independence multiplication).\n- Step 2: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B) = 0.4 + 0.5 - 0.2 = 0.7$$ (inclusion-exclusion).\n- Step 3: $$P(A \\mid B) = \\dfrac{P(A \\cap B)}{P(B)} = \\dfrac{0.2}{0.5} = 0.4 = P(A)$$. This confirms independence: knowing $$B$$ happened doesn't change the probability of $$A$$.\n\nThe check $$P(A \\mid B) = P(A)$$ is the most intuitive definition of independence.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "What is the conceptual difference between $$P(A \\cup B)$$ being computed as $$P(A) + P(B)$$ vs $$P(A) + P(B) - P(A \\cap B)$$, and when is each correct?", "answer": "- Step 1: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$ is the general inclusion-exclusion formula. The subtraction corrects for the overlap being counted twice when you add $$P(A) + P(B)$$.\n- Step 2: $$P(A \\cup B) = P(A) + P(B)$$ is correct *only* if $$A$$ and $$B$$ are mutually exclusive, i.e. $$P(A \\cap B) = 0$$. Then there's no overlap to correct for.\n- Step 3: Trap: mutually exclusive ≠ independent. In fact, with positive probabilities, mutually exclusive events are *maximally dependent* — if one happens, you know the other didn't.\n\nDefault to inclusion-exclusion; only drop the subtraction term when the question explicitly tells you the events can't both happen.", "source": "Opus 4.7 ①", "_id": "opus_1_43"}, {"question": "Why does the expected value of X² (E[X²]) appear in variance calculations? Explain its role.", "answer": "Variance measures spread around the mean: Var(X) = E[(X − μ)²].  \n- Expanding this gives: E[X²] − 2μE[X] + μ²  \n= E[X²] − μ² (since E[X] = μ)  \n⇒ Var(X) = E[X²] − (E[X])²  \n+ E[X²] represents the average squared deviation's magnitude before subtracting mean effect  \n+ Without E[X²], we couldn't quantify spread independent of location (μ)", "source": "Qwen 3 ②", "_id": "qwen_2_4"}, {"question": "Continuing the previous: given he's late, what's $$P(\\text{bicycle} \\mid \\text{late})$$, and what does this Bayes-style flip tell you conceptually?", "answer": "- Step 1: $$P(B \\mid L) = \\dfrac{P(B \\cap L)}{P(L)} = \\dfrac{1/60}{2/15}$$.\n- Step 2: Compute: $$\\dfrac{1/60}{2/15} = \\dfrac{1}{60} \\times \\dfrac{15}{2} = \\dfrac{15}{120} = \\dfrac{1}{8}$$.\n- Step 3: Interpretation: even though the bicycle path is *less* likely a priori ($$1/6$$), and bicycle days have a higher chance of being late, conditioning on \"late\" gives a 1-in-8 chance it was the bicycle. The car dominates because it's the most common mode *and* contributes the largest absolute share of late events.\n\nThis is Bayes' theorem at work — flipping the direction of conditioning by using the joint as a bridge.", "source": "Opus 4.7 ①", "_id": "opus_1_38"}, {"question": "What is the difference between interpolation and extrapolation in regression, and why is one considered more reliable than the other? (3 steps)", "answer": "- Step 1: Interpolation = predicting a $$y$$-value for an $$x$$-value that lies **within** the range of the original observed data. Extrapolation = predicting outside that range.\n- Step 2: The regression line was fitted using only the observed data points. We have no evidence that the same linear relationship continues outside that range. The relationship could curve, plateau, or even reverse.\n+ Example: a height-weight regression for adult horses might predict negative weight for a height of 5 cm — clearly nonsense.\n- Step 3: So interpolation is generally reliable (it lies inside the support of the model), while extrapolation is risky and the predicted value carries no statistical guarantee.\n\nMark-scheme trigger words: the examiner is specifically scanning for \"interpolation\" and \"extrapolation\". Use them explicitly.", "source": "Opus 4.7 ②", "_id": "opus_2_5"}, {"question": "Why is it usually more efficient in non-calculator ESAT arithmetic to convert decimals like $$0.8$$ into the fraction $$4/5$$ before manipulating?", "answer": "- Step 1: Fractions expose common factors that decimals hide. For example, $$0.8 = 4/5$$ reveals a factor of 4 that may cancel with another 4 elsewhere.\n- Step 2: Mixing fractions and decimals forces extra conversion steps, increasing the risk of arithmetic error under time pressure.\n- Step 3: Multiplying/dividing fractions is purely about multiplying numerators and denominators — no decimal alignment needed — and cancellation can happen *before* you multiply, keeping numbers small.\n\nRule of thumb: as soon as you spot a \"clean\" decimal, convert it to a fraction; you'll almost always save work.", "source": "Opus 4.7 ①", "_id": "opus_1_1"}, {"question": "On a Venn diagram with three events $$A, B, C$$, what is the difference between the shaded region for $$A \\cap (B \\cup C)$$ versus $$A \\cup (B \\cap C)$$? (3 steps)", "answer": "- Step 1: Intersection ($$\\cap$$) means \"in both\" — only the *overlap* counts. Union ($$\\cup$$) means \"in at least one\" — the *combined* region.\n- Step 2: $$A \\cap (B \\cup C)$$: first form $$B \\cup C$$ (everything in $$B$$ or $$C$$), then intersect with $$A$$. Result: the parts of $$A$$ that overlap with $$B$$ or $$C$$ (or both).\n- Step 3: $$A \\cup (B \\cap C)$$: first form $$B \\cap C$$ (only the overlap of $$B$$ and $$C$$), then union with $$A$$. Result: all of $$A$$, plus the $$B \\cap C$$ overlap (even outside $$A$$).\n\nThese regions can look very different on a Venn diagram — always use a highlighter and respect operator precedence (compute the inner bracket first).", "source": "Opus 4.7 ①", "_id": "opus_1_23"}, {"question": "On a tree diagram with three first-level branches (probabilities $$\\tfrac{1}{2}, \\tfrac{1}{6}, \\tfrac{1}{3}$$) and a second-level conditional probability of being \"late\" on each branch ($$\\tfrac{1}{5}, \\tfrac{1}{10}, \\tfrac{1}{20}$$), find $$P(\\text{late})$$ using the law of total probability — sketch the mental calculation.", "answer": "- Step 1: Three paths to \"late\": $$\\tfrac{1}{2} \\cdot \\tfrac{1}{5} = \\tfrac{1}{10}$$ (via car), $$\\tfrac{1}{6} \\cdot \\tfrac{1}{10} = \\tfrac{1}{60}$$ (via bike), $$\\tfrac{1}{3} \\cdot \\tfrac{1}{20} = \\tfrac{1}{60}$$ (via walk).\n- Step 2: Find common denominator 60: $$\\tfrac{6}{60} + \\tfrac{1}{60} + \\tfrac{1}{60} = \\tfrac{8}{60} = \\tfrac{2}{15}$$.\n- Step 3: So $$P(\\text{late}) = \\tfrac{2}{15}$$.\n\nThe clean answer (small numerator, small denominator) often signals you've done it right — examiners typically engineer problems so the final fraction is tidy.", "source": "Opus 4.7 ①", "_id": "opus_1_37"}, {"question": "In an ESAT-style problem you are told $$x$$ becomes $$\\tfrac{3}{2}x$$, $$y$$ becomes $$\\tfrac{3}{2}y$$, and an expression involves $$(x+y)^2$$. Why is factorising before substituting a smarter move than expanding? (3 steps)", "answer": "- Step 1: If you expand $$(x+y)^2 = x^2 + 2xy + y^2$$ first, you now have three separate terms, each of which must be scaled individually. Each scaling is a new arithmetic step where you can make a slip.\n- Step 2: If instead you keep $$(x+y)^2$$ intact, then scaling $$x \\to \\tfrac{3}{2}x$$ and $$y \\to \\tfrac{3}{2}y$$ pulls a common factor out: $$(x+y)^2 \\to (\\tfrac{3}{2}(x+y))^2 = \\tfrac{9}{4}(x+y)^2$$. One scaling, one squaring.\n+ The structural fact being used: $$(kx + ky)^2 = k^2(x+y)^2$$.\n+ This works because both variables scale by the **same** factor — that's the special case that lets the factor escape the bracket.\n- Step 3: So factorising exposes the symmetry of the scaling. The lesson generalises: in ESAT-style \"percentage change\" problems, always look for common factors before expanding — it converts a long calculation into a single multiplication.\n\nThe deeper principle: algebraic structure mirrors physical/proportional structure. Don't destroy structure by expanding unless you have to.", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "Why are skewness and outlier identification *separate* diagnostics — i.e., why can a distribution be skewed without having any outliers? (3 steps)", "answer": "- Step 1: Skewness measures the *shape* of the entire distribution: is one half more spread out than the other? It's about asymmetry.\n- Step 2: Outliers are individual extreme *points* sitting beyond the bulk of the data, judged by the 1.5 × IQR rule (or similar).\n- Step 3: You can have a smoothly skewed distribution (a gentle long tail) where no single point crosses the outlier threshold — every point is \"expected\" given the skewness. Conversely, you can have a symmetric distribution with one freak outlier and no skew.\n+ Example: an exam where everyone scored between 40 and 70 except one person who scored 95 — outlier present, but the rest is symmetric.\n\nSo shape (skew) and freak points (outliers) are independent properties; check both.", "source": "Opus 4.7 ②", "_id": "opus_2_39"}, {"question": "Two students compute $$P(\\text{taking car} | \\text{not late})$$. Student A writes $$\\dfrac{P(\\text{car} \\cap \\text{not late})}{P(\\text{not late})}$$. Student B writes $$P(\\text{car}) \\cdot P(\\text{not late})$$. Which is correct in general, and what error has the other student made? (3 steps)", "answer": "- Step 1: Student A is correct. Conditional probability is **always** defined as $$P(A|B) = \\dfrac{P(A \\cap B)}{P(B)}$$. This is the universal definition.\n- Step 2: Student B has conflated two distinct things: the joint probability $$P(A \\cap B)$$ (when events are independent, this equals the product of marginals) with the conditional probability $$P(A|B)$$.\n+ Even *if* car and not-late were independent, the product $$P(\\text{car}) \\cdot P(\\text{not late})$$ equals $$P(\\text{car} \\cap \\text{not late})$$, which is still the *numerator only*, not the conditional itself.\n- Step 3: Student B's expression is missing the division by $$P(\\text{not late})$$. That's the renormalisation step that turns a joint into a conditional. Without it, you're answering a different question.\n\nHabit: when you see \"given\", reach for the fraction, never the simple product.", "source": "Opus 4.7 ②", "_id": "opus_2_33"}, {"question": "For a discrete random variable $$X$$, how do you compute $$E(X^2)$$ from a probability table, and what's the conceptual difference between this and $$[E(X)]^2$$? (3 steps)", "answer": "- Step 1: $$E(X^2) = \\sum x^2 \\cdot P(X = x)$$. You square each value, multiply by its probability, and sum. *No division* by the number of outcomes — the probabilities already encode the weighting.\n- Step 2: $$[E(X)]^2$$ is what you get by first averaging $$X$$ and then squaring. These are different quantities.\n- Step 3: The difference $$E(X^2) - [E(X)]^2$$ is *exactly* the variance — it measures how much $$X$$ deviates from its mean. By Jensen's inequality (because squaring is convex), $$E(X^2) \\ge [E(X)]^2$$, with equality only if $$X$$ is constant.\n\nCommon error: dividing $$\\sum x^2 P(x)$$ by $$n$$. There's no $$n$$ — the probabilities are doing that job.", "source": "Opus 4.7 ①", "_id": "opus_1_10"}, {"question": "A discrete random variable $$X$$ has $$E(X) = 1.8$$ and $$\\mathrm{Var}(X) = 1.36$$. Without re-deriving from scratch, what is $$\\mathrm{Var}(5 - 3X)$$? (3 steps)", "answer": "- Step 1: For any constants $$a, b$$: $$\\mathrm{Var}(aX + b) = a^2 \\, \\mathrm{Var}(X)$$. The constant $$b$$ shifts the distribution but does not change its spread, so it disappears. The constant $$a$$ stretches the spread, but in *both* directions equally, so the sign is lost via the square.\n- Step 2: Here $$a = -3$$, $$b = 5$$. So $$\\mathrm{Var}(5 - 3X) = (-3)^2 \\cdot 1.36 = 9 \\cdot 1.36$$.\n+ Note we do NOT use $$E(X) = 1.8$$ at all — variance is location-invariant.\n- Step 3: $$9 \\cdot 1.36 = 12.24$$.\n\nKey conceptual point: the $$5$$ contributes nothing; the $$-3$$ contributes $$9$$. Spread doesn't care about sign or shift, only stretch.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "On a tree diagram with branches \"Car\", \"Bicycle\", \"Walk\" and conditional \"Late/Not late\" on each, how do you compute the total $$P(\\text{Late})$$? (3 steps)", "answer": "- Step 1: Identify every root-to-leaf path that ends in \"Late\". There are three: Car→Late, Bicycle→Late, Walk→Late.\n- Step 2: For each path, multiply the probabilities along the branches. This gives the joint probability $$P(\\text{transport} \\cap \\text{Late})$$ for that route.\n+ E.g. $$P(\\text{Car} \\cap \\text{Late}) = P(\\text{Car}) \\cdot P(\\text{Late} | \\text{Car})$$ — this is the multiplication rule for dependent events.\n- Step 3: Add all three path-products. This is the **law of total probability**: $$P(\\text{Late}) = \\sum_i P(T_i) P(\\text{Late} | T_i)$$, summing over a partition of transport modes.\n\nVisual: \"multiply along, add across paths.\"", "source": "Opus 4.7 ②", "_id": "opus_2_17"}, {"question": "What is the formula for conditional probability $$P(A | B)$$, and what is the geometric intuition on a Venn diagram? (3 steps)", "answer": "- Step 1: $$P(A | B) = \\dfrac{P(A \\cap B)}{P(B)}$$.\n- Step 2: Intuition: \"given $$B$$\" means we restrict our universe to the region $$B$$. Within that restricted universe, the favourable outcomes are exactly those also in $$A$$, i.e. $$A \\cap B$$.\n+ The denominator $$P(B)$$ renormalises: $$B$$ now plays the role that the whole sample space used to play, so probabilities inside $$B$$ must sum to 1.\n- Step 3: So conditional probability is just \"the slice of $$A$$ inside $$B$$\" divided by \"the total of $$B$$\" — a ratio of two Venn-diagram areas.\n\nMental picture: zoom in on the $$B$$ region until it fills the screen; then $$P(A|B)$$ is the fraction of that screen covered by $$A$$.", "source": "Opus 4.7 ②", "_id": "opus_2_13"}, {"question": "Two events $$A$$ and $$B$$ are independent. What formula immediately unlocks Venn-diagram problems involving this phrase, and why is it the natural definition? (3 steps)", "answer": "- Step 1: $$P(A \\cap B) = P(A) \\cdot P(B)$$. Whenever you see \"independent\", this equation should appear automatically.\n- Step 2: Why it's natural: independence means knowing $$B$$ occurred gives no information about $$A$$. Formally, $$P(A | B) = P(A)$$. Multiplying both sides by $$P(B)$$ gives $$P(A \\cap B) = P(A) P(B)$$.\n+ So the product rule is just the conditional-probability definition rearranged under the assumption that conditioning changes nothing.\n- Step 3: Operationally, this turns a Venn-diagram problem with one unknown overlap into a single equation: if you know $$P(A)$$ and $$P(B)$$, the intersection is forced. That's why it unlocks the rest of the diagram.", "source": "Opus 4.7 ②", "_id": "opus_2_12"}, {"question": "For a dataset, Q1 = 12, Q2 (median) = 18, Q3 = 30. How do you determine the direction of skew, and what is the common mistake in how students express the comparison? (3 steps)", "answer": "- Step 1: Compare the gap above the median to the gap below the median. The lower gap is $$Q2 - Q1 = 18 - 12 = 6$$. The upper gap is $$Q3 - Q2 = 30 - 18 = 12$$.\n- Step 2: Since the upper gap (12) is greater than the lower gap (6), the data is more spread out above the median. This means the distribution has **positive skew** (also called \"positively skewed\").\n+ The common mistake: students write \"$$Q3 > Q2$$ so it's positive skew\" — but $$Q3$$ is *always* greater than $$Q2$$ by definition. The correct comparison is between the **differences**: $$Q3 - Q2$$ versus $$Q2 - Q1$$.\n- Step 3: For positive skew: $$Q3 - Q2 > Q2 - Q1$$. For negative skew: $$Q3 - Q2 < Q2 - Q1$$. For symmetry (no skew): $$Q3 - Q2 \\approx Q2 - Q1$$.\n\nThe skew direction tells you which tail is longer: positive skew = longer right tail = data stretched out above the median.", "source": "GLM 5.1 ①", "_id": "glm_1_5"}, {"question": "Why does the formula $ \\text{Var}(X) = \\mathbb{E}[X^2] - (\\mathbb{E}[X])^2 $ work, and how does coding data (e.g., $ Y = \\frac{X - a}{b} $) affect its calculation? (4 steps)", "answer": "- Step 1: Expand the definition of variance:  \n$$ \\text{Var}(X) = \\mathbb{E}[(X - \\mu)^2] = \\mathbb{E}[X^2 - 2\\mu X + \\mu^2] = \\mathbb{E}[X^2] - 2\\mu^2 + \\mu^2 = \\mathbb{E}[X^2] - (\\mathbb{E}[X])^2 $$  \n- Step 2: Coding simplifies calculations by reducing large numbers. For $ Y = \\frac{X - a}{b} $:  \n+ $ \\mathbb{E}[Y] = \\frac{\\mathbb{E}[X] - a}{b} $  \n+ $ \\text{Var}(Y) = \\frac{1}{b^2}\\text{Var}(X) $  \n- Step 3: Example: Calculate variance of 2000, 2005, 2010 using coding $ Y = X - 2000 $:  \n+ Original: Var(X) = Var(Y) = 12.5  \n+ Without coding, squaring large numbers (2000², etc.) complicates arithmetic.  \n\n[Optional: Misconception probe: Why not use $ \\mathbb{E}[|X|] $ instead of squaring? Squaring emphasizes larger deviations and ensures differentiability.]", "source": "Qwen 3 ①", "_id": "qwen_1_5"}, {"question": "What does it mean to \"interpret\" the gradient of a regression line $$w = a + b\\,h$$ in context, and what kind of answer earns full marks? (3 steps)", "answer": "- Step 1: \"Interpret\" means: translate the math into a sentence a non-mathematician would understand, using the actual variables and units from the question.\n- Step 2: The gradient $$b$$ is the predicted change in the response variable $$w$$ per one-unit increase in the explanatory variable $$h$$.\n- Step 3: A full-mark answer has three ingredients:\n+ The phrase \"on average\" or \"for each\" (acknowledging it's a model, not exact).\n+ The numerical value of the gradient *with units*.\n+ The two variables named in context (e.g. \"weight increases by 3.27 kg for each 1 cm increase in height\").\n\nSaying only \"as height increases, weight increases\" is too vague — examiners want the *rate*.", "source": "Opus 4.7 ①", "_id": "opus_1_3"}, {"question": "Why do we use $$\\tfrac{n+1}{2}$$ for the expected value of a discrete uniform on $$\\{1, 2, \\dots, n\\}$$, and what happens if the distribution is on $$\\{a, a+1, \\dots, b\\}$$ instead?", "answer": "- Step 1: For $$\\{1, \\dots, n\\}$$, by symmetry the mean is the midpoint, which is $$\\tfrac{1+n}{2} = \\tfrac{n+1}{2}$$.\n- Step 2: For $$\\{a, a+1, \\dots, b\\}$$, again by symmetry the mean is the midpoint: $$\\tfrac{a+b}{2}$$.\n- Step 3: Intuition: every value is equally likely, so the \"centre of mass\" of the distribution sits at the arithmetic centre of the range.\n- Step 4: For variance, on $$\\{1, \\dots, n\\}$$ it's $$\\dfrac{n^2 - 1}{12}$$; on $$\\{a, \\dots, b\\}$$ (with $$n = b - a + 1$$ values), it's $$\\dfrac{n^2 - 1}{12}$$ — same formula, because variance depends only on spread, not location.\n\nMemorize both — they're high-yield S1 formulas.", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "A regression line $$y = a + bx$$ is computed from data. Why is using it to predict $$y$$ for an $$x$$-value just slightly outside the data range sometimes acceptable, while predicting far outside is dangerous? (3 steps)", "answer": "- Step 1: The line is a *local* approximation. Within the data range, the linear shape is supported by evidence: we have observations showing the trend really is approximately linear there.\n- Step 2: Just outside the range, the linear approximation can be expected to hold *roughly* by continuity — small extrapolation isn't catastrophic if the underlying relationship is smooth.\n- Step 3: Far outside the range, the line is unconstrained by data and the linear assumption may break down completely (the real relationship could curve, plateau, change sign, or hit physical limits like \"weight ≥ 0\"). The further you go, the more the model becomes a guess.\n\nSo extrapolation reliability degrades with distance from the data — not a binary \"safe/unsafe\" but a gradient.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "Why does adding a constant $$b$$ to a random variable not change its variance, while multiplying by a constant $$a$$ scales the variance by $$a^2$$ (not $$|a|$$)? (3 steps)", "answer": "- Step 1: Variance measures *spread around the mean*. Adding $$b$$ slides every value and the mean by the same amount $$b$$, so every deviation from the mean is unchanged. Translation preserves distances.\n- Step 2: Multiplying by $$a$$ stretches every value, including the mean, by factor $$a$$. So every deviation $$(x_i - \\mu)$$ becomes $$a(x_i - \\mu)$$.\n- Step 3: Variance is the average of *squared* deviations: $$(a(x_i - \\mu))^2 = a^2 (x_i - \\mu)^2$$. The square kills the sign of $$a$$ (which is why $$a$$ and $$-a$$ give the same variance) and turns the linear stretch into a quadratic one.\n\nVisual mental model: a histogram dragged sideways by $$b$$ has the same shape; one squashed/stretched by $$a$$ has its width scaled by $$|a|$$ but its *area-weighted squared width* (variance) scaled by $$a^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "Why does coding data (e.g. $$y = \\tfrac{x - a}{b}$$) change the mean by a linear shift and scale, but change the standard deviation by *only* the scale factor? (3 steps)", "answer": "- Step 1: Mean is a *location* statistic. If you shift all data by $$-a$$ and rescale by $$\\tfrac{1}{b}$$, the mean transforms identically: $$\\bar{y} = \\tfrac{\\bar{x} - a}{b}$$.\n- Step 2: Standard deviation is a *spread* statistic. Shifting all data by the same constant doesn't change distances between points — the spread is unchanged. Only the scaling by $$\\tfrac{1}{b}$$ affects spread.\n- Step 3: So $$\\sigma_y = \\dfrac{\\sigma_x}{|b|}$$. The shift $$a$$ drops out. Variance, being squared, transforms as $$\\sigma_y^2 = \\dfrac{\\sigma_x^2}{b^2}$$.\n\nWhy this matters: coding is a calculation trick to simplify nasty numbers, and you must un-code at the end remembering that shifts only affect the mean, not the spread.", "source": "Opus 4.7 ②", "_id": "opus_2_25"}, {"question": "Synthesis question: In the Paul commuting problem, the original tree has transport first, then late/not late. A reversed tree has late/not late first, then transport. Explain why the first-level branch probabilities change between the two trees, but the overall probability of any complete path (e.g., \"car and late\") remains the same. (3 steps)", "answer": "- Step 1: In the original tree, the first-level branches are $$P(\\text{car}) = \\tfrac{1}{2}$$, $$P(\\text{bicycle}) = \\tfrac{1}{6}$$, $$P(\\text{walk}) = \\tfrac{1}{3}$$. These are the marginal probabilities of each transport method — known directly from the question.\n- Step 2: In the reversed tree, the first-level branches are $$P(\\text{late}) = \\tfrac{2}{15}$$ and $$P(\\text{not late}) = \\tfrac{13}{15}$$. These are the marginal probabilities of being late or not — computed by adding up all paths leading to each outcome in the original tree. The first-level branches change because we're conditioning on a different variable.\n- Step 3: The path probabilities remain the same because they represent the same joint events. In the original tree: $$P(\\text{car}) \\times P(\\text{late}|\\text{car}) = \\tfrac{1}{2} \\times \\tfrac{1}{5} = \\tfrac{1}{10}$$. In the reversed tree: $$P(\\text{late}) \\times P(\\text{car}|\\text{late}) = \\tfrac{2}{15} \\times \\tfrac{3}{4} = \\tfrac{1}{10}$$. Same result — this is guaranteed by the definition of conditional probability: $$P(A \\cap B) = P(A) \\times P(B|A) = P(B) \\times P(A|B)$$.\n\nThe two trees are different factorizations of the same joint probability, like factoring 12 as 3×4 or 2×6 — different factors, same product.", "source": "GLM 5.1 ①", "_id": "glm_1_33"}, {"question": "When computing $$P(B | C')$$ from a Venn diagram, what region goes on top of the fraction and what region goes on the bottom? (3 steps)", "answer": "- Step 1: $$P(B | C') = \\dfrac{P(B \\cap C')}{P(C')}$$.\n- Step 2: Top: the part of $$B$$ that lies **outside** $$C$$. On a Venn diagram, shade $$B$$, then erase anything overlapping $$C$$. What's left is $$B \\cap C'$$.\n- Step 3: Bottom: the entire region outside $$C$$. Shade everything that is not inside $$C$$ — this includes parts of $$A$$, parts of $$B$$, and the region outside all circles.\n+ Common error: putting \"outside $$C$$\" in the numerator but forgetting that the denominator must also be restricted to outside $$C$$ (not the whole sample space).\n\nGeometric mental picture: the conditional cuts the universe down to $$C'$$; the question becomes \"what fraction of $$C'$$ is $$B$$?\"", "source": "Opus 4.7 ②", "_id": "opus_2_14"}, {"question": "What is the conceptual purpose of a scatter diagram before doing any regression analysis? (3 steps)", "answer": "- Step 1: A scatter diagram visualizes the joint distribution of two variables — each point is one observation $$(x_i, y_i)$$.\n- Step 2: It answers diagnostic questions *before* fitting a line:\n+ Is the relationship roughly linear? (If not, don't use linear regression.)\n+ Is it positive or negative correlation?\n+ Are there outliers that might dominate the fit?\n+ Is the spread constant across $$x$$ (homoscedasticity)?\n- Step 3: Without this visual check, you might fit a line to data with a clear curve, or be misled by a single outlier — the regression formulas will run regardless, but the result will be meaningless.\n\nAlways plot first. Math second.", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "Why is the formula $$\\mathrm{Var}(X) = E(X^2) - [E(X)]^2$$ better remembered as \"mean of squares minus square of mean\" than as a string of symbols? (2 steps)", "answer": "- Step 1: The verbal phrase encodes the *order of operations*, which is the only thing that distinguishes the two terms. Students who memorise the symbols often invert the order in a panic.\n- Step 2: It also makes the formula *self-checking*: variance must be non-negative, so the \"mean of squares\" (which weights big values heavily) must dominate the \"square of the mean\" (which can cancel signs). If your answer comes out negative, you've swapped the terms.\n\nA flashcard-worthy mnemonic: **MoS − SoM**.", "source": "Opus 4.7 ②", "_id": "opus_2_9"}, {"question": "When a question says \"show that there is only one outlier\", what must your final conclusion explicitly state, and why is \"there is a single data point beyond the boundary\" not enough?", "answer": "- Step 1: The mark scheme requires the *exact* word \"outlier\" and the explicit claim of uniqueness — e.g. \"139 is the only outlier.\"\n- Step 2: Examiners look for keywords; paraphrases like \"single data point\" risk ambiguity (the marker might wonder whether you tested all points or stopped early).\n- Step 3: The question is essentially a \"prove\" question — you must (a) compute the outlier boundaries, (b) check every data point, (c) state explicitly that only one falls outside.\n\nLesson: mirror the question's language in your conclusion. If they say \"outlier\", you say \"outlier\".", "source": "Opus 4.7 ①", "_id": "opus_1_5"}, {"question": "Why is it good exam practice to write out the conditional probability formula explicitly (e.g. $$P(B \\mid L) = P(B \\cap L) / P(L)$$) before plugging in numbers, even if you \"know\" the answer?", "answer": "- Step 1: Exam mark schemes usually award a *method mark* (M mark) for stating the correct formula, separate from the accuracy mark for the final number.\n- Step 2: If you make an arithmetic slip but the formula is right, you still get the method mark — partial credit insurance.\n- Step 3: Writing the formula forces you to identify what's the numerator (joint event) and what's the denominator (given event) — preventing the common error of dividing the wrong way.\n- Step 4: It also makes your work checkable: an examiner can see your logic instantly.\n\nHabit: every conditional probability question gets the formula written first, every time.", "source": "Opus 4.7 ①", "_id": "opus_1_22"}, {"question": "When dividing a fraction by a whole number in the form $$\\dfrac{a/b}{n}$$, students often \"lose\" the $$n$$. Where does the $$n$$ actually end up, and why? (2 steps)", "answer": "- Step 1: Rewrite $$n$$ as $$\\tfrac{n}{1}$$. Then $$\\dfrac{a/b}{n/1} = \\dfrac{a}{b} \\cdot \\dfrac{1}{n} = \\dfrac{a}{bn}$$.\n- Step 2: So $$n$$ ends up multiplied into the **denominator** of the answer, not the numerator. The common slip is to leave $$n$$ in the numerator (or just drop it). The mental check: dividing makes things smaller, so $$n$$ must go where it shrinks the result — the bottom.\n\nThis is \"the burger method\" Harry referenced: flip-and-multiply, with the divisor always going to the denominator.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "Why does multiplying $$P(C) \\times P(L \\mid C)$$ along a tree diagram give $$P(C \\cap L)$$, and *not* $$P(C) \\times P(L)$$? (3 steps)", "answer": "- Step 1: By definition of conditional probability, $$P(L \\mid C) = \\dfrac{P(C \\cap L)}{P(C)}$$. Rearranging: $$P(C \\cap L) = P(C) \\cdot P(L \\mid C)$$. This is the multiplication rule — always true.\n- Step 2: $$P(C) \\times P(L)$$ would only equal $$P(C \\cap L)$$ if $$C$$ and $$L$$ were independent — but in most tree-diagram problems they're not (the whole point is that being late depends on the mode of transport).\n- Step 3: On the tree, each branch beyond the first level is already a *conditional* probability (given you reached that node), so the multiplication along a path is automatically the joint probability.\n\nTrap: never write $$P(C) \\times P(L)$$ for the path probability — always $$P(C) \\times P(L \\mid C)$$.", "source": "Opus 4.7 ①", "_id": "opus_1_20"}, {"question": "Suppose you've drawn a tree diagram with mode of transport first, then late/not-late. To answer \"given he's late, what's the probability he took the bicycle?\", what's the strategy? (4 steps)", "answer": "- Step 1: Recognize this as conditional probability \"backwards\" relative to the tree: you want $$P(B \\mid L)$$ but the tree gives $$P(L \\mid B)$$.\n- Step 2: Apply the formula: $$P(B \\mid L) = \\dfrac{P(B \\cap L)}{P(L)}$$.\n- Step 3: Compute $$P(B \\cap L)$$ from the tree (multiply along the bicycle-then-late path).\n- Step 4: Compute $$P(L)$$ using the law of total probability (sum across all three paths that end in \"late\"). Divide.\n\nThis is essentially Bayes' theorem in disguise — you're flipping the conditioning direction using the joint probability as a bridge.", "source": "Opus 4.7 ①", "_id": "opus_1_21"}, {"question": "Why does coding data using $$u = (x - a)/b$$ leave the product-moment correlation coefficient $$r$$ unchanged?", "answer": "- Step 1: $$r$$ is dimensionless and built from standardized deviations: $$r = \\dfrac{\\sum (x_i - \\bar{x})(y_i - \\bar{y})}{\\sqrt{\\sum (x_i - \\bar{x})^2 \\sum (y_i - \\bar{y})^2}}$$.\n- Step 2: Under $$u = (x - a)/b$$: deviations become $$u_i - \\bar{u} = (x_i - \\bar{x})/b$$. The factor $$1/b$$ appears in numerator and denominator the same number of times.\n- Step 3: Specifically, numerator gets a factor $$1/b$$ (from $$u$$), denominator gets $$\\sqrt{(1/b)^2} = 1/b$$. They cancel — $$r$$ unchanged.\n- Step 4: The shift $$a$$ is absorbed into the deviation differences and disappears entirely.\n\nThis is why coding is safe for correlation: it simplifies arithmetic without distorting the relationship.", "source": "Opus 4.7 ①", "_id": "opus_1_47"}, {"question": "On a Venn diagram with events $$A$$, $$B$$, $$C$$ where independence of $$A$$ and $$B$$ is given, how do you typically use the independence condition to set up an equation? (3 steps)", "answer": "- Step 1: Read off $$P(A)$$ from the Venn diagram by summing all regions inside the $$A$$ circle (call this expression $$E_A$$).\n- Step 2: Similarly read off $$P(B) = E_B$$ and $$P(A \\cap B) = E_{A \\cap B}$$ (the overlap region of $$A$$ and $$B$$, possibly including the triple intersection with $$C$$).\n- Step 3: Apply independence: $$E_{A \\cap B} = E_A \\cdot E_B$$. This is an equation in the unknown(s). Solve algebraically — and where possible, *divide* both sides by a known factor rather than expanding, because it saves arithmetic.\n\nLesson: independence converts a \"find the unknown\" Venn question into a single algebraic equation.", "source": "Opus 4.7 ①", "_id": "opus_1_14"}, {"question": "What is an outlier under the \"1.5 × IQR\" rule, and why is 1.5 the conventional multiplier?", "answer": "- Step 1: A value $$x$$ is an outlier if $$x < Q_1 - 1.5 \\times \\text{IQR}$$ or $$x > Q_3 + 1.5 \\times \\text{IQR}$$, where $$\\text{IQR} = Q_3 - Q_1$$.\n- Step 2: The IQR captures the middle 50% spread, robust to extreme values. Multiplying by 1.5 extends the \"normal range\" a reasonable distance beyond the quartiles.\n- Step 3: For approximately normal data, the 1.5×IQR fences catch roughly the top and bottom 0.35% — so points beyond them are genuinely unusual. The value 1.5 is conventional (Tukey's choice), balancing sensitivity (catching real outliers) and specificity (not over-flagging).\n- Step 4: Alternative rules exist: $$2 \\times \\text{IQR}$$ (more conservative) or $$\\bar{x} \\pm 2\\sigma$$ (mean-based). The exam will usually specify which rule to use.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "Why does the variance formula contain a *square* of the mean, $$[E(X)]^2$$, rather than just $$E(X)$$? (3 steps)", "answer": "- Step 1: Variance is defined as $$E[(X - \\mu)^2]$$ — the expected squared deviation from the mean. The square ensures positive and negative deviations don't cancel.\n- Step 2: Expand: $$E[(X-\\mu)^2] = E[X^2 - 2\\mu X + \\mu^2] = E(X^2) - 2\\mu E(X) + \\mu^2$$. Since $$E(X) = \\mu$$, this simplifies to $$E(X^2) - 2\\mu^2 + \\mu^2 = E(X^2) - \\mu^2$$.\n- Step 3: So the $$\\mu^2$$ term arises naturally from expanding the square in the definition. The \"square of the mean\" is just $$\\mu^2 = [E(X)]^2$$.\n+ This also shows why variance is in *squared units* of $$X$$ — and why standard deviation (the square root) is in the original units.\n\nSo $$[E(X)]^2$$ isn't an arbitrary subtraction — it falls out algebraically from \"average squared deviation\".", "source": "Opus 4.7 ②", "_id": "opus_2_29"}, {"question": "What does \"on average\" really mean in the regression context, and how does this connect to the residuals being zero on average? (3 steps)", "answer": "- Step 1: The regression line is fitted so that the *mean* of the residuals (vertical deviations from the line) is zero. Some points lie above, some below, and they cancel on average.\n- Step 2: This is exactly what \"on average for each 1 cm increase, weight increases by 3.27 kg\" formalises: across the whole population (or sample), the *mean* upward step matches the gradient. Individual horses can deviate.\n- Step 3: So the gradient is the *average* rate of change, and \"average\" here has a precise mathematical meaning: the sum of residuals (errors) is zero by construction.\n\nThis is also why regression is sensitive to outliers — one extreme point pulls the line because the fitting criterion (least squares) weights large residuals heavily.", "source": "Opus 4.7 ②", "_id": "opus_2_38"}, {"question": "Why is it strategically valuable to draw a tree diagram for a multi-step probability question, even when the question doesn't ask for one? (4 steps)", "answer": "- Step 1: Tree diagrams visualize the conditional structure — each branch from a node represents a conditional probability *given* you've arrived at that node.\n- Step 2: They make the multiplication rule along a path automatic: $$P(\\text{path}) = $$ product of probabilities along the branches.\n- Step 3: They expose all the ways an event can occur (sum across paths), which is the law of total probability in action.\n- Step 4: They reveal completeness constraints: each set of branches from a node must sum to 1, giving you a free check on your numbers.\n\nWithout the picture, students often miss a path or double-count. The tree is a small time investment that prevents catastrophic errors.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "What is the law of total probability, and how does it manifest naturally on a tree diagram? (3 steps)", "answer": "- Step 1: If $$B_1, B_2, \\ldots, B_n$$ partition the sample space (mutually exclusive, exhaustive), then $$P(A) = \\sum_i P(A \\cap B_i) = \\sum_i P(B_i) P(A | B_i)$$.\n- Step 2: On a tree, the first-level branches form a partition. To find $$P(A)$$ where $$A$$ is some second-level event, you multiply along each branch (giving the joints $$P(B_i \\cap A)$$) then sum across branches.\n- Step 3: Geometric picture: $$A$$'s total probability is decomposed by *which path led to it*. We're slicing $$A$$ by which $$B_i$$ it came from, then summing the slices.\n\nThis is the operational meaning of \"multiply along paths, add across paths\" — it's the law of total probability in disguise.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "For a normal distribution, what are the approximate probabilities of being within 1, 2, and 3 standard deviations of the mean, and why are these useful to remember?", "answer": "- Step 1: $$P(\\mu - \\sigma < X < \\mu + \\sigma) \\approx 68\\%$$.\n- Step 2: $$P(\\mu - 2\\sigma < X < \\mu + 2\\sigma) \\approx 95\\%$$.\n- Step 3: $$P(\\mu - 3\\sigma < X < \\mu + 3\\sigma) \\approx 99.7\\%$$.\n- Step 4: Uses:\n+ Sanity check calculator answers (if you compute $$P(\\mu < X < \\mu + \\sigma)$$ and get 0.5, you know it should be ≈0.34).\n+ Spot outliers visually (beyond $$2\\sigma$$ is unusual; beyond $$3\\sigma$$ is very rare).\n+ Quick mental estimates without a calculator.\n\nMnemonic: 68 – 95 – 99.7, the \"empirical rule\".", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "What is the standard normal distribution, and why do we transform any normal $$X \\sim N(\\mu, \\sigma^2)$$ to it before doing probability calculations? (3 steps)", "answer": "- Step 1: The standard normal $$Z \\sim N(0, 1)$$ has mean 0, variance 1. Its CDF $$\\Phi(z)$$ is tabulated/built into calculators.\n- Step 2: For any $$X \\sim N(\\mu, \\sigma^2)$$, the transformation $$Z = \\dfrac{X - \\mu}{\\sigma}$$ produces a standard normal. Subtracting $$\\mu$$ centres the distribution; dividing by $$\\sigma$$ rescales to unit spread.\n- Step 3: Why bother? Before electronic calculators, only one set of normal tables was needed (for $$Z$$), making any normal problem reducible to a standard one. Even now, conceptually it's cleaner: $$z = 2$$ always means \"2 standard deviations above the mean\", regardless of the original units.\n\nIntuition: standardizing measures how *unusual* a value is, in units of $$\\sigma$$.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "What is the product moment correlation coefficient $$r$$, what range does it lie in, and what do extreme values mean? (4 steps)", "answer": "- Step 1: $$r$$ measures the strength and direction of a *linear* relationship between two variables.\n- Step 2: Range: $$-1 \\le r \\le 1$$.\n- Step 3: Interpretation:\n+ $$r = +1$$: perfect positive linear relationship (all points on a line of positive gradient).\n+ $$r = -1$$: perfect negative linear relationship.\n+ $$r = 0$$: no linear relationship (but data could still be related by a curve!).\n- Step 4: The closer $$|r|$$ is to 1, the more tightly the data clusters around a straight line. Crucially, $$r$$ says nothing about gradient steepness — a near-flat line of perfectly aligned points still has $$|r| = 1$$.\n\nTrap: $$r = 0$$ doesn't mean \"independent\". It means \"no *linear* trend\".", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "Is $$P(A|B)$$ always equal to $$P(B|A)$$? If not, give a simple intuitive example showing they differ. (2 steps)", "answer": "- Step 1: No, they are generally **not** equal. $$P(A|B)$$ asks \"given B happened, what's the chance of A?\" while $$P(B|A)$$ asks \"given A happened, what's the chance of B?\" These are fundamentally different questions.\n- Step 2: Example: Let A = \"the person has a fever\" and B = \"the person has the flu.\" $$P(B|A)$$ = probability of having the flu given you have a fever — this is moderate, since many things cause fever. $$P(A|B)$$ = probability of having a fever given you have the flu — this is very high, since flu almost always causes fever. Clearly $$P(A|B) \\neq P(B|A)$$.\n\nThey are equal only when $$P(A) = P(B)$$, which is a special case, not the general rule. Bayes' theorem connects them: $$P(A|B) = \\frac{P(B|A) \\cdot P(A)}{P(B)}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_14"}, {"question": "A boxplot has $$Q_3 - Q_2 > Q_2 - Q_1$$. What does this tell you about the distribution, and how would you *interpret* it in context for a dataset of weights? (3 steps)", "answer": "- Step 1: $$Q_2 - Q_1$$ measures the spread of the lower 25%–50% of data; $$Q_3 - Q_2$$ measures the spread of the 50%–75%. If the upper gap is larger, the upper half of the data is more spread out than the lower half.\n- Step 2: This is **positive skew** (or \"skewed to the right\"). The right tail is longer / data is more dispersed above the median.\n- Step 3: Interpreting in context: \"The weights above the median are more varied (spread out) than the weights below the median.\" Notice we translate \"$$Q_3 - Q_2$$ vs $$Q_2 - Q_1$$\" into a statement about the actual variable (weight) and its median — that's the *interpret* part.\n\nCommon slip: writing \"$$Q_3 - Q_1 > Q_2 - Q_1$$\" — that's not the skewness test; the test compares the two *halves* of the IQR.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "Derive why variance is unaffected by adding a constant (Var(X + b) = Var(X)), but scales with multiplication (Var(aX) = a²Var(X)). (4 steps)", "answer": "- Step 1: Variance measures spread around the mean. Adding a constant shifts all data points equally: $ \\text{Var}(X + b) = \\mathbb{E}[(X + b - (\\mu + b))^2] = \\mathbb{E}[(X - \\mu)^2] = \\text{Var}(X) $.  \n- Step 2: Multiplying by a constant scales deviations from the mean: $ \\text{Var}(aX) = \\mathbb{E}[(aX - a\\mu)^2] = a^2\\mathbb{E}[(X - \\mu)^2] = a^2\\text{Var}(X) $.  \n+ Sub-case: Scaling by 2 doubles deviations but squares their squared contributions.  \n- Step 3: Intuitive example: If temperatures in Celsius have variance σ², converting to Kelvin (adding 273.15) doesn't change spread. Converting to Fahrenheit (multiplying by 9/5) increases variance by (9/5)².  \n\n[Optional: Misconception probe: Why isn't Var(aX) = |a|Var(X)? Because squaring removes directionality.]", "source": "Qwen 3 ①", "_id": "qwen_1_2"}, {"question": "State and explain the formula $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$. Why is this often easier to compute than the direct definition $$\\text{Var}(X) = E[(X - \\mu)^2]$$?", "answer": "- Step 1: The definition is $$\\text{Var}(X) = E[(X - \\mu)^2] = \\sum (x - \\mu)^2 P(x)$$, where $$\\mu = E(X)$$.\n- Step 2: Expanding: $$E[(X - \\mu)^2] = E[X^2 - 2\\mu X + \\mu^2] = E(X^2) - 2\\mu E(X) + \\mu^2 = E(X^2) - \\mu^2$$.\n- Step 3: The computational advantage:\n+ With the direct formula, you must subtract $$\\mu$$ from every $$x$$, square, then sum — lots of arithmetic.\n+ With $$E(X^2) - [E(X)]^2$$, you just compute $$\\sum x^2 P(x)$$ once and subtract $$\\mu^2$$.\n- Step 4: This formula is in the formula book *for a reason* — it's the standard tool for variance questions, and forgetting it costs easy marks.", "source": "Opus 4.7 ①", "_id": "opus_1_11"}, {"question": "Why is interpolation generally more reliable than extrapolation when using a regression line? (3 steps)", "answer": "- Step 1: Interpolation estimates values within the **observed data range**, where the model has empirical support. For example, predicting plant growth at 25°C when data spans 20-30°C.  \n- Step 2: Extrapolation assumes the relationship remains linear **beyond observed data**, which risks ignoring non-linearities (e.g., saturation effects). Example: Extrapolating plant growth at 40°C from data up to 30°C might ignore heat stress.  \n+ Sub-case: Extrapolation can fail catastrophically in real-world scenarios (e.g., financial models predicting unchecked growth pre-2008 crash).  \n- Step 3: Statistical uncertainty quantification (e.g., confidence intervals) widens drastically during extrapolation, reflecting reduced reliability.  \n\n[Optional: Edge case: When is extrapolation justified? When physical laws guarantee linearity (e.g., Ohm's law V=IR in electronics).]", "source": "Qwen 3 ①", "_id": "qwen_1_1"}, {"question": "What is a discrete uniform distribution, and what's the intuition for its expected value? (3 steps)", "answer": "- Step 1: A discrete uniform distribution over values $$\\{1, 2, \\dots, n\\}$$ assigns equal probability $$1/n$$ to each outcome — like a fair die.\n- Step 2: Because each value is equally likely, the expected value is simply the arithmetic mean of the values: $$E(X) = \\frac{1 + 2 + \\dots + n}{n} = \\frac{n+1}{2}$$.\n- Step 3: Intuitively, with no value preferred, the \"balance point\" of the distribution sits exactly at the middle of the range. This is why a fair 6-sided die has $$E(X) = 3.5$$.\n\nThe variance has a similar clean formula: $$\\text{Var}(X) = \\frac{n^2 - 1}{12}$$.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "In a conditional probability question worded \"given that Paul is late, find the probability he travelled by car\", which probability is the numerator and which is the denominator, and why? (3 steps)", "answer": "- Step 1: We want $$P(\\text{Car} | \\text{Late}) = \\dfrac{P(\\text{Car} \\cap \\text{Late})}{P(\\text{Late})}$$.\n- Step 2: Numerator = the joint probability of the *specific path* (Car AND Late), which on the tree is one root-to-leaf product: $$P(\\text{Car}) \\cdot P(\\text{Late}|\\text{Car})$$.\n- Step 3: Denominator = the probability of the *condition*, $$P(\\text{Late})$$, which is the sum of all root-to-leaf products ending in Late.\n+ Conceptually: among all the ways to end up Late, what fraction came via Car? Numerator picks one path, denominator sums all paths that share the condition.\n\nWhy not just multiply $$P(\\text{Car})$$ and $$P(\\text{Late})$$? Because Car and Late are *not* independent — late depends on transport mode. You must use the conditional form.", "source": "Opus 4.7 ②", "_id": "opus_2_18"}, {"question": "When data is coded as $$u = \\dfrac{x - a}{b}$$, how do the mean, variance, and correlation transform — and why? (4 steps)", "answer": "- Step 1: Mean: $$\\bar{u} = \\dfrac{\\bar{x} - a}{b}$$. Coding is linear, so the mean transforms the same way as the data.\n- Step 2: Variance: $$\\text{Var}(u) = \\dfrac{\\text{Var}(x)}{b^2}$$. The shift $$a$$ disappears (variance ignores location); scaling by $$1/b$$ becomes $$1/b^2$$ in variance.\n- Step 3: Standard deviation: $$\\sigma_u = \\dfrac{\\sigma_x}{|b|}$$ — scales linearly with $$1/b$$.\n- Step 4: Correlation $$r$$: *unchanged*. Coding is linear, and $$r$$ is invariant under linear transformations of either variable. This is why coding is safe — it simplifies arithmetic without changing the relationship.\n\nIntuition: coding is just a change of units. The shape of the relationship (correlation, regression structure) is unchanged; only the numerical scale changes.", "source": "Opus 4.7 ①", "_id": "opus_1_27"}, {"question": "Why might you prefer to *divide* both sides of an equation by a number rather than multiply, when solving algebraically under time pressure?", "answer": "- Step 1: Dividing often produces simpler numbers when there's a common factor. E.g. solving $$0.31 \\times 0.75 = (\\text{stuff}) \\times 0.31$$ — dividing both sides by 0.31 instantly eliminates it and leaves $$0.75 = \\text{stuff}$$.\n- Step 2: Multiplying might require carrying through a messy product and then dividing later anyway — extra arithmetic, more error opportunities.\n- Step 3: Strategically, *look for the operation that cancels the most complicated factor in one move*. That's usually division by the awkward number.\n\nLesson: algebra isn't about following one fixed procedure; it's about choosing the operation that minimizes work.", "source": "Opus 4.7 ①", "_id": "opus_1_33"}, {"question": "For a box plot, how do you tell whether the data is positively skewed, negatively skewed, or symmetric, using only the quartiles? (3 steps)", "answer": "- Step 1: Compute the two gaps around the median: $$Q_2 - Q_1$$ (lower half spread) and $$Q_3 - Q_2$$ (upper half spread).\n- Step 2: Compare:\n+ $$Q_3 - Q_2 > Q_2 - Q_1$$ → positive skew (long upper tail; data more spread above the median).\n+ $$Q_3 - Q_2 < Q_2 - Q_1$$ → negative skew (long lower tail).\n+ Equal → symmetric.\n- Step 3: Each quartile gap contains 25% of the data, so a larger gap on one side means that 25% is *more spread out* on that side — the visual \"tail\".\n\nTrap: students sometimes compare $$Q_3$$ vs $$Q_1$$ directly. That's wrong — you must compare the *gaps* relative to the median.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "Explain why the gradient of a regression line must be interpreted in context using specific units, and why simply stating \"positive/negative correlation\" is insufficient. (3 steps)", "answer": "- Step 1: The gradient quantifies the **rate of change** between variables. For example, a gradient of 3.27 kg/cm in a height-weight regression means \"for every 1 cm increase in height, weight increases by 3.27 kg on average.\"  \n- Step 2: Correlation alone (positive/negative) only describes the **direction** of the relationship, not the **magnitude**. Two datasets could have identical correlation coefficients but vastly different gradients.  \n+ Example: A drug dosage vs. recovery time regression with a gradient of -2 days/mg (strong effect) vs. -0.1 days/mg (negligible effect) both show negative correlation but vastly different practical implications.  \n- Step 3: Contextual units ensure **actionable insights**. Non-mathematicians (e.g., policymakers) need concrete interpretations like \"each additional hour of study increases exam scores by 5 points\" rather than abstract statistical terms.  \n\n[Optional: Misconception probe: Why can a steep gradient coexist with weak correlation? Because correlation measures linearity, not slope magnitude.]", "source": "Qwen 3 ①", "_id": "qwen_1_0"}, {"question": "Why is the formula $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$ worth memorizing for S1 exams, and what's the analogous formula for $$E(aX + b)$$?", "answer": "- Step 1: For expected value (linearity): $$E(aX + b) = aE(X) + b$$. Both shift and scale propagate directly because expectation is linear.\n- Step 2: For variance: $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$. The shift $$b$$ disappears (variance is location-invariant); the scale $$a$$ gets squared (variance is in *squared* units).\n- Step 3: Why memorize: S1 papers almost always include a part where you're asked for $$\\text{Var}(aX + b)$$ after computing $$\\text{Var}(X)$$. It's \"free marks\" if you know the formula, and easy to lose if you forget the squaring.\n- Step 4: Trap: $$\\text{SD}(aX + b) = |a| \\cdot \\text{SD}(X)$$ — note the absolute value (since SD is non-negative).", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "Why is the word \"average\" crucial when interpreting a regression gradient, even if the question doesn't explicitly ask for it? (2 steps)", "answer": "- Step 1: A regression line is fitted to scattered data — the points do not lie exactly on the line. Any single horse that is 1 cm taller will not necessarily weigh exactly 3.27 kg more; some will weigh more, some less.\n- Step 2: The gradient describes the *mean* behaviour of the population, the trend. Without the word \"average\", the statement becomes a deterministic claim that the data clearly contradicts.\n\nThis is why mark schemes routinely award the mark only if \"on average\" (or equivalent) appears.", "source": "Opus 4.7 ②", "_id": "opus_2_4"}, {"question": "Underline-the-keywords is a tutoring tip Harry emphasized. What kinds of words in a probability/statistics question are critical to flag, and why?", "answer": "- Step 1: \"Independent\" → triggers the multiplication rule $$P(A \\cap B) = P(A)P(B)$$.\n- Step 2: \"Given that\" → conditional probability; set up the $$P(A \\mid B)$$ formula.\n- Step 3: \"Interpret\" / \"in context\" → demands a sentence using the actual variables and units, not just math.\n- Step 4: \"Show that\" → must show working that arrives at the stated answer; just writing the answer scores 0.\n- Step 5: \"Hence\" → forces you to use a previous part's result; doing the question afresh may lose method marks.\n- Step 6: \"Only one outlier\" / \"more reliable\" / \"describe and interpret\" → these phrasings often have specific keywords the mark scheme requires you to echo in your answer.\n\nWithout underlining, the brain skims and misses these signals, leading to lost marks for content you actually understood.", "source": "Opus 4.7 ①", "_id": "opus_1_24"}, {"question": "Conceptually, what is a \"residual\" in linear regression, and why does the least-squares regression line minimize the sum of *squared* residuals rather than just the sum?", "answer": "- Step 1: A residual is the vertical distance from a data point to the regression line: $$e_i = y_i - \\hat{y}_i$$. It's the error the model makes for that point.\n- Step 2: If we just summed residuals, positives and negatives would cancel — a terrible line could have $$\\sum e_i = 0$$.\n- Step 3: Squaring achieves two things:\n+ Removes the sign (all errors contribute positively).\n+ Penalizes large errors more than small ones (an error of 2 contributes 4, but an error of 4 contributes 16) — encouraging the line to avoid big misses.\n- Step 4: Squaring (rather than absolute value) also makes the optimization smooth (differentiable), giving the clean closed-form formulas for the gradient and intercept.\n\nSo least squares = \"average behaviour with extra penalty for outliers\".", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "What is a histogram (in the formal S1 sense), and why is the *area* of each bar — not the height — the meaningful quantity? (3 steps)", "answer": "- Step 1: A histogram displays continuous data grouped into classes. The vertical axis is *frequency density* = frequency ÷ class width.\n- Step 2: Therefore the area of each bar = frequency density × class width = frequency. Area = frequency.\n- Step 3: This is essential when class widths differ. If two classes have the same frequency but different widths, the wider one would look misleadingly tall on a frequency-vs-class plot — using density makes the *area* equal, giving an honest visual.\n\nTrap: never read frequency directly off the height when widths vary — always compute area.", "source": "Opus 4.7 ①", "_id": "opus_1_29"}, {"question": "Conceptually, why does the regression line of $$y$$ on $$x$$ generally differ from the regression line of $$x$$ on $$y$$? (3 steps)", "answer": "- Step 1: The regression of $$y$$ on $$x$$ minimises *vertical* squared distances — errors measured in $$y$$. It treats $$x$$ as known and predicts $$y$$.\n- Step 2: The regression of $$x$$ on $$y$$ minimises *horizontal* squared distances — errors in $$x$$. It treats $$y$$ as known and predicts $$x$$.\n- Step 3: Different error directions ⇒ different optimal slopes. The two lines coincide only when the data is perfectly correlated (then both errors are zero anyway).\n+ Practical implication: if a question gives you a regression equation, always check which is the *predictor* (independent) and which is the *response*. You can't simply invert the equation algebraically to reverse the prediction direction.", "source": "Opus 4.7 ②", "_id": "opus_2_37"}, {"question": "In an ESAT-style \"proportionality\" problem, you're told two variables are related by an equation, and each variable is scaled by a known factor. What's the general strategy to find the resulting scaling of another variable without plugging in numbers? (4 steps)", "answer": "- Step 1: Write each variable as $$x_{\\text{new}} = k_x \\cdot x_{\\text{old}}$$ where $$k_x$$ is the scaling factor (e.g. $$3/2$$ means a 50% increase).\n- Step 2: Substitute into the governing equation, replacing every variable by (factor × old).\n- Step 3: Factor out the \"old\" version of the equation on the RHS — the leftover product of scaling factors is the net coefficient.\n+ If a term is squared, its scaling factor gets squared too.\n+ If a term is in a denominator, its scaling factor goes to the reciprocal.\n- Step 4: Compare new coefficient to 1: greater than 1 → increase; less than 1 → decrease. The percentage change is $$|k_{\\text{net}} - 1| \\times 100\\%$$.\n\nThe key insight: scaling factors propagate multiplicatively through the equation, so you never need actual numerical values.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "Given that $$\\text{Var}(X) = 1.36$$, what is $$\\text{Var}(5 - 3X)$$? Walk through the rule that governs this transformation. (3 steps)", "answer": "- Step 1: The general rule for linear transformations of variance is: $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$. The constant shift $$b$$ has **no effect** on variance (it just slides the distribution without changing its spread), while the scaling factor $$a$$ is **squared** because variance measures squared deviations from the mean.\n- Step 2: In this case, $$aX + b = 5 - 3X$$, so $$a = -3$$ and $$b = 5$$. Applying the rule: $$\\text{Var}(5 - 3X) = (-3)^2 \\cdot \\text{Var}(X) = 9 \\times 1.36$$.\n- Step 3: Computing: $$9 \\times 1.36 = 12.24$$. Note that the negative sign on $$a$$ disappears because we square it — stretching or reflecting the data by a factor of 3 both increase the spread by a factor of 3, so the variance increases by a factor of 9.\n\nFor expectation, the rule is different: $$E(aX + b) = aE(X) + b$$. Here, $$b$$ does matter for the mean, but not for the variance.", "source": "GLM 5.1 ①", "_id": "glm_1_8"}, {"question": "What is an outlier (in the standard A-Level convention), and what is the geometric reasoning behind the \"1.5 × IQR\" rule? (3 steps)", "answer": "- Step 1: A common definition: an outlier is any data point outside $$[Q_1 - 1.5 \\cdot \\mathrm{IQR}, \\, Q_3 + 1.5 \\cdot \\mathrm{IQR}]$$, where $$\\mathrm{IQR} = Q_3 - Q_1$$.\n- Step 2: Why 1.5? The IQR captures the middle 50% of data. A \"fence\" placed 1.5 IQRs beyond each quartile sits roughly where, in a normal distribution, you'd expect almost no data — so anything beyond is genuinely unusual rather than just at the tail.\n- Step 3: The rule is a heuristic, not a theorem. Some textbooks use 2 standard deviations instead, or other multipliers. Always check what definition the question gives — exam questions specify it explicitly.\n\nConceptual point: outliers are defined *relative to* a spread measure (IQR or SD), not against absolute thresholds.", "source": "Opus 4.7 ②", "_id": "opus_2_24"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "In a joint variation problem, if an equation relates variables and some variables change by known factors, what is the most efficient algebraic strategy to find the resulting change in the remaining variable? (3 steps)", "answer": "- Step 1: Replace each changed variable with its new factored form. For example, if $$x$$ increases by 50%, write $$x_{\\text{new}} = \\tfrac{3}{2}x$$. If $$y$$ doubles, write $$y_{\\text{new}} = 2y$$. If a variable stays the same, leave it unchanged.\n- Step 2: **Factor out** common bracketed expressions rather than expanding (e.g., binomial expansion). If the same bracket appears multiple times, pull it out as a common factor — and if it appears multiplied by itself, it becomes a power. This keeps the algebra clean and avoids messy expansion.\n- Step 3: Compute the overall numerical coefficient by multiplying/dividing the remaining fractions. **Cancel before you calculate** — look for common factors between numerators and denominators to simplify. The final coefficient tells you the factor of change: e.g., a coefficient of $$\\tfrac{9}{10}$$ means a 10% decrease.\n\nThe key insight: factorizing first is almost always faster and less error-prone than expanding in these proportional-reasoning problems.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "When doing non-calculator arithmetic with fractions and decimals mixed together (e.g., dividing $$\\tfrac{9}{5}$$ by 2), what two practical habits prevent the most common errors? (2 steps)", "answer": "- Step 1: **Convert all decimals to fractions first.** For example, write 0.8 as $$\\tfrac{4}{5}$$ instead. Mixing fractions and decimals creates confusion about where numbers \"land\" after division — fractions have clear rules for multiplication and division that decimals obscure.\n- Step 2: **Use \"keep-change-flip\" (burger method) for fraction division carefully.** Dividing $$\\tfrac{9}{5} \\div 2$$ means dividing by $$\\tfrac{2}{1}$$, so flip to get $$\\tfrac{9}{5} \\times \\tfrac{1}{2} = \\tfrac{9}{10}$$. The classic mistake is moving the 2 to the numerator — it must go to the denominator because you are *dividing* by it, not multiplying.\n\nA quick sanity check: if you're dividing by a number greater than 1, the result must be *smaller* than what you started with.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "An exam question says \"interpret the gradient of the regression line\" in a context where the y-variable is weight (kg) and the x-variable is height (cm), and the gradient is 3.27. What must your answer include to guarantee full marks? (3 steps)", "answer": "- Step 1: **Include the phrase \"on average.\"** A regression line models the *average* trend — individual data points scatter around it. Saying \"for each 1 cm increase in height, weight increases by 3.27 kg\" without \"on average\" is too definitive and loses the mark.\n- Step 2: **Use the units and variables from the specific question.** Don't say \"for each unit increase in x\" — say \"for each 1 cm increase in height.\" Don't say \"y increases by 3.27\" — say \"the weight increases by 3.27 kg.\" The word \"interpret\" means explain to a non-mathematician using the real-world context.\n- Step 3: **State the direction and magnitude together.** A complete answer: \"On average, for each 1 cm increase in height, the weight increases by 3.27 kg.\" This tells the story: direction (increases), scale (1 cm → 3.27 kg), and uncertainty (on average).\n\nThe word \"interpret\" in a stats exam always means: translate the mathematics into plain language using the specific context and units of the problem.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "A regression line was fitted to data for horses with heights between 145 cm and 185 cm. You use the line to estimate the weight of a horse that is 160 cm tall, and also to estimate the weight of a horse that is 195 cm tall. Which estimate is more reliable, and what is the key vocabulary you must use to justify it? (2 steps)", "answer": "- Step 1: The 160 cm estimate is more reliable because 160 cm falls *within* the range of the original data (145–185 cm). This is called **interpolation** — predicting within the observed data range. The patterns in the data support this estimate.\n- Step 2: The 195 cm estimate is less reliable because 195 cm falls *outside* the range of the original data. This is called **extrapolation** — predicting beyond the observed data range. The regression line may no longer be valid out there; the relationship could curve, flatten, or reverse. We have no data to support conclusions in that region.\n\nTo guarantee the mark, you must use the words **interpolation** and **extrapolation** explicitly, and state that interpolation is more reliable / extrapolation can be unreliable.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "Why is extrapolation considered unreliable in regression analysis? Give a concrete reason beyond just \"it's outside the range.\" (2 steps)", "answer": "- Step 1: The regression line is only a model fitted to the observed data range. Outside that range, the underlying relationship between the variables might change entirely — it could level off, reverse direction, or become non-linear. For example, a horse's weight might increase with height up to a point, but beyond a certain height, additional height might correspond to a different breed with different proportions.\n- Step 2: There is **no data** to validate the model's predictions in the extrapolated region. The regression line could fit perfectly within the data range but be completely wrong outside it. This is why extrapolation \"can be unreliable\" — it's not *always* wrong, but there's no evidence to support it, making it a risky assumption.\n\nThink of it as: interpolation = reading between known points (safe); extrapolation = guessing beyond known points (risky).", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "For a dataset, Q1 = 12, Q2 (median) = 18, Q3 = 30. How do you determine the direction of skew, and what is the common mistake in how students express the comparison? (3 steps)", "answer": "- Step 1: Compare the gap above the median to the gap below the median. The lower gap is $$Q2 - Q1 = 18 - 12 = 6$$. The upper gap is $$Q3 - Q2 = 30 - 18 = 12$$.\n- Step 2: Since the upper gap (12) is greater than the lower gap (6), the data is more spread out above the median. This means the distribution has **positive skew** (also called \"positively skewed\").\n+ The common mistake: students write \"$$Q3 > Q2$$ so it's positive skew\" — but $$Q3$$ is *always* greater than $$Q2$$ by definition. The correct comparison is between the **differences**: $$Q3 - Q2$$ versus $$Q2 - Q1$$.\n- Step 3: For positive skew: $$Q3 - Q2 > Q2 - Q1$$. For negative skew: $$Q3 - Q2 < Q2 - Q1$$. For symmetry (no skew): $$Q3 - Q2 \\approx Q2 - Q1$$.\n\nThe skew direction tells you which tail is longer: positive skew = longer right tail = data stretched out above the median.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": true}, {"question": "A box plot of Club B members' weights shows positive skew (Q3 − Q2 > Q2 − Q1). The exam asks you to \"interpret\" this skewness. What does \"interpret\" require you to say that a mere \"describe\" does not? (2 steps)", "answer": "- Step 1: **Describe** means state the mathematical fact: \"Club B is positively skewed\" or \"$$Q3 - Q2 > Q2 - Q1$$.\" This is a mathematical observation.\n- Step 2: **Interpret** means translate into real-world language using the context. You must say something like: \"The weights of Club B members are more varied above the median\" or \"The weights are more spread out in the upper quarter than the lower quarter.\" The key is connecting the abstract skew to what it means for the actual variable (weights) in context.\n\nThe 25% of data between Q2 and Q3 is more spread out than the 25% between Q1 and Q2 — so there's greater variability in weight among the heavier members.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": false}, {"question": "The variance formula $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$ is frequently forgotten or misapplied. Why is this formula structured this way, and what is the most common mistake students make when computing it from a probability table? (3 steps)", "answer": "- Step 1: The formula comes from the definition $$\\text{Var}(X) = E[(X - \\mu)^2]$$ where $$\\mu = E(X)$$. Expanding the square: $$E[(X-\\mu)^2] = E[X^2 - 2\\mu X + \\mu^2] = E(X^2) - 2\\mu E(X) + \\mu^2 = E(X^2) - \\mu^2$$. So $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$. This is computationally much easier than computing each $$(x_i - \\mu)^2$$ separately.\n- Step 2: To compute $$E(X^2)$$ from a probability table: for each value $$x_i$$, square it to get $$x_i^2$$, then multiply by its probability $$p_i$$, and **sum** all the results. That is, $$E(X^2) = \\sum x_i^2 \\cdot p_i$$. There is **no dividing by $$n$$** — this is a weighted sum, not an average of squared values.\n- Step 3: The most common mistake is dividing by $$n$$ (the number of data points) after summing $$x_i^2 \\cdot p_i$$. This error comes from confusing the probability distribution formula with the raw-data formula for variance. In a probability table, the probabilities already act as weights — they sum to 1 — so no further division is needed.\n\nMnemonic: \"$$E(X^2)$$\" means \"expectation of $$X^2$$\" = $$\\sum x^2 \\cdot P(X=x)$$. No division. Ever.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "Given that $$\\text{Var}(X) = 1.36$$, what is $$\\text{Var}(5 - 3X)$$? Walk through the rule that governs this transformation. (3 steps)", "answer": "- Step 1: The general rule for linear transformations of variance is: $$\\text{Var}(aX + b) = a^2 \\text{Var}(X)$$. The constant shift $$b$$ has **no effect** on variance (it just slides the distribution without changing its spread), while the scaling factor $$a$$ is **squared** because variance measures squared deviations from the mean.\n- Step 2: In this case, $$aX + b = 5 - 3X$$, so $$a = -3$$ and $$b = 5$$. Applying the rule: $$\\text{Var}(5 - 3X) = (-3)^2 \\cdot \\text{Var}(X) = 9 \\times 1.36$$.\n- Step 3: Computing: $$9 \\times 1.36 = 12.24$$. Note that the negative sign on $$a$$ disappears because we square it — stretching or reflecting the data by a factor of 3 both increase the spread by a factor of 3, so the variance increases by a factor of 9.\n\nFor expectation, the rule is different: $$E(aX + b) = aE(X) + b$$. Here, $$b$$ does matter for the mean, but not for the variance.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": true}, {"question": "Two events A and B are stated to be **independent**. What equation must immediately come to mind, and why does this equation capture the meaning of independence? (2 steps)", "answer": "- Step 1: The equation is $$P(A \\cap B) = P(A) \\times P(B)$$. This is the defining property of independent events and should be your first thought when you see \"A and B are independent.\"\n- Step 2: This equation captures independence because it says: the probability of both A and B happening together is exactly what you'd get if their probabilities simply multiplied with no interaction. In other words, knowing that A occurred gives you **no additional information** about whether B occurred — the probability of B is the same regardless of A. Formally, $$P(B|A) = P(B)$$, which is equivalent to $$P(A \\cap B) = P(A) \\times P(B)$$.\n\nThis is the key that \"unlocks\" Venn diagram problems: once you know independence, you can set up an equation linking the unknown probabilities and solve for them.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": true}, {"question": "In a Venn diagram with events A, B, and C, you need to find $$P(B | C')$$. Write down the formula and explain how to identify the numerator and denominator on the diagram. (3 steps)", "answer": "- Step 1: The conditional probability formula is $$P(B | C') = \\dfrac{P(B \\cap C')}{P(C')}$$.\n- Step 2: The **numerator** $$P(B \\cap C')$$ is the probability of being in B but NOT in C. On the Venn diagram, this is all the regions inside circle B that are outside circle C — including the part of B that overlaps only with A (if it exists), and the part of B that overlaps with neither A nor C.\n- Step 3: The **denominator** $$P(C')$$ is the probability of NOT being in C. This includes everything outside circle C: the A-only region, the B-only region, the A∩B-only region (outside C), and the region outside all three circles. Importantly, it does NOT include the A∩C, B∩C, or A∩B∩C regions.\n\nA common mistake: using $$1 - P(C')$$ for the denominator, which would give you $$P(C)$$ instead. The denominator is directly $$P(C')$$ — just add up all the regions outside C.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "In a probability tree diagram, what constraint must the branches from any single node satisfy, and why? What is the practical consequence when filling in a tree diagram? (2 steps)", "answer": "- Step 1: The probabilities on all branches from a single node must **sum to 1**. This is because those branches represent all possible outcomes at that decision point, and one of them must occur — certainty in probability is represented by 1. For example, if Paul travels by car, bicycle, or walks, then $$P(\\text{car}) + P(\\text{bicycle}) + P(\\text{walk}) = 1$$.\n- Step 2: The practical consequence: if you know all but one branch probability from a node, you can find the missing one by subtracting from 1. For instance, if $$P(\\text{late} | \\text{car}) = \\tfrac{1}{5}$$, then immediately $$P(\\text{not late} | \\text{car}) = 1 - \\tfrac{1}{5} = \\tfrac{4}{5}$$. This works for every node at every level of the tree.\n\nThis is why tree diagrams are so powerful: each node is a self-contained probability space where the options are exhaustive and mutually exclusive.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "Paul travels to work by car ($$P = \\tfrac{1}{2}$$), bicycle ($$P = \\tfrac{1}{6}$$), or walking ($$P = \\tfrac{1}{3}$$). Given he takes the car, the probability he's late is $$\\tfrac{1}{5}$$; given bicycle, it's $$\\tfrac{1}{10}$$; given walking, it's $$\\tfrac{1}{20}$$. To find the overall probability he's late, which paths through the tree diagram contribute, and what operation combines them? (2 steps)", "answer": "- Step 1: Paul can be late via three mutually exclusive routes: (car AND late), (bicycle AND late), or (walking AND late). Each route's probability is found by multiplying along the branches: $$P(\\text{car}) \\times P(\\text{late}|\\text{car}) = \\tfrac{1}{2} \\times \\tfrac{1}{5} = \\tfrac{1}{10}$$, $$P(\\text{bicycle}) \\times P(\\text{late}|\\text{bicycle}) = \\tfrac{1}{6} \\times \\tfrac{1}{10} = \\tfrac{1}{60}$$, $$P(\\text{walk}) \\times P(\\text{late}|\\text{walk}) = \\tfrac{1}{3} \\times \\tfrac{1}{20} = \\tfrac{1}{60}$$.\n- Step 2: Since these three routes are mutually exclusive (he can only take one transport method), we **add** them: $$P(\\text{late}) = \\tfrac{1}{10} + \\tfrac{1}{60} + \\tfrac{1}{60} = \\tfrac{6}{60} + \\tfrac{1}{60} + \\tfrac{1}{60} = \\tfrac{8}{60} = \\tfrac{2}{15}$$.\n\nRule: multiply along branches (for \"AND\"), add across routes (for \"OR\" between mutually exclusive paths).", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "A question asks: \"Given that Paul is late, find the probability he travelled by car.\" Write this using conditional probability notation and identify the key mistake students make when setting up the formula. (3 steps)", "answer": "- Step 1: In notation, this is $$P(\\text{car} | \\text{late}) = \\dfrac{P(\\text{car} \\cap \\text{late
