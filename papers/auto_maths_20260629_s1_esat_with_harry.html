-linear operation: large deviations are amplified more than small ones.\n+ Example: $$X = \\pm 1$$ each with probability $$\\tfrac{1}{2}$$. Then $$E(X) = 0$$, so $$[E(X)]^2 = 0$$. But $$E(X^2) = 1$$. The two differ by exactly the variance.\n- Step 3: The gap between them is precisely the variance: $$\\mathrm{Var}(X) = E(X^2) - [E(X)]^2 \\geq 0$$. The non-negativity of this gap is essentially Jensen's inequality applied to $$x \\mapsto x^2$$.\n\nIntuition: $$E(X^2)$$ \"sees\" spread, $$[E(X)]^2$$ does not.", "source": "Opus 4.7 ②", "_id": "opus_2_8", "judge_pick": true}, {"question": "Why is the formula $$\\mathrm{Var}(X) = E(X^2) - [E(X)]^2$$ better remembered as \"mean of squares minus square of mean\" than as a string of symbols? (2 steps)", "answer": "- Step 1: The verbal phrase encodes the *order of operations*, which is the only thing that distinguishes the two terms. Students who memorise the symbols often invert the order in a panic.\n- Step 2: It also makes the formula *self-checking*: variance must be non-negative, so the \"mean of squares\" (which weights big values heavily) must dominate the \"square of the mean\" (which can cancel signs). If your answer comes out negative, you've swapped the terms.\n\nA flashcard-worthy mnemonic: **MoS − SoM**.", "source": "Opus 4.7 ②", "_id": "opus_2_9", "judge_pick": true}, {"question": "A discrete random variable $$X$$ has $$E(X) = 1.8$$ and $$\\mathrm{Var}(X) = 1.36$$. Without re-deriving from scratch, what is $$\\mathrm{Var}(5 - 3X)$$? (3 steps)", "answer": "- Step 1: For any constants $$a, b$$: $$\\mathrm{Var}(aX + b) = a^2 \\, \\mathrm{Var}(X)$$. The constant $$b$$ shifts the distribution but does not change its spread, so it disappears. The constant $$a$$ stretches the spread, but in *both* directions equally, so the sign is lost via the square.\n- Step 2: Here $$a = -3$$, $$b = 5$$. So $$\\mathrm{Var}(5 - 3X) = (-3)^2 \\cdot 1.36 = 9 \\cdot 1.36$$.\n+ Note we do NOT use $$E(X) = 1.8$$ at all — variance is location-invariant.\n- Step 3: $$9 \\cdot 1.36 = 12.24$$.\n\nKey conceptual point: the $$5$$ contributes nothing; the $$-3$$ contributes $$9$$. Spread doesn't care about sign or shift, only stretch.", "source": "Opus 4.7 ②", "_id": "opus_2_10", "judge_pick": true}, {"question": "Why does adding a constant $$b$$ to a random variable not change its variance, while multiplying by a constant $$a$$ scales the variance by $$a^2$$ (not $$|a|$$)? (3 steps)", "answer": "- Step 1: Variance measures *spread around the mean*. Adding $$b$$ slides every value and the mean by the same amount $$b$$, so every deviation from the mean is unchanged. Translation preserves distances.\n- Step 2: Multiplying by $$a$$ stretches every value, including the mean, by factor $$a$$. So every deviation $$(x_i - \\mu)$$ becomes $$a(x_i - \\mu)$$.\n- Step 3: Variance is the average of *squared* deviations: $$(a(x_i - \\mu))^2 = a^2 (x_i - \\mu)^2$$. The square kills the sign of $$a$$ (which is why $$a$$ and $$-a$$ give the same variance) and turns the linear stretch into a quadratic one.\n\nVisual mental model: a histogram dragged sideways by $$b$$ has the same shape; one squashed/stretched by $$a$$ has its width scaled by $$|a|$$ but its *area-weighted squared width* (variance) scaled by $$a^2$$.", "source": "Opus 4.7 ②", "_id": "opus_2_11", "judge_pick": true}, {"question": "Two events $$A$$ and $$B$$ are independent. What formula immediately unlocks Venn-diagram problems involving this phrase, and why is it the natural definition? (3 steps)", "answer": "- Step 1: $$P(A \\cap B) = P(A) \\cdot P(B)$$. Whenever you see \"independent\", this equation should appear automatically.\n- Step 2: Why it's natural: independence means knowing $$B$$ occurred gives no information about $$A$$. Formally, $$P(A | B) = P(A)$$. Multiplying both sides by $$P(B)$$ gives $$P(A \\cap B) = P(A) P(B)$$.\n+ So the product rule is just the conditional-probability definition rearranged under the assumption that conditioning changes nothing.\n- Step 3: Operationally, this turns a Venn-diagram problem with one unknown overlap into a single equation: if you know $$P(A)$$ and $$P(B)$$, the intersection is forced. That's why it unlocks the rest of the diagram.", "source": "Opus 4.7 ②", "_id": "opus_2_12", "judge_pick": true}, {"question": "What is the formula for conditional probability $$P(A | B)$$, and what is the geometric intuition on a Venn diagram? (3 steps)", "answer": "- Step 1: $$P(A | B) = \\dfrac{P(A \\cap B)}{P(B)}$$.\n- Step 2: Intuition: \"given $$B$$\" means we restrict our universe to the region $$B$$. Within that restricted universe, the favourable outcomes are exactly those also in $$A$$, i.e. $$A \\cap B$$.\n+ The denominator $$P(B)$$ renormalises: $$B$$ now plays the role that the whole sample space used to play, so probabilities inside $$B$$ must sum to 1.\n- Step 3: So conditional probability is just \"the slice of $$A$$ inside $$B$$\" divided by \"the total of $$B$$\" — a ratio of two Venn-diagram areas.\n\nMental picture: zoom in on the $$B$$ region until it fills the screen; then $$P(A|B)$$ is the fraction of that screen covered by $$A$$.", "source": "Opus 4.7 ②", "_id": "opus_2_13", "judge_pick": true}, {"question": "When computing $$P(B | C')$$ from a Venn diagram, what region goes on top of the fraction and what region goes on the bottom? (3 steps)", "answer": "- Step 1: $$P(B | C') = \\dfrac{P(B \\cap C')}{P(C')}$$.\n- Step 2: Top: the part of $$B$$ that lies **outside** $$C$$. On a Venn diagram, shade $$B$$, then erase anything overlapping $$C$$. What's left is $$B \\cap C'$$.\n- Step 3: Bottom: the entire region outside $$C$$. Shade everything that is not inside $$C$$ — this includes parts of $$A$$, parts of $$B$$, and the region outside all circles.\n+ Common error: putting \"outside $$C$$\" in the numerator but forgetting that the denominator must also be restricted to outside $$C$$ (not the whole sample space).\n\nGeometric mental picture: the conditional cuts the universe down to $$C'$$; the question becomes \"what fraction of $$C'$$ is $$B$$?\"", "source": "Opus 4.7 ②", "_id": "opus_2_14", "judge_pick": true}, {"question": "On a probability tree diagram, why must the probabilities on the branches leaving any single node always sum to 1? (2 steps)", "answer": "- Step 1: From any node, the branches enumerate **all** possible next outcomes. They are mutually exclusive (you go down exactly one) and exhaustive (one of them must happen).\n- Step 2: Mutual exclusivity + exhaustiveness means the events partition the conditional sample space at that node, so their probabilities sum to certainty, i.e. $$1$$.\n\nMental check: if your branches sum to $$0.9$$ or $$1.1$$, you've either forgotten a branch or duplicated one.", "source": "Opus 4.7 ②", "_id": "opus_2_15", "judge_pick": false}, {"question": "On a tree diagram, do probabilities along *different* first-level branches need to add to 1, and do conditional probabilities on *deeper* branches need to relate in some way to those above? (3 steps)", "answer": "- Step 1: First-level branches: yes, they must sum to 1 (they partition the first decision).\n- Step 2: Deeper branches: the branches leaving any *single* node still sum to 1 — but among themselves, not across nodes. The values at depth 2 leaving \"car\" are independent of those leaving \"bicycle\"; there's no requirement they match.\n+ This is because deeper branches encode **conditional** probabilities (e.g. $$P(\\text{late} | \\text{car})$$), and the conditioning event is different for each parent node.\n- Step 3: So the structure is: sum-to-1 *locally* at every node, but no constraint *across* nodes.\n\nThis is why tree diagrams encode dependent events cleanly — each layer of conditioning gets its own local sum-to-1 rule.", "source": "Opus 4.7 ②", "_id": "opus_2_16", "judge_pick": false}, {"question": "On a tree diagram with branches \"Car\", \"Bicycle\", \"Walk\" and conditional \"Late/Not late\" on each, how do you compute the total $$P(\\text{Late})$$? (3 steps)", "answer": "- Step 1: Identify every root-to-leaf path that ends in \"Late\". There are three: Car→Late, Bicycle→Late, Walk→Late.\n- Step 2: For each path, multiply the probabilities along the branches. This gives the joint probability $$P(\\text{transport} \\cap \\text{Late})$$ for that route.\n+ E.g. $$P(\\text{Car} \\cap \\text{Late}) = P(\\text{Car}) \\cdot P(\\text{Late} | \\text{Car})$$ — this is the multiplication rule for dependent events.\n- Step 3: Add all three path-products. This is the **law of total probability**: $$P(\\text{Late}) = \\sum_i P(T_i) P(\\text{Late} | T_i)$$, summing over a partition of transport modes.\n\nVisual: \"multiply along, add across paths.\"", "source": "Opus 4.7 ②", "_id": "opus_2_17", "judge_pick": true}, {"question": "In a conditional probability question worded \"given that Paul is late, find the probability he travelled by car\", which probability is the numerator and which is the denominator, and why? (3 steps)", "answer": "- Step 1: We want $$P(\\text{Car} | \\text{Late}) = \\dfrac{P(\\text{Car} \\cap \\text{Late})}{P(\\text{Late})}$$.\n- Step 2: Numerator = the joint probability of the *specific path* (Car AND Late), which on the tree is one root-to-leaf product: $$P(\\text{Car}) \\cdot P(\\text{Late}|\\text{Car})$$.\n- Step 3: Denominator = the probability of the *condition*, $$P(\\text{Late})$$, which is the sum of all root-to-leaf products ending in Late.\n+ Conceptually: among all the ways to end up Late, what fraction came via Car? Numerator picks one path, denominator sums all paths that share the condition.\n\nWhy not just multiply $$P(\\text{Car})$$ and $$P(\\text{Late})$$? Because Car and Late are *not* independent — late depends on transport mode. You must use the conditional form.", "source": "Opus 4.7 ②", "_id": "opus_2_18", "judge_pick": true}, {"question": "A common error: in the formula $$P(A \\cap B) = P(A) \\cdot P(B|A)$$, why is it incorrect to replace $$P(B|A)$$ with just $$P(B)$$ unless told independence holds? (2 steps)", "answer": "- Step 1: $$P(A) \\cdot P(B) = P(A \\cap B)$$ is true *only* under independence. The general (always-true) multiplication rule is $$P(A \\cap B) = P(A) \\cdot P(B | A)$$.\n- Step 2: If $$A$$ influences $$B$$, then $$P(B|A) \\neq P(B)$$. For example, $$P(\\text{late} | \\text{car}) = \\tfrac{1}{5}$$ but $$P(\\text{late})$$ overall might be $$\\tfrac{2}{15}$$ — these are different numbers because how you travel changes lateness.\n\nHabit: when reading a tree diagram, every branch beyond the first layer is a *conditional* probability. Treating it as marginal is the single most common probability error.", "source": "Opus 4.7 ②", "_id": "opus_2_19", "judge_pick": false}, {"question": "When a probability question begins with the word \"Hence\", what does this signal about your strategy, and how should you re-use earlier results? (2 steps)", "answer": "- Step 1: \"Hence\" means: use the result(s) from the previous part(s). The examiner has structured the question so that what you just computed is an input to what's next. If you start from scratch, you waste time and often arrive at a harder problem.\n- Step 2: Practically: scan the previous parts for numerical results (e.g. $$P(\\text{Late}) = \\tfrac{2}{15}$$) and ask \"could this be the denominator or numerator of what I'm computing now?\" Re-flipped tree diagrams in part (c) typically re-use joint probabilities from part (a).\n\nHeuristic: \"hence\" = \"don't reinvent\". If you find yourself doing heavy fresh work, you've probably missed the connection.", "source": "Opus 4.7 ②", "_id": "opus_2_20", "judge_pick": false}, {"question": "$$P(A \\cup B)$$ on a Venn diagram: which regions are included, and how does this differ from $$P(A \\cap B)$$? (3 steps)", "answer": "- Step 1: $$A \\cup B$$ (\"$$A$$ or $$B$$\") includes any point in $$A$$, any point in $$B$$, and (importantly) the overlap. On a Venn diagram, you shade everything covered by *at least one* of the two circles.\n- Step 2: $$A \\cap B$$ (\"$$A$$ and $$B$$\") includes only the points belonging to *both*. You shade only the lens-shaped overlap.\n- Step 3: Numerically: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$$. We subtract the intersection once because adding $$P(A) + P(B)$$ double-counts the overlap.\n+ Mnemonic: union = add everything, then remove the double-counted middle.\n\nCommon slip: highlighting only the lens when the question asked for the union. Always re-read whether it's \"or\" (union) or \"and\" (intersection).", "source": "Opus 4.7 ②", "_id": "opus_2_21", "judge_pick": false}, {"question": "A cumulative distribution function (CDF) for a discrete random variable is requested. What format do examiners expect, and why is it preferred over a list of values? (2 steps)", "answer": "- Step 1: The expected format is a table with $$x$$ in the top row and $$F(x) = P(X \\leq x)$$ in the bottom row, showing the cumulative sums explicitly at each value.\n- Step 2: A table makes the *step-function* nature of the CDF visible: $$F$$ jumps at each value of $$x$$ and is constant between values. Writing only \"$$F(x) = $$ such-and-such\" loses this structural information, which examiners want to see you understand.\n\nSo a table isn't just notational pedantry — it encodes the discreteness of the distribution.", "source": "Opus 4.7 ②", "_id": "opus_2_22", "judge_pick": false}, {"question": "For a discrete uniform distribution on $$\\{1, 2, \\ldots, n\\}$$, what are $$E(X)$$ and $$\\mathrm{Var}(X)$$, and why does the mean equal $$\\tfrac{n+1}{2}$$? (3 steps)", "answer": "- Step 1: Each value has equal probability $$\\tfrac{1}{n}$$. The mean is $$E(X) = \\tfrac{1}{n}\\sum_{k=1}^{n} k = \\tfrac{1}{n} \\cdot \\tfrac{n(n+1)}{2} = \\tfrac{n+1}{2}$$.\n- Step 2: Intuitive reason for $$\\tfrac{n+1}{2}$$: the distribution is symmetric about its midpoint. The midpoint of $$1, 2, \\ldots, n$$ is exactly $$\\tfrac{1+n}{2}$$. For a uniform symmetric distribution, the mean equals the centre.\n- Step 3: The variance is $$\\mathrm{Var}(X) = \\dfrac{n^2 - 1}{12}$$, which grows roughly like $$n^2/12$$ — spread scales with the range squared, as expected.\n\nMental check: for $$n = 6$$ (a die), mean $$= 3.5$$, variance $$= \\tfrac{35}{12} \\approx 2.92$$. Familiar.", "source": "Opus 4.7 ②", "_id": "opus_2_23", "judge_pick": false}, {"question": "What is an outlier (in the standard A-Level convention), and what is the geometric reasoning behind the \"1.5 × IQR\" rule? (3 steps)", "answer": "- Step 1: A common definition: an outlier is any data point outside $$[Q_1 - 1.5 \\cdot \\mathrm{IQR}, \\, Q_3 + 1.5 \\cdot \\mathrm{IQR}]$$, where $$\\mathrm{IQR} = Q_3 - Q_1$$.\n- Step 2: Why 1.5? The IQR captures the middle 50% of data. A \"fence\" placed 1.5 IQRs beyond each quartile sits roughly where, in a normal distribution, you'd expect almost no data — so anything beyond is genuinely unusual rather than just at the tail.\n- Step 3: The rule is a heuristic, not a theorem. Some textbooks use 2 standard deviations instead, or other multipliers. Always check what definition the question gives — exam questions specify it explicitly.\n\nConceptual point: outliers are defined *relative to* a spread measure (IQR or SD), not against absolute thresholds.", "source": "Opus 4.7 ②", "_id": "opus_2_24", "judge_pick": true}, {"question": "Why does coding data (e.g. $$y = \\tfrac{x - a}{b}$$) change the mean by a linear shift and scale, but change the standard deviation by *only* the scale factor? (3 steps)", "answer": "- Step 1: Mean is a *location* statistic. If you shift all data by $$-a$$ and rescale by $$\\tfrac{1}{b}$$, the mean transforms identically: $$\\bar{y} = \\tfrac{\\bar{x} - a}{b}$$.\n- Step 2: Standard deviation is a *spread* statistic. Shifting all data by the same constant doesn't change distances between points — the spread is unchanged. Only the scaling by $$\\tfrac{1}{b}$$ affects spread.\n- Step 3: So $$\\sigma_y = \\dfrac{\\sigma_x}{|b|}$$. The shift $$a$$ drops out. Variance, being squared, transforms as $$\\sigma_y^2 = \\dfrac{\\sigma_x^2}{b^2}$$.\n\nWhy this matters: coding is a calculation trick to simplify nasty numbers, and you must un-code at the end remembering that shifts only affect the mean, not the spread.", "source": "Opus 4.7 ②", "_id": "opus_2_25", "judge_pick": true}, {"question": "For two events $$A$$ and $$B$$, what's the difference between $$P(A \\cap B)$$ and $$P(A | B)$$? (3 steps)", "answer": "- Step 1: $$P(A \\cap B)$$ is a *joint* probability: the chance that both $$A$$ and $$B$$ happen, measured against the **whole sample space**.\n- Step 2: $$P(A | B)$$ is a *conditional* probability: the chance $$A$$ happens, measured against **just the slice $$B$$** of the sample space. We've zoomed in.\n- Step 3: Linked by $$P(A | B) = \\dfrac{P(A \\cap B)}{P(B)}$$. Since $$P(B) \\leq 1$$, dividing makes $$P(A|B) \\geq P(A \\cap B)$$. Conditioning never makes a probability smaller than the joint.\n+ Extreme case: if $$B$$ is certain ($$P(B) = 1$$), then $$P(A|B) = P(A \\cap B) = P(A)$$ — conditioning on a certain event does nothing.\n\nMental picture: joint = small slice of full pie; conditional = the same slice but re-measured as a fraction of just the $$B$$ portion.", "source": "Opus 4.7 ②", "_id": "opus_2_26", "judge_pick": false}, {"question": "A regression line $$y = a + bx$$ is computed from data. Why is using it to predict $$y$$ for an $$x$$-value just slightly outside the data range sometimes acceptable, while predicting far outside is dangerous? (3 steps)", "answer": "- Step 1: The line is a *local* approximation. Within the data range, the linear shape is supported by evidence: we have observations showing the trend really is approximately linear there.\n- Step 2: Just outside the range, the linear approximation can be expected to hold *roughly* by continuity — small extrapolation isn't catastrophic if the underlying relationship is smooth.\n- Step 3: Far outside the range, the line is unconstrained by data and the linear assumption may break down completely (the real relationship could curve, plateau, change sign, or hit physical limits like \"weight ≥ 0\"). The further you go, the more the model becomes a guess.\n\nSo extrapolation reliability degrades with distance from the data — not a binary \"safe/unsafe\" but a gradient.", "source": "Opus 4.7 ②", "_id": "opus_2_27", "judge_pick": true}, {"question": "Given a Venn diagram with $$P(A) = 0.6$$, $$P(B) = 0.4$$ and $$A, B$$ independent, find $$P(A \\cap B)$$ and explain the structural shortcut. (2 steps)", "answer": "- Step 1: Independence gives the shortcut: $$P(A \\cap B) = P(A) \\cdot P(B) = 0.6 \\cdot 0.4 = 0.24$$. No need to use any of the other Venn-diagram regions.\n- Step 2: Structural insight: independence reduces a 4-unknown Venn problem (the four disjoint regions) to a 2-unknown problem — knowing the marginals $$P(A), P(B)$$ determines the whole picture. That's why \"independent\" is a goldmine clue.\n\nWithout independence you'd need additional information (like $$P(A \\cup B)$$) to pin down the intersection.", "source": "Opus 4.7 ②", "_id": "opus_2_28", "judge_pick": false}, {"question": "Why does the variance formula contain a *square* of the mean, $$[E(X)]^2$$, rather than just $$E(X)$$? (3 steps)", "answer": "- Step 1: Variance is defined as $$E[(X - \\mu)^2]$$ — the expected squared deviation from the mean. The square ensures positive and negative deviations don't cancel.\n- Step 2: Expand: $$E[(X-\\mu)^2] = E[X^2 - 2\\mu X + \\mu^2] = E(X^2) - 2\\mu E(X) + \\mu^2$$. Since $$E(X) = \\mu$$, this simplifies to $$E(X^2) - 2\\mu^2 + \\mu^2 = E(X^2) - \\mu^2$$.\n- Step 3: So the $$\\mu^2$$ term arises naturally from expanding the square in the definition. The \"square of the mean\" is just $$\\mu^2 = [E(X)]^2$$.\n+ This also shows why variance is in *squared units* of $$X$$ — and why standard deviation (the square root) is in the original units.\n\nSo $$[E(X)]^2$$ isn't an arbitrary subtraction — it falls out algebraically from \"average squared deviation\".", "source": "Opus 4.7 ②", "_id": "opus_2_29", "judge_pick": true}, {"question": "When working a probability problem, why is underlining key words (like \"independent\", \"given\", \"only\", \"at least\") a habit worth maintaining even on simple questions? (2 steps)", "answer": "- Step 1: The probability tools available (multiplication rule, conditional formula, inclusion-exclusion, complements) are each unlocked by *specific keywords*. Missing the keyword = picking the wrong tool = wrong answer.\n- Step 2: Examples of triggers:\n+ \"independent\" → $$P(A \\cap B) = P(A)P(B)$$\n+ \"given that\" → conditional probability $$P(A|B)$$\n+ \"at least one\" → easier via complement, $$1 - P(\\text{none})$$\n+ \"only\" → uniqueness, the difference $$P(A) - P(A \\cap B)$$\n\nUnderlining is cheap, slows you down by 3 seconds, and saves whole marks. Build it into your default reading pass.", "source": "Opus 4.7 ②", "_id": "opus_2_30", "judge_pick": false}, {"question": "What is the law of total probability, and how does it manifest naturally on a tree diagram? (3 steps)", "answer": "- Step 1: If $$B_1, B_2, \\ldots, B_n$$ partition the sample space (mutually exclusive, exhaustive), then $$P(A) = \\sum_i P(A \\cap B_i) = \\sum_i P(B_i) P(A | B_i)$$.\n- Step 2: On a tree, the first-level branches form a partition. To find $$P(A)$$ where $$A$$ is some second-level event, you multiply along each branch (giving the joints $$P(B_i \\cap A)$$) then sum across branches.\n- Step 3: Geometric picture: $$A$$'s total probability is decomposed by *which path led to it*. We're slicing $$A$$ by which $$B_i$$ it came from, then summing the slices.\n\nThis is the operational meaning of \"multiply along paths, add across paths\" — it's the law of total probability in disguise.", "source": "Opus 4.7 ②", "_id": "opus_2_31", "judge_pick": true}, {"question": "In a CDF table $$F(x) = P(X \\leq x)$$, what must always be true about the last value, and why? (2 steps)", "answer": "- Step 1: The last value of $$F(x)$$ must equal 1. This is because $$P(X \\leq x_{\\max}) = P(X \\in \\text{all possible values}) = 1$$ — certainty.\n- Step 2: If your computed CDF doesn't end at exactly 1, you've made an arithmetic error or your probability mass function doesn't sum to 1 (which is itself an error). This is a free self-check built into the problem.\n\nThis is the discrete analogue of the continuous CDF approaching 1 as $$x \\to \\infty$$.", "source": "Opus 4.7 ②", "_id": "opus_2_32", "judge_pick": false}, {"question": "Two students compute $$P(\\text{taking car} | \\text{not late})$$. Student A writes $$\\dfrac{P(\\text{car} \\cap \\text{not late})}{P(\\text{not late})}$$. Student B writes $$P(\\text{car}) \\cdot P(\\text{not late})$$. Which is correct in general, and what error has the other student made? (3 steps)", "answer": "- Step 1: Student A is correct. Conditional probability is **always** defined as $$P(A|B) = \\dfrac{P(A \\cap B)}{P(B)}$$. This is the universal definition.\n- Step 2: Student B has conflated two distinct things: the joint probability $$P(A \\cap B)$$ (when events are independent, this equals the product of marginals) with the conditional probability $$P(A|B)$$.\n+ Even *if* car and not-late were independent, the product $$P(\\text{car}) \\cdot P(\\text{not late})$$ equals $$P(\\text{car} \\cap \\text{not late})$$, which is still the *numerator only*, not the conditional itself.\n- Step 3: Student B's expression is missing the division by $$P(\\text{not late})$$. That's the renormalisation step that turns a joint into a conditional. Without it, you're answering a different question.\n\nHabit: when you see \"given\", reach for the fraction, never the simple product.", "source": "Opus 4.7 ②", "_id": "opus_2_33", "judge_pick": true}, {"question": "When asked to \"describe and interpret\" the skewness of a distribution, what's the difference between \"describe\" and \"interpret\"? (2 steps)", "answer": "- Step 1: **Describe** = name the mathematical property in technical language. E.g., \"The distribution has positive skew because $$Q_3 - Q_2 > Q_2 - Q_1$$.\"\n- Step 2: **Interpret** = explain what that means in the real-world context of the data. E.g., \"The weights are more varied above the median than below — there are some unusually heavy individuals stretching the upper tail.\"\n+ Without the interpretation, you've only spoken in maths-language; the examiner wants to see you can translate to plain English about the variable in question.\n\nTogether: describe identifies the shape; interpret says what it means for the thing being measured.", "source": "Opus 4.7 ②", "_id": "opus_2_34", "judge_pick": false}, {"question": "Quick worked exercise: A box contains tickets numbered 1, 2, 3, 4. One is drawn at random ($$X$$ = number drawn). Without computing exact decimals, sketch reasoning for $$E(X)$$, $$E(X^2)$$, and confirm $$\\mathrm{Var}(X) > 0$$. (3 steps)", "answer": "- Step 1: Discrete uniform on $$\\{1,2,3,4\\}$$. By symmetry the mean is the midpoint: $$E(X) = \\tfrac{1+4}{2} = 2.5$$.\n- Step 2: $$E(X^2) = \\tfrac{1}{4}(1 + 4 + 9 + 16) = \\tfrac{30}{4} = 7.5$$. Notice this is much bigger than $$[E(X)]^2 = 6.25$$ because squaring inflates the larger values disproportionately.\n- Step 3: $$\\mathrm{Var}(X) = 7.5 - 6.25 = 1.25 > 0$$. ✓ Non-negative as required. The positive gap reflects the genuine spread.\n+ Intuition check: standard deviation $$\\approx \\sqrt{1.25} \\approx 1.1$$ — reasonable, since the data ranges over $$[1,4]$$ with most values within about 1 unit of the mean 2.5.", "source": "Opus 4.7 ②", "_id": "opus_2_35", "judge_pick": false}, {"question": "Quick worked exercise: A Venn diagram has $$P(A) = 0.5$$, $$P(B) = 0.4$$, $$P(A \\cap B) = 0.1$$. Without heavy calculation, what are $$P(A \\cup B)$$, $$P(\\text{only } A)$$, $$P(A | B)$$? (3 steps)", "answer": "- Step 1: $$P(A \\cup B) = P(A) + P(B) - P(A \\cap B) = 0.5 + 0.4 - 0.1 = 0.8$$. Inclusion-exclusion: add, then subtract the double-counted overlap.\n- Step 2: $$P(\\text{only } A) = P(A) - P(A \\cap B) = 0.5 - 0.1 = 0.4$$. \"Only $$A$$\" means $$A$$ minus the lens.\n- Step 3: $$P(A | B) = \\dfrac{P(A \\cap B)}{P(B)} = \\dfrac{0.1}{0.4} = 0.25$$. Restricting to $$B$$'s slice (size 0.4), the part of it inside $$A$$ (size 0.1) is one quarter.\n+ Sanity check on independence: would $$P(A)P(B) = 0.5 \\cdot 0.4 = 0.2$$ equal $$P(A \\cap B) = 0.1$$? No → $$A, B$$ are *not* independent here.", "source": "Opus 4.7 ②", "_id": "opus_2_36", "judge_pick": false}, {"question": "Conceptually, why does the regression line of $$y$$ on $$x$$ generally differ from the regression line of $$x$$ on $$y$$? (3 steps)", "answer": "- Step 1: The regression of $$y$$ on $$x$$ minimises *vertical* squared distances — errors measured in $$y$$. It treats $$x$$ as known and predicts $$y$$.\n- Step 2: The regression of $$x$$ on $$y$$ minimises *horizontal* squared distances — errors in $$x$$. It treats $$y$$ as known and predicts $$x$$.\n- Step 3: Different error directions ⇒ different optimal slopes. The two lines coincide only when the data is perfectly correlated (then both errors are zero anyway).\n+ Practical implication: if a question gives you a regression equation, always check which is the *predictor* (independent) and which is the *response*. You can't simply invert the equation algebraically to reverse the prediction direction.", "source": "Opus 4.7 ②", "_id": "opus_2_37", "judge_pick": true}, {"question": "What does \"on average\" really mean in the regression context, and how does this connect to the residuals being zero on average? (3 steps)", "answer": "- Step 1: The regression line is fitted so that the *mean* of the residuals (vertical deviations from the line) is zero. Some points lie above, some below, and they cancel on average.\n- Step 2: This is exactly what \"on average for each 1 cm increase, weight increases by 3.27 kg\" formalises: across the whole population (or sample), the *mean* upward step matches the gradient. Individual horses can deviate.\n- Step 3: So the gradient is the *average* rate of change, and \"average\" here has a precise mathematical meaning: the sum of residuals (errors) is zero by construction.\n\nThis is also why regression is sensitive to outliers — one extreme point pulls the line because the fitting criterion (least squares) weights large residuals heavily.", "source": "Opus 4.7 ②", "_id": "opus_2_38", "judge_pick": true}, {"question": "Why are skewness and outlier identification *separate* diagnostics — i.e., why can a distribution be skewed without having any outliers? (3 steps)", "answer": "- Step 1: Skewness measures the *shape* of the entire distribution: is one half more spread out than the other? It's about asymmetry.\n- Step 2: Outliers are individual extreme *points* sitting beyond the bulk of the data, judged by the 1.5 × IQR rule (or similar).\n- Step 3: You can have a smoothly skewed distribution (a gentle long tail) where no single point crosses the outlier threshold — every point is \"expected\" given the skewness. Conversely, you can have a symmetric distribution with one freak outlier and no skew.\n+ Example: an exam where everyone scored between 40 and 70 except one person who scored 95 — outlier present, but the rest is symmetric.\n\nSo shape (skew) and freak points (outliers) are independent properties; check both.", "source": "Opus 4.7 ②", "_id": "opus_2_39", "judge_pick": true}], "count": 40}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 18059, "out_tokens": 13582, "reasoning_chars": 5296, "cost_eur": 0.0612, "elapsed_s": 164, "content_chars": 42303}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 15420, "out_tokens": 7552, "reasoning_chars": 14534, "cost_eur": 0.0392, "ela const SK='auto_maths_20260629_s1_esat_with_harry';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}
