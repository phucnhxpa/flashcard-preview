})}{P(\\text{late})}$$.\n- Step 2: The numerator is $$P(\\text{car} \\cap \\text{late}) = P(\\text{car}) \\times P(\\text{late}|\\text{car}) = \\tfrac{1}{2} \\times \\tfrac{1}{5} = \\tfrac{1}{10}$$. This is the probability of taking the car AND being late — found by multiplying along the \"car then late\" path on the tree.\n- Step 3: The key mistake is writing the numerator as $$P(\\text{car}) \\times P(\\text{late})$$, which would only be correct if car and late were **independent** — but they're not (the probability of being late depends on the transport method). The correct numerator uses $$P(\\text{late}|\\text{car})$$, not $$P(\\text{late})$$. The tree diagram makes this clear: you multiply along a specific path, not across different paths.\n\nThis is a \"reversing the tree\" problem — you're conditioning on the second event to ask about the first. The formula handles this correctly.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "Is $$P(A|B)$$ always equal to $$P(B|A)$$? If not, give a simple intuitive example showing they differ. (2 steps)", "answer": "- Step 1: No, they are generally **not** equal. $$P(A|B)$$ asks \"given B happened, what's the chance of A?\" while $$P(B|A)$$ asks \"given A happened, what's the chance of B?\" These are fundamentally different questions.\n- Step 2: Example: Let A = \"the person has a fever\" and B = \"the person has the flu.\" $$P(B|A)$$ = probability of having the flu given you have a fever — this is moderate, since many things cause fever. $$P(A|B)$$ = probability of having a fever given you have the flu — this is very high, since flu almost always causes fever. Clearly $$P(A|B) \\neq P(B|A)$$.\n\nThey are equal only when $$P(A) = P(B)$$, which is a special case, not the general rule. Bayes' theorem connects them: $$P(A|B) = \\frac{P(B|A) \\cdot P(A)}{P(B)}$$.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": true}, {"question": "In a \"reversed\" tree diagram (where the first set of branches is Late/Not Late, and the second set is Car/Bicycle/Walk), how do you fill in the probabilities on the second-level branches? Explain using conditional probability. (3 steps)", "answer": "- Step 1: On the original tree, the first-level branches were transport methods and the second-level was Late/Not Late. On the reversed tree, it's the opposite: first level is Late/Not Late, second level is Car/Bicycle/Walk. The second-level branches now represent conditional probabilities like $$P(\\text{car} | \\text{late})$$, $$P(\\text{bicycle} | \\text{late})$$, etc.\n- Step 2: To find these, use the conditional probability formula. For example, $$P(\\text{car} | \\text{late}) = \\frac{P(\\text{car} \\cap \\text{late})}{P(\\text{late})}$$. Both the numerator and denominator can be computed from the original tree diagram. In the Paul example: $$P(\\text{car} | \\text{late}) = \\frac{1/10}{2/15} = \\frac{3}{4}$$.\n- Step 3: Verify: the three branches from the \"Late\" node must sum to 1. In the Paul example: $$P(\\text{car}|\\text{late}) = \\tfrac{3}{4}$$, $$P(\\text{bicycle}|\\text{late}) = \\tfrac{1}{8}$$, $$P(\\text{walk}|\\text{late}) = \\tfrac{1}{8}$$. Check: $$\\tfrac{3}{4} + \\tfrac{1}{8} + \\tfrac{1}{8} = \\tfrac{6}{8} + \\tfrac{1}{8} + \\tfrac{1}{8} = 1$$. ✓\n\nThe reversed tree is useful when the question conditions on the outcome (late/not late) and asks about the cause (transport method).", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "In a Venn diagram question, you see the notation $$A' \\cap B$$. Shade this region on a mental Venn diagram — what does it represent, and what is the common confusion with $$A \\cup B$$? (2 steps)", "answer": "- Step 1: $$A' \\cap B$$ means \"not in A AND in B.\" On the Venn diagram, this is the part of circle B that does **not** overlap with circle A — the \"crescent moon\" shape of B that lies outside A. It excludes the intersection $$A \\cap B$$.\n- Step 2: The common confusion is with $$A \\cup B$$ (union), which means \"in A OR in B or both\" — this is **everything** inside either circle, including the overlap. When a question asks for $$A' \\cap B$$, students sometimes shade all of B (forgetting the $$A'$$ condition) or shade all of A and B (reading it as a union). The key: intersection ($$\\cap$$) means the region must satisfy **both** conditions simultaneously.\n\nReading carefully: $$A' \\cap B$$ = must be outside A AND inside B. Only the B-only region qualifies.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "An exam asks you to \"show that there is only one outlier\" in a dataset. You compute the outlier boundaries and find exactly one data point lies outside them. Why might you still lose the mark, and what must you write? (2 steps)", "answer": "- Step 1: You might lose the mark if your conclusion is vague, e.g., \"there is a single data point outside the range\" or \"only one value is an outlier.\" The mark scheme often requires you to **identify the outlier by its value** and use the word \"only.\"\n- Step 2: You must write something like: \"139 is the only outlier.\" This removes all ambiguity — the examiner knows exactly which value you're referring to and that you've confirmed no other values qualify. Being specific and unambiguous is the key to securing the final accuracy mark.\n\nThe principle: in \"show that\" questions, your conclusion must be as precise and specific as the question demands. Don't make the examiner guess what you mean.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "The front of an Edexcel exam paper states that answers should be given to 3 significant figures unless otherwise stated. If your final answer is 28.6, how many significant figures is this, and what should you do? (2 steps)", "answer": "- Step 1: 28.6 has **3 significant figures** (2, 8, and 6 are all significant). This meets the requirement. However, if your answer were 28 (only 2 significant figures), that would not be enough — you'd need to write 28.0 to give 3 significant figures.\n- Step 2: The practical rule: always give your final decimal answers to **at least 3 significant figures**. If you round too aggressively (e.g., to 2 sf or 1 dp when 3 sf requires more), you lose the final accuracy mark. Keep more digits during intermediate steps and only round at the very end.\n\nAlso: copying numbers from the question incorrectly (e.g., writing 289 instead of 286) loses marks for accuracy too — always double-check digits you copy.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "A cumulative distribution function (CDF) for a discrete random variable is asked for in an exam. What format should you present it in, and why? (2 steps)", "answer": "- Step 1: The expected format is a **table** with two rows: the top row lists the values of $$X$$, and the bottom row lists the corresponding values of the CDF, $$F(X) = P(X \\leq x)$$. For example:\n\n| $$X$$ | 0 | 1 | 2 | 3 |\n|---|---|---|---|---|\n| $$F(X)$$ | 0.1 | 0.4 | 0.8 | 1.0 |\n\n- Step 2: The CDF must be **non-decreasing** and the final value must equal 1 (since $$P(X \\leq x_{\\max}) = 1$$). Presenting it as a table makes it easy for the examiner to verify these properties and award marks. Listing values without a table structure might still get the marks, but the table format is what examiners expect and reduces the risk of losing marks for unclear presentation.\n\nEach $$F(x_i)$$ is the running cumulative sum: $$F(x_i) = P(X \\leq x_i) = \\sum_{k \\leq x_i} P(X = k)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "In a Venn diagram with three events A, B, and C, you know the total probability of all regions must equal 1. If you've found all regions except the outside region (neither A nor B nor C), how do you find it, and what working must you show? (2 steps)", "answer": "- Step 1: The outside region equals 1 minus the sum of all the interior regions. If the interior regions sum to, say, 0.84, then the outside region is $$1 - 0.84 = 0.16$$. This is the probability of being in none of A, B, or C.\n- Step 2: You must **show the subtraction working** explicitly: write \"$$1 - 0.36 - 0.24 - 0.07 - 0.09 - 0.08 = 0.16$$\" or \"$$1 - (0.36 + 0.24 + 0.07 + 0.09 + 0.08) = 0.16$$.\" Don't just write the answer — the method mark depends on showing how you got there. The examiner needs to see that you understood the total probability principle.\n\nThis is a general exam principle: always show working for method marks, even when the calculation seems straightforward.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "When reading a probability question, what specific habit did the tutor recommend to avoid missing key information like \"A and B are independent\" or \"given that\"? Why does this habit matter? (2 steps)", "answer": "- Step 1: The recommended habit is **underlining key words and phrases** in the question as you read it. Words like \"independent,\" \"given that,\" \"interpret,\" \"show that,\" and \"hence\" are triggers for specific formulas and approaches.\n- Step 2: This matters because missing a single key word can change the entire approach. For example, missing \"independent\" means you won't set up $$P(A \\cap B) = P(A) \\times P(B)$$, which is the key that unlocks the whole problem. Missing \"given that\" means you won't recognize it as a conditional probability question. Underlining forces you to slow down and register each key piece of information before diving into calculations.\n\nThe tutor noted that the student had started underlining in question 1 but forgot for later questions — consistency is key.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": false}, {"question": "A question uses the word \"hence.\" What does this signal about how your answer should connect to previous work? (2 steps)", "answer": "- Step 1: \"Hence\" means you must **use a result from a previous part** of the question to solve the current part. It signals a direct link — the examiner expects to see the earlier result appearing in your working.\n- Step 2: If you ignore the \"hence\" and solve the part from scratch using a different method, you may still get the answer but could lose method marks. The mark scheme is structured around using the previous result. For example, \"hence find $$P(\\text{bicycle} | \\text{late})$$\" means you should use the $$P(\\text{late}) = \\tfrac{2}{15}$$ you already computed, not recalculate it.\n\n\"Hence\" = \"using what you just found.\" It's the examiner's way of chaining parts together and testing whether you can connect ideas.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "In a Venn diagram problem, you need to solve for an unknown probability $$x$$. You set up the equation using the independence condition $$P(A \\cap B) = P(A) \\times P(B)$$. Is it more efficient to multiply out the right side, or to divide? Explain with a simple example. (2 steps)", "answer": "- Step 1: It is more efficient to **divide** rather than multiply. If $$P(A \\cap B) = P(A) \\times P(B)$$ and you know $$P(A \\cap B)$$ and $$P(A)$$, then dividing both sides by $$P(A)$$ immediately gives $$P(B) = \\frac{P(A \\cap B)}{P(A)}$$. This avoids expanding brackets and then solving.\n- Step 2: Example: if $$P(A) = 0.6$$, $$P(A \\cap B) = 0.33 + x$$, and $$P(B) = 0.55 + x$$, the equation is $$0.33 + x = 0.6 \\times (0.55 + x)$$. Rather than expanding the right side to $$0.33 + 0.6x$$ and then solving (which works but creates more steps), in some setups dividing first eliminates the coefficient entirely. The general principle: always look for the path with fewer operations.\n\nIn this particular example, expanding and solving is straightforward: $$0.33 + x = 0.33 + 0.6x$$, so $$0.4x = 0$$, giving $$x = 0$$. But in other setups, dividing first can save significant work.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "Conceptual check — why does $$\\text{Var}(aX + b) = a^2\\text{Var}(X)$$ and not $$a\\text{Var}(X)$$? Give the intuition. (2 steps)", "answer": "- Step 1: Variance measures the **spread** of data around the mean, in squared units. When you multiply every value by $$a$$, the distances from the mean all get multiplied by $$a$$, so the squared distances get multiplied by $$a^2$$. Adding $$b$$ just shifts the entire distribution without changing any distances, so it has no effect on variance.\n- Step 2: Concrete example: if the original data is {1, 3, 5} with mean 3, the deviations from the mean are {-2, 0, 2}. If we multiply by 3 to get {3, 9, 15} with mean 9, the deviations become {-6, 0, 6} — three times larger. The squared deviations go from {4, 0, 4} to {36, 0, 36} — nine times larger. Hence $$\\text{Var}(3X) = 9\\text{Var}(X)$$.\n\nThe squaring of $$a$$ is a direct consequence of variance being defined in terms of squared deviations.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "You have a discrete probability distribution table with unknown probabilities $$a$$ and $$b$$. Given that $$E(X) = 1.8$$ and the full table, how would you find $$E(X^2)$$ without dividing by the number of entries? Walk through the exact procedure. (3 steps)", "answer": "- Step 1: First, determine the unknown probabilities using the constraint that all probabilities sum to 1, plus any other given information. For example, if the table has values 0, 1, 2, 3 with some probabilities given and two unknowns, you might use $$\\sum p_i = 1$$ and the given $$E(X) = 1.8$$ to form two equations in two unknowns.\n- Step 2: To compute $$E(X^2)$$, create a new row in the table where each $$x_i$$ is replaced by $$x_i^2$$. Then compute $$E(X^2) = \\sum x_i^2 \\cdot p_i$$. For example, if the values are 0, 1, 2, 3 with probabilities 0.2, 0.3, 0.3, 0.2, then $$E(X^2) = 0^2(0.2) + 1^2(0.3) + 2^2(0.3) + 3^2(0.2) = 0 + 0.3 + 1.2 + 1.8 = 3.3$$.\n- Step 3: **Do not divide by $$n$$** (the number of values in the table). This is the most common error. The formula is a weighted sum where the weights (probabilities) already account for the \"averaging\" — they sum to 1. Dividing again would incorrectly halve or third the result depending on how many entries there are.\n\nThe probabilities ARE the weights. $$E(X^2) = \\sum x^2 \\cdot P(X=x)$$. Period. No extra division.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "Quick mental check: if $$\\text{Var}(X) = 4$$, what is $$\\text{Var}(2X - 7)$$? (1 step)", "answer": "- Step 1: Using $$\\text{Var}(aX + b) = a^2\\text{Var}(X)$$: here $$a = 2$$ and $$b = -7$$. The $$b$$ term disappears, and $$a^2 = 4$$. So $$\\text{Var}(2X - 7) = 4 \\times 4 = 16$$. The shift of -7 doesn't affect spread at all — only the scaling by 2 matters, and it gets squared.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "Quick mental check: if $$E(X) = 3$$ and $$\\text{Var}(X) = 4$$, what are $$E(2X - 7)$$ and $$\\text{Var}(2X - 7)$$? (2 steps)", "answer": "- Step 1: $$E(2X - 7) = 2E(X) - 7 = 2(3) - 7 = 6 - 7 = -1$$. For expectation, both the scaling and the shift matter: $$E(aX + b) = aE(X) + b$$.\n- Step 2: $$\\text{Var}(2X - 7) = 2^2 \\text{Var}(X) = 4 \\times 4 = 16$$. For variance, only the scaling matters (squared): $$\\text{Var}(aX + b) = a^2\\text{Var}(X)$$.\n\nSame transformation, different rules for mean vs variance — the shift affects the center (mean) but not the spread (variance).", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "In a proportional variation problem, the original equation is $$Q = \\frac{kx^2 y}{m}$$ where $$k$$ is a constant. If $$x$$ increases by 50%, $$y$$ doubles, and $$Q$$ stays the same, what factor does $$m$$ change by? (3 steps)", "answer": "- Step 1: Write the new equation with the changed variables: $$x_{\\text{new}} = \\tfrac{3}{2}x$$, $$y_{\\text{new}} = 2y$$, $$Q_{\\text{new}} = Q$$, and $$m_{\\text{new}}$$ is unknown. Substituting: $$Q = \\frac{k \\left(\\tfrac{3}{2}x\\right)^2 (2y)}{m_{\\text{new}}}$$.\n- Step 2: Simplify the numerator: $$\\left(\\tfrac{3}{2}\\right)^2 = \\tfrac{9}{4}$$, so $$k \\cdot \\tfrac{9}{4}x^2 \\cdot 2y = k \\cdot \\tfrac{9}{4} \\cdot 2 \\cdot x^2 y = k \\cdot \\tfrac{18}{4} x^2 y = k \\cdot \\tfrac{9}{2} x^2 y$$. So $$Q = \\frac{k \\cdot \\tfrac{9}{2} x^2 y}{m_{\\text{new}}}$$.\n- Step 3: Set equal to the original: $$\\frac{kx^2 y}{m} = \\frac{k \\cdot \\tfrac{9}{2} x^2 y}{m_{\\text{new}}}$$. Cancel $$k$$, $$x^2$$, and $$y$$ from both sides: $$\\frac{1}{m} = \\frac{9/2}{m_{\\text{new}}}$$, so $$m_{\\text{new}} = \\tfrac{9}{2} m$$. The new $$m$$ is 4.5 times the old $$m$$, meaning a 350% increase.\n\nThe key technique: substitute, factor, cancel common terms, then compare coefficients.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "In a Venn diagram with events A, B, and C, the question asks for $$P(A' \\cap C')$$. This is the complement of what simpler expression? How does De Morgan's law help? (2 steps)", "answer": "- Step 1: By De Morgan's law, $$A' \\cap C' = (A \\cup C)'$$. So the probability of being in neither A nor C equals 1 minus the probability of being in A or C (or both): $$P(A' \\cap C') = 1 - P(A \\cup C)$$.\n- Step 2: This can be easier to compute because $$P(A \\cup C) = P(A) + P(C) - P(A \\cap C)$$, which uses regions you can read directly from the Venn diagram. Then subtract from 1. Alternatively, you can directly add up all the regions outside both A and C on the diagram — both approaches give the same answer.\n\nDe Morgan's law converts an intersection of complements into the complement of a union, which is often easier to calculate.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "Edge case: if two events A and B are independent and $$P(A) = 0$$, what is $$P(A \\cap B)$$? Does the independence formula still hold? (2 steps)", "answer": "- Step 1: $$P(A \\cap B) = P(A) \\times P(B) = 0 \\times P(B) = 0$$. This makes intuitive sense: if A is impossible, then A and B both happening is also impossible.\n- Step 2: Yes, the formula holds. In fact, any event is independent of an impossible event — knowing A didn't happen (which is certain) gives no information about B. This is a valid but trivial case of independence. The formula $$P(A \\cap B) = P(A) \\times P(B)$$ works for all probabilities, including boundary cases.\n\nThis edge case confirms the consistency of the independence definition.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "Misconception probe: a student says \"If $$P(A|B) = P(A)$$, then A and B must be independent.\" Is this correct? Why or why not? (2 steps)", "answer": "- Step 1: Yes, this is **correct**. In fact, this is another definition of independence: A and B are independent if and only if $$P(A|B) = P(A)$$ (and equivalently $$P(B|A) = P(B)$$). Knowing B occurred doesn't change the probability of A — that's exactly what independence means.\n- Step 2: This is equivalent to the multiplication rule $$P(A \\cap B) = P(A) \\times P(B)$$ because $$P(A|B) = \\frac{P(A \\cap B)}{P(B)}$$, and setting this equal to $$P(A)$$ gives $$P(A \\cap B) = P(A) \\times P(B)$$. The two definitions are mathematically identical, just expressed differently.\n\nSo: independence = \"B tells you nothing about A\" = $$P(A|B) = P(A)$$ = $$P(A \\cap B) = P(A) \\times P(B)$$.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "A student computes $$E(X^2)$$ by squaring the expected value: $$E(X^2) = [E(X)]^2$$. Is this correct? If not, which direction does the inequality go, and why? (2 steps)", "answer": "- Step 1: This is **incorrect** in general. $$E(X^2) \\neq [E(X)]^2$$. By the variance formula, $$\\text{Var}(X) = E(X^2) - [E(X)]^2$$, which rearranges to $$E(X^2) = \\text{Var}(X) + [E(X)]^2$$. Since variance is always non-negative ($$\\text{Var}(X) \\geq 0$$), we have $$E(X^2) \\geq [E(X)]^2$$.\n- Step 2: Equality holds only when $$\\text{Var}(X) = 0$$, meaning $$X$$ is a constant (no variability at all). For any random variable with actual variation, $$E(X^2) > [E(X)]^2$$. This is a form of Jensen's inequality — the square function is convex, so the expected value of the square exceeds the square of the expected value.\n\nThink of it this way: squaring amplifies large deviations, so the average of the squares is bigger than the square of the average (unless there are no deviations at all).", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "Synthesis question: In the Paul commuting problem, the original tree has transport first, then late/not late. A reversed tree has late/not late first, then transport. Explain why the first-level branch probabilities change between the two trees, but the overall probability of any complete path (e.g., \"car and late\") remains the same. (3 steps)", "answer": "- Step 1: In the original tree, the first-level branches are $$P(\\text{car}) = \\tfrac{1}{2}$$, $$P(\\text{bicycle}) = \\tfrac{1}{6}$$, $$P(\\text{walk}) = \\tfrac{1}{3}$$. These are the marginal probabilities of each transport method — known directly from the question.\n- Step 2: In the reversed tree, the first-level branches are $$P(\\text{late}) = \\tfrac{2}{15}$$ and $$P(\\text{not late}) = \\tfrac{13}{15}$$. These are the marginal probabilities of being late or not — computed by adding up all paths leading to each outcome in the original tree. The first-level branches change because we're conditioning on a different variable.\n- Step 3: The path probabilities remain the same because they represent the same joint events. In the original tree: $$P(\\text{car}) \\times P(\\text{late}|\\text{car}) = \\tfrac{1}{2} \\times \\tfrac{1}{5} = \\tfrac{1}{10}$$. In the reversed tree: $$P(\\text{late}) \\times P(\\text{car}|\\text{late}) = \\tfrac{2}{15} \\times \\tfrac{3}{4} = \\tfrac{1}{10}$$. Same result — this is guaranteed by the definition of conditional probability: $$P(A \\cap B) = P(A) \\times P(B|A) = P(B) \\times P(A|B)$$.\n\nThe two trees are different factorizations of the same joint probability, like factoring 12 as 3×4 or 2×6 — different factors, same product.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": true}, {"question": "Exam technique: a question asks you to \"describe and interpret\" a distribution's skewness. You write: \"It is positively skewed because Q3 − Q2 > Q2 − Q1.\" How many marks out of 4 (2 for describe, 2 for interpret) would you expect, and what's missing? (2 steps)", "answer": "- Step 1: You would likely get 2 out of 4 marks — full marks for the \"describe\" part (identifying positive skew with correct quartile comparison), but zero for the \"interpret\" part. The description is mathematically correct but doesn't connect to the real-world meaning.\n- Step 2: The interpretation requires you to say what the skew means **in context**. For example: \"The weights are more varied above the median\" or \"The data is more spread out in the upper quarter than the lower quarter.\" You must reference the actual variable (weights, heights, etc.) and explain what \"more spread out above the median\" means in plain language.\n\n\"Describe\" = state the mathematical pattern. \"Interpret\" = explain what it means for the real-world variable. Both are needed for full marks.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}], "count": 35}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "When a formula relates multiple variables (e.g., $$M = k\\frac{x^2 y}{Q}$$) and you are given percentage changes for $$x$$, $$y$$, and $$Q$$, what is the most algebraically robust method to find the overall percentage change in $$M$$ without calculating exact values? (3 steps)", "answer": "- Step 1: Convert all percentage changes into decimal multipliers. For example, a 50% increase becomes $$1.5$$ (or $$\\frac{3}{2}$$), and a 20% decrease becomes $$0.8$$ (or $$\\frac{4}{5}$$). Using fractions is often safer for non-calculator papers.\n- Step 2: Substitute these multipliers directly into the formula as factors next to their respective variables. For example, if $$x$$ increases by 50% and $$y$$ doubles, the new $$M$$ is $$k \\frac{(1.5x)^2 (2y)}{Q}$$.\n- Step 3: Factor out the numerical coefficients. The new $$M$$ becomes $$(1.5^2 \\times 2) \\times \\left(k \\frac{x^2 y}{Q}\\right)$$. The term in the second bracket is the old $$M$$, so the combined coefficient is the overall multiplier for $$M$$.\n\nAlways factor out and simplify the coefficients before doing any heavy multiplication; look for cancellations first!", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "A regression line equation is given as $$W = 3.27H - 120$$, where $$W$$ is weight in kg and $$H$$ is height in cm. Why is it insufficient to interpret the gradient simply as \"As height increases, weight increases\"? (2 steps)", "answer": "- Step 1: That statement only describes the sign of the correlation (positive), but it ignores the magnitude of the rate of change. The gradient provides a specific rate: how much $$W$$ changes per unit of $$H$$.\n- Step 2: A full statistical interpretation must include the units, the specific value, and the phrase \"on average\" (because regression lines model average trends, not exact deterministic rules). The correct interpretation is: \"On average, for each 1 cm increase in height, the weight increases by 3.27 kg.\"\n\nNever forget \"on average\" and the specific units when interpreting statistical models.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "When using a regression line to estimate a value, why is an estimate for a data point within the observed range (interpolation) generally considered more reliable than an estimate outside the range (extrapolation)? (2 steps)", "answer": "- Step 1: Interpolation relies on the observed data pattern; we have empirical evidence that the linear relationship holds within that specific region.\n- Step 2: Extrapolation assumes the same trend continues indefinitely beyond the observed data. In reality, relationships often change, level off, or reverse outside the observed range, making extrapolated predictions unreliable and potentially dangerous.\n\nInterpolation is grounded in evidence; extrapolation is an assumption.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "For a dataset with positive skew, the difference between $$Q_3$$ and $$Q_2$$ is greater than the difference between $$Q_2$$ and $$Q_1$$. How does this numerical fact translate to the visual spread of the data in a box plot, and what does it mean in context? (2 steps)", "answer": "- Step 1: In a box plot, each quartile section (from min to $$Q_1$$, $$Q_1$$ to $$Q_2$$, etc.) contains exactly 25% of the data. If the upper box ($$Q_3 - Q_2$$) is wider than the lower box ($$Q_2 - Q_1$$), it means the top 25% of the data is stretched over a larger range of values.\n- Step 2: In context (e.g., weights of horses), this means the data is \"more varied above the median.\" The heavier horses are more spread out from each other than the lighter horses are.\n\nSkewness isn't just about the \"tail\"; it's about unequal spread (variance) on either side of the median.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": false}, {"question": "When calculating the variance of a discrete random variable $$X$$ from a probability distribution table, a student calculates $$\\sum x^2 P(X=x)$$ and then divides the result by $$n$$ (the number of outcomes). Why is dividing by $$n$$ incorrect here? (2 steps)", "answer": "- Step 1: A probability distribution table already accounts for weighting via the probabilities. The probability $$P(X=x)$$ acts as the \"weight\" or \"relative frequency\" of each outcome, and the sum of all probabilities is already 1.\n- Step 2: Dividing by $$n$$ again would be double-counting the denominator. The correct formula for the expectation of $$X^2$$ is simply $$E(X^2) = \\sum x^2 P(X=x)$$, with no further division required. This is different from finding the variance of a raw list of data points, where you might divide by $$n$$.\n\n$$E(X^2)$$ is a weighted average, not a simple average.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "If $$Var(X)$$ is known, how do you find $$Var(aX + b)$$? What happens to the constant $$b$$ and why? (2 steps)", "answer": "- Step 1: The formula is $$Var(aX + b) = a^2 Var(X)$$. The constant $$b$$ disappears from the variance calculation entirely.\n- Step 2: Variance measures spread (how far data points are from the mean). Adding a constant $$b$$ shifts all data points (and the mean) equally along the number line, but it does not change the distances between the points. Therefore, the spread remains unchanged. Only scaling by $$a$$ stretches or compresses the spread.\n\nTranslation doesn't change spread; scaling does.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "Two events $$A$$ and $$B$$ are represented in a Venn diagram. If you are told $$A$$ and $$B$$ are independent, what specific equation must be true, and how does this allow you to find a missing value in the diagram? (2 steps)", "answer": "- Step 1: Independence means the occurrence of one event does not affect the probability of the other. Mathematically, this is defined as $$P(A \\cap B) = P(A) \\times P(B)$$.\n- Step 2: If you know the overall probabilities $$P(A)$$ and $$P(B)$$ (which you can find by summing the regions within their respective circles), you can calculate the exact value that must sit in the intersection. If the intersection is labeled with an unknown variable, you set up the equation $$P(A) \\times P(B) = \\text{Intersection Value}$$ to solve for it.\n\nIndependence is a mathematical constraint you can exploit to find missing regions.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "To find $$P(B | C')$$ using a Venn diagram, you need to identify two specific regions. How do the numerator and denominator of the conditional probability formula correspond to the diagram? (2 steps)", "answer": "- Step 1: The denominator is $$P(C')$$, the probability of being anywhere outside circle $$C$$. Visually, this is the entire area outside the $$C$$ circle, including the part of $$B$$ that doesn't overlap with $$C$$, and the outside region.\n- Step 2: The numerator is $$P(B \\cap C')$$, the region that satisfies both conditions: inside $$B$$ AND outside $$C$$. Visually, this is only the \"moon\" shape of $$B$$ that does not overlap with $$C$$.\n\nConditional probability restricts your universe to the condition (denominator), and then finds the part of that universe that satisfies the event (numerator).", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "On a Venn diagram, what is the visual difference between shading the union $$A \\cup B$$ versus the intersection $$A \\cap B$$? (2 steps)", "answer": "- Step 1: The union $$A \\cup B$$ includes any element that is in $$A$$, or in $$B$$, or in both. Visually, you shade everything inside circle $$A$$, everything inside circle $$B$$, and their overlap. It is the \"or\" (inclusive) region.\n- Step 2: The intersection $$A \\cap B$$ includes only elements that are in both $$A$$ and $$B$$ simultaneously. Visually, you shade only the overlapping lens-shaped region in the middle. It is the \"and\" region.\n\nUnion is all shaded area; intersection is only the doubly-shaded area.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "In a probability tree diagram, why do the probabilities on the branches originating from a single node always sum to 1? (2 steps)", "answer": "- Step 1: The branches from a single node represent all possible mutually exclusive outcomes for the next event, given that you have arrived at that node.\n- Step 2: Since one of these outcomes must occur (certainty), and total probability is 1, their sum must be exactly 1. This is practically useful: if you know the probability of \"Late\" is $$1/5$$, the probability of \"Not Late\" on the adjacent branch must be $$1 - 1/5 = 4/5$$.\n\nThe branches from a node form a complete, exhaustive set of possibilities for that stage.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "In a tree diagram, the first branches are transport modes (Car, Bike, Walk) and the second branches are outcomes (Late, Not Late). This gives us $$P(\\text{Late} | \\text{Car})$$. Why can't we simply assume $$P(\\text{Car} | \\text{Late})$$ is the same value? (2 steps)", "answer": "- Step 1: Conditional probability is not symmetric; $$P(A|B) \\neq P(B|A)$$ unless the events are independent. The condition and the event are swapping roles.\n- Step 2: $$P(\\text{Late} | \\text{Car})$$ is the proportion of car drivers who are late, while $$P(\\text{Car} | \\text{Late})$$ is the proportion of late people who drove. These are different groups (different denominators in the fraction). You must use the formula $$P(C|L) = \\frac{P(C \\cap L)}{P(L)}$$ to find it.\n\nSwapping the condition changes the \"universe\" you are looking at.", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": false}, {"question": "To find the overall probability of being late using a tree diagram with multiple transport modes, you calculate the probability of each path leading to \"Late\" and then add them together. Why do you add them instead of multiplying? (2 steps)", "answer": "- Step 1: Each path to \"Late\" represents a mutually exclusive way to arrive at that outcome. You cannot take the car and the bike simultaneously on the same day.\n- Step 2: The \"Or\" rule for mutually exclusive events states that you add their probabilities to find the probability of any of them happening. Multiplication is for \"And\" events (along a path), while addition is for \"Or\" events (between paths).\n\nMultiply along branches (And), add between separate paths (Or).", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": false}, {"question": "In Edexcel A-Level Maths, unless a question specifies otherwise, what level of precision is required for final decimal answers, and what is a common mistake regarding this? (1 step)", "answer": "Final answers given as decimals must be correct to at least 3 significant figures. A common mistake is giving an answer to only 1 or 2 significant figures (e.g., writing 0.08 instead of 0.0832), which results in losing the final accuracy mark.\n\nAlways check your final answer's precision before moving on.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "If $$Z = \\frac{x}{y}$$, and $$x$$ is multiplied by 4 while $$y$$ is multiplied by 2, what is the overall multiplier for the new value of $$Z$$? (1 step)", "answer": "$$2$$. The new $$Z$$ is $$\\frac{4x}{2y}$$, which simplifies to $$2\\left(\\frac{x}{y}\\right) = 2Z$$. The new value is twice the old value.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "If $$Var(X) = 5$$, what is $$Var(2X - 3)$$? (1 step)", "answer": "$$20$$. Using the rule $$Var(aX+b) = a^2 Var(X)$$, we get $$2^2 \\times 5 = 4 \\times 5 = 20$$. The $$-3$$ has no effect on the spread, so it disappears.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "When a question asks you to \"Show that there is only one outlier,\" why is it risky to just state \"There is a single data point outside the limits\"? (2 steps)", "answer": "- Step 1: Exam mark schemes often require explicit identification of the outlier to prove you know which one it is and have checked the others.\n- Step 2: You must state clearly, for example, \"139 is the only outlier,\" to remove any ambiguity. Vague statements about \"a data point\" do not guarantee the mark.\n\nBe explicit and name the specific data point to secure the mark.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": false}], "count": 16}, "glm_3": {"label": "GLM 5.1 ③", "cards": [{"question": "If a variable $$x$$ increases by 50%, what is the multiplicative factor for the \"new $$x$$\" relative to the \"old $$x$$\"? Why is using a multiplicative factor algebraically safer than adding 0.5? (2 steps)", "answer": "- Step 1: A 50% increase means the new value is the old value plus half of the old value. This translates to a multiplicative factor of $$1 + 0.5 = 1.5$$, or $$\\frac{3}{2}$$.\n- Step 2: Using a multiplicative factor is algebraically safer because if $$x$$ is involved in operations like squaring or multiplying in an equation, you can directly substitute the factor. Adding 0.5 breaks the algebraic structure—for example, $$(1.5x)^2 = 2.25x^2$$, whereas $$(x + 0.5)^2 \\neq x^2 + 0.25$$.\n\nUsing factors preserves the proportional structure of the equation.", "source": "GLM 5.1 ③", "_id": "glm_3_0", "judge_pick": false}, {"question": "In a proportional equation like $$M = k \\cdot x^2 \\cdot y \\cdot Q$$, if $$x$$ and $$y$$ change, why is it algebraically advantageous to factor out the new coefficients rather than expanding the brackets? (2 steps)", "answer": "- Step 1: By grouping the old variables and the new multiplicative factors separately, you create a single multiplier acting on the entire original term. For example, if new $$x = 1.5x$$ and new $$y = 2y$$, you get $$M_{new} = k \\cdot (1.5x)^2 \\cdot (2y) \\cdot Q = k \\cdot (1.5)^2 \\cdot 2 \\cdot x^2 \\cdot y \\cdot Q$$.\n- Step 2: Since the original $$M_{old} = k \\cdot x^2 \\cdot y \\cdot Q$$, you can substitute it directly: $$M_{new} = (1.5)^2 \\cdot 2 \\cdot M_{old}$$. This avoids expanding large brackets and makes cancellation of the old terms trivial, directly revealing the net percentage change.\n\nFactor first, calculate second—it reveals the structure of the change.", "source": "GLM 5.1 ③", "_id": "glm_3_1", "judge_pick": false}, {"question": "When dividing a fraction by an integer (e.g., $$\\frac{9}{5} \\div 2$$), a common error is to multiply the numerator by 2. Conceptually, where does the 2 actually belong, and why? (2 steps)", "answer": "- Step 1: An integer like 2 can be written as the fraction $$\\frac{2}{1}$$. Dividing by a fraction means multiplying by its reciprocal: $$\\frac{9}{5} \\times \\frac{1}{2}$$.\n- Step 2: When multiplying fractions, you multiply numerators together and denominators together. This places the 2 in the denominator: $$\\frac{9 \\times 1}{5 \\times 2} = \\frac{9}{10}$$. Putting the 2 in the numerator would incorrectly give $$\\frac{18}{5}$$, which is multiplying by 2, not dividing.\n\nRemember \"keep, change, flip\"—the integer always multiplies the bottom.", "source": "GLM 5.1 ③", "_id": "glm_3_2", "judge_pick": false}, {"question": "In Edexcel A-Level Maths, what is the standard rule for giving final decimal answers, and what is the penalty for ignoring it? (2 steps)", "answer": "- Step 1: Unless the question specifies otherwise (e.g., \"give your answer to 2 decimal places\"), any non-exact decimal answer must be given to at least 3 significant figures.\n- Step 2: If you give an answer to only 1 or 2 significant figures (e.g., writing 0.4 instead of 0.432), you will lose the final accuracy mark, even if your method was completely correct.\n\nAlways carry full calculator precision until the final step, then round to 3 s.f.", "source": "GLM 5.1 ③", "_id": "glm_3_3", "judge_pick": false}, {"question": "When an exam question asks you to \"interpret the gradient of the regression line\", what is the key difference between \"interpreting\" it versus just \"describing\" or \"stating\" it? (2 steps)", "answer": "- Step 1: \"Stating\" or \"describing\" the gradient just requires you to read the number from the equation (e.g., \"the gradient is 3.27\" or \"there is positive correlation\"). \"Interpreting\" means you must explain what that number *means* in the real world, as if speaking to a non-mathematician.\n- Step 2: You must use the specific units and variables from the context. The required template is: \"On average, for a 1 unit increase in [x-variable], the [y-variable] increases/decreases by [gradient] [units of y].\" For example: \"On average, for each 1 cm increase in height, the weight increases by 3.27 kg.\"\n\n\"Interpret\" always means \"tell the story of the numbers in context.\"", "source": "GLM 5.1 ③", "_id": "glm_3_4", "judge_pick": false}, {"question": "When using a regression line to estimate a value, what is the conceptual difference between interpolation and extrapolation, and why is one considered risky? (2 steps)", "answer": "- Step 1: Interpolation is estimating a value *within* the range of the original data used to fit the model. Extrapolation is estimating a value *outside* that range (predicting for inputs larger or smaller than your data).\n- Step 2: Extrapolation is risky/unreliable because we have no data to verify the relationship holds outside the observed range. The trend might change, curve, or flatten out in the real world, making our linear assumption invalid beyond the data limits.\n\nTrust interpolation; doubt extrapolation.", "source": "GLM 5.1 ③", "_id": "glm_3_5", "judge_pick": false}, {"question": "When a question asks you to \"show that there is only one outlier\", why is it insufficient to just say \"there is a single data point outside the limits\"? (2 steps)", "answer": "- Step 1: While logically you might mean the outlier, the examiner needs absolute, unambiguous clarity to award the final mark.\n- Step 2: You must explicitly identify which specific data point is the outlier by its value (e.g., \"139 is the only outlier\"). This proves you have correctly identified the specific anomaly and leaves no room for misinterpretation.\n\nBe explicit: name the outlier, don't just describe its existence.", "source": "GLM 5.1 ③", "_id": "glm_3_6", "judge_pick": false}, {"question": "A box plot shows that the distance between $$Q3$$ and $$Q2$$ is larger than the distance between $$Q2$$ and $$Q1$$. How do you describe the skewness, and what does this mean conceptually about the spread of the data? (2 steps)", "answer": "- Step 1: The distribution has positive skew (or is positively skewed). This is defined by the upper quartile being further from the median than the lower quartile is.\n- Step 2: Conceptually, this means the data values are more spread out above the median than below it. In context (e.g., weights), you would say \"the weights are more varied above the median\"—there are unusually high values pulling the upper whisker further away from the box.\n\nPositive skew means a long upper tail; the data stretches out more on the high end.", "source": "GLM 5.1 ③", "_id": "glm_3_7", "judge_pick": false}, {"question": "When asked to \"specify the cumulative distribution function\" (CDF) for a discrete random variable, what is the standard presentation format expected by examiners? (2 steps)", "answer": "- Step 1: While a list of values or a paragraph might contain the correct numbers, the standard expected format is a table.\n- Step 2: The table should have two columns: the random variable $$x$$ and the cumulative probability $$F(x)$$. This clearly shows the step-wise accumulation of probabilities up to each value of $$x$$, making it easy for the examiner to verify.\n\nFormat CDFs as tables to guarantee the method marks.", "source": "GLM 5.1 ③", "_id": "glm_3_8", "judge_pick": false}, {"question": "What is the formula for the variance of a discrete random variable $$Var(X)$$, and why is it fundamentally different from calculating the variance of a sample? (3 steps)", "answer": "- Step 1: The formula is $$Var(X) = E(X^2) - [E(X)]^2$$.\n- Step 2: To find $$E(X^2)$$, you calculate the sum of each $$x^2$$ multiplied by its probability: $$\\sum x^2 P(X=x)$$. This is a weighted sum, not a simple average.\n- Step 3: Unlike sample variance (where you divide by $$n$$ or $$n-1$$), for a probability distribution you DO NOT divide by the number of outcomes. The probabilities already scale the values, so a simple weighted sum is all that's required.\n\nNever divide by $$n$$ when finding the variance of a probability distribution.", "source": "GLM 5.1 ③", "_id": "glm_3_9", "judge_pick": false}, {"question": "If $$Var(X) = 1.36$$, what is $$Var(5 - 3X)$$, and why does the constant 5 disappear while the -3 becomes a 9? (3 steps)", "answer": "- Step 1: The rule for linear transformations of variance is $$Var(aX + b) = a^2 Var(X)$$.\n- Step 2: The constant '$$b$$' (which is 5 here) disappears because variance measures *spread*. Adding a constant simply shifts all data points up or down by the same amount, which does not change how spread out they are from each other.\n- Step 3: The coefficient '$$a$$' (-3) is squared because if you stretch all distances from the mean by a factor of 3, the squared deviations (which is what variance is based on) are stretched by $$(-3)^2 = 9$$. So $$Var(5-3X) = 9 \\times 1.36 = 12.24$$.\n\nAdding shifts the center (no effect on spread); multiplying scales the spread (squared effect).", "source": "GLM 5.1 ③", "_id": "glm_3_10", "judge_pick": false}, {"question": "In a Venn diagram with events A and B, what is the defining algebraic property you MUST use if the question states that A and B are \"independent\"? (2 steps)", "answer": "- Step 1: For independent events, the probability of their intersection equals the product of their individual probabilities: $$P(A \\cap B) = P(A) \\times P(B)$$.\n- Step 2: This is the only condition that guarantees independence. If this equation holds, knowing that A occurred gives you no new information about the likelihood of B occurring (and vice versa). Without this keyword, you cannot assume this relationship.\n\n\"Independent\" is your trigger to multiply the probabilities to find the overlap.", "source": "GLM 5.1 ③", "_id": "glm_3_11", "judge_pick": false}, {"question": "How do you calculate the conditional probability $$P(A | B)$$, and how does this translate visually on a Venn diagram? (2 steps)", "answer": "- Step 1: The formula is $$P(A | B) = \\frac{P(A \\cap B)}{P(B)}$$. It restricts the sample space to only the event B.\n- Step 2: Visually, the denominator $$P(B)$$ is the entire area of circle B (including the intersection). The numerator $$P(A \\cap B)$$ is only the overlapping region. You are effectively finding what fraction of circle B is also inside circle A.\n\nConditional probability is a fraction of a restricted world.", "source": "GLM 5.1 ③", "_id": "glm_3_12", "judge_pick": false}, {"question": "In a probability tree diagram, what fundamental rule governs the branches coming from a single node, and why does it hold? (2 steps)", "answer": "- Step 1: The probabilities of all branches stemming from a single node must sum to exactly 1.\n- Step 2: This is because the branches represent mutually exclusive outcomes of a single event, and one of those outcomes *must* happen. Since certainty is represented by a probability of 1, the total of the possibilities is 1. For example, if $$P(\\text{Late} | \\text{Car}) = \\frac{1}{5}$$, then $$P(\\text{Not Late} | \\text{Car})$$ must be $$\\frac{4}{5}$$.\n\nBranches from the same node are an exhaustive list of possibilities.", "source": "GLM 5.1 ③", "_id": "glm_3_13", "judge_pick": false}, {"question": "If an outcome (like being late) can happen via multiple mutually exclusive routes (e.g., car, bike, walk), how do you find the total probability of that outcome? (2 steps)", "answer": "- Step 1: You find the probability of each individual route by multiplying the probabilities along its branches (e.g., $$P(\\text{Car}) \\times P(\\text{Late} | \\text{Car})$$).\n- Step 2: You then add the probabilities of all these separate routes together. This works because the routes are mutually exclusive—you cannot take the car AND walk at the same time—so their combined probability is the sum of their individual probabilities.\n\nMultiply along paths, add across paths.", "source": "GLM 5.1 ③", "_id": "glm_3_14", "judge_pick": false}, {"question": "You are given $$P(\\text{Late} | \\text{Car})$$ but need to find $$P(\\text{Car} | \\text{Late})$$. Why can't you simply swap the terms, and what is the correct conceptual approach? (3 steps)", "answer": "- Step 1: $$P(A|B)$$ is generally NOT equal to $$P(B|A)$$. For example, the probability of owning a car given you are rich is high, but the probability of being rich given you own a car is much lower. The base populations are different.\n- Step 2: To reverse the condition, you must use the definition of conditional probability: $$P(\\text{Car} | \\text{Late}) = \\frac{P(\\text{Car} \\cap \\text{Late})}{P(\\text{Late})}$$.\n- Step 3: You calculate the numerator using the original \"forward\" direction: $$P(\\text{Car}) \\times P(\\text{Late} | \\text{Car})$$. The denominator is the total probability of being late (the sum of all routes to being late).\n\nReversing a tree diagram requires recalculating the new restricted sample space.", "source": "GLM 5.1 ③", "_id": "glm_3_15", "judge_pick": false}], "count": 16}, "qwen_1": {"label": "Qwen 3 ①", "cards": [{"question": "Explain why the gradient of a regression line must be interpreted in context using specific units, and why simply stating \"positive/negative correlation\" is insufficient. (3 steps)", "answer": "- Step 1: The gradient quantifies the **rate of change** between variables. For example, a gradient of 3.27 kg/cm in a height-weight regression means \"for every 1 cm increase in height, weight increases by 3.27 kg on average.\"  \n- Step 2: Correlation alone (positive/negative) only describes the **direction** of the relationship, not the **magnitude**. Two datasets could have identical correlation coefficients but vastly different gradients.  \n+ Example: A drug dosage vs. recovery time regression with a gradient of -2 days/mg (strong effect) vs. -0.1 days/mg (negligible effect) both show negative correlation but vastly different practical implications.  \n- Step 3: Contextual units ensure **actionable insights**. Non-mathematicians (e.g., policymakers) need concrete interpretations like \"each additional hour of study increases exam scores by 5 points\" rather than abstract statistical terms.  \n\n[Optional: Misconception probe: Why can a steep gradient coexist with weak correlation? Because correlation measures linearity, not slope magnitude.]", "source": "Qwen 3 ①", "_id": "qwen_1_0", "judge_pick": true}, {"question": "Why is interpolation generally more reliable than extrapolation when using a regression line? (3 steps)", "answer": "- Step 1: Interpolation estimates values within the **observed data range**, where the model has empirical support. For example, predicting plant growth at 25°C when data spans 20-30°C.  \n- Step 2: Extrapolation assumes the relationship remains linear **beyond observed data**, which risks ignoring non-linearities (e.g., saturation effects). Example: Extrapolating plant growth at 40°C from data up to 30°C might ignore heat stress.  \n+ Sub-case: Extrapolation can fail catastrophically in real-world scenarios (e.g., financial models predicting unchecked growth pre-2008 crash).  \n- Step 3: Statistical uncertainty quantification (e.g., confidence intervals) widens drastically during extrapolation, reflecting reduced reliability.  \n\n[Optional: Edge case: When is extrapolation justified? When physical laws guarantee linearity (e.g., Ohm's law V=IR in electronics).]", "source": "Qwen 3 ①", "_id": "qwen_1_1", "judge_pick": true}, {"question": "Derive why variance is unaffected by adding a constant (Var(X + b) = Var(X)), but scales with multiplication (Var(aX) = a²Var(X)). (4 steps)", "answer": "- Step 1: Variance measures spread around the mean. Adding a constant shifts all data points equally: $ \\text{Var}(X + b) = \\mathbb{E}[(X + b - (\\mu + b))^2] = \\mathbb{E}[(X - \\mu)^2] = \\text{Var}(X) $.  \n- Step 2: Multiplying by a constant scales deviations from the mean: $ \\text{Var}(aX) = \\mathbb{E}[(aX - a\\mu)^2] = a^2\\mathbb{E}[(X - \\mu)^2] = a^2\\text{Var}(X) $.  \n+ Sub-case: Scaling by 2 doubles deviations but squares their squared contributions.  \n- Step 3: Intuitive example: If temperatures in Celsius have variance σ², converting to Kelvin (adding 273.15) doesn't change spread. Converting to Fahrenheit (multiplying by 9/5) increases variance by (9/5)².  \n\n[Optional: Misconception probe: Why isn't Var(aX) = |a|Var(X)? Because squaring removes directionality.]", "source": "Qwen 3 ①", "_id": "qwen_1_2", "judge_pick": true}, {"question": "Explain why skewness in a dataset cannot be determined solely by comparing the mean and median. (2 steps)", "answer": "- Step 1: While mean > median often suggests **positive skew**, this is not definitive. Outliers can distort the mean independently of skewness. Example: A symmetric dataset with one extreme high outlier may have mean > median despite no true skew.  \n- Step 2: Skewness must consider the **gap between quartiles**:  \n+ Positive skew: $ Q3 - Q2 > Q2 - Q1 $  \n+ Negative skew: $ Q2 - Q1 > Q3 - Q2 $  \n+ Symmetric distribution: $ Q3 - Q2 \\approx Q2 - Q1 $  \n\n[Optional: Edge case: A bimodal distribution can have mean ≈ median but still be skewed in individual modes.]", "source": "Qwen 3 ①", "_id": "qwen_1_3", "judge_pick": false}, {"question": "In Venn diagrams, why does $ P(A \\cap B) = P(A)P(B) $ signify independent events, but $ P(A \\cap B) = P(A)P(B|A) $ always holds? (3 steps)", "answer": "- Step 1: For independent events, knowledge of A doesn't change B's probability: $ P(B|A) = P(B) $. Substituting into conditional probability formula gives $ P(A \\cap B) = P(A)P(B) $.  \n- Step 2: The general formula $ P(A \\cap B) = P(A)P(B|A) $ applies to all events. Example: Drawing two red cards from a deck without replacement:  \n+ $ P(\\text{first red}) = \\frac{26}{52} $, $ P(\\text{second red}|\\text{first red}) = \\frac{25}{51} $  \n+ $ P(\\text{both red}) = \\frac{26}{52} \\times \\frac{25}{51} $  \n- Step 3: Misapplying independence (e.g., assuming $ P(A \\cap B) = P(A)P(B) $ for dependent events) leads to errors like the prosecutor's fallacy in legal reasoning.", "source": "Qwen 3 ①", "_id": "qwen_1_4", "judge_pick": false}, {"question": "Why does the formula $ \\text{Var}(X) = \\mathbb{E}[X^2] - (\\mathbb{E}[X])^2 $ work, and how does coding data (e.g., $ Y = \\frac{X - a}{b} $) affect its calculation? (4 steps)", "answer": "- Step 1: Expand the definition of variance:  \n$$ \\text{Var}(X) = \\mathbb{E}[(X - \\mu)^2] = \\mathbb{E}[X^2 - 2\\mu X + \\mu^2] = \\mathbb{E}[X^2] - 2\\mu^2 + \\mu^2 = \\mathbb{E}[X^2] - (\\mathbb{E}[X])^2 $$  \n- Step 2: Coding simplifies calculations by reducing large numbers. For $ Y = \\frac{X - a}{b} $:  \n+ $ \\mathbb{E}[Y] = \\frac{\\mathbb{E}[X] - a}{b} $  \n+ $ \\text{Var}(Y) = \\frac{1}{b^2}\\text{Var}(X) $  \n- Step 3: Example: Calculate variance of 2000, 2005, 2010 using coding $ Y = X - 2000 $:  \n+ Original: Var(X) = Var(Y) = 12.5  \n+ Without coding, squaring large numbers (2000², etc.) complicates arithmetic.  \n\n[Optional: Misconception probe: Why not use $ \\mathbb{E}[|X|] $ instead of squaring? Squaring emphasizes larger deviations and ensures differentiability.]", "source": "Qwen 3 ①", "_id": "qwen_1_5", "judge_pick": true}, {"question": "In a probability tree diagram, why must the probabilities on branches from a single node always sum to 1, and what happens if they don't? (3 steps)", "answer": "- Step 1: Branch probabilities represent **exhaustive outcomes** from a node. For example, if a node splits into \"rain\" (0.3), \"cloudy\" (0.5), and \"sunny\" (0.2), the 0.3 + 0.5 + 0.2 = 1 ensures all possibilities are covered.  \n- Step 2: If branches don't sum to 1:  \n+ Missing outcomes: A student calculating P(pass) = 0.7 and P(fail) = 0.2 (total 0.9) ignores retakes (0.1).  \n+ Overlapping outcomes: Counting \"red card\" and \"ace\" separately in card probabilities without adjusting for overlap (ace of hearts counted twice).  \n- Step 3: Real-world consequence: In medical testing, violating this rule could imply false certainty (e.g., 95% disease probability + 5% no disease = 100%, ignoring test error rates).", "source": "Qwen 3 ①", "_id": "qwen_1_6", "judge_pick": false}], "count": 7}, "qwen_2": {"label": "Qwen 3 ②", "cards": [{"question": "Explain why the gradient of a regression line should be interpreted with units from the context, using the example of horse height (cm) and weight (kg) and slope 3.27. (3 steps)", "answer": "- Step 1: **Identify variable roles** – The gradient (3.27) represents the change in y (weight) per unit change in x (height).  \n+ Example: For every 1 cm increase in horse height, weight increases by 3.27 kg.  \n- Step 2: **Avoid mathematical jargon** – Non-mathematicians need concrete cause-effect language: \"3.27 kg per cm\".  \n+ Counterexample: Saying \"positive correlation\" without units is insufficient.  \n- Step 3: **Address directional reasoning** – The slope quantifies the exact rate of change, not just general trend.  \n+ Misconception: Slope ≠ \"how weight relates to height\" without directional specificity.  \n\n[Optional: Explain why the y-intercept might also need contextual interpretation in regression models.]", "source": "Qwen 3 ②", "_id": "qwen_2_0", "judge_pick": false}, {"question": "Why is interpolation generally more reliable than extrapolation in regression estimates?", "answer": "Interpolation uses data within the observed range, where the model was fitted and patterns are confirmed.  \n+ For example, estimating weight from height between 150-170 cm when data exists for this range.  \nExtrapolation assumes trends continue outside the observed range, which risks invalid conclusions:  \n+ Example: Predicting horse weight beyond 200 cm height when no data exists there.  \nVisual intuition: Extrapolation assumes the line's behavior \"off the graph\", which real-world relationships (like growth limits) might invalidate.", "source": "Qwen 3 ②", "_id": "qwen_2_1", "judge_pick": false}, {"question": "Derive Var(5 − 3X) using the definition of variance, explaining why constants vanish and coefficients scale quadratically. (4 steps)", "answer": "- Step 1: **Recall variance definition**  \nVar(aX + b) = E[(aX + b − E[aX + b])²]  \n- Step 2: **Simplify expectation**  \nE[aX + b] = aE[X] + b ⇒ Variance becomes E[(aX − aE[X])²]  \n- Step 3: **Factor out constant a**  \n= E[a²(X − E[X])²] = a²E[(X − E[X])²] = a²Var(X)  \n- Step 4: **Apply to 5 − 3X**  \na = −3 ⇒ Var(5 − 3X) = (−3)²Var(X) = 9Var(X)  \n+ Misconception: Constants (5) in linear transforms don't affect spread, only location.", "source": "Qwen 3 ②", "_id": "qwen_2_2", "judge_pick": false}, {"question": "For independent events A and B, why does P(A ∩ B) = P(A)P(B) hold? Use a Venn diagram analogy.", "answer": "Independence means knowledge of A doesn't affect B's probability.  \n- Imagine dividing the Venn diagram into a grid:  \n+ P(A ∩ B) = Area of overlap between A and B segments  \n- For independence, overlap area = product of marginal areas:  \n+ Like partitioning a rectangle into smaller rectangles with proportions P(A) and P(B)  \n- Counterexample: If A and B are mutually exclusive, P(A ∩ B) = 0 ≠ P(A)P(B) ⇒ Not independent.", "source": "Qwen 3 ②", "_id": "qwen_2_3", "judge_pick": false}, {"question": "Why does the expected value of X² (E[X²]) appear in variance calculations? Explain its role.", "answer": "Variance measures spread around the mean: Var(X) = E[(X − μ)²].  \n- Expanding this gives: E[X²] − 2μE[X] + μ²  \n= E[X²] − μ² (since E[X] = μ)  \n⇒ Var(X) = E[X²] − (E[X])²  \n+ E[X²] represents the average squared deviation's magnitude before subtracting mean effect  \n+ Without E[X²], we couldn't quantify spread independent of location (μ)", "source": "Qwen 3 ②", "_id": "qwen_2_4", "judge_pick": true}, {"question": "When interpreting a positively skewed box plot (Q3 − Q2 > Q2 − Q1), why does this indicate more data variation above the median? (2 steps)", "answer": "- Step 1: **Understand quartile distances** – The box plot divides data into 4 equal-count quarters.  \n+ If Q3 − Q2 > Q2 − Q1, the upper half (3rd quarter) is more spread out.  \n- Step 2: **Visualize distribution** – In positive skew, the longer tail pulls the mean above the median.  \n+ Real-world example: Wealth distribution – most people have lower wealth, but a few rich outliers stretch the upper tail.", "source": "Qwen 3 ②", "_id": "qwen_2_5", "judge_pick": false}, {"question": "Why must outliers be explicitly stated as the *only* outliers in final conclusions?", "answer": "Mathematical rigor requires precise quantification:  \n- Outlier definitions (e.g., > 1.5 IQR from quartiles) identify candidate points  \n- Final assertion must confirm uniqueness to avoid ambiguity:  \n+ \"139 is an outlier\" vs. \"139 is the only outlier\" changes evidentiary weight  \n- Mark schemes penalize vague statements because real-world decisions (e.g., data cleaning) require clear criteria.", "source": "Qwen 3 ②", "_id": "qwen_2_6", "judge_pick": false}, {"question": "For conditional probability P(B|C'), why do we divide P(B ∩ C') by P(C') and not P(C') ∩ P(B)?", "answer": "Conditional probability restricts the sample space to the condition (C').  \n- Formula structure: P(B|C') = P(B ∩ C') / P(C')  \n- Denominator normalizes probabilities within the reduced C' universe  \n+ Misconception: P(B|C') ≠ P(B)P(C') – only true if B and C' are independent  \n- Analogy: If C' is \"not raining\", P(B|C') measures how often B occurs among non-rainy days.", "source": "Qwen 3 ②", "_id": "qwen_2_7", "judge_pick": false}, {"question": "Why does multiplying all data points by a factor k affect the variance by k² but not the skewness?", "answer": "Variance scales with square of linear dimensions:  \n- Var(kX) = k²Var(X) ⇒ Spread magnifies in both directions  \nSkewness is unitless and scale-invariant:  \n- Defined as E[(X − μ)³]/σ³ ⇒ Numerator scales with k³, denominator (σ³) also scales with k³ ⇒ Ratio remains constant  \n+ Visual intuition: Stretching a histogram preserves its shape (skewness), just with wider axis labels.", "source": "Qwen 3 ②", "_id": "qwen_2_8", "judge_pick": false}, {"question": "In tree diagrams, why must the sum of probabilities on branching paths equal 1?", "answer": "Probability axioms require that if an event has n mutually exclusive outcomes:  \nP(outcome₁) + P(outcome₂) + ... + P(outcome_n) = 1  \n- Tree diagrams represent exhaustive scenarios at each decision point  \n+ Example: Paul's commute – car, bicycle, walk cover all possibilities ⇒ Σ = 1  \n- Violating this creates impossible probability models (e.g., >100% certainty).", "source": "Qwen 3 ②", "_id": "qwen_2_9", "judge_pick": false}], "count": 10}, "minimax_1": {"label": "MiniMax ①", "cards": [], "count": 0}, "minimax_2": {"label": "MiniMax ②", "cards": [{"question": "In a regression model where weight W (kg) is modeled as a linear function of height H (cm) with equation $$W = 3.27H - 153.4$$, what does the gradient of 3.27 represent in the context of this problem? (2 steps)", "answer": "- Step 1: Identify what each variable represents — H is the independent variable (height in centimetres) and W is the dependent variable (weight in kilograms).\n- Step 2: The gradient tells us the rate of change of W with respect to H. In context, this means for every one centimetre increase in height, the weight increases by 3.27 kilograms, on average.\n\nThe interpretation must be specific to the context: \"On average, for each one centimetre increase in height, the weight increases by 3.27 kilograms.\"", "source": "MiniMax ②", "_id": "minimax_2_0", "judge_pick": false}, {"question": "Explain the difference between interpolation and extrapolation when using a regression line to make predictions, and state which is more reliable. (2 steps)", "answer": "- Step 1: Interpolation means predicting a value for an x-value that falls within the range of the original data used to fit the regression line. Extrapolation means predicting for an x-value outside that original range.\n- Step 2: Interpolation is more reliable because it stays within the region where we have actual data to support our prediction. Extrapolation can be unreliable because we're making predictions beyond where our data provides evidence, and the linear relationship may not hold outside that range.", "source": "MiniMax ②", "_id": "minimax_2_1", "judge_pick": false}, {"question": "What does it mean for two events A and B to be independent in probability theory? (1 step)", "answer": "Two events A and B are independent if the occurrence of one does not affect the probability of the other occurring. Mathematically, this means $$P(A \\cap B) = P(A) \\times P(B)$$. Alternatively, you can use the conditional probability formulation: $$P(A|B) = P(A)$$ or equivalently $$P(B|A) = P(B)$$.", "source": "MiniMax ②", "_id": "minimax_2_2", "judge_pick": false}, {"question": "If X is a discrete random variable with probability distribution given by $$P(X = x_i) = p_i$$, how do you calculate the expected value E(X)? (1 step)", "answer": "The expected value (or mean) of a discrete random variable is calculated by summing each possible value of X multiplied by its corresponding probability: $$E(X) = \\sum x_i p_i$$. This represents the long-run average value if you were to repeat the experiment many times.", "source": "MiniMax ②", "_id": "minimax_2_3", "judge_pick": false}, {"question": "For a discrete random variable X, the variance is defined as $$Var(X) = E(X^2) - [E(X)]^2$$. If you are asked to find $$Var(5 - 3X)$$ and you already know $$E(X)$$ and $$E(X^2)$$, how would you calculate this? (2 steps)", "answer": "- Step 1: Recall the variance transformation formula: For a linear transformation $$a + bX$$, the variance becomes $$Var(a + bX) = b^2 \\times Var(X)$$. The constant 'a' disappears because it doesn't affect spread.\n- Step 2: First find $$Var(X) = E(X^2) - [E(X)]^2$$, then substitute into $$Var(5 - 3X) = (-3)^2 \\times Var(X) = 9 \\times Var(X)$$. The coefficient -3 is squared to become 9.", "source": "MiniMax ②", "_id": "minimax_2_4", "judge_pick": false}, {"question": "In a tree diagram representing two-stage probability scenarios, why do the probabilities on each set of branches from any node always sum to 1? (1 step)", "answer": "At any node in a probability tree, the branches represent all possible mutually exclusive outcomes that could occur following that event. Since one of these outcomes must definitely happen (they are exhaustive), and they are mutually exclusive (cannot happen simultaneously), the total probability is certainty, which is represented by 1.", "source": "MiniMax ②", "_id": "minimax_2_5", "judge_pick": false}, {"question": "What is the formula for conditional probability, and how is it related to the general multiplication rule? (1 step)", "answer": "The conditional probability of event A occurring given that event B has occurred is: $$P(A|B) = \\frac{P(A \\cap B)}{P(B)}$$. This can be rearranged to give the general multiplication rule: $$P(A \\cap B) = P(B) \\times P(A|B)$$. This tells us the probability of both events occurring is the probability of the first event multiplied by the probability of the second event given that the first occurred.", "source": "MiniMax ②", "_id": "minimax_2_6", "judge_pick": false}, {"question": "When interpreting a box plot, how can you determine whether a distribution has positive skew or negative skew? (1 step)", "answer": "In a box plot, compare the distances between the quartiles. If the upper quartile (Q3) is farther from the median than the lower quartile (Q1) — that is, if $$Q3 - Q2 > Q2 - Q1$$ — the distribution is positively skewed (skewed to the right). Conversely, if the lower quartile is farther from the median, it is negatively skewed. You can also visualize which tail is longer: a longer right tail indicates positive skew.", "source": "MiniMax ②", "_id": "minimax_2_7", "judge_pick": false}, {"question": "A student writes the cumulative distribution function (CDF) of a discrete random variable as a list of values. What is the standard way to present a CDF in an exam answer? (1 step)", "answer": "The CDF should be presented as a table with two rows: one for the values of x (the random variable) and one for $$F(x) = P(X \\leq x)$$, the cumulative probability. This table format clearly shows all values of x and their corresponding cumulative probabilities, making it easy for the examiner to verify the answer.", "source": "MiniMax ②", "_id": "minimax_2_8", "judge_pick": false}, {"question": "In a Venn diagram problem, if events A and B are independent and you are given $$P(A) = 0.6$$ and $$P(B) = 0.55$$, how would you find $$P(A \\cap B)$$? (2 steps)", "answer": "- Step 1: Apply the independence formula: $$P(A \\cap B) = P(A) \\times P(B)$$.\n- Step 2: Substitute the given values: $$P(A \\cap B) = 0.6 \\times 0.55 = 0.33$$. This value represents the probability that both A and B occur simultaneously.", "source": "MiniMax ②", "_id": "minimax_2_9", "judge_pick": false}, {"question": "What is an outlier in statistics, and what is the common method for identifying outliers using a box plot? (1 step)", "answer": "An outlier is a data point that significantly differs from other observations. In a box plot, outliers are typically defined as values that fall below $$Q1 - 1.5 \\times IQR$$ or above $$Q3 + 1.5 \\times IQR$$, where IQR (interquartile range) is $$Q3 - Q1$$. These are sometimes called \"mild\" outliers; \"extreme\" outliers use 3 × IQR instead of 1.5 × IQR.", "source": "MiniMax ②", "_id": "minimax_2_10", "judge_pick": false}, {"question": "Explain what the standard deviation measures and how it relates to variance. (1 step)", "answer": "Standard deviation measures the average spread of data around the mean — it tells you, on typical values, how far away from the mean the data points tend to be. It is the square root of the variance: $$SD = \\sqrt{Var(X)}$$. While variance gives you the average squared deviation from the mean (in squared units), standard deviation returns to the original units, making it more interpretable.", "source": "MiniMax ②", "_id": "minimax_2_11", "judge_pick": false}, {"question": "When solving a probability problem involving $$P(B|C')$$, what does the notation C' (or Cᶜ) represent, and how would you find this on a Venn diagram? (2 steps)", "answer": "- Step 1: C' (or Cᶜ) represents the complement of event C — all outcomes where C does not occur. The complement satisfies $$P(C') = 1 - P(C)$$.\n- Step 2: On a Venn diagram, C' is everything outside the circle for C — all regions not shaded by C. When calculating conditional probability with C', you would consider only the area outside C as your new sample space.", "source": "MiniMax ②", "_id": "minimax_2_12", "judge_pick": false}, {"question": "In the context of a probability tree diagram where the first branch represents the method of transport (car, bicycle, walk) and the second branch represents whether someone is late or not late, how do you find the probability of being late overall? (2 steps)", "answer": "- Step 1: Identify all the paths through the tree that lead to being late: car AND late, bicycle AND late, and walk AND late.\n- Step 2: For each path, multiply the probabilities along the branches (multiplication rule). Then sum all these joint probabilities: $$P(\\text{late}) = P(\\text{car}) \\times P(\\text{late}|\\text{car}) + P(\\text{bicycle}) \\times P(\\text{late}|\\text{bicycle}) + P(\\text{walk}) \\times P(\\text{late}|\\text{walk})$$.", "source": "MiniMax ②", "_id": "minimax_2_13", "judge_pick": false}, {"question": "If you are asked to find $$P(B|A')$$ using a Venn diagram, explain exactly which region(s) you would highlight and what would go in the denominator of the calculation. (2 steps)", "answer": "- Step 1: The denominator $$P(A')$$ represents the entire region outside of A (everything that is not A).\n- Step 2: The numerator $$P(B \\cap A')$$ is the region that is in B but NOT in A — the part of B that lies outside the A circle. So you would highlight the portion of B that does not overlap with A, and divide by the total area outside A.", "source": "MiniMax ②", "_id": "minimax_2_14", "judge_pick": false}, {"question": "A student calculates the variance of a discrete random variable and gets a negative number. What must have gone wrong, and what is the correct formula? (1 step)", "answer": "A variance can never be negative because it's calculated as the expected value of squared deviations. The student likely used the wrong formula. The correct relationship is: $$Var(X) = E(X^2) - [E(X)]^2$$. Note carefully that this is the SQUARE of the expected value subtracted from the expected value of the square — not $$[E(X) - E(X^2)]^2$$ or any other rearrangement.", "source": "MiniMax ②", "_id": "minimax_2_15", "judge_pick": false}, {"question": "In linear regression, the equation of the regression line is often written as $$y = a + bx$$. What do the coefficients 'a' and 'b' represent, and which one is the gradient? (1 step)", "answer": "In $$y = a + bx$$, the coefficient 'b' is the gradient (or slope) of the line — it tells you how much y changes for each unit increase in x. The coefficient 'a' is the y-intercept — the value of y when x equals zero. In the context of the data, 'a' represents the predicted value of y when x is zero, which may or may not be meaningful depending on whether x = 0 is within (or makes sense for) the data range.", "source": "MiniMax ②", "_id": "minimax_2_16", "judge_pick": false}, {"question": "When the exam question says \"show that there is only one outlier,\" what specific wording should you include in your answer to ensure you get the mark? (1 step)", "answer": "You must explicitly state which data point is the outlier and use the word \"only\" in your conclusion. For example: \"139 is the only outlier\" or \"There is only one outlier, which is 139.\" Simply stating \"139 is an outlier\" or \"there is a single data point that is an outlier\" may not be sufficient because the mark scheme specifically requires acknowledging that it is the only one.", "source": "MiniMax ②", "_id": "minimax_2_17", "judge_pick": false}, {"question": "In an ESAT question involving algebraic fractions, a student converts 0.8 to the fraction $$\\frac{4}{5}$$ before simplifying. Why is this generally a good strategy? (1 step)", "answer": "Working with fractions rather than decimals often makes cancellation easier and reduces rounding errors. When you have a mixture of fractions and decimals, converting everything to fractions (preferably in simplest form) allows you to see common factors that can cancel. This is especially helpful in non-calculator papers where precision matters.", "source": "MiniMax ②", "_id": "minimax_2_18", "judge_pick": false}, {"question": "What does it mean to \"factor out\" a common factor from an expression, and why is this useful when simplifying algebraic expressions? (1 step)", "answer": "Factoring out (or factoring) means identifying a common factor in all terms of an expression and writing it outside brackets. For example, in $$4x^2 + 8x$$, you can factor out $$4x$$ to get $$4x(x + 2)$$. This is useful because it often reveals further simplifications, helps with expanding brackets correctly, and can make complex expressions more manageable. It is a fundamental algebraic skill that frequently appears in ESAT questions.", "source": "MiniMax ②", "_id": "minimax_2_19", "judge_pick": false}, {"question": "When using the binomial expansion formula $$(a + b)^n = \\sum_{k=0}^{n} \\binom{n}{k} a^{n-k} b^k$$, what does the binomial coefficient $$\\binom{n}{k}$$ represent, and how is it calculated? (1 step)", "answer": "The binomial coefficient $$\\binom{n}{k}$$ (read as \"n choose k\") represents the number of ways to choose k items from n items without regard to order. It is calculated as $$\\binom{n}{k} = \\frac{n!}{k!(n-k)!}$$. In the expansion, it gives the coefficient of the term containing $$a^{n-k}b^k$$.", "source": "MiniMax ②", "_id": "minimax_2_20", "judge_pick": false}, {"question": "In the SaveMyExams notes, the normal distribution is described as a continuous probability distribution. What are the key properties that define a normal distribution? (1 step)", "answer": "A normal distribution is symmetric about its mean, bell-shaped, and is fully characterized by two parameters: the mean (μ) and the standard deviation (σ). It extends infinitely in both directions, approaching but never touching the horizontal axis. The total area under the curve equals 1, and approximately 68% of data falls within one standard deviation, 95% within two, and 99.7% within three (the empirical rule).", "source": "MiniMax ②", "_id": "minimax_2_21", "judge_pick": false}, {"question": "If you are told that the probability of Paul going to work by car is $$\\frac{1}{2}$$, by bicycle is $$\\frac{1}{6}$$, and by walking is $$\\frac{1}{3}$$, what should you check to verify these numbers are valid? (1 step)", "answer": "You should check that these probabilities sum to 1: $$\\frac{1}{2} + \\frac{1}{6} + \\frac{1}{3} = \\frac{3}{6} + \\frac{1}{6} + \\frac{2}{6} = \\frac{6}{6} = 1$$. This confirms that these are exhaustive possibilities (Paul must use one of these three methods) and mutually exclusive (he can only use one at a time).", "source": "MiniMax ②", "_id": "minimax_2_22", "judge_pick": false}, {"question": "In a probability problem, when you are given $$P(A \\cap B)$$ and $$P(A)$$ and asked to find $$P(B|A)$$, what formula do you use? (1 step)", "answer": "You rearrange the conditional probability formula: $$P(B|A) = \\frac{P(A \\cap B)}{P(A)}$$. This gives you the probability of B occurring given that A has definitely occurred. The denominator is the probability of the condition (what you're \"given\" has happened).", "source": "MiniMax ②", "_id": "minimax_2_23", "judge_pick": false}, {"question": "A question asks you to \"interpret\" the distribution of weights in Club B based on a box plot. What does \"interpret\" specifically mean in this statistical context? (1 step)", "answer": "To \"interpret\" in this context means to explain what the statistical features tell us about the real-world situation in plain language. Rather than just saying \"the distribution is positively skewed,\" you need to explain what that means for the weights: for example, \"the weights of Club B members are more varied above the median than below it\" or \"there is a wider spread of heavier weights than lighter weights.\"", "source": "MiniMax ②", "_id": "minimax_2_24", "judge_pick": false}, {"question": "In a discrete uniform distribution, all outcomes have equal probability. If X can take values 1, 2, 3, 4, 5, what is P(X = 3)? (1 step)", "answer": "Since there are 5 equally likely outcomes and the distribution is uniform, each has probability $$\\frac{1}{5}$$. So $$P(X = 3) = \\frac{1}{5}$$. In general, for a discrete uniform distribution with n possible values, each has probability $$\\frac{1}{n}$$.", "source": "MiniMax ②", "_id": "minimax_2_25", "judge_pick": false}, {"question": "What does it mean when we say \"hence\" in a probability question, and how should this affect your approach to the problem? (1 step)", "answer": "\"Hence\" signals that the current part of the question builds directly on the previous part — you should use the result (or method) from earlier in the question rather than starting from scratch. This often simplifies the calculation because you've already computed some necessary values. Always check what you found in previous parts before attempting a \"hence\" question.", "source": "MiniMax ②", "_id": "minim
