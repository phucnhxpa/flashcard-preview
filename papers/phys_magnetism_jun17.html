field, its internal magnetic domains — which were randomly oriented — get aligned by the external field. This **induces** magnetism in the paperclip: the end of the paperclip closest to the magnet's N pole becomes a S pole (because the field aligns the domains to point \"into\" the magnet's N), and the far end becomes N. Now the magnet's N pole and the paperclip's induced S pole are next to each other, and opposite poles attract → the paperclip is pulled in. Once removed from the field, soft iron loses this alignment quickly and the paperclip is unmagnetised again.", "source": "Opus 4.7 ①", "_id": "opus_1_36"}, {"question": "A student says: \"A magnet always attracts any metal towards it.\" Is this statement fully correct? Give two reasons why it is not. (3 steps)", "answer": "- Step 1: The statement is **not fully correct**. First, a magnet only attracts **magnetic materials** (iron, steel, nickel, cobalt). Most metals — copper, aluminium, silver, gold, lead, zinc — are non-magnetic and experience no attractive force from a magnet at all.\n- Step 2: Second, even for magnetic materials, the word \"always attracts\" is wrong. If you bring the **like pole** of another magnet nearby (N near N, or S near S), the force is **repulsive**, not attractive. The field pushes the like pole away.\n- Step 3: The safe, exam-ready phrasing is: a magnetic field makes objects **interact** — there is a force, which may be attractive or repulsive depending on the configuration. \"Interact\" covers both cases without committing to \"attract\" or \"repel.\"\n\n+ Alex's coaching: when unsure whether it's a push or pull, say \"interact\" — it's always correct.\n\nTakeaway: not all metals are magnetic; not all magnetic forces are attractive; say \"interact.\"", "source": "GLM 5.1 ②", "_id": "glm_2_36"}, {"question": "Conventional current is defined as flowing from + to −, but electrons actually flow from − to +. These are opposite directions. The Earth's \"north\" is magnetically a south pole — also opposite to what you'd assume. What is the underlying theme connecting both confusions? (2 steps)", "answer": "- Step 1: Both are **sign conventions** that were established before the true physical direction was understood. Conventional current direction was defined historically (before electrons were discovered) as the direction positive charge would flow — it turned out that negative electrons carry the actual flow, going the opposite way. The Earth's \"north\" naming was geographic long before magnetism was understood — we called the top of the map \"north,\" then later discovered that the magnetic pole near geographic north is actually a south pole.\n- Step 2: The underlying theme: **everyday language and physical reality can point in opposite directions**, and both conventions persist because they're deeply embedded. You must keep both straight simultaneously: current direction = positive charge flow (opposite to electrons); compass \"north\" = magnetic south pole near geographic north. Alex called this \"physics people getting things the wrong way round\" — it's a systematic trap, not a random error.\n\nTakeaway: sign conventions can reverse everyday expectations. Know both the convention and the physical reality, and don't mix them.", "source": "GLM 5.1 ③", "_id": "glm_3_28"}, {"question": "Why do \"physics conventions get things the wrong way around\" with conventional current and Earth's poles?", "answer": "Two historical sign-convention traps: (1) **Conventional current** is defined as the direction *positive* charge would flow — but in metals, the actual moving charges are electrons, which move in the *opposite* direction. So when you write current arrows on a circuit, you're drawing the direction opposite to electron motion. (2) **Earth's \"north\" magnetic pole is actually a magnetic south pole** — the giant Earth-magnet is flipped relative to geography. Both conventions are too entrenched to change, so you just have to remember them. They're prime sources of lost marks on exam questions about direction.", "source": "Opus 4.7 ②", "_id": "opus_2_32"}], "models": {"glm_1": {"label": "GLM 5.1 ①", "cards": [{"question": "An object becomes positively charged after being rubbed with a cloth. Did it gain or lose particles, and why can't it gain protons to become positive? (2 steps)", "answer": "- Step 1: To become positively charged, an object must lose negatively charged particles, which are electrons. Therefore, it lost particles (electrons).\n+ The cloth gains those electrons, making the cloth negatively charged.\n- Step 2: It cannot gain protons because protons are locked inside the nucleus of the atom. In everyday electrostatics, only electrons are free to move between objects; transferring protons would require a nuclear reaction, not just friction.\n\nTakeaway: \"Positive\" means a *deficit* of electrons, not an excess of protons.", "source": "GLM 5.1 ①", "_id": "glm_1_0", "judge_pick": false}, {"question": "A car driving on the road becomes positively charged through friction with the air. Once the car stops, why does this charge remain on the car instead of leaking away into the ground? (2 steps)", "answer": "- Step 1: For charge to leak away, there must be a conducting path to the earth. Electrons need to be able to flow freely to or from the ground to neutralise the object.\n- Step 2: The car sits on rubber tyres. Rubber is an excellent electrical insulator, meaning it does not allow charge to flow through it. Because there is no conducting path to the ground, the excess positive charge is trapped on the car and remains there.\n\nTakeaway: Insulators trap charge; conductors allow charge to flow away.", "source": "GLM 5.1 ①", "_id": "glm_1_1", "judge_pick": false}, {"question": "If a metal strap is attached from a positively charged car to the ground, the charge disappears. Explain the mechanism of \"earthing\" in terms of charge carriers. (2 steps)", "answer": "- Step 1: The metal strap is a conductor, meaning electrons are free to move through it. It provides a path connecting the car to the ground (the Earth, a practically infinite reservoir of charge).\n- Step 2: Because the car is positively charged (has a deficit of electrons), electrons from the Earth flow up through the metal strap onto the car. These electrons neutralise the positive charges. The charge \"disappears\" because the car is returned to a neutral state by the flow of electrons.\n\nTakeaway: Earthing provides a conducting path for excess charge to flow to/from the ground, neutralising the object.", "source": "GLM 5.1 ①", "_id": "glm_1_2", "judge_pick": false}, {"question": "You are given a coin and told it is attracted to a magnet. A friend guesses it is made of silver. Why must your friend be wrong, and what are the only four elements/alloys it could contain? (2 steps)", "answer": "- Step 1: Your friend must be wrong because silver is a non-magnetic material; it does not interact with a magnet in everyday conditions. Only specific magnetic materials are attracted to magnets.\n- Step 2: The coin must contain at least one of the only four magnetic materials: iron, steel, nickel, or cobalt. (A US 5-cent coin is literally called a \"nickel\" because it contains nickel).\n\nTakeaway: If something is attracted to a magnet, it must be iron, steel, nickel, or cobalt—nothing else.", "source": "GLM 5.1 ①", "_id": "glm_1_3", "judge_pick": false}, {"question": "An electromagnet needs to be switched on and off quickly, while a fridge magnet needs to stay magnetised for years. Which magnetic material property (hard vs soft) suits each, and why? (2 steps)", "answer": "- Step 1: A magnetically \"soft\" material (like iron) gains and loses its magnetism easily. This suits the electromagnet because when the current is turned off, the iron core loses its induced magnetism almost immediately, allowing the electromagnet to switch off.\n- Step 2: A magnetically \"hard\" material (like steel) retains its magnetism once it is magnetised. This suits the fridge magnet because it needs to be a permanent magnet that holds its magnetic properties over a long period without an external field.\n\nTakeaway: Hard = holds magnetism (permanent); Soft = loses magnetism easily (temporary/electromagnet).", "source": "GLM 5.1 ①", "_id": "glm_1_4", "judge_pick": false}, {"question": "A paperclip is not a permanent magnet, yet it can cling to a bar magnet and even pick up a second paperclip. Explain the mechanism behind this temporary magnetism. (2 steps)", "answer": "- Step 1: When the paperclip (which is made of a magnetic material, iron/steel) is placed inside the magnetic field of the bar magnet, its internal magnetic domains align with the external field. This turns the paperclip into a magnet itself—this is called induced magnetism.\n- Step 2: Because the paperclip is now magnetised, it produces its own magnetic field, which is strong enough to attract the second paperclip. If the first paperclip is removed from the bar magnet's field, and if it is made of magnetically soft material, it will lose this induced magnetism.\n\nTakeaway: Induced magnetism is temporary magnetism created by placing a magnetic material in an existing field.", "source": "GLM 5.1 ①", "_id": "glm_1_5", "judge_pick": false}, {"question": "If you cut a bar magnet perfectly in half, do you get an isolated North pole and an isolated South pole? Explain what actually happens and the deep physical reason why. (3 steps)", "answer": "- Step 1: You do not get isolated poles. Each half becomes a complete, smaller bar magnet with its own North and South poles.\n- Step 2: The new South pole forms on the cut face of the original North half, and the new North pole forms on the cut face of the original South half.\n- Step 3: The deep physical reason is that magnetism comes from aligned electron spins and domains *inside* the material, not from \"piles\" of North or South stuff at the ends. Because every electron acts like a tiny magnet with both poles, you can never isolate a single pole; cutting the material just creates two new arrangements of these microscopic magnets.\n\nTakeaway: Magnetic monopoles cannot be created by cutting a magnet; poles always come in pairs.", "source": "GLM 5.1 ①", "_id": "glm_1_6", "judge_pick": true}, {"question": "What is the exact definition of a magnetic field, and how does it conceptually differ from just \"the area around a magnet\"? (2 steps)", "answer": "- Step 1: A magnetic field is defined as \"a region in which a magnetic material, or a moving charged object, feels a force.\"\n- Step 2: It differs from \"the area around a magnet\" because a field implies an active influence—the ability to exert a force. If a piece of wood is near a magnet, it is in the area but it feels no force, so it's not interacting with the field in the way a magnetic material would.\n\nTakeaway: A field is defined by what it *does* (exerts a force), not just where it is.", "source": "GLM 5.1 ①", "_id": "glm_1_7", "judge_pick": false}, {"question": "Outside a bar magnet, which way do the magnetic field line arrows point, and what physical meaning does this direction represent? (2 steps)", "answer": "- Step 1: Outside a bar magnet, the arrows on field lines always point from the North pole to the South pole.\n- Step 2: This direction represents the way a free North pole (or a positive test object) would be pushed if placed at that point. Since a North pole is repelled by the magnet's North pole and attracted to the magnet's South pole, it moves from N to S, defining the field direction.\n\nTakeaway: Field lines show the direction of force on a North pole, which is N → S externally.", "source": "GLM 5.1 ①", "_id": "glm_1_8", "judge_pick": false}, {"question": "How can you visually determine where a magnetic field is strongest on a field line diagram, and why do the lines behave this way at the poles? (2 steps)", "answer": "- Step 1: The field is strongest where the field lines are closest together (most bunched up). On a bar magnet diagram, this is at the two ends (the poles).\n- Step 2: The lines bunch up at the poles because the magnetic force is strongest there. The lines emerge from/converge onto the poles, crowding together before looping around to the other side where they spread out, indicating a weaker field in the middle.\n\nTakeaway: Closer lines = stronger field; poles are the strongest regions.", "source": "GLM 5.1 ①", "_id": "glm_1_9", "judge_pick": false}, {"question": "What visual features on a field line diagram indicate a perfectly uniform magnetic field, and what does \"uniform\" physically mean for a charged particle moving through it? (2 steps)", "answer": "- Step 1: A uniform field is shown by straight, parallel lines that are equally spaced from each other.\n- Step 2: \"Uniform\" physically means that the field has the exact same strength and direction at every point. For a charged particle moving through it, this means the magnetic force it experiences will be consistent in magnitude and direction regardless of where it is in that region.\n\nTakeaway: Equal spacing + parallel = uniform = same strength and direction everywhere.", "source": "GLM 5.1 ①", "_id": "glm_1_10", "judge_pick": false}, {"question": "Why is it physically impossible for two magnetic field lines to cross at a single point in space? (2 steps)", "answer": "- Step 1: A magnetic field line indicates the direction of the magnetic force at that point (the direction a compass needle would point).\n- Step 2: If two lines crossed, it would imply that at that exact crossing point, the force points in two different directions at once. This is impossible because a force is a vector and can only have one direction at a given point; a compass needle cannot point two ways simultaneously.\n\nTakeaway: Crossing lines would mean two directions for one force, which is a physical contradiction.", "source": "GLM 5.1 ①", "_id": "glm_1_11", "judge_pick": false}, {"question": "If you want to map a magnetic field, you can use iron filings or a plotting compass. What specific information does each tool provide, and what is the critical limitation of iron filings? (2 steps)", "answer": "- Step 1: A plotting compass provides both the *shape* of the field (by tracing the line) and the *direction* (because the needle points N to S). Iron filings only provide the *shape* and relative *strength* (they bunch up where the field is strong).\n- Step 2: The critical limitation of iron filings is that they do not show direction. Because they are just small bits of metal aligning with the field, you cannot tell which end is North and which is South from the filings alone. You need a compass for direction.\n\nTakeaway: Iron filings = shape only; Plotting compass = shape + direction.", "source": "GLM 5.1 ①", "_id": "glm_1_12", "judge_pick": false}, {"question": "Describe the step-by-step process of using a plotting compass to trace a single magnetic field line from a magnet's North pole to its South pole. (3 steps)", "answer": "- Step 1: Place the plotting compass near the magnet's North pole. Mark a small dot on the paper exactly where the compass's red (North-seeking) pointer tip is aiming.\n- Step 2: Move the compass so that the tail end of the pointer sits directly over the dot you just made. Mark a new dot where the pointer tip now aims.\n- Step 3: Repeat this process of moving the compass tail to the last dot and marking the new tip position. Join the dots together; this continuous line traces the path of the field line from N to S.\n\nTakeaway: The compass acts as a tiny test magnet, letting you physically map the force vector step by step.", "source": "GLM 5.1 ①", "_id": "glm_1_13", "judge_pick": false}, {"question": "You have two identical bar magnets. Describe the exact arrangement required to create a uniform magnetic field in the gap between them. (2 steps)", "answer": "- Step 1: Place the two magnets a small distance apart with opposite poles facing each other (e.g., the North pole of one facing the South pole of the other).\n- Step 2: Fix the magnets in place so they cannot move together. In the gap between them, the field lines will run straight across from N to S, parallel and equally spaced, creating a uniform field.\n\nTakeaway: Opposite poles facing + fixed distance = uniform field in the gap.", "source": "GLM 5.1 ①", "_id": "glm_1_14", "judge_pick": false}, {"question": "If you place two bar magnets with like poles facing each other (N facing N), a \"neutral point\" forms exactly in the middle. Explain what a neutral point is and why it forms there. (2 steps)", "answer": "- Step 1: A neutral point is a spot where the net magnetic field is zero. If you placed a compass here, it would not point towards either magnet.\n- Step 2: It forms because the two magnets produce fields in opposite directions at that midpoint. The field from the left N pole pushes to the right, while the field from the right N pole pushes to the left. Because they are identical magnets at equal distances, the fields are equal in strength but opposite in direction, so they cancel out completely.\n\nTakeaway: At a neutral point, two equal and opposite fields superimpose to give zero net field.", "source": "GLM 5.1 ①", "_id": "glm_1_15", "judge_pick": false}, {"question": "A compass needle's North-seeking pole points towards the geographic North Pole. Paradoxically, this means it is pointing towards a magnetic South pole. Explain why this paradox exists. (3 steps)", "answer": "- Step 1: A compass needle is a small bar magnet. Opposite magnetic poles attract, so the red North-seeking end of the compass needle must be attracted to a magnetic South pole.\n- Step 2: If the compass points towards the geographic North Pole, the magnetic pole located near the geographic North Pole must be a magnetic South pole.\n- Step 3: The Earth behaves like a giant bar magnet, but it is oriented \"upside down\" relative to our geographic labels. The Earth's internal magnetic South pole is located near the geographic North Pole, which is why the compass needle points \"North\".\n\nTakeaway: Geographic North ≈ Magnetic South. The compass N end is attracted to the Earth's magnetic South.", "source": "GLM 5.1 ①", "_id": "glm_1_16", "judge_pick": false}, {"question": "Summarise the four-word causal chain that explains how an electromagnet is created, starting with a power supply and ending with the electromagnet itself. (2 steps)", "answer": "- Step 1: The chain is: Current → Conductor → Magnetic field → Electromagnet.\n- Step 2: When a **Current** flows through a **Conductor** (a wire), it generates a **Magnetic field** around it. A magnet created in this way (especially when coiled and with a core) is an **Electromagnet**.\n\nTakeaway: Electromagnets require moving charge (current) in a conductor to produce a field.", "source": "GLM 5.1 ①", "_id": "glm_1_17", "judge_pick": false}, {"question": "For a straight current-carrying wire, state the right-hand grip rule, specifying exactly what the thumb and curled fingers represent. (2 steps)", "answer": "- Step 1: Point your right thumb in the direction of the conventional current (positive to negative).\n- Step 2: Curl your right fingers around the wire. The direction your fingers curl represents the direction of the circular magnetic field lines wrapping around the wire.\n\nTakeaway: Right hand only! Thumb = Current, Fingers = Field.", "source": "GLM 5.1 ①", "_id": "glm_1_18", "judge_pick": false}, {"question": "Describe the shape of the magnetic field lines around a long straight current-carrying wire, and how the field strength changes with distance. (2 steps)", "answer": "- Step 1: The magnetic field lines form concentric circles around the wire, centered on the wire itself.\n- Step 2: The field strength decreases as you move further from the wire. Visually, this is represented by the circles getting further apart (though in reality, the circles represent constant field increments, the physical spacing increases indicating a weaker field at greater distances).\n\nTakeaway: Field around a wire = concentric circles, weakening with distance.", "source": "GLM 5.1 ①", "_id": "glm_1_19", "judge_pick": false}, {"question": "What are the three ways to increase the strength of an electromagnet (all starting with the letter 'C')? Briefly explain why each works. (2 steps)", "answer": "- Step 1: The three 'C's are **Current**, **Coils**, and **Core**.\n- Step 2: \n+ **Current**: Increasing the current increases the flow of charge, directly generating a stronger magnetic field.\n+ **Coils**: Winding the wire into more coils concentrates the field from multiple loops into a smaller space, adding the fields together.\n+ **Core**: Adding a soft iron core provides an easy path for the field lines, channeling and concentrating them through the highly permeable material, greatly boosting the overall field strength.\n\nTakeaway: More Current, more Coils, and an iron Core all amplify the electromagnet.", "source": "GLM 5.1 ①", "_id": "glm_1_20", "judge_pick": false}, {"question": "Adding a soft iron core dramatically increases an electromagnet's strength. Conceptually, how does the core \"channel\" the field to achieve this? (2 steps)", "answer": "- Step 1: Iron is a highly magnetically permeable material, meaning it is much easier for magnetic field lines to travel through iron than through air.\n- Step 2: When placed inside the coil, the iron core becomes an induced magnet. It provides a low-resistance path that draws the existing field lines into and through the core, concentrating them densely inside the material rather than letting them spread out weakly into the air. This dense concentration of lines means a much stronger field.\n\nTakeaway: The core acts as a \"shortcut\" for field lines, concentrating them into a small space.", "source": "GLM 5.1 ①", "_id": "glm_1_21", "judge_pick": true}, {"question": "What does the external magnetic field of a solenoid (a long coil of wire) look like, and how does this relate to a standard bar magnet? (2 steps)", "answer": "- Step 1: The external magnetic field of a solenoid looks exactly like the external field of a bar magnet: lines emerge from one end, loop around the outside, and enter the other end.\n- Step 2: This means the solenoid behaves externally exactly like a bar magnet, with a distinct North pole at one end and a South pole at the other.\n\nTakeaway: A solenoid is the electromagnetic equivalent of a bar magnet.", "source": "GLM 5.1 ①", "_id": "glm_1_22", "judge_pick": false}, {"question": "How do you use the right-hand grip rule to determine which end of a solenoid acts as the North pole? (2 steps)", "answer": "- Step 1: Look at the solenoid from the outside and identify the direction the conventional current is flowing around the coils (e.g., clockwise or anticlockwise).\n- Step 2: Curl the fingers of your right hand in the direction of the conventional current flow around the coils. Your thumb will point straight out; the end of the solenoid your thumb points towards is the North pole.\n\nTakeaway: For a solenoid, fingers follow the current around the loops; Thumb points to N.", "source": "GLM 5.1 ①", "_id": "glm_1_23", "judge_pick": false}, {"question": "Inside a solenoid, the magnetic field is strong and uniform. Which direction does the internal field point, and how does this complete the loop with the external field? (2 steps)", "answer": "- Step 1: Inside the solenoid, the field lines run from the South pole end to the North pole end (S → N internally).\n- Step 2: This completes the loop because externally, the lines run from the North pole around to the South pole (N → S externally). The lines form continuous closed loops: out of N, around the outside, into S, and back through the inside to N.\n\nTakeaway: Internal field is S → N; External field is N → S. Together they form closed loops.", "source": "GLM 5.1 ①", "_id": "glm_1_24", "judge_pick": false}, {"question": "What is the symbol and SI unit for magnetic flux density, and what does this quantity physically represent about the field line diagram? (2 steps)", "answer": "- Step 1: The symbol is $$B$$ and the SI unit is the tesla ($$T$$).\n- Step 2: Magnetic flux density physically represents how closely bunched the field lines are. A high flux density (large $$B$$) means the lines are very close together, indicating a very strong field.\n\nTakeaway: $$B$$ is a measure of \"line crowding\"—how strong the field is.", "source": "GLM 5.1 ①", "_id": "glm_1_25", "judge_pick": false}, {"question": "The unit for magnetic flux density is the tesla (T). Using the motor effect equation $$F = BIl$$, derive the equivalent SI base units for the tesla. (3 steps)", "answer": "- Step 1: Rearrange the equation $$F = BIl$$ to solve for $$B$$: $$B = \\frac{F}{Il}$$.\n- Step 2: Identify the SI base units for each variable: Force $$F$$ is in newtons ($$N$$), current $$I$$ is in amps ($$A$$), and length $$l$$ is in metres ($$m$$).\n- Step 3: Substitute these units into the rearranged equation: $$T = \\frac{N}{A \\cdot m} = N \\cdot A^{-1} \\cdot m^{-1}$$.\n\nTakeaway: 1 Tesla is 1 Newton per Ampere-metre, revealing that $$B$$ is defined by the force it exerts on a current.", "source": "GLM 5.1 ①", "_id": "glm_1_26", "judge_pick": false}, {"question": "In the motor effect equation $$F = BIl \\sin\\theta$$, what does the angle $$\\theta$$ represent, and when is the force on the wire maximised? (2 steps)", "answer": "- Step 1: The angle $$\\theta$$ represents the angle between the direction of the magnetic field ($$B$$) and the direction of the current ($$I$$) in the wire.\n- Step 2: The force is maximised when $$\\sin\\theta = 1$$, which occurs when $$\\theta = 90^\\circ$$. This means the wire is perpendicular to the magnetic field lines.\n\nTakeaway: Maximum force occurs when the current cuts across the field lines at 90 degrees.", "source": "GLM 5.1 ①", "_id": "glm_1_27", "judge_pick": false}, {"question": "In a film, a character with magnetic powers makes metal objects hover and steer in all directions. Why is this physically unrealistic for a simple magnet, and what safe, neutral verb should you use to describe a magnetic field's effect instead of \"attract\"? (2 steps)", "answer": "- Step 1: A simple magnet will always attract a magnetic metal straight towards it (pulling it in). It cannot make an object hover or steer in arbitrary directions because the force is purely radial attraction.\n- Step 2: Because a magnetic field can both attract (opposite poles) and repel (like poles), and you might not know which is happening, the safe, neutral verb to use is \"interact.\" You say the objects \"interact\" or that there is a \"force,\" which covers both possibilities without guessing wrong.\n\nTakeaway: When in doubt about push vs pull, say \"interact\"—it is always safe.", "source": "GLM 5.1 ①", "_id": "glm_1_28", "judge_pick": false}, {"question": "Physics is full of \"things the wrong way round.\" Give two examples from electricity and magnetism where the conventional direction or name is opposite to the physical reality. (2 steps)", "answer": "- Step 1: In electricity, conventional current is defined as flowing from positive to negative, which is opposite to the actual flow of the physical charge carriers (electrons), which move from negative to positive.\n- Step 2: In magnetism, a compass \"points North,\" but it is actually pointing towards the Earth's magnetic South pole (which is located near the geographic North Pole). The name and the magnetic reality are flipped.\n\nTakeaway: Sign conventions (conventional current, geographic poles) often run opposite to the physical particle/magnetic direction.", "source": "GLM 5.1 ①", "_id": "glm_1_29", "judge_pick": false}, {"question": "When an exam question asks you to describe a magnetic field, what three specific properties must you always address to get full marks? (2 steps)", "answer": "- Step 1: You must address the field in terms of its Strength, Direction, and Shape.\n- Step 2: \n+ **Strength**: Where is it strongest/weakest? (e.g., \"strongest at the poles\").\n+ **Direction**: Which way do the arrows point? (e.g., \"N to S outside the magnet\").\n+ **Shape**: What is the geometry of the lines? (e.g., \"circular-ish lines looping from one end to the other\").\n\nTakeaway: Always structure field descriptions around Strength, Direction, Shape.", "source": "GLM 5.1 ①", "_id": "glm_1_30", "judge_pick": false}, {"question": "A car drives through dry air and becomes positively charged. If the air were highly humid (and thus conductive) instead, how would the charging process differ? (2 steps)", "answer": "- Step 1: The friction with the air would still attempt to transfer electrons away from the car, trying to charge it positively.\n- Step 2: However, because humid air is conductive, any excess charge building up on the car would immediately leak away through the air to the surroundings (similar to earthing). The car would not retain a significant charge because the conductive air provides a path for the electrons to flow back.\n\nTakeaway: Charge only builds up on insulators; conductive surroundings prevent static buildup.", "source": "GLM 5.1 ①", "_id": "glm_1_31", "judge_pick": false}, {"question": "If the current in a straight wire triples, what happens to the strength of the magnetic field at a specific point next to the wire, and what happens to the direction of the field? (2 steps)", "answer": "- Step 1: The strength of the magnetic field is directly proportional to the current. If the current triples, the magnetic flux density ($$B$$) at that point also triples.\n- Step 2: The direction of the field remains the same, assuming the current is still flowing in the same direction. (If the current reversed, the field direction would reverse, but simply increasing the magnitude does not change direction).\n\nTakeaway: $$B \\propto I$$. More current means stronger field in the same direction.", "source": "GLM 5.1 ①", "_id": "glm_1_32", "judge_pick": false}, {"question": "You have one bar magnet. You cut it in half, then cut one of the halves in half again. How many total magnets do you have now, and how many total poles? (2 steps)", "answer": "- Step 1: Every time you cut a magnet, you create a new, complete magnet with its own North and South poles. Cutting the original magnet gives 2 magnets; cutting one of those gives 1 more. Total = 3 magnets.\n- Step 2: Each of the 3 magnets has 2 poles (1 North, 1 South). Therefore, the total number of poles is $$3 \\times 2 = 6$$ poles.\n\nTakeaway: You can never reduce the number of poles; cutting just multiplies the magnets.", "source": "GLM 5.1 ①", "_id": "glm_1_33", "judge_pick": false}, {"question": "A neutral object gains $$2 \\times 10^6$$ electrons. Qualitatively, what is the sign of its net charge, and has its total number of protons changed? (2 steps)", "answer": "- Step 1: Because electrons carry a negative charge, gaining electrons makes the object negatively charged overall.\n- Step 2: The number of protons has not changed. Protons are locked in the nuclei and are unaffected by the transfer of electrons; only the electron count shifts, changing the balance of charge.\n\nTakeaway: Gaining electrons = negative charge; proton count is constant.", "source": "GLM 5.1 ①", "_id": "glm_1_34", "judge_pick": false}], "count": 35}, "glm_2": {"label": "GLM 5.1 ②", "cards": [{"question": "When two objects become charged by friction, one becomes positive and one becomes negative. What physical particle has actually moved between them, and why can't the other type of charge carrier move? (2 steps)", "answer": "- Step 1: The particle that moves is the **electron**. Electrons sit outside the nucleus and are loosely bound in many materials, so friction can detach and transfer them from one object to another.\n- Step 2: Protons cannot move between everyday objects because they are locked inside the nucleus. The nuclear binding force is enormously stronger than any frictional force, so protons stay put. When we say an object \"becomes positive,\" we mean it has *lost* electrons — not that it gained protons.\n\nTakeaway: charge transfer is always electron transfer; \"positive\" means fewer electrons, not more protons.", "source": "GLM 5.1 ②", "_id": "glm_2_0", "judge_pick": false}, {"question": "An object is electrically neutral. What numerical condition makes it neutral, and what happens to that condition when it gains extra electrons? (2 steps)", "answer": "- Step 1: A neutral object has equal numbers of protons and electrons: $$N_{\\text{protons}} = N_{\\text{electrons}}$$. The $$+1$$ charge on each proton is exactly cancelled by the $$-1$$ charge on each electron, so the net charge is zero.\n- Step 2: When the object gains extra electrons, $$N_{\\text{electrons}} > N_{\\text{protons}}$$, so the negatives outnumber the positives. The net charge becomes negative. For example, gaining just one extra electron makes the object's net charge $$-1e$$.\n\nTakeaway: neutrality is a balance; tipping the balance in either direction creates net charge.", "source": "GLM 5.1 ②", "_id": "glm_2_1", "judge_pick": false}, {"question": "A car driving on the road becomes positively charged. Did it gain or lose electrons, and through what mechanism were they transferred? (2 steps)", "answer": "- Step 1: The car became **positive**, meaning it has fewer electrons than protons. Therefore it *lost* electrons — they were removed from the car.\n- Step 2: The mechanism is **friction** between the car's surface and the air rushing past it. This rubbing transfers electrons from the car to the air. (Note: the electrons go to the *air*, not to the road, because the rubber tyres are insulators and block any path to the ground.)\n\nTakeaway: \"positive charge\" = electron deficit; friction is the thief that removes them.", "source": "GLM 5.1 ②", "_id": "glm_2_2", "judge_pick": false}, {"question": "After the car stops driving, the positive charge remains on it. Why can't the charge drain away through the tyres, and what single word describes the property of rubber that causes this? (2 steps)", "answer": "- Step 1: Rubber is an **insulator** — a material that does not allow charge to flow through it. Electrons cannot travel through the rubber tyres to reach the ground, so the excess positive charge (electron deficit) is trapped on the car body.\n- Step 2: The key word is **insulator**. Insulators trap charge because their electrons are tightly bound to their atoms and cannot move freely. This is the opposite of a conductor (like metal), where electrons flow easily.\n\nTakeaway: insulators = charge traps; conductors = charge highways.", "source": "GLM 5.1 ②", "_id": "glm_2_3", "judge_pick": true}, {"question": "A metal strap is attached under the car so it drags on the road while driving. What two properties of the strap allow it to prevent charge building up, and what is the name of the process by which excess charge flows away? (3 steps)", "answer": "- Step 1: The strap is made of **metal**, which is a conductor — it allows electrons to flow freely through it.\n- Step 2: Because the strap physically touches the ground, it creates a conducting path from the car body to the Earth. Any excess charge (electron deficit on the positive car) can now flow through this path.\n- Step 3: The process is called **earthing** (or grounding). Earthing provides a route for charge to escape to the Earth (a practically infinite charge reservoir), so the car cannot build up a significant net charge while the strap is in place.\n\nTakeaway: conductor + contact with ground = earthing = no static build-up.", "source": "GLM 5.1 ②", "_id": "glm_2_4", "judge_pick": false}, {"question": "Name all four magnetic materials. Why is steel included even though it is not a pure element? (2 steps)", "answer": "- Step 1: The four magnetic materials are: **Iron, Steel, Nickel, Cobalt**. This is a closed list — no other everyday materials are magnetic.\n- Step 2: Steel is included because it is mostly iron (with a small amount of carbon). The iron content is what makes steel magnetic; the carbon itself is non-magnetic. So \"anything metallic that is attracted to a magnet contains at least one of those four.\"\n\nTakeaway: the list is exactly four; steel qualifies via its iron content.", "source": "GLM 5.1 ②", "_id": "glm_2_5", "judge_pick": false}, {"question": "A student claims that copper, aluminium, and silver are magnetic because they are metals. Is this correct? Explain why metallic appearance does not guarantee magnetic behaviour. (2 steps)", "answer": "- Step 1: The claim is **incorrect**. Copper, aluminium, and silver are all non-magnetic. Being a metal (conducting electricity, being shiny) is a completely different property from being magnetic.\n- Step 2: Magnetism depends on the internal arrangement of electron spins and magnetic domains inside the material. Only iron, steel, nickel, and cobalt have the right internal structure to produce a permanent magnetic field. Most metals (including gold, titanium, zinc, lead) have randomised domains and no net magnetism.\n\n+ Common trap: the US 5-cent coin is literally called a \"nickel\" because it is made of nickel (magnetic) — students often guess \"silver\" (non-magnetic).\n\nTakeaway: metal ≠ magnetic; only the four special materials qualify.", "source": "GLM 5.1 ②", "_id": "glm_2_6", "judge_pick": false}, {"question": "What is the key difference between a permanent magnet and a temporary magnet, and which is made from a \"magnetically hard\" material vs a \"magnetically soft\" material? (2 steps)", "answer": "- Step 1: A **permanent magnet** retains its magnetism indefinitely (or for a very long time). A **temporary magnet** loses its magnetism quickly once the external influence is removed. The difference is how well the material \"holds on\" to its aligned magnetic domains.\n- Step 2: Permanent magnets are made from **magnetically hard** materials (e.g. steel) — \"hard\" means the domains stay aligned and resist being randomised. Temporary magnets are made from **magnetically soft** materials (e.g. iron) — \"soft\" means the domains easily align when a field is present but just as easily randomise when the field is removed.\n\n+ Memory hook: \"hard = holds on (permanent); soft = gains and loses easily (temporary, good for electromagnets you want to switch off).\"\n\nTakeaway: hard/soft refers to magnetic persistence, not physical hardness.", "source": "GLM 5.1 ②", "_id": "glm_2_7", "judge_pick": false}, {"question": "A paperclip touches a bar magnet and becomes magnetic itself, able to pick up a second paperclip. When you pull the first paperclip away from the magnet, it loses its magnetism. What type of magnetism is this, and why does it disappear? (2 steps)", "answer": "- Step 1: This is **induced magnetism**. The paperclip (made of iron, a magnetic material) becomes a magnet *while it is inside the bar magnet's field*. The external field forces the paperclip's domains to align, turning it into a temporary magnet.\n- Step 2: When you remove the paperclip from the field, it loses its magnetism because iron is a **magnetically soft** material. Its domains easily randomise again once the aligning force (the external field) is gone. If the paperclip were made of steel (hard), it would retain some magnetism after removal.\n\nTakeaway: induced magnetism is temporary for soft materials; it exists only while the external field is present.", "source": "GLM 5.1 ②", "_id": "glm_2_8", "judge_pick": false}, {"question": "Why is soft iron preferred over steel for the core of an electromagnet that needs to be switched on and off rapidly? (2 steps)", "answer": "- Step 1: An electromagnet's core needs to become strongly magnetic when current flows (switch ON) and lose its magnetism when current stops (switch OFF). Soft iron is **magnetically soft** — its domains align almost instantly when the coil's field is present and randomise almost instantly when the field disappears.\n- Step 2: Steel is **magnetically hard** — it would retain significant residual magnetism (remnance) after the current is switched off. This means the electromagnet wouldn't fully \"release\" objects when turned off, which defeats the purpose of a controllable magnet.\n\n+ Practical context: scrap-yard cranes need to drop steel objects instantly when the current is cut — a steel core would leave the crane \"sticky.\"\n\nTakeaway: soft iron = quick on/off; steel = stubborn residual magnetism.", "source": "GLM 5.1 ②", "_id": "glm_2_9", "judge_pick": false}, {"question": "Give the textbook definition of a magnetic field (the exact phrasing). What two categories of objects experience a force in such a field? (2 steps)", "answer": "- Step 1: A magnetic field is **\"a region in which a magnetic material, or a moving charged object, feels a force.\"** This is the specification wording. The key idea: a field is defined by what it *does* — it exerts a force on specific objects placed within it.\n- Step 2: The two categories are:\n+ **Magnetic materials** (iron, steel, nickel, cobalt) — they feel a force even if stationary.\n+ **Moving charged objects** — a charge must be *moving* (or a current must be flowing) to feel a magnetic force. A stationary charge in a magnetic field feels zero magnetic force.\n\nTakeaway: a field is a force region; magnetic materials and moving charges are the two \"test objects.\"", "source": "GLM 5.1 ②", "_id": "glm_2_10", "judge_pick": true}, {"question": "Outside a bar magnet, magnetic field lines have arrows on them. Which direction do these arrows point, and what does this direction represent physically? (2 steps)", "answer": "- Step 1: The arrows point from **North (N) to South (S)** — this is the *external* direction. Inside the magnet (not usually drawn), the lines continue from S back to N, completing the loop.\n- Step 2: The N→S direction represents \"the direction a free North pole would be pushed.\" If you could isolate a tiny North pole and place it in the field, it would accelerate along the arrow direction (towards S). A compass needle's red (N) end aligns with this direction — it points along the field line towards the magnet's S pole.\n\n+ Common trap: students often reverse this to S→N. Remember: outside the magnet, it's always N→S.\n\nTakeaway: arrows show where a N-pole would go; outside = N to S.", "source": "GLM 5.1 ②", "_id": "glm_2_11", "judge_pick": true}, {"question": "How do you determine the strength of a magnetic field from its field-line diagram? Where is a single bar magnet's field strongest, and what does the pattern look like there? (2 steps)", "answer": "- Step 1: The rule is **closer lines = stronger field**. Where lines are densely packed, the field is intense; where lines are sparse, the field is weak. This is because each line represents a fixed \"amount\" of flux — squeezing more lines into a smaller space means more flux per area, i.e. higher $$B$$.\n- Step 2: A bar magnet's field is **strongest at the two poles (ends)**. On the diagram, the lines bunch together densely as they emerge from the N end and enter the S end. In the middle of the magnet's side, the lines are widely spaced — the field is weak there.\n\nTakeaway: density of lines = strength; poles = dense lines = strong field.", "source": "GLM 5.1 ②", "_id": "glm_2_12", "judge_pick": false}, {"question": "What three properties must you always describe when asked to characterise a magnetic field? Apply this framework to a single bar magnet's field. (3 steps)", "answer": "- Step 1: The three properties are **Strength, Direction, Shape**. Any field description should address all three.\n- Step 2: For a bar magnet:\n+ **Strength** — strongest at the two ends (poles), weakest at the sides.\n+ **Direction** — arrows run N→S outside the magnet (the way a free N pole would move).\n+ **Shape** — lines radiate out of the N end, loop around the outside in curved paths, and return into the S end. Alex described them as \"circular-ish\" loops.\n- Step 3: This framework works for *any* field — gravitational, electric, or magnetic. Exam questions frequently ask you to \"describe the field,\" and structuring your answer around strength, direction, shape guarantees you hit all the mark points.\n\nTakeaway: always answer with strength, direction, shape — it's the complete field description.", "source": "GLM 5.1 ②", "_id": "glm_2_13", "judge_pick": false}, {"question": "Can two magnetic field lines ever cross or intersect? Explain the physical reasoning behind this rule. (2 steps)", "answer": "- Step 1: Field lines **never cross**. This is an absolute rule for magnetic field lines (and for electric and gravitational field lines too).\n- Step 2: The reasoning: at any point in space, the field has exactly **one direction**. If two lines crossed at a point, that would imply two different directions at the same location — a tiny compass placed there would need to point two ways simultaneously, which is impossible. The field direction at any point is unique, so lines cannot intersect.\n\n+ Edge case: where two fields *cancel* (like between two N poles), there is a **neutral point** where the field is zero. No lines pass through a neutral point — the lines curve *around* it, never crossing.\n\nTakeaway: one point = one direction = no crossing lines.", "source": "GLM 5.1 ②", "_id": "glm_2_14", "judge_pick": false}, {"question": "You cut a bar magnet exactly in half. A student says you now have a separate North piece and a separate South piece. Is this correct? Explain what you actually get and the deeper reason why. (3 steps)", "answer": "- Step 1: The student is **incorrect**. Cutting a bar magnet in half does *not* give you an isolated N pole and an isolated S pole. You get **two complete, smaller bar magnets**, each with its own N end and S end.\n- Step 2: The new N–S boundary appears at the cut surface. The half that originally held the N end still has that N end, but its new cut face becomes a S end. The other half similarly gets a new N end at its cut face. So each piece is N–S, just shorter.\n- Step 3: The deeper reason (university-level, for intuition only): magnetism comes from **aligned electron spins / aligned magnetic domains** inside the material. The domains are distributed throughout the volume, not concentrated at the ends. Cutting the material doesn't destroy the domains — each half still contains aligned domains, so each half is still a complete magnet. Magnetic monopoles (isolated N or S) have never been observed in nature.\n\n+ Exam note: don't write the domain explanation in a GCSE/ESAT answer — just state \"each half is a complete magnet with both poles.\"\n\nTakeaway: you can never isolate a single pole; poles always come in N–S pairs.", "source": "GLM 5.1 ②", "_id": "glm_2_15", "judge_pick": true}, {"question": "A plotting compass is placed near a bar magnet. What is a plotting compass physically, and which end of its pointer aligns with the field-line direction? (2 steps)", "answer": "- Step 1: A plotting compass is a **tiny pivoted bar magnet** — a small magnetic needle that can rotate freely. It responds to the local magnetic field by rotating until it aligns with the field direction at that point.\n- Step 2: The **red/pointy end** (the compass's N end) aligns with the field-line direction — it points along the field line towards the magnet's S pole. This is because a N pole is pushed in the field direction (N→S externally), so the compass's N end turns to face that direction.\n\n+ Critical trap: the compass's N end points *towards the magnet's S pole*, not towards the magnet's N pole. Students often reverse this.\n\nTakeaway: compass N end → follows field direction → points at magnet's S.", "source": "GLM 5.1 ②", "_id": "glm_2_16", "judge_pick": false}, {"question": "Describe the step-by-step procedure for tracing a single magnetic field line using a plotting compass. (3 steps)", "answer": "- Step 1: Place the compass near the magnet's N pole. Mark a small dot on the paper exactly where the compass's red (N) pointer tip aims. This dot records the field direction at that first position.\n- Step 2: Move the compass so that its *tail* (the opposite end of the needle) sits directly on the dot you just marked. The pointer now aims at a new position — mark a second dot where the tip points.\n- Step 3: Repeat: move the compass tail to the second dot, mark a third dot where the tip aims, and continue until you reach the magnet's S pole. Join all the dots with a smooth curve — this is one complete field line. Add an arrow pointing N→S along it.\n\nTakeaway: each dot captures the field direction at one point; chaining them traces the line.", "source": "GLM 5.1 ②", "_id": "glm_2_17", "judge_pick": false}, {"question": "What two pieces of information does a plotting compass give you about a magnetic field that iron filings cannot? Why is this advantage important? (2 steps)", "answer": "- Step 1: A plotting compass gives you both **shape** (the curved path of the lines) and **direction** (which way the arrows go, i.e. which pole is N and which is S). The compass needle is a tiny magnet that rotates to align with the field, so it physically shows you the direction at each point.\n- Step 2: Iron filings show **shape only** (and relative strength, by how much they bunch). They line up along the field lines but have no built-in directional indicator — you cannot tell which end of a filing corresponds to N vs S. You cannot distinguish the magnet's N pole from its S pole using filings alone.\n\n+ Exam-favourite question: \"What can iron filings not tell you about a magnetic field?\" Answer: **the direction / which pole is N or S.**\n\nTakeaway: compass = shape + direction; filings = shape only (no direction).", "source": "GLM 5.1 ②", "_id": "glm_2_18", "judge_pick": true}, {"question": "Iron filings are sprinkled on paper above a magnet and the paper is gently tapped. Why do the filings line up, and why must you tap the paper? (2 steps)", "answer": "- Step 1: Each iron filing is a tiny piece of magnetic material. When placed in the magnet's field, it becomes an **induced magnet** — the field forces its domains to align, turning each filing into a miniature bar magnet that rotates to align with the local field direction.\n- Step 2: Tapping the paper is necessary because friction between the filings and the paper prevents them from rotating freely. The tap gives each filing a brief moment of reduced friction, allowing it to pivot and settle into the field-aligned orientation. Without tapping, the filings would remain in random positions dominated by friction.\n\nTakeaway: filings are induced micro-magnets; tapping overcomes friction so they can align.", "source": "GLM 5.1 ②", "_id": "glm_2_19", "judge_pick": false}, {"question": "What is a uniform magnetic field? Describe exactly what the field-line diagram looks like for a uniform field. (2 steps)", "answer": "- Step 1: A uniform magnetic field is one where the **strength and direction are the same everywhere** within the region. Every point in the field has identical $$B$$ and the same field direction.\n- Step 2: On a diagram, a uniform field appears as **straight, parallel, equally-spaced lines with arrows all pointing the same way**. The equal spacing guarantees constant strength; the parallel straightness guarantees constant direction. Any deviation (curving, bunching, fanning out) means the field is non-uniform.\n\nTakeaway: uniform = straight + parallel + equally spaced + same arrows.", "source": "GLM 5.1 ②", "_id": "glm_2_20", "judge_pick": false}, {"question": "Two bar magnets are placed a small distance apart with opposite poles facing each other (N faces S). The magnets are fixed so they cannot move. Describe the field in the gap between them. (2 steps)", "answer": "- Step 1: The opposite poles (N and S) attract each other. Field lines from the N pole of one magnet travel straight across the gap and enter the S pole of the other magnet. Because the geometry is symmetric and the poles are directly facing, the lines in the gap are **straight, parallel, and equally spaced**.\n- Step 2: This arrangement produces a **uniform field** in the gap — the same strength and direction at every point. This is the standard set-up used in motor-effect experiments: a current-carrying wire placed in this uniform gap experiences a consistent force everywhere along its length.\n\nTakeaway: opposite poles facing + fixed = uniform field in the gap.", "source": "GLM 5.1 ②", "_id": "glm_2_21", "judge_pick": false}, {"question": "Two bar magnets are placed with like poles facing each other (N faces N, or S faces S). What special point appears in the middle of the gap, and what is its physical significance? (3 steps)", "answer": "- Step 1: Like poles repel. The field from each magnet pushes outward from its N pole (or inward toward its S pole). At the exact centre of the gap, the two fields are equal in magnitude but opposite in direction — they **cancel completely**.\n- Step 2: This cancellation point is called a **neutral point** (sometimes marked with a cross ⊗ on diagrams). At a neutral point, the net magnetic field is zero: $$B = 0$$. A compass placed here would spin freely and not settle in any direction.\n- Step 3: Around the neutral point, the field lines from the two magnets curve *away* from the centre — they never pass through the neutral point. This is consistent with the rule that lines never cross: at the neutral point there is no field direction at all, so no lines can exist there.\n\n+ Imagine yourself as a positive test charge at the centre: both N poles push you away equally, so the forces cancel and you feel nothing.\n\nTakeaway: like poles facing = repulsion = neutral point (zero field) in the centre.", "source": "GLM 5.1 ②", "_id": "glm_2_22", "judge_pick": false}, {"question": "A compass needle on Earth \"points north.\" But physically, which type of magnetic pole does the needle's red end actually point towards? Explain the seemingly contradictory naming. (3 steps)", "answer": "- Step 1: The compass needle's red end is a **magnetic North pole** of the tiny bar magnet inside the compass. By the rule \"opposite poles attract,\" this N end must be attracted to a **magnetic South pole**.\n- Step 2: Therefore, the compass's N end points towards the Earth's **magnetic South pole**. This magnetic South pole happens to be located near the **geographic North Pole** of Earth. The Earth behaves like a giant bar magnet that is effectively \"upside down\" compared to how we name directions on maps.\n- Step 3: The contradiction is purely a naming issue. We call the top of the globe \"geographic North\" for navigation purposes, but the magnetic pole sitting up there is a South pole. So \"a compass points north\" is geographically true but magnetically misleading — it points at a magnetic south.\n\n+ Parallel trap: conventional current flows opposite to electron flow — another \"physics naming convention that's backwards.\" Keep both straight.\n\nTakeaway: compass N → Earth's magnetic S (near geographic N). The naming is backwards; the physics is consistent.", "source": "GLM 5.1 ②", "_id": "glm_2_23", "judge_pick": false}, {"question": "The Earth's magnetic field in the UK has a strength of roughly $$50 \\, \\mu\\text{T}$$ and dips into the ground at about $$65\\text{–}70^\\circ$$. Why does the field dip (point downward) rather than being horizontal, and what does this tell you about the geometry of Earth's internal \"bar magnet\"? (2 steps)", "answer": "- Step 1: The field dips because the Earth's magnetic axis is tilted relative to the geographic axis, and the UK is at a latitude between the equator and the magnetic pole. At the equator the field is mostly horizontal; near the magnetic pole it is mostly vertical (pointing straight down or up). At mid-latitudes like the UK, the field has both horizontal and vertical components — it dips into the ground at an angle.\n- Step 2: This dip angle reveals that the Earth's internal \"bar magnet\" is not aligned with the surface and is offset from the geographic axis. The field lines emerge from the magnetic South pole (near geographic North), curve through space, re-enter at the magnetic North pole (near geographic South), and pass *through* the Earth's interior to complete the loop — so at the UK's position, the lines are angled downward into the ground.\n\n+ Scale context: $$50 \\, \\mu\\text{T} = 5.0 \\times 10^{-5} \\, \\text{T}$$ is extremely weak — a typical lab magnet is thousands of times stronger ($$\\sim0.1\\text{–}1 \\, \\text{T}$$).\n\nTakeaway: the dip angle shows the field is 3D, not just horizontal; Earth's magnet is tilted and offset.", "source": "GLM 5.1 ②", "_id": "glm_2_24", "judge_pick": false}, {"question": "State the core fact that creates an electromagnet, using the four-word chain that links the cause to the effect. What does each word represent? (2 steps)", "answer": "- Step 1: The four-word chain is: **Current → Conductor → Magnetic → Electromagnet**. When a **current** flows through a **conductor** (a wire), a **magnetic** field is created around it — this setup is an **electromagnet**.\n- Step 2: Each word's role:\n+ **Current** — the flow of charge (amperes) is the *cause*. Without current, no magnetic field.\n+ **Conductor** — the wire provides the path for current. The field surrounds this conductor.\n+ **Magnetic** — the *effect*: a circular magnetic field appears in the space around the wire.\n+ **Electromagnet** — the *whole device*: a magnet powered by electricity, which can be switched on/off by controlling the current.\n\nTakeaway: no current = no field; current = instant magnet (electromagnet).", "source": "GLM 5.1 ②", "_id": "glm_2_25", "judge_pick": false}, {"question": "State the right-hand grip rule. What does your thumb represent, and what do your curled fingers represent? Why must it be the *right* hand? (3 steps)", "answer": "- Step 1: The **right-hand grip rule**: point your **thumb** along the direction of conventional current in the wire; your **curled fingers** then show the direction of the circular magnetic field wrapping around the wire.\n- Step 2: The thumb = **current direction** (conventional, from + to −). The curled fingers = **field direction** (the way the field circles spiral around the conductor). At any point near the wire, the field direction is tangent to the circle at that point, following the finger curl.\n- Step 3: It must be the **right hand** because the relationship between current direction and field direction is a fixed physical law (one of Maxwell's equations simplified). If you used your left hand, you would get the *opposite* field direction — which is wrong. The left hand is reserved for a *different* rule: Fleming's Left-Hand Rule for the **force** on the wire (next lesson). Different hands for different physical quantities.\n\n+ Memory hook: \"right hand, thumbs up\" — Alex's phrase. Thumb up = current; fingers curl = field.\n\nTakeaway: RIGHT hand for field around wire; LEFT hand for force on wire (coming next lesson). Don't mix them.", "source": "GLM 5.1 ②", "_id": "glm_2_26", "judge_pick": false}, {"question": "A straight wire carries conventional current directly *into* the page (away from you). Sketch the magnetic field lines around this wire. Are they clockwise or anticlockwise? (2 steps)", "answer": "- Step 1: The field lines around a straight current-carrying wire are **concentric circles** — circles centred on the wire, lying in the plane perpendicular to the current. They are strongest (closest together) near the wire and weaken with distance.\n- Step 2: Apply the right-hand grip rule: point your right thumb *into* the page (current direction). Your curled fingers wrap **clockwise** when viewed from your perspective (looking at the page). So the field circles are **clockwise** for current into the page.\n\n+ Opposite case: if the current comes *out* of the page (towards you), the circles are anticlockwise.\n\nTakeaway: current in → clockwise circles; current out → anticlockwise circles. Use right-hand grip to confirm.", "source": "GLM 5.1 ②", "_id": "glm_2_27", "judge_pick": false}, {"question": "Give the three ways to make an electromagnet stronger. All three begin with the same letter — what is it, and what are the three words? (2 steps)", "answer": "- Step 1: The three ways all begin with **C**: **Current, Coils, Core**. This mnemonic is designed for easy recall under exam pressure.\n- Step 2: Each one's mechanism:\n+ **Current** — increase the current flowing through the wire. More charge flow per second = stronger magnetic field.\n+ **Coils** — wind the wire into more turns (a coil/solenoid). Each turn contributes its own field; stacking many turns in the same space concentrates and adds the fields together.\n+ **Core** — insert a soft-iron core inside the coil. The iron becomes an induced magnet, channelling and concentrating the field lines through the core, greatly boosting the overall field strength.\n\nTakeaway: strengthen an electromagnet = more C, C, C.", "source": "GLM 5.1 ②", "_id": "glm_2_28", "judge_pick": true}, {"question": "Why does winding a straight wire into a coil (solenoid) produce a stronger magnetic field than the same wire kept straight? Explain the field-adding mechanism. (2 steps)", "answer": "- Step 1: Each individual turn of the coil carries the same current and produces its own circular magnetic field, just like a straight wire would. But in a coil, the turns are **stacked on top of each other** in the same space, so their individual fields **superpose** (add together).\n- Step 2: Inside the solenoid, all the circular fields from each turn combine to create a strong, nearly uniform field running along the axis. Outside, the combined field resembles a bar magnet's field. The more turns you pack into the same length, the more fields you add, and the stronger the result — this is why \"more coils\" is one of the three strengtheners.\n\n+ Simple analogy: one turn = one weak voice; many turns singing the same note in the same room = loud chorus.\n\nTakeaway: coils concentrate multiple fields in one space = stronger total field.", "source": "GLM 5.1 ②", "_id": "glm_2_29", "judge_pick": false}, {"question": "Why does inserting a soft-iron core inside a solenoid dramatically increase its magnetic field strength? What property of iron makes this possible, and why must it be *soft* iron? (3 steps)", "answer": "- Step 1: Iron is a **magnetic material** — its internal domains can be aligned by an external field. When the solenoid's field passes through the iron core, the domains align, making the core itself an **induced magnet**. The core's own field then adds to the solenoid's field, greatly amplifying the total.\n- Step 2: The iron core also **channels and concentrates** the field lines. Without a core, many field lines loop through the air outside the coil (a low-permeability medium). The iron has high magnetic permeability, meaning it \"conducts\" magnetic flux efficiently — the lines prefer to travel through the iron, packing more flux into the core region.\n- Step 3: The core must be **soft iron** (magnetically soft) so that when the current is switched off, the core's domains randomise quickly and the electromagnet loses its magnetism. A hard material (like steel) would retain residual magnetism, preventing the electromagnet from fully switching off.\n\nTakeaway: soft-iron core = induced magnet + flux concentrator + quick release when off.", "source": "GLM 5.1 ②", "_id": "glm_2_30", "judge_pick": true}, {"question": "What is a solenoid, and how does its external magnetic field compare to that of a permanent bar magnet? (2 steps)", "answer": "- Step 1: A **solenoid** is a coil of wire wound into a long, tight cylindrical spring shape (like a helix). When current flows through it, it produces a strong, nearly uniform field inside and a characteristic field outside.\n- Step 2: The **external field of a solenoid looks exactly like a bar magnet's field** — lines emerge from one end (the N end), loop around the outside, and re-enter at the other end (the S end). The shape, direction (N→S externally), and strength distribution (strongest at the poles) are all indistinguishable from a real bar magnet's external pattern. The key difference: a solenoid's field can be switched off by cutting the current.\n\nTakeaway: solenoid = electrical bar magnet; same external pattern, but controllable.", "source": "GLM 5.1 ②", "_id": "glm_2_31", "judge_pick": false}, {"question": "How do you determine which end of a solenoid is its North pole using the right-hand grip rule? Walk through the physical gesture. (3 steps)", "answer": "- Step 1: Look at the solenoid from one end and identify which way the **current flows around the coils** — is it circling clockwise or anticlockwise as viewed from that end?\n- Step 2: Apply the right-hand grip rule in its solenoid form: **curl your right fingers in the same direction as the current circles around the coils**. Your fingers mimic the current's circular path.\n- Step 3: Your **right thumb now points towards the North pole** of the solenoid. The end your thumb points to is N; the opposite end is S. This works because the field inside the solenoid runs along the axis in the thumb direction (S→N internally, emerging at N externally).\n\n+ Check: if current circles anticlockwise as viewed from one end, that end is N (curl fingers anticlockwise, thumb points towards you = N at that end). If clockwise, that end is S.\n\nTakeaway: fingers follow current around coils → thumb points to N end.", "source": "GLM 5.1 ②", "_id": "glm_2_32", "judge_pick": false}, {"question": "Inside a solenoid, the magnetic field runs in a specific direction from one end to the other. Which direction is it (S→N or N→S), and why is this the opposite of the external direction? (2 steps)", "answer": "- Step 1: Inside the solenoid, the field runs from **S to N** — from the South-pole end towards the North-pole end. This is the *internal* direction, completing the loop that externally runs N→S.\n- Step 2: Magnetic field lines always form **closed loops** — they never start or stop. Externally, lines leave N and travel to S. To close the loop, they must continue through the interior from S back to N. A permanent bar magnet has the same internal S→N field; we just can't see inside the solid iron. The solenoid's hollow core lets us observe this directly.\n\n+ The interior field is also **strong and nearly uniform** (straight, parallel lines) — much more uniform than a bar magnet's internal field, which is distorted by the iron's domain structure.\n\nTakeaway: external = N→S; internal = S→N; lines always loop.", "source": "GLM 5.1 ②", "_id": "glm_2_33", "judge_pick": true}, {"question": "What is the symbol and SI unit for magnetic flux density? Break down the unit into its fundamental components and explain what each component means physically. (3 steps)", "answer": "- Step 1: The symbol is **$$B$$**. The quantity is called **magnetic flux density** (or magnetic field strength). It measures how closely bunched the field lines are — higher $$B$$ means more lines per unit area, i.e. a stronger field.\n- Step 2: The SI unit is the **tesla (T)**. In terms of fundamental units: $$1 \\, \\text{T} = 1 \\, \\text{N} \\, \\text{A}^{-1} \\, \\text{m}^{-1}$$.\n- Step 3: Breaking down the unit:\n+ **N** (newton) — force. This appears because $$B$$ is ultimately *defined* through the force it exerts on a current-carrying wire: $$F = BIl$$.\n+ **A⁻¹** (per ampere) — the force depends on the current in the wire; dividing by current isolates the field's contribution.\n+ **m⁻¹** (per metre) — the force also depends on the length of wire in the field; dividing by length isolates the field per unit length.\n\nSo 1 T means: \"a field that exerts 1 N of force on a 1 m length of wire carrying 1 A of current (perpendicular to the field).\"\n\nTakeaway: tesla = force per (current × length); $$B$$ measures line density / field strength.", "source": "GLM 5.1 ②", "_id": "glm_2_34", "judge_pick": false}, {"question": "The Earth's magnetic field is approximately $$50 \\, \\mu\\text{T}$$, while a strong laboratory electromagnet might produce $$0.5 \\, \\text{T}$$. How many times stronger is the lab magnet than Earth's field, and what does this ratio tell you about the scale of everyday fields? (2 steps)", "answer": "- Step 1: Convert both to the same unit. $$50 \\, \\mu\\text{T} = 50 \\times 10^{-6} \\, \\text{T} = 5.0 \\times 10^{-5} \\, \\text{T}$$. The lab magnet is $$0.5 \\, \\text{T} = 5.0 \\times 10^{-1} \\, \\text{T}$$.\n- Step 2: The ratio is $$\\frac{5.0 \\times 10^{-1}}{5.0 \\times 10^{-5}} = 10^{4} = 10{,}000$$. The lab magnet is **ten thousand times stronger** than Earth's field. This tells you that Earth's field is extremely weak by engineering standards — we notice it only because compass needles are exquisitely sensitive and there's no competing field nearby. Even a small permanent magnet (~0.01 T) is hundreds of times stronger than Earth's field.\n\nTakeaway: Earth's field ~$$10^{-5}$$ T is feeble; lab magnets ~$$10^{-1}$$ to $$10^{0}$$ T are 10,000× stronger.", "source": "GLM 5.1 ②", "_id": "glm_2_35", "judge_pick": false}, {"question": "A student says: \"A magnet always attracts any metal towards it.\" Is this statement fully correct? Give two reasons why it is not. (3 steps)", "answer": "- Step 1: The statement is **not fully correct**. First, a magnet only attracts **magnetic materials** (iron, steel, nickel, cobalt). Most metals — copper, aluminium, silver, gold, lead, zinc — are non-magnetic and experience no attractive force from a magnet at all.\n- Step 2: Second, even for magnetic materials, the word \"always attracts\" is wrong. If you bring the **like pole** of another magnet nearby (N near N, or S near S), the force is **repulsive**, not attractive. The field pushes the like pole away.\n- Step 3: The safe, exam-ready phrasing is: a magnetic field makes objects **interact** — there is a force, which may be attractive or repulsive depending on the configuration. \"Interact\" covers both cases without committing to \"attract\" or \"repel.\"\n\n+ Alex's coaching: when unsure whether it's a push or pull, say \"interact\" — it's always correct.\n\nTakeaway: not all metals are magnetic; not all magnetic forces are attractive; say \"interact.\"", "source": "GLM 5.1 ②", "_id": "glm_2_36", "judge_pick": true}, {"question": "In the Magneto (X-Men) film clip, Magneto appears to stop and steer missiles mid-flight using his magnetic powers. What aspect of this is *physically plausible*, and what aspect is *definitely false* about how real magnets behave? (3 steps)", "answer": "- Step 1: What is **plausible**: missiles contain steel/iron (magnetic materials), so a sufficiently strong magnetic field *could* exert a force on them. A real magnet would attract the magnetic metal in the missile — pulling it towards the magnet. So \"a magnetic interaction exists\" is physically possible.\n- Step 2: What is **definitely false**: in the film, Magneto makes the missiles hover and steer in arbitrary directions (turning, stopping, reversing). A simple magnet can only **attract** magnetic material (pull it straight in towards the magnet). It cannot levitate, steer, or push objects in multiple directions at will. Real magnetic forces on a passive magnetic object are always attractive (towards the field source), not arbitrarily directional.\n- Step 3: The correct neutral description: Magneto's field causes the metal to **interact** (there is a force). You can safely say \"the field exerts a force on the magnetic material in the missiles.\" You cannot safely say \"the field attracts the missiles in all directions\" — that exceeds what a real magnet does.\n\nTakeaway: real magnets attract magnetic materials; they cannot steer them like remote-control vehicles.", "source": "GLM 5.1 ②", "_id": "glm_2_37", "judge_pick": true}, {"question": "A student claims: \"Like charges attract, and like magnetic poles also attract.\" Identify both errors and state the correct rule for each case. (2 steps)", "answer": "- Step 1: **Like charges repel**, not attract. Two electrons (both negative) push each other away; two protons (both positive) push each other away. The correct rule: like charges repel, opposite charges attract.\n- Step 2: **Like magnetic poles also repel**, not attract. N facing N pushes apart; S facing S pushes apart. The correct rule: like poles repel, opposite poles attract. Both systems obey the same pattern: like → repel, opposite → attract.\n\n+ The student's statement got the rule backwards for *both* electricity and magnetism. Both follow \"like repel, opposite attract.\"\n\nTakeaway: like repels in both charge and pole systems; opposite attracts in both.", "source": "GLM 5.1 ②", "_id": "glm_2_38", "judge_pick": false}, {"question": "You are shown a magnetic field diagram with curved lines that are closer together on the left side and widely spaced on the right side. Using the three-property framework, describe what this tells you about strength and shape. Where would a magnetic material feel the strongest force? (3 steps)", "answer": "- Step 1: **Strength**: the left side has closer lines = stronger field; the right side has widely spaced lines = weaker field. The field is non-uniform — it varies across the region.\n- Step 2: **Shape**: the lines are curved (not straight and parallel), confirming the field is non-uniform. The curvature indicates the field direction changes from point to point.\n- Step 3: A magnetic material would feel the **strongest force on the left side**, where the lines are densest. Force on a magnetic material is proportional to field strength, so the dense-line region exerts the greatest pull/push.\n\nTakeaway: closer lines = stronger = greater force; curved lines = non-uniform direction.", "source": "GLM 5.1 ②", "_id": "glm_2_39", "judge_pick": false}, {"question": "Compare the external magnetic field of a solenoid (with current flowing) to that of a permanent bar magnet. What is identical, and what is the crucial practical difference? (2 steps)", "answer": "- Step 1: What is **identical**: the external field pattern. Both produce lines that emerge from an N end, loop around the outside, and re-enter at an S end. Both are strongest at the poles. Both have the same N→S external direction. If you photographed the external patterns without labels, you could not tell which was the solenoid and which was the bar magnet.\n- Step 2: The **crucial practical difference** is controllability. The solenoid's field exists only while current flows — you can **switch it on and off**, vary its strength (by changing current, coils, or core), and reverse its polarity (by reversing the current direction). The permanent magnet's field is always present and cannot be conveniently switched off or adjusted.\n\n+ This is why electromagnets are preferred in scrap-yard cranes, MRI machines, and electric motors — controllable magnetism.\n\nTakeaway: same pattern, different control — solenoid = on/off; bar magnet = always on.", "source": "GLM 5.1 ②", "_id": "glm_2_40", "judge_pick": false}, {"question": "Why can an electromagnet be \"switched off\" while a permanent magnet cannot? Link your answer to magnetically hard vs soft materials and the role of current. (3 steps)", "answer": "- Step 1: An electromagnet's field comes from two sources: the **current in the coil** (the primary source) and the **induced magnetism in the soft-iron core** (the amplifier). When you cut the current, the coil's field disappears instantly.\n- Step 2: The core is made of **magnetically soft iron**, which loses its induced magnetism almost immediately once the coil's field vanishes. The domains randomise quickly because soft materials don't hold alignment. So the total field drops to essentially zero.\n- Step 3: A permanent magnet is made of **magnetically hard** material (e.g. steel). Its domains were aligned during manufacturing and are locked in place by the hard material's resistance to randomisation. No current is needed to maintain alignment — the magnetism is \"baked in.\" You cannot conveniently switch it off.\n\n+ If you used a steel core in an electromagnet, it would retain residual magnetism after switching off — partially \"stuck.\" That's why soft iron is essential.\n\nTakeaway: electromagnet off = no current + soft core releases; permanent magnet = hard material, always locked.", "source": "GLM 5.1 ②", "_id": "glm_2_41", "judge_pick": true}, {"question": "A wire carries conventional current flowing vertically *upward*. You look at the wire from the side. Using the right-hand grip rule, determine the direction of the magnetic field at a point directly to the **east** of the wire. Is the field pointing north, south, into the page, or out of the page at that specific point? (3 steps)", "answer": "- Step 1: Apply the right-hand grip rule: point your right thumb **upward** (current direction). Curl your fingers around the wire — they wrap from the west side over the top to the east side and under the bottom, circling anticlockwise when viewed from above.\n- Step 2: The field lines are concentric circles around the wire. At a point directly **east** of the wire, the circular field is tangent to the circle at that location.\n- Step 3: At the east point, your curled fingers are pointing **towards you** (out of the page, i.e. northward if we define north as out of the page in a top-down view). So the field at the east point points **out of the page / northward** (perpendicular to the line connecting the point to the wire, following the circle's tangent).\n\n+ Quick mental check: current up, east point → field comes out towards you. At a point west of the wire, the field would go into the page (away from you). The circle is consistent.\n\nTakeaway: at any point near a wire, the field is tangent to the circle; use right-hand grip to find which way.", "source": "GLM 5.1 ②", "_id": "glm_2_42", "judge_pick": true}, {"question": "You double the current in a solenoid and also double the number of coil turns (keeping the same length). Qualitatively, how does the magnetic field strength inside the solenoid change? Explain the reasoning without exact calculation. (2 steps)", "answer": "- Step 1: Each change independently increases the field. **Doubling the current** doubles the field contribution from each turn (field from a single wire is proportional to current). **Doubling the turns** doubles the number of field contributions stacked inside the same length (more turns = more fields superposing).\n- Step 2: Both effects multiply together. The field inside the solenoid is approximately proportional to $$n \\times I$$ (turns per unit length × current). Doubling both $$n$$ and $$I$$ means the field roughly **quadruples** (4×). This is a qualitative order-of-magnitude argument: two independent doubling factors combine to give a fourfold increase.\n\n+ This is why solenoids can produce very strong fields — you stack the turns and crank the current simultaneously.\n\nTakeaway: double current + double turns ≈ 4× field (both factors are multiplicative).", "source": "GLM 5.1 ②", "_id": "glm_2_43", "judge_pick": false}, {"question": "A car gains 2000 extra electrons through friction with the air. Does the car become positively or negatively charged? Explain in one sentence using the neutrality condition. (1 step)", "answer": "- Step 1: The car becomes **negatively charged**. The neutrality condition is $$N_{\\text{protons}} = N_{\\text{electrons}}$$; gaining 2000 extra electrons makes $$N_{\\text{electrons}} > N_{\\text{protons}}$$, so the net charge is negative
