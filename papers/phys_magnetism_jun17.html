re-enter at the S pole — they all start and end at the poles. So the lines are most densely concentrated *right at* the ends, where they're all gathered together before fanning out into space.\n- Step 2: As lines move away from a pole, they spread out across a wider area to loop around to the other pole. Spread-out lines = weaker field. Concentrated lines (at the poles) = strong field. This is a direct visual consequence of the rule \"closer lines = stronger field.\"\n\nTakeaway: poles act as \"sources/sinks\" of lines, hence maximum bunching, hence maximum field strength.", "source": "Opus 4.7 ②", "_id": "opus_2_44", "judge_pick": true}, {"question": "Earth's magnetic field is about $$50 \\, \\mu\\text{T}$$ in the UK. A typical lab electromagnet produces fields measured in tesla. Roughly how many times stronger is the lab magnet, and what does this tell you about the practical scale of $$B$$? (2 steps)", "answer": "- Step 1: $$50 \\, \\mu\\text{T} = 5 \\times 10^{-5} \\text{ T}$$. A 1 T lab magnet is therefore about $$1 / (5 \\times 10^{-5}) = 2 \\times 10^{4}$$ — roughly **twenty thousand times stronger** than Earth's field.\n- Step 2: This tells you: (i) the tesla is a *large* unit — most everyday magnetic fields are measured in millitesla or microtesla; (ii) lab magnets producing a few tesla are very strong; (iii) MRI scanners (~1-3 T) and research magnets (~10+ T) push toward the limits of what's practical. The tesla is sized for industrial/lab use, not everyday phenomena.\n\nTakeaway: 1 tesla is \"very strong\"; Earth's field is microscopic by comparison.", "source": "Opus 4.7 ②", "_id": "opus_2_45", "judge_pick": false}, {"question": "A compass and a bar magnet are placed near each other. The compass needle's red (N) end points towards the *left* end of the bar magnet. Which end of the bar magnet is its N pole? (2 steps)", "answer": "- Step 1: The compass needle's N end is attracted to a magnetic *S* pole (opposite poles attract). So if the compass N is pointing left, it's being pulled toward an S pole on the left.\n- Step 2: Therefore the **left end of the bar magnet is its S pole**, and the right end is its N pole. The N end of a compass always indicates the *direction the local field is pointing*, which is from N (of the source magnet) toward S (of the source magnet) — outside the magnet.\n\nTakeaway: compass N points to the source magnet's S end; field arrows go N→S outside.", "source": "Opus 4.7 ②", "_id": "opus_2_46", "judge_pick": false}, {"question": "True or false: you can build an electromagnet without an iron core. Justify.", "answer": "**True.** An electromagnet is fundamentally just \"a magnetic field produced by a current\" — the current alone (in a wire or coil) creates a field via the right-hand grip rule, no core needed. An \"air-core\" solenoid works perfectly fine; it's just *weaker* than the same coil with an iron core. The core is one of the three strengtheners (Current, Coils, Core), not a requirement. Many real applications (e.g., MRI magnets, superconducting magnets) use no ferromagnetic core at all and rely on enormous currents through many turns instead.\n\nTakeaway: current + conductor is sufficient; core is an enhancement, not a necessity.", "source": "Opus 4.7 ②", "_id": "opus_2_47", "judge_pick": false}, {"question": "A student claims they cut a bar magnet in half and now has a separate N pole and S pole, one in each piece. Why is this impossible? (2 steps)", "answer": "- Step 1: Cutting a magnet doesn't separate its poles — each piece becomes a *complete smaller magnet* with its own N and S poles. The \"N face\" piece grows a new S pole on the freshly-cut end, and vice versa.\n- Step 2: The deep reason: magnetism in materials arises from many tiny aligned dipoles (electron spins or magnetic domains) inside, each of which is itself a complete N-S pair. There's no \"isolated N pole atom\" that you can liberate by cutting. This is in stark contrast to electric charges, where positive and negative *can* be separated. Magnetic monopoles have never been observed in nature, despite extensive searches.\n\nTakeaway: magnetic poles always come in pairs; no amount of cutting separates them.", "source": "Opus 4.7 ②", "_id": "opus_2_48", "judge_pick": true}, {"question": "A student says \"two electrons attract because they're both negative — like charges attract.\" Where is the confusion, and what's the correct rule? (2 steps)", "answer": "- Step 1: The confusion is reversing the like/opposite rule. The actual rule is: **like charges repel; opposite charges attract**. Two electrons (both negative) are *like* charges and therefore **repel**.\n- Step 2: Why? Negative charges create electric fields that push other negative charges away (electric force is along the field for positive charges; against the field for negative charges; for two negatives, the geometry works out to mutual repulsion). The same rule applies to like magnetic poles: N–N repel, S–S repel, but N–S attract.\n\nTakeaway: same sign → push apart; opposite sign → pull together. Always.", "source": "Opus 4.7 ②", "_id": "opus_2_49", "judge_pick": false}, {"question": "Why is the magnetic field around a single straight current-carrying wire described as a \"field\" rather than just \"a force on the wire\"?", "answer": "Because the magnetic effect exists *throughout the region of space around the wire*, not just at the wire itself. If you place a compass anywhere near the wire, it deflects; place a second current-carrying wire nearby and it experiences a force; place a moving charge nearby and it gets deflected. The wire creates a region in which any magnetic material or moving charge feels a force — that's the *definition* of a field. The field is the underlying physical reality; the force on any specific test object is just one local manifestation of it.\n\nTakeaway: a field is the persistent property of space created by a source; forces are what test objects experience in that field.", "source": "Opus 4.7 ②", "_id": "opus_2_50", "judge_pick": true}, {"question": "You're asked to synthesise: explain step-by-step how you would produce a uniform magnetic field in a lab, demonstrate it has the right properties, then turn it into an electromagnet that switches on/off. (4 steps)", "answer": "- Step 1: Take two bar magnets, place them facing each other with **opposite poles** (N facing S), a small gap apart. Fix them in clamps so they cannot move toward each other. The gap now contains a uniform field.\n- Step 2: Verify uniformity with a **plotting compass** moved around the gap: the needle should point the same direction everywhere in the gap, confirming uniform direction. Sprinkle iron filings to confirm the lines are straight and equally spaced.\n- Step 3: To turn this into a tuneable electromagnet setup instead: replace the two permanent magnets with a long **solenoid**. Inside the solenoid, the field is naturally uniform — the same configuration but now electrically controlled.\n- Step 4: Wire the solenoid to a power supply via a switch. Current ON → field present (strength tuned by current, coil count, and an iron core); current OFF → field vanishes (if soft-iron core used). You now have a uniform field on demand.\n\nTakeaway: uniform field by geometry; controllable field by electrification.", "source": "Opus 4.7 ②", "_id": "opus_2_51", "judge_pick": false}, {"question": "Mini-exercise: A wire carries 2 A and lies in a magnetic field where it's perpendicular to the field lines. The force per metre of wire is 0.4 N/m. Roughly, what is the magnetic flux density $$B$$? (2 steps)", "answer": "- Step 1: For perpendicular orientation, $$F = BIL$$, so per metre: $$F/L = BI$$, giving $$B = (F/L)/I$$.\n- Step 2: Plug in: $$B = 0.4 / 2 = 0.2 \\text{ T}$$. That's roughly 4000× the Earth's field — a strong but plausible lab field. The point isn't the number; it's that knowing two of the three (force, current, length) lets you back out $$B$$, because $$B$$ is *defined* through this force law.\n\nTakeaway: $$B$$ is operationally measured by the force-per-amp-per-metre on a perpendicular wire.", "source": "Opus 4.7 ②", "_id": "opus_2_52", "judge_pick": false}, {"question": "Why is \"magnetic flux density\" called *density* — what is it the density of?", "answer": "It's the density of **magnetic flux lines** (field lines) passing through a unit area perpendicular to the field. Geometrically: imagine a small square frame oriented perpendicular to the field. Count how many field lines thread through it per unit area — that's $$B$$. High $$B$$ = many lines per unit area (crowded lines on a diagram); low $$B$$ = few lines per unit area (spread-out lines). This is why \"closer lines = stronger field\" — the line-spacing rule on a diagram is literally a visualisation of the *density* concept built into the name.\n\nTakeaway: $$B$$ = how densely field lines are packed; the name is geometrically literal.", "source": "Opus 4.7 ②", "_id": "opus_2_53", "judge_pick": true}], "count": 54}}, "meta": {"glm_1": {"run": 1, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.7, "in_tokens": 9988, "out_tokens": 10161, "reasoning_chars": 15059, "cost_eur": 0.0424, "elapsed_s": 134, "content_chars": 27987}, "glm_2": {"run": 2, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.8, "in_tokens": 11784, "out_tokens": 20283, "reasoning_chars": 8626, "cost_eur": 0.0767, "elapsed_s": 301, "content_chars": 69022}, "glm_3": {"run": 3, "provider": "glm", "model": "z-ai/glm-5.1", "display": "GLM 5.1", "temperature": 0.85, "in_tokens": 11784, "out_tokens": 19508, "reasoning_chars": 7166, "cost_eur": 0.0742, "elapsed_s": 301, "content_chars": 67755}, "minimax_1": {"run": 1, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.7, "in_tokens": 9833, "out_tokens": 5925, "reasoning_chars": 2122, "cost_eur": 0.0078, "elapsed_s": 53, "content_chars": 23424}, "minimax_2": {"run": 2, "provider": "minimax", "model": "minimax/minimax-m1", "display": "MiniMax M1", "temperature": 0.8, "in_tokens": 9833, "out_tokens": 7364, "reasoning_chars": 1691, "cost_eur": 0.0093, "elapsed_s": 67, "content_chars": 30273}, "opus_1": {"run": 1, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 15097, "out_tokens": 15749, "reasoning_chars": 0, "cost_eur": 1.295, "elapsed_s": 231, "content_chars": 46276}, "opus_2": {"run": 2, "provider": "opus", "model": "anthropic/claude-opus-4-7", "display": "Claude Opus 4.7", "temperature": 1.0, "in_tokens": 15097, "out_tokens": 16822, "reasoning_chars": 0, "cost_eur": 1.3691, "elapsed_s": 237, "content_chars": 47161}, "qwen_1": {"run": 1, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.7, "in_tokens": 9994, "out_tokens": 1865, "reasoning_chars": 2374, "cost_eur": 0.0039, "elapsed_s": 34, "content_chars": 5794}, "qwen_2": {"run": 2, "provider": "qwen", "model": "qwen/qwen3-235b-a22b", "display": "Qwen 3 235B", "temperature": 0.8, "in_tokens": 9994, "out_tokens": 2514, "reasoning_chars": 1323, "cost_eur": 0.0046, "elapsed_s": 44, "content_chars": 10300}}};
const SK='phys_magnetism_jun17';
let cur='mysel';
let mySet=new Set();
let myCards=[];

function initMySet(){
  const s=localStorage.getItem(SK+'_myset');
  if(s){try{mySet=new Set(JSON.parse(s))}catch(e){}}
  // default: none selected (user picks manually). Use Reset Judge to load judge picks.
  rebuildMyCards();
}
function rebuildMyCards(){
  const qm={};
  DATA.selected.forEach(c=>{if(mySet.has(c.question))qm[c.question]=c});
  for(const[mk,md]of Object.entries(DATA.models))
    md.cards.forEach(c=>{if(mySet.has(c.question)&&!qm[c.question])qm[c.question]={...c,source:md.label}});
  myCards=[];mySet.forEach(q=>{if(qm[q])myCards.push(qm[q])});
}
function saveMySet(){localStorage.setItem(SK+'_myset',JSON.stringify([...mySet]))}
function addM(c){mySet.add(c.question);saveMySet();rebuildMyCards()}
function remM(c){mySet.delete(c.question);saveMySet();rebuildMyCards()}
function inM(c){return mySet.has(c.question)}

function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fA(t){
  if(!t)return'';const ls=t.split('\n');let h='';
  for(const l of ls){const tr=l.trim();if(!tr){h+='<br>';continue}
    const sm=tr.match(/^-\s*Step\s+(\d+):\s*(.*)$/i);
    if(sm){h+=`<div class="stp"><strong>Step ${sm[1]}:</strong> ${eH(sm[2])}</div>`;continue}
    if(tr.startsWith('+ ')){h+=`<div class="sub">• ${eH(tr.slice(2))}</div>`;continue}
    if(tr.startsWith('- ')){h+=`<div style="margin:4px 0">• ${eH(tr.slice(2))}</div>`;continue}
    h+=`<div>${eH(tr)}</div>`}return h}
function fN(n){return n!=null?n.toLocaleString():'—'}
function fC(n){return n!=null?'€'+n.toFixed(4):'—'}
function fT(s){if(!s)return'—';return s<60?s+'s':Math.floor(s/60)+'m '+Math.round(s%60)+'s'}
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}

function renderTabs(){
  const b=document.getElementById('tabs');
  let h=`<button class="tb ${cur==='mysel'?'mact':''}" onclick="sw('mysel')">📌 My Selection (${myCards.length})</button>`;
  h+=`<button class="tb ${cur==='judge'?'jact':''}" onclick="sw('judge')">✨ Judge (${DATA.selected.length})</button>`;
  for(const[k,m]of Object.entries(DATA.models)){
    const n=m.cards.filter(c=>inM(c)).length;
    h+=`<button class="tb ${cur===k?'act':''}" onclick="sw('${k}')">${m.label} (${n}/${m.cards.length})</button>`}
  b.innerHTML=h;
}

function renderMeta(){
  const p=document.getElementById('mp');
  if(cur==='mysel'){p.innerHTML=`<div class="mi"><span class="ml">Final</span><span class="mv">${myCards.length} cards</span></div><div class="mi"><span class="ml">Judge Base</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  if(cur==='judge'){const tc=Object.keys(DATA.meta).reduce((s,k)=>s+(DATA.meta[k].cost_eur||0),0);p.innerHTML=`<div class="mi"><span class="ml">Picks</span><span class="mv">${DATA.selected.length}</span></div><div class="mi"><span class="ml">Gen Cost</span><span class="mv co">${fC(tc)}</span></div><div class="mi"><span class="ml">Models</span><span class="mv">${Object.keys(DATA.models).length}</span></div>`;return}
  const m=DATA.meta[cur];if(!m){p.innerHTML='';return}
  p.innerHTML=`<div class="mi"><span class="ml">Model</span><span class="mv mo">${m.model||'—'}</span></div><div class="mi"><span class="ml">Provider</span><span class="mv">${m.provider||'—'}</span></div><div class="mi"><span class="ml">Temp</span><span class="mv">${m.temperature??'—'}</span></div><div class="mi"><span class="ml">In Tok</span><span class="mv">${fN(m.in_tokens)}</span></div><div class="mi"><span class="ml">Out Tok</span><span class="mv">${fN(m.out_tokens)}</span></div><div class="mi"><span class="ml">Reasoning</span><span class="mv">${fN(m.reasoning_chars)} ch</span></div><div class="mi"><span class="ml">Content</span><span class="mv">${fN(m.content_chars)} ch</span></div><div class="mi"><span class="ml">Cost</span><span class="mv co">${fC(m.cost_eur)}</span></div><div class="mi"><span class="ml">Time</span><span class="mv">${fT(m.elapsed_s)}</span></div>`;
}

function getCur(){if(cur==='mysel')return myCards;if(cur==='judge')return DATA.selected;return DATA.models[cur]?DATA.models[cur].cards:[]}

function renderCards(){
  const cards=getCur();const list=document.getElementById('cl');
  document.getElementById('cc').textContent=cards.length+' cards';
  document.getElementById('sc').textContent=myCards.length+' in My Selection';
  if(!cards.length){list.innerHTML='<div class="es">No cards. Select from model tabs.</div>';return}
  let h='';
  for(let i=0;i<cards.length;i++){
    const c=cards[i];const im=inM(c);
    const jp=c.judge_pick?'<span class="jp">judge</span>':'';
    const src=c.source?`<span class="sb">${eH(c.source)}</span>`:'';
    h+=`<div class="cd ${im?'':'ds'}" data-i="${i}"><div class="ct"><input type="checkbox" class="cb" ${im?'checked':''} onchange="onTog(${i},this.checked)"><div class="qw"><div class="q" onclick="this.closest('.cd').classList.toggle('op');rr()">${eH(c.question)}${jp}</div></div></div><div class="a">${fA(c.answer)}<div class="cf">${src}<button class="cpb" onclick="cpC(${i})">📋</button></div></div></div>`}
  list.innerHTML=h;rr();
}

function onTog(i,ch){const c=getCur()[i];if(!c)return;if(ch)addM(c);else remM(c);
  const el=document.querySelector(`.cd[data-i="${i}"]`);if(el)el.classList.toggle('ds',!ch);
  renderTabs();document.getElementById('sc').textContent=myCards.length+' in My Selection';}

function rr(){if(window.renderMathInElement)renderMathInElement(document.getElementById('cl'),{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false})}

function sw(t){cur=t;renderTabs();renderMeta();renderCards()}
function selAll(){getCur().forEach(c=>addM(c));renderTabs();renderCards();toast('All selected')}
function deAll(){getCur().forEach(c=>remM(c));renderTabs();renderCards();toast('All deselected')}
function rstJ(){mySet=new Set();DATA.selected.forEach(c=>mySet.add(c.question));saveMySet();rebuildMyCards();renderTabs();renderCards();toast('Reset to judge')}
function rvAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.add('op'));rr()}
function hdAll(){document.querySelectorAll('.cd').forEach(c=>c.classList.remove('op'))}
function shuf(){const l=document.getElementById('cl');const cs=[...l.children];for(let i=cs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));l.appendChild(cs[j]);[cs[i],cs[j]]=[cs[j],cs[i]]}rr()}
function cpC(i){const c=getCur()[i];if(!c)return;navigator.clipboard.writeText(c.question+'\t'+c.answer).then(()=>toast('Copied!')).catch(()=>toast('Failed'))}
function cpTbl(){
  if(!myCards.length){toast('Empty!');return}
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  navigator.clipboard.writeText(md).then(()=>toast(myCards.length+' copied!')).catch(()=>toast('Failed'))
}
function _ntbCopy(){
  // Build Notion-paste-ready markdown table from myCards and copy to clipboard.
  let md='| Question | Answer |\n| --- | --- |\n';
  myCards.forEach(c=>{md+='| '+c.question.replace(/\|/g,'\\|').replace(/\n/g,' ')+' | '+c.answer.replace(/\|/g,'\\|').replace(/\n/g,' ')+' |\n'});
  return navigator.clipboard.writeText(md).then(()=>{toast('📋 '+myCards.length+' cards copied — paste into Notion (auto-formats as table)')}).catch(()=>{toast('Clipboard failed')})
}
function expN(){
  if(!myCards.length){toast('Empty!');return}
  toast('Exporting '+myCards.length+' to Notion...');
  // Try backend first (Flask/Vercel). If unavailable (GH Pages, file://, etc.), fall back to clipboard.
  // Use AbortController to bail fast if there's no server.
  const ctrl=new AbortController();const tmo=setTimeout(()=>ctrl.abort(),60000);
  fetch('https://ubuntu-16gb-hel1-1-personal-agent-vm.tail921e4c.ts.net/api/notion',{method:'POST',signal:ctrl.signal,mode:'cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cards:myCards,title:document.title.split('—')[0].trim()})
  }).then(r=>{
    clearTimeout(tmo);
    if(!r.ok)throw new Error('http '+r.status);
    const ct=r.headers.get('content-type')||'';
    if(!ct.includes('application/json'))throw new Error('non-json');
    return r.json();
  }).then(d=>{
    if(d.url){toast('Notion page created!');window.open(d.url,'_blank')}
    else throw new Error(d.error||'unknown')
  }).catch(e=>{
    clearTimeout(tmo);
    // No backend or backend error → clipboard fallback
    return _ntbCopy();
  })
}

initMySet();
document.addEventListener('DOMContentLoaded',()=>{renderTabs();renderMeta();renderCards()});
</script>
</body></html>
