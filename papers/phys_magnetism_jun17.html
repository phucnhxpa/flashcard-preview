<script>
const DATA={"selected": [{"question": "When two insulators are rubbed together and one ends up positive, which way did the electrons move, and why does the \"positive\" object end up positive? (2 steps)", "answer": "- Step 1: Friction supplies enough energy to dislodge loosely-bound outer electrons. Electrons flow *from* one material *to* the other — which direction depends on the two materials (this is empirical; the question will tell you).\n- Step 2: The object that *lost* electrons now has fewer negative charges than its (unchanged) protons, so the net charge is positive. The object that *gained* electrons has an excess of negatives, so it's net negative. Crucially, no protons moved — only electrons.", "source": "Opus 4.7 ②", "_id": "opus_2_2"}, {"question": "What is unusual about Earth's \"north\" pole magnetically, and why is this a real exam trap? (2 steps)", "answer": "- Step 1: The *geographic* North Pole (the spin axis) is in the Arctic. But magnetically, that location is a **south** pole — Earth's giant internal bar magnet is essentially upside down relative to the geography.\n- Step 2: The trap: students say \"the compass points to magnetic north\" — which is wrong terminology even though the compass *does* point geographically northward. The correct statement is \"the compass's N end points to Earth's magnetic *south* pole, near geographic North.\" Combined with the other sign convention (conventional current flows opposite to electron motion), this is a recurring source of lost marks.\n\nTakeaway: geographic North = magnetic South.", "source": "Opus 4.7 ②", "_id": "opus_2_16"}, {"question": "A wire carries conventional current flowing vertically *upward*. You look at the wire from the side. Using the right-hand grip rule, determine the direction of the magnetic field at a point directly to the **east** of the wire. Is the field pointing north, south, into the page, or out of the page at that specific point? (3 steps)", "answer": "- Step 1: Apply the right-hand grip rule: point your right thumb **upward** (current direction). Curl your fingers around the wire — they wrap from the west side over the top to the east side and under the bottom, circling anticlockwise when viewed from above.\n- Step 2: The field lines are concentric circles around the wire. At a point directly **east** of the wire, the circular field is tangent to the circle at that location.\n- Step 3: At the east point, your curled fingers are pointing **towards you** (out of the page, i.e. northward if we define north as out of the page in a top-down view). So the field at the east point points **out of the page / northward** (perpendicular to the line connecting the point to the wire, following the circle's tangent).\n\n+ Quick mental check: current up, east point → field comes out towards you. At a point west of the wire, the field would go into the page (away from you). The circle is consistent.\n\nTakeaway: at any point near a wire, the field is tangent to the circle; use right-hand grip to find which way.", "source": "GLM 5.1 ②", "_id": "glm_2_42"}, {"question": "Define a \"field\" in physics, using the precise wording an examiner expects. Why does this definition extend to gravitational, electric and magnetic fields equally well?", "answer": "A field is **a region in which something feels a force**. For a magnetic field specifically: \"a region in which a magnetic material, or a moving charged object, feels a force.\" The same template applies to gravity (region where a mass feels a force) and electric fields (region where a charge feels a force). The unifying idea is that a field is a *spatial map of force-per-something*: per unit mass for gravity, per unit charge for electric, per unit \"magnetic test object\" for magnetic. It abstracts the source away — you only care that, at this point in space, an appropriate test object would feel a force.", "source": "Opus 4.7 ①", "_id": "opus_1_8"}, {"question": "If you cut a bar magnet in half, do you get a separate N pole and a separate S pole? Explain. (2 steps)", "answer": "- Step 1: No — you get *two complete smaller magnets*, each with its own N and S pole. Magnetic monopoles (isolated N or isolated S) have never been observed in nature.\n- Step 2: The deep reason (university-level, not examinable here): magnetism arises from aligned electron spins / aligned magnetic domains inside the material. Each domain is itself a tiny dipole with both N and S. Cut the material anywhere, and you simply expose new \"ends\" of the same internal alignment — you can never isolate one pole.\n\nTakeaway: poles always come in pairs; cutting just makes more pairs.", "source": "Opus 4.7 ②", "_id": "opus_2_10"}, {"question": "Why is \"magnetic flux density\" called *density* — what is it the density of?", "answer": "It's the density of **magnetic flux lines** (field lines) passing through a unit area perpendicular to the field. Geometrically: imagine a small square frame oriented perpendicular to the field. Count how many field lines thread through it per unit area — that's $$B$$. High $$B$$ = many lines per unit area (crowded lines on a diagram); low $$B$$ = few lines per unit area (spread-out lines). This is why \"closer lines = stronger field\" — the line-spacing rule on a diagram is literally a visualisation of the *density* concept built into the name.\n\nTakeaway: $$B$$ = how densely field lines are packed; the name is geometrically literal.", "source": "Opus 4.7 ②", "_id": "opus_2_53"}, {"question": "What two pieces of information does a plotting compass give you about a magnetic field that iron filings cannot? Why is this advantage important? (2 steps)", "answer": "- Step 1: A plotting compass gives you both **shape** (the curved path of the lines) and **direction** (which way the arrows go, i.e. which pole is N and which is S). The compass needle is a tiny magnet that rotates to align with the field, so it physically shows you the direction at each point.\n- Step 2: Iron filings show **shape only** (and relative strength, by how much they bunch). They line up along the field lines but have no built-in directional indicator — you cannot tell which end of a filing corresponds to N vs S. You cannot distinguish the magnet's N pole from its S pole using filings alone.\n\n+ Exam-favourite question: \"What can iron filings not tell you about a magnetic field?\" Answer: **the direction / which pole is N or S.**\n\nTakeaway: compass = shape + direction; filings = shape only (no direction).", "source": "GLM 5.1 ②", "_id": "glm_2_18"}, {"question": "Why does inserting a soft-iron core inside a solenoid dramatically increase its magnetic field strength? What property of iron makes this possible, and why must it be *soft* iron? (3 steps)", "answer": "- Step 1: Iron is a **magnetic material** — its internal domains can be aligned by an external field. When the solenoid's field passes through the iron core, the domains align, making the core itself an **induced magnet**. The core's own field then adds to the solenoid's field, greatly amplifying the total.\n- Step 2: The iron core also **channels and concentrates** the field lines. Without a core, many field lines loop through the air outside the coil (a low-permeability medium). The iron has high magnetic permeability, meaning it \"conducts\" magnetic flux efficiently — the lines prefer to travel through the iron, packing more flux into the core region.\n- Step 3: The core must be **soft iron** (magnetically soft) so that when the current is switched off, the core's domains randomise quickly and the electromagnet loses its magnetism. A hard material (like steel) would retain residual magnetism, preventing the electromagnet from fully switching off.\n\nTakeaway: soft-iron core = induced magnet + flux concentrator + quick release when off.", "source": "GLM 5.1 ②", "_id": "glm_2_30"}, {"question": "Inside a solenoid, what does the magnetic field look like, and why is this different from what you see outside a bar magnet?", "answer": "Inside a solenoid, the field is **strong, roughly uniform, and runs from S to N** (the opposite direction to the external field, because the field lines must form closed loops). The lines are straight and tightly packed along the central axis. This is the same internal structure a permanent bar magnet has — we just can't see inside the bar magnet. The solenoid makes the \"hidden\" interior field accessible, which is one reason it's the workhorse geometry for producing controlled, uniform B-fields in laboratory setups.\n\nTakeaway: inside any magnet (bar or solenoid), field runs S→N; outside, N→S. The lines form complete loops.", "source": "Opus 4.7 ②", "_id": "opus_2_23"}, {"question": "Why does winding a current-carrying wire into a tightly-packed coil (\"solenoid\") produce a much stronger field along the axis than a single straight wire? (3 steps)", "answer": "- Step 1: A single straight wire produces field circles around itself. Inside any one loop of wire, those circles all point through the loop in the *same* axial direction (by the right-hand grip rule applied to each segment of the loop).\n- Step 2: Stacking many loops side by side (a solenoid) means each loop contributes its own axial field at the centre — these contributions add up because they're all in the same direction inside.\n- Step 3: The result is a strong, roughly uniform field running along the inside of the solenoid, while outside the field resembles that of a bar magnet (lines leaving one end, looping round, entering the other).\n\nThis is why \"more coils\" is one of the three Cs for stronger electromagnets.", "source": "Opus 4.7 ①", "_id": "opus_1_19"}, {"question": "In the Magneto film clip, missiles are stopped and redirected mid-flight using a magnetic field. What aspects of this could be physically plausible, and what is the giveaway that makes it definitely unrealistic for a simple magnet? (3 steps)", "answer": "- Step 1: What *could* be true: a very strong magnetic field could exert a force on the missiles, provided the missiles contain **magnetic materials** (iron/steel in their structure). A magnet attracting a magnetic metal is real physics. So there could be some magnetic interaction — that part is not impossible.\n- Step 2: What is **definitely false**: a simple magnet always **attracts** magnetic materials — it pulls them straight in towards itself. In the film, Magneto makes the missiles hover, steer in arbitrary directions, and change course — this implies the field can push as well as pull in controlled directions, which a single static magnet cannot do. A magnet doesn't \"repel\" a piece of iron (unless you orient a like pole towards another magnet's pole, but a lump of iron isn't a magnet with a defined pole).\n- Step 3: The safe, exam-ready language: say the objects **\"interact\"** (there is a force) rather than committing to \"attract\" or \"repel\" when you're uncertain. Alex flagged \"interact\" as \"a word we're going to use a lot\" — it's always safe because it just means \"a force exists,\" without specifying direction.\n\nTakeaway: a magnet attracts magnetic metals (pull in) — it cannot steer them in arbitrary directions. When unsure, say \"interact\" (force exists) rather than guessing attract/repel.", "source": "GLM 5.1 ③", "_id": "glm_3_25"}, {"question": "After the car stops driving, the positive charge remains on it. Why can't the charge drain away through the tyres, and what single word describes the property of rubber that causes this? (2 steps)", "answer": "- Step 1: Rubber is an **insulator** — a material that does not allow charge to flow through it. Electrons cannot travel through the rubber tyres to reach the ground, so the excess positive charge (electron deficit) is trapped on the car body.\n- Step 2: The key word is **insulator**. Insulators trap charge because their electrons are tightly bound to their atoms and cannot move freely. This is the opposite of a conductor (like metal), where electrons flow easily.\n\nTakeaway: insulators = charge traps; conductors = charge highways.", "source": "GLM 5.1 ②", "_id": "glm_2_3"}, {"question": "Why does rubbing two insulators together leave one positive and one negative, rather than creating new charge?", "answer": "Charge is never created — only electrons get transferred. Protons are locked inside the nucleus and cannot move between everyday objects, so the only way to \"charge\" something is to move electrons. When two insulators rub, friction strips electrons from one surface and deposits them on the other. The one that **loses** electrons is left with more protons than electrons → net **positive**. The one that **gains** electrons has more electrons than protons → net **negative**. The total charge of the system is unchanged — it's just been redistributed.", "source": "Opus 4.7 ①", "_id": "opus_1_0"}, {"question": "What is the difference between a conductor and an insulator in terms of why charge \"stays\" or \"leaks away\"?", "answer": "A **conductor** (most metals) has free electrons that can drift through the material — so any excess charge placed on it can flow away to earth or redistribute. An **insulator** (rubber, plastic, dry air, wood) has no free charges; electrons are tightly bound to their atoms, so excess charge is trapped where it was deposited. This is why a charged plastic rod stays charged for ages, but a charged metal sphere would discharge instantly if you held it in your bare hand (you'd be the conducting path to earth).", "source": "Opus 4.7 ①", "_id": "opus_1_2"}, {"question": "A student traces a field line using a plotting compass near a bar magnet. She places the compass, marks where the N end points, then moves the compass tail to that dot and marks the new N-end position. Why must she move the *tail* (the S end) to the previous dot, not the N end? (2 steps)", "answer": "- Step 1: The compass needle's **N (red) end** points along the field direction — it shows where the field line goes next. The **tail (S end)** is where the field line has just come from. When you move the compass, you want to continue the line from where you last measured — so you place the **tail** on the previous dot, positioning the compass so it \"reads\" the field direction starting from that point.\n- Step 2: If you placed the N end on the previous dot instead, the compass would be oriented backwards — the N end would be forced to sit at a point where it was previously pointing *away* from, and the new reading would trace the field line in the wrong direction or jump to a different line. The method requires the tail on the old dot so the N end can swing freely to indicate the next point on the *same* line, extending it forward.\n\nTakeaway: tail on old dot, N end swings to show the next dot. This ensures you continue the same line in the correct direction.", "source": "GLM 5.1 ③", "_id": "glm_3_37"}, {"question": "Outside a bar magnet, magnetic field lines have arrows on them. Which direction do these arrows point, and what does this direction represent physically? (2 steps)", "answer": "- Step 1: The arrows point from **North (N) to South (S)** — this is the *external* direction. Inside the magnet (not usually drawn), the lines continue from S back to N, completing the loop.\n- Step 2: The N→S direction represents \"the direction a free North pole would be pushed.\" If you could isolate a tiny North pole and place it in the field, it would accelerate along the arrow direction (towards S). A compass needle's red (N) end aligns with this direction — it points along the field line towards the magnet's S pole.\n\n+ Common trap: students often reverse this to S→N. Remember: outside the magnet, it's always N→S.\n\nTakeaway: arrows show where a N-pole would go; outside = N to S.", "source": "GLM 5.1 ②", "_id": "glm_2_11"}, {"question": "You're told a bar magnet's field is strongest at the poles. From a \"where do the lines come from\" perspective, why does this make sense? (2 steps)", "answer": "- Step 1: Field lines emerge from the N pole and re-enter at the S pole — they all start and end at the poles. So the lines are most densely concentrated *right at* the ends, where they're all gathered together before fanning out into space.\n- Step 2: As lines move away from a pole, they spread out across a wider area to loop around to the other pole. Spread-out lines = weaker field. Concentrated lines (at the poles) = strong field. This is a direct visual consequence of the rule \"closer lines = stronger field.\"\n\nTakeaway: poles act as \"sources/sinks\" of lines, hence maximum bunching, hence maximum field strength.", "source": "Opus 4.7 ②", "_id": "opus_2_44"}, {"question": "Why is the statement \"protons transferred from the cloth to the rod\" always wrong in electrostatics explanations, even if the rod ends up positively charged? (2 steps)", "answer": "- Step 1: **Protons are locked inside atomic nuclei** — they are bound by the strong nuclear force and cannot leave the nucleus under any ordinary electrostatic process (rubbing, touching, earthing). Only **electrons**, which orbit outside the nucleus and are relatively loosely bound, can move between objects in everyday situations.\n- Step 2: When an object becomes positively charged, it has **lost electrons** (fewer negatives to balance the protons), not gained protons. The proton count stays exactly the same — it's the electron count that changes. So \"protons transferred\" is always the wrong explanation; the correct one is \"electrons transferred away from the object, leaving it with an excess of protons.\"\n\nTakeaway: positive charge = lost electrons, never gained protons. Protons don't move in electrostatics — only electrons transfer.", "source": "GLM 5.1 ③", "_id": "glm_3_49"}, {"question": "A bar magnet is brought close to a copper coin and to a steel coin. What happens in each case, and why?", "answer": "The **steel coin** is attracted — steel is iron-based and is one of the four magnetic materials, so its domains can be aligned by the magnet's field, induced magnetism develops, and opposite poles attract. The **copper coin** experiences essentially no force (in this static situation). Copper is not in the magnetic-material list — its electron configuration doesn't support permanent domain alignment, so no induced magnetism occurs. The lesson: only iron, steel, nickel, cobalt respond to a magnet by ordinary attraction. Everything else just sits there, no matter how strong the magnet is.", "source": "Opus 4.7 ①", "_id": "opus_1_41"}, {"question": "A student reasons: \"The Earth's geographic North Pole must be a magnetic North Pole because that's where the compass points.\" Identify the logical error and explain the correct magnetic identity of that location. (2 steps)", "answer": "- Step 1: The error is assuming that \"where the compass points\" must be the same magnetic polarity as the compass's pointing end. The compass's red end is a **magnetic North pole**. By the fundamental rule \"opposite poles attract,\" a North pole is attracted to a **South pole**. So the compass's N end points towards whatever magnetic pole is at that location — which must be a **South pole**.\n- Step 2: The correct identity: the location near the geographic North Pole is a **magnetic South pole**. The Earth's internal \"bar magnet\" is oriented with its South end pointing roughly towards geographic North. This is why the compass's N end points there — it is attracted to that magnetic South. The naming of \"geographic North\" is a human convention unrelated to magnetic polarity.\n\n+ The student's error is the same type as \"conventional current flows the way positive charge would move\" — a naming convention that contradicts the underlying physics if you don't think carefully.\n\nTakeaway: compass N end → attracted to magnetic S pole → geographic North = magnetic South.", "source": "GLM 5.1 ②", "_id": "glm_2_55"}, {"question": "In the Magneto (X-Men) film clip, Magneto appears to stop and steer missiles mid-flight using his magnetic powers. What aspect of this is *physically plausible*, and what aspect is *definitely false* about how real magnets behave? (3 steps)", "answer": "- Step 1: What is **plausible**: missiles contain steel/iron (magnetic materials), so a sufficiently strong magnetic field *could* exert a force on them. A real magnet would attract the magnetic metal in the missile — pulling it towards the magnet. So \"a magnetic interaction exists\" is physically possible.\n- Step 2: What is **definitely false**: in the film, Magneto makes the missiles hover and steer in arbitrary directions (turning, stopping, reversing). A simple magnet can only **attract** magnetic material (pull it straight in towards the magnet). It cannot levitate, steer, or push objects in multiple directions at will. Real magnetic forces on a passive magnetic object are always attractive (towards the field source), not arbitrarily directional.\n- Step 3: The correct neutral description: Magneto's field causes the metal to **interact** (there is a force). You can safely say \"the field exerts a force on the magnetic material in the missiles.\" You cannot safely say \"the field attracts the missiles in all directions\" — that exceeds what a real magnet does.\n\nTakeaway: real magnets attract magnetic materials; they cannot steer them like remote-control vehicles.", "source": "GLM 5.1 ②", "_id": "glm_2_37"}, {"question": "What is the difference between \"magnetic flux density\" and \"magnetic field strength\" in the context of this chapter? Are they the same quantity or different quantities? (1 step)", "answer": "- Step 1: In the context of this IAL chapter, **magnetic flux density and magnetic field strength are the same quantity**, both represented by the symbol $$B$$ and both measured in tesla. They are two names for the same thing: how closely packed the magnetic field lines are, i.e. how strong the field is per unit area. The term \"flux density\" emphasises the \"lines per area\" interpretation; \"field strength\" emphasises the \"how much force\" interpretation. In more advanced physics (university level), these terms can refer to different quantities ($$B$$ vs $$H$$), but at A-level they are treated as synonymous.\n\n+ The data booklet and specification use $$B$$ for both names interchangeably.\n\nTakeaway: at this level, flux density = field strength = $$B$$ = tesla. Same thing, two names.", "source": "GLM 5.1 ②", "_id": "glm_2_61"}, {"question": "Two field lines are drawn crossing at a point on a student's diagram. Why is this physically impossible, and what would it mean if it could happen? (2 steps)", "answer": "- Step 1: Field lines **never cross**. This is a fundamental rule. The reason: at any point in space, the magnetic field has exactly **one direction** — the field vector $$\\vec{B}$$ points one way. If two lines crossed, there would be two different directions at the same point, meaning the field would be pushing a N pole in two different directions simultaneously, which is impossible.\n- Step 2: If crossing were possible (it isn't), it would imply that a charged particle or a N pole at that point would feel two forces in different directions — the net force would be ambiguous, and the field wouldn't have a well-defined direction. Since a field is defined by the force it produces, and force has a unique direction at any point, crossing lines contradict the definition of a field.\n+ A \"neutral point\" (where the field is zero) is different from a crossing point. At a neutral point, the fields from two sources cancel to zero — there are no lines there at all (you mark it with a cross ×, meaning \"no field\"), not lines that cross.\n\nTakeaway: one point = one field direction = no crossing lines. A neutral point has zero field, not two crossing fields.", "source": "GLM 5.1 ③", "_id": "glm_3_8"}, {"question": "Why does a charged car sitting on rubber tyres stay charged, but a charged car with a metal strap touching the ground does not? (3 steps)", "answer": "- Step 1: Rubber is an *insulator* — its electrons are tightly bound and cannot drift through the material. So excess charge trapped on the car body has no conducting path through the tyres to the ground.\n- Step 2: A metal strap is a *conductor* — it contains free electrons that can flow easily. It connects the car body directly to the Earth (a huge reservoir of charge).\n- Step 3: Excess electrons (or, if positive, electrons flowing the other way to neutralise) drain through the strap into the ground. The car is continuously *earthed* and cannot accumulate charge.\n\nTakeaway: charge \"stays\" or \"leaves\" purely depending on whether there's a conducting path to earth.", "source": "Opus 4.7 ②", "_id": "opus_2_3"}, {"question": "If you cut a bar magnet exactly in half, do you get a separate N piece and a separate S piece? Explain what you actually get and the deeper reason why. (3 steps)", "answer": "- Step 1: You do **not** get a lone N pole or a lone S pole. Each half becomes a **complete, smaller magnet** with its own N end and S end. The cut face that was previously inside the magnet becomes a new pole — if you cut through the middle, the face near the original N becomes a new S, and the face near the original S becomes a new N.\n- Step 2: You can keep cutting and you will never isolate a single pole. This is because **magnetic monopoles do not exist** (as far as all known physics tells us). Magnetism always comes in N-S pairs — it is a *dipole* phenomenon.\n- Step 3: The deeper (university-level) reason that Alex showed then crossed out: magnetism in materials comes from **aligned electron spins** forming domains. Each electron's magnetic behaviour is itself a tiny dipole — it has both a N and S aspect. Since the source of magnetism is already dipolar at the microscopic level, you can never \"cut down\" to a single pole. Even a single electron is a dipole. This is not examinable at GCSE/ESAT/A-level, but it explains *why* the result is inevitable.\n\nTakeaway: cut a magnet → two smaller magnets, never a lone pole. Magnetic monopoles don't exist because the source (electron spins) is inherently dipolar.", "source": "GLM 5.1 ③", "_id": "glm_3_9"}, {"question": "Why does Alex describe both \"conventional current\" and \"Earth's north\" as sign-convention traps, and what's the actual rule for each?", "answer": "Both are historical naming conventions that don't match the underlying physics. **Conventional current** is defined as the direction *positive* charge would flow — but the actual carriers in metals are electrons (negative), which move the *opposite* way. So current direction is **opposite to electron flow**. **Earth's \"north\"** is a geographic label, but magnetically that location is a **south** pole (which is why your compass's N end is drawn to it). The lesson: when answering a question, always translate the label into the actual physical polarity or carrier — don't trust the name alone.", "source": "Opus 4.7 ①", "_id": "opus_1_17"}, {"question": "A student claims they cut a bar magnet in half and now has a separate N pole and S pole, one in each piece. Why is this impossible? (2 steps)", "answer": "- Step 1: Cutting a magnet doesn't separate its poles — each piece becomes a *complete smaller magnet* with its own N and S poles. The \"N face\" piece grows a new S pole on the freshly-cut end, and vice versa.\n- Step 2: The deep reason: magnetism in materials arises from many tiny aligned dipoles (electron spins or magnetic domains) inside, each of which is itself a complete N-S pair. There's no \"isolated N pole atom\" that you can liberate by cutting. This is in stark contrast to electric charges, where positive and negative *can* be separated. Magnetic monopoles have never been observed in nature, despite extensive searches.\n\nTakeaway: magnetic poles always come in pairs; no amount of cutting separates them.", "source": "Opus 4.7 ②", "_id": "opus_2_48"}, {"question": "In the movie Magneto (X-Men), the villain stops missiles using magnetic force. What aspects of this are physically possible, and what is definitely false? (2 steps)", "answer": "- Step 1: **Possibly true**: The missiles contain magnetic materials (iron/steel), so a strong magnetic field could exert a force on them — they would be attracted to the magnet.\n- Step 2: **Definitely false**: A real magnet would simply pull the metal objects straight in (attract). In the film, the objects hover and steer in controlled directions, which no simple magnet can do. Real magnetism cannot make metal objects \"hover\" at a distance or be steered precisely like that.\n+ Alex's coaching tip: when unsure, say objects \"interact\" rather than guessing \"attract\" or \"repel\" — it's always safe to say there is a force.", "source": "MiniMax ②", "_id": "minimax_2_17"}, {"question": "Why must you use the *right* hand (not the left) for the grip rule around a current-carrying wire?", "answer": "It's a convention tied to how we define current direction (positive charge flow). The right hand encodes the physical reality that the magnetic field circulates in a specific rotational sense determined by the current direction — a consequence of how the laws of electromagnetism (ultimately Ampère's law) are written. Using the left hand would describe a field circulating the opposite way, which doesn't match experiment. The left hand is reserved for a *different* rule (Fleming's left-hand rule for force on a current in a field), so keeping them on separate hands prevents confusion.", "source": "Opus 4.7 ②", "_id": "opus_2_19"}, {"question": "If you cut a bar magnet perfectly in half, do you get an isolated North pole and an isolated South pole? Explain what actually happens and the deep physical reason why. (3 steps)", "answer": "- Step 1: You do not get isolated poles. Each half becomes a complete, smaller bar magnet with its own North and South poles.\n- Step 2: The new South pole forms on the cut face of the original North half, and the new North pole forms on the cut face of the original South half.\n- Step 3: The deep physical reason is that magnetism comes from aligned electron spins and domains *inside* the material, not from \"piles\" of North or South stuff at the ends. Because every electron acts like a tiny magnet with both poles, you can never isolate a single pole; cutting the material just creates two new arrangements of these microscopic magnets.\n\nTakeaway: Magnetic monopoles cannot be created by cutting a magnet; poles always come in pairs.", "source": "GLM 5.1 ①", "_id": "glm_1_6"}, {"question": "On a field-line diagram, how do you visually determine where the magnetic field is strongest, and what physical reason causes the lines to bunch up there? (2 steps)", "answer": "- Step 1: The rule is: **closer lines = stronger field; farther apart lines = weaker field**. Where the lines are most densely packed (most lines per unit area), the field is strongest. For a bar magnet, the lines bunch up at the two poles (the ends) — so the field is strongest at the ends.\n- Step 2: The physical reason: field lines represent the *density* of the magnetic flux. Near the poles, the magnet is producing the most concentrated flux — all the lines emerge from a small area at the N end and converge into a small area at the S end. In the middle of the magnet's side, the lines are spread over a much larger area, so the field is weaker there. Think of it like water flow: if the same amount of water passes through a narrow pipe, the flow speed (intensity) is higher; if it spreads into a wide channel, the flow speed drops.\n\nTakeaway: line spacing is a visual code for field strength — dense = strong, sparse = weak.", "source": "GLM 5.1 ③", "_id": "glm_3_6"}, {"question": "Two electrons are placed close to one another in a vacuum. What do they do, and why?", "answer": "They **repel** each other. Both electrons carry negative charge, and like charges repel — a fundamental property of the electromagnetic interaction. The Coulomb force pushes them apart along the line joining them. (A common slip is to say \"attract\" because they're \"the same\" — but in electromagnetism, \"the same\" means \"the same sign of charge\", which means repulsion. Only **opposite** signs attract.)", "source": "Opus 4.7 ①", "_id": "opus_1_48"}, {"question": "In the Magneto X-Men clip, what's physically *possible* and what's the giveaway that it's not realistic? (2 steps)", "answer": "- Step 1: **Plausible parts**: there is clearly a very strong magnetic field involved, and the missiles do contain magnetic material (iron/steel), so a magnetic force on them is at least conceivable.\n- Step 2: **The giveaway**: a real magnetic field simply *attracts* magnetic objects toward higher field — it can't make them hover stationary, steer left and right, and reverse direction on command. Real magnetic interactions follow the field geometry; you'd see the missiles snap straight to the magnet's pole, not perform aerial choreography.\n\nThis is a model of an \"apply what you know\" question: list what's consistent with physics, then identify the specific behaviour that violates it.", "source": "Opus 4.7 ①", "_id": "opus_1_26"}, {"question": "The lesson covered two different \"hand rules\": the right-hand grip rule (this lesson) and Fleming's left-hand rule (next lesson). What does each rule determine, and why is it critical not to mix up which hand to use? (3 steps)", "answer": "- Step 1: The **right-hand grip rule** determines the **direction of the magnetic field** created by a current. Thumb = current direction; curled fingers = field direction around the wire/solenoid. This rule answers: \"if I send current this way, which way does the field circle?\"\n- Step 2: **Fleming's left-hand rule** (next lesson) determines the **direction of the force** on a current-carrying wire (or moving charge) that is already inside an external magnetic field. First finger = field direction ($$B$$); second finger = current direction ($$I$$); thumb = force direction ($$F$$). This rule answers: \"if a wire with current sits in a field, which way is it pushed?\"\n- Step 3: These are **completely different physical questions** — one asks about the field a current *creates*, the other asks about the force a current *experiences* in an existing field. Using the wrong hand gives the wrong answer to the wrong question. The right hand is for *creating* the field; the left hand is for *feeling* the force. This is trap #8 from the lesson: \"right hand for field, left hand for force.\"\n\nTakeaway: right-hand grip = field from current (creation); Fleming's left-hand = force on current in field (effect). Different hands, different questions — never swap them.", "source": "GLM 5.1 ③", "_id": "glm_3_42"}, {"question": "A student mixes up the two hand rules: they use the LEFT hand for the field around a wire, and the RIGHT hand for the force on the wire. What should each hand actually be used for, and what quantity does each rule determine? (2 steps)", "answer": "- Step 1: The **RIGHT-hand grip rule** is for the **magnetic field direction around a current-carrying wire or solenoid**. Thumb = current direction; curled fingers = field direction. This rule tells you *which way the field circles*.\n- Step 2: The **LEFT-hand rule (Fleming's)** is for the **force direction on a current-carrying wire in an external magnetic field** (the motor effect). First finger = field ($$B$$); second finger = current ($$I$$); thumb = force ($$F$$). This rule tells you *which way the wire is pushed*.\n\n+ The two rules answer different physical questions: right hand = \"what field does the current create?\" Left hand = \"what force does an existing field exert on the current?\" Different hands, different jobs.\n\nTakeaway: RIGHT hand = field from current; LEFT hand = force on current. Never swap them.", "source": "GLM 5.1 ②", "_id": "glm_2_51"}, {"question": "Why is it physically meaningful to call a region with \"evenly spaced parallel field lines\" uniform, in terms of what a test object would experience?", "answer": "\"Uniform\" means the field has the same magnitude and direction everywhere in the region. Parallel lines guarantee the **direction** is the same at every point (all lines point the same way). Equal spacing guarantees the **magnitude** is the same at every point (line density = field strength, so constant density = constant strength). Together, this means a magnetic test object placed anywhere in the uniform region would feel the same force, in the same direction. That's the practical importance: uniformity lets us write simple force equations like $$F = BIL$$ without worrying about how $$B$$ varies through the region.", "source": "Opus 4.7 ①", "_id": "opus_1_45"}, {"question": "Why is the magnetic field around a single straight current-carrying wire described as a \"field\" rather than just \"a force on the wire\"?", "answer": "Because the magnetic effect exists *throughout the region of space around the wire*, not just at the wire itself. If you place a compass anywhere near the wire, it deflects; place a second current-carrying wire nearby and it experiences a force; place a moving charge nearby and it gets deflected. The wire creates a region in which any magnetic material or moving charge feels a force — that's the *definition* of a field. The field is the underlying physical reality; the force on any specific test object is just one local manifestation of it.\n\nTakeaway: a field is the persistent property of space created by a source; forces are what test objects experience in that field.", "source": "Opus 4.7 ②", "_id": "opus_2_50"}, {"question": "Why is it impossible for a charged car to lose its charge through the road via the rubber tyres?", "answer": "Rubber is an **insulator** — its electrons are tightly bound and cannot flow through the material. So even though the tyres physically touch the road (which itself isn't always a great conductor either, but ignore that), there's no conducting path through which electrons can drain from the car body to the Earth. The charge is trapped on the car. This is precisely the reason aircraft and fuel trucks use earthing straps — without them, accumulated static charge can spark and ignite fuel.", "source": "Opus 4.7 ②", "_id": "opus_2_31"}, {"question": "Adding a soft iron core dramatically increases an electromagnet's strength. Conceptually, how does the core \"channel\" the field to achieve this? (2 steps)", "answer": "- Step 1: Iron is a highly magnetically permeable material, meaning it is much easier for magnetic field lines to travel through iron than through air.\n- Step 2: When placed inside the coil, the iron core becomes an induced magnet. It provides a low-resistance path that draws the existing field lines into and through the core, concentrating them densely inside the material rather than letting them spread out weakly into the air. This dense concentration of lines means a much stronger field.\n\nTakeaway: The core acts as a \"shortcut\" for field lines, concentrating them into a small space.", "source": "GLM 5.1 ①", "_id": "glm_1_21"}, {"question": "What's the difference between the *right*-hand grip rule (today's topic) and *Fleming's left*-hand rule (next lesson) — what does each tell you?", "answer": "The **right-hand grip rule** tells you about the **field** *produced by* a current-carrying wire: thumb along the current, curled fingers give the circular field direction around the wire. The **left-hand rule** (Fleming's) tells you about the **force** *experienced by* a current-carrying wire that has been placed in an external magnetic field: first finger = field, second finger = current, thumb = force/motion. They're two different rules for two different physical situations: one is \"current → makes field\"; the other is \"current in a field → feels force\". Different hands, different questions.", "source": "Opus 4.7 ①", "_id": "opus_1_32"}, {"question": "Two field lines from the same magnet appear to cross at a point on a diagram. Why is this physically impossible?", "answer": "At any point in space the magnetic field has a single, definite direction — namely, the direction a free N pole would feel a force. A field line at that point is drawn tangent to that direction. If two field lines crossed, then at the crossing point the field would have to point in two different directions simultaneously, which is meaningless. So whenever you see crossing field lines on a student's diagram, it's a drawing error — the lines should curve smoothly past each other or merge into one.", "source": "Opus 4.7 ①", "_id": "opus_1_28"}, {"question": "You cut a bar magnet exactly in half. A student says you now have a separate North piece and a separate South piece. Is this correct? Explain what you actually get and the deeper reason why. (3 steps)", "answer": "- Step 1: The student is **incorrect**. Cutting a bar magnet in half does *not* give you an isolated N pole and an isolated S pole. You get **two complete, smaller bar magnets**, each with its own N end and S end.\n- Step 2: The new N–S boundary appears at the cut surface. The half that originally held the N end still has that N end, but its new cut face becomes a S end. The other half similarly gets a new N end at its cut face. So each piece is N–S, just shorter.\n- Step 3: The deeper reason (university-level, for intuition only): magnetism comes from **aligned electron spins / aligned magnetic domains** inside the material. The domains are distributed throughout the volume, not concentrated at the ends. Cutting the material doesn't destroy the domains — each half still contains aligned domains, so each half is still a complete magnet. Magnetic monopoles (isolated N or S) have never been observed in nature.\n\n+ Exam note: don't write the domain explanation in a GCSE/ESAT answer — just state \"each half is a complete magnet with both poles.\"\n\nTakeaway: you can never isolate a single pole; poles always come in N–S pairs.", "source": "GLM 5.1 ②", "_id": "glm_2_15"}, {"question": "Why can an electromagnet be \"switched off\" while a permanent magnet cannot? Link your answer to magnetically hard vs soft materials and the role of current. (3 steps)", "answer": "- Step 1: An electromagnet's field comes from two sources: the **current in the coil** (the primary source) and the **induced magnetism in the soft-iron core** (the amplifier). When you cut the current, the coil's field disappears instantly.\n- Step 2: The core is made of **magnetically soft iron**, which loses its induced magnetism almost immediately once the coil's field vanishes. The domains randomise quickly because soft materials don't hold alignment. So the total field drops to essentially zero.\n- Step 3: A permanent magnet is made of **magnetically hard** material (e.g. steel). Its domains were aligned during manufacturing and are locked in place by the hard material's resistance to randomisation. No current is needed to maintain alignment — the magnetism is \"baked in.\" You cannot conveniently switch it off.\n\n+ If you used a steel core in an electromagnet, it would retain residual magnetism after switching off — partially \"stuck.\" That's why soft iron is essential.\n\nTakeaway: electromagnet off = no current + soft core releases; permanent magnet = hard material, always locked.", "source": "GLM 5.1 ②", "_id": "glm_2_41"}, {"question": "Give the textbook definition of a magnetic field (the exact phrasing). What two categories of objects experience a force in such a field? (2 steps)", "answer": "- Step 1: A magnetic field is **\"a region in which a magnetic material, or a moving charged object, feels a force.\"** This is the specification wording. The key idea: a field is defined by what it *does* — it exerts a force on specific objects placed within it.\n- Step 2: The two categories are:\n+ **Magnetic materials** (iron, steel, nickel, cobalt) — they feel a force even if stationary.\n+ **Moving charged objects** — a charge must be *moving* (or a current must be flowing) to feel a magnetic force. A stationary charge in a magnetic field feels zero magnetic force.\n\nTakeaway: a field is a force region; magnetic materials and moving charges are the two \"test objects.\"", "source": "GLM 5.1 ②", "_id": "glm_2_10"}, {"question": "A solenoid with a soft-iron core is switched on, used to pick up a steel ball, then switched off. Why does the steel ball fall off — but a magnetically *hard* steel ball might keep clinging slightly even after switch-off? (2 steps)", "answer": "- Step 1: While current flows, the solenoid magnetises the soft-iron core, which in turn induces magnetism in the steel ball — the ball becomes a temporary magnet attracted to the core. Switching off cuts the current, the core's induced field collapses almost instantly (because soft iron is magnetically soft), and the ball — having lost the field that was magnetising it — also demagnetises and falls.\n- Step 2: If the steel ball happens to be a *hardened* steel (magnetically hard), some of the alignment induced during the \"on\" phase can be retained — leaving the ball weakly magnetised after switch-off. It could then weakly stick to the (now also slightly residually magnetised) core. This is why real lifting electromagnets use specifically *soft* iron — to ensure clean release.", "source": "Opus 4.7 ①", "_id": "opus_1_49"}, {"question": "Why is it conceptually wrong to say \"the magnet's field exerts a force on all metals\"?", "answer": "The word \"metals\" is too broad. A magnetic field exerts a force only on **magnetic materials** — and only iron, steel, nickel and cobalt qualify among common metals. Copper, aluminium, silver, gold, lead, zinc — all metals — are essentially non-magnetic and feel no significant force from a static magnet. The trap is conflating \"shiny, conductive metal\" with \"magnetic\": magnetism and electrical conductivity are different properties driven by different aspects of electron behaviour. (A current-carrying wire of *any* metal, however, will feel a force in a field — but that's the motor effect, a different mechanism involving moving charge.)", "source": "Opus 4.7 ①", "_id": "opus_1_42"}, {"question": "Inside a solenoid, the magnetic field runs in a specific direction from one end to the other. Which direction is it (S→N or N→S), and why is this the opposite of the external direction? (2 steps)", "answer": "- Step 1: Inside the solenoid, the field runs from **S to N** — from the South-pole end towards the North-pole end. This is the *internal* direction, completing the loop that externally runs N→S.\n- Step 2: Magnetic field lines always form **closed loops** — they never start or stop. Externally, lines leave N and travel to S. To close the loop, they must continue through the interior from S back to N. A permanent bar magnet has the same internal S→N field; we just can't see inside the solid iron. The solenoid's hollow core lets us observe this directly.\n\n+ The interior field is also **strong and nearly uniform** (straight, parallel lines) — much more uniform than a bar magnet's internal field, which is distorted by the iron's domain structure.\n\nTakeaway: external = N→S; internal = S→N; lines always loop.", "source": "GLM 5.1 ②", "_id": "glm_2_33"}, {"question": "What's the conceptual difference between a \"magnetically hard\" and a \"magnetically soft\" material, and which is used for what?", "answer": "A **magnetically hard** material (e.g. steel) is one whose magnetic alignment is difficult to change — once magnetised, it holds onto that magnetisation. This makes it ideal for **permanent magnets** that should stay magnetised indefinitely. A **magnetically soft** material (e.g. iron, also nickel and cobalt) has alignment that's easily set up *and* easily lost. This makes it ideal for **electromagnet cores**, where you want the magnetism to switch on instantly when current flows and switch off instantly when current stops.\n\nOne-line memory: hard = holds on; soft = switches.", "source": "Opus 4.7 ①", "_id": "opus_1_6"}, {"question": "Compare a plotting compass and iron filings as tools for visualising a magnetic field — what does each show, and what's the key limitation of iron filings? (3 steps)", "answer": "- Step 1: A **plotting compass** is itself a tiny pivoted bar magnet. Its red/N end points along the field line (towards the nearest S pole). Moving it step by step, you can trace out both the *shape* of field lines and their *direction* (which way the arrows go).\n- Step 2: **Iron filings** sprinkled on paper over a magnet line up along the field. Where the filings bunch up densely, the field is strong; the overall pattern reveals the *shape* of the field.\n- Step 3: The critical limitation: iron filings show **shape only, not direction** — you can see the lines but not which way the arrows point (you can't tell N from S). To get direction, you still need a compass.\n\nTakeaway: compass = shape + direction; filings = shape only.", "source": "Opus 4.7 ②", "_id": "opus_2_11"}, {"question": "Why does a compass needle \"point north\" even though it's really pointing at a magnetic south pole? (3 steps)", "answer": "- Step 1: A compass needle is itself a small bar magnet; its N (red) end is attracted to a magnetic S pole — opposite poles attract.\n- Step 2: The Earth behaves like a giant bar magnet flipped upside down: the magnetic **south** pole sits near the geographic **North** Pole, and the magnetic north pole sits near the geographic South Pole.\n- Step 3: So when your compass's N end points \"north\", it is physically being attracted to the magnetic SOUTH pole that happens to live near the geographic North. The colloquial label \"points north\" refers to the geographic direction, not the magnetic polarity at the destination.\n\nThis is one of the classic \"physics names are misleading\" cases.", "source": "Opus 4.7 ①", "_id": "opus_1_16"}, {"question": "Why does Alex coach you to say two objects \"interact\" in a magnetic field rather than guessing \"attract\" or \"repel\"?", "answer": "The verb you use must match what's actually happening. A magnet can either **attract** (opposite poles, or a non-magnetised soft magnetic material being induced) or **repel** (like poles facing). If you can't tell from the diagram or scenario which case you're in — e.g. the Magneto film clip where missiles hover and steer in all directions, which is neither a clean attraction nor a clean repulsion — saying \"interact\" or \"there is a magnetic force\" is always physically correct because it just asserts that a force exists, without committing to its direction. It's a defensive verb that avoids a wrong guess while still showing you understand a force is involved.", "source": "Opus 4.7 ①", "_id": "opus_1_25"}, {"question": "Why is the word \"interact\" safer than \"attract\" when describing a magnetic force in an uncertain situation?", "answer": "Because magnets and magnetic materials can attract *or* repel depending on pole orientation. If you say \"the magnet attracts the metal\" you're committing to one specific outcome that may or may not be correct (e.g. like poles repel). Saying \"the magnet causes the metal to interact\" or \"exerts a force on\" is always true wherever a force exists, regardless of whether it's attractive or repulsive. This is Alex's coaching point — when uncertain about the direction of the force, use a verb that only commits to \"a force exists\" without specifying its sign.", "source": "Opus 4.7 ②", "_id": "opus_2_27"}, {"question": "When you sprinkle iron filings on paper above a bar magnet and tap, why do the filings line up along the field lines specifically (rather than, say, all gathering at the poles)? (2 steps)", "answer": "- Step 1: Each iron filing becomes a tiny induced magnet in the external field — it gets its own N and S poles aligned with the local field direction. Now it's a little bar magnet sitting in the field.\n- Step 2: A small magnet in a field experiences a torque that aligns it with the field direction (its N end pointing along the field). Tapping the paper momentarily breaks the friction holding each filing in place, letting it rotate until it aligns. Once aligned end-to-end with neighbours (N–S, N–S), they form chains along the field lines.\n\nSo filings reveal the *direction* of the field lines locally — but not which way along that line points N vs S, because each filing aligns with the line but doesn't tell you which end is which.", "source": "Opus 4.7 ①", "_id": "opus_1_50"}, {"question": "A neutral point (marked ×) appears in the field pattern between two bar magnets with like poles facing (N–N or S–S). What does \"neutral point\" mean in terms of the field strength and direction at that spot, and why does it occur exactly midway between equal magnets? (3 steps)", "answer": "- Step 1: A neutral point is a location where the **net magnetic field is zero** — the field strength $$B = 0$$ at that point. There is no force on any magnetic material or moving charge placed there (from these magnets). On a field diagram, you mark it with a cross (×) indicating \"no field lines pass through here.\"\n- Step 2: It occurs because the fields from the two magnets **cancel each other out** at that point. Each N pole pushes a test N pole away from itself; at the midpoint between two equal N poles, the push from the left equals the push from the right, and they are in opposite directions — so the net force (and net field) is zero.\n- Step 3: This is *different* from a point where field lines cross (which is impossible). At a neutral point, there are simply **no field lines at all** — the contributions from both sources sum to zero, so no line passes through. A crossing point would imply two non-zero fields pointing different ways at the same spot; a neutral point means the total field is zero.\n\nTakeaway: neutral point = $$B = 0$$ = fields cancel = no lines pass through. It's absence of field, not crossing of lines.", "source": "GLM 5.1 ③", "_id": "glm_3_29"}, {"question": "Why is it physically impossible for a single isolated North pole (a \"magnetic monopole\") to exist, based on what you know about where magnetism originates in materials? Give the intuitive explanation (not the exam answer). (2 steps)", "answer": "- Step 1: Magnetism in everyday materials originates from **aligned magnetic domains** — tiny regions where groups of electron spins are all pointing the same way. Each domain is like a microscopic bar magnet with both a N and S end. When many domains align throughout a piece of iron, their N ends all point one way and their S ends all point the other way, creating the macroscopic magnet's two poles.\n- Step 2: Because the domains are distributed **throughout the entire volume** of the material, not concentrated at the ends, you cannot separate \"the N part\" from \"the S part.\" Cutting the magnet just creates a new boundary where S appears on one face and N on the other — each half still contains domains with both polarities. A magnetic monopole would require all the \"N-ness\" to be in one place with no compensating \"S-ness,\" which the domain structure cannot produce.\n\n+ University-level note: classical electromagnetism (Maxwell's equations) also forbids monopoles mathematically ($$\\nabla \\cdot B = 0$$). No monopole has ever been observed experimentally.\n\nTakeaway: domains fill the whole volume → both poles always coexist → no isolated monopole.", "source": "GLM 5.1 ②", "_id": "glm_2_57"}, {"question": "Outside a bar magnet, field lines are drawn with arrows pointing from N to S. A common mistake is to reverse this. Conceptually, what does the arrow direction represent, and why must it go N→S rather than S→N? (3 steps)", "answer": "- Step 1: The arrow on a field line shows **the direction a free North pole would be pushed** if placed at that point. Since a N pole is repelled by the magnet's N end and attracted to the magnet's S end, the force on a free N pole points *away* from N and *towards* S — so the arrows run N→S outside the magnet.\n- Step 2: You can equivalently think of it as \"the direction a positive test object would move.\" This is the standard convention in all field diagrams (gravitational field lines point towards the mass, electric field lines point away from positive charge, magnetic field lines point away from N and towards S — always the direction of force on the \"test\" object).\n+ A free South pole would be pushed the opposite way (towards N, away from S), but we don't use S poles as the test object — the convention is fixed: field direction = force on a N pole / positive test.\n- Step 3: Inside the magnet, the field lines complete the loop and run S→N (from the S pole inside to the N pole inside), so the full loop is: out of N → through external space → into S → through interior → back to N. But for exam purposes, you almost always describe the *external* field, which is N→S.\n\nTakeaway: field arrows = force direction on a free N pole. A N pole is pushed *away* from N and *toward* S, hence N→S outside.", "source": "GLM 5.1 ③", "_id": "glm_3_5"}, {"question": "Why is the *internal* field of a solenoid roughly uniform, while the field of a single straight wire is not?", "answer": "A single straight wire produces concentric circular field lines that are crowded near the wire and spread out at distance — strength varies with position, so it's non-uniform. A solenoid is many loops stacked along an axis: inside, the contributions from all the loops add up in the *same direction* (along the axis), while contributions perpendicular to the axis from adjacent loops cancel. The result is that, away from the ends, the internal field has nearly the same magnitude and direction everywhere — approximately uniform. This is geometrically analogous to how stacking many small effects in superposition produces a smooth, large effect.\n\nTakeaway: superposition of many loops in a solenoid creates a uniform interior field.", "source": "Opus 4.7 ②", "_id": "opus_2_43"}, {"question": "A small bar magnet is placed inside a much larger uniform field. It rotates until it lines up with the field. Which way does it end up oriented — and why does this make sense from an energy standpoint? (3 steps)", "answer": "- Step 1: The small magnet aligns with its N end pointing along the field direction (i.e. towards a region where the field lines exit, or in the same direction as the field arrows).\n- Step 2: Mechanically: each pole feels a force — the N end is pushed along the field, the S end against the field. The two forces produce a torque that rotates the magnet until both poles lie along the field axis, with no further torque.\n- Step 3: Energetically: a magnetic dipole has lowest potential energy when aligned with the external field (parallel) and highest when antiparallel. Systems settle into minimum-energy configurations, so the magnet rotates to the parallel orientation and stays there.\n\nThis is exactly how a compass needle works — it's a small magnet finding the lowest-energy alignment with the local field.", "source": "Opus 4.7 ①", "_id": "opus_1_51"}, {"question": "A student claims that if you rub a plastic rod with cloth, you can transfer \"positive charge\" from the cloth to the rod. Explain why this wording is incorrect and what actually happens. (2 steps)", "answer": "- Step 1: **Protons never move** in everyday charging — they are locked in atomic nuclei. You cannot transfer \"positive charge\" because positive charge carriers (protons) cannot move through solids.\n- Step 2: What actually happens is that **electrons** transfer from one material to the other. If the rod ends up positive, it means it **lost electrons** (not gained positive charge). The cloth that gained those electrons becomes negatively charged.\n+ The wording \"positive charge moving\" is a common misconception. Always think in terms of electron transfer: lose electrons = become positive; gain electrons = become negative.", "source": "MiniMax ②", "_id": "minimax_2_30"}, {"question": "Iron filings sprinkled on paper above a magnet reveal the field's shape beautifully, yet they have a critical limitation compared to a plotting compass. What can iron filings never show, and why? (3 steps)", "answer": "- Step 1: Iron filings show **the shape of the field** (where the lines are, how they curve) and **where the field is strong** (filings bunch together where the field is strong, spread apart where it's weak). Each filing becomes a tiny induced magnet and aligns with the local field direction, so collectively they trace out the field pattern.\n- Step 2: The critical limitation: iron filings **cannot show the direction** of the field — you cannot tell which end is N and which is S from an iron-filing pattern alone. A filing aligns along the field line, but it doesn't have a marked N/S end, so you can't see which way the arrow should point. The filing could point either way along the line and still be aligned.\n- Step 3: To determine direction, you **must** use a plotting compass (which has a marked N/red end that shows the field direction). Examiners specifically ask \"what can iron filings not tell you?\" — the answer is always: **the direction / which pole is N or S**.\n\nTakeaway: filings = shape + strength only; compass = shape + strength + direction. For direction, you need the compass.", "source": "GLM 5.1 ③", "_id": "glm_3_11"}, {"question": "The lesson previewed two formulas: $$F = Bqv\\sin\\theta$$ (force on a moving charge) and $$F = BIL\\sin\\theta$$ (force on a current-carrying wire). Conceptually, why are these two formulas really the *same* physics expressed in two different ways? (3 steps)", "answer": "- Step 1: A current $$I$$ in a wire is, by definition, a stream of moving charges. Current $$I = \\frac{\\Delta Q}{\\Delta t}$$ — charge per unit time flowing through the wire. So a current-carrying wire is just **many charges moving together** through the wire's length $$L$$.\n- Step 2: For a single charge $$q$$ moving at speed $$v$$ through a field, the force is $$F = Bqv\\sin\\theta$$. For a wire of length $$L$$ carrying current $$I$$, the total charge passing through in time $$\\Delta t$$ is $$\\Delta Q = I\\Delta t$$, and the effective \"velocity\" of charge through length $$L$$ is $$v = \\frac{L}{\\Delta t}$$ (distance per time). Combining: total force on all charges = $$B \\cdot (I\\Delta t) \\cdot \\frac{L}{\\Delta t} \\cdot \\sin\\theta = BIL\\sin\\theta$$.\n- Step 3: The $$\\Delta t$$ cancels out, leaving $$F = BIL\\sin\\theta$$ — the wire formula is just the single-charge formula summed over all the charges in the wire. The two formulas are the same physics: a magnetic field exerts a force on a *moving* charge. The wire version aggregates that force over many charges moving in a confined path (the wire).\n\nTakeaway: $$F = Bqv\\sin\\theta$$ (one charge) and $$F = BIL\\sin\\theta$$ (wire = many charges) are the same underlying law — the wire formula is just the aggregate version.", "source": "GLM 5.1 ③", "_id": "glm_3_40"}, {"question": "Inside a solenoid, the field runs from S to N and is roughly uniform. Why is this internal field important for the motor effect (coming next lesson), and why can't we easily access this same region inside a solid bar magnet? (2 steps)", "answer": "- Step 1: The motor effect requires placing a **current-carrying wire inside a uniform magnetic field** so that the wire experiences a force ($$F = BIL$$). A solenoid's interior provides exactly this: a region of strong, roughly uniform field that you can physically reach (the solenoid is hollow — you can insert a wire inside it). This is why solenoids are practical for motors and other electromagnetic devices.\n- Step 2: A solid bar magnet has the same S→N internal field, but you **cannot access the inside** of a solid iron bar to place a wire there. The solenoid is essentially a \"bar magnet you can reach into\" — its hollow structure lets you use the internal field. Alternatively, you can create a uniform field *between* two flat magnets (opposite poles facing), which is the other common set-up for the motor effect.\n\nTakeaway: solenoid = accessible uniform field inside; solid bar magnet = same physics but physically inaccessible. Both produce uniform fields, but solenoids are practical for devices.", "source": "GLM 5.1 ③", "_id": "glm_3_20"}, {"question": "Why is the field at the very ends of a bar magnet much stronger than at the middle of its long side, when looked at from just outside?", "answer": "The field lines must enter and leave the magnet at the pole faces (N and S). Geometrically, all the lines that thread through the inside of the magnet must funnel through the relatively small area of the pole faces — that's a lot of lines concentrated into a small region. At the middle of the long side, only a few lines pass close by (most have already curved up toward one of the poles), and they're spread over a larger surface. Result: lots of lines per unit area at the ends (high field), few lines per unit area at the middle (low field). The pole-face concentration is what makes \"magnetism strongest at the poles\" true geometrically.", "source": "Opus 4.7 ①", "_id": "opus_1_40"}, {"question": "A current-carrying wire is bent into a single loop. By thinking of small segments of the loop and applying the right-hand grip rule to each, why does the field point through the loop in one consistent direction? (3 steps)", "answer": "- Step 1: Pick a small segment on, say, the top of the loop carrying current \"to the right\". The right-hand grip rule says the field circles that segment — in particular, inside the loop the field points \"into the page\", and above the segment it points \"out of the page\".\n- Step 2: Now pick the bottom of the loop, where current flows \"to the left\". Apply the rule again: inside the loop (above the bottom segment), the field again points \"into the page\".\n- Step 3: Going round every segment, the field contribution **inside** the loop is always in the same direction (into the page in this example), while outside the loop the contributions cancel or weaken. Result: a strong field through the loop, like a tiny bar magnet with N on one face and S on the other.\n\nThis is the building block of solenoid logic.", "source": "Opus 4.7 ①", "_id": "opus_1_30"}, {"question": "Conventional current is defined as flowing in the direction positive charge would move. In a metal wire, which particles actually move, and in which direction relative to conventional current? Why does this naming convention exist? (3 steps)", "answer": "- Step 1: In a metal wire, **electrons** are the particles that actually move (they are the mobile charge carriers in metals). Electrons carry negative charge, so they flow from the negative terminal towards the positive terminal of the supply.\n- Step 2: Conventional current is defined as flowing from **positive to negative** — the opposite direction to the electron flow. So in a metal wire, conventional current and electron flow are **antiparallel** (opposite directions).\n- Step 3: This convention exists because the definition of conventional current was established **before electrons were discovered** (in the early 1800s). Scientists assumed positive charge was moving. By the time electrons were identified (1897), the convention was deeply embedded in all existing equations, circuit diagrams, and hand rules. Changing it would have caused chaos, so we keep \"conventional current = positive to negative\" and simply remember that electrons go the other way.\n\n+ Parallel trap: Earth's \"geographic North\" is magnetically a South pole — another backwards naming convention from history.\n\nTakeaway: conventional current ≠ electron flow direction; both are historical conventions that must be kept straight.", "source": "GLM 5.1 ②", "_id": "glm_2_52"}, {"question": "You're imagining yourself as a positive test charge sitting between two bar magnets. Why is this a useful trick for deciding the field pattern in two-magnet problems?", "answer": "A positive test object (or a free N pole) is pushed *along* the field direction. So at any point, asking \"which way would I be pushed?\" tells you the direction of the field there. In the N-S facing configuration, you'd be pushed in one consistent direction across the gap → uniform field. In the N-N or S-S configuration, the two pushes oppose each other and cancel at the midpoint → neutral point. This reasoning replaces memorisation: you derive the field pattern from the rule \"like repel, opposite attract\" applied at each location.", "source": "Opus 4.7 ②", "_id": "opus_2_15"}, {"question": "Why can you only ever transfer negative charge (electrons) between everyday objects, never positive charge directly?", "answer": "The answer lies in atomic structure. Protons sit locked inside the nucleus, bound by the strong nuclear force — they are not mobile in any ordinary mechanical, chemical, or frictional process. Electrons, by contrast, orbit the nucleus and (especially outer-shell electrons) can be stripped away or gained relatively easily. So when we say \"an object became positively charged,\" what physically happened is that it *lost electrons* — it did not gain protons. This is why charging by friction always boils down to bookkeeping electrons between two surfaces, and why phrases like \"positive charge flowed onto it\" are loose shorthand for \"electrons flowed off it.\"", "source": "Opus 4.7 ②", "_id": "opus_2_0"}, {"question": "Give the three ways to make an electromagnet stronger. All three begin with the same letter — what is it, and what are the three words? (2 steps)", "answer": "- Step 1: The three ways all begin with **C**: **Current, Coils, Core**. This mnemonic is designed for easy recall under exam pressure.\n- Step 2: Each one's mechanism:\n+ **Current** — increase the current flowing through the wire. More charge flow per second = stronger magnetic field.\n+ **Coils** — wind the wire into more turns (a coil/solenoid). Each turn contributes its own field; stacking many turns in the same space concentrates and adds the fields together.\n+ **Core** — insert a soft-iron core inside the coil. The iron becomes an induced magnet, channelling and concentrating the field lines through the core, greatly boosting the overall field strength.\n\nTakeaway: strengthen an electromagnet = more C, C, C.", "source": "GLM 5.1 ②", "_id": "glm_2_28"}, {"question": "A long bar magnet is cut into 100 short pieces. What is the magnetic structure of each piece, and what does this tell you about the microscopic origin of magnetism?", "answer": "Each of the 100 pieces is itself a complete bar magnet with its own N and S poles. No matter how many times you subdivide, you never isolate a lone pole — they always come in pairs. This implies that magnetism doesn't come from \"magnetic charge\" sitting at the poles (the way electric charge sits on objects). Instead, it comes from microscopic current-loops / aligned electron spins inside the material. Each tiny domain is itself a tiny magnetic dipole, so dividing the material just exposes more dipoles — never a single pole. This is a fundamental qualitative difference between electricity (charges can be isolated) and magnetism (dipoles cannot be split).", "source": "Opus 4.7 ①", "_id": "opus_1_31"}, {"question": "A student says \"iron filings show me which end of the magnet is N.\" What's wrong with this, and what should they use instead?", "answer": "Iron filings line up along field lines and bunch where the field is strong, so they reveal the *shape* of the field beautifully — but each filing is just a tiny piece of iron, not a magnet with a labelled N and S. There's nothing in the filing pattern to indicate which direction the arrows point along the lines, so you cannot identify which pole is N. To get direction, you need a **plotting compass**: its needle is a real magnet with a red N end that aligns *along* the field line and shows its direction unambiguously.\n\nTakeaway: filings = shape only; need a compass to identify N vs S.", "source": "Opus 4.7 ②", "_id": "opus_2_42"}, {"question": "What is \"induced magnetism,\" and why can a paperclip stuck to a magnet pick up a second paperclip? (3 steps)", "answer": "- Step 1: When a piece of magnetic material is placed inside an external magnetic field, the field temporarily aligns the material's internal magnetic structure (electron spins / domains). The piece itself becomes a magnet — this is *induced* magnetism.\n- Step 2: The first paperclip, now sitting in the field of a real magnet, becomes magnetised itself with its own N and S poles. It can therefore exert a magnetic force on a second paperclip.\n- Step 3: Because a paperclip is made of soft material (iron-based), the induced magnetism disappears the moment you remove it from the main magnet's field — the chain collapses.\n\nTakeaway: induced magnets are \"borrowed\" magnets that exist only while bathed in another field.", "source": "Opus 4.7 ②", "_id": "opus_2_6"}, {"question": "The textbook definition of a magnetic field is \"a region in which a magnetic material, or a moving charged object, feels a force.\" Why are there two separate categories of things mentioned (magnetic materials *and* moving charges), and what happens if the charge is not moving? (3 steps)", "answer": "- Step 1: A magnetic field exerts a force on **two distinct categories**: (a) magnetic materials — things like iron, steel, nickel, cobalt that are attracted/repelled by the field; and (b) moving charged objects — a charge that is *moving* through the field feels a force. Both categories are listed because they are physically different mechanisms (domain alignment vs the Lorentz force), but both experience a force in the same field.\n- Step 2: The crucial qualifier is **\"moving\"**. A stationary charge in a magnetic field feels *no magnetic force at all*. The magnetic force on a charge depends on its velocity — the formula preview is $$F = Bqv\\sin\\theta$$, where $$v$$ is the speed. If $$v = 0$$, then $$F = 0$$.\n+ This is fundamentally different from an electric field, where a charge feels a force whether it's moving or stationary ($$F = qE$$, no velocity term).\n- Step 3: So the definition must include \"moving\" because it's the key distinction — a magnetic field does nothing to a static charge. The field only \"acts\" on a charge when there is relative motion between the charge and the field.\n\nTakeaway: \"moving\" is not optional in the definition — it's the reason magnetic forces exist at all for charges.", "source": "GLM 5.1 ③", "_id": "glm_3_4"}, {"question": "Two identical electromagnets are made, but one has a soft-iron core and the other has just an air core (no iron inside the solenoid). Which is stronger, and why?", "answer": "The one with the **soft-iron core** is much stronger — typically by a factor of hundreds or thousands. The reason is induced magnetism: when current flows, the original solenoid field aligns the iron's domains, turning the core itself into a strong magnet. This induced magnetisation adds its own field to the original, dramatically boosting the total field. The air core has no domains to align, so you get only the modest field from the current alone. This is exactly why real electromagnets (relays, MRI machines, lifting magnets) almost always have an iron core.", "source": "Opus 4.7 ①", "_id": "opus_1_44"}, {"question": "When a car drives along a road, it can become positively charged. Did the car gain or lose electrons, and why does \"transferring positive charge\" never happen in everyday electrostatics? (3 steps)", "answer": "- Step 1: The car **lost electrons**. Positive charge means fewer electrons than protons — the protons are still in the nuclei (they never move), but some electrons have departed, leaving an excess of positive charge. The rule: lose electrons → become positive; gain electrons → become negative.\n- Step 2: \"Transferring positive charge\" never happens in everyday electrostatics because **protons are locked inside the nucleus** — they cannot move between objects. Only electrons, which are on the outside of atoms and relatively free (especially in conductors), can transfer from one object to another. When we say \"the car becomes positive,\" we really mean \"the car lost some negative electrons, so the remaining protons dominate.\"\n- Step 3: The mechanism: as the car moves, **friction** between the car's surface and the air rubs electrons off the car onto the air molecules. The air gains electrons (becomes negative); the car loses them (becomes positive). Which way the electrons transfer depends on the materials — the exam will tell you or give you the final sign so you can deduce it.\n\nTakeaway: positive = lost electrons, not gained protons. Protons never transfer — only electrons move in electrostatics.", "source": "GLM 5.1 ③", "_id": "glm_3_22"}, {"question": "Define a magnetic field, using the exact phrasing examiners want.", "answer": "A magnetic field is **a region in which a magnetic material, or a moving charged object, feels a force**. The key features of this definition are: (i) it's defined operationally — by what happens to test objects placed inside it; (ii) two kinds of object feel the force: magnetic *materials* (the four listed) *and* moving *charged* objects (stationary charges don't feel a magnetic force, only an electric one); (iii) it's a *region*, not a thing — fields fill space around their source.", "source": "Opus 4.7 ②", "_id": "opus_2_7"}, {"question": "Why does a permanent magnet attract an *unmagnetised* paperclip, even though the paperclip has no poles of its own?", "answer": "When the unmagnetised paperclip enters the magnet's
